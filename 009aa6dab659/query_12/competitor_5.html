ghts</span></em><span data-dcnode-id="2613" instrument_node="">, above n. 3, 15.</span></p></div></span></div><div class="footnote" content-id="fn26" data-dcnode-id="2598"><span class="fn" data-dcnode-id="2599"><span class="label fn-label" data-dcnode-id="2606"><span class="end-note-link" data-dcnode-id="2607" data-fn-id="fn26" rel="nofollow"><span data-dcnode-id="2608" instrument_node="">26</span></span></span><div class="footnote-content" data-dcnode-id="2600"><p class="footnote-compatibility" data-dcnode-id="2601"><span data-dcnode-id="2605" instrument_node="">Human Rights Watch, </span><em data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">The Invisible Exodus</span></em><span data-dcnode-id="2602" instrument_node="">, above n. 6, 21.</span></p></div></span></div><div class="footnote" content-id="fn27" data-dcnode-id="2584"><span class="fn" data-dcnode-id="2585"><span class="label fn-label" data-dcnode-id="2595"><span class="end-note-link" data-dcnode-id="2596" data-fn-id="fn27" rel="nofollow"><span data-dcnode-id="2597" instrument_node="">27</span></span></span><div class="footnote-content" data-dcnode-id="2586"><p class="footnote-compatibility" data-dcnode-id="2587"><span data-dcnode-id="2594" instrument_node="">Amnesty International, </span><em data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="2591" instrument_node="">, above n. 3, 6-11; for more history and general background, judicial system and legislative framework for the protection of human rights in the DPRK, see, </span><em data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">Core Document Forming Part of the Reports of States Parties: Democratic People's Republic of Korea</span></em><span data-dcnode-id="2588" instrument_node=""> UN Doc HRI/CORE/1/Add.108/Rev.1 (2002).</span></p></div></span></div><div class="footnote" content-id="fn28" data-dcnode-id="2573"><span class="fn" data-dcnode-id="2574"><span class="label fn-label" data-dcnode-id="2581"><span class="end-note-link" data-dcnode-id="2582" data-fn-id="fn28" rel="nofollow"><span data-dcnode-id="2583" instrument_node="">28</span></span></span><div class="footnote-content" data-dcnode-id="2575"><p class="footnote-compatibility" data-dcnode-id="2576"><span data-dcnode-id="2580" instrument_node="">For more on the history of the food crisis in the 1990s, see generally, Amnesty International, </span><em data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="2577" instrument_node="">, above n. 3.</span></p></div></span></div><div class="footnote" content-id="fn29" data-dcnode-id="2559"><span class="fn" data-dcnode-id="2560"><span class="label fn-label" data-dcnode-id="2570"><span class="end-note-link" data-dcnode-id="2571" data-fn-id="fn29" rel="nofollow"><span data-dcnode-id="2572" instrument_node="">29</span></span></span><div class="footnote-content" data-dcnode-id="2561"><p class="footnote-compatibility" data-dcnode-id="2562"><span data-dcnode-id="2569" instrument_node="">Seymour, above n. 2, 7. However, it must be noted that such figures are abstract and cannot illustrate the full extent of the famine such as those persons dying from communicable diseases as a result of decreased immunity from malnutrition, those who did not perish though suffered acute malnutrition or were wasting and, in particular, the dramatic decrease in fertility rate as women were less able to reproduce due to severe malnourishment; the figure quoted in the North Korean Human Rights Act, H.R. 4011 § 3(13) (2004), is three and a half million since 1994 who ‘have died from hunger or famine-related disease’; Human Rights Watch puts the figure at two million: Human Rights Watch, </span><em data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Human Rights in North Korea</span></em><span data-dcnode-id="2566" instrument_node="">, above n. 3; Amnesty International quotes the range to be between 220,000 to 3.5 million: Amnesty International, </span><em data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="2563" instrument_node="">, above n. 3, 10.</span></p></div></span></div><div class="footnote" content-id="fn30" data-dcnode-id="2548"><span class="fn" data-dcnode-id="2549"><span class="label fn-label" data-dcnode-id="2556"><span class="end-note-link" data-dcnode-id="2557" data-fn-id="fn30" rel="nofollow"><span data-dcnode-id="2558" instrument_node="">30</span></span></span><div class="footnote-content" data-dcnode-id="2550"><p class="footnote-compatibility" data-dcnode-id="2551"><span data-dcnode-id="2555" instrument_node="">Amnesty International, </span><em data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="2552" instrument_node="">, above n. 3, 10.</span></p></div></span></div><div class="footnote" content-id="fn31" data-dcnode-id="2537"><span class="fn" data-dcnode-id="2538"><span class="label fn-label" data-dcnode-id="2545"><span class="end-note-link" data-dcnode-id="2546" data-fn-id="fn31" rel="nofollow"><span data-dcnode-id="2547" instrument_node="">31</span></span></span><div class="footnote-content" data-dcnode-id="2539"><p class="footnote-compatibility" data-dcnode-id="2540"><span data-dcnode-id="2544" instrument_node="">Lord Bishop of Edmundsbury and Ipswich, </span><em data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">Hansard Volume (House of Lords Debates)</span></em><span data-dcnode-id="2541" instrument_node="">, House of Lords vol. 660(70) (21 Apr. 2004), Column 303; the migration of North Korean nationals across the border into China has become more organised over the years and generally consists of overland travel until travellers reach the Yalu or Tumen River and proceed crossing on foot: Seymour, above n. 2, 8.</span></p></div></span></div><div class="footnote" content-id="fn32" data-dcnode-id="2526"><span class="fn" data-dcnode-id="2527"><span class="label fn-label" data-dcnode-id="2534"><span class="end-note-link" data-dcnode-id="2535" data-fn-id="fn32" rel="nofollow"><span data-dcnode-id="2536" instrument_node="">32</span></span></span><div class="footnote-content" data-dcnode-id="2528"><p class="footnote-compatibility" data-dcnode-id="2529"><span data-dcnode-id="2533" instrument_node="">Seymour, above n. 2, 25; Lord Hylton, </span><em data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">Hansard Volume (House of Lords Debates)</span></em><span data-dcnode-id="2530" instrument_node="">, House of Lords vol. 660(70) (21 Apr. 2004), Column 304; Hawk, above n. 2, 14.</span></p></div></span></div><div class="footnote" content-id="fn33" data-dcnode-id="2518"><span class="fn" data-dcnode-id="2519"><span class="label fn-label" data-dcnode-id="2523"><span class="end-note-link" data-dcnode-id="2524" data-fn-id="fn33" rel="nofollow"><span data-dcnode-id="2525" instrument_node="">33</span></span></span><div class="footnote-content" data-dcnode-id="2520"><p class="footnote-compatibility" data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Seymour, above n. 2, 16.</span></p></div></span></div><div class="footnote" content-id="fn34" data-dcnode-id="2498"><span class="fn" data-dcnode-id="2499"><span class="label fn-label" data-dcnode-id="2515"><span class="end-note-link" data-dcnode-id="2516" data-fn-id="fn34" rel="nofollow"><span data-dcnode-id="2517" instrument_node="">34</span></span></span><div class="footnote-content" data-dcnode-id="2500"><p class="footnote-compatibility" data-dcnode-id="2501"><span data-dcnode-id="2514" instrument_node="">North Korean Human Rights Act, H.R. 4011 § 3(12) (2004); however, due to the limited accessibility of information in the DPRK and for the obvious reason that such persons are in hiding, it is extremely difficult to give a precise figure of DPRK nationals hiding in the PRC. Moreover, the figure fluctuates as some return to the DPRK either voluntarily or through forced repatriation by Chinese authorities or successfully resettle in third countries. According to Citizen's Alliance for North Korean Human Rights, there were 50,000 DPRK nationals hiding in the PRC at the end of 2001; this figure had increased to 150,000 by the end of 2003: Ann J Buwalda &amp; Michelle Lombardo, ‘Strategies for North Korean Refugees’ (2005) 35 </span><em data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Citizen's Alliance for North Korean Human Rights: Life and Human Rights in North Korea</span></em><span data-dcnode-id="2511" instrument_node=""> 5, 5; the former High Commissioner for Refugees, Mr Ruud Lubbers stated in early 2003 that the number of DPRK nationals hiding in China was 100,000: Choi Wook-seok, ‘UN Official Decries Starvation in North’ (19 June 2003) </span><em data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">The Chosun Ilbo</span></em><span data-dcnode-id="2508" instrument_node="">, available at </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="2506" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//english.chosun.com/w21data/html/news/200306/200306190029" target="_blank"><span data-dcnode-id="2507" instrument_node="">http://english.chosun.com/w21data/html/news/200306/200306190029</span></a><span data-dcnode-id="2505" instrument_node=""> .html (21 July 2005); most sources tend to agree that the figure of 300,000 is an exaggeration of the true situation, Refugees International put the real figure to be between 60,000 to 100,000: Joel R Charny, </span><em data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Protection Strategies for North Korean Refugees in China in Protecting North Korean Refugees in China – A Special Report</span></em><span data-dcnode-id="2502" instrument_node="">, Refugees International (2004), 1.</span></p></div></span></div><div class="footnote" content-id="fn35" data-dcnode-id="2487"><span class="fn" data-dcnode-id="2488"><span class="label fn-label" data-dcnode-id="2495"><span class="end-note-link" data-dcnode-id="2496" data-fn-id="fn35" rel="nofollow"><span data-dcnode-id="2497" instrument_node="">35</span></span></span><div class="footnote-content" data-dcnode-id="2489"><p class="footnote-compatibility" data-dcnode-id="2490"><span data-dcnode-id="2494" instrument_node="">UN Human Rights Committee, </span><em data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Concluding Observations of the Human Rights Committee: Democratic People's Republic of Korea</span></em><span data-dcnode-id="2491" instrument_node="">, UN Doc CCPR/CO/72/PRC (2001).</span></p></div></span></div><div class="footnote" content-id="fn36" data-dcnode-id="2476"><span class="fn" data-dcnode-id="2477"><span class="label fn-label" data-dcnode-id="2484"><span class="end-note-link" data-dcnode-id="2485" data-fn-id="fn36" rel="nofollow"><span data-dcnode-id="2486" instrument_node="">36</span></span></span><div class="footnote-content" data-dcnode-id="2478"><p class="footnote-compatibility" data-dcnode-id="2479"><span data-dcnode-id="2483" instrument_node="">An official translation of the Criminal Code of the DPRK was unavailable; for the purposes of this paper, the unofficial translation provided by Human Rights Watch has been used: Translation quoted in Human Rights Watch, </span><em data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">The Invisible Exodus</span></em><span data-dcnode-id="2480" instrument_node="">, above n. 6, 20.</span></p></div></span></div><div class="footnote" content-id="fn37" data-dcnode-id="2468"><span class="fn" data-dcnode-id="2469"><span class="label fn-label" data-dcnode-id="2473"><span class="end-note-link" data-dcnode-id="2474" data-fn-id="fn37" rel="nofollow"><span data-dcnode-id="2475" instrument_node="">37</span></span></span><div class="footnote-content" data-dcnode-id="2470"><p class="footnote-compatibility" data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">Ibid., 21.</span></p></div></span></div><div class="footnote" content-id="fn38" data-dcnode-id="2457"><span class="fn" data-dcnode-id="2458"><span class="label fn-label" data-dcnode-id="2465"><span class="end-note-link" data-dcnode-id="2466" data-fn-id="fn38" rel="nofollow"><span data-dcnode-id="2467" instrument_node="">38</span></span></span><div class="footnote-content" data-dcnode-id="2459"><p class="footnote-compatibility" data-dcnode-id="2460"><span data-dcnode-id="2464" instrument_node="">UN Human Rights Committee, </span><em data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">Concluding Observations of the Human Rights Committee: Democratic People's Republic of Korea</span></em><span data-dcnode-id="2461" instrument_node="">, UN Doc CCPR/CO/72/PRK (2001), para. 19; International Covenant on Civil and Political Rights, 999 UNTS 171. Art. 1(1) ICCPR, states that: ‘Everyone lawfully within the territory of a State shall, within that territory, have the right to liberty of movement and freedom to choose his residence’.</span></p></div></span></div><div class="footnote" content-id="fn39" data-dcnode-id="2440"><span class="fn" data-dcnode-id="2441"><span class="label fn-label" data-dcnode-id="2454"><span class="end-note-link" data-dcnode-id="2455" data-fn-id="fn39" rel="nofollow"><span data-dcnode-id="2456" instrument_node="">39</span></span></span><div class="footnote-content" data-dcnode-id="2442"><p class="footnote-compatibility" data-dcnode-id="2443"><span data-dcnode-id="2453" instrument_node="">Mr Vitit Muntarbhorn, appointed under UN Commission on Human Rights, </span><em data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">Resolution 2004/13 on the Situation of Human Rights in the Democratic People's Republic of Korea</span></em><span data-dcnode-id="2450" instrument_node="">, 60</span><sup data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">th</span></sup><span data-dcnode-id="2447" instrument_node=""> sess, 50</span><sup data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">th</span></sup><span data-dcnode-id="2444" instrument_node=""> mtg, UN Doc E/CN.4/2004/127 (2004).</span></p></div></span></div><div class="footnote" content-id="fn40" data-dcnode-id="2429"><span class="fn" data-dcnode-id="2430"><span class="label fn-label" data-dcnode-id="2437"><span class="end-note-link" data-dcnode-id="2438" data-fn-id="fn40" rel="nofollow"><span data-dcnode-id="2439" instrument_node="">40</span></span></span><div class="footnote-content" data-dcnode-id="2431"><p class="footnote-compatibility" data-dcnode-id="2432"><span data-dcnode-id="2436" instrument_node="">See Art. 13 Universal Declaration of Human Rights 1948; Art. 12(2) ICCPR and many regional human rights instruments. See also Rainer Hofmann, </span><em data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Die Ausreisefreiheit nach Völkerrecht und Staatlichem Recht</span></em><span data-dcnode-id="2433" instrument_node=""> (1988), 309.</span></p></div></span></div><div class="footnote" content-id="fn41" data-dcnode-id="2421"><span class="fn" data-dcnode-id="2422"><span class="label fn-label" data-dcnode-id="2426"><span class="end-note-link" data-dcnode-id="2427" data-fn-id="fn41" rel="nofollow"><span data-dcnode-id="2428" instrument_node="">41</span></span></span><div class="footnote-content" data-dcnode-id="2423"><p class="footnote-compatibility" data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">Convention relating to the Status of Refugees, 545 UNTS 189. The PRC acceded to the Convention on 24 Sept. 1982.</span></p></div></span></div><div class="footnote" content-id="fn42" data-dcnode-id="2413"><span class="fn" data-dcnode-id="2414"><span class="label fn-label" data-dcnode-id="2418"><span class="end-note-link" data-dcnode-id="2419" data-fn-id="fn42" rel="nofollow"><span data-dcnode-id="2420" instrument_node="">42</span></span></span><div class="footnote-content" data-dcnode-id="2415"><p class="footnote-compatibility" data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Protocol relating to the Status of Refugees, 606 UNTS 267. The PRC acceded to the Protocol on 24 Sept. 1982.</span></p></div></span></div><div class="footnote" content-id="fn43" data-dcnode-id="2405"><span class="fn" data-dcnode-id="2406"><span class="label fn-label" data-dcnode-id="2410"><span class="end-note-link" data-dcnode-id="2411" data-fn-id="fn43" rel="nofollow"><span data-dcnode-id="2412" instrument_node="">43</span></span></span><div class="footnote-content" data-dcnode-id="2407"><p class="footnote-compatibility" data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">Constitution of the People's Republic of China 1982, Art. 32(2) reads: ‘The People's Republic of China may grant asylum to foreigners who request it for political reasons’; moreover, Art. 15 of the 1985 Law of the People's Republic of China on the Control of Foreigners Entering and Leaving the Country 1985 states that: ‘Foreigners who seek asylum for political reasons shall be allowed to reside in China after approval by the competent authorities of the Chinese Government’.</span></p></div></span></div><div class="footnote" content-id="fn44" data-dcnode-id="2388"><span class="fn" data-dcnode-id="2389"><span class="label fn-label" data-dcnode-id="2402"><span class="end-note-link" data-dcnode-id="2403" data-fn-id="fn44" rel="nofollow"><span data-dcnode-id="2404" instrument_node="">44</span></span></span><div class="footnote-content" data-dcnode-id="2390"><p class="footnote-compatibility" data-dcnode-id="2391"><span data-dcnode-id="2401" instrument_node="">Lord Hylton, </span><em data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Hansard Volume (House of Lords Debates)</span></em><span data-dcnode-id="2398" instrument_node="">, House of Lords vol. 660(70) (21 Apr. 2004), Column 304; moreover, not only is the PRC returning North Koreans sheltering within its own borders, it is also preventing access of North Koreans to third countries. E.g., on 2 Apr. 2004, a North Korean defector was allegedly killed by Chinese border authorities who shot the man in the back while he attempted to cross the Chinese border into Mongolia: Hyde, </span><em data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">North Korean Human Rights Act of 2004</span></em><span data-dcnode-id="2395" instrument_node="">, House of Representatives Report 108-478, Session 2 (2004), 15; Lord Alton of Liverpool, </span><em data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">Hansard Volume (House of Lords Debates)</span></em><span data-dcnode-id="2392" instrument_node="">, House of Lords vol. 660(70) (21 Apr. 2004), Column 295.</span></p></div></span></div><div class="footnote" content-id="fn45" data-dcnode-id="2377"><span class="fn" data-dcnode-id="2378"><span class="label fn-label" data-dcnode-id="2385"><span class="end-note-link" data-dcnode-id="2386" data-fn-id="fn45" rel="nofollow"><span data-dcnode-id="2387" instrument_node="">45</span></span></span><div class="footnote-content" data-dcnode-id="2379"><p class="footnote-compatibility" data-dcnode-id="2380"><span data-dcnode-id="2384" instrument_node="">UN Committee on Economic, </span><em data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Social and Cultural Rights, Concluding Observations of the Committee on Economic Social and Cultural Rights: People's Republic of China (including Hong Kong and Macao)</span></em><span data-dcnode-id="2381" instrument_node="">, UN Doc E/C.12/1/Add.107 (2005), Office of the High Commissioner for Human Rights (2005), 2-3.</span></p></div></span></div><div class="footnote" content-id="fn46" data-dcnode-id="2363"><span class="fn" data-dcnode-id="2364"><span class="label fn-label" data-dcnode-id="2374"><span class="end-note-link" data-dcnode-id="2375" data-fn-id="fn46" rel="nofollow"><span data-dcnode-id="2376" instrument_node="">46</span></span></span><div class="footnote-content" data-dcnode-id="2365"><p class="footnote-compatibility" data-dcnode-id="2366"><span data-dcnode-id="2373" instrument_node="">Cf Muntarbhorn, above n. 23, 14; Amnesty International, </span><em data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="2370" instrument_node="">, above n. 3, 30; Malinowski, above n. 9; UN Human Rights Committee, </span><em data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Concluding Observations of the Human Rights Committee: Democratic People's Republic of Korea</span></em><span data-dcnode-id="2367" instrument_node="">, UN Doc CCPR/CO/72/PRC (2001), para. 26.</span></p></div></span></div><div class="footnote" content-id="fn47" data-dcnode-id="2352"><span class="fn" data-dcnode-id="2353"><span class="label fn-label" data-dcnode-id="2360"><span class="end-note-link" data-dcnode-id="2361" data-fn-id="fn47" rel="nofollow"><span data-dcnode-id="2362" instrument_node="">47</span></span></span><div class="footnote-content" data-dcnode-id="2354"><p class="footnote-compatibility" data-dcnode-id="2355"><span data-dcnode-id="2359" instrument_node="">Amnesty International also reported that some fifty North Koreans were forcibly repatriated to the DPRK every second day from the border town of Longing in Jilin province while several hundred remain in detention waiting to be returned to the DPRK in other border cities in the province: Amnesty International, </span><em data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">Report 2002</span></em><span data-dcnode-id="2356" instrument_node="">, above n. 22.</span></p></div></span></div><div class="footnote" content-id="fn48" data-dcnode-id="2341"><span class="fn" data-dcnode-id="2342"><span class="label fn-label" data-dcnode-id="2349"><span class="end-note-link" data-dcnode-id="2350" data-fn-id="fn48" rel="nofollow"><span data-dcnode-id="2351" instrument_node="">48</span></span></span><div class="footnote-content" data-dcnode-id="2343"><p class="footnote-compatibility" data-dcnode-id="2344"><span data-dcnode-id="2348" instrument_node="">Hawk, above n. 2, 15; Amnesty International, </span><em data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="2345" instrument_node="">, above n. 3, 22, 31.</span></p></div></span></div><div class="footnote" content-id="fn49" data-dcnode-id="2327"><span class="fn" data-dcnode-id="2328"><span class="label fn-label" data-dcnode-id="2338"><span class="end-note-link" data-dcnode-id="2339" data-fn-id="fn49" rel="nofollow"><span data-dcnode-id="2340" instrument_node="">49</span></span></span><div class="footnote-content" data-dcnode-id="2329"><p class="footnote-compatibility" data-dcnode-id="2330"><span data-dcnode-id="2337" instrument_node="">Hawk, above n. 2, 15, 72; see also, Malinowski, above n. 9; Lee Keum-soon, ‘Cross-Border Movement of North Korean Citizens’ (2004) 16(1) </span><em data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">East Asian Review</span></em><span data-dcnode-id="2334" instrument_node=""> 37 at 45-46; see also, Amnesty International, </span><em data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="2331" instrument_node="">, above n. 3, 28; Amnesty International acknowledges that while reports of infanticide has been received, it is unable to verify such information however does not doubt that pregnant women repatriated to the DPRK ‘face very difficult times’.</span></p></div></span></div><div class="footnote" content-id="fn50" data-dcnode-id="2310"><span class="fn" data-dcnode-id="2311"><span class="label fn-label" data-dcnode-id="2324"><span class="end-note-link" data-dcnode-id="2325" data-fn-id="fn50" rel="nofollow"><span data-dcnode-id="2326" instrument_node="">50</span></span></span><div class="footnote-content" data-dcnode-id="2312"><p class="footnote-compatibility" data-dcnode-id="2313"><span data-dcnode-id="2323" instrument_node="">For recent reports, see, e.g., ‘5 N Korea defectors caught at expat housing compound in Tianjin’ (1 Aug. 2005) </span><em data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">Asia Political News</span></em><span data-dcnode-id="2320" instrument_node="">; ‘Apparent North Korean Defectors Enter South Korean School in China’ (6 Apr. 2005) </span><em data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">Voice of America News</span></em><span data-dcnode-id="2317" instrument_node="">; ‘Suspected N Koreans Seek Asylum at Japanese School in Beijing’ (9 Mar. 2005) </span><em data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">JIJI Press</span></em><span data-dcnode-id="2314" instrument_node="">.</span></p></div></span></div><div class="footnote" content-id="fn51" data-dcnode-id="2293"><span class="fn" data-dcnode-id="2294"><span class="label fn-label" data-dcnode-id="2307"><span class="end-note-link" data-dcnode-id="2308" data-fn-id="fn51" rel="nofollow"><span data-dcnode-id="2309" instrument_node="">51</span></span></span><div class="footnote-content" data-dcnode-id="2295"><p class="footnote-compatibility" data-dcnode-id="2296"><span data-dcnode-id="2306" instrument_node="">Human Rights Watch, ‘China: Protect Rights of North Korean asylum seekers’ (Press Release, 19 Nov. 2002) available at </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="2304" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hrw.org/press/2002/11/nkreport.htm" target="_blank"><span data-dcnode-id="2305" instrument_node="">www.hrw.org/press/2002/11/nkreport.htm</span></a><span data-dcnode-id="2303" instrument_node=""> (21 July 2005); in its annual international report in 2002, Amnesty International reported that Chinese authorities had stepped up their home inspections and offered up to 2,000 Yuan (US $240) to Chinese citizens who could disclose the whereabouts of North Korean refugees: Amnesty International, </span><em data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">Report 2002</span></em><span data-dcnode-id="2300" instrument_node="">, above n. 22; see also, Amnesty International, </span><em data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Report 2003</span></em><span data-dcnode-id="2297" instrument_node="">, above n. 22.</span></p></div></span></div><div class="footnote" content-id="fn52" data-dcnode-id="2279"><span class="fn" data-dcnode-id="2280"><span class="label fn-label" data-dcnode-id="2290"><span class="end-note-link" data-dcnode-id="2291" data-fn-id="fn52" rel="nofollow"><span data-dcnode-id="2292" instrument_node="">52</span></span></span><div class="footnote-content" data-dcnode-id="2281"><p class="footnote-compatibility" data-dcnode-id="2282"><span data-dcnode-id="2289" instrument_node="">At the time of writing this paper, no available source had access to the text of this treaty; see, e.g., Seymour, above n. 2, 5, who calls it a ‘still secret’ treaty; see also, Human Rights Watch, </span><em data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">The Invisible Exodus</span></em><span data-dcnode-id="2286" instrument_node="">, above n. 6, 19-20. However, note that Mike Jendrezjczyk, ‘From Eating Rats in North Korea to Sex Abuse in China: A Refugee Travesty’ (19 Nov. 2002) </span><em data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">International Herald Tribune</span></em><span data-dcnode-id="2283" instrument_node=""> (Paris), available at hrw.org/editorials/2002/nkorea-refugees.htm (21 July 2005), identifies the ‘secret’ treaty as being the 1986 Protocol.</span></p></div></span></div><div class="footnote" content-id="fn53" data-dcnode-id="2271"><span class="fn" data-dcnode-id="2272"><span class="label fn-label" data-dcnode-id="2276"><span class="end-note-link" data-dcnode-id="2277" data-fn-id="fn53" rel="nofollow"><span data-dcnode-id="2278" instrument_node="">53</span></span></span><div class="footnote-content" data-dcnode-id="2273"><p class="footnote-compatibility" data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">The PRC is of the position that its bilateral obligations to the DPRK in returning ‘illegal immigrants’ supersedes its obligations under the 1951 Convention, the 1967 Protocol and other international human rights instruments: Seymour, above n. 2, ii.</span></p></div></span></div><div class="footnote" content-id="fn54" data-dcnode-id="2260"><span class="fn" data-dcnode-id="2261"><span class="label fn-label" data-dcnode-id="2268"><span class="end-note-link" data-dcnode-id="2269" data-fn-id="fn54" rel="nofollow"><span data-dcnode-id="2270" instrument_node="">54</span></span></span><div class="footnote-content" data-dcnode-id="2262"><p class="footnote-compatibility" data-dcnode-id="2263"><span data-dcnode-id="2267" instrument_node="">1986 Mutual Cooperation Protocol for the Work of Maintaining National Security and Social Order in the Border Areas, signed in Dandong in the People's Republic of China between the Democratic People's Republic of Korea Ministry of State Security and the People's Republic of China Ministry of Public Security on 12 Aug. 1986, Art. 4(2), available at </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="2265" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bekkoame.ne.jp/ro/renk/Protocol.htm" target="_blank"><span data-dcnode-id="2266" instrument_node="">www.bekkoame.ne.jp/ro/renk/Protocol.htm</span></a><span data-dcnode-id="2264" instrument_node=""> (21 July 2005).</span></p></div></span></div><div class="footnote" content-id="fn55" data-dcnode-id="2246"><span class="fn" data-dcnode-id="2247"><span class="label fn-label" data-dcnode-id="2257"><span class="end-note-link" data-dcnode-id="2258" data-fn-id="fn55" rel="nofollow"><span data-dcnode-id="2259" instrument_node="">55</span></span></span><div class="footnote-content" data-dcnode-id="2248"><p class="footnote-compatibility" data-dcnode-id="2249"><span data-dcnode-id="2256" instrument_node="">E.g., see, Government of the People's Republic of China, </span><em data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Replies by the Government of the People's Republic of China,</span></em><span data-dcnode-id="2253" instrument_node=""> UN Doc CESCR/NONE/2004/10 (2004) 30; Office of the UNHCHR (2004) </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="2251" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ohchr.org/english/bodies/cescr/docs/HR.CESCR.NONE.2004.10.pdf" target="_blank"><span data-dcnode-id="2252" instrument_node="">www.ohchr.org/english/bodies/cescr/docs/HR.CESCR.NONE.2004.10.pdf</span></a><span data-dcnode-id="2250" instrument_node=""> (21 July 2005), where the Government of the PRC stated: ‘The Chinese government has been firm in its position that DPRK nationals having entered China illegally are not refugees. In handling the issue of illegal Korean travelers, China has always adhered to international law, China's own laws and the principles of humanitarianism. Whether during their illegal stay after crossing into Chinese territory illegally, or during their detention after being caught by Chinese public security departments, they are amply provided with food, water, shelter and daily needs in the spirit of humanitarianism. There is no such thing as violation of their human rights to food’. See also, Human Rights Watch, ‘North Korea: Allow Access for U.N. Rights Monitor: China Must Stop Sending Back North Koreans at Risk of Persecution’ (Press Release, 15 Apr. 2005) available at hrw.org/english/docs/2005/04/15/nkorea10489.htm (21 July 2005).</span></p></div></span></div><div class="footnote" content-id="fn56" data-dcnode-id="2235"><span class="fn" data-dcnode-id="2236"><span class="label fn-label" data-dcnode-id="2243"><span class="end-note-link" data-dcnode-id="2244" data-fn-id="fn56" rel="nofollow"><span data-dcnode-id="2245" instrument_node="">56</span></span></span><div class="footnote-content" data-dcnode-id="2237"><p class="footnote-compatibility" data-dcnode-id="2238"><span data-dcnode-id="2242" instrument_node="">Human Rights Watch, ‘China: Protect North Korean Refugees’, above n. 51; similarly, a Chinese official stated, ‘If we grant political asylum to one refugee today, there would be thousands or millions of North Koreans who might seize the opportunity and pour into China’: K Platt, </span><em data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">N. Korea Gets China's Cooperation on Refugee Returns</span></em><span data-dcnode-id="2239" instrument_node="">, Christian Science Monitor (2000) available at csmonitor.com/cgi-bin/durableRedirect.pl?/durable/2000/06/09/text/p7s1.html (21 July 2005).</span></p></div></span></div><div class="footnote" content-id="fn57" data-dcnode-id="2227"><span class="fn" data-dcnode-id="2228"><span class="label fn-label" data-dcnode-id="2232"><span class="end-note-link" data-dcnode-id="2233" data-fn-id="fn57" rel="nofollow"><span data-dcnode-id="2234" instrument_node="">57</span></span></span><div class="footnote-content" data-dcnode-id="2229"><p class="footnote-compatibility" data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Art. 35 Refugee Convention and Art. 2 Refugee Protocol.</span></p></div></span></div><div class="footnote" content-id="fn58" data-dcnode-id="2219"><span class="fn" data-dcnode-id="2220"><span class="label fn-label" data-dcnode-id="2224"><span cl
