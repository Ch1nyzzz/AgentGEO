</span><h2 class="abstract-title js-splitscreen-abstract-title" data-dcnode-id="3890" id="23103301" scrollto-destination="23103301"><span data-dcnode-id="3891" instrument_node="">Abstract</span></h2><span data-dcnode-id="3889" instrument_node="">
</span><section class="abstract" data-dcnode-id="3886"><p class="chapter-para" data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">The severe food crisis of the 1990s forced thousands of North Koreans to leave their country in search of food. Most of them crossed the border into China, to which the Government of the People's Republic of China (the PRC) responded by forcibly repatriating defectors to North Korea, thus placing many of them at risk of being subjected to inhumane and degrading treatment and, at times, even death. This article provides an overview of the situation of North Korean asylum seekers and analyses the legal protection available to North Korean defectors under international law. The article focuses specifically on the situation of North Koreans in mainland China and China's obligations under international human rights and refugee law. The aim of the article is to contribute to the elaboration of durable solutions for the plight of North Korean asylum seekers and to develop a range of recommendations for law reform and policy change.</span></p></section><span data-dcnode-id="3885" instrument_node=""> </span><div class="article-metadata-panel clearfix at-ArticleMetadata" data-dcnode-id="3876"><div class="article-metadata-tocSections" data-dcnode-id="3877"><span data-dcnode-id="3884" instrument_node="">
</span><div class="article-metadata-tocSections-title" data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">Issue Section:</span></div><span data-dcnode-id="3881" instrument_node="">
</span><a data-dcnode-id="3879" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/ijrl/search-results%3Ff_TocHeadingTitle%3DArticles"><span data-dcnode-id="3880" instrument_node="">Articles</span></a><span data-dcnode-id="3878" instrument_node="">
</span></div></div><span data-dcnode-id="3875" instrument_node="">
</span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3873" id="23103303" scrollto-destination="23103303"><span data-dcnode-id="3874" instrument_node="">1 Introduction</span></h2><span data-dcnode-id="3872" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3866"><span data-dcnode-id="3871" instrument_node="">The severe food crisis of the 1990s forced thousands of North Koreans</span><span class="xrefLink" data-dcnode-id="3870" id="jumplink-fn1"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3868" data-google-interstitial="false" data-open="fn1" href="javascript:;" reveal-id="fn1"><span data-dcnode-id="3869" instrument_node="">1</span></a><span data-dcnode-id="3867" instrument_node=""> to leave their country in search of food. Most of them crossed the border into China, to which the Government of the People's Republic of China (the PRC) responded by forcibly repatriating defectors to North Korea, thus placing many of them at risk of inhumane and degrading treatment and, at times, even death.</span></p><p class="chapter-para" data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">This article provides an overview of the situation of North Korean asylum seekers and analyses the legal protection available to North Korean defectors under international law. The paper focuses specifically on the situation of North Koreans in mainland China and China's obligations under international human rights and refugee law. The aim of the article is to contribute to the elaboration of durable solutions for the plight of North Korean asylum seekers and to develop a range of recommendations for law reform and policy change. The article acknowledges that the human rights situation in the Democratic People's Republic of Korea (the DPRK) cannot be held in isolation from the country's pursuit of nuclear weapons; any solution to the challenge must take into account the current global climate and political sensitivities in the region.</span></p><p class="chapter-para" data-dcnode-id="3858"><span data-dcnode-id="3863" instrument_node="">Given the scarcity of academic scholarship in this field, the political isolation of the DPRK, and the country's general unwillingness to permit external human rights actors to monitor developments in the country, it is necessary to explain where the information for this study came from, how it was handled, and the problems that have been encountered. Much of the conventional wisdom about the DPRK and North Korean refugees derives not from academic research or from field studies but from the media, governmental sources, international organisations and reported anecdotal evidence. Obtaining credible and verifiable information is difficult.</span><span class="xrefLink" data-dcnode-id="3862" id="jumplink-fn2"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3860" data-google-interstitial="false" data-open="fn2" href="javascript:;" reveal-id="fn2"><span data-dcnode-id="3861" instrument_node="">2</span></a><span data-dcnode-id="3859" instrument_node=""> Official English translations of national legislation from the PRC and from South Korea (the Republic of Korea, or ROK), international human rights instruments and other UN documents are, for the most part, available electronically. This, however, is not the case for North Korean legislation. In particular, the Criminal Code of the DPRK is currently not available in English and therefore unofficial translations were relied upon.</span></p><p class="chapter-para" data-dcnode-id="3837"><span data-dcnode-id="3857" instrument_node="">The majority of reports on the human rights situation in North Korea and on the situation of refugees from the DPRK have been published by non-government organisations (NGOs), most notably Human Rights Watch and Amnesty International. While these organisations have released a wealth of factual information and statistics, it must be noted that neither organisation has access to the DPRK or the border region of the PRC.</span><span class="xrefLink" data-dcnode-id="3856" id="jumplink-fn3"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3854" data-google-interstitial="false" data-open="fn3" href="javascript:;" reveal-id="fn3"><span data-dcnode-id="3855" instrument_node="">3</span></a><span data-dcnode-id="3853" instrument_node=""> Many NGOs have either left the DPRK due to frustrations in working with the Government or they operate outside the DPRK and have no access to the country.</span><span class="xrefLink" data-dcnode-id="3852" id="jumplink-fn4"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3850" data-google-interstitial="false" data-open="fn4" href="javascript:;" reveal-id="fn4"><span data-dcnode-id="3851" instrument_node="">4</span></a><span data-dcnode-id="3849" instrument_node=""> NGOs also admit the difficulty in obtaining credible information for their reports due to the limited access they obtain to North Korean defectors.</span><span class="xrefLink" data-dcnode-id="3848" id="jumplink-fn5"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3846" data-google-interstitial="false" data-open="fn5" href="javascript:;" reveal-id="fn5"><span data-dcnode-id="3847" instrument_node="">5</span></a><span data-dcnode-id="3845" instrument_node=""> But even when access is available – generally to North Korean refugees in South Korea – many defectors are reluctant to reveal much information for fear of endangering their family members who remain in the DPRK.</span><span class="xrefLink" data-dcnode-id="3844" id="jumplink-fn6"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3842" data-google-interstitial="false" data-open="fn6" href="javascript:;" reveal-id="fn6"><span data-dcnode-id="3843" instrument_node="">6</span></a><span data-dcnode-id="3841" instrument_node=""> In addition, some NGO documents are far from objective, are heavily politically influenced, and seem preoccupied with criticising the North Korean Government regime, rather than addressing the needs and interests of DPRK defectors.</span><span class="xrefLink" data-dcnode-id="3840" id="jumplink-fn7"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3838" data-google-interstitial="false" data-open="fn7" href="javascript:;" reveal-id="fn7"><span data-dcnode-id="3839" instrument_node="">7</span></a></p><span data-dcnode-id="3836" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3834" id="23103308" scrollto-destination="23103308"><span data-dcnode-id="3835" instrument_node="">2 Human rights in North Korea</span></h2><span data-dcnode-id="3833" instrument_node="">
</span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3831" id="23103309" scrollto-destination="23103309"><span data-dcnode-id="3832" instrument_node="">2.1 Domestic human rights protection</span></h3><span data-dcnode-id="3830" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">The DPRK has been under the absolute rule of Kim Jong Il since the death of his father, Kim Il Sung, in 1994. North Korea is a Communist state under a one-man dictatorship without any notable opposition movement or any democratic processes.</span></p><p class="chapter-para" data-dcnode-id="3819"><span data-dcnode-id="3827" instrument_node="">While the freedoms of speech, press, assembly, demonstration and association are guaranteed under Article 67 of the Socialist Constitution of the Democratic People's Republic of Korea of 1998 (the DPRK Constitution),</span><span class="xrefLink" data-dcnode-id="3826" id="jumplink-fn8"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3824" data-google-interstitial="false" data-open="fn8" href="javascript:;" reveal-id="fn8"><span data-dcnode-id="3825" instrument_node="">8</span></a><span data-dcnode-id="3823" instrument_node=""> reports from defectors reveal that these guarantees do not exist in practice.</span><span class="xrefLink" data-dcnode-id="3822" id="jumplink-fn9"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3820" data-google-interstitial="false" data-open="fn9" href="javascript:;" reveal-id="fn9"><span data-dcnode-id="3821" instrument_node="">9</span></a></p><p class="chapter-para" data-dcnode-id="3810"><span data-dcnode-id="3818" instrument_node="">Similarly, while freedom of religion and worship is enshrined in Article 68 of the DPRK Constitution,</span><span class="xrefLink" data-dcnode-id="3817" id="jumplink-fn10"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3815" data-google-interstitial="false" data-open="fn10" href="javascript:;" reveal-id="fn10"><span data-dcnode-id="3816" instrument_node="">10</span></a><span data-dcnode-id="3814" instrument_node=""> the article contains an explicit limitation of religious freedom by stating that religion cannot be used ‘as a pretext for drawing in foreign forces or for harming the State and social order’. Indeed, religious worship has been severely repressed both in the public and private spheres; reports from defectors have revealed that the Government of the DPRK has used the limitation clause in Article 68 to justify its severe oppression; a practice which has been fiercely criticised by the United Nations (UN) Commission on Human Rights.</span><span class="xrefLink" data-dcnode-id="3813" id="jumplink-fn11"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3811" data-google-interstitial="false" data-open="fn11" href="javascript:;" reveal-id="fn11"><span data-dcnode-id="3812" instrument_node="">11</span></a></p><p class="chapter-para" data-dcnode-id="3800"><span data-dcnode-id="3809" instrument_node="">The right of citizens to equality is enshrined in Article 65 of the DPRK Constitution,</span><span class="xrefLink" data-dcnode-id="3808" id="jumplink-fn12"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3806" data-google-interstitial="false" data-open="fn12" href="javascript:;" reveal-id="fn12"><span data-dcnode-id="3807" instrument_node="">12</span></a><span data-dcnode-id="3805" instrument_node=""> but, in practice, reports claim that the Government continues in its division of the population into three classes.</span><span class="xrefLink" data-dcnode-id="3804" id="jumplink-fn13"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3802" data-google-interstitial="false" data-open="fn13" href="javascript:;" reveal-id="fn13"><span data-dcnode-id="3803" instrument_node="">13</span></a><span data-dcnode-id="3801" instrument_node=""> Several sources have found that</span></p><blockquote data-dcnode-id="3794"><p class="chapter-para" data-dcnode-id="3795"><span data-dcnode-id="3799" instrument_node="">[t]he government divides all North Koreans into three classes ‘core’, ‘wavering’ and ‘hostile’, depending on their loyalty to the state and social background. Those belonging to the ‘core’ class get preferential access to food, medicine, education and employment; those at the bottom of this class system suffer permanent discrimination and the most intense persecution, a fate that is passed from generation to generation.</span><span class="xrefLink" data-dcnode-id="3798" id="jumplink-fn14"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3796" data-google-interstitial="false" data-open="fn14" href="javascript:;" reveal-id="fn14"><span data-dcnode-id="3797" instrument_node="">14</span></a></p></blockquote><span data-dcnode-id="3793" instrument_node="">Amnesty International claims that up to a quarter of the total population of the DPRK are considered to belong to the ‘hostile class’ and</span><blockquote data-dcnode-id="3787"><p class="chapter-para" data-dcnode-id="3788"><span data-dcnode-id="3792" instrument_node="">comprise people suspected of opposing the government or whose family members have been imprisoned. They also include the so-called ‘impure elements’ such as prisoners of war from South Korea who were reportedly relocated to remote mountainous areas in provinces such as North Hamgyong in the period 1953 to 1960, immediately after the Korean War.</span><span class="xrefLink" data-dcnode-id="3791" id="jumplink-fn15"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3789" data-google-interstitial="false" data-open="fn15" href="javascript:;" reveal-id="fn15"><span data-dcnode-id="3790" instrument_node="">15</span></a></p></blockquote><p data-dcnode-id="3786"></p><p class="chapter-para" data-dcnode-id="3777"><span data-dcnode-id="3785" instrument_node="">The United States Committee for Human Rights in North Korea estimates that approximately 150,000 to 200,000 persons – nearly 1 percent of the total population – are detained in political penal labour colonies throughout the DPRK.</span><span class="xrefLink" data-dcnode-id="3784" id="jumplink-fn16"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3782" data-google-interstitial="false" data-open="fn16" href="javascript:;" reveal-id="fn16"><span data-dcnode-id="3783" instrument_node="">16</span></a><span data-dcnode-id="3781" instrument_node=""> A unique characteristic of the prison camp system is the concept of ‘collective responsibility’ where entire families may be imprisoned for up to three generations for the ‘political crimes’ of their parents, grandparents or even ancestors in order to ‘cleanse’ the population of opponents to the Government regime.</span><span class="xrefLink" data-dcnode-id="3780" id="jumplink-fn17"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3778" data-google-interstitial="false" data-open="fn17" href="javascript:;" reveal-id="fn17"><span data-dcnode-id="3779" instrument_node="">17</span></a></p><span data-dcnode-id="3776" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3774" id="23103315" scrollto-destination="23103315"><span data-dcnode-id="3775" instrument_node="">2.2 International obligations</span></h3><span data-dcnode-id="3773" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3756"><span data-dcnode-id="3772" instrument_node="">The DPRK is party to four of the key international human rights treaties: the International Covenant on Civil and Political Rights (ICCPR),</span><span class="xrefLink" data-dcnode-id="3771" id="jumplink-fn18"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3769" data-google-interstitial="false" data-open="fn18" href="javascript:;" reveal-id="fn18"><span data-dcnode-id="3770" instrument_node="">18</span></a><span data-dcnode-id="3768" instrument_node=""> the International Covenant on Economic, Social and Cultural Rights,</span><span class="xrefLink" data-dcnode-id="3767" id="jumplink-fn19"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3765" data-google-interstitial="false" data-open="fn19" href="javascript:;" reveal-id="fn19"><span data-dcnode-id="3766" instrument_node="">19</span></a><span data-dcnode-id="3764" instrument_node=""> the Convention on the Rights of the Child</span><span class="xrefLink" data-dcnode-id="3763" id="jumplink-fn20"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3761" data-google-interstitial="false" data-open="fn20" href="javascript:;" reveal-id="fn20"><span data-dcnode-id="3762" instrument_node="">20</span></a><span data-dcnode-id="3760" instrument_node=""> and the Convention on the Elimination of All Forms of Discrimination against Women.</span><span class="xrefLink" data-dcnode-id="3759" id="jumplink-fn21"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3757" data-google-interstitial="false" data-open="fn21" href="javascript:;" reveal-id="fn21"><span data-dcnode-id="3758" instrument_node="">21</span></a></p><p class="chapter-para" data-dcnode-id="3742"><span data-dcnode-id="3755" instrument_node="">There is little, if any, evidence to suggest that the DPRK is adhering to its international human rights obligations. The DPRK has remained largely uncooperative in granting access to international observers.</span><span class="xrefLink" data-dcnode-id="3754" id="jumplink-fn22"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3752" data-google-interstitial="false" data-open="fn22" href="javascript:;" reveal-id="fn22"><span data-dcnode-id="3753" instrument_node="">22</span></a><span data-dcnode-id="3751" instrument_node=""> Only on rare occasions has the DPRK allowed a few select external human rights actors to enter the country.</span><span class="xrefLink" data-dcnode-id="3750" id="jumplink-fn23"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3748" data-google-interstitial="false" data-open="fn23" href="javascript:;" reveal-id="fn23"><span data-dcnode-id="3749" instrument_node="">23</span></a><span data-dcnode-id="3747" instrument_node=""> While the DPRK consistently denies any allegations of human rights abuses within its borders,</span><span class="xrefLink" data-dcnode-id="3746" id="jumplink-fn24"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3744" data-google-interstitial="false" data-open="fn24" href="javascript:;" reveal-id="fn24"><span data-dcnode-id="3745" instrument_node="">24</span></a><span data-dcnode-id="3743" instrument_node=""> it has been internationally condemned for its gross and systemic human rights violations.</span></p><span data-dcnode-id="3741" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3732" id="23103318" scrollto-destination="23103318"><span data-dcnode-id="3740" instrument_node="">3 The ‘Silent Famine’</span><span class="xrefLink" data-dcnode-id="3739" id="jumplink-fn25"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3737" data-google-interstitial="false" data-open="fn25" href="javascript:;" reveal-id="fn25"><span data-dcnode-id="3738" instrument_node="">25</span></a><span data-dcnode-id="3736" instrument_node=""> and the ‘Invisible Exodus’</span><span class="xrefLink" data-dcnode-id="3735" id="jumplink-fn26"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3733" data-google-interstitial="false" data-open="fn26" href="javascript:;" reveal-id="fn26"><span data-dcnode-id="3734" instrument_node="">26</span></a></h2><span data-dcnode-id="3731" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3726"><span data-dcnode-id="3730" instrument_node="">With the collapse of the Soviet Union in 1991, the DPRK lost strategic economic ties upon which the country's economy had been heavily dependent. The effects of the country's struggling economy were further exacerbated by a decrease in trade levels with the PRC following China's improved relations with South Korea, and the inadequate economic infrastructure of the DPRK itself. Moreover, heavy floods in the mid-1990s and droughts in 2000 and 2001 led to a complete collapse of North Korea's agricultural industry. The poor state of the country's economy and the failure of its agricultural sector resulted in a food crisis that, according to some sources, affected almost the entire population of the DPRK.</span><span class="xrefLink" data-dcnode-id="3729" id="jumplink-fn27"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3727" data-google-interstitial="false" data-open="fn27" href="javascript:;" reveal-id="fn27"><span data-dcnode-id="3728" instrument_node="">27</span></a></p><p class="chapter-para" data-dcnode-id="3697"><span data-dcnode-id="3725" instrument_node="">By 1995, the DPRK was in desperate need of international aid to feed its starving population.</span><span class="xrefLink" data-dcnode-id="3724" id="jumplink-fn28"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3722" data-google-interstitial="false" data-open="fn28" href="javascript:;" reveal-id="fn28"><span data-dcnode-id="3723" instrument_node="">28</span></a><span data-dcnode-id="3721" instrument_node=""> Due to the limited information available, it is difficult to discern the exact number of persons who died from starvation during the famine. Estimates range from 2 to 3.5 million,</span><span class="xrefLink" data-dcnode-id="3720" id="jumplink-fn29"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3718" data-google-interstitial="false" data-open="fn29" href="javascript:;" reveal-id="fn29"><span data-dcnode-id="3719" instrument_node="">29</span></a><span data-dcnode-id="3717" instrument_node=""> some 12 to 13 percent of the total population.</span><span class="xrefLink" data-dcnode-id="3716" id="jumplink-fn30"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3714" data-google-interstitial="false" data-open="fn30" href="javascript:;" reveal-id="fn30"><span data-dcnode-id="3715" instrument_node="">30</span></a><span data-dcnode-id="3713" instrument_node=""> In their struggle to survive, thousands of hungry North Koreans were driven across the border into the PRC in search of food. Others, in search for freedom from persecution, attempted to flee to neighbouring South Korea.</span><span class="xrefLink" data-dcnode-id="3712" id="jumplink-fn31"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3710" data-google-interstitial="false" data-open="fn31" href="javascript:;" reveal-id="fn31"><span data-dcnode-id="3711" instrument_node="">31</span></a><span data-dcnode-id="3709" instrument_node=""> Due to the immense difficulties and dangers associated with crossing the demilitarised zone or escaping via a direct sea route to the ROK, the majority of North Korean defectors attempt to reach the ROK by first crossing the border into the PRC, and then travelling through a third country before arriving in the ROK.</span><span class="xrefLink" data-dcnode-id="3708" id="jumplink-fn32"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3706" data-google-interstitial="false" data-open="fn32" href="javascript:;" reveal-id="fn32"><span data-dcnode-id="3707" instrument_node="">32</span></a><span data-dcnode-id="3705" instrument_node=""> Official Chinese estimates put the number of DPRK nationals currently hiding in the PRC at 10,000.</span><span class="xrefLink" data-dcnode-id="3704" id="jumplink-fn33"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3702" data-google-interstitial="false" data-open="fn33" href="javascript:;" reveal-id="fn33"><span data-dcnode-id="3703" instrument_node="">33</span></a><span data-dcnode-id="3701" instrument_node=""> Independent sources claim that the number ranges between 100,000 and 300,000 persons.</span><span class="xrefLink" data-dcnode-id="3700" id="jumplink-fn34"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3698" data-google-interstitial="false" data-open="fn34" href="javascript:;" reveal-id="fn34"><span data-dcnode-id="3699" instrument_node="">34</span></a></p><span data-dcnode-id="3696" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3694" id="23103321" scrollto-destination="23103321"><span data-dcnode-id="3695" instrument_node="">4 Sanctions on illegal departure</span></h2><span data-dcnode-id="3693" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3683"><span data-dcnode-id="3692" instrument_node="">Under Article 75 of the DPRK Constitution, citizens enjoy the ‘freedom to reside in and travel to any place’. Nevertheless, leaving the country without the possession of a valid travel certificate and without permission from the authorities is considered a criminal offence under Articles 117 and 47 of the Criminal Code (DPRK).</span><span class="xrefLink" data-dcnode-id="3691" id="jumplink-fn35"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3689" data-google-interstitial="false" data-open="fn35" href="javascript:;" reveal-id="fn35"><span data-dcnode-id="3690" instrument_node="">35</span></a><span data-dcnode-id="3688" instrument_node=""> Article 117 provides that, any person ‘who crosses the border without permission shall be punished by a sentence of three years or less labour re-education’.</span><span class="xrefLink" data-dcnode-id="3687" id="jumplink-fn36"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3685" data-google-interstitial="false" data-open="fn36" href="javascript:;" reveal-id="fn36"><span data-dcnode-id="3686" instrument_node="">36</span></a><span data-dcnode-id="3684" instrument_node=""> Article 47 states that any person</span></p><blockquote data-dcnode-id="3677"><p class="chapter-para" data-dcnode-id="3678"><span data-dcnode-id="3682" instrument_node="">who escapes to another country or to the enemy in betrayal of his motherland and people, or who commits treacherous acts towards the motherland such as espionage or treason, shall be punished by at least seven years or more labour re-education. If it is a serious violation, he shall be punished by execution and forfeiture of all property.</span><span class="xrefLink" data-dcnode-id="3681" id="jumplink-fn37"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3679" data-google-interstitial="false" data-open="fn37" href="javascript:;" reveal-id="fn37"><span data-dcnode-id="3680" instrument_node="">37</span></a></p></blockquote><p data-dcnode-id="3676"></p><p class="chapter-para" data-dcnode-id="3663"><span data-dcnode-id="3675" instrument_node="">The restriction imposed on travel has been widely criticised by the UN Human Rights Committee</span><span class="xrefLink" data-dcnode-id="3674" id="jumplink-fn38"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3672" data-google-interstitial="false" data-open="fn38" href="javascript:;" reveal-id="fn38"><span data-dcnode-id="3673" instrument_node="">38</span></a><span data-dcnode-id="3671" instrument_node=""> and the UN Special Rapporteur on the Situation of Human Rights in the Democratic People's Republic of Korea (the Special Rapporteur).</span><span class="xrefLink" data-dcnode-id="3670" id="jumplink-fn39"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3668" data-google-interstitial="false" data-open="fn39" href="javascript:;" reveal-id="fn39"><span data-dcnode-id="3669" instrument_node="">39</span></a><span data-dcnode-id="3667" instrument_node=""> It has been held that the provisions in the Criminal Code (DPRK) violate the right of a person to freely leave a country, which is guaranteed in multiple human rights treaties, including the ICCPR and the Universal Declaration of Human Rights.</span><span class="xrefLink" data-dcnode-id="3666" id="jumplink-fn40"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3664" data-google-interstitial="false" data-open="fn40" href="javascript:;" reveal-id="fn40"><span data-dcnode-id="3665" instrument_node="">40</span></a></p><span data-dcnode-id="3662" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3660" id="23103324" scrollto-destination="23103324"><span data-dcnode-id="3661" instrument_node="">5 China's position</span></h2><span data-dcnode-id="3659" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3641"><span data-dcnode-id="3658" instrument_node="">The PRC is a party to the 1951 Convention relating to the Status of Refugees (the Refugee Convention)</span><span class="xrefLink" data-dcnode-id="3657" id="jumplink-fn41"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3655" data-google-interstitial="false" data-open="fn41" href="javascript:;" reveal-id="fn41"><span data-dcnode-id="3656" instrument_node="">41</span></a><span data-dcnode-id="3654" instrument_node=""> and the 1967 Protocol relating to the Status of Refugees (the Refugee Protocol).</span><span class="xrefLink" data-dcnode-id="3653" id="jumplink-fn42"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3651" data-google-interstitial="false" data-open="fn42" href="javascript:;" reveal-id="fn42"><span data-dcnode-id="3652" instrument_node="">42</span></a><span data-dcnode-id="3650" instrument_node=""> Moreover, Article 32(2) of the Constitution of the PRC provides for the right to seek asylum from political persecution.</span><span class="xrefLink" data-dcnode-id="3649" id="jumplink-fn43"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3647" data-google-interstitial="false" data-open="fn43" href="javascript:;" reveal-id="fn43"><span data-dcnode-id="3648" instrument_node="">43</span></a><span data-dcnode-id="3646" instrument_node=""> However, irrespective of its international obligations and despite the grave situation awaiting North Korean defectors upon return to the DPRK, it is estimated that some 300 North Koreans are repatriated to the DPRK each week without any access to the UN High Commissioner for Refugees (UNHCR) and no other formal procedures to determine their status.</span><span class="xrefLink" data-dcnode-id="3645" id="jumplink-fn44"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3643" data-google-interstitial="false" data-open="fn44" href="javascript:;" reveal-id="fn44"><span data-dcnode-id="3644" instrument_node="">44</span></a><span data-dcnode-id="3642" instrument_node=""> North Korean asylum seekers have no access to refugee status determination procedures and, hence, have no effective legal protection. The Chinese Government also denies UNHCR any access to the border region with the DPRK.</span></p><p class="chapter-para" data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">With a view to asylum seekers in China, the UN Committee on Economic, Social and Cultural Rights in May 2005 expressed its concern</span></p><blockquote data-dcnode-id="3633"><p class="chapter-para" data-dcnode-id="3634"><span data-dcnode-id="3638" instrument_node="">that non-citizens including asylum seekers, refugees and stateless persons, are excluded from the constitutional guarantees to the enjoyment of rights and freedoms enshrined in the Covenant that are extended to all citizens in the State party. The Committee notes that some asylum seekers are excluded by the refugee determination procedure of the State party, in particular those coming from North Korea who are regarded by the State party as economic migrants, and are thus compelled to return to their countries.</span><span class="xrefLink" data-dcnode-id="3637" id="jumplink-fn45"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3635" data-google-interstitial="false" data-open="fn45" href="javascript:;" reveal-id="fn45"><span data-dcnode-id="3636" instrument_node="">45</span></a></p></blockquote><span data-dcnode-id="3632" instrument_node="">The lack of legal protection has made many North Korean asylum seekers vulnerable to trafficking, sexual exploitation and abuse,</span><span class="xrefLink" data-dcnode-id="3631" id="jumplink-fn46"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3629" data-google-interstitial="false" data-open="fn46" href="javascript:;" reveal-id="fn46"><span data-dcnode-id="3630" instrument_node="">46</span></a><span data-dcnode-id="3628" instrument_node=""> constantly fearing forced repatriation to the DPRK.</span><span class="xrefLink" data-dcnode-id="3627" id="jumplink-fn47"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3625" data-google-interstitial="false" data-open="fn47" href="javascript:;" reveal-id="fn47"><span data-dcnode-id="3626" instrument_node="">47</span></a><span data-dcnode-id="3624" instrument_node=""> Those who are forcibly repatriated are interrogated by DPRK officials upon return and have been known to be tortured, imprisoned and, on some occasions, executed.</span><span class="xrefLink" data-dcnode-id="3623" id="jumplink-fn48"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3621" data-google-interstitial="false" data-open="fn48" href="javascript:;" reveal-id="fn48"><span data-dcnode-id="3622" instrument_node="">48</span></a><span data-dcnode-id="3620" instrument_node=""> Moreover, pregnant women who are repatriated to the DPRK from the PRC are often forced into abortions, or their infants are killed upon birth for fear of foreign impregnation.</span><span class="xrefLink" data-dcnode-id="3619" id="jumplink-fn49"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3617" data-google-interstitial="false" data-open="fn49" href="javascript:;" reveal-id="fn49"><span data-dcnode-id="3618" instrument_node="">49</span></a><p data-dcnode-id="3616"></p><p class="chapter-para" data-dcnode-id="3607"><span data-dcnode-id="3615" instrument_node="">The lack of avenues to obtain effective asylum and protection in China has also resulted in desperate and highly publicised attempts by North Korean asylum seekers to force entry into foreign embassies and other expatriate facilities in Beijing and elsewhere in the PRC.</span><span class="xrefLink" data-dcnode-id="3614" id="jumplink-fn50"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3612" data-google-interstitial="false" data-open="fn50" href="javascript:;" reveal-id="fn50"><span data-dcnode-id="3613" instrument_node="">50</span></a><span data-dcnode-id="3611" instrument_node=""> While such attempts have alerted the international community to the plight of North Korean asylum seekers, they have also come at a high cost, placing not only the asylum seekers involved, but also those remaining in the PRC, at greater risk of forced repatriation due to the resulting crackdowns by Chinese authorities.</span><span class="xrefLink" data-dcnode-id="3610" id="jumplink-fn51"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3608" data-google-interstitial="false" data-open="fn51" href="javascript:;" reveal-id="fn51"><span data-dcnode-id="3609" instrument_node="">51</span></a></p><p class="chapter-para" data-dcnode-id="3597"><span data-dcnode-id="3606" instrument_node="">In defiance of its international obligations, the PRC alleges that it is bound by a confidential Sino-Korean treaty signed in 1961</span><span class="xrefLink" data-dcnode-id="3605" id="jumplink-fn52"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3603" data-google-interstitial="false" data-open="fn52" href="javascript:;" reveal-id="fn52"><span data-dcnode-id="3604" instrument_node="">52</span></a><span data-dcnode-id="3602" instrument_node=""> and subsequent protocols that provide for the return of all DPRK nationals who have entered the PRC without a valid travel certificate.</span><span class="xrefLink" data-dcnode-id="3601" id="jumplink-fn53"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3599" data-google-interstitial="false" data-open="fn53" href="javascript:;" reveal-id="fn53"><span data-dcnode-id="3600" instrument_node="">53</span></a><span data-dcnode-id="3598" instrument_node=""> The text of this treaty is not publicly available. In 1986, the DPRK's Ministry of State Security and the PRC's Ministry of Public Security entered into a further agreement entitled Mutual Cooperation Protocol for the Work of Maintaining National Security and Social Order in the Border Areas. Article 4 of this agreement states:</span></p><blockquote data-dcnode-id="3587"><p class="chapter-para" data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">(1) Both sides shall mutually cooperate on the work of preventing the illegal border crossing of residents.</span></p><p class="chapter-para" data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">In the case of crossing the border without possession of a legal certificate or without passing through screening agencies or the passage places stated on the possessed certificate, [the individual] shall be treated as an illegal border crosser […].</span></p><p class="chapter-para" data-dcnode-id="3588"><span data-dcnode-id="3592" instrument_node="">(2) Regarding individuals who illegally cross the border, depending on the situation a name-list or relevant materials should be turned over to the other side […].</span><span class="xrefLink" data-dcnode-id="3591" id="jumplink-fn54"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3589" data-google-interstitial="false" data-open="fn54" href="javascript:;" reveal-id="fn54"><span data-dcnode-id="3590" instrument_node="">54</span></a></p></blockquote><span data-dcnode-id="3586" instrument_node="">The PRC also maintains the position that North Korean asylum seekers are not refugees but rather, are economic immigrants. Hence, the PRC considers itself not in breach of its international obligations under the Refugee Convention by returning North Koreans found within its borders to the DPRK.</span><span class="xrefLink" data-dcnode-id="3585" id="jumplink-fn55"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3583" data-google-interstitial="false" data-open="fn55" href="javascript:;" reveal-id="fn55"><span data-dcnode-id="3584" instrument_node="">55</span></a><span data-dcnode-id="3582" instrument_node=""> This position is manifested in a statement by the Chinese Foreign Minister, Li Zhaoxing, saying, ‘These refugees that you talk about do not exist […]. [They] are not refugees, but are illegal immigrants’.</span><span class="xrefLink" data-dcnode-id="3581" id="jumplink-fn56"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3579" data-google-interstitial="false" data-open="fn56" href="javascript:;" reveal-id="fn56"><span data-dcnode-id="3580" instrument_node="">56</span></a><p data-dcnode-id="3578"></p><span data-dcnode-id="3577" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3575" id="23103329" scrollto-destination="23103329"><span data-dcnode-id="3576" instrument_node="">6 Eligibilty of DPRK defectors for refugee status</span></h2><span data-dcnode-id="3574" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3568"><span data-dcnode-id="3573" instrument_node="">The legal foundation for the protection of refugees stems from the Refugee Convention as amended by the Refugee Protocol. These international instruments contain provisions for the treatment and protection to be afforded to refugees, as well as the obligations of State Parties to cooperate with UNHCR in executing its functions.</span><span class="xrefLink" data-dcnode-id="3572" id="jumplink-fn57"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3570" data-google-interstitial="false" data-open="fn57" href="javascript:;" reveal-id="fn57"><span data-dcnode-id="3571" instrument_node="">57</span></a><span data-dcnode-id="3569" instrument_node=""> The Refugee Convention recognises a person as a refugee if he or she</span></p><blockquote data-dcnode-id="3562"><p class="chapter-para" data-dcnode-id="3563"><span data-dcnode-id="3567" instrument_node="">owing to a well-founded fear of being persecuted for reasons of race, religion, nationality, membership of a particular social group, or political opinion, is outside the country of his/her nationality and is unable to or, owing to such fear, is unwilling to avail him/herself of the protection of that country.</span><span class="xrefLink" data-dcnode-id="3566" id="jumplink-fn58"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3564" data-google-interstitial="false" data-open="fn58" href="javascript:;" reveal-id="fn58"><span data-dcnode-id="3565" instrument_node="">58</span></a></p></blockquote><span data-dcnode-id="3561" instrument_node="">The Refugee Convention seeks to protect specific types of migrants from the country from which they fear persecution by placing obligations on State Parties to provide refuge. The Convention contains provisions relating to the definition of refugee (Article 1), provisions that define the rights and legal status of refugees (Articles 2–24), and provisions dealing with the implementation of the Convention obligations (Articles 25–46).</span><p data-dcnode-id="3560"></p><p class="chapter-para" data-dcnode-id="3552"><span data-dcnode-id="3559" instrument_node="">In his first report to the UN Commission on Human Rights in 2004, the Special Rapporteur identified two main categories of DPRK refugees: (1) those who flee the DPRK for fear of political persecution thus satisfying the traditional concept of the refugee definition; and (2) those who fled the DPRK for other reasons, for example in search of food during times of crisis, and who now fear persecution should they be returned to the DPRK due to the imposition of severe sanctions for illegal departure; so-called refugees </span><em data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">sur place</span></em><span data-dcnode-id="3556" instrument_node="">.</span><span class="xrefLink" data-dcnode-id="3555" id="jumplink-fn59"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3553" data-google-interstitial="false" data-open="fn59" href="javascript:;" reveal-id="fn59"><span data-dcnode-id="3554" instrument_node="">59</span></a></p><p class="chapter-para" data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">The following parts dissect both the common arguments put forward by the Government of the PRC, as well as the requirements specified under the Refugee Convention and the Refugee Protocol, in order to determine the eligibility of North Korean asylum seekers for refugee status.</span></p><span data-dcnode-id="3549" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3547" id="23103333" scrollto-destination="23103333"><span data-dcnode-id="3548" instrument_node="">6.1 Economic migrant or refugee?</span></h3><span data-dcnode-id="3546" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3540"><span data-dcnode-id="3545" instrument_node="">The economic (and illegal) immigrant can be differentiated from a refugee in that the former enjoys the protection of his or her country of origin while the latter does not.</span><span class="xrefLink" data-dcnode-id="3544" id="jumplink-fn60"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3542" data-google-interstitial="false" data-open="fn60" href="javascript:;" reveal-id="fn60"><span data-dcnode-id="3543" instrument_node="">60</span></a><span data-dcnode-id="3541" instrument_node=""> On this point, the Special Rapporteur stated:</span></p><blockquote data-dcnode-id="3534"><p class="chapter-para" data-dcnode-id="3535"><span data-dcnode-id="3539" instrument_node="">The former [illegal immigrants] implies that they can be sent back to their country of origin, while the latter [refugees] are protected by the principle of non-refoulement. I submit that a key test is whether they are protected by their country of origin. If they are not, this should open the door to international protection and legitimize their classification as refugee. Even if some countries are not ready to classify them openly as refugee, these persons should at least be treated as persons in need of international protection, and basic international law principles, such as non-refoulement, should be applied.</span><span class="xrefLink" data-dcnode-id="3538" id="jumplink-fn61"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3536" data-google-interstitial="false" data-open="fn61" href="javascript:;" reveal-id="fn61"><span data-dcnode-id="3537" instrument_node="">61</span></a></p></blockquote><p data-dcnode-id="3533"></p><p class="chapter-para" data-dcnode-id="3520"><span data-dcnode-id="3532" instrument_node="">The Chinese Government argues that DPRK asylum seekers are not refugees but, rather, are illegal and economic immigrants.</span><span class="xrefLink" data-dcnode-id="3531" id="jumplink-fn62"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3529" data-google-interstitial="false" data-open="fn62" href="javascript:;" reveal-id="fn62"><span data-dcnode-id="3530" instrument_node="">62</span></a><span data-dcnode-id="3528" instrument_node=""> In support of this position, many sources available also suggest that the majority of North Koreans leave the DPRK primarily in search of food, not for fear of persecution.</span><span class="xrefLink" data-dcnode-id="3527" id="jumplink-fn63"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3525" data-google-interstitial="false" data-open="fn63" href="javascript:;" reveal-id="fn63"><span data-dcnode-id="3526" instrument_node="">63</span></a><span data-dcnode-id="3524" instrument_node=""> For example, of the thirty-eight North Korean defectors interviewed by the NGO Refugees International, none claimed that they had experienced any persecution for reasons of political opinion or religious belief prior to their departure from the DPRK.</span><span class="xrefLink" data-dcnode-id="3523" id="jumplink-fn64"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3521" data-google-interstitial="false" data-open="fn64" href="javascript:;" reveal-id="fn64"><span data-dcnode-id="3522" instrument_node="">64</span></a></p><p class="chapter-para" data-dcnode-id="3515"><span data-dcnode-id="3519" instrument_node="">However, all available sources also report that North Koreans who are forcibly repatriated to the DPRK face harsh interrogation, torture, imprisonment and, in some cases, execution.</span><span class="xrefLink" data-dcnode-id="3518" id="jumplink-fn65"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3516" data-google-interstitial="false" data-open="fn65" href="javascript:;" reveal-id="fn65"><span data-dcnode-id="3517" instrument_node="">65</span></a></p><blockquote data-dcnode-id="3509"><p class="chapter-para" data-dcnode-id="3510"><span data-dcnode-id="3514" instrument_node="">It is well documented by Human Rights Watch and other human rights organisations that North Koreans who left without state permission are detained, tortured and even executed on return to their country. Their fear of persecution is more than well founded.</span><span class="xrefLink" data-dcnode-id="3513" id="jumplink-fn66"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3511" data-google-interstitial="false" data-open="fn66" href="javascript:;" reveal-id="fn66"><span data-dcnode-id="3512" instrument_node="">66</span></a></p></blockquote><span data-dcnode-id="3508" instrument_node="">Thus, human rights organisations usually consider North Korean asylum seekers as refugees.</span><p data-dcnode-id="3507"></p><span data-dcnode-id="3506" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3504" id="23103337" scrollto-destination="23103337"><span data-dcnode-id="3505" instrument_node="">6.2 Prosecution versus Persecution</span></h3><span data-dcnode-id="3503" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3498"><span data-dcnode-id="3502" instrument_node="">In order to be eligible for refugee status, the Refugee Convention and the Refugee Protocol require that there be a ‘well-founded fear of being persecuted’ for one of the five convention grounds.</span><span class="xrefLink" data-dcnode-id="3501" id="jumplink-fn67"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3499" data-google-interstitial="false" data-open="fn67" href="javascript:;" reveal-id="fn67"><span data-dcnode-id="3500" instrument_node="">67</span></a></p><p class="chapter-para" data-dcnode-id="3489"><span data-dcnode-id="3497" instrument_node="">Available sources claim that all DPRK defectors, irrespective of their motives for leaving the country, have committed a ‘crime’ under the Criminal Code (DPRK) and are punishable under Articles 117 or 47. In relation to these articles, it is necessary to distinguish between sanctions imposed as a means of controlling orderly migration (and, therefore, prosecution for breach of a law) on the one hand, and persecution for a convention ground on the other. Sanctions placed on illegal departure do not necessarily amount to persecution and, hence, do not result in eligibility for refugee status. Sanctions may be placed on illegal departure in order to maintain border control where a person may be legitimately prosecuted for breach of a national law.</span><span class="xrefLink" data-dcnode-id="3496" id="jumplink-fn68"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3494" data-google-interstitial="false" data-open="fn68" href="javascript:;" reveal-id="fn68"><span data-dcnode-id="3495" instrument_node="">68</span></a><span data-dcnode-id="3493" instrument_node=""> However, where sanctions impose punishments that are disproportionate to the crime committed, such sanctions may amount to persecution if the person can demonstrate that his or her motives and reasons for illegal departure and for remaining outside the country stem from one of the five grounds of persecution listed under Article 1A(2) of the Refugee Convention.</span><span class="xrefLink" data-dcnode-id="3492" id="jumplink-fn69"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3490" data-google-interstitial="false" data-open="fn69" href="javascript:;" reveal-id="fn69"><span data-dcnode-id="3491" instrument_node="">69</span></a></p><p class="chapter-para" data-dcnode-id="3483"><span data-dcnode-id="3488" instrument_node="">Article 117 of the Criminal Code (DPRK) applies to defectors even if they have left the country solely in search of food during food shortages. In regards to Article 47, the punishment is imposed irrespective of whether the defector genuinely perceives him or herself to have ‘betrayed the motherland’ as the act of leaving the country itself may amount to treason.</span><span class="xrefLink" data-dcnode-id="3487" id="jumplink-fn70"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3485" data-google-interstitial="false" data-open="fn70" href="javascript:;" reveal-id="fn70"><span data-dcnode-id="3486" instrument_node="">70</span></a><span data-dcnode-id="3484" instrument_node=""> The UNHCR Handbook makes it clear that for a well-founded fear of persecution to arise, the person need not genuinely possess that particular political opinion; it is sufficient that the authorities of the country from which he or she is fleeing perceive or have imputed that opinion upon him or her. For the purposes of the Refugee Convention and the Refugee Protocol, this imputed opinion is sufficient to assess the ‘well-foundedness’ of the fear as this opinion would be the basis of any punishment the authorities might subject on him or her.</span></p><p class="chapter-para" data-dcnode-id="3478"><span data-dcnode-id="3482" instrument_node="">The seriousness of the penalties prescribed under Article 117 and, in particular, under Article 47 of the Criminal Code (DPRK), in combination with the re-education component of the punishment, suggest that the objective of the provisions is not to maintain effective border control, but rather, to punish ‘disloyal’ nationals who leave the country, thus indicating their rejection of its political system. This is, in essence, punishment based on a – real or imputed – political opinion.</span><span class="xrefLink" data-dcnode-id="3481" id="jumplink-fn71"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3479" data-google-interstitial="false" data-open="fn71" href="javascript:;" reveal-id="fn71"><span data-dcnode-id="3480" instrument_node="">71</span></a></p><p class="chapter-para" data-dcnode-id="3472"><span data-dcnode-id="3477" instrument_node="">While some defectors have successfully avoided imprisonment and even managed to cross the border several times without interference during periods of low control,</span><span class="xrefLink" data-dcnode-id="3476" id="jumplink-fn72"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3474" data-google-interstitial="false" data-open="fn72" href="javascript:;" reveal-id="fn72"><span data-dcnode-id="3475" instrument_node="">72</span></a><span data-dcnode-id="3473" instrument_node=""> it has been held that the significant risk of imprisonment in inhumane and degrading conditions and the general arbitrariness with which the sanctions are imposed, is sufficient to justify a well-founded fear of persecution. According to Amnesty International,</span></p><blockquote data-dcnode-id="3466"><p class="chapter-para" data-dcnode-id="3467"><span data-dcnode-id="3471" instrument_node="">[d]eaths from malnutrition and infectious diseases are high – even for people who receive light sentences. Therefore, many North Koreans view forced repatriation from China as a death sentence regardless of whether they are classed as ‘political offenders’ or given a ‘light’ sentence.</span><span class="xrefLink" data-dcnode-id="3470" id="jumplink-fn73"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3468" data-google-interstitial="false" data-open="fn73" href="javascript:;" reveal-id="fn73"><span data-dcnode-id="3469" instrument_node="">73</span></a></p></blockquote><span data-dcnode-id="3465" instrument_node="">Thus, the sanctions imposed under Articles 47 and 117 of the Criminal Code (DPRK) for illegal departure can amount to a ‘well-founded fear of persecution’ on the grounds of an imputed political opinion and therefore satisfy the criteria for refugee status set out under Article 1A(2) of the Refugee Convention.</span><p data-dcnode-id="3464"></p><span data-dcnode-id="3463" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3458" id="23103343" scrollto-destination="23103343"><span data-dcnode-id="3462" instrument_node="">6.3 Illegal departure as a basis for refugees </span><em data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">sur place</span></em><span data-dcnode-id="3459" instrument_node=""> claims</span></h3><span data-dcnode-id="3457" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3449"><span data-dcnode-id="3456" instrument_node="">The Refugee Convention requires that a refugee be ‘outside the country of his nationality’ in order to be eligible for refugee status. Article 1A(2) does not require that the refugee leave the country as a result of a well-founded fear of persecution. The Refugee Convention does not exclude an asylum seeker from eligibility for refugee status due to changed circumstances after having left his or her country of origin for some time. Under international law, a person who becomes a refugee only after he or she has left his or her country of origin is, nevertheless, a refugee, a so-called refugee </span><em data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">sur place</span></em><span data-dcnode-id="3453" instrument_node="">.</span><span class="xrefLink" data-dcnode-id="3452" id="jumplink-fn74"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3450" data-google-interstitial="false" data-open="fn74" href="javascript:;" reveal-id="fn74"><span data-dcnode-id="3451" instrument_node="">74</span></a></p><p class="chapter-para" data-dcnode-id="3434"><span data-dcnode-id="3448" instrument_node="">A person may also become a refugee </span><em data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">sur place</span></em><span data-dcnode-id="3445" instrument_node=""> through his or her own actions. There is no provision or requirement under the Refugee Convention or the Refugee Protocol to suggest that he or she can only become a refugee through an involuntary action.</span><span class="xrefLink" data-dcnode-id="3444" id="jumplink-fn75"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3442" data-google-interstitial="false" data-open="fn75" href="javascript:;" reveal-id="fn75"><span data-dcnode-id="3443" instrument_node="">75</span></a><span data-dcnode-id="3441" instrument_node=""> All that is required is that a refugee </span><em data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">sur place</span></em><span data-dcnode-id="3438" instrument_node=""> demonstrate that having left his or her country of nationality, he or she is ‘unable or, owing to such fear, is unwilling to avail himself of the protection of that country’.</span><span class="xrefLink" data-dcnode-id="3437" id="jumplink-fn76"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3435" data-google-interstitial="false" data-open="fn76" href="javascript:;" reveal-id="fn76"><span data-dcnode-id="3436" instrument_node="">76</span></a></p><p class="chapter-para" data-dcnode-id="3426"><span data-dcnode-id="3433" instrument_node="">It is submitted that the sanctions imposed under Articles 117 and 47 can amount to a ‘well-founded fear of persecution’ and that the sanctions are imposed arbitrarily on persons irrespective of their motives for leaving the country. It is therefore arguable that North Koreans who may have initially left the country purely in search of food and not for fear of persecution, may still be eligible for international protection under the international instruments as refugees </span><em data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">sur place</span></em><span data-dcnode-id="3430" instrument_node="">.</span><span class="xrefLink" data-dcnode-id="3429" id="jumplink-fn77"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3427" data-google-interstitial="false" data-open="fn77" href="javascript:;" reveal-id="fn77"><span data-dcnode-id="3428" instrument_node="">77</span></a></p><span data-dcnode-id="3425" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3423" id="23103347" scrollto-destination="23103347"><span data-dcnode-id="3424" instrument_node="">6.4 Starvation as a ground of persecution</span></h3><span data-dcnode-id="3422" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3416"><span data-dcnode-id="3421" instrument_node="">The fundamental right to life is enshrined in Article 6 of the ICCPR which states that ‘every human being has the inherent right to life. This right shall be protected by law. No one shall be arbitrarily deprived of his life’. The protection of such a right involves positive action on the part of a government against threats to its enjoyment, such as malnutrition or disease, and this right cannot be derogated from even in a time of State emergency.</span><span class="xrefLink" data-dcnode-id="3420" id="jumplink-fn78"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3418" data-google-interstitial="false" data-open="fn78" href="javascript:;" reveal-id="fn78"><span data-dcnode-id="3419" instrument_node="">78</span></a><span data-dcnode-id="3417" instrument_node=""> Starvation is a threat to life and, as such, can amount to a violation of a fundamental human right. In relation to the DPRK, the UN Human Rights Committee noted:</span></p><blockquote data-dcnode-id="3410"><p class="chapter-para" data-dcnode-id="3411"><span data-dcnode-id="3415" instrument_node="">Given the State party's obligation, under Article 6 of the Covenant, to protect the life of its citizens and to take measures to reduce infant mortality and increase life expectancy, the Committee remains seriously concerned about the lack of measures by the State party to deal with the food and nutrition situation in the Democratic People's Republic of Korea and the lack of measures to address, in cooperation with the international community, the causes and consequences of the drought and other natural disasters which seriously affected the country's population in the 1990’s.</span><span class="xrefLink" data-dcnode-id="3414" id="jumplink-fn79"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3412" data-google-interstitial="false" data-open="fn79" href="javascript:;" reveal-id="fn79"><span data-dcnode-id="3413" instrument_node="">79</span></a></p></blockquote><span data-dcnode-id="3409" instrument_node="">In order to establish whether starvation can amount to persecution,</span><span class="xrefLink" data-dcnode-id="3408" id="jumplink-fn80"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3406" data-google-interstitial="false" data-open="fn80" href="javascript:;" reveal-id="fn80"><span data-dcnode-id="3407" instrument_node="">80</span></a><span data-dcnode-id="3405" instrument_node=""> it is necessary to analyse whether the effects of the famine are widespread and felt indiscriminately, or whether the famine targets a particular vulnerable group. Where there is a shortage of food and the effects of the famine or crisis are spread indiscriminately across the entire population of the country, starvation is unlikely to sufficiently satisfy the persecution threshold under Article 1A(2) of the Refugee Convention. For starvation to amount to persecution, it must be shown that a particular group was more vulnerable to starvation due to one of the five Convention grounds.</span><span class="xrefLink" data-dcnode-id="3404" id="jumplink-fn81"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3402" data-google-interstitial="false" data-open="fn81" href="javascript:;" reveal-id="fn81"><span data-dcnode-id="3403" instrument_node="">81</span></a><span data-dcnode-id="3401" instrument_node=""> In this context, UNHCR recognised that</span><blockquote data-dcnode-id="3395"><p class="chapter-para" data-dcnode-id="3396"><span data-dcnode-id="3400" instrument_node="">[t]he distinction between an economic migrant and a refugee is, however, sometimes blurred in the same way as the distinction between economic and political measures in an applicant's country of origin is not always clear. Behind economic measures affecting a person's livelihood there may be racial, religious or political aims or intentions directed against a particular group. Where economic measures destroy the economic existence of a particular section of the population (e.g., withdrawal of trading rights from, or discriminatory or excessive taxation of, a specific ethnic or religious group), the victims may according to the circumstances become refugees on leaving the country.</span><span class="xrefLink" data-dcnode-id="3399" id="jumplink-fn82"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3397" data-google-interstitial="false" data-open="fn82" href="javascript:;" reveal-id="fn82"><span data-dcnode-id="3398" instrument_node="">82</span></a></p></blockquote><span data-dcnode-id="3394" instrument_node="">Some sources have claimed that the Government's prejudiced Public Distribution System (the PDS)</span><span class="xrefLink" data-dcnode-id="3393" id="jumplink-fn83"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3391" data-google-interstitial="false" data-open="fn83" href="javascript:;" reveal-id="fn83"><span data-dcnode-id="3392" instrument_node="">83</span></a><span data-dcnode-id="3390" instrument_node=""> exacerbated the effects and widespread suffering of persons during the famine. The PDS has been criticised for its partiality in the distribution of food rations; giving priority during food crises to those it considers to be loyal to the regime, party leaders, workers in critical industries and soldiers, leaving many in the ‘hostile’ class</span><span class="xrefLink" data-dcnode-id="3389" id="jumplink-fn84"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3387" data-google-interstitial="false" data-open="fn84" href="javascript:;" reveal-id="fn84"><span data-dcnode-id="3388" instrument_node="">84</span></a><span data-dcnode-id="3386" instrument_node=""> beyond the reach of the PDS. As a result, food shortages have a disproportionate effect on some parts of the population.</span><span class="xrefLink" data-dcnode-id="3385" id="jumplink-fn85"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3383" data-google-interstitial="false" data-open="fn85" href="javascript:;" reveal-id="fn85"><span data-dcnode-id="3384" instrument_node="">85</span></a><p data-dcnode-id="3382"></p><p class="chapter-para" data-dcnode-id="3372"><span data-dcnode-id="3381" instrument_node="">Much of the information available lacks depth and consistency to support an argument that during times of general food shortage, persons classified as belonging to the ‘hostile’ group are more vulnerable to starvation and death due to their perceived ‘disloyalty’ to the regime. Humanitarian organisations such as the World for Food Programme and other NGOs simply lack sufficient access to the country in order to monitor the situation on the ground and to make any conclusions regarding the distribution of food.</span><span class="xrefLink" data-dcnode-id="3380" id="jumplink-fn86"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3378" data-google-interstitial="false" data-open="fn86" href="javascript:;" reveal-id="fn86"><span data-dcnode-id="3379" instrument_node="">86</span></a><span data-dcnode-id="3377" instrument_node=""> For example, Amnesty International has reported that during food shortages, urban dwellers were more vulnerable to starvation – some spending up to 85 percent of their income on food to support the household – than persons living in rural areas.</span><span class="xrefLink" data-dcnode-id="3376" id="jumplink-fn87"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3374" data-google-interstitial="false" data-open="fn87" href="javascript:;" reveal-id="fn87"><span data-dcnode-id="3375" instrument_node="">87</span></a><span data-dcnode-id="3373" instrument_node=""> This suggests that the discriminatory effects of the famine may not be limited to class distinction alone, but may be a combination of several factors, geographical location being one.</span></p><span data-dcnode-id="3371" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3369" id="23103350" scrollto-destination="23103350"><span data-dcnode-id="3370" instrument_node="">6.5 Other vulnerable groups</span></h3><span data-dcnode-id="3368" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">Membership of a particular group may deem a person more vulnerable to harsh treatment upon return to the DPRK and therefore make that person more likely to be in need of international protection.</span></p><span data-dcnode-id="3365" instrument_node=""> </span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="3363" id="23103352" scrollto-destination="23103352"><span data-dcnode-id="3364" instrument_node="">6.5.1 Collective responsibility</span></h4><span data-dcnode-id="3362" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">Family ties remain strong in the DPRK; family background is a strong determinant of the level and quality of education a person is to receive, his or her occupation and who he or she is able to marry. Human Rights Watch reports that:</span></p><blockquote data-dcnode-id="3354"><p class="chapter-para" data-dcnode-id="3355"><span data-dcnode-id="3359" instrument_node="">One of the most striking features of North Korea's philosophy of social control is collective responsibility. Persons who commit crimes may be punished, but so may their parents, siblings, and other relatives, regardless of their individual innocence or guilt. Likewise, persons may be blacklisted, not just for their own political opinions or actions, but for the imputed opinions or actions of relatives, even long-dead ancestors.</span><span class="xrefLink" data-dcnode-id="3358" id="jumplink-fn88"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3356" data-google-interstitial="false" data-open="fn88" href="javascript:;" reveal-id="fn88"><span data-dcnode-id="3357" instrument_node="">88</span></a></p></blockquote><span data-dcnode-id="3353" instrument_node="">The political ‘crimes’ of one family member can result in the blacklisting or punishment of other family members. This is evident in the comment made by Human Rights Watch that many of the DPRK defectors they had interviewed</span><blockquote data-dcnode-id="3347"><p class="chapter-para" data-dcnode-id="3348"><span data-dcnode-id="3352" instrument_node="">insisted on using pseudonyms and deleting material that could identify relatives left behind in DPRK. Several persons related incidents where they knew of specific individuals who had been sent to a political prison camp because of relatives who were known as defectors.</span><span class="xrefLink" data-dcnode-id="3351" id="jumplink-fn89"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3349" data-google-interstitial="false" data-open="fn89" href="javascript:;" reveal-id="fn89"><span data-dcnode-id="3350" instrument_node="">89</span></a></p></blockquote><p data-dcnode-id="3346"></p><span data-dcnode-id="3345" instrument_node=""> </span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="3343" id="23103354" scrollto-destination="23103354"><span data-dcnode-id="3344" instrument_node="">6.5.2 Religious groups</span></h4><span data-dcnode-id="3342" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3333"><span data-dcnode-id="3341" instrument_node="">While the freedom of religious belief is guaranteed under Article 68 of the DPRK Constitution, in practice, this constitutional right is rarely enforced, if not actively violated.</span><span class="xrefLink" data-dcnode-id="3340" id="jumplink-fn90"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3338" data-google-interstitial="false" data-open="fn90" href="javascript:;" reveal-id="fn90"><span data-dcnode-id="3339" instrument_node="">90</span></a><span data-dcnode-id="3337" instrument_node=""> This is illustrated in the punishments and sentences received by defectors who confess to having contact with Christian missionaries in the PRC. Sources bearing the accounts of testimonies of defectors seem to suggest that those who confess to having contact with Christian missionaries or nationals of the ROK in the PRC are more likely to be subjected to harsher treatment, torture, extended periods of imprisonment and, in some cases, execution.</span><span class="xrefLink" data-dcnode-id="3336" id="jumplink-fn91"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3334" data-google-interstitial="false" data-open="fn91" href="javascript:;" reveal-id="fn91"><span data-dcnode-id="3335" instrument_node="">91</span></a></p><span data-dcnode-id="3332" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3330" id="23103356" scrollto-destination="23103356"><span data-dcnode-id="3331" instrument_node="">6.6 Dual nationality</span></h3><span data-dcnode-id="3329" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3323"><span data-dcnode-id="3328" instrument_node="">The Refugee Convention and the Refugee Protocol are intended to protect those persons who do not enjoy any national protection based on citizenship or any other privileged quasi-citizenship status. Therefore, where a person possesses dual nationality and where he or she enjoys the protection of at least one country of nationality, the person will be excluded from international protection.</span><span class="xrefLink" data-dcnode-id="3327" id="jumplink-fn92"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3325" data-google-interstitial="false" data-open="fn92" href="javascript:;" reveal-id="fn92"><span data-dcnode-id="3326" instrument_node="">92</span></a><span data-dcnode-id="3324" instrument_node=""> Article 1E of the Refugee Convention states that, ‘[t]his Convention shall not apply to a person who is recognised by the competent authorities of the country in which he has taken residence as having the rights and obligations which are attached to the possession of the nationality of that country’.</span></p><p class="chapter-para" data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">Further clarification is given in the second paragraph of Article 1A(2) which states that:</span></p><blockquote data-dcnode-id="3318"><p class="chapter-para" data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">In the case of a person who has more than one nationality, the term ‘the country of his nationality’ shall mean each of the countries of which he is a national, and a person shall not be deemed to be lacking the protection of the country of his nationality if, without any valid reason based on well-founded fear, he has not availed himself of the protection of one of the countries of which he is a national.</span></p></blockquote><span data-dcnode-id="3317" instrument_node="">North Korean defectors are entitled to ROK citizenship under a combination of provisions in the Constitution of the Republic of Korea (ROK Constitution), the Nationality Act (ROK) and the Protection of North Korean Residents and Support of their Settlement Act (the Settlement Act (ROK)).</span><span class="xrefLink" data-dcnode-id="3316" id="jumplink-fn93"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3314" data-google-interstitial="false" data-open="fn93" href="javascript:;" reveal-id="fn93"><span data-dcnode-id="3315" instrument_node="">93</span></a><span data-dcnode-id="3313" instrument_node=""> Article 3 of the ROK Constitution states that, ‘[t]he territory of the Republic of Korea shall consist of the Korean Peninsula and its adjacent lands’ (thereby, including the territory of the DPRK) and Article 2 states that ‘[n]ationality in the Republic of Korea is prescribed by law’.</span><span class="xrefLink" data-dcnode-id="3312" id="jumplink-fn94"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3310" data-google-interstitial="false" data-open="fn94" href="javascript:;" reveal-id="fn94"><span data-dcnode-id="3311" instrument_node="">94</span></a><span data-dcnode-id="3309" instrument_node=""> Furthermore, the Nationality Act (ROK) defines a ‘Korean national’ as any person ‘whose father or mother is a national of the Republic of Korea at the time of his or her birth’.</span><span class="xrefLink" data-dcnode-id="3308" id="jumplink-fn95"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3306" data-google-interstitial="false" data-open="fn95" href="javascript:;" reveal-id="fn95"><span data-dcnode-id="3307" instrument_node="">95</span></a><span data-dcnode-id="3305" instrument_node=""> Hence, given that the territory of the DPRK is included in the definition of the ROK under the Constitution, the provisions effectively provide that any DPRK national, provided that his or her parent is a Korean national, is entitled to ROK
