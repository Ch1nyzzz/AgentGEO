lass="footnote" content-id="fn70" data-dcnode-id="2090"><span class="fn" data-dcnode-id="2091"><span class="label fn-label" data-dcnode-id="2107"><span class="end-note-link" data-dcnode-id="2108" data-fn-id="fn70" rel="nofollow"><span data-dcnode-id="2109" instrument_node="">70</span></span></span><div class="footnote-content" data-dcnode-id="2092"><p class="footnote-compatibility" data-dcnode-id="2093"><span data-dcnode-id="2106" instrument_node="">Human Rights Watch, </span><em data-dcnode-id="2101"><span data-dcnode-id="2105" instrument_node="">North Korea: Human Rights Concerns for the 61</span><sup data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">st</span></sup><span data-dcnode-id="2102" instrument_node=""> Session of the U.N. Commission</span></em><span data-dcnode-id="2100" instrument_node=""> (2005) available at hrw.org/english/docs/2005/04/04/nkorea10410_txt.htm (21 July 2005); Human Rights Watch, ‘North Korea: Allow Access for U.N. Rights Monitor’, above n. 55; Human Rights Watch, </span><em data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">Human Rights in North Korea</span></em><span data-dcnode-id="2097" instrument_node="">, above n. 2; Human Rights Watch, ‘China: Protect North Korean Refugees’, above n. 51. This is evident by the imposition of the death penalty during food shortages when the motive for the illegal departure has been solely in search of food: Human Rights Watch, </span><em data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Human Rights in North Korea</span></em><span data-dcnode-id="2094" instrument_node="">, above n. 2.</span></p></div></span></div><div class="footnote" content-id="fn71" data-dcnode-id="2079"><span class="fn" data-dcnode-id="2080"><span class="label fn-label" data-dcnode-id="2087"><span class="end-note-link" data-dcnode-id="2088" data-fn-id="fn71" rel="nofollow"><span data-dcnode-id="2089" instrument_node="">71</span></span></span><div class="footnote-content" data-dcnode-id="2081"><p class="footnote-compatibility" data-dcnode-id="2082"><span data-dcnode-id="2086" instrument_node="">OHCR, </span><em data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Refugee Handbook</span></em><span data-dcnode-id="2083" instrument_node="">, above n. 60, para. 85.</span></p></div></span></div><div class="footnote" content-id="fn72" data-dcnode-id="2071"><span class="fn" data-dcnode-id="2072"><span class="label fn-label" data-dcnode-id="2076"><span class="end-note-link" data-dcnode-id="2077" data-fn-id="fn72" rel="nofollow"><span data-dcnode-id="2078" instrument_node="">72</span></span></span><div class="footnote-content" data-dcnode-id="2073"><p class="footnote-compatibility" data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Available sources seem to suggest that, with the exception of crackdown periods where border security is tightened, both the PRC and the DPRK authorities seem to tolerate the ‘back and forth movement’ across the border where they believe that the reason for the movement to be purely in order to obtain food: Charny, above n. 34, 3.</span></p></div></span></div><div class="footnote" content-id="fn73" data-dcnode-id="2057"><span class="fn" data-dcnode-id="2058"><span class="label fn-label" data-dcnode-id="2068"><span class="end-note-link" data-dcnode-id="2069" data-fn-id="fn73" rel="nofollow"><span data-dcnode-id="2070" instrument_node="">73</span></span></span><div class="footnote-content" data-dcnode-id="2059"><p class="footnote-compatibility" data-dcnode-id="2060"><span data-dcnode-id="2067" instrument_node="">Amnesty International, </span><em data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="2064" instrument_node="">, above n. 3, 35; see also, Lord Bishop of Edmundsbury and Ipswich, </span><em data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Hansard Volume (House of Lords Debates)</span></em><span data-dcnode-id="2061" instrument_node="">, House of Lords vol. 660(70) (21 Apr. 2004), Column 303; Hawk, above n. 2, 25.</span></p></div></span></div><div class="footnote" content-id="fn74" data-dcnode-id="2046"><span class="fn" data-dcnode-id="2047"><span class="label fn-label" data-dcnode-id="2054"><span class="end-note-link" data-dcnode-id="2055" data-fn-id="fn74" rel="nofollow"><span data-dcnode-id="2056" instrument_node="">74</span></span></span><div class="footnote-content" data-dcnode-id="2048"><p class="footnote-compatibility" data-dcnode-id="2049"><span data-dcnode-id="2053" instrument_node="">OHCR, </span><em data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Refugee Handbook</span></em><span data-dcnode-id="2050" instrument_node="">, above n. 60, para. 94.</span></p></div></span></div><div class="footnote" content-id="fn75" data-dcnode-id="2038"><span class="fn" data-dcnode-id="2039"><span class="label fn-label" data-dcnode-id="2043"><span class="end-note-link" data-dcnode-id="2044" data-fn-id="fn75" rel="nofollow"><span data-dcnode-id="2045" instrument_node="">75</span></span></span><div class="footnote-content" data-dcnode-id="2040"><p class="footnote-compatibility" data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Ibid., para. 96.</span></p></div></span></div><div class="footnote" content-id="fn76" data-dcnode-id="2030"><span class="fn" data-dcnode-id="2031"><span class="label fn-label" data-dcnode-id="2035"><span class="end-note-link" data-dcnode-id="2036" data-fn-id="fn76" rel="nofollow"><span data-dcnode-id="2037" instrument_node="">76</span></span></span><div class="footnote-content" data-dcnode-id="2032"><p class="footnote-compatibility" data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Art. 1A(2) Refugee Convention.</span></p></div></span></div><div class="footnote" content-id="fn77" data-dcnode-id="2016"><span class="fn" data-dcnode-id="2017"><span class="label fn-label" data-dcnode-id="2027"><span class="end-note-link" data-dcnode-id="2028" data-fn-id="fn77" rel="nofollow"><span data-dcnode-id="2029" instrument_node="">77</span></span></span><div class="footnote-content" data-dcnode-id="2018"><p class="footnote-compatibility" data-dcnode-id="2019"><span data-dcnode-id="2026" instrument_node="">Nevertheless, it must be acknowledged that the Special Rapporteur notes in his report that information received in late 2004 indicates that revision of the DPRK Criminal Code has led to a reduction in the penalties for leaving a country for non-political reasons to a pardon such as, leaving for greater employment opportunities in neighbouring countries (Muntarbhorn, above n. 23, 38); in its Concluding Observations, the UN Human Rights Committee makes note of ‘the reduction of the number of carrying the death penalty from 33 to 5’: UN Human Rights Committee, </span><em data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Concluding Observations and Recommendations of the Human Rights Committee: Democratic People's Republic of Korea</span></em><span data-dcnode-id="2023" instrument_node=""> UN Doc CCPR/CO/72/PRC (2001), para. 4. At the time this paper was written, confirmation and verification of the alleged reforms to the Criminal Code which reduced penalties for those leaving the country illegally purely for economic reasons were not available to the general public. Provided this evidence is credible and verifiable, it may be necessary to re-examine the case for refugees </span><em data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">sur place</span></em><span data-dcnode-id="2020" instrument_node="">. However, as is commonly the problem in the DPRK, the challenge is implementation rather than legislation.</span></p></div></span></div><div class="footnote" content-id="fn78" data-dcnode-id="2008"><span class="fn" data-dcnode-id="2009"><span class="label fn-label" data-dcnode-id="2013"><span class="end-note-link" data-dcnode-id="2014" data-fn-id="fn78" rel="nofollow"><span data-dcnode-id="2015" instrument_node="">78</span></span></span><div class="footnote-content" data-dcnode-id="2010"><p class="footnote-compatibility" data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Art. 4 ICCPR.</span></p></div></span></div><div class="footnote" content-id="fn79" data-dcnode-id="1997"><span class="fn" data-dcnode-id="1998"><span class="label fn-label" data-dcnode-id="2005"><span class="end-note-link" data-dcnode-id="2006" data-fn-id="fn79" rel="nofollow"><span data-dcnode-id="2007" instrument_node="">79</span></span></span><div class="footnote-content" data-dcnode-id="1999"><p class="footnote-compatibility" data-dcnode-id="2000"><span data-dcnode-id="2004" instrument_node="">UN Human Rights Committee, </span><em data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">Concluding Observations of the Human Rights Committee: Democratic People's Republic of Korea</span></em><span data-dcnode-id="2001" instrument_node=""> UN Doc CCPR/CO/72/PRK (2001), para. 12.</span></p></div></span></div><div class="footnote" content-id="fn80" data-dcnode-id="1986"><span class="fn" data-dcnode-id="1987"><span class="label fn-label" data-dcnode-id="1994"><span class="end-note-link" data-dcnode-id="1995" data-fn-id="fn80" rel="nofollow"><span data-dcnode-id="1996" instrument_node="">80</span></span></span><div class="footnote-content" data-dcnode-id="1988"><p class="footnote-compatibility" data-dcnode-id="1989"><span data-dcnode-id="1993" instrument_node="">‘There is no universally accepted definition of “persecution”, and various attempts to formulate such a definition have met with little success. From Art. 33 of the Convention, it may be inferred that a threat to life or freedom on account of race, religion, nationality, political opinion or membership of a particular social group is always persecution. Other serious violations of human rights – for the same reasons – would also constitute persecution’: OHCR, </span><em data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Refugee Handbook</span></em><span data-dcnode-id="1990" instrument_node="">, above n. 60, para. 51.</span></p></div></span></div><div class="footnote" content-id="fn81" data-dcnode-id="1978"><span class="fn" data-dcnode-id="1979"><span class="label fn-label" data-dcnode-id="1983"><span class="end-note-link" data-dcnode-id="1984" data-fn-id="fn81" rel="nofollow"><span data-dcnode-id="1985" instrument_node="">81</span></span></span><div class="footnote-content" data-dcnode-id="1980"><p class="footnote-compatibility" data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Ibid., para. 64.</span></p></div></span></div><div class="footnote" content-id="fn82" data-dcnode-id="1970"><span class="fn" data-dcnode-id="1971"><span class="label fn-label" data-dcnode-id="1975"><span class="end-note-link" data-dcnode-id="1976" data-fn-id="fn82" rel="nofollow"><span data-dcnode-id="1977" instrument_node="">82</span></span></span><div class="footnote-content" data-dcnode-id="1972"><p class="footnote-compatibility" data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">Ibid., para. 63.</span></p></div></span></div><div class="footnote" content-id="fn83" data-dcnode-id="1959"><span class="fn" data-dcnode-id="1960"><span class="label fn-label" data-dcnode-id="1967"><span class="end-note-link" data-dcnode-id="1968" data-fn-id="fn83" rel="nofollow"><span data-dcnode-id="1969" instrument_node="">83</span></span></span><div class="footnote-content" data-dcnode-id="1961"><p class="footnote-compatibility" data-dcnode-id="1962"><span data-dcnode-id="1966" instrument_node="">See further, Amnesty International, </span><em data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="1963" instrument_node="">, above n. 3, 8-9.</span></p></div></span></div><div class="footnote" content-id="fn84" data-dcnode-id="1945"><span class="fn" data-dcnode-id="1946"><span class="label fn-label" data-dcnode-id="1956"><span class="end-note-link" data-dcnode-id="1957" data-fn-id="fn84" rel="nofollow"><span data-dcnode-id="1958" instrument_node="">84</span></span></span><div class="footnote-content" data-dcnode-id="1947"><p class="footnote-compatibility" data-dcnode-id="1948"><span data-dcnode-id="1955" instrument_node="">Those who are descendents of persons who cooperated with the Japanese during their occupation in Korea or who are related to persons who have escaped to the ROK are considered to be in the ‘hostile’ class. This group of persons will be the first to be excluded from the public food distribution system when there is a general food shortage and hence, are more vulnerable to starvation: Human Rights Watch, </span><em data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">The Invisible Exodus</span></em><span data-dcnode-id="1952" instrument_node="">, above n. 6, 19-20; see also, Amnesty International, </span><em data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="1949" instrument_node="">, above n. 3, 14; Malinowski, above n. 9.</span></p></div></span></div><div class="footnote" content-id="fn85" data-dcnode-id="1931"><span class="fn" data-dcnode-id="1932"><span class="label fn-label" data-dcnode-id="1942"><span class="end-note-link" data-dcnode-id="1943" data-fn-id="fn85" rel="nofollow"><span data-dcnode-id="1944" instrument_node="">85</span></span></span><div class="footnote-content" data-dcnode-id="1933"><p class="footnote-compatibility" data-dcnode-id="1934"><span data-dcnode-id="1941" instrument_node="">Seymour, above n. 2, 8; Amnesty International, </span><em data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="1938" instrument_node="">, above n. 3, 8; prior to the famine, some 60 percent of the total population of the DPRK relied on the PDS for a daily allowance of 700 grams per day, however, during the famine, the PDS was only able to support some six percent of the population: Amnesty International, </span><em data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="1935" instrument_node="">, above n. 3, 13-16.</span></p></div></span></div><div class="footnote" content-id="fn86" data-dcnode-id="1920"><span class="fn" data-dcnode-id="1921"><span class="label fn-label" data-dcnode-id="1928"><span class="end-note-link" data-dcnode-id="1929" data-fn-id="fn86" rel="nofollow"><span data-dcnode-id="1930" instrument_node="">86</span></span></span><div class="footnote-content" data-dcnode-id="1922"><p class="footnote-compatibility" data-dcnode-id="1923"><span data-dcnode-id="1927" instrument_node="">Amnesty International, </span><em data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="1924" instrument_node="">, above n. 3, 18-19.</span></p></div></span></div><div class="footnote" content-id="fn87" data-dcnode-id="1912"><span class="fn" data-dcnode-id="1913"><span class="label fn-label" data-dcnode-id="1917"><span class="end-note-link" data-dcnode-id="1918" data-fn-id="fn87" rel="nofollow"><span data-dcnode-id="1919" instrument_node="">87</span></span></span><div class="footnote-content" data-dcnode-id="1914"><p class="footnote-compatibility" data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Ibid., 13.</span></p></div></span></div><div class="footnote" content-id="fn88" data-dcnode-id="1901"><span class="fn" data-dcnode-id="1902"><span class="label fn-label" data-dcnode-id="1909"><span class="end-note-link" data-dcnode-id="1910" data-fn-id="fn88" rel="nofollow"><span data-dcnode-id="1911" instrument_node="">88</span></span></span><div class="footnote-content" data-dcnode-id="1903"><p class="footnote-compatibility" data-dcnode-id="1904"><span data-dcnode-id="1908" instrument_node="">Human Rights Watch, </span><em data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">The Invisible Exodus</span></em><span data-dcnode-id="1905" instrument_node="">, above n. 6, 19.</span></p></div></span></div><div class="footnote" content-id="fn89" data-dcnode-id="1893"><span class="fn" data-dcnode-id="1894"><span class="label fn-label" data-dcnode-id="1898"><span class="end-note-link" data-dcnode-id="1899" data-fn-id="fn89" rel="nofollow"><span data-dcnode-id="1900" instrument_node="">89</span></span></span><div class="footnote-content" data-dcnode-id="1895"><p class="footnote-compatibility" data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Ibid., 20.</span></p></div></span></div><div class="footnote" content-id="fn90" data-dcnode-id="1885"><span class="fn" data-dcnode-id="1886"><span class="label fn-label" data-dcnode-id="1890"><span class="end-note-link" data-dcnode-id="1891" data-fn-id="fn90" rel="nofollow"><span data-dcnode-id="1892" instrument_node="">90</span></span></span><div class="footnote-content" data-dcnode-id="1887"><p class="footnote-compatibility" data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Malinowski, above n. 9.</span></p></div></span></div><div class="footnote" content-id="fn91" data-dcnode-id="1871"><span class="fn" data-dcnode-id="1872"><span class="label fn-label" data-dcnode-id="1882"><span class="end-note-link" data-dcnode-id="1883" data-fn-id="fn91" rel="nofollow"><span data-dcnode-id="1884" instrument_node="">91</span></span></span><div class="footnote-content" data-dcnode-id="1873"><p class="footnote-compatibility" data-dcnode-id="1874"><span data-dcnode-id="1881" instrument_node="">Charny, above n. 34, 1, 4; see also, Benjamin Neaderland, ‘Quandary on the Yalu: International Law, Politics, and China's North Korean Refugee Crisis’ (2004) 40 </span><em data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Stanford Journal of International Law</span></em><span data-dcnode-id="1878" instrument_node=""> 143, 145; Human Rights Watch, </span><em data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">The Invisible Exodus</span></em><span data-dcnode-id="1875" instrument_node="">, above n. 6, 2; Hyde, above n. 44, 15; Hawk, above n. 2, 12; Human Rights Watch, ‘China: Protect North Korean Refugees’, above n. 51; Malinowski, above n. 9.</span></p></div></span></div><div class="footnote" content-id="fn92" data-dcnode-id="1860"><span class="fn" data-dcnode-id="1861"><span class="label fn-label" data-dcnode-id="1868"><span class="end-note-link" data-dcnode-id="1869" data-fn-id="fn92" rel="nofollow"><span data-dcnode-id="1870" instrument_node="">92</span></span></span><div class="footnote-content" data-dcnode-id="1862"><p class="footnote-compatibility" data-dcnode-id="1863"><span data-dcnode-id="1867" instrument_node="">OHCR, </span><em data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">Refugee Handbook</span></em><span data-dcnode-id="1864" instrument_node="">, above n. 60, para. 106.</span></p></div></span></div><div class="footnote" content-id="fn93" data-dcnode-id="1852"><span class="fn" data-dcnode-id="1853"><span class="label fn-label" data-dcnode-id="1857"><span class="end-note-link" data-dcnode-id="1858" data-fn-id="fn93" rel="nofollow"><span data-dcnode-id="1859" instrument_node="">93</span></span></span><div class="footnote-content" data-dcnode-id="1854"><p class="footnote-compatibility" data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Protection of North Korean Residents and Support of their Settlement Act (ROK), Law Number 6474, partial revision, 24 May 2001.</span></p></div></span></div><div class="footnote" content-id="fn94" data-dcnode-id="1844"><span class="fn" data-dcnode-id="1845"><span class="label fn-label" data-dcnode-id="1849"><span class="end-note-link" data-dcnode-id="1850" data-fn-id="fn94" rel="nofollow"><span data-dcnode-id="1851" instrument_node="">94</span></span></span><div class="footnote-content" data-dcnode-id="1846"><p class="footnote-compatibility" data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Constitution of the Republic of Korea, adopted on 17 July 1948.</span></p></div></span></div><div class="footnote" content-id="fn95" data-dcnode-id="1836"><span class="fn" data-dcnode-id="1837"><span class="label fn-label" data-dcnode-id="1841"><span class="end-note-link" data-dcnode-id="1842" data-fn-id="fn95" rel="nofollow"><span data-dcnode-id="1843" instrument_node="">95</span></span></span><div class="footnote-content" data-dcnode-id="1838"><p class="footnote-compatibility" data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Art. 2 Nationality Act (ROK).</span></p></div></span></div><div class="footnote" content-id="fn96" data-dcnode-id="1828"><span class="fn" data-dcnode-id="1829"><span class="label fn-label" data-dcnode-id="1833"><span class="end-note-link" data-dcnode-id="1834" data-fn-id="fn96" rel="nofollow"><span data-dcnode-id="1835" instrument_node="">96</span></span></span><div class="footnote-content" data-dcnode-id="1830"><p class="footnote-compatibility" data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">While DPRK defectors are supposedly granted automatic ROK citizenship, Art. 3 of the Settlement Act (ROK) states that the Act shall only ‘apply to residents escaping from North Korea who have expressed their intention to be protected by the Republic of Korea’, the practical implications of which, remain unclear.</span></p></div></span></div><div class="footnote" content-id="fn97" data-dcnode-id="1817"><span class="fn" data-dcnode-id="1818"><span class="label fn-label" data-dcnode-id="1825"><span class="end-note-link" data-dcnode-id="1826" data-fn-id="fn97" rel="nofollow"><span data-dcnode-id="1827" instrument_node="">97</span></span></span><div class="footnote-content" data-dcnode-id="1819"><p class="footnote-compatibility" data-dcnode-id="1820"><span data-dcnode-id="1824" instrument_node="">RRT Reference: N03/47934 (19 Feb. 2004) see, summary section; see Art. 7 Settlement Act (ROK) as cited in Human Rights Watch, </span><em data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">The Invisible Exodus</span></em><span data-dcnode-id="1821" instrument_node="">, above n. 6, 30-31.</span></p></div></span></div><div class="footnote" content-id="fn98" data-dcnode-id="1809"><span class="fn" data-dcnode-id="1810"><span class="label fn-label" data-dcnode-id="1814"><span class="end-note-link" data-dcnode-id="1815" data-fn-id="fn98" rel="nofollow"><span data-dcnode-id="1816" instrument_node="">98</span></span></span><div class="footnote-content" data-dcnode-id="1811"><p class="footnote-compatibility" data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">RRT Reference: N03/47934 (19 Feb. 2004) see, summary section.</span></p></div></span></div><div class="footnote" content-id="fn99" data-dcnode-id="1798"><span class="fn" data-dcnode-id="1799"><span class="label fn-label" data-dcnode-id="1806"><span class="end-note-link" data-dcnode-id="1807" data-fn-id="fn99" rel="nofollow"><span data-dcnode-id="1808" instrument_node="">99</span></span></span><div class="footnote-content" data-dcnode-id="1800"><p class="footnote-compatibility" data-dcnode-id="1801"><span data-dcnode-id="1805" instrument_node="">Ibid., para. 3, section entitled, ‘End of Summary’; see also, Human Rights Watch, </span><em data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">The Invisible Exodus</span></em><span data-dcnode-id="1802" instrument_node="">, above n. 6, 31.</span></p></div></span></div><div class="footnote" content-id="fn100" data-dcnode-id="1787"><span class="fn" data-dcnode-id="1788"><span class="label fn-label" data-dcnode-id="1795"><span class="end-note-link" data-dcnode-id="1796" data-fn-id="fn100" rel="nofollow"><span data-dcnode-id="1797" instrument_node="">100</span></span></span><div class="footnote-content" data-dcnode-id="1789"><p class="footnote-compatibility" data-dcnode-id="1790"><span data-dcnode-id="1794" instrument_node="">OHCR, </span><em data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Refugee Handbook</span></em><span data-dcnode-id="1791" instrument_node="">, above n. 60, para. 107.</span></p></div></span></div><div class="footnote" content-id="fn101" data-dcnode-id="1776"><span class="fn" data-dcnode-id="1777"><span class="label fn-label" data-dcnode-id="1784"><span class="end-note-link" data-dcnode-id="1785" data-fn-id="fn101" rel="nofollow"><span data-dcnode-id="1786" instrument_node="">101</span></span></span><div class="footnote-content" data-dcnode-id="1778"><p class="footnote-compatibility" data-dcnode-id="1779"><span data-dcnode-id="1783" instrument_node="">UNHCR provides that ‘[b]eing unable to avail himself of such protection implies circumstances that are beyond the will of the person concerned. There may, e.g., be a state of war, civil war or other grave disturbance, which prevents the country of nationality from extending protection or makes such protection ineffective […]’: OHCR, </span><em data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">Refugee Handbook</span></em><span data-dcnode-id="1780" instrument_node="">, above n. 60, para. 98; the heavily guarded consulate of the ROK – or any other foreign consulate or embassy for that matter – by Chinese authorities heavily restricts access to North Korean asylum seekers and effectively denies them of any diplomatic protection; such actions on the part of the Government of the PRC may well amount to a ‘grave disturbance’.</span></p></div></span></div><div class="footnote" content-id="fn102" data-dcnode-id="1765"><span class="fn" data-dcnode-id="1766"><span class="label fn-label" data-dcnode-id="1773"><span class="end-note-link" data-dcnode-id="1774" data-fn-id="fn102" rel="nofollow"><span data-dcnode-id="1775" instrument_node="">102</span></span></span><div class="footnote-content" data-dcnode-id="1767"><p class="footnote-compatibility" data-dcnode-id="1768"><span data-dcnode-id="1772" instrument_node="">Human Rights Watch, ‘China: Protect North Korean Refugees’, above n. 51; in its annual international report in 2002, see also, Amnesty International, </span><em data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Report 2003</span></em><span data-dcnode-id="1769" instrument_node="">, above n. 22.</span></p></div></span></div><div class="footnote" content-id="fn103" data-dcnode-id="1757"><span class="fn" data-dcnode-id="1758"><span class="label fn-label" data-dcnode-id="1762"><span class="end-note-link" data-dcnode-id="1763" data-fn-id="fn103" rel="nofollow"><span data-dcnode-id="1764" instrument_node="">103</span></span></span><div class="footnote-content" data-dcnode-id="1759"><p class="footnote-compatibility" data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Convention against Torture and Other Cruel, Inhuman or Degrading Treatment or Punishment, 1465 UNTS 85.</span></p></div></span></div><div class="footnote" content-id="fn104" data-dcnode-id="1749"><span class="fn" data-dcnode-id="1750"><span class="label fn-label" data-dcnode-id="1754"><span class="end-note-link" data-dcnode-id="1755" data-fn-id="fn104" rel="nofollow"><span data-dcnode-id="1756" instrument_node="">104</span></span></span><div class="footnote-content" data-dcnode-id="1751"><p class="footnote-compatibility" data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Ibid., Art. 3(1).</span></p></div></span></div><div class="footnote" content-id="fn105" data-dcnode-id="1741"><span class="fn" data-dcnode-id="1742"><span class="label fn-label" data-dcnode-id="1746"><span class="end-note-link" data-dcnode-id="1747" data-fn-id="fn105" rel="nofollow"><span data-dcnode-id="1748" instrument_node="">105</span></span></span><div class="footnote-content" data-dcnode-id="1743"><p class="footnote-compatibility" data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Art. 7 ICCPR states that, ‘[n]o one shall be subjected to torture or to cruel, inhuman or degrading treatment or punishment’.</span></p></div></span></div><div class="footnote" content-id="fn106" data-dcnode-id="1715"><span class="fn" data-dcnode-id="1716"><span class="label fn-label" data-dcnode-id="1738"><span class="end-note-link" data-dcnode-id="1739" data-fn-id="fn106" rel="nofollow"><span data-dcnode-id="1740" instrument_node="">106</span></span></span><div class="footnote-content" data-dcnode-id="1717"><p class="footnote-compatibility" data-dcnode-id="1718"><span data-dcnode-id="1737" instrument_node="">UN Human Rights Committee, </span><em data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">General Comment No 20: Replaces General Comment 7 Concerning Prohibition of Torture and Cruel Treatment or Punishment (Art. 7)</span></em><span data-dcnode-id="1734" instrument_node=""> (1992) para. 9, </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="1732" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhchr.ch/tbs/doc.nsf/%28Symbol%29/6924291970754969c12563ed004c8ae5%3FOpendocument" target="_blank"><span data-dcnode-id="1733" instrument_node="">www.unhchr.ch/tbs/doc.nsf/(Symbol)/6924291970754969c12563ed004c8ae5?Opendocument</span></a><span data-dcnode-id="1731" instrument_node=""> (21 July 2005); however, unlike the </span><em data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">non-refoulement</span></em><span data-dcnode-id="1728" instrument_node=""> provision in the 1951 Convention, the prohibition of the </span><em data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">refoulement</span></em><span data-dcnode-id="1725" instrument_node=""> under the Convention against Torture is absolute; it is not dependent on satisfying the persecution threshold. Moreover, it does not exclude persons who have committed a ‘serious crime’ or are seen as a threat to the community: OHCR, </span><em data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Refugee Protection</span></em><span data-dcnode-id="1722" instrument_node="">, above n. 60, 18; indeed, in its General Comment, the UN Human Rights Committee stated that: ‘The text of article 7 allows of no limitation. The Committee also reaffirms that, even in situations of public emergency such as those referred to in article 4 of the Covenant, no derogation from the provision of article 7 is allowed and its provisions must remain in force. The Committee likewise observes that no justification or extenuating circumstances may be invoked to excuse a violation of article 7 for any reasons, including those based on an order from a superior officer or public authority’: </span><em data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">General Comment No. 20</span></em><span data-dcnode-id="1719" instrument_node="">, para. 3.</span></p></div></span></div><div class="footnote" content-id="fn107" data-dcnode-id="1704"><span class="fn" data-dcnode-id="1705"><span class="label fn-label" data-dcnode-id="1712"><span class="end-note-link" data-dcnode-id="1713" data-fn-id="fn107" rel="nofollow"><span data-dcnode-id="1714" instrument_node="">107</span></span></span><div class="footnote-content" data-dcnode-id="1706"><p class="footnote-compatibility" data-dcnode-id="1707"><span data-dcnode-id="1711" instrument_node="">Human Rights Watch, ‘North Korea: Allow Access for U.N. Rights Monitor’, above n. 55; OHCR, </span><em data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Refugee Protection</span></em><span data-dcnode-id="1708" instrument_node="">, above n. 60, 126.</span></p></div></span></div><div class="footnote" content-id="fn108" data-dcnode-id="1696"><span class="fn" data-dcnode-id="1697"><span class="label fn-label" data-dcnode-id="1701"><span class="end-note-link" data-dcnode-id="1702" data-fn-id="fn108" rel="nofollow"><span data-dcnode-id="1703" instrument_node="">108</span></span></span><div class="footnote-content" data-dcnode-id="1698"><p class="footnote-compatibility" data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">75 UNTS 287.</span></p></div></span></div><div class="footnote" content-id="fn109" data-dcnode-id="1685"><span class="fn" data-dcnode-id="1686"><span class="label fn-label" data-dcnode-id="1693"><span class="end-note-link" data-dcnode-id="1694" data-fn-id="fn109" rel="nofollow"><span data-dcnode-id="1695" instrument_node="">109</span></span></span><div class="footnote-content" data-dcnode-id="1687"><p class="footnote-compatibility" data-dcnode-id="1688"><span data-dcnode-id="1692" instrument_node="">UN General Assembly, </span><em data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Declaration on the Protection of all Persons from Enforced Disappearance</span></em><span data-dcnode-id="1689" instrument_node="">, UN Doc A/RES/47/133 (18 Dec. 1992) Art. 8 para. 1 states that: ‘No State shall expel, return (refouler) or extradite a person to another State where there are substantial grounds to believe that he would be in danger of enforced disappearance’.</span></p></div></span></div><div class="footnote" content-id="fn110" data-dcnode-id="1671"><span class="fn" data-dcnode-id="1672"><span class="label fn-label" data-dcnode-id="1682"><span class="end-note-link" data-dcnode-id="1683" data-fn-id="fn110" rel="nofollow"><span data-dcnode-id="1684" instrument_node="">110</span></span></span><div class="footnote-content" data-dcnode-id="1673"><p class="footnote-compatibility" data-dcnode-id="1674"><span data-dcnode-id="1681" instrument_node="">Office of the High Commissioner of Human Rights (OHCHR), </span><em data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Principles on the Effective Prevention and Investigation of Extra-legal, Arbitrary and Summary Executions</span></em><span data-dcnode-id="1678" instrument_node="">, Recommended by Economic and Social Council resolution 1989/65 of 24 May 1989, available at </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="1676" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhchr.ch/html/menu3/b/54.htm" target="_blank"><span data-dcnode-id="1677" instrument_node="">www.unhchr.ch/html/menu3/b/54.htm</span></a><span data-dcnode-id="1675" instrument_node=""> (21 July 2005). Principle 5 states that: ‘No one shall be involuntarily returned or extradited to a country where there are substantial grounds for believing that he or she may become a victim of extra-legal, arbitrary or summary execution in that country’.</span></p></div></span></div><div class="footnote" content-id="fn111" data-dcnode-id="1648"><span class="fn" data-dcnode-id="1649"><span class="label fn-label" data-dcnode-id="1668"><span class="end-note-link" data-dcnode-id="1669" data-fn-id="fn111" rel="nofollow"><span data-dcnode-id="1670" instrument_node="">111</span></span></span><div class="footnote-content" data-dcnode-id="1650"><p class="footnote-compatibility" data-dcnode-id="1651"><span data-dcnode-id="1667" instrument_node="">OHCR, </span><em data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Refugee Protection</span></em><span data-dcnode-id="1664" instrument_node="">, above n. 60, 14; note that the principle is also enshrined in other regional instruments in varying forms which will not be discussed in detail in this paper; for more information, see, Art. 3(3) of the 1966 Principles Concerning Treatment of Refugees adopted by the Asian-African Legal Consultative Committee (AALCC), Art. 3 of the 1967 Declaration on Territorial Asylum, Art. 2(3) of the 1969 Organization of African Unity (OAU) Convention Governing the Specific Aspects of Refugee Problems in Africa, Art. 22(8) of the 1969 American Convention on Human Rights and para. 5 of Section III of the 1984 Cartagena Declaration; for a detailed discussion on the scope and application of the principle of </span><em data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">non-refoulement</span></em><span data-dcnode-id="1661" instrument_node="">, see, Elihu Lauterpacht &amp; Daniel Bethlehem, ‘The Scope and Content of the Principle of </span><em data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Non-Refoulement</span></em><span data-dcnode-id="1658" instrument_node="">: Opinion’, in Erika Feller </span><em data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">et al</span></em><span data-dcnode-id="1655" instrument_node=""> (eds.), </span><em data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">UNHCR, Refugee Protection in International Law: UNHCR's Global Consultations on International Protection</span></em><span data-dcnode-id="1652" instrument_node=""> (2003), 87-177.</span></p></div></span></div><div class="footnote" content-id="fn112" data-dcnode-id="1640"><span class="fn" data-dcnode-id="1641"><span class="label fn-label" data-dcnode-id="1645"><span class="end-note-link" data-dcnode-id="1646" data-fn-id="fn112" rel="nofollow"><span data-dcnode-id="1647" instrument_node="">112</span></span></span><div class="footnote-content" data-dcnode-id="1642"><p class="footnote-compatibility" data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">See, Muntarbhorn, above n. 23, 11, 14.</span></p></div></span></div><div class="footnote" content-id="fn113" data-dcnode-id="1632"><span class="fn" data-dcnode-id="1633"><span class="label fn-label" data-dcnode-id="1637"><span class="end-note-link" data-dcnode-id="1638" data-fn-id="fn113" rel="nofollow"><span data-dcnode-id="1639" instrument_node="">113</span></span></span><div class="footnote-content" data-dcnode-id="1634"><p class="footnote-compatibility" data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Ibid., 14.</span></p></div></span></div><div class="footnote" content-id="fn114" data-dcnode-id="1624"><span class="fn" data-dcnode-id="1625"><span class="label fn-label" data-dcnode-id="1629"><span class="end-note-link" data-dcnode-id="1630" data-fn-id="fn114" rel="nofollow"><span data-dcnode-id="1631" instrument_node="">114</span></span></span><div class="footnote-content" data-dcnode-id="1626"><p class="footnote-compatibility" data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Art. 35(1) Refugee Convention. Art. 2(1) Refugee Protocol places an obligation on State parties to cooperate with the UNHCR in the ‘exercise of its functions’ and, in particular, its supervisory role.</span></p></div></span></div><div class="footnote" content-id="fn115" data-dcnode-id="1613"><span class="fn" data-dcnode-id="1614"><span class="label fn-label" data-dcnode-id="1621"><span class="end-note-link" data-dcnode-id="1622" data-fn-id="fn115" rel="nofollow"><span data-dcnode-id="1623" instrument_node="">115</span></span></span><div class="footnote-content" data-dcnode-id="1615"><p class="footnote-compatibility" data-dcnode-id="1616"><span data-dcnode-id="1620" instrument_node="">On 1 Dec. 1995, the PRC and UNHCR entered into a bilateral agreement, upgrading its presence in the PRC from a mission to a branch office; the primary purpose of the office is to provide international protection to refugees in the PRC (Arts. II and III(1)); Art. III(5) provides that the staff of UNHCR are ‘may at all times have unimpeded access to refugees and to the sites of UNHCR projects in order to monitor all phases of their implementation’; moreover, in the case of an unresolved dispute, Art. XVI, the UNHCR may invoke a binding arbitration: </span><em data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Agreement on the Upgrading of the UNHCR Mission in the People's Republic of China</span></em><span data-dcnode-id="1617" instrument_node=""> (1995) No 32371 between the United Nations High Commissioner for Refugees and China.</span></p></div></span></div><div class="footnote" content-id="fn116" data-dcnode-id="1602"><span class="fn" data-dcnode-id="1603"><span class="label fn-label" data-dcnode-id="1610"><span class="end-note-link" data-dcnode-id="1611" data-fn-id="fn116" rel="nofollow"><span data-dcnode-id="1612" instrument_node="">116</span></span></span><div class="footnote-content" data-dcnode-id="1604"><p class="footnote-compatibility" data-dcnode-id="1605"><span data-dcnode-id="1609" instrument_node="">Lord Hylton</span><em data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">, Hansard Volume (House of Lords Debates)</span></em><span data-dcnode-id="1606" instrument_node="">, House of Lords vol. 660(70) (21 Apr. 2004), Column 304.</span></p></div></span></div><div class="footnote" content-id="fn117" data-dcnode-id="1594"><span class="fn" data-dcnode-id="1595"><span class="label fn-label" data-dcnode-id="1599"><span class="end-note-link" data-dcnode-id="1600" data-fn-id="fn117" rel="nofollow"><span data-dcnode-id="1601" instrument_node="">117</span></span></span><div class="footnote-content" data-dcnode-id="1596"><p class="footnote-compatibility" data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">500 UNTS 95. The PRC ratified the Convention on 25 Nov. 1975.</span></p></div></span></div><div class="footnote" content-id="fn118" data-dcnode-id="1586"><span class="fn" data-dcnode-id="1587"><span class="label fn-label" data-dcnode-id="1591"><span class="end-note-link" data-dcnode-id="1592" data-fn-id="fn118" rel="nofollow"><span data-dcnode-id="1593" instrument_node="">118</span></span></span><div class="footnote-content" data-dcnode-id="1588"><p class="footnote-compatibility" data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">596 UNTS 261. The PRC ratified the Convention on 2 July 1979.</span></p></div></span></div><div class="footnote" content-id="fn119" data-dcnode-id="1575"><span class="fn" data-dcnode-id="1576"><span class="label fn-label" data-dcnode-id="1583"><span class="end-note-link" data-dcnode-id="1584" data-fn-id="fn119" rel="nofollow"><span data-dcnode-id="1585" instrument_node="">119</span></span></span><div class="footnote-content" data-dcnode-id="1577"><p class="footnote-compatibility" data-dcnode-id="1578"><span data-dcnode-id="1582" instrument_node="">In 2003, Amnesty International reported that some 100 North Korean refugees left the PRC for the ROK and other third countries after forcing entry into diplomatic compounds and foreign schools: Amnesty International, </span><em data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Report 2003</span></em><span data-dcnode-id="1579" instrument_node="">, above n. 22.</span></p></div></span></div><div class="footnote" content-id="fn120" data-dcnode-id="1564"><span class="fn" data-dcnode-id="1565"><span class="label fn-label" data-dcnode-id="1572"><span class="end-note-link" data-dcnode-id="1573" data-fn-id="fn120" rel="nofollow"><span data-dcnode-id="1574" instrument_node="">120</span></span></span><div class="footnote-content" data-dcnode-id="1566"><p class="footnote-compatibility" data-dcnode-id="1567"><span data-dcnode-id="1571" instrument_node="">E.g., five North Korean defectors sheltering within the Japanese consulate in the province of Shenyang, after negotiations between the Japanese and Chinese Governments, were allowed to leave the PRC for the ROK via the Philippines on 23 May 2002: Human Rights Watch, </span><em data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">The Invisible Exodus</span></em><span data-dcnode-id="1568" instrument_node="">, above n. 6, 35.</span></p></div></span></div><div class="footnote" content-id="fn121" data-dcnode-id="1550"><span class="fn" data-dcnode-id="1551"><span class="label fn-label" data-dcnode-id="1561"><span class="end-note-link" data-dcnode-id="1562" data-fn-id="fn121" rel="nofollow"><span data-dcnode-id="1563" instrument_node="">121</span></span></span><div class="footnote-content" data-dcnode-id="1552"><p class="footnote-compatibility" data-dcnode-id="1553"><span data-dcnode-id="1560" instrument_node="">Human Rights Watch, ‘China: Protect North Korean Refugees’, above n. 51. In its annual international report in 2002, Amnesty International reported that Chinese authorities had stepped up their home inspections and offered up to 2,000 Yuan (US $240) to Chinese citizens who could disclose the whereabouts of North Korean refugees: Amnesty International, </span><em data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Report 2002</span></em><span data-dcnode-id="1557" instrument_node="">, above n. 22; see also Amnesty International, </span><em data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Report 2003</span></em><span data-dcnode-id="1554" instrument_node="">, above n. 22.</span></p></div></span></div><div class="footnote" content-id="fn122" data-dcnode-id="1542"><span class="fn" data-dcnode-id="1543"><span class="label fn-label" data-dcnode-id="1547"><span class="end-note-link" data-dcnode-id="1548" data-fn-id="fn122" rel="nofollow"><span data-dcnode-id="1549" instrument_node="">122</span></span></span><div class="footnote-content" data-dcnode-id="1544"><p class="footnote-compatibility" data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">For more discussion on forced entries, see, Seymour, above n. 2, 22.</span></p></div></span></div><div class="footnote" content-id="fn123" data-dcnode-id="1531"><span class="fn" data-dcnode-id="1532"><span class="label fn-label" data-dcnode-id="1539"><span class="end-note-link" data-dcnode-id="1540" data-fn-id="fn123" rel="nofollow"><span data-dcnode-id="1541" instrument_node="">123</span></span></span><div class="footnote-content" data-dcnode-id="1533"><p class="footnote-compatibility" data-dcnode-id="1534"><span data-dcnode-id="1538" instrument_node="">Human Rights Watch, </span><em data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">The Invisible Exodus</span></em><span data-dcnode-id="1535" instrument_node="">, above n. 6, 28.</span></p></div></span></div><div class="footnote" content-id="fn124" data-dcnode-id="1523"><span class="fn" data-dcnode-id="1524"><span class="label fn-label" data-dcnode-id="1528"><span class="end-note-link" data-dcnode-id="1529" data-fn-id="fn124" rel="nofollow"><span data-dcnode-id="1530" instrument_node="">124</span></span></span><div class="footnote-content" data-dcnode-id="1525"><p class="footnote-compatibility" data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Art. 31(3) Convention on Consular Relations reads: ‘Subject to the provisions of paragraph 2 of this Article, the receiving State is under a special duty to take all appropriate steps to protect the consular premises against any intrusion or damage and to prevent any disturbance of the peace of the consular post or impairment of its dignity’.</span></p></div></span></div><div class="footnote" content-id="fn125" data-dcnode-id="1515"><span class="fn" data-dcnode-id="1516"><span class="label fn-label" data-dcnode-id="1520"><span class="end-note-link" data-dcnode-id="1521" data-fn-id="fn125" rel="nofollow"><span data-dcnode-id="1522" instrument_node="">125</span></span></span><div class="footnote-content" data-dcnode-id="1517"><p class="footnote-compatibility" data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Neaderland, above n. 91, 151.</span></p></div></span></div><div class="footnote" content-id="fn126" data-dcnode-id="1504"><span class="fn" data-dcnode-id="1505"><span class="label fn-label" data-dcnode-id="1512"><span class="end-note-link" data-dcnode-id="1513" data-fn-id="fn126" rel="nofollow"><span data-dcnode-id="1514" instrument_node="">126</span></span></span><div class="footnote-content" data-dcnode-id="1506"><p class="footnote-compatibility" ollow"><span data-dcnode-id="1297" instrument_node="">146</span></span></span><div class="footnote-content" data-dcnode-id="1289"><p class="footnote-compatibility" data-dcnode-id="1290"><span data-dcnode-id="1294" instrument_node="">Ibid., 16–17; Lord Alton of Liverpool, </span><em data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Hansard Volume (House of Lords Debates)</span></em><span data-dcnode-id="1291" instrument_node="">, House of Lords vol. 660(70) (21 Apr. 2004), Column 294.</span></p></div></span></div><div class="footnote" content-id="fn147" data-dcnode-id="1276"><span class="fn" data-dcnode-id="1277"><span class="label fn-label" data-dcnode-id="1284"><span class="end-note-link" data-dcnode-id="1285" data-fn-id="fn147" rel="nofollow"><span data-dcnode-id="1286" instrument_node="">147</span></span></span><div class="footnote-content" data-dcnode-id="1278"><p class="footnote-compatibility" data-dcnode-id="1279"><span data-dcnode-id="1283" instrument_node="">James Brooke, ‘North Korea in Russia Makes Bid for Asylum (16 Nov. 2004) </span><em data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">The New York Times</span></em><span data-dcnode-id="1280" instrument_node="">.</span></p></div></span></div><div class="footnote" content-id="fn148" data-dcnode-id="1265"><span class="fn" data-dcnode-id="1266"><span class="label fn-label" data-dcnode-id="1273"><span class="end-note-link" data-dcnode-id="1274" data-fn-id="fn148" rel="nofollow"><span data-dcnode-id="1275" instrument_node="">148</span></span></span><div class="footnote-content" data-dcnode-id="1267"><p class="footnote-compatibility" data-dcnode-id="1268"><span data-dcnode-id="1272" instrument_node="">More commonly termed the ‘Sunshine Policy’: Foster-Carter, above n. 4, 3; Human Rights Watch, </span><em data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">The Invisible Exodus</span></em><span data-dcnode-id="1269" instrument_node="">, above n. 6, 8.</span></p></div></span></div><div class="footnote" content-id="fn149" data-dcnode-id="1257"><span class="fn" data-dcnode-id="1258"><span class="label fn-label" data-dcnode-id="1262"><span class="end-note-link" data-dcnode-id="1263" data-fn-id="fn149" rel="nofollow"><span data-dcnode-id="1264" instrument_node="">149</span></span></span><div class="footnote-content" data-dcnode-id="1259"><p class="footnote-compatibility" data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">North Korean Human Rights Act, H.R. 4011 § 3(14) (2004).</span></p></div></span></div><div class="footnote" content-id="fn150" data-dcnode-id="1246"><span class="fn" data-dcnode-id="1247"><span class="label fn-label" data-dcnode-id="1254"><span class="end-note-link" data-dcnode-id="1255" data-fn-id="fn150" rel="nofollow"><span data-dcnode-id="1256" instrument_node="">150</span></span></span><div class="footnote-content" data-dcnode-id="1248"><p class="footnote-compatibility" data-dcnode-id="1249"><span data-dcnode-id="1253" instrument_node="">Amnesty International, </span><em data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Report 2004</span></em><span data-dcnode-id="1250" instrument_node="">, above n. 22; in 2003 alone, the ROK accepted some 1,040 DPRK defectors: Seymour, above n. 2, ii.</span></p></div></span></div><div class="footnote" content-id="fn151" data-dcnode-id="1235"><span class="fn" data-dcnode-id="1236"><span class="label fn-label" data-dcnode-id="1243"><span class="end-note-link" data-dcnode-id="1244" data-fn-id="fn151" rel="nofollow"><span data-dcnode-id="1245" instrument_node="">151</span></span></span><div class="footnote-content" data-dcnode-id="1237"><p class="footnote-compatibility" data-dcnode-id="1238"><span data-dcnode-id="1242" instrument_node="">Nevertheless, resettling into the ROK is often accompanied with a difficult transition – North Korean defectors resettled in the South often report of discrimination against their lack of education, occupational skills and accent: Human Rights Watch, </span><em data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">The Invisible Exodus</span></em><span data-dcnode-id="1239" instrument_node="">, above n. 6, 31–32; e.g., in a survey published by a South Korean newspaper in Sept. 2004, of the 100 North Koreans who were now living in the South and who were interviewed, 69 indicated that they would prefer to resettle in a Western country: Seymour, above n. 2, 26.</span></p></div></span></div><div class="footnote" content-id="fn152" data-dcnode-id="1227"><span class="fn" data-dcnode-id="1228"><span class="label fn-label" data-dcnode-id="1232"><span class="end-note-link" data-dcnode-id="1233" data-fn-id="fn152" rel="nofollow"><span data-dcnode-id="1234" instrument_node="">152</span></span></span><div class="footnote-content" data-dcnode-id="1229"><p class="footnote-compatibility" data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Hyde, above n. 44, 16.</span></p></div></span></div><div class="footnote" content-id="fn153" data-dcnode-id="1216"><span class="fn" data-dcnode-id="1217"><span class="label fn-label" data-dcnode-id="1224"><span class="end-note-link" data-dcnode-id="1225" data-fn-id="fn153" rel="nofollow"><span data-dcnode-id="1226" instrument_node="">153</span></span></span><div class="footnote-content" data-dcnode-id="1218"><p class="footnote-compatibility" data-dcnode-id="1219"><span data-dcnode-id="1223" instrument_node="">For more discussion on the policies adopted by the Government of the ROK towards North Korean defectors, see, Seymour, above n. 2, 25–26; Human Rights Watch, </span><em data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">The Invisible Exodus</span></em><span data-dcnode-id="1220" instrument_node="">, above n. 6, 30–32.</span></p></div></span></div><div class="footnote" content-id="fn154" data-dcnode-id="1205"><span class="fn" data-dcnode-id="1206"><span class="label fn-label" data-dcnode-id="1213"><span class="end-note-link" data-dcnode-id="1214" data-fn-id="fn154" rel="nofollow"><span data-dcnode-id="1215" instrument_node="">154</span></span></span><div class="footnote-content" data-dcnode-id="1207"><p class="footnote-compatibility" data-dcnode-id="1208"><span data-dcnode-id="1212" instrument_node="">Human Rights Watch, </span><em data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">The Invisible Exodus</span></em><span data-dcnode-id="1209" instrument_node="">, above n. 6, 28.</span></p></div></span></div><div class="footnote" content-id="fn155" data-dcnode-id="1197"><span class="fn" data-dcnode-id="1198"><span class="label fn-label" data-dcnode-id="1202"><span class="end-note-link" data-dcnode-id="1203" data-fn-id="fn155" rel="nofollow"><span data-dcnode-id="1204" instrument_node="">155</span></span></span><div class="footnote-content" data-dcnode-id="1199"><p class="footnote-compatibility" data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Ibid., 2, 3; Human Rights Watch, ‘China: Protect North Korean Refugees’, above n. 51.</span></p></div></span></div><div class="footnote" content-id="fn156" data-dcnode-id="1189"><span class="fn" data-dcnode-id="1190"><span class="label fn-label" data-dcnode-id="1194"><span class="end-note-link" data-dcnode-id="1195" data-fn-id="fn156" rel="nofollow"><span data-dcnode-id="1196" instrument_node="">156</span></span></span><div class="footnote-content" data-dcnode-id="1191"><p class="footnote-compatibility" data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Seymour, above n. 2, 19.</span></p></div></span></div><div class="footnote" content-id="fn157" data-dcnode-id="1181"><span class="fn" data-dcnode-id="1182"><span class="label fn-label" data-dcnode-id="1186"><span class="end-note-link" data-dcnode-id="1187" data-fn-id="fn157" rel="nofollow"><span data-dcnode-id="1188" instrument_node="">157</span></span></span><div class="footnote-content" data-dcnode-id="1183"><p class="footnote-compatibility" data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Ibid.</span></p></div></span></div><div class="footnote" content-id="fn158" data-dcnode-id="1173"><span class="fn" data-dcnode-id="1174"><span class="label fn-label" data-dcnode-id="1178"><span class="end-note-link" data-dcnode-id="1179" data-fn-id="fn158" rel="nofollow"><span data-dcnode-id="1180" instrument_node="">158</span></span></span><div class="footnote-content" data-dcnode-id="1175"><p class="footnote-compatibility" data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Muntarbhorn, above n. 23, 14.</span></p></div></span></div><div class="footnote" content-id="fn159" data-dcnode-id="1159"><span class="fn" data-dcnode-id="1160"><span class="label fn-label" data-dcnode-id="1170"><span class="end-note-link" data-dcnode-id="1171" data-fn-id="fn159" rel="nofollow"><span data-dcnode-id="1172" instrument_node="">159</span></span></span><div class="footnote-content" data-dcnode-id="1161"><p class="footnote-compatibility" data-dcnode-id="1162"><span data-dcnode-id="1169" instrument_node="">‘S Korea helps N Korea food crisis’, </span><em data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">BBC News</span></em><span data-dcnode-id="1166" instrument_node=""> (12 July 2005) available at </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="1164" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//news.bbc.co.uk/2/hi/asia-pacific/4674045.stm" target="_blank"><span data-dcnode-id="1165" instrument_node="">http://news.bbc.co.uk/2/hi/asia-pacific/4674045.stm</span></a><span data-dcnode-id="1163" instrument_node=""> (21 July 2005).</span></p></div></span></div><div class="footnote" content-id="fn160" data-dcnode-id="1151"><span class="fn" data-dcnode-id="1152"><span class="label fn-label" data-dcnode-id="1156"><span class="end-note-link" data-dcnode-id="1157" data-fn-id="fn160
