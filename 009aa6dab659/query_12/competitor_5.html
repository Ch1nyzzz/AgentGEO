citizenship.</span><p data-dcnode-id="3304"></p><p class="chapter-para" data-dcnode-id="3287"><span data-dcnode-id="3303" instrument_node="">There is some confusion about the practical implications of these provisions.</span><span class="xrefLink" data-dcnode-id="3302" id="jumplink-fn96"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3300" data-google-interstitial="false" data-open="fn96" href="javascript:;" reveal-id="fn96"><span data-dcnode-id="3301" instrument_node="">96</span></a><span data-dcnode-id="3299" instrument_node=""> It appears that nationals of the DPRK are entitled to automatic ROK citizenship under the ROK Constitution; the decision to grant citizenship is not discretionary. The Settlement Act (ROK) is not intended to determine a person's eligibility for citizenship but, rather, merely governs the implementation of ROK citizenship.</span><span class="xrefLink" data-dcnode-id="3298" id="jumplink-fn97"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3296" data-google-interstitial="false" data-open="fn97" href="javascript:;" reveal-id="fn97"><span data-dcnode-id="3297" instrument_node="">97</span></a><span data-dcnode-id="3295" instrument_node=""> Once a person has been identified as a North Korean national, he or she is automatically granted ROK citizenship.</span><span class="xrefLink" data-dcnode-id="3294" id="jumplink-fn98"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3292" data-google-interstitial="false" data-open="fn98" href="javascript:;" reveal-id="fn98"><span data-dcnode-id="3293" instrument_node="">98</span></a><span data-dcnode-id="3291" instrument_node=""> Although Article 9 of the Settlement Act excludes certain persons from the protection provided under the Act, according to the ROK Ministry of Unification, ‘in practice, the decision to grant citizenship [is] not discretionary and no genuine North Korean refugee ha[s] ever been refused South Korean citizenship’.</span><span class="xrefLink" data-dcnode-id="3290" id="jumplink-fn99"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3288" data-google-interstitial="false" data-open="fn99" href="javascript:;" reveal-id="fn99"><span data-dcnode-id="3289" instrument_node="">99</span></a></p><p class="chapter-para" data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">Nevertheless, while nationals of the DPRK are potential holders of dual citizenship, it must be taken into account that a national of the DPRK does not enjoy the rights associated with ROK citizenship so long as he or she remains in the territory of the DPRK or is otherwise denied effective diplomatic protection from South Korean authorities. The ROK citizenship is effectively ‘dormant’. UNHCR states that:</span></p><blockquote data-dcnode-id="3279"><p class="chapter-para" data-dcnode-id="3280"><span data-dcnode-id="3284" instrument_node="">In examining the case of an applicant with dual or multiple nationality, it is necessary, however, to distinguish between the possession of a nationality in the legal sense and the availability of protection by the country concerned. There will be cases where the applicant has the nationality of a country in regard to which he alleges no fear, but such nationality may be deemed ineffective as it does not entail the protection normally granted to nationals. In such circumstances, the possession of the second nationality would not be inconsistent with refugee status. As a rule, there should have been a request for, and a refusal of, protection before it can be established that a given nationality is ineffective. If there is no explicit refusal of protection, absence of a reply within reasonable time may be considered a refusal.</span><span class="xrefLink" data-dcnode-id="3283" id="jumplink-fn100"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3281" data-google-interstitial="false" data-open="fn100" href="javascript:;" reveal-id="fn100"><span data-dcnode-id="3282" instrument_node="">100</span></a></p></blockquote><span data-dcnode-id="3278" instrument_node="">Furthermore, the limitation under Article 1A(2) of the Refugee Convention does not apply to DPRK defectors as they cannot avail themselves of the protection of the ROK while they remain within the DPRK.</span><span class="xrefLink" data-dcnode-id="3277" id="jumplink-fn101"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3275" data-google-interstitial="false" data-open="fn101" href="javascript:;" reveal-id="fn101"><span data-dcnode-id="3276" instrument_node="">101</span></a><span data-dcnode-id="3274" instrument_node=""> Protection is also unavailable in China, where, after several incidents in which DPRK defectors have forced entry into foreign embassies and schools, the PRC Government has reacted by tightening security around foreign embassies and implemented more severe border control measures.</span><span class="xrefLink" data-dcnode-id="3273" id="jumplink-fn102"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3271" data-google-interstitial="false" data-open="fn102" href="javascript:;" reveal-id="fn102"><span data-dcnode-id="3272" instrument_node="">102</span></a><p data-dcnode-id="3270"></p><p class="chapter-para" data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">The limitation under Article 1E of the Refugee Convention also does not apply to DPRK defectors as they have not yet ‘taken residence’ within the ROK. Therefore, the possibility of obtaining ROK citizenship under the South Korean Constitution and the Nationality Act (ROK) should not preclude DPRK defectors from protection under international refugee law.</span></p><span data-dcnode-id="3267" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3263" id="23103362" scrollto-destination="23103362"><span data-dcnode-id="3266" instrument_node="">6.7 The principle of </span><em data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">non-refoulement</span></em></h3><span data-dcnode-id="3262" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3257"><span data-dcnode-id="3261" instrument_node="">A fundamental right enshrined in Article 33(1) of the Refugee Convention is the so-called principle of </span><em data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">non-refoulement</span></em><span data-dcnode-id="3258" instrument_node="">:</span></p><blockquote data-dcnode-id="3254"><p class="chapter-para" data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">No Contracting State shall expel or return (‘refouler’) a refugee in any manner whatsoever to the frontiers of territories where his life or freedom would be threatened on account of his race, religion, nationality, membership of a particular social group or political opinion.</span></p></blockquote><span data-dcnode-id="3253" instrument_node="">The same principle can be found in Article 3(1) of the Convention against Torture and Other Cruel, Inhuman or Degrading Treatment or Punishment,</span><span class="xrefLink" data-dcnode-id="3252" id="jumplink-fn103"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3250" data-google-interstitial="false" data-open="fn103" href="javascript:;" reveal-id="fn103"><span data-dcnode-id="3251" instrument_node="">103</span></a><span data-dcnode-id="3249" instrument_node=""> which states that ‘[n]o State Party shall expel, return (“refouler”) or extradite a person to another State where there are substantial grounds for believing that he would be in danger of being subjected to torture’.</span><span class="xrefLink" data-dcnode-id="3248" id="jumplink-fn104"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3246" data-google-interstitial="false" data-open="fn104" href="javascript:;" reveal-id="fn104"><span data-dcnode-id="3247" instrument_node="">104</span></a><span data-dcnode-id="3245" instrument_node=""> Similarly, in its General Comment devoted to the interpretation and application of Article 7 of the ICCPR,</span><span class="xrefLink" data-dcnode-id="3244" id="jumplink-fn105"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3242" data-google-interstitial="false" data-open="fn105" href="javascript:;" reveal-id="fn105"><span data-dcnode-id="3243" instrument_node="">105</span></a><span data-dcnode-id="3241" instrument_node=""> the UN Human Rights Committee has interpreted the provision to incorporate the principle of </span><em data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">non-refoulement</span></em><span data-dcnode-id="3238" instrument_node=""> where it stated that:</span><blockquote data-dcnode-id="3232"><p class="chapter-para" data-dcnode-id="3233"><span data-dcnode-id="3237" instrument_node="">In the view of the Committee, States parties must not expose individuals to the danger of torture or cruel, inhuman or degrading treatment or punishment upon return to another country by way of their extradition, expulsion or refoulement. States parties should indicate in their reports what measures they have adopted to that end.</span><span class="xrefLink" data-dcnode-id="3236" id="jumplink-fn106"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3234" data-google-interstitial="false" data-open="fn106" href="javascript:;" reveal-id="fn106"><span data-dcnode-id="3235" instrument_node="">106</span></a></p></blockquote><span data-dcnode-id="3231" instrument_node="">The principle of </span><em data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">non-refoulement</span></em><span data-dcnode-id="3228" instrument_node=""> is considered to be part of customary international law</span><span class="xrefLink" data-dcnode-id="3227" id="jumplink-fn107"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3225" data-google-interstitial="false" data-open="fn107" href="javascript:;" reveal-id="fn107"><span data-dcnode-id="3226" instrument_node="">107</span></a><span data-dcnode-id="3224" instrument_node=""> and is also prohibited under various other international instruments including Article 45(4) of the 1949 Geneva Convention relative to the Protection of Civilian Persons in Time of War,</span><span class="xrefLink" data-dcnode-id="3223" id="jumplink-fn108"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3221" data-google-interstitial="false" data-open="fn108" href="javascript:;" reveal-id="fn108"><span data-dcnode-id="3222" instrument_node="">108</span></a><span data-dcnode-id="3220" instrument_node=""> Article 8(1) of the Declaration on the Protection of all Persons from Enforced Disappearance</span><span class="xrefLink" data-dcnode-id="3219" id="jumplink-fn109"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3217" data-google-interstitial="false" data-open="fn109" href="javascript:;" reveal-id="fn109"><span data-dcnode-id="3218" instrument_node="">109</span></a><span data-dcnode-id="3216" instrument_node=""> and Principle 5 of the Principles on the Effective Prevention and Investigation of Extra-legal, Arbitrary and Summary Executions.</span><span class="xrefLink" data-dcnode-id="3215" id="jumplink-fn110"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3213" data-google-interstitial="false" data-open="fn110" href="javascript:;" reveal-id="fn110"><span data-dcnode-id="3214" instrument_node="">110</span></a><span data-dcnode-id="3212" instrument_node=""> Therefore, protection from </span><em data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">refoulement</span></em><span data-dcnode-id="3209" instrument_node=""> is not limited to refugees and is binding on States irrespective of whether they are party to the Refugee Convention and Protocol.</span><span class="xrefLink" data-dcnode-id="3208" id="jumplink-fn111"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3206" data-google-interstitial="false" data-open="fn111" href="javascript:;" reveal-id="fn111"><span data-dcnode-id="3207" instrument_node="">111</span></a><p data-dcnode-id="3205"></p><p class="chapter-para" data-dcnode-id="3196"><span data-dcnode-id="3204" instrument_node="">The PRC has been consistently criticised that its actions in returning North Korean defectors to the DPRK are tantamount to </span><em data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">refoulement</span></em><span data-dcnode-id="3201" instrument_node="">.</span><span class="xrefLink" data-dcnode-id="3200" id="jumplink-fn112"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3198" data-google-interstitial="false" data-open="fn112" href="javascript:;" reveal-id="fn112"><span data-dcnode-id="3199" instrument_node="">112</span></a><span data-dcnode-id="3197" instrument_node=""> The Special Rapporteur stated:</span></p><blockquote data-dcnode-id="3190"><p class="chapter-para" data-dcnode-id="3191"><span data-dcnode-id="3195" instrument_node="">A key international principle in refugee protection is non-refoulement. Currently, there are lapses in compliance with this principle in some countries that are receiving those seeking asylum from the Democratic People's Republic of Korea, and the principle needs to be adhered to by all countries.</span><span class="xrefLink" data-dcnode-id="3194" id="jumplink-fn113"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3192" data-google-interstitial="false" data-open="fn113" href="javascript:;" reveal-id="fn113"><span data-dcnode-id="3193" instrument_node="">113</span></a></p></blockquote><span data-dcnode-id="3189" instrument_node="">As a measure of State sovereignty, the PRC is entitled to protect its borders from illegal migrants. However, this right must also be balanced with the PRC's obligation under international law not to return refugees and persons who are likely to face torture upon return. Moreover, under the Refugee Convention and Protocol,</span><span class="xrefLink" data-dcnode-id="3188" id="jumplink-fn114"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3186" data-google-interstitial="false" data-open="fn114" href="javascript:;" reveal-id="fn114"><span data-dcnode-id="3187" instrument_node="">114</span></a><span data-dcnode-id="3185" instrument_node=""> and reiterated under its 1995 Agreement on the Upgrading of the UNHCR Mission in the People's Republic of China,</span><span class="xrefLink" data-dcnode-id="3184" id="jumplink-fn115"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3182" data-google-interstitial="false" data-open="fn115" href="javascript:;" reveal-id="fn115"><span data-dcnode-id="3183" instrument_node="">115</span></a><span data-dcnode-id="3181" instrument_node=""> the PRC is under an obligation to cooperate with the Office of the UNHCR in the exercise of its functions and its mandate and, hence, to grant access to the UNHCR to North Korean asylum seekers in order to conduct refugee status determinations.</span><span class="xrefLink" data-dcnode-id="3180" id="jumplink-fn116"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3178" data-google-interstitial="false" data-open="fn116" href="javascript:;" reveal-id="fn116"><span data-dcnode-id="3179" instrument_node="">116</span></a><p data-dcnode-id="3177"></p><span data-dcnode-id="3176" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3174" id="23103365" scrollto-destination="23103365"><span data-dcnode-id="3175" instrument_node="">7 Diplomatic protection</span></h2><span data-dcnode-id="3173" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3163"><span data-dcnode-id="3172" instrument_node="">The 1964 Convention on Diplomatic Relations</span><span class="xrefLink" data-dcnode-id="3171" id="jumplink-fn117"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3169" data-google-interstitial="false" data-open="fn117" href="javascript:;" reveal-id="fn117"><span data-dcnode-id="3170" instrument_node="">117</span></a><span data-dcnode-id="3168" instrument_node=""> and the 1963 Convention on Consular Relations</span><span class="xrefLink" data-dcnode-id="3167" id="jumplink-fn118"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3165" data-google-interstitial="false" data-open="fn118" href="javascript:;" reveal-id="fn118"><span data-dcnode-id="3166" instrument_node="">118</span></a><span data-dcnode-id="3164" instrument_node=""> provide for the absolute inviolability of a mission or consular premise by the host country. For example, Article 22(1) of the Convention on Diplomatic Relations states that ‘[t]he premises of the mission shall be inviolable. The agents of the receiving State may not enter them, except with the consent of the head of the mission’. Similarly, Article 31(1), (2) of the Convention on Consular Relations reads:</span></p><blockquote data-dcnode-id="3160"><p class="chapter-para" data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">Consular premises shall be inviolable to the extent provided in this Article. The authorities of the receiving State shall not enter that part of the consular premises which is used exclusively for the purpose of the work of the consular post except with the consent of the head of the consular post or of his designee or of the head of the diplomatic mission of the sending State. The consent of the head of the consular post may, however, be assumed in case of fire or other disaster requiring prompt protective action.</span></p></blockquote><span data-dcnode-id="3159" instrument_node="">While there is no specific provision guaranteeing the protection of persons who seek asylum within diplomatic compounds, the effect of these provisions is to provide </span><em data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">de facto</span></em><span data-dcnode-id="3156" instrument_node=""> protection to any person receiving shelter within diplomatic compounds.</span><p data-dcnode-id="3155"></p><p class="chapter-para" data-dcnode-id="3142"><span data-dcnode-id="3154" instrument_node="">Starting in 2002, several groups of North Korean asylum seekers have forced entry into embassy and consular compounds and other foreign buildings, with the assistance of local NGOs and other humanitarian organisations, to request asylum.</span><span class="xrefLink" data-dcnode-id="3153" id="jumplink-fn119"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3151" data-google-interstitial="false" data-open="fn119" href="javascript:;" reveal-id="fn119"><span data-dcnode-id="3152" instrument_node="">119</span></a><span data-dcnode-id="3150" instrument_node=""> The Chinese Government, in an attempt to avoid international criticism, has largely been cooperative in permitting DPRK defectors who successfully entered diplomatic and consular compounds to leave for a third country before proceeding to the ROK.</span><span class="xrefLink" data-dcnode-id="3149" id="jumplink-fn120"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3147" data-google-interstitial="false" data-open="fn120" href="javascript:;" reveal-id="fn120"><span data-dcnode-id="3148" instrument_node="">120</span></a><span data-dcnode-id="3146" instrument_node=""> However, the PRC has reacted to every attempt to enter an embassy or consular compound ‘by tightening security around diplomatic compounds, demanding that embassies turn over North Koreans, and tightening security measures at the border’.</span><span class="xrefLink" data-dcnode-id="3145" id="jumplink-fn121"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3143" data-google-interstitial="false" data-open="fn121" href="javascript:;" reveal-id="fn121"><span data-dcnode-id="3144" instrument_node="">121</span></a></p><p class="chapter-para" data-dcnode-id="3121"><span data-dcnode-id="3141" instrument_node="">In an instance on 8 May 2002, armed Chinese authorities entered the Japanese consulate located in Shenyang, forcibly removing five North Korean asylum seekers who had been sheltering within the compound.</span><span class="xrefLink" data-dcnode-id="3140" id="jumplink-fn122"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3138" data-google-interstitial="false" data-open="fn122" href="javascript:;" reveal-id="fn122"><span data-dcnode-id="3139" instrument_node="">122</span></a><span data-dcnode-id="3137" instrument_node=""> While the PRC Government argued that authorities had received permission from the Japanese officials to enter the building, both Tokyo and Seoul accused the PRC Government of violating the Convention on Consular Relations.</span><span class="xrefLink" data-dcnode-id="3136" id="jumplink-fn123"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3134" data-google-interstitial="false" data-open="fn123" href="javascript:;" reveal-id="fn123"><span data-dcnode-id="3135" instrument_node="">123</span></a><span data-dcnode-id="3133" instrument_node=""> The Chinese Government justified its actions by claiming that under Article 31(3),</span><span class="xrefLink" data-dcnode-id="3132" id="jumplink-fn124"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3130" data-google-interstitial="false" data-open="fn124" href="javascript:;" reveal-id="fn124"><span data-dcnode-id="3131" instrument_node="">124</span></a><span data-dcnode-id="3129" instrument_node=""> as the receiving State, it had a responsibility to protect the compounds of the sending State during a climate of heightened terrorist attacks. This justification was given despite the fact that the Convention explicitly states that Article 31(3) is subject to the inviolability of a consular premises.</span><span class="xrefLink" data-dcnode-id="3128" id="jumplink-fn125"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3126" data-google-interstitial="false" data-open="fn125" href="javascript:;" reveal-id="fn125"><span data-dcnode-id="3127" instrument_node="">125</span></a><span data-dcnode-id="3125" instrument_node=""> Also in response to the forced entry, the Chinese Government issued a diplomatic memorandum on 21 May 2002 demanding that foreign governments hand over any ‘illegal intruders’ found within their premises.</span><span class="xrefLink" data-dcnode-id="3124" id="jumplink-fn126"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3122" data-google-interstitial="false" data-open="fn126" href="javascript:;" reveal-id="fn126"><span data-dcnode-id="3123" instrument_node="">126</span></a></p><p class="chapter-para" data-dcnode-id="3116"><span data-dcnode-id="3120" instrument_node="">It is arguable that in circumstances in which an asylum seeker seeks protection within a diplomatic compound, the State in whose diplomatic compound the asylum seeker is seeking protection may have a responsibility not to return the asylum seeker to the host State where it is believed that the asylum seeker will be returned to his or her country of origin by the host State. Given reports of the forcible repatriation of North Koreans back to the DPRK, where they may face torture, imprisonment or even execution, handover of such persons to Chinese authorities may be regarded as </span><em data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">refoulement</span></em><span data-dcnode-id="3117" instrument_node="">.</span></p><span data-dcnode-id="3115" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3113" id="23103370" scrollto-destination="23103370"><span data-dcnode-id="3114" instrument_node="">8 Towards durable solutions</span></h2><span data-dcnode-id="3112" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">The situation of human rights in the DPRK and that of North Korean refugees is inseparable from the historical and ideological ties with the wider region, the associated political sensitivities, and the current and ongoing nuclear weapons issue; these matters, however, are beyond the scope of this paper. Nevertheless, any discussion or search for durable solutions must be seen in the context of such concerns and related challenges. Furthermore, any durable solution must aim to bring about the necessary changes without causing any further suffering to the people of the DPRK.</span></p><span data-dcnode-id="3109" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3107" id="23103372" scrollto-destination="23103372"><span data-dcnode-id="3108" instrument_node="">8.1 Amnesty</span></h3><span data-dcnode-id="3106" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3096"><span data-dcnode-id="3105" instrument_node="">Earlier discussion has shown that it would be desirable for the DPRK to remove the sanctions imposed under Article 117 of the Criminal Code</span><span class="xrefLink" data-dcnode-id="3104" id="jumplink-fn127"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3102" data-google-interstitial="false" data-open="fn127" href="javascript:;" reveal-id="fn127"><span data-dcnode-id="3103" instrument_node="">127</span></a><span data-dcnode-id="3101" instrument_node=""> and to provide an automatic amnesty for North Koreans currently residing in the PRC. A formal declaration of amnesty would reduce the incentive to force entry into foreign diplomatic compounds while also diffusing tension within the DPRK and preventing a sudden regime collapse and large-scale displacement. Insofar as possible, voluntary repatriation ought to be the preferred solution.</span><span class="xrefLink" data-dcnode-id="3100" id="jumplink-fn128"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3098" data-google-interstitial="false" data-open="fn128" href="javascript:;" reveal-id="fn128"><span data-dcnode-id="3099" instrument_node="">128</span></a><span data-dcnode-id="3097" instrument_node=""> Alternatively, where a formal declaration of amnesty cannot be achieved, the PRC ought to consider informally relaxing its policy on forced repatriations.</span></p><p class="chapter-para" data-dcnode-id="3090"><span data-dcnode-id="3095" instrument_node="">International organisations, including UNHCR, need to continue to persuade the PRC that further tightening of its borders with the DPRK will result in mounting tensions within North Korea that could lead to a premature collapse of the DPRK regime and massive displacement and refugee flows which would be detrimental to the entire region.</span><span class="xrefLink" data-dcnode-id="3094" id="jumplink-fn129"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3092" data-google-interstitial="false" data-open="fn129" href="javascript:;" reveal-id="fn129"><span data-dcnode-id="3093" instrument_node="">129</span></a><span data-dcnode-id="3091" instrument_node=""> However, it has to be acknowledged that given the closed and generally uncooperative attitude of the DPRK, it would be extremely difficult, if not impossible, for UNHCR to effectively monitor and supervise any amnesty arrangement between the two countries.</span></p><span data-dcnode-id="3089" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3087" id="23103375" scrollto-destination="23103375"><span data-dcnode-id="3088" instrument_node="">8.2 Refugee and humanitarian status</span></h3><span data-dcnode-id="3086" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3077"><span data-dcnode-id="3085" instrument_node="">It is clear that any argument on the part of UNHCR and the international community, if intended to be persuasive and acceptable to both the DPRK and the PRC, while remaining firm and addressing the human rights violations at stake, must not take the form of the usual refugee protection or anti-regime rhetoric. Such an approach has proven counterproductive.</span><span class="xrefLink" data-dcnode-id="3084" id="jumplink-fn130"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3082" data-google-interstitial="false" data-open="fn130" href="javascript:;" reveal-id="fn130"><span data-dcnode-id="3083" instrument_node="">130</span></a><span data-dcnode-id="3081" instrument_node=""> It has caused the Government of the DPRK to be more determined to resist any suggestions for reform, convinced that the international community is hostile to its regime.</span><span class="xrefLink" data-dcnode-id="3080" id="jumplink-fn131"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3078" data-google-interstitial="false" data-open="fn131" href="javascript:;" reveal-id="fn131"><span data-dcnode-id="3079" instrument_node="">131</span></a></p><p class="chapter-para" data-dcnode-id="3072"><span data-dcnode-id="3076" instrument_node="">Instead, it would be desirable to encourage the PRC to acknowledge its international obligations and to protect those fleeing from persecution from </span><em data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">refoulement</span></em><span data-dcnode-id="3073" instrument_node="">. The PRC's argument that it is bound by semi-secretive bilateral memoranda with Pyongyang makes a mockery of its signature under the Refugee Convention and Protocol. This practice raises greater concerns about situations in which a country willingly becomes a party to the Refugee Convention and Protocol but then flouts the resulting obligations. The question ‘what to do’ if a country, here the PRC, enters into agreements that conflict with, or otherwise compromise its obligations under, both existing and subsequent multinational conventions requires further research and discussion that are beyond the scope of this article.</span></p><p class="chapter-para" data-dcnode-id="3056"><span data-dcnode-id="3071" instrument_node="">More immediately, the PRC needs to be encouraged to grant temporary asylum or humanitarian status to North Koreans who are entitled to international protection until UNHCR can arrange for their resettlement in a third country.</span><span class="xrefLink" data-dcnode-id="3070" id="jumplink-fn132"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3068" data-google-interstitial="false" data-open="fn132" href="javascript:;" reveal-id="fn132"><span data-dcnode-id="3069" instrument_node="">132</span></a><span data-dcnode-id="3067" instrument_node=""> This strategy would avoid labelling North Korean asylum seekers formally as ‘refugees’, and may thus assist in maintaining any loyalty the PRC may feel towards the DPRK given its historical and ideological ties to the country. This would also address any reluctance the PRC may have towards UNHCR's involvement in refugee status determinations,</span><span class="xrefLink" data-dcnode-id="3066" id="jumplink-fn133"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3064" data-google-interstitial="false" data-open="fn133" href="javascript:;" reveal-id="fn133"><span data-dcnode-id="3065" instrument_node="">133</span></a><span data-dcnode-id="3063" instrument_node=""> while also protecting the basic human rights of North Korean asylum seekers and guarding against </span><em data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">refoulement</span></em><span data-dcnode-id="3060" instrument_node="">.</span><span class="xrefLink" data-dcnode-id="3059" id="jumplink-fn134"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3057" data-google-interstitial="false" data-open="fn134" href="javascript:;" reveal-id="fn134"><span data-dcnode-id="3058" instrument_node="">134</span></a></p><span data-dcnode-id="3055" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3053" id="23103379" scrollto-destination="23103379"><span data-dcnode-id="3054" instrument_node="">8.3 Access to UNHCR</span></h3><span data-dcnode-id="3052" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3046"><span data-dcnode-id="3051" instrument_node="">Similarly, any argument for greater access to North Korean asylum seekers by UNHCR must always stress the benefits available to the PRC. Unhindered access to UNHCR will reduce the incentive of North Koreans to force entry into foreign embassies and consular compounds and distil the tensions of dissidents within the DPRK.</span><span class="xrefLink" data-dcnode-id="3050" id="jumplink-fn135"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3048" data-google-interstitial="false" data-open="fn135" href="javascript:;" reveal-id="fn135"><span data-dcnode-id="3049" instrument_node="">135</span></a><span data-dcnode-id="3047" instrument_node=""> The international community must assure the PRC that free and unhindered access to UNHCR will not necessarily lead to a mass exodus from North Korea and to the collapse of the DPRK regime; however, maintaining the current status quo may have these effects. As noted by Foster-Carter:</span></p><blockquote data-dcnode-id="3040"><p class="chapter-para" data-dcnode-id="3041"><span data-dcnode-id="3045" instrument_node="">[T]he current situation on the Korean peninsula is both risky and unprecedentedly fluid. Anything could happen. With no appetite for war, but also fading prospects and inadequate political will to pursue a comprehensive package deal, present trends, if unchecked, point towards the DPRK's isolation and ultimate collapse.</span><span class="xrefLink" data-dcnode-id="3044" id="jumplink-fn136"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3042" data-google-interstitial="false" data-open="fn136" href="javascript:;" reveal-id="fn136"><span data-dcnode-id="3043" instrument_node="">136</span></a></p></blockquote><p data-dcnode-id="3039"></p><span data-dcnode-id="3038" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3036" id="23103381" scrollto-destination="23103381"><span data-dcnode-id="3037" instrument_node="">8.4 Military intervention</span></h3><span data-dcnode-id="3035" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3025"><span data-dcnode-id="3034" instrument_node="">The international community has a responsibility to intervene when a State is either unwilling or unable to protect its citizens from an ‘avoidable catastrophe’.</span><span class="xrefLink" data-dcnode-id="3033" id="jumplink-fn137"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3031" data-google-interstitial="false" data-open="fn137" href="javascript:;" reveal-id="fn137"><span data-dcnode-id="3032" instrument_node="">137</span></a><span data-dcnode-id="3030" instrument_node=""> However, any intervention, if not planned strategically, may prove counterproductive. In response to a perceived threat of any military or other intervention in the DPRK, the PRC may react by closing its borders, which would only be more disastrous to North Koreans than any of the current measures.</span><span class="xrefLink" data-dcnode-id="3029" id="jumplink-fn138"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3027" data-google-interstitial="false" data-open="fn138" href="javascript:;" reveal-id="fn138"><span data-dcnode-id="3028" instrument_node="">138</span></a><span data-dcnode-id="3026" instrument_node=""> The International Commission on Intervention and State Sovereignty remarks:</span></p><blockquote data-dcnode-id="3019"><p class="chapter-para" data-dcnode-id="3020"><span data-dcnode-id="3024" instrument_node="">All this presents the international community with acute dilemmas. If it stays disengaged, there is the risk of becoming complicit bystanders in massacre, ethnic cleansing, and even genocide. If the international community intervenes, it may or may not be able to mitigate such abuses. But even when it does, intervention sometimes means taking sides in intra-state conflicts. Once it does so, the international community may only be aiding in the further fragmentation of the state system. Interventions in the Balkans did manage to reduce the civilian death toll, but it has yet to produce a stable state order in the region. As both the Kosovo and Bosnian interventions show, even when the goal of international action is, as it should be, protecting ordinary human beings from gross and systematic abuse, it can be difficult to avoid doing rather more harm than good.</span><span class="xrefLink" data-dcnode-id="3023" id="jumplink-fn139"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3021" data-google-interstitial="false" data-open="fn139" href="javascript:;" reveal-id="fn139"><span data-dcnode-id="3022" instrument_node="">139</span></a></p></blockquote><span data-dcnode-id="3018" instrument_node="">Maintaining ‘a stable order after intervention for human protection purposes remains an equally great challenge’.</span><span class="xrefLink" data-dcnode-id="3017" id="jumplink-fn140"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3015" data-google-interstitial="false" data-open="fn140" href="javascript:;" reveal-id="fn140"><span data-dcnode-id="3016" instrument_node="">140</span></a><span data-dcnode-id="3014" instrument_node=""> The sudden collapse of the DPRK would result in an exodus of thousands of North Koreans to neighbouring countries, such as the ROK, the PRC and Russia, and would potentially be catastrophic to the wider East Asian region.</span><span class="xrefLink" data-dcnode-id="3013" id="jumplink-fn141"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3011" data-google-interstitial="false" data-open="fn141" href="javascript:;" reveal-id="fn141"><span data-dcnode-id="3012" instrument_node="">141</span></a><span data-dcnode-id="3010" instrument_node=""> Any solution to the challenge must aim at protecting existing refugees without contributing to further destabilisation in the region, greater displacement, suffering, and violation of human rights. Military intervention should therefore only be reverted to when every alternative has been exhausted.</span><p data-dcnode-id="3009"></p><span data-dcnode-id="3008" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="3006" id="23103383" scrollto-destination="23103383"><span data-dcnode-id="3007" instrument_node="">8.5 Resettlement</span></h3><span data-dcnode-id="3005" instrument_node="">
</span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="3003" id="23103384" scrollto-destination="23103384"><span data-dcnode-id="3004" instrument_node="">8.5.1 United States</span></h4><span data-dcnode-id="3002" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2985"><span data-dcnode-id="3001" instrument_node="">Section 302 of the US North Korean Human Rights Act, H.R. 4011 under Title III ‘Protecting North Korean Refugees’ explicitly states that North Korean asylum seekers are not to be disadvantaged or disqualified from eligibility due to any potential ROK citizenship they may be entitled to.</span><span class="xrefLink" data-dcnode-id="3000" id="jumplink-fn142"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2998" data-google-interstitial="false" data-open="fn142" href="javascript:;" reveal-id="fn142"><span data-dcnode-id="2999" instrument_node="">142</span></a><span data-dcnode-id="2997" instrument_node=""> Moreover, the Section specifies that nationals of the DPRK are not to be treated as nationals of the ROK ‘[f]or the purposes of eligibility for refugee status […] or for asylum’.</span><span class="xrefLink" data-dcnode-id="2996" id="jumplink-fn143"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2994" data-google-interstitial="false" data-open="fn143" href="javascript:;" reveal-id="fn143"><span data-dcnode-id="2995" instrument_node="">143</span></a><span data-dcnode-id="2993" instrument_node=""> Therefore, irrespective of whether North Koreans are willing or able to eventually resettle in the ROK or obtain ROK citizenship, this does not pre-emptively exclude them from requesting asylum in the United States.</span><span class="xrefLink" data-dcnode-id="2992" id="jumplink-fn144"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2990" data-google-interstitial="false" data-open="fn144" href="javascript:;" reveal-id="fn144"><span data-dcnode-id="2991" instrument_node="">144</span></a><span data-dcnode-id="2989" instrument_node=""> Moreover, considering that North Korean asylum seekers in the PRC have no access to the UNHCR, Section 303 of the Act designates North Korean refugees as a ‘Priority 2’ group, thus enabling them to make a direct application for refugee status under the US asylum system without the need for a UNHCR referral which would otherwise be required.</span><span class="xrefLink" data-dcnode-id="2988" id="jumplink-fn145"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2986" data-google-interstitial="false" data-open="fn145" href="javascript:;" reveal-id="fn145"><span data-dcnode-id="2987" instrument_node="">145</span></a></p><p class="chapter-para" data-dcnode-id="2972"><span data-dcnode-id="2984" instrument_node="">While the Act </span><em data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">prima facie</span></em><span data-dcnode-id="2981" instrument_node=""> formally recognises North Korean asylum seekers as refugees, the practicalities of the Act remain uncertain. Many North Koreans are either unable or do not wish to make themselves available to the US asylum, resettlement or general immigration programmes. It has been found that many DPRK defectors have an intense hate towards the United States. Despite their flight they maintain strong patriotism for North Korea and perceive the United States as an enemy.</span><span class="xrefLink" data-dcnode-id="2980" id="jumplink-fn146"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2978" data-google-interstitial="false" data-open="fn146" href="javascript:;" reveal-id="fn146"><span data-dcnode-id="2979" instrument_node="">146</span></a><span data-dcnode-id="2977" instrument_node=""> On the other hand, the strict investigations into the backgrounds of asylum applicants, that have been instituted in the United States in the aftermath of the September 11th events, have made it much more difficult for North Koreans, along with other nationals, to obtain asylum in the US. Some writers have expressed doubts that North Korean asylum seekers will be able to obtain the security clearance necessary for immigration into the US.</span><span class="xrefLink" data-dcnode-id="2976" id="jumplink-fn147"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2974" data-google-interstitial="false" data-open="fn147" href="javascript:;" reveal-id="fn147"><span data-dcnode-id="2975" instrument_node="">147</span></a><span data-dcnode-id="2973" instrument_node=""> Furthermore, in practice, US consular officials have limited contact with North Korean asylum seekers. Such contact is usually limited to US embassies and consulates in China. To make its North Korean asylum seeker's policy work, the US would have to negotiate with the Government of the PRC to allow the US to conduct refugee interviews in the PRC or to permit the exit of asylum seekers to a third country. Such consent by the PRC Government is, however, highly unlikely.</span></p><span data-dcnode-id="2971" instrument_node=""> </span><h4 class="section-title js-splitscreen-section-title" data-dcnode-id="2969" id="23103387" scrollto-destination="23103387"><span data-dcnode-id="2970" instrument_node="">8.5.2 The ROK</span></h4><span data-dcnode-id="2968" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2955"><span data-dcnode-id="2967" instrument_node="">The ROK has been relatively receptive to DPRK defectors whilst remaining careful to maintain a ‘low profile’ for fear of jeopardising relations with the PRC, and for fear of losing the limited diplomatic ties with the DPRK.</span><span class="xrefLink" data-dcnode-id="2966" id="jumplink-fn148"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2964" data-google-interstitial="false" data-open="fn148" href="javascript:;" reveal-id="fn148"><span data-dcnode-id="2965" instrument_node="">148</span></a><span data-dcnode-id="2963" instrument_node=""> Between 1994 and 2003, approximately 3,800 North Korean refugees had been resettled in the ROK.</span><span class="xrefLink" data-dcnode-id="2962" id="jumplink-fn149"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2960" data-google-interstitial="false" data-open="fn149" href="javascript:;" reveal-id="fn149"><span data-dcnode-id="2961" instrument_node="">149</span></a><span data-dcnode-id="2959" instrument_node=""> In 2004, Amnesty International reported that over 5,000 North Koreans had been successful in reaching the ROK and had been granted South Korean citizenship.</span><span class="xrefLink" data-dcnode-id="2958" id="jumplink-fn150"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2956" data-google-interstitial="false" data-open="fn150" href="javascript:;" reveal-id="fn150"><span data-dcnode-id="2957" instrument_node="">150</span></a></p><p class="chapter-para" data-dcnode-id="2942"><span data-dcnode-id="2954" instrument_node="">Given the current political climate, historical sensitivities, and practical implications, it would seem that the ROK remains the most suitable country for the resettlement of North Korean refugees.</span><span class="xrefLink" data-dcnode-id="2953" id="jumplink-fn151"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2951" data-google-interstitial="false" data-open="fn151" href="javascript:;" reveal-id="fn151"><span data-dcnode-id="2952" instrument_node="">151</span></a><span data-dcnode-id="2950" instrument_node=""> North Korean refugees not only ‘shar[e] a language, ethnicity, and history (and in many cases family ties) with their countrymen in the South’ but are also entitled to automatic citizenship under the ROK Constitution and provisions under the Settlement Act (ROK).</span><span class="xrefLink" data-dcnode-id="2949" id="jumplink-fn152"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2947" data-google-interstitial="false" data-open="fn152" href="javascript:;" reveal-id="fn152"><span data-dcnode-id="2948" instrument_node="">152</span></a><span data-dcnode-id="2946" instrument_node=""> Despite reports of the ROK's growing reluctance to accept North Korean defectors, the extent to which the ROK can change its policies in relation to North Korean defectors is debatable given the guarantee of citizenship under the ROK Constitution.</span><span class="xrefLink" data-dcnode-id="2945" id="jumplink-fn153"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2943" data-google-interstitial="false" data-open="fn153" href="javascript:;" reveal-id="fn153"><span data-dcnode-id="2944" instrument_node="">153</span></a></p><span data-dcnode-id="2941" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2939" id="23103390" scrollto-destination="23103390"><span data-dcnode-id="2940" instrument_node="">8.6 Forced entry into diplomatic compounds</span></h3><span data-dcnode-id="2938" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2928"><span data-dcnode-id="2937" instrument_node="">High profile cases of North Korean asylum seekers breaking into diplomatic compounds have increasingly brought the plight of North Korean asylum seekers to the attention of the international community. In 2002, according to Human Rights Watch, 20 percent of those who successfully reached the ROK only made it to South Korea because they entered foreign embassies and consulates.</span><span class="xrefLink" data-dcnode-id="2936" id="jumplink-fn154"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2934" data-google-interstitial="false" data-open="fn154" href="javascript:;" reveal-id="fn154"><span data-dcnode-id="2935" instrument_node="">154</span></a><span data-dcnode-id="2933" instrument_node=""> While this number pales in comparison to the thousands of asylum seekers hiding within Chinese borders, the PRC Government has reacted to the public humiliation by tightening security around diplomatic compounds and initiating border ‘crackdowns’, forcing hundreds of North Koreans to return to the DPRK.</span><span class="xrefLink" data-dcnode-id="2932" id="jumplink-fn155"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2930" data-google-interstitial="false" data-open="fn155" href="javascript:;" reveal-id="fn155"><span data-dcnode-id="2931" instrument_node="">155</span></a><span data-dcnode-id="2929" instrument_node=""> The presence of Chinese armed forces is increasingly apparent around diplomatic compounds. The Chinese Government argues that it is in the interests of the security of the diplomats. In practice, it has made it increasingly difficult for North Korean asylum seekers to gain access to foreign embassies for assistance and protection.</span></p><p class="chapter-para" data-dcnode-id="2919"><span data-dcnode-id="2927" instrument_node="">The effectiveness and motives of these high profile entries into foreign embassies and consular compounds – often facilitated by NGOs and humanitarian organisations – is debatable. On the one hand, it can be argued that such forced entries shed light on the tragic plight of North Korean defectors and enhances international awareness of the issue. On the other hand, the tightening of security measures around both embassy and consular compounds as well as border regions, has made life extremely hard for remaining North Koreans; placing them at greater risk of imprisonment, inhumane and degrading treatment, trafficking and sexual exploitation. Moreover, the Government of the PRC and other critics have argued that such NGOs, generally South Korean NGOs, are more preoccupied with achieving their own political ambitions than defending the genuine interests of North Korean defectors.</span><span class="xrefLink" data-dcnode-id="2926" id="jumplink-fn156"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2924" data-google-interstitial="false" data-open="fn156" href="javascript:;" reveal-id="fn156"><span data-dcnode-id="2925" instrument_node="">156</span></a><span data-dcnode-id="2923" instrument_node=""> Therefore, it may be necessary to persuade NGOs to adopt a less dramatic but more ‘professional, non-political and non-judgmental’ strategy.</span><span class="xrefLink" data-dcnode-id="2922" id="jumplink-fn157"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2920" data-google-interstitial="false" data-open="fn157" href="javascript:;" reveal-id="fn157"><span data-dcnode-id="2921" instrument_node="">157</span></a></p><span data-dcnode-id="2918" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2916" id="23103393" scrollto-destination="23103393"><span data-dcnode-id="2917" instrument_node="">8.7 International burden-sharing</span></h3><span data-dcnode-id="2915" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2902"><span data-dcnode-id="2914" instrument_node="">It is without doubt that international solidarity and responsibility-sharing has a significant role to play in the search for durable solutions. Whilst much criticism has been aimed at the PRC, the international community must also share the burden.</span><span class="xrefLink" data-dcnode-id="2913" id="jumplink-fn158"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2911" data-google-interstitial="false" data-open="fn158" href="javascript:;" reveal-id="fn158"><span data-dcnode-id="2912" instrument_node="">158</span></a><span data-dcnode-id="2910" instrument_node=""> Food shortages continue in the DPRK. In early 2005, the UN World Food Programme, ‘currently feeding some 6.5m North Koreans – nearly a third of the population’, announced that some 900,000 tons of cereals would have to be met through international aid donations in order to sustain the population until October 2005.</span><span class="xrefLink" data-dcnode-id="2909" id="jumplink-fn159"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2907" data-google-interstitial="false" data-open="fn159" href="javascript:;" reveal-id="fn159"><span data-dcnode-id="2908" instrument_node="">159</span></a><span data-dcnode-id="2906" instrument_node=""> The international community ought to alleviate the situation by meeting such demands. This would indeed reduce the flow of North Koreans into the PRC. Moreover, while the international community has shown increasing concern for the plight of North Korean defectors, it must continue to assist the PRC as the first country of asylum in providing resettlement places for North Korean refugees.</span><span class="xrefLink" data-dcnode-id="2905" id="jumplink-fn160"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2903" data-google-interstitial="false" data-open="fn160" href="javascript:;" reveal-id="fn160"><span data-dcnode-id="2904" instrument_node="">160</span></a></p><div class="footnote" content-id="fn1" data-dcnode-id="2894"><span class="fn" data-dcnode-id="2895"><span class="label fn-label" data-dcnode-id="2899"><span class="end-note-link" data-dcnode-id="2900" data-fn-id="fn1" rel="nofollow"><span data-dcnode-id="2901" instrument_node="">1</span></span></span><div class="footnote-content" data-dcnode-id="2896"><p class="footnote-compatibility" data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">The term ‘North Koreans’ will be taken to mean a ‘national of the Democratic People's Republic of Korea’ (the DPRK); a ‘North Korean defector’ will be taken to mean a North Korean who has departed from the DPRK. The two terms are used interchangeably throughout this paper.</span></p></div></span></div><div class="footnote" content-id="fn2" data-dcnode-id="2874"><span class="fn" data-dcnode-id="2875"><span class="label fn-label" data-dcnode-id="2891"><span class="end-note-link" data-dcnode-id="2892" data-fn-id="fn2" rel="nofollow"><span data-dcnode-id="2893" instrument_node="">2</span></span></span><div class="footnote-content" data-dcnode-id="2876"><p class="footnote-compatibility" data-dcnode-id="2877"><span data-dcnode-id="2890" instrument_node="">Human Rights Watch notes that ‘[n]o human rights organisation has direct access to the country for research or investigation’: Human Rights Watch, </span><em data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">Human Rights in North Korea (DPRK: The Democratic People's Republic of Korea)</span></em><span data-dcnode-id="2887" instrument_node=""> (2004); David Hawk, </span><em data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">The Hidden Gulag Exposing North Korea's Prison Camps: Prisoners’ Testimonies and Satellite Photographs,</span></em><span data-dcnode-id="2884" instrument_node=""> US Committee for Human Rights in North Korea (2003) 14; moreover, NGOs also have very limited access to the PRC and humanitarian workers have been known to be arrested during crackdowns; it is ‘estimated that only 20 per cent of North Koreans in China have contact with any foreign NGOs’: James D Seymour, </span><em data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">China: Background Paper on the Situation of North Koreans in China</span></em><span data-dcnode-id="2881" instrument_node=""> (2005), 19, Writenet Independent Analysis (2005) available at </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="2879" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ilw.com/lawyers/articles/2005" target="_blank"><span data-dcnode-id="2880" instrument_node="">www.ilw.com/lawyers/articles/2005</span></a><span data-dcnode-id="2878" instrument_node="">,0629-northkorean.pdf (21 July 2005).</span></p></div></span></div><div class="footnote" content-id="fn3" data-dcnode-id="2863"><span class="fn" data-dcnode-id="2864"><span class="label fn-label" data-dcnode-id="2871"><span class="end-note-link" data-dcnode-id="2872" data-fn-id="fn3" rel="nofollow"><span data-dcnode-id="2873" instrument_node="">3</span></span></span><div class="footnote-content" data-dcnode-id="2865"><p class="footnote-compatibility" data-dcnode-id="2866"><span data-dcnode-id="2870" instrument_node="">Human Rights Watch, ibid.; Amnesty International, </span><em data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">Starved of Rights: Human Rights and the Food Crisis in the Democratic People's Republic of Korea</span></em><span data-dcnode-id="2867" instrument_node=""> (2004), 2.</span></p></div></span></div><div class="footnote" content-id="fn4" data-dcnode-id="2849"><span class="fn" data-dcnode-id="2850"><span class="label fn-label" data-dcnode-id="2860"><span class="end-note-link" data-dcnode-id="2861" data-fn-id="fn4" rel="nofollow"><span data-dcnode-id="2862" instrument_node="">4</span></span></span><div class="footnote-content" data-dcnode-id="2851"><p class="footnote-compatibility" data-dcnode-id="2852"><span data-dcnode-id="2859" instrument_node="">Amnesty International, </span><em data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="2856" instrument_node="">, ibid., 17-18; Aidan Foster-Carter, </span><em data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">DPR Korea: The North Korean Crisis: A Situation Update</span></em><span data-dcnode-id="2853" instrument_node="">, Writenet Independent Analysis Paper No. 16 (2003), 9.</span></p></div></span></div><div class="footnote" content-id="fn5" data-dcnode-id="2838"><span class="fn" data-dcnode-id="2839"><span class="label fn-label" data-dcnode-id="2846"><span class="end-note-link" data-dcnode-id="2847" data-fn-id="fn5" rel="nofollow"><span data-dcnode-id="2848" instrument_node="">5</span></span></span><div class="footnote-content" data-dcnode-id="2840"><p class="footnote-compatibility" data-dcnode-id="2841"><span data-dcnode-id="2845" instrument_node="">Lord Howell of Guildford</span><em data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">, Hansard Volume (House of Lords Debates)</span></em><span data-dcnode-id="2842" instrument_node="">, House of Lords vol. 660(70) (21 Apr. 2004), Column 311.</span></p></div></span></div><div class="footnote" content-id="fn6" data-dcnode-id="2824"><span class="fn" data-dcnode-id="2825"><span class="label fn-label" data-dcnode-id="2835"><span class="end-note-link" data-dcnode-id="2836" data-fn-id="fn6" rel="nofollow"><span data-dcnode-id="2837" instrument_node="">6</span></span></span><div class="footnote-content" data-dcnode-id="2826"><p class="footnote-compatibility" data-dcnode-id="2827"><span data-dcnode-id="2834" instrument_node="">Human Rights Watch, </span><em data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">The Invisible Exodus: North Koreans in the People's Republic of China</span></em><span data-dcnode-id="2831" instrument_node=""> (2002) 20, available at </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="2829" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hrw.org/reports/2002/northkorea/norkor1102.pdf" target="_blank"><span data-dcnode-id="2830" instrument_node="">www.hrw.org/reports/2002/northkorea/norkor1102.pdf</span></a><span data-dcnode-id="2828" instrument_node=""> (21 July 2005).</span></p></div></span></div><div class="footnote" content-id="fn7" data-dcnode-id="2816"><span class="fn" data-dcnode-id="2817"><span class="label fn-label" data-dcnode-id="2821"><span class="end-note-link" data-dcnode-id="2822" data-fn-id="fn7" rel="nofollow"><span data-dcnode-id="2823" instrument_node="">7</span></span></span><div class="footnote-content" data-dcnode-id="2818"><p class="footnote-compatibility" data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">Seymour, above n. 2, 19.</span></p></div></span></div><div class="footnote" content-id="fn8" data-dcnode-id="2808"><span class="fn" data-dcnode-id="2809"><span class="label fn-label" data-dcnode-id="2813"><span class="end-note-link" data-dcnode-id="2814" data-fn-id="fn8" rel="nofollow"><span data-dcnode-id="2815" instrument_node="">8</span></span></span><div class="footnote-content" data-dcnode-id="2810"><p class="footnote-compatibility" data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">Socialist Constitution of the Democratic People's Republic of Korea, adopted on 5 Sept. 1998. The Constitution was first adopted in 1948, completely revised on 27 Dec. 1972, and revised again in Apr. 1992 and Sept. 1998. Art. 67 of the 1998 Constitution reads: ‘Citizens are guaranteed freedom of speech, of the press, of assembly, demonstration and association. The State shall guarantee conditions for the free activity of democratic political parties and social organisations’.</span></p></div></span></div><div class="footnote" content-id="fn9" data-dcnode-id="2791"><span class="fn" data-dcnode-id="2792"><span class="label fn-label" data-dcnode-id="2805"><span class="end-note-link" data-dcnode-id="2806" data-fn-id="fn9" rel="nofollow"><span data-dcnode-id="2807" instrument_node="">9</span></span></span><div class="footnote-content" data-dcnode-id="2793"><p class="footnote-compatibility" data-dcnode-id="2794"><span data-dcnode-id="2804" instrument_node="">Amnesty International, </span><em data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="2801" instrument_node="">, above n. 3, 19-20; Tom Malinowski, </span><em data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">Advancing Human Rights in North Korea: Testimony by Tom Malinowski Before the US Senate Committee on Foreign Relations</span></em><span data-dcnode-id="2798" instrument_node=""> (2003) available at </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="2796" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hrw.org/english/docs/2004/03/02/usint7793_txt.htm" target="_blank"><span data-dcnode-id="2797" instrument_node="">http://hrw.org/english/docs/2004/03/02/usint7793_txt.htm</span></a><span data-dcnode-id="2795" instrument_node=""> (21 July 2005).</span></p></div></span></div><div class="footnote" content-id="fn10" data-dcnode-id="2783"><span class="fn" data-dcnode-id="2784"><span class="label fn-label" data-dcnode-id="2788"><span class="end-note-link" data-dcnode-id="2789" data-fn-id="fn10" rel="nofollow"><span data-dcnode-id="2790" instrument_node="">10</span></span></span><div class="footnote-content" data-dcnode-id="2785"><p class="footnote-compatibility" data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">Art. 68 DPRK Constitution, ‘Citizens have freedom of religious beliefs. This right is granted by approving the construction of religious buildings and the holding of religious ceremonies. No one may use religion as a pretext for drawing in foreign forces or for harming the State and social order’.</span></p></div></span></div><div class="footnote" content-id="fn11" data-dcnode-id="2757"><span class="fn" data-dcnode-id="2758"><span class="label fn-label" data-dcnode-id="2780"><span class="end-note-link" data-dcnode-id="2781" data-fn-id="fn11" rel="nofollow"><span data-dcnode-id="2782" instrument_node="">11</span></span></span><div class="footnote-content" data-dcnode-id="2759"><p class="footnote-compatibility" data-dcnode-id="2760"><span data-dcnode-id="2779" instrument_node="">UN Commission on Human Rights, </span><em data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Resolution 2005/11 on the Situation of Human Rights in the Democratic People's Republic of Korea</span></em><span data-dcnode-id="2776" instrument_node="">, 61</span><sup data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">st</span></sup><span data-dcnode-id="2773" instrument_node=""> sess, 50</span><sup data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">th</span></sup><span data-dcnode-id="2770" instrument_node=""> mtg, UN Doc E/CN.4/2005/L.10/Add.9 (2005), operative para. 1(c); adopted by a recorded vote of 13 to 9, with 14 abstentions; see also, UN Commission on Human Rights, </span><em data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Resolution 2004/13 on the Situation of Human Rights in the Democratic People's Republic of Korea</span></em><span data-dcnode-id="2767" instrument_node="">, 60</span><sup data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">th</span></sup><span data-dcnode-id="2764" instrument_node=""> sess, 50</span><sup data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">th</span></sup><span data-dcnode-id="2761" instrument_node=""> mtg, UN Doc E/CN.4/2004/127 (2004), operative para. 1(c); adopted by a recorded vote of 29 votes to 8, with 16 abstentions.</span></p></div></span></div><div class="footnote" content-id="fn12" data-dcnode-id="2749"><span class="fn" data-dcnode-id="2750"><span class="label fn-label" data-dcnode-id="2754"><span class="end-note-link" data-dcnode-id="2755" data-fn-id="fn12" rel="nofollow"><span data-dcnode-id="2756" instrument_node="">12</span></span></span><div class="footnote-content" data-dcnode-id="2751"><p class="footnote-compatibility" data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">Art. 65 DPRK Constitution, ‘Citizens enjoy equal rights in all spheres of State and public activities’.</span></p></div></span></div><div class="footnote" content-id="fn13" data-dcnode-id="2738"><span class="fn" data-dcnode-id="2739"><span class="label fn-label" data-dcnode-id="2746"><span class="end-note-link" data-dcnode-id="2747" data-fn-id="fn13" rel="nofollow"><span data-dcnode-id="2748" instrument_node="">13</span></span></span><div class="footnote-content" data-dcnode-id="2740"><p class="footnote-compatibility" data-dcnode-id="2741"><span data-dcnode-id="2745" instrument_node="">Amnesty International, </span><em data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="2742" instrument_node="">, above n. 3, 13.</span></p></div></span></div><div class="footnote" content-id="fn14" data-dcnode-id="2730"><span class="fn" data-dcnode-id="2731"><span class="label fn-label" data-dcnode-id="2735"><span class="end-note-link" data-dcnode-id="2736" data-fn-id="fn14" rel="nofollow"><span data-dcnode-id="2737" instrument_node="">14</span></span></span><div class="footnote-content" data-dcnode-id="2732"><p class="footnote-compatibility" data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">Malinowski, above n. 9.</span></p></div></span></div><div class="footnote" content-id="fn15" data-dcnode-id="2719"><span class="fn" data-dcnode-id="2720"><span class="label fn-label" data-dcnode-id="2727"><span class="end-note-link" data-dcnode-id="2728" data-fn-id="fn15" rel="nofollow"><span data-dcnode-id="2729" instrument_node="">15</span></span></span><div class="footnote-content" data-dcnode-id="2721"><p class="footnote-compatibility" data-dcnode-id="2722"><span data-dcnode-id="2726" instrument_node="">Amnesty International, </span><em data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">Starved of Rights</span></em><span data-dcnode-id="2723" instrument_node="">, above n. 3, 14.</span></p></div></span></div><div class="footnote" content-id="fn16" data-dcnode-id="2705"><span class="fn" data-dcnode-id="2706"><span class="label fn-label" data-dcnode-id="2716"><span class="end-note-link" data-dcnode-id="2717" data-fn-id="fn16" rel="nofollow"><span data-dcnode-id="2718" instrument_node="">16</span></span></span><div class="footnote-content" data-dcnode-id="2707"><p class="footnote-compatibility" data-dcnode-id="2708"><span data-dcnode-id="2715" instrument_node="">Hawk, above n. 2, 24; North Korean Human Rights Act, H.R. 4011 § 3(10) (2004) quotes the figure of 200,000; Human Rights Watch puts the figure at 200,000: Human Rights Watch, ‘Cambodia: Protect North Korean Asylum Seekers’ (Press Release, 24 Sept. 2004) available at </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="2713" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hrw.org/english/docs/2004/09/24/cambod9386.htm" target="_blank"><span data-dcnode-id="2714" instrument_node="">http://hrw.org/english/docs/2004/09/24/cambod9386.htm</span></a><span data-dcnode-id="2712" instrument_node=""> (21 July 2005); see also, Human Rights Watch, </span><em data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">Human Rights in North Korea</span></em><span data-dcnode-id="2709" instrument_node="">, above n. 3; and Malinowski, above n. 9.</span></p></div></span></div><div class="footnote" content-id="fn17" data-dcnode-id="2697"><span class="fn" data-dcnode-id="2698"><span class="label fn-label" data-dcnode-id="2702"><span class="end-note-link" data-dcnode-id="2703" data-fn-id="fn17" rel="nofollow"><span data-dcnode-id="2704" instrument_node="">17</span></span></span><div class="footnote-content" data-dcnode-id="2699"><p class="footnote-compatibility" data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">Hawk, ibid., 24; this practice is thought to have stemmed from a statement made by Kim Il Sung in 1972 that, ‘Factionalists or enemies of class, whoever they are, their seed must be eliminated through three generations’, 24; in the case that family members of a ‘political prisoner’ are not imprisoned, they are barred from higher education and professional occupations in the DPRK: Human Rights Watch, ‘Cambodia: Protect North Korean Asylum Seekers’, above n. 16; Malinowski, above n. 9.</span></p></div></span></div><div class="footnote" content-id="fn18" data-dcnode-id="2689"><span class="fn" data-dcnode-id="2690"><span class="label fn-label" data-dcnode-id="2694"><span class="end-note-link" data-dcnode-id="2695" data-fn-id="fn18" rel="nofollow"><span data-dcnode-id="2696" instrument_node="">18</span></span></span><div class="footnote-content" data-dcnode-id="2691"><p class="footnote-compatibility" data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">999 UNTS 171. The DPRK acceded to the Covenant on 14 Sept. 1981.</span></p></div></span></div><div class="footnote" content-id="fn19" data-dcnode-id="2681"><span class="fn" data-dcnode-id="2682"><span class="label fn-label" data-dcnode-id="2686"><span class="end-note-link" data-dcnode-id="2687" data-fn-id="fn19" rel="nofollow"><span data-dcnode-id="2688" instrument_node="">19</span></span></span><div class="footnote-content" data-dcnode-id="2683"><p class="footnote-compatibility" data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">993 UNTS. The DPRK acceded to the Convention on 14 Sept. 1981.</span></p></div></span></div><div class="footnote" content-id="fn20" data-dcnode-id="2673"><span class="fn" data-dcnode-id="2674"><span class="label fn-label" data-dcnode-id="2678"><span class="end-note-link" data-dcnode-id="2679" data-fn-id="fn20" rel="nofollow"><span data-dcnode-id="2680" instrument_node="">20</span></span></span><div class="footnote-content" data-dcnode-id="2675"><p class="footnote-compatibility" data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">1577 UNTS 3. The DPRK signed the Convention on 23 Aug. 1990 and ratified it on 21 Sept. 1990.</span></p></div></span></div><div class="footnote" content-id="fn21" data-dcnode-id="2662"><span class="fn" data-dcnode-id="2663"><span class="label fn-label" data-dcnode-id="2670"><span class="end-note-link" data-dcnode-id="2671" data-fn-id="fn21" rel="nofollow"><span data-dcnode-id="2672" instrument_node="">21</span></span></span><div class="footnote-content" data-dcnode-id="2664"><p class="footnote-compatibility" data-dcnode-id="2665"><span data-dcnode-id="2669" instrument_node="">UN General Assembly res 34/180, 34 UN GAOR Supp. (No. 46),193, UN Doc A/34/46. The DPRK acceded to the Convention on 21 Feb. 2001 with this reservation: ‘The Government of the Democratic People's Republic of Korea does not consider itself bound by the provisions of paragraph (f) of article 2, paragraph 2 of article 9 and paragraph 1 of article 29 of [the Convention]’: Division for the Advancement of Women: Department of Economic and Social Affairs, Convention on the Elimination of All Forms of Discrimination against Women (2005) available at </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="2667" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.un.org/womenwatch/daw/cedaw/reservations-country.htm%23N26" target="_blank"><span data-dcnode-id="2668" instrument_node="">www.un.org/womenwatch/daw/cedaw/reservations-country.htm#N26</span></a><span data-dcnode-id="2666" instrument_node=""> (21 July 2005).</span></p></div></span></div><div class="footnote" content-id="fn22" data-dcnode-id="2645"><span class="fn" data-dcnode-id="2646"><span class="label fn-label" data-dcnode-id="2659"><span class="end-note-link" data-dcnode-id="2660" data-fn-id="fn22" rel="nofollow"><span data-dcnode-id="2661" instrument_node="">22</span></span></span><div class="footnote-content" data-dcnode-id="2647"><p class="footnote-compatibility" data-dcnode-id="2648"><span data-dcnode-id="2658" instrument_node="">Amnesty International, </span><em data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Amnesty International Report 2004</span></em><span data-dcnode-id="2655" instrument_node=""> (2004); Amnesty International, </span><em data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">Amnesty International Report 2003</span></em><span data-dcnode-id="2652" instrument_node=""> (2003), Amnesty International, </span><em data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Amnesty International Report 2002</span></em><span data-dcnode-id="2649" instrument_node=""> (2002).</span></p></div></span></div><div class="footnote" content-id="fn23" data-dcnode-id="2628"><span class="fn" data-dcnode-id="2629"><span class="label fn-label" data-dcnode-id="2642"><span class="end-note-link" data-dcnode-id="2643" data-fn-id="fn23" rel="nofollow"><span data-dcnode-id="2644" instrument_node="">23</span></span></span><div class="footnote-content" data-dcnode-id="2630"><p class="footnote-compatibility" data-dcnode-id="2631"><span data-dcnode-id="2641" instrument_node="">Baroness Symons of Vernham Dean, </span><em data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">Hansard Volume (House of Lords Debates)</span></em><span data-dcnode-id="2638" instrument_node="">, House of Lords vol. 660(70) (21 Apr. 2004), Column 317; Amnesty International had access to the country in the middle of the 1990s while the DPRK Government granted permission to three members of the Committee on the Rights of the Child to enter and examine the situation in Apr. 2004: Amnesty International, </span><em data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">Report 2004</span></em><span data-dcnode-id="2635" instrument_node="">, above n. 22; an invitation to visit the country has also been extended to the Special Rapporteur on violence against women: Vitit Muntarbhorn, </span><em data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">Question of the Violation of Human Rights and Fundamental Freedom in Any Part of the World: Situation of Human Rights in the Democratic People's Republic of Korea</span></em><span data-dcnode-id="2632" instrument_node="">, UN Doc E/CN.4/2005/34 (2005), 5.</span></p></div></span></div><div class="footnote" content-id="fn24" data-dcnode-id="2620"><span class="fn" data-dcnode-id="2621"><span class="label fn-label" data-dcnode-id="2625"><span class="end-note-link" data-dcnode-id="2626" data-fn-id="fn24" rel="nofollow"><span data-dcnode-id="2627" instrument_node="">24</span></span></span><div class="footnote-content" data-dcnode-id="2622"><p class="footnote-compatibility" data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">Hawk, above n. 2, 17.</span></p></div></span></div><div class="footnote" content-id="fn25" data-dcnode-id="2609"><span class="fn" data-dcnode-id="2610"><span class="label fn-label" data-dcnode-id="2617"><span class="end-note-link" data-dcnode-id="2618" data-fn-id="fn25" rel="nofollow"><span data-dcnode-id="2619" instrument_node="">25</span></span></span><div class="footnote-content" data-dcnode-id="2611"><p class="footnote-compatibility" data-dcnode-id="2612"><span data-dcnode-id="2616" instrument_node="">Amnesty International, </span><em data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Starved of Ri
