</span><header class="entry-header" data-dcnode-id="816"><span data-dcnode-id="820" instrument_node="">
</span><h1 class="entry-title entry-title-page" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Careers in Refugee Rights and Migration</span></h1><span data-dcnode-id="817" instrument_node="">
</span></header><span data-dcnode-id="815" instrument_node="">
</span><div class="entry-content page-content" data-dcnode-id="584"><span data-dcnode-id="814" instrument_node="">
</span><h2 data-dcnode-id="811"><strong data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Lawyer</span></strong></h2><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="807"><em data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Description</span></em></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Lawyers work to enforce refugee and immigrant rights in legal settings. They work to represent clients in court, give legal advice, and help complete immigration paperwork. Lawyers can represent and advocate on behalf of both individuals and groups of people. Lawyers working with migrants can work for a variety of institutions including private law firms, non-governmental organizations, and even international organizations. Lawyers work with large international organizations such as the UN and the International Criminal Court to help get justice for forcibly displaced persons and other vulnerable migration groups. Some immigration lawyers don’t represent clients directly in court; instead, they give them legal counsel regarding their rights as immigrants and help them complete paperwork for visas, permanent residency status, and citizenship. Those who do not want to be full lawyers can also work in this field as paralegals, legal assistants, and accredited representatives. These professionals can handle various levels of legal paperwork and, in a few cases, give legal advice depending on their certification.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="800"><em data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Qualifications </span></em></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Lawyers must have a law degree and, in many countries, must pass an exam in order to practice law in court and represent clients. Those looking for careers as legal assistants, paralegals, and accredited representatives do not need a full law degree or to pass the bar exam, but they may still need to gain a certification through specialized training and testing. They must be knowledgeable about national and international migration laws and relevant issues. Immigration lawyers must also be proficient in intercultural communication, either through knowledge of other languages or the ability to work well with interpretation and translation. They must also work well under pressure and be able to communicate clearly and effectively.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="793"><em data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Salary </span></em></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Salaries for lawyers working with immigration and related issues vary based on the country and type of workplace in which they work. Lawyers working with private law firms tend to have higher salaries, while those working for non-profit law organizations have lower salaries. Salaries with international organizations or government agencies vary depending on the level of expertise. Currently in the United States, the average salary for an entry-level immigration attorney is around $55,000.</span></p><span data-dcnode-id="789" instrument_node="">
</span><h2 data-dcnode-id="786"><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Domestic Caseworker</span></strong></h2><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="782"><em data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Description</span></em></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Caseworkers work with domestic social service agencies who provide programs and support for refugees and immigrants in various ways including housing, employment, social support, cultural orientation, and more. Some caseworkers work with refugees who are newly arrived to the country to find housing, connect to essential services, and learn how to navigate the culture and systems of their new country. Caseworkers that work with immigrants of a variety of statuses help implement programs that support vulnerable individuals within the migrant communities, preserve and share cultural traditions and heritages, and advocate for immigrant and refugee rights with service providers and within the community. Some may also help with employment, medical case management, youth-specific programs, and more.</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="775"><em data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Qualifications</span></em></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Caseworker position qualifications vary based on the nature of the role. Some jobs require a degree and certification in social work. Most require at least some type of background in a related field of study such as human services, international development, human rights, and other related fields. Knowledge of other languages or ability to work well with interpreters and translators. Clear and effective communication skills, as well as empathy and understanding of how to work with vulnerable and multicultural groups of people. They should also be able to adapt to situations quickly. Understanding of trauma-informed care and mental health first aid are also helpful skills in this field.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="768"><em data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Salary</span></em></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Caseworkers generally have salaries on the lower end, especially for entry-level jobs. Salaries usually range in the $30,000s. For those with more administrative roles, salaries can be in the $40,000s and $50,000, especially at larger organizations.</span></p><span data-dcnode-id="764" instrument_node="">
</span><h2 data-dcnode-id="761"><strong data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Humanitarian Aid Worker</span></strong></h2><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="757"><em data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Description</span></em></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Humanitarian Aid workers who work with refugees and immigrants typically work in refugee camps and for international organizations that help refugees and other vulnerable migrant groups in the countries they have relocated to. These roles can vary from helping to distribute food, medical supplies, winter items, etc. to administering programs that help refugee and migrant populations build economic and social stability. Many of these roles focus on refugee camps and other areas in major cities with high concentrations of refugees who are in the resettlement process. They help to manage health, food security, education, sanitation, and more. They have a similar role to domestic caseworkers except that they focus on migrant populations who are not necessarily looking for residency within the country they are residing. They work to make sure that these groups of people have their basic needs and basic human rights met.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="750"><em data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Qualifications</span></em></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Qualifications for humanitarian aid workers vary. Most positions require at least a bachelor’s degree in international development, human rights, humanitarian assistance, human services, or a related field. Many jobs are located overseas, although some of these jobs may be available in a person’s home country. Knowledge of another language is usually required or at least highly preferred. Those who want to work in this field should have the social and communication skills to work with vulnerable populations.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="743"><em data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Salary</span></em></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Salaries for these types of jobs vary greatly depending on the location, the organization, and role responsibilities. Salaries generally range anywhere from around $39,000 for entry- and lower-level professionals to about $118,000 for higher-level professionals.</span></p><span data-dcnode-id="739" instrument_node="">
</span><h2 data-dcnode-id="736"><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Policy Analyst</span></strong></h2><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="732"><em data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Description</span></em></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Policy analysts working with refugee and immigrant rights help organizations, government agencies, and think tanks to research current policies and make recommendations on how to change and improve them for the future. They also study trends in migration that impact or are impacted by policy and law. They gather information and statistics to report to stakeholders to influence policy and show how current policy being implemented or not implemented in terms of refugees and immigrants. Policy Analysts work at local, national, and international levels to influence and evaluate policy relating to migrant groups and issues that impact them. They generally have a specialty area such as children and families, health, human rights, education, and more. Policy Analysts also often present their research, evaluations, and recommendations in the form of written reports and/or presentations. They are essential to providing essential information and research to governments and policymakers in order to improve policies for the future of refugees and immigrants.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="725"><em data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Qualifications</span></em></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Policy Analyst positions require at least a Master’s degree in a related field. They should also have experience and skills with both qualitative and quantitative analysis and statistics. Familiarity with the issues relevant to refugee and immigration policy is also helpful and preferred. Strong writing and communication skills are also necessary for these positions. Higher level positions also typically require project management and organization skills.</span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="718"><em data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Salary</span></em></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Policy Analyst salaries vary depending on the level of job responsibility and location, but an average salary is around $67,000. Salaries can range from $48,000 to $91,000 though.</span></p><span data-dcnode-id="714" instrument_node="">
</span><h2 data-dcnode-id="711"><strong data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Program Coordinator</span></strong></h2><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="707"><em data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Description</span></em></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Program Coordinators help develop, evaluate, and implement programs that help refugees and migrants with various aspects of life. They work with programs targeting migrant groups on local, national, and even international levels, addressing things from refugee resettlement to human rights for labor migrants. Program Coordinators help to evaluate and improve existing programs, as well as overseeing the projects that an organization has in place to make sure that data is collected, staff stay on task, and reporting is submitted to funders. Program Coordinators may also be involved in the development of new projects based on needs that the organizations identify. They work with government entities, foundations, and other funders to make sure that they are collecting the necessary data and reporting information that shows the effectiveness of the program. They are also responsible to help implement any changes suggested or required by the funding agencies.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="700"><em data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Qualifications</span></em></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Program Coordinator positions require a Master’s degree in a related field. Management skills are preferred, especially for jobs that require staff oversight as part of the role. Program Coordinators should also have strong skills in communication, writing, and data organization and management. In-depth knowledge of issues related to refugees and immigrants is extremely helpful for this type of role, in order to understand the nuances of the people and issues their programs work to address.</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="693"><em data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Salary</span></em></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Salaries for Program Coordinators and related roles generally range from the $40,000s at local organizations to the $80,000s at large international organizations. Locations and responsibilities also play a role in determining salary for these roles.</span></p><span data-dcnode-id="689" instrument_node="">
</span><h2 data-dcnode-id="686"><strong data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Communications Officer</span></strong></h2><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="682"><em data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Description</span></em></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Communications Officers work to develop and implement marketing strategies, create creative reports for their organizations, run social media profiles, develop and distribute publications, work internally to improve staff communication skills, and more. Communications Officers plan and implement marketing strategies to help both small and large organizations demonstrate their impact, goals, and needs to the community, potential funders, and other key stakeholders. They may also be involved in a lot of digital communications, including social media, email campaigns, website development and maintenance, and more. Communications Officers are also typically responsible for gathering information for various publications, planning, writing, designing, and publishing various reports, brochures, newsletters, and other messaging materials. Communications Officers are essential for organizations to be able to communicate their mission, impact, and needs to relevant stakeholders.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="675"><em data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Qualifications</span></em></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Communications Officer positions require at least a Bachelor’s degree, although qualifications vary based on the level of responsibility and type of role. They must have strong communication skills including writing, editing, marketing, data organization, publishing, public speaking, and other related skills. Skills and experience in graphic design, social media, and other digital communications are also important for many of these roles. Interpersonal communication and relation skills are also good skills for Communication Officers to have.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="668"><em data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Salary</span></em></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Salaries for Communication Officers range greatly depending on the role responsibilities and location. Entry-level positions are typically in the $30,000-40,000s, while communications directors can make around $110,000 at international organizations.</span></p><span data-dcnode-id="664" instrument_node="">
</span><h2 data-dcnode-id="661"><strong data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Public Health Specialist</span></strong></h2><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="657"><em data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Description</span></em></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Public Health Specialists working with refugees and immigrants are responsible for carrying out relevant health programs and delivering medical services to migrant populations. They work in roles such as medical case managers, public health nurses, health program coordinators, and more. In the camps, they often work to distribute medical supplies and provide medical services to the refugees, such as general checkups, immunizations, emergency medical services, maternal and child health services, and more. Public Health Specialists also work to create and implement public health educational campaigns to teach migrant populations about topics such as nutrition, prenatal health, immunizations, mental health, and more to help educate refugees and immigrants about how to better care for their health. Public Health Specialists are in a variety of roles from field service to specialized social work to medical professionals.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="650"><em data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">&nbsp;</span></em></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="646"><em data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Qualifications</span></em></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Qualifications for Public Health Specialist roles working with refugees and immigrants vary greatly depending on the type of position. Those working to deliver medical services must have a background in nursing or an MD and any relevant licenses required by the country in which they work. Those working as medical case managers or program coordinators may not need medical licenses, but a Bachelor’s or Master’s in public health or a related field is usually necessary. These professionals must now only be knowledgeable about health services and the medical field but also must be knowledgeable about working with refugee and immigrant populations and the related issues they encounter.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="639"><em data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Salary</span></em></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">The average salary for medical case managers and health program coordinators working with refugees and immigrants is around $45,000. For doctors and nurses working to deliver medical services, salaries vary greatly depending on the location of the job and the organization. Some public health practitioners volunteer on a part-time basis while working other regular jobs in private hospitals and practices. Those who get paid typically earn salaries in the $70,000s.</span></p><span data-dcnode-id="635" instrument_node="">
</span><h2 data-dcnode-id="632"><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Education Specialist</span></strong></h2><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="628"><em data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Description</span></em></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Education Specialists working with refugees and other migrant populations can have a variety of roles. Language teachers are used domestically and internationally to help migrant groups learn the language of the country in which they live or are being resettled to. Education Specialists in the camps or working with education-focused organizations in areas with large groups of immigrant populations also focus on developing education programs to help address educational gaps, encourage higher education, prepare for citizenship exams, and other educational goals, especially for adult immigrants. Some Education Specialists also work with refugee and immigrant youth, helping them adjust to school in their new country and prepare for further education and careers. Education Specialists work to help migrant populations integrate through language skills, academic skills, job-training, cultural orientation, and preparation for continuing education.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="621"><em data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Qualifications</span></em></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Education Specialist positions usually require at least a Bachelor’s degree in education or a related field. Language instruction jobs, especially ones like teaching English as a Second Language, typically require specialized certifications, as do regular teaching jobs. Knowledge about the education system, job training, and working with populations who do not speak the country’s native language are essential skills for many of these positions. Communication and writing skills are also important for these types of roles.</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="614"><em data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Salary</span></em></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Salaries for Education Specialist positions vary depending on the type of role and location. Those working as local Second-language and adult literacy instructors typically make in the $30,000s to $50,000s. Education Specialists who are managing and implementing programs can have salaries in the $60,000s and $70,000s.</span></p><span data-dcnode-id="610" instrument_node="">
</span><h2 data-dcnode-id="607"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Interpreter/Translator</span></strong></h2><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="603"><em data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Description</span></em></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Interpreters and Translators are essential to organizations working with refugee and immigrant populations. They help to translate conversations between staff members and clients. They help the migrant populations communicate their needs clearly with the organization and help the organization break down language barriers so that their clients can better access the services and skills that they need. Translators work with written documents, translating important forms, applications, brochures, guides, and more into languages that the populations an organization is working with can understand. While not all individuals in migrant populations are literate, especially in refugee and forcibly displaced groups, but translated documents can still help interpreters and community leaders communicate the material more clearly. Interpreters can also usually help communicate cultural nuances to the staff members of an organization, helping them communicate more effectively and comprehensively with their clients.</span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="596"><em data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Qualifications</span></em></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Interpreter and Translator jobs usually don’t require a degree, but they may require certification, especially if the translation job is in a specialty field such as medical services or legal work. Written and spoken fluency in both of the interpreted/translated languages is required. Cultural understanding of the population can be an important aspect of translation and interpretation, to help with better interpretation. Effective speaking and writing skills are essential for these jobs.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="589"><em data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Salary</span></em></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Interpreter and Translator salaries vary greatly depending on the frequency and location. Many of these types of jobs are contractor jobs that receive an hourly salary, ranging from $15/hour to over $50/hour. Jobs in specialized fields or with government agencies or international organizations tend to pay higher salaries. The average yearly salary is typically between $40,000 and $51,000 for interpreters and/or translators.</span></p><span data-dcnode-id="585" instrument_node="">
