</span><p class="c-article-metrics-bar__details" data-dcnode-id="564"><a data-dcnode-id="565" data-track="click" data-track-action="view metrics" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11159-021-09883-0/metrics" rel="nofollow"><span data-dcnode-id="568" instrument_node="">Metrics </span><span class="u-visually-hidden" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">details</span></span></a></p><span data-dcnode-id="563" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="316" data-track-component="article body"><span data-dcnode-id="548" instrument_node="">
</span><div class="c-article-section__content" data-dcnode-id="529"><p data-dcnode-id="544"><i data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Language, Teaching and Pedagogy for Refugee Education</span></i><span data-dcnode-id="545" instrument_node="">, a collection edited by Enakshi Sengupta and Patrick Blessinger, is part of the Innovations in Higher Education Teaching and Learning series. The focus of this compilation is on:</span></p><blockquote class="c-blockquote" data-dcnode-id="538"><div class="c-blockquote__body" data-dcnode-id="539"><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">the core areas of imparting education to the refugee population, … highlight[ing] the recent developments intended to meet an urgent need: that of the refugees who have no or very little previous schooling and who are in need of language learning and furthering their studies for higher education. This book is designed to provide recognition to those who are working relentlessly toward imparting education to vulnerable people and giving them the tools they need to help withstand and recover from the effects of conflict and displacement (p.&nbsp;14).</span></p><span data-dcnode-id="540" instrument_node="">
</span></div></blockquote><p data-dcnode-id="530"><span data-dcnode-id="537" instrument_node="">The editors endeavour to add to the existing literature by privileging the efforts and achievements of educational institutions, not-for-profits, and the learners themselves as related to refugee education. Divided into two main parts – </span><i data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Seeking Higher Education</span></i><span data-dcnode-id="534" instrument_node=""> and </span><i data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Technology and Higher Education</span></i><span data-dcnode-id="531" instrument_node=""> respectively – the book encompasses eleven chapters documenting initiatives from the United Kingdom, South Africa, Ecuador, Canada, Germany, France, the United States and Rwanda, thereby presenting international insights into this topic. Comprised of both conceptual and empirical case studies, the collection presents a fulsome range of literature reviews, pedagogical approaches and programme models.</span></p></div><div class="c-article-section__content" data-dcnode-id="520"><p data-dcnode-id="521"><span data-dcnode-id="528" instrument_node="">The chapters in Part I can be loosely categorised into one of two distinct groups: Chapters 1, 2, and 4 pertain to refugee students’ higher education aspirations, access and experiences; while Chapters 5, 3, and 6 examine language learning programmes or models. Chapter 1, authored by Damian Spiteri, qualitatively analyses how five asylum-seeking young men perceive their own status and engagement while studying in a university in the United Kingdom. He skilfully exposes the tensions they experienced, conflicted between their desire to foster a sense of belonging in the new society by building social capital, ensuring future economic success, and becoming transnational citizens – and the challenges around economic insecurity, discrimination and mental health issues that they navigated to attain these goals. Employing a human development and capability approach, the authors of Chapter 2, Wadzanai Mkwananzi and Merridy Wilson-Strydom, utilise qualitative data generated through interviews with migrant youth in South Africa to develop a conceptual model representing the complex interplay between higher education aspirations, agency and various internal or external factors. The four types of aspirations – resigned, powerful, persistent, and frustrated – are reflective of environmental influences and suggest possibilities for helping migrant youth elevate their aspirations. Donald Reddick and Lisa Sadler (Chapter 4) synthesise the lessons gleaned from ten years of working with Karen</span><sup data-dcnode-id="523"><a data-dcnode-id="524" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Footnote </span></span><span data-dcnode-id="525" instrument_node="">1</span></a></sup><span data-dcnode-id="522" instrument_node=""> refugees in a Western Canadian community as applied within their own institution’s future students’ office. They argue that creating viable pathways to post-secondary study must begin in elementary (primary) schooling and is premised on forming strategic partnerships between families, schools, post-secondary institutions and settlement agencies; building a post-secondary culture; providing holistic support; and nurturing substantive intercultural exchanges. These chapters jointly illuminate targeted supports that educators and institutions might offer to facilitate refugee learners’ access and transition to post-secondary studies.</span></p></div><div class="c-article-section__content" data-dcnode-id="514"><p data-dcnode-id="515"><span data-dcnode-id="519" instrument_node="">Language is often the principal barrier confronted by refugee students endeavouring to access further education and, accordingly, the other three chapters in Part I highlight different models for language learning. The author of Chapter 3, Haydeé Ramírez Lozada, offers the reader a locally developed, fairly traditional didactic model for teaching refugee students English for occupational purposes in a university-linking project in Ecuador. Matt Thomas, Yuankun Yao, Katherine Landau Wright and Elizabeth Rutten-Turner (Chapter 5) then merge the scholarly fields of refugee studies and literacy education to theorise potential best practices for supporting refugee children’s literacy development. Their thoughtful recommendations affirm the centrality of preserving the first language, supporting the development of foundational literacy skills, and foregrounding refugee children’s often subjugated voices through the co-creation of texts. Concluding Part I, Chapter 6, by Marika Gereke and Subin Nijhawan, outlines the phases in a substantive project connecting refugee learners with university students in Frankfurt for either German language orientation or instruction, depending on the learner’s prior educational experiences and goals. Qualitative and quantitative data amassed from participants in each group for evaluative purposes advance insights into how to construct language programmes that foster meaningful intercultural exchanges with the goal of creating a </span><i data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Willkommenskultur</span></i><span data-dcnode-id="516" instrument_node=""> (welcome culture) to counter the hostility towards refugees existing within the larger society.</span></p></div><div class="c-article-section__content" data-dcnode-id="511"><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">The chapters in Part II explore different facets of the topic of technology and higher education. Based on discussions with educational stakeholders in consideration of the specific circumstances and experiences of Arabic-speaking refugees with a disability, David Banes, Carine Allaf and Maggie Mitchell Salem, the authors of Chapter 7, undertake to identify key design and delivery considerations for planning inclusive models of education. Advocating for the centrality of listening to and engaging with learners, the authors share an array of both general and context-specific principles for using technology with this demographic of learner. In Chapter 8, Heather Smyser develops a comprehensive review of research at the intersections between language learning, refugee learners and technology to elucidate their specific educational needs, capabilities and experiences. After contextualising some of the challenges around teaching digital literacy, she imparts valuable insights into how familiar and more readily accessible mobile technologies might potentially be utilised to produce digital texts, enhance motivation and construct identities. Kathy O’Hare, author of Chapter 9, then describes a Participatory Action Research project aimed at developing a community-based digital radio station (Jungala Radio) in the context of an “illegitimate” refugee camp in Calais, France. Challenging narratives disseminated by mainstream media, this initiative created spaces for refugee residents to exercise agency by producing digital content in their own voices as acts of citizenship as well as of resistance.</span></p></div><div class="c-article-section__content" data-dcnode-id="508"><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Chapters 10 and 11 conclude the volume with an overview of two online higher education programmes for refugee learners. In Chapter 10, Chrystina Russell and Nina Weaver discuss a higher education model for refugee learners developed in the United States and implemented in Rwanda in partnership with a local university, while sensitively attending to the ethical and power considerations around exporting Western programmes. Blended delivery with face-to-face academic support, context-specific adaptions and resources, and flexible delivery and assessment modes have been essential components of this programme. Finally, Enakshi Sengupta, Shai Reshef and Patrick Blessinger (Chapter 11) close with a brief overview of University of the People, a tuition-free, open-source, American-accredited online university.</span></p></div><div class="c-article-section__content" data-dcnode-id="505"><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">There are two main issues with this collection, and the first pertains to the overall organisation and structure. In an edited volume, the introduction and conclusion should both contextualise and summarise the findings presented therein. The introduction commences with a brief outline of the context of migration predominantly centred on Europe and Asia which is not reflective of the international focus of the work. Although the scholarly literature on the subjects of educational access and language learning is briefly reviewed, technology and higher education – the focus of Part II –is not situated in the literature. It would also have been productive here to define each of the various terms used throughout the text; refugees, migrants, asylum seekers, and even higher education. Albeit a minor point, the chapter overview summaries are not presented in the same order as they appear in the text. The absence of a conclusion, which might have synthesised the implications and best practices advanced by different authors and the questions these raised, leaves the reader to formulate their own assumptions. In both parts, there are discontinuities between the stated goals of the volume and the purpose of the individual chapter. For instance, Chapters 3 and 5 address language learning for occupational purposes and for children, respectively, and ought to be more overtly situated within the theme of seeking higher education. The chapters in Part II advance a more cohesive purpose and structure, though Chapters 7 and 9 pertain to learning within refugee camps rather than higher education. The collection would have benefitted from a statement of purpose that accurately summarises the broader topics, themes, or even theoretical frameworks (only a few are informed by theory) across the chapters as well as careful editing to connect each chapter to this overall objective. The editorial and organisational issues regrettably impact the readability of the collection as a whole – which is not to say that the individual chapters lack relevance or utility.</span></p></div><div class="c-article-section__content" data-dcnode-id="496"><p data-dcnode-id="497"><span data-dcnode-id="504" instrument_node="">The second point of critique relates to the notion of representation. The voices of refugee students are largely absent in many of the chapters, which may frustrate readers hoping to better understand their perceptions. To be fair, the stated premise of the book is that the emphasis is to be on case studies accenting the work of educators, academics and service providers. However, the marginalisation of refugee learners’ own perspectives on their learning would seem to imply a deficit discourse wherein the educator is the holder of expertise as to which elements are constitutive of a successful educational model. Concomitant with this notion, the introduction describes this relationship as one between “educationists and receivers”, thus positioning refugee learners as passive recipients of knowledge in a manner reminiscent of Paulo Freire’s (2000)</span><sup data-dcnode-id="499"><a data-dcnode-id="500" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Footnote </span></span><span data-dcnode-id="501" instrument_node="">2</span></a></sup><span data-dcnode-id="498" instrument_node=""> conceptualisation of the banking model of education. In Chapter 3, the refugee participants enrolled in the programme are further categorised as “slow learners”. Such terminology is dissonant with the abiding concern and reflexivity expressed by many authors around the issue of ethical and respectful engagement with refugee students. For example, on the issue of acknowledging the power imbalance inherent in their positionings, most of the contributing authors seem to collaborate and advocate with learners while honouring their own expressions of identity and agency. In the empirical studies containing participant data, the findings are often displayed in a cursory fashion followed by a brief conclusion which does not allow for an incisive analysis of the participants’ own views. Several authors allude to the issue of space constraints and, indeed, this would seem to explain these gaps. Consistent with the objectives of this work, centring the perspectives of refugee learners would give the reader more of a sense of how the proposed strategies and models actually did “encourage them to reflect on their experience and share their experience” (p.&nbsp;7).</span></p></div><div class="c-article-section__content" data-dcnode-id="487"><p data-dcnode-id="488"><span data-dcnode-id="495" instrument_node="">Overall, while the target audience of the collection is not explicitly identified, the individual case studies do offer a number of practical insights to service providers working with refugees and migrants aspiring to access language learning or other educational opportunities. Many of the chapters are not grounded in theory or methodology, which might deter an academic readership. One of the major strengths of the book is that the authors collectively bring extensive knowledge and experience of working with refugee populations as consultants, educators, researchers and academics in disparate fields such as education, social work, community development, business and economics. This multidisciplinary expertise allows authors to suggest conceptual or practice-based approaches, programmes and models that have been effectively employed in refugee-serving institutional or community programmes in diverse contexts. Part II is particularly valuable, given the relative paucity of research studies on the use of technology in refugee education, as well as the pressing need to find ways to tap into these learners’ digital literacies by using familiar and accessible technologies (such as mobile technology). Although refugee learners’ experiences in higher education have been explored in greater depth in other books (e.g. Détourbe 2018; Stevenson and Baker 2018),</span><sup data-dcnode-id="490"><a data-dcnode-id="491" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Footnote </span></span><span data-dcnode-id="492" instrument_node="">3</span></a></sup><span data-dcnode-id="489" instrument_node=""> the focus of this volume on the work of educators and service providers brings a unique orientation to the subject.</span></p></div><span data-dcnode-id="486" instrument_node="">
</span><section data-dcnode-id="457" data-title="Notes"><div class="c-article-section" data-dcnode-id="458" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="484" id="notes"><span data-dcnode-id="485" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="459" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="460"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="480" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="481"><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">The Karen are an ethnic group from Burma (Myanmar).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="473" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="474"><p data-dcnode-id="475"><span data-dcnode-id="479" instrument_node="">Freire, P. (2000). </span><i data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Pedagogy of the oppressed</span></i><span data-dcnode-id="476" instrument_node="">. 30th Anniversary Edition. New York: Continuum Books.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="461" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="462"><p data-dcnode-id="468"><span data-dcnode-id="472" instrument_node="">Détourbe, M.A. (2018). </span><i data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Inclusion through access to higher education: Exploring the dynamics between access to higher education, immigration, and language</span></i><span data-dcnode-id="469" instrument_node="">. Rotterdam: Sense Publishers.</span></p><p data-dcnode-id="463"><span data-dcnode-id="467" instrument_node="">Stevenson, J., &amp; Baker, S. (2018). </span><i data-dcnode-id="465"><span data-dcnode-id="466" instrum
