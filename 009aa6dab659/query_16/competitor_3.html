</span><h2 data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Contraception information and access is a right</span></h2><span data-dcnode-id="1836" instrument_node="">
</span><div class="description" data-dcnode-id="1831"><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Young people have the right to lead healthy lives. They should have access to the tools they need to protect their health – including access to condoms, contraception, and services. Young people&nbsp;in the United States and around the world need information about contraception well before they become sexually active. They need to understand how various methods of birth control work, the benefits and challenges of using particular methods, and where to get them. They need support and encouragement from their peers, adults, and the media to increase their comfort level with condoms and birth control. Importantly, they need full access to confidential, safe, and convenient family planning services. Parents, educators, health care providers, and pharmacy staff can play a critical role in helping teens learn about, obtain, and use contraception effectively.</span></p><span data-dcnode-id="1832" instrument_node="">

</span><h3 data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Contraceptive Access for Highly Vulnerable Youth</span></h3><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1811" instrument_node="">Advocates is working in three cities in the United States, Atlanta, Tucson and Washington D.C. to design and test family planning service delivery models that improve uptake of contraception by highly vulnerable youth. In Atlanta, Advocates is working with refugee youth, in Tucson with youth who are in drug treatment or other government agencies, and in Washington D.C., staff is working to improve pediatrician’s willingness and ability to provide contraceptives to the teens they serve. Staff provides resources, training, technical assistance and evaluation consultation to assess the impact of these models and their potential to be scaled. For more information contact Laura Davis,&nbsp;Division Director, TPP/Adolescent Sexual Health Services (</span><a data-dcnode-id="1809" href="mailto:Laura@advocateforyouth.org"><span data-dcnode-id="1810" instrument_node="">Laura@advocatesforyouth.org</span></a><span data-dcnode-id="1808" instrument_node="">).</span></p><span data-dcnode-id="1806" instrument_node="">
