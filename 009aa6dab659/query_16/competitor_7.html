</span><h2 data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">Advocates for Youth Programs</span></h2><span data-dcnode-id="3070" instrument_node="">
</span><div class="description" data-dcnode-id="3065"><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Advocates for Youth is the only organization that works both in the United States and in developing countries with a sole focus on adolescent reproductive and sexual health. In the previous fiscal year, Advocates worked with over 28,000 health care providers, educators, and other youth-serving professionals, directly and indirectly strengthening the ability of more than nine and a half million youth to make informed, responsible decisions about their sexual health. Advocates’ programs and initiatives are key to its success. Read below to find out more about our programs and how to get involved.</span></p><span data-dcnode-id="3066" instrument_node="">

</span><h5 data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">Abortion Out Loud</span></h5><span data-dcnode-id="3032" instrument_node="">
</span><div class="description" data-dcnode-id="3025"><span data-dcnode-id="3031" instrument_node="">
</span><p data-dcnode-id="3027"><span data-dcnode-id="3030" instrument_node="">Abortion Out Loud, formerly the 1 in 3 Campaign, harnesses the power of storytelling, grassroots organizing, leadership development, and policy advocacy to end abortion stigma and strengthen support for young people's access to abortion.  Activists leading the Abortion Out Loud project in their community host abortion speakouts, lead public education campaigns, and work with campus and local officials to strengthen young people's access to abortion services. For more information please contact </span><a data-dcnode-id="3028" href="mailto:marandah@advocatesforyouth.org"><span data-dcnode-id="3029" instrument_node="">marandah@advocatesforyouth.org </span></a></p><span data-dcnode-id="3026" instrument_node="">

</span><h5 data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">Engaging Communities around HIV Organizing (ECHO)</span></h5><span data-dcnode-id="2916" instrument_node="">
</span><div class="description" data-dcnode-id="2909"><span data-dcnode-id="2915" instrument_node="">
</span><p data-dcnode-id="2911"><span data-dcnode-id="2914" instrument_node="">Through ECHO, Advocates recruits, trains and supports a cohort of young people living with HIV to serve as leaders in the fight to end HIV stigma and criminalization. ECHO leaders recognize HIV’s disparate impact on young people of color, including Black and Latino YMSM and trans youth of color. Members use social media campaigns, peer education, storytelling, and media outreach to raise awareness of the interconnection between HIV disparity, racism, homophobia, and transphobia and advocate for the inclusion of youth most impacted by HIV in the planning, implementation, and evaluation of programs and policies that affect their health and well being.  ECHO activists contribute to My Story Out Loud, a digital storytelling campaign dedicated to uplifting the narratives of LGBTQ+ youth of color across the nation. For more information contact </span><a data-dcnode-id="2912" href="mailto:Louie@advocatesforyouth.org"><span data-dcnode-id="2913" instrument_node="">Louie@advocatesforyouth.org</span></a></p><span data-dcnode-id="2910" instrument_node="">

</span><h5 data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">The Condom Collective</span></h5><span data-dcnode-id="2800" instrument_node="">
</span><div class="description" data-dcnode-id="2793"><span data-dcnode-id="2799" instrument_node="">
</span><p data-dcnode-id="2795"><span data-dcnode-id="2798" instrument_node="">The Condom Collective is a youth-led grassroots movement to normalize condom use on campuses across the nation. Each year, approximately 2,000 members, on more than 1,000 colleges campuses distribute one million Trojan ® Brand condoms, educate their peers about sexual health, and organize to improve contraceptive access on their campuses and in their communities. For more information contact </span><a data-dcnode-id="2796" href="mailto:anu@advocatesforyouth.org"><span data-dcnode-id="2797" instrument_node="">anu@advocatesforyouth.org</span></a></p><span data-dcnode-id="2794" instrument_node="">

</span><h5 data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">Know Your IX</span></h5><span data-dcnode-id="2656" instrument_node="">
</span><div class="description" data-dcnode-id="2649"><span data-dcnode-id="2655" instrument_node="">
</span><p data-dcnode-id="2651"><span data-dcnode-id="2654" instrument_node="">Know Your IX is a survivor- and youth-led project of Advocates for Youth that aims to empower students to end sexual and dating violence in their schools. Know Your IX program staff educate, train, organize, and support student survivors in their work to affect change on campuses across the country. Know Your IX activists advocate at the federal, state and campus level for adherence to Obama era guidance on Title IX that includes protections for survivors of sexual assault. For more information contact Sage@advocatesforyouth.org </span><a data-dcnode-id="2652" href="mailto:Sage@advocatesforyouth.org"><span data-dcnode-id="2653" instrument_node="">Sage@advocatesforyouth.org</span></a></p><span data-dcnode-id="2650" instrument_node="">

</span><h5 data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">Muslim Youth Leadership Council (MyLC)</span></h5><span data-dcnode-id="2540" instrument_node="">
</span><div class="description" data-dcnode-id="2530"><span data-dcnode-id="2539" instrument_node="">
</span><p data-dcnode-id="2532"><span data-dcnode-id="2538" instrument_node="">MyLC, a part of the Muslim Youth Project,  is comprised of a cohort of Muslim young people from across the country, working together to challenge Islamaphobia in the U.S. These create safe and supportive spaces for LGBTQ Muslim youth, educate, mobilize, and amplify issues impacting their communities of young Muslim identifying people. MyLC advocates for the inclusion of young Muslim identifying people in Reproductive Justice programming and promotion of health and rights, and host the </span><a data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//https//www.advocatesforyouth.org/campaigns/muslimand/"><span data-dcnode-id="2537" instrument_node="">#MuslimAnd</span></a><span data-dcnode-id="2535" instrument_node=""> campaign. For more information contact  </span><a data-dcnode-id="2533" href="mailto:Ramish@advocatesforyouth.org"><span data-dcnode-id="2534" instrument_node="">Ramish@advocatesforyouth.org</span></a></p><span data-dcnode-id="2531" instrument_node="">

</span><h5 data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">National Youth HIV &amp; AIDS Awareness Day (NYHAAD)</span></h5><span data-dcnode-id="2421" instrument_node="">
</span><div class="description" data-dcnode-id="2414"><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2416"><span data-dcnode-id="2419" instrument_node="">National Youth HIV &amp; AIDS Awareness Day (NYHAAD), annually on April 10th, is a day to educate the public about the impact of HIV and AIDS on young people. The day also highlights the HIV prevention, treatment, and care campaigns of young people in the U.S. For more information contact Armonte at </span><a data-dcnode-id="2417" href="mailto:nyhaad@advocatesforyouth.org"><span data-dcnode-id="2418" instrument_node="">nyhaad@advocatesforyouth.org</span></a></p><span data-dcnode-id="2415" instrument_node="">

</span><h5 data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Student Organizers</span></h5><span data-dcnode-id="2361" instrument_node="">
</span><div class="description" data-dcnode-id="2351"><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2353"><span data-dcnode-id="2359" instrument_node="">Student Organizers are high school and college student leaders who serve as activists, advocates, and spokespeople at the local, state, and national level. With the support of Advocates for Youth, they lead issue-based campaigns for school, local, or state policy changes that support young people’s sexual health and rights. Some of their campaigns for change in their communities include organizing for free menstrual products, free condoms, gender neutral restrooms, and other issues in the fight for comprehensive sex education, contraceptive access, abortion access, LGBTQ health and rights, and HIV prevention. For more information contact </span><a data-dcnode-id="2357" href="mailto:anu@advocatesforyouth.org"><span data-dcnode-id="2358" instrument_node="">anu@advocatesforyouth.org</span></a><span data-dcnode-id="2356" instrument_node=""> or </span><a data-dcnode-id="2354" href="mailto:roselyn@advocatesforyouth.org"><span data-dcnode-id="2355" instrument_node="">roselyn@advocatesforyouth.org</span></a></p><span data-dcnode-id="2352" instrument_node="">

</span><h5 data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">YouthResource Leadership Program (YouthResource)</span></h5><span data-dcnode-id="2274" instrument_node="">
</span><div class="description" data-dcnode-id="2267"><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2269"><span data-dcnode-id="2272" instrument_node="">YouthResourceLGBTQ Youth Leadership Program is designed by and for gay, lesbian, bisexual, transgender and questioning (LGBTQ) young people of color. LGBTQ youth apply to the program and if successful attend a five-day intensive training institute to help them hone their advocacy and mobilization skills. YouthResource members then work throughout the year to advocate for improvements in policies and practices that impact LGBTQ youth of color, on college campuses and at the state and federal level. YouthResource members contribute to My Story Out Loud, a digital storytelling campaign dedicated to uplifting the narratives of LGBTQ+ youth of color across the nation For more information contact </span><a data-dcnode-id="2270" href="mailto:Armonte@advocatesforyouth.org"><span data-dcnode-id="2271" instrument_node="">Armonte@advocatesforyouth.org</span></a></p><span data-dcnode-id="2268" instrument_node="">

</span><h5 data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Young Women of Color 4 Reproductive Justice Collective (YWOC4RJ)</span></h5><span data-dcnode-id="2158" instrument_node="">
</span><div class="description" data-dcnode-id="2151"><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2156" instrument_node="">The Young Women of Color Leadership Council is a group of 14-24 year old young women of color who serve as the leadership team for the YWOC4RJ Collective. YWOC4RJ organizes to decrease sexual health disparities in communities of color, and advocate for the inclusion of young women of color in creating solutions to address the impact of reproductive oppression. Young women can apply to be part of either group.  YWOC LC members attend a five-day intensive leadership institute to hone their knowledge and skills regarding reproductive justice, advocacy and mobilization. Staff works throughout the year with both groups of young women to help them make change on their campuses and in their communities. For more information contact  </span><a data-dcnode-id="2154" href="mailto:kinjo@advocatesforyouth.org"><span data-dcnode-id="2155" instrument_node="">Kinjo@advocatesforyouth.org</span></a></p><span data-dcnode-id="2152" instrument_node="">

</span><div class="description" data-dcnode-id="2002"><span data-dcnode-id="2006" instrument_node="">
</span><p data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">AMAZE (www.amaze.org and YouTube.com/amazeorg) is a partnership between Advocates, Answer and Youth Tech Health and harnesses the power of animation and social media to provide young people, ages 10-14, their parents and educators with an age-appropriate, sex education playlist.  These short, engaging, and often funny videos cover topics including puberty, relationships, consent, sexual orientation, gender identity, body image and much more.  Adapted for use in south and east Africa and Latin America, South Korea and Hungary, these videos reach young people with inclusive, affirming and honest sex education regardless of where they live or what school they attend. For more information contact Ashley@advocatesforyouth.org</span></p><span data-dcnode-id="2003" instrument_node="">

</span><h5 data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Kikis With Louie</span></h5><span data-dcnode-id="1893" instrument_node="">
</span><div class="description" data-dcnode-id="1888"><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Kikis with Louie is a video series designed by and for young gay men of color and trans teens to provide community, dialogue and education regarding relationships, intimacy, consent, HIV and STDs and advocacy.  The videos are short and engaging and feature Advocates’ Director of LGBT Health and Rights, Louie Ortiz-Fonseca, speaking with celebrities, sports stars, social media influencers, LGBTQ icons and young people from cities across the country.  Tune in on our YouTube channel.  For more information contact Lincoln@advocatesforyouth.org</span></p><span data-dcnode-id="1889" instrument_node="">

</span><h5 data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Future of Sex Education (FoSE)</span></h5><span data-dcnode-id="1810" instrument_node="">
</span><div class="description" data-dcnode-id="1805"><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">The Future of Sex Education (FoSE) is a collaboration between Advocates for Youth, Answer, and SIECUS.  Founded in 2007, FoSE’s mission is to create an enabling national climate to spur the implementation of honest sex education in our nations schools. In the years since FoSE’s founding the group has advocated vociferously against abstinence-only education and in support of more comprehensive approaches. Contributions to the field include the ground-breaking National Sexuality Education Standards and the National Pre-Service Standards for Sexuality Education, designed to help Institutes of Higher Learning improve the course content they offer their health and physical education teacher-candidates.  Most recently, FoSE convened the national and state organizations providing teacher training in sexuality education to launch the Sex Education Collaborative.  The Collaborative is working to shift the paradigm in teacher training from one focused on individual curricula to training that builds educators’ skills to effectively teach sex education regardless of the grade they teach or the curriculum they use. </span></p><span data-dcnode-id="1806" instrument_node="">

</span><h5 data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">School Health Equity</span></h5><span data-dcnode-id="1784" instrument_node="">
</span><div class="description" data-dcnode-id="1779"><span data-dcnode-id="1783" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">The School Health Equity program assists state and local education agencies (SEAs) to increase their capacity to implement quality sexual health education and provide or link to sexual and mental health services students so often need. Staff currently has two five year cooperative agreements to provide technical assistance, training and resources on these topics to school districts across the country.</span></p><span data-dcnode-id="1780" instrument_node="">

</span><h5 data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Contraceptive Access for Highly Vulnerable Youth</span></h5><span data-dcnode-id="1758" instrument_node="">
</span><div class="description" data-dcnode-id="1753"><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Advocates is working in three cities in the United States, Atlanta, Tucson and Washington DC to design and test family planning service delivery models that improve uptake of contraception by highly vulnerable youth.  In Atlanta, Advocates is working with refugee youth, in Tucson with youth who are in drug treatment or other government agencies, and in Washington DC, staff is working to improve pediatrician’s willingness and ability to provide contraceptives to the teens they serve. Staff provides resources, training, technical assistance and evaluation consultation to assess the impact of these models and their potential to be scaled.  For more information contact Laura@advocatesforyouth.org</span></p><span data-dcnode-id="1754" instrument_node="">

</span><h5 data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Sex Education Teacher Training</span></h5><span data-dcnode-id="1708" instrument_node="">
</span><div class="description" data-dcnode-id="1703"><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Advocates offers a comprehensive, K-12th grade sex education curriculum, Rights, Respect, Responsibility.  The curriculum is free and available for download. Its lesson plans are mapped to the National Sexuality Education Standards and it is LGBTQ inclusive, trauma informed and culturally responsive. For most sexuality education teachers, no training is necessary to use the curriculum.  Advocates does offer sex education training to school districts and for individuals.  Training can be done in person or can be done through the assistance of a virtual classroom and student avatars.  For more information contact Nora@advocatesforyouth.org</span></p><span data-dcnode-id="1704" instrument_node="">

</span><h5 data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Assisting Providers in the Global South</span></h5><span data-dcnode-id="1658" instrument_node="">
</span><div class="description" data-dcnode-id="1653"><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Advocates works with youth-led organizations and those serving youth in low- and middle-income countries.  Staff provides training, technical assistance and resources on sexuality education, youth-adult partnerships, gender equity, contraceptive access, HIV prevention, treatment and care and LGBTQ health and rights.  For more information contact Nicole@advocatesforyouth.org.</span></p><span data-dcnode-id="1654" instrument_node="">

</span><h5 data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Queer and Gender Equity Project (QGEP)</span></h5><span data-dcnode-id="1608" instrument_node="">
</span><div class="description" data-dcnode-id="1603"><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Lesbian, gay, bisexual, transgender, and questioning (LGBTQ) youth of color are at disproportionate risk for negative sexual health outcomes and face stigma related to race/ethnicity, sexual orientation, and/or gender identity.  This stigma places LGBTQ youth of color at risk for contracting STIs and HIV, violence, and substance abuse. In order to be part of the solution, Advocates launched its Queer and Gender Equity Project (QGEP) almost 10 years ago, formerly known as the Anti-Homophobia and Transphobia Project. The QGEP seeks to build the capacity of organizations interested in and committed to improving the sexual health of all young people, including LGBTQ youth of color. Past partners include a number of adolescent health and sexuality education organizations. 

The goals of Advocates for Youth’s Queer &amp; Gender Equity Project are to: 
Build the capacity of youth-serving professionals to serve LGBTQ youth of color; 
Create safe spaces for LGBTQ youth of color; and 
Redress homophobia and transphobia within the local community (i.e., schools, agencies, community, etc.)

For more information contact Armonte Butler at queerequity@advocatesforyouth.org.
</span></p><span data-dcnode-id="1604" instrument_node="">

</span><h5 data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Rights, Respect, Responsibility, a K-12th Grade Comprehensive Sexuality Education Curriculum.</span></h5><span data-dcnode-id="1525" instrument_node="">
</span><div class="description" data-dcnode-id="1520"><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">This K-12 comprehensive sex education curriculum is fully mapped to the National Sexuality Education Standards, covers all 16 topics deemed essential by the Centers for Disease Control and Prevention, is LGBTQ-inclusive, trauma informed and culturally responsive.
Training is not necessary to use the curriculum, but is available.
</span></p><span data-dcnode-id="1521" instrument_node="">

</span><h5 data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Get Your Life</span></h5><span data-dcnode-id="1511" instrument_node="">
</span><div class="description" data-dcnode-id="1506"><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">This evidence-informed HIV prevention intervention is designed for community based organizations to implement on weekends or afterschool hours for Black and Latino Young Men Who Have Sex with Men, ages 16-19.  Adapted from Many Men, Many Voices the curriculum is trauma informed and culturally responsive.  Evaluation show statistically significant improvements in participants HIV knowledge and intention to reduce risk from pre to post test. </span></p><span data-dcnode-id="1507" instrument_node="">
</span></div><span data-dcnode-id="1504" instrument_node="">

</span><div class="single-row" data-dcnode-id="1421"><span data-dcnode-id="1500" instrument_node="">
</span><h5 data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Policy and Communications </span></h5><span data-dcnode-id="1497" instrument_node="">
</span><div class="description" data-dcnode-id="1492"><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Advocates staff provides technical assistance, training and resources to national, state and local organizations regarding youth-centered reproductive and sexual health/rights/justice public policy and communications. Policy staff drafts model legislation and policy briefs, tracks and provides in-depth policy analysis, and can support partners in building out advocacy strategies to improve policies and practices at the federal, state and local level. In addition, communications staff can assist with talking points, public speaking training and training regarding media outreach. Staff is also available to assist organizations wishing to raise the visibility of young people and their experiences and needs through social or traditional media. For more information about public policy assistance contact Diana@advocatesforyouth.org. For more information about communications assistance contact Emily@advocatesforyouth.org</span></p><span data-dcnode-id="1493" instrument_node="">
