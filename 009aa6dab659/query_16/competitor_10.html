" data-mesh-id="comp-krysicwdinlineContent" data-testid="inline-content"><div data-dcnode-id="394" data-mesh-id="comp-krysicwdinlineContent-gridContainer" data-testid="mesh-container-content"><div class="_2Hij5" data-dcnode-id="395" data-testid="richTextElement" id="comp-ky8rbrug"><p class="font_8" data-dcnode-id="430" style="font-size:28px;"><span data-dcnode-id="431" style="color:#3E2FC4;"><span data-dcnode-id="432" style="font-weight:bold;"><span data-dcnode-id="433" style="font-size:28px;"><span data-dcnode-id="434" style="font-family:avenir-lt-w01_35-light1475496,avenir-lt-w05_35-light,sans-serif;"><span data-dcnode-id="435" instrument_node="">ABOUT&nbsp;</span></span></span></span></span></p><span data-dcnode-id="429" instrument_node="">
</span><p class="font_8" data-dcnode-id="425" style="font-size:20px; text-align:center;"><span data-dcnode-id="426" style="font-size:20px;"><span class="wixGuard" data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">​</span></span></span></p><span data-dcnode-id="424" instrument_node="">
</span><p class="font_8" data-dcnode-id="421" style="font-size:20px;"><span data-dcnode-id="422" style="font-size:20px;"><span data-dcnode-id="423" instrument_node="">We are...</span></span></p><span data-dcnode-id="420" instrument_node="">
</span><p class="font_8" data-dcnode-id="417" style="font-size:20px;"><span data-dcnode-id="418" style="font-size:20px;"><span data-dcnode-id="419" instrument_node="">... a small team of up to 9 female volunteers in northern France with support from remote team members</span></span></p><span data-dcnode-id="416" instrument_node="">
</span><p class="font_8" data-dcnode-id="413" style="font-size:20px;"><span data-dcnode-id="414" style="font-size:20px;"><span data-dcnode-id="415" instrument_node="">... the only charity specialised in supporting displaced women on the border between</span></span></p><span data-dcnode-id="412" instrument_node="">
</span><p class="font_8" data-dcnode-id="409" style="font-size:20px;"><span data-dcnode-id="410" style="font-size:20px;"><span data-dcnode-id="411" instrument_node="">France and England</span></span></p><span data-dcnode-id="408" instrument_node="">
</span><p class="font_8" data-dcnode-id="401" style="font-size:20px;"><span data-dcnode-id="402" style="font-size:20px;"><span data-dcnode-id="407" instrument_node="">... a mobile service, operating from vehicles. We once had a day centre, for more information, read up on our </span><span data-dcnode-id="404" style="text-decoration:underline;"><a data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dunkirkrefugeewomenscentre.com/her-story" target="_self"><span data-dcnode-id="406" instrument_node="">Her-story</span></a></span><span data-dcnode-id="403" instrument_node="">.</span></span></p><span data-dcnode-id="400" instrument_node="">
</span><p class="font_8" data-dcnode-id="396" style="font-size:20px;"><span data-dcnode-id="397" style="font-size:20px;"><span class="wixGuard" data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">​</span></span></span></p></div></div></div></div></div></section><div class="_1Q9if" data-dcnode-id="384" data-testid="richTextElement" id="comp-kryt91ty"><h1 class="font_0" data-dcnode-id="385" style="font-size:35px; text-align:center;"><span data-dcnode-id="386" style="font-size:35px;"><span data-dcnode-id="387" style="color:#F27979;"><span data-dcnode-id="388" style="font-weight:bold;"><span data-dcnode-id="389" instrument_node="">Mission</span></span></span></span></h1></div><div class="_2Hij5" data-dcnode-id="368" data-testid="richTextElement" id="comp-krxkgb9c"><p class="font_8" data-dcnode-id="380" style="font-size:18px;"><span data-dcnode-id="381" style="font-size:18px;"><span data-dcnode-id="382" style="font-family:raleway,sans-serif;"><span data-dcnode-id="383" instrument_node="">Our aim and purpose is to ensure close and holistic support to displaced women and families. We do so by going on the ground every day, where people are living and staying, to spend time with them, by organising activities (such as arts and crafts and English classes), by fulfilling their material needs on an individual basis, and by connecting them to professional organisations for more specialised needs (medical, legal, or psychological). Recognising that “basic needs” includes mental health and well-being, we serve as a moral support, and create dedicated spaces where women can feel comfortable, whether their wish is to talk to someone or to be left alone.</span></span></span></p><span data-dcnode-id="379" instrument_node="">
</span><p class="font_8" data-dcnode-id="374" style="font-size:18px;"><span data-dcnode-id="375" style="font-size:18px;"><span data-dcnode-id="376" style="font-family:raleway,sans-serif;"><span class="wixGuard" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="373" instrument_node="">
</span><p class="font_8" data-dcnode-id="369" style="font-size:18px;"><span data-dcnode-id="370" style="font-size:18px;"><span data-dcnode-id="371" style="font-family:raleway,sans-serif;"><span data-dcnode-id="372" instrument_node="">The options available to displaced people for shelter and accommodation go up and down at different times. Since no adequate housing is provided to displaced communities by state authorities (offering an alternative to informal camps), we advocate for access to shelter. This has been done through paying for hotel nights, creating and managing a network of citizen accommodation, orienting people into state accommodation and continuing to support them there, and working on advocacy projects to better the living conditions and to increase the number of spaces in the state-provided accommodation.</span></span></span></p></div><div class="_1Q9if" data-dcnode-id="362" data-testid="richTextElement" id="comp-krxkbs6v"><h1 class="font_0" data-dcnode-id="363" style="font-size:35px; text-align:center;"><span data-dcnode-id="364" style="font-size:35px;"><span data-dcnode-id="365" style="color:#F27979;"><span data-dcnode-id="366" style="font-weight:bold;"><span data-dcnode-id="367" instrument_node="">The people we support</span></span></span></span></h1></div><div class="_2Hij5" data-dcnode-id="296" data-testid="richTextElement" id="comp-krytb6bc"><p class="font_8" data-dcnode-id="357" style="font-size:18px; line-height:normal;"><span data-dcnode-id="358" style="letter-spacing:normal;"><span data-dcnode-id="359" style="font-size:18px;"><span data-dcnode-id="360" style="font-family:raleway,sans-serif;"><span data-dcnode-id="361" instrument_node="">We support women and families: this includes parents with their children; unaccompanied women; single parents; and families who have become separated during their journey. They come from many different countries and backgrounds and there are many reasons why they have left their home countries. One thing in common is that they are all still looking for suitable place to build a home and create a secure future.&nbsp;</span></span></span></span></p><span data-dcnode-id="356" instrument_node="">
</span><p class="font_8" data-dcnode-id="351" style="font-size:18px; line-height:normal;"><span data-dcnode-id="352" style="letter-spacing:normal;"><span data-dcnode-id="353" style="font-size:18px;"><span data-dcnode-id="354" style="font-family:raleway,sans-serif;"><span data-dcnode-id="355" instrument_node="">​</span></span></span></span></p><span data-dcnode-id="350" instrument_node="">
</span><p class="font_8" data-dcnode-id="345" style="font-size:18px; line-height:normal;"><span data-dcnode-id="346" style="letter-spacing:normal;"><span data-dcnode-id="347" style="font-size:18px;"><span data-dcnode-id="348" style="font-family:raleway,sans-serif;"><span data-dcnode-id="349" instrument_node="">It is estimated that up to 70% of people arriving to northern France already have unfinished or failed asylum claims in other EU member states, and this is reflected in the families we encounter. Many have experienced long and difficult journeys from their home countries and through the European asylum system. Amongst the displaced populations here, stories of rape, torture, and repeat victimisation at the hands of both states and members of the smuggling network are not uncommon.</span></span></span></span></p><span data-dcnode-id="344" instrument_node="">
</span><p class="font_8" data-dcnode-id="339" style="font-size:18px; line-height:normal;"><span data-dcnode-id="340" style="letter-spacing:normal;"><span data-dcnode-id="341" style="font-size:18px;"><span data-dcnode-id="342" style="font-family:raleway,sans-serif;"><span data-dcnode-id="343" instrument_node="">&nbsp;</span></span></span></span></p><span data-dcnode-id="338" instrument_node="">
</span><p class="font_8" data-dcnode-id="333" style="font-size:18px; line-height:normal;"><span data-dcnode-id="334" style="letter-spacing:normal;"><span data-dcnode-id="335" style="font-size:18px;"><span data-dcnode-id="336" style="font-family:raleway,sans-serif;"><span data-dcnode-id="337" instrument_node="">The displaced women and families we support experience multiple barriers to education, justice, healthcare and other rights. They live with either limited or no access to adequate shelter, and often rely on NGOs to provide the material means to survive. Many experience regular police evictions of their living sites, a result of a state policy of deterrence and invisibilisation&nbsp; The continued presence of displaced women and families in northern France points to both their own resilience and the futility of this policy.</span></span></span></span></p><span data-dcnode-id="332" instrument_node="">
</span><p class="font_8" data-dcnode-id="326" style="font-size:18px; line-height:normal;"><span data-dcnode-id="327" style="letter-spacing:normal;"><span data-dcnode-id="328" style="font-size:18px;"><span data-dcnode-id="329" style="font-family:raleway,sans-serif;"><span class="wixGuard" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">​</span></span></span></span></span></p><span data-dcnode-id="325" instrument_node="">
</span><p class="font_8" data-dcnode-id="319" style="font-size:18px; line-height:normal;"><span data-dcnode-id="320" style="letter-spacing:normal;"><span data-dcnode-id="321" style="font-size:18px;"><span data-dcnode-id="322" style="font-family:raleway,sans-serif;"><span class="wixGuard" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">​</span></span></span></span></span></p><span data-dcnode-id="318" instrument_node="">
