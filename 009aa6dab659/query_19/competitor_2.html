</span><blockquote data-dcnode-id="3153"><a class="link-target" data-dcnode-id="3195" id="article1.body1.sec3.sec1.sec5.disp-quote1.p1" name="article1.body1.sec3.sec1.sec5.disp-quote1.p1"></a><p data-dcnode-id="3155"><span data-dcnode-id="3194" instrument_node="">"</span><em data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">[…] The traditional doctors who come from the country of origin</span></em><span data-dcnode-id="3191" instrument_node="">, </span><em data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">they give traditional medicine to the workers</span></em><span data-dcnode-id="3188" instrument_node="">. </span><em data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">[</span></em><span data-dcnode-id="3185" instrument_node="">…</span><em data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">] They may give a placebo</span></em><span data-dcnode-id="3182" instrument_node="">, </span><em data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">sugar water</span></em><span data-dcnode-id="3179" instrument_node="">, </span><em data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">[</span></em><span data-dcnode-id="3176" instrument_node="">…</span><em data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">] or ‘jamu’ [traditional herbs] to workers</span></em><span data-dcnode-id="3173" instrument_node="">. </span><em data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">It is like an alternative healthcare system for workers</span></em><span data-dcnode-id="3170" instrument_node="">. </span><em data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">So</span></em><span data-dcnode-id="3167" instrument_node="">, </span><em data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">if you can’t afford high fees in the clinic</span></em><span data-dcnode-id="3164" instrument_node="">, </span><em data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">then they have access to these people</span></em><span data-dcnode-id="3161" instrument_node="">, </span><em data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">especially if you are undocumented</span></em><span data-dcnode-id="3158" instrument_node="">.</span><em data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">" CSO-1</span></em></p><span data-dcnode-id="3154" instrument_node="">
</span></blockquote><span data-dcnode-id="3152" instrument_node="">
</span><a class="link-target" data-dcnode-id="3151" id="article1.body1.sec3.sec1.sec5.p2" name="article1.body1.sec3.sec1.sec5.p2"></a><p data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">Because of exorbitant OOPs, participants shared that migrant workers avoid treatment, often presenting late and in critical condition. Participants felt that poor outcomes may have been prevented if the workers sought medical treatment earlier.</span></p><span data-dcnode-id="3148" instrument_node="">
</span><blockquote data-dcnode-id="3114"><a class="link-target" data-dcnode-id="3147" id="article1.body1.sec3.sec1.sec5.disp-quote2.p1" name="article1.body1.sec3.sec1.sec5.disp-quote2.p1"></a><p data-dcnode-id="3116"><span data-dcnode-id="3146" instrument_node="">“</span><em data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">That group that don’t have any [health] coverage</span></em><span data-dcnode-id="3143" instrument_node="">, </span><em data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">they avoid coming [to the clinic] because they can’t afford it</span></em><span data-dcnode-id="3140" instrument_node="">. </span><em data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">They know they don’t have enough money</span></em><span data-dcnode-id="3137" instrument_node="">, </span><em data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">then they try to wait</span></em><span data-dcnode-id="3134" instrument_node="">, </span><em data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">to prolong and then come a bit later</span></em><span data-dcnode-id="3131" instrument_node="">. </span><em data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">And then sometimes</span></em><span data-dcnode-id="3128" instrument_node="">, </span><em data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">the problem might worsen</span></em><span data-dcnode-id="3125" instrument_node="">, </span><em data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">and [</span></em><span data-dcnode-id="3122" instrument_node="">…</span><em data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">] it costs more to solve it then actually solving it at the beginning</span></em><span data-dcnode-id="3119" instrument_node="">.</span><em data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">” MD-2</span></em></p><span data-dcnode-id="3115" instrument_node="">
</span></blockquote><span data-dcnode-id="3113" instrument_node="">
</span><a class="link-target" data-dcnode-id="3112" id="article1.body1.sec3.sec1.sec5.p3" name="article1.body1.sec3.sec1.sec5.p3"></a><p data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">Differential pricing for foreigners and high OOP payments at public facilities was perceived as unfair.</span></p><span data-dcnode-id="3109" instrument_node="">
</span><blockquote data-dcnode-id="3072"><a class="link-target" data-dcnode-id="3108" id="article1.body1.sec3.sec1.sec5.disp-quote3.p1" name="article1.body1.sec3.sec1.sec5.disp-quote3.p1"></a><p data-dcnode-id="3074"><span data-dcnode-id="3107" instrument_node="">"</span><em data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">We also fear going to the [public] hospital or clinic</span></em><span data-dcnode-id="3104" instrument_node="">. </span><em data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">At hospitals</span></em><span data-dcnode-id="3101" instrument_node="">, </span><em data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">there is a double charge</span></em><span data-dcnode-id="3098" instrument_node="">. </span><em data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">For example</span></em><span data-dcnode-id="3095" instrument_node="">, </span><em data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">if local pay MYR 100 (USD 23)</span></em><span data-dcnode-id="3092" instrument_node="">, </span><em data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">we pay MYR 200 (USD 47)</span></em><span data-dcnode-id="3089" instrument_node="">. </span><em data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">If local pay MYR 500 (USD 116)</span></em><span data-dcnode-id="3086" instrument_node="">, </span><em data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">the foreign worker pays MYR 1000 (USD 233)</span></em><span data-dcnode-id="3083" instrument_node="">. </span><em data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">So expensive</span></em><span data-dcnode-id="3080" instrument_node="">. </span><em data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">Double the cost</span></em><span data-dcnode-id="3077" instrument_node="">.</span><em data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">" MW-4 (translated from Malay)</span></em></p><span data-dcnode-id="3073" instrument_node="">
</span></blockquote><span data-dcnode-id="3071" instrument_node="">
</span><a class="link-target" data-dcnode-id="3070" id="article1.body1.sec3.sec1.sec5.p4" name="article1.body1.sec3.sec1.sec5.p4"></a><p data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">Participants expressed that the fear of exorbitant hospital charges was the main reason given by migrant workers for avoiding public facilities, other than the requirement of legal documents.</span></p><span data-dcnode-id="3067" instrument_node="">
</span></div><span data-dcnode-id="3065" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="3010" id="section6"><a class="link-target" data-dcnode-id="3064" id="sec018" name="sec018" title="Ability to pay affects doctors management"></a><h4 data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">Ability to pay affects doctors management.</span></h4><a class="link-target" data-dcnode-id="3061" id="article1.body1.sec3.sec1.sec6.p1" name="article1.body1.sec3.sec1.sec6.p1"></a><p data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">Medical doctors interviewed shared that in the case of migrant workers, doctors are often forced to make management decisions based on the patient’s ability to pay. Resource constraints compromise the doctor’s ability to provide the best clinical care as needed.</span></p><span data-dcnode-id="3058" instrument_node="">
</span><blockquote data-dcnode-id="3012"><a class="link-target" data-dcnode-id="3057" id="article1.body1.sec3.sec1.sec6.disp-quote1.p1" name="article1.body1.sec3.sec1.sec6.disp-quote1.p1"></a><p data-dcnode-id="3014"><span data-dcnode-id="3056" instrument_node="">“</span><em data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">I have seen patients in the worst-case scenario</span></em><span data-dcnode-id="3053" instrument_node="">, </span><em data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">[…]</span></em><span data-dcnode-id="3050" instrument_node="">, </span><em data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">maybe requiring intubation</span></em><span data-dcnode-id="3047" instrument_node="">, </span><em data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">requiring CT scan</span></em><span data-dcnode-id="3044" instrument_node="">, </span><em data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">or very high dose antibiotics</span></em><span data-dcnode-id="3041" instrument_node="">, </span><em data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">which are expensive</span></em><span data-dcnode-id="3038" instrument_node="">. </span><em data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">And</span></em><span data-dcnode-id="3035" instrument_node="">, </span><em data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">each time we want to consider treatment</span></em><span data-dcnode-id="3032" instrument_node="">, </span><em data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">we would have to consider who would pay for this treatment</span></em><span data-dcnode-id="3029" instrument_node="">. </span><em data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">So</span></em><span data-dcnode-id="3026" instrument_node="">, </span><em data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">there is a lot of delay in a lot of cases</span></em><span data-dcnode-id="3023" instrument_node="">. </span><em data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">Of course</span></em><span data-dcnode-id="3020" instrument_node="">, </span><em data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">the patient’s welfare will be compromised because our hands are tied</span></em><span data-dcnode-id="3017" instrument_node="">.</span><em data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">” MD-3</span></em></p><span data-dcnode-id="3013" instrument_node="">
</span></blockquote><span data-dcnode-id="3011" instrument_node="">
</span></div><span data-dcnode-id="3009" instrument_node="">
</span></div><span data-dcnode-id="3007" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2741" id="section2"><a class="link-target" data-dcnode-id="3006" id="sec019" name="sec019" title="Undocumented migrants, legal status and healthcare"></a><span data-dcnode-id="3005" instrument_node="">
</span><h3 data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">Undocumented migrants, legal status and healthcare</span></h3><span data-dcnode-id="3002" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2935" id="section1"><a class="link-target" data-dcnode-id="3001" id="sec020" name="sec020" title="Access to healthcare is linked to immigration status"></a><h4 data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">Access to healthcare is linked to immigration status.</span></h4><a class="link-target" data-dcnode-id="2998" id="article1.body1.sec3.sec2.sec1.p1" name="article1.body1.sec3.sec2.sec1.p1"></a><p data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">Participants revealed that the lack of legal documents, like valid passports and work permits, are a major barrier to accessing care at public facilities. Patients are routinely asked to produce these documents at the registration counters of public facilities. Healthcare workers are obliged to inform the police or the immigration department when they encounter undocumented migrants. Some public hospitals have police and immigration counters located on their premises. Hence, undocumented migrants are detained and taken to immigration detention centres after receipt of emergency treatment. Participants declared that the perceived close cooperation between the health ministry and the immigration department essentially denies undocumented workers healthcare access at public hospitals.</span></p><span data-dcnode-id="2995" instrument_node="">
</span><blockquote data-dcnode-id="2961"><a class="link-target" data-dcnode-id="2994" id="article1.body1.sec3.sec2.sec1.disp-quote1.p1" name="article1.body1.sec3.sec2.sec1.disp-quote1.p1"></a><p data-dcnode-id="2963"><span data-dcnode-id="2993" instrument_node="">“</span><em data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">[Migrant workers] need documents at the public clinics</span></em><span data-dcnode-id="2990" instrument_node="">. </span><em data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Without documents</span></em><span data-dcnode-id="2987" instrument_node="">, </span><em data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">they don’t treat you</span></em><span data-dcnode-id="2984" instrument_node="">. </span><em data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">And now</span></em><span data-dcnode-id="2981" instrument_node="">, </span><em data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">most [public] hospitals have Immigration Desks inside</span></em><span data-dcnode-id="2978" instrument_node="">. </span><em data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Because they say the ‘undocumented’ will come and then after they seek treatment</span></em><span data-dcnode-id="2975" instrument_node="">, </span><em data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">they run off</span></em><span data-dcnode-id="2972" instrument_node="">. </span><em data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">When the person who is ‘undocumented’ comes to see [the doctor]</span></em><span data-dcnode-id="2969" instrument_node="">, </span><em data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">they will refer them to the Immigration Desk</span></em><span data-dcnode-id="2966" instrument_node="">.</span><em data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">” CSO-2</span></em></p><span data-dcnode-id="2962" instrument_node="">
</span></blockquote><span data-dcnode-id="2960" instrument_node="">
</span><a class="link-target" data-dcnode-id="2959" id="article1.body1.sec3.sec2.sec1.p2" name="article1.body1.sec3.sec2.sec1.p2"></a><p data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">Despite mandatory reporting requirements, participants agreed that most medical doctors in public hospitals provided necessary emergency care irrespective of the patient’s immigration status or ability to pay.</span></p><span data-dcnode-id="2956" instrument_node="">
</span><blockquote data-dcnode-id="2937"><a class="link-target" data-dcnode-id="2955" id="article1.body1.sec3.sec2.sec1.disp-quote2.p1" name="article1.body1.sec3.sec2.sec1.disp-quote2.p1"></a><p data-dcnode-id="2939"><span data-dcnode-id="2954" instrument_node="">“</span><em data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">We just resuscitate</span></em><span data-dcnode-id="2951" instrument_node="">. </span><em data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Whatever we think we need to do we just do first</span></em><span data-dcnode-id="2948" instrument_node="">, </span><em data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">regardless of whatever documentation or payment</span></em><span data-dcnode-id="2945" instrument_node="">. </span><em data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">After the emergency treatment is given then later the hospital admin [administration] will deal with it [</span></em><span data-dcnode-id="2942" instrument_node="">…</span><em data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">]” MD-4</span></em></p><span data-dcnode-id="2938" instrument_node="">
</span></blockquote><span data-dcnode-id="2936" instrument_node="">
</span></div><span data-dcnode-id="2934" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2831" id="section2"><a class="link-target" data-dcnode-id="2933" id="sec021" name="sec021" title="Private clinics do not check documents"></a><h4 data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">Private clinics do not check documents.</span></h4><a class="link-target" data-dcnode-id="2930" id="article1.body1.sec3.sec2.sec2.p1" name="article1.body1.sec3.sec2.sec2.p1"></a><p data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">Overall, most participants explained that migrant workers prefer to use private clinics for basic medical care. Private clinics generally treat all patients without discriminating based on immigration status.</span></p><span data-dcnode-id="2927" instrument_node="">
</span><blockquote data-dcnode-id="2908"><a class="link-target" data-dcnode-id="2926" id="article1.body1.sec3.sec2.sec2.disp-quote1.p1" name="article1.body1.sec3.sec2.sec2.disp-quote1.p1"></a><p data-dcnode-id="2910"><span data-dcnode-id="2925" instrument_node="">“</span><em data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">At private clinics</span></em><span data-dcnode-id="2922" instrument_node="">, </span><em data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">they don’t ask if you have a [work] permit or you don’t have a permit</span></em><span data-dcnode-id="2919" instrument_node="">. </span><em data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">In government clinics</span></em><span data-dcnode-id="2916" instrument_node="">, </span><em data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">they definitely will see if you have a permit or not</span></em><span data-dcnode-id="2913" instrument_node="">.</span><em data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">” TU-2</span></em></p><span data-dcnode-id="2909" instrument_node="">
</span></blockquote><span data-dcnode-id="2907" instrument_node="">
</span><a class="link-target" data-dcnode-id="2906" id="article1.body1.sec3.sec2.sec2.p2" name="article1.body1.sec3.sec2.sec2.p2"></a><p data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">This participant also said that doctors in the private sector do not report undocumented patients because it is not their role. He emphasised that the role of the doctor is to treat patients.</span></p><span data-dcnode-id="2903" instrument_node="">
</span><blockquote data-dcnode-id="2878"><a class="link-target" data-dcnode-id="2902" id="article1.body1.sec3.sec2.sec2.disp-quote2.p1" name="article1.body1.sec3.sec2.sec2.disp-quote2.p1"></a><p data-dcnode-id="2880"><span data-dcnode-id="2901" instrument_node="">‴</span><em data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">We [doctors in private clinics] do not report them to immigration […]</span></em><span data-dcnode-id="2898" instrument_node="">. </span><em data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">It is only treatment</span></em><span data-dcnode-id="2895" instrument_node="">. </span><em data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">That is our part</span></em><span data-dcnode-id="2892" instrument_node="">. </span><em data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">So</span></em><span data-dcnode-id="2889" instrument_node="">, </span><em data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">the medical part is the only thing we handle</span></em><span data-dcnode-id="2886" instrument_node="">. </span><em data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">We don’t handle immigration issues at all</span></em><span data-dcnode-id="2883" instrument_node="">.</span><em data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">" MD-2</span></em></p><span data-dcnode-id="2879" instrument_node="">
</span></blockquote><span data-dcnode-id="2877" instrument_node="">
</span><a class="link-target" data-dcnode-id="2876" id="article1.body1.sec3.sec2.sec2.p3" name="article1.body1.sec3.sec2.sec2.p3"></a><p data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">Some interviewed described doctors treating undocumented patients as taking a professional risk. Others explained that doctors at private facilities are often reluctant to treat undocumented workers in emergencies.</span></p><span data-dcnode-id="2873" instrument_node="">
</span><blockquote data-dcnode-id="2833"><a class="link-target" data-dcnode-id="2872" id="article1.body1.sec3.sec2.sec2.disp-quote3.p1" name="article1.body1.sec3.sec2.sec2.disp-quote3.p1"></a><p data-dcnode-id="2835"><span data-dcnode-id="2871" instrument_node="">“</span><em data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">It’s also dangerous you know</span></em><span data-dcnode-id="2868" instrument_node="">. </span><em data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">You as a practising doctor</span></em><span data-dcnode-id="2865" instrument_node="">, </span><em data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">you treat the person</span></em><span data-dcnode-id="2862" instrument_node="">, </span><em data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">and then the person died</span></em><span data-dcnode-id="2859" instrument_node="">. </span><em data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">How are you going to be accountable for it</span></em><span data-dcnode-id="2856" instrument_node="">? </span><em data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">Because he or she has got no documents</span></em><span data-dcnode-id="2853" instrument_node="">, </span><em data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">you are putting yourself and your profession in jeopardy</span></em><span data-dcnode-id="2850" instrument_node="">. </span><em data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">Some would say</span></em><span data-dcnode-id="2847" instrument_node="">, </span><em data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">'No</span></em><span data-dcnode-id="2844" instrument_node="">! </span><em data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">It’s my rice bowl</span></em><span data-dcnode-id="2841" instrument_node="">, </span><em data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">I wouldn’t want to'</span></em><span data-dcnode-id="2838" instrument_node="">.</span><em data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">” CSO-3</span></em></p><span data-dcnode-id="2834" instrument_node="">
</span></blockquote><span data-dcnode-id="2832" instrument_node="">
</span></div><span data-dcnode-id="2830" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2787" id="section3"><a class="link-target" data-dcnode-id="2829" id="sec022" name="sec022" title="Undocumented workers may falsify documents to seek care"></a><h4 data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">Undocumented workers may falsify documents to seek care.</span></h4><a class="link-target" data-dcnode-id="2826" id="article1.body1.sec3.sec2.sec3.p1" name="article1.body1.sec3.sec2.sec3.p1"></a><p data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">Participants shared that undocumented workers in desperation may resort to fraud, falsifying documents to obtain needed care.</span></p><span data-dcnode-id="2823" instrument_node="">
</span><blockquote data-dcnode-id="2789"><a class="link-target" data-dcnode-id="2822" id="article1.body1.sec3.sec2.sec3.disp-quote1.p1" name="article1.body1.sec3.sec2.sec3.disp-quote1.p1"></a><p data-dcnode-id="2791"><span data-dcnode-id="2821" instrument_node="">“</span><em data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">In a situation where medical attention is needed</span></em><span data-dcnode-id="2818" instrument_node="">, </span><em data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">but he or she doesn’t have documentation</span></em><span data-dcnode-id="2815" instrument_node="">, </span><em data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">[…] so they just photostat the passport</span></em><span data-dcnode-id="2812" instrument_node="">, </span><em data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">but the photo they change</span></em><span data-dcnode-id="2809" instrument_node="">. </span><em data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">So</span></em><span data-dcnode-id="2806" instrument_node="">, </span><em data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">it’s a different person</span></em><span data-dcnode-id="2803" instrument_node="">, </span><em data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">in order to access</span></em><span data-dcnode-id="2800" instrument_node="">. </span><em data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">If you are in their situation</span></em><span data-dcnode-id="2797" instrument_node="">, </span><em data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">you would do anything creative to seek medical attention</span></em><span data-dcnode-id="2794" instrument_node="">.</span><em data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">” CSO-3</span></em></p><span data-dcnode-id="2790" instrument_node="">
</span></blockquote><span data-dcnode-id="2788" instrument_node="">
</span></div><span data-dcnode-id="2786" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2743" id="section4"><a class="link-target" data-dcnode-id="2785" id="sec023" name="sec023" title="Undocumented workers avoid hospital care"></a><h4 data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">Undocumented workers avoid hospital care.</span></h4><a class="link-target" data-dcnode-id="2782" id="article1.body1.sec3.sec2.sec4.p1" name="article1.body1.sec3.sec2.sec4.p1"></a><p data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">Participants shared that undocumented migrants are likely to avoid necessary hospital care and are often only brought in to hospital either unconscious or critically ill. Participants also spoke of the consequences of not seeking treatment. This participant’s account illustrates unnecessary deaths caused by healthcare avoidance.</span></p><span data-dcnode-id="2779" instrument_node="">
</span><blockquote data-dcnode-id="2745"><a class="link-target" data-dcnode-id="2778" id="article1.body1.sec3.sec2.sec4.disp-quote1.p1" name="article1.body1.sec3.sec2.sec4.disp-quote1.p1"></a><p data-dcnode-id="2747"><span data-dcnode-id="2777" instrument_node="">“</span><em data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">And some of them that are undocumented</span></em><span data-dcnode-id="2774" instrument_node="">, </span><em data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">they normally [</span></em><span data-dcnode-id="2771" instrument_node="">…</span><em data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">] just died in their workplace</span></em><span data-dcnode-id="2768" instrument_node="">. </span><em data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">They can’t seek treatment</span></em><span data-dcnode-id="2765" instrument_node="">. </span><em data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">They just stay in the sawmill</span></em><span data-dcnode-id="2762" instrument_node="">, </span><em data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">plantation [</span></em><span data-dcnode-id="2759" instrument_node="">…</span><em data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">] that they are in</span></em><span data-dcnode-id="2756" instrument_node="">. </span><em data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">They would just go off [die]</span></em><span data-dcnode-id="2753" instrument_node="">. </span><em data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">Just like that</span></em><span data-dcnode-id="2750" instrument_node="">.</span><em data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">” CSO-3</span></em></p><span data-dcnode-id="2746" instrument_node="">
</span></blockquote><span data-dcnode-id="2744" instrument_node="">
</span></div><span data-dcnode-id="2742" instrument_node="">
</span></div><span data-dcnode-id="2740" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2291" id="section3"><a class="link-target" data-dcnode-id="2739" id="sec024" name="sec024" title="Language barriers"></a><span data-dcnode-id="2738" instrument_node="">
</span><h3 data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Language barriers</span></h3><span data-dcnode-id="2735" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2644" id="section1"><a class="link-target" data-dcnode-id="2734" id="sec025" name="sec025" title="Inability to communicate is a major obstacle"></a><h4 data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">Inability to communicate is a major obstacle.</span></h4><a class="link-target" data-dcnode-id="2731" id="article1.body1.sec3.sec3.sec1.p1" name="article1.body1.sec3.sec3.sec1.p1"></a><p data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">Most participants maintained that language and communication is a major obstacle faced by both migrant workers and healthcare providers. Migrant workers in Malaysia come from different Asian countries. Participants spoke about the difficulties faced by the different nationalities.</span></p><span data-dcnode-id="2728" instrument_node="">
</span><blockquote data-dcnode-id="2694"><a class="link-target" data-dcnode-id="2727" id="article1.body1.sec3.sec3.sec1.disp-quote1.p1" name="article1.body1.sec3.sec3.sec1.disp-quote1.p1"></a><p data-dcnode-id="2696"><span data-dcnode-id="2726" instrument_node="">“</span><em data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">Language also is a problem</span></em><span data-dcnode-id="2723" instrument_node="">. </span><em data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">For Indonesian</span></em><span data-dcnode-id="2720" instrument_node="">, </span><em data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">they have</span></em><span data-dcnode-id="2717" instrument_node="">, </span><em data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">I think</span></em><span data-dcnode-id="2714" instrument_node="">, </span><em data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">not a lot of problems</span></em><span data-dcnode-id="2711" instrument_node="">. </span><em data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">But</span></em><span data-dcnode-id="2708" instrument_node="">, </span><em data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">other countries like Bangladeshi</span></em><span data-dcnode-id="2705" instrument_node="">, </span><em data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">Myanmar</span></em><span data-dcnode-id="2702" instrument_node="">, </span><em data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">they have a lot of difficulties when meeting with the local doctor</span></em><span data-dcnode-id="2699" instrument_node="">.</span><em data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">” CSO-1</span></em></p><span data-dcnode-id="2695" instrument_node="">
</span></blockquote><span data-dcnode-id="2693" instrument_node="">
</span><a class="link-target" data-dcnode-id="2692" id="article1.body1.sec3.sec3.sec1.p2" name="article1.body1.sec3.sec3.sec1.p2"></a><p data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">One participant explained that even Indonesian nationals may have difficulty communicating with Malaysian doctors. Even though the Indonesian national language (Bahasa Indonesia) is similar to Bahasa Malaysia, not all Indonesians are conversant in Bahasa Indonesia. Also, subtle differences between Bahasa Malaysia and Bahasa Indonesia could easily result in misinterpretation.</span></p><span data-dcnode-id="2689" instrument_node="">
</span><blockquote data-dcnode-id="2646"><a class="link-target" data-dcnode-id="2688" id="article1.body1.sec3.sec3.sec1.disp-quote2.p1" name="article1.body1.sec3.sec3.sec1.disp-quote2.p1"></a><p data-dcnode-id="2648"><span data-dcnode-id="2687" instrument_node="">“</span><em data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">[The Indonesians]</span></em><span data-dcnode-id="2684" instrument_node="">, </span><em data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">they also have a barrier of the language to describe their situation</span></em><span data-dcnode-id="2681" instrument_node="">. </span><em data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">Of course</span></em><span data-dcnode-id="2678" instrument_node="">, </span><em data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">when we talk about those people from Java and Jakarta</span></em><span data-dcnode-id="2675" instrument_node="">, </span><em data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">they are very fluent in Bahasa Indonesia</span></em><span data-dcnode-id="2672" instrument_node="">. </span><em data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">But</span></em><span data-dcnode-id="2669" instrument_node="">, </span><em data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Indonesia</span></em><span data-dcnode-id="2666" instrument_node="">, </span><em data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">is a very diverse country</span></em><span data-dcnode-id="2663" instrument_node="">. </span><em data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">They are more than 250 languages spoken</span></em><span data-dcnode-id="2660" instrument_node="">. </span><em data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">[</span></em><span data-dcnode-id="2657" instrument_node="">…</span><em data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">] We always assume Bahasa Malaysia and Bahasa Indonesia is the same</span></em><span data-dcnode-id="2654" instrument_node="">, </span><em data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">but they are not</span></em><span data-dcnode-id="2651" instrument_node="">.</span><em data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">” IO-1</span></em></p><span data-dcnode-id="2647" instrument_node="">
</span></blockquote><span data-dcnode-id="2645" instrument_node="">
</span></div><span data-dcnode-id="2643" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2594" id="section2"><a class="link-target" data-dcnode-id="2642" id="sec026" name="sec026" title="Language barriers affect doctor’s treatment of migrant workers"></a><h4 data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Language barriers affect doctor’s treatment of migrant workers.</span></h4><a class="link-target" data-dcnode-id="2639" id="article1.body1.sec3.sec3.sec2.p1" name="article1.body1.sec3.sec3.sec2.p1"></a><p data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">One participant shared that the inability to communicate often frustrates medical professionals, resulting in impatience and sometimes brusque treatment of migrant workers.</span></p><span data-dcnode-id="2636" instrument_node="">
</span><blockquote data-dcnode-id="2596"><a class="link-target" data-dcnode-id="2635" id="article1.body1.sec3.sec3.sec2.disp-quote1.p1" name="article1.body1.sec3.sec3.sec2.disp-quote1.p1"></a><p data-dcnode-id="2598"><span data-dcnode-id="2634" instrument_node="">“</span><em data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">[…] the terms that he or she use</span></em><span data-dcnode-id="2631" instrument_node="">, </span><em data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">may not be what you [the medical doctor] think it is</span></em><span data-dcnode-id="2628" instrument_node="">. </span><em data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">That is also another hindrance</span></em><span data-dcnode-id="2625" instrument_node="">. </span><em data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">You get so irritated</span></em><span data-dcnode-id="2622" instrument_node="">. </span><em data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">You start scolding him or her</span></em><span data-dcnode-id="2619" instrument_node="">. </span><em data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">And then</span></em><span data-dcnode-id="2616" instrument_node="">, </span><em data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">he [migrant worker] starts having a phobia</span></em><span data-dcnode-id="2613" instrument_node="">, </span><em data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">‘Waa</span></em><span data-dcnode-id="2610" instrument_node="">, </span><em data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">I come to seek help but now I get a scolding</span></em><span data-dcnode-id="2607" instrument_node="">. </span><em data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">Next round when I get sick</span></em><span data-dcnode-id="2604" instrument_node="">, </span><em data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">I won’t come again’</span></em><span data-dcnode-id="2601" instrument_node="">.</span><em data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">” CSO-3</span></em></p><span data-dcnode-id="2597" instrument_node="">
</span></blockquote><span data-dcnode-id="2595" instrument_node="">
</span></div><span data-dcnode-id="2593" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2505" id="section3"><a class="link-target" data-dcnode-id="2592" id="sec027" name="sec027" title="Language barriers lead to medication errors"></a><h4 data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Language barriers lead to medication errors.</span></h4><a class="link-target" data-dcnode-id="2589" id="article1.body1.sec3.sec3.sec3.p1" name="article1.body1.sec3.sec3.sec3.p1"></a><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">As described by participants, communication difficulties may be hazardous. This participant revealed that migrants often complain of perceived medication errors.</span></p><span data-dcnode-id="2586" instrument_node="">
</span><blockquote data-dcnode-id="2540"><a class="link-target" data-dcnode-id="2585" id="article1.body1.sec3.sec3.sec3.disp-quote1.p1" name="article1.body1.sec3.sec3.sec3.disp-quote1.p1"></a><p data-dcnode-id="2542"><span data-dcnode-id="2584" instrument_node="">“</span><em data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">I went to the clinic the other day because I had fever</span></em><span data-dcnode-id="2581" instrument_node="">. </span><em data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">I told the doctor I had fever</span></em><span data-dcnode-id="2578" instrument_node="">. </span><em data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">The doctor gave me an injection</span></em><span data-dcnode-id="2575" instrument_node="">, </span><em data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">after that I could not walk for 5 hours</span></em><span data-dcnode-id="2572" instrument_node="">! </span><em data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">After that</span></em><span data-dcnode-id="2569" instrument_node="">, </span><em data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">I went back to the clinic and confronted the doctor</span></em><span data-dcnode-id="2566" instrument_node="">. </span><em data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">He apologised and admitted he gave me the wrong medication</span></em><span data-dcnode-id="2563" instrument_node="">. </span><em data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">[…] A lot of migrants have gone to the hospital</span></em><span data-dcnode-id="2560" instrument_node="">, </span><em data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">and the doctor gives the wrong medication</span></em><span data-dcnode-id="2557" instrument_node="">. </span><em data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">This is what happens when you can’t speak the language</span></em><span data-dcnode-id="2554" instrument_node="">. </span><em data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Migrants always complain [of this]</span></em><span data-dcnode-id="2551" instrument_node="">. </span><em data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">Sometimes it’s very serious</span></em><span data-dcnode-id="2548" instrument_node="">. </span><em data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Someone could die</span></em><span data-dcnode-id="2545" instrument_node="">.</span><em data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">” MW-4 (translated from Malay)</span></em></p><span data-dcnode-id="2541" instrument_node="">
</span></blockquote><span data-dcnode-id="2539" instrument_node="">
</span><a class="link-target" data-dcnode-id="2538" id="article1.body1.sec3.sec3.sec3.p2" name="article1.body1.sec3.sec3.sec3.p2"></a><p data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">While migrants themselves may be incapable of detecting medication errors, they sometimes perceive treatment to be ineffective or harmful. Participants expressed concern as doctors are unable to properly explain to migrants about their illness or give appropriate advice on treatment. Miscommunication and errors have resulted in the migrant workers’ mistrust of healthcare professionals.</span></p><span data-dcnode-id="2535" instrument_node="">
</span><blockquote data-dcnode-id="2507"><a class="link-target" data-dcnode-id="2534" id="article1.body1.sec3.sec3.sec3.disp-quote2.p1" name="article1.body1.sec3.sec3.sec3.disp-quote2.p1"></a><p data-dcnode-id="2509"><span data-dcnode-id="2533" instrument_node="">“</span><em data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">Sometimes I have a headache</span></em><span data-dcnode-id="2530" instrument_node="">, </span><em data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">but the doctor gives me medication for stomach pain</span></em><span data-dcnode-id="2527" instrument_node="">. </span><em data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">[</span></em><span data-dcnode-id="2524" instrument_node="">…</span><em data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">] I think the doctor doesn’t understand our Bahasa [language]</span></em><span data-dcnode-id="2521" instrument_node="">. </span><em data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">When we are sick the doctor does not explain what’s wrong with us</span></em><span data-dcnode-id="2518" instrument_node="">. </span><em data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">We don’t know what the doctor is thinking […]</span></em><span data-dcnode-id="2515" instrument_node="">. </span><em data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">But he still gives us medicine</span></em><span data-dcnode-id="2512" instrument_node="">.</span><em data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">” MW-4 (translated from Malay)</span></em></p><span data-dcnode-id="2508" instrument_node="">
</span></blockquote><span data-dcnode-id="2506" instrument_node="">
</span></div><span data-dcnode-id="2504" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2443" id="section4"><a class="link-target" data-dcnode-id="2503" id="sec028" name="sec028" title="Language barriers lead to lack of consent"></a><h4 data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Language barriers lead to lack of consent.</span></h4><a class="link-target" data-dcnode-id="2500" id="article1.body1.sec3.sec3.sec4.p1" name="article1.body1.sec3.sec3.sec4.p1"></a><p data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">The language barrier restricts a doctor’s ability to properly explain procedures and obtain informed consent, resulting in misunderstanding, distress and migrant workers’ mistrust of medical professionals.</span></p><span data-dcnode-id="2497" instrument_node="">
</span><blockquote data-dcnode-id="2484"><a class="link-target" data-dcnode-id="2496" id="article1.body1.sec3.sec3.sec4.disp-quote1.p1" name="article1.body1.sec3.sec3.sec4.disp-quote1.p1"></a><p data-dcnode-id="2486"><span data-dcnode-id="2495" instrument_node="">“</span><em data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">The injured worker said he explained many times to his employer and the doctor [that he did not want amputation]</span></em><span data-dcnode-id="2492" instrument_node="">. </span><em data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">But they didn’t understand him</span></em><span data-dcnode-id="2489" instrument_node="">. </span><em data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">He doesn’t know why they still amputated his arm […]” TU-2 (translated from Malay)</span></em></p><span data-dcnode-id="2485" instrument_node="">
</span></blockquote><span data-dcnode-id="2483" instrument_node="">
</span><a class="link-target" data-dcnode-id="2482" id="article1.body1.sec3.sec3.sec4.p2" name="article1.body1.sec3.sec3.sec4.p2"></a><p data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">The medical doctors interviewed expressed disbelief when told of migrant workers’ accounts of unauthorised procedures. Those interviewed denied this sort of practice.</span></p><span data-dcnode-id="2479" instrument_node="">
</span><blockquote data-dcnode-id="2445"><a class="link-target" data-dcnode-id="2478" id="article1.body1.sec3.sec3.sec4.disp-quote2.p1" name="article1.body1.sec3.sec3.sec4.disp-quote2.p1"></a><p data-dcnode-id="2447"><span data-dcnode-id="2477" instrument_node="">“</span><em data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">In my practice</span></em><span data-dcnode-id="2474" instrument_node="">, </span><em data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">I’ll explain properly</span></em><span data-dcnode-id="2471" instrument_node="">. </span><em data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Because</span></em><span data-dcnode-id="2468" instrument_node="">, </span><em data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">even though it is a verbal consent</span></em><span data-dcnode-id="2465" instrument_node="">, </span><em data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">I’ll make sure that at least the patient [can understand]</span></em><span data-dcnode-id="2462" instrument_node="">. </span><em data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">If the patient cannot understand</span></em><span data-dcnode-id="2459" instrument_node="">, </span><em data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">the family members or the employer understands the consent</span></em><span data-dcnode-id="2456" instrument_node="">. </span><em data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Because it’s very important</span></em><span data-dcnode-id="2453" instrument_node="">. </span><em data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">Because they may sue us later</span></em><span data-dcnode-id="2450" instrument_node="">, </span><em data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">we don’t know […]” MD-4</span></em></p><span data-dcnode-id="2446" instrument_node="">
</span></blockquote><span data-dcnode-id="2444" instrument_node="">
</span></div><span data-dcnode-id="2442" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2293" id="section5"><a class="link-target" data-dcnode-id="2441" id="sec029" name="sec029" title="Strategies to overcome language barriers"></a><h4 data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">Strategies to overcome language barriers.</span></h4><a class="link-target" data-dcnode-id="2438" id="article1.body1.sec3.sec3.sec5.p1" name="article1.body1.sec3.sec3.sec5.p1"></a><p data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">The doctors interviewed also felt that communication with the migrant worker is a major problem. Some migrant workers bring companions, who act as informal interpreters. Doctors also attempt to find informal interpreters among their staff. As healthcare services in Malaysia do not provide formal interpreters, medical doctors are forced to be inventive, using Google Translate, sign language or even mimes to communicate with foreign patients.</span></p><span data-dcnode-id="2435" instrument_node="">
</span><blockquote data-dcnode-id="2389"><a class="link-target" data-dcnode-id="2434" id="article1.body1.sec3.sec3.sec5.disp-quote1.p1" name="article1.body1.sec3.sec3.sec5.disp-quote1.p1"></a><p data-dcnode-id="2391"><span data-dcnode-id="2433" instrument_node="">“</span><em data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">[Communication] is very</span></em><span data-dcnode-id="2430" instrument_node="">, </span><em data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">very difficult</span></em><span data-dcnode-id="2427" instrument_node="">. </span><em data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">It's literally sign language and acting out the illness</span></em><span data-dcnode-id="2424" instrument_node="">, </span><em data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">and all sorts of things</span></em><span data-dcnode-id="2421" instrument_node="">. </span><em data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">If they bring a friend who can speak either English or Malay</span></em><span data-dcnode-id="2418" instrument_node="">, </span><em data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">then they become the translator [</span></em><span data-dcnode-id="2415" instrument_node="">…</span><em data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">]</span></em><span data-dcnode-id="2412" instrument_node="">. </span><em data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">If they come alone or they bring another friend</span></em><span data-dcnode-id="2409" instrument_node="">, </span><em data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">[who] also don’t know anything about language</span></em><span data-dcnode-id="2406" instrument_node="">, </span><em data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">and then we find it very tough</span></em><span data-dcnode-id="2403" instrument_node="">. </span><em data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Literally</span></em><span data-dcnode-id="2400" instrument_node="">, </span><em data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">it’s sign language</span></em><span data-dcnode-id="2397" instrument_node="">. </span><em data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">Now we even [use] Google Translate</span></em><span data-dcnode-id="2394" instrument_node="">.</span><em data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">” MD-2</span></em></p><span data-dcnode-id="2390" instrument_node="">
</span></blockquote><span data-dcnode-id="2388" instrument_node="">
</span><a class="link-target" data-dcnode-id="2387" id="article1.body1.sec3.sec3.sec5.p2" name="article1.body1.sec3.sec3.sec5.p2"></a><p data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Medical doctors often rely on Google Translate, but this is not always the best option. This doctor described that illiterate workers and those from rural areas, find the language spoken on Google Translate unfamiliar.</span></p><span data-dcnode-id="2384" instrument_node="">
</span><blockquote data-dcnode-id="2359"><a class="link-target" data-dcnode-id="2383" id="article1.body1.sec3.sec3.sec5.disp-quote2.p1" name="article1.body1.sec3.sec3.sec5.disp-quote2.p1"></a><p data-dcnode-id="2361"><span data-dcnode-id="2382" instrument_node="">“</span><em data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Some of them cannot read</span></em><span data-dcnode-id="2379" instrument_node="">, </span><em data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">so we have to use the voice [a function of Google Translate]</span></em><span data-dcnode-id="2376" instrument_node="">. </span><em data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Sometimes the sound they can't understand</span></em><span data-dcnode-id="2373" instrument_node="">. </span><em data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">These fellows might be from the outskirts</span></em><span data-dcnode-id="2370" instrument_node="">, </span><em data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">with a different dialect</span></em><span data-dcnode-id="2367" instrument_node="">. </span><em data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">They won’t be able to understand</span></em><span data-dcnode-id="2364" instrument_node="">.</span><em data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">” MD-2</span></em></p><span data-dcnode-id="2360" instrument_node="">
</span></blockquote><span data-dcnode-id="2358" instrument_node="">
</span><a class="link-target" data-dcnode-id="2357" id="article1.body1.sec3.sec3.sec5.p3" name="article1.body1.sec3.sec3.sec5.p3"></a><p data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Doctors interviewed shared their attempts to learn key phrases in various Asian languages to better converse with foreign patients.</span></p><span data-dcnode-id="2354" instrument_node="">
</span><blockquote data-dcnode-id="2338"><a class="link-target" data-dcnode-id="2353" id="article1.body1.sec3.sec3.sec5.disp-quote3.p1" name="article1.body1.sec3.sec3.sec5.disp-quote3.p1"></a><p data-dcnode-id="2340"><span data-dcnode-id="2352" instrument_node="">"</span><em data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Over the years</span></em><span data-dcnode-id="2349" instrument_node="">, </span><em data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">I have picked up a few words here and there in various languages</span></em><span data-dcnode-id="2346" instrument_node="">, </span><em data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">so I can conduct my history taking and examination</span></em><span data-dcnode-id="2343" instrument_node="">.</span><em data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">"MD-1</span></em></p><span data-dcnode-id="2339" instrument_node="">
</span></blockquote><span data-dcnode-id="2337" instrument_node="">
</span><a class="link-target" data-dcnode-id="2336" id="article1.body1.sec3.sec3.sec5.p4" name="article1.body1.sec3.sec3.sec5.p4"></a><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">Medical doctors at hospitals attempt to contact co-workers or employers to obtain a better history. Participants shared that they sometimes need to contact the police to find employers. Because of language barriers, doctors are forced to treat patients based on clinical presentation, without adequate history-taking.</span></p><span data-dcnode-id="2333" instrument_node="">
</span><blockquote data-dcnode-id="2299"><a class="link-target" data-dcnode-id="2332" id="article1.body1.sec3.sec3.sec5.disp-quote4.p1" name="article1.body1.sec3.sec3.sec5.disp-quote4.p1"></a><p data-dcnode-id="2301"><span data-dcnode-id="2331" instrument_node="">“</span><em data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">Some of them</span></em><span data-dcnode-id="2328" instrument_node="">, </span><em data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">if they are legal</span></em><span data-dcnode-id="2325" instrument_node="">, </span><em data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">they will have their passport or their identity card</span></em><span data-dcnode-id="2322" instrument_node="">. </span><em data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">We will be able to either track them down through immigration or through the police if we are unable to get a phone number</span></em><span data-dcnode-id="2319" instrument_node="">. </span><em data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">If they do have a phone number</span></em><span data-dcnode-id="2316" instrument_node="">, </span><em data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">we will try to call to see whether the employer would be contactable</span></em><span data-dcnode-id="2313" instrument_node="">. </span><em data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">[…] the employers might not answer a phone call coming from the hospital</span></em><span data-dcnode-id="2310" instrument_node="">. </span><em data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">A lot of times</span></em><span data-dcnode-id="2307" instrument_node="">, </span><em data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">we get excuses that they are too busy to come and attend to their worker</span></em><span data-dcnode-id="2304" instrument_node="">.</span><em data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">” MD-3</span></em></p><span data-dcnode-id="2300" instrument_node="">
</span></blockquote><span data-dcnode-id="2298" instrument_node="">
</span><a class="link-target" data-dcnode-id="2297" id="article1.body1.sec3.sec3.sec5.p5" name="article1.body1.sec3.sec3.sec5.p5"></a><p data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">One participant expressed frustration that employers seldom sends anyone to accompany workers when they seek treatment. Participants expressed that if workers were accompanied by a local or someone familiar with the language, they would have fewer problems communicating with health staff.</span></p><span data-dcnode-id="2294" instrument_node="">
</span></div><span data-dcnode-id="2292" instrument_node="">
</span></div><span data-dcnode-id="2290" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2121" id="section4"><a class="link-target" data-dcnode-id="2289" id="sec030" name="sec030" title="Discrimination and xenophobia"></a><span data-dcnode-id="2288" instrument_node="">
</span><h3 data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Discrimination and xenophobia</span></h3><span data-dcnode-id="2285" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2197" id="section1"><a class="link-target" data-dcnode-id="2284" id="sec031" name="sec031" title="Xenophobia is not specific to the healthcare setting"></a><h4 data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Xenophobia is not specific to the healthcare setting.</span></h4><a class="link-target" data-dcnode-id="2281" id="article1.body1.sec3.sec4.sec1.p1" name="article1.body1.sec3.sec4.sec1.p1"></a><p data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">One participant spoke of the animosity experienced by non-citizens everywhere in Malaysia. In her opinion, the healthcare setting is no different than others, in its treatment of non-citizens.</span></p><span data-dcnode-id="2278" instrument_node="">
</span><blockquote data-dcnode-id="2250"><a class="link-target" data-dcnode-id="2277" id="article1.body1.sec3.sec4.sec1.disp-quote1.p1" name="article1.body1.sec3.sec4.sec1.disp-quote1.p1"></a><p data-dcnode-id="2252"><span data-dcnode-id="2276" instrument_node="">"</span><em data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">[Discrimination] actually is not only related to healthcare</span></em><span data-dcnode-id="2273" instrument_node="">. </span><em data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">We see xenophobia everywhere</span></em><span data-dcnode-id="2270" instrument_node="">. </span><em data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">When we go to the shopping market</span></em><span data-dcnode-id="2267" instrument_node="">, </span><em data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">any place where locals meet us</span></em><span data-dcnode-id="2264" instrument_node="">, </span><em data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">they act like we are from another planet</span></em><span data-dcnode-id="2261" instrument_node="">. </span><em data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Like we are dirty or something like that</span></em><span data-dcnode-id="2258" instrument_node="">. </span><em data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">This is the real situation</span></em><span data-dcnode-id="2255" instrument_node="">.</span><em data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">" MW-1</span></em></p><span data-dcnode-id="2251" instrument_node="">
</span></blockquote><span data-dcnode-id="2249" instrument_node="">
</span><a class="link-target" data-dcnode-id="2248" id="article1.body1.sec3.sec4.sec1.p2" name="article1.body1.sec3.sec4.sec1.p2"></a><p data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">One participant shared that migrant workers are sensitive to the way locals address them and speak to them. According to this participant, most Malaysian’s are unaware that certain words used regularly may be construed by migrants as derogatory.</span></p><span data-dcnode-id="2245" instrument_node="">
</span><blockquote data-dcnode-id="2199"><a class="link-target" data-dcnode-id="2244" id="article1.body1.sec3.sec4.sec1.disp-quote2.p1" name="article1.body1.sec3.sec4.sec1.disp-quote2.p1"></a><p data-dcnode-id="2201"><span data-dcnode-id="2243" instrument_node="">“</span><em data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">[…] many of us do not understand the sentiment</span></em><span data-dcnode-id="2240" instrument_node="">. </span><em data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">When you call them ‘Indon’</span></em><span data-dcnode-id="2237" instrument_node="">, </span><em data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">it is a humiliating salutation</span></em><span data-dcnode-id="2234" instrument_node="">. </span><em data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Just like you call a Bangladeshi</span></em><span data-dcnode-id="2231" instrument_node="">, </span><em data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">as ‘Bangla’</span></em><span data-dcnode-id="2228" instrument_node="">. </span><em data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">For them</span></em><span data-dcnode-id="2225" instrument_node="">, </span><em data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">if you call them ‘Indon’</span></em><span data-dcnode-id="2222" instrument_node="">, </span><em data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">it is not an appropriate salutation for them</span></em><span data-dcnode-id="2219" instrument_node="">. </span><em data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Of course</span></em><span data-dcnode-id="2216" instrument_node="">, </span><em data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">our people are used to it</span></em><span data-dcnode-id="2213" instrument_node="">, </span><em data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">even their people also call themselves ‘Indon’</span></em><span data-dcnode-id="2210" instrument_node="">. </span><em data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">But those educated Indonesian</span></em><span data-dcnode-id="2207" instrument_node="">, </span><em data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">they take it as the stigma of humiliation</span></em><span data-dcnode-id="2204" instrument_node="">.</span><em data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">” IO-1</span></em></p><span data-dcnode-id="2200" instrument_node="">
</span></blockquote><span data-dcnode-id="2198" instrument_node="">
</span></div><span data-dcnode-id="2196" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2159" id="section2"><a class="link-target" data-dcnode-id="2195" id="sec032" name="sec032" title="Perception that checking documents at hospitals is discriminatory"></a><h4 data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">Perception that checking documents at hospitals is discriminatory.</span></h4><a class="link-target" data-dcnode-id="2192" id="article1.body1.sec3.sec4.sec2.p1" name="article1.body1.sec3.sec4.sec2.p1"></a><p data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Front-line hospital workers are generally tasked with examining the workers’ documents, an administrative process which migrants fear. One participant described the scrutiny of documents as a discrimination faced by migrant workers at the healthcare settings.</span></p><span data-dcnode-id="2189" instrument_node="">
</span><blockquote data-dcnode-id="2161"><a class="link-target" data-dcnode-id="2188" id="article1.body1.sec3.sec4.sec2.disp-quote1.p1" name="article1.body1.sec3.sec4.sec2.disp-quote1.p1"></a><p data-dcnode-id="2163"><span data-dcnode-id="2187" instrument_node="">“</span><em data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">[…] after the nurse registers</span></em><span data-dcnode-id="2184" instrument_node="">, </span><em data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">they will report to the police</span></em><span data-dcnode-id="2181" instrument_node="">. </span><em data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Police are on duty there</span></em><span data-dcnode-id="2178" instrument_node="">. </span><em data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">They will check on their screen</span></em><span data-dcnode-id="2175" instrument_node="">, </span><em data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">[to see] whether they are documented and undocumented</span></em><span data-dcnode-id="2172" instrument_node="">. </span><em data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">[</span></em><span data-dcnode-id="2169" instrument_node="">…</span><em data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">] This is actually one of the discriminations they are facing</span></em><span data-dcnode-id="2166" instrument_node="">.</span><em data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">” CSO-1</span></em></p><span data-dcnode-id="2162" instrument_node="">
</span></blockquote><span data-dcnode-id="2160" instrument_node="">
</span></div><span data-dcnode-id="2158" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="2123" id="section3"><a class="link-target" data-dcnode-id="2157" id="sec033" name="sec033" title="Perception that medical doctors are negligent towards migrant workers"></a><h4 data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Perception that medical doctors are negligent towards migrant workers.</span></h4><a class="link-target" data-dcnode-id="2154" id="article1.body1.sec3.sec4.sec3.p1" name="article1.body1.sec3.sec4.sec3.p1"></a><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">One migrant worker interviewed articulated that Malaysian doctors treat migrant workers as if they were not of any consequence. This he felt was unfair, as workers’ pay hard-earned money and encounter many difficulties when seeking treatment.</span></p><span data-dcnode-id="2151" instrument_node="">
</span><blockquote data-dcnode-id="2129"><a class="link-target" data-dcnode-id="2150" id="article1.body1.sec3.sec4.sec3.disp-quote1.p1" name="article1.body1.sec3.sec4.sec3.disp-quote1.p1"></a><p data-dcnode-id="2131"><span data-dcnode-id="2149" instrument_node="">“</span><em data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">I don’t always understand why</span></em><span data-dcnode-id="2146" instrument_node="">. </span><em data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">[…] I think Malaysian doctors look at migrants like [they don’t matter]</span></em><span data-dcnode-id="2143" instrument_node="">. </span><em data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">If sick or any problem also he doesn’t care</span></em><span data-dcnode-id="2140" instrument_node="">. </span><em data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">It doesn’t matter […]</span></em><span data-dcnode-id="2137" instrument_node="">. </span><em data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">But this is wrong</span></em><span data-dcnode-id="2134" instrument_node="">.</span><em data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">” MW-4 (translated from Malay)</span></em></p><span data-dcnode-id="2130" instrument_node="">
</span></blockquote><span data-dcnode-id="2128" instrument_node="">
</span><a class="link-target" data-dcnode-id="2127" id="article1.body1.sec3.sec4.sec3.p2" name="article1.body1.sec3.sec4.sec3.p2"></a><p data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Others interviewed felt that the failure of doctors to take migrant worker’s health concerns seriously may be attributed to their inability to communicate.</span></p><span data-dcnode-id="2124" instrument_node="">
</span></div><span data-dcnode-id="2122" instrument_node="">
</span></div><span data-dcnode-id="2120" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1864" id="section5"><a class="link-target" data-dcnode-id="2119" id="sec034" name="sec034" title="Physical barriers"></a><span data-dcnode-id="2118" instrument_node="">
</span><h3 data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Physical barriers</span></h3><span data-dcnode-id="2115" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1988" id="section1"><a class="link-target" data-dcnode-id="2114" id="sec035" name="sec035" title="Fear of harassment by authorities"></a><h4 data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Fear of harassment by authorities.</span></h4><a class="link-target" data-dcnode-id="2111" id="article1.body1.sec3.sec5.sec1.p1" name="article1.body1.sec3.sec5.sec1.p1"></a><p data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">Many participants expressed concern about the difficulties faced by migrant workers while travelling. According to those interviewed, both documented and undocumented migrant workers are frequently stopped by enforcement agents like the police, immigration or RELA, a paramilitary civil volunteers corps, with demands to inspect documents. This participant described migrant workers’ fear of harassment by the police:</span></p><span data-dcnode-id="2108" instrument_node="">
</span><blockquote data-dcnode-id="2023"><a class="link-target" data-dcnode-id="2107" id="article1.body1.sec3.sec5.sec1.disp-quote1.p1" name="article1.body1.sec3.sec5.sec1.disp-quote1.p1"></a><p data-dcnode-id="2025"><span data-dcnode-id="2106" instrument_node="">"</span><em data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Police his duty</span></em><span data-dcnode-id="2103" instrument_node="">, </span><em data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">he can anytime check</span></em><span data-dcnode-id="2100" instrument_node="">. </span><em data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">They will do the roadblock</span></em><span data-dcnode-id="2097" instrument_node="">. </span><em data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">[We] go anywhere with motorbike also</span></em><span data-dcnode-id="2094" instrument_node="">, </span><em data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">police can check [</span></em><span data-dcnode-id="2091" instrument_node="">…</span><em data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">]</span></em><span data-dcnode-id="2088" instrument_node="">. </span><em data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">We are migrants</span></em><span data-dcnode-id="2085" instrument_node="">, </span><em data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">he can check us</span></em><span data-dcnode-id="2082" instrument_node="">. </span><em data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">It is his duty what</span></em><span data-dcnode-id="2079" instrument_node="">? </span><em data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">[…] But</span></em><span data-dcnode-id="2076" instrument_node="">, </span><em data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">don't disturb</span></em><span data-dcnode-id="2073" instrument_node="">, </span><em data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">don't beat</span></em><span data-dcnode-id="2070" instrument_node="">, </span><em data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">don't catch</span></em><span data-dcnode-id="2067" instrument_node="">. </span><em data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">[…] People with permit also he wants to take money</span></em><span data-dcnode-id="2064" instrument_node="">. </span><em data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">He says</span></em><span data-dcnode-id="2061" instrument_node="">, </span><em data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">'Next time I'll catch you and send you to prison'</span></em><span data-dcnode-id="2058" instrument_node="">. </span><em data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">All sorts of threats</span></em><span data-dcnode-id="2055" instrument_node="">. </span><em data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">Of course</span></em><span data-dcnode-id="2052" instrument_node="">, </span><em data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">we're afraid</span></em><span data-dcnode-id="2049" instrument_node="">. </span><em data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">But isn't that the law</span></em><span data-dcnode-id="2046" instrument_node="">? </span><em data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">We also follow the law</span></em><span data-dcnode-id="2043" instrument_node="">. </span><em data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">If they are undocumented workers</span></em><span data-dcnode-id="2040" instrument_node="">, </span><em data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">can catch […]</span></em><span data-dcnode-id="2037" instrument_node="">. </span><em data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">But</span></em><span data-dcnode-id="2034" instrument_node="">, </span><em data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">the rest of us with permits</span></em><span data-dcnode-id="2031" instrument_node="">, </span><em data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">why do the police catch us</span></em><span data-dcnode-id="2028" instrument_node="">?</span><em data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">" MW-4 (Translated from Malay)</span></em></p><span data-dcnode-id="2024" instrument_node="">
</span></blockquote><span data-dcnode-id="2022" instrument_node="">
</span><a class="link-target" data-dcnode-id="2021" id="article1.body1.sec3.sec5.sec1.p2" name="article1.body1.sec3.sec5.sec1.p2"></a><p data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">One participant asserted that migrant workers are unwilling to travel far for treatment, preferring to pay for treatment at private clinics close to their living quarters, rather than travel to panel or public clinics located further away.</span></p><span data-dcnode-id="2018" instrument_node="">
