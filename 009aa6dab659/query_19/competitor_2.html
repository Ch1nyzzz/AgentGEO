</span><meta content="Background Malaysia is widely credited to have achieved universal health coverage for citizens. However, the accessibility of healthcare services to migrant workers is questionable. Recently, medical fees for foreigners at public facilities were substantially increased. Mandatory health insurance only covers public hospital admissions and excludes undocumented migrants. This study explores barriers to healthcare access faced by documented and undocumented migrant workers in Malaysia.   Methods We use qualitative data from 17 in-depth interviews conducted with key informants from civil society organisations, trade unions, academia, medical professionals, as well as migrant workers and their representatives. We interviewed doctors working in public hospitals and private clinics frequented by migrants. Data were analysed using thematic analysis.   Results We found that healthcare services in Malaysia are often inaccessible to migrant workers. Complex access barriers were identified, many beyond the control of the health sector. Major themes include affordability and financial constraints, the need for legal documents like valid passports and work permits, language barriers, discrimination and xenophobia, physical inaccessibility and employer-related barriers. Our study suggests that government mandated insurance for migrant workers is insufficient in view of the recent increase in medical fees. The perceived close working relationship between the ministries of health and immigration effectively excludes undocumented migrants from access to public healthcare facilities. Language barriers may affect the quality of care received by migrant workers, by inadvertently resulting in medical errors, while preventing them from giving truly informed consent.   Conclusions We propose instituting migrant-friendly health services at public facilities. We also suggest implementing a comprehensive health insurance to enable healthcare access and financial risk protection for all migrant workers. Non-health sector solutions include the formation of a multi-stakeholder migration management body towards a comprehensive national policy on labour migration which includes health." data-dcnode-id="5129" name="description"><span data-dcnode-id="5128" instrument_node="">

</span><div class="abstract toc-section abstract-type-" data-dcnode-id="4014" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="4063" data-toc="abstract0" id="abstract0" name="abstract0" title="Abstract"></a><h2 data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">Abstract</span></h2><div class="abstract-content" data-dcnode-id="4015"><span data-dcnode-id="4060" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="4050" id="section1"><a class="link-target" data-dcnode-id="4059" id="sec001" name="sec001" title="Background"></a><span data-dcnode-id="4058" instrument_node="">
</span><h3 data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">Background</span></h3><span data-dcnode-id="4055" instrument_node="">
</span><a class="link-target" data-dcnode-id="4054" id="article1.front1.article-meta1.abstract1.sec1.p1" name="article1.front1.article-meta1.abstract1.sec1.p1"></a><p data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">Malaysia is widely credited to have achieved universal health coverage for citizens. However, the accessibility of healthcare services to migrant workers is questionable. Recently, medical fees for foreigners at public facilities were substantially increased. Mandatory health insurance only covers public hospital admissions and excludes undocumented migrants. This study explores barriers to healthcare access faced by documented and undocumented migrant workers in Malaysia.</span></p><span data-dcnode-id="4051" instrument_node="">
</span></div><span data-dcnode-id="4049" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="4039" id="section2"><a class="link-target" data-dcnode-id="4048" id="sec002" name="sec002" title="Methods"></a><span data-dcnode-id="4047" instrument_node="">
</span><h3 data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">Methods</span></h3><span data-dcnode-id="4044" instrument_node="">
</span><a class="link-target" data-dcnode-id="4043" id="article1.front1.article-meta1.abstract1.sec2.p1" name="article1.front1.article-meta1.abstract1.sec2.p1"></a><p data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">We use qualitative data from 17 in-depth interviews conducted with key informants from civil society organisations, trade unions, academia, medical professionals, as well as migrant workers and their representatives. We interviewed doctors working in public hospitals and private clinics frequented by migrants. Data were analysed using thematic analysis.</span></p><span data-dcnode-id="4040" instrument_node="">
</span></div><span data-dcnode-id="4038" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="4028" id="section3"><a class="link-target" data-dcnode-id="4037" id="sec003" name="sec003" title="Results"></a><span data-dcnode-id="4036" instrument_node="">
</span><h3 data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">Results</span></h3><span data-dcnode-id="4033" instrument_node="">
</span><a class="link-target" data-dcnode-id="4032" id="article1.front1.article-meta1.abstract1.sec3.p1" name="article1.front1.article-meta1.abstract1.sec3.p1"></a><p data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">We found that healthcare services in Malaysia are often inaccessible to migrant workers. Complex access barriers were identified, many beyond the control of the health sector. Major themes include affordability and financial constraints, the need for legal documents like valid passports and work permits, language barriers, discrimination and xenophobia, physical inaccessibility and employer-related barriers. Our study suggests that government mandated insurance for migrant workers is insufficient in view of the recent increase in medical fees. The perceived close working relationship between the ministries of health and immigration effectively excludes undocumented migrants from access to public healthcare facilities. Language barriers may affect the quality of care received by migrant workers, by inadvertently resulting in medical errors, while preventing them from giving truly informed consent.</span></p><span data-dcnode-id="4029" instrument_node="">
</span></div><span data-dcnode-id="4027" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="4017" id="section4"><a class="link-target" data-dcnode-id="4026" id="sec004" name="sec004" title="Conclusions"></a><span data-dcnode-id="4025" instrument_node="">
</span><h3 data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">Conclusions</span></h3><span data-dcnode-id="4022" instrument_node="">
</span><a class="link-target" data-dcnode-id="4021" id="article1.front1.article-meta1.abstract1.sec4.p1" name="article1.front1.article-meta1.abstract1.sec4.p1"></a><p data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">We propose instituting migrant-friendly health services at public facilities. We also suggest implementing a comprehensive health insurance to enable healthcare access and financial risk protection for all migrant workers. Non-health sector solutions include the formation of a multi-stakeholder migration management body towards a comprehensive national policy on labour migration which includes health.</span></p><span data-dcnode-id="4018" instrument_node="">
</span></div><span data-dcnode-id="4016" instrument_node="">
</span></div></div><span data-dcnode-id="4013" instrument_node="">
</span><div class="articleinfo" data-dcnode-id="3975" xmlns:plos="http://plos.org"><p data-dcnode-id="4009"><strong data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">Citation: </span></strong><span data-dcnode-id="4010" instrument_node="">Loganathan T, Rui D, Ng C-W, Pocock NS (2019) Breaking down the barriers: Understanding migrant workers’ access to healthcare in Malaysia. PLoS ONE 14(7):
           e0218669.
        
        https://doi.org/10.1371/journal.pone.0218669</span></p><p data-dcnode-id="4005"><strong data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">Editor: </span></strong><span data-dcnode-id="4006" instrument_node="">M Barton Laws, Brown University, UNITED STATES</span></p><p data-dcnode-id="3995"><strong data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">Received: </span></strong><span data-dcnode-id="4002" instrument_node="">January 11, 2019; </span><strong data-dcnode-id="4000"><span data-dcnode-id="4001" instrument_node="">Accepted: </span></strong><span data-dcnode-id="3999" instrument_node="">June 6, 2019; </span><strong data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">Published: </span></strong><span data-dcnode-id="3996" instrument_node=""> July 3, 2019</span></p><p data-dcnode-id="3988"><strong data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">Copyright: </span></strong><span data-dcnode-id="3992" instrument_node=""> © 2019 Loganathan et al. This is an open access article distributed under the terms of the </span><a data-dcnode-id="3990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//creativecommons.org/licenses/by/4.0/"><span data-dcnode-id="3991" instrument_node="">Creative Commons Attribution License</span></a><span data-dcnode-id="3989" instrument_node="">, which permits unrestricted use, distribution, and reproduction in any medium, provided the original author and source are credited.</span></p><p data-dcnode-id="3984"><strong data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">Data Availability: </span></strong><span data-dcnode-id="3985" instrument_node="">All relevant data are within the manuscript and its Supporting Information files.</span></p><p data-dcnode-id="3980"><strong data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">Funding: </span></strong><span data-dcnode-id="3981" instrument_node="">This work is supported by The Atlantic Fellows for Health Equity in South East Asia based at The Equity Initiative, a program of the China Medical Board (grant number IF055-2018 awarded to Tharani Loganathan). The funders had no role in study design, data collection and analysis, decision to publish, or preparation of the manuscript.</span></p><p data-dcnode-id="3976"><strong data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">Competing interests: </span></strong><span data-dcnode-id="3977" instrument_node=""> The authors have declared that no competing interests exist.</span></p></div><span data-dcnode-id="3974" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="3817" id="section1" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="3973" data-toc="sec005" id="sec005" name="sec005" title="Introduction"></a><h2 data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">Introduction</span></h2><a class="link-target" data-dcnode-id="3970" id="article1.body1.sec1.p1" name="article1.body1.sec1.p1"></a><p data-dcnode-id="3959"><span data-dcnode-id="3969" instrument_node="">The fundamental right of every human being to enjoy the highest achievable standard of health is enshrined in the Constitution of the World Health Organization [</span><a class="ref-tip" data-dcnode-id="3967" href="#pone.0218669.ref001"><span data-dcnode-id="3968" instrument_node="">1</span></a><span data-dcnode-id="3966" instrument_node="">]. The rights-based approached to health is reaffirmed with the 2030 Agenda for Sustainable Development, which emphasises universal health coverage and health equity, articulated in the concept of “leave no one behind” [</span><a class="ref-tip" data-dcnode-id="3964" href="#pone.0218669.ref002"><span data-dcnode-id="3965" instrument_node="">2</span></a><span data-dcnode-id="3963" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="3961" href="#pone.0218669.ref003"><span data-dcnode-id="3962" instrument_node="">3</span></a><span data-dcnode-id="3960" instrument_node="">].</span></p><span data-dcnode-id="3958" instrument_node="">
</span><a class="link-target" data-dcnode-id="3957" id="article1.body1.sec1.p2" name="article1.body1.sec1.p2"></a><p data-dcnode-id="3946"><span data-dcnode-id="3956" instrument_node="">Migrant workers are a vulnerable group, often exposed to poor living and working conditions, facing discrimination and social exclusion, and lacking the power to negotiate for healthcare in receiving countries [</span><a class="ref-tip" data-dcnode-id="3954" href="#pone.0218669.ref004"><span data-dcnode-id="3955" instrument_node="">4</span></a><span data-dcnode-id="3953" instrument_node="">]. Receiving countries often restrict access to healthcare services to regular, documented migrants, which has adverse implications for both individual and population health [</span><a class="ref-tip" data-dcnode-id="3951" href="#pone.0218669.ref005"><span data-dcnode-id="3952" instrument_node="">5</span></a><span data-dcnode-id="3950" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="3948" href="#pone.0218669.ref007"><span data-dcnode-id="3949" instrument_node="">7</span></a><span data-dcnode-id="3947" instrument_node="">].</span></p><span data-dcnode-id="3945" instrument_node="">
</span><a class="link-target" data-dcnode-id="3944" id="article1.body1.sec1.p3" name="article1.body1.sec1.p3"></a><p data-dcnode-id="3915"><span data-dcnode-id="3943" instrument_node="">Malaysia is an upper middle-income country with a robust economy based on diverse, labour-intensive sectors. Malaysia is a net importer of foreign labour, with documented migrant workers consisting 15% of the labour force [</span><a class="ref-tip" data-dcnode-id="3941" href="#pone.0218669.ref008"><span data-dcnode-id="3942" instrument_node="">8</span></a><span data-dcnode-id="3940" instrument_node="">]. The Ministry of Home Affairs estimated 2.1 million regular, documented migrant workers in Malaysia in 2015 [</span><a class="ref-tip" data-dcnode-id="3938" href="#pone.0218669.ref009"><span data-dcnode-id="3939" instrument_node="">9</span></a><span data-dcnode-id="3937" instrument_node="">]. Due to their lack of legal status, irregular or undocumented migrants are invisible to policy-makers, thus their numbers remain contentious. Lee Hwok- Aun and Leng estimated a total of 3.85 to 5.3 million migrant workers in Malaysia in 2018, including undocumented workers [</span><a class="ref-tip" data-dcnode-id="3935" href="#pone.0218669.ref010"><span data-dcnode-id="3936" instrument_node="">10</span></a><span data-dcnode-id="3934" instrument_node="">]. At present, 15 countries supply labour to Malaysia, with the majority from Indonesia (39%), Nepal (24%), Bangladesh (13%) and Myanmar (7%). Migrants work in construction, agriculture and plantations, manufacturing, services and domestic work [</span><a class="ref-tip" data-dcnode-id="3932" href="#pone.0218669.ref009"><span data-dcnode-id="3933" instrument_node="">9</span></a><span data-dcnode-id="3931" instrument_node="">]. These are low-skill, low-wage jobs of less than MYR 2,000 (USD 465) per-month, unfavourable to citizens and crudely described as ‘Dirty’, ‘Difficult’ and ‘Dangerous’ (3Ds). Migrant workers are not to be confused with ‘expatriates’, a term used in Malaysia to denote foreigners employed in highly-skilled technical posts, middle- or top-managerial posts or professionals [</span><a class="ref-tip" data-dcnode-id="3929" href="#pone.0218669.ref011"><span data-dcnode-id="3930" instrument_node="">11</span></a><span data-dcnode-id="3928" instrument_node="">]. Despite being one of the largest migrant receiving countries in South East Asia [</span><a class="ref-tip" data-dcnode-id="3926" href="#pone.0218669.ref012"><span data-dcnode-id="3927" instrument_node="">12</span></a><span data-dcnode-id="3925" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="3923" href="#pone.0218669.ref013"><span data-dcnode-id="3924" instrument_node="">13</span></a><span data-dcnode-id="3922" instrument_node="">], Malaysia is not a signatory to the International Convention on the Protection of the Rights of All Migrant Workers and Members of Their Families [</span><a class="ref-tip" data-dcnode-id="3920" href="#pone.0218669.ref014"><span data-dcnode-id="3921" instrument_node="">14</span></a><span data-dcnode-id="3919" instrument_node="">]. Within the ASEAN region, only Indonesia and the Philippines, predominantly migrant sending countries, have ratified international treaties protecting the rights of migrant workers [</span><a class="ref-tip" data-dcnode-id="3917" href="#pone.0218669.ref015"><span data-dcnode-id="3918" instrument_node="">15</span></a><span data-dcnode-id="3916" instrument_node="">].</span></p><span data-dcnode-id="3914" instrument_node="">
</span><a class="link-target" data-dcnode-id="3913" id="article1.body1.sec1.p4" name="article1.body1.sec1.p4"></a><p data-dcnode-id="3896"><span data-dcnode-id="3912" instrument_node="">Malaysia has a mixed public-private healthcare system. The country is widely credited to have achieved universal health coverage through a tax-based public healthcare system, which guarantees access to care for citizens with minimal user fees. The private healthcare system is mainly for-profit and financed by fee-for-service [</span><a class="ref-tip" data-dcnode-id="3910" href="#pone.0218669.ref016"><span data-dcnode-id="3911" instrument_node="">16</span></a><span data-dcnode-id="3909" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="3907" href="#pone.0218669.ref017"><span data-dcnode-id="3908" instrument_node="">17</span></a><span data-dcnode-id="3906" instrument_node="">]. While public healthcare is highly subsidised for citizens, non-citizens are charged higher rates. Fees specific for non-citizens were first gazetted in 2003 and later substantially revised in 2014, to remove all elements of government subsidy [</span><a class="ref-tip" data-dcnode-id="3904" href="#pone.0218669.ref018"><span data-dcnode-id="3905" instrument_node="">18</span></a><span data-dcnode-id="3903" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="3901" href="#pone.0218669.ref020"><span data-dcnode-id="3902" instrument_node="">20</span></a><span data-dcnode-id="3900" instrument_node="">]. Foreign nationals affected by this policy change include migrant workers, asylum-seekers, refugees, foreign students, foreign spouses, tourists and expatriates. </span><a data-dcnode-id="3898" href="#pone-0218669-t001"><span data-dcnode-id="3899" instrument_node="">Table 1</span></a><span data-dcnode-id="3897" instrument_node=""> compares the medical charges for non-citizens with citizens.</span></p><span data-dcnode-id="3895" instrument_node="">
</span><a class="link-target" data-dcnode-id="3894" id="pone-0218669-t001" name="pone-0218669-t001"></a><div class="figure" data-dcnode-id="3860" data-doi="10.1371/journal.pone.0218669.t001"><div class="img-box" data-dcnode-id="3890"><a data-dcnode-id="3892" data-doi="10.1371/journal.pone.0218669" data-uri="10.1371/journal.pone.0218669.t001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0218669.t001" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="3893" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0218669.t001&amp;raw"></a><div class="expand" data-dcnode-id="3891"></div></div><div class="figure-inline-download" data-dcnode-id="3869"><span data-dcnode-id="3889" instrument_node="">
          Download:
          </span><ul data-dcnode-id="3870"><li data-dcnode-id="3883"><a data-dcnode-id="3884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0218669.t001"><div class="definition-label" data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="3877"><a data-dcnode-id="3878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0218669.t001"><div class="definition-label" data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="3871"><a data-dcnode-id="3872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0218669.t001"><div class="definition-label" data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="3873"><span data-dcnode-id="3874" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="3865"><span data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">Table 1. </span></span><span data-dcnode-id="3866" instrument_node=""> Charges for Malaysian citizens and non-citizens at public clinics and hospitals.</span></div><p class="caption_target" data-dcnode-id="3864"></p><p class="caption_object" data-dcnode-id="3861"><a data-dcnode-id="3862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0218669.t001"><span data-dcnode-id="3863" instrument_node="">
              https://doi.org/10.1371/journal.pone.0218669.t001</span></a></p></div><a class="link-target" data-dcnode-id="3859" id="article1.body1.sec1.p5" name="article1.body1.sec1.p5"></a><p data-dcnode-id="3842"><span data-dcnode-id="3858" instrument_node="">Two government mandated insurance schemes are obligatory for the annual renewal of work permits of documented migrant workers: The Hospitalisation and Surgical Scheme for Foreign Workers (SPIKPA) and since 1 January 2019, the Employment Injury Scheme for Foreign Workers under the government’s Social Security Organization (EI-SOCSO). SPIKPA is a mandatory private medical insurance scheme which can be purchased from 25 insurance providers, which provides for annual coverage of MYR 10,000 (USD 2,325) for hospital admissions and surgery at Ministry of Health (MOH) hospitals, with an annual premium of MYR 120 (USD 28) per worker. The SPIKPA scheme is mandatory for migrant workers with premiums paid by either the employer or worker. The exemption being for domestic helpers and workers in plantations sectors where the insurance is optional, with employers allowed to opt-in by paying premiums [</span><a class="ref-tip" data-dcnode-id="3856" href="#pone.0218669.ref022"><span data-dcnode-id="3857" instrument_node="">22</span></a><span data-dcnode-id="3855" instrument_node="">]. EI-SOCSO is a social security scheme providing occupational illness or injury benefits in line with the SOCSO scheme for Malaysian citizens, with the exception of education benefits of enrolee’s dependents and physical rehabilitation benefits. The contribution rate is 1.25% of the insured migrant worker’s monthly wages, which is meant to be paid by the employer. Accidental death compensation is capped at RM 25,000, while permanent disablement benefit is based on 90% of the insured foreign worker’s average daily wage, subject to a minimum of RM30 and a maximum of RM118.50 per day [</span><a class="ref-tip" data-dcnode-id="3853" href="#pone.0218669.ref023"><span data-dcnode-id="3854" instrument_node="">23</span></a><span data-dcnode-id="3852" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="3850" href="#pone.0218669.ref024"><span data-dcnode-id="3851" instrument_node="">24</span></a><span data-dcnode-id="3849" instrument_node="">]. Repatriation and funeral benefits are also included. EI-SOCSO replaced the Foreign Worker’s Compensation Scheme (FWCS), which provided a maximum lump sum compensation payment of RM23,000 (USD 5,348) for accidental death, disablement or disease related to employment, which included compensation for repatriation, hospitalisation and medical expenses [</span><a class="ref-tip" data-dcnode-id="3847" href="#pone.0218669.ref025"><span data-dcnode-id="3848" instrument_node="">25</span></a><span data-dcnode-id="3846" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="3844" href="#pone.0218669.ref028"><span data-dcnode-id="3845" instrument_node="">28</span></a><span data-dcnode-id="3843" instrument_node="">].</span></p><span data-dcnode-id="3841" instrument_node="">
</span><a class="link-target" data-dcnode-id="3840" id="article1.body1.sec1.p6" name="article1.body1.sec1.p6"></a><p data-dcnode-id="3832"><span data-dcnode-id="3839" instrument_node="">The Malaysian Immigration Act 1959 stipulates that all migrant workers must pass a pre-departure health test before being allowed to work in Malaysia. Documented migrant workers are also required to pass a pre-employment health examination within the first month of arrival, and are subsequently subject to mandatory annual health examinations as a condition for work permit renewals [</span><a class="ref-tip" data-dcnode-id="3837" href="#pone.0218669.ref029"><span data-dcnode-id="3838" instrument_node="">29</span></a><span data-dcnode-id="3836" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="3834" href="#pone.0218669.ref030"><span data-dcnode-id="3835" instrument_node="">30</span></a><span data-dcnode-id="3833" instrument_node="">]. In addition, some employers provide workers with medical treatment at private clinics, although the extent of this coverage varies.</span></p><span data-dcnode-id="3831" instrument_node="">
</span><a class="link-target" data-dcnode-id="3830" id="article1.body1.sec1.p7" name="article1.body1.sec1.p7"></a><p data-dcnode-id="3819"><span data-dcnode-id="3829" instrument_node="">Thus, migrant workers are expected to be healthy upon entry into Malaysia. However, living and working conditions, and exclusion from health services may predispose migrants to poor health. Access to healthcare goes beyond service availability, to utilisation as determined by financial, organisational, socio-cultural and other barriers that limit the use of healthcare, thereby affecting health outcomes [</span><a class="ref-tip" data-dcnode-id="3827" href="#pone.0218669.ref031"><span data-dcnode-id="3828" instrument_node="">31</span></a><span data-dcnode-id="3826" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="3824" href="#pone.0218669.ref032"><span data-dcnode-id="3825" instrument_node="">32</span></a><span data-dcnode-id="3823" instrument_node="">]. This study was motivated by the paucity of peer-reviewed publications on migrant worker’s access to healthcare in Malaysia [</span><a class="ref-tip" data-dcnode-id="3821" href="#pone.0218669.ref033"><span data-dcnode-id="3822" instrument_node="">33</span></a><span data-dcnode-id="3820" instrument_node="">]. We explored the barriers to accessing healthcare faced by both documented and undocumented migrant workers in Malaysia through a series of in-depth interviews with key stakeholders.</span></p><span data-dcnode-id="3818" instrument_node="">
</span></div><span data-dcnode-id="3816" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="3669" id="section2" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="3815" data-toc="sec006" id="sec006" name="sec006" title="Materials and methods"></a><h2 data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">Materials and methods</span></h2><a class="link-target" data-dcnode-id="3812" id="article1.body1.sec2.p1" name="article1.body1.sec2.p1"></a><p data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">Qualitative methods were used in this study. This study is part of a larger project evaluating the policies protecting the health of migrant workers in Malaysia and China and returnees in Myanmar. Part of the data collected here will be presented in a companion paper on comparative policy analysis and has thus been excluded from the findings of this paper.</span></p><span data-dcnode-id="3809" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="3790" id="section1"><a class="link-target" data-dcnode-id="3808" id="sec007" name="sec007" title="Definition of terms"></a><span data-dcnode-id="3807" instrument_node="">
</span><h3 data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">Definition of terms</span></h3><span data-dcnode-id="3804" instrument_node="">
</span><a class="link-target" data-dcnode-id="3803" id="article1.body1.sec2.sec1.p1" name="article1.body1.sec2.sec1.p1"></a><p data-dcnode-id="3792"><span data-dcnode-id="3802" instrument_node="">The International Labour Organization defines a migrant worker, as a person who migrates from one country to another with the view of being employed [</span><a class="ref-tip" data-dcnode-id="3800" href="#pone.0218669.ref034"><span data-dcnode-id="3801" instrument_node="">34</span></a><span data-dcnode-id="3799" instrument_node="">]. Regular or documented migrants are those employed in another country with the requisite legal documents, like valid passports and work permits. Irregular or undocumented migrants are those who enter a country in search of employment without the necessary legal documents, as well as those having entered the country legally, have either violated terms of their visa or over-stayed beyond the authorised period [</span><a class="ref-tip" data-dcnode-id="3797" href="#pone.0218669.ref035"><span data-dcnode-id="3798" instrument_node="">35</span></a><span data-dcnode-id="3796" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="3794" href="#pone.0218669.ref037"><span data-dcnode-id="3795" instrument_node="">37</span></a><span data-dcnode-id="3793" instrument_node="">].</span></p><span data-dcnode-id="3791" instrument_node="">
</span></div><span data-dcnode-id="3789" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="3722" id="section2"><a class="link-target" data-dcnode-id="3788" id="sec008" name="sec008" title="Sampling and recruitment"></a><span data-dcnode-id="3787" instrument_node="">
</span><h3 data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">Sampling and recruitment</span></h3><span data-dcnode-id="3784" instrument_node="">
</span><a class="link-target" data-dcnode-id="3783" id="article1.body1.sec2.sec2.p1" name="article1.body1.sec2.sec2.p1"></a><p data-dcnode-id="3778"><span data-dcnode-id="3782" instrument_node="">Migrant workers in Malaysia are a heterogenous group. We aimed to capture the viewpoints of different stakeholders to better triangulate the barriers faced by migrant workers in accessing healthcare in Malaysia. We purposefully sampled key informants with expertise in migrant issues in Malaysia, including civil society organisations, international organisations, trade unions, academia, medical professionals as well as migrant workers and their representatives. Our initial sampling frame was formulated from the participant list of a 2017 expert workshop on Migrant and Refugee Health held in Kuala Lumpur, Malaysia [</span><a class="ref-tip" data-dcnode-id="3780" href="#pone.0218669.ref038"><span data-dcnode-id="3781" instrument_node="">38</span></a><span data-dcnode-id="3779" instrument_node="">]. We also contacted general practitioners at private medical clinics and medical doctors working at public hospitals. Potential participants were invited to participate by telephone and email and sent participant information sheets and consent forms. Further snowball sampling with interview participants was conducted until the researchers agreed that additional interviews would not yield new information, as theoretical saturation was reached.</span></p><span data-dcnode-id="3777" instrument_node="">
</span><a class="link-target" data-dcnode-id="3776" id="article1.body1.sec2.sec2.p2" name="article1.body1.sec2.sec2.p2"></a><p data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">A total of 17 in-depth interviews were conducted of 18 individuals (two participants were interviewed together) over a period of 3 months, from July to September 2018. All interviews were conducted in Kuala Lumpur and its surroundings, at locations chosen by the participants. All study participants were based in Malaysia and were either migrant workers or those working closely with migrant workers in case management, training and advocacy, legal aid, research or the provision of medical services.</span></p><span data-dcnode-id="3773" instrument_node="">
</span><a class="link-target" data-dcnode-id="3772" id="article1.body1.sec2.sec2.p3" name="article1.body1.sec2.sec2.p3"></a><p data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">Twelve participants were Malaysian. Of the 6 non-Malaysians interviewed, four identified themselves as migrant workers. Three of the 4 migrant workers interviewed were also members of civil society organisations or trade unions. We found that migrant workers organize themselves in groups based on country of origin rather than occupational groups (construction, manufacturing, plantation etc.). As such, we interviewed the main groups representing workers from Indonesia, Bangladesh, Nepal and Philippines. As domestic workers are a separate group with specific vulnerabilities, we interviewed representatives from their communities.</span></p><span data-dcnode-id="3769" instrument_node="">
</span><a class="link-target" data-dcnode-id="3768" id="article1.body1.sec2.sec2.p4" name="article1.body1.sec2.sec2.p4"></a><p data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">The immigration status of a migrant worker is highly sensitive, as it could result in detention and deportation. For ethical reasons, we did not specifically target undocumented migrants for interviews or probe participants on their immigration status. Migrant representatives and others interviewed discussed issues relevant to both documented and undocumented migrant workers in Malaysia.</span></p><span data-dcnode-id="3765" instrument_node="">
</span><a class="link-target" data-dcnode-id="3764" id="article1.body1.sec2.sec2.p5" name="article1.body1.sec2.sec2.p5"></a><p data-dcnode-id="3759"><span data-dcnode-id="3763" instrument_node="">The medical professionals interviewed were doctors working in public hospitals (emergency care, intensive care and general medicine wards) and private clinics providing outpatient services to migrant workers. Participants interviewed from international organisations were from an international agency and 2 civil society organisations with offices in Malaysia. Of those invited to participate, we received 7 negative responses, mostly from government officials and employers’ organisations. Some who declined participation expressed concern mostly on the inclusion of undocumented workers in the scope of this study. </span><a data-dcnode-id="3761" href="#pone-0218669-t002"><span data-dcnode-id="3762" instrument_node="">Table 2</span></a><span data-dcnode-id="3760" instrument_node=""> describes the characteristics of the study participants.</span></p><span data-dcnode-id="3758" instrument_node="">
</span><a class="link-target" data-dcnode-id="3757" id="pone-0218669-t002" name="pone-0218669-t002"></a><div class="figure" data-dcnode-id="3723" data-doi="10.1371/journal.pone.0218669.t002"><div class="img-box" data-dcnode-id="3753"><a data-dcnode-id="3755" data-doi="10.1371/journal.pone.0218669" data-uri="10.1371/journal.pone.0218669.t002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0218669.t002" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="3756" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0218669.t002&amp;raw"></a><div class="expand" data-dcnode-id="3754"></div></div><div class="figure-inline-download" data-dcnode-id="3732"><span data-dcnode-id="3752" instrument_node="">
          Download:
          </span><ul data-dcnode-id="3733"><li data-dcnode-id="3746"><a data-dcnode-id="3747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0218669.t002"><div class="definition-label" data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="3740"><a data-dcnode-id="3741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0218669.t002"><div class="definition-label" data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="3734"><a data-dcnode-id="3735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0218669.t002"><div class="definition-label" data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="3728"><span data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">Table 2. </span></span><span data-dcnode-id="3729" instrument_node=""> Characteristics of the study participants (n = 18).</span></div><p class="caption_target" data-dcnode-id="3727"></p><p class="caption_object" data-dcnode-id="3724"><a data-dcnode-id="3725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0218669.t002"><span data-dcnode-id="3726" instrument_node="">
              https://doi.org/10.1371/journal.pone.0218669.t002</span></a></p></div></div><span data-dcnode-id="3721" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="3703" id="section3"><a class="link-target" data-dcnode-id="3720" id="sec009" name="sec009" title="Ethics"></a><span data-dcnode-id="3719" instrument_node="">
</span><h3 data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">Ethics</span></h3><span data-dcnode-id="3716" instrument_node="">
</span><a class="link-target" data-dcnode-id="3715" id="article1.body1.sec2.sec3.p1" name="article1.body1.sec2.sec3.p1"></a><p data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">The health and welfare of migrant workers is a topic of contention in Malaysia. We sought to minimise harm to study participants by assuring anonymity and confidentiality. Informed consent was obtained from each participant at recruitment. All participants agreed to be audio recorded and quoted anonymously in publications. Study participation was voluntary, and participants were informed that they could refuse to answer questions or terminate interviews at any point.</span></p><span data-dcnode-id="3712" instrument_node="">
</span><a class="link-target" data-dcnode-id="3711" id="article1.body1.sec2.sec3.p2" name="article1.body1.sec2.sec3.p2"></a><p data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">The lead author (TL) conducted all interviews. As a medical doctor and academic, we recognise that TL would likely be considered as being in a trusted authority position by participants, particularly with migrant workers. To minimize potential effects of social distance and power imbalances between the researcher and participants, the majority of interviews were conducted at a location of the participants’ choosing, in a space they were comfortable in and at a time convenient to them. Migrant participants, in particular, were assured that they could refuse to answer questions or to end the interview at any time. In doing so, we hoped that participants felt that they could exert a degree of control over the interview process.</span></p><span data-dcnode-id="3708" instrument_node="">
</span><a class="link-target" data-dcnode-id="3707" id="article1.body1.sec2.sec3.p3" name="article1.body1.sec2.sec3.p3"></a><p data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">This study was approved by the Medical Ethics Committee, University Malaya Medical Center and the Medical Research and Ethics Committee, Ministry of Health, Malaysia (Approval numbers: UM.TNC2/UMREC-238 and NMRR-18-1309-42043).</span></p><span data-dcnode-id="3704" instrument_node="">
</span></div><span data-dcnode-id="3702" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="3671" id="section4"><a class="link-target" data-dcnode-id="3701" id="sec010" name="sec010" title="Data collection and analysis"></a><span data-dcnode-id="3700" instrument_node="">
</span><h3 data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">Data collection and analysis</span></h3><span data-dcnode-id="3697" instrument_node="">
</span><a class="link-target" data-dcnode-id="3696" id="article1.body1.sec2.sec4.p1" name="article1.body1.sec2.sec4.p1"></a><p data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">Semi-structured interview guides were developed to seek participants’ perspective on barriers to healthcare access for migrant workers in Malaysia. Questions were tailored towards the professional and organisational background of participants.</span></p><span data-dcnode-id="3693" instrument_node="">
</span><a class="link-target" data-dcnode-id="3692" id="article1.body1.sec2.sec4.p2" name="article1.body1.sec2.sec4.p2"></a><p data-dcnode-id="3687"><span data-dcnode-id="3691" instrument_node="">One researcher (TL) conducted all interviews in English and Bahasa Malaysia (also called the Malay language or Bahasa Melayu) and prepared field notes and impressions for all the interviews. Fourteen face-to-face interviews were conducted at locations chosen by the participants. Three interviews were conducted via telephone. The interviews averaged 52 minutes in length. Audio recordings were then transcribed verbatim. Concurrent data analysis was conducted to inform data collection and refine question guides. See </span><a data-dcnode-id="3689" href="#pone.0218669.s001"><span data-dcnode-id="3690" instrument_node="">S1 File</span></a><span data-dcnode-id="3688" instrument_node=""> for interview guides.</span></p><span data-dcnode-id="3686" instrument_node="">
</span><a class="link-target" data-dcnode-id="3685" id="article1.body1.sec2.sec4.p3" name="article1.body1.sec2.sec4.p3"></a><p data-dcnode-id="3680"><span data-dcnode-id="3684" instrument_node="">Data were analysed using thematic analysis [</span><a class="ref-tip" data-dcnode-id="3682" href="#pone.0218669.ref039"><span data-dcnode-id="3683" instrument_node="">39</span></a><span data-dcnode-id="3681" instrument_node="">]. Data analysis was conducted in an immersive, exploratory and inductive manner. Researchers listened to the audio recordings and edited transcripts for accuracy. Transcripts were then coded into emerging themes using NVivo 12 Pro software. Codes and themes were refined by repeated readings of all transcripts, field notes and impressions. Regular discussions helped to further refine coding and collapse codes into themes, in addition to giving attention to negative cases and minor themes. Interviews in Bahasa Malaysia were analysed in the same language, while extracted quotations were translated. Some interviewees spoke using broken English, necessitating literal translation for quotations.</span></p><span data-dcnode-id="3679" instrument_node="">
</span><a class="link-target" data-dcnode-id="3678" id="article1.body1.sec2.sec4.p4" name="article1.body1.sec2.sec4.p4"></a><p data-dcnode-id="3673"><span data-dcnode-id="3677" instrument_node="">All costs are reported in Malaysian Ringgit (MYR) and United States Dollars (USD), using the 2017 World Bank exchange rate of 4.30 [</span><a class="ref-tip" data-dcnode-id="3675" href="#pone.0218669.ref040"><span data-dcnode-id="3676" instrument_node="">40</span></a><span data-dcnode-id="3674" instrument_node="">].</span></p><span data-dcnode-id="3672" instrument_node="">
</span></div><span data-dcnode-id="3670" instrument_node="">
</span></div><span data-dcnode-id="3668" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1619" id="section3" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="3667" data-toc="sec011" id="sec011" name="sec011" title="Results"></a><h2 data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">Results</span></h2><a class="link-target" data-dcnode-id="3664" id="article1.body1.sec3.p1" name="article1.body1.sec3.p1"></a><p data-dcnode-id="3659"><span data-dcnode-id="3663" instrument_node="">Major barriers identified were financial barriers and affordability, lack of legal documentation, language barriers, discrimination and xenophobia, physical barriers and employer-related barriers. </span><a data-dcnode-id="3661" href="#pone-0218669-t003"><span data-dcnode-id="3662" instrument_node="">Table 3</span></a><span data-dcnode-id="3660" instrument_node=""> summarises the main themes emerging from this study.</span></p><span data-dcnode-id="3658" instrument_node="">
</span><a class="link-target" data-dcnode-id="3657" id="pone-0218669-t003" name="pone-0218669-t003"></a><div class="figure" data-dcnode-id="3623" data-doi="10.1371/journal.pone.0218669.t003"><div class="img-box" data-dcnode-id="3653"><a data-dcnode-id="3655" data-doi="10.1371/journal.pone.0218669" data-uri="10.1371/journal.pone.0218669.t003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0218669.t003" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="3656" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0218669.t003&amp;raw"></a><div class="expand" data-dcnode-id="3654"></div></div><div class="figure-inline-download" data-dcnode-id="3632"><span data-dcnode-id="3652" instrument_node="">
          Download:
          </span><ul data-dcnode-id="3633"><li data-dcnode-id="3646"><a data-dcnode-id="3647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0218669.t003"><div class="definition-label" data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="3648"><span data-dcnode-id="3649" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="3640"><a data-dcnode-id="3641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0218669.t003"><div class="definition-label" data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="3634"><a data-dcnode-id="3635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0218669.t003"><div class="definition-label" data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="3628"><span data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">Table 3. </span></span><span data-dcnode-id="3629" instrument_node=""> Main findings of the study.</span></div><p class="caption_target" data-dcnode-id="3627"></p><p class="caption_object" data-dcnode-id="3624"><a data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0218669.t003"><span data-dcnode-id="3626" instrument_node="">
              https://doi.org/10.1371/journal.pone.0218669.t003</span></a></p></div><span data-dcnode-id="3622" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="3008" id="section1"><a class="link-target" data-dcnode-id="3621" id="sec012" name="sec012" title="Financial barriers and affordability"></a><span data-dcnode-id="3620" instrument_node="">
</span><h3 data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">Financial barriers and affordability</span></h3><span data-dcnode-id="3617" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="3498" id="section1"><a class="link-target" data-dcnode-id="3616" id="sec013" name="sec013" title="Migrants pay out-of-pocket for outpatient clinic visits"></a><h4 data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Migrants pay out-of-pocket for outpatient clinic visits.</span></h4><a class="link-target" data-dcnode-id="3613" id="article1.body1.sec3.sec1.sec1.p1" name="article1.body1.sec3.sec1.sec1.p1"></a><p data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">All participants agreed that affordability is of critical concern to migrant workers when accessing healthcare. The SPIKPA insurance scheme only provides coverage for hospitalisation and surgery at MOH hospitals. Most employers do not pay for the healthcare of workers, as such workers’ pay out-of-pocket (OOP) for outpatient visits.</span></p><span data-dcnode-id="3610" instrument_node="">
</span><a class="link-target" data-dcnode-id="3609" id="article1.body1.sec3.sec1.sec1.p2" name="article1.body1.sec3.sec1.sec1.p2"></a><p data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">Only larger, multinational companies may provide basic medical care through in-house health services or panel clinics. Panel clinics in Malaysia are one or more private clinics assigned by employers to provide outpatient treatment for their employees. Nonetheless, participants affirmed that most businesses in Malaysia are small- and medium- enterprise (SME) companies that do not provide healthcare to migrant workers.</span></p><span data-dcnode-id="3606" instrument_node="">
</span><blockquote data-dcnode-id="3572"><a class="link-target" data-dcnode-id="3605" id="article1.body1.sec3.sec1.sec1.disp-quote1.p1" name="article1.body1.sec3.sec1.sec1.disp-quote1.p1"></a><p data-dcnode-id="3574"><span data-dcnode-id="3604" instrument_node="">“</span><em data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">By and large</span></em><span data-dcnode-id="3601" instrument_node="">, </span><em data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">we see that for migrant workers</span></em><span data-dcnode-id="3598" instrument_node="">, </span><em data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">the company doesn’t cover [healthcare costs]</span></em><span data-dcnode-id="3595" instrument_node="">. </span><em data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">This is very predominant in SMEs</span></em><span data-dcnode-id="3592" instrument_node="">. </span><em data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Big companies</span></em><span data-dcnode-id="3589" instrument_node="">, </span><em data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">they may cover the worker’s medical</span></em><span data-dcnode-id="3586" instrument_node="">. </span><em data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">Suppose the workers have the flu [</span></em><span data-dcnode-id="3583" instrument_node="">…</span><em data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">]</span></em><span data-dcnode-id="3580" instrument_node="">, </span><em data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">he has to fork out the money to go for outpatient treatment</span></em><span data-dcnode-id="3577" instrument_node="">.</span><em data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">” CSO-2</span></em></p><span data-dcnode-id="3573" instrument_node="">
</span></blockquote><span data-dcnode-id="3571" instrument_node="">
</span><a class="link-target" data-dcnode-id="3570" id="article1.body1.sec3.sec1.sec1.p3" name="article1.body1.sec3.sec1.sec1.p3"></a><p data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">Participants shared that some employers may initially pay for clinic visits, then later deduct the healthcare payments from the worker’s salary.</span></p><span data-dcnode-id="3567" instrument_node="">
</span><blockquote data-dcnode-id="3545"><a class="link-target" data-dcnode-id="3566" id="article1.body1.sec3.sec1.sec1.disp-quote2.p1" name="article1.body1.sec3.sec1.sec1.disp-quote2.p1"></a><p data-dcnode-id="3547"><span data-dcnode-id="3565" instrument_node="">“</span><em data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">We see a deduction of wages</span></em><span data-dcnode-id="3562" instrument_node="">, </span><em data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">[…] where the worker doesn’t have money</span></em><span data-dcnode-id="3559" instrument_node="">, </span><em data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">and he takes an advance from the employer to pay for the medical [bills]</span></em><span data-dcnode-id="3556" instrument_node="">. </span><em data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">That becomes a deduction of the wages</span></em><span data-dcnode-id="3553" instrument_node="">. </span><em data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">Because the company policy doesn’t cover their [medical] cost</span></em><span data-dcnode-id="3550" instrument_node="">.</span><em data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">” CSO-2</span></em></p><span data-dcnode-id="3546" instrument_node="">
</span></blockquote><span data-dcnode-id="3544" instrument_node="">
</span><a class="link-target" data-dcnode-id="3543" id="article1.body1.sec3.sec1.sec1.p4" name="article1.body1.sec3.sec1.sec1.p4"></a><p data-dcnode-id="3538"><span data-dcnode-id="3542" instrument_node="">Participants explained that the OOP charges for clinic visits are unaffordable to most migrant workers. Most migrant workers earn a minimum wage of MYR 1,000 (USD 233) per month [</span><a class="ref-tip" data-dcnode-id="3540" href="#pone.0218669.ref041"><span data-dcnode-id="3541" instrument_node="">41</span></a><span data-dcnode-id="3539" instrument_node="">], which they supplement by working overtime. This participant compared the cost of an average outpatient visit with weekly food expenses.</span></p><span data-dcnode-id="3537" instrument_node="">
</span><blockquote data-dcnode-id="3500"><a class="link-target" data-dcnode-id="3536" id="article1.body1.sec3.sec1.sec1.disp-quote3.p1" name="article1.body1.sec3.sec1.sec1.disp-quote3.p1"></a><p data-dcnode-id="3502"><span data-dcnode-id="3535" instrument_node="">“</span><em data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">Migrant workers cannot afford to pay for medical bills […]</span></em><span data-dcnode-id="3532" instrument_node="">. </span><em data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">The bill is high</span></em><span data-dcnode-id="3529" instrument_node="">. </span><em data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">Yes</span></em><span data-dcnode-id="3526" instrument_node="">, </span><em data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">MYR 40 (USD 9) is high for them</span></em><span data-dcnode-id="3523" instrument_node="">. </span><em data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">One day’s salary</span></em><span data-dcnode-id="3520" instrument_node="">, </span><em data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">man</span></em><span data-dcnode-id="3517" instrument_node="">. </span><em data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">Just imagine</span></em><span data-dcnode-id="3514" instrument_node="">, </span><em data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">they can eat food for almost a week</span></em><span data-dcnode-id="3511" instrument_node="">, </span><em data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">you know</span></em><span data-dcnode-id="3508" instrument_node="">? </span><em data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">They spend about MYR 6 to MYR 7 (USD 1 to USD 2) only [on food] per-day</span></em><span data-dcnode-id="3505" instrument_node="">.</span><em data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">” TU-1</span></em></p><span data-dcnode-id="3501" instrument_node="">
</span></blockquote><span data-dcnode-id="3499" instrument_node="">
</span></div><span data-dcnode-id="3497" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="3409" id="section2"><a class="link-target" data-dcnode-id="3496" id="sec014" name="sec014" title="Inadequate insurance coverage"></a><h4 data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">Inadequate insurance coverage.</span></h4><a class="link-target" data-dcnode-id="3493" id="article1.body1.sec3.sec1.sec2.p1" name="article1.body1.sec3.sec1.sec2.p1"></a><p data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">Participants felt that the SPIKPA insurance scheme was inadequate in compensating foreigners’ high healthcare costs. This participant reported that although migrant workers are given life-saving treatment when they present at the emergency department, payment deposits required for hospital admission is often unaffordable for migrant workers.</span></p><span data-dcnode-id="3490" instrument_node="">
</span><blockquote data-dcnode-id="3453"><a class="link-target" data-dcnode-id="3489" id="article1.body1.sec3.sec1.sec2.disp-quote1.p1" name="article1.body1.sec3.sec1.sec2.disp-quote1.p1"></a><p data-dcnode-id="3455"><span data-dcnode-id="3488" instrument_node="">"</span><em data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">The government hospitals will give them treatment [for] emergency cases</span></em><span data-dcnode-id="3485" instrument_node="">, </span><em data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">like an injury</span></em><span data-dcnode-id="3482" instrument_node="">. </span><em data-dcnode-id="3480"><span data-dcnode-id="3481" instrument_node="">But</span></em><span data-dcnode-id="3479" instrument_node="">, </span><em data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">they must pay some ‘guarantee’ money [deposit before admission]</span></em><span data-dcnode-id="3476" instrument_node="">. </span><em data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">The deposit will be higher</span></em><span data-dcnode-id="3473" instrument_node="">, </span><em data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">in some cases</span></em><span data-dcnode-id="3470" instrument_node="">, </span><em data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">it is MYR 3</span></em><span data-dcnode-id="3467" instrument_node="">,</span><em data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">000 (USD 698) before admitted into the hospital</span></em><span data-dcnode-id="3464" instrument_node="">. </span><em data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">That is very high</span></em><span data-dcnode-id="3461" instrument_node="">, </span><em data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">very high</span></em><span data-dcnode-id="3458" instrument_node="">.</span><em data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">” MW-1</span></em></p><span data-dcnode-id="3454" instrument_node="">
</span></blockquote><span data-dcnode-id="3452" instrument_node="">
</span><a class="link-target" data-dcnode-id="3451" id="article1.body1.sec3.sec1.sec2.p2" name="article1.body1.sec3.sec1.sec2.p2"></a><p data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">Participants reported that employers, knowing that insurance coverage is inadequate, often send migrant workers back to their country of origin with minimal medical care, as they don’t want to pay for additional, often definitive treatment.</span></p><span data-dcnode-id="3448" instrument_node="">
</span><blockquote data-dcnode-id="3411"><a class="link-target" data-dcnode-id="3447" id="article1.body1.sec3.sec1.sec2.disp-quote2.p1" name="article1.body1.sec3.sec1.sec2.disp-quote2.p1"></a><p data-dcnode-id="3413"><span data-dcnode-id="3446" instrument_node="">“</span><em data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">[Employers are] sending them [migrant workers] back</span></em><span data-dcnode-id="3443" instrument_node="">, </span><em data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">sometimes without treatment</span></em><span data-dcnode-id="3440" instrument_node="">, </span><em data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">even though they are documented</span></em><span data-dcnode-id="3437" instrument_node="">. </span><em data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">That is because they would have gone for the initial treatment</span></em><span data-dcnode-id="3434" instrument_node="">, </span><em data-dcnode-id="3432"><span data-dcnode-id="3433" instrument_node="">[…] but follow up treatment</span></em><span data-dcnode-id="3431" instrument_node="">, </span><em data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">they can’t afford</span></em><span data-dcnode-id="3428" instrument_node="">. </span><em data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">Because the insurance would have finished already by then</span></em><span data-dcnode-id="3425" instrument_node="">. </span><em data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">So</span></em><span data-dcnode-id="3422" instrument_node="">, </span><em data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">what they do a lot is</span></em><span data-dcnode-id="3419" instrument_node="">, </span><em data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">they send the workers home</span></em><span data-dcnode-id="3416" instrument_node="">.</span><em data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">” IO-2</span></em></p><span data-dcnode-id="3412" instrument_node="">
</span></blockquote><span data-dcnode-id="3410" instrument_node="">
</span></div><span data-dcnode-id="3408" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="3311" id="section3"><a class="link-target" data-dcnode-id="3407" id="sec015" name="sec015" title="Unaware of insurance provision"></a><h4 data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">Unaware of insurance provision.</span></h4><a class="link-target" data-dcnode-id="3404" id="article1.body1.sec3.sec1.sec3.p1" name="article1.body1.sec3.sec1.sec3.p1"></a><p data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">Participants explained that although documented workers’ pay for the mandatory SPIKPA insurance, many are unaware that the salary deductions are for medical insurance.</span></p><span data-dcnode-id="3401" instrument_node="">
</span><blockquote data-dcnode-id="3370"><a class="link-target" data-dcnode-id="3400" id="article1.body1.sec3.sec1.sec3.disp-quote1.p1" name="article1.body1.sec3.sec1.sec3.disp-quote1.p1"></a><p data-dcnode-id="3372"><span data-dcnode-id="3399" instrument_node="">“</span><em data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">Every migrant worker</span></em><span data-dcnode-id="3396" instrument_node="">, </span><em data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">[…] has to pay for health insurance</span></em><span data-dcnode-id="3393" instrument_node="">. </span><em data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">[Its] deducted from their levy when they renew their permit</span></em><span data-dcnode-id="3390" instrument_node="">. </span><em data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">But</span></em><span data-dcnode-id="3387" instrument_node="">, </span><em data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">many workers have bad knowledge about that</span></em><span data-dcnode-id="3384" instrument_node="">. </span><em data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">So</span></em><span data-dcnode-id="3381" instrument_node="">, </span><em data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">they pay health insurance</span></em><span data-dcnode-id="3378" instrument_node="">, </span><em data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">[but] they don’t know how to claim their health insurance</span></em><span data-dcnode-id="3375" instrument_node="">.</span><em data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">” TU-2</span></em></p><span data-dcnode-id="3371" instrument_node="">
</span></blockquote><span data-dcnode-id="3369" instrument_node="">
</span><a class="link-target" data-dcnode-id="3368" id="article1.body1.sec3.sec1.sec3.p2" name="article1.body1.sec3.sec1.sec3.p2"></a><p data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">Participants revealed that migrant workers are not given an insurance card and are seldom provided with knowledge on the health benefits available to them.</span></p><span data-dcnode-id="3365" instrument_node="">
</span><blockquote data-dcnode-id="3349"><a class="link-target" data-dcnode-id="3364" id="article1.body1.sec3.sec1.sec3.disp-quote2.p1" name="article1.body1.sec3.sec1.sec3.disp-quote2.p1"></a><p data-dcnode-id="3351"><span data-dcnode-id="3363" instrument_node="">" </span><em data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">[</span></em><span data-dcnode-id="3360" instrument_node="">…</span><em data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">] but the worker doesn’t have it [insurance card]</span></em><span data-dcnode-id="3357" instrument_node="">. </span><em data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">The worker doesn’t have the physical evidence or knowledge on that</span></em><span data-dcnode-id="3354" instrument_node="">.</span><em data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">" CSO-1</span></em></p><span data-dcnode-id="3350" instrument_node="">
</span></blockquote><span data-dcnode-id="3348" instrument_node="">
</span><a class="link-target" data-dcnode-id="3347" id="article1.body1.sec3.sec1.sec3.p3" name="article1.body1.sec3.sec1.sec3.p3"></a><p data-dcnode-id="3345"><span data-dcnode-id="3346" instrument_node="">One participant reported that even employers themselves may be unaware of insurance provision, as many leave the renewal of work permits to third-party agencies.</span></p><span data-dcnode-id="3344" instrument_node="">
</span><blockquote data-dcnode-id="3313"><a class="link-target" data-dcnode-id="3343" id="article1.body1.sec3.sec1.sec3.disp-quote3.p1" name="article1.body1.sec3.sec1.sec3.disp-quote3.p1"></a><p data-dcnode-id="3315"><span data-dcnode-id="3342" instrument_node="">“</span><em data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">It is mandatory that they have [insurance]</span></em><span data-dcnode-id="3339" instrument_node="">. </span><em data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">But</span></em><span data-dcnode-id="3336" instrument_node="">, </span><em data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">sometimes</span></em><span data-dcnode-id="3333" instrument_node="">, </span><em data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">the employers just pass to the agent to arrange [everything]</span></em><span data-dcnode-id="3330" instrument_node="">, </span><em data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">like the working permit</span></em><span data-dcnode-id="3327" instrument_node="">. </span><em data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">[…] Sometimes</span></em><span data-dcnode-id="3324" instrument_node="">, </span><em data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">the employers also don’t know</span></em><span data-dcnode-id="3321" instrument_node="">. </span><em data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">Because they asked the agent to do all these things</span></em><span data-dcnode-id="3318" instrument_node="">.</span><em data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">” MW-1</span></em></p><span data-dcnode-id="3314" instrument_node="">
</span></blockquote><span data-dcnode-id="3312" instrument_node="">
</span></div><span data-dcnode-id="3310" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="3204" id="section4"><a class="link-target" data-dcnode-id="3309" id="sec016" name="sec016" title="Migrant workers financial constraints"></a><h4 data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">Migrant workers financial constraints.</span></h4><a class="link-target" data-dcnode-id="3306" id="article1.body1.sec3.sec1.sec4.p1" name="article1.body1.sec3.sec1.sec4.p1"></a><p data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">Because migrant workers are often paid a daily wage, they are not paid when they miss work. Loss of wages is an additional financial burden on workers, preventing them from accessing care. Participants spoke of migrant workers not being given time off work to seek treatment and being penalised with fines for non-attendance. One participant shared that workers stand to lose an attendance bonus if they miss work.</span></p><span data-dcnode-id="3303" instrument_node="">
</span><blockquote data-dcnode-id="3284"><a class="link-target" data-dcnode-id="3302" id="article1.body1.sec3.sec1.sec4.disp-quote1.p1" name="article1.body1.sec3.sec1.sec4.disp-quote1.p1"></a><p data-dcnode-id="3286"><span data-dcnode-id="3301" instrument_node="">“</span><em data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">If they fail to attend</span></em><span data-dcnode-id="3298" instrument_node="">, </span><em data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">they also got deducted from the attendance bonus</span></em><span data-dcnode-id="3295" instrument_node="">. </span><em data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">Because the worker in the manufacturing environment</span></em><span data-dcnode-id="3292" instrument_node="">, </span><em data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">they are supposed to achieve certain attendance to earn the attendance bonus</span></em><span data-dcnode-id="3289" instrument_node="">.</span><em data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">” IO-1</span></em></p><span data-dcnode-id="3285" instrument_node="">
</span></blockquote><span data-dcnode-id="3283" instrument_node="">
</span><a class="link-target" data-dcnode-id="3282" id="article1.body1.sec3.sec1.sec4.p2" name="article1.body1.sec3.sec1.sec4.p2"></a><p data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">Migrant workers work hard and save their wages, to send home to support their families. Participants attested to the migrant worker’s tendency to prioritise remittance of income over all else, including healthcare and food.</span></p><span data-dcnode-id="3279" instrument_node="">
</span><blockquote data-dcnode-id="3248"><a class="link-target" data-dcnode-id="3278" id="article1.body1.sec3.sec1.sec4.disp-quote2.p1" name="article1.body1.sec3.sec1.sec4.disp-quote2.p1"></a><p data-dcnode-id="3250"><span data-dcnode-id="3277" instrument_node="">“</span><em data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">I wouldn’t want my salary to be touched because I want to send the money back for my children’s education</span></em><span data-dcnode-id="3274" instrument_node="">. </span><em data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">So</span></em><span data-dcnode-id="3271" instrument_node="">, </span><em data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">if you are in that person’s shoe</span></em><span data-dcnode-id="3268" instrument_node="">, </span><em data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">you wouldn’t want to be them</span></em><span data-dcnode-id="3265" instrument_node="">. </span><em data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">Because you know there are mouths to feed</span></em><span data-dcnode-id="3262" instrument_node="">, </span><em data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">back in your country</span></em><span data-dcnode-id="3259" instrument_node="">. </span><em data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">You’d rather just sacrifice yours […]</span></em><span data-dcnode-id="3256" instrument_node="">. </span><em data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">Silently</span></em><span data-dcnode-id="3253" instrument_node="">.</span><em data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">” CSO-3</span></em></p><span data-dcnode-id="3249" instrument_node="">
</span></blockquote><span data-dcnode-id="3247" instrument_node="">
</span><a class="link-target" data-dcnode-id="3246" id="article1.body1.sec3.sec1.sec4.p3" name="article1.body1.sec3.sec1.sec4.p3"></a><p data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">Participants shared that most migrants pay for clinic visits themselves. Family, friends and community members may pool their resources and contribute to the payment of large hospital bills.</span></p><span data-dcnode-id="3243" instrument_node="">
</span><blockquote data-dcnode-id="3206"><a class="link-target" data-dcnode-id="3242" id="article1.body1.sec3.sec1.sec4.disp-quote3.p1" name="article1.body1.sec3.sec1.sec4.disp-quote3.p1"></a><p data-dcnode-id="3208"><span data-dcnode-id="3241" instrument_node="">“</span><em data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">[</span></em><span data-dcnode-id="3238" instrument_node="">…</span><em data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">] those simple symptoms like flu […]</span></em><span data-dcnode-id="3235" instrument_node="">, </span><em data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">they pay from their own pocket</span></em><span data-dcnode-id="3232" instrument_node="">. </span><em data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">And for those hospital bills [</span></em><span data-dcnode-id="3229" instrument_node="">…</span><em data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">]</span></em><span data-dcnode-id="3226" instrument_node="">. </span><em data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">For the deposit</span></em><span data-dcnode-id="3223" instrument_node="">, </span><em data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">normally</span></em><span data-dcnode-id="3220" instrument_node="">, </span><em data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">the immediate family would help</span></em><span data-dcnode-id="3217" instrument_node="">. </span><em data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">If the amount shoots up to be so high</span></em><span data-dcnode-id="3214" instrument_node="">, </span><em data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">they would conduct fundraising among their community</span></em><span data-dcnode-id="3211" instrument_node="">.</span><em data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">” IO-1</span></em></p><span data-dcnode-id="3207" instrument_node="">
</span></blockquote><span data-dcnode-id="3205" instrument_node="">
</span></div><span data-dcnode-id="3203" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="3066" id="section5"><a class="link-target" data-dcnode-id="3202" id="sec017" name="sec017" title="Fear of healthcare fees lead to healthcare avoidance"></a><h4 data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">Fear of healthcare fees lead to healthcare avoidance.</span></h4><a class="link-target" data-dcnode-id="3199" id="article1.body1.sec3.sec1.sec5.p1" name="article1.body1.sec3.sec1.sec5.p1"></a><p data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">Participants described migrant workers as less willing to spend money on healthcare. They delay or avoid seeking care by self-treating or using traditional medicine. Overall, most participants viewed traditional medicine as a cheaper alternative to conventional treatment, rather than a choice made due to cultural preference. Traditional medicine is also one of the few healthcare options available to the undocumented migrant.</span></p><span data-dcnode-id="3196" instrument_node="">
