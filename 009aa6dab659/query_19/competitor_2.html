</span><blockquote data-dcnode-id="1990"><a class="link-target" data-dcnode-id="2017" id="article1.body1.sec3.sec5.sec1.disp-quote2.p1" name="article1.body1.sec3.sec5.sec1.disp-quote2.p1"></a><p data-dcnode-id="1992"><span data-dcnode-id="2016" instrument_node="">"</span><em data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">[Migrant workers] They would prefer to go somewhere which is close to their hostel</span></em><span data-dcnode-id="2013" instrument_node="">. </span><em data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">They don’t trust public transportation</span></em><span data-dcnode-id="2010" instrument_node="">. </span><em data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Even when they are taking a taxi</span></em><span data-dcnode-id="2007" instrument_node="">, </span><em data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">they will get caught by enforcement agencies</span></em><span data-dcnode-id="2004" instrument_node="">. </span><em data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">And shockingly</span></em><span data-dcnode-id="2001" instrument_node="">, </span><em data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">several of them were caught with documents</span></em><span data-dcnode-id="1998" instrument_node="">. </span><em data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">All paid money</span></em><span data-dcnode-id="1995" instrument_node="">.</span><em data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">” TU-1</span></em></p><span data-dcnode-id="1991" instrument_node="">
</span></blockquote><span data-dcnode-id="1989" instrument_node="">
</span></div><span data-dcnode-id="1987" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1866" id="section2"><a class="link-target" data-dcnode-id="1986" id="sec036" name="sec036" title="Physical distance, freedom of movement and transport"></a><h4 data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Physical distance, freedom of movement and transport.</span></h4><a class="link-target" data-dcnode-id="1983" id="article1.body1.sec3.sec5.sec2.p1" name="article1.body1.sec3.sec5.sec2.p1"></a><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Participants shared that physical distance was more a concern for those working in rural areas than those in urban areas. Participants spoke of the great geographical distances to travel from rural plantations to towns and healthcare facilities. Some plantations are particularly inaccessible, especially if employers do not provide transportation. Journeys may involve several hours by foot, road transport or even travel by boat. Participants acknowledged that big plantations often provide some healthcare facilities. However, these services may be hard to reach, because of the physical distance.</span></p><span data-dcnode-id="1980" instrument_node="">
</span><blockquote data-dcnode-id="1934"><a class="link-target" data-dcnode-id="1979" id="article1.body1.sec3.sec5.sec2.disp-quote1.p1" name="article1.body1.sec3.sec5.sec2.disp-quote1.p1"></a><p data-dcnode-id="1936"><span data-dcnode-id="1978" instrument_node="">“</span><em data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">[…] Sometimes with small-holders</span></em><span data-dcnode-id="1975" instrument_node="">, </span><em data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">they don’t bother about this [providing healthcare]</span></em><span data-dcnode-id="1972" instrument_node="">. </span><em data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">For the big plantation</span></em><span data-dcnode-id="1969" instrument_node="">, </span><em data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">of course</span></em><span data-dcnode-id="1966" instrument_node="">, </span><em data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">they do have healthcare</span></em><span data-dcnode-id="1963" instrument_node="">. </span><em data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">But when the plantation is so big</span></em><span data-dcnode-id="1960" instrument_node="">, </span><em data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">for example in Sabah you can see 30</span></em><span data-dcnode-id="1957" instrument_node="">,</span><em data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">000 [or] 40</span></em><span data-dcnode-id="1954" instrument_node="">,</span><em data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">000 hectares of plantation [</span></em><span data-dcnode-id="1951" instrument_node="">…</span><em data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">]</span></em><span data-dcnode-id="1948" instrument_node="">. </span><em data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Maybe the service is somewhere nearest to the main road</span></em><span data-dcnode-id="1945" instrument_node="">. </span><em data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">How about the ones inside [those in the interior]</span></em><span data-dcnode-id="1942" instrument_node="">? </span><em data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Healthcare coverage is still a big question mark</span></em><span data-dcnode-id="1939" instrument_node="">.</span><em data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">” IO-1</span></em></p><span data-dcnode-id="1935" instrument_node="">
</span></blockquote><span data-dcnode-id="1933" instrument_node="">
</span><a class="link-target" data-dcnode-id="1932" id="article1.body1.sec3.sec5.sec2.p2" name="article1.body1.sec3.sec5.sec2.p2"></a><p data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">In urban areas, public transportation is easily available. However, participants spoke of travelling expenses, as an additional burden to healthcare costs.</span></p><span data-dcnode-id="1929" instrument_node="">
</span><blockquote data-dcnode-id="1892"><a class="link-target" data-dcnode-id="1928" id="article1.body1.sec3.sec5.sec2.disp-quote2.p1" name="article1.body1.sec3.sec5.sec2.disp-quote2.p1"></a><p data-dcnode-id="1894"><span data-dcnode-id="1927" instrument_node="">“</span><em data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">[</span></em><span data-dcnode-id="1924" instrument_node="">…</span><em data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">] I walk and go</span></em><span data-dcnode-id="1921" instrument_node="">, </span><em data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">sometime taxi and go</span></em><span data-dcnode-id="1918" instrument_node="">. </span><em data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">[But] taxi is expensive</span></em><span data-dcnode-id="1915" instrument_node="">. </span><em data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Sometimes</span></em><span data-dcnode-id="1912" instrument_node="">, </span><em data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">I pay MYR 5 (USD 1</span></em><span data-dcnode-id="1909" instrument_node="">.</span><em data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">2) or MYR 6 (USD 1</span></em><span data-dcnode-id="1906" instrument_node="">.</span><em data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">4) like that</span></em><span data-dcnode-id="1903" instrument_node="">. </span><em data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">And this is just for flu</span></em><span data-dcnode-id="1900" instrument_node="">, </span><em data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">cough [</span></em><span data-dcnode-id="1897" instrument_node="">…</span><em data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">]” MW-2</span></em></p><span data-dcnode-id="1893" instrument_node="">
</span></blockquote><span data-dcnode-id="1891" instrument_node="">
</span><a class="link-target" data-dcnode-id="1890" id="article1.body1.sec3.sec5.sec2.p3" name="article1.body1.sec3.sec5.sec2.p3"></a><p data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Lack of freedom of movement is a concern for domestic helpers. Domestic helpers in Malaysia are generally not given off days or allowed to leave their workplace, which is their employer's house. This situation forces them to be dependent on their employers for all things, including healthcare.</span></p><span data-dcnode-id="1887" instrument_node="">
</span><blockquote data-dcnode-id="1868"><a class="link-target" data-dcnode-id="1886" id="article1.body1.sec3.sec5.sec2.disp-quote3.p1" name="article1.body1.sec3.sec5.sec2.disp-quote3.p1"></a><p data-dcnode-id="1870"><span data-dcnode-id="1885" instrument_node="">“</span><em data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">[Domestic helpers] we cannot go to the hospital</span></em><span data-dcnode-id="1882" instrument_node="">, </span><em data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">we cannot even leave the house</span></em><span data-dcnode-id="1879" instrument_node="">. </span><em data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">We cannot even buy the tablet [medication]</span></em><span data-dcnode-id="1876" instrument_node="">. </span><em data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">[…] Asking from the employer only</span></em><span data-dcnode-id="1873" instrument_node="">.</span><em data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">” MW-3</span></em></p><span data-dcnode-id="1869" instrument_node="">
</span></blockquote><span data-dcnode-id="1867" instrument_node="">
</span></div><span data-dcnode-id="1865" instrument_node="">
</span></div><span data-dcnode-id="1863" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1621" id="section6"><a class="link-target" data-dcnode-id="1862" id="sec037" name="sec037" title="Employer-related barriers and constraints"></a><span data-dcnode-id="1861" instrument_node="">
</span><h3 data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Employer-related barriers and constraints</span></h3><span data-dcnode-id="1858" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1707" id="section1"><a class="link-target" data-dcnode-id="1857" id="sec038" name="sec038" title="No paid sick leave"></a><h4 data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">No paid sick leave.</span></h4><a class="link-target" data-dcnode-id="1854" id="article1.body1.sec3.sec6.sec1.p1" name="article1.body1.sec3.sec6.sec1.p1"></a><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Participants acknowledged that most employers do not honour medical certificates (MC) issued by doctors, forcing workers to work even when sick. According to participants, employers often believe that workers are faking illness, and as such do not provide paid sick leave. This participant alluded to the employer’s focus on productivity, lacking concern for the worker's well-being.</span></p><span data-dcnode-id="1851" instrument_node="">
</span><blockquote data-dcnode-id="1808"><a class="link-target" data-dcnode-id="1850" id="article1.body1.sec3.sec6.sec1.disp-quote1.p1" name="article1.body1.sec3.sec6.sec1.disp-quote1.p1"></a><p data-dcnode-id="1810"><span data-dcnode-id="1849" instrument_node="">“</span><em data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">[…] for many workers</span></em><span data-dcnode-id="1846" instrument_node="">, </span><em data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">if they go for the medical treatment</span></em><span data-dcnode-id="1843" instrument_node="">, </span><em data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">they don’t get an MC</span></em><span data-dcnode-id="1840" instrument_node="">. </span><em data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Their salary will be deducted</span></em><span data-dcnode-id="1837" instrument_node="">, </span><em data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">and they will be fined from their attendance [bonus]</span></em><span data-dcnode-id="1834" instrument_node="">. </span><em data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">This happened because their [employer] said that they are not disciplined enough</span></em><span data-dcnode-id="1831" instrument_node="">. </span><em data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Because the Malaysian employer is like</span></em><span data-dcnode-id="1828" instrument_node="">, </span><em data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">‘Every single dollar and cents counts’</span></em><span data-dcnode-id="1825" instrument_node="">. </span><em data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">So</span></em><span data-dcnode-id="1822" instrument_node="">, </span><em data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">for them</span></em><span data-dcnode-id="1819" instrument_node="">, </span><em data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">this is another input of the productivity</span></em><span data-dcnode-id="1816" instrument_node="">, </span><em data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">the human resources input</span></em><span data-dcnode-id="1813" instrument_node="">.</span><em data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">” IO-1</span></em></p><span data-dcnode-id="1809" instrument_node="">
</span></blockquote><span data-dcnode-id="1807" instrument_node="">
</span><a class="link-target" data-dcnode-id="1806" id="article1.body1.sec3.sec6.sec1.p2" name="article1.body1.sec3.sec6.sec1.p2"></a><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">This participant’s account illustrates the migrant workers’ vulnerability, as they feel they have no avenue to challenge unfair practices.</span></p><span data-dcnode-id="1803" instrument_node="">
</span><blockquote data-dcnode-id="1769"><a class="link-target" data-dcnode-id="1802" id="article1.body1.sec3.sec6.sec1.disp-quote2.p1" name="article1.body1.sec3.sec6.sec1.disp-quote2.p1"></a><p data-dcnode-id="1771"><span data-dcnode-id="1801" instrument_node="">“</span><em data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">I think the employer thinks migrants are healthy</span></em><span data-dcnode-id="1798" instrument_node="">. </span><em data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">He doesn’t believe us</span></em><span data-dcnode-id="1795" instrument_node="">. </span><em data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Does not think it’s serious</span></em><span data-dcnode-id="1792" instrument_node="">. </span><em data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">We can’t take any action</span></em><span data-dcnode-id="1789" instrument_node="">. </span><em data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">What can we do</span></em><span data-dcnode-id="1786" instrument_node="">? </span><em data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">If you don’t want to help us</span></em><span data-dcnode-id="1783" instrument_node="">, </span><em data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">why don’t you let us go ourselves [to the clinic]</span></em><span data-dcnode-id="1780" instrument_node="">? </span><em data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">But we can’t say this</span></em><span data-dcnode-id="1777" instrument_node="">. </span><em data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">They threaten us with suspension […]</span></em><span data-dcnode-id="1774" instrument_node="">.</span><em data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">” MW-4 (translated from Malay)</span></em></p><span data-dcnode-id="1770" instrument_node="">
</span></blockquote><span data-dcnode-id="1768" instrument_node="">
</span><a class="link-target" data-dcnode-id="1767" id="article1.body1.sec3.sec6.sec1.p3" name="article1.body1.sec3.sec6.sec1.p3"></a><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Participants also reported that employers may compel medical doctors to restrict the issuance of MCs and the prescription of more expensive medication. This practice is especially prevalent among in-house doctors or those at panel clinics provided for workers by employers. Some participants shared that employers are often reluctant to allow migrant workers full access to healthcare, as they are concerned about misuse.</span></p><span data-dcnode-id="1764" instrument_node="">
</span><blockquote data-dcnode-id="1739"><a class="link-target" data-dcnode-id="1763" id="article1.body1.sec3.sec6.sec1.disp-quote3.p1" name="article1.body1.sec3.sec6.sec1.disp-quote3.p1"></a><p data-dcnode-id="1741"><span data-dcnode-id="1762" instrument_node="">“</span><em data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">a lot of companies don’t want to give full [healthcare] access to foreigners</span></em><span data-dcnode-id="1759" instrument_node="">, </span><em data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">because they are worried of misuse</span></em><span data-dcnode-id="1756" instrument_node="">. </span><em data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">And you’ll be surprised some of them [migrant workers] would just come and visit you frequently</span></em><span data-dcnode-id="1753" instrument_node="">, </span><em data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">as either they seek MC</span></em><span data-dcnode-id="1750" instrument_node="">, </span><em data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">or you know their aches and pains</span></em><span data-dcnode-id="1747" instrument_node="">. </span><em data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Some of them do really hard work […] and they tend to have body aches</span></em><span data-dcnode-id="1744" instrument_node="">.</span><em data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">” MD-2</span></em></p><span data-dcnode-id="1740" instrument_node="">
</span></blockquote><span data-dcnode-id="1738" instrument_node="">
</span><a class="link-target" data-dcnode-id="1737" id="article1.body1.sec3.sec6.sec1.p4" name="article1.body1.sec3.sec6.sec1.p4"></a><p data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Participants also shared that undocumented workers are particularly vulnerable to exploitation by employers as they lack avenue for redress. Undocumented workers are thus unlikely to receive healthcare benefits or paid sick leave.</span></p><span data-dcnode-id="1734" instrument_node="">
</span><blockquote data-dcnode-id="1709"><a class="link-target" data-dcnode-id="1733" id="article1.body1.sec3.sec6.sec1.disp-quote4.p1" name="article1.body1.sec3.sec6.sec1.disp-quote4.p1"></a><p data-dcnode-id="1711"><span data-dcnode-id="1732" instrument_node="">“</span><em data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Some employers</span></em><span data-dcnode-id="1729" instrument_node="">, </span><em data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">they don’t pay because they say he is undocumented</span></em><span data-dcnode-id="1726" instrument_node="">. </span><em data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">So</span></em><span data-dcnode-id="1723" instrument_node="">, </span><em data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">they think the workers don’t have rights and don’t have access to report</span></em><span data-dcnode-id="1720" instrument_node="">. </span><em data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Because if they [undocumented worker] report</span></em><span data-dcnode-id="1717" instrument_node="">, </span><em data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">definitely they will be sent to the jail</span></em><span data-dcnode-id="1714" instrument_node="">.</span><em data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">” MW-1</span></em></p><span data-dcnode-id="1710" instrument_node="">
</span></blockquote><span data-dcnode-id="1708" instrument_node="">
</span></div><span data-dcnode-id="1706" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1668" id="section2"><a class="link-target" data-dcnode-id="1705" id="sec039" name="sec039" title="Permission to seek treatment"></a><h4 data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Permission to seek treatment.</span></h4><a class="link-target" data-dcnode-id="1702" id="article1.body1.sec3.sec6.sec2.p1" name="article1.body1.sec3.sec6.sec2.p1"></a><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">One participant explained that some companies require migrant workers to obtain permission from supervisors to seek treatment.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><blockquote data-dcnode-id="1674"><a class="link-target" data-dcnode-id="1698" id="article1.body1.sec3.sec6.sec2.disp-quote1.p1" name="article1.body1.sec3.sec6.sec2.disp-quote1.p1"></a><p data-dcnode-id="1676"><span data-dcnode-id="1697" instrument_node="">“</span><em data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">The good ones [employers]</span></em><span data-dcnode-id="1694" instrument_node="">, </span><em data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">actually they have a panel system with the clinic</span></em><span data-dcnode-id="1691" instrument_node="">. </span><em data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">[…] They also have a slip system where they [migrant workers] have to go to the HR [human resources] to collect the slip</span></em><span data-dcnode-id="1688" instrument_node="">, </span><em data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">and then they will come to the clinic and we [doctors] see them and sign them off</span></em><span data-dcnode-id="1685" instrument_node="">. </span><em data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">So</span></em><span data-dcnode-id="1682" instrument_node="">, </span><em data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">they don’t pay anything</span></em><span data-dcnode-id="1679" instrument_node="">, </span><em data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">because we will use the slip to claim” MD-2</span></em></p><span data-dcnode-id="1675" instrument_node="">
</span></blockquote><span data-dcnode-id="1673" instrument_node="">
</span><a class="link-target" data-dcnode-id="1672" id="article1.body1.sec3.sec6.sec2.p2" name="article1.body1.sec3.sec6.sec2.p2"></a><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Participants spoke of the process of obtaining permission to seek treatment, which is particularly troublesome when the worker is ill after working hours or is sick in his living quarters. Participants felt that the requirement for permission was a measure used by employers to further restrict a migrant worker’s access to care.</span></p><span data-dcnode-id="1669" instrument_node="">
</span></div><span data-dcnode-id="1667" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1623" id="section3"><a class="link-target" data-dcnode-id="1666" id="sec040" name="sec040" title="Employer withholds passports"></a><h4 data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Employer withholds passports.</span></h4><a class="link-target" data-dcnode-id="1663" id="article1.body1.sec3.sec6.sec3.p1" name="article1.body1.sec3.sec6.sec3.p1"></a><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Participants reported that although the practice is in violation of the Passport Act 1964, most employers keep their worker's passports. Those interviewed explained that employers usually justify this practice by saying that passports are taken for safe-keeping and to prevent workers from running away. The withholding of passports places the migrant workers in a vulnerable position.</span></p><span data-dcnode-id="1660" instrument_node="">
</span><blockquote data-dcnode-id="1629"><a class="link-target" data-dcnode-id="1659" id="article1.body1.sec3.sec6.sec3.disp-quote1.p1" name="article1.body1.sec3.sec6.sec3.disp-quote1.p1"></a><p data-dcnode-id="1631"><span data-dcnode-id="1658" instrument_node="">“</span><em data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">They’re afraid to go to government hospitals because they don’t have their passport with them</span></em><span data-dcnode-id="1655" instrument_node="">. </span><em data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Without the documents</span></em><span data-dcnode-id="1652" instrument_node="">, </span><em data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">they feel like they can be arrested [</span></em><span data-dcnode-id="1649" instrument_node="">…</span><em data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">]</span></em><span data-dcnode-id="1646" instrument_node="">. </span><em data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">When I asked them</span></em><span data-dcnode-id="1643" instrument_node="">, </span><em data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">‘Why don’t you have documents</span></em><span data-dcnode-id="1640" instrument_node="">?</span><em data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">’ They say</span></em><span data-dcnode-id="1637" instrument_node="">, </span><em data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">‘The employers keep it with them</span></em><span data-dcnode-id="1634" instrument_node="">.</span><em data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">’ […]” AC-1</span></em></p><span data-dcnode-id="1630" instrument_node="">
</span></blockquote><span data-dcnode-id="1628" instrument_node="">
</span><a class="link-target" data-dcnode-id="1627" id="article1.body1.sec3.sec6.sec3.p2" name="article1.body1.sec3.sec6.sec3.p2"></a><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Without passports, documented workers are considered de facto undocumented and are dependent on their employers to navigate the health system. Participants explained that these migrant workers, although technically documented, are subject to arrest by the police and other enforcement agents because they do not hold their documents.</span></p><span data-dcnode-id="1624" instrument_node="">
</span></div><span data-dcnode-id="1622" instrument_node="">
</span></div><span data-dcnode-id="1620" instrument_node="">
</span></div><span data-dcnode-id="1618" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1442" id="section4" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="1617" data-toc="sec041" id="sec041" name="sec041" title="Discussion"></a><h2 data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Discussion</span></h2><a class="link-target" data-dcnode-id="1614" id="article1.body1.sec4.p1" name="article1.body1.sec4.p1"></a><p data-dcnode-id="1603"><span data-dcnode-id="1613" instrument_node="">We found that healthcare services are often unavailable to migrant workers in Malaysia due to financial constraints. Healthcare costs are seldom borne by employers and migrant workers mostly pay OOP for healthcare [</span><a class="ref-tip" data-dcnode-id="1611" href="#pone.0218669.ref042"><span data-dcnode-id="1612" instrument_node="">42</span></a><span data-dcnode-id="1610" instrument_node="">]. Previous studies in Malaysia and elsewhere support our findings that migrant workers prefer private clinics, utilising public clinics infrequently [</span><a class="ref-tip" data-dcnode-id="1608" href="#pone.0218669.ref042"><span data-dcnode-id="1609" instrument_node="">42</span></a><span data-dcnode-id="1607" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="1605" href="#pone.0218669.ref045"><span data-dcnode-id="1606" instrument_node="">45</span></a><span data-dcnode-id="1604" instrument_node="">]. Not surprisingly, indirect and non-medical costs of utilising health, including the loss of wages and the cost of transportation, restrict access to healthcare services.</span></p><span data-dcnode-id="1602" instrument_node="">
</span><a class="link-target" data-dcnode-id="1601" id="article1.body1.sec4.p2" name="article1.body1.sec4.p2"></a><p data-dcnode-id="1584"><span data-dcnode-id="1600" instrument_node="">Our findings suggest that the SPIKPA insurance is inadequate in view of the recent increases in medical fees at public hospitals. Furthermore, if hospital bills exceed the MYR 10,000 (USD 2,325) insurance ceiling, migrants are obliged to pay the remainder. Workers with outstanding medical bills will not be allowed to renew their work permits upon expiry, while their employers are black-listed by the Immigration Department [</span><a class="ref-tip" data-dcnode-id="1598" href="#pone.0218669.ref022"><span data-dcnode-id="1599" instrument_node="">22</span></a><span data-dcnode-id="1597" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1595" href="#pone.0218669.ref025"><span data-dcnode-id="1596" instrument_node="">25</span></a><span data-dcnode-id="1594" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1592" href="#pone.0218669.ref028"><span data-dcnode-id="1593" instrument_node="">28</span></a><span data-dcnode-id="1591" instrument_node="">]. As employees are responsible for the payment of hospital bills, migrant workers often flee from hospitals before being officially discharged [</span><a class="ref-tip" data-dcnode-id="1589" href="#pone.0218669.ref046"><span data-dcnode-id="1590" instrument_node="">46</span></a><span data-dcnode-id="1588" instrument_node="">]. As demonstrated in our findings and in other settings, many employers send workers home, rather than face expensive hospital charges [</span><a class="ref-tip" data-dcnode-id="1586" href="#pone.0218669.ref047"><span data-dcnode-id="1587" instrument_node="">47</span></a><span data-dcnode-id="1585" instrument_node="">].</span></p><span data-dcnode-id="1583" instrument_node="">
</span><a class="link-target" data-dcnode-id="1582" id="article1.body1.sec4.p3" name="article1.body1.sec4.p3"></a><p data-dcnode-id="1577"><span data-dcnode-id="1581" instrument_node="">Additionally, we found that financial constraints are likely to influence the quality and provision of services. Healthcare workers interviewed alluded to the inevitable rationing of care due to financial limitations. Hence, a comprehensive insurance package for migrant workers that encompasses a full range of services (preventive, promotive, curative, rehabilitative) if implemented, would provide access to quality healthcare and financial risk protection, fulfilling goals for truly inclusive UHC [</span><a class="ref-tip" data-dcnode-id="1579" href="#pone.0218669.ref048"><span data-dcnode-id="1580" instrument_node="">48</span></a><span data-dcnode-id="1578" instrument_node="">]. We suggest that the MOH, Malaysia evaluate the current fee structure for non-citizens at public facilities to consider utilization patterns and unpaid bills among non-citizens. The SPIKPA insurance scheme should also be revised to commensurate with the increased fee structure for non-citizens at MOH facilities.</span></p><span data-dcnode-id="1576" instrument_node="">
</span><a class="link-target" data-dcnode-id="1575" id="article1.body1.sec4.p4" name="article1.body1.sec4.p4"></a><p data-dcnode-id="1561"><span data-dcnode-id="1574" instrument_node="">The need to present legal documents at healthcare facilities and the fear of deportation is a major deterrent for healthcare utilisation. We found that migrant workers feel discriminated against, especially when asked to produce documents on registration at healthcare facilities. Discrimination based on documentation status, experienced as a stigma by undocumented migrants has been demonstrated in various settings [</span><a class="ref-tip" data-dcnode-id="1572" href="#pone.0218669.ref005"><span data-dcnode-id="1573" instrument_node="">5</span></a><span data-dcnode-id="1571" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1569" href="#pone.0218669.ref049"><span data-dcnode-id="1570" instrument_node="">49</span></a><span data-dcnode-id="1568" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1566" href="#pone.0218669.ref050"><span data-dcnode-id="1567" instrument_node="">50</span></a><span data-dcnode-id="1565" instrument_node="">]. Undocumented migrants are particularly insecure at public facilities, as they are liable for arrest and detention. Doctors interviewed expressed concern that withholding care based on legal status is against the ethics of the medical profession. Nevertheless, the MOH, Malaysia directs all health professionals to report the presence of undocumented foreigners to the police, as required by the Immigration Act [</span><a class="ref-tip" data-dcnode-id="1563" href="#pone.0218669.ref051"><span data-dcnode-id="1564" instrument_node="">51</span></a><span data-dcnode-id="1562" instrument_node="">].</span></p><span data-dcnode-id="1560" instrument_node="">
</span><a class="link-target" data-dcnode-id="1559" id="article1.body1.sec4.p5" name="article1.body1.sec4.p5"></a><p data-dcnode-id="1545"><span data-dcnode-id="1558" instrument_node="">Currently, Thailand is the only ASEAN member country, and among the few globally, that allows for undocumented migrants to opt-in to the national health insurance scheme, allowing for population-wide access to healthcare not restricted by citizenship [</span><a class="ref-tip" data-dcnode-id="1556" href="#pone.0218669.ref048"><span data-dcnode-id="1557" instrument_node="">48</span></a><span data-dcnode-id="1555" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1553" href="#pone.0218669.ref052"><span data-dcnode-id="1554" instrument_node="">52</span></a><span data-dcnode-id="1552" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1550" href="#pone.0218669.ref053"><span data-dcnode-id="1551" instrument_node="">53</span></a><span data-dcnode-id="1549" instrument_node="">]. Under the Thai Health Insurance Card Scheme (HICS), undocumented migrant workers can register at One Stop Service Centres (OSSCs) comprised of the Ministry of the Interior issuing temporary identity cards, the Ministry of Labour issuing temporary work permits, and the Ministry of Public Health conducting the medical exam and enrolling migrants in the HICS, with durations of 6 months to one year. Migrant workers must then undergo a Nationality Verification (NV) process at their home country embassy to receive full work permits and identity documents beyond this period. While the challenge remains that not all migrants undergo the NV process and therefore become totally undocumented again, the Thai system remains a rare example of a destination country which permits undocumented migrants to enrol in a national health insurance scheme [</span><a class="ref-tip" data-dcnode-id="1547" href="#pone.0218669.ref054"><span data-dcnode-id="1548" instrument_node="">54</span></a><span data-dcnode-id="1546" instrument_node="">]. Malaysia, as a major destination country for migrant workers, has some provision of care for documented migrants. Unfortunately, UHC in Malaysia is clearly restricted to citizens, with a higher fee system for foreigners and the exclusion of undocumented migrants from public healthcare services.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><a class="link-target" data-dcnode-id="1543" id="article1.body1.sec4.p6" name="article1.body1.sec4.p6"></a><p data-dcnode-id="1517"><span data-dcnode-id="1542" instrument_node="">Poor communication affects the quality of care received. Those with limited local language proficiency report less satisfaction with care and poor understanding of their medical situation. Limited language proficiency also affects patient safety in terms of medical errors on the part of the prescribing physician, and adverse medication reactions resulting from patient’s misunderstanding of instructions [</span><a class="ref-tip" data-dcnode-id="1540" href="#pone.0218669.ref004"><span data-dcnode-id="1541" instrument_node="">4</span></a><span data-dcnode-id="1539" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1537" href="#pone.0218669.ref055"><span data-dcnode-id="1538" instrument_node="">55</span></a><span data-dcnode-id="1536" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1534" href="#pone.0218669.ref056"><span data-dcnode-id="1535" instrument_node="">56</span></a><span data-dcnode-id="1533" instrument_node="">]. Achieving sufficient patient understanding to assure informed consent is particularly challenging for patients without proficiency in local languages [</span><a class="ref-tip" data-dcnode-id="1531" href="#pone.0218669.ref057"><span data-dcnode-id="1532" instrument_node="">57</span></a><span data-dcnode-id="1530" instrument_node="">]. Our study suggests that translation provided by informal interpreters like family members, friends, or untrained staff members may be suboptimal, and reliance on informal interpreters may compromise clinical care. The MOH, Malaysia should consider developing a professional interpreter service at major hospitals in Malaysia. While providing trained, professional interpreters may not be feasible due to the complexity and expense of catering to the myriad of nationalities working in Malaysia, the health system should aspire towards establishing migrant-friendly services. A successful example is Thailand’s migrant-friendly services, which involved training voluntary community health workers from migrant communities as intercultural mediators and patient navigators, as well as providing health education material in migrant languages [</span><a class="ref-tip" data-dcnode-id="1528" href="#pone.0218669.ref052"><span data-dcnode-id="1529" instrument_node="">52</span></a><span data-dcnode-id="1527" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1525" href="#pone.0218669.ref058"><span data-dcnode-id="1526" instrument_node="">58</span></a><span data-dcnode-id="1524" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1522" href="#pone.0218669.ref059"><span data-dcnode-id="1523" instrument_node="">59</span></a><span data-dcnode-id="1521" instrument_node="">]. Cultural competence training and professional development opportunities such as mentoring and supervision of the health workforce are necessary approaches in other countries to combat issues of racism and discrimination experienced by marginalised communities [</span><a class="ref-tip" data-dcnode-id="1519" href="#pone.0218669.ref060"><span data-dcnode-id="1520" instrument_node="">60</span></a><span data-dcnode-id="1518" instrument_node="">].</span></p><span data-dcnode-id="1516" instrument_node="">
</span><a class="link-target" data-dcnode-id="1515" id="article1.body1.sec4.p7" name="article1.body1.sec4.p7"></a><p data-dcnode-id="1510"><span data-dcnode-id="1514" instrument_node="">Described here are complex barriers to healthcare access that goes beyond the health sector, involving labour and immigration policies. According to the Employment Act 1955, an employee shall be granted paid sick leave after an examination by a registered medical officer at the expense of the employer. Unfortunately, the act does not explicitly outline an employer’s responsibility to provide medical attention to employees [</span><a class="ref-tip" data-dcnode-id="1512" href="#pone.0218669.ref061"><span data-dcnode-id="1513" instrument_node="">61</span></a><span data-dcnode-id="1511" instrument_node="">], exacerbating financial barriers faced by migrant workers accessing much needed care. We suggest that the Employment Act 1955 be amended to ensure the employer’s payment for treatment at outpatient clinics, provision of paid sick leave and transportation to healthcare facilities. We suggest here that regular labour inspections be conducted to ensure the welfare of migrant workers, including the enforcement of Passport Act 1964 to prevent employer’s withholding of passports.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><a class="link-target" data-dcnode-id="1508" id="article1.body1.sec4.p8" name="article1.body1.sec4.p8"></a><p data-dcnode-id="1494"><span data-dcnode-id="1507" instrument_node="">Migration policies in Malaysia are overwhelming focused on controlling migrant workers [</span><a class="ref-tip" data-dcnode-id="1505" href="#pone.0218669.ref062"><span data-dcnode-id="1506" instrument_node="">62</span></a><span data-dcnode-id="1504" instrument_node="">, </span><a class="ref-tip" data-dcnode-id="1502" href="#pone.0218669.ref063"><span data-dcnode-id="1503" instrument_node="">63</span></a><span data-dcnode-id="1501" instrument_node="">], as reflected in our findings on immigration notification at health facilities. We suggest establishing a multi-stakeholder migration management body, that can work towards developing comprehensive labour migration policies which include health. The recent decision to include migrant workers in Malaysia’s social security scheme (SOCSO) in line with International Labour Organization (ILO) recommendations are promising [</span><a class="ref-tip" data-dcnode-id="1499" href="#pone.0218669.ref064"><span data-dcnode-id="1500" instrument_node="">64</span></a><span data-dcnode-id="1498" instrument_node="">–</span><a class="ref-tip" data-dcnode-id="1496" href="#pone.0218669.ref066"><span data-dcnode-id="1497" instrument_node="">66</span></a><span data-dcnode-id="1495" instrument_node="">]. But it remains to be seen how this policy will be implemented and its benefits in improving healthcare access.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><a class="link-target" data-dcnode-id="1492" id="article1.body1.sec4.p9" name="article1.body1.sec4.p9"></a><p data-dcnode-id="1487"><span data-dcnode-id="1491" instrument_node="">We found that all migrant workers in Malaysia faced financial difficulties when accessing healthcare. Not surprisingly, the main barrier experienced by undocumented migrants were the lack of documents, such as valid work permits or passports, making it impossible for them to seek treatment at public facilities. Also, the lack of documents makes safe travel to seek treatment challenging for undocumented migrants. Interestingly, we found that most documented workers are similarly vulnerable as their passports were unlawfully withheld by employers. Undocumented migrants are not covered by SPIKPA health insurance for healthcare costs at MOH hospitals. But this is irrelevant, as migrants are unable to access public healthcare without valid documents. Other barriers faced, like language, discrimination, and transportation are similar for both documented and undocumented migrants. </span><a data-dcnode-id="1489" href="#pone-0218669-t004"><span data-dcnode-id="1490" instrument_node="">Table 4</span></a><span data-dcnode-id="1488" instrument_node=""> summarises the main policy recommendations discussed here.</span></p><span data-dcnode-id="1486" instrument_node="">
</span><a class="link-target" data-dcnode-id="1485" id="pone-0218669-t004" name="pone-0218669-t004"></a><div class="figure" data-dcnode-id="1451" data-doi="10.1371/journal.pone.0218669.t004"><div class="img-box" data-dcnode-id="1481"><a data-dcnode-id="1483" data-doi="10.1371/journal.pone.0218669" data-uri="10.1371/journal.pone.0218669.t004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dmedium%26id%3D10.1371/journal.pone.0218669.t004" title="Click for larger image"><img alt="thumbnail" class="thumbnail" data-dcnode-id="1484" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fsize%3Dinline%26id%3D10.1371/journal.pone.0218669.t004&amp;raw"></a><div class="expand" data-dcnode-id="1482"></div></div><div class="figure-inline-download" data-dcnode-id="1460"><span data-dcnode-id="1480" instrument_node="">
          Download:
          </span><ul data-dcnode-id="1461"><li data-dcnode-id="1474"><a data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/powerpoint%3Fid%3D10.1371/journal.pone.0218669.t004"><div class="definition-label" data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">PPT</span></div><div class="definition-description" data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">PowerPoint slide</span></div></a></li><li data-dcnode-id="1468"><a data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Dlarge%26id%3D10.1371/journal.pone.0218669.t004"><div class="definition-label" data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">PNG</span></div><div class="definition-description" data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">larger image</span></div></a></li><li data-dcnode-id="1462"><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article/figure/image%3Fdownload%26size%3Doriginal%26id%3D10.1371/journal.pone.0218669.t004"><div class="definition-label" data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">TIFF</span></div><div class="definition-description" data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">original image</span></div></a></li></ul></div><div class="figcaption" data-dcnode-id="1456"><span data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Table 4. </span></span><span data-dcnode-id="1457" instrument_node=""> Policy recommendations to address barriers to migrant worker’s access to healthcare.</span></div><p class="caption_target" data-dcnode-id="1455"></p><p class="caption_object" data-dcnode-id="1452"><a data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0218669.t004"><span data-dcnode-id="1454" instrument_node="">
              https://doi.org/10.1371/journal.pone.0218669.t004</span></a></p></div><a class="link-target" data-dcnode-id="1450" id="article1.body1.sec4.p10" name="article1.body1.sec4.p10"></a><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">This study has several limitations. Migrant workers in Malaysia are a heterogeneous group from different countries of origin, with different linguistic and socio-cultural backgrounds, and working in diverse industries. Also, migrant workers in East Malaysia may have specific barriers to healthcare not explored here. This diversity in migrant populations results in disparate health experiences and vulnerabilities. Also, undocumented migrants are a hidden population, who are difficult to contact and interview. Nonetheless, by interviewing distinct groups including migrant workers and their representatives, civil society organisations, trade unions, academia and medical doctors, we were able to triangulate findings and obtain a broad understanding of the healthcare barriers faced by migrant workers in Malaysia. While the qualitative nature of this study precludes the generalisation of findings, we gained insight into the obstacles faced by migrant workers seeking care from multiple perspectives.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><a class="link-target" data-dcnode-id="1446" id="article1.body1.sec4.p11" name="article1.body1.sec4.p11"></a><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">This study has several strengths. To our knowledge, this is the first qualitative study of its kind to examine and provide a detailed understanding of barriers to healthcare access faced by migrant workers in Malaysia. Our findings address an important gap in understanding of migrant health in Malaysia. We have suggested areas for future research and policy change, including a “health in all policies” approach to labour and immigration policies, expanded health insurance coverage to include preventive and rehabilitative services, and suggestions to make healthcare services more migrant-friendly.</span></p><span data-dcnode-id="1443" instrument_node="">
</span></div><span data-dcnode-id="1441" instrument_node="">
</span><div class="section toc-section" data-dcnode-id="1433" id="section5" xmlns:plos="http://plos.org"><a class="link-target" data-dcnode-id="1440" data-toc="sec042" id="sec042" name="sec042" title="Conclusion"></a><h2 data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Conclusion</span></h2><a class="link-target" data-dcnode-id="1437" id="article1.body1.sec5.p1" name="article1.body1.sec5.p1"></a><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Despite achieving UHC for citizens, healthcare services in Malaysia are often inaccessible to migrant workers. Excluding migrants from national health provisions violates human rights and undermines national public health goals. A rights-based approach to health, integrating migrant workers health needs within national health strategies, will benefit the entire population. Ultimately, changes in migrant health-related policy will only come from political will. We urge Malaysia’s new government to recognize the immense contribution of migrant workers and to no longer continue policies of benign neglect, by testing and implementing policies that ensure no one, including migrant workers, are left behind.</span></p><span data-dcnode-id="1434" instrument_node="">
</span></div><span data-dcnode-id="1432" instrument_node="">
