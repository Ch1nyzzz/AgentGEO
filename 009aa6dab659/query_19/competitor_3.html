</span><meta content="Pregnancy is a period of increased vulnerability for migrant women, and access to healthcare, use and quality of care provided during this period are important aspects to characterize the support provided to this population. A systematic review of the scientific literature contained in the MEDLINE and SCOPUS databases was carried out, searching for population based studies published between 1990 and 2012 and reporting on maternal healthcare in immigrant populations. A total of 854 articles were retrieved and 30 publications met the inclusion criteria, being included in the final evaluation. The majority of studies point to a higher health risk profile in immigrants, with an increased incidence of co-morbidity in some populations, reduced access to health facilities particularly in illegal immigrants, poor communication between women and caregivers, a lower rate of obstetrical interventions, a higher incidence of stillbirth and early neonatal death, an increased risk of maternal death, and a higher incidence of postpartum depression. Incidences vary widely among different population groups. Some migrant populations are at a higher risk of serious complications during pregnancy, for reasons that include reduced access and use of healthcare facilities, as well as less optimal care, resulting in a higher incidence of adverse outcomes. Tackling these problems and achieving equality of care for all is a challenging aim for public healthcare services." data-dcnode-id="3052" name="dc.description"><span data-dcnode-id="3051" instrument_node="">

</span><meta content="Pregnancy is a period of increased vulnerability for migrant women, and access to healthcare, use and quality of care provided during this period are important aspects to characterize the support provided to this population. A systematic review of the scientific literature contained in the MEDLINE and SCOPUS databases was carried out, searching for population based studies published between 1990 and 2012 and reporting on maternal healthcare in immigrant populations. A total of 854 articles were retrieved and 30 publications met the inclusion criteria, being included in the final evaluation. The majority of studies point to a higher health risk profile in immigrants, with an increased incidence of co-morbidity in some populations, reduced access to health facilities particularly in illegal immigrants, poor communication between women and caregivers, a lower rate of obstetrical interventions, a higher incidence of stillbirth and early neonatal death, an increased risk of maternal death, and a higher incidence of postpartum depression. Incidences vary widely among different population groups. Some migrant populations are at a higher risk of serious complications during pregnancy, for reasons that include reduced access and use of healthcare facilities, as well as less optimal care, resulting in a higher incidence of adverse outcomes. Tackling these problems and achieving equality of care for all is a challenging aim for public healthcare services." data-dcnode-id="2842" property="og:description"><span data-dcnode-id="2841" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1077" data-track-component="article body"><span data-dcnode-id="2367" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="2360" data-gtm-vis-first-on-screen-50443292_562="455" data-gtm-vis-first-on-screen-50443292_563="456" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="455" data-gtm-vis-recent-on-screen-50443292_563="456" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2361" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2365" id="Abs1"><span data-dcnode-id="2366" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2362" id="Abs1-content"><p data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Pregnancy is a period of increased vulnerability for migrant women, and access to healthcare, use and quality of care provided during this period are important aspects to characterize the support provided to this population. A systematic review of the scientific literature contained in the MEDLINE and SCOPUS databases was carried out, searching for population based studies published between 1990 and 2012 and reporting on maternal healthcare in immigrant populations. A total of 854 articles were retrieved and 30 publications met the inclusion criteria, being included in the final evaluation. The majority of studies point to a higher health risk profile in immigrants, with an increased incidence of co-morbidity in some populations, reduced access to health facilities particularly in illegal immigrants, poor communication between women and caregivers, a lower rate of obstetrical interventions, a higher incidence of stillbirth and early neonatal death, an increased risk of maternal death, and a higher incidence of postpartum depression. Incidences vary widely among different population groups. Some migrant populations are at a higher risk of serious complications during pregnancy, for reasons that include reduced access and use of healthcare facilities, as well as less optimal care, resulting in a higher incidence of adverse outcomes. Tackling these problems and achieving equality of care for all is a challenging aim for public healthcare services.</span></p></div></div></section><span data-dcnode-id="2359" instrument_node="">
</span><section data-dcnode-id="2318" data-gtm-vis-first-on-screen-50443292_562="455" data-gtm-vis-first-on-screen-50443292_563="456" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-polling-id-50443292_563="99" data-gtm-vis-recent-on-screen-50443292_562="455" data-gtm-vis-recent-on-screen-50443292_563="456" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Background"><div class="c-article-section" data-dcnode-id="2319" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2357" id="Sec1"><span data-dcnode-id="2358" instrument_node="">Background</span></h2><div class="c-article-section__content" data-dcnode-id="2320" id="Sec1-content"><p data-dcnode-id="2331"><span data-dcnode-id="2356" instrument_node="">The most recent waves of immigration show the increasing feminization of this phenomenon. Migrant women frequently initiate the mobility process at a childbearing age, irrespective of individual motivations for leaving their countries. They are also frequently exposed to biological and psychosocial risks when confronted with new contexts, environments and lifestyles that tend to accentuate situations of social vulnerability [</span><a aria-label="Reference 1" data-dcnode-id="2354" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d267251097e406" title="Fernandes, A., &amp; Miguel, J. (2009). Health and migration in the European Union: Better health for all in an Inclusive Society. Lisboa: Instituto Nacional de Saúde Doutor Ricardo Jorge."><span data-dcnode-id="2355" instrument_node="">1</span></a><span data-dcnode-id="2353" instrument_node="">]. In addition to the anxieties inherent to migration, there is scientific evidence suggesting increased vulnerability during pregnancy and the postpartum period [</span><a aria-label="Reference 2" data-dcnode-id="2351" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d267251097e409" title="Bunevicius, R., Kusminskas, L., Bunevicius, A., Nadisauskiene, R., Jureniene, K., &amp; Pop, V. (2009). Psychosocial risk factors for depression during pregnancy. Acta Obstetricia et Gynecologica,
                           88, 599–605."><span data-dcnode-id="2352" instrument_node="">2</span></a><span data-dcnode-id="2350" instrument_node="">, </span><a aria-label="Reference 3" data-dcnode-id="2348" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d267251097e412" title="Schetter, C. D. (2011). Psychological science on pregnancy: Stress processes, biopsychosocial models, and emerging research issues. Annual Review of Psychology,
                           62, 531–558."><span data-dcnode-id="2349" instrument_node="">3</span></a><span data-dcnode-id="2347" instrument_node="">]. Stressors associated with the migration process may be particularly important after delivery, exacerbating psychopathological complications such as the postpartum blues, psychosis and depression [</span><a aria-label="Reference 2" data-dcnode-id="2345" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d267251097e415" title="Bunevicius, R., Kusminskas, L., Bunevicius, A., Nadisauskiene, R., Jureniene, K., &amp; Pop, V. (2009). Psychosocial risk factors for depression during pregnancy. Acta Obstetricia et Gynecologica,
                           88, 599–605."><span data-dcnode-id="2346" instrument_node="">2</span></a><span data-dcnode-id="2344" instrument_node="">, </span><a aria-label="Reference 4" data-dcnode-id="2342" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d267251097e418" title="Rumbold, A., Bailie, R., Si, D., Dowden, M., Kennedy, C., et al. (2011). Delivery of maternal health care in Indigenous primary care services: Baseline data for an ongoing quality improvement initiative. BMC Pregnancy &amp; Childbirth,
                           11, 16."><span data-dcnode-id="2343" instrument_node="">4</span></a><span data-dcnode-id="2341" instrument_node="">]. Several psychosocial risk factors have been described, and include lack of social support, recent life stresses (including factors leading to migration and the migration process itself), personality variables and feelings about pregnancy or parenthood. Social and physical environmental adversity have been associated with maternal stress and pregnancy and infant health outcomes including prematurity, low-birth weight and infant mortality [</span><a aria-label="Reference 5" data-dcnode-id="2339" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d267251097e422" title="Eastwood, J. G., Phung, H., &amp; Barnett, B. (2011). Postnatal depression and socio-demographic risk: Factors associated with Edinburgh Depression Scale scores in a metropolitan area of New South Wales, Australia. Australian and New Zealand Journal of Psychiatry,
                           45, 1040–1046."><span data-dcnode-id="2340" instrument_node="">5</span></a><span data-dcnode-id="2338" instrument_node="">]. Migrants also exhibit a greater risk of suffering from mental illness, including depression, schizophrenia and post-traumatic stress, as a result of specific psychosocial determinants [</span><a aria-label="Reference 2" data-dcnode-id="2336" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d267251097e425" title="Bunevicius, R., Kusminskas, L., Bunevicius, A., Nadisauskiene, R., Jureniene, K., &amp; Pop, V. (2009). Psychosocial risk factors for depression during pregnancy. Acta Obstetricia et Gynecologica,
                           88, 599–605."><span data-dcnode-id="2337" instrument_node="">2</span></a><span data-dcnode-id="2335" instrument_node="">, </span><a aria-label="Reference 4" data-dcnode-id="2333" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d267251097e428" title="Rumbold, A., Bailie, R., Si, D., Dowden, M., Kennedy, C., et al. (2011). Delivery of maternal health care in Indigenous primary care services: Baseline data for an ongoing quality improvement initiative. BMC Pregnancy &amp; Childbirth,
                           11, 16."><span data-dcnode-id="2334" instrument_node="">4</span></a><span data-dcnode-id="2332" instrument_node="">].</span></p><p data-dcnode-id="2323"><span data-dcnode-id="2330" instrument_node="">The issue of vulnerability acquires more alarming contours when there are barriers that hinder the access of migrant populations to health systems, such as those related to economic difficulties, language problems, mobility issues, legal status, healthcare provider’s attitudes, and cultural differences [</span><a aria-label="Reference 6" data-dcnode-id="2328" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d267251097e434" title="Dias, S., Gama, A., Cortes, M., &amp; de Sousa, B. (2011). Healthcare-seeking patterns among immigrants in Portugal. Health and Social Care in the Community,
                           19, 514–521."><span data-dcnode-id="2329" instrument_node="">6</span></a><span data-dcnode-id="2327" instrument_node="">–</span><a aria-label="Reference 9" data-dcnode-id="2325" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d267251097e437" title="Dias, S., Gama, A., &amp; Rocha, C. (2010). Perspectives of African and Brazilian immigrant women on sexual and reproductive health. The European Journal of Contraception and Reproductive Health Care,
                           15, 255–263."><span data-dcnode-id="2326" instrument_node="">9</span></a><span data-dcnode-id="2324" instrument_node="">]. It is therefore important to assess the determinants of maternal healthcare in immigrant populations in order to establish policies that better attend these women’s requirements.</span></p><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">The aim of this paper was to review the existing scientific evidence on the access, use and quality of healthcare in migrant populations during pregnancy and the postpartum period, with particular emphasis on how this interferes with health indicators and outcomes. To our knowledge, this is the first review to contemplate these three prime aspects of healthcare in the obstetric population.</span></p></div></div></section><section data-dcnode-id="2295" data-gtm-vis-first-on-screen-50443292_562="455" data-gtm-vis-first-on-screen-50443292_563="456" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-polling-id-50443292_563="100" data-gtm-vis-recent-on-screen-50443292_562="455" data-gtm-vis-recent-on-screen-50443292_563="456" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="9900" data-title="Methods"><div class="c-article-section" data-dcnode-id="2296" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2316" id="Sec2"><span data-dcnode-id="2317" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="2297" id="Sec2-content"><p data-dcnode-id="2308"><span data-dcnode-id="2315" instrument_node="">One of our goals was to provide and reinforce evidence on the major role of perceived needs, cultural knowledge and individual expectations (e.g. health literacy). These aspects potentially influence the subjective perceptions of the migrant population about health and care adequacy, affecting their request and adherence to treatment as well as health behavior advice [</span><a aria-label="Reference 10" data-dcnode-id="2313" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d267251097e450" title="Merry, L., Gagnon, A. J., Hemlin, I., Clarke, H., &amp; Hickey, J. (2011). Cross-border movement and women’s health: How to capture the data. International Journal for Equity in Health,
                           10, 56."><span data-dcnode-id="2314" instrument_node="">10</span></a><span data-dcnode-id="2312" instrument_node="">, </span><a aria-label="Reference 11" data-dcnode-id="2310" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d267251097e453" title="Merry, L. A., Gagnon, A. J., Kalim, N., &amp; Bouris, S. S. (2011). Refugee claimant women and barriers to health and social services post-birth. Canadian Journal of Public Health,
                           102, 286–290."><span data-dcnode-id="2311" instrument_node="">11</span></a><span data-dcnode-id="2309" instrument_node="">]. These elements provide noteworthy indications to expand the research field knowledge and clinical focus.</span></p><p data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">The Medline and Scopus databases were searched for original articles (excluding comments, editorials, reviews and guidelines), published between January 1990 and February 2012, with abstracts written in English, Spanish, French or Portuguese, using the following search sentence: (pregnant OR pregnancy OR postpartum) AND (migrant OR migrants OR immigrant OR immigrants OR emigrants) AND (“maternal health” OR “maternal care” OR “prenatal care” OR “postpartum care” OR “prenatal health” OR “postpartum health” OR “health services” OR “maternal health services” OR “health care” OR “prenatal health services” OR “quality care” OR “health care quality” OR “health services utilization” OR “health access” OR “perinatal health” OR “perinatal care” OR “perinatal health services” OR “health outcomes” OR “health indicators” OR “health status” OR “reproductive health outcomes” OR “reproductive health indicators” OR “reproductive health status” OR “perinatal health outcomes” OR “perinatal health indicators” OR “perinatal health status”).</span></p><p data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">A total of 854 articles were obtained. The abstracts were evaluated by one of the authors (LA) to select studies that met all of the following inclusion criteria: (1) related to migrant women during pregnancy or in the year that followed, (2) evaluating access, use and/or quality of care, (3) providing and evaluation of health outcomes and/or presenting comparable health indicators.</span></p><p data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">The following exclusion criteria were also defined: (1) articles in which participants were in a situation of forced migration, were refugees or asylum seekers; (2) articles where evaluation of health outcomes was not based on assessment of access, use and/or quality of care; (3) articles where outcomes were not explicitly resultant from maternal healthcare; (4) studies that did not have a control group, or comparable health indicators from the indigenous population; (5) studies in which the participants had pre-existing health conditions, alcohol and drug abuse; (6) studies evaluating practitioners’ views, experiences and perspectives.</span></p><p data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">After application of the inclusion and exclusion criteria, a total of 27 articles were retrieved for analysis. The full-text of these papers was read by one of the researchers (LA) to confirm that they were original studies. The reference list of all systematic reviews and/or meta-analysis related to the topic was checked manually in order to identify studies that may not have been retrieved using the defined search strategy. This yielded a further three papers, for a total of 30 included studies.</span></p><p data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Data extraction was carried out independently by three researchers (LA, JC, DB) and discrepancies were resolved by consensus. When data from the same study was reported in different publications, only the more recent paper was selected. No quality scoring system was applied in this review.</span></p></div></div></section><section data-dcnode-id="2128" data-gtm-vis-first-on-screen-50443292_562="455" data-gtm-vis-first-on-screen-50443292_563="456" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-polling-id-50443292_563="101" data-gtm-vis-recent-on-screen-50443292_562="455" data-gtm-vis-recent-on-screen-50443292_563="456" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="9900" data-title="Results"><div class="c-article-section" data-dcnode-id="2129" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2293" id="Sec3"><span data-dcnode-id="2294" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="2130" id="Sec3-content"><p data-dcnode-id="2282"><span data-dcnode-id="2292" instrument_node="">Table&nbsp;</span><a data-dcnode-id="2290" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2291" instrument_node="">1</span></a><span data-dcnode-id="2289" instrument_node=""> provides a summary of the main characteristics and findings of the evaluated studies. Studies were mainly conducted in Europe, but some were carried out in the USA, Canada and Australia. Most countries where the studies were performed have specific legislation favoring universal access to healthcare during pregnancy [</span><a aria-label="Reference 12" data-dcnode-id="2287" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d267251097e478" title="Ganann, R., Sword, W., Black, M., &amp; Carpio, B. (2011). Influence of maternal birthplace on postpartum health and health services use. Journal of Immigrant and Minority Health,
                           14(2), 223–229."><span data-dcnode-id="2288" instrument_node="">12</span></a><span data-dcnode-id="2286" instrument_node="">–</span><a aria-label="Reference 16" data-dcnode-id="2284" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d267251097e481" title="Sword, W., Watt, S., &amp; Krueger, P. (2006). Postpartum health, service needs, and access to care experiences of immigrant and Canadian-born women. Journal of Obstetric, Gynecologic, and Neonatal Nursing,
                           35, 717–727."><span data-dcnode-id="2285" instrument_node="">16</span></a><span data-dcnode-id="2283" instrument_node="">].</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2267" data-test="inline-table" id="table-1"><figure data-dcnode-id="2268"><figcaption class="c-article-table__figcaption" data-dcnode-id="2279"><b data-dcnode-id="2280" data-test="table-caption" id="Tab1"><span data-dcnode-id="2281" instrument_node="">Table&nbsp;1 Main characteristics and findings of the studies included in the review</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2269"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="2270" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10995-012-1149-x/tables/1" rel="nofollow"><span data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2271" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2272" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2273" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2276" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2275" fill-rule="evenodd"></path><span data-dcnode-id="2274" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2266" instrument_node="">
</span><p data-dcnode-id="2249"><span data-dcnode-id="2265" instrument_node="">The majority of studies point to a higher health risk profile in migrants [</span><a aria-label="Reference 6" data-dcnode-id="2263" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d267251097e1701" title="Dias, S., Gama, A., Cortes, M., &amp; de Sousa, B. (2011). Healthcare-seeking patterns among immigrants in Portugal. Health and Social Care in the Community,
                           19, 514–521."><span data-dcnode-id="2264" instrument_node="">6</span></a><span data-dcnode-id="2262" instrument_node="">, </span><a aria-label="Reference 8" data-dcnode-id="2260" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d267251097e1704" title="Dias, S., Gama, A., &amp; Rocha, C. (2010). Immigrant women’s perceptions and experiences of health care services: Insights from a focus group study. Journal of Public Health,
                           18, 489–496."><span data-dcnode-id="2261" instrument_node="">8</span></a><span data-dcnode-id="2259" instrument_node="">, </span><a aria-label="Reference 10" data-dcnode-id="2257" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d267251097e1707" title="Merry, L., Gagnon, A. J., Hemlin, I., Clarke, H., &amp; Hickey, J. (2011). Cross-border movement and women’s health: How to capture the data. International Journal for Equity in Health,
                           10, 56."><span data-dcnode-id="2258" instrument_node="">10</span></a><span data-dcnode-id="2256" instrument_node="">, </span><a aria-label="Reference 11" data-dcnode-id="2254" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d267251097e1710" title="Merry, L. A., Gagnon, A. J., Kalim, N., &amp; Bouris, S. S. (2011). Refugee claimant women and barriers to health and social services post-birth. Canadian Journal of Public Health,
                           102, 286–290."><span data-dcnode-id="2255" instrument_node="">11</span></a><span data-dcnode-id="2253" instrument_node="">, </span><a aria-label="Reference 17" data-dcnode-id="2251" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d267251097e1713" title="David, M., Pachaly, J., &amp; Vetter, K. (2006). Perinatal outcome in Berlin (Germany) among immigrants from Turkey. Archives of Gynecology and Obstetrics,
                           274, 271–278."><span data-dcnode-id="2252" instrument_node="">17</span></a><span data-dcnode-id="2250" instrument_node="">], and this can be due to different contributing factors.</span></p><p data-dcnode-id="2238"><span data-dcnode-id="2248" instrument_node="">Some migrant populations appear to have a higher incidence of disease that can affect pregnancy and the postpartum period, particularly of anemia [</span><a aria-label="Reference 18" data-dcnode-id="2246" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d267251097e1719" title="van Roosmalen, J., Schuitemaker, N. W., Brand, R., van Dongen, P. W., &amp; Bennebroek Gravenhorst, J. (2002). Substandard care in immigrant versus indigenous maternal deaths in The Netherlands. BJOG,
                           109, 212–213."><span data-dcnode-id="2247" instrument_node="">18</span></a><span data-dcnode-id="2245" instrument_node="">–</span><a aria-label="Reference 20" data-dcnode-id="2243" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d267251097e1722" title="Reeske, A., Kutschmann, M., Razum, O., &amp; Spallek, J. (2011). Stillbirth differences according to regions of origin: An analysis of the German perinatal database, 2004–2007. BMC Pregnancy Childbirth,
                           11, 63."><span data-dcnode-id="2244" instrument_node="">20</span></a><span data-dcnode-id="2242" instrument_node="">]. It is also noticeable that the rate of congenital malformations is significantly higher in some migrant collectives [</span><a aria-label="Reference 18" data-dcnode-id="2240" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d267251097e1725" title="van Roosmalen, J., Schuitemaker, N. W., Brand, R., van Dongen, P. W., &amp; Bennebroek Gravenhorst, J. (2002). Substandard care in immigrant versus indigenous maternal deaths in The Netherlands. BJOG,
                           109, 212–213."><span data-dcnode-id="2241" instrument_node="">18</span></a><span data-dcnode-id="2239" instrument_node="">].</span></p><p data-dcnode-id="2212"><span data-dcnode-id="2237" instrument_node="">A recent study from Germany reported that access to healthcare services was similar for the majority of migrant women during pregnancy, therefore suggesting that observed differences were related to the quality and content of antenatal care [</span><a aria-label="Reference 20" data-dcnode-id="2235" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d267251097e1731" title="Reeske, A., Kutschmann, M., Razum, O., &amp; Spallek, J. (2011). Stillbirth differences according to regions of origin: An analysis of the German perinatal database, 2004–2007. BMC Pregnancy Childbirth,
                           11, 63."><span data-dcnode-id="2236" instrument_node="">20</span></a><span data-dcnode-id="2234" instrument_node="">, </span><a aria-label="Reference 21" data-dcnode-id="2232" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d267251097e1734" title="Fedeli, U., Alba, N., Lisiero, M., Zambon, F., Avossa, F., &amp; Spolaore, P. (2010). Obstetric hospitalizations among Italian women, regular and irregular immigrants in North-Eastern Italy. Acta Obstetricia et Gynecologica Scandinavica,
                           89, 1432–1437."><span data-dcnode-id="2233" instrument_node="">21</span></a><span data-dcnode-id="2231" instrument_node="">]. On the other hand, health outcomes and indicators tend to assume a worse expression when legal documentation has not been obtained. A study conducted in Sweden identified problems of access to care especially in illegal immigrants [</span><a aria-label="Reference 13" data-dcnode-id="2229" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d267251097e1737" title="Bollini, P., Stotzer, U., &amp; Wanner, P. (2007). Pregnancy outcomes and migration in Switzerland: Results from a focus group study. International Journal of Public Health,
                           52, 78–86."><span data-dcnode-id="2230" instrument_node="">13</span></a><span data-dcnode-id="2228" instrument_node="">]. An Italian study corroborated this finding, showing illegal immigrants to be at a higher risk of teenage delivery, complications of pregnancy, miscarriages and induced abortions [</span><a aria-label="Reference 22" data-dcnode-id="2226" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d267251097e1740" title="Geltman, P. L., &amp; Meyers, A. F. (1999). Immigration legal status and use of public programs and prenatal care. Journal of Immigrant Health,
                           1, 91–97."><span data-dcnode-id="2227" instrument_node="">22</span></a><span data-dcnode-id="2225" instrument_node="">]. Other studies show that higher rates of anemia, excessive bleeding and fetal distress occur among the undocumented populations [</span><a aria-label="Reference 23" data-dcnode-id="2223" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d267251097e1743" title="Reed, M. M., Westfall, J. M., Bublitz, C., Battaglia, C., &amp; Fickenscher, A. (2005). Birth outcomes in Colorado’s undocumented immigrant population. BMC Public Health,
                           5, 100."><span data-dcnode-id="2224" instrument_node="">23</span></a><span data-dcnode-id="2222" instrument_node="">, </span><a aria-label="Reference 24" data-dcnode-id="2220" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d267251097e1747" title="Thurman, A. R., Harvey, D., &amp; Shain, R. N. (2009). Unfulfilled postpartum sterilization requests. Journal of Reproductive Medicine,
                           54, 467–472."><span data-dcnode-id="2221" instrument_node="">24</span></a><span data-dcnode-id="2219" instrument_node="">]. Undocumented US residents were also less likely to receive requested postpartum sterilization after vaginal delivery (OR&nbsp;=&nbsp;0.36 (0.21–0.61)), mainly due to the lack of funding, and more likely to be discharged from the hospital without birth control [</span><a aria-label="Reference 25" data-dcnode-id="2217" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d267251097e1750" title="Thurman, A. R., &amp; Janecek, T. (2010). One-year follow-up of women with unfulfilled postpartum sterilization requests. Obstetrics and Gynecology,
                           116, 1071–1077."><span data-dcnode-id="2218" instrument_node="">25</span></a><span data-dcnode-id="2216" instrument_node="">, </span><a aria-label="Reference 26" data-dcnode-id="2214" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d267251097e1753" title="Jonkers, M., Richters, A., Zwart, J., Ory, F., &amp; van Roosmalen, J. (2011). Severe maternal morbidity among immigrant women in the Netherlands: Patients’ perspectives. Reproductive Health Matters,
                           19, 144–153."><span data-dcnode-id="2215" instrument_node="">26</span></a><span data-dcnode-id="2213" instrument_node="">].</span></p><p data-dcnode-id="2204"><span data-dcnode-id="2211" instrument_node="">Migrants may receive less optimal care due to inappropriate pregnancy strategies, inadequate medical treatment and miscommunication. Poor communication between women and caregivers can result in inadequate care because of undiagnosed symptoms or poor compliance with treatments. Migrant women often reported delays in receiving information on diagnosis and treatment [</span><a aria-label="Reference 27" data-dcnode-id="2209" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d267251097e1760" title="Janevic, T., Savitz, D. A., &amp; Janevic, M. (2011). Maternal education and adverse birth outcomes among immigrant women to the United States from Eastern Europe: A test of the healthy migrant hypothesis. Social Science &amp; Medicine,
                           73, 429–435."><span data-dcnode-id="2210" instrument_node="">27</span></a><span data-dcnode-id="2208" instrument_node="">, </span><a aria-label="Reference 28" data-dcnode-id="2206" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d267251097e1763" title="Ravelli, A. C. J., Tromp, M., Eskes, M., Droog, J. C., van der Post, J. A. M., et al. (2011). Ethnic differences in stillbirth and early neonatal mortality in The Netherlands. Journal of Epidemiology and Community Health,
                           65, 696–701."><span data-dcnode-id="2207" instrument_node="">28</span></a><span data-dcnode-id="2205" instrument_node="">].</span></p><p data-dcnode-id="2196"><span data-dcnode-id="2203" instrument_node="">A lower rate of obstetrical interventions, can also be found in the immigrant population, such as planned caesarean sections, and epidural analgesia during labour [</span><a aria-label="Reference 18" data-dcnode-id="2201" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d267251097e1769" title="van Roosmalen, J., Schuitemaker, N. W., Brand, R., van Dongen, P. W., &amp; Bennebroek Gravenhorst, J. (2002). Substandard care in immigrant versus indigenous maternal deaths in The Netherlands. BJOG,
                           109, 212–213."><span data-dcnode-id="2202" instrument_node="">18</span></a><span data-dcnode-id="2200" instrument_node="">]. German women had a significantly higher frequency of planned caesarean sections and migrants were significantly less likely to receive an epidural anesthesia during delivery [</span><a aria-label="Reference 20" data-dcnode-id="2198" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d267251097e1772" title="Reeske, A., Kutschmann, M., Razum, O., &amp; Spallek, J. (2011). Stillbirth differences according to regions of origin: An analysis of the German perinatal database, 2004–2007. BMC Pregnancy Childbirth,
                           11, 63."><span data-dcnode-id="2199" instrument_node="">20</span></a><span data-dcnode-id="2197" instrument_node="">].</span></p><p data-dcnode-id="2188"><span data-dcnode-id="2195" instrument_node="">Regarding the incidence of stillbirth and early neonatal death, one study from the Netherlands revealed a higher incidence among African, South Asian and other non-western women, but a lower incidence in other western or East Asian women. In women without risk factors, the ethnic risk differences in mortality were even more pronounced [</span><a aria-label="Reference 29" data-dcnode-id="2193" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d267251097e1778" title="Malin, M., &amp; Gissler, M. (2009). Maternal care and birth outcomes among ethnic minority women in Finland. BMC Public Health,
                           9, 84."><span data-dcnode-id="2194" instrument_node="">29</span></a><span data-dcnode-id="2192" instrument_node="">]. Other studies report excessive perinatal mortalities among African (29.6/1,000) and Somali women (12.2/1,000) [</span><a aria-label="Reference 30" data-dcnode-id="2190" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d267251097e1781" title="Philibert, M., Deneux-Tharaux, C., &amp; Bouvier-Colle, M. H. (2008). Can excess maternal mortality among women of foreign nationality be explained by suboptimal obstetric care? BJOG,
                           115, 1411–1418."><span data-dcnode-id="2191" instrument_node="">30</span></a><span data-dcnode-id="2189" instrument_node="">].</span></p><p data-dcnode-id="2177"><span data-dcnode-id="2187" instrument_node="">A study conducted in France indicated that the risk of postpartum maternal death was twice as high for foreign women (sub-Saharan Africa, Asia, North and South America). The risk of dying from hypertensive disorder or infection was four times higher for immigrant women. Quality of care received by women who died was less often optimal in immigrants (9.1&nbsp;%) compared with French women (28.8&nbsp;%) and therefore some of these deaths may have been preventable (25.5 vs. 12.7&nbsp;%) [</span><a aria-label="Reference 31" data-dcnode-id="2185" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d267251097e1787" title="Stewart, D. E., Gagnon, A., Saucier, J. F., Wahoush, O., &amp; Dougherty, G. (2008). Postpartum depression symptoms in newcomers. Canadian Journal of Psychiatry,
                           53, 121–124."><span data-dcnode-id="2186" instrument_node="">31</span></a><span data-dcnode-id="2184" instrument_node="">]. Another study evaluating maternal mortality in the Netherlands, reported that substandard care was found to be more frequent in immigrant women. These findings were also detected in hospitals, especially in women who died from pre-eclampsia, that were less often operated on in an unstable situation and received insufficient treatment of complications more frequently than native women [</span><a aria-label="Reference 20" data-dcnode-id="2182" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d267251097e1790" title="Reeske, A., Kutschmann, M., Razum, O., &amp; Spallek, J. (2011). Stillbirth differences according to regions of origin: An analysis of the German perinatal database, 2004–2007. BMC Pregnancy Childbirth,
                           11, 63."><span data-dcnode-id="2183" instrument_node="">20</span></a><span data-dcnode-id="2181" instrument_node="">]. Maternal mortality related to pre-eclampsia was mostly caused by insufficient diagnostic testing when indicated, inadequate management, insufficient stabilization before transport to tertiary care centers, and failure to consider timely delivery [</span><a aria-label="Reference 19" data-dcnode-id="2179" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d267251097e1793" title="Schutte, J. M., Steegers, E. A., Schuitemaker, N. W., Santema, J. G., de Boer, K., et al. (2010). Rise in maternal mortality in the Netherlands. BJOG,
                           117, 399–406."><span data-dcnode-id="2180" instrument_node="">19</span></a><span data-dcnode-id="2178" instrument_node="">].</span></p><p data-dcnode-id="2160"><span data-dcnode-id="2176" instrument_node="">Several studies conducted in the UK, Canada and Australia found that immigrant mothers were more likely to experience postpartum depression. In a study conducted in Canada, immigrants (35.1&nbsp;%) were significantly more likely than Canadian-women (8.1&nbsp;%) to score ≥10 on EDPS, and those that required it had lower social support scores than Canadian-born women [</span><a aria-label="Reference 32" data-dcnode-id="2174" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d267251097e1799" title="Lansakara, N., Brown, S. J., &amp; Gartland, D. (2010). Birth outcomes, postpartum health and primary care contacts of immigrant mothers in an Australian nulliparous pregnancy cohort study. Maternal and Child Health Journal,
                           14, 807–816."><span data-dcnode-id="2175" instrument_node="">32</span></a><span data-dcnode-id="2173" instrument_node="">]. One of the studies showed that immigrant women experienced significantly poorer psychological health compared to Australian born women and were at higher risk of depressive symptoms [</span><a aria-label="Reference 5" data-dcnode-id="2171" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d267251097e1802" title="Eastwood, J. G., Phung, H., &amp; Barnett, B. (2011). Postnatal depression and socio-demographic risk: Factors associated with Edinburgh Depression Scale scores in a metropolitan area of New South Wales, Australia. Australian and New Zealand Journal of Psychiatry,
                           45, 1040–1046."><span data-dcnode-id="2172" instrument_node="">5</span></a><span data-dcnode-id="2170" instrument_node="">]. Although immigrant mothers had an equivalent level of contact with primary care practitioners in the first 3&nbsp;months postpartum, they were less likely to be asked about their emotional well-being or about social or familial support [</span><a aria-label="Reference 5" data-dcnode-id="2168" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d267251097e1805" title="Eastwood, J. G., Phung, H., &amp; Barnett, B. (2011). Postnatal depression and socio-demographic risk: Factors associated with Edinburgh Depression Scale scores in a metropolitan area of New South Wales, Australia. Australian and New Zealand Journal of Psychiatry,
                           45, 1040–1046."><span data-dcnode-id="2169" instrument_node="">5</span></a><span data-dcnode-id="2167" instrument_node="">, </span><a aria-label="Reference 16" data-dcnode-id="2165" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d267251097e1808" title="Sword, W., Watt, S., &amp; Krueger, P. (2006). Postpartum health, service needs, and access to care experiences of immigrant and Canadian-born women. Journal of Obstetric, Gynecologic, and Neonatal Nursing,
                           35, 717–727."><span data-dcnode-id="2166" instrument_node="">16</span></a><span data-dcnode-id="2164" instrument_node="">, </span><a aria-label="Reference 33" data-dcnode-id="2162" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d267251097e1811" title="Gould, J. B., Madan, A., Qin, C., &amp; Chavez, G. (2003). Perinatal outcomes in two dissimilar immigrant populations in the United States: A dual epidemiologic paradox. Pediatrics,
                           111, e676–e682."><span data-dcnode-id="2163" instrument_node="">33</span></a><span data-dcnode-id="2161" instrument_node="">].</span></p><p data-dcnode-id="2131"><span data-dcnode-id="2159" instrument_node="">Some studies paradoxically report better perinatal outcomes in the immigrant population. This has been described as the </span><i data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">healthy migrant effect</span></i><span data-dcnode-id="2156" instrument_node=""> [</span><a aria-label="Reference 23" data-dcnode-id="2154" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d267251097e1820" title="Reed, M. M., Westfall, J. M., Bublitz, C., Battaglia, C., &amp; Fickenscher, A. (2005). Birth outcomes in Colorado’s undocumented immigrant population. BMC Public Health,
                           5, 100."><span data-dcnode-id="2155" instrument_node="">23</span></a><span data-dcnode-id="2153" instrument_node="">, </span><a aria-label="Reference 34" data-dcnode-id="2151" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d267251097e1823" title="El Reda, D. K., Grigorescu, V., Posner, S. F., &amp; Davis-Harrier, A. (2007). Lower rates of preterm birth in women of Arab ancestry: An epidemiologic paradox–Michigan, 1993–2002. Maternal and Child Health Journal,
                           11, 622–627."><span data-dcnode-id="2152" instrument_node="">34</span></a><span data-dcnode-id="2150" instrument_node="">–</span><a aria-label="Reference 39" data-dcnode-id="2148" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d267251097e1826" title="Ekeus, C., Cnattingius, S., &amp; Hjern, A. (2010). Epidural analgesia during labor among immigrant women in Sweden. Acta Obstetricia et Gynecologica Scandinavica,
                           89, 243–249."><span data-dcnode-id="2149" instrument_node="">39</span></a><span data-dcnode-id="2147" instrument_node="">]. Possible explanations for this finding are the positive influence of informal family networks [</span><a aria-label="Reference 13" data-dcnode-id="2145" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d267251097e1829" title="Bollini, P., Stotzer, U., &amp; Wanner, P. (2007). Pregnancy outcomes and migration in Switzerland: Results from a focus group study. International Journal of Public Health,
                           52, 78–86."><span data-dcnode-id="2146" instrument_node="">13</span></a><span data-dcnode-id="2144" instrument_node="">, </span><a aria-label="Reference 18" data-dcnode-id="2142" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d267251097e1833" title="van Roosmalen, J., Schuitemaker, N. W., Brand, R., van Dongen, P. W., &amp; Bennebroek Gravenhorst, J. (2002). Substandard care in immigrant versus indigenous maternal deaths in The Netherlands. BJOG,
                           109, 212–213."><span data-dcnode-id="2143" instrument_node="">18</span></a><span data-dcnode-id="2141" instrument_node="">, </span><a aria-label="Reference 40" data-dcnode-id="2139" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d267251097e1836" title="Essen, B., Bodker, B., Sjoberg, N. O., Langhoff-Roos, J., Greisen, G., et al. (2002). Are some perinatal deaths in immigrant groups linked to suboptimal perinatal care services? British Journal of Obstetrics and Gynaecology,
                           109, 677–682."><span data-dcnode-id="2140" instrument_node="">40</span></a><span data-dcnode-id="2138" instrument_node="">] and healthier behaviors during pregnancy [</span><a aria-label="Reference 37" data-dcnode-id="2136" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d267251097e1839" title="McDonald, J. A., Suellentrop, K., Paulozzi, L. J., &amp; Morrow, B. (2008). Reproductive health of the rapidly growing Hispanic population: Data from the Pregnancy Risk Assessment Monitoring System, 2002. Maternal and Child Health Journal,
                           12, 342–356."><span data-dcnode-id="2137" instrument_node="">37</span></a><span data-dcnode-id="2135" instrument_node="">]. These results are mostly limited to Hispanics and Eastern European women that are compared with US-born residents [</span><a aria-label="Reference 31" data-dcnode-id="2133" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d267251097e1842" title="Philibert, M., Deneux-Tharaux, C., &amp; Bouvier-Colle, M. H. (2008). Can excess maternal mortality among women of foreign nationality be explained by suboptimal obstetric care? BJOG,
                           115, 1411–1418."><span data-dcnode-id="2134" instrument_node="">31</span></a><span data-dcnode-id="2132" instrument_node="">].</span></p></div></div></section><section data-dcnode-id="2073" data-title="Discussion"><div class="c-article-section" data-dcnode-id="2074" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2126" id="Sec4"><span data-dcnode-id="2127" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="2075" id="Sec4-content"><p data-dcnode-id="2100"><span data-dcnode-id="2125" instrument_node="">This systematic review is, to our knowledge, the first to investigate the core aspects of healthcare received during pregnancy by migrant populations: access, use and quality of care, evaluating their impact on healthcare procedures and indicators. Migrants pose specific challenges for obstetric management (e.g. late booking for antenatal care, fewer visits [</span><a aria-label="Reference 10" data-dcnode-id="2123" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d267251097e1853" title="Merry, L., Gagnon, A. J., Hemlin, I., Clarke, H., &amp; Hickey, J. (2011). Cross-border movement and women’s health: How to capture the data. International Journal for Equity in Health,
                           10, 56."><span data-dcnode-id="2124" instrument_node="">10</span></a><span data-dcnode-id="2122" instrument_node="">, </span><a aria-label="Reference 12" data-dcnode-id="2120" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d267251097e1856" title="Ganann, R., Sword, W., Black, M., &amp; Carpio, B. (2011). Influence of maternal birthplace on postpartum health and health services use. Journal of Immigrant and Minority Health,
                           14(2), 223–229."><span data-dcnode-id="2121" instrument_node="">12</span></a><span data-dcnode-id="2119" instrument_node="">, </span><a aria-label="Reference 17" data-dcnode-id="2117" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d267251097e1859" title="Bray, J. K., Gorman, D. R., Dundas, K., &amp; Sim, J. (2010). Obstetric care of new European migrants in Scotland: An audit of antenatal care, obstetric outcomes and communication. Scottish Medical Journal,
                           55, 26–31."><span data-dcnode-id="2118" instrument_node="">17</span></a><span data-dcnode-id="2116" instrument_node="">], increased rates of operative deliveries, suboptimal postpartum care, often due to a series of barriers to accessing health care services: clinic waiting times (considering substandard and frequently irregular work conditions), transportation (lack of financial support) or absence of qualified interpreters [</span><a aria-label="Reference 11" data-dcnode-id="2114" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d267251097e1862" title="Merry, L. A., Gagnon, A. J., Kalim, N., &amp; Bouris, S. S. (2011). Refugee claimant women and barriers to health and social services post-birth. Canadian Journal of Public Health,
                           102, 286–290."><span data-dcnode-id="2115" instrument_node="">11</span></a><span data-dcnode-id="2113" instrument_node="">], and poor engagement with antenatal care services). There is substantial evidence that language barriers adversely affect access to healthcare, quality of care, patient satisfaction and health outcomes [</span><a aria-label="Reference 13" data-dcnode-id="2111" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d267251097e1865" title="Bollini, P., Stotzer, U., &amp; Wanner, P. (2007). Pregnancy outcomes and migration in Switzerland: Results from a focus group study. International Journal of Public Health,
                           52, 78–86."><span data-dcnode-id="2112" instrument_node="">13</span></a><span data-dcnode-id="2110" instrument_node="">, </span><a aria-label="Reference 14" data-dcnode-id="2108" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d267251097e1869" title="Chote, A. A., Koopmans, G. T., Redekop, W. K., de Groot, C. J., Hoefman, R. J., et al. (2011). Explaining ethnic differences in late antenatal care entry by predisposing, enabling and need factors in The Netherlands. The Generation R Study. Maternal and Child Health Journal,
                           15, 689–699."><span data-dcnode-id="2109" instrument_node="">14</span></a><span data-dcnode-id="2107" instrument_node="">, </span><a aria-label="Reference 16" data-dcnode-id="2105" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d267251097e1872" title="Sword, W., Watt, S., &amp; Krueger, P. (2006). Postpartum health, service needs, and access to care experiences of immigrant and Canadian-born women. Journal of Obstetric, Gynecologic, and Neonatal Nursing,
                           35, 717–727."><span data-dcnode-id="2106" instrument_node="">16</span></a><span data-dcnode-id="2104" instrument_node="">, </span><a aria-label="Reference 40" data-dcnode-id="2102" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d267251097e1875" title="Ekeus, C., Cnattingius, S., &amp; Hjern, A. (2010). Epidural analgesia during labor among immigrant women in Sweden. Acta Obstetricia et Gynecologica Scandinavica,
                           89, 243–249."><span data-dcnode-id="2103" instrument_node="">40</span></a><span data-dcnode-id="2101" instrument_node="">].</span></p><p data-dcnode-id="2092"><span data-dcnode-id="2099" instrument_node="">Generalizing conclusions from a systematic review such as the present one has inherent limitations. The methodological quality of the evaluated studies differs considerably, as do the migrant and local populations evaluated. Main study samples lack representativeness, as this population is frequently found in adverse social conditions and in an illegal status, and it is therefore difficult to reach and to establish contact. Fear of being reported to authorities is a common problem [</span><a aria-label="Reference 12" data-dcnode-id="2097" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d267251097e1881" title="Sosta, E., Tomasoni, L. R., Frusca, T., Triglia, M., Pirali, F., et al. (2008). Preterm delivery risk in migrants in Italy: An observational prospective study. Journal of Travel Medicine,
                           15, 243–247."><span data-dcnode-id="2098" instrument_node="">12</span></a><span data-dcnode-id="2096" instrument_node="">, </span><a aria-label="Reference 15" data-dcnode-id="2094" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d267251097e1884" title="Ganann, R., Sword, W., Black, M., &amp; Carpio, B. (2011). Influence of maternal birthplace on postpartum health and health services use. Journal of Immigrant and Minority Health,
                           14(2), 223–229."><span data-dcnode-id="2095" instrument_node="">15</span></a><span data-dcnode-id="2093" instrument_node="">]. These characteristics necessarily hinder the quality of the investigations.</span></p><p data-dcnode-id="2084"><span data-dcnode-id="2091" instrument_node="">Seeking health care by migrant populations is probably affected by personal concepts of health and illness, health literacy, knowledge of how the health system works, financial aspects, and past experiences of care. Access can be affected by a number of barriers related to the lack of necessary professionals and facilities, need for long distance travel, communication between the care giver and the patient [</span><a aria-label="Reference 30" data-dcnode-id="2089" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d267251097e1890" title="Philibert, M., Deneux-Tharaux, C., &amp; Bouvier-Colle, M. H. (2008). Can excess maternal mortality among women of foreign nationality be explained by suboptimal obstetric care? BJOG,
                           115, 1411–1418."><span data-dcnode-id="2090" instrument_node="">30</span></a><span data-dcnode-id="2088" instrument_node="">]. Poverty also plays an important role in shaping racial disparities in health outcomes in the general population. There is a pressing need for additional research to provide a deeper understanding of immigrant women’s perceptions of individual, community and health system barriers to care in order to better meet their needs. Difficulties in communication are potentially dangerous, increasing the risk of delayed care or the risk of missing obstetrical interventions [</span><a aria-label="Reference 30" data-dcnode-id="2086" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d267251097e1893" title="Philibert, M., Deneux-Tharaux, C., &amp; Bouvier-Colle, M. H. (2008). Can excess maternal mortality among women of foreign nationality be explained by suboptimal obstetric care? BJOG,
                           115, 1411–1418."><span data-dcnode-id="2087" instrument_node="">30</span></a><span data-dcnode-id="2085" instrument_node="">]. Professional interpreters should be available when language barriers occur.</span></p><p data-dcnode-id="2076"><span data-dcnode-id="2083" instrument_node="">Immigrants bring with them diverse epidemiological profiles, but most of all their cultural beliefs and practices, including those involving health and illness [</span><a aria-label="Reference 33" data-dcnode-id="2081" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d267251097e1899" title="Gould, J. B., Madan, A., Qin, C., &amp; Chavez, G. (2003). Perinatal outcomes in two dissimilar immigrant populations in the United States: A dual epidemiologic paradox. Pediatrics,
                           111, e676–e682."><span data-dcnode-id="2082" instrument_node="">33</span></a><span data-dcnode-id="2080" instrument_node="">]. Special attention should also be given to knowledge and conceptions of the immigrant population, in order to improve healthcare use, particularly among women of African origin who consistently show poorer outcomes. Information on the danger signs associated with serious pregnancy complications probably needs to be better conveyed to these groups. Culturally sensitive strategies are necessary to increase awareness of relevant health and social support services in their communities. Public health education policies may need to target both women and the community in order to increase health literacy and the likelihood of seeking maternal care [</span><a aria-label="Reference 12" data-dcnode-id="2078" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d267251097e1902" title="Ganann, R., Sword, W., Black, M., &amp; Carpio, B. (2011). Influence of maternal birthplace on postpartum health and health services use. Journal of Immigrant and Minority Health,
                           14(2), 223–229."><span data-dcnode-id="2079" instrument_node="">12</span></a><span data-dcnode-id="2077" instrument_node="">].</span></p></div></div></section><span data-dcnode-id="2072" instrument_node="">
</span><div data-dcnode-id="1312" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="1313" data-title="References"><div class="c-article-section" data-dcnode-id="1314" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2070" id="Bib1"><span data-dcnode-id="2071" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="1315" id="Bib1-content"><div data-container-section="references" data-dcnode-id="1316"><ol class="c-article-references" data-dcnode-id="1326"><li class="c-article-references__item js-c-reading-companion-references-item" data-counter="1." data-dcnode-id="2060"><p class="c-article-references__text" data-dcnode-id="2065" id="ref-CR1"><span data-dcnode-id="2069" instrument_node="">Fernandes, A., &amp; Miguel, J. (2009). </span><i data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Health and migration in the European Union: Better health for all in an Inclusive Society</span></i><span data-dcnode-id="2066" instrument_node="">. Lisboa: Instituto Nacional de Saúde Doutor Ricardo Jorge.</span></p><p class="c-article-references__links u-hide-print" data-dcnode-id="2061"><a aria-label="Google Scholar reference 1" data-dcnode-id="2063" data-track="click" data-track-action="outbound reference" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3F%26title%3DHealth%2520and%2520migration%2520in%2520the%2520European%2520Union%253A%2520Better%2520health%2520for%2520all%2520in%2520an%2520Inclusive%2520Society%26publication_year%3D2009%26author%3DFernandes%252CA%26author%3DMiguel%252CJ"><span data-dcnode-id="2064" instrument_node="">

    </span><a aria-label="Google Scholar reference 2" data-dcnode-id="2047" data-track="click" data-track-action="outbound reference" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3F%26title%3DPsychosocial%2520risk%2520factors%2520for%2520depression%2520during%2520pregnancy%26journal%3DActa%2520Obstetricia%2520et%2520Gynecologica%26volume%3D88%26pages%3D599-605%26publication_year%3D2009%26author%3DBunevicius%252CR%26author%3DKusminskas%252CL%26author%3DBunevicius%252CA%26author%3DNadisauskiene%252CR%26author%3DJureniene%252CK%26author%3DPop%252CV"><span data-dcnode-id="2048" instrument_node="">
