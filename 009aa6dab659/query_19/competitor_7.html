page menu-item-7702" data-dcnode-id="2491" id="menu-item-7702"><a data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/site-menu.html" title="A convenient list of ENZ’s pages"><span data-dcnode-id="2493" instrument_node="">Menu</span></a></li></ul></div></nav></div></div><div class="header-image" data-dcnode-id="2480"><span data-dcnode-id="2485" instrument_node=""> </span><a data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/" rel="home"><span data-dcnode-id="2484" instrument_node=""> </span><img alt="Moving to New Zealand" data-dcnode-id="2483" height="90" sizes="(max-width: 709px) 85vw, (max-width: 909px) 81vw, (max-width: 1362px) 88vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/enz/wp-content/uploads/2020/11/logoN-1.png&amp;raw" srcset="https://www.enz.org/enz/wp-content/uploads/2020/11/logoN-1-300x68.png 300w, https://www.enz.org/enz/wp-content/uploads/2020/11/logoN-1.png 395w" width="395"><span data-dcnode-id="2482" instrument_node=""> </span></a></div></header><div class="site-content" data-dcnode-id="279" id="content"><div class="content-area" data-dcnode-id="363" id="primary"><main class="site-main" data-dcnode-id="386" id="main"><article class="post-1243 page type-page status-publish hentry" data-dcnode-id="2223" id="post-1243"><header class="entry-header" data-dcnode-id="2476"><h1 class="entry-title" data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Healthcare for Migrants in New Zealand – 12 Must Knows</span></h1></header><div class="entry-content" data-dcnode-id="2224"><p data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">Here are some of the most important things to know about healthcare in New Zealand.</span></p><div class="lhsfloatrel-340" data-dcnode-id="2462"><span data-dcnode-id="2473" instrument_node=""> </span><img alt="" class="ad" data-dcnode-id="2472" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/images/ad.png&amp;raw"><br data-dcnode-id="2471"><span data-dcnode-id="2470" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-3014167868888894" data-ad-format="auto" data-ad-slot="7161659992" data-dcnode-id="2468" style="display:block"></ins><p data-dcnode-id="2465"></p><p data-dcnode-id="2463"><img alt="eyetest" data-dcnode-id="2464" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/300-eyetest.jpg&amp;raw" width="300"></p></div><h3 data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">Vital information about the health system</span></h3><p data-dcnode-id="2455"><strong data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">1) How do I pay for my healthcare in New Zealand? </span></strong><br data-dcnode-id="2457"><span data-dcnode-id="2456" instrument_node=""> New Zealand’s healthcare system is funded mainly through general taxation.  Treatments are usually free or subsidised. Medical treatment is generally very good. Private healthcare is also available.</span></p><p data-dcnode-id="2450"><strong data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">2) Will I be eligible for publicly funded healthcare? </span></strong><br data-dcnode-id="2452"><span data-dcnode-id="2451" instrument_node=""> Yes, provided you are a New Zealand Citizen or you are ordinarily resident in New Zealand.</span></p><p data-dcnode-id="2445"><strong data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">3) How do I become ordinarily resident?</span></strong><br data-dcnode-id="2447"><span data-dcnode-id="2446" instrument_node=""> You need to be a permanent resident or a work-permit holder.  The work-permit must be for a minimum of two years at time of issue.  If you meet the criteria, your partner and children aged 19 years or under will also be eligible for publicly funded healthcare.</span></p><p data-dcnode-id="2442"><strong data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">4) When is publicly funded healthcare free? </span></strong></p><p data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Public healthcare is free for:</span></p><p data-dcnode-id="2420"><span data-dcnode-id="2439" instrument_node="">• hospital treatment including 24-hour accident and emergency (A&amp;E) clinics.  There are some exceptions, such as for cosmetic surgery.</span><br data-dcnode-id="2438"><span data-dcnode-id="2437" instrument_node=""> • children’s immunisations.</span><br data-dcnode-id="2436"><span data-dcnode-id="2435" instrument_node=""> • prescription medicine for children under six.</span><br data-dcnode-id="2434"><span data-dcnode-id="2433" instrument_node=""> • people with a prescription subsidy card and a high use health card or community services card.</span><br data-dcnode-id="2432"><span data-dcnode-id="2431" instrument_node=""> • prescription medicines for all public hospital patients.</span><br data-dcnode-id="2430"><span data-dcnode-id="2429" instrument_node=""> • healthcare during pregnancy and childbirth. This covers everything from the diagnosis of pregnancy to pre- and post-natal care for mother and baby.  There is no charge for hospital stays.</span><br data-dcnode-id="2428"><span data-dcnode-id="2427" instrument_node=""> • general practitioner (GP) referrals to a public hospital for treatment.</span><br data-dcnode-id="2426"><span data-dcnode-id="2425" instrument_node=""> • check-ups and basic dental treatment for schoolchildren.</span><br data-dcnode-id="2424"><span data-dcnode-id="2423" instrument_node=""> • breast-screening for women aged 50 to 64.</span><br data-dcnode-id="2422"><span data-dcnode-id="2421" instrument_node=""> • acute or chronic medical conditions.  (In some circumstances a financial contribution may be needed.)</span></p><p data-dcnode-id="2417"><strong data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">5) What healthcare is subsidised but not free?</span></strong></p><p data-dcnode-id="2407"><span data-dcnode-id="2416" instrument_node="">• Prescription items.</span><br data-dcnode-id="2415"><span data-dcnode-id="2414" instrument_node=""> • Visits to general practitioners.</span><br data-dcnode-id="2413"><span data-dcnode-id="2412" instrument_node=""> • Visits to physiotherapists, chiropractors and osteopaths when referred by a GP.</span><br data-dcnode-id="2411"><span data-dcnode-id="2410" instrument_node=""> • Most laboratory tests and x-rays.</span><br data-dcnode-id="2409"><span data-dcnode-id="2408" instrument_node=""> • Ambulance services.</span></p><p data-dcnode-id="2404"><strong data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">6) How big a financial contribution towards medical costs will I have to make? </span></strong></p><p data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">•  A visit to your GP in 2019 costs about $85 between around 8:00am – 6:00pm. Visits at weekends or nights cost more. If, however, you join a PHO (Primary Health Organisation – these are government funded and free to join) a visit to your GP will cost approximately $40 – $50. Nearly all New Zealanders have now joined PHOs. It can sometimes take about three months after submitting an application to a PHO to receive lower priced care. It’s advisable therefore to join a medical practice and enrol with a PHO sooner rather than later.</span></p><p data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">•  Many GP’s waive the fee entirely for children under six.</span></p><p data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">• If your GP prescribes medicines for you, you will pay $5 per item provided you have joined a PHO. Otherwise, you will pay more.</span></p><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">• if you have joined a PHO, you can get a Prescription Subsidy Card once your have paid for 20 new prescription medicine items from 1 February each year. This entitlies you and your family (partner and any children under 18) to free government funded prescriptions for the rest of the year.</span></p><p data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">• If the prescription is for a non-subsidised medicine, you will pay more for it. Non-subsidised items such as Xenical are available at full cost.</span></p><p data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">• X-rays cost from $45.  A small charge is payable for most laboratory tests carried out by your GP.</span></p><p data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">• Ambulance services may cost $98</span></p><p data-dcnode-id="2385"><strong data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">7) How do I register with a GP? </span></strong><br data-dcnode-id="2387"><span data-dcnode-id="2386" instrument_node=""> Bring along your passport and permit. You can join whichever practice you like.</span></p><p data-dcnode-id="2380"><strong data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">8) How long do I need to wait for treatment?</span></strong><br data-dcnode-id="2382"><span data-dcnode-id="2381" instrument_node=""> GP’s will usually see you on the day you make an appointment.  The government does not fund the public health system generously enough to allow most hospital treatments, other than accident/emergency care, to be carried out immediately. Waiting times for surgery vary from hospital to hospital.</span></p><p data-dcnode-id="2375"><strong data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">9) What if I need specialist care? </span></strong><br data-dcnode-id="2377"><span data-dcnode-id="2376" instrument_node=""> You need your GP to refer you to a specialist.  Specialist care is free.  Waiting times vary according to region, urgency and type of treatment involved. If you prefer not to wait and opt for a private specialist, you, or your medical insurance, will be required to cover all fees.</span></p><p data-dcnode-id="2372"><strong data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">10) What role does private healthcare play in New Zealand? </span></strong></p><p data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">• One-third of New Zealanders are covered by private health insurance. This allows them to bypass the waiting times in the public health system for treatment of non-urgent conditions.</span></p><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">• People who are covered by private health insurance are also entitled to free public health services.</span></p><p data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">• One-half of all elective surgery in New Zealand is performed privately.</span></p><p data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">• About one-third of people who have elective surgery are not covered by private insurance, and have to fund the procedures themselves.</span></p><p data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">• The table below shows typical costs for some of these elective procedures in New Zealand.</span></p><h3 data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Typical costs of Private Procedures in New Zealand are:</span></h3><table class="enz-blue-table" data-dcnode-id="2291"><thead data-dcnode-id="2354"><tr data-dcnode-id="2355"><th data-dcnode-id="2358" scope="col" width="50%"><span data-dcnode-id="2359" instrument_node="">Procedure</span></th><th data-dcnode-id="2356" scope="col"><span data-dcnode-id="2357" instrument_node="">Cost NZ$ in 2019</span></th></tr></thead><tbody data-dcnode-id="2292"><tr data-dcnode-id="2353"></tr><tr data-dcnode-id="2348"><td data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Prostate cancer – Brachytherapy</span></td><td data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">16,000 – 24,000</span></td></tr><tr data-dcnode-id="2343"><td data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Heart valve replacement surgery</span></td><td data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node=""> 58,000 – 78,000</span></td></tr><tr data-dcnode-id="2338"><td data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">Hernia repair</span></td><td data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">4,000 – 12,000</span></td></tr><tr data-dcnode-id="2333"><td data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">Cataract removal (eye surgery)</span></td><td data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">3,000 – 5,000</span></td></tr><tr data-dcnode-id="2328"><td data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Gall bladder surgery</span></td><td data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">6,000 – 11,000</span></td></tr><tr data-dcnode-id="2323"><td data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Total hysterectomy (surgery)</span></td><td data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">7,000 – 15,000</span></td></tr><tr data-dcnode-id="2318"><td data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">Hip or Knee replacement</span></td><td data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">20,000 – 30,000</span></td></tr><tr data-dcnode-id="2313"><td data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">Skin cancer removal</span></td><td data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">200 – 2,500</span></td></tr><tr data-dcnode-id="2308"><td data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Colonoscopy</span></td><td data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">1,700 – 3,000</span></td></tr><tr data-dcnode-id="2303"><td data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Varicose veins</span></td><td data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">7,000 – 10,000</span></td></tr><tr data-dcnode-id="2298"><td data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">Tonsillectomy</span></td><td data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">4,000 – 6,000</span></td></tr><tr data-dcnode-id="2293"><td data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">Breast cancer surgery</span></td><td data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">6,500 – 18,000</span></td></tr></tbody></table><p data-dcnode-id="2283"><strong data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">11) Who can I sue if I am injured?</span></strong><br data-dcnode-id="2288"><span data-dcnode-id="2287" instrument_node=""> You cannot sue anyone for compensation. The </span><a data-dcnode-id="2285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/accident-compensation.html"><span data-dcnode-id="2286" instrument_node="">Accident Compensation Corporation</span></a><span data-dcnode-id="2284" instrument_node=""> (ACC) helps to pay for the cost of your care.  Injuries from work, home and sports or other leisure activities are covered.</span></p><p data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">ACC claims may also be made for personal injury caused by a medical mistake or error, sexual assault or abuse, and some work-related conditions.</span></p><p data-dcnode-id="2276"><strong data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">12) What is the ACC’s role in New Zealand? </span></strong><br data-dcnode-id="2278"><span data-dcnode-id="2277" instrument_node=""> The ACC subsidises treatment of accident-related injuries. The patient usually pays a part-charge for the treatment.</span></p><p data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">If your injury stops you from working, ACC pays compensation, usually based on 80% of your weekly income before tax. It can also help with residential nursing care, home help and childcare, as well as subsidising transport and training costs while you recover.</span></p><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">In some cases involving permanent physical impairment, compensation, or ‘lump sum’, financial payments are also made.</span></p><p data-dcnode-id="2269"><em data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Last Updated: September 2019</span></em></p><div class="adsenseAd" data-dcnode-id="2259"><span data-dcnode-id="2268" instrument_node=""> </span><img alt="" class="ad" data-dcnode-id="2267" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/images/ad.png&amp;raw"><br data-dcnode-id="2266"><span data-dcnode-id="2265" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-3014167868888894" data-ad-format="auto" data-ad-slot="7161659992" data-dcnode-id="2263" style="display:block"></ins><span data-dcnode-id="2260" instrument_node=""> </span></div><div data-dcnode-id="2258" style="height:14px"></div><p data-dcnode-id="2227"><strong data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">References and Further Reading </span></strong><br data-dcnode-id="2255"><span data-dcnode-id="2254" instrument_node=""> </span><a data-dcnode-id="2252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.immigration.govt.nz/migrant/SettlementPack/Health/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2253" instrument_node="">http://www.immigration.govt.nz/migrant/Health</span></a><br data-dcnode-id="2251"><span data-dcnode-id="2250" instrument_node=""> </span><a data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moh.govt.nz/moh.nsf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2249" instrument_node=""> http://www.moh.govt.nz/moh.nsf</span></a><br data-dcnode-id="2247"><span data-dcnode-id="2246" instrument_node=""> </span><a data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acc.co.nz/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2245" instrument_node="">http://www.acc.co.nz/</span></a><br data-dcnode-id="2243"><span data-dcnode-id="2242" instrument_node=""> </span><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moh.govt.nz/pho/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2241" instrument_node="">Primary Health Organisations</span></a><br data-dcnode-id="2239"><span data-dcnode-id="2238" instrument_node=""> </span><a data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthfunds.org.nz/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2237" instrument_node="">http://www.healthfunds.org.nz/</span></a><br data-dcnode-id="2235"><span data-dcnode-id="2234" instrument_node=""> </span><a data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moh.govt.nz/moh.nsf/indexmh/eligibility-guide" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2233" instrument_node="">Eligiblity</span></a><br data-dcnode-id="2231"><span data-dcnode-id="2230" instrument_node=""> </span><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moh.govt.nz/moh.nsf/indexmh/yourhealth-payments" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2229" instrument_node="">Costs</span></a></p><p data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Disclaimer:  All information is offered in good faith and is believed to be accurate at the time of writing.  No liability is accepted.  Anyone needing medical advice should refer to an appropriately qualified member of the medical profession.</span></p></div></article><div class="comments-area" data-dcnode-id="387" id="comments"><h2 class="comments-title" data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node=""> 59 thoughts on “Healthcare for Migrants in New Zealand – 12 Must Knows”</span></h2><ol class="comment-list" data-dcnode-id="437"><li class="comment even thread-even depth-1 parent" data-dcnode-id="2160" id="comment-9195"><article class="comment-body" data-dcnode-id="2194" id="div-comment-9195"><footer class="comment-meta" data-dcnode-id="2205"><div class="comment-author vcard" data-dcnode-id="2211"><span data-dcnode-id="2220" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="2219" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/8e333c3cea1f4df48066b9a61e423720%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/8e333c3cea1f4df48066b9a61e423720?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="2218" instrument_node=""> </span><b class="fn" data-dcnode-id="2215"><a class="url" data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//Tessy4u1%40gmail.com/" rel="external nofollow ugc"><span data-dcnode-id="2217" instrument_node="">Tessy</span></a></b><span data-dcnode-id="2214" instrument_node=""> </span><span class="says" data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node=""> </span><a data-dcnode-id="2207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-9195"><time data-dcnode-id="2208" da Z</span></b><span data-dcnode-id="2188" instrument_node=""> </span><span class="says" data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="2180"><span data-dcnode-id="2184" instrument_node=""> </span><a data-dcnode-id="2181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-9388"><time data-dcnode-id="2182" datetime="2018-12-19T01:20:20+13:00"><span data-dcnode-id="2183" instrument_node="">December 19, 2018 at 1:20 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="2167"><p data-dcnode-id="2172"><span data-dcnode-id="2178" instrument_node="">Hello,</span><br data-dcnode-id="2177"><span data-dcnode-id="2176" instrument_node=""> The Ministry of health has an eligibility page that you can check to see if your husband qualifies for </span><a data-dcnode-id="2174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.govt.nz/new-zealand-health-system/eligibility-publicly-funded-health-services/guide-eligibility-publicly-funded-health-services" rel="nofollow" target="_blank"><span data-dcnode-id="2175" instrument_node=""> subsidised health care </span></a><span data-dcnode-id="2173" instrument_node="">.</span></p><p data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Generally, for Work visa holders to be eligible, they need to have a visa to be in New Zealand for two years or more.</span></p><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">Interim visa holders are eligible if, immediately prior to their interim visa, they were eligible for publicly funded health and disability services (ie. under other criteria).</span></p></div><div class="reply" data-dcnode-id="2164"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-9388" data-commentid="9388" data-dcnode-id="2165" ;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="2017" instrument_node=""> </span><b class="fn" data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Kris</span></b><span data-dcnode-id="2014" instrument_node=""> </span><span class="says" data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="2006"><span data-dcnode-id="2010" instrument_node=""> </span><a data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-833"><time data-dcnode-id="2008" datetime="2014-09-26T21:24:47+12:00"><span data-dcnode-id="2009" instrument_node="">September 26, 2014 at 9:24 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1994"><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Hello.</span></p><p data-dcnode-id="1995"><span data-dcnode-id="2002" instrument_node="">I have moved to Auckland and am unsure what I am eligible for.</span><br data-dcnode-id="2001"><span data-dcnode-id="2000" instrument_node=""> I am an Australian citizen with an Australian drivers licence and passport and I am living and working in NZ. I read somewhere that I had to wait 2 years before receiving healthcare benefits, apart from Accident and Emergency where we have the trans-taman reciprocal agreement in place for health care.</span><br data-dcnode-id="1999"><span data-dcnode-id="1998" instrument_node=""> I will require a doctor eventually, as I will be working in NZ for the next 3 years, however because I do not have a work permit (I do not require one as an Australian citizen) can I just turn up to the doctor’s surgery for treatment? Or will I be charged an exorbitant amount of money. Am I eligible to join the PHO as mentioned above? Or would it be in my best interest to seek out a private health care insurance company?</span><br data-dcnode-id="1997"><span data-dcnode-id="1996" instrument_node=""> Your assistance with this is much appreciated.</span></p></div><div class="reply" data-dcnode-id="1991"><a aria-label="Reply to Kris" class="comment-reply-link" data-belowelement="div-comment-833" data-commentid="833" data-dcnode-id="1992" data-postid="1243" data-replyto="Reply to Kris" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D833%23respond" rel="nofollow"><span data-dcnode-id="1993" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1960"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="1961" id="comment-846"><article class="comment-body" data-dcnode-id="1962" id="div-comment-846"><footer class="comment-meta" data-dcnode-id="1975"><div class="comment-author vcard" data-dcnode-id="1981"><span data-dcnode-id="1989" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1988" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1987" instrument_node=""> </span><b class="fn" data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">NZ</span></b><span data-dcnode-id="1984" instrument_node=""> </span><span class="says" data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1976"><span data-dcnode-id="1980" instrument_node=""> </span><a data-dcnode-id="1977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-846"><time data-dcnode-id="1978" datetime="2014-10-06T08:19:54+13:00"><span data-dcnode-id="1979" instrument_node="">October 6, 2014 at 8:19 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1966"><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">Hi Kris,</span></p><p data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Australian citizens who live, or are intending to live in New Zealand for two years or more are eligible for publicly funded health services.</span></p><p data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">You do not have to wait 2 years to qualify – it is simply your intention to stay in NZ for 2 years that will make you eligible.</span></p><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">You can register with a PHO and receive publicly funded health services.</span></p></div><div class="reply" data-dcnode-id="1963"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-846" data-commentid="846" data-dcnode-id="1964" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D846%23respond" rel="nofollow"><span data-dcnode-id="1965" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-odd thread-alt depth-1 parent" data-dcnode-id="1884" id="comment-271"><article class="comment-body" data-dcnode-id="1929" id="div-comment-271"><footer class="comment-meta" data-dcnode-id="1944"><div class="comment-author vcard" data-dcnode-id="1950"><span data-dcnode-id="1958" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1957" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/72aced04ad0ce81376bad100bb80c329%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/72aced04ad0ce81376bad100bb80c329?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1956" instrument_node=""> </span><b class="fn" data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">gerard</span></b><span data-dcnode-id="1953" instrument_node=""> </span><span class="says" data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1945"><span data-dcnode-id="1949" instrument_node=""> </span><a data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-271"><time data-dcnode-id="1947" datetime="2013-06-27T15:48:53+12:00"><span data-dcnode-id="1948" instrument_node="">June 27, 2013 at 3:48 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1933"><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">Hi!</span></p><p data-dcnode-id="1938"><span data-dcnode-id="1941" instrument_node="">Just would like to ask if we are qualified for free public health services here in new zealand. Ive been here nov 2011 on a student visa then got my work visa after finishing the course, expiry would be oct 2013. my wife and son (2yo) is already here as dependent to me. work visa (wife) visit visa (son) will expire same date as mine.</span><br data-dcnode-id="1940"><span data-dcnode-id="1939" instrument_node=""> are we eligible for free health services here? im just concern for my wife and baby.</span></p><p data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">we will be applying for another work visa this august. and residency next year.</span></p><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">-gerard (community support worker NZ)</span></p></div><div class="reply" data-dcnode-id="1930"><a aria-label="Reply to gerard" class="comment-reply-link" data-belowelement="div-comment-271" data-commentid="271" data-dcnode-id="1931" data-postid="1243" data-replyto="Reply to gerard" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D271%23respond" rel="nofollow"><span data-dcnode-id="1932" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1885"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="1886" id="comment-272"><article class="comment-body" data-dcnode-id="1887" id="div-comment-272"><footer class="comment-meta" data-dcnode-id="1914"><div class="comment-author vcard" data-dcnode-id="1920"><span data-dcnode-id="1928" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1927" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1926" instrument_node=""> </span><b class="fn" data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">NZ</span></b><span data-dcnode-id="1923" instrument_node=""> </span><span class="says" data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1915"><span data-dcnode-id="1919" instrument_node=""> </span><a data-dcnode-id="1916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-272"><time data-dcnode-id="1917" datetime="2013-06-28T09:36:42+12:00"><span data-dcnode-id="1918" instrument_node="">June 28, 2013 at 9:36 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1891"><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Hi Gerard,</span></p><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Your son will qualify for publicly funded health care as he is in the care and control of his parents who are work visa holders.</span></p><p data-dcnode-id="1903"><a data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.govt.nz/new-zealand-health-system/eligibility-publicly-funded-health-services/guide-eligibility-publicly-funded-health-services-0/people-aged-17-years-or-younger" rel="nofollow"><span data-dcnode-id="1909" instrument_node="">Reference</span><br data-dcnode-id="1908"><span data-dcnode-id="1907" instrument_node=""> </span></a><br data-dcnode-id="1905"><span data-dcnode-id="1904" instrument_node=""> For you and your wife the rules are:</span></p><p data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">You and your wife will qualify for publicly funded health care if you each hold a work visa that either:</span></p><p data-dcnode-id="1895"><span data-dcnode-id="1900" instrument_node="">•	entitles you to remain in New Zealand for two years or more</span><br data-dcnode-id="1899"><span data-dcnode-id="1898" instrument_node=""> or</span><br data-dcnode-id="1897"><span data-dcnode-id="1896" instrument_node=""> •	entitles you to remain in New Zealand for a period of time which, together with the time you have already been lawfully in New Zealand immediately prior to obtaining the visa, equals or exceeds two years</span></p><p data-dcnode-id="1892"><a data-dcnode-id="1893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.govt.nz/new-zealand-health-system/eligibility-publicly-funded-health-services/guide-eligibility-publicly-funded-health-services-0/work-visa-holder-eligible-be-nz-two-years-or-more" rel="nofollow"><span data-dcnode-id="1894" instrument_node="">Reference</span></a></p></div><div class="reply" data-dcnode-id="1888"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-272" data-commentid="272" data-dcnode-id="1889" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D272%23respond" rel="nofollow"><span data-dcnode-id="1890" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-even depth-1 parent" data-dcnode-id="1828" id="comment-269"><article class="comment-body" data-dcnode-id="1856" id="div-comment-269"><footer class="comment-meta" data-dcnode-id="1869"><div class="comment-author vcard" data-dcnode-id="1875"><span data-dcnode-id="1883" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1882" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/61374a497b58c962045802732ccaba0d%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/61374a497b58c962045802732ccaba0d?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1881" instrument_node=""> </span><b class="fn" data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Riza</span></b><span data-dcnode-id="1878" instrument_node=""> </span><span class="says" data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1870"><span data-dcnode-id="1874" instrument_node=""> </span><a data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-269"><time data-dcnode-id="1872" datetime="2013-06-19T17:18:21+12:00"><span data-dcnode-id="1873" instrument_node="">June 19, 2013 at 5:18 pm</span></time></a></div></footer><div class="comment-content" data-dcn node-id="1850" instrument_node=""> </span><span class="says" data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1842"><span data-dcnode-id="1846" instrument_node=""> </span><a data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-270"><time data-dcnode-id="1844" datetime="2013-06-20T21:45:04+12:00"><span data-dcnode-id="1845" instrument_node="">June 20, 2013 at 9:45 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1835"><p data-dcnode-id="1836"><span data-dcnode-id="1840" instrument_node="">Hi Riza, </span><a data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.enz.org/forum/forum.php" rel="nofollow"><span data-dcnode-id="1839" instrument_node="">our forum</span></a><span data-dcnode-id="1837" instrument_node=""> is the best place to ask immigration related questions. We have members there who have been in a similar situation to yours, who can share their experiences.</span></p></div><div class="reply" data-dcnode-id="1832"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-270" data-commentid="270" data-dcnode-id="1833" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D270%23respond" rel="nofollow"><span data-dcnode-id="1834" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-odd thread-alt depth-1 parent" data-dcnode-id="1762" id="comment-265"><article class="comment-body" data-dcnode-id="1802" id="div-comment-265"><footer class="comment-meta" data-dcnode-id="1813"><div class="comment-author vcard" data-dcnode-id="1819"><span data-dcnode-id="1827" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1826" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/355381d85fba8c7d729276ffe626e9ce%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/355381d85fba8c7d729276ffe626e9ce?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1825" instrument_node=""> </span><b class="fn" data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">tom</span></b><span data-dcnode-id="1822" instrument_node=""> </span><span class="says" data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1814"><span data-dcnode-id="1818" instrument_node=""> </span><a data-dcnode-id="1815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-265"><time data-dcnode-id="1816" datetime="2013-04-26T07:53:45+12:00"><span data-dcnode-id="1817" instrument_node="">April 26, 2013 at 7:53 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1806"><p data-dcnode-id="1807"><span data-dcnode-id="1812" instrument_node="">hi</span><br data-dcnode-id="1811"><span data-dcnode-id="1810" instrument_node=""> my fiance and i along with our child 8 months are moving to nz from australia . im nz born and passpport and my fiance and child both australian born.my child also has a dairy intollerence and is on a prescribed baby formula in australia which is heavily subsidised because we are low income there. our income will be realative here so i was wondering if we will qualify for support in paying for this in nz and if the formula is available in nz it is called alfare. also are there any things we need to get organised in regards to health care or can my fiance and child to visit the local medical centre the same way i can?</span><br data-dcnode-id="1809"><span data-dcnode-id="1808" instrument_node=""> thanks</span></p></div><div class="reply" data-dcnode-id="1803"><a aria-label="Reply to tom" class="comment-reply-link" data-belowelement="div-comment-265" data-commentid="265" data-dcnode-id="1804" data-postid="1243" data-replyto="Reply to tom" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D265%23respond" rel="nofollow"><span data-dcnode-id="1805" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1763"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="1764" id="comment-266"><article class="comment-body" data-dcnode-id="1765" id="div-comment-266"><footer class="comment-meta" data-dcnode-id="1787"><div class="comment-author vcard" data-dcnode-id="1793"><span data-dcnode-id="1801" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1800" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1799" instrument_node=""> </span><b class="fn" data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">NZ</span></b><span data-dcnode-id="1796" instrument_node=""> </span><span class="says" data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1788"><span data-dcnode-id="1792" instrument_node=""> </span><a data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-266"><time data-dcnode-id="1790" datetime="2013-04-26T09:03:43+12:00"><span data-dcnode-id="1791" instrument_node="">April 26, 2013 at 9:03 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1769"><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Hi Tom,</span></p><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Your child will be automatically entitled to publicly funded health services as he/she has a NZ parent. Once you are registered your GP will advise on the funding situation for specialised formula for your baby.</span></p><p data-dcnode-id="1779"><a data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nzdoctor.co.nz/news/2011/may-2011/05/too-many-babies-funded-for-high-cost-formula---pharmac.aspx" rel="nofollow"><span data-dcnode-id="1782" instrument_node="">Here</span></a><span data-dcnode-id="1780" instrument_node=""> is an article that you may find of interest regarding funding.</span></p><p data-dcnode-id="1774"><span data-dcnode-id="1778" instrument_node="">You could ask in the </span><a data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.enz.org/forum" rel="nofollow"><span data-dcnode-id="1777" instrument_node="">ENZ forum</span></a><span data-dcnode-id="1775" instrument_node=""> to find out if anyone is using alfare.</span></p><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">If your fiancé is an Australian citizen or permanent resident and intends to live in New Zealand for two years or more then she is entitled to publicly funded health services.</span></p><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">When your fiancé  registers with a health care provider she will need to show her passport and evidence of long term stay (eg, work contract, house long-term lease, ownership, or mortgage).</span></p></div><div class="reply" data-dcnode-id="1766"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-266" data-commentid="266" data-dcnode-id="1767" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D266%23respond" rel="nofollow"><span data-dcnode-id="1768" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-even depth-1 parent" data-dcnode-id="1713" id="comment-261"><article class="comment-body" data-dcnode-id="1740" id="div-comment-261"><footer class="comment-meta" data-dcnode-id="1747"><div class="comment-author vcard" data-dcnode-id="1753"><span data-dcnode-id="1761" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1760" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/bf2bff8591af3d535781e37e76999b3d%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/bf2bff8591af3d535781e37e76999b3d?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1759" instrument_node=""> </span><b class="fn" data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Wazza</span></b><span data-dcnode-id="1756" instrument_node=""> </span><span class="says" data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1748"><span data-dcnode-id="1752" instrument_node=""> </span><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-261"><time data-dcnode-id="1750" datetime="2013-04-01T07:46:03+13:00"><span data-dcnode-id="1751" instrument_node="">April 1, 2013 at 7:46 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1744"><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Hi..I am a NZ citizen who has lived in Canada for many years, I have a property in NZ can, am I covered for the time I spend in NZ usually about 6 months per year, without any problems.  Thanks</span></p></div><div class="reply" data-dcnode-id="1741"><a aria-label="Reply to Wazza" class="comment-reply-link" data-belowelement="div-comment-261" data-commentid="261" data-dcnode-id="1742" data-postid="1243" data-replyto="Reply to Wazza" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D261%23respond" rel="nofollow"><span data-dcnode-id="1743" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1714"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="1715" id="comment-262"><article class="comment-body" data-dcnode-id="1716" id="div-comment-262"><footer class="comment-meta" data-dcnode-id="1725"><div class="comment-author vcard" data-dcnode-id="1731"><span data-dcnode-id="1739" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1738" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1737" instrument_node=""> </span><b class="fn" data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">NZ</span></b><span data-dcnode-id="1734" instrument_node=""> </span><span class="says" data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1726"><span data-dcnode-id="1730" instrument_node=""> </span><a data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-262"><time data-dcnode-id="1728" datetime="2013-04-02T10:14:32+13:00"><span data-dcnode-id="1729" instrument_node="">April 2, 2013 at 10:14 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1720"><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Hi Wazza,</span></p><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Yes as a New Zealand citizen you are entitled to publicly funded health services.  Time spent overseas does not affect New Zealand citizens’ eligibility.  However, if only temporarily in New Zealand, you may not meet the requirements for primary health organisation enrolment.</span></p></div><div class="reply" data-dcnode-id="1717"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-262" data-commentid="262" data-dcnode-id="1718" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D262%23respond" rel="nofollow"><span data-dcnode-id="1719" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-odd thread-alt depth-1 parent" data-dcnode-id="1644" id="comment-258"><article class="comment-body" data-dcnode-id="1683" id="div-comment-258"><footer class="comment-meta" data-dcnode-id="1698"><div class="comment-author vcard" data-dcnode-id="1704"><span data-dcnode-id="1712" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1711" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a01d541b6cfcff95df77098c1d1de0af%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/a01d541b6cfcff95df77098c1d1de0af?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1710" instrument_node=""> </span><b class="fn" data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Danielle</span></b><span data-dcnode-id="1707" instrument_node=""> </span><span class="says" data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1699"><span data-dcnode-id="1703" instrument_node=""> </span><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-258"><time data-dcnode-id="1701" datetime="2013-03-24T22:56:12+13:00"><span data-dcnode-id="1702" instrument_node="">March 24, 2013 at 10:56 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1687"><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Hey there,</span></p><p data-dcnode-id="1690"><span data-dcnode-id="1695" instrument_node="">I was hoping someone may have an answer for me.</span><br data-dcnode-id="1694"><span data-dcnode-id="1693" instrument_node=""> I am an Australian moving to New Zealand but I do not have a 2+ year work contract.</span><br data-dcnode-id="1692"><span data-dcnode-id="1691" instrument_node=""> Am I able to sign up for private medical insurance in New Zealand once I have an apartment or do I not qualify for private New Zealand health insurance and would need to get travel insurance instead?</span></p><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Cheers</span></p></div><div class="reply" data-dcnode-id="1684"><a aria-label="Reply to Danielle" class="comment-reply-link" data-belowelement="div-comment-258" data-commentid="258" data-dcnode-id="1685" data-postid="1243" data-replyto="Reply to Danielle" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D258%23respond" rel="nofollow"><span data-dcnode-id="1686" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1645"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="1646" id="comment-259"><article class="comment-body" data-dcnode-id="1647" id="div-comment-259"><footer class="comment-meta" data-dcnode-id="1668"><div class="comment-author vcard" data-dcnode-id="1674"><span data-dcnode-id="1682" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1681" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1680" instrument_node=""> </span><b class="fn" data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">NZ</span></b><span data-dcnode-id="1677" instrument_node=""> </span><span class="says" data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1669"><span data-dcnode-id="1673" instrument_node=""> </span><a data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-259"><time data-dcnode-id="1671" datetime="2013-03-25T11:50:58+13:00"><span data-dcnode-id="1672" instrument_node="">March 25, 2013 at 11:50 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1651"><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Hi Danielle,</span></p><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">If you are an Australian citizen and intend to live in New Zealand for two years or more then you are entitled to publicly funded health services.</span></p><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">When you register with a health care provider you will need to show your passport and evidence of long term stay (eg, work contract, house long-term lease, ownership, or mortgage).</span></p><p data-dcnode-id="1658"><span data-dcnode-id="1661" instrument_node="">If you intend to stay in New Zealand for less than two years then you will have limited cover for immediately necessary medical treatment.</span><br data-dcnode-id="1660"><span data-dcnode-id="1659" instrument_node=""> Here are links to the pages:</span></p><p data-dcnode-id="1655"><a data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.govt.nz/new-zealand-health-system/eligibility-publicly-funded-health-services/guide-eligibility-publicly-funded-health-services-0/australian-citizen-or-permanent-resident-who-has-lived-or-intends-live-nz-two-years-or-more" rel="nofollow"><span data-dcnode-id="1657" instrument_node="">Reference 1</span></a></p><p data-dcnode-id="1652"><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.govt.nz/new-zealand-health-system/eligibility-publicly-funded-health-services/reciprocal-health-agreements" rel="nofollow"><span data-dcnode-id="1654" instrument_node="">Reference 2</span></a></p></div><div class="reply" data-dcnode-id="1648"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-259" data-commentid="259" data-dcnode-id="1649" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D259%23respond" rel="nofollow"><span data-dcnode-id="1650" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-even depth-1 parent" data-dcnode-id="1585" id="comment-255"><article class="comment-body" data-dcnode-id="1618" id="div-comment-255"><footer class="comment-meta" data-dcnode-id="1629"><div class="comment-author vcard" data-dcnode-id="1635"><span data-dcnode-id="1643" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1642" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/00edbe6e8e7333c82f2f748077819aea%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/00edbe6e8e7333c82f2f748077819aea?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1641" instrument_node=""> </span><b class="fn" data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">Richard Akel</span></b><span data-dcnode-id="1638" instrument_node=""> </span><span class="says" data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1630"><span data-dcnode-id="1634" instrument_node=""> </span><a data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-255"><time data-dcnode-id="1632" datetime="2013-03-11T09:24:25+13:00"><span data-dcnode-id="1633" instrument_node="">March 11, 2013 at 9:24 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1622"><p data-dcnode-id="1623"><span data-dcnode-id="1628" instrument_node="">My wife and I, both New Zealanders, are going to to Canada for 6 months and then to England for 6 months.</span><br data-dcnode-id="1627"><span data-dcnode-id="1626" instrument_node=""> Please advise if we are entitled to reciproal health care in (a) England, and (b) Canada, the same as we get in NZ.</span><br data-dcnode-id="1625"><span data-dcnode-id="1624" instrument_node=""> Thanks.</span></p></div><div class="reply" data-dcnode-id="1619"><a aria-label="Reply to Richard Akel" class="comment-reply-link" data-belowelement="div-comment-255" data-commentid="255" data-dcnode-id="1620" data-postid="1243" data-replyto="Reply to Richard Akel" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D255%23respond" rel="nofollow"><span data-dcnode-id="1621" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1586"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="1587" id="comment-256"><article class="comment-body" data-dcnode-id="1588" id="div-comment-256"><footer class="comment-meta" data-dcnode-id="1603"><div class="comment-author vcard" data-dcnode-id="1609"><span data-dcnode-id="1617" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1616" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1615" instrument_node=""> </span><b class="fn" data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">NZ</span></b><span data-dcnode-id="1612" instrument_node=""> </span><span class="says" data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1604"><span data-dcnode-id="1608" instrument_node=""> </span><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-256"><time data-dcnode-id="1606" datetime="2013-03-11T11:31:16+13:00"><span data-dcnode-id="1607" instrument_node="">March 11, 2013 at 11:31 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1592"><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Hi Richard,</span></p><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">New Zealand has a reciprocal healthcare agreement with the United Kingdom for the provision of urgent medical treatment for emergency conditions that occur while in the UK. The agreement covers anyone who is ordinarily a resident and a citizen of New Zealand – regardless of nationality – and treatment will be provided on the same terms as for UK residents.</span></p><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">However, if visiting the UK on a visitor visa valid for 6 months or less, this care will not extend to routine, non-emergency treatment from a GP or dentist. You will normally have to pay for these services, as well as a charge for any medicines you need.</span></p><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">The New Zealand Government recommends that travellers hold comprehensive travel insurance, including health insurance.</span></p><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">There is no health agreement between Canada and New Zealand.</span></p></div><div class="reply" data-dcnode-id="1589"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-256" data-commentid="256" data-dcnode-id="1590" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D256%23respond" rel="nofollow"><span data-dcnode-id="1591" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-odd thread-alt depth-1" data-dcnode-id="1558" id="comment-252"><article class="comment-body" data-dcnode-id="1559" id="div-comment-252"><footer class="comment-meta" data-dcnode-id="1570"><div ile I was still a NZ resident?</span></p><p data-dcnode-id="1417"><span data-dcnode-id="1420" instrument_node="">Thanks in advance,</span><br data-dcnode-id="1419"><span data-dcnode-id="1418" instrument_node=""> Rowena</span></p></div><div class="reply" data-dcnode-id="1413"><a aria-label="Reply to Rowena" class="comment-reply-link" data-belowelement="div-comment-244" data-commentid="244" data-dcnode-id="1414" data-postid="1243" data-replyto="Reply to Rowena" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D244%23respond" rel="nofollow"><span data-dcnode-id="1415" instrument_node="">Reply</span></a></div></article></li><li class="comment odd alt thread-even depth-1 parent" data-dcnode-id="1341" id="comment-239"><article class="comment-body" data-dcnode-id="1375" id="div-comment-239"><footer class="comment-meta" data-dcnode-id="1396"><div class="comment-author vcard" data-dcnode-id="1402"><span data-dcnode-id="1410" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1409" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a12139cb06e3330c3d53566c22735b12%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/a12139cb06e3330c3d53566c22735b12?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1408" instrument_node=""> </span><b class="fn" data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Scott</span></b><span data-dcnode-id="1405" instrument_node=""> </span><span class="says" data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1397"><span data-dcnode-id="1401" instrument_node=""> </span><a data-dcnode-id="1398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-239"><time data-dcnode-id="1399" datetime="2012-12-06T00:33:14+13:00"><span data-dcnode-id="1400" instrument_node="">December 6, 2012 at 12:33 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1379"><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Hello,</span></p><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">I am a New Zealand citizen.  My wife is Japanese.  My wife and I are returning to New Zealand next week.  We are desperately trying to find suitable insurance for her.</span></p><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">She will be arriving in New Zealand on a Work Visa, through the Family Stream.  Her visa has been current since 31 October 2012.  It expires on 31 October 2014.  Many insurances we have looked at state that the person being insured needs to have a minimum two year work visa, so that automatically rules her out.</span></p><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Or, does the visa kick in for a two-year period from the arrival date?  And if so, will the two-year maximum visa she has somehow magically allow her to stay for a minimum of two years as most websites tell us she needs?</span></p><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Furthermore, she will not be departing New Zealand as she will apply for Residency after we have arrived.  Many insurance policies ask for a departure date so, once more, she is ruled out.  We have looked at Comprehensive insurance in japan, but as she is not returning to Japan, she cannot apply.</span></p><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">My wife needs insurance that will cover her from departure here in Japan to when she has obtained her Residency Visa.  It may be up to, or longer than three months.  Where can we find a policy that will cater to her needs?</span></p><p data-dcnode-id="1380"><span data-dcnode-id="1383" instrument_node="">Kind regards,</span><br data-dcnode-id="1382"><span data-dcnode-id="1381" instrument_node=""> Scott</span></p></div><div class="reply" data-dcnode-id="1376"><a aria-label="Reply to Scott" class="comment-reply-link" data-belowelement="div-comment-239" data-commentid="239" data-dcnode-id="1377" data-postid="1243" data-replyto="Reply to Scott" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D239%23respond" rel="nofollow"><span data-dcnode-id="1378" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1342"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="1343" id="comment-240"><article class="comment-body" data-dcnode-id="1344" id="div-comment-240"><footer class="comment-meta" data-dcnode-id="1360"><div class="comment-author vcard" data-dcnode-id="1366"><span data-dcnode-id="1374" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1373" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1372" instrument_node=""> </span><b class="fn" data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">NZ</span></b><span data-dcnode-id="1369" instrument_node=""> </span><span class="says" data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1361"><span data-dcnode-id="1365" instrument_node=""> </span><a data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-240"><time data-dcnode-id="1363" datetime="2012-12-06T08:59:11+13:00"><span data-dcnode-id="1364" instrument_node="">December 6, 2012 at 8:59 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1348"><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Hi Scott,</span></p><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Your wife’s visa runs from 31/10/2012 to 31/10/2014 and as such is a two year work visa.</span></p><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">As your wife has a work visa for two or more years she will be eligible for publicly funded health and disability services.</span></p><p data-dcnode-id="1349"><span data-dcnode-id="1353" instrument_node="">See </span><a data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.govt.nz/new-zealand-health-system/eligibility-publicly-funded-health-services/guide-eligibility-publicly-funded-health-services-0/work-visa-holder-eligible-be-nz-two-years-or-more" rel="nofollow"><span data-dcnode-id="1352" instrument_node="">this reference</span></a><span data-dcnode-id="1350" instrument_node="">.</span></p></div><div class="reply" data-dcnode-id="1345"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-240" data-commentid="240" data-dcnode-id="1346" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D240%23respond" rel="nofollow"><span data-dcnode-id="1347" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-odd thread-alt depth-1 parent" data-dcnode-id="1287" id="comment-237"><article class="comment-body" data-dcnode-id="1319" id="div-comment-237"><footer class="comment-meta" data-dcnode-id="1326"><div class="comment-author vcard" data-dcnode-id="1332"><span data-dcnode-id="1340" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1339" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/7259cc9a36e85999ce7e2efa505f5420%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/7259cc9a36e85999ce7e2efa505f5420?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1338" instrument_node=""> </span><b class="fn" data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Elizabeth Alcayaga</span></b><span data-dcnode-id="1335" instrument_node=""> </span><span class="says" data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1327"><span data-dcnode-id="1331" instrument_node=""> </span><a data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-237"><time data-dcnode-id="1329" datetime="2012-12-01T15:36:47+13:00"><span data-dcnode-id="1330" instrument_node="">December 1, 2012 at 3:36 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1323"><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Hi, I will be traveling to New Zealand in a little over a week on a working holiday visa for 12 mo. I’ve been researching travelers/medical insurance, but I guess my major concern is the fact that my immune system isn’t the greatest so I get coughs or infections a few times a year. Are there any specific agencies you recommend with no excess fee? I want to be able to pay the premium and then pay as little as possible for the actual visits. If anyone can help it would be much appreciated. Thanks!</span></p></div><div class="reply" data-dcnode-id="1320"><a aria-label="Reply to Elizabeth Alcayaga" class="comment-reply-link" data-belowelement="div-comment-237" data-commentid="237" data-dcnode-id="1321" data-postid="1243" data-replyto="Reply to Elizabeth Alcayaga" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D237%23respond" rel="nofollow"><span data-dcnode-id="1322" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1288"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="1289" id="comment-238"><article class="comment-body" data-dcnode-id="1290" id="div-comment-238"><footer class="comment-meta" data-dcnode-id="1304"><div class="comment-author vcard" data-dcnode-id="1310"><span data-dcnode-id="1318" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1317" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1316" instrument_node=""> </span><b class="fn" data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">NZ</span></b><span data-dcnode-id="1313" instrument_node=""> </span><span class="says" data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1305"><span data-dcnode-id="1309" instrument_node=""> </span><a data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-238"><time data-dcnode-id="1307" datetime="2012-12-01T17:35:03+13:00"><span data-dcnode-id="1308" instrument_node="">December 1, 2012 at 5:35 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1294"><p data-dcnode-id="1299"><span data-dcnode-id="1303" instrument_node="">Hi Elizabeth, here’s a </span><a data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.enz.org/forum/showthread.php%3Ft%3D33420" rel="nofollow"><span data-dcnode-id="1302" instrument_node="">discussion</span></a><span data-dcnode-id="1300" instrument_node=""> on our forum about medical insurance in New Zealand.</span></p><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">We’d rather not make commercial insurance recommendations, so I’m sorry we can’t help with that, but as you can see, members of the ENZ forum will do this if you would like to ask there.</span></p><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Also worth considering is the comment made on this page by Alina, if you scroll up a little to November 27.</span></p></div><div class="reply" data-dcnode-id="1291"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-238" data-commentid="238" data-dcnode-id="1292" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D238%23respond" rel="nofollow"><span data-dcnode-id="1293" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-even depth-1 parent" data-dcnode-id="1217" id="comment-235"><article class="comment-body" data-dcnode-id="1263" id="div-comment-235"><footer class="comment-meta" data-dcnode-id="1272"><div class="comment-author vcard" data-dcnode-id="1278"><span data-dcnode-id="1286" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1285" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/6505e17f63fcb29e775a91e3e4d9eeb4%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/6505e17f63fcb29e775a91e3e4d9eeb4?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1284" instrument_node=""> </span><b class="fn" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Mary Cloete</span></b><span data-dcnode-id="1281" instrument_node=""> </span><span class="says" data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1273"><span data-dcnode-id="1277" instrument_node=""> </span><a data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-235"><time data-dcnode-id="1275" datetime="2012-11-28T14:20:28+13:00"><span data-dcnode-id="1276" instrument_node="">November 28, 2012 at 2:20 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1267"><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Good day, I am a 56 year old South African lady.  I have been granted a 2 year visitors visa, I have had a relapse on my Ovarian Cancer, do I qualify for public health funding?  Both my daughters live in NZ and are residents of NZ.  Could you please give me advice on how this should be handled financially if I do not qualify for public health funding.</span></p><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Kind regards</span></p></div><div class="reply" data-dcnode-id="1264"><a aria-label="Reply to Mary Cloete" class="comment-reply-link" data-belowelement="div-comment-235" data-commentid="235" data-dcnode-id="1265" data-postid="1243" data-replyto="Reply to Mary Cloete" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D235%23respond" rel="nofollow"><span data-dcnode-
