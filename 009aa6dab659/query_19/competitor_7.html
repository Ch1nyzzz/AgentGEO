id="1266" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1218"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="1219" id="comment-236"><article class="comment-body" data-dcnode-id="1220" id="div-comment-236"><footer class="comment-meta" data-dcnode-id="1248"><div class="comment-author vcard" data-dcnode-id="1254"><span data-dcnode-id="1262" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1261" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1260" instrument_node=""> </span><b class="fn" data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">NZ</span></b><span data-dcnode-id="1257" instrument_node=""> </span><span class="says" data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1249"><span data-dcnode-id="1253" instrument_node=""> </span><a data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-236"><time data-dcnode-id="1251" datetime="2012-11-29T06:24:15+13:00"><span data-dcnode-id="1252" instrument_node="">November 29, 2012 at 6:24 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1224"><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Hi Mary, I’m very sorry to hear about your condition.</span></p><p data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node="">From the information you’ve given, I can’t find a match with any of the eligibility criteria for publicly funded healthcare. These are listed in </span><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.govt.nz/system/files/documents/pages/eligibility-checklist_0.pdf" rel="nofollow"><span data-dcnode-id="1244" instrument_node="">this checklist</span></a><span data-dcnode-id="1242" instrument_node="">:</span></p><p data-dcnode-id="1236"><span data-dcnode-id="1240" instrument_node="">The effect of the Immigration Act (2009) on eligibility is </span><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.govt.nz/new-zealand-health-system/eligibility-publicly-funded-health-services/updates-eligibility-public-health-services/changes-immigration-legislation-affecting-eligibility" rel="nofollow"><span data-dcnode-id="1239" instrument_node="">outlined here</span></a><span data-dcnode-id="1237" instrument_node="">:</span></p><p data-dcnode-id="1231"><span data-dcnode-id="1235" instrument_node="">Providing more detail, </span><a data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.govt.nz/system/files/documents/pages/eligibility-direction-2011.pdf" rel="nofollow"><span data-dcnode-id="1234" instrument_node="">this document</span></a><span data-dcnode-id="1232" instrument_node=""> is the current Health and Disability Services Eligibility Direction from the Minister of Health to New Zealand’s District Health Boards, giving them direction on who can receive publicly funded healthcare.</span></p><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Is there any way using information that you didn’t write above that you could fit yourself into one of the eligible groups?</span></p><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">In your place, I would ask my GP or the specialist who diagnosed me how to proceed most efficiently, and I’d do it today.</span></p><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">I’m sorry I can’t be more helpful than this. I’m going to ask our forum members if any of them can offer information that could help you. I hope someone can.</span></p></div><div class="reply" data-dcnode-id="1221"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-236" data-commentid="236" data-dcnode-id="1222" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D236%23respond" rel="nofollow"><span data-dcnode-id="1223" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-odd thread-alt depth-1 parent" data-dcnode-id="1163" id="comment-231"><article class="comment-body" data-dcnode-id="1191" id="div-comment-231"><footer class="comment-meta" data-dcnode-id="1202"><div class="comment-author vcard" data-dcnode-id="1208"><span data-dcnode-id="1216" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1215" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/50a11a02313d896595ef3085af3dc73d%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/50a11a02313d896595ef3085af3dc73d?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1214" instrument_node=""> </span><b class="fn" data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Alina</span></b><span data-dcnode-id="1211" instrument_node=""> </span><span class="says" data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1203"><span data-dcnode-id="1207" instrument_node=""> </span><a data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-231"><time data-dcnode-id="1205" datetime="2012-11-27T18:19:05+13:00"><span data-dcnode-id="1206" instrument_node="">November 27, 2012 at 6:19 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1195"><p data-dcnode-id="1196"><span data-dcnode-id="1201" instrument_node="">Hi,</span><br data-dcnode-id="1200"><span data-dcnode-id="1199" instrument_node=""> My husband and I are US Citizens in NZ on a work visa for about 6 months.  We are both young and healthy but we wanted to find out if  we should purchase health insurance during our time in NZ.  We are primarily worried about developing a condition during our time here that would not be covered once we go back to the US.  ie if we developed cancer or other serious condition while in NZ.  When we go back to the US, we are concerned that this would not be covered as it would have developed during an “uninsured” time period thus it would be the dreaded “pre-existing” condition.  Essentially, we are afraid of having a lapse of insurance coverage making it harder to get coverage in the US in the future (assuming the laws don’t change in favor of removing pre-existing conditions).  As this as a concern, should be get additional medical coverage above the ACC and what type of medical coverage should we try to get?  Any other advice?</span><br data-dcnode-id="1198"><span data-dcnode-id="1197" instrument_node=""> Thank you!</span></p></div><div class="reply" data-dcnode-id="1192"><a aria-label="Reply to Alina" class="comment-reply-link" data-belowelement="div-comment-231" data-commentid="231" data-dcnode-id="1193" data-postid="1243" data-replyto="Reply to Alina" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D231%23respond" rel="nofollow"><span data-dcnode-id="1194" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1164"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="1165" id="comment-234"><article class="comment-body" data-dcnode-id="1166" id="div-comment-234"><footer class="comment-meta" data-dcnode-id="1176"><div class="comment-author vcard" data-dcnode-id="1182"><span data-dcnode-id="1190" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1189" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1188" instrument_node=""> </span><b class="fn" data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">NZ</span></b><span data-dcnode-id="1185" instrument_node=""> </span><span class="says" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1177"><span data-dcnode-id="1181" instrument_node=""> </span><a data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-234"><time data-dcnode-id="1179" datetime="2012-11-28T09:15:06+13:00"><span data-dcnode-id="1180" instrument_node="">November 28, 2012 at 9:15 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1170"><p data-dcnode-id="1171"><span data-dcnode-id="1175" instrument_node="">Hi Alina, since your stay is only temporary, perhaps you could contact your US insurers and explain that you will be out of the country for 6 months. They may be able to offer you insurance for the time you are in New Zealand, allowing you to maintain continuity with your current insurers. Also, there is a </span><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.enz.org/forum/showthread.php%3Ft%3D38138" rel="nofollow"><span data-dcnode-id="1174" instrument_node="">discussion here</span></a><span data-dcnode-id="1172" instrument_node="">, which may be of interest:</span></p></div><div class="reply" data-dcnode-id="1167"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-234" data-commentid="234" data-dcnode-id="1168" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D234%23respond" rel="nofollow"><span data-dcnode-id="1169" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-even depth-1 parent" data-dcnode-id="1112" id="comment-229"><article class="comment-body" data-dcnode-id="1141" id="div-comment-229"><footer class="comment-meta" data-dcnode-id="1148"><div class="comment-author vcard" data-dcnode-id="1154"><span data-dcnode-id="1162" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1161" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/711ec99cff88679e26602b5b08323150%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/711ec99cff88679e26602b5b08323150?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1160" instrument_node=""> </span><b class="fn" data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Gina Kaur</span></b><span data-dcnode-id="1157" instrument_node=""> </span><span class="says" data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1149"><span data-dcnode-id="1153" instrument_node=""> </span><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-229"><time data-dcnode-id="1151" datetime="2012-11-25T05:08:18+13:00"><span data-dcnode-id="1152" instrument_node="">November 25, 2012 at 5:08 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1145"><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">I plan to venture into a business in New Zealand under the Long Term Business Visa with my husband and two children aged 15 and 16. Would we be eligible for  publicly funded health care? Thank you</span></p></div><div class="reply" data-dcnode-id="1142"><a aria-label="Reply to Gina Kaur" class="comment-reply-link" data-belowelement="div-comment-229" data-commentid="229" data-dcnode-id="1143" data-postid="1243" data-replyto="Reply to Gina Kaur" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D229%23respond" rel="nofollow"><span data-dcnode-id="1144" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1113"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="1114" id="comment-230"><article class="comment-body" data-dcnode-id="1115" id="div-comment-230"><footer class="comment-meta" data-dcnode-id="1126"><div class="comment-author vcard" data-dcnode-id="1132"><span data-dcnode-id="1140" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1139" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1138" instrument_node=""> </span><b class="fn" data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">NZ</span></b><span data-dcnode-id="1135" instrument_node=""> </span><span class="says" data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1127"><span data-dcnode-id="1131" instrument_node=""> </span><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-230"><time data-dcnode-id="1129" datetime="2012-11-25T10:51:09+13:00"><span data-dcnode-id="1130" instrument_node="">November 25, 2012 at 10:51 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1119"><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Hi Gina,</span></p><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">When your Long Term Business application is first approved, you will initially be given a nine month work visa, enabling you to buy or establish your business in New Zealand. With this nine month visa you will not qualify for publically funded health care.</span></p><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">As soon as you have taken steps to establish your business, you can apply for a further work visa for the balance of three years. Once you have this further work visa you will qualify for publicly funded health care.</span></p></div><div class="reply" data-dcnode-id="1116"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-230" data-commentid="230" data-dcnode-id="1117" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D230%23respond" rel="nofollow"><span data-dcnode-id="1118" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-odd thread-alt depth-1 parent" data-dcnode-id="1033" id="comment-227"><article class="comment-body" data-dcnode-id="1086" id="div-comment-227"><footer class="comment-meta" data-dcnode-id="1097"><div class="comment-author vcard" data-dcnode-id="1103"><span data-dcnode-id="1111" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1110" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/67e43e6dc9a5d00c15746a8e6c9f5ea1%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/67e43e6dc9a5d00c15746a8e6c9f5ea1?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1109" instrument_node=""> </span><b class="fn" data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Gary</span></b><span data-dcnode-id="1106" instrument_node=""> </span><span class="says" data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1098"><span data-dcnode-id="1102" instrument_node=""> </span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-227"><time data-dcnode-id="1100" datetime="2012-11-24T22:27:51+13:00"><span data-dcnode-id="1101" instrument_node="">November 24, 2012 at 10:27 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1090"><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Hey,</span></p><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Me and my girlfriend are temporarily moving to New Zealand on 12 month working visa’ and we were wondering what cover we would be elibigle for?I am from Scotland and my partner is from Northern Ireland although she only has an Irish passport she is eligible for a British passport.Thank you in advance.</span></p><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Gary</span></p></div><div class="reply" data-dcnode-id="1087"><a aria-label="Reply to Gary" class="comment-reply-link" data-belowelement="div-comment-227" data-commentid="227" data-dcnode-id="1088" data-postid="1243" data-replyto="Reply to Gary" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D227%23respond" rel="nofollow"><span data-dcnode-id="1089" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="1034"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="1035" id="comment-228"><article class="comment-body" data-dcnode-id="1036" id="div-comment-228"><footer class="comment-meta" data-dcnode-id="1071"><div class="comment-author vcard" data-dcnode-id="1077"><span data-dcnode-id="1085" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1084" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1083" instrument_node=""> </span><b class="fn" data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">NZ</span></b><span data-dcnode-id="1080" instrument_node=""> </span><span class="says" data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1072"><span data-dcnode-id="1076" instrument_node=""> </span><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-228"><time data-dcnode-id="1074" datetime="2012-11-24T23:41:15+13:00"><span data-dcnode-id="1075" instrument_node="">November 24, 2012 at 11:41 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1040"><p data-dcnode-id="1050"><span data-dcnode-id="1070" instrument_node="">Hi Gary,</span><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node=""> The rules are:</span><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node=""> </span><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">UK passport holders</span></strong><span data-dcnode-id="1063" instrument_node=""> are eligible for treatment (medical, hospital and related) on the same basis as a New Zealand citizen if they:</span><br data-dcnode-id="1062"><span data-dcnode-id="1061" instrument_node=""> •	are ordinarily resident in the UK (including England, Scotland, Wales, Northern Ireland, AND</span><br data-dcnode-id="1060"><span data-dcnode-id="1059" instrument_node=""> •	are on a temporary stay in New Zealand  AND</span><br data-dcnode-id="1058"><span data-dcnode-id="1057" instrument_node=""> •	require medical treatment which:</span><br data-dcnode-id="1056"><span data-dcnode-id="1055" instrument_node=""> o	in the opinion of a medical practitioner (or dentist for people 19 years or younger)</span><br data-dcnode-id="1054"><span data-dcnode-id="1053" instrument_node=""> o	needs prompt attention</span><br data-dcnode-id="1052"><span data-dcnode-id="1051" instrument_node=""> o	for a condition that arose after arrival into New Zealand, OR became, OR without treatment would have become, acutely exacerbated after arrival.</span></p><p data-dcnode-id="1044"><span data-dcnode-id="1049" instrument_node="">You would need to show your health service provider:</span><br data-dcnode-id="1048"><span data-dcnode-id="1047" instrument_node=""> •	your valid UK Passport with a Work Visa for less than two years AND</span><br data-dcnode-id="1046"><span data-dcnode-id="1045" instrument_node=""> •	proof of being ordinarily resident in the UK (eg. return ticket, property lease or ownership papers, proof of employment in the UK)</span></p><p data-dcnode-id="1041"><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.govt.nz/new-zealand-health-system/eligibility-publicly-funded-health-services/guide-eligibility-publicly-funded-health-services/eligibility-limited-range-publicly-funded-health-services/uk-citizen-ordinarily-resident-uk-temporary-stay-nz" rel="nofollow"><span data-dcnode-id="1043" instrument_node="">Reference</span></a></p></div><div class="reply" data-dcnode-id="1037"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-228" data-commentid="228" data-dcnode-id="1038" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D228%23respond" rel="nofollow"><span data-dcnode-id="1039" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-even depth-1 parent" data-dcnode-id="970" id="comment-224"><article class="comment-body" data-dcnode-id="1003" id="div-comment-224"><footer class="comment-meta" data-dcnode-id="1018"><div class="comment-author vcard" data-dcnode-id="1024"><span data-dcnode-id="1032" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1031" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a9455443187bb6a219280035fd4833f1%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/a9455443187bb6a219280035fd4833f1?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1030" instrument_node=""> </span><b class="fn" data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Heather</span></b><span data-dcnode-id="1027" instrument_node=""> </span><span class="says" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="1019"><span data-dcnode-id="1023" instrument_node=""> </span><a data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-224"><time data-dcnode-id="1021" datetime="2012-11-21T19:13:34+13:00"><span data-dcnode-id="1022" instrument_node="">November 21, 2012 at 7:13 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="1007"><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Hello,</span></p><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">My husband and I are currently living in NZ.  He is a UK citizen and has a 4 year work visa.  I am a US citizen and have a 4 year student visa (PhD).</span></p><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">I understand that he is entitled to publicly funded care under the two year rule.  I’ve also been able to determine that as his spouse, I’m eligible for maternity care.  However, I am finding contradictory information about whether or not I also have access to general publicly funded care (beyond maternity) as his partner.</span></p><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Can you clarify?</span></p><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Many thanks.</span></p></div><div class="reply" data-dcnode-id="1004"><a aria-label="Reply to Heather" class="comment-reply-link" data-belowelement="div-comment-224" data-commentid="224" data-dcnode-id="1005" data-postid="1243" data-replyto="Reply to Heather" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D224%23respond" rel="nofollow"><span data-dcnode-id="1006" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="971"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="972" id="comment-225"><article class="comment-body" data-dcnode-id="973" id="div-comment-225"><footer class="comment-meta" data-dcnode-id="988"><div class="comment-author vcard" data-dcnode-id="994"><span data-dcnode-id="1002" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="1001" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="1000" instrument_node=""> </span><b class="fn" data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">NZ</span></b><span data-dcnode-id="997" instrument_node=""> </span><span class="says" data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="989"><span data-dcnode-id="993" instrument_node=""> </span><a data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-225"><time data-dcnode-id="991" datetime="2012-11-22T09:09:14+13:00"><span data-dcnode-id="992" instrument_node="">November 22, 2012 at 9:09 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="977"><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Hi Heather,</span></p><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Your child will be eligible for publicly funded health care during your stay in New Zealand, because his/her father is a work visa holder.</span></p><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Except for maternity services, partners of people eligible for publicly funded health services must themselves meet the eligibility criteria.</span></p><p data-dcnode-id="978"><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.govt.nz/system/files/documents/pages/eligibility-checklist_0.pdf" rel="nofollow"><span data-dcnode-id="981" instrument_node="">Here is a checklist</span></a><span data-dcnode-id="979" instrument_node=""> to determine if you are eligible.</span></p></div><div class="reply" data-dcnode-id="974"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-225" data-commentid="225" data-dcnode-id="975" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D225%23respond" rel="nofollow"><span data-dcnode-id="976" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-odd thread-alt depth-1 parent" data-dcnode-id="912" id="comment-223"><article class="comment-body" data-dcnode-id="940" id="div-comment-223"><footer class="comment-meta" data-dcnode-id="955"><div class="comment-author vcard" data-dcnode-id="961"><span data-dcnode-id="969" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="968" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/45ab7cc2fddbcb2b4a20f10ee2432d62%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/45ab7cc2fddbcb2b4a20f10ee2432d62?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="967" instrument_node=""> </span><b class="fn" data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Marney Gardner</span></b><span data-dcnode-id="964" instrument_node=""> </span><span class="says" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="956"><span data-dcnode-id="960" instrument_node=""> </span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-223"><time data-dcnode-id="958" datetime="2012-11-21T12:50:32+13:00"><span data-dcnode-id="959" instrument_node="">November 21, 2012 at 12:50 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="944"><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Hi</span></p><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">My family and I are moving to NZ in Jan 2013 and we are looking for info in medical insurance.  There are 5 of us. myself – 42 – non-smoker, my husband 43 – non-smoker, our son age 14, our daughter age 12 and our other daughter age 5.</span></p><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">we would like to find out about the various cover levels and costs for it – also dental insurance if you do it.</span></p><p data-dcnode-id="945"><span data-dcnode-id="948" instrument_node="">Many Thanks</span><br data-dcnode-id="947"><span data-dcnode-id="946" instrument_node=""> Marney Gardner</span></p></div><div class="reply" data-dcnode-id="941"><a aria-label="Reply to Marney Gardner" class="comment-reply-link" data-belowelement="div-comment-223" data-commentid="223" data-dcnode-id="942" data-postid="1243" data-replyto="Reply to Marney Gardner" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D223%23respond" rel="nofollow"><span data-dcnode-id="943" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="913"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="914" id="comment-226"><article class="comment-body" data-dcnode-id="915" id="div-comment-226"><footer class="comment-meta" data-dcnode-id="925"><div class="comment-author vcard" data-dcnode-id="931"><span data-dcnode-id="939" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="938" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="937" instrument_node=""> </span><b class="fn" data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">NZ</span></b><span data-dcnode-id="934" instrument_node=""> </span><span class="says" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="926"><span data-dcnode-id="930" instrument_node=""> </span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-226"><time data-dcnode-id="928" datetime="2012-11-22T09:26:34+13:00"><span data-dcnode-id="929" instrument_node="">November 22, 2012 at 9:26 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="919"><p data-dcnode-id="920"><span data-dcnode-id="924" instrument_node="">Hi Marney, I’m sorry, but we don’t do insurance. Regarding the different options and plans for medical insurance that people have in New Zealand, </span><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.enz.org/forum/" rel="nofollow"><span data-dcnode-id="923" instrument_node="">our forum</span></a><span data-dcnode-id="921" instrument_node=""> would be the best place to get recommendations on insurers and plans.</span></p></div><div class="reply" data-dcnode-id="916"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-226" data-commentid="226" data-dcnode-id="917" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D226%23respond" rel="nofollow"><span data-dcnode-id="918" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-even depth-1 parent" data-dcnode-id="857" id="comment-221"><article class="comment-body" data-dcnode-id="888" id="div-comment-221"><footer class="comment-meta" data-dcnode-id="897"><div class="comment-author vcard" data-dcnode-id="903"><span data-dcnode-id="911" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="910" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/49128fbbb31437bebb161fbde9f94dd8%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/49128fbbb31437bebb161fbde9f94dd8?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="909" instrument_node=""> </span><b class="fn" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Ashlee</span></b><span data-dcnode-id="906" instrument_node=""> </span><span class="says" data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="898"><span data-dcnode-id="902" instrument_node=""> </span><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-221"><time data-dcnode-id="900" datetime="2012-11-15T20:08:37+13:00"><span data-dcnode-id="901" instrument_node="">November 15, 2012 at 8:08 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="892"><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">My Partner is moving from Canada to New Zealand on a working visa for a year, does she get the same health care as i do, i’m a New Zealand citizen ?</span></p><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Thanks</span></p></div><div class="reply" data-dcnode-id="889"><a aria-label="Reply to Ashlee" class="comment-reply-link" data-belowelement="div-comment-221" data-commentid="221" data-dcnode-id="890" data-postid="1243" data-replyto="Reply to Ashlee" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D221%23respond" rel="nofollow"><span data-dcnode-id="891" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="858"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="859" id="comment-222"><article class="comment-body" data-dcnode-id="860" id="div-comment-222"><footer class="comment-meta" data-dcnode-id="873"><div class="comment-author vcard" data-dcnode-id="879"><span data-dcnode-id="887" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="886" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="885" instrument_node=""> </span><b class="fn" data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">NZ</span></b><span data-dcnode-id="882" instrument_node=""> </span><span class="says" data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="874"><span data-dcnode-id="878" instrument_node=""> </span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-222"><time data-dcnode-id="876" datetime="2012-11-16T07:57:37+13:00"><span data-dcnode-id="877" instrument_node="">November 16, 2012 at 7:57 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="864"><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Hi Ashlee,</span></p><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">A one year working visa holder has no entitlement to publicly funded health care.</span></p><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">To qualify for publicly funded health care you would need a work or residence visa that allows you to remain in New Zealand for two years or more.</span></p><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">It may be a good idea for her to invest in comprehensive travel insurance, including health insurance.</span></p></div><div class="reply" data-dcnode-id="861"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-222" data-commentid="222" data-dcnode-id="862" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D222%23respond" rel="nofollow"><span data-dcnode-id="863" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-odd thread-alt depth-1 parent" data-dcnode-id="804" id="comment-219"><article class="comment-body" data-dcnode-id="835" id="div-comment-219"><footer class="comment-meta" data-dcnode-id="842"><div class="comment-author vcard" data-dcnode-id="848"><span data-dcnode-id="856" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="855" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/0d3514f87a5ebf035c90123db24c9b92%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/0d3514f87a5ebf035c90123db24c9b92?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="854" instrument_node=""> </span><b class="fn" data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Joanne</span></b><span data-dcnode-id="851" instrument_node=""> </span><span class="says" data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="843"><span data-dcnode-id="847" instrument_node=""> </span><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-219"><time data-dcnode-id="845" datetime="2012-11-13T18:35:34+13:00"><span data-dcnode-id="846" instrument_node="">November 13, 2012 at 6:35 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="839"><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">I am a UK resident, and have just arrived in New Zealand to start work. I have a three year work visa. How am I covered for healthcare while I am in NZ.  Thank you in advance.</span></p></div><div class="reply" data-dcnode-id="836"><a aria-label="Reply to Joanne" class="comment-reply-link" data-belowelement="div-comment-219" data-commentid="219" data-dcnode-id="837" data-postid="1243" data-replyto="Reply to Joanne" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D219%23respond" rel="nofollow"><span data-dcnode-id="838" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="805"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="806" id="comment-220"><article class="comment-body" data-dcnode-id="807" id="div-comment-220"><footer class="comment-meta" data-dcnode-id="820"><div class="comment-author vcard" data-dcnode-id="826"><span data-dcnode-id="834" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="833" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="832" instrument_node=""> </span><b class="fn" data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">NZ</span></b><span data-dcnode-id="829" instrument_node=""> </span><span class="says" data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="821"><span data-dcnode-id="825" instrument_node=""> </span><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-220"><time data-dcnode-id="823" datetime="2012-11-14T09:30:40+13:00"><span data-dcnode-id="824" instrument_node="">November 14, 2012 at 9:30 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="811"><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Hi Joanne,</span></p><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">As you have a work visa for two or more years you will be eligible for publicly funded health and disability services.</span></p><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">For example you can enrol with a doctor at a Primary Health Organisation (PHO) and benefit from higher subsidies. To join a PHO, ask the doctor or medical centre that you have chosen whether they are aligned to a PHO. If they are, they will ask you to complete an enrolment form.</span></p><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">You will also get subsidised prescriptions and will receive free inpatient and outpatient treatment, X-rays, and laboratory tests at public hospitals.</span></p></div><div class="reply" data-dcnode-id="808"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-220" data-commentid="220" data-dcnode-id="809" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D220%23respond" rel="nofollow"><span data-dcnode-id="810" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-even depth-1 parent" data-dcnode-id="743" id="comment-217"><article class="comment-body" data-dcnode-id="780" id="div-comment-217"><footer class="comment-meta" data-dcnode-id="789"><div class="comment-author vcard" data-dcnode-id="795"><span data-dcnode-id="803" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="802" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/5ef93183372e91b0ed1bb437291f0928%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/5ef93183372e91b0ed1bb437291f0928?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="801" instrument_node=""> </span><b class="fn" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Gail Dukes</span></b><span data-dcnode-id="798" instrument_node=""> </span><span class="says" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="790"><span data-dcnode-id="794" instrument_node=""> </span><a data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-217"><time data-dcnode-id="792" datetime="2012-11-10T16:29:48+13:00"><span data-dcnode-id="793" instrument_node="">November 10, 2012 at 4:29 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="784"><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">My husband and I are United States of America residents, both retired and live in Hawaii. I have been looking at NZ as a place to live. We both have Medicare. I am not  concerned about our monthly checks. But, I would like to know if our federal medical coverage be accepted in NZ? Can we also bring two of our pets?  Hope to hear from you soon.</span></p><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Thank you, Gail Dukes</span></p></div><div class="reply" data-dcnode-id="781"><a aria-label="Reply to Gail Dukes" class="comment-reply-link" data-belowelement="div-comment-217" data-commentid="217" data-dcnode-id="782" data-postid="1243" data-replyto="Reply to Gail Dukes" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D217%23respond" rel="nofollow"><span data-dcnode-id="783" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="744"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="745" id="comment-218"><article class="comment-body" data-dcnode-id="746" id="div-comment-218"><footer class="comment-meta" data-dcnode-id="765"><div class="comment-author vcard" data-dcnode-id="771"><span data-dcnode-id="779" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="778" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="777" instrument_node=""> </span><b class="fn" data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">NZ</span></b><span data-dcnode-id="774" instrument_node=""> </span><span class="says" data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="766"><span data-dcnode-id="770" instrument_node=""> </span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-218"><time data-dcnode-id="768" datetime="2012-11-13T11:13:24+13:00"><span data-dcnode-id="769" instrument_node="">November 13, 2012 at 11:13 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="750"><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Hi Gail,</span></p><p data-dcnode-id="758"><span data-dcnode-id="762" instrument_node="">You can find the eligibility rules for publicly funded health care </span><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.govt.nz/new-zealand-health-system/eligibility-publicly-funded-health-services/guide-eligibility-publicly-funded-health-services-0" rel="nofollow"><span data-dcnode-id="761" instrument_node="">here</span></a><span data-dcnode-id="759" instrument_node="">:</span></p><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">If you do not qualify then the NZ Government strongly recommends that people take out comprehensive medical insurance. Federal medical coverage would not be accepted in New Zealand.</span></p><p data-dcnode-id="751"><span data-dcnode-id="755" instrument_node="">Information about bringing pets to New Zealand can be found </span><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.enz.org/moving-pets-to-new-zealand.html" rel="nofollow"><span data-dcnode-id="754" instrument_node="">here</span></a><span data-dcnode-id="752" instrument_node="">:</span></p></div><div class="reply" data-dcnode-id="747"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-218" data-commentid="218" data-dcnode-id="748" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D218%23respond" rel="nofollow"><span data-dcnode-id="749" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-odd thread-alt depth-1 parent" data-dcnode-id="682" id="comment-215"><article class="comment-body" data-dcnode-id="721" id="div-comment-215"><footer class="comment-meta" data-dcnode-id="728"><div class="comment-author vcard" data-dcnode-id="734"><span data-dcnode-id="742" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="741" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/17a1b4bed0d5da48c9180fdf63faea1b%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/17a1b4bed0d5da48c9180fdf63faea1b?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="740" instrument_node=""> </span><b class="fn" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">James A.Kumar</span></b><span data-dcnode-id="737" instrument_node=""> </span><span class="says" data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="729"><span data-dcnode-id="733" instrument_node=""> </span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-215"><time data-dcnode-id="731" datetime="2012-11-06T06:05:35+13:00"><span data-dcnode-id="732" instrument_node="">November 6, 2012 at 6:05 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="725"><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">My self and my wife were granted New Zealand Residence under Family-Parents category. We are moving to Auckland with in one months time.  Are we eligible for  subsidized medicine and consultation. Please inform whether any registration to be done after our arrival in Auckland. I am  aged 63 years and my wife 56 years. Thank you.</span></p></div><div class="reply" data-dcnode-id="722"><a aria-label="Reply to James A.Kumar" class="comment-reply-link" data-belowelement="div-comment-215" data-commentid="215" data-dcnode-id="723" data-postid="1243" data-replyto="Reply to James A.Kumar" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D215%23respond" rel="nofollow"><span data-dcnode-id="724" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="683"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="684" id="comment-216"><article class="comment-body" data-dcnode-id="685" id="div-comment-216"><footer class="comment-meta" data-dcnode-id="706"><div class="comment-author vcard" data-dcnode-id="712"><span data-dcnode-id="720" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="719" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="718" instrument_node=""> </span><b class="fn" data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">NZ</span></b><span data-dcnode-id="715" instrument_node=""> </span><span class="says" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="707"><span data-dcnode-id="711" instrument_node=""> </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-216"><time data-dcnode-id="709" datetime="2012-11-06T09:23:30+13:00"><span data-dcnode-id="710" instrument_node="">November 6, 2012 at 9:23 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="689"><p data-dcnode-id="698"><span data-dcnode-id="705" instrument_node="">A New Zealand resident who has:</span><br data-dcnode-id="704"><span data-dcnode-id="703" instrument_node=""> •	a resident visa, or</span><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node=""> •	a permanent resident visa,</span><br data-dcnode-id="700"><span data-dcnode-id="699" instrument_node=""> is eligible for publicly funded health and disability services.</span></p><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Once you have arrived in New Zealand you can complete an enrolment form to join a Doctors’ Surgery / Medical Centre / Primary Health Organisation (PHO).</span></p><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">The government provides higher subsidies for people who have enrolled with a PHO. To be eligible to be enrolled in a PHO you must be eligible for publicly funded services, be living in New Zealand permanently, or intending to live in New Zealand for at least the next two years.</span></p><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Doctors can set their own fees, so the standard consultation fee can vary. If you are eligible for publicly funded health and disability services and have joined a Primary Health Organisation, you will pay a lower consultation fee than if you are not enrolled with a PHO.</span></p><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">To join a PHO, ask the doctor or medical centre that you have chosen whether they are aligned to a PHO. If they are, they will ask you to complete an enrolment form.</span></p></div><div class="reply" data-dcnode-id="686"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-216" data-commentid="216" data-dcnode-id="687" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D216%23respond" rel="nofollow"><span data-dcnode-id="688" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-even depth-1 parent" data-dcnode-id="619" id="comment-213"><article class="comment-body" data-dcnode-id="656" id="div-comment-213"><footer class="comment-meta" data-dcnode-id="667"><div class="comment-author vcard" data-dcnode-id="673"><span data-dcnode-id="681" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="680" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a18fb3b5fd51bff9eecf6b48e3a92afc%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/a18fb3b5fd51bff9eecf6b48e3a92afc?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="679" instrument_node=""> </span><b class="fn" data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Sam</span></b><span data-dcnode-id="676" instrument_node=""> </span><span class="says" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="668"><span data-dcnode-id="672" instrument_node=""> </span><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-213"><time data-dcnode-id="670" datetime="2012-10-08T01:38:00+13:00"><span data-dcnode-id="671" instrument_node="">October 8, 2012 at 1:38 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="660"><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Hello,</span></p><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Im in the process of emigrating to New Zealand. Im extremely worried it wont happen as i am a diabetic type 1. I was wondering what i would have to do to get an equilvalent to the english prescription card over there, so once i have landed i know i will have insulin waiting for me ? i cant expect to get free insulin as soon as im there so im expecting to pay which is understandable, but if you could point me in the right direction that would be such a great help. Thanks in advance</span></p><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Sam</span></p></div><div class="reply" data-dcnode-id="657"><a aria-label="Reply to Sam" class="comment-reply-link" data-belowelement="div-comment-213" data-commentid="213" data-dcnode-id="658" data-postid="1243" data-replyto="Reply to Sam" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D213%23respond" rel="nofollow"><span data-dcnode-id="659" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="620"><li class="comment even depth-2" data-dcnode-id="621" id="comment-214"><article class="comment-body" data-dcnode-id="622" id="div-comment-214"><footer class="comment-meta" data-dcnode-id="641"><div class="comment-author vcard" data-dcnode-id="647"><span data-dcnode-id="655" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="654" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="653" instrument_node=""> </span><b class="fn" data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">NZ</span></b><span data-dcnode-id="650" instrument_node=""> </span><span class="says" data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="642"><span data-dcnode-id="646" instrument_node=""> </span><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-214"><time data-dcnode-id="644" datetime="2012-10-12T07:45:00+13:00"><span data-dcnode-id="645" instrument_node="">October 12, 2012 at 7:45 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="626"><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Hi Sam,</span></p><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">The following information is available on Diabetes New Zealand:</span></p><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">‘Medications cost the same amount throughout New Zealand. If you are a resident in New Zealand and on a low income, you will pay $3.00 for each prescription item for a three-month supply. For example if you are taking two different types of insulin, you will pay $6.00 for a three-month supply of your insulin. Other New Zealand residents (on a middle or high income) pay $15.00 for each prescription item for a three-month supply. The charge for a non-resident (unless for an emergency supply and coming from a reciprocal country ie Australia, UK, etc) will be NSS, or Not Subsidised and the full cost of the medicine will apply.’</span></p><p data-dcnode-id="632"><a data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.diabetes.org.nz/about_diabetes/information_for_visitors_and_immigrants_to_new_zealand" rel="nofollow"><span data-dcnode-id="634" instrument_node="">Diabetes Info</span></a></p><p data-dcnode-id="627"><span data-dcnode-id="631" instrument_node="">People in a similar position may be members of our </span><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.enz.org/forum/" rel="nofollow"><span data-dcnode-id="630" instrument_node="">forum</span></a><span data-dcnode-id="628" instrument_node="">.</span></p></div><div class="reply" data-dcnode-id="623"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-214" data-commentid="214" data-dcnode-id="624" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D214%23respond" rel="nofollow"><span data-dcnode-id="625" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-odd thread-alt depth-1 parent" data-dcnode-id="551" id="comment-210"><article class="comment-body" data-dcnode-id="597" id="div-comment-210"><footer class="comment-meta" data-dcnode-id="604"><div class="comment-author vcard" data-dcnode-id="610"><span data-dcnode-id="618" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="617" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a5090fcb50686407bc78c5951689d9df%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/a5090fcb50686407bc78c5951689d9df?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="616" instrument_node=""> </span><b class="fn" data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">lizz</span></b><span data-dcnode-id="613" instrument_node=""> </span><span class="says" data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="605"><span data-dcnode-id="609" instrument_node=""> </span><a data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-210"><time data-dcnode-id="607" datetime="2012-08-28T10:30:44+12:00"><span data-dcnode-id="608" instrument_node="">August 28, 2012 at 10:30 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="601"><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">hi my son is moving to new Zealand  from Scotland on a 12 month work visa what health care will he receive or will he need to get travel insurance or maybe pay for his health care?</span></p></div><div class="reply" data-dcnode-id="598"><a aria-label="Reply to lizz" class="comment-reply-link" data-belowelement="div-comment-210" data-commentid="210" data-dcnode-id="599" data-postid="1243" data-replyto="Reply to lizz" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D210%23respond" rel="nofollow"><span data-dcnode-id="600" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="552"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="553" id="comment-211"><article class="comment-body" data-dcnode-id="554" id="div-comment-211"><footer class="comment-meta" data-dcnode-id="582"><div class="comment-author vcard" data-dcnode-id="588"><span data-dcnode-id="596" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="595" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="594" instrument_node=""> </span><b class="fn" data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">NZ</span></b><span data-dcnode-id="591" instrument_node=""> </span><span class="says" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="583"><span data-dcnode-id="587" instrument_node=""> </span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-211"><time data-dcnode-id="585" datetime="2012-08-30T08:56:17+12:00"><span data-dcnode-id="586" instrument_node="">August 30, 2012 at 8:56 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="558"><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Hi Lizz,</span></p><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">If your son is a UK citizen then he is entitled to NZ public funded healthcare as per the following:</span></p><p data-dcnode-id="564"><span data-dcnode-id="577" instrument_node="">Under a reciprocal agreement, a United Kingdom (UK) citizen (passport holder) is eligible for treatment (medical, hospital and related) on the same basis as a New Zealand citizen if they:</span><br data-dcnode-id="576"><span data-dcnode-id="575" instrument_node=""> •	are ordinarily resident in the AND</span><br data-dcnode-id="574"><span data-dcnode-id="573" instrument_node=""> •	are on a temporary stay in New Zealand (a temporary stay would be any stay that was not permanent, and to become permanent they would need to have a residence visa or NZ citizenship) AND</span><br data-dcnode-id="572"><span data-dcnode-id="571" instrument_node=""> •	require medical treatment which:</span><br data-dcnode-id="570"><span data-dcnode-id="569" instrument_node=""> •	in the opinion of a medical practitioner (or dentist for people 19 years or younger)</span><br data-dcnode-id="568"><span data-dcnode-id="567" instrument_node=""> •	needs prompt attention</span><br data-dcnode-id="566"><span data-dcnode-id="565" instrument_node=""> •	for a condition that arose after arrival into New Zealand, OR became, OR without treatment would have become, acutely exacerbated after arrival.</span></p><p data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">Full details are on this </span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.govt.nz/new-zealand-health-system/eligibility-publicly-funded-health-services/guide-eligibility-publicly-funded-health-services/eligibility-limited-range-publicly-funded-health-services/uk-citizen-ordinarily-resident-uk-temporary-stay-nz" rel="nofollow"><span data-dcnode-id="562" instrument_node=""> Ministry of Health </span></a><span data-dcnode-id="560" instrument_node=""> page.</span></p></div><div class="reply" data-dcnode-id="555"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-211" data-commentid="211" data-dcnode-id="556" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D211%23respond" rel="nofollow"><span data-dcnode-id="557" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-even depth-1 parent" data-dcnode-id="493" id="comment-208"><article class="comment-body" data-dcnode-id="528" id="div-comment-208"><footer class="comment-meta" data-dcnode-id="536"><div class="comment-author vcard" data-dcnode-id="542"><span data-dcnode-id="550" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="549" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/8d4c73d0413d66ea1f720fbbbf2192c7%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/8d4c73d0413d66ea1f720fbbbf2192c7?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="548" instrument_node=""> </span><b class="fn" data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Alexis</span></b><span data-dcnode-id="545" instrument_node=""> </span><span class="says" data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="537"><span data-dcnode-id="541" instrument_node=""> </span><a data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-208"><time data-dcnode-id="539" datetime="2012-08-26T04:21:47+12:00"><span data-dcnode-id="540" instrument_node="">August 26, 2012 at 4:21 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="532"><p data-dcnode-id="533"><span data-dcnode-id="535" instrument_node="">Hi, if i’m still holding a resident visa (have not yet satisfy the 2-years requirement of becoming a PERMANENT resident), will i still be eligible for free public healthcare? Thanks in advance. </span><img alt="🙂" class="emoji" data-dcnode-id="534" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"></p></div><div class="reply" data-dcnode-id="529"><a aria-label="Reply to Alexis" class="comment-reply-link" data-belowelement="div-comment-208" data-commentid="208" data-dcnode-id="530" data-postid="1243" data-replyto="Reply to Alexis" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D208%23respond" rel="nofollow"><span data-dcnode-id="531" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="494"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="495" id="comment-209"><article class="comment-body" data-dcnode-id="496" id="div-comment-209"><footer class="comment-meta" data-dcnode-id="513"><div class="comment-author vcard" data-dcnode-id="519"><span data-dcnode-id="527" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="526" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="525" instrument_node=""> </span><b class="fn" data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">NZ</span></b><span data-dcnode-id="522" instrument_node=""> </span><span class="says" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="514"><span data-dcnode-id="518" instrument_node=""> </span><a data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-209"><time data-dcnode-id="516" datetime="2012-08-28T07:17:10+12:00"><span data-dcnode-id="517" instrument_node="">August 28, 2012 at 7:17 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="500"><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Hi Alexis,</span></p><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Assuming you have a work visa, you will be entitled to publicly funded health and disability services if you hold a work visa that either:</span></p><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">entitles you to remain in New Zealand for two years or more (work visas start on the person’s first day in New Zealand) OR</span></p><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">entitles you to remain in New Zealand for a period of time which, together with the time that person has already been lawfully in New Zealand immediately prior to obtaining the visa, equals or exceeds two years</span></p><p data-dcnode-id="501"><span data-dcnode-id="504" instrument_node="">This is quoted from the </span><a data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.govt.nz/new-zealand-health-system/eligibility-publicly-funded-health-services/guide-eligibility-publicly-funded-health-services-0/work-visa-holder-eligible-be-nz-two-years-or-more" rel="nofollow"><span data-dcnode-id="503" instrument_node=""> Ministry of Health entitlement page.</span></a></p></div><div class="reply" data-dcnode-id="497"><a aria-label="Reply to NZ" class="comment-reply-link" data-belowelement="div-comment-209" data-commentid="209" data-dcnode-id="498" data-postid="1243" data-replyto="Reply to NZ" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D209%23respond" rel="nofollow"><span data-dcnode-id="499" instrument_node="">Reply</span></a></div></article></li></ol></li><li class="comment odd alt thread-odd thread-alt depth-1 parent" data-dcnode-id="438" id="comment-206"><article class="comment-body" data-dcnode-id="471" id="div-comment-206"><footer class="comment-meta" data-dcnode-id="478"><div class="comment-author vcard" data-dcnode-id="484"><span data-dcnode-id="492" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="491" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/d9409ee01e7d9f955e55c40a9a576f14%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/d9409ee01e7d9f955e55c40a9a576f14?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="490" instrument_node=""> </span><b class="fn" data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">wendy hinde</span></b><span data-dcnode-id="487" instrument_node=""> </span><span class="says" data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="479"><span data-dcnode-id="483" instrument_node=""> </span><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html/%23comment-206"><time data-dcnode-id="481" datetime="2012-07-28T19:31:53+12:00"><span data-dcnode-id="482" instrument_node="">July 28, 2012 at 7:31 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="475"><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Wonder if you can help me? Me and my husband have had our application in to move to NZ to be with our family, for 12 months now. We are excited about the prospect. I have a big worry though. I have Crohn’s disease and have a  j. pouch from UC surgery 1988. I am on a drug called Azathioprine and have been very well for a couple of years now. i have 6 monthly check-ups from my consultant. She will support me 100%. i am sure I read somewhere that NZ do not like my drug as it is an imuno-modulator. Is this correct? My consultant says that as I have been so well on this it is better to have me well and not needing hospital treatment than not well and needing help. What is the stance on this please. will this have a big negative effect on my applicaton. I am so worried that I may prevent our moving there to be with our family. Please reply, i am so worried about this. thank you for taking the time.</span></p></div><div class="reply" data-dcnode-id="472"><a aria-label="Reply to wendy hinde" class="comment-reply-link" data-belowelement="div-comment-206" data-commentid="206" data-dcnode-id="473" data-postid="1243" data-replyto="Reply to wendy hinde" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.enz.org/healthcare-migrants-newzealand.html%3Freplytocom%3D206%23respond" rel="nofollow"><span data-dcnode-id="474" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="439"><li class="comment byuser comment-author-nz1 even depth-2" data-dcnode-id="440" id="comment-207"><article class="comment-body" data-dcnode-id="441" id="div-comment-207"><footer class="comment-meta" data-dcnode-id="456"><div class="comment-author vcard" data-dcnode-id="462"><span data-dcnode-id="470" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="469" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39%3Fs%3D42%26d%3Didenticon%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/36348f03d959f68e3e26a189749fdf39?s=84&amp;d=identicon&amp;r=g 2x" width="42"><span data-dcnode-id="468" instrument_node=""> </span><b class="fn" data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">NZ</span></b><span data-dcnode-id="465" instrument_node=""> </span><span class="says" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="457"><span data-dcnode-id="461" instrument_node=""
