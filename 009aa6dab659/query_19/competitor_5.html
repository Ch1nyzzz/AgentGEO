</span><meta content="Our commentary aims to show that the COVID-19 pandemic has amplified existing barriers to healthcare in England for ethnic minority and migrant women. We expose how the pandemic has affected the allocation of healthcare resources leading to the prioritisation of COVID-19 patients and suspending the equal access to healthcare services approach. We argue that we must look beyond this disruption in provision by examining existing barriers to access that have been amplified by the pandemic in order to understand the poorer health outcomes for women in ethnic minority and migrant communities. The reflection focuses on racialised medical perceptions, gendered cultural norms including information barriers and stigma, and specific legal barriers." data-dcnode-id="2213" name="dc.description"><span data-dcnode-id="2212" instrument_node="">

</span><meta content="COVID-19 Highlighting Inequalities in Access to Healthcare in England: A Case Study of Ethnic Minority and Migrant Women - Feminist Legal Studies" data-dcnode-id="2033" property="og:title"><span data-dcnode-id="2032" instrument_node="">
</span><meta content="Our commentary aims to show that the COVID-19 pandemic has amplified existing barriers to healthcare in England for ethnic minority and migrant women. We expose how the pandemic has affected the allocation of healthcare resources leading to the prioritisation of COVID-19 patients and suspending the equal access to healthcare services approach. We argue that we must look beyond this disruption in provision by examining existing barriers to access that have been amplified by the pandemic in order to understand the poorer health outcomes for women in ethnic minority and migrant communities. The reflection focuses on racialised medical perceptions, gendered cultural norms including information barriers and stigma, and specific legal barriers." data-dcnode-id="2031" property="og:description"><span data-dcnode-id="2030" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="1573" data-gtm-vis-first-on-screen-50443292_562="733" data-gtm-vis-first-on-screen-50443292_563="734" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="733" data-gtm-vis-recent-on-screen-50443292_563="734" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="1574" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1578" id="Abs1"><span data-dcnode-id="1579" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="1575" id="Abs1-content"><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Our commentary aims to show that the COVID-19 pandemic has amplified existing barriers to healthcare in England for ethnic minority and migrant women. We expose how the pandemic has affected the allocation of healthcare resources leading to the prioritisation of COVID-19 patients and suspending the equal access to healthcare services approach. We argue that we must look beyond this disruption in provision by examining existing barriers to access that have been amplified by the pandemic in order to understand the poorer health outcomes for women in ethnic minority and migrant communities. The reflection focuses on racialised medical perceptions, gendered cultural norms including information barriers and stigma, and specific legal barriers.</span></p></div></div></section><span data-dcnode-id="1572" instrument_node="">
</span><section data-dcnode-id="1535" data-gtm-vis-first-on-screen-50443292_562="733" data-gtm-vis-first-on-screen-50443292_563="734" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="733" data-gtm-vis-recent-on-screen-50443292_563="734" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="1536" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1570" id="Sec1"><span data-dcnode-id="1571" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="1537" id="Sec1-content"><p data-dcnode-id="1538"><span data-dcnode-id="1569" instrument_node="">As Naqvi and Russell’s recent Editorial (</span><a aria-label="Reference 2020" data-dcnode-id="1567" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d313340794e361" title="Naqvi, Zainab Batul, and Yvette Russell. 2020. A Wench’s guide to surviving a ‘global’ pandemic crisis: Feminist publishing in a time of COVID-19. Feminist Legal Studies. 
https://doi.org/10.1007/s10691-020-09435-1

."><span data-dcnode-id="1568" instrument_node="">2020</span></a><span data-dcnode-id="1566" instrument_node="">) in </span><i data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Feminist Legal Studies</span></i><span data-dcnode-id="1563" instrument_node="">&nbsp;sharply highlights, it only took&nbsp;six&nbsp;months of a global pandemic to bring to light structural inequalities that have existed for decades. The focus on the higher mortality rate from the virus for men worldwide somewhat eclipses the widening inequalities of gender and race (Flood et al. </span><a aria-label="Reference 2020" data-dcnode-id="1561" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d313340794e367" title="Flood, Colleen M., Vanessa MacDonnell, Jane Philpott, Sophie Thériault, and Sridhar Venkatapuram. 2020. Overview of COVID-19: Old and new vulnerabilities. In Vulnerable: The law, policy and ethics of COVID-19, ed. Colleen M. Flood, Vanessa MacDonnell, Jane Philpott, Sophie Thériault, and Sridhar Venkatapuram, 1–27. Ottawa: University of Ottawa Press."><span data-dcnode-id="1562" instrument_node="">2020</span></a><span data-dcnode-id="1560" instrument_node="">, 6). Research has shown that ethnic minority and migrant women</span><sup data-dcnode-id="1555"><a data-dcnode-id="1556" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Footnote </span></span><span data-dcnode-id="1557" instrument_node="">1</span></a></sup><span data-dcnode-id="1554" instrument_node=""> are disproportionately affected by existing barriers to access to healthcare (Mirza and Sheridan </span><a aria-label="Reference 2003" data-dcnode-id="1552" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d313340794e376" title="Mirza, Heidi Safia &amp; Ann-Marie Sheridan. 2003. Multiple identity and access to health: the experience of black and minority ethnic women. Centre for Racial Equality Studies Middlesex University working paper series no. 10. 
https://tandis.odihr.pl/bitstream/20.500.12389/19389/1/01281.pdf

. Accessed 30 July 2020."><span data-dcnode-id="1553" instrument_node="">2003</span></a><span data-dcnode-id="1551" instrument_node="">; Jayaweera </span><a aria-label="Reference 2018" data-dcnode-id="1549" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d313340794e380" title="Jayaweera, Hiranthi. 2018. Access to healthcare for vulnerable migrant women in England: A human security approach. Current Sociology Monograph 66 (2): 273–285."><span data-dcnode-id="1550" instrument_node="">2018</span></a><span data-dcnode-id="1548" instrument_node="">). These barriers have been generated and embedded by a system that overlooks the intersectional barriers raised by being an ethnic minority and/or a migrant</span><sup data-dcnode-id="1543"><a data-dcnode-id="1544" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Footnote </span></span><span data-dcnode-id="1545" instrument_node="">2</span></a></sup><span data-dcnode-id="1542" instrument_node=""> woman (Mirza </span><a aria-label="Reference 1997" data-dcnode-id="1540" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d313340794e389" title="Mirza, Heidi Safia. 1997. Introduction: Mapping a genealogy of Black British feminism. In Black british feminism: A reader, ed. Heidi Safia Mirza, 1–28. London: Routledge."><span data-dcnode-id="1541" instrument_node="">1997</span></a><span data-dcnode-id="1539" instrument_node="">). Our commentary aims to show that the COVID-19 pandemic has amplified these existing barriers in England for ethnic minority and migrant women. We expose how the pandemic has affected the allocation of healthcare resources in England, leading to the prioritisation of COVID-19 patients and suspending the equal access to healthcare services approach. We then explore the poorer health outcomes for women in ethnic minority and migrant communities that the disruption in provision cannot solely account for by looking at the underlying barriers to access that have been amplified by the pandemic. The reflection focuses on racialised medical perceptions, gendered cultural norms including information barriers and stigma, and specific legal barriers.</span></p></div></div></section><section data-dcnode-id="1477" data-gtm-vis-first-on-screen-50443292_562="733" data-gtm-vis-first-on-screen-50443292_563="734" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="733" data-gtm-vis-recent-on-screen-50443292_563="734" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="COVID-19 Highlighting Unequal Access to Healthcare Services"><div class="c-article-section" data-dcnode-id="1478" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1533" id="Sec2"><span data-dcnode-id="1534" instrument_node="">COVID-19 Highlighting Unequal Access to Healthcare Services</span></h2><div class="c-article-section__content" data-dcnode-id="1479" id="Sec2-content"><p data-dcnode-id="1522"><span data-dcnode-id="1532" instrument_node=""> The COVID-19 pandemic marks an unprecedented event in healthcare policy. Since the inception of the NHS, the principle of equal access to healthcare services for all has been at the heart of the system, and for the past 70&nbsp;years, waves of healthcare reforms have aimed to uphold aspects of this foundational approach using different policy strategies (Germain </span><a aria-label="Reference 2019" data-dcnode-id="1530" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d313340794e400" title="Germain, Sabrina. 2019. Justice and profit in healthcare law: A comparative analysis of the United States and the United Kingdom. Oxford: Hart Publishing."><span data-dcnode-id="1531" instrument_node="">2019</span></a><span data-dcnode-id="1529" instrument_node="">). However, as the number of COVID-19 cases grew rapidly in England, the government implemented healthcare policy prioritising COVID-19 patients to ration resources (NICE </span><a aria-label="Reference 2020" data-dcnode-id="1527" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d313340794e403" title="National Institute for Health and Care Excellence (NICE) Guideline. 2020. COVID-19 rapid guideline: critical care in adults. 
www.nice.org.uk/guidance/ng159

. Accessed 30 July 2020."><span data-dcnode-id="1528" instrument_node="">2020</span></a><span data-dcnode-id="1526" instrument_node="">), thereby suspending an equal access approach for the delivery of healthcare services for non-COVID patients (Germain </span><a aria-label="Reference 2020" data-dcnode-id="1524" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d313340794e406" title="Germain, Sabrina. 2020. How coronavirus is threatening the equal access principle at the core of the NHS. The Conversation, 11 May. 
https://theconversation.com/how-coronavirus-is-threatening-the-equal-access-principle-at-the-core-of-the-nhs-137735

. Accessed 30 July 2020."><span data-dcnode-id="1525" instrument_node="">2020</span></a><span data-dcnode-id="1523" instrument_node="">).</span></p><p data-dcnode-id="1517"><span data-dcnode-id="1521" instrument_node="">Had healthcare services kept in line with the traditional egalitarian approach, services would have had to be delivered equally to all patients with similar healthcare needs. Patients would have been treated alike, regardless of whether or not they had contracted the virus. Unfortunately, the reality of the pandemic did not allow for the system to spread its resources in order to preserve equality in access for all. This translated into having some of the routine care for non-COVID patients halted and individuals not directly affected by the virus no longer equally accessing healthcare services based on their needs (BMA </span><a aria-label="Reference 2020" data-dcnode-id="1519" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d313340794e412" title="British Medical Association (BMA). 2020. Thousands of doctors unable to offer patients the desperate care they need as a result of COVID-19 pandemic, BMA survey finds. BMA Press Release, 4 May. 
https://www.bma.org.uk/bma-media-centre/thousands-of-doctors-unable-to-offer-patients-the-desperate-care-they-need-as-a-result-of-covid-19-pandemic-bma-survey-finds

. Accessed 15 Sept 2020."><span data-dcnode-id="1520" instrument_node="">2020</span></a><span data-dcnode-id="1518" instrument_node="">).</span></p><p data-dcnode-id="1503"><span data-dcnode-id="1516" instrument_node="">The National Institute for Health and Care Excellence (NICE) also introduced COVID-19 rapid guidelines that defined criteria for the admission of patients in critical care in March 2020 (NICE </span><a aria-label="Reference 2020" data-dcnode-id="1514" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d313340794e418" title="National Institute for Health and Care Excellence (NICE) Guideline. 2020. COVID-19 rapid guideline: critical care in adults. 
www.nice.org.uk/guidance/ng159

. Accessed 30 July 2020."><span data-dcnode-id="1515" instrument_node="">2020</span></a><span data-dcnode-id="1513" instrument_node="">). Emergency measures were put in place to maximise health outcomes, favouring individuals with greater chances of survival and introducing measures to rank patients in need of treatment (Shaw et al. </span><a aria-label="Reference 2020" data-dcnode-id="1511" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d313340794e421" title="Shaw, David, Dan Harvey and Dale Gardiner. 2020. Don’t let the ethics of despair infect the intensive care unit. Journal of Medical Ethics Blog, 26 March 2020. 
https://blogs.bmj.com/medical-ethics/2020/03/26/dont-let-the-ethics-of-despair-infect-the-intensive-care-unit/

 Accessed 27 March 2020."><span data-dcnode-id="1512" instrument_node="">2020</span></a><span data-dcnode-id="1510" instrument_node="">). Chronically ill patients were most affected by these measures, especially individuals living with diabetes or cancer that saw their treatment delayed or even cancelled (Extance </span><a aria-label="Reference 2020" data-dcnode-id="1508" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d313340794e424" title="Extance, Andy. 2020. Covid-19 and long term conditions: what if you have cancer, diabetes, or chronic kidney disease? British Medical Journal 368: m1174."><span data-dcnode-id="1509" instrument_node="">2020</span></a><span data-dcnode-id="1507" instrument_node="">). These emergency measures have proven to have more permanent consequences in the aftermath of the first peak of infections because of the severe backlog in the system (Neville </span><a aria-label="Reference 2020" data-dcnode-id="1505" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d313340794e427" title="Neville, Sarah. 2020. NHS patient backlog threatens to undermine return to pre-pandemic service. Financial Times, 2 September."><span data-dcnode-id="1506" instrument_node="">2020</span></a><span data-dcnode-id="1504" instrument_node="">).</span></p><p data-dcnode-id="1480"><span data-dcnode-id="1502" instrument_node="">A disproportionately higher number of patients in ethnic minority groups also died during this period (Chaturvedi </span><a aria-label="Reference 2020" data-dcnode-id="1500" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d313340794e433" title="Chaturvedi, Nishi. 2020. Why are people from BAME groups dying disproportionately of Covid-19. The Guardian, 22 April."><span data-dcnode-id="1501" instrument_node="">2020</span></a><span data-dcnode-id="1499" instrument_node="">), making for 15.5 percent of all deaths by June 2020 (Butcher and Massey </span><a aria-label="Reference 2020" data-dcnode-id="1497" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d313340794e436" title="Butcher, Benjamin &amp; Joel Massey. 2020. Why are more people from BAME backgrounds dying from coronavirus? BBC News, 19 June."><span data-dcnode-id="1498" instrument_node="">2020</span></a><span data-dcnode-id="1496" instrument_node="">). The number of deaths recorded during the peak of the pandemic of Central and West African individuals born outside the UK and individuals from the former Eastern bloc of EU Member States was also higher compared to 2014–2018 (PHE </span><a aria-label="Reference 2020" data-dcnode-id="1494" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d313340794e439" title="Public Health England (PHE). 2020. Disparities in the risk and outcomes of COVID-19. 
https://assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/892085/disparities_review.pdf

. Accessed 30 July 2020."><span data-dcnode-id="1495" instrument_node="">2020</span></a><span data-dcnode-id="1493" instrument_node="">, 55).</span><sup data-dcnode-id="1488"><a data-dcnode-id="1489" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Footnote </span></span><span data-dcnode-id="1490" instrument_node="">3</span></a></sup><span data-dcnode-id="1487" instrument_node=""> Ethnic minority women have also made up 55 percent of the pregnant patients admitted with COVID-19, putting them at a higher risk of severe complications (Charity So White </span><a aria-label="Reference 2020" data-dcnode-id="1485" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d313340794e448" title="Charity So White. 2020. Area 1: Health inequalities. 
https://charitysowhite.org/covid19-health-inequalities

. Accessed 30 July 2020."><span data-dcnode-id="1486" instrument_node="">2020</span></a><span data-dcnode-id="1484" instrument_node="">). Higher fertility rates in migrant women means that they would have seen their healthcare risk increased during this period too, though no official data exists on this yet (Latif </span><a aria-label="Reference 2014" data-dcnode-id="1482" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d313340794e452" title="Latif, Zahara. 2014. The maternal mental health of migrant women. Race equality foundation briefing paper 31. 
https://raceequalityfoundation.org.uk/wp-content/uploads/2018/03/Health_Briefing_31_0.pdf

. Accessed 30 July 2020."><span data-dcnode-id="1483" instrument_node="">2014</span></a><span data-dcnode-id="1481" instrument_node="">, 1). Our argument is that the suspension of equality in access to care triggered by the emergency measures alone cannot explain these figures. Even though healthcare services were facing unprecedented demand, there were already existing barriers to access the NHS that contribute to poorer health outcomes for ethnic minority and migrant women.</span></p></div></div></section><section data-dcnode-id="1302" data-gtm-vis-first-on-screen-50443292_562="733" data-gtm-vis-first-on-screen-50443292_563="734" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="733" data-gtm-vis-recent-on-screen-50443292_563="734" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Barriers to Accessing Healthcare for Ethnic Minority and Migrant Women in Light of COVID-19"><div class="c-article-section" data-dcnode-id="1303" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1475" id="Sec3"><span data-dcnode-id="1476" instrument_node="">Barriers to Accessing Healthcare for Ethnic Minority and Migrant Women in Light of COVID-19</span></h2><div class="c-article-section__content" data-dcnode-id="1304" id="Sec3-content"><p data-dcnode-id="1458"><span data-dcnode-id="1474" instrument_node="">Media coverage and government inquiry have focused on the disproportionate impact of the virus on the ethnic minority community without paying any closer attention to how the pandemic has affected men and women differently, apart from the first hand observation that men had recorded more fatalities than women (PHE </span><a aria-label="Reference 2020" data-dcnode-id="1472" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d313340794e463" title="Public Health England (PHE). 2020. Disparities in the risk and outcomes of COVID-19. 
https://assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/892085/disparities_review.pdf

. Accessed 30 July 2020."><span data-dcnode-id="1473" instrument_node="">2020</span></a><span data-dcnode-id="1471" instrument_node="">, 10). There are also no specific policies or guidance on healthcare for vulnerable migrant women (Jayaweera </span><a aria-label="Reference 2018" data-dcnode-id="1469" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d313340794e466" title="Jayaweera, Hiranthi. 2018. Access to healthcare for vulnerable migrant women in England: A human security approach. Current Sociology Monograph 66 (2): 273–285."><span data-dcnode-id="1470" instrument_node="">2018</span></a><span data-dcnode-id="1468" instrument_node="">, 277) adding to the difficulties in determining the pandemic’s full impact on migrant women.</span><sup data-dcnode-id="1463"><a data-dcnode-id="1464" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Footnote </span></span><span data-dcnode-id="1465" instrument_node="">4</span></a></sup><span data-dcnode-id="1462" instrument_node=""> However, by critiquing barriers to accessing healthcare from a feminist standpoint, we show that there are specific barriers for women aggravated by their race and cultural associations with race, or having migrant status and being subject to hostile immigration law. We argue that these existing barriers to accessing services have been reinforced, and in some situations deepened, by the pandemic (Lindsay </span><a aria-label="Reference 2020" data-dcnode-id="1460" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d313340794e478" title="Lindsay, Treva. 2020. Why COVID-19 is hitting Black women so hard. Women’s Media Centre, 17 April. 
https://womensmediacenter.com/news-features/why-covid-19-is-hitting-black-women-so-hard

. Accessed 30 July 2020."><span data-dcnode-id="1461" instrument_node="">2020</span></a><span data-dcnode-id="1459" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1456" id="Sec4"><span data-dcnode-id="1457" instrument_node="">Racialised Medical Perceptions</span></h3><p data-dcnode-id="1448"><span data-dcnode-id="1455" instrument_node="">The prevalence of comorbidities in individuals contracting the virus have been associated with a higher risk of death from COVID-19. However, discussions around the comorbidities affecting the ethnic minority community during and prior to the pandemic have often been tinted with racialised medical perceptions. Patients in the ethnic minority community are not genetically or inherently more prone to develop underlying health conditions, but common socio-economic factors associated with race inequalities have actually led these communities to being more susceptible to these diseases (Roberts </span><a aria-label="Reference 2008" data-dcnode-id="1453" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d313340794e488" title="Roberts, Dorothy E. 2008. Is race-based medicine good for us: African American approaches to race, biomedicine, and equality. Journal of Law, Medicine and Ethics 36: 537–545."><span data-dcnode-id="1454" instrument_node="">2008</span></a><span data-dcnode-id="1452" instrument_node="">). For example, the fact that individuals with South Asian and Afro-Caribbean backgrounds are more susceptible to diabetes or coronary heart diseases and developing a serious and long-term condition thus makes them more vulnerable to the severe effects of COVID-19 (PHE </span><a aria-label="Reference 2020" data-dcnode-id="1450" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d313340794e491" title="Public Health England (PHE). 2020. Disparities in the risk and outcomes of COVID-19. 
https://assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/892085/disparities_review.pdf

. Accessed 30 July 2020."><span data-dcnode-id="1451" instrument_node="">2020</span></a><span data-dcnode-id="1449" instrument_node="">, 40).</span></p><p data-dcnode-id="1437"><span data-dcnode-id="1447" instrument_node="">However, it is important to note that racialised medical perceptions can impact the judgment of medical professionals and biases are potentially heightened in critical situations where they have to act urgently and instinctively (Grey et al. </span><a aria-label="Reference 2013" data-dcnode-id="1445" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d313340794e497" title="Grey, Tracy, Hári Sewell, Gillian Shapiro, and Fahmida Ashraf. 2013. Mental health inequalities facing UK minority ethnic populations. Journal of Psychological Issues in Organizational Culture 3: 146–157."><span data-dcnode-id="1446" instrument_node="">2013</span></a><span data-dcnode-id="1444" instrument_node="">, 150), such as during a pandemic. There is evidence that medical training received by healthcare professionals perpetuates unconscious biases against marginalised groups, prejudicing future diagnoses of illnesses as well as courses of treatment (Roberts </span><a aria-label="Reference 2008" data-dcnode-id="1442" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d313340794e500" title="Roberts, Dorothy E. 2008. Is race-based medicine good for us: African American approaches to race, biomedicine, and equality. Journal of Law, Medicine and Ethics 36: 537–545."><span data-dcnode-id="1443" instrument_node="">2008</span></a><span data-dcnode-id="1441" instrument_node="">). Ethnic minority and migrant women are more vulnerable to these perceptions because of prejudices and racist beliefs, such as having higher pain thresholds or a greater ability to cope with illness (Laville </span><a aria-label="Reference 2020" data-dcnode-id="1439" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d313340794e503" title="Laville, Sandra. 2020. London woman dies of suspected Covid-19 after being told she was ‘not priority’. The Guardian, 25 March."><span data-dcnode-id="1440" instrument_node="">2020</span></a><span data-dcnode-id="1438" instrument_node="">). They are often also undermined when voicing their healthcare needs.</span></p><p data-dcnode-id="1421"><span data-dcnode-id="1436" instrument_node="">Even prior to the pandemic, ethnic minority and migrant women had a more restricted access to specialised treatments than white women, notably in the area of maternal care with an increased difficulty in accessing pain relief and a disproportionately higher incidence of mortality during child labour for ethnic minority women (Saini </span><a aria-label="Reference 2020" data-dcnode-id="1434" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d313340794e509" title="Saini, Angela. 2020. The data was there—so why did it take coronavirus to wake us up to racial health inequalities? The Guardian, 11 June."><span data-dcnode-id="1435" instrument_node="">2020</span></a><span data-dcnode-id="1433" instrument_node="">). A lack of appropriate antenatal care could also have knock-on effects specifically on the health of migrant women’s families, increasing migrant children’s likelihood to develop comorbidities themselves (Shortall et al. </span><a aria-label="Reference 2015" data-dcnode-id="1431" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d313340794e512" title="Shortall, Clare, J. McMorran, K. Taylor, A. Traianou, M. Gracia de Frutos, L. Jones, and P. Mur-Will. 2015. Experiences of pregnant migrant women receiving ante/peri and postnatal care in the UK. Doctors of the World. 
https://b.3cdn.net/droftheworld/08303864eb97b2d304_lam6brw4c.pdf

. Accessed 27 July 2020."><span data-dcnode-id="1432" instrument_node="">2015</span></a><span data-dcnode-id="1430" instrument_node="">, 4). It may be that this played out during the pandemic and translated into higher mortality rates in deprived areas (Caul </span><a aria-label="Reference 2020" data-dcnode-id="1428" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d313340794e515" title="Caul, Sarah. 2020. Deaths involving COVID-19 by local area and socioeconomic deprivation: deaths occurring between 1 March and 30 June 2020. Office for National Statistics. 
https://www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/deaths/bulletins/deathsinvolvingcovid19bylocalareasanddeprivation/deathsoccurringbetween1marchand30june2020

. Accessed 30 July 2020."><span data-dcnode-id="1429" instrument_node="">2020</span></a><span data-dcnode-id="1427" instrument_node="">, 2). Ethnic minority and migrant patients have generally been under-represented in medical research and women are also less predominantly the subject of scientific studies making conditions affecting ethnic minority and migrant women least likely to be addressed by medicine.</span><sup data-dcnode-id="1422"><a data-dcnode-id="1423" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Footnote </span></span><span data-dcnode-id="1424" instrument_node="">5</span></a></sup></p><p data-dcnode-id="1413"><span data-dcnode-id="1420" instrument_node="">The suspension of routine healthcare checks and treatments in areas outside intensive and critical care services during the pandemic also had a disproportionate impact on ethnic minority and migrant women. Already, in non-pandemic times, black women were more likely to develop depression and anxiety disorders, but less likely to receive mental health treatment and psychological therapies (Cabinet Office </span><a aria-label="Reference 2018" data-dcnode-id="1418" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d313340794e529" title="Cabinet Office. 2018. Race disparity audit: Summary findings from the ethnicity facts and figures website. 
https://www.ethnicity-facts-figures.service.gov.uk/static/race-disparity-audit-summary-findings.pdf

 Accessed 30 July 2020."><span data-dcnode-id="1419" instrument_node="">2018</span></a><span data-dcnode-id="1417" instrument_node="">). The stress associated with the risk of contracting the virus and caring for loved ones in lockdown have had an increasingly negative impact on the mental health of many individuals. Ethnic minority and migrant women are in need of greater support during this time of crisis, and the unconscious medical bias and underlying racialisation of their mental health make it less likely for them to be provided with access to adequate mental health services (Latif </span><a aria-label="Reference 2014" data-dcnode-id="1415" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d313340794e532" title="Latif, Zahara. 2014. The maternal mental health of migrant women. Race equality foundation briefing paper 31. 
https://raceequalityfoundation.org.uk/wp-content/uploads/2018/03/Health_Briefing_31_0.pdf

. Accessed 30 July 2020."><span data-dcnode-id="1416" instrument_node="">2014</span></a><span data-dcnode-id="1414" instrument_node="">, 5–7).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1411" id="Sec5"><span data-dcnode-id="1412" instrument_node="">Cultural Barriers Related to Gender</span></h3><p data-dcnode-id="1403"><span data-dcnode-id="1410" instrument_node="">Barriers to accessing healthcare specific to women are not always physical barriers, but rather cultural barriers associated with gender that discourage ethnic minority and migrant women from seeking access to care (Mirza and Sheridan </span><a aria-label="Reference 2003" data-dcnode-id="1408" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d313340794e543" title="Mirza, Heidi Safia &amp; Ann-Marie Sheridan. 2003. Multiple identity and access to health: the experience of black and minority ethnic women. Centre for Racial Equality Studies Middlesex University working paper series no. 10. 
https://tandis.odihr.pl/bitstream/20.500.12389/19389/1/01281.pdf

. Accessed 30 July 2020."><span data-dcnode-id="1409" instrument_node="">2003</span></a><span data-dcnode-id="1407" instrument_node="">). Specific to the pandemic, this runs counter to the government’s approach in tackling this communicable disease which relies entirely on public cooperation to identify those who have been in contact with the virus (Department of Health and Social Care </span><a aria-label="Reference 2020" data-dcnode-id="1405" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d313340794e546" title="Department of Health and Social Care. 2020. NHS test and trace: how it works. 
https://www.gov.uk/guidance/nhs-test-and-trace-how-it-works

. Accessed 30 July 2020."><span data-dcnode-id="1406" instrument_node="">2020</span></a><span data-dcnode-id="1404" instrument_node="">). Indeed, it is the cultural aspects of these barriers that are not well understood or taken into account in the architecture of the healthcare system. We identify three categories: information, language and communication barriers, gendered cultural norms and stigma associated with seeking care.</span></p><p data-dcnode-id="1386"><span data-dcnode-id="1402" instrument_node="">Information barriers relating to healthcare mostly concern a lack of information or a lack of adequate communication that impair one’s ability to access services. Language and communication barriers have been an obstacle even before the pandemic, and there is a correlation between ethnicity and deprivation which would potentially exacerbate this.</span><sup data-dcnode-id="1397"><a data-dcnode-id="1398" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Footnote </span></span><span data-dcnode-id="1399" instrument_node="">6</span></a></sup><span data-dcnode-id="1396" instrument_node=""> Barriers arise out of a general lack of confidence in asking questions about seeking care, or being unaware of their right to language support and equality services to help communicate (Health Watch Surrey </span><a aria-label="Reference 2015" data-dcnode-id="1394" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d313340794e564" title="Health Watch Surrey. 2015. Our Health Matters: The Healthcare Experiences of BME Communities in Surrey. 
https://www.healthwatchsurrey.co.uk/wp-content/uploads/2017/06/bme_report_web.pdf

. Accessed 30 July 2020."><span data-dcnode-id="1395" instrument_node="">2015</span></a><span data-dcnode-id="1393" instrument_node="">, 4). Issues for ethnic minority communities include “accessing culturally appropriate services, including lack of cultural understanding, communication issues, and where and how to seek help.” (Grey et al. </span><a aria-label="Reference 2013" data-dcnode-id="1391" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d313340794e567" title="Grey, Tracy, Hári Sewell, Gillian Shapiro, and Fahmida Ashraf. 2013. Mental health inequalities facing UK minority ethnic populations. Journal of Psychological Issues in Organizational Culture 3: 146–157."><span data-dcnode-id="1392" instrument_node="">2013</span></a><span data-dcnode-id="1390" instrument_node="">, 146) Other difficulties cited are the ability to schedule appointments or an unwillingness to ask for help to attend medical appointments, which “frames how [women] were seen in the healthcare system—as a problem.” (Mirza and Sheridan </span><a aria-label="Reference 2003" data-dcnode-id="1388" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d313340794e570" title="Mirza, Heidi Safia &amp; Ann-Marie Sheridan. 2003. Multiple identity and access to health: the experience of black and minority ethnic women. Centre for Racial Equality Studies Middlesex University working paper series no. 10. 
https://tandis.odihr.pl/bitstream/20.500.12389/19389/1/01281.pdf

. Accessed 30 July 2020."><span data-dcnode-id="1389" instrument_node="">2003</span></a><span data-dcnode-id="1387" instrument_node="">, iv).</span></p><p data-dcnode-id="1375"><span data-dcnode-id="1385" instrument_node="">We argue that simply stating that all COVID-19 patients can access treatment equally does not remove these pre-existing barriers to access for ethnic minority and migrant women. Specific to the information barrier, the virus’ novelty required new guidance, laws and policies to be rolled out with alarming speed. These new rules needed to be understood, followed and applied appropriately in order to satisfactorily control the virus.</span><sup data-dcnode-id="1380"><a data-dcnode-id="1381" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Footnote </span></span><span data-dcnode-id="1382" instrument_node="">7</span></a></sup><span data-dcnode-id="1379" instrument_node=""> Measures to prevent the spread of the infection, such as the lockdown, government messaging on not overburdening the NHS and fear of catching the virus in hospital settings, would not only be a physical barrier to accessing care, but also exacerbated ethnic minority and migrant women’s health illiteracy (Jayaweera </span><a aria-label="Reference 2014" data-dcnode-id="1377" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d313340794e582" title="Jayaweera, Hiranthi. 2014. Health of migrants in the UK: What do we know? Migration observatory briefing 2014."><span data-dcnode-id="1378" instrument_node="">2014</span></a><span data-dcnode-id="1376" instrument_node="">, 5).</span></p><p data-dcnode-id="1364"><span data-dcnode-id="1374" instrument_node="">These marginalised groups have been forced to develop ‘active strategies and practices which helped them in their struggle to survive.’ This included avoiding ‘statutory and mainstream services and officials where possible.’ (Mirza and Sheridan </span><a aria-label="Reference 2003" data-dcnode-id="1372" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d313340794e588" title="Mirza, Heidi Safia &amp; Ann-Marie Sheridan. 2003. Multiple identity and access to health: the experience of black and minority ethnic women. Centre for Racial Equality Studies Middlesex University working paper series no. 10. 
https://tandis.odihr.pl/bitstream/20.500.12389/19389/1/01281.pdf

. Accessed 30 July 2020."><span data-dcnode-id="1373" instrument_node="">2003</span></a><span data-dcnode-id="1371" instrument_node="">, iv) However, enforced isolation from the lockdown would have made reliance on their own networks, community and advice more difficult, especially as ‘evidence shows that marginalised ethnic groups have worse internet access,’ (Charity So White </span><a aria-label="Reference 2020" data-dcnode-id="1369" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d313340794e591" title="Charity So White. 2020. Area 1: Health inequalities. 
https://charitysowhite.org/covid19-health-inequalities

. Accessed 30 July 2020."><span data-dcnode-id="1370" instrument_node="">2020</span></a><span data-dcnode-id="1368" instrument_node="">) which the pandemic has forced society to increase reliance upon. On the whole, ‘[r]igid and inflexible health care delivery resulted in services excluding the very women they were aimed at helping.’ (Mirza &amp; Sheridan </span><a aria-label="Reference 2003" data-dcnode-id="1366" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d313340794e594" title="Mirza, Heidi Safia &amp; Ann-Marie Sheridan. 2003. Multiple identity and access to health: the experience of black and minority ethnic women. Centre for Racial Equality Studies Middlesex University working paper series no. 10. 
https://tandis.odihr.pl/bitstream/20.500.12389/19389/1/01281.pdf

. Accessed 30 July 2020."><span data-dcnode-id="1367" instrument_node="">2003</span></a><span data-dcnode-id="1365" instrument_node="">, iii).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1362" id="Sec6"><span data-dcnode-id="1363" instrument_node="">Legal Barriers</span></h3><p data-dcnode-id="1354"><span data-dcnode-id="1361" instrument_node="">Migrant women are more likely to face legal barriers in accessing healthcare because of their migrant status, a result of the reforms made in the Immigration Act 2014. Importantly, effects that migrant women face in this context may intersect with any ethnic minority characteristics they possess, but white migrant women also face discrimination, most prevalent recently against Eastern Europeans in light of Brexit (Rzepnikowska </span><a aria-label="Reference 2019" data-dcnode-id="1359" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d313340794e605" title="Rzepnikowska, Alina. 2019. Racism and xenophobia experienced by Polish migrants in the UK before and after Brexit vote. Journal of Ethnic and Migration Studies 45: 61–77."><span data-dcnode-id="1360" instrument_node="">2019</span></a><span data-dcnode-id="1358" instrument_node="">). Noting that ‘migration factors, interacting with ethnicity and socio-demographic factors, may mean that migrants have different needs and meet with different barriers compared to minority ethnic groups’, (Jayaweera </span><a aria-label="Reference 2010" data-dcnode-id="1356" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d313340794e608" title="Jayaweera, Hiranthi. 2010. Health and access to health care of migrants in the UK. Race equality foundation better health briefing 19. 
https://raceequalityfoundation.org.uk/wp-content/uploads/2018/03/health-brief19.pdf

. Accessed 30 July 2020."><span data-dcnode-id="1357" instrument_node="">2010</span></a><span data-dcnode-id="1355" instrument_node="">, 2) the immigration healthcare surcharge and healthcare policies stemming from the hostile environment are the two main areas of concern regarding barriers to accessing healthcare for migrant women.</span></p><p data-dcnode-id="1343"><span data-dcnode-id="1353" instrument_node="">Charges are levied against non-nationals seeking healthcare treatment in the UK in three different ways: first, the charges levied on those who are not “ordinarily resident” in the UK;</span><sup data-dcnode-id="1348"><a data-dcnode-id="1349" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Footnote </span></span><span data-dcnode-id="1350" instrument_node="">8</span></a></sup><span data-dcnode-id="1347" instrument_node=""> second, charges for receiving certain types of treatment, such as follow up care after being treated for (free) emergency or immediately necessary care and any secondary (hospital-based or specialist) care; third, the immigration healthcare surcharge payable alongside visa applications. We note that all three scenarios disproportionately impact those on low incomes, which ultimately affects women more because of the high numbers of women in low income jobs, especially because of the numbers of single mothers supporting children. In fact, “[s]ingle mothers, those with precarious employment without social security, and women in frontline caring, domestic and health work, are worse off” (Hankivsky and Kapilashrami </span><a aria-label="Reference 2020" data-dcnode-id="1345" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d313340794e620" title="Hankivsky, Olena &amp; Anuj Kapilashrami. 2020. Intersectionality offers a radical rethinking of covid-19. BMJ Opinion Blog, 15 May. 
https://blogs.bmj.com/bmj/2020/05/15/intersectionality-offers-a-radical-rethinking-of-covid-19/

. Accessed 30 July 2020."><span data-dcnode-id="1346" instrument_node="">2020</span></a><span data-dcnode-id="1344" instrument_node="">).</span></p><p data-dcnode-id="1332"><span data-dcnode-id="1342" instrument_node="">Since COVID-19 is a novel communicable disease that is more fatal to individuals with comorbidities, we argue that higher fees</span><sup data-dcnode-id="1337"><a data-dcnode-id="1338" href="#Fn9"><span class="u-visually-hidden" data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Footnote </span></span><span data-dcnode-id="1339" instrument_node="">9</span></a></sup><span data-dcnode-id="1336" instrument_node=""> may mean that greater numbers of migrants may not have accessed care in the past, putting them at future risk of falling into a high health risk category (Bowsher et al. </span><a aria-label="Reference 2015" data-dcnode-id="1334" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d313340794e632" title="Bowsher, Gemma, Rohini A. Krishnan, Thomas A. Shanahan, and Stephanie K. Williams. 2015. Immigration Act 2014 challenges health of migrants in the UK. The Lancet 385: 852–853."><span data-dcnode-id="1335" instrument_node="">2015</span></a><span data-dcnode-id="1333" instrument_node="">, 853). The fact that the pandemic preys on those with underlying health conditions shines a spotlight on how existing immigration laws may have contributed to embedding structural inequalities which have played out to the detriment of migrant women today.</span></p><p data-dcnode-id="1315"><span data-dcnode-id="1331" instrument_node="">The hostile environment policy has also affected access to healthcare for migrants (Kirkup and Winnett </span><a aria-label="Reference 2012" data-dcnode-id="1329" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d313340794e638" title="Kirkup, James and Robert Winnett. 2012. Theresa May interview: ‘We’re going to give illegal migrants a really hostile reception’ The Telegraph, 25 May."><span data-dcnode-id="1330" instrument_node="">2012</span></a><span data-dcnode-id="1328" instrument_node="">). It has been criticised for “medicalising what may be largely social problems.” (Taylor </span><a aria-label="Reference 2009" data-dcnode-id="1326" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d313340794e641" title="Taylor, Keith. 2009. Asylum seekers, refugees, and the politics of access to health care: A UK perspective. British Journal of General Practice 59: 765–772."><span data-dcnode-id="1327" instrument_node="">2009</span></a><span data-dcnode-id="1325" instrument_node="">, 769) The law requires NHS trusts to check identification before allowing access to care.</span><sup data-dcnode-id="1320"><a data-dcnode-id="1321" href="#Fn10"><span class="u-visually-hidden" data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Footnote </span></span><span data-dcnode-id="1322" instrument_node="">10</span></a></sup><span data-dcnode-id="1319" instrument_node=""> We argue that having to prove identity or immigration status disproportionately impacts women because they are more likely to have precarious or dependent immigration status, having migrated with a male partner as a family dependent (Jayaweera </span><a aria-label="Reference 2018" data-dcnode-id="1317" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d313340794e650" title="Jayaweera, Hiranthi. 2018. Access to healthcare for vulnerable migrant women in England: A human security approach. Current Sociology Monograph 66 (2): 273–285."><span data-dcnode-id="1318" instrument_node="">2018</span></a><span data-dcnode-id="1316" instrument_node="">, 274), and likely to have the primary caring responsibilities and atypical work, if any at all. This dependency often becomes the basis of much of their rights in the host territory.</span></p><p data-dcnode-id="1310"><span data-dcnode-id="1314" instrument_node="">As such, dependency related to immigration status particularly impacts women who are subjects of domestic violence. A migrant woman who relies on the cooperation of an abusive partner faces additional difficulties in accessing identification documents if their abusive partner controls all aspects of their lives, including their whereabouts. This would prevent them from accessing care even if they are eligible (Home Affairs Committee </span><a aria-label="Reference 2017" data-dcnode-id="1312" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d313340794e657" title="Home Affairs Committee, ‘EU Settlement Scheme’ (HC 2017–19, 1945-I) 28."><span data-dcnode-id="1313" instrument_node="">2017</span></a><span data-dcnode-id="1311" instrument_node="">–19). Secondly, and more structurally, if their immigration status depends on their partners, migrant women risk having to stay in an abusive relationship simply to retain a regularised status. The effect of these policies on health is that migrant women often do not seek care until it is too late, thereby adding to their overall poor health and having comorbidities that put them at greater risk of death from COVID-19.</span></p><p data-dcnode-id="1305"><span data-dcnode-id="1309" instrument_node="">Despite government reassurances that no charges would be levied for treatment of the virus, we note that the policy has not eliminated underlying discrimination against migrant women, whether it be on the basis of race or nationality. It has been argued that “[a]n effective response to the current pandemic requires solidarity among all members of society instead of insistent line drawing between citizens and migrants who are similarly situated.” (Chen </span><a aria-label="Reference 2020" data-dcnode-id="1307" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d313340794e663" title="Chen, Y.Y.Brandon. 2020. Migrant health in a time of pandemic fallacies of us-versus-them. In Vulnerable: The law, policy and ethics of COVID-19, ed. Colleen M. Flood, Vanessa MacDonnell, Jane Philpott, Sophie Thériault, and Sridhar Venkatapuram, 407–418. Ottawa: University of Ottawa Press."><span data-dcnode-id="1308" instrument_node="">2020</span></a><span data-dcnode-id="1306" instrument_node="">, 407) However, the urgency required to control the spread of the pandemic in the UK at the outset meant that little attention was given in the way of addressing the structural inequalities created by legislation. This has led to a disproportionate impact of COVID-19 on ethnic minority and migrant women.</span></p></div></div></section><section data-dcnode-id="1292" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="1293" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1300" id="Sec7"><span data-dcnode-id="1301" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="1294" id="Sec7-content"><p data-dcnode-id="1295"><span data-dcnode-id="1299" instrument_node="">Existing underlying barriers to accessing healthcare provides some explanation for increased susceptibility to serious negative health outcomes for ethnic minority and migrant women. Our commentary sought to explain that barriers to accessing care have been exacerbated by the COVID-19 pandemic for these marginalised groups of women. These include barriers stemming from racialised medical perceptions, cultural barriers related to gender including information barriers and stigma, and legal barriers stemming from immigration law. Treating women as a homogenous group disregards the individual needs of ethnic minorities and migrants, as doing so embeds structural inequalities that have been highlighted as a result of the pandemic (Platt and Warwick </span><a aria-label="Reference 2020" data-dcnode-id="1297" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d313340794e675" title="Platt, Lucinda &amp; Ross Warwick. 2020. Are some ethnic groups more vulnerable to COVID-19 than others. The Institute for Fiscal Studies Deaton Review. 
https://www.ifs.org.uk/inequality/are-some-ethnic-groups-more-vulnerable-to-covid-19-than-others

. Accessed 30 July 2020."><span data-dcnode-id="1298" instrument_node="">2020</span></a><span data-dcnode-id="1296" instrument_node="">). Our aim was to demonstrate that these structural inequalities in accessing healthcare put ethnic minority and migrant women at greater risk of poorer health outcomes and it appears that this has only worsened because of the COVID-19 pandemic.</span></p></div></div></section><span data-dcnode-id="1291" instrument_node="">
</span><section data-dcnode-id="1233" data-title="Notes"><div class="c-article-section" data-dcnode-id="1234" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1289" id="notes"><span data-dcnode-id="1290" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="1235" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="1236"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="1285" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="1286"><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">In the context of this article, the group of “women” is limited to cisgendered women, equally, the group of “men” is limited to cisgendered men.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="1281" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="1282"><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">This commentary will not discuss asylum seekers or undocumented migrants as this category of migrants has been discussed extensively and presents a different set of problems outside the scope of this paper.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="1277" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="1278"><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">The former Eastern bloc includes Polish, Bulgarian and Romanian nationals who have notoriously been discriminated against especially since the Brexit vote, and who are also most likely to be in low-income low-skilled positions.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="1270" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="1271"><p data-dcnode-id="1272"><span data-dcnode-id="1276" instrument_node="">Any intersectional discrimination becomes more prevalent because of the lack of information on the health of migrants in general as compared to individuals of different races, ethnic minorities, or genders especially specific to the COVID-19. Migrant women of an ethnic minority background may be disproportionately impacted but currently equality legislation does not adequately address this intersectionality, see Atrey (</span><a aria-label="Reference 2019" data-dcnode-id="1274" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d313340794e473" title="Atrey, Shreya. 2019. Intersectional discrimination. Oxford: Oxford University Press."><span data-dcnode-id="1275" instrument_node="">2019</span></a><span data-dcnode-id="1273" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="5." data-dcnode-id="1263" id="Fn5"><div class="c-article-footnote--listed__content" data-dcnode-id="1264"><p data-dcnode-id="1265"><span data-dcnode-id="1269" instrument_node="">See Laville </span><a aria-label="Reference 2020" data-dcnode-id="1267" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d313340794e522" title="Laville, Sandra. 2020. London woman dies of suspected Covid-19 after being told she was ‘not priority’. The Guardian, 25 March."><span data-dcnode-id="1268" instrument_node="">2020</span></a><span data-dcnode-id="1266" instrument_node="">. The passing of 36-year-old Kayla Williams illustrates the tragic consequences of racialised medical perceptions. Despite her and her husband’s plea to be taken into hospital for worsening COVID-19 symptoms, paramedics denied their requests as they considered she was not a priority patient.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="6." data-dcnode-id="1253" id="Fn6"><div class="c-article-footnote--listed__content" data-dcnode-id="1254"><p data-dcnode-id="1255"><span data-dcnode-id="1262" instrument_node="">In England, most deprived areas had more than double the mortality rate than least deprived areas for COVID-19. See Caul (</span><a aria-label="Reference 2020" data-dcnode-id="1260" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d313340794e556" title="Caul, Sarah. 2020. Deaths involving COVID-19 by local area and socioeconomic deprivation: deaths occurring between 1 March and 30 June 2020. Office for National Statistics. 
https://www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/deaths/bulletins/deathsinvolvingcovid19bylocalareasanddeprivation/deathsoccurringbetween1marchand30june2020

. Accessed 30 July 2020."><span data-dcnode-id="1261" instrument_node="">2020</span></a><span data-dcnode-id="1259" instrument_node="">, 14) and White and Nafilyan (</span><a aria-label="Reference 2020" data-dcnode-id="1257" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d313340794e559" title="White, Chris and Vahé Nafilyan – Office for National Statistics. 2020. Coronavirus-related deaths by ethnic group, England and Wales methodology. 
https://www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/deaths/methodologies/coronavirusrelateddeathsbyethnicgroupenglandandwalesmethodology

. Accessed 27 July 2020."><span data-dcnode-id="1258" instrument_node="">2020</span></a><span data-dcnode-id="1256" instrument_node="">) where ‘a recent report also confirms that ‘BAME are also more likely to live in more deprived area than those of White ethnicity.’ There is an information gap for migrant populations due to the difficulty in gathering statistics in particular for EU nationals whose free movement rights in EU law do not require them to register per se and thus no conclusive comments can be made about deprivation and migrant populations.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="7." data-dcnode-id="1249" id="Fn7"><div class="c-article-footnote--listed__content" data-dcnode-id="1250"><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Coronavirus Act 2020; The Health Protection (Coronavirus, Restrictions) (England) Regulations 2020; The Health Protection (Coronavirus, Restrictions) (No. 2) (England) Regulations 2020.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="8." data-dcnode-id="1245" id="Fn8"><div class="c-article-footnote--listed__content" data-dcnode-id="1246"><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Immigration Act 2014, s39(1).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="9." data-dcnode-id="1241" id="Fn9"><div class="c-article-footnote--listed__content" data-dcnode-id="1242"><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Immigration Act 2014, s38.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="10." data-dcnode-id="1237" id="Fn10"><div class="c-article-footnote--listed__content" data-dcnode-id="1238"><p data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">National Health Service (Charges to Overseas Visitors) Regulations 2015, as amended.</span></p></div></li></ol></div></div></section><div data-dcnode-id="867" id="
