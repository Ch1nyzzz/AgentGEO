</span><header class="entry-header" data-dcnode-id="1059"><span data-dcnode-id="1085" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1082"><a data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2021/02/08/take-action-in-solidarity-with-migrant-workers-at-cervini-greenhouse/" rel="bookmark"><span data-dcnode-id="1084" instrument_node="">Take action in solidarity with migrant workers at Cervini greenhouse</span></a></h1><span data-dcnode-id="1081" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1062"><span data-dcnode-id="1080" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1076"><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2021/02/08/take-action-in-solidarity-with-migrant-workers-at-cervini-greenhouse/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1078" datetime="2021-02-08T15:49:56-05:00"><span data-dcnode-id="1079" instrument_node="">February 8, 2021</span></time></a></span><span class="byline" data-dcnode-id="1070"><span class="sep" data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node=""> / </span></span><span class="author vcard" data-dcnode-id="1071"><a class="url fn n" data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/author/harvestingfreedom/"><span data-dcnode-id="1073" instrument_node="">harvestingfreedom</span></a></span></span><span data-dcnode-id="1069" instrument_node=""> </span><span class="comments-link" data-dcnode-id="1064"><span class="sep" data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node=""> / </span></span><a data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2021/02/08/take-action-in-solidarity-with-migrant-workers-at-cervini-greenhouse/%23comments"><span data-dcnode-id="1066" instrument_node="">1 Comment</span></a></span><span data-dcnode-id="1063" instrument_node="">
</span></div><span data-dcnode-id="1060" instrument_node="">
</span></header><span data-dcnode-id="1057" instrument_node="">
</span><div class="entry-content" data-dcnode-id="987"><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1051"><em data-dcnode-id="1052"><span data-dcnode-id="1055" instrument_node="">Please read the following letter from migrant agricultural workers at Cervini in Leamington, Ontario. They have given us permission to share their letter and would greatly appreciate your support; please scroll down for ways to </span><strong data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">take action in solidarity through a phone call or tweet.</span></strong></em></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">We are workers at Cervini greenhouse, writing this complaint on behalf of all migrant workers — St. Lucians, Jamaicans, Guatemalans and Mexicans. Every year we take a risk leaving our loved ones to be on the farm program, being ignorant with no knowledge about what we will sign on contract and our rights. Which makes the employer to take big advantages on us.</span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Last year, management started using LIME STONE in the greenhouse, which affected many workers, some of their eyes burning, throat burning, rashes on skin and even chest pain. All complaints were reported to supervisor and management which they did nothing about.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">On October 24th, 2020 we strike cause we couldn’t bear the pain anymore, all guys stop working and ask the LIMESTONE to be removed which they did. As that result many guys didn’t get requested back because they stand up for their right and health.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">This year, February 3rd management spread even more LIME STONE in the greenhouse which starting to affect us beside last year complain, it only shows that the employer will use anything harmful thing and don’t care how it affecting us.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">We want the company to STOP using limestone as it is affecting our health. We want the company to listen and make changes in our interest. We demand that no workers are penalized for standing up for their rights. WE WANT RESPECT!</span></p><span data-dcnode-id="1035" instrument_node="">
</span><h1 data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Take Action In Solidarity</span></h1><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">J4MW is demanding that the company take immediate steps to protect the rights of workers employed at Cervini Farms. Please contact the names listed below and echo workers’ demands:</span></p><span data-dcnode-id="1029" instrument_node="">
</span><ol data-dcnode-id="1015"><span data-dcnode-id="1028" instrument_node="">
</span><li data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Stop using the chemical limestone or any other hazardous chemicals in the workplace;</span></li><span data-dcnode-id="1025" instrument_node="">
</span><li data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Provide information to the workers regarding all chemicals and pesticides used in the workplace, including the provision of WHMIS. Listen to the demands of the workers and meet with the workers as a group so that changes are undertaken to protect their health from occupational hazards;</span></li><span data-dcnode-id="1022" instrument_node="">
</span><li data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Ensure no workers face reprisals for standing up for respect;</span></li><span data-dcnode-id="1019" instrument_node="">
</span><li data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">RESPECT the people who put food on our table.</span></li><span data-dcnode-id="1016" instrument_node="">
</span></ol><span data-dcnode-id="1014" instrument_node="">
</span><h2 data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">PHONE</span></h2><span data-dcnode-id="1011" instrument_node="">
</span><ol data-dcnode-id="1000"><span data-dcnode-id="1010" instrument_node="">
</span><li data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Chris Cervini 519-322-1959 President and CEO of Cervini and Lakeside Produce</span></li><span data-dcnode-id="1007" instrument_node="">
</span><li data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Sudeshna Nambiar, Chief Operating Officer Lakeside Produce 519-999-4403</span></li><span data-dcnode-id="1004" instrument_node="">
</span><li data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Monte McNaughton, Ontario Minister of Labour 416-326-7600</span></li><span data-dcnode-id="1001" instrument_node="">
</span></ol><span data-dcnode-id="999" instrument_node="">
</span><h2 data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">TWEET</span></h2><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="995" instrument_node="">You can tweet Cervini/Lakeside Produce and Minister McNaughton: </span><em data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">@lakesidepro @montemcnaughton Farmworkers are demanding respect from bosses and ending the use of limestone now!&nbsp; I stand in solidarity with agricultural workers calling for fairness and #racialjustice. #nomorerottentomatoes&nbsp; </span></em></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">When you have taken action, email us at j4mw.on@gmail.com for additional ways to show solidarity.</span></p><span data-dcnode-id="988" instrument_node="">
</span></div><span data-dcnode-id="985" instrument_node="">
</span></article><span data-dcnode-id="982" instrument_node="">
</span><article class="post-2065 post type-post status-publish format-standard hentry category-uncategorized" data-dcnode-id="796" id="post-2065"><span data-dcnode-id="981" instrument_node="">
</span><header class="entry-header" data-dcnode-id="954"><span data-dcnode-id="980" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="977"><a data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2020/12/18/workers-speak-out-for-international-migrants-day-open-letter/" rel="bookmark"><span data-dcnode-id="979" instrument_node="">Workers speak out for International Migrants Day: open letter</span></a></h1><span data-dcnode-id="976" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="957"><span data-dcnode-id="975" instrument_node="">
</span><span class="posted-on" data-dcnode-id="971"><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2020/12/18/workers-speak-out-for-international-migrants-day-open-letter/" rel="bookmark"><time class="entry-date published" data-dcnode-id="973" datetime="2020-12-18T17:30:32-05:00"><span data-dcnode-id="974" instrument_node="">December 18, 2020</span></time></a></span><span class="byline" data-dcnode-id="965"><span class="sep" data-dcnode-id="969"><span data-dcnode-id="970" instrument_node=""> / </span></span><span class="author vcard" data-dcnode-id="966"><a class="url fn n" data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/author/harvestingfreedom/"><span data-dcnode-id="968" instrument_node="">harvestingfreedom</span></a></span></span><span data-dcnode-id="964" instrument_node=""> </span><span class="comments-link" data-dcnode-id="959"><span class="sep" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node=""> / </span></span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2020/12/18/workers-speak-out-for-international-migrants-day-open-letter/%23comments"><span data-dcnode-id="961" instrument_node="">2 Comments</span></a></span><span data-dcnode-id="958" instrument_node="">
</span></div><span data-dcnode-id="955" instrument_node="">
</span></header><span data-dcnode-id="952" instrument_node="">
</span><div class="entry-content" data-dcnode-id="799"><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">The below letter is compiled from workers at farms where there are ongoing COVID outbreaks, and includes the workers’ own words in a second short letter.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="945"><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">TO:&nbsp;&nbsp;&nbsp;&nbsp; Cabinet Committee on COVID-19&nbsp;</span></strong></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="943" instrument_node="">The Right Hon. Justin Trudeau, Prime Minister</span><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node="">
The Hon. Chrystia Freeland, Deputy Prime Minister, and Committee Chair</span><br data-dcnode-id="940"><span data-dcnode-id="939" instrument_node="">
The Hon. Jean-Yves Duclos, President of the Treasury Board, and Committee Vice-chair</span><br data-dcnode-id="938"><span data-dcnode-id="937" instrument_node="">
The Hon. Navdeep Bains, Minister of Innovation, Science and Industry</span><br data-dcnode-id="936"><span data-dcnode-id="935" instrument_node="">
The Hon. Bill Morneau, Minister of Finance</span><br data-dcnode-id="934"><span data-dcnode-id="933" instrument_node="">
The Hon. Melanie Joly, Minister of Economic Development and Official Languages</span><br data-dcnode-id="932"><span data-dcnode-id="931" instrument_node="">
The Hon. Carla Qualtrough, Minister of Employment, Workforce Development and Disability Inclusion</span><br data-dcnode-id="930"><span data-dcnode-id="929" instrument_node="">
The Hon. Patty Hajdu, Minister of Health</span><br data-dcnode-id="928"><span data-dcnode-id="927" instrument_node="">
The Hon. Bill Blair, Minister of Public Safety and Emergency Preparedness</span><br data-dcnode-id="926"><span data-dcnode-id="925" instrument_node="">
The Hon. Kirsty Duncan, Deputy Leader of the Government in the House of Commons</span></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="920"><strong data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Ontario Command Table COVID-19</span></strong></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="918" instrument_node="">The Hon. Doug Ford, Premier of Ontario</span><br data-dcnode-id="917"><span data-dcnode-id="916" instrument_node="">
The Hon. Christine Elliott, Minister of Health</span><br data-dcnode-id="915"><span data-dcnode-id="914" instrument_node="">
The Hon. Merrilee Fullerton, Minister of Long-Term Care</span><br data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">
The Hon. Monte McNaughton, Minister of Labour, Training and Skills Development</span><br data-dcnode-id="911"><span data-dcnode-id="910" instrument_node="">
Helen Angus, Deputy Minister of Health, and Chair of the Command Table</span><br data-dcnode-id="909"><span data-dcnode-id="908" instrument_node="">
Dr. David Williams, Chief Medical Officer of Health, Public Health Ontario</span><br data-dcnode-id="907"><span data-dcnode-id="906" instrument_node="">
Dr. Peter Donnelly, President &amp; CEO</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="901"><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">RE: OUTBREAKS AT ONTARIO FARMS AND WORKERS’ RESPONSES</span></strong></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Today, on International Migrants’ Day, it angers us to report that there are multiple COVID-19 outbreaks at farms across Ontario. Some of these farms have had multiple outbreaks since the start of this pandemic. Since we last wrote in support of migrant farmworkers, who numbered in the thousands during the first wave, the province and federal governments have taken little to no action. Their only actions to date have been to provide funds to the employers, who we have repeatedly stated are not doing enough to protect their workers.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">The following letter provides an overview of workers’ concerns. They have decided to speak about the conditions they are still made to work under, or quarantined within, because neither their employers nor provincial nor federal officials have taken this pandemic seriously enough. We have anonymized their names and their employers to protect workers’ safety.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">All the workers we spoke to have stated that there are many cases of COVID at their workplace. Yet, their employers have either refused to disclose this information, or they have taken steps to protect themselves (through quarantine), while forcing their workers to continue reporting for work. One worker stated that their employer has known about outbreaks in their workplace for months, and yet only informed workers about the newest outbreak this month. Another worker only learned of COVID-positive cases in their workplace from other workers who tested positive. Some workers do not know their COVID status because their employers have not allowed them to get tested if they are not showing symptoms, or else have tested them and have not informed them of their own test results. Many workers are working without knowing whether they are COVID positive.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Multiple workers spoke of a lack of appropriate COVID-19 protocols, both in their workplaces and in the shared accommodations provided to them by their employers. Some worked with appropriate social distancing, but others had no such protections and worked in close contact with co-workers who later tested positive for COVID. At their bunkhouses, multiple people share bedrooms, kitchens, and bathrooms. Some report dozens of people using common spaces without appropriate sanitation.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Workplace protections must go beyond providing PPE, as employers are still not taking appropriate measures to sanitize workplaces, and are placing the onus on workers to take responsibility for COVID outbreaks, rather than addressing systemic workplace issues. This has created a stressful and toxic working environment, where workers are concerned for their health, and for their jobs if they are believed to violate workplace policies.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">One worker reported that they were given a warning when they refused to rewear dirty masks. Other farm employers provided almost nothing at the beginning of the pandemic, forcing workers to rely on their own funds for appropriate PPE. The disinfection processes used at some greenhouses are not safe to work within, and yet a worker stated that they were made to return to freshly sprayed greenhouses and breathe unsafe air.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">In the midst of COVID concerns, workers continue to deal with long-standing health and safety issues. They work long hours with few breaks, including bathroom breaks, and receive warnings if they take time off for their own health and in light of the exhausting, thankless work they do. They are told to work with chemicals they are not properly protected to use, and for long periods that are hazardous to their health – they report having skin irritation and respiratory problems, among other issues. When they inform their employers about these issues, their concerns are dismissed, or worse – they face reprisal.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">The workers who spoke to us understand that their employers care more about profits than they do about the health and safety of their workers. While their employers get tested, stay quarantined, and deny COVID outbreaks to Ministry of Labour investigators, workers are told to report to work – in the conditions we illustrated above.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">The workers want Canadians to know how they are being treated. Migrant farmworkers come to Canada on closed (tied) work permits, and work to support their families back home. They cannot change their employer except by applying for the open work permit for vulnerable workers, which creates additional institutional and bureaucratic barriers. Employers can take advantage of workers’ precarity and know that workers have little power to change their circumstances.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Workers have stated that this is slavery. They know that if they speak up about their treatment, they can easily be terminated and can be blacklisted from Canada’s agricultural worker programs, so they can never return to Canada for work. Some have reported that workers who have engaged in work stoppages to protest their treatment do not know whether they will be called back for the next season, now that they have been sent home.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Collectively, the workers demand the following:</span></p><span data-dcnode-id="867" instrument_node="">
</span><ul data-dcnode-id="841"><span data-dcnode-id="866" instrument_node="">
</span><li data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">That the government shuts down farms where there are COVID outbreaks;</span></li><span data-dcnode-id="863" instrument_node="">
</span><li data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">That workers are quarantined and paid during this time, whether or not they test positive for COVID;</span></li><span data-dcnode-id="860" instrument_node="">
</span><li data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">The provision of paid sick days;</span></li><span data-dcnode-id="857" instrument_node="">
</span><li data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">That social distancing and disinfection protocols are implemented at workplaces and in bunkhouses to reduce the risk of transmission;</span></li><span data-dcnode-id="854" instrument_node="">
</span><li data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">That employers are honest and open about COVID-19 outbreaks and workers’ COVID statuses;</span></li><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">That consular officials advocate for worker safety and protection;</span></li><span data-dcnode-id="848" instrument_node="">
</span><li data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">That there are proactive inspections and changes to workplace laws that protect workers;</span></li><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">That migrant workers in the Temporary Foreign Worker Program are provided with open work permits and permanent status on arrival.</span></li><span data-dcnode-id="842" instrument_node="">
</span></ul><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Migrant farmworkers want fair treatment and respect, which they deserve as human beings. This letter is to alert you, once again, to their concerns, which are anonymized to protect their safety. We urge you to take immediate action in protecting them, and to hold their employers accountable so that the responsibility for curbing the spread of the pandemic does not fall on workers, who have been made vulnerable by the system that brought them to Canada.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Sincerely,</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Justicia/Justice for Migrant Workers</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="828"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">RE: OPEN LETTER FROM MIGRANT WORKERS IMPACTED BY COVID OUTBREAKS</span></strong></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">We are workers from farms where there are current covid outbreaks. We want to express what we felt during this time of pandemic.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">What we only want is fair treatment from our employer, manager and all the persons in charge.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">As of now, we are waiting for word from them to inform us about what is happening to our farm. We learned that some of our co-workers are positive for the Coronavirus. That information came from those people who tested positive. While the office is still denying that fact. What they want from us workers is to continue working as long as we don’t have symptoms. They are only thinking of the company’s income and forget about the workers safety and welfare.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Same as PR and Canadian citizens, we are humans too that are prone to the virus. We are expecting them to come and disinfect the place where the positive&nbsp; workers stay while they are working here, but no action at all.</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">They told us to work if no symptoms and if we want to make sure, we can do swab testing but no pay at all if it turns out negative.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">We are addressing these concerns to the people who are willing to help and hope the government would consider us Migrant Workers too, that what we want is respect from you people. Just for humanitarian consideration, we came here to work for our family back home and to earn a living.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Not considering the abuse they are doing during work. Hope the government comes and asks us&nbsp; workers about our situation. We want to cry out for help but there is this fear that if we talk, our employer will kick us out from the company, considering that we have closed permits. Without status is a big problem for us MIGRANT WORKERS.</span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">We are the people who are greatly affected from this pandemic. And hoping this will reach the government.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Thank you.</span></p><span data-dcnode-id="800" instrument_node="">
</span></div><span data-dcnode-id="797" instrument_node="">
</span></article><span data-dcnode-id="794" instrument_node="">
</span><article class="post-2046 post type-post status-publish format-standard hentry category-uncategorized tag-ahmed-hussen tag-carla-qualtrough tag-marco-mendicino tag-sawp tag-trinidad-and-tobago" data-dcnode-id="646" id="post-2046"><span data-dcnode-id="793" instrument_node="">
</span><header class="entry-header" data-dcnode-id="764"><span data-dcnode-id="792" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="789"><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2020/12/09/action-send-a-letter-to-ministers-trinidadian-workers-need-government-support-benefits-now/" rel="bookmark"><span data-dcnode-id="791" instrument_node="">ACTION: Send a letter to Ministers – Trinidadian workers need government support benefits now!</span></a></h1><span data-dcnode-id="788" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="767"><span data-dcnode-id="787" instrument_node="">
</span><span class="posted-on" data-dcnode-id="781"><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2020/12/09/action-send-a-letter-to-ministers-trinidadian-workers-need-government-support-benefits-now/" rel="bookmark"><time class="entry-date published" data-dcnode-id="785" datetime="2020-12-09T17:53:06-05:00"><span data-dcnode-id="786" instrument_node="">December 9, 2020</span></time><time class="updated" data-dcnode-id="783" datetime="2020-12-10T00:06:18-05:00"><span data-dcnode-id="784" instrument_node="">December 10, 2020</span></time></a></span><span class="byline" data-dcnode-id="775"><span class="sep" data-dcnode-id="779"><span data-dcnode-id="780" instrument_node=""> / </span></span><span class="author vcard" data-dcnode-id="776"><a class="url fn n" data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/author/harvestingfreedom/"><span data-dcnode-id="778" instrument_node="">harvestingfreedom</span></a></span></span><span data-dcnode-id="774" instrument_node=""> </span><span class="comments-link" data-dcnode-id="769"><span class="sep" data-dcnode-id="772"><span data-dcnode-id="773" instrument_node=""> / </span></span><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2020/12/09/action-send-a-letter-to-ministers-trinidadian-workers-need-government-support-benefits-now/%23comments"><span data-dcnode-id="771" instrument_node="">3 Comments</span></a></span><span data-dcnode-id="768" instrument_node="">
</span></div><span data-dcnode-id="765" instrument_node="">
</span></header><span data-dcnode-id="762" instrument_node="">
</span><div class="entry-content" data-dcnode-id="649"><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="760" instrument_node="">As reported by the </span><span data-dcnode-id="757" style="color: #0000ff;"><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thestar.com/news/canada/2020/12/09/we-dont-have-winter-clothes-or-boots-these-migrant-farm-workers-toiled-through-the-pandemic-now-theyre-stuck-in-canada.html" rel="noopener" style="color: #0000ff;" target="_blank"><span data-dcnode-id="759" instrument_node="">Toronto Star today</span></a></span><span data-dcnode-id="756" instrument_node="">, right now, hundreds of migrant farm workers from Trinidad and Tobago are stranded in Canada.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Their contracts have now come to an end as their services are no longer needed in winter. These workers are unable to go back home to their families because of travel restrictions by their sending country. They are stuck here in the Canadian cold with no form of income support and no assistance of any kind from the Trudeau government. These workers are being forced to spend precious holiday time far away from their families, with no income, no shelter, no winter clothing.</span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="746"><strong data-dcnode-id="747"><span data-dcnode-id="750" instrument_node="">Please join us in calling on Ministers to take action NOW.</span><br data-dcnode-id="749"><span data-dcnode-id="748" instrument_node="">
</span></strong></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">The following email template makes it easy — just enter your contact info and click “send”!</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">&nbsp;</span></p><span data-dcnode-id="739" instrument_node="">

</span><header class="entry-header" data-dcnode-id="614"><span data-dcnode-id="642" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="639"><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2020/12/08/over-100-migrant-farm-workers-from-trinidad-tobago-are-stuck-in-canada-when-will-the-federal-government-step-up/" rel="bookmark"><span data-dcnode-id="641" instrument_node="">Over 100 migrant farm workers from Trinidad &amp; Tobago are stuck in Canada. When will the federal government step up?</span></a></h1><span data-dcnode-id="638" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="617"><span data-dcnode-id="637" instrument_node="">
</span><span class="posted-on" data-dcnode-id="631"><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2020/12/08/over-100-migrant-farm-workers-from-trinidad-tobago-are-stuck-in-canada-when-will-the-federal-government-step-up/" rel="bookmark"><time class="entry-date published" data-dcnode-id="635" datetime="2020-12-08T06:00:59-05:00"><span data-dcnode-id="636" instrument_node="">December 8, 2020</span></time><time class="updated" data-dcnode-id="633" datetime="2020-12-08T01:28:25-05:00"><span data-dcnode-id="634" instrument_node="">December 8, 2020</span></time></a></span><span class="byline" data-dcnode-id="625"><span class="sep" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node=""> / </span></span><span class="author vcard" data-dcnode-id="626"><a class="url fn n" data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/author/harvestingfreedom/"><span data-dcnode-id="628" instrument_node="">harvestingfreedom</span></a></span></span><span data-dcnode-id="624" instrument_node=""> </span><span class="comments-link" data-dcnode-id="619"><span class="sep" data-dcnode-id="622"><span data-dcnode-id="623" instrument_node=""> / </span></span><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2020/12/08/over-100-migrant-farm-workers-from-trinidad-tobago-are-stuck-in-canada-when-will-the-federal-government-step-up/%23respond"><span data-dcnode-id="621" instrument_node="">Leave a comment</span></a></span><span data-dcnode-id="618" instrument_node="">
</span></div><span data-dcnode-id="615" instrument_node="">
</span></header><span data-dcnode-id="612" instrument_node="">
</span><div class="entry-content" data-dcnode-id="401"><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="610" instrument_node="">As </span><span data-dcnode-id="607" style="color: #0000ff;"><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/news/canada/hamilton/trinidad-tobago-migrant-workers-covid-1.5821986" rel="noopener noreferrer" style="color: #0000ff;" target="_blank"><span data-dcnode-id="609" instrument_node="">reported by the CBC</span></a></span><span data-dcnode-id="606" instrument_node="">, more than 100 migrant agricultural workers from Trinidad and Tobago have been stuck in Canada and can’t get home because of COVID-19 concerns. They now have to endure the Canadian winter with no access to any kind of income support. Justicia for Migrant Workers sent the following letter to hold decision-makers accountable. We invite you to do the same — feel free to adapt our letter and use the email addresses below.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">***</span></p><span data-dcnode-id="601" instrument_node="">
</span><h2 data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Open Letter re: Stranded Migrant Workers from Trinidad and Tobago</span></h2><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="591"><strong data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">TO:&nbsp;&nbsp;&nbsp;&nbsp; </span></strong><span data-dcnode-id="595" instrument_node="">The Honourable Ahmed Hussen, Minister of Families, Children and Social Development (</span><a data-dcnode-id="593" href="mailto:Ahmed.Hussen@parl.gc.ca"><span data-dcnode-id="594" instrument_node="">Ahmed.Hussen@parl.gc.ca</span></a><span data-dcnode-id="592" instrument_node="">)</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="589" instrument_node="">The Honourable Marco Mendicino, Minister of Immigration, Refugees &amp; Citizenship (</span><a data-dcnode-id="587" href="mailto:Marco.Mendicino@parl.gc.ca"><span data-dcnode-id="588" instrument_node="">Marco.Mendicino@parl.gc.ca)</span></a></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="584" instrument_node="">The Honourable Carla Qualtrough, Minister of Employment, Workforce Development and Disability Inclusion (</span><a data-dcnode-id="582" href="mailto:Carla.Qualtrough@parl.gc.ca"><span data-dcnode-id="583" instrument_node="">Carla.Qualtrough@parl.gc.ca</span></a><span data-dcnode-id="581" instrument_node="">)</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577" style="text-align: right;"><span data-dcnode-id="578" instrument_node="">December 7, 2020</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Dear Honourable Ministers Hussen, Mendicino, and Qualtrough,</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">In March 2020, when the pandemic hit the world, your government deemed foreign seasonal farm workers to be essential and took exceptional steps in getting the workers into Canada from the Caribbean and Mexico. You then made them work under hazardous conditions with minimal support, all to ensure that Canadian farmers could make profits and so Canada gets local food on the table. Now, when they are no longer needed by the farmers because of the weather, you have abandoned these racialized migrant farm workers.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Hundreds of workers from Trinidad and Tobago have toiled through the harvest this year through the Seasonal Agricultural Work Program (SAWP). Their contracts have now come to an end as their services are no longer needed in winter. These workers are unable to go back home to their families because of COVID concerns. They are stuck here in the Canadian cold with no form of income support and no assistance of any kind from your government. They have to pay for rent, for food, for clothing and all basic necessities with no income.</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="566" instrument_node="">Their situation is particularly unconscionable because these workers are eligible for Employment Insurance as per the regulations, which they have paid into during their service for your country, and yet Service Canada refused to use their discretion in granting them the benefits (</span><em data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Phone call meeting between J4MW and Service Canada </span></em><span data-dcnode-id="563" instrument_node="">December 4, 2020</span><em data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">)</span></em><span data-dcnode-id="560" instrument_node="">.</span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Service Canada went so far to advise that the workers should pay the fees for their work permits, even though, as per IRCC directives for seasonal farm workers and the interstate bilateral agreements, it is the employer that pays for the work permit. At the same time, migrant workers who do hold a valid work permit and have already submitted their applications for EI have received negative decisions from Service Canada, stating that because they hold a closed work permit, “they are not ready and available for work”.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="554" instrument_node="">In </span><em data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">De Jesus v. Canada (AG)</span></em><span data-dcnode-id="551" instrument_node=""> 2013 FCA 264, a case that dealt with parental EI benefits, the Federal Court of Appeal stated:</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="548" instrument_node="">[13] </span><strong data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">The unique disadvantages in the Canadian labour market of agricultural workers as a whole, and migrant workers in particular, are well known.</span></strong><span data-dcnode-id="545" instrument_node=""> These disadvantages commonly include: ineligibility for many social benefits, including most unemployment insurance benefits; exclusion from many statutory protections of workers (including representation by a union); low educational level, functional illiteracy, and lack of knowledge of English or French; social isolation, and lack of access to telephones, computers, and urban centres; long and arduous working schedules with little free time; and fear of employer reprisal and deportation</span></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="542" instrument_node="">[14] Like other employees, SAWP workers have employment insurance contributions deducted from their pay cheques. Unlike most other employees, however, they are generally ineligible for benefits, including regular employment insurance benefits, </span><strong data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">because they leave Canada at the end of their seasonal employment, and cease to be available for work or present in Canada</span></strong><span data-dcnode-id="539" instrument_node="">. [</span><em data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">emphasis added]</span></em></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="534" instrument_node="">The SAWP workers are </span><em data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">currently present in Canada</span></em><span data-dcnode-id="531" instrument_node=""> and are therefore eligible for regular benefits as per the reasoning of the Federal Court of Appeal. &nbsp;Yet, Service Canada refuses to grant them EI benefits by foisting the blame on IRCC/ESDC.</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Furthermore, the Principles of Benefit Entitlement clearly states that</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="525" instrument_node="">[A] claimant who does not currently possess a work permit </span><strong data-dcnode-id="522"><u data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">is not automatically considered unavailable for work</span></u></strong><span data-dcnode-id="521" instrument_node="">. In some cases, the claimant may be able to obtain a work permit as soon as employment is secured, because of the type of work they perform, or because of the individual’s skills. Consequently, the lack of a work permit is not the only factor to be considered when determining availability. </span><em data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">The Commission must take into account all factors normally considered when determining a claimant’s availability</span></em><span data-dcnode-id="518" instrument_node="">.</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">[Digest of Benefit Entitlement Principles Chapter 10 – Section 10.2.4]</span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="512" instrument_node="">In many cases, the Tribunal has found that if the worker has taken “prompt and reasonable steps” to search for work and obtain employment, especially under circumstances beyond their control, they are eligible for EI even if their work permit has expired (See e.g. </span><em data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">O. O. v Canada Employment Insurance Commission</span></em><span data-dcnode-id="509" instrument_node="">, 2019 SST 868; </span><em data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Canada Employment Insurance Commission</span></em><span data-dcnode-id="506" instrument_node="">&nbsp; v. </span><em data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">L.B.</span></em><span data-dcnode-id="503" instrument_node="">, AD-13-1140).</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="500" instrument_node="">Service Canada’s fettering of their discretion, in the face of precedent and their own principle, is a grave injustice and a perversion of the rule of law. These Trinidadian workers have gone above and beyond in taking “prompt and reasonable steps” to obtain status in Canada, even under the most extenuating circumstances beyond their control, and in fact beyond the control of the entire world as the battle against the pandemic continues. They are stuck in Canada because they are</span><em data-dcnode-id="498"><span data-dcnode-id="499" instrument_node=""> being prevented </span></em><span data-dcnode-id="497" instrument_node="">from traveling due to the pandemic.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="494" instrument_node="">In their desperate situation, they have pressured their government to send directives to their employers to process their LMIAs (which allows them to get a work permit) and to ask ESDC and IRCC to process them at the earliest (</span><em data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Notice from the Government of Trinidad and Tobago to employers</span></em><span data-dcnode-id="491" instrument_node="">, December 1, 2020). They have tried to find employers who can process their LMIAs. They have sought support for accessing benefits. As such, they have done everything humanly possible in this unforeseeable situation to show they are searching for work and are available for work. They are being made to endure circumstances that simply should not be tolerated in Canada. It is unconscionable that Service Canada is not responding to the situation and providing them with prompt benefits.</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="488" instrument_node="">The Tax Court of Canada, in a case concerning Guatemalan workers in the agri-food industry, has held that the employment contracts of foreign workers are valid and the workers are eligible for employment insurance </span><em data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">even if they do not comply with the work permit</span></em><span data-dcnode-id="485" instrument_node=""> (</span><em data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Godoy </span></em><span data-dcnode-id="482" instrument_node="">Enriquez v. M.N.R., 2019 TCC 114).&nbsp; The Court found that “the prohibition on work by foreign nationals without a permit is intended primarily to protect job opportunities for Canadian citizens and to prevent collective bargaining from being obstructed by the hiring of foreign nationals.” [(para 85)]. The Court stated that as per Canada’s obligation under international instruments, such as the </span><em data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">International Covenant on Economic, Social and Cultural Rights</span></em><span data-dcnode-id="479" instrument_node="">, Canada has an obligation to protect the rights of workers to social security, including employment insurance (paras 91-93). Thus, according to the Court’s reasoning, the interpretation of IRPA, taking into account its objectives and principles, mandates that workers cannot be denied their right to EI and other benefits.</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="476" instrument_node="">The Court further affirms that migrant farm workers “are a beneficial and critical human resource for both the economy and the greater good of all Canadians” (para 95), “an enrichment, and even a fundamental necessity to the stability and development of Canada’s agri‑food industry” (112) and that it is “a matter of general interest for Canadian society” that their important contribution to the Canadian economy be recognized and it is “</span><em data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">unacceptable</span></em><span data-dcnode-id="473" instrument_node="">” to exclude them and abandon seasonal workers (paras 95, 14 emphasis added). The Court asserted that “it is </span><em data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">urgent and imperative</span></em><span data-dcnode-id="470" instrument_node=""> that the government… respond to seasonal workers’ problems and concerns before they arrive, upon their arrival and throughout their time in Canada” (para 14 emphasis added).&nbsp; It is therefore appalling that Service Canada has instead abandoned them in the midst of a pandemic and the onset of winter.</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="467" instrument_node="">Honourable Minister Hussen, you personally have strongly come out against Anti-Black racism and systemic racism within Canada’s borders. You said: “… the sooner we acknowledge [systemic racism], the sooner we amplify the voices of those who feel that sting of discrimination of racism as part of their lived reality, the sooner we’ll be able to tackle it and to eradicate it [</span><em data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Toronto Star,</span></em><span data-dcnode-id="464" instrument_node=""> June 3rd 2020].” Yet, the very Ministry you lead, practices and embeds systemic racism against Black and racialized migrant workers, by discriminating against them and denying them the benefits they are entitled to, that they have paid into, during their time doing essential farm labour in Canada. We urge you to acknowledge the discrimination they face.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="461" instrument_node="">Honourable Ministers, the workers cannot wait anymore, insecure and without income, as you play jurisdictional football with them. </span><strong data-dcnode-id="458"><u data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">We demand that you make the decision to pay the workers who are currently in Canada Employment Insurance benefits before December 10th.</span></u></strong><span data-dcnode-id="457" instrument_node=""> Any further delay is an abuse of process, abuse of discretion, and denial of natural justice.</span></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="454" instrument_node="">Honourable Ministers Qualtrough and Mendicino, you have made the workers wholly reliant on their employers by making the work permit conditional on LMIAs. You have not even exempted the work permit processing fees. These workers are being forced to spend precious holiday time in Canada far away from their families, in the Canadian winter, with no income, no shelter, no clothing.&nbsp; Instead of showing gratitude and compassion you have made the situation into a travesty where in their time of need, the workers are put in a worse situation of oppression and disempowerment. How are you even justifying your action? </span><strong data-dcnode-id="448"><u data-dcnode-id="449"><span data-dcnode-id="453" instrument_node="">We demand that the stranded workers be immediately given </span><em data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">open</span></em><span data-dcnode-id="450" instrument_node=""> work permits,&nbsp; with no conditions of requiring LMIAs to work in Canada and with no repercussions or administrative hurdles that would affect their future return to Canada.&nbsp; We demand that the permit fees be waived for these workers. We also demand that they be given permanent residence status.</span></u></strong></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">This incident concerning the Trinidadian workers cannot be seen as an isolated, unfortunate event; it is the outcome of a system of discrimination and oppression that is perpetuated by Canada’s Temporary Foreign Worker programs in agriculture.&nbsp; Migrant agricultural workers are crucial to the functioning of the agricultural industry functioning. Many of these workers have been returning to work at the same farm each year, for many years. It is estimated that SAWP workers pay an estimated $21.5 million annually in EI premiums and have paid billions of dollars into EI since 1966, which have supported Canadian workers for decades, even as your Ministries exclude them from ever availing of the benefit through the application of discriminatory and racist regulations. The people who grow our fruits and vegetables, the people who put food on our tables, should not face perpetual impoverishment because of an unpredictable climate, and even more so, during a pandemic. We cannot simply ignore their calls for justice. Do you find it easier to do so because they are “racialized foreign migrant workers” who the government has wilfully invisibilized?</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">The legacy of colonialism continues to drive thousands of migrants to Canada in search of work, who your government takes advantage of, thus perpetuating colonialism and racism. In fact, just last week, the Federal Government has increased the program by expanding the definition of Primary Agriculture. This expanded definition implies that you will be excluding greater numbers of racialized migrant farm workers from basic employment standards and benefits, even as they contribute billions of dollars to the economy and revenue. This racial apartheid cannot continue.</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="437"><strong data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">We therefore call on the government to: </span></strong></p><span data-dcnode-id="436" instrument_node="">
</span><ol data-dcnode-id="407"><span data-dcnode-id="435" instrument_node="">
</span><li data-dcnode-id="430"><span data-dcnode-id="434" instrument_node="">Reverse </span><em data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">all</span></em><span data-dcnode-id="431" instrument_node=""> decisions denying regular EI benefits to migrant farm workers, that were made on the basis that they were unavailable to work because of their work permit status. Award benefits to all workers who have applied immediately;</span></li><span data-dcnode-id="429" instrument_node="">
</span><li data-dcnode-id="424"><span data-dcnode-id="428" instrument_node="">Remove the conditions predicating access to regular EI benefits on their work permit </span><em data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">and</span></em><span data-dcnode-id="425" instrument_node=""> their physically being in Canada. Provide equal access to the regular employment insurance benefits for migrant workers, after they go back to their countries, through the development of interstate agreements between the governments of Canada and the countries from which migrant workers originate. This access can be modelled on similar agreements that already exist with the United States and inter-state agreements globally;</span></li><span data-dcnode-id="423" instrument_node="">
</span><li data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Restore migrant workers’ access to special EI entitlements including parental, maternity and compassionate benefits;</span></li><span data-dcnode-id="420" instrument_node="">
</span><li data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Provide migrant workers with access to training and education and all social and income benefits in Canada and when they are back in their home countries;</span></li><span data-dcnode-id="417" instrument_node="">
</span><li data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Waive all fees for applications for work permits for farm work.</span></li><span data-dcnode-id="414" instrument_node="">
</span><li data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Provide all workers arriving in Canada under SAWP or the Agricultural Streams with open work permits that are not dependent on LMIAs.</span></li><span data-dcnode-id="411" instrument_node="">
</span><li data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Provide them with permanent residence status on arrival.</span></li><span data-dcnode-id="408" instrument_node="">
</span></ol><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="403"><strong data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Justicia for Migrant Workers (J4MW)</span></strong></p><span data-dcnode-id="402" instrument_node="">
</span></div><span data-dcnode-id="399" instrument_node="">
</span></article><span data-dcnode-id="396" instrument_node="">
