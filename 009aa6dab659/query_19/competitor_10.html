</span><p data-dcnode-id="1973"><strong data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Open Letter: International Day for the Elimination of Racial Discrimination</span></strong></p><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">We are a diverse grassroots group of injured migrant farm workers and allies who have been fighting for fair compensation and respect from the WSIB (Workplace &amp; Safety Insurance Board) for all workers. We want changes to the system to help, not hinder, the lives of injured workers.</span></p><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">On March 21st, the International Day for the Elimination of Racial Discrimination, we, injured migrant workers formerly employed by Canada’s temporary foreign worker program, want to bring to light the conditions that we have faced as a result of becoming injured or sick. &nbsp;We believe that the workers’ compensation system is racist and that we are treated very badly.&nbsp;This systemic racism does not treat us like we are human. There are power differences between us as workers and our bosses. The system is set up for the bosses, not for us. Our voices are not taken seriously. It is like the system believes the bosses rather than us when we are telling the impact of our injuries. We are treated like we are lying; neither our injuries nor our pain are seen as serious. Rather than let us heal, the bosses send us back to work while we are still injured and in pain. It’s like we must beg for benefits that we are entitled to.</span></p><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">We face racism because of our complexion and our status as migrants. We are considered disposable to the WSIB, the government of Canada, employers, and our liaisons. We have been verbally, physically, mentally, and emotionally abused. Rather than helping us heal, the current system makes it worse for us. We have been denied the right to function as humans in Canada. For those of us who have been repatriated, we are returning to our home countries with injuries and traumas. We pay upfront for our transportation, our healthcare, and our medicine to come to Canada, but we must beg friends and family members after we get injured in Canada when we should rightfully be getting benefits from WSIB in Canada.&nbsp;Our work injuries suffered in Canada put us in further debt. This is not fair. Many of us suffer high blood pressure, stress and anxiety because we cannot pay our bills. In many cases, we miss our medical appointments, which means we get more sick.</span></p><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">It is WSIB that is in charge, which holds the responsibility when a worker gets injured on the job in Canada. Because of the systemic racism, WSIB is failing injured migrant workers. The injured people are finding it hard to communicate with the WSIB caseworkers on the phone, even when our medical information is placed on their desks or on computers. The injured people are re-traumatized on top of what they have already been through, which leads to even more depression and frustration. There needs to be a system in place to investigate when the WSIB is not doing their job. Our lives are in misery and it’s taking a toll on our children’s education and their well being due to poverty, separation, no access to health care, mental break down, and so many more issues. Our health and safety must not be put in jeopardy. The WSIB system must change so that we receive the same protections that other Canadian nonfarm workers receive. We should not be penalized for standing up for our rights or refusing dangerous working conditions. It is not right that the laws do not protect us for the essential work we do while in Canada.</span></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">In the WSIB system, there are no rights for injured migrant workers. They are biased in the way they treat workers and also biased in the compensation injured workers get. Injured migrants cannot get to see a proper doctor nor do they have the money to pay for it. However, WSIB is giving so-called “surplus” money to employers that is should rightfully be going to injured workers and our families. This money should be returned to us so we can take care of our families. When our families are sick, we cannot take care of them, nor can we send our children to school. It is outrageous for WSIB to reward those employers rather than fix the system that has left injured workers in crisis.&nbsp;We are angry, we are in pain, and our lives have been forever changed because of our work injuries. We don’t want nice words, nor do we want pity. We want justice. We want the system to change. We want to receive the medical treatment we deserve and the benefits that make sure we are not given a death sentence. We want a system that helps us, not traumatize us further.</span></p><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">We will not be silent and we will not give up. We will continue fighting with all workers, past or present, who have been mistreated by the WSIB. We will continue to fight for our families, our children, our co-workers, and future generations of workers so that they do not suffer the same pain and suffering that we have faced. Our struggle is for all migrant workers, whatever country you are from or whatever language you speak. Our struggle is for the betterment of Canadian workers and migrant workers alike. We will not accept racial mistreatment because we are black or brown.</span></p><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">We urge both federal and provincial governments’ immediate actions to protect all workers.&nbsp; The following demands will provide immediate support and a safety net to the workers and families of workers who have been killed, injured and got sick at work:</span></p><span data-dcnode-id="1951" instrument_node="">
</span><ul data-dcnode-id="1940"><span data-dcnode-id="1950" instrument_node="">
</span><li data-dcnode-id="1942"><span data-dcnode-id="1949" instrument_node="">The </span><strong data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Canadian government</span></strong><span data-dcnode-id="1946" instrument_node=""> must provide </span><strong data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">permanent immigration status for all</span></strong><span data-dcnode-id="1943" instrument_node=""> undocumented and migrant workers, status on arrival, status when injured, and no one should be deported. The federal program recently proposed is grossly inadequate to allow more than a tiny fraction of farm workers and other essential workers to qualify. That’s not enough at all. All workers, including those injured workers must be allowed to stay and access justice and health care in Canada.</span></li><span data-dcnode-id="1941" instrument_node="">
</span></ul><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1938" instrument_node="">The </span><strong data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Ontario government</span></strong><span data-dcnode-id="1935" instrument_node="">:</span></p><span data-dcnode-id="1933" instrument_node="">
</span><ul data-dcnode-id="1898"><span data-dcnode-id="1932" instrument_node="">
</span><li data-dcnode-id="1922"><strong data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Abolish Bill 27, Schedule 6</span></strong><span data-dcnode-id="1929" instrument_node="">, </span><strong data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Working for Workers Act, 2021</span></strong><span data-dcnode-id="1926" instrument_node="">: Absolutely, this does not work for workers. Immediately return the </span><strong data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">WSIB Surplus</span></strong><span data-dcnode-id="1923" instrument_node=""> to Injured Workers, not to employers.</span></li><span data-dcnode-id="1921" instrument_node="">
</span><li data-dcnode-id="1911"><strong data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">End the WSIB practice “deeming”</span></strong><span data-dcnode-id="1918" instrument_node=""> (phantom jobs) and provide benefits when injured workers are not able to get a job or no job is available in the market, especially those </span><strong data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">undocumented and</span></strong><span data-dcnode-id="1915" instrument_node=""> </span><strong data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">migrant workers</span></strong><span data-dcnode-id="1912" instrument_node=""> who are already deported to their countries, but systemically deemed in 12 weeks without any benefits. The WSIB says they can continue working as a cashier, gas bar attendant, or a call centre worker in Ontario. This is not acceptable.</span></li><span data-dcnode-id="1910" instrument_node="">
</span><li data-dcnode-id="1906"><strong data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Real Healthcare for Injured Workers</span></strong><span data-dcnode-id="1907" instrument_node="">: Based on the “Bad Medicine” report (IAVGO,&nbsp; 2017), the WSIB payment of drug benefits decreased 35% ($33M) from $96M in 2010 to&nbsp; $63M in 2015 while the new claims entering the system are consistent during that&nbsp;period. It says, “About 18,000 injured workers per year have disappeared from the drug&nbsp;benefits program, with no viable explanation from the WSIB.” However, the WSIB’s own&nbsp;Annual Financial Reports confirmed that the benefits paid out to injured workers’ were&nbsp;cut in half from 2010 to 2015. The WSIB should provide health care injured workers&nbsp; need and fund medical treatments and medication our doctors prescribe, especially for&nbsp; those workers and migrant workers injured in precarious workplaces and repatriated to&nbsp; their countries with no medical attention.</span></li><span data-dcnode-id="1905" instrument_node="">
</span><li data-dcnode-id="1900"><span data-dcnode-id="1904" instrument_node="">Change the WSIB law to </span><strong data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">listen injured workers treating healthcare providers</span></strong><span data-dcnode-id="1901" instrument_node="">’ recommendations regarding the injured workers’ health care and health &amp; safety about time to heal and return to work instead of wasting money to the WSIB paper doctors to override injured workers’ doctors’ recommendation. Also, eliminate pre-existing conditions or age-related degeneration in the WSIB policy. Researchers and injured workers’ advocates said that these conditions had not affected worker’s ability to do the job or had shown no symptoms (were asymptomatic).</span></li><span data-dcnode-id="1899" instrument_node="">
</span></ul><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1893"><strong data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Both Federal and Ontario governments</span></strong><span data-dcnode-id="1894" instrument_node="">:</span></p><span data-dcnode-id="1892" instrument_node="">
</span><ul data-dcnode-id="1884"><span data-dcnode-id="1891" instrument_node="">
</span><li data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Work together to fully investigate all work-related deaths and health &amp; safety conditions (abuse/harassments, work injuries, bunkhouse, PPE, safety equipment), including on SAWP (Seasonal Agricultural Workers Program) and TFWP (Temporary Foreign Workers Program), also reinforce all legal requirements that employers must be responsible for unsafe work environments and held accountable for any violation of the Occupational Health and Safety Act.</span></li><span data-dcnode-id="1888" instrument_node="">
</span><li data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Provide social assistance benefits with a real living-cost increase and implement a new Canada disability income benefit for people with disabilities to sustain their life. Any social safety net should be available to everyone who needs it regardless of immigration status. Review access and data requests on EI/CPP/CPPD/WSIB/Social assistance (ODSP/OW) programs accesses for migrant workers, to determine how many workers are facing the systemic issues.</span></li><span data-dcnode-id="1885" instrument_node="">
</span></ul><span data-dcnode-id="1883" instrument_node="">
</span><p data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">We as injured migrant farm workers and communities are united and organizing together to make sure that there are implemented and followed by our representatives in both governments. We will continue working with our allies and people in the communities to help our representatives do their jobs to protect all workers during this critical time. We urge both governments’ immediate response and actions.</span></p><span data-dcnode-id="1880" instrument_node="">
</span><p data-dcnode-id="1872"><span data-dcnode-id="1879" instrument_node="">Please contact your </span><a data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ola.org/en/members"><span data-dcnode-id="1878" instrument_node="">MPP</span></a><span data-dcnode-id="1876" instrument_node=""> and </span><a data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ourcommons.ca/members/en"><span data-dcnode-id="1875" instrument_node="">MP</span></a><span data-dcnode-id="1873" instrument_node=""> (clink the hyperlink to find yours) to protect all workers. We stand in solidarity with all migrants and people of colour in the world against racism.</span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">An injury to one is an injury to all!</span></p><span data-dcnode-id="1868" instrument_node="">

</span><div data-dcnode-id="1732" dir="ltr"><span data-dcnode-id="1764" instrument_node="">For immediate distribution</span><br data-dcnode-id="1763"><span data-dcnode-id="1762" instrument_node="">
February 28, 2022</span><p data-dcnode-id="1761"></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1756"><b data-dcnode-id="1757"><i data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Final arguments to be heard in historic human rights hearing on race-based DNA canvass by the OPP</span></i></b></p><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">TORONTO – At 9:30am ET on Tuesday, March 1, 2022, the Human Rights Tribunal of Ontario (HRTO) will be hearing final arguments in a historic and potentially precedent-setting case involving 54 migrant farm workers.</span></p><span data-dcnode-id="1752" instrument_node="">
</span><p data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">In October 2013, after a sexual assault that occurred near the community of Bayham, Ontario, the OPP conducted a DNA sweep to collect samples from approximately 95 migrant farm workers employed in the region.&nbsp;The OPP conducted its investigation with what appeared to be a total disregard for the detailed suspect description that it had obtained from the victim. DNA samples were taken from Indo and Afro-Caribbean men from Jamaican and Trinidad. Their ages ranged from 22 to 68, their heights ranged from 5’2” to 6’6”, and their body sizes ranged between 110 lbs to 328 lbs. Other identifying features were also disregarded. Workers were targeted solely on the basis of their skin colour and their status as migrant farmworkers.</span></p><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">54 of the migrant farmworkers who were impacted came together to jointly file human rights applications with the Human Rights Tribunal of Ontario. Starting at 9:30am and ending at approximately 1:30pm on Tuesday, March 1st, final arguments will be heard with respect to the issue of liability and damages.&nbsp; The Applicants will reiterate that the DNA sweep and the manner in which it was conducted was racial discrimination that violated their rights under section 1 of Ontario’s Human Rights Code. If the OPP is found to have violated the Code, a further hearing will be scheduled to address non-monetary and systemic remedies to prevent a re-occurrence of this type of incident.</span></p><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">This is the first human rights case of its kind in Canada to examine allegations of systemic racial profiling and discrimination by the police towards migrant farmworkers. It is anticipated that it will expose not only the inherent vulnerabilities that workers are exposed to under the Seasonal Agricultural Worker Program, but also how those vulnerabilities were exploited by the police in their execution of the 2013 DNA sweep.</span></p><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1737"><strong data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Please show your support for workers by joining the virtual hearing.</span></strong><span data-dcnode-id="1740" instrument_node=""> Label yourself as “observer” so the tribunal knows you are not a participant): </span><a data-dcnode-id="1738" data-saferedirecturl="https://www.google.com/url?q=http://bit.ly/MigrantDNA&amp;source=gmail&amp;ust=1646195659881000&amp;usg=AOvVaw0n-WTczqbZf9jTW2wvHGTb" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bit.ly/MigrantDNA" rel="noopener" target="_blank"><span data-dcnode-id="1739" instrument_node="">http://bit.ly/MigrantDNA</span></a></p><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">For interviews and more information, please contact:</span></p><span data-dcnode-id="1733" instrument_node="">

</span><article class="post-2250 post type-post status-publish format-standard hentry category-uncategorized tag-carla-qualtrough tag-climate-justice tag-climate-racism tag-ei tag-employment-insurance tag-environmental-racism tag-flooding tag-justin-trudeau tag-marie-claude-bibeau tag-migrant-justice tag-sean-fraser" data-dcnode-id="1571" id="post-2250"><span data-dcnode-id="1709" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1682"><span data-dcnode-id="1708" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1705"><a data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2021/11/28/climate-justice-for-migrants-and-ei-our-letter-to-the-federal-government/" rel="bookmark"><span data-dcnode-id="1707" instrument_node="">Climate justice for migrants and EI: Our letter to the federal government</span></a></h1><span data-dcnode-id="1704" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1685"><span data-dcnode-id="1703" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1699"><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2021/11/28/climate-justice-for-migrants-and-ei-our-letter-to-the-federal-government/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1701" datetime="2021-11-28T00:53:09-05:00"><span data-dcnode-id="1702" instrument_node="">November 28, 2021</span></time></a></span><span class="byline" data-dcnode-id="1693"><span class="sep" data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node=""> / </span></span><span class="author vcard" data-dcnode-id="1694"><a class="url fn n" data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/author/harvestingfreedom/"><span data-dcnode-id="1696" instrument_node="">harvestingfreedom</span></a></span></span><span data-dcnode-id="1692" instrument_node=""> </span><span class="comments-link" data-dcnode-id="1687"><span class="sep" data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node=""> / </span></span><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2021/11/28/climate-justice-for-migrants-and-ei-our-letter-to-the-federal-government/%23comments"><span data-dcnode-id="1689" instrument_node="">1 Comment</span></a></span><span data-dcnode-id="1686" instrument_node="">
</span></div><span data-dcnode-id="1683" instrument_node="">
</span></header><span data-dcnode-id="1680" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1574"><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677" dir="ltr"><span data-dcnode-id="1678" instrument_node="">Dear Prime Minister Trudeau, Minister Qualtrough, Minister Bibeau, and Minister Fraser,</span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674" dir="ltr"><span data-dcnode-id="1675" instrument_node="">Justicia for Migrant Workers (J4MW)&nbsp; writes to reiterate that migrant workers must receive full and equal access to Canada’s Employment Insurance (“EI”) benefit. Since 1966, workers employed under the auspices of the Seasonal Agricultural Worker Program have contributed millions of dollars in benefits. However, as a result of their tied work permits, they have been denied access to our social safety net in their time of need.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671" dir="ltr"><span data-dcnode-id="1672" instrument_node="">We support the call for better access, improving benefit rates and a new annual federal contribution to EI. Our demands are as follows:</span></p><span data-dcnode-id="1670" instrument_node="">
</span><ol data-dcnode-id="1629"><span data-dcnode-id="1669" instrument_node="">
</span><li data-dcnode-id="1667" dir="ltr"><span data-dcnode-id="1668" instrument_node="">Permanent status on arrival</span></li><span data-dcnode-id="1666" instrument_node="">
</span><li data-dcnode-id="1664" dir="ltr"><span data-dcnode-id="1665" instrument_node="">No worker should face reprisals, repatriation, or disbarment for accessing benefits or exerting their rights.</span></li><span data-dcnode-id="1663" instrument_node="">
</span><li data-dcnode-id="1661" dir="ltr"><span data-dcnode-id="1662" instrument_node="">Expedite the EI process and ensure migrant and non-status workers are able to get benefits;</span></li><span data-dcnode-id="1660" instrument_node="">
</span><li data-dcnode-id="1658" dir="ltr"><span data-dcnode-id="1659" instrument_node="">Open permits immediately, access to training, and access to employment supports so that workers are not trapped in this situation in the future;</span></li><span data-dcnode-id="1657" instrument_node="">
</span><li data-dcnode-id="1655" dir="ltr"><span data-dcnode-id="1656" instrument_node="">Review access and data requests on EI access for migrant workers, to determine how many workers are facing the same issue;</span></li><span data-dcnode-id="1654" instrument_node="">
</span><li data-dcnode-id="1652" dir="ltr"><span data-dcnode-id="1653" instrument_node="">Treat all migrants in this situation as one workplace and implement a dedicated unit to support workers in these situations. Also, for the future, create a separate sub-department to address EI for migrant farm workers to increase accessibility through an easy streamlined process and to expedite the process;</span></li><span data-dcnode-id="1651" instrument_node="">
</span><li data-dcnode-id="1649" dir="ltr"><span data-dcnode-id="1650" instrument_node="">One of the sub-department’s duties must be consultation with migrant farm worker advocates so that the sub-department knows about and can immediately respond to crisis situations like the ones we have brought to the federal government;</span></li><span data-dcnode-id="1648" instrument_node="">
</span><li data-dcnode-id="1646" dir="ltr"><span data-dcnode-id="1647" instrument_node="">The EI system should be available with “no questions asked” so that individuals are able to access the benefits they have paid into;</span></li><span data-dcnode-id="1645" instrument_node="">
</span><li data-dcnode-id="1643" dir="ltr"><span data-dcnode-id="1644" instrument_node="">Reverse all decisions denying regular EI benefits to migrant farm workers, that were made on the basis that they were unavailable to work because of their work permit status. Award benefits to all workers who have applied immediately;</span></li><span data-dcnode-id="1642" instrument_node="">
</span><li data-dcnode-id="1640" dir="ltr"><span data-dcnode-id="1641" instrument_node="">Ensure that migrant workers are provided all entitlements under our EI system including access to paid training and education programs.</span></li><span data-dcnode-id="1639" instrument_node="">
</span><li data-dcnode-id="1637" dir="ltr"><span data-dcnode-id="1638" instrument_node="">Develop and implement a clear EI access policy that operates on the presumption that migrant agricultural workers are looking for alternate work, and makes their entitlement to EI separate from the nature of their work permits – this would enable more expedited access to EI in the future;</span></li><span data-dcnode-id="1636" instrument_node="">
</span><li data-dcnode-id="1634" dir="ltr"><span data-dcnode-id="1635" instrument_node="">Restore migrant workers’ access to special EI benefits;</span></li><span data-dcnode-id="1633" instrument_node="">
</span><li data-dcnode-id="1631" dir="ltr"><span data-dcnode-id="1632" instrument_node="">Develop a pilot project to examine the establishment of EI interstate agreements with sending countries, so that workers can receive their payments when they return home, or if they are repatriated.</span></li><span data-dcnode-id="1630" instrument_node="">
</span></ol><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1626" dir="ltr"><span data-dcnode-id="1627" instrument_node="">Since 2001, through our involvement with migrant workers, we have raised concerns regarding their contributions to EI without having access to it. In 2002, a member of J4MW advocated with a migrant worker to apply for EI parental benefits, which was successful. This first EI claim enabled thousands of workers to access these benefits to support their families.</span></p><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1623" dir="ltr"><span data-dcnode-id="1624" instrument_node="">In 2013, the federal government took the draconian and egregious step of restricting EI special benefits access to workers who possess valid work permits, thus denying thousands of workers access to benefits upon return to their home country. As you are well aware, Canadians who are overseas do not face the same restrictions as migrant workers to accessing EI special benefits.</span></p><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1620" dir="ltr"><span data-dcnode-id="1621" instrument_node="">With respect to access to regular EI benefits, migrants face multiple barriers. We have seen this with the ongoing pandemic and closure of multiple workplaces, but workers are also impacted by climate change. Pre-pandemic, agricultural migrants have been terminated and repatriated&nbsp;because of crop loss attributed to environmental or direct human factors. The current climate disaster in British Columbia is only the latest salvo in an ongoing devastating environmental disaster that has disproportionately impacted vulnerable communities.</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1617" dir="ltr"><span data-dcnode-id="1618" instrument_node="">Migrant farm workers have experienced the impact of climate change both in their home country and currently here in Canada. In 2017, for example, migrant farm workers from Dominica were stranded in Canada as a result of the devastation that was inflicted on the island from Hurricane Maria. No policies existed then or now to support this group of workers. Advocacy groups wrote to the federal government to develop immediate steps to address this failure of the government to assist in this prior crisis, but their calls for action to prevent climate racism were met with silence.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1614" dir="ltr"><span data-dcnode-id="1615" instrument_node="">This past season’s fires, extreme heat, and now flooding have created significant obstacles for the agricultural industry. While both provincial and federal governments have developed support mechanisms to assist the industry, still no steps have been taken to support the industry’s workers. It is essential that the federal government develop proactive measures not piecemeal efforts to address the long term consequences of pandemics, economic uncertainty, and climate change. Short-term relief will not address systemic policy failures. Climate and economic injustice are intertwined both for migrants here and their home countries. Current EI&nbsp;policies undermine migrants’ access to income support. These issues will only heighten as climate disasters become more frequent and severe.</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611" dir="ltr"><span data-dcnode-id="1612" instrument_node="">At the start of the COVID pandemic, J4MW requested immediate and urgent action to extend EI benefits to migrant workers who were stranded in their home country. Unemployed and unable to access their country’s own social safety net, restrictive work permits denied migrants access to benefits despite the strong labour attachment that this community has to our industry. They are praised as essential labour yet denied any benefits connected to this much heralded status. They are also described as “falling through the cracks,” as though the failure of this system can be attributed to unintended error, rather than a program designed to exploit migrant labour. This community is the backbone of our agricultural industry, and in return Canada denies them citizenship or even permanent residence status.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1608" dir="ltr"><span data-dcnode-id="1609" instrument_node="">Rather than enable workers to seek other employment or access to EI benefits, migrants are routinely sent home. Workers who are terminated or are in the process of changing their place of employment are continuously denied benefits. As opposed to other groups of workers who can access Ontario Works or other means of financial support, migrant workers are undermined by onerous restrictive immigration practices in a system where access to justice (i.e. appeals) does not exist.</span></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1605" dir="ltr"><span data-dcnode-id="1606" instrument_node="">While in Canada, EI officials routinely deny workers access to benefits. For example, during the pandemic, tobacco workers, whose crops were damaged as a result of frost, were not not able to access EI benefits. They were then left destitute because all levels of government failed to take systemic action. In 2020, when over 400 Trinidadian migrant workers were stranded, many were found ineligible for EI, and it was only after persistent advocacy that the federal government created a special one-time open work permit scheme, under which some workers were able to access benefits.</span></p><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1602" dir="ltr"><span data-dcnode-id="1603" instrument_node="">Migrants from other jurisdictions who were stranded were not able to access EI benefits. Their efforts were greatly hindered due to barriers to electronic services, inability to make contact with EI agents, and the onerous reporting system. Many workers described the levels of surveillance and outright hostility they faced. This is attributed to the false belief that as ‘foreign’ workers they are ineligible for EI benefits. Employers have also taken steps to ensure that workers can not receive benefits. Last year, we heard migrant workers from a farm near London were discouraged from applying for EI benefits. When the workers did, they faced threats of termination and reprisal for doing so. Workers at additional farms allege that their contracts were terminated, and they were denied access to EI because they married Canadians.</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599" dir="ltr"><span data-dcnode-id="1600" instrument_node="">In several cases, as workers’ status expired and they were not able to leave Canada because of border closures, they were left without income support. Community groups stepped up to the plate to provide clothing and food. Charity, however, will never address the systemic underpinnings of both a discriminatory and racist EI system coupled with an equally egregious Temporary Foreign Worker Program that is driven by the needs of employers and not in the interest of the community or workers.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596" dir="ltr"><span data-dcnode-id="1597" instrument_node="">In addition, while the current government policy centres the development of a gender lens, it is not clear that&nbsp; gender (and racialized) lens has been undertaken to examine the impact of current EI policies on racialized women migrants from the global south. In our experience, women migrants have faced additional hurdles. Migrant women have been denied access to EI sickness benefits, resulting in these migrants undertaking lengthy appeals at the Social Security Tribunal, all while they have no income. Furthermore, migrant women have articulated the unique and specific barriers they have endured during the pandemic and the impact that the denial of EI benefits has had on their well-being during the pandemic,</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1593" dir="ltr"><span data-dcnode-id="1594" instrument_node="">Unemployment Insurance and the many reforms that have been enacted are a legacy of resistance by workers. From the On to Ottawa Trek, to the thousands of protests, occupations, marches, and other advocacy initiatives that continue to preserve the system that exists today. These activists developed a vision to implement a system that would protect and shield workers from the worst aspects of job loss and economic loss on the well being of our society. EI was built to prevent shocks on the back of workers. Reforms addressed the previous failures of government unemployment policies that discriminated against women and workers in seasonal industries.</span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590" dir="ltr"><span data-dcnode-id="1591" instrument_node="">The federal government must immediately address the current crisis and ensure that EI benefits are truly accessible, portable, and universal to all agricultural workers, regardless of their immigration status. Non-status workers and temporary foreign workers cannot be heralded for their sacrifices while Canada sacrifices their well being by denying access to benefits they deserve. This is not simply a call to extend status quo policies. Immediate steps including ending tied work permits and extending EI benefits to all without restrictions are short term policy options. Transformative changes are required to fully appreciate the current context of work in an ongoing global crisis. Maintaining workers under a system where they are tied to an employer is not sustainable. Borders controls and immigration status can no longer be wielded by the state to exclude nor deny essential workers access to Canada’s social safety net.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587" dir="ltr"><span data-dcnode-id="1588" instrument_node="">Sincerely,</span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1584" dir="ltr"><span data-dcnode-id="1585" instrument_node="">Justicia for Migrant Workers</span></p><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1576" dir="ltr"><a data-dcnode-id="1581" href="mailto:j4mw.on@gmail.com" rel="noopener" target="_blank"><span data-dcnode-id="1582" instrument_node="">j4mw.on@gmail.com</span></a><br data-dcnode-id="1580"><span data-dcnode-id="1579" instrument_node="">
</span><a data-dcnode-id="1577" data-saferedirecturl="https://www.google.com/url?q=http://www.harvestingfreedom.org&amp;source=gmail&amp;ust=1638164701107000&amp;usg=AOvVaw0nuDfHUH9VNoSIsLxoIHoT" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.harvestingfreedom.org/" rel="noopener" target="_blank"><span data-dcnode-id="1578" instrument_node="">www.harvestingfreedom.org</span></a></p><span data-dcnode-id="1575" instrument_node="">
</span></div><span data-dcnode-id="1572" instrument_node="">
</span></article><span data-dcnode-id="1569" instrument_node="">

</span><p data-dcnode-id="1534"><img alt="Poster with a worker holding a sign &quot;Give Migrant Workers Justice&quot;" class="alignnone wp-image-2242 alignleft jetpack-lazy-image" data-attachment-id="2242" data-comments-opened="1" data-dcnode-id="1537" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Farmworker Justicia" data-large-file="https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?fit=676%2C567&amp;ssl=1" data-lazy-sizes="(max-width: 273px) 100vw, 273px" data-lazy-src="https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?resize=273%2C229&amp;is-pending-load=1#038;ssl=1" data-lazy-srcset="https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?resize=300%2C251&amp;ssl=1 300w, https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?resize=768%2C644&amp;ssl=1 768w, https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?resize=676%2C567&amp;ssl=1 676w, https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?w=940&amp;ssl=1 940w" data-medium-file="https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?fit=300%2C251&amp;ssl=1" data-orig-file="https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?fit=940%2C788&amp;ssl=1" data-orig-size="940,788" data-permalink="https://harvestingfreedom.org/2021/11/20/fifty-four-migrant-farmworkers-from-trinidad-and-tobago-and-jamaica-commence-historic-human-rights-hearing-on-racist-policing-practices/farmworker-justicia/" data-recalc-dims="1" height="229" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg%3Fresize%3D273%252C229%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="273"><noscript data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">&lt;img data-attachment-id="2242" data-permalink="https://harvestingfreedom.org/2021/11/20/fifty-four-migrant-farmworkers-from-trinidad-and-tobago-and-jamaica-commence-historic-human-rights-hearing-on-racist-policing-practices/farmworker-justicia/" data-orig-file="https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?fit=940%2C788&amp;amp;ssl=1" data-orig-size="940,788" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="Farmworker Justicia" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?fit=300%2C251&amp;amp;ssl=1" data-large-file="https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?fit=676%2C567&amp;amp;ssl=1" loading="lazy" class="alignnone wp-image-2242 alignleft" src="https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?resize=273%2C229&amp;#038;ssl=1" alt="Poster with a worker holding a sign "Give Migrant Workers Justice"" width="273" height="229" srcset="https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?resize=300%2C251&amp;amp;ssl=1 300w, https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?resize=768%2C644&amp;amp;ssl=1 768w, https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?resize=676%2C567&amp;amp;ssl=1 676w, https://i0.wp.com/harvestingfreedom.org/wp-content/uploads/2021/11/Farmworker-Justicia.jpg?w=940&amp;amp;ssl=1 940w" sizes="(max-width: 273px) 100vw, 273px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">TORONTO – On Monday, November 22, 2021, 54 migrant farm workers will be seeking justice from the Human Rights Tribunal of Ontario in a historic and potentially precedent-setting case.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">In October 2013, after a sexual assault that occurred near the community of Bayham, Ontario, the Ontario Provincial Police (OPP) conducted a DNA sweep to collect samples from approximately 95 migrant farmworkers employed in the region.</span></p><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">The OPP conducted its investigation with what appeared to be a total disregard for the detailed suspect description that it had obtained from the victim. DNA samples were taken from Indo- and Afro-Caribbean men from Jamaican and Trinidad. Their ages ranged from 22 to 68, their heights ranged from 5’2” to 6’6”, and their body sizes ranged between 110 lbs to 328 lbs. Other identifying features were also disregarded. Workers were targeted solely on the basis of their skin colour and their status as migrant farmworkers.</span></p><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Fifty-four of the migrant farmworkers who were impacted came together to jointly file human rights applications with the Human Rights Tribunal of Ontario. Starting at 10:00am on Monday the applications will finally be heard. The Applicants will argue that the DNA sweep and the manner in which it was conducted was racial discrimination that violated their rights under section 1 of Ontario’s Human Rights Code.</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">This is the first human rights case of its kind in Canada to examine allegations of systemic racial profiling and discrimination by the police towards migrant farmworkers. It is anticipated that it will expose not only the inherent vulnerabilities that workers are exposed to under the Seasonal Agricultural Worker Program, but how those vulnerabilities were exploited by the police in their execution of the 2013 DNA sweep.</span></p><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1517" instrument_node="">Zoom link to observe the proceedings:&nbsp;</span><span data-dcnode-id="1510" style="color: #0000ff;"><strong data-dcnode-id="1511"><a data-dcnode-id="1513" data-saferedirecturl="https://www.google.com/url?q=https://zoom.us/j/99671396600&amp;source=gmail&amp;ust=1637534282080000&amp;usg=AOvVaw0k4STEny5tuvgVQGFZxWFA" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//zoom.us/j/99671396600" rel="noopener" style="color: #0000ff;" target="_blank"><span data-dcnode-id="1516" instrument_node="">https://zoom.us/</span><wbr data-dcnode-id="1515"><span data-dcnode-id="1514" instrument_node="">j/99671396600</span></a><span data-dcnode-id="1512" instrument_node="">&nbsp;</span></strong></span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">For interviews and more information, please contact:</span></p><span data-dcnode-id="1505" instrument_node="">
</span><ul data-dcnode-id="1491"><span data-dcnode-id="1504" instrument_node="">

</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">On Saturday, August 28 at 10-11 AM EDT, we’ll be hosting a Digital Day of Action in solidarity with agricultural workers across Canada who continue to toil under horrific living and working conditions. More than 20 workers have died so far during the pandemic and there as been little to no response from all levels of government.</span></p><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1447" instrument_node="">Register for our DDA </span><a data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eventbrite.ca/e/justice-for-migrant-workers-digital-day-of-action-tickets-165849278657%3Fltclid%3Dea30fc49-e471-44b8-9f50-a0847b375914"><span data-dcnode-id="1446" instrument_node="">here.</span></a><span data-dcnode-id="1444" instrument_node=""> We’ll hear from current and migrant workers and then we’ll call, email and Tweet at the government officials who are failing workers in Canada.</span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Please also sign our petition that demands immediate changes from all levels of government for their role in creating and maintaining migrant farmworkers’ vulnerability:</span></p><span data-dcnode-id="1439" instrument_node="">

</span><div data-dcnode-id="1260" id="letter_prefix"><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Dear [recipient position will go here]  [recipient name will go here],</span></p><span data-dcnode-id="1261" instrument_node="">
</span></div><div class="form-item webform-component webform-component-textarea webform-component--your-letter compact-form-wrapper" data-dcnode-id="1248" style="margin-bottom: 10px;"><span data-dcnode-id="1259" instrument_node="">
</span><label class="element-invisible compact-form-label" data-dcnode-id="1255" for="edit-submitted-your-letter" style="display: none;"><span data-dcnode-id="1258" instrument_node="">Your Letter </span><span class="form-required" data-dcnode-id="1256" title="This field is required."><span data-dcnode-id="1257" instrument_node="">*</span></span></label><span data-dcnode-id="1254" instrument_node="">
</span><div class="form-textarea-wrapper resizable textarea-processed resizable-textarea" data-dcnode-id="1250"><textarea class="webform-prefill-exclude form-textarea required compact-form-field textarea-processed" cols="60" data-dcnode-id="1252" id="edit-submitted-your-letter" name="submitted[your_letter]" placeholder="Write your letter here and tell your representative why this issue is a bad idea." readonly="readonly" required="required" rows="7"><span data-dcnode-id="1253" instrument_node="">Farmworkers across Canada need immediate protection, and it requires all levels of government to act. The pandemic continues to disproportionately impact vulnerable communities, and has done so for more than a year. At no time during the pandemic has any level of government taken action to address the long-standing issues that migrant agricultural workers face in Canada. It is unacceptable to expect that funding directed to employers and limited permanent residence pathways are appropriate responses, especially when migrant farmworkers are dying as the government takes its time. To date, we know more than 20 workers have died.

I support J4MW's call for both provincial and federal governments to provide crucial supports to workers in Canada and those who have returned home. These include workplace protections - both in legislation and in practice; income supports for sick workers and workers who must self-isolate or quarantine; an overhaul of its employment, health and safety, and housing legislation to better protect workers; permanent status on arrival and ending the practice of repatriating and deporting migrants, especially those who are sick or injured; and the development of a COVID-19 action plan specifically to protect agricultural workers. 

We are urging the Province and the Ministry of Labour, in particular, to undertake these immediate steps to level the playing field so that all farmworkers can be protected from the spread of the pandemic. These steps should include the following:

Hold employers accountable for failing to protect migrant farmworkers. There have been, and continue to be, multiple outbreaks on farms throughout this pandemic. Farms continue to operate - meaning agricultural workers continue to work under unsafe conditions. In many cases, they are confined to the farms and their movements are restricted. Where outbreaks occur, farms should be shut down and workers should be compensated for their time.

Undertake investigations against contractors and employers who are stealing from farmworkers. The Ontario Ministry of Labour (MOL) found that approximately $1.8 million is owed to workers employed by contractors. Less than 30% of this wage theft has been recovered. Multiple farmworkers have also reported that they are not paid for overtime. 

Pay for sick days and hazard pay for working in dangerous conditions. Migrant farmworkers work with harsh chemicals that are hazardous to their health and are bound to get them sick. When they do, they are unable to work and must pay for their medical expenses out-of-pocket.   

Expand the Occupational Health and Safety Act to include real protections against dangerous working conditions, include agriculture-specific regulations, and extend protections to migrant worker accommodations. Unlike other industries, there are no comprehensive regulations that protect agricultural workers, including their use of dangerous chemicals. The Ministry of Labour must update the OHSA to mandate comprehensive training and personal protective equipment to protect workers from dangerous working conditions.  

Strengthen reprisal protections so workers are not penalized for refusing unsafe working conditions. Migrant farmworkers are penalized for refusing unsafe work under the current legislation, and face many barriers in asserting their reprisal rights given their precarious immigration status.

Legislate mandatory inquests when migrant farmworkers are killed on the farm. So far, at least 20 migrant farmworkers have died this year. The cause of death for many is still unknown. There has never been an inquest into the death of a migrant farmworker, even while it is understood that the industry is particularly dangerous. The furthest any Coroner’s Office has gone is to conduct a review, which excluded the voices of migrant farmworkers and their communities.
Legislate migrant farmworkers’ right to organize. All workers should be entitled to organize to advocate for their rights in the workplace and build collective power. Currently, agricultural workers are not permitted to do so.

WE ALSO URGE THE GOVERNMENT OF CANADA TO:

Provide income supports to all migrant farmworkers. This includes Employment Insurance, which many workers cannot access due to repatriation, but which they have been paying into for decades.

Provide migrant farmworkers with open work permits. This helps to ensure they are not tied to a single employer, and can therefore leave exploitative and abusive conditions - without having to apply for a permit.  

Extend permanent status on arrival and end the practice of repatriating and deporting migrants. It is common for migrant farmworkers to be repatriated, especially those who are sick or injured, because they are viewed as disposable.

Impose regulations that protect contract workers by providing safe working conditions. Workplace ‘crackdowns’ by Canada Borders Service Agency target vulnerable workers and do not hold employers accountable. Undocumented workers are particularly at risk because of the lack of protections, precarious immigration status, and in the face of crackdowns, they are vulnerable to deportation;

Provide decent and adequate housing to migrant farmworkers. Migrant farmworkers live in dangerous and subpar living conditions that are similar to plantation housing. The provincial and federal government have failed migrant workers because employers are not held accountable for providing inhumane living conditions as different jurisdictions continue to point fingers. 

The issues raised in this petition are long-standing requests that farm workers have been bringing forward for decades. To stamp out the spread of this pandemic, it is vital that structural changes are made to address the systemic power imbalances that exist in our fields.

I urge you to take immediate action to implement these critical recommendations.</span></textarea><div class="grippie" data-dcnode-id="1251"></div></div><span data-dcnode-id="1249" instrument_node="">

</span><header class="entry-header" data-dcnode-id="1133"><span data-dcnode-id="1159" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1156"><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2021/04/22/j4mws-response-to-new-pathway-to-permanent-residency-announcement-please-sign/" rel="bookmark"><span data-dcnode-id="1158" instrument_node="">J4MW’s response to new pathway to permanent residency announcement – please sign!</span></a></h1><span data-dcnode-id="1155" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1136"><span data-dcnode-id="1154" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1150"><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2021/04/22/j4mws-response-to-new-pathway-to-permanent-residency-announcement-please-sign/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1152" datetime="2021-04-22T00:17:14-04:00"><span data-dcnode-id="1153" instrument_node="">April 22, 2021</span></time></a></span><span class="byline" data-dcnode-id="1144"><span class="sep" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node=""> / </span></span><span class="author vcard" data-dcnode-id="1145"><a class="url fn n" data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/author/harvestingfreedom/"><span data-dcnode-id="1147" instrument_node="">harvestingfreedom</span></a></span></span><span data-dcnode-id="1143" instrument_node=""> </span><span class="comments-link" data-dcnode-id="1138"><span class="sep" data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node=""> / </span></span><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvestingfreedom.org/2021/04/22/j4mws-response-to-new-pathway-to-permanent-residency-announcement-please-sign/%23respond"><span data-dcnode-id="1140" instrument_node="">Leave a comment</span></a></span><span data-dcnode-id="1137" instrument_node="">
</span></div><span data-dcnode-id="1134" instrument_node="">
</span></header><span data-dcnode-id="1131" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1092"><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1129" instrument_node="">Last Wednesday, the federal government </span><a data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thestar.com/news/canada/2021/04/14/we-want-you-to-stay-canada-opens-door-to-permanent-residence-for-90000-international-graduates-and-temporary-workers-with-one-time-program.html" rel="noopener" target="_blank"><span data-dcnode-id="1127" style="color: #0000ff;"><span data-dcnode-id="1128" instrument_node="">announced</span></span></a><span data-dcnode-id="1125" instrument_node=""> a new </span><span class="css-901oao css-16my406 r-poiln3 r-bcqeeo r-qvutc0" data-dcnode-id="1119"><span data-dcnode-id="1124" instrument_node="">time-limited program for a limited number of international students and migrant workers to apply for permanent residency. The details are </span><a data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/immigration-refugees-citizenship/news/2021/04/new-pathway-to-permanent-residency-for-over-90000-essential-temporary-workers-and-international-graduates.html" rel="noopener" target="_blank"><span data-dcnode-id="1122" style="color: #0000ff;"><span data-dcnode-id="1123" instrument_node="">here</span></span></a><span data-dcnode-id="1120" instrument_node="">.&nbsp; </span></span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1116" instrument_node="">Our full responses is </span><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/forms/d/e/1FAIpQLSdUbS4Mw86-tYitr7SZgo--3Fs1ewr8TIazhaLq8lZLqkDuvA/viewform" rel="noopener" target="_blank"><span data-dcnode-id="1114" style="color: #0000ff;"><span data-dcnode-id="1115" instrument_node="">here</span></span></a><span data-dcnode-id="1112" instrument_node="">.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">We strongly condemn Canada’s announced ‘reforms’ to its immigration system. A one-time only, short-term access to permanent residency for 90,000 people is a smokescreen that fails to address Canada’s racist and exclusionary immigration system.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">These reforms do nothing to address how the current point system discriminates against both undocumented communities and migrants deemed ‘low skill’ and ‘low wage.’ More troublingly, the reforms do nothing to change the indentureship of thousands of migrant workers in Canada.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">In particular, migrant agricultural workers who work under a system of indentured labour will once again see no improvements to their working and living conditions as a result of the continuation of a closed work permit system that binds workers to one employer. Instead, migrant farm workers are put into competition with over 90 other occupations for a measly 30,000 spots, when over 50,000 farm workers have entered Canada on tied work permits during the pandemic alone.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1094"><strong data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Please sign and share our response here</span></strong><span data-dcnode-id="1098" instrument_node="">: </span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/forms/d/e/1FAIpQLSdUbS4Mw86-tYitr7SZgo--3Fs1ewr8TIazhaLq8lZLqkDuvA/viewform" rel="noopener" target="_blank"><span data-dcnode-id="1096" style="color: #0000ff;"><span data-dcnode-id="1097" instrument_node="">https://docs.google.com/forms/d/e/1FAIpQLSdUbS4Mw86-tYitr7SZgo–3Fs1ewr8TIazhaLq8lZLqkDuvA/viewform</span></span></a></p><span data-dcnode-id="1093" instrument_node="">
</span></div><span data-dcnode-id="1090" instrument_node="">
</span></article><span data-dcnode-id="1087" instrument_node="">
