</span><meta content="<h3>Background</h3><p>Utilization of services is an important aspect of migrants' access to healthcare. The aim was to review the European literature on utilization of somatic healthcare services related to screening, general practitioner, specialist, emergency room and hospital by adult first-generation migrants. Our study question was: 'Are there differences in migrants' utilization of somatic healthcare services compared to non-migrants?'</p><h3>Methods</h3><p>Publications were identified by a systematic search of PUBMED and EMBASE. Appropriateness of the studies was judged independently by two researchers based on the abstracts. Additional searches were conducted via the references of the selected articles. The final number of studies included was 21.</p><h3>Results</h3><p>The results suggested a diverging picture regarding utilization of somatic healthcare services by migrants compared to non-migrants in Europe. Overall, migrants tended to have lower attendance and referral rates to mammography and cervical cancer screening, more contacts per patient to general practitioner but less use of consultation by telephone, and same or higher level of use of specialist care as compared to non-migrants. Emergency room utilization showed both higher, equal and lower levels of utilization for migrants compared to non-migrants, whereas hospitalization rates were higher than or equal to non-migrants.</p><h3>Conclusion</h3><p>Our review illustrates lack of appropriate epidemiological data and diversity in the categorization of migrants between studies, which makes valid cross-country comparisons most challenging. After adjusting for socio-economic factors and health status, the existing studies still show systematic variations in somatic healthcare utilization between migrants and non-migrants.</p>" data-dcnode-id="184" lang="" name="citation_abstract"><span data-dcnode-id="183" instrument_node="">

</span><div class="abstract" data-dcnode-id="46" id="abstract"><span data-dcnode-id="77" instrument_node="">
</span><h2 class="title" data-dcnode-id="75"><span data-dcnode-id="76" instrument_node="">
        Abstract
        
      </span></h2><span data-dcnode-id="74" instrument_node="">
</span><div class="abstract-content selected" data-dcnode-id="48" id="enc-abstract"><span data-dcnode-id="73" instrument_node="">
</span><p data-dcnode-id="68"><span data-dcnode-id="72" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="70"><span data-dcnode-id="71" instrument_node="">
          Background:
        </span></strong><span data-dcnode-id="69" instrument_node="">
      
      Utilization of services is an important aspect of migrants' access to healthcare. The aim was to review the European literature on utilization of somatic healthcare services related to screening, general practitioner, specialist, emergency room and hospital by adult first-generation migrants. Our study question was: 'Are there differences in migrants' utilization of somatic healthcare services compared to non-migrants?'
    </span></p><span data-dcnode-id="67" instrument_node="">
</span><p data-dcnode-id="62"><span data-dcnode-id="66" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="64"><span data-dcnode-id="65" instrument_node="">
          Methods:
        </span></strong><span data-dcnode-id="63" instrument_node="">
      
      Publications were identified by a systematic search of PUBMED and EMBASE. Appropriateness of the studies was judged independently by two researchers based on the abstracts. Additional searches were conducted via the references of the selected articles. The final number of studies included was 21.
    </span></p><span data-dcnode-id="61" instrument_node="">
</span><p data-dcnode-id="56"><span data-dcnode-id="60" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="58"><span data-dcnode-id="59" instrument_node="">
          Results:
        </span></strong><span data-dcnode-id="57" instrument_node="">
      
      The results suggested a diverging picture regarding utilization of somatic healthcare services by migrants compared to non-migrants in Europe. Overall, migrants tended to have lower attendance and referral rates to mammography and cervical cancer screening, more contacts per patient to general practitioner but less use of consultation by telephone, and same or higher level of use of specialist care as compared to non-migrants. Emergency room utilization showed both higher, equal and lower levels of utilization for migrants compared to non-migrants, whereas hospitalization rates were higher than or equal to non-migrants.
    </span></p><span data-dcnode-id="55" instrument_node="">
</span><p data-dcnode-id="50"><span data-dcnode-id="54" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="52"><span data-dcnode-id="53" instrument_node="">
          Conclusion:
        </span></strong><span data-dcnode-id="51" instrument_node="">
      
      Our review illustrates lack of appropriate epidemiological data and diversity in the categorization of migrants between studies, which makes valid cross-country comparisons most challenging. After adjusting for socio-economic factors and health status, the existing studies still show systematic variations in somatic healthcare utilization between migrants and non-migrants.
    </span></p><span data-dcnode-id="49" instrument_node="">
