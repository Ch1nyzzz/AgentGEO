                  </span></p><span data-dcnode-id="2986" instrument_node="">
</span><div class="show-more-less-text" data-dcnode-id="2949"><span data-dcnode-id="2985" instrument_node="">
</span><p class="show-more-less-text__text--less" data-dcnode-id="2980"><span data-dcnode-id="2984" instrument_node="">
        The economic crisis of October 2019 and later on COVID 19 both had a negative spillover impact on the country and its citizens especially youth.</span><br data-dcnode-id="2983"><br data-dcnode-id="2982"><span data-dcnode-id="2981" instrument_node="">During the lockdown, while schools were temporarily closed for quarantine, schooling continued. Some students often do not have the privilege of owning working computers or laptops that would allow them to partake in online learning even if their school or university had the ability to host online courses. While financially well-off families can…
      </span></p><span data-dcnode-id="2979" instrument_node="">
</span><p class="show-more-less-text__text--more" data-dcnode-id="2965" tabindex="-1"><span data-dcnode-id="2978" instrument_node="">
          The economic crisis of October 2019 and later on COVID 19 both had a negative spillover impact on the country and its citizens especially youth.</span><br data-dcnode-id="2977"><br data-dcnode-id="2976"><span data-dcnode-id="2975" instrument_node="">During the lockdown, while schools were temporarily closed for quarantine, schooling continued. Some students often do not have the privilege of owning working computers or laptops that would allow them to partake in online learning even if their school or university had the ability to host online courses. While financially well-off families can afford computers and multiple devices, students from struggling families can hardly afford simple devices and may likely not have the internet at home.</span><br data-dcnode-id="2974"><br data-dcnode-id="2973"><span data-dcnode-id="2972" instrument_node="">As Lebanon’s current education system is designed for face-to-face teaching and learning, the lock-down and school closures was a major issue.</span><br data-dcnode-id="2971"><br data-dcnode-id="2970"><span data-dcnode-id="2969" instrument_node="">This has led to the creation of a platform that targets the school and university students in Lebanon, the state of distance education and the equity issue. The spread, use and availability of technology is key, as is the availability of online learning materials, as well as devices and the level of internet connectivity at homes.</span><br data-dcnode-id="2968"><br data-dcnode-id="2967"><span data-dcnode-id="2966" instrument_node="">Lebanon learn is a platform dedicated to gathering unused laptops, computers and tablets from individuals and organizations and donating them to students in need.
        </span></p><span data-dcnode-id="2964" instrument_node="">
