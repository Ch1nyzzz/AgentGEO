</span><div class="group-right" data-dcnode-id="4561"><span data-dcnode-id="4567" instrument_node="">
</span><div class="taxonomy-term-description" data-dcnode-id="4563"><p data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">Tens of millions of people around the globe have been forcibly displaced by conflict, natural disaster, or persecution, seeking refuge either within or beyond the borders of their country. Humanitarian protection, whether for refugees, asylum seekers, or internally displaced persons (IDPs), represents a key policy area for many major immigrant-receiving countries as well as nations bordering locations where war, political upheaval, or natural disaster have disrupted daily life. The research offered here relates to the law and practice of protecting refugees and IDPs in areas of conflict as well as in industrialized nations, with a focus on secure solutions and effective institutional arrangements for comprehensive protection.</span></p><span data-dcnode-id="4564" instrument_node="">

</span><div class="field-item even" data-dcnode-id="2880" property="content:encoded"><p data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">The United States’ controversial Title 42 migrant expulsions policy will come to an end in May 2022, after more than 1.7 million expulsions over two years. The COVID-19-era public-health restriction ushered in an unprecedented period of mass expulsions, including of would-be asylum seekers, at the U.S.-Mexico border. Unwinding the policy will be complicated amid predictions of a significant increase in unauthorized migration.</span></p><span data-dcnode-id="2881" instrument_node="">
