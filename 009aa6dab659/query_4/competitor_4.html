an, Ybarra, &amp; Bachman, 1999</span></span><span data-dcnode-id="3735" instrument_node="">). Anxiety about interacting with refugees has been found to predict less </span><span class="P01777 dictionaryTerm docDashedBottom" data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">positive attitudes</span></span><span data-dcnode-id="3732" instrument_node=""> toward them (</span><span class="citationReference" data-dcnode-id="3730" id="cr70-1"><span data-dcnode-id="3731" instrument_node="">Murray &amp; Marx, 2013</span></span><span data-dcnode-id="3729" instrument_node="">) and less willingness to support equal opportunity legislation on their behalf (</span><span class="citationReference" data-dcnode-id="3727" id="cr101-1"><span data-dcnode-id="3728" instrument_node="">Turoy-Smith, Kane, &amp; Pedersen, 2013</span></span><span data-dcnode-id="3726" instrument_node="">). Extended contact with outgroup members has been found to reduce these feelings of anxiety and improve intergroup attitudes.</span></div><div class="indent" data-dcnode-id="3711"><span data-dcnode-id="3724" instrument_node="">Research conducted in Austria, for example, found that although voting for far-right parties has recently increased overall, those communities that were actually hosting refugees, and thus where members of the host community had the greatest likelihood of actually encountering and interacting with refugees, showed the lowest increase in far-right support (</span><span class="citationReference" data-dcnode-id="3722" id="cr92-1"><span data-dcnode-id="3723" instrument_node="">Steinmayr, 2016</span></span><span data-dcnode-id="3721" instrument_node="">). In a mixed-methods study in Australia (</span><span class="citationReference" data-dcnode-id="3719" id="cr101-2"><span data-dcnode-id="3720" instrument_node="">Turoy-Smith et al., 2013</span></span><span data-dcnode-id="3718" instrument_node="">), few of the participants reported having had any contact with refugees and many expressed confusion about who refugees were. Those who did have contact, however, tended to report positive or mixed experiences (rather than just negative) and the quality of those contact experiences predicted prejudice toward refugees both directly, and indirectly, through anxiety. Those who came from a region that had resettled a large number of asylum seekers were more likely to report generic contact and that contact tended to be positive. </span><span class="citationReference" data-dcnode-id="3716" id="cr89-1"><span data-dcnode-id="3717" instrument_node="">Schulz and Taylor (2018)</span></span><span data-dcnode-id="3715" instrument_node=""> suggested that positive contact with one outgroup can generalize to others. In their study in Northern Ireland they showed that the quality of previous intergroup interactions between Protestants and Catholics can result in more </span><span class="P01008 dictionaryTerm docDashedBottom" data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">perspective taking</span></span><span data-dcnode-id="3712" instrument_node=""> and improved intergroup attitudes. Importantly, they also showed that these can then generalize to a novel outgroup, in this case, Syrian refugees. The results suggest that policies designed to promote better intergroup relations in existing groups can benefit relationships with newcomers, at least under some conditions.</span></div></div></div><div class="section ftJumpToAnchor" data-dcnode-id="3642" id="s15"><div class="topLevelHeadingContainer ftSection" data-dcnode-id="3706" fragment="s15" id="s15"><h2 class="doubleHeightTopLevelHeading" data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">Stereotypes and the Construction of the Refugee Identity</span></h2></div><div class="indent" data-dcnode-id="3689"><span data-dcnode-id="3705" instrument_node="">Policies and public/media discourse that make an effort to elicit empathy or provide support for refugees often enact stigmatizing stereotypes of dependence or lack of agency because they are effective (</span><span class="citationReference" data-dcnode-id="3703" id="cr206-1"><span data-dcnode-id="3704" instrument_node="">Gupte &amp; Mehta, 2007</span></span><span data-dcnode-id="3702" instrument_node="">). For example, </span><span class="citationReference" data-dcnode-id="3700" id="cr6-6"><span data-dcnode-id="3701" instrument_node="">Bansak et al. (2016)</span></span><span data-dcnode-id="3699" instrument_node=""> found that support for refugees is grounded in a framing of refugees as in need of charity, rather than a discourse of justice and rights. This framing was also described above, in some Australian political messages. However, this construction of refugee identity is stigmatizing (</span><span class="citationReference" data-dcnode-id="3697" id="cr206-2"><span data-dcnode-id="3698" instrument_node="">Gupte &amp; Mehta, 2007</span></span><span data-dcnode-id="3696" instrument_node="">). It is not surprising then that some of those who resettle actively reject a refugee identity (</span><span class="citationReference" data-dcnode-id="3694" id="cr56-1"><span data-dcnode-id="3695" instrument_node="">Kumsa, 2006</span></span><span data-dcnode-id="3693" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3691" id="cr62-1"><span data-dcnode-id="3692" instrument_node="">Ludwig, 2016</span></span><span data-dcnode-id="3690" instrument_node="">).</span></div><div class="indent" data-dcnode-id="3678"><span data-dcnode-id="3688" instrument_node="">Policies regarding asylum and resettlement play a large role in the construction of this refugee identity by shaping the social and physical spaces that refugees inhabit. </span><span class="citationReference" data-dcnode-id="3686" id="cr16-2"><span data-dcnode-id="3687" instrument_node="">Carvalho and Pinto (2018)</span></span><span data-dcnode-id="3685" instrument_node=""> described the process by which the refugee identity is constructed in a refugee camp in the Democratic Republic of Congo. The physical segregation of refugees in camps is the first step in creating a refugee identity as distinct from other migrants and residents. The profound uncertainty, enforced idleness and hopelessness about their future, and the dependence that they have on humanitarian agencies, then link the refugee identity to helplessness. In their study, Carvalho and Pinto argued that this helpless identity was maintained by the way that agencies managed the camp. Agencies typically determine everything in refugees’ lives, including how much and what food they would live on, the location and nature of housing, and opportunities for employment and education. While in the camps, a passive and dependent population makes management and </span><span class="D01383 dictionaryTerm docDashedBottom" data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">distribution</span></span><span data-dcnode-id="3682" instrument_node=""> of goods easier for the organizations, and the inhabitants, access to these services and supports is tied to this identity (cf. </span><span class="citationReference" data-dcnode-id="3680" id="cr49-1"><span data-dcnode-id="3681" instrument_node="">Ilcan &amp; Rygiel, 2015</span></span><span data-dcnode-id="3679" instrument_node="">).</span></div><div class="indent" data-dcnode-id="3667"><span data-dcnode-id="3677" instrument_node="">The perception of refugees as helpless victims persists following resettlement and is a defining feature of the refugee stereotype. Media portrayals of refugees and asylum seekers emphasize these characteristics. These perceived traits of dependence and humanitarian need do motivate </span><span class="P01777 dictionaryTerm docDashedBottom" data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">positive attitudes</span></span><span data-dcnode-id="3674" instrument_node=""> and support for the resettlement of asylum seekers and refugees (</span><span class="citationReference" data-dcnode-id="3672" id="cr6-7"><span data-dcnode-id="3673" instrument_node="">Bansak et al., 2016</span></span><span data-dcnode-id="3671" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3669" id="cr55-1"><span data-dcnode-id="3670" instrument_node="">Kotzur, Forsbach, &amp; Wagner, 2017</span></span><span data-dcnode-id="3668" instrument_node="">), but once resettled these perceptions may undermine the well-being of refugees, and their ability to integrate as full and equal members of their new communities.</span></div><div class="indent" data-dcnode-id="3659"><span data-dcnode-id="3666" instrument_node="">Two papers in this issue explicitly address how policies and </span><span class="S01831 dictionaryTerm docDashedBottom" data-dcnode-id="3664"><span data-dcnode-id="3665" instrument_node="">social context</span></span><span data-dcnode-id="3663" instrument_node=""> shape refugee identities following permanent settlement. </span><span class="citationReference" data-dcnode-id="3661" id="cr63-1"><span data-dcnode-id="3662" instrument_node="">Lukunka (2018)</span></span><span data-dcnode-id="3660" instrument_node=""> interviewed former Burundian refugees as they attempted to reintegrate into their home communities following return from asylum. As with refugees in other settings, the returnees in Lukunka’s study were perceived as helpless and dependent outsiders. Many struggled to find economic stability, having no access to land for farming and reporting being underpaid for employment. Nonetheless, the support that was provided to returnees, in the form of housing or food, was resented by residents who had not left during the conflict, and this exacerbated tensions between those who stayed and those who had returned. Participants felt that their needs were not recognized by authorities, and, if anything, they experienced corruption and bribery. The result was a solidifying of a separate identity from the “stayees.”</span></div><div class="indent" data-dcnode-id="3643"><span class="citationReference" data-dcnode-id="3657" id="cr41-2"><span data-dcnode-id="3658" instrument_node="">Hayes and Endale (2018)</span></span><span data-dcnode-id="3656" instrument_node=""> approached identity for those in forced migration situations from a different perspective, looking at identity formation among adults who arrived in the United States as resettled refugees as children, and the impact of the settlement context on this process. They highlighted the dangers in focusing on individual level risk and protection factors rather than the broader </span><span class="S01831 dictionaryTerm docDashedBottom" data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">social context</span></span><span data-dcnode-id="3653" instrument_node=""> that war-affected youth settle into, namely the problematizing of what are normal pathways of </span><span class="A00282 dictionaryTerm docDashedBottom" data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">acculturation</span></span><span data-dcnode-id="3650" instrument_node="">. Consistent with other recent research on newcomer identity (</span><span class="citationReference" data-dcnode-id="3648" id="cr211-1"><span data-dcnode-id="3649" instrument_node="">Nguyen &amp; Benet-Martinez, 2010</span></span><span data-dcnode-id="3647" instrument_node="">), the youth in Hayes and Endale’s study spoke of creating new identities that were separate from both their origin and their current community. However, despite moving past a refugee identity into a bicultural or hybrid new identity, grounded in their current situation, they found themselves still being labeled in these terms. Hayes and Endale’s findings suggest that the youths’ different systems were not integrated, resulting in a navigation of parallel systems and thus multiple, parallel, or merged identities. Ironically, they noted that Berry’s critique of the two world hypotheses (e.g., </span><span class="citationReference" data-dcnode-id="3645" id="cr8-1"><span data-dcnode-id="3646" instrument_node="">Berry, Phinney, Sam, &amp; Vedder, 2006</span></span><span data-dcnode-id="3644" instrument_node="">) is that it is not that there are two worlds but that the world is dichotomized by the larger macrosystems that the youth are nested within. To the extent that the worlds are perceived or interacted with in this way, however, two worlds will emerge.</span></div></div><div class="section ftJumpToAnchor" data-dcnode-id="3538" id="s16"><div class="topLevelHeadingContainer ftSection" data-dcnode-id="3639" fragment="s16" id="s16"><h2 data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">Interpersonal Contact</span></h2></div><div class="indent" data-dcnode-id="3616"><span data-dcnode-id="3638" instrument_node="">Intergroup contact can encourage the development of integrated, and less stigmatized, newcomer identities, and foster positive intergroup relationships. This can be an argument for policies promoting refugee resettlement into small communities. In smaller communities newcomers may have a greater likelihood of interacting with other community members, which may then result a more welcoming community context. Resettlement of refugees into small communities has been an increasingly popular strategy in several countries, in part to address needs for population growth and labor in more rural regions (</span><span class="citationReference" data-dcnode-id="3636" id="cr14-2"><span data-dcnode-id="3637" instrument_node="">Bose, 2018</span></span><span data-dcnode-id="3635" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3633" id="cr66-1"><span data-dcnode-id="3634" instrument_node="">McDonald-Wilmsen, Gifford, Webster, Wiseman, &amp; Casey, 2009</span></span><span data-dcnode-id="3632" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3630" id="cr107-1"><span data-dcnode-id="3631" instrument_node="">Wiginton, 2013</span></span><span data-dcnode-id="3629" instrument_node="">). However, research on resettlement of refugees into small communities does not necessarily support this assumption. A review of resettlement experiences of refugees in small towns and agricultural areas in Australia reports that some resettled refugees had difficulty developing </span><span class="S01948 dictionaryTerm docDashedBottom" data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">social networks</span></span><span data-dcnode-id="3626" instrument_node="">, feared discrimination and felt socially isolated because of a lack of a coethnic community (</span><span class="citationReference" data-dcnode-id="3624" id="cr66-2"><span data-dcnode-id="3625" instrument_node="">McDonald-Wilmsen et al., 2009</span></span><span data-dcnode-id="3623" instrument_node="">). Bose’s </span><span class="C00279 dictionaryTerm docDashedBottom" data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">case study</span></span><span data-dcnode-id="3620" instrument_node=""> of the challenges and opportunities that arise when refugees are resettled into a small Vermont town shows how these resettlements can be hindered by residents’ resistance to the resettlement of refugees (</span><span class="citationReference" data-dcnode-id="3618" id="cr14-3"><span data-dcnode-id="3619" instrument_node="">Bose, 2018</span></span><span data-dcnode-id="3617" instrument_node="">).</span></div><div class="indent" data-dcnode-id="3602"><span data-dcnode-id="3615" instrument_node="">The positive impact of intergroup interactions as described above depends on the quality as well as quantity of the contact between groups (</span><span class="citationReference" data-dcnode-id="3613" id="cr64-1"><span data-dcnode-id="3614" instrument_node="">MacInnis &amp; Page-Gould, 2015</span></span><span data-dcnode-id="3612" instrument_node="">; Thomsen &amp; Birmose, 2015; </span><span class="citationReference" data-dcnode-id="3610" id="cr100-1"><span data-dcnode-id="3611" instrument_node="">Tropp &amp; Page-Gould, 2014</span></span><span data-dcnode-id="3609" instrument_node="">). Thus, simply placing groups in proximity is not enough to ensure positive interactions. Moreover, limited interactions of poor quality can increase negative intergroup relationships (</span><span class="citationReference" data-dcnode-id="3607" id="cr64-2"><span data-dcnode-id="3608" instrument_node="">MacInnis &amp; Page-Gould, 2015</span></span><span data-dcnode-id="3606" instrument_node="">). A number of conditions have been identified that need to be met in order for contact to lead to positive attitudinal changes. These include feelings of intimacy and equality between the group members, having shared goals and cooperation to achieve them, and institutional norms that support positive intergroup relationships (</span><span class="citationReference" data-dcnode-id="3604" id="cr100-2"><span data-dcnode-id="3605" instrument_node="">Tropp &amp; Page-Gould, 2014</span></span><span data-dcnode-id="3603" instrument_node="">). Policies that segregate refugees and asylum seekers from the rest of the community, or that limit contact to minimal and/or unequal interactions between groups and individuals, will undermine efforts at integration.</span></div><div class="indent" data-dcnode-id="3591"><span data-dcnode-id="3601" instrument_node="">Resettlement of refugees into small towns in North America is not just imposed by central governments but can be sought after and often negotiated by local communities who seek to build their population, or protect it from decline. Some of these communities then take active steps to facilitate integration by implementing local policies to create welcoming contexts (e.g., </span><span class="citationReference" data-dcnode-id="3599" id="cr91-2"><span data-dcnode-id="3600" instrument_node="">Smith, 2008</span></span><span data-dcnode-id="3598" instrument_node="">). Several of the articles in this special issue describe interventions that are intended to promote positive intergroup contact as part of a program to promote welcoming communities. In many cases, supporting high-quality intergroup contact plays a key role. For example, in her </span><span class="C00279 dictionaryTerm docDashedBottom" data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">case study</span></span><span data-dcnode-id="3595" instrument_node=""> of the Natural Helpers Program, </span><span class="citationReference" data-dcnode-id="3593" id="cr58-1"><span data-dcnode-id="3594" instrument_node="">Lamping (2018)</span></span><span data-dcnode-id="3592" instrument_node=""> describes a successful integration program that embodies many of the elements deemed to be essential to the promotion of positive intergroup contact. The initiative is grounded in the shared commitment to principles that require all of the stakeholders, including those holding positions of power, to create a space for newcomers’ claims for justice and recognition. The initiative is also reshaping the city overall, as the Natural Helpers are engaging agencies and identifying ways to shift how these agencies provide services to be more adaptive to the needs of forced migrants. This initiative is explicitly enacting the two-way change, between both newcomers and hosts, that is required for integration to happen. Lamping argues that this reframing was only possible under the umbrella of the larger welcoming community initiative that the city had taken on.</span></div><div class="subsect1" data-dcnode-id="3539" id="s17"><h3 data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">Predictors of Quality Contact in Integration Interventions</span></h3><div class="indent" data-dcnode-id="3581"><span data-dcnode-id="3588" instrument_node="">Both </span><span class="citationReference" data-dcnode-id="3586" id="cr4-1"><span data-dcnode-id="3587" instrument_node="">Atkinson (2018)</span></span><span data-dcnode-id="3585" instrument_node=""> and </span><span class="citationReference" data-dcnode-id="3583" id="cr41-3"><span data-dcnode-id="3584" instrument_node="">Hayes and Endale (2018)</span></span><span data-dcnode-id="3582" instrument_node=""> describes the importance of interpersonal relationships between refugee newcomers and other members of the community as successful pathways to integration, rather than interventions that depend on relationships to organizations. Atkinson focuses on a mentorship program for refugees in Australia, interviewing both mentors and mentees about their experiences. Atkinson developes a notion of forging a new identity, that of a shared learning community with shared goals, which encompasses both mentors and mentees, and reflects on what is learned and discussed within this new community. Although both mentors and mentees were very positive about the program, Atkinson also notes that the relationships could challenge the assumptions and comfort zones of mentors when mentees did not conform to their expectations.</span></div><div class="indent" data-dcnode-id="3567"><span data-dcnode-id="3580" instrument_node="">This finding highlights one of the challenges of initiatives promoting intergroup contact as a means of building integration. Research on volunteerism has found that the giving of assistance between groups of differing status can be an affirmation of the social dominance of those providing help (e.g., </span><span class="citationReference" data-dcnode-id="3578" id="cr71-1"><span data-dcnode-id="3579" instrument_node="">Nadler, 2002</span></span><span data-dcnode-id="3577" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3575" id="cr87-1"><span data-dcnode-id="3576" instrument_node="">Schellhaas &amp; Dovidio, 2016</span></span><span data-dcnode-id="3574" instrument_node="">). Although assistance offered by higher power groups is often welcomed by those with less power or status, it depends on the nature of, and motivations for, the help. When higher status groups offer dependency help, providing solutions rather than supporting the recipient to build their own solutions, the assistance can be perceived as reinforcing the inequality between groups (</span><span class="citationReference" data-dcnode-id="3572" id="cr72-1"><span data-dcnode-id="3573" instrument_node="">Nadler &amp; Chernyak-Hai, 2014</span></span><span data-dcnode-id="3571" instrument_node="">). As a result, it can be perceived negatively by the lower status group, even when it is offered out of genuine caring (</span><span class="citationReference" data-dcnode-id="3569" id="cr36-1"><span data-dcnode-id="3570" instrument_node="">Halabi &amp; Nadler, 2017</span></span><span data-dcnode-id="3568" instrument_node="">).</span></div><div class="indent" data-dcnode-id="3551"><span class="citationReference" data-dcnode-id="3565" id="cr4-2"><span data-dcnode-id="3566" instrument_node="">Atkinson (2018)</span></span><span data-dcnode-id="3564" instrument_node=""> also notes that mentors evoked the construct of a shared humanity, which can be a construction of a shared identity that facilitates positive experiences of intergroup helping (</span><span class="citationReference" data-dcnode-id="3562" id="cr36-2"><span data-dcnode-id="3563" instrument_node="">Halabi &amp; Nadler, 2017</span></span><span data-dcnode-id="3561" instrument_node="">). However, in intergroup contact situations between majority and </span><span class="M01212 dictionaryTerm docDashedBottom" data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">minority groups</span></span><span data-dcnode-id="3558" instrument_node=""> there is also the danger that this construction of identity may be an instance of a color-blind ideology (</span><span class="citationReference" data-dcnode-id="3556" id="cr84-1"><span data-dcnode-id="3557" instrument_node="">Richeson &amp; Nussbaum, 2004</span></span><span data-dcnode-id="3555" instrument_node="">). Color-blind ideologies are statements of equality, often accompanied by a resistance to discussing between-group differences. The endorsement of a color-blind ideology by those in dominant social groups can ultimately deny the experiences of exclusion or discrimination faced by minority group members and has been found to undermine the positive benefits of intergroup contact (Tropp &amp; Page-Gould, 2015; </span><span class="citationReference" data-dcnode-id="3553" id="cr86-1"><span data-dcnode-id="3554" instrument_node="">Saguy, Dovidio, &amp; Pratto, 2008</span></span><span data-dcnode-id="3552" instrument_node="">).</span></div><div class="indent" data-dcnode-id="3540"><span data-dcnode-id="3550" instrument_node="">Among volunteers at agencies working with resettled refugees, perceiving refugees as helpless can serve interpersonal or value needs among the volunteers, who can enact the script of themselves as active citizens with refugees as benefactors of their efforts. As a result, proposed support for refugee newcomers can be created in ways that fail to meet their needs (e.g., the one-stop solution described by </span><span class="citationReference" data-dcnode-id="3548" id="cr58-2"><span data-dcnode-id="3549" instrument_node="">Lamping, 2018</span></span><span data-dcnode-id="3547" instrument_node="">) and the demands for agency by refugees can lead to misunderstandings, discomfort and conflict (</span><span class="citationReference" data-dcnode-id="3545" id="cr4-3"><span data-dcnode-id="3546" instrument_node="">Atkinson, 2018</span></span><span data-dcnode-id="3544" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3542" id="cr58-3"><span data-dcnode-id="3543" instrument_node="">Lamping, 2018</span></span><span data-dcnode-id="3541" instrument_node="">). Notably, some volunteers in these papers challenged this frame, and the Natural Helpers program described by Lamping began to create intentional acknowledgment of newcomer agency, structures and processes to engage newcomers as stakeholders in the program, rather than as beneficiaries.</span></div></div></div><div class="section ftJumpToAnchor" data-dcnode-id="3519" id="s18"><div class="topLevelHeadingContainer ftSection" data-dcnode-id="3535" fragment="s18" id="s18"><h2 data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">Reframing the Discourse</span></h2></div><div class="indent" data-dcnode-id="3530"><span data-dcnode-id="3534" instrument_node="">The papers in this issue suggest that intergroup contact can be effective in supporting integration when it supports ongoing relationships. But the benefits are limited if refugee stereotypes go unchallenged. Several articles address initiatives that challenge the stigmatized identity of “refugee.” </span><span class="citationReference" data-dcnode-id="3532" id="cr59-1"><span data-dcnode-id="3533" instrument_node="">Lenette (2018)</span></span><span data-dcnode-id="3531" instrument_node=""> notes that the media can also be a site of resistance to dominant discourses around refugees, as is the case of political cartoons. Lenette argues that cartoons provide a window into the major issues being discussed in public discourse. Moreover, these not only reflect but shape public discourse by drawing attention to contradictions and hypocrisies in public and political discourse “at a glance.” Cartoons may perhaps reach people who might not otherwise read more detailed documents on the topic and thus have a far-reaching impact.</span></div><div class="indent" data-dcnode-id="3522"><span data-dcnode-id="3529" instrument_node="">Others note that although refugee identity is stigmatized, the shared identity can be built on for activism to create change. In Carvalho’s and Pinto’s study of residents in a refugee camp and Lukunka’s study of returnees to Burundi, refugee identity was segregated, but also connected to two important elements: </span><span class="S02021 dictionaryTerm docDashedBottom" data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">social support</span></span><span data-dcnode-id="3526" instrument_node=""> and citizenship. Participants in these settings were able to use these identities to build mutually supportive networks that provided immediate material and information support, as well as building their collective power to change the conditions of their lives in the future through collective action. In Lukunka’s study of Burundi returnees, local residents who had stayed during the conflict (“stayees”) indicated admiration for the resilience and agency of the returnees as they organized for change, suggesting that these activities also changed their public image. Importantly, the returnees also worked collectively to claim their rights, as is consistent with the notion of active citizenship discussed by </span><span class="citationReference" data-dcnode-id="3524" id="cr58-4"><span data-dcnode-id="3525" instrument_node="">Lamping (2018)</span></span><span data-dcnode-id="3523" instrument_node="">.</span></div><div class="indent" data-dcnode-id="3520"><span data-dcnode-id="3521" instrument_node="">The Natural Helpers initiative that Lamping described is an example of how an agency re-imagined intergroup helping to promote a welcoming community and support integration. By working with the Natural Helpers (community members with migration experience who were already offering assistance to other members of the community), agency members were challenged to rethink the traditional frames of refugees as helpless and the need for volunteers to step in and fix problems. Even the process of training needed to be reconceptualized, away from the trainees being passive recipients of information to an interactive space with dialogue and opportunities for practicing skills and processes. Through community consultations and engagement with the Natural Helpers, the agency was challenged to engage in “intentional recognition” of forced migrant newcomers as community stakeholders. In this framing, the primary goal of resettlement is not to provide services, as such, but to build community relationships and a welcoming community.</span></div></div><div class="section ftJumpToAnchor" data-dcnode-id="3476" id="s19"><div class="topLevelHeadingContainer ftSection" data-dcnode-id="3516" fragment="s19" id="s19"><h2 class="doubleHeightTopLevelHeading" data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">Policies, Social Context, and Refugee Integration</span></h2></div><div class="indent" data-dcnode-id="3484"><span data-dcnode-id="3515" instrument_node="">The articles in this special issue describe how policies at the level of political bodies (</span><span class="citationReference" data-dcnode-id="3513" id="cr14-4"><span data-dcnode-id="3514" instrument_node="">Bose, 2018</span></span><span data-dcnode-id="3512" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3510" id="cr27-4"><span data-dcnode-id="3511" instrument_node="">DeBono, 2018</span></span><span data-dcnode-id="3509" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3507" id="cr63-2"><span data-dcnode-id="3508" instrument_node="">Lukunka, 2018</span></span><span data-dcnode-id="3506" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3504" id="cr89-2"><span data-dcnode-id="3505" instrument_node="">Schulz and Taylor, 2018</span></span><span data-dcnode-id="3503" instrument_node="">), social institutions (</span><span class="citationReference" data-dcnode-id="3501" id="cr16-3"><span data-dcnode-id="3502" instrument_node="">Carvalho &amp; Pinto, 2018</span></span><span data-dcnode-id="3500" instrument_node="">, </span><span class="citationReference" data-dcnode-id="3498" id="cr41-4"><span data-dcnode-id="3499" instrument_node="">Hayes and Endale, 2018</span></span><span data-dcnode-id="3497" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3495" id="cr59-2"><span data-dcnode-id="3496" instrument_node="">Lenette, 2018</span></span><span data-dcnode-id="3494" instrument_node="">) and organizations (</span><span class="citationReference" data-dcnode-id="3492" id="cr4-4"><span data-dcnode-id="3493" instrument_node="">Atkinson, 2018</span></span><span data-dcnode-id="3491" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3489" id="cr58-5"><span data-dcnode-id="3490" instrument_node="">Lamping, 2018</span></span><span data-dcnode-id="3488" instrument_node="">) create </span><span class="S01831 dictionaryTerm docDashedBottom" data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">social contexts</span></span><span data-dcnode-id="3485" instrument_node=""> that can facilitate or impede refugee integration. What is clear from these articles is that integration is not just about the skills and efforts of refugees themselves, but rather the interaction between refugees and their social environments. A central aspect of the integration process is public opinions and attitudes, which both shape and are shaped by governmental policies, and which determine opportunities for inclusion and participation on the part of refugees.</span></div><div class="indent" data-dcnode-id="3479"><span data-dcnode-id="3483" instrument_node="">Policies respond to real needs and challenges of costs and the </span><span class="D01383 dictionaryTerm docDashedBottom" data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">distribution</span></span><span data-dcnode-id="3480" instrument_node=""> of services. However, they are also influenced by, and influence, constructed refugee identities. The articles in this issue reveal the dominant stereotypes of passive, helpless victims, and immoral and violent criminals. On resettlement, those who arrive through refugee programs often struggle to leave behind the refugee identity and develop a new identity as citizens of their new home. In situations of extreme segregation, refugees engage their shared identity to demand greater opportunities for agency, opportunity and hope for the future.</span></div><div class="indent" data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">The most promising policies to support refugee integration are those that challenge these stereotypes by creating opportunities for agency and autonomy, and for building positive relationships with members of the communities refugees reside in or settle into. As noted in several of these articles, the challenge of refugee integration is the creation of new communities, where all are welcome.</span></div></div></div><div class="refList" data-dcnode-id="37"><div class="topLevelHeadingContainer ftSection" data-dcnode-id="3472" fragment="articleRefList_pac_24_3_265" id="articleRefList_pac_24_3_265"><h2 data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">References</span></h2></div><ul class="referenceList" data-dcnode-id="38"><li class="striped" data-dcnode-id="3446" id="c1"><div class="citText" data-dcnode-id="3448"><span class="person-name" data-dcnode-id="3466"><span class="surname" data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">Ager</span></span><span data-dcnode-id="3469" instrument_node="">, </span><span class="givenNames" data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">A.</span></span></span><span data-dcnode-id="3465" instrument_node="">, &amp; </span><span class="person-name" data-dcnode-id="3459"><span class="surname" data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">Strang</span></span><span data-dcnode-id="3462" instrument_node="">, </span><span class="givenNames" data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">A.</span></span></span><span data-dcnode-id="3458" instrument_node=""> (2008). Understanding integration: A conceptual framework. </span><cite class="citationSource" data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">Journal of Refugee Studies</span></cite><span data-dcnode-id="3455" instrument_node="">, </span><em data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">21</span></em><span data-dcnode-id="3452" instrument_node="">, 166–191. </span><a data-dcnode-id="3450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1093/jrs/fen016"><span data-dcnode-id="3451" instrument_node="">https://doi.org/10.1093/jrs/fen016</span></a><ul class="refListItemLinks" data-dcnode-id="3449"></ul></div><br data-dcnode-id="3447"></li><li class="striped" data-dcnode-id="3415" id="c2"><div class="citText" data-dcnode-id="3417"><span class="person-name" data-dcnode-id="3440"><span class="surname" data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">Aiken</span></span><span data-dcnode-id="3443" instrument_node="">, </span><span class="givenNames" data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">S.</span></span></span><span data-dcnode-id="3439" instrument_node="">, </span><span class="person-name" data-dcnode-id="3433"><span class="surname" data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">Lyon</span></span><span data-dcnode-id="3436" instrument_node="">, </span><span class="givenNames" data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">D.</span></span></span><span data-dcnode-id="3432" instrument_node="">, &amp; </span><span class="person-name" data-dcnode-id="3426"><span class="surname" data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">Thorburn</span></span><span data-dcnode-id="3429" instrument_node="">, </span><span class="givenNames" data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">M.</span></span></span><span data-dcnode-id="3425" instrument_node=""> (2014). Introduction to crimmigration, surveillance and “security threats”: A multidisciplinary dialogue. </span><cite class="citationSource" data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">Queen’s Law Journal</span></cite><span data-dcnode-id="3422" instrument_node="">, </span><em data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">40</span></em><span data-dcnode-id="3419" instrument_node="">, 1–11.</span><ul class="refListItemLinks" data-dcnode-id="3418"></ul></div><br data-dcnode-id="3416"></li><li class="striped" data-dcnode-id="3398" id="c3"><div class="citText" data-dcnode-id="3400"><span class="person-name" data-dcnode-id="3409"><span class="surname" data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">Alkouzaa</span></span><span data-dcnode-id="3412" instrument_node="">, </span><span class="givenNames" data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">R.</span></span></span><span data-dcnode-id="3408" instrument_node=""> (2018). Violent crime rises in Germany and is attributed to refugees. </span><cite class="citationSource" data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">Reuters</span></cite><span data-dcnode-id="3405" instrument_node="">. Retrieved from</span><span class="citText" data-dcnode-id="3402"><a data-dcnode-id="3403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-europe-migrants-germany-crime/violent-crime-rises-in-germany-and-is-attributed-to-refugees-idUSKBN1ES16J"><span data-dcnode-id="3404" instrument_node="">https://www.reuters.com/article/us-europe-migrants-germany-crime/violent-crime-rises-in-germany-and-is-attributed-to-refugees-idUSKBN1ES16J</span></a></span><ul class="refListItemLinks" data-dcnode-id="3401"></ul></div><br data-dcnode-id="3399"></li><li class="striped" data-dcnode-id="3376" id="c4"><div class="citText" data-dcnode-id="3378"><span class="person-name" data-dcnode-id="3392"><span class="surname" data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">Atkinson</span></span><span data-dcnode-id="3395" instrument_node="">, </span><span class="givenNames" data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">M.</span></span></span><span data-dcnode-id="3391" instrument_node=""> (2018). Refugee mentoring: Sharing the journey. </span><cite class="citationSource" data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">Peace and Conflict: Journal of Peace Psychology</span></cite><span data-dcnode-id="3388" instrument_node="">, </span><em data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">24</span></em><span data-dcnode-id="3385" instrument_node="">, 338–342. </span><a data-dcnode-id="3383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1037/pac0000316"><span data-dcnode-id="3384" instrument_node="">https://doi.org/10.1037/pac0000316</span></a><ul class="refListItemLinks" data-dcnode-id="3379"><li data-dcnode-id="3380"><a class="psycINFO" data-dcnode-id="3381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//psycnet.apa.org/record/2018-39059-011" target="_blank"><span data-dcnode-id="3382" instrument_node="">

          </span></a></li></ul></div><br data-dcnode-id="3377"></li><li class="striped" data-dcnode-id="3343" id="c5"><div class="citText" data-dcnode-id="3345"><span class="person-name" data-dcnode-id="3370"><span class="surname" data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">Bakker</span></span><span data-dcnode-id="3373" instrument_node="">, </span><span class="givenNames" data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">L.</span></span></span><span data-dcnode-id="3369" instrument_node="">, </span><span class="person-name" data-dcnode-id="3363"><span class="surname" data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">Dagevos</span></span><span data-dcnode-id="3366" instrument_node="">, </span><span class="givenNames" data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">J.</span></span></span><span data-dcnode-id="3362" instrument_node="">, &amp; </span><span class="person-name" data-dcnode-id="3356"><span class="surname" data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">Engbersen</span></span><span data-dcnode-id="3359" instrument_node="">, </span><span class="givenNames" data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">G.</span></span></span><span data-dcnode-id="3355" instrument_node=""> (2014). The importance of resources and security in socio-economic integration of refugees. A study on the impact of length of stay in asylum accommodation and residence status on socio-economic integration for the four largest refugee groups in the Netherlands. </span><cite class="citationSource" data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">International Migration and Integration</span></cite><span data-dcnode-id="3352" instrument_node="">, </span><em data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">15</span></em><span data-dcnode-id="3349" instrument_node="">, 431–448. </span><a data-dcnode-id="3347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1007/s12134-013-0296-2"><span data-dcnode-id="3348" instrument_node="">https://doi.org/10.1007/s12134-013-0296-2</span></a><ul class="refListItemLinks" data-dcnode-id="3346"></ul></div><br data-dcnode-id="3344"></li><li class="striped" data-dcnode-id="3307" id="c6"><div class="citText" data-dcnode-id="3309"><span class="person-name" data-dcnode-id="3337"><span class="surname" data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">Bansak</span></span><span data-dcnode-id="3340" instrument_node="">, </span><span class="givenNames" data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">K.</span></span></span><span data-dcnode-id="3336" instrument_node="">, </span><span class="person-name" data-dcnode-id="3330"><span class="surname" data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">Hainmueller</span></span><span data-dcnode-id="3333" instrument_node="">, </span><span class="givenNames" data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">J.</span></span></span><span data-dcnode-id="3329" instrument_node="">, &amp; </span><span class="person-name" data-dcnode-id="3323"><span class="surname" data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">Hangartner</span></span><span data-dcnode-id="3326" instrument_node="">, </span><span class="givenNames" data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">D.</span></span></span><span data-dcnode-id="3322" instrument_node=""> (2016). How economic, humanitarian, and religious concerns shape European attitudes toward asylum seekers. </span><cite class="citationSource" data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">Science</span></cite><span data-dcnode-id="3319" instrument_node="">, </span><em data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">354</span></em><span data-dcnode-id="3316" instrument_node="">, 217–222. </span><a data-dc
