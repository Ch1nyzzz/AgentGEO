</span><meta content="More people are currently displaced from their homes by war and conflict than ever previously recorded, and many are displaced for decades. As a result, there is increasing interest in promoting stable, if not permanent, solutions. The success of these solutions is in part evaluated by how well refugees are integrating into their new communities. Integration, in its broadest sense, refers to inclusion and participation, both economically and socially. Although the focus is often on how refugees change to integrate, successful integration requires a social context that supports inclusion and participation. The focus of this special issue is on the ways in which policies of settlement at the international, national, regional, and local level support or hinder integration by affecting the social context. These policies can affect the social context by directly limiting economic and social participation, but also by intentionally or unintentionally shaping community attitudes. The articles in this special issue consider the impact of policies on the social context along the entire migration pathway, from asylum seeking and refugee camps, to resettlement in new countries or return to countries of origin. The articles come from a range of disciplines and countries but a common theme that emerges is how policies shape refugee identities, stereotypes and interactions in ways that then affect community welcome. These articles shed light on the importance of policies and initiatives that challenge our attitudes and beliefs about refugees as an important element for successful integration. (PsycINFO Database Record (c) 2018 APA, all rights reserved)" data-dcnode-id="4737" name="description"><span data-dcnode-id="4736" instrument_node="">

</span><meta content="text/html; charset=utf-8" data-dcnode-id="4435" http-equiv="Content-Type"><link data-dcnode-id="4434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.apa.org/pn/css/psycnet_fulltext_print.css&amp;raw" rel="stylesheet" type="text/css"><title data-dcnode-id="4432">PsycARTICLES: Refugee Integration: Research and Policy</title><div data-dcnode-id="4" id="psycnet_fulltext_article_content"><div class="contentItem ftDocument" data-dcnode-id="5"><div data-dcnode-id="4411" id="printerFriendlyHeader"><div class="articleCopyrightLine" data-dcnode-id="4429" style=" clear: both; "><div data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">© 2018 American Psychological Association</span></div></div><div class="printerFriendlyHeader-line" data-dcnode-id="4427" style="display: block; margin: 0;"><span data-dcnode-id="4428" instrument_node="">Peace and Conflict: Journal of Peace Psychology</span></div><div class="printerFriendlyHeader-line" data-dcnode-id="4419" style="display: block; margin: 0;"><span data-dcnode-id="4426" instrument_node="">2018,  </span><span data-dcnode-id="4424" id="volLocale"><span data-dcnode-id="4425" instrument_node="">Vol</span></span><span data-dcnode-id="4423" instrument_node="">. 24, </span><span data-dcnode-id="4421" id="numberText"><span data-dcnode-id="4422" instrument_node="">No</span></span><span data-dcnode-id="4420" instrument_node="">. 3, 265–276</span></div><div class="printerFriendlyHeader-line" data-dcnode-id="4412" style="display: block; margin: 0; width: 65%;"><span data-dcnode-id="4417" id="specialIssueText"><span data-dcnode-id="4418" instrument_node="">Special Issue: </span></span><span data-dcnode-id="4416" instrument_node="">Refugee Integration: Research and Policy (</span><span data-dcnode-id="4414" id="editedByText"><span data-dcnode-id="4415" instrument_node="">Edited by</span></span><span data-dcnode-id="4413" instrument_node="">Michaela Hynie)</span></div></div><div class="articleTitleGroup" data-dcnode-id="4406"><h1 data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">Refugee Integration: Research and Policy</span></h1><div class="authorGroup" data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">Michaela Hynie</span></div></div><div class="articleAuthorAffsContainer ftContainerToggle" data-dcnode-id="4395"><div class="articleAuthorAffsHeading ftContainerToggleTrigger" data-dcnode-id="4403"><span class="authorAffHeader" data-dcnode-id="4404" id="authorAffiliationText"><span data-dcnode-id="4405" instrument_node="">Author Affiliations</span></span></div><table class="articleAuthorAffs ftContainerToggleDisplay" data-dcnode-id="4396"><tbody data-dcnode-id="4397"><tr class="striped" data-dcnode-id="4398"><td class="affAuthorName" data-dcnode-id="4401"><span data-dcnode-id="4402" instrument_node="">
Michaela Hynie</span></td><td data-dcnode-id="4399"><span data-dcnode-id="4400" instrument_node="">York University</span></td></tr></tbody></table></div><div class="articleCitationContainer" data-dcnode-id="4388"><div class="articleCitationHeading" data-dcnode-id="4394"></div><p class="articleCitationText" data-dcnode-id="4389"><span data-dcnode-id="4393" instrument_node="">Hynie, M. (2018). Refugee integration: Research and policy. </span><em data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">Peace and Conflict: Journal of Peace Psychology, 24</span></em><span data-dcnode-id="4390" instrument_node="">(3), 265-276. http://dx.doi.org/10.1037/pac0000326</span></p></div><div class="topLevelHeadingContainer ftSection" data-dcnode-id="4385" fragment="articleAbstract_n41ee1a74b8e49861" id="articleAbstract_n41ee1a74b8e49861"><h2 data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">Abstract</span></h2></div><div class="abstractsContainer" data-dcnode-id="4374"><div data-dcnode-id="4375"><div data-dcnode-id="4376"><div class="indent" data-dcnode-id="4377"><span data-dcnode-id="4384" instrument_node="">More people are currently displaced from their homes by war and conflict than ever previously recorded, and many are displaced for decades. As a result, there is increasing interest in promoting stable, if not permanent, solutions. The success of these solutions is in part evaluated by how well refugees are integrating into their new communities. Integration, in its broadest sense, refers to inclusion and participation, both economically and socially. Although the focus is often on how refugees change to integrate, successful integration requires a </span><span class="S01831 dictionaryTerm docDashedBottom" data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">social context</span></span><span data-dcnode-id="4381" instrument_node=""> that supports inclusion and participation. The focus of this special issue is on the ways in which policies of settlement at the international, national, regional, and local level support or hinder integration by affecting the social context. These policies can affect the social context by directly limiting economic and social participation, but also by intentionally or unintentionally shaping </span><span class="C02074 dictionaryTerm docDashedBottom" data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">community attitudes</span></span><span data-dcnode-id="4378" instrument_node="">. The articles in this special issue consider the impact of policies on the social context along the entire migration pathway, from asylum seeking and refugee camps, to resettlement in new countries or return to countries of origin. The articles come from a range of disciplines and countries but a common theme that emerges is how policies shape refugee identities, stereotypes and interactions in ways that then affect community welcome. These articles shed light on the importance of policies and initiatives that challenge our attitudes and beliefs about refugees as an important element for successful integration.</span></div></div></div></div><div class="topLevelHeadingContainer ftSection" data-dcnode-id="4371" fragment="articleAbstract_n738b6a682ba4e1c3" id="articleAbstract_n738b6a682ba4e1c3"><h2 data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">Public Significance Statement</span></h2></div><div class="abstractsContainer" data-dcnode-id="4363"><div data-dcnode-id="4364"><div data-dcnode-id="4365"><div class="indent" data-dcnode-id="4366"><span data-dcnode-id="4370" instrument_node="">Refugee settlement policies at the national and local level influence refugee integration by shaping refugees’ ability to participate socially and economically. They also have long-term impact on integration by shaping </span><span class="C02074 dictionaryTerm docDashedBottom" data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">community attitudes</span></span><span data-dcnode-id="4367" instrument_node=""> through their impact on stereotypes, perceptions of threat, and opportunities for positive interactions.</span></div></div></div></div><div class="keywords" data-dcnode-id="4358"><p data-dcnode-id="4359"><span data-dcnode-id="4361" id="keywordsText"><span data-dcnode-id="4362" instrument_node="">KEYWORDS: </span></span><span data-dcnode-id="4360" instrument_node="">refugees, integration, asylum seekers, intergroup relationships, policy</span></p></div><div class="topArticleNoHeadingDivider" data-dcnode-id="4357"></div><div class="articleBody" data-dcnode-id="3475"><div class="section ftJumpToAnchor" data-dcnode-id="4279" id="s1"><div class="indent" data-dcnode-id="4340"><span data-dcnode-id="4356" instrument_node="">The </span><em data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">Convention Related to the Status of Refugees</span></em><span data-dcnode-id="4353" instrument_node=""> (the Convention) defines a refugee as a person who has crossed international borders as a result of a “well-founded fear of being persecuted” on account of their religious, political, sexual, or other </span><span class="S01888 dictionaryTerm docDashedBottom" data-dcnode-id="4351"><span data-dcnode-id="4352" instrument_node="">social identity</span></span><span data-dcnode-id="4350" instrument_node="">, and whose country will not or cannot protect them or may in fact be the body that is persecuting them (</span><span class="citationReference" data-dcnode-id="4348" id="cr105-1"><span data-dcnode-id="4349" instrument_node="">United Nations General Assembly, 1951</span></span><span data-dcnode-id="4347" instrument_node="">). Although the number of forced migrants vary widely from year to year, the numbers of refugees have generally increased every decade since the Convention’s establishment in 1951. Current numbers are greater than ever previously recorded (</span><span class="citationReference" data-dcnode-id="4345" id="cr104-1"><span data-dcnode-id="4346" instrument_node="">United Nations High Commissioner for Refugees [UNHCR], 2017</span></span><span data-dcnode-id="4344" instrument_node="">). In 2016, there were 65.6 million people living in situations of forced displacement, 22.5 million of them displaced across international borders. The latter are refugees, 17.2 million of whom are under the mandate of the UNHCR and the remainder under the mandate of United Nations Relief and Works Agency for Palestine Refugees in the Near East (UNRWA). The recent increases in registered refugees have been paralleled by an increased number of asylum seekers. Asylum seekers are people who have applied for recognition as refugees under the Convention definition. In 2016 there were 2 million new claims made for asylum (</span><span class="citationReference" data-dcnode-id="4342" id="cr104-2"><span data-dcnode-id="4343" instrument_node="">UNHCR, 2017</span></span><span data-dcnode-id="4341" instrument_node="">).</span></div><div class="indent" data-dcnode-id="4308"><span data-dcnode-id="4339" instrument_node="">Although the vast majority of refugees (84%) reside in lower income countries, high income countries have also seen recent abrupt increases in numbers. Germany is the in the top 10 hosting nations in terms of absolute numbers (</span><span class="citationReference" data-dcnode-id="4337" id="cr103-1"><span data-dcnode-id="4338" instrument_node="">UNHCR, 2013</span></span><span data-dcnode-id="4336" instrument_node="">, </span><span class="citationReference" data-dcnode-id="4334" id="cr104-4"><span data-dcnode-id="4335" instrument_node="">2017</span></span><span data-dcnode-id="4333" instrument_node="">). Germany hosted 669,500 refugees by the end of 2016, and registered 772,400 new claims for asylum. Although the absolute number is high, because of the size of Germany’s population this amounts to approximately 8 refugees per 1000 residents. Sweden hosts more refugees by population size. It is the only high-income country in this top 10 list, with approximately 23 refugees for every 1000 Swedish residents. By comparison, Lebanon, the country at the top of the list on this metric, hosted 160 refugees for every 1,000 residents. Nonetheless, the increase in the numbers of refugees and asylum seekers in high income countries has been rapid. It has been accompanied by an expansion of settlement support initiatives (e.g., Germany’s 2015 refugee response, </span><span class="citationReference" data-dcnode-id="4331" id="cr45-1"><span data-dcnode-id="4332" instrument_node="">Horn, 2015</span></span><span data-dcnode-id="4330" instrument_node="">; Canada’s Syrian resettlement initiative, </span><span class="citationReference" data-dcnode-id="4328" id="cr50-1"><span data-dcnode-id="4329" instrument_node="">IRCC, 2017</span></span><span data-dcnode-id="4327" instrument_node="">) but also intense debate around the social and economic costs of hosting refugees (</span><span class="citationReference" data-dcnode-id="4325" id="cr17-1"><span data-dcnode-id="4326" instrument_node="">Casati, 2017</span></span><span data-dcnode-id="4324" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4322" id="cr22-1"><span data-dcnode-id="4323" instrument_node="">Costello &amp; Mouzourakis, 2016</span></span><span data-dcnode-id="4321" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4319" id="cr25-1"><span data-dcnode-id="4320" instrument_node="">Czymara &amp; Schmidt-Catran, 2017</span></span><span data-dcnode-id="4318" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4316" id="cr69-1"><span data-dcnode-id="4317" instrument_node="">Mulvey, 2010</span></span><span data-dcnode-id="4315" instrument_node="">). With this debate has come a rise in anti-immigrant attitudes, along with a shift in election patterns toward increased support for explicitly anti-immigrant parties (e.g., the Freedom Party in Austria, the National Front in France, and the Alternative for Germany) and initiatives (e.g., Brexit in the United Kingdom). In many cases, government policies have responded to this public and political pressure, as well as concerns about the costs of hosting refugees and asylum seekers, with increasingly restrictive settlement policies (</span><span class="citationReference" data-dcnode-id="4313" id="cr97-1"><span data-dcnode-id="4314" instrument_node="">Szczepanikova, 2013</span></span><span data-dcnode-id="4312" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4310" id="cr106-1"><span data-dcnode-id="4311" instrument_node="">Weber &amp; Gelsthorpe, 2000</span></span><span data-dcnode-id="4309" instrument_node="">).</span></div><div class="indent" data-dcnode-id="4282"><span data-dcnode-id="4307" instrument_node="">In this introduction to the special issue on </span><em data-dcnode-id="4305"><span data-dcnode-id="4306" instrument_node="">Refugee Integration: Research and Policy</span></em><span data-dcnode-id="4304" instrument_node="">, we reflect on the impact of policies of settlement and/or asylum at the level of organizations, municipalities, states, and regions on refugee and asylum seeker integration. There is no single definition of integration, but our focus here is on integration as inclusion and participation (</span><span class="citationReference" data-dcnode-id="4302" id="cr19-1"><span data-dcnode-id="4303" instrument_node="">Castles, Korac, Vasta, &amp; Vertovec, 2002</span></span><span data-dcnode-id="4301" instrument_node="">). Integration for all newcomers is facilitated or hindered by settlement policies, but refugees are particularly susceptible to changes in the social and political context. First, refugees typically arrive in more vulnerable circumstances than other immigrants. Refugees are less likely than voluntary migrants to arrive speaking the language of the country they settle in, have fewer economic resources and capital, more limited </span><span class="S01948 dictionaryTerm docDashedBottom" data-dcnode-id="4299"><span data-dcnode-id="4300" instrument_node="">social networks</span></span><span data-dcnode-id="4298" instrument_node=""> and supports, and are more likely to have been exposed to trauma prior to and during migration (</span><span class="citationReference" data-dcnode-id="4296" id="cr47-1"><span data-dcnode-id="4297" instrument_node="">Hynie, 2017</span></span><span data-dcnode-id="4295" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4293" id="cr60-1"><span data-dcnode-id="4294" instrument_node="">Li, Liddell, &amp; Nickerson, 2016</span></span><span data-dcnode-id="4292" instrument_node="">; but see </span><span class="citationReference" data-dcnode-id="4290" id="cr24-1"><span data-dcnode-id="4291" instrument_node="">Crawley, Duvall, Signoa, McMahon, &amp; Jones, 2016</span></span><span data-dcnode-id="4289" instrument_node="">). Second, a broader range of their settlement experiences are subject to more restrictive policies. For example, nations have explicit policies regarding refugee and asylum seeker rights that limit their employment, access to </span><span class="S02001 dictionaryTerm docDashedBottom" data-dcnode-id="4287"><span data-dcnode-id="4288" instrument_node="">social services</span></span><span data-dcnode-id="4286" instrument_node="">, housing, and education (</span><span class="citationReference" data-dcnode-id="4284" id="cr9-1"><span data-dcnode-id="4285" instrument_node="">Bloch &amp; Schuster, 2002</span></span><span data-dcnode-id="4283" instrument_node="">).</span></div><div class="indent" data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">Just as the route to asylum does not begin and end with resettlement, the pathway to refugee integration, and the construction and perception of refugee identities, spans the full range of migration. Thus, this special issue includes articles that explore the impact of local political and social policies across the entire migration experience, from asylum seekers and refugees, to permanently settled refugees, through return and resettlement. In doing so, the articles are both international and interdisciplinary. They examine policies and integration in several different countries and continents and explore these issues through different analytic frames in an effort to provide a global picture of this global phenomenon.</span></div></div><div class="section ftJumpToAnchor" data-dcnode-id="4233" id="s2"><div class="topLevelHeadingContainer ftSection" data-dcnode-id="4276" fragment="s2" id="s2"><h2 data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">Refugee Migration</span></h2></div><div class="indent" data-dcnode-id="4262"><span data-dcnode-id="4275" instrument_node="">One can debate what the starting point is for refugee migration, but one concrete and decisive moment is the point at which people cross international borders and formally request asylum in another country. Asylum can be sought as a refugee, or under other humanitarian conditions, including environmental disasters. Accessing protection under the Convention, however, begins with submitting a claim for recognition as a refugee. Asylum seekers are not eligible to the protection provided refugees until their claim has been approved. However, the Convention also provides guidelines regarding the rights of asylum seekers, although interpretation of these guidelines varies widely (</span><span class="citationReference" data-dcnode-id="4273" id="cr40-1"><span data-dcnode-id="4274" instrument_node="">Hatton, 2017</span></span><span data-dcnode-id="4272" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4270" id="cr105-2"><span data-dcnode-id="4271" instrument_node="">United Nations General Assembly, 1951</span></span><span data-dcnode-id="4269" instrument_node="">). People claiming asylum as refugees must be approved by the UNHCR, or the state in which they are seeking asylum, by demonstrating that they meet the Convention criteria. During times of large-scale exodus, as is currently happening in Syria, originating from the country generating these mass migrations may be determined sufficient for being given </span><span class="P02286 dictionaryTerm docDashedBottom" data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">prima facie</span></span><span data-dcnode-id="4266" instrument_node=""> refugee status (</span><span class="citationReference" data-dcnode-id="4264" id="cr85-1"><span data-dcnode-id="4265" instrument_node="">Rutinwa, 1994</span></span><span data-dcnode-id="4263" instrument_node="">).</span></div><div class="indent" data-dcnode-id="4242"><span data-dcnode-id="4261" instrument_node="">Once refugee status has been recognized, refugees should have access to rights and protections set out by the Convention but, again, these are interpreted differently by different governments at different times (</span><span class="citationReference" data-dcnode-id="4259" id="cr209-1"><span data-dcnode-id="4260" instrument_node="">Segona, 2005</span></span><span data-dcnode-id="4258" instrument_node="">). The refugee system was designed to support short-term solutions until permanent solutions to the forced displacement can be found. Refugees are thus typically not provided the means for long-term settlement; they are expected to leave once a permanent solution to their situation is found. Restrictions on access to housing, employment and services can therefore continue while temporary support of various kinds is provided (</span><span class="citationReference" data-dcnode-id="4256" id="cr9-2"><span data-dcnode-id="4257" instrument_node="">Bloch &amp; Schuster, 2002</span></span><span data-dcnode-id="4255" instrument_node="">). The greatest restrictions are found in refugee camps. The camps are planned and organized to manage crisis situations and to facilitate the </span><span class="D01383 dictionaryTerm docDashedBottom" data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">distribution</span></span><span data-dcnode-id="4252" instrument_node=""> of goods and management of a large and fluctuating population for short periods of time. Both formal and informal camps are usually situated in rural areas, with many being established at a distance from other settlements. In 2016, however, fewer than a third of refugees lived in formally managed camps, while about 60% of refugees were living in private residences in urban settings (</span><span class="citationReference" data-dcnode-id="4250" id="cr104-5"><span data-dcnode-id="4251" instrument_node="">UNHCR, 2017</span></span><span data-dcnode-id="4249" instrument_node="">). Moreover, the model of short-term refuge seems increasingly less relevant. Permanent solutions are attained for very few of the displaced; most end up in what </span><span class="citationReference" data-dcnode-id="4247" id="cr207-1"><span data-dcnode-id="4248" instrument_node="">Hyndman and Giles (2016)</span></span><span data-dcnode-id="4246" instrument_node=""> described as “extended exile.” Since the late 1990s, the average length of displacement has ranged between 10 and 15 years but for those in protracted exile situations (those lasting 5 years or longer), the average length of displacement has increased to over 20 years, with some of the largest “temporary” refugee camps now in their third decade of existence (</span><span class="citationReference" data-dcnode-id="4244" id="cr28-1"><span data-dcnode-id="4245" instrument_node="">Devictor &amp; Do, 2017</span></span><span data-dcnode-id="4243" instrument_node="">).</span></div><div class="indent" data-dcnode-id="4234"><span data-dcnode-id="4241" instrument_node="">There are three possible permanent solutions for refugees. The preferred solution according to many states, and the UNHCR, is voluntary return to the country of origin. In 2016, the number of refugees returning increased over previous years, but was still only 552,200 of the 22.5 million refugees. The second permanent solution is naturalization, or permanent integration into the country in which people have sought asylum. There were only 23,000 naturalizations reported in 23 countries in 2016, with Canada leading in terms of numbers at 16,300 (</span><span class="citationReference" data-dcnode-id="4239" id="cr104-7"><span data-dcnode-id="4240" instrument_node="">UNHCR, 2017</span></span><span data-dcnode-id="4238" instrument_node="">). The third permanent solution is resettlement, whereby refugees are screened and selected while in their country of asylum and resettled permanently into a third country, the vast majority through programs with UNHCR. In 2016, 189,300 refugees were resettled, with the United States, Canada, and Australia receiving the greatest numbers. Thus, although much of the work in this special issue focuses on integration for those refugees who have found permanent solutions, the manner in which long-term refugees integrate into their settings of asylum is an important question that is also addressed (</span><span class="citationReference" data-dcnode-id="4236" id="cr16-1"><span data-dcnode-id="4237" instrument_node="">Carvalho &amp; Pinto, 2018</span></span><span data-dcnode-id="4235" instrument_node="">).</span></div></div><div class="section ftJumpToAnchor" data-dcnode-id="4126" id="s3"><div class="topLevelHeadingContainer ftSection" data-dcnode-id="4230" fragment="s3" id="s3"><h2 data-dcnode-id="4231"><span data-dcnode-id="4232" instrument_node="">Refugee Integration</span></h2></div><div class="indent" data-dcnode-id="4219"><span data-dcnode-id="4229" instrument_node="">The struggle to build international policies that support access to permanent solutions is matched by the challenge of encouraging national and local policies that support refugees as they try to integrate into new communities. Although refugees face challenges as a result of negative impacts of their premigration and migration experiences, new challenges emerge at the end of the migration pathway. Successful integration has direct effects on well-being but may also mediate or moderate the effects of prior trauma (</span><span class="citationReference" data-dcnode-id="4227" id="cr47-2"><span data-dcnode-id="4228" instrument_node="">Hynie, 2017</span></span><span data-dcnode-id="4226" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4224" id="cr60-2"><span data-dcnode-id="4225" instrument_node="">Li et al., 2016</span></span><span data-dcnode-id="4223" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4221" id="cr68-1"><span data-dcnode-id="4222" instrument_node="">Miller &amp; Rasmussen, 2017</span></span><span data-dcnode-id="4220" instrument_node="">). Refugees’ ability to integrate, however, is strongly determined by policies that shape their social and material context.</span></div><div class="indent" data-dcnode-id="4202"><span data-dcnode-id="4218" instrument_node="">Most theories define successful integration for newcomers as equitable access to opportunities and resources, participation in the community and society, and feelings of security and belonging in their new homes (</span><span class="citationReference" data-dcnode-id="4216" id="cr1-1"><span data-dcnode-id="4217" instrument_node="">Ager &amp; Strang, 2008</span></span><span data-dcnode-id="4215" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4213" id="cr48-1"><span data-dcnode-id="4214" instrument_node="">Hynie, Korn, &amp; Tao, 2016</span></span><span data-dcnode-id="4212" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4210" id="cr78-1"><span data-dcnode-id="4211" instrument_node="">Phillimore &amp; Goodson, 2008</span></span><span data-dcnode-id="4209" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4207" id="cr91-1"><span data-dcnode-id="4208" instrument_node="">Smith, 2008</span></span><span data-dcnode-id="4206" instrument_node="">). Several midlevel models of integration exist that offer a framework for considering how policy affects the process of integration at these multiple levels. </span><span class="citationReference" data-dcnode-id="4204" id="cr1-2"><span data-dcnode-id="4205" instrument_node="">Ager and Strang (2008)</span></span><span data-dcnode-id="4203" instrument_node="">, for example, provided an influential and comprehensive model of integration with four levels: markers and means (housing, health, employment, education), which reflect what they call functional aspects of integration; social connections (social bonds, social bridges, social links), which represent different kinds of social relationships; facilitators (language and cultural knowledge, safety and stability); and foundation (rights and citizenship). These different levels of integration affect each other, such that changes in one level can support changes at other levels.</span></div><div class="indent" data-dcnode-id="4176"><span data-dcnode-id="4201" instrument_node="">Although integration research often focuses on changes in newcomers themselves, integration is a process whereby both the receiving communities and the newcomers change, and change each other (</span><span class="citationReference" data-dcnode-id="4199" id="cr19-2"><span data-dcnode-id="4200" instrument_node="">Castles et al., 2002</span></span><span data-dcnode-id="4198" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4196" id="cr74-1"><span data-dcnode-id="4197" instrument_node="">Omidvar &amp; Richmond, 2003</span></span><span data-dcnode-id="4195" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4193" id="cr95-1"><span data-dcnode-id="4194" instrument_node="">Strang &amp; Ager, 2010</span></span><span data-dcnode-id="4192" instrument_node="">). The holistic integration model (HIM: </span><span class="citationReference" data-dcnode-id="4190" id="cr48-2"><span data-dcnode-id="4191" instrument_node="">Hynie et al., 2016</span></span><span data-dcnode-id="4189" instrument_node="">) builds on </span><span class="citationReference" data-dcnode-id="4187" id="cr1-3"><span data-dcnode-id="4188" instrument_node="">Ager and Strang’s (2008)</span></span><span data-dcnode-id="4186" instrument_node=""> model to strengthen the emphasis on changes within the </span><span class="S01831 dictionaryTerm docDashedBottom" data-dcnode-id="4184"><span data-dcnode-id="4185" instrument_node="">social context</span></span><span data-dcnode-id="4183" instrument_node=""> and on the interrelatedness of the different levels. In the HIM, social context includes the nature of the relationships between refugees and other members of their communities (social bonds within their communities and social bridges to other community members); general </span><span class="C02074 dictionaryTerm docDashedBottom" data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">community attitudes</span></span><span data-dcnode-id="4180" instrument_node=""> and beliefs about refugees (community welcome), which can shape everyday experiences and interactions; and institutional adaptation, which refers to the extent to which institutions and organizations that interact with refugees recognize and adapt to their unique needs, such as challenges they face in accessing formal documents from their country of origin, or the need for interpretation services. The HIM also adds the subjective aspects of sense of belonging and security (cf. </span><span class="citationReference" data-dcnode-id="4178" id="cr95-2"><span data-dcnode-id="4179" instrument_node="">Strang &amp; Ager, 2010</span></span><span data-dcnode-id="4177" instrument_node="">).</span></div><div class="indent" data-dcnode-id="4156"><span data-dcnode-id="4175" instrument_node="">The interrelatedness of the more functional aspects of integration is not surprising. Individuals with more limited language skills will have a greater difficulty finding employment or accessing education; those with inadequate housing risk poorer physical and mental health; and low levels of income and language skills predict accessibility of educational opportunities. However, these functional levels of integration also influence, and are influenced by, the </span><span class="S01831 dictionaryTerm docDashedBottom" data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">social context</span></span><span data-dcnode-id="4172" instrument_node=""> that refugees reside in, and the more psychological aspects of integration. For example, employment, education, and language skills have been shown to have a bidirectional relationship with the strength of social connections, especially relationships with those from other ethnic communities (</span><span class="citationReference" data-dcnode-id="4170" id="cr48-3"><span data-dcnode-id="4171" instrument_node="">Hynie et al., 2016</span></span><span data-dcnode-id="4169" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4167" id="cr53-1"><span data-dcnode-id="4168" instrument_node="">Kearns &amp; Whitley, 2015</span></span><span data-dcnode-id="4166" instrument_node="">). Poorer mental health has consistently been associated with limited language skills, poor housing, and underemployment (</span><span class="citationReference" data-dcnode-id="4164" id="cr13-1"><span data-dcnode-id="4165" instrument_node="">Bogic, Njoku, &amp; Priebe, 2015</span></span><span data-dcnode-id="4163" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4161" id="cr47-3"><span data-dcnode-id="4162" instrument_node="">Hynie, 2017</span></span><span data-dcnode-id="4160" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4158" id="cr60-3"><span data-dcnode-id="4159" instrument_node="">Li et al., 2016</span></span><span data-dcnode-id="4157" instrument_node="">).</span></div><div class="indent" data-dcnode-id="4127"><span data-dcnode-id="4155" instrument_node="">Settlement policies at multiple levels directly influence structural variables related to what </span><span class="citationReference" data-dcnode-id="4153" id="cr1-4"><span data-dcnode-id="4154" instrument_node="">Ager and Strang (2008)</span></span><span data-dcnode-id="4152" instrument_node=""> called the functional markers of refugee integration, like employment, </span><span class="H00208 dictionaryTerm docDashedBottom" data-dcnode-id="4150"><span data-dcnode-id="4151" instrument_node="">health care</span></span><span data-dcnode-id="4149" instrument_node="">, and housing. However, settlement policies also shape public opinion and so may have effects on multiple aspects of the </span><span class="S01831 dictionaryTerm docDashedBottom" data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">social context</span></span><span data-dcnode-id="4146" instrument_node="">. Policies can also influence public attitudes and perceptions through media and communication campaigns, and by shaping how community members interact with these newcomers, or by placing refugees in situations that elicit behaviors or characteristics that then influence how these newcomers are perceived (</span><span class="citationReference" data-dcnode-id="4144" id="cr17-2"><span data-dcnode-id="4145" instrument_node="">Casati, 2017</span></span><span data-dcnode-id="4143" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4141" id="cr19-3"><span data-dcnode-id="4142" instrument_node="">Castles et al., 2002</span></span><span data-dcnode-id="4140" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4138" id="cr69-2"><span data-dcnode-id="4139" instrument_node="">Mulvey, 2010</span></span><span data-dcnode-id="4137" instrument_node="">). More inclusive integration policies have been found to be associated with more </span><span class="P01777 dictionaryTerm docDashedBottom" data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">positive attitudes</span></span><span data-dcnode-id="4134" instrument_node=""> toward immigrants, a finding that has been attributed to their impact on how immigrants are perceived (</span><span class="citationReference" data-dcnode-id="4132" id="cr15-1"><span data-dcnode-id="4133" instrument_node="">Callens &amp; Meuleman, 2017</span></span><span data-dcnode-id="4131" instrument_node="">). Public attitudes toward refugees and asylum seekers can affect refugees’ abilities to form new social relationships with other groups in the community. They can also affect the willingness of institutions to implement policies that meet refugees’ unique needs. Public attitudes also shape policies and political debate, resulting in a cycle of mutual influence (</span><span class="citationReference" data-dcnode-id="4129" id="cr6-1"><span data-dcnode-id="4130" instrument_node="">Bansak, Hainmueller, &amp; Hangartner, 2016</span></span><span data-dcnode-id="4128" instrument_node="">). Thus, settlement and immigration policies at multiple levels can affect refugee integration both directly, by enhancing or limiting their access to the more functional aspects of integration, and also indirectly by influencing social environments to be more or less welcoming.</span></div></div><div class="section ftJumpToAnchor" data-dcnode-id="3829" id="s4"><div class="topLevelHeadingContainer ftSection" data-dcnode-id="4123" fragment="s4" id="s4"><h2 data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">Perceptions of Threat</span></h2></div><div class="subsect1" data-dcnode-id="3898" id="s5"><h3 data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">Realistic Threat</span></h3><div class="subsect2" data-dcnode-id="4036" id="s6"><h4 data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">Economic burden</span></h4><div class="indent" data-dcnode-id="4054"><span data-dcnode-id="4118" instrument_node="">Perceptions of threat are a key element in attitudes toward immigrants and refugees and in policy responses to them. </span><span class="R00297 dictionaryTerm docDashedBottom" data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">Realistic group conflict theory</span></span><span data-dcnode-id="4115" instrument_node=""> (</span><span class="citationReference" data-dcnode-id="4113" id="cr11-1"><span data-dcnode-id="4114" instrument_node="">Bobo, 1983</span></span><span data-dcnode-id="4112" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4110" id="cr51-1"><span data-dcnode-id="4111" instrument_node="">Jackson, 1993</span></span><span data-dcnode-id="4109" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4107" id="cr210-1"><span data-dcnode-id="4108" instrument_node="">Sherif, 1967</span></span><span data-dcnode-id="4106" instrument_node="">) proposes that prejudice and intergroup conflict emerge when members of a group feel threat to their group from the outgroup. It can be real or perceived, and not only to material resources that are controlled by one’s ingroup, such as jobs, </span><span class="H00208 dictionaryTerm docDashedBottom" data-dcnode-id="4104"><span data-dcnode-id="4105" instrument_node="">health care</span></span><span data-dcnode-id="4103" instrument_node="">, or housing, but also to the ingroup’s relative </span><span class="S02011 dictionaryTerm docDashedBottom" data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">social status</span></span><span data-dcnode-id="4100" instrument_node=""> (</span><span class="citationReference" data-dcnode-id="4098" id="cr11-2"><span data-dcnode-id="4099" instrument_node="">Bobo, 1983</span></span><span data-dcnode-id="4097" instrument_node="">, </span><span class="citationReference" data-dcnode-id="4095" id="cr203-1"><span data-dcnode-id="4096" instrument_node="">1988</span></span><span data-dcnode-id="4094" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4092" id="cr54-1"><span data-dcnode-id="4093" instrument_node="">Kinder &amp; Sears, 1981</span></span><span data-dcnode-id="4091" instrument_node="">). In high-income countries, concerns that refugees and asylum seekers will be an economic burden are prevalent (</span><span class="citationReference" data-dcnode-id="4089" id="cr17-3"><span data-dcnode-id="4090" instrument_node="">Casati, 2017</span></span><span data-dcnode-id="4088" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4086" id="cr22-2"><span data-dcnode-id="4087" instrument_node="">Costello &amp; Mouzourakis, 2016</span></span><span data-dcnode-id="4085" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4083" id="cr205-1"><span data-dcnode-id="4084" instrument_node="">Esses, Hamilton, &amp; Gaucher, 2017</span></span><span data-dcnode-id="4082" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4080" id="cr69-3"><span data-dcnode-id="4081" instrument_node="">Mulvey, 2010</span></span><span data-dcnode-id="4079" instrument_node="">) with those perceiving higher economic burden also reporting less support for hosting asylum seekers and refugees in their countries (</span><span class="citationReference" data-dcnode-id="4077" id="cr6-2"><span data-dcnode-id="4078" instrument_node="">Bansak et al., 2016</span></span><span data-dcnode-id="4076" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4074" id="cr208-1"><span data-dcnode-id="4075" instrument_node="">IPSOS, 2016</span></span><span data-dcnode-id="4073" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4071" id="cr67-1"><span data-dcnode-id="4072" instrument_node="">McKay, Thomas, &amp; Kneebone, 2012</span></span><span data-dcnode-id="4070" instrument_node="">). Some report concerns about competition for employment (</span><span class="citationReference" data-dcnode-id="4068" id="cr204-1"><span data-dcnode-id="4069" instrument_node="">Eamets &amp; Pataccini, 2017</span></span><span data-dcnode-id="4067" instrument_node="">), but the debate also revolves around the provision of services. These include emergency medical care, housing, language training, children’s education, and even processing of asylum claims, all of which place demands on services and staff at both the national and regional level (</span><span class="citationReference" data-dcnode-id="4065" id="cr10-1"><span data-dcnode-id="4066" instrument_node="">Blochliger, Dumont, &amp; Liebeg, 2017</span></span><span data-dcnode-id="4064" instrument_node="">). Although some studies find that hosting refugees may be economically beneficial because of their participation in the local economy (</span><span class="citationReference" data-dcnode-id="4062" id="cr73-1"><span data-dcnode-id="4063" instrument_node="">Omata &amp; Weaver, 2015</span></span><span data-dcnode-id="4061" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4059" id="cr98-1"><span data-dcnode-id="4060" instrument_node="">Taylor et al., 2016</span></span><span data-dcnode-id="4058" instrument_node="">), the largest benefits are in the long-term, whereas hosting costs are sustained immediately and are thus more politically salient (</span><span class="citationReference" data-dcnode-id="4056" id="cr202-1"><span data-dcnode-id="4057" instrument_node="">Dadush, 2017</span></span><span data-dcnode-id="4055" instrument_node="">).</span></div><div class="indent" data-dcnode-id="4037"><span data-dcnode-id="4053" instrument_node="">Ironically, policies that are often intended to address concerns about the costs of hosting asylum seekers and refugees may increase costs by reducing their economic participation. </span><span class="citationReference" data-dcnode-id="4051" id="cr41-1"><span data-dcnode-id="4052" instrument_node="">Hayes and Endale (2018)</span></span><span data-dcnode-id="4050" instrument_node=""> noted that policies limiting financial support to refugees create the need for refugees to find employment soon after arrival, but this can run counter to the goal of learning to speak the language of the new home. Given that language abilities are a major determinant of refugees’ ability to find adequate, or even any, employment (e.g., </span><span class="citationReference" data-dcnode-id="4048" id="cr12-1"><span data-dcnode-id="4049" instrument_node="">Bogic et al., 2012</span></span><span data-dcnode-id="4047" instrument_node="">), policies limiting employment, or demanding employment too quickly on arrival, can have long-term costs. Policies around the asylum determination process may also be costly in the long term. Prolonged waits for asylum hearings, for example, and extended stays in restrictive asylum accommodations are associated with a decrease in the likelihood of finding employment, thus limiting successful asylum claimants’ abilities to participate in the local economy and increasing their need to rely on </span><span class="S02001 dictionaryTerm docDashedBottom" data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">social services</span></span><span data-dcnode-id="4044" instrument_node=""> for support (</span><span class="citationReference" data-dcnode-id="4042" id="cr5-1"><span data-dcnode-id="4043" instrument_node="">Bakker, Dagevos, &amp; Engbersen, 2014</span></span><span data-dcnode-id="4041" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4039" id="cr35-1"><span data-dcnode-id="4040" instrument_node="">Hainmueller, Hangartner, &amp; Lawrence, 2016</span></span><span data-dcnode-id="4038" instrument_node="">).</span></div></div><div class="subsect2" data-dcnode-id="3963" id="s7"><h4 data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">Violence and crime</span></h4><div class="indent" data-dcnode-id="4011"><span data-dcnode-id="4033" instrument_node="">Another source of perceived threat from refugees is violence and crime. For over a decade, </span><span class="O00528 dictionaryTerm docDashedBottom" data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">opinion polls</span></span><span data-dcnode-id="4030" instrument_node=""> have been finding that a substantial minority of the general public in many countries suspect that terrorists are using the refugee system as a means of entering countries (</span><span class="citationReference" data-dcnode-id="4028" id="cr34-1"><span data-dcnode-id="4029" instrument_node="">Frelick, 2007</span></span><span data-dcnode-id="4027" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4025" id="cr77-1"><span data-dcnode-id="4026" instrument_node="">Pew Research Centre, 2016</span></span><span data-dcnode-id="4024" instrument_node="">). It is not just fear of terrorism; local crime rates are also often attributed to refugees and asylum seekers (e.g., </span><span class="citationReference" data-dcnode-id="4022" id="cr3-1"><span data-dcnode-id="4023" instrument_node="">Alkouzaa, 2018</span></span><span data-dcnode-id="4021" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4019" id="cr65-1"><span data-dcnode-id="4020" instrument_node="">McDonald, 2017</span></span><span data-dcnode-id="4018" instrument_node="">). The association of migrants with crime is not a new phenomenon, but the use of criminal processes with migrants is part of an increasing policy trend toward what has been called “crimmigration,” or the confounding of criminal and immigration law (</span><span class="citationReference" data-dcnode-id="4016" id="cr2-1"><span data-dcnode-id="4017" instrument_node="">Aiken, Lyon, &amp; Thorburn, 2014</span></span><span data-dcnode-id="4015" instrument_node="">; </span><span class="citationReference" data-dcnode-id="4013" id="cr67-2"><span data-dcnode-id="4014" instrument_node="">McKay et al., 2012</span></span><span data-dcnode-id="4012" instrument_node="">). This has been particularly true regarding asylum seekers in the past decade.</span></div><div class="indent" data-dcnode-id="4001"><span class="citationReference" data-dcnode-id="4009" id="cr27-1"><span data-dcnode-id="4010" instrument_node="">DeBono (2018)</span></span><span data-dcnode-id="4008" instrument_node=""> argues that policies taken regarding the Mediterranean crossing of asylum seekers into Europe have heightened perceptions of asylum seekers as a threat to security. In 2015, when the European Union developed a “hotspot” approach to processing migrants with irregular entry pathways, the approach emphasized using a crisis framing and criminal processes (e.g., detention, fingerprinting). </span><span class="citationReference" data-dcnode-id="4006" id="cr79-1"><span data-dcnode-id="4007" instrument_node="">Pickering and Weber (2014)</span></span><span data-dcnode-id="4005" instrument_node=""> analyzed the public discourse around the detention of asylum seekers in Australia and the construction of asylum seekers as criminals and security threats. The authors analyzed the media releases of the immigration ministers of the major political parties in the months following the release of an expert panel called the Houston Report (</span><span class="citationReference" data-dcnode-id="4003" id="cr46-1"><span data-dcnode-id="4004" instrument_node="">Houston, Aristotle, &amp; L’Estrange, 2012</span></span><span data-dcnode-id="4002" instrument_node="">). Several key messages were constructed and promoted regarding deterrence policies and the need to secure borders, with offshore detention promoted as a means to reduce the number of marine arrivals. Pickering and Weber noted that the Conservative government in power at the time then focused on the illegality of marine arrivals, which justified a punitive response and a law enforcement approach as a means of reestablishing control.</span></div><div class="indent" data-dcnode-id="3964"><span class="citationReference" data-dcnode-id="3999" id="cr27-2"><span data-dcnode-id="4000" instrument_node="">DeBono (2018)</span></span><span data-dcnode-id="3998" instrument_node=""> argues that the processes of crisis framing and criminalization facilitate the dehumanization of migrants (</span><span class="citationReference" data-dcnode-id="3996" id="cr32-1"><span data-dcnode-id="3997" instrument_node="">Esses, Veenvliet, Hodson, &amp; Mihic, 2008</span></span><span data-dcnode-id="3995" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3993" id="cr33-1"><span data-dcnode-id="3994" instrument_node="">Esses, Veenvliet, &amp; Medianu, 2012</span></span><span data-dcnode-id="3992" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3990" id="cr38-1"><span data-dcnode-id="3991" instrument_node="">Haslam &amp; Loughnan, 2014</span></span><span data-dcnode-id="3989" instrument_node="">). Dehumanization is a process whereby individuals or groups are perceived as lacking human attributes, such as </span><span class="C02197 dictionaryTerm docDashedBottom" data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">complex</span></span><span data-dcnode-id="3986" instrument_node=""> emotions, morality, or warmth, and are thus deemed to resemble animals, or machines (</span><span class="citationReference" data-dcnode-id="3984" id="cr39-1"><span data-dcnode-id="3985" instrument_node="">Haslam, Loughnan, Reynolds, &amp; Wilson, 2007</span></span><span data-dcnode-id="3983" instrument_node="">). The consequences of dehumanizing a group is that they are seen as falling outside of the realm of our moral obligations. The dehumanization of a group can thus result in reduced </span><span class="P02767 dictionaryTerm docDashedBottom" data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">prosocial behavior</span></span><span data-dcnode-id="3980" instrument_node=""> and increased </span><span class="A02235 dictionaryTerm docDashedBottom" data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">antisocial behavior</span></span><span data-dcnode-id="3977" instrument_node=""> toward them (</span><span class="citationReference" data-dcnode-id="3975" id="cr18-1"><span data-dcnode-id="3976" instrument_node="">Castano &amp; Giner-Sorolla, 2006</span></span><span data-dcnode-id="3974" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3972" id="cr21-1"><span data-dcnode-id="3973" instrument_node="">Čehajić, Brown, &amp; Gonzalez, 2009</span></span><span data-dcnode-id="3971" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3969" id="cr38-2"><span data-dcnode-id="3970" instrument_node="">Haslam &amp; Loughnan, 2014</span></span><span data-dcnode-id="3968" instrument_node="">). For refugees, this has been associated with more negative attitudes toward them, and less support for resettling them in the country (</span><span class="citationReference" data-dcnode-id="3966" id="cr33-2"><span data-dcnode-id="3967" instrument_node="">Esses et al., 2012</span></span><span data-dcnode-id="3965" instrument_node="">).</span></div></div><div class="subsect2" data-dcnode-id="3899" id="s8"><h4 data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">Factors influencing perceptions of threat</span></h4><div class="indent" data-dcnode-id="3920"><span data-dcnode-id="3960" instrument_node="">Perceptions of threat are hypothesized to be influenced by one’s own vulnerability, and thus to be greater among those individuals who are experiencing more difficult economic conditions or vulnerability (</span><span class="citationReference" data-dcnode-id="3958" id="cr205-2"><span data-dcnode-id="3959" instrument_node="">Esses et al., 2017</span></span><span data-dcnode-id="3957" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3955" id="cr57-1"><span data-dcnode-id="3956" instrument_node="">Kuntz, Davidov, &amp; Semyonov, 2017</span></span><span data-dcnode-id="3954" instrument_node="">). In a study of Danish voting patterns, </span><span class="citationReference" data-dcnode-id="3952" id="cr30-1"><span data-dcnode-id="3953" instrument_node="">Dustmann, Vasiljeva, and Damm (2016)</span></span><span data-dcnode-id="3951" instrument_node=""> found municipalities with higher previous unemployment and crime rates and larger numbers of refugees shifted more to the right in their voting patterns than communities with better economic or safety rates. These perceptions of vulnerability have also been documented in regions which have experienced a greater number of acts of violence attributed to terrorism (</span><span class="citationReference" data-dcnode-id="3949" id="cr26-1"><span data-dcnode-id="3950" instrument_node="">Davidov &amp; Semyonov, 2017</span></span><span data-dcnode-id="3948" instrument_node="">). More threat is also perceived among those who identify more strongly with their ingroup (</span><span class="citationReference" data-dcnode-id="3946" id="cr212-1"><span data-dcnode-id="3947" instrument_node="">Tajfel &amp; Turner, 2001</span></span><span data-dcnode-id="3945" instrument_node="">) and care more about relative </span><span class="S02011 dictionaryTerm docDashedBottom" data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">social status</span></span><span data-dcnode-id="3942" instrument_node=""> (e.g., Social Dominance Orientation, </span><span class="citationReference" data-dcnode-id="3940" id="cr23-1"><span data-dcnode-id="3941" instrument_node="">Costello &amp; Hodson, 2011</span></span><span data-dcnode-id="3939" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3937" id="cr29-1"><span data-dcnode-id="3938" instrument_node="">Dunwoody &amp; McFarland, 2017</span></span><span data-dcnode-id="3936" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3934" id="cr81-1"><span data-dcnode-id="3935" instrument_node="">Pratto, Sidanius, Stallworth, &amp; Malle, 1994</span></span><span data-dcnode-id="3933" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3931" id="cr102-1"><span data-dcnode-id="3932" instrument_node="">Uenal, 2016</span></span><span data-dcnode-id="3930" instrument_node="">). Thus, perceptions of threat from immigrants and refugees are stronger among those with a stronger nationalist identity (</span><span class="citationReference" data-dcnode-id="3928" id="cr201-1"><span data-dcnode-id="3929" instrument_node="">Coenders &amp; Scheepers, 2004</span></span><span data-dcnode-id="3927" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3925" id="cr26-2"><span data-dcnode-id="3926" instrument_node="">Davidov &amp; Semyonov, 2017</span></span><span data-dcnode-id="3924" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3922" id="cr30-2"><span data-dcnode-id="3923" instrument_node="">Dustmann et al., 2016</span></span><span data-dcnode-id="3921" instrument_node="">).</span></div><div class="indent" data-dcnode-id="3900"><span data-dcnode-id="3919" instrument_node="">A number of studies on intergroup attitudes have tested the theory that the relative size and visibility of a </span><span class="M01212 dictionaryTerm docDashedBottom" data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">minority group</span></span><span data-dcnode-id="3916" instrument_node=""> is related to perceptions of greater threat, which then result in more negative attitudes (</span><span class="citationReference" data-dcnode-id="3914" id="cr88-1"><span data-dcnode-id="3915" instrument_node="">Schlueter &amp; Davidov, 2013</span></span><span data-dcnode-id="3913" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3911" id="cr83-1"><span data-dcnode-id="3912" instrument_node="">Quillian, 1995</span></span><span data-dcnode-id="3910" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3908" id="cr213-1"><span data-dcnode-id="3909" instrument_node="">Weber, 2015</span></span><span data-dcnode-id="3907" instrument_node="">). Policies or messages in the media and in public discourse that emphasize these aspects can then be expected to activate more negative attitudes. Several studies have found associations at the national level between the relative size of immigrant groups and perceptions of threat, modified by national economic conditions. In a recent review, Weber suggests that the findings have been somewhat inconsistent, with the effects not emerging at the local or regional level (</span><span class="citationReference" data-dcnode-id="3905" id="cr213-2"><span data-dcnode-id="3906" instrument_node="">Weber, 2015</span></span><span data-dcnode-id="3904" instrument_node="">). Despite the connection to national economic conditions, the nature of the “threat” perceived by large numbers of immigrants may be related more to symbolic threat rather than a real </span><span class="C02166 dictionaryTerm docDashedBottom" data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">competition for resources</span></span><span data-dcnode-id="3901" instrument_node=""> (Cea D’Ancona, 2015).</span></div></div></div><div class="subsect1" data-dcnode-id="3830" id="s9"><h3 data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">Symbolic Threat</span></h3><div class="indent" data-dcnode-id="3864"><span data-dcnode-id="3895" instrument_node="">Symbolic threat is the perception that outgroup members are threatening the ingroup’s values, morals and norms. This can occur in the absence of any material threat (</span><span class="citationReference" data-dcnode-id="3893" id="cr11-3"><span data-dcnode-id="3894" instrument_node="">Bobo, 1983</span></span><span data-dcnode-id="3892" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3890" id="cr94-1"><span data-dcnode-id="3891" instrument_node="">Stephan, Ybarra, &amp; Bachman, 1999</span></span><span data-dcnode-id="3889" instrument_node="">) although some work looking at threat and asylum seekers suggests that they are very highly related (</span><span class="citationReference" data-dcnode-id="3887" id="cr96-1"><span data-dcnode-id="3888" instrument_node="">Suhnan, Pedersen, &amp; Hartley, 2012</span></span><span data-dcnode-id="3886" instrument_node="">). The symbolic threat that is often associated with immigrants and refugees is that they will reject local beliefs and customs, and thus bring about changes in cherished values and norms (</span><span class="citationReference" data-dcnode-id="3884" id="cr37-1"><span data-dcnode-id="3885" instrument_node="">Hartley &amp; Pedersen, 2015</span></span><span data-dcnode-id="3883" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3881" id="cr108-1"><span data-dcnode-id="3882" instrument_node="">Wirtz, van der Pligt, &amp; Doosje, 2016</span></span><span data-dcnode-id="3880" instrument_node="">). In the current context in Europe and North America, these concerns have been strongly linked to anti-Muslim attitudes, and thus attitudes toward Muslim refugees are more negative than toward refugees of other religions (</span><span class="citationReference" data-dcnode-id="3878" id="cr6-3"><span data-dcnode-id="3879" instrument_node="">Bansak et al., 2016</span></span><span data-dcnode-id="3877" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3875" id="cr25-2"><span data-dcnode-id="3876" instrument_node="">Czymara &amp; Schmidt-Catran, 2017</span></span><span data-dcnode-id="3874" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3872" id="cr80-1"><span data-dcnode-id="3873" instrument_node="">Poushter, 2016</span></span><span data-dcnode-id="3871" instrument_node="">). Research has also shown more resistance to the settlement of African newcomers than those from Asia or Europe, and so the negative attitudes are not limited to religious differences alone (</span><span class="citationReference" data-dcnode-id="3869" id="cr14-1"><span data-dcnode-id="3870" instrument_node="">Bose, 2018</span></span><span data-dcnode-id="3868" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3866" id="cr25-3"><span data-dcnode-id="3867" instrument_node="">Czymara &amp; Schmidt-Catran, 2017</span></span><span data-dcnode-id="3865" instrument_node="">).</span></div><div class="indent" data-dcnode-id="3859"><span data-dcnode-id="3863" instrument_node="">Policies intended to create more tolerant settings can actually activate feelings of threat, resulting in more negative attitudes toward outgroups. A recent study conducted in Switzerland, for example, suggests that when governments that have historically played a strong role in supporting religious practices change their policies toward greater religious openness, they also change their cherished local traditions. The result is that members of religious outgroups are now seen as the cause of these changes and thus a symbolic threat to local values (</span><span class="citationReference" data-dcnode-id="3861" id="cr42-1"><span data-dcnode-id="3862" instrument_node="">Helbling &amp; Traunmüller, 2016</span></span><span data-dcnode-id="3860" instrument_node="">).</span></div><div class="subsect2" data-dcnode-id="3831" id="s10"><h4 data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">Fairness and equity</span></h4><div class="indent" data-dcnode-id="3846"><span data-dcnode-id="3856" instrument_node="">One particular value that is invoked in the discourse around asylum seekers is that of fairness. Media coverage of asylum seekers and refugees has increasingly been couched in a discourse of suspicion regarding their need for protection (</span><span class="citationReference" data-dcnode-id="3854" id="cr6-4"><span data-dcnode-id="3855" instrument_node="">Bansak et al., 2016</span></span><span data-dcnode-id="3853" instrument_node="">). Refugees are eligible for protection and rights that are not extended to other migrants, including entry into the country through a different pathway from that which is available to voluntary migrants. Concerns about whether refugees and asylum seekers are deserving of these rights and exceptions repeatedly emerge as predictors of attitudes toward refugees and asylum seekers. A qualitative mail survey with 585 Australians (</span><span class="citationReference" data-dcnode-id="3851" id="cr67-3"><span data-dcnode-id="3852" instrument_node="">McKay et al., 2012</span></span><span data-dcnode-id="3850" instrument_node="">) found that concerns about irregular entry of asylum seekers were often presented in terms of fairness and the importance of using “</span><span class="D01790 dictionaryTerm docDashedBottom" data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">due process</span></span><span data-dcnode-id="3847" instrument_node="">.”</span></div><div class="indent" data-dcnode-id="3832"><span data-dcnode-id="3845" instrument_node="">However, the importance placed on fairness may be a justification rather than a cause of negative attitudes. A </span><span class="L00840 dictionaryTerm docDashedBottom" data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">longitudinal</span></span><span data-dcnode-id="3842" instrument_node=""> study with over 200 Australian participants (</span><span class="citationReference" data-dcnode-id="3840" id="cr61-1"><span data-dcnode-id="3841" instrument_node="">Louis, Duck, Terry, Schuller, &amp; Lalonde, 2007</span></span><span data-dcnode-id="3839" instrument_node="">) tested the role of individual difference variables and </span><span class="S01952 dictionaryTerm docDashedBottom" data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">social norms</span></span><span data-dcnode-id="3836" instrument_node=""> as well as perceptions of fairness and threat in supporting negative attitudes toward asylum seekers. The authors found that perceptions of procedural and structural fairness mediated the relationship between perceived structural threat and using civic action (e.g., voting) to support exclusionary or punitive measures. Thus, respondents who felt threatened appeared to be using claims of fairness to justify their attitudes, emphasizing the </span><span class="C02197 dictionaryTerm docDashedBottom" data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">complex</span></span><span data-dcnode-id="3833" instrument_node=""> links between these different influences on attitudes.</span></div></div></div></div><div class="section ftJumpToAnchor" data-dcnode-id="3764" id="s11"><div class="topLevelHeadingContainer ftSection" data-dcnode-id="3826" fragment="s11" id="s11"><h2 data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">Empathy</span></h2></div><div class="indent" data-dcnode-id="3803"><span data-dcnode-id="3825" instrument_node="">Empathy has been proposed as a key element in increasing </span><span class="P01777 dictionaryTerm docDashedBottom" data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">positive attitudes</span></span><span data-dcnode-id="3822" instrument_node=""> toward outgroups and reducing prejudice (</span><span class="citationReference" data-dcnode-id="3820" id="cr76-1"><span data-dcnode-id="3821" instrument_node="">Pedersen, Walker, Paradies, &amp; Guerin, 2011</span></span><span data-dcnode-id="3819" instrument_node="">). Empathy may be particularly salient in attitudes toward refugees as an outgroup because humanitarian concerns are explicitly invoked in discussions pertaining to their rights and well-being. Empathy can be a cognitive variable, where one can imagine the thoughts and feelings of others in their situation (</span><span class="P01008 dictionaryTerm docDashedBottom" data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">perspective taking</span></span><span data-dcnode-id="3816" instrument_node="">), or an </span><span class="A00964 dictionaryTerm docDashedBottom" data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">affective</span></span><span data-dcnode-id="3813" instrument_node=""> variable, in terms of feeling as if, or for, another person (empathic matching or concern; </span><span class="citationReference" data-dcnode-id="3811" id="cr7-1"><span data-dcnode-id="3812" instrument_node="">Batson &amp; Ahmad, 2009</span></span><span data-dcnode-id="3810" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3808" id="cr99-1"><span data-dcnode-id="3809" instrument_node="">Todd &amp; Galinsky, 2014</span></span><span data-dcnode-id="3807" instrument_node="">). For example, a study by </span><span class="citationReference" data-dcnode-id="3805" id="cr75-1"><span data-dcnode-id="3806" instrument_node="">Pedersen and Thomas (2013)</span></span><span data-dcnode-id="3804" instrument_node=""> found that Australians with greater feelings of empathy toward asylum seekers reported less prejudice toward them. Feelings of empathy made a unique contribution, above and beyond dispositional empathy, and the cognitive elements of perceived similarity and difference from asylum seekers.</span></div><div class="indent" data-dcnode-id="3792"><span data-dcnode-id="3802" instrument_node="">Agencies, organizations, and individuals concerned with improving the welfare of refugees and asylum seekers often evoke empathic feelings in their efforts to motivate people to vote, volunteer, or donate to support asylum seekers and refugees (</span><span class="citationReference" data-dcnode-id="3800" id="cr52-1"><span data-dcnode-id="3801" instrument_node="">Johnson, 2011</span></span><span data-dcnode-id="3799" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3797" id="cr82-1"><span data-dcnode-id="3798" instrument_node="">Pupavac, 2008</span></span><span data-dcnode-id="3796" instrument_node="">). In their analysis of political discourse in Australia, </span><span class="citationReference" data-dcnode-id="3794" id="cr79-2"><span data-dcnode-id="3795" instrument_node="">Pickering and Weber (2014)</span></span><span data-dcnode-id="3793" instrument_node=""> noted that the Australian Liberal government framed offshore detention as strategy to save the lives of vulnerable migrants whose lives were at risk because of unscrupulous people smugglers, thus eliciting an empathy rationale. The authors describe the Greens’ party messages as rejecting the deterrence framings but countering with a discourse primarily focused on care, compassion, and the well-being of migrants, emphasizing empathy rather than human rights.</span></div><div class="subsect1" data-dcnode-id="3765" id="s12"><h3 data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">Empathy and the “Deserving” Migrant</span></h3><div class="indent" data-dcnode-id="3774"><span class="citationReference" data-dcnode-id="3788" id="cr27-3"><span data-dcnode-id="3789" instrument_node="">DeBono (2018)</span></span><span data-dcnode-id="3787" instrument_node=""> and others (e.g., </span><span class="citationReference" data-dcnode-id="3785" id="cr67-4"><span data-dcnode-id="3786" instrument_node="">McKay et al., 2012</span></span><span data-dcnode-id="3784" instrument_node="">), however, raised concerns about how public discourse and policies are compartmentalizing refugees into those who are, and are not, deserving of empathy. DeBono argued that policies around the Mediterranean arrivals aimed at protecting the vulnerable serve to separate migrants into those who are vulnerable and thus deserving of special protections and processes (e.g., minors or those with disabilities) and those who are not, and who are therefore deemed not to need of protection. This categorization of asylum seekers maps onto beliefs that many asylum seekers are not genuine refugees (</span><span class="citationReference" data-dcnode-id="3782" id="cr67-5"><span data-dcnode-id="3783" instrument_node="">McKay et al., 2012</span></span><span data-dcnode-id="3781" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3779" id="cr208-2"><span data-dcnode-id="3780" instrument_node="">IPSOS, 2016</span></span><span data-dcnode-id="3778" instrument_node="">), a belief that has been promoted through political discourse and media messages (</span><span class="citationReference" data-dcnode-id="3776" id="cr31-1"><span data-dcnode-id="3777" instrument_node="">Esses, Medianu, &amp; Lawson, 2013</span></span><span data-dcnode-id="3775" instrument_node="">). These authors all note that beliefs that many refugees are not deserving of protection has then been used as a justification for limiting entry to asylum seekers.</span></div><div class="indent" data-dcnode-id="3766"><span data-dcnode-id="3773" instrument_node="">A study of European attitudes toward asylum seekers conducted by Bansak and colleagues (</span><span class="citationReference" data-dcnode-id="3771" id="cr6-5"><span data-dcnode-id="3772" instrument_node="">Bansak et al., 2016</span></span><span data-dcnode-id="3770" instrument_node="">) demonstrated the interplay of concerns around economic threat, symbolic threat and empathy. The authors had 18,000 voters in Europe rate profiles of asylum seekers that varied on nine characteristics: gender, age (21, 38 or 62 years of age), fluency in the local language, previous employment, country of origin (Afghanistan, Eritrea, Iraq, Kosovo, Pakistan, Syria, Ukraine), reason for migrating (persecution vs. economic opportunities), vulnerability (none, </span><span class="P01924 dictionaryTerm docDashedBottom" data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">posttraumatic stress disorder</span></span><span data-dcnode-id="3767" instrument_node="">, experienced torture, no surviving family, having a handicap), and whether or not there were inconsistencies in their asylum testimony. Ratings of these asylum seeker profiles were more positive when the profiles elicited humanitarian concerns, with those fleeing persecution and reporting vulnerabilities being perceived more positively. Economic considerations were also important, with more positive responses provided for profiles of people who had been previously employed and who were fluent in the host country language, and who were not close to retirement age, consistent with concerns about the economic impact of resettling asylum seekers. Finally, attitudes were more negative toward Muslim profiles, consistent with anti-Muslim trends that are being witnessed internationally, that have been attributed at least in part to symbolic threat.</span></div></div></div><div class="section ftJumpToAnchor" data-dcnode-id="3709" id="s13"><div class="topLevelHeadingContainer ftSection" data-dcnode-id="3761" fragment="s13" id="s13"><h2 data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">Anxiety and Uncertainty</span></h2></div><div class="indent" data-dcnode-id="3747"><span data-dcnode-id="3760" instrument_node="">General feelings of uncertainty can serve to exacerbate feelings of threat, and thus can motivate people to more extreme sociopolitical positions, including more right-wing or anti-immigrant political groups (</span><span class="citationReference" data-dcnode-id="3758" id="cr43-1"><span data-dcnode-id="3759" instrument_node="">Hogg &amp; Adelman, 2013</span></span><span data-dcnode-id="3757" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3755" id="cr44-1"><span data-dcnode-id="3756" instrument_node="">Hogg, Kruglanski, &amp; van den Bos, 2013</span></span><span data-dcnode-id="3754" instrument_node="">). Interestingly, </span><span class="citationReference" data-dcnode-id="3752" id="cr90-1"><span data-dcnode-id="3753" instrument_node="">Silva et al. (2018)</span></span><span data-dcnode-id="3751" instrument_node=""> argue that a lack of policy clarity regarding refugees can result in a such a state of uncertainty. They hypothesized that these feelings of uncertainty lead to polarization of attitudes to reduce uncertainty, and thus more extreme negative, but potentially also positive, positions. In support of their hypothesis, they found that manipulating whether participants had knowledge that the government had clear policies regarding the settlement of refugees predicted less perceived threat and more </span><span class="P01777 dictionaryTerm docDashedBottom" data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">positive attitudes</span></span><span data-dcnode-id="3748" instrument_node=""> toward refugees.</span></div><div class="subsect1" data-dcnode-id="3710" id="s14"><h3 data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">Intergroup Anxiety</span></h3><div class="indent" data-dcnode-id="3725"><span data-dcnode-id="3744" instrument_node="">Attitudes toward outgroup members have also been found to be determined by feelings of anxiety at the level of the individual, rather than the group. Stephan and colleagues argue that interacting with outgroup members can result in what they call </span><em data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">intergroup anxiety</span></em><span data-dcnode-id="3741" instrument_node="">, or concerns that the interaction could lead to negative personal outcomes, such as embarrassment, rejection, or exploitation (</span><span class="citationReference" data-dcnode-id="3739" id="cr93-1"><span data-dcnode-id="3740" instrument_node="">Stephan &amp; Stephan, 1985</span></span><span data-dcnode-id="3738" instrument_node="">; </span><span class="citationReference" data-dcnode-id="3736" id="cr94-2"><span data-dcnode-id="3737" instrument_node="">Steph
