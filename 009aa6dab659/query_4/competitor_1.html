</span><span data-dcnode-id="911" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7013637182802386" data-ad-slot="9679194358" data-dcnode-id="910" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="909" instrument_node="">

</span><p data-dcnode-id="898"><span data-dcnode-id="901" instrument_node="">Application Deadline: </span><meta charset="utf-8" data-dcnode-id="900"><span data-dcnode-id="899" instrument_node="">20 February 2022</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="896" instrument_node="">Every year, UNHCR searches for a person or an organisation with exceptional dedication and commitment in supporting people who are refugees, internally displaced or stateless. That person or group wins the </span><strong data-dcnode-id="893"><a data-dcnode-id="894" data-id="https://www.unhcr.org/nominate.html" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/nominate.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="895" instrument_node="">UNHCR Nansen Refugee Award. </span></a></strong></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">The laureate or the winning organisation receives US$ 150,000 to invest in their humanitarian work. Additionally, four regional winners from each global region outside of the laureate’s region are selected and honoured with a certificate and a local event.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Requirements</span></p><div class="td-a-rec td-a-rec-id-content_inline tdi_2 td_block_template_1" data-dcnode-id="879"><span data-dcnode-id="885" instrument_node="">
</span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//iu.prf.hn/click/camref%3A1100ldwIS/creativeref%3A1100l50664" target="_blank"><img border="0" class="td-animation-stack-type0-2" data-dcnode-id="882" height="90" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//iu-creative.prf.hn/source/camref%3A1100ldwIS/creativeref%3A1100l50664&amp;raw" width="728"></a><span data-dcnode-id="880" instrument_node="">
</span></div><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Candidates may be individuals, groups or organizations. Every Nansen Refugee Award laureate and regional winners spend an extraordinary amount of time and effort to help the forcibly displaced:</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">· The nominee’s work goes beyond the call of duty and outside of normal activities;</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">· The nominee’s work demonstrates courage – they might at times face personal risk for his/her/their work;</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="868" instrument_node="">· The nominee’s work has a direct positive impact on the lives of forcibly displaced or stateless people;</span><br data-dcnode-id="867"><span data-dcnode-id="866" instrument_node="">· The work is connected to a major displacement issue or situation.</span></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="856"><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Nominators</span></strong><br data-dcnode-id="861"><span data-dcnode-id="860" instrument_node="">Anyone may submit a candidate for the Nansen Refugee Award. We welcome the nomination of any deserving individual, group or organization.&nbsp;Finalists from previous year are still eligible.Please note&nbsp;</span><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">self-nominations are strongly discouraged</span></strong><span data-dcnode-id="857" instrument_node="">.</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="846"><strong data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Eligibility</span></strong><br data-dcnode-id="852"><span data-dcnode-id="851" instrument_node="">Current or former UNHCR employees are ineligible.&nbsp;</span><br data-dcnode-id="850"><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">ReferencesThree references must be provided</span></strong><span data-dcnode-id="847" instrument_node="">. References should be diversely selected (not all from the same organisation or group). The nomination will be ineligible without three referees.</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="836"><strong data-dcnode-id="842"><br data-dcnode-id="844"><span data-dcnode-id="843" instrument_node="">Selection process</span></strong><br data-dcnode-id="841"><span data-dcnode-id="840" instrument_node="">The Nansen Refugee Award Selection Committee is an independent body which selects the annual laureate and four regional winners.Please note that&nbsp;</span><strong data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">the selection process remains strictly confidential</span></strong><span data-dcnode-id="837" instrument_node="">, and no information regarding the status of your nomination will be released.The 2022 laureate and regional winners will be announced in&nbsp;September 2022.</span></p><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="829"><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Nomination submission and deadline</span></strong><br data-dcnode-id="832"><span data-dcnode-id="831" instrument_node="">The deadline to submit nominations is midnight CET, 20 February 2022. The strongest nominations will have detailed accounts of the candidate’s work and impact on people of concerns, as well as&nbsp; strong references to back up the submission.For any questions, please contact the Nansen Refugee Award Secretariat at </span><span data-dcnode-id="830" instrument_node="">nansen@unhcr.org.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="825"><em data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Please note that nominations received after midnight&nbsp;on 20 February 2022 will not be considered.</span></em></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">For More Information:</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="818"><a data-dcnode-id="819" data-id="https://www.unhcr.org/nominate.html" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/nominate.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="820" instrument_node="">Visit the Official Webpage of the UNHCR Nansen Refugee Award 2022</span></a></p><span data-dcnode-id="817" instrument_node="">
