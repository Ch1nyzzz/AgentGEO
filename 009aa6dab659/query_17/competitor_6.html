UNHCR is recruiting a Settlement Planning Associate (m/f), to be based in Nampula, Mozambique.</span><h6 data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Description</span></h6><ul data-dcnode-id="709"><span data-dcnode-id="724" instrument_node="">
</span><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">All UNHCR staff members are accountable to perform their duties as reflected in their job description. They do so within their delegated authorities, in line with the regulatory framework of UNHCR which includes the UN Charter, UN Staff Regulations and Rules, UNHCR Policies and Administrative Instructions as well as relevant accountability frameworks. In addition, staff members are required to discharge their responsibilities in a manner consistent with the core, functional, cross-functional and managerial competencies and UNHCR’s core values of professionalism, integrity and respect for diversity</span></li><span data-dcnode-id="721" instrument_node="">
</span><li data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">The United Nations High Commissioner for Refugees (UNHCR) is an international organization with the mandate to assist persons in need of international protection; asylum seekers; refugees; statelessness; and internally displaced persons. The UNHCR operation in Mozambique has its main office in Maputo, field office in Nampula and sub office in Pemba. The Settlement Planning Associate will be based in Nampula with frequent travel to Corane and Maratane Refugee/IDP camps and other Areas of Responsibility (AoR). The working language in the UNHCR offices in Mozambique is English</span></li><span data-dcnode-id="718" instrument_node="">
</span><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">The Settlement Planning Associate works under the overall supervision of the Head of Office with technical support from Shelter Officer. S/he will be expected to provide support and advice on all technical matters including; settlement development, shelter and infrastructure for UNHCR and Partners under Nampula Field Office.The incumbent participates in maintaining effective coordination with any established settlement / shelter sector working groups. In addition, s/he provides technical expertise and support in monitoring of settlement planning and general infrastructure related activities in collaboration with other sectors within the AoR</span></li><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">The Settlement Planning Associate provides support to more senior settlement planning colleagues in designing and developing sustainable settlements to host people of concern (POC) in UNHCR emergency and protracted operations. A settlement should take into consideration the risks associated with settlement locations, while addressing the needs of the population, the availability of resources, the amelioration of living conditions, service provision, enhancing transportation networks as well as recreational spaces. S/he will analyse variety of settlement options urban, rural, formal or informal and ensure that spatial allocation of land is decided in support of the protection, access to basic services, livelihoods, and socio-cultural life of displaced people and the host community</span></li><span data-dcnode-id="712" instrument_node="">
</span><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">S/he will develop all required documentation in area of responsibility. S/he will work closely with stakeholders on identification of shelter and NFIs needs and ensure that NFI identification / distribution is coordinated among all the actors. 2 The Settlement Planning Associate will be guided by UNHCR policies, UN Handbooks, Policy papers and priorities and will maintain contacts with local officials and implementing partners regarding shelter and other infrastructure conditions in refugee and IDP hosting areas</span></li></ul><h6 data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Duties</span></h6><h5 data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Technical Guidance</span></h5><ul data-dcnode-id="683"><span data-dcnode-id="704" instrument_node="">
</span><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Support in preparation of assessments and selection of potential sites in accordance with the Master Plan approach to settlement planning taking into consideration protection concerns, promoting the integration of agreed priority cross-cutting issues (e.g. age, environment, gender, and human rights), national legislation, environmental considerations and access to basic services</span></li><span data-dcnode-id="701" instrument_node="">
</span><li data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Provide support and work with all functional units in UNHCR and relevant technical actors in carrying out needs assessments, analysis and joint inter-sector needs assessment exercises as appropriate, prioritize results accordingly and feed them into the Master Planning Process and Settlement Planning Strategy</span></li><span data-dcnode-id="698" instrument_node="">
</span><li data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Assist in the development of settlement layouts that respond to natural topography and drainage patterns of the site to reduce construction and maintenance costs</span></li><span data-dcnode-id="695" instrument_node="">
</span><li data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Coordinate and assist in scheduling and follow up of plot demarcation, allocation for potential shelters (RHUs, family tents and other shelter solutions), and other infrastructure according to the settlement plans</span></li><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Directly follow up and support the implementation of the settlement masterplan. Prepare bid documents, drawings, BOQs, Work Schedules and Technical Specifications for settlement planning activities</span></li><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Monitor regularly the settlement and infrastructure works so these are implemented according to plans and completed within designated timelines and budget. Ensure that technical components reflect local government and UNHCR minimum standards focusing on quality and output</span></li><span data-dcnode-id="686" instrument_node="">
</span><li data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Prepare regular reports as necessary to be shared with the supervisor</span></li></ul><h5 data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Coordination</span></h5><ul data-dcnode-id="665"><span data-dcnode-id="680" instrument_node="">
</span><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Provide support in ensuring that UNHCR’s operation within the AoR is technically sound in the field of settlement planning to best meet the needs of POC</span></li><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Work with relevant authorities and government counterparts to support strong coordination of settlement planning activities within the AoR</span></li><span data-dcnode-id="674" instrument_node="">
</span><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Assist the supervisor in developing settlement plans that are aligned with regional, national land use plans and planned developments</span></li><span data-dcnode-id="671" instrument_node="">
</span><li data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Provide inputs for periodic updates on the Masterplan taking note of the changes, new developments and expansion in the settlement</span></li><span data-dcnode-id="668" instrument_node="">
</span><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Provide support to implementing and operational partners to ensure the use of common standards and tools for information collection and data management</span></li></ul><h5 data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Collaboration</span></h5><ul data-dcnode-id="656"><span data-dcnode-id="662" instrument_node="">
</span><li data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">In coordination with relevant focal persons and technical colleagues, provide support in carrying out appropriate assessments and mapping exercises such as environmental impact assessment, useable land area assessment, mapping of services, mapping of host communities, livelihood assessments, etc</span></li><span data-dcnode-id="659" instrument_node="">
</span><li data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Perform other related duties as required</span></li></ul><h6 data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Requisites</span></h6><ul data-dcnode-id="572"><span data-dcnode-id="653" instrument_node="">
</span><li data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">For G6 - 3 years relevant experience with High School Diploma; or 2 years relevant work experience with Bachelor or equivalent or higher</span></li><span data-dcnode-id="650" instrument_node="">
</span><li data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Certificates and/or Licenses: 3 Civil Engineering; Construction; Architecture; Urban Planning and any other related field</span></li><span data-dcnode-id="647" instrument_node="">
</span><li data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Prior experience of technical implementation of shelter/camp projects in humanitarian context and emergencies, in liaison with operational partner’s and governmental technical departments</span></li><span data-dcnode-id="644" instrument_node="">
</span><li data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Knowledge of a range of physical planning assistance options, including sensitivity to cultural and gender specific needs to ensure that the social and cultural background of the persons of concern is taken into account while designing and developing camps/shelter options</span></li><span data-dcnode-id="641" instrument_node="">
</span><li data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Experience of technical monitoring of shelter and camp development and maintenance projects. Knowledge of topographic surveying</span></li><span data-dcnode-id="638" instrument_node="">
</span><li data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Knowledge of CAD/CAM is a great added value. Knowledge of other computer graphics and mapping software</span></li><span data-dcnode-id="635" instrument_node="">
</span><li data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">*SP-AutoCAD Software IT-MS Office Applications; DM-ArcGIS (Geographic Information System)</span></li><span data-dcnode-id="632" instrument_node="">
</span><li data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">PG-Experience with coordinating with Implementing Partners (Government/INGO/NGO/Corporate)</span></li><span data-dcnode-id="629" instrument_node="">
</span><li data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">SP-Site/Physical Planning</span></li><span data-dcnode-id="626" instrument_node="">
</span><li data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">SP-Shelter and Site Planning Technical Guidelines and Standards</span></li><span data-dcnode-id="623" instrument_node="">
</span><li data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">SP-Design tools such as Global Positioning System (GPS); IT-Microsoft Visio</span></li><span data-dcnode-id="620" instrument_node="">
</span><li data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">MS-Knowledge of geo-political realities and their socio-cultural implications</span></li><span data-dcnode-id="617" instrument_node="">
</span><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">SP-Experience with Physical Planning/Shelter design-related software</span></li><span data-dcnode-id="614" instrument_node="">
</span><li data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">For General Service jobs: Knowledge of English and/or UN working language of the duty station if not English</span></li><span data-dcnode-id="611" instrument_node="">
</span><li data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">All jobs at UNHCR require six core competencies and may also require managerial competencies and/or cross functional competencies. The six core competencies are listed below:</span></li><span data-dcnode-id="608" instrument_node="">
</span><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Core Competencies:</span></li><span data-dcnode-id="605" instrument_node="">
</span><li data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Accountability</span></li><span data-dcnode-id="602" instrument_node="">
</span><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Communication</span></li><span data-dcnode-id="599" instrument_node="">
</span><li data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Organizational Awareness</span></li><span data-dcnode-id="596" instrument_node="">
</span><li data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Teamwork &amp; CollaborationCommitment to Continuous Learning</span></li><span data-dcnode-id="593" instrument_node="">
</span><li data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Client &amp; Result Orientation</span></li><span data-dcnode-id="590" instrument_node="">
</span><li data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Managerial Competencies:</span></li><span data-dcnode-id="587" instrument_node="">
</span><li data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Judgement and Decision Making</span></li><span data-dcnode-id="584" instrument_node="">
</span><li data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Cross-Functional Competencies:</span></li><span data-dcnode-id="581" instrument_node="">
</span><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Analytical Thinking</span></li><span data-dcnode-id="578" instrument_node="">
</span><li data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Technological Awareness</span></li><span data-dcnode-id="575" instrument_node="">
</span><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Planning and Organizing</span></li></ul><h6 data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Benefits</span></h6><ul data-dcnode-id="564"><span data-dcnode-id="569" instrument_node="">
</span><li data-dcnode-id="565"><span data-dcnode-id="568" instrument_node="">A competitive compensation and benefits package is offered. For information on UN salaries, allowances and benefits, please visit the portal of the International Civil Service Commission at: </span><a data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//icsc.un.org./"><span data-dcnode-id="567" instrument_node="">http://icsc.un.org.</span></a></li></ul><h6 data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Notes</span></h6><ul data-dcnode-id="485"><span data-dcnode-id="561" instrument_node="">
</span><li data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Only shortlisted applicants will be contacted</span></li><span data-dcnode-id="558" instrument_node="">
</span><li data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Eligibility: Interested staff members should consult the Administrative Instruction on Recruitment and Assignment of Locally Recruited Staff (RALS, UNHCR/AI/2020/1/Rev.2). If you have questions regarding your eligibility, you may also contact the HR Unit</span></li><span data-dcnode-id="555" instrument_node="">
</span><li data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">4 In line with the RALS, the below category of candidates are eligible to apply for internally/externally advertised vacancies</span></li><span data-dcnode-id="552" instrument_node="">
</span><li data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Group 1 candidates: Group 1 comprises current GS staff members holding an indefinite or fixed-term appointment who, at the date of the deadline for application, are serving in the country of the vacancy at the grade of the position or one grade below or above. However, current GS staff members holding an indefinite or fixed-term appointment in the country of the vacancy who apply for a position two grades above the personal grade will be considered as Group 2 applicants</span></li><span data-dcnode-id="549" instrument_node="">
</span><li data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Group 2 candidates: Group 2 comprises candidates from the below categories after completion of one cumulative or continuous year of service in the country of the vacancy</span></li><span data-dcnode-id="546" instrument_node="">
</span><li data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Current locally recruited UNHCR staff members holding a temporary appointment up to a maximum of two grades above their current positions</span></li><span data-dcnode-id="543" instrument_node="">
</span><li data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Former locally recruited UNHCR staff members who held an indefinite or fixed-term appointment (within 2 years of separation for males and 5 years for females) up to a maximum of two grades above the last position at UNHCR</span></li><span data-dcnode-id="540" instrument_node="">
</span><li data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">National United Nations Volunteers currently working for UNHCR</span></li><span data-dcnode-id="537" instrument_node="">
</span><li data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">National UNOPS and individual contractors currently working for UNHCR</span></li><span data-dcnode-id="534" instrument_node="">
</span><li data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Current GS staff members holding an indefinite or fixed-term appointment applying to a position in the same category two grades above the staff member’s personal grade</span></li><span data-dcnode-id="531" instrument_node="">
</span><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Current UNHCR staff members in the International Professional category holding an indefinite or fixed-term appointment applying to a GS post</span></li><span data-dcnode-id="528" instrument_node="">
</span><li data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Current UNHCR staff members in the NPO category holding an indefinite or fixed-term appointment applying to a GS post</span></li><span data-dcnode-id="525" instrument_node="">
</span><li data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Current locally recruited female staff members from other UN system Organizations holding the equivalent of an indefinite or fixed-term appointment up to a maximum of two grades above their current positions</span></li><span data-dcnode-id="522" instrument_node="">
</span><li data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">External candidates: External candidates are candidates who are not in Group 1 or Group 2. They must meet the essential minimum requirements of the position, candidates not citizens of the country must comply with all eligibility requirements for employment in line with the prevailing legislative prerequisites in the country</span></li><span data-dcnode-id="519" instrument_node="">
</span><li data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Please kindly note this is a Fast-track vacancy. In line with Administrative Instruction on Recruitment and Assignment of Locally Recruited Staff (RALS, UNHCR/AI/2020/1/Rev.2) timeframe for filling of vacancies should in principle be reduced by half at each stage to expedite the filling of vacancies under accelerated Fast Track procedures</span></li><span data-dcnode-id="516" instrument_node="">
</span><li data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Interested Group 1 and Group 2 applicants need to apply through MSRP – Self-Service – Recruiting Activities – Careers (please search by JO number or by Location). Please update your personal profiles with all required information in order to be able to apply. Please consult the attached documents for further guidance on how to update the personal profile</span></li><span data-dcnode-id="513" instrument_node="">
</span><li data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Interested external applicants need to apply online and complete the mandatory motivation letter. For technical issues with logging in to the MSRP External Portal, or with online applications, please contact the HR Unit well before the deadline to allow sufficient time for any technical problem to be resolved. External vacancies are posted on the external UNHCR website and applicants who do not have internal status must apply through the external UNHCR website https://www.unhcr.org/careers.html – Careers – Career opportunities – Other Opportunities – Vacancies – sort by Location or search by Job Opening number</span></li><span data-dcnode-id="510" instrument_node="">
</span><li data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Not signed, incomplete and late applications will not be accepted. Only shortlisted candidates will be contacted. Shortlisted candidates may be required to sit for a written test and do a competency based oral interview. UNHCR does not charge a fee at any stage of the recruitment process (application, interview, processing or any other fees)</span></li><span data-dcnode-id="507" instrument_node="">
</span><li data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">The evaluation of applicants will be conducted based on the information submitted during the application. Applicants must provide complete and accurate information pertaining to their personal profile and qualifications. No amendment, addition, deletion, revision or modification shall be made to applications that have been submitted. Candidates under serious consideration for selection will be subject to reference checks to verify the information provided in the application</span></li><span data-dcnode-id="504" instrument_node="">
</span><li data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">UNHCR is committed to diversity and inclusion within its workforce, and encourages all candidates, irrespective of gender, nationality, sexual orientation, religious and ethnic backgrounds, including persons living with disabilities, to apply to become a part of the organization. UNHCR seeks to ensure that male and female employees are given equal career opportunities. All applications will be treated with the strictest confidentiality</span></li><span data-dcnode-id="501" instrument_node="">
</span><li data-dcnode-id="496"><span data-dcnode-id="500" instrument_node="">UNHCR has a zero-tolerance policy against Sexual Exploitation and Abuse (SEA). SEA is unacceptable behavior and prohibited conduct for UNHCR personnel. It constitutes acts of serious misconduct and is therefore grounds for disciplinary measures, including dismissal. Any concerns or suspicions about a possible case of SEA should be reported immediately to the Inspector General’s Office (IGO) at inspector@unhcr.org or through the online complain form at </span><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/php/complaints.php"><span data-dcnode-id="499" instrument_node="">https://www.unhcr.org/php/complaints.php</span></a><span data-dcnode-id="497" instrument_node=""> or by confidential fax: +41 22 739 73 80</span></li><span data-dcnode-id="495" instrument_node="">
</span><li data-dcnode-id="491"><span data-dcnode-id="494" instrument_node="">UNHCR only considers higher educational qualifications obtained from an institution accredited/recognized in the World Higher Education Database (WHED), a list updated by the International Association of Universities (IAU) / United Nations Educational, Scientific and Cultural Organization (UNESCO). The list can be accessed at </span><a data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.whed.net/"><span data-dcnode-id="493" instrument_node="">http://www.whed.net/</span></a></li><span data-dcnode-id="490" instrument_node="">
</span><li data-dcnode-id="486"><span data-dcnode-id="489" instrument_node="">For any technical problems encountered during the online application, please send an email to the below email address titled “Online VA Query-your name and surname”. Human Resources Maputo </span><a data-dcnode-id="487" href="mailto:mozma@unhcr.org"><span data-dcnode-id="488" instrument_node="">mozma@unhcr.org</span></a></li></ul><span data-dcnode-id="484" instrument_node="">
