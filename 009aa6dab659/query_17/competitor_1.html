</span><h1 class="office_header_acronym" data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">
                                            UNHCR - Lebanon
                                        </span></h1><span data-dcnode-id="1292" instrument_node="">
</span><h2 class="office_header_name" data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">
                                            UNHCR has worked in Lebanon for 50 years.  The Office has both country and regional responsibilities. Prior the arrival of Syrian refugees in the spring of 2011, the Office was directed primarily at protecting and assisting some 10,000 refugees and asylum-seekers, most of whom were from Iraq.  Since then, in addition to its Beirut Office, UNHCR has established a presence in the North, Akkar,  and the Bekaa to protect and respond to the needs of displaced Syrians in Lebanon. Working alongside the government of Lebanon, notably the High Relief Commission, the Ministry of Social Affairs and municipalities, UNHCR has worked to ensure a consolidated and coordinated inter-agency response, engaging fellow UN agencies and local and international non-governmental partners.

 

UNHCR teams in the north and the Bekaa, with support from the Beirut Office, work with over 30 partner staff on the ground to receive refugees, assess needs, and meet protection, food, shelter, education, health and psycho-social needs.  The coordinated response is one that also seeks to support host families and communities who have opened their doors to refugees since the beginning of the influx. The Office has invested in strengthening the capacities of the Government, local partners, and the local community through technical and material support and the establishment of local projects to benefit refugees and hosting communities.
                                        </span></h2><span data-dcnode-id="1289" instrument_node="">
</span></div><span data-dcnode-id="1287" instrument_node="">

</span><h1 class="office_header_acronym" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">
                                            UNHCR - Myanmar
                                        </span></h1><span data-dcnode-id="1162" instrument_node="">
</span><h2 class="office_header_name" data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">
                                            In line with the implementation of the UN Strategic Framework for Myanmar (2012-2015) and its leadership of the national protection working group, UNHCR will address a range of issues relating to statelessness and displacement. It will advocate for the Government to grant citizenship to affected populations, recognize its responsibilities towards communities affected by displacement, and lift restrictive legal and administrative practices.

UNHCR will continue its efforts to enhance and deepen dialogue with the new Government in 2013, while also strengthening partnerships with civil-society groups, academic institutions and local and international NGOs. It will work with these groups to improve conditions for communities affected by displacement, returnees and populations without citizenship.



Protection monitoring, advocacy and capacity building will be complemented by improvements in basic services such as water, sanitation, health and education. Special emphasis will be placed on strengthening community leadership structures, peaceful coexistence between ethnic groups, and the participation of girls and women in decision-making.
                                        </span></h2><span data-dcnode-id="1159" instrument_node="">

                                            UNHCR - Thailand
                                        </span></h1><span data-dcnode-id="568" instrument_node="">
</span><h2 class="office_header_name" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">
                                            The Thai government invited UNHCR to begin working in Thailand in 1975 when hundreds of thousands of refugees fled to Thailand from Cambodia, Laos and Vietnam, in what became known as the Indochinese refugee crisis. More than 1.3 million refugees have been hosted by Thailand over the years.



Today there are about 88,000 registered refugees and some 8,000 asylum seekers in Thailand. Most refugees are ethnic minorities from Myanmar, mainly Karen and Karenni, who live in nine camps in four provinces along the Thai-Myanmar border. The Thai government runs all camps, with most assistance provided by non-governmental organisations (NGOs), while UNHCR focuses on protection activities and programmes to ensure that refugees live in safety and relative security within the camp
                                        </span></h2><span data-dcnode-id="565" instrument_node="">
