</span><p data-dcnode-id="252"><img data-dcnode-id="253" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dirco.gov.za/foreign/bilateral/afghanistan_files/spacer.gif&amp;raw" width="1"></p><span data-dcnode-id="251" instrument_node="">
</span></td><td data-dcnode-id="159" valign="top" width="562"><span data-dcnode-id="248" instrument_node="">
</span><div class="Section1" data-dcnode-id="161"><span data-dcnode-id="247" instrument_node="">
</span><div class="Section1" data-dcnode-id="163"><span data-dcnode-id="246" instrument_node="">
</span><p class="heading1" data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">United Nations High Commissioner 
                              for Refugees (UNHCR)</span></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">OFFICE IN SOUTH AFRICA</span></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="230"><span data-dcnode-id="239" instrument_node="">Street: Metropark Building, 8th Floor, 351 Schoeman 
                              Street, Pretoria</span><br data-dcnode-id="238"><span data-dcnode-id="237" instrument_node="">
                              Postal: PO Box 12506, Tramshed 0126</span><br data-dcnode-id="236"><span data-dcnode-id="235" instrument_node="">
                              tel: 27 12 338 5301</span><br data-dcnode-id="234"><span data-dcnode-id="233" instrument_node="">
                              fax: 27 12 322 0216/0221</span><br data-dcnode-id="232"><span data-dcnode-id="231" instrument_node="">
                              unhcrsa@unhcr.ch</span></p><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node=""> </span></p><span data-dcnode-id="226" instrument_node="">
</span><p data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">HISTORY AND PRESENT STATUS</span></p><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">The Statute of the Office of the UN High Commissioner 
                              for Refugees, detailing its functions and responsibilities, 
                              was embodied in resolution 428(V)(1950), and the 
                              Office came into being on 1 January 1951. The UNHCR 
                              reports annually to the UN General Assembly through 
                              the Economic and Social Council (ECOSOC). The mandate 
                              of the UNHCR is renewed every five years.</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">The work of the UNHCR is humanitarian and non-political. 
                              Its principal functions are to provide international 
                              protection to refugees, seek durable solutions to 
                              their plight and furnish them with material assistance. 
                              Protection involves preventing refoulement, (i.e 
                              the forcible return of the refugee to a country 
                              where he may have reason to fear persecution). In 
                              seeking durable solutions to refugees' problems, 
                              UNHCR attempts to help those who wish to go home 
                              to do so, and tries to assist them to reintegrate 
                              into their home communities. Where this is not feasible, 
                              assistance may be given in countries of asylum or, 
                              failing that, to resettle them in other countries. 
                              Material assistance is provided in the form of food, 
                              shelter, medical aid, education and other social 
                              services.</span></p><span data-dcnode-id="217" instrument_node="">
</span><p data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">South Africa was elected in February 1997 to serve 
                              on the Executive Committee of the High Commissioner's 
                              Programme. The membership is for an indefinite period, 
                              for as long as South Africa wishes to be a member. 
                              The Executive Committee determines the general policies 
                              under which the UNHCR plans, develops and administers 
                              refugee projects and programmes and advises the 
                              High Commissioner, on request, on the discharge 
                              of the duties under the Statute of the Office.</span></p><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Membership is on the widest possible geographical 
                              basis from those states (members of the UN and others) 
                              with a demonstrated interest in, and devotion to, 
                              the solution of the refugee problem. There are currently 
                              54 members.</span></p><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node=""> </span></p><span data-dcnode-id="208" instrument_node="">
</span><p data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">OTHER DEPARTMENTS AND COOPERATING ORGANISATIONS</span></p><span data-dcnode-id="205" instrument_node="">
</span><p data-dcnode-id="197"><span data-dcnode-id="204" instrument_node="">Department of Home Affairs </span><br data-dcnode-id="203"><span data-dcnode-id="202" instrument_node="">
                              Lawyers for Human Rights </span><br data-dcnode-id="201"><span data-dcnode-id="200" instrument_node="">
                              Commission on Human Rights </span><br data-dcnode-id="199"><span data-dcnode-id="198" instrument_node="">
</span></p><span data-dcnode-id="196" instrument_node="">
</span><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">RELEVANT TREATIES AND PROTOCOLS, ETC.</span></p><span data-dcnode-id="193" instrument_node="">
</span><p data-dcnode-id="181"><span data-dcnode-id="192" instrument_node="">UN Convention relating to the Status of Refugees 
                              – 28 July 1951 </span><br data-dcnode-id="191"><span data-dcnode-id="190" instrument_node="">
                              UN Protocol relating to the Status of Refugees – 
                              31 January 1967 </span><br data-dcnode-id="189"><span data-dcnode-id="188" instrument_node="">
                              South Africa acceded to the latter Convention/Protocol 
                              on 12 Janauary 1996 </span><br data-dcnode-id="187"><span data-dcnode-id="186" instrument_node="">
                              OAU Convention Governing Specific Aspects of Refugee 
                              Problems in Africa – 10 September 1969 </span><br data-dcnode-id="185"><span data-dcnode-id="184" instrument_node="">
                              South Africa signed the Instrument of Accession 
                              on 15 December 1995 (the Instrument of Accession 
                              was deposited on 15 January 1996) </span><br data-dcnode-id="183"><span data-dcnode-id="182" instrument_node="">
</span></p><span data-dcnode-id="180" instrument_node="">
</span><p data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">GENERAL COMMENTS</span></p><span data-dcnode-id="177" instrument_node="">
</span><p data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">South Africa has a direct input, through the Executive 
                              Committee (EXCOM), to the general policies under 
                              which the UNHCR plans, develops, and administers 
                              refugee projects and programmes. The EXCOM also 
                              administers the allocation of funds for projects 
                              and programmes and advises the High Commissioner.</span></p><span data-dcnode-id="174" instrument_node="">
</span><p data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">The UNHCR assisted South Africa with –</span></p><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="165"><span data-dcnode-id="170" instrument_node="">the repatriation of Mozambican refugees as well 
                              as South African exiles who wished to return; </span><br data-dcnode-id="169"><span data-dcnode-id="168" instrument_node="">
                              the drafting of the 1998 Refugee Act. </span><br data-dcnode-id="167"><span data-dcnode-id="166" instrument_node="">
                              a campaign against Xenophobia in South Africa. </span></p><span data-dcnode-id="164" instrument_node="">
