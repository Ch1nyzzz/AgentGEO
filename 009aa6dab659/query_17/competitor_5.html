</span><p data-dcnode-id="642"><span data-dcnode-id="741" instrument_node="">WASH Officer Profile </span><br data-dcnode-id="740"><br data-dcnode-id="739"><span data-dcnode-id="738" instrument_node="">Various Locations</span><br data-dcnode-id="737"><br data-dcnode-id="736"><span data-dcnode-id="735" instrument_node="">Grade: Junior (P2), Mid (P3) and Senior (P4) Level Positions </span><br data-dcnode-id="734"><br data-dcnode-id="733"><span data-dcnode-id="732" instrument_node="">The United Nations High Commissioner for Refugees (UNHCR) is mandated to lead and coordinate international action to protect and assist refugees and other persons of concern. It is constantly seeking talented, compassionate candidates with high-integrity to strengthen its capacity to respond urgently to crises with the right skills. Given the nature of UNHCR¿s work, it is essential that its workforce has the right mix of skills and qualities to fulfil its mandate.&nbsp; </span><br data-dcnode-id="731"><span data-dcnode-id="730" instrument_node="">The WASH Officer will support the UNHCR Country Operation, in coordination with the Government, to assess needs and coordinate the provision of WASH services to persons of concern to UNHCR. This will include WASH contingency and preparedness planning, assessment and development of long term WASH Strategy and operational plans.&nbsp; Coordination or WASH partners in conjunction with the government authorities, and monitoring progress of WASH programme implementation to ensure that an adequate level of WASH service is provided at each site in accordance with the UNHCR WASH Manual and Technical Guidelines, and applicable UNHCR Standards and/or National Standards.</span><br data-dcnode-id="729"><br data-dcnode-id="728"><span data-dcnode-id="727" instrument_node="">Responsibilities include:</span><br data-dcnode-id="726"><span data-dcnode-id="725" instrument_node="">Leadership and Coordination</span><br data-dcnode-id="724"><span data-dcnode-id="723" instrument_node="">- Lead the delivery of WASH services for refugees to meet the UNHCR standards and / or the national WASH standards, depending on the context. </span><br data-dcnode-id="722"><span data-dcnode-id="721" instrument_node="">- Act as a focal point for WASH issues within UNHCR and liaise with UN and international agencies, Government and Non-governmental counterparts. </span><br data-dcnode-id="720"><span data-dcnode-id="719" instrument_node="">- Coordinate the activities of WASH Partners, together with other UN agencies, governmental and non-governmental counterparts and local authorities to ensure delivery of WASH services to beneficiaries meet UNHCR standards of assistance, depending on the context. </span><br data-dcnode-id="718"><br data-dcnode-id="717"><br data-dcnode-id="716"><span data-dcnode-id="715" instrument_node="">WASH Strategy, Planning and Programme Support</span><br data-dcnode-id="714"><span data-dcnode-id="713" instrument_node="">- Actively participate in drafting WASH strategies, and operational plans for UNHCR WASH programme at the country level. </span><br data-dcnode-id="712"><span data-dcnode-id="711" instrument_node="">- Jointly with technical staff of implementing partners and other WASH actors, update detailed needs and resource assessments and revise designs of technical plans as necessary, taking into account practical aspects of implementation, long-term sustainable solutions, and relevant technical specifications and guidelines. </span><br data-dcnode-id="710"><span data-dcnode-id="709" instrument_node="">- Advise and assist the UNHCR programme staff on the development of WASH aspects of the programme including planning, budgeting and input to financial management of the programme. </span><br data-dcnode-id="708"><br data-dcnode-id="707"><br data-dcnode-id="706"><span data-dcnode-id="705" instrument_node="">Technical Assistance and Capacity Building</span><br data-dcnode-id="704"><span data-dcnode-id="703" instrument_node="">- Provide technical guidance and support to partners on all water, sanitation, hygiene promotion related issues, to ensure quality, cost-effectiveness, sustainability and impact soundness in their implementation and in accordance with UNHCR policies, standards and priorities. </span><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">- Facilitate capacity strengthening activities of national UNHCR WASH staff and, if applicable, of staff of implementing/operational partners to address key areas of WASH importance to refugees and other persons of concern to UNHCR. </span><br data-dcnode-id="700"><br data-dcnode-id="699"><br data-dcnode-id="698"><span data-dcnode-id="697" instrument_node="">Monitoring, Evaluation and Quality Assurance</span><br data-dcnode-id="696"><span data-dcnode-id="695" instrument_node="">- Supervise and monitor the implementation of the ongoing water, sanitation, hygiene projects administered directly by UNHCR and its partners. </span><br data-dcnode-id="694"><span data-dcnode-id="693" instrument_node="">- Ensure that mechanisms to monitor the performance of UNHCRs partners on WASH activities in the refugee camps / settlements / host community are in place. </span><br data-dcnode-id="692"><span data-dcnode-id="691" instrument_node="">- Ensure that the WASH Monitoring System data collection and reporting is carried out systematically, properly and timely with quality information </span><br data-dcnode-id="690"><br data-dcnode-id="689"><br data-dcnode-id="688"><span data-dcnode-id="687" instrument_node="">Reporting</span><br data-dcnode-id="686"><span data-dcnode-id="685" instrument_node="">- Report regularly on WASH activity implementation by all WASH partners, while maintaining accurate records of all relevant WASH performance indicators. </span><br data-dcnode-id="684"><span data-dcnode-id="683" instrument_node="">- Prepare regular sectorial reports and submit material for preparation of periodic project monitoring reports as required by the office at country level. </span><br data-dcnode-id="682"><span data-dcnode-id="681" instrument_node="">- Maintaining regular contact with the WASH Unit, Public Health Section in Geneva regarding all technical matters. </span><br data-dcnode-id="680"><br data-dcnode-id="679"><br data-dcnode-id="678"><span data-dcnode-id="677" instrument_node="">Minimum Qualifications and Professional Experience Required: </span><br data-dcnode-id="676"><span data-dcnode-id="675" instrument_node="">For positions at the P2 level</span><br data-dcnode-id="674"><span data-dcnode-id="673" instrument_node="">- Education: University degree in Civil / Environmental / Water / Public Health Engineering or related field. </span><br data-dcnode-id="672"><span data-dcnode-id="671" instrument_node="">- Minimum of 2 years of relevant professional experience with Advanced University/Master's Degree (4 years with University/Bachelor's Degree). </span><br data-dcnode-id="670"><span data-dcnode-id="669" instrument_node="">- Excellent knowledge of English and good working knowledge of another UN language. French/English is particularly desirable (dependant on official language of country).</span><br data-dcnode-id="668"><br data-dcnode-id="667"><br data-dcnode-id="666"><br data-dcnode-id="665"><br data-dcnode-id="664"><span data-dcnode-id="663" instrument_node="">For positions at the P3 level</span><br data-dcnode-id="662"><span data-dcnode-id="661" instrument_node="">- Education: University degree in Civil / Environmental / Water / Public Health Engineering or related field. </span><br data-dcnode-id="660"><span data-dcnode-id="659" instrument_node="">- Minimum of 6 years of relevant experience with Advanced University/Master's Degree&nbsp;&nbsp;&nbsp;&nbsp; (8 years with University/Bachelor's Degree) of which a minimum of 2 years of international field experience </span><br data-dcnode-id="658"><span data-dcnode-id="657" instrument_node="">- Excellent knowledge of English and good working knowledge of another UN language. French/English is particularly desirable (dependant on official language of country).</span><br data-dcnode-id="656"><br data-dcnode-id="655"><br data-dcnode-id="654"><span data-dcnode-id="653" instrument_node="">For positions at the P4 level</span><br data-dcnode-id="652"><span data-dcnode-id="651" instrument_node="">- Education: University degree in Civil / Environmental / Water / Public Health Engineering or related field. </span><br data-dcnode-id="650"><span data-dcnode-id="649" instrument_node="">- Minimum of 10 years of relevant experience with Advanced University/Master's Degree (12 years with University/Bachelor's Degree) of which a minimum of 4 years of international field experience </span><br data-dcnode-id="648"><span data-dcnode-id="647" instrument_node="">- Excellent knowledge of English and good working knowledge of another UN language. French/English is particularly desirable (dependant on official language of country).</span><br data-dcnode-id="646"><br data-dcnode-id="645"><br data-dcnode-id="644"><span data-dcnode-id="643" instrument_node="">The UNHCR workforce consists of many diverse nationalities, cultures, languages and opinions. UNHCR seeks to sustain and strengthen this diversity to ensure equal opportunities as well as an inclusive working environment for its entire workforce. Applications are encouraged from all qualified candidates without distinction on grounds of race, colour, sex, national origin, age, religion, disability, sexual orientation and gender identity.</span></p><span data-dcnode-id="641" instrument_node="">
