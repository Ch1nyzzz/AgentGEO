</span><meta content="Humanitarian organizations (HOs) often base their warehouse locations on individuals' experience and knowledge rather than on decision-support tools. …" data-dcnode-id="6459" property="og:description"><span data-dcnode-id="6458" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>Humanitarian organizations (HOs) often base their warehouse locations on individuals&amp;#x27; experience and knowledge rather than on decision-support tools. Many HOs run separate supply chains for emergency response and ongoing operations. Based on reviews of humanitarian network design literature combined with an in-depth case study of United Nations High Commissioner for Refugees (UNHCR), this paper presents a warehouse location model for joint prepositioning that incorporates political and security situation factors. Although accessibility, co-location, security, and human resources are crucial to the practice of humanitarian operations management, such contextual factors have not been included in existing network optimization models before. We found that when quantified, and modeled, such factors are important determinants of network configuration. In addition, our results suggest that joint prepositioning for emergency response and ongoing operations allows for expansion of the global warehouse network, and reducing cost and response time.</p></div></div></div>" data-dcnode-id="6457" lang="en" name="citation_abstract"><span data-dcnode-id="6456" instrument_node="">

696316300444%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5846" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="5843"></section><section class="ReferencedArticles" data-dcnode-id="5842"></section><div class="PageDivider" data-dcnode-id="5841"></div><div class="Abstracts u-font-serif" data-dcnode-id="5831" id="abstracts"><div class="abstract author" data-dcnode-id="5832" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5839"><span data-dcnode-id="5840" instrument_node="">Abstract</span></h2><div data-dcnode-id="5833" id="abssec0010"><p data-dcnode-id="5834" id="abspara0010"><span data-dcnode-id="5838" instrument_node="">Humanitarian organizations (HOs) often base their warehouse locations on individuals' experience and knowledge rather than on decision-support tools. Many HOs run separate supply chains for emergency response and ongoing operations. Based on reviews of humanitarian network design literature combined with an in-depth case study of United Nations High Commissioner for Refugees (UNHCR), this paper presents a warehouse location model for joint prepositioning that incorporates political and security situation factors. Although accessibility, co-location, security, and human resources are crucial to the practice of humanitarian operations management, such contextual factors have not been included in existing network optimization models before. We found that when quantified, and modeled, such factors are important </span><a class="topic-link" data-dcnode-id="5836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/mathematics/determinants" title="Learn more about determinants from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5837" instrument_node="">determinants</span></a><span data-dcnode-id="5835" instrument_node=""> of network configuration. In addition, our results suggest that joint prepositioning for emergency response and ongoing operations allows for expansion of the global warehouse network, and reducing cost and response time.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="5808" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="5820"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0272696316300420"><svg class="icon icon-navigate-left" data-dcnode-id="5829" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="5830"></path></svg><span class="button-alternative-text" data-dcnode-id="5822"><strong data-dcnode-id="5827"><span data-dcnode-id="5828" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="5825"><span data-dcnode-id="5826" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5823"><span data-dcnode-id="5824" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="5809"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0272696316300365"><span class="button-alternative-text" data-dcnode-id="5813"><strong data-dcnode-id="5818"><span data-dcnode-id="5819" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="5816"><span data-dcnode-id="5817" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5814"><span data-dcnode-id="5815" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="5811" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="5812"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="5792"><div class="keywords-section" data-dcnode-id="5793" id="kwrds0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5806"><span data-dcnode-id="5807" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="5803" id="kwrd0010"><span data-dcnode-id="5804"><span data-dcnode-id="5805" instrument_node="">Network configuration</span></span></div><div class="keyword" data-dcnode-id="5800" id="kwrd0015"><span data-dcnode-id="5801"><span data-dcnode-id="5802" instrument_node="">Facility location</span></span></div><div class="keyword" data-dcnode-id="5797" id="kwrd0020"><span data-dcnode-id="5798"><span data-dcnode-id="5799" instrument_node="">UNHCR</span></span></div><div class="keyword" data-dcnode-id="5794" id="kwrd0025"><span data-dcnode-id="5795"><span data-dcnode-id="5796" instrument_node="">Prepositioning</span></span></div></div></div><span data-dcnode-id="5791" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3499" id="body"><div data-dcnode-id="4179"><section data-dcnode-id="5722" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5787" id="sectitle0020"><span data-dcnode-id="5790" instrument_node="">1</span><span data-dcnode-id="5789" instrument_node="">. </span><span data-dcnode-id="5788" instrument_node="">Introduction</span></h2><p data-dcnode-id="5742" id="p0010"><span data-dcnode-id="5782"><span data-dcnode-id="5786" instrument_node="">Improving network design to cut cost and reduce response time is critical for </span><a class="topic-link" data-dcnode-id="5784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/humanitarian-logistics" title="Learn more about humanitarian logistics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5785" instrument_node="">humanitarian logistics</span></a><span data-dcnode-id="5783" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="5780" href="#bib52" name="bbib52"><span data-dcnode-id="5781" instrument_node="">Van Wassenhove, 2006</span></a><span data-dcnode-id="5779" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5777" href="#bib51" name="bbib51"><span data-dcnode-id="5778" instrument_node="">Van Wassenhove and Pedraza Martinez, 2012</span></a><span data-dcnode-id="5776" instrument_node="">). The trend among larger humanitarian organizations (HOs) such as International Federation of Red Cross and Red Crescent Societies (IFRC), United Nations High Commissioner for Refugees (UNHCR), World Food Program (WFP), Cooperative for Assistance and Relief Everywhere (CARE), and United Nations Children's Fund (UNICEF) is to preposition un-consigned relief items for emergency response in warehouses located close to disaster-prone areas (see e.g., </span><a class="workspace-trigger" data-dcnode-id="5774" href="#bib26" name="bbib26"><span data-dcnode-id="5775" instrument_node="">Jahre and Heigh, 2008</span></a><span data-dcnode-id="5773" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5771" href="#bib46" name="bbib46"><span data-dcnode-id="5772" instrument_node="">Schulz, 2008</span></a><span data-dcnode-id="5770" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5768" href="#bib12" name="bbib12"><span data-dcnode-id="5769" instrument_node="">Charles, 2010</span></a><span data-dcnode-id="5767" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5765" href="#bib19" name="bbib19"><span data-dcnode-id="5766" instrument_node="">Gatignon et&nbsp;al., 2010</span></a><span data-dcnode-id="5764" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5762" href="#bib31" name="bbib31"><span data-dcnode-id="5763" instrument_node="">McCoy and Brandeau, 2011</span></a><span data-dcnode-id="5761" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5759" href="#bib5" name="bbib5"><span data-dcnode-id="5760" instrument_node="">Bemley et&nbsp;al., 2013</span></a><span data-dcnode-id="5758" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5756" href="#bib28" name="bbib28"><span data-dcnode-id="5757" instrument_node="">Komrska et&nbsp;al., 2013</span></a><span data-dcnode-id="5755" instrument_node="">). However, stock prepositioning is expensive, and owing to funding restrictions, other alternatives have been suggested including vendor-managed inventory (</span><a class="workspace-trigger" data-dcnode-id="5753" href="#bib51" name="bbib51"><span data-dcnode-id="5754" instrument_node="">Van Wassenhove and Pedraza Martinez, 2012</span></a><span data-dcnode-id="5752" instrument_node="">), framework agreements (</span><a class="workspace-trigger" data-dcnode-id="5750" href="#bib2" name="bbib2"><span data-dcnode-id="5751" instrument_node="">Balcik and Ak, 2013</span></a><span data-dcnode-id="5749" instrument_node="">), transfer mechanisms between programs (</span><a class="workspace-trigger" data-dcnode-id="5747" href="#bib8" name="bbib8"><span data-dcnode-id="5748" instrument_node="">Bhattacharya et&nbsp;al., 2014</span></a><span data-dcnode-id="5746" instrument_node="">), and co-location between organizations (</span><a class="workspace-trigger" data-dcnode-id="5744" href="#bib1" name="bbib1"><span data-dcnode-id="5745" instrument_node="">Acimovic and Goentzel, 2016</span></a><span data-dcnode-id="5743" instrument_node="">).</span></p><p data-dcnode-id="5730" id="p0015"><span data-dcnode-id="5741" instrument_node="">Most HOs are engaged in both long- and short-term (emergency relief) operations, for which they usually operate different supply chains with separate warehouses. Recently, joint supply chains with vehicles serving both types of operations have been suggested as an alternative for saving cost (</span><a class="workspace-trigger" data-dcnode-id="5739" href="#bib7" name="bbib7"><span data-dcnode-id="5740" instrument_node="">Besiou et&nbsp;al., 2014</span></a><span data-dcnode-id="5738" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5736" href="#bib48" name="bbib48"><span data-dcnode-id="5737" instrument_node="">Stauffer et&nbsp;al., 2015</span></a><span data-dcnode-id="5731"><span data-dcnode-id="5735" instrument_node="">). In principle, one should be able to integrate the two to reduce response time and total operating cost. Long-term operations could, for instance, be serviced by using un-consigned stock to avoid long lead times from distant suppliers, while emergency relief could be serviced by using closely located stockpiles to avoid expensive express shipments over long distances. Integration of the two supply chains may allow for additional warehouses closer to demand points, but doing so would require designing and operating a joint network with different demand uncertainties, objectives, and </span><a class="topic-link" data-dcnode-id="5733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/operational-procedure" title="Learn more about operational procedures from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5734" instrument_node="">operational procedures</span></a><span data-dcnode-id="5732" instrument_node="">. In the current paper, we attempt to address those challenges. To the best of our knowledge, models that explicitly combine emergency relief and longer-term operations supply chains for prepositioning of goods have not been reported. Furthermore, factors related to political and security conditions, often mentioned in extant literature as being important for location decisions in the humanitarian context, lack empirical or quantitative justifications. The objective of this study is to develop a model that integrates factors such as hardship, security, pilferage, co-location, and accessibility in determining best joint prepositioning warehouse locations. Such a model can help quantify the impact of an expanded network on both lead time and cost. Using the developed model, we generate empirical and computational insights on the factors that significantly influence warehouse location choice.</span></span></p><p data-dcnode-id="5728" id="p0020"><span data-dcnode-id="5729" instrument_node="">To address the above objectives, we conducted an in-depth, exploratory case study with UNHCR, which is mandated to lead and coordinate international operations to safeguard the rights and well-being of refugees and resolve refugee problems worldwide. This case demonstrates relevant examples of the generic challenges faced by HOs in terms of reducing costs while maintaining response in a timely manner in both short- and long-term operations. As is typical for a HO, UNHCR runs two supply chains. First, in their emergency relief (ER) supply chain, speed is essential, and they have responded to this need by using fast means of transportation from large centralized global warehouses. Second, and in parallel, they support their long-term ongoing operations (OOs), for example, camp operation, with stocks transported from decentralized country warehouses or shipped directly from suppliers. Merging of the two supply chains presents an opportunity to reduce cost but also implies the need to redesign their network, particularly considering the locations of their global warehouses. One of the challenges associated with building a joint supply chain constitute the differing objectives, with ER aiming to reach the beneficiaries as fast as possible, and OOs aiming to satisfy all demand incurring minimum cost, while still being mindful of responsiveness. Hence, decisions have to consider both objectives and their trade-offs, requiring multi-objective models. In this study, we developed such a model, tested it with datasets based on the UNHCR case study, and presented an efficient frontier analysis for different budget levels. UNHCR is now working on implementing the model into their enterprise resource planning (ERP) system and as a part of their overall decision making process.</span></p><p data-dcnode-id="5723" id="p0025"><span data-dcnode-id="5727" instrument_node="">This paper answers the call for more applied, context-sensitive research in humanitarian operations (</span><a class="workspace-trigger" data-dcnode-id="5725" href="#bib22" name="bbib22"><span data-dcnode-id="5726" instrument_node="">Holguín-Veras et&nbsp;al., 2012</span></a><span data-dcnode-id="5724" instrument_node="">) with two main research contributions. First, we developed a framework and a data-driven model that integrate long-term and emergency relief supply chains, accounting for both response time and cost. Second, the study helps fill the gap in humanitarian network design literature by including security and political factors, which influence warehouse locations for prepositioned stock but have not been incorporated in decision models thus far. Through computations, we show their impact on transportation and warehousing decisions.</span></p></section><section data-dcnode-id="5551" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5718" id="sectitle0025"><span data-dcnode-id="5721" instrument_node="">2</span><span data-dcnode-id="5720" instrument_node="">. </span><span data-dcnode-id="5719" instrument_node="">Literature review</span></h2><p data-dcnode-id="5686" id="p0030"><span data-dcnode-id="5717" instrument_node="">Humanitarian research typically categorizes network design models depending on problem type, objective functions, number of levels included, and the manner in which uncertainties are treated (cf. </span><a class="workspace-trigger" data-dcnode-id="5715" href="#bib27" name="bbib27"><span data-dcnode-id="5716" instrument_node="">Jia et&nbsp;al., 2007</span></a><span data-dcnode-id="5714" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5712" href="#bib11" name="bbib11"><span data-dcnode-id="5713" instrument_node="">Caunhye et&nbsp;al., 2012</span></a><span data-dcnode-id="5711" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5709" href="#bib23" name="bbib23"><span data-dcnode-id="5710" instrument_node="">Holguín-Veras et&nbsp;al., 2013</span></a><span data-dcnode-id="5708" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5706" href="#bib36" name="bbib36"><span data-dcnode-id="5707" instrument_node="">Ortuño et&nbsp;al., 2013</span></a><span data-dcnode-id="5705" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5703" href="#bib44" name="bbib44"><span data-dcnode-id="5704" instrument_node="">Rennemo et&nbsp;al., 2014</span></a><span data-dcnode-id="5702" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5700" href="#bib37" name="bbib37"><span data-dcnode-id="5701" instrument_node="">Özdamar and Ertem, 2015</span></a><span data-dcnode-id="5699" instrument_node="">). In their overview of models, </span><a class="workspace-trigger" data-dcnode-id="5697" href="#bib11" name="bbib11"><span data-dcnode-id="5698" instrument_node="">Caunhye et&nbsp;al. (2012)</span></a><span data-dcnode-id="5696" instrument_node=""> divided the literature into two main categories, namely, facility location and relief distribution. Our research falls under the former category, which can be subdivided into pure location models (e.g., </span><a class="workspace-trigger" data-dcnode-id="5694" href="#bib27" name="bbib27"><span data-dcnode-id="5695" instrument_node="">Jia et&nbsp;al., 2007</span></a><span data-dcnode-id="5693" instrument_node="">), inventory models (e.g., </span><a class="workspace-trigger" data-dcnode-id="5691" href="#bib10" name="bbib10"><span data-dcnode-id="5692" instrument_node="">Campbell and Jones, 2011</span></a><span data-dcnode-id="5690" instrument_node="">) and models, which, similar to our approach, combine the location problem with the amount of inventory to preposition at each location (e.g., </span><a class="workspace-trigger" data-dcnode-id="5688" href="#bib31" name="bbib31"><span data-dcnode-id="5689" instrument_node="">McCoy and Brandeau, 2011</span></a><span data-dcnode-id="5687" instrument_node="">).</span></p><p data-dcnode-id="5633" id="p0035"><span data-dcnode-id="5685" instrument_node="">The objective for models addressing public sector problems and humanitarian aid is often to maximize the amount of demand satisfied or to minimize lead time (e.g., </span><a class="workspace-trigger" data-dcnode-id="5683" href="#bib3" name="bbib3"><span data-dcnode-id="5684" instrument_node="">Balcik and Beamon, 2008</span></a><span data-dcnode-id="5682" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5680" href="#bib33" name="bbib33"><span data-dcnode-id="5681" instrument_node="">Mete and Zabinsky, 2010</span></a><span data-dcnode-id="5679" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5677" href="#bib45" name="bbib45"><span data-dcnode-id="5678" instrument_node="">Salmerón and Apte, 2010</span></a><span data-dcnode-id="5676" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5674" href="#bib15" name="bbib15"><span data-dcnode-id="5675" instrument_node="">Duran et&nbsp;al., 2011</span></a><span data-dcnode-id="5673" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5671" href="#bib9" name="bbib9"><span data-dcnode-id="5672" instrument_node="">Bozorgi-Amiri et&nbsp;al., 2013</span></a><span data-dcnode-id="5670" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5668" href="#bib4" name="bbib4"><span data-dcnode-id="5669" instrument_node="">Barcinpour and Esmaeili, 2014</span></a><span data-dcnode-id="5667" instrument_node="">; and </span><a class="workspace-trigger" data-dcnode-id="5665" href="#bib44" name="bbib44"><span data-dcnode-id="5666" instrument_node="">Rennemo et&nbsp;al., 2014</span></a><span data-dcnode-id="5664" instrument_node="">). Comprehensive reviews were presented in </span><a class="workspace-trigger" data-dcnode-id="5662" href="#bib11" name="bbib11"><span data-dcnode-id="5663" instrument_node="">Caunhye et&nbsp;al., 2012</span></a><span data-dcnode-id="5661" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5659" href="#bib23" name="bbib23"><span data-dcnode-id="5660" instrument_node="">Holguín-Veras et&nbsp;al., 2013</span></a><span data-dcnode-id="5658" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5656" href="#bib44" name="bbib44"><span data-dcnode-id="5657" instrument_node="">Rennemo et&nbsp;al., 2014</span></a><span data-dcnode-id="5655" instrument_node="">, and </span><a class="workspace-trigger" data-dcnode-id="5653" href="#bib37" name="bbib37"><span data-dcnode-id="5654" instrument_node="">Özdamar and Ertem (2015)</span></a><span data-dcnode-id="5652" instrument_node=""> as well. To ensure maximum demand coverage, some researchers have associated a penalty cost with unmet demand and endeavored to minimize said cost (e.g., </span><a class="workspace-trigger" data-dcnode-id="5650" href="#bib42" name="bbib42"><span data-dcnode-id="5651" instrument_node="">Psaraftis et&nbsp;al., 1986</span></a><span data-dcnode-id="5649" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5647" href="#bib43" name="bbib43"><span data-dcnode-id="5648" instrument_node="">Rawls and Turnquist, 2010</span></a><span data-dcnode-id="5646" instrument_node="">). Another stream of research has focused on modeling responsiveness and has generated models that include a benefit for timely demand satisfaction in their objective function along with a penalty for unmet demand (cf. review in </span><a class="workspace-trigger" data-dcnode-id="5644" href="#bib23" name="bbib23"><span data-dcnode-id="5645" instrument_node="">Holguín-Veras et&nbsp;al., 2013</span></a><span data-dcnode-id="5643" instrument_node="">). In contrast, other studies have focused primarily on the cost aspect when solving the facility location problem (FLP) in the humanitarian aid context. For example, </span><a class="workspace-trigger" data-dcnode-id="5641" href="#bib24" name="bbib24"><span data-dcnode-id="5642" instrument_node="">Iakovou et&nbsp;al. (1997)</span></a><span data-dcnode-id="5640" instrument_node=""> considered only facility and operating costs, while </span><a class="workspace-trigger" data-dcnode-id="5638" href="#bib4" name="bbib4"><span data-dcnode-id="5639" instrument_node="">Barcinpour and Esmaeili (2014)</span></a><span data-dcnode-id="5637" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="5635" href="#bib9" name="bbib9"><span data-dcnode-id="5636" instrument_node="">Bozorgi-Amiri et&nbsp;al. (2013)</span></a><span data-dcnode-id="5634" instrument_node=""> accounted for several cost considerations as a joint objective function. In this paper, we include both lead time and cost as objectives, along with other considerations such as security and political factors, while enforcing total demand satisfaction.</span></p><p data-dcnode-id="5600" id="p0040"><span data-dcnode-id="5632" instrument_node="">For considering multiple objectives, one common technique used is to associate weights with each objective (</span><a class="workspace-trigger" data-dcnode-id="5630" href="#bib14" name="bbib14"><span data-dcnode-id="5631" instrument_node="">Doerner et&nbsp;al., 2009</span></a><span data-dcnode-id="5629" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5627" href="#bib35" name="bbib35"><span data-dcnode-id="5628" instrument_node="">Nolz et&nbsp;al., 2011</span></a><span data-dcnode-id="5622"><span data-dcnode-id="5626" instrument_node="">) and solve the FLP as a </span><a class="topic-link" data-dcnode-id="5624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/cost-minimization" title="Learn more about cost minimization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5625" instrument_node="">cost minimization</span></a><span data-dcnode-id="5623" instrument_node=""> problem (e.g., </span></span><a class="workspace-trigger" data-dcnode-id="5620" href="#bib47" name="bbib47"><span data-dcnode-id="5621" instrument_node="">Shen and Daskin, 2005</span></a><span data-dcnode-id="5619" instrument_node="">). Because providing a single optimal solution when multiple objectives are involved remains difficult, different objective functions are often assigned weights to prioritize them, and solutions for different prioritization schemes are analyzed accordingly (</span><a class="workspace-trigger" data-dcnode-id="5617" href="#bib53" name="bbib53"><span data-dcnode-id="5618" instrument_node="">Vitoriano et&nbsp;al., 2011</span></a><span data-dcnode-id="5616" instrument_node="">). One example is </span><a class="workspace-trigger" data-dcnode-id="5614" href="#bib49" name="bbib49"><span data-dcnode-id="5615" instrument_node="">Tzeng et&nbsp;al. (2007)</span></a><span data-dcnode-id="5613" instrument_node="">, wherein fuzzy logic was applied to find the optimal balance among cost, travel time, and proportion of demand met. </span><a class="workspace-trigger" data-dcnode-id="5611" href="#bib48" name="bbib48"><span data-dcnode-id="5612" instrument_node="">Stauffer et&nbsp;al. (2015)</span></a><span data-dcnode-id="5610" instrument_node="">, in contrast, modeled responsiveness by including an expediting cost in the objective function. Another alternative to handle multi-objectives when the main consideration is to maximize responsiveness is including additional objectives such as cost as model constraints (e.g., </span><a class="workspace-trigger" data-dcnode-id="5608" href="#bib45" name="bbib45"><span data-dcnode-id="5609" instrument_node="">Salmerón and Apte, 2010</span></a><span data-dcnode-id="5607" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5605" href="#bib15" name="bbib15"><span data-dcnode-id="5606" instrument_node="">Duran et&nbsp;al., 2011</span></a><span data-dcnode-id="5604" instrument_node="">). We adopted this approach and modeled responsiveness by minimizing lead time as a measure of service and included a budget constraint. Our model was then used to determine (1&nbsp;+&nbsp;ε)-Pareto curves to analyze the trade-off between the cost and lead time objectives. Such methods are commonly used in multi-objective optimization (cf. </span><a class="workspace-trigger" data-dcnode-id="5602" href="#bib38" name="bbib38"><span data-dcnode-id="5603" instrument_node="">Papadimitriou and Yannakakis, 2000</span></a><span data-dcnode-id="5601" instrument_node="">).</span></p><p data-dcnode-id="5592" id="p0045"><span data-dcnode-id="5599" instrument_node="">Two studies are of particular interest to our research. </span><a class="workspace-trigger" data-dcnode-id="5597" href="#bib48" name="bbib48"><span data-dcnode-id="5598" instrument_node="">Stauffer et&nbsp;al. (2015)</span></a><span data-dcnode-id="5596" instrument_node=""> looked at how organizations can manage short- and long-term programs together. They found that a centralized hub configuration combined with temporary hubs can reduce overall supply chain costs over a long time horizon when global vehicle supply chains for development and emergency operations are handled together. Similarly, </span><a class="workspace-trigger" data-dcnode-id="5594" href="#bib7" name="bbib7"><span data-dcnode-id="5595" instrument_node="">Besiou et&nbsp;al. (2014)</span></a><span data-dcnode-id="5593" instrument_node=""> concluded that using the same vehicles for both development and emergencies affects performance ranking for service levels, suggesting that organizations “should include the operational mix in the decision-making factors when choosing the structure” (ibid, p.10). Accordingly, both aforementioned studies demonstrate the advantages of integrated network structures.</span></p><p data-dcnode-id="5552" id="p0050"><span data-dcnode-id="5591" instrument_node="">The literature on commercial FLPs (cf. </span><a class="workspace-trigger" data-dcnode-id="5589" href="#bib13" name="bbib13"><span data-dcnode-id="5590" instrument_node="">Chopra and Meindl, 2010</span></a><span data-dcnode-id="5584"><span data-dcnode-id="5588" instrument_node="">) lists several important factors from the network design viewpoint. We identified additional factors by reviewing </span><a class="topic-link" data-dcnode-id="5586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/humanitarian-logistics" title="Learn more about humanitarian logistics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5587" instrument_node="">humanitarian logistics</span></a><span data-dcnode-id="5585" instrument_node=""> literature and modeling papers (</span></span><a class="workspace-trigger" data-dcnode-id="5582" href="#appsec1" name="bappsec1"><span data-dcnode-id="5583" instrument_node="">Appendix A</span></a><span data-dcnode-id="5581" instrument_node="">). We focused on the extent to which extant research discusses, models, and quantifies factors based on real data. We found that similar to commercial models, most humanitarian models include infrastructure, demand, and cost, but there are some differences. In humanitarian research, greater weight is given to demand risk (cf. </span><a class="workspace-trigger" data-dcnode-id="5579" href="#bib29" name="bbib29"><span data-dcnode-id="5580" instrument_node="">Liberatore et&nbsp;al., 2013</span></a><span data-dcnode-id="5578" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5576" href="#bib44" name="bbib44"><span data-dcnode-id="5577" instrument_node="">Rennemo et&nbsp;al., 2014</span></a><span data-dcnode-id="5575" instrument_node="">). Funding issues are typically modeled as budgetary constraints (cf. </span><a class="workspace-trigger" data-dcnode-id="5573" href="#bib45" name="bbib45"><span data-dcnode-id="5574" instrument_node="">Salmerón and Apte, 2010</span></a><span data-dcnode-id="5572" instrument_node="">). Furthermore, political and security issues are accorded greater concern (cf. </span><a class="workspace-trigger" data-dcnode-id="5570" href="#bib30" name="bbib30"><span data-dcnode-id="5571" instrument_node="">Martel et&nbsp;al., 2013</span></a><span data-dcnode-id="5565"><span data-dcnode-id="5569" instrument_node="">). While various papers have discussed these factors, modeling has been limited to demand and logistics, except for one </span><a class="topic-link" data-dcnode-id="5567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/mathematics/security-aspect" title="Learn more about security aspect from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5568" instrument_node="">security aspect</span></a><span data-dcnode-id="5566" instrument_node="">, namely, personnel availability (cf. </span></span><a class="workspace-trigger" data-dcnode-id="5563" href="#bib45" name="bbib45"><span data-dcnode-id="5564" instrument_node="">Salmerón and Apte, 2010</span></a><span data-dcnode-id="5562" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5560" href="#bib9" name="bbib9"><span data-dcnode-id="5561" instrument_node="">Bozorgi-Amiri et&nbsp;al., 2013</span></a><span data-dcnode-id="5559" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="5557" href="#bib15" name="bbib15"><span data-dcnode-id="5558" instrument_node="">Duran et&nbsp;al. (2011)</span></a><span data-dcnode-id="5556" instrument_node="">, for example, have provided the most extensive discussion of political and security factors, but rather than quantifying and including them in the model, they suggested ranking the locations </span><em data-dcnode-id="5554"><span data-dcnode-id="5555" instrument_node="">resulting</span></em><span data-dcnode-id="5553" instrument_node=""> from the quantitative analysis, which requires decision makers to qualitatively judge each location based on how well it meets these additional factors. Accordingly, there is a big gap in prevailing research regarding (i) empirical analysis of the extent to which each factor actually impacts location decisions and (ii) quantification of any factor's potential impact using real data and its incorporation into the model. Our study contributes to filling this gap.</span></p></section><section data-dcnode-id="5291" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5547" id="sectitle0030"><span data-dcnode-id="5550" instrument_node="">3</span><span data-dcnode-id="5549" instrument_node="">. </span><span data-dcnode-id="5548" instrument_node="">Methodology for qualitative empirical study</span></h2><section data-dcnode-id="5505" id="sec3.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5543" id="sectitle0035"><span data-dcnode-id="5546" instrument_node="">3.1</span><span data-dcnode-id="5545" instrument_node="">. </span><span data-dcnode-id="5544" instrument_node="">Case selection</span></h3><p data-dcnode-id="5523" id="p0055"><span data-dcnode-id="5542" instrument_node="">An in-depth, exploratory case study was conducted with UNHCR following theory-building principles (</span><a class="workspace-trigger" data-dcnode-id="5540" href="#bib16" name="bbib16"><span data-dcnode-id="5541" instrument_node="">Eisenhardt, 1989</span></a><span data-dcnode-id="5539" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5537" href="#bib32" name="bbib32"><span data-dcnode-id="5538" instrument_node="">McCutcheon and Meredith, 1993</span></a><span data-dcnode-id="5536" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5534" href="#bib34" name="bbib34"><span data-dcnode-id="5535" instrument_node="">Miles and Huberman, 1994</span></a><span data-dcnode-id="5533" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5531" href="#bib57" name="bbib57"><span data-dcnode-id="5532" instrument_node="">Yin, 2014</span></a><span data-dcnode-id="5530" instrument_node="">). A single case allows one to gain more in-depth understanding of the studied phenomenon (cf. </span><a class="workspace-trigger" data-dcnode-id="5528" href="#bib54" name="bbib54"><span data-dcnode-id="5529" instrument_node="">Voss et&nbsp;al., 2002</span></a><span data-dcnode-id="5527" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5525" href="#bib57" name="bbib57"><span data-dcnode-id="5526" instrument_node="">Yin, 2014</span></a><span data-dcnode-id="5524" instrument_node="">). Accordingly, the UNHCR case provides an opportunity to acquire the rich, qualitative data required to develop a network design model useful for the humanitarian sector. The study was initiated in response to a 2012 request from UNHCR for help with developing a tool to support their warehouse location decisions. UNHCR's effort to reduce both cost and response time in long- and short-term operations is representative of the efforts of most large HOs. Many organizations including WFP and UNICEF operate in the same countries as UNHCR under comparable political and security conditions, and have similar organizational structures and human resources policies.</span></p><p data-dcnode-id="5506" id="p0060"><span data-dcnode-id="5522" instrument_node="">The case study included a field trip to UNHCR's Kenya operations (</span><a class="workspace-trigger" data-dcnode-id="5520" href="#bib6" name="bbib6"><span data-dcnode-id="5521" instrument_node="">Bendz and Granlund, 2012</span></a><span data-dcnode-id="5519" instrument_node="">). This operation represents a critical case (cf. </span><a class="workspace-trigger" data-dcnode-id="5517" href="#bib39" name="bbib39"><span data-dcnode-id="5518" instrument_node="">Patton, 1987</span></a><span data-dcnode-id="5516" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5514" href="#bib57" name="bbib57"><span data-dcnode-id="5515" instrument_node="">Yin, 2014</span></a><span data-dcnode-id="5513" instrument_node="">) considering that: i) it is among the top 20 UNHCR operations; ii) it has a global warehouse and multiple operations in different parts of the country; iii) it has a combination of local and international procurement and deliveries, and iv) in the context of external validity (</span><a class="workspace-trigger" data-dcnode-id="5511" href="#bib16" name="bbib16"><span data-dcnode-id="5512" instrument_node="">Eisenhardt, 1989</span></a><span data-dcnode-id="5510" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5508" href="#bib32" name="bbib32"><span data-dcnode-id="5509" instrument_node="">McCutcheon and Meredith, 1993</span></a><span data-dcnode-id="5507" instrument_node="">), UNHCR regards its Kenyan operations to be representative of other large-scale operations such as those in Syria, Pakistan, and Afghanistan.</span></p></section><section data-dcnode-id="5490" id="sec3.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5501" id="sectitle0040"><span data-dcnode-id="5504" instrument_node="">3.2</span><span data-dcnode-id="5503" instrument_node="">. </span><span data-dcnode-id="5502" instrument_node="">Case description</span></h3><p data-dcnode-id="5493" id="p0065"><span data-dcnode-id="5500" instrument_node="">With more than 8600 staff and an annual budget of about USD4.3 billion, UNHCR helps approximately 34 million people each year in more than 125 countries (</span><a data-dcnode-id="5498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5499" instrument_node="">www.unhcr.org</span></a><span data-dcnode-id="5497" instrument_node="">). The largest operations constitute assistance to refugees and internally displaced people in Asia (e.g., Afghanistan), the Middle East (e.g., the Syrian crisis), and Africa (e.g., Kenya, Democratic Republic of the Congo, and South Sudan). As a sector leader in emergency shelter and camp management, a large portion of UNHCR's work is in the form of emergency response. Moreover, UNHCR operates camps on a longer-term basis. One example is the 20-year-old refugee camp in Dadaab, Kenya (</span><a class="workspace-trigger" data-dcnode-id="5495" href="#bib55" name="bbib55"><span data-dcnode-id="5496" instrument_node="">www.unhcr.org</span></a><span data-dcnode-id="5494" instrument_node="">).</span></p><p data-dcnode-id="5491" id="p0070"><span data-dcnode-id="5492" instrument_node="">To support these operations, the organization depends on a three-level network structure, represented by: i) global warehouses; ii) country warehouses; and iii) supplier ship-out locations. UNHCR operates seven global warehouses, which stock core relief items (CRI) and specialized items such as information technology (IT) equipment and vehicles. The CRIs include tents, tarpaulins, mosquito nets, blankets, sleeping mats, plastic buckets, jerry cans, kitchen sets, and solar lanterns. Global stock is un-consigned, meaning that the items are not dedicated to a certain country's operations, but stored in bonded facilities or imported under duty-exempt status. In contrast, country warehouses hold consigned, customs-cleared stock as a buffer for multiple distribution points within national borders. UNHCR uses its country warehouses as merging points, combining internationally delivered items and locally purchased goods before sending them to the relevant distribution points. The organization reduced the number of country warehouses from 350 in 2013 to 192 in 2014. UNHCR procures its CRIs from a large number of suppliers. Based on 2013 statistics, the top countries for procurement of stored items include Belgium, China, Denmark, India, Jordan, Kenya, Kuwait, Lebanon, Pakistan, Turkey, Syria, and the United Arab Emirates. At present, only a small fraction of the stored items is sent directly from the suppliers to the distribution points, and one of this study's contributions is to help UNHCR determine whether more direct methods of shipment from the suppliers to the distribution points would be beneficial.</span></p></section><section data-dcnode-id="5320" id="sec3.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5486" id="sectitle0045"><span data-dcnode-id="5489" instrument_node="">3.3</span><span data-dcnode-id="5488" instrument_node="">. </span><span data-dcnode-id="5487" instrument_node="">Data collection</span></h3><div data-dcnode-id="5330"><p data-dcnode-id="5462" id="p0075"><span data-dcnode-id="5485" instrument_node="">By combining a range of qualitative and quantitative methods, and by using several data sources and investigators, we aimed to triangulate the collected information (</span><a class="workspace-trigger" data-dcnode-id="5483" href="#bib39" name="bbib39"><span data-dcnode-id="5484" instrument_node="">Patton, 1987</span></a><span data-dcnode-id="5482" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5480" href="#bib40" name="bbib40"><span data-dcnode-id="5481" instrument_node="">Patton, 1999</span></a><span data-dcnode-id="5475"><span data-dcnode-id="5479" instrument_node="">) and increase </span><a class="topic-link" data-dcnode-id="5477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/mathematics/internal-validity" title="Learn more about internal validity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5478" instrument_node="">internal validity</span></a><span data-dcnode-id="5476" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="5473" href="#bib16" name="bbib16"><span data-dcnode-id="5474" instrument_node="">Eisenhardt, 1989</span></a><span data-dcnode-id="5472" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5470" href="#bib32" name="bbib32"><span data-dcnode-id="5471" instrument_node="">McCutcheon and Meredith, 1993</span></a><span data-dcnode-id="5469" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5467" href="#bib34" name="bbib34"><span data-dcnode-id="5468" instrument_node="">Miles and Huberman, 1994</span></a><span data-dcnode-id="5466" instrument_node="">). Data was collected in seven steps (</span><a class="workspace-trigger" data-dcnode-id="5464" href="#tbl1" name="btbl1"><span data-dcnode-id="5465" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="5463" instrument_node="">).</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="5331" id="tbl1"><span class="captions" data-dcnode-id="5455"><span data-dcnode-id="5456" id="cap0050"><p data-dcnode-id="5457" id="tspara0015"><span class="label" data-dcnode-id="5460"><span data-dcnode-id="5461" instrument_node="">Table&nbsp;1</span></span><span data-dcnode-id="5459" instrument_node="">. </span><span data-dcnode-id="5458" instrument_node="">Overview of data collection.</span></p></span></span><div class="groups" data-dcnode-id="5332"><table data-dcnode-id="5333"><thead data-dcnode-id="5441"><tr class="rowsep-1 valign-top" data-dcnode-id="5442"><th data-dcnode-id="5453" scope="col"><span data-dcnode-id="5454" instrument_node="">Step</span></th><th data-dcnode-id="5451" scope="col"><span data-dcnode-id="5452" instrument_node="">Date</span></th><th data-dcnode-id="5449" scope="col"><span data-dcnode-id="5450" instrument_node="">Method (#/length)</span></th><th data-dcnode-id="5447" scope="col"><span data-dcnode-id="5448" instrument_node="">Purpose</span></th><th data-dcnode-id="5445" scope="col"><span data-dcnode-id="5446" instrument_node="">Interviewees/source</span></th><th data-dcnode-id="5443" scope="col"><span data-dcnode-id="5444" instrument_node="">Location</span></th></tr></thead><tbody data-dcnode-id="5334"><tr class="valign-top" data-dcnode-id="5428"><td data-dcnode-id="5439"><span data-dcnode-id="5440" instrument_node="">1</span></td><td data-dcnode-id="5437"><span data-dcnode-id="5438" instrument_node="">May-Sept, 2012</span></td><td data-dcnode-id="5435"><span data-dcnode-id="5436" instrument_node="">Three exploratory interviews (1&nbsp;h each)</span></td><td data-dcnode-id="5433"><span data-dcnode-id="5434" instrument_node="">Planning and designing study, including field trip</span></td><td data-dcnode-id="5431"><span data-dcnode-id="5432" instrument_node="">Senior Business Analyst, Head of Logistics &amp; Operations; Head of Supply Management Service</span></td><td data-dcnode-id="5429"><span data-dcnode-id="5430" instrument_node="">HQ in Budapest</span></td></tr><tr class="valign-top" data-dcnode-id="5415"><td data-dcnode-id="5426" rowspan="2"><span data-dcnode-id="5427" instrument_node="">2</span></td><td data-dcnode-id="5424"><span data-dcnode-id="5425" instrument_node="">Oct 14–16, 2012</span></td><td data-dcnode-id="5422"><span data-dcnode-id="5423" instrument_node="">Two semi-structured interviews (1&nbsp;h each); One group discussion (half day)</span></td><td data-dcnode-id="5420" rowspan="2"><span data-dcnode-id="5421" instrument_node="">Understanding how UNHCR has set up its network of warehouses and manages operations; Collecting qualitative data for designing the model</span></td><td data-dcnode-id="5418"><span data-dcnode-id="5419" instrument_node="">Supply Officer, Assistant Supply Officer</span></td><td data-dcnode-id="5416"><span data-dcnode-id="5417" instrument_node="">Two of the four distribution points in Dadaab, Kenya</span></td></tr><tr class="valign-top" data-dcnode-id="5406"><td data-dcnode-id="5413"><span data-dcnode-id="5414" instrument_node="">Oct 17–19, 2012</span></td><td data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">Three semi-structured interviews (1&nbsp;h each); One group discussion (half day)</span></td><td data-dcnode-id="5409"><span data-dcnode-id="5410" instrument_node="">Senior Supply Officer, Assistant Supply Officer, Assistant Program Representative, Warehouse manager (Kuehne&nbsp;+&nbsp;Nagel),</span></td><td data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">One global warehouse and one country warehouse located in Nairobi, Kenya</span></td></tr><tr class="valign-top" data-dcnode-id="5390"><td data-dcnode-id="5404"><span data-dcnode-id="5405" instrument_node="">3</span></td><td data-dcnode-id="5402"><span data-dcnode-id="5403" instrument_node="">Nov 18, 2012</span></td><td data-dcnode-id="5397"><span data-dcnode-id="5401" instrument_node="">Questionnaire (building on the list of factors in </span><a class="workspace-trigger" data-dcnode-id="5399" href="#appsec1" name="bappsec1"><span data-dcnode-id="5400" instrument_node="">Appendix A</span></a><span data-dcnode-id="5398" instrument_node="">)</span></td><td data-dcnode-id="5395"><span data-dcnode-id="5396" instrument_node="">Identifying contextual factors important to consider for the model</span></td><td data-dcnode-id="5393"><span data-dcnode-id="5394" instrument_node="">Senior Business Analyst, Head of Logistics &amp; Operations, Senior Supply Officer</span></td><td data-dcnode-id="5391" rowspan="2"><span data-dcnode-id="5392" instrument_node="">HQ in Budapest</span></td></tr><tr class="valign-top" data-dcnode-id="5379"><td data-dcnode-id="5388"><span data-dcnode-id="5389" instrument_node="">4</span></td><td data-dcnode-id="5386"><span data-dcnode-id="5387" instrument_node="">Oct-Nov, 2012</span></td><td data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">ERP system data</span></td><td data-dcnode-id="5382"><span data-dcnode-id="5383" instrument_node="">Gathering data, including information about core relief items, warehouse points, demand points, goods flow, and transportation costs</span></td><td data-dcnode-id="5380"><span data-dcnode-id="5381" instrument_node="">UNHCR's global ERP system, Information Management Officer</span></td></tr><tr class="valign-top" data-dcnode-id="5366"><td data-dcnode-id="5377"><span data-dcnode-id="5378" instrument_node="">5</span></td><td data-dcnode-id="5375"><span data-dcnode-id="5376" instrument_node="">Sept-Oct, 2014</span></td><td data-dcnode-id="5373"><span data-dcnode-id="5374" instrument_node="">Multiple structured interviews (on a weekly/daily basis)</span></td><td data-dcnode-id="5371"><span data-dcnode-id="5372" instrument_node="">Designing and validating the network design model for use in a humanitarian context</span></td><td data-dcnode-id="5369" rowspan="2"><span data-dcnode-id="5370" instrument_node="">Senior Business Analyst, Head of Logistics &amp; Operations, Head of Supply Logistics Management Service, Head of Inventory &amp; Warehouse Management Unit, Chief of Emergency Coordination Unit</span></td><td data-dcnode-id="5367" rowspan="2"><span data-dcnode-id="5368" instrument_node="">HQ in Budapest (via Skype and mail)</span></td></tr><tr class="valign-top" data-dcnode-id="5351"><td data-dcnode-id="5364"><span data-dcnode-id="5365" instrument_node="">6</span></td><td data-dcnode-id="5362"><span data-dcnode-id="5363" instrument_node="">Nov-Dec, 2014</span></td><td data-dcnode-id="5360"><span data-dcnode-id="5361" instrument_node="">ERP system data, internet search on security levels, personnel, pilferage, disaster scenarios</span></td><td data-dcnode-id="5352"><span data-dcnode-id="5359" instrument_node="">Gathering and populating OO and ER demand, cost, and lead time data followed by cleaning, estimation, and discussion—for details, see Section </span><a class="workspace-trigger" data-dcnode-id="5357" href="#sec4.4" name="bsec4.4"><span data-dcnode-id="5358" instrument_node="">4.4</span></a><span data-dcnode-id="5356" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="5354" href="#appsec1" name="bappsec1"><span data-dcnode-id="5355" instrument_node="">Appendix B</span></a><span data-dcnode-id="5353" instrument_node="">.</span></td></tr><tr class="valign-top" data-dcnode-id="5335"><td data-dcnode-id="5349"><span data-dcnode-id="5350" instrument_node="">7</span></td><td data-dcnode-id="5347"><span data-dcnode-id="5348" instrument_node="">Jan-June, 2015</span></td><td data-dcnode-id="5345"><span data-dcnode-id="5346" instrument_node="">ERP system data, internet search for relevant data</span></td><td data-dcnode-id="5340"><span data-dcnode-id="5344" instrument_node="">Quantifying identified contextual factors and incorporating them in the developed model (cf. Section </span><a class="workspace-trigger" data-dcnode-id="5342" href="#sec4.4" name="bsec4.4"><span data-dcnode-id="5343" instrument_node="">4.4</span></a><span data-dcnode-id="5341" instrument_node="">)</span></td><td data-dcnode-id="5338"><span data-dcnode-id="5339" instrument_node="">UNHCR's global ERP system, UNHCR supply chain management team, Brambles, ongoing consultancy project at UNHCR</span></td><td data-dcnode-id="5336"><span data-dcnode-id="5337" instrument_node="">HQ in Budapest (via Skype and mail)</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="5321" id="p0080"><span data-dcnode-id="5325"><span data-dcnode-id="5329" instrument_node="">Throughout data collection, the case study protocol was updated, including research instruments and procedures, </span><a class="topic-link" data-dcnode-id="5327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/interviewee" title="Learn more about interviewee from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5328" instrument_node="">interviewee</span></a><span data-dcnode-id="5326" instrument_node=""> details, interview transcriptions, field notes, case summaries, and preliminary findings (</span></span><a class="workspace-trigger" data-dcnode-id="5323" href="#bib57" name="bbib57"><span data-dcnode-id="5324" instrument_node="">Yin, 2014</span></a><span data-dcnode-id="5322" instrument_node="">). All collected data were summarized and sent back to the respondents, who then commented and confirmed the findings.</span></p></section><section data-dcnode-id="5292" id="sec3.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5316" id="sectitle0050"><span data-dcnode-id="5319" instrument_node="">3.4</span><span data-dcnode-id="5318" instrument_node="">. </span><span data-dcnode-id="5317" instrument_node="">Data analysis</span></h3><p data-dcnode-id="5293" id="p0085"><span data-dcnode-id="5315" instrument_node="">For data analysis, we followed the analytical abstraction process of </span><a class="workspace-trigger" data-dcnode-id="5313" href="#bib34" name="bbib34"><span data-dcnode-id="5314" instrument_node="">Miles and Huberman (1994)</span></a><span data-dcnode-id="5312" instrument_node=""> by summarizing and categorizing data collected through interviews, group discussions, and questionnaires. First, the data were coded using a provisional list based on the factors identified in the literature review (</span><a class="workspace-trigger" data-dcnode-id="5310" href="#appsec1" name="bappsec1"><span data-dcnode-id="5311" instrument_node="">Appendix A</span></a><span data-dcnode-id="5309" instrument_node="">). Examples included budget constraints, demand risks, and infrastructure limitations. Moreover, by using open coding (cf. </span><a class="workspace-trigger" data-dcnode-id="5307" href="#bib17" name="bbib17"><span data-dcnode-id="5308" instrument_node="">Ellram, 1996</span></a><span data-dcnode-id="5306" instrument_node="">), additional coding categories such as hardship, security, pilferage, and co-location emerged during the analysis. The resulting coding list facilitated a logical link between the collected data and the constructed model, where each of the identified factors was, as explained in Section </span><a class="workspace-trigger" data-dcnode-id="5304" href="#sec4.3" name="bsec4.3"><span data-dcnode-id="5305" instrument_node="">4.3</span></a><span data-dcnode-id="5303" instrument_node="">, included in model development. In the second step, referred to herein as pattern or axial coding (</span><a class="workspace-trigger" data-dcnode-id="5301" href="#bib34" name="bbib34"><span data-dcnode-id="5302" instrument_node="">Miles and Huberman, 1994</span></a><span data-dcnode-id="5300" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5298" href="#bib17" name="bbib17"><span data-dcnode-id="5299" instrument_node="">Ellram, 1996</span></a><span data-dcnode-id="5297" instrument_node="">), memos from all interviews and group discussions were compared with recurring phrases and threads in the questionnaire responses to identify emerging trends and themes. One such theme was the respondents' emphasis on the difficulty of merging the two supply chains for ongoing operations and emergency response, and the different objectives of minimizing cost and minimizing response times. Additional insights from this step are discussed in Section </span><a class="workspace-trigger" data-dcnode-id="5295" href="#sec4.1" name="bsec4.1"><span data-dcnode-id="5296" instrument_node="">4.1</span></a><span data-dcnode-id="5294" instrument_node=""> and form an important input in model development. In the final step, all findings were discussed and confirmed with key UNHCR staff to validate the inputs used for model design and analysis.</span></p></section></section><section data-dcnode-id="4845" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5287" id="sectitle0055"><span data-dcnode-id="5290" instrument_node="">4</span><span data-dcnode-id="5289" instrument_node="">. </span><span data-dcnode-id="5288" instrument_node="">Model development based on empirical findings</span></h2><p data-dcnode-id="5272" id="p0090"><span data-dcnode-id="5286" instrument_node="">This section presents the empirical findings of importance for constructing the model, starting with the background to UNHCR's supply-chain strategy</span><a class="workspace-trigger" data-dcnode-id="5283" href="#fn1" name="bfn1"><sup data-dcnode-id="5284"><span data-dcnode-id="5285" instrument_node="">1</span></sup></a><span data-dcnode-id="5282" instrument_node=""> and why they want to merge the two supply chains. Then, we present the influencing factors identified in the qualitative study </span><a class="workspace-trigger" data-dcnode-id="5280" href="#sec4.2" name="bsec4.2"><span data-dcnode-id="5281" instrument_node="">(4.2)</span></a><span data-dcnode-id="5279" instrument_node="">, the model and how it incorporates the factors </span><a class="workspace-trigger" data-dcnode-id="5277" href="#sec4.3" name="bsec4.3"><span data-dcnode-id="5278" instrument_node="">(4.3)</span></a><span data-dcnode-id="5276" instrument_node="">, and the data used for analysis </span><a class="workspace-trigger" data-dcnode-id="5274" href="#sec4.4" name="bsec4.4"><span data-dcnode-id="5275" instrument_node="">(4.4)</span></a><span data-dcnode-id="5273" instrument_node="">.</span></p><section data-dcnode-id="5261" id="sec4.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5268" id="sectitle0060"><span data-dcnode-id="5271" instrument_node="">4.1</span><span data-dcnode-id="5270" instrument_node="">. </span><span data-dcnode-id="5269" instrument_node="">Merging two supply chains</span></h3><p data-dcnode-id="5266" id="p0095"><span data-dcnode-id="5267" instrument_node="">Based on an analysis of past emergency response patterns, UNHCR senior executives have, with support from major UNHCR donors, decided to install an immediate response capacity of CRIs for 600,000 beneficiaries. To enable emergency response within 72&nbsp;h, UNHCR has set up a network of global warehouses for prepositioning with fast means of transportation. However, similar to many HOs, they must consider not only time but also cost. As a critical step to lowering their total operational costs, UNHCR will merge their two supply chains.</span></p><p data-dcnode-id="5264" id="p0100"><span data-dcnode-id="5265" instrument_node="">The ER-supply chain deals with highly uncertain demand occurring in sudden-onset, man-made disasters, and it is designed to minimize response time where central funds are used to buy and preposition un-consigned stock in one of the global warehouses. UNHCR reaches out centrally to a few of its big donors such as The Department for International Development in the UK (DFID) to pre-fund the central emergency stock, which can then be used to support global operations. In the case of an emergency, global stock can be “bought” by country operations and delivered by fast means of transportation as consigned stock for local consumption.</span></p><p data-dcnode-id="5262" id="p0105"><span data-dcnode-id="5263" instrument_node="">The OO supply chain deals with long-term operations characterized by continuous demand and relatively low uncertainty. It is designed to minimize cost and involves decentralized consigned stock bought under a country's budget and pushed to that country's warehouses or items shipped directly from suppliers. Once stock is shipped and clears customs in a country, it is difficult and expensive to re-export the goods to another country. The decentralized network structure of OO originates from the historical set-up of the organization, with a weaker supply chain center at its headquarters (HQ) and strong UNHCR country operations. Country operations are managed by a UNHCR Representative, appointed by the High Commissioner, based on an agreement with the host country. As such, the host country can influence these operations, but decisions pertaining to operational priorities and fund utilization reside with UNHCR. Country operations are in charge of their own budgets, in addition to reaching out to local donors. Similar to other large HOs such as WFP, local program managers decide how and when to spend their money depending on when it is made available from donors to country operations by a HQ-approved budget and spending authority. In other words, sourcing is driven by funding with limited supply chain focus, which has resulted in sub-optimization with excessively large stock in a few locations and very low stock in others. Considering that UNHCR, akin to many organizations in the public sector, operates on annual budgets, inventory has generally been regarded as a safety measure not “to lose money at year end,” following the mentality that “it is always good to have stocks, we might have use for it and we do not lose the money,” resulting in a high amount of dead stock.</span></p></section><section data-dcnode-id="5174" id="sec4.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5257" id="sectitle0065"><span data-dcnode-id="5260" instrument_node="">4.2</span><span data-dcnode-id="5259" instrument_node="">. </span><span data-dcnode-id="5258" instrument_node="">Influencing factors identified in qualitative study</span></h3><div data-dcnode-id="5223"><p data-dcnode-id="5248" id="p0110"><span data-dcnode-id="5252"><span data-dcnode-id="5256" instrument_node="">The empirical findings unearthed nine factors that can be categorized in three groups: i) demand characteristics; ii) logistics; and iii) political and security </span><a class="topic-link" data-dcnode-id="5254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/situational-factor" title="Learn more about situational factors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5255" instrument_node="">situational factors</span></a><span data-dcnode-id="5253" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="5250" href="#fig1" name="bfig1"><span data-dcnode-id="5251" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="5249" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="5224" id="fig1"><span data-dcnode-id="5232"><img alt="" aria-describedby="cap0030" data-dcnode-id="5247" height="326" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-gr1.jpg&amp;raw"><span data-dcnode-id="5246" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5233"><li data-dcnode-id="5240"><a class="anchor download-link u-font-sans" data-dcnode-id="5241" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-gr1_lrg.jpg" target="_blank" title="Download high-res image (372KB)"><span class="anchor-text" data-dcnode-id="5242"><span data-dcnode-id="5245" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5243"><span data-dcnode-id="5244" instrument_node="">Download high-res image (372KB)</span></span></span></a></li><li data-dcnode-id="5234"><a class="anchor download-link u-font-sans" data-dcnode-id="5235" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5236"><span data-dcnode-id="5239" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5225"><span data-dcnode-id="5226" id="cap0030"><p data-dcnode-id="5227" id="fspara0030"><span class="label" data-dcnode-id="5230"><span data-dcnode-id="5231" instrument_node="">Fig.&nbsp;1</span></span><span data-dcnode-id="5229" instrument_node="">. </span><span data-dcnode-id="5228" instrument_node="">Framework for network design and factors to include in model development.</span></p></span></span></figure></div><section data-dcnode-id="5213" id="sec4.2.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5219" id="sectitle0070"><span data-dcnode-id="5222" instrument_node="">4.2.1</span><span data-dcnode-id="5221" instrument_node="">. </span><span data-dcnode-id="5220" instrument_node="">Demand characteristics</span></h4><p data-dcnode-id="5214" id="p0115"><span data-dcnode-id="5218" instrument_node="">The first group of factors represents demand characteristics, and it is related to demand risk and budget constraints (cf. </span><a class="workspace-trigger" data-dcnode-id="5216" href="#appsec1" name="bappsec1"><span data-dcnode-id="5217" instrument_node="">Appendix A</span></a><span data-dcnode-id="5215" instrument_node="">). OO demand is in general continuous with low uncertainty, and it can be estimated from historic data. ER demand is encountered in sudden-onset disasters and is highly uncertain. ER demand is difficult to predict and requires scenario planning by considering the probabilities of different scenarios.</span></p></section><section data-dcnode-id="5193" id="sec4.2.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5209" id="sectitle0075"><span data-dcnode-id="5212" instrument_node="">4.2.2</span><span data-dcnode-id="5211" instrument_node="">. </span><span data-dcnode-id="5210" instrument_node="">Logistics</span></h4><p data-dcnode-id="5194" id="p0120"><span data-dcnode-id="5208" instrument_node="">Logistics-related factors (cf. </span><a class="workspace-trigger" data-dcnode-id="5206" href="#appsec1" name="bappsec1"><span data-dcnode-id="5207" instrument_node="">Appendix A</span></a><span data-dcnode-id="5205" instrument_node="">) identified in this study include capacity and cost of transportation and warehousing, lead times among suppliers, warehouses, and demand points, as well as accessibility. Transportation and warehousing capacities are typically not an issue, although the price of contracting additional transportation or warehouse space may vary. In transshipment points such as ports, humanitarian cargo may have to “compete” with fluctuating commercial transport flows. Furthermore, considering that UNHCR, similar to many other HOs, does not have its own fleet for transporting relief supplies, prices typically increase in the event of a disaster (cf. </span><a class="workspace-trigger" data-dcnode-id="5203" href="#bib43" name="bbib43"><span data-dcnode-id="5204" instrument_node="">Rawls and Turnquist, 2010</span></a><span data-dcnode-id="5202" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5200" href="#bib9" name="bbib9"><span data-dcnode-id="5201" instrument_node="">Bozorgi-Amiri et&nbsp;al., 2013</span></a><span data-dcnode-id="5195"><span data-dcnode-id="5199" instrument_node="">), and they may vary depending on the location and the disaster situation. Moving global warehouses closer to demand points could increase the cost of restocking said warehouses, depending on the means of transportation required and available for accessibility due to poor infrastructure. By placing the global warehouses closer to the demand points, the </span><a class="topic-link" data-dcnode-id="5197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/mathematics/shipping-cost" title="Learn more about shipping cost from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5198" instrument_node="">shipping cost</span></a><span data-dcnode-id="5196" instrument_node="">, as well as lead time for this leg should be reduced. Physical accessibility aspects include available primary and secondary roads; sea freight and railway networks; and proximity to points of entry, including ports and airports. Without proper accessibility, the total operations cost of a warehouse site may increase, which brings with it the risk of jeopardizing the entire operation. Telecommunications infrastructure must also be in place to enable efficient communication and coordination within the organization and externally with the supply chain and implementing partners.</span></span></p></section><section data-dcnode-id="5175" id="sec4.2.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5189" id="sectitle0080"><span data-dcnode-id="5192" instrument_node="">4.2.3</span><span data-dcnode-id="5191" instrument_node="">. </span><span data-dcnode-id="5190" instrument_node="">Political and security situation</span></h4><p data-dcnode-id="5176" id="p0125"><span data-dcnode-id="5188" instrument_node="">Building on the literature review (cf. </span><a class="workspace-trigger" data-dcnode-id="5186" href="#appsec1" name="bappsec1"><span data-dcnode-id="5187" instrument_node="">Appendix A</span></a><span data-dcnode-id="5177"><span data-dcnode-id="5181"><span data-dcnode-id="5185" instrument_node="">), the following factors related to political and security situation, were identified in the current study: relationship with government, security, pilferage, access to human resources (hardship), and co-location. First, HOs depend on good relationships with host governments. By signing </span><a class="topic-link" data-dcnode-id="5183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/bilateral-agreement" title="Learn more about bilateral agreements from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5184" instrument_node="">bilateral agreements</span></a><span data-dcnode-id="5182" instrument_node="">, governments can facilitate exemptions and customs-clearance procedures when goods enter or leave the country. In some cases, goods can be cleared within a day, and in other cases, the process may take weeks or months. Moreover, governments may agree to offer land or facilities at low or no cost to the organization, thus greatly reducing certain locations' fixed costs. Second, due to its mandate, many of UNHCR's operations are set up in the midst of political instability, including military activity and civil war. Under such circumstances, running efficient, secure </span></span><a class="topic-link" data-dcnode-id="5179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/logistics-operation" title="Learn more about logistics operations from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5180" instrument_node="">logistics operations</span></a><span data-dcnode-id="5178" instrument_node=""> can be very difficult and may require significant security arrangements. Security concerns also include pilfering and looting. Apart from the value of the goods stolen, the very risk of theft implies increased security costs in terms of insurance and guards. Lost goods could also result in ill will for the organization due to negative media publicity, damage to donors' image, and impeding future funding. Third, similar to most HOs, UNHCR employs both international and local staff. The ability to attract qualified workforce is a critical factor in deciding where to locate global warehouses. An important aspect is the rotation system for international personnel, which is based on hardship principles, implying that international staff spends only a limited time at a certain location. Hardship is often the toughest where need is the greatest, and rotation is extremely high. Following UN conditions of service, international employees at duty stations in high-risk areas also go on a five-day leave every four weeks. These contractual conditions mean that a greater number of personnel is required to run the operation. Fourth, in spite of competition among HOs for media attention and donor money, they tend to cooperate at the operational level. Co-location with other organizations in humanitarian clusters or hubs can provide benefits through complementary resources, such as shared technological resources and access to joint IT support, help with coordinating logistics and security resources, reduced operational costs, and facilitation of knowledge sharing. Copenhagen is one such example, which hosts both UNHCR and most other UN organizations, as part of the UN city established in 2013.</span></span></p></section></section><section data-dcnode-id="5084" id="sec4.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5170" id="sectitle0085"><span data-dcnode-id="5173" instrument_node="">4.3</span><span data-dcnode-id="5172" instrument_node="">. </span><span data-dcnode-id="5171" instrument_node="">Model</span></h3><p data-dcnode-id="5161" id="p0130"><span data-dcnode-id="5165"><span data-dcnode-id="5169" instrument_node="">In this section, we describe a two-stage </span><a class="topic-link" data-dcnode-id="5167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/mathematics/mathematical-programming" title="Learn more about mathematical programming from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5168" instrument_node="">mathematical programming</span></a><span data-dcnode-id="5166" instrument_node=""> model for solving a FLP. To deal with uncertainty of ER demand, we developed a scenario-based two-stage stochastic program with the aim of making robust first-stage decisions so that the second stage is feasible under all scenarios. According to </span></span><a class="workspace-trigger" data-dcnode-id="5163" href="#bib29" name="bbib29"><span data-dcnode-id="5164" instrument_node="">Liberatore et&nbsp;al. (2013)</span></a><span data-dcnode-id="5162" instrument_node="">, such a robust programming approach is a common methodology for dealing with uncertainty when uncertain input distributions cannot be estimated reliably.</span></p><section data-dcnode-id="5133" id="sec4.3.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5157" id="sectitle0090"><span data-dcnode-id="5160" instrument_node="">4.3.1</span><span data-dcnode-id="5159" instrument_node="">. </span><span data-dcnode-id="5158" instrument_node="">Problem definition</span></h4><p data-dcnode-id="5152" id="p0135"><span data-dcnode-id="5156" instrument_node="">UNHCR deals with two sets of supply points: global warehouses and supplier locations. There are also two types of demand points: i) OO, where demand is stable; and ii) ER, for which locations and magnitudes are uncertain when decisions are being made. OO demand can be met through supplier locations or inventory stocked at the global warehouses, whereas ER points are supplied only by the global warehouses. We treat the historic annual ER demand volumes as scenarios with equal probability of occurring (See Section </span><a class="workspace-trigger" data-dcnode-id="5154" href="#sec4.4" name="bsec4.4"><span data-dcnode-id="5155" instrument_node="">4.4</span></a><span data-dcnode-id="5153" instrument_node="">. for details). Inventory at the global warehouses and in transportation is measured in twenty-foot equivalent units (TEU), a commonly used reference of volume in containerized shipping. We then convert the quantity of goods from TEU to the corresponding USD value based on estimates provided by UNHCR. Opening of each warehouse incurs a fixed cost and the inventory held at a location incurs a cost per unit stored in that warehouse.</span></p><p data-dcnode-id="5150" id="p0140"><span data-dcnode-id="5151" instrument_node="">Shipping rates and lead times differ between transportation modes. Normal shipment uses surface transportation (by road or sea) to satisfy OO demand and is generally cheaper, but the lead time is longer. UNHCR regards road and sea transport as alternatives or complementary modes with minimal cost variance and does not distinguish between them in the operational context. Express shipment employs air or road transportation (if over a short distance) to satisfy ER demand, and it is associated with higher transport costs and shorter lead times. Owing to the higher costs, express shipment via air to any particular demand point is constrained by the availability of funding and cannot exceed 10 TEUs per disaster event. Additional TEUs are sent via surface.</span></p><p data-dcnode-id="5134" id="p0145"><span data-dcnode-id="5145"><span data-dcnode-id="5149" instrument_node="">The goal of the proposed multi-objective model is to satisfy all ongoing and emergency demand in the fastest manner while incurring the minimal cost. To handle the dual objectives of lead time and cost, we developed three related two-stage mixed integer </span><a class="topic-link" data-dcnode-id="5147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/mathematics/mathematical-program" title="Learn more about mathematical programs from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5148" instrument_node="">mathematical programs</span></a><span data-dcnode-id="5146" instrument_node="">. The first program solves the FLP to minimize the expected total cost, while disregarding lead time. The analysis in the second model is based on minimizing the expected lead time of the chosen supply chain network, while disregarding cost, and in the third, the same lead time objective is used, while constraining the supply chain budget based on the optimal minimum cost value obtained from the first program plus varying mark ups. In the rest of this section we briefly describe these three models. All technical details of the models and
