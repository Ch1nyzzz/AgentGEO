ment_node="">, </span><a class="workspace-trigger" data-dcnode-id="3994" href="#bib30" name="bbib30"><span data-dcnode-id="3995" instrument_node="">Martel et&nbsp;al., 2013</span></a><span data-dcnode-id="3993" instrument_node="">;</span></td><td data-dcnode-id="3990"><span data-dcnode-id="3991" instrument_node="">–</span></td></tr><tr class="valign-top" data-dcnode-id="3972"><td data-dcnode-id="3987" rowspan="5"><span data-dcnode-id="3988" instrument_node="">Political and security situation</span></td><td data-dcnode-id="3985"><span data-dcnode-id="3986" instrument_node="">Personnel availability</span></td><td data-dcnode-id="3976"><a class="workspace-trigger" data-dcnode-id="3983" href="#bib45" name="bbib45"><span data-dcnode-id="3984" instrument_node="">Salmerón and Apte, 2010</span></a><span data-dcnode-id="3982" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3980" href="#bib9" name="bbib9"><span data-dcnode-id="3981" instrument_node="">Bozorgi-Amiri et&nbsp;al., 2013</span></a><span data-dcnode-id="3979" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3977" href="#bib44" name="bbib44"><span data-dcnode-id="3978" instrument_node="">Rennemo et&nbsp;al., 2014</span></a></td><td data-dcnode-id="3973"><a class="workspace-trigger" data-dcnode-id="3974" href="#bib45" name="bbib45"><span data-dcnode-id="3975" instrument_node="">Salmerón and Apte, 2010</span></a></td></tr><tr class="valign-top" data-dcnode-id="3964"><td data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">Exchange rates, tariffs, tax incentives, customs clearing</span></td><td data-dcnode-id="3967"><a class="workspace-trigger" data-dcnode-id="3968" href="#bib15" name="bbib15"><span data-dcnode-id="3969" instrument_node="">Duran et&nbsp;al., 2011</span></a></td><td data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">–</span></td></tr><tr class="valign-top" data-dcnode-id="3956"><td data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">Level of unrest</span></td><td data-dcnode-id="3959"><a class="workspace-trigger" data-dcnode-id="3960" href="#bib15" name="bbib15"><span data-dcnode-id="3961" instrument_node="">Duran et&nbsp;al., 2011</span></a></td><td data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">–</span></td></tr><tr class="valign-top" data-dcnode-id="3948"><td data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">Long-term agreements with governments</span></td><td data-dcnode-id="3951"><a class="workspace-trigger" data-dcnode-id="3952" href="#bib30" name="bbib30"><span data-dcnode-id="3953" instrument_node="">Martel et&nbsp;al., 2013</span></a></td><td data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">–</span></td></tr><tr class="valign-top" data-dcnode-id="3931"><td data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">Price increases in the event of a disaster</span></td><td data-dcnode-id="3934"><a class="workspace-trigger" data-dcnode-id="3944" href="#bib43" name="bbib43"><span data-dcnode-id="3945" instrument_node="">Rawls and Turnquist, 2010</span></a><span data-dcnode-id="3943" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3941" href="#bib9" name="bbib9"><span data-dcnode-id="3942" instrument_node="">Bozorgi-Amiri et&nbsp;al., 2013</span></a><span data-dcnode-id="3940" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3938" href="#bib18" name="bbib18"><span data-dcnode-id="3939" instrument_node="">Galinda and Batta, 2013</span></a><span data-dcnode-id="3937" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3935" href="#bib29" name="bbib29"><span data-dcnode-id="3936" instrument_node="">Liberatore et&nbsp;al., 2013</span></a></td><td data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">–</span></td></tr><tr class="valign-top" data-dcnode-id="3916"><td data-dcnode-id="3930"></td><td data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">Sociopolitical factors</span></td><td data-dcnode-id="3919"><a class="workspace-trigger" data-dcnode-id="3926" href="#bib20" name="bbib20"><span data-dcnode-id="3927" instrument_node="">Ghanmi and Shaw, 2008</span></a><span data-dcnode-id="3925" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3923" href="#bib15" name="bbib15"><span data-dcnode-id="3924" instrument_node="">Duran et&nbsp;al., 2011</span></a><span data-dcnode-id="3922" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3920" href="#bib30" name="bbib30"><span data-dcnode-id="3921" instrument_node="">Martel et&nbsp;al., 2013</span></a></td><td data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">–</span></td></tr></tbody></table></div></div><p></p></section><section data-dcnode-id="3666" id="appsec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3905" id="sectitle0145"><span data-dcnode-id="3908" instrument_node="">Appendix B</span><span data-dcnode-id="3907" instrument_node="">. </span><span data-dcnode-id="3906" instrument_node="">Model formulation and summary of notation</span></h2><p data-dcnode-id="3868" id="p0260"><a class="workspace-trigger" data-dcnode-id="3903" href="#appsec1" name="bappsec1"><span data-dcnode-id="3904" instrument_node="">Fig.&nbsp;B1</span></a><span data-dcnode-id="3902" instrument_node=""> summarizes the notation used in the model. Suppose there are </span><em data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">m</span></em><span data-dcnode-id="3899" instrument_node=""> supply points and </span><em data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">n</span></em><span data-dcnode-id="3896" instrument_node=""> demand points representing cities. Supply points include two sets of locations: global warehouses and supplier locations. Let </span><em data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">G</span></em><span data-dcnode-id="3893" instrument_node=""> denote the set of global warehouses in the network, </span><em data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">S</span></em><span data-dcnode-id="3890" instrument_node=""> denote the set of supplier locations, and </span><em data-dcnode-id="3888"><span data-dcnode-id="3889" instrument_node="">A</span></em><span data-dcnode-id="3887" instrument_node=""> denote the set of demand points. Demand volumes are given in USD based on estimates provided by UNHCR to convert the quantity of goods in a TEU to the corresponding USD value. We treat the actual demand distribution of each year as a scenario with equal probability (See Section </span><a class="workspace-trigger" data-dcnode-id="3885" href="#sec4.4" name="bsec4.4"><span data-dcnode-id="3886" instrument_node="">4.4</span></a><span data-dcnode-id="3884" instrument_node="">. for details). Opening of warehouse </span><em data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">g</span></em><span data-dcnode-id="3881" instrument_node=""> incurs a fixed cost </span><em data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">f</span></em><sub data-dcnode-id="3876"><em data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">g</span></em></sub><span data-dcnode-id="3875" instrument_node=""> and an inventory cost </span><em data-dcnode-id="3873"><span data-dcnode-id="3874" instrument_node="">v</span></em><sub data-dcnode-id="3870"><em data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">g</span></em></sub><span data-dcnode-id="3869" instrument_node=""> per unit stocked in that warehouse. OO demand is met through supplier locations or inventory stocked at the global warehouses, whereas ER points are supplied only by the global warehouses.</span></p><p data-dcnode-id="3841" id="p0265"><span data-dcnode-id="3867" instrument_node="">Shipping rates and lead times differ between transportation modes. Normal shipment uses surface transportation (by road or sea) to satisfy OO demand and is generally cheaper, but the lead time is longer. UNHCR regards road and sea transport as alternatives or complementary modes with minimal cost variance and does not distinguish between them in the operational context. Express shipment employs air or road transportation to satisfy ER demand, and it is associated with higher transport costs and shorter lead times. Owing to the higher costs, express shipment via air to any particular demand point is constrained by the availability of funding and cannot exceed 10 TEUs per disaster event. Additional TEUs are sent via surface.</span><span class="display" data-dcnode-id="3842"></span></p><figure class="figure text-xs" data-dcnode-id="3843" id="dfig1"><span data-dcnode-id="3851"><img alt="" aria-describedby="cap0010" data-dcnode-id="3866" height="917" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-fx1.jpg&amp;raw"><span data-dcnode-id="3865" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3852"><li data-dcnode-id="3859"><a class="anchor download-link u-font-sans" data-dcnode-id="3860" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-fx1_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="3861"><span data-dcnode-id="3864" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="3853"><a class="anchor download-link u-font-sans" data-dcnode-id="3854" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-fx1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3855"><span data-dcnode-id="3858" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3844"><span data-dcnode-id="3845" id="cap0010"><p data-dcnode-id="3846" id="fspara0010"><span class="label" data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">Fig.&nbsp;B1</span></span><span data-dcnode-id="3848" instrument_node="">. </span><span data-dcnode-id="3847" instrument_node="">Summary of notation—parameters and decision variables.</span></p></span></span></figure><p></p><section data-dcnode-id="3738" id="appsec2.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3839" id="sectitle0150"><span data-dcnode-id="3840" instrument_node="">Minimum expected total cost model</span></h3><p data-dcnode-id="3739" id="p0270"><span data-dcnode-id="3838" instrument_node="">Our formulation (</span><a class="workspace-trigger" data-dcnode-id="3836" href="#appsec1" name="bappsec1"><span data-dcnode-id="3837" instrument_node="">Fig.&nbsp;B2</span></a><span data-dcnode-id="3835" instrument_node="">) comprises of three sets of variables. First, for every node in set G, we define a binary variable </span><em data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">y</span></em><sub data-dcnode-id="3830"><em data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">g</span></em></sub><span data-dcnode-id="3829" instrument_node="">, where, </span><em data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">y</span></em><sub data-dcnode-id="3824"><em data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">g</span></em></sub><span data-dcnode-id="3823" instrument_node="">&nbsp;=&nbsp;1 if the </span><em data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">g</span></em><span data-dcnode-id="3820" instrument_node="">th global warehouse is opened. Next, nonnegative integer flows on arcs from supplier locations to global warehouses determine inventory levels at the opened warehouses. Last, we define nonnegative continuous variables over each arc going from suppliers and warehouses to demand points. These variables represent the required percentage of OO or ER demand sent through each of these arcs. We assume no capacity restrictions at the suppliers, warehouses, or transport arcs. The objective function (F</span><sub data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">1</span></sub><span data-dcnode-id="3817" instrument_node="">) in TC* minimizes the total cost associated with opening warehouses, holding necessary inventory at opened warehouses, shipping cost from suppliers to global warehouses, expected shipping cost from suppliers and global warehouses to OO points, and expected shipping cost from global warehouses to ER points. This objective is subject to several constraints. Constraints (1) and (2) require satisfying all OO and ER demand. Constraints (3) and (4) ensure that if ER demand is greater than 10 TEUs, 10 TEUs of the total demand must be sent by express air shipment and the rest by express road shipment. If ER demand is less than 10 TEUs, the entire demand is sent by air. Constraint (5) allows only opened warehouses to have positive inventory. Constraint (6) requires the inventory stocked at any global warehouse to be equal to the sum of shipments from suppliers to said warehouse. Constraint (7) requires that the total OO and ER shipments from any given global warehouse be less than or equal to its inventory. Constraint (8) denotes </span><em data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">x</span></em><sup data-dcnode-id="3812"><em data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">oo,k</span></em></sup><sub data-dcnode-id="3809"><em data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">sj</span></em></sub><em data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">, x</span></em><sup data-dcnode-id="3804"><em data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">oo,k</span></em></sup><sub data-dcnode-id="3801"><em data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">gj</span></em></sub><em data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">, x</span></em><sup data-dcnode-id="3796"><em data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">ER,k</span></em></sup><sub data-dcnode-id="3793"><em data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">gj</span></em></sub><span data-dcnode-id="3792" instrument_node="">, and </span><em data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">ex</span></em><sup data-dcnode-id="3787"><em data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">ER,k</span></em></sup><sub data-dcnode-id="3784"><em data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">gj</span></em></sub><span data-dcnode-id="3783" instrument_node=""> as nonnegative continuous flow variables, (9) denotes </span><em data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">I</span></em><sub data-dcnode-id="3778"><em data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">g</span></em></sub><span data-dcnode-id="3777" instrument_node=""> and </span><em data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">z</span></em><sub data-dcnode-id="3772"><em data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">sg</span></em></sub><span data-dcnode-id="3771" instrument_node=""> as nonnegative integer variables, and (10) denotes </span><em data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">y</span></em><sub data-dcnode-id="3766"><em data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">g</span></em></sub><span data-dcnode-id="3765" instrument_node=""> as binary variables.</span><span class="display" data-dcnode-id="3740"></span></p><figure class="figure text-xs" data-dcnode-id="3741" id="dfig2"><span data-dcnode-id="3749"><img alt="" aria-describedby="cap0015" data-dcnode-id="3764" height="518" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-fx2.jpg&amp;raw"><span data-dcnode-id="3763" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3750"><li data-dcnode-id="3757"><a class="anchor download-link u-font-sans" data-dcnode-id="3758" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-fx2_lrg.jpg" target="_blank" title="Download high-res image (348KB)"><span class="anchor-text" data-dcnode-id="3759"><span data-dcnode-id="3762" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">Download high-res image (348KB)</span></span></span></a></li><li data-dcnode-id="3751"><a class="anchor download-link u-font-sans" data-dcnode-id="3752" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-fx2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3753"><span data-dcnode-id="3756" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3742"><span data-dcnode-id="3743" id="cap0015"><p data-dcnode-id="3744" id="fspara0015"><span class="label" data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">Fig.&nbsp;B2</span></span><span data-dcnode-id="3746" instrument_node="">. </span><span data-dcnode-id="3745" instrument_node="">Minimum expected total cost model (TC*).</span></p></span></span></figure><p></p></section><section data-dcnode-id="3700" id="appsec2.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3736" id="sectitle0155"><span data-dcnode-id="3737" instrument_node="">Minimum expected lead time model</span></h3><p data-dcnode-id="3731" id="p0275"><span data-dcnode-id="3735" instrument_node="">The formulation LT* minimizes only the total lead time associated with all used arcs from a supply point to an OO or ER demand point (</span><a class="workspace-trigger" data-dcnode-id="3733" href="#appsec1" name="bappsec1"><span data-dcnode-id="3734" instrument_node="">Fig.&nbsp;B3</span></a><span data-dcnode-id="3732" instrument_node="">).</span></p><p data-dcnode-id="3701" id="p0280"><span data-dcnode-id="3730" instrument_node="">LT* comprises of all variables used in TC* plus the binary version of every continuous nonnegative flow variable, indicating whether each transport arc has a positive flow (constraints (11–14)). The objective function given in (F</span><sub data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">2</span></sub><span data-dcnode-id="3727" instrument_node="">) minimizes the expected lead time of shipping from suppliers to OO demand points, from global warehouses to OO demand points, and from global warehouses to ER points. The entire model is not presented for the sake of brevity.</span><span class="display" data-dcnode-id="3702"></span></p><figure class="figure text-xs" data-dcnode-id="3703" id="dfig3"><span data-dcnode-id="3711"><img alt="" aria-describedby="cap0020" data-dcnode-id="3726" height="260" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-fx3.jpg&amp;raw"><span data-dcnode-id="3725" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3712"><li data-dcnode-id="3719"><a class="anchor download-link u-font-sans" data-dcnode-id="3720" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-fx3_lrg.jpg" target="_blank" title="Download high-res image (179KB)"><span class="anchor-text" data-dcnode-id="3721"><span data-dcnode-id="3724" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">Download high-res image (179KB)</span></span></span></a></li><li data-dcnode-id="3713"><a class="anchor download-link u-font-sans" data-dcnode-id="3714" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-fx3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3715"><span data-dcnode-id="3718" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3704"><span data-dcnode-id="3705" id="cap0020"><p data-dcnode-id="3706" id="fspara0020"><span class="label" data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">Fig.&nbsp;B3</span></span><span data-dcnode-id="3708" instrument_node="">. </span><span data-dcnode-id="3707" instrument_node="">Objective function and additional constraints in minimum expected lead time model (LT*).</span></p></span></span></figure><p></p></section><section data-dcnode-id="3667" id="appsec2.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3698" id="sectitle0160"><span data-dcnode-id="3699" instrument_node="">Budget constrained minimum expected lead time model</span></h3><p data-dcnode-id="3668" id="p0285"><span data-dcnode-id="3697" instrument_node="">Dual objectives of lead time and cost are handled by a third model, in which the same lead time objective function as in LT* is minimized subject to all previous constraints and an additional budget constraint (</span><a class="workspace-trigger" data-dcnode-id="3695" href="#appsec1" name="bappsec1"><span data-dcnode-id="3696" instrument_node="">Fig.&nbsp;B4</span></a><span data-dcnode-id="3694" instrument_node="">). This constraint ensures that the total cost incurred under this model is less than or equal to the optimal value of TC* plus a percentage, β. In our computational experiments for analyzing the trade-off between cost and lead time, we varied β such that the right-hand side of constraint (16) ranged from the optimal objective value of TC* (minimum possible cost) to the cost incurred in the optimal LT* solution. Thus, we approximated the Pareto frontier with a set of efficient solutions, obtained by solving the model with β values ranging from 0 to 0.2 with increments of 0.0005, such that no other solution with better cost as well as better lead time exists.</span><span class="display" data-dcnode-id="3669"></span></p><figure class="figure text-xs" data-dcnode-id="3670" id="dfig4"><span data-dcnode-id="3678"><img alt="" aria-describedby="cap0025" data-dcnode-id="3693" height="86" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-fx4.jpg&amp;raw"><span data-dcnode-id="3692" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3679"><li data-dcnode-id="3686"><a class="anchor download-link u-font-sans" data-dcnode-id="3687" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-fx4_lrg.jpg" target="_blank" title="Download high-res image (112KB)"><span class="anchor-text" data-dcnode-id="3688"><span data-dcnode-id="3691" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">Download high-res image (112KB)</span></span></span></a></li><li data-dcnode-id="3680"><a class="anchor download-link u-font-sans" data-dcnode-id="3681" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-fx4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3682"><span data-dcnode-id="3685" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3671"><span data-dcnode-id="3672" id="cap0025"><p data-dcnode-id="3673" id="fspara0025"><span class="label" data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">Fig.&nbsp;B4</span></span><span data-dcnode-id="3675" instrument_node="">. </span><span data-dcnode-id="3674" instrument_node="">Additional constraint in budget-constrained minimum expected lead time model.</span></p></span></span></figure><p></p></section></section><section data-dcnode-id="3501" id="appsec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3660" id="sectitle0165"><span data-dcnode-id="3665" instrument_node="">Appendix C</span><span data-dcnode-id="3664" instrument_node="">. </span><span data-dcnode-id="3663" instrument_node="">Details of data sources, assumptions, and cost and lead time calculations</span><sup data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">∗</span></sup></h2><p data-dcnode-id="3502" id="p0290"><span class="display" data-dcnode-id="3503"></span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="3504" id="undtbl2"><div class="groups" data-dcnode-id="3508"><table data-dcnode-id="3509"><thead data-dcnode-id="3652"><tr class="rowsep-1 valign-top" data-dcnode-id="3653"><th data-dcnode-id="3658" scope="col"><span data-dcnode-id="3659" instrument_node="">Type</span></th><th data-dcnode-id="3656" scope="col"><span data-dcnode-id="3657" instrument_node="">Characteristic/Assumptions</span></th><th data-dcnode-id="3654" scope="col"><span data-dcnode-id="3655" instrument_node="">Source</span></th></tr></thead><tbody data-dcnode-id="3510"><tr class="valign-top" data-dcnode-id="3619"><td data-dcnode-id="3647"><span data-dcnode-id="3651" instrument_node="">Transportation cost to satisfy ER demand by express shipment (see </span><a class="workspace-trigger" data-dcnode-id="3649" href="#sec4.3" name="bsec4.3"><span data-dcnode-id="3650" instrument_node="">4.3</span></a><span data-dcnode-id="3648" instrument_node="">)</span></td><td data-dcnode-id="3636"><dl class="list" data-dcnode-id="3637"><dd class="list-description" data-dcnode-id="3644"><p data-dcnode-id="3645" id="p0295"><span data-dcnode-id="3646" instrument_node="">Air transportation: 100 USD per mile* total miles&nbsp;+&nbsp;25,000 USD (fixed cost)/(divided by) value per TEU (twenty-foot container)</span></p></dd><dd class="list-description" data-dcnode-id="3641"><p data-dcnode-id="3642" id="p0300"><span data-dcnode-id="3643" instrument_node="">Road transportation: 10 USD per mile* total miles/(divided by) value per TEU</span></p></dd><dd class="list-description" data-dcnode-id="3638"><p data-dcnode-id="3639" id="p0305"><span data-dcnode-id="3640" instrument_node="">The first 10 TEU's in each new emergency event are shipped by air. Air shipments to any particular demand point are constrained by the availability of funding and cannot exceed 10 TEUs. Additional TEUs are sent via surface</span></p></dd></dl></td><td data-dcnode-id="3620"><dl class="list" data-dcnode-id="3621"><dd class="list-description" data-dcnode-id="3633"><p data-dcnode-id="3634" id="p0310"><span data-dcnode-id="3635" instrument_node="">Brambles, ongoing consultancy project at UNHCR</span></p></dd><dd class="list-description" data-dcnode-id="3630"><p data-dcnode-id="3631" id="p0315"><span data-dcnode-id="3632" instrument_node="">Triangulated via analysis of ERP data</span></p></dd><dd class="list-description" data-dcnode-id="3625"><p data-dcnode-id="3626" id="p0320"><span data-dcnode-id="3629" instrument_node="">Distances were calculated using the following link: </span><a data-dcnode-id="3627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.freemaptools.com/how-far-is-it-between.htm" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3628" instrument_node="">http://www.freemaptools.com/how-far-is-it-between.htm</span></a></p></dd><dd class="list-description" data-dcnode-id="3622"><p data-dcnode-id="3623" id="p0325"><span data-dcnode-id="3624" instrument_node="">For value per TEU, see below</span></p></dd></dl></td></tr><tr class="valign-top" data-dcnode-id="3600"><td data-dcnode-id="3614"><span data-dcnode-id="3618" instrument_node="">Transportation cost to satisfy OO demand by normal shipment (see </span><a class="workspace-trigger" data-dcnode-id="3616" href="#sec4.3" name="bsec4.3"><span data-dcnode-id="3617" instrument_node="">4.3</span></a><span data-dcnode-id="3615" instrument_node="">)</span></td><td data-dcnode-id="3609"><dl class="list" data-dcnode-id="3610"><dd class="list-description" data-dcnode-id="3611"><p data-dcnode-id="3612" id="p0330"><span data-dcnode-id="3613" instrument_node="">10 USD per mile* total miles/(divided by) value per TEU</span></p></dd></dl></td><td data-dcnode-id="3601"><dl class="list" data-dcnode-id="3602"><dd class="list-description" data-dcnode-id="3606"><p data-dcnode-id="3607" id="p0335"><span data-dcnode-id="3608" instrument_node="">Brambles, ongoing consultancy project at UNHCR</span></p></dd><dd class="list-description" data-dcnode-id="3603"><p data-dcnode-id="3604" id="p0340"><span data-dcnode-id="3605" instrument_node="">Triangulated via analysis of ERP data</span></p></dd></dl></td></tr><tr class="valign-top" data-dcnode-id="3587"><td data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">Warehousing variable cost: holding cost per unit</span></td><td data-dcnode-id="3593"><dl class="list" data-dcnode-id="3594"><dd class="list-description" data-dcnode-id="3595"><p data-dcnode-id="3596" id="p0345"><span data-dcnode-id="3597" instrument_node="">20% of annual product value</span></p></dd></dl></td><td data-dcnode-id="3588"><dl class="list" data-dcnode-id="3589"><dd class="list-description" data-dcnode-id="3590"><p data-dcnode-id="3591" id="p0350"><span data-dcnode-id="3592" instrument_node="">Currently UNHCR does not operate with holding cost. Even so, variable cost was, in agreement with UNHCR, set to 20% of annual product value to account for variable staff cost, and so on.</span></p></dd></dl></td></tr><tr class="valign-top" data-dcnode-id="3565"><td data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">Warehousing fixed cost per site</span></td><td data-dcnode-id="3571"><dl class="list" data-dcnode-id="3572"><dd class="list-description" data-dcnode-id="3582"><p data-dcnode-id="3583" id="p0355"><span data-dcnode-id="3584" instrument_node="">Staff: USD 480,000 per year: USD 360,000 (international staff)&nbsp;+&nbsp;USD 120,000 (local staff)</span></p></dd><dd class="list-description" data-dcnode-id="3579"><p data-dcnode-id="3580" id="p0360"><span data-dcnode-id="3581" instrument_node="">Rent of land/facility: USD 250,000 per year</span></p></dd><dd class="list-description" data-dcnode-id="3576"><p data-dcnode-id="3577" id="p0365"><span data-dcnode-id="3578" instrument_node="">Total: USD 730,000 per year</span></p></dd><dd class="list-description" data-dcnode-id="3573"><p data-dcnode-id="3574" id="p0370"><span data-dcnode-id="3575" instrument_node="">Assume warehouse rental so no opening or closing cost</span></p></dd></dl></td><td data-dcnode-id="3566"><dl class="list" data-dcnode-id="3567"><dd class="list-description" data-dcnode-id="3568"><p data-dcnode-id="3569" id="p0375"><span data-dcnode-id="3570" instrument_node="">Average warehousing fixed costs calculated and confirmed by UNHCR</span></p></dd></dl></td></tr><tr class="valign-top" data-dcnode-id="3552"><td data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">Value of goods per TEU (twenty-foot container)</span></td><td data-dcnode-id="3558"><dl class="list" data-dcnode-id="3559"><dd class="list-description" data-dcnode-id="3560"><p data-dcnode-id="3561" id="p0380"><span data-dcnode-id="3562" instrument_node="">Balanced distribution of all items: USD 43,000</span></p></dd></dl></td><td data-dcnode-id="3553"><dl class="list" data-dcnode-id="3554"><dd class="list-description" data-dcnode-id="3555"><p data-dcnode-id="3556" id="p0385"><span data-dcnode-id="3557" instrument_node="">UNHCR's estimate of goods value for a TEU container with a representative mix of CRI</span></p></dd></dl></td></tr><tr class="valign-top" data-dcnode-id="3527"><td data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">Transportation lead time by air (for emergencies only) from confirmed order (and payment) until delivery at nearest airport</span></td><td data-dcnode-id="3536"><dl class="list" data-dcnode-id="3537"><dd class="list-description" data-dcnode-id="3547"><p data-dcnode-id="3548" id="p0390"><span data-dcnode-id="3549" instrument_node="">First wave after new emergency</span></p></dd><dd class="list-description" data-dcnode-id="3544"><p data-dcnode-id="3545" id="p0395"><span data-dcnode-id="3546" instrument_node="">3 days for all distances below 1000 miles</span></p></dd><dd class="list-description" data-dcnode-id="3541"><p data-dcnode-id="3542" id="p0400"><span data-dcnode-id="3543" instrument_node="">4 days for all distances above 1000 miles</span></p></dd><dd class="list-description" data-dcnode-id="3538"><p data-dcnode-id="3539" id="p0405"><span data-dcnode-id="3540" instrument_node="">Set max transport by air for a new emergency to 430,000 USD (valu /span><span data-dcnode-id="429" instrument_node="">, </span><span data-dcnode-id="427" instrument_node="">Sage Publications</span><span data-dcnode-id="425" instrument_node="">, </span><span data-dcnode-id="423" instrument_node="">Thousand Oaks, CA, USA</span><span data-dcnode-id="421" instrument_node=""> (</span><span data-dcnode-id="419" instrument_node="">2014</span><span data-dcnode-id="417" instrument_node="">)</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="412"><span data-dcnode-id="415" instrument_node=""></span><a aria-describedby="ref-id-sref57" class="link" data-dcnode-id="413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DCase%2520Study%2520Researchdesign%2520and%2520Methods" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="414" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="284" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="285"><div class="PageDivider" data-dcnode-id="407"></div><header data-dcnode-id="404" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Cited by (53)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="286"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="287"><ul data-dcnode-id="293"><li class="ListArticleItem" data-dcnode-id="386"><div class="sub-heading" data-dcnode-id="398"><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2212420922000474" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="402" id="citing-articles-article0-title"><span data-dcnode-id="403" instrument_node="">Intermodal transportation in humanitarian logistics with an application to a Turkish network using retrospective analysis</span></h3></a><div class="article-source ellipsis" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">2022, International Journal of Disaster Risk Reduction</span></div></div><div class="buttons" data-dcnode-id="392"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="393" type="button"><span class="button-link-text" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="394" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="395"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="387"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="388" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="389"><p data-dcnode-id="390" id="abspara0010"><span data-dcnode-id="391" instrument_node="">In the event of disruptions in a transportation network following a disaster, humanitarian organizations find it challenging to provide basic requirements for beneficiaries. Demand may be met using intermodal transportation as an alternative when the unimodal transportation infrastructure is damaged. This study proposes a mathematical model for utilizing intermodal transportation using 40&nbsp;ft standard containers while delivering relief supplies by road, rail, and sea modes. The proposed model is a capacitated multi-period multicommodity intermodal network flow model in which relief supplies are delivered to beneficiaries in three echelons (i.e., supply, intermodal hub, and demand). The Turkish Disaster and Emergency Management Presidency's container warehouses (i.e., supply), logistics centers and container ports (i.e., intermodal hubs) are utilized to test the mathematical model with real-life demand parameters. Retrospective analysis was performed to determine the most frequently used container warehouses, logistics centers, and origin-destination pairs. Hence, an increase in operational capacity and infrastructure reinforcement is recommended to mitigate the effects of future disasters. We found that intermodal transportation is more robust to network disruptions in rapidly delivering relief supplies. We observed that intermodal transportation is utilized in disasters with more than 50,000 beneficiaries or disrupted unimodal infrastructure. For instance, after the future Istanbul earthquake, it would be impossible to deliver the relief materials only by road transportation within the urgent response period. Thus, the benefits of intermodal transportation in humanitarian logistics are more visible in large-scale disasters in which transportation resources are scarce, and transportation infrastructure is more likely to be destroyed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="368"><div class="sub-heading" data-dcnode-id="380"><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0019850121002431" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="384" id="citing-articles-article1-title"><span data-dcnode-id="385" instrument_node="">Agile transformation in dynamic, high-technology markets: Drivers, inhibitors, and execution</span></h3></a><div class="article-source ellipsis" data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">2022, Industrial Marketing Management</span></div></div><div class="buttons" data-dcnode-id="374"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="375" type="button"><span class="button-link-text" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="376" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="377"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="369"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="370" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="371"><p data-dcnode-id="372" id="sp0030"><span data-dcnode-id="373" instrument_node="">Stage-Gate® new product development (NPD) processes have been adopted by the majority of organizations over the past three decades. Whie offering many advantages, Stage-Gate® processes have limitations such as rigidity, predictability, and its inability to handle shifting customer requirements. This has led to some organizations, especially in the software industry, to transition to Agile NPD processes, that might be well-suited for innovation in dynamic settings. However, the Agile methodology has its own set of limitations, and the transition from Stage-Gate to Agile is difficult, with firms routinely struggling to make this move. Little research has actually focused on the specifics of this transition, which is a significant gap in knowledge. We addressed this by conducting two studies to better understand the transition from Stage-Gate to Agile. In Study 1, 30 individuals experienced with both Stage-Gate® and Agile NPD processes in leading Silicon Valley organizations were personally interviewed in-person or by phone. Then, Study 2 detailed a real-life case study on a university transitioning from a Stage-Gate® process to Agile. These studies complement each other and reveal several interesting findings. The ability to get to market faster and/or respond to changing market conditions or shifting customer preferences facilitated the move to agile NPD processes. Alternately, the popularity of stage-gate and its integration into planning and budgeting processes inhibits moving completely away from Stage-Gate® NPD processes. Finally, the case study shows that a hybrid system which combines Stage-Gate® and Agile processes can bring about benefits from both approaches. Our study adds to the existing literature on NPD processes in dynamic environments and provides prescriptive guidance to innovation practitioners and opens paths for future theory building and research.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="350"><div class="sub-heading" data-dcnode-id="362"><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0305054821003683" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="366" id="citing-articles-article2-title"><span data-dcnode-id="367" instrument_node="">Optimizing access to drinking water in remote areas. Application to Nepal</span></h3></a><div class="article-source ellipsis" data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">2022, Computers and Operations Research</span></div></div><div class="buttons" data-dcnode-id="356"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="357" type="button"><span class="button-link-text" data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="358" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="359"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="351"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="352" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="353"><p data-dcnode-id="354" id="d1e3086"><span data-dcnode-id="355" instrument_node="">This study is motivated by the need to restore part of the Nepal water distribution network that was destroyed by the Gorkha and Dolakha earthquakes in April and May 2015. The problem consists of two hierarchical subproblems: locating water taps to ensure a good coverage of the population, and connecting these water taps to water sources by means of a pipe distribution network. Both subproblems are subject to a variety of accessibility and technical constraints that make the problem unique and highly complex. Namely, because Nepal is highly mountainous, elevations must be taken into account in the distance calculations, and the distribution network is gravity-fed, meaning that pumps are not used. The problem is solved by means of a two-phase matheuristic: the first subproblem is a constrained location–allocation problem which is solved exactly by integer linear programming, while the second subproblem is tackled by means of a cluster-first, tree-second heuristic. Several variants of the heuristic are developed and compared. The network design problem is of very large scale, being solved on a graph with as many as 29,900 vertices and 75,200 arcs. Tests are performed on real-world data, obtained by satellite imagery, from the Suspa Kshemawati and Lapilang communities in the Dolakha district. Extensive computational results confirm the effectiveness of the proposed methodology and enable an identification of the best parameter settings and algorithmic tactical choices.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="332"><div class="sub-heading" data-dcnode-id="344"><a data-dcnode-id="347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2212420921005641" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="348" id="citing-articles-article3-title"><span data-dcnode-id="349" instrument_node="">Determination of equivalent warehouses in humanitarian logistics by reallocation of multiple item type inventories</span></h3></a><div class="article-source ellipsis" data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">2021, International Journal of Disaster Risk Reduction</span></div></div><div class="buttons" data-dcnode-id="338"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="339" type="button"><span class="button-link-text" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="340" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="341"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="333"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="334" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="335"><p data-dcnode-id="336" id="abspara0010"><span data-dcnode-id="337" instrument_node="">Prepositioning freight containers for storage of relief supplies can be considered an alternative to warehousing with shelves. Recently, 25 container warehouses are located in different cities in Turkey to deliver relief supplies to beneficiaries quickly. We take this existing situation as given and investigate if this investment could be utilised better. The available inventory (i.e., tents, beds, blankets) in these container warehouses is currently not used efficiently. Some warehouses store one type of item and none from other types. Therefore, several warehouses must be activated during a response operation to fully satisfy the beneficiaries’ needs for each relief item type. We aim to investigate the benefits of operating equivalent (i.e., a proper inventory level from each relief item type) warehouses while reallocating a total available inventory for better coordination. A location-reallocation type of mathematical model is tested with real-life data from past earthquakes. Three to eight container warehouses are recommended to be converted to an equivalent type. The results indicate potential savings for the proposed model, and this potential is more visible in large-scale demand instances than in small ones.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="314"><div class="sub-heading" data-dcnode-id="326"><a data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S037722172031047X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="330" id="citing-articles-article4-title"><span data-dcnode-id="331" instrument_node="">The facts on the ground: Evaluating humanitarian fleet management policies using simulation</span></h3></a><div class="article-source ellipsis" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">2021, European Journal of Operational Research</span></div></div><div class="buttons" data-dcnode-id="320"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="321" type="button"><span class="button-link-text" data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="322" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="323"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="315"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="316" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="317"><p data-dcnode-id="318" id="sp0002"><span data-dcnode-id="319" instrument_node="">In humanitarian fleet management, the performance of purchase, assignment, and sales decisions is determined by dynamic interactions between the fleet composition, the time-varying and uncertain demands on the fleet, and the depreciation of the vehicles as they are exploited. We propose to evaluate purchase, assignment, and sales policies in a holistic simulation environment that directly models heterogeneous vehicle attributes and tracks their evolution over time. Using data from a large international humanitarian organization (LIHO), the simulator can identify the rationale behind seemingly ad-hoc decisions by field managers at LIHO. For instance, by selling vehicles later than LIHO recommends, managers are actually reducing their costs; similarly, managers decline to switch vehicles between mission types because the benefits to the operational cost turn out to be marginal at best.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="294"><div class="sub-heading" data-dcnode-id="308"><a data-dcnode-id="311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0377221720310110" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="312" id="citing-articles-article5-title"><span data-dcnode-id="313" instrument_node="">Impact of timing in post-warning prepositioning decisions on performance measures of disaster management: A real-life application</span></h3></a><div class="article-source ellipsis" data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">2021, European Journal of Operational Research</span></div></div><div class="buttons" data-dcnode-id="302"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="303" type="button"><span class="button-link-text" data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="304" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="305"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="295"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="296" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="297"><p data-dcnode-id="300" id="spara022"><span data-dcnode-id="301" instrument_node="">This research analyzes the impact of timing of post-warning and pre-disaster stock prepositioning decisions in disasters with an advance warning, such as hurricanes. From the warning time to the landfall time, disaster planners receive updated information regarding the hurricane's trajectory and the potential target region iteratively. The planners should decide when the best trigger time (TT) is to start the preparedness activities (prepositioning stocks of emergency goods). The quality of a given TT is evaluated concerning two performance measures: (i) the total logistics cost in the preparedness and response phases; and (ii) the minimum response time (RT) needed to transfer goods from the response facilities to affected areas in the response phase.</span></p><p data-dcnode-id="298" id="spara023"><span data-dcnode-id="299" instrument_node="">A stochastic optimization model is designed to determine the best TT, preparedness decisions, and response operations. The computational complexity of the model is reduced using a graph-theoretic conversion. We test the converted model on experimental data based on major hurricanes from 2001 to 2017 on the United States southeastern coast. Sensitivity analysis of the model shows that delaying TT makes a non-linear reduction in the total logistics cost and non-linear increment in the shortest possible RT. The optimal TT makes the best compromise between the total logistics cost and the speed of the response operations, according to the preference of disaster planners.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84982190158%26md5%3D9b198a1817e1a7bc63f4dd22e83dfdc" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="291" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="292"></path></svg><span class="button-alternative-text" data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="272"><dl class="footnote" data-dcnode-id="273"><dt class="footnote-label" data-dcnode-id="280"><sup data-dcnode-id="281"><a data-dcnode-id="282" href="#bfn1"><span data-dcnode-id="283" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="274"><p data-dcnode-id="275" id="ntpara0010"><span data-dcnode-id="279" instrument_node="">UNHCR uses the term </span><em data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">supply-chain strategy</span></em><span data-dcnode-id="276" instrument_node=""> to represent its setup of warehouse network, inventory control, and transportation-flow planning.</span></p></dd></dl></div><a class="anchor abstract-link" data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0272696316300444"><span class="anchor-text" data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="266"><span class="copyright-line" data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">© 2016 Elsevier B.V. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SpecialIssueArticles" data-dcnode-id="152" id="special-issue-articles"><div class="part-of-issue u-padding-s-bottom" data-dcnode-id="238"><h2 class="part-of-issue-text u-h4" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Part of special issue:</span></h2><div data-dcnode-id="244"><a class="part-of-issue-title" data-dcnode-id="260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/journal/02726963/45/supp/C"><span data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Special Issue on Humanitarian Operations Management</span></span></a><div class="part-of-issue-editors" data-dcnode-id="245"><span data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Edited by </span></span><div class="authors" data-dcnode-id="246"><span data-dcn
