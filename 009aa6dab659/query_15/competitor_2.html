summary of the notation used are included in </span></span><a class="workspace-trigger" data-dcnode-id="5143" href="#appsec1" name="bappsec1"><span data-dcnode-id="5144" instrument_node="">Appendix B</span></a><span data-dcnode-id="5142" instrument_node="">. Computational results based on UNHCR data are discussed in Section </span><a class="workspace-trigger" data-dcnode-id="5140" href="#sec4.4" name="bsec4.4"><span data-dcnode-id="5141" instrument_node="">4.4</span></a><span data-dcnode-id="5135"><span data-dcnode-id="5139" instrument_node="">. An IBM ILOG CPLEX machine with 8&nbsp;GB of </span><a class="topic-link" data-dcnode-id="5137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/reliability-availability-and-maintainability-reliability-engineering" title="Learn more about RAM from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5138" instrument_node="">RAM</span></a><span data-dcnode-id="5136" instrument_node=""> was used for solving each of the three mathematical models with maximum of 19,288 binary, integer, and continuous variables and 10,968 constraints. All model instances were solved within seconds.</span></span></p></section><section data-dcnode-id="5116" id="sec4.3.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5129" id="sectitle0095"><span data-dcnode-id="5132" instrument_node="">4.3.2</span><span data-dcnode-id="5131" instrument_node="">. </span><span data-dcnode-id="5130" instrument_node="">Minimum expected total cost model</span></h4><p data-dcnode-id="5117" id="p0150"><span data-dcnode-id="5128" instrument_node="">The first two-stage mixed-integer programming formulation, TC*, simultaneously determines open/close and inventory level decisions for global warehouses, along with transport and allocation decisions to satisfy demand (</span><a class="workspace-trigger" data-dcnode-id="5126" href="#appsec1" name="bappsec1"><span data-dcnode-id="5127" instrument_node="">Fig.&nbsp;B2</span></a><span data-dcnode-id="5125" instrument_node="">). Formulations of our models described in </span><a class="workspace-trigger" data-dcnode-id="5123" href="#appsec1" name="bappsec1"><span data-dcnode-id="5124" instrument_node="">Appendix B</span></a><span data-dcnode-id="5118"><span data-dcnode-id="5122" instrument_node="">, comprise three sets of variables. First, for every candidate warehouse location, we define a binary variable showing whether a global warehouse is opened. Next, </span><a class="topic-link" data-dcnode-id="5120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/mathematics/nonnegative-integer" title="Learn more about nonnegative integer from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5121" instrument_node="">nonnegative integer</span></a><span data-dcnode-id="5119" instrument_node=""> flows from supplier locations to global warehouses determine inventory levels at the opened warehouses. Last, we define nonnegative continuous variables going from suppliers and warehouses to demand points. These variables represent the required percentage of OO or ER demand sent from each supply location to demand points. We assume no capacity restrictions at the suppliers, warehouses, or transport arcs. The objective function in TC* minimizes the total cost associated with opening warehouses, holding necessary inventory at opened warehouses, shipping cost from suppliers to global warehouses, expected shipping cost from suppliers and global warehouses to OO points, and expected shipping cost from global warehouses to ER points. This objective is subject to several constraints: i) All OO and ER demand must be satisfied; ii) If ER demand is greater than 10 TEUs, 10 TEUs of the total demand must be sent by express air shipment and the rest by express road shipment; iii) If ER demand is less than 10 TEUs, the entire demand is sent by air. We let the model adjust OO demand allocation based on the realized ER demand under each scenario, thus hedging the risk of overstocking at the warehouses due to highly variable ER demand.</span></span></p></section><section data-dcnode-id="5102" id="sec4.3.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5112" id="sectitle0100"><span data-dcnode-id="5115" instrument_node="">4.3.3</span><span data-dcnode-id="5114" instrument_node="">. </span><span data-dcnode-id="5113" instrument_node="">Minimum expected lead time model</span></h4><p data-dcnode-id="5103" id="p0155"><span data-dcnode-id="5111" instrument_node="">The formulation LT* minimizes only the total lead time associated with all used arcs from a supply point to an OO or ER demand point (</span><a class="workspace-trigger" data-dcnode-id="5109" href="#appsec1" name="bappsec1"><span data-dcnode-id="5110" instrument_node="">Fig.&nbsp;B3</span></a><span data-dcnode-id="5104"><span data-dcnode-id="5108" instrument_node="">). Specifically, the objective function minimizes the expected lead time of shipping from suppliers to OO demand points, from global warehouses to OO demand points, and from global warehouses to ER points. We do not consider the lead times of shipments from supplier locations to global warehouses because we assume that </span><a class="topic-link" data-dcnode-id="5106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/replenishment" title="Learn more about replenishment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5107" instrument_node="">replenishment</span></a><span data-dcnode-id="5105" instrument_node=""> of global warehouses is an ongoing process that does not impact supply chain responsiveness. This assumption is based on the fact that UNHCR (i) keeps a buffer stock for 600,000 beneficiaries in its global warehouses and (ii) conducts forward planning and pre-emptive timeslot-based order placement, whereby country operations do not experience any increase in lead time for deliveries from global warehouses. Analysis of the inventory ordering policies of the global warehouses are beyond the scope of this paper because we only focus on high-level planning decisions and, therefore, consider only the total annual inventory levels at the global warehouses.</span></span></p></section><section data-dcnode-id="5085" id="sec4.3.4"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5098" id="sectitle0105"><span data-dcnode-id="5101" instrument_node="">4.3.4</span><span data-dcnode-id="5100" instrument_node="">. </span><span data-dcnode-id="5099" instrument_node="">Budget constrained minimum expected lead time model</span></h4><p data-dcnode-id="5086" id="p0160"><span data-dcnode-id="5097" instrument_node="">We handle the dual objectives of lead time and cost by building a third model that minimizes the same lead time objective function as in LT* with an additional budget constraint (</span><a class="workspace-trigger" data-dcnode-id="5095" href="#appsec1" name="bappsec1"><span data-dcnode-id="5096" instrument_node="">Fig.&nbsp;B4</span></a><span data-dcnode-id="5094" instrument_node="">). The budget constraint requires the objective function of the minimum total cost model, TC*, to be less than or equal to the optimal value of the TC* plus a percentage, β. In our computational experiments for analyzing the trade-off between cost and lead time, we varied β such that the right-hand side of the budget constraint (</span><a class="workspace-trigger" data-dcnode-id="5092" href="#appsec1" name="bappsec1"><span data-dcnode-id="5093" instrument_node="">Fig.&nbsp;B4</span></a><span data-dcnode-id="5087"><span data-dcnode-id="5091" instrument_node="">) ranged from the optimal objective value of TC* (minimum possible cost) to the cost incurred in the optimal LT* solution. Thus, we approximated the </span><a class="topic-link" data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/pareto-frontier" title="Learn more about Pareto frontier from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5090" instrument_node="">Pareto frontier</span></a><span data-dcnode-id="5088" instrument_node=""> with a set of efficient solutions such that no other solution with better cost as well as better lead time exists.</span></span></p></section></section><section data-dcnode-id="4846" id="sec4.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5080" id="sectitle0110"><span data-dcnode-id="5083" instrument_node="">4.4</span><span data-dcnode-id="5082" instrument_node="">. </span><span data-dcnode-id="5081" instrument_node="">Case for model testing</span></h3><div data-dcnode-id="5044"><p data-dcnode-id="5069" id="p0165"><span data-dcnode-id="5079" instrument_node="">In this section, we present the case on which the model was tested; it is based on real data collected from or estimated in agreement with UNHCR (</span><a class="workspace-trigger" data-dcnode-id="5077" href="#appsec1" name="bappsec1"><span data-dcnode-id="5078" instrument_node="">Appendix C</span></a><span data-dcnode-id="5076" instrument_node="">). The main aspect of the analysis is to compare UNHCR's existing warehouse network constituting 7 global warehouses with a redesigned network containing four new locations (</span><a class="workspace-trigger" data-dcnode-id="5074" href="#fig2" name="bfig2"><span data-dcnode-id="5075" instrument_node="">Fig.&nbsp;2</span></a><span data-dcnode-id="5073" instrument_node="">). The alternative locations were agreed upon in discussion with UNHCR: Subang (Malaysia) means possible co-location with UNHRD (</span><a class="workspace-trigger" data-dcnode-id="5071" href="#bib56" name="bbib56"><span data-dcnode-id="5072" instrument_node="">www.unhrd.org</span></a><span data-dcnode-id="5070" instrument_node="">), Algeciras (Spain) is good for transshipment (UNHRD may decide to relocate their warehouse from Las Palmas for the same reason), while Karachi (Pakistan) and Djibouti (Djibouti) both are big distribution points for OO. UNHCR has practically no operations in the Americas, and there are no plans for a global warehouse in this region.</span></p><figure class="figure text-xs" data-dcnode-id="5045" id="fig2"><span data-dcnode-id="5053"><img alt="" aria-describedby="cap0035" data-dcnode-id="5068" height="357" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-gr2.jpg&amp;raw"><span data-dcnode-id="5067" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5054"><li data-dcnode-id="5061"><a class="anchor download-link u-font-sans" data-dcnode-id="5062" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-gr2_lrg.jpg" target="_blank" title="Download high-res image (358KB)"><span class="anchor-text" data-dcnode-id="5063"><span data-dcnode-id="5066" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5064"><span data-dcnode-id="5065" instrument_node="">Download high-res image (358KB)</span></span></span></a></li><li data-dcnode-id="5055"><a class="anchor download-link u-font-sans" data-dcnode-id="5056" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5057"><span data-dcnode-id="5060" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5058"><span data-dcnode-id="5059" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5046"><span data-dcnode-id="5047" id="cap0035"><p data-dcnode-id="5048" id="fspara0035"><span class="label" data-dcnode-id="5051"><span data-dcnode-id="5052" instrument_node="">Fig.&nbsp;2</span></span><span data-dcnode-id="5050" instrument_node="">. </span><span data-dcnode-id="5049" instrument_node="">Warehouses in UNHCR's network (June 2015).</span></p></span></span></figure></div><div data-dcnode-id="5014"><p data-dcnode-id="5039" id="p0170"><span data-dcnode-id="5043" instrument_node="">The resulting model includes the 11 candidate warehouse locations, 56 demand points for OO, 76 demand points for ER, and 14 supplier points. OO demand was calculated as a three-month average (in USD) per distribution point (one per country) based on historic data from the years 2011–2013. We used this data to create three emergency demand scenarios represented as three-month averages per distribution point (</span><a class="workspace-trigger" data-dcnode-id="5041" href="#fig3" name="bfig3"><span data-dcnode-id="5042" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="5040" instrument_node="">), yielding representative variability and trends. Each year constitutes one scenario with an occurrence probability of 0.3333.</span></p><figure class="figure text-xs" data-dcnode-id="5015" id="fig3"><span data-dcnode-id="5023"><img alt="" aria-describedby="cap0040" data-dcnode-id="5038" height="242" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-gr3.jpg&amp;raw"><span data-dcnode-id="5037" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5024"><li data-dcnode-id="5031"><a class="anchor download-link u-font-sans" data-dcnode-id="5032" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-gr3_lrg.jpg" target="_blank" title="Download high-res image (260KB)"><span class="anchor-text" data-dcnode-id="5033"><span data-dcnode-id="5036" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">Download high-res image (260KB)</span></span></span></a></li><li data-dcnode-id="5025"><a class="anchor download-link u-font-sans" data-dcnode-id="5026" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5027"><span data-dcnode-id="5030" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5028"><span data-dcnode-id="5029" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5016"><span data-dcnode-id="5017" id="cap0040"><p data-dcnode-id="5018" id="fspara0040"><span class="label" data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">Fig.&nbsp;3</span></span><span data-dcnode-id="5020" instrument_node="">. </span><span data-dcnode-id="5019" instrument_node="">Variability in ER demand over 2011–2013 (three-month average) per country.</span></p></span></span></figure></div><div data-dcnode-id="4861"><p data-dcnode-id="5006" id="p0175"><span data-dcnode-id="5013" instrument_node="">Data on transportation and warehousing were collected and used to calculate/estimate costs, capacities, and lead times (</span><a class="workspace-trigger" data-dcnode-id="5011" href="#appsec1" name="bappsec1"><span data-dcnode-id="5012" instrument_node="">Appendix C</span></a><span data-dcnode-id="5010" instrument_node="">). In agreement with UNHCR, it was decided to quantify four main influencing factors by estimating location-specific percentages and adding/subtracting from variable or fixed costs (</span><a class="workspace-trigger" data-dcnode-id="5008" href="#tbl2" name="btbl2"><span data-dcnode-id="5009" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="5007" instrument_node="">). We see that the factors have different weights for the same location, which implies that it is important to incorporate more than one factor. In particular, hardship impacted a greater number of locations than security, and locations with high security cost such as Karachi had relatively lower accessibility cost than other locations, for example, Douala and Isaka.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="4862" id="tbl2"><span class="captions" data-dcnode-id="4999"><span data-dcnode-id="5000" id="cap0055"><p data-dcnode-id="5001" id="tspara0020"><span class="label" data-dcnode-id="5004"><span data-dcnode-id="5005" instrument_node="">Table&nbsp;2</span></span><span data-dcnode-id="5003" instrument_node="">. </span><span data-dcnode-id="5002" instrument_node="">Location-specific percentages for adding to/subtracting from baseline logistics cost.</span></p></span></span><div class="groups" data-dcnode-id="4863"><table data-dcnode-id="4864"><thead data-dcnode-id="4987"><tr class="rowsep-1 valign-top" data-dcnode-id="4988"><th data-dcnode-id="4997" scope="col"><span data-dcnode-id="4998" instrument_node="">Location</span></th><th data-dcnode-id="4995" scope="col"><span data-dcnode-id="4996" instrument_node="">% added for hardship</span></th><th data-dcnode-id="4993" scope="col"><span data-dcnode-id="4994" instrument_node="">% added for security including pilferage</span></th><th data-dcnode-id="4991" scope="col"><span data-dcnode-id="4992" instrument_node="">% deducted for co-location</span></th><th data-dcnode-id="4989" scope="col"><span data-dcnode-id="4990" instrument_node="">% added for lack of accessibility</span></th></tr></thead><tbody data-dcnode-id="4865"><tr class="valign-top" data-dcnode-id="4976"><td data-dcnode-id="4985"><span data-dcnode-id="4986" instrument_node="">Accra (Ghana)</span></td><td data-dcnode-id="4983"><span data-dcnode-id="4984" instrument_node="">0%</span></td><td data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">0%</span></td><td data-dcnode-id="4979"><span data-dcnode-id="4980" instrument_node="">50%</span></td><td data-dcnode-id="4977"><span data-dcnode-id="4978" instrument_node="">15.55%</span></td></tr><tr class="valign-top" data-dcnode-id="4965"><td data-dcnode-id="4974"><span data-dcnode-id="4975" instrument_node="">Algeciras (Spain)</span></td><td data-dcnode-id="4972"><span data-dcnode-id="4973" instrument_node="">0%</span></td><td data-dcnode-id="4970"><span data-dcnode-id="4971" instrument_node="">0%</span></td><td data-dcnode-id="4968"><span data-dcnode-id="4969" instrument_node="">0%</span></td><td data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">0.86%</span></td></tr><tr class="valign-top" data-dcnode-id="4954"><td data-dcnode-id="4963"><span data-dcnode-id="4964" instrument_node="">Amman (Jordan)</span></td><td data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node="">0%</span></td><td data-dcnode-id="4959"><span data-dcnode-id="4960" instrument_node="">0%</span></td><td data-dcnode-id="4957"><span data-dcnode-id="4958" instrument_node="">0%</span></td><td data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">12.23%</span></td></tr><tr class="valign-top" data-dcnode-id="4943"><td data-dcnode-id="4952"><span data-dcnode-id="4953" instrument_node="">Copenhagen (Denmark)</span></td><td data-dcnode-id="4950"><span data-dcnode-id="4951" instrument_node="">0%</span></td><td data-dcnode-id="4948"><span data-dcnode-id="4949" instrument_node="">0%</span></td><td data-dcnode-id="4946"><span data-dcnode-id="4947" instrument_node="">50%</span></td><td data-dcnode-id="4944"><span data-dcnode-id="4945" instrument_node="">0.00%</span></td></tr><tr class="valign-top" data-dcnode-id="4932"><td data-dcnode-id="4941"><span data-dcnode-id="4942" instrument_node="">Djibouti (Djibouti)</span></td><td data-dcnode-id="4939"><span data-dcnode-id="4940" instrument_node="">10%</span></td><td data-dcnode-id="4937"><span data-dcnode-id="4938" instrument_node="">0%</span></td><td data-dcnode-id="4935"><span data-dcnode-id="4936" instrument_node="">0%</span></td><td data-dcnode-id="4933"><span data-dcnode-id="4934" instrument_node="">16.00%</span></td></tr><tr class="valign-top" data-dcnode-id="4921"><td data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node="">Dubai (UAE)</span></td><td data-dcnode-id="4928"><span data-dcnode-id="4929" instrument_node="">0%</span></td><td data-dcnode-id="4926"><span data-dcnode-id="4927" instrument_node="">0%</span></td><td data-dcnode-id="4924"><span data-dcnode-id="4925" instrument_node="">50%</span></td><td data-dcnode-id="4922"><span data-dcnode-id="4923" instrument_node="">3.28%</span></td></tr><tr class="valign-top" data-dcnode-id="4910"><td data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node="">Douala (Cameroon)</span></td><td data-dcnode-id="4917"><span data-dcnode-id="4918" instrument_node="">0%</span></td><td data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">0%</span></td><td data-dcnode-id="4913"><span data-dcnode-id="4914" instrument_node="">0%</span></td><td data-dcnode-id="4911"><span data-dcnode-id="4912" instrument_node="">20.00%</span></td></tr><tr class="valign-top" data-dcnode-id="4899"><td data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">Isaka (Tanzania)</span></td><td data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">31%</span></td><td data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">0%</span></td><td data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">0%</span></td><td data-dcnode-id="4900"><span data-dcnode-id="4901" instrument_node="">19.55%</span></td></tr><tr class="valign-top" data-dcnode-id="4888"><td data-dcnode-id="4897"><span data-dcnode-id="4898" instrument_node="">Karachi (Pakistan)</span></td><td data-dcnode-id="4895"><span data-dcnode-id="4896" instrument_node="">27%</span></td><td data-dcnode-id="4893"><span data-dcnode-id="4894" instrument_node="">15%</span></td><td data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">0%</span></td><td data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">12.88%</span></td></tr><tr class="valign-top" data-dcnode-id="4877"><td data-dcnode-id="4886"><span data-dcnode-id="4887" instrument_node="">Nairobi (Kenya)</span></td><td data-dcnode-id="4884"><span data-dcnode-id="4885" instrument_node="">6%</span></td><td data-dcnode-id="4882"><span data-dcnode-id="4883" instrument_node="">0%</span></td><td data-dcnode-id="4880"><span data-dcnode-id="4881" instrument_node="">0%</span></td><td data-dcnode-id="4878"><span data-dcnode-id="4879" instrument_node="">13.06%</span></td></tr><tr class="valign-top" data-dcnode-id="4866"><td data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">Subang (Malaysia)</span></td><td data-dcnode-id="4873"><span data-dcnode-id="4874" instrument_node="">0%</span></td><td data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">0%</span></td><td data-dcnode-id="4869"><span data-dcnode-id="4870" instrument_node="">50%</span></td><td data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">2.59%</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="4847" id="p0180"><span data-dcnode-id="4860" instrument_node="">The first, differentiated access to human resources, was quantified using UN's hardship classification (policy duty stations are classified from A to E, with the latter being the hardest) and payment schemes (</span><a class="workspace-trigger" data-dcnode-id="4858" href="#bib25" name="bbib25"><span data-dcnode-id="4859" instrument_node="">ICSC, 2013</span></a><span data-dcnode-id="4857" instrument_node="">) to calculate the additional percentage of staff's share of fixed cost and variable cost. The qualitative study suggested pilferage as an important factor, and we undertook an analysis of UNHCR insurance claim history over 2011–2014 to establish potential patterns varying with location. No such pattern was identified, and in agreement with UNHCR, we included pilferage in the differentiated security cost to account for the extra security measures taken to avoid loss (e.g. fences and guards). Security cost was quantified using the UN Security Management System Security Policy Manual with levels ranging from 1 to 6, with 6 representing the most dangerous environment (</span><a class="workspace-trigger" data-dcnode-id="4855" href="#bib50" name="bbib50"><span data-dcnode-id="4856" instrument_node="">United Nations Department of Safety and Security, 2011</span></a><span data-dcnode-id="4854" instrument_node="">) together with the most updated security rankings (</span><a data-dcnode-id="4852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trip.dss.un.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4853" instrument_node="">https://trip.dss.un.org</span></a><span data-dcnode-id="4851" instrument_node="">) for the locations analyzed, assuming in agreement with UNHCR, a non-linear relationship with no extra cost for levels up to 3, 15% for level 4, 45% for level 5, and a “no-go” notification for level 6 (i.e., no global warehouse in such locations). For accessibility, we used country scores from the Logistics Performance Index (</span><a data-dcnode-id="4849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//lpi.worldbank.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4850" instrument_node="">http://lpi.worldbank.org/</span></a><span data-dcnode-id="4848" instrument_node="">) to establish the percentages of additional variable warehousing cost. Finally, in agreement with UNHCR, co-location was accounted for by assuming 50/50 split of fixed warehousing cost with the other organization.</span></p></section></section><section data-dcnode-id="4193" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4841" id="sectitle0115"><span data-dcnode-id="4844" instrument_node="">5</span><span data-dcnode-id="4843" instrument_node="">. </span><span data-dcnode-id="4842" instrument_node="">Computational results</span></h2><p data-dcnode-id="4836" id="p0185"><span data-dcnode-id="4840" instrument_node="">This section presents the three key insights derived from the computational results relating to the objectives presented in Section </span><a class="workspace-trigger" data-dcnode-id="4838" href="#sec1" name="bsec1"><span data-dcnode-id="4839" instrument_node="">1</span></a><span data-dcnode-id="4837" instrument_node="">: i) Quantification of the impact of an expanded network on lead time and cost; ii) advantage of joint prepositioning; and iii) impact of the factors on warehouse locations, that is, network configuration.</span></p><section data-dcnode-id="4579" id="sec5.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4832" id="sectitle0120"><span data-dcnode-id="4835" instrument_node="">5.1</span><span data-dcnode-id="4834" instrument_node="">. </span><span data-dcnode-id="4833" instrument_node="">Key insight 1: network expansion reduces costs and shortens lead times</span></h3><div data-dcnode-id="4797"><p data-dcnode-id="4822" id="p0190"><a class="workspace-trigger" data-dcnode-id="4830" href="#fig4" name="bfig4"><span data-dcnode-id="4831" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="4829" instrument_node=""> shows the trajectories and efficient frontiers of the two different network configurations when β is varied from 0 to 0.2. The rightmost curve represents the existing network with seven candidate warehouses, and the leftmost curve represents the expanded network with an additional four warehouses. Each point on the frontiers shows the optimal lead time for the third model associated with a different β under the budget constraint that allows a cost of (1&nbsp;+&nbsp;β) times the optimal value obtained using the TC* model. That is, the minimum lead time is given on the </span><em data-dcnode-id="4827"><span data-dcnode-id="4828" instrument_node="">y</span></em><span data-dcnode-id="4826" instrument_node=""> axis when spending is constrained by cost, which is represented on the </span><em data-dcnode-id="4824"><span data-dcnode-id="4825" instrument_node="">x</span></em><span data-dcnode-id="4823" instrument_node=""> axis. We have highlighted one point (β&nbsp;=&nbsp;0.015) which we will use when discussing further key insights because it represents a good trade-off between cost and lead time.</span></p><figure class="figure text-xs" data-dcnode-id="4798" id="fig4"><span data-dcnode-id="4806"><img alt="" aria-describedby="cap0045" data-dcnode-id="4821" height="242" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-gr4.jpg&amp;raw"><span data-dcnode-id="4820" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4807"><li data-dcnode-id="4814"><a class="anchor download-link u-font-sans" data-dcnode-id="4815" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-gr4_lrg.jpg" target="_blank" title="Download high-res image (265KB)"><span class="anchor-text" data-dcnode-id="4816"><span data-dcnode-id="4819" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">Download high-res image (265KB)</span></span></span></a></li><li data-dcnode-id="4808"><a class="anchor download-link u-font-sans" data-dcnode-id="4809" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272696316300444-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4810"><span data-dcnode-id="4813" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4799"><span data-dcnode-id="4800" id="cap0045"><p data-dcnode-id="4801" id="fspara0045"><span class="label" data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">Fig.&nbsp;4</span></span><span data-dcnode-id="4803" instrument_node="">. </span><span data-dcnode-id="4802" instrument_node="">The total cost and associated lead time when β varies between 0 and 0.2 for networks with 7 and 11 global warehouses. β values were incremented by 0.0005 for each computation.</span></p></span></span></figure></div><p data-dcnode-id="4795" id="p0195"><span data-dcnode-id="4796" instrument_node="">The results indicate that when optimizing cost and lead time, expanding the existing network by adding the four candidate locations enables a 31% cost reduction and an 18% lead time reduction when β&nbsp;=&nbsp;0.015. When optimizing LT*, the expanded network leads to a 28% reduction in lead time. As expected, there is a trade-off between lead time and cost for both the existing and the expanded networks. It is interesting to note, however, that the increase in cost is relatively small compared to the savings in lead time. Relaxing the budget constraint by just a few percent and allowing for an expanded network of global warehouses makes it possible to achieve substantial savings in terms of lead time. In other words, based on the computational results, we see that UNHCR, as well as other HOs using prepositioning, should consider establishing additional global warehouses closer to points with high demand.</span></p><div data-dcnode-id="4582"><p data-dcnode-id="4790" id="p0200"><span data-dcnode-id="4794" instrument_node="">The computational experiments indicate that UNHCR should consider closing a few of the warehouses in the existing network and open new ones (</span><a class="workspace-trigger" data-dcnode-id="4792" href="#tbl3" name="btbl3"><span data-dcnode-id="4793" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="4791" instrument_node="">). For example, when optimizing TC* (β&nbsp;=&nbsp;0) for the expanded network, Dubai and Douala were replaced by Algeciras, Subang, and Djibouti. Copenhagen helped improving the lead time, but it increased costs; therefore, it was not viable without a further increase in budget (at β&nbsp;=&nbsp;0.035).</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="4583" id="tbl3"><span class="captions" data-dcnode-id="4783"><span data-dcnode-id="4784" id="cap0060"><p data-dcnode-id="4785" id="tspara0025"><span class="label" data-dcnode-id="4788"><span data-dcnode-id="4789" instrument_node="">Table&nbsp;3</span></span><span data-dcnode-id="4787" instrument_node="">. </span><span data-dcnode-id="4786" instrument_node="">Network configurations under different budget constraints (1&nbsp;=&nbsp;location is opened; 0&nbsp;=&nbsp;location is closed). Table&nbsp;below only includes computational results from β values corresponding to different solutions as β is increased.</span></p></span></span><div class="groups" data-dcnode-id="4584"><table data-dcnode-id="4585"><thead data-dcnode-id="4767"><tr class="rowsep-1 valign-top" data-dcnode-id="4768"><th data-dcnode-id="4781" scope="col"><span data-dcnode-id="4782" instrument_node="">Location included in modeling</span></th><th data-dcnode-id="4779" scope="col"><span data-dcnode-id="4780" instrument_node="">β&nbsp;=&nbsp;0</span></th><th data-dcnode-id="4777" scope="col"><span data-dcnode-id="4778" instrument_node="">β&nbsp;=&nbsp;0.01</span></th><th data-dcnode-id="4775" scope="col"><span data-dcnode-id="4776" instrument_node="">β&nbsp;=&nbsp;0.015</span></th><th data-dcnode-id="4773" scope="col"><span data-dcnode-id="4774" instrument_node="">β&nbsp;=&nbsp;0.025</span></th><th d span></td><td data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node="">1</span></td><td data-dcnode-id="4635"><span data-dcnode-id="4636" instrument_node="">1</span></td><td data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">1</span></td></tr><tr class="valign-top" data-dcnode-id="4617"><td data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node="">Nairobi (Kenya)</span></td><td data-dcnode-id="4628"><span data-dcnode-id="4629" instrument_node="">1</span></td><td data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">1</span></td><td data-dcnode-id="4624"><span data-dcnode-id="4625" instrument_node="">0</span></td><td data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">0</span></td><td data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">0</span></td><td data-dcnode-id="4618"><span data-dcnode-id="4619" instrument_node="">1</span></td></tr><tr class="valign-top" data-dcnode-id="4602"><td data-dcnode-id="4615"><span data-dcnode-id="4616" instrument_node="">Subang (Malaysia)</span></td><td data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">1</span></td><td data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">1</span></td><td data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node="">1</span></td><td data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">1</span></td><td data-dcnode-id="4605"><span data-dcnode-id="4606" instrument_node="">1</span></td><td data-dcnode-id="4603"><span data-dcnode-id="4604" instrument_node="">1</span></td></tr><tr class="valign-top" data-dcnode-id="4587"><td data-dcnode-id="4600"><span data-dcnode-id="4601" instrument_node="">Total open warehouses</span></td><td data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">6</span></td><td data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">6</span></td><td data-dcnode-id="4594"><span data-dcnode-id="4595" instrument_node="">8</span></td><td data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">8</span></td><td data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">9</span></td><td data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">10</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="4580" id="p0205"><span data-dcnode-id="4581" instrument_node="">A few of the open/close decisions change more than once as the budget increases. It is beneficial to open Dubai when β is large enough (β&nbsp;=&nbsp;0.015). However, when the budget increases further and is sufficient to support Karachi, Dubai is no longer needed because Karachi is better from the lead time perspective. Having both Karachi and Dubai open at the same time is not feasible budget-wise. The above results also indicate that network configuration is sensitive to the available budget.</span></p></section><section data-dcnode-id="4416" id="sec5.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4575" id="sectitle0125"><span data-dcnode-id="4578" instrument_node="">5.2</span><span data-dcnode-id="4577" instrument_node="">. </span><span data-dcnode-id="4576" instrument_node="">Key insight 2: joint prepositioning for ER and OO demand reduces lead times and total costs</span></h3><div data-dcnode-id="4425"><p data-dcnode-id="4570" id="p0210"><span data-dcnode-id="4574" instrument_node="">The second key insight from the model relates to the benefits of joint prepositioning for satisfying OO and ER demand. By joining the OO and ER supply chains, prepositioned stock can be used for both long- and short-term operations. To exemplify, we show what happens at β&nbsp;=&nbsp;0.015 in </span><a class="workspace-trigger" data-dcnode-id="4572" href="#tbl4" name="btbl4"><span data-dcnode-id="4573" instrument_node="">Table&nbsp;4</span></a><span data-dcnode-id="4571" instrument_node="">, where the second column indicates whether a warehouse location is opened or closed. The third column indicates the number of TEUs shipped from each location to satisfy the total OO and ER demands, while the fourth and fifth columns show the amounts of OO and ER in USD handled through each warehouse, that is, the sum of the demands in USD provisioned from each warehouse to all ER/OO demand points in all scenarios.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="4426" id="tbl4"><span class="captions" data-dcnode-id="4563"><span data-dcnode-id="4564" id="cap0065"><p data-dcnode-id="4565" id="tspara0030"><span class="label" data-dcnode-id="4568"><span data-dcnode-id="4569" instrument_node="">Table&nbsp;4</span></span><span data-dcnode-id="4567" instrument_node="">. </span><span data-dcnode-id="4566" instrument_node="">Distribution of OO and ER volumes satisfied per warehouse location at β&nbsp;=&nbsp;0.015.</span></p></span></span><div class="groups" data-dcnode-id="4427"><table data-dcnode-id="4428"><thead data-dcnode-id="4551"><tr class="rowsep-1 valign-top" data-dcnode-id="4552"><th data-dcnode-id="4561" scope="col"><span data-dcnode-id="4562" instrument_node="">Location included in modeling</span></th><th data-dcnode-id="4559" scope="col"><span data-dcnode-id="4560" instrument_node="">Open/close</span></th><th data-dcnode-id="4557" scope="col"><span data-dcnode-id="4558" instrument_node="">Total TEUs handled</span></th><th data-dcnode-id="4555" scope="col"><span data-dcnode-id="4556" instrument_node="">Amount of OO provisioned (in USD)</span></th><th data-dcnode-id="4553" scope="col"><span data-dcnode-id="4554" instrument_node="">Amount of ER provisioned (in USD)</span></th></tr></thead><tbody data-dcnode-id="4429"><tr class="valign-top" data-dcnode-id="4540"><td data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">Accra (Ghana)</span></td><td data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">1</span></td><td data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">51</span></td><td data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">1,237,624</span></td><td data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">3,527,735</span></td></tr><tr class="valign-top" data-dcnode-id="4529"><td data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">Amman (Jordan)</span></td><td data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">1</span></td><td data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">327</span></td><td data-dcnode-id="4532"><span data-dcnode-id="4533" instrument_node="">29,221,081</span></td><td data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">9,020,899</span></td></tr><tr class="valign-top" data-dcnode-id="4518"><td data-dcnode-id="4527"><span data-dcnode-id="4528" instrument_node="">Algeciras (Spain)</span></td><td data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">1</span></td><td data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">45</span></td><td data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">1,735,152</span></td><td data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">2,604,836</span></td></tr><tr class="valign-top" data-dcnode-id="4507"><td data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">Copenhagen (Denmark)</span></td><td data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">0</span></td><td data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">0</span></td><td data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">–</span></td><td data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">–</span></td></tr><tr class="valign-top" data-dcnode-id="4496"><td data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">Djibouti (Djibouti)</span></td><td data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">1</span></td><td data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">157</span></td><td data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">8,010,622</span></td><td data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">9,611,756</span></td></tr><tr class="valign-top" data-dcnode-id="4485"><td data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">Douala (Cameroon)</span></td><td data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">1</span></td><td data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node="">25</span></td><td data-dcnode-id="4488"><span data-dcnode-id="4489" instrument_node="">1,250,275</span></td><td data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">638,785</span></td></tr><tr class="valign-top" data-dcnode-id="4474"><td data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">Dubai (UAE)</span></td><td data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">1</span></td><td data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">34</span></td><td data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">3,331,454</span></td><td data-dcnode-id="4475"><span data-dcnode-id="4476" instrument_node="">–</span></td></tr><tr class="valign-top" data-dcnode-id="4463"><td data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">Isaka (Tanzania)</span></td><td data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">1</span></td><td data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">70</span></td><td data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">3,524,451</span></td><td data-dcnode-id="4464"><span data-dcnode-id="4465" instrument_node="">4,461,194</span></td></tr><tr class="valign-top" data-dcnode-id="4452"><td data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">Karachi (Pakistan)</span></td><td data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">0</span></td><td data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node="">0</span></td><td data-dcnode-id="4455"><span data-dcnode-id="4456" instrument_node="">–</span></td><td data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">–</span></td></tr><tr class="valign-top" data-dcnode-id="4441"><td data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">Nairobi (Kenya)</span></td><td data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">0</span></td><td data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">0</span></td><td data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">–</span></td><td data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">–</span></td></tr><tr class="valign-top" data-dcnode-id="4430"><td data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">Subang (Malaysia)</span></td><td data-dcnode-id="4437"><span data-dcnode-id="4438" instrument_node="">1</span></td><td data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">380</span></td><td data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">701,465</span></td><td data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">22,627,181</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="4417" id="p0215"><span data-dcnode-id="4424" instrument_node="">We see that eight of the warehouses satisfy OO demand and seven satisfy both OO and ER demands. In our computations, although the source of satisfying OO demand can be different, for β&nbsp;=&nbsp;0.015, the OO demand points are served from the same global warehouses across scenarios. In comparison, the global warehouses fulfilling ER demand vary significantly with scenarios, primarily because ER demand is very volatile across the employed scenarios (cf. </span><a class="workspace-trigger" data-dcnode-id="4422" href="#fig3" name="bfig3"><span data-dcnode-id="4423" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="4421" instrument_node="">). For example, there was almost no ER demand in Jordan in 2011, whereas in 2012 and 2013, the average three-month ER demand corresponded to USD5.17 million and USD13.77&nbsp;m, respectively. From the computational evidence, we conclude that by introducing stable OO demand in the network, we can justify opening additional warehouses, which, in turn, leads to shorter lead times and lower total cost for both OO and ER (</span><a class="workspace-trigger" data-dcnode-id="4419" href="#fig4" name="bfig4"><span data-dcnode-id="4420" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="4418" instrument_node="">).</span></p></section><section data-dcnode-id="4194" id="sec5.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4412" id="sectitle0130"><span data-dcnode-id="4415" instrument_node="">5.3</span><span data-dcnode-id="4414" instrument_node="">. </span><span data-dcnode-id="4413" instrument_node="">Key insight 3: contextual factors matter</span></h3><div data-dcnode-id="4199"><p data-dcnode-id="4407" id="p0220"><span data-dcnode-id="4411" instrument_node="">The third insight relates to the importance of contextual factors, in particular, political and security factors. </span><a class="workspace-trigger" data-dcnode-id="4409" href="#tbl5" name="btbl5"><span data-dcnode-id="4410" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="4408" instrument_node=""> summarizes the computational results for β&nbsp;=&nbsp;0.015, where each column represents a separate run of the model. The second column considers all four factors. Thereafter, we exclude only hardship, then only security, then only co-location, then only accessibility, and finally, we consider no factor (i.e., we set the factors to 0% benefit or extra cost).</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="4200" id="tbl5"><span class="captions" data-dcnode-id="4400"><span data-dcnode-id="4401" id="cap0 ="">1</span></td><td data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">0</span></td></tr><tr class="valign-top" data-dcnode-id="4264"><td data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">Isaka (Tanzania)</span></td><td data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">1</span></td><td data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">1</span></td><td data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">0</span></td><td data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">0</span></td><td data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">0</span></td><td data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">1</span></td></tr><tr class="valign-top" data-dcnode-id="4249"><td data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">Karachi (Pakistan)</span></td><td data-dcnode-id="4260"><span data-dcnode-id="4261" instrument_node="">0</span></td><td data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">1</span></td><td data-dcnode-id="4256"><span data-dcnode-id="4257" instrument_node="">1</span></td><td data-dcnode-id="4254"><span data-dcnode-id="4255" instrument_node="">0</span></td><td data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">0</span></td><td data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">0</span></td></tr><tr class="valign-top" data-dcnode-id="4234"><td data-dcnode-id="4247"><span data-dcnode-id="4248" instrument_node="">Nairobi (Kenya)</span></td><td data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">0</span></td><td data-dcnode-id="4243"><span data-dcnode-id="4244" instrument_node="">0</span></td><td data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">1</span></td><td data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">1</span></td><td data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">1</span></td><td data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">0</span></td></tr><tr class="valign-top" data-dcnode-id="4219"><td data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">Subang (Malaysia)</span></td><td data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">1</span></td><td data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">1</span></td><td data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">1</span></td><td data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">1</span></td><td data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">1</span></td><td data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">1</span></td></tr><tr class="valign-top" data-dcnode-id="4204"><td data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">Total open</span></td><td data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">8</span></td><td data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">7</span></td><td data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">7</span></td><td data-dcnode-id="4209"><span data-dcnode-id="4210" instrument_node="">7</span></td><td data-dcnode-id="4207"><span data-dcnode-id="4208" instrument_node="">8</span></td><td data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">6</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="4197" id="p0225"><span data-dcnode-id="4198" instrument_node="">The results show that all factors influence network configuration. For example, Karachi is opened, while Douala and Dubai are closed in case either hardship or security is not accounted for. Furthermore, not accounting for the co-location factor leads to opening of Nairobi and closure of both Isaka and Dubai. Notably, Accra and Subang are kept open in spite of a 100% increase in fixed warehousing cost (because of the absence of co-location benefits), implying that they represent key locations in the network to lower costs and lead times. The exclusion of accessibility seems to have less of an effect on location selection. Finally, the exclusion of all factors implies that both Dubai and Douala are closed in contrast to the case when all factors are accounted for. It should be noted that the effect on lead time varies depending on which factor is excluded from the model. Particularly, the results show that lead time is reduced by 7.7% when the extra cost of hardship is not considered. By excluding hardship, the total cost decreases and the extra budget available can be used to open Karachi, Pakistan, which is closer to several demand points, thus helping reduce lead time. In contrast, excluding co-location increases the total cost as well as the lead time (4.7%).</span></p><p data-dcnode-id="4195" id="p0230"><span data-dcnode-id="4196" instrument_node="">To check whether the choice of β changes the impacts of the factors on network configuration, that is, to test whether our computational results related to factor analysis are robust under different budget levels, we ran the same computations with different β values. We found that all factors impact warehouse decisions at all budget levels, with the exception of settings with very low β values. This is because if the budget is very low, only a very few feasible solutions exist to begin with; for example, with β&nbsp;=&nbsp;0.001, no network that can satisfy all demand if co-location is excluded. Further, the way these factors impact network configuration might change with higher β values because higher budgets increase financial flexibility and make the decision to open/close a location less dependent on the inclusion/exclusion of extra costs, for example, those related to hardship.</span></p></section></section><section data-dcnode-id="4180" id="sec6"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4189" id="sectitle0135"><span data-dcnode-id="4192" instrument_node="">6</span><span data-dcnode-id="4191" instrument_node="">. </span><span data-dcnode-id="4190" instrument_node="">Conclusions, implications, and future research</span></h2><p data-dcnode-id="4187" id="p0235"><span data-dcnode-id="4188" instrument_node="">We introduced an optimization model for quantifying the impact of an expanded network and determining the best locations for joint prepositioning of relief items to serve both short- and long-term operations. The model was developed based on empirical evidence, and it offered data-driven insights on factors that significantly impact location choice in the humanitarian context. The results suggest that joint prepositioning allows the organization to open a greater number of global warehouses, while reducing costs and response times. Moreover, we found that factors related to security, accessibility, co-location, and human resources, when quantified and modeled, change the network configuration.</span></p><p data-dcnode-id="4185" id="p0240"><span data-dcnode-id="4186" instrument_node="">This study contributed to research on the topic at hand in two ways. First, we developed a framework and a data-driven model that integrate the long-term and the emergency relief supply chains, accounting for both response time and cost. Second, our study helps fill the gap in humanitarian network design literature by including factors that influence warehouse locations for prepositioned stock in the decision models. While our analysis is based on data from a single case study, the framework and model, as well as the process through which the factors are quantified, can be generalized and used by other HOs aiming to reduce costs, while maintaining speedy response in both short- and long-term operations. Many of these organizations such as WFP and UNICEF have similar organizational structures and HR policies, and they operate in the same countries under comparable political and security conditions as UNHCR.</span></p><p data-dcnode-id="4183" id="p0245"><span data-dcnode-id="4184" instrument_node="">The main practical contribution of this study is to provide UNHCR and other organizations with decision support in network redesign, accounting for two matters of (increasing) practical importance: improving performance through joint prepositioning and quantification of factors that should be accounted for when deciding warehouse locations. Joint prepositioning of stock can, in addition to reducing cost and lead time, enable reduction of country warehouses and inventory of consigned stock. A greater amount of un-consigned stock improves flexibility because it can be redirected toward ongoing operations in the region and/or emergencies, rather than awaiting an emergency that might not occur. Another practical implication is that stock in strategic locations can significantly cut lead times in ongoing operations. This is because budget often is made available at a late stage, with little time left to fulfill demand. Meanwhile, lead times from suppliers can be several weeks, whereas a nearby global warehouse would cut this down to a few days. The perceived response times for operations could thus be reduced by pre-ordering based on historical demand. Thereby, country operations may benefit from “guaranteed” availability within a short time frame, which reduces the perceived need for large local stocks and reduces the negative effects of delays in funding. Combining the two flows may also allow for economy of scale and better utilization of production capacity at suppliers' sites through improved planning and advance placement of non-rush orders. Finally, by allowing more time for planning and locating global warehouses closer to emergency demand points, we can increase the use of cheaper transport and reduce the use of expensive air transport.</span></p><p data-dcnode-id="4181" id="p0250"><span data-dcnode-id="4182" instrument_node="">Our model can be enhanced in several ways. One important aspect is further validation of input data such as costs of human resources, normal versus express shipment, and setting up and operating global warehouses, as well as further testing and validation of the quantification of factors. Moreover, it would be valuable to extend the model to include country warehouses, thus allowing for an analysis of the benefits of reducing consigned stock at this level and instead increasing the amount of un-consigned stock in global warehouses. Further, the model could be tested by using data from other HOs such as WFP, UNICEF, and IFRC. It could also be extended for supporting operational decision making in addition to strategic planning, which it currently supports. Finally, it is critical to consider scenario planning and development for predicting future ER demand. Scenarios could be developed for example by combining statistics provided by the Internal Displacement Monitoring Center (IDMC) with contingency plans for specific countries and vulnerability indexes.</span></p></section></div><div class="Appendices" data-dcnode-id="3500"><section data-dcnode-id="3909" id="appsec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4175" id="sectitle0140"><span data-dcnode-id="4178" instrument_node="">Appendix A</span><span data-dcnode-id="4177" instrument_node="">. </span><span data-dcnode-id="4176" instrument_node="">Overview of influencing factors identified in humanitarian network design literature.</span></h2><p data-dcnode-id="3910" id="p0255"><span class="display" data-dcnode-id="3911"></span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="3912" id="undtbl1"><div class="groups" data-dcnode-id="3913"><table data-dcnode-id="3914"><thead data-dcnode-id="4165"><tr class="rowsep-1 valign-top" data-dcnode-id="4166"><th data-dcnode-id="4173" scope="col"><span data-dcnode-id="4174" instrument_node="">Group</span></th><th data-dcnode-id="4171" scope="col"><span data-dcnode-id="4172
