</span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">At its core, the politics of the Islamization of Muslims—or rather the Sunnization of Sunnis—is as incoherent and unfounded as the Ba’athist politics of the Arabization of Arabs. Moreover, if the politics of the Arabization of Arabs led to the political and moral disintegration of Arab nationalism, the politics of the Islamization of Muslims undermines the general Islamic association, which in theory includes Shia, Alawites, Ismailis, and Druze. It also undermines the already fragile Sunni association—potentially breaking it into the “sects” of the Muslim Brotherhood, Salafis, and Salafi jihadists. And indeed, in the years of war in Syria, groups inspired by these different ideologies have frequently been at each other’s throats—even as the Syrian regime and much of the international community have regarded them all as undifferentiated terrorists. Even aside from one’s opinions on Islamization’s implications in terms of lifestyle and culture, it is a political dead-end, leading to splintering into ever-smaller groups that are just as mistrustful of each other as they are of non-Islamists—just the way minority and majority politics have done their best to achieve.</span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">International observers are mistaken in thinking that “cultural Sunnis” have a particular tendency to become Islamists. They are also mistaken in thinking that there is a common cause between Islamists in particular and Sunnis in general, though the wish to wash away diversity is an undeclared aim of majority politics (and minority politics, for that matter), and particularly its Islamist strain. There is a great deal of diversity within Sunni communities in Syria. The Islamist covenant underpinning the unity of all Sunnis is simply one single interpretation of Islam. Further, it is an eminently contemporary interpretation, which is formed by the intellectual tools of our time—its coercions and its political, social, psychological, and epistemic constraints. The contemporary Islamist covenant is no more legitimate than any other interpretations of the Islamic corpus formed a thousand years ago.</span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Islamists are a product of the contemporary historical crisis: a foundering of nation building, including the building of a modern sovereign state capable of war and politics. They aren’t exclusively a product of Syria’s inherited culture or that of Arabs, despite their ideology stating otherwise. Islamists are one facet of a crisis whose other manifestations include sectarianism and minority politics in general. As such, the problem of Islamists needn’t be tackled as separate from other problems of sectarianism and minorities, or as if solving the problems of sectarianism and minorities is conditional upon or a prerequisite for the solution of the Islamist problem. These are all different manifestations—rather than causes—of a forcible deactivation of social, political, and cultural dynamics. Islamists put forward the past as an answer to the questions of societies whose historical horizons are blocked by “politics of nature,” according to ancient Muslim scholars—that is to say, politics of sheer power and violence. In other words, these are societies that are stripped of their future but left with an open road to the past. The Islamic solution can alleviate a temporary Sunni resentment, but cannot form a new majority that serves as the basis for a nation of citizens. An end to the politics of eternity is a vital need in Syria and the Middle East.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Whatever is dangerous to minorities is also dangerous to majorities. Looked at this way, majority politics such as Islamism are actually just another iteration of minority politics. The only true majority politics is democracy.</span></p><span data-dcnode-id="1132" instrument_node="">
</span><h2 data-dcnode-id="1130" id="c7"><span data-dcnode-id="1131" instrument_node="">Moving beyond Mandate Rule</span></h2><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">The dilemma facing Syria now is how it can move beyond the premise that a significant portion of the populace requires being guarded from big masses who would, given the chance, make their ways of life and very identities impossible. If anything, the way has become more difficult because of the renewal of the mandate of minority politics, with implicit international patronage. Under the distorting lens of the powerful narrative of minority politics that had already been well established before the Syrian revolution, international media and policymakers saw the rise of the Islamic State, in one sense, as another example of the danger of majority rule in the region. Never mind that Islamic State fighters were mostly foreign, that its most numerous victims were Syrian Sunnis, or that there is ample circumstantial evidence that the Assad regime was happy at their rise. With the militant group’s social media-ready performance of ultraviolence still imprinted in their retinas and minds, most international observers—even those who may not have ulterior motives—are accepting that the Assadist mandate is preferable to the alternative. These observers carry with them (or within them) their own identity-based politics, especially when it comes to Islam, which has been essentialized and made Other for ages. Minority politics has articulated this fear more specifically: the danger that the Islamic State embodies the very nature and essence of the cultural majority.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><blockquote data-dcnode-id="1123"><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">With the militant group’s social media-ready performance of ultraviolence still imprinted in their retinas and minds, most international observers—even those who may not have ulterior motives—are accepting that the Assadist mandate is preferable to the alternative.</span></p></blockquote><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Syria’s task is to achieve freedom while also moving past the mandate model. There are many paths to this goal, though certainly some have been closed or blocked with serious obstacles because of years of war. Solutions start with looking to the grassroots rather than to authoritarianism—to poverty and displacement rather than identity and religion, looking below rather than above, to the people and not to the elites. The most effective approach to the protection of any minority is through the common struggle of people from different origins for equality. The worst approach—and the approach favored by too many in the West and in Russia—is the isolation of minorities from other groups through minority politics.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">At this point, I would like to ask Western readers to reflect on this hypothetical question: suppose an authoritarian rule developed in the United States, Britain, Germany, or France, with a worrying tendency toward tyranny. Suppose one of these regimes imposed active restrictions against migrants of color, who are members of minority groups. What percentage of the population would actively fight for democracy in these countries? One wonders whether, among the ranks of such activists, one would find those Middle East experts, special envoys, and “realistically thinking academicians and journalists” who were suspicious or dismissive of the Syrian struggle for change and democracy. I am afraid that global minority politics has corrupted the privileged West as well. Maybe the day is not far off when it will be said that democracy in the world was defeated in Syria.</span></p><span data-dcnode-id="1116" instrument_node="">
</span><h2 data-dcnode-id="1114" id="c8"><span data-dcnode-id="1115" instrument_node="">Typology</span></h2><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">It is helpful to create a typology of models for statehood and see where they come from, and what they may lead to. Based on the contemporary historical realities, whether in Syria, in the region, or in the world, we can distinguish between four possible types of relationships between the political majority (in power) and the cultural majority (in society).</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1109" instrument_node="">In the first model, the cultural majority is the political majority, in the sense that the reigning elite descends from the cultural majority. This, of course, provides no comfort to minorities, since it usually leads to second-class citizenship, even when the ruling elites use minorities in certain positions to appear more national. Iran, Israel, and Saudi Arabia are examples in the Middle East of this approach being put into practice. Europe can also be seen, in a certain light, to be using this model. Democracy that had developed before the era of globalization in a way that respected minority rights, and not only majority rule, is in a crisis. Migrants are not yet well included in this model. Moroccan historian and novelist Abdallah Laroui has pointed to the fact that the dhimmi system today is actually applied in the European, liberal democratic, Judeo-Christian West, and that the dhimmis of Europe are the Muslims.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1108" id="easy-footnote-20"></span><span class="easy-footnote" data-dcnode-id="1104"><a data-dcnode-id="1105" data-hasqtip="19" href="#easy-footnote-bottom-20" oldtitle="Abdallah Laroui, <em>Tradition and Reform,</em> Arabic (Beirut: Arab Cultural Center, 2008). " title=""><sup data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">20</span></sup></a></span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">In the second model, the political majority is from a cultural minority or minorities. This is the model of South Africa before the 1990s, and the one the Assad regime imposed in Syria. As we have seen, not only does this model not solve minorities’ problems, but it also creates new ones when there is an inevitable backlash from the disenfranchised majority. Further, over time this model can lead to a state that is more familial and sectarian than national—again, as is the case in Syria. And after almost eight years of savagery and genocide, with sects being turned into ethnicities, we might be heading toward an apartheid system where the internal privileged West rules the internal racialized “black” majority.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">In the third model, the political majority is formed in partnership between the majority and the minorities, according to their demographic proportions or to an agreed-upon rule. This model is illustrated by the Lebanese consociational system—the root of the country’s paralysis and its civil wars (both hot and cold)—which apportions power based on changing demographic or political weights of the myraid Lebanese communities, as well as regional and international power balances. But Lebanon itself is leaving this model, with Hezbollah being the real sovereign power in the small country.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">In the fourth model, political majorities and minorities are distinct from cultural majorities and minorities. In this last model, the political majorities and minorities vary according to a specific political order, and the culture changes only slowly. This form neutralizes the political impact of cultural differentiations. The only “quantitative” criterion is the ballot box. Political majorities change here, along with political minorities, making no room for a sense of injustice or exclusion by cultural group. This democratic model is both morally and politically superior to the others. The correct beginning for this is to put an end to the politics of eternity, which requires a never-ending war against any future change in Syria.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><blockquote data-dcnode-id="1079"><span data-dcnode-id="1092" instrument_node="">
</span><blockquote data-dcnode-id="1081"><span data-dcnode-id="1091" instrument_node="">
</span><div data-dcnode-id="1083"><span data-dcnode-id="1090" instrument_node="">
</span><div data-dcnode-id="1085" dir="ltr"><span data-dcnode-id="1089" instrument_node="">
</span><div data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">&nbsp;Syria’s challenge during the revolution was to transition from a “minoritarian” regime to a democratic system, without succumbing to the temptations of a majoritarian or confessional model. But we lost the battle.</span></div><span data-dcnode-id="1086" instrument_node="">
</span></div><span data-dcnode-id="1084" instrument_node="">
</span></div><span data-dcnode-id="1082" instrument_node="">
</span></blockquote><span data-dcnode-id="1080" instrument_node="">
</span></blockquote><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Syria’s challenge during the revolution was to transition from a “minoritarian” regime (the second model) to a democratic system (the fourth model), without succumbing to the temptations of a majoritarian or confessional model. But we lost the battle.</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">A broad-strokes review of the main actors’ positions and strategies shows just how difficult it has been for Syria to navigate this winding road. But it also shows that, as always, there have been possibilities for change, and that there are still aspects of the country’s experience in the last eight years that make a desirable outcome possible.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><h2 data-dcnode-id="1070" id="c9"><span data-dcnode-id="1071" instrument_node="">Intellectual Alternatives</span></h2><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">In properly addressing minority politics, Syrian public actors don’t have public expressions of thought to which they can make reference. There is no ready model for discourse that is informed by historical facts and precedents and inspired by the principles of national politics and the values of justice. Our experience in the last eight years, indeed in the last half-century, dictates that we radically criticize the seduction of majority politics for us to be in a better position to resist it.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Conventional national discourse is invalid because it disregards facts and holds them back in the name of the “national unity” doctrine. The regime has used this discourse to cover its sectarian formation and incriminate those who try to put the issue on the agenda of public debate. The standard definition of national unity in the Assads’ Syria has always been standing in one line behind the wise historic leader, the esteemed president Hafez (or Bashar) al-Assad.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">The Islamic discourse, in turn, is positively fixated on Islam and Muslims (Sunnis in the case of Syria). Syrians cannot be unified on an Islamic basis, nor can even Sunnis. Islamic Syria is by no means the alternative to Assadist Syria. It is one thing to resist discrimination against Muslims and Islamists who want to be equal to others in a free and democratic system and another to Islamize the state or society, or to strive to be “more equal” than others in a country with many confessional groups.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Conversely, the mainstream secular discourse is negatively and exclusively fixated on Sunni Islam and Islamists, and starts from the same premises of the protection-of-minorities doctrine, which makes it fluctuate between ignoring this detrimental doctrine and colluding with it. Syrian secularism has always been detached from values of equality and freedom, and its main proponents, like Aziz al-Azma, the late George Tarabishi, and Adonis, failed to say a word against massacres against their people and the long jail sentences imposed on political dissidents, even for like-minded leftists and democrats. They raise the banner of the tyranny of the majority that was introduced as a critique of democracy by the likes of Alexis de Tocqueville and John Stuart Mill. At the same time, they keep silent in the face of the real tyranny that has caused two big wars in Syria, in the early 1980s and in the current decade. State worshipping can be an open road to fascism, especially when we have a privatized and denationalized state like the one owned and ruled by the Assad dynasty.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">And wherever a communist discourse exists, it tends to consider the minority–majority cleavage as a distorted manifestation of class struggle, or as a direct result of imperialist manipulation, which ultimately leads to disregarding the problem or backing up the conventional national discourse. The traditional communists in Syria are now dull, middle-class people, lacking any will to fight for change or even defend their autonomy. They have been an integral part of Syria’s political death, as members of the National Progressive Front, formed in 1972, and led by the Ba’ath party. Issues of democracy, political autonomy of popular organizations, and political pluralism have never gained any importance in their thought.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">To move beyond the Assadist mandate, Syrian activists need to rethink minority and majority problems and handle them with care. For one, I suggest that today’s minorities’ problems are one facet of a larger multifaceted national problem: our lack of any majority in Syria. This in turn is one aspect of a dynamic transformation of our society into one of minorities, which makes for the ideal conditions for an oligarchic-minoritarian rule that prioritizes its staying in power and dividing the ruled—forever. The vital condition for a dynamic, changing majority to come into existence in Syria is that bigger numbers of Syrians enter the political field. The more, the better.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><blockquote data-dcnode-id="1048"><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">The revolution was about owning politics: gathering in public spaces, speaking openly about public issues, and protesting against the powerful.</span></p></blockquote><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">The revolution was about owning politics: gathering in public spaces, speaking openly about public issues, and protesting against the powerful. The active popular appropriation of politics that enables the masses to struggle for better conditions of life is the basis for solving the problems of sectarian conflicts. Sectarianism and minority politics are strategies of political control and elitist privileges. We play the game of the regime and its patrons when we counter minority politics with majority politics, as opposed to countering with popular politics or with nationalizing the privatized state. The existing political arrangements not only prevent Syria from overcoming this situation, but are also a crucial factor in its preservation.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><h2 data-dcnode-id="1042" id="c10"><span data-dcnode-id="1043" instrument_node="">A Monstrous Problem</span></h2><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">There is a basic practical principle that can be a valid starting point for change. This principle is that prospects to solve public problems increase when people’s engagement in the public sphere increases. The larger the number of public actors—regardless of their backgrounds—the greater our chances of overcoming static majorities and minorities. Large numbers encourage blending and diversity, as well as further expansion of the public sphere. The greater the number of publicly active citizens, the more likely they may belong to nonelitist milieus, and the higher the chances of “disarray,” “blending,” and de-sectarianization. On the other hand, the fewer the number of those publicly active, the more likely old differentiations may be activated and gain political and public value. Even if the existing regime hadn’t activated these differentiations to divide, and thus weaken, the population it controls, opportunities for social and political upward mobility under such a regime are inevitably dependent on the activation of these differentiations and capitalizing on them. Further, the fewer the public actors, the more likely they may be “identifiable”—in other words, the more likely they will be distinct or very identity-salient, and the more the system will develop an instinctive resistance to blending and hybridization. A sectarian instinct will prevail.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Opening up the political system to large numbers—to “the people”—is the first step in overcoming the problems of minorities. Such an opening of the system doesn’t, by itself, ensure broader historical horizons that will automatically prevail over minority politics. But without an opened system, horizons cannot be unblocked.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Unfortunately, such a system simply cannot be achieved in the current circumstances in Syria. A circle cannot be squared. We lost the battle for change in Syria; and the battle for democracy on the global level appears lost for good. I think we can now talk about a Syrian Question, because of its complex of sectarianism and religious rivalries and hatreds on the one hand, and, on the other hand, problems related to who the masters are—who has power and the right to kill people. Yet another issue is that of external interventions and imperialism. The Syrian Question is a monster. These three elements nurture each other in a vicious closed circle.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Muslims aren’t the Christians’ problem, nor are Christians the Muslims’ source of troubles; Sunnis aren’t the greatest threat to Alawites, nor is it the other way around—as many sectarians would like to believe, religious and “secular” alike. Nor are Arabs endangered by the Kurds, or the cause of the Kurds’ frustration, as frantic nationalists like to argue. Such prescriptions solve nobody’s problems, and instead contribute to the problems and troubles of everyone. Minority politics will only produce more majority politics and sectarianism. They lead, at best, to “solutions” like a confessional system, and in all cases to a lingering catastrophe.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Syrians need to search for a rule by the many—but not a rule by the many in the service of an identity-based majority, but rather in the service of justice and equal rights. Until such a vision is pursued, without the intervention of foreign powers or the self-appointed guardianship of local elites, Syria faces new cycles of its ongoing catastrophe.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1020"><em data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">This policy report is part of&nbsp;</span></em><span data-dcnode-id="1023" instrument_node="">Citizenship and Its Discontents: The Struggle for Rights, Pluralism, and Inclusion in the Middle East,</span><em data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node=""> a TCF project supported by the Henry Luce Foundation.</span></em></p><span data-dcnode-id="1019" instrument_node="">
</span><h6 data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Cover Photo: Druze men take part in a rally in the village of Majdel Shams, near the border between Israel and Syria in Golan Heights. Source: Uriel Sinai/Getty Images</span></h6><span data-dcnode-id="1016" instrument_node="">
</span><div class="easy-footnote-title" data-dcnode-id="1013"><h4 data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Notes</span></h4></div><ol class="easy-footnotes-wrapper truncate__list" data-dcnode-id="880" style="max-height: 625px;"><li class="easy-footnote-single" data-dcnode-id="1006"><span class="easy-footnote-margin-adjust" data-dcnode-id="1012" id="easy-footnote-bottom-1"></span><span data-dcnode-id="1011" instrument_node="">For this dual structure and examples of dual discourse and the underlying structure of power, see the last chapter of my book, </span><em data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">The Impossible Revolution </span></em><span data-dcnode-id="1008" instrument_node="">(New York: Oxford University Press, 2017), 213–89.</span><a class="easy-footnote-to-top" data-dcnode-id="1007" href="#easy-footnote-1"></a></li><li class="easy-footnote-single" data-dcnode-id="1000"><span class="easy-footnote-margin-adjust" data-dcnode-id="1005" id="easy-footnote-bottom-2"></span><span data-dcnode-id="1004" instrument_node="">See an Al Jazeera clip posted to YouTube on March 25, 2012, </span><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D3LTxmdifjCA." target="_blank" title="Opens in a new window"><span data-dcnode-id="1003" instrument_node="">https://www.youtube.com/watch?v=3LTxmdifjCA.</span></a><a class="easy-footnote-to-top" data-dcnode-id="1001" href="#easy-footnote-2"></a></li><li class="easy-footnote-single" data-dcnode-id="996"><span class="easy-footnote-margin-adjust" data-dcnode-id="999" id="easy-footnote-bottom-3"></span><span data-dcnode-id="998" instrument_node="">The insistence on calling Da’esh “the Islamic State” in the West—and the systematic ignoring of the name that Syrians came to call this monstrous nihilist group in the course of their resistance to it, in the service of supposed professional consideration—denies Internally Displaced People,” UNHCR Syria, accessed February 25, 2019, </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/sy/internally-displaced-people" target="_blank" title="Opens in a new window"><span data-dcnode-id="983" instrument_node="">https://www.unhcr.org/sy/internally-displaced-people</span></a><a class="easy-footnote-to-top" data-dcnode-id="981" href="#easy-footnote-5"></a></li><li class="easy-footnote-single" data-dcnode-id="968"><span class="easy-footnote-margin-adjust" data-dcnode-id="979" id="easy-footnote-bottom-6"></span><span data-dcnode-id="978" instrument_node=""> See Gardiner Harris, Anne Barnard, and Rick Gladstone, “Syrian Crematory Is Hiding Mass Killing of Prisoners, U.S. Says,” </span><em data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">New York Times,</span></em><span data-dcnode-id="975" instrument_node=""> March 15, 2017, </span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2017/05/15/world/middleeast/syria-assad-prison-crematory.html" target="_blank" title="Opens in a new window"><span data-dcnode-id="974" instrument_node="">https://www.nytimes.com/2017/05/15/world/middleeast/syria-assad-prison-crematory.html</span></a><span data-dcnode-id="972" instrument_node="">. There is also a famous Amnesty International report on this topic, “Syria: Human Slaughterhouse: Mass Hangings and Extermination at Sadnaya Prison, Syria,” February 7, 2017, </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnesty.org/en/documents/mde24/5415/2017/en/" target="_blank" title="Opens in a new window"><span data-dcnode-id="971" instrument_node="">https://www.amnesty.org/en/documents/mde24/5415/2017/en/.</span></a><a class="easy-footnote-to-top" data-dcnode-id="969" href="#easy-footnote-6"></a></li><li class="easy-footnote-single" data-dcnode-id="958"><span class="easy-footnote-margin-adjust" data-dcnode-id="967" id="easy-footnote-bottom-7"></span><span data-dcnode-id="966" instrument_node="">I discussed this topic at length in my essay “The Community of ‘What Remains’: Syrian Sunnis and Politics” (Arabic), </span><em data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Al-Jumhuriya,</span></em><span data-dcnode-id="963" instrument_node=""> October 18, 2012, </span><a data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljumhuriya.net/ar/237." target="_blank" title="Opens in a new window"><span data-dcnode-id="962" instrument_node="">https://www.aljumhuriya.net/ar/237.</span></a><span data-dcnode-id="960" instrument_node=""> </span><a class="easy-footnote-to-top" data-dcnode-id="959" href="#easy-footnote-7"></a></li><li class="easy-footnote-single" data-dcnode-id="951"><span class="easy-footnote-margin-adjust" data-dcnode-id="957" id="easy-footnote-bottom-8"></span><span data-dcnode-id="956" instrument_node="">Kamal Jumblatt, the progressive Lebanese Druze leader, talked about this in the 1970s on a regional scale that transcends Syria, after the Syrian regime intervened in Lebanon. Most probably, this was the cause of his assassination by regime agents in 1977, months after the Assadist mandate over Lebanon had begun. At the time of his assassination, Jumblatt was the leader of the Lebanese Nationalist Movement allied with the Palestinian resistance, against whom the regime intervened militarily in 1976 with American approval. See Patrick Seale, </span><em data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Asad: The Struggle for the Middle East</span></em><span data-dcnode-id="953" instrument_node=""> (Berkeley, CA: University of California Press, 1990). </span><a class="easy-footnote-to-top" data-dcnode-id="952" href="#easy-footnote-8"></a></li><li class="easy-footnote-single" data-dcnode-id="947"><span class="easy-footnote-margin-adjust" data-dcnode-id="950" id="easy-footnote-bottom-9"></span><span data-dcnode-id="949" instrument_node="">I borrow the expression “politics of eternity” form the American academic Timothy Snyder, and I give it the meaning of staying in power “forever,” as the regime describes its position, which involves permanent war against the future and change, dividing the ruled and pitting them against each other, and the potential of genocide. In Arabic there is an etymological relationship between “abad” (eternity) and “ibada” (annihilation), so one can say that you cannot stay in power forever without committing genocide against your people.</span><a class="easy-footnote-to-top" data-dcnode-id="948" href="#easy-footnote-9"></a></li><li class="easy-footnote-single" data-dcnode-id="943"><span class="easy-footnote-margin-adjust" data-dcnode-id="946" id="easy-footnote-bottom-10"></span><span data-dcnode-id="945" instrument_node=""> The “Eastern Question” referred to the uncertainty about the future control of the Middle East and North Africa during the twilight of the Ottoman Empire</span><a class="easy-footnote-to-top" data-dcnode-id="944" href="#easy-footnote-10"></a></li><li class="easy-footnote-single" data-dcnode-id="936"><span class="easy-footnote-margin-adjust" data-dcnode-id="942" id="easy-footnote-bottom-11"></span><span data-dcnode-id="941" instrument_node=""> I discussed this issue at length in my last book in Arabic, </span><em data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">The Conquered Imperialists,</span></em><span data-dcnode-id="938" instrument_node=""> Arabic (Beirut: Riad El Rayyes Books, 2019), 79–134.</span><a class="easy-footnote-to-top" data-dcnode-id="937" href="#easy-footnote-11"></a></li><li class="easy-footnote-single" data-dcnode-id="929"><span class="easy-footnote-margin-adjust" data-dcnode-id="935" id="easy-footnote-bottom-12"></span><span data-dcnode-id="934" instrument_node="">See Lanxin Xiang, </span><em data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">The Origins of the Boxer War: A Multinational Study</span></em><span data-dcnode-id="931" instrument_node=""> (London and New York: Routledge, 2003). </span><a class="easy-footnote-to-top" data-dcnode-id="930" href="#easy-footnote-12"></a></li><li class="easy-footnote-single" data-dcnode-id="925"><span class="easy-footnote-margin-adjust" data-dcnode-id="928" id="easy-footnote-bottom-13"></span><span data-dcnode-id="927" instrument_node="">Here, I use “Arabism” to refer to the quality of being Arab. It may stand in opposition to sectarianism, as well as regionalism (“Syrianism” or “Jordanianism”). Arab nationalism can be interpreted as political Arabism, whose main aims were unifying Arab countries, liberating Palestine, and modernizing our societies and unifying them. When Arab nationalism is detached from these aims, we get “Arab” as an ethnicity, which applies more to the Arabs of the Gulf.</span><a class="easy-footnote-to-top" data-dcnode-id="926" href="#easy-footnote-13"></a></li><li class="easy-footnote-single" data-dcnode-id="918"><span class="easy-footnote-margin-adjust" data-dcnode-id="924" id="easy-footnote-bottom-14"></span><span data-dcnode-id="923" instrument_node=""> Central in this are the bonds of patronage and clientelism. They are discussed in my book </span><em data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">The Impossible Revolution,</span></em><span data-dcnode-id="920" instrument_node=""> in the final chapter.</span><a class="easy-footnote-to-top" data-dcnode-id="919" href="#easy-footnote-14"></a></li><li class="easy-footnote-single" data-dcnode-id="914"><span class="easy-footnote-margin-adjust" data-dcnode-id="917" id="easy-footnote-bottom-15"></span><span data-dcnode-id="916" instrument_node="">Under the dhimmi system, Christians, Jews and some other religious communities were recognized by Muslim authorities as being under the “sovereignty” of Islam. It is a sort of autonomy within the lands were Islam was prevalent, with the religious leaders of these communities being the natural representatives of them in the sultanate. They paid taxes (“jizya”) and showed loyalty to the authorities, and enjoyed protection in return.</span><a class="easy-footnote-to-top" data-dcnode-id="915" href="#easy-footnote-15"></a></li><li class="easy-footnote-single" data-dcnode-id="905"><span class="easy-footnote-margin-adjust" data-dcnode-id="913" id="easy-footnote-bottom-16"></span><span data-dcnode-id="912" instrument_node="">See “Interview with Syrian President Bashar al-Assad,” </span><em data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Wall Street Journal,</span></em><span data-dcnode-id="909" instrument_node=""> January 31, 2011 (a month and a half before the eruption of the Syrian uprising), </span><a data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/SB10001424052748703833204576114712441122894." target="_blank" title="Opens in a new window"><span data-dcnode-id="908" instrument_node="">https://www.wsj.com/articles/SB10001424052748703833204576114712441122894.</span></a><a class="easy-footnote-to-top" data-dcnode-id="906" href="#easy-footnote-16"></a></li><li class="easy-footnote-single" data-dcnode-id="899"><span class="easy-footnote-margin-adjust" data-dcnode-id="904" id="easy-footnote-bottom-17"></span><span data-dcnode-id="903" instrument_node=""> Interview with Bashar al-Assad, RT Arabic, November 8, 2012, </span><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DUiS8XcWFbfU." target="_blank" title="Opens in a new window"><span data-dcnode-id="902" instrument_node="">https://www.youtube.com/watch?v=UiS8XcWFbfU.</span></a><a class="easy-footnote-to-top" data-dcnode-id="900" href="#easy-footnote-17"></a></li><li class="easy-footnote-single" data-dcnode-id="895"><span class="easy-footnote-margin-adjust" data-dcnode-id="898" id="easy-footnote-bottom-18"></span><span data-dcnode-id="897" instrument_node=""> The problem is not that the 70 percent figure is inaccurate per se, but that it whitewashes the diversity among Sunnis.</span><a class="easy-footnote-to-top" data-dcnode-id="896" href="#easy-footnote-18"></a></li><li class="easy-footnote-single" data-dcnode-id="888"><span class="easy-footnote-margin-adjust" data-dcnode-id="894" id="easy-footnote-bottom-19"></span><span data-dcnode-id="893" instrument_node="">See Haj Saleh, “What Remains;” and </span><em data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Conquered Imperialists,</span></em><span data-dcnode-id="890" instrument_node=""> 147–85. </span><a class="easy-footnote-to-top" data-dcnode-id="889" href="#easy-footnote-19"></a></li><li class="easy-footnote-single" data-dcnode-id="881"><span class="easy-footnote-margin-adjust" data-dcnode-id="887" id="easy-footnote-bottom-20"></span><span data-dcnode-id="886" instrument_node="">Abdallah Laroui, </span><em data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Tradition and Reform,</span></em><span data-dcnode-id="883" instrument_node=""> Arabic (Beirut: Arab Cultural Center, 2008). </span><a class="easy-footnote-to-top" data-dcnode-id="882" href="#easy-footnote-20"></a></li></ol><p class="truncate__more" data-dcnode-id="873"><a data-dcnode-id="874" href="#"><span data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Read more</span></span><span data-dcnode-id="877" instrument_node=""> </span><svg class="icon i-caret" data-dcnode-id="875" viewBox="0 0 5 3"><path d="M4.844 0L2.422 2.329 0 0z" data-dcnode-id="876" fill="currentColor"></path></svg></a></p><p class="post__tags" data-dcnode-id="857"><span data-dcnode-id="872" instrument_node="">Tags: </span><a data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tcf.org/content/tag/syria/" rel="tag"><span data-dcnode </span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Yassin al-Haj Saleh is a Syrian writer and former political prisoner. In 1980, as a nineteen-year-old medical student, he was arrested by the regime of Hafez al-Assad for his membership in the Syrian Communist Party-Political Bureau. He remained in prison for sixteen years. He has authored and edited five books about Syria.</span></p><span data-dcnode-id="822" instrument_node="">
