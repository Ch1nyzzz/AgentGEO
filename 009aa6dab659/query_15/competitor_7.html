href="#c9"><span data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">9</span></span><span data-dcnode-id="1571" instrument_node="">Intellectual Alternatives</span></a></li><li data-dcnode-id="1564"><a data-dcnode-id="1565" href="#c10"><span data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">10</span></span><span data-dcnode-id="1566" instrument_node="">A Monstrous Problem</span></a></li><span data-dcnode-id="1563" instrument_node=""> </span></ol><span data-dcnode-id="1561" instrument_node="">

</span><section class="m m-wysk" data-dcnode-id="1535" data-url="https://tcf.org/?p=29955"><span data-dcnode-id="1553" instrument_node="">
</span><h4 class="m-wysk__title" data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">What You Should Know</span></h4><span data-dcnode-id="1550" instrument_node="">
</span><ul data-dcnode-id="1537"><span data-dcnode-id="1549" instrument_node="">
</span><li data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node=""> Since the inception of the Syrian uprisings, the Syrian regime has had an implicit justification for its violence: the protection of minorities. </span></li><li data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">This report draws on historical analysis to refute the Syrian regime’s insistence that only it can protect minorities.</span></li><li data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">The minority-versus-majority narrative in Syria is one that the regime spent decades carefully crafting, based on a pattern inherited from colonial powers. But the regime’s only true priority is to protect itself, using minorities as a shield.</span></li><li data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">What Syria needs is not a politics of minority protection, but civil and economic rights for all on the basis of citizenship.</span></li><li data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">This policy report is part of “Citizenship and Its Discontents: The Struggle for Rights, Pluralism, and Inclusion in the Middle East,” a TCF project supported by the Henry Luce Foundation.</span></li><span data-dcnode-id="1538" instrument_node=""> </span></ul><span data-dcnode-id="1536" instrument_node="">
</span></section><span data-dcnode-id="1534" instrument_node="">
</span></aside><span data-dcnode-id="1532" instrument_node="">
</span><div class="post__content post-content" data-dcnode-id="855"><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1530" instrument_node="">Since the inception of the Syrian uprisings, the Syrian regime has had an implicit justification for its violence: the protection of minorities. The regime has never been open about this, yet it is there. The justification reveals the dual structure of the Syrian state under the Assads: there is an outer, public discourse of national unity and an inner, publicly unexpressed discourse of minority protection and a minorities’ alliance.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1529" id="easy-footnote-1"></span><span class="easy-footnote" data-dcnode-id="1525"><a data-dcnode-id="1526" data-hasqtip="0" href="#easy-footnote-bottom-1" oldtitle="For this dual structure and examples of dual discourse and the underlying structure of power, see the last chapter of my book, <em>The Impossible Revolution </em>(New York: Oxford University Press, 2017), 213–89." title=""><sup data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">1</span></sup></a></span><span data-dcnode-id="1524" instrument_node=""> After eight years of war in Syria that saw savage oppression, genocidal massacres, and the rise of brutal extremist groups, the regime’s claim that it must exist to protect minorities proved to be a self-fulfilling prophecy—at least for a while, especially between 2013 and 2016. This reality has emerged not because the “protection of minorities” was necessary to begin with, but because the Syrian regime’s strategies, response to the uprisings, and role in the civil war made it all but inevitable.</span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">This report argues that the temptation to give the Syrian regime credit for protecting minorities must be refuted and resisted. The truth is rather the opposite: the regime’s top priority is to protect itself, using minorities as a shield. The entire minority-versus-majority narrative in Syria is one that the regime carefully crafted long before the uprisings of 2011 began—indeed, since the 1970s. It fashioned this narrative on a pattern inherited from colonial powers, which had earlier cast themselves as protectors of minorities throughout the Levant. To understand the possibilities for a better future in Syria, activists and analysts need to unshackle themselves from the false narratives and fears of inevitable minority persecution. This is not an easy task, but the cycles of violence and repression in Syria will continue until its politics can confront a very basic truth: what Syria needs is not a politics of minority protection, but civil and economic rights for all on the basis of citizenship, neither enhanced nor restricted by the divisive identity markers bequeathed from the colonizers and reinvigorated by the Assad regime.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><blockquote data-dcnode-id="1516"><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">What Syria needs is not a politics of minority protection, but civil and economic rights for all on the basis of citizenship.</span></p></blockquote><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">This report provides a constructive critique of the minority-protection narrative. It focuses on the historical basis and permutations of this narrative, before moving on to an evaluation of the possibilities for escaping it, and some warnings about the dangers to come.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1511" instrument_node="">This report draws heavily from an essay I first published in Arabic in early 2013, when I was still living underground in Damascus. It was motivated by a March 2012 </span><a data-dcnode-id="1509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D3LTxmdifjCA" target="_blank" title="Opens in a new window"><span data-dcnode-id="1510" instrument_node="">statement</span></a><span data-dcnode-id="1508" instrument_node=""> by Sergey Lavrov, the Russian foreign minister, warning of “Sunni rule” in Syria.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1507" id="easy-footnote-2"></span><span class="easy-footnote" data-dcnode-id="1503"><a data-dcnode-id="1504" data-hasqtip="1" href="#easy-footnote-bottom-2" oldtitle="See an Al Jazeera clip posted to YouTube on March 25, 2012, <a href=&quot;https://www.youtube.com/watch?v=3LTxmdifjCA.&quot;>https://www.youtube.com/watch?v=3LTxmdifjCA.</a>" title=""><sup data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">2</span></sup></a></span><span data-dcnode-id="1502" instrument_node=""> I wrote the essay believing that my experience as an activist and intellectual contemporary to the Assad family rule during half a century gave me an important perspective on the historical and political origins of what I called “minority politics” and its implications. Needless to say, the regime never commented on Lavrov’s flagrant comments. Nor, of course, did it comment on Iran’s pretext for intervention in Syria—protecting Shia holy shrines—which recalled the Crusaders’ justifications for their destructive campaigns almost a thousand years before. What might seem more surprising was how little Lavrov’s comments, and others like his, were questioned from other quarters. Not a comment was heard from any Western government, international analyst, or anti-imperialist leftist. Indeed, in the years since, there has been continued silence on comments like Lavrov’s and the logic underlying them, even from groups and individuals who should have been in a position to give a critique.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">This report is thus an attempt to fill a years-old gap in the discourse on minority protection in Syria. Much has changed since 2013 when the essay that inspired this report was written—not least, the Syrian revolution has been defeated on the battlefield, without qualification or any hope for military miracles. But the fight over the rhetoric and analysis surrounding Syria’s uprisings, society, economics, and politics is far from settled. There is still time to understand the truth behind the violence. There always will be. But now especially, the time is ripe for developing a fact-based and truthful explanation of the regime’s resilience—one that reveals the way it has sold out the security and happiness of the Syrian people in order to ensure its survival.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><h2 data-dcnode-id="1495" id="c1"><span data-dcnode-id="1496" instrument_node="">The Minority Protection Racket</span></h2><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Since the inception of the Syrian uprisings, the regime and its Russian backers have clung to a justification for their violence: the protection of minorities. Even as the rest of the world has disavowed any sympathy or support for Bashar al-Assad, it has come to endorse his claim of minority protection. And at least for some outside observers, the war in Syria seems to have borne out Assad’s claims that he and his ruling clique were standing between majoritarian extremists and the annihilation of Syria’s “mosaic” of ethnicities and sects. According to the inner, publicly inexpressible rhetoric of the regime mentioned above, this diversity stands arrayed against the overwhelming menace of the Arab Sunni masses, descending mostly from rural areas, and their extremist foreign backers.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><blockquote data-dcnode-id="1488"><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Even as the rest of the world has disavowed any sympathy or support for Bashar al-Assad, it has come to endorse his claim of minority protection.</span></p></blockquote><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1486" instrument_node="">Various insurgent groups seemed to provide proof for the regime’s position. The Islamic State provided the most famous example, but other militias also ruled over conquered populations, with brutality visited on non-Sunnis and Sunnis alike. Western media has bought into this story, almost completely. Even its insistence on the use of the name “Islamic State” or the “Islamic State in Iraq and Syria” lends an implicit legitimacy to the narrative: the name can be misread as the Islamic state, a misinterpretation that the group is surely happy to have perpetuated. Syrians refer to the group as “Da’esh,” a word with ugly resonance in Arabic, which is hated and punishable by Da’esh thugs. “Da’esh” is thus a name that carries less baggage. While it is simply the Arabic acronym for “the Islamic State in Iraq and the Levant,” it does not have the sheen of “the Islamic State”—a name that bolsters the idea that the group is somehow the expression of the Muslim majority’s political ambitions, which of course it is not.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1485" id="easy-footnote-3"></span><span class="easy-footnote" data-dcnode-id="1481"><a data-dcnode-id="1482" data-hasqtip="2" href="#easy-footnote-bottom-3" oldtitle="The insistence on calling Da’esh “the Islamic State” in the West—and the systematic ignoring of the name that Syrians came to call this monstrous nihilist group in the course of their resistance to it, in the service of supposed professional consideration—denies our political, ethical, and epistemological agency. Calling it “the Islamic State” implies a genealogical interpretation that signifies the group is derived from Islam. It is thus with reluctance that I use “Islamic State” in this report, for the sake of consistency with the series to which it belongs. But I ask the reader to keep in mind my objection to this translation." title=""><sup data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">3</span></sup></a></span></p><span data-dcnode-id="1479" instrument_node="">
</span><figure aria-describedby="caption-attachment-30158" class="wp-caption alignleft" data-dcnode-id="1474" id="attachment_30158" style="width: 1024px"><a data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//production-tcf.imgix.net/app/uploads/2019/03/26170953/druze-men.jpg"><img alt="" class="size-large wp-image-30158 imgix-fluid" data-dcnode-id="1478" height="512" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//production-tcf.imgix.net/app/uploads/2019/03/26170953/druze-men-1024x512.jpg&amp;raw" width="1024"></a><figcaption class="wp-caption-text" data-dcnode-id="1475" id="caption-attachment-30158"><span data-dcnode-id="1476" instrument_node="">Druze men take part in a rally in the village of Majdel Shams, near the border between Israel and Syria in Golan Heights. Source: Uriel Sinai/Getty Images</span></figcaption></figure><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1472" instrument_node="">Further supporting the regime’s position, observers cling to superficial coverage and tend to ignore the dynamics of militarization, sectarianization, and radicalization that the systematic violence of the regime triggered in Syria. This leaves people under the false impression that people in Syria kill each other because they are Sunnis and Shias, an erroneous and essentialist claim echoed time and again by American leaders, most recently by Barack Obama when he said sectarian fighting had been going on for “thousands of years.”</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1471" id="easy-footnote-4"></span><span class="easy-footnote" data-dcnode-id="1467"><a data-dcnode-id="1468" data-hasqtip="3" href="#easy-footnote-bottom-4" oldtitle="See Nader Hashemi and Danny Postel, “Introduction,” in <em>Sectarianization: Mapping the New Politics of the Middle East,</em> ed. Hashemi and Postel (New York: Oxford University Press, 2017), 1–22. " title=""><sup data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">4</span></sup></a></span></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1464" instrument_node="">For a while, it was more tempting than ever for some to give the Syrian regime credit for, at the bare minimum, being somewhat accurate in casting itself as the protector of minorities. Hundreds of thousands are dead. More than half of Syria’s prewar population of twenty-two million are now </span><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data2.unhcr.org/en/situations/syria" target="_blank" title="Opens in a new window"><span data-dcnode-id="1463" instrument_node="">refugees</span></a><span data-dcnode-id="1461" instrument_node=""> or </span><a data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/sy/internally-displaced-people" target="_blank" title="Opens in a new window"><span data-dcnode-id="1460" instrument_node="">internally displaced</span></a><span data-dcnode-id="1458" instrument_node="">.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1457" id="easy-footnote-5"></span><span class="easy-footnote" data-dcnode-id="1453"><a data-dcnode-id="1454" data-hasqtip="4" href="#easy-footnote-bottom-5" oldtitle=" As of February 2019, there were nearly 5.7 million Syrian refugees in neighboring and regional countries, according to the UNHCR (the Office of the United Nations High Commissioner for Refugees). See “Operational Portal: Refugee Situations: Syrian Regional Refugee Response,” UNHCR, accessed February 25, 2019, <a href=&quot;https://data2.unhcr.org/en/situations/syria.&quot;>https://data2.unhcr.org/en/situations/syria.</a> There were also some 6.2 million internally displaced people. See “Internally Displaced People,” UNHCR Syria, accessed February 25, 2019, <a href=&quot;https://www.unhcr.org/sy/internally-displaced-people&quot;>https://www.unhcr.org/sy/internally-displaced-people</a>" title=""><sup data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">5</span></sup></a></span><span data-dcnode-id="1452" instrument_node=""> There have been countless atrocities in a war that has exhausted everyone connected to it. But the temptation to give the Syrian regime credit must be resisted. This is a genocidal regime, a quality that is inherent in its sectarian formation and the identity-based politics it has adopted, which dehumanize some people and “overhumanize” others according to their inherited denominations. Some 90 percent of the war’s victims were killed at the hands of the Assad protectorate and its protectors. Government forces monopolized war planes and weapons of mass destruction, organized a killing industry in Sednaya military prison (effectively a torture camp), and may have </span><a data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnesty.org/en/documents/mde24/5415/2017/en/" target="_blank" title="Opens in a new window"><span data-dcnode-id="1451" instrument_node="">built a crematorium</span></a><span data-dcnode-id="1449" instrument_node=""> to dispense with the dead bodies.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1448" id="easy-footnote-6"></span><span class="easy-footnote" data-dcnode-id="1444"><a data-dcnode-id="1445" data-hasqtip="5" href="#easy-footnote-bottom-6" oldtitle=" See Gardiner Harris, Anne Barnard, and Rick Gladstone, “Syrian Crematory Is Hiding Mass Killing of Prisoners, U.S. Says,” <em>New York Times,</em> March 15, 2017, <a href=&quot;https://www.nytimes.com/2017/05/15/world/middleeast/syria-assad-prison-crematory.html&quot;>https://www.nytimes.com/2017/05/15/world/middleeast/syria-assad-prison-crematory.html</a>. There is also a famous Amnesty International report on this topic, “Syria: Human Slaughterhouse: Mass Hangings and Extermination at Sadnaya Prison, Syria,” February 7, 2017, <a href=&quot;https://www.amnesty.org/en/documents/mde24/5415/2017/en/.&quot;>https://www.amnesty.org/en/documents/mde24/5415/2017/en/.</a>" title=""><sup data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">6</span></sup></a></span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Notably, it is not only foreign powers that profess concern for the fate of minorities in Syria. Some Syrian intellectuals, too, adhere to this line of thinking, in one form or another. A common characteristic of such individuals is that they never prioritize the struggle for justice, democracy, and equality over their own elitist fears and privileges. One of the frequent grievances leveled against the Syrian revolution since its inception is that it failed to mobilize broad segments of “minorities,” or hasn’t sufficiently “reassured” them. There is a clear link between the revolution, which these elites perceive as a possible tectonic change in the sociocultural geology, and a growing concern about the situation of minorities in a post-Assad Syria. Every time the regime is not quite secure, its industry of fear produces more of this commodity.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">As this report shows, however, such a position can only be held from deep inside the regime’s rhetorical and political labyrinth. This is a sectarian regime that has been ruling Syria for almost half a century, and which did its best to make Syrians fear each other—so that the regime becomes the sole provider of security. Rampant Islamophobia in the world today should not leave people blind to this structure and history.</span></p><span data-dcnode-id="1436" instrument_node="">
</span><blockquote data-dcnode-id="1433"><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">The minority-versus-majority narrative is built on false premises, purporting to favor human rights but in fact providing a deep and enduring justification for authoritarian control.</span></p></blockquote><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Since the colonial era and even before it, the narrative of minority protection has successfully obscured the commonalities in the grievances between Syrians regardless of faith and ethnicity. The minority-versus-majority narrative is built on false premises, purporting to favor human rights but in fact providing a deep and enduring justification for authoritarian control. In claiming to protect the “minority” against the “majority,” it created and hardened divisions that are far from organic. The regime knows that this politics of&nbsp; minority protection is sellable in the West, whose most powerful states have mostly been promoters of tyranny and sectarianism in the Levant.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><h2 data-dcnode-id="1427" id="c2"><span data-dcnode-id="1428" instrument_node="">Threatened Minorities / A Threatening Majority</span></h2><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">The premise of “the protection of minorities” or “minority rights” in the context of Syria implies two assumptions, one relating to the relationship between “minorities” and “the majority,” and the other to the revolution.</span></p><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">This essential premise suggests that minorities are threatened by the majority, and that their protection is from this very majority—both minorities and the majority being defined by religion, ethnicity, and the past, and perceived as primordial entities. At the same time, the so-called majority is presented as a monolithic, gargantuan mass. Minorities are also presented as homogenous masses, albeit at a smaller scale.</span></p><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">The premise itself deems the Syrian revolution to be essentially majoritarian and anti-minority, without a clear explanation for why that is the case, and without showing sensitivity to time and historical changes in the course of the last eight years and for decades before. The roots of Western “neutrality” toward the Syrian revolution are based in this premise. Most Westerners are repelled by the Syrian regime, but they are equally or even more repelled by the Islamic core of our societies. Many sectors of Western society have never reconciled themselves with Islam as a religion, especially those who identify the West with the Judeo-Christian tradition (a relatively modern concept that only gained wide currency after World War II and the Holocaust). The emphasis placed on “the protection of minorities” is a vocal implication of this amoral neutrality, which is essentially apathy.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">In fact, there isn’t one single majority in Syria. Nor are there static minorities, whose political and social positions are identical and whose defining characteristic is their being minorities in the face of a similarly static majority. There are different majorities and minorities, which vary depending on the criteria we adopt to distinguish between them. If the criterion is ethnic, the majority is Arab and the minorities are Kurdish, Armenian, Assyrian, and Syriac. If the criterion is religious, then the majority is Muslim, and the minorities are Christian and Yazidi. If the criterion is sectarian or doctrinal, the majority is Sunni and the minorities are Alawite, Christian (and their many churches), Druze, Ismaili, and Shia.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">But these are all static categories that Syria has inherited from its past, not dynamic categories of the kind that are supposed to distinguish modern, national, or democratic political sociologies. The subtext of foreign commentary on Syria is that these groups are the country’s innate political majorities and minorities, and that this reality reflects deep-rooted sociological features. This misguided premise is, in some ways, self-fulfilling—contributing to the formation of static minorities and majorities.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">However, these static differentiations don’t have equal political value. The Sunni–Alawite contrast seemed far more menacing during the Syrian-versus-Syrian struggle in the first two years of the uprisings than the Muslim–Christian one—which Western powers and Russia engaged in during the nineteenth century. It also seemed more dangerous than the Arab–Kurdish contrast—which has been ranking second in the list of the most politically grave dichotomies. The reasons for this are political, historical, and ever-changing, and are related to contemporary polarizations, transformations, and conflicts.</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1407" instrument_node="">One might assume from this logic that minorities are at greater risk when there is an identification between ethnic, religious, and sectarian majorities, constituting an overwhelming majority—which is the case with Sunni Muslim Arabs in Syria, who make up more than two-thirds of the population. But this abstract inference is disproved by reality. Syria’s Arab Sunnis are </span><a data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aljumhuriya.net/ar/237" target="_blank" title="Opens in a new window"><span data-dcnode-id="1406" instrument_node="">far from being homogenous</span></a><span data-dcnode-id="1404" instrument_node=""> or majoritarian, and there has never been an active identification that brings them together in a way that might threaten any minorities.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1403" id="easy-footnote-7"></span><span class="easy-footnote" data-dcnode-id="1399"><a data-dcnode-id="1400" data-hasqtip="6" href="#easy-footnote-bottom-7" oldtitle="I discussed this topic at length in my essay “The Community of ‘What Remains’: Syrian Sunnis and Politics” (Arabic), <em>Al-Jumhuriya,</em> October 18, 2012, <a href=&quot;https://www.aljumhuriya.net/ar/237.&quot;>https://www.aljumhuriya.net/ar/237.</a> " title=""><sup data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">7</span></sup></a></span><span data-dcnode-id="1398" instrument_node=""> What’s more, they weren’t regarded as homogenous in the brief modern history of the Syrian entity (1918–63) before the Ba’athists seized power. The regional, cultural, and class differentiations within this Arab–Muslim–Sunni component make the notion of an “Arab Sunni majority” of little to no political significance. Even within the broader organized religious Sunni spectrum, there are significant political differentiations, such as the Muslim Brotherhood, Salafis, and Salafi jihadists. I tend to call these groupings Sunni sects; taken together, they are minorities among the Arab Sunnis, and even more so among Syrians at large.</span></p><span data-dcnode-id="1396" instrument_node="">
</span><blockquote data-dcnode-id="1393"><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">The years of war in Syria, during which most victims, casualties, and displaced people were Arab Sunnis, underline the lack of merit in the assumption that there exists a unified Sunni majority, or even one that has convergent stances on public affairs.</span></p></blockquote><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">The years of war in Syria, during which most victims, casualties, and displaced people were Arab Sunnis, underline the lack of merit in the assumption that there exists a unified Sunni majority, or even one that has convergent stances on public affairs. It has also been clear that a section of Syrian Sunnis has been supportive of the regime—maybe not in an active way, but still preferring stability and the status quo.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">The idea that there is a majority threatening vulnerable minorities is a political fiction, made prominent in Syria under Hafez al-Assad (president 1971–2000), who actually adapted it from an older narrative. The current anxiety about minority rights is a permutation of this idea.</span></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1385" instrument_node="">What is meant here by “minority politics” is a politics that is explicitly or implicitly directed toward manipulating inherited sociocultural differentiations. This politics works to consolidate and perpetuate the differentiation between “the majority” and “the minorities.” It considers the relationship between the two as inevitably adversarial, ultimately calling for an alliance of minorities, or the protection of minorities from the majority.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1384" id="easy-footnote-8"></span><span class="easy-footnote" data-dcnode-id="1380"><a data-dcnode-id="1381" data-hasqtip="7" href="#easy-footnote-bottom-8" oldtitle="Kamal Jumblatt, the progressive Lebanese Druze leader, talked about this in the 1970s on a regional scale that transcends Syria, after the Syrian regime intervened in Lebanon. Most probably, this was the cause of his assassination by regime agents in 1977, months after the Assadist mandate over Lebanon had begun. At the time of his assassination, Jumblatt was the leader of the Lebanese Nationalist Movement allied with the Palestinian resistance, against whom the regime intervened militarily in 1976 with American approval. See Patrick Seale, <em>Asad: The Struggle for the Middle East</em> (Berkeley, CA: University of California Press, 1990). " title=""><sup data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">8</span></sup></a></span></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">In minority politics, minority rights are not intended to mean the granting of rights to minorities that are equal to the supposed majority’s—in other words, establishing the principle of citizenship and equality. Rather, minority rights are about granting special statuses to identified minorities, as political blocs or communal groups. Equal rights cannot be sought through the concept of the protection of minorities, and they are not on the agenda of minority politics.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">The prominent feature of the discourse of minority politics is, ironically, its utter negligence of the political context (as discussed above), and its attribution of the risks and threats to the essential characters of cultural or social majorities and minorities. It is as if, in all cases, the majority is a predatory shark, and the minorities are small vulnerable fish.</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1371" instrument_node="">One direct consequence of minority politics is that minorities must by definition always remain minorities; that is, their members are kept from engaging in different components or joining new coalitions that don’t reference their minority statuses. This places limits on politics and society that, for much of Middle Eastern history, did not exist. The region, until modern times, was characterized by the constant formation of new majorities and minorities. Arab nationalism was an invented tradition that offered a chance for many people from static minorities to be equal partners in building a new political majority. Arab nationalism’s defeat at the hands of the American–Israeli axis led directly to minority politics. This was especially so when that defeat was coupled with the “politics of eternity” that Hafez al-Assad successfully introduced in Syria (“eternity” referring to the planned duration of the Assad regime), and his building of a dynasty in the Syrian Arab Republic (“republic” not being a word one should associate with dynasties).</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1370" id="easy-footnote-9"></span><span class="easy-footnote" data-dcnode-id="1366"><a data-dcnode-id="1367" data-hasqtip="8" href="#easy-footnote-bottom-9" oldtitle="I borrow the expression “politics of eternity” form the American academic Timothy Snyder, and I give it the meaning of staying in power “forever,” as the regime describes its position, which involves permanent war against the future and change, dividing the ruled and pitting them against each other, and the potential of genocide. In Arabic there is an etymological relationship between “abad” (eternity) and “ibada” (annihilation), so one can say that you cannot stay in power forever without committing genocide against your people." title=""><sup data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">9</span></sup></a></span><span data-dcnode-id="1365" instrument_node=""> Not a single word was heard from any Western politician against this monarchical transformation in the first modern Arab republic, nor one sentence from any of the anti-imperialist leftist organizations or intellectual authorities. Inauguration of a political eternity in Syria was not and is still not an issue of concern for either.</span></p><span data-dcnode-id="1363" instrument_node="">
</span><figure aria-describedby="caption-attachment-30160" class="wp-caption alignleft" data-dcnode-id="1358" id="attachment_30160" style="width: 1024px"><a data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//production-tcf.imgix.net/app/uploads/2019/03/26170956/syrian-girl.jpg"><img alt="" class="size-large wp-image-30160 imgix-fluid" data-dcnode-id="1362" height="512" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//production-tcf.imgix.net/app/uploads/2019/03/26170956/syrian-girl-1024x512.jpg&amp;raw" width="1024"></a><figcaption class="wp-caption-text" data-dcnode-id="1359" id="caption-attachment-30160"><span data-dcnode-id="1360" instrument_node="">A young Syrian girl runs past a statue of late Syrian Preisdent Hafez al-Assad at an exhibition about the 1973 Arab-Israaeli war at the ‘6 October Museum’ in Damascus, Syria. Source: Salah Malkawi/Getty Images</span></figcaption></figure><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1356" instrument_node="">The Western and Russian interventions in Syria perpetuate the problem of minority politics (and minority vulnerability). They arise from the same roots—they are not something external to minority problems, and certainly not their solution. These interventions follow the same logic of previous failed attempts to structure the politics and society of Syria, dating to the early days of the so-called Eastern Question in the nineteenth century, through the French Mandate, and on to the Assadist rule of Syria.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1355" id="easy-footnote-10"></span><span class="easy-footnote" data-dcnode-id="1351"><a data-dcnode-id="1352" data-hasqtip="9" href="#easy-footnote-bottom-10" oldtitle=" The “Eastern Question” referred to the uncertainty about the future control of the Middle East and North Africa during the twilight of the Ottoman Empire" title=""><sup data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">10</span></sup></a></span></p><span data-dcnode-id="1349" instrument_node="">
</span><h2 data-dcnode-id="1347" id="c3"><span data-dcnode-id="1348" instrument_node="">Colonial Patterns Repeat Themselves</span></h2><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">The genealogy of minority politics dates back to the second half of the nineteenth century, when the Eastern Question was a major preoccupation of European empires. At this time, imperialist ambitions to expand—with eyes cast on Ottoman lands—dovetailed with progressivism and self-righteousness to create a surge of concern for minorities in the Islamic world, and especially Christians. The view held that they were in constant danger, and that this stemmed from the indistinguishability of politics and religion in Islam.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><blockquote data-dcnode-id="1340"><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">The genealogy of minority politics dates back to the second half of the nineteenth century, when the Eastern Question was a major preoccupation of European empires.</span></p></blockquote><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">European powers were looking for footholds throughout the Ottoman territories. After the commandeering of many Ottoman provinces in Greece, the Balkans, Algeria, Egypt, and Tunisia, the power balance between the “imperialist predators” didn’t allow for the Sultanate’s elimination. Predatory in the face of one another but far more vicious in the face of non-Europeans, these powers opted for sharing out spheres of influence to help settle scores among themselves. In this way, the French assigned to themselves the role of guardians of the Catholics and Maronites in the Levant, with the Orthodox being the share of tsarist Russia, and the Druze (in this instance not labeled Muslims) to be protected by Britain. In every case, Muslims were cast as the aggressors. This model has echoes today, with “altruistic” Russia sharing with Iran the burdens of protecting Alawites, Shia, and Christians, and the United States protecting the Kurds. As in the previous century, the danger from which all these communities must supposedly be protected is the “majority” of Arab Sunni Muslims.</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1335" instrument_node="">Islamophobia helped many in the West and outside it not to see the mass murder in Syria that has been going on since 2012. Islamophobia, which is one face of what I call the Islamic Question (the other face is Islamism, both political and jihadist) is in a continuum with minority politics, and helps to normalize and globalize it.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1334" id="easy-footnote-11"></span><span class="easy-footnote" data-dcnode-id="1330"><a data-dcnode-id="1331" data-hasqtip="10" href="#easy-footnote-bottom-11" oldtitle=" I discussed this issue at length in my last book in Arabic, <em>The Conquered Imperialists,</em> Arabic (Beirut: Riad El Rayyes Books, 2019), 79–134." title=""><sup data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">11</span></sup></a></span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1327" instrument_node="">The colonial project required using religion as a political tool, and colonizers’ application of different ideas about secularism was rife with inconsistencies and hypocrisy. For example, France granted French citizenship to Algerian Jews in the early 1860s, but did not accord the same privilege to Algerian Muslims. In another instance of France’s approach to religion abroad differing from the approach used at home, the French politician Leon Gambetta famously said in the course of the following decade that for France, anticlericalism was not a commodity for export.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1326" id="easy-footnote-12"></span><span class="easy-footnote" data-dcnode-id="1322"><a data-dcnode-id="1323" data-hasqtip="11" href="#easy-footnote-bottom-12" oldtitle="See Lanxin Xiang, <em>The Origins of the Boxer War: A Multinational Study</em> (London and New York: Routledge, 2003). " title=""><sup data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">12</span></sup></a></span><span data-dcnode-id="1321" instrument_node=""> Secular France was notorious in this regard. The British were more pragmatic, but they came up with the Balfour Declaration that later led to the creation of Israel, the archetype of Western colonial hostility to the Arab world and to Muslims. Israel prefers the Assad state in Syria not only because it is an experienced guardian of the borders without a peace treaty, but even more because it plays a role in normalizing Israel as a state built on religious identity and the elimination of the Palestinian people, either through war or politics.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">This background shows the connection between minority politics and the colonial politics that led to the European occupation of the Middle East, including Syria and Lebanon, following World War I. There is nothing altruistic or humane in this politics. Current neocolonial and postcolonial politics hardly depart from this logic. Far from being anti-imperialist or Third World nationalist, the Assad regime extends the values and practices of European colonialism by other means.</span></p><span data-dcnode-id="1316" instrument_node="">
</span><blockquote data-dcnode-id="1313"><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">An effect of the Eastern Question ended up being the disenfranchisement of those groups who found themselves in the majority, which was newly defined under strict terms.</span></p></blockquote><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">An effect of the Eastern Question ended up being the disenfranchisement of those groups who found themselves in the majority, which was newly defined under strict terms. The Ottoman state didn’t represent or look after the interests of any majority of any sort. When Western powers decided they needed to privilege certain minorities in the time of the Ottoman Tanzimat (a period of reform in the nineteenth century), other segments of societies—the putative sociocultural majority—found themselves on the losing side of politics. This disenfranchisement is an integral part of the original and main purpose of minority politics. We cannot understand the massacre of Christians in Damascus in 1860 and the Maronite–Druze war in Lebanon the same year without this background in mind. Colonial protection of minorities led directly to more vulnerability of minorities—and of majorities, for that matter—and to ailing societies.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Lebanon itself was established by the French for the protection of Christians. The country’s foundational belief is that the problem of one group is another group, which warranted mistrust between Lebanese Christians and Lebanese Muslims. It worked well. Now, it seems that this system is kept together under the firm hand of a sectarian militia, Hezbollah, with its own version of a minority alliance.</span></p><span data-dcnode-id="1306" instrument_node="">
</span><h2 data-dcnode-id="1304" id="c4"><span data-dcnode-id="1305" instrument_node="">Postcolonial Movements</span></h2><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">In the 1930s, Arab nationalism was the name given to the last political majority to be invented in Syria (and the broader region). As a utopian idea, Arab nationalism largely allowed for blending of Muslims and Christians, not to mention Sunnis, Alawites, Druze, and Ismailis. It also gave many Syrians a sense of partnership and fraternity.</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1299" instrument_node="">Arab nationalism found support in Syria not because it corresponded to a “natural” political majority in the country, but rather because it was associated with emancipatory and progressive values acquired during the struggle against the Ottoman sultanate in the decades before World War I, and more so during the struggle against European colonialism in the interwar years. Ideas and values like national liberation, socialism, progress, anti-Zionism, and international solidarity were hegemonic among Arabs in Egypt, Syria, Iraq, and other countries. Arab progressivism was secular and perceived itself as part of the international struggle against imperialism, colonialism, and reactionary Arab oil monarchies in the Gulf up to 1970. It was only after the retreat of these values that Arab nationalism deteriorated, and the likes of Hafez al-Assad, Saddam Hussein, Muammar Qaddafi, and the wealthy Gulf monarchies became associated with the signifier “Arab.” Arabs were reduced to an ethnicity whose representatives were either bloody tyrants or the corrupt and trivial petrol sheikhs. The Islamist fighter would soon enter the stage. Reduced to an ethnicity, Arabism’s bequest was not the universal rights it had once espoused, but instead the new fact—or new importance of the fact—of Arabs’ ethnic majority in Syria.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1298" id="easy-footnote-13"></span><span class="easy-footnote" data-dcnode-id="1294"><a data-dcnode-id="1295" data-hasqtip="12" href="#easy-footnote-bottom-13" oldtitle="Here, I use “Arabism” to refer to the quality of being Arab. It may stand in opposition to sectarianism, as well as regionalism (“Syrianism” or “Jordanianism”). Arab nationalism can be interpreted as political Arabism, whose main aims were unifying Arab countries, liberating Palestine, and modernizing our societies and unifying them. When Arab nationalism is detached from these aims, we get “Arab” as an ethnicity, which applies more to the Arabs of the Gulf." title=""><sup data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">13</span></sup></a></span></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Arab nationalists like Michel Aflaq, a Damascene Christian who helped found the original Ba’ath Party in the 1940s, viewed their movement as being the champion of progressive values in the Middle East. In a later stage, ethnicized Arabism alienated around 15 percent of the country’s population— the percentage of Syrians who are not Arabs. Interestingly, many of those non-Arabs, including Armenians and Kurds, thought of themselves as Arab up to the 1970s, when the Arab identity was still progressive and emancipatory. In time, however, the “Arab” signifier was reduced under the sway of tyranny and rentier states to simply meaning ethnicity and difference.</span></p><span data-dcnode-id="1289" instrument_node="">
</span><figure aria-describedby="caption-attachment-30157" class="wp-caption alignleft" data-dcnode-id="1284" id="attachment_30157" style="width: 1024px"><a data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//production-tcf.imgix.net/app/uploads/2019/03/26170952/baath-students.jpg"><img alt="" class="size-large wp-image-30157 imgix-fluid" data-dcnode-id="1288" height="512" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//production-tcf.imgix.net/app/uploads/2019/03/26170952/baath-students-1024x512.jpg&amp;raw" width="1024"></a><figcaption class="wp-caption-text" data-dcnode-id="1285" id="caption-attachment-30157"><span data-dcnode-id="1286" instrument_node="">Iraqi students protesting and pledging their allegiance to the Arab Socialist Ba’ath Party, Iraq, 1963. Source: Stan Meagher/Express/Getty Images</span></figcaption></figure><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Between modern Syria’s beginnings at the close of World War I and the Ba’athist coup d’état in 1963, the country was evolving toward reducing the political value of these differentiations. Urban Sunnis composed a majority in the political class, but there was not “Sunni rule.” In 1949, fixed sectarian quotas for the Islamic sects were abolished in the parliament (the Jewish quota was also abolished, while the Christian quota was kept), apparently without raising public outcries. Rather than considering every Syrian to be a Muslim, the state seemed to consider every Syrian to be an Arab. Perhaps the Christian quota was excluded for the purpose of reassurance: Syria had just gained independence three years earlier, and the French Mandate (1920–46) had been justifying itself through the protection of minorities, especially Christians. The lack of recorded outcry doesn’t mean that these developments passed without resistance by conservative social and political currents, but rather that the outcome of social forces was in favor of greater progression toward equality and citizenship.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">When in power after 1963, however, Arab nationalism eventually collapsed under the weight of its own contradictions and the defeat of June 1967. It transformed from a progressive project into a narrow political ideology, embodied in a specific political party, the Ba’ath, which started its rule with a state of exception and by suffocating political life. In Syria, this political ideology in turn narrowed even more, becoming embodied in the person of Hafez al-Assad. What was once a unifying vision was used as an excuse for tyranny and pillaging, and for privileging the Assads’ clique.</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Later, an emptied and value-free Arab nationalism remained an ideology of Assadist rule, owing to its usefulness in national and regional maneuvering, and at the same time in obscuring this maneuvering. Instead of serving as a ground for convergence and unity, this degenerate form of Arabism was used to mask efforts to promote discord and conflict between Syrians, as well as between the Arabs of the Mashreq (the eastern portion of the Arab world)—societies and states alike.</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">In time, Syrian Ba’athism fully transformed from an ideology of mostly inclusive majority rule to a cover for sectarian political arrangements obsessed with the protection of minorities. Partly in the name of the protection of minorities, the Assad regime went to ever more excessive lengths. It has been a vital interest of the regime that Sunnis become more Sunni, Alawites more Alawite, Christians more Christian, Kurds more Kurdish, and so on. That is why the regime crushed leftist and secular organizations that sought to bring Syrians closer to each other on the basis of citizenship, and that opposed its sectarian policies. Ultimately, it mostly sought to serve the interests of a ruling clique whose main figures came from an Alawite background (a community that makes up 12 percent of the population), though it would never admit as much.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><blockquote data-dcnode-id="1268"><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">It has been a vital interest of the regime that Sunnis become more Sunni, Alawites more Alawite, Christians more Christian, Kurds more Kurdish, and so on. That is why the regime crushed leftist and secular organizations that sought to bring Syrians closer to each other on the basis of citizenship.</span></p></blockquote><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">In this system, the disenfranchised segments of the sociocultural majority paid the price for the special status granted to minorities. But the bigger cost was to the the fabric of Syrian society. It is impossible to establish a modern state based on such a bargain: the people were supposed to mistrust each other, but trust the authoritarian leader’s capacity for violence to enforce the current order. This politics turns the truth upside down. It considers the enemies of Syrians to be themselves, and their friends to be the Assad regime—or the Russians, the French, or the Americans. No country can be built upon such a basis—Russia, France, and the United States certainly are not. Trust and respect cannot be built on a foundation of mistrust.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">This mistrust has deep consequences. Contrary to popular perception, sectarianism isn’t the origin of mistrust. The opposite is true. Mistrust breeds sectarianism. Sects become internal circles of trust, solidarity, and security only when the political system is untrusted, the public feels alienated, and there is a declining sense of control over life conditions.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">These historical developments led to the formation of an “internal West”—dominant and privileged national elites from which the majority of the population is socially, culturally, and politically marginalized. It is thus quite obvious where Islamists come from when they claim to represent this majority, and Islam turns into a political and social resistance ideology—into “the solution.”</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1257" instrument_node="">In light of this history, it is easy to see that neither the problems of minorities nor those of majorities are inherited from the distant past. Instead, they arise from the quality of political, institutional, legal, and social arrangements on which the Syrian public system is based today, with people in power taking advantage of inherited differentiations and manipulating them to preserve their own powers and privileges.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1256" id="easy-footnote-14"></span><span class="easy-footnote" data-dcnode-id="1252"><a data-dcnode-id="1253" data-hasqtip="13" href="#easy-footnote-bottom-14" oldtitle=" Central in this are the bonds of patronage and clientelism. They are discussed in my book <em>The Impossible Revolution,</em> in the final chapter." title=""><sup data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">14</span></sup></a></span></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">The strategy that the Assad regime of the late twentieth century used to control Syria was based on a model developed in colonial times. It opened the door to a permanent civil war. Conflict between the minorities and the majority was all but inevitable. Syria has now passed through one of the cruelest rounds of this continuous war—the harvest of fifty years of shortsighted manipulation.</span></p><span data-dcnode-id="1247" instrument_node="">
</span><h2 data-dcnode-id="1245" id="c5"><span data-dcnode-id="1246" instrument_node="">The Trap of Mandate</span></h2><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Long before the Assad dynasty resorted to Iran and its satellites, and then to Russia, to protect its ownership of the Syrian state, the Lebanese example demonstrated another cornerstone of minority politics: appealing to foreign powers to mediate between local communities. This reached a rare extent under the Mount Lebanon Mutasarrifate in the last decades of the nineteenth century. As “compassionate” (and imperialist) Western powers looked for Lebanese in need of protection from other Lebanese, there was a sudden proliferation of Lebanese communities in need of protection. The Assads’ Syria is another example of minority politics that precipitated the biggest threats to minorities in the modern history of Syria. In these cases, internal and external manipulation have led to temporary improvements in the conditions of minorities, but also to great calamities in the longer term. Minorities, because they are by definition in the minority, are more likely to be affected by major political crises and instabilities than the majority. Still, minority politics has never led to sustainable conditions. No system that fuels discrimination, rivalry, and mistrust can be sustainable.</span></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1240" instrument_node="">Apart from the long-term suffering of minorities, the very doctrine of their protection is completely detached from the demands of equality and citizenship, and from any secular political ideologies. It only leads to demanding special treatment of minorities in the political system—either a reversal of the Ottoman “dhimmi” status, which granted certain protections to non-Muslims, or perhaps a confessional system, whose Lebanese example is not encouraging.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1239" id="easy-footnote-15"></span><span class="easy-footnote" data-dcnode-id="1235"><a data-dcnode-id="1236" data-hasqtip="14" href="#easy-footnote-bottom-15" oldtitle="Under the dhimmi system, Christians, Jews and some other religious communities were recognized by Muslim authorities as being under the “sovereignty” of Islam. It is a sort of autonomy within the lands were Islam was prevalent, with the religious leaders of these communities being the natural representatives of them in the sultanate. They paid taxes (“jizya”) and showed loyalty to the authorities, and enjoyed protection in return." title=""><sup data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">15</span></sup></a></span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">The West and Russia’s emphasis on the protection of minorities and minority rights in Syria is meant to serve the same agenda as the approach used in colonial times: the problem of some Syrian groups is other Syrian groups, and this can only be solved by intervention or guardianship.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Syria under Hafez al-Assad wasn’t fundamentally different from that model, except that the “guardian” of minorities was local. The relationship between Syrian groups, as well as the discussion revolving around this relationship, are largely the result of Hafez al-Assad’s version of minority politics, a “minorities’ alliance.” This politics led to the formation not only of a menacing Sunni majority, but also of vulnerable minorities. The dictatorship, in its quest to rule forever, created these divisions to stamp out any national challengers to its rule. Here again, out of supposed concern for the protection of minorities, the West and Russia are effectively perpetuating this Assadist politics, which in turn echoes French Mandate’s politics, which in its turn emanated from the intellectual and political premises of the Eastern Question of the imperial era. Only the guardian has been changing. Again, Islamophobia normalizes and globalizes this politics and entrenches it.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Embedded in this concept of mandate is a sense of the “colonial” treatment of subjects—that combination of extreme political coercion and cultural and class supremacy, driven by a “civilizing mission.” Under Bashar al-Assad, who assumed power in 2000, this civilizing mission turned from having a socialist bent to focusing on modernism (the junior Assad promoted “development and modernization”) and secularism. The Assad brand of progressivism thus moved from the sphere of the social to the sphere of the cultural. Many of yesterday’s Syrian progressives are today’s culturalists. They explain our social and political problems in terms of the people’s mentality: their mission is “enlightenment,” and their political agenda is enlightened despotism. Under the Assadist mandate, just as under the French Mandate, the regime attributes to itself a sort of civilizing mission by applying the colonial policy of divide and rule.</span></p><span data-dcnode-id="1224" instrument_node="">
</span><blockquote data-dcnode-id="1221"><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Despite promises of eventual evolution to another political system, neither the Assadist mandate nor its colonial predecessors ever made a serious effort to build a nation-state based on the model of citizenship.</span></p></blockquote><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1219" instrument_node="">Despite promises of eventual evolution to another political system, neither the Assadist mandate nor its colonial predecessors ever made a serious effort to build a nation-state based on the model of citizenship. Shortly before the uprisings of 2011, Bashar al-Assad himself </span><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/SB10001424052748703833204576114712441122894" target="_blank" title="Opens in a new window"><span data-dcnode-id="1218" instrument_node="">spoke</span></a><span data-dcnode-id="1216" instrument_node=""> about the decades required until Syrian society would become “ripe” for reform.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1215" id="easy-footnote-16"></span><span class="easy-footnote" data-dcnode-id="1211"><a data-dcnode-id="1212" data-hasqtip="15" href="#easy-footnote-bottom-16" oldtitle="See “Interview with Syrian President Bashar al-Assad,” <em>Wall Street Journal,</em> January 31, 2011 (a month and a half before the eruption of the Syrian uprising), <a href=&quot;https://www.wsj.com/articles/SB10001424052748703833204576114712441122894.&quot;>https://www.wsj.com/articles/SB10001424052748703833204576114712441122894.</a>" title=""><sup data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">16</span></sup></a></span><span data-dcnode-id="1210" instrument_node=""> This abundance of time, and the dogmatic mention of decades and centuries, is a core part of culturists’ lingo and their intellectual tool kit. Since the uprisings began, Bashar al-Assad </span><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DUiS8XcWFbfU" target="_blank" title="Opens in a new window"><span data-dcnode-id="1209" instrument_node="">has proclaimed</span></a><span data-dcnode-id="1207" instrument_node=""> his regime to be “secularism’s last fortress,” something that calls to mind Israel’s proclamation that it is the oasis of democracy in the Middle East.</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1206" id="easy-footnote-17"></span><span class="easy-footnote" data-dcnode-id="1202"><a data-dcnode-id="1203" data-hasqtip="16" href="#easy-footnote-bottom-17" oldtitle=" Interview with Bashar al-Assad, RT Arabic, November 8, 2012, <a href=&quot;https://www.youtube.com/watch?v=UiS8XcWFbfU.&quot;>https://www.youtube.com/watch?v=UiS8XcWFbfU.</a>" title=""><sup data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">17</span></sup></a></span><span data-dcnode-id="1201" instrument_node=""> The endgame for the Assad regime has always been achieving an international legitimacy that could justify the perpetuation of its guardianship. And the regime has been quite successful in obtaining it.</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Then again, while the mandate doctrine may have been built on false premises, the world it has constructed now poses real dangers for those that minority politics has defined as “minorities.” Before the Syrian revolution, these dangers were already real: many minorities experienced a sense of insecurity and widespread fear of receiving disdainful or condescending treatment, or of being politically or culturally marginalized, or of becoming second-class citizens. After years of war instigated by a sectarian regime that ultimately unfolded on sectarian lines, minority fears grew when the regime was endangered, and calmed down with the renewal of the Assad mandate under Russian and Iranian protection. It also bears mentioning that being a minority does not, of course, make one virtuous, as a prevailing dogma in the West has it. Minorities are not necessarily defenders of equality and democracy, and they are not immune to harboring fascist tendencies—especially when their minority condition is coupled with privileges, whether political, material, or symbolic.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">At least two generations of sectarian discrimination in Syria has paved the way for a movement in reaction: the majority politics embodied by Islamists. Here, I mean the idea that the majority, defined in identity-based terms, has the right to rule. In the vision of the Muslim Brotherhood, where Islam is a political ideology, minorities have rights as communities that are putatively equal to Muslims. In reality, however, Muslims are “more equal”—they are the reference point for law and society. For the Salafi jihadists for whom Islam is a political technology, non-Muslim minorities should be dealt with harshly, and Muslim minorities should convert to true Islam or be killed. These fascists with shaggy beards are the other face of the fascists with suits and neckties, like Bashar al-Assad.</span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">A comprehensive strategy is needed to confront this form of majority politics. Otherwise, the actions of its proponents can legitimize minority politics, as it has already done in earlier years. The rise of Salafi jihadism in Syria between 2013 and 2016 gave credibility to Assadist discourse, as well as to the discourses of the Western powers, Russia, and the local ideologues who share their premises.</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">This political structure formed around minority protection is the structural reason why Syrian minorities have always been worried about their future. It is an axiom of minority politics that minorities are fragile, though privileged, and that their fragility should be preserved for minority politics to legitimize itself. More privileges are necessary to redress fragility, but privilege raises anger among the underprivileged and makes the privileged less secure. So the circle of vulnerability and privilege closes, with no way out. This is good for the providers of security. One constant of minority politics from the perspective of those who provide protection is that there should always be imminent dangers to minorities, and that minorities should be afraid all the time. We protect you because you are afraid, but we need you afraid so that you ask us to protect you. And this goes along with a growing sense of discrimination toward and restlessness among many Sunnis—neither minorities nor the majority feel secure, and the gulf between their identities, priorities, and consciousnesses has steadily grown.</span></p><span data-dcnode-id="1187" instrument_node="">
</span><blockquote data-dcnode-id="1184"><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">We protect you because you are afraid, but we need you afraid so that you ask us to protect you.</span></p></blockquote><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Still, responding to minorities’ perception of insecurity by denying it or ignoring it provides no solution to the mandate trap. The insecurity of minorities is now one of Syria’s national problems. Denying such a tangible issue provides an open invitation to any domestic or foreign power wishing to manipulate the country.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">At the same time, the ultimate remedy for minorities’ insecurity cannot be a promise of their protection. It must instead be a complete shifting of the political landscape to one in which rights and privileges are not linked to identity but rather to citizenship. There exists a toxic assumption that Middle Eastern societies, by their unchanging primordial nature, are made up of groups that cannot blend and socialize, whose interrelationship will always be rivalry and zero-sum, where whatever is gained by one side is lost by the other. This assumption cannot possibly sustain the needed shift of the political landscape, nor can it even constitute a livable country. The possibility that both sides win together or both lose together falls outside the scope of minority politics. So does the fact that all these sides are changing, and that our history is, just like other histories, one of continuous blending and of forming new differentiations, new majorities, and new minorities. Minority politics, cloaked in the language of modernism, has thus created highly explosive societies, loaded with hostilities throughout their institutions, culture, and psychology. Lebanon’s contemporary history is a living testament to this, as is the history of Syria under the Assad regime.</span></p><span data-dcnode-id="1177" instrument_node="">
</span><h2 data-dcnode-id="1175" id="c6"><span data-dcnode-id="1176" instrument_node="">The Temptations of Majority Politics</span></h2><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Even as one essential requirement of minority politics is that minorities face real and existential threats, the threat of majority politics was quite real for a while. And it capitalized well on the fact that many among the majority have real grievances, and the easiest concept to attach their grievances to is their status as a disenfranchised majority victimized by privileged minorities. But clinging to this grievance covers no new ground. Such an approach merely turns minority politics on its head, rather than actually dismantling it.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">I choose the terms carefully here to highlight that these issues are matters of politics, and not of identity. Identities are political constructs, not the opposite. Politics is not derived from identities, as many in Syria, the Middle East, and the West believe. In the same vein, a sectarian regime is a regime, not a sect, the way minority (and majority) politics is about politics, and not communities or identity. Syria has already lost the chance of minimizing the weight and role of culture (identity, and more specifically, religion and ethnicity) in its political system. We are back to neocolonial conditions, where a sectarian regime is protected by two powers—Iran and Russia—that openly express themselves in sectarian language, and on a background of flourishing Islamophobia in the West.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">This situation maintains a high demand for majority politics among those who feel alienated, though many of them are not Islamists. I think that a sense of “ghubn” (a feeling of being discriminated against) is developing among many Sunnis, similar to the one Muslims of Lebanon developed before the Lebanese war in 1975. Although this sentiment currently lacks a language to express itself—Islamism has for some time been progressively going out of favor among wide swaths of Sunnis—it is bound to find an outlet in one way or another.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">One possible outcome is consociational arrangements for sharing power among communities, as in Lebanon. This is not likely in Syria, however, because of the demographic weight of Sunnis. I suspect that no international voices have been heard calling for such arrangements because they are aware of Syria’s demographics. But a modified formula of this regime is possible, wherein the Assads occupy the position of praetorian guards of the system, a position occupied by Hezbollah in the Lebanese model. I do not exclude the possibility of Islamists being part of these arrangements. It makes a lot of sense that we would see an alliance between agents of minority and majority politics and politicians. Both are sectarian, and are both adamantly against citizenship politics and democracy.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><blockquote data-dcnode-id="1159"><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">While minority politics neutralizes or marginalizes atypical individuals from majoritarian backgrounds who do not endorse this politics, majority politics, whether in alliance with minority politics or not, marginalizes atypical Sunnis.</span></p></blockquote><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1157" instrument_node="">While minority politics neutralizes or marginalizes atypical individuals from majoritarian backgrounds who do not endorse this politics, majority politics, whether in alliance with minority politics or not, marginalizes atypical Sunnis. It marginalizes them because it is based on mainstreaming an assumption that a typical Sunni Muslim is a pious believer who is socially conservative and politically Islamist, and ultimately close to either the Muslim Brotherhood or the Salafis. Indeed, Syria has already witnessed this outcome in the last few years of war, with nihilist elitist groups like the Nusra Front, the Islamic State, and the Islam Army (“Jaysh al-Islam”) targeting many Sunnis who were deemed inadequately devout, or apostate. Partly, this is because the supposedly “typical” Sunni is hardly common at all. Estimating the percentage of Syrians who fit this “typical” mold is impossible. But it is certain that when international media reports that “70 percent of Syria is composed of Sunni Arabs,” it disguises a huge diversity of practice and identity within this “majority.”</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1156" id="easy-footnote-18"></span><span class="easy-footnote" data-dcnode-id="1152"><a data-dcnode-id="1153" data-hasqtip="17" href="#easy-footnote-bottom-18" oldtitle=" The problem is not that the 70 percent figure is inaccurate per se, but that it whitewashes the diversity among Sunnis." title=""><sup data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">18</span></sup></a></span><span data-dcnode-id="1151" instrument_node=""> This is particularly noteworthy because an unreserved employment of the signifier “Sunni majority” can potentially involve a political agenda to impose homogeneity and sectarianization on Syrian Sunnis, and perhaps to recruit them in explicitly religious or even extremist groups in order to hold power. Without this process, the Sunnis of Syria do not constitute a “sect” (though it may be said that Islamists do).</span><span class="easy-footnote-margin-adjust" data-dcnode-id="1150" id="easy-footnote-19"></span><span class="easy-footnote" data-dcnode-id="1146"><a data-dcnode-id="1147" data-hasqtip="18" href="#easy-footnote-bottom-19" oldtitle="See Haj Saleh, “What Remains;” and <em>Conquered Imperialists,</em> 147–85. " title=""><sup data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">19</span></sup></a></span></p><span data-dcnode-id="1144" instrument_node="">
