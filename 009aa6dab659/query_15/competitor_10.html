</span></p><p data-dcnode-id="8892"><span data-dcnode-id="8923" instrument_node="">The </span><a data-dcnode-id="8921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Breakup_of_Yugoslavia" title="Breakup of Yugoslavia"><span data-dcnode-id="8922" instrument_node="">breakup of Yugoslavia</span></a><span data-dcnode-id="8920" instrument_node=""> was a process in which the </span><a data-dcnode-id="8918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_Federal_Republic_of_Yugoslavia" title="Socialist Federal Republic of Yugoslavia"><span data-dcnode-id="8919" instrument_node="">Socialist Federal Republic of Yugoslavia</span></a><span data-dcnode-id="8917" instrument_node=""> was broken up into constituent republics, and over the course of which the </span><a class="mw-redirect" data-dcnode-id="8915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslav_wars" title="Yugoslav wars"><span data-dcnode-id="8916" instrument_node="">Yugoslav wars</span></a><span data-dcnode-id="8914" instrument_node=""> started. The process generally began with the death of </span><a data-dcnode-id="8912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josip_Broz_Tito" title="Josip Broz Tito"><span data-dcnode-id="8913" instrument_node="">Josip Broz Tito</span></a><span data-dcnode-id="8911" instrument_node=""> on 4 May 1980 and formally ended when the last two remaining republics (</span><a class="mw-redirect" data-dcnode-id="8909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SR_Serbia" title="SR Serbia"><span data-dcnode-id="8910" instrument_node="">SR Serbia</span></a><span data-dcnode-id="8908" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="8906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SR_Montenegro" title="SR Montenegro"><span data-dcnode-id="8907" instrument_node="">SR Montenegro</span></a><span data-dcnode-id="8905" instrument_node="">) proclaimed the </span><a class="mw-redirect" data-dcnode-id="8903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Republic_of_Yugoslavia" title="Federal Republic of Yugoslavia"><span data-dcnode-id="8904" instrument_node="">Federal Republic of Yugoslavia</span></a><span data-dcnode-id="8902" instrument_node=""> on 27 April 1992. At that time the Yugoslav wars were still ongoing, and FR Yugoslavia continued to exist until 2003, when it was renamed and reformed as the state union of </span><a data-dcnode-id="8900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbia_and_Montenegro" title="Serbia and Montenegro"><span data-dcnode-id="8901" instrument_node="">Serbia and Montenegro</span></a><span data-dcnode-id="8899" instrument_node="">. This union lasted until 5 June 2006 when </span><a data-dcnode-id="8897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montenegro" title="Montenegro"><span data-dcnode-id="8898" instrument_node="">Montenegro</span></a><span data-dcnode-id="8896" instrument_node=""> proclaimed independence. The former Yugoslav autonomous province of </span><a data-dcnode-id="8894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosovo" title="Kosovo"><span data-dcnode-id="8895" instrument_node="">Kosovo</span></a><span data-dcnode-id="8893" instrument_node=""> subsequently proclaimed independence from Serbia in February 2008.

</span></td></tr><tr data-dcnode-id="8055"><td data-dcnode-id="8074"><span data-dcnode-id="8075" instrument_node="">26 February</span></td><td data-dcnode-id="8056"><span data-dcnode-id="8072" instrument_node="">The "Poster Scandal" breaks out. Earlier in the year, the Slovenian neo-avantgardist artistic movement </span><a data-dcnode-id="8070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neue_Slowenische_Kunst" title="Neue Slowenische Kunst"><span data-dcnode-id="8071" instrument_node="">Neue Slowenische Kunst</span></a><span data-dcnode-id="8069" instrument_node=""> designed a poster which won a competition for the Yugoslavian Youth Day Celebration. The poster, however, appropriated a painting by </span><a class="mw-redirect" data-dcnode-id="8067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi" title="Nazi"><span data-dcnode-id="8068" instrument_node="">Nazi</span></a><span data-dcnode-id="8066" instrument_node=""> artist </span><a data-dcnode-id="8064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Klein_%28artist%29" title="Richard Klein (artist)"><span data-dcnode-id="8065" instrument_node="">Richard Klein</span></a><span data-dcnode-id="8063" instrument_node="">, by only replacing the flag of Nazi Germany with the Yugoslav flag and the German eagle with a dove. The provocation, aiming at pointing out the </span><a class="mw-redirect" data-dcnode-id="8061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Totalitarian" title="Totalitarian"><span data-dcnode-id="8062" instrument_node="">totalitarian</span></a><span data-dcnode-id="8060" instrument_node=""> nature of the </span><a class="mw-redirect" data-dcnode-id="8058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Titoist" title="Titoist"><span data-dcnode-id="8059" instrument_node="">Titoist</span></a><span data-dcnode-id="8057" instrument_node=""> ideology, provokes an outcry among the pro-Communist public in both Slovenia and Yugoslavia.
</span></td></tr><tr data-dcnode-id="8039"><td data-dcnode-id="8051"><span data-dcnode-id="8052" instrument_node="">24 April</span></td><td data-dcnode-id="8040"><a data-dcnode-id="8048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slobodan_Milo%25C5%25A1evi%25C4%2587" title="Slobodan Milošević"><span data-dcnode-id="8049" instrument_node="">Slobodan Milošević</span></a><span data-dcnode-id="8047" instrument_node=""> delivers a speech about Kosovo to a crowd of 15,000 Serbs and </span><a class="mw-redirect" data-dcnode-id="8045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montenegrins_%28ethnic_group%29" title="Montenegrins (ethnic group)"><span data-dcnode-id="8046" instrument_node="">Montenegrins</span></a><span data-dcnode-id="8044" instrument_node="">, telling them: "You will not be beaten". Later that evening, Serbian television airs a video of Milošević's speech. President of Serbia </span><a data-dcnode-id="8042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ivan_Stamboli%25C4%2587" title="Ivan Stambolić"><span data-dcnode-id="8043" instrument_node="">Ivan Stambolić</span></a><span data-dcnode-id="8041" instrument_node=""> later remarks that after watching this video he has seen "the end of Yugoslavia".
</span></td></tr><tr data-dcnode-id="8015"><td data-dcnode-id="8035"><span data-dcnode-id="8036" instrument_node="">26 June</span></td><td data-dcnode-id="8016"><span data-dcnode-id="8033" instrument_node="">One thousand </span><a data-dcnode-id="8031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbs" title="Serbs"><span data-dcnode-id="8032" instrument_node="">Serbs</span></a><span data-dcnode-id="8030" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="8028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montenegrins_%28ethnic_group%29" title="Montenegrins (ethnic group)"><span data-dcnode-id="8029" instrument_node="">Montenegrins</span></a><span data-dcnode-id="8027" instrument_node=""> from </span><a data-dcnode-id="8025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosovo" title="Kosovo"><span data-dcnode-id="8026" instrument_node="">Kosovo</span></a><span data-dcnode-id="8024" instrument_node=""> protest outside of the </span><a data-dcnode-id="8022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belgrade" title="Belgrade"><span data-dcnode-id="8023" instrument_node="">Belgrade</span></a><span data-dcnode-id="8021" instrument_node=""> parliament building against persecution by ethnic Albanians.</span><sup class="reference" data-dcnode-id="8018" id="cite_ref-6"><a data-dcnode-id="8019" href="#cite_note-6"><span data-dcnode-id="8020" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8017" instrument_node="">
</span></td></tr><tr data-dcnode-id="7998"><td data-dcnode-id="8011"><span data-dcnode-id="8012" instrument_node="">2/3 September</span></td><td data-dcnode-id="7999"><a class="mw-redirect" data-dcnode-id="8008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aziz_Kelmendi" title="Aziz Kelmendi"><span data-dcnode-id="8009" instrument_node="">Aziz Kelmendi</span></a><span data-dcnode-id="8007" instrument_node="">, a </span><a data-dcnode-id="8005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslav_People%2527s_Army" title="Yugoslav People's Army"><span data-dcnode-id="8006" instrument_node="">JNA</span></a><span data-dcnode-id="8004" instrument_node=""> soldier of Albanian nationality, kills 4 other JNA soldiers and wounds 7 others. During the funeral Albanian-owned shops are attacked by mobs.</span><sup class="reference" data-dcnode-id="8001" id="cite_ref-7"><a data-dcnode-id="8002" href="#cite_note-7"><span data-dcnode-id="8003" instrument_node="">[7]</span></a></sup><span data-dcnode-id="8000" instrument_node="">

</span></td></tr><tr data-dcnode-id="7957"><td data-dcnode-id="7967"><span data-dcnode-id="7968" instrument_node="">9 December</span></td><td data-dcnode-id="7958"><span data-dcnode-id="7965" instrument_node="">The </span><a class="new" data-dcnode-id="7963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLitostroj_strike%26action%3Dedit%26redlink%3D1" title="Litostroj strike (page does not exist)"><span data-dcnode-id="7964" instrument_node="">Litostroj strike</span></a><span data-dcnode-id="7962" instrument_node=""> breaks out in Ljubljana, Slovenia. Workers demand the right to establish independent </span><a class="mw-redirect" data-dcnode-id="7960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade_unions" title="Trade unions"><span data-dcnode-id="7961" instrument_node="">trade unions</span></a><span data-dcnode-id="7959" instrument_node=""> and political pluralization. The organizing committee for the formation of an independent the Social Democratic Party of Slovenia is formed. The event is considered as the beginning of the process of political pluralization in Slovenia.

</span></td></tr><tr data-dcnode-id="7906"><td data-dcnode-id="7917"><span data-dcnode-id="7918" instrument_node="">7 April</span></td><td data-dcnode-id="7907"><span data-dcnode-id="7915" instrument_node="">The Croatian film </span><a class="mw-redirect" data-dcnode-id="7913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C5%25BDivot_sa_stricem" title="Život sa stricem"><span data-dcnode-id="7914" instrument_node="">Život sa stricem</span></a><span data-dcnode-id="7912" instrument_node="">, about a communist official's return to Catholicism, is released despite protests by the Croatian SUBNOR.</span><sup class="reference" data-dcnode-id="7909" id="cite_ref-8"><a data-dcnode-id="7910" href="#cite_note-8"><span data-dcnode-id="7911" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7908" instrument_node="">
</span></td></tr><tr data-dcnode-id="7871"><td data-dcnode-id="7902"><span data-dcnode-id="7903" instrument_node="">25 April</span></td><td data-dcnode-id="7872"><span data-dcnode-id="7900" instrument_node="">The Slovenian Writers' Association and the Slovenian Sociological Association publish a proposal for an alternative Slovenian constitution. Authors of the proposal include several prominent intellectual figures, like </span><a data-dcnode-id="7898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veljko_Rus" title="Veljko Rus"><span data-dcnode-id="7899" instrument_node="">Veljko Rus</span></a><span data-dcnode-id="7897" instrument_node="">, </span><a data-dcnode-id="7895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/France_Bu%25C4%258Dar" title="France Bučar"><span data-dcnode-id="7896" instrument_node="">France Bučar</span></a><span data-dcnode-id="7894" instrument_node="">, </span><a data-dcnode-id="7892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dimitrij_Rupel" title="Dimitrij Rupel"><span data-dcnode-id="7893" instrument_node="">Dimitrij Rupel</span></a><span data-dcnode-id="7891" instrument_node="">, </span><a data-dcnode-id="7889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veno_Taufer" title="Veno Taufer"><span data-dcnode-id="7890" instrument_node="">Veno Taufer</span></a><span data-dcnode-id="7888" instrument_node="">, </span><a data-dcnode-id="7886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milan_Apih" title="Milan Apih"><span data-dcnode-id="7887" instrument_node="">Milan Apih</span></a><span data-dcnode-id="7885" instrument_node="">, </span><a data-dcnode-id="7883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tine_Hribar" title="Tine Hribar"><span data-dcnode-id="7884" instrument_node="">Tine Hribar</span></a><span data-dcnode-id="7882" instrument_node="">, </span><a data-dcnode-id="7880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Jambrek" title="Peter Jambrek"><span data-dcnode-id="7881" instrument_node="">Peter Jambrek</span></a><span data-dcnode-id="7879" instrument_node="">, </span><a data-dcnode-id="7877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Janez_Menart" title="Janez Menart"><span data-dcnode-id="7878" instrument_node="">Janez Menart</span></a><span data-dcnode-id="7876" instrument_node="">, and </span><a data-dcnode-id="7874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tone_Pav%25C4%258Dek" title="Tone Pavček"><span data-dcnode-id="7875" instrument_node="">Tone Pavček</span></a><span data-dcnode-id="7873" instrument_node="">.
</span></td></tr><tr data-dcnode-id="7857"><td data-dcnode-id="7867"><span data-dcnode-id="7868" instrument_node="">12 May</span></td><td data-dcnode-id="7858"><span data-dcnode-id="7865" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="7863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slovenian_Peasant_Union" title="Slovenian Peasant Union"><span data-dcnode-id="7864" instrument_node="">Slovenian Peasant Union</span></a><span data-dcnode-id="7862" instrument_node=""> is formed in a mass meeting in Ljubljana as the first openly non-Communist political association in Yugoslavia. The event is usually considered as the beginning of the </span><a class="mw-redirect" data-dcnode-id="7860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slovenian_Spring" title="Slovenian Spring"><span data-dcnode-id="7861" instrument_node="">Slovenian Spring</span></a><span data-dcnode-id="7859" instrument_node="">.
</span></td></tr><tr data-dcnode-id="7839"><td data-dcnode-id="7853"><span data-dcnode-id="7854" instrument_node="">15 May</span></td><td data-dcnode-id="7840"><span data-dcnode-id="7851" instrument_node="">SFRY minister of defense Admiral </span><a data-dcnode-id="7849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Branko_Mamula" title="Branko Mamula"><span data-dcnode-id="7850" instrument_node="">Branko Mamula</span></a><span data-dcnode-id="7848" instrument_node=""> is fired because of his opposition to Milošević.</span><sup class="reference" data-dcnode-id="7845" id="cite_ref-9"><a data-dcnode-id="7846" href="#cite_note-9"><span data-dcnode-id="7847" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7844" instrument_node=""> </span><a data-dcnode-id="7842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veljko_Kadijevi%25C4%2587" title="Veljko Kadijević"><span data-dcnode-id="7843" instrument_node="">Veljko Kadijević</span></a><span data-dcnode-id="7841" instrument_node=""> takes his place as the new minister.
</span></td></tr><tr data-dcnode-id="7815"><td data-dcnode-id="7835"><span data-dcnode-id="7836" instrument_node="">31 May – 4 June</span></td><td data-dcnode-id="7816"><span data-dcnode-id="7833" instrument_node="">The JNA captures </span><a data-dcnode-id="7831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Janez_Jan%25C5%25A1a" title="Janez Janša"><span data-dcnode-id="7832" instrument_node="">Janez Janša</span></a><span data-dcnode-id="7830" instrument_node=""> and 3 other persons in </span><a class="mw-redirect" data-dcnode-id="7828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SR_Slovenia" title="SR Slovenia"><span data-dcnode-id="7829" instrument_node="">Slovenia</span></a><span data-dcnode-id="7827" instrument_node="">. Accusations are made about the discovery of a "state secret". The arrests provoke a national outcry in Slovenia.</span><sup class="reference" data-dcnode-id="7824" id="cite_ref-10"><a data-dcnode-id="7825" href="#cite_note-10"><span data-dcnode-id="7826" instrument_node="">[10]</span></a></sup><span data-dcnode-id="7823" instrument_node=""> During the so-called </span><a class="mw-redirect" data-dcnode-id="7821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ljubljana_trial" title="Ljubljana trial"><span data-dcnode-id="7822" instrument_node="">Ljubljana trial</span></a><span data-dcnode-id="7820" instrument_node="">, a </span><a class="mw-redirect" data-dcnode-id="7818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Committee_for_the_Protection_of_Human_Rights" title="Committee for the Protection of Human Rights"><span data-dcnode-id="7819" instrument_node="">Committee for the Protection of Human Rights</span></a><span data-dcnode-id="7817" instrument_node=""> is formed, which becomes the central civil society platform in Slovenia.
</span></td></tr><tr data-dcnode-id="7795"><td data-dcnode-id="7811"><span data-dcnode-id="7812" instrument_node="">27 September</span></td><td data-dcnode-id="7796"><a data-dcnode-id="7808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bo%25C5%25A1ko_Kruni%25C4%2587" title="Boško Krunić"><span data-dcnode-id="7809" instrument_node="">Boško Krunić</span></a><span data-dcnode-id="7807" instrument_node="">, a representative of </span><a data-dcnode-id="7805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Communists_of_Yugoslavia" title="League of Communists of Yugoslavia"><span data-dcnode-id="7806" instrument_node="">League of Communists of Yugoslavia</span></a><span data-dcnode-id="7804" instrument_node="">, and </span><a class="new" data-dcnode-id="7802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFranc_%25C5%25A0etinc%26action%3Dedit%26redlink%3D1" title="Franc Šetinc (page does not exist)"><span data-dcnode-id="7803" instrument_node="">Franc Šetinc</span></a><span data-dcnode-id="7801" instrument_node="">, a Slovenian member of the Yugoslav Communist Party Politburo, resign due to ethnic conflict between Serbs and Albanians.</span><sup class="reference" data-dcnode-id="7798" id="cite_ref-11"><a data-dcnode-id="7799" href="#cite_note-11"><span data-dcnode-id="7800" instrument_node="">[11]</span></a></sup><span data-dcnode-id="7797" instrument_node="">
</span></td></tr><tr data-dcnode-id="7784"><td data-dcnode-id="7791"><span data-dcnode-id="7792" instrument_node="">4 October</span></td><td data-dcnode-id="7785"><span data-dcnode-id="7789" instrument_node="">A crowd of people gathers in </span><a data-dcnode-id="7787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ba%25C4%258Dka_Palanka" title="Bačka Palanka"><span data-dcnode-id="7788" instrument_node="">Bačka Palanka</span></a><span data-dcnode-id="7786" instrument_node=""> to protest against the provincial government of Vojvodina.
</span></td></tr><tr data-dcnode-id="7770"><td data-dcnode-id="7780"><span data-dcnode-id="7781" instrument_node="">5 October</span></td><td data-dcnode-id="7771"><span data-dcnode-id="7778" instrument_node="">Under the control of Slobodan Milošević, </span><a data-dcnode-id="7776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mihalj_Kertes" title="Mihalj Kertes"><span data-dcnode-id="7777" instrument_node="">Mihalj Kertes</span></a><span data-dcnode-id="7775" instrument_node=""> and 100,000 men from Bačka Palanka and the rest of Serbia enter </span><a data-dcnode-id="7773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Novi_Sad" title="Novi Sad"><span data-dcnode-id="7774" instrument_node="">Novi Sad</span></a><span data-dcnode-id="7772" instrument_node="">, the capital of Vojvodina, to support protests against the government of Vojvodina.
</span></td></tr><tr data-dcnode-id="7755"><td data-dcnode-id="7766"><span data-dcnode-id="7767" instrument_node="">6 October</span></td><td data-dcnode-id="7756"><span data-dcnode-id="7764" instrument_node="">After the JNA refuses to disperse the crowd or protect the parliament building in Novi Sad, the entire parliament of Vojvodina resigns and is replaced with politicians loyal to Milošević.</span><sup class="reference" data-dcnode-id="7761" id="cite_ref-12"><a data-dcnode-id="7762" href="#cite_note-12"><span data-dcnode-id="7763" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7760" instrument_node=""> The structure of the Presidency of Yugoslavia changes by effectively giving </span><a class="mw-redirect" data-dcnode-id="7758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SR_Serbia" title="SR Serbia"><span data-dcnode-id="7759" instrument_node="">Serbia</span></a><span data-dcnode-id="7757" instrument_node=""> 2 votes out of 8.
</span></td></tr><tr data-dcnode-id="7737"><td data-dcnode-id="7751"><span data-dcnode-id="7752" instrument_node="">9 October</span></td><td data-dcnode-id="7738"><span data-dcnode-id="7749" instrument_node="">Montenegrin police intervene against protesters in </span><a class="mw-redirect" data-dcnode-id="7747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Titograd" title="Titograd"><span data-dcnode-id="7748" instrument_node="">Titograd</span></a><span data-dcnode-id="7746" instrument_node=""> and proclaim a </span><a data-dcnode-id="7744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_of_emergency" title="State of emergency"><span data-dcnode-id="7745" instrument_node="">state of emergency</span></a><span data-dcnode-id="7743" instrument_node="">.</span><sup class="reference" data-dcnode-id="7740" id="cite_ref-13"><a data-dcnode-id="7741" href="#cite_note-13"><span data-dcnode-id="7742" instrument_node="">[13]</span></a></sup><span data-dcnode-id="7739" instrument_node=""> This is seen by Serbia as an act of hostility.
</span></td></tr><tr data-dcnode-id="7720"><td data-dcnode-id="7733"><span data-dcnode-id="7734" instrument_node="">10 October</span></td><td data-dcnode-id="7721"><a class="mw-redirect" data-dcnode-id="7730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raif_Dizdarevic" title="Raif Dizdarevic"><span data-dcnode-id="7731" instrument_node="">Raif Dizdarevic</span></a><span data-dcnode-id="7729" instrument_node="">, president of </span><a class="mw-redirect" data-dcnode-id="7727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SFRY" title="SFRY"><span data-dcnode-id="7728" instrument_node="">SFRY</span></a><span data-dcnode-id="7726" instrument_node="">, warns that the crisis in Yugoslavia might lead to "extraordinary conditions". The President declares that the demonstrations against Communist Party leaders in various sections of the country are "negative events" which can lead to "unpredictable consequences".</span><sup class="reference" data-dcnode-id="7723" id="cite_ref-14"><a data-dcnode-id="7724" href="#cite_note-14"><span data-dcnode-id="7725" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7722" instrument_node="">
</span></td></tr><tr data-dcnode-id="7709"><td data-dcnode-id="7716"><span data-dcnode-id="7717" instrument_node="">17 October</span></td><td data-dcnode-id="7710"><span data-dcnode-id="7714" instrument_node="">A failed attempt by </span><a data-dcnode-id="7712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stipe_%25C5%25A0uvar" title="Stipe Šuvar"><span data-dcnode-id="7713" instrument_node="">Stipe Šuvar</span></a><span data-dcnode-id="7711" instrument_node=""> to oust Slobodan Milošević from the Yugoslav Central Committee takes place.
</span></td></tr><tr data-dcnode-id="7701"><td data-dcnode-id="7705"><span data-dcnode-id="7706" instrument_node="">November 1988</span></td><td data-dcnode-id="7702"><span data-dcnode-id="7703" instrument_node="">The number of Presidency members is reduced to 8; the Presidency position for the president of the Presidium of the League of Communists of Yugoslavia is abolished.
</span></td></tr><tr data-dcnode-id="7693"><td data-dcnode-id="7697"><span data-dcnode-id="7698" instrument_node="">17 November</span></td><td data-dcnode-id="7694"><span data-dcnode-id="7695" instrument_node="">Resignation of the Kosovo provincial government; politicians loyal to Slobodan Milošević are installed. This event triggers the first of many demonstrations by ethnic Albanians. The structure of the Presidency changes again, Serbia now effectively having 3 votes out of 8.
</span></td></tr><tr data-dcnode-id="7678"><td data-dcnode-id="7689"><span data-dcnode-id="7690" instrument_node="">18 November</span></td><td data-dcnode-id="7679"><span data-dcnode-id="7687" instrument_node="">A massive rally of almost one million people is held in </span><a data-dcnode-id="7685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belgrade" title="Belgrade"><span data-dcnode-id="7686" instrument_node="">Belgrade</span></a><span data-dcnode-id="7684" instrument_node=""> in support of Milošević's policies.</span><sup class="reference" data-dcnode-id="7681" id="cite_ref-15"><a data-dcnode-id="7682" href="#cite_note-15"><span data-dcnode-id="7683" instrument_node="">[15]</span></a></sup><span data-dcnode-id="7680" instrument_node="">
</span></td></tr><tr data-dcnode-id="7666"><td data-dcnode-id="7674"><span data-dcnode-id="7675" instrument_node="">19 November</span></td><td data-dcnode-id="7667"><span data-dcnode-id="7672" instrument_node="">About 100,000 ethnic Albanians, angered by Serbian removal of provincial leaders, march through the capital of Kosovo.</span><sup class="reference" data-dcnode-id="7669" id="cite_ref-16"><a data-dcnode-id="7670" href="#cite_note-16"><span data-dcnode-id="7671" instrument_node="">[16]</span></a></sup><span data-dcnode-id="7668" instrument_node="">
</span></td></tr><tr data-dcnode-id="7648"><td data-dcnode-id="7662"><span data-dcnode-id="7663" instrument_node="">28 November</span></td><td data-dcnode-id="7649"><span data-dcnode-id="7660" instrument_node="">1500 Croats protest the Yugoslav embassy in </span><a data-dcnode-id="7658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sydney" title="Sydney"><span data-dcnode-id="7659" instrument_node="">Sydney</span></a><span data-dcnode-id="7657" instrument_node="">, </span><a data-dcnode-id="7655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australia" title="Australia"><span data-dcnode-id="7656" instrument_node="">Australia</span></a><span data-dcnode-id="7654" instrument_node=""> to coincide with its Republic Day. A consulate worker shoots at and wounds a 16-year-old protester.</span><sup class="reference" data-dcnode-id="7651" id="cite_ref-17"><a data-dcnode-id="7652" href="#cite_note-17"><span data-dcnode-id="7653" instrument_node="">[17]</span></a></sup><span data-dcnode-id="7650" instrument_node=""> The consulate is subsequently closed the following week.
</span></td></tr><tr data-dcnode-id="7630"><td data-dcnode-id="7644"><span data-dcnode-id="7645" instrument_node="">31 December</span></td><td data-dcnode-id="7631"><span data-dcnode-id="7642" instrument_node="">Facing a foreign debt reaching 21 billion US dollars, a 15% unemployment rate and a </span><a class="mw-redirect" data-dcnode-id="7640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hyperinflation_in_the_Socialist_Federal_Republic_of_Yugoslavia" title="Hyperinflation in the Socialist Federal Republic of Yugoslavia"><span data-dcnode-id="7641" instrument_node="">250% rate of inflation</span></a><span data-dcnode-id="7639" instrument_node="">, the Yugoslav government of </span><a data-dcnode-id="7637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Branko_Mikuli%25C4%2587" title="Branko Mikulić"><span data-dcnode-id="7638" instrument_node="">Branko Mikulić</span></a><span data-dcnode-id="7636" instrument_node=""> resigns.</span><sup class="reference" data-dcnode-id="7633" id="cite_ref-18"><a data-dcnode-id="7634" href="#cite_note-18"><span data-dcnode-id="7635" instrument_node="">[18]</span></a></sup><span data-dcnode-id="7632" instrument_node="">

</span></th></tr><tr data-dcnode-id="7569"><td data-dcnode-id="7604"><span data-dcnode-id="7605" instrument_node="">10 January</span></td><td data-dcnode-id="7570"><span data-dcnode-id="7602" instrument_node="">Over 100,000 protesters gather in </span><a data-dcnode-id="7600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Podgorica" title="Podgorica"><span data-dcnode-id="7601" instrument_node="">Titograd</span></a><span data-dcnode-id="7599" instrument_node=""> to protest the regional government of </span><a class="mw-redirect" data-dcnode-id="7597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SR_Montenegro" title="SR Montenegro"><span data-dcnode-id="7598" instrument_node="">Montenegro</span></a><span data-dcnode-id="7596" instrument_node="">. Members resign the next day;</span><sup class="reference" data-dcnode-id="7593" id="cite_ref-19"><a data-dcnode-id="7594" href="#cite_note-19"><span data-dcnode-id="7595" instrument_node="">[19]</span></a></sup><span data-dcnode-id="7592" instrument_node=""> the new leadership consists of </span><a data-dcnode-id="7590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Momir_Bulatovi%25C4%2587" title="Momir Bulatović"><span data-dcnode-id="7591" instrument_node="">Momir Bulatović</span></a><span data-dcnode-id="7589" instrument_node="">, </span><a data-dcnode-id="7587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milo_%25C4%2590ukanovi%25C4%2587" title="Milo Đukanović"><span data-dcnode-id="7588" instrument_node="">Milo Đukanović</span></a><span data-dcnode-id="7586" instrument_node=""> and </span><a data-dcnode-id="7584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Svetozar_Marovi%25C4%2587" title="Svetozar Marović"><span data-dcnode-id="7585" instrument_node="">Svetozar Marović</span></a><span data-dcnode-id="7583" instrument_node="">, strongly allied with Milošević. The structure of the Yugoslav Presidency now effectively gives Serbia 4 out of 8 votes (the remaining votes belonging to </span><a class="mw-redirect" data-dcnode-id="7581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SR_Bosnia_and_Herzegovina" title="SR Bosnia and Herzegovina"><span data-dcnode-id="7582" instrument_node="">Bosnia and Herzegovina</span></a><span data-dcnode-id="7580" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SR_Croatia" title="SR Croatia"><span data-dcnode-id="7579" instrument_node="">Croatia</span></a><span data-dcnode-id="7577" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SR_Macedonia" title="SR Macedonia"><span data-dcnode-id="7576" instrument_node="">Macedonia</span></a><span data-dcnode-id="7574" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="7572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SR_Slovenia" title="SR Slovenia"><span data-dcnode-id="7573" instrument_node="">Slovenia</span></a><span data-dcnode-id="7571" instrument_node="">)
</span></td></tr><tr data-dcnode-id="7558"><td data-dcnode-id="7565"><span data-dcnode-id="7566" instrument_node="">11 January</span></td><td data-dcnode-id="7559"><span data-dcnode-id="7563" instrument_node="">The </span><a data-dcnode-id="7561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slovenian_Democratic_Union" title="Slovenian Democratic Union"><span data-dcnode-id="7562" instrument_node="">Slovenian Democratic Union</span></a><span data-dcnode-id="7560" instrument_node=""> is founded.
</span></td></tr><tr data-dcnode-id="7547"><td data-dcnode-id="7554"><span data-dcnode-id="7555" instrument_node="">16 February</span></td><td data-dcnode-id="7548"><span data-dcnode-id="7552" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="7550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_Democratic_Union_of_Slovenia" title="Social Democratic Union of Slovenia"><span data-dcnode-id="7551" instrument_node="">Social Democratic Union of Slovenia</span></a><span data-dcnode-id="7549" instrument_node=""> is founded.
</span></td></tr><tr data-dcnode-id="7530"><td data-dcnode-id="7543"><span data-dcnode-id="7544" instrument_node="">20 February</span></td><td data-dcnode-id="7531"><span data-dcnode-id="7541" instrument_node="">Albanian workers in the </span><a data-dcnode-id="7539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trep%25C4%258Da_Mines" title="Trepča Mines"><span data-dcnode-id="7540" instrument_node="">Trepca mine</span></a><span data-dcnode-id="7538" instrument_node=""> (near </span><a class="mw-redirect" data-dcnode-id="7536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosovska_Mitrovica" title="Kosovska Mitrovica"><span data-dcnode-id="7537" instrument_node="">Kosovska Mitrovica</span></a><span data-dcnode-id="7535" instrument_node="">) go on </span><a data-dcnode-id="7533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strike_action" title="Strike action"><span data-dcnode-id="7534" instrument_node="">strike</span></a><span data-dcnode-id="7532" instrument_node="">.
</span></td></tr><tr data-dcnode-id="7522"><td data-dcnode-id="7526"><span data-dcnode-id="7527" instrument_node="">27 February</span></td><td data-dcnode-id="7523"><span data-dcnode-id="7524" instrument_node="">The Yugoslav Presidency declares a state of emergency in Kosovo due to Albanian protests.
</span></td></tr><tr data-dcnode-id="7509"><td data-dcnode-id="7518"><span data-dcnode-id="7519" instrument_node="">28 February</span></td><td data-dcnode-id="7510"><a data-dcnode-id="7515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franjo_Tu%25C4%2591man" title="Franjo Tuđman"><span data-dcnode-id="7516" instrument_node="">Franjo Tuđman</span></a><span data-dcnode-id="7514" instrument_node=""> made a public appearance in the building of the Writer's Association of Croatia, delivering a speech outlining the political programme of what would become the </span><a data-dcnode-id="7512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Croatian_Democratic_Union" title="Croatian Democratic Union"><span data-dcnode-id="7513" instrument_node="">Croatian Democratic Union</span></a><span data-dcnode-id="7511" instrument_node="">.
</span></td></tr><tr data-dcnode-id="7498"><td data-dcnode-id="7505"><span data-dcnode-id="7506" instrument_node="">1 March</span></td><td data-dcnode-id="7499"><span data-dcnode-id="7503" instrument_node="">Arrest of </span><a data-dcnode-id="7501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Azem_Vllasi" title="Azem Vllasi"><span data-dcnode-id="7502" instrument_node="">Azem Vllasi</span></a><span data-dcnode-id="7500" instrument_node="">.
</span></td></tr><tr data-dcnode-id="7487"><td data-dcnode-id="7494"><span data-dcnode-id="7495" instrument_node="">4 March</span></td><td data-dcnode-id="7488"><span data-dcnode-id="7492" instrument_node="">The Serbian Writers Association discusses hate towards Serbs in Croatia, Kosovo and Slovenia. At this meeting Vuk Drašković mentions "</span><a data-dcnode-id="7490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greater_Serbia" title="Greater Serbia"><span data-dcnode-id="7491" instrument_node="">Serbian western frontiers</span></a><span data-dcnode-id="7489" instrument_node="">".
</span></td></tr><tr data-dcnode-id="7476"><td data-dcnode-id="7483"><span data-dcnode-id="7484" instrument_node="">10 March</span></td><td data-dcnode-id="7477"><span data-dcnode-id="7481" instrument_node="">The </span><a data-dcnode-id="7479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slovene_Christian_Democrats" title="Slovene Christian Democrats"><span data-dcnode-id="7480" instrument_node="">Slovene Christian Social Movement</span></a><span data-dcnode-id="7478" instrument_node=""> is founded.
</span></td></tr><tr data-dcnode-id="7453"><td data-dcnode-id="7472"><span data-dcnode-id="7473" instrument_node="">16 March</span></td><td data-dcnode-id="7454"><a data-dcnode-id="7469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ante_Markovi%25C4%2587" title="Ante Marković"><span data-dcnode-id="7470" instrument_node="">Ante Marković</span></a><span data-dcnode-id="7468" instrument_node=""> is new prime minister of Yugoslavia, after earlier </span><a data-dcnode-id="7466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slobodan_Milo%25C5%25A1evi%25C4%2587" title="Slobodan Milošević"><span data-dcnode-id="7467" instrument_node="">Slobodan Milošević</span></a><span data-dcnode-id="7465" instrument_node=""> has rejected that position offered to him by Minister of Defence </span><a data-dcnode-id="7463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veljko_Kadijevi%25C4%2587" title="Veljko Kadijević"><span data-dcnode-id="7464" instrument_node="">Veljko Kadijević</span></a><span data-dcnode-id="7462" instrument_node="">. </span><a data-dcnode-id="7460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BBC" title="BBC"><span data-dcnode-id="7461" instrument_node="">BBC</span></a><span data-dcnode-id="7459" instrument_node=""> will call Marković "Washington's best ally in Yugoslavia" </span><sup class="reference" data-dcnode-id="7456" id="cite_ref-20"><a data-dcnode-id="7457" href="#cite_note-20"><span data-dcnode-id="7458" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7455" instrument_node="">
</span></td></tr><tr data-dcnode-id="7439"><td data-dcnode-id="7449"><span data-dcnode-id="7450" instrument_node="">28 March</span></td><td data-dcnode-id="7440"><span data-dcnode-id="7447" instrument_node="">With the Serbian change of constitution, Yugoslav provinces </span><a class="mw-redirect" data-dcnode-id="7445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SAP_Vojvodina" title="SAP Vojvodina"><span data-dcnode-id="7446" instrument_node="">Vojvodina</span></a><span data-dcnode-id="7444" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="7442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SAP_Kosovo" title="SAP Kosovo"><span data-dcnode-id="7443" instrument_node="">Kosovo</span></a><span data-dcnode-id="7441" instrument_node=""> have autonomy abolished, but retain a seat in the presidency of Yugoslavia.
</span></td></tr><tr data-dcnode-id="7429"><td data-dcnode-id="7435"><span data-dcnode-id="7436" instrument_node="">8 May</span></td><td data-dcnode-id="7430"><a data-dcnode-id="7432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slobodan_Milo%25C5%25A1evi%25C4%2587" title="Slobodan Milošević"><span data-dcnode-id="7433" instrument_node="">Slobodan Milošević</span></a><span data-dcnode-id="7431" instrument_node=""> becomes president of Serbia.
</span></td></tr><tr data-dcnode-id="7409"><td data-dcnode-id="7425"><span data-dcnode-id="7426" instrument_node="">8 May</span></td><td data-dcnode-id="7410"><span data-dcnode-id="7423" instrument_node="">Slovenian opposition parties and the Slovenian Writer's Association issue a joint manifesto, known as the </span><a class="new" data-dcnode-id="7421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMay_Declaration_%281989%29%26action%3Dedit%26redlink%3D1" title="May Declaration (1989) (page does not exist)"><span data-dcnode-id="7422" instrument_node="">May Declaration</span></a><span data-dcnode-id="7420" instrument_node="">, demanding a sovereign and democratic Slovenian </span><a data-dcnode-id="7418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nation_state" title="Nation state"><span data-dcnode-id="7419" instrument_node="">nation state</span></a><span data-dcnode-id="7417" instrument_node="">. The Declaration is publicly read by the poet </span><a data-dcnode-id="7415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tone_Pav%25C4%258Dek" title="Tone Pavček"><span data-dcnode-id="7416" instrument_node="">Tone Pavček</span></a><span data-dcnode-id="7414" instrument_node=""> in a mass demonstration on Ljubljana's central </span><a data-dcnode-id="7412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Congress_Square" title="Congress Square"><span data-dcnode-id="7413" instrument_node="">Congress Square</span></a><span data-dcnode-id="7411" instrument_node="">.
</span></td></tr><tr data-dcnode-id="7398"><td data-dcnode-id="7405"><span data-dcnode-id="7406" instrument_node="">29 May</span></td><td data-dcnode-id="7399"><span data-dcnode-id="7403" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="7401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Croatian_Social_Liberal_Union" title="Croatian Social Liberal Union"><span data-dcnode-id="7402" instrument_node="">Croatian Social Liberal Union</span></a><span data-dcnode-id="7400" instrument_node=""> is founded.

</span></td></tr><tr data-dcnode-id="5921"><td data-dcnode-id="5928"><span data-dcnode-id="5929" instrument_node="">9 December</span></td><td data-dcnode-id="5922"><span data-dcnode-id="5926" instrument_node="">The </span><a data-dcnode-id="5924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Communists_of_Montenegro" title="League of Communists of Montenegro"><span data-dcnode-id="5925" instrument_node="">League of Communists of Montenegro</span></a><span data-dcnode-id="5923" instrument_node=""> wins the first Montenegro multiparty elections.
</span></td></tr><tr data-dcnode-id="5890"><td data-dcnode-id="5917"><span data-dcnode-id="5918" instrument_node="">21 December</span></td><td data-dcnode-id="5891"><span data-dcnode-id="5915" instrument_node="">In </span><a data-dcnode-id="5913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Knin" title="Knin"><span data-dcnode-id="5914" instrument_node="">Knin</span></a><span data-dcnode-id="5912" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="5910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbian_National_Council_in_Croatia_%281990%29" title="Serbian National Council in Croatia (1990)"><span data-dcnode-id="5911" instrument_node="">Serbian National Council</span></a><span data-dcnode-id="5909" instrument_node=""> proclaims the creation of </span><a class="mw-redirect" data-dcnode-id="5907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbian_Autonomous_Oblast_of_Krajina" title="Serbian Autonomous Oblast of Krajina"><span data-dcnode-id="5908" instrument_node="">Serbian Autonomous Oblast of Krajina</span></a><span data-dcnode-id="5906" instrument_node="">, covering municipalities in the regions of </span><a class="mw-redirect" data-dcnode-id="5904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Dalmatia" title="Northern Dalmatia"><span data-dcnode-id="5905" instrument_node="">Northern Dalmatia</span></a><span data-dcnode-id="5903" instrument_node=""> and </span><a data-dcnode-id="5901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lika" title="Lika"><span data-dcnode-id="5902" instrument_node="">Lika</span></a><span data-dcnode-id="5900" instrument_node="">, in south-western Croatia, within Yugoslavia.</span><sup class="reference" data-dcnode-id="5897" id="cite_ref-icty-martic-summary_29-3"><a data-dcnode-id="5898" href="#cite_note-icty-martic-summary-29"><span data-dcnode-id="5899" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5896" instrument_node=""> The same month, Babić became the President of the Temporary Executive Council of the SAO Krajina.</span><sup class="reference" data-dcnode-id="5893" id="cite_ref-icty-babic-judgement_35-1"><a data-dcnode-id="5894" href="#cite_note-icty-babic-judgement-35"><span data-dcnode-id="5895" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5892" instrument_node="">
</span></td></tr><tr data-dcnode-id="5872"><td data-dcnode-id="5886"><span data-dcnode-id="5887" instrument_node="">22 December</span></td><td data-dcnode-id="5873"><span data-dcnode-id="5884" instrument_node="">The Croatian Parliament votes for a new constitution according to which Croatia is defined as a "national state of the Croatian nation and a state of members of other nations or minorities who are citizens".</span><sup class="reference" data-dcnode-id="5881" id="cite_ref-icty-martic-summary_29-4"><a data-dcnode-id="5882" href="#cite_note-icty-martic-summary-29"><span data-dcnode-id="5883" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5880" instrument_node=""> Removing the Serbs' name from the constitution creates an outcry among the Serb minority in Croatia. Parliament visitors during vote include </span><a data-dcnode-id="5878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milan_Ku%25C4%258Dan" title="Milan Kučan"><span data-dcnode-id="5879" instrument_node="">Milan Kučan</span></a><span data-dcnode-id="5877" instrument_node=""> president of Slovenia and </span><a data-dcnode-id="5875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alija_Izetbegovi%25C4%2587" title="Alija Izetbegović"><span data-dcnode-id="5876" instrument_node="">Alija Izetbegović</span></a><span data-dcnode-id="5874" instrument_node=""> president of Bosnia and Herzegovina.
</span></td></tr><tr data-dcnode-id="5861"><td data-dcnode-id="5868"><span data-dcnode-id="5869" instrument_node="">23 December</span></td><td data-dcnode-id="5862"><span data-dcnode-id="5866" instrument_node="">The </span><a data-dcnode-id="5864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_Party_of_Serbia" title="Socialist Party of Serbia"><span data-dcnode-id="5865" instrument_node="">Socialist Party of Serbia</span></a><span data-dcnode-id="5863" instrument_node=""> receives 192 out of 250 seats in the Serbian Parliament.
</span></td></tr><tr data-dcnode-id="5851"><td data-dcnode-id="5857"><span data-dcnode-id="5858" instrument_node="">23 December</span></td><td data-dcnode-id="5852"><a data-dcnode-id="5854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Momir_Bulatovi%25C4%2587" title="Momir Bulatović"><span data-dcnode-id="5855" instrument_node="">Momir Bulatović</span></a><span data-dcnode-id="5853" instrument_node="">, having received his position after the January coup, is elected president of Montenegro with 76.9% of the vote.
</span></td></tr><tr data-dcnode-id="5833"><td data-dcnode-id="5847"><span data-dcnode-id="5848" instrument_node="">23 December</span></td><td data-dcnode-id="5834"><span data-dcnode-id="5845" instrument_node="">In the </span><a class="mw-redirect" data-dcnode-id="5843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slovenian_independence_referendum%2C_1990" title="Slovenian independence referendum, 1990"><span data-dcnode-id="5844" instrument_node="">Slovenian independence referendum</span></a><span data-dcnode-id="5842" instrument_node="">, 88.5% of the overall electorate (94.8% of votes), with the turnout of 93.3%, supported independence of the country.</span><sup class="reference" data-dcnode-id="5839" id="cite_ref-Juberias_44-0"><a data-dcnode-id="5840" href="#cite_note-Juberias-44"><span data-dcnode-id="5841" instrument_node="">[44]</span></a></sup><sup class="reference" data-dcnode-id="5836" id="cite_ref-STAT11_45-0"><a data-dcnode-id="5837" href="#cite_note-STAT11-45"><span data-dcnode-id="5838" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5835" instrument_node="">
</span></td></tr><tr data-dcnode-id="5811"><td data-dcnode-id="5829"><span data-dcnode-id="5830" instrument_node="">26 December</span></td><td data-dcnode-id="5812"><span data-dcnode-id="5827" instrument_node="">Serbia takes  1.8 billion US dollars (2.5 billion </span><a data-dcnode-id="5825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deutsche_Mark" title="Deutsche Mark"><span data-dcnode-id="5826" instrument_node="">Deutsche Mark</span></a><span data-dcnode-id="5824" instrument_node="">) in local currency (</span><a data-dcnode-id="5822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslav_dinar" title="Yugoslav dinar"><span data-dcnode-id="5823" instrument_node="">Yugoslav dinar</span></a><span data-dcnode-id="5821" instrument_node="">) from the Yugoslav Central Bank.</span><sup class="reference" data-dcnode-id="5818" id="cite_ref-46"><a data-dcnode-id="5819" href="#cite_note-46"><span data-dcnode-id="5820" instrument_node="">[46]</span></a></sup><span data-dcnode-id="5817" instrument_node=""> Under pressure from the other republics and the World Bank 1.5 billion Deutsche Mark are later returned.</span><sup class="reference" data-dcnode-id="5814" id="cite_ref-47"><a data-dcnode-id="5815" href="#cite_note-47"><span data-dcnode-id="5816" instrument_node="">[47]</span></a></sup><span data-dcnode-id="5813" instrument_node="">
</span></td></tr><tr data-dcnode-id="5800"><td data-dcnode-id="5807"><span data-dcnode-id="5808" instrument_node="">31 December</span></td><td data-dcnode-id="5801"><span data-dcnode-id="5805" instrument_node="">The Constitutional court of Croatia declares that </span><a data-dcnode-id="5803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SAO_Krajina" title="SAO Krajina"><span data-dcnode-id="5804" instrument_node="">SAO Krajina</span></a><span data-dcnode-id="5802" instrument_node=""> does not exist in a legal sense.
</span></td></tr><tr data-dcnode-id="5788"><td data-dcnode-id="5796"><span data-dcnode-id="5797" instrument_node="">31 December</span></td><td data-dcnode-id="5789"><span data-dcnode-id="5794" instrument_node="">Yugoslav industrial output falls 18.2% in 1990.</span><sup class="reference" data-dcnode-id="5791" id="cite_ref-48"><a data-dcnode-id="5792" href="#cite_note-48"><span data-dcnode-id="5793" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5790" instrument_node="">

</span></th></tr><tr data-dcnode-id="5758"><td data-dcnode-id="5762"><span data-dcnode-id="5763" instrument_node="">4 January</span></td><td data-dcnode-id="5759"><span data-dcnode-id="5760" instrument_node="">The Croatian government creates a defense council.
</span></td></tr><tr data-dcnode-id="5750"><td data-dcnode-id="5754"><span data-dcnode-id="5755" instrument_node="">4 January</span></td><td data-dcnode-id="5751"><span data-dcnode-id="5752" instrument_node="">Creation of Krajina police forces.
</span></td></tr><tr data-dcnode-id="5740"><td data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">4 January</span></td><td data-dcnode-id="5741"><a data-dcnode-id="5743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veljko_Kadijevi%25C4%2587" title="Veljko Kadijević"><span data-dcnode-id="5744" instrument_node="">Veljko Kadijević</span></a><span data-dcnode-id="5742" instrument_node="">, Yugoslav minister of defense, demands from Yugoslav president of presidency Borisav Jović that nations and not republics vote for staying in or leaving Yugoslavia.
</span></td></tr><tr data-dcnode-id="5729"><td data-dcnode-id="5736"><span data-dcnode-id="5737" instrument_node="">7 January</span></td><td data-dcnode-id="5730"><span data-dcnode-id="5734" instrument_node="">A group of political leaders of local Serbs from eastern regions of Croatia decided to create a regional political body, the </span><a class="mw-redirect" data-dcnode-id="5732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbian_National_Council_of_Slavonia%2C_Baranja_and_Western_Syrmia" title="Serbian National Council of Slavonia, Baranja and Western Syrmia"><span data-dcnode-id="5733" instrument_node="">Serbian National Council of Slavonia, Baranja and Western Syrmia</span></a><span data-dcnode-id="5731" instrument_node="">
</span></td></tr><tr data-dcnode-id="5718"><td data-dcnode-id="5725"><span data-dcnode-id="5726" instrument_node="">9 January</span></td><td data-dcnode-id="5719"><span data-dcnode-id="5723" instrument_node="">Yugoslav president of the Presidency </span><a data-dcnode-id="5721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Borisav_Jovi%25C4%2587" title="Borisav Jović"><span data-dcnode-id="5722" instrument_node="">Borisav Jović</span></a><span data-dcnode-id="5720" instrument_node=""> demands that the Presidency vote for use of the JNA against Croatia and Slovenia. All 3 Presidency members under Serbian control (Kosovo, Serbia and Vojvodina) and the member from Montenegro vote for the use of force, but members of the Presidency from the other republics (Bosnia and Herzegovina, Croatia, Macedonia and Slovenia) vote against the use of force.
</span></td></tr><tr data-dcnode-id="5710"><td data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">10 January</span></td><td data-dcnode-id="5711"><span data-dcnode-id="5712" instrument_node="">After a meeting of the Yugoslav Presidency with the JNA, the army is authorized to take weapons from "paramilitary forces".
</span></td></tr><tr data-dcnode-id="5692"><td data-dcnode-id="5706"><span data-dcnode-id="5707" instrument_node="">10 January</span></td><td data-dcnode-id="5693"><span data-dcnode-id="5704" instrument_node="">Because of his vote on 9 January, </span><a data-dcnode-id="5702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radovan_Karad%25C5%25BEi%25C4%2587" title="Radovan Karadžić"><span data-dcnode-id="5703" instrument_node="">Radovan Karadžić</span></a><span data-dcnode-id="5701" instrument_node=""> demands the resignation of </span><a data-dcnode-id="5699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bogi%25C4%2587_Bogi%25C4%2587evi%25C4%2587" title="Bogić Bogićević"><span data-dcnode-id="5700" instrument_node="">Bogić Bogićević</span></a><span data-dcnode-id="5698" instrument_node="">, a Bosnian Serb elected in a 25 June 1989 referendum to represent Bosnia and Herzegovina in the Yugoslav Presidency.</span><sup class="reference" data-dcnode-id="5695" id="cite_ref-autogenerated3_49-0"><a data-dcnode-id="5696" href="#cite_note-autogenerated3-49"><span data-dcnode-id="5697" instrument_node="">[49]</span></a></sup><span data-dcnode-id="5694" instrument_node="">
</span></td></tr><tr data-dcnode-id="5684"><td data-dcnode-id="5688"><span data-dcnode-id="5689" instrument_node="">15 January</span></td><td data-dcnode-id="5685"><span data-dcnode-id="5686" instrument_node="">Veljko Kadijević declares that the Serbs of Croatia are relinquishing their weapons, but Croats are not.
</span></td></tr><tr data-dcnode-id="5666"><td data-dcnode-id="5680"><span data-dcnode-id="5681" instrument_node="">January</span></td><td data-dcnode-id="5667"><span data-dcnode-id="5678" instrument_node="">The SAO Krajina established the "Regional Secretariat for Internal Affairs" in Knin, and </span><a data-dcnode-id="5676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milan_Marti%25C4%2587" title="Milan Martić"><span data-dcnode-id="5677" instrument_node="">Milan Martić</span></a><span data-dcnode-id="5675" instrument_node=""> was appointed Secretary of Internal Affairs. The government of Croatia was informed that the </span><a class="mw-redirect" data-dcnode-id="5673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Croatian_police" title="Croatian police"><span data-dcnode-id="5674" instrument_node="">Croatian police</span></a><span data-dcnode-id="5672" instrument_node=""> would no longer be considered as having authority within SAO Krajina.</span><sup class="reference" data-dcnode-id="5669" id="cite_ref-icty-martic-summary_29-5"><a data-dcnode-id="5670" href="#cite_note-icty-martic-summary-29"><span data-dcnode-id="5671" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5668" instrument_node="">
</span></td></tr><tr data-dcnode-id="5654"><td data-dcnode-id="5662"><span data-dcnode-id="5663" instrument_node="">24 January</span></td><td data-dcnode-id="5655"><span data-dcnode-id="5660" instrument_node="">The Croatian constitution declares that the Yugoslav Presidency decision of 10 January is illegal and that Croatia must protect itself and its citizens.</span><sup class="reference" data-dcnode-id="5657" id="cite_ref-50"><a data-dcnode-id="5658" href="#cite_note-50"><span data-dcnode-id="5659" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5656" instrument_node="">
</span></td></tr><tr data-dcnode-id="5642"><td data-dcnode-id="5650"><span data-dcnode-id="5651" instrument_node="">February</span></td><td data-dcnode-id="5643"><span data-dcnode-id="5648" instrument_node="">Council of Europe has voted that, to join Europe Yugoslavia would have to resolve its crisis peacefully and hold elections for the Federal Parliament.</span><sup class="reference" data-dcnode-id="5645" id="cite_ref-51"><a data-dcnode-id="5646" href="#cite_note-51"><span data-dcnode-id="5647" instrument_node="">[51]</span></a></sup><span data-dcnode-id="5644" instrument_node="">
</span></td></tr><tr data-dcnode-id="5630"><td data-dcnode-id="5638"><span data-dcnode-id="5639" instrument_node="">21 February</span></td><td data-dcnode-id="5631"><span data-dcnode-id="5636" instrument_node="">The Slovenian parliament approves legislation to take over banking and defense from the Yugoslav central government.</span><sup class="reference" data-dcnode-id="5633" id="cite_ref-52"><a data-dcnode-id="5634" href="#cite_note-52"><span data-dcnode-id="5635" instrument_node="">[52]</span></a></sup><span data-dcnode-id="5632" instrument_node="">
</span></td></tr><tr data-dcnode-id="5618"><td data-dcnode-id="5626"><span data-dcnode-id="5627" instrument_node="">21 February</span></td><td data-dcnode-id="5619"><span data-dcnode-id="5624" instrument_node="">After receiving news of the Slovenian parliament's decision to start legal actions for independence and for the possible creation of new union of independent states, the Croatian parliament makes a similar decision.</span><sup class="reference" data-dcnode-id="5621" id="cite_ref-53"><a data-dcnode-id="5622" href="#cite_note-53"><span data-dcnode-id="5623" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5620" instrument_node="">
</span></td></tr><tr data-dcnode-id="5610"><td data-dcnode-id="5614"><span data-dcnode-id="5615" instrument_node="">22 February</span></td><td data-dcnode-id="5611"><span data-dcnode-id="5612" instrument_node="">The Parliament of Pakrac municipality, with a relative majority of Serbs, votes to enter Krajina.
</span></td></tr><tr data-dcnode-id="5595"><td data-dcnode-id="5606"><span data-dcnode-id="5607" instrument_node="">22 February</span></td><td data-dcnode-id="5596"><span data-dcnode-id="5604" instrument_node="">"Armed Serbs in </span><a data-dcnode-id="5602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pakrac" title="Pakrac"><span data-dcnode-id="5603" instrument_node="">Pakrac</span></a><span data-dcnode-id="5601" instrument_node=""> took control of the police station and disarmed 16 Croatian policemen".</span><sup class="reference" data-dcnode-id="5598" id="cite_ref-query.nytimes.com_54-0"><a data-dcnode-id="5599" href="#cite_note-query.nytimes.com-54"><span data-dcnode-id="5600" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5597" instrument_node="">
</span></td></tr><tr data-dcnode-id="5578"><td data-dcnode-id="5591"><span data-dcnode-id="5592" instrument_node="">26 February</span></td><td data-dcnode-id="5579"><span data-dcnode-id="5589" instrument_node="">The Serbian national council of </span><a class="mw-redirect" data-dcnode-id="5587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Slavonia%2C_Baranja_and_Western_Srem" title="Eastern Slavonia, Baranja and Western Srem"><span data-dcnode-id="5588" instrument_node="">Baranja</span></a><span data-dcnode-id="5586" instrument_node="">, </span><a data-dcnode-id="5584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vukovar-Syrmia_County" title="Vukovar-Syrmia County"><span data-dcnode-id="5585" instrument_node="">Western Syrmia</span></a><span data-dcnode-id="5583" instrument_node=""> and </span><a data-dcnode-id="5581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavonia" title="Slavonia"><span data-dcnode-id="5582" instrument_node="">Slavonia</span></a><span data-dcnode-id="5580" instrument_node=""> votes that if Croatia leaves Yugoslavia then the territory under council control will separate from Croatia.
</span></td></tr><tr data-dcnode-id="5564"><td data-dcnode-id="5574"><span data-dcnode-id="5575" instrument_node="">28 February</span></td><td data-dcnode-id="5565"><span data-dcnode-id="5572" instrument_node="">The Serbian national council of </span><a data-dcnode-id="5570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SAO_Krajina" title="SAO Krajina"><span data-dcnode-id="5571" instrument_node="">SAO Krajina</span></a><span data-dcnode-id="5569" instrument_node=""> votes that Krajina will stay in Yugoslavia and expresses the wish for a peaceful separation of Croatia and SAO Krajina. </span><a class="external autonumber" data-dcnode-id="5567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.phrkkz.hr/Kronologija/1991-1.php" rel="nofollow"><span data-dcnode-id="5568" instrument_node="">[2]</span></a><span data-dcnode-id="5566" instrument_node="">
</span></td></tr><tr data-dcnode-id="5540"><td data-dcnode-id="5560"><span data-dcnode-id="5561" instrument_node="">1 March</span></td><td data-dcnode-id="5541"><a data-dcnode-id="5557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pakrac_clash" title="Pakrac clash"><span data-dcnode-id="5558" instrument_node="">Pakrac clash</span></a><span data-dcnode-id="5556" instrument_node=""> - Pakrac police station was regained by the Croatian police because of a counterattack.</span><sup class="reference" data-dcnode-id="5553" id="cite_ref-query.nytimes.com_54-1"><a data-dcnode-id="5554" href="#cite_note-query.nytimes.com-54"><span data-dcnode-id="5555" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="5550" id="cite_ref-55"><a data-dcnode-id="5551" href="#cite_note-55"><span data-dcnode-id="5552" instrument_node="">[55]</span></a></sup><span data-dcnode-id="5549" instrument_node=""> The first shots of the </span><a class="mw-redirect" data-dcnode-id="5547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslav_wars" title="Yugoslav wars"><span data-dcnode-id="5548" instrument_node="">Yugoslav wars</span></a><span data-dcnode-id="5546" instrument_node=""> were fired in Pakrac on this day.</span><sup class="reference" data-dcnode-id="5543" id="cite_ref-56"><a data-dcnode-id="5544" href="#cite_note-56"><span data-dcnode-id="5545" instrument_node="">[56]</span></a></sup><span data-dcnode-id="5542" instrument_node="">
</span></td></tr><tr data-dcnode-id="5526"><td data-dcnode-id="5536"><span data-dcnode-id="5537" instrument_node="">3 March</span></td><td data-dcnode-id="5527"><a data-dcnode-id="5533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pakrac_clash" title="Pakrac clash"><span data-dcnode-id="5534" instrument_node="">Pakrac clash</span></a><span data-dcnode-id="5532" instrument_node=""> - The Yugoslav army is deployed to stop fighting between Serbian villagers (who have seized control of a police station in Pakrac) and a Croatian police unit which has restored control of the police station and town.</span><sup class="reference" data-dcnode-id="5529" id="cite_ref-query.nytimes.com_54-2"><a data-dcnode-id="5530" href="#cite_note-query.nytimes.com-54"><span data-dcnode-id="5531" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5528" instrument_node=""> Although no one is killed during the fighting this event marks the beginning of the Croatian War of Independence.
</span></td></tr><tr data-dcnode-id="5514"><td data-dcnode-id="5522"><span data-dcnode-id="5523" instrument_node="">9 March</span></td><td data-dcnode-id="5515"><span data-dcnode-id="5520" instrument_node="">Beginning of large student demonstrations in Belgrade.  The Presidency authorizes the JNA to protect important buildings but on this pretext the JNA also attacks demonstrators.</span><sup class="reference" data-dcnode-id="5517" id="cite_ref-57"><a data-dcnode-id="5518" href="#cite_note-57"><span data-dcnode-id="5519" instrument_node="">[57]</span></a></sup><span data-dcnode-id="5516" instrument_node="">
</span></td></tr><tr data-dcnode-id="5493"><td data-dcnode-id="5510"><span data-dcnode-id="5511" instrument_node="">12 March</span></td><td data-dcnode-id="5494"><span data-dcnode-id="5508" instrument_node="">Meeting of Yugoslav presidency in JNA Headquarters during demonstrations. The JNA demands that a war situation be declared. The vote replicates that of 9 January, with presidency members under Milošević control voting for war and  others against (4:4). After the vote important members of the Yugoslav army go on "diplomatic" missions to </span><a data-dcnode-id="5506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/France" title="France"><span data-dcnode-id="5507" instrument_node="">France</span></a><span data-dcnode-id="5505" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="5503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UK" title="UK"><span data-dcnode-id="5504" instrument_node="">UK</span></a><span data-dcnode-id="5502" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="5500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USSR" title="USSR"><span data-dcnode-id="5501" instrument_node="">USSR</span></a><span data-dcnode-id="5499" instrument_node="">.</span><sup class="reference" data-dcnode-id="5496" id="cite_ref-autogenerated3_49-1"><a data-dcnode-id="5497" href="#cite_note-autogenerated3-49"><span data-dcnode-id="5498" instrument_node="">[49]</span></a></sup><span data-dcnode-id="5495" instrument_node="">
</span></td></tr><tr data-dcnode-id="5481"><td data-dcnode-id="5489"><span data-dcnode-id="5490" instrument_node="">15 March</span></td><td data-dcnode-id="5482"><span data-dcnode-id="5487" instrument_node="">Speaking on Serbian State Television, Slobodan Milošević declares: "Yugoslavia does not exist any more".</span><sup class="reference" data-dcnode-id="5484" id="cite_ref-BS21_30-1"><a data-dcnode-id="5485" href="#cite_note-BS21-30"><span data-dcnode-id="5486" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5483" instrument_node="">
</span></td></tr><tr data-dcnode-id="5469"><td data-dcnode-id="5477"><span data-dcnode-id="5478" instrument_node="">17 March</span></td><td data-dcnode-id="5470"><span data-dcnode-id="5475" instrument_node="">After the Serbian resolution is defeated in a Yugoslav Presidency vote, Slobodan Milošević orders the mobilization of Serbian special forces and declares "Serbia will not recognize any decisions by the Presidency of Yugoslavia".</span><sup class="reference" data-dcnode-id="5472" id="cite_ref-58"><a data-dcnode-id="5473" href="#cite_note-58"><span data-dcnode-id="5474" instrument_node="">[58]</span></a></sup><span data-dcnode-id="5471" instrument_node="">
