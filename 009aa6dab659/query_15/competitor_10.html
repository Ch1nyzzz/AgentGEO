</span></th></tr><tr data-dcnode-id="4679"><td data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">3–6 January</span></td><td data-dcnode-id="4680"><a class="mw-redirect" data-dcnode-id="4686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarajevo_Agreement" title="Sarajevo Agreement"><span data-dcnode-id="4687" instrument_node="">Sarajevo Agreement</span></a><span data-dcnode-id="4685" instrument_node="">: a ceasefire agreement between Croatia on one side and Serbia and Serbian rebels on the other side - holds. Around 10,000 UN soldiers are to arrive shortly to prevent future warfare in Croatian territory.</span><sup class="reference" data-dcnode-id="4682" id="cite_ref-autogenerated2_75-8"><a data-dcnode-id="4683" href="#cite_note-autogenerated2-75"><span data-dcnode-id="4684" instrument_node="">[75]</span></a></sup><span data-dcnode-id="4681" instrument_node="">
</span></td></tr><tr data-dcnode-id="4660"><td data-dcnode-id="4675"><span data-dcnode-id="4676" instrument_node="">7 January</span></td><td data-dcnode-id="4661"><span data-dcnode-id="4673" instrument_node="">A Yugoslav Mig aircraft </span><a data-dcnode-id="4671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1992_European_Community_Monitor_Mission_helicopter_downing" title="1992 European Community Monitor Mission helicopter downing"><span data-dcnode-id="4672" instrument_node="">attacks and destroys 1 of 2 EC monitoring mission helicopters</span></a><span data-dcnode-id="4670" instrument_node=""> with 5 crew members on board.</span><sup class="reference" data-dcnode-id="4667" id="cite_ref-81"><a data-dcnode-id="4668" href="#cite_note-81"><span data-dcnode-id="4669" instrument_node="">[81]</span></a></sup><span data-dcnode-id="4666" instrument_node=""> Soon afterward the Yugoslav defence minister resigns.</span><sup class="reference" data-dcnode-id="4663" id="cite_ref-82"><a data-dcnode-id="4664" href="#cite_note-82"><span data-dcnode-id="4665" instrument_node="">[82]</span></a></sup><span data-dcnode-id="4662" instrument_node="">
</span></td></tr><tr data-dcnode-id="4648"><td data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">9 January</span></td><td data-dcnode-id="4649"><span data-dcnode-id="4654" instrument_node="">Bosnian Serbs declare the establishment of their own republic, effective from the date of international recognition of Bosnia. Territory of the new republic includes wherever Serbs in Bosnia and Herzegovina are in the majority "and all other regions where the Serbian people represent a minority due to the Second World War genocide".</span><sup class="reference" data-dcnode-id="4651" id="cite_ref-autogenerated2_75-9"><a data-dcnode-id="4652" href="#cite_note-autogenerated2-75"><span data-dcnode-id="4653" instrument_node="">[75]</span></a></sup><span data-dcnode-id="4650" instrument_node="">
</span></td></tr><tr data-dcnode-id="4637"><td data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">15 January</span></td><td data-dcnode-id="4638"><span data-dcnode-id="4642" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="4640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Community" title="European Community"><span data-dcnode-id="4641" instrument_node="">European Community</span></a><span data-dcnode-id="4639" instrument_node=""> recognizes Slovenia and Croatia.
</span></td></tr><tr data-dcnode-id="4625"><td data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">20 January</span></td><td data-dcnode-id="4626"><span data-dcnode-id="4631" instrument_node="">Mr. Koljević, a leader of the Bosnian Serbs, talks with a newspaper about his discussion with Croatian president Franjo Tuđman about a Bosnia and Herzegovina "transformation".</span><sup class="reference" data-dcnode-id="4628" id="cite_ref-autogenerated2_75-10"><a data-dcnode-id="4629" href="#cite_note-autogenerated2-75"><span data-dcnode-id="4630" instrument_node="">[75]</span></a></sup><span data-dcnode-id="4627" instrument_node="">
</span></td></tr><tr data-dcnode-id="4613"><td data-dcnode-id="4621"><span data-dcnode-id="4622" instrument_node="">27 January</span></td><td data-dcnode-id="4614"><span data-dcnode-id="4619" instrument_node="">The Montenegro Parliament votes for a referendum to see if citizens still support the Yugoslav federation.</span><sup class="reference" data-dcnode-id="4616" id="cite_ref-autogenerated2_75-11"><a data-dcnode-id="4617" href="#cite_note-autogenerated2-75"><span data-dcnode-id="4618" instrument_node="">[75]</span></a></sup><span data-dcnode-id="4615" instrument_node="">
</span></td></tr><tr data-dcnode-id="4602"><td data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node="">8–23 February</span></td><td data-dcnode-id="4603"><span data-dcnode-id="4607" instrument_node="">Croatia and Slovenia compete at the </span><a data-dcnode-id="4605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1992_Winter_Olympics" title="1992 Winter Olympics"><span data-dcnode-id="4606" instrument_node="">1992 Winter Olympics</span></a><span data-dcnode-id="4604" instrument_node="">. Rump Yugoslavia also participates.
</span></td></tr><tr data-dcnode-id="4590"><td data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">22 February</span></td><td data-dcnode-id="4591"><span data-dcnode-id="4596" instrument_node="">The Macedonian newspaper Nova Makedonija published the Agreement between Macedonian Government and the Yugoslav Army for the ongoing peaceful withdrawal of the Yugoslav Army from the territory of Republic of Macedonia. According to this Agreement the last Yugoslav soldier should leave Macedonian territory on 15 April 1992.</span><sup class="reference" data-dcnode-id="4593" id="cite_ref-Tri_2000_83-0"><a data-dcnode-id="4594" href="#cite_note-Tri_2000-83"><span data-dcnode-id="4595" instrument_node="">[83]</span></a></sup><span data-dcnode-id="4592" instrument_node=""> The withdrawal of the Yugoslav Army from Macedonia started with the beginning of the winter of 1991/92.
</span></td></tr><tr data-dcnode-id="4577"><td data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">21 February</span></td><td data-dcnode-id="4578"><a data-dcnode-id="4583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Security_Council_Resolution_743" title="United Nations Security Council Resolution 743"><span data-dcnode-id="4584" instrument_node="">United Nations Security Council Resolution 743</span></a><span data-dcnode-id="4582" instrument_node=""> sets up a Protection Force (</span><a class="mw-redirect" data-dcnode-id="4580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNPROFOR" title="UNPROFOR"><span data-dcnode-id="4581" instrument_node="">UNPROFOR</span></a><span data-dcnode-id="4579" instrument_node="">) mandated to create three IJN Protected Areas (UNPAs) in Croatia.
</span></td></tr><tr data-dcnode-id="4569"><td data-dcnode-id="4573"><span data-dcnode-id="4574" instrument_node="">29 February</span></td><td data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">A referendum on independence is held in Bosnia. A majority of Muslims and Croats vote in favor, but a majority of Serbs boycott the vote.
</span></td></tr><tr data-dcnode-id="4557"><td data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">1 March</span></td><td data-dcnode-id="4558"><span data-dcnode-id="4563" instrument_node="">On the first day after the referendum a wedding groom's father, Nikola Gardovic, an ethnic Serb, is killed by Ramiz Delalic, an ethnic Bosniak, at a Serbian wedding. Gardovic is considered by many Serbs as the first casualty of the Bosnian war.</span><sup class="reference" data-dcnode-id="4560" id="cite_ref-84"><a data-dcnode-id="4561" href="#cite_note-84"><span data-dcnode-id="4562" instrument_node="">[84]</span></a></sup><span data-dcnode-id="4559" instrument_node="">
</span></td></tr><tr data-dcnode-id="4537"><td data-dcnode-id="4553"><span data-dcnode-id="4554" instrument_node="">2 March</span></td><td data-dcnode-id="4538"><a data-dcnode-id="4550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kiro_Gligorov" title="Kiro Gligorov"><span data-dcnode-id="4551" instrument_node="">Kiro Gligorov</span></a><span data-dcnode-id="4549" instrument_node="">, the president of Macedonia,  speaks publicly about the agreement between the </span><a class="mw-redirect" data-dcnode-id="4547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_Macedonia" title="Republic of Macedonia"><span data-dcnode-id="4548" instrument_node="">Republic of Macedonia</span></a><span data-dcnode-id="4546" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="4544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslav_army" title="Yugoslav army"><span data-dcnode-id="4545" instrument_node="">Yugoslav army</span></a><span data-dcnode-id="4543" instrument_node=""> for its peaceful withdrawal from Macedonia.</span><sup class="reference" data-dcnode-id="4540" id="cite_ref-85"><a data-dcnode-id="4541" href="#cite_note-85"><span data-dcnode-id="4542" instrument_node="">[85]</span></a></sup><span data-dcnode-id="4539" instrument_node="">
</span></td></tr><tr data-dcnode-id="4527"><td data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">3 March</span></td><td data-dcnode-id="4528"><a data-dcnode-id="4530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bosnia_and_Herzegovina" title="Bosnia and Herzegovina"><span data-dcnode-id="4531" instrument_node="">Bosnia and Herzegovina</span></a><span data-dcnode-id="4529" instrument_node=""> declare independence.
</span></td></tr><tr data-dcnode-id="4515"><td data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">17 March</span></td><td data-dcnode-id="4516"><span data-dcnode-id="4521" instrument_node="">The last Yugoslav soldier left Macedonian territory.</span><sup class="reference" data-dcnode-id="4518" id="cite_ref-Tri_2000_83-1"><a data-dcnode-id="4519" href="#cite_note-Tri_2000-83"><span data-dcnode-id="4520" instrument_node="">[83]</span></a></sup><span data-dcnode-id="4517" instrument_node="">
</span></td></tr><tr data-dcnode-id="4503"><td data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">23 March</span></td><td data-dcnode-id="4504"><span data-dcnode-id="4509" instrument_node="">Vienna agreement between Croatia and Serbia.</span><sup class="reference" data-dcnode-id="4506" id="cite_ref-86"><a data-dcnode-id="4507" href="#cite_note-86"><span data-dcnode-id="4508" instrument_node="">[86]</span></a></sup><span data-dcnode-id="4505" instrument_node="">
</span></td></tr><tr data-dcnode-id="4482"><td data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">1 April</span></td><td data-dcnode-id="4483"><span data-dcnode-id="4497" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="4495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbian_Volunteer_Guard" title="Serbian Volunteer Guard"><span data-dcnode-id="4496" instrument_node="">Serbian Volunteer Guard</span></a><span data-dcnode-id="4494" instrument_node="">, commanded by gangster Željko Ražnatović </span><a data-dcnode-id="4492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arkan" title="Arkan"><span data-dcnode-id="4493" instrument_node="">Arkan</span></a><span data-dcnode-id="4491" instrument_node="">, takes </span><a data-dcnode-id="4489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bijeljina" title="Bijeljina"><span data-dcnode-id="4490" instrument_node="">Bijeljina</span></a><span data-dcnode-id="4488" instrument_node="">.</span><sup class="reference" data-dcnode-id="4485" id="cite_ref-autogenerated4_87-0"><a data-dcnode-id="4486" href="#cite_note-autogenerated4-87"><span data-dcnode-id="4487" instrument_node="">[87]</span></a></sup><span data-dcnode-id="4484" instrument_node="">
</span></td></tr><tr data-dcnode-id="4464"><td data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">3 April</span></td><td data-dcnode-id="4465"><span data-dcnode-id="4476" instrument_node="">Yugoslav army and Serbian paramilitary forces battle against Bosniak and Croat forces of Bosnia and Herzegovina around </span><a class="mw-redirect" data-dcnode-id="4474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bosanski_Brod" title="Bosanski Brod"><span data-dcnode-id="4475" instrument_node="">Bosanski Brod</span></a><span data-dcnode-id="4473" instrument_node=""> and </span><a data-dcnode-id="4471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kupres" title="Kupres"><span data-dcnode-id="4472" instrument_node="">Kupres</span></a><span data-dcnode-id="4470" instrument_node="">.</span><sup class="reference" data-dcnode-id="4467" id="cite_ref-autogenerated4_87-1"><a data-dcnode-id="4468" href="#cite_note-autogenerated4-87"><span data-dcnode-id="4469" instrument_node="">[87]</span></a></sup><span data-dcnode-id="4466" instrument_node="">
</span></td></tr><tr data-dcnode-id="4452"><td data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">5 April</span></td><td data-dcnode-id="4453"><span data-dcnode-id="4458" instrument_node="">Bosnia and Herzegovina president Alija Izetbegović orders mobilization of the national guard and police reserve.</span><sup class="reference" data-dcnode-id="4455" id="cite_ref-88"><a data-dcnode-id="4456" href="#cite_note-88"><span data-dcnode-id="4457" instrument_node="">[88]</span></a></sup><span data-dcnode-id="4454" instrument_node="">

</span></td></tr><tr data-dcnode-id="4154"><td data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">19–20 June</span></td><td data-dcnode-id="4155"><span data-dcnode-id="4159" instrument_node="">Referendum in '</span><a class="mw-redirect" data-dcnode-id="4157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_Serb_Krajina" title="Republic of Serb Krajina"><span data-dcnode-id="4158" instrument_node="">Republic of Serb Krajina</span></a><span data-dcnode-id="4156" instrument_node="">' on unification with other Serbs: with a 98.6% turnout, 93.8% of the total number of voters voted in favor.
</span></td></tr><tr data-dcnode-id="4144"><td data-dcnode-id="4150"><span data-dcnode-id="4151" instrument_node="">24 August</span></td><td data-dcnode-id="4145"><a class="mw-redirect" data-dcnode-id="4147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Croatian_Democratic_Community" title="Croatian Democratic Community"><span data-dcnode-id="4148" instrument_node="">Croatian Democratic Community</span></a><span data-dcnode-id="4146" instrument_node=""> (HDZ) proclaimed the Mostar-based 'Croatian Community of Herceg-Bosna' a republic.
</span></td></tr><tr data-dcnode-id="4133"><td data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">27–29 August</span></td><td data-dcnode-id="4134"><span data-dcnode-id="4138" instrument_node="">Bosnian Serbs and </span><a class="mw-redirect" data-dcnode-id="4136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bosnian_Croat" title="Bosnian Croat"><span data-dcnode-id="4137" instrument_node="">Bosnian Croats</span></a><span data-dcnode-id="4135" instrument_node=""> accepted new Owen-Stoltenberg proposals on a union of three ethnic republics in Bosnia.
</span></td></tr><tr data-dcnode-id="4125"><td data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">29 September</span></td><td data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">Bosnian Assembly voted for the Owen-Stoltenberg proposal, but only if territories seized by force were returned.
</span></td></tr><tr data-dcnode-id="4114"><td data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">29 October</span></td><td data-dcnode-id="4115"><span data-dcnode-id="4119" instrument_node="">New Bosnian Government: </span><a class="mw-redirect" data-dcnode-id="4117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haris_Silajdzic" title="Haris Silajdzic"><span data-dcnode-id="4118" instrument_node="">Haris Silajdzic</span></a><span data-dcnode-id="4116" instrument_node=""> appointed Prime Minister.

</span><table class="wikitable" data-dcnode-id="3840" width="100%"><tbody data-dcnode-id="3841"><tr data-dcnode-id="4070"><th data-dcnode-id="4074" width="125"><span data-dcnode-id="4075" instrument_node="">Date
</span></th><th data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">Event
</span></th></tr><tr data-dcnode-id="4053"><td data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">21 January
</span></td><td data-dcnode-id="4054"><a data-dcnode-id="4063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milan_Marti%25C4%2587" title="Milan Martić"><span data-dcnode-id="4064" instrument_node="">Milan Martić</span></a><span data-dcnode-id="4062" instrument_node=""> stated that he would "speed up the process of unification" and "pass on the baton to our all-Serbian leader </span><a data-dcnode-id="4060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slobodan_Milo%25C5%25A1evi%25C4%2587" title="Slobodan Milošević"><span data-dcnode-id="4061" instrument_node="">Slobodan Milošević</span></a><span data-dcnode-id="4059" instrument_node="">".</span><sup class="reference" data-dcnode-id="4056" id="cite_ref-icty-martic-summary_29-7"><a data-dcnode-id="4057" href="#cite_note-icty-martic-summary-29"><span data-dcnode-id="4058" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4055" instrument_node="">
</span></td></tr><tr data-dcnode-id="4045"><td data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">5 February</span></td><td data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">Bosnian Serb mortar attack on Sarajevo market place resulted in numerous civilian deaths and casualties.
</span></td></tr><tr data-dcnode-id="4037"><td data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">7 February</span></td><td data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">EU Foreign Ministers backed use of NATO airpower if necessary to lift Bosnian Serb siege of Sarajevo.
</span></td></tr><tr data-dcnode-id="4029"><td data-dcnode-id="4033"><span data-dcnode-id="4034" instrument_node="">9 February</span></td><td data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">At UN request, NATO agreed to authorise air strikes, declared 20&nbsp;km total exclusion zone around Sarajevo and required Bosnian Serbs to withdraw heavy weapons from zone or place them under UN control within 10 days; also called on Bosnian Government to place heavy weapons in Sarajevo under UN control. Agreement between 'RS' and Bosnian Government to a ceasefire in Sarajevo, negotiated by Lieutenant-General Sir Michael Rose, then Commander of UN forces in Bosnia.
</span></td></tr><tr data-dcnode-id="4021"><td data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">17 February</span></td><td data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">Russian initiative secured Bosnian Serb cooperation in withdrawing heavy weapons from Sarajevo.
</span></td></tr><tr data-dcnode-id="4013"><td data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">1 March</span></td><td data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">In Washington, Silajdzic, Croatian Foreign Minister Mate Granic and Bosnian Croat leader, Kresimir Zubak, signed framework Federation agreement between Bosnian Muslims ('Bosniacs') and Bosnian Croats, as well as a preliminary agreement on a confederation between that Federation and the Republic of Croatia.
</span></td></tr><tr data-dcnode-id="4005"><td data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">24 March</span></td><td data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">'RS' Assembly rejected joining Muslim-Croat Federation and demanded that sanctions against Serbs should be lifted.
</span></td></tr><tr data-dcnode-id="3997"><td data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">29 March</span></td><td data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">Agreement on ceasefire in Krajina signed at Russian Embassy in Zagreb by Croatian Government and Krajina Serbs.
</span></td></tr><tr data-dcnode-id="3986"><td data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">31 March
</span></td><td data-dcnode-id="3987"><span data-dcnode-id="3991" instrument_node="">An agreement was signed in Zagreb between the Serb rebels and the </span><a class="mw-redirect" data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_Croatia" title="Republic of Croatia"><span data-dcnode-id="3990" instrument_node="">Republic of Croatia</span></a><span data-dcnode-id="3988" instrument_node=""> on a cease-fire at the line of contact of the Krajina and the Croatian forces. The agreement came into effect on April 4, 1994.
</span></td></tr><tr data-dcnode-id="3978"><td data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">11 April</span></td><td data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">NATO planes bombed Bosnian Serb arrnoured vehicles in response to resumption of shelling of Gorazde.
</span></td></tr><tr data-dcnode-id="3970"><td data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">22 April</span></td><td data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">NATO authorised use of air strikes against Bosnian Serb heavy weapons within 20&nbsp;km exclusion zone around Gorazde unless: there was an immediate ceasefire; Bosnian Serb forces pulled back 3&nbsp;km from Gorazde centre; humanitarian convoys and medical evacuations were permitted. NATO also authorised immediate use of air strikes against Bosnian Serbs in the event of attacks against any UN safe area, or if Bosnian Serb heavy weapons come within 20&nbsp;km exclusion zones around these areas.
</span></td></tr><tr data-dcnode-id="3962"><td data-dcnode-id="3966"><span data-dcnode-id="3967" instrument_node="">22–23 April</span></td><td data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">Akashi held talks with President Milosevic and Bosnian Serb leadership in Belgrade. Reached six-point ceasefire agreement on Gorazde, with Bosnian Serbs agreeing to immediate ceasefire; Deployment of UNPROFOR in 3&nbsp;km radius of centre and on both sides of the River Drina; safe medical evacuation; freedom of movement for UNPROFOR and humanitarian organisations.
</span></td></tr><tr data-dcnode-id="3954"><td data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">26 April</span></td><td data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">First meeting of 'Contact Group', comprising representatives of Britain, Russia, US, France and Germany, held in London. The Group was set up as a forum to present a united front to the warring parties, and concentrated on securing agreement on a territorial allocation as the first step in a political settlement. It produced a map for the parties to consider. British Embassy opened in Sarajevo.
</span></td></tr><tr data-dcnode-id="3946"><td data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">11 May</span></td><td data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">Vienna Agreement between Bosniacs and Croats set Bosniac/Croat Federation at 58 per cent of Bosnian territory; divided Federation into eight cantons; and determined composition of interim federal government.
</span></td></tr><tr data-dcnode-id="3938"><td data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">13 May</span></td><td data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">Foreign Ministers of France, Russia, Britain, US and EU Troika, plus Vice- President of European Commission, met in Geneva. They called for four-month cessation of hostilities and requested negotiations within two weeks, under aegis of Contact Group, on the basis of territorial division of 51 per cent for the Bosnian Federation and 49 per cent for the Bosnian Serbs.
</span></td></tr><tr data-dcnode-id="3930"><td data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">31 May</span></td><td data-dcnode-id="3931"><span data-dcnode-id="3932" instrument_node="">Bosnian Assembly elected Zubak (Bosnian Croat) and Ejup Ganic (Bosnian Muslim) as President and Vice-President of Federation until federal elections, scheduled after six months. Assembly also endorsed Washington and Vienna Agreements (see 1 March and 11 May).
</span></td></tr><tr data-dcnode-id="3922"><td data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">10 June</span></td><td data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">Draft Memorandum of Understanding on the EU administration of Mostar initialled ad referendum by enlarged EU Troika and Bosnian and Bosnian Croat sides.
</span></td></tr><tr data-dcnode-id="3914"><td data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">8 July</span></td><td data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">Justice Richard Goldstone of South Africa approved as Chief Prosecutor for International Criminal Tribunal for the Former Yugoslavia.
</span></td></tr><tr data-dcnode-id="3906"><td data-dcnode-id="3910"><span data-dcnode-id="3911" instrument_node="">20 July</span></td><td data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">Bosnian Serb Declaration handed to Contact Group in Geneva. Stated that: they could not take position on Contact Group peace plan because constitutional arrangements for Bosnia were not fully elaborated, and further work was required on map. But it could serve as basis for further negotiations.
</span></td></tr><tr data-dcnode-id="3898"><td data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">23 July</span></td><td data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">Hans Koschnick from Germany inaugurated as EU administrator of Mostar.
</span></td></tr><tr data-dcnode-id="3890"><td data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">3 August</span></td><td data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">'RS' Assembly rejected Contact Group peace plan.
</span></td></tr><tr data-dcnode-id="3882"><td data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">4 August</span></td><td data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">President Milosevic announced decision to sever political and economic ties with Bosnian Serbs because of their rejection of the peace plan.
</span></td></tr><tr data-dcnode-id="3874"><td data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">20 August</span></td><td data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">'RS President' Karadzic and 'RSK President' Milan Martic signed a proposal for the unification of 'RS' and 'RSK'.
</span></td></tr><tr data-dcnode-id="3866"><td data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">11 November</span></td><td data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">US announced it would stop enforcing arms embargo on Bosnian Government and Bosniac/Croat Federation.
</span></td></tr><tr data-dcnode-id="3858"><td data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">21 November</span></td><td data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">NATO bombed Udbina airport in 'RSK' following air attacks by Krajina- based Serbian aircraft on the Bihac region. Intense diplomatic and military activity ensued, including UN Security Council Presidential statements, attempts to broker a ceasefire, continued Krajina Serbian attacks on Bihac, NATO close air support and Bosnian Serb detention of UNPROFOR personnel.
</span></td></tr><tr data-dcnode-id="3850"><td data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">2 December</span></td><td data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">Croatian Government and 'RSK' authorities signed an economic agreement.
</span></td></tr><tr data-dcnode-id="3842"><td data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">31 December</span></td><td data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">Bosnian and 'RS' Governments signed a four-month Cessation of Hostilities Agreement.
</span></td></tr></tbody></table><span data-dcnode-id="3839" instrument_node="">

</span><table class="wikitable" data-dcnode-id="3395" width="100%"><tbody data-dcnode-id="3396"><tr data-dcnode-id="3820"><th data-dcnode-id="3824" width="125"><span data-dcnode-id="3825" instrument_node="">Date
</span></th><th data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">Event
</span></th></tr><tr data-dcnode-id="3812"><td data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">12 January</span></td><td data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">Croatia said she would not renew UNPROFOR mandate after 31 March. UNPROFOR would then have three months to withdraw.
</span></td></tr><tr data-dcnode-id="3804"><td data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">30 January</span></td><td data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">Zagreb-4 plan presented to Croatian Government and Knin-based 'RSK' leadership. Drawn up by EU, UN, US and Russian representatives, the plan aimed to bring a political settlement to the conflict in Croatia. 'RSK' refused to consider it until guarantees were received of UNPROFOR's presence beyond 31 March. President Milosevic refused to receive Z4 ambassadors.
</span></td></tr><tr data-dcnode-id="3796"><td data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">5 February</span></td><td data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">US convened a meeting in Munich in support of the Bosniac/Croat Federation. A nine-point aid plan was announced and Muslim and Croat officials agreed to the appointment of an arbiter for Muslim/Croat disputes.
</span></td></tr><tr data-dcnode-id="3788"><td data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">8 February</span></td><td data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node="">'RSK' Assembly suspended all economic and political negotiations with Croatia until she reversed her decision on terminating the UNPROFOR mandate.
</span></td></tr><tr data-dcnode-id="3780"><td data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">13 February</span></td><td data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">International Criminal Tribunal indicted 21 Serbs for genocide. 'RS' President refused to allow extradition of anyone. 'FRY' ruled that alleged 'FRY' war criminals must be tried there.
</span></td></tr><tr data-dcnode-id="3772"><td data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">20 February</span></td><td data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">'RS' and 'RSK' announced a Joint Defence Council.
</span></td></tr><tr data-dcnode-id="3764"><td data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">6 March</span></td><td data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node="">EU adopted negotiating mandate for Trade and Cooperation Agreement between the EU and Croatia, but made start of the negotiations dependent on continued UN presence in Croatia.
</span></td></tr><tr data-dcnode-id="3756"><td data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">8–10 March</span></td><td data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">Zubak and Ganic, in Bonn, signed the Petersburg Agreement on the implementation of the Bosniac/Croat Federation.
</span></td></tr><tr data-dcnode-id="3748"><td data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">12 March</span></td><td data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">President Tudjman announced that a reconfigured UN force could remain on Croatian soil.
</span></td></tr><tr data-dcnode-id="3716"><td data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">31 March</span></td><td data-dcnode-id="3717"><span data-dcnode-id="3742" instrument_node="">Security Council Resolutions </span><a data-dcnode-id="3740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Security_Council_Resolution_981" title="United Nations Security Council Resolution 981"><span data-dcnode-id="3741" instrument_node="">981</span></a><span data-dcnode-id="3739" instrument_node="">, </span><a data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Security_Council_Resolution_982" title="United Nations Security Council Resolution 982"><span data-dcnode-id="3738" instrument_node="">982</span></a><span data-dcnode-id="3736" instrument_node=""> and </span><a data-dcnode-id="3734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Security_Council_Resolution_983" title="United Nations Security Council Resolution 983"><span data-dcnode-id="3735" instrument_node="">983</span></a><span data-dcnode-id="3733" instrument_node=""> were adopted unanimously. </span><a data-dcnode-id="3731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Security_Council_Resolution_981" title="United Nations Security Council Resolution 981"><span data-dcnode-id="3732" instrument_node="">981</span></a><span data-dcnode-id="3730" instrument_node=""> set up </span><a class="mw-redirect" data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNCRO" title="UNCRO"><span data-dcnode-id="3729" instrument_node="">UNCRO</span></a><span data-dcnode-id="3727" instrument_node=""> (Confidence Restoration Operation) in Croatia; </span><a data-dcnode-id="3725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Security_Council_Resolution_982" title="United Nations Security Council Resolution 982"><span data-dcnode-id="3726" instrument_node="">982</span></a><span data-dcnode-id="3724" instrument_node=""> renewed UNPROFOR mandate in Bosnia; </span><a data-dcnode-id="3722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Security_Council_Resolution_983" title="United Nations Security Council Resolution 983"><span data-dcnode-id="3723" instrument_node="">983</span></a><span data-dcnode-id="3721" instrument_node=""> transformed UNPROFOR in the Republic of Macedonia to </span><a class="mw-redirect" data-dcnode-id="3719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNPREDEP" title="UNPREDEP"><span data-dcnode-id="3720" instrument_node="">UNPREDEP</span></a><span data-dcnode-id="3718" instrument_node=""> (UN Preventive Deployment Force). All three new mandates were to run until 30 November 1995.
</span></td></tr><tr data-dcnode-id="3705"><td data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">1 May</span></td><td data-dcnode-id="3706"><span data-dcnode-id="3710" instrument_node="">Start of the Croatian offensive, </span><a data-dcnode-id="3708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Flash" title="Operation Flash"><span data-dcnode-id="3709" instrument_node="">Operation Flash</span></a><span data-dcnode-id="3707" instrument_node="">, to retake western Slavonia. Croatian Serbs responded by shelling, and detained some UN personnel.
</span></td></tr><tr data-dcnode-id="3697"><td data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">3 May</span></td><td data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">UN-brokered ceasefire agreement signed by Croatia and Croatian Serb representatives .
</span></td></tr><tr data-dcnode-id="3689"><td data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">24–26 May</span></td><td data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">In response to high levels of shelling and shooting, Lieutenant-General Rupert Smith, UNPROFOR Commander for Bosnia, issued ultimatums: 'RS' to stop firing into the Sarajevo exclusion zone; to return heavy weapons removed from UN collection point by noon on 25 May; and, by 26 May, to remove all heavy weapons from the exclusion zone or put them under UN control.
</span></td></tr><tr data-dcnode-id="3681"><td data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">8 June</span></td><td data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">US House of Representatives voted for unilateral lifting of arms embargo.
</span></td></tr><tr data-dcnode-id="3673"><td data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">9 June</span></td><td data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">Carl Bildt, a former Swedish Prime Minister, to succeed Lord Owen as Co- Chairman of the ICFY Steering Committee.
</span></td></tr><tr data-dcnode-id="3663"><td data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">16 June</span></td><td data-dcnode-id="3664"><a data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Security_Council_Resolution_998" title="United Nations Security Council Resolution 998"><span data-dcnode-id="3667" instrument_node="">United Nations Security Council Resolution 998</span></a><span data-dcnode-id="3665" instrument_node=""> authorised increase in UNPROFOR personnel by up to 12,500 to reinforce existing forces and create Rapid Reaction Force (RRF). China and Russia abstained.
</span></td></tr><tr data-dcnode-id="3655"><td data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">18 June</span></td><td data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">UNPROFOR withdrew from weapon-collection points and observation posts in Sarajevo's 20&nbsp;km exclusion zone.
</span></td></tr><tr data-dcnode-id="3647"><td data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">20 June</span></td><td data-dcnode-id="3648"><span data-dcnode-id="3649" instrument_node="">NATO requested UN permission for air strike on Banja Luka airport in response to violations of NFZ by Bosnian Serbs.
</span></td></tr><tr data-dcnode-id="3639"><td data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">2 July</span></td><td data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">UN HQ at Sarajevo shelled by Bosnian Serbs.
</span></td></tr><tr data-dcnode-id="3631"><td data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">3 July</span></td><td data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">UN convoy on Mount Igman fired at and returned fire.
</span></td></tr><tr data-dcnode-id="3623"><td data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">8 July</span></td><td data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">'RS' forces moved into Srebrenica safe area.
</span></td></tr><tr data-dcnode-id="3615"><td data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">9 July</span></td><td data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">'RS' forces overran Srebrenica UN posts, capturing UN troops. UN threatened to call for air strikes if Bosnian Serb forces moved closer.
</span></td></tr><tr data-dcnode-id="3604"><td data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">11 July</span></td><td data-dcnode-id="3605"><span data-dcnode-id="3609" instrument_node="">NATO air strikes. 'RS' threatened to kill UN hostages. 'RS' forces took Srebrenica. </span><a data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Srebrenica_massacre" title="Srebrenica massacre"><span data-dcnode-id="3608" instrument_node="">Srebrenica massacre</span></a><span data-dcnode-id="3606" instrument_node=""> begins, with more than 8,000 Bosniaks killed by Serb forces.
</span></td></tr><tr data-dcnode-id="3596"><td data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">12 July</span></td><td data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">UN and EU demanded Bosnian Serb withdrawal from Srebrenica.
</span></td></tr><tr data-dcnode-id="3588"><td data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">19 July</span></td><td data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">'RSK' and forces of Fikret Abdic, a Muslim separatist leader, attacked Bihac region.
</span></td></tr><tr data-dcnode-id="3580"><td data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">21 July</span></td><td data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">Meeting of EU, UN, NATO, Contact Group and other UN troop contributors held in London to discuss response to Serb attacks on safe areas
</span></td></tr><tr data-dcnode-id="3572"><td data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">22 July</span></td><td data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">Presidents Tudjman and Izetbegovic met in Split. Agreement signed on joint defence and implementation of the Bosniac/Croat Federation.
</span></td></tr><tr data-dcnode-id="3564"><td data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">23 July</span></td><td data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">UK, US and French representatives delivered ultimatum to Ratko Mladic, commander of the 'RS' army: attacking Gorazde or putting UN lives at risk there would lead to extensive air strikes.
</span></td></tr><tr data-dcnode-id="3556"><td data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">25 July</span></td><td data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">International Criminal Tribunal indicted Karadzic and Mladic for genocide and Martic for war crimes. Bosnian Serb forces entered Zepa.
</span></td></tr><tr data-dcnode-id="3548"><td data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">26 July</span></td><td data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">UN Secretary-General delegated his authority for air strikes to UNPROFOR Commander Bernard Janvier. US Senate voted to lift embargo on Bosnia if UN decided to withdraw or Bosnian Government requested UN withdrawal.
</span></td></tr><tr data-dcnode-id="3540"><td data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">27 July</span></td><td data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">Tadeusz Mazowiecki, UN Special Rapporteur on Human Rights, resigned, saving he could not participate in pretence of protection of human rights. Abdic declared himself President of the 'Independent Republic of Western Bosnia'.
</span></td></tr><tr data-dcnode-id="3532"><td data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">28 July</span></td><td data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">'RS' and 'RSK' both declared state of war on their enemies.
</span></td></tr><tr data-dcnode-id="3524"><td data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">29–30 July</span></td><td data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">Akashi talked to President Tudjman and 'President' Martic with the aim of averting a Croatian offensive against 'RSK'.
</span></td></tr><tr data-dcnode-id="3516"><td data-dcnode-id="3520"><span data-dcnode-id="3521" instrument_node="">1 August</span></td><td data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">NATO agreed to use theatre-wide air power to protect safe areas.
</span></td></tr><tr data-dcnode-id="3508"><td data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">3 August</span></td><td data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">UN-brokered talks in Geneva, between Croatian Government and 'RSK' leaders, broke down.
</span></td></tr><tr data-dcnode-id="3497"><td data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">4 August</span></td><td data-dcnode-id="3498"><span data-dcnode-id="3502" instrument_node="">Croatia launched </span><a data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Storm" title="Operation Storm"><span data-dcnode-id="3501" instrument_node="">Operation Storm</span></a><span data-dcnode-id="3499" instrument_node="">, which rapidly retook Sectors North and South. The majority of Serbs fled via Bosnia into Serbia, where tens of thousands have settled in Vojvodina. Smaller numbers agreed to move to Kosovo.
</span></td></tr><tr data-dcnode-id="3486"><td data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">7 August</span></td><td data-dcnode-id="3487"><span data-dcnode-id="3491" instrument_node="">Bosnian Government forces gained control of </span><a data-dcnode-id="3489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autonomous_Province_of_Western_Bosnia" title="Autonomous Province of Western Bosnia"><span data-dcnode-id="3490" instrument_node="">Abdic's stronghold</span></a><span data-dcnode-id="3488" instrument_node=""> in the Bihac region.
</span></td></tr><tr data-dcnode-id="3475"><td data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">10 August</span></td><td data-dcnode-id="3476"><span data-dcnode-id="3480" instrument_node="">US President Clinton's National Security Adviser, </span><a data-dcnode-id="3478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthony_Lake" title="Anthony Lake"><span data-dcnode-id="3479" instrument_node="">Anthony Lake</span></a><span data-dcnode-id="3477" instrument_node="">, began four-day trip to London, Bonn, Paris, Madrid, Rome, Moscow and Ankara to outline new US peace initiative, based on the existing Contact Group map.
</span></td></tr><tr data-dcnode-id="3467"><td data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">28 August</span></td><td data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">Bosnian Serb mortar attack killed 37 civilians in Sarajevo.
</span></td></tr><tr data-dcnode-id="3459"><td data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">29 August</span></td><td data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">'RS' Assembly welcomed US initiative.
</span></td></tr><tr data-dcnode-id="3451"><td data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">30 August</span></td><td data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">NATO and RRF began air strikes on 'RS' military targets in response to 28 August mortar attack on Sarajevo. 'RS' and 'FRY' leaderships announced that joint negotiating team, led by President Milosevic who would have casting vote, would consider US peace plan.
</span></td></tr><tr data-dcnode-id="3443"><td data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">8 September</span></td><td data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">Bosnian, Croatian and 'FRY' Foreign Ministers met in Geneva and reached agreement on basic principles including 1) Bosnia-Hercegovina would continue its legal existence with its present borders and continuing international recognition; 2) it would consist of two entities, each with the right to establish parallel special relationships with neighbouring countries, consistent with the territorial integrity of Bosnia.
</span></td></tr><tr data-dcnode-id="3432"><td data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">14 September</span></td><td data-dcnode-id="3433"><span data-dcnode-id="3437" instrument_node="">12-hour pause agreed in the NATO/RRF strike campaign to allow for US envoy </span><a data-dcnode-id="3435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Holbrooke" title="Richard Holbrooke"><span data-dcnode-id="3436" instrument_node="">Richard Holbrooke</span></a><span data-dcnode-id="3434" instrument_node="">, Mladic and President Milosevic to conclude a 'Framework for a Cessation of Hostilities Agreement'. Strikes were suspended for 72 hours to allow withdrawal of Serb heavy weapons from Sarajevo exclusion zone. Within 24 hours, airport and humanitarian routes into city were to be opened; within 144 hours the weapons withdrawal was to be completed.
</span></td></tr><tr data-dcnode-id="3424"><td data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">22 September</span></td><td data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">Croatia revoked the refugee status of all persons from areas of Bosnia held by the Federation.
</span></td></tr><tr data-dcnode-id="3416"><td data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">26 September</span></td><td data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">Bosnian, Croatian and 'FRY' Foreign Ministers met in New York and agreed that Bosnia would have a central presidency, parliament and constitutional court. Parliament was to be composed of one-third 'RS' delegates and two- thirds Federation delegates. Within the presidency, voting would be by majority but the results could be blocked by parliaments of the entities. Provision was made for holding internationally supervised elections.
