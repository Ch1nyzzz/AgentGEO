</span><h6 data-dcnode-id="1388"><span data-dcnode-id="1394" instrument_node="">
</span><i class="uil uil-folder-open text-muted me-1" data-dcnode-id="1393"></i><span data-dcnode-id="1392" instrument_node="">
</span><a class="text-primary" data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//iasbaba.com/upsc-articles/"><span data-dcnode-id="1391" instrument_node="">UPSC Articles</span></a><span data-dcnode-id="1389" instrument_node=""> </span></h6><span data-dcnode-id="1387" instrument_node="">
</span><div class="pf-content" data-dcnode-id="1211"><div class="printfriendly pf-button pf-button-content" data-dcnode-id="1384"><a data-dcnode-id="1385" href="#" onclick="window.print(); pfTrackEvent('COVID-19: Challenges faced by Migrant Workers'); return false;" rel="nofollow" title="Printer Friendly, PDF &amp; Email"><img alt="Print Friendly, PDF &amp; Email" class="pf-button-img" data-dcnode-id="1386" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.printfriendly.com/buttons/printfriendly-pdf-button-nobg.png&amp;raw" style="width: 112px;height: 24px;"></a></div><h2 data-dcnode-id="1380" style="text-align: justify;"><span data-dcnode-id="1381" style="text-decoration: underline; color: #008000;"><b data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">SOCIETY/ GOVERNANCE</span></b></span></h2><span data-dcnode-id="1379" instrument_node="">
</span><blockquote data-dcnode-id="1356"><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1373" style="text-align: justify;"><span data-dcnode-id="1374" style="color: #800080;"><b data-dcnode-id="1375"><i data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Topic: General Studies 1 &amp; 2:</span></i></b></span></p><span data-dcnode-id="1372" instrument_node="">
</span><ul data-dcnode-id="1358"><span data-dcnode-id="1371" instrument_node="">
</span><li data-dcnode-id="1366" style="text-align: justify;"><span data-dcnode-id="1367" style="color: #800080;"><b data-dcnode-id="1368"><i data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Urbanization, their problems and their remedies.&nbsp;</span></i></b></span></li><span data-dcnode-id="1365" instrument_node="">
</span><li data-dcnode-id="1360" style="text-align: justify;"><span data-dcnode-id="1361" style="color: #800080;"><b data-dcnode-id="1362"><i data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Mechanisms, laws, institutions and Bodies constituted for the protection and betterment of these vulnerable sections.&nbsp;</span></i></b></span></li><span data-dcnode-id="1359" instrument_node="">
</span></ul><span data-dcnode-id="1357" instrument_node="">
</span></blockquote><span data-dcnode-id="1355" instrument_node="">
</span><h3 data-dcnode-id="1351" style="text-align: justify;"><span data-dcnode-id="1352" style="text-decoration: underline; color: #800000;"><b data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">COVID-19: Challenges faced by Migrant Workers</span></b></span></h3><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1347" style="text-align: justify;"><span data-dcnode-id="1348" style="font-weight: 400;"><span data-dcnode-id="1349" instrument_node="">In the crisis caused by COVID-19 pandemic, some of the worse challenges are faced by the inter-state migrant workers.&nbsp;</span></span></p><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1343" style="text-align: justify;"><b data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Do You Know?</span></b></p><span data-dcnode-id="1342" instrument_node="">
</span><ul data-dcnode-id="1332" style="text-align: justify;"><span data-dcnode-id="1341" instrument_node="">
</span><li data-dcnode-id="1338" style="font-weight: 400;"><span data-dcnode-id="1339" style="font-weight: 400;"><span data-dcnode-id="1340" instrument_node="">The cost of the lockdown is pegged at around $120 billion (nearly ₹9 lakh crore) or 4% of the GDP.</span></span></li><span data-dcnode-id="1337" instrument_node="">
</span><li data-dcnode-id="1334" style="font-weight: 400;"><span data-dcnode-id="1335" style="font-weight: 400;"><span data-dcnode-id="1336" instrument_node="">The lockdown will effectively put over 45 million migrants, working on daily basis, out of work.</span></span></li><span data-dcnode-id="1333" instrument_node="">
</span></ul><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1328" style="text-align: justify;"><b data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Problems of Inter-State migrant worker&nbsp;</span></b></p><span data-dcnode-id="1327" instrument_node="">
</span><ul data-dcnode-id="1293" style="text-align: justify;"><span data-dcnode-id="1326" instrument_node="">
</span><li data-dcnode-id="1323" style="font-weight: 400;"><span data-dcnode-id="1324" style="font-weight: 400;"><span data-dcnode-id="1325" instrument_node="">Sudden announcement of lockdown left them unprepared for it.</span></span></li><span data-dcnode-id="1322" instrument_node="">
</span><li data-dcnode-id="1319" style="font-weight: 400;"><span data-dcnode-id="1320" style="font-weight: 400;"><span data-dcnode-id="1321" instrument_node="">Contrary and uncoordinated government orders caused confusion (Ex: Delhi migrants)</span></span></li><span data-dcnode-id="1318" instrument_node="">
</span><li data-dcnode-id="1315" style="font-weight: 400;"><span data-dcnode-id="1316" style="font-weight: 400;"><span data-dcnode-id="1317" instrument_node="">Dire situation with no work, money or food</span></span></li><span data-dcnode-id="1314" instrument_node="">
</span><li data-dcnode-id="1311" style="font-weight: 400;"><span data-dcnode-id="1312" style="font-weight: 400;"><span data-dcnode-id="1313" instrument_node="">Harassment at the hands of house owners</span></span></li><span data-dcnode-id="1310" instrument_node="">
</span><li data-dcnode-id="1307" style="font-weight: 400;"><span data-dcnode-id="1308" style="font-weight: 400;"><span data-dcnode-id="1309" instrument_node="">Lack of political voice due to their migrant status</span></span></li><span data-dcnode-id="1306" instrument_node="">
</span><li data-dcnode-id="1303" style="font-weight: 400;"><span data-dcnode-id="1304" style="font-weight: 400;"><span data-dcnode-id="1305" instrument_node="">Anxiety about the survival of their families back home</span></span></li><span data-dcnode-id="1302" instrument_node="">
</span><li data-dcnode-id="1299" style="font-weight: 400;"><span data-dcnode-id="1300" style="font-weight: 400;"><span data-dcnode-id="1301" instrument_node="">Physical distancing for the unorganised sector is difficult in India given the realities of high density human settlements (Ex: slums)</span></span></li><span data-dcnode-id="1298" instrument_node="">
</span><li data-dcnode-id="1295" style="font-weight: 400;"><span data-dcnode-id="1296" style="font-weight: 400;"><span data-dcnode-id="1297" instrument_node="">All the above factors lead to their mass exodus from urban areas to their homes often by foot due to suspension of Transport facilities.</span></span></li><span data-dcnode-id="1294" instrument_node="">
</span></ul><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1287" style="text-align: justify;"><b data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Solution</span></b><span data-dcnode-id="1288" style="font-weight: 400;"><span data-dcnode-id="1289" instrument_node="">:&nbsp;</span></span></p><span data-dcnode-id="1286" instrument_node="">
</span><ul data-dcnode-id="1260" style="text-align: justify;"><span data-dcnode-id="1285" instrument_node="">
</span><li data-dcnode-id="1282" style="font-weight: 400;"><span data-dcnode-id="1283" style="font-weight: 400;"><span data-dcnode-id="1284" instrument_node="">Making arrangements for travel to their home towns is not advisable as there is a danger of spread of virus to rural areas where health infrastructure is meagre.</span></span></li><span data-dcnode-id="1281" instrument_node="">
</span><li data-dcnode-id="1278" style="font-weight: 400;"><span data-dcnode-id="1279" style="font-weight: 400;"><span data-dcnode-id="1280" instrument_node="">People will stay where they are, only if real support is provided.</span></span></li><span data-dcnode-id="1277" instrument_node="">
</span><li data-dcnode-id="1274" style="font-weight: 400;"><span data-dcnode-id="1275" style="font-weight: 400;"><span data-dcnode-id="1276" instrument_node="">School buildings, community halls and stadiums can serve as temporary shelters for migrants (Karnataka model)</span></span></li><span data-dcnode-id="1273" instrument_node="">
</span><li data-dcnode-id="1270" style="font-weight: 400;"><span data-dcnode-id="1271" style="font-weight: 400;"><span data-dcnode-id="1272" instrument_node="">Food grains from excessive buffer stocks to be supplied to these centres.</span></span></li><span data-dcnode-id="1269" instrument_node="">
</span><li data-dcnode-id="1266" style="font-weight: 400;"><span data-dcnode-id="1267" style="font-weight: 400;"><span data-dcnode-id="1268" instrument_node="">Self-managed community kitchens to be set up</span></span></li><span data-dcnode-id="1265" instrument_node="">
</span><li data-dcnode-id="1262" style="font-weight: 400;"><span data-dcnode-id="1263" style="font-weight: 400;"><span data-dcnode-id="1264" instrument_node="">Adequate safety training and safety gear needs to be provided to those housed in temporary shelters</span></span></li><span data-dcnode-id="1261" instrument_node="">
</span></ul><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1256" style="text-align: justify;"><b data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Conclusion</span></b></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1252" style="text-align: justify;"><span data-dcnode-id="1253" style="font-weight: 400;"><span data-dcnode-id="1254" instrument_node="">Thus, there needs to be a plan of action based on compassion and understanding of conditions on the ground.&nbsp;</span></span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1247" style="text-align: justify;"><span data-dcnode-id="1248" style="text-decoration: underline; color: #ff6600;"><b data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Connecting the dots:</span></b></span></p><span data-dcnode-id="1246" instrument_node="">
</span><ul data-dcnode-id="1236" style="text-align: justify;"><span data-dcnode-id="1245" instrument_node="">
</span><li data-dcnode-id="1242" style="font-weight: 400;"><span data-dcnode-id="1243" style="font-weight: 400;"><span data-dcnode-id="1244" instrument_node="">Other vulnerable sections of society &amp; problems faced due to lockdown</span></span></li><span data-dcnode-id="1241" instrument_node="">
</span><li data-dcnode-id="1238" style="font-weight: 400;"><span data-dcnode-id="1239" style="font-weight: 400;"><span data-dcnode-id="1240" instrument_node="">Migrants causing the demand for reservation of jobs for local people – legislations passed by State governments like AP, Maharashtra – Critically Analyze</span></span></li><span data-dcnode-id="1237" instrument_node="">
</span></ul><span data-dcnode-id="1235" instrument_node="">
</span><div class="awac-wrapper" data-dcnode-id="1213"><span data-dcnode-id="1234" instrument_node="">
