</span><meta content="<h3>Background</h3><p>Worldwide, COVID-19 has exacerbated the vulnerability of migrants, impacting many facets of their lives. Nepalese make up one of the largest groups of migrants residing in Japan. Crises, such as the ongoing COVID-19 pandemic could disproportionately affect migrants from low- and middle-income countries like Nepal, widening health and economic inequalities. An in-depth, comprehensive assessment is needed to appraise the diverse problems they encounter. Drawing upon qualitative interviews, this study aimed to identify challenges faced by Nepalese migrants in Japan as a consequence of the COVID-19 pandemic and to discuss their needs to counter these challenges.</p><h3>Methods</h3><p>This qualitative study employed an interpretivist approach to appraise the first-hand experience of Nepalese migrants living in Japan. Fourteen participants (8 males and 6 females, aged 21 to 47 years old) were recruited to participate in semi-structured in-depth telephone interviews (45-60 min) regarding: (a) their perceived current physical and mental health, (b) problems faced as a result of the COVID-19 pandemic, and (c) perception of available and necessary support structures. Purposive and snowball sampling techniques were used to recruit the participants. Interviews were recorded, transcribed, and thematically analyzed.</p><h3>Results</h3><p>Six themes were identified: 1) experiencing psychosomatic symptoms, 2) adoption of new healthy behaviors, 3) financial hardship, 4) family concerns, 5) reflections on discrimination and 6) reflections of existing support and expectations of support systems. The findings of our study illustrate the specific impact of COVID-19 among Nepalese migrants regarding their unstable employment conditions, perceived lack of social support, possible obligation to send money home, difficulty in accessing services due to the language barrier, and a lack of effective governmental support from Nepal. Pandemic-related adversity has negatively impacted migrants' mental well-being, exacerbating their vulnerability.</p><h3>Conclusions</h3><p>Comprehensive and timely support should be provided to the vulnerable migrant population. Effective coordination among relevant parties in both countries, including the governments concerned, should be facilitated.</p>" data-dcnode-id="417" lang="" name="citation_abstract"><span data-dcnode-id="416" instrument_node="">

</span><div class="abstract" data-dcnode-id="50" id="abstract"><span data-dcnode-id="87" instrument_node="">
</span><h2 class="title" data-dcnode-id="85"><span data-dcnode-id="86" instrument_node="">
        Abstract
        
      </span></h2><span data-dcnode-id="84" instrument_node="">
</span><div class="abstract-content selected" data-dcnode-id="58" id="enc-abstract"><span data-dcnode-id="83" instrument_node="">
</span><p data-dcnode-id="78"><span data-dcnode-id="82" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="80"><span data-dcnode-id="81" instrument_node="">
          Background:
        </span></strong><span data-dcnode-id="79" instrument_node="">
      
      Worldwide, COVID-19 has exacerbated the vulnerability of migrants, impacting many facets of their lives. Nepalese make up one of the largest groups of migrants residing in Japan. Crises, such as the ongoing COVID-19 pandemic could disproportionately affect migrants from low- and middle-income countries like Nepal, widening health and economic inequalities. An in-depth, comprehensive assessment is needed to appraise the diverse problems they encounter. Drawing upon qualitative interviews, this study aimed to identify challenges faced by Nepalese migrants in Japan as a consequence of the COVID-19 pandemic and to discuss their needs to counter these challenges.
    </span></p><span data-dcnode-id="77" instrument_node="">
</span><p data-dcnode-id="72"><span data-dcnode-id="76" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="74"><span data-dcnode-id="75" instrument_node="">
          Methods:
        </span></strong><span data-dcnode-id="73" instrument_node="">
      
      This qualitative study employed an interpretivist approach to appraise the first-hand experience of Nepalese migrants living in Japan. Fourteen participants (8 males and 6 females, aged 21 to 47 years old) were recruited to participate in semi-structured in-depth telephone interviews (45-60 min) regarding: (a) their perceived current physical and mental health, (b) problems faced as a result of the COVID-19 pandemic, and (c) perception of available and necessary support structures. Purposive and snowball sampling techniques were used to recruit the participants. Interviews were recorded, transcribed, and thematically analyzed.
    </span></p><span data-dcnode-id="71" instrument_node="">
</span><p data-dcnode-id="66"><span data-dcnode-id="70" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="68"><span data-dcnode-id="69" instrument_node="">
          Results:
        </span></strong><span data-dcnode-id="67" instrument_node="">
      
      Six themes were identified: 1) experiencing psychosomatic symptoms, 2) adoption of new healthy behaviors, 3) financial hardship, 4) family concerns, 5) reflections on discrimination and 6) reflections of existing support and expectations of support systems. The findings of our study illustrate the specific impact of COVID-19 among Nepalese migrants regarding their unstable employment conditions, perceived lack of social support, possible obligation to send money home, difficulty in accessing services due to the language barrier, and a lack of effective governmental support from Nepal. Pandemic-related adversity has negatively impacted migrants' mental well-being, exacerbating their vulnerability.
    </span></p><span data-dcnode-id="65" instrument_node="">
</span><p data-dcnode-id="60"><span data-dcnode-id="64" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="62"><span data-dcnode-id="63" instrument_node="">
          Conclusions:
        </span></strong><span data-dcnode-id="61" instrument_node="">
      
      Comprehensive and timely support should be provided to the vulnerable migrant population. Effective coordination among relevant parties in both countries, including the governments concerned, should be facilitated.
    </span></p><span data-dcnode-id="59" instrument_node="">
</span></div><span data-dcnode-id="57" instrument_node="">
</span><p data-dcnode-id="52"><span data-dcnode-id="56" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="54"><span data-dcnode-id="55" instrument_node="">
          Keywords:
        </span></strong><span data-dcnode-id="53" instrument_node="">
      
      COVID-19; Financial hardship, migrant welfare, mental health, migrant health; Japan; Migrants; Nepalese.
    </span></p><span data-dcnode-id="51" instrument_node="">
