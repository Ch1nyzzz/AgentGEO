</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" style="font-weight: 400;"><span data-dcnode-id="1475" instrument_node="">The world is currently dealing with the largest refugee population on record, with more than 25 million people uprooted from their homes and living abroad in host communities. Of this 25 million, 11 million (according to UNICEF) are children. This number has doubled over the last 10 years.&nbsp;</span></span></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" style="font-weight: 400;"><span data-dcnode-id="1471" instrument_node="">While there are risks and challenges for all refugees, living an uprooted life has unique impacts on children. Here are 5.&nbsp;</span></span></p><span data-dcnode-id="1468" instrument_node="">

</span><h3 data-dcnode-id="1364"><span data-dcnode-id="1365" style="font-weight: 400;"><span data-dcnode-id="1366" instrument_node="">1. Limited access to quality education</span></span></h3><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1361" style="font-weight: 400;"><span data-dcnode-id="1362" instrument_node="">A </span></span><a data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/quality-education/"><span data-dcnode-id="1359" style="font-weight: 400;"><span data-dcnode-id="1360" instrument_node="">quality education</span></span></a><span data-dcnode-id="1356" style="font-weight: 400;"><span data-dcnode-id="1357" instrument_node=""> is one of the essentials to success in life, but this becomes a challenge in refugee emergencies. According to UNICEF, refugee children are </span></span><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unicef.org/media/files/Education_Uprooted_DIGITAL.pdf"><span data-dcnode-id="1354" style="font-weight: 400;"><span data-dcnode-id="1355" instrument_node="">5 times more likely</span></span></a><span data-dcnode-id="1351" style="font-weight: 400;"><span data-dcnode-id="1352" instrument_node=""> to be out of school than other children, often due to school safety, </span></span><a data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/language-barriers-in-classroom/"><span data-dcnode-id="1349" style="font-weight: 400;"><span data-dcnode-id="1350" instrument_node="">language barriers in the classroom</span></span></a><span data-dcnode-id="1346" style="font-weight: 400;"><span data-dcnode-id="1347" instrument_node="">, and financial issues.&nbsp;</span></span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" style="font-weight: 400;"><span data-dcnode-id="1343" instrument_node="">Many of these challenges are a reality for Syrian children living in Lebanon (which is host to over 1 million Syrian refugees). The emotional toll of conflict, trauma, and asylum-seeking has left many children simply not ready to enter a formal classroom, and many others end up in child labor, to help families make ends meet.</span></span></p><span data-dcnode-id="1340" instrument_node="">
</span><div class="custom-link-block" data-dcnode-id="1314"><span data-dcnode-id="1339" instrument_node="">

</span></div><div class="custom-link-block--inner-content col-md-9" data-dcnode-id="1318"><span data-dcnode-id="1331" instrument_node="">
</span><h3 data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">11 unexpected barriers to education around the world</span></h3><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">263 million children and youth around the world won’t be going to school at all. Here are some of the reasons why.</span></p><span data-dcnode-id="1325" instrument_node="">
</span><div class="button custom-link-block--button" data-dcnode-id="1320"><span data-dcnode-id="1324" instrument_node="">
</span><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/barriers-to-education-around-the-world/"><span data-dcnode-id="1323" instrument_node="">Read</span></a><span data-dcnode-id="1321" instrument_node="">
</span></div><span data-dcnode-id="1319" instrument_node="">
</span></div><span data-dcnode-id="1317" instrument_node="">
</span></div><span data-dcnode-id="1315" instrument_node="">
</span></div><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" style="font-weight: 400;"><span data-dcnode-id="1312" instrument_node="">Concern Lebanon has developed a Home Learning Techniques curriculum, which builds the capacity of parents so that they can engage in activities at home that help their children in their development and studies, fostering a supportive home-learning environment.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1309" instrument_node="">
</span><h3 data-dcnode-id="1306"><span data-dcnode-id="1307" style="font-weight: 400;"><span data-dcnode-id="1308" instrument_node="">2. Compromised mental health and the threat of “lost” childhoods</span></span></h3><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1303" style="font-weight: 400;"><span data-dcnode-id="1304" instrument_node="">The causes of </span></span><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/forced-migration-causes/"><span data-dcnode-id="1301" style="font-weight: 400;"><span data-dcnode-id="1302" instrument_node="">forced migration</span></span></a><span data-dcnode-id="1298" style="font-weight: 400;"><span data-dcnode-id="1299" instrument_node=""> are traumatizing enough for anyone. But they hit children especially hard as they are still developing emotionally and mentally, and lack the same tools that adults often have to navigate trauma.</span></span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1294" style="font-weight: 400;"><span data-dcnode-id="1295" instrument_node="">“When children grow up in armed conflict, their deep mental scars are often overlooked,” UNICEF Executive Director Henrietta H. Fore said </span></span><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unicef.org/press-releases/mental-health-needs-children-and-young-people-conflict-need-be-prioritized"><span data-dcnode-id="1292" style="font-weight: 400;"><span data-dcnode-id="1293" instrument_node="">at a 2018 conference in Berlin</span></span></a><span data-dcnode-id="1289" style="font-weight: 400;"><span data-dcnode-id="1290" instrument_node="">. “Prolonged exposure to violence, fear and uncertainty can have a catastrophic impact on children’s learning, behavior and emotional and social development for many years.” All of this adds up to the sense of a “lost” childhood for those who have to grow up too quickly in order to survive.&nbsp;</span></span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1285" style="font-weight: 400;"><span data-dcnode-id="1286" instrument_node="">It doesn’t end with past trauma, either: Displacement can further affect the mental health of children, leaving them to develop a number of unhealthy coping mechanisms in response to their heightened vulnerability. Even if a conflict ends and they’re able to return home, these experiences may remain with them for the rest of their lives.&nbsp;</span></span></p><span data-dcnode-id="1283" instrument_node="">

</span><p data-dcnode-id="975"><em data-dcnode-id="976"><a data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vimeo.com/254537323"><span data-dcnode-id="979" instrument_node="">Video: Concern in Lebanon</span></a><span data-dcnode-id="977" instrument_node="">: Learn more about our work with Syrian refugee children in Lebanon, and hear some of their stories firsthand.&nbsp;</span></em></p><span data-dcnode-id="974" instrument_node="">
</span><h3 data-dcnode-id="971"><span data-dcnode-id="972" style="font-weight: 400;"><span data-dcnode-id="973" instrument_node="">3. Separation from families and greater vulnerability</span></span></h3><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="964"><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.unicef.org/resources/children-move-key-facts-figures/"><span data-dcnode-id="968" style="font-weight: 400;"><span data-dcnode-id="969" instrument_node="">UNICEF’s latest estimates</span></span></a><span data-dcnode-id="965" style="font-weight: 400;"><span data-dcnode-id="966" instrument_node=""> suggest at least 300,000 unaccompanied and separated children were registered in 80 countries over the course of two years. Many of these children are separated from their families.</span></span></p><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="961" style="font-weight: 400;"><span data-dcnode-id="962" instrument_node="">While refugee children in general are more vulnerable to violence, exploitation, and abuse, they’re even more so if they’re unaccompanied — a </span></span><a data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unicef.org/publications/files/Harrowing_Journeys_Children_and_youth_on_the_move_across_the_Mediterranean.pdf"><span data-dcnode-id="959" style="font-weight: 400;"><span data-dcnode-id="960" instrument_node="">2017 study</span></span></a><span data-dcnode-id="956" style="font-weight: 400;"><span data-dcnode-id="957" instrument_node=""> published by UNICEF found that risk could be more than doubled. Young girls can be the target of </span></span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/3-causes-gender-based-violence/"><span data-dcnode-id="954" style="font-weight: 400;"><span data-dcnode-id="955" instrument_node="">gender-based violence</span></span></a><span data-dcnode-id="951" style="font-weight: 400;"><span data-dcnode-id="952" instrument_node=""> or trafficking.&nbsp;</span></span></p><span data-dcnode-id="949" instrument_node="">
</span><blockquote data-dcnode-id="946"><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Unaccompanied refugee children are at more than double the risk for violence, exploitation, and abuse.</span></p></blockquote><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" style="font-weight: 400;"><span data-dcnode-id="944" instrument_node="">That same UNICEF study showed that 8 out of 10 unaccompanied young refugees traveling the Central Mediterranean route reported some form of exploitation. On the Eastern Mediterranean route, young refugees traveling alone faced nearly two times the risk as adults. These are two of the most dangerous migration routes.</span></span></p><span data-dcnode-id="941" instrument_node="">
</span><h3 data-dcnode-id="938"><span data-dcnode-id="939" style="font-weight: 400;"><span data-dcnode-id="940" instrument_node="">4. Shifting family dynamics and responsibilities</span></span></h3><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" style="font-weight: 400;"><span data-dcnode-id="936" instrument_node="">Overcrowded housing conditions. The aftermath of traumatic events. Radically different financial realities. These circumstances are common with refugee families living in host communities, which can lead to a dysfunctional shift in family dynamics once they reach asylum. This can have a family-wide impact, and leave children in an especially vulnerable position.&nbsp;</span></span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="931" style="font-weight: 400;"><span data-dcnode-id="932" instrument_node="">In the Central African Republic, violence has displaced over 1 million people, creating one of the </span></span><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/largest-refugee-crises/"><span data-dcnode-id="929" style="font-weight: 400;"><span data-dcnode-id="930" instrument_node="">largest refugee crises today</span></span></a><span data-dcnode-id="926" style="font-weight: 400;"><span data-dcnode-id="927" instrument_node="">. This has left children like 13–year-old Octavie tasked with caring for younger family members (like Octavie’s infant nephew, Jolidor) with their parents living in different areas.</span></span></p><span data-dcnode-id="924" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="920" id="attachment_23531" style="width: 1190px"><img alt="" aria-describedby="caption-attachment-23531" class="size-large wp-image-23531" data-dcnode-id="923" height="788" loading="lazy" sizes="(max-width: 1180px) 100vw, 1180px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/wp-content/uploads/2017/10/concern-central-african-republic-octavie-1180x788.jpg&amp;raw" srcset="https://www.concernusa.org/wp-content/uploads/2017/10/concern-central-african-republic-octavie-1180x788.jpg 1180w, https://www.concernusa.org/wp-content/uploads/2017/10/concern-central-african-republic-octavie-300x200.jpg 300w, https://www.concernusa.org/wp-content/uploads/2017/10/concern-central-african-republic-octavie-768x513.jpg 768w, https://www.concernusa.org/wp-content/uploads/2017/10/concern-central-african-republic-octavie-90x60.jpg 90w, https://www.concernusa.org/wp-content/uploads/2017/10/concern-central-african-republic-octavie-100x67.jpg 100w, https://www.concernusa.org/wp-content/uploads/2017/10/concern-central-african-republic-octavie-520x347.jpg 520w, https://www.concernusa.org/wp-content/uploads/2017/10/concern-central-african-republic-octavie-75x50.jpg 75w, https://www.concernusa.org/wp-content/uploads/2017/10/concern-central-african-republic-octavie-450x300.jpg 450w, https://www.concernusa.org/wp-content/uploads/2017/10/concern-central-african-republic-octavie-764x510.jpg 764w" width="1180"><p class="wp-caption-text" data-dcnode-id="921" id="caption-attachment-23531"><span data-dcnode-id="922" instrument_node="">Octavie is only 13, but responsible for her nephew. Neither of their mothers are around. Photo: Chris de Bode/Panos Pictures for Concern Worldwide</span></p></div><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="917" style="font-weight: 400;"><span data-dcnode-id="918" instrument_node="">In the case of Octavie and Jolidor, this not only placed an undue burden on the teenager’s shoulders, but also resulted in Jolidor being diagnosed with acute malnutrition. (Community health volunteers were fortunately able to help with a regimen of </span></span><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/rutf-cmam-humanitarian-revolution/"><span data-dcnode-id="915" style="font-weight: 400;"><span data-dcnode-id="916" instrument_node="">RUTF</span></span></a><span data-dcnode-id="912" style="font-weight: 400;"><span data-dcnode-id="913" instrument_node=""> therapeutic food, provided by Concern.)</span></span></p><span data-dcnode-id="910" instrument_node="">
</span><h3 data-dcnode-id="907"><span data-dcnode-id="908" style="font-weight: 400;"><span data-dcnode-id="909" instrument_node="">5. Isolation in host community</span></span></h3><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" style="font-weight: 400;"><span data-dcnode-id="905" instrument_node="">Many of the above factors can affect how much “at home” a refugee child feels in their host community. Beyond these challenges, however, xenophobia and discrimination play a big role in isolating those seeking asylum. Amid such lonely conditions, it’s hard to rebuild a life or regain a sense of normalcy.&nbsp;</span></span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="900" style="font-weight: 400;"><span data-dcnode-id="901" instrument_node="">A </span></span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unicef.org/publications/index_103433.html"><span data-dcnode-id="898" style="font-weight: 400;"><span data-dcnode-id="899" instrument_node="">recent UNICEF report</span></span></a><span data-dcnode-id="895" style="font-weight: 400;"><span data-dcnode-id="896" instrument_node=""> also points out that children are often isolated from data surrounding refugees, leaving their representation in the numbers hard to fully codify. This adversely affects how much their own unique needs are heard and considered when it comes to setting policies or offering social services and child protection.</span></span></p><span data-dcnode-id="893" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="889" id="attachment_24661" style="width: 1190px"><img alt="Syrian Refugee children, living in informal settlements in Lebanon wade through the mud caused by storm ‘Bladimer’" aria-describedby="caption-attachment-24661" class="size-large wp-image-24661" data-dcnode-id="892" height="885" loading="lazy" sizes="(max-width: 1180px) 100vw, 1180px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/wp-content/uploads/2019/01/Lebanon-winter-1180x885.jpg&amp;raw" srcset="https://www.concernusa.org/wp-content/uploads/2019/01/Lebanon-winter-1180x885.jpg 1180w, https://www.concernusa.org/wp-content/uploads/2019/01/Lebanon-winter-300x225.jpg 300w, https://www.concernusa.org/wp-content/uploads/2019/01/Lebanon-winter-768x576.jpg 768w, https://www.concernusa.org/wp-content/uploads/2019/01/Lebanon-winter-80x60.jpg 80w, https://www.concernusa.org/wp-content/uploads/2019/01/Lebanon-winter-100x75.jpg 100w, https://www.concernusa.org/wp-content/uploads/2019/01/Lebanon-winter-520x390.jpg 520w, https://www.concernusa.org/wp-content/uploads/2019/01/Lebanon-winter-75x56.jpg 75w, https://www.concernusa.org/wp-content/uploads/2019/01/Lebanon-winter-267x200.jpg 267w, https://www.concernusa.org/wp-content/uploads/2019/01/Lebanon-winter-67x50.jpg 67w, https://www.concernusa.org/wp-content/uploads/2019/01/Lebanon-winter-640x480.jpg 640w, https://www.concernusa.org/wp-content/uploads/2019/01/Lebanon-winter-450x338.jpg 450w, https://www.concernusa.org/wp-content/uploads/2019/01/Lebanon-winter-680x510.jpg 680w" width="1180"><p class="wp-caption-text" data-dcnode-id="890" id="caption-attachment-24661"><span data-dcnode-id="891" instrument_node="">Syrian Refugee children, living in informal settlements in Lebanon. Photographer: Hussein Aladraa</span></p></div><span data-dcnode-id="888" instrument_node="">
</span><h3 data-dcnode-id="885"><span data-dcnode-id="886" style="font-weight: 400;"><span data-dcnode-id="887" instrument_node="">Concern’s work with refugee children</span></span></h3><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" style="font-weight: 400;"><span data-dcnode-id="883" instrument_node="">From education and emergency response to nutrition and water &amp; sanitation, children (and their unique needs and circumstances) are at the center of all areas of Concern’s work.&nbsp;</span></span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" style="font-weight: 400;"><span data-dcnode-id="879" instrument_node="">In response to the Rohingya refugee crisis, we’ve been supporting operations at the world’s largest refugee camp in Cox’s Bazar, Bangladesh (where we’ve worked for over 40 years). One of our key focuses there is maternal and child health, helping expecting and new mothers in the Rohingya refugee community get the care they need and learn how to care for their newborns.</span></span></p><span data-dcnode-id="876" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="872" id="attachment_21761" style="width: 1190px"><img alt="Womena and children at nutrition center in Bangladesh" aria-describedby="caption-attachment-21761" class="size-large wp-image-21761" data-dcnode-id="875" height="886" loading="lazy" sizes="(max-width: 1180px) 100vw, 1180px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/wp-content/uploads/2018/04/35567-1180x886.jpg&amp;raw" srcset="https://www.concernusa.org/wp-content/uploads/2018/04/35567-1180x886.jpg 1180w, https://www.concernusa.org/wp-content/uploads/2018/04/35567-300x225.jpg 300w, https://www.concernusa.org/wp-content/uploads/2018/04/35567-768x577.jpg 768w, https://www.concernusa.org/wp-content/uploads/2018/04/35567-80x60.jpg 80w, https://www.concernusa.org/wp-content/uploads/2018/04/35567-100x75.jpg 100w, https://www.concernusa.org/wp-content/uploads/2018/04/35567-520x390.jpg 520w, https://www.concernusa.org/wp-content/uploads/2018/04/35567-75x56.jpg 75w, https://www.concernusa.org/wp-content/uploads/2018/04/35567-266x200.jpg 266w, https://www.concernusa.org/wp-content/uploads/2018/04/35567-67x50.jpg 67w, https://www.concernusa.org/wp-content/uploads/2018/04/35567-640x480.jpg 640w, https://www.concernusa.org/wp-content/uploads/2018/04/35567-450x338.jpg 450w, https://www.concernusa.org/wp-content/uploads/2018/04/35567-679x510.jpg 679w" width="1180"><p class="wp-caption-text" data-dcnode-id="873" id="caption-attachment-21761"><span data-dcnode-id="874" instrument_node="">Habib* came with his mother Melina* at Tanjimarkhola OTP center of Concern in Rohingya refugee camp. Habib was identified as severely malnourished during household level screening and referred to the OTP center.</span></p></div><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" style="font-weight: 400;"><span data-dcnode-id="870" instrument_node="">In Lebanon and Turkey, where we’ve had operations since 2013 in response to the influx of Syrian refugees, we’ve tailored educational programs to provide psychosocial support to Syrian children (many of whom were born after the conflict began). For those who are ready to enter a formal school system, we make sure they have the language skills they need. For others, who need a safe space to be kids, we’ve developed informal education models that give them the room they need.</span></span></p><span data-dcnode-id="867" instrument_node="">

</span><h3 data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Voices from Lebanon: "Thank you for not giving up on my son"</span></h3><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Kareem* struggled with overwhelming anger and sadness as he grew up in a refugee camp in Lebanon. Now he's thriving.</span></p><span data-dcnode-id="852" instrument_node="">

</span><p data-dcnode-id="837"><span data-dcnode-id="838" style="font-weight: 400;"><span data-dcnode-id="839" instrument_node="">From South Sudan to Bangladesh, we’ve also made sure that refugee children are fed and nourished. In 2018 alone, we held monthly nutrition screenings for nearly 50,000 Rohingya children in Cox’s Bazar, admitting over 6,100 children to outpatient clinics where we supported them with a combination of community care and therapeutic food, and seeing a cure rate of 97%.</span></span></p><span data-dcnode-id="836" instrument_node="">
