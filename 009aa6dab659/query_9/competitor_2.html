</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">For the last 10 years, a protracted crisis has resulted in millions of Syrians taking refuge abroad. Many of them are women, who arrive in refugee camps or communities with no money, no prospects, and no preparation for the unique challenges they will face. </span></p><span data-dcnode-id="1101" instrument_node="">
</span></div><span data-dcnode-id="1099" instrument_node="">

</span><ul class="social-links icons" data-dcnode-id="1075"><li class="social-link facebook-share facebook" data-dcnode-id="1089"><a class="icon fb-share" data-dcnode-id="1090" data-description="For the last 10 years, a protracted crisis has resulted in millions of Syrians taking refuge abroad. Many of them are women, who arrive in refugee camps or communities with no money, no prospects, and no preparation for the unique..." data-img="https://www.concernusa.org/wp-content/uploads/2020/03/concern-lebanon-emergency-response-syria-winter-500x250.jpg" data-original_url="https://www.concernusa.org/story/syrian-refugee-women-challenges/" data-social_type="Facebook" data-title="5 unique challenges facing Syrian refugee women" data-url="https://www.concernusa.org/story/syrian-refugee-women-challenges/?utm_campaign=website&amp;utm_source=facebook&amp;utm_medium=site" href="javascript:void(0)" target="_blank"><span class="icon icon-facebook" data-dcnode-id="1093"></span><span class="text-content" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Share</span></span></a></li><span data-dcnode-id="1088" instrument_node="">

</span><p data-dcnode-id="1068"><span data-dcnode-id="1069" style="font-weight: 400;"><span data-dcnode-id="1070" instrument_node="">“Every day is like a year here,” Yara* told us from her informal refugee settlement in Lebanon. “We were living. Now we have nothing.”&nbsp;</span></span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" style="font-weight: 400;"><span data-dcnode-id="1066" instrument_node="">Yara is one of the millions of Syrian refugees who have found temporary shelter in neighboring host communities, and like many she faced grave challenges simply getting out of her home country. For the last 10 years, </span><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/syria-crisis-explained/"><span data-dcnode-id="1065" instrument_node="">Syria has been caught in a protracted conflict that escalated into a full humanitarian crisis</span></a><span data-dcnode-id="1063" instrument_node="">. This has had a disproportionate impact on Syrian refugee women, many of whom arrive in a formal camp or informal community with no money, no prospects, and the new responsibility of being the head of a household (whether it’s simply their own children or also extended family). All of this comes with a set of unique challenges.&nbsp;</span></span></p><span data-dcnode-id="1060" instrument_node="">
</span><div class="inline-newsletter" data-dcnode-id="960" data-redirect="" data-title="5 unique challenges facing Syrian refugee women"><div data-dcnode-id="1058"><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/syrian-refugee-women-challenges" style="" target="_blank"></a></div><h4 data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Learn more about our work in Syria — and how you can help</span></h4><div class="newsletter-form" data-dcnode-id="961"><span data-dcnode-id="1055" instrument_node="">

</span><h3 data-dcnode-id="956"><span data-dcnode-id="957" style="font-weight: 400;"><span data-dcnode-id="958" instrument_node="">Where Syrian refugee women are coming from — figuratively</span></span></h3><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" style="font-weight: 400;"><span data-dcnode-id="954" instrument_node="">Before we dive in, some context might be helpful: Prior to the start of the war, and throughout most of the 20th Century, </span><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/gender-inequalities-we-need-to-address/"><span data-dcnode-id="953" instrument_node="">gender equality</span></a><span data-dcnode-id="951" instrument_node=""> in Syria had been the subject of debate and discourse. (In fact, 1919 marked the 100th birthday of the country’s first women’s organization, Light of Damascus.) Still, many of Syria’s norms, traditions, and even laws governing women’s rights may seem regressive in comparison to other countries. Women only gained the right to vote in national elections in the mid-1950s. Women are allowed to work but still only made up a small percent of the pre-war workforce. Marriage in </span><a data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/country/syria/"><span data-dcnode-id="950" instrument_node="">Syria</span></a><span data-dcnode-id="948" instrument_node=""> is still considered to be a contract between the husband and his wife’s father.&nbsp;</span></span></p><span data-dcnode-id="945" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="941" id="attachment_31980" style="width: 1190px"><img alt="" aria-describedby="caption-attachment-31980" class="size-large wp-image-31980" data-dcnode-id="944" height="787" loading="lazy" sizes="(max-width: 1180px) 100vw, 1180px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/wp-content/uploads/2021/02/Security-1180x787.jpg&amp;raw" srcset="https://www.concernusa.org/wp-content/uploads/2021/02/Security-1180x787.jpg 1180w, https://www.concernusa.org/wp-content/uploads/2021/02/Security-300x200.jpg 300w, https://www.concernusa.org/wp-content/uploads/2021/02/Security-768x512.jpg 768w, https://www.concernusa.org/wp-content/uploads/2021/02/Security-203x135.jpg 203w, https://www.concernusa.org/wp-content/uploads/2021/02/Security-1200x800.jpg 1200w, https://www.concernusa.org/wp-content/uploads/2021/02/Security-90x60.jpg 90w, https://www.concernusa.org/wp-content/uploads/2021/02/Security-100x67.jpg 100w, https://www.concernusa.org/wp-content/uploads/2021/02/Security-520x347.jpg 520w, https://www.concernusa.org/wp-content/uploads/2021/02/Security-75x50.jpg 75w, https://www.concernusa.org/wp-content/uploads/2021/02/Security-450x300.jpg 450w, https://www.concernusa.org/wp-content/uploads/2021/02/Security-765x510.jpg 765w" width="1180"><p class="wp-caption-text" data-dcnode-id="942" id="caption-attachment-31980"><span data-dcnode-id="943" instrument_node="">50-year-old Maha* was a primary school teacher in Syria before she fled to Lebanon in 2014. She now lives on her own in a concrete collective centre housing ten refugee families, which was originally built to house chickens. Maha participated in a 12-week women’s group organized by Concern, which provided psychosocial support, reduced GBV, managed protection issues, and helped to promote gender equality. “I love to sit with other women in the group and talk together,” she said. “When we share our problems, I see mine as small.” (Photo: Darren Vaughan)</span></p></div><span data-dcnode-id="940" instrument_node="">
</span><h3 data-dcnode-id="937"><span data-dcnode-id="938" style="font-weight: 400;"><span data-dcnode-id="939" instrument_node="">1. Domestic and gender-based violence&nbsp;</span></span></h3><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" style="font-weight: 400;"><span data-dcnode-id="935" instrument_node="">Many </span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/mental-health-for-syrian-refugee-men/"><span data-dcnode-id="934" instrument_node="">Syrian refugee men</span></a><span data-dcnode-id="932" instrument_node=""> are unable to find work and provide for their families. As a result, their traditional role within the family has been disrupted over the past decade, leading to stress and lowered self-esteem. As men face mounting poverty and desperation, their frustration has increasingly turned into physical violence towards their wives. Women have reported that stress has led to them to be violent towards their children as well. Due to the way marriage and domestic abuse have been traditionally and legally regarded in the country, most women are reluctant to leave their husbands and partners. Many are unaware that social services are even available to them in this case.&nbsp;</span></span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" style="font-weight: 400;"><span data-dcnode-id="928" instrument_node="">Even if a woman is unmarried or in a safe domestic environment, however, she may still be subject to </span><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/causes-of-gender-based-violence/"><span data-dcnode-id="927" instrument_node="">gender-based violence</span></a><span data-dcnode-id="925" instrument_node=""> (including sexual assault, forced marriage, and honor killings). In Lebanon, whose population is nearly 30% Syrian refugees, there are no formal camps for those living in displacement. This means that many Syrians in the country find informal tented settlements, abandoned buildings being rented out to refugees, or other accommodations that offer little security or protection. “I cannot sleep at night as there is no defense, no windows. I don’t feel safe,” Nofah*, a 36-year-old mother who lives with her husband and children told us from one such settlement in 2018. “Often, people come at night to peer through the space where windows should be, especially at the women.”</span></span></p><span data-dcnode-id="922" instrument_node="">
</span><div class="custom-link-block" data-dcnode-id="896"><span data-dcnode-id="921" instrument_node="">
</span><div class="custom-link-block--heading add-border" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">
            Related
          </span></div><span data-dcnode-id="918" instrument_node="">
</span><div class="custom-link-block--content row" data-dcnode-id="898"><div class="custom-link-block--image col-md-3" data-dcnode-id="914"><span data-dcnode-id="917" instrument_node="">
</span><img data-dcnode-id="916" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/wp-content/uploads/2015/06/concern-syria-protection-feature-460x460.jpg&amp;raw"><span data-dcnode-id="915" instrument_node="">
</span></div><div class="custom-link-block--inner-content col-md-9" data-dcnode-id="900"><span data-dcnode-id="913" instrument_node="">
</span><h3 data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Syrian refugee men confront feelings of powerlessness to fight GBV</span></h3><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Syrian refugees in Lebanon face the tough reality of having to start over from scratch. For the men in these situations, not being able to provide and lead their families like before can create a rift in identity. Men's Protection Groups have sprouted up in camps to instill a sense of normalcy and create a safe space of coping. </span></p><span data-dcnode-id="907" instrument_node="">
</span><div class="button custom-link-block--button" data-dcnode-id="902"><span data-dcnode-id="906" instrument_node="">
</span><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/mental-health-for-syrian-refugees/" target="_blank"><span data-dcnode-id="905" instrument_node="">Read More</span></a><span data-dcnode-id="903" instrument_node="">
</span></div><span data-dcnode-id="901" instrument_node="">
</span></div><span data-dcnode-id="899" instrument_node="">
</span></div><span data-dcnode-id="897" instrument_node="">
</span></div><span data-dcnode-id="895" instrument_node="">
</span><h3 data-dcnode-id="892"><span data-dcnode-id="893" style="font-weight: 400;"><span data-dcnode-id="894" instrument_node="">2. Early and forced marriage</span></span></h3><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" style="font-weight: 400;"><span data-dcnode-id="890" instrument_node="">Even before the war, approximately 10% of Syrian marriages involved a bride under the age of 18 (the legal age for marriage in the country is 17 for girls and 18 for boys). A recent UNICEF report suggests that the rate for early marriage in some camps went as high as 32%.&nbsp;</span></span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" style="font-weight: 400;"><span data-dcnode-id="886" instrument_node="">Much of this is out of necessity, thanks to the cultural and economic protections that marriage offers Syrian women and girls. For parents struggling with the financial challenges of living as refugees (often unable to work in a job similar to what they had at home before the war), marrying off their daughter means one less mouth to feed, while ensuring that their daughter will be taken care of by someone whose means are better than their own. </span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/child-marriage-education/"><span data-dcnode-id="885" instrument_node="">Early and forced marriages</span></a><span data-dcnode-id="883" instrument_node=""> have also been increasingly used in the last decade to help daughters escape violence and conflict at home in Syria, and stay protected from sexual harassment and assault in displacement camps.&nbsp;</span></span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" style="font-weight: 400;"><span data-dcnode-id="879" instrument_node="">However, even in the best of circumstances, many parents regret this choice even while viewing it as a grim necessity. In 2012, Shiya* married off her 13-year-old daughter as a safety measure. “She married too young,” Shiya said. “But because of the war, we decided together as a family that it was better for her to get married and be protected.”&nbsp;</span></span></p><span data-dcnode-id="876" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="872" id="attachment_17610" style="width: 1190px"><img alt="" aria-describedby="caption-attachment-17610" class="size-large wp-image-17610" data-dcnode-id="875" height="900" loading="lazy" sizes="(max-width: 1180px) 100vw, 1180px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/wp-content/uploads/2017/06/concern-lebanon-haya-faces-of-refugee-2-1180x900.jpg&amp;raw" srcset="https://www.concernusa.org/wp-content/uploads/2017/06/concern-lebanon-haya-faces-of-refugee-2-1180x900.jpg 1180w, https://www.concernusa.org/wp-content/uploads/2017/06/concern-lebanon-haya-faces-of-refugee-2-300x229.jpg 300w, https://www.concernusa.org/wp-content/uploads/2017/06/concern-lebanon-haya-faces-of-refugee-2-768x586.jpg 768w, https://www.concernusa.org/wp-content/uploads/2017/06/concern-lebanon-haya-faces-of-refugee-2-79x60.jpg 79w, https://www.concernusa.org/wp-content/uploads/2017/06/concern-lebanon-haya-faces-of-refugee-2-100x76.jpg 100w, https://www.concernusa.org/wp-content/uploads/2017/06/concern-lebanon-haya-faces-of-refugee-2-520x397.jpg 520w, https://www.concernusa.org/wp-content/uploads/2017/06/concern-lebanon-haya-faces-of-refugee-2-75x57.jpg 75w, https://www.concernusa.org/wp-content/uploads/2017/06/concern-lebanon-haya-faces-of-refugee-2-262x200.jpg 262w, https://www.concernusa.org/wp-content/uploads/2017/06/concern-lebanon-haya-faces-of-refugee-2-66x50.jpg 66w, https://www.concernusa.org/wp-content/uploads/2017/06/concern-lebanon-haya-faces-of-refugee-2-450x343.jpg 450w, https://www.concernusa.org/wp-content/uploads/2017/06/concern-lebanon-haya-faces-of-refugee-2-669x510.jpg 669w" width="1180"><p class="wp-caption-text" data-dcnode-id="873" id="caption-attachment-17610"><span data-dcnode-id="874" instrument_node="">Haya* is the mother of five children and lives with three other families in a two-room flat. Her two youngest children were born in Lebanon. Photo: Abbie Trayler-Smith</span></p></div><span data-dcnode-id="871" instrument_node="">
</span><h3 data-dcnode-id="868"><span data-dcnode-id="869" style="font-weight: 400;"><span data-dcnode-id="870" instrument_node="">3. Suddenly being the head of their household — and needing to provide</span></span></h3><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" style="font-weight: 400;"><span data-dcnode-id="866" instrument_node="">Before the war broke out, many Syrian women were educated, but few were a part of the workforce. The Syrian crisis, however, has led to many Syrian refugee women becoming the head of their household, whether it’s because their husbands disappeared, were killed, or unable to join them when they escaped the country. For many women, this means that they need to learn a practical skill that they can use to earn income as refugees, which is a small list to begin with. Some have turned to sex work in order to get the basics needed to survive.&nbsp;</span></span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" style="font-weight: 400;"><span data-dcnode-id="862" instrument_node="">Even those who were employed before the war find this new scenario a struggle. Nour*, who worked as a teacher and a tailor, was abandoned by her husband who left for Turkey and refused to send any financial support. “I live in an unfamiliar place without enough money and without a job,” she told Concern, adding that she not only cared for her four children, but also her 16-year-old nephew. “I feel alone.”&nbsp;</span></span></p><span data-dcnode-id="859" instrument_node="">
</span><div class="custom-link-block" data-dcnode-id="833"><span data-dcnode-id="858" instrument_node="">
</span><div class="custom-link-block--heading add-border" data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">
            Related
          </span></div><span data-dcnode-id="855" instrument_node="">
</span><div class="custom-link-block--content row" data-dcnode-id="835"><div class="custom-link-block--image col-md-3" data-dcnode-id="851"><span data-dcnode-id="854" instrument_node="">
</span><img data-dcnode-id="853" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/wp-content/uploads/2019/03/Khadija-460x460.jpg&amp;raw"><span data-dcnode-id="852" instrument_node="">
</span></div><div class="custom-link-block--inner-content col-md-9" data-dcnode-id="837"><span data-dcnode-id="850" instrument_node="">
</span><h3 data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Syrian women look to the future</span></h3><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">While the ordeal for those displaced during the conflict is not nearly over, many are now looking to the day when they can at last go home. Concern has been helping them both survive and prepare for the future.</span></p><span data-dcnode-id="844" instrument_node="">
</span><div class="button custom-link-block--button" data-dcnode-id="839"><span data-dcnode-id="843" instrument_node="">
</span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/syrian-women-look-to-the-future/" target="_blank"><span data-dcnode-id="842" instrument_node="">Read More</span></a><span data-dcnode-id="840" instrument_node="">
</span></div><span data-dcnode-id="838" instrument_node="">
</span></div><span data-dcnode-id="836" instrument_node="">
</span></div><span data-dcnode-id="834" instrument_node="">
</span></div><span data-dcnode-id="832" instrument_node="">
</span><h3 data-dcnode-id="829"><span data-dcnode-id="830" style="font-weight: 400;"><span data-dcnode-id="831" instrument_node="">4. Anxiety, depression, and PTSD</span></span></h3><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" style="font-weight: 400;"><a data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/mental-health-for-syrian-refugee-men/"><span data-dcnode-id="827" instrument_node="">Mental health issues are common among refugees regardless of gender</span></a><span data-dcnode-id="825" instrument_node="">, but each faces unique challenges. Crisis and conflict come at a high cost to the status quo, and for many Syrian refugee women, their worlds as they’ve known them have become completely upended. Those who are living in displacement without some connection to their previous “normal” lives (such as family members — especially male ones) are increasingly vulnerable towards feelings of isolation, loneliness, and desperation.&nbsp;</span></span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" style="font-weight: 400;"><span data-dcnode-id="821" instrument_node="">This is exactly what happened for Nour when she was left on her own as the provider of her family of six. “I am waiting for death,” she told Concern after noting that she had attempted suicide several times (her neighbors have often come to her rescue). “I have no hope in this life.”&nbsp;</span></span></p><span data-dcnode-id="818" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="814" id="attachment_15039" style="width: 1190px"><img alt="&quot;Iman&quot; is a Syrian refugee who is living in a garage" aria-describedby="caption-attachment-15039" class="size-large wp-image-15039" data-dcnode-id="817" height="786" loading="lazy" sizes="(max-width: 1180px) 100vw, 1180px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/wp-content/uploads/2016/12/concern-lebanon-iman-syrian-crisis-1180x786.jpg&amp;raw" srcset="https://www.concernusa.org/wp-content/uploads/2016/12/concern-lebanon-iman-syrian-crisis-1180x786.jpg 1180w, https://www.concernusa.org/wp-content/uploads/2016/12/concern-lebanon-iman-syrian-crisis-300x200.jpg 300w, https://www.concernusa.org/wp-content/uploads/2016/12/concern-lebanon-iman-syrian-crisis-90x60.jpg 90w, https://www.concernusa.org/wp-content/uploads/2016/12/concern-lebanon-iman-syrian-crisis-100x67.jpg 100w, https://www.concernusa.org/wp-content/uploads/2016/12/concern-lebanon-iman-syrian-crisis-520x346.jpg 520w, https://www.concernusa.org/wp-content/uploads/2016/12/concern-lebanon-iman-syrian-crisis-75x50.jpg 75w, https://www.concernusa.org/wp-content/uploads/2016/12/concern-lebanon-iman-syrian-crisis-450x300.jpg 450w, https://www.concernusa.org/wp-content/uploads/2016/12/concern-lebanon-iman-syrian-crisis-765x510.jpg 765w" width="1180"><p class="wp-caption-text" data-dcnode-id="815" id="caption-attachment-15039"><span data-dcnode-id="816" instrument_node="">Iman* lost 19 members of her family, including her husband, all of her children except one daughter, and all of her grandchildren except one grandson in a bombing attack on their home in Syria. She lives in a garage in Lebanon, which was weatherproofed and plumbed by Concern Worldwide.</span></p></div><span data-dcnode-id="813" instrument_node="">
</span><h3 data-dcnode-id="810"><span data-dcnode-id="811" style="font-weight: 400;"><span data-dcnode-id="812" instrument_node="">5. The new challenges of COVID-19</span></span></h3><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="807" style="font-weight: 400;"><span data-dcnode-id="808" instrument_node="">In many cases, progress was made over the last several years of the conflict when it came to Syrian refugee women. Social support services were made more readily available — to women </span></span><i data-dcnode-id="804"><span data-dcnode-id="805" style="font-weight: 400;"><span data-dcnode-id="806" instrument_node="">and </span></span></i><span data-dcnode-id="799" style="font-weight: 400;"><span data-dcnode-id="803" instrument_node="">men — and more accessible. </span><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/caregiver-engagement-training-syrian-refugees/"><span data-dcnode-id="802" instrument_node="">Caregiver engagement programs</span></a><span data-dcnode-id="800" instrument_node=""> helped those caring for children navigate stress and family dynamics. Syrian women could&nbsp; also access skills trainings and many had begun to learn ways of protecting themselves and feeling safer in their host communities.&nbsp;</span></span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" style="font-weight: 400;"><span data-dcnode-id="796" instrument_node="">However, COVID-19 and the lockdown restrictions that came with it have undone much of this progress. In Lebanon and Jordan, the United Nations High Commissioner for Refugees (UNHCR) reported a drop in calls to the protection hotlines for gender-based violence in the first few months of lockdown, not because the amount of abuse had dropped, but because the ability to safely and discreetly make a call had with shelter-in-place orders.&nbsp;</span></span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" style="font-weight: 400;"><span data-dcnode-id="792" instrument_node="">Lockdown measures have also delayed processing of paperwork, shut down childcare centers, and caused countless other interruptions to daily life, </span><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/story/how-covid-19-affects-women-and-girls/"><span data-dcnode-id="791" instrument_node="">the burdens of many being shouldered by women and girls</span></a><span data-dcnode-id="789" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="786" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="782" id="attachment_28619" style="width: 1190px"><img alt="" aria-describedby="caption-attachment-28619" class="size-large wp-image-28619" data-dcnode-id="785" height="787" loading="lazy" sizes="(max-width: 1180px) 100vw, 1180px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.concernusa.org/wp-content/uploads/2020/03/concern-lebanon-emergency-response-housing-shelter-syrian-support-1180x787.jpg&amp;raw" srcset="https://www.concernusa.org/wp-content/uploads/2020/03/concern-lebanon-emergency-response-housing-shelter-syrian-support-1180x787.jpg 1180w, https://www.concernusa.org/wp-content/uploads/2020/03/concern-lebanon-emergency-response-housing-shelter-syrian-support-300x200.jpg 300w, https://www.concernusa.org/wp-content/uploads/2020/03/concern-lebanon-emergency-response-housing-shelter-syrian-support-768x512.jpg 768w, https://www.concernusa.org/wp-content/uploads/2020/03/concern-lebanon-emergency-response-housing-shelter-syrian-support-1200x800.jpg 1200w, https://www.concernusa.org/wp-content/uploads/2020/03/concern-lebanon-emergency-response-housing-shelter-syrian-support-90x60.jpg 90w, https://www.concernusa.org/wp-content/uploads/2020/03/concern-lebanon-emergency-response-housing-shelter-syrian-support-100x67.jpg 100w, https://www.concernusa.org/wp-content/uploads/2020/03/concern-lebanon-emergency-response-housing-shelter-syrian-support-520x347.jpg 520w, https://www.concernusa.org/wp-content/uploads/2020/03/concern-lebanon-emergency-response-housing-shelter-syrian-support-75x50.jpg 75w, https://www.concernusa.org/wp-content/uploads/2020/03/concern-lebanon-emergency-response-housing-shelter-syrian-support-450x300.jpg 450w, https://www.concernusa.org/wp-content/uploads/2020/03/concern-lebanon-emergency-response-housing-shelter-syrian-support-765x510.jpg 765w" width="1180"><p class="wp-caption-text" data-dcnode-id="783" id="caption-attachment-28619"><span data-dcnode-id="784" instrument_node="">A Syrian refugee, residing in an informal tent settlement in Lebanon, signs for supplies received from Concern. Photo: Gavin Douglas/ Concern Worldwide</span></p></div><span data-dcnode-id="781" instrument_node="">
</span><h3 data-dcnode-id="778"><span data-dcnode-id="779" style="font-weight: 400;"><span data-dcnode-id="780" instrument_node="">Concern in Syria</span></span></h3><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" style="font-weight: 400;"><span data-dcnode-id="776" instrument_node="">Concern Worldwide has been responding to the crisis in Syria since 2013. Our teams on the ground are providing food and non-food items, including plastic sheeting, floor mats, solar lights, and blankets. Maintaining a very rapid emergency response, our turnaround time is generally 2 days for assessment and distribution. Areas of focus include:</span></span></p><span data-dcnode-id="773" instrument_node="">
</span><ul data-dcnode-id="755"><span data-dcnode-id="772" instrument_node="">
</span><li data-dcnode-id="769" style="font-weight: 400;"><span data-dcnode-id="770" style="font-weight: 400;"><span data-dcnode-id="771" instrument_node="">Food Security and Livelihoods support has been delivered in the form of cash or voucher support to over 337,000 beneficiaries</span></span></li><span data-dcnode-id="768" instrument_node="">
</span><li data-dcnode-id="765" style="font-weight: 400;"><span data-dcnode-id="766" style="font-weight: 400;"><span data-dcnode-id="767" instrument_node="">Protection, including the delivery of child-friendly spaces, self-healing and learning spaces, and gender-based violence prevention to approximately 1,000 beneficiaries</span></span></li><span data-dcnode-id="764" instrument_node="">
</span><li data-dcnode-id="761" style="font-weight: 400;"><span data-dcnode-id="762" style="font-weight: 400;"><span data-dcnode-id="763" instrument_node="">Education access for children in non-formal education centers benefitted over 15,000 beneficiaries</span></span></li><span data-dcnode-id="760" instrument_node="">
</span><li data-dcnode-id="757" style="font-weight: 400;"><span data-dcnode-id="758" style="font-weight: 400;"><span data-dcnode-id="759" instrument_node="">Water, Sanitation, and Hygiene Assistance, including activities such as hygiene kits, rehabilitating water systems, emergency water trucking, hygiene promotion and vector control benefiting over 900,000 beneficiaries</span></span></li><span data-dcnode-id="756" instrument_node="">
</span></ul><span data-dcnode-id="754" instrument_node="">
</span><div class="mceTemp" data-dcnode-id="753"></div><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" style="font-weight: 400;"><span data-dcnode-id="751" instrument_node="">According to a 2016 estimate by the United Nations Economic and Social Commission for Western Asia (ESCWA) 83% of the population are now living below the poverty line. Coping mechanisms are severely depleted and basics like food, education, and shelter becoming harder and harder to access.</span></span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" style="font-weight: 400;"><span data-dcnode-id="747" instrument_node="">Your tax-deductible contribution to Concern can help us provide valuable support to those who need it most.&nbsp;</span></span></p><span data-dcnode-id="744" instrument_node="">
