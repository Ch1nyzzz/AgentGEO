</span><div class="post-12335 post type-post status-publish format-standard has-post-thumbnail hentry category-articles" data-dcnode-id="532" id="post-12335"><span data-dcnode-id="786" instrument_node="">
</span><h1 data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Muslim Migrants and Integration</span></h1><span data-dcnode-id="783" instrument_node="">
</span><div class="float-right" data-dcnode-id="780"><span class="badge badge-secondary" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">8 Sep 2018</span></span></div><span data-dcnode-id="779" instrument_node="">
</span><span class="clearfix" data-dcnode-id="778"></span><span data-dcnode-id="777" instrument_node="">
</span><h5 data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Address to the guests at Jalsa Salana Germany</span></h5><span data-dcnode-id="774" instrument_node="">
</span><div class="entry" data-dcnode-id="534"><span data-dcnode-id="773" instrument_node="">
</span><blockquote data-dcnode-id="764"><p data-dcnode-id="765"><span data-dcnode-id="772" instrument_node="">On Saturday, 8 September 2018, the Worldwide Head of the Ahmadiyya Muslim Community, the Fifth Khalifah (Caliph), His Holiness, Hazrat Mirza Masroor Ahmad</span><sup data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">(aba)</span></sup><span data-dcnode-id="769" instrument_node=""> delivered a landmark address about the world’s immigration crisis and the subsequent rise of the far-right in the Western world before an audience of more than 1,000 dignitaries and guests. This was on the second day of the 43</span><sup data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">rd</span></sup><span data-dcnode-id="766" instrument_node=""> Annual Convention (Jalsa Salana) of the Ahmadiyya Muslim Community in Germany. The full transcript of the address by His Holiness on this occasion is presented below.</span></p></blockquote><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><img alt="" class="aligncenter size-full wp-image-11254" data-dcnode-id="762" height="616" sizes="(max-width: 999px) 100vw, 999px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alislam.org/wp-content/uploads/2019/07/2018-09-08-Jalsa-DE-Guests-Address-001.jpg&amp;raw" srcset="https://www.alislam.org/wp-content/uploads/2019/07/2018-09-08-Jalsa-DE-Guests-Address-001.jpg 999w, https://www.alislam.org/wp-content/uploads/2019/07/2018-09-08-Jalsa-DE-Guests-Address-001-300x185.jpg 300w, https://www.alislam.org/wp-content/uploads/2019/07/2018-09-08-Jalsa-DE-Guests-Address-001-768x474.jpg 768w, https://www.alislam.org/wp-content/uploads/2019/07/2018-09-08-Jalsa-DE-Guests-Address-001-100x62.jpg 100w, https://www.alislam.org/wp-content/uploads/2019/07/2018-09-08-Jalsa-DE-Guests-Address-001-200x123.jpg 200w" width="999"></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="759" instrument_node="">After reciting Tashahhud, Ta’awwuz and Bismillah, Hazrat Khalifatul Masih V </span><sup data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">(aba)</span></sup><span data-dcnode-id="756" instrument_node=""> said:</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">“All distinguished guests, Assalamo Alaikum Wa Rahmatullahe Wa Barakatohu – peace and blessings of Allah be upon you all.</span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">In recent times here in Germany, and in several other Western countries, the far-right has gained prominence and seen its membership rise. The root cause for this distressing trend is that the indigenous citizens in these nations are becoming increasingly resentful and frustrated. They are feeling neglected and as though their rights are not being protected by their leaders and governments.</span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Unquestionably, a major factor fuelling their anxiety has been the influx of immigrants to many Western nations in recent years. This has certainly been the case here in Germany, which has taken far more refugees than any other European country in recent times. As a result, many local people are afraid that their societies are changing beyond comprehension and they feel that their nation’s resources are being disproportionately utilised in favour of immigrants.</span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Whilst the term ‘immigrant’ is used, the real issue for most people is ‘Islam’ and the fact that the vast majority of immigrants to Europe are Muslims fleeing from war-torn countries in the Middle East. Thus, when the far-right and their supporters raise rallying calls against immigration, their actual target is Islam and their objective is to stop Muslims from entering their nations. They view Islam as incompatible with Western values, and strive to propagate their belief that Muslims are unable to successfully integrate into the West and are a threat to other citizens.</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Further, many non-Muslims believe Islam to be a religion of extremism and imagine that those Muslims who immigrate will be extremists or religious fanatics, will spread poison in society, incite division and disturb the peace and well-being of their nation. Certainly, this sense of alarm has spread to some parts of this country, especially in Eastern Germany. Thus, there have been moves and campaigns to ban the building of mosques.</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">We, the Ahmadiyya Muslim Community, have not been immune to such opposition, whereby some groups here in Germany have actively campaigned against us and endeavoured to stop us building new mosques. They have campaigned against us, even though our motto is ‘Love for All, Hatred for None’, and despite the fact that for almost 130 years, our community has been at the very forefront of promoting peace, brotherhood, love and compassion in all parts of the world.</span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Our history testifies to the fact that wherever we have built mosques or become established the fears of the local people have soon evaporated. Those who initially viewed us with suspicion have quickly become our loyal friends and sincere supporters. Throughout the world, our neighbours happily attest to the fact that Ahmadi Muslims are people who promote peace in society and who spread only a message of love, compassion and human sympathy. Yet, due to the dire state of the Muslim world at large, the Ahmadiyya Muslim Community has also had to suffer the consequences.</span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Another charge raised by those opposed to widespread immigration is that immigrants are prone to sexually abusing or harassing women. Sadly, a recent report suggested that a high proportion of rapes or attempted rapes, in one Western country, were committed by immigrants. God knows better if the figures are accurate, but when such reports are made public, it affects other nations as well and the concerns and fears of local people continue to rise.</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Another point that many parties and politicians have focused upon is the tax burden required to re-settle immigrants. Aside from their day-to-day living expenses, infrastructure costs resulting from large-scale immigration are vast and so the financial burden on the state is considerable and it is ultimately taxpayers who fund this. People who have lived their lives and paid their taxes in a country, are justified to ask whether it is fair that their contributions to the state are spent on resettling foreign immigrants, as opposed to funding projects that are beneficial to existing citizens.</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">I do not dispute that these are valid issues and real causes of concern and, if they are not dealt with wisely, tensions in society will continue to increase. Additionally, wherever there is large-scale migration, it inevitably leads to security issues. Indeed, it has been proven that hidden amongst the genuine refugees are immigrants who have the potential to cause great harm. For example, just a few days ago, a female refugee living in Germany, who in the past had been kidnapped and kept as a slave in Iraq, was interviewed.</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">She told how she was shocked and horrified to see that her captor, a member of a terrorist group, was now also living freely in Germany, having come here under the pretence of persecution. This is something I have warned about in the past that each case should be carefully analysed to ensure that extremists or criminals posing as refugees are not allowed to enter. Anyway, these issues mean that a fear of mass immigration from Muslim countries is to some extent justified.</span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Yet, on the other side, it is necessary for a fair-minded, intelligent and wise person to look at both sides of the story and not just base his or her impression of Muslims and Islam upon hearsay. Merely because someone brands Islam a religion of extremism or claims that all Muslims are terrorists does not make it true; rather, it is vital to assess the facts rationally and objectively before reaching a conclusion. Hence, before reaching a definitive conclusion about whether Islam’s teachings are of an extremist nature, you should investigate and see what the truth is. Analyse, whether the wicked acts of some so-called Muslims are motivated by the teachings of Islam?</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Consider, whether Islam really does permit extremism? Or does it prescribe severe punishments for those who spread disorder and hatred? Does Islam permit Muslims to break the laws of the land in the name of their faith? What expectations does Islam place upon Muslims in terms of their conduct in society? Does Islam encourage Muslims to burden the State? Or does it encourage them to work hard, to be loyal and to contribute positively to the society in which they live?</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">If it is proven that Muslims who do wrong are motivated by their religion, it can be said that the concerns of the far-right are justified. Yet, what if their actions have nothing to do with Islam? What if anti-Islamic groups are spreading hateful myths that are based only on fantasy rather than fact? In the short time available, I will mention a few points that I hope will help answer some of these questions and enable you to understand the true essence of Islamic teachings.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Firstly, a basic Islamic principle is that where a Muslim aspires to live peacefully, he must also endeavour to provide peace and security to others. People often speak of the wars fought in early Islam and suggest that they prove that Islam is a bloodthirsty religion that permits force and compulsion. Yet, in reality, the early Muslims endured thirteen years of brutal and sustained persecution without retaliating in any way.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Only after that long period did Allah the Almighty permit them to defend themselves and this permission is mentioned in chapter 22, verses 40 to 41 of the Holy Qur’an. In these verses, Allah the Almighty said that those who had been persecuted and driven out of their homes were permitted to defend themselves from further cruelty and oppression. However, the Holy Qur’an further states that if the Muslims did not defend their religion then churches, temples, synagogues, mosques and all other places of worship would all be in grave danger. So, permission was granted to protect the rights of all people to live their lives freely and according to their beliefs.</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">In chapter 10, verse 100 of the Holy Qur’an, whilst addressing the Holy Prophet of Islam</span><sup data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">(sa)</span></sup><span data-dcnode-id="702" instrument_node="">, Allah the Almighty states that if He desired He could have enforced His will and compelled everyone to accept Islam. However, instead, Allah the Almighty preferred free will to prevail. Likewise, in chapter 18, verse 30 of the Holy Qur’an, Allah the Almighty states that Muslims should openly preach their message and proclaim Islam to be a truthful religion, yet at the same time the Qur’an also states that every person is free to accept or reject it.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">The verse states:</span></p><span data-dcnode-id="697" instrument_node="">
</span><blockquote data-dcnode-id="694"><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">“Let him who will, believe and let him who will, disbelieve.”</span></p></blockquote><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">In the Holy Qur’an, Allah the Almighty also refers to those non-Muslims who admitted that Islam was a peaceful and benevolent religion, yet they refused to accept it because they feared that embarking upon a path of peace and compassion would harm their material interests. Chapter 28, verse 58 of the Holy Qur’an states:</span></p><span data-dcnode-id="690" instrument_node="">
</span><blockquote data-dcnode-id="687"><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">“And they say, ‘If we were to follow the guidance with thee, we should be snatched away from our land’.”</span></p></blockquote><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">This is the true picture of Islam. It requires every Muslim to live peacefully and to contribute to their society. Unquestionably, those Muslims who claim Jihad means to attack non-Muslims or to forcefully convert them, are manifestly wrong. Such beliefs and attitudes have nothing to do with the teachings of Islam. Another accusation levelled at Islam, which I mentioned earlier, relates to the treatment of women. Some non-Muslims fear that if Muslims migrate to the West they will prey upon the local women and abuse them.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">&nbsp;</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><img alt="" class="aligncenter size-full wp-image-11255" data-dcnode-id="679" height="337" loading="lazy" sizes="(max-width: 999px) 100vw, 999px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alislam.org/wp-content/uploads/2019/07/2018-09-08-Jalsa-DE-Guests-Address-002.jpg&amp;raw" srcset="https://www.alislam.org/wp-content/uploads/2019/07/2018-09-08-Jalsa-DE-Guests-Address-002.jpg 999w, https://www.alislam.org/wp-content/uploads/2019/07/2018-09-08-Jalsa-DE-Guests-Address-002-300x101.jpg 300w, https://www.alislam.org/wp-content/uploads/2019/07/2018-09-08-Jalsa-DE-Guests-Address-002-768x259.jpg 768w, https://www.alislam.org/wp-content/uploads/2019/07/2018-09-08-Jalsa-DE-Guests-Address-002-100x34.jpg 100w, https://www.alislam.org/wp-content/uploads/2019/07/2018-09-08-Jalsa-DE-Guests-Address-002-200x67.jpg 200w" width="999"></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Indeed, some immigrants have been guilty of such crimes and their shameful conduct has perpetuated such fears and anxiety. Given this, let me make it categorically clear that any Muslim who violates the honour of a woman or abuses her in any way is acting entirely against Islam’s teachings. Islam considers such behaviour as evil and has mandated exceptionally strong punishments for those guilty of such immoral and reprehensible crimes.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">For example, Islam decrees that if a Muslim is guilty of such a crime, he should be openly flogged in a public setting. Thus, if you truly wish to root out such behaviour, then Muslim men guilty of such abhorrent crimes should be punished according to Islamic law. Although, I am sure Western governments would frown upon this idea and human rights activists would certainly object.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">As I said earlier, another major concern for existing citizens is that hosting refugees is a huge financial undertaking by the state. In this regard, no immigrant should enter another nation with a sense of entitlement; rather, they should ponder over what they can offer the local society. I have said many times before that immigrants should consider themselves indebted to the nation that has accepted them. They owe gratitude to both the government and the public and the way to repay this favour is that they should not waste time seeking only benefits and allowances from the state; rather, they should seek to contribute to the society as soon as possible. They should work hard and strive to enter employment, even if the only job they can get is basic labour work. Where this will enable them to maintain their personal honour and dignity, it will also be a means of relieving the burden on the state and removing the frustrations of the local people.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="667" instrument_node="">Certainly, every Muslim should keep in mind that the Holy Prophet of Islam</span><sup data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">(sa)</span></sup><span data-dcnode-id="664" instrument_node=""> said that the giving hand is far greater than the one that takes. On many occasions, people sought to help his companions, but they refused to accept and preferred to earn a living for themselves. As I said, even if refugees are forced to do menial or basic jobs, which they consider themselves over-qualified for, it is better than remaining idle and expecting the state to cover all their needs. Otherwise, immigrants who fail to contribute to society will be a means of increasing restlessness amongst the wider population. Furthermore, if governments do provide some benefits or financial aid to immigrants they should ensure that they do not neglect the needs of the local people. In some countries, immigrants received better benefits than tax-paying citizens and this led to a natural agitation amongst the public.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Such frustrations do not dissipate on their own because where there is frustration there is always a reaction. Therefore, every government should implement sensible and fair policies that keep in mind the rights and requirements of citizens and immigrants alike, rather local citizens should be given better treatment and benefits.</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">A few days ago, it was reported that the German Government was considering a new policy whereby asylum seekers would be required to do a year’s community service upon settling in Germany. Some critics are already claiming that this is merely a form of ‘cheap labour’ and will not help the integration process. However, in my view, any person who is serving his local community is integrating through that very service. Indeed, the term ‘community service’ is positive because it instils a belief that it is the duty of each person to serve their society and to help the members of the community. Accordingly, the German Government deserves praise rather than criticism for this policy.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Nevertheless, the responsibilities of a host government are not limited to arranging community service; rather, they should also guide the immigrants in a way that they are able to start contributing as quickly as possible to society. If the immigrants do not have the skills to enter the job market they should be provided with some form of training or apprenticeships so that they can soon develop those skills. Any costs incurred in such training will be a valuable investment for the future of the nation.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">In terms of security, if there is any doubt or suspicion raised about the character or backgrounds of certain immigrants, the authorities should be vigilant and monitor them until they are satisfied that they do not pose a risk to society. Some may consider this an intrusive policy, yet protecting society from danger and maintaining the peace and security of the nation are paramount objectives for any government. Certainly, if there are any immigrants who come with the intention of spreading mischief or creating disorder, they are directly contravening Islam’s teachings. Indeed, chapter 2, verse 192 of the Holy Qur’an states that whilst murder is a truly heinous crime, to spread disorder and to provoke hatred is a crime of even greater magnitude.</span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Of course, this does not mean that to kill someone is a small or insignificant crime; rather, it signifies that the ramifications of fuelling the flames of disorder in society are higher still. Ultimately, provocation and incitement can cause huge damage to a society and lead to conflicts and wars in which scores of innocent people are targeted or oppressed.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="646" instrument_node="">The Holy Prophet Muhammad</span><sup data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">(sa)</span></sup><span data-dcnode-id="643" instrument_node=""> also said that a true Muslim is he from whose tongue and hand all others are safe.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">How then can it be said that Islam is a religion that promotes violence or radicalism?</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">How can it be said that Islam spreads disorder in society?</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">How can it be claimed that Islam seeks to violate the honour of women?</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">How can it be said that Islam permits its followers to usurp the property or wealth of others?</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Anyone who is guilty of such crimes, whether they justify it in Islam’s name or not, is far-removed from its teachings and will stand accountable for their atrocities. In every respect, Islam requires Muslims to display the highest standards of integrity and virtue. For example, in chapter 2, verse 189 of the Holy Qur’an, Allah the Almighty has admonished Muslims that they must never acquire wealth or property through means of deception; rather, Muslims are taught to be honest, trustworthy and to uphold the truth in all respects.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Similarly, in chapter 83, verses 2 to 4, Muslims are taught the importance of fair dealing in matters of business and trade. Allah the Almighty states:</span></p><span data-dcnode-id="623" instrument_node="">
</span><blockquote data-dcnode-id="620"><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">“Woe unto those who give short measure. Those who when they take measure from other people, take it full. But when they give by measure to others or weigh to them, they give them less.”</span></p></blockquote><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="618" instrument_node="">These verses state that those who are exploitative in business transactions, seeking unjust benefit for themselves at the expense of others, are those who are cursed and will ultimately be humiliated. The truth is that Islam has safeguarded society from all forms of cruelty and injustice and protects the life and property of every single person. It is therefore a cause of deep regret and grief that people continue to make false allegations against the blessed character of the Holy Prophet Muhammad</span><sup data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">(sa)</span></sup><span data-dcnode-id="615" instrument_node="">, when he was the one who brought about a unique spiritual and moral revolution in society. Indeed, never in the history of humanity have such examples of moral integrity been seen as were displayed by the early Muslims. If his companions quarrelled, it was not to take advantage of each other; rather, it was to ensure that the rights of the other party were fulfilled.</span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="612" instrument_node="">For instance, once a companion of the Holy Prophet Muhammad</span><sup data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">(sa)</span></sup><span data-dcnode-id="609" instrument_node=""> came to the market to sell his horse for 200 dinars. When another companion of the Holy Prophet</span><sup data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">(sa)</span></sup><span data-dcnode-id="606" instrument_node=""> came forward to buy the horse, he told him that 200 dinars was far too low and that a fair price would be 500 dinars. He said that he did not wish to take charity and wanted to make a lawful and fair purchase and so he would pay 500 dinars. Upon this, the Muslim seller said that he also did not wish to take charity and wished to make a fair sale and so he only wanted 200 dinars. Hence, their argument was for the sake of protecting the rights of the other person, in spite of the personal cost to themselves.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Imagine, if all members of society were able to live by and uphold such values.</span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">How magnificent a society would that be!</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">A society in which every citizen prioritised honesty and strove for the common good.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">In other words, an Islamic society.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">If anyone wishes to know what Islam represents they should look at such noble examples, rather than those who sow division and intolerance falsely in its name. Certainly, today it is the need of the time that we all, Muslim or non-Muslim, pause and contemplate upon the consequences of our actions. With great pride, we speak of how the world has developed into an inter-connected global village and marvel at the speed of communication and travel.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Yet, alongside such advancement, we should realise that our responsibilities to the world have also increased. In terms of the migration crisis, wherever there are people subject to cruelties and brutalities in their home countries, it is up to the international community to help them. The priority should be to try to reconcile the peoples of those nations and to end wars and to bring about sustainable peace; however, if that is not possible, it is our moral duty to open our hearts to those who are genuinely suffering.</span></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Society should not reject genuine refugees who are suffering through no fault of their own. Society should not cast aside innocent people who only want the opportunity to live in peace and who desire to be good citizens and follow the laws of the land in which they live. Instead, we should be there to give a helping hand to those whose lives have been broken, who have been tormented and who are utterly helpless, vulnerable and defenceless.</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Let us prove our humanity.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Let us show our compassion.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Let us be there to shoulder the burdens of those who are in desperate need.</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">On the other side, immigrants also have great responsibilities in their new countries. As I have said, they must seek to contribute to their new society and strive to integrate. They should not isolate themselves or cut themselves off from the local community, but should serve their adopted home and work towards its continued development and progress. Together, we must seek to find ways in which people of different backgrounds and heritages can live together harmoniously.</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">As I said, the world is now like a global village and so we are not living in those bygone eras where what happened in one country, only affected the local community or, at most, the neighbouring nations. Rather, we now live in a time where a disturbance or conflict in any country has ramifications and consequences for the rest of the world. Thus, instead of fearing one another, we should strive to solve problems through mutual dialogue and with a spirit of tolerance and compassion.</span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Our goal and objective should be nothing less than to establish peace in every village, town or city of every nation in the world.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">The Ahmadiyya Muslim Community has always strived to fulfil this objective and to this end, we propagate what we consider to be the key ingredient to peace, which is a firm belief that we are all the creation of God Almighty and He created mankind so that they would recognise Him and fulfil the rights of one another.</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">We are certain that if mankind comes to this realisation, true and long-lasting peace can prevail.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Sadly, we are witnessing quite the opposite.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Rather than coming together and seeking peace through the existence of God Almighty, mankind is embroiled in striving for peace through material means alone.</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Day by day, mankind is moving further away from religion and spirituality and the results are terrifying.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">It is my firm conviction that belief in God Almighty is the only means of salvation and the only way to bring about true peace both at a national and international level.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">And so, it is my deepest desire and ardent prayer, that the world comes to recognise its creator and comes to follow His true teachings.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Instead of pursuing personal or political objectives, I pray that today’s leaders fulfil the rights of all people irrespective of caste, creed or colour.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">With all my heart, I pray that the gulf that exists between mankind and God Almighty is eliminated and that we come to see with our own eyes true peace prevail throughout the world.</span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">I thank you all very much. Thank you very much.”</span></p><span data-dcnode-id="535" instrument_node="">
</span></div><span data-dcnode-id="533" instrument_node="">
</span></div><span data-dcnode-id="531" instrument_node="">
</span></div><span data-dcnode-id="529" instrument_node="">
