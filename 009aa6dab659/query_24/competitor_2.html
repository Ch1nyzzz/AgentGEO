</span><div class="link-description" data-dcnode-id="2000"><span data-dcnode-id="2007" instrument_node="">
</span><h4 data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">What is MIPEX</span></h4><span data-dcnode-id="2004" instrument_node="">
</span><p data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">
												MIPEX is a unique tool which measures policies to integrate migrants in 56 countries, including all EU Member States and the UK, OECD countries, Albania, Argentina, Brazil, China, India, Indonesia, Jordan, Moldova, North Macedonia, Russia, Saudi Arabia, Serbia, South Africa, United Arab Emirates, and Ukraine.											</span></p><span data-dcnode-id="2001" instrument_node="">

</span><div class="link-description" data-dcnode-id="1985"><span data-dcnode-id="1992" instrument_node="">
</span><h4 data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Who Produces MIPEX</span></h4><span data-dcnode-id="1989" instrument_node="">
</span><p data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">

</span></div><span data-dcnode-id="1984" instrument_node="">

</span><h4 data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">MIPEX History</span></h4><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">
												The Migrant Integration Policy Index was first published in 2004 as the European Civic Citizenship and Inclusion Index. Read more about the previous four editions of the Migrant Integration Policy Index. You can also download previous editions.											</span></p><span data-dcnode-id="1971" instrument_node="">

</span><h4 data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">MIPEX Methodology</span></h4><span data-dcnode-id="1959" instrument_node="">
</span><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">

</span><h2 data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">ABOUT MIPEX</span></h2><span data-dcnode-id="918" instrument_node="">
</span><p class="col-sm-8 col-sm-offset-2" data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">The index is a useful tool to evaluate and compare what governments are doing to promote the integration of migrants in all the countries analysed.</span></p><span data-dcnode-id="915" instrument_node="">
</span></div><span data-dcnode-id="913" instrument_node="">
</span></div><span data-dcnode-id="911" instrument_node="">
</span><div class="row" data-dcnode-id="821"><span data-dcnode-id="910" instrument_node="">
</span><div class="col-xs-12 col-sm-3 round-header-box-component about-what-is-mipex" data-dcnode-id="889"><span data-dcnode-id="909" instrument_node="">
</span><h3 data-dcnode-id="901"><span data-dcnode-id="908" instrument_node="">
</span><a data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/what-is-mipex"><span class="weight-700" data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">what</span></span><br data-dcnode-id="905"><span data-dcnode-id="904" instrument_node=""> is MIPEX</span></a><span data-dcnode-id="902" instrument_node="">
</span></h3><span data-dcnode-id="900" instrument_node="">
</span><div class="round-header-box-body" data-dcnode-id="891"><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="898" instrument_node="">
				MIPEX is a unique tool which measures policies to integrate migrants in 52 countries, including all EU Member States, OECD countries, Albania, Argentina, Brazil, China, India, Indonesia, Moldova, North Macedonia, Serbia, Russia, and Ukraine. </span><strong data-dcnode-id="895"><a data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mipex.eu/what-is-mipex"><span data-dcnode-id="897" instrument_node="">Read a general presentation...</span></a></strong><span data-dcnode-id="894" instrument_node="">
</span></p><span data-dcnode-id="892" instrument_node="">
</span></div><span data-dcnode-id="890" instrument_node="">
</span></div><span data-dcnode-id="888" instrument_node="">
</span><div class="col-xs-12 col-sm-3 round-header-box-component about-who-produces-mipex" data-dcnode-id="867"><span data-dcnode-id="887" instrument_node="">
</span><h3 data-dcnode-id="879"><span data-dcnode-id="886" instrument_node="">

</span></h3><span data-dcnode-id="878" instrument_node="">
</span><div class="round-header-box-body" data-dcnode-id="869"><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="876" instrument_node="">
				The fifth edition of the MIPEX rests on the extensive and long-term collaboration of trusted partners, experts and supporters of the project. </span><strong data-dcnode-id="873"><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mipex.eu/who-produces-mipex"><span data-dcnode-id="875" instrument_node="">See their structure and their role...</span></a></strong><span data-dcnode-id="872" instrument_node="">
</span></p><span data-dcnode-id="870" instrument_node="">
</span></div><span data-dcnode-id="868" instrument_node="">
</span></div><span data-dcnode-id="866" instrument_node="">

</span></h3><span data-dcnode-id="856" instrument_node="">
</span><div class="round-header-box-body" data-dcnode-id="847"><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="854" instrument_node="">
				There are 58 policy indicators on migrant integration in the MIPEX. These have been designed to benchmark current laws and policies.</span><strong data-dcnode-id="851"><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mipex.eu/methodology"><span data-dcnode-id="853" instrument_node="">Read more about the methodology...</span></a></strong><span data-dcnode-id="850" instrument_node="">
</span></p><span data-dcnode-id="848" instrument_node="">

</span><h2 class="help-content-title" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">HOW TO PLAY WITH THE DATA</span></h2><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">This tool allows you to generate graphical analysis on MIPEX 2015 data.  Here are some important things you may consider when playing with data. If a graph does not display this can be because of some reasons: the selection is not sound // there is no data for the desired selection // the grouping is not relevant. Or, of course, there might be a glitch in the tool.</span></p><span data-dcnode-id="237" instrument_node="">
</span></div><span data-dcnode-id="235" instrument_node="">
</span><div class="help-content-list-holder" data-dcnode-id="144"><span data-dcnode-id="234" instrument_node="">
</span><ul class="help-content-list" data-dcnode-id="167"><span data-dcnode-id="233" instrument_node="">
</span><li data-dcnode-id="200" ng-mouseleave="hideDACTooltip(1)" ng-mouseover="showDACTooltip(1)"><span data-dcnode-id="232" instrument_node="">
</span><h3 data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">1. MAKE A PROPER SELECTION</span></h3><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Each type of graph requires a proper selection in order to display correctly. You can select countries, indicators (i.e. policies, dimensions or individual indicators) and time-frames (i.e. years).</span></p><span data-dcnode-id="226" instrument_node="">
</span><p data-dcnode-id="222"><strong data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">Maps</span></strong><span data-dcnode-id="223" instrument_node=""> = Choose 1 indicator &amp; 1 time-frame</span></p><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="217"><strong data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Bars</span></strong><span data-dcnode-id="218" instrument_node=""> = Choose 1 or more country, indicator &amp; time-frame</span></p><span data-dcnode-id="216" instrument_node="">
</span><p data-dcnode-id="212"><strong data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Line</span></strong><span data-dcnode-id="213" instrument_node=""> = Choose 1 or more country, indicator &amp; time-frame</span></p><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="207"><strong data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Radar</span></strong><span data-dcnode-id="208" instrument_node=""> = Choose 1 country, indicator or time-frame and several other data-points (e.g. 3-8 other countries and indicators)</span></p><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="202"><strong data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Scatter-plot</span></strong><span data-dcnode-id="203" instrument_node=""> = Select several or all countries, 2 indicators/time-frame and 1 of the other (e.g. 2 indicators, 1 time-frame)</span></p><span data-dcnode-id="201" instrument_node="">
</span></li><span data-dcnode-id="199" instrument_node="">
</span><li data-dcnode-id="169" ng-mouseleave="hideDACTooltip(2)" ng-mouseover="showDACTooltip(2)"><span data-dcnode-id="198" instrument_node="">
</span><h3 data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">2. CHOOSE AN APROPRIATE TYPE OF GRAPH</span></h3><span data-dcnode-id="195" instrument_node="">
</span><p data-dcnode-id="191"><strong data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">The map</span></strong><span data-dcnode-id="192" instrument_node=""> lets you compare one policy in all the countries in a single timeframe.</span></p><span data-dcnode-id="190" instrument_node="">
</span><p data-dcnode-id="186"><strong data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">The bar/column</span></strong><span data-dcnode-id="187" instrument_node=""> lets you compare policies for many countries in many timeframes.</span></p><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="181"><strong data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">The line</span></strong><span data-dcnode-id="182" instrument_node=""> lets you see a time-evolution of policies in a country or compare policies in many countries.</span></p><span data-dcnode-id="180" instrument_node="">
</span><p data-dcnode-id="176"><strong data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">The radar</span></strong><span data-dcnode-id="177" instrument_node=""> lets you compare several policies in one country or compare policies in more counties.</span></p><span data-dcnode-id="175" instrument_node="">
</span><p data-dcnode-id="171"><strong data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">The scatterplot</span></strong><span data-dcnode-id="172" instrument_node=""> let you compare 2 policies or compare or 2 timeframes in many countries.</span></p><span data-dcnode-id="170" instrument_node="">
</span></li><span data-dcnode-id="168" instrument_node="">
</span></ul><span data-dcnode-id="166" instrument_node="">
