</span><meta content="The integration of immigrant minorities is a major concern for diverse societies – with major implications for the well-being of those affected, social cohesion and group relations, and economic and social progress. In this paper, we give a comprehensive description of long-term migrant integration in Western Europe to investigate theories of migrant assimilation and integration. We take a multidimensional approach, looking at 10 indicators measuring social, structural, political, civic and cultural integration. We take an innovative approach to measuring minority background by using two complementary measures: generational status, distinguishing first and second-generation migrants from the third and higher up ‘natives’, and self-reported ancestry, separating those with autochthonous-only ancestry from those with various kinds of allochthonous ancestry. Using interaction effects between these measures, we can test whether generational change is faster or slower for some ethnic groups than for others, i.e. whether different groups integrate at differing speeds. Using the pooled samples of all Western European countries included in the European Social Survey (ESS) rounds 7 and 8, we run multivariate regression analyses to estimate the effects of migrant background on the 10 indicators of integration. Compared to migrants with autochthonous ancestry, respondents of Middle Eastern, North African &amp; Central Asian as well as Sub-Saharan African ancestry are less integrated on all dimensions of integration except the political and civic ones. The South &amp; South-East Asian group is also substantially less assimilated socially and culturally, but not so much structurally. They are closely followed by the South East and East European groups, following the same pattern except that the latter are less integrated politically as well. We only find substantial interaction effects between ethnic group and migrant generation for two integration indicators, namely citizenship and homophobia, for which speed of integration thus appears to differ across ethnic groups. For all other indicators, integration speed does not appear to differ across ethnic groups, supporting straight line assimilation theory, with social integration in terms of interethnic friendship potentially rather following a 'bumpy-line' pattern." data-dcnode-id="2958" name="citation_abstract"><span data-dcnode-id="2957" instrument_node="">

</span><div class="atButton" data-dcnode-id="2175"><span data-dcnode-id="2184" instrument_node="">
</span><a addthis:description="The integration of immigrant minorities is a major concern for diverse societies–with major implications for the well-being of those affected, social cohesion and group relations, and economic and social progress. In this paper, we give a comprehensive description of long-term migrant integration in Western Europe to investigate theories of migrant assimilation and integration. We take a multidimensional approach, looking at 10 indicators measuring social, structural, political, civic and cultural integration. We take an innovative approach to measuring minority background by using two complementary measures: generational status, distinguishing first and second-generation migrants from the third and higher up ‘natives,’ and self-reported ancestry, separating those with autochthonous-only ancestry from those with various kinds of allochthonous ancestry. Using interaction effects between these measures, we can test whether generational change is faster or slower for some ethnic groups than for others, i.e. whether different groups integrate at differing speeds. Using the pooled samples of all Western European countries included in the European Social Survey rounds 7 and 8, we run multivariate regression analyses to estimate the effects of migrant background on the 10 indicators of integration. Compared to migrants with autochthonous ancestry, respondents of Middle Eastern, North African &amp; Central Asian as well as Sub-Saharan African ancestry are less integrated on all dimens..." addthis:title="Dimensions of Migrant Integration in Western Europe" addthis:url="https://www.frontiersin.org/article/10.3389/fsoc.2021.510987" class="addthis_button_facebook at300b" data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html" title="Facebook"><span class="at-icon-wrapper" data-dcnode-id="2178" style="background-color: rgb(59, 89, 152); line-height: 16 </span><div class="JournalAbstract" data-dcnode-id="2037"><a class="reset-hash-position" data-dcnode-id="2067" id="h1" name="h1"></a><h1 data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Dimensions of Migrant Integration in Western Europe</span></h1><div class="authors" data-dcnode-id="2052"><a class="user-id-1018623" data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/1018623"><img alt="www.frontiersin.org" class="pr5" data-dcnode-id="2064" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg&amp;raw"><span data-dcnode-id="2063" instrument_node="">Anthony F. Heath</span></a><sup data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">1</span></sup><span data-dcnode-id="2059" instrument_node=""> and </span><a class="user-id-591610" data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/591610"><img alt="www.frontiersin.org" class="pr5" data-dcnode-id="2058" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/591610/24&amp;raw"><span data-dcnode-id="2057" instrument_node="">Silke L. Schneider</span></a><sup data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">2</span></sup><span data-dcnode-id="2053" instrument_node="">*</span></div><ul class="notes" data-dcnode-id="2041"><li data-dcnode-id="2047"><span data-dcnode-id="2049"><sup data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">1</span></sup></span><span data-dcnode-id="2048" instrument_node="">Centre for Social Investigation, Nuffield College, University of Oxford, Oxford, United Kingdom</span></li><li data-dcnode-id="2042"><span data-dcnode-id="2044"><sup data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">2</span></sup></span><span data-dcnode-id="2043" instrument_node="">Department Survey Design and Methodology, GESIS – Leibniz Institute for the Social Sciences, Mannheim, Germany</span></li></ul><p class="mb15" data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">The integration of immigrant minorities is a major concern for diverse societies–with major implications for the well-being of those affected, social cohesion and group relations, and economic and social progress. In this paper, we give a comprehensive description of long-term migrant integration in Western Europe to investigate theories of migrant assimilation and integration. We take a multidimensional approach, looking at 10 indicators measuring social, structural, political, civic and cultural integration. We take an innovative approach to measuring minority background by using two complementary measures: generational status, distinguishing first and second-generation migrants from the third and higher up ‘natives,’ and self-reported ancestry, separating those with autochthonous-only ancestry from those with various kinds of allochthonous ancestry. Using interaction effects between these measures, we can test whether generational change is faster or slower for some ethnic groups than for others, i.e. whether different groups integrate at differing speeds. Using the pooled samples of all Western European countries included in the European Social Survey rounds 7 and 8, we run multivariate regression analyses to estimate the effects of migrant background on the 10 indicators of integration. Compared to migrants with autochthonous ancestry, respondents of Middle Eastern, North African &amp; Central Asian as well as Sub-Saharan African ancestry are less integrated on all dimensions of integration except the political and civic ones. The South &amp; South-East Asian group is also substantially less assimilated socially and culturally, but not so much structurally. They are closely followed by the South East and East European groups, following the same pattern except that the latter are less integrated politically as well. We only find substantial interaction effects between ethnic group and migrant generation for two integration indicators, namely citizenship and homophobia, for which speed of integration thus appears to differ across ethnic groups. For all other indicators, integration speed does not appear to differ across ethnic groups, supporting straight line assimilation theory, with social integration in terms of interethnic friendship potentially rather following a ‘bumpy-line’ pattern.</span></p><div class="clear" data-dcnode-id="2038"></div></div><div class="JournalFullText" data-dcnode-id="386"><a class="reset-hash-position" data-dcnode-id="2036" id="h2" name="h2"></a><h2 data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">INTRODUCTION: Migration and Integration</span></h2><p class="mb15" data-dcnode-id="2005"><span data-dcnode-id="2033" instrument_node="">With increasing ethnic diversity as a result of recent decades of immigration in all Western European countries, the integration of ethnic minorities with a migration background has become a major concern of national governments, policymakers, academics, the wider public, and the individuals directly affected themselves. These concerns cover a wide range of issues. The minorities themselves are concerned about the inequality and entrenched disadvantage that they experience in the labor market, as shown by the high rates of unemployment and low-skilled work experienced by migrants and the children of migrants (see for example </span><a data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="2032" instrument_node="">OECD and European Union, 2015</span></a><span data-dcnode-id="2030" instrument_node="">). Governments have been concerned about the possibility that ethnic minorities will come to live parallel lives in segregated communities and in consequence fail to adopt mainstream values and ways of behavior (</span><a data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="2029" instrument_node="">Casey, 2016</span></a><span data-dcnode-id="2027" instrument_node="">) increasing the risks of ‘homegrown’ radicalism and conflict. Academics have debated the drivers of lack of integration, exploring the roles of the characteristics of the migrants themselves (</span><a data-dcnode-id="2025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="2026" instrument_node="">Koopmans, 2010</span></a><span data-dcnode-id="2024" instrument_node="">), the impact of government policies such as multiculturalism (</span><a data-dcnode-id="2022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="2023" instrument_node="">Wright and Bloemraad, 2012</span></a><span data-dcnode-id="2021" instrument_node="">; </span><a data-dcnode-id="2019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="2020" instrument_node="">Bloemraad and Wright, 2014</span></a><span data-dcnode-id="2018" instrument_node="">), and of racisms and discriminatory treatment of minorities on the part of the majority group in the country of destination (</span><a data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="2017" instrument_node="">Portes and Zhou, 1993</span></a><span data-dcnode-id="2015" instrument_node="">; </span><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="2014" instrument_node="">Reitz, 1998</span></a><span data-dcnode-id="2012" instrument_node="">; </span><a data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="2011" instrument_node="">Heath et al., 2013</span></a><span data-dcnode-id="2009" instrument_node="">; </span><a data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="2008" instrument_node="">Ramos et al., 2020</span></a><span data-dcnode-id="2006" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1973"><span data-dcnode-id="2004" instrument_node="">While there has been considerable previous research on the integration of migrants in individual countries and some comparative work on specific dimensions (</span><a data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="2003" instrument_node="">van Tubergen et al., 2004</span></a><span data-dcnode-id="2001" instrument_node="">; </span><a data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="2000" instrument_node="">Marks, 2005b</span></a><span data-dcnode-id="1998" instrument_node="">; </span><a data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B50"><span data-dcnode-id="1997" instrument_node="">van Tubergen and Kalmijn, 2005</span></a><span data-dcnode-id="1995" instrument_node="">; </span><a data-dcnode-id="1993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="1994" instrument_node="">Levels et al., 2008</span></a><span data-dcnode-id="1992" instrument_node="">; </span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="1991" instrument_node="">Kristen et al., 2011</span></a><span data-dcnode-id="1989" instrument_node="">; </span><a data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="1988" instrument_node="">OECD and European Union, 2015</span></a><span data-dcnode-id="1986" instrument_node="">), there has been little systematic work using a multidimensional approach and distinguishing the major ethnic groupings (but see </span><a data-dcnode-id="1984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="1985" instrument_node="">Crul et al., 2012</span></a><span data-dcnode-id="1983" instrument_node="">). Although in a local context it may be clear who these immigrant minorities are, in wider debates very different groups are commonly treated as if they were one homogeneous group, or simply disaggregated by generational status only (</span><a data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="1982" instrument_node="">Marks, 2005a</span></a><span data-dcnode-id="1980" instrument_node="">; </span><a data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="1979" instrument_node="">Marks, 2005b</span></a><span data-dcnode-id="1977" instrument_node="">; </span><a data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="1976" instrument_node="">Schleicher, 2006</span></a><span data-dcnode-id="1974" instrument_node="">). As our results will demonstrate, such approaches hide more than they reveal. This over-simplification is also not likely to foster migrant integration.</span></p><p class="mb15" data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">The aim of this paper is therefore to describe immigrant integration on a wide range of indicators and examine how different ethnic groups as well as different migrant generations fare compared to the autochthonous population. Using pooled European Social Survey (ESS) data, we explore the integration of migrants and their descendants across eight Western European countries. We take a multidimensional approach to integration and compare the extent of integration along social, structural, cultural, political and civic lines. Exploring the integration of 11 broad ‘pan-ethnic’ groups (such as West Europeans, East Europeans, East Asians, Latin Americans) compared to the autochthonous majority, we test central theories of integration such as classic ‘straight line’ assimilation theories of generational distance from immigration, and more recent theories of segmented assimilation.</span></p><p class="mb15" data-dcnode-id="1966"><span data-dcnode-id="1970" instrument_node="">In the next section, we briefly introduce the concept and theories of immigrant integration. Section </span><em data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Data, Measures and Methods</span></em><span data-dcnode-id="1967" instrument_node=""> introduces the survey data used in the empirical analyses and the measures of minority background, presents approaches to the distinction of various dimensions of integration and their measurement, as well as the analysis strategy. Then we present the results, including a number of robustness checks. The last section summarizes and discusses the results and points to avenues for future research.</span></p><a class="reset-hash-position" data-dcnode-id="1965" id="h3" name="h3"></a><h2 data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">The Concept and Theories of Immigrant Integration</span></h2><p class="mb0" data-dcnode-id="1949"><span data-dcnode-id="1962" instrument_node="">There is no single settled definition of the concept of integration. One complication is that the term integration tends to be used more often by European scholars than by Americans, who tend to prefer the term assimilation, but there is a great deal of overlap between the two concepts. Early treatments of the concept of assimilation in the USA, developed in the context of migration from Europe in the early decades of the 20th century, tended to focus on processes of acculturation – “incorporation … in a common cultural life” as Park and Burgess (1921, p. 735) described it. In contrast, post-war European writing on ethnic integration (perhaps influenced by European theories of social class inequality) tended to focus on issues of the socio-economic inclusion and exclusion of post-war labor migrants from less developed countries such as Turkey (e.g., </span><a data-dcnode-id="1960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1961" instrument_node="">Castles &amp; Kosack, 1973</span></a><span data-dcnode-id="1959" instrument_node="">). However more recent American work, such as that of </span><a data-dcnode-id="1957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="1958" instrument_node="">Gans (1992)</span></a><span data-dcnode-id="1956" instrument_node=""> on second-generation decline and </span><a data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1955" instrument_node="">Portes and Zhou’s (1993)</span></a><span data-dcnode-id="1953" instrument_node=""> theory of segmented assimilation incorporate the socioeconomic side into a broadened concept of assimilation, while European scholars have increasingly debated socio-cultural aspects of integration (</span><a data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B28"><span data-dcnode-id="1952" instrument_node="">Koopmans, 2016</span></a><span data-dcnode-id="1950" instrument_node="">). We shall thus treat the two concepts as effectively synonyms. The core of both concepts is that individuals and groups become fully part of a wider whole, the latter usually thought of as the nation-state in which the individuals reside.</span></p><p class="mb0" data-dcnode-id="1920"><span data-dcnode-id="1948" instrument_node="">As one might expect, a variety of different theoretical frameworks for understanding migrant integration have been suggested. First, the classic ‘straight line’ theory of assimilation, based on the experience of European migrants to the United States, in essence put forward a generational approach to assimilation, arguing that the first generation of immigrants would be the least assimilated, retaining many of the values, identities and modes of behavior of their countries of origin (</span><a data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="1947" instrument_node="">Gans, 1979</span></a><span data-dcnode-id="1945" instrument_node="">; </span><a data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1944" instrument_node="">Warner and Srole, 1945</span></a><span data-dcnode-id="1942" instrument_node="">). As Warner and Srole describe the process, based on their pre-war (1930–35) research on eight European-origin groups in Yankee City, “The ethnic generation born abroad and migrant to this country is the one attached most strongly to the ancestral social system, and its derivative, the ethnic community in Yankee City, and least to the Yankee City social system … The offspring of these immigrants, the “filial first” or the “F</span><sup data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">1</span></sup><span data-dcnode-id="1939" instrument_node="">” generation, having been born, reared and schooled in the United States, know nothing of the ancestral society of their parents except as it is partially represented in the ethnic group’s community organization. The members of the F</span><sup data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">1</span></sup><span data-dcnode-id="1936" instrument_node=""> generation acquire wider external relations with the Yankee City society than their parents and bring more elements of American culture into their internal group relations. The children of the F</span><sup data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">1</span></sup><span data-dcnode-id="1933" instrument_node=""> generation, whom we label F</span><sup data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">2</span></sup><span data-dcnode-id="1930" instrument_node="">, and the children of the F</span><sup data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">2</span></sup><span data-dcnode-id="1927" instrument_node=""> generation, whom we label F</span><sup data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">3</span></sup><span data-dcnode-id="1924" instrument_node="">, exhibit similar progressive shifts in social personality” (</span><a data-dcnode-id="1922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1923" instrument_node="">Warner and Srole, 1945</span></a><span data-dcnode-id="1921" instrument_node="">, p. 30).</span></p><p class="mb0" data-dcnode-id="1915"><span data-dcnode-id="1919" instrument_node="">In effect, the legacy of the country of origin was expected to weaken the more distant it became in terms of generations. Later generations, Warner and Srole argued, “have ceased participating in the ethnic life of their ancestors and have disappeared in the larger American world” (p. 2). According to this account, generations are the motor of ethnic change, not simply the time frame (</span><a data-dcnode-id="1917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="1918" instrument_node="">Alba and Nee, 1997</span></a><span data-dcnode-id="1916" instrument_node="">, p. 832).</span></p><p class="mb0" data-dcnode-id="1904"><span data-dcnode-id="1914" instrument_node="">While Warner and Srole did not themselves use the term ‘straight line’ assimilation, their over-time data on the eight European-origin groups do approximate to straight lines moving steadily upwards (albeit at different speeds), although subsequent scholars such as </span><a data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="1913" instrument_node="">Gans (1992)</span></a><span data-dcnode-id="1911" instrument_node=""> have suggested that ‘bumpy line’ might be a more apt description of the trends over generations. At any rate, in their study </span><a data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1910" instrument_node="">Warner and Srole (1945)</span></a><span data-dcnode-id="1908" instrument_node=""> described the way in which the eight groups each entered Yankee City at the lowest residential, occupational and social class locations but then moved gradually up over time and generations (the two being broadly equated). Warner and Srole concluded that “It seems likely that oncoming generations of new ethnics will go through the same metamorphosis and climb to the same heights that generations of earlier groups have achieved” (</span><a data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1907" instrument_node="">Warner and Srole, 1945</span></a><span data-dcnode-id="1905" instrument_node="">, p. 2).</span></p><p class="mb0" data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Warner and Srole do, however, qualify this broad prediction with two important caveats. First, they argued that the greater the difference between the host (American) and the immigrant cultures, the greater will be “the subordination, the greater the strength of the ethnic social systems, and the longer the period necessary for the assimilation of the ethnic group” (p. 285). Second, they argued that the process of assimilation might be even slower and more painful for racial minorities because of the “force of American organized “prejudice” against the dark-skinned people” (p. 294).</span></p><p class="mb0" data-dcnode-id="1885"><span data-dcnode-id="1901" instrument_node="">The scholarly consensus is that “assimilation has been the master trend among the descendants of the immigrants of the previous era of mass immigration, who mainly came from Europe in the period before 1930” (</span><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="1900" instrument_node="">Alba and Nee, 1997</span></a><span data-dcnode-id="1898" instrument_node="">, p. 841). A major concern in the subsequent literature is whether the picture of straight-line assimilation for European-origin groups drawn by Warner and Srole will apply to the ‘new’ immigration to Europe and America of the postwar period (see </span><a data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="1897" instrument_node="">Gans, 1979</span></a><span data-dcnode-id="1895" instrument_node=""> for a summary of critiques of straight-line theory). One important issue, as </span><a data-dcnode-id="1893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="1894" instrument_node="">Alba and Nee (1997)</span></a><span data-dcnode-id="1892" instrument_node=""> and </span><a data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="1891" instrument_node="">Waters (2014)</span></a><span data-dcnode-id="1889" instrument_node=""> have pointed out, is that a generational theory of change may have fitted the early 20th century American context better than it does contemporary contexts, where there is continuing migration from many origin countries. For example, there have been continuing inflows of new migrants from Mexico to the US, from Turkey to Germany, or from Pakistan to Britain leading to ‘replenishment’ of the ethnic community and potentially keeping alive the culture and traditions of the origin country (</span><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="1888" instrument_node="">Waters, 2014</span></a><span data-dcnode-id="1886" instrument_node="">). This is an important difference from the mid 20th century American situation where major restrictions on immigration were introduced after the first world war and effectively lasted until 1965.</span></p><p class="mb0" data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Another important dissimilarity between early 20th century America and contemporary contexts is that the account of straight-line assimilation theory applied to the migration of European migrants from culturally similar Christian countries such as Ireland, Poland and Italy in contrast to the migration of labor migrants and refugees from non-European and often non-Christian countries in the postwar period. A number of scholars have suggested that straight line assimilation might not apply in the same way to these non-white and/or non-Christian groups as it had applied (and might still apply) to groups of European heritage.</span></p><p class="mb0" data-dcnode-id="1854"><span data-dcnode-id="1882" instrument_node="">There are two main variants on this argument, both of which had in fact been anticipated by Warner and Srole. The first emphasizes enduring processes of exclusion and discrimination on the part of the majority group against non-white or non-Christian groups, leading to downward mobility and socio-economic marginalization of stigmatized minorities (</span><a data-dcnode-id="1880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="1881" instrument_node="">Gans, 1992</span></a><span data-dcnode-id="1879" instrument_node="">; </span><a data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1878" instrument_node="">Portes and Zhou, 1993</span></a><span data-dcnode-id="1876" instrument_node="">). Systematic reviews of field experiments suggest that racial discrimination in the labor market persists against non-white groups both in Europe and America and against the second generation as well as the first, thus inhibiting structural integration (</span><a data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="1875" instrument_node="">Zschirnt and Ruedin, 2016</span></a><span data-dcnode-id="1873" instrument_node="">; </span><a data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="1872" instrument_node="">Quillian et al., 2019</span></a><span data-dcnode-id="1870" instrument_node="">). These exclusionary processes in turn, it has been suggested, might lead to ‘reactive ethnicity’ on the part of marginalized ethnic groups, working in the opposite direction to cultural assimilation and serving to maintain distinct ethnic identities (</span><a data-dcnode-id="1868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1869" instrument_node="">Warner and Srole, 1945</span></a><span data-dcnode-id="1867" instrument_node="">; </span><a data-dcnode-id="1865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="1866" instrument_node="">Rumbaut, 2008</span></a><span data-dcnode-id="1864" instrument_node="">, p. 284). Along somewhat similar lines, other scholars have focused on the differing ‘warmth of the welcome’ and contexts of reception facing different contemporary migrant groups and their implications for integration (</span><a data-dcnode-id="1862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1863" instrument_node="">Portes and Zhou, 1993</span></a><span data-dcnode-id="1861" instrument_node="">; </span><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="1860" instrument_node="">Reitz, 1998</span></a><span data-dcnode-id="1858" instrument_node="">; </span><a data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="1857" instrument_node="">Crul et al., 2012</span></a><span data-dcnode-id="1855" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1843"><span data-dcnode-id="1853" instrument_node="">A second variant, which has been applied particularly by European scholars to Muslim minorities in Europe, has emphasized the role of Islam, or at least of some traditional attitudes associated with Islamic countries of origin, in impeding integration both structurally and socio-culturally (</span><a data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="1852" instrument_node="">Sniderman and Hagendoorn, 2007</span></a><span data-dcnode-id="1850" instrument_node="">; </span><a data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B28"><span data-dcnode-id="1849" instrument_node="">Koopmans, 2016</span></a><span data-dcnode-id="1847" instrument_node="">; </span><a data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="1846" instrument_node="">Zuccotti and Platt, 2017</span></a><span data-dcnode-id="1844" instrument_node="">). This variant emphasizes the way in which high levels of religiosity and traditional attitudes associated with Islam, especially attitudes to gender roles, might impede the structural integration of Muslim women as well as limiting social mixing and intermarriage across ethnic lines. These values might in turn be preserved across generations by strong religious communities around the Mosque.</span></p><p class="mb0" data-dcnode-id="1838"><span data-dcnode-id="1842" instrument_node="">Another major difference of the contemporary 21st century context from the earlier context is that of growing income inequality in developed countries, especially in the United States and United Kingdom but also in many other Western and North European countries such as Sweden, Germany and the Netherlands (</span><a data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B3"><span data-dcnode-id="1841" instrument_node="">Atkinson et al., 2017</span></a><span data-dcnode-id="1839" instrument_node="">). There have been declining opportunities for disadvantaged members of the majority group to achieve upward mobility, and hence there are potentially greater risks of entrenched disadvantage for minorities than there were in previous eras.</span></p><p class="mb0" data-dcnode-id="1830"><span data-dcnode-id="1837" instrument_node="">Theories of segmented and selective assimilation (</span><a data-dcnode-id="1835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1836" instrument_node="">Portes and Zhou, 1993</span></a><span data-dcnode-id="1834" instrument_node="">; </span><a data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="1833" instrument_node="">Zhou, 1997</span></a><span data-dcnode-id="1831" instrument_node="">) provide an integrated account of these different theoretical ideas, focusing on the way in which different groups may follow different paths on different dimensions, depending on the extent of discrimination and exclusion they are subject to, the economic opportunities open to them, and the strength of the ethnic community and its social and economic capital. As Portes and Zhou write, “One of [these paths] replicates the time-honored portrayal of growing acculturation and parallel integration into the white middle class; a second leads straight in the opposite direction to permanent poverty and assimilation into the underclass; still a third associates rapid economic advancement with deliberate preservation of the immigrant community’s values and tight solidarity” (1993, p. 82).</span></p><p class="mb0" data-dcnode-id="1825"><span data-dcnode-id="1829" instrument_node="">Portes and Zhou’s examples show how Black migrant groups might experience downward mobility, while simultaneously assimilating socially with lower class African American youth, and how some Asian groups experience upward (structural) mobility while maintaining their ethnic communities. For the European context, one might want to extend Portes and Zhou’s account to include the potential role of religious communities and their institutions such as the gurdwara, temple or mosque. While Christian communities may provide a potential bridge with the mainstream and thus more rapid social and cultural assimilation, non-Christian religions can potentially maintain the separate existence of ethno-religious communities through their separate religious institutions, thus enhancing bonding rather than bridging social capital (</span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="1828" instrument_node="">Connor and Koenig, 2013</span></a><span data-dcnode-id="1826" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1817"><span data-dcnode-id="1824" instrument_node="">Segmented assimilation theory therefore suggests that different ethnic groups may experience different intergenerational trajectories and that rates of assimilation may vary across different dimensions as well. Whereas </span><a data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1823" instrument_node="">Warner and Srole’s (1945)</span></a><span data-dcnode-id="1821" instrument_node=""> classic treatment had assumed that assimilation on residential, occupational and social class lines (in the form of upward social mobility) would also be accompanied by and indeed facilitate assimilation with respect to social behavior and cultural attitudes, </span><a data-dcnode-id="1819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1820" instrument_node="">Portes and Zhou’s (1993)</span></a><span data-dcnode-id="1818" instrument_node=""> segmented approach allows for discrepancies in the extent of assimilation along different criteria, with the pattern of upward across-the-board assimilation being only one among several possibilities.</span></p><p class="mb0" data-dcnode-id="1809"><span data-dcnode-id="1816" instrument_node="">Scholars have raised some doubts about </span><a data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1815" instrument_node="">Portes and Zhou’s (1993)</span></a><span data-dcnode-id="1813" instrument_node=""> account, particularly about the extent to which downwards mobility has actually occurred among the children of migrants in the USA. While there is evidence that many of the first generation – the migrants themselves – experience downwards mobility, especially at the early stages of their lives in a new country, downward mobility for the second generation does not appear to be a widespread phenomenon (e.g., </span><a data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="1812" instrument_node="">Perlmann and Waldinger, 1997</span></a><span data-dcnode-id="1810" instrument_node="">). As Portes and Zhou emphasized, the pattern of downward assimilation was contingent on the prior existence of a substantial and highly disadvantaged African American underclass in the United States, a phenomenon that has no direct parallel in any European country.</span></p><p class="mb0" data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">The central aim of this paper, therefore, is to explore in the European context questions about the integration of different migrant groups, and in particular to compare disparities across ethnic groups as well as migrant generations. Specifically, we will compare the integration of groups of European heritages, and thus relatively close culturally and ethnically to the majority groups in Western Europe, with visible minority groups such as black and non-Christian (especially Muslim) groups from origins outside Europe.</span></p><p class="mb0" data-dcnode-id="1802"><span data-dcnode-id="1806" instrument_node="">In the light of the American debates over straight-line, bumpy line and segmented assimilation accounts, we address three main research questions about integration and assimilation in the European context. Firstly, we ask which broad ‘pan-ethnic’ groups, in the contemporary European context, show patterns of increasing integration across generations along the lines of ‘the time-honored portrayal of growing acculturation and parallel integration into the white middle class’ (</span><a data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1805" instrument_node="">Portes and Zhou, 1993</span></a><span data-dcnode-id="1803" instrument_node="">, p. 82). Specifically, is this pattern predominant among groups with a Western (i.e., European, North American or Australian) heritage but less frequent among non-European groups from more culturally distant origins? Secondly, do black groups stand out as being likely to experience entrenched disadvantage and downward assimilation across generations, perhaps as a result of persistent racism? Thirdly, do we find uneven patterns of change across the different dimensions of integration along the lines of Portes and Zhou’s third path of ‘rapid economic advancement with deliberate preservation of the immigrant community’s values and tight solidarity,’ that is to say with intergenerational progress on the socio-economic dimension while socio-cultural differentiation is preserved across generations?</span></p><a class="reset-hash-position" data-dcnode-id="1801" id="h4" name="h4"></a><h2 data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Data, Measures and Methods</span></h2><h3 class="pt0" data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Data</span></h3><p class="mb0" data-dcnode-id="1773"><span data-dcnode-id="1796" instrument_node="">We use the European Social Survey (ESS) rounds 7 and 8, collected in 2014/15 and 2016/17 respectively (</span><a data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="1795" instrument_node="">European Social Survey, 2014a</span></a><span data-dcnode-id="1793" instrument_node="">; </span><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B14"><span data-dcnode-id="1792" instrument_node="">European Social Survey, 2016</span></a><span data-dcnode-id="1790" instrument_node="">), to examine migrant integration in Western Europe. The ESS is a biannual, cross-sectional face-to-face probability sample survey of attitudes, beliefs and behaviors conducted in over 36 European countries since 2001 (for an introduction to the ESS, see </span><a data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="1789" instrument_node="">Schnaudt, et al., 2014</span></a><span data-dcnode-id="1787" instrument_node="">). It covers individuals from the age of 15, with no upper age limit.</span><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn1"><sup data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">1</span></sup></a><span data-dcnode-id="1783" instrument_node=""> The analyses reported in this paper are based on the pooled ESS samples in order to obtain sufficient numbers of respondents from various socio-cultural origins. We only use the data from the eight Western European countries included in the ESS: Austria, Belgium, France, Germany, Ireland, the Netherlands, Switzerland and the United Kingdom.</span><a data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn2"><sup data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">2</span></sup></a><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="1779" instrument_node="">Table 1</span></a><span data-dcnode-id="1777" instrument_node=""> gives an overview of the country samples in ESS rounds 7 and 8, and </span><a data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T2"><span data-dcnode-id="1776" instrument_node="">Table 2</span></a><span data-dcnode-id="1774" instrument_node=""> presents descriptive statistics on the control variables education, sex and age in the pooled sample.</span></p><div class="DottedLine" data-dcnode-id="1772"></div><div class="Imageheaders" data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">TABLE 1</span></div><div class="FigureDesc" data-dcnode-id="1763"><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-t001.jpg" name="Table1" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1769" id="T1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-t001.gif&amp;raw"></a><p data-dcnode-id="1764"><strong data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">TABLE 1</span></strong><span data-dcnode-id="1765" instrument_node="">. Sample sizes per ESS round and participating Western European country.</span></p></div><div class="clear" data-dcnode-id="1762"></div><div class="Imageheaders" data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">TABLE 2</span></div><div class="FigureDesc" data-dcnode-id="1753"><a data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-t002.jpg" name="Table2" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1759" id="T2" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-t002.gif&amp;raw"></a><p data-dcnode-id="1754"><strong data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">TABLE 2</span></strong><span data-dcnode-id="1755" instrument_node="">. Descriptive statistics for control variables.</span></p></div><div class="clear" data-dcnode-id="1752"></div><div class="DottedLine" data-dcnode-id="1751"></div><h3 class="pt0" data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Measures of Immigrant Background</span></h3><p class="mb0" data-dcnode-id="1744"><span data-dcnode-id="1748" instrument_node="">In contrast to many studies, we measure both specific ethnic and cultural origins, as well as the generational status of migrants in Europe. The specific measures are described here in turn, followed by a presentation of their co-occurrence. </span><a data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T3"><span data-dcnode-id="1747" instrument_node="">Table 3</span></a><span data-dcnode-id="1745" instrument_node=""> shows the joint distribution of both measures.</span></p><div class="DottedLine" data-dcnode-id="1743"></div><div class="Imageheaders" data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">TABLE 3</span></div><div class="FigureDesc" data-dcnode-id="1734"><a data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-t003.jpg" name="Table3" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1740" id="T3" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-t003.gif&amp;raw"></a><p data-dcnode-id="1735"><strong data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">TABLE 3</span></strong><span data-dcnode-id="1736" instrument_node="">. Joint distribution of socio-cultural origin and generational status.</span></p></div><div class="clear" data-dcnode-id="1733"></div><div class="DottedLine" data-dcnode-id="1732"></div><h5 data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Ethnic and Cultural Origins</span></h5><p class="mb0" data-dcnode-id="1713"><span data-dcnode-id="1729" instrument_node="">In order to measure specific socio-cultural origins, we use the ancestry measure which was developed for the immigration module in ESS round 7. The respective questionnaire item asks the respondent which ethnic or cultural group (s)he considers him- or herself to descend from. It uses country-specific response options, presented to respondents on a showcard, which are recoded into the European Standard Classification of Cultural and Ethnic Groups (ESCEG, </span><a data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="1728" instrument_node="">Heath and Schneider, 2018</span></a><span data-dcnode-id="1726" instrument_node="">) after data collection. Respondents can indicate up to two ancestries. This measure focuses on ethnic and cultural </span><em data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">origins</span></em><span data-dcnode-id="1723" instrument_node=""> rather than current identity because of the problem of ‘ethnic identity leakage’ - the fact that higher generation respondents, especially those of mixed ancestry, may not identify with the origin of their ancestors any more (see e.g., </span><a data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="1722" instrument_node="">Waters, 2014</span></a><span data-dcnode-id="1720" instrument_node="">) - and potential bias if current identity is used (for further details on this measure, see </span><a data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="1719" instrument_node="">Heath et al., 2016</span></a><span data-dcnode-id="1717" instrument_node="">; </span><a data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="1716" instrument_node="">Schneider and Heath, 2019</span></a><span data-dcnode-id="1714" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1702"><span data-dcnode-id="1712" instrument_node="">We use the broad groups of the ESCEG, i.e. the first digit of the classification, for all respondents reporting a non-European ancestry. The first digit broadly corresponds to what have been termed ‘pan-ethnic’ groups (</span><a data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="1711" instrument_node="">Lopez and Espiritu, 1990</span></a><span data-dcnode-id="1709" instrument_node="">). For respondents reporting a European ancestry, we differentiate the second digit of the classification (see left-most column in </span><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T3"><span data-dcnode-id="1708" instrument_node="">Table 3</span></a><span data-dcnode-id="1706" instrument_node="">), since this group is large enough to merit closer inspection, and differences in the integration of migrants from different European origins in Western European destination countries are likely. Respondents are coded into the ‘only autochthonous ancestry’ group if they do not report any foreign ancestry.</span><a data-dcnode-id="1703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn3"><sup data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">3</span></sup></a></p><p class="mb0" data-dcnode-id="1694"><span data-dcnode-id="1701" instrument_node="">The traditional approach to measuring ethnic origins of respondents with a migration background has been to construct measures based on the respondents’ and their parents’ countries of birth (COB)–measures which are often available in large-scale datasets and which can readily be harmonized. The ESS also collects information on respondents’ and their parents’ country of birth. We construct a measure equivalent to the one mentioned above derived from measures of ancestry using country of birth information in order to give our results a robustness check. Although we would in general expect these COB measures to yield similar results to ours, one important problem with COB measures is that they are normally unable to identify third or higher generation respondents, who are likely to become increasingly numerous in Europe in the future. The measure of ancestry does not have any such limitation. It can therefore also be considered more ‘futureproof’ as a survey instrument for identifying ethnic minorities stemming from earlier migration waves than just those covering the current first and second generations. A second important problem is that COB measures are at risk of misclassifying ‘returnees’ – respondents who have autochthonous ancestry but who were born abroad, for example as a result of colonialism or religious persecution in earlier periods. Well-known examples are the French “</span><em data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">pieds noirs</span></em><span data-dcnode-id="1698" instrument_node="">,” Portuguese “</span><em data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">retornados</span></em><span data-dcnode-id="1695" instrument_node="">,” and returning members of the German diaspora in the former Soviet Union and those displaced from formerly German territories after WWII. In a measure based on COB, these will be classified as ethnic minorities although they rather belong to the majority ethnic group.</span></p><h5 data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Generational Status</span></h5><p class="mb0" data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">In the case of generational status, we distinguish three categories: First generation, second generation, and third and higher generations (i.e., mostly respondents without a recent migration background). All respondents who were born abroad and immigrated after age 5 (i.e., after primary education started in most countries) are regarded as first-generation immigrants, irrespective of where their parents were born. All native-born respondents with one or both parents born abroad, or foreign-born respondents who immigrated before age 6 to at least one foreign-born parent, are regarded as second generation i.e., the direct offspring of immigrants. Finally, respondents who were born in the country where the survey was held and whose parents were also born in this country, are regarded as 3rd and higher generation. While this group mostly consists of people without any migration background, it will also include respondents whose grandparents or more remote ancestors were migrants. Foreign-born respondents who immigrated before age 6 to native-born parents are also included in this last group.</span></p><p class="mb0" data-dcnode-id="1682"><span data-dcnode-id="1689" instrument_node="">To be sure, generational status and socio-cultural origin are related (see </span><a data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T3"><span data-dcnode-id="1688" instrument_node="">Table 3</span></a><span data-dcnode-id="1686" instrument_node="">, Cramér’s V = 0.55). The large majority of respondents (74%) does not have a migration background and reports autochthonous ancestry only. Still, this means that a quarter of the population in the countries included in the analyses either has an observable migration background by belonging to the first or second generation, or reports a foreign ancestry (and mostly both). The smallest cell sizes are the Northern European, East Asian and Latin American third generation with less than 10 respondents each. We will not interpret the results referring to these combinations of backgrounds. Interestingly, non-ignorable numbers of respondents with first- or second-generation migration background report exclusively autochthonous ancestry - which would not be visible if using a COB-based measure of ethnic group (see above). We inspected the data very closely for a number of countries and concluded that while this may be counterintuitive at first glance, the numbers are very plausible in light of the history of migration and return migration in these countries (see </span><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23SM1"><span data-dcnode-id="1685" instrument_node="">Supplementary Material Appendix B</span></a><span data-dcnode-id="1683" instrument_node="">).</span></p><h3 class="pt0" data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Integration Measures</span></h3><p class="mb0" data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">In order to obtain a broad picture of immigrant integration in Europe, we measure integration in five distinct (although correlated) domains. Even within these broad domains, we aim to measure diverse aspects of integration, which is why we do not construct summary indices of e.g., structural integration or cultural assimilation but rather look at different socio-economic outcomes and different kinds of attitudes which may not correlate highly with one another.</span></p><p class="mb0" data-dcnode-id="1664"><span data-dcnode-id="1677" instrument_node="">Currently, there is no agreement among scholars either on the number of dimensions, or on their specific components. Jonsson and his colleagues (following </span><a data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="1676" instrument_node="">Esser, 2006</span></a><span data-dcnode-id="1674" instrument_node="">), for example, distinguish three dimensions – structural, cultural and social. They see the structural dimension as primarily capturing aspects of the vertical, hierarchical segmentation of society with respect to economic resources and positions, while the cultural dimension – the extent to which minorities and majority share knowledge, attitudes and values - and the social dimension – the extent of social ties between minority and majority groups - capture horizontal aspects of integration (</span><a data-dcnode-id="1672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="1673" instrument_node="">Jonsson et al., 2018</span></a><span data-dcnode-id="1671" instrument_node="">). Other scholars however have identified somewhat different dimensions or have grouped the sub-dimensions in different ways. </span><a data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="1670" instrument_node="">Lessard-Phillips (2017)</span></a><span data-dcnode-id="1668" instrument_node="">, for example, on the basis of factor analysis of British data, empirically identified four dimensions - spatial, socio-economic, political, and cultural. Other scholars and institutions (e.g., </span><a data-dcnode-id="1666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="1667" instrument_node="">OECD Union, European, 2015</span></a><span data-dcnode-id="1665" instrument_node="">) have produced further different lists. Given the current state of knowledge, we do not believe that there is at present any one correct way to identify dimensions and sub-dimensions of migrant integration. In this paper, we distinguish five dimensions, adding a political dimension and a new ‘civic’ dimension to the three identified by Jonsson and colleagues.</span></p><h5 data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Structural Integration</span></h5><p class="mb0" data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Structural integration is typically thought of as achieving parity with the major group in terms of economic resources and occupational positions. For structural integration, therefore, we look at the position of the individual in the labor market and household income. Thereby we do not only look at the situation of the respondent him/herself, but also at the wider household context. Consequently, we construct two structural integration indicators.</span></p><p class="mb0" data-dcnode-id="1649"><span data-dcnode-id="1659" instrument_node="">Firstly, we look at the socio-economic positioning of the individual in society based on their employment situation and occupation. More specifically, we examine whether there is a higher risk to be in a marginalized labor market position for people with an ethnic minority background. We speak about a marginalized labor market position if the respondent is either unemployed (variables </span><em data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">uempla</span></em><span data-dcnode-id="1656" instrument_node=""> and </span><em data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">uempli</span></em><span data-dcnode-id="1653" instrument_node="">) or working in a low-skilled occupation, following </span><a data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B24"><span data-dcnode-id="1652" instrument_node="">Heath and Zwysen (2018)</span></a><span data-dcnode-id="1650" instrument_node="">, who looked at the economic integration of the second generation in Europe. Respondents who are economically inactive (e.g., in education, military service or retired) are excluded from this analysis. 25% of economically active respondents in the pooled ESS sample are either unemployed or work in low-skilled occupations. The variable is inverted so that negative coefficients signify ethnic minority disadvantages.</span></p><p class="mb0" data-dcnode-id="1644"><span data-dcnode-id="1648" instrument_node="">Secondly, the family’s material resources are operationalized by the total net household income from all sources (i.e., ignoring assets and wealth, for which we do not have any measures in the data). In the ESS, this is measured using country-specific income deciles. We use these deciles directly as our indicator (variable </span><em data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">hinctnta</span></em><span data-dcnode-id="1645" instrument_node="">). As usual, the income measure suffers from a high degree of item nonresponse (16%). The results regarding this indicator thus need to be treated with some caution. However, all deciles are populated with eight to twelve percent, so the distribution looks plausible, even though the bottom and two top deciles are somewhat smaller than the other deciles. The median is 5, as it should be.</span></p><h5 data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Cultural Integration</span></h5><p class="mb0" data-dcnode-id="1628"><span data-dcnode-id="1641" instrument_node="">Cultural integration is generally taken to involve the sharing of attitudes and values, although it could be broadened to include shared language (sometimes referred to as acculturation). Fluency in the destination-country language is a major influence on migrants’ structural integration (</span><a data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="1640" instrument_node="">Dustmann, 1994</span></a><span data-dcnode-id="1638" instrument_node="">), and probably on social integration, too (</span><a data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1637" instrument_node="">Chiswick and Houseworth, 2011</span></a><span data-dcnode-id="1635" instrument_node="">). Unfortunately, however, the ESS does not include measures of fluency in the destination-country language(s) and so we focus instead on two specific values which are believed to differ markedly between immigrant and native populations in liberal Western European democracies (while recognizing that there is considerable diversity of opinion even within the majority group). The first one regards homophobia, where the ESS asks for agreement with the statement “Gay men and lesbians should be free to live their own life as they wish” (variable </span><em data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">freehms</span></em><span data-dcnode-id="1632" instrument_node="">) on a five-point agree-disagree scale. Higher values on this scale denote more homophobic attitudes, and we invert the measure. The mean for the West-European ESS sub-sample is then 4.3. The second value we look at is gender equality, measured by agreement with the statement “When jobs are scarce, men should have more right to a job than women” (variable </span><em data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">mnrgtjbrs</span></em><span data-dcnode-id="1629" instrument_node="">), using the same scale but where higher values mean more egalitarian attitudes. The cross-country mean here is then 4.2. This latter item is only available for ESS round 8.</span></p><h5 data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Social Integration</span></h5><p class="mb0" data-dcnode-id="1618"><span data-dcnode-id="1625" instrument_node="">Social integration – social mixing on equal terms between members of minority and majority groups – has been a key component of all conceptualizations from </span><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="1624" instrument_node="">Park and Burgess (1921)</span></a><span data-dcnode-id="1622" instrument_node=""> onwards. This dimension is probably the most difficult to operationalize using ESS data, which for example does not measure partners' ethnic background. We have to make do with the following two proxies that are only available for ESS round 7 and thus entail a much smaller sample. Firstly, ESS round 7 asked respondents whether they have "any close friends who are of a different race or ethnic group from most [country] people?" (variable </span><em data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">dfegcf</span></em><span data-dcnode-id="1619" instrument_node="">). We code all as 1 who indicate No. So, we do not know whether respondents mix with natives, but only whether they do or do not mix with ethnic minority members. We however assume that those who mix more with minority members may mix less with the majority. We find that 56% of the sample report to have no close ethnic minority friends.</span></p><p class="mb0" data-dcnode-id="1613"><span data-dcnode-id="1617" instrument_node="">We can secondly use the question on the respondent’s area of residence (variable </span><em data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">acetalv</span></em><span data-dcnode-id="1614" instrument_node="">) and regard as more socially segregated those (minority) respondents reporting to live in an area where many people are of a different race or ethnic group from that of the majority group. 16% of respondents in the Western European ESS sub-sample report that they live in such an area. Those 84% living in an area with no or only some ethnic minority groups are coded 1.</span></p><h5 data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Political Integration</span></h5><p class="mb0" data-dcnode-id="1606"><span data-dcnode-id="1610" instrument_node="">While political integration does not figure regularly in accounts of integration and assimilation, we regard it as a valuable aspect of integration into the public life of a nation. We distinguish two indicators of increasing constraint: non-electoral political participation, which is open to everybody; and having voted in the last national election, only open to citizens of voting age. These two indicators both reflect the intention to influence the development of the destination country as the migrant’s new home and are straightforward to measure using ESS data. Non-electoral political participation is measured in the ESS with a sequence of items (variables </span><em data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">contplt, wrkprty, wrkorg, badge, sgnptit, pbldmn, bctprd</span></em><span data-dcnode-id="1607" instrument_node="">) asking e.g., whether the respondent signed a petition or took part in a public demonstration in the last 12 months. From these variables, we constructed a binary variable scoring 1 if the respondent said “yes” for any of these items. 53% of the Western European ESS sub-sample show political participation of one form or another.</span></p><p class="mb0" data-dcnode-id="1598"><span data-dcnode-id="1605" instrument_node="">Secondly, for electoral participation, the ESS asks: “Some people don’t vote nowadays for one reason or another. Did you vote in the last [country] national election in [month/year]?” (variable </span><em data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">vote</span></em><span data-dcnode-id="1602" instrument_node="">). We coded as 1 all those saying ‘yes’ and coded to missing all those reporting not to be eligible to vote as well as non-citizens (who often apparently did not use the ‘not eligible to vote’-option). 80% of citizens eligible to vote reported that they had voted in the last national election in the pooled ESS sample.</span><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn4"><sup data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">4</span></sup></a></p><h5 data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Civic Integration</span></h5><p class="mb0" data-dcnode-id="1591"><span data-dcnode-id="1595" instrument_node="">A key component of Gordon’s canonical account of assimilation was ‘identificational’ assimilation which he saw as the development of “a sense of peoplehood based exclusively on [the] host society” (</span><a data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="1594" instrument_node="">Gordon, 1964</span></a><span data-dcnode-id="1592" instrument_node="">, p. 74). The criterion of exclusivity has been challenged as unrealistic in practice, and we accordingly drop it, but the concept of peoplehood seems to us a valuable one, and one which is distinct from the other components that we have covered so far. We term the dimension ‘civic’. We use two indicators, one subjective and one objective.</span></p><p class="mb0" data-dcnode-id="1583"><span data-dcnode-id="1590" instrument_node="">The subjective one refers to national identification, which comes very close to Gordon’s concept of a sense of peoplehood based on the host society. While there are no identical measures for ESS rounds 7 and 8, there are two measures that can be regarded as indicators for the same theoretical concept. In round 7, there is a question with a four-point scale asking, “How close do you feel to [country]?” with 1 “Very close” to 4 “Not close at all” (variable </span><em data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">fclcntr</span></em><span data-dcnode-id="1587" instrument_node="">). In round 8, there is a question with an 11-point scale asking “How emotionally attached do you feel to [country]? Please choose a number from 0 to 10, where 0 means not at all emotionally attached and 10 means very emotionally attached” (variables </span><em data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">atchctr</span
