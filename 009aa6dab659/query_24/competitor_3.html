></em><span data-dcnode-id="1584" instrument_node="">). After harmonizing scale direction and inspecting the individual distributions – both highly skewed towards feeling very close/very attached –, we constructed a combined measure using simple standardization.</span></p><p class="mb0" data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">The objective indicator refers to being a citizen, which can be considered the ultimate sign of successful integration from the destination state’s point of view. Whether the respondent has the country’s citizenship was directly asked in the ESS. 92% of the Western European ESS sub-sample report to have the citizenship of the country in which they were interviewed.</span></p><h3 class="pt0" data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Analysis Strategy</span></h3><p class="mb0" data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">We run multiple regression analyses on all indicators of integration on the pooled ESS round 7 and 8 sample. We first run what we term the ‘main effects’ model in which the integration indicators are regressed on ethnic origin and generational status (plus controls). We follow this with models which also include interactions between ethnic origin and generational status, in order to test whether generational differences are smaller (or larger) among some ethnic groups compared to the autochthonous population.</span></p><p class="mb0" data-dcnode-id="1569"><span data-dcnode-id="1576" instrument_node="">We use linear regression for all integration indicators - including the binary ones. Because of the issues over comparison of effect sizes in the case of logistic regression models, and in order to keep an already complex model computationally as simple as possible, we thus report the results of linear probability models (LPMs) for binary variables, which has become quite acceptable again in recent years (see e.g., </span><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="1575" instrument_node="">Breen et al., 2018</span></a><span data-dcnode-id="1573" instrument_node="">). We also run the corresponding logistic regression models as a robustness check. To ease interpretation, we present adjusted predictions at representative values (APRs) for the full set of combinations of ethnic origins and migrant generations (see </span><a data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B55"><span data-dcnode-id="1572" instrument_node="">Williams, 2012</span></a><span data-dcnode-id="1570" instrument_node="">), complemented by standard regression tables.</span></p><p class="mb0" data-dcnode-id="1564"><span data-dcnode-id="1568" instrument_node="">The regression models are identical for all indicators i.e., we use the same measures of minority background and generational status, and the same control variables. We include only a basic set of control variables, namely, age, gender and level of education in four categories (less than upper secondary, upper secondary - including vocational, post-secondary but not higher education, higher education). No age restrictions are applied to the sample. In the results tables, only the minority background and generation effects as well as interactions between these two variables are shown (but full results are available as </span><a data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23SM1"><span data-dcnode-id="1567" instrument_node="">Supplementary Material Appendix A</span></a><span data-dcnode-id="1565" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1559"><span data-dcnode-id="1563" instrument_node="">We use country fixed effects to control for country level heterogeneity. We cannot use multilevel models, because we only have a low number of countries in our pooled sample and we are not looking at country level effects, which would anyway be problematic with these data (see </span><a data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="1562" instrument_node="">Möhring, 2012</span></a><span data-dcnode-id="1560" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">For socio-cultural origin, we use the autochthonous as the reference category in order to be able to interpret all ethnic group coefficients as deviations from the majority population. We use the ‘first generation’ as the reference category on the generational status variable, so that we can see whether the second generation and the third and higher generations are more integrated than the first generation. We should also note that the number of third-generation respondents in some ethnic groups is very small, making the third generation an inappropriate reference category when examining interaction effects.</span></p><p class="mb0" data-dcnode-id="1552"><span data-dcnode-id="1556" instrument_node="">Following ESS recommendations, the data are weighted by the design weight provided in the ESS data files to correct for unequal selection probabilities due to the complex sampling design applied in a number of ESS countries (</span><a data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="1555" instrument_node="">European Social Survey, 2014b</span></a><span data-dcnode-id="1553" instrument_node="">). The design weight was combined with purpose-built weights equalizing sample sizes across countries, adjusted as per dependent variable (i.e., when analyzing those eligible to vote only, the baseline case number was reduced accordingly for each country). Thereby countries with larger samples get the same weight in the analyses as countries with smaller samples, rather than using the population size weights provided with the ESS data, which lead to a stronger influence of larger countries in the data.</span></p><a class="reset-hash-position" data-dcnode-id="1551" id="h5" name="h5"></a><h2 data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Results</span></h2><p class="mb15" data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">First, we compare the model fit of ethnic minority integration models without and with interaction between ethnic group and generational status. This provides a global test of the hypothesis that different ethnic groups integrate at different speeds.</span></p><p class="mb15" data-dcnode-id="1537"><a data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T4"><span data-dcnode-id="1546" instrument_node="">Table 4</span></a><span data-dcnode-id="1544" instrument_node=""> shows the model fit measures for the main effects and interaction effects models across all indicators. With one important exception (citizenship), BIC gives strong evidence against models with interaction effects. AIC in contrast gives preference to the interaction effects models in all cases but one - interethnic friendships. The adjusted R</span><sup data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">2</span></sup><span data-dcnode-id="1541" instrument_node="">s only change very little when adding interaction effects, again with the exception of the citizenship indicator. It is clear, then, that we need to take account of the interaction effects in the case of citizenship, while it is also clear that interaction effects can safely be ignored in the case of the friendship indicator. In between, the three criteria of BIC, AIC and change in adjusted R</span><sup data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">2</span></sup><span data-dcnode-id="1538" instrument_node=""> suggest similar orderings, with interaction effects being more important in the case of the homophobia indicator and rather less important with the other indicators. In substantive terms this means that while we find equal generational effects across ethnic groups for most integration indicators, for a few indicators, speed of integration across migrant generations differs across ethnic groups. We will discuss this in further detail for those specific indicators.</span></p><div class="DottedLine" data-dcnode-id="1536"></div><div class="Imageheaders" data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">TABLE 4</span></div><div class="FigureDesc" data-dcnode-id="1527"><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-t004.jpg" name="Table4" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1533" id="T4" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-t004.gif&amp;raw"></a><p data-dcnode-id="1528"><strong data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">TABLE 4</span></strong><span data-dcnode-id="1529" instrument_node="">. Comparing model fit of models without and with interaction terms.</span></p></div><div class="clear" data-dcnode-id="1526"></div><div class="DottedLine" data-dcnode-id="1525"></div><h3 class="pt0" data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Structural Integration</span></h3><p class="mb0" data-dcnode-id="1516"><a data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T5"><span data-dcnode-id="1522" instrument_node="">Table 5</span></a><span data-dcnode-id="1520" instrument_node=""> shows the regression results of the ‘main effects’ model when predicting our structural integration indicators while </span><a data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F1"><span data-dcnode-id="1519" instrument_node="">Figure 1</span></a><span data-dcnode-id="1517" instrument_node=""> shows the average predictions at representative values (APRs), derived from this main effects model, for both indicators.</span></p><div class="DottedLine" data-dcnode-id="1515"></div><div class="Imageheaders" data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">TABLE 5</span></div><div class="FigureDesc" data-dcnode-id="1506"><a data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-t005.jpg" name="Table5" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1512" id="T5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-t005.gif&amp;raw"></a><p data-dcnode-id="1507"><strong data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">TABLE 5</span></strong><span data-dcnode-id="1508" instrument_node="">. Regression models for structural integration (linear main effects models).</span></p></div><div class="clear" data-dcnode-id="1505"></div><div class="Imageheaders" data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">FIGURE 1</span></div><div class="FigureDesc" data-dcnode-id="1490"><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-g001.jpg" name="Figure1" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1502" id="F1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-g001.gif&amp;raw"></a><p data-dcnode-id="1491"><strong data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">FIGURE 1</span></strong><span data-dcnode-id="1498" instrument_node="">. Adjusted predictions at representative values for structural integration indicators with 95% confidence intervals. </span><strong data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">(A)</span></strong><span data-dcnode-id="1495" instrument_node=""> no marginal labor market position; </span><strong data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">(B)</span></strong><span data-dcnode-id="1492" instrument_node=""> household income percentiles.</span></p></div><div class="clear" data-dcnode-id="1489"></div><div class="DottedLine" data-dcnode-id="1488"></div><p class="mb0" data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">As we can see, the patterns shown by the two indicators are very similar, both with respect to the ethnic and to the generational differences. Generational status shows a highly similar pattern on the two structural indicators. The second generation is significantly less disadvantaged than the first, with only a slight further improvement among the third and higher generations. With respect to the ethnic differences, we find a considerable range between the twelve groups, ranging from substantial (but not always statistically significant) advantages for the West European, Nordic and North American &amp; Australasian groups to substantial disadvantages for the Middle East, North African &amp; Central Asian, and Sub-Saharan African groups. East Europeans are also significantly disadvantaged on both indicators, although to a lesser extent. Among the other groups, there are significant (dis)advantages on one or other indicator for respondents of Latin American origin (who are more often in a marginalized labor market position) and for the Caribbean group (who have substantial income disadvantages). First-generation South-East Europeans are as advantaged on the income indicator as West Europeans. Only the South European, the South &amp; South-East Asian, and the East Asian groups are neither advantaged nor disadvantaged, relative to the autochthonous majority group, on either indicator.</span></p><p class="mb0" data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Generational effects are weaker than the strongest of the origin effects, suggesting that some structural disadvantage remains even among second and third generation minorities of the most disadvantaged groups. In contrast, the East European disadvantages on both indicators appear to be restricted to the first generation and are cancelled out in the second generation, and the Caribbean disadvantage on income disappears with the third generation.</span></p><p class="mb0" data-dcnode-id="1479"><span data-dcnode-id="1483" instrument_node="">Even though the model with interaction effects between generation and ethnic group has already been shown to have worse model fit than the main effects model, supporting the hypotheses of equal speed of integration across ethnic groups, out of theoretical interest we briefly report on the significant interaction effects, to check whether we find any evidence for the hypothesis of downwards assimilation on the part of particularly disadvantaged, especially black, groups (see </span><a data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23SM1"><span data-dcnode-id="1482" instrument_node="">Supplementary Material Appendix A</span></a><span data-dcnode-id="1480" instrument_node="">). There were in fact few significant interactions for either indicator, and when interactions were significant their signs were contrary to the hypothesis of downward assimilation for stigmatized groups. While this is not conclusive evidence, it is certainly out of line with the downwards assimilation hypothesis. Overall, then, our interpretation of these results for structural integration is that they are more in line with straight-line theory than they are with the hypothesis of downward assimilation.</span></p><h3 class="pt0" data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Cultural Integration</span></h3><p class="mb0" data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">We turn to cultural integration next as many of the basic patterns are rather similar to those for structural integration. The two different indicators of cultural integration also show very similar patterns to each other, both for ethnicity and generation, although there are fewer significant effects in the gender attitudes model, probably because here the analysis sample is only half the size, with ESS round 8 available only.</span></p><p class="mb0" data-dcnode-id="1467"><span data-dcnode-id="1474" instrument_node="">Looking first at </span><a data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T6"><span data-dcnode-id="1473" instrument_node="">Table 6</span></a><span data-dcnode-id="1471" instrument_node=""> and </span><a data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F2"><span data-dcnode-id="1470" instrument_node="">Figures 2A,B</span></a><span data-dcnode-id="1468" instrument_node="">, showing the APRs based on the main effects model, we find consistent generational effects, with more liberal attitudes amongst the second and third generations than in the first generation. Regarding ethnic group effects, we find a range of positive and negative effects, along similar lines to those for structural integration. Thus, among the West European, Nordic and North American &amp; Australasian groups we find more liberal attitudes than among the autochthonous. In contrast there are consistently more conservative attitudes to be found amongst those of Middle Eastern, North African &amp; Central Asian, South &amp; South-East Asian, East, and South-East European as well as Sub-Saharan African (on one indicator) background.</span></p><div class="DottedLine" data-dcnode-id="1466"></div><div class="Imageheaders" data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">FIGURE 2</span></div><div class="FigureDesc" data-dcnode-id="1448"><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-g002.jpg" name="Figure2" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1463" id="F2" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-g002.gif&amp;raw"></a><p data-dcnode-id="1449"><strong data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">FIGURE 2</span></strong><span data-dcnode-id="1459" instrument_node="">. Adjusted predictions at representative values for cultural integration indicators with 95% confidence intervals. </span><strong data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">(A)</span></strong><span data-dcnode-id="1456" instrument_node=""> non-homophobic attitude (main effects model); </span><strong data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">(B)</span></strong><span data-dcnode-id="1453" instrument_node=""> gender egalitarianism (main effects model); </span><strong data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">(C)</span></strong><span data-dcnode-id="1450" instrument_node=""> non-homophobic attitude (interaction effects model).</span></p></div><div class="clear" data-dcnode-id="1447"></div><div class="Imageheaders" data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">TABLE 6</span></div><div class="FigureDesc" data-dcnode-id="1438"><a data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-t006.jpg" name="Table6" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1444" id="T6" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-t006.gif&amp;raw"></a><p data-dcnode-id="1439"><strong data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">TABLE 6</span></strong><span data-dcnode-id="1440" instrument_node="">. Regression models for cultural integration (gender equality in ESS8 only).</span></p></div><div class="clear" data-dcnode-id="1437"></div><div class="DottedLine" data-dcnode-id="1436"></div><p class="mb0" data-dcnode-id="1431"><span data-dcnode-id="1435" instrument_node="">As we noted above, there are indications that the interactions between ethnicity and generation may be important in the case of the homophobia indicator. Looking at </span><a data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F2"><span data-dcnode-id="1434" instrument_node="">Figure 2C</span></a><span data-dcnode-id="1432" instrument_node="">, what we find when we add interaction terms is that there are both significant negative and positive interaction effects with a general pattern of regression towards the mean, i.e. assimilation to the destination country culture, in all groups. Among the West Europeans for example we find significant negative interactions for the second and third generations, cancelling out the generational main effects. In contrast, we find some significant positive interactions for the third generation (not second generation) among the Middle Eastern, North African &amp; Central Asian, Sub-Saharan African, and South-East European groups. All groups converge with the majority in the second or third generation. This leaves no third-generation groups which are significantly less liberal than their autochthonous peers. The interaction effect between ethnic group and generation thus leads to equal attitudinal outcomes across ethnic groups despite the highly different starting points of the first generation in different ethnic groups.</span></p><p class="mb0" data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">In summary, there is wide dispersion among the first generation in their attitudes related to homosexuality and gender equality, with West European and North American being significantly more liberal, and East European, South-East European, Middle Eastern, North African &amp; Central Asian, Sub-Saharan African, and South &amp; South-East Asian being significantly less liberal. These latter differences are mitigated somewhat in the second generation with convergence in the third generation in the case of homophobia. The same could not be observed for gender equality, possibly because the sample for this indicator is too small to detect interaction effects.</span></p><h3 class="pt0" data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Social Integration</span></h3><p class="mb0" data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Patterns for social integration are quite similar to those that we have already seen for structural and cultural integration, although there are a few important differences, too. The two indicators also exhibit rather similar patterns as each other with respect to ethnic differences but differ with respect to generation.</span></p><p class="mb0" data-dcnode-id="1417"><span data-dcnode-id="1424" instrument_node="">With respect to ethnic group differences, </span><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T7"><span data-dcnode-id="1423" instrument_node="">Table 7</span></a><span data-dcnode-id="1421" instrument_node=""> and </span><a data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F3"><span data-dcnode-id="1420" instrument_node="">Figure 3</span></a><span data-dcnode-id="1418" instrument_node=""> reveal that the European and North American &amp; Australasian groups generally tend to show higher levels of integration than do the non-European groups. On the friendship indicator, however, several of the European groups (and the North American &amp; Australasian group) fall below the autochthonous majority group, with the South-East European being quite similar to the Middle Eastern, North African &amp; Central Asian, Sub-Saharan African, and South &amp; South-East Asian groups in their pattern of co-ethnic friendships (In the case of the South-East European group, it may be relevant that this includes many Muslims such as Bosniaks and Albanians).</span></p><div class="DottedLine" data-dcnode-id="1416"></div><div class="Imageheaders" data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">FIGURE 3</span></div><div class="FigureDesc" data-dcnode-id="1401"><a data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-g003.jpg" name="Figure3" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1413" id="F3" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-g003.gif&amp;raw"></a><p data-dcnode-id="1402"><strong data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">FIGURE 3</span></strong><span data-dcnode-id="1409" instrument_node="">. Adjusted predictions at representative values for social integration indicators with 95% confidence intervals (main effects models). </span><strong data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">(A)</span></strong><span data-dcnode-id="1406" instrument_node=""> no or some minority ethnic minority people in living area; </span><strong data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">(B)</span></strong><span data-dcnode-id="1403" instrument_node=""> no ethnic minority friends.</span></p></div><div class="clear" data-dcnode-id="1400"></div><div class="Imageheaders" data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">TABLE 7</span></div><div class="FigureDesc" data-dcnode-id="1391"><a data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-t007.jpg" name="Table7" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1397" id="T7" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-t007.gif&amp;raw"></a><p data-dcnode-id="1392"><strong data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">TABLE 7</span></strong><span data-dcnode-id="1393" instrument_node="">. Regression models for social integration (main effects models, ESS7 only).</span></p></div><div class="clear" data-dcnode-id="1390"></div><div class="DottedLine" data-dcnode-id="1389"></div><p class="mb0" data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Whether respondents are socially integrated is also significantly related to their generational status. On both indicators the third and higher generations are significantly more likely to be integrated than the first (migrant) generation. The position of the second generation does however differ markedly between the two indicators. In the case of the residential indicator, the second generation is significantly more integrated than the first (as was the case with the structural and cultural indicators), whereas on the friendship indicator the second generation shows little difference from the first generation. This may perhaps indicate a generational lag in the case of social mixing. We therefore conclude that the residential indicator corresponds reasonably well to the straight-line account while the friendship indicator, given the lack of difference between the first and second generations, should perhaps be regarded as consistent with a ‘bumpy line’ account of integration.</span></p><h3 class="pt0" data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Political Integration</span></h3><p class="mb0" data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Turning to political integration, we find a rather different picture from structural, cultural or social integration with an absence of the marked differences between European and non-European groups that were evident for the first three dimensions. In the case of voting, we also find some striking differences in the size of the generational differences.</span></p><p class="mb0" data-dcnode-id="1376"><a data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T8"><span data-dcnode-id="1382" instrument_node="">Table 8</span></a><span data-dcnode-id="1380" instrument_node=""> and </span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F4"><span data-dcnode-id="1379" instrument_node="">Figure 4</span></a><span data-dcnode-id="1377" instrument_node=""> again show the regression results and APRs respectively based on the main effects models (i.e., holding generational differences constant across groups). Here we can see that, for both indicators, there is a rather shallow gradient as we move from European to non-European groups, with the main non-European groups having similar levels of political integration to most of the European groups. While the North American &amp; Australasian group stands out once again in a positive direction, it is notable that neither the Middle Eastern, North African &amp; Central Asian nor the Sub-Saharan African groups stand out in the opposite direction.</span></p><div class="DottedLine" data-dcnode-id="1375"></div><div class="Imageheaders" data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">FIGURE 4</span></div><div class="FigureDesc" data-dcnode-id="1360"><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-g004.jpg" name="Figure4" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1372" id="F4" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-g004.gif&amp;raw"></a><p data-dcnode-id="1361"><strong data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">FIGURE 4</span></strong><span data-dcnode-id="1368" instrument_node="">. Adjusted predictions at representative values for political integration indicators with 95% confidence intervals. </span><strong data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">(A)</span></strong><span data-dcnode-id="1365" instrument_node=""> Voting; </span><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">(B)</span></strong><span data-dcnode-id="1362" instrument_node=""> non-electoral participation.</span></p></div><div class="clear" data-dcnode-id="1359"></div><div class="Imageheaders" data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">TABLE 8</span></div><div class="FigureDesc" data-dcnode-id="1350"><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-t008.jpg" name="Table8" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1356" id="T8" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-t008.gif&amp;raw"></a><p data-dcnode-id="1351"><strong data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">TABLE 8</span></strong><span data-dcnode-id="1352" instrument_node="">. Regression models for political integration (main effects models).</span></p></div><div class="clear" data-dcnode-id="1349"></div><div class="DottedLine" data-dcnode-id="1348"></div><p class="mb0" data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">The generational effects are in contrast rather different across the two indicators: for voting, the 2nd generation is still markedly less likely to vote than the 3rd and higher generations. For non-electoral political participation, the largest progress is achieved by the 2nd generation, with the third generation statistically indistinguishable. The ‘hurdles’ are thus higher for voting than other forms of political participation.</span></p><h3 class="pt0" data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Civic Integration</span></h3><p class="mb0" data-dcnode-id="1333"><span data-dcnode-id="1343" instrument_node="">Finally, we come to our two civic integration indicators – citizenship and national attachment (see </span><a data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T9"><span data-dcnode-id="1342" instrument_node="">Table 9</span></a><span data-dcnode-id="1340" instrument_node=""> and </span><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F5"><span data-dcnode-id="1339" instrument_node="">Figure 5</span></a><span data-dcnode-id="1337" instrument_node="">). As we noted earlier, our measures of model fit showed that, in the case of the citizenship indicator, the model including interaction effects unambiguously yielded a superior fit to the main effects model. However, for consistency with the presentations for the previous dimensions, we begin by the describing the results for the main effects model before turning to predictions from the model with interactions for the citizenship indicator (</span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F5"><span data-dcnode-id="1336" instrument_node="">Figure 5C</span></a><span data-dcnode-id="1334" instrument_node="">).</span></p><div class="DottedLine" data-dcnode-id="1332"></div><div class="Imageheaders" data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">TABLE 9</span></div><div class="FigureDesc" data-dcnode-id="1323"><a data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-t009.jpg" name="Table9" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1329" id="T9" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-t009.gif&amp;raw"></a><p data-dcnode-id="1324"><strong data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">TABLE 9</span></strong><span data-dcnode-id="1325" instrument_node="">. Regression models for civic integration.</span></p></div><div class="clear" data-dcnode-id="1322"></div><div class="Imageheaders" data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">FIGURE 5</span></div><div class="FigureDesc" data-dcnode-id="1304"><a data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-g005.jpg" name="Figure5" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1319" id="F5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-g005.gif&amp;raw"></a><p data-dcnode-id="1305"><strong data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">FIGURE 5</span></strong><span data-dcnode-id="1315" instrument_node="">. Adjusted predictions at representative values for civic integration indicators with 95% confidence intervals. </span><strong data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">(A)</span></strong><span data-dcnode-id="1312" instrument_node=""> citizenship (main effects model); </span><strong data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">(B)</span></strong><span data-dcnode-id="1309" instrument_node=""> national attachment (main effects model); </span><strong data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">(C)</span></strong><span data-dcnode-id="1306" instrument_node=""> citizenship (interaction effects model).</span></p></div><div class="clear" data-dcnode-id="1303"></div><div class="DottedLine" data-dcnode-id="1302"></div><p class="mb0" data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">There are marked differences between the two indicators in the size of the generational differences, which are much more marked in the case of the citizenship indicator than for the attachment indicator. Nevertheless, the two indicators are fairly similar with respect to the ethnic differences, which are relatively small and with no marked difference between the European and non-European groups. Indeed, if anything, the European groups tend to be less integrated on these two indicators than the non-European groups.</span></p><p class="mb0" data-dcnode-id="1295"><span data-dcnode-id="1299" instrument_node="">Moving finally to results for citizenship based on the model including interactions between generation and ethnic group, </span><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F5"><span data-dcnode-id="1298" instrument_node="">Figure 5C</span></a><span data-dcnode-id="1296" instrument_node=""> shows a very striking pattern. As we can clearly see, there are very large generational differences among all but one of the non-autochthonous groups contrasting with negligible generational differences among the autochthonous population. This makes very good theoretical sense, and also illustrates the advantage of our measure of ancestry over conventional measures based on country of birth. Thus first-generation members of the autochthonous group, whom we can broadly equate with returnees, are much more likely to have (or to have acquired) citizenship than are first-generation migrants with non-autochthonous ancestry.</span></p><p class="mb0" data-dcnode-id="1290"><span data-dcnode-id="1294" instrument_node="">The Caribbean exception may well reflect that some Caribbean islands continue to have the citizenship of the previous colonial power, for example the French territories of Guadeloupe, French Guyana and Martinique count as </span><em data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">départements d'Outre mer.</span></em><span data-dcnode-id="1291" instrument_node=""> The former Dutch Antilles, although autonomous in many respects, also continue to belong to the Kingdom of the Netherlands and are therefore somewhat comparable to the French situation.</span></p><h3 class="pt0" data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Robustness Checks</span></h3><p class="mb0" data-dcnode-id="1283"><span data-dcnode-id="1287" instrument_node="">To check whether the results are sensitive to specifications, we ran some robustness checks (results are available in </span><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23SM1"><span data-dcnode-id="1286" instrument_node="">Supplementary Material Appendix A</span></a><span data-dcnode-id="1284" instrument_node="">). Firstly, we checked the robustness of our results from linear probability models using logistic regression models. There were only very few instances of effects that were statistically significant in the linear probability but not in the logistic model - namely the negative effect of the Eastern European group with respect to employment, and the negative effects for the North American &amp; Australasian as well as Eastern Asian groups on the friendship indicator. One negative effect, namely for the Latin American group, only became statistically significant in the logistic model of neighborhood segregation. From this we conclude that it is justifiable to focus on the linear probability models, as we did.</span></p><p class="mb0" data-dcnode-id="1278"><span data-dcnode-id="1282" instrument_node="">As a second robustness check, we constructed a measure of ethnic background based on respondents’ and parents’ countries of birth, classified into the same categories that we have used for ancestry, and re-ran the analyses (figures with APRs for these models are provided in </span><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23SM1"><span data-dcnode-id="1281" instrument_node="">Supplementary Material Appendix C</span></a><span data-dcnode-id="1279" instrument_node="">). As we expected, for most first and second-generation respondents, the two measures are in close alignment, although the ancestry measure also identifies a substantial number of first- and second-generation respondents who report autochthonous ancestry only (many of whom will potentially be returnees). Furthermore, the broad patterns of minority integration using the COB measure are very similar to those reported above. However, the ethnic coefficients with the COB measure are sometimes slightly smaller and less statistically significant. More interestingly, we often find that the COB measure produces a few strange negative coefficients for the autochthonous group together with inflated generational effects. This may be a sign of measurement error in the ethnic origin variable being picked up by the generational status variable.</span></p><a class="reset-hash-position" data-dcnode-id="1277" id="h6" name="h6"></a><h2 data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Discussion</span></h2><p class="mb15" data-dcnode-id="1270"><span data-dcnode-id="1274" instrument_node="">In this paper we have explored ethnic and generational differences in the extent of migrant integration in Western European countries. Regarding ethnic groups, we compared twelve broad panethnic groups with the autochthonous group using a new measure of cultural and ethnic origins (ESCEG) rather than conventional measures based on country of birth. Regarding migrant generations, we compared members of the first, second, and third (including higher) generations. Finally, we compared results across five dimensions of integration which have been prominent in the theoretical literature – structural, cultural, social, political and civic – for each of which we employ two indicators. </span><a data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T10"><span data-dcnode-id="1273" instrument_node="">Table 10</span></a><span data-dcnode-id="1271" instrument_node=""> provides an overview of results.</span></p><div class="DottedLine" data-dcnode-id="1269"></div><div class="Imageheaders" data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">TABLE 10</span></div><div class="FigureDesc" data-dcnode-id="1260"><a data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_m/fsoc-06-510987-t010.jpg" name="Table10" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1266" id="T10" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/510987/fsoc-06-510987-HTML/image_t/fsoc-06-510987-t010.gif&amp;raw"></a><p data-dcnode-id="1261"><strong data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">TABLE 10</span></strong><span data-dcnode-id="1262" instrument_node="">. Summary of patterns of the ethnic origin coefficients - ethnic groups compared to autochthonous.</span></p></div><div class="clear" data-dcnode-id="1259"></div><div class="DottedLine" data-dcnode-id="1258"></div><p class="mb15" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">In a nutshell, our results show that.</span></p><p data-dcnode-id="1254" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1255" instrument_node="">1. There are, at least in the first generation, substantial ethnic differences in structural, cultural and social integration, but smaller ethnic differences on the political and civic dimensions;</span></p><p data-dcnode-id="1252" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1253" instrument_node="">2. There are, within almost all allochthonous ethnic groups, substantial generational differences in integration, with the first generation being markedly less similar to the majority group (third generation autochthonous) than the second and/or third;</span></p><p data-dcnode-id="1250" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1251" instrument_node="">3. Generational patterns of integration do, however, differ across dimensions, with particularly large differences between the first and second generations with respect to citizenship (an indicator of the civic dimension) but little or no difference between the first and second generations with respect to friendship (an indicator of the social dimension).</span></p><p data-dcnode-id="1248" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1249" instrument_node="">4. With one important exception, we find that generational differences are broadly similar across the different ethnic groups. The exception relates to the autochthonous group and the citizenship indicators. Whereas we find generational differences among the autochthonous group with respect to structural, cultural, political and social dimensions, they are negligible with respect to citizenship because the first generation autochthonous have very high rates of citizenship already, compared to the allochthonous groups.</span></p><p class="mb15" data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">In more detail, we find firstly with respect to ethnic differences in integration, that there are substantial overall differences between groups of a European (including North American &amp; Australasian) and those of a non-European background on the structural, cultural and social dimensions. In particular we find that groups with a West European or North American &amp; Australasian background (at least in the first generation) tend to be more advantaged structurally than the majority group in the country of destination, and more liberal culturally too. This is in line with our theoretical expectations, since these groups are ones from highly developed countries with similar democratic histories and liberal cultures. In contrast, the Middle Eastern, North African &amp; Central Asian group together with the Sub-Saharan African group tend to be the most disadvantaged structurally and (together with the South-East European group) the most conservative culturally. The Eastern European group also tends to be somewhat disadvantaged structurally, along with the Caribbean group, and somewhat more conservative culturally. These differences however disappear with the second and/or third generation. While most European groups are not disadvantaged structurally and are as liberal culturally as the autochthonous, lacking social integration, especially on the friendship indicator, affects European groups as well (though to a lesser degree again than culturally more distant or black groups). Our results thus clearly show the benefits of distinguishing between different pan-ethnic groups rather than lumping together all respondents with a migration background, as has been common in some previous research.</span></p><p class="mb15" data-dcnode-id="1238"><span data-dcnode-id="1245" instrument_node="">The similarity of patterns across these three integration domains could well be because of the causal interrelationships between economic resources, residential patterns, and social mixing: economically disadvantaged minorities are more likely to be concentrated in deprived, multi-ethnic neighborhoods where opportunities for mixing with the majority population will be smaller. There may well also be a reciprocal influence, with lack of bridging social capital inhibiting the acquisition of economic resources. These resource-based arguments are unlikely to apply to the cultural dimension to quite the same extent, although lack of bridging social capital may well inhibit acculturation to the norms and values prevailing among the majority group. Perhaps most surprising is thus the similarity between the structural and cultural dimensions, which most other approaches to integration also distinguish. One possibility is that this similarity is driven in part by the important role of fluency in the destination country language for successful integration: language fluency has been shown to be an important driver of migrant economic success (</span><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="1244" instrument_node="">Dustmann, 1994</span></a><span data-dcnode-id="1242" instrument_node="">), and is also likely to be an important factor in exposure to the host-country culture (through the mass media or social contacts). In turn, language acquisition may be facilitated by Western European educational systems. There could also be reciprocal causal relations between economic advance (often related to educational expansion and technological progress) and cultural change. More generally, Inglehart’s research on postmaterialist values has shown that more liberal values are more widespread in more economically advanced societies (</span><a data-dcnode-id="1240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="1241" instrument_node="">Inglehart, 2020</span></a><span data-dcnode-id="1239" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1233"><span data-dcnode-id="1237" instrument_node="">What is striking, however, is that ethnic differences are much less apparent, even among the first generation, in the case of political and civic integration. While the West European and North American &amp; Australasian groups do exhibit rather higher levels of political participation than the other groups (and than the autochthonous), they are however by no means more integrated on the civic dimension than the non-European groups. Indeed, on both indicators of civic integration, the European groups even tend to fall slightly below the non-European. High national attachment of otherwise disadvantaged minorities may in fact serve to compensate for lack of integration on other domains, especially structural and social integration, which also contribute to a sense of belonging. A further potentially important factor is the ease of return. Especially for EU nationals, return to one’s country of origin is straightforward. For highly skilled migrants, too, such as from North America, migration may be a more temporary project, hindering civic integration. Non-EU migrants in contrast make a more substantial investment in migrating and have greater insecurity. Acquisition of citizenship in turn broadly follows the same rules for all groups, in terms of residential and other criteria (see MIPEX, </span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B25"><span data-dcnode-id="1236" instrument_node="">Huddleston et al., 2015</span></a><span data-dcnode-id="1234" instrument_node="">). The right to permanently stay and work in other EU countries however provides less incentive to acquire citizenship for EU nationals. Non-EU migrants also gain more substantial rights by acquiring host country citizenship, explaining their somewhat higher realized access to citizenship.</span></p><p class="mb15" data-dcnode-id="1228"><span data-dcnode-id="1232" instrument_node="">Turning to political integration, the groups that least participate in voting are groups that are otherwise rarely in the highly disadvantaged set: the East Asian as well as South-East and East European (but also Caribbean) groups. In contrast, the otherwise disadvantaged Middle Eastern, North African &amp; Central Asian as well as Sub-Saharan African groups are politically as active as the autochthonous. This is not in line with theoretical expectations, since many of the respective origin countries are not functioning democracies themselves. However, many individuals leaving these countries may have been politically dissatisfied with this very situation, or even have fled for political reasons. Also, those first-generation migrants that are eligible to vote in their destination countries may again be a positively selected group that will already have gone through the process of naturalization, and may be very motivated to take part in the political process. While self-reports of voting are notoriously unreliable, more detailed work in Britain using measures of validated vote has shown that, among those eligible to vote, turnout of disadvantaged minorities is close to that of the autochthonous group (</span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="1231" instrument_node="">Heath et al., 2013</span></a><span data-dcnode-id="1229" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1223"><span data-dcnode-id="1227" instrument_node="">We should therefore take seriously the possibility that integration on the political and civic dimensions is driven by rather different mechanisms than is, for example, the structural dimension. In these integration domains, unlike with structural and social integration, the attitudes and actions of the majority may have less of an impact. In the end, once eligible to vote, voting strongly depends on the individual’s motivation to vote, while friendship, employment and income also depend on other actors, who tend to discriminate against non-white groups (</span><a data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="1226" instrument_node="">Quillian et al., 2019</span></a><span data-dcnode-id="1224" instrument_node="">). Further qualitative research may shed light on the specific reasons for members of different groups to differentially participate in political processes.</span></p><p class="mb15" data-dcnode-id="1218"><span data-dcnode-id="1222" instrument_node="">Secondly, turning to generational differences, it is striking that in most dimensions and indicators, and for most groups, there tend to be large differences of roughly equal size between the first and second generation (with much smaller differences if any between the second and third generations). This applies clearly to the structural, cultural, political and civic dimensions, and to almost all groups alike. The finding of differences between the first and second generations make very good theoretical sense (and have been found in other cross-national studies of structural integration such as </span><a data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="1221" instrument_node="">Heath and Cheung, 2007</span></a><span data-dcnode-id="1219" instrument_node="">): migrants tend to have lower fluency in the destination language, foreign qualifications and human capital and so on. Their children, brought up in the countries of destination, will have made great progress in language fluency and qualifications, and great exposure to norms and values of the destination country. While racism against non-white groups does persist against the second generation, this seems to have the effect of leaving these groups disadvantaged in the second generation, rather than leading to downwards assimilation. Overall, the generational differences observed in our data are consistent with an account of across-the-board progress for all groups alike, with little indication that non-white or non-Christian groups make less progress between the first and second generations. Whether this is a straight-line or bumpy line pattern is less clear. Especially for interethnic friendship, bumpy-line assimilation appears more plausible given the lack of progress of the second generation. Looking at ethnic and generational effects together, on several indicators (e.g., citizenship, voting) approximate parity with the majority group has been achieved by the second generation already for almost all groups, suggesting that generational progress can quickly compensate for initial ethnic disadvantage. For cultural integration, while some ethnic effects are larger than the generational effects, many are also weaker, and even for those groups from starting points quite different from the majority, parity is reached by the third generation. Therefore, for political and cultural integration, the socialization of the individual may play a more important role than group heritage. In contrast, the ethnic effects tend to be substantially larger than the generational coefficients on the structural and especially social dimensions, suggesting that even in the third generation, substantial ethnic differences persist. For social and structural integration, the (lack of) integration responses on the side of the majority may explain the large ethnic as compared to generational effects.</span></p><p class="mb15" data-dcnode-id="1213"><span data-dcnode-id="1217" instrument_node="">Thirdly, the case of friendship (an indicator of social integration) does stand out in our data as anomalous with little difference between the first and second generations. Here the starting point is the same across ethnic groups, so that group effects cannot reflect e.g., economic or cultural differences between the origin and destination country. Other research using more robust measures of social mixing are however in line with our findings. </span><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1216" instrument_node="">Van Tubergen and Smith (2018)</span></a><span data-dcnode-id="1214" instrument_node=""> have studied the friendship patterns of second-generation young people in England, Germany, the Netherlands and Sweden. They found that in all four countries there were strong tendencies towards ethnic homophily among young people and furthermore that in none of the countries did generational status matter for inter-ethnic friendship (p. 17). They attribute this partly to opportunity structures and partly to socialization within the ethnic community. In conclusion, both majority and minority groups contribute to ethnic group closure since the majority is strongly ethnically segregated as well.</span></p><p class="mb15" data-dcnode-id="1205"><span data-dcnode-id="1212" instrument_node="">Finally, a striking result is that generational differences are negligible within the autochthonous population with respect to citizenship, while they are more substantial (and similar to those found among the allochthonous population) with respect to all other indicators. These results make sense if we interpret the autochthonous sample with a migration background as returnees. As the example of </span><em data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">pieds noirs</span></em><span data-dcnode-id="1209" instrument_node=""> returning to France suggests, displacement from one’s foreign home following the territory’s independence may involve serious economic consequences as well as social disruption. It is also plausible that social and cultural attitudes may have evolved somewhat differently among settlers in the foreign territory than they did in the ‘metropole’, especially when the settlement lasted very long. In contrast, returnees would typically have ready access to citizenship in the metropole (and indeed in the case of the </span><em data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">pieds noirs</span></em><span data-dcnode-id="1206" instrument_node=""> would already have citizenship).</span></p><p class="mb15" data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Thus many of our results are consistent with the existing evidence on the integration of migrants in Western European countries while our new findings on the integration of people who might be termed autochthonous returnees make good theoretical sense. Our results also serve to vindicate our use of the new ESS measure of ethnic and cultural origins, in place of the conventional approach (at least in Europe) of using country of birth measures. Our robustness check comparing our results with those for country of birth measures show that our measure provides new insights, both on the third generation (which is invisible with the usual COB method) and on the integration experiences of autochthonous returnees. While defenders of the COB method (e.g., Eurostat) typically argue that it is more ‘objective,’ our robustness check indicates that the COB method does not in fact offer any additional explanatory power or more reliable results than our measure of ethnic and cultural origins.</span></p><p class="mb15" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Our multidimensional approach is also vindicated, showing clearly that ethnic and generational differences vary from one dimension to another. In particular there are striking differences in the ethnic patterns between the structural, cultural and social dimensions on the one hand and the political and civic dimensions on the other hand. Generational patterns also differentiate the social dimension (or at least the friendship indicator) from the structural and cultural dimensions.</span></p><p class="mb15" data-dcnode-id="1196"><span data-dcnode-id="1200" instrument_node="">Perhaps of greatest theoretical interest are the findings on generational differences, and particularly the lack of major interactions between our measure of generational status and of ethnic groups, related to our first research question. Our findings are broadly in line with the idea that ‘generations are the motor of assimilation’ and that it has been the ‘master trend’ among the new postwar immigration in a similar way as it had been among the pre-war immigration of Europeans to the United States. We found no evidence of negative interactions for particular ethnic groups, so that all groups appear to follow the “first path” suggested by Portes and Zhou (</span><a data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1199" instrument_node="">Portes and Zhou, 1993</span></a><span data-dcnode-id="1197" instrument_node="">). The different context of post-war Europe (with replenishment of many migrants groups for example) from that of pre-war USA where there was a marked slowdown on immigration, does not seem to have held back integration, at least on the structural, cultural, political and civic dimensions.</span></p><p class="mb15" data-dcnode-id="1191"><span data-dcnode-id="1195" instrument_node="">Concerning our second research question, we thus do not find signs of downward assimilation, while we do find some entrenched structural and social disadvantage in that the Sub-Saharan African group is not yet fully on par with the autochthonous in the third generation. Since this does not equally apply to the Caribbean group (which is only substantially disadvantaged socially), we cannot conclude that racism is the likely driving force behind this structural ethnic disadvantage. For social integration, racism is more likely a relevant factor with all non-white groups being in the strongly disadvantaged set. Also, we find that the mostly Muslim Middle Eastern, North African &amp; Central Asian group also remains disadvantaged into the third generation on the structural, cultural and social domains, so that cultural distance also likely plays its role. With respect to our third research question, we find two ethnic groups that structurally do not differ from the autochthonous, but remain different culturally and socially to some degree, in line with Portes and Zhou’s suggested “third path”: The South-East European and the South &amp; South-East Asian groups. It is however unclear as yet whether Portes and Zhou’s third pattern of rapid economic advancement combined with deliberate preservation of the immigrant community’s values and internal solidarity is a stable long-term pattern or is more a matter of lagged assimilation on the side of social mixing and attitudes. The relative youth of the ‘new’ second-generation (the children of post-1965 migrants) and the sparsity of third or fourth generations in most destination countries means that we are not yet in the position that enabled </span><a data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1194" instrument_node="">Warner and Srole (1945)</span></a><span data-dcnode-id="1192" instrument_node=""> to trace the assimilation of the Irish in America over four generations.</span></p><p class="mb15" data-dcnode-id="1186"><span data-dcnode-id="1190" instrument_node="">What are then the implications of our findings for segmented assimilation theory? Of the three paths that Portes and Zhou identified, we have found least evidence for downward assimilation in the European context, at least among broad ethnic groups treated as a whole. A more granular analysis than we have been able to conduct might pick up some example of this trajectory, and there are certainly examples across Western Europe of particular second-generation groups some of whose members show disproportionately high rates of school drop-out and subsequent unemployment. But, as we have emphasized, the broad picture is one of improved fortunes among the second generation compared with the first. Our findings do support one important element of segmented assimilation theory though, namely that generational progress may proceed more rapidly on one dimension than another, with friendship lagging behind integration on the other dimensions, at least in the second generation. However, the lack of observed differences between the first and second generations with respect to friendship does seem to operate across-the-board rather than being specific to particular ethnic groups, as in the canonical account of Indian Sikhs (</span><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1189" instrument_node="">Portes and Zhou, 1993</span></a><span data-dcnode-id="1187" instrument_node="">). While we have some misgivings about our indicator for friendship, friendship was the case where we found the least support for interactions between broad ethnic group and generation. Our findings, then, suggest that a rather different account might be needed to explain the similarity across generations, possibly an account based on opportunities for inter-mixing.</span></p><p class="mb15" data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">There are, to be sure, important limitations to the analyses which we have been able to carry out on the ESS data. Firstly, even with pooled data from ESS 7 and 8, sample sizes for the different broad ethnic groups are relatively small. This limits our statistical power to detect interaction effects (though in general, even where non-significant, the signs of the interaction terms for the supposedly disadvantaged groups are positive rather than the negative signs that critics had anticipated). Sample size also limits our ability to undertake more granular analysis of specific ‘narrow’ ethnic groups in particular destination countries. This highlights the importance of unpacking the first digit European group of the ESCEG, and is a strong argument against an over-simplified white/non-white distinction of ethnic groups.</span></p><p class="mb15" data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Secondly, we need to remember that this is cross-sectional data and therefore the first generation are not the actual parents of the second generation, as a strict test of the above-mentioned theories of integration would require. While older members of the first generation could be parents of the second generation, or indeed grandparents of the third generation, this is less likely to hold true for younger members of the first generation. However, controls for age and education should mitigate such problems at least to some degree.</span></p><p class="mb15" data-dcnode-id="1177"><span data-dcnode-id="1181" instrument_node="">Thirdly, this paper could only study the integration of those immigrants speaking the language(s) of the destination country well enough to participate in the ESS to start with (see also </span><a data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="1180" instrument_node="">Fitzgerald et al., 2014</span></a><span data-dcnode-id="1178" instrument_node="">). The ESS requires countries to offer separate language versions of the questionnaire to all language groups exceeding 5% of the population. Any groups speaking a language smaller than that are not covered. Also, even in the absence of language issues, recent migrants are likely underrepresented in the ESS given their higher rates of geographic mobility and thus difficulty to reach them. Survey nonresponse may also generally be higher amongst structurally disadvantaged, socially segregated or politically disengaged populations. We thus expect that the results reported in this paper represent rather conservative estimates.</span></p><p class="mb15" data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Finally, with the pooled sample fixed effects model, we are implicitly assuming that integration outcomes for different groups do not differ across individual countries. Unfortunately, we do not have the statistical power to test whether this assumption is sound. With further rounds of ESS data becoming available, for those integration indicators that were collected in all rounds, more can be done in the near future.</span></p><p class="mb15" data-dcnode-id="1170"><span data-dcnode-id="1174" instrument_node="">Overall, then, our findings tend to be consistent with the idea of assimilation as a ‘master trend’ today in post-war Europe just as it was in pre-war America, although we would wish to emphasize that our data in no way rules out the possibility that this trend may not apply equally well to more specific minority groups. We also need to qualify this ‘master trend’ with the observation that, even after three generations, some broad groups still lag behind on some important dimensions of integration because of the very different ‘starting points’ of the different immigrant groups. Only with respect to citizenship do we find that parity with the (non-migrant) majority group is clearly established across the board (see </span><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F5"><span data-dcnode-id="1173" instrument_node="">Figure 5C</span></a><span data-dcnode-id="1171" instrument_node="">). On other dimensions such as the cultural, social and structural, major disparities exist between the majority (and Western European) groups and the second and third generations from some other backgrounds.</span></p><p class="mb15" data-dcnode-id="1165"><span data-dcnode-id="1169" instrument_node="">Our results clearly need to be replicated in due course, when and if the relevant long-term cohort studies become available. But in the absence of such data, our findings that the different broad ethnic groups show broadly comparable generational differences in integration outcomes is in line with the canonical straight line and bumpy line accounts offered for the pre-war assimilation of European migrants to the United States. In this respect our findings provide a broadly optimistic account of integration in Western Europe. However, with respect to social integration, the outlook is slightly less optimistic given the apparently general tendency for ethnic homophily (</span><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1168" instrument_node="">van Tubergen and Smith, 2018</span></a><span data-dcnode-id="1166" instrument_node="">). Also, in a next step, it would be interesting to look at more specific hypotheses, such as the higher structural disadvantage of Muslim women compared to men.</span></p><p class="mb15" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">We retain an open mind, however, as to whether our list of dimensions and indicators might need to be revised. The most pressing requirement is to obtain more reliable indicators on social integration. In addition to direct measures of interethnic friendship, data on patterns of ethnic intermarriage – a classic indicator of social integration – would strengthen the measurement of this dimension. This would likely require usage of different data, more specifically dedicated to researching immigrant integration, rather than a general population sample like the ESS. The indicators of the cultural dimension also need to be strengthened with direct measures of fluency in the destination-country language (or even further indicators of language use) and with measures of religious affiliation (as well as changes therein) and religiosity. As we noted earlier, language fluency is likely to be important for a range of structural outcomes, while religious affiliation and religiosity may well be important for social and cultural outcomes.</span></p><p class="mb15" data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">As we have demonstrated in this paper, the distinction of socio-cultural groups is a fruitful additional indicator to migrant generation and will, especially in the future, also work better than measures based on country of birth. Such a measure should therefore routinely be included in surveys specifically designed to study processes and outcomes of migrant integration.</span></p><a class="reset-hash-position" data-dcnode-id="1160" id="h7" name="h7"></a><h2 data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Data Availability Statement</span></h2><p class="mb15" data-dcnode-id="1153"><span data-dcnode-id="1157" instrument_node="">The datasets analyzed for this study can be found on the ESS website at </span><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europeansocialsurvey.org/data/"><span data-dcnode-id="1156" instrument_node="">https://www.europeansocialsurvey.org/data/</span></a><span data-dcnode-id="1154" instrument_node="">.</span></p><a class="reset-hash-position" data-dcnode-id="1152" id="h8" name="h8"></a><h2 data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Author Contributions</span></h2><p class="mb0" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">AH took the lead in designing the study and drafted the introduction and theoretical background. SS performed all data preparation and statistical analyses, prepared the results tables and figures and drafted the sections on data and measures. Both authors discussed theory, measurement, analyses and discussion issues, drafted the description of results and discussion together, and read and approved the submitted version.</span></p><a class="reset-hash-position" data-dcnode-id="1147" id="h9" name="h9"></a><h2 data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Conflict of Interest</span></h2><p class="mb0" data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">The authors declare that the research was conducted in the absence of any commercial or financial relationships that could be construed as a potential conflict of interest.</span></p><a class="reset-hash-position" data-dcnode-id="1142" id="h10" name="h10"></a><h2 data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Acknowledgments</span></h2><p class="mb0" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">The authors would like to thank participants of the “Fourth European Social Survey Conference: Turbulent Times in Europe: Instability, Insecurity and Inequality” held in Mannheim in April 2019 for their constructive comments on an earlier version of the paper, as well as the reviewers whose constructive comments helped us strengthening the paper.</span></p><a class="reset-hash-position" data-dcnode-id="1137" id="h11" name="h11"></a><h2 data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Supplementary Material</span></h2><p class="mb15" data-dcnode-id="1130" id="SM1"><span data-dcnode-id="1134" instrument_node="">The Supplementary Material for this article can be found online at: </span><a data-dcnode-id="1132" href="#supplementary-material"><span data-dcnode-id="1133" instrument_node="">https://www.frontiersin.org/articles/10.3389/fsoc.2021.510987/full#supplementary-material</span></a><spa
