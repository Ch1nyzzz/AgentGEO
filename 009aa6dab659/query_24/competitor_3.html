n data-dcnode-id="1131" instrument_node="">.</span></p><a class="reset-hash-position" data-dcnode-id="1129" id="h12" name="h12"></a><h2 data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Footnotes</span></h2><p class="editor" data-dcnode-id="1120"><sup data-dcnode-id="1124"><a class="color1" data-dcnode-id="1125" id="fn1"><span data-dcnode-id="1126" instrument_node="">1</span></a></sup><span data-dcnode-id="1123" instrument_node="">The ESS website has an excellent overview of its content and methodology and offers the data for download for free: </span><a data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.europeansocialsurvey.org/"><span data-dcnode-id="1122" instrument_node="">www.europeansocialsurvey.org</span></a></p><p class="editor" data-dcnode-id="1115"><sup data-dcnode-id="1117"><a class="color1" data-dcnode-id="1118" id="fn2"><span data-dcnode-id="1119" instrument_node="">2</span></a></sup><span data-dcnode-id="1116" instrument_node="">The only Western European country not included in ESS rounds 7 and 8 is thus Luxembourg.</span></p><p class="editor" data-dcnode-id="1104"><sup data-dcnode-id="1112"><a class="color1" data-dcnode-id="1113" id="fn3"><span data-dcnode-id="1114" instrument_node="">3</span></a></sup><span data-dcnode-id="1111" instrument_node="">For ancestries that could be both autochthonous or allochthonous (e.g., Germans in Belgium or Slovaks in Czechia), these were coded as allochthonous if the autochthonous group is very small. Roma and Jews are coded as autochthonous if they are not 1st or 2nd generation migrants. In contrast to </span><a data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="1110" instrument_node="">Heath et al. (2016)</span></a><span data-dcnode-id="1108" instrument_node=""> and </span><a data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="1107" instrument_node="">Schneider and Heath (2019)</span></a><span data-dcnode-id="1105" instrument_node="">, for this paper those of mixed autochthonous/allochthonous ancestry are assigned to the allochthonous group, rather than the autochthonous group. Those mentioning West European and other European ancestry were coded into the respective other European ancestry. For other European combinations, preference was given in the following order, reflecting cultural distance from the Western European group: South-East European, East European, South European, and North European. Otherwise, the first mentioned ancestry was given preference over the second mentioned one for those who indicated two different allochthonous ancestries.</span></p><p class="editor" data-dcnode-id="1096"><sup data-dcnode-id="1101"><a class="color1" data-dcnode-id="1102" id="fn4"><span data-dcnode-id="1103" instrument_node="">4</span></a></sup><span data-dcnode-id="1100" instrument_node="">This number is higher than expected, probably reflecting both social desirability bias when responding to this question (despite the normalization statement at the beginning of the question), as well as nonresponse bias (since non-voters are also less likely to participate in surveys), which may also affect the non-electoral political participation measure (</span><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1099" instrument_node="">Peress, 2010</span></a><span data-dcnode-id="1097" instrument_node="">).</span></p><a class="reset-hash-position" data-dcnode-id="1095" id="h13" name="h13"></a><h2 data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">References</span></h2><div class="References" data-dcnode-id="1077"><p class="ReferencesCopy1" data-dcnode-id="1087"><a data-dcnode-id="1092" id="B1" name="B1"></a><span data-dcnode-id="1091" instrument_node="">Alba, R., and Nee, V. (1997). Rethinking assimilation theory for a new era of immigration. </span><em data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Int. Migr. Rev.</span></em><span data-dcnode-id="1088" instrument_node=""> 31 (4), 826–874. doi:10.2307/2547416 </span></p><p class="ReferencesCopy2" data-dcnode-id="1078"><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/12293207/"><span data-dcnode-id="1086" instrument_node="">PubMed Abstract</span></a><span data-dcnode-id="1084" instrument_node=""> | </span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.2307/2547416"><span data-dcnode-id="1083" instrument_node="">CrossRef Full Text</span></a><span data-dcnode-id="1081" instrument_node=""> | </span><a data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fhl%3Den%26as_sdt%3D0%252C5%26q%3DRethinking%2Bassimilation%2Btheory%2Bfor%2Ba%2Bnew%2Bera%2Bof%2Bimmigration%26btnG%3D"><span data-dcnode-id="1080" instrument_node="">Google Scholar</span></a></p></div><div class="References" data-dcnode-id="1067"><p class="ReferencesCopy1" data-dcnode-id="1068"><a data-dcnode-id="1076" id="B3" name="B3"></a><span data-dcnode-id="1075" instrument_node="">Atkinson, A. B., Hasell, J., Morelli, S., and Roser, M. (2017). </span><em data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">The chartbook of economic inequality</span></em><span data-dcnode-id="1072" instrument_node="">. Oxford: </span><span class="publisher-name" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Institute for New Economic Thinking at the Oxford Martin School</span></span><span data-dcnode-id="1069" instrument_node="">.</span></p></div><div class="References" data-dcnode-id="1054"><p class="ReferencesCopy1" data-dcnode-id="1061"><a data-dcnode-id="1066" id="B4" name="B4"></a><span data-dcnode-id="1065" instrument_node="">Bloemraad, I., and Wright, M. (2014). “Utter failure” or unity out of diversity? Debating and evaluating policies of multiculturalism. </span><em data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Int. Migr. Rev.</span></em><span data-dcnode-id="1062" instrument_node=""> 48 (1_Suppl. l), 292–334. doi:10.1111/imre.12135</span></p><p class="ReferencesCopy2" data-dcnode-id="1055"><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1111/imre.12135"><span data-dcnode-id="1060" instrument_node="">CrossRef Full Text</span></a><span data-dcnode-id="1058" instrument_node=""> | </span><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fhl%3Den%26as_sdt%3D0%252C5%26q%3DUtter%2Bfailure%2Bor%2Bunity%2Bout%2Bof%2Bdiversity%3F%2BDebating%2Band%2Bevaluating%2Bpolicies%2Bof%2Bmulticulturalism%26btnG%3D"><span data-dcnode-id="1057" instrument_node="">Google Scholar</span></a></p></div><div class="References" data-dcnode-id="1041"><p class="ReferencesCopy1" data-dcnode-id="1048"><a data-dcnode-id="1053" id="B5" name="B5"></a><span data-dcnode-id="1052" instrument_node="">Breen, R., Karlson, K. B., and Holm, A. (2018). Interpreting and understanding logits, probits, and other nonlinear probability models. </span><em data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Annu. Rev. Sociol.</span></em><span data-dcnode-id="1049" instrument_node=""> 44 (1), 39–54. doi:10.1146/annurev-soc-073117-041429</span></p><p class="ReferencesCopy2" data-dcnode-id="1042"><a data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1146/annurev-soc-073117-041429"><span data-dcno
