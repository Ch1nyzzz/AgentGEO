</span><p data-dcnode-id="1929"><span data-dcnode-id="1933" instrument_node="">Migrant integration has gained prominence on the global agenda with the advent of the&nbsp;</span><a data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//migrationdataportal.org/sdg%230"><span data-dcnode-id="1932" instrument_node="">2030 Sustainable Development Agenda’s</span></a><span data-dcnode-id="1930" instrument_node="">&nbsp;call to “leave no one behind”—including migrants. The field of migrant integration, however, has traditionally been polarizing and related data are generally limited to high-income countries. The increased interest in migrant integration highlights the need for more research and better data.&nbsp;</span></p><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Integration cuts across different policies and various aspects of migrants’ lives and therefore data on migrant integration cover a wide range of information, including whether migrants are integrating into the economic, social, cultural, and political spheres of society, the discrimination they face, how policies affect migrants’ inclusion, and how the public perceives migrants and immigration.</span></p><span data-dcnode-id="1925" instrument_node="">
</span></div><span data-dcnode-id="1923" instrument_node="">
</span><div class="full-content node-content wiki-content field__body" data-dcnode-id="1413"><span data-dcnode-id="1922" instrument_node="">

</span><div class="toc-filter" data-dcnode-id="1417"><p data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">
</span></p><p data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">
</span></p><h2 data-dcnode-id="1912" id="definition" name="definition"><span data-dcnode-id="1913" instrument_node="">Definition</span></h2><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1910"></p><span data-dcnode-id="1909" instrument_node="">
</span><div class="embedded-entity align-left" data-dcnode-id="1885" data-embed-button="content" data-entity-embed-display="view_mode:node.embedded" data-entity-embed-display-settings="[]" data-entity-type="node" data-entity-uuid="cdb023a9-22e4-40f9-8eb9-919349a3e4e2" data-langcode="en"><span data-dcnode-id="1908" instrument_node="">

</span><div class="image-embedded-wo-body field__image" data-dcnode-id="1897"><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1899"><a class="colorbox cboxElement" data-cbox-img-attrs="{&quot;alt&quot;:&quot;Migrant integration&quot;}" data-colorbox-gallery="" data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.migrationdataportal.org/sites/g/files/tmzbdl251/files/2017-11/Measuring%2520migrant%2520integration_20.11.2017%2520FINAL.png" title="<a href=&quot;https://www.migrationdataportal.org/sites/g/files/tmzbdl251/files/2017-11/Measuring%20migrant%20integration_20.11.2017%20FINAL.png&quot; download>Download</a>"><img alt="Migrant integration" class="image-style-embedded-845" data-dcnode-id="1901" height="610" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.migrationdataportal.org/sites/g/files/tmzbdl251/files/styles/embedded_845/public/2017-11/Measuring%2520migrant%2520integration_20.11.2017%2520FINAL.png%3Fitok%3Di3fa57sf&amp;raw" typeof="foaf:Image" width="826"></a></p><span data-dcnode-id="1898" instrument_node="">
</span></div><span data-dcnode-id="1896" instrument_node="">
</span></div><span data-dcnode-id="1894" instrument_node="">

</span><h2 data-dcnode-id="1881" id="definition"><a data-dcnode-id="1882" id="definition" name="definition"><span data-dcnode-id="1883" instrument_node="">Definition</span></a></h2><span data-dcnode-id="1880" instrument_node="">
</span><p data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">There is no consensus on a single definition for integration. Definitions share commonalities, but remain highly context or country specific. Nevertheless, migrant integration may be broadly defined as:&nbsp;</span></p><span data-dcnode-id="1877" instrument_node="">
</span><blockquote data-dcnode-id="1869"><dl data-dcnode-id="1870"><dt data-dcnode-id="1872"><span data-dcnode-id="1876" instrument_node="">The process by which migrants become accepted into society, both as individuals and as groups….[Integration] refers to a two-way process of adaptation by migrants and host societies…[and implies] consideration of the rights and obligations of migrants and host societies, of access to different kinds of services and the labour market, and of identification and respect for a core set of values that bind migrants and host communities in a common purpose (</span><a data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.epim.info/wp-content/uploads/2011/01/iom.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1875" instrument_node="">IOM, 2011</span></a><span data-dcnode-id="1873" instrument_node="">).&nbsp;&nbsp;</span></dt><span data-dcnode-id="1871" instrument_node="">
</span></dl></blockquote><span data-dcnode-id="1868" instrument_node="">
</span><dl data-dcnode-id="1867"></dl><p data-dcnode-id="1862"><span data-dcnode-id="1866" instrument_node="">Related concepts include social inclusion and social cohesion. Social inclusion refers to migrants’ inclusion and full economic, social, cultural, and political participation into host communities. Social cohesion refers to concepts such as anti-discrimination, countering xenophobia and promoting mutual understanding (</span><a data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iom.int/sites/default/files/our_work/ODG/GCM/IOM-Thematic-Paper-Integration-and-Social-Cohesion.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1865" instrument_node="">IOM, 2017</span></a><span data-dcnode-id="1863" instrument_node="">).</span></p><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1856"><span data-dcnode-id="1860" instrument_node="">Integration occurs in the public and private realms, across generations, and at the individual, family, community and national levels&nbsp;</span><a data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.consilium.europa.eu/uedocs/cms_data/docs/pressdata/en/jha/82745.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1859" instrument_node="">(EU Council, 2004)</span></a><span data-dcnode-id="1857" instrument_node="">.&nbsp;Some typical indications of successful migrant&nbsp;&nbsp;integration are the decrease of the&nbsp;differences between migrants and non-migrants according to&nbsp;data on&nbsp;employment, education, health and social inclusion, among other areas.</span></p><span data-dcnode-id="1855" instrument_node="">
</span><div class="recent-trends" data-dcnode-id="1832"><span data-dcnode-id="1854" instrument_node="">
</span><div class="recent-trends__title" data-dcnode-id="1849"><span data-dcnode-id="1853" instrument_node="">
</span><h3 data-dcnode-id="1851" id="key-trends"><span data-dcnode-id="1852" instrument_node="">Key trends</span></h3><span data-dcnode-id="1850" instrument_node="">
</span></div><span data-dcnode-id="1848" instrument_node="">
</span><div class="recent-trends__body" data-dcnode-id="1834"><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1836"><span data-dcnode-id="1846" instrument_node="">It is difficult to identify a trend on migrant integration at the global level in part because research on the topic is recent and has largely been limited to high-income countries or regions. For example, more robust research exists for countries in the&nbsp;Organisation for Economic Co-Operation and Development&nbsp;(OECD). Research on OECD countries shows that migrants in most countries have on average worse outcomes than the native-born population in areas such as education attainment and labour market participation (</span><a data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oecd.org/publications/indicators-of-immigrant-integration-2015-settling-in-9789264234024-en.htm" rel="noopener" target="_blank"><span data-dcnode-id="1845" instrument_node="">OECD, 2015</span></a><span data-dcnode-id="1843" instrument_node="">). This is interpreted as a sign of persisting barriers to effective integration. Integration outcomes depend on many factors including the country of origin, the host community context and the skill level of immigrants. Integration tends to improve with the duration of residence in most countries&nbsp;according to available&nbsp;data (</span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oecd.org/publications/indicators-of-immigrant-integration-2015-settling-in-9789264234024-en.htm" rel="noopener" target="_blank"><span data-dcnode-id="1842" instrument_node="">OECD, 2015</span></a><span data-dcnode-id="1840" instrument_node="">;&nbsp;</span><a data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/migrant-integration/librarydoc/using-eu-indicators-of-immigrant-integration" rel="noopener" target="_blank"><span data-dcnode-id="1839" instrument_node="">Huddleston et al., 2013</span></a><span data-dcnode-id="1837" instrument_node="">).</span></p><span data-dcnode-id="1835" instrument_node="">
</span></div><span data-dcnode-id="1833" instrument_node="">
</span></div><span data-dcnode-id="1831" instrument_node="">
</span><a class="back-to-top" data-dcnode-id="1829" href="#top"><span data-dcnode-id="1830" instrument_node="">Back to top</span></a><span data-dcnode-id="1828" instrument_node="">
</span><h2 data-dcnode-id="1826" id="data-sources"><span data-dcnode-id="1827" instrument_node="">Data sources</span></h2><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">The main sources for migrant integration data are censuses and household surveys, particularly labour force surveys and living conditions surveys. These sources contain data that can be used to measure migrant integration across a range of areas. Key areas include:</span></p><span data-dcnode-id="1822" instrument_node="">
</span><ul data-dcnode-id="1789"><li data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Labour market (for example, employment rates, wages or income, occupation, activity rate and over qualification rate);</span></li><span data-dcnode-id="1819" instrument_node="">
</span><li data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Education (for example, highest level of education attainment, dropout rate, grades and skills);</span></li><span data-dcnode-id="1816" instrument_node="">
</span><li data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Health (for example, healthy life years and life expectancy);&nbsp;&nbsp;</span></li><span data-dcnode-id="1813" instrument_node="">
</span><li data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Social inclusion (for example, property ownership, housing cost overburden, child poverty and social exclusion)&nbsp;&nbsp;</span></li><span data-dcnode-id="1810" instrument_node="">
</span><li data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Civic inclusion/engagement (for example, voting rights, representation in the political arena, public employment, naturalization rate, share of long-term residence and volunteering);</span></li><span data-dcnode-id="1807" instrument_node="">
</span><li data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Cultural inclusion (for example, customs, traditions, language and religion);&nbsp;</span></li><span data-dcnode-id="1804" instrument_node="">
</span><li data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">Financial inclusion (for example, banking, savings, credit, insurance and advice);</span></li><span data-dcnode-id="1801" instrument_node="">
</span><li data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Spatial inclusion (for example, residential segregation by&nbsp;socio-economic status);</span></li><span data-dcnode-id="1798" instrument_node="">
</span><li data-dcnode-id="1794"><a data-dcnode-id="1796" href="file:///D:/01%20individual%20pages/Public%20Opinion/thematic%20page_public%20opinion_001_JT%20SM.docx"><span data-dcnode-id="1797" instrument_node="">Public opinion</span></a><span data-dcnode-id="1795" instrument_node="">&nbsp;(for example, ability to integrate highly heterogeneous and culturally diverse group of people); and</span></li><span data-dcnode-id="1793" instrument_node="">
</span><li data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Role of media (for example, inclusion and diversity in public service media).</span></li><span data-dcnode-id="1790" instrument_node="">
</span></ul><p data-dcnode-id="1775"><span data-dcnode-id="1788" instrument_node="">(</span><a data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ec.europa.eu/eurostat/documents/3888793/5849845/KS-RA-11-009-EN.PDF" rel="noopener" target="_blank"><span data-dcnode-id="1787" instrument_node="">Eurostat, 2011</span></a><span data-dcnode-id="1785" instrument_node="">;&nbsp;</span><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/migrant-integration/librarydoc/using-eu-indicators-of-immigrant-integration" rel="noopener" target="_blank"><span data-dcnode-id="1784" instrument_node="">Huddleston et al., 2013</span></a><span data-dcnode-id="1782" instrument_node="">;&nbsp;</span><a data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//citiesofmigration.ca/building-inclusive-cities/civic-inclusion/" rel="noopener" target="_blank"><span data-dcnode-id="1781" instrument_node="">Cities of Migration, 2010</span></a><span data-dcnode-id="1779" instrument_node="">&nbsp;and&nbsp;</span><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oecd.org/migration/indicators-of-immigrant-integration-2015-settling-in-9789264234024-en.htm" rel="noopener" target="_blank"><span data-dcnode-id="1778" instrument_node="">OECD, 2015</span></a><span data-dcnode-id="1776" instrument_node="">)&nbsp;</span></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Administrative sources also provide information such as citizenship and long-term residence status, which can indicate migrants’ civic engagement and political participation.</span></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1760"><span data-dcnode-id="1770" instrument_node="">Public opinion polls or surveys are additional sources that measure attitudes of host societies towards immigration (</span><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publications.iom.int/books/how-world-views-migration" rel="noopener" target="_blank"><span data-dcnode-id="1769" instrument_node="">IOM, 2015</span></a><span data-dcnode-id="1767" instrument_node="">). For example, the Gallup World Poll also provides insight into&nbsp;people’s views on immigration. Among the questions the Poll asks people are whether immigration levels should change in their countries and whether they think immigrants mostly take jobs that citizens do or do not want. Analysis and findings from these Gallup World Poll questions are presented in IOM’s report&nbsp;</span><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//publications.iom.int/system/files/how_the_world_gallup.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1766" instrument_node="">How the World Views Migration.</span></a><span data-dcnode-id="1764" instrument_node="">&nbsp;In addition,&nbsp;</span><a data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.citiesofmigration.org/" rel="noopener" target="_blank"><span data-dcnode-id="1763" instrument_node="">My city of Migration</span></a><span data-dcnode-id="1761" instrument_node="">&nbsp;(MyCOM) is a diagnostic web app that uses simple scenarios to evaluate the level of inclusion in five modules: as a new arrival, at school, at work, in health and on election day. Based on these modules, the MyCOM diagnostic tool provides elaborate information on “my” city’s diversity and inclusion.</span></p><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1758" instrument_node="">Surveys of migrants’ experiences or sometimes field experiments also measure discrimination, an obstacle for migrant integration (</span><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fra.europa.eu/en/project/2015/eu-midis-ii-european-union-minorities-and-discrimination-survey" rel="noopener" target="_blank"><span data-dcnode-id="1757" instrument_node="">EU-MIDIS, 2015</span></a><span data-dcnode-id="1755" instrument_node="">;&nbsp;</span><a data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oecd-ilibrary.org/social-issues-migration-health/international-migration-outlook-2013/discrimination-against-immigrants-measurement-incidence-and-policy-instruments_migr_outlook-2013-7-en" rel="noopener" target="_blank"><span data-dcnode-id="1754" instrument_node="">Heath et al. 2013</span></a><span data-dcnode-id="1752" instrument_node="">;&nbsp;</span><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.immigrantsurvey.org/" rel="noopener" target="_blank"><span data-dcnode-id="1751" instrument_node="">MPG 2011</span></a><span data-dcnode-id="1749" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="1747" instrument_node="">
</span><p data-dcnode-id="1739"><span data-dcnode-id="1746" instrument_node="">Additional data sources include studies and indices that measure&nbsp;</span><a data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mipex.eu/what-is-mipex" rel="noopener" target="_blank"><span data-dcnode-id="1745" instrument_node="">migrant integration policies</span></a><span data-dcnode-id="1743" instrument_node="">&nbsp;by comparing the laws that govern migrant integration across countries (</span><a data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mipex.eu/" rel="noopener" target="_blank"><span data-dcnode-id="1742" instrument_node="">Huddleston et al., 2015</span></a><span data-dcnode-id="1740" instrument_node="">).</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Several specific sources have consolidated and analyzed data on migrant integration at the global or regional level. Some examples include:</span></p><span data-dcnode-id="1735" instrument_node="">
</span><ul data-dcnode-id="1674"><li data-dcnode-id="1729"><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oecd.org/publications/indicators-of-immigrant-integration-2015-settling-in-9789264234024-en.htm" rel="noopener" target="_blank"><span data-dcnode-id="1734" instrument_node="">The European Commission and OECD</span></a><span data-dcnode-id="1732" instrument_node="">&nbsp;consolidated data on key integration indicators across all European Union (EU) and OECD countries, with a focus on third country nationals in the European Union, and young people with an immigrant background.&nbsp;</span><br data-dcnode-id="1731"><span data-dcnode-id="1730" instrument_node="">
	&nbsp;</span></li><span data-dcnode-id="1728" instrument_node="">
</span><li data-dcnode-id="1722"><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ec.europa.eu/eurostat/documents/3888793/5849845/KS-RA-11-009-EN.PDF" rel="noopener" target="_blank"><span data-dcnode-id="1727" instrument_node="">Eurostat</span></a><span data-dcnode-id="1725" instrument_node="">&nbsp;examined survey data on migrant’s employment, education, social inclusion and civic participation to compare integration across EU countries.&nbsp;&nbsp;</span><br data-dcnode-id="1724"><span data-dcnode-id="1723" instrument_node="">
	&nbsp;</span></li><span data-dcnode-id="1721" instrument_node="">
</span><li data-dcnode-id="1715"><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mipex.eu/what-is-mipex" rel="noopener" target="_blank"><span data-dcnode-id="1720" instrument_node="">The Migration Integration Policy Index</span></a><span data-dcnode-id="1718" instrument_node="">&nbsp;(MIPEX)&nbsp;measures migrant integration policies across EU Member States, Australia, Canada, Iceland, Japan, Republic of Korea, New Zealand, Norway, Switzerland, Turkey and the United States.</span><br data-dcnode-id="1717"><span data-dcnode-id="1716" instrument_node="">
	&nbsp;</span></li><span data-dcnode-id="1714" instrument_node="">
</span><li data-dcnode-id="1705"><a data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gmdac.iom.int/migration-governance-indicators" rel="noopener" target="_blank"><span data-dcnode-id="1713" instrument_node="">The Migration Governance Indicators (MGI)</span></a><span data-dcnode-id="1711" instrument_node="">, which provides a framework for countries’ migration governance, assesses the performance of almost 40 countries across 6 dimensions of&nbsp;</span><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//governingbodies.iom.int/system/files/en/council/106/C-106-RES-1310%2520MIGOF.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1710" instrument_node="">IOM’s Migration Governance Framework</span></a><span data-dcnode-id="1708" instrument_node="">, of which one relates to socio-economic well-being&nbsp;of migrants.</span><br data-dcnode-id="1707"><span data-dcnode-id="1706" instrument_node="">
	&nbsp;</span></li><span data-dcnode-id="1704" instrument_node="">
</span><li data-dcnode-id="1698"><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publications.iom.int/system/files/pdf/wmr2013_en.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1703" instrument_node="">IOM’s 2013 World Migration Report</span></a><span data-dcnode-id="1701" instrument_node="">&nbsp;presents Gallup World Poll&nbsp;data on migrants’ well-being in over 150 countries, and provides information on migrant integration in low-income countries, an understudied area.</span><br data-dcnode-id="1700"><span data-dcnode-id="1699" instrument_node="">
	&nbsp;</span></li><span data-dcnode-id="1697" instrument_node="">
</span><li data-dcnode-id="1690"><span data-dcnode-id="1696" instrument_node="">International Migration, Integration and Social Cohesion (</span><a data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imiscoe.org/about-imiscoe" rel="noopener" target="_blank"><span data-dcnode-id="1695" instrument_node="">IMISCOE</span></a><span data-dcnode-id="1693" instrument_node="">)&nbsp;is Europe’s network of scholars in the domain of migration, integration and diversity studies. It plays crucial role in building a bridge between researchers, policymakers and civil society organisations by bringing them together into the IMISCOE conference on an annual basis.&nbsp;</span><br data-dcnode-id="1692"><span data-dcnode-id="1691" instrument_node="">
	&nbsp;</span></li><span data-dcnode-id="1689" instrument_node="">
</span><li data-dcnode-id="1682"><span data-dcnode-id="1688" instrument_node="">The Centre on Migration, Policy, and Society (</span><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.compas.ox.ac.uk/research/topic/integration/" rel="noopener" target="_blank"><span data-dcnode-id="1687" instrument_node="">COMPAS</span></a><span data-dcnode-id="1685" instrument_node="">)&nbsp;is a research centre that develops theory, produces knowledge, informs policy making/public debate and engages users of data in the field of migration. The migration-integration nexus is one of the core areas of research of COMPAS.</span><br data-dcnode-id="1684"><span data-dcnode-id="1683" instrument_node="">
	&nbsp;</span></li><span data-dcnode-id="1681" instrument_node="">
</span><li data-dcnode-id="1676"><span data-dcnode-id="1680" instrument_node="">The&nbsp;</span><a data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.migrationpolicy.org/programs/national-center-immigrant-integration-policy" rel="noopener" target="_blank"><span data-dcnode-id="1679" instrument_node="">Migration Policy Institute’s National Centre on Immigrant Integration Policy</span></a><span data-dcnode-id="1677" instrument_node="">&nbsp;is a platform for government officials, non-profit organizations, educators, journalists, researchers, local service providers and others, who seek to respond to the challenges and opportunities of immigrants’ integration in local communities the United States and Europe.</span></li><span data-dcnode-id="1675" instrument_node="">
</span></ul><span data-dcnode-id="1673" instrument_node="">
</span><a class="back-to-top" data-dcnode-id="1671" href="#top"><span data-dcnode-id="1672" instrument_node="">Back to top</span></a><span data-dcnode-id="1670" instrument_node="">
</span><h2 data-dcnode-id="1668" id="data-strengths-amp-limitations"><span data-dcnode-id="1669" instrument_node="">Data strengths &amp; limitations</span></h2><span data-dcnode-id="1667" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="1665" style="margin-bottom:0cm;margin-bottom:.0001pt"><span data-dcnode-id="1666" instrument_node="">The international bodies or organisations and research community that have consolidated and analysed data at the global or regional level have substantially advanced the study of integration. These data allow for an understanding of how immigrants fare in high-income countries and have facilitated the exchange of good practices between countries. </span></p><span data-dcnode-id="1664" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="1663" style="margin-bottom:0cm;margin-bottom:.0001pt"></p><span data-dcnode-id="1662" instrument_node="">
</span><p data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1659" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">However, data on migrant integration have the following limitations:</span></p><span data-dcnode-id="1656" instrument_node="">
</span><ul data-dcnode-id="1580"><li class="MsoNormal" data-dcnode-id="1651"><span data-dcnode-id="1654" lang="EN-GB" xml:lang="EN-GB"><span data-dcnode-id="1655" instrument_node="">Most international studies on migrant integration are based on national surveys. In some countries, immigrants are a small population. As a result, it is not always easy to ensure that data reflect characteristics of this particular group.</span></span><br data-dcnode-id="1653"><span data-dcnode-id="1652" instrument_node="">
	&nbsp;</span></li><span data-dcnode-id="1650" instrument_node="">
</span><li class="MsoNormal" data-dcnode-id="1641"><span data-dcnode-id="1644" lang="EN-GB" xml:lang="EN-GB"><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Available data on integration only cover a limited number of countries.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1645"></p></span><br data-dcnode-id="1643"><span data-dcnode-id="1642" instrument_node="">
	&nbsp;</span></li><span data-dcnode-id="1640" instrument_node="">
</span><li class="MsoNormal" data-dcnode-id="1632"><span data-dcnode-id="1637" lang="EN-GB" xml:lang="EN-GB"><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1638"></p></span><span data-dcnode-id="1635" lang="EN-GB" xml:lang="EN-GB"><span data-dcnode-id="1636" instrument_node="">As with all international comparisons, concepts and definitions are not always standardised across countries. For example, countries may have different concepts of who counts as a migrant. In addition, the idea of what “successful” integration means varies from country to country.</span></span><br data-dcnode-id="1634"><span data-dcnode-id="1633" instrument_node="">
	&nbsp;</span></li><span data-dcnode-id="1631" instrument_node="">
</span><li class="MsoNormal" data-dcnode-id="1627"><span data-dcnode-id="1628" lang="EN-GB" xml:lang="EN-GB"><span data-dcnode-id="1630" instrument_node="">Relying on gaps between migrants and non-migrants as the key measurement of integration has drawbacks. For example, if the situation of nationals improves at a faster rate than that of migrants, integration may seem to worsen despite the fact that migrants are also doing better.

</span><p data-dcnode-id="1629"></p></span></li><span data-dcnode-id="1626" instrument_node="">
</span><li class="MsoNormal" data-dcnode-id="1600"><span data-dcnode-id="1624" lang="EN-GB" xml:lang="EN-GB"><span data-dcnode-id="1625" instrument_node="">Simple comparisons and neglecting that migrant discrimination may be based </span></span><span data-dcnode-id="1622" lang="EN-GB" style="mso-fareast-font-family:&quot;Times New Roman&quot;;mso-bidi-font-family:&quot;Times New Roman&quot;" xml:lang="EN-GB"><span data-dcnode-id="1623" instrument_node="">on more than being a migrant</span></span><span data-dcnode-id="1614" lang="EN-GB" xml:lang="EN-GB"><span data-dcnode-id="1621" instrument_node=""> hide the fact that there are many factors influencing migrant integration. </span><span data-dcnode-id="1619" style="mso-spacerun:yes"><span data-dcnode-id="1620" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1618" instrument_node="">For example, a migrant may be discriminated against for being a migrant, </span><i data-dcnode-id="1616" style="mso-bidi-font-style:normal"><span data-dcnode-id="1617" instrument_node="">and</span></i><span data-dcnode-id="1615" instrument_node=""> also </span></span><span data-dcnode-id="1612" lang="EN-GB" style="mso-fareast-font-family:&quot;Times New Roman&quot;;
mso-bidi-font-family:&quot;Times New Roman&quot;" xml:lang="EN-GB"><span data-dcnode-id="1613" instrument_node="">on the basis of their sex/gender, religion, age or ethnicity</span></span><span data-dcnode-id="1610" style="mso-fareast-font-family:&quot;Times New Roman&quot;;
mso-bidi-font-family:&quot;Times New Roman&quot;;mso-ansi-language:EN-US"><span data-dcnode-id="1611" instrument_node="">, among others.</span></span><span data-dcnode-id="1608" style="mso-fareast-font-family:&quot;Times New Roman&quot;;mso-bidi-font-family:&quot;Times New Roman&quot;"><span data-dcnode-id="1609" instrument_node=""> </span></span><span data-dcnode-id="1603" lang="EN-GB" xml:lang="EN-GB"><span data-dcnode-id="1607" instrument_node="">Comparisons between countries are complex given that each country has its own policies and history of migration (</span><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ec.europa.eu/migrant-integration/librarydoc/using-eu-indicators-of-immigrant-integration" rel="noopener" target="_blank"><span data-dcnode-id="1606" instrument_node="">Huddleston et al., 2013</span></a><span data-dcnode-id="1604" instrument_node="">). Countries may host very diverse migrant communities and policies affecting integration may vary considerably.</span></span><br data-dcnode-id="1602"><span data-dcnode-id="1601" instrument_node="">
	&nbsp;</span></li><span data-dcnode-id="1599" instrument_node="">
</span><li class="MsoNormal" data-dcnode-id="1582"><span data-dcnode-id="1594" lang="EN-GB" xml:lang="EN-GB"><span data-dcnode-id="1598" instrument_node="">Although measuring migrant integration policies is informative, selected data and indices reflect policy priorities and choices about whether a policy is relevant to integration, and whether good integration policies actually lead to better outcomes for migrants. </span><span data-dcnode-id="1596" style="mso-spacerun:yes"><span data-dcnode-id="1597" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1595" instrument_node="">Some existing data sources, such as </span></span><span data-dcnode-id="1592" lang="EN-GB" style="mso-fareast-font-family:&quot;Times New Roman&quot;;
mso-bidi-font-family:&quot;Times New Roman&quot;" xml:lang="EN-GB"><span data-dcnode-id="1593" instrument_node="">the Integrated Public Use Microdata Series (</span></span><span data-dcnode-id="1588" lang="EN-GB" xml:lang="EN-GB"><a data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ipums.org/" rel="noopener" target="_blank"><span data-dcnode-id="1590" style="mso-fareast-font-family:&quot;Times New Roman&quot;;mso-bidi-font-family:&quot;Times New Roman&quot;"><span data-dcnode-id="1591" instrument_node="">IPUMS</span></span></a></span><span data-dcnode-id="1586" lang="EN-GB" style="mso-fareast-font-family:&quot;Times New Roman&quot;;mso-bidi-font-family:
&quot;Times New Roman&quot;" xml:lang="EN-GB"><span data-dcnode-id="1587" instrument_node="">), </span></span><span data-dcnode-id="1583" lang="EN-GB" xml:lang="EN-GB"><span data-dcnode-id="1585" instrument_node="">have been underused.

</span><p data-dcnode-id="1584"></p></span></li><span data-dcnode-id="1581" instrument_node="">
</span></ul><div class="further-reading" data-dcnode-id="1422"><span data-dcnode-id="1579" instrument_node="">
