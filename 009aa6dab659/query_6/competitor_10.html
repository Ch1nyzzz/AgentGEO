</span><h1 class="title" data-dcnode-id="464" id="page-title"><span data-dcnode-id="465" instrument_node="">
              Refugee Law Clinic            </span></h1><span data-dcnode-id="463" instrument_node="">
</span></div><span data-dcnode-id="461" instrument_node="">
</span></div><span data-dcnode-id="459" instrument_node="">
</span><div class="region region-content" data-dcnode-id="205"><span data-dcnode-id="458" instrument_node="">
</span><div class="block block-system" data-dcnode-id="247" id="block-system-main"><span data-dcnode-id="457" instrument_node="">
</span><div class="content" data-dcnode-id="249"><span data-dcnode-id="456" instrument_node="">
</span><article class="node node-page" data-dcnode-id="251" id="node-node-359"><span data-dcnode-id="455" instrument_node="">
</span><header data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">
</span></header><span data-dcnode-id="452" instrument_node="">
</span><div class="content" data-dcnode-id="258"><span data-dcnode-id="451" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="260"><div class="field-items" data-dcnode-id="261"><div class="field-item even" data-dcnode-id="262" property="content:encoded"><p class="image-centre" data-dcnode-id="449"><img alt="" data-dcnode-id="450" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rli.sas.ac.uk/sites/default/files/images/Refugee%2520Law%2520Clinic%2520Col%2520Black%2520Text%2520RGB.jpg&amp;raw" width="504"></p><span data-dcnode-id="448" instrument_node="">
</span><h3 data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="445" instrument_node="">
</span><h3 data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Overview</span></h3><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">The University of London’s Refugee Law Clinic was established in 2020 and is an innovative project providing pro bono legal advice for refugee clients. Our work provides some of the most disadvantaged communities with access to fair and equal legal representation, a basic human right which many asylum seekers in the UK struggle to find.</span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">The clinic is supported by the Central University and by 10 of the University’s Member Institutions. It is based on a model of Clinical Legal Education for the University’s diverse student body and facilitates practical experience for students working on real cases under the supervision of a qualified expert lawyer. Delivered in partnership with two law firms, the Refugee Law Clinic also provides the opportunity for lawyers to undertake pro bono work within the clinic.&nbsp;</span></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">The clinic's main legal focus is on advising and preparing fresh claims for asylum, an area identified as underserviced in the current legal landscape, and aims to complement the work of law firms and other service providers in London.</span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">&nbsp;</span></p><span data-dcnode-id="430" instrument_node="">
</span><p class="rtecenter" data-dcnode-id="427"><strong data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Watch our online launch event for the clinic&nbsp;here:</span></strong></p><span data-dcnode-id="426" instrument_node="">
</span><p class="rtecenter" data-dcnode-id="389"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="390" frameborder="0" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/Qa4ggC6vzNY&amp;raw" title="YouTube video player" width="560"><html data-cast-api-enabled="true" data-dcnode-id="392" dir="ltr" lang="en"><head data-dcnode-id="401"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="422" name="viewport"/><link data-dcnode-id="417" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="LQI8rW0ieg7lbrx3uZgARA" rel="stylesheet"/><title data-dcnode-id="404">YouTube</title><link data-dcnode-id="403" href="https://www.youtube.com/watch?v=Qa4ggC6vzNY" rel="canonical"/><link data-dcnode-id="402" data-loaded="true" href="https://www.youtube.com/s/player/534c466c/www-player.css" id="css-335067421" nonce="XT9uZ28ImXwbUzFmp/E6Fg" rel="stylesheet"/></meta></head><body class="date-20220424 en_US ltr site-center-aligned site-as-giant-card webkit webkit-534" data-dcnode-id="393" dir="ltr"><div data-dcnode-id="400" id="player" style="width: 100%; height: 100%;"></div><noscript data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=Qa4ggC6vzNY" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><span data-dcnode-id="388" instrument_node="">
</span><p class="rtecenter" data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">&nbsp;</span></p><span data-dcnode-id="385" instrument_node="">
</span><h2 class="accordion-title" data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Operation of the Clinic</span></h2><span data-dcnode-id="382" instrument_node="">
</span><div class="accordion-segment" data-dcnode-id="356"><span data-dcnode-id="381" instrument_node="">
</span><h4 data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Institutional set-up&nbsp;</span></h4><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">The Refugee Law Clinic is structured as a direct legal service provider and is regulated by the OISC. All work will be overseen by a supervising lawyer, supported by a coordinator and advice will be issued on the clinic’s letterhead and under the clinic’s supervising lawyer’s name.&nbsp;</span></p><span data-dcnode-id="375" instrument_node="">
</span><h4 data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Focus of work&nbsp;</span></h4><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Initially, the primary focus of the clinic is&nbsp;on Further Submissions for Asylum ('Fresh Claims').</span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Submitting a ‘fresh claim for asylum’&nbsp;is the process by which a declined asylum-seeker seeks to advance further representations to make a fresh claim on the basis of&nbsp;important&nbsp;new factors&nbsp;(such as changed circumstances, additional evidence, etc.). A successful fresh claim can lead to a grant of refugee status or humanitarian protection. A claim that is accepted can also give rise to a further in country right of appeal.</span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">In cases where the Home Office makes a decision to refuse to treat representations made by an applicant as a fresh claim for asylum, Judicial Review is the only legal challenge available. In cases with a reasonable  prospect  for success, it is envisaged that the Refugee Law Clinic will engage in such JR work.  </span></p><span data-dcnode-id="363" instrument_node="">
</span><h4 data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Selecting cases</span></h4><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Because of the large demand for legal representation in the area of Fresh Claims, the Clinic will initially be operating on a referral only basis from partner organisations.&nbsp;We regret that we can't accept direct referrals from the public or from other organisations at this time.</span></p><span data-dcnode-id="357" instrument_node="">
</span></div><span data-dcnode-id="355" instrument_node="">
</span><h2 class="accordion-title" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Impact of the Clinic</span></h2><span data-dcnode-id="352" instrument_node="">
</span><div class="accordion-segment" data-dcnode-id="335"><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">This is a high-impact and innovative project with the potential to develop substantially in future.&nbsp;</span></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">The Refugee Law Clinic contributes much-needed&nbsp;pro bono&nbsp;legal services to asylum seekers in London in an underserved area of asylum law and develops partnerships towards this objective.&nbsp;&nbsp;</span></p><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">A mapping of the legal landscape in London conducted prior to the Clinic opening found that fresh claims are the area of greatest legal need for asylum seekers in London. In theory, Legal Aid may be available for fresh claims but in practice few firms are willing to take on these cases. In this sector, the data show that the number of providers offering legal aid or not-for-profit representation has more than halved over the last decade. In the mapping (and subsequently), direct service providers have consistently confirmed that A-RE asylum seekers looking to submit fresh claims have particular difficulties in accessing legal services, leaving large numbers without representation.</span></p><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">The clinic has also provided advice to referring agencies on fresh claims and on other referral pathways for particular cases, working towards the aim of becoming a centre of excellence in the field of fresh claims.</span></p><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Clinical Legal Education programmes are highly beneficial and formative for law students, developing experience and interest in social justice work. In drawing in commercial lawyers from our partnering law firms, the Clinic also seeks to build broader interest in refugee and asylum law through this pro bono work, and to support these lawyers to develop a secondary specialisation. Law clinics also contribute to the legal landscape through test cases, research and reflection on law practice and reform</span></p><span data-dcnode-id="336" instrument_node="">
</span></div><span data-dcnode-id="334" instrument_node="">
</span><h2 class="accordion-title" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Project Partners</span></h2><span data-dcnode-id="331" instrument_node="">
</span><div class="accordion-segment" data-dcnode-id="279"><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">The&nbsp;UoL&nbsp;Refugee Law Clinic is an inter-collegiate project of the University of London and at this stage has committed involvement from ten of the University’s Member Institutions, who will each be sending students to volunteer in the clinic:&nbsp;</span></p><span data-dcnode-id="327" instrument_node="">
</span><ul data-dcnode-id="296"><li data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Birkbeck&nbsp;</span></li><span data-dcnode-id="324" instrument_node="">
</span><li data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">City, University of London&nbsp;</span></li><span data-dcnode-id="321" instrument_node="">
</span><li data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Goldsmiths&nbsp;</span></li><span data-dcnode-id="318" instrument_node="">
</span><li data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Kings College London&nbsp;</span></li><span data-dcnode-id="315" instrument_node="">
</span><li data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">London Business School</span></li><span data-dcnode-id="312" instrument_node="">
</span><li data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">London School of Economics (LSE)&nbsp;</span></li><span data-dcnode-id="309" instrument_node="">
</span><li data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Queen Mary, University of London&nbsp;&nbsp;</span></li><span data-dcnode-id="306" instrument_node="">
</span><li data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Royal Holloway&nbsp;</span></li><span data-dcnode-id="303" instrument_node="">
</span><li data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">School of Oriental and African Studies (SOAS)&nbsp;</span></li><span data-dcnode-id="300" instrument_node="">
</span><li data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">University College London (UCL)</span></li><span data-dcnode-id="297" instrument_node="">
</span></ul><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">The project has also partnered with two commercial law firms&nbsp;who will be sending volunteer lawyers to engage in the Clinic:</span></p><span data-dcnode-id="293" instrument_node="">
</span><ul data-dcnode-id="286"><li data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Clifford Chance LLP</span></li><span data-dcnode-id="290" instrument_node="">
</span><li data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Macfarlanes LLP</span></li><span data-dcnode-id="287" instrument_node="">
</span></ul><p data-dcnode-id="281"><span data-dcnode-id="285" instrument_node="">The clinic also receives financial support from Migration Thames Valley's Migration Foundation and another charitable trust. We also receive&nbsp;support in training materials from </span><a class="external" data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hjt-training.co.uk/" rel="external"><span data-dcnode-id="284" instrument_node="">HJT Training</span></a><span data-dcnode-id="282" instrument_node="">, and broader support from an Expert Panel, and the clinic's Governing Board.</span></p><span data-dcnode-id="280" instrument_node="">
</span></div><span data-dcnode-id="278" instrument_node="">
</span><h2 class="accordion-title" data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Further Information</span></h2><span data-dcnode-id="275" instrument_node="">
</span><div class="accordion-segment" data-dcnode-id="264"><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="273" instrument_node="">For further information, please contact Frances Trevena, Supervising Lawyer, at </span><a data-dcnode-id="271" href="mailto:frances.trevena@sas.ac.uk"><span data-dcnode-id="272" instrument_node="">frances.trevena@sas.ac.uk</span></a><span data-dcnode-id="270" instrument_node="">, or&nbsp;Susan Reardon-Smith, Clinic Coordinator, at&nbsp;</span><a data-dcnode-id="268" href="mailto:susan.reardon-smith@london.ac.uk"><span data-dcnode-id="269" instrument_node="">susan.reardon-smith@london.ac.uk</span></a><span data-dcnode-id="267" instrument_node="">.</span></p><span data-dcnode-id="265" instrument_node="">
</span></div><span data-dcnode-id="263" instrument_node="">
