</span><div class="s-lg-book clearfix" data-dcnode-id="609" id="s-lg-content-48137008"><div class="s-lg-book-props" data-dcnode-id="610"><a data-content="The Convention Relating to the Status of Refugees adopted on 28 July 1951 in Geneva provides the most comprehensive codification of the rights of refugees yet attempted. Consolidating previous international instruments relating to refugees, the 1951 Convention with its 1967 Protocol marks a cornerstone in the development of international refugee law. At present, there are 144 States Parties to one or both of these instruments, expressing a worldwide consensus on the definition of the term..." data-dcnode-id="615" data-html="true" data-original-title="" data-placement="bottom" data-title="Description" data-toggle="popover" data-trigger="hover focus" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cat.lib.unimelb.edu.au/record%3Db5223690~S30" onclick="return springSpace.springTrack.trackLink({link: this,_st_type_id: '3',_st_content_id: '48137008'});" title=""><span class="s-lg-book-cover" data-dcnode-id="622" id="s-lg-book-cover-48137008"><img alt="" class="pull-left s-lg-book-cover-img-0" data-dcnode-id="623" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//syndetics.com/index.aspx%3Fisbn%3D9780199542512/LC.GIF%26client%3Dspringshare&amp;raw"></span><span class="s-lg-book-title" data-dcnode-id="620" id="s-lg-book-title-48137008"><span data-dcnode-id="621" instrument_node="">The 1951 Convention Relating to the Status of Refugees and Its 1967 Protocol: A Commentary</span></span><span class="s-lg-book-by" data-dcnode-id="618" id="s-lg-book-by-48137008"><span data-dcnode-id="619" instrument_node=""> by </span></span><span class="s-lg-book-author" data-dcnode-id="616" id="s-lg-book-author-48137008"><span data-dcnode-id="617" instrument_node="">Andreas Zimmermann</span></span></a><div class="s-lg-book-prop-callno" data-dcnode-id="613"><span data-dcnode-id </span><p data-dcnode-id="584"><span data-dcnode-id="585" style="font-family:Arial,Helvetica,sans-serif;"><span data-dcnode-id="586" style="font-size:16px;"><span data-dcnode-id="587" instrument_node="">The principal&nbsp;international agreement on the protection of refugees is the&nbsp;1951 Convention Relating to&nbsp;the Status of Refugees&nbsp;(189&nbsp;UNTS&nbsp;137)&nbsp;and its 1967 Protocol (606 UNTS&nbsp;267). This UNHRC webpage&nbsp;links to the text of the&nbsp;Convention and the Protocol, lists of state parties to both, and the most up to date reservations and declarations. An rss feed can alert you to new reservations and declarations.</span></span></span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" style="font-family:Arial,Helvetica,sans-serif;"><span data-dcnode-id="581" style="font-size:16px;"><span data-dcnode-id="582" instrument_node="">The UN's&nbsp;Audiovisual&nbsp;Library of International Law - Refugees and Stateless Persons &nbsp;- is an archive of the history of the refugee conventions. It&nbsp;provides authoritative introductory notes by Guy Goodwin-Gill, procedural history, preparatory documents, status,&nbsp;audio and video files, and photos of:</span></span></span></p><span data-dcnode-id="578" instrument_node="">
</span><ul data-dcnode-id="556"><span data-dcnode-id="577" instrument_node="">
</span><li data-dcnode-id="573"><span data-dcnode-id="574" style="font-family:Arial,Helvetica,sans-serif;"><span data-dcnode-id="575" style="font-size:16px;"><span data-dcnode-id="576" instrument_node="">The 1951 Refugee Convention&nbsp;and 1967 Protocol&nbsp;</span></span></span></li><span data-dcnode-id="572" instrument_node="">

</span><li data-dcnode-id="558"><span data-dcnode-id="559" style="font-family:Arial,Helvetica,sans-serif;"><span data-dcnode-id="560" style="font-size:16px;"><span data-dcnode-id="561" instrument_node="">The 1967 Declaration on Territorial Asylum</span></span></span></li><span data-dcnode-id="557" instrument_node="">
</span></ul><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" style="font-family:Arial,Helvetica,sans-serif;"><span data-dcnode-id="553" style="font-size:16px;"><span data-dcnode-id="554" instrument_node="">Other refugee treaties (bilateral and multilateral)&nbsp;can be found on RefWorld. Either:</span></span></span></p><span data-dcnode-id="550" instrument_node="">
</span><ul data-dcnode-id="538"><span data-dcnode-id="549" instrument_node="">
</span><li data-dcnode-id="545"><span data-dcnode-id="546" style="font-family:Arial,Helvetica,sans-serif;"><span data-dcnode-id="547" style="font-size:16px;"><span data-dcnode-id="548" instrument_node="">Select 'Laws' from the top blue menu bar to navigate quickly to the major refugee treaties, or</span></span></span></li><span data-dcnode-id="544" instrument_node="">
</span><li data-dcnode-id="540"><span data-dcnode-id="541" style="font-family:Arial,Helvetica,sans-serif;"><span data-dcnode-id="542" style="font-size:16px;"><span data-dcnode-id="543" instrument_node="">Browse by 'Document Type' type and select eg: bilateral or multilateral treaties from the alphabetical list. The search can then be narrowed by country, keyword etc.</span></span></span></li><span data-dcnode-id="539" instrument_node="">
</span></ul><span data-dcnode-id="537" instrument_node="">
