</span><title data-dcnode-id="1909">A ‘Safety-First’ Approach to Physical Protection in Refugee Camps</title><span data-dcnode-id="1908" instrument_node="">
</span><meta content="Physical Protection in Refugee Camps" data-dcnode-id="1907" name="subject"><span data-dcnode-id="1906" instrument_node="">
</span><meta content="refugee camps protection safety UNHCR" data-dcnode-id="1905" name="keywords"><span data-dcnode-id="1904" instrument_node="">
</span><meta content="C:\PROGRAM FILES\MICROSOFT OFFICE\OFFICE\html.dot" data-dcnode-id="1903" name="Template"><span data-dcnode-id="1902" instrument_node="">
</span><span data-dcnode-id="1900" instrument_node="">
</span><span data-dcnode-id="1899" instrument_node="">
</span><font data-dcnode-id="1894" face="Geneva,Arial"><p align="CENTER" data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Working Paper # 4</span></p><span data-dcnode-id="1896" instrument_node="">
</span><b data-dcnode-id="1895"></b></font><p align="CENTER" data-dcnode-id="1883"><font data-dcnode-id="1888" face="Geneva,Arial"><b data-dcnode-id="1890"><span data-dcnode-id="1893" instrument_node="">A "Safety-First" Approach to</span><br data-dcnode-id="1892"><span data-dcnode-id="1891" instrument_node="">
Physical Protection in Refugee Camps</span></b><span data-dcnode-id="1889" instrument_node="">(</span></font><a data-dcnode-id="1886" href="#star"><span data-dcnode-id="1887" instrument_node="">*</span></a><font data-dcnode-id="1884" face="Geneva,Arial"><span data-dcnode-id="1885" instrument_node="">)</span></font></p><font data-dcnode-id="1881" face="Geneva,Arial"><span data-dcnode-id="1882" instrument_node="">
</span></font><p align="CENTER" data-dcnode-id="1874"><font data-dcnode-id="1879" face="Geneva,Arial"><span data-dcnode-id="1880" instrument_node="">Karen Jacobsen</span></font><span data-dcnode-id="1878" instrument_node="">(</span><a data-dcnode-id="1876" href="#f1"><span data-dcnode-id="1877" instrument_node="">1</span></a><span data-dcnode-id="1875" instrument_node="">)</span></p><span data-dcnode-id="1873" instrument_node="">
</span><font data-dcnode-id="1869" face="Geneva,Arial"><p align="CENTER" data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">May 1999</span></p><span data-dcnode-id="1870" instrument_node="">
</span></font><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1865" instrument_node="">Many refugee camps today are places of insecurity and outright danger, both for refugees and relief workers, and, by virtue of their destabilizing effect, for those living around the camps. Camps are an essential element of the humanitarian response to refugees, and cannot and should not be eliminated (as has been suggested elsewhere). However, they need to be rendered secure in order to ensure the safety of displaced people and others living and working in and around the camps. During the past few decades, the main focus of the international humanitarian response in asylum countries has been to emphasize assistance at the expense of protection. Particularly in the initial emergency phase, physical assistance ("biological needs") is given priority over protection and security concerns. It is proposed in this paper that this focus be re-directed, particularly in the contingency planning and emergency phases, so as to stress security and physical protection needs</span><i data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node=""> before</span></i><span data-dcnode-id="1862" instrument_node=""> assistance: that is, adopt a ‘security-first’ approach. Such an approach would be the basis of an overall strategy to ensure security and protection in refugee hosting areas. This strategy should be ‘regionally appropriate,’ that is, designed in accordance with the needs and capacities of the various state, international and nonstate actors that participate in the specific refugee situation. An important part of the strategy, it is argued, is the presence of a security force in the camps. Camps cannot be made secure without armed backup, but it is crucial that such a force be appropriately trained and prepared for refugee situations, and carefully controlled and monitored. The specific composition and mandate of such a force would vary from one host country to another, depending on needs and capacities. </span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">This paper begins with an analysis of security and safety problems in camps and refugee hosting areas, and then outlines some ideas about a security-first strategy, including the political feasibility of a camp security force in the current international context, and how such a force would be composed, monitored and controlled. All of these, but especially the latter, are issues that warrant further discussion, and it is hoped that this paper will motivate such discussion. The following qualifications should be noted at the outset:</span></p><span data-dcnode-id="1857" instrument_node="">
</span><ul data-dcnode-id="1847"><span data-dcnode-id="1856" instrument_node="">
</span><li data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">The paper focuses on refugee camps rather than IDP camps. Although IDP camps present similar kinds of safety concerns, the possible solutions pose very different implementation problems. </span></li><span data-dcnode-id="1853" instrument_node="">
</span><li data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">Not all camps are characterized by physical safety problems; some are relatively safe havens. </span></li><span data-dcnode-id="1850" instrument_node="">
</span><li data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Not all refugees live in camps; in most refugee hosting areas a large proportion are self-settled amongst the local population.</span></li></ul><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1843" instrument_node="">
</span><b data-dcnode-id="1839"><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Physical Safety Problems in Refugee Camps and Hosting Areas (RHAs)</span></p><span data-dcnode-id="1840" instrument_node="">
</span></b><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">A survey of RHA and camp conditions in 1997, set out in Table 1, revealed three main sources of physical safety problems: a) external military attacks or raids on camps and surroundings; b) violence and intimidation occurring from sources inside or outside the camps; and c) a breakdown of law and order in the camps that gives rise to crime and associated problems. </span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">A. Military Attacks or Raids by Armies, Bandits, Militias, Rebel Groups, etc.</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">In almost every refugee situation in the past five years (see Table 1), camps have been subject to some form of military engagement, ranging from artillery bombardment of camps in eastern Zaire by Rwandan government forces, bombing runs by the Turkish air force of Kurdish camps in northern Iraq, raids by rebel forces of Sudanese camps in northern Uganda, and ‘hot pursuit’ raids by Myanmar government forces across the border into Thailand. Around the Somali refugee camps in eastern Kenya, bandits have operated with impunity, raping women, hijacking relief vehicles, and kidnapping relief workers. When camps are attacked or preyed on by armed gangs, it is not only camp populations and relief workers who are at risk, but also surrounding communities of local people and self-settled refugees. </span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">&nbsp;	Camps are targets for military attacks for two main reasons: </span></p><span data-dcnode-id="1827" instrument_node="">
</span><ol data-dcnode-id="1820" type="i"><span data-dcnode-id="1826" instrument_node="">
</span><li data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">By containing combatants in their midst, camps are perceived by antagonistic forces, either in the country of origin or in the host country, as giving assistance and protection to their enemies, and are therefore targeted. Large numbers of combatants amongst the refugees can lead to camps becoming militarized, with accordingly increased likelihood of attack. In addition, the presence of combatants in camps undermines civilian authority and sources of law and order, and can lead to camps falling under the control of political or military elements. Refugees are then more likely to be deprived of their rights and otherwise subject to violence and intimidation.</span></li><span data-dcnode-id="1823" instrument_node="">
</span><li data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Camps are largely undefended repositories of resources, including food, vehicles and relief supplies, as well as people, who can be forcibly recruited for military or sex or labor purposes, or taken hostage. </span></li></ol><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">&nbsp;In recent years, a third reason for military attacks on camps has emerged. Governments involved in internal or regional conflicts have deliberately targeted refugees and camps as part of a military strategy to weaken and demoralize opponents, and to promote ethnic cleansing. This has occurred most recently in Kosovo, where Serbian president Milosevic has pursued such tactics, but also occurs in Sudan and elsewhere, as part of a larger pattern of conflict in which civilians are targeted for military purposes. Camps are particularly likely to be involved in armed engagements when they are located close to the border or in conflict-prone or sensitive areas. Then, even if camps are not directly targeted, their location is more likely to expose refugees to crossfire, or to landmine fields.&nbsp;</span></p><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">B. Violence and Intimidation </span></p><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">&nbsp;Inside many camps, refugees are subject to intimidation, violence, and harassment from a variety of groups and individuals. These include other refugees, who use violence for reasons of ethnic conflict, or political pressure; and camp guards or other host government authorities, who use physical intimidation to extort resources or sex from refugees, or to pressure refugees to leave the camps, or enter them, or to repatriate. Clashes can also occur between refugees and local people, usually outside the camp, and most often when there is resentment by locals towards refugees for perceived wrongdoings, such as theft or immoral acts, or for inequities resulting from refugees’ access to relief resources.</span></p><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">C. Breakdown of Law and Order</span></p><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">A third reason for camp insecurity is the absence of law and order. There are two main reasons for this occurrence:&nbsp;</span></p><span data-dcnode-id="1804" instrument_node="">
</span><ol data-dcnode-id="1797" type="i"><span data-dcnode-id="1803" instrument_node="">
</span><li data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Especially in the emergency phase, soon after an influx, camp populations consist of uprooted, often traumatized or destabilized people. Many refugees are rural people with little education, who have lost their ties to families and villages, and who find themselves cast adrift in an alien, unstructured shantytown-like culture. The result is often increased crime and violence, or increased likelihood of recruitment into militias or organized crime.</span></li><span data-dcnode-id="1800" instrument_node="">
</span><li data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">Transgressions go unpunished because there is no adequate force to back up what rule of law does exist in camps. In the absence of effective rule of law, petty and violent crime flourishes and can lead to camps becoming zones of drug smuggling, human trafficking, organized crime, illegal logging, and gun running, with the attendant problems of violence. Relief supplies are diverted to enrich those in control or support the war effort, and the perpetrators are able to elude justice by hiding amongst the refugee population. As in any high crime area, the non-criminal population is subject to more generalized violence, and the climate of violence leaches out into the surrounding community. The presence of weapons (even when hidden) increases the combustibility of the situation in and around the camps, as does the problem of bored and frustrated young men in camps, who are candidates for involvement in crime or recruitment to militias.</span></li></ol><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1793" instrument_node="">
</span><b data-dcnode-id="1789"><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Making Camps Safe and Secure: Measures and Actors</span></p><span data-dcnode-id="1790" instrument_node="">
</span></b><p data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Securing camps and implementing physical protection requires that the following measures be undertaken in camps:&nbsp;</span></p><span data-dcnode-id="1786" instrument_node="">
</span><ul data-dcnode-id="1767"><span data-dcnode-id="1785" instrument_node="">
</span><li data-dcnode-id="1777"><span data-dcnode-id="1784" instrument_node="">combatants must be disarmed and demobilized, and nonrefugees(</span><a data-dcnode-id="1782" href="#f2"><span data-dcnode-id="1783" instrument_node="">2</span></a><span data-dcnode-id="1781" instrument_node="">)</span><sup data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node=""> </span></sup><span data-dcnode-id="1778" instrument_node="">separated from bona fide refugees, by screening all those entering the host country (This could entail combatants and/or nonrefugees being located in separate camps from refugees); </span></li><span data-dcnode-id="1776" instrument_node="">
</span><li data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">camps must be maintained as nonmilitarized, weapon-free zones; </span></li><span data-dcnode-id="1773" instrument_node="">
</span><li data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">camps must be located (or relocated) at a safe distance from the border, and in a conflict-free area; </span></li><span data-dcnode-id="1770" instrument_node="">
</span><li data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">a climate of law and order must be created and maintained within and outside of the camps.</span></li></ul><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">If these measures were appropriately implemented, they would address many of the safety problems associated with refugee camps and hosting areas. However, adherence to these principles and the implementation of these measures has been patchy or absent in a number of situations, notably the Great Lakes camps but also elsewhere, largely because host governments have been unwilling or unable to take the necessary steps to secure the camps. Before considering strategies for implementing such measures, it is worth examining the perspectives of the main actors concerned with security in refugee camps, because doing so will give insight into the important political context in which solutions to safety problems are developed. </span></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1762" instrument_node="">Two sets of actors have responsibility for undertaking these tasks: the host government and UNHCR. According to international agreements, including the OAU Refugee Convention, the Law of Armed Conflicts, the UN Charter, human rights law, and other instruments, the physical protection and security of refugee camps is in the hands of host governments, who are supposed to work with UNHCR to ensure the safety of refugees.(</span><a data-dcnode-id="1760" href="#f3"><span data-dcnode-id="1761" instrument_node="">3</span></a><span data-dcnode-id="1759" instrument_node="">) These principles require the host government to ensure that refugee camps remain civilian and humanitarian in nature, that military elements have been disarmed and removed, and that camps are situated away from border areas. In some cases, these principles are put into practice by host states: police or army forces are positioned in and around camps, with the duty to ensure the security of the camps and the safety of refugees. However, in many other cases, this system of protection does not work, or does so only poorly. To understand why this is so, it is necessary to look at the political context of camps, and the position of the main actors in this context.</span></p><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">A. The Host Government</span></p><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1753" instrument_node="">The physical safety problems identified above will not always be of concern to the host government and local authorities, indeed some of the second and third type may even be perpetrated by them. Safety problems are most likely to be addressed when they pose direct security threats or economic problems for the central government, or sometimes for the local authorities. In many host countries, developed and developing alike, the political stance of the central government vis a vis refugees and locals is quite different from that of the local government or authorities, including the military, which control the refugee hosting area.(</span><a data-dcnode-id="1751" href="#f4"><span data-dcnode-id="1752" instrument_node="">4</span></a><span data-dcnode-id="1750" instrument_node="">)</span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Refugee movements occur in periods of regional instability and intensified political maneuvering, where the governments of both host and sending countries have a variety of political, security and economic interests at stake, as do local authorities. As zones of concentrated resources and people, camps become integrated into the political and security context of the region, making it unlikely that they could be neutral, nonpoliticized places. Instead, camps are often viewed as components of the conflict, and as resources to further political ends.</span></p><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1744" instrument_node="">Most of the worst cases of camp insecurity occur in regions where the refugee flows and refugee camps have a long history of militarization. During the Cold War, the militarization of refugee groups and of camps, such as occurred with Afghan groups in Pakistan or the Khmer Rouge on the Thai-Cambodian border, was ignored or condoned because of the role they played in the superpower struggle,(</span><a data-dcnode-id="1742" href="#f5"><span data-dcnode-id="1743" instrument_node="">5</span></a><span data-dcnode-id="1741" instrument_node="">) or because host state supporters of liberation struggles, particularly in Africa, condoned and enabled the use of refugee camps for use by liberation armies, as occurred by the Mozambican FRELIMO in Tanzania, by the South African ANC and Zimbabwean liberation forces (ZAPU) in Zambia. </span></p><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1738" instrument_node="">This situation has changed only in a few ways since the end of the Cold War. Camps and refugees continue to be used and targeted as part of the conflict,(</span><a data-dcnode-id="1736" href="#f6"><span data-dcnode-id="1737" instrument_node="">6</span></a><span data-dcnode-id="1735" instrument_node="">) except that in most cases, superpower involvement has been reduced, and camp militarization has become less acceptable to the West. In the post-Cold War context, host governments’ view of refugee camps and their willingness to prevent militarization of camps, is motivated by regional and border politics. This was graphically illustrated during the Great Lakes refugee crisis from 1994-1997,(</span><a data-dcnode-id="1733" href="#f7"><span data-dcnode-id="1734" instrument_node="">7</span></a><span data-dcnode-id="1732" instrument_node="">) but the situation also occurs elsewhere, for example in southern Sudan, along the Thai-Burmese border, and along the Tanzanian-Burundian border, to name only a few. Now, as ever, refugees and camps are part of the political strategies of host and sending governments, as well as whoever may be supporting these governments behind the scenes.</span></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">That governments can determine the fate of camps, including whether or not they become militarized, is illustrated by the fact that a host government can respond to different refugee groups and their camp situations in different ways. A few examples illustrate:</span></p><span data-dcnode-id="1727" instrument_node="">
</span><ul data-dcnode-id="1720"><span data-dcnode-id="1726" instrument_node="">
</span><li data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Since the late 1980s, the Thai-Burmese border has been repeatedly crossed by Burmese ethnic minorities and other groups fleeing the repression of the junta in power in Burma. The Thai authorities have allowed small camps and settlements to become established inside Thailand, but these camps have never become militarized, despite the mobilization within Burma of the ethnic minorities and their continuing resistance to the regime. Why has no militarization of the camps occurred? The Thai government has had close ties with the Burmese military authorities, as well as economic interests in Burmese natural resources, and has thus had no interest in enabling military opposition to the regime. By contrast, the Thai authorities permitted the existence of Khmer Rouge military camps along the Thai-Cambodian border during the 1980s, because the Thais were in favor of there being a militarized buffer zone between Thailand and the Vietnamese then occupying Cambodia. </span></li><span data-dcnode-id="1723" instrument_node="">
</span><li data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">The Tanzanian government permitted and encouraged FRELIMO forces to use refugee camps as resources in their fight against the Portuguese colonial authorities in Mozambique during the early 1970s, and allowed FRELIMO military bases to be located in Tanzania. By contrast, the Tanzanian authorities did their best (but largely failed) to prevent the Rwandan refugee camps from being used by Rwandan militias, whom the Tanzanians did not support. By contrast again, the Tanzanians have been turning something of a blind eye to the presence of combatants in the Burundian refugee camps. The Tanzanian government is opposed to the current regime in Burundi.</span></li></ul><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">As a consequence of their history of militarization, most refugee camps are plagued by the problem of "mixed populations," that is, the presence of combatants and criminals among the refugees. In most camp situations, the refugee population includes both non-combatants (usually women, children, elderly) and combatants, either actual or potential. Even if efforts are made to exclude actual combatants from camps (as is required by UNHCR mandate), it is difficult to enforce such exclusion for any length of time. Combatants are easily able to shed their weapons and uniforms in order to enter the camps. If camps are close to the border this enables refugee combatants more easily to mobilize and conduct guerilla forays across the border. The militarization of camps leads to all manner of security problems, as discussed above. </span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Even if host governments do not actively encourage the militarization of camps, there may be a general reluctance to host refugees, stemming from concerns about the economic or environmental burden posed by refugees or from potential security concerns. These concerns are often accompanied by the desire to see rapid repatriation, which can in turn translate into deliberate non-protection ("humane deterrence") as a way to encourage repatriation. This absence of will to protect refugees on the part of governments can also lead to camps and refugees being located too close to borders, or in zones of conflict, and thus vulnerable to ‘hot pursuit’ raids or artillery fire. Badly located camps are targeted by rebel groups or bandits for their resources, especially vehicles, but also food and medical supplies, or for the purposes of forced conscription. Even nonmilitarized camps or refugee settlements can thus become part of the war economy. This is a common occurrence, for example, in northwest Uganda, where rebel groups have attacked refugee settlements, sometimes shooting relief personnel or taking hostages, stealing relief supplies and hijacking vehicles. More examples are found in Table 1.</span></p><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Host government failure to provide physical protection is not always only an issue of absent political will, but sometimes occurs because of lack of capacity. It is not always possible to locate camps in a deliberate way; refugees often spontaneously set up their own camps close to the border in order to facilitate return or monitor the situation in their home region, and then it is difficult to relocate them. In situations where armed combatants are mixed up with refugees, the only effective way to screen them out and keep them out is by means of an armed force. Although initial screening and disarming of incoming refugees sometimes is carried out at border crossing points by host authorities, it is not always effective—and of course, not all refugees come through border crossings. The authorities can be overwhelmed by numbers, inadequately trained, or otherwise unwilling or able to accomplish this task, and many arms or combatants "get through" and mix with bona fide refugees. Unless entering combatants are willing to yield their arms, it is often difficult for unarmed border officials or UNHCR Protection Officers to disarm combatants. Similarly, without adequate military backup, it is difficult to ensure that the civilian nature of a refugee camp is sustained, and that weapons are eliminated from and kept out of camps. </span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Host governments often do not have sufficient or adequately trained and equipped forces, either police or military, to provide adequate and appropriate physical protection in camps. Lack of capacity is especially problematic in less developed host countries, particularly in border regions, which are less accessible and often beyond the reach of central governments. </span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">B. UNHCR and other relief agencies</span></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1703" instrument_node="">When host governments will not or cannot implement protection measures, or in cases where there is no effective or functioning host government, who has responsibility for the physical protection of refugees? The responsibility for protection is often relegated to UNHCR, which is also blamed for physical protection problems,(</span><a data-dcnode-id="1701" href="#f8"><span data-dcnode-id="1702" instrument_node="">8</span></a><span data-dcnode-id="1700" instrument_node="">) despite their not having either the mandate or capacity for physical protection, to say nothing of other security concerns. In some cases, UNHCR has tried to take on responsibility for camp security, as in the Goma camps(</span><a data-dcnode-id="1698" href="#f9"><span data-dcnode-id="1699" instrument_node="">9</span></a><span data-dcnode-id="1697" instrument_node="">) in 1994-96, but these have been ad hoc responses and although partially successful in the Goma case, on the whole they have been less than satisfactory responses. </span></p><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">In most cases, UNHCR, NGOs and donors can only pressure host governments to provide the needed protection. When diplomatic pressure fails to produce results, relief agencies are faced with the problem of what to do. When camps become militarized, or when attacks on personnel occur, relief agencies must decide whether to remain in the camps and continue to provide assistance, but turn a blind eye to the violations taking place, or to withdraw from the camps. It is difficult to discern a pattern of withdrawal: much depends on the politics of the situation as well as the likelihood of things improving. In northern Iraq, UNHCR withdrew from Atroush camp when it became too militarized; in eastern Zaire, they did not withdraw. In May 1993, Medecins sans Frontières (Belgium) withdrew most of its women workers from camps in northeastern Kenya after reports of a high incidence of assaults on refugees and aid workers. In northern Uganda in 1996, Oxfam, the largest NGO operating there, withdrew its staff after a series of assaults including abductions and robbery. In eastern Zaire, however, MSF withdrew, as did other NGOs, but Oxfam remained. </span></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1691" instrument_node="">Apart from withdrawal, other options for UNHCR are rather meager. The use of the Exclusion Clause as a way to keep camps free of combatants has not been widely used, and also requires the presence of a military or police force to carry out the ejection of combatants from the camps.(</span><a data-dcnode-id="1689" href="#f10"><span data-dcnode-id="1690" instrument_node="">10</span></a><span data-dcnode-id="1688" instrument_node="">)</span></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1683" instrument_node="">
</span><b data-dcnode-id="1679"><p data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Ensuring Physical Protection in Camps: Security and Protection First</span></p><span data-dcnode-id="1680" instrument_node="">
</span></b><p data-dcnode-id="1668"><span data-dcnode-id="1678" instrument_node="">Until recently, the main focus of the international humanitarian response has been to emphasize physical (biological) assistance at the expense of physical protection and human rights.(</span><a data-dcnode-id="1676" href="#f11"><span data-dcnode-id="1677" instrument_node="">11</span></a><span data-dcnode-id="1675" instrument_node="">) In the past year or so, largely as an outcome of the 1994-97 crisis in the Great Lakes, there has been widespread condemnation of the presence of combatants in camps, and calls for more stringent efforts to separate combatants from refugees. UNHCR has sought to address physical protection problems more directly. The High Commissioner(</span><a data-dcnode-id="1673" href="#f12"><span data-dcnode-id="1674" instrument_node="">12</span></a><span data-dcnode-id="1672" instrument_node="">) and the Director of the Division of Protection(</span><a data-dcnode-id="1670" href="#f13"><span data-dcnode-id="1671" instrument_node="">13</span></a><span data-dcnode-id="1669" instrument_node="">) have made emphatic statements to various UN bodies, including the Security Council, and to host states, about the need for mechanisms to improve the physical protection and security of refugees and camp populations. The High Commissioner has stressed the need for practical ways to address security problems, and has proffered such concepts as a "ladder of options," which sets out a variety of responses depending on the security problems and needs of the refugee hosting area.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1666" instrument_node="">The leadership of UNHCR and other agencies has thus demonstrated a heightened concern about security problems and refugee protection. However, as yet these concerns are not reflected in UNHCR’s recent contingency plans. A draft of the contingency plan for the Great Lakes Region in the context of the current insurgency in the DRC (October 1998), prepared by the Office for the Coordination of Humanitarian Affairs (OCHA), contained barely a mention of security and protection needs and was entirely focused on plans for providing cross-border assistance and humanitarian needs.(</span><a data-dcnode-id="1664" href="#f14"><span data-dcnode-id="1665" instrument_node="">14</span></a><span data-dcnode-id="1663" instrument_node="">) </span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Ways must be found to support and strengthen the recent calls for renewed emphasis on physical protection and safety in RHAs. The balance between protection and assistance must be re-set. The remainder of this paper suggests a strategy for pursuing this goal. </span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">A. A Rights-based, Safety-First Strategy: The Need for Force</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1654" instrument_node="">It is argued here that the primary focus of UNHCR’s response, both in the contingency planning and in the emergency phases, should be changed so as to stress safety and protection </span><i data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">before</span></i><span data-dcnode-id="1651" instrument_node=""> assistance. This may be called a ‘safety and protection-first’ approach.(</span><a data-dcnode-id="1649" href="#f15"><span data-dcnode-id="1650" instrument_node="">15</span></a><span data-dcnode-id="1648" instrument_node="">) From their inception, camps must be located, set up, and secured, to the extent possible, so as to ensure the physical safety of refugees and all camp denizens, prevent future problems for the surrounding area, and to make the delivery of assistance safe (and perhaps more efficient). At the same time, safety measures must be tempered by legal protection considerations; that is, the rights of refugees must undergird the safety-first approach. </span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1645" instrument_node="">The only truly effective way to secure camps is by means of a force that is trained in issues of refugee protection and has the mandate and capability to use armed force in a refugee context. Many within the relief community have recognized the need for a security force in camps, or a more generalized ‘humanitarian protection force.’(</span><a data-dcnode-id="1643" href="#f16"><span data-dcnode-id="1644" instrument_node="">16</span></a><span data-dcnode-id="1642" instrument_node="">) Various international and state actors have also recognized the need for such a force. In his April 1998 Report on the Situation in Africa, the UN Secretary General urged "the establishment of an </span><i data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">international mechanism</span></i><span data-dcnode-id="1639" instrument_node=""> to assist host governments in maintaining the security and neutrality of refugee camps and settlements." "Such a mechanism," he continues, "might encompass training, logistics, financial support, the provision of security personnel and the monitoring of national security arrangements." </span></p><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1636" instrument_node="">The UN High Commissioner for Refugees has sought to refine such a mechanism and has advocated </span><i data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">a ladder of options</span></i><span data-dcnode-id="1633" instrument_node="">. In calling on donor states for "concrete action on behalf of victims of violence," she stated that such action will have to be in the form of security support:</span></p><dir data-dcnode-id="1619"><span data-dcnode-id="1631" instrument_node="">
</span><dir data-dcnode-id="1621"><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1629" instrument_node="">Every situation...requires a specific response. It should not be a matter of all or nothing—or, in other words, a massive military operation with overwhelming force or no action at all. There should be a </span><i data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">ladder of options</span></i><span data-dcnode-id="1626" instrument_node="">—from military operations to peacekeeping operations, to civilian police, armed or unarmed, UN Guards, or the kind of civilian arrangements we have been involved in ourselves. What we need is a kind of Rapidly Deployable Arrangement that can intervene in order to create a safe environment for humanitarian action.(</span><a data-dcnode-id="1624" href="#f17"><span data-dcnode-id="1625" instrument_node="">17</span></a><span data-dcnode-id="1623" instrument_node="">)</span></p></dir><span data-dcnode-id="1620" instrument_node="">
</span></dir><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">However, even if such a force were to be available, it is not enough simply to plug it into any situation and hope for the best. Camp safety and protection are best approached from a sub-regional, strategic perspective, rather than as an international mechanism designed ‘from above’ that can be plugged in anywhere. A sub-regional perspective means assessing the area-specific physical protection needs and capacities of the host and sending countries, and devising goals and plans accordingly. </span></p><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1614" instrument_node="">&nbsp;In some cases, a safety-first plan could be piggybacked on state or regional security initiatives. Recently, there have been several regional intergovernmental initiatives aimed at pre-empting or addressing security and other regional concerns. For example, in 1998, in response to the Secretary-General’s Africa Report, ECOWAS drafted a proposal for the establishment of a "Mechanism for the Prevention, Management Resolution of Conflicts, Peace-keeping and Security". This mechanism envisages the establishment of an ECOWAS Mediation and Security Council, which will be empowered to authorize intervention to restore or maintain peace.(</span><a data-dcnode-id="1612" href="#f18"><span data-dcnode-id="1613" instrument_node="">18</span></a><span data-dcnode-id="1611" instrument_node="">) This kind of political initiative and will must be taken advantage of in planing for refugees’ safety.</span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1608" instrument_node="">A safety-first strategy will include different elements depending on the requirements of the specific receiving area, but one essential element is a unit trained to use armed force when necessary and to back up security measures. What is envisioned is a country-based </span><i data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Camp Security Force</span></i><span data-dcnode-id="1605" instrument_node="">, which would capable of carrying out the protection tasks identified earlier, namely:</span></p><span data-dcnode-id="1603" instrument_node="">
</span><ul data-dcnode-id="1590"><span data-dcnode-id="1602" instrument_node="">
</span><li data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">disarming and demobilizing combatants, and/or separating them and other nonrefugees from bona fide refugees, by screening all those entering the host country; </span></li><span data-dcnode-id="1599" instrument_node="">
</span><li data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">maintaining camps as weapon-free zones;&nbsp; </span></li><span data-dcnode-id="1596" instrument_node="">
</span><li data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">when necessary, relocating camps at a safe distance from the border, and in a conflict-free area;&nbsp; </span></li><span data-dcnode-id="1593" instrument_node="">
</span><li data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">maintaining a climate of law and order within and outside of the camps.</span></li></ul><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">B. Planning a Strategy for Camp Safety</span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Two phases to a safety- and protection-first strategy are envisioned: a pre-influx, contingency planning phase, and a post-influx phase including both the emergency and post-emergency, care-and-maintenance periods.&nbsp;</span></p><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">I. Contingency Planning Phase </span></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">At present, in order to prepare for refugee emergencies, UN Country Teams in host countries have contingency plans (CPs), which are regularly updated. Many of these CPs do not presently contain physical protection components, but it is entirely possible to adapt existing CPs to a safety-first orientation. Many of the elements of such a strategy are already in place, or are in the process of being set up, as a result of the new approach to coordination of humanitarian assistance embodied in the UN’s Office for the Coordination of Humanitarian Affairs (OCHA). In the Great Lakes Region, for example, there are planned UN Joint Logistics Centers, as well as existing UN Country Teams working within an inter-agency framework that includes major NGO partners and host government authorities. </span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">In pursuing a safety- and protection-oriented approach, UN Country Teams could add or reinforce the following components:&nbsp;</span></p><span data-dcnode-id="1574" instrument_node="">
</span><ul data-dcnode-id="1558"><span data-dcnode-id="1573" instrument_node="">
</span><li data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Host government authorities. Since the Camp Security Force will be drawn from the army or police, the relevant government representatives from both the army and line ministries must be active on the team; </span></li><span data-dcnode-id="1570" instrument_node="">
</span><li data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Local government authorities, who will be equally important in cases where local army or police units provide the Camp Security Force; </span></li><span data-dcnode-id="1567" instrument_node="">
</span><li data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Seconded UN Department of Peacekeeping Officers (DPKO) who could advise about security needs and assist with the training and preparation of the Camp Security Force;&nbsp; </span></li><span data-dcnode-id="1564" instrument_node="">
</span><li data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Human rights monitors. These could be UNHCR Protection Officers, UN High Commissioner for Human Rights or ICRC officials, or official observers from human rights NGOs. Their task will be to advise and help train the Camp Security Force as to refugees’ rights;&nbsp; </span></li><span data-dcnode-id="1561" instrument_node="">
</span><li data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Local leaders and representatives. The team should also include or consult with local leaders in making decisions concerning camp location, transit centers and so forth.</span></li></ul><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">&nbsp;	Contingency plan goals include: </span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">a) Identification, training and supervision of the Camp Security Force. Host government authorities, and particularly local authorities, will play a major role in deciding where the force would come from, that is, whether and which police or military forces could be used. Training, capacity-building and supervision of the force would occur during this period. The roles of UN agencies and NGOs in this aspect of the plan would be advisory or monitoring only, since they have no comparative advantage when it comes to police work. However, DPKO officials can potentially play an active role in training and supervision. In situations where the host government lacks the capacity to create such a force, decisions must be taken as to which international organization or donor state could take on this task.</span></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">b) Logistical review of options for screening posts, transit centers and camp location, utilizing past experience where possible, and incorporating input of local population. Camp location and layout would be planned with security as a priority.</span></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">c) Decisions about what will be done with screened out nonrefugees and combatants.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">II. Post-influx Phase</span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">During and after a refugee influx, not all refugees enter camps, but in sustained complex emergencies a significant number spend some time in camps. There are normally two operational phases to camp implementation: the initial emergency stage, when a refugee flow first occurs, followed by the ‘care and maintenance’ phase. The lengths of these phases vary, depending on circumstances, but the emergency phase is generally only a few weeks long, while the care and maintenance phase can stretch into decades. Each phase requires different security interventions, but if adequate security and protection are accomplished early in the emergency phase, the ensuing security goals will be more easily achieved. This occurs because, if camps can quickly be demilitarized and rendered as civilian and relatively neutral zones, two of the main causes of insecurity will be minimized: first, camps will not be seen as places harboring combatants and therefore will be less likely to be attacked for military reasons, and second, in the absence of combatants, camps are more likely to become places of law and order where crime does not flourish. Demilitarization of camps will not necessarily address the third cause of insecurity—their targeting by rebels and bandits for their resources—but reducing two out the three causes of insecurity will allow a focus upon the third cause. </span></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1536" instrument_node="">
</span><b data-dcnode-id="1532"><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Conclusion</span></p><span data-dcnode-id="1533" instrument_node="">
</span></b><p data-dcnode-id="1527"><span data-dcnode-id="1531" instrument_node="">In recent years, a number of researchers have suggested that camps themselves are at the root of protection problems, and that the eradication of camps will go a long way to resolving these problems.(</span><a data-dcnode-id="1529" href="#f19"><span data-dcnode-id="1530" instrument_node="">19</span></a><span data-dcnode-id="1528" instrument_node="">) However, camps neither can nor should be eliminated; they are an essential element of the humanitarian response to refugees, both for efficacy of assistance programs and because they are potentially a major source of protection and safety for refugees. What is required is a re-orientation of humanitarian assistance away from a focus on meeting the physical needs of refugees and towards ensuring their security and protection. </span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">This paper has argued that the only practical way to ensure the safety of camps and protection of refugees, what might be called security, is to pursue a security strategy underpinned simultaneously by a trained and armed Camp Security Force and by a rights-based orientation. There are a variety of precedents for a Camp Security Force, ranging from the US Military Police used in the Cuban and Haitian camps at Guantanemo Bay, to the Zairean Presidential Guard used in the Goma camps. These and other cases must be further examined to determine which elements can feasibly be extracted and used or adapted for forthcoming refugee camp scenarios. In turn, human rights monitoring has become much more effective and widespread in recent years, and human rights organizations are increasingly astute at pursuing their goals. It is timely and feasible now to combine force and human rights to protect refugees and those caught up with them. The biggest constraints, as always, are the political ones. It will require the sustained will of donors and host states, working with UNHCR and NGOs, to implement such a safety-first, rights-based strategy. Given the apparently serious and widespread concerns about the security problems associated with refugees, there might presently be a window of opportunity for such an endeavor. </span></p><span data-dcnode-id="1523" instrument_node="">
</span><b data-dcnode-id="1514"><font data-dcnode-id="1519" size="4"><p align="CENTER" data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">TABLES&nbsp;</span></p><span data-dcnode-id="1520" instrument_node="">
</span></font><font data-dcnode-id="1515" face="Geneva,Arial" size="2"><p align="CENTER" data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Security Threats to Refugees in Major Host Countries in Africa and Asia,1997</span></p><span data-dcnode-id="1516" instrument_node="">
</span></font></b><p data-dcnode-id="1511"><font data-dcnode-id="1512" face="Geneva,Arial" size="2"><span data-dcnode-id="1513" instrument_node="">&nbsp;</span></font></p><font data-dcnode-id="1509" face="Geneva,Arial" size="2"><span data-dcnode-id="1510" instrument_node="">
</span></font><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">This table summarizes the actual and potential physical threats to the main refugee groups in host countries in Africa and Asia with refugee populations of over 20,000 in 1997. The table is not exhaustive, but is intended to give some idea of the types of threats confronting refugees. The table excludes refugee populations in Europe and Palestinians refugees in the Middle East.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">[Note: Since this is a ‘snapshot’ of refugees in host countries in 1997, many refugee situations have changed, and in some cases, full repatriation has occurred (eg. Chakma returned from India to Bangladesh). If refugees entered a host country and then repatriated during 1997, they are not included in the table.]</span></p><span data-dcnode-id="1503" instrument_node="">

</span></font><font data-dcnode-id="241" face="Geneva,Arial" size="2"></font><p data-dcnode-id="233"><font data-dcnode-id="238" face="Geneva,Arial" size="2"><a data-dcnode-id="240" name="f2"></a><span data-dcnode-id="239" instrument_node="">2</span></font><font data-dcnode-id="236" face="Geneva,Arial" size="4"><span data-dcnode-id="237" instrument_node=""> </span></font><font data-dcnode-id="234" face="Times,Times New Roman"><span data-dcnode-id="235" instrument_node=""> "Nonrefugees" are exiles who should be excluded from refugee status by virtue of their involvement in crimes against humanity.</span></font></p><font data-dcnode-id="231" face="Times,Times New Roman"><span data-dcnode-id="232" instrument_node="">

</span></font><font data-dcnode-id="216" face="Geneva,Arial" size="2"></font><p data-dcnode-id="208"><font data-dcnode-id="213" face="Geneva,Arial" size="2"><a data-dcnode-id="215" name="f4"></a><span data-dcnode-id="214" instrument_node="">4</span></font><font data-dcnode-id="211" face="Geneva,Arial" size="4"><span data-dcnode-id="212" instrument_node=""> </span></font><font data-dcnode-id="209" face="Times,Times New Roman"><span data-dcnode-id="210" instrument_node="">This difference has manifested itself in the United States, when the government of Florida took a stand against the federal government’s Cuban immigration policy in 1994, and forced the federal government to reconsider its position. Presentation by Rick Nuccio at The Fletcher School of Law and Diplomacy, October 9, 1998.</span></font></p><font data-dcnode-id="206" face="Times,Times New Roman"><span data-dcnode-id="207" instrument_node="">
</span></font><font data-dcnode-id="205" face="Geneva,Arial" size="2"></font><p data-dcnode-id="188"><font data-dcnode-id="202" face="Geneva,Arial" size="2"><a data-dcnode-id="204" name="f5"></a><span data-dcnode-id="203" instrument_node="">5</span></font><font data-dcnode-id="200" face="Geneva,Arial" size="4"><span data-dcnode-id="201" instrument_node=""> </span></font><font data-dcnode-id="189" face="Times,Times New Roman"><span data-dcnode-id="199" instrument_node=""> Much has been written on the political impact of refugees. See Zolberg, A. R., Suhrke, A. and Aguayo, S., </span><i data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Escape From Violence: Conflict and the Refugee Crisis in the Developing World.</span></i><span data-dcnode-id="196" instrument_node=""> New York: Oxford University Press, 1989; Weiner, M., </span><i data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">The Global Migration Crisis: Challenges to States and Human Rights</span></i><span data-dcnode-id="193" instrument_node="">. HarperCollins, 1995. Loescher, Gil. 1993. </span><i data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Beyond Charity: International Cooperation and the Global Refugee Crisis</span></i><span data-dcnode-id="190" instrument_node="">. New York: Oxford University Press.</span></font></p><font data-dcnode-id="186" face="Times,Times New Roman"><span data-dcnode-id="187" instrument_node="">

</span></font><font data-dcnode-id="107" face="Geneva,Arial" size="2"></font><p data-dcnode-id="99"><font data-dcnode-id="104" face="Geneva,Arial" size="2"><a data-dcnode-id="106" name="f12"></a><span data-dcnode-id="105" instrument_node="">12</span></font><font data-dcnode-id="102" face="Geneva,Arial" size="4"><span data-dcnode-id="103" instrument_node=""> </span></font><font data-dcnode-id="100" face="Times,Times New Roman"><span data-dcnode-id="101" instrument_node=""> See for example the following statements by the High Commissioner, Mrs. Sadako Ogata: Statement at the Open Debate on the Secretary-General’s Report on the Situation in Africa (New York, 24 April 1998); "Humanitarian Action in Conflict Situations" (Panel discussion organized by Institute of Policy Studies, Singapore Red Cross Society and Society of International Law, Raffles Hotel, Singapore, 9 January 1998); Statement to the Foreign Policy Society, Copenhagen, 20 October 1997; Opening Statement to the 48th Session of the Executive Committee of the High Commissioner’s Programme, 13 October 1997.</span></font></p><font data-dcnode-id="97" face="Times,Times New Roman"><span data-dcnode-id="98" instrument_node="">

</span></font><font data-dcnode-id="82" face="Geneva,Arial" size="2"></font><p data-dcnode-id="71"><font data-dcnode-id="79" face="Geneva,Arial" size="2"><a data-dcnode-id="81" name="f14"></a><span data-dcnode-id="80" instrument_node="">14</span></font><font data-dcnode-id="77" face="Geneva,Arial" size="4"><span data-dcnode-id="78" instrument_node=""> </span></font><font data-dcnode-id="72" face="Times,Times New Roman"><span data-dcnode-id="76" instrument_node=""> Some country-based contingency plans do contain references to the need for screening or other security-based measures. Much depends on whether or not the host government is perceived to be able to implement protection measures. When they are, there is less need to insert security concerns into the contingency plan. OCHA’s is the first</span><i data-dcnode-id="74"><span data-dcnode-id="75" instrument_node=""> regional</span></i><span data-dcnode-id="73" instrument_node=""> contingency plan, and is still in the drafting stage.</span></font></p><font data-dcnode-id="69" face="Times,Times New Roman"><span data-dcnode-id="70" instrument_node="">
