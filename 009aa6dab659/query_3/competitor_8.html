is.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="1639" instrument_node="">UNHCR, 2020b</span></a><span data-dcnode-id="1637" instrument_node="">). With regards to departures to Germany, 2,430 persons were admitted from Turkey to Germany through the humanitarian admission program in 2019 (</span><a data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="1636" instrument_node="">UNHCR, 2020c</span></a><span data-dcnode-id="1634" instrument_node="">), as visualized in </span><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F3"><span data-dcnode-id="1633" instrument_node="">Figure 3</span></a><span data-dcnode-id="1631" instrument_node="">.</span></p><div class="DottedLine" data-dcnode-id="1629"></div><div class="Imageheaders" data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">FIGURE 3</span></div><div class="FigureDesc" data-dcnode-id="1617"><a data-dcnode-id="1625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/629675/fpos-03-629675-HTML/image_m/fpos-03-629675-g003.jpg" name="Figure3" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1626" id="F3" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/629675/fpos-03-629675-HTML/image_t/fpos-03-629675-g003.gif&amp;raw"></a><p data-dcnode-id="1618"><strong data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">FIGURE 3</span></strong><span data-dcnode-id="1622" instrument_node="">. Resettlement departures from Turkey in 2019. Source: </span><a data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="1621" instrument_node="">UNHCR (2020b)</span></a><span data-dcnode-id="1619" instrument_node="">.</span></p></div><div class="clear" data-dcnode-id="1616"></div><div class="DottedLine" data-dcnode-id="1615"></div><p class="mb15" data-dcnode-id="1610"><span data-dcnode-id="1614" instrument_node="">As outlined in the introduction, the two programs differ to some degree with regards to eligibility and the admitted refugees’ rights in Germany. As such, refugees who are resettled to Germany through the permanent resettlement program receive an initial residence permit for three years on the legal basis of section 23 (IV) of the German Residence Act. After three years, the permit can be changed into a permanent residence permit (</span><a data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="1613" instrument_node="">Caritas, 2020b</span></a><span data-dcnode-id="1611" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1602"><span data-dcnode-id="1609" instrument_node="">In contrast, the German humanitarian admission program admits Syrian refugees on the basis of section 23 (II)—instead of 23 (IV)—of the German Residence Act. Admitted persons receive an initial residence permit for two or three years, depending on the year of their arrival in Germany (</span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="1608" instrument_node="">Caritas, 2020a</span></a><span data-dcnode-id="1606" instrument_node="">). After five years of residence in Germany, they then can apply for a settlement permit if they meet certain requirements, such as a secure livelihood and sufficient knowledge of the German language (Art. 26 (4), German Residence Act). Syrian refugees who are admitted under the humanitarian admission program also face higher restrictions for family reunification than resettled refugees, but they are allowed to work and entitled to social security benefits similar to refugees admitted through resettlement (</span><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="1605" instrument_node="">Ibendahl, 2016</span></a><span data-dcnode-id="1603" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1594"><span data-dcnode-id="1601" instrument_node="">In addition to differences in eligibility and refugees’ rights in Germany, the implementation of the resettlement process also differs to some degree for the two programs. To illustrate those differences, the article applies the proposed conceptualization of the resettlement process to the two German programs, starting with the resettlement process from Jordan to Germany. The following flow chart in </span><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F4"><span data-dcnode-id="1600" instrument_node="">Figure 4</span></a><span data-dcnode-id="1598" instrument_node=""> which is based on the author’s own fieldwork insights as well the German country chapter of the UNHCR Resettlement Handbook (</span><a data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="1597" instrument_node="">UNHCR, 2018c</span></a><span data-dcnode-id="1595" instrument_node="">) thus highlights how the outlined conceptualization can be adapted to a specific resettlement program.</span></p><div class="DottedLine" data-dcnode-id="1593"></div><div class="Imageheaders" data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">FIGURE 4</span></div><div class="FigureDesc" data-dcnode-id="1584"><a data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/629675/fpos-03-629675-HTML/image_m/fpos-03-629675-g004.jpg" name="Figure4" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1590" id="F4" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/629675/fpos-03-629675-HTML/image_t/fpos-03-629675-g004.gif&amp;raw"></a><p data-dcnode-id="1585"><strong data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">FIGURE 4</span></strong><span data-dcnode-id="1586" instrument_node="">. The resettlement process from Jordan to Germany.</span></p></div><div class="clear" data-dcnode-id="1583"></div><div class="DottedLine" data-dcnode-id="1582"></div><p class="mb15" data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">As shown in the flow chart, the selection process of the German resettlement program from Jordan includes the identification and selection of refugees for resettlement by UNHCR and BAMF.</span></p><p class="mb15" data-dcnode-id="1575"><span data-dcnode-id="1579" instrument_node="">BAMF is a German federal agency under the responsibility of the Federal Ministry of the Interior (</span><a data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B3"><span data-dcnode-id="1578" instrument_node="">BAMF, 2020</span></a><span data-dcnode-id="1576" instrument_node="">). It represents Germany’s central migration authority with many different areas of responsibilities related to asylum, integration and migration to Germany. With regards to resettlement and humanitarian admission, BAMF is responsible for organizing and implementing the German programs. As such, it has both a coordinating role to ensure the smooth cooperation between the different stakeholders as well as an implementing and decision-making role, especially with regards to the selection of refugees.</span></p><p class="mb15" data-dcnode-id="1570"><span data-dcnode-id="1574" instrument_node="">Germany does not allow for dossier submissions, which means that pre-selected refugees are interviewed through selection missions by BAMF personnel in addition to the UNHCR interview. Germany also employs security and medical checks for finalizing the selection of cases (</span><a data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="1573" instrument_node="">UNHCR, 2018c</span></a><span data-dcnode-id="1571" instrument_node="">). Security checks are carried out by German security authorities, while the medical check is conducted by IOM personnel (ibid.). Once the selection is finalized, the German foreign mission handles the visa procedure and UNHCR and IOM carry out other departure preparations. IOM is also contracted by the German authorities to conduct a pre-departure orientation for all selected refugees prior to their travel to Germany (ibid.).</span></p><p class="mb15" data-dcnode-id="1555"><span data-dcnode-id="1569" instrument_node="">After their travel to Germany, which is also organized by IOM, resettled refugees (except for critically ill persons and unaccompanied minors) stay in a reception center in Friedland. After two weeks in Friedland, they are distributed amongst the different federal Länder according to the “Königstein Key” (</span><a data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="1568" instrument_node="">Grote et al., 2016</span></a><span data-dcnode-id="1566" instrument_node="">)</span><a data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn5"><sup data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">5</span></sup></a><span data-dcnode-id="1562" instrument_node="">. The federal Länder then further assign the resettled refugees to the different municipalities who are responsible for the refugees’ reception. Given that the reception of refugees falls into the competence of the federal Länder, the reception in the municipalities may vary widely depending on the specific federal Land (</span><a data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="1561" instrument_node="">Grote et al., 2016</span></a><span data-dcnode-id="1559" instrument_node="">; </span><a data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="1558" instrument_node="">Caritas, 2020a</span></a><span data-dcnode-id="1556" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Consequently, while the selection process, the departure preparations and travel to Germany are more or less the same for the different resettlement cases and fall into the responsibility of a few main stakeholders, the reception and integration process is implemented by many different stakeholders, including local immigration authorities and municipalities, and may look very different depending on the federal Land.</span></p><p class="mb15" data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">With regards to the main stakeholders in the process, the flowchart displays that UNHCR and BAMF play a major role for selecting refugees for resettlement from Jordan to Germany. The flow chart also shows that, while cases might be referred internally from other UNHCR units or externally by NGOs, the Jordanian government is not involved in the selection process.</span></p><p class="mb15" data-dcnode-id="1546"><span data-dcnode-id="1550" instrument_node="">This is different for the German humanitarian admission program from Turkey where the host country government is involved in the selection and referral of refugees for resettlement considerations. In particular, the Turkish migration authorities called Directorate General of Migration Management (DGMM) pre-identifies cases for resettlement amongst Syrian refugees registered in Turkey and refers those cases to UNHCR. UNHCR then follows up with the referred cases as outlined above (interviewees from UNHCR Turkey 2019, and EASO 2019). The humanitarian admission process from Turkey to Germany thus includes an additional stakeholder and stage in the selection process, as illustrated in the following flow chart in </span><a data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F5"><span data-dcnode-id="1549" instrument_node="">Figure 5</span></a><span data-dcnode-id="1547" instrument_node="">.</span></p><div class="DottedLine" data-dcnode-id="1545"></div><div class="Imageheaders" data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">FIGURE 5</span></div><div class="FigureDesc" data-dcnode-id="1536"><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/629675/fpos-03-629675-HTML/image_m/fpos-03-629675-g005.jpg" name="Figure5" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1542" id="F5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/629675/fpos-03-629675-HTML/image_t/fpos-03-629675-g005.gif&amp;raw"></a><p data-dcnode-id="1537"><strong data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">FIGURE 5</span></strong><span data-dcnode-id="1538" instrument_node="">. The humanitarian admission process from Turkey to Germany.</span></p></div><div class="clear" data-dcnode-id="1535"></div><div class="DottedLine" data-dcnode-id="1534"></div><p class="mb15" data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Although the outlined humanitarian admission process includes an additional stage and stakeholder in the selection process, this does not necessarily mean that the process takes longer than the resettlement process from Jordan to Germany. In fact, refugees who were resettled either from Jordan or Turkey and were interviewed by the author during their stay in Friedland, reported no significant differences in the duration of ‘their’ resettlement process. Most refugees who were resettled from Jordan indicated that their resettlement process took around five to nine months (there was one family whose resettlement process took almost two years, but this was an exception amongst the interviewees). For refugees admitted from Turkey, the process tended to be only slightly longer, ranging from approximately six months to one year.</span></p><p class="mb15" data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">After providing an overview about the German resettlement and humanitarian admission processes and their implementation, the following sections will analyze the responsibilities, objectives and interdependencies of UNHCR and BAMF as the two main stakeholders responsible for the selection of refugees in both programs.</span></p><p class="mb15" data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">To do so, the next section will firstly introduce the concept of multi-level governance as a theoretical lens to analyze the interactions and interdependencies of stakeholders in the resettlement process.</span></p><a class="reset-hash-position" data-dcnode-id="1527" id="h6" name="h6"></a><h2 data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">The Multi-Level Governance of Refugee Resettlement</span></h2><p class="mb15" data-dcnode-id="1511"><span data-dcnode-id="1524" instrument_node="">The concept of multi-level governance (MLG) stresses the diffusion of authority and decision-making competences amongst actors across subnational, national and supranational levels of governance (</span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="1523" instrument_node="">Hooghe and Marks, 2001</span></a><span data-dcnode-id="1521" instrument_node="">). Traditionally, the concept was employed to capture changes in decision-making competencies due to European integration (</span><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="1520" instrument_node="">Hooghe and Marks, 2001</span></a><span data-dcnode-id="1518" instrument_node="">). As such, multi-level governance stresses the shift from nation states as sole decision-makers in the European Union to a new system of governance that incorporates state and non-state actors on subnational, national and supranational levels (ibid.). However, the concept has also been employed for studies that are not primarily concerned with EU-state relationships (see for instance </span><a data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="1517" instrument_node="">Betsill and Bulkeley, 2006</span></a><span data-dcnode-id="1515" instrument_node="">; </span><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="1514" instrument_node="">Hepburn and Zapata-Barrero, 2014</span></a><span data-dcnode-id="1512" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1503"><span data-dcnode-id="1510" instrument_node="">Moving beyond European studies, authors have examined how decision-making and implementation of national policies is moved upwards (to EU and/or international organizations), downwards (for instance to local authorities), and outwards (for instance to civil society). Hereby, the interactions of actors responsible for decision-making and implementation merit special attention, since “a minimal degree of bargaining and negotiation among all of the involved institutions and actors should take place before one can speak of MLG” (</span><a data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="1509" instrument_node="">Adam and Caponio, 2019</span></a><span data-dcnode-id="1507" instrument_node="">, 27). Such interactions can take place horizontally between actors on the same level of governance (e.g., between public and private actors). In addition, interactions can also take place between different levels of governance (e.g., between a national government and an international organization). These interactions are defined as vertical relations (</span><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="1506" instrument_node="">Zapata-Barrero and Barker, 2014</span></a><span data-dcnode-id="1504" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1498"><span data-dcnode-id="1502" instrument_node="">Scholars have also analyzed the nature of those interactions. For instance, </span><a data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1501" instrument_node="">Lavenex (2015)</span></a><span data-dcnode-id="1499" instrument_node=""> discusses three different types of relationships between international organizations (IOs) and the EU in relation to EU external migration policies, where international organizations can either act as agenda-setters, rule transmitters or subcontractors for EU institutions.</span></p><p class="mb15" data-dcnode-id="1490"><span data-dcnode-id="1497" instrument_node="">Thereby, the notion of IOs as agender-setters is linked to the idea that IOs act as counterweights vis-à-vis EU actors, whereby IOs “seek to complement and correct EU policies where they perceive deficiencies with respect to their own migration policy mandate” (</span><a data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1496" instrument_node="">Lavenex, 2015</span></a><span data-dcnode-id="1494" instrument_node="">, 2). For instance, </span><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1493" instrument_node="">Lavenex (2015)</span></a><span data-dcnode-id="1491" instrument_node=""> explains how UNHCR, as the guardian of the principles agreed in the 1951 Geneva Refugee Convention, seeks to bring human rights aspects of asylum legislation (back) into EU policy making.</span></p><p class="mb15" data-dcnode-id="1485"><span data-dcnode-id="1489" instrument_node="">IOs can also act as rule transmitters for EU institutions. In this case, IOs are not directly involved in the implementation of EU policies, but nevertheless add to the EU’s ambitions and goals in relation to third countries. As such, the author argues that UNHCR’s involvement in refugee status determination in countries neighboring the EU which do not employ a national asylum procedure is “conducive to the EU’s ambitions to develop asylum systems in surrounding countries” (</span><a data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1488" instrument_node="">Lavenex, 2015</span></a><span data-dcnode-id="1486" instrument_node="">, 13).</span></p><p class="mb15" data-dcnode-id="1480"><span data-dcnode-id="1484" instrument_node="">Lastly, the conceptualization of IOs as subcontractors for EU institutions refers to the outsourcing of EU projects’ implementation to those institutions. Indeed, IOs such as UNHCR and IOM have become important actors in implementing programs in the realm of EU external migration policies and accordingly, the EU has become an important source of funding for IOs (</span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1483" instrument_node="">Lavenex, 2015</span></a><span data-dcnode-id="1481" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">In a nutshell, MLG can thus be characterized as the diffusion of power amongst different stakeholders on different levels of governance. It is important to note that “stakeholders” are defined in this article as the different organizations (e.g., UNHCR and BAMF) responsible for the implementation of the resettlement process. Consequently, the article examines the interactions of stakeholders on the organization level instead of the individual level.</span></p><p class="mb15" data-dcnode-id="1473"><span data-dcnode-id="1477" instrument_node="">Indeed, refugee resettlement is–and always has been–inherently multi-level governance (</span><a data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B25"><span data-dcnode-id="1476" instrument_node="">Garnier et al., 2018</span></a><span data-dcnode-id="1474" instrument_node="">). From a resettlement country’s perspective, the pre-selection of refugees takes place outside the national realm by UNHCR and/or host country governments, the final selection and admission is granted by resettlement country governments on the national level and settlement and integration takes place on the local level within the resettlement country. Resettlement thus involves many different stakeholders at the international, national and local level, including international organizations, national ministries, and civil society organizations. These stakeholders cooperate and bargain with each other according to their objectives in the resettlement process.</span></p><p class="mb15" data-dcnode-id="1467"><span data-dcnode-id="1472" instrument_node="">Such objectives depend on the stakeholders’ specific responsibilities within the resettlement process. Consequently, the same stakeholder might have different objectives in different implementation stages. It is important to note here that the article is not concerned with the overarching rationale of stakeholders to engage in resettlement activities in the first place</span><a data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn6"><sup data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">6</span></sup></a><span data-dcnode-id="1468" instrument_node="">. Instead, the article focuses on the different responsibilities and objectives of stakeholders throughout the implementation of the resettlement process. By doing so, the article will shed light on interdependencies of implementing stakeholders and how they coordinate and negotiate the resettlement process.</span></p><p class="mb15" data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">As stated above, the focus will be on UNHCR and BAMF as two main stakeholders engaged in the selection of refugees for resettlement and humanitarian admission to Germany. By examining both stakeholders’ responsibilities and (sometimes diverging) objectives in the selection process, the article will shed light on UNHCR’s and BAMF’s interdependencies in the selection process and beyond.</span></p><a class="reset-hash-position" data-dcnode-id="1464" id="h7" name="h7"></a><h2 data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">UNHCR’s and BAMF’s Responsibilities in the Resettlement Process</span></h2><p data-dcnode-id="1457" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><span data-dcnode-id="1461" instrument_node="">“Every actor involved in resettlement efforts–including different ministries and executive agencies, as well as local authorities and nonprofit organization–has its own goals” (</span><a data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1460" instrument_node="">Beirens and Fratzke, 2017</span></a><span data-dcnode-id="1458" instrument_node="">, 10)</span></p><p class="mb15" data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">As discussed above, UNHCR and BAMF select refugees for resettlement based on inclusion criteria. In addition, both stakeholders are involved (to a varying degree) throughout the whole process. Therefore, this section outlines the responsibilities and objectives of UNHCR and BAMF in the selection process and beyond.</span></p><h3 class="pt0" data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">UNHCR</span></h3><p class="mb0" data-dcnode-id="1445"><span data-dcnode-id="1452" instrument_node="">The schematic overviews illustrate that UNHCR is either the first, in the case of resettlement from Jordan, or the second, in the case of humanitarian admission from Turkey, stakeholder to review cases and to select refugees for resettlement. UNHCR does so based on “rule-based, vulnerability-focused resettlement criteria” (</span><a data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B28"><span data-dcnode-id="1451" instrument_node="">Garnier, 2016</span></a><span data-dcnode-id="1449" instrument_node="">, 66) which are outlined in the UNHCR resettlement handbook as submission categories (</span><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1448" instrument_node="">UNHCR, 2011</span></a><span data-dcnode-id="1446" instrument_node="">). In order to be considered for resettlement, refugees must meet the requirements of at least one of the submission categories. The categories are legal and/or physical protection needs (such as a threat for arbitrary arrest in the host country), survivors of violence and/or torture, medical needs, women and girls at risk, family reunification (in order to reunite with family in a resettlement country), children and adolescents at risk and a lack of foreseeable alternative durable solutions. The last category refers to situations where both voluntary repatriation to the home country as well as local integration in the host country is not deemed possible for the refugees in question (ibid.).</span></p><p class="mb0" data-dcnode-id="1433"><span data-dcnode-id="1444" instrument_node="">In a nutshell, UNHCR’s submission categories are based on refugees’ vulnerabilities and protection risks in the host country and do not take refugees’ prospects to integrate in a specific resettlement country into account (</span><a data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="1443" instrument_node="">Westerby, 2020</span></a><span data-dcnode-id="1441" instrument_node="">). Based on these submission categories, UNHCR field-offices in host countries pre-select refugees for resettlement. The process to do so is also outlined in the UNHCR resettlement handbook. As stated above, it includes inter alia external and internal referrals and general case identification, the conduct of the resettlement interview, the preparation of a resettlement registration form for every case, and the review process for the selected cases (</span><a data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1440" instrument_node="">UNHCR, 2011</span></a><span data-dcnode-id="1438" instrument_node="">)</span><a data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn7"><sup data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">7</span></sup></a><span data-dcnode-id="1434" instrument_node="">.</span></p><p class="mb0" data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">As a next step, UNHCR identifies suitable resettlement countries and submits the selected cases to the identified resettlement country. The identification of a suitable resettlement country is easier said than done and is based on a whole variety of factors. These include for instance family links to the resettlement country, the annual quota of resettlement countries as well as the resettlement countries own selection criteria and admission priorities (ibid.).</span></p><p class="mb0" data-dcnode-id="1426"><span data-dcnode-id="1430" instrument_node="">Resettlement countries’ selection criteria are additional to UNHCR’s submission categories based on vulnerability and can be divided into “program-level criteria” and “non-Convention criteria” (</span><a data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="1429" instrument_node="">Westerby, 2020</span></a><span data-dcnode-id="1427" instrument_node="">). As such, program-level criteria are based on the resettlement country’s available resources to admit and host refugees. For instance, many resettlement countries have problems to find suitable accommodation for large families and therefore do not accept those families. This can become a problem for UNHCR (and most of all for the affected refugees), since large families are often the most vulnerable refugees and in urgent need of resettlement (interviewee from UNHCR Jordan 2019). Resettlement countries also generally pose a quota for medical cases (i.e., refugees with severe medical needs) that UNHCR needs to take into account for its referrals.</span></p><p class="mb0" data-dcnode-id="1421"><span data-dcnode-id="1425" instrument_node="">Besides program-level criteria, some resettlement countries also employ other national selection criteria. Those “non-Convention criteria” are not anchored in international refugee law. Instead, they are often related to refugees’ individual “integration potential” in the resettlement country and may include refugees’ education and work experience as well as the refugees’ religious beliefs (</span><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="1424" instrument_node="">Westerby, 2020</span></a><span data-dcnode-id="1422" instrument_node="">). Timing also plays a role: for instance, some resettlement countries might meet their annual quota earlier in the year, thus reducing the options for UNHCR to match refugees with suitable resettlement countries for the rest of the year (interviewee from UNHCR Jordan 2019).</span></p><p class="mb0" data-dcnode-id="1410"><span data-dcnode-id="1420" instrument_node="">Once suitable resettlement countries are determined and the dossiers are submitted, UNHCR is still responsible for counseling refugees throughout the remaining process. Thereby, one of UNHCR’s main roles is to manage refugees’ expectations about resettlement (</span><a data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1419" instrument_node="">UNHCR, 2011</span></a><span data-dcnode-id="1417" instrument_node="">). Given that resettlement often represents the only durable solution for refugees, it is a highly sought-after opportunity amongst refugee populations which may lead to unrealistic expectations with regards to resettlement. UNHCR’s role is thus to counsel refugees throughout the process and to provide them with information on “the limits and possibilities of resettlement” (</span><a data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1416" instrument_node="">UNHCR, 2011</span></a><span data-dcnode-id="1414" instrument_node="">, 142). UNHCR also follows up with their cases (e.g., registering new-born babies) and coordinates the admission process (e.g., with regards to departure preparations) with the other stakeholders. As such, refugees remain under the mandate of UNHCR until they depart to their resettlement country. Once they arrive at their destination, the resettlement country takes over the responsibility for the integration of the resettled refugees (</span><a data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="1413" instrument_node="">Sandvik, 2011</span></a><span data-dcnode-id="1411" instrument_node="">).</span></p><h3 class="pt0" data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">BAMF</span></h3><p class="mb0" data-dcnode-id="1403"><span data-dcnode-id="1407" instrument_node="">Once UNHCR has identified Germany as a suitable resettlement country and has submitted the dossiers to BAMF for follow-up, BAMF screens the dossiers and invites suitable refugees for an interview. As outlined above, this is at least the second interview (and not the last one) that refugees go through in order to be selected for resettlement. The selection process can thus be described as a “duplicative process whereby refugees are often doubly screened for credibility and resettlement eligibility” (</span><a data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="1406" instrument_node="">Labman, 2019</span></a><span data-dcnode-id="1404" instrument_node="">, 60).</span></p><p class="mb0" data-dcnode-id="1398"><span data-dcnode-id="1402" instrument_node="">To conduct the interviews, selection teams deployed by BAMF normally travel to the host country and carry out the interviews locally. As outlined in the Germany country chapter of the UNHCR resettlement handbook, these interviews serve to “verify information provided in the dossiers, to double check and if necessary update personal data, to assess school and occupational qualifications and to determine personal needs” (</span><a data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="1401" instrument_node="">UNHCR, 2018c</span></a><span data-dcnode-id="1399" instrument_node="">, 6).</span></p><p class="mb0" data-dcnode-id="1393"><span data-dcnode-id="1397" instrument_node="">The BAMF interviews are also used to select refugees based on Germany’s national selection criteria. These criteria include the preservation of family unity, family or other ties in Germany conducive to integration, the need for protection and the ability to become integrated in Germany. For the last criterion, the level of school and occupational training, work experience, language skills and a young age are considered as indicators for refugees’ “integration potential” (</span><a data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="1396" instrument_node="">UNHCR, 2018c</span></a><span data-dcnode-id="1394" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">The Germany country chapter also outlines the German quota for medical cases, which is five percent for resettlement (e.g., from Jordan) and three percent for humanitarian admissions. Germany thus employs both ‘program-level criteria’ and ‘non-Convention criteria’ as discussed above.</span></p><p class="mb0" data-dcnode-id="1386"><span data-dcnode-id="1390" instrument_node="">After finalizing the case selection, BAMF hands over the cases to the German security authorities who conduct an additional security check followed by the final decision on the admission of the cases by BAMF. If the decision is positive, the German foreign mission abroad handles the visa procedure and BAMF instructs IOM to organize the travel of the selected refugees. IOM also conducts the medical check and carries out a pre-departure orientation for the refugees. Lastly, BAMF staff might accompany refugees on their flight to Germany before handing over the responsibility to the local authorities after the arrival in Germany (</span><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="1389" instrument_node="">UNHCR, 2018c</span></a><span data-dcnode-id="1387" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Both UNHCR and BAMF thus play a crucial role in the selection process as well as a coordinating role throughout the whole admission process. Still, their responsibilities and objectives differ throughout the process: while UNHCR’s main role is to ensure that the most vulnerable refugees are pre-selected for resettlement, BAMF’s main responsibility lies in selecting refugees according to Germany’s national selection criteria. These include–but also go beyond–vulnerability and protection concerns. Both stakeholders thus need to navigate and negotiate their individual mandates throughout the selection process while making sure to successfully implement the whole resettlement process. The following section therefore takes a closer look at the two stakeholders’ diverging objectives in selecting refugees for resettlement while highlighting their interdependencies within the process.</span></p><a class="reset-hash-position" data-dcnode-id="1383" id="h8" name="h8"></a><h2 data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">UNHCR’s and BAMF’s Objectives and Interdependencies in the Resettlement Process</span></h2><p class="mb15" data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">As stated above, UNHCR is responsible for identifying refugees for resettlement based on their vulnerability (according to UNHCR’s submission categories), while BAMF selects refugees according to Germany’s selection criteria that include, but also go beyond, vulnerability and protection risks considerations. One of the main differences between UNHCR’s and BAMF’s objectives in the selection process thus lies in their different prioritization of vulnerability criteria for refugees’ selection for resettlement.</span></p><p class="mb15" data-dcnode-id="1371"><span data-dcnode-id="1378" instrument_node="">As such, UNHCR identifies refugees for resettlement based on “objective need rather than on the subjective desire of refugees themselves or other actors such as host states or resettlement states” (</span><a data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="1377" instrument_node="">Labman, 2019</span></a><span data-dcnode-id="1375" instrument_node="">, 27). If this is entirely true is impossible to verify, since all implementation processes include a degree of agency and discretion of implementing actors (</span><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="1374" instrument_node="">Lipsky, 2010</span></a><span data-dcnode-id="1372" instrument_node="">). Still, there is a clear distinction between UNHCR’s and BAMF’s objectives in the selection of refugees due to the fact that UNHCR is not considering the prospective integration of refugees in Germany. In contrast, BAMF is responsible for selecting those most vulnerable refugees who the German government deems able to integrate (better) in Germany.</span></p><h3 class="pt0" data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">“Integration Potential” as Selection Criterion for Resettlement</span></h3><p class="mb0" data-dcnode-id="1355"><span data-dcnode-id="1368" instrument_node="">As stated above, Germany is not the only resettlement country that employs national selection criteria in addition to UNHCR’s submission criteria. In fact, especially European resettlement countries often employ national selection criteria, such as refugees’ “integration potential,” in their selection process (see the country chapters of the UNHCR Resettlement Handbook as well as </span><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B14"><span data-dcnode-id="1367" instrument_node="">Cellini, 2018</span></a><span data-dcnode-id="1365" instrument_node="">; </span><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="1364" instrument_node="">Westerby, 2020</span></a><span data-dcnode-id="1362" instrument_node="">). Ireland, for instance, even goes as far as to include in its country chapter that Ireland “requires a ‘balanced’ caseload. This […] must also include community leaders and, where possible, spiritual leaders” (</span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="1361" instrument_node="">UNHCR, 2018d</span></a><span data-dcnode-id="1359" instrument_node="">, 4). Besides, also the EU Commission’s proposal for an EU resettlement framework refers to “social or cultural links, or other characteristics that can facilitate integration” (</span><a data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="1358" instrument_node="">European Commission, 2016</span></a><span data-dcnode-id="1356" instrument_node="">, Article 10) as considerations for selecting refugees for resettlement.</span></p><p class="mb0" data-dcnode-id="1341"><span data-dcnode-id="1354" instrument_node="">This tendency to include refugees’ “integration potential” as an additional selection criteria for resettlement has received considerable criticism from civil society organizations and scholars alike (see for instance </span><a data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="1353" instrument_node="">ECRE, 2017</span></a><span data-dcnode-id="1351" instrument_node="">; </span><a data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="1350" instrument_node="">Bamberg, 2018</span></a><span data-dcnode-id="1348" instrument_node="">; </span><a data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="1347" instrument_node="">Westerby, 2020</span></a><span data-dcnode-id="1345" instrument_node="">). Often, it is perceived as a means for resettlement countries to only select “desired” refugees, and hence transforming resettlement into a tool for migration management. Also the UNHCR resettlement handbook specifically states that “the notion of integration potential should not negatively influence the selection and promotion of resettlement cases” (</span><a data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1344" instrument_node="">UNHCR, 2011</span></a><span data-dcnode-id="1342" instrument_node="">, 245). In this line of argumentation, the responsibility lies with the resettlement country to ensure that refugees can integrate in the resettlement country and not the other way around (interviewee from UNHCR Jordan 2019).</span></p><p class="mb0" data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">However, from a resettlement country’s perspective it could also be argued that it is easier for refugees to acclimate and settle down in a resettlement country when they possess a “higher integration potential.” Taking refugees’ social and cultural links to a resettlement country into account in the selection would thus also be in the interest of the selected refugees.</span></p><p class="mb0" data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Although this argument might apply to the situation of some pre-selected refugees, and notwithstanding the paternalism it displays, it is important to remember the possibilities refugees have when they are not selected for resettlement which are more often than not: none. Consequently, many refugees might rather opt for encountering obstacles in their integration in a resettlement country than the precarious conditions they are faced with in the host country. For instance, one interviewed refugee who was resettled from Turkey to Germany, and who was afraid of racism and how she would integrate in Germany, stated that “the situation in Germany is a thousand times better than in Turkey. I would have always said yes to resettlement” (refugee interviewee, Friedland 2019). Then again, others might not. The point here is to take the agency of pre-selected refugees into account instead of assuming what would be in their best interest.</span></p><p class="mb0" data-dcnode-id="1329"><span data-dcnode-id="1336" instrument_node="">In addition to the criticism of employing “integration potential” as a selection criterion, it also remains unclear how BAMF operationalizes said criterion. </span><a data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="1335" instrument_node="">Welfens and Bonjour (2020)</span></a><span data-dcnode-id="1333" instrument_node=""> point out in their analysis of family norms in the selection process of Germany’s program from Turkey, that “how exactly the BAMF assesses “integration potential” or in which instances it is deemed to be “too low” remains opaque” (</span><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="1332" instrument_node="">Welfens and Bonjour, 2020</span></a><span data-dcnode-id="1330" instrument_node="">, 15). The authors also provide a quote from a BAMF representative who, after being asked about BAMF’s definition of ‘integration capacity’ at a resettlement expert meeting, responded by saying:</span></p><p data-dcnode-id="1324" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><span data-dcnode-id="1328" instrument_node="">“Well capacity is … I would rather say “perspective” and I would say that there are no fixed criteria that you can specify in an administrative regulation. Rather we ask about personal ideas about the life in Germany …we also emphasize that Germany is an open society, that it is very diverse, freedom of religion—and we ask concretely about that […]” (interviewee from BAMF as quoted in </span><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="1327" instrument_node="">Welfens and Bonjour, 2020</span></a><span data-dcnode-id="1325" instrument_node="">, 15).</span></p><p class="mb0" data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Indeed, many interviewed resettled refugees mentioned that the interview with BAMF personnel included information about Germany, such as German culture, democratic principles as well as rights and obligations. Some respondents also pointed out that they were asked about their religion and their habits with regards to praying and fasting. In addition, one respondent mentioned that he was being asked “weird” questions, such as “Would you help a German man who is beaten by Arabs?” (refugee interviewee, Friedland 2019).</span></p><p class="mb0" data-dcnode-id="1317"><span data-dcnode-id="1321" instrument_node="">Still, these are only snapshots of refugees’ interview experiences that do not explain how ‘integration potential’ is actually operationalized by BAMF. Nor is it clear how much weight BAMF personnel puts on ‘integration potential’ considerations when selecting refugees for resettlement. In this regard, there might be a “discursive gap” (</span><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="1320" instrument_node="">Czaika and Haas, 2013</span></a><span data-dcnode-id="1318" instrument_node="">) between the public policy discourse on “integration potential” as a selection criterion in resettlement programs and actual policies on paper. In addition, there might also be an “implementation gap,” pointing to a discrepancy between policies on paper (that are not publicly available) on the operationalization of the ‘integration potential’ and their actual implementation (ibid.) Thus, although the introduction of ‘integration potential’ as an additional selection criterion for resettlement has received considerable criticism–both on the EU- as well as the national level–its operationalization and its importance for refugees’ selection remain a black-box.</span></p><p class="mb0" data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Notwithstanding these discrepancies, the above discussion highlights that viewpoints on refugees’ “integration potential” as a selection criterion for resettlement can differ considerably between stakeholders involved in the resettlement process and other stakeholders working on resettlement. Still, and despite diverging objectives, the following analysis highlights that stakeholders depend on each other in the process in order to successfully implement the resettlement programs.</span></p><h3 class="pt0" data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">UNHCR’s and BAMF’s Interdependencies in the Resettlement Process</span></h3><p class="mb0" data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Since resettlement is a process where the activity of one stakeholder feeds into the activity of the next stakeholder, interdependencies between stakeholders exist in and between all stages of the process. During the selection process, stakeholders are dependent on the (pre-) selection conducted by other stakeholder(s) first in line. In the case of humanitarian admission from Turkey, UNHCR is dependent on the Turkish migration authorities, since only refugees that are referred by them can be reviewed for resettlement by UNHCR. As a result, UNHCR might not be able to consider all refugees who would fall under the UNHCR submission categories for the pre-selection in Turkey.</span></p><p class="mb0" data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">In contrast, the Jordanian government is not involved in resettlement activities. With regards to resettlement from Jordan, UNHCR is thus the first stakeholder pre-selecting refugees for resettlement without being dependent on referrals from host government authorities.</span></p><p class="mb0" data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">In both processes, however, BAMF is dependent on UNHCR’s pre-selection of refugees. Consequently, refugees are first selected according to UNHCR’s vulnerability criteria and then according to Germany’s national selection criteria. The German national selection criteria are thus only applied for the pool of cases that has been pre-identified by UNHCR. Even if BAMF takes refugees’ “integration potential” into account for the final selection, “cherry-picking” is not possible amongst all refugees, but only amongst those who were pre-selected by UNHCR and are therefore deemed (the most) vulnerable by UNHCR.</span></p><p class="mb0" data-dcnode-id="1298"><span data-dcnode-id="1306" instrument_node="">On the other hand, UNHCR is also depended on BAMF to accept the pre-selected refugees. Thus, only pre-screened candidates who have the prospect of being selected by BAMF are referred, which again might not necessarily include the most vulnerable refugees in the pre-selected pool of cases. Indeed, this creates a dilemma for UNHCR. On the one hand, UNHCR is responsible to ensure that the most vulnerable refugees are selected for resettlement. On the other hand, UNHCR staff is advised to take “selection criteria and admission priorities of resettlement countries” (</span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1305" instrument_node="">UNHCR, 2011</span></a><span data-dcnode-id="1303" instrument_node="">, 354) into account for the identification of suitable resettlement countries to ensure that cases have a chance to be accepted by the identified resettlement country</span><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn8"><sup data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">8</span></sup></a><span data-dcnode-id="1299" instrument_node="">.</span></p><p class="mb0" data-dcnode-id="1290"><span data-dcnode-id="1297" instrument_node="">As such, UNHCR could be perceived as a “subcontractor” (</span><a data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1296" instrument_node="">Lavenex, 2015</span></a><span data-dcnode-id="1294" instrument_node="">) for the implementation of Germany’s resettlement and humanitarian admission programs by providing the groundwork for BAMF to make their selection of refugees. However, BAMF is also dependent on UNHCR’s pre-selection and ongoing coordination of the resettlement and humanitarian admission processes. Due to these interdependencies, UNHCR’s and BAMF’s relationship in the multi-level governance of the resettlement process could be rather described as an (unequal) partnership than a subcontracting relationship. As such, the implementation of the programs is not entirely delegated to UNHCR and UNHCR can still shape the programs according to its own mandate to some extent. It could thus be argued that, although UNHCR is an agent in the implementation of the German resettlement programs, the agency also acts as “agender-setter” and “counterweight.” In this regard, UNHCR seeks to “complement and correct” (</span><a data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1293" instrument_node="">Lavenex, 2015</span></a><span data-dcnode-id="1291" instrument_node="">, 2) the specific resettlement programs according to its mandate as the guardian of the 1951 Geneva Refugee Convention. Still, the ultimate decision-making authority with regards to refugees’ selection lies with BAMF.</span></p><p class="mb0" data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">More general, it can be argued that the diversification of resettlement programs in the last decade shifts a considerable degree of authority over resettlement programming back to resettlement countries. Whereas the traditional view on resettlement foresees a reliance on UNHCR’s submission categories as the sole selection criteria, the diversification of programs and the subsequent reliance on national selection criteria reinforces resettlement countries’ decision-making authority in resettlement.</span></p><p class="mb0" data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Consequently, whereas multi-level governance foresees a shift from nation states as sole decision-makers to a diffusion of power amongst stakeholders on subnational, national and supranational levels, developments in the field of resettlement since the early 2000 rather suggest a shift of decision-making authority back to nation states.</span></p><p class="mb0" data-dcnode-id="1281"><span data-dcnode-id="1285" instrument_node="">To capture power relations beyond the relationships of stakeholders in implementing the resettlement process, it is also important to keep in mind how international organizations are funded–which is primarily by donor governments (</span><a data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1284" instrument_node="">Roper and Barria, 2010</span></a><span data-dcnode-id="1282" instrument_node="">). In the case of UNHCR, Germany actually represents one of the major donor countries.</span></p><p class="mb0" data-dcnode-id="1270"><span data-dcnode-id="1280" instrument_node="">In 2019 and 2020, Germany ranked third amongst the largest donor countries to UNHCR after the United States and the European Union with a contribution of USD 390.5 million in 2019 and USD 447 million in 2020 (</span><a data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="1279" instrument_node="">UNHCR, 2021a</span></a><span data-dcnode-id="1277" instrument_node="">; </span><a data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="1276" instrument_node="">UNHCR, 2020a</span></a><span data-dcnode-id="1274" instrument_node="">). In 2018, Germany even represented–for the first time in history–the second largest donor to UNHCR after the United States but before the European Union with a contribution of USD 476.9 million (</span><a data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="1273" instrument_node="">UNHCR, 2018e</span></a><span data-dcnode-id="1271" instrument_node="">). To carry out its mandate, UNHCR is thus dependent on funding by the German government, as well as on other major donors such as the United States and the European Union.</span></p><p class="mb0" data-dcnode-id="1253"><span data-dcnode-id="1269" instrument_node="">Consequently, the concept of international organization as “agents in the implementation of EU policies” (</span><a data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1268" instrument_node="">Lavenex, 2015</span></a><span data-dcnode-id="1266" instrument_node="">, 7) who are dependent on funding and support by their donors can also be applied to the relationship between UNHCR and Germany more broadly. In this regard, there is a clear power imbalance between Germany as donor and UNHCR as funding receiver. Still, literature (see for instance </span><a data-dcnode-id="1264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="1265" instrument_node="">Garnier, 2014</span></a><span data-dcnode-id="1263" instrument_node="">; </span><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="1262" instrument_node="">Barnett, 2001</span></a><span data-dcnode-id="1260" instrument_node="">; </span><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1259" instrument_node="">Barnett and Finnemore 1999</span></a><span data-dcnode-id="1257" instrument_node="">; </span><a data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="1256" instrument_node="">Chimni, 1998</span></a><span data-dcnode-id="1254" instrument_node="">) has pointed out how UNHCR has gained autonomy vis-à-vis states. Garnier for instance refers to the “significant degree of UNHCR’s institutional autonomy” (2014, 954) and Chimni points out that UNHCR’s role is to “be a guardian of the larger interests of the coalition which establishes and sustains it, not the individual interests of its members. This often brings the organization in confrontation with even its more powerful members” (1998, 368). Despite the organization’s dependence on donor countries, including Germany, UNHCR can thus still play a role as “agenda-setter” and “counterweight” to states’ actions.</span></p><a class="reset-hash-position" data-dcnode-id="1252" id="h9" name="h9"></a><h2 data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Conclusion</span></h2><p class="mb15" data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Starting with the observation that resettlement programs have diversified since the early 2000s, the article provided an overview about historical and current approaches towards resettlement. Thereby, it was argued that with the increase of resettlement countries, also perceptions about resettlement and motivations for offering resettlement places have become more diverse. As such, resettlement is increasingly cited as a tool for migration management. In addition, resettlement countries often opt to respond to “hot conflicts” through humanitarian admission programs instead of permanent resettlement programs.</span></p><p class="mb15" data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Such humanitarian admission programs are mostly perceived by resettlement countries as a temporary solution and tend to give less rights to admitted refugees: in the case of Germany, for instance, refugees admitted through the humanitarian admission program from Turkey can only apply for a settlement permit after five years, whereas refugees admitted via resettlement can already apply for a settlement permit after three years of residence in Germany. Consequently, it is important to distinguish between the different resettlement and humanitarian admission programs and to shed light on their similarities and differences.</span></p><p class="mb15" data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">The article did so by proposing a new conceptualization of the resettlement process and by applying the general overview to two exemplary programs: the German resettlement program from Jordan and the German humanitarian admission program from Turkey.</span></p><p class="mb15" data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Given that resettlement (and humanitarian admission) processes are implemented by many different stakeholders who coordinate and negotiate the processes across different levels of governance, the article employed the concept of multi-level governance as a theoretical lens for its analysis. As such, the article focused on UNHCR and BAMF as two main stakeholders responsible for the selection of refugees based on inclusion criteria and outlined their responsibilities and objectives in the selection process and beyond.</span></p><p class="mb15" data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">For UNHCR, some of the main responsibilities in both the resettlement as well as the humanitarian admission process is to pre-select refugees based on vulnerability criteria while also taking into account the preferences of resettlement countries. In addition, UNHCR is responsible for supporting and guiding refugees throughout the whole process. Managing refugees’ expectations as well as accommodating the demands and preferences of resettlement countries, including Germany, thus represents a major challenge for UNHCR in the implementation of the resettlement and humanitarian admission processes.</span></p><p class="mb15" data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">In contrast, BAMF is responsible for selecting refugees according to Germany’s selection criteria, which include but also go beyond UNHCR’s submission categories. In addition, BAMF coordinates and cooperates with other German and international stakeholders to finalize the selection of refugees and to ensure a smooth process as well as the refugees’ departure and arrival in Germany.</span></p><p class="mb15" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">By drawing on the concept of multi-level governance, the article also examined how UNHCR and BAMF coordinate and negotiate the resettlement process. Thereby, the article focused on diverging objectives with regards to UNHCR’s and BAMF’s selection criteria and highlighted their interdependencies in the process. Given that the resettlement process represents a chain of actions, where one stakeholder’s activity feeds into the next stakeholders’ activity, all stakeholders–including UNHCR and BAMF–are depended on each other in order to facilitate the resettlement process.</span></p><p class="mb15" data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Still, UNHCR and other international stakeholders (e.g., IOM) are depended on resettlement countries’ willingness to offer resettlement quota and to admit the pre-selected refugees. While this has also been the case with traditional resettlement countries, the diversification of resettlement programs with a stronger emphasis on national selection criteria has shifted the focus from UNHCR-led programs to more individualistic programs carried out by resettlement countries. As such, the field of refugee resettlement has witnessed a shift back to the nation state instead of a diffusion of decision-making authority as proposed by the concept of multi-level governance.</span></p><p class="mb15" data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">It is also important to keep the structural power relations of international organizations and their donors–such as the German government–in mind. Given that Germany represents one of the main donor countries for UNHCR, UNHCR is dependent on the German government and acts as an agent for Germany’s engagement in refugee protection, including its resettlement and humanitarian admission programs.</span></p><p class="mb15" data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Despite those power relations, it’s important to highlight that UNHCR’s and BAMF’s overarching objective remains the same, namely, to successfully implement the various resettlement and humanitarian admission processes. Consequently, although stakeholders, such as UNHCR and BAMF, might have diverging objectives for the selection of refugees, they are depended on each other within the process to achieve their collective goal of successfully resettling the most vulnerable persons in need of protection.</span></p><p class="mb15" data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">This also serves as a reminder that–to put it again in the words of one of the interviewees–resettlement is not about moving boxes, but about moving people (interviewee from IOM Turkey, 2019). Although it involves many administrative, technical and logistical considerations, it is first and foremost a tool for refugee protection–and sometimes, as discussed above, a tool for many other objectives. Resettlement thus represents much more work for all the implementing stakeholders involved in the process as well as hope for the resettled refugees than can be captured in a one-sentence definition. Highlighting those intricate linkages and interdependencies has been one major aim of this article while shedding light on some of the mechanisms at play in refugee resettlement and more broadly, in the global system of refugee protection.</span></p><a class="reset-hash-position" data-dcnode-id="1227" id="h10" name="h10"></a><h2 data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Data Availability Statement</span></h2><p class="mb15" data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">The original contributions presented in the study are included in the article/Supplementary Material, further inquiries can be directed to the corresponding author.</span></p><a class="reset-hash-position" data-dcnode-id="1222" id="h11" name="h11"></a><h2 data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Ethics Statement</span></h2><p class="mb0" data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">The studies involving human participants were reviewed and approved by Ethical Committee of Human Sciences, Vrije Universiteit Brussel.</span></p><a class="reset-hash-position" data-dcnode-id="1217" id="h12" name="h12"></a><h2 data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Author Contributions</span></h2><p class="mb0" data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">The author confirms being the sole contributor of this work and has approved it for publication.</span></p><a class="reset-hash-position" data-dcnode-id="1212" id="h13" name="h13"></a><h2 data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Conflict of Interest</span></h2><p class="mb0" data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">The author declares that the research was conducted in the absence of any commercial or financial relationships that could be construed as a potential conflict of interest.</span></p><a class="reset-hash-position" data-dcnode-id="1207" id="h14" name="h14"></a><h2 data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Footnotes</span></h2><p class="editor" data-dcnode-id="1197"><sup data-dcnode-id="1202"><a class="color1" data-dcnode-id="1203" id="fn1"><span data-dcnode-id="1204" instrument_node="">1</span></a></sup><span data-dcnode-id="1201" instrument_node="">Exceptions can be made through a case-by-case assessment (</span><a data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="1200" instrument_node="">BMI, 2018b</span></a><span data-dcnode-id="1198" instrument_node="">).</span></p><p class="editor" data-dcnode-id="1189"><sup data-dcnode-id="1194"><a class="color1" data-dcnode-id="1195" id="fn2"><span data-dcnode-id="1196" instrument_node="">2</span></a></sup><span data-dcnode-id="1193" instrument_node="">Refugee status is attributed to a person by a government or, if the government is not signatory to the 1951 Refugee Convention and/or does not employ a national asylum procedure, by UNHCR (</span><a data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B24"><span data-dcnode-id="1192" instrument_node="">Fresia and von Känel, 2016</span></a><span data-dcnode-id="1190" instrument_node="">).</span></p><p class="editor" data-dcnode-id="1181"><sup data-dcnode-id="1186"><a class="color1" data-dcnode-id="1187" id="fn3"><span data-dcnode-id="1188" instrument_node="">3</span></a></sup><span data-dcnode-id="1185" instrument_node="">In the context of the Syrian conflict, Turkey, Lebanon and Jordan are neighboring countries hosting a considerable number of Syrian refugees (</span><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="1184" instrument_node="">UNHCR, 2020d</span></a><span data-dcnode-id="1182" instrument_node="">).</span></p><p class="editor" data-dcnode-id="1176"><sup data-dcnode-id="1178"><a class="color1" data-dcnode-id="1179" id="fn4"><span data-dcnode-id="1180" instrument_node="">4</span></a></sup><span data-dcnode-id="1177" instrument_node="">The term ‘resettlement country’ refers to the country accepting refugees through resettlement.</span></p><p class="editor" data-dcnode-id="1168"><sup data-dcnode-id="1173"><a class="color1" data-dcnode-id="1174" id="fn5"><span data-dcnode-id="1175" instrument_node="">5</span></a></sup><span data-dcnode-id="1172" instrument_node="">The ‘Königstein Key’ determines the number of asylum seekers that a federal Land needs to accept based on the federal Land’s tax revenue (2/3 of the weighting) and population size (1/3 of the weighting). The quota is established on a yearly basis (</span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="1171" instrument_node="">BAMF, 2021</span></a><span data-dcnode-id="1169" instrument_node="">).</span></p><p class="editor" data-dcnode-id="1160"><sup data-dcnode-id="1165"><a class="color1" data-dcnode-id="1166" id="fn6"><span data-dcnode-id="1167" instrument_node="">6</span></a></sup><span data-dcnode-id="1164" instrument_node="">See the discussion on resettlement in history and current practices as well as </span><a data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1163" instrument_node="">Beirens and Fratzke (2017)</span></a><span data-dcnode-id="1161" instrument_node=""> for an overview about different reasons for stakeholders to participate in resettlement activities.</span></p><p class="editor" data-dcnode-id="1152"><sup data-dcnode-id="1157"><a class="color1" data-dcnode-id="1158" id="fn7"><span data-dcnode-id="1159" instrument_node="">7</span></a></sup><span data-dcnode-id="1156" instrument_node="">See </span><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="1155" instrument_node="">Sandvik (2011)</span></a><span data-dcnode-id="1153" instrument_node=""> for a detailed discussion on the UNHCR interview conducted with refugees to establish their resettlement needs.</span></p><p class="editor" data-dcnode-id="1144"><sup data-dcnode-id="1149"><a class="color1" data-dcnode-id="1150" id="fn8"><span data-dcnode-id="1151" instrument_node="">8</span></a></sup><span data-dcnode-id="1148" instrument_node="">See also </span><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="1147" instrument_node="">Westerby (2020)</span></a><span data-dcnode-id="1145" instrument_node=""> for a discussion on the dilemma for UNHCR staff when preparing cases for submission to resettlement countries.</span></p><a class="reset-hash-position" data-dcnode-id="1143" id="h15" name="h15"></a><h2 data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">References</span></h2><div class="References" data-dcnode-id="1128"><p class="ReferencesCopy1" data-dcnode-id="1132"><a data-dcnode-id="1140" id="B1" name="B1"></a><span data-dcnode-id="1139" instrument_node="">Adam, Ilke., and Caponio, Tiziana. (2019). Research on the Multi-Level Governance of Migration and Migrant Integration: Reversed Pyramids. </span><em data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">The Routledge Handbook on the Politics of Migration in Europe</span></em><span data-dcnode-id="1136" instrument_node="">. London: </span><span class="publisher-name" data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Routledge</span></span><span data-dcnode-id="1133" instrument_node="">. </span></p><p class="ReferencesCopy2" data-dcnode-id="1129"><a data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fhl%3Den%26as_sdt%3D0%252C5%26q%3DResearch%2Bon%2Bthe%2BMulti-Level%2BGovernance%2Bof%2BMigration%2Band%2BMigrant%2BIntegration%3A%2BReversed%2BPyramids%26btnG%3D"><span data-dcnode-id="1131" instrument_node="">Google Scholar</span></a></p></div><div class="References" data-dcnode-id="1118"><p class="ReferencesCopy1" data-dcnode-id="1119"><a data-dcnode-id="1127" id="B2" name="B2"></a><span data-dcnode-id="1126" instrument_node="">Bamberg, K. (2018). </span><em data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">The EU Resettlement Framework: From a Humanitarian Pathway to a Migration Management Tool?</span></em><span data-dcnode-id="1123" instrument_node="">. Brussels: </span><span class="publisher-name" data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Discussion Paper. European Migration and Diversity Programme. European Policy Center</span></span><span data-dcnode-id="1120" instrument_node="">.</span></p></div><div class="References" data-dcnode-id="1105"><p class="ReferencesCopy1" data-dcnode-id="1106"><a data-dcnode-id="1117" id="B3" name="B3"></a><span data-dcnode-id="1116" instrument_node="">BAMF (2020). </span><em data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Aufgaben Und Schwerpunkte: Das Bundesamt Für Migration Und Flüchtlinge</span></em><span data-dcnode-id="1113" instrument_node="">. Nürnberg: </span><span class="publisher-name" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Bundesamt für Migration und Flüchtlinge</span></span><span data-dcnode-id="1110" instrument_node="">Available at: </span><a data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https
