</span><meta content="Refugee resettlement is implemented by many different national and international stakeholders who operate in different locations and on the basis of sometimes diverging objectives. The implementation of the resettlement process has thus been characterized as multi-level governance, with resettlement stakeholders coordinating and negotiating the selection of refugees for resettlement. Still, literature on the implementation of refugee resettlement has remained very limited and has mainly focused on one specific stakeholder or stage of the process. In addition, a common conceptualization of the different stages is currently missing in academic literature. To address this research gap, the article proposes a common terminology of all stages of the resettlement process. Highlighting the diversity of resettlement programs, the article relies on a comparative case study of the German resettlement and humanitarian admission programs from Jordan and Turkey. By drawing on the concept of multi-level governance, the article examines diverging objectives and interdependencies between resettlement stakeholders, such as UNHCR and resettlement countries. As a result, the article argues that the increasing emphasis on national selection criteria by resettlement countries, including Germany, puts resettlement countries even more in the center of decision-making authority–in contrast to a diffusion of power that characterizes multi-level governance." data-dcnode-id="3026" name="Description" property="og:description"><span data-dcnode-id="3025" instrument_node="">

</span><div class="atButton" data-dcnode-id="2211"><span data-dcnode-id="2220" instrument_node="">
</span><a addthis:description="Refugee resettlement is implemented by many different national and international stakeholders who operate in different locations and on the basis of sometimes diverging objectives. The implementation of the resettlement process has thus been characterized as multi-level governance, with resettlement stakeholders coordinating and negotiating the selection of refugees for resettlement. Still, literature on the implementation of refugee resettlement has remained very limited and has mainly focused on one specific stakeholder or stage of the process. In addition, a common conceptualization of the different stages is currently missing in academic literature. To address this research gap, the article proposes a common terminology of all stages of the resettlement process. Highlighting the diversity of resettlement programs, the article relies on a comparative case study of the German resettlement and humanitarian admission programs from Jordan and Turkey. By drawing on the concept of multi-level governance, the article examines diverging objectives and interdependencies between resettlement stakeholders, such as UNHCR and resettlement countries. As a result, the article argues that the increasing emphasis on national selection criteria by resettlement countries, including Germany, puts resettlement countries even more in the center of decision-making authority–in contrast to a diffusion of power that characterizes multi-level governance." addthis:title="Implementing the Refugee Resettlement Process: Diverging Objectives, Interdependencies and Power Relations" addthis:url="https://www.frontiersin.org/article/10.3389/fpos.2021.629675" class="addthis_button_facebook at300b" data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html" title="Facebook"><span class="at-icon-wrapper" data-dcnode-id="2214" style="background-color: rgb(59, 89, 152); line-heig </span><div class="JournalAbstract" data-dcnode-id="2089"><a class="reset-hash-position" data-dcnode-id="2103" id="h1" name="h1"></a><h1 data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Implementing the Refugee Resettlement Process: Diverging Objectives, Interdependencies and Power Relations</span></h1><div class="authors" data-dcnode-id="2096"><a class="user-id-931709" data-dcnode-id="2098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/931709"><img alt="www.frontiersin.org" class="pr5" data-dcnode-id="2100" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/931709/24&amp;raw"><span data-dcnode-id="2099" instrument_node="">Hanna Schneider</span></a><span data-dcnode-id="2097" instrument_node="">*</span></div><ul class="notes" data-dcnode-id="2093"><li data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Political Science Department, Vrije Universiteit Brussel, Brussels, Belgium</span></li></ul><p class="mb15" data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Refugee resettlement is implemented by many different national and international stakeholders who operate in different locations and on the basis of sometimes diverging objectives. The implementation of the resettlement process has thus been characterized as multi-level governance, with resettlement stakeholders coordinating and negotiating the selection of refugees for resettlement. Still, literature on the implementation of refugee resettlement has remained very limited and has mainly focused on one specific stakeholder or stage of the process. In addition, a common conceptualization of the different stages is currently missing in academic literature. To address this research gap, the article proposes a common terminology of all stages of the resettlement process. Highlighting the diversity of resettlement programs, the article relies on a comparative case study of the German resettlement and humanitarian admission programs from Jordan and Turkey. By drawing on the concept of multi-level governance, the article examines diverging objectives and interdependencies between resettlement stakeholders, such as UNHCR and resettlement countries. As a result, the article argues that the increasing emphasis on national selection criteria by resettlement countries, including Germany, puts resettlement countries even more in the center of decision-making authority–in contrast to a diffusion of power that characterizes multi-level governance.</span></p><div class="clear" data-dcnode-id="2090"></div></div><div class="JournalFullText" data-dcnode-id="389"><a class="reset-hash-position" data-dcnode-id="2088" id="h2" name="h2"></a><h2 data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Introduction</span></h2><p data-dcnode-id="2084" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><span data-dcnode-id="2085" instrument_node="">“We are moving people, not boxes” (interviewee from IOM Turkey, 2019).</span></p><p class="mb15" data-dcnode-id="2064"><span data-dcnode-id="2083" instrument_node="">Refugee resettlement is generally explained in one sentence: According to the United Nations High Commissioner for Refugees (UNHCR), it constitutes “the selection and transfer of refugees from a State in which they have sought protection to a third State which has agreed to admit them–as refugees–with permanent residence status” (</span><a data-dcnode-id="2081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="2082" instrument_node="">UNHCR, 2011</span></a><span data-dcnode-id="2080" instrument_node="">, p. 3). Behind this short definition, however, lies a process that is implemented by many different stakeholders, in various locations and over different periods of time. And despite the increase of resettlement countries and the diversification of resettlement programs since the early 2000s, literature on the implementation of resettlement programs has remained rather scarce (but see </span><a data-dcnode-id="2078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B25"><span data-dcnode-id="2079" instrument_node="">Garnier et al., 2018</span></a><span data-dcnode-id="2077" instrument_node="">; </span><a data-dcnode-id="2075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="2076" instrument_node="">Darrow 2015</span></a><span data-dcnode-id="2074" instrument_node="">; </span><a data-dcnode-id="2072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="2073" instrument_node="">Sandvik, 2011</span></a><span data-dcnode-id="2071" instrument_node="">). In addition, published articles on resettlement mostly focus either on the role of one specific resettlement stakeholder (see for instance </span><a data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="2070" instrument_node="">Garnier, 2014</span></a><span data-dcnode-id="2068" instrument_node=""> on UNHCR’s strategy and policies on resettlement) or on one specific stage of the resettlement process (see for instance </span><a data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="2067" instrument_node="">Darrow, 2015</span></a><span data-dcnode-id="2065" instrument_node=""> on the street-level implementation of resettled refugees’ reception in the United States).</span></p><p class="mb15" data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">This article, in turn, considers all stages of the resettlement process from the point in time when refugees enter the process until they arrive in the resettlement country. Given that, to the best of the author’s knowledge, current literature does not provide a common conceptualization of the different stages of the resettlement process, the article provides an overview about the various stages and proposes a common conceptualization of the resettlement process that could be employed in future research.</span></p><p class="mb15" data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">To do so, the article firstly discusses different existing conceptualizations of the resettlement process as employed by two main resettlement stakeholders (i.e., UNHCR and the International Organization for Migration, IOM). Given that these conceptualizations predominantly focus on the specific responsibilities of the stakeholder who published the particular overview, this article instead proposes a conceptualization of the resettlement process that considers the responsibilities of all stakeholders involved in the process.</span></p><p class="mb15" data-dcnode-id="2055"><span data-dcnode-id="2059" instrument_node="">Introducing such a blueprint for analysis is especially relevant in regard to the diversification of refugee admission programs that can be observed since the early 2000s (</span><a data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="2058" instrument_node="">Beirens and Fratzke, 2017</span></a><span data-dcnode-id="2056" instrument_node="">). In Europe, for instance, many countries introduced new refugee admission programs in response to the ongoing Syrian civil war. Those programs are often not permanent resettlement programs under UNHCR auspices, but rather ad hoc humanitarian admission programs set up in response to specific humanitarian crises–like the Syrian civil war (ibid.)</span></p><p class="mb15" data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">As a result, programs differ for instance with regards to the stakeholders involved in the process, the eligibility for admission (e.g., some programs are only targeted towards Syrian nationals) and the residence status persons receive after admission. Despite those differences, refugee admission programs are mostly referred to as ‘resettlement’. ‘Resettlement’ is thus often used as an umbrella term for different refugee admission programs–despite the fact that many programs divert from UNHCR’s traditional definition of resettlement.</span></p><p class="mb15" data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Applying the proposed conceptualization of the resettlement process to particular admission programs can thus highlight differences in the implementation of the programs (e.g., with regards to the stakeholders involved in the process)—but also show the similarities amongst different programs. To offer such an analysis, this article applies the proposed conceptualization to two specific programs: 1) Germany’s resettlement program in Jordan and 2) Germany’s humanitarian admission program in Turkey.</span></p><p class="mb15" data-dcnode-id="2046"><span data-dcnode-id="2050" instrument_node="">Germany was selected for the article’s case study given its comparatively large quota for resettlement and humanitarian admission: in 2019, Germany ranked fifth among resettlement countries. In addition, Germany also received the highest number of asylum seekers world-wide that year (</span><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="2049" instrument_node="">UNHCR, 2020e</span></a><span data-dcnode-id="2047" instrument_node="">). The country is thus an important destination for displaced persons in the world, including resettled refugees.</span></p><p class="mb15" data-dcnode-id="2035"><span data-dcnode-id="2045" instrument_node="">Germany has also played a major role in negotiating the EU-Turkey Statement that was signed in 2016 (</span><a data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="2044" instrument_node="">Deutsche Welle, 2016</span></a><span data-dcnode-id="2042" instrument_node="">). The EU-Turkey statement has been an attempt to reduce the number of refugees arriving in Europe from Turkey via the Aegean Sea. For this purpose, a 1:1 mechanism was developed, establishing that for every Syrian refugee Turkey would readmit from Greece after March 2016, one Syrian would be resettled from Turkey to an EU member state (</span><a data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="2041" instrument_node="">Deutsche Welle, 2018</span></a><span data-dcnode-id="2039" instrument_node="">). To realize the EU’s commitment to the 1:1 mechanism, the EU promised the Turkish government to admit up to 76,504 persons via resettlement and humanitarian admissions (</span><a data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="2038" instrument_node="">Welfens and Bonjour, 2020</span></a><span data-dcnode-id="2036" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="2027"><span data-dcnode-id="2034" instrument_node="">As a result, the EU-Turkey Statement is predominantly shaping Germany’s current engagement in resettlement activities. Since 2016, the humanitarian admission program from Turkey is Germany’s largest admission program in terms of admitted persons with a monthly quota of 500 persons (</span><a data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="2033" instrument_node="">BMI, 2018b</span></a><span data-dcnode-id="2031" instrument_node="">). By contrast, Germany’s resettlement program from Jordan only resettled 363 refugees in the whole year of 2019 (</span><a data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="2030" instrument_node="">UNHCR, 2020c</span></a><span data-dcnode-id="2028" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Most refugees admitted to Germany are thus admitted through humanitarian admission instead of the permanent resettlement program. A closer analysis of the German humanitarian admission and resettlement programs can thus shed light on how different admission programs are employed by the same resettlement country and what this means for the rights that admitted persons enjoy in Germany.</span></p><p class="mb15" data-dcnode-id="2014"><span data-dcnode-id="2024" instrument_node="">Since 2015, a specific legal basis for the admission of resettled refugees exists in Germany, independent from the legal basis covering humanitarian admissions that was already established in the German residence act (</span><a data-dcnode-id="2022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="2023" instrument_node="">Grote et al., 2016</span></a><span data-dcnode-id="2021" instrument_node="">). The admission of resettled refugees is thus separated from other legal statuses that displaced persons can receive, such as refugee status under the Geneva Convention or subsidiary protection (</span><a data-dcnode-id="2019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="2020" instrument_node="">Ibendahl, 2016</span></a><span data-dcnode-id="2018" instrument_node="">). Nevertheless, resettled refugees and refugees recognized through the asylum procedure enjoy more or less the same rights in Germany (</span><a data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="2017" instrument_node="">Grote et al., 2016</span></a><span data-dcnode-id="2015" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1999"><span data-dcnode-id="2013" instrument_node="">Resettled refugees are allowed to work and entitled to social security benefits and they can apply for a permanent residence permit after three years of residence in Germany (</span><a data-dcnode-id="2011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="2012" instrument_node="">Caritas, 2020b</span></a><span data-dcnode-id="2010" instrument_node="">). Very importantly, the German resettlement program does not specify the nationality of refugees as an eligibility criterion. In contrast, the humanitarian admission program from Turkey is specifically targeted toward Syrian refugees (</span><a data-dcnode-id="2008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="2009" instrument_node="">BMI, 2018b</span></a><span data-dcnode-id="2007" instrument_node="">)</span><a data-dcnode-id="2004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn1"><sup data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">1</span></sup></a><span data-dcnode-id="2003" instrument_node="">. In addition, the threshold to receive a permanent residence permit is higher for refugees admitted through the humanitarian admission program as they can only apply for a permanent residence permit after five years (</span><a data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="2002" instrument_node="">Ibendahl, 2016</span></a><span data-dcnode-id="2000" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1994"><span data-dcnode-id="1998" instrument_node="">Syrian refugees who are admitted under the humanitarian admission program also face higher restrictions for family reunification than resettled refugees, but they are allowed to work and entitled to social security benefits similar to refugees admitted through resettlement (</span><a data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="1997" instrument_node="">Ibendahl, 2016</span></a><span data-dcnode-id="1995" instrument_node="">). Thus, although there are many similarities between the two programs with regards to refugees’ rights in Germany, the German resettlement program provides refugees with a more secure perspective in Germany than the humanitarian admission program, which can be crucial for the concerned refugees.</span></p><p class="mb15" data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Applying the article’s proposed conceptualization of the resettlement process to the case-study of the two German programs also sheds light on similarities and differences in the implementation of the two programs, for instance with regards to the stakeholders involved in the resettlement process.</span></p><p class="mb15" data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Indeed, resettlement and humanitarian admission processes are implemented by many different stakeholders who need to constantly adapt to changing circumstances (e.g., with regards to fluctuating annual resettlement quota) and challenges. The article highlights those challenges and provides an in-depth analysis of how implementing stakeholders coordinate and negotiate the implementation of the two German programs.</span></p><p class="mb15" data-dcnode-id="1985"><span data-dcnode-id="1989" instrument_node="">To do so, the article draws on the concept of multi-level governance that stresses the diffusion of decision-making authority across stakeholders on subnational, national and supranational levels (</span><a data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="1988" instrument_node="">Hooghe and Marks, 2001</span></a><span data-dcnode-id="1986" instrument_node="">). Employing multi-level governance as a lens to study the German resettlement and humanitarian admission programs, the article focuses on the selection process of the two German programs. Thereby, it examines the responsibilities and (sometimes diverging) objectives of UNHCR and the German Federal Office for Migration and Refugees (German: Bundesamt für Migration und Flüchtlinge, BAMF) in selecting refugees for resettlement and humanitarian admission. In addition, the article also highlights interdependencies between both implementing stakeholders.</span></p><p class="mb15" data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">The article’s analysis is based on a literature review as well as 20 semi-structured in-depth key informant interviews with resettlement stakeholders, such as personnel from UNHCR, the European Asylum Support Office (EASO) and IOM. Key informant interviews were conducted in Jordan and Turkey between April and November 2019. In addition, the article relies on 16 semi-structured in-depth interviews with Syrian refugees who were resettled from Jordan and Turkey to Germany. The interviews took place in May 2019 (for the Turkey cohort) and December 2019 (for the Jordan cohort) and were conducted in the reception center in Friedland (Germany) where most resettled refugees spend their first two weeks after their arrival in Germany.</span></p><p class="mb15" data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">The article is structured as follows. First, it provides an overview about historical and current approaches toward resettlement by different resettlement stakeholders. The next section discusses existing overviews of the resettlement process before proposing a common conceptualization to analyze resettlement processes. It is followed by an overview about Germany’s resettlement and humanitarian admission programs in Jordan and Turkey and an application of the proposed conceptualization to the two German programs. The subsequent section introduces the concept of multi-level governance as a theoretical lens to study the stakeholders involved in the resettlement process. Finally, the last section examines the responsibilities and objectives of UNHCR and BAMF in the selection process (and beyond), as well as interdependencies and power relations between the two stakeholders.</span></p><a class="reset-hash-position" data-dcnode-id="1980" id="h3" name="h3"></a><h2 data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Resettlement in History and Current Practice</span></h2><p class="mb15" data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">This section will discuss historical and current approaches and developments in the field of refugee resettlement in general, before proposing a new conceptualization of the resettlement process.</span></p><h3 class="pt0" data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Resettlement in History</span></h3><p class="mb0" data-dcnode-id="1962"><span data-dcnode-id="1973" instrument_node="">As stated above, resettlement is defined by UNHCR as “the selection and transfer of refugees from a State in which they have sought protection to a third State which has agreed to admit them–as refugees–with permanent residence status” (</span><a data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1972" instrument_node="">UNHCR, 2011</span></a><span data-dcnode-id="1970" instrument_node="">, 3). According to this definition, only persons who have received refugee status (and have consequently crossed an international border) can be resettled</span><a data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn2"><sup data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">2</span></sup></a><span data-dcnode-id="1966" instrument_node="">. Once refugees are resettled, they will receive permanent residence status with the prospect of eventually becoming citizens of the resettlement country (</span><a data-dcnode-id="1964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1965" instrument_node="">UNHCR, 2011</span></a><span data-dcnode-id="1963" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1951"><span data-dcnode-id="1961" instrument_node="">Resettlement is a voluntary act; no country is legally obliged to offer resettlement places. Instead, resettlement is traditionally considered as a tool for refugee protection as well as a tool for responsibility sharing amongst the international community (</span><a data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1960" instrument_node="">Beirens and Fratzke, 2017</span></a><span data-dcnode-id="1958" instrument_node="">; </span><a data-dcnode-id="1956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="1957" instrument_node="">Garnier et al., 2018a</span></a><span data-dcnode-id="1955" instrument_node="">; </span><a data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="1954" instrument_node="">Labman, 2019</span></a><span data-dcnode-id="1952" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1946"><span data-dcnode-id="1950" instrument_node="">With regards to refugee protection, resettlement represents one of the three durable solutions–next to voluntary repatriation and local integration–that UNHCR foresees for resolving a refugee situation. In this regard, resettlement specifically offers a durable solution for vulnerable refugees “whose life, liberty, safety, health or other fundamental rights are at risk in the country where they have sought refuge” (</span><a data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1949" instrument_node="">UNHCR, 2011</span></a><span data-dcnode-id="1947" instrument_node="">, 36). To be selected for resettlement, refugees must thus be identified as particularly vulnerable, for instance because they are survivors of torture or because they have medical needs that cannot be attended to in the host country. Resettlement is thus highly selective in its character and includes a resource intensive selection process by several stakeholders to identify and select particular vulnerable persons for resettlement.</span></p><p class="mb0" data-dcnode-id="1937"><span data-dcnode-id="1945" instrument_node="">This link of vulnerability and selectivity is also important with regards to the conceptualization of resettlement as a tool for responsibility sharing amongst the international community. Given that most refugees (first) flee to neighboring countries in close proximity to the conflict, the responsibility of refugee protection primarily lies on those host countries (</span><a data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="1944" instrument_node="">UNHCR, 2020d</span></a><span data-dcnode-id="1942" instrument_node="">)</span><a data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn3"><sup data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">3</span></sup></a><span data-dcnode-id="1938" instrument_node="">. Other countries, which are further away from crisis-prone areas and thus receive a lower number of asylum seekers, can help to share responsibility for refugee protection by providing resettlement for particular vulnerable refugees from those neighboring countries.</span></p><p class="mb0" data-dcnode-id="1919"><span data-dcnode-id="1936" instrument_node="">Traditionally, resettlement countries</span><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23fn4"><sup data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">4</span></sup></a><span data-dcnode-id="1932" instrument_node=""> were thus countries located far away from 20</span><sup data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">th</span></sup><span data-dcnode-id="1929" instrument_node=""> century crises and which therefore did not experience a high number of spontaneous arrivals of asylum seekers in their territory. Being an ocean away from many humanitarian emergencies, the United States, Canada and Australia were thus at the forefront of resettlement activities throughout the last decades (</span><a data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1928" instrument_node="">Beirens and Fratzke, 2017</span></a><span data-dcnode-id="1926" instrument_node="">). Together with New Zealand, the Netherlands and the Scandinavian countries, they represent the ‘traditional resettlement countries’, having included resettlement programs in their national legislation between 1975 and 1987 (</span><a data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="1925" instrument_node="">Honoré, 2003</span></a><span data-dcnode-id="1923" instrument_node="">). As stated above, those ‘traditional’ resettlement programs generally offer permanent residence status to the refugees concerned. Resettlement is therefore considered a permanent solution to displacement and resettled refugees are perceived as new citizens of their resettlement country. In addition, most of the “traditional resettlement countries” base their selection of refugees for resettlement primarily on UNHCR’s vulnerability criteria, instead of employing additional national selection criteria, such as refugees’ “integration potential,” as will be discussed in more detail below. Although resettlement can thus indeed provide a durable solution for </span><em data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">individual</span></em><span data-dcnode-id="1920" instrument_node=""> vulnerable refugees, the conceptualization of resettlement as a tool for international solidarity and responsibility sharing is rather problematic.</span></p><p class="mb0" data-dcnode-id="1914"><span data-dcnode-id="1918" instrument_node="">To move beyond the benefits of resettlement for the individual refugees who are resettled, UNHCR introduced the concept of the “strategic use of resettlement” (SUR) in 2003. The SUR concept outlines that if resettlement is used in a strategic manner, it has the potential to create additional benefits such as positively impacting the protection conditions in the host country from where refugees are resettled (</span><a data-dcnode-id="1916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B50"><span data-dcnode-id="1917" instrument_node="">UNHCR, 2003</span></a><span data-dcnode-id="1915" instrument_node="">). This proposition neatly ties into the idea of resettlement as a responsibility sharing tool by alleviating pressure on those host countries which receive a high number of displaced persons.</span></p><p class="mb0" data-dcnode-id="1909"><span data-dcnode-id="1913" instrument_node="">However, improving protection conditions in host countries would presuppose the resettlement of a considerable high number of refugees compared to the number of displaced persons residing in the host countries. Considering the vast gap between refugees’ resettlement needs and UNHCR’s annual submissions of cases to resettlement countries, this is clearly not the case. For instance, in 2019, global resettlement quotas only allowed for offering a resettlement place to one refugee out of 20 vulnerable refugees in need of resettlement (</span><a data-dcnode-id="1911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="1912" instrument_node="">UNHCR, 2020d</span></a><span data-dcnode-id="1910" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1901"><span data-dcnode-id="1908" instrument_node="">Given the vast discrepancy between the numbers of refugees in need of resettlement and the numbers of refugees who are actually resettled, resettlement can thus rarely make a difference in terms of responsibility sharing with host countries. In the case of Jordan for instance, resettlement has generally not been perceived by resettlement stakeholders as (positively) impacting the broader refugee protection landscape–even during a peak of resettlement numbers in 2016 (</span><a data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="1907" instrument_node="">Durable Solutions Platform, 2020</span></a><span data-dcnode-id="1905" instrument_node="">). Instead, resettlement from Jordan has mostly been a “drop in the ocean” (</span><a data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="1904" instrument_node="">Durable Solutions Platform, 2020</span></a><span data-dcnode-id="1902" instrument_node="">, 19) in terms of protection benefits in the host country.</span></p><p class="mb0" data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Consequently, the idea of resettlement as a tool for responsibility sharing amongst the international community is arguably more rhetoric in nature than observable in practice. Indeed, it is important to keep in mind that this “traditional” view on resettlement–providing permanent residency for the most vulnerable refugees and sharing solidarity with host countries–is only an ideal. And although this ideal is upheld rhetorically by many governments of resettlement countries, it stands in contrast to the reality of resettlement program’s high selectivity and the vast gap between vulnerable refugees in need of resettlement and existing resettlement quotas.</span></p><h3 class="pt0" data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Resettlement in Current Practices</span></h3><p class="mb0" data-dcnode-id="1886"><span data-dcnode-id="1896" instrument_node="">Since the early 2000s, resettlement countries and programs have increasingly diversified. Despite some fluctuations, the number of countries offering resettlement places has increased considerably: from 2005 to 2019, the number of resettlement countries rose from 16 countries to 29 countries (</span><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1895" instrument_node="">Beirens and Fratzke, 2017</span></a><span data-dcnode-id="1893" instrument_node="">; </span><a data-dcnode-id="1891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="1892" instrument_node="">UNHCR, 2020d</span></a><span data-dcnode-id="1890" instrument_node="">). Much of the new commitment to resettlement can be traced back to the beginning of the Syrian civil war in 2011 and–in the case of European countries–to the subsequent high rise in numbers of persons crossing the Mediterranean in search of asylum in 2015 and 2016. As a result, European countries make up a considerable share of the new resettlement countries (</span><a data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1889" instrument_node="">Beirens and Fratzke, 2017</span></a><span data-dcnode-id="1887" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1881"><span data-dcnode-id="1885" instrument_node="">While some European countries introduced permanent resettlement programs, many opted for ad hoc and non-permanent humanitarian admission programs instead (</span><a data-dcnode-id="1883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1884" instrument_node="">Beirens and Fratzke, 2017</span></a><span data-dcnode-id="1882" instrument_node="">). Those humanitarian admission programs are set up as an immediate response to a specific current humanitarian crisis. Consequently, they target specific groups of refugees from specific host countries in specific periods of time.</span></p><p class="mb0" data-dcnode-id="1870"><span data-dcnode-id="1880" instrument_node="">Very importantly, humanitarian admission programs are generally perceived by resettlement countries as a tool for temporary instead of long-term protection. In line with the conception that these programs enable the admission from “hot conflict” (</span><a data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="1879" instrument_node="">Grote et al., 2016</span></a><span data-dcnode-id="1877" instrument_node="">, 6), the idea is that refugees should return to their home countries as soon as return is deemed to be safe again. Consequently, humanitarian admission programs generally do not immediately provide permanent residence for the admitted refugees (</span><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="1876" instrument_node="">European Migration Network, 2016</span></a><span data-dcnode-id="1874" instrument_node="">; </span><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1873" instrument_node="">Beirens and Fratzke, 2017</span></a><span data-dcnode-id="1871" instrument_node="">)—an aspect that contradicts the “traditional view” on resettlement as well as UNHCR’s definition.</span></p><p class="mb0" data-dcnode-id="1865"><span data-dcnode-id="1869" instrument_node="">However, this contradiction might be blurred in reality if the “hot conflicts” in refugees’ home countries remain unsolved in the long term. Given that it is often not safe for refugees to return to their home countries for (more than) decades, many refugees who were admitted through humanitarian admission programs will eventually receive permanent residence in their resettlement country. Thus, although humanitarian admission programs might initially not be set up for permanent residence of the admitted refugees, the reality for the admitted persons is likely to be different depending on how the situation in their home country develops. Still, the recent developments in Denmark, which has denied at least 189 Syrian the renewal of temporary residence permits since 2020 on the basis that the Danish government deems parts of Syrian to be safe to return to, highlights the fragility of temporary resident permits for the concerned refugees (</span><a data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="1868" instrument_node="">The Guardian, 2021</span></a><span data-dcnode-id="1866" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1854"><span data-dcnode-id="1864" instrument_node="">With the diversification of resettlement countries and programs, the motivations for countries to offer resettlement places are also diversifying. Many resettlement countries indeed still stress refugee protection and international responsibility sharing as their motivation to offer resettlement places. However, the idea of resettlement as an alternative to the “spontaneous” arrivals of asylum seekers is increasingly cited as an incentive to engage in resettlement activities (</span><a data-dcnode-id="1862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1863" instrument_node="">Beirens and Fratzke, 2017</span></a><span data-dcnode-id="1861" instrument_node="">; </span><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="1860" instrument_node="">van Selm, 2018</span></a><span data-dcnode-id="1858" instrument_node="">). For instance, the former EU Commissioner for Home Affairs Dimitris Avramopoulos made references to the idea that resettlement would reduce the incentives for irregular migration to Europe when proposing the EU Commission’s proposal for an EU resettlement scheme (</span><a data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1857" instrument_node="">Beirens and Fratzke, 2017</span></a><span data-dcnode-id="1855" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1843"><span data-dcnode-id="1853" instrument_node="">In addition, many resettlement countries, including some of the “traditional resettlement countries,” are opting for national selection criteria in addition to vulnerability considerations. Those national selection criteria generally consider refugees’ potential to successfully integrate in the resettlement country which may be determined for instance through refugees’ prior education and work experience (</span><a data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="1852" instrument_node="">Westerby, 2020</span></a><span data-dcnode-id="1850" instrument_node="">). Resettlement thus may become a tool for migration management, where resettlement countries select (a few) refugees they deem suitable to enter the country while increasingly closing off their borders for asylum seekers (</span><a data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="1849" instrument_node="">Hashimoto, 2018</span></a><span data-dcnode-id="1847" instrument_node="">; </span><a data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B61"><span data-dcnode-id="1846" instrument_node="">Welfens, 2018</span></a><span data-dcnode-id="1844" instrument_node="">). Thus, resettlement countries’ rationales for offering resettlement places can deviate considerably from the “traditional” objective of resettlement as a tool for the (additional) protection of displaced persons and international responsibility sharing.</span></p><p class="mb0" data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Despite the vast differences in motivations to offer resettlement places, linking resettlement activities with any intended broader impacts may be problematic. As stated above, it is very difficult to attribute positive impacts on the overall protection landscape in host countries to resettlement when resettlement quotas are considerably lower than resettlement needs. On the other hand, linking the treatment of asylum seekers and the engagement in resettlement activities may also be difficult for resettlement countries to achieve in practice: just because a country is offering (a few) resettlement places does not lead to the fact that displaced persons will be discouraged to seek asylum at its borders.</span></p><p class="mb0" data-dcnode-id="1833"><span data-dcnode-id="1840" instrument_node="">However, resettlement may be used by governments as an “excuse” to limit access to asylum and to frame asylum seekers as illegally crossing borders and seeking asylum. For instance, </span><a data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="1839" instrument_node="">Labman (2019)</span></a><span data-dcnode-id="1837" instrument_node=""> outlines how the discourse in Canada on resettlement and asylum has been interlinked to curtail spontaneous arrivals of asylum seekers. Citing a UNHCR resettlement officer in Canada, she points out that “resettled refugees were presented as part of the refugees using the ‘front door.’ And by providing refugees greater access, Canada suggested it had the moral authority to limit access to those refugees described as using the ‘back door’” (</span><a data-dcnode-id="1835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="1836" instrument_node="">Labman, 2019</span></a><span data-dcnode-id="1834" instrument_node="">, 45).</span></p><p class="mb0" data-dcnode-id="1825"><span data-dcnode-id="1832" instrument_node="">Consequently, there are many different reasons, which may overlap and/or stand in opposition to each other, to offer resettlement places which manifest in an array of policies and programs. To address this diversity of programs, </span><a data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B60"><span data-dcnode-id="1831" instrument_node="">Welfens et al. (2019)</span></a><span data-dcnode-id="1829" instrument_node=""> introduced the concept of “Active Refugee Admission Policies” (ARAP). This concept comprises the full range of admission programs for persons in need of protection, including but not limited to resettlement. As such, it provides an umbrella term for all admission pathways with a humanitarian scope, such as resettlement, humanitarian admission and private sponsorship but also other complementary pathways for the purpose of education (e.g., student visas), work and family reunification. Those programs might have different goals, different admission processes and diverging eligibility criteria. They may also differ with regards to the stakeholders involved in the process. For instance, civil society actors are more involved in private sponsorship programs than “traditional” resettlement. Nevertheless, ARAPs all have in common that they aim to offer “people in need of protection safe and orderly access to a destination country” (</span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B60"><span data-dcnode-id="1828" instrument_node="">Welfens et al., 2019</span></a><span data-dcnode-id="1826" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Consequently, the scope of ARAPs is much broader than resettlement and humanitarian admission programs that are discussed in this article. However, it highlights the commonalities between the different programs and serves as a good reminder to (also) seek out similarities instead of only highlighting differences between admission programs. Thus, although this section outlined differences within the realm of resettlement and humanitarian admission programs, the overarching principle of providing safe legal pathways for people in need of protection remains the same for all the programs.</span></p><p class="mb0" data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">After discussing resettlement–and humanitarian admission–programs in history and current practices, the following section will propose a common conceptualization of the resettlement process while unpacking the different stages of the process.</span></p><a class="reset-hash-position" data-dcnode-id="1820" id="h4" name="h4"></a><h2 data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">Towards a New Conceptualization of the Resettlement Process</span></h2><p class="mb15" data-dcnode-id="1813"><span data-dcnode-id="1817" instrument_node="">Resettling refugees includes many different decisions and actions. Where and how the process starts and finishes exactly can be debated: on the one hand, it can be argued that the resettlement process starts with a resettlement country government’s decision to offer resettlement places and finishes with the resettled refugees’ reception and first steps toward integration in the resettlement country. On the other hand, it is also possible to view the process in a wider perspective, since the implementation of the resettlement process is imbedded in the ongoing policy cycle of agenda setting, policy formulation, adoption, implementation and evaluation (</span><a data-dcnode-id="1815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="1816" instrument_node="">Hill and Varone, 2014</span></a><span data-dcnode-id="1814" instrument_node="">). Given that this article focuses on the organization and implementation of the resettlement process (i.e., on the operational level), the former perspective will be adopted here.</span></p><p class="mb15" data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">The stages of the resettlement process involve different stakeholders, different locations and varying periods of time. They also might overlap, be reversed in order, revised or excluded in their entirety for the same program. Moreover, the stages might be different for any resettlement country, host country and/or program. Still, the different actions that stakeholders take in the process can generally be aggregated into several distinct stages that build on one another.</span></p><p class="mb15" data-dcnode-id="1803"><span data-dcnode-id="1810" instrument_node="">To the best of the author’s knowledge, there does neither exist a common breakdown of the different stages of the resettlement process nor a common conceptualization of the resettlement process in current academic literature. Instead, the few authors who have focused on the implementation of the resettlement process have generally zoomed in on one of the stages of the resettlement process. For instance, </span><a data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="1809" instrument_node="">Darrow (2015)</span></a><span data-dcnode-id="1807" instrument_node=""> analyses how the reception of resettled refugees’ is implemented in the United States and </span><a data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="1806" instrument_node="">Sandvik (2011)</span></a><span data-dcnode-id="1804" instrument_node=""> details the procedure adopted by UNHCR to screen and select refugees for resettlement.</span></p><p class="mb15" data-dcnode-id="1798"><span data-dcnode-id="1802" instrument_node="">Nevertheless, main resettlement stakeholders such as UNHCR and IOM indeed provide general overviews of the resettlement process. For instance, UNHCR published a flow chart in addition to its detailed elaborations in the UNHCR Resettlement Handbook (</span><a data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="1801" instrument_node="">UNHCR, 2021b</span></a><span data-dcnode-id="1799" instrument_node="">). This flow chart meticulously describes the steps to be taken by different UNHCR staff and offices, starting with case identification and ending with the resettlement departure and closing the case. It also describes the responsibilities of other actors in the process, in particular the tasks of the resettlement country (RST country) involved in the resettlement case, such as accepting or rejecting the case.</span></p><p class="mb15" data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Consequently, the UNHCR flow chart does indeed provide a very detailed overview about the different steps that need to be taken to facilitate the resettlement process. As a result, however, the employed flow chart takes up the space of two entire pages without grouping the different tasks into overarching themes and/or stages (e.g., highlighting which tasks make up the selection of refugees for resettlement). This choice of visualization renders the UNHCR flow chart rather inadequate for applying the outlined process to different resettlement programs.</span></p><p class="mb15" data-dcnode-id="1791"><span data-dcnode-id="1795" instrument_node="">IOM also includes a flow chart of the resettlement process in the annex of its 2020 report on IOM’s engagement in resettlement activities (</span><a data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="1794" instrument_node="">IOM, 2020</span></a><span data-dcnode-id="1792" instrument_node="">). This overview groups IOM’s responsibilities according to the different stages of the resettlement process. However, this flow chart only provides an overview about IOM’s responsibilities without making references to other stakeholders’ responsibilities in the process.</span></p><p class="mb15" data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">Consequently, while the two flow charts provide a generalized overview about the resettlement process that can be applied to different resettlement countries and resettlement programs, they are either very detailed and somewhat unstructured (i.e., UNHCR flow chart) or only include the responsibilities of one stakeholder in the process, as is the case with the IOM overview.</span></p><p class="mb15" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Indeed, while both flow charts provide great insights into the particular perspectives and responsibilities of the resettlement stakeholder who is authoring the publication, they remain (to varying degrees) superficial in terms of other stakeholders’ responsibilities. Consequently, a less actor-centric general overview about the resettlement process is needed in order to easily compare and contrast different resettlement programs.</span></p><p class="mb15" data-dcnode-id="1782"><span data-dcnode-id="1786" instrument_node="">This article proposes such a new conceptualization of the resettlement process, which can be applied and adapted to different resettlement countries and programs. Incorporating different aspects of the two outlined resettlement flow charts, it also synthesizes information from the various resettlement programs outlined in the 24 individual country chapters published together with the UNHCR Resettlement Handbook (</span><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1785" instrument_node="">UNHCR, 2018a</span></a><span data-dcnode-id="1783" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1777"><span data-dcnode-id="1781" instrument_node="">The article thus proposes the following conceptualization of the different stages of the resettlement process, as visualized in </span><a data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F1"><span data-dcnode-id="1780" instrument_node="">Figure 1</span></a><span data-dcnode-id="1778" instrument_node="">.</span></p><div class="DottedLine" data-dcnode-id="1776"></div><div class="Imageheaders" data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">FIGURE 1</span></div><div class="FigureDesc" data-dcnode-id="1767"><a data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/629675/fpos-03-629675-HTML/image_m/fpos-03-629675-g001.jpg" name="Figure1" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1773" id="F1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/629675/fpos-03-629675-HTML/image_t/fpos-03-629675-g001.gif&amp;raw"></a><p data-dcnode-id="1768"><strong data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">FIGURE 1</span></strong><span data-dcnode-id="1769" instrument_node="">. A new conceptualization of the resettlement process.</span></p></div><div class="clear" data-dcnode-id="1766"></div><div class="DottedLine" data-dcnode-id="1765"></div><h3 class="pt0" data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">The Resettlement Process</span></h3><p class="mb0" data-dcnode-id="1758"><span data-dcnode-id="1762" instrument_node="">The “resettlement process” describes the entire implementation process, starting with the resettlement country government’s decision on resettlement programs and its resettlement quota. This decision might precede fact finding missions of representatives of the resettlement country to the host country to consult with the host country’s government and other key partners (</span><a data-dcnode-id="1760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="1761" instrument_node="">Grote, Bitterwolf, and Baraulina, 2016</span></a><span data-dcnode-id="1759" instrument_node="">). As stated above, for this article’s conceptualization, the resettlement process ends with the resettled refugees’ reception and integration in the resettlement country. The resettlement process thus incorporates the following stages: the selection process, the departure preparations and travel to the resettlement country, and the integration process.</span></p><h3 class="pt0" data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">The Selection Process</span></h3><p class="mb0" data-dcnode-id="1748"><span data-dcnode-id="1755" instrument_node="">The “selection process” concerns the selection of refugees for resettlement by various stakeholders. It starts with the identification of cases for resettlement by UNHCR, which might be a result of internal referrals (i.e., from other UNHCR units such as the protection unit) or external referrals, for instance from NGOs working with the refugee population. Following case identification, UNHCR conducts resettlement interviews, reviews the selection of cases and submits the selection of cases to the respective resettlement country (</span><a data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1754" instrument_node="">UNHCR, 2011</span></a><span data-dcnode-id="1752" instrument_node="">). The resettlement country is then responsible to screen the referrals and to finalize the selection of refugees for resettlement. To do so, most resettlement countries generally rely on selection missions to locally conduct a second interview with the pre-selected refugees. However, many resettlement countries also offer dossier selection, meaning that they base their selection entirely on UNHCR’s pre-selection without conducting an additional interview (</span><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1751" instrument_node="">UNHCR, 2018a</span></a><span data-dcnode-id="1749" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1740"><span data-dcnode-id="1747" instrument_node="">Dossier selection is often reserved for urgent cases that require an accelerated resettlement process. The country chapter for Canada, for instance, establishes that “in emergency cases where an urgent protection need has been identified, it may be possible to waive the usual requirement for an interview and biometrics” (</span><a data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="1746" instrument_node="">UNHCR, 2018b</span></a><span data-dcnode-id="1744" instrument_node="">, 7). An exception is Chile, where dossier selection is not linked to emergency cases but to the number of cases submitted from the same host country. As such, in cases where less than ten dossiers are submitted from the same host country, Chile relies on dossier selection. If the number of dossiers submitted from one host country exceeds ten dossiers, Chile employs selection missions to conduct interviews with the pre-selected refugees (</span><a data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B55"><span data-dcnode-id="1743" instrument_node="">UNHCR, 2002</span></a><span data-dcnode-id="1741" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1732"><span data-dcnode-id="1739" instrument_node="">This part of the selection process is based on “inclusion criteria,” such as vulnerability and other selection criteria. In addition to inclusion criteria and as a second stage of the selection process, many resettlement countries also conduct security and medical checks. Resettlement countries do not always conduct those checks themselves: many resettlement countries for instance employ IOM for carrying out medical examinations (</span><a data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1738" instrument_node="">UNHCR, 2018a</span></a><span data-dcnode-id="1736" instrument_node="">; </span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="1735" instrument_node="">IOM, 2020</span></a><span data-dcnode-id="1733" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1724"><span data-dcnode-id="1731" instrument_node="">In contrast to the prior selection based on “inclusion criteria,” refugees are screened during security and medical on the basis of “exclusion criteria,” such as safety concerns and contagious diseases. Consequently, these checks could lead–in the worst-case scenario–to the exclusion of already selected refugees (</span><a data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1730" instrument_node="">UNHCR, 2011</span></a><span data-dcnode-id="1728" instrument_node="">; </span><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="1727" instrument_node="">IOM, 2020</span></a><span data-dcnode-id="1725" instrument_node="">).</span></p><h3 class="pt0" data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Departure Preparations and Travel</span></h3><p class="mb0" data-dcnode-id="1717"><span data-dcnode-id="1721" instrument_node="">After refugees are selected for resettlement, their departure needs to be prepared. This stage generally includes several stakeholders: while visa procedures are normally in the hands of the resettlement country, other departure preparations are often implemented by UNHCR and IOM. Those departure preparations include logistical preparations, such as organizing exit permits and flight scheduling, and in many cases also pre-departure orientations which aim to prepare refugees mentally for their resettlement (</span><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="1720" instrument_node="">IOM, 2020</span></a><span data-dcnode-id="1718" instrument_node="">).</span></p><h3 class="pt0" data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">The Integration Process</span></h3><p class="mb0" data-dcnode-id="1710"><span data-dcnode-id="1714" instrument_node="">The “integration process” refers to the reception and integration of resettled refugees in the resettlement country. This process can differ substantively amongst resettlement countries and programs. With regards to housing, for instance, some countries, such as Norway and Sweden, provide resettled refugees with individual accommodation as soon as they arrive in their resettlement country. In other countries, resettled refugees need to stay in reception centers before they can move into individual housing (</span><a data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="1713" instrument_node="">European Migration Network, 2016</span></a><span data-dcnode-id="1711" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">The integration process and refugees’ experiences in their host countries can thus differ considerably depending on specific resettlement countries and programs. The same can be said (to varying degrees) for the other stages of the resettlement process.</span></p><p class="mb0" data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">It is also important to note that every resettlement process can be delayed or cancelled for any case at any time and stage. Delays and cancellations can both happen for a variety of reasons, ranging from the host government denying exit permits for the selected refugees to the current COVID-19 pandemic. But it is also possible that refugees decide to reject their resettlement offer and to drop out of the process at some stage (interviewees from UNHCR Jordan and UNHCR Turkey 2019).</span></p><p class="mb0" data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Still, all resettlement programs by necessity follow the structure of a selection process, departure preparations and travel, and integration process. The article’s conceptualization of the resettlement process into three (overlapping) stages therefore aims to offer a concise overview about the whole resettlement process and to provide a blueprint for comparing different programs.</span></p><p class="mb0" data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">The following sections will provide such a comparison for Germany’s resettlement and humanitarian admission programs in Jordan and Turkey. Firstly, the next section discusses Germany’s historic engagement in resettlement activities as well as the current German resettlement and humanitarian admission programs in Jordan and Turkey. Secondly, the article applies the proposed conceptualization of the resettlement process to the two German programs in order to highlight similarities and differences in the programs’ implementation.</span></p><a class="reset-hash-position" data-dcnode-id="1701" id="h5" name="h5"></a><h2 data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Germany’s Resettlement and Humanitarian Admission Programs in Jordan and Turkey</span></h2><p class="mb15" data-dcnode-id="1691"><span data-dcnode-id="1698" instrument_node="">Germany has a long tradition of resettling refugees dating back to the early 1950s (</span><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="1697" instrument_node="">European Migration Network, 2016</span></a><span data-dcnode-id="1695" instrument_node="">). Implementing humanitarian admission programs since 1956, Germany has first resettled refugees rather sporadically before committing to humanitarian admission on a more regular basis since the 1990s (</span><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="1694" instrument_node="">Grote et al., 2016</span></a><span data-dcnode-id="1692" instrument_node="">). For instance, between 1990 and 1999, Germany admitted approximately 3,000 refugees from Albania, almost 350,000 war refugees from Bosnia and approximately 15,000 war refugees from Kosovo as part of a human admission program. More recently, approximately 20,000 Syrian refugees were admitted to Germany from countries neighboring Syria as well as from Egypt and Libya between 2013 and 2016 (ibid.).</span></p><p class="mb15" data-dcnode-id="1680"><span data-dcnode-id="1690" instrument_node="">In 2012, Germany then moved from only employing ad-hoc humanitarian admission programs to also offering a permanent resettlement program (</span><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="1689" instrument_node="">Baraulina and Bitterwolf, 2018</span></a><span data-dcnode-id="1687" instrument_node="">). Since then, Germany’s annual resettlement quota has fluctuated from 300 persons in 2012 to 2,900 persons in 2019 (</span><a data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="1686" instrument_node="">Grote et al., 2016</span></a><span data-dcnode-id="1684" instrument_node="">; </span><a data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="1683" instrument_node="">BMI, 2018a</span></a><span data-dcnode-id="1681" instrument_node="">). Since the establishment of the permanent resettlement program, resettlement to Germany took place from a variety of host countries–some recurrent, some not–such as Tunisia, Indonesia, Sudan, Jordan, Lebanon, Egypt, and Ethiopia (ibid.).</span></p><p class="mb15" data-dcnode-id="1669"><span data-dcnode-id="1679" instrument_node="">In the case of Jordan, Germany has just begun to restart resettlement in 2019 after halting the resettlement program for the last years. In 2019, 363 refugees were resettled from Jordan to Germany and in total, 5501 refugees were resettled from Jordan to 16 different resettlement countries (</span><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="1678" instrument_node="">UNHCR, 2020c</span></a><span data-dcnode-id="1676" instrument_node="">), as can be seen in </span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F2"><span data-dcnode-id="1675" instrument_node="">Figure 2</span></a><span data-dcnode-id="1673" instrument_node="">. This makes Jordan one of the largest UNHCR resettlement operations worldwide, ranking third behind Turkey and Lebanon (</span><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="1672" instrument_node="">UNHCR, 2020b</span></a><span data-dcnode-id="1670" instrument_node="">).</span></p><div class="DottedLine" data-dcnode-id="1668"></div><div class="Imageheaders" data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">FIGURE 2</span></div><div class="FigureDesc" data-dcnode-id="1656"><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/629675/fpos-03-629675-HTML/image_m/fpos-03-629675-g002.jpg" name="Figure2" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1665" id="F2" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/629675/fpos-03-629675-HTML/image_t/fpos-03-629675-g002.gif&amp;raw"></a><p data-dcnode-id="1657"><strong data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">FIGURE 2</span></strong><span data-dcnode-id="1661" instrument_node="">. Resettlement departures from Jordan in 2019. Source: </span><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="1660" instrument_node="">UNHCR (2020b)</span></a><span data-dcnode-id="1658" instrument_node="">.</span></p></div><div class="clear" data-dcnode-id="1655"></div><div class="DottedLine" data-dcnode-id="1654"></div><p class="mb15" data-dcnode-id="1649"><span data-dcnode-id="1653" instrument_node="">The large majority of refugees who were resettled from Jordan to Germany in 2019 were Syrians. Still, the German resettlement program is also targeted towards refugees with other nationalities and in 2019, 32 refugees from Iraq and 18 refugees from Sudan were resettled from Jordan to Germany (</span><a data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="1652" instrument_node="">UNHCR, 2020c</span></a><span data-dcnode-id="1650" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1641"><span data-dcnode-id="1648" instrument_node="">In addition to the permanent resettlement program, Germany has also employed several non-permanent humanitarian admission programs (</span><a data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="1647" instrument_node="">Grote et al., 2016</span></a><span data-dcnode-id="1645" instrument_node="">). As stated above, since 2016, most refugees have been admitted to Germany through the humanitarian admission program from Turkey, with a monthly quota of 500 persons (</span><a data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="1644" instrument_node="">BMI, 2018b</span></a><span data-dcnode-id="1642" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1630"><span data-dcnode-id="1640" instrument_node="">Turkey is the world’s largest refugee hosting country as well as the largest resettlement operation which organized the departure of in total 10,558 persons in 2019 (</span><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addth
