</span><h2 data-dcnode-id="790"><span data-dcnode-id="791" instrument_node=""> Our 2030 Goal: CARE provides quality, gender-focused and localized humanitarian assistance to 10% of those affected in major crises, reaching at least 50 million people by 2030. </span></h2><span data-dcnode-id="789" instrument_node="">

</span><div class="body-text__content" data-dcnode-id="764"><span data-dcnode-id="778" instrument_node="">
</span><h3 data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">In 2020, 168 million people needed humanitarian assistance — a number that has continued to grow over the last decade.</span></h3><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="774" instrument_node="">70.8 million people have been forcibly displaced from their homes</span><a data-dcnode-id="773" href="#_ftn2" name="_ftnref2"></a><span data-dcnode-id="772" instrument_node="">. The human consequences of these crises are devastating. Families struggle to find shelter, to get enough to eat, and to find safe places to rebuild their lives. One in five women in crisis has experienced sexual assault.</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="769" instrument_node="">On average, humanitarian crises are more complex than at any time in the last 15 years, and last nearly three years longer than they used to. Conflict, migration, and climate change are the key trends driving these crises — with 8 of the worst food crises in the world linked to conflict and climate change. </span><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">And so far, we have only raised 54% of the money we would need to help all of the people in crisis.</span></strong></p><span data-dcnode-id="765" instrument_node="">

</span><h3 data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">These trends to longer, more complicated crises have a huge impact on our ability to support the people in need.</span></h3><span data-dcnode-id="726" instrument_node="">
