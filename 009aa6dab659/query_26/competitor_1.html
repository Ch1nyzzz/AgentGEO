</span><h1 class="article__title" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Refugee crises around the world</span></h1><span data-dcnode-id="740" instrument_node="">
</span><span class="article__date article__date--published" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Published on :  2019/08/23 </span></span><span data-dcnode-id="737" instrument_node="">

            By </span><span class="author__src author__src--info-migrants en" data-dcnode-id="707"></span><span data-dcnode-id="706" instrument_node="">
</span><span class="author__name" data-dcnode-id="703"><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.infomigrants.net/en/author/aasim%2520saleem/" title="Aasim Saleem"><span data-dcnode-id="705" instrument_node=""> Aasim Saleem</span></a></span><span data-dcnode-id="702" instrument_node="">
</span><span class="article__date article__date--published" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Published on :  2019/08/23 </span></span><span data-dcnode-id="699" instrument_node="">
</span></div><span data-dcnode-id="697" instrument_node="">
</span><div class="article-content" data-dcnode-id="390"><span data-dcnode-id="696" instrument_node="">
</span><p class="article-content__description" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">War, political turmoil, ethnic conflicts and deteriorating economies have forced millions across Europe, Africa, South America, the Middle East and Asia to flee their homes. InfoMigrants takes a look at some major refugee crises around the world.</span></p><span data-dcnode-id="693" instrument_node="">
</span><div class="article-content__body" data-dcnode-id="392"><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">
</span></p><p class="MsoNormal" data-dcnode-id="685"><b data-dcnode-id="687"><span data-dcnode-id="688" lang="EN-US"><span data-dcnode-id="689" instrument_node="">Burundi Emergency</span></span></b><br data-dcnode-id="686"></p><span data-dcnode-id="684" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="681"><span data-dcnode-id="682" lang="EN-US"><span data-dcnode-id="683" instrument_node="">According to the
UNHCR, the total number of Burundian refugees stood at 342,867 at the end of
July 2019. Scattered across camps in Tanzania, Congo, Rwanda and Uganda, the
refugees only have access to very basic facilities.</span></span></p><span data-dcnode-id="680" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="672"><span data-dcnode-id="674" lang="EN-US"><span data-dcnode-id="679" instrument_node="">Meanwhile in Burundi,&nbsp;</span><span data-dcnode-id="675" style="background:white"><span data-dcnode-id="678" instrument_node="">economic decline, food insecurity and the outbreak of diseases such as&nbsp;</span><u data-dcnode-id="677"></u><span data-dcnode-id="676" instrument_node="">malaria and cholera&nbsp;</span></span></span><span data-dcnode-id="673" instrument_node="">continue to pose a humanitarian crisis. Although the worst has
passed, the situation remains fragile, with an unresolved political situation
and continued displacement within and outside the country.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="668"><span data-dcnode-id="669" lang="EN-US"><span data-dcnode-id="670" instrument_node="">Relief funding for the Burundian refugee crisis is the lowest spent on any situation globally. In
2018, UNHCR and its partners received just 33 percent of the required 391
million US dollars requested to support the Burundian refugees who are displaced since
the unrest began in 2015.</span></span></p><span data-dcnode-id="667" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="662"><span data-dcnode-id="665" lang="EN-US"><span data-dcnode-id="666" instrument_node="">President Pierre Nkurunziza’s decision to run for a
third, unconstitutional term</span></span><span data-dcnode-id="663" lang="EN-US"><span data-dcnode-id="664" instrument_node=""> in April 2015 sparked protests. His re-election in July turned the unrest into a violent
conflict.</span></span></p><span data-dcnode-id="661" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="657"><b data-dcnode-id="658"><span data-dcnode-id="659" lang="EN-US" style="mso-bidi-font-family:Calibri;mso-bidi-theme-font:minor-latin;background:
white;mso-ansi-language:EN-US;mso-bidi-font-style:italic"><span data-dcnode-id="660" instrument_node="">Democratic Republic
of Congo (DRC) Crisis</span></span></b></p><span data-dcnode-id="656" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="653"><span data-dcnode-id="654" lang="EN-US"><span data-dcnode-id="655" instrument_node="">Considered one of the most complex and challenging
humanitarian situation worldwide, the long-running crisis in the Democratic
Republic of Congo is responsible for over 850,000 refugees spread across the African
continent.</span></span></p><span data-dcnode-id="652" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="645"><span data-dcnode-id="650" lang="EN-US"><span data-dcnode-id="651" instrument_node="">The crisis </span></span><span data-dcnode-id="648" lang="EN-US" style="mso-bidi-font-family:Calibri;mso-bidi-theme-font:minor-latin;background:
white;mso-ansi-language:EN-US"><span data-dcnode-id="649" instrument_node="">started between 1960 and 1965. </span></span><span data-dcnode-id="646" lang="EN-US" style="mso-fareast-font-family:&quot;Times New Roman&quot;;mso-bidi-font-family:Calibri;
mso-bidi-theme-font:minor-latin;mso-ansi-language:EN-US;mso-fareast-language:
DE"><span data-dcnode-id="647" instrument_node="">Hopes soared after the civil war was brought to an end in 2003, but fighting
erupted again in the eastern parts of the country. Since 2016, a new wave of
violence hit DRC’s southern and central regions. Thousands of civilians are
struggling for survival.</span></span></p><p class="MsoNormal" data-dcnode-id="636"><span data-dcnode-id="637" lang="EN-US" style="mso-fareast-font-family:&quot;Times New Roman&quot;;mso-bidi-font-family:Calibri;
mso-bidi-theme-font:minor-latin;mso-ansi-language:EN-US;mso-fareast-language:
DE"><span data-dcnode-id="644" instrument_node="">
</span><span data-dcnode-id="643" instrument_node="">&nbsp;</span></span></p><div class="media media--image" data-dcnode-id="638"><figure class="ql-custom-figure" data-dcnode-id="639"><img alt="A group of people fleeing conflict in Goma in DR Congo with their belongings  Photo Getty ImagesAFPPMoore" class="media-from-admin" data-dcnode-id="642" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scd.infomigrants.net/media/resize/my_image_big/cf2b3ea2364350c56131e5ec3b1c21a979ef1b29.jpeg&amp;raw" title="A group of people fleeing conflict in Goma in DR Congo with their belongings | Photo: Getty Images/AFP/P.Moore"><figcaption data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">A group of people fleeing conflict in Goma in DR Congo with their belongings | Photo: Getty Images/AFP/P.Moore</span></figcaption></figure></div><p></p><span data-dcnode-id="635" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="631"><b data-dcnode-id="632"><span data-dcnode-id="633" lang="EN-US" style="mso-fareast-font-family:&quot;Times New Roman&quot;;mso-bidi-font-family:Calibri;
mso-bidi-theme-font:minor-latin;mso-ansi-language:EN-US;mso-fareast-language:
DE"><span data-dcnode-id="634" instrument_node="">Europe Situation</span></span></b></p><span data-dcnode-id="630" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="627"><span data-dcnode-id="628" lang="EN-US"><span data-dcnode-id="629" instrument_node="">Over a million refugees reached Europe in 2015,
primarily from the Middle East and Afghanistan. In the following years, border
restrictions and tightening of asylum policies have gradually cut down the
number of arrivals. 2016 saw 370,000 arrivals, in 2017 over 180,000 reached
Europe and in 2018 a total of around 140,000 migrants and refugees from Asia, Africa
&amp; the Middle East came to Europe. Roughly over 14,000 people have either
gone missing or drowned in the Mediterranean while trying to reach Europe since 2015.</span></span></p><span data-dcnode-id="626" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="623"><span data-dcnode-id="624" lang="EN-US"><span data-dcnode-id="625" instrument_node="">The vast majority of refugees arriving in Europe
is from Syria, where a violent civil war continues to engulf parts of the
country. Iraqis seeking refuge from violence and unrest, Afghans fleeing the
Taliban and African migrants in search of a better life form other large
groups.</span></span></p><span data-dcnode-id="622" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="613"><span data-dcnode-id="614" lang="EN-US"><span data-dcnode-id="621" instrument_node="">Europe’s response has been somewhat mixed in accepting
refugees and migrants. While some countries have taken more than their fair share of
refugees, others have completely shut their doors, brining the block’s solidarity
and unity at stake.

</span><span data-dcnode-id="620" instrument_node="">
</span></span></p><div class="media media--image" data-dcnode-id="615"><figure class="ql-custom-figure" data-dcnode-id="616"><img alt="The Spanish rescue ship Open Arms off the coast of Lampedusa  Photo Picture-alliancedpaFBungert" class="media-from-admin" data-dcnode-id="619" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scd.infomigrants.net/media/resize/my_image_big/e57397c2c4ab1b121d788c45f9f5c0b8768b86ed.jpeg&amp;raw" title="The Spanish rescue ship Open Arms off the coast of Lampedusa | Photo: Picture-alliance/dpa/F.Bungert"><figcaption data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">The Spanish rescue ship Open Arms off the coast of Lampedusa | Photo: Picture-alliance/dpa/F.Bungert</span></figcaption></figure></div><p></p><span data-dcnode-id="612" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="608"><b data-dcnode-id="609"><span data-dcnode-id="610" lang="EN-US"><span data-dcnode-id="611" instrument_node="">Nigeria Situation</span></span></b></p><span data-dcnode-id="607" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="604"><span data-dcnode-id="605" lang="EN-US"><span data-dcnode-id="606" instrument_node="">Triggered by violent attacks by the Islamist group
Boko Haram,&nbsp;the Nigerian refugee crisis is in its sixth year in 2019. Since then, Cameroon, Chad and Niger have been drawn into what has
become a regional conflict.</span></span></p><span data-dcnode-id="603" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="600"><span data-dcnode-id="601" lang="EN-US"><span data-dcnode-id="602" instrument_node="">Over 2.7 million
people have been displaced due to the security situation, which include about 1.9 million internally
displaced persons (IDPs) in north-eastern Nigeria, over 541,000 IDPs in
Cameroon, Chad and Niger.&nbsp;Over 240,000 Nigerians are living as refugees in the four countries.</span></span></p><span data-dcnode-id="599" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="591"><span data-dcnode-id="597" lang="EN-US"><span data-dcnode-id="598" instrument_node="">The
crisis has been amplified by food insecurity and severe malnutrition, which
have risen to critical levels in all four states. To date, some 3.5 million
people remain food insecure in the Lake Chad Basin region.&nbsp;</span></span></p><div class="media media--image" data-dcnode-id="592"><figure class="ql-custom-figure" data-dcnode-id="593"><img alt="Women in a displaced persons camp in Maiduguri in north-eastern Nigeria |  Photo: REUTERS / Afolabi Sotunde." class="media-from-admin" data-dcnode-id="596" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scd.infomigrants.net/media/resize/my_image_big/b5ac497abafa066c1ae5ddd678fe4560da9e3a85.jpeg&amp;raw" title="Women in a displaced persons camp in Maiduguri in north-eastern Nigeria |  Photo: REUTERS / Afolabi Sotunde."><figcaption data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Women in a displaced persons camp in Maiduguri in north-eastern Nigeria |  Photo: REUTERS / Afolabi Sotunde.</span></figcaption></figure></div><p></p><span data-dcnode-id="590" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="586"><b data-dcnode-id="587"><span data-dcnode-id="588" lang="EN-US" style="mso-bidi-font-family:Calibri;mso-bidi-theme-font:minor-latin;background:
white;mso-ansi-language:EN-US"><span data-dcnode-id="589" instrument_node="">South Sudan Situation</span></span></b></p><span data-dcnode-id="585" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="582"><span data-dcnode-id="583" lang="EN-US"><span data-dcnode-id="584" instrument_node="">According
to the UNHCR, there are currently around 2.3 million refugees and asylum
seekers from South Sudan in the region, mainly in Ethiopia, Sudan and Uganda. Within the country as well, there are about two million IDPs.</span></span></p><span data-dcnode-id="581" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="578"><span data-dcnode-id="579" lang="EN-US"><span data-dcnode-id="580" instrument_node="">Women
and children account for almost 83 percent of the refugees. They face severe
shortages in food and health supplies as well as opportunities for education.</span></span></p><span data-dcnode-id="577" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="574"><span data-dcnode-id="575" lang="EN-US"><span data-dcnode-id="576" instrument_node="">The UNHCR
is appealing for 2.7 billion dollars to address the life-saving humanitarian
needs of South Sudanese refugees in 2019 and 2020. In 2018, UNHCR and its
partners received just 38 percent of the required 1.4 billion.</span></span></p><span data-dcnode-id="573" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="565"><span data-dcnode-id="566" lang="EN-US"><span data-dcnode-id="572" instrument_node="">The
civil war in South Sudan between the government forces and the opposition is going
on since 2013.

</span></span></p><div class="media media--image" data-dcnode-id="567"><figure class="ql-custom-figure" data-dcnode-id="568"><img alt="Refugees in South Sudan CREDIT OXFAM" class="media-from-admin" data-dcnode-id="571" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scd.infomigrants.net/media/resize/my_image_big/fb53d00c7c8cd4f75e6ea0ac680f154bf6a5b7bc.jpeg&amp;raw" title="Refugees in South Sudan. CREDIT: OXFAM"><figcaption data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Refugees in South Sudan. CREDIT: OXFAM</span></figcaption></figure></div><p></p><p class="MsoNormal" data-dcnode-id="560"><span data-dcnode-id="561" lang="EN-US"><b data-dcnode-id="562"><span data-dcnode-id="563" lang="EN-US"><span data-dcnode-id="564" instrument_node="">Venezuela Crisis</span></span></b></span></p><p class="MsoNormal" data-dcnode-id="558"><b data-dcnode-id="559"></b></p><span data-dcnode-id="557" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="552"><span data-dcnode-id="555" lang="EN-US"><span data-dcnode-id="556" instrument_node="">Violence,
political insecurity, threats as well as lack of food, medicine and essential
services, have prompted over 4 million Venezuelans to seek refuge in Latin
America and the Caribbean. </span></span><span data-dcnode-id="553" lang="EN-US"><span data-dcnode-id="554" instrument_node="">Host countries and communities in Argentina, Brazil, Chile, Colombia,
Costa Rica, Ecuador, Mexico, Panama, Peru and the Caribbean have been welcoming
them, but are increasingly overstretched.</span></span></p><span data-dcnode-id="551" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="537"><span data-dcnode-id="549" lang="EN-US"><span data-dcnode-id="550" instrument_node="">The
socioeconomic and political crisis in Venezuela began in President Hugo Chavez’s
tenure and has </span></span><span data-dcnode-id="538" lang="EN-US"><span data-dcnode-id="548" instrument_node="">worsened during the</span><span data-dcnode-id="546" style="background:white"><span data-dcnode-id="547" instrument_node=""> presidency of Nicolas Maduro. Their supporters attribute
the problems to the “economic war” waged against Venezuela</span></span><span data-dcnode-id="545" instrument_node="">, falling oil
prices and international sanctions while the critics say the causes include economic mismanagement and corruption.

</span><span data-dcnode-id="544" instrument_node="">
</span></span></p><div class="media media--image" data-dcnode-id="539"><figure class="ql-custom-figure" data-dcnode-id="540"><img alt="Venezuelan migrant families are seen at a makeshift camp alongside the Cali river in northern Cali Colombia on July 31 2018" class="media-from-admin" data-dcnode-id="543" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scd.infomigrants.net/media/resize/my_image_big/dbbbd72dc1d5c9d67dc8a23517d8f8b6260c4e6f.jpeg&amp;raw" title="Venezuelan migrant families are seen at a makeshift camp alongside the Cali river in northern Cali, Colombia, on July 31, 2018"><figcaption data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Venezuelan migrant families are seen at a makeshift camp alongside the Cali river in northern Cali, Colombia, on July 31, 2018</span></figcaption></figure></div><p></p><p class="MsoNormal" data-dcnode-id="533"><b data-dcnode-id="534"><span data-dcnode-id="535" lang="EN-US" style="background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;"><span data-dcnode-id="536" instrument_node="">Central African Republic (CAR) Crisis</span></span></b></p><span data-dcnode-id="532" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="529"><span data-dcnode-id="530" lang="EN-US"><span data-dcnode-id="531" instrument_node="">Hundreds
and thousands of people were forced to flee their homes as violence spread in
the Central African Republic in December 2013. Since then some 600,000 people
have taken refuge in neighboring Cameroon, Chad, Democratic Republic of Congo, the
Republic of Congo as well as Sudan and South Sudan. Meanwhile, CAR continues
to experience sporadic surges of violence.</span></span></p><span data-dcnode-id="528" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="519"><span data-dcnode-id="520" lang="EN-US"><span data-dcnode-id="527" instrument_node="">One
of the most poorly funded emergency situations globally, refugees from CAR lack
even basic facilities such as food, health, shelter, water and sanitation.

</span><span data-dcnode-id="526" instrument_node="">
</span></span></p><div class="media media--image" data-dcnode-id="521"><figure class="ql-custom-figure" data-dcnode-id="522"><img alt="Where do refugees from Central African Republic go  Credit DW" class="media-from-admin" data-dcnode-id="525" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scd.infomigrants.net/media/resize/my_image_big/3d035a8f54414c611c9b0947d080eb3195d8898c.png&amp;raw" title="Where do refugees from Central African Republic go? | Credit: DW"><figcaption data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Where do refugees from Central African Republic go? | Credit: DW</span></figcaption></figure></div><p></p><span data-dcnode-id="518" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="513"><b data-dcnode-id="515"><span data-dcnode-id="516" lang="EN-US" style="background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;"><span data-dcnode-id="517" instrument_node="">Displacement in Central America</span></span></b><br data-dcnode-id="514"></p><span data-dcnode-id="512" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="508"><span data-dcnode-id="510" lang="EN-US"><span data-dcnode-id="511" instrument_node="">The number of refugees and asylum seekers from Central American countries has considerably increased in the last five
years. There are currently over 350,000 refugees and asylum seekers worldwide.&nbsp;</span></span><span data-dcnode-id="509" instrument_node="">They
are escaping gang violence, threats, extortion, recruitment into gangs or
prostitution, as well as sexual and gender-based violence in Honduras, El Salvador and Guatemala.</span></p><span data-dcnode-id="507" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="503"><span data-dcnode-id="505" lang="EN-US"><span data-dcnode-id="506" instrument_node="">Host
countries and communities in Belize, Costa Rica, El Salvador, Guatemala,
Honduras, Mexico and Panama, have been doing their best to welcome the ones forced
to flee</span></span><span data-dcnode-id="504" instrument_node="">.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="499"><span data-dcnode-id="500" lang="EN-US"><span data-dcnode-id="501" instrument_node="">UNHCR
needs 44.5 million dollars in 2019 to continue responding to the immediate and
persistent needs of internally displaced people, asylum seekers, refugees and
deportees from North Central America (NCA) and Nicaragua.</span></span></p><span data-dcnode-id="498" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="494"><b data-dcnode-id="495"><span data-dcnode-id="496" lang="EN-US" style="mso-bidi-font-family:Calibri;mso-bidi-theme-font:minor-latin;background:
white;mso-ansi-language:EN-US"><span data-dcnode-id="497" instrument_node="">Iraq Situation</span></span></b></p><span data-dcnode-id="493" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="484"><span data-dcnode-id="485" lang="EN-US"><span data-dcnode-id="492" instrument_node="">Decades
of conflict and violence have forced millions of Iraqis to abandon their homes.
Since 2014, more than 3 million people have been displaced within Iraq and over
260,000 are living as refugees in other countries. It is estimated that over 11
million Iraqis are currently in need of humanitarian assistance within the
country and outside.

</span><span data-dcnode-id="491" instrument_node="">
</span></span></p><div class="media media--image" data-dcnode-id="486"><figure class="ql-custom-figure" data-dcnode-id="487"><img alt="Many villagers have been caught in the crossfire between the Islamic State and the Iraqi army in Mosul" class="media-from-admin" data-dcnode-id="490" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scd.infomigrants.net/media/resize/my_image_big/ace22560fe36fae3cdd411636fdb4ed93efa1ac1.jpeg&amp;raw" title="Many villagers have been caught in the crossfire between the &quot;Islamic State&quot; and the Iraqi army in Mosul"><figcaption data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Many villagers have been caught in the crossfire between the "Islamic State" and the Iraqi army in Mosul</span></figcaption></figure></div><p></p><p class="MsoNormal" data-dcnode-id="479"><b data-dcnode-id="481"><span data-dcnode-id="482" lang="EN-US"><span data-dcnode-id="483" instrument_node="">Rohingya Crisis</span></span></b><br data-dcnode-id="480"></p><span data-dcnode-id="478" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="471"><span data-dcnode-id="476" lang="EN-US"><span data-dcnode-id="477" instrument_node="">Over a million Rohingya fled violence
in Myanmar in successive waves of displacement since the early 1990s. The
largest exodus took place in 2017, when over 742,000 crossed over to Bangladesh
as violence broke out in Myanmar’s Rakhine State. </span></span><span data-dcnode-id="474" lang="EN-US" style="mso-bidi-font-family:Calibri;mso-bidi-theme-font:minor-latin;background:
white;mso-ansi-language:EN-US"><span data-dcnode-id="475" instrument_node="">Most sought shelter in and around the refugee
settlements in Bangladesh’s Cox’s Bazar district.</span></span><span data-dcnode-id="472" lang="EN-US"><span data-dcnode-id="473" instrument_node=""> The vast majority that reached Bangladesh were women and children and
more than 40 percent were under the age of 12.</span></span></p><span data-dcnode-id="470" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="467"><span data-dcnode-id="468" lang="EN-US"><span data-dcnode-id="469" instrument_node="">While the UN described the offensive in Rakhine as a ‘textbook example of
ethnic cleansing’ in one of its reports, Myanmar's military says it is fighting
militants and denies targeting civilians.</span></span></p><span data-dcnode-id="466" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="455"><span data-dcnode-id="464" lang="EN-US"><span data-dcnode-id="465" instrument_node="">The Muslim Rohingya minority </span></span><span data-dcnode-id="456" lang="EN-US"><span data-dcnode-id="463" instrument_node="">has faced decades of discrimination and repression in Myanmar. They
were denied citizenship under the 1982 Citizenship Law, making them one of the
largest stateless populations in the world.

</span><span data-dcnode-id="462" instrument_node="">
</span></span></p><div class="media media--image" data-dcnode-id="457"><figure class="ql-custom-figure" data-dcnode-id="458"><img alt="Rohingya refugees are fleeing ethnic violence in Myanmar  Photo Picture Alliance  Nur Photo  T Chowdhury" class="media-from-admin" data-dcnode-id="461" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scd.infomigrants.net/media/resize/my_image_big/2974382921f8e2b4c1bcbac35805b80b6dc1f8ba.jpeg&amp;raw" title="Rohingya refugees are fleeing ethnic violence in Myanmar | Photo: Picture Alliance / Nur Photo / T. Chowdhury"><figcaption data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Rohingya refugees are fleeing ethnic violence in Myanmar | Photo: Picture Alliance / Nur Photo / T. Chowdhury</span></figcaption></figure></div><p></p><span data-dcnode-id="454" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="450"><b data-dcnode-id="451"><span data-dcnode-id="452" lang="EN-US" style="mso-bidi-font-family:Calibri;mso-bidi-theme-font:minor-latin;background:
white;mso-ansi-language:EN-US"><span data-dcnode-id="453" instrument_node="">Syrian Refugee Crisis</span></span></b></p><span data-dcnode-id="449" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="444"><span data-dcnode-id="447" lang="EN-US"><span data-dcnode-id="448" instrument_node="">After
the civil war broke out in March 2011, </span></span><span data-dcnode-id="445" lang="EN-US" style="mso-fareast-font-family:&quot;Times New Roman&quot;;mso-bidi-font-family:Calibri;
mso-bidi-theme-font:minor-latin;mso-ansi-language:EN-US;mso-fareast-language:
DE;mso-bidi-font-weight:bold"><span data-dcnode-id="446" instrument_node="">over 5.6 million Syrian people fled their country
and sought refuge in Lebanon, Turkey, Jordan and Europe. Meanwhile, millions
more are displaced inside Syria.</span></span></p><span data-dcnode-id="443" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="440"><span data-dcnode-id="441" lang="EN-US"><span data-dcnode-id="442" instrument_node="">Turkey
hosts the largest number of registered Syrian refugees, roughly over 3.3
million.</span></span></p><span data-dcnode-id="439" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="436"><span data-dcnode-id="437" lang="EN-US"><span data-dcnode-id="438" instrument_node="">UNHCR
says it requires 4.4 billion dollars to support over 5 million Syrian refugees in neighboring
countries and some four million people in the communities hosting them.</span></span></p><span data-dcnode-id="435" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="431"><b data-dcnode-id="432"><span data-dcnode-id="433" lang="EN-US" style="mso-bidi-font-family:Calibri;mso-bidi-theme-font:minor-latin;background:
white;mso-ansi-language:EN-US"><span data-dcnode-id="434" instrument_node="">Yemen Crisis</span></span></b></p><span data-dcnode-id="430" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="427"><span data-dcnode-id="428" lang="EN-US"><span data-dcnode-id="429" instrument_node="">Fighting between the government and Houthi rebels
in Yemen has disrupted millions of lives, resulting in widespread casualties
and massive displacement. Civilians bear the brunt of the crisis, with 22.2
million Yemenis now in need of humanitarian assistance. Roughly 190,000 have
fled to neighboring countries.</span></span></p><span data-dcnode-id="426" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="418"><span data-dcnode-id="419" lang="EN-US"><span data-dcnode-id="425" instrument_node="">Yemen is facing a humanitarian catastrophe.
Without help, many more lives can be lost to violence, illnesses or
lack of food, water and shelter.

</span></span></p><div class="media media--image" data-dcnode-id="420"><figure class="ql-custom-figure" data-dcnode-id="421"><img alt="Yemen Sanaa - Menschenmengen bei Essensausgabe ReutersK Abdullah" class="media-from-admin" data-dcnode-id="424" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scd.infomigrants.net/media/resize/my_image_big/f973367e8af25e9d9e82129474dc0c92e28e4a6b.jpeg&amp;raw" title="Yemen Sanaa - Menschenmengen bei Essensausgabe (Reuters/K. Abdullah)"><figcaption data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Yemen Sanaa - Menschenmengen bei Essensausgabe (Reuters/K. Abdullah)</span></figcaption></figure></div><p></p><span data-dcnode-id="417" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="413"><b data-dcnode-id="414"><span data-dcnode-id="415" lang="EN-US" style="mso-fareast-font-family:&quot;Times New Roman&quot;;mso-bidi-font-family:Calibri;
mso-bidi-theme-font:minor-latin;mso-ansi-language:EN-US;mso-fareast-language:
DE"><span data-dcnode-id="416" instrument_node="">Afghan Refugees Situation</span></span></b></p><span data-dcnode-id="412" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="409"><span data-dcnode-id="410" lang="EN-US"><span data-dcnode-id="411" instrument_node="">The Soviet War in Afghanistan displaced over six
million people in 1979. The Soviet Union withdrew all its troops in 1989, but
the civil war continued as the Mujahedeen wanted to topple President
Najibullah’s government, which they were eventually able to do in 1992. This was
followed by the rise of the Taliban. After the 9/11 terrorist attacks, the US
started military action in Afghanistan against Al-Qaeda and the Taliban; a
military presence continues today.</span></span></p><span data-dcnode-id="408" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="399"><span data-dcnode-id="400" lang="EN-US"><span data-dcnode-id="407" instrument_node="">As a result of these situations, there are some 2.6
million Afghans registered as refugees in more than 70 countries around the
world. An overwhelming majority of Afghan refugees, almost 95 percent, live in
just two countries, Pakistan and Iran. Over 1.3 million Afghans are registered
as refugees with the UNHCR in Pakistan; whereas in Iran, the number of
registered Afghan refugees is also over a million.

</span><span data-dcnode-id="406" instrument_node="">
</span></span></p><div class="media media--image" data-dcnode-id="401"><figure class="ql-custom-figure" data-dcnode-id="402"><img alt="Child in Afghanistan  Credit Save the ChildrenZubair Shair Sherzay " class="media-from-admin" data-dcnode-id="405" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scd.infomigrants.net/media/resize/my_image_big/89dfde1fbf242b4ef16adfd6e4595254ff27b1e8.jpeg&amp;raw" title="Child in Afghanistan | Credit: Save the Children/Zubair Shair Sherzay "><figcaption data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Child in Afghanistan | Credit: Save the Children/Zubair Shair Sherzay </span></figcaption></figure></div><p></p><p class="MsoNormal" data-dcnode-id="395"><span data-dcnode-id="396" lang="EN-US"><i data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Based on figures by the UNHCR</span></i></span></p><p data-dcnode-id="394"></p><span data-dcnode-id="393" instrument_node="">
