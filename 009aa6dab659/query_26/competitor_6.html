</span><p data-dcnode-id="2899"><span data-dcnode-id="2926" instrument_node="">When the Myanmar Armed Forces (formally known as the Tatamadaw) attacked on August 29</span><sup data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">th</span></sup><span data-dcnode-id="2923" instrument_node=""> 2009,</span><a data-dcnode-id="2921" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn89" title=""><span data-dcnode-id="2922" instrument_node="">[89]</span></a><span data-dcnode-id="2920" instrument_node=""> no warning was given to the Chinese government. As the attacks were targeted at population based on their ethnicity, this renders citizens who flee as refugees. Conflict in the area prompted 10,000 – 30,000 Burmese refugees to flee into Yunnan within the span of a month. Local Chinese authorities immediately provided emergency shelter, food, and medical care to the refugees.</span><a data-dcnode-id="2918" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn90" title=""><span data-dcnode-id="2919" instrument_node="">[90]</span></a><span data-dcnode-id="2917" instrument_node=""> UNHCR regional spokesman confirms the Chinese assistance in aid and medical care.</span><a data-dcnode-id="2915" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn91" title=""><span data-dcnode-id="2916" instrument_node="">[91]</span></a><span data-dcnode-id="2914" instrument_node=""> While China offers humanitarian aid and has no intentions of pushing refugees back into the conflict zone, China does not wish to have refugees settling further inland.</span><a data-dcnode-id="2912" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn92" title=""><span data-dcnode-id="2913" instrument_node="">[92]</span></a><span data-dcnode-id="2911" instrument_node=""> Furthermore, China never declared incoming Burmese residents as refugees.</span><a data-dcnode-id="2909" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn93" title=""><span data-dcnode-id="2910" instrument_node="">[93]</span></a><span data-dcnode-id="2908" instrument_node=""> On the official end, the Chinese government openly expressed its discontent. Chinese Foreign Ministry spokeswomen Jiang Yu stated that “China hoped Myanmar could properly solve its domestic issues and safeguard the stability of its border with China,” a rare statement for a country intent on non-interference.</span><a data-dcnode-id="2906" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn94" title=""><span data-dcnode-id="2907" instrument_node="">[94]</span></a><span data-dcnode-id="2905" instrument_node=""> As the Tatmadaw won a quick, decisive victory over the Kokang MNDAA by August 31</span><sup data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">st</span></sup><span data-dcnode-id="2902" instrument_node="">, 2009, the next day, around two-thirds of refugees who entered China had returned to their homes in Myanmar.</span><a data-dcnode-id="2900" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn95" title=""><span data-dcnode-id="2901" instrument_node="">[95]</span></a></p><span data-dcnode-id="2898" instrument_node="">
</span><p data-dcnode-id="2895"><i data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">2011 Incident</span></i></p><span data-dcnode-id="2894" instrument_node="">
</span><p data-dcnode-id="2884"><span data-dcnode-id="2893" instrument_node="">In June 2011, skirmishes began between the Burmese government and the KIA in the Kachin state, ending another 17-year ceasefire agreement. Tensions had been brewing between the Burmese government and KIA over the past year. In the 2010 elections, Kachin candidates had been blocked from participating, even though the Kachin Independence Organisation (the political wing of KIA) had been participating in and cooperating with the government’s roadmap to democracy since the 1990s.</span><a data-dcnode-id="2891" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn96" title=""><span data-dcnode-id="2892" instrument_node="">[96]</span></a><span data-dcnode-id="2890" instrument_node=""> However, KIA ignored several deadlines that the Burmese government have set for incorporation of KIA elements under the Tatmadaw. Meanwhile, KIA called for a withdrawal of all Tatmadaw forces near KIA posts in the Kachin state. Some sources point to the construction of the hydroelectric dams, built by the Chinese companies, as a contributing factor to the conflict.</span><a data-dcnode-id="2888" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn97" title=""><span data-dcnode-id="2889" instrument_node="">[97]</span></a><span data-dcnode-id="2887" instrument_node="">&nbsp; These dams are deeply unpopular in the area, and are perceived as destructive to the environment and society.</span><a data-dcnode-id="2885" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn98" title=""><span data-dcnode-id="2886" instrument_node="">[98]</span></a></p><span data-dcnode-id="2883" instrument_node="">
</span><p data-dcnode-id="2872"><span data-dcnode-id="2882" instrument_node="">As conflict intensified, an estimated 7,000 – 10,000 Burmese citizens fled into China.</span><a data-dcnode-id="2880" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn99" title=""><span data-dcnode-id="2881" instrument_node="">[99]</span></a><span data-dcnode-id="2879" instrument_node="">&nbsp; Human Rights Watch stated that in Myanmar, the Tatmadaw have been entering villages to interrogate and torture local residents in efforts to uncover affiliations with the KIA.</span><a data-dcnode-id="2877" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn100" title=""><span data-dcnode-id="2878" instrument_node="">[100]</span></a><span data-dcnode-id="2876" instrument_node="">&nbsp; Accounts of forced labour, destruction of property and livelihoods are reported.</span><a data-dcnode-id="2874" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn101" title=""><span data-dcnode-id="2875" instrument_node="">[101]</span></a><span data-dcnode-id="2873" instrument_node=""> As a result of this conflict, and of well-founded fears of persecution from the government on the basis that they are Kachin residents, Burmese citizens who flee into China are recognized as refugees under the UN Convention.</span></p><div class="advads-infeed-7-desktop" data-dcnode-id="2865" id="advads-1245939937" style="margin-bottom: 22px; "><ins class="adsbygoogle" data-ad-client="ca-pub-6827106764042735" data-ad-slot="4710931000" data-dcnode-id="2870" style="display:inline-block;width:728px;height:90px;"></ins><span data-dcnode-id="2869" instrument_node="">
</span><span data-dcnode-id="2866" instrument_node="">
</span></div><span data-dcnode-id="2864" instrument_node="">
</span><p data-dcnode-id="2847"><span data-dcnode-id="2863" instrument_node="">However, in contrast to the 2009 incident, China has been much less accommodating to Burmese refugees. Quieter Chinese reaction to this incident, in contrast to China’s outspoken discontent with the 2009 incident, reflects a higher level of cooperation between China and Myanmar in 2011. The official stance of China, as exemplified by the spokesperson for Chinese Ministry of Foreign Affairs, Hong Lei, disputes the refugee status of incoming Burmese people.</span><a data-dcnode-id="2861" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn102" title=""><span data-dcnode-id="2862" instrument_node="">[102]</span></a><span data-dcnode-id="2860" instrument_node="">&nbsp; As such, no international aid groups are allowed in the border area.&nbsp; Burmese refugees who have entered China have so far lacked access to proper sanitation, shelter, healthcare or schools.</span><a data-dcnode-id="2858" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn103" title=""><span data-dcnode-id="2859" instrument_node="">[103]</span></a><span data-dcnode-id="2857" instrument_node=""> The </span><i data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">Democratic Voice of Burma</span></i><span data-dcnode-id="2854" instrument_node=""> reported that there are around 10,000 Kachins living in makeshift tents on the Chinese side of the border, while some are hiding in the jungle. Furthermore, it has been reported that China is refusing to allow certain refugees to cross the border, claiming that there is no fighting on the Burmese side.</span><a data-dcnode-id="2852" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn104" title=""><span data-dcnode-id="2853" instrument_node="">[104]</span></a><span data-dcnode-id="2851" instrument_node=""> In other cases, there are forced repatriations back into the Burmese conflict zone.</span><a data-dcnode-id="2849" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn105" title=""><span data-dcnode-id="2850" instrument_node="">[105]</span></a><span data-dcnode-id="2848" instrument_node=""> This seems to indicate a greater level of cooperation between the two states. In accordance to the hypothesis, Chinese refugee policies became stricter, and repatriation was practiced.</span></p><span data-dcnode-id="2846" instrument_node="">
</span><p data-dcnode-id="2843"><i data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">Vietnam (Socialist Republic of Vietnam)</span></i></p><span data-dcnode-id="2842" instrument_node="">
</span><p data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">In contrast to the North Korean and Burmese cases, China’s treatment towards Vietnamese refugees featured an open-door and a comprehensive resettlement program, which succeeded in integrating the refugees into Chinese society. Sino-Vietnamese relations went from a period of comradeship from the founding of the PRC, to increasing strain throughout the decades. During the 1970s, when the exodus of refugees into China occurred, relations were at its worst. The deterioration of relations led to eventual Chinese invasion into Vietnam in 1979. Against this backdrop, Chinese policy of refugee admission reflects extremely fraught bilateral relations, marking this case study at the low-level of cooperation end of the spectrum.</span></p><span data-dcnode-id="2839" instrument_node="">
</span><p data-dcnode-id="2836"><i data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Historic Overview and Sino-Vietnamese Relations</span></i></p><span data-dcnode-id="2835" instrument_node="">
</span><p data-dcnode-id="2809"><span data-dcnode-id="2834" instrument_node="">Relations between China and Vietnam have fluctuated between times of comradeship and periods of hostility. Historically, China had attempted to exert influence and power over Vietnam, while Vietnam in return has strived to protect and maintain its independence.</span><a data-dcnode-id="2832" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn106" title=""><span data-dcnode-id="2833" instrument_node="">[106]</span></a><span data-dcnode-id="2831" instrument_node="">&nbsp; In the 1950s, when Vietnam wrestled for independence from French colonization during the First Indochina War, the PRC offered support to the Viet Minh to defeat the French.</span><a data-dcnode-id="2829" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn107" title=""><span data-dcnode-id="2830" instrument_node="">[107]</span></a><span data-dcnode-id="2828" instrument_node=""> Their joint struggle against imperialism created an alliance between the two as “brotherly comrades.”</span><a data-dcnode-id="2826" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn108" title=""><span data-dcnode-id="2827" instrument_node="">[108]</span></a><span data-dcnode-id="2825" instrument_node=""> According to the Chinese scholar Guo Ming, the term the “golden era” was used to describe Sino-Vietnam relations between 1949-1954.</span><a data-dcnode-id="2823" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn109" title=""><span data-dcnode-id="2824" instrument_node="">[109]</span></a><span data-dcnode-id="2822" instrument_node="">&nbsp; However, differences between the Chinese and Vietnamese began to surface during post-war negotiations.</span><a data-dcnode-id="2820" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn110" title=""><span data-dcnode-id="2821" instrument_node="">[110]</span></a><span data-dcnode-id="2819" instrument_node=""> While Vietnam wanted to push for settlement terms that would include an immediate nation-wide plebiscite, China felt Vietnam should be more modest in its goals and accept the division of Vietnam at the 17</span><sup data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node="">th</span></sup><span data-dcnode-id="2816" instrument_node=""> parallel.</span><a data-dcnode-id="2814" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn111" title=""><span data-dcnode-id="2815" instrument_node="">[111]</span></a><span data-dcnode-id="2813" instrument_node=""> Chinese behaviour at negotiations built upon Vietnam’s historic sensitivity that China wishes to keep Vietnam weak in order for China to maintain its power over Vietnam.</span><a data-dcnode-id="2811" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn112" title=""><span data-dcnode-id="2812" instrument_node="">[112]</span></a><span data-dcnode-id="2810" instrument_node=""> This perception will continue to influence Vietnam’s behaviour in the upcoming decades.</span></p><span data-dcnode-id="2808" instrument_node="">
</span><p data-dcnode-id="2786"><span data-dcnode-id="2807" instrument_node="">Nonetheless, Sino-Vietnam relations remained close from the late-50s into the 60s.</span><a data-dcnode-id="2805" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn113" title=""><span data-dcnode-id="2806" instrument_node="">[113]</span></a><span data-dcnode-id="2804" instrument_node="">&nbsp; Between 1956 and 1963, China provided North Vietnam a total of 320 million </span><i data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">yuan</span></i><span data-dcnode-id="2801" instrument_node=""> in military aid.</span><a data-dcnode-id="2799" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn114" title=""><span data-dcnode-id="2800" instrument_node="">[114]</span></a><span data-dcnode-id="2798" instrument_node=""> Similar large-scale assistance was delivered during the Second Indochina War between 1965-1973, also known as the Vietnam War. At this time, China and Vietnam united to safeguard communism and resist expansion of Western influences.&nbsp; This sentiment was expressed through PRC’s Chairman Mao Zedong’s statement that China would offer “unconditional support” to Vietnamese Communists.</span><a data-dcnode-id="2796" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn115" title=""><span data-dcnode-id="2797" instrument_node="">[115]</span></a><span data-dcnode-id="2795" instrument_node=""> Nearing the end of the 1960s, China was involved in construction and maintenance of defence works and infrastructure in North Vietnam, as well as the provision of military equipment and civil materials.</span><a data-dcnode-id="2793" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn116" title=""><span data-dcnode-id="2794" instrument_node="">[116]</span></a><span data-dcnode-id="2792" instrument_node=""> Meanwhile, the regime of North Vietnam worked to preserve measures of independence by disallowing Beijing to interfere in Viet Minh’s decision-making.</span><a data-dcnode-id="2790" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn117" title=""><span data-dcnode-id="2791" instrument_node="">[117]</span></a><span data-dcnode-id="2789" instrument_node=""> However, China continued to view Sino-Vietnam relations in the lens of Chinese superiority, and demanded Vietnam’s recognition of China’s upheld position.</span><a data-dcnode-id="2787" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn118" title=""><span data-dcnode-id="2788" instrument_node="">[118]</span></a></p><span data-dcnode-id="2785" instrument_node="">
</span><p data-dcnode-id="2769"><span data-dcnode-id="2784" instrument_node="">In the early 1970s, relations between China and Vietnam began to deteriorate when China downsized its aid pledges to Vietnam. As Chinese Premier Zhou Enlai described, China’s attitude went from providing Vietnam “whatever is necessary,” to give “China a break!”</span><a data-dcnode-id="2782" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn119" title=""><span data-dcnode-id="2783" instrument_node="">[119]</span></a><span data-dcnode-id="2781" instrument_node=""> Both domestic and international factors contributed to this shift.</span><a data-dcnode-id="2779" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn120" title=""><span data-dcnode-id="2780" instrument_node="">[120]</span></a><span data-dcnode-id="2778" instrument_node="">&nbsp; The main point of contention for Vietnam arose to be China’s delivery of aid packages. In 1971-72, supplies and materials from the Soviet Union and other countries were transported through China to be delivered to Vietnam. China had intended to partake in this process in order to create conflict between Soviet Union and Vietnam by attempting to demonstrate the Soviet Union’s inability to fulfil its promises.</span><a data-dcnode-id="2776" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn121" title=""><span data-dcnode-id="2777" instrument_node="">[121]</span></a><span data-dcnode-id="2775" instrument_node=""> However, this strategy backfired as Vietnam saw China as the source of ineptness when transfer of goods was delayed.</span><a data-dcnode-id="2773" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn122" title=""><span data-dcnode-id="2774" instrument_node="">[122]</span></a><span data-dcnode-id="2772" instrument_node=""> On the other hand, China felt Vietnam was being unappreciative and ungrateful for China’s previous unconditional support in the past decades, as Chinese assistance have totalled over 20$ billion.</span><a data-dcnode-id="2770" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn123" title=""><span data-dcnode-id="2771" instrument_node="">[123]</span></a></p><span data-dcnode-id="2768" instrument_node="">
</span><p data-dcnode-id="2760"><span data-dcnode-id="2767" instrument_node="">Up until the unification of Vietnam under the Socialist Republic of Vietnam in 1975, relations remained tense and worsened to the point of military confrontation by the end of the decade. China persisted on its policy to reduce aid towards Vietnam, and this was damaging to Vietnam particularly during its efforts to engage in post-war reconstruction. In April 1975, China decided to replace aid programs with purely bilateral trade transactions, refuse new proposed projects, and postpone construction of the remaining 80 projects.</span><a data-dcnode-id="2765" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn124" title=""><span data-dcnode-id="2766" instrument_node="">[124]</span></a><span data-dcnode-id="2764" instrument_node=""> This pushed Vietnam to grow closer to the Soviet Union for assistance, to the dismay of China. In June 1978, Vietnam joined COMECON (Council for Mutual Economic Assistance), the economic bloc under the leadership of the Soviet Union. Two months later, Vietnam signed a treaty of peace and friendship with the Soviet Union, formalizing alliance between the two states. These actions clearly stood in defiance of China’s wishes, as China wanted to contain Soviet influence in the region.</span><a data-dcnode-id="2762" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn125" title=""><span data-dcnode-id="2763" instrument_node="">[125]</span></a><span data-dcnode-id="2761" instrument_node="">&nbsp; Consequently, this further strained Sino-Vietnamese relations.</span></p><span data-dcnode-id="2759" instrument_node="">
</span><p data-dcnode-id="2748"><span data-dcnode-id="2758" instrument_node="">Meanwhile, in the late 1970s, Vietnam and China clashed on their policies towards the Khmer Rouge regime in Cambodia.&nbsp; Vietnam viewed the Khmer Rouge regime under Pol Pot as a threat to its security and development efforts, and sought a regime change through support to the Kampuchea National United Front for National Salvation. In contrast, China began to endorse the Khmer Rouge regime in 1978, leading to increased confrontation between China and Vietnam. Heightened tensions eventually resulted in China’s invasion of Vietnam in February 1979, the largest military operation the China’s People’s Liberation Army has undertaken since the Korean War.</span><a data-dcnode-id="2756" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn126" title=""><span data-dcnode-id="2757" instrument_node="">[126]</span></a><span data-dcnode-id="2755" instrument_node="">&nbsp; China’s objectives in its invasion were to first, discredit the Soviet Union as a reliable ally for security, and second, contain Vietnam’s ambitions in Southeast Asia.</span><a data-dcnode-id="2753" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn127" title=""><span data-dcnode-id="2754" instrument_node="">[127]</span></a><span data-dcnode-id="2752" instrument_node=""> By March, China announced its withdrawal. The military campaign successfully convinced Vietnam to withdraw from Cambodia, and discredited the Soviet Union as an ally.</span><a data-dcnode-id="2750" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn128" title=""><span data-dcnode-id="2751" instrument_node="">[128]</span></a><span data-dcnode-id="2749" instrument_node=""> However, the consequences of this war resulted in a freezing of diplomatic relations between China and Vietnam until normalization in 1991.</span></p><span data-dcnode-id="2747" instrument_node="">
</span><p data-dcnode-id="2744"><i data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">Refugee Treatment</span></i></p><span data-dcnode-id="2743" instrument_node="">
</span><p data-dcnode-id="2730"><span data-dcnode-id="2742" instrument_node="">China followed a policy that welcomed refugees from Vietnam into Chinese society under a comprehensive resettlement program. After the establishment of the SRV, there were two major outflows of so-called “boat people” from Vietnam. In 1977, the first wave exited Vietnam as a result of a series of natural disasters, lack of employment opportunities, and the ongoing war with the Pol Pot regime.</span><a data-dcnode-id="2740" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn129" title=""><span data-dcnode-id="2741" instrument_node="">[129]</span></a><span data-dcnode-id="2739" instrument_node=""> This group headed mainly towards Thailand, Philippines, Singapore, Indonesia, Hong Kong, Japan, and Australia. The second wave began in mid-1978, and the majority of this group constituted the Hoa population, who are ethnically Chinese. This group immigrated to Vietnam decades ago, and have been in Vietnam for generations. Under the Republic of Vietnam (1954-1975), this group was treated as Vietnamese citizens.</span><a data-dcnode-id="2737" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn130" title=""><span data-dcnode-id="2738" instrument_node="">[130]</span></a><span data-dcnode-id="2736" instrument_node=""> The Hoa had traditionally dominated private trading and commercial generations, especially in the south of Vietnam. After the socialist regime came to power in 1975, the Hoa community began to face discrimination. As the government implemented socialist policies in Vietnam, they found that Hoa private businesses represented obstacles to socialist ideals. In March 1978, the Vietnamese government announced the abolishment of “all trade and business operations of bourgeois tradesmen.”</span><a data-dcnode-id="2734" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn131" title=""><span data-dcnode-id="2735" instrument_node="">[131]</span></a><span data-dcnode-id="2733" instrument_node=""> As a result, 30,000 larger private businesses, which were mostly run by the Hoa, were closed down.</span><a data-dcnode-id="2731" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn132" title=""><span data-dcnode-id="2732" instrument_node="">[132]</span></a></p><span data-dcnode-id="2729" instrument_node="">
</span><p data-dcnode-id="2715"><span data-dcnode-id="2728" instrument_node="">The Hoa population who fled into China are recognized as refugees, as they faced both discriminatory economic and political policies on the basis of their identity. Besides the aforementioned changes in economic policies, political motives were also seen to have influenced Vietnamese actions against the Hoa community, as official Vietnamese and Chinese relations soured in the late 1970s. The Chinese government perceived discriminatory policies as direct attack on the Chinese community in Vietnam.&nbsp; Moreover, some say Vietnam was attempting to unify the country through ousting foreign elements that may not adhere to Vietnam’s socialist policies.</span><a data-dcnode-id="2726" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn133" title=""><span data-dcnode-id="2727" instrument_node="">[133]</span></a><span data-dcnode-id="2725" instrument_node=""> For example, Vietnam’s New Economic Zone policies involved relocation of potential dissidents and urban dwellers to rural areas under harsh conditions.</span><a data-dcnode-id="2723" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn134" title=""><span data-dcnode-id="2724" instrument_node="">[134]</span></a><span data-dcnode-id="2722" instrument_node=""> In addition, an atmosphere of fear was created amongst the Hoa community in Vietnam, while both Chinese and Vietnamese sides accused each other of instigating rumours.&nbsp; These rumours included predictions that China will go to war with Vietnam, or the Vietnamese government will begin a massacre of Sino-Vietnamese.</span><a data-dcnode-id="2720" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn135" title=""><span data-dcnode-id="2721" instrument_node="">[135]</span></a><span data-dcnode-id="2719" instrument_node=""> Sino-Vietnamese, minorities, and dissidents were also advised or forced to leave, and their properties were confiscated and sold.</span><a data-dcnode-id="2717" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn136" title=""><span data-dcnode-id="2718" instrument_node="">[136]</span></a><span data-dcnode-id="2716" instrument_node=""> In summation, both economic and political discrimination render those who fled Vietnam as refugees.</span></p><span data-dcnode-id="2714" instrument_node="">
</span><p data-dcnode-id="2685"><span data-dcnode-id="2713" instrument_node="">The exodus from Vietnam amounted to 250,000 refugees entering China by the spring of 1978, the entirety of which China has successfully integrated into the Chinese society through its resettlement programs. In fact, China attempted to actively assist Vietnamese refugees’ arrival in China. In June of 1978, China sent two ships to pick up refugees at Vietnamese ports, although Vietnamese authorities never allowed these ships to dock.</span><a data-dcnode-id="2711" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn137" title=""><span data-dcnode-id="2712" instrument_node="">[137]</span></a><span data-dcnode-id="2710" instrument_node="">&nbsp; Nonetheless, this signalled China’s willingness to accommodate refugees. Refugee arrivals paced at an average of 10,000 a month, testing China’s capacity.</span><a data-dcnode-id="2708" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn138" title=""><span data-dcnode-id="2709" instrument_node="">[138]</span></a><span data-dcnode-id="2707" instrument_node=""> There is limited literature documenting China’s resettlement program, and its comprehensiveness was not recognized internationally until 2007.</span><a data-dcnode-id="2705" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn139" title=""><span data-dcnode-id="2706" instrument_node="">[139]</span></a><span data-dcnode-id="2704" instrument_node=""> Tom Lam’s article provides the most detailed account of China’s programs in the Guangxi province, where the initial reception of 220,000 refugees took place. Upon arrival, local authorities provided refugees with free meals and temporary shelter.</span><a data-dcnode-id="2702" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn140" title=""><span data-dcnode-id="2703" instrument_node="">[140]</span></a><span data-dcnode-id="2701" instrument_node=""> By 1980, most border camps were cleared out, and of the refugees, 110,000 were later relocated to the Guangdong province, and 100,000 remained in the Guangxi province.</span><a data-dcnode-id="2699" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn141" title=""><span data-dcnode-id="2700" instrument_node="">[141]</span></a><span data-dcnode-id="2698" instrument_node="">&nbsp; Refugees were mainly given work in the sectors of farming, fishing, and local industry under state-owned organizations.</span><a data-dcnode-id="2696" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn142" title=""><span data-dcnode-id="2697" instrument_node="">[142]</span></a><span data-dcnode-id="2695" instrument_node="">&nbsp; New farms and fishing villages were built to accommodate newcomers.</span><a data-dcnode-id="2693" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn143" title=""><span data-dcnode-id="2694" instrument_node="">[143]</span></a><span data-dcnode-id="2692" instrument_node=""> In addition, authorities attempted to match refugee skillsets to corresponding jobs.&nbsp; For example, refugees who were schoolteachers were encouraged to continue teaching in China.</span><a data-dcnode-id="2690" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn144" title=""><span data-dcnode-id="2691" instrument_node="">[144]</span></a><span data-dcnode-id="2689" instrument_node=""> China’s resettlement programs concluded in 1988. Overall, the program was a success, especially due to direct Chinese government involvement and continued official assistance.</span><a data-dcnode-id="2687" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn145" title=""><span data-dcnode-id="2688" instrument_node="">[145]</span></a><span data-dcnode-id="2686" instrument_node="">&nbsp; China’s warm policy stands in contrast to Chinese policies for North Korean and Burmese refugees. This Chinese behaviour also corresponds with strained bilateral relations, as proposed in the paper’s hypothesis. The following section will fully discuss and analyze the findings of this paper.</span></p><span data-dcnode-id="2684" instrument_node="">
</span><p data-dcnode-id="2681"><b data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Analysis</span></b></p><span data-dcnode-id="2680" instrument_node="">
</span><p data-dcnode-id="2669"><span data-dcnode-id="2679" instrument_node="">Before presenting a consolidated analysis of the paper’s research, the beginning of this section will take a look at why other potential independent variables are less strong in explaining differences in refugee policies. This paper has identified the following variables – </span><i data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">humanitarianism</span></i><span data-dcnode-id="2676" instrument_node="">, </span><i data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">economic relations</span></i><span data-dcnode-id="2673" instrument_node="">, and </span><i data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">ethnicity</span></i><span data-dcnode-id="2670" instrument_node="">.</span></p><span data-dcnode-id="2668" instrument_node="">
</span><p data-dcnode-id="2654"><span data-dcnode-id="2667" instrument_node="">First, principles</span><i data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node=""> </span></i><span data-dcnode-id="2664" instrument_node="">of </span><i data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">humanitarianism</span></i><span data-dcnode-id="2661" instrument_node=""> do not account for variation in treatment towards refugees. Refugees from all three countries experienced economic hardship and political discrimination. China is signatory to the 1951 Geneva Convention and 1967 Protocol, though domestic application of the laws varies for each refugee group. There is international consensus that North Korean refugees are indeed refugees, although China refuses to grant them refugee status.</span><a data-dcnode-id="2659" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn146" title=""><span data-dcnode-id="2660" instrument_node="">[146]</span></a><span data-dcnode-id="2658" instrument_node=""> Through actively repatriating North Korean refugees, China violates the principle of </span><i data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">non-refoulement </span></i><span data-dcnode-id="2655" instrument_node="">in the Geneva Convention, which stipulates:</span></p><span data-dcnode-id="2653" instrument_node="">
</span><blockquote data-dcnode-id="2647"><p data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">“No Contracting State shall expel or return (‘refouler’) a refugee in any manner whatsoever to the frontiers of territories where his life or freedom would be threatened on account of his race, religion, nationality, membership of a particular social group of political opinion.”</span></p><span data-dcnode-id="2650" instrument_node="">
</span><p data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">-U.N. Convention relating to the Status of Refugees, Article 33, Section 1, 1951</span></p></blockquote><span data-dcnode-id="2646" instrument_node="">
</span><p data-dcnode-id="2641"><span data-dcnode-id="2645" instrument_node="">In contrast, China adhered to </span><i data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">non-refoulement </span></i><span data-dcnode-id="2642" instrument_node="">for Vietnamese refugees. China even extended its obligations and helped fully resettle the Vietnamese. The juxtaposition of the North Korean and Vietnamese cases demonstrates that principles of humanitarianism do not have direct influence on Chinese refugee policies.</span></p><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2629"><span data-dcnode-id="2639" instrument_node="">Second, a liberal explanation that stronger </span><i data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">economic ties</span></i><span data-dcnode-id="2636" instrument_node=""> would foster higher levels of cooperation serves as a weak argument. While levels of cooperation between North Korea and China are the highest and China follows a strict policy of repatriation towards North Korean refugees, North Korea’s contribution to the Chinese economy is minimal, standing at total trade value of 700 million in 2010.</span><a data-dcnode-id="2634" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn147" title=""><span data-dcnode-id="2635" instrument_node="">[147]</span></a><span data-dcnode-id="2633" instrument_node=""> In contrast, China benefits greatly from economic ties with Myanmar, with trade values at 1.3 billion.</span><a data-dcnode-id="2631" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn148" title=""><span data-dcnode-id="2632" instrument_node="">[148]</span></a><span data-dcnode-id="2630" instrument_node=""> The construction of gas pipelines through the Yunnan province falls in line with China’s Western Development Strategy to expand the economy in western China. If economic ties were to serve as a causal factor, China would enforce a stricter, closed-door policy towards Burmese refugees than North Korean refugees. However, what is observed is the opposite, as China practices the stricter policy of refusal and repatriation for North Korean refugees than Burmese refugees. From this perspective, a there is no causal link between economic relations and China’s policy towards treatment of refugees.</span></p><span data-dcnode-id="2628" instrument_node="">
</span><p data-dcnode-id="2617"><span data-dcnode-id="2627" instrument_node="">Third, while </span><i data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">ethnicity</span></i><span data-dcnode-id="2624" instrument_node=""> may appear to best explain China’s welcoming policies towards Sino-Vietnamese refugees, an examination of broader Chinese policies in reaction to mistreatments of other overseas Chinese discounts this as an explanatory variable. Chang’s study finds that China claims that overseas Chinese is an important issue, but argues overseas Chinese has never been a significant or sole determining factor in China’s relations with other nations.</span><a data-dcnode-id="2622" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn149" title=""><span data-dcnode-id="2623" instrument_node="">[149]</span></a><span data-dcnode-id="2621" instrument_node=""> For example, during the 1970s when China received and encouraged Sino-Vietnamese to leave Vietnam, the Chinese-endorsed Pol Pot regime discriminated and massacred ethnic Chinese in Cambodia.</span><a data-dcnode-id="2619" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn150" title=""><span data-dcnode-id="2620" instrument_node="">[150]</span></a><span data-dcnode-id="2618" instrument_node=""> More poignantly, the Kokang population, towards whom the Burmese government launched an attack against in 2009, are also ethnic Chinese. However, China’s reaction to other ethnic Chinese groups under persecution in no way matched its policies towards the Hoa population from Vietnam. These two examples support Chang’s argument and demonstrate that ethnicity does not drive China’s refugee policies.</span></p><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2615" instrument_node="">Through these comparisons, it is found that the </span><i data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">level of cooperation</span></i><span data-dcnode-id="2612" instrument_node=""> between China and the country of origin of refugees best explains variations in Chinese refugee policies.&nbsp; Specifically, the </span><i data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">higher</span></i><span data-dcnode-id="2609" instrument_node=""> the level of cooperation between two countries, the more likely a country will </span><i data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">refuse and repatriate</span></i><span data-dcnode-id="2606" instrument_node=""> incoming refugees from the country of origin. In contrast, the </span><i data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">lower</span></i><span data-dcnode-id="2603" instrument_node=""> the level of cooperation between two countries, the more likely a country will </span><i data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">accept and resettle</span></i><span data-dcnode-id="2600" instrument_node=""> incoming refugees (see Figure 1). Levels of cooperation characterize bilateral relations, and signify whether relations are friendly or strained.&nbsp; Indicators of levels of cooperation include formalized alliance, documented treaties, frequencies of high-level official visits, aid packages, mutual support in international organizations, and absence of military confrontation.</span></p><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2590"><span data-dcnode-id="2597" instrument_node="">The first case study of North Korea demonstrates high levels of cooperation with China, and a resulting strict closed-door Chinese policy towards North Korean refugees.&nbsp; High levels of cooperation are first observed with China’s support for North Korea during the Korean War, which then defined their relations as one that is “blood-cemented.” A number of signed treaties document their alliance, as exemplified by the continued renewal of the </span><i data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">Sino-North Korean Mutual Aid and Cooperation Friendly Treaty.</span></i><span data-dcnode-id="2594" instrument_node=""> Frequent meetings are held between leaders and top officials of China and North Korea in order to maintain close cooperative ties. Most recently, new North Korean leader Kim Jong-un met with senior Chinese officials, and may be planning to visit China in the near future.</span><a data-dcnode-id="2592" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn151" title=""><span data-dcnode-id="2593" instrument_node="">[151]</span></a><span data-dcnode-id="2591" instrument_node=""> China continues to this day to provide North Korea with political, economic, and developmental assistance. In accordance to the hypothesis, such high levels of cooperation corresponds with China’s consistent policy to refuse recognition of North Korean refugees, as well as repatriate them back to North Korea.</span></p><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2572"><span data-dcnode-id="2588" instrument_node="">The second case study finds that relations between Myanmar and China are friendly, though at times are marred with mistrust and suspicion. Consequently, China has adopted a policy of refusing to recognize incoming Burmese citizens as refugees to reflect their friendly ties, but still providing assistance to the refugees during the 2009 and 2011 incidences to show discontent of certain Burmese actions.&nbsp; In the past decades, since Myanmar has faced international isolation due to its record of human rights abuses, Sino-Burmese relations have grown much closer. The </span><i data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">Framework of Cooperation</span></i><span data-dcnode-id="2585" instrument_node=""> signed in 2000 between the two countries signalled development of their bilateral relations.&nbsp; In 2006, China showed its political support for Myanmar in the United Nations when China vetoed </span><i data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Security Council Resolution 61/232</span></i><span data-dcnode-id="2582" instrument_node=""> condemning Myanmar’s human rights record.</span><a data-dcnode-id="2580" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn152" title=""><span data-dcnode-id="2581" instrument_node="">[152]</span></a><span data-dcnode-id="2579" instrument_node="">&nbsp; China has also consistently supplied Myanmar with weapons and other types of assistance.</span><a data-dcnode-id="2577" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn153" title=""><span data-dcnode-id="2578" instrument_node="">[153]</span></a><span data-dcnode-id="2576" instrument_node=""> However, Myanmar continuously attempts to reduce reliance on China through strengthening relations with countries such as India, Thailand, and Russia.</span><a data-dcnode-id="2574" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn154" title=""><span data-dcnode-id="2575" instrument_node="">[154]</span></a><span data-dcnode-id="2573" instrument_node="">&nbsp; Furthermore, Burmese behaviour at times runs counter to China’s wishes. For example, the Tatmadaw’s assault on ethnic groups nearby the Sino-Burmese border proceeded without any warning to China, angering China as a result. Overall, Sino-Burmese relations are friendly, though not to the point of being “blood-cemented,” as it is between China and North Korea. As a result, Chinese policy does not accept Burmese refugees, but provides temporary assistance, reflecting a median level of cooperation between the two countries. A closer look at the differences in Chinese reaction to the two refugee incidences in 2009 and 2011 further illustrates the connection between levels of cooperation and Chinese policies. When the 2009 refugee inflow came without warning from the Burmese government, which is indicative of non-cooperation, China openly expressed discontent, and thus accommodated Burmese refugees and offered them shelter. In 2011, China appears to have been notified of the Tatmadaw’s attack in the Kachin state, as China in this instance did not publicly denounce Burmese action, and instead claimed that there was no fighting, and engaged in repatriation of Burmese refugees. In the latter case, less accommodative Chinese policies correspond with a higher level of cooperation between the two states.</span></p><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2570" instrument_node="">The last case study focuses on Vietnam, which in the 1970s witnessed a deterioration of bilateral relations to the point of military confrontation. In accordance to the hypothesis, China accepted Vietnamese refugees, resettled and integrated them into Chinese society.&nbsp; The weakening of bilateral relations saw the cutting of Chinese aid to Vietnam. Vietnam began to side with the Soviet Union, against China’s wishes. The breaking of bilateral relations is best exemplified with China’s military invasion into Vietnam in 1979, marking a zero level of cooperation. Meanwhile, Chinese policy towards Vietnamese refugees was the most generous of all three groups.&nbsp; China warmly accepted, resettled, and integrated 250,000 Vietnamese refugees. This finding falls in place with the proposed hypothesis, as the lower the level of cooperation, the more likely country </span><i data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">A</span></i><span data-dcnode-id="2567" instrument_node=""> will accept the refugee group of country </span><i data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">B</span></i><span data-dcnode-id="2564" instrument_node="">.</span></p><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2559"><b data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">Policy Recommendation and Conclusion</span></b></p><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2550"><span data-dcnode-id="2557" instrument_node="">Within the studies of political science, the status of refugees is unique: they lack the standard political, economic and societal protection that a state provides. When refugees enter the border of another country, they become subject to the domestic policies of that state. While the international refugee regime, mainly characterized by the work of the UNHCR, has enacted the </span><i data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">1951 Convention on the Status of Refugees</span></i><span data-dcnode-id="2554" instrument_node=""> and the ensuing </span><i data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">1967 Protocol</span></i><span data-dcnode-id="2551" instrument_node="">, there are no real enforcements. Signatories of the documents, in practice, have latitude to interpret the laws as they wish.&nbsp; In addition, refugees transcend borders, thus intrinsically their movement becomes an issue in international relations. Without real enforced international laws, what drives state refugee policies instead are its foreign relations with the refugees’ country of origin.</span></p><span data-dcnode-id="2549" instrument_node="">
</span><p data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">This paper follows this line of thought, and through an examination into the bilateral ties between two countries, it is found that the levels of cooperation that marks their relations best explain variations in domestic policies towards treatment of incoming refugees. As such, refugee policies can be used as a tool of foreign policy to achieve certain goals. &nbsp;The case studies into China’s relations with North Korea, Myanmar, and Vietnam saw distinct differences on Chinese policies towards refugees from each of these states. While other variables, ideas of humanitarianism, economic ties, and ethnicity, appeared to account for these differences, the analysis section illustrated the inconsistences in the explanatory capacity of these variables.</span></p><span data-dcnode-id="2546" instrument_node="">
</span><p data-dcnode-id="2538"><span data-dcnode-id="2545" instrument_node="">Besides the case study of China, another example that supports this hypothesis is the refugee policies of the United States and the Soviet Union during the Cold War. Both countries “selectively supported different groups in exile and so-called refugee warriors as part of their strategy.”</span><a data-dcnode-id="2543" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn155" title=""><span data-dcnode-id="2544" instrument_node="">[155]</span></a><span data-dcnode-id="2542" instrument_node=""> From the period of 1952 – 1980, the United States defined a refugee as a person fleeing “from a Communist-dominated country or area, or from any country within the general area of the Middle East.”</span><a data-dcnode-id="2540" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn156" title=""><span data-dcnode-id="2541" instrument_node="">[156]</span></a><span data-dcnode-id="2539" instrument_node=""> After the end of the Cold War, as levels of cooperation between the two countries improved, the United States retracted its open-door policies. The historic overview of the international refugee regime also demonstrates the impacts of changes at the international level on the patterns of refugee policies.</span></p><span data-dcnode-id="2537" instrument_node="">
</span><p data-dcnode-id="2523"><span data-dcnode-id="2536" instrument_node="">As refugee movement is becoming an increasingly salient issue, especially between developing countries today, the paper will conclude with policy recommendations. Most importantly and ideally, signatories to </span><i data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">1951 Convention on the Status of Refugees</span></i><span data-dcnode-id="2533" instrument_node=""> and </span><i data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">1967 Protocol</span></i><span data-dcnode-id="2530" instrument_node=""> must adhere to stipulations stated in the documents and states must be held accountable should any discrepancies in treatment towards refugees arise. Actors working to protect refugees would also best benefit from collaborating closely with diplomatic actors to understand the political background when developing policies aimed to mitigate challenges facing refugees. Furthermore, as the biggest challenge of the paper’s finding is that in fact </span><i data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">higher</span></i><span data-dcnode-id="2527" instrument_node=""> levels of cooperation between two states would likely point to </span><i data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">less</span></i><span data-dcnode-id="2524" instrument_node=""> recognition of refugees, the paper recommends that humanitarian actors work closely with states receiving refugees from a diplomatic viewpoint, and deemphasize any disruption or embarrassment for their bilateral relations on the issue of refugees. Through incorporating levels of cooperation on the macro level, more positive and sustainable changes can take place on the ground.</span></p><span data-dcnode-id="2522" instrument_node="">
</span><p data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Finally, this paper raises further research questions to be pursued. While there is a substantial literature on refugee movements from developing to developed countries, and more bottom-up accounts of the conditions of refugees, there is currently less research to be found on policies at the state level of a developing country towards incoming refugees. This analysis presents more research questions that were outside the purview of this paper, including identifying the foreign policy objectives of why for example, states want to maintain a certain level of cooperation, and its impacts on refugee policies.&nbsp; In order to understand the challenges that confront refugees, broader forced migration studies in international development must integrate perspectives from the discipline of international relations.</span></p><span data-dcnode-id="2519" instrument_node="">

</span><p data-dcnode-id="1247"><a data-dcnode-id="1252" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_ednref78" title=""><span data-dcnode-id="1253" instrument_node="">[78]</span></a><span data-dcnode-id="1251" instrument_node=""> Poon Kim Shee, “The Political Economy of China-Myanmar Relations: Strategic and Economic Dimensions,” </span><i data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Ritsumeikan Annual Review of International Studies</span></i><span data-dcnode-id="1248" instrument_node=""> 1 (2002): 34.</span></p><span data-dcnode-id="1246" instrument_node="">

</span><p data-dcnode-id="1236"><a data-dcnode-id="1241" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_ednref79" title=""><span data-dcnode-id="1242" instrument_node="">[79]</span></a><span data-dcnode-id="1240" instrument_node=""> From 1962 to 1988, the Ne Win regime of the Burma Socialist Programme Party dominated and pursued socialist policies to develop the country.&nbsp; However, these policies failed to vitalize the economy, and instead plunged Burma into poverty.&nbsp; The state had to rely on authoritarianism to control its citizens.&nbsp; The legacy of totalitarianism remained and Burma has long been criticized for its human rights abuses.&nbsp; Between 1989-1999, multi-party elections were held.&nbsp; This captured the international community’s attention, as Burmese-born, British-National Aung Yang Suu Kyi returned to Burma to lead the democratic movement.&nbsp; However, when the Democratic Party won the elections, the results were ignored.&nbsp; Popular protests against these actions, known infamously as the 8888 Uprising (on August 8</span><sup data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">th</span></sup><span data-dcnode-id="1237" instrument_node="">, 1988), were later violently crushed.&nbsp; The military swept in and established the State Law and Order Restoration Council (SLORC).&nbsp; Since then, Burma has been in the international limelight for its undemocratic practices and human rights abuses.&nbsp; Consequently, economic, political sanctions and isolation from the international community persisted.&nbsp; Nonetheless, in 2003, General and Prime Minister Khin Nyunt announced a 7-step “roadmap” to “disciplined democracy.”</span></p><span data-dcnode-id="1235" instrument_node="">
