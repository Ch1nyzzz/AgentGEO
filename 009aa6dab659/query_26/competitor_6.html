</span><h1 class="title" data-dcnode-id="3484"><div class="advads-a-custom" data-dcnode-id="3486" id="advads-490070614" style="margin-left: auto; margin-right: auto; text-align: center; margin-bottom: 22px; "><ins class="adsbygoogle" data-ad-client="ca-pub-6827106764042735" data-ad-slot="4710931000" data-dcnode-id="3491" style="display:inline-block;width:728px;height:90px;"></ins><span data-dcnode-id="3490" instrument_node="">

</span></div><span data-dcnode-id="3485" instrument_node="">China’s Refugee Policy in Comparison</span></h1><span data-dcnode-id="3483" instrument_node="">
</span><span class="post-meta" data-dcnode-id="3452"><span data-dcnode-id="3482" instrument_node="">
</span><div class="post-meta--author" data-dcnode-id="3477"><span data-dcnode-id="3481" instrument_node="">
</span><a data-dcnode-id="3479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.e-ir.info/author/jasmine-lam/"><span data-dcnode-id="3480" instrument_node="">
                Jasmine Lam              </span></a><span data-dcnode-id="3478" instrument_node="">
</span></div><span data-dcnode-id="3476" instrument_node="">
</span><div class="post-meta--download f f--middle" data-dcnode-id="3454"><span data-dcnode-id="3475" instrument_node="">
</span><a class="button -orange" data-dcnode-id="3473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.e-ir.info/pdf/42268" target="_blank"><span data-dcnode-id="3474" instrument_node="">Download PDF</span></a><span data-dcnode-id="3472" instrument_node="">

</span><div class="student-disclaimer" data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">This content was originally written for an undergraduate or Master's program. It is published as part of our mission to showcase peer-leading papers written by students during their studies. This work can be used for background reading and research, but should not be cited as an expert source or used in place of scholarly articles/books.</span></div><span data-dcnode-id="3448" instrument_node="">
</span><div class="entry" data-dcnode-id="419"><span data-dcnode-id="3447" instrument_node="">
</span><div class="content -pad" data-dcnode-id="421"><span data-dcnode-id="3446" instrument_node="">
</span><div class="-in" data-dcnode-id="423"><span data-dcnode-id="3445" instrument_node="">
</span><p data-dcnode-id="3440" style="text-align: center;"><b data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">A Comparison of Chinese State Policies towards Refugees from North Korea, Myanmar, and Vietnam</span></b><b data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">&nbsp;</span></b></p><span data-dcnode-id="3439" instrument_node="">
</span><p data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">In the field of international development studies, practical and academic works concerning forced migration have been expanding since the contemporary international refugee regime was first established after World War II.&nbsp; The literature on refugee studies is vast, but reviewing it reveals a distinct lack of research linking forced migration to international relations, as past analyses have predominantly focused on movement from developing to developed nations. In contrast, an overview of the international refugee regime shows that first, there is increasing flow of movement between developing countries; and second, refugee policies are highly political in nature and linked to its foreign policy behaviour. The current gap in the literature is detrimental to fully understand why states pursue one refugee policy over another, and why there are variations in policies enacted towards different groups of refugees in the same country. Through analyzing case studies of China and three neighbouring countries, this paper finds that refugee policies follow levels of cooperation between the two states.</span></p><span data-dcnode-id="3436" instrument_node="">
</span><p data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">The case studies this paper will examine compare China’s policies towards incoming refugees across three states of origin: Vietnam, Myanmar, and North Korea. The three states share substantial borders with China and contributed inflows of refugees at numbers at 20,000 and above. Moreover, ample resources are available to examine in detail history of their bilateral relations and China’s policy in reaction to each refugee crisis. Findings from academic literature and news sources demonstrate differences in Chinese policies in treatment towards the three refugee groups. For the wave of Vietnamese refugees entering China in 1978, China responded by fully integrating the 250,000 refugees into state farms, fishing and mining industries, and small businesses. Towards Burmese refugees, China has followed a policy to provide temporary relief in the nature of makeshift tents, food, and hospitality, while still refusing to recognize them as refugees. In regards to North Korean refugees, China pursues an adamantly strict policy to refuse and repatriate North Koreans who are caught by Chinese officials.</span></p><span data-dcnode-id="3433" instrument_node="">
</span><p data-dcnode-id="3419"><span data-dcnode-id="3432" instrument_node="">After examining bilateral relations between China and the origin states of refugees, as well as China’s policy towards each of these groups, I argue that the variable that best explains the discrepancy in policy is the level of cooperation defining their bilateral relations. Specifically, the </span><i data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">higher</span></i><span data-dcnode-id="3429" instrument_node=""> level of cooperation between states A and B, the </span><i data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">less likely</span></i><span data-dcnode-id="3426" instrument_node=""> the receiving state A will admit the refugees of state B. Likewise, the </span><i data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">lower</span></i><span data-dcnode-id="3423" instrument_node=""> the level of cooperation between state A and B, the </span><i data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">more likely </span></i><span data-dcnode-id="3420" instrument_node="">the receiving state A will admit the refugees of state B. Each case study then falls along a spectrum of refugee policies, ranging from “refusal and repatriation” on the end of high level of cooperation, to “temporary assistance” in the middle, and “acceptance and resettlement” at the other end characterized with a low level of cooperation. From this perspective, state refugee policies are intrinsically tied to foreign policy behaviour. With these analyses, the empirical purpose of this paper is to expand on the discussion on South-South migration studies, and the theoretical purpose is to integrate perspectives of international relations into international development studies. As a policy recommendation, the paper advises that humanitarian actors be mindful of diplomatic embarrassment that could damage bilateral relations as a result of a crisis, which can harm access in providing welfare for refugees.</span></p><span data-dcnode-id="3418" instrument_node="">
</span><p data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">The first section presents a literature review on refugee policy and international relations, with an emphasis on the importance of linking the two fields. The second section this paper will examine the treatment of each refugee group in China, starting with North Korea, then Myanmar, and ending with Vietnam. The analytic component of this paper will discuss why other variables are less fitting in explaining variations in Chinese policies, and then extrapolate upon the findings from each case study and its relation to the given hypothesis. Finally, the conclusion will look at where this hypothesis can serve to explain variations in refugee policies in other states, provide policy recommendations, and present further research questions.</span></p><div class="advads-infeed-1-desktop" data-dcnode-id="3409" id="advads-768946971" style="margin-bottom: 24px; "><ins class="adsbygoogle" data-ad-client="ca-pub-6827106764042735" data-ad-format="auto" data-ad-slot="" data-dcnode-id="3414" style="display:block;"></ins><span data-dcnode-id="3413" instrument_node="">
</span><span data-dcnode-id="3410" instrument_node="">
</span></div><span data-dcnode-id="3408" instrument_node="">
</span><p data-dcnode-id="3405"><b data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">Literature Review</span></b></p><span data-dcnode-id="3404" instrument_node="">
</span><p data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">The following section will provide a literature review on academic discussions of foreign policy, refugee policy, and the development of literature linking international relations and forced migration studies. It finds that there is a general gap in the literature linking perspectives of the above fields.&nbsp; As previous authors have noted, these disciplines are interrelated and researchers would benefit from integrating their findings. As a result, this paper seeks to address this absence through expanding current discussions on refugees and foreign policy with the case studies of China.</span></p><span data-dcnode-id="3401" instrument_node="">
</span><p data-dcnode-id="3385"><span data-dcnode-id="3400" instrument_node="">First, the study of foreign policy as a sub-field within the larger discipline of international relations began in the 1950s. Foreign policy is defined as “the strategy or approach chosen by the national government to achieve its goals in its relations with external entities,” and foreign policy behaviour is “the observable artefacts of foreign policy… [and] may include the categorization of such behaviour, such as along conflict-cooperation continua.”</span><a data-dcnode-id="3398" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn1" title=""><span data-dcnode-id="3399" instrument_node="">[1]</span></a><span data-dcnode-id="3397" instrument_node=""> This included foreign policy decision-making, bureaucratic and organizational politics, psychological aspects in formulation of foreign policy, and comparative foreign policy.</span><a data-dcnode-id="3395" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn2" title=""><span data-dcnode-id="3396" instrument_node="">[2]</span></a><span data-dcnode-id="3394" instrument_node="">&nbsp; The analysis of foreign policy borrows perspectives from the classic international relations schools of thoughts, realism, liberalism, and constructivism.</span><a data-dcnode-id="3392" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn3" title=""><span data-dcnode-id="3393" instrument_node="">[3]</span></a><span data-dcnode-id="3391" instrument_node=""> Contemporary research in this field is increasingly looking at the interplay between different levels – individual, nation-state, and international – in formulating foreign policy.</span><a data-dcnode-id="3389" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn4" title=""><span data-dcnode-id="3390" instrument_node="">[4]</span></a><span data-dcnode-id="3388" instrument_node="">&nbsp; In addition, there have been more efforts to utilize findings from various social science disciplines.</span><a data-dcnode-id="3386" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn5" title=""><span data-dcnode-id="3387" instrument_node="">[5]</span></a></p><span data-dcnode-id="3384" instrument_node="">
</span><p data-dcnode-id="3361"><span data-dcnode-id="3383" instrument_node="">Second, under the broader scholarship of forced migration studies, researchers have begun to comment on the use of refugee policies as a tool of foreign policy in the 1980s.&nbsp; According to&nbsp;</span><i data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">International Factors in the Formation of Refugee Movements</span></i><span data-dcnode-id="3380" instrument_node="">, receiving states can attract refugees and create a “pull” factor with a policy that encourages admission, or with a restrictive policy that is poorly enforced.</span><a data-dcnode-id="3378" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn6" title=""><span data-dcnode-id="3379" instrument_node="">[6]</span></a><span data-dcnode-id="3377" instrument_node="">&nbsp; This becomes a tool of foreign policy since an open-door policy “usually implies condemnation of relevant government for persecuting its citizens, or at least failing to afford them protection.”</span><a data-dcnode-id="3375" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn7" title=""><span data-dcnode-id="3376" instrument_node="">[7]</span></a><span data-dcnode-id="3374" instrument_node="">&nbsp; Teitelbaum argues along the same line with a more normative tone.</span><a data-dcnode-id="3372" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn8" title=""><span data-dcnode-id="3373" instrument_node="">[8]</span></a><span data-dcnode-id="3371" instrument_node="">&nbsp; He finds that mass expulsions from sending side can be used as tool to “destabilize or embarrass foreign policy adversaries,” while for receiving countries, refugee admission can serve to “embarrass and discredit adversary nations.”</span><a data-dcnode-id="3369" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn9" title=""><span data-dcnode-id="3370" instrument_node="">[9]</span></a><span data-dcnode-id="3368" instrument_node="">&nbsp; In </span><i data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">Refugee and International Relations</span></i><span data-dcnode-id="3365" instrument_node="">, Loescher sums up these observations in that “government responses to refugee movements from neighbouring or distant countries are greatly influenced by the relations between sending and receiving nations.”</span><a data-dcnode-id="3363" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn10" title=""><span data-dcnode-id="3364" instrument_node="">[10]</span></a><span data-dcnode-id="3362" instrument_node="">&nbsp; These authors together highlight the connection between refugee policies and foreign policy.</span></p><span data-dcnode-id="3360" instrument_node="">
</span><p data-dcnode-id="3337"><span data-dcnode-id="3359" instrument_node="">In the 21</span><sup data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">st</span></sup><span data-dcnode-id="3356" instrument_node=""> century, however, literature explicitly linking the greater disciplines of international relations and forced migration studies is still lacking. This is pointed out most openly in </span><i data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">Refugees in International Relations</span></i><span data-dcnode-id="3353" instrument_node="">, a compilation of essays resulting from a lecture series by both international relations and forced migration studies scholars at the University of Oxford.</span><a data-dcnode-id="3351" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn11" title=""><span data-dcnode-id="3352" instrument_node="">[11]</span></a><span data-dcnode-id="3350" instrument_node="">&nbsp; These essays point to the reasons why the two fields can benefit from learning from one another, as they overlap in the areas of “international cooperation, globalization, human rights, international organizations, regime complexity, non-state actors, regionalism, North-South relations, and security.”</span><a data-dcnode-id="3348" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn12" title=""><span data-dcnode-id="3349" instrument_node="">[12]</span></a><span data-dcnode-id="3347" instrument_node=""> Representing the school of realism, Jack Snyder’s article suggests the reason why realist scholars have often overlooked this field is because of realist tendency to reject all elements relating to humanitarianism, as it is considered a non-security goal.</span><a data-dcnode-id="3345" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn13" title=""><span data-dcnode-id="3346" instrument_node="">[13]</span></a><span data-dcnode-id="3344" instrument_node=""> Similarly, Myron Weiner expressed scepticism in partnerships between states and humanitarian institutions, as governments place national interest as paramount in foreign policy decision-making, while humanitarian institutions form policies based on ethical and moral values.</span><a data-dcnode-id="3342" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn14" title=""><span data-dcnode-id="3343" instrument_node="">[14]</span></a><span data-dcnode-id="3341" instrument_node="">&nbsp; Nonetheless, Snyder points out that humanitarian actions can be viewed through a consequentialist approach, where “good intentions” are only pursued if they “achieve good results.”</span><a data-dcnode-id="3339" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn15" title=""><span data-dcnode-id="3340" instrument_node="">[15]</span></a><span data-dcnode-id="3338" instrument_node=""> This suggests that humanitarian objectives can be used as instruments to pursue state interests, and thus should not be readily dismissed in the analysis of international relations.</span></p><div class="advads-infeed-2-desktop" data-dcnode-id="3330" id="advads-1506164851" style="margin-bottom: 22px; "><ins class="adsbygoogle" data-ad-client="ca-pub-6827106764042735" data-ad-slot="4710931000" data-dcnode-id="3335" style="display:inline-block;width:728px;height:90px;"></ins><span data-dcnode-id="3334" instrument_node="">
</span><span data-dcnode-id="3331" instrument_node="">
</span></div><span data-dcnode-id="3329" instrument_node="">
</span><p data-dcnode-id="3319"><span data-dcnode-id="3328" instrument_node="">Finally, there has been development in expanding literature linking the two fields, most prominently where it relates to refugees and conflicts in the developing world. In </span><i data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">Refugee Manipulation</span></i><span data-dcnode-id="3325" instrument_node="">, Steve Stedman and Fred Tanner demonstrate how refugees and the refugee regime can be used as resources of war, and its implications for international security.</span><a data-dcnode-id="3323" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn16" title=""><span data-dcnode-id="3324" instrument_node="">[16]</span></a><span data-dcnode-id="3322" instrument_node="">&nbsp; Furthermore, since the early 1990s, refugees have often been catalysts in spreading conflict beyond borders.</span><a data-dcnode-id="3320" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn17" title=""><span data-dcnode-id="3321" instrument_node="">[17]</span></a></p><span data-dcnode-id="3318" instrument_node="">
</span><p data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">Through the literature review, this paper finds that interdisciplinary studies incorporating forced migration and international relations are growing, but explicit literature on linking refugee policies to foreign policies is missing.&nbsp; The literature review also reveals benefits of expanding research in this area, as refugee policies are innately tied to politics.&nbsp; Furthermore, the study of foreign policy involves conflict-cooperation in state behaviour, entailing an examination of this in bilateral relations.&nbsp; Following this, the paper will analyze the case studies of China and its three neighbouring countries, and place each finding along a spectrum of high-to-low levels of cooperation. This paper will challenge existing literature and reveal the connections between foreign and refugee policy.</span></p><span data-dcnode-id="3315" instrument_node="">
</span><p data-dcnode-id="3312"><b data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">The International Refugee Regime</span></b></p><span data-dcnode-id="3311" instrument_node="">
</span><p data-dcnode-id="3306"><span data-dcnode-id="3310" instrument_node="">To fully understand how foreign policy and refugee policy are related, one must first examine the definition of a “refugee,” as well as the development of the international refugee regime.&nbsp; The international refugee regime and the way states respond to refugee flows have been shaped and have evolved with changes in the international system. The refugee regime is inherently linked to the fundamentals of the nation-state, which is premised on the most basic function and responsibility of the state to offer protection to its citizens.</span><a data-dcnode-id="3308" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn18" title=""><span data-dcnode-id="3309" instrument_node="">[18]</span></a><span data-dcnode-id="3307" instrument_node=""> When citizens of a state decide to flee a country, in essence this represents a failure on part of the nation-state, as the state is unable to offer its citizens political, economic, or societal protection. The consequences of refugee flows are transnational, and because of this, these movements carry the potential to threaten international stability. As a result, the international refugee regime was developed to maintain international stability by creating appropriate institutions to respond to refugee flows.</span></p><span data-dcnode-id="3305" instrument_node="">
</span><p data-dcnode-id="3297"><span data-dcnode-id="3304" instrument_node="">The contemporary refugee regime finds its roots during the inter-war period under the League of Nations. However, it was not until post-World War II that the regime became more developed under the United Nations High Commissioner for Refugees (UNHCR). The first piece of legislation that formed the basis of international refugee protection is the </span><i data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">1951 United Nations Convention relating to the Status of Refugees</span></i><span data-dcnode-id="3301" instrument_node="">.</span><a data-dcnode-id="3299" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn19" title=""><span data-dcnode-id="3300" instrument_node="">[19]</span></a><span data-dcnode-id="3298" instrument_node=""> Under this Convention, a refugee is defined as:</span></p><span data-dcnode-id="3296" instrument_node="">
</span><blockquote data-dcnode-id="3288"><p data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">“Any person who owing to well-founded fear of being persecuted for reasons of race, religion, nationality, membership of a particular social group of political opinion is outside the country of his nationality and is unable or, owing to such fear, is unwilling to avail himself of the protection of that country; or who, not having a nationality and being outside the country of his former habitual residence as a result of such events, is unable or, owing to such fear, is unwilling to return to it.”</span></p><span data-dcnode-id="3293" instrument_node="">
</span><p data-dcnode-id="3289"><i data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">&nbsp;</span></i><span data-dcnode-id="3290" instrument_node="">-U.N. Convention relating to the Status of Refugees, Article 1, Section A(2), 1951</span></p></blockquote><span data-dcnode-id="3287" instrument_node="">
</span><p data-dcnode-id="3274"><span data-dcnode-id="3286" instrument_node="">When the Cold War began, political motivations became evident in approaches to refugees. First, the refugee regime, as was the UN, was Western-dominated and focused mainly on movement within Europe and towards North America. Western countries encouraged flight from Communist countries, and gave a “virtual guarantee of resettlement” to those who left.</span><a data-dcnode-id="3284" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn20" title=""><span data-dcnode-id="3285" instrument_node="">[20]</span></a><span data-dcnode-id="3283" instrument_node=""> It was not until 1967, when the </span><i data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">Protocol on Refugees</span></i><span data-dcnode-id="3280" instrument_node=""> was codified, that protection was expanded to include groups from other nations. During this time, there was also a shift in the international refugee movement. In the 1970s, refugee flows from the communist bloc slowed, as the totalitarian regimes there clamped down on escapees.</span><a data-dcnode-id="3278" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn21" title=""><span data-dcnode-id="3279" instrument_node="">[21]</span></a><span data-dcnode-id="3277" instrument_node=""> Meanwhile, developing countries in Africa and Asia began to gain independence, and ensuing civil unrest prompted an outflow of refugees seeking asylum in industrialized countries. However, the treatment towards these groups was not the same. Western countries began to feel the strain in incorporating refugees into their societies, and refugee admission became increasingly restrictive.</span><a data-dcnode-id="3275" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn22" title=""><span data-dcnode-id="3276" instrument_node="">[22]</span></a></p><div class="advads-infeed-3-desktop" data-dcnode-id="3267" id="advads-170356937" style="margin-bottom: 22px; "><ins class="adsbygoogle" data-ad-client="ca-pub-6827106764042735" data-ad-slot="4710931000" data-dcnode-id="3272" style="display:inline-block;width:728px;height:90px;"></ins><span data-dcnode-id="3271" instrument_node="">
</span><span data-dcnode-id="3268" instrument_node="">
</span></div><span data-dcnode-id="3266" instrument_node="">
</span><p data-dcnode-id="3255"><span data-dcnode-id="3265" instrument_node="">With the fall of the Soviet Union in 1991, the international refugee regime was confronted by a new configuration of the international system. Into the 21</span><sup data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">st</span></sup><span data-dcnode-id="3262" instrument_node=""> century, the effects of 9/11 have strengthened states’ position on restricting asylum and refugee protection, as states pointed to the threat of transnational terrorism.&nbsp; New types of war, such as terrorism and proxy wars, gave justification for international intervention to prevent possible refugee flows.</span><a data-dcnode-id="3260" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn23" title=""><span data-dcnode-id="3261" instrument_node="">[23]</span></a><span data-dcnode-id="3259" instrument_node="">&nbsp; Meanwhile, the scope of UNHCR has expanded to include protection of internally displaced persons (IDPs).</span><a data-dcnode-id="3257" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn24" title=""><span data-dcnode-id="3258" instrument_node="">[24]</span></a><span data-dcnode-id="3256" instrument_node=""> Today, as refugees are finding it more difficult to find asylum in developed countries, refugee flows between developing countries are becoming increasingly characteristic of refugee movements globally. As a result, literature focusing on movements between developing countries deserves more attention. Therefore this paper will analyze the case studies of China and three of its neighbouring countries.</span></p><span data-dcnode-id="3254" instrument_node="">
</span><p data-dcnode-id="3251"><b data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">China: Bilateral Relations and Refugee Policies across North Korea, Myanmar, and Vietnam</span></b></p><span data-dcnode-id="3250" instrument_node="">
</span><p data-dcnode-id="3239"><span data-dcnode-id="3249" instrument_node="">This section will examine bilateral relations and compare Chinese refugee policies across three different cases: North Korea, Myanmar, and Vietnam. The time period under scrutiny is from the establishment of the PRC in 1949 up until the first refugee episode with each of the three bordering states. China is a signatory to the </span><i data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">1951 Convention </span></i><span data-dcnode-id="3246" instrument_node="">and </span><i data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">1967 Protocol</span></i><span data-dcnode-id="3243" instrument_node="">, thus is under obligation to follow the stipulated laws. However, there is often a mismatch between the laws stated in the </span><i data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">Convention</span></i><span data-dcnode-id="3240" instrument_node=""> and China’s domestic policies on refugees. While the UNHCR has recognized citizens fleeing from North Korea, Myanmar, and Vietnam as refugees during each incident, China does not recognize refugees from North Korea and Myanmar, but recognizes those from Vietnam.&nbsp; Moreover, there is variation in China’s treatment of each group in terms of the level of assistance China provides. This paper maintains that these differences can be explained through nuances in China’s bilateral relations with each state. The following sections will provide an account of bilateral relations between China and each of the three states, followed by a description of Chinese reaction towards incoming refugees.</span></p><span data-dcnode-id="3238" instrument_node="">
</span><p data-dcnode-id="3235"><i data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">North Korea (Democratic People’s Republic of Korea)</span></i></p><span data-dcnode-id="3234" instrument_node="">
</span><p data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">China has followed a consistent policy of repatriation towards North Koreans crossing the border into China.&nbsp; North Korean refugees have been entering China steadily since 1983, with sharp increases during North Korea’s famine in the mid-1990s.&nbsp; Relations between the two countries have often been described as a special one, characterized by historic, cultural and ideological affinity.&nbsp; However, after the nuclear crises in the 2000s, relations between China and North Korea have been evolving to resemble a more pragmatic, state-to-state relationship.&nbsp; All in all, North Korean and Chinese relations fall at the far end of the spectrum, defined with a high level of cooperation, and a corresponding closed-door refugee policy with repatriation.</span></p><span data-dcnode-id="3231" instrument_node="">
</span><p data-dcnode-id="3228"><i data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Historic Overview and Sino-North Korean Relations</span></i></p><span data-dcnode-id="3227" instrument_node="">
</span><p data-dcnode-id="3211"><span data-dcnode-id="3226" instrument_node="">China and North Korea have long held a “blood-cemented relationship.”</span><a data-dcnode-id="3224" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn25" title=""><span data-dcnode-id="3225" instrument_node="">[25]</span></a><span data-dcnode-id="3223" instrument_node=""> Historically, China has exerted influence in the Korean peninsula, and defended the area against invasions.</span><a data-dcnode-id="3221" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn26" title=""><span data-dcnode-id="3222" instrument_node="">[26]</span></a><span data-dcnode-id="3220" instrument_node=""> This is important for two reasons: first, North Korea is geopolitically important for China. With the commencement of the Cold War, and the establishment of the PRC, a Chinese-friendly regime in Korea was paramount to serve as a buffer zone against Western powers and capitalism. During the Korean War, China supported North Korea. Their partnership in this war formed the aforementioned “blood-cemented relationship” between the two states. Through maintaining the Democratic People’s Republic of Korea (DPRK), China could expend fewer military resources to securitize its borders.</span><a data-dcnode-id="3218" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn27" title=""><span data-dcnode-id="3219" instrument_node="">[27]</span></a><span data-dcnode-id="3217" instrument_node="">&nbsp; Secondly, the North Korean and Chinese regimes hold ideological affinity, sharing cultural and revolutionary ties.</span><a data-dcnode-id="3215" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn28" title=""><span data-dcnode-id="3216" instrument_node="">[28]</span></a><span data-dcnode-id="3214" instrument_node=""> The traditional school of thinkers in China, as described in Heungkyu Kim’s article, sees the Sino-North Korean relationship as a special, traditional one.</span><a data-dcnode-id="3212" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn29" title=""><span data-dcnode-id="3213" instrument_node="">[29]</span></a></p><span data-dcnode-id="3210" instrument_node="">
</span><p data-dcnode-id="3199"><span data-dcnode-id="3209" instrument_node="">Since then, North Korea and China have upheld friendly relations. When North Korea embarked on its development plans after the Korean War, China’s assistance has been crucial to their success. China contributed 1,200,000 Chinese People’s Volunteers to help with reconstruction.</span><a data-dcnode-id="3207" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn30" title=""><span data-dcnode-id="3208" instrument_node="">[30]</span></a><span data-dcnode-id="3206" instrument_node=""> From 1954 to 1957, China provided North Korea with 8 billion </span><i data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">yuan</span></i><span data-dcnode-id="3203" instrument_node=""> worth of loans.&nbsp; All in all, China was vital for North Korea for security, economic and development purposes. In 1961, their bilateral relationship was further cemented through the </span><i data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">Sino-North Korean Mutual Aid and Cooperation Friendly Treaty</span></i><span data-dcnode-id="3200" instrument_node="">, whereby China agreed to support North Korea in cases of external military attacks. This treaty has been prolonged twice since, and is valid until 2021.</span></p><div class="advads-infeed-4-desktop" data-dcnode-id="3192" id="advads-253147860" style="margin-left: auto; margin-right: auto; text-align: center; margin-bottom: 22px; "><ins class="adsbygoogle" data-ad-client="ca-pub-6827106764042735" data-ad-slot="4710931000" data-dcnode-id="3197" style="display:inline-block;width:728px;height:90px;"></ins><span data-dcnode-id="3196" instrument_node="">
</span><span data-dcnode-id="3193" instrument_node="">
</span></div><span data-dcnode-id="3191" instrument_node="">
</span><p data-dcnode-id="3175"><span data-dcnode-id="3190" instrument_node="">However, during the latter 1960s, broader Sino-Soviet-North Korean relations briefly affected Sino-North Korean relations negatively. Differences between China and the Soviet Union grew increasingly stark, and relations between the two deteriorated rapidly.&nbsp; While North Korea relied on China for support, North Korea also played on the Sino-Soviet relations to gain assistance from the Soviet Union.</span><a data-dcnode-id="3188" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn31" title=""><span data-dcnode-id="3189" instrument_node="">[31]</span></a><span data-dcnode-id="3187" instrument_node=""> When North Korea warmed up to the Soviet Union, China retaliated diplomatically for North Korea’s lack of support.&nbsp; In Chinese public media, there were hardly any mentions of North Korea between 1967 and 1969.</span><a data-dcnode-id="3185" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn32" title=""><span data-dcnode-id="3186" instrument_node="">[32]</span></a><span data-dcnode-id="3184" instrument_node=""> At the Sino-North Korean border, disputes arose over the contested Paekustan, and the region saw several military skirmishes.</span><a data-dcnode-id="3182" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn33" title=""><span data-dcnode-id="3183" instrument_node="">[33]</span></a><span data-dcnode-id="3181" instrument_node=""> Despite the period of diplomatic isolation between China and North Korea during this period, which saw a distinct absence of high-level visits and new cultural and economic agreements, rapprochement between the two states was evident by the end of the 1960s.</span><a data-dcnode-id="3179" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn34" title=""><span data-dcnode-id="3180" instrument_node="">[34]</span></a><span data-dcnode-id="3178" instrument_node=""> In 1970, a new communiqué was signed between the first Premier of China, Zhou Enlai, and North Korean leader Kim Il-sung, pronouncing that the two countries will “unite against the common enemy.”</span><a data-dcnode-id="3176" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn35" title=""><span data-dcnode-id="3177" instrument_node="">[35]</span></a></p><span data-dcnode-id="3174" instrument_node="">
</span><p data-dcnode-id="3163"><span data-dcnode-id="3173" instrument_node="">Bilateral relations remained close until the 1990s, when Sino-North Korean relations were rocked by larger changes in the international system. The collapse of the Soviet Union meant that China had find ways to maintain its interests in a unipolar, United States-dominated international system. As such, China began to normalize relations with South Korea, leading to full diplomatic normalization in 1992. In reaction to this, North Korea denounced China publicly.</span><a data-dcnode-id="3171" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn36" title=""><span data-dcnode-id="3172" instrument_node="">[36]</span></a><span data-dcnode-id="3170" instrument_node=""> Meanwhile, however, North Korea faced its greatest famine in the mid-1990s. China utilized this opportunity to maintain Chinese influence in North Korea through provision of food and economic assistance.</span><a data-dcnode-id="3168" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn37" title=""><span data-dcnode-id="3169" instrument_node="">[37]</span></a><span data-dcnode-id="3167" instrument_node=""> This was especially important for North Korea as it had recently lost a source of support with the fall of the Soviet Union. In the 1990s, China became North Korea’s main patron, supplying nearly three fourths of North Korea’s food imports and 90% of gross imports of energy.</span><a data-dcnode-id="3165" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn38" title=""><span data-dcnode-id="3166" instrument_node="">[38]</span></a><span data-dcnode-id="3164" instrument_node=""> This helped guard friendly bilateral relations between the two states, and justify China’s normalization with South Korea.</span></p><span data-dcnode-id="3162" instrument_node="">
</span><p data-dcnode-id="3148"><span data-dcnode-id="3161" instrument_node="">The North Korean nuclear crises in 2000s tested Sino-North Korean relations, as North Korea’s successful nuclear tests demonstrated a limitation to Chinese influence. While China avoided participation in the 1994 nuclear talks between United States and North Korea, China began to engage in an active role in the 2000s.</span><a data-dcnode-id="3159" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn39" title=""><span data-dcnode-id="3160" instrument_node="">[39]</span></a><span data-dcnode-id="3158" instrument_node=""> China adopted a definitive stance to prevent nuclear proliferation in the Korean peninsula and to maintain stability in northeast Asia.</span><a data-dcnode-id="3156" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn40" title=""><span data-dcnode-id="3157" instrument_node="">[40]</span></a><span data-dcnode-id="3155" instrument_node=""> It was thought that China could exercise its leverage to dissuade North Korea from pursuing nuclear development, because of China’s role as the major supplier for North Korea’s food and fuel imports. Resultantly, multi-party talks that were set up gave China the role of host and mediator. However, despite China’s involvement, North Korea carried out two successful nuclear tests in 2006 and 2009, revealing the limitation of Chinese influence on the North Korean regime.</span><a data-dcnode-id="3153" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn41" title=""><span data-dcnode-id="3154" instrument_node="">[41]</span></a><span data-dcnode-id="3152" instrument_node=""> Following these incidences, current literature describes an evolution of Sino-North Korean relations from the traditional “blood-cemented” one, to a more state-to-state relationship.</span><a data-dcnode-id="3150" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn42" title=""><span data-dcnode-id="3151" instrument_node="">[42]</span></a><span data-dcnode-id="3149" instrument_node=""> In this sense, Chinese policy on North Korean refugees may alter according to this shift.</span></p><span data-dcnode-id="3147" instrument_node="">
</span><p data-dcnode-id="3144"><i data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">Refugee Treatment</span></i></p><span data-dcnode-id="3143" instrument_node="">
</span><p data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">China has followed a consistent policy towards North Korean refugees, whereby China refuses to recognize incomers as “refugees.” The policy has been consistent, because the momentary lows in bilateral relations in mid-1960s and in early 1990s have been insufficient to cause a change in China’s refugee policies. In the 1960s, North Korean refugees entering China has not become a significant issue yet, as China has stated that North Korean refugees have not been entering China until 1983. When relations became strained again in the 1990s, China was still attempting to maintain cooperative relations with North Korea, as exemplified with China’s assistance to the North Korean famine.&nbsp; This cooperation helped redress their differences and upheld good relations.</span></p><div class="advads-infeed-5-desktop" data-dcnode-id="3134" id="advads-829351005" style="margin-bottom: 22px; "><ins class="adsbygoogle" data-ad-client="ca-pub-6827106764042735" data-ad-slot="4710931000" data-dcnode-id="3139" style="display:inline-block;width:728px;height:90px;"></ins><span data-dcnode-id="3138" instrument_node="">
</span><span data-dcnode-id="3135" instrument_node="">
</span></div><span data-dcnode-id="3133" instrument_node="">
</span><p data-dcnode-id="3107"><span data-dcnode-id="3132" instrument_node="">China claims that North Korean border crossers are “economic migrants” and uses this definition to justify repatriation, as surveys conducted at borders show that 95% of incomers left for economic reasons.</span><a data-dcnode-id="3130" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn43" title=""><span data-dcnode-id="3131" instrument_node="">[43]</span></a><span data-dcnode-id="3129" instrument_node=""> However, as economic circumstances are intrinsically tied to political characteristics of the regime, </span><a data-dcnode-id="3127" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn44" title=""><span data-dcnode-id="3128" instrument_node="">[44]</span></a><span data-dcnode-id="3126" instrument_node=""> North Koreans fleeing their home country fall under the definition of </span><i data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">refugees sur place</span></i><span data-dcnode-id="3123" instrument_node="">. There is a distinct caste system in North Korea, in which social classes are determined at birth, and mobility between social categories is next to impossible.</span><a data-dcnode-id="3121" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn45" title=""><span data-dcnode-id="3122" instrument_node="">[45]</span></a><span data-dcnode-id="3120" instrument_node=""> Furthermore, there are definite political consequences to repatriation. Refugees who are returned to North Korea after being caught are sent to labour camps, and branded as “traitors” to the regime.</span><a data-dcnode-id="3118" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn46" title=""><span data-dcnode-id="3119" instrument_node="">[46]</span></a><span data-dcnode-id="3117" instrument_node=""> Punishment and exile extend to family members of the refugee.</span><a data-dcnode-id="3115" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn47" title=""><span data-dcnode-id="3116" instrument_node="">[47]</span></a><span data-dcnode-id="3114" instrument_node=""> This renders North Koreans who fled North Korea as </span><i data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">refugees sur place</span></i><span data-dcnode-id="3111" instrument_node="">, persons who become entitled to protection as refugees due to the risk of political persecution lest they return.</span><a data-dcnode-id="3109" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn48" title=""><span data-dcnode-id="3110" instrument_node="">[48]</span></a><span data-dcnode-id="3108" instrument_node=""> Therefore, such well-founded fears of political persecution designate North Koreans who cross the Sino-North Korean border as refugees under the UN Convention.</span></p><span data-dcnode-id="3106" instrument_node="">
</span><p data-dcnode-id="3093"><span data-dcnode-id="3105" instrument_node="">North Koreans have been entering China through the northeastern provinces of Jilin, Heilongjiang, and Liaoning provinces, and the two countries have taken measures to tighten border security. In the early 1960s, China and North Korea signed a secret agreement to govern security in the border area.</span><a data-dcnode-id="3103" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn49" title=""><span data-dcnode-id="3104" instrument_node="">[49]</span></a><span data-dcnode-id="3102" instrument_node=""> However, since 1983, there has been a steady increase of refugee inflows.</span><a data-dcnode-id="3100" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn50" title=""><span data-dcnode-id="3101" instrument_node="">[50]</span></a><span data-dcnode-id="3099" instrument_node=""> In 1986 border security was further consolidated in another agreement in which North Korea called for return of its citizens and laid out specific security protocols.</span><a data-dcnode-id="3097" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn51" title=""><span data-dcnode-id="3098" instrument_node="">[51]</span></a><span data-dcnode-id="3096" instrument_node="">&nbsp; In 2006 construction of a 20-km long fence was completed along the border at Yalu River.</span><a data-dcnode-id="3094" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn52" title=""><span data-dcnode-id="3095" instrument_node="">[52]</span></a></p><span data-dcnode-id="3092" instrument_node="">
</span><p data-dcnode-id="3079"><span data-dcnode-id="3091" instrument_node="">During the worst years of famine in North Korea in the mid-1990s there were an estimated 20,000 – 30,000 refugees who entered the PRC.</span><a data-dcnode-id="3089" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn53" title=""><span data-dcnode-id="3090" instrument_node="">[53]</span></a><span data-dcnode-id="3088" instrument_node="">&nbsp; Some sources even claim that numbers ranged as high as 300,000.</span><a data-dcnode-id="3086" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn54" title=""><span data-dcnode-id="3087" instrument_node="">[54]</span></a><span data-dcnode-id="3085" instrument_node=""> Accurate figures are often difficult to obtain because no refugee organizations are officially permitted to operate at the border area, and North Korean refugees are often dispersed and under cover to avoid repatriation.</span><a data-dcnode-id="3083" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn55" title=""><span data-dcnode-id="3084" instrument_node="">[55]</span></a><span data-dcnode-id="3082" instrument_node="">&nbsp; During this time, some sources claim that China has privately permitted South Korean humanitarian and missionary groups to operate in the border area and provide assistance.</span><a data-dcnode-id="3080" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn56" title=""><span data-dcnode-id="3081" instrument_node="">[56]</span></a></p><span data-dcnode-id="3078" instrument_node="">
</span><p data-dcnode-id="3059"><span data-dcnode-id="3077" instrument_node="">From July 1998 onwards, China has actively enforced its policy of repatriation.&nbsp; China held major roundup operations in northeastern provinces, and arrested around 100 North Korean refugees weekly.</span><a data-dcnode-id="3075" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn57" title=""><span data-dcnode-id="3076" instrument_node="">[57]</span></a><span data-dcnode-id="3074" instrument_node=""> These searches were often launched after incidences relating to North Korean refugees were reported in major news media. </span><a data-dcnode-id="3072" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn58" title=""><span data-dcnode-id="3073" instrument_node="">[58]</span></a><span data-dcnode-id="3071" instrument_node=""> While this deters other North Koreans from entering China, it demonstrates as well China’s concern in maintaining cooperative relations with North Korea publicly. A Human Rights Watch report has also stated that since 1999 China has tightened its surveillance of South Korean humanitarian and missionary groups operating in border areas.</span><a data-dcnode-id="3069" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn59" title=""><span data-dcnode-id="3070" instrument_node="">[59]</span></a><span data-dcnode-id="3068" instrument_node=""> In the Yanbian Korean Self-Governing District of Jilin Province, six detention camps have been set up for refugee deportation in recent years as refugees in the area has exceeded 93,000.</span><a data-dcnode-id="3066" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn60" title=""><span data-dcnode-id="3067" instrument_node="">[60]</span></a><span data-dcnode-id="3065" instrument_node=""> A document from the Border Patrol Bureau stated that as of the end of 2004, 133,009 North Koreans have been deported back to North Korea.</span><a data-dcnode-id="3063" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn61" title=""><span data-dcnode-id="3064" instrument_node="">[61]</span></a><span data-dcnode-id="3062" instrument_node=""> To date, China has upheld its policy of repatriation.</span><a data-dcnode-id="3060" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn62" title=""><span data-dcnode-id="3061" instrument_node="">[62]</span></a></p><span data-dcnode-id="3058" instrument_node="">
</span><p data-dcnode-id="3053"><i data-dcnode-id="3054"><i data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Myanmar&nbsp;</span></i><span data-dcnode-id="3055" instrument_node="">(Republic of the Union of Myanmar)</span></i></p><span data-dcnode-id="3052" instrument_node="">
</span><p data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">Compared to the case of North Korea, China’s policy towards Burmese refugees is slightly more accommodating, as China provides temporary assistance at the border.&nbsp; From 1949 onwards, Sino-Burmese relations was marked with suspicions and mutual distrust.&nbsp; Only up until the 1970s and 80s did bilateral relations improve. Regardless, the Burmese government continually attempts to reduce its dependence on China and remain neutral in its foreign policy by balancing China and developing ties with the West. As a result of this unsteady bilateral relationship, China’s policy towards Burmese refugees has rested in the middle of the spectrum between accommodation and refusal.&nbsp; In the two incidences in 2009 and 2012 as illustrated below, China provided Burmese refugees temporary relief, while at the same time refusing to recognize them as “refugees.”</span></p><div class="advads-infeed-6-desktop" data-dcnode-id="3043" id="advads-1779822029" style="margin-bottom: 24px; "><ins class="adsbygoogle" data-ad-client="ca-pub-6827106764042735" data-ad-format="auto" data-ad-slot="" data-dcnode-id="3048" style="display:block;"></ins><span data-dcnode-id="3047" instrument_node="">
</span><span data-dcnode-id="3044" instrument_node="">
</span></div><span data-dcnode-id="3042" instrument_node="">
</span><p data-dcnode-id="3039"><i data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">Historic Overview and Sino-Burmese Relations</span></i></p><span data-dcnode-id="3038" instrument_node="">
</span><p data-dcnode-id="3025"><span data-dcnode-id="3037" instrument_node="">The beginnings of the PRC and Myanmar’s bilateral relations were marked with mutual distrust. Myanmar is situated at a historically significant juncture, at the crossroads of China, India, and the region of Southeast Asia. When the state gained independence in 1948 from the British, the new regime, then under the name Union of Burma, </span><a data-dcnode-id="3035" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn63" title=""><span data-dcnode-id="3036" instrument_node="">[63]</span></a><span data-dcnode-id="3034" instrument_node=""> had to make a decision to align itself with either the West or the East. However, being located beside China, who had previously invaded Burmese territory, Burma had well-founded fears of China’s intentions.</span><a data-dcnode-id="3032" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn64" title=""><span data-dcnode-id="3033" instrument_node="">[64]</span></a><span data-dcnode-id="3031" instrument_node=""> Moreover, after the opposition group Kuomintang (KMT) fled China following the establishment of the PRC, KMT elements with support from Western states used Burma as a base to wage attacks into China through the Yunnan border. By 1953, there was an estimated 16,000 KMT troops in northeast Burma.</span><a data-dcnode-id="3029" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn65" title=""><span data-dcnode-id="3030" instrument_node="">[65]</span></a><span data-dcnode-id="3028" instrument_node="">&nbsp; Burma, a still newly founded state at this point, did not have sufficient capacity to rid itself of KMT elements. Because of this, Burma further feared China would use this as an excuse for invasion. With these suspicions in mind, Burma decided to please China first, and became the first non-Communist country to recognize the PRC. In 1954, a Joint Declaration and a treaty of friendship and mutual non-aggression were signed between the two countries. Nonetheless, during the period that followed, Burma under the U Nu regime (1948-1962) continued to view China with suspicion, and mutual distrust coloured their relations.</span><a data-dcnode-id="3026" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn66" title=""><span data-dcnode-id="3027" instrument_node="">[66]</span></a></p><span data-dcnode-id="3024" instrument_node="">
</span><p data-dcnode-id="3014"><span data-dcnode-id="3023" instrument_node="">In order to fully understand Sino-Burmese relations, there needs to be an examination of security issues that underlie their shared-border.&nbsp;For Burma, the border area in the northeast region is home to an array of ethnic militias seeking independence. During colonization, the British pursued a divide-and-conquer tactic, supporting minority ethnic groups over the majority Burman group.</span><a data-dcnode-id="3021" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn67" title=""><span data-dcnode-id="3022" instrument_node="">[67]</span></a><span data-dcnode-id="3020" instrument_node=""> When independence came, the Burman group gained power and stripped minority groups of their previous privilege. As minorities were pushed from the center to rural areas, they began to regroup in attempts to regain power. These groups eventually coalesced into factions such as the Karen (Kayin) National Liberation Army (KNLA) (the armed force of Karen National Union), Communist Party of Burma (CPB), United Wa State Army, and the Kachin Independence Army (KIA).</span><a data-dcnode-id="3018" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn68" title=""><span data-dcnode-id="3019" instrument_node="">[68]</span></a><span data-dcnode-id="3017" instrument_node="">&nbsp; Overtime, some of these ethnic groups became associated with illicit drug trades, taking part in the infamous Golden Triangle of Southeast Asia.</span><a data-dcnode-id="3015" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn69" title=""><span data-dcnode-id="3016" instrument_node="">[69]</span></a></p><span data-dcnode-id="3013" instrument_node="">
</span><p data-dcnode-id="2999"><span data-dcnode-id="3012" instrument_node="">On the other hand, bordering Burma is China’s Yunnan province, seen as “China’s wild southwest.”</span><a data-dcnode-id="3010" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn70" title=""><span data-dcnode-id="3011" instrument_node="">[70]</span></a><span data-dcnode-id="3009" instrument_node=""> This perception of Yunnan has historic roots, as dynasties have long had difficulty consolidating control in this territory. The central government has been pursuing strategies to increase integration of Yunnan into China, as the province has a sizeable non-Han population. For example, the Western Development Strategy aims to develop the province economically.</span><a data-dcnode-id="3007" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn71" title=""><span data-dcnode-id="3008" instrument_node="">[71]</span></a><span data-dcnode-id="3006" instrument_node=""> Another problem was the extension of the illicit drug trade from the Burmese side into China, which raised concerns for the Chinese government, who eventually led drug crackdowns in the area.</span><a data-dcnode-id="3004" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn72" title=""><span data-dcnode-id="3005" instrument_node="">[72]</span></a><span data-dcnode-id="3003" instrument_node=""> The widespread narcotics problem has captured international attention.&nbsp; On May 29, 2003, the United States government labeled the United Wa Sate Army as a narcotic trafficking organization.</span><a data-dcnode-id="3001" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn73" title=""><span data-dcnode-id="3002" instrument_node="">[73]</span></a><span data-dcnode-id="3000" instrument_node="">&nbsp; For China, this is worrying because this may justify United States intervention in the area. Because of these security concerns, both states would benefit from stability at the Sino-Burmese border areas.</span></p><span data-dcnode-id="2998" instrument_node="">
</span><p data-dcnode-id="2985"><span data-dcnode-id="2997" instrument_node="">With this in mind, Burmese ethnic minorities form an important factor in their bilateral relations. If China decides to provide support to these groups, this can greatly destabilize the Burmese regime and deteriorate bilateral relations. The 1960s Chinese Cultural Revolution saw radicals in China exporting Communism into Burma, and establishing relations with minority groups such as the CBP and the KIA. </span><a data-dcnode-id="2995" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn74" title=""><span data-dcnode-id="2996" instrument_node="">[74]</span></a><span data-dcnode-id="2994" instrument_node=""> In Burma, Chinese embassies were openly distributing copies of Mao Zedong’s revolutionary Little Red Book.</span><a data-dcnode-id="2992" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn75" title=""><span data-dcnode-id="2993" instrument_node="">[75]</span></a><span data-dcnode-id="2991" instrument_node=""> In one incidence, a large insurgent force of the CBP, officered by the Chinese, crossed over from the Yunnan border and seized territory in Burma’s eastern hills.</span><a data-dcnode-id="2989" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn76" title=""><span data-dcnode-id="2990" instrument_node="">[76]</span></a><span data-dcnode-id="2988" instrument_node=""> In return, Burma showed discontent towards Chinese behaviour, and Chinese residing in Rangoon faced attacks from local mobs.</span><a data-dcnode-id="2986" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn77" title=""><span data-dcnode-id="2987" instrument_node="">[77]</span></a></p><span data-dcnode-id="2984" instrument_node="">
</span><p data-dcnode-id="2962"><span data-dcnode-id="2983" instrument_node="">After the Cultural Revolution and going into the 1970s, Sino-Burmese relations saw improvement. China began to slowly drop its support for ethnic minority groups, in favour of developing more economic ties and border stability. When the Burmese State Law and Order Restoration Council took power in 1988, it marked the turning point when the relationship between China and Burma became a “strategic alignment.”</span><a data-dcnode-id="2981" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn78" title=""><span data-dcnode-id="2982" instrument_node="">[78]</span></a><span data-dcnode-id="2980" instrument_node=""> For Burma, which faced international diplomatic isolation following the 8888 Uprising, establishing good relations with China was highly beneficial.</span><a data-dcnode-id="2978" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn79" title=""><span data-dcnode-id="2979" instrument_node="">[79]</span></a><span data-dcnode-id="2977" instrument_node=""> The same year, a border agreement in Beijing was signed, legitimizing and opening border trade between the two countries.&nbsp; By the 1980s, China has completely ended support for the CPB and other ethnic minority forces aiming to topple the Burmese government.</span><a data-dcnode-id="2975" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn80" title=""><span data-dcnode-id="2976" instrument_node="">[80]</span></a><span data-dcnode-id="2974" instrument_node=""> During this time, China used its ties to these minority groups to assist the government to negotiate cease-fire agreements with them. By the 1990s, 27 cease-fire agreements were signed, which gave these groups the power to retain control of their territories.</span><a data-dcnode-id="2972" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn81" title=""><span data-dcnode-id="2973" instrument_node="">[81]</span></a><span data-dcnode-id="2971" instrument_node=""> Since then, border trade between Burma and China increased remarkably. In recent years, there is an estimated one million Chinese businesspeople in Myanmar.</span><a data-dcnode-id="2969" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn82" title=""><span data-dcnode-id="2970" instrument_node="">[82]</span></a><span data-dcnode-id="2968" instrument_node=""> Assistance in other areas bloomed as well. In military aid, China has exported more than $1.4 billion worth of supplies.</span><a data-dcnode-id="2966" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn83" title=""><span data-dcnode-id="2967" instrument_node="">[83]</span></a><span data-dcnode-id="2965" instrument_node=""> In 2010, $4.2 billion worth of interest-free-loans over a 30-year period was given to Myanmar to help fund development in hydroelectricity, physical infrastructure, and information technology.</span><a data-dcnode-id="2963" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn84" title=""><span data-dcnode-id="2964" instrument_node="">[84]</span></a></p><span data-dcnode-id="2961" instrument_node="">
</span><p data-dcnode-id="2947"><span data-dcnode-id="2960" instrument_node="">The discovery of gas fields off the shores of Myanmar in the 1990s presented itself as another occasion to further develop the ties between China and Burma. Proven resources stand at about 10 trillion cubic feet, but some estimates run as high as 90 trillion cubic feet, making this discovery the 10</span><sup data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">th</span></sup><span data-dcnode-id="2957" instrument_node=""> largest gas fields in the world.</span><a data-dcnode-id="2955" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn85" title=""><span data-dcnode-id="2956" instrument_node="">[85]</span></a><span data-dcnode-id="2954" instrument_node=""> The Burmese government held a consortium to decide who would be granted a contract to develop the gas fields, and attendees included companies from India, South Korea, and China. For China, to sustain a rapidly expanding economy, this was a perfect opportunity. This was important strategically as well because the proposed pipeline would connect China to the Indian Ocean, and reduce dependent on the congested Malacca Strait for current fuel transportation from the Middle East.</span><a data-dcnode-id="2952" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn86" title=""><span data-dcnode-id="2953" instrument_node="">[86]</span></a><span data-dcnode-id="2951" instrument_node=""> In addition, the pipeline would run from Myanmar through Yunnan province, helping expand the Yunnan economy in accordance to China’s Western Development Strategy. China’s test to demonstrate its political stance towards Myanmar came when the United Nations Security Council proposed a Resolution condemning Myanmar for its human rights abuses.</span><a data-dcnode-id="2949" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn87" title=""><span data-dcnode-id="2950" instrument_node="">[87]</span></a><span data-dcnode-id="2948" instrument_node=""> In favour to Myanmar, China used its Security Council membership to veto the resolution.&nbsp; For Myanmar, this helped alleviate international pressure on its regime. Through this, China displayed public support for Myanmar both economically and politically. In November 2008, the agreement to build a $1.5 billion oil pipeline and a $1.04 billion natural gas pipeline with China was accepted. This was finalized with signed agreements in 2009.</span></p><span data-dcnode-id="2946" instrument_node="">
</span><p data-dcnode-id="2943"><i data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Refugee Treatment</span></i></p><span data-dcnode-id="2942" instrument_node="">
</span><p data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">There have been two episodes of refugee inflows in 2009 and again in 2011, both resulting from a government crackdown on ethnic minorities in northeast Myanmar.&nbsp; While the first incident saw China giving refugees temporary assistance, during the second instance, China has been erring more to the side of refusal and repatriation. The shift indicates higher levels of cooperation, at least in terms of communication, between the two states.</span></p><span data-dcnode-id="2939" instrument_node="">
</span><p data-dcnode-id="2936"><i data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">2009 Kokang Incident</span></i></p><span data-dcnode-id="2935" instrument_node="">
</span><p data-dcnode-id="2928"><span data-dcnode-id="2934" instrument_node="">In August 2009, the Burmese government launched an attack against the minority groups Kokang, Wa, and Kachin in the Special Region of northern Shan state, adjacent to the Sino-Burmese border. The Kokang people form the majority of the population in the area. They are in fact ethnic Mandarin-speaking Han Chinese who arrived in what is now Shan state today in the 18</span><sup data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">th</span></sup><span data-dcnode-id="2931" instrument_node=""> century. From the 1960s up until 1989, the CPB ruled the Region. The dissolution of the Party in 1989, along with the end of China’s support for the Party facilitated ceasefire agreements between ethnic minority groups and the Burmese government. The establishment of the area as a Special Region gave the Kokang Myanmar National Democratic Alliance Army (MNDAA), control over the territory.&nbsp; The Kokang had been involved in illegal drug trades and were known to be major opium producers.</span><a data-dcnode-id="2929" data-wpel-link="internal" href="file:///C:/Documents%20and%20Settings/marmbruster/Desktop/E-IR/Paper%20-%20Refugee%20&amp;amp;%20Foreign%20Policy%20-%20e-ir.docx#_edn88" title=""><span data-dcnode-id="2930" instrument_node="">[88]</span></a></p><span data-dcnode-id="2927" instrument_node="">
