</span><h1 class="c-hero__title" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">International refugee law</span></h1><span data-dcnode-id="674" instrument_node="">
</span><h2 class="c-hero__subtitle" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">            LWM60
      </span></h2><span data-dcnode-id="671" instrument_node="">
</span><div class="wysiwyg-container" data-dcnode-id="666"><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">In this course we will initially look at the historical move towards affording protection to persons who may be deemed to be a refugee. We will examine what is meant by the term refugee, the classical definition, as well as investigating the main international instrument which determines whether or not someone is defined as a refugee. This course also covers the European dimension to refugee law, the rights of refugees and contemporary issues in refugee law and will give you a strong overall understanding of International Refugee Law and its ongoing importance.</span></p><span data-dcnode-id="667" instrument_node="">

</span><p data-dcnode-id="480" style="text-align:justify"><span data-dcnode-id="481" instrument_node="">These modules also contribute towards the following specialist pathways for Laws:</span></p><span data-dcnode-id="479" instrument_node="">

</span><span class="c-card__title-underline" data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">
                              Professor Rebecca Wallace
                                          </span></span><span data-dcnode-id="426" instrument_node="">
</span></h3><span data-dcnode-id="424" instrument_node="">
</span><div class="c-card__body" data-dcnode-id="413"><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="422" instrument_node="">            Professor Rebecca Wallace was appointed Research Professor in International Human Rights  and Justice at Robert Gordon University Aberdeen in December 2012. Professor Wallace has also been Visiting Scholar to the School of Advanced International Studies, John Hopkins University, Washington DC and the Ariel Sallows Professor in Human Rights at the University of Saskatchewan in Canada. From April 2009 – November 2012 Professor Wallace was Director of the Centre for Rural Childhood, University of the Highlands and Islands, based at Perth College. </span><br data-dcnode-id="421"><span data-dcnode-id="420" instrument_node="">
</span><br data-dcnode-id="419"><span data-dcnode-id="418" instrument_node="">
During this time she remained as a Visiting Professor at RGU. Prior to joining RGU in 2003 she was Head of Napier University Law School in Edinburgh and Director of its Masters Programme in International Law. She is a member of Lincoln's Inn as a non-practicing barrister a part-time judge of the First tier Tribunal (asylum and immigration). </span><br data-dcnode-id="417"><span data-dcnode-id="416" instrument_node="">
</span></p><span data-dcnode-id="414" instrument_node="">
