</span></td></tr></tbody></table><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1801" instrument_node="">These high drop-out rates are often the result of too many school absences, which is common for students who need to support their families by working in the fields or babysitting younger siblings. Before dropping out, increased absences can lead to migrant students being held back a year in school. The more this happens, the wider the age discrepancy between students becomes, which furthers the likelihood of dropping out of school.</span><sup class="reference" data-dcnode-id="1798" id="cite_ref-Martinez_5-3"><a data-dcnode-id="1799" href="#cite_note-Martinez-5"><span data-dcnode-id="1800" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1797" instrument_node="">
</span></p><span data-dcnode-id="1795" instrument_node="">
</span><h3 data-dcnode-id="1785"><span class="mw-headline" data-dcnode-id="1793" id="Possible_solutions"><span data-dcnode-id="1794" instrument_node="">Possible solutions</span></span><span class="mw-editsection" data-dcnode-id="1786"><span class="mw-editsection-bracket" data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">[</span></span><a data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D25" title="Edit section: Possible solutions"><span data-dcnode-id="1790" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1763"><span data-dcnode-id="1783" instrument_node="">Because of the complex and interwoven nature of the different issues facing migrant students, there is no consensus of how to solve the inequalities in educational opportunity, attainment, and achievement. Members of the </span><a data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Texas_at_Austin" title="University of Texas at Austin"><span data-dcnode-id="1782" instrument_node="">University of Texas at Austin</span></a><span data-dcnode-id="1780" instrument_node=""> argue that the creation of "advocate educators," whose role it is to support the rights of migrant students and act as a solution for bridging gaps between educational institutions and students.</span><sup class="reference" data-dcnode-id="1777" id="cite_ref-Salinas_32-0"><a data-dcnode-id="1778" href="#cite_note-Salinas-32"><span data-dcnode-id="1779" instrument_node="">[32]</span></a></sup><span data-dcnode-id="1776" instrument_node=""> A 2001 study conducted along the Texas-Mexican border concluded that advocate educators who demonstrated cross-cultural empathy and an understanding of the nature, context, and needs of migrant farmworkers fostered the educational success of migrant students.</span><sup class="reference" data-dcnode-id="1773" id="cite_ref-Salinas_32-1"><a data-dcnode-id="1774" href="#cite_note-Salinas-32"><span data-dcnode-id="1775" instrument_node="">[32]</span></a></sup><span data-dcnode-id="1772" instrument_node=""> Teachers who are better educated on the experiences of migrant farmworkers will help eliminate prejudice and low expectations of students, which in turn, will encourage students to perform better in school. Along these lines, it is also argued that combatting prejudice and racial stereotypes within the wider community will help decrease prejudice in school and help migrant students.</span><sup class="reference" data-dcnode-id="1769" id="cite_ref-Martinez_5-4"><a data-dcnode-id="1770" href="#cite_note-Martinez-5"><span data-dcnode-id="1771" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1768" instrument_node=""> Other suggested interventions include finding a more efficient way of making up absences or missed curriculum due to school transfers and increasing the minimum wage of migrant farmworkers. Studies suggest that students have to stay after school constantly to make-up missed work lose motivation and become quickly discouraged with the educational system. By raising the minimum wage of migrant farmworkers, policy makers would decrease the opportunity cost of education because children would no longer be needed to financially support the family.</span><sup class="reference" data-dcnode-id="1765" id="cite_ref-Martinez_5-5"><a data-dcnode-id="1766" href="#cite_note-Martinez-5"><span data-dcnode-id="1767" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1764" instrument_node="">
</span></p><span data-dcnode-id="1762" instrument_node="">
</span><h2 data-dcnode-id="1752"><span class="mw-headline" data-dcnode-id="1760" id="In_China"><span data-dcnode-id="1761" instrument_node="">In China</span></span><span class="mw-editsection" data-dcnode-id="1753"><span class="mw-editsection-bracket" data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">[</span></span><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D26" title="Edit section: In China"><span data-dcnode-id="1757" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1751" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1739"><div class="thumbinner" data-dcnode-id="1740" style="width:302px;"><a class="image" data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABeijing_school_classroom.jpg"><img alt="" class="thumbimage" data-dcnode-id="1750" data-file-height="1664" data-file-width="2496" decoding="async" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/db/Beijing_school_classroom.jpg/300px-Beijing_school_classroom.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/db/Beijing_school_classroom.jpg/450px-Beijing_school_classroom.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/db/Beijing_school_classroom.jpg/600px-Beijing_school_classroom.jpg 2x" width="300"></a><span data-dcnode-id="1748" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1741"><div class="magnify" data-dcnode-id="1746"><a class="internal" data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABeijing_school_classroom.jpg" title="Enlarge"></a></div><span data-dcnode-id="1745" instrument_node="">Classroom in a </span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Migrant_School" title="Migrant School"><span data-dcnode-id="1744" instrument_node="">school for migrant students</span></a><span data-dcnode-id="1742" instrument_node=""> in Beijing (Dongba district).</span></div></div></div><span data-dcnode-id="1738" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="1732" role="note"><span data-dcnode-id="1735" instrument_node="">See also: </span><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Migrant_School" title="Migrant School"><span data-dcnode-id="1734" instrument_node="">Migrant School</span></a></div><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1730" instrument_node="">The primary form of migration within China isn't that of rural-rural farming migration, but that of rural-urban migration. Through the </span><a class="mw-redirect" data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hukou_system" title="Hukou system"><span data-dcnode-id="1729" instrument_node="">hukou system</span></a><span data-dcnode-id="1727" instrument_node="">, a form of citizenship registration, the Chinese government divides citizens into one of two categories of: urban or rural. Historically, this has created a hierarchy between urban and rural citizens because strict regulations give urbanites more access to healthcare, education, food, etc. Migration has led to a changing demographic of cities. According to the </span><a class="mw-redirect" data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sixth_National_Population_Census_of_the_People%2527s_Republic_of_China" title="Sixth National Population Census of the People's Republic of China"><span data-dcnode-id="1726" instrument_node="">2010 Census</span></a><span data-dcnode-id="1724" instrument_node="">, 210 million urban-to-rural migrants are living in cities, without official hukou registration. Of these migrants, about 20 million are children between the ages of 6 and 14 years struggling to receive quality education because they are not registered within the school district.</span><sup class="reference" data-dcnode-id="1721" id="cite_ref-Chen_33-0"><a data-dcnode-id="1722" href="#cite_note-Chen-33"><span data-dcnode-id="1723" instrument_node="">[33]</span></a></sup><span data-dcnode-id="1720" instrument_node=""> Many local governments require that everyone complete at least 9 years of education; however, migrant children weren't allowed to enroll in urban schools until 1996. The </span><a class="mw-redirect" data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Education_%28Republic_of_China%29" title="Ministry of Education (Republic of China)"><span data-dcnode-id="1719" instrument_node="">Ministry of Education</span></a><span data-dcnode-id="1717" instrument_node=""> issued "Provisional Measures for the Education of Migrant Children" in 1998, but because this was not actually legally binding, many factors continue to prohibit migrants from receiving education:
</span></p><span data-dcnode-id="1715" instrument_node="">
</span><ul data-dcnode-id="1700"><li data-dcnode-id="1710"><span data-dcnode-id="1714" instrument_node="">The hukou system requires that rural children must pay extra fees to attend urban schools.</span><sup class="reference" data-dcnode-id="1711" id="cite_ref-Liang_34-0"><a data-dcnode-id="1712" href="#cite_note-Liang-34"><span data-dcnode-id="1713" instrument_node="">[34]</span></a></sup></li><span data-dcnode-id="1709" instrument_node="">
</span><li data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">School administrations require migrant children to show at least 9 official documents before enrolling, including a temporary residence certificate (which requires that the child's parents have a work permit and money to pay for the certificate).</span></li><span data-dcnode-id="1706" instrument_node="">
</span><li data-dcnode-id="1701"><span data-dcnode-id="1705" instrument_node="">Many public schools require fees like the "education compensation fee" and the "temporary schooling fee" specifically for migrant children.</span><sup class="reference" data-dcnode-id="1702" id="cite_ref-Goodburn_4-2"><a data-dcnode-id="1703" href="#cite_note-Goodburn-4"><span data-dcnode-id="1704" instrument_node="">[4]</span></a></sup></li></ul><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1698" instrument_node="">For rural migrant children who do succeed in enrolling in state schools, discrimination is prevalent: in most schools, migrant children do not receive official grades and can not receive academic honors. Because of this, many parents choose to send their children to unlicensed, privately run migrant-specific ("black") schools.</span><sup class="reference" data-dcnode-id="1695" id="cite_ref-35"><a data-dcnode-id="1696" href="#cite_note-35"><span data-dcnode-id="1697" instrument_node="">[35]</span></a></sup><span data-dcnode-id="1694" instrument_node=""> The quality of education in these schools is poor because they lack the same resources as state schools—specifically qualified teachers. Depending on the region, these "black" schools are also under threat of closure. In 2007 in </span><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shanghai" title="Shanghai"><span data-dcnode-id="1693" instrument_node="">Shanghai</span></a><span data-dcnode-id="1691" instrument_node="">, every unlicensed migrant school in the center of the city was closed. However, schools on the outskirts of the city and in the majority migrant </span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xiamen_Special_Economic_Zone" title="Xiamen Special Economic Zone"><span data-dcnode-id="1690" instrument_node="">Xiamen Special Economic Zone</span></a><span data-dcnode-id="1688" instrument_node="">, 34 unlicensed schools were allowed.
</span></p><p data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Researchers cite the Chinese government's quest for "population quality" as the primary reason for continued exclusionary policies against rural migrants. However, there are other consequences to the continuation of these policies, as explained by Charlotte Goodburn:
</span></p><span data-dcnode-id="1684" instrument_node="">
</span><blockquote data-dcnode-id="1674"><p data-dcnode-id="1675"><span data-dcnode-id="1683" instrument_node="">It is difficult to predict precisely what the results of these exclusionary policies will be. However, it seems reasonable to suppose that if these problems are not addressed they will have a serious impact on China's future development. Not only will a large section of the population not have the skills necessary for China's further economic development, but they will also lack the kind of education needed to develop the </span><a class="mw-redirect" data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capabilities_approach" title="Capabilities approach"><span data-dcnode-id="1682" instrument_node="">capabilities</span></a><span data-dcnode-id="1680" instrument_node=""> for leading decent, happy and successful lives.</span><sup class="reference" data-dcnode-id="1677" id="cite_ref-Goodburn_4-3"><a data-dcnode-id="1678" href="#cite_note-Goodburn-4"><span data-dcnode-id="1679" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1676" instrument_node="">
</span></p></blockquote><span data-dcnode-id="1673" instrument_node="">
</span><h2 data-dcnode-id="1663"><span class="mw-headline" data-dcnode-id="1671" id="In_South_Africa"><span data-dcnode-id="1672" instrument_node="">In South Africa</span></span><span class="mw-editsection" data-dcnode-id="1664"><span class="mw-editsection-bracket" data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">[</span></span><a data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D27" title="Edit section: In South Africa"><span data-dcnode-id="1668" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1662" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1653"><div class="thumbinner" data-dcnode-id="1654" style="width:302px;"><a class="image" data-dcnode-id="1660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASchool_children_%28Lukhanyo_Primary_School%2C_Zwelihle_Township_%28Hermanus%2C_South_Africa%29_05.jpg"><img alt="" class="thumbimage" data-dcnode-id="1661" data-file-height="2848" data-file-width="4288" decoding="async" height="199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/84/School_children_%2528Lukhanyo_Primary_School%252C_Zwelihle_Township_%2528Hermanus%252C_South_Africa%2529_05.jpg/300px-School_children_%2528Lukhanyo_Primary_School%252C_Zwelihle_Township_%2528Hermanus%252C_South_Africa%2529_05.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/84/School_children_%28Lukhanyo_Primary_School%2C_Zwelihle_Township_%28Hermanus%2C_South_Africa%29_05.jpg/450px-School_children_%28Lukhanyo_Primary_School%2C_Zwelihle_Township_%28Hermanus%2C_South_Africa%29_05.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/84/School_children_%28Lukhanyo_Primary_School%2C_Zwelihle_Township_%28Hermanus%2C_South_Africa%29_05.jpg/600px-School_children_%28Lukhanyo_Primary_School%2C_Zwelihle_Township_%28Hermanus%2C_South_Africa%29_05.jpg 2x" width="300"></a><span data-dcnode-id="1659" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1655"><div class="magnify" data-dcnode-id="1657"><a class="internal" data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASchool_children_%28Lukhanyo_Primary_School%2C_Zwelihle_Township_%28Hermanus%2C_South_Africa%29_05.jpg" title="Enlarge"></a></div><span data-dcnode-id="1656" instrument_node="">School children in Hermanus, South Africa</span></div></div></div><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1651" instrument_node="">South Africa's migrant population is mainly composed of refugee groups from other countries in Africa. The </span><a class="mw-redirect" data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_African_Constitution" title="South African Constitution"><span data-dcnode-id="1650" instrument_node="">South African Constitution</span></a><span data-dcnode-id="1648" instrument_node=""> guarantees </span><a class="mw-redirect" data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugees" title="Refugees"><span data-dcnode-id="1647" instrument_node="">refugees</span></a><span data-dcnode-id="1645" instrument_node=""> and </span><a data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_of_asylum" title="Right of asylum"><span data-dcnode-id="1644" instrument_node="">asylum</span></a><span data-dcnode-id="1642" instrument_node=""> seekers the right to education. However, in addition to the widespread xenophobia and prejudice, migrants face many systemic barriers that reduce their educational attainment.</span><sup class="reference" data-dcnode-id="1639" id="cite_ref-36"><a data-dcnode-id="1640" href="#cite_note-36"><span data-dcnode-id="1641" instrument_node="">[36]</span></a></sup><span data-dcnode-id="1638" instrument_node="">
</span></p><p data-dcnode-id="1631"><span data-dcnode-id="1636" instrument_node="">One such barrier in South Africa is that many migrants are turned away from public schooling because of a lack of documentation (such as report cards, transfer forms, birth certificates, etc.) Second, language difference is a significant barrier for students from French or Portuguese-speaking countries who must continue their education in the predominantly English-speaking South Africa. Third, according to the Gauteng Department of Education, the recent influx of migrants has "led to enormous pressure on the education system, resulting in overcrowding in ... schools."</span><sup class="reference" data-dcnode-id="1633" id="cite_ref-Hlatshwayo2014_3-5"><a data-dcnode-id="1634" href="#cite_note-Hlatshwayo2014-3"><span data-dcnode-id="1635" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1632" instrument_node="">
</span></p><p data-dcnode-id="1619"><span data-dcnode-id="1630" instrument_node="">South African civil society organizations, such as People Against Suffering, Oppression and Poverty (</span><a data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PASSOP" title="PASSOP"><span data-dcnode-id="1629" instrument_node="">PASSOP</span></a><span data-dcnode-id="1627" instrument_node="">) and Agency for Refugee Educational Skills and Advocacy are working to combat the issue of migrant education. Community based social movements such as the </span><a data-dcnode-id="1625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equal_Education" title="Equal Education"><span data-dcnode-id="1626" instrument_node="">Equal Education</span></a><span data-dcnode-id="1624" instrument_node=""> movement are fighting for educational equality in South Africa through research, analysis, and activism. The Three2Six Project, which is donor-funded, also helps by offering free schooling to migrant children who are turned away from public schools.</span><sup class="reference" data-dcnode-id="1621" id="cite_ref-Hlatshwayo2014_3-6"><a data-dcnode-id="1622" href="#cite_note-Hlatshwayo2014-3"><span data-dcnode-id="1623" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1620" instrument_node="">
</span></p><span data-dcnode-id="1618" instrument_node="">
</span><h2 data-dcnode-id="1608"><span class="mw-headline" data-dcnode-id="1616" id="See_also"><span data-dcnode-id="1617" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="1609"><span class="mw-editsection-bracket" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">[</span></span><a data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D28" title="Edit section: See also"><span data-dcnode-id="1613" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1607" instrument_node="">
