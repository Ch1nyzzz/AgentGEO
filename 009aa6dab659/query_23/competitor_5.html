</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="451" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="460"><div class="thumb tright" data-dcnode-id="3002"><div class="thumbinner" data-dcnode-id="3003" style="width:402px;"><a class="image" data-dcnode-id="3009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_school_for_the_children_of_white_migrant_farm_workers_is_maintained_at_the_Osceola_Farm_Labor_Supply_Center..._-_NARA_-_512800.tif"><img alt="" class="thumbimage" data-dcnode-id="3010" data-file-height="1867" data-file-width="2953" decoding="async" height="253" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/48/A_school_for_the_children_of_white_migrant_farm_workers_is_maintained_at_the_Osceola_Farm_Labor_Supply_Center..._-_NARA_-_512800.tif/lossy-page1-400px-A_school_for_the_children_of_white_migrant_farm_workers_is_maintained_at_the_Osceola_Farm_Labor_Supply_Center..._-_NARA_-_512800.tif.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/48/A_school_for_the_children_of_white_migrant_farm_workers_is_maintained_at_the_Osceola_Farm_Labor_Supply_Center..._-_NARA_-_512800.tif/lossy-page1-600px-A_school_for_the_children_of_white_migrant_farm_workers_is_maintained_at_the_Osceola_Farm_Labor_Supply_Center..._-_NARA_-_512800.tif.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/48/A_school_for_the_children_of_white_migrant_farm_workers_is_maintained_at_the_Osceola_Farm_Labor_Supply_Center..._-_NARA_-_512800.tif/lossy-page1-800px-A_school_for_the_children_of_white_migrant_farm_workers_is_maintained_at_the_Osceola_Farm_Labor_Supply_Center..._-_NARA_-_512800.tif.jpg 2x" width="400"></a><span data-dcnode-id="3008" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3004"><div class="magnify" data-dcnode-id="3006"><a class="internal" data-dcnode-id="3007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_school_for_the_children_of_white_migrant_farm_workers_is_maintained_at_the_Osceola_Farm_Labor_Supply_Center..._-_NARA_-_512800.tif" title="Enlarge"></a></div><span data-dcnode-id="3005" instrument_node="">A school for the children of white migrant farm workers, circa 1945</span></div></div></div><span data-dcnode-id="3001" instrument_node="">
</span><p data-dcnode-id="2977"><span data-dcnode-id="3000" instrument_node="">Children of </span><a class="mw-redirect" data-dcnode-id="2998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Migrant_workers" title="Migrant workers"><span data-dcnode-id="2999" instrument_node="">migrant workers</span></a><span data-dcnode-id="2997" instrument_node=""> struggle to achieve the same level of educational success as their peers. Relocation causes discontinuity in education, which causes migrant students to progress slowly through school and drop out at high rates. Additionally, relocation has negative social consequences on students: isolation from peers due to cultural differences and </span><a data-dcnode-id="2995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Language_barrier" title="Language barrier"><span data-dcnode-id="2996" instrument_node="">language barriers</span></a><span data-dcnode-id="2994" instrument_node="">. Migrant children, defined as those who relocate because of involvement with agriculture-related industries or other seasonal work,</span><sup class="reference" data-dcnode-id="2991" id="cite_ref-Branz-Spall_1-0"><a data-dcnode-id="2992" href="#cite_note-Branz-Spall-1"><span data-dcnode-id="2993" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2990" instrument_node=""> are also at a disadvantage because the majority live in </span><a data-dcnode-id="2988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extreme_poverty" title="Extreme poverty"><span data-dcnode-id="2989" instrument_node="">extreme poverty</span></a><span data-dcnode-id="2987" instrument_node=""> and must work with their parents to support their families. These barriers to equal educational attainment for children of migrant workers are present in countries all over the world. Although the inequality in education remains pronounced, government policies, </span><a class="mw-redirect" data-dcnode-id="2985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-governmental_organizations" title="Non-governmental organizations"><span data-dcnode-id="2986" instrument_node="">non-governmental organizations</span></a><span data-dcnode-id="2984" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-profits" title="Non-profits"><span data-dcnode-id="2983" instrument_node="">non-profits</span></a><span data-dcnode-id="2981" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="2979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_movements" title="Social movements"><span data-dcnode-id="2980" instrument_node="">social movements</span></a><span data-dcnode-id="2978" instrument_node=""> are working to reverse its effects.
</span></p><span data-dcnode-id="2976" instrument_node="">

</span><h2 data-dcnode-id="2698"><span class="mw-headline" data-dcnode-id="2706" id="Barriers_to_educational_success"><span data-dcnode-id="2707" instrument_node="">Barriers to educational success</span></span><span class="mw-editsection" data-dcnode-id="2699"><span class="mw-editsection-bracket" data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">[</span></span><a data-dcnode-id="2702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D1" title="Edit section: Barriers to educational success"><span data-dcnode-id="2703" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2697" instrument_node="">
</span><h3 data-dcnode-id="2687"><span class="mw-headline" data-dcnode-id="2695" id="Cultural_differences"><span data-dcnode-id="2696" instrument_node="">Cultural differences</span></span><span class="mw-editsection" data-dcnode-id="2688"><span class="mw-editsection-bracket" data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">[</span></span><a data-dcnode-id="2691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D2" title="Edit section: Cultural differences"><span data-dcnode-id="2692" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2686" instrument_node="">
</span><p data-dcnode-id="2659"><a class="mw-redirect" data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_differences" title="Cultural differences"><span data-dcnode-id="2685" instrument_node="">Cultural differences</span></a><span data-dcnode-id="2683" instrument_node=""> that cause difficulties in </span><a data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_assimilation" title="Cultural assimilation"><span data-dcnode-id="2682" instrument_node="">assimilation</span></a><span data-dcnode-id="2680" instrument_node=""> and also lead to </span><a data-dcnode-id="2678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prejudice" title="Prejudice"><span data-dcnode-id="2679" instrument_node="">prejudice</span></a><span data-dcnode-id="2677" instrument_node=""> and </span><a data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xenophobia" title="Xenophobia"><span data-dcnode-id="2676" instrument_node="">xenophobia</span></a><span data-dcnode-id="2674" instrument_node=""> against migrant families are common deterrents from receiving equal educational opportunities. These prejudices can be formalized by restrictive regulations, or they can be informal but negatively affect the learning atmosphere of a school. Students who don't feel welcome or wanted because of their migrant status are less likely to remain in school.</span><sup class="reference" data-dcnode-id="2671" id="cite_ref-Kindler_2-0"><a data-dcnode-id="2672" href="#cite_note-Kindler-2"><span data-dcnode-id="2673" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="2668" id="cite_ref-Hlatshwayo2014_3-0"><a data-dcnode-id="2669" href="#cite_note-Hlatshwayo2014-3"><span data-dcnode-id="2670" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="2665" id="cite_ref-Goodburn_4-0"><a data-dcnode-id="2666" href="#cite_note-Goodburn-4"><span data-dcnode-id="2667" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2664" instrument_node=""> Additionally, students who struggle with cultural adjustment often fail to form connections and make friends in school, which affects their academic achievement.</span><sup class="reference" data-dcnode-id="2661" id="cite_ref-Martinez_5-0"><a data-dcnode-id="2662" href="#cite_note-Martinez-5"><span data-dcnode-id="2663" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2660" instrument_node="">
</span></p><span data-dcnode-id="2658" instrument_node="">
</span><h3 data-dcnode-id="2648"><span class="mw-headline" data-dcnode-id="2656" id="Language_differences"><span data-dcnode-id="2657" instrument_node="">Language differences</span></span><span class="mw-editsection" data-dcnode-id="2649"><span class="mw-editsection-bracket" data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">[</span></span><a data-dcnode-id="2652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D3" title="Edit section: Language differences"><span data-dcnode-id="2653" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2647" instrument_node="">
</span><p data-dcnode-id="2631"><span data-dcnode-id="2646" instrument_node="">Language differences are another common barrier to educational success. Migrant students that speak a language other than the region's dominant language struggle with basic comprehension and </span><a data-dcnode-id="2644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literacy" title="Literacy"><span data-dcnode-id="2645" instrument_node="">literacy</span></a><span data-dcnode-id="2643" instrument_node="">, which affects success in school.</span><sup class="reference" data-dcnode-id="2640" id="cite_ref-Kindler_2-1"><a data-dcnode-id="2641" href="#cite_note-Kindler-2"><span data-dcnode-id="2642" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="2637" id="cite_ref-Hlatshwayo2014_3-1"><a data-dcnode-id="2638" href="#cite_note-Hlatshwayo2014-3"><span data-dcnode-id="2639" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2636" instrument_node=""> Even students who are fluent in the regions dominant language but face challenges with the written or academic form of the language are often placed in lower-level or special education classes that have the potential to undermine their academic proficiency. Additionally, while a student may have a high level of language acquisition, cultural differences that include short answer responses, unexpected expressions, and mannerisms, can be misunderstood as language deficit. Schools that have contemplated a separate program for second language learning face challenges with limited resources and an insufficient amount of participating students. Language challenges amongst migrant students create a significant barrier given that language deficiency is often tied to alienation and ridicule from peers, and in some cases, academic punishment.</span><sup class="reference" data-dcnode-id="2633" id="cite_ref-6"><a data-dcnode-id="2634" href="#cite_note-6"><span data-dcnode-id="2635" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2632" instrument_node="">
</span></p><span data-dcnode-id="2630" instrument_node="">
</span><h3 data-dcnode-id="2620"><span class="mw-headline" data-dcnode-id="2628" id="Lack_of_information"><span data-dcnode-id="2629" instrument_node="">Lack of information</span></span><span class="mw-editsection" data-dcnode-id="2621"><span class="mw-editsection-bracket" data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">[</span></span><a data-dcnode-id="2624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D4" title="Edit section: Lack of information"><span data-dcnode-id="2625" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2606"><span data-dcnode-id="2618" instrument_node="">Migrant parents are often unaware of their children's </span><a data-dcnode-id="2616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_to_education" title="Right to education"><span data-dcnode-id="2617" instrument_node="">right to education</span></a><span data-dcnode-id="2615" instrument_node=""> or are unfamiliar with the structure of the local public education system. For example, many migrant farmworker parents in the United States do not know they have a right to hold copies of their children's transcripts and school records, which are needed to enroll students in new schools. This makes transferring schools more difficult, taking time away from the student's education.</span><sup class="reference" data-dcnode-id="2612" id="cite_ref-Solis_&quot;Scholastic_Demands&quot;_7-0"><a data-dcnode-id="2613" href="#cite_note-Solis_%22Scholastic_Demands%22-7"><span data-dcnode-id="2614" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2611" instrument_node=""> After moving to a new place, parents must focus their energy on finding work and providing for their families, which often means that they do not have time to explore educational options for their children. Additionally, most migrant parents speak a different language, which also affects their ability to receive information.</span><sup class="reference" data-dcnode-id="2608" id="cite_ref-Hlatshwayo2014_3-2"><a data-dcnode-id="2609" href="#cite_note-Hlatshwayo2014-3"><span data-dcnode-id="2610" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2607" instrument_node="">
</span></p><span data-dcnode-id="2605" instrument_node="">
</span><h3 data-dcnode-id="2595"><span class="mw-headline" data-dcnode-id="2603" id="Psychological_difficulties"><span data-dcnode-id="2604" instrument_node="">Psychological difficulties</span></span><span class="mw-editsection" data-dcnode-id="2596"><span class="mw-editsection-bracket" data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">[</span></span><a data-dcnode-id="2599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D5" title="Edit section: Psychological difficulties"><span data-dcnode-id="2600" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2594" instrument_node="">
</span><p data-dcnode-id="2573"><span data-dcnode-id="2593" instrument_node="">Trauma and other psychological difficulties are common among migrant populations, especially </span><a class="mw-redirect" data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refugees" title="Refugees"><span data-dcnode-id="2592" instrument_node="">refugees</span></a><span data-dcnode-id="2590" instrument_node=""> who are forced into migratory status due to political, social, or religious turmoil at home. Adjustment to a new culture, language, and home is also difficult and can lead to psychological strain on migrant families.</span><sup class="reference" data-dcnode-id="2587" id="cite_ref-Hlatshwayo2014_3-3"><a data-dcnode-id="2588" href="#cite_note-Hlatshwayo2014-3"><span data-dcnode-id="2589" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2586" instrument_node=""> According to a 2008 study conducted by the Universities of Melbourne and Hong Kong, migrant students are more prone to depression and separation anxiety than their non-migrant peers.</span><sup class="reference" data-dcnode-id="2583" id="cite_ref-Wong_8-0"><a data-dcnode-id="2584" href="#cite_note-Wong-8"><span data-dcnode-id="2585" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2582" instrument_node=""> This is apparent in the United States where undocumented students who succeeded in making the difficult journey across the border face psychological difficulties due to fear of being separated from their families through deportation.</span><sup class="reference" data-dcnode-id="2579" id="cite_ref-Waters_9-0"><a data-dcnode-id="2580" href="#cite_note-Waters-9"><span data-dcnode-id="2581" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2578" instrument_node=""> Another factor contributing to increased rates of depression and anxiety among migrant youth is discrimination in school. In the University of Melbourne study, the demographic that faced the most psychological difficulties were migrant teenage boys who had experienced discrimination in school and/or domestic conflict.</span><sup class="reference" data-dcnode-id="2575" id="cite_ref-Wong_8-1"><a data-dcnode-id="2576" href="#cite_note-Wong-8"><span data-dcnode-id="2577" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2574" instrument_node="">
</span></p><span data-dcnode-id="2572" instrument_node="">
</span><h3 data-dcnode-id="2562"><span class="mw-headline" data-dcnode-id="2570" id="Residential_dislocation"><span data-dcnode-id="2571" instrument_node="">Residential dislocation</span></span><span class="mw-editsection" data-dcnode-id="2563"><span class="mw-editsection-bracket" data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">[</span></span><a data-dcnode-id="2566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D6" title="Edit section: Residential dislocation"><span data-dcnode-id="2567" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2561" instrument_node="">
</span><p data-dcnode-id="2551"><span data-dcnode-id="2560" instrument_node="">Many difficulties arise due to the movement of migrant students from one school to another. Children often must adjust to new curricula, testing requirements, and they also must navigate different systems of credit accrual.</span><sup class="reference" data-dcnode-id="2557" id="cite_ref-Baca_10-0"><a data-dcnode-id="2558" href="#cite_note-Baca-10"><span data-dcnode-id="2559" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2556" instrument_node=""> When migrant students move during the middle of a school year, they are often discouraged from enrolling mid-way through a semester, which disrupts education and has lasting psychological effects. Additionally, when students (especially those in migrant farmworker families) anticipate frequent dislocation, they are less likely to enroll in advanced classes that would increase their prospects of attaining a post-secondary education.</span><sup class="reference" data-dcnode-id="2553" id="cite_ref-Solis_&quot;Scholastic_Demands&quot;_7-1"><a data-dcnode-id="2554" href="#cite_note-Solis_%22Scholastic_Demands%22-7"><span data-dcnode-id="2555" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2552" instrument_node="">
</span></p><span data-dcnode-id="2550" instrument_node="">
</span><h3 data-dcnode-id="2540"><span class="mw-headline" data-dcnode-id="2548" id="Living_conditions"><span data-dcnode-id="2549" instrument_node="">Living conditions</span></span><span class="mw-editsection" data-dcnode-id="2541"><span class="mw-editsection-bracket" data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">[</span></span><a data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D7" title="Edit section: Living conditions"><span data-dcnode-id="2545" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2539" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2530"><div class="thumbinner" data-dcnode-id="2531" style="width:222px;"><a class="image" data-dcnode-id="2537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACaravan_Town_-_geograph.org.uk_-_1370356.jpg"><img alt="" class="thumbimage" data-dcnode-id="2538" data-file-height="480" data-file-width="640" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Caravan_Town_-_geograph.org.uk_-_1370356.jpg/220px-Caravan_Town_-_geograph.org.uk_-_1370356.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Caravan_Town_-_geograph.org.uk_-_1370356.jpg/330px-Caravan_Town_-_geograph.org.uk_-_1370356.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Caravan_Town_-_geograph.org.uk_-_1370356.jpg/440px-Caravan_Town_-_geograph.org.uk_-_1370356.jpg 2x" width="220"></a><span data-dcnode-id="2536" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2532"><div class="magnify" data-dcnode-id="2534"><a class="internal" data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACaravan_Town_-_geograph.org.uk_-_1370356.jpg" title="Enlarge"></a></div><span data-dcnode-id="2533" instrument_node="">This large field is filled with mobile homes. Temporary accommodation for many migrant workers working on the acres of orchards of Selling Court Farm.</span></div></div></div><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2511"><span data-dcnode-id="2528" instrument_node="">Migrant and immigrant children are four times as likely to live in substandard, crowded housing conditions than are non-migrant and non-immigrant children.</span><sup class="reference" data-dcnode-id="2525" id="cite_ref-Waters_9-1"><a data-dcnode-id="2526" href="#cite_note-Waters-9"><span data-dcnode-id="2527" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2524" instrument_node=""> Many migrant farmworkers live with a large number of extended family members in migrant camps or temporary housing. This density of people in a small, poorly lit and sparsely furnished space is not conducive to studying. Migrant farmworker camps are located close to agricultural fields and not necessarily within walking distance of the local schools, which poses a problem when reliable transportation is also an issue for some families.</span><sup class="reference" data-dcnode-id="2521" id="cite_ref-Solis_&quot;Scholastic_Demands&quot;_7-2"><a data-dcnode-id="2522" href="#cite_note-Solis_%22Scholastic_Demands%22-7"><span data-dcnode-id="2523" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2520" instrument_node=""> Many living accommodations have minimal cooking appliances or refrigeration, which for many migrant students means more time spent preparing meals than studying.</span><sup class="reference" data-dcnode-id="2517" id="cite_ref-Martinez_5-1"><a data-dcnode-id="2518" href="#cite_note-Martinez-5"><span data-dcnode-id="2519" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2516" instrument_node="">  Some of the migrant worker's accommodations also lack fresh drinking water or sanitation facilities, which increases migrant student's risk of getting sick.</span><sup class="reference" data-dcnode-id="2513" id="cite_ref-Martinez_5-2"><a data-dcnode-id="2514" href="#cite_note-Martinez-5"><span data-dcnode-id="2515" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2512" instrument_node="">
</span></p><span data-dcnode-id="2510" instrument_node="">
</span><h3 data-dcnode-id="2500"><span class="mw-headline" data-dcnode-id="2508" id="Cost"><span data-dcnode-id="2509" instrument_node="">Cost</span></span><span class="mw-editsection" data-dcnode-id="2501"><span class="mw-editsection-bracket" data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">[</span></span><a data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D8" title="Edit section: Cost"><span data-dcnode-id="2505" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2499" instrument_node="">
</span><p data-dcnode-id="2484"><span data-dcnode-id="2498" instrument_node="">The cost of schooling can also prevent equal access to education. Migrant families, especially migrant farm-working families, have low </span><a data-dcnode-id="2496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socioeconomic_status" title="Socioeconomic status"><span data-dcnode-id="2497" instrument_node="">socioeconomic status</span></a><span data-dcnode-id="2495" instrument_node=""> and can't afford to pay extra fees on schooling. Even in countries where there are no extra fees for migrant students, there is often an economic disincentive to sending a child to school when they could be working to supplement their parents' incomes.</span><sup class="reference" data-dcnode-id="2492" id="cite_ref-Kindler_2-2"><a data-dcnode-id="2493" href="#cite_note-Kindler-2"><span data-dcnode-id="2494" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="2489" id="cite_ref-Hlatshwayo2014_3-4"><a data-dcnode-id="2490" href="#cite_note-Hlatshwayo2014-3"><span data-dcnode-id="2491" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="2486" id="cite_ref-Goodburn_4-1"><a data-dcnode-id="2487" href="#cite_note-Goodburn-4"><span data-dcnode-id="2488" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2485" instrument_node="">
</span></p><span data-dcnode-id="2483" instrument_node="">
</span><h2 data-dcnode-id="2473"><span class="mw-headline" data-dcnode-id="2481" id="In_the_United_States"><span data-dcnode-id="2482" instrument_node="">In the United States</span></span><span class="mw-editsection" data-dcnode-id="2474"><span class="mw-editsection-bracket" data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">[</span></span><a data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D9" title="Edit section: In the United States"><span data-dcnode-id="2478" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2472" instrument_node="">
</span><h3 data-dcnode-id="2462"><span class="mw-headline" data-dcnode-id="2470" id="Demographics"><span data-dcnode-id="2471" instrument_node="">Demographics</span></span><span class="mw-editsection" data-dcnode-id="2463"><span class="mw-editsection-bracket" data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">[</span></span><a data-dcnode-id="2466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D10" title="Edit section: Demographics"><span data-dcnode-id="2467" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2461" instrument_node="">
</span><p data-dcnode-id="2449"><span data-dcnode-id="2460" instrument_node="">The exact demographics of migrant students in the United States are difficult to calculate because they move across state and national borders, have different levels of citizenship status, and have limited English proficiency, complicating survey and census data.</span><sup class="reference" data-dcnode-id="2457" id="cite_ref-Kindler_2-3"><a data-dcnode-id="2458" href="#cite_note-Kindler-2"><span data-dcnode-id="2459" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="2454" id="cite_ref-Farmworker_Factsheet_11-0"><a data-dcnode-id="2455" href="#cite_note-Farmworker_Factsheet-11"><span data-dcnode-id="2456" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2453" instrument_node=""> However, in 2002, the </span><a class="mw-redirect" data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/US_Department_of_Education" title="US Department of Education"><span data-dcnode-id="2452" instrument_node="">US Department of Education</span></a><span data-dcnode-id="2450" instrument_node="">, estimated that there are 783,867 migrant children who meet the federal definition of "migrant" as set forth in the eligibility requirements for government support (see Government programs below). This refers to children who have moved school districts within the last 3 years due to agricultural work or work in related industries.
</span></p><span data-dcnode-id="2448" instrument_node="">
</span><h4 data-dcnode-id="2438"><span class="mw-headline" data-dcnode-id="2446" id="Race"><span data-dcnode-id="2447" instrument_node="">Race</span></span><span class="mw-editsection" data-dcnode-id="2439"><span class="mw-editsection-bracket" data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">[</span></span><a data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D11" title="Edit section: Race"><span data-dcnode-id="2443" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2437" instrument_node="">
</span><p data-dcnode-id="2431"><span data-dcnode-id="2436" instrument_node="">The racial breakdown of these migrant students is 86% Hispanic, 8% White, and less than 3% Black, American Indian/Alaskan Native, and Asian/Pacific Islander.</span><sup class="reference" data-dcnode-id="2433" id="cite_ref-Branz-Spall_1-1"><a data-dcnode-id="2434" href="#cite_note-Branz-Spall-1"><span data-dcnode-id="2435" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2432" instrument_node="">
</span></p><span data-dcnode-id="2430" instrument_node="">
</span><h4 data-dcnode-id="2420"><span class="mw-headline" data-dcnode-id="2428" id="Language"><span data-dcnode-id="2429" instrument_node="">Language</span></span><span class="mw-editsection" data-dcnode-id="2421"><span class="mw-editsection-bracket" data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">[</span></span><a data-dcnode-id="2424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D12" title="Edit section: Language"><span data-dcnode-id="2425" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2419" instrument_node="">
</span><p data-dcnode-id="2413"><span data-dcnode-id="2418" instrument_node="">84% of these students speak little to no English, and about 90% speak a language other than English in their homes. The states with the highest level of students with limited English proficiency are Arizona (with 51% LEP migrant students) and Texas (with 37% LEP migrant students).</span><sup class="reference" data-dcnode-id="2415" id="cite_ref-Kindler_2-4"><a data-dcnode-id="2416" href="#cite_note-Kindler-2"><span data-dcnode-id="2417" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2414" instrument_node="">

</span><h3 data-dcnode-id="2155"><span class="mw-headline" data-dcnode-id="2163" id="Legislation_and_policy"><span data-dcnode-id="2164" instrument_node="">Legislation and policy</span></span><span class="mw-editsection" data-dcnode-id="2156"><span class="mw-editsection-bracket" data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">[</span></span><a data-dcnode-id="2159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D15" title="Edit section: Legislation and policy"><span data-dcnode-id="2160" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2139"><span data-dcnode-id="2153" instrument_node="">Starting in the 1960s, the United States' government has passed a series of legislation intended to improve the lives of migrant and immigrant students. In 1968, the </span><a data-dcnode-id="2151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bilingual_Education_Act" title="Bilingual Education Act"><span data-dcnode-id="2152" instrument_node="">Bilingual Education Act</span></a><span data-dcnode-id="2150" instrument_node=""> allocated funding to individual school districts for the creation of bilingual education programs. As part of the </span><a class="mw-redirect" data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equal_Educational_Opportunity_Act" title="Equal Educational Opportunity Act"><span data-dcnode-id="2149" instrument_node="">Equal Educational Opportunity Act</span></a><span data-dcnode-id="2147" instrument_node=""> (EEOA) of 1974, the federal government required schools to recognize the language barriers in migrant communities and offer support for non-English speaking students.</span><sup class="reference" data-dcnode-id="2144" id="cite_ref-Pappamihiel_14-0"><a data-dcnode-id="2145" href="#cite_note-Pappamihiel-14"><span data-dcnode-id="2146" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2143" instrument_node=""> The </span><a data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/No_Child_Left_Behind_Act" title="No Child Left Behind Act"><span data-dcnode-id="2142" instrument_node="">No Child Left Behind Act</span></a><span data-dcnode-id="2140" instrument_node="">, however, created new testing requirements that make it difficult for migrant students who might transfer school districts before taking a required test, negatively affecting their ability to progress in school.
</span></p><span data-dcnode-id="2138" instrument_node="">
</span><h3 data-dcnode-id="2128"><span class="mw-headline" data-dcnode-id="2136" id="Government_programs"><span data-dcnode-id="2137" instrument_node="">Government programs</span></span><span class="mw-editsection" data-dcnode-id="2129"><span class="mw-editsection-bracket" data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">[</span></span><a data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D16" title="Edit section: Government programs"><span data-dcnode-id="2133" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2127" instrument_node="">
</span><h4 data-dcnode-id="2117"><span class="mw-headline" data-dcnode-id="2125" id="Migrant_Education_Program"><span data-dcnode-id="2126" instrument_node="">Migrant Education Program</span></span><span class="mw-editsection" data-dcnode-id="2118"><span class="mw-editsection-bracket" data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">[</span></span><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D17" title="Edit section: Migrant Education Program"><span data-dcnode-id="2122" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2090"><span data-dcnode-id="2115" instrument_node="">In 1965, as part of President Lyndon B. Johnson's "</span><a class="mw-redirect" data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_on_Poverty" title="War on Poverty"><span data-dcnode-id="2114" instrument_node="">War on Poverty</span></a><span data-dcnode-id="2112" instrument_node="">", Title I of the 1965 </span><a data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elementary_and_Secondary_Education_Act" title="Elementary and Secondary Education Act"><span data-dcnode-id="2111" instrument_node="">Elementary and Secondary Education Act</span></a><span data-dcnode-id="2109" instrument_node=""> (ESEA) was framed to help support economically disadvantaged students within the United States. However, this act failed to address the specific non-economic barriers faced by migrant workers and their families so it was amended in 1966 to include the Migrant Education Program (MEP).</span><sup class="reference" data-dcnode-id="2106" id="cite_ref-Branz-Spall_1-2"><a data-dcnode-id="2107" href="#cite_note-Branz-Spall-1"><span data-dcnode-id="2108" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2105" instrument_node=""> MEP provides support for children of migrant workers through educational services such as extended school days, summer programs, </span><a class="mw-redirect" data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ESL" title="ESL"><span data-dcnode-id="2104" instrument_node="">ESL</span></a><span data-dcnode-id="2102" instrument_node=""> classes, etc. Eligibility requirements are solely based on the mobility of children and not on their economic or cultural struggles as migrants. This was because Title I already focuses on economically  disadvantaged children, so it was assumed that children who qualify for MEP would be receiving benefits from those pre-existing anti-poverty programs. To be included in the Migrant Education Program, children must have had moved school districts for temporary or seasonal agricultural work within the past 3 years.</span><sup class="reference" data-dcnode-id="2099" id="cite_ref-Branz-Spall_1-3"><a data-dcnode-id="2100" href="#cite_note-Branz-Spall-1"><span data-dcnode-id="2101" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2098" instrument_node=""> The definition of who qualifies has changed several times since 1966. In 1974, the MEP expanded in scope by including migratory fishing, meat-packing, and other agriculture-related jobs into the categories of eligibility. This was also the year that the period of eligibility was increased from 3 years to 6 years after relocating school districts; however, in 1994 with the passage of the </span><a class="mw-redirect" data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Improving_America%2527s_Schools_Act" title="Improving America's Schools Act"><span data-dcnode-id="2097" instrument_node="">Improving America's Schools Act</span></a><span data-dcnode-id="2095" instrument_node="">, it was returned to 3 years. In 1994, the definition of who qualified for MEP was further limited to those children who moved school districts for agriculture-related work that represented their family's "principle means of livelihood."</span><sup class="reference" data-dcnode-id="2092" id="cite_ref-Branz-Spall_1-4"><a data-dcnode-id="2093" href="#cite_note-Branz-Spall-1"><span data-dcnode-id="2094" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2091" instrument_node="">
</span></p><p data-dcnode-id="2069"><span data-dcnode-id="2089" instrument_node="">In 2001, the </span><a data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/No_Child_Left_Behind_Act" title="No Child Left Behind Act"><span data-dcnode-id="2088" instrument_node="">No Child Left Behind Act</span></a><span data-dcnode-id="2086" instrument_node=""> re-authorized MEP and mandated that the federal funding is focused on the "neediest students" with the "highest risk of academic failure".</span><sup class="reference" data-dcnode-id="2083" id="cite_ref-Kindler_2-6"><a data-dcnode-id="2084" href="#cite_note-Kindler-2"><span data-dcnode-id="2085" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2082" instrument_node=""> Although NCLB re-authorized MEP, the main goals of the program reflect what was already laid out in the 1960s. These goals include supporting educational programs to address educational disruptions, protecting migrant children from being penalized for the differences between State curriculums and graduation requirements, designing assistance programs to address the special needs of migrant children.</span><sup class="reference" data-dcnode-id="2079" id="cite_ref-USDeptEd_15-0"><a data-dcnode-id="2080" href="#cite_note-USDeptEd-15"><span data-dcnode-id="2081" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2078" instrument_node=""> The Migrant Education Program also facilitates coordination of educational services between states.</span><sup class="reference" data-dcnode-id="2075" id="cite_ref-Kindler_2-7"><a data-dcnode-id="2076" href="#cite_note-Kindler-2"><span data-dcnode-id="2077" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2074" instrument_node=""> The Migrant Student Record Transfer System (MSRTS) and the New Generation System (NGS) collect students' records and mails them between school districts, which helps provide continuity in education for students who move across state lines.</span><sup class="reference" data-dcnode-id="2071" id="cite_ref-Branz-Spall_1-5"><a data-dcnode-id="2072" href="#cite_note-Branz-Spall-1"><span data-dcnode-id="2073" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2070" instrument_node="">
</span></p><p data-dcnode-id="2063"><span data-dcnode-id="2068" instrument_node="">The primary criticism of the EDEA's Migrant Education Program is its constantly evolving definition of "migrant student", which makes counting the number of migrants and analyzing statistics difficult. Second, not all migrants are treated equally by the EDEA: former migrant families that have permanently settled down are not included in the definition of "migrant" so they aren't eligible for the benefits of MEP despite still being at a disadvantage. Third, the MEP doesn't resolve the problem of students moving schools across state lines, learning different curriculums, and then struggling with state-specific standardized tests.</span><sup class="reference" data-dcnode-id="2065" id="cite_ref-Papamihiel_16-0"><a data-dcnode-id="2066" href="#cite_note-Papamihiel-16"><span data-dcnode-id="2067" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2064" instrument_node="">
</span></p><span data-dcnode-id="2062" instrument_node="">
</span><h4 data-dcnode-id="2052"><span class="mw-headline" data-dcnode-id="2060" id="High_School_Equivalency_Program"><span data-dcnode-id="2061" instrument_node="">High School Equivalency Program</span></span><span class="mw-editsection" data-dcnode-id="2053"><span class="mw-editsection-bracket" data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">[</span></span><a data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D18" title="Edit section: High School Equivalency Program"><span data-dcnode-id="2057" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2050" instrument_node="">The High School Equivalency Program (HEP) is designed to assist migratory and seasonal farm workers to obtain the equivalent to a high school diploma, to find additional skill training or post-secondary schooling, or to find employment. Each year, it serves at least 7,000 students who qualify for the program by being 16 years of age or older and not currently enrolled in school.</span><sup class="reference" data-dcnode-id="2047" id="cite_ref-HEP_17-0"><a data-dcnode-id="2048" href="#cite_note-HEP-17"><span data-dcnode-id="2049" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2046" instrument_node=""> The HEP is tailored to the needs of migrant workers by being flexible and allowing students to attend classes based on their own convenience. Additionally, the HEP provides free transportation, and all of its staff members are bilingual.</span><sup class="reference" data-dcnode-id="2043" id="cite_ref-Veldzquez_18-0"><a data-dcnode-id="2044" href="#cite_note-Veldzquez-18"><span data-dcnode-id="2045" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2042" instrument_node="">
</span></p><span data-dcnode-id="2040" instrument_node="">
</span><h4 data-dcnode-id="2030"><span class="mw-headline" data-dcnode-id="2038" id="College_Assistance_Migrant_Program"><span data-dcnode-id="2039" instrument_node="">College Assistance Migrant Program</span></span><span class="mw-editsection" data-dcnode-id="2031"><span class="mw-editsection-bracket" data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">[</span></span><a data-dcnode-id="2034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D19" title="Edit section: College Assistance Migrant Program"><span data-dcnode-id="2035" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2029" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2028" instrument_node="">The College Assistance Migrant Program (CAMP) is the only national support program aimed at supporting migrant students through the college experience. CAMP was originally created through the U.S. </span><a data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Office_of_Economic_Opportunity" title="Office of Economic Opportunity"><span data-dcnode-id="2027" instrument_node="">Office of Economic Opportunity</span></a><span data-dcnode-id="2025" instrument_node=""> program of 1972 before being shifted to the </span><a class="mw-redirect" data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Department_of_Labor" title="U.S. Department of Labor"><span data-dcnode-id="2024" instrument_node="">U.S. Department of Labor</span></a><span data-dcnode-id="2022" instrument_node=""> the following year and to the </span><a class="mw-redirect" data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Department_of_Education" title="U.S. Department of Education"><span data-dcnode-id="2021" instrument_node="">U.S. Department of Education</span></a><span data-dcnode-id="2019" instrument_node=""> in 1980. CAMP is funded through discretionary grants that are granted to different non-profit organizations and institutions of </span><a data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Higher_education" title="Higher education"><span data-dcnode-id="2018" instrument_node="">higher education</span></a><span data-dcnode-id="2016" instrument_node="">. These grants are awarded so that different institutions can provide financial aid, career counseling, tutoring, summer enrichment programs, etc. for migrant students.</span><sup class="reference" data-dcnode-id="2013" id="cite_ref-ReferenceA_19-0"><a data-dcnode-id="2014" href="#cite_note-ReferenceA-19"><span data-dcnode-id="2015" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2012" instrument_node=""> One of the criticisms of CAMP is that there are not enough spaces available for every eligible student who applies for support. Right now, CAMP only supports roughly 2000 college students per year.</span><sup class="reference" data-dcnode-id="2009" id="cite_ref-CAMP_20-0"><a data-dcnode-id="2010" href="#cite_note-CAMP-20"><span data-dcnode-id="2011" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2008" instrument_node=""> Furthermore, due to an increase in undergraduate tuition rates, the number of students supported by CAMP has decreased.</span><sup class="reference" data-dcnode-id="2005" id="cite_ref-ReferenceA_19-1"><a data-dcnode-id="2006" href="#cite_note-ReferenceA-19"><span data-dcnode-id="2007" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2004" instrument_node="">
</span></p><span data-dcnode-id="2002" instrument_node="">
</span><h4 data-dcnode-id="1992"><span class="mw-headline" data-dcnode-id="2000" id="Migrant_Education_Even_Start"><span data-dcnode-id="2001" instrument_node="">Migrant Education Even Start</span></span><span class="mw-editsection" data-dcnode-id="1993"><span class="mw-editsection-bracket" data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">[</span></span><a data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D20" title="Edit section: Migrant Education Even Start"><span data-dcnode-id="1997" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1975"><span data-dcnode-id="1990" instrument_node="">The Migrant Education Even Start Program is focused on improving the </span><a data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literacy" title="Literacy"><span data-dcnode-id="1989" instrument_node="">literacy</span></a><span data-dcnode-id="1987" instrument_node=""> of migrant children and adults by supporting existing family literacy projects that operate through the government, universities, private organizations, etc.</span><sup class="reference" data-dcnode-id="1984" id="cite_ref-MEES_21-0"><a data-dcnode-id="1985" href="#cite_note-MEES-21"><span data-dcnode-id="1986" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1983" instrument_node=""> The Even Start program is focused on increasing children's and families' </span><a class="mw-redirect" data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capabilities_approach" title="Capabilities approach"><span data-dcnode-id="1982" instrument_node="">capabilities</span></a><span data-dcnode-id="1980" instrument_node=""> by using migrant families' existing resources, cultural traditions, and networks to jumpstart their success. The instructional services included in this program include Adult Basic Education, Adult Secondary Education, English as a Second Language, and GED certification. The downside to the Even Start program is that many adults are not able to complete their education due to time constraints and lack of childcare.</span><sup class="reference" data-dcnode-id="1977" id="cite_ref-Ward_22-0"><a data-dcnode-id="1978" href="#cite_note-Ward-22"><span data-dcnode-id="1979" instrument_node="">[22]</span></a></sup><span data-dcnode-id="1976" instrument_node="">
</span></p><span data-dcnode-id="1974" instrument_node="">
</span><h3 data-dcnode-id="1964"><span class="mw-headline" data-dcnode-id="1972" id="Nonprofit_assistance"><span data-dcnode-id="1973" instrument_node="">Nonprofit assistance</span></span><span class="mw-editsection" data-dcnode-id="1965"><span class="mw-editsection-bracket" data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">[</span></span><a data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D21" title="Edit section: Nonprofit assistance"><span data-dcnode-id="1969" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1957"><span data-dcnode-id="1962" instrument_node="">In addition to government programs, many non-profit organizations work to help migrant workers and their children achieve educational success. Many programs focus on assisting migrant workers to secure work and decent living conditions, while other programs focus on education. Non-profit organizations offer different types of educational services for migrant workers and their children. Some work with migrants to upgrade or teach technical skills that would be helpful for finding employment. Other organizations aim to educate migrants on workplace rights, so that they are knowledgeable on how to handle workplace abuse, which is common among undocumented migrant workers.</span><sup class="reference" data-dcnode-id="1959" id="cite_ref-Martin_23-0"><a data-dcnode-id="1960" href="#cite_note-Martin-23"><span data-dcnode-id="1961" instrument_node="">[23]</span></a></sup><span data-dcnode-id="1958" instrument_node="">
</span></p><p data-dcnode-id="1937"><span data-dcnode-id="1956" instrument_node="">The most widely utilized form of non-profit assistance is </span><a class="mw-redirect" data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/English_as_a_Second_Language" title="English as a Second Language"><span data-dcnode-id="1955" instrument_node="">English as a Second Language</span></a><span data-dcnode-id="1953" instrument_node=""> (ESL) education. Of the 20% of crop workers that have taken at least one adult education class, 10% took English language classes.</span><sup class="reference" data-dcnode-id="1950" id="cite_ref-US_Dept_of_Labor_24-0"><a data-dcnode-id="1951" href="#cite_note-US_Dept_of_Labor-24"><span data-dcnode-id="1952" instrument_node="">[24]</span></a></sup><span data-dcnode-id="1949" instrument_node=""> After English language education, many non-profits offer </span><a class="mw-redirect" data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GED" title="GED"><span data-dcnode-id="1948" instrument_node="">GED</span></a><span data-dcnode-id="1946" instrument_node=""> education and tutoring because passing the GED can increase educational and occupational opportunities.</span><sup class="reference" data-dcnode-id="1943" id="cite_ref-Grogger_25-0"><a data-dcnode-id="1944" href="#cite_note-Grogger-25"><span data-dcnode-id="1945" instrument_node="">[25]</span></a></sup><span data-dcnode-id="1942" instrument_node=""> Organizations such as Project Avanzando in California provide GED instruction, and services to help students transition into college.</span><sup class="reference" data-dcnode-id="1939" id="cite_ref-Jasis_26-0"><a data-dcnode-id="1940" href="#cite_note-Jasis-26"><span data-dcnode-id="1941" instrument_node="">[26]</span></a></sup><span data-dcnode-id="1938" instrument_node="">
</span></p><p data-dcnode-id="1927"><span data-dcnode-id="1936" instrument_node="">For adult learners, participating in these programs can be difficult due to lack of transportation, childcare, confidence, or flexibility in work schedule.</span><sup class="reference" data-dcnode-id="1933" id="cite_ref-Jasis_26-1"><a data-dcnode-id="1934" href="#cite_note-Jasis-26"><span data-dcnode-id="1935" instrument_node="">[26]</span></a></sup><span data-dcnode-id="1932" instrument_node=""> Chances of attending adult education classes are higher for crop workers with the most previous educational experiences as well as for authorized workers. Unauthorized workers have a 10% chance of participating in classes versus the 32% chance of authorized workers.</span><sup class="reference" data-dcnode-id="1929" id="cite_ref-US_Dept_of_Labor_24-1"><a data-dcnode-id="1930" href="#cite_note-US_Dept_of_Labor-24"><span data-dcnode-id="1931" instrument_node="">[24]</span></a></sup><span data-dcnode-id="1928" instrument_node="">
</span></p><span data-dcnode-id="1926" instrument_node="">
</span><h3 data-dcnode-id="1916"><span class="mw-headline" data-dcnode-id="1924" id="Internationals_Network_for_Public_Schools"><span data-dcnode-id="1925" instrument_node="">Internationals Network for Public Schools</span></span><span class="mw-editsection" data-dcnode-id="1917"><span class="mw-editsection-bracket" data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">[</span></span><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D22" title="Edit section: Internationals Network for Public Schools"><span data-dcnode-id="1921" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1914" instrument_node="">The Internationals Network for Public Schools is a non-profit supporting public school in providing tailored curriculum for refugee students. In this network of over 30 schools spanning the United States, we see specialized learning environments that are designed for multilingual students. These schools emerged from the basement of a New York community college. Immediately popular and meeting a felt need, it inspired countless other schools in the area. At first, these programs were “funded through a Title VII grant as well as the Annenberg Challenge: New York Networks for School Renewal,”</span><sup class="reference" data-dcnode-id="1911" id="cite_ref-:0_27-0"><a data-dcnode-id="1912" href="#cite_note-:0-27"><span data-dcnode-id="1913" instrument_node="">[27]</span></a></sup><span data-dcnode-id="1910" instrument_node=""> but eventually, as the demand grew greater and these programs gained public attention, it gained funding from the Bill and Melinda Gates Foundation in 2004 and became a nonprofit network integrated into public school districts across the country. This nonprofit network, “does not function as a regulatory body, but rather as a support system that provides essential services to the schools—including professional development, mentorship, and research—and serves as the engine of new school growth”.</span><sup class="reference" data-dcnode-id="1907" id="cite_ref-:0_27-1"><a data-dcnode-id="1908" href="#cite_note-:0-27"><span data-dcnode-id="1909" instrument_node="">[27]</span></a></sup><span data-dcnode-id="1906" instrument_node=""> While this network is a separate entity from the schools themselves, these schools are still categorized as public schools which is why they face scrutiny from more traditional educators for their alternative teaching methods. 
</span></p><p data-dcnode-id="1895"><span data-dcnode-id="1904" instrument_node="">This institution of schools integrates a variety of innovative teaching practices in hopes of providing a more equitable education for migrant students. One major educational strategy these schools utilize is deeper learning.</span><sup class="reference" data-dcnode-id="1901" id="cite_ref-:1_28-0"><a data-dcnode-id="1902" href="#cite_note-:1-28"><span data-dcnode-id="1903" instrument_node="">[28]</span></a></sup><span data-dcnode-id="1900" instrument_node=""> Deeper learning goes beyond traditional practices such as lectures, basic homework assignments, and just exams. It is built more on collaborative learning, breaking down and talking through the process, and using the information in a real-world application to ensure these students fully grasp the material being taught.</span><sup class="reference" data-dcnode-id="1897" id="cite_ref-:1_28-1"><a data-dcnode-id="1898" href="#cite_note-:1-28"><span data-dcnode-id="1899" instrument_node="">[28]</span></a></sup><span data-dcnode-id="1896" instrument_node=""> This practice also better prepares students of marginalized backgrounds for the realities of the world and ensures they can thrive in the real-world economy.
</span></p><p data-dcnode-id="1889"><span data-dcnode-id="1894" instrument_node="">This strategy is critical for the education of English Language Learners as it is difficult to navigate the academic language with just a conversational understanding.</span><sup class="reference" data-dcnode-id="1891" id="cite_ref-29"><a data-dcnode-id="1892" href="#cite_note-29"><span data-dcnode-id="1893" instrument_node="">[29]</span></a></sup><span data-dcnode-id="1890" instrument_node=""> Language of instruction and emotional learning are highlighted. Students learn new languages while at the same time using their home language in school as they adapt. These hands-on educational practices are paired with emotional and career support with counselors and welfare workers to address the significant turmoil these students have experienced.
</span></p><span data-dcnode-id="1888" instrument_node="">
</span><h3 data-dcnode-id="1878"><span class="mw-headline" data-dcnode-id="1886" id="Specialized_School_Programs"><span data-dcnode-id="1887" instrument_node="">Specialized School Programs</span></span><span class="mw-editsection" data-dcnode-id="1879"><span class="mw-editsection-bracket" data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">[</span></span><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D23" title="Edit section: Specialized School Programs"><span data-dcnode-id="1883" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1871"><span data-dcnode-id="1876" instrument_node="">Currently there are specialized high school programs that are tailored for individuals of migrant background. This includes the NYC international school program and Oakland International High School to name a few. These programs are tailored for individuals of these backgrounds in order to provide them with a structure that fits their needs. This includes more hands on english education, counseling, and special methods that highly differ from traditional schools in the United States. Within these programs, students are significantly more successful in life since they are able to improve academically. </span><sup class="reference" data-dcnode-id="1873" id="cite_ref-30"><a data-dcnode-id="1874" href="#cite_note-30"><span data-dcnode-id="1875" instrument_node="">[30]</span></a></sup><span data-dcnode-id="1872" instrument_node="">
</span></p><span data-dcnode-id="1870" instrument_node="">
</span><h3 data-dcnode-id="1860"><span class="mw-headline" data-dcnode-id="1868" id="Educational_success"><span data-dcnode-id="1869" instrument_node="">Educational success</span></span><span class="mw-editsection" data-dcnode-id="1861"><span class="mw-editsection-bracket" data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">[</span></span><a data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMigrant_education%26action%3Dedit%26section%3D24" title="Edit section: Educational success"><span data-dcnode-id="1865" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1842"><span data-dcnode-id="1858" instrument_node="">The educational </span><a class="mw-redirect" data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achievement_gap" title="Achievement gap"><span data-dcnode-id="1857" instrument_node="">achievement gap</span></a><span data-dcnode-id="1855" instrument_node=""> between migrant children and non-migrant children is prevalent across the United States. Migrant students generally have lower standardized test scores than the district or state-wide average.</span><sup class="reference" data-dcnode-id="1852" id="cite_ref-Resources_31-0"><a data-dcnode-id="1853" href="#cite_note-Resources-31"><span data-dcnode-id="1854" instrument_node="">[31]</span></a></sup><span data-dcnode-id="1851" instrument_node="">
In addition to inequality in test scores, there is a persistent graduation gap between migrant and non-migrant students. The national drop-out rate among migrant farmworker students is 50%.</span><sup class="reference" data-dcnode-id="1848" id="cite_ref-USDeptEd_15-1"><a data-dcnode-id="1849" href="#cite_note-USDeptEd-15"><span data-dcnode-id="1850" instrument_node="">[15]</span></a></sup><span data-dcnode-id="1847" instrument_node=""> In the population of Hispanic immigrants, graduation completion rates correlate to the age in which the student migrated to the United States. The earlier a student immigrates to the United States, the higher their chances are at completing high school.</span><sup class="reference" data-dcnode-id="1844" id="cite_ref-Grogger_25-1"><a data-dcnode-id="1845" href="#cite_note-Grogger-25"><span data-dcnode-id="1846" instrument_node="">[25]</span></a></sup><span data-dcnode-id="1843" instrument_node="">
</span></p><span data-dcnode-id="1841" instrument_node="">
</span><span data-dcnode-id="1840" instrument_node="">
</span><span data-dcnode-id="1839" instrument_node="">
</span><span data-dcnode-id="1836" instrument_node="">
</span><span data-dcnode-id="1828" instrument_node="">
</span><span data-dcnode-id="1827" instrument_node="">
</span><span data-dcnode-id="1824" instrument_node="">
</span><span data-dcnode-id="1820" instrument_node="">
</span><span data-dcnode-id="1819" instrument_node="">
</span><span data-dcnode-id="1816" instrument_node="">

</span><table class="wikitable" data-dcnode-id="1803"><tbody data-dcnode-id="1804"><tr data-dcnode-id="1829"><th data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Age when immigrated to US from Mexico</span></th><th data-dcnode-id="1830"><span data-dcnode-id="1835" instrument_node="">Graduation rate</span><sup class="reference" data-dcnode-id="1832" id="cite_ref-Grogger_25-2"><a data-dcnode-id="1833" href="#cite_note-Grogger-25"><span data-dcnode-id="1834" instrument_node="">[25]</span></a></sup><span data-dcnode-id="1831" instrument_node="">
</span></th></tr><tr data-dcnode-id="1821"><td data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">15 – 21 years</span></td><td data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">28%
