n-top" data-dcnode-id="3651"><td class="align-left" data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">Observations</span></td><td class="align-left" data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">1307</span></td><td data-dcnode-id="3652"></td></tr></tbody></table></div><p class="legend" data-dcnode-id="3645"></p><p data-dcnode-id="3646" id="sp0045"><span data-dcnode-id="3647" instrument_node="">Note: Sample in this table only includes students whose parents came to Shanghai before 2008. ***, **, and * stand for statistical significance at the 1%, 5% and 10% level, respectively.</span></p><p></p></div></div><p data-dcnode-id="3635" id="p0155"><span data-dcnode-id="3642" instrument_node="">For the purpose of identification, </span><a class="workspace-trigger" data-dcnode-id="3640" href="#t0020" name="bt0020"><span data-dcnode-id="3641" instrument_node="">Table&nbsp;4</span></a><span data-dcnode-id="3639" instrument_node=""> shows that whether parents lived in a central or peripheral district is conditionally “as if” random. Once we control for father's occupation and province of origin, we don't find parents who lived in a central or peripheral district to differ in terms of parental education, parental expectation on children's eventual educational attainment and family income, and whether parents think study is important for children's future or not. Therefore, it is reasonable to assume that conditional on father's occupation and province of origin and living places in 2008 are orthogonal to the error term in Eq.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="3637" href="#fo0005" name="bfo0005"><span data-dcnode-id="3638" instrument_node="">(1)</span></a><span data-dcnode-id="3636" instrument_node=""> which consists of other unobserved factors that also affect students' test scores.</span></p></section><section data-dcnode-id="3090" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3628" id="st0060"><span data-dcnode-id="3633" instrument_node="">4.3</span><span data-dcnode-id="3631" instrument_node="">. </span><span data-dcnode-id="3629" instrument_node="">The test score gaps between migrant children in public and migrant schools</span></h3><div data-dcnode-id="3113"><p data-dcnode-id="3617" id="p0160"><span data-dcnode-id="3627" instrument_node="">We then estimate Eq.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="3625" href="#fo0005" name="bfo0005"><span data-dcnode-id="3626" instrument_node="">(1)</span></a><span data-dcnode-id="3624" instrument_node=""> to evaluate how migrant students' academic performances differ in the two school types. After controlling for gender, age, single child, rural </span><em data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">HuKou</span></em><span data-dcnode-id="3621" instrument_node="">, kindergarten, time spent on homework, years since parents first migrated, parental education and family income, as well as provinces of origin and fathers' occupation, we find that the standard test scores of students in migrant schools are significantly lower than migrant students in public schools. As </span><a class="workspace-trigger" data-dcnode-id="3619" href="#t0025" name="bt0025"><span data-dcnode-id="3620" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="3618" instrument_node=""> shows, based on the OLS regression results, test score gaps between migrant and public schools are 7.6 points in Chinese and 12.1 points in Mathematics. Using instrument variables approach to adjust for possible bias resulting from nonrandom selection into different types of schools, we find slightly lower but still highly significant differences in test scores attributing to different school types. In terms of Chinese, a migrant student in a migrant school would score 5.4 points, or 0.4 standard deviation, lower than an identical student in a public school. The corresponding score gap in Mathematics is 8 points, or over half of a standard deviation. We can safely reject the weak IV hypothesis based on a Wald F-statistics of 67.45. On the other hand, based on the Hansen's J-statistic, we are not able to reject the (joint) exogeneity assumption for the instrumental variables.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="3114" id="t0025"><span class="captions" data-dcnode-id="3609"><span data-dcnode-id="3610" id="ca0025"><p data-dcnode-id="3611" id="sp0050"><span class="label" data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">Table&nbsp;5</span></span><span data-dcnode-id="3614" instrument_node="">. </span><span data-dcnode-id="3612" instrument_node="">Regression results on the standardized test scores of migrant students.</span></p></span></span><div class="groups" data-dcnode-id="3118"><table data-dcnode-id="3119"><thead data-dcnode-id="3591"><tr class="valign-top rowsep-1" data-dcnode-id="3603"><th data-dcnode-id="3608" scope="col"></th><th class="align-left" colspan="2" data-dcnode-id="3606" scope="col"><span data-dcnode-id="3607" instrument_node="">Chinese</span></th><th class="align-left" colspan="2" data-dcnode-id="3604" scope="col"><span data-dcnode-id="3605" instrument_node="">Mathematics</span></th></tr><tr class="valign-top rowsep-1" data-dcnode-id="3592"><th class="align-left" data-dcnode-id="3601" scope="col"><span data-dcnode-id="3602" instrument_node="">Variables</span></th><th class="align-left" data-dcnode-id="3599" scope="col"><span data-dcnode-id="3600" instrument_node="">OLS</span></th><th class="align-left" data-dcnode-id="3597" scope="col"><span data-dcnode-id="3598" instrument_node="">IV</span></th><th class="align-left" data-dcnode-id="3595" scope="col"><span data-dcnode-id="3596" instrument_node="">OLS</span></th><th class="align-left" data-dcnode-id="3593" scope="col"><span data-dcnode-id="3594" instrument_node="">IV</span></th></tr></thead><tbody data-dcnode-id="3120"><tr class="valign-top >0.181</span></td><td class="align-left" data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">0.174</span></td></tr><tr class="valign-top" data-dcnode-id="3139"><td class="align-left" data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">Wald F statistics for weak IV</span></td><td data-dcnode-id="3145"></td><td class="align-left" data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">67.45</span></td><td data-dcnode-id="3142"></td><td class="align-left" data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">67.45</span></td></tr><tr class="valign-top" data-dcnode-id="3130"><td class="align-left" data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">Hansen J-statistic</span></td><td data-dcnode-id="3136"></td><td class="align-left" data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">0.080</span></td><td data-dcnode-id="3133"></td><td class="align-left" data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">0.973</span></td></tr><tr class="valign-top" data-dcnode-id="3121"><td class="align-left" data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">P-value J-statistic</span></td><td data-dcnode-id="3127"></td><td class="align-left" data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">0.777</span></td><td data-dcnode-id="3124"></td><td class="align-left" data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">0.324</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="3115"></p><p data-dcnode-id="3116" id="sp0055"><span data-dcnode-id="3117" instrument_node="">Note: Numbers reported in parentheses are standard errors clustered at the class level. ***, **, and * stand for statistical significance at the 1%, 5% and 10% level, respectively.</span></p><p></p></div></div><p data-dcnode-id="3095" id="p0165"><span data-dcnode-id="3112" instrument_node="">The coefficients on other variables are similar using both OLS and IV. We first look at the effects of various student characteristics. Migrant students coming from rural areas perform worse than those from cities or small towns. Girls on average do significantly better in Chinese than boys, but worse in Mathematics. Compared to those with siblings, single-child students score around 2 points higher in both subjects. Compared to those who spend less than 1</span><span data-dcnode-id="3110" instrument_node="">&nbsp;</span><span data-dcnode-id="3108" instrument_node="">h on homework per day, students who spend between 1 and 2</span><span data-dcnode-id="3106" instrument_node="">&nbsp;</span><span data-dcnode-id="3104" instrument_node="">h post significantly higher scores. However, those who spend over 2</span><span data-dcnode-id="3102" instrument_node="">&nbsp;</span><span data-dcnode-id="3100" instrument_node="">h on average have scores less than those who spend between 1 and 2</span><span data-dcnode-id="3098" instrument_node="">&nbsp;</span><span data-dcnode-id="3096" instrument_node="">h. Some of the students who spend too much time on homework might have difficulties with the course material. The effect of age on test scores is nonlinear. For those who were born before September 2000 (aged at least 10 when they started the fourth grade, as compared to the normal age of 9), each additional month of age represents a 0.33-point loss in Mathematics. These students may have repeated a grade due to interruptions in schooling or weak academic performance.</span></p><p data-dcnode-id="3093" id="p0170"><span data-dcnode-id="3094" instrument_node="">Family background also affects student test scores. Students whose parents migrated earlier perform better on average. One more year's migration experience of parents translates into 0.37 points in Mathematics score and 0.17 points in Chinese score for the student. One possible explanation is that parents who have stayed longer in cities have adapted to local environments better, thus could provide better conditions for their children. Similarly, students from families with more than RMB5000 monthly income perform better in both Chinese and Mathematics than those from poorer families. Students whose mothers have at least a high school education enjoy a 3.5 point premium in Mathematics while father's education is not significant.</span></p><p data-dcnode-id="3091" id="p0175"><span data-dcnode-id="3092" instrument_node="">Our results suggest that school type is one of the most important determinants of the test score gap between migrant students in migrant schools and public schools. It also accounts for a significant share of the overall gap between migrant students and Shanghai students. Taking at face value, if all migrant students in migrant schools are reassigned to public schools, then the overall test score gap between migrant students and Shanghai students would shrink from 9.7 to 6 for Chinese (a 3.7 point decrease), and from 13.6 to 8.3 for Mathematics (a 5.3 point decline). On the other hand, if we give all migrant students the same family background (family monthly income, father's education, and mother's education) as Shanghai students, test score gaps for Chinese and Mathematics would shrink by only 1.3 points and 4.8 points, respectively.</span></p></section><section data-dcnode-id="2145" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3084" id="st0065"><span data-dcnode-id="3089" instrument_node="">4.4</span><span data-dcnode-id="3087" instrument_node="">. </span><span data-dcnode-id="3085" instrument_node="">Robustness checks</span></h3><div data-dcnode-id="2584"><p data-dcnode-id="3064" id="p0180"><span data-dcnode-id="3083" instrument_node="">We then perform a series of robustness checks. First, we have used </span><em data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">HuKou</span></em><span data-dcnode-id="3080" instrument_node=""> status to identify migrant students as opposed to Shanghai students. All children without Shanghai </span><em data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">HuKou</span></em><span data-dcnode-id="3077" instrument_node=""> are classified as migrant students, including those from other cities and from well-off families. This conceptualization is slightly different from the popular view of “migrant children” who usually come from poor uneducated farm households. Since most of those </span><em data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">non-HuKou</span></em><span data-dcnode-id="3074" instrument_node=""> students with good social economic status attend public schools, including those students in our sample might cause over estimation of the score gap attributing to schools. In panel A of </span><a class="workspace-trigger" data-dcnode-id="3072" href="#t0030" name="bt0030"><span data-dcnode-id="3073" instrument_node="">Table&nbsp;6</span></a><span data-dcnode-id="3071" instrument_node="">, we restrict the sample to those with rural </span><em data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">HuKou</span></em><span data-dcnode-id="3068" instrument_node="">, thus exclude anyone who comes from a different city than Shanghai. Panel B excludes all students whose parents have at least college education. Panel C excludes migrant students whose parents earn at least RMB10,000 per month. In all three cases, the coefficients on the migrant school dummy are similar in magnitude to our baseline results (</span><a class="workspace-trigger" data-dcnode-id="3066" href="#t0025" name="bt0025"><span data-dcnode-id="3067" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="3065" instrument_node="">) for both Chinese and Mathematics.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="2585" id="t0030"><span class="captions" data-dcnode-id="3056"><span data-dcnode-id="3057" id="ca0030"><p data-dcnode-id="3058" id="sp0060"><span class="l strument_node="">(2.45)</span></td><td class="align-char" data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">(2.28)</span></td></tr><tr class="valign-top" data-dcnode-id="2636"><td class="align-left" colspan="6" data-dcnode-id="2637"><br data-dcnode-id="2638"></td></tr><tr class="valign-top" data-dcnode-id="2633"><td class="align-left" colspan="6" data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Panel J. Exclude those whose parents came to Shanghai after 2008</span></td></tr><tr class="valign-top" data-dcnode-id="2604"><td class="align-char" data-dcnode-id="2627"><span data-dcnode-id="2632" instrument_node="">−</span><span data-dcnode-id="2630" instrument_node="">&nbsp;</span><span data-dcnode-id="2628" instrument_node="">7.88***</span></td><td class="align-char" data-dcnode-id="2621"><span data-dcnode-id="2626" instrument_node="">−</span><span data-dcnode-id="2624" instrument_node="">&nbsp;</span><span data-dcnode-id="2622" instrument_node="">5.66**</span></td><td class="align-char" data-dcnode-id="2615"><span data-dcnode-id="2620" instrument_node="">−</span><span data-dcnode-id="2618" instrument_node="">&nbsp;</span><span data-dcnode-id="2616" instrument_node="">12.47***</span></td><td class="align-char" data-dcnode-id="2609"><span data-dcnode-id="2614" instrument_node="">−</span><span data-dcnode-id="2612" instrument_node="">&nbsp;</span><span data-dcnode-id="2610" instrument_node="">7.72**</span></td><td class="align-char" data-dcnode-id="2607" rowspan="2"><span data-dcnode-id="2608" instrument_node="">1321</span></td><td class="align-char" data-dcnode-id="2605" rowspan="2"><span data-dcnode-id="2606" instrument_node="">65.9%</span></td></tr><tr class="valign-top" data-dcnode-id="2595"><td class="align-char" data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">(1.53)</span></td><td class="align-char" data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">(2.21)</span></td><td class="align-char" data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">(2.48)</span></td><td class="align-char" data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">(3.91)</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="2586"></p><p data-dcnode-id="2587" id="sp0065"><span data-dcnode-id="2591" instrument_node="">Note: All regressions use the same control variables as in </span><a class="workspace-trigger" data-dcnode-id="2589" href="#t0025" name="bt0025"><span data-dcnode-id="2590" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="2588" instrument_node=""> except for panel E and panel F. Numbers reported in parentheses are standard errors clustered at the class level. ***, **, and * stand for statistical significance at the 1%, 5% and 10% level, respectively.</span></p><p></p></div></div><p data-dcnode-id="2579" id="p0185"><span data-dcnode-id="2583" instrument_node="">Moreover, some students have transferred schools multiple times as their parents change jobs and living places. These students are more likely to attend migrant schools. Thus, failing to adjust for the effect of school transfers and interruptions in study may result in overestimating the test score gap between migrant schools and public schools. On the other hand, some students may have just transferred to a public school, thus their academic performances reflect more about their prior schooling histories than the qualities of education of their current schools. This may cause the test score gap to be underestimated. In panel D of </span><a class="workspace-trigger" data-dcnode-id="2581" href="#t0030" name="bt0030"><span data-dcnode-id="2582" instrument_node="">Table&nbsp;6</span></a><span data-dcnode-id="2580" instrument_node="">, we only include rural students who have never transferred, i.e., they either have stayed in a public school or in a migrant school since they started schooling. Based on the IV specification, the test score gap in Chinese is 6.4, which is slightly larger than in the baseline case, while the gap in Mathematics is 5.8, which is smaller than our baseline estimate. Nevertheless, both test score gaps remain quite large in magnitude and statistically significant despite a sharp drop in sample size.</span></p><p data-dcnode-id="2571" id="p0190"><span data-dcnode-id="2578" instrument_node="">Although we have included a large set of explanatory variables to control for student and family characteristics in the regressions shown in </span><a class="workspace-trigger" data-dcnode-id="2576" href="#t0025" name="bt0025"><span data-dcnode-id="2577" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="2575" instrument_node="">, it is still possible that some omitted confounding factors might contaminate the estimated coefficients. Therefore, in panel E of </span><a class="workspace-trigger" data-dcnode-id="2573" href="#t0030" name="bt0030"><span data-dcnode-id="2574" instrument_node="">Table&nbsp;6</span></a><span data-dcnode-id="2572" instrument_node="">, we include several additional variables that reflect student or family background: children's Body Mass Index (BMI), whether they have ever transferred, whether they just transferred in this semester, whether parents have moved for the purpose of children's education, and whether parents often tutor children's homework. The estimated score gaps are relatively robust to the inclusion of additional controls, with the IV estimator of the Chinese score gap at 5 points and the Mathematics score gap at 8.4 points.</span></p><p data-dcnode-id="2566" id="p0195"><span data-dcnode-id="2570" instrument_node="">In addition, panel F of </span><a class="workspace-trigger" data-dcnode-id="2568" href="#t0030" name="bt0030"><span data-dcnode-id="2569" instrument_node="">Table&nbsp;6</span></a><span data-dcnode-id="2567" instrument_node=""> includes several variables that may partially capture neighborhood effects on top of the variables already included in panel E. First, we add the number of college graduates that the student personally knows, which proxies for role models in the neighborhood. Second, daily time-use of students out of the school, such as number of hours spent on playing video games and playing with peers, is also included. As these activities happen out of the school and the home, we believe they reflect more about characteristics of the neighborhood rather than those of the school or the family. The estimated score gaps are similar to our baseline results, with the Chinese score gap at 5 points and the Mathematics score gap at 8 points based the IV specification.</span></p><p data-dcnode-id="2557" id="p0200"><span data-dcnode-id="2565" instrument_node="">We also perform extensive robustness checks on our instrumental variables approach used in the analyses. In panel G of </span><a class="workspace-trigger" data-dcnode-id="2563" href="#t0030" name="bt0030"><span data-dcnode-id="2564" instrument_node="">Table&nbsp;6</span></a><span data-dcnode-id="2562" instrument_node="">, we use the interaction terms of father's occupation and whether parents lived in central or peripheral districts in 2008 as the excluded variables. Because we have controlled for father's occupation in the test score equation, in doing so, the effects of migrant school on test scores are identified by variations in school types across different living locations within each occupation.</span><a class="workspace-trigger" data-dcnode-id="2559" href="#fn0050" name="bfn0050"><sup data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">10</span></sup></a><span data-dcnode-id="2558" instrument_node=""> Similarly, panel H uses interaction terms of province of origin with living locations as IV, and panel I includes both interaction terms used in panels G and H. Finally, panel J further restricts the sample to those who lived in Shanghai in 2008 which led to a 20% decline in sample size. In all cases, the results are quite similar to our baseline estimates, suggesting that our IV methods are quite robust.</span></p><div data-dcnode-id="2146"><p data-dcnode-id="2546" id="p3205"><span data-dcnode-id="2556" instrument_node="">One additional concern regarding the interpretation of our estimates is whether they reflect the quality difference of schools (students) in central and peripheral districts instead of between public schools and migrant schools. This concern arises as migrant schools are only located in peripheral districts in our sample, and our identification strategy relies on the geographic variations introduced by policy changes. To alleviate this concern, we perform two comparisons in </span><a class="workspace-trigger" data-dcnode-id="2554" href="#t0035" name="bt0035"><span data-dcnode-id="2555" instrument_node="">Table&nbsp;7</span></a><span data-dcnode-id="2553" instrument_node="">. First, we compare test scores of Shanghai students of public schools in central and peripheral districts, controlling for student and family characteristics. The OLS results, reported in the first two columns of </span><a class="workspace-trigger" data-dcnode-id="2551" href="#t0035" name="bt0035"><span data-dcnode-id="2552" instrument_node="">Table&nbsp;7</span></a><span data-dcnode-id="2550" instrument_node="">, show that there is no center-peripheral difference in test scores for Shanghai students. Second, we compare test scores of migrant students in peripheral districts from public schools and migrant schools. The score differences are significant and even larger than the corresponding OLS estimates reported in </span><a class="workspace-trigger" data-dcnode-id="2548" href="#t0025" name="bt0025"><span data-dcnode-id="2549" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="2547" instrument_node="">. This is understandable as there should be more self-selection into public schools within peripheral districts. Both pieces of evidence suggest that our main results are unlikely to be an artifact of the center-peripheral difference.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="2147" id="t0035"><span class="captions" data-dcnode-id="2538"><span data-dcnode-id="2539" id="ca0035"><p data-dcnode-id="2540" id="sp0070"><span class="label" data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Table&nbsp;7</span></span><span data-dcnode-id="2543" instrument_node="">. </span><span data-dcnode-id="2541" instrument_node="">Additional placebo tests.</span></p></span></span><div class="groups" data-dcnode-id="2151"><table data-dcnode-id="2152"><thead data-dcnode-id="2511"><tr class="valign-top rowsep-1" data-dcnode-id="2532"><th data-dcnode-id="2537" rowspan="2" scope="col"></th><th class="align-left" colspan="2" data-dcnode-id="2535" scope="col"><span data-dcnode-id="2536" instrument_node="">Shanghai students in public schools</span></th><th class="align-left" colspan="2" data-dcnode-id="2533" scope="col"><span data-dcnode-id="2534" instrument_node="">Migrant students in peripheral districts</span></th></tr><tr class="valign-top rowsep-1" data-dcnode-id="2523"><th class="align-left" data-dcnode-id="2530" scope="col"><span data-dcnode-id="2531" instrument_node="">(1)</span></th><th class="align-left" data-dcnode-id="2528" scope="col"><span data-dcnode-id="2529" instrument_node="">(2)</span></th><th class="align-left" data-dcnode-id="2526" scope="col"><span data-dcnode-id="2527" instrument_node="">(3)</span></th><th class="align-left" data-dcnode-id="2524" scope="col"><span data-dcnode-id="2525" instrument_node="">(4)</span></th></tr><tr class="valign-top rowsep-1" data-dcnode-id="2512"><th class="align-left" data-dcnode-id="2521" scope="col"><span data-dcnode-id="2522" instrument_node="">Variables</span></th><th class="align-left" data-dcnode-id="2519" scope="col"><span data-dcnode-id="2520" instrument_node="">Chinese</span></th><th class="align-left" data-dcnode-id="2517" scope="col"><span data-dcnode-id="2518" instrument_node="">Mathematics</span></th><th class="align-left" data-dcnode-id="2515" scope="col"><span data-dcnode-id="2516" instrument_node="">Chinese</span></th><th class="align-left" data-dcnode-id="2513" scope="col"><span data-dcnode-id="2514" instrument_node="">Mathematics</span></th></tr></thead><tbody data-dcnode-id="2153"><tr class="valign-top" data-dcnode-id="2498"><td class="align-left" data-dcnode-id="2509" rowspan="2"><span data-dcnode-id="2510" instrument_node="">Central district</span></td><td class="align-left" data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">0.13</span></td><td class="align-left" data-dcnode-id="2501"><span data-dcnode-id="2506" instrument_node="">−</span><span data-dcnode-id="2504" instrument_node="">&nbsp;</span><span data-dcnode-id="2502" instrument_node="">2.21</span></td><td data-dcnode-id="2500"></td><td data-dcnode-id="2499"></td></tr><tr class="valign-top" data-dcnode-id="2491"><td class="align-left" data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">(1.83)</span></td><td class="align-left" data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">(2.22)</span></td><td data-dcnode-id="2493"></td><td data-dcnode-id="2492"></td></tr><tr class="valign-top" data-dcnode-id="2474"><td class="align-left" data-dcnode-id="2489" rowspan="2"><span data-dcnode-id="2490" instrument_node="">Migrant school</span></td><td data-dcnode-id="2488"></td><td data-dcnode-id="2487"></td><td class="align-left" data-dcnode-id="2481"><span data-dcnode-id="2486" instrument_node="">−</span><span data-dcnode-id="2484" instrument_node="">&nbsp;</span><span data-dcnode-id="2482" instrument_node="">8.85***</span></td><td class="align-left" data-dcnode-id="2475"><span data-dcnode-id="2480" instrument_node="">−</span><span data-dcnode-id="2478" instrument_node="">&nbsp;</span><span data-dcnode-id="2476" instrument_node="">15.22***</span></td></tr><tr class="valign-top" data-dcnode-id="2467"><td data-dcnode-i ="2160" instrument_node="">0.018</span></td><td class="align-left" data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">0.142</span></td><td class="align-left" data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">0.181</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="2148"></p><p data-dcnode-id="2149" id="sp0075"><span data-dcnode-id="2150" instrument_node="">Note: Numbers reported in parentheses are standard errors clustered at the class level. ***, **, and * stand for statistical significance at the 1%, 5% and 10% level, respectively.</span></p><p></p></div></div></section><section data-dcnode-id="1580" id="s0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2139" id="st0070"><span data-dcnode-id="2144" instrument_node="">4.5</span><span data-dcnode-id="2142" instrument_node="">. </span><span data-dcnode-id="2140" instrument_node="">Beyond test scores: results on parental overall satisfaction and parental-assessed school quality</span></h3><p data-dcnode-id="2131" id="p0210"><span data-dcnode-id="2138" instrument_node="">So far, we have only used standardized test scores as the outcome variable to measure school quality. But test scores only (roughly) measure what students have learned in certain subjects, and do not capture various important aspects of education that people may also care, such as children's physical and mental health, non-cognitive skills, social behaviors, happiness, etc. In this section, we use two alternative measures of outcome: overall parental satisfaction and parental-assessment of school quality as compared to schools from their hometown. In our survey, parents report whether they are “very satisfied”, “satisfied”, or “not satisfied” with the current school their children attend. For migrant parents, they also report whether they think the quality of current school is “better than”, “similar to”, or “worse than” schools from their hometown. Summary statistics for these two variables have already been shown in </span><a class="workspace-trigger" data-dcnode-id="2136" href="#t0010" name="bt0010"><span data-dcnode-id="2137" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="2135" instrument_node=""> and discussed in </span><a class="workspace-trigger" data-dcnode-id="2133" href="#s0035" name="bs0035"><span data-dcnode-id="2134" instrument_node="">Section&nbsp;4.1</span></a><span data-dcnode-id="2132" instrument_node="">.</span></p><div data-dcnode-id="1595"><p data-dcnode-id="2127" id="p0215"><a class="workspace-trigger" data-dcnode-id="2129" href="#t0040" name="bt0040"><span data-dcnode-id="2130" instrument_node="">Table&nbsp;8</span></a><span data-dcnode-id="2128" instrument_node=""> shows results for both ordered Probit regressions and the IV versions of ordered Probit using seemingly unrelated regression techniques. The numbers shown in the table are marginal effects representing the probability of changing from “satisfied” to “very satisfied” for the first two columns, and the probability of changing from “similar to schools at home” to “better than schools at home” in the last two columns. The corresponding standard errors, all clustered at the class level, are reported in the parentheses.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="1596" id="t0040"><span class="captions" data-dcnode-id="2119"><span data-dcnode-id="2120" id="ca0040"><p data-dcnode-id="2121" id="sp0080"><span class="label" data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Table&nbsp;8</span></span><span data-dcnode-id="2124" instrument_node="">. </span><span data-dcnode-id="2122" instrument_node="">Regression results on parental overall satisfaction and parental assessment of school quality.</span></p></span></span><div class="groups" data-dcnode-id="1600"><table data-dcnode-id="1601"><thead data-dcnode-id="2091"><tr class="valign-top rowsep-1" data-dcnode-id="2113"><th data-dcnode-id="2118" de-id="1634"><span data-dcnode-id="1635" instrument_node="">Student age in months</span></td><td class="align-left" data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Yes</span></td><td class="align-left" data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Yes</span></td><td class="align-left" data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Yes</span></td><td class="align-left" data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Yes</span></td></tr><tr class="valign-top" data-dcnode-id="1614"><td class="align-left" data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Father's occupation dummies</span></td><td class="align-left" data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Yes</span></td><td class="align-left" data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Yes</span></td><td class="align-left" data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Yes</span></td><td class="align-left" data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Yes</span></td></tr><tr class="valign-top" data-dcnode-id="1603"><td class="align-left" data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Observations</span></td><td class="align-left" data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">1633</span></td><td class="align-left" data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">1633</span></td><td class="align-left" data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">1633</span></td><td class="align-left" data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">1633</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="1597"></p><p data-dcnode-id="1598" id="sp0085"><span data-dcnode-id="1599" instrument_node="">Note: Numbers reported are marginal effects, not regression coefficients. For parental overall satisfaction, reported numbers represent marginal changes in probability from being “satisfied” to “very satisfied”. For parental assessment of school quality, reported numbers represent marginal changes in probability from “similar to schools at home” to “better than schools at home”. Numbers reported in parentheses are standard errors clustered at the class level. ***, **, and * stand for statistical significance at the 1%, 5% and 10% level, respectively.</span></p><p></p></div></div><p data-dcnode-id="1590" id="p0220"><span data-dcnode-id="1594" instrument_node="">In general, parents in migrant schools are significantly less satisfied with schools than their counterparts in public schools, as shown in the first two columns of </span><a class="workspace-trigger" data-dcnode-id="1592" href="#t0040" name="bt0040"><span data-dcnode-id="1593" instrument_node="">Table&nbsp;8</span></a><span data-dcnode-id="1591" instrument_node="">. Based on the IV ordered Probit results, holding everything else constant, if a student is transferred from a migrant school to a public school, then the probability of reporting “very satisfied” (as compared to “satisfied”) would increase by 19%. Because we have controlled for test scores in the regression, this increase in parental satisfaction reflects other dimensions of school quality not captured by test scores. Parents are more likely to be “very satisfied” if their children score higher in Mathematics. On the other hand, parents of a single child, parents who migrated earlier, and fathers with at least high school education are less likely to be “very satisfied”, probably because they have higher expectations on schools.</span></p><p data-dcnode-id="1585" id="p0225"><span data-dcnode-id="1589" instrument_node="">The last two columns of </span><a class="workspace-trigger" data-dcnode-id="1587" href="#t0040" name="bt0040"><span data-dcnode-id="1588" instrument_node="">Table&nbsp;8</span></a><span data-dcnode-id="1586" instrument_node=""> report results for parental-assessed school quality. Again, parents from migrant schools are less likely to view their current schools as “better than” schools from their hometown. Ceteris paribus, the probability of reporting “better than schools from hometown” is 27% lower for parents from migrant schools compared to those from public schools. Again, it is important to note that we have controlled for test scores, which do not seem to affect parental assessment of quality as shown in the table. Factors such as whether the child is the only child in his family, whether parents have high school education, and years since parents migrated are not significant, which suggest that parental assessment of quality is a more objective measure than parental satisfaction, consistent with our belief a priori.</span></p><p data-dcnode-id="1581" id="p0230"><a class="workspace-trigger" data-dcnode-id="1583" href="#t0040" name="bt0040"><span data-dcnode-id="1584" instrument_node="">Table&nbsp;8</span></a><span data-dcnode-id="1582" instrument_node=""> also reveals some interesting heterogeneities across different source provinces. Parents from Jiangsu are less likely to rate the school quality as “better than schools at home”, which is consistent with the fact that the quality of education in Jiangsu is among the best of all provinces. Sichuan parents are more likely to be satisfied with children's schools than people from other provinces conditional on everything else. To better understand the determinants of parental subjective evaluation of schools and their satisfaction levels, future work should look deeper into these provincial differences.</span></p></section></section><section data-dcnode-id="1547" id="s0060"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1573" id="st0075"><span data-dcnode-id="1578" instrument_node="">5</span><span data-dcnode-id="1576" instrument_node="">. </span><span data-dcnode-id="1574" instrument_node="">Conclusions</span></h2><p data-dcnode-id="1564" id="p0235"><span data-dcnode-id="1572" instrument_node="">This paper studies the education of migrant children in China, which are estimated to be over 20</span><span data-dcnode-id="1570" instrument_node="">&nbsp;</span><span data-dcnode-id="1568" instrument_node="">million and are still expected to increase in number due to China's continuing urbanization process. Because of the current </span><em data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">HuKou</span></em><span data-dcnode-id="1565" instrument_node=""> system, many of them are not able to enroll in public schools and have to go to privately operated migrant schools. We examine the consequences of such a discriminatory education policy using survey data and standardized test scores collected in Shanghai. In doing so, we carefully control for other confounders such as student's academic history and family background, and correct for possible self-selection biases using IV approach. We find that school type is the most important determinant of Chinese and Mathematics test scores, as well as parental satisfaction and parental assessed school quality. The effect of school type on test scores is large, and overwhelms many important student and family effects — if all migrant students in migrant schools are reassigned to public schools, then the overall test score gap between migrant students and Shanghai students would shrink from 9.7 to 6 for Chinese and from 13.6 to 8.3 for Mathematics.</span></p><p data-dcnode-id="1550" id="p0240"><span data-dcnode-id="1563" instrument_node="">Although we study a special type of schools in a specific context, our findings nevertheless corroborate the general hypothesis that school quality matters for students' outcome in the literature, see e.g. </span><a class="workspace-trigger" data-dcnode-id="1561" href="#bb0015" name="bbb0015"><span data-dcnode-id="1562" instrument_node="">Card and Krueger (1992)</span></a><span data-dcnode-id="1560" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="1558" href="#bb0075" name="bbb0075"><span data-dcnode-id="1559" instrument_node="">Rouse (1998)</span></a><span data-dcnode-id="1557" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="1555" href="#bb0005" name="bbb0005"><span data-dcnode-id="1556" instrument_node="">Angrist, Bettinger, and Kremer (2006)</span></a><span data-dcnode-id="1554" instrument_node="">. Interestingly, our results contrast with James Tooley's research showing that private schools for poor people in India (and other places) outperform public schools (</span><a class="workspace-trigger" data-dcnode-id="1552" href="#bb0080" name="bbb0080"><span data-dcnode-id="1553" instrument_node="">Tooley et al., 2011</span></a><span data-dcnode-id="1551" instrument_node="">). Although it is beyond the scope of this paper to provide an in-depth analysis of Tooley's work, we note briefly that India's public schools might be very different from Chinese state-run schools, and migrant schools in China may face far more institutional barriers than private schools in India. In the future, cross-country research on the performance of private and public schools is likely to be fruitful and provides important knowledge base for designing proper education policies.</span></p><p data-dcnode-id="1548" id="p0245"><span data-dcnode-id="1549" instrument_node="">In terms of public policy, our results suggest that either public schools should be made more accessible to migrant children or migrant schools should be improved significantly so that they could better match the qualities of public schools. For example, to the extent that there is insufficient funding and/or willingness to admit all migrant children in public schools, local governments could at least partially subsidize migrant schools and gradually remove institutional barriers faced by migrant schools.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="1538"><button class="button button-anchor vsi-button" data-dcnode-id="1542" type="button"><span class="button-text" data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Special issue articles</span></span></button><button class="button button-anchor" data-dcnode-id="1539" type="button"><span class="button-text" data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="1537"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="482" id="bi0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="483" id="bs0005"><dl class="references" data-dcnode-id="484" id="reference-links-bs0005"><dt class="label" data-dcnode-id="1532"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="1533" href="#bbb0005" id="ref-id-bb0005"><span data-dcnode-id="1534" instrument_node="">Angrist et al., 2006</span></a></dt><dd class="reference" data-dcnode-id="1468" id="rf0005"><div class="contribution" data-dcnode-id="1507"><span data-dcnode-id="1531" instrument_node="">Joshua D.</span><span data-dcnode-id="1529" instrument_node=""> </span><span data-dcnode-id="1527" instrument_node="">Angrist</span><span data-dcnode-id="1525" instrument_node="">, </span><span data-dcnode-id="1523" instrument_node="">Eric</span><span data-dcnode-id="1521" instrument_node=""> </span><span data-dcnode-id="1519" instrument_node="">Bettinger</span><span data-dcnode-id="1517" instrument_node="">, </span><span data-dcnode-id="1515" instrument_node="">Michael</span><span data-dcnode-id="1513" instrument_node=""> </span><span data-dcnode-id="1511" instrument_node="">Kremer</span><div data-dcnode-id="1508" id="ref-id-rf0005"><strong class="title" data-dcnode-id="1 <div class="article-source ellipsis" data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">2021, Labour Economics</span></div></div><div class="buttons" data-dcnode-id="466"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="467" type="button"><span class="button-link-text" data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="468" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="469"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="461"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="462" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="463"><p data-dcnode-id="464" id="sp0002"><span data-dcnode-id="465" instrument_node="">Rural–urban migrants in China often have to leave their children in rural areas due to institutional restrictions. This paper examines the causal spillover effects of left-behind children on their classmates living with parents in rural China, exploiting the random assignment of students to classes within middle schools. We find that the proportion of left-behind children in class has a significant negative impact on the mental health of their classmates. We also show that the negative peer effects on mental health are related to the worsening of both classroom climate and peer-to-peer interactions. However, there is no evidence that exposure to left-behind students impairs the academic performance of their peers in the same classroom. Our findings suggest that the welfare losses of China’s rural children resulting from the rural–urban migration of adult population are larger than previously thought after accounting for the negative social spillovers of left-behind children on their peers.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="439"><div class="sub-heading" data-dcnode-id="454"><a data-dcnode-id="457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0883035520318279" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="458" id="citing-articles-article1-title"><span data-dcnode-id="459" instrument_node="">A decomposition of student achievement gap by gender in China: Evidence from random class assignment</span></h3></a><div class="article-source ellipsis" data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">2021, International Journal of Educational Research</span></div></div><div class="buttons" data-dcnode-id="448"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="449" type="button"><span class="button-link-text" data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="450" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="451"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="440"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="441" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="442"><p data-dcnode-id="443" id="spar0080"><span data-dcnode-id="447" instrument_node="">Using random class assignment in the China Education Panel Survey, we study the gender achievement gap of lower secondary students in China. Girls outperform boys in Chinese and English by around 0.5 SD, holding all factors including </span><em data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">hukou</span></em><span data-dcnode-id="444" instrument_node=""> status, cognitive ability and schools attended constant. The Blinder-Oaxaca decomposition reveals that most of the gender gap cannot be explained by observables regardless of the subjects and this is contrary to cognitive scores. Quantile decomposition results indicate that the unexplained “girl premium” is largely monotonically decreasing in the conditional quantiles of the exam score distribution for all subjects, being particularly large at the lower tails, but vanishes altogether at the top decile in Math.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="428"><div class="sub-heading" data-dcnode-id="433"><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1371/journal.pone.0265407" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="437" id="citing-articles-article2-title"><span data-dcnode-id="438" instrument_node="">Internal migration and child health: An investigation of health disparities between migrant children and left-behind children in China</span></h3></a><div class="article-source ellipsis" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">2022, PLoS ONE</span></div></div><div class="buttons" data-dcnode-id="432"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="429"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="430" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="431"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="417"><div class="sub-heading" data-dcnode-id="422"><a data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/00036846.2022.2042465" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="426" id="citing-articles-article3-title"><span data-dcnode-id="427" instrument_node="">The effect of childhood left‑behind experience on individual’s income: evidence from China</span></h3></a><div class="article-source ellipsis" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">2022, Applied Economics</span></div></div><div class="buttons" data-dcnode-id="421"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="418"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="419" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="420"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="406"><div class="sub-heading" data-dcnode-id="411"><a data-dcnode-id="414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1007/s12144-022-02821-9" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="415" id="citing-articles-article4-title"><span data-dcnode-id="416" instrument_node="">How does relative deprivation influence Chinese migrant adolescents’ life satisfaction? Testing two integrated models of perceived control and two types of belief in a just world</span></h3></a><div class="article-source ellipsis" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">2022, Current Psychology</span></div></div><div class="buttons" data-dcnode-id="410"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="407"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="408" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="409"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="395"><div class="sub-heading" data-dcnode-id="400"><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/10511482.2021.1996430" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="404" id="citing-articles-article5-title"><span data-dcnode-id="405" instrument_node="">Moving Toward an Inclusive Housing Policy?: Migrants’ Access to Subsidized Housing in Urban China</span></h3></a><div class="article-source ellipsis" data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">2022, Housing Policy Debate</span></div></div><div class="buttons" data-dcnode-id="399"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="396"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="397" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="398"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84878372129%26md5%3Df80c31147c5f7a52414635ef58cb28" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="392" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="393"></path></svg><span class="button-alternative-text" data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="258"><dl class="footnote" data-dcnode-id="362"><dt class="footnote-label" data-dcnode-id="381"><sup data-dcnode-id="382"><a data-dcnode-id="383" href="#baep-article-footnote-id1"><span data-dcnode-id="384" instrument_node="">☆</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="363"><p data-dcnode-id="364" id="np0005"><span data-dcnode-id="380" instrument_node="">We are grateful to Li Ma and Jianing Zhang for their assistance in conducting the field work. We thank participants at the 4th CIER/IZA conference at Bonn for valuable comments. Feng cordially acknowledges financial support from the </span><span data-dcnode-id="378" id="gts0005"><span data-dcnode-id="379" instrument_node="">National Science Foundation of China</span></span><span data-dcnode-id="377" instrument_node=""> (Project# </span><a data-dcnode-id="375" href="#gts0005"><span data-dcnode-id="376" instrument_node="">70803029</span></a><span data-dcnode-id="374" instrument_node="">) and the </span><span data-dcnode-id="372" id="gts0010"><span data-dcnode-id="373" instrument_node="">Program for New Century Excellent Talents in University</span></span><span data-dcnode-id="371" instrument_node=""> (</span><a data-dcnode-id="369" href="#gts0010"><span data-dcnode-id="370" instrument_node="">NCET-12-0903</span></a><span data-dcnode-id="368" instrument_node="">) sponsored by the </span><span data-dcnode-id="366" id="gts0015"><span data-dcnode-id="367" instrument_node="">Ministry of Education of China</span></span><span data-dcnode-id="365" instrument_node="">.</span></p></dd></dl><dl class="footnote" data-dcnode-id="345"><dt class="footnote-label" data-dcnode-id="358"><sup data-dcnode-id="359"><a data-dcnode-id="360" href="#bfn0005"><span data-dcnode-id="361" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="346"><p data-dcnode-id="347" id="np0010"><span data-dcnode-id="357" instrument_node="">In this paper, we use the term “migrant” for those who do not have a local </span><em data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">HuKou</span></em><span data-dcnode-id="354" instrument_node="">. This includes both rural migrants (who possess a rural </span><em data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">HuKou</span></em><span data-dcnode-id="351" instrument_node="">) and non-rural migrants (who possess an urban </span><em data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">HuKou</span></em><span data-dcnode-id="348" instrument_node=""> from a different city or a small town). All migrants face the same obstacles in terms of children's education and all other social benefits in the cities they actually live.</span></p></dd></dl><dl class="footnote" data-dcnode-id="334"><dt class="footnote-label" data-dcnode-id="341"><sup data-dcnode-id="342"><a data-dcnode-id="343" href="#bfn0010"><span data-dcnode-id="344" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="335"><p data-dcnode-id="336" id="np0015"><span data-dcnode-id="340" instrument_node="">See e.g. the Chinese web link at </span><a data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//baike.baidu.com/view/109106.htm" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="339" instrument_node="">http://baike.baidu.com/view/109106.htm</span></a><span data-dcnode-id="337" instrument_node="">.</span></p></dd></dl><dl class="footnote" data-dcnode-id="323"><dt class="footnote-label" data-dcnode-id="330"><sup data-dcnode-id="331"><a data-dcnode-id="332" href="#bfn0015"><span data-dcnode-id="333" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="324"><p data-dcnode-id="325" id="np0020"><span data-dcnode-id="329" instrument_node="">While migrant schools are usually viewed as inferior to public schools. Some scholars have argued that migrant children may receive better education in migrant schools as they would face more discrimination from teachers and classmates in public schools (</span><a class="workspace-trigger" data-dcnode-id="327" href="#bb0100" name="bbb0100"><span data-dcnode-id="328" instrument_node="">Zhou, 2006</span></a><span data-dcnode-id="326" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="315"><dt class="footnote-label" data-dcnode-id="319"><sup data-dcnode-id="320"><a data-dcnode-id="321" href="#bfn0020"><span data-dcnode-id="322" instrument_node="">4</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="316"><p data-dcnode-id="317" id="np0025"><span data-dcnode-id="318" instrument_node="">For example, in Shanghai, almost all migrant children can go to a primary school (either a public or a migrant one), but not all of them can go to a local middle school as migrant middle schools are not allowed to operate and there are not enough public middle schools. Beyond middle school, migrant youths have little educational opportunities if they choose to stay in Shanghai, except for some vocational high schools.</span></p></dd></dl><dl class="footnote" data-dcnode-id="307"><dt class="footnote-label" data-dcnode-id="311"><sup data-dcnode-id="312"><a data-dcnode-id="313" href="#bfn0025"><span data-dcnode-id="314" instrument_node="">5</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="308"><p data-dcnode-id="309" id="np0030"><span data-dcnode-id="310" instrument_node="">The Chinese central government issued a directive in 2003 stating that educating migrant children was the “responsibility” of the local government in the destination areas, and public schools should be the primary channel through which migrant children receive education. Nevertheless, local governments only complied with this directive partially, and to different degrees, as no specific funding was provided for such purposes.</span></p></dd></dl><dl class="footnote" data-dcnode-id="296"><dt class="footnote-label" data-dcnode-id="303"><sup data-dcnode-id="304"><a data-dcnode-id="305" href="#bfn0030"><span data-dcnode-id="306" instrument_node="">6</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="297"><p data-dcnode-id="298" id="np0035"><span data-dcnode-id="302" instrument_node="">See e.g. the Chinese web link at </span><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//news.xinhuanet.com/edu/2010-02/24/content_13035868.htm" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="301" instrument_node="">http://news.xinhuanet.com/edu/2010-02/24/content_13035868.htm</span></a><span data-dcnode-id="299" instrument_node="">.</span></p></dd></dl><dl class="footnote" data-dcnode-id="286"><dt class="footnote-label" data-dcnode-id="292"><sup data-dcnode-id="293"><a data-dcnode-id="294" href="#bfn0035"><span data-dcnode-id="295" instrument_node="">7</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="287"><p data-dcnode-id="288" id="np0040"><a class="workspace-trigger" data-dcnode-id="290" href="#bb0055" name="bbb0055"><span data-dcnode-id="291" instrument_node="">Lai et al. (2011)</span></a><span data-dcnode-id="289" instrument_node=""> also compare migrant students in migrant schools with those in public schools in Beijing and find a significant test score gap. Nevertheless, their sample only includes four public schools in Beijing and they choose not to report the empirical results in their paper. Their results are also subject to potential criticism of selectivity bias as they use simple multivariate regressions and do not control for unobserved factors that might be important in affecting children's school choices.</span></p></dd></dl><dl class="footnote" data-dcnode-id="278"><dt class="footnote-label" data-dcnode-id="282"><sup data-dcnode-id="283"><a data-dcnode-id="284" href="#bfn0040"><span data-dcnode-id="285" instrument_node="">8</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="279"><p data-dcnode-id="280" id="np0045"><span data-dcnode-id="281" instrument_node="">All questionnaires are available from the corresponding author upon request.</span></p></dd></dl><dl class="footnote" data-dcnode-id="270"><dt class="footnote-label" data-dcnode-id="274"><sup data-dcnode-id="275"><a data-
