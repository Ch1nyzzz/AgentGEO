</span><meta content="A significant proportion of migrant children in China are not able to attend public schools for the lack of local household registration (HuKou), and …" data-dcnode-id="5819" property="og:description"><span data-dcnode-id="5818" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0005&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0005&quot;><p id=&quot;sp0005&quot;>A significant proportion of migrant children in China are not able to attend public schools for the lack of local household registration (<em>HuKou</em>), and turn to privately-operated migrant schools. This paper examines the consequences of such a partially involuntary school choice, using survey data and standardized test scores from field work conducted in Shanghai. We find that migrant students who are unable to enroll in public schools perform significantly worse than their more fortunate counterparts in both Chinese and Mathematics. We also use parental satisfaction and parental assessment of school quality as alternative measures of the educational outcome and find similar results. Our study suggests that access to public schools is the key factor determining the quality of education that migrant children receive.</p></div></div></div>" data-dcnode-id="5817" lang="en" name="citation_abstract"><span data-dcnode-id="5816" instrument_node="">

<svg class="icon icon-cited-by-66" data-dcnode-id="5379" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="5380" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="5377"><span data-dcnode-id="5378" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="5366" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="5369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.chieco.2013.04.007" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="5370" instrument_node="">https://doi.org/10.1016/j.chieco.2013.04.007</span></a><a class="rights-and-content" data-dcnode-id="5367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS1043951X13000400%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5368" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="5365"></section><section class="ReferencedArticles" data-dcnode-id="5364"></section><div class="PageDivider" data-dcnode-id="5363"></div><div class="Abstracts u-font-serif" data-dcnode-id="5332" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="5342" id="ab0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5361"><span data-dcnode-id="5362" instrument_node="">Highlights</span></h2><div data-dcnode-id="5343" id="as9910"><p data-dcnode-id="5344" id="sp9025"></p><dl class="list" data-dcnode-id="5345"><dt class="list-label" data-dcnode-id="5359"><span data-dcnode-id="5360" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5356"><p data-dcnode-id="5357" id="p8200"><span data-dcnode-id="5358" instrument_node="">We use self-collected survey data and administered standardized tests to study the educational consequences associated with attending migrant schools.</span></p></dd><dt class="list-label" data-dcnode-id="5354"><span data-dcnode-id="5355" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5351"><p data-dcnode-id="5352" id="p0205"><span data-dcnode-id="5353" instrument_node="">We examine test scores, parental overall satisfaction and parental assessed school quality.</span></p></dd><dt class="list-label" data-dcnode-id="5349"><span data-dcnode-id="5350" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5346"><p data-dcnode-id="5347" id="p7810"><span data-dcnode-id="5348" instrument_node="">We find that school type is the most important determinant of educational outcomes and overwhelms many important student and family characteristics.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="5333" id="ab0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5340"><span data-dcnode-id="5341" instrument_node="">Abstract</span></h2><div data-dcnode-id="5334" id="as0005"><p data-dcnode-id="5335" id="sp0005"><span data-dcnode-id="5339" instrument_node="">A significant proportion of migrant children in China are not able to attend public schools for the lack of local household registration (</span><em data-dcnode-id="5337"><span data-dcnode-id="5338" instrument_node="">HuKou</span></em><span data-dcnode-id="5336" instrument_node="">), and turn to privately-operated migrant schools. This paper examines the consequences of such a partially involuntary school choice, using survey data and standardized test scores from field work conducted in Shanghai. We find that migrant students who are unable to enroll in public schools perform significantly worse than their more fortunate counterparts in both Chinese and Mathematics. We also use parental satisfaction and parental assessment of school quality as alternative measures of the educational outcome and find similar results. Our study suggests that access to public schools is the key factor determining the quality of education that migrant children receive.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="5309" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="5321"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1043951X13000229"><svg class="icon icon-navigate-left" data-dcnode-id="5330" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="5331"></path></svg><span class="button-alternative-text" data-dcnode-id="5323"><strong data-dcnode-id="5328"><span data-dcnode-id="5329" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5324"><span data-dcnode-id="5325" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="5310"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1043951X13000394"><span class="button-alternative-text" data-dcnode-id="5314"><strong data-dcnode-id="5319"><span data-dcnode-id="5320" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5315"><span data-dcnode-id="5316" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="5312" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="5313"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="5281"><div class="keywords-section" data-dcnode-id="5297" id="ks0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5307"><span data-dcnode-id="5308" instrument_node="">JEL classification</span></h2><div class="keyword" data-dcnode-id="5304" id="kw0060"><span data-dcnode-id="5305" id="tx0030"><span data-dcnode-id="5306" instrument_node="">I28</span></span></div><div class="keyword" data-dcnode-id="5301" id="kw0065"><span data-dcnode-id="5302" id="tx0035"><span data-dcnode-id="5303" instrument_node="">J15</span></span></div><div class="keyword" data-dcnode-id="5298" id="kw0070"><span data-dcnode-id="5299" id="tx0040"><span data-dcnode-id="5300" instrument_node="">O15</span></span></div></div><div class="keywords-section" data-dcnode-id="5282" id="ks0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="5292" id="kw0040"><span data-dcnode-id="5293" id="tx0010"><span data-dcnode-id="5294" instrument_node="">Education</span></span></div><div class="keyword" data-dcnode-id="5289" id="kw0045"><span data-dcnode-id="5290" id="tx0015"><span data-dcnode-id="5291" instrument_node="">Migrant children</span></span></div><div class="keyword" data-dcnode-id="5286" id="kw0050"><span data-dcnode-id="5287" id="tx0020"><span data-dcnode-id="5288" instrument_node="">Migrant school</span></span></div><div class="keyword" data-dcnode-id="5283" id="kw0055"><span data-dcnode-id="5284" id="tx0025"><span data-dcnode-id="5285" instrument_node="">Standardized test score</span></span></div></div></div><span data-dcnode-id="5280" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="1545" id="body"><div data-dcnode-id="1546"><section data-dcnode-id="5179" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5274" id="st0020"><span data-dcnode-id="5279" instrument_node="">1</span><span data-dcnode-id="5277" instrument_node="">. </span><span data-dcnode-id="5275" instrument_node="">Introduction</span></h2><p data-dcnode-id="5244" id="p0005"><span data-dcnode-id="5273" instrument_node="">One of the main drivers of China's phenomenal economic growth during the past three decades has been the large-scale and persistent rural-to-urban migration. As a consequence, half of China's 1.3</span><span data-dcnode-id="5271" instrument_node="">&nbsp;</span><span data-dcnode-id="5269" instrument_node="">billion people now live in cities, as compared to only twenty percent in the early 1980s (</span><a class="workspace-trigger" data-dcnode-id="5267" href="#bb0065" name="bbb0065"><span data-dcnode-id="5268" instrument_node="">NBS, 2012</span></a><span data-dcnode-id="5266" instrument_node="">). Nevertheless, researchers have expressed concerns over China's so-called “pseudo-urbanization” (</span><a class="workspace-trigger" data-dcnode-id="5264" href="#bb0040" name="bbb0040"><span data-dcnode-id="5265" instrument_node="">Henderson, 2009</span></a><span data-dcnode-id="5263" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5261" href="#bb0085" name="bbb0085"><span data-dcnode-id="5262" instrument_node="">Yew, 2012</span></a><span data-dcnode-id="5260" instrument_node="">). The majority of rural migrants in cities do not possess local household registration (</span><em data-dcnode-id="5258"><span data-dcnode-id="5259" instrument_node="">HuKou</span></em><span data-dcnode-id="5257" instrument_node="">), thus are excluded from full access to pension, health care, public education and other social benefits at the place they live. Based on the 2010 Census, there are around 210 million such “</span><em data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">non-HuKou</span></em><span data-dcnode-id="5254" instrument_node="">” migrants who work and live in a city other than where his/her official </span><em data-dcnode-id="5252"><span data-dcnode-id="5253" instrument_node="">HuKou</span></em><span data-dcnode-id="5251" instrument_node=""> is registered at (</span><a class="workspace-trigger" data-dcnode-id="5249" href="#bb0065" name="bbb0065"><span data-dcnode-id="5250" instrument_node="">NBS, 2012</span></a><span data-dcnode-id="5248" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="5245" href="#fn0005" name="bfn0005"><sup data-dcnode-id="5246"><span data-dcnode-id="5247" instrument_node="">1</span></sup></a></p><p data-dcnode-id="5229" id="p0010"><span data-dcnode-id="5243" instrument_node="">Among all </span><em data-dcnode-id="5241"><span data-dcnode-id="5242" instrument_node="">non-HuKou</span></em><span data-dcnode-id="5240" instrument_node=""> migrants, approximately 20</span><span data-dcnode-id="5238" instrument_node="">&nbsp;</span><span data-dcnode-id="5236" instrument_node="">million are children aged between 6 and 14 (</span><a class="workspace-trigger" data-dcnode-id="5234" href="#bb0065" name="bbb0065"><span data-dcnode-id="5235" instrument_node="">NBS, 2012</span></a><span data-dcnode-id="5233" instrument_node="">). Although all Chinese school-age children are entitled to a free and compulsory 9-year education by law, the Chinese educational system designates elementary education to local governments at the county/district level. Funding for elementary education is allocated by the number of children with </span><em data-dcnode-id="5231"><span data-dcnode-id="5232" instrument_node="">HuKou</span></em><span data-dcnode-id="5230" instrument_node=""> and not portable across administrative units. Therefore, local authorities lack the incentives and financial resources to accommodate the educational needs of migrant children, despite directives from the central government that urge them to do so. A significant proportion of migrant children are thus excluded from the public education system and have to enter the so-called “migrant schools”, which started as informal schools serving exclusively the educational needs of migrant children in cities.</span></p><p data-dcnode-id="5207" id="p0015"><span data-dcnode-id="5228" instrument_node="">The educational dilemma faced by migrant children is a reflection of the discordance between China's swift urbanization process and the historically-rooted, still omnipotent </span><em data-dcnode-id="5226"><span data-dcnode-id="5227" instrument_node="">HuKou</span></em><span data-dcnode-id="5225" instrument_node=""> system (</span><a class="workspace-trigger" data-dcnode-id="5223" href="#bb0020" name="bbb0020"><span data-dcnode-id="5224" instrument_node="">Chan &amp; Buckingham, 2008</span></a><span data-dcnode-id="5222" instrument_node="">). We believe it is important to empirically assess the consequences of such a </span><em data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">HuKou</span></em><span data-dcnode-id="5219" instrument_node="">-based discriminatory educational policy for several reasons. First of all, the sheer number of migrant children makes their education a top national development priority for China. Despite the government's tremendous efforts to upgrade both rural and urban public schools, the </span><em data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">HuKou</span></em><span data-dcnode-id="5216" instrument_node=""> system makes the education of migrant children a distinctive challenge as they do not fit into the usual rural–urban dichotomy. If migrant children do not receive appropriate elementary education, it is likely that their lifetime welfare, including labor market outcomes, will be adversely affected. Society in general would also face negative externalities due to increased poverty and a possible rise in crime. In addition, if trends regarding the rural-to-urban migration and the urbanization process continue, the number of migrant children is expected to grow. The rural areas also hold a significant reservoir of potential migrant children, as there are around 60</span><span data-dcnode-id="5214" instrument_node="">&nbsp;</span><span data-dcnode-id="5212" instrument_node="">million so-called “left-behind” children.</span><a class="workspace-trigger" data-dcnode-id="5209" href="#fn0010" name="bfn0010"><sup data-dcnode-id="5210"><span data-dcnode-id="5211" instrument_node="">2</span></sup></a><span data-dcnode-id="5208" instrument_node=""> Their parents work in cities but they stay with grandparents or other relatives at home. If the urban educational system were more accommodating, many of them would have chosen to migrate to cities to stay with their parents.</span></p><p data-dcnode-id="5201" id="p0020"><span data-dcnode-id="5206" instrument_node="">Secondly, any policy discussion regarding the reform of China's educational system should be based on empirical facts rather than just political ideology or public sentiments. One of the key policy issues regarding migrant children's education is the roles public schools and migrant schools should play, respectively. Should the local public schools admit unconditionally all migrant children coming to their doors? Should migrant schools be allowed to continue to exist?</span><a class="workspace-trigger" data-dcnode-id="5203" href="#fn0015" name="bfn0015"><sup data-dcnode-id="5204"><span data-dcnode-id="5205" instrument_node="">3</span></sup></a><span data-dcnode-id="5202" instrument_node=""> Should the governments even subsidize migrant schools so as to make them better suited to teach migrant children? To answer these important questions, one needs to carefully measure the benefits and costs involved for each policy option, and to understand the possible distributional effects for different stakeholders, which is beyond the scope of this paper. Nevertheless, we hope this paper represents a step forward by providing some rough estimates of the cost of attending migrant schools, through quantitatively assessing the relative qualities of education that migrant children receive in public schools and migrant schools.</span></p><p data-dcnode-id="5193" id="p0025"><span data-dcnode-id="5200" instrument_node="">Last but not least, China's situation provides a unique opportunity to study the role of public elementary education for disadvantaged children, such as children of migrants or those with poor family background (see e.g. </span><a class="workspace-trigger" data-dcnode-id="5198" href="#bb0080" name="bbb0080"><span data-dcnode-id="5199" instrument_node="">Tooley, Bao, Dixon, &amp; Merrifield, 2011</span></a><span data-dcnode-id="5197" instrument_node="">). Many other developing countries are also undergoing rapid rural-to-urban migration and urbanization process. Although a formal institution such as </span><em data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">HuKou</span></em><span data-dcnode-id="5194" instrument_node=""> that excludes access to public schools does not exist in other countries, the situation could still be similar when the urban educational infrastructures are unable to accommodate the influx of migrant children. In that case, would market-based responses, such as the establishments of migrant schools, be adequate to take care of the needs of migrant students? Or is it necessary for the governments to take a more proactive role? Governments need to understand the tradeoffs involved before taking any preparatory actions. Although institutional settings differ, the Chinese experience at the very least could be useful for other countries facing similar situations.</span></p><p data-dcnode-id="5191" id="p0030"><span data-dcnode-id="5192" instrument_node="">In this paper, we use self-collected survey data and administered standardized tests to study the educational consequences associated with attending migrant schools. Our study distinguishes itself from the existing literature in a number of ways. To compare academic performances of students in different schools, we administer standardized Chinese and Mathematics tests to all fourth grade students surveyed. We also collect detailed information on students and parents, which allow us to disentangle school effects from student and family background effects. More importantly, we utilize policy changes in Shanghai to correct for possible selection-bias resulting from migrant children's nonrandom enrollments into public and migrant schools. In addition to test scores, we also use two other more comprehensive albeit subjective measures of school quality: parental overall satisfaction and parental assessed school quality.</span></p><p data-dcnode-id="5180" id="p0035"><span data-dcnode-id="5190" instrument_node="">The rest of the paper goes like follows. </span><a class="workspace-trigger" data-dcnode-id="5188" href="#s0010" name="bs0010"><span data-dcnode-id="5189" instrument_node="">Section&nbsp;2</span></a><span data-dcnode-id="5187" instrument_node=""> provides background information on the education of migrant children in China and briefly reviews existing studies. This is followed by a description of the data source and the empirical methodology in </span><a class="workspace-trigger" data-dcnode-id="5185" href="#s0015" name="bs0015"><span data-dcnode-id="5186" instrument_node="">Section&nbsp;3</span></a><span data-dcnode-id="5184" instrument_node="">. The main empirical results are reported in </span><a class="workspace-trigger" data-dcnode-id="5182" href="#s0030" name="bs0030"><span data-dcnode-id="5183" instrument_node="">Section&nbsp;4</span></a><span data-dcnode-id="5181" instrument_node="">. The last section concludes with some policy implications.</span></p></section><section data-dcnode-id="5079" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5173" id="st0025"><span data-dcnode-id="5178" instrument_node="">2</span><span data-dcnode-id="5176" instrument_node="">. </span><span data-dcnode-id="5174" instrument_node="">Background and the existing literature</span></h2><p data-dcnode-id="5135" id="p0040"><span data-dcnode-id="5172" instrument_node="">The educational problem for migrant children is closely related to China's </span><em data-dcnode-id="5170"><span data-dcnode-id="5171" instrument_node="">HuKou</span></em><span data-dcnode-id="5169" instrument_node=""> system, which was first established in the 1950s. A person or household has either “agricultural/rural” or “non-agricultural/urban” </span><em data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">HuKou</span></em><span data-dcnode-id="5166" instrument_node=""> specific to a locality. Under the </span><em data-dcnode-id="5164"><span data-dcnode-id="5165" instrument_node="">HuKou</span></em><span data-dcnode-id="5163" instrument_node=""> system, internal migration was tightly controlled and only government-granted migration was possible, which usually involved a change of </span><em data-dcnode-id="5161"><span data-dcnode-id="5162" instrument_node="">HuKou</span></em><span data-dcnode-id="5160" instrument_node=""> status from the source to the destination locale. Since the 1980s, the </span><em data-dcnode-id="5158"><span data-dcnode-id="5159" instrument_node="">HuKou</span></em><span data-dcnode-id="5157" instrument_node=""> system has evolved towards a weakening of the agricultural/non-agricultural divide, especially after the abolition of rationed grain in the early 1990s. On the other hand, the geographic dimension of </span><em data-dcnode-id="5155"><span data-dcnode-id="5156" instrument_node="">HuKou</span></em><span data-dcnode-id="5154" instrument_node=""> has strengthened, as increased regional inequality (</span><a class="workspace-trigger" data-dcnode-id="5152" href="#bb0045" name="bbb0045"><span data-dcnode-id="5153" instrument_node="">Kanbur and Zhang, 2005</span></a><span data-dcnode-id="5151" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5149" href="#bb0090" name="bbb0090"><span data-dcnode-id="5150" instrument_node="">Zhang, 2006</span></a><span data-dcnode-id="5148" instrument_node="">) led to a divergence in benefit levels attached to </span><em data-dcnode-id="5146"><span data-dcnode-id="5147" instrument_node="">HuKou</span></em><span data-dcnode-id="5145" instrument_node="">. Today, </span><em data-dcnode-id="5143"><span data-dcnode-id="5144" instrument_node="">HuKou</span></em><span data-dcnode-id="5142" instrument_node=""> is still one of the most important mechanisms determining entitlements to public welfare and urban services, which are mainly funded by local governments (</span><a class="workspace-trigger" data-dcnode-id="5140" href="#bb0020" name="bbb0020"><span data-dcnode-id="5141" instrument_node="">Chan &amp; Buckingham, 2008</span></a><span data-dcnode-id="5139" instrument_node="">). Thus, to some extent, </span><em data-dcnode-id="5137"><span data-dcnode-id="5138" instrument_node="">HuKou</span></em><span data-dcnode-id="5136" instrument_node=""> is an internal “citizenship” for Chinese people.</span></p><p data-dcnode-id="5124" id="p0045"><span data-dcnode-id="5134" instrument_node="">Because migrant children do not have local </span><em data-dcnode-id="5132"><span data-dcnode-id="5133" instrument_node="">HuKou</span></em><span data-dcnode-id="5131" instrument_node=""> in the place they live, they are not entitled to free compulsory education stipulated by Chinese laws. In Chinese cities, two criteria are important for public schools to admit students. First, students must reside within the local school district in the city; and second, students must be registered in the school district as well, i.e., having local </span><em data-dcnode-id="5129"><span data-dcnode-id="5130" instrument_node="">HuKou</span></em><span data-dcnode-id="5128" instrument_node="">. The reasoning behind these regulations is that the education budget for primary schools and middle schools is allocated through local governments at the county/district level. State funding for compulsory schooling differs vastly by locality and is not portable across different cities. If migrant children were allowed to attend local schools, it would increase the financial burden of the local government (</span><a class="workspace-trigger" data-dcnode-id="5126" href="#bb0060" name="bbb0060"><span data-dcnode-id="5127" instrument_node="">Liang &amp; Chen, 2007</span></a><span data-dcnode-id="5125" instrument_node="">).</span></p><p data-dcnode-id="5110" id="p0050"><span data-dcnode-id="5123" instrument_node="">In the early 1990s, there were already a large number of children migrating with their parents and living in cities. But public schools at that time charged hefty “out-of-district” fees to anyone without a local </span><em data-dcnode-id="5121"><span data-dcnode-id="5122" instrument_node="">HuKou</span></em><span data-dcnode-id="5120" instrument_node="">, and required an array of documents and certificates which many migrant parents were unable to provide. Even if some migrant parents were able to afford the tuition and to provide all necessary documentations, they might still not be able to enroll their children in a public school as spaces in public schools were limited. As a result, migrant schools started as a market-based response to the educational needs of migrant children. Since its inception, migrant schools have flourished quickly, and by the early 2000s they played a more important role in admitting migrant children in cities than public schools. Before 2000, migrant schools were typically owned and operated by entrepreneurs as private businesses, and offered inferior conditions as school owners tried to minimize their costs and the schools were subject to constant closures and changes of places due to lack of a clear legal standing within China's educational system (</span><a class="workspace-trigger" data-dcnode-id="5118" href="#bb0035" name="bbb0035"><span data-dcnode-id="5119" instrument_node="">Han, 2004</span></a><span data-dcnode-id="5117" instrument_node="">). In more recent years (post-2000), the conditions in many migrant schools have improved substantially, thanks to donations from the society and in some cases subsidies from local government. Still, migrant schools and their students are “not-in-the-system” and face substantial institutional barriers. Because a student can only take the college entrance exam in the province where his/her </span><em data-dcnode-id="5115"><span data-dcnode-id="5116" instrument_node="">HuKou</span></em><span data-dcnode-id="5114" instrument_node=""> is, migrant children face more and more difficulties as they go up the educational ladder.</span><a class="workspace-trigger" data-dcnode-id="5111" href="#fn0020" name="bfn0020"><sup data-dcnode-id="5112"><span data-dcnode-id="5113" instrument_node="">4</span></sup></a></p><p data-dcnode-id="5100" id="p0055"><span data-dcnode-id="5109" instrument_node="">Our study is based in Shanghai, one of the largest migrant-receiving cities in China. Among all major cities, Shanghai is probably among the most accommodating ones in terms of meeting migrant children's education needs.</span><a class="workspace-trigger" data-dcnode-id="5106" href="#fn0025" name="bfn0025"><sup data-dcnode-id="5107"><span data-dcnode-id="5108" instrument_node="">5</span></sup></a><span data-dcnode-id="5105" instrument_node=""> In 2008, Shanghai government launched a “three-year action plan for the education of migrant children”, which was characterized by further opening up public schools to migrant children and subsidizing migrant schools. In Shanghai's central districts, all migrant schools were shut down and migrant students in these districts were transferred to public schools. In peripheral districts, as there are not enough public schools for all migrant children, government allows migrant schools to continue operating and provides subsidies so that no tuition fees would be charged on migrant students. For the academic year of 2011–2012, all migrant schools in Shanghai received around RMB4500 per pupil subsidy from the local government. Although it represents only around one third to one fourth of the per pupil funding for public schools, such subsidies are sufficient to cover the operating expenses of migrant schools. Among around half million migrant students in Shanghai, about 70% of them are enrolled in public schools while the rest study in migrant schools.</span><a class="workspace-trigger" data-dcnode-id="5102" href="#fn0030" name="bfn0030"><sup data-dcnode-id="5103"><span data-dcnode-id="5104" instrument_node="">6</span></sup></a><span data-dcnode-id="5101" instrument_node=""> As we have just discussed, no tuitions were charged on students in both types of schools. The schools, however, usually charge some other fees that cover the costs of lunch and some extra-curriculum activities. The fees ranged from around RMB200 to RMB800 per semester for the schools that we surveyed and there were no additional fees charged to migrant students in public schools.</span></p><p data-dcnode-id="5080" id="p0060"><span data-dcnode-id="5099" instrument_node="">The issue of migrant children's education has received considerable attention by domestic and international scholars, including </span><a class="workspace-trigger" data-dcnode-id="5097" href="#bb0035" name="bbb0035"><span data-dcnode-id="5098" instrument_node="">Han (2004)</span></a><span data-dcnode-id="5096" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5094" href="#bb0050" name="bbb0050"><span data-dcnode-id="5095" instrument_node="">Kwong (2004)</span></a><span data-dcnode-id="5093" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5091" href="#bb0100" name="bbb0100"><span data-dcnode-id="5092" instrument_node="">Zhou (2006)</span></a><span data-dcnode-id="5090" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="5088" href="#bb0030" name="bbb0030"><span data-dcnode-id="5089" instrument_node="">Goodburn (2009)</span></a><span data-dcnode-id="5087" instrument_node="">, among others. However, most of these studies are qualitative and fall short of quantitatively assessing the relative qualities of migrant schools and public schools. One notable exception is </span><a class="workspace-trigger" data-dcnode-id="5085" href="#bb0055" name="bbb0055"><span data-dcnode-id="5086" instrument_node="">Lai et al. (2011)</span></a><span data-dcnode-id="5084" instrument_node="">, which compares test scores of students in migrant schools in Beijing with those in rural public schools in Shaanxi. They find that students in migrant schools perform significantly better than their counterparts in rural public schools in one of the poorest regions of the country. While it is interesting to contrast migrant schools in cities with rural public schools where the migrant children came from, we believe it is more policy-relevant to compare migrant schools with urban public schools, as most migrant children are expected to stay in cities.</span><a class="workspace-trigger" data-dcnode-id="5081" href="#fn0035" name="bfn0035"><sup data-dcnode-id="5082"><span data-dcnode-id="5083" instrument_node="">7</span></sup></a></p></section><section data-dcnode-id="4556" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5073" id="st5030"><span data-dcnode-id="5078" instrument_node="">3</span><span data-dcnode-id="5076" instrument_node="">. </span><span data-dcnode-id="5074" instrument_node="">Data and methodology</span></h2><section data-dcnode-id="5041" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5067" id="st0035"><span data-dcnode-id="5072" instrument_node="">3.1</span><span data-dcnode-id="5070" instrument_node="">. </span><span data-dcnode-id="5068" instrument_node="">Description of the data</span></h3><p data-dcnode-id="5059" id="p0065"><span data-dcnode-id="5066" instrument_node="">We use data from 20 elementary schools in Shanghai collected in November 2010. All fourth grade students from 11 public schools and 9 migrant schools are interviewed and given standardized tests on Chinese and Mathematics. Because the municipality government has shut down all migrant schools in the central districts of Shanghai, all 9 migrant schools are from the peripheral districts. On the other hand, 5 public schools are from the central districts and the rest are from the peripheral districts. All public schools in our sample admit a significant number of migrant students, with the percentage of </span><em data-dcnode-id="5064"><span data-dcnode-id="5065" instrument_node="">non-HuKou</span></em><span data-dcnode-id="5063" instrument_node=""> students ranging from 27% to 83%. We therefore exclude those elite schools where competition in terms of enrollment is fierce even for students with Shanghai </span><em data-dcnode-id="5061"><span data-dcnode-id="5062" instrument_node="">HuKou</span></em><span data-dcnode-id="5060" instrument_node="">. We choose fourth grade students because there is negative sample selection among the fifth graders. In the fifth year, many well-performed migrant students return to their hometown as they face obstacles in entering middle schools and high schools in Shanghai. On the other hand, younger children are more likely to have difficulties in understanding our questionnaires. To avoid sample selection among the students within schools, we choose to sample all fourth grade students in the schools selected. Thanks to the cooperation from school administrators, our response rate is close to 100%. Each school has between 2 and 6 classes in the fourth grade. Class size ranges from 18 to 59 students.</span></p><p data-dcnode-id="5048" id="p0070"><span data-dcnode-id="5058" instrument_node="">We collect information at the school, class, student, and parent level through the following: 1) a school survey completed by a school administrator; 2) a class survey completed by the master teacher; 3) a student survey completed by students in class under the instruction of our surveyors; 4) a student information sheet completed by the master teacher; and 5) a parent survey completed by parents. The school survey collects basic information about the school, such as its history, number of classes and students, basic characteristics of all teachers, sources of funding, enrollment requirements for students without Shanghai </span><em data-dcnode-id="5056"><span data-dcnode-id="5057" instrument_node="">HuKou</span></em><span data-dcnode-id="5055" instrument_node="">, fees, and so on. The class survey asks questions about the whole class, such as its curriculum, educational background and teaching experiences of course instructors. The student survey asks the students questions such as their prior history of school transfer, time use after school, whether parents have helped them with study after school, their personal feelings about going to school, etc. The student information sheet collects basic information about each student in a class, such as their </span><em data-dcnode-id="5053"><span data-dcnode-id="5054" instrument_node="">HuKou</span></em><span data-dcnode-id="5052" instrument_node=""> status, gender, age, height and weight, disability status and class performance evaluated by the master teacher. Lastly, the parent survey collects information about parents, including their age, education and income, migration history, expectations on their children's education, parental assessment of school quality, and overall satisfaction with the current school, among other things. Students are instructed to give the parent survey questionnaires to their parents to complete, and bring back the questionnaires on the next school day. In case some questions are unfilled, our interviewers would work with the master teacher to resolve the issue, and check by telephone with parents directly if necessary.</span><a class="workspace-trigger" data-dcnode-id="5049" href="#fn0040" name="bfn0040"><sup data-dcnode-id="5050"><span data-dcnode-id="5051" instrument_node="">8</span></sup></a></p><p data-dcnode-id="5042" id="p0075"><span data-dcnode-id="5047" instrument_node="">We give the same standardized Chinese and Mathematics tests to all students in both public schools and migrant schools. Because migrant schools are considered as only “informal” schools and not part of the local educational system, the education bureaus do not give standardized tests to students in migrant schools. The school self-administered tests also do not reflect the true performance gap between migrant schools and public schools. Actually, because migrant schools are private schools and face competition in terms of student enrollment, many are reported to give inflated scores to their students. Our Chinese and Mathematics tests are designed by experts outside the schools surveyed, and incorporate different curriculum requirements by Shanghai and other provinces. Test time for each subject is 20</span><span data-dcnode-id="5045" instrument_node="">&nbsp;</span><span data-dcnode-id="5043" instrument_node="">min, proctored by both the master teacher of the class and one of our interviewers.</span></p></section><section data-dcnode-id="4557" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5035" id="st0040"><span data-dcnode-id="5040" instrument_node="">3.2</span><span data-dcnode-id="5038" instrument_node="">. </span><span data-dcnode-id="5036" instrument_node="">Empirical methodology</span></h3><p data-dcnode-id="4883" id="p0250"><span data-dcnode-id="5034" instrument_node="">In our empirical work, we use the following model:</span><span class="display" data-dcnode-id="4915"><span class="formula" data-dcnode-id="4916" id="fo0005"><span class="label" data-dcnode-id="5032"><span data-dcnode-id="5033" instrument_node="">(1)</span></span><span class="math" data-dcnode-id="4917"><span class="MathJax_Preview" data-dcnode-id="5031" style=""></span><span class="MathJax_SVG" data-dcnode-id="4920" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>Y</mi><mi is=&quot;true&quot;>i</mi></msub><mo is=&quot;true&quot;>=</mo><msub is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B2;</mi><mn is=&quot;true&quot;>0</mn></msub><mo is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B2;</mi><mn is=&quot;true&quot;>1</mn></msub><msub is=&quot;true&quot;><mi is=&quot;true&quot;>M</mi><mi is=&quot;true&quot;>i</mi></msub><mo is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B2;</mi><mn is=&quot;true&quot;>2</mn></msub><msub is=&quot;true&quot;><mi is=&quot;true&quot;>X</mi><mi is=&quot;true&quot;>i</mi></msub><mo is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x3B5;</mi><mi is=&quot;true&quot;>i</mi></msub></mrow></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="4967" focusable="false" height="2.463ex" role="img" style="vertical-align: -0.618ex;" viewBox="0 -794.4 12288.3 1060.6" width="28.541ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="4968" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 " id="MJMATHI-3B5" stroke-width="1"></path></use></g><g data-dcnode-id="4971" is="true" transform="translate(466,-150)"><use data-dcnode-id="4972" href="#MJMATHI-69" transform="scale(0.707)"><path d="M184 600Q184 624 203 642T247 661Q265 661 277 649T290 619Q290 596 270 577T226 557Q211 557 198 567T184 600ZM21 287Q21 295 30 318T54 369T98 420T158 442Q197 442 223 419T250 357Q250 340 236 301T196 196T154 83Q149 61 149 51Q149 26 166 26Q175 26 185 29T208 43T235 78T260 137Q263 149 265 151T282 153Q302 153 302 143Q302 135 293 112T268 61T223 11T161 -11Q129 -11 102 10T74 74Q74 91 79 106T122 220Q160 321 166 341T173 380Q173 404 156 404H154Q124 404 99 371T61 287Q60 286 59 284T58 281T56 279T53 278T49 278T41 278H27Q21 284 21 287Z" data-dcnode-id="4973" id="MJMATHI-69" stroke-width="1"></path></use></g></g></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="4921" role="presentation"><math data-dcnode-id="4922" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="4923" is="true"><msub data-dcnode-id="4962" is="true"><mi data-dcnode-id="4965" is="true"><span data-dcnode-id="4966" instrument_node="">Y</span></mi><mi data-dcnode-id="4963" is="true"><span data-dcnode-id="4964" instrument_node="">i</span></mi></msub><mo data-dcnode-id="4960" is="true"><span data-dcnode-id="4961" instrument_node="">=</span></mo><msub data-dcnode-id="4955" is="true"><mi data-dcnode-id="4958" is="true"><span data-dcnode-id="4959" instrument_node="">β</span></mi><mn data-dcnode-id="4956" is="true"><span data-dcnode-id="4957" instrument_node="">0</span></mn></msub><mo data-dcnode-id="4953" is="true"><span data-dcnode-id="4954" instrument_node="">+</span></mo><msub data-dcnode-id="4948" is="true"><mi data-dcnode-id="4951" is="true"><span data-dcnode-id="4952" instrument_node="">β</span></mi><mn data-dcnode-id="4949" is="true"><span data-dcnode-id="4950" instrument_node="">1</span></mn></msub><msub data-dcnode-id="4943" is="true"><mi data-dcnode-id="4946" is="true"><span data-dcnode-id="4947" instrument_node="">M</span></mi><mi data-dcnode-id="4944" is="true"><span data-dcnode-id="4945" instrument_node="">i</span></mi></msub><mo data-dcnode-id="4941" is="true"><span data-dcnode-id="4942" instrument_node="">+</span></mo><msub data-dcnode-id="4936" is="true"><mi data-dcnode-id="4939" is="true"><span data-dcnode-id="4940" instrument_node="">β</span></mi><mn data-dcnode-id="4937" is="true"><span data-dcnode-id="4938" instrument_node="">2</span></mn></msub><msub data-dcnode-id="4931" is="true"><mi data-dcnode-id="4934" is="true"><span data-dcnode-id="4935" instrument_node="">X</span></mi><mi data-dcnode-id="4932" is="true"><span data-dcnode-id="4933" instrument_node="">i</span></mi></msub><mo data-dcnode-id="4929" is="true"><span data-dcnode-id="4930" instrument_node="">+</span></mo><msub data-dcnode-id="4924" is="true"><mi data-dcnode-id="4927" is="true"><span data-dcnode-id="4928" instrument_node="">ε</span></mi><mi data-dcnode-id="4925" is="true"><span data-dcnode-id="4926" instrument_node="">i</span></mi></msub></mrow></math></span></span></span></span></span><span data-dcnode-id="4914" instrument_node="">where </span><em data-dcnode-id="4910"><span data-dcnode-id="4913" instrument_node="">Y</span><sub data-dcnode-id="4911"><span data-dcnode-id="4912" instrument_node="">i</span></sub></em><span data-dcnode-id="4909" instrument_node=""> is the education outcome variable that we are interested in. In this paper, we consider three different outcomes, including standardized test scores, parental overall satisfaction, and parental assessment of the school quality. </span><em data-dcnode-id="4905"><span data-dcnode-id="4908" instrument_node="">M</span><sub data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">i</span></sub></em><span data-dcnode-id="4904" instrument_node=""> is a dummy variable for the type of school, which equals to 1 if student </span><em data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">i</span></em><span data-dcnode-id="4901" instrument_node=""> is enrolled in a migrant school, 0 if in a public school. </span><em data-dcnode-id="4897"><span data-dcnode-id="4900" instrument_node="">X</span><sub data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">i</span></sub></em><span data-dcnode-id="4896" instrument_node=""> is a vector of control variables including student and parental characteristics, such as age, gender of the student, parental education and family income. </span><em data-dcnode-id="4894"><span data-dcnode-id="4895" instrument_node="">ε</span></em><sub data-dcnode-id="4891"><em data-dcnode-id="4892"><span data-dcnode-id="4893" instrument_node="">i</span></em></sub><span data-dcnode-id="4890" instrument_node=""> is the error term which includes all other factors that also affect the educational outcome. In our empirical work, we cluster the error term at the class level to capture within-class correlations in </span><em data-dcnode-id="4888"><span data-dcnode-id="4889" instrument_node="">ε</span></em><sub data-dcnode-id="4885"><em data-dcnode-id="4886"><span data-dcnode-id="4887" instrument_node="">i</span></em></sub><span data-dcnode-id="4884" instrument_node="">.</span></p><p data-dcnode-id="4721" id="p0255"><span data-dcnode-id="4882" instrument_node="">Because school type is not exogenous and there is selection into public or migrant schools, we adopt an instrumental variables (IV) approach and formally model the school selection process as follows.</span><span class="display" data-dcnode-id="4763"><span class="formula" data-dcnode-id="4764" id="fo0010"><span class="label" data-dcnode-id="4880"><span data-dcnode-id="4881" instrument_node="">(2)</span></span><span class="math" data-dcnode-id="4765"><span class="MathJax_Preview" data-dcnode-id="4879" style=""></span><span class="MathJax_SVG" data-dcnode-id="4768" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mi is _node="">0</span></mn></msub><mo data-dcnode-id="4801" is="true"><span data-dcnode-id="4802" instrument_node="">+</span></mo><msub data-dcnode-id="4796" is="true"><mi data-dcnode-id="4799" is="true"><span data-dcnode-id="4800" instrument_node="">γ</span></mi><mn data-dcnode-id="4797" is="true"><span data-dcnode-id="4798" instrument_node="">1</span></mn></msub><msub data-dcnode-id="4791" is="true"><mi data-dcnode-id="4794" is="true"><span data-dcnode-id="4795" instrument_node="">Z</span></mi><mi data-dcnode-id="4792" is="true"><span data-dcnode-id="4793" instrument_node="">i</span></mi></msub><mo data-dcnode-id="4789" is="true"><span data-dcnode-id="4790" instrument_node="">+</span></mo><msub data-dcnode-id="4784" is="true"><mi data-dcnode-id="4787" is="true"><span data-dcnode-id="4788" instrument_node="">γ</span></mi><mn data-dcnode-id="4785" is="true"><span data-dcnode-id="4786" instrument_node="">2</span></mn></msub><msub data-dcnode-id="4779" is="true"><mi data-dcnode-id="4782" is="true"><span data-dcnode-id="4783" instrument_node="">X</span></mi><mi data-dcnode-id="4780" is="true"><span data-dcnode-id="4781" instrument_node="">i</span></mi></msub><mo data-dcnode-id="4777" is="true"><span data-dcnode-id="4778" instrument_node="">+</span></mo><msub data-dcnode-id="4772" is="true"><mi data-dcnode-id="4775" is="true"><span data-dcnode-id="4776" instrument_node="">ϑ</span></mi><mi data-dcnode-id="4773" is="true"><span data-dcnode-id="4774" instrument_node="">i</span></mi></msub></mrow></math></span></span></span></span></span><span data-dcnode-id="4762" instrument_node="">where </span><em data-dcnode-id="4758"><span data-dcnode-id="4761" instrument_node="">M</span><sub data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">i</span></sub></em><span data-dcnode-id="4757" instrument_node=""> is the dummy variables for the school type. </span><em data-dcnode-id="4753"><span data-dcnode-id="4756" instrument_node="">X</span><sub data-dcnode-id="4754"><span data-dcnode-id="4755" instrument_node="">i</span></sub></em><span data-dcnode-id="4752" instrument_node=""> is the same vector of control variables as in Eq.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="4750" href="#fo0005" name="bfo0005"><span data-dcnode-id="4751" instrument_node="">(1)</span></a><span data-dcnode-id="4749" instrument_node="">. </span><em data-dcnode-id="4745"><span data-dcnode-id="4748" instrument_node="">Z</span><sub data-dcnode-id="4746"><span data-dcnode-id="4747" instrument_node="">i</span></sub></em><span data-dcnode-id="4744" instrument_node=""> is a vector of instruments. Together, Eqs.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="4742" href="#fo0005" name="bfo0005"><span data-dcnode-id="4743" instrument_node="">(1)</span></a><span data-dcnode-id="4741" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4739" href="#fo0010" name="bfo0010"><span data-dcnode-id="4740" instrument_node="">(2)</span></a><span data-dcnode-id="4738" instrument_node=""> constitute the instrumental variables method of our empirical model. In order to estimate </span><em data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">β</span></em><sub data-dcnode-id="4734"><span data-dcnode-id="4735" instrument_node="">1</span></sub><span data-dcnode-id="4733" instrument_node=""> consistently, we need our instruments </span><em data-dcnode-id="4729"><span data-dcnode-id="4732" instrument_node="">Z</span><sub data-dcnode-id="4730"><span data-dcnode-id="4731" instrument_node="">i</span></sub></em><span data-dcnode-id="4728" instrument_node=""> to affect the school type choice but be uncorrelated with the error term </span><em data-dcnode-id="4726"><span data-dcnode-id="4727" instrument_node="">ε</span></em><sub data-dcnode-id="4723"><em data-dcnode-id="4724"><span data-dcnode-id="4725" instrument_node="">i</span></em></sub><span data-dcnode-id="4722" instrument_node="">.</span></p><p data-dcnode-id="4711" id="p0100"><span data-dcnode-id="4720" instrument_node="">When the test score is used as the outcome variable, the coefficient </span><em data-dcnode-id="4718"><span data-dcnode-id="4719" instrument_node="">β</span></em><sub data-dcnode-id="4716"><span data-dcnode-id="4717" instrument_node="">1</span></sub><span data-dcnode-id="4715" instrument_node=""> corresponds to the test score gain if a migrant student is reassigned to a public school, holding everything else unchanged. It captures the overall test score difference between migrant schools and public schools and reflects effects of various factors both at the school level, such as the quality of school administrators and school infrastructures, and at the class level, such as the qualities of teachers and classmates. This paper does not try to disentangle these effects for the following reasons. First, from the viewpoint of identification, it would be difficult to separate those effects given that the variations between public schools and migrant schools far outweigh the variations within public or migrant schools. In another word, migrant schools are much worse than public schools virtually in all observed dimensions, thus it would be difficult to attribute the overall test score gap to any specific factors. Second, there might be important interacting effects between school type and various factors at the school and class levels. Third, it is well-known in the education literature that many important determinants of education quality are difficult to observe or measure for outside researchers. For example, </span><a class="workspace-trigger" data-dcnode-id="4713" href="#bb0070" name="bbb0070"><span data-dcnode-id="4714" instrument_node="">Rivkin, Hanushek, and Kain (2005)</span></a><span data-dcnode-id="4712" instrument_node=""> provide evidence that teacher quality is important in explaining variations in test scores, despite that observed teacher characteristics such as education and teaching experience have little explanatory power.</span></p><div data-dcnode-id="4558"><p data-dcnode-id="4696" id="p0105"><a class="workspace-trigger" data-dcnode-id="4709" href="#t0005" name="bt0005"><span data-dcnode-id="4710" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="4708" instrument_node=""> shows some suggestive evidence on the relative quality of teachers in migrant schools as compared to public schools. Teachers in migrant schools are considerably less experienced, with 23% of them having less than 3</span><span data-dcnode-id="4706" instrument_node="">&nbsp;</span><span data-dcnode-id="4704" instrument_node="">years' experience, while the corresponding percentage in public schools is only 4%. 85% of teachers in public schools have more than 10</span><span data-dcnode-id="4702" instrument_node="">&nbsp;</span><span data-dcnode-id="4700" instrument_node="">years' experience, while only 28% of migrant school teachers have similar experience. In terms of education, 58% of teachers in public schools have at least college education while only 16% of all teachers in migrant schools do. Teachers of migrant schools also earn much less than their counterparts in public schools, with 81% of them earning less than RMB3000 per month. In sharp contrast, over 70% of teachers in public schools earn more than RMB5000 and virtually no one earns less than RMB3000. Considering that public school teachers also enjoy much better fringe benefits and job security, the overall gap in terms of compensation is even larger. This at least partially reflects the productivity difference between teachers in migrant and public schools (see e.g. </span><a class="workspace-trigger" data-dcnode-id="4698" href="#bb0015" name="bbb0015"><span data-dcnode-id="4699" instrument_node="">Card &amp; Krueger, 1992</span></a><span data-dcnode-id="4697" instrument_node="">).</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="4559" id="t0005"><span class="captions" data-dcnode-id="4688"><span data-dcnode-id="4689" id="ca0005"><p data-dcnode-id="4690" id="sp0010"><span class="label" data-dcnode-id="4694"><span data-dcnode-id="4695" instrument_node="">Table&nbsp;1</span></span><span data-dcnode-id="4693" instrument_node="">. </span><span data-dcnode-id="4691" instrument_node="">Characteristics of teachers.</span></p></span></span><div class="groups" data-dcnode-id="4563"><table data-dcnode-id="4564"><thead data-dcnode-id="4681"><tr class="valign-top rowsep-1" data-dcnode-id="4682"><th data-dcnode-id="4687" scope="col"></th><th class="align-left" data-dcnode-id="4685" scope="col"><span data-dcnode-id="4686" instrument_node="">Public schools</span></th><th class="align-left" data-dcnode-id="4683" scope="col"><span data-dcnode-id="4684" instrument_node="">Migrant schools</span></th></tr></thead><tbody data-dcnode-id="4565"><tr class="valign-top" data-dcnode-id="4676"><td class="align-left" data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">Teaching experience (years)</span></td><td data-dcnode-id="4678"></td><td data-dcnode-id="4677"></td></tr><tr class="valign-top" data-dcnode-id="4663"><td class="align-left" data-dcnode-id="4668"><span data-dcnode-id="4675" instrument_node="">&nbsp;</span><span data-dcnode-id="4673" instrument_node="">Less than 3</span><span data-dcnode-id="4671" instrument_node="">&nbsp;</span><span data-dcnode-id="4669" instrument_node="">years</span></td><td class="align-char" data-dcnode-id="4666"><span data-dcnode-id="4667" instrument_node="">4%</span></td><td class="align-char" data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">23%</span></td></tr><tr class="valign-top" data-dcnode-id="4650"><td class="align-left" data-dcnode-id="4655"><span data-dcnode-id="4662" instrument_node="">&nbsp;</span><span data-dcnode-id="4660" instrument_node="">3 to 10</span><span data-dcnode-id="4658" instrument_node="">&nbsp;</span><span data-dcnode-id="4656" instrument_node="">years</span></td><td class="align-char" ant schools. Among the three groups, Shanghai students have the highest test scores on average in both Chinese and Mathematics. Within public schools, Shanghai students on average score around 3 points higher than migrant students in both subjects. However, these differences are much less pronounced compared to the differences between migrant students in and out of public schools. Average Chinese score for migrant students in public schools is higher than that of migrant students in migrant schools by 10.6 points. The corresponding test score gap in Mathematics is 16.0 points, or slightly over one standard deviation in terms of the distribution of Mathematics scores for Shanghai students in public schools.</span><a class="workspace-trigger" data-dcnode-id="4532" href="#fn0045" name="bfn0045"><sup data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">9</span></sup></a><span data-dcnode-id="4531" instrument_node=""> The test scores of students in migrant schools are also more dispersed, as shown in </span><a class="workspace-trigger" data-dcnode-id="4529" href="#f0005" name="bf0005"><span data-dcnode-id="4530" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="4528" instrument_node="">.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="4198" id="t0010"><span class="captions" data-dcnode-id="4519"><span data-dcnode-id="4520" id="ca0010"><p data-dcnode-id="4521" id="sp0020"><span class="label" data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">Table&nbsp;2</span></span><span data-dcnode-id="4524" instrument_node="">. </span><span data-dcnode-id="4522" instrument_node="">Summary statistics.</span></p></span></span><div class="groups" data-dcnode-id="4202"><table data-dcnode-id="4203"><thead data-dcnode-id="4507"><tr class="valign-top rowsep-1" data-dcnode-id="4513"><th data-dcnode-id="4518" rowspan="2" scope="col"></th><th class="align-left" colspan="2" data-dcnode-id="4516" scope="col"><span data-dc p><p></p></div><figure class="figure text-xs" data-dcnode-id="4179" id="f0005"><span data-dcnode-id="4188"><img alt="" aria-describedby="ca0045" data-dcnode-id="4197" height="464" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X13000400-gr1.jpg&amp;raw"><span data-dcnode-id="4196" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4189"><li data-dcnode-id="4190"><a class="anchor download-link u-font-sans" data-dcnode-id="4191" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1043951X13000400-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4192"><span data-dcnode-id="4195" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4180"><span data-dcnode-id="4181" id="ca0045"><p data-dcnode-id="4182" id="sp0090"><span class="label" data-dcnode-id="4186"><span data-dcnode-id="4187" instrument_node="">Fig.&nbsp;1</span></span><span data-dcnode-id="4185" instrument_node="">. </span><span data-dcnode-id="4183" instrument_node="">Histogram of standardized test scores.</span></p></span></span></figure></div><p data-dcnode-id="4174" id="p0115"><a class="workspace-trigger" data-dcnode-id="4176" href="#t0010" name="bt0010"><span data-dcnode-id="4177" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="4175" instrument_node=""> also presents two more subjective measures of educational outcome. All parents are asked about the overall satisfaction level about the school their children attend. Among the three groups, parents of migrant children in public schools are the most satisfied, with 45% of them reporting “very satisfied”. For parents of Shanghai students and parents of migrant children in migrant schools, the percentages of reporting “very satisfied” are only 27% and 22%, respectively. For parents of migrant children, we have also asked them to directly assess the quality of schools as compared to the average-quality schools in their home town. Around 79% of migrant parents from public schools report that the current school qualities are better than schools from their hometown, while only 45% of migrant parents from migrant schools report the same.</span></p><p data-dcnode-id="4172" id="p0120"><span data-dcnode-id="4173" instrument_node="">In terms of student characteristics, compared to Shanghai students, migrant students are older, more likely to be boys with siblings, and less likely to have attended kindergarten. This is especially so for migrant students from migrant schools. Parents of migrant students from migrant schools have significantly lower levels of education and lower family incomes than migrant parents from public schools. Shanghai parents have much higher education levels than migrant parents, but their family incomes do not differ much from migrant parents in public schools. It is important to note that the public schools we have selected are in the lower end of the distribution in terms of school quality among all public schools in Shanghai. Parents of Shanghai students from these public schools are thus of relatively lower social economic status as compared to other Shanghai parents who could transfer their students to better schools.</span></p><p data-dcnode-id="4170" id="p0125"><span data-dcnode-id="4171" instrument_node="">Lastly, migrant students in migrant schools and public schools differ significantly in terms of the composition of province of origin. Students from Jiangsu, a developed province adjacent to Shanghai, are more likely to enter public schools. The opposite is true for students from Anhui, a relatively undeveloped province and a major migrant-sending region. Similarly, students from Sichuan are also more likely to be in migrant schools.</span></p><p data-dcnode-id="4168" id="p0130"><span data-dcnode-id="4169" instrument_node="">Overall, comparisons between migrant children in public schools and migrant schools in terms of student and family characteristics suggest there might exist substantial nonrandom selection into different types of schools. Therefore, one cannot simply compare educational outcomes of migrant students from the two types of schools. Instead, it is necessary to first understand the process through which migrant parents choose different types of schools, which we do in the next subsection.</span></p></section><section data-dcnode-id="3634" id="s0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4161" id="st0055"><span data-dcnode-id="4166" instrument_node="">4.2</span><span data-dcnode-id="4164" instrument_node="">. </span><span data-dcnode-id="4162" instrument_node="">The school choices of migrant children</span></h3><div data-dcnode-id="3906"><p data-dcnode-id="4148" id="p0135"><a class="workspace-trigger" data-dcnode-id="4159" href="#t0015" name="bt0015"><span data-dcnode-id="4160" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="4158" instrument_node=""> displays the linear probability regression results for migrant students in public and migrant schools in terms of their school type choices, as stated in Eq.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="4156" href="#fo0010" name="bfo0010"><span data-dcnode-id="4157" instrument_node="">(2)</span></a><span data-dcnode-id="4155" instrument_node="">. Student characteristics included on the right-hand side are </span><em data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">HuKou</span></em><span data-dcnode-id="4152" instrument_node=""> status (rural or urban), gender, age, whether he/she is a single child, whether he/she has attended kindergarten and daily time spent on homework. Parental characteristics included are number of years since parents first migrated, parental education levels, family income, father's occupation and province of origin. Not surprisingly, if a student has urban </span><em data-dcnode-id="4150"><span data-dcnode-id="4151" instrument_node="">HuKou</span></em><span data-dcnode-id="4149" instrument_node="">, is the only child in his/her family, and has attended kindergarten, then he/she is more likely to enter public schools. Family income and mother's education are also positively associated with the probability of enrolling in public schools.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="3907" id="t0015"><span class="captions" data-dcnode-id="4140"><span data-dcnode-id="4141" id="ca0015"><p data-dcnode-id="4142" id="sp0030"><span class="label" data-dcnode-id="4146"><span data-dcnode-id="4147" instrument_node="">Table&nbsp;3</span></span><span data-dcnode-id="4145" instrument_node="">. </span><span data-dcnode-id="4143" instrument_node="">Regression results for whether a migrant student is enrolled in a migrant school.</span></p></span></span><div class="groups" data-dcnode-id="3916"><table data-dcnode-id="3917"><thead data-dcnode-id="4132"><tr class="valign-top rowsep-1" data-dcnode-id="4133"><th class="align-left" data-dcnode-id="4138" scope="col"><span data-dcnode-id="4139" instrument_node="">Variables</span></th><th class="align-left" data-dcnode-id="4136" scope="col"><span data-dcnode-id="4137" instrument_node="">Coefficients</span></th><th class="align-left" data-dcnode-id="4134" scope="col"><span data-dcnode-id="4135" instrument_node="">Standard errors</span></th></tr></thead><tbody data-dcnode-id="3918"><tr class="valign-top" data-dcnode-id="4123"><td class="align-left" data-dcnode-id="4128"><span data-dcnode-id="4131" instrument_node="">Rural </span><em data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">HuKou</span></em></td><td class="align-left" data-dcnode-id="4126"><span data-dcnode-id="41 t_node="">&nbsp;</span><span data-dcnode-id="3993" instrument_node="">RMB5000</span></td><td class="align-left" data-dcnode-id="3986"><span data-dcnode-id="3991" instrument_node="">−</span><span data-dcnode-id="3989" instrument_node="">&nbsp;</span><span data-dcnode-id="3987" instrument_node="">0.16***</span></td><td class="align-char" data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">(0.04)</span></td></tr><tr class="valign-top" data-dcnode-id="3972"><td class="align-left" data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">Father has high school education or above</span></td><td class="align-left" data-dcnode-id="3975"><span data-dcnode-id="3980" instrument_node="">−</span><span data-dcnode-id="3978" instrument_node="">&nbsp;</span><span data-dcnode-id="3976" instrument_node="">0.01</span></td><td class="align-char" data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">(0.02)</span></td></tr><tr class="valign-top" data-dcnode-id="3961"><td class="align-left" data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">Mother has high school education or above</span></td><td class="align-left" data-dcnode-id="3964"><span data-dcnode-id="3969" instrument_node="">−</span><span data-dcnode-id="3967" instrument_node="">&nbsp;</span><span data-dcnode-id="3965" instrument_node="">0.07**</span></td><td class="align-char" data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">(0.03)</span></td></tr><tr class="valign-top" data-dcnode-id="3950"><td class="align-left" data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">Living in a central district in 2008</span></td><td class="align-left" data-dcnode-id="3953"><span data-dcnode-id="3958" instrument_node="">−</span><span data-dcnode-id="3956" instrument_node="">&nbsp;</span><span data-dcnode-id="3954" instrument_node="">0.56***</span></td><td class="align-char" data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">(0.06)</span></td></tr><tr class="valign-top" data-dcnode-id="3943"><td class="align-left" data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">Living in a peripheral district in 2008</span></td><td class="align-left" data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">0.11***</span></td><td class="align-char" data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">(0.04)</span></td></tr><tr class="valign-top" data-dcnode-id="3937"><td class="align-left" data-dcnode-id="3941"><span data-dcnode-id="3942" instrument_node="">Number of observations</span></td><td class="align-left" data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">1633</span></td><td data-dcnode-id="3938"></td></tr><tr class="valign-top" data-dcnode-id="3931"><td class="align-left" data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">Province of origin dummies</span></td><td class="align-left" data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">Yes</span></td><td data-dcnode-id="3932"></td></tr><tr class="valign-top" data-dcnode-id="3925"><td class="align-left" data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">Father's occupation dummies</span></td><td class="align-left" data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">Yes</span></td><td data-dcnode-id="3926"></td></tr><tr class="valign-top" data-dcnode-id="3919"><td class="align-left" data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">Adjusted R-squared</span></td><td class="align-left" data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">0.442</span></td><td data-dcnode-id="3920"></td></tr></tbody></table></div><p class="legend" data-dcnode-id="3908"></p><p data-dcnode-id="3909" id="sp0035"><span data-dcnode-id="3915" instrument_node="">Note: Numbers reported in parentheses are standard errors clustered at the class level. ***, **, and * stand for statistical significance at the 1%, 5% and 10% level, respectively. Students in the omitted group are males with urban </span><em data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">HuKou</span></em><span data-dcnode-id="3912" instrument_node="">, no experience in kindergarten, daily homework time less than 1</span><span data-dcnode-id="3911" instrument_node="">&nbsp;</span><span data-dcnode-id="3910" instrument_node="">h, have siblings, with family monthly income less than RMB3000 and whose parents came to Shanghai after 2008.</span></p><p></p></div></div><p data-dcnode-id="3904" id="p0140"><span data-dcnode-id="3905" instrument_node="">In addition, we also include two variables on whether parents lived in a central or peripheral district of Shanghai in 2008 as instrument variables in the regression, with the omitted group being those who were not in Shanghai in 2008. Compared to those who were not in Shanghai in 2008, migrant students whose parents lived in a central district are 56% more likely to attend a public school, while those whose parents lived in a peripheral district are 11% more likely to enter a migrant school.</span></p><p data-dcnode-id="3902" id="p0145"><span data-dcnode-id="3903" instrument_node="">We choose parent living place in 2008 as the instrument because Shanghai government officially launched the “three-year action plan for the education of migrant children” at the end of 2008, which resulted in a complete shut-down of migrant schools in all central districts by 2011. Therefore, if a migrant child lived in a central district of Shanghai in 2008, then the probability of enrolling in a public school would be much higher than if he/she lived in a peripheral district in 2008. Under the assumption that migrant parents did not know about the policy change before it went into effect or that they did not respond to the policy change and chose to live in a central district for the sake of children's education, this provides a natural experiment on migrant students' school choices. In another word, our identification strategy utilizes the geographic variation (central vs. peripheral districts) in school types that are caused by exogenous policy changes.</span></p><div data-dcnode-id="3643"><p data-dcnode-id="3888" id="p0150"><span data-dcnode-id="3901" instrument_node="">More generally, our IV method would not work if parents' living arrangements are correlated with the error term in Eq.&nbsp;</span><a class="workspace-trigger" data-dcnode-id="3899" href="#fo0005" name="bfo0005"><span data-dcnode-id="3900" instrument_node="">(1)</span></a><span data-dcnode-id="3898" instrument_node="">. For example, if parents who care more about children's education are also more likely to live in a central district for whatever reason, then the IV estimates would also be upward-biased. We take this possibility seriously and investigate in detail what factors determine whether parents lived in a central district, restricting the sample to those who were in Shanghai in 2008. The results are reported in </span><a class="workspace-trigger" data-dcnode-id="3896" href="#t0020" name="bt0020"><span data-dcnode-id="3897" instrument_node="">Table&nbsp;4</span></a><span data-dcnode-id="3895" instrument_node="">. We find that the two most important predictors of whether migrants live in a central or peripheral district are 1) father's occupation, and 2) province of origin. Those working in the manufacturing sector are more likely to live in peripheral districts as factories are located away from the city center, while those working in the service sectors are more likely to live in a central district where population density is higher. Migrants from Anhui or Sichuan are also more likely to live in peripheral districts. This finding is consistent with our numerous personal conversations with migrants in Shanghai that suggest migrants' living location choices are primarily driven by where they could find employment opportunities. The existing literatures also suggest that migrant workers use township networks extensively in locating a job and a living place (</span><a class="workspace-trigger" data-dcnode-id="3893" href="#bb0025" name="bbb0025"><span data-dcnode-id="3894" instrument_node="">Chen et al., 2010</span></a><span data-dcnode-id="3892" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3890" href="#bb0095" name="bbb0095"><span data-dcnode-id="3891" instrument_node="">Zhao, 1999</span></a><span data-dcnode-id="3889" instrument_node="">).</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="3644" id="t0020"><span class="captions" data-dcnode-id="3880"><span data-dcnode-id="3881" id="ca0020"><p data-dcnode-id="3882" id="sp0040"><span class="label" data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">Table&nbsp;4</span></span><span data-dcnode-id="3885" instrument_node="">. </span><span data-dcnode-id="3883" instrument_node="">Probit results for whether a migrant student lived in a central district in 2008.</span></p></span></span><div class="groups" data-dcnode-id="3648"><table data-dcnode-id="3649"><thead data-dcnode-id="3872"><tr class="valign-top rowsep-1" data-dcnode-id="3873"><th class="align-left" data-dcnode-id="3878" scope="col"><span data-dcnode-id="3879" instrument_node="">Variables</span></th><th class="align-left" data-dcnode-id="3876" scope="col"><span data-dcnode-id="3877" instrument_node="">Coefficients</span></th><th class="align-left" data-dcnode-id="3874" scope="col"><span data-dcnode-id="3875" instrument_node="">Standard errors</span></th></tr></thead><tbody data-dcnode-id="3650"><tr class="valign-top" data-dcnode-id="3865"><td class="align-left" data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">Father is high school graduate or higher</span></td><td class="align-left" data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">0.05</span></td><td class="align-left" data-dcnode-id="3866"><span data-dcnode-id="3867
