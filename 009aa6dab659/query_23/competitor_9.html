</span><div class="comp-txt" data-dcnode-id="3652"><span data-dcnode-id="3663" instrument_node="">
</span><div class="field paragraph field_component_text_content odd-t text_long" data-dcnode-id="3654"><p data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">Millions of children are on the move. Some are driven from their homes by conflict, poverty or climate change; others leave in the hope of finding a better life. Far too many encounter danger, detention, deprivation and discrimination on their journeys, at destination or upon return.</span></p><span data-dcnode-id="3660" instrument_node="">
</span><p data-dcnode-id="3655"><span data-dcnode-id="3659" instrument_node="">It doesn’t&nbsp;have to be this way. The suffering and exclusion of migrant and displaced children is not only unacceptable, but also preventable. </span><strong data-dcnode-id="3657"><span data-dcnode-id="3658" instrument_node="">A child is a child, no matter why she leaves home, where she comes from, where she is, or how she got there.</span></strong><span data-dcnode-id="3656" instrument_node=""> Every child deserves protection, care and all the support and services she needs to thrive.</span></p></div><span data-dcnode-id="3653" instrument_node="">

</span><div class="field paragraph field_component_text_content odd-t text_long" data-dcnode-id="3556"><div data-dcnode-id="3557"><p data-dcnode-id="3559"><span data-dcnode-id="3569" instrument_node="">Yet, too often migrant and displaced children face numerous challenges in transit, at destination and upon return, often because they have few – or no – options to move through safe and regular pathways whether on their own or with their families. They may be forced into&nbsp;</span><a data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//e.infogram.com/protection/child-labour"><span data-dcnode-id="3568" instrument_node="">child labour</span></a><span data-dcnode-id="3566" instrument_node="">, pressed into&nbsp;</span><a data-dcnode-id="3564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//e.infogram.com/protection/child-marriage"><span data-dcnode-id="3565" instrument_node="">early marriage</span></a><span data-dcnode-id="3563" instrument_node="">, exposed to aggravated smuggling, subjected to human trafficking, and put at risk of violence and exploitation or. They often miss out on education and proper medical care, and don’t find it easy to feel at home in the communities they arrive in; trying to learn a new language and fit into a new culture can make things especially hard. These difficulties have lasting physical and psychological effects and can prevent children on the move from reaching their full potential. The challenges&nbsp;have been </span><a data-dcnode-id="3561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//e.infogram.com/migrant-refugee-internally-displaced-children%23migration-covid-pandemic" target="_self"><span data-dcnode-id="3562" instrument_node="">compounded by the COVID-19 pandemic</span></a><span data-dcnode-id="3560" instrument_node="">.</span></p><span data-dcnode-id="3558" instrument_node="">
</span></div></div><span data-dcnode-id="3555" instrument_node="">

</span><div class="text--block-content section-block-content" data-dcnode-id="3484"><span data-dcnode-id="3515" instrument_node="">
</span><div class="comp-txt" data-dcnode-id="3486"><span data-dcnode-id="3514" instrument_node="">
</span><div class="field paragraph field_component_text_content odd-t text_long" data-dcnode-id="3488"><div data-dcnode-id="3489"><p data-dcnode-id="3509"><span data-dcnode-id="3513" instrument_node="">Children should be safe from violence and be able to </span><a data-dcnode-id="3511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//e.infogram.com/protection/children-in-alternative-care" title="Children in alternative care"><span data-dcnode-id="3512" instrument_node="">grow up with their families</span></a><span data-dcnode-id="3510" instrument_node="">. They shouldn’t have to miss school or be scared to visit the doctor. They shouldn’t be discriminated against because of where they come from. They should be able to feel at home – wherever they find themselves and wherever home is.</span></p><span data-dcnode-id="3508" instrument_node="">
</span><blockquote data-dcnode-id="3503"><span data-dcnode-id="3507" instrument_node="">
</span><p data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">Children around the world, regardless of where they are from and why they have left their homes, should be treated the same</span></p><span data-dcnode-id="3504" instrument_node="">
</span></blockquote><span data-dcnode-id="3502" instrument_node="">
</span><p data-dcnode-id="3491"><span data-dcnode-id="3501" instrument_node="">UNICEF works around the world to help </span><a data-dcnode-id="3499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//e.infogram.com/media/110831/file/Children%2520on%2520the%2520Move_FINAL.pdf"><span data-dcnode-id="3500" instrument_node="">protect</span></a><span data-dcnode-id="3498" instrument_node=""> the rights of migrant and displaced children. We provide life-saving humanitarian supplies in refugee camps. We run child-friendly spaces – safe places where children on the move can play, where mothers can rest and feed their babies in private, where </span><a data-dcnode-id="3496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//e.infogram.com/protection/family-separation-during-crisis" title="Family separation during crisis"><span data-dcnode-id="3497" instrument_node="">separated families</span></a><span data-dcnode-id="3495" instrument_node=""> can reunite. We support national and local governments to put in place laws, policies, </span><a data-dcnode-id="3493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//e.infogram.com/protection/strengthening-child-protection-systems" title="Strengthening child protection systems"><span data-dcnode-id="3494" instrument_node="">systems</span></a><span data-dcnode-id="3492" instrument_node=""> and services that are inclusive of all children and address the specific needs of migrant and displaced children, helping them thrive.</span></p><span data-dcnode-id="3490" instrument_node="">
</span></div></div><span data-dcnode-id="3487" instrument_node="">
</span></div><span data-dcnode-id="3485" instrument_node="">

</span><div class="field paragraph field_component_text_content odd-t text_long" data-dcnode-id="3430"><div data-dcnode-id="3431"><p data-dcnode-id="3439"><span data-dcnode-id="3443" instrument_node="">UNICEF also collects, analyses and disseminates data and gathers evidence about the situation and individual experiences of children and young people on the move. We help keep families together. We work to end child immigration detention by helping governments put in place alternative community- and family-based solutions. We work with governments, the private sector and civil society. We empower children and youth on the move with cutting-edge solutions, partnering with them and </span><a data-dcnode-id="3441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//e.infogram.com/reports/talent-move"><span data-dcnode-id="3442" instrument_node="">making their voices heard</span></a><span data-dcnode-id="3440" instrument_node="">.</span></p><span data-dcnode-id="3438" instrument_node="">
</span><p data-dcnode-id="3433"><span data-dcnode-id="3437" instrument_node="">The solutions exist, and they’re attainable. Learn more about our </span><a data-dcnode-id="3435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//e.infogram.com/children-uprooted/agenda-for-action"><span data-dcnode-id="3436" instrument_node="">Agenda for Action</span></a><span data-dcnode-id="3434" instrument_node=""> to support children on the move.</span></p><span data-dcnode-id="3432" instrument_node="">
</span></div></div><span data-dcnode-id="3429" instrument_node="">

</span><div class="comp-txt" data-dcnode-id="3404"><span data-dcnode-id="3420" instrument_node="">
</span><div class="field paragraph field_component_text_content odd-t text_long" data-dcnode-id="3406"><div data-dcnode-id="3407"><h4 data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">The Global Refugee Compact</span></h4><span data-dcnode-id="3417" instrument_node="">
</span><p data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">The Global Refugee Compact is an international agreement that sets the building blocks for a stronger, more predictable and more equitable international response to large refugee situations. The Compact, adopted in 2018, gives the international community and host countries a roadmap to better include refugees in national systems, societies and economies, to enable them to contribute to their new communities and to secure their own futures. The four key objectives of the Compact are: to ease pressures on host countries; increase refugee self-reliance; expand access to resettlement and other solutions; and support conditions in countries of origin for refugees to return in safety and dignity.</span></p><span data-dcnode-id="3414" instrument_node="">
</span><p data-dcnode-id="3409"><span data-dcnode-id="3413" instrument_node="">UNICEF is strongly committed to the Global Compact on Refugees and is working to help reach its objectives. UNICEF has developed a ‘</span><a data-dcnode-id="3411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//e.infogram.com/emergencies/unhcr-unicef-blueprint" target="_blank"><span data-dcnode-id="3412" instrument_node="">Blueprint for Joint Action’</span></a><span data-dcnode-id="3410" instrument_node=""> with UNHCR to renew our common commitment to the rights of refugee children and the communities that host them, and to support their inclusion and access to vital services. The blueprint documents good practices from our work around the world in support of refugee children and young people, as well as those of host communities.</span></p><span data-dcnode-id="3408" instrument_node="">
</span></div></div><span data-dcnode-id="3405" instrument_node="">

</span><div class="field paragraph field_component_text_content odd-t text_long" data-dcnode-id="2857"><div data-dcnode-id="2858"><h4 data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">The Global Compact for&nbsp;Migration</span></h4><span data-dcnode-id="2868" instrument_node="">
</span><p data-dcnode-id="2860"><span data-dcnode-id="2867" instrument_node="">The Global Compact for Safe, Orderly and Regular Migration is a landmark agreement that for the first time recognizes that children are central to migration management. It shows that UNICEF’s six-point </span><a data-dcnode-id="2865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/children-uprooted/agenda-for-action" target="_blank"><span data-dcnode-id="2866" instrument_node="">Agenda for Action</span></a><span data-dcnode-id="2864" instrument_node=""> is doable and provides a framework to bring it to life. UNICEF actively participated in the 18 months of negotiations that led to the </span><a data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//undocs.org/A/CONF.231/3" target="_blank"><span data-dcnode-id="2863" instrument_node="">final document</span></a><span data-dcnode-id="2861" instrument_node=""> – including by facilitating the active participation of young migrants in this process. The Compact was adopted at an intergovernmental conference in Marrakech, Morocco, in December 2018. UNICEF is working to translate the commitments that governments agreed to in the Compact document into real change and positive impact in the lives of children on the move around the world, including as a member of the UN Network on Migration.</span></p><span data-dcnode-id="2859" instrument_node="">

</span><a class="anchor-space" data-dcnode-id="2322" id="migration-covid-pandemic"></a><span data-dcnode-id="2321" instrument_node="">
</span></div><span data-dcnode-id="2319" instrument_node="">
</span></div><span data-dcnode-id="2317" instrument_node="">
</span><div class="field_component_sec_blocks-item even" data-dcnode-id="2288"><span data-dcnode-id="2316" instrument_node="">
</span><div class="text--block-content section-block-content" data-dcnode-id="2290"><span data-dcnode-id="2315" instrument_node="">
</span><div class="comp-txt" data-dcnode-id="2292"><span data-dcnode-id="2314" instrument_node="">
</span><div class="field paragraph field_component_text_content odd-t text_long" data-dcnode-id="2294"><div data-dcnode-id="2295"><h3 class="text-align-center" data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Uprooted children and COVID-19</span></h3><span data-dcnode-id="2311" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Migrant workers, refugees and their families often live in the most disadvantaged urban areas, where access to essential services is already limited – services under even heavier strain as COVID-19 has spread. Migrant and refugee children can also be confined in detention centres, live with disabilities, or be separated from their families, making them difficult to reach with accurate information in a language they understand.</span></p><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Compounding all this, misinformation on the spread of COVID-19 exacerbates the xenophobia and discrimination that migrant and displaced children and their families already faced.&nbsp;</span></p><span data-dcnode-id="2305" instrument_node="">
</span><p class="MsoPlainText" data-dcnode-id="2300"><span data-dcnode-id="2304" instrument_node="">As governments roll out the </span><a data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/coronavirus/what-you-need-to-know-covid-vaccine" target="_blank"><span data-dcnode-id="2303" instrument_node="">COVID-19 vaccines</span></a><span data-dcnode-id="2301" instrument_node="">, it is essential that all persons in a country have equitable access – including refugees, asylum seekers, internally displaced people and migrants. Inclusive vaccine plans and strategies are essential to reduce the death and disease burden of COVID-19.&nbsp;</span></p><span data-dcnode-id="2299" instrument_node="">
</span><p class="MsoPlainText" data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">Excluding migrants and displaced persons will have long-term&nbsp;consequences for social cohesion and stability. Not only does it present&nbsp;an immediate&nbsp;health risk for communities,&nbsp;but it also fuels xenophobia&nbsp;and&nbsp;stigma&nbsp;that could unleash&nbsp;violence and further exclusion&nbsp;from services.&nbsp;In addition, many migrants are supporting the COVID-19 response at the frontline and play an important role in keeping essential sectors running. They are therefore essential for service continuity and socio-economic recovery from the pandemic.&nbsp;&nbsp;</span></p><span data-dcnode-id="2296" instrument_node="">
</span></div></div><span data-dcnode-id="2293" instrument_node="">
</span></div><span data-dcnode-id="2291" instrument_node="">
</span></div><span data-dcnode-id="2289" instrument_node="">
</span></div><span data-dcnode-id="2287" instrument_node="">
</span><div class="field_component_sec_blocks-item odd" data-dcnode-id="2280"><span data-dcnode-id="2286" instrument_node=""> </span><div class="paragraph paragraph--type--component-anchor paragraph--view-mode--default" data-dcnode-id="2282"><span data-dcnode-id="2285" instrument_node="">
</span><a class="anchor-space" data-dcnode-id="2284" id="migrants-climate-change"></a><span data-dcnode-id="2283" instrument_node="">
</span></div><span data-dcnode-id="2281" instrument_node="">
</span></div><span data-dcnode-id="2279" instrument_node="">
</span><div class="field_component_sec_blocks-item even" data-dcnode-id="2250"><span data-dcnode-id="2278" instrument_node="">
</span><div class="text--block-content section-block-content" data-dcnode-id="2252"><span data-dcnode-id="2277" instrument_node="">
</span><div class="comp-txt" data-dcnode-id="2254"><span data-dcnode-id="2276" instrument_node="">
</span><div class="field paragraph field_component_text_content odd-t text_long" data-dcnode-id="2256"><div data-dcnode-id="2257"><h3 class="MsoPlainText text-align-center" data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Children uprooted in a changing climate</span></h3><span data-dcnode-id="2273" instrument_node="">
</span><p class="MsoPlainText" data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">The climate is changing everywhere, but uprooted&nbsp;children and young people&nbsp;– whether living in protracted displacement, refugee camps, urban slums or bustling mega cities –&nbsp;are&nbsp;among the&nbsp;most exposed to its impacts, with the least access&nbsp;to essential services to build resilience.</span></p><span data-dcnode-id="2270" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Strengthening services and&nbsp;systems for children and young people who move, and ensuring safe migration is an option for children and young people affected by climate change, is essential. After all, safe and productive migration can be an important strategy in helping young people adapt. It is also critical that action is taken to minimize the risk of climate-related displacement, including by reducing global emissions and including children and young people on the move in resilience building efforts.</span></p><span data-dcnode-id="2267" instrument_node="">
</span><p class="MsoPlainText" data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">But children should not be viewed as passive bystanders in tackling these challenges. Children and young people uprooted can also be key agents for change. They have critical skills, experiences and ideas we need to better mitigate and adapt to climate change and must be partners in shaping solutions.</span></p><span data-dcnode-id="2264" instrument_node="">
</span><p class="MsoPlainText" data-dcnode-id="2259"><span data-dcnode-id="2263" instrument_node="">Read more about the impact of climate and UNICEF’s response </span><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/environment-and-climate-change/migration"><span data-dcnode-id="2262" instrument_node="">here</span></a><span data-dcnode-id="2260" instrument_node="">.</span></p><span data-dcnode-id="2258" instrument_node="">
