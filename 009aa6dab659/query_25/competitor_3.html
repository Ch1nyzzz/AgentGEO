</span><img alt="" class="wp-post-image" data-dcnode-id="718" height="1071" sizes="(max-width: 2500px) 100vw, 2500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.airbnb.com/wp-content/uploads/sites/4/2021/08/newsroomFeatured.jpg%3Ffit%3D2500%252C1071&amp;raw" srcset="https://news.airbnb.com/wp-content/uploads/sites/4/2021/08/newsroomFeatured.jpg?w=3003 3003w, https://news.airbnb.com/wp-content/uploads/sites/4/2021/08/newsroomFeatured.jpg?w=300 300w, https://news.airbnb.com/wp-content/uploads/sites/4/2021/08/newsroomFeatured.jpg?w=768 768w, https://news.airbnb.com/wp-content/uploads/sites/4/2021/08/newsroomFeatured.jpg?w=1024 1024w, https://news.airbnb.com/wp-content/uploads/sites/4/2021/08/newsroomFeatured.jpg?w=1536 1536w, https://news.airbnb.com/wp-content/uploads/sites/4/2021/08/newsroomFeatured.jpg?w=2048 2048w, https://news.airbnb.com/wp-content/uploads/sites/4/2021/08/newsroomFeatured.jpg?w=950 950w, https://news.airbnb.com/wp-content/uploads/sites/4/2021/08/newsroomFeatured.jpg?w=697 697w, https://news.airbnb.com/wp-content/uploads/sites/4/2021/08/newsroomFeatured.jpg?w=1000 1000w" tabindex="0" title="newsroomFeatured" width="2500"><a aria-label="button, download image" class="img-download-link" data-dcnode-id="717" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.airbnb.com/wp-content/uploads/sites/4/2021/08/newsroomFeatured.jpg"></a><span data-dcnode-id="716" instrument_node=""> </span></div><span data-dcnode-id="714" instrument_node="">

</span><div class="container post__contentContainer" data-dcnode-id="536"><span data-dcnode-id="707" instrument_node="">
</span><div class="post__entryContent" data-dcnode-id="616"><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="705" instrument_node="">Earlier this week, Airbnb.org and Airbnb announced that Airbnb.org will offer free, temporary housing to </span><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.airbnb.com/afghan-refugees/"><span data-dcnode-id="704" instrument_node="">20,000 Afghan refugees worldwide</span></a><span data-dcnode-id="702" instrument_node="">. These stays are being paid for through contributions to Airbnb.org from Airbnb and Brian Chesky, as well as donors to the </span><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.airbnb.com/refugee-fund/"><span data-dcnode-id="701" instrument_node="">Airbnb.org Refugee Fund</span></a><span data-dcnode-id="699" instrument_node="">.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Since the announcement, we have received enormous interest from people within the Airbnb community and beyond looking for ways to support Airbnb and Airbnb.org’s work with partner organizations to house Afghan refugees. In many cases, we have heard from people who want to offer their space free of charge.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">The response has been overwhelming and today we’re sharing more details on how people can help us expand on efforts to meet this unprecedented need for temporary, emergency stays for refugees arriving from Afghanistan:</span></p><span data-dcnode-id="691" instrument_node="">
</span><div class="wp-block-columns alignwide" data-dcnode-id="664"><span data-dcnode-id="690" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="680"><span data-dcnode-id="689" instrument_node="">
</span><h2 data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Host a refugee</span></h2><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Existing Airbnb Hosts and anyone with available space to offer can sign up to provide free or discounted stays to Afghan refugees. Airbnb waives all its fees on all refugee stays.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="682"></p><span data-dcnode-id="681" instrument_node="">
</span></div><span data-dcnode-id="679" instrument_node=""> </span><div class="wp-block-column" data-dcnode-id="666"><span data-dcnode-id="678" instrument_node="">
</span><h2 data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Donate</span></h2><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="674" instrument_node="">A lot of people, including existing Airbnb Hosts, are eager to help but, for a variety of reasons, might not be able to open their homes. Those who cannot open their homes, but are interested in supporting housing for Afghan refugees can donate to </span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//airbnb.org/refugees"><span data-dcnode-id="673" instrument_node="">Airbnb.org</span></a><span data-dcnode-id="671" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="668"></p><span data-dcnode-id="667" instrument_node="">
</span></div><span data-dcnode-id="665" instrument_node=""> </span></div><span data-dcnode-id="663" instrument_node=""> </span><p data-dcnode-id="658"><span data-dcnode-id="662" instrument_node="">More details on how to get involved can be found at </span><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//airbnb.org/refugees"><span data-dcnode-id="661" instrument_node="">Airbnb.org/refugees</span></a><span data-dcnode-id="659" instrument_node="">. Airbnb and Airbnb.org are covering the cost of 20,000 stays, but with your help, we can do even more.&nbsp;</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">While Airbnb.org, with Airbnb’s support, has committed to cover the cost of housing 20,000 refugees worldwide, none of this would be possible without the help of the Airbnb Host community and Airbnb.org partners—including International Rescue Committee, HIAS and Church World Service, among others. As the situation on the ground in Afghanistan continues to evolve, Airbnb.org will continue to work closely with resettlement agencies and partners to go where the need goes, and evolve this initiative and support as necessary.</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">In addition, Airbnb.org and Airbnb are also extending support to the federal government and states and cities that have expressed interest in receiving refugees to help provide stays as needed.&nbsp;</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="650" instrument_node="">This week’s announcement builds on Airbnb.org’s support of refugees. Over the past four years, approximately 25,000 refugees have found temporary stays provided by the Airbnb.org community; and earlier this year, Airbnb.org announced the creation of a </span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.airbnb.com/refugee-fund/"><span data-dcnode-id="649" instrument_node="">$25 million Refugee Fund</span></a><span data-dcnode-id="647" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">We are deeply appreciative of Hosts who have stepped up to open their homes for free or at a discount and those who have offered to donate to the Refugee Fund. This support—as well as any additional generosity—will be used to build upon Airbnb.org’s initial commitment to help meet the emergency housing needs of 20,000 refugees.</span></p><span data-dcnode-id="642" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="641"><span data-dcnode-id="640" instrument_node="">
</span><h4 data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">About&nbsp;Airbnb.org</span></h4><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="618"><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//airbnb.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="636" instrument_node="">Airbnb.org</span></a><span data-dcnode-id="634" instrument_node="">&nbsp;is a nonprofit organization dedicated to facilitating temporary stays for people in times of crisis around the world.&nbsp;</span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//airbnb.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="633" instrument_node="">Airbnb.org</span></a><span data-dcnode-id="631" instrument_node="">&nbsp;operates independently and leverages Airbnb, Inc.’s technology, services, and other resources at no charge to carry out&nbsp;</span><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//airbnb.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="630" instrument_node="">Airbnb.org</span></a><span data-dcnode-id="628" instrument_node="">’s charitable purpose. The inspiration for&nbsp;</span><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//airbnb.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="627" instrument_node="">Airbnb.org</span></a><span data-dcnode-id="625" instrument_node="">&nbsp;began in 2012 with a single host named Shell who opened up her home to people impacted by Hurricane Sandy. This sparked a movement and marked the beginning of a program that allows Hosts on Airbnb to provide stays for people in times of need. Since then, the program has evolved to focus on emergency response and to help provide stays to evacuees, relief workers, refugees, asylum seekers, and most recently, frontline workers fighting the spread of COVID-19. Since then, Hosts have offered to open up their homes and helped provide accommodations to 75,000 people in times of need.&nbsp;</span><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//airbnb.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="624" instrument_node="">Airbnb.org</span></a><span data-dcnode-id="622" instrument_node="">&nbsp;is a separate and independent entity from Airbnb, Inc. Airbnb, Inc. does not charge service fees for&nbsp;</span><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//airbnb.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="621" instrument_node="">Airbnb.org</span></a><span data-dcnode-id="619" instrument_node="">&nbsp;supported stays on its platform.</span></p><span data-dcnode-id="617" instrument_node="">
</span></div><span data-dcnode-id="615" instrument_node="">

</span><h2 class="post__footerBoilerplateHeader" data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">
                About Airbnb
              </span></h2><span data-dcnode-id="529" instrument_node="">
</span><div class="post__footerBoilerplateText" data-dcnode-id="523"><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" data-sheets-userformat="{&quot;2&quot;:6529,&quot;3&quot;:{&quot;1&quot;:0,&quot;3&quot;:1},&quot;10&quot;:0,&quot;11&quot;:4,&quot;14&quot;:{&quot;1&quot;:3,&quot;3&quot;:1},&quot;15&quot;:&quot;Arial&quot;}" data-sheets-value="{&quot;1&quot;:2,&quot;2&quot;:&quot;Airbnb was born in 2007 when two Hosts welcomed three guests to their San Francisco home, and has since grown to 4 million Hosts who have welcomed more than 1 billion guest arrivals across over 220 countries and regions. Travel on Airbnb keeps more of the financial benefits of tourism with the people and places that make it happen. Airbnb has generated billions of dollars in earnings for Hosts, most of whom are individuals listing the homes in which they live. Among Hosts who report their gender, more than half are women, and one in five employed Hosts are either teachers or healthcare workers. Travel on Airbnb also has generated more than $4 billion in tax revenue around the world. Airbnb has helped advance more than 1,000 regulatory frameworks for short-term rentals, including in 80% of our top 200 geographies. In late 2020, to support our continued expansion and diversification, we launched the City Portal to provide governments with a one-stop shop that supports data sharing and compliance with local registration rules. We continue to invest in innovations and tools to support our ongoing work with governments around the world to advance travel that best serves communities.&quot;}"><span data-dcnode-id="527" instrument_node="">Airbnb was born in 2007 when two Hosts welcomed three guests to their San Francisco home, and has since grown to 4 million Hosts who have welcomed more than 1 billion guest arrivals across over 220 countries and regions. Travel on Airbnb keeps more of the financial benefits of tourism with the people and places that make it happen. Airbnb has generated billions of dollars in earnings for Hosts, most of whom are individuals listing the homes in which they live. Among Hosts who report their gender, more than half are women, and one in five employed Hosts are either teachers or healthcare workers. Travel on Airbnb also has generated more than $4 billion in tax revenue around the world. Airbnb has helped advance more than 1,000 regulatory frameworks for short-term rentals, including in 80% of our top 200 geographies. In late 2020, to support our continued expansion and diversification, we launched the City Portal to provide governments with a one-stop shop that supports data sharing and compliance with local registration rules. We continue to invest in innovations and tools to support our ongoing work with governments around the world to advance travel that best serves communities.</span></span></p><span data-dcnode-id="524" instrument_node="">
