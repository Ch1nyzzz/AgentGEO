</span><p data-dcnode-id="332"><span data-dcnode-id="345" instrument_node="">Thrift shops are a key part of helping refugees live better on a budget, while making their own choices. We are grateful for the shops run by several of our Supporting Organizations:&nbsp;</span><strong data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">IFCA Thrift Shop</span></strong><span data-dcnode-id="342" instrument_node="">, 95 Croton Avenue, Ossining (T/W/F 11-4, opens Apr 5); </span><strong data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Opportunity Shop</span></strong><span data-dcnode-id="339" instrument_node=""> (run by CSO in Briarcliff), 61 N. Greeley Avenue, Chappaqua (M-F 10-4); </span><strong data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">St. John’s Thrift Shop</span></strong><span data-dcnode-id="336" instrument_node=""> at St. John’s Episcopal Church, 7 Sunnyside Ave, Pleasantville (M/W/F 9-2, Sun 8-12). We invite you to support our many wonderful </span><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ossiningforrefugees.org/supporting-organizations/"><span data-dcnode-id="335" instrument_node="">Supporting Organizations</span></a><span data-dcnode-id="333" instrument_node="">!</span></p><span data-dcnode-id="331" instrument_node=""> </span></div><span data-dcnode-id="329" instrument_node="">

</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Ossining for Refugees began when Ossining resident Sofia Bator learned last summer that her cousin, whom we call F to protect her identity, was trapped in Afghanistan and in danger of being imprisoned or killed by the Taliban. With the help of local and national leaders including Greenburgh Town Supervisor Paul Feiner, US Congressman Mondaire Jones and US Senator Chuck Schumer, F was rescued from Kabul by US Marines in late August. Inspired by Sofia’s determination and F‘s rescue, Ossining Town Supervisor Dana Levenberg and community volunteer Ted Buerger invited local friends and neighbors to come together to assist F and others, welcoming them to our community. The community responded, and Ossining for Refugees was formed in October 2021.</span></p><span data-dcnode-id="300" instrument_node=""> </span></div><span data-dcnode-id="298" instrument_node="">
