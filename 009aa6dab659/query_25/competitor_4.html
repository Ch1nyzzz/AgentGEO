ackground-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;"><div class="fusion-sep-clear" data-dcnode-id="869"></div><div class="fusion-separator sep-none" data-dcnode-id="868" style="margin-top:40px;margin-bottom:40px;width:100%;max-width:200px;"></div><div class="fusion-testimonials clean fusion-testimonials-1" data-dcnode-id="852" data-random="0" data-speed="4250"><div class="reviews" data-dcnode-id="854"><div class="review no-avatar" data-dcnode-id="855"><blockquote data-dcnode-id="860" style="margin: -25px;background-color:rgba(255,255,255,0);"><q class="fusion-clearfix" data-dcnode-id="861" style="background-color:rgba(255,255,255,0);color:#ffffff;"><p data-dcnode-id="863"><span data-dcnode-id="864" style="font-weight: 400;"><span data-dcnode-id="865" instrument_node="">“Be[ing] integrated in your new country is very important. Part of that is also living in symbiosis with people who accept you in their Country. I love America and my American people. I [am] proud to be a part of [the] American people. I love my Country. May God continue to bless America.”</span></span></p><span data-dcnode-id="862" instrument_node=""> </span></q></blockquote><div class="author" data-dcnode-id="856" style="color:#ffffff;"><span class="company-name" data-dcnode-id="857"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Farmer Constant</span></strong></span></div></div></div><div class="testimonial-pagination" data-dcnode-id="853" id="fusion-testimonials-1"></div></div><div class="fusion-button-wrapper fusion-align-block" data-dcnode-id="846"><a class="fusion-button button-flat fusion-button-default-size button-default button-2 fusion-button-span-yes fusion-button-default-type" data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//plantitforward.farm/farms/%23contactus" target="_self"><span class="fusion-button-text" data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Join the mailing list</span></span></a></div><div class="fusion-clearfix" data-dcnode-id="845"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion_builder_column_1_2 fusion-builder-column-5 fusion-one-half fusion-column-last 1_2" data-dcnode-id="830" style="margin-top:0px;margin-bottom:52px;width:48%"><div class="fusion-column-wrapper" data-bg-url="" data-dcnode-id="831" style="background-color:#ffffff;padding: 26px 26px 25px 26px;background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;"><div class="fusion-menu-anchor" data-dcnode-id="842" id="prospective"></div><div class="fusion-title title fusion-title-2 fusion-sep-none fusion-title-text fusion-title-size-one" data-dcnode-id="838" style="margin-top:0px;margin-bottom:31px;"><h1 class="title-heading-left" data-dcnode-id="839" style="margin:0;"><span data-dcnode-id="840" instrument_node="">Prospective Farmers</span></h1></div><div class="fusion-sep-clear" data-dcnode-id="837"></div><div class="fusion-separator sep-single sep-solid" data-dcnode-id="836" style="border-color:#0054a4;border-top-width:3px;margin-top:0px;margin-bottom:40px;width:100%;max-width:200px;"></div><div class="fusion-text" data-dcnode-id="833"><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Since 2011 PIF has trained over 40 aspiring farmers to grow and sell for Houston markets. We invite anyone – and in particular new Americans – interested in becoming a professional grower to join us for regular workshops, demonstrations, and field days. Please join our mailing list as a “Prospective Farmer” to receive updates about current opportunities.</span></p></div><div class="fusion-clearfix" data-dcnode-id="832"></div></div></div></div></div><div class="fusion-fullwidth fullwidth-box fusion-builder-row-4 nonhundred-percent-fullwidth non-hundred-percent-height-scrolling" data-dcnode-id="419" style="background-color: #ffffff;background-position: center center;background-repeat: no-repeat;padding-top:0px;padding-right:30px;padding-bottom:0px;padding-left:30px;margin-top: 27px;"><div class="fusion-builder-row fusion-row" data-dcnode-id="420"><div class="fusion-layout-column fusion_builder_column fusion_builder_column_1_1 fusion-builder-column-6 fusion-one-full fusion-column-first fusion-column-last 1_1" data-dcnode-id="421" style="margin-top:0px;margin-bottom:20px;"><div class="fusion-column-wrapper" data-bg-url="" data-dcnode-id="422" style="padding: 0px 0px 0px 0px;background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;"><div class="fusion-menu-anchor" data-dcnode-id="827" id="faqs"></div><div class="fusion-title title fusion-title-3 fusion-sep-none fusion-title-text fusion-title-size-one" data-dcnode-id="823" style="margin-top:0px;margin-bottom:31px;"><h1 class="title-heading-left" data-dcnode-id="824" style="margin:0;"><span data-dcnode-id="825" instrument_node="">Frequently Asked Questions</span></h1></div><div class="fusion-faq-shortcode" data-dcnode-id="424"><ul class="fusion-filters clearfix" data-dcnode-id="814"><li class="fusion-filter fusion-active" data-dcnode-id="818"><a data-dcnode-id="819" data-filter=".farms" href="#"><span data-dcnode-id="820" instrument_node="">Farms &amp; Growing Practices</span></a></li><li class="fusion-filter fusion-hidden" data-dcnode-id="815"><a data-dcnode-id="816" data-filter=".general" href="#"><span data-dcnode-id="817" instrument_node="">General</span></a></li></ul><div class="fusion-faqs-wrapper" data-dcnode-id="425"><div class="accordian fusion-accordian" data-dcnode-id="426"><div class="panel-group" data-dcnode-id="427" id="accordian-1"><div class="fusion-panel panel-default fusion-faq-post fusion-faq-post-1805 general" data-dcnode-id="773"><span class="entry-title rich-snippet-hidden" data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">I want to start a community/school garden. Can you help?</span></span><span class="vcard rich-snippet-hidden" data-dcnode-id="808"><span class="fn" data-dcnode-id="809"><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/author/rachel/" rel="author" title="Posts by Rachel Folkerts"><span data-dcnode-id="811" instrument_node="">Rachel Folkerts</span></a></span></span><span class="updated rich-snippet-hidden" data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">2021-02-08T19:51:00+00:00</span></span><div class="panel-heading" data-dcnode-id="797"><h4 class="panel-title toggle" data-dcnode-id="798"><a class="collapsed" data-dcnode-id="799" data-parent="#accordian-1" data-target="#collapse-1-1805" data-toggle="collapse" href="#collapse-1-1805"><div class="fusion-toggle-icon-wrapper" data-dcnode-id="802"><div class="fusion-toggle-icon-wrapper-main" data-dcnode-id="803"><div class="fusion-toggle-icon-wrapper-sub" data-dcnode-id="804"><i class="fa-fusion-box" data-dcnode-id="805"></i></div></div></div><div class="fusion-toggle-heading" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">I want to start a community/school garden. Can you help?</span></div></a></h4></div><div class="panel-collapse collapse" data-dcnode-id="774" id="collapse-1-1805"><div class="panel-body toggle-content post-content" data-dcnode-id="775"><p data-dcnode-id="789"><span data-dcnode-id="796" instrument_node="">We </span><em data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">love</span></em><span data-dcnode-id="793" instrument_node=""> hearing about the great community gardening projects springing up across the city! Creating a healthier, greener Houston will take hard work and dedication from </span><em data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">many</span></em><span data-dcnode-id="790" instrument_node=""> community members. We applaud anyone willing to roll up their sleeves and pitch in.</span></p><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">While we love community gardening, at this time we do not have the capacity to assist with these projects. We put all our energy into advocating for, training, and supporting PIF farmers.</span></p><p data-dcnode-id="776"><span data-dcnode-id="786" instrument_node="">If you’re looking to get started with a school or community garden, we recommend that you reach out to our friends at </span><a aria-describedby="sk-tooltip-10400" class="c-link" data-dcnode-id="784" data-sk="tooltip_parent" data-stringify-link="https://www.urbanharvest.org/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.urbanharvest.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="785" instrument_node="">Urban Harvest. </span></a><span data-dcnode-id="783" instrument_node="">If you need general advice about gardening in Houston, check out the </span><a aria-describedby="sk-tooltip-10401" class="c-link" data-dcnode-id="781" data-sk="tooltip_parent" data-stringify-link="https://harris.agrilife.org/hort/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harris.agrilife.org/hort/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="782" instrument_node="">Horticulture resources available through AgriLife Extension. </span></a><span data-dcnode-id="780" instrument_node="">You can also get a copy of </span><a aria-describedby="sk-tooltip-10402" class="c-link" data-dcnode-id="778" data-sk="tooltip_parent" data-stringify-link="https://yearroundgardening.me/about/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//yearroundgardening.me/about/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="779" instrument_node="">Bob Randall’s book on year-round gardening for metro Houston </span></a><span data-dcnode-id="777" instrument_node="">– a great resource for any grower!</span></p></div></div></div><div class="fusion-panel panel-default fusion-faq-post fusion-faq-post-1803 farm-share-program general" data-dcnode-id="749"><span class="entry-title rich-snippet-hidden" data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Do you treat your produce with any chemical or other product to prevent wilting?&nbsp;</span></span><span class="vcard rich-snippet-hidden" data-dcnode-id="767"><span class="fn" data-dcnode-id="768"><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/author/rachel/" rel="author" title="Posts by Rachel Folkerts"><span data-dcnode-id="770" instrument_node="">Rachel Folkerts</span></a></span></span><span class="updated rich-snippet-hidden" data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">2020-11-09T03:15:03+00:00</span></span><div class="panel-heading" data-dcnode-id="756"><h4 class="panel-title toggle" data-dcnode-id="757"><a class="collapsed" data-dcnode-id="758" data-parent="#accordian-1" data-target="#collapse-1-1803" data-toggle="collapse" href="#collapse-1-1803"><div class="fusion-toggle-icon-wrapper" data-dcnode-id="761"><div class="fusion-toggle-icon-wrapper-main" data-dcnode-id="762"><div class="fusion-toggle-icon-wrapper-sub" data-dcnode-id="763"><i class="fa-fusion-box" data-dcnode-id="764"></i></div></div></div><div class="fusion-toggle-heading" data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Do you treat your produce with any chemical or other product to prevent wilting?&nbsp;</span></div></a></h4></div><div class="panel-collapse collapse" data-dcnode-id="750" id="collapse-1-1803"><div class="panel-body toggle-content post-content" data-dcnode-id="751"><p data-dcnode-id="752"><i data-dcnode-id="754" data-stringify-type="italic"><span data-dcnode-id="755" instrument_node="">No. </span></i><span data-dcnode-id="753" instrument_node="">Our produce stays fresh for a long time because we harvest it within hours of when you receive it. We follow organic and sustainable practices, so you never need to worry about the presence of chemicals in your produce.</span></p></div></div></div><div class="fusion-panel panel-default fusion-faq-post fusion-faq-post-1800 general" data-dcnode-id="698"><span class="entry-title rich-snippet-hidden" data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">I am concerned about produce contamination. Is your produce safe?&nbsp;</span></span><span class="vcard rich-snippet-hidden" data-dcnode-id="743"><span class="fn" data-dcnode-id="744"><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/author/rachel/" rel="author" title="Posts by Rachel Folkerts"><span data-dcnode-id="746" instrument_node="">Rachel Folkerts</span></a></span></span><span class="updated rich-snippet-hidden" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">2020-12-16T23:37:48+00:00</span></span><div class="panel-heading" data-dcnode-id="732"><h4 class="panel-title toggle" data-dcnode-id="733"><a class="collapsed" data-dcnode-id="734" data-parent="#accordian-1" data-target="#collapse-1-1800" data-toggle="collapse" href="#collapse-1-1800"><div class="fusion-toggle-icon-wrapper" data-dcnode-id="737"><div class="fusion-toggle-icon-wrapper-main" data-dcnode-id="738"><div class="fusion-toggle-icon-wrapper-sub" data-dcnode-id="739"><i class="fa-fusion-box" data-dcnode-id="740"></i></div></div></div><div class="fusion-toggle-heading" data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">I am concerned about produce contamination. Is your produce safe?&nbsp;</span></div></a></h4></div><div class="panel-collapse collapse" data-dcnode-id="699" id="collapse-1-1800"><div class="panel-body toggle-content post-content" data-dcnode-id="700"><p data-dcnode-id="725"><i data-dcnode-id="730" data-stringify-type="italic"><span data-dcnode-id="731" instrument_node="">Yes,&nbsp;</span></i><span data-dcnode-id="729" instrument_node="">PIF produce is safe</span><i data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">. </span></i><span data-dcnode-id="726" instrument_node="">Notably, many E.coli&nbsp;outbreaks occur because of field contamination originating from an animal source, such as a slaughterhouse. Our urban farms exist in an entirely different agricultural paradigm which makes this type of contamination impossible.</span></p><p data-dcnode-id="720"><span data-dcnode-id="724" instrument_node="">PIF produce travels from the farm to our wash/pack facility to you. Because of this short supply chain, our produce is not impacted by national-scale outbreaks of </span><i data-dcnode-id="722" data-stringify-type="italic"><span data-dcnode-id="723" instrument_node="">E.coli&nbsp;</span></i><span data-dcnode-id="721" instrument_node="">or other foodborne illnesses. Moreover, to ensure the health and safety of our customers we follow standards developed through FSMA (Food Safety Modernization Act) and GAP (Good Agricultural Practices). Both FSMA and GAP establish a set of industry-wide standards which certify that food coming out of the field is safe for consumption.</span></p><p data-dcnode-id="706"><span data-dcnode-id="719" instrument_node="">Some of our key food safety practices include:</span><br data-dcnode-id="718"><span data-dcnode-id="717" instrument_node=""> ·&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Daily washing and sanitizing of&nbsp;</span><i data-dcnode-id="715" data-stringify-type="italic"><span data-dcnode-id="716" instrument_node="">all&nbsp;</span></i><span data-dcnode-id="714" instrument_node="">surfaces that come into contact with produce.</span><br data-dcnode-id="713"><span data-dcnode-id="712" instrument_node=""> ·&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Use of&nbsp;</span><i data-dcnode-id="710" data-stringify-type="italic"><span data-dcnode-id="711" instrument_node="">clean&nbsp;</span></i><span data-dcnode-id="709" instrument_node="">water directly from the City of Houston in all on-farm irrigation and in our wash/pack facility.</span><br data-dcnode-id="708"><span data-dcnode-id="707" instrument_node=""> ·&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Frequent and thorough hand-washing, especially before handling produce.</span></p><p data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">If you still have questions about our practices, we encourage you to come see for yourself how we’re growing your food. Please reach out to </span><em data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">info@plant-it-forward.org</span></em><span data-dcnode-id="702" instrument_node=""> if you would like to schedule a visit.</span></p></div></div></div><div class="fusion-panel panel-default fusion-faq-post fusion-faq-post-1797 farms" data-dcnode-id="676"><span class="entry-title rich-snippet-hidden" data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Do you use GMO seed?</span></span><span class="vcard rich-snippet-hidden" data-dcnode-id="692"><span class="fn" data-dcnode-id="693"><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/author/rachel/" rel="author" title="Posts by Rachel Folkerts"><span data-dcnode-id="695" instrument_node="">Rachel Folkerts</span></a></span></span><span class="updated rich-snippet-hidden" data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">2021-02-08T22:55:48+00:00</span></span><div class="panel-heading" data-dcnode-id="681"><h4 class="panel-title toggle" data-dcnode-id="682"><a class="collapsed" data-dcnode-id="683" data-parent="#accordian-1" data-target="#collapse-1-1797" data-toggle="collapse" href="#collapse-1-1797"><div class="fusion-toggle-icon-wrapper" data-dcnode-id="686"><div class="fusion-toggle-icon-wrapper-main" data-dcnode-id="687"><div class="fusion-toggle-icon-wrapper-sub" data-dcnode-id="688"><i class="fa-fusion-box" data-dcnode-id="689"></i></div></div></div><div class="fusion-toggle-heading" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Do you use GMO seed?</span></div></a></h4></div><div class="panel-collapse collapse" data-dcnode-id="677" id="collapse-1-1797"><div class="panel-body toggle-content post-content" data-dcnode-id="678"><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">No. We follow organic best-practices, which prohibits use of GMOs. Most of our seeds are hybrid varieties and some are heirloom varieties.</span></p></div></div></div><div class="fusion-panel panel-default fusion-faq-post fusion-faq-post-1795 general" data-dcnode-id="632"><span class="entry-title rich-snippet-hidden" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">I would like to donate land to a new American farmer. Are you currently accepting land donations?</span></span><span class="vcard rich-snippet-hidden" data-dcnode-id="670"><span class="fn" data-dcnode-id="671"><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/author/rachel/" rel="author" title="Posts by Rachel Folkerts"><span data-dcnode-id="673" instrument_node="">Rachel Folkerts</span></a></span></span><span class="updated rich-snippet-hidden" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">2021-02-08T19:49:57+00:00</span></span><div class="panel-heading" data-dcnode-id="659"><h4 class="panel-title toggle" data-dcnode-id="660"><a class="collapsed" data-dcnode-id="661" data-parent="#accordian-1" data-target="#collapse-1-1795" data-toggle="collapse" href="#collapse-1-1795"><div class="fusion-toggle-icon-wrapper" data-dcnode-id="664"><div class="fusion-toggle-icon-wrapper-main" data-dcnode-id="665"><div class="fusion-toggle-icon-wrapper-sub" data-dcnode-id="666"><i class="fa-fusion-box" data-dcnode-id="667"></i></div></div></div><div class="fusion-toggle-heading" data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">I would like to donate land to a new American farmer. Are you currently accepting land donations?</span></div></a></h4></div><div class="panel-collapse collapse" data-dcnode-id="633" id="collapse-1-1795"><div class="panel-body toggle-content post-content" data-dcnode-id="634"><p data-dcnode-id="654"><span data-dcnode-id="658" instrument_node="">Yes! We are actively searching for a </span><b data-dcnode-id="656" data-stringify-type="bold"><span data-dcnode-id="657" instrument_node="">20+ acre site where we can establish a permanent farm site. </span></b><span data-dcnode-id="655" instrument_node="">If you are interested in donating land that meets these requirements, please reach out to us at liz@plant-it-forward.org.</span></p><p data-dcnode-id="651"><em data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Why will you only accept land donations of 20+ acres for long-term (i.e. 20+ year) use?</span></em></p><p data-dcnode-id="635"><span data-dcnode-id="650" instrument_node="">It’s true that our current sites are much smaller than 20-acres, and we do not have agreements for permanent site usage. However, going forward we are searching </span><em data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">only&nbsp;</span></em><span data-dcnode-id="647" instrument_node="">for land that meets these requirements.&nbsp;We made the decision shift our land acquisition strategy for several reasons:</span><br data-dcnode-id="646"><span data-dcnode-id="645" instrument_node=""> 1.&nbsp;&nbsp;&nbsp;&nbsp;The business of farming doesn’t work without stable land tenure. Farming is a long-term endeavor. For example, it takes&nbsp;</span><b data-dcnode-id="643" data-stringify-type="bold"><span data-dcnode-id="644" instrument_node="">at least 3-5 years&nbsp;</span></b><span data-dcnode-id="642" instrument_node="">to develop healthy soil on a new site. Creating a viable farm – let alone a space that can also serve the surrounding community as a greenspace – takes time, sweat, and money to develop. Economically, farm businesses don’t work when there isn’t stable and long-term land tenure.</span><br data-dcnode-id="641"><span data-dcnode-id="640" instrument_node=""> 2.&nbsp;&nbsp;&nbsp;&nbsp;Current PIF-network farmers seek to expand their current operations. Some farmers want to grow fruit, others want to establish a small chicken operation. While each individual has unique goals, most PIF-network farmers would like to manage 1-2 acres.</span><br data-dcnode-id="639"><span data-dcnode-id="638" instrument_node=""> 3.&nbsp;&nbsp;&nbsp;&nbsp;PIF-network farmers want to stay together as a farming community. PIF farmers enjoy the benefits that network cooperation provides, including the opportunity to learn from each other and access to shared resources.</span><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node=""> 4.&nbsp;&nbsp;&nbsp;&nbsp;There are many more new Americans who aspire to start their own farming business, and a larger site can provide these future farmers with the space they need to get started.</span></p></div></div></div><div class="fusion-panel panel-default fusion-faq-post fusion-faq-post-1793 farms farm-share-program" data-dcnode-id="604"><span class="entry-title rich-snippet-hidden" data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Do you grow fruit?</span></span><span class="vcard rich-snippet-hidden" data-dcnode-id="626"><span class="fn" data-dcnode-id="627"><a data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/author/rachel/" rel="author" title="Posts by Rachel Folkerts"><span data-dcnode-id="629" instrument_node="">Rachel Folkerts</span></a></span></span><span class="updated rich-snippet-hidden" data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">2021-01-24T02:08:02+00:00</span></span><div class="panel-heading" data-dcnode-id="615"><h4 class="panel-title toggle" data-dcnode-id="616"><a class="collapsed" data-dcnode-id="617" data-parent="#accordian-1" data-target="#collapse-1-1793" data-toggle="collapse" href="#collapse-1-1793"><div class="fusion-toggle-icon-wrapper" data-dcnode-id="620"><div class="fusion-toggle-icon-wrapper-main" data-dcnode-id="621"><div class="fusion-toggle-icon-wrapper-sub" data-dcnode-id="622"><i class="fa-fusion-box" data-dcnode-id="623"></i></div></div></div><div class="fusion-toggle-heading" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Do you grow fruit?</span></div></a></h4></div><div class="panel-collapse collapse" data-dcnode-id="605" id="collapse-1-1793"><div class="panel-body toggle-content post-content" data-dcnode-id="606"><p data-dcnode-id="607"><span data-dcnode-id="614" instrument_node="">We grow limited fruit, including figs and some melons. We would love to grow more, but at our small-scale the economics don’t work. Vegetables can be closely planted and mature quickly, making them profitable on a small farm. While we don’t currently grow fruit, we </span><i data-dcnode-id="612" data-stringify-type="italic"><span data-dcnode-id="613" instrument_node="">are&nbsp;</span></i><span data-dcnode-id="611" instrument_node="">able to provide fruit like citrus, apples, persimmons, and even mangoes in the Farm Share by sourcing in produce from other Texas regional farms.&nbsp;Read more about how and why we purchase sourced produce in our </span><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/portfolio-items/sourcing-policy/"><span data-dcnode-id="610" instrument_node="">Sourcing Policy</span></a><span data-dcnode-id="608" instrument_node="">.</span></p></div></div></div><div class="fusion-panel panel-default fusion-faq-post fusion-faq-post-1791 farm-share-program farms" data-dcnode-id="573"><span class="entry-title rich-snippet-hidden" data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Are you an organic farm?</span></span><span class="vcard rich-snippet-hidden" data-dcnode-id="598"><span class="fn" data-dcnode-id="599"><a data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/author/rachel/" rel="author" title="Posts by Rachel Folkerts"><span data-dcnode-id="601" instrument_node="">Rachel Folkerts</span></a></span></span><span class="updated rich-snippet-hidden" data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">2021-02-08T19:48:51+00:00</span></span><div class="panel-heading" data-dcnode-id="587"><h4 class="panel-title toggle" data-dcnode-id="588"><a class="collapsed" data-dcnode-id="589" data-parent="#accordian-1" data-target="#collapse-1-1791" data-toggle="collapse" href="#collapse-1-1791"><div class="fusion-toggle-icon-wrapper" data-dcnode-id="592"><div class="fusion-toggle-icon-wrapper-main" data-dcnode-id="593"><div class="fusion-toggle-icon-wrapper-sub" data-dcnode-id="594"><i class="fa-fusion-box" data-dcnode-id="595"></i></div></div></div><div class="fusion-toggle-heading" data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Are you an organic farm?</span></div></a></h4></div><div class="panel-collapse collapse" data-dcnode-id="574" id="collapse-1-1791"><div class="panel-body toggle-content post-content" data-dcnode-id="575"><p data-dcnode-id="576"><span data-dcnode-id="586" instrument_node="">We follow organic practices, however we are </span><i data-dcnode-id="584" data-stringify-type="italic"><span data-dcnode-id="585" instrument_node="">not </span></i><span data-dcnode-id="583" instrument_node="">Certified Organic by the USDA. This means that&nbsp;</span><b data-dcnode-id="581" data-stringify-type="bold"><span data-dcnode-id="582" instrument_node="">we do not use pesticides or herbicides that are harmful to the health of farmers, farm neighbors, or our customers.</span></b><span data-dcnode-id="580" instrument_node=""> We do not carry the “organic” label because at our current scale it does not make economic sense for PIF farmers to undergo the certification process. If you would like to visit a farm to learn more about our growing practices (including more details about how we manage weeds and pests), please join us for an upcoming </span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/fieldnotes/%23events"><span data-dcnode-id="579" instrument_node="">Farm Tour</span></a><span data-dcnode-id="577" instrument_node="">!</span></p></div></div></div><div class="fusion-panel panel-default fusion-faq-post fusion-faq-post-1787 general" data-dcnode-id="551"><span class="entry-title rich-snippet-hidden" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">How do you address food insecurity?</span></span><span class="vcard rich-snippet-hidden" data-dcnode-id="567"><span class="fn" data-dcnode-id="568"><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/author/rachel/" rel="author" title="Posts by Rachel Folkerts"><span data-dcnode-id="570" instrument_node="">Rachel Folkerts</span></a></span></span><span class="updated rich-snippet-hidden" data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">2020-08-14T18:24:53+00:00</span></span><div class="panel-heading" data-dcnode-id="556"><h4 class="panel-title toggle" data-dcnode-id="557"><a class="collapsed" data-dcnode-id="558" data-parent="#accordian-1" data-target="#collapse-1-1787" data-toggle="collapse" href="#collapse-1-1787"><div class="fusion-toggle-icon-wrapper" data-dcnode-id="561"><div class="fusion-toggle-icon-wrapper-main" data-dcnode-id="562"><div class="fusion-toggle-icon-wrapper-sub" data-dcnode-id="563"><i class="fa-fusion-box" data-dcnode-id="564"></i></div></div></div><div class="fusion-toggle-heading" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">How do you address food insecurity?</span></div></a></h4></div><div class="panel-collapse collapse" data-dcnode-id="552" id="collapse-1-1787"><div class="panel-body toggle-content post-content" data-dcnode-id="553"><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">In 2019 we became a partner in Urban Harvest’s DoubleUp Bucks initiative, which provides a 1:1 match for local food purchased using food stamps at designated locations. Effectively, this cuts the price of local food in half for families with SNAP benefits while continuing to provide the producer a fair price for their labor. The DoubleUp model has been successful in many cities across the country, and we hope to see more of this type of funding available in Houston in the future!</span></p></div></div></div><div class="fusion-panel panel-default fusion-faq-post fusion-faq-post-1784 general" data-dcnode-id="529"><span class="entry-title rich-snippet-hidden" data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">I have leaves that could be used as mulch on your farm. Do you want them?</span></span><span class="vcard rich-snippet-hidden" data-dcnode-id="545"><span class="fn" data-dcnode-id="546"><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/author/rachel/" rel="author" title="Posts by Rachel Folkerts"><span data-dcnode-id="548" instrument_node="">Rachel Folkerts</span></a></span></span><span class="updated rich-snippet-hidden" data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">2021-01-03T05:37:00+00:00</span></span><div class="panel-heading" data-dcnode-id="534"><h4 class="panel-title toggle" data-dcnode-id="535"><a class="collapsed" data-dcnode-id="536" data-parent="#accordian-1" data-target="#collapse-1-1784" data-toggle="collapse" href="#collapse-1-1784"><div class="fusion-toggle-icon-wrapper" data-dcnode-id="539"><div class="fusion-toggle-icon-wrapper-main" data-dcnode-id="540"><div class="fusion-toggle-icon-wrapper-sub" data-dcnode-id="541"><i class="fa-fusion-box" data-dcnode-id="542"></i></div></div></div><div class="fusion-toggle-heading" data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">I have leaves that could be used as mulch on your farm. Do you want them?</span></div></a></h4></div><div class="panel-collapse collapse" data-dcnode-id="530" id="collapse-1-1784"><div class="panel-body toggle-content post-content" data-dcnode-id="531"><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Sure! You’re welcome to bring them to any of our farm sites. Please make sure you connect with the farmer the first time you bring them so you know exactly where on the site to leave them. We cannot pick up from your house.</span></p></div></div></div><div class="fusion-panel panel-default fusion-faq-post fusion-faq-post-1781 general" data-dcnode-id="497"><span class="entry-title rich-snippet-hidden" data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Can I bring you my compostable waste?&nbsp;</span></span><span class="vcard rich-snippet-hidden" data-dcnode-id="523"><span class="fn" data-dcnode-id="524"><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/author/rachel/" rel="author" title="Posts by Rachel Folkerts"><span data-dcnode-id="526" instrument_node="">Rachel Folkerts</span></a></span></span><span class="updated rich-snippet-hidden" data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">2021-01-03T05:37:12+00:00</span></span><div class="panel-heading" data-dcnode-id="512"><h4 class="panel-title toggle" data-dcnode-id="513"><a class="collapsed" data-dcnode-id="514" data-parent="#accordian-1" data-target="#collapse-1-1781" data-toggle="collapse" href="#collapse-1-1781"><div class="fusion-toggle-icon-wrapper" data-dcnode-id="517"><div class="fusion-toggle-icon-wrapper-main" data-dcnode-id="518"><div class="fusion-toggle-icon-wrapper-sub" data-dcnode-id="519"><i class="fa-fusion-box" data-dcnode-id="520"></i></div></div></div><div class="fusion-toggle-heading" data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Can I bring you my compostable waste?&nbsp;</span></div></a></h4></div><div class="panel-collapse collapse" data-dcnode-id="498" id="collapse-1-1781"><div class="panel-body toggle-content post-content" data-dcnode-id="499"><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">At this time we are unable to accept compostable waste from the community. If you have a relationship with a PIF Farmer and they have given you permission to bring compostable waste directly to their farm, then of course you are welcome to do so!</span></p><p data-dcnode-id="500"><b data-dcnode-id="508" data-stringify-type="bold"><span data-dcnode-id="509" instrument_node="">If you’re looking for a sustainable alternative to throwing away your compostable waste,&nbsp;</span></b><span data-dcnode-id="507" instrument_node="">you can subscribe to a compost pick up service like&nbsp;</span><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happyearthcompost.com/" rel="noopener" target="_blank"><span data-dcnode-id="506" instrument_node="">Happy Earth Compost</span></a><span data-dcnode-id="504" instrument_node="">. You could also see if there is a community garden in your neighborhood that would accept your compostable waste.&nbsp;</span><a aria-describedby="sk-tooltip-9079" class="c-link" data-dcnode-id="502" data-sk="tooltip_parent" data-stringify-link="https://www.urbanharvest.org/gardens/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.urbanharvest.org/gardens/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="503" instrument_node="">Urban Harvest has a list</span></a><span data-dcnode-id="501" instrument_node="">&nbsp;of gardens in the area.</span></p></div></div></div><div class="fusion-panel panel-default fusion-faq-post fusion-faq-post-1333 farms" data-dcnode-id="475"><span class="entry-title rich-snippet-hidden" data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Are the farms operated year-round?</span></span><span class="vcard rich-snippet-hidden" data-dcnode-id="491"><span class="fn" data-dcnode-id="492"><a data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/author/daniellenewman/" rel="author" title="Posts by Claudia Nagle"><span data-dcnode-id="494" instrument_node="">Claudia Nagle</span></a></span></span><span class="updated rich-snippet-hidden" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">2020-08-14T18:30:16+00:00</span></span><div class="panel-heading" data-dcnode-id="480"><h4 class="panel-title toggle" data-dcnode-id="481"><a class="collapsed" data-dcnode-id="482" data-parent="#accordian-1" data-target="#collapse-1-1333" data-toggle="collapse" href="#collapse-1-1333"><div class="fusion-toggle-icon-wrapper" data-dcnode-id="485"><div class="fusion-toggle-icon-wrapper-main" data-dcnode-id="486"><div class="fusion-toggle-icon-wrapper-sub" data-dcnode-id="487"><i class="fa-fusion-box" data-dcnode-id="488"></i></div></div></div><div class="fusion-toggle-heading" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Are the farms operated year-round?</span></div></a></h4></div><div class="panel-collapse collapse" data-dcnode-id="476" id="collapse-1-1333"><div class="panel-body toggle-content post-content" data-dcnode-id="477"><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Yes!</span></p></div></div></div><div class="fusion-panel panel-default fusion-faq-post fusion-faq-post-1229 farms" data-dcnode-id="428"><span class="entry-title rich-snippet-hidden" data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">What are your growing and labor practices?</span></span><span class="vcard rich-snippet-hidden" data-dcnode-id="469"><span class="fn" data-dcnode-id="470"><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/author/daniellenewman/" rel="author" title="Posts by Claudia Nagle"><span data-dcnode-id="472" instrument_node="">Claudia Nagle</span></a></span></span><span class="updated rich-snippet-hidden" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">2021-01-03T17:22:23+00:00</span></span><div class="panel-heading" data-dcnode-id="458"><h4 class="panel-title toggle" data-dcnode-id="459"><a class="collapsed" data-dcnode-id="460" data-parent="#accordian-1" data-target="#collapse-1-1229" data-toggle="collapse" href="#collapse-1-1229"><div class="fusion-toggle-icon-wrapper" data-dcnode-id="463"><div class="fusion-toggle-icon-wrapper-main" data-dcnode-id="464"><div class="fusion-toggle-icon-wrapper-sub" data-dcnode-id="465"><i class="fa-fusion-box" data-dcnode-id="466"></i></div></div></div><div class="fusion-toggle-heading" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">What are your growing and labor practices?</span></div></a></h4></div><div class="panel-collapse collapse" data-dcnode-id="429" id="collapse-1-1229"><div class="panel-body toggle-content post-content" data-dcnode-id="430"><p data-dcnode-id="455"><span data-dcnode-id="456" style="font-weight: 400;"><span data-dcnode-id="457" instrument_node="">Our farmers grow employing traditional and sustainable methods with a bio-intensive approach that provides for high productivity per square foot.&nbsp;</span></span></p><ul data-dcnode-id="434"><li data-dcnode-id="450"><b data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Labor:</span></b><span data-dcnode-id="451" style="font-weight: 400;"><span data-dcnode-id="452" instrument_node=""> Our growing practices rely largely on hand labor and low-impact machinery. As needed, our farmers choose to contract labor with other growers, often drawing upon the local refugee community due to their agricultural experience.&nbsp;</span></span></li><li data-dcnode-id="445"><b data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Soil inputs:</span></b><span data-dcnode-id="446" style="font-weight: 400;"><span data-dcnode-id="447" instrument_node=""> We do not use any synthetic fertilizers. We apply compost several times a year. Our methods involve strong reliance on natural mulches to maintain biomass and protect an active soil microbiome.&nbsp;</span></span></li><li data-dcnode-id="440"><b data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Water:</span></b><span data-dcnode-id="441" style="font-weight: 400;"><span data-dcnode-id="442" instrument_node=""> We use city-supplied water at every step of our process, from growing to packing.&nbsp;</span></span></li><li data-dcnode-id="435"><b data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Pest management: </span></b><span data-dcnode-id="436" style="font-weight: 400;"><span data-dcnode-id="437" instrument_node="">Our primary pest management strategies are preventative, to include building healthy soil, installing healthy plants, and managing bio-diverse farms – growing a wide variety of plant species every season. Our pesticide use is extremely sparse. When we make the determination that pesticide use is warranted, the products we use are organic-certified.</span></span></li></ul><p data-dcnode-id="431"><a data-dcnode-id="432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plantitforward.farm/portfolio-items/farming-philosophy/"><span data-dcnode-id="433" instrument_node="">Read more about our farming philosophy here.</span></a></p></div></div></div></div></div></div></div><div class="fusion-clearfix" data-dcnode-id="423"></div></div></div></div></div><div class="fusion-bg-parallax" data-bg-align="center center" data-bg-color="#ffffff" data-bg-height="" data-bg-image="https://plantitforward.farm/wp-content/uploads/2020/04/subscribe_lettuce.jpg" data-bg-repeat="false" data-bg-width="" data-break_parents="0" data-dcnode-id="416" data-direction="down" data-mobile-enabled="false" data-mute="false" data-opacity="100" data-velocity="-0.3"></div><div class="fusion-fullwidth fullwidth-box fusion-builder-row-5 fusion-parallax-down nonhundred-percent-fullwidth non-hundred-percent-height-scrolling lazyloaded" data-bg="https://plantitforward.farm/wp-content/uploads/2020/04/subscribe_lettuce.jpg" data-dcnode-id="332" style="background-color: rgb(255, 255, 255); background-position: center center; background-repeat: no-repeat; padding: 35px 30px; border-top: 0px solid rgb(234, 233, 233); border-bottom: 0px solid rgb(234, 233, 233); border-right-color: rgb(234, 233, 233); border-left-color: rgb(234, 233, 233); background-size: cover; background-image: url(&quot;https://plantitforward.farm/wp-content/uploads/2020/04/subscribe_lettuce.jpg&quot;);"><div class="fusion-builder-row fusion-row" data-dcnode-id="333"><div class="fusion-layout-column fusion_builder_column fusion_builder_column_1_1 fusion-builder-column-7 fusion-one-full fusion-column-first fusion-column-last 1_1" data-dcnode-id="334" style="margin-top:0px;margin-bottom:20px;"><div class="fusion-column-wrapper" data-bg-url="" data-dcnode-id="335" style="padding: 0px 11% 0px 11%;background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;"><div class="fusion-menu-anchor" data-dcnode-id="415" id="contactus"></div><div class="fusion-text" data-dcnode-id="412"><h2 data-dcnode-id="413" style="text-align: center; color: #fff;"><span data-dcnode-id="414" instrument_node="">KEEP IN TOUCH</span></h2></div><div class="fusion-sep-clear" data-dcnode-id="411"></div><div class="fusion-separator sep-single sep-solid" data-dcnode-id="410" style="border-color:#0054a4;border-top-width:3px;margin-left: auto;margin-right: auto;margin-top:0px;margi
