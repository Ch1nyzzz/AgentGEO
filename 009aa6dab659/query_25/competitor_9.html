</path></svg></div></div></div></section><section class="body | w-100" data-dcnode-id="436"><div class="article-body | article w-100" data-dcnode-id="437"><p class="text | article-text" data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">FORT McCOY, Wis. (AP/WBAY) - Democratic Gov. Tony Evers was at Fort McCoy Wednesday meeting with refugees from Afghanistan and military commanders.</span></p><p class="text | article-text" data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">About 1,000 refugees from Afghanistan have arrived at Fort McCoy, and up to 10,000 could do so in the coming weeks, according to Republican U.S. Sen. Ron Johnson (R-Wisconsin), who met separately with officials at the base Wednesday morning.</span></p><p class="text | article-text" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Fort McCoy is one of three military installations nationwide that’s processing people being evacuated out of Afghanistan since the country fell to the Taliban. State lawmakers said many will eventually be resettled in other states.</span></p><p class="text | article-text" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Evers promised support to the refugees from the state, and the administration delivered clothing, diapers and other personal items from a partnership of the Department of Military Affairs and the Department of Children and Families.</span></p><div class="arc-ad | text-center article-inline-ad bg-light py-3 px-3-sm d-flex flex-column mt-3 mb-3 justify-content-center ad-type-flex-leaderboard" data-dcnode-id="485"><div class="arc-ad-wrapper | d-flex flex-column" data-dcnode-id="486"><div class="text-body text-uppercase mx-3 small" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Advertisement</span></div><div class="wbay/web/news/state arcad" data-dcnode-id="488" id="ad-n8dMhe1w6AB"></div><span data-dcnode-id="487" instrument_node=""></span></div></div><p class="text | article-text" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">The Wisconsin Department of Children and Families (DCF) says there are a number of ways people can help the refugees and the global response to the crisis in Afghanistan.</span></p><ul class="list | article-list" data-dcnode-id="467"><li data-dcnode-id="480"><span data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Donate clothing, personal hygiene products, furniture and other household goods</span></span></li><li data-dcnode-id="477"><span data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Fund-raising to financially support refugees with rent, clothes, utilities until they start work</span></span></li><li data-dcnode-id="474"><span data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Volunteer to help refugees with English skills, American customs, homework, and adapting to their community</span></span></li><li data-dcnode-id="471"><span data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Advocate with neighbors, coworkers, family and friends to support the refugees</span></span></li><li data-dcnode-id="468"><span data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Connect with refugee service providers if you know about affordable rental housing or family-supporting jobs that are available</span></span></li></ul><p class="text | article-text" data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">While Afghan refugees are still temporarily at Fort McCoy, their permanent homes are still to be determined.</span></p><p class="text | article-text" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">“Typically, because we have been doing this for a very long time there already are established relationships with local landlords in the area where refugees are being resettled,” Bojana Zorić Martinez, the Wisconsin state refugee coordinator for the DCF.</span></p><div class="arc-ad | text-center article-inline-ad bg-light py-3 px-3-sm d-flex flex-column mt-3 mb-3 justify-content-center ad-type-flex-leaderboard" data-dcnode-id="457"><div class="arc-ad-wrapper | d-flex flex-column" data-dcnode-id="458"><div class="text-body text-uppercase mx-3 small" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Advertisement</span></div><div class="wbay/web/news/state arcad" data-dcnode-id="460" id="ad-A27BrjH6PzD"></div><span data-dcnode-id="459" instrument_node=""></span></div></div><p class="text | article-text" data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">The Afghan refugees are just the latest in the line of global asylum seekers like people from the Democratic Republic of the Congo or Syria who moved to Wisconsin. Throughout the state, these refugees are helped by national and international resettlement programs, like World Relief, who have local connections for renting apartments, potential employers, or language classes in schools so that refugee children can integrate into their new classes more easily.</span></p><p class="text | article-text" data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">“We feel privileged and honored to welcome these people,” the director of World Relief Fox Valley, Tami McLaughlin, said. “We know they are here because of the circumstances that they come from but we also know that they have great opportunity and so much potential to add to our communities.”</span></p><p class="text | article-text" data-dcnode-id="441"><span data-dcnode-id="452" instrument_node="">The DCF has a </span><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dcf.wisconsin.gov/files/refugee/pdf/fundedagencies-rev0420.pdf" target="_blank"><b data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">list of refugee resettlement agencies</span></b></a><span data-dcnode-id="448" instrument_node=""> and service providers by county. You can contact the Bureau of Refugee Programs at </span><b data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">(414) 270-4702</span></b><span data-dcnode-id="445" instrument_node=""> or email </span><a data-dcnode-id="443" href="mailto:dcfrefugee@wisconsin.gov" target="_blank"><span data-dcnode-id="444" instrument_node="">dcfrefugee@wisconsin.gov</span></a><span data-dcnode-id="442" instrument_node=""> if you have questions about which organization to contact.</span></p><p class="text | article-text" data-dcnode-id="438"><i data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Copyright 2021 The Associated Press. All rights reserved. WBAY contributed to this report.</span></i></p></div></section><section class="recommendations | w-100" data-dcnode-id="284"><div data-dcnode-id="435" data-fusion-component="19972863-cd68-4bce-b54c-c63fc301fab2" id="fusion-static-enter:19972863-cd68-4bce-b54c-c63fc301fab2" style="display: none;"></div><div class="connatix | row mb-3" data-dcnode-id="430"><div class="my-3 col" data-dcnode-id="431"><div class="w-100 h-100" data-dcnode-id="432" id="connatix-highlights-embed"></div></div></div><div data-dcnode-id="429" data-fusion-component="19972863-cd68-4bce-b54c-c63fc301fab2" id="fusion-static-exit:19972863-cd68-4bce-b54c-c63fc301fab2" style="display: none;"></div><div class="outbrain-feed | mb-3 w-100 mw-100 overflow-x-hidden" data-dcnode-id="285"><div class="gray-ob-widget gray-ob-widget-1 mb-3" data-dcnode-id="291"><div class="OB-REACT-WRAPPER" data-dcnode-id="292"><div data-dcnode-id="380" id="ob_holder" style="display: none;"><iframe data-dcnode-id="381" id="ob_iframe" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.outbrain.com/widgetOBUserSync/obUserSync.html%23pid%3D1436%26dmpenabled%3Dtrue%26filterDMP%3D%26d%3D0MhkEUXRq7Th0tic0N0Fg58tBx1dB2Dfi5pI3o6juhz7Vu79jX1MyBb0ljGZXFza%26gdpr%3D0%26cmpNeeded%3Dfalse%26gdprVer%3Dnull%26ccpa%3D1---%26country%3DUS%26obRecsAbtestAndVars%3D1056-3297%2C896-27
