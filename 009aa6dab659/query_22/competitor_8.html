</span><span data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">06 April 2022</span></span><span data-dcnode-id="1376" instrument_node="">
</span><h3 data-dcnode-id="1373"><a data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refworld.org/docid/6239805f4.html"><span data-dcnode-id="1375" instrument_node="">UNHCR Position on Returns to Gaza</span></a></h3><span data-dcnode-id="1372" instrument_node="">
Against a background of serious allegations over violations and abuses of international human rights
and humanitarian law and the continued volatility of the situation, UNHCR calls on all countries to allow
civilians fleeing Gaza access to their territories and to ensure respect for the principle of nonrefoulement at all times. All claims for international protection need to be considered on their own merits according to fair and
efficient status determination procedures and up-to-date and relevant country of origin information.
</span></div><span data-dcnode-id="1370" instrument_node="">
</span><div class="item" data-dcnode-id="1361"><span data-dcnode-id="1369" instrument_node="">
</span><span data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">04 April 2022</span></span><span data-dcnode-id="1366" instrument_node="">
</span><h3 data-dcnode-id="1363"><a data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refworld.org/docid/623079204.html"><span data-dcnode-id="1365" instrument_node="">UNHCR Position on Returns to Ethiopia</span></a></h3><span data-dcnode-id="1362" instrument_node="">
As the situation in parts of Ethiopia remains fluid and uncertain, UNHCR calls on all countries to allow
civilians fleeing Ethiopia access to their territories and to ensure respect for the principle of nonrefoulement at all times.</span></div><span data-dcnode-id="1360" instrument_node="">
</span><div class="item" data-dcnode-id="1351"><span data-dcnode-id="1359" instrument_node="">
</span><span data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">29 March 2022</span></span><span data-dcnode-id="1356" instrument_node="">
</span><h3 data-dcnode-id="1353"><a data-dcnode-id="1354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refworld.org/docid/6241b39b4.html"><span data-dcnode-id="1355" instrument_node="">Effective processing of asylum applications: Practical considerations and practices</span></a></h3><span data-dcnode-id="1352" instrument_node="">
The primary goal of this paper is to document relevant options and measures initiated by national asylum
authorities - in countries with advanced asylum management practices - to ensure effective processing of
asylum applications, while upholding key protection principles and due process standards. The United
Nations High Commissioner for Refugees (UNHCR) encourages the adoption of such good practices, which
can then be contextualized at regional or national levels as part of practical and operational responses by
States to growing or larger population movements.</span></div><span data-dcnode-id="1350" instrument_node="">
</span><div class="item active" data-dcnode-id="1341"><span data-dcnode-id="1349" instrument_node="">
</span><span data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">01 March 2022</span></span><span data-dcnode-id="1346" instrument_node="">
</span><h3 data-dcnode-id="1343"><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refworld.org/docid/621de9894.html"><span data-dcnode-id="1345" instrument_node="">UNHCR Position on Returns to Ukraine</span></a></h3><span data-dcnode-id="1342" instrument_node="">
In March 2022, UNHCR published a position on returns to Ukraine, calling "on States to suspend the forcible return of nationals and former habitual residents of Ukraine" due to the volatile and fluctuating situation.</span></div><span data-dcnode-id="1340" instrument_node="">
</span><div class="item" data-dcnode-id="1331"><span data-dcnode-id="1339" instrument_node="">
</span><span data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">09 February 2022</span></span><span data-dcnode-id="1336" instrument_node="">
</span><h3 data-dcnode-id="1333"><a data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refworld.org/docid/61d851cd4.html"><span data-dcnode-id="1335" instrument_node="">UNHCR Guidance Note on the International Protection Needs of People Fleeing Afghanistan</span></a></h3><span data-dcnode-id="1332" instrument_node="">
As the situation in Afghanistan is volatile and may remain uncertain for some time to come, coupled
with a large-scale humanitarian emergency in the country, UNHCR continues to call on States to
suspend the forcible return of nationals and former habitual residents of Afghanistan, including those
who have had their asylum claims rejected. The bar on forcible return serves as a minimum standard
and needs to remain in place until such time as the security, rule of law, and human rights situation in
Afghanistan has significantly improved to permit a safe and dignified return of those determined not to
be in need of international protection.</span></div><span data-dcnode-id="1330" instrument_node="">
