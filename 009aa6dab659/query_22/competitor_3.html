</span><h2 class="abstract-title js-splitscreen-abstract-title" data-dcnode-id="1532" id="21984775" scrollto-destination="21984775"><span data-dcnode-id="1533" instrument_node="">Abstract</span></h2><span data-dcnode-id="1531" instrument_node="">
</span><section class="abstract" data-dcnode-id="1528"><p class="chapter-para" data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">In April 2006 the UNHCR published Guidelines on the application of the Refugees Convention to people who have been trafficked. While there is little doubt that trafficked people are subjected to serious violations of their basic rights and interests, the applicability of the Convention is problematic because they do not fit easily into any of the categories recognised by the Convention as giving rise to an entitlement to refugee status. The Guidelines adopt the definition of trafficking contained in the Palermo Protocol to the UN Convention on Transnational Organised Crime 2000. The various elements of the refugee definition are then analysed for their relevance to trafficking. The Guidelines show that the Refugees Convention may be applicable, but in limited cases, particularly through the possibility of victims of trafficking being members of a particular social group.</span></p></section><span data-dcnode-id="1527" instrument_node=""> </span><div class="article-metadata-panel clearfix at-ArticleMetadata" data-dcnode-id="1518"><div class="article-metadata-tocSections" data-dcnode-id="1519"><span data-dcnode-id="1526" instrument_node="">
</span><div class="article-metadata-tocSections-title" data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Issue Section:</span></div><span data-dcnode-id="1523" instrument_node="">
</span><a data-dcnode-id="1521" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/ijrl/search-results%3Ff_TocHeadingTitle%3DArticles"><span data-dcnode-id="1522" instrument_node="">Articles</span></a><span data-dcnode-id="1520" instrument_node="">
</span></div></div><span data-dcnode-id="1517" instrument_node="">
</span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="1515" id="21984776" scrollto-destination="21984776"><span data-dcnode-id="1516" instrument_node="">1. Introduction</span></h2><span data-dcnode-id="1514" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Trafficking in human beings (THB) is making big news. It is a worldwide phenomenon but has become particularly notorious in Europe since the collapse of the Soviet Union in 1989–91, which saw travel restrictions greatly relaxed and led to significant movements of people, generally from east to west, looking for employment opportunities. One consequence of this has been the development of trafficking networks that result in large numbers of people being forced to work for little or no money in harsh conditions and deprived of their freedom of movement. Some trafficking victims may also find themselves being forced into prostitution or working in criminal networks. This has elicited a legal response, both from the criminal law and the human rights perspectives – in other words, focussing on the traffickers' acts and the interests of their victims. This article discusses recent developments in this field and considers how refugee law may be used to assist victims of THB.</span></p><p class="chapter-para" data-dcnode-id="1494"><span data-dcnode-id="1511" instrument_node="">On 7 April 2006 the Office of the United Nations High Commissioner for Refugees (UNHCR) published guidelines aimed at assisting practitioners and decision-makers to apply the CSR51</span><span class="xrefLink" data-dcnode-id="1510" id="jumplink-fn1"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1508" data-google-interstitial="false" data-open="fn1" href="javascript:;" reveal-id="fn1"><span data-dcnode-id="1509" instrument_node="">1</span></a><span data-dcnode-id="1507" instrument_node=""> to particular situations.</span><span class="xrefLink" data-dcnode-id="1506" id="jumplink-fn2"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1504" data-google-interstitial="false" data-open="fn2" href="javascript:;" reveal-id="fn2"><span data-dcnode-id="1505" instrument_node="">2</span></a><span data-dcnode-id="1503" instrument_node=""> The ‘Guidelines on International Protection: The application of Article 1A(2) of the 1951 Convention and/or 1967 Protocol relating to the Status of Refugees to victims of trafficking and persons at risk of being trafficked’</span><span class="xrefLink" data-dcnode-id="1502" id="jumplink-fn3"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1500" data-google-interstitial="false" data-open="fn3" href="javascript:;" reveal-id="fn3"><span data-dcnode-id="1501" instrument_node="">3</span></a><span data-dcnode-id="1499" instrument_node=""> (Guidelines) are the latest in a flurry of soft law</span><span class="xrefLink" data-dcnode-id="1498" id="jumplink-fn4"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1496" data-google-interstitial="false" data-open="fn4" href="javascript:;" reveal-id="fn4"><span data-dcnode-id="1497" instrument_node="">4</span></a><span data-dcnode-id="1495" instrument_node=""> instruments and guidelines aimed at what has come to be perceived as a most serious threat to human rights.</span></p><p class="chapter-para" data-dcnode-id="1472"><span data-dcnode-id="1493" instrument_node="">THB is now generally defined by the Palermo Protocol</span><span class="xrefLink" data-dcnode-id="1492" id="jumplink-fn5"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1490" data-google-interstitial="false" data-open="fn5" href="javascript:;" reveal-id="fn5"><span data-dcnode-id="1491" instrument_node="">5</span></a><span data-dcnode-id="1489" instrument_node=""> to the United Nations Convention Against Transnational Organised Crime.</span><span class="xrefLink" data-dcnode-id="1488" id="jumplink-fn6"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1486" data-google-interstitial="false" data-open="fn6" href="javascript:;" reveal-id="fn6"><span data-dcnode-id="1487" instrument_node="">6</span></a><span data-dcnode-id="1485" instrument_node=""> The same definition is adopted in the 2005 Council of Europe Convention on Action Against Trafficking in Human Beings.</span><span class="xrefLink" data-dcnode-id="1484" id="jumplink-fn7"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1482" data-google-interstitial="false" data-open="fn7" href="javascript:;" reveal-id="fn7"><span data-dcnode-id="1483" instrument_node="">7</span></a><span data-dcnode-id="1481" instrument_node=""> The EU definition is fundamentally the same except that it is not restricted to THB across national frontiers.</span><span class="xrefLink" data-dcnode-id="1480" id="jumplink-fn8"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1478" data-google-interstitial="false" data-open="fn8" href="javascript:;" reveal-id="fn8"><span data-dcnode-id="1479" instrument_node="">8</span></a><span data-dcnode-id="1477" instrument_node=""> There are definitions from outside Europe which are more restrictive.</span><span class="xrefLink" data-dcnode-id="1476" id="jumplink-fn9"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1474" data-google-interstitial="false" data-open="fn9" href="javascript:;" reveal-id="fn9"><span data-dcnode-id="1475" instrument_node="">9</span></a><span data-dcnode-id="1473" instrument_node=""> Article 3(a) of the Palermo Protocol defines THB as follows:</span></p><blockquote data-dcnode-id="1469"><p class="chapter-para" data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">‘Trafficking in persons’ shall mean the recruitment, transportation, transfer, harbouring or receipt of persons, by means of the threat or use of force or other forms of coercion, of abduction, of fraud, of deception, of the abuse of power or of a position of vulnerability or of the giving or receiving of payments or benefits to achieve the consent of a person having control over another person, for the purpose of exploitation. Exploitation shall include, at a minimum, the exploitation of the prostitution of others or other forms of sexual exploitation, forced labour or services, slavery or practices similar to slavery, servitude or the removal of organs…</span></p></blockquote><p data-dcnode-id="1468"></p><p class="chapter-para" data-dcnode-id="1462"><span data-dcnode-id="1467" instrument_node="">There are essentially three elements to the offence of trafficking: the act (recruitment, etc.); the method (threat or use of force, etc.) and the motivation (exploitation). Article 3 further specifies that any apparent consent of a victim to participate in such exploitation is vitiated where any of the methods referred to have been used. In other words, you cannot consent to be trafficked.</span><span class="xrefLink" data-dcnode-id="1466" id="jumplink-fn10"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1464" data-google-interstitial="false" data-open="fn10" href="javascript:;" reveal-id="fn10"><span data-dcnode-id="1465" instrument_node="">10</span></a><span data-dcnode-id="1463" instrument_node=""> Furthermore, where children are concerned (in this case defined as anyone under 18 years of age), they will be deemed to have been trafficked even if none of the methods (threat or use of force, etc.) outlined in Article 3 (a) has been employed.</span></p><p class="chapter-para" data-dcnode-id="1453"><span data-dcnode-id="1461" instrument_node="">The problem (or at least the limitation) of the Palermo Protocol is that it is aimed primarily at tackling the perpetrators of THB. It is an adjunct to the principal UN convention, which is concerned with tackling transnational organised crime. There is certainly room to argue that the key to fighting THB is to focus on its criminal aspects and to try to deal with the traffickers as criminals.</span><span class="xrefLink" data-dcnode-id="1460" id="jumplink-fn11"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1458" data-google-interstitial="false" data-open="fn11" href="javascript:;" reveal-id="fn11"><span data-dcnode-id="1459" instrument_node="">11</span></a><span data-dcnode-id="1457" instrument_node=""> However, from the victim's perspective, the Protocol offers only limited assistance with rather nebulous, aspirational obligations that leave much to the State's discretion.</span><span class="xrefLink" data-dcnode-id="1456" id="jumplink-fn12"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1454" data-google-interstitial="false" data-open="fn12" href="javascript:;" reveal-id="fn12"><span data-dcnode-id="1455" instrument_node="">12</span></a></p><p class="chapter-para" data-dcnode-id="1444"><span data-dcnode-id="1452" instrument_node="">If we consider the plight of a victim of THB, it is clear that many will wish to return to their home state (we are dealing here only with transnational THB, although THB within individual States also takes place).</span><span class="xrefLink" data-dcnode-id="1451" id="jumplink-fn13"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1449" data-google-interstitial="false" data-open="fn13" href="javascript:;" reveal-id="fn13"><span data-dcnode-id="1450" instrument_node="">13</span></a><span data-dcnode-id="1448" instrument_node=""> Sometimes they may receive assistance to repatriate. However, it is also the case that some victims do not wish to return to their country of origin or habitual residence. Of course, the fact that a non-citizen does not wish to return to her own country does not entitle her to remain in another one – for example, a State to which she has been trafficked – unless she has a specific legal ground for doing so. However, where that non-national is a victim of THB, she may well, because of real or perceived threats that face her should she return, have an entitlement to international protection: either refugee status under provisions of the CSR51, or subsidiary or complementary protection under relevant international or national legislation.</span><span class="xrefLink" data-dcnode-id="1447" id="jumplink-fn14"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1445" data-google-interstitial="false" data-open="fn14" href="javascript:;" reveal-id="fn14"><span data-dcnode-id="1446" instrument_node="">14</span></a></p><p class="chapter-para" data-dcnode-id="1439"><span data-dcnode-id="1443" instrument_node="">The Palermo Protocol, at Article 7, requires a party to ‘consider adopting legislative or other appropriate measures that permit victims of trafficking in persons to remain in its territory, temporarily or permanently, in appropriate cases’. Those measures </span><em data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">could</span></em><span data-dcnode-id="1440" instrument_node=""> include refugee status, but the provision is so widely constructed that it creates no clear positive obligation. Against that, we have the acknowledgment in the saving clause (Article 14 (1)) that States' obligations under the CSR51 are not affected by the protocol.</span></p><p class="chapter-para" data-dcnode-id="1434"><span data-dcnode-id="1438" instrument_node="">What we therefore have in the Palermo Protocol is an instrument aimed at tackling THB through fighting the traffickers, with limited acknowledgment of the rights of the victims, who may need protection and assistance. While it is of course a good idea to fight THB from a criminal justice perspective, in the meantime there are considerable numbers of victims and there will be many more in the future. What does international law have to say about them? This article is not looking at the general human rights issues that may arise out of THB, it focuses rather on one aspect: the entitlement to international refugee protection in light of the Guidelines published in April 2006.</span><span class="xrefLink" data-dcnode-id="1437" id="jumplink-fn15"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1435" data-google-interstitial="false" data-open="fn15" href="javascript:;" reveal-id="fn15"><span data-dcnode-id="1436" instrument_node="">15</span></a></p><span data-dcnode-id="1433" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="1431" id="21984785" scrollto-destination="21984785"><span data-dcnode-id="1432" instrument_node="">2. Victims of THB as Refugees</span></h2><span data-dcnode-id="1430" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1425"><span data-dcnode-id="1429" instrument_node="">The definition of THB adopted in the Palermo Protocol is recognised in the Guidelines, which describe that instrument as ‘a crucial step forward in efforts to combat trafficking and ensure full respect for the rights of individuals affected by trafficking’.</span><span class="xrefLink" data-dcnode-id="1428" id="jumplink-fn16"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1426" data-google-interstitial="false" data-open="fn16" href="javascript:;" reveal-id="fn16"><span data-dcnode-id="1427" instrument_node="">16</span></a></p><p class="chapter-para" data-dcnode-id="1412"><span data-dcnode-id="1424" instrument_node="">The Introduction to the Guidelines, apart from outlining what is involved in THB, makes two important points. First, it stresses the two-fold interest of UNHCR: ‘a responsibility to ensure that refugees, asylum-seekers, internally displaced persons (IDPs), stateless persons and other persons of concern do not fall victim to trafficking’ (the preventative aspect);</span><span class="xrefLink" data-dcnode-id="1423" id="jumplink-fn17"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1421" data-google-interstitial="false" data-open="fn17" href="javascript:;" reveal-id="fn17"><span data-dcnode-id="1422" instrument_node="">17</span></a><span data-dcnode-id="1420" instrument_node=""> and that those victims, or potential victims, of THB who qualify as refugees are actually recognised as such and accorded the appropriate protection (the protective aspect).</span><span class="xrefLink" data-dcnode-id="1419" id="jumplink-fn18"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1417" data-google-interstitial="false" data-open="fn18" href="javascript:;" reveal-id="fn18"><span data-dcnode-id="1418" instrument_node="">18</span></a><span data-dcnode-id="1416" instrument_node=""> Second, it expressly acknowledges that not all victims, or potential victims, of THB may be entitled to refugee status.</span><span class="xrefLink" data-dcnode-id="1415" id="jumplink-fn19"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1413" data-google-interstitial="false" data-open="fn19" href="javascript:;" reveal-id="fn19"><span data-dcnode-id="1414" instrument_node="">19</span></a></p><p class="chapter-para" data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">The core of the Guidelines focuses on the discussion of the refugee definition with regard to THB. A refugee is, as defined by Article 1A(2) of the CSR51, someone who:</span></p><blockquote data-dcnode-id="1407"><p class="chapter-para" data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Owing to a well-founded fear of being persecuted for reasons of race, religion, nationality, membership of a particular social group or political opinion, is outside the country of his nationality and is unable or, owing to such fear, is unwilling to avail himself of the protection of that country; or who, not having a nationality and being outside the country of his former habitual residence as a result of such events, is unable or, owing to such fear, is unwilling to return to it.</span></p></blockquote><p data-dcnode-id="1406"></p><p class="chapter-para" data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Each element of the refugee definition is discussed separately in the Guidelines.</span></p><span data-dcnode-id="1403" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="1401" id="21984790" scrollto-destination="21984790"><span data-dcnode-id="1402" instrument_node="">2.1 Well-founded fear of persecution</span></h3><span data-dcnode-id="1400" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1386"><span data-dcnode-id="1399" instrument_node="">The types of acts committed against victims of THB are stated to constitute ‘serious violations of human rights’.</span><span class="xrefLink" data-dcnode-id="1398" id="jumplink-fn20"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1396" data-google-interstitial="false" data-open="fn20" href="javascript:;" reveal-id="fn20"><span data-dcnode-id="1397" instrument_node="">20</span></a><span data-dcnode-id="1395" instrument_node=""> Examples given include abduction, incarceration, rape, sexual enslavement, enforced prostitution, forced labour, removal of organs, physical beatings, starvation and deprivation of medical treatment. Where such acts are perpetrated by the State they clearly breach well recognised human rights norms. However, as much if not most THB is a private enterprise, an issue arises as to whether one can legitimately describe such acts as human rights violations rather than simply criminal acts. It is States that owe human rights obligations to persons under their jurisdiction. Admittedly, this usually entails not only the obligation not to breach those rights, but to ensure their protection throughout the territory under the State's jurisdiction.</span><span class="xrefLink" data-dcnode-id="1394" id="jumplink-fn21"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1392" data-google-interstitial="false" data-open="fn21" href="javascript:;" reveal-id="fn21"><span data-dcnode-id="1393" instrument_node="">21</span></a><span data-dcnode-id="1391" instrument_node=""> Yet if a State fails to ensure their protection then it will be responsible for that failure under human rights law, but not for the acts that constitute the breach themselves.</span><span class="xrefLink" data-dcnode-id="1390" id="jumplink-fn22"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1388" data-google-interstitial="false" data-open="fn22" href="javascript:;" reveal-id="fn22"><span data-dcnode-id="1389" instrument_node="">22</span></a><span data-dcnode-id="1387" instrument_node=""> This issue is addressed in paragraphs 21–24: Agents of persecution, which acknowledges that THB, without some positive act or failure by the State, will not amount to a breach of human rights, at least for the purposes of qualifying as a refugee.</span></p><p class="chapter-para" data-dcnode-id="1367"><span data-dcnode-id="1385" instrument_node="">Paragraph 21 asserts that persecution may be by both the State and non-State actors, a position widely though not universally accepted.</span><span class="xrefLink" data-dcnode-id="1384" id="jumplink-fn23"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1382" data-google-interstitial="false" data-open="fn23" href="javascript:;" reveal-id="fn23"><span data-dcnode-id="1383" instrument_node="">23</span></a><span data-dcnode-id="1381" instrument_node=""> As noted, where the State is directly involved in THB that can certainly amount to a serious breach of the victim's human rights. However no State will formally own up to trafficking, just as none will admit to torture. Much more likely is the scenario where corrupt State officials are involved in the facilitation of trafficking.</span><span class="xrefLink" data-dcnode-id="1380" id="jumplink-fn24"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1378" data-google-interstitial="false" data-open="fn24" href="javascript:;" reveal-id="fn24"><span data-dcnode-id="1379" instrument_node="">24</span></a><span data-dcnode-id="1377" instrument_node=""> In such cases, the State may bear responsibility for the acts of its agents or officials where they acted in an official capacity. It might be objected that a State agent, such as a border police official, who facilitates THB in return for bribes, for example, could </span><em data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">not</span></em><span data-dcnode-id="1374" instrument_node=""> be considered as acting as an agent of that State because it is never part of their functions to carry out their duties dishonestly. It may further be suggested that by accepting the bribe, the person is clearly acting in an individual capacity. However, the logic of this position is that a State could rarely, if ever, be held accountable or deemed to have been involved where its agent has acted outside the scope of their official functions or employment. A more principled position is that the State will be responsible for the acts of its agent, even if that act is illegal or if the person was acting with </span><em data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">apparent</span></em><span data-dcnode-id="1371" instrument_node=""> authority. Where a border guard accepts a bribe in return for facilitating THB, that person is clearly acting, albeit wrongly, in their official capacity.</span><span class="xrefLink" data-dcnode-id="1370" id="jumplink-fn25"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1368" data-google-interstitial="false" data-open="fn25" href="javascript:;" reveal-id="fn25"><span data-dcnode-id="1369" instrument_node="">25</span></a></p><p class="chapter-para" data-dcnode-id="1354"><span data-dcnode-id="1366" instrument_node="">More problematic is the attribution of responsibility to the State where it has had no direct involvement in the THB. The Guidelines assert that where the State of origin (the source State for the purposes of THB) is unable or unwilling to offer effective protection to the victim, that may amount to persecution. This assessment will depend on ‘whether legislative and administrative mechanisms have been put in place to prevent and combat trafficking, as well as to protect and assist the victims and on whether these mechanisms are effectively implemented in practice’.</span><span class="xrefLink" data-dcnode-id="1365" id="jumplink-fn26"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1363" data-google-interstitial="false" data-open="fn26" href="javascript:;" reveal-id="fn26"><span data-dcnode-id="1364" instrument_node="">26</span></a><span data-dcnode-id="1362" instrument_node=""> There is considerable authority for the proposition that the failure by a State to ensure a certain level of protection (although not absolute protection) from threats by non-State actors can amount to a breach of that State's human rights obligations.</span><span class="xrefLink" data-dcnode-id="1361" id="jumplink-fn27"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1359" data-google-interstitial="false" data-open="fn27" href="javascript:;" reveal-id="fn27"><span data-dcnode-id="1360" instrument_node="">27</span></a><span data-dcnode-id="1358" instrument_node=""> As the Guidelines suggest, in such a situation, the failure by a State to take effective measures against the risk of THB and protect the victim may be sufficient to give rise to a well-founded fear of persecution.</span><span class="xrefLink" data-dcnode-id="1357" id="jumplink-fn28"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1355" data-google-interstitial="false" data-open="fn28" href="javascript:;" reveal-id="fn28"><span data-dcnode-id="1356" instrument_node="">28</span></a></p><p class="chapter-para" data-dcnode-id="1345"><span data-dcnode-id="1353" instrument_node="">Persecution by non-State actors does not have to be at the hands of traffickers themselves. In some countries the victim may be at risk from their family or the community in which they used to live should they return there, due to cultural attitudes towards persons who have worked in the sex trade (willingly or otherwise). Such risks may include retrafficking or ostracism, such that it is effectively impossible to return and live in that same community.</span><span class="xrefLink" data-dcnode-id="1352" id="jumplink-fn29"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1350" data-google-interstitial="false" data-open="fn29" href="javascript:;" reveal-id="fn29"><span data-dcnode-id="1351" instrument_node="">29</span></a><span data-dcnode-id="1349" instrument_node=""> In such a situation, it may be appropriate to consider whether there exists any internal flight alternative for the victim. Should the risk faced by the victim be at the hands of traffickers in the destination State, there is no reason (as far as international refugee law is concerned) for the victim not to return to their home State because no relevant fear of persecution has been demonstrated.</span><span class="xrefLink" data-dcnode-id="1348" id="jumplink-fn30"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1346" data-google-interstitial="false" data-open="fn30" href="javascript:;" reveal-id="fn30"><span data-dcnode-id="1347" instrument_node="">30</span></a></p><span data-dcnode-id="1344" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="1342" id="21984795" scrollto-destination="21984795"><span data-dcnode-id="1343" instrument_node="">2.2 The foundation for persecution</span></h3><span data-dcnode-id="1341" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Refugee status is predicated on a well-founded fear of persecution based upon one or more of the grounds listed in the Convention. Obviously there has to be a link between the fear and the characteristic of the victim that is recognised as qualifying for refugee status. If the risk is at the hands of the State then it is the behaviour, or potential behaviour, of that State that falls under scrutiny. Where the risk of persecution is at the hands of non-State actors, however, then regard must be had to the potential behaviour not only of the non-State actor but of the State of nationality of the victim in which the non-State actor is operating. This works in two ways, as Paragraph 30 of the Guidelines specifies. First, it does not matter whether the failure of the State to offer effective protection is based on a reason recognised by the Convention. It could be due to a failure to enforce relevant legislation due to negligence or incompetence, rather than any deliberate intention to target a particular group. The crucial point is that the non-State actor poses a threat to the victim that is founded on a Convention ground, such as their nationality. Second, where the non-State actor – the trafficker – regards the victim purely as an exploitable commodity and has no further motive for trafficking her, the Convention plays no role. However, should the victim's home State fail to offer effective protection because of a Convention ground, then that should be sufficient to establish the link to the Convention. In each case there is a connection to the Convention.</span></p><p class="chapter-para" data-dcnode-id="1333"><span data-dcnode-id="1338" instrument_node="">In this context, even if a Convention ground is not the sole or primary reason for targeting a victim, it may nevertheless be a relevant factor in the decision to target her,</span><span class="xrefLink" data-dcnode-id="1337" id="jumplink-fn31"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1335" data-google-interstitial="false" data-open="fn31" href="javascript:;" reveal-id="fn31"><span data-dcnode-id="1336" instrument_node="">31</span></a><span data-dcnode-id="1334" instrument_node=""> for example, because she comes from a minority ethnic group in a State that does not take effective measures to protect members of that group from threats that may constitute persecution.</span></p><p class="chapter-para" data-dcnode-id="1324"><span data-dcnode-id="1332" instrument_node="">The Guidelines then consider separately the various Convention grounds for persecution.</span><span class="xrefLink" data-dcnode-id="1331" id="jumplink-fn32"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1329" data-google-interstitial="false" data-open="fn32" href="javascript:;" reveal-id="fn32"><span data-dcnode-id="1330" instrument_node="">32</span></a><span data-dcnode-id="1328" instrument_node=""> In reality, if a person has been or fears being trafficked because of her race, religion, nationality, or political opinion (or a combination of these grounds), then there should be little difficulty so long as the fear is well-founded. Most people are not at risk of being trafficked because of such reasons, but because they are vulnerable: for example, they may lack a stable family background, they may be impoverished or have little education. Simply being vulnerable to being trafficked will not entitle one to refugee status, no matter how well-founded the fear, unless it is linked to a Convention ground. In these cases, there may be scope to use the ‘membership of a particular social group’ criterion.</span><span class="xrefLink" data-dcnode-id="1327" id="jumplink-fn33"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1325" data-google-interstitial="false" data-open="fn33" href="javascript:;" reveal-id="fn33"><span data-dcnode-id="1326" instrument_node="">33</span></a></p><p class="chapter-para" data-dcnode-id="1306"><span data-dcnode-id="1323" instrument_node="">It is generally accepted that in ascertaining the existence of a particular social group, there must be something that connects the members other than the mere fact of their persecution, although the element of persecution may be relevant in identifying a group.</span><span class="xrefLink" data-dcnode-id="1322" id="jumplink-fn34"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1320" data-google-interstitial="false" data-open="fn34" href="javascript:;" reveal-id="fn34"><span data-dcnode-id="1321" instrument_node="">34</span></a><span data-dcnode-id="1319" instrument_node=""> They must share some common characteristic or be perceived as a group by society.</span><span class="xrefLink" data-dcnode-id="1318" id="jumplink-fn35"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1316" data-google-interstitial="false" data-open="fn35" href="javascript:;" reveal-id="fn35"><span data-dcnode-id="1317" instrument_node="">35</span></a><span data-dcnode-id="1315" instrument_node=""> The Guidelines suggest how this may apply to victims of THB. Indeed, there is jurisprudence recognising that, at least in some situations, victims of THB may constitute a particular social group.</span><span class="xrefLink" data-dcnode-id="1314" id="jumplink-fn36"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1312" data-google-interstitial="false" data-open="fn36" href="javascript:;" reveal-id="fn36"><span data-dcnode-id="1313" instrument_node="">36</span></a><span data-dcnode-id="1311" instrument_node=""> Particularly important is the assertion that people who have been trafficked in the past or fear being retrafficked should they be obliged to return to their home States, may form a particular social group based on a shared characteristic – that of having been trafficked, which is an immutable characteristic, a historic fact that cannot be altered. Thus it is not the fear of persecution alone – which in itself is insufficient for recognition as a refugee in law – but the fact of having been trafficked that links these people and may in some cases suffice to describe them as members of a particular social group.</span><span class="xrefLink" data-dcnode-id="1310" id="jumplink-fn37"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1308" data-google-interstitial="false" data-open="fn37" href="javascript:;" reveal-id="fn37"><span data-dcnode-id="1309" instrument_node="">37</span></a><span data-dcnode-id="1307" instrument_node=""> The risk of persecution that they face arises directly from their previous involuntary involvement in the sex trade or some other activity into which they had been trafficked.</span></p><p class="chapter-para" data-dcnode-id="1300"><span data-dcnode-id="1305" instrument_node="">Where a person has never been trafficked but alleges a well-founded fear of being trafficked if she has to return to her home State, the position is more problematic. What exactly is the link that would entitle one to say there is a particular social group to which such people may belong? It cannot be the fear of persecution alone. Paragraph 38 suggests that in some cases one may be able to discern a particular social group; for example, in some societies – but certainly not all – women may form a social subset of individuals defined by immutable characteristics and treated differently from men.</span><span class="xrefLink" data-dcnode-id="1304" id="jumplink-fn38"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1302" data-google-interstitial="false" data-open="fn38" href="javascript:;" reveal-id="fn38"><span data-dcnode-id="1303" instrument_node="">38</span></a><span data-dcnode-id="1301" instrument_node=""> The suggestion is that this could apply to women at risk of being trafficked from their home State. Certainly one can see in particular countries conditions that may represent a special risk of trafficking for certain groups, for instance because of endemic poverty, post-conflict chaos, or lack of education. The difficult issue is whether such features may amount to an immutable characteristic or whether such persons would be perceived as a particular identifiable group. There is no easy answer. The Guidelines are correct to suggest the possibility, but each case would have to be considered in its own particular circumstances.</span></p><span data-dcnode-id="1299" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="1297" id="21984801" scrollto-destination="21984801"><span data-dcnode-id="1298" instrument_node="">3. Statelessness and Trafficking</span></h2><span data-dcnode-id="1296" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1277"><span data-dcnode-id="1295" instrument_node="">The Guidelines also address the possibility of entitlement to refugee status for victims of THB as a consequence of their </span><em data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">de jure</span></em><span data-dcnode-id="1292" instrument_node=""> or </span><em data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">de facto</span></em><span data-dcnode-id="1289" instrument_node=""> statelessness.</span><span class="xrefLink" data-dcnode-id="1288" id="jumplink-fn39"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1286" data-google-interstitial="false" data-open="fn39" href="javascript:;" reveal-id="fn39"><span data-dcnode-id="1287" instrument_node="">39</span></a><span data-dcnode-id="1285" instrument_node=""> Of course the lack of a nationality, or citizenship, is not in itself a basis for refugee status. Victims of THB frequently do not possess identity or travel documents, often because these have been confiscated by their traffickers as a means of exerting control over them. Where the State of nationality is unable or unwilling to assist the victim to obtain documentation, the effect may be to leave them stranded in the destination country. She still has a citizenship but has no means of proving it. This may be due to one or more of several factors: loss of passport or identity documents; confiscation of these documents by the traffickers; inability or unwillingness of the State of nationality to assist even when aware of the problem; lack of diplomatic or consular presence in the destination State; or physical remoteness of diplomatic or consular presence from the victim. The deliberate failure by the State of nationality to provide assistance – effectively making the victim stateless – may amount to persecution, thus entitling the victim to seek asylum in the destination State.</span><span class="xrefLink" data-dcnode-id="1284" id="jumplink-fn40"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1282" data-google-interstitial="false" data-open="fn40" href="javascript:;" reveal-id="fn40"><span data-dcnode-id="1283" instrument_node="">40</span></a><span data-dcnode-id="1281" instrument_node=""> Where a victim of trafficking is effectively stateless but found not to be entitled to refugee status, that does not mean that she has no protection needs. While the Guidelines are essentially about the application of the CSR51, Paragraph 43 asserts UNHCR's entitlement to ‘take action’ to assist affected individuals as part of its statelessness mandate.</span><span class="xrefLink" data-dcnode-id="1280" id="jumplink-fn41"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1278" data-google-interstitial="false" data-open="fn41" href="javascript:;" reveal-id="fn41"><span data-dcnode-id="1279" instrument_node="">41</span></a></p><span data-dcnode-id="1276" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="1274" id="21984803" scrollto-destination="21984803"><span data-dcnode-id="1275" instrument_node="">4. Status of the Guidelines</span></h2><span data-dcnode-id="1273" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1267"><span data-dcnode-id="1272" instrument_node="">The Guidelines, according to the cover note, are ‘intended to provide interpretative legal guidance for governments, legal practitioners, decision-makers and the judiciary, as well as for UNHCR staff carrying out refugee status determination in the field’. They are not legally binding. States remain bound only by the treaty obligations under the CSR51 and/or the CSRP67 Protocol.</span><span class="xrefLink" data-dcnode-id="1271" id="jumplink-fn42"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="1269" data-google-interstitial="false" data-open="fn42" href="javascript:;" reveal-id="fn42"><span data-dcnode-id="1270" instrument_node="">42</span></a><span data-dcnode-id="1268" instrument_node=""> These Guidelines do not purport to amend the Convention, but like other protection Guidelines introduced by UNHCR they are meant to help States and other actors interpret the scope and meaning of international refugee law in line with contemporary jurisprudence, policy and related developments. The Guidelines should be judged by the reasoning employed to justify the application of the Convention. In this regard they are highly persuasive: they at no stage suggest that all victims of trafficking are entitled to refugee status, but they demonstrate how some trafficked people may have entitlements under the Convention.</span></p><span data-dcnode-id="1266" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="1264" id="21984805" scrollto-destination="21984805"><span data-dcnode-id="1265" instrument_node="">5. Conclusion</span></h2><span data-dcnode-id="1263" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">The notion that victims of trafficking may have an entitlement to refugee status is relatively novel. When the topic ‘membership of a particular social group’ was discussed at the UNHCR's Global Consultations meeting in San Remo in September 2001, trafficking was not included in the formal discussion. By July 2002, however, the first draft of the Guidelines had been prepared. It took nearly four more years before the final version was published. While it is unrealistic to see refugee status as the answer to the dilemma of many victims of trafficking, there is little doubt that some individuals would deserve recognition as refugees. In that sense the Guidelines represent a useful addition to our understanding of the Convention regime.</span></p><div class="footnote" content-id="fn1" data-dcnode-id="1253"><span class="fn" data-dcnode-id="1254"><span class="label fn-label" data-dcnode-id="1258"><span class="end-note-link" data-dcnode-id="1259" data-fn-id="fn1" rel="nofollow"><span data-dcnode-id="1260" instrument_node="">1</span></span></span><div class="footnote-content" data-dcnode-id="1255"><p class="footnote-compatibility" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">189 UNTS 150.</span></p></div></span></div><div class="footnote" content-id="fn2" data-dcnode-id="1242"><span class="fn" data-dcnode-id="1243"><span class="label fn-label" data-dcnode-id="1250"><span class="end-note-link" data-dcnode-id="1251" data-fn-id="fn2" rel="nofollow"><span data-dcnode-id="1252" instrument_node="">2</span></span></span><div class="footnote-content" data-dcnode-id="1244"><p class="footnote-compatibility" data-dcnode-id="1245"><span data-dcnode-id="1249" instrument_node="">The various Guidelines are available at: &lt;</span><a class="link link-uri openInAnotherWindow" data-dcnode-id="1247" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/cgi-bin/texis/vtx/rsd%3Fsearch%3Dlegal%26source%3DREFPOL%26subject%3Dguidelines%2Bthematic" target="_blank"><span data-dcnode-id="1248" instrument_node="">http://www.unhcr.org/cgi-bin/texis/vtx/rsd?search=legal&amp;source=REFPOL&amp;subject=guidelines+thematic</span></a><span data-dcnode-id="1246" instrument_node="">&gt;.</span></p></div></span></div><div class="footnote" content-id="fn3" data-dcnode-id="1234"><span class="fn" data-dcnode-id="1235"><span class="label fn-label" data-dcnode-id="1239"><span class="end-note-link" data-dcnode-id="1240" data-fn-id="fn3" rel="nofollow"><span data-dcnode-id="1241" instrument_node="">3</span></span></span><div class="footnote-content" data-dcnode-id="1236"><p class="footnote-compatibility" data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">HCR/GIP/06/07.</span></p></div></span></div><div class="footnote" content-id="fn4" data-dcnode-id="1226"><span class="fn" data-dcnode-id="1227"><span class="label fn-label" data-dcnode-id="1231"><span class="end-note-link" data-dcnode-id="1232" data-fn-id="fn4" rel="nofollow"><span data-dcnode-id="1233" instrument_node="">4</span></span></span><div class="footnote-content" data-dcnode-id="1228"><p class="footnote-compatibility" data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">See, e.g., Office of the High Commissioner for Human Rights, ‘Recommended Principles and Guidelines on Human Rights and Human Trafficking’ (2002) E/2002/68/Add.1; International Maritime Organisation, ‘Interim Measures for Combating Unsafe Practices Associated with the Trafficking or Transport of Migrants by Sea’ (12 June 2001) MSC/Circ.896/Rev.1; IOM and EU, ‘Brussels Declaration on Preventing and Combating Trafficking in Human Beings’ (18 Sept. 2002); OSCE, ‘Declaration on Trafficking in Human Beings’ (7 Dec. 2002) MC.DEC/2/03; Decision No. 557 – ‘OSCE Action Plan to Combat Trafficking in Human Beings’ (24 July 2003) PC.DEC/577; Stability Pact for South Eastern, Task Force on Trafficking in Human Beings, ‘Statement on Commitments’, 11 Dec. 2002.</span></p></div></span></div><div class="footnote" content-id="fn5" data-dcnode-id="1218"><span class="fn" data-dcnode-id="1219"><span class="label fn-label" data-dcnode-id="1223"><span class="end-note-link" data-dcnode-id="1224" data-fn-id="fn5" rel="nofollow"><span data-dcnode-id="1225" instrument_node="">5</span></span></span><div class="footnote-content" data-dcnode-id="1220"><p class="footnote-compatibility" data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Protocol to Prevent, Suppress and Punish Trafficking in Persons, especially Women and Children 2000, A/AC.254/4/Rev.9; entered into force 25 Dec. 2003.</span></p></div></span></div><div class="footnote" content-id="fn6" data-dcnode-id="1210"><span class="fn" data-dcnode-id="1211"><span class="label fn-label" data-dcnode-id="1215"><span class="end-note-link" data-dcnode-id="1216" data-fn-id="fn6" rel="nofollow"><span data-dcnode-id="1217" instrument_node="">6</span></span></span><div class="footnote-content" data-dcnode-id="1212"><p class="footnote-compatibility" data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">A/AC.254/4/Rev.9; entered into force 29 Sept. 2003.</span></p></div></span></div><div class="footnote" content-id="fn7" data-dcnode-id="1202"><span class="fn" data-dcnode-id="1203"><span class="label fn-label" data-dcnode-id="1207"><span class="end-note-link" data-dcnode-id="1208" data-fn-id="fn7" rel="nofollow"><span data-dcnode-id="1209" instrument_node="">7</span></span></span><div class="footnote-content" data-dcnode-id="1204"><p class="footnote-compatibility" data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">CM(2005)32 Addendum 1 final 3 May 2005; CETS No. 197. Entered into force on 1 Feb. 2008, having secured ten ratifications (Albania, Austria, Bulgaria, Croatia, Cyprus, Denmark, Georgia, Moldova, Romania and Slovakia).</span></p></div></span></div><div class="footnote" content-id="fn8" data-dcnode-id="1194"><span class="fn" data-dcnode-id="1195"><span class="label fn-label" data-dcnode-id="1199"><span class="end-note-link" data-dcnode-id="1200" data-fn-id="fn8" rel="nofollow"><span data-dcnode-id="1201" instrument_node="">8</span></span></span><div class="footnote-content" data-dcnode-id="1196"><p class="footnote-compatibility" data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Council Framework Decision of 19 July 2002 on combating trafficking in human beings (2002/629/JHA), OJ 2002 L 203/1. The Decision refers to the Palermo Protocol as ‘…a decisive step towards international cooperation in this field’ (Preamble, recital (4)).</span></p></div></span></div><div class="footnote" content-id="fn9" data-dcnode-id="1186"><span class="fn" data-dcnode-id="1187"><span class="label fn-label" data-dcnode-id="1191"><span class="end-note-link" data-dcnode-id="1192" data-fn-id="fn9" rel="nofollow"><span data-dcnode-id="1193" instrument_node="">9</span></span></span><div class="footnote-content" data-dcnode-id="1188"><p class="footnote-compatibility" data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">See, e.g., the South Asian Association for Regional Cooperation, Convention on Preventing and Combating Trafficking in Women and Children for Prostitution 2002. This instrument is limited, as its title suggests, to trafficking for prostitution and defines such trafficking, at Article 1(3), as ‘…the moving, selling or buying of women and children for prostitution within and outside a country for monetary or other considerations with or without the consent of the person subjected to trafficking’. This is wider in that it includes trafficking within States.</span></p></div></span></div><div class="footnote" content-id="fn10" data-dcnode-id="1178"><span class="fn" data-dcnode-id="1179"><span class="label fn-label" data-dcnode-id="1183"><span class="end-note-link" data-dcnode-id="1184" data-fn-id="fn10" rel="nofollow"><span data-dcnode-id="1185" instrument_node="">10</span></span></span><div class="footnote-content" data-dcnode-id="1180"><p class="footnote-compatibility" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">This technique of denying the validity of apparent consent as a means of attempting to help individuals is not novel. The 1949 Geneva Conventions on the protection of victims of armed conflict, e.g., provide that those protected by the conventions cannot renounce their rights under those instruments: Art. 7 of the First, Second and Third Conventions; Art. 8 of the Fourth.</span></p></div></span></div><div class="footnote" content-id="fn11" data-dcnode-id="1167"><span class="fn" data-dcnode-id="1168"><span class="label fn-label" data-dcnode-id="1175"><span class="end-note-link" data-dcnode-id="1176" data-fn-id="fn11" rel="nofollow"><span data-dcnode-id="1177" instrument_node="">11</span></span></span><div class="footnote-content" data-dcnode-id="1169"><p class="footnote-compatibility" data-dcnode-id="1170"><span data-dcnode-id="1174" instrument_node="">For the argument that THB is essentially a criminal act and not necessarily a breach of human rights, see, R. Piotrowicz, ‘Trafficking of Human Beings and their Human Rights in the Migration Context’ (Part IV) in R. Cholewiński, R. Perruchoud and E. MacDonald (eds.), </span><em data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">International Migration Law: Developing Paradigms and Key Challenges</span></em><span data-dcnode-id="1171" instrument_node=""> (2007), 275 at 278–81.</span></p></div></span></div><div class="footnote" content-id="fn12" data-dcnode-id="1156"><span class="fn" data-dcnode-id="1157"><span class="label fn-label" data-dcnode-id="1164"><span class="end-note-link" data-dcnode-id="1165" data-fn-id="fn12" rel="nofollow"><span data-dcnode-id="1166" instrument_node="">12</span></span></span><div class="footnote-content" data-dcnode-id="1158"><p class="footnote-compatibility" data-dcnode-id="1159"><span data-dcnode-id="1163" instrument_node="">Arts. 6–8. On the limited assistance offered by the Protocol, see, R. Piotrowicz, ‘Irregular Migration Networks: The Challenge Posed by People Traffickers to States’ and Human Rights’ in B. Bogusz, R. Cholewiński, A. Cygan and E. Szyszczak (eds.), </span><em data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Irregular Migration and Human Rights: Theoretical, European and International Perspectives</span></em><span data-dcnode-id="1160" instrument_node=""> (2004) 137 at 143–5.</span></p></div></span></div><div class="footnote" content-id="fn13" data-dcnode-id="1148"><span class="fn" data-dcnode-id="1149"><span class="label fn-label" data-dcnode-id="1153"><span class="end-note-link" data-dcnode-id="1154" data-fn-id="fn13" rel="nofollow"><span data-dcnode-id="1155" instrument_node="">13</span></span></span><div class="footnote-content" data-dcnode-id="1150"><p class="footnote-compatibility" data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">See, e.g., Amnesty International Index: Eur 70/010/2004, 6 May 2004, ‘Kosovo (Serbia and Montenegro) “So does it mean that we have the rights?”. Protecting the human rights of women and girls trafficked for prostitution in Kosovo’, 25–29; Counter-Trafficking Regional Clearing Point (Stability Pact for South Eastern Europe), First Annual Report on Victims of Trafficking in South Eastern Europe (2003)14.</span></p></div></span></div><div class="footnote" content-id="fn14" data-dcnode-id="1140"><span class="fn" data-dcnode-id="1141"><span class="label fn-label" data-dcnode-id="1145"><span class="end-note-link" data-dcnode-id="1146" data-fn-id="fn14" rel="nofollow"><span data-dcnode-id="1147" instrument_node="">14</span></span></span><div class="footnote-content" data-dcnode-id="1142"><p class="footnote-compatibility" data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">E.g., Council Directive 2004/83/EC on minimum standards for the qualification and status of third country nationals or stateless person as refugees or as persons who otherwise need international protection and the content of the protection granted, OJ L 304, 30 Sept. 2004, at 12 (the Qualification Directive).</span></p></div></span></div><div class="footnote" content-id="fn15" data-dcnode-id="1129"><span class="fn" data-dcnode-id="1130"><span class="label fn-label" data-dcnode-id="1137"><span class="end-note-link" data-dcnode-id="1138" data-fn-id="fn15" rel="nofollow"><span data-dcnode-id="1139" instrument_node="">15</span></span></span><div class="footnote-content" data-dcnode-id="1131"><p class="footnote-compatibility" data-dcnode-id="1132"><span data-dcnode-id="1136" instrument_node="">The right to international protection of victims of THB, irrespective of the Guidelines, is discussed in R. Piotrowicz, ‘Victims of People Trafficking and Entitlement to International Protection’ (2005) 24 </span><em data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Australian Year Book of International Law</span></em><span data-dcnode-id="1133" instrument_node=""> 159.</span></p></div></span></div><div class="footnote" content-id="fn16" data-dcnode-id="1121"><span class="fn" data-dcnode-id="1122"><span class="label fn-label" data-dcnode-id="1126"><span class="end-note-link" data-dcnode-id="1127" data-fn-id="fn16" rel="nofollow"><span data-dcnode-id="1128" instrument_node="">16</span></span></span><div class="footnote-content" data-dcnode-id="1123"><p class="footnote-compatibility" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Para. 2.</span></p></div></span></div><div class="footnote" content-id="fn17" data-dcnode-id="1113"><span class="fn" data-dcnode-id="1114"><span class="label fn-label" data-dcnode-id="1118"><span class="end-note-link" data-dcnode-id="1119" data-fn-id="fn17" rel="nofollow"><span data-dcnode-id="1120" instrument_node="">17</span></span></span><div class="footnote-content" data-dcnode-id="1115"><p class="footnote-compatibility" data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Para. 5.</span></p></div></span></div><div class="footnote" content-id="fn18" data-dcnode-id="1105"><span class="fn" data-dcnode-id="1106"><span class="label fn-label" data-dcnode-id="1110"><span class="end-note-link" data-dcnode-id="1111" data-fn-id="fn18" rel="nofollow"><span data-dcnode-id="1112" instrument_node="">18</span></span></span><div class="footnote-content" data-dcnode-id="1107"><p class="footnote-compatibility" data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Ibid.</span></p></div></span></div><div class="footnote" content-id="fn19" data-dcnode-id="1097"><span class="fn" data-dcnode-id="1098"><span class="label fn-label" data-dcnode-id="1102"><span class="end-note-link" data-dcnode-id="1103" data-fn-id="fn19" rel="nofollow"><span data-dcnode-id="1104" instrument_node="">19</span></span></span><div class="footnote-content" data-dcnode-id="1099"><p class="footnote-compatibility" data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Para. 6.</span></p></div></span></div><div class="footnote" content-id="fn20" data-dcnode-id="1089"><span class="fn" data-dcnode-id="1090"><span class="label fn-label" data-dcnode-id="1094"><span class="end-note-link" data-dcnode-id="1095" data-fn-id="fn20" rel="nofollow"><span data-dcnode-id="1096" instrument_node="">20</span></span></span><div class="footnote-content" data-dcnode-id="1091"><p class="footnote-compatibility" data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Para. 15.</span></p></div></span></div><div class="footnote" content-id="fn21" data-dcnode-id="1081"><span class="fn" data-dcnode-id="1082"><span class="label fn-label" data-dcnode-id="1086"><span class="end-note-link" data-dcnode-id="1087" data-fn-id="fn21" rel="nofollow"><span data-dcnode-id="1088" instrument_node="">21</span></span></span><div class="footnote-content" data-dcnode-id="1083"><p class="footnote-compatibility" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">ICCPR66, Art. 2(1); ECHR50, Art. 1.</span></p></div></span></div><div class="footnote" content-id="fn22" data-dcnode-id="1061"><span class="fn" data-dcnode-id="1062"><span class="label fn-label" data-dcnode-id="1078"><span class="end-note-link" data-dcnode-id="1079" data-fn-id="fn22" rel="nofollow"><span data-dcnode-id="1080" instrument_node="">22</span></span></span><div class="footnote-content" data-dcnode-id="1063"><p class="footnote-compatibility" data-dcnode-id="1064"><span data-dcnode-id="1077" instrument_node="">Piotrowicz, above n. 11. See also the Explanatory Report accompanying the Council of Europe Convention on Action Against Trafficking in Human Beings, above n. 7, which considers horizontal application in the context of the ECHR50 and concludes: ‘[T]he case law of the European Court of Human Rights contains clear indications in favour of the applicability of the ECHR in relations between private individuals in the sense that the Court has recognized the liability of contracting States for acts committed by individuals or groups of individuals </span><em data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">when these States failed to take appropriate measures of protection</span></em><span data-dcnode-id="1074" instrument_node="">’ (para. 44, emphasis added). See, e.g., </span><em data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Z and others v. United Kingdom</span></em><span data-dcnode-id="1071" instrument_node="">, judgment of 10 May 2001, Application No. 29392/95, at para. 73: ‘The Court reiterates that Article 3 enshrines one of the most fundamental values of democratic society. It prohibits in absolute terms torture or inhuman or degrading treatment or punishment. </span><em data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">The obligation on High Contracting Parties under Article 1 of the Convention to secure to everyone within their jurisdiction the rights and freedoms defined in the Convention, taken in conjunction with Article 3, requires States to take measures designed to ensure that individuals within their jurisdiction are not subjected to torture or inhuman or degrading treatment, including such ill-treatment administered by private individuals.</span></em><span data-dcnode-id="1068" instrument_node=""> These measures should provide effective protection, in particular, of children and other vulnerable persons and include reasonable steps to prevent ill-treatment of which the authorities had or ought to have had knowledge’ (emphasis added). In other words, the breach by the State, if any, lies in the failure to provide effective protection. Whether protection is effective will depend on the circumstances but does not extend to an absolute obligation. More recently, in </span><em data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">M.C. v. Bulgaria</span></em><span data-dcnode-id="1065" instrument_node="">, the Court has held that the failure of Bulgaria to establish and apply effectively a criminal-law system punishing all forms of rape and sexual abuse was a violation of its obligations under Arts. 3 and 8: judgment of 4 Dec. 2003, Application No. 39272/98, at para. 185. Nevertheless, the actual rape was not claimed by the applicant to be a breach.</span></p></div></span></div><div class="footnote" content-id="fn23" data-dcnode-id="1047"><span class="fn" data-dcnode-id="1048"><span class="label fn-label" data-dcnode-id="1058"><span class="end-note-link" data-dcnode-id="1059" data-fn-id="fn23" rel="nofollow"><span data-dcnode-id="1060" instrument_node="">23</span></span></span><div class="footnote-content" data-dcnode-id="1049"><p class="footnote-compatibility" data-dcnode-id="1050"><span data-dcnode-id="1057" instrument_node="">See, e.g., the Qualification Directive, above n. 14. Art. 6, provides that persecution may be by the State, parties or organisations controlling the State or by non-State actors, where the State or those controlling it are unable or unwilling to provide protection. See also, A. Edwards, ‘Age and gender dimensions in international refugee law’ in E. Feller, V. Türk and F. Nicholson (eds.), </span><em data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Refugee Protection in International Law</span></em><span data-dcnode-id="1054" instrument_node=""> (2003) 46, at 59–63. Australia, e.g., readily recognises that persecution can be by the State or, in certain cases, non-State actors, see, R. Germov and F. Motta, </span><em data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Refugee Law in Australia</span></em><span data-dcnode-id="1051" instrument_node=""> (2003) 216–20.</span></p></div></span></div><div class="footnote" content-id="fn24" data-dcnode-id="1039"><span class="fn" data-dcnode-id="1040"><span class="label fn-label" data-dcnode-id="1044"><span class="end-note-link" data-dcnode-id="1045" data-fn-id="fn24" rel="nofollow"><span data-dcnode-id="1046" instrument_node="">24</span></span></span><div class="footnote-content" data-dcnode-id="1041"><p class="footnote-compatibility" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Para. 24.</span></p></div></span></div><div class="footnote" content-id="fn25" data-dcnode-id="1026"><span class="fn" data-dcnode-id="1027"><span class="label fn-label" data-dcnode-id="1036"><span class="end-note-link" data-dcnode-id="1037" data-fn-id="fn25" rel="nofollow"><span data-dcnode-id="1038" instrument_node="">25</span></span></span><div class="footnote-content" data-dcnode-id="1028"><p class="footnote-compatibility" data-dcnode-id="1029"><em data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Jones v. Ministry of Interior Al-Mamlaka Al-Arabiya AS Saudiya (the Kingdom of Saudi Arabia) and others</span></em><span data-dcnode-id="1033" instrument_node=""> [2006] UKHL 26 para. 12, citing with approval Arts. 4 and 7 of the International Law Commission's Articles on State Responsibility; </span><em data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Democratic Republic of Congo v. Uganda</span></em><span data-dcnode-id="1030" instrument_node=""> (2005) ICJ Rep. pares. 213–14.</span></p></div></span></div><div class="footnote" content-id="fn26" data-dcnode-id="1018"><span class="fn" data-dcnode-id="1019"><span class="label fn-label" data-dcnode-id="1023"><span class="end-note-link" data-dcnode-id="1024" data-fn-id="fn26" rel="nofollow"><span data-dcnode-id="1025" instrument_node="">26</span></span></span><div class="footnote-content" data-dcnode-id="1020"><p class="footnote-compatibility" data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Para. 22.</span></p></div></span></div><div class="footnote" content-id="fn27" data-dcnode-id="1010"><span class="fn" data-dcnode-id="1011"><span class="label fn-label" data-dcnode-id="1015"><span class="end-note-link" data-dcnode-id="1016" data-fn-id="fn27" rel="nofollow"><span data-dcnode-id="1017" instrument_node="">27</span></span></span><div class="footnote-content" data-dcnode-id="1012"><p class="footnote-compatibility" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">See, n. 22 above.</span></p></div></span></div><div class="footnote" content-id="fn28" data-dcnode-id="1002"><span class="fn" data-dcnode-id="1003"><span class="label fn-label" data-dcnode-id="1007"><span class="end-note-link" data-dcnode-id="1008" data-fn-id="fn28" rel="nofollow"><span data-dcnode-id="1009" instrument_node="">28</span></span></span><div class="footnote-content" data-dcnode-id="1004"><p class="footnote-compatibility" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Para. 23.</span></p></div></span></div><div class="footnote" content-id="fn29" data-dcnode-id="994"><span class="fn" data-dcnode-id="995"><span class="label fn-label" data-dcnode-id="999"><span class="end-note-link" data-dcnode-id="1000" data-fn-id="fn29" rel="nofollow"><span data-dcnode-id="1001" instrument_node="">29</span></span></span><div class="footnote-content" data-dcnode-id="996"><p class="footnote-compatibility" data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Para. 18.</span></p></div></span></div><div class="footnote" content-id="fn30" data-dcnode-id="986"><span class="fn" data-dcnode-id="987"><span class="label fn-label" data-dcnode-id="991"><span class="end-note-link" data-dcnode-id="992" data-fn-id="fn30" rel="nofollow"><span data-dcnode-id="993" instrument_node="">30</span></span></span><div class="footnote-content" data-dcnode-id="988"><p class="footnote-compatibility" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Para. 26.</span></p></div></span></div><div class="footnote" content-id="fn31" data-dcnode-id="978"><span class="fn" data-dcnode-id="979"><span class="label fn-label" data-dcnode-id="983"><span class="end-note-link" data-dcnode-id="984" data-fn-id="fn31" rel="nofollow"><span data-dcnode-id="985" instrument_node="">31</span></span></span><div class="footnote-content" data-dcnode-id="980"><p class="footnote-compatibility" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Paras. 31–2.</span></p></div></span></div><div class="footnote" content-id="fn32" data-dcnode-id="970"><span class="fn" data-dcnode-id="971"><span class="label fn-label" data-dcnode-id="975"><span class="end-note-link" data-dcnode-id="976" data-fn-id="fn32" rel="nofollow"><span data-dcnode-id="977" instrument_node="">32</span></span></span><div class="footnote-content" data-dcnode-id="972"><p class="footnote-compatibility" data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Paras. 33–40.</span></p></div></span></div><div class="footnote" content-id="fn33" data-dcnode-id="962"><span class="fn" data-dcnode-id="963"><span class="label fn-label" data-dcnode-id="967"><span class="end-note-link" data-dcnode-id="968" data-fn-id="fn33" rel="nofollow"><span data-dcnode-id="969" instrument_node="">33</span></span></span><div class="footnote-content" data-dcnode-id="964"><p class="footnote-compatibility" data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Paras. 37–9. See also UNHCR, ‘Guidelines on International Protection: Membership of a Particular Social Group within the context of Article 1A(2) of the 1951 Convention and 1967 Protocol relating to the Status of Refugees’, HCR/GIP/02/02, 7 May 2002.</span></p></div></span></div><div class="footnote" content-id="fn34" data-dcnode-id="945"><span class="fn" data-dcnode-id="946"><span class="label fn-label" data-dcnode-id="959"><span class="end-note-link" data-dcnode-id="960" data-fn-id="fn34" rel="nofollow"><span data-dcnode-id="961" instrument_node="">34</span></span></span><div class="footnote-content" data-dcnode-id="947"><p class="footnote-compatibility" data-dcnode-id="948"><span data-dcnode-id="958" instrument_node="">This is the position of courts in several jurisdictions that deal with significant numbers of applications for asylum. See, e.g., </span><em data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Applicant A &amp; Another v. MIEA &amp; Another</span></em><span data-dcnode-id="955" instrument_node=""> (1997) 190 CLR 225, 242, 263 (Australia); </span><em data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">R v. Immigration Appeal Tribunal and another, Ex parte Shah, Islam and others v. Secretary of State for the Home Department</span></em><span data-dcnode-id="952" instrument_node=""> [1999] 2 All ER 545, 552 (UK). A. Aleinikoff, ‘Protected characteristics and social perceptions: an analysis of the meaning of “membership of a particular social group”’ in Feller </span><em data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">et al.</span></em><span data-dcnode-id="949" instrument_node="">, above note 23, at 263, 286–9; United Nations High Commissioner for Refugees, ‘Guidelines on International Protection: “Membership of a Particular social group” within the context of article 1A(2) of the 1951 Convention and/or its 1967 Protocol relating to the status of Refugees’, HCR/GIP/02/02, 7 May 2002, para. 14.</span></p></div></span></div><div class="footnote" content-id="fn35" data-dcnode-id="937"><span class="fn" data-dcnode-id="938"><span class="label fn-label" data-dcnode-id="942"><span class="end-note-link" data-dcnode-id="943" data-fn-id="fn35" rel="nofollow"><span data-dcnode-id="944" instrument_node="">35</span></span></span><div class="footnote-content" data-dcnode-id="939"><p class="footnote-compatibility" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Para. 37.</span></p></div></span></div><div class="footnote" content-id="fn36" data-dcnode-id="911"><span class="fn" data-dcnode-id="912"><span class="label fn-label" data-dcnode-id="934"><span class="end-note-link" data-dcnode-id="935" data-fn-id="fn36" rel="nofollow"><span data-dcnode-id="936" instrument_node="">36</span></span></span><div class="footnote-content" data-dcnode-id="913"><p class="footnote-compatibility" data-dcnode-id="914"><span data-dcnode-id="933" instrument_node="">Sexual violence against women (and, given their lack of consent, all forced prostitution of trafficked women may be deemed sexual violence) may be inflicted for the one and only reason of their gender, and in some situations it may be appropriate to consider such victims as members of a particular social group. That does not mean that all women who have been trafficked would qualify, however. British courts and tribunals have recognised that some victims of THB could be members of a particular social group in certain circumstances: </span><em data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Secretary of State for the Home Department v. Dzhygun</span></em><span data-dcnode-id="930" instrument_node=""> (2000) Immigration Appeal Tribunal Decision 00</span><sup data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">TH</span></sup><span data-dcnode-id="927" instrument_node="">00728 (the group being women from Ukraine forced into prostitution against their will); </span><em data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Miss AB v. Secretary of State for the Home Department</span></em><span data-dcnode-id="924" instrument_node=""> (2003) Immigration Appellate Authority decision CC/64057/2002 (the group consisting of girls trafficked from West Africa); </span><em data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Appellant v. Secretary of State for the Home Department</span></em><span data-dcnode-id="921" instrument_node=""> [2003] UKIAT 00023 (the group consisting of women from the north east of Albania); </span><em data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Petition of Olga Shimkova</span></em><span data-dcnode-id="918" instrument_node="">, Outer House, Court of Session, 23 Dec. 2003 (the group consisting of women trafficked from Ukraine). In </span><em data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">JO v. Secretary of State for the Home Department</span></em><span data-dcnode-id="915" instrument_node=""> [2004] UKIAT 00251, on the other hand, it was said: ‘trafficked women do not qualify as a PSG, since what defines them is essentially the fact of persecution’. (para. 18). In that case the applicant was found on other grounds not to be eligible for asylum; however, the Tribunal did make it clear that in some situations women could be PSG, and suggested that trafficked women might benefit from this.</span></p></div></span></div><div class="footnote" content-id="fn37" data-dcnode-id="903"><span class="fn" data-dcnode-id="904"><span class="label fn-label" data-dcnode-id="908"><span class="end-note-link" data-dcnode-id="909" data-fn-id="fn37" rel="nofollow"><span data-dcnode-id="910" instrument_node="">37</span></span></span><div class="footnote-content" data-dcnode-id="905"><p class="footnote-compatibility" data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Para. 39.</span></p></div></span></div><div class="footnote" content-id="fn38" data-dcnode-id="895"><span class="fn" data-dcnode-id="896"><span class="label fn-label" data-dcnode-id="900"><span class="end-note-link" data-dcnode-id="901" data-fn-id="fn38" rel="nofollow"><span data-dcnode-id="902" instrument_node="">38</span></span></span><div class="footnote-content" data-dcnode-id="897"><p class="footnote-compatibility" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">This has been recognised by both the Australian High Court and the UK House of Lords. See, Germov and Motta, above n. 23, at 307–17.</span></p></div></span></div><div class="footnote" content-id="fn39" data-dcnode-id="887"><span class="fn" data-dcnode-id="888"><span class="label fn-label" data-dcnode-id="892"><span class="end-note-link" data-dcnode-id="893" data-fn-id="fn39" rel="nofollow"><span data-dcnode-id="894" instrument_node="">39</span></span></span><div class="footnote-content" data-dcnode-id="889"><p class="footnote-compatibility" data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Paras. 41–4.</span></p></div></span></div><div class="footnote" content-id="fn40" data-dcnode-id="876"><span class="fn" data-dcnode-id="877"><span class="label fn-label" data-dcnode-id="884"><span class="end-note-link" data-dcnode-id="885" data-fn-id="fn40" rel="nofollow"><span data-dcnode-id="886" instrument_node="">40</span></span></span><div class="footnote-content" data-dcnode-id="878"><p class="footnote-compatibility" data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">The special protection needs of victims of trafficking have been acknowledged by UNHCR. See, ExCom, Note on International Protection, 13 Sept. 2001 68: ‘The Convention does not specifically refer to any particular groups of people who may face problems when forcibly displaced. Yet there are persons whose protection needs might require a tailored response with additional safeguards. Among them are… survivors of sexual and gender-based violence.’; 70: ‘Women and girls, who are victims of trafficking and have been stranded en route, have given rise to acute protection needs …’ A/AC.96.951 96/951. The problems confronting trafficked women in this regard are acknowledged also in ExCom's Conclusion on International Protection of 5 October 2001, No 90 (LII): ‘…</span><em data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">expressing</span></em><span data-dcnode-id="880" instrument_node=""> concern that many victims of trafficking are rendered effectively stateless due to an inability to establish their identity and nationality status…’.</span></p></div></span></div><div class="footnote" content-id="fn41" data-dcnode-id="868"><span class="fn" data-dcnode-id="869"><span class="label fn-label" data-dcnode-id="873"><span class="end-note-link" data-dcnode-id="874" data-fn-id="fn41" rel="nofollow"><span data-dcnode-id="875" instrument_node="">41</span></span></span><div class="footnote-content" data-dcnode-id="870"><p class="footnote-compatibility" data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">This mandate is based on the Convention on the Reduction of Statelessness 1961, in which the General Assembly entrusted the UNHCR to act on behalf of stateless persons, as well as subsequent General Assembly Resolutions: Guidelines, n. 47.</span></p></div></span></div><div class="footnote" content-id="fn42" data-dcnode-id="860"><span class="fn" data-dcnode-id="861"><span class="label fn-label" data-dcnode-id="865"><span class="end-note-link" data-dcnode-id="866" data-fn-id="fn42" rel="nofollow"><span data-dcnode-id="867" instrument_node="">42</span></span></span><div class="footnote-content" data-dcnode-id="862"><p class="footnote-compatibility" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">606 UNTS 267.</span></p></div></span></div><span data-dcnode-id="859" instrument_node=""> </span><span data-dcnode-id="857" instrument_node="">
