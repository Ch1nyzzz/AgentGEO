</span><article class="et_pb_post post-26096 post type-post status-publish format-standard has-post-thumbnail hentry category-news-stories category-press-release" data-dcnode-id="896" id="post-26096"><span data-dcnode-id="980" instrument_node="">
</span><div class="et_post_meta_wrapper" data-dcnode-id="957"><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="971" id="breadcrumbs"><span data-dcnode-id="972"><span data-dcnode-id="973"><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/"><span data-dcnode-id="978" instrument_node="">Home</span></a><span data-dcnode-id="976" instrument_node=""> » </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Statement on two-year anniversary of death of Alan Kurdi</span></span></span></span></p><h1 class="entry-title" data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Statement on two-year anniversary of death of Alan Kurdi</span></h1><span data-dcnode-id="968" instrument_node="">
</span><p class="post-meta" data-dcnode-id="959"><span class="published" data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Aug 31, 2017</span></span><span data-dcnode-id="965" instrument_node=""> | </span><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/topic/news-stories/" rel="category tag"><span data-dcnode-id="964" instrument_node="">News Story</span></a><span data-dcnode-id="962" instrument_node="">, </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/topic/press-release/" rel="category tag"><span data-dcnode-id="961" instrument_node="">Press Release</span></a></p><span data-dcnode-id="958" instrument_node="">
</span></div><span data-dcnode-id="956" instrument_node=""> </span><span data-dcnode-id="954" instrument_node="">
</span><div class="entry-content" data-dcnode-id="905"><span data-dcnode-id="953" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="947" id="attachment_26102" style="width: 976px"><img alt="alan-kurdi-yante-ismail-unhcr" aria-describedby="caption-attachment-26102" class="size-full wp-image-26102 entered lazyloaded" data-dcnode-id="952" data-lazy-sizes="(max-width: 966px) 100vw, 966px" data-lazy-src="https://www.unhcr.ca/wp-content/uploads/2017/08/Alan-Kurdi-email-image-Yante-Ismail-2-1.jpg" data-lazy-srcset="https://www.unhcr.ca/wp-content/uploads/2017/08/Alan-Kurdi-email-image-Yante-Ismail-2-1.jpg 966w, https://www.unhcr.ca/wp-content/uploads/2017/08/Alan-Kurdi-email-image-Yante-Ismail-2-1-768x768.jpg 768w" data-ll-status="loaded" height="966" sizes="(max-width: 966px) 100vw, 966px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/wp-content/uploads/2017/08/Alan-Kurdi-email-image-Yante-Ismail-2-1.jpg&amp;raw" srcset="https://www.unhcr.ca/wp-content/uploads/2017/08/Alan-Kurdi-email-image-Yante-Ismail-2-1.jpg 966w, https://www.unhcr.ca/wp-content/uploads/2017/08/Alan-Kurdi-email-image-Yante-Ismail-2-1-768x768.jpg 768w" width="966"><noscript data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">&lt;img aria-describedby="caption-attachment-26102" class="size-full wp-image-26102" src="https://www.unhcr.ca/wp-content/uploads/2017/08/Alan-Kurdi-email-image-Yante-Ismail-2-1.jpg" alt="alan-kurdi-yante-ismail-unhcr" width="966" height="966" srcset="https://www.unhcr.ca/wp-content/uploads/2017/08/Alan-Kurdi-email-image-Yante-Ismail-2-1.jpg 966w, https://www.unhcr.ca/wp-content/uploads/2017/08/Alan-Kurdi-email-image-Yante-Ismail-2-1-768x768.jpg 768w" sizes="(max-width: 966px) 100vw, 966px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="948" id="caption-attachment-26102"><span data-dcnode-id="949" instrument_node="">illustration of Alan Kurdi by Yante Ismail © UNHCR/Yante Ismail</span></p></div><span data-dcnode-id="946" instrument_node="">
</span><h3 data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Nearly two years after the lifeless body of three-year-old Syrian toddler Alan Kurdi was found on a Turkish beach, UNHCR, the UN Refugee Agency, urges the international community to take robust action to prevent more tragedies.</span></h3><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Although the number of arrivals in Europe has drastically decreased since Alan’s death, people continue to attempt the journey and many have lost their lives in the process. Since 2 September 2015, at least 8,500 refugees and migrants have died or gone missing trying to cross the Mediterranean alone. Many others have died in the desert.</span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Many of the children trying to reach Europe travel on their own, making the journey even more terrifying and perilous. This was the case for 92 per cent of the 13,700 children who arrived to Italy by sea in the first seven months of 2017.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">The urgent need for solutions for these children and others on the move remains – if people see no hope and live in fear, then they will continue to gamble their lives making desperate journeys.</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">UNHCR is encouraged by the commitments made at the Paris meeting on migration and asylum on Monday that address some of these issues, but much more needs to be done to protect and save lives.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Political leaders need to work together to develop safer alternatives, to better inform those considering making the journey of the dangers they face, and most importantly to tackle the root causes of these movements, by resolving conflicts and creating real opportunities in countries of origin.</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">ENDS</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="924" instrument_node="">To read the full statement by the High Commissioner on the Paris meeting, please </span><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/news/press/2017/8/59a50c614/statement-filippo-grandi-un-high-commissioner-refugees-paris-meeting-28.html"><span data-dcnode-id="923" instrument_node="">click here</span></a><span data-dcnode-id="921" instrument_node="">:</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="918" instrument_node="">Click </span><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/news/press/2017/8/599ec5024/europe-refugee-migrant-arrivals-fall-reports-abuses-deaths-persist.html"><span data-dcnode-id="917" instrument_node="">here</span></a><span data-dcnode-id="915" instrument_node=""> to read the report on arrivals to Europe for the first half of 2017.</span></p><span data-dcnode-id="913" instrument_node="">
