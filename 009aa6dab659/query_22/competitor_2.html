tnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lawyersnjurists.com/contact-us/" tabindex="0"><span data-dcnode-id="502" instrument_node="">Contact us</span></a></li><li class="mega-menu-item mega-menu-item-type-custom mega-menu-item-object-custom mega-align-bottom-left mega-menu-flyout mega-menu-item-11378" data-dcnode-id="497" id="mega-menu-item-11378"><a class="mega-menu-link" data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lawyersnjurists.com/webmail" tabindex="0"><span data-dcnode-id="499" instrument_node="">Webmail</span></a></li></ul></div></div><div class="col-md-2 col-sm-2 col-lg-2" data-dcnode-id="489"><span data-dcnode-id="493" instrument_node="">
</span><a class="case-src-btn" data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lawyersnjurists.com/lawyer_ci/case_search" style="font-size:11px;"><span data-dcnode-id="492" instrument_node="">Advanced Search </span><i class="fa fa-angle-double-right" data-dcnode-id="491"></i></a></div></div></div></div></nav><p data-dcnode-id="477" id="breadcrumbs"><span data-dcnode-id="478"><span data-dcnode-id="479"><a data-dcnode-id="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lawyersnjurists.com/"><span data-dcnode-id="484" instrument_node="">Home</span></a><span data-dcnode-id="482" instrument_node=""> » </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">WHAT IS REFUGEE PROTECTION</span></span></span></span></p><div class="jtv-slideshow" data-dcnode-id="126"><div class="container" data-dcnode-id="127"><div class="row" data-dcnode-id="128"><div class="col-sm-9" data-dcnode-id="218"><div class="col-main" data-dcnode-id="219"><div class="blog-wrapper" data-dcnode-id="220" id="main"><div class="site-content" data-dcnode-id="221" id="primary"><div data-dcnode-id="222" id="content" role="main"><article class="blog_entry" data-dcnode-id="230"><header class="blog_entry-header" data-dcnode-id="473"><div class="blog_entry-header-inner" data-dcnode-id="474"><h2 class="blog_entry-title" data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">WHAT IS REFUGEE PROTECTION</span></h2></div></header><div class="entry-content" data-dcnode-id="231"><div class="featured-thumb" data-dcnode-id="469"><span data-dcnode-id="472" instrument_node="">
</span><a data-dcnode-id="470" href="#"><span data-dcnode-id="471" instrument_node="">
</span></a></div><div class="entry-content" data-dcnode-id="232"><div class="div1" data-dcnode-id="427" id="oxfordhb-9780199652433-e-021-div1-1"><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">The term REFUGEE and PROTECTION often invoked in discussion of the needs of individuals for shelters and assylums.</span></p><p data-dcnode-id="459"><span data-dcnode-id="466" instrument_node="">The movement of people between states, whether refugees or ‘migrants’, takes place in a context in which&nbsp;</span><i data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">sovereignty</span></i><span data-dcnode-id="463" instrument_node="">&nbsp;remains important, and specifically that aspect of sovereign competence which entitles the state to exercise prima facie exclusive jurisdiction over its territory, and to decide who among non-citizens shall be allowed to enter and remain, and who shall be refused admission and required or compelled to leave. Like every sovereign power, this competence must be exercised within and according to law, and the state’s right to control the admission of non-citizens is subject to certain well-defined exceptions in favour of those in search of refuge, among others. Moreover, the state which seeks to exercise migration controls&nbsp;</span><i data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">outside</span></i><span data-dcnode-id="460" instrument_node="">&nbsp;its territory, for example, through the physical interception, ‘interdiction’, and return of asylum seekers and forced migrants, may also be liable for actions which breach those of its international obligations which apply extra-territorially (Goodwin-Gill 2011;&nbsp;Moreno Lax 2011,&nbsp;2012).</span></p><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">The international law of refugee protection, which is the source of many such exceptions, comprises a range of universal and regional conventions (treaties), rules of customary international law, general principles of law, national laws, and the ever-developing standards in the practice of states and international organizations, notably the Office of the United Nations High Commissioner for Refugees.</span></p><p data-dcnode-id="442"><span data-dcnode-id="456" instrument_node="">While the provision of material assistance—food, shelter, and medical care—is a critically important function of the international refugee regime, the notion of&nbsp;</span><i data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">legal protection</span></i><span data-dcnode-id="453" instrument_node="">&nbsp;has a very particular focus. Protection in this sense means using the legal tools, including treaties and national laws, which prescribe or implement the obligations of states and which are intended to ensure that no refugee in search of asylum is penalized, expelled, or refouled, that every refugee enjoys the full complement of rights and benefits to which he or she is entitled&nbsp;</span><i data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">as a refugee</span></i><span data-dcnode-id="450" instrument_node="">; and that the human rights of every refugee&nbsp;</span><a class="pageNumber" data-dcnode-id="449" name="p37"></a><span class="pageNumber" data-dcnode-id="447" id="pageid_37"><span data-dcnode-id="448" instrument_node="">(p. 37)&nbsp;</span></span><span data-dcnode-id="446" instrument_node="">are guaranteed. Protection is thus based in the law; it may be wider than rights, but it begins with rights and rights permeate the whole. Moreover, while solutions remain the ultimate objective of the international refugee regime, this does not mean that the one goal is automatically subsumed within the other. That is, protection&nbsp;</span><i data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">is</span></i><span data-dcnode-id="443" instrument_node="">&nbsp;an end in itself, so far as it serves to ensure the fundamental human rights of the individual. Neither the objective of solutions nor the imperatives of assistance, therefore, can displace the autonomous protection responsibility which is borne, in its disparate dimensions, by both states and UNHCR.</span></p><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">The modern law can now be traced back nearly 100 years, to legal and institutional initiatives taken by the League of Nations, first, in the appointment of a High Commissioner for Refugees in 1921, and then in agreement the following year on the issue of identity certificates to ‘any person of Russian origin who does not enjoy or no longer enjoys the protection of the Government of the Union of Soviet Socialist Republics and who has not acquired another nationality’. After the Second World War, the refugee question became highly politicized (Goodwin-Gill 2008), and the UN’s first institutional response to the problem—the International Refugee Organization (IRO), a specialized agency—was opposed by the Soviet Union and its allies, remaining funded by only 18 of the 54 governments which were then members of the United Nations. Notwithstanding the politics of the day, tens of thousands of refugees and displaced persons were resettled under IRO auspices, through government selection schemes, individual migration, and employment placement (Holborn 1975;&nbsp;Loescher and Scanlan 1986).</span></p><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">In 1951, the IRO was replaced by a new agency, an initially non-operational subsidiary organ of the UN General Assembly charged with providing ‘international protection’ to refugees and seeking permanent solutions. The Statute of the United Nations High Commissioner for Refugees (UNHCR) was adopted on 14 December 1950, and the Office came into being on 1 January 1951.&nbsp;Its mandate was general and universal, including refugees recognized under earlier arrangements, as well as those outside their country of origin who were unable or unwilling to return there owing to well-founded fear of persecution on grounds of race, religion, nationality, or political opinion. Once a temporary agency, UNHCR was put on a permanent basis in 2003, when the General Assembly renewed its mandate ‘until the refugee problem is solved’.</span></p><p data-dcnode-id="433"><span data-dcnode-id="437" instrument_node="">From the start, UNHCR’s protection responsibilities were intended to be complemented by a new refugee treaty, and the 1951 Convention relating to the Status of Refugees was finalized by states at a conference in Geneva in July 1951; it entered into force in 1954 (Goodwin-Gill 2009).&nbsp;Notwithstanding the intended complementarity, there were already major differences between UNHCR’s mandate, which was universal and general, unconstrained by geographical or temporal limitations, and the refugee definition forwarded to the Conference by the General Assembly. This reflected the reluctance of states to sign a ‘blank cheque’ for unknown numbers of future refugees, and so was restricted to those who became refugees by reason of events occurring before 1 January 1951; the Conference was to add a further option, allowing states to limit their obligations to refugees resulting from events occurring&nbsp;</span><i data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">in Europe</span></i><span data-dcnode-id="434" instrument_node="">&nbsp;before the critical date.</span></p><p data-dcnode-id="428"><a class="pageNumber" data-dcnode-id="432" name="p38"></a><span class="pageNumber" data-dcnode-id="430" id="pageid_38"><span data-dcnode-id="431" instrument_node="">(p. 38)&nbsp;</span></span><span data-dcnode-id="429" instrument_node="">The difficulty of maintaining a refugee definition bounded by time and space was soon apparent, but it was not until 1967 that the Protocol relating to the Status of Refugees helped to bridge the gap between UNHCR’s mandate and the 1951 Convention.&nbsp;The Protocol is often referred to as ‘amending’ the 1951 Convention, but in fact it does no such thing. States parties to the Protocol, which can be ratified or acceded to without becoming a party to the Convention, simply agree to apply Articles 2 to 34 of the Convention to refugees defined in Article 1 thereof, as if the dateline were omitted (Article I of the Protocol). Cape Verde, the United States of America, and Venezuela have acceded only to the Protocol; Madagascar and St Kitts and Nevis remain party only to the Convention; and Madagascar and Turkey have retained the geographical limitation. The Protocol required just six ratifications and it entered into force on 4 October 1967.</span></p></div><div class="div1" data-dcnode-id="365" id="oxfordhb-9780199652433-e-021-div1-2"><p data-dcnode-id="424"><strong data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">The Convention Refugee Definition</span></strong></p><div class="div2" data-dcnode-id="419" id="oxfordhb-9780199652433-e-021-div2-1"><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Article 1A(1) of the 1951 Convention applies the term ‘refugee’, first, to any person considered a refugee under earlier international arrangements. Then, Article 1A(2), read now together with the 1967 Protocol and without time or geographical limits, offers a general definition of the refugee as including any person who is outside their country or origin and unable or unwilling to return there or to avail themselves of its protection, owing to well-founded fear of persecution for reasons of race, religion, nationality, membership of a particular social group (an additional ground not found in the UNHCR Statute), or political opinion. Stateless persons may also be refugees in this sense, where country of origin (citizenship) is understood as ‘country of former habitual residence’.</span></p><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">The refugee must be ‘outside’ his or her country of origin, and having crossed an international frontier is an intrinsic part of the quality of refugee, understood in the international legal sense. However, it is not necessary to have fled by reason of fear of persecution, or even actually to have been persecuted. The fear of persecution looks to the future, and can emerge during an individual’s absence from their home country, for example, as a result of intervening political change.</span></p></div><div class="div2" data-dcnode-id="366" id="oxfordhb-9780199652433-e-021-div2-2"><p data-dcnode-id="416" id="oxfordhb-9780199652433-e-021-titleGroup-3"><strong data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Persecution and the Reasons for Persecution</span></strong></p><div class="div3" data-dcnode-id="399"><p data-dcnode-id="404"><span data-dcnode-id="415" instrument_node="">Although central to the refugee definition, ‘persecution’ itself is not defined in the 1951 Convention. Articles 31 and 33 refer to threats to life or freedom, so clearly it includes the threat of death, or the threat of torture, or cruel, inhuman, or degrading treatment or punishment. A comprehensive analysis requires the general notion to be related to developments within the broad field of human rights, and the recognition that fear of persecution and lack of protection are themselves interrelated elements. The persecuted do not enjoy the protection of their country of origin, while evidence of the lack of protection on either the internal or external level may create a presumption as to the </span><a class="pageNumber" data-dcnode-id="414" name="p39"></a><span class="pageNumber" data-dcnode-id="412" id="pageid_39"><span data-dcnode-id="413" instrument_node="">(p. 39)&nbsp;</span></span><span data-dcnode-id="411" instrument_node="">likelihood of persecution and to the well-foundedness of any fear. However, there is no necessary linkage between persecution and government authority. A Convention refugee, by definition, must be&nbsp;</span><i data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">unable</span></i><span data-dcnode-id="408" instrument_node="">&nbsp;or&nbsp;</span><i data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">unwilling</span></i><span data-dcnode-id="405" instrument_node="">&nbsp;to avail him- or herself of the protection of the state or government, and the notion of inability to secure the protection of the state is broad enough to include a situation where the authorities cannot or will not provide protection, for example, against persecution by non-state actors.</span></p><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">The Convention does require that the persecution feared be for reasons of ‘race, religion, nationality, membership of a particular social group, or political opinion’. This language, which recalls the language of non-discrimination in the Universal Declaration of Human Rights and subsequent human rights instruments, gives an insight into the characteristics of individuals and groups which are considered relevant to refugee protection. These reasons in turn show that the groups or individuals are identified by reference to a classification which ought to be irrelevant to the enjoyment of fundamental human rights, while persecution implies a violation of human rights of particular gravity; it may be the result of cumulative events or systemic mistreatment, but equally it could comprise a single act of torture (Hathaway 2005;&nbsp;Goodwin-Gill and McAdam 2007).</span></p><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">The Convention does not just say who is a refugee, but also sets out when refugee status comes to an end (Article 1C; for example, in the case of voluntary return, acquisition of a new, effective nationality, or change of circumstances in the country of origin). For political reasons, the Convention also puts Palestinian refugees outside its scope (at least while they continue to receive protection or assistance from other UN agencies; Article 1D); and it excludes those who are treated as nationals in their state of refuge (Article 1E). Finally, the Convention definition categorically excludes from the benefits of refugee status anyone who there are serious reasons to believe has committed a war crime, a serious non-political offence prior to admission, or acts contrary to the purposes and principles of the United Nations (Article 1F). From the beginning, therefore, the 1951 Convention has contained clauses sufficient to ensure that the serious criminal and the terrorist do not benefit from international protection.</span></p></div><div class="div3" data-dcnode-id="367"><p data-dcnode-id="396" id="oxfordhb-9780199652433-e-021-titleGroup-4"><strong data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Non-refoulement</span></strong></p><p data-dcnode-id="391"><span data-dcnode-id="395" instrument_node="">Besides identifying the essential characteristics of the refugee, states party to the Convention also accept specific obligations which are crucial to achieving the goal of protection, and thereafter an appropriate solution. Foremost among these is the principle of&nbsp;</span><i data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">non-refoulement</span></i><span data-dcnode-id="392" instrument_node="">. As set out in the Convention, this prescribes broadly that no refugee shall be returned in any manner whatsoever to any country where he or she would be at risk of persecution.</span></p><p data-dcnode-id="373"><span data-dcnode-id="390" instrument_node="">The word&nbsp;</span><i data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">refoulement</span></i><span data-dcnode-id="387" instrument_node="">&nbsp;derives from the French&nbsp;</span><i data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">refouler</span></i><span data-dcnode-id="384" instrument_node="">, which means to drive back or to repel. The idea that a state ought not to return persons to other states in certain circumstances was first referred to in Article 3 of the 1933 Convention relating to the International Status of Refugees. It was not widely ratified, but a new era began with the&nbsp;</span><a class="pageNumber" data-dcnode-id="383" name="p40"></a><span class="pageNumber" data-dcnode-id="381" id="pageid_40"><span data-dcnode-id="382" instrument_node="">(p. 40)&nbsp;</span></span><span data-dcnode-id="380" instrument_node="">General Assembly’s 1946 endorsement of the principle that refugees with valid objections should not be compelled to return to their country of origin.An initial proposal that the prohibition of&nbsp;</span><i data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">refoulement</span></i><span data-dcnode-id="377" instrument_node="">&nbsp;be absolute and without exception was qualified by the 1951 Conference, which added a paragraph to deny the benefit of&nbsp;</span><i data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">non-refoulement</span></i><span data-dcnode-id="374" instrument_node="">&nbsp;to the refugee whom there are ‘reasonable grounds for regarding as a danger to the security of the country…or who, having been convicted by a final judgment of a particularly serious crime, constitutes a danger to the community of that country.’ Apart from such limited exceptions, however, the drafters of the 1951 Convention made it clear that refugees should not be returned, either to their country of origin or to other countries in which they would be at risk; they also categorically rejected a proposal allowing for ‘cancellation’ of refugee status in cases of criminal or delinquent behaviour after recognition.</span></p><p data-dcnode-id="368"><span data-dcnode-id="372" instrument_node="">Today, the principle of&nbsp;</span><i data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">non-refoulement</span></i><span data-dcnode-id="369" instrument_node="">&nbsp;is not only the essential foundation for international refugee law, but also an integral part of human rights protection, implicit in the subject matter of many such rights, and a rule of customary international law.</span></p></div></div></div><div class="div1" data-dcnode-id="340" id="oxfordhb-9780199652433-e-021-div1-3"><p data-dcnode-id="362"><strong data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Convention Standards of Treatment</span></strong></p><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Every state is obliged to implement its international obligations in good faith, which often means incorporating international treaties into domestic law, and setting up appropriate mechanisms so that those who should benefit are identified and treated accordingly. The 1951 Convention is not self-applying, and while recognition of refugee status may be declaratory of the facts, the enjoyment of most Convention rights is necessarily contingent on such a decision being made by a state party. A procedure for the determination of refugee status thus goes a long way towards ensuring the identification of those entitled to protection, and makes it easier for a state to fulfil its international obligations.</span></p><p data-dcnode-id="355"><span data-dcnode-id="359" instrument_node="">In addition to the core protection of&nbsp;</span><i data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">non-refoulement</span></i><span data-dcnode-id="356" instrument_node="">, the 1951 Convention prescribes freedom from penalties for illegal entry (Article 31), and freedom from expulsion, save on the most serious grounds (Article 32). Article 8 seeks to exempt refugees from the application of exceptional measures which might otherwise affect them by reason only of their nationality, while Article 9 preserves the right of states to take ‘provisional measures’ on the grounds of national security against a particular person, but only ‘pending a determination by the Contracting State that that person is in fact a refugee and that the continuance of such measures is necessary…in the interests of national security’.</span></p><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">States have also agreed to provide certain facilities to refugees, including administrative assistance (Article 25); identity papers (Article 27), and travel documents (Article 28); the grant of permission to transfer assets (Article 30); and the facilitation of naturalization (Article 34).</span></p><p data-dcnode-id="341"><span data-dcnode-id="352" instrument_node="">Given the further objective of a&nbsp;</span><i data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">solution</span></i><span data-dcnode-id="349" instrument_node="">&nbsp;(assimilation or integration), the Convention concept of refugee&nbsp;</span><i data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">status</span></i><span data-dcnode-id="346" instrument_node="">thus offers a point of departure in considering the appropriate standard of treatment of refugees within the territory of contracting states. It is at&nbsp;</span><a class="pageNumber" data-dcnode-id="345" name="p41"></a><span class="pageNumber" data-dcnode-id="343" id="pageid_41"><span data-dcnode-id="344" instrument_node="">(p. 41)&nbsp;</span></span><span data-dcnode-id="342" instrument_node="">this point, where the Convention focuses on matters such as social security, rationing, access to employment and the liberal professions, that it betrays its essentially European origin; it is here, in the articles dealing with social and economic rights, that the greatest number of reservations are to be found, particularly among developing states. Otherwise, however, the Convention proposes, as a minimum standard, that refugees should receive at least that treatment which is accorded to non-citizens generally. In some contexts, ‘most-favoured-nation’ treatment is called for (Articles 15, 17(1)), in others, ‘national treatment’, that is, treatment no different from that accorded to citizens (Articles 4, 14, 16, 20, 22(1), 23, 24(1), 29).</span></p></div><div class="div1" data-dcnode-id="323" id="oxfordhb-9780199652433-e-021-div1-4"><p data-dcnode-id="337"><strong data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Refugee Definition and Protection beyond the Convention</span></strong></p><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">In addition to measures adopted at the universal level, the international legal protection of refugees and forced migrants benefits from regional arrangements and instruments which, in turn, may be refugee specific or oriented more generally to the protection of human rights.</span></p><p data-dcnode-id="330"><span data-dcnode-id="334" instrument_node="">In 1969, the Organization of African Unity (now the African Union) adopted the Convention on the Specific Aspects of Refugee Problems in Africa (Sharpe 2012).&nbsp;Article I(1) incorporates the 1951 Convention definition, but paragraph (2) adds an approach more immediately reflecting the social and political realities of contemporary refugee movements. Also to be accepted as refugees are those compelled to flee owing to external aggression, occupation, foreign domination, or events seriously disturbing public order. In 1984, 10 Central American States adopted a similar approach in the (non-binding) Cartagena Declaration,&nbsp;recognizing in addition flight from generalized violence, internal conflicts, and massive violation of human rights. Two years later, in the extradition case of&nbsp;</span><i data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Soering v United Kingdom</span></i><span data-dcnode-id="331" instrument_node="">,&nbsp;the European Court of Human Rights laid the essential foundations for protection from removal under the European Convention. In this first judgment in what is now a long and consistent body of jurisprudence, the court ruled that it would be a breach of the Convention to remove an individual to another state in which there were substantial grounds to believe that he or she would face a real risk of treatment contrary to Article 3, which prohibits torture or inhuman or degrading treatment. Later judgments have confirmed the applicability of this principle without exception, for example, in ‘security’ or criminal cases,&nbsp;and in the context also of extra-territorial interception operations.</span></p><p data-dcnode-id="324"><span data-dcnode-id="329" instrument_node="">This human rights jurisprudence contributed substantially to ‘legislative’ developments within the European Union. These include the adoption of the 2001 Directive on Temporary Protection,&nbsp;applicable to ‘displaced persons’ unable or unwilling to return to their country of origin, for example, because of armed conflict, endemic violence, or systematic or generalized violence, and whether or not they are Convention refugees;&nbsp;</span><a class="pageNumber" data-dcnode-id="328" name="p42"></a><span class="pageNumber" data-dcnode-id="326" id="pageid_42"><span data-dcnode-id="327" instrument_node="">(p. 42)&nbsp;</span></span><span data-dcnode-id="325" instrument_node="">and the 2004 Qualification Directive, which besides providing for recognition of Convention refugees, now also calls for ‘subsidiary protection’ in the case of those who would face a real risk of serious harm if returned to their country of origin (McAdam 2007).</span></p></div><div class="div1" data-dcnode-id="312" id="oxfordhb-9780199652433-e-021-div1-5"><p data-dcnode-id="320"><strong data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Asylum</span></strong></p><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">No international instrument defines ‘asylum’. Article 14 of the 1948 Universal Declaration of Human Rights simply says that ‘Everyone has the right to seek and to enjoy in other countries asylum from persecution.’ Article 1 of the 1967 UN Declaration on Territorial Asylum notes that ‘Asylum granted by a State, in the exercise of its sovereignty, to persons entitled to invoke Article 14 of the Universal Declaration of Human Rights…shall be respected by all other States.’ But it is for ‘the State granting asylum to evaluate the grounds for the grant of asylum’ (Goodwin-Gill 2012).</span></p><p data-dcnode-id="313"><span data-dcnode-id="317" instrument_node="">Neither instrument creates any binding obligations for states. Indeed, both texts suggest a considerable margin of appreciation with respect to who is granted asylum and what exactly this means. In practice, however, states’ freedom of action is significantly influenced by ‘external’ constraints, which follow from an internationally recognized refugee definition, the application of the principle of&nbsp;</span><i data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">non-refoulement</span></i><span data-dcnode-id="314" instrument_node="">, and the overall impact of human rights law. Regional instruments and doctrine have also had an important impact on the ‘asylum question’. Again, the 1969 OAU Convention was among the first to give a measure of normative content to the discretionary competence of states to grant asylum (Article II).&nbsp;Within the EU, the 2000 Charter of Fundamental Rights declares expressly that ‘the right to asylum shall be guaranteed…’, and that no one may be removed to a state where he or she faces a serious risk of the death penalty, torture, or other inhuman or degrading treatment or punishment (Articles 18, 19). The Qualification Directive provides in turn that member states ‘shall grant’ refugee status to those who satisfy the relevant criteria (Article 13; see also Article 8 of the Temporary Protection Directive) (Gil-Bazo 2008).</span></p></div><div class="div1" data-dcnode-id="280" id="oxfordhb-9780199652433-e-021-div1-6"><p data-dcnode-id="309"><strong data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Protection and Solutions</span></strong></p><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">UNHCR’s responsibility to seek permanent solutions for the problem of refugees&nbsp;is commonly translated into a preferential hierarchy, with voluntary repatriation as a first priority, followed by local asylum and resettlement in a third state.</span></p><p data-dcnode-id="292"><span data-dcnode-id="306" instrument_node="">The ultimate purpose of protection is not to ensure that refugees remain refugees for ever, and&nbsp;</span><i data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">voluntary repatriation</span></i><span data-dcnode-id="303" instrument_node="">&nbsp;reflects the right of the individual to return to his or her country of citizenship. No universal instrument deals with this, but the ‘right to return’ is widely accepted as an inalienable incident of nationality. The only formal reference&nbsp;</span><a class="pageNumber" data-dcnode-id="302" name="p43"></a><span class="pageNumber" data-dcnode-id="300" id="pageid_43"><span data-dcnode-id="301" instrument_node="">(p. 43)&nbsp;</span></span><span data-dcnode-id="299" instrument_node="">appears in the 1969 OAU Convention, Article 5(1) of which emphasizes that the ‘essentially voluntary character of repatriation shall be respected in all cases and no refugee shall be repatriated against his will’. On several occasions, the UNHCR Executive Committee has proposed standards and guidelines for voluntary repatriation operations.&nbsp;The general rule is that refugees should return&nbsp;</span><i data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">voluntarily</span></i><span data-dcnode-id="296" instrument_node="">&nbsp;and in conditions of&nbsp;</span><i data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">security</span></i><span data-dcnode-id="293" instrument_node="">, and the international community has a legal interest in the follow-up to any repatriation movement; the security of those returning and the implementation of amnesties and other guarantees are rightly considered matters of international concern, and therefore subject to monitoring against relevant legal standards.</span></p><p data-dcnode-id="285"><i data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Local integration</span></i><span data-dcnode-id="289" instrument_node="">, that is, residence and acceptance into the local community where the refugee first arrives, is the practical realization of asylum. States may be bound to the refugee definition and bound to observe the principle of&nbsp;</span><i data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">non-refoulement</span></i><span data-dcnode-id="286" instrument_node="">, but they retain discretion as to whether to allow a refugee to settle locally; this point was underlined by the UNHCR Executive Committee in its 2005 Conclusion on local integration,although with little if any regard or reference to states’ other obligations under international law which govern the treatment of non-nationals on state territory.</span></p><p data-dcnode-id="281"><i data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Resettlement</span></i><span data-dcnode-id="282" instrument_node="">&nbsp;aims to accommodate a variety of objectives, the first being to provide a durable solution for refugees and the displaced, unable to return home or to remain in their country of first refuge. A further goal is to relieve the strain on receiving countries, sometimes in a quantitative way, at others in a political way, by assisting them in relations with countries of origin. Resettlement thus contributes to international solidarity and continued fulfilment of the fundamental principles of protection, but given the continuing relevance of the sovereign competence referred to above and the challenges of translating the principle of international cooperation into effective action,&nbsp;it is difficult to see what more international law can contribute to this solution.</span></p></div><div class="div1" data-dcnode-id="253" id="oxfordhb-9780199652433-e-021-div1-7"><p data-dcnode-id="277"><strong data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Refugees and Human Rights</span></strong></p><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">The refugee problem cannot be considered apart from the field of human rights as a whole, which touches on both causes and solutions, so that knowledge and appreciation of the rights at issue helps to understand the refugee concept. The treatment of refugees and asylum seekers within a state is governed not only by the refugee treaties, but also by the broader human rights treaties (and even rules of customary international law), which set out general standards, whether of a procedural or substantive nature (for example, the requirement that a remedy be provided for every violation of human rights; or the duty of a state to protect everyone within its territory or jurisdiction from torture). Here, local law and practice play an important role in ensuring that international rules are applied.</span></p><p data-dcnode-id="266"><span data-dcnode-id="274" instrument_node="">The 1951 Convention is frequently described as a ‘human rights treaty’, to be approached as a living instrument, evolving to meet the needs and challenges of the day. Given the subject matter and the inescapable linkage between human rights violations&nbsp;</span><a class="pageNumber" data-dcnode-id="273" name="p44"></a><span class="pageNumber" data-dcnode-id="271" id="pageid_44"><span data-dcnode-id="272" instrument_node="">(p. 44)&nbsp;</span></span><span data-dcnode-id="270" instrument_node="">and forced displacement, this descriptive language is understandable. The Convention, however, is not like most other human rights treaties, and it is styled a convention relating to the&nbsp;</span><i data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">status</span></i><span data-dcnode-id="267" instrument_node="">&nbsp;of refugees, rather than one on the rights of refugees. Moreover, it does not frame ‘refugee rights’ in terms of what ‘every refugee’ shall enjoy and ‘no refugee’ shall be denied; in this sense its approach differs markedly from that later adopted in the 1966 Covenants, the 1989 Convention on the Rights of the Child, or the 2006 Convention on the Rights of Persons with Disabilities. Whereas later human rights treaties tend to identify the individual as the point of departure—whether simply by virtue of being human, or a child, a woman, a worker, or someone with a disability—the practice of states and international organizations has itself helped to bring the concept of refugee rights into the foreground of international legal protection doctrine.</span></p><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">The 1951 Convention remains quite ‘state-centric’, in the sense that it represents undertakings and obligations, accepted between the parties, to respect, protect, or accord certain rights and benefits.Sometimes a right may be stated simply, unqualified other than by reference to the refugee’s lawful presence (Article 32), but at others, it has to be implied (‘the refugee shall be allowed…’: Article 32(2)), or must be assumed as the reverse side of a qualification to the competence of the state, rather than a right strictly correlative to duty (contracting states ‘shall not expel a refugee…save on grounds of national security or public order’: Article 32(1); ‘shall not impose penalties….’: Article 31; ‘shall issue identity papers…’: Article 27; and ‘No contracting State shall expel or return (“refouler”) a refugee…’: Article 33(1)).</span></p><p data-dcnode-id="259"><span data-dcnode-id="263" instrument_node="">In addition to the ‘protection gap’ between the principle of&nbsp;</span><i data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">non-refoulement</span></i><span data-dcnode-id="260" instrument_node=""> and asylum in the sense of solution, there are further doctrinal gaps between the Convention/Protocol refugee regime and the seemingly broader regime, or regimes, of human rights protection. The 1969 Vienna Convention on the Law of Treaties provides no answer, for example, to the question of how far the general prohibition of discrimination in Article 26 of the 1966 International Covenant on Civil and Political Rights is to be applied to refugees;&nbsp;or how, if at all, their specific entitlements under the 1951 Convention are to be ‘updated’ or ‘expanded’ in the light of parallel systems of protection which seem to be simultaneously applicable.</span></p><p data-dcnode-id="254"><span data-dcnode-id="258" instrument_node="">The practice of states at present provides no clear answers, save that states themselves appear to want to maintain the specific, refugee-focused approach of the 1951 Convention. The fundamental principles of refugee protection, particularly refuge, non-return, or ‘</span><i data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">non-refoulement</span></i><span data-dcnode-id="255" instrument_node="">’, are necessarily common material to both fields, but reports of human rights undermining the refugee protection regime are likely exaggerated or premature, or just plain academic speculation.</span></p></div><div class="div1" data-dcnode-id="233" id="oxfordhb-9780199652433-e-021-div1-8"><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Evaluation and Conclusion</span></p><p data-dcnode-id="245"><span data-dcnode-id="250" instrument_node="">The 1951 Convention is sometimes portrayed today as a relic of the Cold War, inadequate in the face of ‘new’ refugees from ethnic violence and gender-based persecution,&nbsp;</span><a class="pageNumber" data-dcnode-id="249" name="p45"></a><span class="pageNumber" data-dcnode-id="247" id="pageid_45"><span data-dcnode-id="248" instrument_node="">(p. 45)&nbsp;</span></span><span data-dcnode-id="246" instrument_node="">insensitive to security concerns, particularly terrorism and organized crime, and even redundant, given the protection now due in principle to everyone under international human rights law.</span></p><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">The 1951 Convention does not deal with the question of admission, and neither does it oblige a state of refuge to accord asylum as such, or provide for the sharing of responsibilities (for example, by prescribing which state should deal with a claim to refugee status). The Convention does not address the question of ‘causes’ of flight, or make provision for prevention; its scope does not include internally displaced persons, and it is not concerned with the better management of international migration. At the regional level, and notwithstanding the 1967 Protocol, refugee movements have necessitated more focused responses, such as the 1969 OAU Convention and the 1984 Cartagena Declaration; while in Europe, the development of protection doctrine under the 1950 European Convention on Human Rights has led to the adoption of provisions on ‘subsidiary’ or ‘complementary’ protection within the legal system of the European Union.</span></p><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Nevertheless, within the context of the international refugee regime, which brings together states, UNHCR, and other international organizations, the UNHCR Executive Committee, and non-governmental organizations, among others, the 1951 Convention continues to play an important part in the protection of refugees, in the promotion and provision of solutions for refugees, in ensuring the security and related interests of states, sharing responsibility, and generally promoting human rights. Ministerial Meetings of States Parties, convened in Geneva by the government of Switzerland to mark the 50th and 60th anniversaries of the Convention in December 2001 and December 2011, expressly acknowledged, ‘the continuing relevance and resilience of this international regime of rights and principles…’ and reaffirmed that the 1951 Convention and the 1967 Protocol ‘are the foundation of the international refugee protection regime and have enduring value and relevance in the twenty-first century’.</span></p><p data-dcnode-id="236"><span data-dcnode-id="240" instrument_node="">In many states, judicial and administrative procedures for the determination of refugee status have established the necessary legal link between refugee status and protection, contributed to a broader and deeper understanding of key elements in the Convention refugee definition, and helped to consolidate the fundamental principle of&nbsp;</span><i data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">non-refoulement</span></i><span data-dcnode-id="237" instrument_node="">. While initially concluded as an agreement between states on the treatment of refugees, the 1951 Convention has inspired both doctrine and practice in which the language of refugee rights is entirely appropriate.</span></p><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">The concept of the refugee as an individual with a well-founded fear of persecution continues to carry weight, and to symbolize one of the essential, if not exclusive, reasons for flight. The scope and extent of the refugee definition, however, have matured under the influence of human rights law and practice, to the point that, in certain well-defined circumstances, the necessity for protection against the risk of harm can trigger an obligation to protect.</span></p></div></div></div></article><div class="popular-posts widget widg
