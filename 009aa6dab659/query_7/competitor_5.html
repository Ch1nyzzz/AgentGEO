</span><div class="legisHeader" data-dcnode-id="2438"><header data-dcnode-id="2440"><h1 class="HeadTitle" data-dcnode-id="2477" id="wb-cont"><span data-dcnode-id="2481" instrument_node="">Immigration and Refugee Protection Act&nbsp;(</span><abbr data-dcnode-id="2479" title="Statutes of Canada"><span data-dcnode-id="2480" instrument_node="">S.C.</span></abbr><span data-dcnode-id="2478" instrument_node=""> 2001, c. 27)</span></h1><div data-dcnode-id="2449" id="printAll"><p data-dcnode-id="2475" id="FullDoc"><span data-dcnode-id="2476" instrument_node="">Full Document: &nbsp;</span></p><ul data-dcnode-id="2450"><li data-dcnode-id="2469"><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/I-2.5/FullText.html"><span data-dcnode-id="2474" instrument_node="">HTML</span><span class="wb-invisible" data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">Full Document: Immigration and Refugee Protection Act</span></span></a><span data-dcnode-id="2470" instrument_node="">&nbsp;(Accessibility Buttons available) |&nbsp;</span></li><li data-dcnode-id="2460"><a data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/XML/I-2.5.xml"><span data-dcnode-id="2468" instrument_node="">XML</span><span class="wb-invisible" data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">Full Document: Immigration and Refugee Protection Act</span></span></a><span data-dcnode-id="2464" instrument_node=""> </span><span class="fileSize" data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">[608 KB]</span></span><span data-dcnode-id="2461" instrument_node="">&nbsp;|&nbsp;</span></li><span data-dcnode-id="2459" instrument_node=""> </span><li data-dcnode-id="2451"><a data-dcnode-id="2455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/PDF/I-2.5.pdf"><span data-dcnode-id="2458" instrument_node="">PDF</span><span class="wb-invisible" data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Full Document: Immigration and Refugee Protection Act</span></span></a><span data-dcnode-id="2454" instrument_node=""> </span><span class="fileSize" data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">[1183 KB]</span></span></li></ul></div><div class="info" data-dcnode-id="2441"><p data-dcnode-id="2442" id="assentedDate"><span data-dcnode-id="2448" instrument_node="">Act current to 2022-06-20 and </span><a data-dcnode-id="2446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/I-2.5/index.html%23hist"><span data-dcnode-id="2447" instrument_node="">last amended</span></a><span data-dcnode-id="2445" instrument_node=""> on 2021-11-23. </span><a data-dcnode-id="2443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/I-2.5/PITIndex.html"><span data-dcnode-id="2444" instrument_node="">Previous Versions</span></a></p></div></header><div class="lineSeparator goldLineTop" data-dcnode-id="2439"></div></div><div class="docContents" data-dcnode-id="1707" id="docCont"><span data-dcnode-id="2437" instrument_node="">
</span><nav data-dcnode-id="2429"><div class="btn-group btn-group-justified" data-dcnode-id="2430"><a class="btn btn-default" data-dcnode-id="2435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/I-2.5/page-16.html%23docCont" rel="prev" role="button"><span data-dcnode-id="2436" instrument_node="">Previous Page</span></a><a aria-controls="right-panel" class="overlay-lnk btn btn-default" data-dcnode-id="2433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/I-2.5/index.html" id="right-panel-trigger" role="button"><span data-dcnode-id="2434" instrument_node="">Table of Contents</span></a><a class="btn btn-default" data-dcnode-id="2431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/I-2.5/page-18.html%23docCont" rel="next" role="button"><span data-dcnode-id="2432" instrument_node="">Next Page</span></a></div></nav><div class="wb-txthl" data-dcnode-id="1709"><span data-dcnode-id="2428" instrument_node="">
</span><section data-dcnode-id="1710"><span data-dcnode-id="2427" instrument_node="">
</span><div class="continued" data-dcnode-id="2421"><h2 class="Part" data-dcnode-id="2422" id="h-276160"><span class="HLabel1" data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">PART 4</span></span><span class="HTitleText1" data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Immigration and Refugee Board (continued)</span></span></h2></div><span data-dcnode-id="2420" instrument_node="">
</span><h3 class="Subheading" data-dcnode-id="2417" id="h-276247"><span class="HTitleText2" data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">Provisions that Apply to All Divisions</span></span></h3><p class="MarginalNote" data-dcnode-id="2413"><span class="wb-invisible" data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2414" instrument_node="">Sole and exclusive jurisdiction</span></p><ul class="Section ProvisionList" data-dcnode-id="2393" id="276248"><li data-dcnode-id="2403"><p class="Subsection" data-dcnode-id="2404" id="276250"><strong data-dcnode-id="2409"><a class="sectionLabel" data-dcnode-id="2410" id="s-162"><span class="sectionLabel" data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">162</span></span></a></strong><span data-dcnode-id="2408" instrument_node="">&nbsp;</span><span class="lawlabel" data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">(1)</span></span><span data-dcnode-id="2405" instrument_node="">&nbsp;Each Division of the Board has, in respect of proceedings brought before it under this Act, sole and exclusive jurisdiction to hear and determine all questions of law and fact, including questions of jurisdiction.</span></p></li><li data-dcnode-id="2394"><p class="MarginalNote" data-dcnode-id="2399"><span class="wb-invisible" data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2400" instrument_node="">Procedure</span></p><p class="Subsection" data-dcnode-id="2395" id="276251"><span class="lawlabel" data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">(2)</span></span><span data-dcnode-id="2396" instrument_node="">&nbsp;Each Division shall deal with all proceedings before it as informally and quickly as the circumstances and the considerations of fairness and natural justice permit.</span></p></li></ul><span data-dcnode-id="2392" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="2388"><span class="wb-invisible" data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2389" instrument_node="">Composition of panels</span></p><p class="Section" data-dcnode-id="2382" id="276253"><strong data-dcnode-id="2384"><a class="sectionLabel" data-dcnode-id="2385" id="s-163"><span class="sectionLabel" data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">163</span></span></a></strong><span data-dcnode-id="2383" instrument_node="">&nbsp;Matters before a Division shall be conducted before a single member unless, except for matters before the Immigration Division, the Chairperson is of the opinion that a panel of three members should be constituted.</span></p><span data-dcnode-id="2381" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="2377"><span class="wb-invisible" data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2378" instrument_node="">Presence of parties</span></p><p class="Section" data-dcnode-id="2371" id="276255"><strong data-dcnode-id="2373"><a class="sectionLabel" data-dcnode-id="2374" id="s-164"><span class="sectionLabel" data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">164</span></span></a></strong><span data-dcnode-id="2372" instrument_node="">&nbsp;Where a hearing is held by a Division, it may, in the Division’s discretion, be conducted in the presence of, or by a means of live telecommunication with, the person who is the subject of the proceedings.</span></p><span data-dcnode-id="2370" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="2366"><span class="wb-invisible" data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2367" instrument_node="">Powers of a commissioner</span></p><p class="Section" data-dcnode-id="2356" id="276257"><strong data-dcnode-id="2362"><a class="sectionLabel" data-dcnode-id="2363" id="s-165"><span class="sectionLabel" data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">165</span></span></a></strong><span data-dcnode-id="2361" instrument_node="">&nbsp;The Refugee Protection Division, the Refugee Appeal Division and the Immigration Division and each member of those Divisions have the powers and authority of a commissioner appointed under Part I of the </span><cite class="XRefExternalAct" data-dcnode-id="2358"><a data-dcnode-id="2359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/I-11"><span data-dcnode-id="2360" instrument_node="">Inquiries Act</span></a></cite><span data-dcnode-id="2357" instrument_node=""> and may do any other thing they consider necessary to provide a full and proper hearing.</span></p><div class="HistoricalNote" data-dcnode-id="2350"><ul class="HistoricalNote" data-dcnode-id="2351"><li class="HistoricalNoteSubItem" data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">2001, c. 27, s. 165</span></li><li class="HistoricalNoteSubItem" data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node=""> 2010, c. 8, s. 22</span></li></ul></div><span data-dcnode-id="2349" instrument_node="">
</span><div class="PITLink" data-dcnode-id="2346"><a class="PITLink" data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/I-2.5/section-165-20030101.html" title="Link to previous version of section 165"><span data-dcnode-id="2348" instrument_node="">Previous Version</span></a></div><span data-dcnode-id="2345" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="2341"><span class="wb-invisible" data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2342" instrument_node="">Proceedings — all Divisions</span></p><p class="Section" data-dcnode-id="2335" id="276261"><strong data-dcnode-id="2337"><a class="sectionLabel" data-dcnode-id="2338" id="s-166"><span class="sectionLabel" data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">166</span></span></a></strong><span data-dcnode-id="2336" instrument_node="">&nbsp;Proceedings before a Division are to be conducted as follows:</span></p><ul class="ProvisionList" data-dcnode-id="2283"><li data-dcnode-id="2330"><p class="Paragraph" data-dcnode-id="2331" id="276263"><span class="lawlabel" data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">(a)</span></span><span data-dcnode-id="2332" instrument_node="">&nbsp;subject to the other provisions of this section, proceedings must be held in public;</span></p></li><li data-dcnode-id="2309"><p class="Paragraph" data-dcnode-id="2326" id="276264"><span class="lawlabel" data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">(b)</span></span><span data-dcnode-id="2327" instrument_node="">&nbsp;on application or on its own initiative, the Division may conduct a proceeding in the absence of the public, or take any other measure that it considers necessary to ensure the confidentiality of the proceedings, if, after having considered all available alternate measures, the Division is satisfied that there is</span></p><ul class="ProvisionList" data-dcnode-id="2310"><li data-dcnode-id="2321"><p class="Subparagraph" data-dcnode-id="2322" id="276265"><span class="lawlabel" data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">(i)</span></span><span data-dcnode-id="2323" instrument_node="">&nbsp;a serious possibility that the life, liberty or security of a person will be endangered if the proceeding is held in public,</span></p></li><li data-dcnode-id="2316"><p class="Subparagraph" data-dcnode-id="2317" id="276266"><span class="lawlabel" data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">(ii)</span></span><span data-dcnode-id="2318" instrument_node="">&nbsp;a real and substantial risk to the fairness of the proceeding such that the need to prevent disclosure outweighs the societal interest that the proceeding be conducted in public, or</span></p></li><li data-dcnode-id="2311"><p class="Subparagraph" data-dcnode-id="2312" id="276267"><span class="lawlabel" data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">(iii)</span></span><span data-dcnode-id="2313" instrument_node="">&nbsp;a real and substantial risk that matters involving public security will be disclosed;</span></p></li></ul></li><li data-dcnode-id="2304"><p class="Paragraph" data-dcnode-id="2305" id="276268"><span class="lawlabel" data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">(c)</span></span><span data-dcnode-id="2306" instrument_node="">&nbsp;subject to paragraph (d), proceedings before the Refugee Protection Division and the Refugee Appeal Division must be held in the absence of the public;</span></p></li><li data-dcnode-id="2299"><p class="Paragraph" data-dcnode-id="2300" id="276269"><span class="lawlabel" data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">(c.1)</span></span><span data-dcnode-id="2301" instrument_node="">&nbsp;subject to paragraph (d), proceedings before the Immigration Division must be held in the absence of the public if they concern a person who is the subject of a proceeding before the Refugee Protection Division or the Refugee Appeal Division that is pending or who has made an application for protection to the Minister that is pending;</span></p></li><li data-dcnode-id="2294"><p class="Paragraph" data-dcnode-id="2295" id="276270"><span class="lawlabel" data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">(d)</span></span><span data-dcnode-id="2296" instrument_node="">&nbsp;on application or on its own initiative, the Division may conduct a proceeding in public, or take any other measure that it considers necessary to ensure the appropriate access to the proceedings if, after having considered all available alternate measures and the factors set out in paragraph (b), the Division is satisfied that it is appropriate to do so;</span></p></li><li data-dcnode-id="2289"><p class="Paragraph" data-dcnode-id="2290" id="276271"><span class="lawlabel" data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">(e)</span></span><span data-dcnode-id="2291" instrument_node="">&nbsp;despite paragraphs (b) to (c.1), a representative or agent of the United Nations High Commissioner for Refugees is entitled to observe proceedings concerning a protected person or a person who has made a claim for refugee protection or an application for protection; and</span></p></li><li data-dcnode-id="2284"><p class="Paragraph" data-dcnode-id="2285" id="276272"><span class="lawlabel" data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">(f)</span></span><span data-dcnode-id="2286" instrument_node="">&nbsp;despite paragraph (e), the representative or agent may not observe any part of the proceedings that deals with information or other evidence in respect of which an application has been made under section 86, and not rejected, or with information or other evidence protected under that section.</span></p></li></ul><div class="HistoricalNote" data-dcnode-id="2275"><ul class="HistoricalNote" data-dcnode-id="2276"><li class="HistoricalNoteSubItem" data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">2001, c. 27, s. 166</span></li><li class="HistoricalNoteSubItem" data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node=""> 2008, c. 3, s. 5</span></li><li class="HistoricalNoteSubItem" data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node=""> 2012, c. 17, s. 50</span></li></ul></div><span data-dcnode-id="2274" instrument_node="">
</span><div class="PITLink" data-dcnode-id="2271"><a class="PITLink" data-dcnode-id="2272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/I-2.5/section-166-20080222.html" title="Link to previous version of section 166"><span data-dcnode-id="2273" instrument_node="">Previous Version</span></a></div><span data-dcnode-id="2270" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="2266"><span class="wb-invisible" data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2267" instrument_node="">Right to counsel</span></p><ul class="Section ProvisionList" data-dcnode-id="2246" id="276275"><li data-dcnode-id="2256"><p class="Subsection" data-dcnode-id="2257" id="276277"><strong data-dcnode-id="2262"><a class="sectionLabel" data-dcnode-id="2263" id="s-167"><span class="sectionLabel" data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">167</span></span></a></strong><span data-dcnode-id="2261" instrument_node="">&nbsp;</span><span class="lawlabel" data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">(1)</span></span><span data-dcnode-id="2258" instrument_node="">&nbsp;A person who is the subject of proceedings before any Division of the Board and the Minister may, at their own expense, be represented by legal or other counsel.</span></p></li><li data-dcnode-id="2247"><p class="MarginalNote" data-dcnode-id="2252"><span class="wb-invisible" data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2253" instrument_node="">Representation</span></p><p class="Subsection" data-dcnode-id="2248" id="276278"><span class="lawlabel" data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">(2)</span></span><span data-dcnode-id="2249" instrument_node="">&nbsp;If a person who is the subject of proceedings is under 18 years of age or unable, in the opinion of the applicable Division, to appreciate the nature of the proceedings, the Division shall designate a person to represent the person.</span></p></li></ul><div class="HistoricalNote" data-dcnode-id="2238"><ul class="HistoricalNote" data-dcnode-id="2239"><li class="HistoricalNoteSubItem" data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">2001, c. 27, s. 167</span></li><li class="HistoricalNoteSubItem" data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node=""> 2010, c. 8, s. 23</span></li><li class="HistoricalNoteSubItem" data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node=""> 2012, c. 17, s. 63</span></li></ul></div><span data-dcnode-id="2237" instrument_node="">
</span><div class="PITLink" data-dcnode-id="2234"><a class="PITLink" data-dcnode-id="2235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/I-2.5/section-167-20030101.html" title="Link to previous version of section 167"><span data-dcnode-id="2236" instrument_node="">Previous Version</span></a></div><span data-dcnode-id="2233" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="2229"><span class="wb-invisible" data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2230" instrument_node="">Abandonment of proceeding</span></p><ul class="Section ProvisionList" data-dcnode-id="2209" id="276282"><li data-dcnode-id="2219"><p class="Subsection" data-dcnode-id="2220" id="276284"><strong data-dcnode-id="2225"><a class="sectionLabel" data-dcnode-id="2226" id="s-168"><span class="sectionLabel" data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">168</span></span></a></strong><span data-dcnode-id="2224" instrument_node="">&nbsp;</span><span class="lawlabel" data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">(1)</span></span><span data-dcnode-id="2221" instrument_node="">&nbsp;A Division may determine that a proceeding before it has been abandoned if the Division is of the opinion that the applicant is in default in the proceedings, including by failing to appear for a hearing, to provide information required by the Division or to communicate with the Division on being requested to do so.</span></p></li><li data-dcnode-id="2210"><p class="MarginalNote" data-dcnode-id="2215"><span class="wb-invisible" data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2216" instrument_node="">Abuse of process</span></p><p class="Subsection" data-dcnode-id="2211" id="276285"><span class="lawlabel" data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">(2)</span></span><span data-dcnode-id="2212" instrument_node="">&nbsp;A Division may refuse to allow an applicant to withdraw from a proceeding if it is of the opinion that the withdrawal would be an abuse of process under its rules.</span></p></li></ul><span data-dcnode-id="2208" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="2204"><span class="wb-invisible" data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2205" instrument_node="">Decisions and reasons</span></p><p class="Section" data-dcnode-id="2198" id="276287"><strong data-dcnode-id="2200"><a class="sectionLabel" data-dcnode-id="2201" id="s-169"><span class="sectionLabel" data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">169</span></span></a></strong><span data-dcnode-id="2199" instrument_node="">&nbsp;In the case of a decision of a Division, other than an interlocutory decision:</span></p><ul class="ProvisionList" data-dcnode-id="2167"><li data-dcnode-id="2193"><p class="Paragraph" data-dcnode-id="2194" id="276289"><span class="lawlabel" data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">(a)</span></span><span data-dcnode-id="2195" instrument_node="">&nbsp;the decision takes effect in accordance with the rules;</span></p></li><li data-dcnode-id="2188"><p class="Paragraph" data-dcnode-id="2189" id="276290"><span class="lawlabel" data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">(b)</span></span><span data-dcnode-id="2190" instrument_node="">&nbsp;reasons for the decision must be given;</span></p></li><li data-dcnode-id="2183"><p class="Paragraph" data-dcnode-id="2184" id="276291"><span class="lawlabel" data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">(c)</span></span><span data-dcnode-id="2185" instrument_node="">&nbsp;the decision may be rendered orally or in writing, except a decision of the Refugee Appeal Division, which must be rendered in writing;</span></p></li><li data-dcnode-id="2178"><p class="Paragraph" data-dcnode-id="2179" id="276292"><span class="lawlabel" data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">(d)</span></span><span data-dcnode-id="2180" instrument_node="">&nbsp;if the Refugee Protection Division rejects a claim, written reasons must be provided to the claimant and the Minister;</span></p></li><li data-dcnode-id="2173"><p class="Paragraph" data-dcnode-id="2174" id="276293"><span class="lawlabel" data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">(e)</span></span><span data-dcnode-id="2175" instrument_node="">&nbsp;if the person who is the subject of proceedings before the Board or the Minister requests reasons for a decision within 10 days of notification of the decision, or in circumstances set out in the rules of the Board, the Division must provide written reasons; and</span></p></li><li data-dcnode-id="2168"><p class="Paragraph" data-dcnode-id="2169" id="276294"><span class="lawlabel" data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">(f)</span></span><span data-dcnode-id="2170" instrument_node="">&nbsp;the period in which to apply for judicial review with respect to a decision of the Board is calculated from the giving of notice of the decision or from the sending of written reasons, whichever is later.</span></p></li></ul><span data-dcnode-id="2166" instrument_node="">
</span><h3 class="Subheading" data-dcnode-id="2163" id="h-276295"><span class="HTitleText2" data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Refugee Protection Division</span></span></h3><p class="MarginalNote" data-dcnode-id="2159"><span class="wb-invisible" data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2160" instrument_node="">Composition</span></p><ul class="Section ProvisionList" data-dcnode-id="2133" id="276296"><li data-dcnode-id="2149"><p class="Subsection" data-dcnode-id="2150" id="276298"><strong data-dcnode-id="2155"><a class="sectionLabel" data-dcnode-id="2156" id="s-169.1"><span class="sectionLabel" data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">169.1</span></span></a></strong><span data-dcnode-id="2154" instrument_node="">&nbsp;</span><span class="lawlabel" data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">(1)</span></span><span data-dcnode-id="2151" instrument_node="">&nbsp;The Refugee Protection Division consists of the Deputy Chairperson, Assistant Deputy Chairpersons and other members, including coordinating members, necessary to carry out its functions.</span></p></li><li data-dcnode-id="2134"><p class="MarginalNote" data-dcnode-id="2143"><span class="wb-invisible" data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Marginal note:</span></span><cite class="XRefExternalAct" data-dcnode-id="2144"><a data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/P-33.01"><span data-dcnode-id="2146" instrument_node="">Public Service Employment Act</span></a></cite></p><p class="Subsection" data-dcnode-id="2135" id="276299"><span class="lawlabel" data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">(2)</span></span><span data-dcnode-id="2140" instrument_node="">&nbsp;The members of the Refugee Protection Division are appointed in accordance with the </span><cite class="XRefExternalAct" data-dcnode-id="2137"><a data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/P-33.01"><span data-dcnode-id="2139" instrument_node="">Public Service Employment Act</span></a></cite><span data-dcnode-id="2136" instrument_node="">.</span></p></li></ul><div class="HistoricalNote" data-dcnode-id="2129"><ul class="HistoricalNote" data-dcnode-id="2130"><li class="HistoricalNoteSubItem" data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">2010, c. 8, s. 26</span></li></ul></div><span data-dcnode-id="2128" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="2124"><span class="wb-invisible" data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2125" instrument_node="">Proceedings</span></p><p class="Section" data-dcnode-id="2118" id="276303"><strong data-dcnode-id="2120"><a class="sectionLabel" data-dcnode-id="2121" id="s-170"><span class="sectionLabel" data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">170</span></span></a></strong><span data-dcnode-id="2119" instrument_node="">&nbsp;The Refugee Protection Division, in any proceeding before it,</span></p><ul class="ProvisionList" data-dcnode-id="2067"><li data-dcnode-id="2113"><p class="Paragraph" data-dcnode-id="2114" id="276305"><span class="lawlabel" data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">(a)</span></span><span data-dcnode-id="2115" instrument_node="">&nbsp;may inquire into any matter that it considers relevant to establishing whether a claim is well-founded;</span></p></li><li data-dcnode-id="2108"><p class="Paragraph" data-dcnode-id="2109" id="276306"><span class="lawlabel" data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">(b)</span></span><span data-dcnode-id="2110" instrument_node="">&nbsp;must hold a hearing;</span></p></li><li data-dcnode-id="2103"><p class="Paragraph" data-dcnode-id="2104" id="276307"><span class="lawlabel" data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">(c)</span></span><span data-dcnode-id="2105" instrument_node="">&nbsp;must notify the person who is the subject of the proceeding and the Minister of the hearing;</span></p></li><li data-dcnode-id="2098"><p class="Paragraph" data-dcnode-id="2099" id="276308"><span class="lawlabel" data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">(d)</span></span><span data-dcnode-id="2100" instrument_node="">&nbsp;must provide the Minister, on request, with the documents and information referred to in subsection 100(4);</span></p></li><li data-dcnode-id="2093"><p class="Paragraph" data-dcnode-id="2094" id="276309"><span class="lawlabel" data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">(d.1)</span></span><span data-dcnode-id="2095" instrument_node="">&nbsp;may question the witnesses, including the person who is the subject of the proceeding;</span></p></li><li data-dcnode-id="2088"><p class="Paragraph" data-dcnode-id="2089" id="276310"><span class="lawlabel" data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">(e)</span></span><span data-dcnode-id="2090" instrument_node="">&nbsp;must give the person and the Minister a reasonable opportunity to present evidence, question witnesses and make representations;</span></p></li><li data-dcnode-id="2083"><p class="Paragraph" data-dcnode-id="2084" id="276311"><span class="lawlabel" data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">(f)</span></span><span data-dcnode-id="2085" instrument_node="">&nbsp;may, despite paragraph (b), allow a claim for refugee protection without a hearing, if the Minister has not notified the Division, within the period set out in the rules of the Board, of the Minister’s intention to intervene;</span></p></li><li data-dcnode-id="2078"><p class="Paragraph" data-dcnode-id="2079" id="276312"><span class="lawlabel" data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">(g)</span></span><span data-dcnode-id="2080" instrument_node="">&nbsp;is not bound by any legal or technical rules of evidence;</span></p></li><li data-dcnode-id="2073"><p class="Paragraph" data-dcnode-id="2074" id="276313"><span class="lawlabel" data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">(h)</span></span><span data-dcnode-id="2075" instrument_node="">&nbsp;may receive and base a decision on evidence that is adduced in the proceedings and considered credible or trustworthy in the circumstances; and</span></p></li><li data-dcnode-id="2068"><p class="Paragraph" data-dcnode-id="2069" id="276314"><span class="lawlabel" data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">(i)</span></span><span data-dcnode-id="2070" instrument_node="">&nbsp;may take notice of any facts that may be judicially noticed, any other generally recognized facts and any information or opinion that is within its specialized knowledge.</span></p></li></ul><div class="HistoricalNote" data-dcnode-id="2061"><ul class="HistoricalNote" data-dcnode-id="2062"><li class="HistoricalNoteSubItem" data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">2001, c. 27, s. 170</span></li><li class="HistoricalNoteSubItem" data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node=""> 2010, c. 8, s. 27</span></li></ul></div><span data-dcnode-id="2060" instrument_node="">
</span><div class="PITLink" data-dcnode-id="2057"><a class="PITLink" data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/I-2.5/section-170-20030101.html" title="Link to previous version of section 170"><span data-dcnode-id="2059" instrument_node="">Previous Version</span></a></div><span data-dcnode-id="2056" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="2052"><span class="wb-invisible" data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2053" instrument_node="">No reopening of claim or application</span></p><p class="Section" data-dcnode-id="2046" id="276317"><strong data-dcnode-id="2048"><a class="sectionLabel" data-dcnode-id="2049" id="s-170.2"><span class="sectionLabel" data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">170.2</span></span></a></strong><span data-dcnode-id="2047" instrument_node="">&nbsp;The Refugee Protection Division does not have jurisdiction to reopen on any ground — including a failure to observe a principle of natural justice — a claim for refugee protection, an application for protection or an application for cessation or vacation, in respect of which the Refugee Appeal Division or the Federal Court, as the case may be, has made a final determination.</span></p><div class="HistoricalNote" data-dcnode-id="2042"><ul class="HistoricalNote" data-dcnode-id="2043"><li class="HistoricalNoteSubItem" data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">2012, c. 17, s. 51</span></li></ul></div><span data-dcnode-id="2041" instrument_node="">
</span><h3 class="Subheading" data-dcnode-id="2038" id="h-276321"><span class="HTitleText2" data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Refugee Appeal Division</span></span></h3><p class="MarginalNote" data-dcnode-id="2034"><span class="wb-invisible" data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">Marginal note:</span></span><span data-dcnode-id="2035" instrument_node="">Proceedings</span></p><p class="Section" data-dcnode-id="2028" id="276322"><strong data-dcnode-id="2030"><a class="sectionLabel" data-dcnode-id="2031" id="s-171"><span class="sectionLabel" data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">171</span></span></a></strong><span data-dcnode-id="2029" instrument_node="">&nbsp;In the case of a proceeding of the Refugee Appeal Division,</span></p><ul class="ProvisionList" data-dcnode-id="1987"><li data-dcnode-id="2023"><p class="Paragraph" data-dcnode-id="2024" id="276324"><span class="lawlabel" data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">(a)</span></span><span data-dcnode-id="2025" instrument_node="">&nbsp;the Division must give notice of any hearing to the Minister and to the person who is the subject of the appeal;</span></p></li><li data-dcnode-id="2018"><p class="Paragraph" data-dcnode-id="2019" id="276325"><span class="lawlabel" data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">(a.1)</span></span><span data-dcnode-id="2020" instrument_node="">&nbsp;subject to subsection 110(4), if a hearing is held, the Division must give the person who is the subject of the appeal and the Minister the opportunity to present evidence, question witnesses and make submissions;</span></p></li><li data-dcnode-id="2013"><p class="Paragraph" data-dcnode-id="2014" id="276326"><span class="lawlabel" data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">(a.2)</span></span><span data-dcnode-id="2015" instrument_node="">&nbsp;the Division is not bound by any legal or technical rules of evidence;</span></p></li><li data-dcnode-id="2008"><p class="Paragraph" data-dcnode-id="2009" id="276327"><span class="lawlabel" data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">(a.3)</span></span><span data-dcnode-id="2010" instrument_node="">&nbsp;the Division may receive and base a decision on evidence that is adduced in the proceedings and considered credible or trustworthy in the circumstances;</span></p></li><li data-dcnode-id="2003"><p class="Paragraph" data-dcnode-id="2004" id="276328"><span class="lawlabel" data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">(a.4)</span></span><span data-dcnode-id="2005" instrument_node="">&nbsp;the Minister may, at any time before the Division makes a decision, after giving notice to the Division and to the person who is the subject of the appeal, intervene in the appeal;</span></p></li><li data-dcnode-id="1998"><p class="Paragraph" data-dcnode-id="1999" id="276329"><span class="lawlabel" data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">(a.5)</span></span><span data-dcnode-id="2000" instrument_node="">&nbsp;the Minister may, at any time before the Division makes a decision, submit documentary evidence and make written submissions in support of the Minister’s appeal or intervention in the appeal;</span></p></li><li data-dcnode-id="1993"><p class="Paragraph" data-dcnode-id="1994" id="276330"><span class="lawlabel" data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">(b)</span></span><span data-dcnode-id="1995" instrument_node="">&nbsp;the Division may take notice of any facts that may be judicially noticed and of any other generally recognized facts and any information or opinion that is within its specialized knowledge; and</span></p></li><li data-dcnode-id="1988"><p class="Paragraph" data-dcnode-id="1989" id="276331"><span class="lawlabel" data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">(c)</span></span><span data-dcnode-id="1990" instrument_node="">&nbsp;a decision of a panel of three members of the Refugee Appeal Division has, for the Refugee Protection Division and for a panel of one member of the Refugee Appeal Division, the same precedential value as a decision of an appeal court has for a trial court.</span></p></li></ul><div class="HistoricalNote" data-dcnode-id="1979"><ul class="HistoricalNote" data-dcnode-id="1980"><li class="HistoricalNoteSubItem" data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">2001, c. 27, s. 171</span></li><li class="HistoricalNoteSubItem" data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node=""> 2010, c. 8, s. 28</span></li><li class="HistoricalNoteSubItem" data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node=""> 2012, c. 17, s. 52</span></li></ul></div><span data-dcnode-id="1978" instrument_node="">
</span><div class="PITLink" data-dcnode-id="1975"><a class="PITLink" data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/I-2.5/section-171-20120628.html" title="Link to previous version of section 171"><span data-dcnode-id="1977" instrument_node="">Previous Version</span></a></div><span data-dcnode-id="1974" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="1970"><span class="wb-invisible" data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Marginal note:</span></span><span data-dcnode-id="1971" instrument_node="">No reopening of appeal</span></p><p class="Section" data-dcnode-id="1964" id="276334"><strong data-dcnode-id="1966"><a class="sectionLabel" data-dcnode-id="1967" id="s-171.1"><span class="sectionLabel" data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">171.1</span></span></a></strong><span data-dcnode-id="1965" instrument_node="">&nbsp;The Refugee Appeal Division does not have jurisdiction to reopen on any ground — including a failure to observe a principle of natural justice — an appeal in respect of which the Federal Court has made a final determination.</span></p><div class="HistoricalNote" data-dcnode-id="1960"><ul class="HistoricalNote" data-dcnode-id="1961"><li class="HistoricalNoteSubItem" data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">2012, c. 17, s. 53</span></li></ul></div><span data-dcnode-id="1959" instrument_node="">
</span><h3 class="Subheading" data-dcnode-id="1956" id="h-276338"><span class="HTitleText2" data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Immigration Division</span></span></h3><p class="MarginalNote" data-dcnode-id="1952"><span class="wb-invisible" data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">Marginal note:</span></span><span data-dcnode-id="1953" instrument_node="">Composition</span></p><ul class="Section ProvisionList" data-dcnode-id="1926" id="276339"><li data-dcnode-id="1942"><p class="Subsection" data-dcnode-id="1943" id="276341"><strong data-dcnode-id="1948"><a class="sectionLabel" data-dcnode-id="1949" id="s-172"><span class="sectionLabel" data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">172</span></span></a></strong><span data-dcnode-id="1947" instrument_node="">&nbsp;</span><span class="lawlabel" data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">(1)</span></span><span data-dcnode-id="1944" instrument_node="">&nbsp;The Immigration Division consists of the Deputy Chairperson, Assistant Deputy Chairpersons and other members necessary to carry out its functions.</span></p></li><li data-dcnode-id="1927"><p class="MarginalNote" data-dcnode-id="1936"><span class="wb-invisible" data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Marginal note:</span></span><cite class="XRefExternalAct" data-dcnode-id="1937"><a data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/P-33.01"><span data-dcnode-id="1939" instrument_node="">Public Service Employment Act</span></a></cite></p><p class="Subsection" data-dcnode-id="1928" id="276342"><span class="lawlabel" data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">(2)</span></span><span data-dcnode-id="1933" instrument_node="">&nbsp;The members of the Immigration Division are appointed in accordance with the </span><cite class="XRefExternalAct" data-dcnode-id="1930"><a data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/P-33.01"><span data-dcnode-id="1932" instrument_node="">Public Service Employment Act</span></a></cite><span data-dcnode-id="1929" instrument_node="">.</span></p></li></ul><div class="HistoricalNote" data-dcnode-id="1920"><ul class="HistoricalNote" data-dcnode-id="1921"><li class="HistoricalNoteSubItem" data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">2001, c. 27, s. 172</span></li><li class="HistoricalNoteSubItem" data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node=""> 2010, c. 8, s. 29</span></li></ul></div><span data-dcnode-id="1919" instrument_node="">
</span><div class="PITLink" data-dcnode-id="1916"><a class="PITLink" data-dcnode-id="1917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/I-2.5/section-172-20030101.html" title="Link to previous version of section 172"><span data-dcnode-id="1918" instrument_node="">Previous Version</span></a></div><span data-dcnode-id="1915" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="1911"><span class="wb-invisible" data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Marginal note:</span></span><span data-dcnode-id="1912" instrument_node="">Proceedings</span></p><p class="Section" data-dcnode-id="1905" id="276346"><strong data-dcnode-id="1907"><a class="sectionLabel" data-dcnode-id="1908" id="s-173"><span class="sectionLabel" data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">173</span></span></a></strong><span data-dcnode-id="1906" instrument_node="">&nbsp;The Immigration Division, in any proceeding before it,</span></p><ul class="ProvisionList" data-dcnode-id="1884"><li data-dcnode-id="1900"><p class="Paragraph" data-dcnode-id="1901" id="276348"><span class="lawlabel" data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">(a)</span></span><span data-dcnode-id="1902" instrument_node="">&nbsp;must, where practicable, hold a hearing;</span></p></li><li data-dcnode-id="1895"><p class="Paragraph" data-dcnode-id="1896" id="276349"><span class="lawlabel" data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">(b)</span></span><span data-dcnode-id="1897" instrument_node="">&nbsp;must give notice of the proceeding to the Minister and to the person who is the subject of the proceeding and hear the matter without delay;</span></p></li><li data-dcnode-id="1890"><p class="Paragraph" data-dcnode-id="1891" id="276350"><span class="lawlabel" data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">(c)</span></span><span data-dcnode-id="1892" instrument_node="">&nbsp;is not bound by any legal or technical rules of evidence; and</span></p></li><li data-dcnode-id="1885"><p class="Paragraph" data-dcnode-id="1886" id="276351"><span class="lawlabel" data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">(d)</span></span><span data-dcnode-id="1887" instrument_node="">&nbsp;may receive and base a decision on evidence adduced in the proceedings that it considers credible or trustworthy in the circumstances.</span></p></li></ul><span data-dcnode-id="1883" instrument_node="">
</span><h3 class="Subheading" data-dcnode-id="1880" id="h-276352"><span class="HTitleText2" data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Immigration Appeal Division</span></span></h3><p class="MarginalNote" data-dcnode-id="1876"><span class="wb-invisible" data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Marginal note:</span></span><span data-dcnode-id="1877" instrument_node="">Court of record</span></p><ul class="Section ProvisionList" data-dcnode-id="1856" id="276353"><li data-dcnode-id="1866"><p class="Subsection" data-dcnode-id="1867" id="276355"><strong data-dcnode-id="1872"><a class="sectionLabel" data-dcnode-id="1873" id="s-174"><span class="sectionLabel" data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">174</span></span></a></strong><span data-dcnode-id="1871" instrument_node="">&nbsp;</span><span class="lawlabel" data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">(1)</span></span><span data-dcnode-id="1868" instrument_node="">&nbsp;The Immigration Appeal Division is a court of record and shall have an official seal, which shall be judicially noticed.</span></p></li><li data-dcnode-id="1857"><p class="MarginalNote" data-dcnode-id="1862"><span class="wb-invisible" data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Marginal note:</span></span><span data-dcnode-id="1863" instrument_node="">Powers</span></p><p class="Subsection" data-dcnode-id="1858" id="276356"><span class="lawlabel" data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">(2)</span></span><span data-dcnode-id="1859" instrument_node="">&nbsp;The Immigration Appeal Division has all the powers, rights and privileges vested in a superior court of record with respect to any matter necessary for the exercise of its jurisdiction, including the swearing and examination of witnesses, the production and inspection of documents and the enforcement of its orders.</span></p></li></ul><span data-dcnode-id="1855" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="1851"><span class="wb-invisible" data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Marginal note:</span></span><span data-dcnode-id="1852" instrument_node="">Proceedings</span></p><ul class="Section ProvisionList" data-dcnode-id="1815" id="276358"><li data-dcnode-id="1825"><p class="Subsection" data-dcnode-id="1842" id="276360"><strong data-dcnode-id="1847"><a class="sectionLabel" data-dcnode-id="1848" id="s-175"><span class="sectionLabel" data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">175</span></span></a></strong><span data-dcnode-id="1846" instrument_node="">&nbsp;</span><span class="lawlabel" data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">(1)</span></span><span data-dcnode-id="1843" instrument_node="">&nbsp;The Immigration Appeal Division, in any proceeding before it,</span></p><ul class="ProvisionList" data-dcnode-id="1826"><li data-dcnode-id="1837"><p class="Paragraph" data-dcnode-id="1838" id="276361"><span class="lawlabel" data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">(a)</span></span><span data-dcnode-id="1839" instrument_node="">&nbsp;must, in the case of an appeal under subsection 63(4), hold a hearing;</span></p></li><li data-dcnode-id="1832"><p class="Paragraph" data-dcnode-id="1833" id="276362"><span class="lawlabel" data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">(b)</span></span><span data-dcnode-id="1834" instrument_node="">&nbsp;is not bound by any legal or technical rules of evidence; and</span></p></li><li data-dcnode-id="1827"><p class="Paragraph" data-dcnode-id="1828" id="276363"><span class="lawlabel" data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">(c)</span></span><span data-dcnode-id="1829" instrument_node="">&nbsp;may receive and base a decision on evidence adduced in the proceedings that it considers credible or trustworthy in the circumstances.</span></p></li></ul></li><li data-dcnode-id="1816"><p class="MarginalNote" data-dcnode-id="1821"><span class="wb-invisible" data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Marginal note:</span></span><span data-dcnode-id="1822" instrument_node="">Presence of permanent resident</span></p><p class="Subsection" data-dcnode-id="1817" id="276364"><span class="lawlabel" data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">(2)</span></span><span data-dcnode-id="1818" instrument_node="">&nbsp;In the case of an appeal by a permanent resident under subsection 63(4), the Immigration Appeal Division may, after considering submissions from the Minister and the permanent resident and if satisfied that the presence of the permanent resident at the hearing is necessary, order the permanent resident to physically appear at the hearing, in which case an officer shall issue a travel document for that purpose.</span></p></li></ul><span data-dcnode-id="1814" instrument_node="">
</span><h3 class="Subheading" data-dcnode-id="1811" id="h-276366"><span class="HTitleText2" data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Remedial and Disciplinary Measures</span></span></h3><p class="MarginalNote" data-dcnode-id="1807"><span class="wb-invisible" data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Marginal note:</span></span><span data-dcnode-id="1808" instrument_node="">Request</span></p><ul class="Section ProvisionList" data-dcnode-id="1787" id="276367"><li data-dcnode-id="1797"><p class="Subsection" data-dcnode-id="1798" id="276369"><strong data-dcnode-id="1803"><a class="sectionLabel" data-dcnode-id="1804" id="s-176"><span class="sectionLabel" data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">176</span></span></a></strong><span data-dcnode-id="1802" instrument_node="">&nbsp;</span><span class="lawlabel" data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">(1)</span></span><span data-dcnode-id="1799" instrument_node="">&nbsp;The Chairperson may request the Minister to decide whether any member of the Immigration Appeal Division or the Refugee Appeal Division should be subject to remedial or disciplinary measures for a reason set out in subsection (2).</span></p></li><li data-dcnode-id="1788"><p class="MarginalNote" data-dcnode-id="1793"><span class="wb-invisible" data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Marginal note:</span></span><span data-dcnode-id="1794" instrument_node="">Reasons</span></p><p class="Subsection" data-dcnode-id="1789" id="276370"><span class="lawlabel" data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">(2)</span></span><span data-dcnode-id="1790" instrument_node="">&nbsp;The request is to be based on the reason that the member has become incapacitated from the proper execution of that office by reason of infirmity, has been guilty of misconduct, has failed in the proper execution of that office or has been placed, by conduct or otherwise, in a position that is incompatible with due execution of that office.</span></p></li></ul><div class="HistoricalNote" data-dcnode-id="1781"><ul class="HistoricalNote" data-dcnode-id="1782"><li class="HistoricalNoteSubItem" data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">2001, c. 27, s. 176</span></li><li class="HistoricalNoteSubItem" data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node=""> 2010, c. 8, s. 30</span></li></ul></div><span data-dcnode-id="1780" instrument_node="">
</span><div class="PITLink" data-dcnode-id="1777"><a class="PITLink" data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//laws-lois.justice.gc.ca/eng/acts/I-2.5/section-176-20030101.html" title="Link to previous version of section 176"><span data-dcnode-id="1779" instrument_node="">Previous Version</span></a></div><span data-dcnode-id="1776" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="1772"><span class="wb-invisible" data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Marginal note:</span></span><span data-dcnode-id="1773" instrument_node="">Measures</span></p><p class="Section" data-dcnode-id="1766" id="276374"><strong data-dcnode-id="1768"><a class="sectionLabel" data-dcnode-id="1769" id="s-177"><span class="sectionLabel" data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">177</span></span></a></strong><span data-dcnode-id="1767" instrument_node="">&nbsp;On receipt of the request, the Minister may take one or more of the following measures:</span></p><ul class="ProvisionList" data-dcnode-id="1745"><li data-dcnode-id="1761"><p class="Paragraph" data-dcnode-id="1762" id="276376"><span class="lawlabel" data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">(a)</span></span><span data-dcnode-id="1763" instrument_node="">&nbsp;obtain, in an informal and expeditious manner, any information that the Minister considers necessary;</span></p></li><li data-dcnode-id="1756"><p class="Paragraph" data-dcnode-id="1757" id="276377"><span class="lawlabel" data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">(b)</span></span><span data-dcnode-id="1758" instrument_node="">&nbsp;refer the matter for mediation, if the Minister is satisfied that the issues in relation to the request may be appropriately resolved by mediation;</span></p></li><li data-dcnode-id="1751"><p class="Paragraph" data-dcnode-id="1752" id="276378"><span class="lawlabel" data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">(c)</span></span><span data-dcnode-id="1753" instrument_node="">&nbsp;request of the Governor in Council that an inquiry be held under section 178; or</span></p></li><li data-dcnode-id="1746"><p class="Paragraph" data-dcnode-id="1747" id="276379"><span class="lawlabel" data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">(d)</span></span><span data-dcnode-id="1748" instrument_node="">&nbsp;advise the Chairperson that the Minister considers that it is not necessary to take further measures under this section or sections 178 to 185.</span></p></li></ul><span data-dcnode-id="1744" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="1740"><span class="wb-invisible" data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Marginal note:</span></span><span data-dcnode-id="1741" instrument_node="">Appointment of inquirer</span></p><p class="Section" data-dcnode-id="1734" id="276380"><strong data-dcnode-id="1736"><a class="sectionLabel" data-dcnode-id="1737" id="s-178"><span class="sectionLabel" data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">178</span></span></a></strong><span data-dcnode-id="1735" instrument_node="">&nbsp;On receipt of a request referred to in paragraph 177(c), the Governor in Council may, on the recommendation of the Minister of Justice, appoint a judge of a superior court to conduct an inquiry.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p class="MarginalNote" data-dcnode-id="1729"><span class="wb-invisible" data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Marginal note:</span></span><span data-dcnode-id="1730" instrument_node="">Powers</span></p><p class="Section" data-dcnode-id="1723" id="276382"><strong data-dcnode-id="1725"><a class="sectionLabel" data-dcnode-id="1726" id="s-179"><span class="sectionLabel" data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">179</span></span></a></strong><span data-dcnode-id="1724" instrument_node="">&nbsp;The judge has all the powers, rights and privileges that are vested in a superior court, including the power</span></p><ul class="ProvisionList" data-dcnode-id="1712"><li data-dcnode-id="1718"><p class="Paragraph" data-dcnode-id="1719" id="276384"><span class="lawlabel" data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">(a)</span></span><span data-dcnode-id="1720" instrument_node="">&nbsp;to issue a summons requiring any person to appear at the time and place mentioned in the summons to testify about all matters within that person’s knowledge relative to the inquiry and to produce any document or thing relative to the inquiry that the person has or controls; and</span></p></li><li data-dcnode-id="1713"><p class="Paragraph" data-dcnode-id="1714" id="276385"><span class="lawlabel" data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">(b)</span></span><span data-dcnode-id="1715" instrument_node="">&nbsp;to administer oaths and examine any person on oath.</span></p></li></ul><span data-dcnode-id="1711" instrument_node="">
</span></section></div><span data-dcnode-id="1708" instrument_node="">
