</span><div class="et_pb_text_inner" data-dcnode-id="1490"><h2 data-dcnode-id="1506"><span data-dcnode-id="1507" style="color: #ff0000;"><strong data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Seeking asylum in Canada during the COVID-19 pandemic</span></strong></span></h2><span data-dcnode-id="1505" instrument_node="">
</span><h3 data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1502" instrument_node="">
</span><h3 data-dcnode-id="1499"><strong data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Please note that the situation is quickly evolving, and that while UNHCR will endeavour to update the below information regularly, asylum-seekers should also verify the information with Government authorities.</span></strong></h3><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" style="color: #000000;"><strong data-dcnode-id="1493"><span data-dcnode-id="1497" instrument_node="">Latest update: March 18</span><sup data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">th</span></sup><span data-dcnode-id="1494" instrument_node=""> 2022</span></strong></span></p></div><span data-dcnode-id="1489" instrument_node="">

</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_3 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1016"><span data-dcnode-id="1482" instrument_node="">
</span><div class="et_pb_module et_pb_accordion et_pb_accordion_0" data-dcnode-id="1018"><span data-dcnode-id="1481" instrument_node="">
</span><div class="et_pb_toggle et_pb_module et_pb_accordion_item et_pb_accordion_item_0 et_pb_toggle_open" data-dcnode-id="1277"><span data-dcnode-id="1480" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Claiming asylum in Canada</span></h5><span data-dcnode-id="1477" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1279"><h3 data-dcnode-id="1473"><span data-dcnode-id="1474" style="color: #0072bc;"><strong data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">For those coming to Canada through a land border</span></strong></span></h3><span data-dcnode-id="1472" instrument_node="">
</span><h4 data-dcnode-id="1469"><strong data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">If you make a refugee claim at an official land port of entry</span></strong></h4><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1446"><strong data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Under the Canada–U.S. Safe Third Country Agreement (STCA), persons coming to Canada from the U.S. cannot make a refugee claim at official Canadian border posts</span></strong><span data-dcnode-id="1465" instrument_node="">&nbsp;unless they qualify for an exception to the Agreement.&nbsp;</span><strong data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Learn more about</span></strong><strong data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">&nbsp;</span></strong><a data-dcnode-id="1458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/in-canada/making-refugee-claim/who-can-claim-asylum-at-the-border/"><strong data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">who can claim asylum at the border</span></strong></a><strong data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">and</span></strong><strong data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">&nbsp;</span></strong><a data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/in-canada/making-refugee-claim/how-to-prove-your-link-to-family-members-in-canada/"><strong data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">how to prove your links to family members in Canada</span></strong></a><strong data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">.</span></strong></p><span data-dcnode-id="1445" instrument_node="">
</span><h4 data-dcnode-id="1442"><strong data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">If you make a refugee claim upon crossing the border in-between official border posts</span></strong></h4><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1440" instrument_node="">The Canadian government has lifted the COVID border restrictions in place since 21 March 2020. As of 22 November 2021, asylum-seekers who enter Canada irregularly in-between official land border posts&nbsp;</span><strong data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">will be admitted to Canada for the purposes of their asylum claim</span></strong><span data-dcnode-id="1437" instrument_node="">.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Note that asylum-seekers allowed to enter Canada to pursue their claim will be requested to self-isolate for 14 days if not fully vaccinated.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1429"><strong data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">If you crossed between land ports of entry at the Canadian border since March 2020 and were sent back to the U.S</span></strong></p><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">You may now return to Canada at an official port of entry to resume your refugee claim.</span></p><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">What you will need:</span></p><span data-dcnode-id="1422" instrument_node="">
</span><ul data-dcnode-id="1405"><span data-dcnode-id="1421" instrument_node="">
</span><li data-dcnode-id="1407" style="list-style-type: none;"><span data-dcnode-id="1420" instrument_node="">
</span><ul data-dcnode-id="1409"><span data-dcnode-id="1419" instrument_node="">
</span><li data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Travel documents (such as passport, visas)</span></li><span data-dcnode-id="1416" instrument_node="">
</span><li data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Identification documents (such as driver’s licence, birth certificate)</span></li><span data-dcnode-id="1413" instrument_node="">
</span><li data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Proof of vaccination against COVID-19 if you are fully vaccinated</span></li><span data-dcnode-id="1410" instrument_node="">
</span></ul><span data-dcnode-id="1408" instrument_node="">
</span></li><span data-dcnode-id="1406" instrument_node="">
</span></ul><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">If you are not fully vaccinated against COVID-19, you should have a 14-day quarantine plan. A negative COVID-19 molecular test is not required prior to your return to Canada, but you will have to take a molecular test within 24 hours of your arrival.</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1395"><strong data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">&nbsp;</span></strong><a data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsa-asfc.gc.ca/refugee-asile-covid-eng.html"><strong data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Learn more here.</span></strong></a></p><span data-dcnode-id="1394" instrument_node="">
</span><h3 data-dcnode-id="1390"><span data-dcnode-id="1391" style="color: #0072bc;"><strong data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">For those travelling to Canada by plane</span></strong></span></h3><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">As of September 7, 2021, any foreign national who is eligible to enter Canada will be able to land on Canadian soil for non-discretionary travel if they have proof of being fully vaccinated. Foreign nationals who are not fully vaccinated will need to meet the conditions of an exemption or travel for non-discretionary purposes.</span></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Links to information:</span></p><span data-dcnode-id="1383" instrument_node="">
</span><ul data-dcnode-id="1365"><span data-dcnode-id="1382" instrument_node="">
</span><li data-dcnode-id="1367" style="list-style-type: none;"><span data-dcnode-id="1381" instrument_node="">
</span><ul data-dcnode-id="1369"><span data-dcnode-id="1380" instrument_node="">
</span><li data-dcnode-id="1376"><a data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/immigration-refugees-citizenship/corporate/publications-manuals/operational-bulletins-manuals/service-delivery/coronavirus/travel-restrictions.html"><strong data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Aviation measures in response to COVID-19</span></strong></a></li><span data-dcnode-id="1375" instrument_node="">
</span><li data-dcnode-id="1371"><a data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/immigration-refugees-citizenship/services/coronavirus-covid19/travel-restrictions-exemptions.html"><strong data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Exemptions to travel restrictions</span></strong></a></li><span data-dcnode-id="1370" instrument_node="">
</span></ul><span data-dcnode-id="1368" instrument_node="">
</span></li><span data-dcnode-id="1366" instrument_node="">
</span></ul><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1363" instrument_node="">If you fall under one of the exceptions and arrive at a Canadian airport, procedures for making a refugee claim remain unchanged, but quarantine or isolation measures will apply if you are not fully vaccinated or cannot demonstrate that you are fully vaccinated. As of 21 February 2021, all travellers entering Canada, regardless of citizenship, must follow testing and quarantine requirements.&nbsp;</span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//travel.gc.ca/travel-covid/travel-restrictions/isolation%3F_ga%3D2.92315028.82120391.1615919319-1323203841.1614619964"><strong data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Find out more about mandatory quarantine or isolation on the Government of Canada’s website.</span></strong></a></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1355"><strong data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Pre-arrival screening requirements for air travel to Canada</span></strong></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1353" instrument_node="">If you are not fully vaccinated, make sure you are taking an approved COVID-19 test for entry to Canada. Check the </span><a data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//travel.gc.ca/travel-covid/travel-restrictions/covid-vaccinated-travellers-entering-canada%23entry-vaccinated"><span data-dcnode-id="1352" instrument_node="">pre-entry test</span></a><span data-dcnode-id="1350" instrument_node=""> and </span><a data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//travel.gc.ca/travel-covid/travel-restrictions/isolation%3F_ga%3D2.250756486.1031316581.1647636815-1440577817.1646167309"><span data-dcnode-id="1349" instrument_node="">quarantine</span></a><span data-dcnode-id="1347" instrument_node=""> requirements on the Government of Canada’s website.</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1344" instrument_node="">All travellers who are fully vaccinated and eligible to enter Canada are exempted from the quarantine measures. Starting April 1, 2022, pre-entry tests will no longer be required for fully vaccinated travellers entering Canada by land, air or water. Find out more details on COVID-19 vaccinated travellers entering Canada on the</span><a data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//travel.gc.ca/travel-covid/travel-restrictions/covid-vaccinated-travellers-entering-canada%23at-border"><span data-dcnode-id="1343" instrument_node=""> Government of Canada’s website.</span></a></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" style="color: #000000;"><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">ArriveCAN</span></strong></span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1334" instrument_node="">As of 21 November 2020, you must use&nbsp;</span><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/public-health/services/diseases/coronavirus-disease-covid-19/arrivecan.html"><strong data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">ArriveCAN</span></strong></a><span data-dcnode-id="1330" instrument_node=""> before checking in at the airport to submit your:</span></p><span data-dcnode-id="1328" instrument_node="">
</span><ul data-dcnode-id="1306"><span data-dcnode-id="1327" instrument_node="">
</span><li data-dcnode-id="1308" style="list-style-type: none;"><span data-dcnode-id="1326" instrument_node="">
</span><ul data-dcnode-id="1310"><span data-dcnode-id="1325" instrument_node="">
</span><li data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Travel and contact information;</span></li><span data-dcnode-id="1322" instrument_node="">
</span><li data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Quarantine plan and/or vaccination status</span></li><span data-dcnode-id="1319" instrument_node="">
</span><li data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">COVID-19 symptom self-assessment.</span></li><span data-dcnode-id="1316" instrument_node="">
</span><li data-dcnode-id="1312"><span data-dcnode-id="1315" instrument_node="">If you are not fully vaccinated, you will have to submit your COVID-19 test result. </span><a data-dcnode-id="1313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//travel.gc.ca/travel-covid/travel-restrictions/flying-canada-checklist/covid-19-testing-travellers-coming-into-canada%3F_ga%3D2.102351489.1829679460.1646427507-103092349.1646427507"><span data-dcnode-id="1314" instrument_node="">Learn about testing requirements for travellers to Canada.</span></a></li><span data-dcnode-id="1311" instrument_node="">
</span></ul><span data-dcnode-id="1309" instrument_node="">
</span></li><span data-dcnode-id="1307" instrument_node="">
</span></ul><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Please bring your ArriveCAN receipt (electronic or paper) with you to show the border services officer upon arrival at the airport.</span></p><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" style="color: #0072bc;"><a data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/public-health/services/diseases/coronavirus-disease-covid-19/arrivecan.html" rel="noopener" style="color: #0072bc;" target="_blank"><strong data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Find out the latest travel advice from Health Canada for travellers arriving in Canada.</span></strong></a></span></p><span data-dcnode-id="1296" instrument_node="">
</span><h3 data-dcnode-id="1292"><span data-dcnode-id="1293" style="color: #0072bc;"><strong data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">For those who are already in Canada</span></strong></span></h3><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">As of October 6, 2021, individuals who are already in Canada who wish to make a claim for refugee protection can create a secure account in the Canadian Refugee Protection Portal (CRPP), complete a questionnaire and submit supporting documents online, including the completed Refugee Claim Submission Form.</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Individuals who have already submitted an application via email or who have started the asylum process through Connexion do not need to resubmit their documents through PCPR. They can continue to use Connexion to submit the required documents.</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Claimants may also receive messages through PCPR, such as a notice to appear for an interview with an officer at one of the Refugee Intake Offices in Canada or instructions for the immigration medical examination (IME).</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Get more information on how to make a refugee claim in Canada on the IRCC website.</span></p></div><span data-dcnode-id="1278" instrument_node="">
</span></div><div class="et_pb_toggle et_pb_module et_pb_accordion_item et_pb_accordion_item_1 et_pb_toggle_close" data-dcnode-id="1201"><span data-dcnode-id="1276" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">For those who have a pending asylum application before the Immigration Refugee Board (IRB)</span></h5><span data-dcnode-id="1273" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1203"><h3 data-dcnode-id="1269"><span data-dcnode-id="1270" style="color: #0072bc;"><strong data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Temporary extensions of time granted for the Basis of Claim form</span></strong></span></h3><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1267" instrument_node="">If you claimed asylum</span><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">&nbsp;</span></strong><strong data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">at a port of entry</span></strong><span data-dcnode-id="1262" instrument_node="">&nbsp;(airport, official border post), the IRB has extended the deadline to provide the&nbsp;</span><a data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/in-canada/making-refugee-claim/what-is-the-basis-of-claim-form/"><strong data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Basis of Claim (BOC) form</span></strong></a><span data-dcnode-id="1258" instrument_node="">, an important document where you explain why you are afraid to go back to your home country:</span></p><span data-dcnode-id="1256" instrument_node="">
</span><ul data-dcnode-id="1239"><span data-dcnode-id="1255" instrument_node="">
</span><li data-dcnode-id="1241" style="list-style-type: none;"><span data-dcnode-id="1254" instrument_node="">
</span><ul data-dcnode-id="1243"><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1245"><span data-dcnode-id="1252" instrument_node="">If your claim was transferred to the IRB&nbsp;</span><strong data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">on or after 29 August 2020</span></strong><span data-dcnode-id="1249" instrument_node="">, you will have&nbsp;</span><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">45 days</span></strong><span data-dcnode-id="1246" instrument_node="">&nbsp;to give your completed Basis of Claim (BOC) form to the IRB.</span></li><span data-dcnode-id="1244" instrument_node="">
</span></ul><span data-dcnode-id="1242" instrument_node="">
</span></li><span data-dcnode-id="1240" instrument_node="">
</span></ul><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1237" instrument_node="">For all other claims, the usual 15-day time limit applies.&nbsp;</span><a data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irb-cisr.gc.ca/en/legal-policy/procedures/Pages/practice-notice-temporary-extension-boc-form.aspx"><strong data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Read the practice notice on the temporary extension of time limits for filing the Basis of Claim form on the IRB’s website.</span></strong></a></p><span data-dcnode-id="1232" instrument_node="">
</span><h3 data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1229" instrument_node="">
</span><h3 data-dcnode-id="1225"><span data-dcnode-id="1226" style="color: #0072bc;"><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Virtual hearings</span></strong></span></h3><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1223" instrument_node="">The Refugee Protection Division (RPD) is now scheduling virtual hearings for all refugee protection claims. That said, any claimants who prefer to have their hearing from an IRB office can advise the RPD of this when their claim is scheduled and the RPD will book an on-site hearing for them. The Member presiding over the hearing ultimately retains the discretion to determine the location of the hearing if there are reasons why it may be inappropriate for a given claim to proceed virtually.&nbsp;</span><a data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irb-cisr.gc.ca/en/legal-policy/procedures/Pages/rpd-pn-virtual-hearings.aspx"><strong data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Find out more about the IRB’s measures related to COVID-19 on the IRB’s website.</span></strong></a></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" style="color: #000000;"><span data-dcnode-id="1217" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1214" instrument_node="">
</span><h3 data-dcnode-id="1210"><span data-dcnode-id="1211" style="color: #0072bc;"><strong data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Submission of documents</span></strong></span></h3><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1208" instrument_node="">Even though the Immigration and Refugee Board of Canada offices resumed operations, in-person correspondence will not be accepted until further notice. You can provide the RDP with documents by mail, by fax, or electronically.&nbsp;</span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irb-cisr.gc.ca/en/legal-policy/procedures/Pages/rpd-pn-hearing-resumption.aspx"><strong data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Read the instructions on sending correspondence on the IRB’s website.</span></strong></a></p></div><span data-dcnode-id="1202" instrument_node="">
</span></div><div class="et_pb_toggle et_pb_module et_pb_accordion_item et_pb_accordion_item_2 et_pb_toggle_close" data-dcnode-id="1170"><span data-dcnode-id="1200" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">For those filing an appeal before the Refugee Appeal Division of the Immigration Refugee Board (IRB)</span></h5><span data-dcnode-id="1197" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1172"><h3 data-dcnode-id="1193"><span data-dcnode-id="1194" style="color: #0072bc;"><strong data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Hearings postponed</span></strong></span></h3><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1191" instrument_node="">As of 2 November 2020, the Refugee Appeal Division (RAD) will now schedule virtual hearings for all appeals that require a hearing. Appellants or their representatives will be asked to confirm their availability for the proposed hearing date and can request an in-person hearing if they have specific concerns with holding the hearing virtually. The RAD will consider these requests on a case-by-case basis.&nbsp;</span><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irb-cisr.gc.ca/en/legal-policy/procedures/Pages/rad-pn-scheduling-virtual-hearings.aspx"><strong data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Find out more about the IRB’s measures related to COVID-19 on the IRB’s website.</span></strong></a></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1183" instrument_node="">
</span><h3 data-dcnode-id="1179"><span data-dcnode-id="1180" style="color: #0072bc;"><strong data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Submission of documents</span></strong></span></h3><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1177" instrument_node="">Currently, you are able to provide the Refugee Appeal Division (RAD) with documents by mail, fax, email or ePost Connect. In-person correspondence will not be accepted until further notice. The RAD will use Canada Post’s epost Connect to exchange documents electronically with registered users.&nbsp;</span><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irb-cisr.gc.ca/en/legal-policy/procedures/Pages/rad-business-resumption.aspx"><strong data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Read the instructions on sending correspondence on the IRB’s website.</span></strong></a></p></div><span data-dcnode-id="1171" instrument_node="">
</span></div><div class="et_pb_toggle et_pb_module et_pb_accordion_item et_pb_accordion_item_3 et_pb_toggle_close" data-dcnode-id="1137"><span data-dcnode-id="1169" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">For those applying for a Pre-Removal Risk Assessment (PRRA)</span></h5><span data-dcnode-id="1166" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1139"><p data-dcnode-id="1161"><span data-dcnode-id="1165" instrument_node="">Immigration, Refugees and Citizenship Canada (IRCC) is still accepting Pre-Removal Risk Assessment (PRRA) applications at this time. You also have now the option to submit and communicate about your application online.&nbsp;</span><a data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/immigration-refugees-citizenship/services/coronavirus-covid19/refugees.html"><strong data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Find out more about PRRA application deadlines on IRCC’s website.</span></strong></a></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">For those awaiting a Pre-Removal Risk Assessment (PRRA)&nbsp;hearing, your hearing may be held either:</span></p><span data-dcnode-id="1157" instrument_node="">
</span><ul data-dcnode-id="1143"><span data-dcnode-id="1156" instrument_node="">
</span><li data-dcnode-id="1145" style="list-style-type: none;"><span data-dcnode-id="1155" instrument_node="">
</span><ul data-dcnode-id="1147"><span data-dcnode-id="1154" instrument_node="">
</span><li data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">On site at an IRCC office;</span></li><span data-dcnode-id="1151" instrument_node="">
</span><li data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Remotely, via videoconference.</span></li><span data-dcnode-id="1148" instrument_node="">
</span></ul><span data-dcnode-id="1146" instrument_node="">
</span></li><span data-dcnode-id="1144" instrument_node="">
</span></ul><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">An IRCC officer will determine if a remote hearing is appropriate in your case.</span></p></div><span data-dcnode-id="1138" instrument_node="">
</span></div><div class="et_pb_toggle et_pb_module et_pb_accordion_item et_pb_accordion_item_4 et_pb_toggle_close" data-dcnode-id="1119"><span data-dcnode-id="1136" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">In regards to detained individuals</span></h5><span data-dcnode-id="1133" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1121"><p data-dcnode-id="1128"><span data-dcnode-id="1129" style="color: #000000;"><strong data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Precautionary measures</span></strong><span data-dcnode-id="1130" instrument_node="">&nbsp;have been taken to limit the risk of virus contamination.</span></span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1126" instrument_node="">Please note the Immigration Division’s (ID) intention to resume in-person hearings on 14 September 2020. Detention reviews and detained admissibility hearings will continue to be conducted primarily by teleconference until further notice due to ongoing health-related restrictions on the transportation of detainees and limitations on access to detention facilities.&nbsp;</span><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irb-cisr.gc.ca/en/legal-policy/procedures/Pages/id-pn-resumption-inperson-hearings.aspx"><strong data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Read the practice notice on the resumption of in-person hearings on the IRB’s website.</span></strong></a></p></div><span data-dcnode-id="1120" instrument_node="">
</span></div><div class="et_pb_toggle et_pb_module et_pb_accordion_item et_pb_accordion_item_5 et_pb_toggle_close" data-dcnode-id="1107"><span data-dcnode-id="1118" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">For those who lost their income due to COVID-19</span></h5><span data-dcnode-id="1115" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1109"><p data-dcnode-id="1110"><span data-dcnode-id="1114" instrument_node="">The Canada Recovery Benefit (CRB) gives income support to employed and self-employed individuals who are directly affected by COVID-19 and are not entitled to Employment Insurance (EI) benefits. The CRB is administered by the Canada Revenue Agency (CRA). If you are eligible for the CRB, you can receive $1,000 ($900 after taxes withheld) for a 2-week period.&nbsp;</span><a data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/revenue-agency/services/benefits/recovery-benefit.html"><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Find out more about the eligibility criteria and the application process on the Government of Canada’s website.</span></strong></a></p></div><span data-dcnode-id="1108" instrument_node="">
</span></div><div class="et_pb_toggle et_pb_module et_pb_accordion_item et_pb_accordion_item_6 et_pb_toggle_close" data-dcnode-id="1091"><span data-dcnode-id="1106" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Processing of refugee claims and appeals for individuals applying under the Government of Canada’s special measure</span></h5><span data-dcnode-id="1103" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1093"><p data-dcnode-id="1098"><span data-dcnode-id="1102" instrument_node="">The Government of Canada announced that, starting 14 December 2020, it will be accepting applications for permanent residence from pending and unsuccessful refugee claimants who worked in Canada’s health care sector and provided direct care to patients during the COVID-19 pandemic.&nbsp;</span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irb-cisr.gc.ca/en/legal-policy/procedures/Pages/rpd-rad-pn-processing-claimants.aspx"><strong data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Read the practice notice on Refugee Protection Division (RPD) and Refugee Appeal Division (RAD) processing for individuals applying under public policies from the Government of Canada.</span></strong></a></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" style="color: #000000;"><span data-dcnode-id="1096" instrument_node="">&nbsp;</span></span></p></div><span data-dcnode-id="1092" instrument_node="">
</span></div><div class="et_pb_toggle et_pb_module et_pb_accordion_item et_pb_accordion_item_7 et_pb_toggle_close" data-dcnode-id="1020"><span data-dcnode-id="1090" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Medical assistance</span></h5><span data-dcnode-id="1087" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1022"><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Access to COVID-19 clinics for free contagion testing is open to all people regardless of immigration status.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node="">The Interim Federal Health Program coverage&nbsp;</span><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">covers all diagnostic tests and treatments for COVID-19</span></strong><span data-dcnode-id="1080" instrument_node="">, as well as any other medical situation (with rare exceptions).</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">For medical assistance about COVID-19, you can reach the following numbers:</span></p><span data-dcnode-id="1075" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="955"><h2 data-dcnode-id="1005"><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Seeking asylum in Canada</span></strong></h2><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="989"><span class="TextRun SCXW29067185 BCX0" data-contrast="none" data-dcnode-id="998" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW29067185 BCX0" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">If you are seeking asylum in Canada, you will find in this section resources to help you understand the Canadian asylum system – from learning more about&nbsp;</span></span></span><span class="TextRun SCXW29067185 BCX0" data-contrast="none" data-dcnode-id="995" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW29067185 BCX0" data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">how to make a refugee claim to&nbsp;</span></span></span><span class="TextRun SCXW29067185 BCX0" data-contrast="none" data-dcnode-id="992" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW29067185 BCX0" data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">finding out what happens when you claim asylum at the border.</span></span></span><span class="EOP SCXW29067185 BCX0" data-ccp-props="{}" data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="956"><span class="TextRun SCXW34718826 BCX0" data-contrast="none" data-dcnode-id="985" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW34718826 BCX0" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">If you fear persecution&nbsp;</span></span></span><span class="TextRun SCXW34718826 BCX0" data-contrast="none" data-dcnode-id="982" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW34718826 BCX0" data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">in</span></span></span><span class="TextRun SCXW34718826 BCX0" data-contrast="none" data-dcnode-id="979" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW34718826 BCX0" data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">&nbsp;</span></span></span><span class="TextRun SCXW34718826 BCX0" data-contrast="none" data-dcnode-id="976" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW34718826 BCX0" data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">your country</span></span></span><span class="TextRun SCXW34718826 BCX0" data-contrast="none" data-dcnode-id="973" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW34718826 BCX0" data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">, you may seek protection once in Canada by presenting an asylum claim to the Canadian authorities</span></span></span><span class="TextRun SCXW34718826 BCX0" data-contrast="none" data-dcnode-id="970" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW34718826 BCX0" data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">.  </span></span></span><strong data-dcnode-id="959"><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/in-canada/making-refugee-claim/who-can-get-refugee-protection-in-canada/"><span class="TextRun SCXW34718826 BCX0" data-contrast="none" data-dcnode-id="967" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW34718826 BCX0" data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Find out&nbsp;</span></span></span><span class="TextRun SCXW34718826 BCX0" data-contrast="none" data-dcnode-id="964" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun CommentStart SCXW34718826 BCX0" data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">who can get refugee protection in Canada</span></span></span><span class="TextRun SCXW34718826 BCX0" data-contrast="none" data-dcnode-id="961" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW34718826 BCX0" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">.</span></span></span></a></strong><span class="EOP SCXW34718826 BCX0" data-ccp-props="{}" data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">&nbsp;</span></span></p></div><span data-dcnode-id="954" instrument_node="">

</span><h5 class="et_pb_toggle_title" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">How to make a refugee claim </span></h5><span data-dcnode-id="942" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="916"><p data-dcnode-id="917"><span class="TextRun SCXW31823525 BCX0" data-contrast="none" data-dcnode-id="939" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW31823525 BCX0" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">You can make a refugee claim either &nbsp;</span></span></span><strong data-dcnode-id="935"><span class="TextRun SCXW31823525 BCX0" data-contrast="none" data-dcnode-id="936" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW31823525 BCX0" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">upon arrival in Canada at a port of entry</span></span></span></strong><span class="TextRun SCXW31823525 BCX0" data-contrast="none" data-dcnode-id="930" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW31823525 BCX0" data-dcnode-id="931"><span data-dcnode-id="934" instrument_node="">  (airport or land border) with the Canada Border Services Agency (CBSA) or</span><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node=""> &nbsp;</span></strong></span></span><strong data-dcnode-id="926"><span class="TextRun SCXW31823525 BCX0" data-contrast="none" data-dcnode-id="927" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW31823525 BCX0" data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">inside Canada</span></span></span></strong><span class="TextRun SCXW31823525 BCX0" data-contrast="none" data-dcnode-id="923" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW31823525 BCX0" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">  at the nearest Immigration, Refugees and Citizenship Canada (IRCC) office. The Canada Border Services Agency (CBSA) is Canada’s law enforcement agency responsible for border control. Immigration, Refugees and Citizenship Canada (IRCC)</span></span></span><span class="TextRun SCXW31823525 BCX0" data-contrast="none" data-dcnode-id="920" lang="EN-CA" xml:lang="EN-CA"><span class="NormalTextRun SCXW31823525 BCX0" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">&nbsp;is the department of the Government of Canada responsible for matters dealing with immigration to Canada, refugees, and Canadian citizenship.</span></span></span><span class="EOP SCXW31823525 BCX0" data-ccp-props="{}" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">&nbsp;</span></span></p></div><span data-dcnode-id="915" instrument_node="">
</span></div><div class="et_pb_toggle et_pb_module et_pb_accordion_item et_pb_accordion_item_9 et_pb_toggle_close" data-dcnode-id="883"><span data-dcnode-id="913" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Arriving at the border from the United States </span></h5><span data-dcnode-id="910" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="885"><p data-dcnode-id="895"><span data-dcnode-id="909" instrument_node="">Note that the Canadian government has put </span><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">restrictions</span></strong><span data-dcnode-id="906" instrument_node=""> on refugee claims made at official land ports of entry. Under the Canada–U.S. Safe Third Country Agreement (STCA), &nbsp;</span><strong data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">persons coming to Canada from the U.S. cannot make an asylum  claim at official Canadian border  posts  </span></strong><span data-dcnode-id="903" instrument_node="">unless they qualify for an exception to the Agreement. &nbsp;</span><strong data-dcnode-id="896"><span data-dcnode-id="902" instrument_node="">Learn more about  </span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/in-canada/making-refugee-claim/who-can-claim-asylum-at-the-border/"><span data-dcnode-id="901" instrument_node="">who can claim asylum at the border</span></a><span data-dcnode-id="899" instrument_node="">  and  </span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/in-canada/making-refugee-claim/how-to-prove-your-link-to-family-members-in-canada/"><span data-dcnode-id="898" instrument_node="">how to prove your link to family members in Canada.&nbsp;</span></a></strong></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="893" instrument_node="">If you make a refugee claim upon crossing the border  </span><strong data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">in-between official border posts</span></strong><span data-dcnode-id="890" instrument_node="">, you will be arrested by the police and questioned about your irregular entry. You will then be brought to the nearest official border post to have your asylum claim processed.  </span><a data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/in-canada/making-refugee-claim/what-happens-when-you-claim-asylum-at-the-border/"><strong data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Find out&nbsp;what happens when you claim asylum at the border.&nbsp;</span></strong></a></p></div><span data-dcnode-id="884" instrument_node="">
</span></div><div class="et_pb_toggle et_pb_module et_pb_accordion_item et_pb_accordion_item_10 et_pb_toggle_close" data-dcnode-id="729"><span data-dcnode-id="882" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">The process of claiming asylum in Canada </span></h5><span data-dcnode-id="879" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="731"><p data-dcnode-id="812"><span data-contrast="none" data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Once you have made&nbsp;</span></span><span data-contrast="none" data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">an</span></span><span data-contrast="none" data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">&nbsp;asylum claim</span></span><span data-contrast="none" data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">, CBSA or IRCC officials will first conduct an interview to verify your  </span></span><b data-dcnode-id="868"><span data-contrast="none" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">identity</span></span></b><span data-contrast="none" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">, perform a  </span></span><b data-dcnode-id="863"><span data-contrast="none" data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">security screening&nbsp;</span></span></b><span data-contrast="none" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node=""> and determine if you are  </span></span><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cic.gc.ca/english/helpcentre/answer.asp%3Fqnum%3D606%26top%3D11" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="858"><span data-contrast="none" data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">eligible to have your asylum claim </span></span></b></a><b data-dcnode-id="854"><span data-contrast="none" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node=""> </span></span></b><b data-dcnode-id="851"><span data-contrast="none" data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">referred to the Immigration and Refugee Board (IRB)</span></span></b><span data-contrast="none" data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">,</span></span><span data-contrast="none" data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">&nbsp;</span></span><span data-contrast="none" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">an independent administrative tribunal responsible for making decisions on refugee matters.&nbsp;</span></span><span data-contrast="none" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">It is a federal institution that operates at arm’s length from the Government of Canada</span></span><span data-contrast="none" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">.</span></span><span data-contrast="none" data-dcnode-id="839"><span data-dcnode-id="840" instrument_node=""> &nbsp;</span></span><b data-dcnode-id="836"><span data-contrast="none" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Learn more about &nbsp;</span></span></b><b data-dcnode-id="831"><span data-contrast="none" data-dcnode-id="832"><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/in-canada/making-refugee-claim/how-to-prove-your-identity/"><span data-dcnode-id="835" instrument_node="">proving your identity</span></a><span data-dcnode-id="833" instrument_node="">&nbsp;</span></span></b><b data-dcnode-id="828"><span data-contrast="none" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node=""> </span></span></b><b data-dcnode-id="825"><span data-contrast="none" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">and find out  </span></span></b><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/in-canada/making-refugee-claim/who-will-decide-whether-your-asylum-claim-is-accepted-or-rejected/"><b data-dcnode-id="822"><span data-contrast="none" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">who will&nbsp;</span></span></b><b data-dcnode-id="819"><span data-contrast="none" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">decide whether your asylum claim is accepted or rejected</span></span></b></a><b data-dcnode-id="815"><span data-contrast="none" data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">.</span></span></b><span data-ccp-props="{}" data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="749"><span data-contrast="none" data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">If your claim is eligible to be referred to the&nbsp;</span></span><span data-contrast="none" data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">IRB</span></span><span data-contrast="none" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">, you will be given a very important document called the  </span></span><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/in-canada/making-refugee-claim/what-is-the-basis-of-claim-form/"><b data-dcnode-id="802"><span data-contrast="none" data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Basis of Claim form</span></span></b></a><span data-dcnode-id="800" instrument_node="">,&nbsp;</span><span data-contrast="none" data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">in which you will explain why you are&nbsp;</span></span><span data-contrast="none" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">seeking protection in Canada.&nbsp;</span></span><b data-dcnode-id="793"><span data-contrast="none" data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">You must fill out the&nbsp;</span></span></b><b data-dcnode-id="790"><span data-contrast="none" data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Basis of Claim form</span></span></b><b data-dcnode-id="787"><span data-contrast="none" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">&nbsp;within the specified timeframe</span></span></b><span data-contrast="none" data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">.&nbsp;</span></span><span data-contrast="none" data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">T</span></span><span data-contrast="none" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">he &nbsp;</span></span><span data-contrast="none" data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">IRB&nbsp;</span></span><span data-contrast="none" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node=""> will consider the information you provide in the&nbsp;</span></span><span data-contrast="none" data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Basis of Claim form</span></span><span data-contrast="none" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">, your testimony at a &nbsp;</span></span><b data-dcnode-id="770"><span data-contrast="none" data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">hearing&nbsp;</span></span></b><span data-contrast="none" data-dcnode-id="768"><span data-dcnode-id="769" instrument_node=""> and other related evidence to decide if you qualify for refugee protection.</span></span><span data-contrast="none" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">&nbsp;</span></span><span data-contrast="none" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">If you are a refugee claimant preparing for your hearing, get ready with the</span></span><b data-dcnode-id="761"><span data-contrast="none" data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">&nbsp;</span></span></b><a data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//refugeeclaim.ca/en/" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="758"><span data-contrast="none" data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Refugee Hearing Preparation Guide</span></span></b></a><b data-dcnode-id="754"><span data-contrast="none" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">,&nbsp;</span></span></b><span data-contrast="none" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">a collaborative initiative developed in 11 languages for each region of Canada.</span></span><span data-ccp-props="{}" data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="732"><span data-contrast="none" data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">If your claim is not eligible to be referred to the IRB, you may have access to another process called the  </span></span><b data-dcnode-id="743"><span data-contrast="none" data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Pre-Removal Risk Assessment (PRRA)</span></span></b><span data-contrast="none" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">,</span></span><span data-contrast="none" data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">  which will be conducted by an immigration officer from Immigration, Refugees and Citizenship Canada (IRCC). Regardless of whether your refugee claim is assessed by the&nbsp;</span></span><span data-contrast="none" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">IRB</span></span><span data-contrast="none" data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">&nbsp;or through a Pre-Removal Risk Assessment (PRRA) by IRCC, the authorities will evaluate your fear of persecution and decide whether or not to grant you international protection.</span></span><span data-ccp-props="{}" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">&nbsp;</span></span></p></div><span data-dcnode-id="730" instrument_node="">
