</span><p class="selectionShareable" data-dcnode-id="1265"><strong data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Organizational Setting and Work Relationships&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></strong></p><span data-dcnode-id="1264" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">The Associate Protection Officer reports to the Protection Officer or the Senior Protection Officer. Depending on the size and structure of the Office, the incumbent may have supervisory responsibility for protection staff including community-based protection registration, resettlement and education. S/he provides functional protection guidance to information management and programme staff on all protection/legal matters and accountabilities. These include: statelessness (in line with the campaign to End Statelessness by 2024),&nbsp; Global Compact on Refugees (GCR) commitments, age, gender, diversity (AGD) and accountability to affected populations (AAP) through community-based protection, Child protection, Gender-Based Violence (GBV) prevention and response, gender equality, disability inclusion, youth empowerment, psycho-social support&nbsp; and PSEA, registration, asylum/refugee status determination, resettlement, local integration, voluntary repatriation, human rights standards integration, national legislation, judicial engagement, predictable and decisive engagement in situations of internal displacement and engagement in wider mixed movement and climate change/disaster-related displacement responses. S/he supervises protection standards, operational procedures and practices in protection delivery in line with international standards.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">The Associate Protection Officer is expected to coordinate quality, timely and effective protection responses to the needs of populations of concern, ensuring that operational responses in all sectors mainstream protection methodologies and integrate protection safeguards. The incumbent contributes to the design of a comprehensive protection strategy and represents the organization externally on protection doctrine and policy as guided by the supervisor. S/he also ensures that persons of concern are meaningfully engaged in the decisions that affect them and support programme design and adaptations that are influenced by the concerns, priorities and capacities of persons of concern. To achieve this, the incumbent will need to build and maintain effective interfaces with communities of concern, authorities, protection and assistance partners as well as a broader network of stakeholders who can contribute to enhancing protection.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1255"><strong data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Operational Context</span></strong></p><span data-dcnode-id="1254" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">The Associate Protection Officer reports to the Protection Officer or the Senior Protection Officer. Depending on the size and structure of the Office, the incumbent may have supervisory responsibility for protection staff including community-based protection registration, resettlement and education. S/he provides functional protection guidance to information management and programme staff on all protection/legal matters and accountabilities. These include: statelessness (in line with the campaign to End Statelessness by 2024),&nbsp; Global Compact on Refugees (GCR) commitments, age, gender, diversity (AGD) and accountability to affected populations (AAP) through community-based protection, Child protection, Gender-Based Violence (GBV) prevention and response, gender equality, disability inclusion, youth empowerment, psycho-social support&nbsp; and PSEA, registration, asylum/refugee status determination, resettlement, local integration, voluntary repatriation, human rights standards integration, national legislation, judicial engagement, predictable and decisive engagement in situations of internal displacement and engagement in wider mixed movement and climate change/disaster-related displacement responses. S/he supervises protection standards, operational procedures and practices in protection delivery in line with international standards.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">The Associate Protection Officer is expected to coordinate quality, timely and effective protection responses to the needs of populations of concern, ensuring that operational responses in all sectors mainstream protection methodologies and integrate protection safeguards. The incumbent contributes to the design of a comprehensive protection strategy and represents the organization externally on protection doctrine and policy as guided by the supervisor. S/he also ensures that persons of concern are meaningfully engaged in the decisions that affect them and support programme design and adaptations that are influenced by the concerns, priorities and capacities of persons of concern. To achieve this, the incumbent will need to build and maintain effective interfaces with communities of concern, authorities, protection and assistance partners as well as a broader network of stakeholders who can contribute to enhancing protection.</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">In line with UNHCR Nepal’s Operational Multi Year Operational Strategy the Associate Protection Officer will be expected to be capacitated in 2022 to be able to assume the role of head of the UNHCR Nepal protection unit in 2023. Consequently, it is essential that the Associate Protection Officer has previous significant relevant management and leadership experience.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Additionally, a post graduate qualification or a legal professional qualification including significant professional legal experience in court as well as advocacy with Parliamentarians and hands on capacity building of administrative officials is desirable.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">The Associate Protection Officer position will require very strong oral and written communications (including legal drafting) skills in both English and Nepali. Therefore, it is essential that the candidate has excellent English writing drafting skills.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">All UNHCR staff members are accountable to perform their duties as reflected in their job description. They do so within their delegated authorities, in line with the regulatory framework of UNHCR which includes the UN Charter, UN&nbsp;Staff Regulations and Rules, UNHCR Policies and Administrative Instructions as well as relevant accountability frameworks. In addition, staff members are required to discharge their responsibilities in a manner consistent with the core, functional, cross-functional and managerial competencies and UNHCR’s core values of professionalism, integrity and respect for diversity.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1233"><strong data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Duties</span></strong></p><span data-dcnode-id="1232" instrument_node="">
</span><ul data-dcnode-id="1155"><span data-dcnode-id="1231" instrument_node="">
</span><li data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Stay abreast of political, social, economic and cultural developments that have an impact on the protection environment.</span></li><span data-dcnode-id="1228" instrument_node="">
</span><li data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Promote International and National Law and applicable UN/UNHCR and IASC policy, standards and codes of conduct.</span></li><span data-dcnode-id="1225" instrument_node="">
</span><li data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Foster their consistent and coherent interpretation and application through mainstreaming in all sectors and /or in clusters in applicable operations.</span></li><span data-dcnode-id="1222" instrument_node="">
</span><li data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Assist in providing comments on existing and draft legislation related to persons of concern.&nbsp;&nbsp;</span></li><span data-dcnode-id="1219" instrument_node="">
</span><li data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Provide legal advice and guidance on protection issues to persons of concern; liaise with competent authorities to ensure the issuance of personal and other relevant documentation.</span></li><span data-dcnode-id="1216" instrument_node="">
</span><li data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Conduct eligibility and status determination for persons of concern in compliance with UNHCR procedural standards and international protection principles.</span></li><span data-dcnode-id="1213" instrument_node="">
</span><li data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Promote and contribute to measures to identify, prevent and reduce statelessness.</span></li><span data-dcnode-id="1210" instrument_node="">
</span><li data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Contribute to a country-level child protection plan as part of the protection strategy to ensure programmes use a child protection systems approach.</span></li><span data-dcnode-id="1207" instrument_node="">
</span><li data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Contribute to a country-level education plan.</span></li><span data-dcnode-id="1204" instrument_node="">
</span><li data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Implement and oversee Standard Operating Procedures (SOPs) for all protection/solutions activities which integrate AGD sensitive procedures.</span></li><span data-dcnode-id="1201" instrument_node="">
</span><li data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Oversee and manage individual protection cases, including those on GBV and child protection. Monitor, and intervene in cases of refoulement, expulsion and other protection incidents through working relations with governments and other partners.</span></li><span data-dcnode-id="1198" instrument_node="">
</span><li data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Recommend durable solutions for the largest possible number of persons of concern through voluntary repatriation, local integration and where appropriate, resettlement.</span></li><span data-dcnode-id="1195" instrument_node="">
</span><li data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Assess resettlement needs and apply priorities for the resettlement of individuals and groups of refugees and other persons of concern.</span></li><span data-dcnode-id="1192" instrument_node="">
</span><li data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Participate in the organisation and implementation of participatory assessments and methodologies throughout the operations management cycle and promote AGD sensitive programming with implementing and operational partners.</span></li><span data-dcnode-id="1189" instrument_node="">
</span><li data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Contribute to and facilitate a programme of results-based advocacy through a consultative process with sectorial and/or cluster partners.</span></li><span data-dcnode-id="1186" instrument_node="">
</span><li data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Facilitate effective information management through the provision of disaggregated data on populations of concern and their problems.&nbsp;</span></li><span data-dcnode-id="1183" instrument_node="">
</span><li data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Promote and integrate community-based approaches to protection and contribute to capacity-building initiatives for communities and individuals to assert their rights.</span></li><span data-dcnode-id="1180" instrument_node="">
</span><li data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Support activities in the area of risk management related to Sexual Exploitation and Abuse, fraud, case-processing, data protection, and human rights due diligence at country level.</span></li><span data-dcnode-id="1177" instrument_node="">
</span><li data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Participate in initiatives to capacitate national authorities, relevant institutions and NGOs to strengthen national protection related legislation and procedures.</span></li><span data-dcnode-id="1174" instrument_node="">
</span><li data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Intervene with authorities on protection issues.</span></li><span data-dcnode-id="1171" instrument_node="">
</span><li data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Negotiate locally on behalf of UNHCR.</span></li><span data-dcnode-id="1168" instrument_node="">
</span><li data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Decide priorities for reception, interviewing and counselling for groups or individuals.</span></li><span data-dcnode-id="1165" instrument_node="">
</span><li data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Enforce compliance of staff and implementing partners with global protection policies and standards of professional integrity in the delivery of protection services.</span></li><span data-dcnode-id="1162" instrument_node="">
</span><li data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Enforce compliance with, and integrity of, all protection standard operating procedures.</span></li><span data-dcnode-id="1159" instrument_node="">
</span><li data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Perform other related duties as required.</span></li><span data-dcnode-id="1156" instrument_node="">
</span></ul><span data-dcnode-id="1154" instrument_node="">

</span><p class="selectionShareable" data-dcnode-id="1030"><strong data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Language Requirements </span></strong></p><span data-dcnode-id="1029" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1023"><em data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">For International Professional and Field Service jobs: </span><strong data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Knowledge of English and UN working language of the duty station if not English</span></strong><span data-dcnode-id="1025" instrument_node="">.</span></em></p><span data-dcnode-id="1022" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1016"><em data-dcnode-id="1017"><span data-dcnode-id="1021" instrument_node="">For National Professional jobs: </span><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Knowledge of English and UN working language of the duty station if not English and local language</span></strong><span data-dcnode-id="1018" instrument_node="">.</span></em></p><span data-dcnode-id="1015" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="1009"><em data-dcnode-id="1010"><span data-dcnode-id="1014" instrument_node="">For General Service jobs: </span><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Knowledge of English and/or UN working language of the duty station if not English</span></strong><span data-dcnode-id="1011" instrument_node="">.</span></em></p><span data-dcnode-id="1008" instrument_node="">
</span><ol data-dcnode-id="1002"><span data-dcnode-id="1007" instrument_node="">
</span><li data-dcnode-id="1004"><strong data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Competency Requirements</span></strong></li><span data-dcnode-id="1003" instrument_node="">
</span></ol><span data-dcnode-id="1001" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">All jobs at UNHCR require six core competencies and may also require managerial competencies and/or cross-functional competencies. The six core competencies are listed below.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="995"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Core Competencies: </span></strong></p><span data-dcnode-id="994" instrument_node="">
</span><ul data-dcnode-id="968"><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="990"><em data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Accountability</span></em></li><span data-dcnode-id="989" instrument_node="">
</span><li data-dcnode-id="986"><em data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Communication</span></em></li><span data-dcnode-id="985" instrument_node="">
</span><li data-dcnode-id="982"><em data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Organizational Awareness</span></em></li><span data-dcnode-id="981" instrument_node="">
</span><li data-dcnode-id="978"><em data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Teamwork &amp; Collaboration</span></em></li><span data-dcnode-id="977" instrument_node="">
</span><li data-dcnode-id="974"><em data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Commitment to Continuous Learning </span></em></li><span data-dcnode-id="973" instrument_node="">
</span><li data-dcnode-id="970"><em data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Client &amp; Result Orientation</span></em></li><span data-dcnode-id="969" instrument_node="">
</span></ul><span data-dcnode-id="967" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="964"><strong data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Managerial Competencies: </span></strong></p><span data-dcnode-id="963" instrument_node="">
</span><ul data-dcnode-id="953"><span data-dcnode-id="962" instrument_node="">
</span><li data-dcnode-id="959"><em data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Judgement and Decision Making</span></em></li><span data-dcnode-id="958" instrument_node="">
</span><li data-dcnode-id="955"><em data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Empowering and Building Trust</span></em></li><span data-dcnode-id="954" instrument_node="">
</span></ul><span data-dcnode-id="952" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="949"><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Cross-Functional Competencies: </span></strong></p><span data-dcnode-id="948" instrument_node="">
</span><ul data-dcnode-id="934"><span data-dcnode-id="947" instrument_node="">
</span><li data-dcnode-id="944"><em data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Analytical Thinking</span></em></li><span data-dcnode-id="943" instrument_node="">
</span><li data-dcnode-id="940"><em data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Negotiation and Conflict Resolution</span></em></li><span data-dcnode-id="939" instrument_node="">
</span><li data-dcnode-id="936"><em data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Political Awareness</span></em></li><span data-dcnode-id="935" instrument_node="">
</span></ul><span data-dcnode-id="933" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">All UNHCR workforce members must individually and collectively, contribute towards a working environment where each person feels safe, and empowered to perform their duties. This includes by demonstrating no tolerance for sexual exploitation and abuse, harassment including sexual harassment, sexism, gender inequality, discrimination, and abuse of power.</span></p><span data-dcnode-id="930" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">As individuals and as managers, all must be proactive in preventing and responding to inappropriate conduct, support ongoing dialogue on these matters and speaking up and seeking guidance and support from relevant UNHCR resources when these issues arise.</span></p><span data-dcnode-id="927" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="924"><strong data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Eligibility: </span></strong></p><span data-dcnode-id="923" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Candidates must be Nepali nationals.</span></p><span data-dcnode-id="920" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Internal staff members should consult the Policy and Procedures on Assignments of Locally recruited Staff (RALS). If you have questions regarding eligibility, you may also contact the HR Unit.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="914"><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Remuneration: </span></strong></p><span data-dcnode-id="913" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="909"><span data-dcnode-id="912" instrument_node="">A competitive compensation and benefits package is offered. For information on UN salaries, allowances and benefits, please visit the portal of the International Civil Service Commission at: </span><a data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//icsc.un.org/"><span data-dcnode-id="911" instrument_node="">http://icsc.un.org</span></a></p><span data-dcnode-id="908" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="905"><strong data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Submission of Applications: </span></strong></p><span data-dcnode-id="904" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="890"><span data-dcnode-id="903" instrument_node="">If you wish to be considered for this vacancy, please submit the application letter along with </span><strong data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">duly filled</span></strong><span data-dcnode-id="900" instrument_node=""> </span><strong data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">signed Personal History Form by e-mail to </span></strong><a data-dcnode-id="895" href="mailto:NEPKA@unhcr.org"><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">NEPKA@UNHCR.ORG</span></strong></a><strong data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">, </span></strong><strong data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">clearly stating: the position title, vacancy notice number and your Last Name in the subject line, by the closing date 2nd December 2021, 24:00. </span></strong></p><span data-dcnode-id="889" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="882"><span data-dcnode-id="888" instrument_node="">The Personal History Form and its supplementary sheet can be downloaded from: </span><a data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.or.th/sites/default/files/u11/P11_UNHCR.docm"><span data-dcnode-id="887" instrument_node="">https://www.unhcr.or.th/sites/default/files/u11/P11_UNHCR.docm</span></a><span data-dcnode-id="885" instrument_node="">&nbsp; and </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.or.th/sites/default/files/u11/P11SUP_UNHCR.docm"><span data-dcnode-id="884" instrument_node="">https://www.unhcr.or.th/sites/default/files/u11/P11SUP_UNHCR.docm</span></a></p><span data-dcnode-id="881" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="877"><strong data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">No late applications will be accepted. Only shortlisted candidates will be contacted. Shortlisted candidates will be required to sit for a written test and, only those who pass with 60% of the total score will be invited for the oral interview. </span></strong><span data-dcnode-id="878" instrument_node="">UNHCR does not charge a fee at any stage of the recruitment process (application, interview, processing or any other fees).</span></p><span data-dcnode-id="876" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">UNHCR strongly encourages qualified female applicants for this position. UNHCR seeks to ensure that male and female employees are given equal career opportunities. UNHCR is committed to achieving workforce diversity in terms of gender, nationality and culture. All applications will be treated with the strictest confidentiality.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">&nbsp;</span></p><span data-dcnode-id="870" instrument_node="">
</span><p class="selectionShareable" data-dcnode-id="866"><strong data-dcnode-id="867"><em data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Refugees – who cares? We DO</span></em></strong></p><span data-dcnode-id="865" instrument_node="">
