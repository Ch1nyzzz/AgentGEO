pment, and knowledge management.

</span><div class="profile-section-card__meta" data-dcnode-id="2340"><span data-dcnode-id="2374" instrument_node="">
</span><div class="show-more-less-text" data-dcnode-id="2349"><span data-dcnode-id="2373" instrument_node="">
</span><p class="show-more-less-text__text--less" data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">
        THE GRADUATION STRATEGIC OPERATIONAL FRAMEWORK represents the BRAC's vision and approach to the Graduation Approach. BRAC recognizes the critical role the Graduation Approach plays in furthering and accelerating progress around poverty eradication, food security and nutrition, agriculture development, social protection, and resilience building. Three quarters of the chronically undernourished and those living in poverty are not covered by adequate social protection, rely predominantly on…
      </span></p><span data-dcnode-id="2370" instrument_node="">
</span><p class="show-more-less-text__text--more" data-dcnode-id="2365" tabindex="-1"><span data-dcnode-id="2369" instrument_node="">
          THE GRADUATION STRATEGIC OPERATIONAL FRAMEWORK represents the BRAC's vision and approach to the Graduation Approach. BRAC recognizes the critical role the Graduation Approach plays in furthering and accelerating progress around poverty eradication, food security and nutrition, agriculture development, social protection, and resilience building. Three quarters of the chronically undernourished and those living in poverty are not covered by adequate social protection, rely predominantly on natural resources for their livelihoods, and are particularly vulnerable and exposed to multiple risks. Yet, they play a critical role in ensuring global food security in the long term, and in sustainably managing the natural resource base in the most fragile ecosystems. Ensuring their access to integrated Graduation programs is not only a social imperative, but it is critical to ensure their participation as partners in development and economic growth. BRAC's commitment to helping national governments to eradicate hunger and poverty of present and future generations through Graduation is reflected in the  BRAC MISSION: to equip Governments, International non-Governmental Organizations, and multilaterals to achieve SDG 1 by 2030 through the adoption of the Graduation Approach </span><br data-dcnode-id="2368"><br data-dcnode-id="2367"><span data-dcnode-id="2366" instrument_node="">In this context, BRAC is committed to promoting a SYSTEMS APPROACH to the Graduation Approach to avoid fragmentation of interventions, together with partners, build, and strengthen NATIONALLY OWNED GRADUATION PROGRAMS that are well integrated in broader livelihood promotion and rural development strategies. The Framework presents BRAC's forward-looking contribution to maximizing the impact of Graduation on hunger, extreme poverty and resilience by designing, implementing, scaling, and supporting Graduation programs worldwide. As part of this work, BRAC is committed to contributing to the global and regional social protection agendas by strengthening the CASE TO EXPAND AND SCALE UP GRADUATION PROGRAMS. 
        </span></p><span data-dcnode-id="2364" instrument_node="">

</span><p class="show-more-less-text__text--less" data-dcnode-id="2296"><span data-dcnode-id="2307" instrument_node="">
        By mainstreaming BRAC’s Graduation Approach, social protection systems can fulfil</span><br data-dcnode-id="2306"><span data-dcnode-id="2305" instrument_node="">protective and preventive functions as well as maximize their promotive and</span><br data-dcnode-id="2304"><span data-dcnode-id="2303" instrument_node="">transformative potential in order to lift people out of poverty in a sustained way at scale.</span><br data-dcnode-id="2302"><span data-dcnode-id="2301" instrument_node="">The Graduation Approach can create and reinforce linkages between social protection</span><br data-dcnode-id="2300"><span data-dcnode-id="2299" instrument_node="">programs and complementary public sector services, such as education, healthcare</span><br data-dcnode-id="2298"><span data-dcnode-id="2297" instrument_node="">and agricultural extension services, as well as public and private…

</span><p class="show-more-less-text__text--more" data-dcnode-id="2267" tabindex="-1"><span data-dcnode-id="2294" instrument_node="">
          By mainstreaming BRAC’s Graduation Approach, social protection systems can fulfil</span><br data-dcnode-id="2293"><span data-dcnode-id="2292" instrument_node="">protective and preventive functions as well as maximize their promotive and</span><br data-dcnode-id="2291"><span data-dcnode-id="2290" instrument_node="">transformative potential in order to lift people out of poverty in a sustained way at scale.</span><br data-dcnode-id="2289"><span data-dcnode-id="2288" instrument_node="">The Graduation Approach can create and reinforce linkages between social protection</span><br data-dcnode-id="2287"><span data-dcnode-id="2286" instrument_node="">programs and complementary public sector services, such as education, healthcare</span><br data-dcnode-id="2285"><span data-dcnode-id="2284" instrument_node="">and agricultural extension services, as well as public and private sector activities that</span><br data-dcnode-id="2283"><span data-dcnode-id="2282" instrument_node="">increase the productivity of existing livelihoods and facilitate access to labor markets.</span><br data-dcnode-id="2281"><span data-dcnode-id="2280" instrument_node="">The Operational Framework demonstrates how Graduation can progressively transition</span><br data-dcnode-id="2279"><span data-dcnode-id="2278" instrument_node="">the ultra poor to positions of increased resilience and sustainable livelihoods, and</span><br data-dcnode-id="2277"><span data-dcnode-id="2276" instrument_node="">overtime break the intergenerational transmission of poverty from parents to their</span><br data-dcnode-id="2275"><span data-dcnode-id="2274" instrument_node="">children. While every context will require a tailored approach, each Graduation design</span><br data-dcnode-id="2273"><span data-dcnode-id="2272" instrument_node="">by BRAC is an adaptation of the Framework anchored within a theory of change that</span><br data-dcnode-id="2271"><span data-dcnode-id="2270" instrument_node="">complements national social protection strategies and strengthens the enabling</span><br data-dcnode-id="2269"><span data-dcnode-id="2268" instrument_node="">environment

</span><p class="show-more-less-text__text--less" data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">
        With the recent adoption of the United Nations Sustainable Development Goals (SDGs), eradicating extreme poverty presents a major challenge for governments worldwide. Despite recent progress, 902 million people remain in extreme poverty. To attain the right to social protection for people living in extreme poverty and, simultaneously, Goal 1, it will be necessary to lift them above the international extreme poverty line of USD 1.90/day. It is necessary to implement holistic, complementary and…
      </span></p><span data-dcnode-id="2167" instrument_node="">
</span><p class="show-more-less-text__text--more" data-dcnode-id="2162" tabindex="-1"><span data-dcnode-id="2166" instrument_node="">
          With the recent adoption of the United Nations Sustainable Development Goals (SDGs), eradicating extreme poverty presents a major challenge for governments worldwide. Despite recent progress, 902 million people remain in extreme poverty. To attain the right to social protection for people living in extreme poverty and, simultaneously, Goal 1, it will be necessary to lift them above the international extreme poverty line of USD 1.90/day. It is necessary to implement holistic, complementary and assessed interventions that support the realization of national social protection floor initiatives (SPF-I) and other human rights. We argue that the “Graduation” approach, which aims to equip the poorest of the poor with the tools, livelihoods and self-confidence to escape extreme poverty after the end of the intervention, is one such approach.</span><br data-dcnode-id="2165"><br data-dcnode-id="2164"><span data-dcnode-id="2163" instrument_node="">
</span></p><span data-dcnode-id="2161" instrument_node="">

</span><div class="profile-section-card__meta" data-dcnode-id="2000"><span data-dcnode-id="2029" instrument_node="">
</span><div class="show-more-less-text" data-dcnode-id="2009"><span data-dcnode-id="2028" instrument_node="">
</span><p class="show-more-less-text__text--less" data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">
        Despite the prevalence of sexual violence in conflict, much remains unknown about the magnitude, patterns, and causes of such violence. This is due in large part to chronic under-reporting of sexual violence during conflict. Women who are raped are sometimes forced into marriage in order to “save family honour,” and in some extreme situations, male relatives may commit an “honor killing” in an attempt to eliminate the “shame” brought upon the family. The risks of stigmatization and reprisal…
      </span></p><span data-dcnode-id="2025" instrument_node="">
</span><p class="show-more-less-text__text--more" data-dcnode-id="2023" tabindex="-1"><span data-dcnode-id="2024" instrument_node="">
          Despite the prevalence of sexual violence in conflict, much remains unknown about the magnitude, patterns, and causes of such violence. This is due in large part to chronic under-reporting of sexual violence during conflict. Women who are raped are sometimes forced into marriage in order to “save family honour,” and in some extreme situations, male relatives may commit an “honor killing” in an attempt to eliminate the “shame” brought upon the family. The risks of stigmatization and reprisal therefore impose a culture of silence that prevents women and children from reporting crimes of sexual violence because they have very little to gain and a great deal to lose.  But such evidence is critical to future prosecutions of sexual violence as war crimes and crimes against humanity under international law.
        </span></p><span data-dcnode-id="2022" instrument_node="">
