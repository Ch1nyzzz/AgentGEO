</span><p data-dcnode-id="611"><b data-dcnode-id="613"><span data-dcnode-id="614" instrument_node=""> Sector: </span></b><span data-dcnode-id="612" instrument_node="">Advocacy &amp; Government Affairs</span></p><span data-dcnode-id="610" instrument_node="">

</span><p data-dcnode-id="577"><b data-dcnode-id="580"><span data-dcnode-id="581" instrument_node=""> Background</span></b><b data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">:</span></b></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Over the past 80 years, the International Rescue Committee (IRC) has developed unparalleled expertise in responding to emergencies and helping uprooted communities to rebuild. Founded in 1933 at the request of Albert Einstein, the IRC offers lifesaving care and life-changing assistance to refugees who have fled war or disaster. The IRC is on the ground in more than 40 countries, providing emergency relief, relocating refugees and rebuilding lives in the wake of disaster. Through 25 offices in cities across the United States, the IRC also helps refugees and other immigrants resettle in the U.S. and become self-sufficient. The IRC is committed to a culture of bold leadership, innovation in all aspects of our work, creative partnerships and, most crucially, accountability to those we serve.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">The Policy &amp; Advocacy Department (P&amp;A) is a dynamic team whose core purpose is to drive fundamental change in the humanitarian sector, and to defend and promote core humanitarian policies, protections and assistance. The team carries out, coordinates, and provides guidance on a wide variety of domestic and international advocacy initiatives, including expert briefings, public outreach and education, and communication with the media. IRC advocates represent the IRC with legislative and executive branches of the US government, the media, NGO partner agencies and coalitions, the United Nations, and international financial institutions such as the World Bank. Learn more about the IRC’s Policy and Advocacy team here: https://www.rescue.org/policy.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="566"><b data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Job Overview:</span></b><span data-dcnode-id="567" instrument_node=""> P&amp;A’s Resettlement, Asylum, and Integration (RAI) team seeks a Fellow for the summer to assist with all aspects of our policy and advocacy work, including policy research, monitoring of policy developments and legal research and analysis related to federal and state legislation. Topics that may come up during the term include issues related to the federal and state appropriations, national refugee resettlement program, the refugee admissions ceiling, and the protection of vulnerable populations such as asylum seekers, Temporary Protected Status (TPS) recipients and unaccompanied children. The RAI Policy &amp; Advocacy team engages in advocacy at the federal and state levels.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="561"><b data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Responsibilities</span></b><span data-dcnode-id="562" instrument_node="">: This short-term opportunity as a RAI P&amp;A Fellow is a remote position with expectation of working mostly within Eastern Time hours and reporting to the RAI Senior Officer and Field Officer. Work activities may include the following:</span></p><span data-dcnode-id="560" instrument_node="">
</span><ul data-dcnode-id="555"><span data-dcnode-id="559" instrument_node="">
</span><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node=""> Assist with policy analysis and legal research on state and federal issues affecting refugee resettlement and other U.S. immigrant populations in need of protection</span></li><span data-dcnode-id="556" instrument_node="">
</span></ul><span data-dcnode-id="554" instrument_node="">
</span><ul data-dcnode-id="549"><span data-dcnode-id="553" instrument_node="">
</span><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node=""> Help track and analyze state and federal budget processes and legislation related to refugees, asylum seekers, and other populations of concern</span></li><span data-dcnode-id="550" instrument_node="">
</span></ul><span data-dcnode-id="548" instrument_node="">
</span><ul data-dcnode-id="543"><span data-dcnode-id="547" instrument_node="">
</span><li data-dcnode-id="545"><span data-dcnode-id="546" instrument_node=""> Represent the IRC Policy &amp; Advocacy team at meetings and congressional hearings</span></li><span data-dcnode-id="544" instrument_node="">
</span></ul><span data-dcnode-id="542" instrument_node="">
</span><ul data-dcnode-id="537"><span data-dcnode-id="541" instrument_node="">
</span><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node=""> Assist with research on advocacy issues</span></li><span data-dcnode-id="538" instrument_node="">
</span></ul><span data-dcnode-id="536" instrument_node="">
</span><ul data-dcnode-id="531"><span data-dcnode-id="535" instrument_node="">
</span><li data-dcnode-id="533"><span data-dcnode-id="534" instrument_node=""> Support digital advocacy efforts on issues related to refugees, asylum seekers, and other populations of concern</span></li><span data-dcnode-id="532" instrument_node="">
</span></ul><span data-dcnode-id="530" instrument_node="">
</span><ul data-dcnode-id="525"><span data-dcnode-id="529" instrument_node="">
</span><li data-dcnode-id="527"><span data-dcnode-id="528" instrument_node=""> Help draft and prepare materials for distribution during meetings and briefings</span></li><span data-dcnode-id="526" instrument_node="">

</span><p data-dcnode-id="453"><b data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Learning Outcomes</span></b><span data-dcnode-id="454" instrument_node="">: Over the course of the summer, the Fellow will:</span></p><span data-dcnode-id="452" instrument_node="">

</span><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node=""> Gain unique experience conducting research and analysis for policy and advocacy aims.</span></li><span data-dcnode-id="448" instrument_node="">
