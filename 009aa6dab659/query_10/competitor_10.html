e-id="2378" data-oc="true" id="t2_1"><span data-dcnode-id="2379" instrument_node="">DENNING OKATO </span></span><span class="t s2_1 f0" data-dcnode-id="2376" data-oc="true" id="t3_1"><span data-dcnode-id="2377" instrument_node="">PRINCIPLES OF INTERNATIONAL LAW </span></span><span class="t s3_1 f0" data-dcnode-id="2374" data-oc="true" id="t4_1"><span data-dcnode-id="2375" instrument_node="">Definitions </span></span><span class="t s4_1 f0" data-dcnode-id="2372" data-oc="true" id="t5_1"><span data-dcnode-id="2373" instrument_node="">Black</span></span><span class="t s5_1 f0" data-dcnode-id="2370" data-oc="true" id="t6_1"><span data-dcnode-id="2371" instrument_node="">’</span></span><span class="t s4_1 f0" data-dcnode-id="2368" data-oc="true" id="t7_1"><span data-dcnode-id="2369" instrument_node="">s Law Dictionary (Bryan Garner) </span></span><span class="t s3_1 f0" data-dcnode-id="2366" data-oc="true" id="t8_1"><span data-dcnode-id="2367" instrument_node="">The legal system governing the relationships between nations. </span></span><span class="t s3_1 f0" data-dcnode-id="2364" data-oc="true" id="t9_1"><span data-dcnode-id="2365" instrument_node="">The law applicable to states in their mutual relations and to individuals in their </span></span><span class="t s3_1 f0" data-dcnode-id="2362" data-oc="true" id="ta_1"><span data-dcnode-id="2363" instrument_node="">relations with states. </span></span><span class="t s5_1 f0" data-dcnode-id="2360" data-oc="true" id="tb_1"><span data-dcnode-id="2361" instrument_node="">Barron’s Law Dictionary 5</span></span><span class="t s6_1 f0" data-dcnode-id="2358" data-oc="true" id="tc_1"><span data-dcnode-id="2359" instrument_node="">th</span></span><span class="t s4_1 f0" data-dcnode-id="2356" data-oc="true" id="td_1"><span data-dcnode-id="2357" instrument_node="">Edition (Steven Gifis) </span></span><span class="t s3_1 f0" data-dcnode-id="2354" data-oc="true" id="te_1"><span data-dcnode-id="2355" instrument_node="">Rules and principles that govern questions of right between nations </span></span><span class="t s4_1 f0" data-dcnode-id="2352" data-oc="true" id="tf_1"><span data-dcnode-id="2353" instrument_node="">Dictionary of Law (Julian Webb) </span></span><span class="t s3_1 f0" data-dcnode-id="2350" data-oc="true" id="tg_1"><span data-dcnode-id="2351" instrument_node="">A body of rules that regulates the relationship between sovereign states. </span></span><span class="t s4_1 f0" data-dcnode-id="2348" data-oc="true" id="th_1"><span data-dcnode-id="2349" instrument_node="">Traditional Definition </span></span><span class="t s3_1 f0" data-dcnode-id="2346" data-oc="true" id="ti_1"><span data-dcnode-id="2347" instrument_node="">A body of rules which regulates the relationship between civilized states. </span></span><span class="t s4_1 f0" data-dcnode-id="2344" data-oc="true" id="tj_1"><span data-dcnode-id="2345" instrument_node="">Modern Definition </span></span><span class="t s3_1 f0" data-dcnode-id="2342" data-oc="true" id="tk_1"><span data-dcnode-id="2343" instrument_node="">A body of rules or principles which regulate the relationship between states </span></span><span class="t s3_1 f0" data-dcnode-id="2340" data-oc="true" id="tl_1"><span data-dcnode-id="2341" instrument_node="">amongst themselves and other subjects of international law. </span></span><span class="t s3_1 f0" data-dcnode-id="2338" data-oc="true" id="tm_1"><span data-dcnode-id="2339" instrument_node="">A body of rules or principles which govern the relations between entities </span></span><span class="t s3_1 f0" data-dcnode-id="2336" data-oc="true" id="tn_1"><span data-dcnode-id="2337" instrument_node="">endowed with international legal personality. </span></span><span class="t s4_1 f0" data-dcnode-id="2334" data-oc="true" id="to_1"><span data-dcnode-id="2335" instrument_node="">Jeremy Bentham </span></span><span class="t s3_1 f0" data-dcnode-id="2332" data-oc="true" id="tp_1"><span data-dcnode-id="2333" instrument_node="">A body of legal rules, norms and standards that apply between sovereign states </span></span><span class="t s3_1 f0" data-dcnode-id="2330" data-oc="true" id="tq_1"><span data-dcnode-id="2331" instrument_node="">and other entities that are legally recognized as international actors. </span></span><span class="t s4_1 f0" data-dcnode-id="2328" data-oc="true" id="tr_1"><span data-dcnode-id="2329" instrument_node="">Rudiger Wolfrum </span></span><span class="t s3_1 f0" data-dcnode-id="2326" data-oc="true" id="ts_1"><span data-dcnode-id="2327" instrument_node="">The legal order which is meant to structure the interaction between entities </span></span><span class="t s3_1 f0" data-dcnode-id="2324" data-oc="true" id="tt_1"><span data-dcnode-id="2325" instrument_node="">participating in and shaping international relations. </span></span><span class="t s7_1 f0" data-dcnode-id="2322" data-oc="true" id="tu_1"><span data-dcnode-id="2323" instrument_node="">Discussion point. </span></span><span class="t s3_1 f0" data-dcnode-id="2320" data-oc="true" id="tv_1"><span data-dcnode-id="2321" instrument_node="">Is international law a toothless dog? (is it binding?) </span></span><span class="t s8_1 f0" data-dcnode-id="2318" data-oc="true" id="tw_1"><span data-dcnode-id="2319" instrument_node=""></span></span><span class="t s3_1 f0" data-dcnode-id="2316" data-oc="true" id="tx_1"><span data-dcnode-id="2317" instrument_node="">Consent </span></span><span class="t s8_1 f0" data-dcnode-id="2314" data-oc="true" id="ty_1"><span data-dcnode-id="2315" instrument_node=""></span></span><span class="t s3_1 f0" data-dcnode-id="2312" data-oc="true" id="tz_1"><span data-dcnode-id="2313" instrument_node="">Pacta sunt servanda (the agreement must be kept) </span></span><span class="t s8_1 f0" data-dcnode-id="2310" data-oc="true" id="t10_1"><span data-dcnode-id="2311" instrument_node=""></span></span><span class="t s3_1 f0" data-dcnode-id="2308" data-oc="true" id="t11_1"><span data-dcnode-id="2309" instrument_node="">Good faith </span></span><span class="t s8_1 f0" data-dcnode-id="2306" data-oc="true" id="t12_1"><span data-dcnode-id="2307" instrument_node=""></span></span><span class="t s3_1 f0" data-dcnode-id="2304" data-oc="true" id="t13_1"><span data-dcnode-id="2305" instrument_node="">Sanctions </span></span></div></div></div></div></div></div></div></div></div><div class="paywall-part-end-of-preview" data-dcnode-id="1386"><div class="Xqy1BD+0T09Cw6fk3wNMog==" data-dcnode-id="2170"><div data-dcnode-id="2171" data-html-viewer-page="2"><div data-block="true" data-dcnode-id="2172" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;id&quot;:&quot;html-prev-2&quot;,&quot;data-height&quot;:&quot;829&quot;,&quot;style&quot;:&quot;/* overflow: hidden; */position: relative;/* width: 640px; *//* height: 829px; */&quot;}}" data-props="{&quot;dataHeight&quot;:&quot;829&quot;}"><div data-dcnode-id="2173" data-testid="html-preview-wrapper" style="height:calc(829px * (var(--initial-viewer-width) / 640))"><div data-block="true" data-dcnode-id="2175" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;class&quot;:&quot;html-preview-text&quot;}}" data-props="{&quot;className&quot;:&quot;html-preview-text&quot;,&quot;testId&quot;:&quot;html-preview-text&quot;}"><div class="html-preview-text" data-dcnode-id="2176" data-testid="html-preview-text" style="transform:scale(calc( var(--initial-viewer-width) / 640));transform-origin:top left"><div class="unsplit-top-2-1" data-dcnode-id="2206" data-oc="true"><div data-block="true" data-dcnode-id="2207" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;class&quot;:&quot;ch-page-slice lazyload&quot;,&quot;style&quot;:&quot;width: 640px; height: 829px; background-image: url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==); background-position: 0 0;&quot;,&quot;data-bg&quot;:&quot;/doc-asset/bg/328ccc6560a059297cb07205344dfc ode-id="2276" instrument_node=""></span></span><span class="t s2_2 f0" data-dcnode-id="2273" data-oc="true" id="t9_2"><span data-dcnode-id="2274" instrument_node="">Mutual respect among states. </span></span><span class="t s2_2 f0" data-dcnode-id="2271" data-oc="true" id="ta_2"><span data-dcnode-id="2272" instrument_node="">International Law as Legal System </span></span><span class="t s2_2 f0" data-dcnode-id="2269" data-oc="true" id="tb_2"><span data-dcnode-id="2270" instrument_node="">As opposed to national law, international law is its own legal system because of </span></span><span class="t s2_2 f0" data-dcnode-id="2267" data-oc="true" id="tc_2"><span data-dcnode-id="2268" instrument_node="">the following reasons: </span></span><span class="t s4_2 f0" data-dcnode-id="2265" data-oc="true" id="td_2"><span data-dcnode-id="2266" instrument_node=""></span></span><span class="t s2_2 f0" data-dcnode-id="2263" data-oc="true" id="te_2"><span data-dcnode-id="2264" instrument_node="">It has its own subjects. </span></span><span class="t s4_2 f0" data-dcnode-id="2261" data-oc="true" id="tf_2"><span data-dcnode-id="2262" instrument_node=""></span></span><span class="t s2_2 f0" data-dcnode-id="2259" data-oc="true" id="tg_2"><span data-dcnode-id="2260" instrument_node="">It has its own objects. </span></span><span class="t s4_2 f0" data-dcnode-id="2257" data-oc="true" id="th_2"><span data-dcnode-id="2258" instrument_node=""></span></span><span class="t s2_2 f0" data-dcnode-id="2255" data-oc="true" id="ti_2"><span data-dcnode-id="2256" instrument_node="">It has its own applicable laws. </span></span><span class="t s4_2 f0" data-dcnode-id="2253" data-oc="true" id="tj_2"><span data-dcnode-id="2254" instrument_node=""></span></span><span class="t s2_2 f0" data-dcnode-id="2251" data-oc="true" id="tk_2"><span data-dcnode-id="2252" instrument_node="">It has its own sphere of operation. </span></span><span class="t s2_2 f0" data-dcnode-id="2249" data-oc="true" id="tl_2"><span data-dcnode-id="2250" instrument_node="">Factors that have influenced the development of international law. </span></span><span class="t s2_2 f0" data-dcnode-id="2247" data-oc="true" id="tm_2"><span data-dcnode-id="2248" instrument_node="">1.</span></span><span class="t s2_2 f0" data-dcnode-id="2245" data-oc="true" id="tn_2"><span data-dcnode-id="2246" instrument_node="">Customs and Practices. </span></span><span class="t s2_2 f0" data-dcnode-id="2243" data-oc="true" id="to_2"><span data-dcnode-id="2244" instrument_node="">They have played a critical role in the development of international law. The </span></span><span class="t s2_2 f0" data-dcnode-id="2241" data-oc="true" id="tp_2"><span data-dcnode-id="2242" instrument_node="">customs and practices of states have been reduced into law through treaty. </span></span><span class="t s2_2 f0" data-dcnode-id="2239" data-oc="true" id="tq_2"><span data-dcnode-id="2240" instrument_node="">Different areas of international law have developed through the different </span></span><span class="t s2_2 f0" data-dcnode-id="2237" data-oc="true" id="tr_2"><span data-dcnode-id="2238" instrument_node="">practices that states have had over the years. </span></span><span class="t s4_2 f0" data-dcnode-id="2235" data-oc="true" id="ts_2"><span data-dcnode-id="2236" instrument_node=""></span></span><span class="t s5_2 f0" data-dcnode-id="2233" data-oc="true" id="tt_2"><span data-dcnode-id="2234" instrument_node="">Diplomacy</span></span><span class="t s2_2 f0" data-dcnode-id="2231" data-oc="true" id="tu_2"><span data-dcnode-id="2232" instrument_node="">: this has developed from the custom of sending messengers </span></span><span class="t s2_2 f0" data-dcnode-id="2229" data-oc="true" id="tv_2"><span data-dcnode-id="2230" instrument_node="">to different states and the practice was mutually accepted that you do </span></span><span class="t s2_2 f0" data-dcnode-id="2227" data-oc="true" id="tw_2"><span data-dcnode-id="2228" instrument_node="">not harm a messenger. This led to the two important conventions on </span></span><span class="t s2_2 f0" data-dcnode-id="2225" data-oc="true" id="tx_2"><span data-dcnode-id="2226" instrument_node="">diplomacy i.e. Vienna Convention on Diplomatic Relations (VCDR) and </span></span><span class="t s2_2 f0" data-dcnode-id="2223" data-oc="true" id="ty_2"><span data-dcnode-id="2224" instrument_node="">Vienna Convention on Consular Relations (VCCR). </span></span><span class="t s4_2 f0" data-dcnode-id="2221" data-oc="true" id="tz_2"><span data-dcnode-id="2222" instrument_node=""></span></span><span class="t s5_2 f0" data-dcnode-id="2219" data-oc="true" id="t10_2"><span data-dcnode-id="2220" instrument_node="">Humanitarian law</span></span><span class="t s2_2 f0" data-dcnode-id="2217" data-oc="true" id="t11_2"><span data-dcnode-id="2218" instrument_node="">: this was after the 2</span></span><span class="t s6_2 f0" data-dcnode-id="2215" data-oc="true" id="t12_2"><span data-dcnode-id="2216" instrument_node="">nd</span></span><span class="t s2_2 f0" data-dcnode-id="2213" data-oc="true" id="t13_2"><span data-dcnode-id="2214" instrument_node="">world war where countries </span></span><span class="t s2_2 f0" data-dcnode-id="2211" data-oc="true" id="t14_2"><span data-dcnode-id="2212" instrument_node="">came together and decided that there would never be such war ever </span></span><span class="t s2_2 f0" data-dcnode-id="2209" data-oc="true" id="t15_2"><span data-dcnode-id="2210" instrument_node="">again due to the atrocities that had been committed to the human race. </span></span></div></div></div><div class="paywall-part-unsplit-bottom unsplit-bottom" data-dcnode-id="2177" data-oc="true" style="position:absolute;top:0"><div data-block="true" data-dcnode-id="2178" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;class&quot;:&quot;ch-page-slice lazyload&quot;,&quot;style&quot;:&quot;width: 640px; height: 829px; background-image: url(data:image/gif;ba  class="t s3_4 f1" data-dcnode-id="2077" data-oc="true" id="t7_4"><span data-dcnode-id="2078" instrument_node="">dispute is brought before the ICJ it shall in accordance with international law </span></span><span class="t s3_4 f1" data-dcnode-id="2075" data-oc="true" id="t8_4"><span data-dcnode-id="2076" instrument_node="">apply: </span></span><span class="t s3_4 f1" data-dcnode-id="2073" data-oc="true" id="t9_4"><span data-dcnode-id="2074" instrument_node="">1.</span></span><span class="t s3_4 f1" data-dcnode-id="2071" data-oc="true" id="ta_4"><span data-dcnode-id="2072" instrument_node="">International conventions </span></span><span class="t s3_4 f1" data-dcnode-id="2069" data-oc="true" id="tb_4"><span data-dcnode-id="2070" instrument_node="">2.</span></span><span class="t s3_4 f1" data-dcnode-id="2067" data-oc="true" id="tc_4"><span data-dcnode-id="2068" instrument_node="">International customs </span></span><span class="t s3_4 f1" data-dcnode-id="2065" data-oc="true" id="td_4"><span data-dcnode-id="2066" instrument_node="">3.</span></span><span class="t s3_4 f1" data-dcnode-id="2063" data-oc="true" id="te_4"><span data-dcnode-id="2064" instrument_node="">Writings of renowned publicists </span></span><span class="t s3_4 f1" data-dcnode-id="2061" data-oc="true" id="tf_4"><span data-dcnode-id="2062" instrument_node="">4.</span></span><span class="t s3_4 f1" data-dcnode-id="2059" data-oc="true" id="tg_4"><span data-dcnode-id="2060" instrument_node="">General principles of </span></span><span class="t s3_4 f1" data-dcnode-id="2057" data-oc="true" id="th_4"><span data-dcnode-id="2058" instrument_node="">law </span></span><span class="t s3_4 f1" data-dcnode-id="2055" data-oc="true" id="ti_4"><span data-dcnode-id="2056" instrument_node="">5.</span></span><span class="t s3_4 f1" data-dcnode-id="2053" data-oc="true" id="tj_4"><span data-dcnode-id="2054" instrument_node="">Judicial Precedents </span></span><span class="t s3_4 f1" data-dcnode-id="2051" data-oc="true" id="t </span></span><span class="t s3_4 f1" data-dcnode-id="2029" data-oc="true" id="tv_4"><span data-dcnode-id="2030" instrument_node="">Long passage of duration of time </span></span><span class="t s3_4 f1" data-dcnode-id="2027" data-oc="true" id="tw_4"><span data-dcnode-id="2028" instrument_node="">2.</span></span><span class="t s3_4 f1" data-dcnode-id="2025" data-oc="true" id="tx_4"><span data-dcnode-id="2026" instrument_node="">Uniformity and constistency </span></span><span class="t s3_4 f1" data-dcnode-id="2023" data-oc="true" id="ty_4"><span data-dcnode-id="2024" instrument_node="">3.</span></span><span class="t s3_4 f1" data-dcnode-id="2021" data-oc="true" id="tz_4"><span data-dcnode-id="2022" instrument_node="">General practice or abstention from practice </span></span><span class="t s3_4 f1" data-dcnode-id="2019" data-oc="true" id="t10_4"><span data-dcnode-id="2020" instrument_node="">4.</span></span><span class="t s4_4 f1" data-dcnode-id="2017" data-oc="true" id="t11_4"><span data-dcnode-id="2018" instrument_node="">Opinion </span></span><span class="t s4_4 f1" data-dcnode-id="2015" data-oc="true" id="t12_4"><span data-dcnode-id="2016" instrument_node="">Juris’ –</span></span><span class="t s3_4 f1" data-dcnode-id="2013" data-oc="true" id="t13_4"><span data-dcnode-id="2014" instrument_node="">state practice amounts to a legal obligation </span></span><span class="t s3_4 f1" data-dcnode-id="2011" data-oc="true" id="t14_4"><span data-dcnode-id="2012" instrument_node="">The x-tics of long passage </span></span><span class="t s3_4 f1" data-dcnode-id="2009" data-oc="true" id="t15_4"><span data-dcnode-id="2010" instrument_node="">of duration of time is not absolute and hence </span></span><span class="t s3_4 f1" data-dcnode-id="2007" data-oc="true" id="t16_4"><span data-dcnode-id="2008" instrument_node="">there are exceptions :In relation to the exclusive economic zone which </span></span><span class="t s3_4 f1" data-dcnode-id="2005" data-oc="true" id="t17_4"><span nstrument_node="">same </span></span><span class="t s2_7 f3" data-dcnode-id="1706" data-oc="true" id="t19_7"><span data-dcnode-id="1707" instrument_node="">legal </span></span><span class="t s2_7 f3" data-dcnode-id="1704" data-oc="true" id="t1a_7"><span data-dcnode-id="1705" instrument_node="">system/universal legal order. </span></span></div></div></div></div><div data-dcnode-id="1699" data-oc="true" id="pg7" style="-webkit-user-select:none"></div></div></div></div></div><div class="Xqy1BD+0T09Cw6fk3wNMog==" data-dcnode-id="1596"><div data-dcnode-id="1597" data-html-viewer-page="8"><div data-block="true" data-dcnode-id="1598" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;id&quot;:&quot;html-prev-8&quot;,&quot;data-height&quot;:&quot;829&quot;,&quot;style&quot;:&quot;/* overflow: hidden; */position: relative;/* width: 640px; *//* height: 829px; */&quot;}}" data-props="{&quot;dataHeight&quot;:&quot;829&quot;}"><div data-dcnode-id="1599" data-testid="html-preview-wrapper" style="height:calc(829px * (var(--initial-viewer-width) / 640))"><div data-block="true" data-dcnode-id="1601" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;class&quot;:&quot;html-preview-text&quot;}}" data-props="{&quot;className&quot;:&quot;html-preview-text&quot;,&quot;testId&quot;:&quot;html-preview-text&quot;}"><div class="html-preview-text" data-dcnode-id="1602" data-testid="html-preview-text" style="transform:scale(calc( var(--initial-viewer-width) / 640));transform-origin:top left"><div class="unsplit-top-8-1" data-dcnode-id="1620" data-oc="true"><div data-block="true" data-dcnode-id="1621" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;class&quot;:&quot;ch-page-slice lazyload&quot;,&quot;style&quot;:&quot;width: 640px; height: 829px; background-image: url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==); background-position: 0 0;&quot;,&quot;data-bg&quot;:&quot;/doc-asset/bg/328ccc6560a059297cb07205344dfc6565dc225e/splits/v9.2/split-3-page-8-html-bg-unsplit.png&quot;}}" data-props="{&quot;className&quot;:&quot;ch-page-slice lazyload&quot;,&quot;style&quot;:{&quot;width&quot;:&quot;640px&quot;,&quot;height&quot;:&quot;829px&quot;,&quot;backgroundImage&quot;:&quot;url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==)&quot;,&quot;backgroundPosition&quot;:&quot;0 0&quot;},&quot;data-bg&quot;:&quot;/doc-asset/bg/328ccc6560a059297cb07205344dfc6565dc225e/splits/v9.2/split-3-page-8-html-bg-unsplit.png&quot;,&quot;altHeight&quot;:null}"><div class="ch-page-slice" data-dcnode-id="1622" data-page="7" style="width:640px;height:829px;background-image:url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==);background-position:0 0;overflow:hidden"><span class="t s1_8 f3" data-dcnode-id="1689" data-oc="true" id="t1_8"><span data-dcnode-id="1690" instrument_node="">PRINCIPLES OF INTERNATIONAL LAW </span></span><span class="t s1_8 f3" data-dcnode-id="1687" data-oc="true" id="t2_8"><span data-dcnode-id="1688" instrument_node="">DENNING OKATO </span></span><span class="t s2_8 f3" data-dcnode-id="1685" data-oc="true" id="t3_8"><span data-dcnode-id="1686" instrument_node="">However, international law is supreme even in the national law sphere. Article </span></span><span class="t s2_8 f3" data-dcnode-id="1683" data-oc="true" id="t4_8"><span data-dcnode-id="1684" instrument_node="">2(5)(6) CoK. Charpter 4 of CoK Bill of Rights). </span></span><span class="t s2_8 f3" data-dcnode-id="1681" data-oc="true" id="t5_8"><span data-dcnode-id="1682" instrument_node="">Followers of the monistic theory; </span></span><span class="t s3_8 f3" data-dcnode-id="1679" data-oc="true" id="t6_8"><span data-dcnode-id="1680" instrument_node="">Hans Kelsen </span></span><span class="t s4_8 f3" data-dcnode-id="1677" data-oc="true" id="t7_8"><span data-dcnode-id="1678" instrument_node="">–</span></span><span class="t s3_8 f3" data-dcnode-id="1675" data-oc="true" id="t8_8"><span data-dcnode-id="1676" instrument_node="">International law is the basic norm or the grund norm </span></span><span class="t s4_8 f3" data-dcnode-id="1673" data-oc="true" id="t9_8"><span data-dcnode-id="1674" instrument_node="">–</span></span><span class="t s3_8 f3" data-dcnode-id="1671" data-oc="true" id="ta_8"><span data-dcnode-id="1672" instrument_node="">national </span></span><span class="t s3_8 f3" data-dcnode-id="1669" data-oc="true" id="tb_8"><span data-dcnode-id="1670" instrument_node="">law develops from international law hence it is the one constituted with </span></span><span class="t s3_8 f3" data-dcnode-id="1667" data-oc="true" id="tc_8"><span data-dcnode-id="1668" instrument_node="">fundamental rights/norms which are universally recognized. </span></span><span class="t s3_8 f3" data-dcnode-id="1665" data-oc="true" id="td_8"><span data-dcnode-id="1666" instrument_node="">HerschLauterpacht </span></span><span class="t s3_8 f3" data-dcnode-id="1663" data-oc="true" id="te_8"><span data-dcnode-id="1664" instrument_node="">Monists hold that whenever there is a dispute between national law and </span></span><span class="t s3_8 f3" data-dcnode-id="1661" data-oc="true" id="tf_8"><span data-dcnode-id="1662" instrument_node="">international law, international law will prevail. </span></span><span class="t s2_8 f3" data-dcnode-id="1659" data-oc="true" id="tg_8"><span data-dcnode-id="1660" instrument_node="">The thinking of monists is based on the suspicion that states (municipal law) is </span></span><span class="t s2_8 f3" data-dcnode-id="1657" data-oc="true" id="th_8"><span data-dcnode-id="1658" instrument_node="">the greatest violators of human rights. Hence international law is best suited to </span></span><span class="t s2_8 f3" data-dcnode-id="1655" data-oc="true" id="ti_8"><span data-dcnode-id="1656" instrument_node="">protect human rights. </span></span><span class="t s5_8 f3" data-dcnode-id="1653" data-oc="true" id="tj_8"><span data-dcnode-id="1654" instrument_node="">Dualists </span></span><span class="t s2_8 f3" data-dcnode-id="1651" data-oc="true" id="tk_8"><span data-dcnode-id="1652" instrument_node="">International law and national law are two independent and separate legal </span></span><span class="t s2_8 f3" data-dcnode-id="1649" data-oc="true" id="tl_8"><span data-dcnode-id="1650" instrument_node="">systems. </span></span><span class="t s2_8 f3" data-dcnode-id="1647" data-oc="true" id="tm_8"><span data-dcnode-id="1648" instrument_node="">This theory is based on this: </span></span><span class="t s2_8 f3" data-dcnode-id="1645" data-oc="true" id="tn_8"><span data-dcnode-id="1646" instrument_node="">That international law is applicable between sovereign states. </span></span><span class="t s2_8 f3" data-dcnode-id="1643" data-oc="true" id="to_8"><span data-dcnode-id="1644" instrument_node="">That national law applies within a state to regulate the activities of citizens. </span></span><span class="t s2_8 f3" data-dcnode-id="1641" data-oc="true" id="tp_8"><span data-dcnode-id="1642" instrument_node="">Neither of the two legal systems has power to alter or create the rules of the </span></span><span class="t s2_8 f3" data-dcnode-id="1639" data-oc="true" id="tq_8"><span data-dcnode-id="1640" instrument_node="">other. </span></span><span class="t s2_8 f3" data-dcnode-id="1637" data-oc="true" id="tr_8"><span data-dcnode-id="1638" instrument_node="">In cases of a conflict between the two, a municipal court will apply municipal </span></span><span class="t s2_8 f3" data-dcnode-id="1635" data-oc="true" id="ts_8"><span data-dcnode-id="1636" instrument_node="">law at the national level, whereas at the international level, international law </span></span><span class="t s2_8 f3" data-dcnode-id="1633" data-oc="true" id="tt_8"><span data-dcnode-id="1634" instrument_node="">will apply. </span></span><span class="t s2_8 f3" data-dcnode-id="1631" data-oc="true" id="tu_8"><span data-dcnode-id="1632" instrument_node="">Proponents of this theory are: </span></span><span class="t s2_8 f3" data-dcnode-id="1629" data-oc="true" id="tv_8"><span data-dcnode-id="1630" instrument_node="">Triepel argues </span></span><span class="t s5_8 f3" data-dcnode-id="1627" data-oc="true" id="tw_8"><span data-dcnode-id="1628" instrument_node="">based on subjects,</span></span><span class="t s2_8 f3" data-dcnode-id="1625" data-oc="true" id="tx_8"><span data-dcnode-id="1626" instrument_node="">individuals are the subjects of national law </span></span><span class="t s2_8 f3" data-dcnode-id="1623" data-oc="true" id="ty_8"><span data-dcnode-id="1624" instrument_node="">while states are subjects of international law. Each binds their own subjects. </span></span></div></div></div><div class="unsplit-bottom" data-dcnode-id="1603" data-oc="true" style="position:absolute;top:0"><div data-block="true" data-dcnode-id="1604" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;class&quot;:&quot;ch-page-slice lazyload&quot;,&quot;style&quot;:&quot;width: 640px; height: 829px; background-image: url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==); background-position: 0 0;&quot;,&quot;data-bg&quot;:&quot;/doc-asset/bg/328ccc6560a059297cb07205344dfc6565dc225e/splits/v9.2/split-4-page-8-html-bg-unsplit.png&quot;}}" data-props="{&quot;className&quot;:&quot;ch-page-slice lazyload&quot;,&quot;style&quot;:{&quot;width&quot;:&quot;640px&quot;,&quot;height&quot;:&quot;829px&quot;,&quot;backgroundImage&quot;:&quot;url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==)&quot;,&quot;backgroundPosition&quot;:&quot;0 0&quot;},&quot;data-bg&quot;:&quot;/doc-asset/bg/328ccc6560a059297cb07205344dfc6565dc225e/splits/v9.2/split-4-page-8-html-bg-unsplit.png&quot;,&quot;altHeight&quot;:null}"><div class="ch-page-slice" data-dcnode-id="1605" data-page="7" style="width:640px;height:829px;background-image:url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==);background-position:0 0;overflow:hidden"><span class="t s2_8 f4" data-dcnode-id="1618" data-oc="true" id="tz_8"><span data-dcnode-id="1619" instrument_node="">Anzilotti argues </span></span><span class="t s5_8 f4" data-dcnode-id="1616" data-oc="true" id="t10_8"><span data-dcnode-id="1617" instrument_node="">based on fundamental principles</span></span><span class="t s2_8 f4" data-dcnode-id="1614" data-oc="true" id="t11_8"><span data-dcnode-id="1615" instrument_node="">by which each system is </span></span><span class="t s2_8 f4" data-dcnode-id="1612" data-oc="true" id="t12_8"><span data-dcnode-id="1613" instrument_node="">conditioned. He states that municipal law is conditioned by the fundamental </span></span><span class="t s2_8 f4" data-dcnode-id="1610" data-oc="true" id="t13_8"><span data-dcnode-id="1611" instrument_node="">principle or the grund norm (constitution) which is to be obeyed; international </span></span><span class="t s2_8 f4" data-dcnode-id="1608" data-oc="true" id="t14_8"><span data-dcnode-id="1609" instrument_node="">is conditioned by the principle of pacta sunt servanda (The agreement must be </span></span><span class="t s2_8 f4" data-dcnode-id="1606" data-oc="true" id="t15_8"><span data-dcnode-id="1607" instrument_node="">kept) i.e. treaties between states are to be observed in good faith. </span></span></div></div></div></div></div><div data-dcnode-id="1600" data-oc="true" id="pg8" style="-webkit-user-select:none"></div></div></div></div></div><div class="Xqy1BD+0T09Cw6fk3wNMog==" data-dcnode-id="1523"><div data-dcnode-id="1524" data-html-viewer-page="9"><div data-block="true" data-dcnode-id="1525" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;id&quot;:&quot;html-prev-9&quot;,&quot;data-height&quot;:&quot;829&quot;,&quot;style&quot;:&quot;/* overflow: hidden; */position: relative;/* width: 640px; *//* height: 829px; */&quot;}}" data-props="{&quot;dataHeight&quot;:&quot;829&quot;}"><div data-dcnode-id="1526" data-testid="html-preview-wrapper" style="height:calc(829px * (var(--initial-viewer-width) / 640))"><div data-block="true" data-dcnode-id="1528" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;class&quot;:&quot;html-preview-text&quot;}}" data-props="{&quot;className&quot;:&quot;html-preview-text&quot;,&quot;testId&quot;:&quot;html-preview-text&quot;}"><div class="html-preview-text" data-dcnode-id="1529" data-testid="html-preview-text" style="transform:scale(calc( var(--initial-viewer-width) / 640));transform-origin:top left"><div data-block="true" data-dcnode-id="1530" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;class&quot;:&quot;ch-page-slice lazyload&quot;,&quot;style&quot;:&quot;width: 640px; height: 829px; background-image: url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==); background-position: 0 0;&quot;,&quot;data-bg&quot;:&quot;/doc-asset/bg/328ccc6560a059297cb07205344dfc6565dc225e/splits/v9.2/split-4-page-9-html-bg-unsplit.png&quot;}}" data-props="{&quot;className&quot;:&quot;ch-page-slice lazyload&quot;,&quot;style&quot;:{&quot;width&quot;:&quot;640px&quot;,&quot;height&quot;:&quot;829px&quot;,&quot;backgroundImage&quot;:&quot;url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==)&quot;,&quot;backgroundPosition&quot;:&quot;0 0&quot;},&quot;data-bg&quot;:&quot;/doc-asset/bg/328ccc6560a059297cb07205344dfc6565dc225e/splits/v9.2/split-4-page-9-html-bg-unsplit.png&quot;,&quot;altHeight&quot;:null}"><div class="ch-page-slice" data-dcnode-id="1531" data-page="8" style="width:640px;height:829px;background-image:url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==);background-position:0 0;overflow:hidden"><span class="t s1_9 f4" data-dcnode-id="1590" data-oc="true" id="t1_9"><span data-dcnode-id="1591" instrument_node="">PRINCIPLES OF INTERNATIONAL LAW </span></span><span class="t s1_9 f4" data-dcnode-id="1588" data-oc="true" id="t2_9"><span data-dcnode-id="1589" instrument_node="">DENNING OKATO </span></span><span class="t s2_9 f4" data-dcnode-id="1586" data-oc="true" id="t3_9"><span data-dcnode-id="1587" instrument_node="">Consequently, the two legal systems are so distinct that a conflict between </span></span><span class="t s2_9 f4" data-dcnode-id="1584" data-oc="true" id="t4_9"><span data-dcnode-id="1585" instrument_node="">them is impossible. </span></span><span class="t s3_9 f4" data-dcnode-id="1582" data-oc="true" id="t5_9"><span data-dcnode-id="1583" instrument_node="">The third approach </span></span><span class="t s2_9 f4" data-dcnode-id="1580" data-oc="true" id="t6_9"><span data-dcnode-id="1581" instrument_node="">This approach holds that the two belong to separate legal systems and that </span></span><span class="t s2_9 f4" data-dcnode-id="1578" data-oc="true" id="t7_9"><span data-dcnode-id="1579" instrument_node="">each is superior in their own field. </span></span><span class="t s2_9 f4" data-dcnode-id="1576" data-oc="true" id="t8_9"><span data-dcnode-id="1577" instrument_node="">The debate as to which one is superior should not arise; the comparison has no </span></span><span class="t s2_9 f4" data-dcnode-id="1574" data-oc="true" id="t9_9"><span data-dcnode-id="1575" instrument_node="">validity at all. </span></span><span class="t s4_9 f4" data-dcnode-id="1572" data-oc="true" id="ta_9"><span data-dcnode-id="1573" instrument_node="">International law before national law </span></span><span class="t s5_9 f4" data-dcnode-id="1570" data-oc="true" id="tb_9"><span data-dcnode-id="1571" instrument_node="">Mwangi Patrick Githinji &amp; 14 Others vs IOM </span></span><span class="t s2_9 f4" data-dcnode-id="1568" data-oc="true" id="tc_9"><span data-dcnode-id="1569" instrument_node="">International Organization on Migration has a universal character. Employees </span></span><span class="t s2_9 f4" data-dcnode-id="1566" data-oc="true" id="td_9"><span data-dcnode-id="1567" instrument_node="">of IOM who were Kenyans were summarily dismissed and went to court to </span></span><span class="t s2_9 f4" data-dcnode-id="1564" data-oc="true" id="te_9"><span data-dcnode-id="1565" instrument_node="">petition the dismissal. The counsel of IOM raised a preliminary question that </span></span><span class="t s2_9 f4" data-dcnode-id="1562" data-oc="true" id="tf_9"><span data-dcnode-id="1563" instrument_node="">the courts in Kenya do not have jurisdiction over IOM i.e. IOM is immune from </span></span><span class="t s2_9 f4" data-dcnode-id="1560" data-oc="true" id="tg_9"><span data-dcnode-id="1561" instrument_node="">jurisdiction and would be based on the Vienna Convention Relating to </span></span><span class="t s2_9 f4" data-dcnode-id="1558" data-oc="true" id="th_9"><span data-dcnode-id="1559" instrument_node="">Representation of States to International Organizations of a universal </span></span><span class="t s2_9 f4" data-dcnode-id="1556" data-oc="true" id="ti_9"><span data-dcnode-id="1557" instrument_node="">character. This convention accords immunity to international organizations. </span></span><span class="t s2_9 f4" data-dcnode-id="1554" data-oc="true" id="tj_9"><span data-dcnode-id="1555" instrument_node="">The case suggests that where there is a conflict between national and </span></span><span class="t s2_9 f4" data-dcnode-id="1552" data-oc="true" id="tk_9"><span data-dcnode-id="1553" instrument_node="">international law; international law prevails in the area of </span></span><span class="t s3_9 f4" data-dcnode-id="1550" data-oc="true" id="tl_9"><span data-dcnode-id="1551" instrument_node="">diplomatic </span></span><span class="t s3_9 f4" data-dcnode-id="1548" data-oc="true" id="tm_9"><span data-dcnode-id="1549" instrument_node="">relations</span></span><span class="t s2_9 f4" data-dcnode-id="1546" data-oc="true" id="tn_9"><span data-dcnode-id="1547" instrument_node="">. The petition was dismissed. This case shows how Kenya relates to </span></span><span class="t s2_9 f4" data-dcnode-id="1544" data-oc="true" id="to_9"><span data-dcnode-id="1545" instrument_node="">international law. International organizations are not subject to laws of Kenya. </span></span><span class="t s5_9 f4" data-dcnode-id="1542" data-oc="true" id="tp_9"><span data-dcnode-id="1543" instrument_node="">Lockerbie Case </span></span><span class="t s2_9 f4" data-dcnode-id="1540" data-oc="true" id="tq_9"><span data-dcnode-id="1541" instrument_node="">Scotland wanted the Libyan suspects of Lockerbie to be extradited; Libya </span></span><span class="t s2_9 f4" data-dcnode-id="1538" data-oc="true" id="tr_9"><span data-dcnode-id="1539" instrument_node="">argued that it did not have extradition rules. The court held that the </span></span><span class="t s2_9 f4" data-dcnode-id="1536" data-oc="true" id="ts_9"><span data-dcnode-id="1537" instrument_node="">inadequacy of internal law cannot be a basis for non-compliance with </span></span><span class="t s2_9 f4" data-dcnode-id="1534" data-oc="true" id="tt_9"><span data-dcnode-id="1535" instrument_node="">international law. That the weakness of national law cannot be a basis of not </span></span><span class="t s2_9 f4" data-dcnode-id="1532" data-oc="true" id="tu_9"><span data-dcnode-id="1533" instrument_node="">complying with international law. </span></span></div></div></div></div><div data-dcnode-id="1527" data-oc="true" id="pg9" style="-webkit-user-select:none"></div></div></div></div></div><div class="Xqy1BD+0T09Cw6fk3wNMog==" data-dcnode-id="1447"><div data-dcnode-id="1448" data-html-viewer-page="10"><div data-block="true" data-dcnode-id="1449" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;id&quot;:&quot;html-prev-10&quot;,&quot;data-height&quot;:&quot;829&quot;,&quot;style&quot;:&quot;/* overflow: hidden; */position: relative;/* width: 640px; *//* height: 829px; */&quot;}}" data-props="{&quot;dataHeight&quot;:&quot;829&quot;}"><div data-dcnode-id="1450" data-testid="html-preview-wrapper" style="height:calc(829px * (var(--initial-viewer-width) / 640))"><div data-block="true" data-dcnode-id="1451" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;class&quot;:&quot;html-preview-text&quot;}}" data-props="{&quot;className&quot;:&quot;html-preview-text&quot;,&quot;testId&quot;:&quot;html-preview-text&quot;}"><div class="html-preview-text" data-dcnode-id="1452" data-testid="html-preview-text" style="transform:scale(calc( var(--initial-viewer-width) / 640));transform-origin:top left"><div class="unsplit-top-10-1" data-dcnode-id="1484" data-oc="true"><div data-block="true" data-dcnode-id="1485" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;class&quot;:&quot;ch-page-slice lazyload&quot;,&quot;style&quot;:&quot;width: 640px; height: 829px; background-image: url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==); background-position: 0 0;&quot;,&quot;data-bg&quot;:&quot;/doc-asset/bg/328ccc6560a059297cb07205344dfc6565dc225e/splits/v9.2/split-4-page-10-html-bg-unsplit.png&quot;}}" data-props="{&quot;className&quot;:&quot;ch-page-slice lazyload&quot;,&quot;style&quot;:{&quot;width&quot;:&quot;640px&quot;,&quot;height&quot;:&quot;829px&quot;,&quot;backgroundImage&quot;:&quot;url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==)&quot;,&quot;backgroundPosition&quot;:&quot;0 0&quot;},&quot;data-bg&quot;:&quot;/doc-asset/bg/328ccc6560a059297cb07205344dfc6565dc225e/splits/v9.2/split-4-page-10-html-bg-unsplit.png&quot;,&quot;altHeight&quot;:null}"><div class="ch-page-slice" data-dcnode-id="1486" data-page="9" style="width:640px;height:829px;background-image:url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==);background-position:0 0;overflow:hidden"><span class="t s1_10 f4" data-dcnode-id="1517" data-oc="true" id="t1_10"><span data-dcnode-id="1518" instrument_node="">PRINCIPLES OF INTERNATIONAL LAW </span></span><span class="t s1_10 f4" data-dcnode-id="1515" data-oc="true" id="t2_10"><span data-dcnode-id="1516" instrument_node="">DENNING OKATO </span></span><span class="t s2_10 f4" data-dcnode-id="1513" data-oc="true" id="t3_10"><span data-dcnode-id="1514" instrument_node="">Example - </span></span><span class="t s3_10 f4" data-dcnode-id="1511" data-oc="true" id="t4_10"><span data-dcnode-id="1512" instrument_node="">Post-election violence in Kenya not having laws on crimes against </span></span><span class="t s3_10 f4" data-dcnode-id="1509" data-oc="true" id="t5_10"><span data-dcnode-id="1510" instrument_node="">humanity was not liable, i.e. the perpetrators could not be charged under any </span></span><span class="t s3_10 f4" data-dcnode-id="1507" data-oc="true" id="t6_10"><span data-dcnode-id="1508" instrument_node="">law.</span></span><span class="t s4_10 f4" data-dcnode-id="1505" data-oc="true" id="t7_10"><span data-dcnode-id="1506" instrument_node="">Violation against human rights or crimes set out in the Rome statute </span></span><span class="t s4_10 f4" data-dcnode-id="1503" data-oc="true" id="t8_10"><span data-dcnode-id="1504" instrument_node="">Article 27 of Vienna Convention on the Law of Treaties 1969 </span></span><span class="t s3_10 f4" data-dcnode-id="1501" data-oc="true" id="t9_10"><span data-dcnode-id="1502" instrument_node="">Provides that the weakness or inadequacy of Municipal law cannot be a basis </span></span><span class="t s3_10 f4" data-dcnode-id="1499" data-oc="true" id="ta_10"><span data-dcnode-id="1500" instrument_node="">of non-compliance with international law. </span></span><span class="t s2_10 f4" data-dcnode-id="1497" data-oc="true" id="tb_10"><span data-dcnode-id="1498" instrument_node="">Alabama Arbitration Case (USA VS UK) </span></span><span class="t s3_10 f4" data-dcnode-id="1495" data-oc="true" id="tc_10"><span data-dcnode-id="1496" instrument_node="">Some vessels were constructed in the UK and left the shores of UK for US and </span></span><span class="t s3_10 f4" data-dcnode-id="1493" data-oc="true" id="td_10"><span data-dcnode-id="1494" instrument_node="">upon arrival they destroyed American vessels, the US went to court claiming </span></span><span class="t s3_10 f4" data-dcnode-id="1491" data-oc="true" id="te_10"><span data-dcnode-id="1492" instrument_node="">damages. The UK argued that it did not have laws to restrict ships from sailing </span></span><span class="t s3_10 f4" data-dcnode-id="1489" data-oc="true" id="tf_10"><span data-dcnode-id="1490" instrument_node="">from its shores; the court held that the inadequacy of internal law cannot be a </span></span><span class="t s3_10 f4" data-dcnode-id="1487" data-oc="true" id="tg_10"><span data-dcnode-id="1488" instrument_node="">basis of non-compliance with international law. </span></span></div></div></div><div class="unsplit-bottom" data-dcnode-id="1453" data-oc="true" style="position:absolute;top:0"><div data-block="true" data-dcnode-id="1454" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;class&quot;:&quot;ch-page-slice lazyload&quot;,&quot;style&quot;:&quot;width: 640px; height: 829px; background-image: url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==); background-position: 0 0;&quot;,&quot;data-bg&quot;:&quot;/doc-asset/bg/328ccc6560a059297cb07205344dfc6565dc225e/splits/v9.2/split-5-page-10-html-bg-unsplit.png&quot;}}" data-props="{&quot;className&quot;:&quot;ch-page-slice lazyload&quot;,&quot;style&quot;:{&quot;width&quot;:&quot;640px&quot;,&quot;height&quot;:&quot;829px&quot;,&quot;backgroundImage&quot;:&quot;url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==)&quot;,&quot;backgroundPosition&quot;:&quot;0 0&quot;},&quot;data-bg&quot;:&quot;/doc-asset/bg/328ccc6560a059297cb07205344dfc6565dc225e/splits/v9.2/split-5-page-10-html-bg-unsplit.png&quot;,&quot;altHeight&quot;:null}"><div class="ch-page-slice" data-dcnode-id="1455" data-page="9" style="width:640px;height:829px;background-image:url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==);background-position:0 0;overflow:hidden"><span class="t s4_10 f5" data-dcnode-id="1482" data-oc="true" id="th_10"><span data-dcnode-id="1483" instrument_node="">National law before international law. </span></span><span class="t s2_10 f5" data-dcnode-id="1480" data-oc="true" id="ti_10"><span data-dcnode-id="1481" instrument_node="">R v Okunda </span></span><span class="t s3_10 f5" data-dcnode-id="1478" data-oc="true" id="tj_10"><span data-dcnode-id="1479" instrument_node="">It was held that any law including the Official Secrets Act of East Africa which </span></span><span class="t s3_10 f5" data-dcnode-id="1476" data-oc="true" id="tk_10"><span data-dcnode-id="1477" instrument_node="">was contrary to Constitution of Kenya is null and void. It shows national law is </span></span><span class="t s3_10 f5" data-dcnode-id="1474" data-oc="true" id="tl_10"><span data-dcnode-id="1475" instrument_node="">superior to any other law. Article 2(4) CoK. </span></span><span class="t s4_10 f5" data-dcnode-id="1472" data-oc="true" id="tm_10"><span data-dcnode-id="1473" instrument_node="">How can international law become part of national law. </span></span><span class="t s5_10 f5" data-dcnode-id="1470" data-oc="true" id="tn_10"><span data-dcnode-id="1471" instrument_node="">Domestication. </span></span><span class="t s3_10 f5" data-dcnode-id="1468" data-oc="true" id="to_10"><span data-dcnode-id="1469" instrument_node="">Happens through specific means, either </span></span><span class="t s3_10 f5" data-dcnode-id="1466" data-oc="true" id="tp_10"><span data-dcnode-id="1467" instrument_node="">Doctrine of incorporation or doctrine of transformation. </span></span><span class="t s4_10 f5" data-dcnode-id="1464" data-oc="true" id="tq_10"><span data-dcnode-id="1465" instrument_node="">Doctrine of incorporation. </span></span><span class="t s3_10 f5" data-dcnode-id="1462" data-oc="true" id="tr_10"><span data-dcnode-id="1463" instrument_node="">It relates to international customs and provides that international law </span></span><span class="t s4_10 f5" data-dcnode-id="1460" data-oc="true" id="ts_10"><span data-dcnode-id="1461" instrument_node="">automatically</span></span><span class="t s3_10 f5" data-dcnode-id="1458" data-oc="true" id="tt_10"><span data-dcnode-id="1459" instrument_node="">becomes part of national law, either through declaration or a </span></span><span class="t s3_10 f5" data-dcnode-id="1456" data-oc="true" id="tu_10"><span data-dcnode-id="1457" instrument_node="">legal provision. Article 2(5)(6) CoK. </span></span></div></div></div></div></div></div></div></div></div><div class="Xqy1BD+0T09Cw6fk3wNMog==" data-dcnode-id="1387"><div data-dcnode-id="1388" data-html-viewer-page="11"><div data-block="true" data-dcnode-id="1389" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;id&quot;:&quot;html-prev-11&quot;,&quot;data-height&quot;:&quot;829&quot;,&quot;style&quot;:&quot;/* overflow: hidden; */position: relative;/* width: 640px; *//* height: 829px; */&quot;}}" data-props="{&quot;dataHeight&quot;:&quot;829&quot;}"><div data-dcnode-id="1390" data-testid="html-preview-wrapper" style="height:calc(829px * (var(--initial-viewer-width) / 640))"><div data-block="true" data-dcnode-id="1391" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;class&quot;:&quot;html-preview-text&quot;}}" data-props="{&quot;className&quot;:&quot;html-preview-text&quot;,&quot;testId&quot;:&quot;html-preview-text&quot;}"><div class="html-preview-text" data-dcnode-id="1392" data-testid="html-preview-text" style="transform:scale(calc( var(--initial-viewer-width) / 640));transform-origin:top left"><div data-block="true" data-dcnode-id="1393" data-originaltag="{&quot;tagName&quot;:&quot;div&quot;,&quot;attribs&quot;:{&quot;class&quot;:&quot;ch-page-slice lazyload&quot;,&quot;style&quot;:&quot;width: 640px; height: 829px; background-image: url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==); background-position: 0 0;&quot;,&quot;data-bg&quot;:&quot;/doc-asset/bg/328ccc6560a059297cb07205344dfc6565dc225e/splits/v9.2/split-5-page-11-html-bg-unsplit.png&quot;}}" data-props="{&quot;className&quot;:&quot;ch-page-slice lazyload&quot;,&quot;style&quot;:{&quot;width&quot;:&quot;640px&quot;,&quot;height&quot;:&quot;829px&quot;,&quot;backgroundImage&quot;:&quot;url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==)&quot;,&quot;backgroundPosition&quot;:&quot;0 0&quot;},&quot;data-bg&quot;:&quot;/doc-asset/bg/328ccc6560a059297cb07205344dfc6565dc225e/splits/v9.2/split-5-page-11-html-bg-unsplit.png&quot;,&quot;altHeight&quot;:null}"><div class="ch-page-slice" data-dcnode-id="1394" data-page="10" style="width:640px;height:829px;background-image:url(data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==);background-position:0 0;overflow:hidden"><span class="t s1_11 f5" data-dcnode-id="1441" data-oc="true" id="t1_11"><span data-dcnode-id="1442" instrument_node="">PRINCIPLES OF INTERNATIONAL LAW </span></span><span class="t s1_11 f5" data-dcnode-id="1439" data-oc="true" id="t2_11"><span data-dcnode-id="1440" instrument_node="">DENNING OKATO </span></span><span class="t s2_11 f5" data-dcnode-id="1437" data-oc="true" id="t3_11"><span data-dcnode-id="1438" instrument_node="">Doctrine of Transformation. </span></span><span class="t s3_11 f5" data-dcnode-id="1435" data-oc="true" id="t4_11"><span data-dcnode-id="1436" instrument_node="">Relates to international treaties which provide that international law can </span></span><span class="t s3_11 f5" data-dcnode-id="1433" data-oc="true" id="t5_11"><span data-dcnode-id="1434" instrument_node="">become part of national law through a </span></span><span class="t s2_11 f5" data-dcnode-id="1431" data-oc="true" id="t6_11"><span data-dcnode-id="1432" instrument_node="">special procedure</span></span><span class="t s3_11 f5" data-dcnode-id="1429" data-oc="true" id="t7_11"><span data-dcnode-id="1430" instrument_node="">which can be </span></span><span class="t s3_11 f5" data-dcnode-id="1427" data-oc="true" id="t8_11"><span data-dcnode-id="1428" instrument_node="">legislative. </span></span><span class="t s4_11 f5" data-dcnode-id="1425" data-oc="true" id="t9_11"><span data-dcnode-id="1426" instrument_node="">Examples are </span></span><span class="t s4_11 f5" data-dcnode-id="1423" data-oc="true" id="ta_11"><span data-dcnode-id="1424" instrument_node="">Rome Statute which is part of laws of Kenya through the International Crimes </span></span><span class="t s4_11 f5" data-dcnode-id="1421" data-oc="true" id="tb_11"><span data-dcnode-id="1422" instrument_node="">Act, </span></span><span class="t s4_11 f5" data-dcnode-id="1419" data-oc="true" id="tc_11"><span data-dcnode-id="1420" instrument_node="">The Vienna Convention on Diplomatic Relations of 1961 and the Vienna </span></span><span class="t s4_11 f5" data-dcnode-id="1417" data-oc="true" id="td_11"><span data-dcnode-id="1418" instrument_node="">Convention on Consular Relations of 1963 are part of laws of Kenya through the </span></span><span class="t s4_11 f5" data-dcnode-id="1415" data-oc="true" id="te_11"><span data-dcnode-id="1416" instrument_node="">enactment of Privileges and Immunities Act, </span></span><span class="t s4_11 f5" data-dcnode-id="1413" data-oc="true" id="tf_11"><span data-dcnode-id="1414" instrument_node="">The Geneva Convention relating to Status of Refugees of 1961 and OAU </span></span><span class="t s4_11 f5" data-dcnode-id="1411" data-oc="true" id="tg_11"><span data-dcnode-id="1412" instrument_node="">Convention relating to Status of Refugees of 1969 are now part of laws of Kenya </span></span><span class="t s4_11 f5" data-dcnode-id="1409" data-oc="true" id="th_11"><span data-dcnode-id="1410" instrument_node="">through the Refugee Act 2006. (The Refugee Bill 2019 currently in National </span></span><span class="t s4_11 f5" data-dcnode-id="1407" data-oc="true" id="ti_11"><span data-dcnode-id="1408" instrument_node="">Assembly) </span></span><span class="t s2_11 f5" data-dcnode-id="1405" data-oc="true" id="tj_11"><span data-dcnode-id="1406" instrument_node="">Task</span></span><span class="t s3_11 f5" data-dcnode-id="1403" data-oc="true" id="tk_11"><span data-dcnode-id="1404" instrument_node="">: Find out more examples of laws. </span></span><span class="t s5_11 f5" data-dcnode-id="1401" data-oc="true" id="tl_11"><span data-dcnode-id="1402" instrument_node="">Previously, the Executive made law without Parliament’s interference but</span></span><span class="t s3_11 f5" data-dcnode-id="1399" data-oc="true" id="tm_11"><span data-dcnode-id="1400" instrument_node="">after </span></span><span class="t s3_11 f5" data-dcnode-id="1397" data-oc="true" id="tn_11"><span data-dcnode-id="1398" instrument_node="">passage of Ratification of Treaties Bill, all treaties are now subjected to the </span></span><span class="t s3_11 f5" data-dcnode-id="1395" data-oc="true" id="to_11"><span data-dcnode-id="1396" instrument_node="">legislative process and public opinion before ratification. </span></span></div></div></div></div></div></div></div></div></div></div></div></div><div class="PKsSOxZfHPrRolS9QHBY3g==" data-dcnode-id="1367" data-testid="END_OF_PAGE_BLOCKER_TEST_ID"><div class="p4vs6RBTIFRJp8HGct6hGQ==" data-dcnode-id="1379"><i class="chi-lock-filled fa-lock2" data-dcnode-id="1382"></i><span class="mcSK1quDiK1Nqim+OPAjHg==" data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">End of preview. Want to read all 11 pages?</span></span></div><div class="XjsI6zapk6W5tvC9NxYvdg==" data-dcnode-id="1368"><div class="T1mNYBWxTxVkLlCjWUgNXQ==" data-dcnode-id="1369"><div class="ESRuCilwjTBQk0gh6ZCPtQ== _9lTx-FBEdmGStfe5FIAFig
