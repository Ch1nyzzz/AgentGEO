</span><p data-dcnode-id="1880" style="font-weight: 400;"><span data-dcnode-id="1881" instrument_node="">The International Institute of Humanitarian Law, through its Department of International Refugee Law and Migration Law, aims at enhancing the knowledge and skills of government and civil society officials engaged in work with people in need of protection. Through its training, capacity-building, and horizontal sharing of experiences, the Department advocates for the safeguarding of human rights in a way that complements and adds to the efforts of donors in the field of protection of refugees, internally displaced persons (IDPs), stateless people and migrants.</span></p><p data-dcnode-id="1875" style="font-weight: 400;"><span data-dcnode-id="1879" instrument_node="">As a result of the COVID-19 related travel restrictions, the Department’s training programme has been redesigned into an innovative digital format. The online courses are now hosted in the Institute’s&nbsp;</span><a data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elearning.iihl.org/"><span data-dcnode-id="1878" instrument_node="">Online Learning Platform</span></a><span data-dcnode-id="1876" instrument_node="">,&nbsp;customized according to the needs of our participants, to ensure a quality training experience.</span></p><span data-dcnode-id="1874" instrument_node=""> </span></div><span data-dcnode-id="1872" instrument_node="">
</span></div><span data-dcnode-id="1870" instrument_node="">
</span></div><span data-dcnode-id="1868" instrument_node="">
</span><div class="elementor-element elementor-element-5458972 elementor-widget elementor-widget-toggle" data-dcnode-id="1828" data-element_type="widget" data-id="5458972" data-widget_type="toggle.default"><span data-dcnode-id="1867" instrument_node="">

</span><div aria-controls="elementor-tab-content-8841" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1850" data-tab="1" id="elementor-tab-title-8841" role="tab"><span data-dcnode-id="1863" instrument_node="">

</span></span><span data-dcnode-id="1854" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//iihl.org/refugee-migration-department"><span data-dcnode-id="1853" instrument_node="">To find out more about the Online Courses, click here.  </span></a><span data-dcnode-id="1851" instrument_node="">
</span></div><span data-dcnode-id="1849" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-8841" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1836" data-tab="1" id="elementor-tab-content-8841" role="tabpanel"><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">The Online Courses are structured into different content-related modules, with the objective to provide an in-depth analysis of the subjects of the workshops, including cross-cutting issues. The Online Courses are delivered through a mix of theory and practice, aimed at facilitating the learning process and implementing the knowledge gained throughout the workshop.</span></p><p data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Modules are composed by live sessions (90 – 120 mins) and self-paced sessions. Each class is complemented by case studies and online exercises, which allows the expansion of the learning cycle beyond session hours. The high-level of interaction between facilitators and lecturers, and participants from different professional and geographical backgrounds – the very well-known distinctive mark of the Sanremo training programmes – is maintained through individual feedback that learners receive to their submissions and through Q&amp;A live and online sections, as well as dedicated activities. &nbsp;</span></p><p data-dcnode-id="1839"><span data-dcnode-id="1844" instrument_node="">Participants who attend the online courses are supported by an extensive&nbsp;</span><span data-dcnode-id="1841" style="text-decoration: underline;"><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlinelibrary.iihl.org/"><span data-dcnode-id="1843" instrument_node="">Online Resource Library</span></a></span><span data-dcnode-id="1840" instrument_node="">&nbsp;including international legal instruments, position papers, documents, and other background materials organized by topics covered during the different courses.</span></p><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Official certificates of completion of Online Courses are awarded by the Institute and have the same validity as the courses organized in our headquarters in Sanremo.&nbsp;</span></p></div><span data-dcnode-id="1835" instrument_node="">

</span><p data-dcnode-id="1724"><span data-dcnode-id="1737" instrument_node="">The courses on </span><strong data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">International Refugee Law (English, French, Spanish, Russian and Arabic)</span></strong><span data-dcnode-id="1734" instrument_node=""> present the key aspects of the international protection of refugees. The topics covered range from the analysis of International Refugee Law and its complementarity with other bodies of law to the different displacement phases and durable solutions. Additional refugee-related issues, such as the challenges faced by people displaced due to the effects of environmental changes, are further analysed in the context of the </span><strong data-dcnode-id="1729"><span data-dcnode-id="1733" instrument_node="">Thematic Course&nbsp;</span><b data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">on Climate Change and Forced Displacement </span></b><span data-dcnode-id="1730" instrument_node=""> (English)</span></strong><span data-dcnode-id="1728" instrument_node="">. The courses on </span><strong data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Teaching Refugee Law (English)</span></strong><span data-dcnode-id="1725" instrument_node="">, instead, explore the latest learning methodologies, with a focus in particular on the design and delivery of online training on Refugee Law. The delivery methodology of the courses includes a mix of theory and practice, including case studies based on real life situations.</span></p><span data-dcnode-id="1723" instrument_node=""> </span></div><span data-dcnode-id="1721" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1629"><span data-dcnode-id="1633" instrument_node="">
				The courses on</span><b data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node=""> Statelessness (English)</span></b><span data-dcnode-id="1630" instrument_node="">&nbsp;respond to the need of increased knowledge and capacity to prevent, reduce and resolve statelessness and to protect stateless persons worldwide. The curricula of the courses range from the adoption of the Statelessness international conventions and development of national legislation, to the work with stateless persons in the field. Besides the international legal framework related to nationality, the courses’ sessions analyse the causes and impacts of statelessness, the overview of stateless populations around the world, including stateless children, and the interrelation between statelessness and forced displacement. The courses also aims at promoting the use and the implementation of the United Nations High Commissioner for Refugees (UNHCR) Global Action Plan to End Statelessness as part of the #IBelong Campaign.					</span></div><span data-dcnode-id="1628" instrument_node="">

</span><p data-dcnode-id="1490"><span data-dcnode-id="1499" instrument_node="">The courses on </span><strong data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Internal Displacement (English, French and Spanish)</span></strong><span data-dcnode-id="1496" instrument_node=""> cover the key components of the protection of internally displaced persons (IDPs) throughout their displacement cycle. International norms underpinning the protection of IDPs, including the Guiding Principles on Internal Displacement and the Kampala Convention are analysed in the perspective of better understanding the causes and consequences of internal displacement, its current global trends, and the protection risks faced by individuals throughout their displacement cycle.&nbsp;</span><span data-dcnode-id="1494" style="color: var( --e-global-color-text ); font-family: var( --e-global-typography-text-font-family ), Sans-serif; font-weight: var( --e-global-typography-text-font-weight ); font-size: 0.875rem;"><span data-dcnode-id="1495" instrument_node="">Cross-cutting issues, such as housing, land and property, data collection, and the international community coordination mechanisms are also addressed.&nbsp;</span></span><span data-dcnode-id="1493" instrument_node="">The trainings ultimately explore the search for and implementation of durable solutions for IDPs and promote the recommendations of the UN Secretary-General’s High-Level Panel on Internal Displacement and Action Agenda on Internal Displacement.&nbsp;</span><span data-dcnode-id="1491" style="color: var( --e-global-color-text ); font-family: var( --e-global-typography-text-font-family ), Sans-serif; font-size: 0.875rem; font-weight: var( --e-global-typography-text-font-weight );"><span data-dcnode-id="1492" instrument_node="">The delivery methodology of the courses is highly participatory.&nbsp;</span></span></p><span data-dcnode-id="1489" instrument_node=""> </span></div><span data-dcnode-id="1487" instrument_node=" </span><p data-dcnode-id="1394"><span data-dcnode-id="1398" instrument_node="">The courses on </span><strong data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">International Migration Law (English, French and Spanish)</span></strong><span data-dcnode-id="1395" instrument_node=""> present the most relevant aspects of the migration phenomenon from different angles, including the obligations and concerns of States and the rights and responsibilities of migrants. The courses include an analysis of the international legal instruments that relate to migration, as well as the legal framework concerning other categories of persons in need of protection. The complex nature of today’s migratory phenomenon is analysed, including trends, causes, journeys and associated risks, integration in the country of destination, and return and reintegration in the country of origin. Key components of migration management and governance are highlighted, within the framework generated by the Global Compact for Safe, Orderly, and Regular Migration.</span></p><span data-dcnode-id="1393" instrument_node=""> </span></div><span data-dcnode-id="1391" instrument_node="">

</span><p data-dcnode-id="1255"><span data-dcnode-id="1262" instrument_node="">The recently developed courses on </span><strong data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Advocacy for Protection (English)</span></strong><span data-dcnode-id="1259" instrument_node=""> present the key elements for supporting the transformation of policies, services and public perceptions of refugees, internally displaced persons (IDPs), stateless people and migrants. To make sure that advocacy efforts are effective and sustainable, sessions focus on cross-cutting issues, such as awareness raising, media and journalism. Concurrently, the </span><strong data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Course on Refugee Law for Journalists (English)</span></strong><span data-dcnode-id="1256" instrument_node=""> highlights strategies and recommendations for inclusive media policies, which respect uprooted persons and impartially expose events to governments and publics at large, and also focuses on the correct terminology to employ when referring to refugees, and the situations they are confronted with. The delivery methodology of the courses is highly participatory.</span></p><span data-dcnode-id="1254" instrument_node=""> </span></div><span data-dcnode-id="1252" instrument_node="">
