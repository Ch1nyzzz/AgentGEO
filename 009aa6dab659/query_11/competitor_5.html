</span></p><p data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">Mesh technologies allow people to access any digital asset, regardless of where the asset is or where the person is. Because digital assets go beyond the firewall, especially when using cloud technologies and remote work, managers have to look for new approaches to cybersecurity, including mesh technologies. Gartner predicts that by 2025, the cybersecurity network will support more than half of digital access control requests.
</span></p><p data-dcnode-id="4495"><b data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">3. Lessons Learned</span></b><span data-dcnode-id="4496" instrument_node="">
</span></p><p data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">These technologies link the experience of customers, employees and users. Given that people's interaction is increasingly moving into the virtual sphere, companies absolutely need such tools. Gartner predicts that organizations providing generalized experience will be able to overtake competitors in key indicators within three years.
</span></p><span data-dcnode-id="4492" instrument_node="">
</span><div class="thumb tright floartoright 182" data-dcnode-id="4485" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4486" href="" style="width:202px;"><a class="new" data-dcnode-id="4490" rel="nofollow" title="File:It.business.and.office.work 200-1024x726.jpg"><span data-dcnode-id="4491" instrument_node="">File:It.business.and.office.work 200-1024x726.jpg</span></a><span data-dcnode-id="4489" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4487"><span data-dcnode-id="4488" instrument_node="">Gartner named the main IT trends in 2021: generalized experience, mesh network technology in cybersecurity, hyperautomatization</span></div></div></div><span data-dcnode-id="4484" instrument_node="">
</span><p data-dcnode-id="4480"><b data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">4. Intelligent Composite Business</span></b><span data-dcnode-id="4481" instrument_node="">
</span></p><p data-dcnode-id="4475"><span data-dcnode-id="4479" instrument_node="">Intelligent composite business means that applications and bundled business capabilities are considered as separate functional blocks available through </span><a class="mw-redirect" data-dcnode-id="4477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/API" title="API"><span data-dcnode-id="4478" instrument_node="">APIs</span></a><span data-dcnode-id="4476" instrument_node="">. They can be developed internally or provided by suppliers, and the new structure will combine the business capabilities of individual packages and databases. This approach will allow companies to quickly reconfigure their business.
</span></p><p data-dcnode-id="4471"><b data-dcnode-id="4473"><span data-dcnode-id="4474" instrument_node=""> 5. Hyper automation</span></b><span data-dcnode-id="4472" instrument_node="">
</span></p><p data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">Analysts note a huge demand for automation of repetitive manual processes and tasks. At the same time, companies are moving from automation of individual tasks to automation of processes with several tasks, as well as functional automation of several processes and even automation at the level of the business ecosystem.
</span></p><p data-dcnode-id="4465"><b data-dcnode-id="4467"><span data-dcnode-id="4468" instrument_node="">6. Always Available IT Operating Model</span></b><span data-dcnode-id="4466" instrument_node="">
</span></p><p data-dcnode-id="4460"><span data-dcnode-id="4464" instrument_node="">Analysts believe that the all-available operating model of IT will be another trend in 2021, as it frees employees and customers from the need to conduct business in a particular place. This model gained particular importance during the </span><a class="mw-redirect" data-dcnode-id="4462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/COVID-19" title="COVID-19"><span data-dcnode-id="4463" instrument_node="">pandemic</span></a><span data-dcnode-id="4461" instrument_node="">. Gartner predicts that by the end of 2023, 40% of organizations will apply a new model for virtual and physical interaction with customers and employees.
</span></p><p data-dcnode-id="4456"><b data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">7. Design of artificial intelligence systems</span></b><span data-dcnode-id="4457" instrument_node="">
</span></p><p data-dcnode-id="4451"><span data-dcnode-id="4455" instrument_node="">According to a Gartner study, only 53% of </span><a class="mw-redirect" data-dcnode-id="4453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AI" title="AI"><span data-dcnode-id="4454" instrument_node="">AI projects</span></a><span data-dcnode-id="4452" instrument_node=""> go from prototypes to production. Therefore, another trend will be to provide a reliable structure that will create the basis for the design, scaling and transition of new AI systems to production.
</span></p><span data-dcnode-id="4450" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4443" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4444" href="/images/8/8f/Shutterstock_1458581246.jpg" style="width:842px;"><a class="image" data-dcnode-id="4448"><img alt="" border="0" class="thumbimage" data-dcnode-id="4449" height="517" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/8/8f/Shutterstock_1458581246.jpg/840px-Shutterstock_1458581246.jpg&amp;raw" width="840"></a><span data-dcnode-id="4447" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4445"><span data-dcnode-id="4446" instrument_node="">Gartner named the main IT trends in 2021: distributed cloud, artificial intelligence system design, an all-available IT operating model</span></div></div></div><span data-dcnode-id="4442" instrument_node="">
</span><p data-dcnode-id="4438"><b data-dcnode-id="4440"><span data-dcnode-id="4441" instrument_node="">8. Distributed Cloud</span></b><span data-dcnode-id="4439" instrument_node="">
</span></p><p data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">This trend includes the distribution of public cloud services to various physical locations, in which the provider of this cloud is responsible for the operation, management and development of services. Gartner predicts that by 2025, most cloud service platforms will provide at least several distributed cloud services.
</span></p><p data-dcnode-id="4432"><b data-dcnode-id="4434"><span data-dcnode-id="4435" instrument_node="">9. Ensuring confidentiality</span></b><span data-dcnode-id="4433" instrument_node="">
</span></p><p data-dcnode-id="4426"><span data-dcnode-id="4431" instrument_node="">Data privacy is becoming a growing concern, and Gartner predicts that by 2025, half of large organizations will be implementing computing systems that ensure data privacy in unreliable environments.</span><sup class="reference" data-dcnode-id="4428" id="cite_ref-6"><a data-dcnode-id="4429" href="#cite_note-6" title=""><span data-dcnode-id="4430" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4427" instrument_node="">
</span></p><span data-dcnode-id="4425" instrument_node="">
</span><a data-dcnode-id="4424" id="Gartner_named_5_top_IT_trends_for_the_next_10_years" name="Gartner_named_5_top_IT_trends_for_the_next_10_years"></a><h3 data-dcnode-id="4420"><span data-dcnode-id="4423" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">Gartner named 5 top IT trends for the next 10 years</span></span></h3><span data-dcnode-id="4419" instrument_node="">
</span><p data-dcnode-id="4414"><span data-dcnode-id="4418" instrument_node="">At the end of August 2020, </span><a class="mw-redirect" data-dcnode-id="4416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AGartner" title="Gartner"><span data-dcnode-id="4417" instrument_node="">Gartner</span></a><span data-dcnode-id="4415" instrument_node=""> announced 5 main IT trends that will significantly affect business, society and every person in the next 5-10 years.
</span></p><p data-dcnode-id="4410"><b data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">1. Composite Business Architecture</span></b><span data-dcnode-id="4411" instrument_node="">
</span></p><p data-dcnode-id="4405"><span data-dcnode-id="4409" instrument_node="">Experts recommend that organizations switch to a more flexible composite business architecture. The modular business model is based on four main principles: modularity, efficiency, continuous improvement and adaptive innovation. This model allows organizations to move from rigid traditional planning to a flexible response to rapidly changing business needs. In general, it creates opportunities for the introduction of innovative approaches, reduces costs and improves partnerships. Other technologies to focus on in the new business model include "bundled" business services, data fabrics, private </span><a class="mw-redirect" data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/5G" title="5G"><span data-dcnode-id="4408" instrument_node="">5G networks</span></a><span data-dcnode-id="4406" instrument_node="">, and built-in AI.
</span></p><span data-dcnode-id="4404" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4397" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4398" href="/images/5/55/Zz0xZTMzMGUxNGRlNWQxMWVhYTYyMTBhMTMzNTllZGE5ZA==.png" style="width:842px;"><a class="image" data-dcnode-id="4402"><img alt="" border="0" class="thumbimage" data-dcnode-id="4403" height="799" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/5/55/Zz0xZTMzMGUxNGRlNWQxMWVhYTYyMTBhMTMzNTllZGE5ZA%253D%253D.png/840px-Zz0xZTMzMGUxNGRlNWQxMWVhYTYyMTBhMTMzNTllZGE5ZA%253D%253D.png&amp;raw" width="840"></a><span data-dcnode-id="4401" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4399"><span data-dcnode-id="4400" instrument_node="">Gartner Forecast for New Technologies</span></div></div></div><span data-dcnode-id="4396" instrument_node="">
</span><p data-dcnode-id="4392"><b data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">2. Traditimic Trust</span></b><span data-dcnode-id="4393" instrument_node="">
</span></p><p data-dcnode-id="4384"><span data-dcnode-id="4391" instrument_node="">Organizations can no longer fully trust governments, and algorithms take their place. Traditimic models of trust ensure the privacy and security of data, track their origin, and confirm the identity of people and things. Gartner believes that increased interest in </span><a data-dcnode-id="4389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Blockchain"><span data-dcnode-id="4390" instrument_node="">blockchain</span></a><span data-dcnode-id="4388" instrument_node=""> will lead to increased digital </span><a data-dcnode-id="4386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IB_-_Authentication" title="IB - Authentication"><span data-dcnode-id="4387" instrument_node="">authentication</span></a><span data-dcnode-id="4385" instrument_node=""> and verification capabilities. Among the technologies related to traditimic trust, analysts note secure access to services (SASE, Secure Access Service Edge), as well as responsible and understandable AI, that is, an algorithm with traceable stages.
</span></p><p data-dcnode-id="4380"><b data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">3. Technologies without silicon</span></b><span data-dcnode-id="4381" instrument_node="">
</span></p><p data-dcnode-id="4375"><span data-dcnode-id="4379" instrument_node="">Moore's law says the number of transistors in a dense integrated circuit will double every two years, but the technology is fast approaching the physical limits of silicon. As a result, new materials with advanced capabilities began to appear, which allow you to make technology more compact and faster. For example, DNA calculations use DNA and biochemical reactions instead of silicon or quantum architectures to perform calculations or </span><a class="new" data-dcnode-id="4377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DSHD%26action%3Dedit%26redlink%3D1" rel="nofollow" title="SHD (такой страницы не существует)"><span data-dcnode-id="4378" instrument_node="">store data</span></a><span data-dcnode-id="4376" instrument_node="">. Other technologies in this field include biodegradable carbon-based sensors and transistors.
</span></p><p data-dcnode-id="4371"><b data-dcnode-id="4373"><span data-dcnode-id="4374" instrument_node="">4. Generating AI</span></b><span data-dcnode-id="4372" instrument_node="">
</span></p><p data-dcnode-id="4366"><span data-dcnode-id="4370" instrument_node="">A shaping </span><a class="mw-redirect" data-dcnode-id="4368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AI" title="AI"><span data-dcnode-id="4369" instrument_node="">AI</span></a><span data-dcnode-id="4367" instrument_node=""> is a type of AI that can dynamically change to respond to a situation. There are many of its subtypes: from AI, which can dynamically adapt over time, to technologies that can create new models to solve specific problems. For example, a generative AI is a type of AI that can create new content (images, videos, etc.) or modify existing content. Other technologies include composite AI, differential privacy, "small data," and self-monitoring training.
</span></p><span data-dcnode-id="4365" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4358" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4359" href="/images/6/6c/Httpg.com_dam_613_0x0.jpg" style="width:842px;"><a class="image" data-dcnode-id="4363"><img alt="" border="0" class="thumbimage" data-dcnode-id="4364" height="560" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/6/6c/Httpg.com_dam_613_0x0.jpg/840px-Httpg.com_dam_613_0x0.jpg&amp;raw" width="840"></a><span data-dcnode-id="4362" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">In August 2020, Gartner named 5 top IT trends for the next 10 years</span></div></div></div><span data-dcnode-id="4357" instrument_node="">
</span><p data-dcnode-id="4353"><b data-dcnode-id="4355"><span data-dcnode-id="4356" instrument_node="">5. Digitalization of the individual</span></b><span data-dcnode-id="4354" instrument_node="">
</span></p><p data-dcnode-id="4344"><span data-dcnode-id="4352" instrument_node="">Technology is increasingly integrated with people, which means that there are more and more opportunities for creating digital versions of a person. These digital doubles of humans can exist in both physical and virtual space. For example, a two-way neurocomputer interface is a system created to exchange information between the brain and an electronic device, which can be a wearable device or implant for registering an electroencephalogram (EEG). They can be used for identification, access, payment, and immersive analytics. However, such an interface also represents an additional vulnerability that attackers can exploit. Other technologies include a "health passport" and </span><a data-dcnode-id="4350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ADigital_Twin_of_Organization_%28DTO%29" title="Digital Twin of Organization (DTO)"><span data-dcnode-id="4351" instrument_node="">digital doubles of a</span></a><span data-dcnode-id="4349" instrument_node=""> citizen.</span><sup class="reference" data-dcnode-id="4346" id="cite_ref-7"><a data-dcnode-id="4347" href="#cite_note-7" title=""><span data-dcnode-id="4348" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4345" instrument_node="">
</span></p><span data-dcnode-id="4343" instrument_node="">
</span><a data-dcnode-id="4342" id="Named_10_technologies_that_can_change_the_future" name="Named_10_technologies_that_can_change_the_future"></a><h3 data-dcnode-id="4338"><span data-dcnode-id="4341" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">Named 10 technologies that can change the future</span></span></h3><span data-dcnode-id="4337" instrument_node="">
</span><p data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">At the end of February 2020, MIT Technology Review published a list of ten technologies that will change the future in the coming years.
</span></p><p data-dcnode-id="4331"><b data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">1. Secure Internet</span></b><span data-dcnode-id="4332" instrument_node="">
</span></p><p data-dcnode-id="4326"><span data-dcnode-id="4330" instrument_node="">The quantum-based Internet should provide secure communications. The Delft University of Technology team is already building a network connecting four cities in the </span><a class="mw-redirect" data-dcnode-id="4328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Netherlands" title="Netherlands"><span data-dcnode-id="4329" instrument_node="">Netherlands that</span></a><span data-dcnode-id="4327" instrument_node=""> simply cannot be hacked. Scientists have learned to transmit pairs of photons over fiber optic cables in such a way as to completely protect the information encoded in them. The Chinese team used this technology to build a 2,000 km network highway between Beijing and Shanghai, but this project partially uses classic components that periodically disrupt quantum communication and pose a risk of hacking.
</span></p><span data-dcnode-id="4325" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4318" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4319" href="/images/1/13/Personal-medicine-jd.jpg" style="width:842px;"><a class="image" data-dcnode-id="4323"><img alt="" border="0" class="thumbimage" data-dcnode-id="4324" height="756" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/1/13/Personal-medicine-jd.jpg&amp;raw" width="840"></a><span data-dcnode-id="4322" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">New classes of drugs can be adapted to human genes, and such tools will give hope to people with very rare and previously incurable diseases caused by various DNA mutations</span></div></div></div><span data-dcnode-id="4317" instrument_node="">
</span><p data-dcnode-id="4311"><b data-dcnode-id="4313"><span data-dcnode-id="4316" instrument_node="">2. Hyperpersonalized </span><a class="new" data-dcnode-id="4314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DPharmaceuticals%2C_medicine%2C_healthcare%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Pharmaceuticals, medicine, healthcare (такой страницы не существует)"><span data-dcnode-id="4315" instrument_node="">medicine</span></a></b><span data-dcnode-id="4312" instrument_node="">
</span></p><p data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">Hyperpersonalized medicine is a single-patient genetic intervention. New classes of drugs can be adapted to human genes, and such tools will give hope to people with very rare and previously incurable diseases caused by various DNA mutations. Unfortunately, it is not yet clear who will be able to finance such research and development.
</span></p><p data-dcnode-id="4305"><b data-dcnode-id="4307"><span data-dcnode-id="4308" instrument_node="">3. Digital money</span></b><span data-dcnode-id="4306" instrument_node="">
</span></p><p data-dcnode-id="4288"><span data-dcnode-id="4304" instrument_node="">The less ordinary money is used, the less transactions occur without intermediaries. Meanwhile, digital currency technology could shake the global financial system. For example, Chinese leaders see a threat in </span><a class="mw-redirect" data-dcnode-id="4302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/To_cryptocurrency" title="To cryptocurrency"><span data-dcnode-id="4303" instrument_node="">to cryptocurrency</span></a><span data-dcnode-id="4301" instrument_node=""> </span><a data-dcnode-id="4299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AFacebook_Diem_cryptocurrency_%28formerly_Libra%29" title="Facebook Diem cryptocurrency (formerly Libra)"><span data-dcnode-id="4300" instrument_node="">Libra</span></a><span data-dcnode-id="4298" instrument_node=""> what they are preparing to release - </span><a class="mw-redirect" data-dcnode-id="4296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Facebook" title="Facebook"><span data-dcnode-id="4297" instrument_node="">Facebook</span></a><span data-dcnode-id="4295" instrument_node=""> its release can increase the already disproportionate impact on the </span><a class="mw-redirect" data-dcnode-id="4293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/USA" title="USA"><span data-dcnode-id="4294" instrument_node="">USA</span></a><span data-dcnode-id="4292" instrument_node=""> global financial system. Perhaps, in response </span><a class="mw-redirect" data-dcnode-id="4290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/China" title="China"><span data-dcnode-id="4291" instrument_node="">China</span></a><span data-dcnode-id="4289" instrument_node=""> , it will promote the digital yuan at the international level, but one way or another, the release of cryptocurrencies becomes a geopolitical event.
</span></p><p data-dcnode-id="4284"><b data-dcnode-id="4286"><span data-dcnode-id="4287" instrument_node="">4. Anti-aging drugs</span></b><span data-dcnode-id="4285" instrument_node="">
</span></p><p data-dcnode-id="4279"><span data-dcnode-id="4283" instrument_node="">The first anti-aging drugs, called senolytics, have already begun to be evaluated in humans. These drugs do not yet allow life to be prolonged, but can potentially cure certain diseases, including cancer, </span><a data-dcnode-id="4281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AHuman_Heart" title="Human Heart"><span data-dcnode-id="4282" instrument_node="">heart</span></a><span data-dcnode-id="4280" instrument_node=""> disease and dementia, slowing or reversing the fundamental processes of aging. These drugs destroy cells that accumulate with age -- they create low-level inflammation that suppresses normal cellular repair mechanisms and creates a toxic environment for neighboring cells. The results of the first clinical trials are expected in the second half of 2020.
</span></p><p data-dcnode-id="4275"><b data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">5. Drugs Detected by AI</span></b><span data-dcnode-id="4276" instrument_node="">
</span></p><p data-dcnode-id="4270"><span data-dcnode-id="4274" instrument_node="">The launch of a new drug on the market costs an average of about $2.5 billion. One of the reasons for this cost is the difficulty of finding promising molecules. However, </span><a class="mw-redirect" data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_learning" title="Machine learning"><span data-dcnode-id="4273" instrument_node="">machine learning</span></a><span data-dcnode-id="4271" instrument_node=""> tools can now investigate large databases of existing molecules and their properties, using the obtained information to assess the capabilities of potential drugs. This approach can significantly speed up and reduce the cost of finding new drug candidates.
</span></p><p data-dcnode-id="4266"><b data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">6. Satellite mega constellations</span></b><span data-dcnode-id="4267" instrument_node="">
</span></p><p data-dcnode-id="4255"><span data-dcnode-id="4265" instrument_node="">Now corporations can create, launch and operate tens of thousands of satellites in orbit at affordable prices at the same time. The first 120 </span><a class="new" data-dcnode-id="4263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DStarLink_%28Starlink%29_Moscow_ISP%26action%3Dedit%26redlink%3D1" rel="nofollow" title="StarLink (Starlink) Moscow ISP (такой страницы не существует)"><span data-dcnode-id="4264" instrument_node="">Starlink</span></a><span data-dcnode-id="4262" instrument_node=""> satellites were launched in 2019, and the company plans to launch batches of 60 satellites every two weeks, starting in January 2020. </span><a data-dcnode-id="4260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AOneWeb" title="OneWeb"><span data-dcnode-id="4261" instrument_node="">OneWeb</span></a><span data-dcnode-id="4259" instrument_node=""> will launch more than 30 satellites at the end of 2020. If these plans succeed, thousands of tandem satellites will soon be able to provide </span><a class="mw-redirect" data-dcnode-id="4257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet" title="Internet"><span data-dcnode-id="4258" instrument_node="">Internet</span></a><span data-dcnode-id="4256" instrument_node=""> access even to the poorest and most remote parts of the world. However, the collision of several satellites can lead to a serious disaster and turn the orbit around the Earth into a landfill.
</span></p><span data-dcnode-id="4254" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4247" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4248" href="/images/e/ee/Satelllitejd.jpg" style="width:842px;"><a class="image" data-dcnode-id="4252"><img alt="" border="0" class="thumbimage" data-dcnode-id="4253" height="795" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/e/ee/Satelllitejd.jpg&amp;raw" width="840"></a><span data-dcnode-id="4251" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4249"><span data-dcnode-id="4250" instrument_node="">Now corporations can create, launch and operate tens of thousands of satellites in orbit at affordable prices at the same time</span></div></div></div><span data-dcnode-id="4246" instrument_node="">
</span><p data-dcnode-id="4242"><b data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">7. Quantum superiority</span></b><span data-dcnode-id="4243" instrument_node="">
</span></p><p data-dcnode-id="4235"><a class="mw-redirect" data-dcnode-id="4240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Google" title="Google"><span data-dcnode-id="4241" instrument_node="">Google</span></a><span data-dcnode-id="4239" instrument_node=""> provided the first evidence that a quantum computer is superior to a classic computer. Thus, in the future, </span><a class="mw-redirect" data-dcnode-id="4237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Quantum_computers" title="Quantum computers"><span data-dcnode-id="4238" instrument_node="">quantum computers</span></a><span data-dcnode-id="4236" instrument_node=""> will be able to solve problems that no classical machine can cope with, for example, hacking modern cryptographic codes or modeling the exact behavior of molecules in order to identify new drugs and materials.
</span></p><p data-dcnode-id="4230"><span data-dcnode-id="4234" instrument_node="">However, Google only proved the fidelity of the concept, now the company's goal is to assemble machines with enough </span><a data-dcnode-id="4232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AQubit" title="Qubit"><span data-dcnode-id="4233" instrument_node="">qubits</span></a><span data-dcnode-id="4231" instrument_node=""> to solve useful problems. This is a difficult task, because the more qubits you have, the more difficult it is to maintain their quantum state.
</span></p><p data-dcnode-id="4226"><b data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">8. Small AI</span></b><span data-dcnode-id="4227" instrument_node="">
</span></p><p data-dcnode-id="4221"><span data-dcnode-id="4225" instrument_node="">In search of more powerful algorithms, researchers use more and more data and processing power, as well as rely on centralized cloud services. This limits the speed and privacy of </span><a class="mw-redirect" data-dcnode-id="4223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AI" title="AI"><span data-dcnode-id="4224" instrument_node="">AI</span></a><span data-dcnode-id="4222" instrument_node=""> applications. However, when using new generation AI chips, devices no longer need to transfer information to the cloud. Researchers promise to increase processing power with limited physical parameters, as well as train and run AI with much less energy.
</span></p><span data-dcnode-id="4220" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4213" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4214" href="/images/6/6f/Aijd.jpg" style="width:842px;"><a class="image" data-dcnode-id="4218"><img alt="" border="0" class="thumbimage" data-dcnode-id="4219" height="792" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/6/6f/Aijd.jpg&amp;raw" width="840"></a><span data-dcnode-id="4217" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">In search of more powerful algorithms, researchers use more data and processing power, and rely on centralized cloud services</span></div></div></div><span data-dcnode-id="4212" instrument_node="">
</span><p data-dcnode-id="4208"><b data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">9. Differential confidentiality</span></b><span data-dcnode-id="4209" instrument_node="">
</span></p><p data-dcnode-id="4203"><span data-dcnode-id="4207" instrument_node="">Differential privacy is a mathematical method that ensures the confidentiality of a lot of anonymized data by adding "noise." This method is already used by </span><a data-dcnode-id="4205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AApple" title="Apple"><span data-dcnode-id="4206" instrument_node="">Apple</span></a><span data-dcnode-id="4204" instrument_node=""> and Facebook to collect aggregate data without identifying specific users. This method allows you to point "distort" individual data so that it cannot be associated with a particular person, but allows you to save the general group indicators necessary for statistical calculations.
</span></p><p data-dcnode-id="4199"><b data-dcnode-id="4201"><span data-dcnode-id="4202" instrument_node="">10. Attribution of climate change</span></b><span data-dcnode-id="4200" instrument_node="">
</span></p><p data-dcnode-id="4193"><span data-dcnode-id="4198" instrument_node="">Obtaining detailed satellite data allows researchers to study natural systems, and increasing computing power means that they can create more accurate simulations and conduct many more virtual experiments. Recently, researchers confirmed the role of climate change in the development of extreme weather conditions and are now ready to talk about the risks that humanity may face in global warming.</span><sup class="reference" data-dcnode-id="4195" id="cite_ref-8"><a data-dcnode-id="4196" href="#cite_note-8" title=""><span data-dcnode-id="4197" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4194" instrument_node="">
</span></p><span data-dcnode-id="4192" instrument_node="">
</span><a data-dcnode-id="4191" id="IDC:_How_Coronavirus_Will_Help_the_IT_Industry" name="IDC:_How_Coronavirus_Will_Help_the_IT_Industry"></a><h3 data-dcnode-id="4187"><span data-dcnode-id="4190" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">IDC: How Coronavirus Will Help the IT Industry</span></span></h3><span data-dcnode-id="4186" instrument_node="">
</span><p data-dcnode-id="4175"><span data-dcnode-id="4185" instrument_node="">On February 16, 2020, </span><a class="mw-redirect" data-dcnode-id="4183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IDC" title="IDC"><span data-dcnode-id="4184" instrument_node="">IDC</span></a><span data-dcnode-id="4182" instrument_node=""> analysts published a study in which they reported that the outbreak of </span><a class="mw-redirect" data-dcnode-id="4180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Coronavirus" title="Coronavirus"><span data-dcnode-id="4181" instrument_node="">COVID-19 coronavirus</span></a><span data-dcnode-id="4179" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="4177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/China" title="China"><span data-dcnode-id="4178" instrument_node="">China</span></a><span data-dcnode-id="4176" instrument_node=""> not only undermines the global economy, but also can positively affect the development of the ICT industry and opens up new business opportunities for information and communication technology developers.
</span></p><p data-dcnode-id="4170"><span data-dcnode-id="4174" instrument_node="">In particular, the viral epidemic encourages governments to update their activities, moving towards smart and state-of-the-art technologies. This creates opportunities for the development of digital platforms and </span><a data-dcnode-id="4172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABig_Data" title="Big Data"><span data-dcnode-id="4173" instrument_node="">Big Data</span></a><span data-dcnode-id="4171" instrument_node=""> solutions.
</span></p><span data-dcnode-id="4169" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4162" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4163" href="/images/5/52/PrCHE46045120-F-1.jpg" style="width:842px;"><a class="image" data-dcnode-id="4167"><img alt="" border="0" class="thumbimage" data-dcnode-id="4168" height="473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/5/52/PrCHE46045120-F-1.jpg/840px-PrCHE46045120-F-1.jpg&amp;raw" width="840"></a><span data-dcnode-id="4166" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">According to IDC analysts, the outbreak of COVID-19 coronavirus will lead to five main changes in the Chinese economy: smarter government, decentralization of urban clusters, accelerated digital transformation in the healthcare system, accelerated introduction of contactless services and faster implementation of a strategy to turn China into a leader in the world supply channel</span></div></div></div><span data-dcnode-id="4161" instrument_node="">
</span><p data-dcnode-id="4156"><span data-dcnode-id="4160" instrument_node="">Also, the outbreak of cronovirus pushes for the creation </span><a class="mw-redirect" data-dcnode-id="4158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Smart_cities" title="Smart cities"><span data-dcnode-id="4159" instrument_node="">of smart cities</span></a><span data-dcnode-id="4157" instrument_node=""> and parks, contributing to the decentralization of management of urban clusters and, on the contrary, the centralization of individual cities.
</span></p><p data-dcnode-id="4148"><span data-dcnode-id="4155" instrument_node="">Other opportunities are related to </span><a class="mw-redirect" data-dcnode-id="4153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Health_care" title="Health care"><span data-dcnode-id="4154" instrument_node="">online health</span></a><span data-dcnode-id="4152" instrument_node=""> services, as the virus stimulates the acceleration of the digital transformation of </span><a class="mw-redirect" data-dcnode-id="4150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Health_care" title="Health care"><span data-dcnode-id="4151" instrument_node="">healthcare</span></a><span data-dcnode-id="4149" instrument_node=""> systems. 
</span></p><p data-dcnode-id="4140"><span data-dcnode-id="4147" instrument_node="">In addition, according to experts, new opportunities are being created for companies and services that offer employees remote work. Approaches are changing in </span><a class="mw-redirect" data-dcnode-id="4145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Education" title="Education"><span data-dcnode-id="4146" instrument_node="">education</span></a><span data-dcnode-id="4144" instrument_node="">: in case of mass diseases, people will strive for </span><a data-dcnode-id="4142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AOnline_Education_%28Global_Market%29" title="Online Education (Global Market)"><span data-dcnode-id="4143" instrument_node="">distance education</span></a><span data-dcnode-id="4141" instrument_node=""> and online courses.
</span></p><p data-dcnode-id="4132"><span data-dcnode-id="4139" instrument_node="">Opportunities for business development are provided by technology developers for stores where a minimum of staff is used or everything is absent, as well as Internet food delivery services and telecom operators at </span><a class="new" data-dcnode-id="4137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DConstruction_and_construction_materials_industry%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Construction and construction materials industry (такой страницы не существует)"><span data-dcnode-id="4138" instrument_node="">construction</span></a><span data-dcnode-id="4136" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/5G" title="5G"><span data-dcnode-id="4135" instrument_node="">5G</span></a><span data-dcnode-id="4133" instrument_node="">-nets and launching services based on them.
</span></p><span data-dcnode-id="4131" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4124" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4125" href="/images/e/ee/PrCHE46045120-F-3.jpg" style="width:842px;"><a class="image" data-dcnode-id="4129"><img alt="" border="0" class="thumbimage" data-dcnode-id="4130" height="473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/e/ee/PrCHE46045120-F-3.jpg/840px-PrCHE46045120-F-3.jpg&amp;raw" width="840"></a><span data-dcnode-id="4128" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">How Coronavirus Will Affect Chinese ICT Market, IDC Forecast</span></div></div></div><span data-dcnode-id="4123" instrument_node="">
</span><p data-dcnode-id="4118"><span data-dcnode-id="4122" instrument_node="">Finally, an outbreak of coronovirus is able to give a new round of development </span><a class="mw-redirect" data-dcnode-id="4120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Robots" title="Robots"><span data-dcnode-id="4121" instrument_node="">of robots</span></a><span data-dcnode-id="4119" instrument_node=""> for their use in supply control systems. Demand for industrial and service robots should grow, which, in turn, contributes to the development in China of a national strategy called China + 1. Within it, authorities and companies seek to restrain or reduce labor costs, including through the use of technological solutions.
</span></p><p data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">IDC analyst Lianfeng Wu recommends that vendors make full use of digital technologies to develop the capabilities and habits of remote interaction with customers and partners, implement effective marketing of online products and services, as well as proper control of costs and use of state support. Working in this direction, investing in promising business ideas and innovations, companies will be able to progress a lot and earn a lot after the epidemic ends, the expert said.
</span></p><p data-dcnode-id="4108"><span data-dcnode-id="4115" instrument_node="">Despite the prospects that the outbreak of coronavirus opens up for the ICT market, it has a gigantic negative impact on the global economy and China, in particular. So, according to IDC forecasts, the global difficulties that arose due to COVID-19 will lead to the fact that spending on information and communication technologies in China in the first quarter of 2020 will decrease by 10%. Sales of computers and smartphones will fall by 30%, </span><a class="mw-redirect" data-dcnode-id="4113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Smartphone" title="Smartphone"><span data-dcnode-id="4114" instrument_node="">servers</span></a><span data-dcnode-id="4112" instrument_node="">, network equipment and </span><a class="new" data-dcnode-id="4110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DSHD%26action%3Dedit%26redlink%3D1" rel="nofollow" title="SHD (такой страницы не существует)"><span data-dcnode-id="4111" instrument_node="">storage systems</span></a><span data-dcnode-id="4109" instrument_node=""> by 15%. The impact on the entire Celestial Empire will be huge, given that digital technology accounts for 37.8% of the local economy, analysts say.
</span></p><span data-dcnode-id="4107" instrument_node="">
</span><span data-dcnode-id="4106" instrument_node="">
</span><span data-dcnode-id="4105" instrument_node="">
</span><table data-dcnode-id="4082" style="margin:auto; border-collapse:collapse; background-color:#F9F9F9; border-style:none;"><tbody data-dcnode-id="4083"><tr data-dcnode-id="4084"><td data-dcnode-id="4099" style="width:30px; vertical-align:top; padding:8px;"><span data-dcnode-id="4104" instrument_node=""> </span><div class="img_path" data-dcnode-id="4101" href="/images/4/44/Aquote1.png" style="cursor: pointer;"><a class="image" data-dcnode-id="4102"><img alt="File:Aquote1.png" border="0" data-dcnode-id="4103" height="23" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/4/44/Aquote1.png&amp;raw" width="30"></a></div><span data-dcnode-id="4100" instrument_node="">
</span></td><td data-dcnode-id="4091" style="padding: 8px;"><span data-dcnode-id="4093" style="font-style:italic"><cite data-dcnode-id="4094"><span data-dcnode-id="4098" instrument_node="">The outbreak of COVID-19 will have an even greater impact on the general economy than the outbreak of SARS [SARS pneumonia - approx. TAdviser] in 2003, "says Kitty Fok, managing director of IDC China. - We expect that the impact will be significant in the first quarter, but will gradually decrease in subsequent quarters, and by the end of the year the impact on economic growth will be limited. The implications for the Chinese ICT market will also be more significant than in 2003, since the role of information and communication technologies was not the same as it is now.</span><sup class="reference" data-dcnode-id="4095" id="cite_ref-9"><a data-dcnode-id="4096" href="#cite_note-9" title=""><span data-dcnode-id="4097" instrument_node="">[10]</span></a></sup></cite></span><span data-dcnode-id="4092" instrument_node="">
</span></td><td data-dcnode-id="4085" style="width:30px; vertical-align:bottom; padding:8px;"><span data-dcnode-id="4090" instrument_node=""> </span><div class="img_path" data-dcnode-id="4087" href="/images/4/49/Aquote2.png" style="cursor: pointer;"><a class="image" data-dcnode-id="4088"><img alt="File:Aquote2.png" border="0" data-dcnode-id="4089" height="23" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/4/49/Aquote2.png&amp;raw" width="30"></a></div><span data-dcnode-id="4086" instrument_node="">
</span></td></tr></tbody></table><br data-dcnode-id="4081"><span data-dcnode-id="4080" instrument_node="">
</span><a data-dcnode-id="4079" id="2019" name="2019"></a><h2 data-dcnode-id="4075"><span data-dcnode-id="4078" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node=""> 2019 </span></span></h2><span data-dcnode-id="4074" instrument_node="">
</span><a data-dcnode-id="4073" id="Gartner:_10_trends_that_will_affect_IT_infrastructure_in_2020" name="Gartner:_10_trends_that_will_affect_IT_infrastructure_in_2020"></a><h3 data-dcnode-id="4069"><span data-dcnode-id="4072" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">Gartner: 10 trends that will affect IT infrastructure in 2020</span></span></h3><span data-dcnode-id="4068" instrument_node="">
</span><p data-dcnode-id="4060"><span data-dcnode-id="4067" instrument_node="">In mid-December 2019, the analytical company </span><a class="mw-redirect" data-dcnode-id="4065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AGartner" title="Gartner"><span data-dcnode-id="4066" instrument_node="">Gartner</span></a><span data-dcnode-id="4064" instrument_node=""> presented the main trends that will affect the </span><a class="mw-redirect" data-dcnode-id="4062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IT" title="IT"><span data-dcnode-id="4063" instrument_node="">IT infrastructure</span></a><span data-dcnode-id="4061" instrument_node=""> in 2020.
</span></p><p data-dcnode-id="4056"><b data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node=""> 1. Revising Automation Strategies</span></b><span data-dcnode-id="4057" instrument_node="">
</span></p><p data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">Despite the widespread introduction of automation, in many areas there is still no common update strategy. As a result, companies spend money on duplicating existing tools and processes, which hinders the effective scaling of the business. It is assumed that by 2025, company leaders will invest not just in automation, but in the development of general industry strategies for its implementation.
</span></p><span data-dcnode-id="4053" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4040" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4041" href="/images/2/25/Data_centre_mock.jpg" style="width:842px;"><a class="image" data-dcnode-id="4051"><img alt="" border="0" class="thumbimage" data-dcnode-id="4052" height="524" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/2/25/Data_centre_mock.jpg&amp;raw" width="840"></a><span data-dcnode-id="4050" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4042"><span data-dcnode-id="4049" instrument_node="">Analytics </span><a class="mw-redirect" data-dcnode-id="4047" title="Gartner"><span data-dcnode-id="4048" instrument_node="">Gartner</span></a><span data-dcnode-id="4046" instrument_node=""> presented major trends that will impact </span><a class="mw-redirect" data-dcnode-id="4044" title="IT"><span data-dcnode-id="4045" instrument_node="">IT infrastructure</span></a><span data-dcnode-id="4043" instrument_node=""> in 2020</span></div></div></div><span data-dcnode-id="4039" instrument_node="">
</span><p data-dcnode-id="4035"><b data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">2. Hybrid IT Infrastructure and Disaster Recovery Trust</span></b><span data-dcnode-id="4036" instrument_node="">
</span></p><p data-dcnode-id="4033"><span data-dcnode-id="4034" instrument_node="">Disaster recovery plans developed for traditional systems should be revised to take into account new hybrid IT infrastructures, otherwise the entire organization may be under attack, analysts warn. The sustainability requirements of the IT infrastructure should be evaluated during the design stages, and not be considered only after deployment. Given that many companies ignore these requirements, by 2021 most of them may have serious problems with the transition to hybrid cloud infrastructures.
</span></p><p data-dcnode-id="4029"><b data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">3. Flexible scaling DevOps</span></b><span data-dcnode-id="4030" instrument_node="">
</span></p><p data-dcnode-id="4024"><span data-dcnode-id="4028" instrument_node="">The vast majority of organizations that do not use joint self-service platforms may find in 2020 that their initiatives </span><a class="mw-redirect" data-dcnode-id="4026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/DevOps" title="DevOps"><span data-dcnode-id="4027" instrument_node="">DevOps</span></a><span data-dcnode-id="4025" instrument_node=""> simply do not scale. The common platform allows developers to use the full potential of digital tools with the ability to scale.
</span></p><p data-dcnode-id="4020"><b data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">4. Infrastructure Growth Planning</span></b><span data-dcnode-id="4021" instrument_node="">
</span></p><p data-dcnode-id="4006"><span data-dcnode-id="4019" instrument_node="">With the growing popularity of AI and </span><a class="mw-redirect" data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_learning" title="Machine learning"><span data-dcnode-id="4018" instrument_node="">machine learning</span></a><span data-dcnode-id="4016" instrument_node="">, organizations will have to think about how they will manage a powerful data flow. </span><a class="mw-redirect" data-dcnode-id="4014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IT_Infrastructure" title="IT Infrastructure"><span data-dcnode-id="4015" instrument_node="">Enterprise IT infrastructures</span></a><span data-dcnode-id="4013" instrument_node=""> are expected to use </span><a class="mw-redirect" data-dcnode-id="4011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Edge_computing" title="Edge computing"><span data-dcnode-id="4012" instrument_node="">peripheral</span></a><span data-dcnode-id="4010" instrument_node=""> computing rather than traditional data centers </span><a class="mw-redirect" data-dcnode-id="4008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Edge_computing" title="Edge computing"><span data-dcnode-id="4009" instrument_node="">by</span></a><span data-dcnode-id="4007" instrument_node=""> 2022, which will require a special approach to data protection.
</span></p><p data-dcnode-id="3996"><b data-dcnode-id="3998"><span data-dcnode-id="4005" instrument_node="">5. [[</span><a class="mw-redirect" data-dcnode-id="4003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet" title="Internet"><span data-dcnode-id="4004" instrument_node="">] Internet</span></a><span data-dcnode-id="4002" instrument_node=""> of Things (IoT) [[Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|[[Internet of things of Internet of Things (IoT)|</span><a class="new" data-dcnode-id="4000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DInternet_of_things_of_Internet_of_Things_%28IoT%29%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Internet of things of Internet of Things (IoT) (такой страницы не существует)"><span data-dcnode-id="4001" instrument_node="">|Internet of Things (IoT</span></a><span data-dcnode-id="3999" instrument_node="">)]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]]</span></b><span data-dcnode-id="3997" instrument_node="">
</span></p><p data-dcnode-id="3992"><a class="mw-redirect" data-dcnode-id="3994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IoT" title="IoT"><span data-dcnode-id="3995" instrument_node="">IoT</span></a><span data-dcnode-id="3993" instrument_node=""> devices should be flexible, since individual suppliers are unlikely to be able to provide each customer with a complete, comprehensive solution. Operation should be considered at the earliest stages of IoT planning to offer a specific service and support model in a scaling environment. This avoids the cascading effect of unexpected service interruptions.
</span></p><span data-dcnode-id="3991" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3984" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="3985" href="/images/2/26/IOT-ecosystem-1.png" style="width:842px;"><a class="image" data-dcnode-id="3989"><img alt="" border="0" class="thumbimage" data-dcnode-id="3990" height="554" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/2/26/IOT-ecosystem-1.png/840px-IOT-ecosystem-1.png&amp;raw" width="840"></a><span data-dcnode-id="3988" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">IoT devices must be flexible because individual vendors are unlikely to provide each customer with a complete, end-to-end solution</span></div></div></div><span data-dcnode-id="3983" instrument_node="">
</span><p data-dcnode-id="3979"><b data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">6. Distributed Cloud</span></b><span data-dcnode-id="3980" instrument_node="">
</span></p><p data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">Distributed clouds (that is, the distribution of public cloud services in different physical locations managed by one provider) will allow organizations to host public cloud services in the geographic region they want.
</span></p><p data-dcnode-id="3973"><b data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">7. Immersion experience</span></b><span data-dcnode-id="3974" instrument_node="">
</span></p><p data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">Continuous integration, quick response, and no downtime are no longer benefits, but new standards to meet. Analysts warn that dissatisfied customers will be able to seriously affect their corporate reputation.
</span></p><p data-dcnode-id="3967"><b data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">8. Democratization of IT</span></b><span data-dcnode-id="3968" instrument_node="">
</span></p><p data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">A visual approach to application development based on the maximum use of ready-made modules allows developers of any skill levels to create web and mobile applications with minimal programming experience.
</span></p><p data-dcnode-id="3961"><b data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">9. Network</span></b><span data-dcnode-id="3962" instrument_node="">
</span></p><p data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">Many teams have succeeded in providing highly accessible networks, but often such success is achieved through cautious change management. However, since 2020, network management has become increasingly challenging. Problems related to risk prevention and supplier blocking mean that some network teams will have a difficult period, analysts warn.
</span></p><p data-dcnode-id="3955"><b data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">10. Hybrid Digital Infrastructure (HDIM) Management</span></b><span data-dcnode-id="3956" instrument_node="">
</span></p><p data-dcnode-id="3949"><span data-dcnode-id="3954" instrument_node="">With the development of hybrid digital infrastructures, the need for their management is growing. This can be facilitated with specific HDIM tools, but analysts warn that you should not trust suppliers that offer a single solution for all problems.</span><sup class="reference" data-dcnode-id="3951" id="cite_ref-10"><a data-dcnode-id="3952" href="#cite_note-10" title=""><span data-dcnode-id="3953" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3950" instrument_node="">
</span></p><span data-dcnode-id="3948" instrument_node="">
</span><a data-dcnode-id="3947" id="10_trends_in_the_IT_market_in_2020" name="10_trends_in_the_IT_market_in_2020"></a><h3 data-dcnode-id="3943"><span data-dcnode-id="3946" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">10 trends in the IT market in 2020</span></span></h3><span data-dcnode-id="3942" instrument_node="">
</span><p data-dcnode-id="3934"><span data-dcnode-id="3941" instrument_node="">At the end of November 2019, the international research and </span><a class="new" data-dcnode-id="3939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DConsulting%2C_including_management_and_human_resources%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Consulting, including management and human resources (такой страницы не существует)"><span data-dcnode-id="3940" instrument_node="">consulting</span></a><span data-dcnode-id="3938" instrument_node=""> company </span><a class="mw-redirect" data-dcnode-id="3936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IDC" title="IDC"><span data-dcnode-id="3937" instrument_node="">IDC</span></a><span data-dcnode-id="3935" instrument_node=""> presented 10 forecasts for the development of the IT industry in 2020.
</span></p><p data-dcnode-id="3930"><b data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">1. Companies rush to innovation</span></b><span data-dcnode-id="3931" instrument_node="">
</span></p><p data-dcnode-id="3925"><span data-dcnode-id="3929" instrument_node="">By 2023, more than 50% of all </span><a class="new" data-dcnode-id="3927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DICT_Group_of_Companies%2C_ICT_Group_of_Companies%26action%3Dedit%26redlink%3D1" rel="nofollow" title="ICT Group of Companies, ICT Group of Companies (такой страницы не существует)"><span data-dcnode-id="3928" instrument_node="">ICT</span></a><span data-dcnode-id="3926" instrument_node=""> spending will go to digital transformation and innovation (for comparison, in 2018 this share amounted to 27%). Companies must develop a multi-year digital transformation plan and identify critical success factors to keep pace with the rest of the world.
</span></p><p data-dcnode-id="3921"><b data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">2. Using Cloud Services</span></b><span data-dcnode-id="3922" instrument_node="">
</span></p><p data-dcnode-id="3913"><span data-dcnode-id="3920" instrument_node="">To remain competitive, modern services must operate anywhere and anytime. By 2022, 70% of enterprises will introduce unified technologies, tools and processes of hybrid/ladder management. Organizations must prepare, prioritize </span><a class="mw-redirect" data-dcnode-id="3918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/SaaS" title="SaaS"><span data-dcnode-id="3919" instrument_node="">SaaS</span></a><span data-dcnode-id="3917" instrument_node="">-based offerings, identify key business metrics, and reintegrate the entire </span><a class="mw-redirect" data-dcnode-id="3915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IT" title="IT"><span data-dcnode-id="3916" instrument_node="">IT infrastructure</span></a><span data-dcnode-id="3914" instrument_node="">.
</span></p><span data-dcnode-id="3912" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3905" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="3906" href="/images/7/77/Clou12d.jpg" style="width:842px;"><a class="image" data-dcnode-id="3910"><img alt="" border="0" class="thumbimage" data-dcnode-id="3911" height="439" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/7/77/Clou12d.jpg/840px-Clou12d.jpg&amp;raw" width="840"></a><span data-dcnode-id="3909" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">Using Cloud Services</span></div></div></div><span data-dcnode-id="3904" instrument_node="">
</span><p data-dcnode-id="3898"><b data-dcnode-id="3900"><span data-dcnode-id="3903" instrument_node="">3. </span><a class="new" data-dcnode-id="3901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DPeripheral_Computing%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Peripheral Computing (такой страницы не существует)"><span data-dcnode-id="3902" instrument_node="">Peripheral Computing</span></a></b><span data-dcnode-id="3899" instrument_node="">
</span></p><p data-dcnode-id="3887"><span data-dcnode-id="3897" instrument_node="">By 2023, more than 50% of the corporate infrastructure will be deployed on peripheral devices, and not in </span><a data-dcnode-id="3895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/DPC" title="DPC"><span data-dcnode-id="3896" instrument_node="">data centers</span></a><span data-dcnode-id="3894" instrument_node=""> (in 2019, this figure is less than 10%). It is expected that by 2024 the number of applications with </span><a class="new" data-dcnode-id="3892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DPeripheral_computing%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Peripheral computing (такой страницы не существует)"><span data-dcnode-id="3893" instrument_node="">peripheral computing</span></a><span data-dcnode-id="3891" instrument_node=""> will increase by 800%. Companies will have to upgrade their </span><a class="mw-redirect" data-dcnode-id="3889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IT_Infrastructure" title="IT Infrastructure"><span data-dcnode-id="3890" instrument_node="">IT infrastructure</span></a><span data-dcnode-id="3888" instrument_node=""> to keep up with the times, as well as find new partners.
</span></p><p data-dcnode-id="3883"><b data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">4. Digital Innovation Plants</span></b><span data-dcnode-id="3884" instrument_node="">
</span></p><p data-dcnode-id="3878"><span data-dcnode-id="3882" instrument_node="">By 2025, almost two-thirds of enterprises will become </span><a data-dcnode-id="3880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ASoftware" title="Software"><span data-dcnode-id="3881" instrument_node="">software</span></a><span data-dcnode-id="3879" instrument_node=""> manufacturers. More than 90% of applications will become cloud-based, 80% of the code will come from external sources, and developers will be 1.6 times more than today. Business leaders are encouraged to invest in automation systems and engage with open source software communities. 
</span></p><p data-dcnode-id="3874"><b data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">5. Industrial Applications Boom</span></b><span data-dcnode-id="3875" instrument_node="">
</span></p><p data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">By 2023, more than 500 million digital applications and services will be developed and deployed using cloud technologies. Most will target industry. As new applications and services emerge, new minimum competitive requirements will emerge in each industry.
</span></p><span data-dcnode-id="3871" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3864" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="3865" href="/images/6/65/Shutterstock_668202985-1-e1522914189354.jpg" style="width:842px;"><a class="image" data-dcnode-id="3869"><img alt="" border="0" class="thumbimage" data-dcnode-id="3870" height="521" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/6/65/Shutterstock_668202985-1-e1522914189354.jpg/840px-Shutterstock_668202985-1-e1522914189354.jpg&amp;raw" width="840"></a><span data-dcnode-id="3868" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">Industrial Applications Boom</span></div></div></div><span data-dcnode-id="3863" instrument_node="">
</span><p data-dcnode-id="3859"><b data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">6. AI is inevitable</span></b><span data-dcnode-id="3860" instrument_node="">
</span></p><p data-dcnode-id="3848"><span data-dcnode-id="3858" instrument_node="">By 2025, 90% of new enterprise applications will use </span><a class="mw-redirect" data-dcnode-id="3856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AI" title="AI"><span data-dcnode-id="3857" instrument_node="">AI</span></a><span data-dcnode-id="3855" instrument_node="">. By 2024, more than 50% of interactions with the user interface will use </span><a class="mw-redirect" data-dcnode-id="3853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Computer_vision" title="Computer vision"><span data-dcnode-id="3854" instrument_node="">computer vision</span></a><span data-dcnode-id="3852" instrument_node="">, speech, natural language processing and </span><a data-dcnode-id="3850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AVirtual_Reality_%28VR%29" title="Virtual Reality (VR)"><span data-dcnode-id="3851" instrument_node="">augmented/virtual reality</span></a><span data-dcnode-id="3849" instrument_node=""> functions.
</span></p><p data-dcnode-id="3844"><b data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">7. Trust growth</span></b><span data-dcnode-id="3845" instrument_node="">
</span></p><p data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">By 2023, most organizations will build trust in the field of security, risks, compliance with regulatory requirements, confidentiality and ethical business transactions. Trust must become a fundamental concept for companies to remain competitive.
</span></p><p data-dcnode-id="3838"><b data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">8. Each enterprise is a platform</span></b><span data-dcnode-id="3839" instrument_node="">
</span></p><p data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">By 2023, 60% of large companies will be associated with the digital ecosystem of programmers and application developers. Half of these businesses will earn at least 20% of their revenue through their own digital ecosystem/platform.
</span></p><p data-dcnode-id="3832"><b data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">9. Cross-sectoral cooperation</span></b><span data-dcnode-id="3833" instrument_node="">
</span></p><p data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">By 2025, 20% of income growth will fall on proposals that combine digital services from previously unrelated industries. About 20% of partners will also come from new industries.
</span></p><p data-dcnode-id="3826"><b data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">10. Technological wars continue</span></b><span data-dcnode-id="3827" instrument_node="">
</span></p><p data-dcnode-id="3814"><span data-dcnode-id="3825" instrument_node="">By 2023, the market is consolidating around a small number of mega-platforms of cloud services, and five of them will cover at least 75% of the market share of </span><a class="mw-redirect" data-dcnode-id="3823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IaaS" title="IaaS"><span data-dcnode-id="3824" instrument_node="">IaaS</span></a><span data-dcnode-id="3822" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/PaaS" title="PaaS"><span data-dcnode-id="3821" instrument_node="">PaaS</span></a><span data-dcnode-id="3819" instrument_node="">. The top 10 suppliers of SaaS will receive on average almost 20% of the income from expanding their services. PaaS</span><sup class="reference" data-dcnode-id="3816" id="cite_ref-11"><a data-dcnode-id="3817" href="#cite_note-11" title=""><span data-dcnode-id="3818" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3815" instrument_node="">
</span></p><span data-dcnode-id="3813" instrument_node="">
</span><a data-dcnode-id="3812" id="Medvedev:_IT_monopolization_threatens_world" name="Medvedev:_IT_monopolization_threatens_world"></a><h3 data-dcnode-id="3808"><span data-dcnode-id="3811" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">Medvedev: IT monopolization threatens world</span></span></h3><span data-dcnode-id="3807" instrument_node="">
</span><p data-dcnode-id="3793"><span data-dcnode-id="3806" instrument_node="">The Prime Minister, </span><a class="mw-redirect" data-dcnode-id="3804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Russia" title="Russia"><span data-dcnode-id="3805" instrument_node="">Russia</span></a><span data-dcnode-id="3803" instrument_node=""> </span><a class="new" data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DDmitry_Anatolyevich_Medvedev%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Dmitry Anatolyevich Medvedev (такой страницы не существует)"><span data-dcnode-id="3802" instrument_node="">Dmitry Medvedev</span></a><span data-dcnode-id="3800" instrument_node=""> speaking at the business investment summit of the Association of Southeast Asian Nations (</span><a class="mw-redirect" data-dcnode-id="3798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Asia" title="Asia"><span data-dcnode-id="3799" instrument_node="">Asia</span></a><span data-dcnode-id="3797" instrument_node=""> ASEAN) in early November 2019, spoke about the global threat of monopolization in the field. </span><a class="new" data-dcnode-id="3795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DInformation_technology%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Information technology (такой страницы не существует)"><span data-dcnode-id="3796" instrument_node="">information technology</span></a><span data-dcnode-id="3794" instrument_node="">
</span></p><p data-dcnode-id="3785"><span data-dcnode-id="3792" instrument_node="">According to Medvedev, companies and entire countries are heavily dependent on hardware and </span><a class="new" data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DON%26action%3Dedit%26redlink%3D1" rel="nofollow" title="ON (такой страницы не существует)"><span data-dcnode-id="3791" instrument_node="">software</span></a><span data-dcnode-id="3789" instrument_node="">, most of which are produced by only a few corporations that dominate the market, </span><a class="mw-redirect" data-dcnode-id="3787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Russia_today" title="Russia today"><span data-dcnode-id="3788" instrument_node="">RIA Novosti</span></a><span data-dcnode-id="3786" instrument_node=""> reports.
</span></p><span data-dcnode-id="3784" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3777" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="3778" href="/images/b/ba/1043159519.jpg" style="width:842px;"><a class="image" data-dcnode-id="3782"><img alt="" border="0" class="thumbimage" data-dcnode-id="3783" height="454" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/b/ba/1043159519.jpg/840px-1043159519.jpg&amp;raw" width="840"></a><span data-dcnode-id="3781" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">Dmitry Medvedev, speaking at the business investment summit of the Association of Southeast Asian Nations (ASEAN) in early November 2019, spoke about the global threat of monopolization in the field of information technology</span></div></div></div><span data-dcnode-id="3776" instrument_node="">
</span><span data-dcnode-id="3775" instrument_node="">
</span><span data-dcnode-id="3774" instrument_node="">
</span><table data-dcnode-id="3754" style="margin:auto; border-collapse:collapse; background-color:#F9F9F9; border-style:none;"><tbody data-dcnode-id="3755"><tr data-dcnode-id="3756"><td data-dcnode-id="3768" style="width:30px; vertical-align:top; padding:8px;"><span data-dcnode-id="3773" instrument_node=""> </span><div class="img_path" data-dcnode-id="3770" href="/images/4/44/Aquote1.png" style="cursor: pointer;"><a class="image" data-dcnode-id="3771"><img alt="File:Aquote1.png" border="0" data-dcnode-id="3772" height="23" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/4/44/Aquote1.png&amp;raw" width="30"></a></div><span data-dcnode-id="3769" instrument_node="">
</span></td><td data-dcnode-id="3763" style="padding: 8px;"><span data-dcnode-id="3765" style="font-style:italic"><cite data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">This prevents both healthy competition and the introduction of new promising ideas. Russia advocates joint efforts to demonopolize this area, to develop competition in this area, to create new solutions in the field of software products, and in the field of technology, "Medvedev said.</span></cite></span><span data-dcnode-id="3764" instrument_node="">
</span></td><td data-dcnode-id="3757" style="width:30px; vertical-align:bottom; padding:8px;"><span data-dcnode-id="3762" instrument_node=""> </span><div class="img_path" data-dcnode-id="3759" href="/images/4/49/Aquote2.png" style="cursor: pointer;"><a class="image" data-dcnode-id="3760"><img alt="File:Aquote2.png" border="0" data-dcnode-id="3761" height="23" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/4/49/Aquote2.png&amp;raw" width="30"></a></div><span data-dcnode-id="3758" instrument_node="">
</span></td></tr></tbody></table><br data-dcnode-id="3753"><span data-dcnode-id="3752" instrument_node="">
</span><p data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">He noted that high technologies strengthen the socio-economic gap between countries, although at the same time they open up new opportunities.
