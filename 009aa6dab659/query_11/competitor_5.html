</span><a data-dcnode-id="5319" id="2021" name="2021"></a><h2 data-dcnode-id="5315"><span data-dcnode-id="5318" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="5316"><span data-dcnode-id="5317" instrument_node=""> 2021</span></span></h2><span data-dcnode-id="5314" instrument_node="">
</span><a data-dcnode-id="5313" id=".2A_Forrester_names_top_IT_market_trends_in_2022" name=".2A_Forrester_names_top_IT_market_trends_in_2022"></a><h3 data-dcnode-id="5309"><span data-dcnode-id="5312" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">Forrester names top IT market trends in 2022</span></span></h3><span data-dcnode-id="5308" instrument_node="">
</span><p data-dcnode-id="5303"><span data-dcnode-id="5307" instrument_node="">At the end of December 2021, </span><a data-dcnode-id="5305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AForrester" title="Forrester"><span data-dcnode-id="5306" instrument_node="">Forrester</span></a><span data-dcnode-id="5304" instrument_node=""> named the main trends in the IT market in 2022. 
</span></p><p data-dcnode-id="5299"><b data-dcnode-id="5301"><span data-dcnode-id="5302" instrument_node="">Role of Chief information officers</span></b><span data-dcnode-id="5300" instrument_node="">
</span></p><p data-dcnode-id="5297"><span data-dcnode-id="5298" instrument_node="">Reports show that leading tech executives will move from digital transformation to people-centered transformation. In 2022, future-oriented companies will think not only about digital transformation, but also implement initiatives that closely combine purchasing experience (CX) and employee experience (EX). In addition, 10% of technology leaders will also prioritize investments in strategic partnerships and innovative practices - 3 times more often than competitors.
</span></p><p data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">Forrester notes that IT companies face a 13.8% loss due to the lack of effective models for finding technical talent, which indicates a slow transition to talent strategies of the "future." Frustrated traditional companies will resort to higher wages to attract talent, while promising firms will use cloud and platform architectures and low-code solutions to reduce the need for the most advanced technical skills.
</span></p><p data-dcnode-id="5289"><b data-dcnode-id="5291"><a class="mw-redirect" data-dcnode-id="5293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cloud_computing" title="Cloud computing"><span data-dcnode-id="5294" instrument_node="">Cloud</span></a><span data-dcnode-id="5292" instrument_node=""> Solutions</span></b><span data-dcnode-id="5290" instrument_node="">
</span></p><p data-dcnode-id="5285"><a class="mw-redirect" data-dcnode-id="5287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/COVID-19" title="COVID-19"><span data-dcnode-id="5288" instrument_node="">The COVID-19</span></a><span data-dcnode-id="5286" instrument_node=""> coronavirus pandemic has led to the active use of corporate clouds as companies expand their digital presence and create new products. Companies are committed to increasing cloud efficiency, scalable solutions, and unique customization.
</span></p><span data-dcnode-id="5284" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5277" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="5278" href="/images/8/83/035809віаів60015776430232866.jpg" style="width:842px;"><a class="image" data-dcnode-id="5282"><img alt="" border="0" class="thumbimage" data-dcnode-id="5283" height="560" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/8/83/035809%25D0%25B2%25D1%2596%25D0%25B0%25D1%2596%25D0%25B260015776430232866.jpg/840px-035809%25D0%25B2%25D1%2596%25D0%25B0%25D1%2596%25D0%25B260015776430232866.jpg&amp;raw" width="840"></a><span data-dcnode-id="5281" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5279"><span data-dcnode-id="5280" instrument_node="">Forrester: by 2022, the implementation of container solutions will reach 50%,</span></div></div></div><span data-dcnode-id="5276" instrument_node="">
</span><p data-dcnode-id="5265"><span data-dcnode-id="5275" instrument_node="">Forrester predicts that container solutions will reach 50% by 2022, as cloud technology will be central to enterprise clouds. More importantly, businesses will refactored or overpatched their cloud strategies to base them on a native cloud environment rather than superimposing them on their existing solutions. Cloud technologies will go beyond all major technology areas, such as </span><a data-dcnode-id="5273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABig_Data" title="Article:Big Data"><span data-dcnode-id="5274" instrument_node="">big data</span></a><span data-dcnode-id="5272" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="5271" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="5269" instrument_node="">, and </span><a data-dcnode-id="5267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet_of_Things_%28IoT%29" title="Internet of Things (IoT)"><span data-dcnode-id="5268" instrument_node="">the Internet of Things</span></a><span data-dcnode-id="5266" instrument_node="">.
</span></p><p data-dcnode-id="5251"><span data-dcnode-id="5264" instrument_node="">Forrester notes that </span><a data-dcnode-id="5262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AGoogle_Cloud_Platform_%28GCP%29" title="Google Cloud Platform (GCP)"><span data-dcnode-id="5263" instrument_node="">Google Cloud Platform (GCP)</span></a><span data-dcnode-id="5261" instrument_node=""> will not achieve its short-term goals, but this does not matter. Since this solution lags far behind </span><a data-dcnode-id="5259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AAmazon_Web_Services_%28AWS%29" title="Amazon Web Services (AWS)"><span data-dcnode-id="5260" instrument_node="">AWS</span></a><span data-dcnode-id="5258" instrument_node=""> and </span><a data-dcnode-id="5256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AMicrosoft_Azure" title="Microsoft Azure"><span data-dcnode-id="5257" instrument_node="">Azure</span></a><span data-dcnode-id="5255" instrument_node="">, GCP could achieve great success by acquiring a large </span><a class="mw-redirect" data-dcnode-id="5253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/SaaS" title="SaaS"><span data-dcnode-id="5254" instrument_node="">SaaS</span></a><span data-dcnode-id="5252" instrument_node=""> platform.
</span></p><p data-dcnode-id="5247"><b data-dcnode-id="5249"><span data-dcnode-id="5250" instrument_node="">IoT Development</span></b><span data-dcnode-id="5248" instrument_node="">
</span></p><p data-dcnode-id="5239"><span data-dcnode-id="5246" instrument_node="">According to Forrester, the lack of chips will hinder the overall growth of the </span><a class="mw-redirect" data-dcnode-id="5244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IoT" title="IoT"><span data-dcnode-id="5245" instrument_node="">IoT</span></a><span data-dcnode-id="5243" instrument_node=""> market by 10-15%. The problem of lack of chips will not be solved until mid-2023, and IoT devices will suffer even more. Since many smart </span><a class="mw-redirect" data-dcnode-id="5241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IoT" title="IoT"><span data-dcnode-id="5242" instrument_node="">IoT</span></a><span data-dcnode-id="5240" instrument_node="">-based products, such as home appliances and cars, are not available to everyone or have too high a price, the demand for "less smart" equivalents will grow.
</span></p><span data-dcnode-id="5238" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5231" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="5232" href="/images/c/ca/Abc-editor_img-9294.jpg" style="width:842px;"><a class="image" data-dcnode-id="5236"><img alt="" border="0" class="thumbimage" data-dcnode-id="5237" height="559" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/c/ca/Abc-editor_img-9294.jpg/840px-Abc-editor_img-9294.jpg&amp;raw" width="840"></a><span data-dcnode-id="5235" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5233"><span data-dcnode-id="5234" instrument_node="">The problem of lack of chips will not be solved until mid-2023 - Forrester</span></div></div></div><span data-dcnode-id="5230" instrument_node="">
</span><p data-dcnode-id="5213"><span data-dcnode-id="5229" instrument_node="">Investments in smart infrastructure will grow by 40%, Forrester predicts. Relying on large government spending on intelligent infrastructure to facilitate recovery from the pandemic in the </span><a class="mw-redirect" data-dcnode-id="5227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/USA" title="USA"><span data-dcnode-id="5228" instrument_node="">US</span></a><span data-dcnode-id="5226" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/EU" title="EU"><span data-dcnode-id="5225" instrument_node="">EU</span></a><span data-dcnode-id="5223" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="5221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/China" title="China"><span data-dcnode-id="5222" instrument_node="">China</span></a><span data-dcnode-id="5220" instrument_node="">, city planners will prioritize initiatives that provide citizens with </span><a class="mw-redirect" data-dcnode-id="5218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet" title="Internet"><span data-dcnode-id="5219" instrument_node="">Internet</span></a><span data-dcnode-id="5217" instrument_node=""> connectivity, address public </span><a class="mw-redirect" data-dcnode-id="5215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Health_care" title="Health care"><span data-dcnode-id="5216" instrument_node="">health</span></a><span data-dcnode-id="5214" instrument_node=""> concerns, and manage critical resources.
</span></p><p data-dcnode-id="5207"><b data-dcnode-id="5209"><a class="mw-redirect" data-dcnode-id="5211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cyber_security" title="Cyber security"><span data-dcnode-id="5212" instrument_node="">Cybersecurity</span></a><span data-dcnode-id="5210" instrument_node="">, Risk, and Privacy</span></b><span data-dcnode-id="5208" instrument_node="">
</span></p><p data-dcnode-id="5202"><span data-dcnode-id="5206" instrument_node="">According to forecasts, one in ten experienced professionals in the field of </span><a class="mw-redirect" data-dcnode-id="5204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cyber_security" title="Cyber security"><span data-dcnode-id="5205" instrument_node="">cybersecurity</span></a><span data-dcnode-id="5203" instrument_node=""> will leave the industry. Before the pandemic, only 21% of security professionals were not going to quit their current jobs. However, data for 2021 show that 51% of cybersecurity professionals have experienced extreme stress or burnout over the past year. In addition, 65% say they thought about leaving work due to constant stress.
</span></p><p data-dcnode-id="5197"><span data-dcnode-id="5201" instrument_node="">According to Forrester, companies will include cyber insurance policies in contracts to offset third-party costs associated with violations. As new suppliers are engaged or contracts with existing third parties are extended, organizations will require a special cyber insurance policy that identifies them as beneficiaries in contracts with those partners in their ecosystems that, while a vital part of the </span><a data-dcnode-id="5199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/SCM" title="SCM"><span data-dcnode-id="5200" instrument_node="">supply chain</span></a><span data-dcnode-id="5198" instrument_node="">, do not meet their cybersecurity standards or refuse to provide sufficient certification.
</span></p><p data-dcnode-id="5193"><b data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">Bias Rewards, Circular Economics </span></b><span data-dcnode-id="5194" instrument_node="">
</span></p><p data-dcnode-id="5182"><span data-dcnode-id="5192" instrument_node="">At least five big companies will introduce bias rewards. These awards will allow users to identify bias in artificial intelligence systems. In 2022, large technology companies such as </span><a class="mw-redirect" data-dcnode-id="5190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Google" title="Google"><span data-dcnode-id="5191" instrument_node="">Google</span></a><span data-dcnode-id="5189" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Microsoft" title="Microsoft"><span data-dcnode-id="5188" instrument_node="">Microsoft</span></a><span data-dcnode-id="5186" instrument_node=""> will introduce grants for bias, as well as </span><a class="mw-redirect" data-dcnode-id="5184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Banks" title="Banks"><span data-dcnode-id="5185" instrument_node="">banks</span></a><span data-dcnode-id="5183" instrument_node=""> and medical companies to connect to such programs.
</span></p><span data-dcnode-id="5181" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5174" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="5175" href="/images/a/a5/Ekspert-autsorsing.1606151757-scaled.jpg" style="width:842px;"><a class="image" data-dcnode-id="5179"><img alt="" border="0" class="thumbimage" data-dcnode-id="5180" height="560" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/a/a5/Ekspert-autsorsing.1606151757-scaled.jpg/840px-Ekspert-autsorsing.1606151757-scaled.jpg&amp;raw" width="840"></a><span data-dcnode-id="5178" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5176"><span data-dcnode-id="5177" instrument_node="">Forrester: One in ten experienced cybersecurity professionals will leave the industry</span></div></div></div><span data-dcnode-id="5173" instrument_node="">
</span><p data-dcnode-id="5159"><span data-dcnode-id="5172" instrument_node="">Forrester predicts that Western brands will spend 2022 looking for new partners in China, in addition to </span><a class="mw-redirect" data-dcnode-id="5170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Alibaba" title="Alibaba"><span data-dcnode-id="5171" instrument_node="">Alibaba</span></a><span data-dcnode-id="5169" instrument_node=""> and </span><a data-dcnode-id="5167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AJD.com%2C_Inc." title="JD.com, Inc."><span data-dcnode-id="5168" instrument_node="">JD.com</span></a><span data-dcnode-id="5166" instrument_node="">, through companies such as </span><a data-dcnode-id="5164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3ADouyin" title="Douyin"><span data-dcnode-id="5165" instrument_node="">Douyin</span></a><span data-dcnode-id="5163" instrument_node="">, Little Red Book and </span><a data-dcnode-id="5161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AWeChat" title="WeChat"><span data-dcnode-id="5162" instrument_node="">WeChat</span></a><span data-dcnode-id="5160" instrument_node="">. This will allow them to establish more direct relations with consumers and sell goods directly.
</span></p><p data-dcnode-id="5147"><span data-dcnode-id="5158" instrument_node="">The circular economy will become a mandatory offer in 2022, according to analysts, and will become an incentive for intensive investment. Forrester data show that online consumers in the United States (41%), </span><a class="mw-redirect" data-dcnode-id="5156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/France" title="France"><span data-dcnode-id="5157" instrument_node="">France</span></a><span data-dcnode-id="5155" instrument_node=""> (60%) and the </span><a class="mw-redirect" data-dcnode-id="5153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Great_Britain" title="Great Britain"><span data-dcnode-id="5154" instrument_node="">UK</span></a><span data-dcnode-id="5152" instrument_node=""> (49%) prefer to buy environmentally friendly products. As the used goods market continues to gain popularity, investment in companies that can offer logistics-challenging offerings will increase.</span><sup class="reference" data-dcnode-id="5149" id="cite_ref-0"><a data-dcnode-id="5150" href="#cite_note-0" title=""><span data-dcnode-id="5151" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5148" instrument_node="">
</span></p><span data-dcnode-id="5146" instrument_node="">
</span><a data-dcnode-id="5145" id="IT_trends_that_should_not_be_expected_in_2022" name="IT_trends_that_should_not_be_expected_in_2022"></a><h3 data-dcnode-id="5141"><span data-dcnode-id="5144" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="5142"><span data-dcnode-id="5143" instrument_node="">IT trends that should not be expected in 2022</span></span></h3><span data-dcnode-id="5140" instrument_node="">
</span><p data-dcnode-id="5129"><span data-dcnode-id="5139" instrument_node="">In mid-December 2021, analysts at </span><a data-dcnode-id="5137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AABI_Research" title="ABI Research"><span data-dcnode-id="5138" instrument_node="">ABI Research</span></a><span data-dcnode-id="5136" instrument_node=""> published a study identifying trends that will shape the technology market in 2022, and trends that, although attracting a huge amount of speculation and commentary, are less likely to affect the technology market, among them </span><a class="mw-redirect" data-dcnode-id="5134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AMetaverse" title="Metaverse"><span data-dcnode-id="5135" instrument_node="">metaverse</span></a><span data-dcnode-id="5133" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Robots" title="Robots"><span data-dcnode-id="5132" instrument_node="">robot companions</span></a><span data-dcnode-id="5130" instrument_node="">.
</span></p><p data-dcnode-id="5127"><span data-dcnode-id="5128" instrument_node="">What will not happen in 2022?
</span></p><p data-dcnode-id="5123"><b data-dcnode-id="5125"><span data-dcnode-id="5126" instrument_node="">Metaverse will not appear fully formed</span></b><span data-dcnode-id="5124" instrument_node="">
</span></p><p data-dcnode-id="5121"><span data-dcnode-id="5122" instrument_node="">Despite all the announcements and investments, the metaverse will not appear in 2022 or, according to ABI Research, during a typical 5-year forecast window. The metaverse is still more of a fashionable word and vision than a formed end goal with a certain date of real full use. By the end of 2021, there are a number of technology companies creating their own version of the "metaverse," but this metaverse is not completely interconnected, does not yet widely use open standards and, of course, has not fully covered extended reality (XR) (some would also add cryptoeconomics to the list, this idea has not yet been implemented).
</span></p><span data-dcnode-id="5120" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5114" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="5115" href="/images/4/49/Virtual-reality_1.jpg" style="width:842px;"><a class="image" data-dcnode-id="5118"><img alt="" border="0" class="thumbimage" data-dcnode-id="5119" height="560" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/4/49/Virtual-reality_1.jpg/840px-Virtual-reality_1.jpg&amp;raw" width="840"></a><span data-dcnode-id="5117" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5116"></div></div></div><span data-dcnode-id="5113" instrument_node="">
</span><p data-dcnode-id="5109"><b data-dcnode-id="5111"><span data-dcnode-id="5112" instrument_node="">No boom in peripheral computing deployment </span></b><span data-dcnode-id="5110" instrument_node="">
</span></p><p data-dcnode-id="5102"><a class="mw-redirect" data-dcnode-id="5107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Edge_computing" title="Edge computing"><span data-dcnode-id="5108" instrument_node="">Peripheral computing</span></a><span data-dcnode-id="5106" instrument_node="">, both multi-access boundary computing (MEC) and common peripheral computing, will continue to increase in number of deployments. However, deployments in 2022 will be mostly critical, accomplished by the very first users, and not the beginning of the expected boom. Boundary computing options and financial viability are closely related to </span><a class="mw-redirect" data-dcnode-id="5104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/5G" title="5G"><span data-dcnode-id="5105" instrument_node="">5G</span></a><span data-dcnode-id="5103" instrument_node=""> cellular networks, both public and private. The availability of price-loyal 5G services, on which peripheral computing will develop, has not yet become a global reality. As a result, the implementation of peripheral computing will be slower than expected.
</span></p><p data-dcnode-id="5098"><b data-dcnode-id="5100"><span data-dcnode-id="5101" instrument_node="">Companion robots will not be widely used</span></b><span data-dcnode-id="5099" instrument_node="">
</span></p><p data-dcnode-id="5087"><span data-dcnode-id="5097" instrument_node="">After several years when leading social robotics companies either closed stores or refused their commercial offers, investment in this segment resumed in 2021, the potential of companion robots was also revised. The launch </span><a class="mw-redirect" data-dcnode-id="5095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Amazon" title="Amazon"><span data-dcnode-id="5096" instrument_node="">Amazon</span></a><span data-dcnode-id="5094" instrument_node=""> of its first social, </span><a data-dcnode-id="5092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ARobots_%28robotics%29" title="Robots (robotics)"><span data-dcnode-id="5093" instrument_node="">robot</span></a><span data-dcnode-id="5091" instrument_node=""> </span><a data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AAmazon_Astro" title="Amazon Astro"><span data-dcnode-id="5090" instrument_node="">Astro</span></a><span data-dcnode-id="5088" instrument_node=""> of course, attracted a lot of attention. However, despite the huge potential of social and related robotics, 2022 will not be the breakthrough year that the industry hopes for, despite the scale, prices and awareness that a player like Amazon can bring to the emerging technology market.
</span></p><span data-dcnode-id="5086" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5080" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="5081" href="/images/0/0d/Kuri-domashnij-robot-dlya-detej-ot-Pixar-Kuri-vzaimodejstvie-s-detmi.jpg" style="width:842px;"><a class="image" data-dcnode-id="5084"><img alt="" border="0" class="thumbimage" data-dcnode-id="5085" height="473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/0/0d/Kuri-domashnij-robot-dlya-detej-ot-Pixar-Kuri-vzaimodejstvie-s-detmi.jpg/840px-Kuri-domashnij-robot-dlya-detej-ot-Pixar-Kuri-vzaimodejstvie-s-detmi.jpg&amp;raw" width="840"></a><span data-dcnode-id="5083" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5082"></div></div></div><span data-dcnode-id="5079" instrument_node="">
</span><p data-dcnode-id="5075"><b data-dcnode-id="5077"><span data-dcnode-id="5078" instrument_node="">Sales volumes of new cars will not return to the previous indicators</span></b><span data-dcnode-id="5076" instrument_node="">
</span></p><p data-dcnode-id="5070"><span data-dcnode-id="5074" instrument_node="">The supply chain for the automotive industry remains unable to meet delayed demand due to a shortage of critical semiconductors. Reliance on outdated </span><a data-dcnode-id="5072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ASemiconductors_%28global_market%29" title="Semiconductors (global market)"><span data-dcnode-id="5073" instrument_node="">semiconductor</span></a><span data-dcnode-id="5071" instrument_node=""> manufacturing technologies with limited production capacity, patented designs and an opaque demand alert process has extended the semiconductor crisis in the automotive sector. There are no quick solutions for the problems that have been created for years. Thus, the consequences of the decision made by automakers in 2020 to cancel existing orders for semiconductors will continue after 2022. ABI Research does not expect sales of new cars to return to 90 million (the last time this figure was recorded in 2018) until 2023. 
</span></p><p data-dcnode-id="5066"><b data-dcnode-id="5068"><span data-dcnode-id="5069" instrument_node="">Lack of positive dynamics due to lack of semiconductors</span></b><span data-dcnode-id="5067" instrument_node="">
</span></p><p data-dcnode-id="5057"><span data-dcnode-id="5065" instrument_node="">Until 2023, according to ABI Research, the problem of a shortage of semiconductors will be solved, in particular, due to additional capacity, checking real demand (compared to panic double or triple orders) and inflationary impact on consumer spending on goods. Persistent risk factors include social/political risks and the ability to commission new production facilities on time, especially for vehicles and commercial vehicles with stringent design requirements. New strains of </span><a class="mw-redirect" data-dcnode-id="5063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/COVID-19" title="COVID-19"><span data-dcnode-id="5064" instrument_node="">COVID-19</span></a><span data-dcnode-id="5062" instrument_node=""> and their impact on low vaccination countries also play a role in solving this problem, including the possibility of staffing and transportation of finished products and semiconductor materials.</span><sup class="reference" data-dcnode-id="5059" id="cite_ref-1"><a data-dcnode-id="5060" href="#cite_note-1" title=""><span data-dcnode-id="5061" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5058" instrument_node="">
</span></p><span data-dcnode-id="5056" instrument_node="">
</span><a data-dcnode-id="5055" id="10_IDC_IT_Industry_Forecasts" name="10_IDC_IT_Industry_Forecasts"></a><h3 data-dcnode-id="5051"><span data-dcnode-id="5054" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="5052"><span data-dcnode-id="5053" instrument_node="">10 IDC IT Industry Forecasts</span></span></h3><span data-dcnode-id="5050" instrument_node="">
</span><p data-dcnode-id="5045"><span data-dcnode-id="5049" instrument_node="">In early November 2021, </span><a class="mw-redirect" data-dcnode-id="5047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IDC" title="IDC"><span data-dcnode-id="5048" instrument_node="">IDC</span></a><span data-dcnode-id="5046" instrument_node=""> research company announced forecasts for the development of the global IT industry for the 2022 and subsequent years. According to analysts, the modern world, of course, would not have become what people are used to seeing it if information technologies had not developed so rapidly. 
</span></p><p data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">By 2022, more than half of the global economy is expected to be based on or influenced by digital technologies, as most products and services will adopt a digital delivery model or need additional digitalization to remain competitive. According to researchers, business needs to give priority to investing in digital tools to expand physical assets. As a result, by 2024, more than half of all investments in IT solutions will be associated with digital transformation.
</span></p><span data-dcnode-id="5042" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5035" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="5036" href="/images/e/e9/Gartnerpredictstechonologytrends-1.jpg" style="width:842px;"><a class="image" data-dcnode-id="5040"><img alt="" border="0" class="thumbimage" data-dcnode-id="5041" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/e/e9/Gartnerpredictstechonologytrends-1.jpg/840px-Gartnerpredictstechonologytrends-1.jpg&amp;raw" width="840"></a><span data-dcnode-id="5039" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5037"><span data-dcnode-id="5038" instrument_node="">IDC named 10 top trends in the IT market in the coming years</span></div></div></div><span data-dcnode-id="5034" instrument_node="">
</span><span data-dcnode-id="5033" instrument_node="">
</span><span data-dcnode-id="5032" instrument_node="">
</span><table data-dcnode-id="5012" style="margin:auto; border-collapse:collapse; background-color:#F9F9F9; border-style:none;"><tbody data-dcnode-id="5013"><tr data-dcnode-id="5014"><td data-dcnode-id="5026" style="width:30px; vertical-align:top; padding:8px;"><span data-dcnode-id="5031" instrument_node=""> </span><div class="img_path" data-dcnode-id="5028" href="/images/4/44/Aquote1.png" style="cursor: pointer;"><a class="image" data-dcnode-id="5029"><img alt="File:Aquote1.png" border="0" data-dcnode-id="5030" height="23" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/4/44/Aquote1.png&amp;raw" width="30"></a></div><span data-dcnode-id="5027" instrument_node="">
</span></td><td data-dcnode-id="5021" style="padding: 8px;"><span data-dcnode-id="5023" style="font-style:italic"><cite data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">Digital technology has become a constant and dynamic element of our world, and the ICT industry itself will be one of the most transformative in the next few years. Chief information officers must build cohesive purchasing, development, and operations teams. These teams should follow "as a service" technology delivery models and focus on the end result, while the main challenge for IT providers will be to help companies share, use, manage and enhance the value of data, said Rick Villars, IDC's vice president of global research.</span></cite></span><span data-dcnode-id="5022" instrument_node="">
</span></td><td data-dcnode-id="5015" style="width:30px; vertical-align:bottom; padding:8px;"><span data-dcnode-id="5020" instrument_node=""> </span><div class="img_path" data-dcnode-id="5017" href="/images/4/49/Aquote2.png" style="cursor: pointer;"><a class="image" data-dcnode-id="5018"><img alt="File:Aquote2.png" border="0" data-dcnode-id="5019" height="23" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/4/49/Aquote2.png&amp;raw" width="30"></a></div><span data-dcnode-id="5016" instrument_node="">
</span></td></tr></tbody></table><br data-dcnode-id="5011"><span data-dcnode-id="5010" instrument_node="">
</span><p data-dcnode-id="5008"><span data-dcnode-id="5009" instrument_node="">According to analysts, the 10 most important IT forecasts are as follows:
</span></p><p data-dcnode-id="5003"><span data-dcnode-id="5007" instrument_node="">1. </span><b data-dcnode-id="5005"><span data-dcnode-id="5006" instrument_node="">Introducing a digital approach to customers and operations</span></b><span data-dcnode-id="5004" instrument_node="">: By 2024, companies that have switched to digital technologies will provide sensitive customer experience and sustainable operating models by transferring 70% of all technology and service costs to "as a service" and results-oriented models. This investment will be required to support a variety of customer engagement scenarios and data-driven operations.
</span></p><p data-dcnode-id="4998"><span data-dcnode-id="5002" instrument_node="">2. </span><b data-dcnode-id="5000"><span data-dcnode-id="5001" instrument_node="">New Cloud Fundamentals</span></b><span data-dcnode-id="4999" instrument_node="">: By 2023, 40% of companies will rearrange cloud product selection processes, focusing on business results rather than IT requirements. Managing, optimizing, and protecting a variety of cloud resources and data arrays will be the most important operational challenges for IT companies.
</span></p><p data-dcnode-id="4990"><span data-dcnode-id="4997" instrument_node="">3. </span><b data-dcnode-id="4995"><span data-dcnode-id="4996" instrument_node="">Management is becoming a top priority for IT teams</span></b><span data-dcnode-id="4994" instrument_node="">: By 2023, 80% of companies will use </span><a data-dcnode-id="4992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AArtificial_intelligence_%28AI%2C_Artificial_intelligence%2C_AI%29" title="Artificial intelligence (AI, Artificial intelligence, AI)"><span data-dcnode-id="4993" instrument_node="">AI-enabled </span></a><span data-dcnode-id="4991" instrument_node=""> cloud services to manage, optimize, and protect dispersed resources and data. Unfortunately, 70% of companies will not be able to achieve full returns due to a mismatch in the skills of IT specialists and a small number of highly qualified personnel in the IT field, as well as due to the active lure of successful employees from the middle to the larger business.
</span></p><p data-dcnode-id="4985"><span data-dcnode-id="4989" instrument_node="">4. The "</span><b data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">everything as a service" principle is becoming ubiquitous</span></b><span data-dcnode-id="4986" instrument_node="">: By 2022, 40% of the IT budgets of large companies will be reallocated through the introduction of integrated service packages on this principle in areas such as security, cloud platforms, virtual workspace and communications. 
</span></p><p data-dcnode-id="4971"><span data-dcnode-id="4984" instrument_node="">5. </span><b data-dcnode-id="4982"><span data-dcnode-id="4983" instrument_node="">System technological transitions are coming</span></b><span data-dcnode-id="4981" instrument_node="">: By 2026, company leaders faced with system or mandatory transitions will triple IT costs for the development of new environments, but will struggle to achieve the necessary 6x increase in operational technology efficiency. IT organizations working with customers from various industries are encouraged to now think about how several system changes (such as those related to </span><a class="mw-redirect" data-dcnode-id="4979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/5G" title="5G"><span data-dcnode-id="4980" instrument_node="">5G networks</span></a><span data-dcnode-id="4978" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Electric_vehicles" title="Electric vehicles"><span data-dcnode-id="4977" instrument_node="">electric vehicles</span></a><span data-dcnode-id="4975" instrument_node="">, or </span><a data-dcnode-id="4973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Blockchain"><span data-dcnode-id="4974" instrument_node="">blockchain)</span></a><span data-dcnode-id="4972" instrument_node=""> will affect technology plans and business priorities.
</span></p><p data-dcnode-id="4966"><span data-dcnode-id="4970" instrument_node="">6. </span><b data-dcnode-id="4968"><span data-dcnode-id="4969" instrument_node="">Automate and complement:</span></b><span data-dcnode-id="4967" instrument_node=""> By 2024, 70% of companies will receive twice as much of a significant return on investments in technologies that expand the activities of employees and customers, compared with investments in the automation of individual processes. The greatest benefit will be gained from a comprehensive effort to expand the experience and decision-making activities for clients, patients, students and ordinary workers.
</span></p><span data-dcnode-id="4965" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4958" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4959" href="/images/5/5e/Gartnerpredictstechonologytrends-2.jpg" style="width:842px;"><a class="image" data-dcnode-id="4963"><img alt="" border="0" class="thumbimage" data-dcnode-id="4964" height="473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/5/5e/Gartnerpredictstechonologytrends-2.jpg/840px-Gartnerpredictstechonologytrends-2.jpg&amp;raw" width="840"></a><span data-dcnode-id="4962" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4960"><span data-dcnode-id="4961" instrument_node="">In early November 2021, IDC research company announced forecasts for the development of the IT industry in the world for the 2022 and subsequent years</span></div></div></div><span data-dcnode-id="4957" instrument_node="">
</span><p data-dcnode-id="4952"><span data-dcnode-id="4956" instrument_node="">7. </span><b data-dcnode-id="4954"><span data-dcnode-id="4955" instrument_node="">Data management poses both challenges and opportunities</span></b><span data-dcnode-id="4953" instrument_node="">: By 2025, regional differences in privacy, security, hosting, use, and disclosure requirements will force 80% of the business to restructure their offline data management processes. Successful companies will leverage digital sovereignty for new investments in resource and data management strategies and IT automation projects.
</span></p><p data-dcnode-id="4947"><span data-dcnode-id="4951" instrument_node="">8. </span><b data-dcnode-id="4949"><span data-dcnode-id="4950" instrument_node="">Rethinking the digital experience</span></b><span data-dcnode-id="4948" instrument_node="">: By 2023, 50% of multinational companies will allocate half of their costs to new technological equipment and communications, as well as to modernize and rethink the experience of interacting with customers and employees. A company that optimizes digital technologies in terms of work, health and entertainment will gain a long-term advantage in attracting and maintaining customer loyalty and opportunities to increase their number.
</span></p><p data-dcnode-id="4942"><span data-dcnode-id="4946" instrument_node="">9. </span><b data-dcnode-id="4944"><span data-dcnode-id="4945" instrument_node="">Sustainable development is becoming a reality</span></b><span data-dcnode-id="4943" instrument_node="">: By 2025, 60% of countries will have digital sustainable development teams, whose tasks will include assessing, certifying and coordinating the use of data and analytical platforms for sustainable business and IT development. By 2024, new tools, data, and analysis will simplify the setting of significant sustainable development goals, but achieving these business and regulatory goals will still remain a difficult task for most companies.
</span></p><p data-dcnode-id="4933"><span data-dcnode-id="4941" instrument_node="">10. </span><b data-dcnode-id="4939"><span data-dcnode-id="4940" instrument_node="">Data control will be scrutinized</span></b><span data-dcnode-id="4938" instrument_node="">: By 2025, estimates of the value of public companies will be based on confidence in controlling the correct and effective use of data to the same extent as in financial control, which will lead to increased costs for data-oriented solutions. IT leaders should prioritize the choice of technology and service partners based on their ability to meet the most important business challenges, according to IDC.</span><sup class="reference" data-dcnode-id="4935" id="cite_ref-2"><a data-dcnode-id="4936" href="#cite_note-2" title=""><span data-dcnode-id="4937" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4934" instrument_node="">
</span></p><span data-dcnode-id="4932" instrument_node="">
</span><a data-dcnode-id="4931" id="Gartner_names_12_strategic_IT_trends_for_2022" name="Gartner_names_12_strategic_IT_trends_for_2022"></a><h3 data-dcnode-id="4927"><span data-dcnode-id="4930" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="4928"><span data-dcnode-id="4929" instrument_node="">Gartner names 12 strategic IT trends for 2022</span></span></h3><span data-dcnode-id="4926" instrument_node="">
</span><p data-dcnode-id="4921"><span data-dcnode-id="4925" instrument_node="">In mid-2021, </span><a class="mw-redirect" data-dcnode-id="4923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AGartner" title="Gartner"><span data-dcnode-id="4924" instrument_node="">Gartner</span></a><span data-dcnode-id="4922" instrument_node=""> named 12 strategic IT trends for 2022. They, according to Gartner Vice President of Research David Grumbridge, will accelerate business development, stimulate change and strengthen customer confidence. 
</span></p><p data-dcnode-id="4915"><b data-dcnode-id="4917"><span data-dcnode-id="4920" instrument_node="">Generative </span><a class="mw-redirect" data-dcnode-id="4918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AI" title="AI"><span data-dcnode-id="4919" instrument_node="">artificial intelligence</span></a></b><span data-dcnode-id="4916" instrument_node="">
</span></p><p data-dcnode-id="4910"><span data-dcnode-id="4914" instrument_node="">A new AI model is entering the market - generative artificial intelligence, which is the use </span><a class="mw-redirect" data-dcnode-id="4912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_learning" title="Machine learning"><span data-dcnode-id="4913" instrument_node="">of machine learning</span></a><span data-dcnode-id="4911" instrument_node=""> methods focused on studying content or objects and using the obtained data to create new, completely original, realistic artifacts. Generative AI can be used in different ways, including for creating program code, identifying new products, promoting drug development and targeted marketing.
</span></p><p data-dcnode-id="4906"><b data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">Data Fabric</span></b><span data-dcnode-id="4907" instrument_node="">
</span></p><p data-dcnode-id="4902"><a data-dcnode-id="4904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AData_Fabric" title="Data Fabric"><span data-dcnode-id="4905" instrument_node="">The Data Fabric</span></a><span data-dcnode-id="4903" instrument_node=""> information management architecture is used to maximize access to enterprise data. Data Fabric guarantees flexible, sustainable integration of data between platforms and business users, the solution has emerged to simplify the infrastructure of data integration in the organization and create a scalable architecture.
</span></p><p data-dcnode-id="4898"><b data-dcnode-id="4900"><span data-dcnode-id="4901" instrument_node="">Geographically distributed enterprises</span></b><span data-dcnode-id="4899" instrument_node="">
</span></p><p data-dcnode-id="4896"><span data-dcnode-id="4897" instrument_node="">With the proliferation of remote and hybrid work models, traditional office-oriented organizations turn into distributed enterprises consisting of geographically scattered employees. Gartner predicts that by 2023, 75% of organizations using this work model will receive revenue growth 25% faster than competitors.
</span></p><span data-dcnode-id="4895" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4888" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4889" href="/images/4/49/Depositphotos_140971.jpg" style="width:842px;"><a class="image" data-dcnode-id="4893"><img alt="" border="0" class="thumbimage" data-dcnode-id="4894" height="561" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/4/49/Depositphotos_140971.jpg/840px-Depositphotos_140971.jpg&amp;raw" width="840"></a><span data-dcnode-id="4892" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4890"><span data-dcnode-id="4891" instrument_node="">In 2022, a generating AI will enter the market</span></div></div></div><span data-dcnode-id="4887" instrument_node="">
</span><p data-dcnode-id="4879"><br data-dcnode-id="4886"><span data-dcnode-id="4885" instrument_node="">
</span><b data-dcnode-id="4881"><a class="mw-redirect" data-dcnode-id="4883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cloud_computing" title="Cloud computing"><span data-dcnode-id="4884" instrument_node="">Cloud</span></a><span data-dcnode-id="4882" instrument_node=""> Platforms</span></b><span data-dcnode-id="4880" instrument_node="">
</span></p><p data-dcnode-id="4877"><span data-dcnode-id="4878" instrument_node="">Gartner predicts that cloud platforms will serve as the basis for more than 95% of new digital initiatives by 2025 - up from less than 40% in 2021.
</span></p><p data-dcnode-id="4873"><b data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">Standalone systems</span></b><span data-dcnode-id="4874" instrument_node="">
</span></p><p data-dcnode-id="4862"><span data-dcnode-id="4872" instrument_node="">Autonomous systems that can dynamically change their own algorithms without upgrading external </span><a data-dcnode-id="4870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ASoftware" title="Software"><span data-dcnode-id="4871" instrument_node="">software</span></a><span data-dcnode-id="4869" instrument_node=""> will become commonplace in </span><a data-dcnode-id="4867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Robotics" title="Robotics"><span data-dcnode-id="4868" instrument_node="">robots,</span></a><span data-dcnode-id="4866" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Drone" title="Drone"><span data-dcnode-id="4865" instrument_node="">drones,</span></a><span data-dcnode-id="4863" instrument_node=""> manufacturing machines and intelligent spaces, Grumbridge said.
</span></p><p data-dcnode-id="4858"><b data-dcnode-id="4860"><span data-dcnode-id="4861" instrument_node="">Decision intelligence</span></b><span data-dcnode-id="4859" instrument_node="">
</span></p><p data-dcnode-id="4856"><span data-dcnode-id="4857" instrument_node="">Decision intelligence - This discipline brings together the best of data science, social science, and management science for effective decision-making. Gartner predicts that over the next two years, one-third of large organizations will use special AI development to make decisions to increase competitive advantage.
</span></p><p data-dcnode-id="4852"><b data-dcnode-id="4854"><span data-dcnode-id="4855" instrument_node="">Composite Applications</span></b><span data-dcnode-id="4853" instrument_node="">
</span></p><p data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">According to Gartner, the demand for business adaptability will grow and requires a technology architecture that supports rapid, secure, and efficient application change. The composite application architecture expands this adaptability, and those who use composite applications will be able to outstrip competitors by 80% in terms of the speed of implementation of new functions.
</span></p><p data-dcnode-id="4846"><b data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">Hyper automation</span></b><span data-dcnode-id="4847" instrument_node="">
</span></p><p data-dcnode-id="4844"><span data-dcnode-id="4845" instrument_node="">Hyperautomatization systems accelerate business growth and sustainability by quickly identifying, validating, and automating a vast number of processes.
</span></p><span data-dcnode-id="4843" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4836" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4837" href="/images/b/b0/2017-08_shutterstock_696017932_1200x627.jpg" style="width:842px;"><a class="image" data-dcnode-id="4841"><img alt="" border="0" class="thumbimage" data-dcnode-id="4842" height="439" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/b/b0/2017-08_shutterstock_696017932_1200x627.jpg/840px-2017-08_shutterstock_696017932_1200x627.jpg&amp;raw" width="840"></a><span data-dcnode-id="4840" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4838"><span data-dcnode-id="4839" instrument_node="">Gartner: Composite Applications Enable Business to Achieve Adaptability</span></div></div></div><span data-dcnode-id="4835" instrument_node="">
</span><p data-dcnode-id="4831"><b data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">Privacy-Enhancing Computing</span></b><span data-dcnode-id="4832" instrument_node="">
</span></p><p data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node="">Gartner expects that by 2025, 60% of large organizations will use one or more methods of computing that increase privacy. These solutions protect personal and sensitive information at the data, software, or hardware level. 
</span></p><p data-dcnode-id="4822"><b data-dcnode-id="4824"><span data-dcnode-id="4828" instrument_node="">Cellular </span><a class="mw-redirect" data-dcnode-id="4826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cyber_security" title="Cyber security"><span data-dcnode-id="4827" instrument_node="">cybersecurity</span></a><span data-dcnode-id="4825" instrument_node=""> network</span></b><span data-dcnode-id="4823" instrument_node="">
</span></p><p data-dcnode-id="4820"><span data-dcnode-id="4821" instrument_node="">The meaning of Cybersecurity Mesh is to provide a person with safe access to any digital resource, regardless of the location of both the resource and the person. This solution forms the perimeter of protection around an individual person, and not around the entire organization. Gartner claims that by 2024, companies that will use such tools will be able to reduce the financial consequences of possible cyber incidents by an average of 90%.
</span></p><p data-dcnode-id="4816"><b data-dcnode-id="4818"><span data-dcnode-id="4819" instrument_node="">AI Engineering</span></b><span data-dcnode-id="4817" instrument_node="">
</span></p><p data-dcnode-id="4814"><span data-dcnode-id="4815" instrument_node="">Gartner notes that AI development teams can create really effective tools for their organizations if they can continually add value through rapid AI changes. According to Grumbridge, developers will focus on composite applications focused on modular components - this will increase the efficiency of development teams.
</span></p><p data-dcnode-id="4810"><b data-dcnode-id="4812"><span data-dcnode-id="4813" instrument_node="">General experience </span></b><span data-dcnode-id="4811" instrument_node="">
</span></p><p data-dcnode-id="4804"><span data-dcnode-id="4809" instrument_node="">In the common experience approach, all discipline managers should have equal responsibility for meeting the combined needs of employees and clients. Gartner analysts argue that "traditional management approaches will not scale." The purpose of this approach is to increase the trust, satisfaction, loyalty and support of customers and employees.</span><sup class="reference" data-dcnode-id="4806" id="cite_ref-3"><a data-dcnode-id="4807" href="#cite_note-3" title=""><span data-dcnode-id="4808" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4805" instrument_node="">
</span></p><span data-dcnode-id="4803" instrument_node="">
</span><a data-dcnode-id="4802" id="Analysts_TrendForce_named_10_IT_trends_for_2022" name="Analysts_TrendForce_named_10_IT_trends_for_2022"></a><h3 data-dcnode-id="4798"><span data-dcnode-id="4801" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">Analysts TrendForce named 10 IT trends for 2022</span></span></h3><span data-dcnode-id="4797" instrument_node="">
</span><p data-dcnode-id="4792"><span data-dcnode-id="4796" instrument_node="">At the end of September 2021, the analytical company TrendForce presented a forecast that identifies 10 main trends that are expected to appear in different segments of the </span><a class="new" data-dcnode-id="4794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DInformation_technology%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Information technology (такой страницы не существует)"><span data-dcnode-id="4795" instrument_node="">information technology</span></a><span data-dcnode-id="4793" instrument_node=""> technology industry in 2022.
</span></p><span data-dcnode-id="4791" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4784" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4785" href="/images/1/12/1_-vW5k0LO2VHoX8iKGVCJOw.jpeg" style="width:842px;"><a class="image" data-dcnode-id="4789"><img alt="" border="0" class="thumbimage" data-dcnode-id="4790" height="560" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/1/12/1_-vW5k0LO2VHoX8iKGVCJOw.jpeg/840px-1_-vW5k0LO2VHoX8iKGVCJOw.jpeg&amp;raw" width="840"></a><span data-dcnode-id="4788" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4786"><span data-dcnode-id="4787" instrument_node="">Analysts TrendForce named 10 technological trends for 2022</span></div></div></div><span data-dcnode-id="4783" instrument_node="">
</span><p data-dcnode-id="4777"><br data-dcnode-id="4782"><span data-dcnode-id="4781" instrument_node="">
</span><b data-dcnode-id="4779"><span data-dcnode-id="4780" instrument_node="">Development of micro-LED and mini-LED displays will focus on active matrix solutions</span></b><span data-dcnode-id="4778" instrument_node="">
</span></p><p data-dcnode-id="4774"><br data-dcnode-id="4776"><span data-dcnode-id="4775" instrument_node="">
The creation of micro-LED and mini-LED displays in 2022 will focus on solutions based on an active matrix, but due to a large number of technical problems, the production of such displays will still be quite expensive.
</span></p><p data-dcnode-id="4771"><br data-dcnode-id="4773"><span data-dcnode-id="4772" instrument_node="">
As for the development of LED displays with self-radiation, TVs are one of the main areas of mass development of Micro LED, primarily because TVs, compared to IT products, have a relatively low technological barrier to entry.
</span></p><p data-dcnode-id="4763"><br data-dcnode-id="4770"><span data-dcnode-id="4769" instrument_node="">
</span><b data-dcnode-id="4765"><span data-dcnode-id="4768" instrument_node="">Advanced AMOLED technology and cameras under the display will open a new stage of the revolution </span><a class="mw-redirect" data-dcnode-id="4766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Smartphone" title="Smartphone"><span data-dcnode-id="4767" instrument_node="">smartphones</span></a></b><span data-dcnode-id="4764" instrument_node="">
</span></p><p data-dcnode-id="4760"><br data-dcnode-id="4762"><span data-dcnode-id="4761" instrument_node="">
In 2021, the main feature of the AMOLED panels is expected to continue to be folding structures that will feature optimal weight and energy efficiency. TrendForce expects foldable phones to reach penetration of more than 1% in 2022 and 4% in 2024
</span></p><p data-dcnode-id="4754"><br data-dcnode-id="4759"><span data-dcnode-id="4758" instrument_node="">
In </span><b data-dcnode-id="4756"><span data-dcnode-id="4757" instrument_node="">semiconductor production, the mastery of 3 nm standards will be decisive</span></b><span data-dcnode-id="4755" instrument_node="">
</span></p><p data-dcnode-id="4748"><br data-dcnode-id="4753"><span data-dcnode-id="4752" instrument_node="">
TrendForce expects TSMC to continue to use FinFET transistor technology, and </span><a data-dcnode-id="4750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3ASamsung_Electronics" title="Samsung Electronics"><span data-dcnode-id="4751" instrument_node="">Samsung</span></a><span data-dcnode-id="4749" instrument_node=""> will switch to GAA.
</span></p><p data-dcnode-id="4742"><br data-dcnode-id="4747"><span data-dcnode-id="4746" instrument_node="">
</span><b data-dcnode-id="4744"><span data-dcnode-id="4745" instrument_node="">Start mass production of DDR5 memory</span></b><span data-dcnode-id="4743" instrument_node="">
</span></p><p data-dcnode-id="4730"><br data-dcnode-id="4741"><span data-dcnode-id="4740" instrument_node="">
The three dominant DRAM suppliers (Samsung, SK Hynix and Micron) will not only gradually begin mass production of next-generation DDR5 products, but will also continue to increase the penetration of LPDDR5 into the smartphone market in response to demand for. </span><a class="mw-redirect" data-dcnode-id="4738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Smartphone" title="Smartphone"><span data-dcnode-id="4739" instrument_node="">smartphones</span></a><span data-dcnode-id="4737" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/5G" title="5G"><span data-dcnode-id="4736" instrument_node="">5G</span></a><span data-dcnode-id="4734" instrument_node=""> As for storage interfaces, in 2022, analysts expect the market share of PCIe Gen4 SSDs to rise sharply in the consumer PC segment. In the server segment, when </span><a data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AIntel" title="Intel"><span data-dcnode-id="4733" instrument_node="">Intel</span></a><span data-dcnode-id="4731" instrument_node=""> Eagle Stream processors supporting PCIe Gen 5 enter mass production, products supporting this interface will also appear in the enterprise SSD market.
</span></p><p data-dcnode-id="4724"><br data-dcnode-id="4729"><span data-dcnode-id="4728" instrument_node="">
</span><b data-dcnode-id="4726"><span data-dcnode-id="4727" instrument_node="">Mobile operators to launch more trial projects to segment 5G SA networks and low-latency applications</span></b><span data-dcnode-id="4725" instrument_node="">
</span></p><p data-dcnode-id="4712"><br data-dcnode-id="4723"><span data-dcnode-id="4722" instrument_node="">
By 2022, in response to the needs of enterprises, applications will appear that are at the intersection of 5G, the massive </span><a data-dcnode-id="4720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet_of_Things_%28IoT%29" title="Internet of Things (IoT)"><span data-dcnode-id="4721" instrument_node="">Internet</span></a><span data-dcnode-id="4719" instrument_node=""> of </span><a data-dcnode-id="4717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet_of_Things_%28IoT%29" title="Internet of Things (IoT)"><span data-dcnode-id="4718" instrument_node="">Things</span></a><span data-dcnode-id="4716" instrument_node=""> and critical IoT applications. In particular, critical </span><a class="mw-redirect" data-dcnode-id="4714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IoT" title="IoT"><span data-dcnode-id="4715" instrument_node="">IoT</span></a><span data-dcnode-id="4713" instrument_node=""> applications include intelligent network automation, telemedicine, road safety, and industrial automation.
</span></p><p data-dcnode-id="4708"><b data-dcnode-id="4710"><span data-dcnode-id="4711" instrument_node="">Satellite communications</span></b><span data-dcnode-id="4709" instrument_node="">
</span></p><p data-dcnode-id="4706"><span data-dcnode-id="4707" instrument_node="">Satellite operators will compete in the low-orbit satellite market, and 3GPP will include non-ground networks in the Release 17 Protocol Coding Freeze standard.
</span></p><p data-dcnode-id="4702"><b data-dcnode-id="4704"><span data-dcnode-id="4705" instrument_node="">Digital manufacturing</span></b><span data-dcnode-id="4703" instrument_node="">
</span></p><p data-dcnode-id="4693"><br data-dcnode-id="4701"><span data-dcnode-id="4700" instrument_node="">

</span></p><p data-dcnode-id="4690"><br data-dcnode-id="4692"><span data-dcnode-id="4691" instrument_node="">
The development of the Internet of Things in 2022 is likely to focus on CPS (cyberphysical systems), which combine 5G, peripheral computing and artificial intelligence technologies to extract and analyze valuable information from huge data streams for the purpose of intelligent automation and forecasting.
</span></p><span data-dcnode-id="4689" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4679" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4680" href="/images/7/7d/Mobile_tech_in_Plant.61322112f15fe.png" style="width:842px;"><a class="image" data-dcnode-id="4687"><img alt="" border="0" class="thumbimage" data-dcnode-id="4688" height="473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/7/7d/Mobile_tech_in_Plant.61322112f15fe.png/840px-Mobile_tech_in_Plant.61322112f15fe.png&amp;raw" width="840"></a><span data-dcnode-id="4686" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4681"><span data-dcnode-id="4685" instrument_node="">В конце сентября 2021 года аналитическая компания TrendForce представила прогноз, в котором названы 10 основных тенденций, которые, как предполагается, будут проявляться в разных сегментах отрасли </span><a class="new" data-dcnode-id="4683" rel="nofollow" title="Информационные технологии (такой страницы не существует)"><span data-dcnode-id="4684" instrument_node="">information technology</span></a><span data-dcnode-id="4682" instrument_node=""> technology in 2022.</span></div></div></div><span data-dcnode-id="4678" instrument_node="">
</span><p data-dcnode-id="4672"><b data-dcnode-id="4674"><span data-dcnode-id="4677" instrument_node="">Advanced </span><a data-dcnode-id="4675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AVirtual_Reality_%28VR%29" title="Virtual Reality (VR)"><span data-dcnode-id="4676" instrument_node="">Virtual Reality</span></a></b><span data-dcnode-id="4673" instrument_node="">
</span></p><p data-dcnode-id="4665"><a class="mw-redirect" data-dcnode-id="4670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AR" title="AR"><span data-dcnode-id="4671" instrument_node="">AR</span></a><span data-dcnode-id="4669" instrument_node=""> and VR equipment manufacturers are expected to strive for full immersion by integrating additional sensors and AI processing </span><a class="mw-redirect" data-dcnode-id="4667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AI" title="AI"><span data-dcnode-id="4668" instrument_node="">.</span></a><span data-dcnode-id="4666" instrument_node="">
</span></p><p data-dcnode-id="4661"><b data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node="">Automated car parking</span></b><span data-dcnode-id="4662" instrument_node="">

</span><a data-dcnode-id="4647" id="2020" name="2020"></a><h2 data-dcnode-id="4643"><span data-dcnode-id="4646" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">2020 </span></span></h2><span data-dcnode-id="4642" instrument_node="">
</span><a data-dcnode-id="4641" id="IDC_names_top_IT_trends_for_coming_years" name="IDC_names_top_IT_trends_for_coming_years"></a><h3 data-dcnode-id="4637"><span data-dcnode-id="4640" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="4638"><span data-dcnode-id="4639" instrument_node="">IDC names top IT trends for coming years</span></span></h3><span data-dcnode-id="4636" instrument_node="">
</span><p data-dcnode-id="4628"><span data-dcnode-id="4635" instrument_node="">In mid-November 2020, </span><a class="mw-redirect" data-dcnode-id="4633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IDC" title="IDC"><span data-dcnode-id="4634" instrument_node="">IDC</span></a><span data-dcnode-id="4632" instrument_node=""> presented a forecast for the IT industry for 2021. The report focuses on how companies' IT departments are coping with the challenges associated with the </span><a class="mw-redirect" data-dcnode-id="4630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/COVID-19" title="COVID-19"><span data-dcnode-id="4631" instrument_node="">COVID-19</span></a><span data-dcnode-id="4629" instrument_node=""> coronavirus pandemic and how they seek to gain a competitive edge in the new environment.
</span></p><p data-dcnode-id="4624"><b data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">1. Faster transition to the cloud</span></b><span data-dcnode-id="4625" instrument_node="">
</span></p><p data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">Chief information officers must push the transition to cloud IT models to remain competitive. The IDC report states that "by the end of 2021, 80% of enterprises will be moving to cloud infrastructure and applications twice as fast as in pre-pandemic conditions."
</span></p><p data-dcnode-id="4615"><b data-dcnode-id="4617"><span data-dcnode-id="4621" instrument_node="">2. </span><a class="new" data-dcnode-id="4619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DPeripheral_Computing%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Peripheral Computing (такой страницы не существует)"><span data-dcnode-id="4620" instrument_node="">Peripheral Computing</span></a><span data-dcnode-id="4618" instrument_node=""> Becomes a Priority</span></b><span data-dcnode-id="4616" instrument_node="">
</span></p><p data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">According to the IDC report, 80% of investments will focus on peripheral computing, and business models will take into account changes in office and home work related to the pandemic. This will also increase the number of cloud solutions that will enable organizations to respond more quickly and efficiently to changing needs.
</span></p><p data-dcnode-id="4609"><b data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">3. Intelligent Digital Workspace</span></b><span data-dcnode-id="4610" instrument_node="">
</span></p><p data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">According to IDC, by 2023, 75% of Global 2000 companies will focus on an intelligent workspace that will allow employees to work more effectively on both their own and joint projects.
</span></p><span data-dcnode-id="4606" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4599" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4600" href="/images/0/08/2890_(15).jpg" style="width:842px;"><a class="image" data-dcnode-id="4604"><img alt="" border="0" class="thumbimage" data-dcnode-id="4605" height="630" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/0/08/2890_%252815%2529.jpg/840px-2890_%252815%2529.jpg&amp;raw" width="840"></a><span data-dcnode-id="4603" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">Top IT trends in 2021 include peripherals, cloud</span></div></div></div><span data-dcnode-id="4598" instrument_node="">
</span><p data-dcnode-id="4594"><b data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">4. Pandemic IT Legacy</span></b><span data-dcnode-id="4595" instrument_node="">
</span></p><p data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">According to IDC, the technical debt that arose due to forced migration to the cloud will be felt until 2023. Chief information officers will continue to look for opportunities to build sustainable digital infrastructures.
</span></p><p data-dcnode-id="4588"><b data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">5. Fault tolerance - central element</span></b><span data-dcnode-id="4589" instrument_node="">
</span></p><p data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">Organizations should look for new approaches to maintaining a competitive advantage in the unstable industry. IDC predicts that "in 2022, enterprises focused on digital resilience will adapt to failures 50% faster than enterprises focused on restoring existing levels of business/IT resilience."
</span></p><p data-dcnode-id="4582"><b data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">6. Move to standalone IT operations</span></b><span data-dcnode-id="4583" instrument_node="">
</span></p><p data-dcnode-id="4574"><span data-dcnode-id="4581" instrument_node="">By 2023, all IT and automation initiatives will use the cloud ecosystem as a foundation that enhances real-time resource management and analytics. To do this, organizations must integrate </span><a class="mw-redirect" data-dcnode-id="4579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AI" title="AI"><span data-dcnode-id="4580" instrument_node="">AI-based</span></a><span data-dcnode-id="4578" instrument_node=""> analytics and </span><a class="mw-redirect" data-dcnode-id="4576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_learning" title="Machine learning"><span data-dcnode-id="4577" instrument_node="">machine learning</span></a><span data-dcnode-id="4575" instrument_node="">, implement automation and autonomous infrastructure.
</span></p><p data-dcnode-id="4570"><b data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">7. Opportunistic AI empowerment</span></b><span data-dcnode-id="4571" instrument_node="">
</span></p><p data-dcnode-id="4568"><span data-dcnode-id="4569" instrument_node="">According to IDC, "by 2023, 25% of Global 2000 companies will acquire at least one AI development startup." At the same time, organizations that develop their own AI-based solutions and data services will switch to subscription models.
</span></p><span data-dcnode-id="4567" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4560" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="4561" href="/images/b/b0/49618лдж526_l.jpg" style="width:842px;"><a class="image" data-dcnode-id="4565"><img alt="" border="0" class="thumbimage" data-dcnode-id="4566" height="567" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/b/b0/49618%25D0%25BB%25D0%25B4%25D0%25B6526_l.jpg/840px-49618%25D0%25BB%25D0%25B4%25D0%25B6526_l.jpg&amp;raw" width="840"></a><span data-dcnode-id="4564" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4562"><span data-dcnode-id="4563" instrument_node="">In 2021, IT companies will more actively develop environmentally sustainable business methods, move to autonomous IT operations</span></div></div></div><span data-dcnode-id="4559" instrument_node="">
</span><p data-dcnode-id="4555"><b data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">8. Revaluation of Relationships and Services</span></b><span data-dcnode-id="4556" instrument_node="">
</span></p><p data-dcnode-id="4553"><span data-dcnode-id="4554" instrument_node="">The IT environment is undergoing incredible changes, so according to IDC, 80% of organizations will re-evaluate their products, services, and supplier relationships to implement optimal digital strategies.
</span></p><p data-dcnode-id="4549"><b data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">9. Ecostability</span></b><span data-dcnode-id="4550" instrument_node="">
</span></p><p data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">IT has become responsible for implementing eco-sustainable business practices. According to IDC, "by 2025, 90% of Global 2000 companies will require the re-use of materials in IT equipment supply chains, as well as zero carbon footprint and reduced energy consumption."
</span></p><p data-dcnode-id="4543"><b data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">10. People remain paramount</span></b><span data-dcnode-id="4544" instrument_node="">
</span></p><p data-dcnode-id="4534"><span data-dcnode-id="4542" instrument_node="">Business automation and the creation of a productive workforce cannot be successful without the necessary investment in the development of IT teams or groups of </span><a class="mw-redirect" data-dcnode-id="4540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/DevOps" title="DevOps"><span data-dcnode-id="4541" instrument_node="">DevOps</span></a><span data-dcnode-id="4539" instrument_node="">. Organizations will actively seek talent through crowdsourcing and staff development/retraining.</span><sup class="reference" data-dcnode-id="4536" id="cite_ref-5"><a data-dcnode-id="4537" href="#cite_note-5" title=""><span data-dcnode-id="4538" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4535" instrument_node="">
</span></p><span data-dcnode-id="4533" instrument_node="">
</span><a data-dcnode-id="4532" id="Gartner_named_top_IT_trends_in_2021_and_beyond" name="Gartner_named_top_IT_trends_in_2021_and_beyond"></a><h3 data-dcnode-id="4528"><span data-dcnode-id="4531" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">Gartner named top IT trends in 2021 and beyond</span></span></h3><span data-dcnode-id="4527" instrument_node="">
</span><p data-dcnode-id="4522"><span data-dcnode-id="4526" instrument_node="">In mid-October 2020, </span><a class="mw-redirect" data-dcnode-id="4524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AGartner" title="Gartner"><span data-dcnode-id="4525" instrument_node="">Gartner</span></a><span data-dcnode-id="4523" instrument_node=""> presented a list of key technology trends for 2021.
</span></p><p data-dcnode-id="4515"><b data-dcnode-id="4517"><span data-dcnode-id="4521" instrument_node="">1. </span><a class="mw-redirect" data-dcnode-id="4519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet" title="Internet"><span data-dcnode-id="4520" instrument_node="">Internet</span></a><span data-dcnode-id="4518" instrument_node=""> Behavior</span></b><span data-dcnode-id="4516" instrument_node="">
</span></p><p data-dcnode-id="4507"><span data-dcnode-id="4514" instrument_node="">Gartner analysts first introduced the term </span><a class="new" data-dcnode-id="4512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DInternet_of_Behavior_%28IoB%29%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Internet of Behavior (IoB) (такой страницы не существует)"><span data-dcnode-id="4513" instrument_node="">"Internet of Behavior" (IoB)</span></a><span data-dcnode-id="4511" instrument_node=""> in the 2020 forecast - these are technologies for monitoring behavioral phenomena and managing the data that affect them. This includes facial recognition, location tracking, and </span><a data-dcnode-id="4509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABig_Data" title="Big Data"><span data-dcnode-id="4510" instrument_node="">big data</span></a><span data-dcnode-id="4508" instrument_node="">. Gartner predicts that by the end of 2025, more than half of the world's population will be involved in at least one IoB program.
</span></p><p data-dcnode-id="4501"><b data-dcnode-id="4503"><span data-dcnode-id="4506" instrument_node="">2. Mesh Technology in </span><a class="mw-redirect" data-dcnode-id="4504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cyber_security" title="Cyber security"><span data-dcnode-id="4505" instrument_node="">Cybersecurity</span></a></b><span data-dcnode-id="4502" instrument_node="">
