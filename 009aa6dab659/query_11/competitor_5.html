</span></p><p data-dcnode-id="1918"><span data-dcnode-id="1925" instrument_node="">In conclusion, Hasin predicted further automation, consistent removal of a person from </span><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/BPM" title="BPM"><span data-dcnode-id="1924" instrument_node="">business processes</span></a><span data-dcnode-id="1922" instrument_node="">, which, in particular, confirms Gartner's forecast: in the United States, about 80% of professions paid less than </span><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AUS_Dollar" title="US Dollar"><span data-dcnode-id="1921" instrument_node="">$20</span></a><span data-dcnode-id="1919" instrument_node=""> per hour will be occupied by robots over the next 7 years.
</span></p><span data-dcnode-id="1917" instrument_node="">
</span><a data-dcnode-id="1916" id="Top_trends_from_IBM" name="Top_trends_from_IBM"></a><h3 data-dcnode-id="1912"><span data-dcnode-id="1915" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Top trends from IBM</span></span></h3><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1891"><span data-dcnode-id="1910" instrument_node="">On March 19, 2018, </span><a data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AIBM" title="IBM"><span data-dcnode-id="1909" instrument_node="">IBM</span></a><span data-dcnode-id="1907" instrument_node=""> listed five technologies that fundamentally change society and companies. We are talking about </span><a data-dcnode-id="1905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AQuantum_Computer_and_Quantum_Communication" title="Quantum Computer and Quantum Communication"><span data-dcnode-id="1906" instrument_node="">quantum computing</span></a><span data-dcnode-id="1904" instrument_node="">, microscopic </span><a data-dcnode-id="1902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ARobots_%28robotics%29" title="Robots (robotics)"><span data-dcnode-id="1903" instrument_node="">robots</span></a><span data-dcnode-id="1901" instrument_node="">, objective </span><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AArtificial_intelligence_%28AI%2C_Artificial_intelligence%2C_AI%29" title="Artificial intelligence (AI, Artificial intelligence, AI)"><span data-dcnode-id="1900" instrument_node="">artificial intelligence (AI)</span></a><span data-dcnode-id="1898" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cryptography" title="Cryptography"><span data-dcnode-id="1897" instrument_node="">cryptography</span></a><span data-dcnode-id="1895" instrument_node=""> and </span><a data-dcnode-id="1893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Blockchain"><span data-dcnode-id="1894" instrument_node="">blockchain</span></a><span data-dcnode-id="1892" instrument_node="">.
</span></p><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">It is in these areas, according to IBM, that a powerful technological breakthrough will be made, and they will penetrate into all areas of people's lives. Such technologies can revolutionize the computer industry and bring computing to a level that no one has ever seen, the study says.
</span></p><p data-dcnode-id="1884"><span data-dcnode-id="1888" instrument_node="">IBM analysts believe that by 2023 quantum computing will become the mainstream in the technology industry. They will be widely used by new categories of specialists and developers to solve problems that were previously considered unsolvable. </span><a class="mw-redirect" data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Quantum_technologies" title="Quantum technologies"><span data-dcnode-id="1887" instrument_node="">Quantum technologies</span></a><span data-dcnode-id="1885" instrument_node=""> will be actively studied in universities and even in secondary schools.
</span></p><span data-dcnode-id="1883" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1876" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="1877" href="/images/e/eb/Tapibm.jpg" style="width:708px;"><a class="image" data-dcnode-id="1881"><img alt="" border="0" class="thumbimage" data-dcnode-id="1882" height="457" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/e/eb/Tapibm.jpg&amp;raw" width="706"></a><span data-dcnode-id="1880" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">IBM lists five technologies that fundamentally change society and companies</span></div></div></div><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">By 2018, artificial intelligence has become a popular topic in the IT market, but explosive demand for it is still ahead. Within five years, new "unbiased" solutions will appear that can be trusted. IBM works in this direction: specialists are engaged in eliminating data that are not free from racial, gender and ideological biases from AI training algorithms. The company wants to create "objective" artificial intelligence, which will not contribute to the spread of inequality and will make a qualitative breakthrough in the field of AI training. In addition, IBM has developed a way to test AI solutions when training data is not available.
</span></p><p data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">The corporation sees importance in miniature robots, which can be combined into one cloud network and deployed around the world to, for example, monitor water quality. IBM has come up with tiny electronic AI systems that can collect information about the movement of plankton, which will help make forecasts based on its behavior and cope with ocean pollution (for example, from oil spills and coastal sources), as well as predict such a dangerous phenomenon as red tide (harmful algal blooms).
</span></p><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Two more technologies, which, according to IBM experts, fundamentally change society and companies, are associated with cryptography and blockchain. In the first case, the company means tiny cryptographic "anchors" - a kind of label that will be supplied with various products. With their help, consumers will be able to track the entire path of the product - from its production to the moment of sale - using the blockchain. Such technology is expected to change areas of business that are closely related to food safety, fake identification and the luxury goods market. 
</span></p><p data-dcnode-id="1864"><span data-dcnode-id="1868" instrument_node="">The second technology in this field is lattice cryptography, which is a new approach to building </span><a class="mw-redirect" data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Enciphering" title="Enciphering"><span data-dcnode-id="1867" instrument_node="">encryption</span></a><span data-dcnode-id="1865" instrument_node=""> algorithms. Such a technology has a high degree of protection, so it has great potential for use in systems that store valuable data. IBM itself has developed a post-quantum cryptography method that&nbsp; protects against attacks in which hackers use quantum computers. Thanks to cryptography on the grids, you can work with files or encrypt them without being afraid that important data will fall into the hands of attackers, the company says.
</span></p><span data-dcnode-id="1863" instrument_node="">
</span><span data-dcnode-id="1862" instrument_node="">
</span><span data-dcnode-id="1861" instrument_node="">

</span></td><td data-dcnode-id="1838" style="padding: 8px;"><span data-dcnode-id="1840" style="font-style:italic"><cite data-dcnode-id="1841"><span data-dcnode-id="1854" instrument_node="">The ability of society to overcome intractable problems and unprecedented threats depends on sustained advances in technologies such as artificial intelligence, blockchain, lattice cryptography and quantum computing - </span><a data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AIBM_Research" title="IBM Research"><span data-dcnode-id="1853" instrument_node="">IBM Research</span></a><span data-dcnode-id="1851" instrument_node=""> has invested heavily in all these </span><a data-dcnode-id="1849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AIBM_Research" title="IBM Research"><span data-dcnode-id="1850" instrument_node="">areas</span></a><sup class="reference" data-dcnode-id="1846" id="cite_ref-24"><a data-dcnode-id="1847" href="#cite_note-24" title=""><span data-dcnode-id="1848" instrument_node="">[25]</span></a></sup><span data-dcnode-id="1845" instrument_node=""> said</span><sup class="reference" data-dcnode-id="1842" id="cite_ref-25"><a data-dcnode-id="1843" href="#cite_note-25" title=""><span data-dcnode-id="1844" instrument_node="">[26]</span></a></sup></cite></span><span data-dcnode-id="1839" instrument_node="">
</span></td><td data-dcnode-id="1832" style="width:30px; vertical-align:bottom; padding:8px;"><span data-dcnode-id="1837" instrument_node=""> </span><div class="img_path" data-dcnode-id="1834" href="/images/4/49/Aquote2.png" style="cursor: pointer;"><a class="image" data-dcnode-id="1835"><img alt="File:Aquote2.png" border="0" data-dcnode-id="1836" height="23" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/4/49/Aquote2.png&amp;raw" width="30"></a></div><span data-dcnode-id="1833" instrument_node="">
</span></td></tr></tbody></table><br data-dcnode-id="1828"><span data-dcnode-id="1827" instrument_node="">
</span><a data-dcnode-id="1826" id="2017" name="2017"></a><h2 data-dcnode-id="1822"><span data-dcnode-id="1825" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node=""> 2017</span></span></h2><span data-dcnode-id="1821" instrument_node="">
</span><a data-dcnode-id="1820" id="Top_trends_from_Juniper_Research" name="Top_trends_from_Juniper_Research"></a><h3 data-dcnode-id="1816"><span data-dcnode-id="1819" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Top trends from Juniper Research</span></span></h3><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1814" instrument_node="">In December 2017, the analytical company </span><a data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AJuniper_Research" title="Juniper Research"><span data-dcnode-id="1813" instrument_node="">Juniper Research</span></a><span data-dcnode-id="1811" instrument_node="">&nbsp; presented a forecast for major technological trends for 2018. The annotation to the study says that the development of technologies such as </span><a class="mw-redirect" data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="1810" instrument_node="">artificial intelligence (AI)</span></a><span data-dcnode-id="1808" instrument_node="">, </span><a data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Blockchain"><span data-dcnode-id="1807" instrument_node="">blockchain</span></a><span data-dcnode-id="1805" instrument_node=""> and peripheral computing contributes to the restructuring of ecosystems in various key vertical markets. In 2018, it is expected to increase competition in the field of streaming and transform the payment market against the background of how brands in various countries and social networks are actively developing payment systems. 
</span></p><p data-dcnode-id="1800"><b data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">1. Amazon and Facebook get rights to broadcast major sports events</span></b><span data-dcnode-id="1801" instrument_node="">
</span></p><p data-dcnode-id="1783"><span data-dcnode-id="1799" instrument_node="">The appearance of numerous players on video services by subscription provided adds problems to traditional television broadcasters. Players such as </span><a class="mw-redirect" data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Amazon" title="Amazon"><span data-dcnode-id="1798" instrument_node="">Amazon</span></a><span data-dcnode-id="1796" instrument_node="">, </span><a data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3ANetflix" title="Netflix"><span data-dcnode-id="1795" instrument_node="">Netflix</span></a><span data-dcnode-id="1793" instrument_node="">, and now </span><a class="mw-redirect" data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Facebook" title="Facebook"><span data-dcnode-id="1792" instrument_node="">Facebook</span></a><span data-dcnode-id="1790" instrument_node=""> and </span><a data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AApple" title="Apple"><span data-dcnode-id="1789" instrument_node="">Apple have</span></a><span data-dcnode-id="1787" instrument_node=""> made a leap by spending billions of </span><a data-dcnode-id="1785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AUS_Dollar" title="US Dollar"><span data-dcnode-id="1786" instrument_node="">dollars</span></a><span data-dcnode-id="1784" instrument_node=""> on original programs and seeking to purchase new customers. Some of these companies are actively gaining rights to sports broadcasts, which, according to analysts, could be a key advantage.
</span></p><p data-dcnode-id="1776"><b data-dcnode-id="1778"><span data-dcnode-id="1782" instrument_node="">2. Apple, Facebook and </span><a class="mw-redirect" data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Google" title="Google"><span data-dcnode-id="1781" instrument_node="">Google</span></a><span data-dcnode-id="1779" instrument_node=""> bring to the masses payment services in social networks</span></b><span data-dcnode-id="1777" instrument_node="">
</span></p><p data-dcnode-id="1768"><span data-dcnode-id="1775" instrument_node="">The advanced nature of applications for social networks and instant messengers revolutionized payment services. The availability of payment mechanisms such as </span><a data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AApple_Pay" title="Apple Pay"><span data-dcnode-id="1774" instrument_node="">Apple Pay</span></a><span data-dcnode-id="1772" instrument_node=""> and </span><a data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AAndroid_Pay" title="Android Pay"><span data-dcnode-id="1771" instrument_node="">Android Pay</span></a><span data-dcnode-id="1769" instrument_node=""> has led mobile phone users to increasingly trust these services financially. Juniper believes that 2018 will be the year of social payments. 
</span></p><span data-dcnode-id="1767" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1760" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="1761" href="/images/f/f5/Shutterstock_311143214.jpg" style="width:842px;"><a class="image" data-dcnode-id="1765"><img alt="" border="0" class="thumbimage" data-dcnode-id="1766" height="560" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/f/f5/Shutterstock_311143214.jpg/840px-Shutterstock_311143214.jpg&amp;raw" width="840"></a><span data-dcnode-id="1764" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Juniper Research analysts forecast IT market trends in 2018</span></div></div></div><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1755"><b data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">3. AI and blockchain is introduced into a large number of solutions for insurance and phytech</span></b><span data-dcnode-id="1756" instrument_node="">
</span></p><p data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">According to Juniper Research, in 2018, the blockchain will go beyond simple banking applications and penetrate other areas, such as money transfer, insurance and digital identification. Artificial intelligence will be widely distributed there.
</span></p><p data-dcnode-id="1744"><b data-dcnode-id="1746"><span data-dcnode-id="1752" instrument_node="">4. </span><a class="mw-redirect" data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Edge_computing" title="Edge computing"><span data-dcnode-id="1751" instrument_node="">Peripheral Computing</span></a><span data-dcnode-id="1749" instrument_node=""> Accelerates </span><a data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet_of_Things_%28IoT%29" title="Internet of Things (IoT)"><span data-dcnode-id="1748" instrument_node="">IoT</span></a></b><span data-dcnode-id="1745" instrument_node="">
</span></p><p data-dcnode-id="1739"><span data-dcnode-id="1743" instrument_node="">Experts say peripheral computing will be used to quickly deploy </span><a class="mw-redirect" data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IoT" title="IoT"><span data-dcnode-id="1742" instrument_node="">an IoT solution</span></a><span data-dcnode-id="1740" instrument_node="">. Their vendors increasingly see Edge Computing as a model of remote monitoring and data processing directly on IoT hardware
</span></p><p data-dcnode-id="1732"><b data-dcnode-id="1734"><span data-dcnode-id="1738" instrument_node="">5. Surge in </span><a class="new" data-dcnode-id="1736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DFacial_recognition%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Facial recognition (такой страницы не существует)"><span data-dcnode-id="1737" instrument_node="">facial recognition</span></a><span data-dcnode-id="1735" instrument_node=""> technologies</span></b><span data-dcnode-id="1733" instrument_node="">
</span></p><p data-dcnode-id="1724"><span data-dcnode-id="1731" instrument_node="">Despite </span><a data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AApple" title="Apple"><span data-dcnode-id="1730" instrument_node="">Apple's</span></a><span data-dcnode-id="1728" instrument_node=""> criticism for failing a fingerprint scanner in favor of facial recognition, there is no doubt that in 2018 there will be many more uses of this technology, which go far beyond </span><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IB_-_Authentication" title="IB - Authentication"><span data-dcnode-id="1727" instrument_node="">authentication</span></a><span data-dcnode-id="1725" instrument_node=""> and payments.&nbsp;
</span></p><p data-dcnode-id="1720"><b data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">6. Increasing investment in robot consultants</span></b><span data-dcnode-id="1721" instrument_node="">
</span></p><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">According to experts, robotic consulting services will make a breakthrough in fintech. Programmes will play the role of financial adviser and perform responsibilities such as asset management, with little or no human intervention.
</span></p><p data-dcnode-id="1714"><b data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">7. Machine learning for identification</span></b><span data-dcnode-id="1715" instrument_node="">
</span></p><p data-dcnode-id="1706"><span data-dcnode-id="1713" instrument_node="">Analysts predict that manufacturers will actively use a combination </span><a class="mw-redirect" data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_Learning" title="Machine Learning"><span data-dcnode-id="1712" instrument_node="">of machine learning</span></a><span data-dcnode-id="1710" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Smartphone" title="Smartphone"><span data-dcnode-id="1709" instrument_node="">smartphone</span></a><span data-dcnode-id="1707" instrument_node=""> connectivity to test digital identity.&nbsp;
</span></p><p data-dcnode-id="1702"><b data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">8. Chinese payment services storm Western markets</span></b><span data-dcnode-id="1703" instrument_node="">
</span></p><p data-dcnode-id="1694"><span data-dcnode-id="1701" instrument_node="">Due to the growth of Chinese tourism, payment service operators are increasingly collaborating with large retailers and money transfer service providers in </span><a class="mw-redirect" data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Europe" title="Europe"><span data-dcnode-id="1700" instrument_node="">Europe</span></a><span data-dcnode-id="1698" instrument_node=""> and the </span><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AUnited_States_of_America_%28USA%29" title="Article:United States of America (USA)"><span data-dcnode-id="1697" instrument_node="">USA</span></a><span data-dcnode-id="1695" instrument_node="">
</span></p><p data-dcnode-id="1690"><b data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">9. "Smart" toys go out into the masses</span></b><span data-dcnode-id="1691" instrument_node="">
</span></p><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Analysts believe that 2018 will be the year when training toys with the ability to program will become popular.
</span></p><p data-dcnode-id="1684"><b data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">10. Reviving the Wireless Charging Market</span></b><span data-dcnode-id="1685" instrument_node="">
</span></p><p data-dcnode-id="1678"><span data-dcnode-id="1683" instrument_node="">Another trend experts call the growing popularity of wireless charging, which will be facilitated by the support of Apple technology.</span><sup class="reference" data-dcnode-id="1680" id="cite_ref-26"><a data-dcnode-id="1681" href="#cite_note-26" title=""><span data-dcnode-id="1682" instrument_node="">[27]</span></a></sup><span data-dcnode-id="1679" instrument_node="">
</span></p><span data-dcnode-id="1677" instrument_node="">
</span><a data-dcnode-id="1676" id="Top_trends_from_IDC" name="Top_trends_from_IDC"></a><h3 data-dcnode-id="1672"><span data-dcnode-id="1675" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Top trends from IDC</span></span></h3><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1663"><span data-dcnode-id="1670" instrument_node="">In October 2017, the analytical company </span><a class="mw-redirect" data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IDC" title="IDC"><span data-dcnode-id="1669" instrument_node="">IDC</span></a><span data-dcnode-id="1667" instrument_node=""> prepared a forecast for the main IT trends for 2018 and subsequent years. IDC Senior Vice President and Chief Analyst </span><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Person%3AGens_Frank" title="Gens Frank"><span data-dcnode-id="1666" instrument_node="">Frank</span></a><span data-dcnode-id="1664" instrument_node=""> Gens shared a 10-point list during a webinar called "IDC FutureScape: Worldwide IT Industry 2018 Predictions." 
</span></p><span data-dcnode-id="1662" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1655" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="1656" href="/images/8/89/IDC2018predictions.jpg" style="width:842px;"><a class="image" data-dcnode-id="1660"><img alt="" border="0" class="thumbimage" data-dcnode-id="1661" height="578" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/8/89/IDC2018predictions.jpg/840px-IDC2018predictions.jpg&amp;raw" width="840"></a><span data-dcnode-id="1659" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">IDC analysts named 10 key IT trends of 2018 and subsequent years</span></div></div></div><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1653" instrument_node="">1. By 2021, at least 50% of global </span><a data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AGDP_-_Gross_Domestic_Product_%28GDP%29" title="GDP - Gross Domestic Product (GDP)"><span data-dcnode-id="1652" instrument_node="">GDP</span></a><span data-dcnode-id="1650" instrument_node=""> will be associated with digital technologies, and improved products, production processes and relationships will contribute to the further growth of the indicator. By 2020, factors such as the introduction of platforms and ecosystems in the company, the value of data and the degree of customer engagement will be taken into account in assessing the investment attractiveness of any enterprises.
</span></p><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">2. By 2020, 60% of enterprises will have developed strategies for the transition to a digital economy, which will be implemented.
</span></p><p data-dcnode-id="1639"><span data-dcnode-id="1646" instrument_node="">3. By 2021, global spending on cloud services and infrastructure, including hardware, </span><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ASoftware" title="Software"><span data-dcnode-id="1645" instrument_node="">software</span></a><span data-dcnode-id="1643" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cloud_computing" title="Cloud computing"><span data-dcnode-id="1642" instrument_node="">cloud</span></a><span data-dcnode-id="1640" instrument_node=""> services, will double and exceed $530 billion, with more than 90% of all companies using many services and platforms at once.
</span></p><p data-dcnode-id="1628"><span data-dcnode-id="1638" instrument_node="">4. By 2019, 40% of projects related to digital transformation will include the use of artificial </span><a class="mw-redirect" data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="1637" instrument_node="">intelligence</span></a><span data-dcnode-id="1635" instrument_node=""> (AI )-based services, and by 2021, AI elements will be used in 75% of commercial applications for enterprises. By the same time, 90% of customer calls will be processed using </span><a class="new" data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DChat-bot_Virtual_interlocutors%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Chat-bot Virtual interlocutors (такой страницы не существует)"><span data-dcnode-id="1634" instrument_node="">chat bots</span></a><span data-dcnode-id="1632" instrument_node="">, and more than 50% of new industrial </span><a data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ARobots_%28robotics%29" title="Robots (robotics)"><span data-dcnode-id="1631" instrument_node="">robots</span></a><span data-dcnode-id="1629" instrument_node=""> will be endowed with artificial intelligence.
</span></p><p data-dcnode-id="1623"><span data-dcnode-id="1627" instrument_node="">5. By 2021, enterprise applications will see a shift to a "hyperdynamic" (hyper-</span><a class="mw-redirect" data-dcnode-id="1625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AAgile" title="Agile"><span data-dcnode-id="1626" instrument_node="">agile</span></a><span data-dcnode-id="1624" instrument_node="">) architecture, with 80% of applications being developed on cloud platforms using microservices and features, and over 95% of new microservices being deployed in containers.
</span></p><p data-dcnode-id="1609"><span data-dcnode-id="1622" instrument_node="">6. By 2020, </span><a class="mw-redirect" data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Computer" title="Computer"><span data-dcnode-id="1621" instrument_node="">human-computer</span></a><span data-dcnode-id="1619" instrument_node=""> interfaces will become more diverse. 25% of field technicians and the same percentage of IT employees will use </span><a class="mw-redirect" data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AR" title="AR"><span data-dcnode-id="1618" instrument_node="">augmented reality</span></a><span data-dcnode-id="1616" instrument_node=""> technologies, and in almost half of new </span><a class="mw-redirect" data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Mobile_applications" title="Mobile applications"><span data-dcnode-id="1615" instrument_node="">mobile applications</span></a><span data-dcnode-id="1613" instrument_node=""> the main interface will be voice. In addition, 50% of Global 2000 companies focused on working with consumers will use </span><a class="mw-redirect" data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Biometrics" title="Biometrics"><span data-dcnode-id="1612" instrument_node="">biometric</span></a><span data-dcnode-id="1610" instrument_node=""> sensor data to personalize and improve service.
</span></p><span data-dcnode-id="1608" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1601" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="1602" href="/images/e/ef/Cyberworld.jpg" style="width:700px;"><a class="image" data-dcnode-id="1606"><img alt="" border="0" class="thumbimage" data-dcnode-id="1607" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/e/ef/Cyberworld.jpg&amp;raw" width="698"></a><span data-dcnode-id="1605" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">By 2021, global spending on cloud services and infrastructure, including hardware, software and cloud services, will double and exceed $530 billion, IDC predicts</span></div></div></div><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1599" instrument_node="">7. At least a quarter of companies in the Global 2000 rating will use </span><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Blockchain"><span data-dcnode-id="1598" instrument_node="">blockchain</span></a><span data-dcnode-id="1596" instrument_node=""> services widely by 2021 to increase confidence in digital technologies. According to IDC forecasts, by 2020, 25% of the world's leading banks, almost 30% of manufacturers and retailers and 20% of medical organizations will use blockchain in their activities.
</span></p><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">8. By 2020, 90% of large enterprises will receive revenue from data-as-a-service services, as well as from the sale of raw and processed data, analytics and recommendations. In 2017, the share of such companies was close to only 50%.
</span></p><p data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">9. In the next three years, simple development tools that do not require writing code or require it in a limited amount will be significantly improved, which will lead to a rapid increase in the number of non-technical developers. By 2021, they will create 20% of business applications and 30% of new features within applications, and by 2027 this figure will increase to 60%.
</span></p><p data-dcnode-id="1582"><span data-dcnode-id="1590" instrument_node="">10. By 2021, more than 50% of Global 2000 enterprises on average will have about a third of interactions within digital services using their own open </span><a class="mw-redirect" data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/API" title="API"><span data-dcnode-id="1589" instrument_node="">API ecosystems</span></a><span data-dcnode-id="1587" instrument_node="">, while in 2017 this indicator was almost zero.</span><sup class="reference" data-dcnode-id="1584" id="cite_ref-27"><a data-dcnode-id="1585" href="#cite_note-27" title=""><span data-dcnode-id="1586" instrument_node="">[28]</span></a></sup><span data-dcnode-id="1583" instrument_node="">
</span></p><span data-dcnode-id="1581" instrument_node="">
</span><a data-dcnode-id="1580" id="Top_trends_from_Gartner" name="Top_trends_from_Gartner"></a><h3 data-dcnode-id="1576"><span data-dcnode-id="1579" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Top trends from Gartner</span></span></h3><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1555"><a class="mw-redirect" data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AGartner" title="Gartner"><span data-dcnode-id="1574" instrument_node="">Gartner</span></a><span data-dcnode-id="1572" instrument_node=""> analysts at the Gartner Symposium/ITxpo 2017 conference, held in October 2017 in Orlando (</span><a class="mw-redirect" data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/USA" title="USA"><span data-dcnode-id="1571" instrument_node="">USA)</span></a><span data-dcnode-id="1569" instrument_node="">, presented a forecast for the IT market for 2018, taking into account the rapid development of the </span><a class="mw-redirect" data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet_of_Things" title="Internet of Things"><span data-dcnode-id="1568" instrument_node="">Internet of Things (</span></a><span data-dcnode-id="1566" instrument_node=""> IoT </span><a class="mw-redirect" data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IoT" title="IoT"><span data-dcnode-id="1565" instrument_node="">).</span></a><span data-dcnode-id="1563" instrument_node=""> According to experts, in the house of the future coffee machine will be able to recognize the ideal temperature for cooking the drink from the photo from the package of coffee beans sent by the owner from </span><a data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ASmartphones_%28global_market%29" title="Smartphones (global market)"><span data-dcnode-id="1562" instrument_node="">the smartphone, the washing</span></a><span data-dcnode-id="1560" instrument_node=""> machines themselves will set the washing program, scanning the labels on the clothes, and climate systems will learn to monitor the schedule of their maintenance and independently report to the maintenance service problems.</span><sup class="reference" data-dcnode-id="1557" id="cite_ref-28"><a data-dcnode-id="1558" href="#cite_note-28" title=""><span data-dcnode-id="1559" instrument_node="">[29]</span></a></sup><span data-dcnode-id="1556" instrument_node="">
</span></p><span data-dcnode-id="1554" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1547" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="1548" href="/images/a/a3/Тенденции_ИТ-рынка.jpg" style="width:842px;"><a class="image" data-dcnode-id="1552"><img alt="" border="0" class="thumbimage" data-dcnode-id="1553" height="473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/a/a3/%25D0%25A2%25D0%25B5%25D0%25BD%25D0%25B4%25D0%25B5%25D0%25BD%25D1%2586%25D0%25B8%25D0%25B8_%25D0%2598%25D0%25A2-%25D1%2580%25D1%258B%25D0%25BD%25D0%25BA%25D0%25B0.jpg/840px-%25D0%25A2%25D0%25B5%25D0%25BD%25D0%25B4%25D0%25B5%25D0%25BD%25D1%2586%25D0%25B8%25D0%25B8_%25D0%2598%25D0%25A2-%25D1%2580%25D1%258B%25D0%25BD%25D0%25BA%25D0%25B0.jpg&amp;raw" width="840"></a><span data-dcnode-id="1551" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Gartner named 10 IT trends for 2018</span></div></div></div><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Experts outlined 10 key trends and summarized each.
</span></p><p data-dcnode-id="1540"><b data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">1. Consumers choose visual and voice search</span></b><span data-dcnode-id="1541" instrument_node="">
</span></p><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Visual and voice search methods are rapidly gaining popularity and in the future will become the dominant search engines, according to Gartner. Analysts recommend that companies prepare for a change in consumer preferences. By 2021, those brands whose sites will support visual and voice search will be able to increase e-commerce revenue by 30%.
</span></p><p data-dcnode-id="1534"><b data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">2. The Self-Decline of Internet Giants</span></b><span data-dcnode-id="1535" instrument_node="">
</span></p><p data-dcnode-id="1515"><a class="mw-redirect" data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet" title="Internet"><span data-dcnode-id="1533" instrument_node="">Internet giants</span></a><span data-dcnode-id="1531" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Amazon" title="Amazon"><span data-dcnode-id="1530" instrument_node="">Amazon</span></a><span data-dcnode-id="1528" instrument_node="">, </span><a data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AApple" title="Apple"><span data-dcnode-id="1527" instrument_node="">Apple</span></a><span data-dcnode-id="1525" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Facebook" title="Facebook"><span data-dcnode-id="1524" instrument_node="">Facebook</span></a><span data-dcnode-id="1522" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Google" title="Google"><span data-dcnode-id="1521" instrument_node="">Google</span></a><span data-dcnode-id="1519" instrument_node=""> have repeatedly destroyed the accepted way in the industry, introducing new solutions such as </span><a class="new" data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DChat-bot_Virtual_interlocutors%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Chat-bot Virtual interlocutors (такой страницы не существует)"><span data-dcnode-id="1518" instrument_node="">chatbots</span></a><span data-dcnode-id="1516" instrument_node="">, dialog interfaces, visual and voice search mechanisms. However, mega-corporations have grown so much that there are practically no areas unaffected by them. Therefore, in the future, companies can follow the path of self-decline, looking for new opportunities for growth. By 2020, five of the seven existing Internet giants will voluntarily choose this option, according to Gartner.
</span></p><p data-dcnode-id="1511"><b data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">3. Legitimizing cryptocurrencies</span></b><span data-dcnode-id="1512" instrument_node="">
</span></p><p data-dcnode-id="1503"><span data-dcnode-id="1510" instrument_node="">In the future, virtual currencies will be legitimized, as a result of which by 2020 the total volume of operations using </span><a data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ACryptocurrencies_in_Russia" title="Cryptocurrencies in Russia"><span data-dcnode-id="1509" instrument_node="">cryptocurrencies</span></a><span data-dcnode-id="1507" instrument_node=""> and </span><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Blockchain"><span data-dcnode-id="1506" instrument_node="">blockchain</span></a><span data-dcnode-id="1504" instrument_node=""> technology will reach $1 billion.
</span></p><p data-dcnode-id="1499"><b data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">4. The growth of fake news</span></b><span data-dcnode-id="1500" instrument_node="">
</span></p><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">By 2020, most residents of the developed economies of the world will receive more false information than true. Companies should prepare for such a scenario and develop a strategy that reduces opportunities to undermine the authority of their brands.
</span></p><p data-dcnode-id="1493"><b data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">5. Substituting real events with fake reality</span></b><span data-dcnode-id="1494" instrument_node="">
</span></p><p data-dcnode-id="1488"><span data-dcnode-id="1492" instrument_node="">By 2020, the capabilities of </span><a class="mw-redirect" data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="1491" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="1489" instrument_node=""> to create falsified reality ("counterfeit reality"), or, simply put, unreliable content, will surpass the ability to recognize such falsifications.
</span></p><p data-dcnode-id="1484"><b data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">6. Offensive bots</span></b><span data-dcnode-id="1485" instrument_node="">
</span></p><p data-dcnode-id="1476"><span data-dcnode-id="1483" instrument_node="">By 2021, more than 50% of corporations will spend more money annually on </span><a class="new" data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DChat_bot%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Chat bot (такой страницы не существует)"><span data-dcnode-id="1482" instrument_node="">chat bots</span></a><span data-dcnode-id="1480" instrument_node=""> and creating programs that simulate live communication on the </span><a class="mw-redirect" data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet" title="Internet"><span data-dcnode-id="1479" instrument_node="">Internet</span></a><span data-dcnode-id="1477" instrument_node=""> than on the development of traditional mobile applications.
</span></p><p data-dcnode-id="1472"><b data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">7. Versatility instead of specialization</span></b><span data-dcnode-id="1473" instrument_node="">
</span></p><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">By 2021, 40% of IT employees of companies will have a variety of functions, and most of them will be related not to technology, but to business.
</span></p><p data-dcnode-id="1463"><b data-dcnode-id="1465"><span data-dcnode-id="1469" instrument_node="">8. </span><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AArtificial_intelligence_%28AI%2C_Artificial_intelligence%2C_AI%29" title="Product:Artificial intelligence (AI, Artificial intelligence, AI)"><span data-dcnode-id="1468" instrument_node="">Artificial intelligence</span></a><span data-dcnode-id="1466" instrument_node=""> will create more jobs than it takes away</span></b><span data-dcnode-id="1464" instrument_node="">
</span></p><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">In 2020, the introduction of AI technologies will create 2.3 million additional jobs and lead to the liquidation of only 1.8 million jobs.
</span></p><p data-dcnode-id="1457"><b data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">9. IoT in everything</span></b><span data-dcnode-id="1458" instrument_node="">
</span></p><p data-dcnode-id="1452"><span data-dcnode-id="1456" instrument_node="">By 2020, Internet of Things technologies will be present in 95% of the </span><a class="new" data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DElectrical_and_microelectronics%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Electrical and microelectronics (такой страницы не существует)"><span data-dcnode-id="1455" instrument_node="">electronics</span></a><span data-dcnode-id="1453" instrument_node=""> being created.
</span></p><p data-dcnode-id="1448"><b data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">10. Vulnerability of IoT</span></b><span data-dcnode-id="1449" instrument_node="">
</span></p><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Until 2022, half of all funds allocated for security in the IoT sphere will go to eliminate the consequences of cyber incidents and recall devices, and not to protective measures.
</span></p><span data-dcnode-id="1445" instrument_node="">
</span><a data-dcnode-id="1444" id="Top_trends_from_Deloitte" name="Top_trends_from_Deloitte"></a><h3 data-dcnode-id="1440"><span data-dcnode-id="1443" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Top trends from Deloitte</span></span></h3><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1438" instrument_node="">In February 2017, </span><a class="new" data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DConsulting%2C_including_management_and_human_resources%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Consulting, including management and human resources (такой страницы не существует)"><span data-dcnode-id="1437" instrument_node="">the consulting</span></a><span data-dcnode-id="1435" instrument_node=""> company </span><a class="mw-redirect" data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Deloitte" title="Deloitte"><span data-dcnode-id="1434" instrument_node="">Deloitte</span></a><span data-dcnode-id="1432" instrument_node=""> published its eighth annual report on the state of technology in 2017. It was called "Technological trends 2017: Mobile Enterprise," but, according to the company's technical director Bill Briggs, which he voiced in an interview with InformationWeek, in the context of the growing process of business transition to the digital economy, the report could be called another: "Fever Enterprise."
</span></p><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">In it, in particular, Deliotte identified seven of the most promising breakthrough technologies:
</span></p><span data-dcnode-id="1428" instrument_node="">
</span><ul data-dcnode-id="1398"><li data-dcnode-id="1424"><a class="new" data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DDark_Data_and_Dark_Analytics%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Dark Data and Dark Analytics (такой страницы не существует)"><span data-dcnode-id="1427" instrument_node="">Dark Analytics</span></a><span data-dcnode-id="1425" instrument_node="">
</span></li><li data-dcnode-id="1420"><a class="mw-redirect" data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_intelligence" title="Machine intelligence"><span data-dcnode-id="1423" instrument_node="">Machine intelligence</span></a><span data-dcnode-id="1421" instrument_node="">
</span></li><li data-dcnode-id="1416"><a class="new" data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DMixed_reality%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Mixed reality (такой страницы не существует)"><span data-dcnode-id="1419" instrument_node="">Mixed reality</span></a><span data-dcnode-id="1417" instrument_node="">
</span></li><li data-dcnode-id="1412"><a class="new" data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DFlexible_architectures%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Flexible architectures (такой страницы не существует)"><span data-dcnode-id="1415" instrument_node="">Flexible architectures</span></a><span data-dcnode-id="1413" instrument_node="">
</span></li><li data-dcnode-id="1408"><a class="new" data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DEverything_as_a_service_%28XaaS%2C_EaaS%2C_Everything_As_A_Service%29%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Everything as a service (XaaS, EaaS, Everything As A Service) (такой страницы не существует)"><span data-dcnode-id="1411" instrument_node="">Everything as a service (XaaS, EaaS, Everything As A Service)</span></a><span data-dcnode-id="1409" instrument_node="">
</span></li><li data-dcnode-id="1404"><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Blockchain"><span data-dcnode-id="1407" instrument_node="">Blockchain</span></a><span data-dcnode-id="1405" instrument_node="">
</span></li><li data-dcnode-id="1399"><span data-dcnode-id="1403" instrument_node=""> Nanotechnology, biotechnology, </span><a data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AQuantum_Computer_and_Quantum_Communication" title="Quantum Computer and Quantum Communication"><span data-dcnode-id="1402" instrument_node="">quantum computing</span></a><span data-dcnode-id="1400" instrument_node="">.
</span></li></ul><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">
</span></p><p data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">In turn, another group of technologies that will change our idea of ​ ​ IT in the long term are nanotechnology, biotechnology, complex energy systems and quantum technologies. 
</span></p><span data-dcnode-id="1392" instrument_node="">
</span><blockquote data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">"They are only hanging on the horizon, but they will soon begin to change the business models of entire industries," Brigs said.</span></blockquote><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1388" instrument_node="">The arrival of these breakthrough technologies will take three to five years, but when this happens, the speed at which they will affect markets will increase exponentially. At the same time, it should be borne in mind that quantum computers or nanotechnologies can be ahead of blockchain in terms of implementation speed. By the way, in a report 3 years ago, Deloitte mentioned such technologies as </span><a data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AArtificial_intelligence_%28AI%2C_Artificial_intelligence%2C_AI%29" title="Artificial intelligence (AI, Artificial intelligence, AI)"><span data-dcnode-id="1387" instrument_node="">AI</span></a><span data-dcnode-id="1385" instrument_node="">, robotics and </span><a class="mw-redirect" data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cyber_security" title="Cyber security"><span data-dcnode-id="1384" instrument_node="">cybersecurity</span></a><span data-dcnode-id="1382" instrument_node=""> as promising. As we can see, after these years they really became popular.
</span></p><p data-dcnode-id="1376"><span data-dcnode-id="1380" instrument_node="">What suggests that nanomaterials, synthetic biology, new energy storage methods, and quantum computing will be boosted? Investments. The fact is that each of these technologies attracts a significant flow of funds from investors and just in three to five years the period of their payback will come. So far, </span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AIntel" title="Intel"><span data-dcnode-id="1379" instrument_node="">Intel</span></a><span data-dcnode-id="1377" instrument_node=""> supplies chips based on a 14-nm process, but the industry continues to move towards a 1-nm process. This means that computing and networking systems will continue to decrease in size and increase power.
</span></p><p data-dcnode-id="1371"><span data-dcnode-id="1375" instrument_node="">Using renewable sources of energy production, some large companies are beginning to benefit now. For example, </span><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3ATesla_Motors" title="Tesla Motors"><span data-dcnode-id="1374" instrument_node="">Tesla</span></a><span data-dcnode-id="1372" instrument_node=""> will use the Powerpack lithium-ion battery systems to store electricity generated by solar cells at its large Kauai Island Utility Cooperative (KIUC) facility, which is being built in Hawaii. They will allow you to supply electricity throughout the day - even when the sun has set.
</span></p><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">As for synthetic biology, one of the priorities of this science is the creation of genomodified algae. It is assumed that the introduction of piece genes into these plants will lead to a new species capable of producing alcohol for cars. This is especially true in conditions of a constantly polluting environment and global warming.
</span></p><p data-dcnode-id="1361"><span data-dcnode-id="1368" instrument_node="">Deloitte gives a significant place to quantum technologies. Their improvement will allow the production of resistant materials of a new type, while the wave functions of the quantum state will become the basis for creating a new type of computer computing. It is possible that even the simplest </span><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AQuantum_Computer_and_Quantum_Communication" title="Quantum Computer and Quantum Communication"><span data-dcnode-id="1367" instrument_node="">quantum computer</span></a><span data-dcnode-id="1365" instrument_node=""> will be much more powerful than the most modern </span><a class="mw-redirect" data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Supercomputer" title="Supercomputer"><span data-dcnode-id="1364" instrument_node="">supercomputer</span></a><span data-dcnode-id="1362" instrument_node=""> today. 
</span></p><span data-dcnode-id="1360" instrument_node="">
"Multiple increases </span><blockquote data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">in computing power, which until recently seemed unimaginable, could have far-reaching implications," Briggs said.</span></blockquote><span data-dcnode-id="1357" instrument_node="">
</span><a data-dcnode-id="1356" id="2016" name="2016"></a><h2 data-dcnode-id="1352"><span data-dcnode-id="1355" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node=""> 2016 </span></span></h2><span data-dcnode-id="1351" instrument_node="">
</span><a data-dcnode-id="1350" id="Gartner_Key_Trends" name="Gartner_Key_Trends"></a><h3 data-dcnode-id="1346"><span data-dcnode-id="1349" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Gartner Key Trends</span></span></h3><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1341"><a class="mw-redirect" data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AGartner" title="Gartner"><span data-dcnode-id="1344" instrument_node="">Gartner</span></a><span data-dcnode-id="1342" instrument_node=""> analytics company has compiled a list of key next-generation technologies designed for the corporate sector. Experts also evaluated modern technological innovations, looking at them from a new angle of view, and clarified which solutions are at the peak of development, which will be in demand in the very near future, and which are gradually coming to naught.
