</span><div class="thumb tright" data-dcnode-id="1333" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="1334" href="/images/e/ec/Gartner_00.png" style="width:829px;"><a class="image" data-dcnode-id="1338"><img alt="" border="0" class="thumbimage" data-dcnode-id="1339" height="701" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/e/ec/Gartner_00.png&amp;raw" width="827"></a><span data-dcnode-id="1337" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Core Technologies in the Corporate Sector, 2016 Gartner Data</span></div></div></div><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">As you can see in the illustration above, the strategically important technologies that Gartner believes can improve the existing processes and infrastructure of companies (Incremental category) are public and hybrid cloud infrastructures, microservice architectures, digital training, company collaboration products and customer opportunity management through digitalization by 2016. 
</span></p><p data-dcnode-id="1319"><span data-dcnode-id="1329" instrument_node="">Technologies that enterprises need from a tactical point of view include </span><a data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AFog_computing" title="Fog computing"><span data-dcnode-id="1328" instrument_node="">foggy computing</span></a><span data-dcnode-id="1326" instrument_node="">, adaptive </span><a class="mw-redirect" data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cyber_security" title="Cyber security"><span data-dcnode-id="1325" instrument_node="">cybersecurity</span></a><span data-dcnode-id="1323" instrument_node="">, </span><a data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AWearable_Electronics_%28Global_Market%29" title="Wearable Electronics (Global Market)"><span data-dcnode-id="1322" instrument_node="">wearable electronics</span></a><span data-dcnode-id="1320" instrument_node="">, mobile payment systems, integration of working applications, on-demand services and contextual computing.
</span></p><p data-dcnode-id="1296"><span data-dcnode-id="1318" instrument_node="">The study also cites technologies that create new markets or fundamentally change existing ones (Disruptive category). These are </span><a data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Blockchain"><span data-dcnode-id="1317" instrument_node="">blockchain</span></a><span data-dcnode-id="1315" instrument_node="">, </span><a data-dcnode-id="1313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABig_Data" title="Big Data"><span data-dcnode-id="1314" instrument_node="">Big Data</span></a><span data-dcnode-id="1312" instrument_node="">, </span><a data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet_of_Things_%28IoT%29" title="Internet of Things (IoT)"><span data-dcnode-id="1311" instrument_node="">Internet of Things</span></a><span data-dcnode-id="1309" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_Learning" title="Machine Learning"><span data-dcnode-id="1308" instrument_node="">machine learning</span></a><span data-dcnode-id="1306" instrument_node="">, social networks, mobile applications, </span><a class="new" data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3D3D_Printing%26action%3Dedit%26redlink%3D1" rel="nofollow" title="3D Printing (такой страницы не существует)"><span data-dcnode-id="1305" instrument_node="">3D printing</span></a><span data-dcnode-id="1303" instrument_node="">, </span><a data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AVirtual_Reality_%28VR%29" title="Virtual Reality (VR)"><span data-dcnode-id="1302" instrument_node="">virtual reality</span></a><span data-dcnode-id="1300" instrument_node="">, real-time data services and open </span><a class="mw-redirect" data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/API" title="API"><span data-dcnode-id="1299" instrument_node="">APIs</span></a><span data-dcnode-id="1297" instrument_node="">. 
</span></p><p data-dcnode-id="1288"><span data-dcnode-id="1295" instrument_node="">At the peak of development expectations in 2016 were such technological areas as machine learning, </span><a class="mw-redirect" data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cyber_security" title="Cyber security"><span data-dcnode-id="1294" instrument_node="">cybersecurity</span></a><span data-dcnode-id="1292" instrument_node=""> software solutions, </span><a data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ACognitive_computing" title="Cognitive computing"><span data-dcnode-id="1291" instrument_node="">cognitive</span></a><span data-dcnode-id="1289" instrument_node=""> technologies, unmanned vehicles and carbon nanotubes in electronics. 
</span></p><span data-dcnode-id="1287" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1280" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="1281" href="/images/3/3c/Gartner_01.png" style="width:601px;"><a class="image" data-dcnode-id="1285"><img alt="" border="0" class="thumbimage" data-dcnode-id="1286" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/3/3c/Gartner_01.png&amp;raw" width="599"></a><span data-dcnode-id="1284" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Technologies that had high expectations for development in 2016, Gartner data</span></div></div></div><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1278" instrument_node="">Of the innovations in the future, </span><a data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Blockchain"><span data-dcnode-id="1277" instrument_node="">blockchain</span></a><span data-dcnode-id="1275" instrument_node=""> smart </span><a data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ARobots_%28robotics%29" title="Robots (robotics)"><span data-dcnode-id="1274" instrument_node="">robots</span></a><span data-dcnode-id="1272" instrument_node=""> and at home, </span><a class="mw-redirect" data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IoT" title="IoT"><span data-dcnode-id="1271" instrument_node="">IoT</span></a><span data-dcnode-id="1269" instrument_node=""> platforms, quantum computing, personal analytics, 4D printing, voice assistants, etc., will also be in demand.
</span></p><span data-dcnode-id="1267" instrument_node="">
</span><a data-dcnode-id="1266" id="Accenture_Major_Trends" name="Accenture_Major_Trends"></a><h3 data-dcnode-id="1262"><span data-dcnode-id="1265" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Accenture Major Trends</span></span></h3><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1260" instrument_node="">In early February 2016, </span><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AAccenture" title="Accenture"><span data-dcnode-id="1259" instrument_node="">Accenture</span></a><span data-dcnode-id="1257" instrument_node="">, which provides services in the field of management consulting, </span><a class="new" data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DInformation_technology%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Information technology (такой страницы не существует)"><span data-dcnode-id="1256" instrument_node="">information technology</span></a><span data-dcnode-id="1254" instrument_node=""> and outsourcing, announced </span><a class="mw-redirect" data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Outsourcing" title="Outsourcing"><span data-dcnode-id="1253" instrument_node="">the</span></a><span data-dcnode-id="1251" instrument_node=""> results of an annual study of the technology industry. Within it, five main trends were highlighted, following which business needs to achieve success in the digital world.
</span></p><p data-dcnode-id="1246"><b data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Smart Automation</span></b><span data-dcnode-id="1247" instrument_node="">
</span></p><p data-dcnode-id="1235"><span data-dcnode-id="1245" instrument_node="">Accenture experts came to the conclusion that leading companies are actively using robots and </span><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AArtificial_intelligence_%28AI%2C_Artificial_intelligence%2C_AI%29" title="Artificial intelligence (AI, Artificial intelligence, AI)"><span data-dcnode-id="1244" instrument_node="">artificial intelligence </span></a><span data-dcnode-id="1242" instrument_node="">(AI) and </span><a data-dcnode-id="1240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AAugmented_Reality_%28AR%2C_Augmented_Reality%29" title="Augmented Reality (AR, Augmented Reality)"><span data-dcnode-id="1241" instrument_node="">augmented reality</span></a><span data-dcnode-id="1239" instrument_node=""> technologies in order to radically change business and build new more productive relationships between people and machines. According to 70% of the survey participants (there were 3,100 in 11 countries), in 2014-2015 they increased investment in AI solutions. 55% of respondents spoke about plans to actively introduce </span><a class="mw-redirect" data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_Learning" title="Machine Learning"><span data-dcnode-id="1238" instrument_node="">machine learning</span></a><span data-dcnode-id="1236" instrument_node=""> technologies and built-in AI solutions. 
</span></p><span data-dcnode-id="1234" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1227" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="1228" href="/images/a/ad/^8BDA19AD94AEE5E2EDF0177494221A77FFBB2E3C2883F8522E^pimgpsh_fullsize_distr.jpg" style="width:842px;"><a class="image" data-dcnode-id="1232"><img alt="" border="0" class="thumbimage" data-dcnode-id="1233" height="1563" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/a/ad/%255E8BDA19AD94AEE5E2EDF0177494221A77FFBB2E3C2883F8522E%255Epimgpsh_fullsize_distr.jpg/840px-%255E8BDA19AD94AEE5E2EDF0177494221A77FFBB2E3C2883F8522E%255Epimgpsh_fullsize_distr.jpg&amp;raw" width="840"></a><span data-dcnode-id="1231" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Accenture Annual Technology Study Predicts Digital Technologies Will Make Staff a Focus of Companies "Attention Again</span></div></div></div><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1225" instrument_node="">Companies strive for automation: for example, in Singapore, one of the restaurants began to use drones to deliver ordered food, and </span><a class="mw-redirect" data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Siemens_AG" title="Siemens AG"><span data-dcnode-id="1224" instrument_node="">Siemens</span></a><span data-dcnode-id="1222" instrument_node=""> automated one of the factories to the point that it can work without human supervision for several weeks, the study notes. 
</span></p><p data-dcnode-id="1217"><b data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Flexible Workforce</span></b><span data-dcnode-id="1218" instrument_node="">
</span></p><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Participants in the study recognized the benefits of rapidly adapting labor resources, ready to meet the requirements of companies in the digital economy world. Among the main characteristics of personnel, the study participants identified a deep examination of special tasks, rapid learning and the ability to accelerate quickly.
</span></p><p data-dcnode-id="1210"><span data-dcnode-id="1214" instrument_node="">One such example is </span><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AGeneral_Electric_%28GE%29" title="General Electric (GE)"><span data-dcnode-id="1213" instrument_node="">General Electric</span></a><span data-dcnode-id="1211" instrument_node="">, which introduced a new FastWorks management system that reconnected employees with customers and made them much closer.
</span></p><p data-dcnode-id="1206"><b data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Platform economy</span></b><span data-dcnode-id="1207" instrument_node="">
</span></p><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">81% of respondents predict that by the end of 2018, platform business models based on new ecosystems and created on the basis of technology platforms will become part of the main growth strategy of companies.
</span></p><p data-dcnode-id="1193"><span data-dcnode-id="1203" instrument_node="">According to Accenture, by the end of 2015, the total market capitalization of the largest so-called platform companies (</span><a data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AApple" title="Apple"><span data-dcnode-id="1202" instrument_node="">Apple,</span></a><span data-dcnode-id="1200" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Google" title="Google"><span data-dcnode-id="1199" instrument_node="">Google,</span></a><span data-dcnode-id="1197" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Amazon" title="Amazon"><span data-dcnode-id="1196" instrument_node="">Amazon</span></a><span data-dcnode-id="1194" instrument_node="">, etc.) reached $2.6 trillion, and they continue to invest in the development of ecosystems.
</span></p><p data-dcnode-id="1189"><b data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Predictable technological breakthrough</span></b><span data-dcnode-id="1190" instrument_node="">
</span></p><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Accenture notes that the rapid development of digital ecosystems leads to a new wave of technological breakthroughs. Those companies that can predict the direction of ecosystem change have an advantage over competitors. 
</span></p><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">For example, car data used by insurance companies to reduce the cost of paying for insurance for neat drivers has learned to use Google for its own purposes - in the development of unmanned vehicles.
</span></p><p data-dcnode-id="1181"><b data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Building Trust in the Digital World</span></b><span data-dcnode-id="1182" instrument_node="">
</span></p><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">According to 83% of respondents, trust is the basis for the entire digital world. To win it over, analysts recommend that companies focus on ethics and security issues.
</span></p><p data-dcnode-id="1167"><span data-dcnode-id="1178" instrument_node="">This is exactly what </span><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AApple" title="Apple"><span data-dcnode-id="1177" instrument_node="">Apple</span></a><span data-dcnode-id="1175" instrument_node=""> does, which after a series of incidents with user data leakage </span><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AApple_iCloud" title="Apple iCloud"><span data-dcnode-id="1174" instrument_node="">iCloud</span></a><span data-dcnode-id="1172" instrument_node=""> in 2014, began to regain user trust, becoming more transparent in the use of its customers' data.</span><sup class="reference" data-dcnode-id="1169" id="cite_ref-29"><a data-dcnode-id="1170" href="#cite_note-29" title=""><span data-dcnode-id="1171" instrument_node="">[30]</span></a></sup><span data-dcnode-id="1168" instrument_node="">
</span></p><span data-dcnode-id="1166" instrument_node="">
</span><a data-dcnode-id="1165" id="2014:_IDC_Trend_Forecast" name="2014:_IDC_Trend_Forecast"></a><h2 data-dcnode-id="1161"><span data-dcnode-id="1164" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">2014: IDC Trend Forecast</span></span></h2><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1159" instrument_node="">At the end of 2014, </span><a class="mw-redirect" data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IDC" title="IDC"><span data-dcnode-id="1158" instrument_node="">IDC</span></a><span data-dcnode-id="1156" instrument_node=""> analysts made a forecast for the next. Experts specializing in various segments of the ICT industry tried to predict the main technological trends in 2015.</span><sup class="reference" data-dcnode-id="1153" id="cite_ref-30"><a data-dcnode-id="1154" href="#cite_note-30" title=""><span data-dcnode-id="1155" instrument_node="">[31]</span></a></sup><span data-dcnode-id="1152" instrument_node="">
</span></p><p data-dcnode-id="1147"><i data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Development of new technologies</span></i><span data-dcnode-id="1148" instrument_node="">
</span></p><p data-dcnode-id="1136"><span data-dcnode-id="1146" instrument_node="">According to IDC estimates, in 2015, global ICT spending will grow by 3.8% compared to 2014 and exceed $3.8 trillion. The main drivers of growth are </span><a class="mw-redirect" data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cloud_computing" title="Cloud computing"><span data-dcnode-id="1145" instrument_node="">called cloud</span></a><span data-dcnode-id="1143" instrument_node=""> and mobile technologies, </span><a class="mw-redirect" data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Social_networks" title="Social networks"><span data-dcnode-id="1142" instrument_node="">social networks</span></a><span data-dcnode-id="1140" instrument_node=""> and big </span><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABig_Data" title="Big Data"><span data-dcnode-id="1139" instrument_node="">data (Big Data).</span></a><span data-dcnode-id="1137" instrument_node="">
</span></p><p data-dcnode-id="1132"><i data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Wireless Data Traffic Growth</span></i><span data-dcnode-id="1133" instrument_node="">
</span></p><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Experts expect that the costs of operators for wireless data transmission will become the largest ($536 billion) and fastest growing (13%) segment of the telecommunications industry. 
</span></p><p data-dcnode-id="1126"><a class="new" data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DFayl%3AIHwivuQLY.jpg%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Fayl:IHwivuQLY.jpg (такой страницы не существует)"><span data-dcnode-id="1129" instrument_node="">fayl:IHwivuQLY.jpg‎</span></a><span data-dcnode-id="1127" instrument_node="">
</span></p><p data-dcnode-id="1122"><i data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Named the top 10 IT trends of 2015</span></i><span data-dcnode-id="1123" instrument_node="">
</span></p><p data-dcnode-id="1118"><i data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Phablets and wearable electronics</span></i><span data-dcnode-id="1119" instrument_node="">
</span></p><p data-dcnode-id="1113"><span data-dcnode-id="1117" instrument_node="">Sales of mobile devices and applications for them in 2015 will reach $484 billion and will provide a 40 percent contribution to the growth of the IT industry, analysts predict. In their opinion, a further upturn in the </span><a class="mw-redirect" data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Smartphone" title="Smartphone"><span data-dcnode-id="1116" instrument_node="">smartphone</span></a><span data-dcnode-id="1114" instrument_node=""> market will be associated with phablets and corporate mobile applications. 
</span></p><p data-dcnode-id="1108"><span data-dcnode-id="1112" instrument_node="">As for </span><a data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AWearable_Electronics_%28Global_Market%29" title="Wearable Electronics (Global Market)"><span data-dcnode-id="1111" instrument_node="">wearable electronics</span></a><span data-dcnode-id="1109" instrument_node="">, it is predicted an innovative breakthrough and sales volume of 40-50 million units in 2015.
</span></p><p data-dcnode-id="1104"><i data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Cloud Services</span></i><span data-dcnode-id="1105" instrument_node="">
</span></p><p data-dcnode-id="1087"><span data-dcnode-id="1103" instrument_node="">IDC predicts the volume of the cloud solutions market at $118 billion in 2015. The highest growth rate, measured by 36 per cent, will demonstrate </span><a class="mw-redirect" data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IaaS" title="IaaS"><span data-dcnode-id="1102" instrument_node="">IaaS</span></a><span data-dcnode-id="1100" instrument_node=""> solutions. Frank Gens, senior vice president and lead analyst at IDC, believes that new and very unexpected alliances, such as </span><a class="mw-redirect" data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Facebook" title="Facebook"><span data-dcnode-id="1099" instrument_node="">Facebook</span></a><span data-dcnode-id="1097" instrument_node=""> with </span><a class="mw-redirect" data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Microsoft" title="Microsoft"><span data-dcnode-id="1096" instrument_node="">Microsoft</span></a><span data-dcnode-id="1094" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Amazon" title="Amazon"><span data-dcnode-id="1093" instrument_node="">Amazon</span></a><span data-dcnode-id="1091" instrument_node=""> with </span><a class="mw-redirect" data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/HP" title="HP"><span data-dcnode-id="1090" instrument_node="">HP</span></a><span data-dcnode-id="1088" instrument_node="">, could form in the market, leading to expanded market opportunities. 
</span></p><p data-dcnode-id="1083"><i data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Big Data and Analytics</span></i><span data-dcnode-id="1084" instrument_node="">
</span></p><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Due to the growing consumption of multimedia content, the cost of processing and analyzing large amounts of data can exceed $125 billion.
</span></p><p data-dcnode-id="1077"><i data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Internet of Things</span></i><span data-dcnode-id="1078" instrument_node="">
</span></p><p data-dcnode-id="1066"><span data-dcnode-id="1076" instrument_node="">This market, according to IDC, is a fundamental factor in the rise of the so-called "</span><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AThird_platform_%28the_3rd_platform%29" title="Third platform (the 3rd platform)"><span data-dcnode-id="1075" instrument_node="">third platform</span></a><span data-dcnode-id="1073" instrument_node="">." Analysts include a new generation of computing systems emerging under the influence of cloud and mobile technologies, social networks and </span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABig_Data" title="Article:Big Data"><span data-dcnode-id="1072" instrument_node="">big data</span></a><span data-dcnode-id="1070" instrument_node="">. In 2015, even smarter devices are expected to emerge, and about a third of the costs in the </span><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet_of_Things_%28IoT%29" title="Internet of Things (IoT)"><span data-dcnode-id="1069" instrument_node="">Internet of Things</span></a><span data-dcnode-id="1067" instrument_node=""> market will be focused on embedded electronics and diagnostic equipment. 
</span></p><p data-dcnode-id="1060"><i data-dcnode-id="1062"><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/DPC" title="DPC"><span data-dcnode-id="1065" instrument_node="">Data Centers</span></a><span data-dcnode-id="1063" instrument_node=""> with Cloud Focus</span></i><span data-dcnode-id="1061" instrument_node="">
</span></p><p data-dcnode-id="1046"><span data-dcnode-id="1059" instrument_node="">In view of the fundamental transformation of the market, </span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/DPC" title="DPC"><span data-dcnode-id="1058" instrument_node="">data centers</span></a><span data-dcnode-id="1056" instrument_node=""> where clouds play an increasingly important role, the very idea of. </span><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/DPC" title="DPC"><span data-dcnode-id="1055" instrument_node="">DPC</span></a><span data-dcnode-id="1053" instrument_node=""> Experts are confident that new equipment will be created with an eye on cloud technologies, which will cause consolidation among manufacturers of servers, disk </span><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ASoftware" title="Software"><span data-dcnode-id="1052" instrument_node="">ON</span></a><span data-dcnode-id="1050" instrument_node=""> storage and network equipment. IDC predicts two or three large </span><a class="mw-redirect" data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/M%2526A" title="M&amp;A"><span data-dcnode-id="1049" instrument_node="">M&amp;A</span></a><span data-dcnode-id="1047" instrument_node=""> deals next year.
</span></p><p data-dcnode-id="1042"><i data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Rapid expansion of dedicated digital platforms</span></i><span data-dcnode-id="1043" instrument_node="">
</span></p><p data-dcnode-id="1037"><span data-dcnode-id="1041" instrument_node="">As new technologies unite, innovative business platforms are created that can change each industry. As examples, analysts cite alternative payment systems in the financial sector, the spread of the "Internet of things" in the field of urban security and public </span><a class="mw-redirect" data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Transport" title="Transport"><span data-dcnode-id="1040" instrument_node="">transport, and</span></a><span data-dcnode-id="1038" instrument_node=""> the expansion of geolocation services for retail business. In 2015, experts predict that the number of industry specialized platforms will double and reach 60.
</span></p><p data-dcnode-id="1031"><i data-dcnode-id="1033"><span data-dcnode-id="1036" instrument_node="">Security and </span><a class="new" data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3D3D_Printing%26action%3Dedit%26redlink%3D1" rel="nofollow" title="3D Printing (такой страницы не существует)"><span data-dcnode-id="1035" instrument_node="">3D Printing</span></a></i><span data-dcnode-id="1032" instrument_node="">
</span></p><p data-dcnode-id="1026"><span data-dcnode-id="1030" instrument_node="">Analysts expect increased attention to </span><a class="mw-redirect" data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Information_security" title="Information security"><span data-dcnode-id="1029" instrument_node="">information security</span></a><span data-dcnode-id="1027" instrument_node=""> and 3D printing technologies. The latter is actively interested in manufacturers of traditional printing equipment, which can help for the rapid growth of the 3D printer market in 2015.
</span></p><p data-dcnode-id="1018"><span data-dcnode-id="1025" instrument_node="">Safety will remain one of the main technological trends in 2015. This will be facilitated by the emergence of </span><a data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IB_-_Biometric_identification" title="IB - Biometric identification"><span data-dcnode-id="1024" instrument_node="">biometric</span></a><span data-dcnode-id="1022" instrument_node=""> sensors in smartphones, the development of technologies </span><a class="mw-redirect" data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Enciphering" title="Enciphering"><span data-dcnode-id="1021" instrument_node="">for encrypting</span></a><span data-dcnode-id="1019" instrument_node=""> data in the cloud and corporate tools for warning about cyber threats. 
</span></p><p data-dcnode-id="1013"><i data-dcnode-id="1015"><a class="mw-redirect" data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/China" title="China"><span data-dcnode-id="1017" instrument_node="">China</span></a></i><span data-dcnode-id="1014" instrument_node="">
</span></p><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">According to IDC forecasts, approximately 43% of the growth of the global ICT industry will fall on the Chinese market in 2015. Every third smartphone in the world will be purchased in the Middle Kingdom, from there 30% of online purchases will come.
</span></p><span data-dcnode-id="1010" instrument_node="">
</span><a data-dcnode-id="1009" id="2013" name="2013"></a><h2 data-dcnode-id="1005"><span data-dcnode-id="1008" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node=""> 2013 </span></span></h2><span data-dcnode-id="1004" instrument_node="">
</span><a data-dcnode-id="1003" id="10_trends_from_IDC_for_Chief_information_officer.27s_to_2018" name="10_trends_from_IDC_for_Chief_information_officer.27s_to_2018"></a><h3 data-dcnode-id="999"><span data-dcnode-id="1002" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">10 trends from IDC for Chief information officer's to 2018</span></span></h3><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="997" instrument_node="">In December 2013, </span><a class="mw-redirect" data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IDC" title="IDC"><span data-dcnode-id="996" instrument_node="">IDC</span></a><span data-dcnode-id="994" instrument_node=""> launched</span><sup class="reference" data-dcnode-id="991" id="cite_ref-_31-0"><a data-dcnode-id="992" href="#cite_note--31" title=""><span data-dcnode-id="993" instrument_node="">[32]</span></a></sup><span data-dcnode-id="990" instrument_node=""> with a range of futuristic forecasts regarding the development of the IT industry for the next five years. IDC analysts continued to actively promote their idea of ​ ​ a </span><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AThird_platform_%28the_3rd_platform%29" title="Third platform (the 3rd platform)"><span data-dcnode-id="989" instrument_node="">"third platform"</span></a><span data-dcnode-id="987" instrument_node=""> (a combination of mobile, </span><a data-dcnode-id="985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cloud_Computing" title="Cloud Computing"><span data-dcnode-id="986" instrument_node="">cloud</span></a><span data-dcnode-id="984" instrument_node=""> and social technologies, coupled with </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABig_Data" title="Big Data"><span data-dcnode-id="983" instrument_node="">big data)</span></a><span data-dcnode-id="981" instrument_node="">, which, in their opinion, will radically change the </span><a class="new" data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DInformation_technology%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Information technology (такой страницы не существует)"><span data-dcnode-id="980" instrument_node="">information technology</span></a><span data-dcnode-id="978" instrument_node=""> landscape in the near future. 
</span></p><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">The top 10 IDC predictions through 2018 are as follows: 
</span></p><span data-dcnode-id="974" instrument_node="">
</span><ul data-dcnode-id="971"><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">In the  next two years, more than 70% of Chief information officers will change their role in organizations: they will move away from direct information technology management and rather become innovative partners. 
</span></li></ul><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">
</span></p><span data-dcnode-id="967" instrument_node="">
</span><ul data-dcnode-id="964"><li data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">By  2017, only 40% of Chief information officers, however, will advance from participating in operational planning in favor of strategic planning. 
</span></li></ul><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">
</span></p><span data-dcnode-id="960" instrument_node="">
</span><ul data-dcnode-id="957"><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node=""> 70% of Chief information officers will be able to increase the readiness of enterprises for risk projects. 
</span></li></ul><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">
</span></p><span data-dcnode-id="953" instrument_node="">
</span><ul data-dcnode-id="950"><li data-dcnode-id="951"><span data-dcnode-id="952" instrument_node=""> Mobile technologies for business will use 60% of Chief information officers by 2017 to create a flexible infrastructure. 
</span></li></ul><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">
</span></p><span data-dcnode-id="946" instrument_node="">
</span><ul data-dcnode-id="943"><li data-dcnode-id="944"><span data-dcnode-id="945" instrument_node=""> The demographic shift will make key IT users younger, forcing 80% of Chief information officers to develop end-user-oriented solutions, as well as integrate business systems with social networks by 2015. 
</span></li></ul><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">
</span></p><span data-dcnode-id="939" instrument_node="">
</span><ul data-dcnode-id="936"><li data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">By  2015, the development of the "third platform" will force 60% of Chief information officers to more actively use enterprise architecture (EA).
</span></li></ul><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">
</span></p><span data-dcnode-id="932" instrument_node="">
</span><ul data-dcnode-id="929"><li data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">By  2015, 60% of Chief information officer's budgets for information security will be 30-40% less than needed for effective threat protection. 
</span></li></ul><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">
</span></p><span data-dcnode-id="925" instrument_node="">
</span><ul data-dcnode-id="922"><li data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">By  2017, 60% of Chief information officers will be faced with the need to reduce infrastructure and operations costs. 
</span></li></ul><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">
</span></p><span data-dcnode-id="918" instrument_node="">
</span><ul data-dcnode-id="915"><li data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">By  2016, 80% of IT budgets will be dedicated to service integration. 
</span></li></ul><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">
</span></p><span data-dcnode-id="911" instrument_node="">
</span><ul data-dcnode-id="908"><li data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">By  2018, the adaptation of the "third platform" will change 90% of the roles in IT.
</span></li></ul><span data-dcnode-id="907" instrument_node="">

</span></p><span data-dcnode-id="904" instrument_node="">
</span><a data-dcnode-id="903" id="10_trends_for_2013_from_Gartner" name="10_trends_for_2013_from_Gartner"></a><h3 data-dcnode-id="899"><span data-dcnode-id="902" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">10 trends for 2013 from Gartner</span></span></h3><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="890"><a class="mw-redirect" data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AGartner" title="Gartner"><span data-dcnode-id="897" instrument_node="">Gartner</span></a><span data-dcnode-id="895" instrument_node=""> named</span><sup class="reference" data-dcnode-id="892" id="cite_ref-a_32-0"><a data-dcnode-id="893" href="#cite_note-a-32" title=""><span data-dcnode-id="894" instrument_node="">[33]</span></a></sup><span data-dcnode-id="891" instrument_node=""> 10 top technology trends for 2013. These are strategic technologies that will influence the market in the longer term - in the next three years. 
</span></p><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Gartner experts warn that a list of 10 strategic technologies does not have to fit completely each particular company, but strongly recommend "trying it on" to all enterprises without exception. It is also interesting that all these technologies were born on the basis of the hottest IT trends of our time - social data, mobility, cloud solutions and large amounts of information.
</span></p><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Such technologies can also include those that have long been on the market, but at some point have reached the stage of "maturity" when they become available to a wide range of users, thereby having a significant impact on the economy. New technologies can also be strategic, which can create serious competitive advantages for their first users, creating the prerequisites for their deeper penetration in the next five years. 
</span></p><p data-dcnode-id="882"><i data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Mobile Penetration Everywhere</span></i><span data-dcnode-id="883" instrument_node="">
</span></p><p data-dcnode-id="865"><span data-dcnode-id="881" instrument_node="">Already in 2013, according to Gartner, mobile phones will surpass PCs in terms of Internet access, and by 2015, 80% of phones sold in mature markets will be classified as </span><a class="mw-redirect" data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Smartphone" title="Smartphone"><span data-dcnode-id="880" instrument_node="">smartphones</span></a><span data-dcnode-id="878" instrument_node="">. Only 20% of these devices will run on the Windows </span><a class="mw-redirect" data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/OS" title="OS"><span data-dcnode-id="877" instrument_node="">operating system</span></a><span data-dcnode-id="875" instrument_node="">. At the same time, by 2015, the supply of media tablets will amount to about 50% of the supply of laptops, and Windows 8 will be in third place in popularity in </span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AAndroid" title="Android"><span data-dcnode-id="874" instrument_node="">Android</span></a><span data-dcnode-id="872" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IOS" title="IOS"><span data-dcnode-id="871" instrument_node="">iOS</span></a><span data-dcnode-id="869" instrument_node=""> posts. Consulting at the same time will lead to the fact that enterprises will not be able to dictate to their employees the choice of mobile device platforms, so that they will have to support a wide range of platforms and forms of factors, preventing the ability to standardize equipment. At the change of era PCs with dominant Windows will come the post-PC era, where </span><a class="mw-redirect" data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Windows" title="Windows"><span data-dcnode-id="868" instrument_node="">Windows</span></a><span data-dcnode-id="866" instrument_node=""> will be only one of many popular systems. 
</span></p><p data-dcnode-id="861"><i data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Mobile Apps and HTML5</span></i><span data-dcnode-id="862" instrument_node="">
</span></p><p data-dcnode-id="856"><span data-dcnode-id="860" instrument_node="">More than 100 potential vendors of tools for creating custom applications will appear on the market. Now Gartner divides mobile development tools into several categories, and in the near future it is impossible to single out one as the most optimal. However, there will be a significant jump from "home" applications in favor of web applications, largely due to the growing popularity of </span><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AHTML5" title="HTML5"><span data-dcnode-id="859" instrument_node="">HTML5</span></a><span data-dcnode-id="857" instrument_node="">. The developer will also have to seriously work to ensure that applications with a touch interface function correctly on most platforms. 
</span></p><p data-dcnode-id="852"><i data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Private clouds</span></i><span data-dcnode-id="853" instrument_node="">
</span></p><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Private cloud systems will largely replace PCs as the place where private users store most of their data, being both an access point to services and personal settings. Private clouds will become like "glue," combining different types of devices used by modern people in everyday life. At the same time, no platform, vendor or technology will be able to dominate the cloud world.
</span></p><p data-dcnode-id="846"><i data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Enterprise App Stores</span></i><span data-dcnode-id="847" instrument_node="">
</span></p><p data-dcnode-id="841"><span data-dcnode-id="845" instrument_node="">Businesses will have to build their own app stores in the future, as some vendors will limit the use of their apps on a number of platforms, which will force enterprise users to interact with many app stores, using many concurrent payment transactions and licensing agreements. So by 2014, many companies will acquire their own "App Store," which will supply employees of these companies with the necessary </span><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ASoftware" title="Software"><span data-dcnode-id="844" instrument_node="">software</span></a><span data-dcnode-id="842" instrument_node=""> in private. 
</span></p><p data-dcnode-id="836"><i data-dcnode-id="838"><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet_of_Things_%28IoT%29" title="Internet of Things (IoT)"><span data-dcnode-id="840" instrument_node="">Internet of Things</span></a></i><span data-dcnode-id="837" instrument_node="">
</span></p><p data-dcnode-id="816"><span data-dcnode-id="835" instrument_node="">The Internet of Things (</span><a class="mw-redirect" data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IoT" title="IoT"><span data-dcnode-id="834" instrument_node="">IoT</span></a><span data-dcnode-id="832" instrument_node="">) is a concept that describes how the Internet expands its influence on physical devices and ensures their </span><a class="new" data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DTelecommunications_and_communications%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Telecommunications and communications (такой страницы не существует)"><span data-dcnode-id="831" instrument_node="">connection</span></a><span data-dcnode-id="829" instrument_node=""> to the global network. The key physical elements of </span><a class="mw-redirect" data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet" title="Internet"><span data-dcnode-id="828" instrument_node="">the Internet</span></a><span data-dcnode-id="826" instrument_node=""> of Things are mobile devices, sensors, image recognition technologies and NFC. In addition, mobile technologies are embedded not only in smarftons and tablets, but also, for example, pharmaceutical containers or cars. According to this concept, </span><a class="mw-redirect" data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Smartphone" title="Smartphone"><span data-dcnode-id="825" instrument_node="">smartphones</span></a><span data-dcnode-id="823" instrument_node=""> and other intelligent devices can communicate through NFC, </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABluetooth" title="Bluetooth"><span data-dcnode-id="822" instrument_node="">Bluetooth,</span></a><span data-dcnode-id="820" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AWi-Fi" title="Wi-Fi"><span data-dcnode-id="819" instrument_node="">Wi-Fi</span></a><span data-dcnode-id="817" instrument_node=""> with a wide range of devices and peripheral devices, such as displays, medical sensors, life support systems for buildings and many others. A huge number of new services will be created on the basis of this ecosystem. 
</span></p><p data-dcnode-id="812"><i data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Hybrid and Cloud Technologies</span></i><span data-dcnode-id="813" instrument_node="">
</span></p><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">As companies face the challenge of doing more with less, IT departments will play a central role in coordinating emerging IT activities, with cloud solutions taking the process to a new level. This means that IT departments will become a kind of "broker" of cloud services, controlling their distribution to internal users and effective use. 
</span></p><p data-dcnode-id="806"><i data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Big Data</span></i><span data-dcnode-id="807" instrument_node="">
</span></p><p data-dcnode-id="802"><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABig_Data" title="Big Data"><span data-dcnode-id="805" instrument_node="">Big Data</span></a><span data-dcnode-id="803" instrument_node=""> is becoming one of the key strategic factors affecting the information architecture of the business. Working with so much data is changing many traditional approaches. In particular, many organizations will abandon the use of single enterprise data warehouses in favor of a multi-system model. Such systems will include content management systems, data warehouses, data storefronts, specialized file systems, date-related services and meta-data, which in total will become a single "logical" repository of information. 
</span></p><p data-dcnode-id="798"><i data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Analytics in Action</span></i><span data-dcnode-id="799" instrument_node="">
</span></p><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Analytics are increasingly delivered to users at the time of action and in a specific context. IT managers are thus able to perform analyses and simulations for each activity. Mobile customers can use online analytics anytime and anywhere. All this together makes decision-making more flexible and efficient. 
</span></p><p data-dcnode-id="792"><i data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Computing in RAM</span></i><span data-dcnode-id="793" instrument_node="">
</span></p><p data-dcnode-id="785"><a class="new" data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DIn-Memory_Computing%26action%3Dedit%26redlink%3D1" rel="nofollow" title="In-Memory Computing (такой страницы не существует)"><span data-dcnode-id="791" instrument_node="">In</span></a><span data-dcnode-id="789" instrument_node=""> memory </span><a class="new" data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DIn-Memory_Computing%26action%3Dedit%26redlink%3D1" rel="nofollow" title="In-Memory Computing (такой страницы не существует)"><span data-dcnode-id="788" instrument_node=""> computing</span></a><span data-dcnode-id="786" instrument_node=""> also has the potential to transform the business. These technologies allow you to perform some complex processes in minutes and even seconds, which leads to the creation of new real-time information services that can be delivered to users in the form of cloud services. Numerous vendors will present their decisions in this area in the next two years. 
</span></p><p data-dcnode-id="781"><i data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Integrated ecosystems</span></i><span data-dcnode-id="782" instrument_node="">
</span></p><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">The IT market as a whole is undergoing a shift to more integrated systems and ecosystems compared to the heterogeneous approach that has prevailed until recently. This trend is manifested at three levels. Hardware combines hardware and software, and software and services are packaged for the appropriate application infrastructure and workload.
</span></p><span data-dcnode-id="778" instrument_node="">
