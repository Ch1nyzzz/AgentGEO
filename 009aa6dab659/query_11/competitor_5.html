</span><div class="thumb tright" data-dcnode-id="2626" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="2627" href="/images/e/ef/Top-10-technology-trends-2019-hero1551642197984.jpg" style="width:842px;"><a class="image" data-dcnode-id="2634"><img alt="" border="0" class="thumbimage" data-dcnode-id="2635" height="302" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/e/ef/Top-10-technology-trends-2019-hero1551642197984.jpg/840px-Top-10-technology-trends-2019-hero1551642197984.jpg&amp;raw" width="840"></a><span data-dcnode-id="2633" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2628"><span data-dcnode-id="2632" instrument_node="">In April 2019, the analyst company </span><a class="mw-redirect" data-dcnode-id="2630" title="Gartner"><span data-dcnode-id="2631" instrument_node="">Gartner</span></a><span data-dcnode-id="2629" instrument_node=""> named 10 technological trends for 2019</span></div></div></div><span data-dcnode-id="2625" instrument_node="">
</span><p data-dcnode-id="2621"><b data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">7. Blockchain</span></b><span data-dcnode-id="2622" instrument_node="">
</span></p><p data-dcnode-id="2617"><a data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Blockchain"><span data-dcnode-id="2620" instrument_node="">Blockchain</span></a><span data-dcnode-id="2618" instrument_node=""> is potentially able to reduce costs, reduce transaction settlement times and improve cash flow. Blockchain has also opened the way to many solutions that use its individual elements and advantages, although they do not yet implement the decentralized network model.&nbsp;
</span></p><p data-dcnode-id="2613"><b data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">8. Smart Spaces</span></b><span data-dcnode-id="2614" instrument_node="">
</span></p><p data-dcnode-id="2608"><span data-dcnode-id="2612" instrument_node="">A "smart" space is a physical or digital environment in which people and information systems interact. Smart spaces develop in five key areas: openness, connectivity, coordination, intelligence and scale. The most developed example is </span><a class="mw-redirect" data-dcnode-id="2610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Smart_city" title="Smart city"><span data-dcnode-id="2611" instrument_node="">smart cities</span></a><span data-dcnode-id="2609" instrument_node="">.
</span></p><p data-dcnode-id="2604"><b data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">9. Digital Ethics and Privacy</span></b><span data-dcnode-id="2605" instrument_node="">
</span></p><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Governments are tightening digital ethics and privacy laws, and consumers are closely monitoring the use of personal information. Enterprises that do not pay attention to this aspect risk losing customers.
</span></p><p data-dcnode-id="2596"><b data-dcnode-id="2598"><span data-dcnode-id="2601" instrument_node="">10. </span><a class="new" data-dcnode-id="2599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DQuantum_computing%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Quantum computing (такой страницы не существует)"><span data-dcnode-id="2600" instrument_node="">Quantum computing</span></a></b><span data-dcnode-id="2597" instrument_node="">
</span></p><p data-dcnode-id="2591"><span data-dcnode-id="2595" instrument_node="">Quantum computers are able to completely change personalized medicine, optimizing </span><a class="mw-redirect" data-dcnode-id="2593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_Learning" title="Machine Learning"><span data-dcnode-id="2594" instrument_node="">machine learning</span></a><span data-dcnode-id="2592" instrument_node=""> and AI, material research and other fields. However, by April 2019, the technology is in its infancy. 
</span></p><p data-dcnode-id="2587"><a class="external text" data-dcnode-id="2589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tadviser.ru/images/6/6b/3891569-top-10-strategic-technology-trends-for-2019.pdf" rel="nofollow" target="_blank" title="http://www.tadviser.ru/images/6/6b/3891569-top-10-strategic-technology-trends-for-2019.pdf"><span data-dcnode-id="2590" instrument_node="">Reference to Gartner material</span></a><span data-dcnode-id="2588" instrument_node="">.
</span></p><span data-dcnode-id="2586" instrument_node="">
</span><a data-dcnode-id="2585" id="Top_10_trends_in_data_management_and_analysis" name="Top_10_trends_in_data_management_and_analysis"></a><h3 data-dcnode-id="2581"><span data-dcnode-id="2584" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">Top 10 trends in data management and analysis</span></span></h3><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2572"><span data-dcnode-id="2579" instrument_node="">On February 19, 2019, </span><a class="mw-redirect" data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AGartner" title="Gartner"><span data-dcnode-id="2578" instrument_node="">Gartner</span></a><span data-dcnode-id="2576" instrument_node=""> presented 10 trends in data management and analysis for 2019 and subsequent years. More details </span><a class="new" data-dcnode-id="2574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DBI_Market_Trends%26action%3Dedit%26redlink%3D1" rel="nofollow" title="BI Market Trends (такой страницы не существует)"><span data-dcnode-id="2575" instrument_node="">here</span></a><span data-dcnode-id="2573" instrument_node="">.
</span></p><span data-dcnode-id="2571" instrument_node="">
</span><a data-dcnode-id="2570" id="2018" name="2018"></a><h2 data-dcnode-id="2566"><span data-dcnode-id="2569" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node=""> 2018 </span></span></h2><span data-dcnode-id="2565" instrument_node="">
</span><a data-dcnode-id="2564" id="IDC_compiled_key_forecasts_for_Chief_information_officer.27s_for_2019_and_beyond" name="IDC_compiled_key_forecasts_for_Chief_information_officer.27s_for_2019_and_beyond"></a><h3 data-dcnode-id="2560"><span data-dcnode-id="2563" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">IDC compiled key forecasts for Chief information officer's for 2019 and beyond</span></span></h3><span data-dcnode-id="2559" instrument_node="">
</span><p data-dcnode-id="2554"><span data-dcnode-id="2558" instrument_node="">On October 31, 2018, the analytical company </span><a class="mw-redirect" data-dcnode-id="2556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IDC" title="IDC"><span data-dcnode-id="2557" instrument_node="">IDC</span></a><span data-dcnode-id="2555" instrument_node=""> announced a list of trends that, according to experts, Chief information officers will face in 2019 and subsequent years. Such managers should be flexible, interoperable and results-oriented.
</span></p><p data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">IDC expects big changes in the role of CIO as their own needs and strategy evolve. They are striving to rebuild themselves in connection with the exponential pace of digital transformation, the report notes. The main forecasts for Chief information officers are as follows:
</span></p><span data-dcnode-id="2551" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2544" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="2545" href="/images/0/0a/Chief-information-officers.jpg" style="width:842px;"><a class="image" data-dcnode-id="2549"><img alt="" border="0" class="thumbimage" data-dcnode-id="2550" height="560" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/0/0a/Chief-information-officers.jpg/840px-Chief-information-officers.jpg&amp;raw" width="840"></a><span data-dcnode-id="2548" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">IT Chief information officers need to be flexible, interoperable and results-oriented, IDC analysts say</span></div></div></div><span data-dcnode-id="2543" instrument_node="">
</span><p data-dcnode-id="2535"><span data-dcnode-id="2542" instrument_node="">1. By 2021, 70% of Chief information officers, due to a kind of activity, will use </span><a class="mw-redirect" data-dcnode-id="2540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AAgile" title="Agile"><span data-dcnode-id="2541" instrument_node="">Agile-interaction</span></a><span data-dcnode-id="2539" instrument_node=""> through </span><a class="mw-redirect" data-dcnode-id="2537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/API" title="API"><span data-dcnode-id="2538" instrument_node="">APIs</span></a><span data-dcnode-id="2536" instrument_node=""> and architectures that connect digital solutions from cloud vendors, system developers, startups, etc. 
</span></p><p data-dcnode-id="2530"><span data-dcnode-id="2534" instrument_node="">2. According to researchers, by 2021, 70% of Chief information officers will actively use data and </span><a class="mw-redirect" data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="2533" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="2531" instrument_node=""> in IT operations, tools and processes. This will be pushed by the need to reduce costs, improve corporate IT flexibility and accelerate innovation.
</span></p><p data-dcnode-id="2525"><span data-dcnode-id="2529" instrument_node="">3. By 2022, 65% of companies will commission their Chief information officers to transform and modernize enterprise management policies to take advantage of new opportunities and counter new risks created by artificial intelligence, </span><a class="mw-redirect" data-dcnode-id="2527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_learning" title="Machine learning"><span data-dcnode-id="2528" instrument_node="">machine learning</span></a><span data-dcnode-id="2526" instrument_node="">, privacy and ethics in the field of data.
</span></p><p data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">4. 75% of successful digital strategies by 2022 will be built by transformed IT organizations with upgraded and streamlined infrastructure, applications, and data architectures.
</span></p><p data-dcnode-id="2518"><span data-dcnode-id="2522" instrument_node="">5. By 2020, the engagement of 80% of Chief information officers in executive management will pay off by achieving key indicators that determine the efficiency of using </span><a class="new" data-dcnode-id="2520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DInformation_technology%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Information technology (такой страницы не существует)"><span data-dcnode-id="2521" instrument_node="">IT</span></a><span data-dcnode-id="2519" instrument_node=""> to increase business productivity and growth. 
</span></p><p data-dcnode-id="2513"><span data-dcnode-id="2517" instrument_node="">6. By 2020, about 60% of Chief information officers will begin to create systems of trust in digital technologies that go beyond the prevention of </span><a class="mw-redirect" data-dcnode-id="2515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cyber_attacks" title="Cyber attacks"><span data-dcnode-id="2516" instrument_node="">cyber attacks</span></a><span data-dcnode-id="2514" instrument_node=""> and allow companies to sustainably recover from adverse situations, events and effects.
</span></p><p data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">7. By 2022, 75% of Chief information officers who do not shift their organizational responsibilities to authorized IT product development groups to promote digital innovation, new technology development, and business scaling will not cope with their tasks.
</span></p><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">8. IDC predicts that by 2022, the circle of emerging technology specialists will be at least 30% lower than global demand, and effective skill development and retention of professionals at work will become differentiating strategies for companies. 
</span></p><p data-dcnode-id="2504"><span data-dcnode-id="2508" instrument_node="">9. By 2021, approximately 65% of Chief information officers will extend Agile- and </span><a data-dcnode-id="2506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ADevOps_Methodology" title="DevOps Methodology"><span data-dcnode-id="2507" instrument_node="">DevOps practices</span></a><span data-dcnode-id="2505" instrument_node=""> to a wider business in order to achieve the speed necessary to develop innovation, meet tasks and make changes.
</span></p><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">10. Another analytical forecast suggests that by 2023, about 70% of information technology managers who will not be able to manage the organization of the company's IT structure, strategy and operations divided between peripheral computing, operational and information technology will not withstand the professional race.
</span></p><p data-dcnode-id="2496"><span data-dcnode-id="2501" instrument_node="">The study also notes that in 2014, Chief information officers were "simple IT guys" who worked far in the background. Now such managers are appreciated for their ability to bring to the company a visionary strategic view and skills that will be in demand in the future.</span><sup class="reference" data-dcnode-id="2498" id="cite_ref-19"><a data-dcnode-id="2499" href="#cite_note-19" title=""><span data-dcnode-id="2500" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2497" instrument_node="">
</span></p><span data-dcnode-id="2495" instrument_node="">
</span><a data-dcnode-id="2494" id="Top_10_IT_forecasts_from_IDC" name="Top_10_IT_forecasts_from_IDC"></a><h3 data-dcnode-id="2490"><span data-dcnode-id="2493" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Top 10 IT forecasts from IDC </span></span></h3><span data-dcnode-id="2489" instrument_node="">
</span><p data-dcnode-id="2484"><span data-dcnode-id="2488" instrument_node="">At the end of October 2018, the analytical company </span><a class="mw-redirect" data-dcnode-id="2486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IDC" title="IDC"><span data-dcnode-id="2487" instrument_node="">IDC</span></a><span data-dcnode-id="2485" instrument_node=""> presented a study in which it reflected 10 leading global trends in the development of the IT industry for subsequent years.
</span></p><p data-dcnode-id="2477"><b data-dcnode-id="2479"><span data-dcnode-id="2483" instrument_node="">1. By 2022, more than 60% of global </span><a class="mw-redirect" data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/GDP" title="GDP"><span data-dcnode-id="2482" instrument_node="">GDP</span></a><span data-dcnode-id="2480" instrument_node=""> will come from digital technologies and solutions</span></b><span data-dcnode-id="2478" instrument_node="">
</span></p><p data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Those manufacturers who cannot digitize their operations and offers will lose to competitors, since the traditional market will soon become a thing of the past.
</span></p><span data-dcnode-id="2474" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2467" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="2468" href="/images/8/82/The-Most-Realistic-IoT-Predictions-for-2019.jpeg" style="width:842px;"><a class="image" data-dcnode-id="2472"><img alt="" border="0" class="thumbimage" data-dcnode-id="2473" height="556" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/8/82/The-Most-Realistic-IoT-Predictions-for-2019.jpeg/840px-The-Most-Realistic-IoT-Predictions-for-2019.jpeg&amp;raw" width="840"></a><span data-dcnode-id="2471" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">IDC Analytics Company Presents Study Reflecting Top 10 Global IT Industry Trends for Next Years</span></div></div></div><span data-dcnode-id="2466" instrument_node="">
</span><p data-dcnode-id="2462"><b data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">2. By 2023, 75% of all IT spending will be related to the development of product promotion platforms</span></b><span data-dcnode-id="2463" instrument_node="">
</span></p><p data-dcnode-id="2454"><span data-dcnode-id="2461" instrument_node="">More than 90% of all enterprises will create their own digital IT environments for further development in the digital economy. According to IDC research, almost half of the companies declared their "aspiration for digital technology." This means that they are preparing to develop digital strategies and architecture that mimic the work of companies that originally built a business around digital technologies. Such enterprises and organizations use cloud, </span><a class="mw-redirect" data-dcnode-id="2459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AAgile" title="Agile"><span data-dcnode-id="2460" instrument_node="">Agile</span></a><span data-dcnode-id="2458" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/DevOps" title="DevOps"><span data-dcnode-id="2457" instrument_node="">DevOps practices</span></a><span data-dcnode-id="2455" instrument_node="">, digital innovation platforms and communities, and integrated data management and monetization.
</span></p><p data-dcnode-id="2447"><b data-dcnode-id="2449"><span data-dcnode-id="2453" instrument_node="">3. By 2022, more than 40% of cloud organizations will use edge computing, and 25% of end devices and systems will perform them using </span><a class="mw-redirect" data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="2452" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="2450" instrument_node=""> algorithms</span></b><span data-dcnode-id="2448" instrument_node="">
</span></p><p data-dcnode-id="2440"><a class="mw-redirect" data-dcnode-id="2445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Edge_computing" title="Edge computing"><span data-dcnode-id="2446" instrument_node="">Peripheral computing</span></a><span data-dcnode-id="2444" instrument_node=""> is a method of optimizing cloud computing systems by performing data processing on the periphery of a network, near the source. It not only increases the efficiency of using applications for computing and working with data, but also contributes to the more active introduction of the latest technologies, such as artificial intelligence and </span><a class="mw-redirect" data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/5G" title="5G"><span data-dcnode-id="2443" instrument_node="">5G communications</span></a><span data-dcnode-id="2441" instrument_node="">, analysts say.
</span></p><p data-dcnode-id="2436"><b data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">4. By 2022, 90% of all applications will be based on microservice architecture, which will improve the ability to develop, debug, update, and use third-party code</span></b><span data-dcnode-id="2437" instrument_node="">
</span></p><p data-dcnode-id="2425"><span data-dcnode-id="2435" instrument_node="">By 2022, 35% of all application applications will be cloud-based. According to analysts, in the digital economy, companies should offer high-quality applications to meet business needs. Such conditions lead to the transition to the so-called "super-flexible applications" - container, server-free computing and other technologies that have parameters such as modularity, distributionality, constant updateability and relation to </span><a data-dcnode-id="2433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cloud_Computing" title="Cloud Computing"><span data-dcnode-id="2434" instrument_node="">cloud computing</span></a><span data-dcnode-id="2432" instrument_node="">. By combining such applications with approaches such as </span><a class="mw-redirect" data-dcnode-id="2430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AAgile" title="Agile"><span data-dcnode-id="2431" instrument_node="">Agile</span></a><span data-dcnode-id="2429" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/DevOps" title="DevOps"><span data-dcnode-id="2428" instrument_node="">DevOps</span></a><span data-dcnode-id="2426" instrument_node="">, companies can develop innovations faster than before.
</span></p><p data-dcnode-id="2421"><b data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">5. By 2024, a new type of professional developers who create code without using their own scripts will increase the programming community as a whole by 30%. This will be an additional catalyst for digital transformation.</span></b><span data-dcnode-id="2422" instrument_node="">
</span></p><p data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">A new approach to developing applications based on the maximum use of ready-made modules will accelerate digital transformation by attracting new workers, the researchers say. The growing popularity of platforms that require minimal or zero code refinement, as well as model-based development tools, will open companies to a new class of developers who can create digital solutions more often.
</span></p><p data-dcnode-id="2415"><b data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">6. From 2018 to 2023, more applications will be created than in the last 40 years</span></b><span data-dcnode-id="2416" instrument_node="">
</span></p><p data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">Thanks to new tools/platforms, a large number of developers, flexible methods and the ability to reuse code for 2018-2023, 500 million new applications will be created, which exceeds the number of programs created over the previous 40 years.
</span></p><p data-dcnode-id="2406"><b data-dcnode-id="2408"><span data-dcnode-id="2412" instrument_node="">7. By 2022, 25% of public </span><a class="mw-redirect" data-dcnode-id="2410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cloud_computing" title="Cloud computing"><span data-dcnode-id="2411" instrument_node="">cloud computing</span></a><span data-dcnode-id="2409" instrument_node=""> will be carried out on processors with an architecture other than x86 (including quantum)</span></b><span data-dcnode-id="2407" instrument_node="">
</span></p><p data-dcnode-id="2398"><span data-dcnode-id="2405" instrument_node="">Analysts predict that the number of IT use cases will increase significantly over the years, thereby creating a wide range of specialized IT requirements. For example, the requirements for processing </span><a class="mw-redirect" data-dcnode-id="2403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="2404" instrument_node="">AI algorithms</span></a><span data-dcnode-id="2402" instrument_node=""> lead to the need to create even more powerful processors, and companies choose vertically oriented </span><a class="mw-redirect" data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/SaaS" title="SaaS"><span data-dcnode-id="2401" instrument_node="">Solution SaaS</span></a><span data-dcnode-id="2399" instrument_node=""> twice as often as horizontal applications.
</span></p><p data-dcnode-id="2394"><b data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">8. By 2024, AI-enabled user interfaces and process automation will replace a third of today's on-screen applications</span></b><span data-dcnode-id="2395" instrument_node="">
</span></p><p data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">By 2022, 30% of enterprises will use speech recognition technologies to interact with customers, and AI will increasingly be used as the main user interface for a number of applications and services. Along with automation, this will maximize employee productivity.
</span></p><p data-dcnode-id="2388"><b data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">9. By 2022, 50% of servers will encrypt all data</span></b><span data-dcnode-id="2389" instrument_node="">
</span></p><p data-dcnode-id="2377"><span data-dcnode-id="2387" instrument_node="">More than 50% of security warnings will be processed by AI-based automatic mechanisms, and 150 million people will receive digital identifiers based on the blockchain. New technologies such as </span><a class="mw-redirect" data-dcnode-id="2385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Enciphering" title="Enciphering"><span data-dcnode-id="2386" instrument_node="">encryption</span></a><span data-dcnode-id="2384" instrument_node="">, </span><a data-dcnode-id="2382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Blockchain"><span data-dcnode-id="2383" instrument_node="">blockchain</span></a><span data-dcnode-id="2381" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_learning" title="Machine learning"><span data-dcnode-id="2380" instrument_node="">machine learning</span></a><span data-dcnode-id="2378" instrument_node=""> and analytics will be used to improve security measures.
</span></p><p data-dcnode-id="2373"><b data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">10. By 2022, 80% of applications will be hosted on the four largest cloud "mega platforms"</span></b><span data-dcnode-id="2374" instrument_node="">
</span></p><p data-dcnode-id="2367"><span data-dcnode-id="2372" instrument_node="">In the coming years, enterprises will begin to actively use integrated hybrid and multi-site tools and strategies. The absence of an integrated strategy will lead to a suboptimal allocation of resources, limited access to technological innovations, longer identification and resolution of problems that modern companies cannot afford. By 2024, 90% of organizations will use hybrid cloud technologies and tools.</span><sup class="reference" data-dcnode-id="2369" id="cite_ref-20"><a data-dcnode-id="2370" href="#cite_note-20" title=""><span data-dcnode-id="2371" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2368" instrument_node="">
</span></p><span data-dcnode-id="2366" instrument_node="">
</span><a data-dcnode-id="2365" id="Top_10_Gartner_IT_Forecasts" name="Top_10_Gartner_IT_Forecasts"></a><h3 data-dcnode-id="2361"><span data-dcnode-id="2364" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Top 10 Gartner IT Forecasts</span></span></h3><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2346"><span data-dcnode-id="2359" instrument_node="">In October 2018, at the Gartner/ITxpo 2018 conference in Orlando, Florida (</span><a data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AUnited_States_of_America_%28USA%29" title="Article:United States of America (USA)"><span data-dcnode-id="2358" instrument_node="">USA)</span></a><span data-dcnode-id="2356" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AGartner" title="Gartner"><span data-dcnode-id="2355" instrument_node="">Gartner</span></a><span data-dcnode-id="2353" instrument_node=""> analysts </span><a class="mw-redirect" data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AGartner" title="Gartner"><span data-dcnode-id="2352" instrument_node="">presented</span></a><span data-dcnode-id="2350" instrument_node=""> 10 predictions in the field of </span><a class="new" data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DInformation_technology%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Information technology (такой страницы не существует)"><span data-dcnode-id="2349" instrument_node="">information technology for</span></a><span data-dcnode-id="2347" instrument_node=""> 2019 and subsequent years. The research report reflects new technologies that can change existing business models and lead to the creation of new ones. The challenge for IT executives is to identify the need for change from the perspective of their customers and support new digital business models.
</span></p><span data-dcnode-id="2345" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2338" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="2339" href="/images/b/ba/R0_00_h678_fmax.jpg" style="width:842px;"><a class="image" data-dcnode-id="2343"><img alt="" border="0" class="thumbimage" data-dcnode-id="2344" height="517" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/b/ba/R0_00_h678_fmax.jpg/840px-R0_00_h678_fmax.jpg&amp;raw" width="840"></a><span data-dcnode-id="2342" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Gartner Analysts Forecast IT Development in Various Areas</span></div></div></div><span data-dcnode-id="2337" instrument_node="">
</span><p data-dcnode-id="2330"><b data-dcnode-id="2332"><span data-dcnode-id="2336" instrument_node="">1. By 2020, 80% of projects involving the introduction of </span><a class="mw-redirect" data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="2335" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="2333" instrument_node=""> technologies will be developed by several talented employees and will not be actively used within the company.</span></b><span data-dcnode-id="2331" instrument_node="">
</span></p><p data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">Although AI can provide real-time information at any time at any stage of the project and thereby improve the performance of the company, most organizations prefer to remain in starting positions. To ensure the breakthrough of AI projects, managers will have to take responsibility and support them, indicating how much they are necessary for business development, the Gartner report said.
</span></p><p data-dcnode-id="2321"><b data-dcnode-id="2323"><span data-dcnode-id="2327" instrument_node="">2. By 2023, the number of missing people will decrease by 80% compared to 2018 thanks to </span><a class="new" data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DFacial_recognition%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Facial recognition (такой страницы не существует)"><span data-dcnode-id="2326" instrument_node="">facial recognition</span></a><span data-dcnode-id="2324" instrument_node=""> technology.</span></b><span data-dcnode-id="2322" instrument_node="">
</span></p><p data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Already in 2018, facial recognition technologies began to be actively used in various areas - for example, on international flights at US airports. Only a few seconds of verification, and the identity of the person confirmed. Gartner believes that this technology will soon find its use in the fight against poaching, allowing it to find missing animals whose species are at risk of extinction, for example, illegally exported elephants, rhinos and lions. In addition, such technology can be used to analyze shipping containers and packages that may be damaged during delivery.
</span></p><p data-dcnode-id="2315"><b data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">3. By 2023, the frequency of referrals to US emergency departments will decrease by 20 million thanks to virtual care for patients with chronic diseases.</span></b><span data-dcnode-id="2316" instrument_node="">
</span></p><p data-dcnode-id="2310"><span data-dcnode-id="2314" instrument_node="">Chronic is considered a disease that lasts more than 3 months. More than 40 per cent of the population of developed countries suffer from chronic diseases, and in general they account for 75 per cent of </span><a class="new" data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DPharmaceuticals%2C_medicine%2C_healthcare%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Pharmaceuticals, medicine, healthcare (такой страницы не существует)"><span data-dcnode-id="2313" instrument_node="">health-care</span></a><span data-dcnode-id="2311" instrument_node=""> expenditures. The emergence of virtual assistants based on artificial intelligence will help change this situation.
</span></p><p data-dcnode-id="2306"><b data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">4. By 2023, 25% of organizations will require employees to sign a refusal to cyberbullying, but 70% of these initiatives will fail.</span></b><span data-dcnode-id="2307" instrument_node="">
</span></p><p data-dcnode-id="2301"><span data-dcnode-id="2305" instrument_node="">Gartner believes that by 2019, the share of lawsuits related to harassment in the workplace will increase by 44% compared to 2017. More attention will be paid to how employees use social media in the work context, as well as the use of AI and </span><a class="mw-redirect" data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_Learning" title="Machine Learning"><span data-dcnode-id="2304" instrument_node="">machine learning</span></a><span data-dcnode-id="2302" instrument_node=""> to monitor cyber intimidation in internal employee forums. Leaders should be prepared to stop such cyberbullying in order to ensure a safe and comfortable working environment. 
</span></p><p data-dcnode-id="2297"><b data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">5. During 2022, 75% of organizations that pursue a policy of ensuring socio-cultural diversity and taking into account the individual characteristics of staff will secure a financial advantage.</span></b><span data-dcnode-id="2298" instrument_node="">
</span></p><p data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">Gartner predicts that in 2019, more than 75% large enterprises will set themselves the goal of ensuring sociocultural diversity of employees over 2020-2022 years. By 2020, 10% of large enterprises will already have strategies to introduce non-obvious aspects of diversity (for example, styles and types of thinking).
</span></p><p data-dcnode-id="2285"><b data-dcnode-id="2287"><span data-dcnode-id="2294" instrument_node="">6. By 2021, 75% of public companies using </span><a data-dcnode-id="2292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Blockchain"><span data-dcnode-id="2293" instrument_node="">blockchain technologies</span></a><span data-dcnode-id="2291" instrument_node=""> will suffer due to the law on the protection of confidential data, since almost all blockchain systems somehow use </span><a class="mw-redirect" data-dcnode-id="2289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Personal_data" title="Personal data"><span data-dcnode-id="2290" instrument_node="">personal data</span></a><span data-dcnode-id="2288" instrument_node="">.</span></b><span data-dcnode-id="2286" instrument_node="">
</span></p><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">Gartner notes that by the end of 2021, more than a billion complaints will be filed about non-compliance with the data privacy law, and by 2022, more than 75% of companies related to commerce or technology will begin to change internal privacy rules so that they comply with the general regulations for the protection of personal data.
</span></p><p data-dcnode-id="2279"><b data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">7. By 2023, the regulation on the protection of personal data will significantly reduce income from online business.</span></b><span data-dcnode-id="2280" instrument_node="">
</span></p><p data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">New privacy provisions will significantly reduce the use of cookies, which will affect income from personalized advertising. Gartner predicts that by the end of 2019, advertising revenue from the five largest commercial marketing companies will fall by 10%.
</span></p><p data-dcnode-id="2273"><b data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">8. By 2022, the rapid development of digital technologies will help transform information opportunities into tangible products thanks to the cloud economy.</span></b><span data-dcnode-id="2274" instrument_node="">
</span></p><p data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Smart machines are the future of any production, and smart and interconnected products and platforms that can transform information capabilities into new services and the corresponding income is the future of the service sector. If manufacturers are going to maintain the gross profit necessary for the further development of the business, they will have to abandon transactional revenues and create a new business model.
</span></p><p data-dcnode-id="2267"><b data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">9. In 2022, companies that act as consultants and assistants to digital giants will capture 40% of the global market in each industry.</span></b><span data-dcnode-id="2268" instrument_node="">
</span></p><p data-dcnode-id="2262"><span data-dcnode-id="2266" instrument_node="">Gartner predicts that by 2022 there will be even fewer firms in the information technology market than in 2018, and the already existing trend towards unification of companies and cooperation indicates in which direction the market is developing. The average number of partners of any enterprise is growing and will continue to grow - on average from 78 partner companies to 143 by 2020. This trend is due to the fact that digital leaders are striving to maintain an advantage and expand the market. Gartner also believes that </span><a class="mw-redirect" data-dcnode-id="2264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet_of_Things" title="Internet of Things"><span data-dcnode-id="2265" instrument_node="">the Internet of Things</span></a><span data-dcnode-id="2263" instrument_node=""> and analytics will play a significant role with this development, and predicts a high market growth rate in 2019. 
</span></p><p data-dcnode-id="2255"><b data-dcnode-id="2257"><span data-dcnode-id="2261" instrument_node="">10. In 2021, scandals on social networks and </span><a class="mw-redirect" data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cyber_attacks" title="Cyber attacks"><span data-dcnode-id="2260" instrument_node="">cyber attacks</span></a><span data-dcnode-id="2258" instrument_node=""> will negatively affect consumer confidence.</span></b><span data-dcnode-id="2256" instrument_node="">
</span></p><p data-dcnode-id="2246"><span data-dcnode-id="2254" instrument_node="">Like many other analytical firms, including </span><a data-dcnode-id="2252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AForrester" title="Forrester"><span data-dcnode-id="2253" instrument_node="">Forrester</span></a><span data-dcnode-id="2251" instrument_node="">, which created the Zero Trust Security system, Gartner predicts mass cyber attacks and the leak of confidential data, which will lead to scandals in social networks. Outdated security approaches cannot protect companies, and numerous gaps in protection that cannot cover all possible vulnerabilities allow hackers to significantly influence market events.</span><sup class="reference" data-dcnode-id="2248" id="cite_ref-21"><a data-dcnode-id="2249" href="#cite_note-21" title=""><span data-dcnode-id="2250" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2247" instrument_node="">
</span></p><span data-dcnode-id="2245" instrument_node="">
</span><a data-dcnode-id="2244" id="10_technologies_that_will_enrich_investors" name="10_technologies_that_will_enrich_investors"></a><h3 data-dcnode-id="2240"><span data-dcnode-id="2243" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">10 technologies that will enrich investors</span></span></h3><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2238" instrument_node="">On August 23, 2018, the financial conglomerate </span><a data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3ACitigroup" title="Citigroup"><span data-dcnode-id="2237" instrument_node="">Citigroup</span></a><span data-dcnode-id="2235" instrument_node=""> published a study, the authors of which listed ten main technologies that can enrich investors and change the world.
</span></p><p data-dcnode-id="2230"><b data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Solid State Batteries</span></b><span data-dcnode-id="2231" instrument_node="">
</span></p><p data-dcnode-id="2225"><span data-dcnode-id="2229" instrument_node="">The increase in the number of </span><a class="mw-redirect" data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Electric_vehicles" title="Electric vehicles"><span data-dcnode-id="2228" instrument_node="">electric vehicles</span></a><span data-dcnode-id="2226" instrument_node=""> has generated demand for efficiency-appropriate batteries, and many companies have engaged in the development of technology that can compete with an internal combustion engine. According to analysts, it is solid-state batteries that meet the necessary criteria and have sufficient potential for development: it is already clear that they are superior to conventional engines in terms of safety, resistance to leakage and ignition, relative life expectancy and lack of degradation. The advent of fully solid-state batteries will allow you to charge batteries faster and hold the charge longer, and this in turn will accelerate the spread of electric vehicles.
</span></p><span data-dcnode-id="2224" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2217" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="2218" href="/images/8/8c/C31cbfe4-6338-12acc1x720_161131.JPG" style="width:842px;"><a class="image" data-dcnode-id="2222"><img alt="" border="0" class="thumbimage" data-dcnode-id="2223" height="467" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/8/8c/C31cbfe4-6338-12acc1x720_161131.JPG/840px-C31cbfe4-6338-12acc1x720_161131.JPG&amp;raw" width="840"></a><span data-dcnode-id="2221" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Citigroup published a study, the authors of which listed ten main technologies that can enrich investors and change the world</span></div></div></div><span data-dcnode-id="2216" instrument_node="">
</span><p data-dcnode-id="2208"><span data-dcnode-id="2215" instrument_node="">"'Anti-aging therapy

Scientific achievements have allowed scientists to study the process of aging, and this, in turn, should become the starting point for anti-aging therapy. Many biotechnology companies, including Unity Biotechnology and </span><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3ACalico" title="Calico"><span data-dcnode-id="2214" instrument_node="">Calico</span></a><span data-dcnode-id="2212" instrument_node=""> (a subsidiary of </span><a class="mw-redirect" data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Google" title="Google"><span data-dcnode-id="2211" instrument_node="">Google</span></a><span data-dcnode-id="2209" instrument_node="">), are already engaged in such developments. 
</span></p><p data-dcnode-id="2204"><b data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Autonomous transport networks</span></b><span data-dcnode-id="2205" instrument_node="">
</span></p><p data-dcnode-id="2193"><span data-dcnode-id="2203" instrument_node="">According to Citigroup analysts, cars still do not fully use the existing potential. Thanks to the development of </span><a class="mw-redirect" data-dcnode-id="2201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="2202" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="2200" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet_of_Things" title="Internet of Things"><span data-dcnode-id="2199" instrument_node="">the Internet of things</span></a><span data-dcnode-id="2197" instrument_node=""> and the public availability of high-speed connectivity, the development of an autonomous transport network combining unmanned vehicles has become possible. Such a network will not only create special </span><a data-dcnode-id="2195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AAutopilot_%28unmanned_vehicle%29" title="Autopilot (unmanned vehicle)"><span data-dcnode-id="2196" instrument_node="">unmanned</span></a><span data-dcnode-id="2194" instrument_node=""> taxis, but also provide the opportunity to "subscribe" to the use of the car. 
</span></p><p data-dcnode-id="2185"><b data-dcnode-id="2187"><a data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABig_Data" title="Article:Big Data"><span data-dcnode-id="2192" instrument_node="">Big Data</span></a><span data-dcnode-id="2190" instrument_node=""> and </span><a class="new" data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DPharmaceuticals%2C_medicine%2C_healthcare%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Pharmaceuticals, medicine, healthcare (такой страницы не существует)"><span data-dcnode-id="2189" instrument_node="">Healthcare</span></a></b><span data-dcnode-id="2186" instrument_node="">
</span></p><p data-dcnode-id="2180"><span data-dcnode-id="2184" instrument_node="">With the development of AI and </span><a class="mw-redirect" data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_Learning" title="Machine Learning"><span data-dcnode-id="2183" instrument_node="">machine learning</span></a><span data-dcnode-id="2181" instrument_node="">, it became possible to analyze huge amounts of data. The findings can be used in various fields: interpretation of the results of visualization research methods, differential diagnosis, systems for supporting medical decision-making and much more. 
</span></p><p data-dcnode-id="2176"><b data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">Dynamic Spectrum Access</span></b><span data-dcnode-id="2177" instrument_node="">
</span></p><p data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">Due to the constant increase in the number of wireless devices and the development of wireless communication technologies, additional frequency bands are required, but the limited frequency resource significantly reduces the effectiveness of such tactics. However, this problem can be solved by using the new technology of dynamic access to the spectrum of licensed frequencies in which existing users work - it allows unlicensed users to access the frequency resource along with licensed users.
</span></p><p data-dcnode-id="2170"><b data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">ESports</span></b><span data-dcnode-id="2171" instrument_node="">
</span></p><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">The organization of professional competitions attracted millions of fans from around the world who came to video game tournaments such as Halo, League of Legends and Fortnite. As the e-sports industry develops, analysts expect a serious development of basic infrastructure (growth in player salaries, signing contracts, college sponsorship, media transactions), which in turn will contribute to the growth of the economy as a whole.
</span></p><p data-dcnode-id="2162"><b data-dcnode-id="2164"><a class="mw-redirect" data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/5G" title="5G"><span data-dcnode-id="2167" instrument_node="">5G</span></a><span data-dcnode-id="2165" instrument_node=""> Technology</span></b><span data-dcnode-id="2163" instrument_node="">
</span></p><p data-dcnode-id="2148"><span data-dcnode-id="2161" instrument_node="">New communication technologies, especially </span><a class="mw-redirect" data-dcnode-id="2159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/5G" title="5G"><span data-dcnode-id="2160" instrument_node="">5G</span></a><span data-dcnode-id="2158" instrument_node="">, can change the way people interact at work and at home. Thanks to </span><a class="mw-redirect" data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet" title="Internet"><span data-dcnode-id="2157" instrument_node="">the Internet</span></a><span data-dcnode-id="2155" instrument_node=""> of Things (</span><a class="mw-redirect" data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IoT" title="IoT"><span data-dcnode-id="2154" instrument_node="">IoT)</span></a><span data-dcnode-id="2152" instrument_node=""> and </span><a data-dcnode-id="2150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AInternet_of_Things%2C_IoT%2C_M2M_%28global_market%29" title="Internet of Things, IoT, M2M (global market)"><span data-dcnode-id="2151" instrument_node="">inter-machine communication (M2M), wireless</span></a><span data-dcnode-id="2149" instrument_node=""> operators will be able to significantly expand their service market, and it is believed that the global IoT market will cost $4-11 trillion by 2025.
</span></p><p data-dcnode-id="2144"><b data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">Floating wind farms</span></b><span data-dcnode-id="2145" instrument_node="">
</span></p><p data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">According to analysts, in the early stages of implementation, floating wind farms will need external support from the government, but then they will justify themselves. The development of this industry will also advance the development of solid-state accumulators and the production of turbines.
</span></p><p data-dcnode-id="2137"><span data-dcnode-id="2141" instrument_node="">"Real </span><b data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Estate Market Breakers"</span></b><span data-dcnode-id="2138" instrument_node="">
</span></p><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Transparency and the enormous speed of various types of financial transactions will negate the need for intermediaries. The advent of specialized electronic systems for the selection and sale of houses will soon leave real estate agents without work.
</span></p><p data-dcnode-id="2131"><b data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">Smart Voice Assistants</span></b><span data-dcnode-id="2132" instrument_node="">
</span></p><p data-dcnode-id="2125"><span data-dcnode-id="2130" instrument_node="">It is expected that already in 2019, 20% of operations with a smartphone will be carried out using smart assistants, and by 2020, 50% of search queries will be carried out by voice command.</span><sup class="reference" data-dcnode-id="2127" id="cite_ref-22"><a data-dcnode-id="2128" href="#cite_note-22" title=""><span data-dcnode-id="2129" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2126" instrument_node="">
</span></p><span data-dcnode-id="2124" instrument_node="">
</span><a data-dcnode-id="2123" id="Five_IT_trends_blurring_the_human-machine_interface" name="Five_IT_trends_blurring_the_human-machine_interface"></a><h3 data-dcnode-id="2119"><span data-dcnode-id="2122" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Five IT trends blurring the human-machine interface</span></span></h3><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2110"><span data-dcnode-id="2117" instrument_node="">In August 2018, the analytical company </span><a class="mw-redirect" data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AGartner" title="Gartner"><span data-dcnode-id="2116" instrument_node="">Gartner</span></a><span data-dcnode-id="2114" instrument_node=""> introduced five new trends in the field of </span><a class="new" data-dcnode-id="2112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DInformation_technology%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Information technology (такой страницы не существует)"><span data-dcnode-id="2113" instrument_node="">information technology</span></a><span data-dcnode-id="2111" instrument_node="">, which blur the border between people and machines.
</span></p><p data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Gartner Vice President of Research Mike J. Walker notes that executives in any industry will have to face rapidly evolving technologies that will seriously affect interaction with employees, partners and customers. IT managers should constantly study the market, evaluate innovations to identify new business opportunities with high potential and strategic significance for their business, the expert said.
</span></p><span data-dcnode-id="2107" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2100" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="2101" href="/images/a/ae/Hypecycle-aug-20.png" style="width:842px;"><a class="image" data-dcnode-id="2105"><img alt="" border="0" class="thumbimage" data-dcnode-id="2106" height="566" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/a/ae/Hypecycle-aug-20.png/840px-Hypecycle-aug-20.png&amp;raw" width="840"></a><span data-dcnode-id="2104" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">2018 Technology Maturity Cycle, Gartner Data</span></div></div></div><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">To this end, researchers annually evaluate the technology maturity cycle, which identifies a number of innovations that can achieve a high competitive advantage over the next five to ten years. On the basis of the cycle, five new trends in IT were identified, which blur the border between man and machine.
</span></p><p data-dcnode-id="2083"><span data-dcnode-id="2096" instrument_node="">Firstly, this is "democratized </span><a class="mw-redirect" data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="2095" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="2093" instrument_node="">" - a movement for the accessibility of AI technologies. Gartner believes that the basis for it will be such technologies as the provision of the AI platform as services (</span><a class="mw-redirect" data-dcnode-id="2091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/PaaS" title="PaaS"><span data-dcnode-id="2092" instrument_node="">PaaS)</span></a><span data-dcnode-id="2090" instrument_node="">, general artificial intelligence (Artificial General Intelligence), autonomous driving (4 and 5 levels), autonomous mobile </span><a data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ARobots_%28robotics%29" title="Robots (robotics)"><span data-dcnode-id="2089" instrument_node="">robots,</span></a><span data-dcnode-id="2087" instrument_node=""> virtual interlocutor platforms, deep </span><a data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ANeural_networks_%28neural_networks%29" title="Neural networks (neural networks)"><span data-dcnode-id="2086" instrument_node="">neural networks,</span></a><span data-dcnode-id="2084" instrument_node=""> flying autonomous vehicles, intelligent robots and virtual assistants. Walker notes that the final introduction of some democratized AI technologies, such as deep neural networks and virtual assistants, will occur by 2020-2021 years. Other technologies, such as intelligent robots and PaaS, will reach maturity within five to ten years, according to a study published in August 2018.
</span></p><p data-dcnode-id="2069"><span data-dcnode-id="2082" instrument_node="">Secondly, the researchers believe that the transition from technical infrastructure to digital ecosystems will lay the foundation for new business models that will smooth the gap between people and technology. This trend depends on the following technologies: </span><a data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Blockchain"><span data-dcnode-id="2081" instrument_node="">blockchain</span></a><span data-dcnode-id="2079" instrument_node="">, digital twins (Digital Twin), platforms for the </span><a data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet_of_Things_%28IoT%29" title="Internet of Things (IoT)"><span data-dcnode-id="2078" instrument_node="">Internet of things</span></a><span data-dcnode-id="2076" instrument_node=""> and knowledge graphs. </span><a data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Article:Blockchain"><span data-dcnode-id="2075" instrument_node="">Blockchain</span></a><span data-dcnode-id="2073" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IoT" title="IoT"><span data-dcnode-id="2072" instrument_node="">IoT</span></a><span data-dcnode-id="2070" instrument_node=""> are actively used in all areas, and most of the other technologies will reach maturity in five to ten years, researchers say.
</span></p><p data-dcnode-id="2061"><span data-dcnode-id="2068" instrument_node="">Thirdly, researchers predict the onset of the "transhuman" era thanks to biohacking. Biohacking is divided into several categories, which include enabling technologies, nutrigenomics and experimental biology. However, there is still no answer to the question of whether society is ready to adopt such methods and how to solve related ethical problems. Biohacking will be based on the following technologies: biochips, biotechnology, neuro-computer interface, </span><a data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AAugmented_Reality_%28AR%2C_Augmented_Reality%29" title="Augmented Reality (AR, Augmented Reality)"><span data-dcnode-id="2067" instrument_node="">augmented reality</span></a><span data-dcnode-id="2065" instrument_node=""> technologies and intelligent tissue. According to the technology maturity cycle, </span><a data-dcnode-id="2063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AAugmented_Reality_%28AR%2C_Augmented_Reality%29" title="Augmented Reality (AR, Augmented Reality)"><span data-dcnode-id="2064" instrument_node="">augmented reality</span></a><span data-dcnode-id="2062" instrument_node=""> has already entered the plateau of widespread use, and biochips and biotechnology will follow it over the next five to ten years.
</span></p><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Fourth, researchers note the transparency of new technologies. They will be increasingly human-centered and eventually be able to ensure transparent relationships between people and companies. This trend is supported by the following technologies: 4D-printing, a habitat with multimedia and network capabilities, self-healing technologies, intelligent dust, intelligent workspace and 3D displays.
</span></p><p data-dcnode-id="2044"><span data-dcnode-id="2058" instrument_node="">Fifth, researchers pay attention to the ubiquitous spread of infrastructure. This trend is associated with the following technologies: </span><a class="mw-redirect" data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/5G" title="5G"><span data-dcnode-id="2057" instrument_node="">5G</span></a><span data-dcnode-id="2055" instrument_node="">, carbon nanotubes, deep </span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ANeural_networks_%28neural_networks%29" title="Neural networks (neural networks)"><span data-dcnode-id="2054" instrument_node="">neural networks</span></a><span data-dcnode-id="2052" instrument_node="">, ASIC chips, neuromorphic equipment and </span><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AQuantum_Computer_and_Quantum_Communication" title="Quantum Computer and Quantum Communication"><span data-dcnode-id="2051" instrument_node="">quantum computing</span></a><span data-dcnode-id="2049" instrument_node="">. These technologies, in particular 5G and deep neural networks, are expected to peak in the next five years.</span><sup class="reference" data-dcnode-id="2046" id="cite_ref-23"><a data-dcnode-id="2047" href="#cite_note-23" title=""><span data-dcnode-id="2048" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2045" instrument_node="">
</span></p><span data-dcnode-id="2043" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2036" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="2037" href="/images/0/09/Emerging-Technology-Hype-Cycle-for-2017_Infographic_R6A.jpg" style="width:842px;"><a class="image" data-dcnode-id="2041"><img alt="" border="0" class="thumbimage" data-dcnode-id="2042" height="711" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/0/09/Emerging-Technology-Hype-Cycle-for-2017_Infographic_R6A.jpg/840px-Emerging-Technology-Hype-Cycle-for-2017_Infographic_R6A.jpg&amp;raw" width="840"></a><span data-dcnode-id="2040" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">2017 Technology Maturity Cycle, Gartner Data</span></div></div></div><span data-dcnode-id="2035" instrument_node="">
</span><p data-dcnode-id="2021"><span data-dcnode-id="2034" instrument_node="">The technology development cycle, which Gartner describes as a curve, changed slightly in 2018 compared to 2017. So, software-defined </span><a class="mw-redirect" data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cyber_security" title="Cyber security"><span data-dcnode-id="2033" instrument_node="">cybersecurity</span></a><span data-dcnode-id="2031" instrument_node="">, </span><a data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ACognitive_computing" title="Cognitive computing"><span data-dcnode-id="2030" instrument_node="">cognitive computing</span></a><span data-dcnode-id="2028" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_learning" title="Machine learning"><span data-dcnode-id="2027" instrument_node="">machine learning</span></a><span data-dcnode-id="2025" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/UAV" title="UAV"><span data-dcnode-id="2024" instrument_node="">commercial drones</span></a><span data-dcnode-id="2022" instrument_node=""> disappeared.
</span></p><span data-dcnode-id="2020" instrument_node="">
</span><a data-dcnode-id="2019" id="Technological_trends_affecting_IT_strategies_of_companies:_Sberbank.27s_vision" name="Technological_trends_affecting_IT_strategies_of_companies:_Sberbank.27s_vision"></a><h3 data-dcnode-id="2015"><span data-dcnode-id="2018" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Technological trends affecting IT strategies of companies: Sberbank's vision</span></span></h3><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2004"><a data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Person%3AHasin_Mikhail_Alexandrovich" title="Hasin Mikhail Alexandrovich"><span data-dcnode-id="2013" instrument_node="">Mikhail Hasin</span></a><span data-dcnode-id="2011" instrument_node="">, Senior Managing Director of </span><a class="mw-redirect" data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Sberbank_of_the_Russian_Federation" title="Sberbank of the Russian Federation"><span data-dcnode-id="2010" instrument_node="">Sberbank</span></a><span data-dcnode-id="2008" instrument_node="">, speaking at the </span><a class="external text" data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//summit.tadviser.ru/" rel="nofollow" target="_blank" title="http://summit.tadviser.ru/"><span data-dcnode-id="2007" instrument_node="">TAdviser conference SummIT</span></a><span data-dcnode-id="2005" instrument_node=""> May 30, 2018, shared his vision of technological trends that affect the IT strategies of companies. 
</span></p><span data-dcnode-id="2003" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1996" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="1997" href="/images/e/e8/TAdviser_SummIT-224300.jpg" style="width:682px;"><a class="image" data-dcnode-id="2001"><img alt="" border="0" class="thumbimage" data-dcnode-id="2002" height="418" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/e/e8/TAdviser_SummIT-224300.jpg&amp;raw" width="680"></a><span data-dcnode-id="2000" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">Mikhail Hasin spoke at TAdviser SummIT about the impact of technological trends on IT strategies of companies</span></div></div></div><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">First of all, he pointed to tectonic changes in human interaction with the world: the phone has now become a single channel of interaction, which is carried out within the framework of large ecosystems. 
</span></p><p data-dcnode-id="1985"><span data-dcnode-id="1992" instrument_node="">Any large ecosystem has no geographical boundaries, Hasin noted, millions of customers in any hourly areas interact in it. These ecosystems operate on petabytes of data, hundreds and thousands of transactions per second. The systems are based on technology platforms that have similar requirements, namely, client centricity, an open </span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AApplication_Programming_Interface_%28API%29" title="Application Programming Interface (API)"><span data-dcnode-id="1991" instrument_node="">API</span></a><span data-dcnode-id="1989" instrument_node=""> mechanism, </span><a class="mw-redirect" data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_Learning" title="Machine Learning"><span data-dcnode-id="1988" instrument_node="">machine learning</span></a><span data-dcnode-id="1986" instrument_node=""> and automated customer service, data processing in RAM and a number of others. 
</span></p><span data-dcnode-id="1984" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1977" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="1978" href="/images/f/f2/Capture-20180604-183435.png" style="width:682px;"><a class="image" data-dcnode-id="1982"><img alt="" border="0" class="thumbimage" data-dcnode-id="1983" height="398" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/f/f2/Capture-20180604-183435.png&amp;raw" width="680"></a><span data-dcnode-id="1981" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">A slide from Mikhail Hasin's presentation on TAdviser SummIT</span></div></div></div><span data-dcnode-id="1976" instrument_node="">
</span><p data-dcnode-id="1968"><span data-dcnode-id="1975" instrument_node="">Characterizing the ecosystems of the new generation, the representative of Sberbank identified four layers in them. The first layer is a universal single front office, the same for all digital channels from the point of view of customer experience, that is, allowing the client to start buying in one channel, continue in another and finish in the third. The second layer is the level of business logic, where the customer is offered a service. The third is where the products and services of the players involved in this ecosystem are located. And the fourth layer is the layer of </span><a data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABig_Data" title="Article:Big Data"><span data-dcnode-id="1974" instrument_node="">big data</span></a><span data-dcnode-id="1972" instrument_node="">, where the storage and all the analytics, on the basis of which </span><a class="mw-redirect" data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_Learning" title="Machine Learning"><span data-dcnode-id="1971" instrument_node="">machine learning</span></a><span data-dcnode-id="1969" instrument_node=""> mechanisms work, are located. 
</span></p><span data-dcnode-id="1967" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1960" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="1961" href="/images/5/5a/Capture-20180604-184521300.png" style="width:682px;"><a class="image" data-dcnode-id="1965"><img alt="" border="0" class="thumbimage" data-dcnode-id="1966" height="392" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/5/5a/Capture-20180604-184521300.png&amp;raw" width="680"></a><span data-dcnode-id="1964" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">A slide from Mikhail Hasin's presentation on TAdviser SummIT</span></div></div></div><span data-dcnode-id="1959" instrument_node="">
</span><p data-dcnode-id="1951"><span data-dcnode-id="1958" instrument_node="">To build such a new generation ecosystem, new development and implementation processes are needed, and in this context the transition to a development environment </span><a data-dcnode-id="1956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ADevOps_Methodology" title="DevOps Methodology"><span data-dcnode-id="1957" instrument_node="">DevOps</span></a><span data-dcnode-id="1955" instrument_node=""> and flexible methods are relevant, </span><a class="mw-redirect" data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Agile_software_development" title="Agile software development"><span data-dcnode-id="1954" instrument_node="">Agile</span></a><span data-dcnode-id="1952" instrument_node=""> which allows testing and installing new releases in automatic mode, Mikhail Khasin noted.
</span></p><p data-dcnode-id="1943"><span data-dcnode-id="1950" instrument_node="">As for </span><a data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AArtificial_intelligence_%28AI%2C_Artificial_intelligence%2C_AI%29" title="Artificial intelligence (AI, Artificial intelligence, AI)"><span data-dcnode-id="1949" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="1947" instrument_node=""> technology, in recent years, large amounts of investment in machine learning and automatic decision-making have been carried out. For solutions in this area, Mikhail Hasin noted, </span><a class="new" data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DSPO%26action%3Dedit%26redlink%3D1" rel="nofollow" title="SPO (такой страницы не существует)"><span data-dcnode-id="1946" instrument_node="">open source</span></a><span data-dcnode-id="1944" instrument_node=""> technologies are widely used, and this path, according to him, is the fastest way to develop new technologies.
</span></p><span data-dcnode-id="1942" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1935" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="1936" href="/images/d/d2/Capture-20180604-185443.png" style="width:682px;"><a class="image" data-dcnode-id="1940"><img alt="" border="0" class="thumbimage" data-dcnode-id="1941" height="394" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/d/d2/Capture-20180604-185443.png&amp;raw" width="680"></a><span data-dcnode-id="1939" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">A slide from Mikhail Hasin's presentation on TAdviser SummIT</span></div></div></div><span data-dcnode-id="1934" instrument_node="">
</span><p data-dcnode-id="1926"><span data-dcnode-id="1933" instrument_node="">Other general trends in the development of </span><a class="new" data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DInformation_technology%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Information technology (такой страницы не существует)"><span data-dcnode-id="1932" instrument_node="">information technologies</span></a><span data-dcnode-id="1930" instrument_node=""> highlighted by the representative of Sberbank are increased efficiency, lower TCO, dynamic infrastructure, robotization, the emergence of engineers who know both analytics, and testing, and </span><a data-dcnode-id="1928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/BPM" title="BPM"><span data-dcnode-id="1929" instrument_node="">business processes</span></a><span data-dcnode-id="1927" instrument_node="">. As for the key goal of the financial component of any IT strategy, this is a decrease in the cost of operations with an increase in transaction burden, Mikhail Khasin emphasized.
