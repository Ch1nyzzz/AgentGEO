</span></p><p data-dcnode-id="3745"><span data-dcnode-id="3749" instrument_node="">The head of the Russian government emphasized that Russia and partner countries need joint solutions not only on the opportunities that these technologies open, but also on the challenges faced by states and the </span><a data-dcnode-id="3747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AFourth_Industrial_Revolution_%28Industry_4.0%29" title="Fourth Industrial Revolution (Industry 4.0)"><span data-dcnode-id="3748" instrument_node="">fourth industrial revolution</span></a><span data-dcnode-id="3746" instrument_node=""> on a global scale.
</span></p><span data-dcnode-id="3744" instrument_node="">
</span><span data-dcnode-id="3743" instrument_node="">
</span><span data-dcnode-id="3742" instrument_node="">
</span><table data-dcnode-id="3722" style="margin:auto; border-collapse:collapse; background-color:#F9F9F9; border-style:none;"><tbody data-dcnode-id="3723"><tr data-dcnode-id="3724"><td data-dcnode-id="3736" style="width:30px; vertical-align:top; padding:8px;"><span data-dcnode-id="3741" instrument_node=""> </span><div class="img_path" data-dcnode-id="3738" href="/images/4/44/Aquote1.png" style="cursor: pointer;"><a class="image" data-dcnode-id="3739"><img alt="File:Aquote1.png" border="0" data-dcnode-id="3740" height="23" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/4/44/Aquote1.png&amp;raw" width="30"></a></div><span data-dcnode-id="3737" instrument_node="">
</span></td><td data-dcnode-id="3731" style="padding: 8px;"><span data-dcnode-id="3733" style="font-style:italic"><cite data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">States that do not have their own digital platforms can lose, if not sovereignty, then in any case a huge number of opportunities and, in principle, the right to a future in a changing world. When there are no own technologies, it turns out that there is no own development, "the Prime Minister said, adding that new technological solutions open up great opportunities for people, business and states.</span></cite></span><span data-dcnode-id="3732" instrument_node="">
</span></td><td data-dcnode-id="3725" style="width:30px; vertical-align:bottom; padding:8px;"><span data-dcnode-id="3730" instrument_node=""> </span><div class="img_path" data-dcnode-id="3727" href="/images/4/49/Aquote2.png" style="cursor: pointer;"><a class="image" data-dcnode-id="3728"><img alt="File:Aquote2.png" border="0" data-dcnode-id="3729" height="23" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/4/49/Aquote2.png&amp;raw" width="30"></a></div><span data-dcnode-id="3726" instrument_node="">
</span></td></tr></tbody></table><br data-dcnode-id="3721"><span data-dcnode-id="3720" instrument_node="">
</span><p data-dcnode-id="3708"><span data-dcnode-id="3719" instrument_node="">Dmitry Medvedev also said that five technology companies from the </span><a class="mw-redirect" data-dcnode-id="3717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/USA" title="USA"><span data-dcnode-id="3718" instrument_node="">United States</span></a><span data-dcnode-id="3716" instrument_node=""> and two from </span><a class="mw-redirect" data-dcnode-id="3714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/China" title="China"><span data-dcnode-id="3715" instrument_node="">China</span></a><span data-dcnode-id="3713" instrument_node=""> lead the world market. Medvedev did not list the names of these companies.</span><sup class="reference" data-dcnode-id="3710" id="cite_ref-12"><a data-dcnode-id="3711" href="#cite_note-12" title=""><span data-dcnode-id="3712" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3709" instrument_node="">
</span></p><span data-dcnode-id="3707" instrument_node="">
</span><a data-dcnode-id="3706" id="Forrester_presented_a_forecast_for_the_development_of_the_technology_market_in_2020" name="Forrester_presented_a_forecast_for_the_development_of_the_technology_market_in_2020"></a><h3 data-dcnode-id="3702"><span data-dcnode-id="3705" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">Forrester presented a forecast for the development of the technology market in 2020</span></span></h3><span data-dcnode-id="3701" instrument_node="">
</span><p data-dcnode-id="3696"><span data-dcnode-id="3700" instrument_node="">At the end of October 2019, the research company </span><a data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AForrester" title="Forrester"><span data-dcnode-id="3699" instrument_node="">Forrester</span></a><span data-dcnode-id="3697" instrument_node=""> presented a forecast for the development of the technology market in 2020.
</span></p><p data-dcnode-id="3692"><b data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">An integrated, adaptive approach to IT</span></b><span data-dcnode-id="3693" instrument_node="">
</span></p><p data-dcnode-id="3687"><span data-dcnode-id="3691" instrument_node="">Technological innovation adds value to </span><a class="mw-redirect" data-dcnode-id="3689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IT" title="IT"><span data-dcnode-id="3690" instrument_node="">IT</span></a><span data-dcnode-id="3688" instrument_node=""> for business, but companies will need to reorganize to make the most of new opportunities. It is expected that in the future firms will be guided by an adaptive approach to IT, which will allow them to easily integrate new technologies and transform them under the influence of changing priorities.
</span></p><span data-dcnode-id="3686" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3679" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="3680" href="/images/5/53/IoT-Connected-Machines-Market.jpg" style="width:842px;"><a class="image" data-dcnode-id="3684"><img alt="" border="0" class="thumbimage" data-dcnode-id="3685" height="473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/5/53/IoT-Connected-Machines-Market.jpg/840px-IoT-Connected-Machines-Market.jpg&amp;raw" width="840"></a><span data-dcnode-id="3683" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">Forrester presented a forecast for the development of the technology market in 2020.</span></div></div></div><span data-dcnode-id="3678" instrument_node="">
</span><p data-dcnode-id="3674"><b data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">Companies to double spending on data-processing strategies</span></b><span data-dcnode-id="3675" instrument_node="">
</span></p><p data-dcnode-id="3663"><span data-dcnode-id="3673" instrument_node="">Although interest in </span><a class="mw-redirect" data-dcnode-id="3671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Big_data" title="Big data"><span data-dcnode-id="3672" instrument_node="">big data</span></a><span data-dcnode-id="3670" instrument_node=""> has faded over the past couple of years, their impact on the development of </span><a class="mw-redirect" data-dcnode-id="3668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AI" title="AI"><span data-dcnode-id="3669" instrument_node="">AI technologies</span></a><span data-dcnode-id="3667" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_learning" title="Machine learning"><span data-dcnode-id="3666" instrument_node="">machine learning</span></a><span data-dcnode-id="3664" instrument_node=""> is invaluable. However, analysts suggest that by 2020, companies will have to double data processing costs in order to stay afloat. Obtaining huge amounts of data without systematic errors requires serious organization and investment, and enterprises limit data sharing due to privacy concerns. Analysts have every reason to believe that in 2020, the cost of preparing data for AI may ultimately stop paying back the effort. 
</span></p><p data-dcnode-id="3659"><b data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">Ransomware Hacker Growth</span></b><span data-dcnode-id="3660" instrument_node="">
</span></p><p data-dcnode-id="3654"><span data-dcnode-id="3658" instrument_node="">In 2020, the number of ransomware will increase, as attackers will soon understand what valuable goods information represents. The introduction of new integrating technologies with insufficient protection makes companies easy prey for </span><a class="mw-redirect" data-dcnode-id="3656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Hackers" title="Hackers"><span data-dcnode-id="3657" instrument_node="">hackers</span></a><span data-dcnode-id="3655" instrument_node="">, and the larger the information field, the greater the damage. In addition, the reality is that attackers find it easier to find a gap in protection using new AI and machine learning technologies. Temporary data blocking is a quick path to monetization, and attackers will increasingly demand a ransom for regaining control of information. Analysts predict that AI technologies alone, used to create fake audio and video, will cost enterprises more than $250 000.
</span></p><span data-dcnode-id="3653" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3646" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="3647" href="/images/8/8f/P03gywjs.jpg" style="width:842px;"><a class="image" data-dcnode-id="3651"><img alt="" border="0" class="thumbimage" data-dcnode-id="3652" height="340" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/8/8f/P03gywjs.jpg/840px-P03gywjs.jpg&amp;raw" width="840"></a><span data-dcnode-id="3650" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3648"><span data-dcnode-id="3649" instrument_node="">The number of ransomware will increase, as attackers will soon understand what valuable goods information represents.</span></div></div></div><span data-dcnode-id="3645" instrument_node="">
</span><p data-dcnode-id="3641"><b data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">Automation will change the structure of the labor market</span></b><span data-dcnode-id="3642" instrument_node="">
</span></p><p data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">Analysts believe that automation will change the structure of the labor market and raise global economic problems of income distribution and wage stagnation. In 2020, automation will replace more than a million jobs with robots. However, the number of jobs requiring intuition, empathy, as well as physical agility and a flexible mind will increase by 331,500 units. It turns out that call centers alone will reduce staff by 40% through automation, but the remaining workers will become more skilled and better paid. Unfortunately, not all companies are trying to prepare employees for new work in the future, and this attitude can turn into a disaster.
</span></p><p data-dcnode-id="3635"><b data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">Regulators will actively influence market development</span></b><span data-dcnode-id="3636" instrument_node="">
</span></p><p data-dcnode-id="3626"><span data-dcnode-id="3634" instrument_node="">Analysts suggest that in 2020, regulators who control the exchange of sensitive data will begin to actively influence existing markets and form new ones. It is already noted that many companies do not comply with the basic requirements of the </span><a data-dcnode-id="3632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AGDPR_%28EU_Personal_Data_Regulation%29" title="GDPR (EU Personal Data Regulation)"><span data-dcnode-id="3633" instrument_node="">GDPR</span></a><span data-dcnode-id="3631" instrument_node=""> law: ensuring customer consent, transparency and control of data leakage. Suppliers will be forced to use anonymized or aggregated data, which will change the type of targeted advertising, and enterprises will have to conduct forensic examinations of their supply chains and ecosystems. Regulators will also take action against firms using fraudulent schemes to collect and use sensitive data.</span><sup class="reference" data-dcnode-id="3628" id="cite_ref-13"><a data-dcnode-id="3629" href="#cite_note-13" title=""><span data-dcnode-id="3630" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3627" instrument_node="">
</span></p><span data-dcnode-id="3625" instrument_node="">
</span><a data-dcnode-id="3624" id="Gartner:_Top_10_Technology_Strategic_Trends_for_2020" name="Gartner:_Top_10_Technology_Strategic_Trends_for_2020"></a><h3 data-dcnode-id="3620"><span data-dcnode-id="3623" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">Gartner: Top 10 Technology Strategic Trends for 2020</span></span></h3><span data-dcnode-id="3619" instrument_node="">
</span><p data-dcnode-id="3611"><span data-dcnode-id="3618" instrument_node="">At the end of October 2019, </span><a class="mw-redirect" data-dcnode-id="3616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AGartner" title="Gartner"><span data-dcnode-id="3617" instrument_node="">Gartner</span></a><span data-dcnode-id="3615" instrument_node=""> presented the main strategic trends in the field of </span><a class="mw-redirect" data-dcnode-id="3613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IT" title="IT"><span data-dcnode-id="3614" instrument_node="">information technology</span></a><span data-dcnode-id="3612" instrument_node="">, which companies around the world should pay attention to in 2020.
</span></p><span data-dcnode-id="3610" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3603" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="3604" href="/images/0/02/Gartner_headquarters_cropped.jpg" style="width:842px;"><a class="image" data-dcnode-id="3608"><img alt="" border="0" class="thumbimage" data-dcnode-id="3609" height="510" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/0/02/Gartner_headquarters_cropped.jpg/840px-Gartner_headquarters_cropped.jpg&amp;raw" width="840"></a><span data-dcnode-id="3607" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">Gartner unveils key information technology strategic trends that companies around the world should look at</span></div></div></div><span data-dcnode-id="3602" instrument_node="">
</span><p data-dcnode-id="3598"><b data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">Hyper automation</span></b><span data-dcnode-id="3599" instrument_node="">
</span></p><p data-dcnode-id="3590"><span data-dcnode-id="3597" instrument_node="">Hyperautomatization is a comprehensive application </span><a class="mw-redirect" data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_learning" title="Machine learning"><span data-dcnode-id="3596" instrument_node="">of machine learning</span></a><span data-dcnode-id="3594" instrument_node="">, ready-made </span><a class="new" data-dcnode-id="3592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DON%26action%3Dedit%26redlink%3D1" rel="nofollow" title="ON (такой страницы не существует)"><span data-dcnode-id="3593" instrument_node="">software</span></a><span data-dcnode-id="3591" instrument_node=""> and automation tools to perform any work. Hyperautomatization implies not only a wide range of tools, but also the complication of all stages of automation itself. Accurate assessment and coordination of automated mechanisms is the main direction of hyperautomatization.
</span></p><p data-dcnode-id="3586"><b data-dcnode-id="3588"><span data-dcnode-id="3589" instrument_node="">Multimodal perception</span></b><span data-dcnode-id="3587" instrument_node="">
</span></p><p data-dcnode-id="3575"><span data-dcnode-id="3585" instrument_node="">By 2028, users will begin to perceive the digital world and interact with it completely differently. Already, interactive platforms, </span><a class="mw-redirect" data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/VR" title="VR"><span data-dcnode-id="3584" instrument_node="">virtual</span></a><span data-dcnode-id="3582" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AR" title="AR"><span data-dcnode-id="3581" instrument_node="">augmented</span></a><span data-dcnode-id="3579" instrument_node=""> and </span><a class="new" data-dcnode-id="3577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DMixed_Reality_%28Hybrid_Reality%2C_Mixed_Reality%2C_MR%29%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Mixed Reality (Hybrid Reality, Mixed Reality, MR) (такой страницы не существует)"><span data-dcnode-id="3578" instrument_node="">mixed reality</span></a><span data-dcnode-id="3576" instrument_node=""> are changing the way people perceive the digital world. This combined shift allows you to imagine what the multi-sensory and multimodal experience of user interaction with the digital world will look like in the future.
</span></p><p data-dcnode-id="3571"><b data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">Democratization of knowledge</span></b><span data-dcnode-id="3572" instrument_node="">
</span></p><p data-dcnode-id="3563"><span data-dcnode-id="3570" instrument_node="">Democratization should provide users with access to technical knowledge (e.g. </span><a class="mw-redirect" data-dcnode-id="3568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Machine_Learning" title="Machine Learning"><span data-dcnode-id="3569" instrument_node="">machine learning</span></a><span data-dcnode-id="3567" instrument_node="">, application development) or business knowledge (e.g. sales process, economic analysis) through radically simplified experiences that do not require deep and costly training. This enables non-IT people </span><a class="mw-redirect" data-dcnode-id="3565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IT" title="IT"><span data-dcnode-id="3566" instrument_node="">to</span></a><span data-dcnode-id="3564" instrument_node=""> use specialized tools and systems in their work. Four key aspects of democratization are expected to come forward by 2023, including the democratization of data and analytics, the democratization of application development, the democratization of design, and the democratization of knowledge.
</span></p><p data-dcnode-id="3559"><b data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">Human development</span></b><span data-dcnode-id="3560" instrument_node="">
</span></p><p data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">Transhumanism explores how technology can be used to improve a person's cognitive and physical properties. Physical improvement can be accomplished by implanting technologies or using wearable devices. Cognitive improvement - through constant access to information and a multimodal interface in intelligent spaces.
</span></p><span data-dcnode-id="3556" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3549" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="3550" href="/images/a/a5/Cyber.jpg" style="width:842px;"><a class="image" data-dcnode-id="3554"><img alt="" border="0" class="thumbimage" data-dcnode-id="3555" height="524" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/a/a5/Cyber.jpg/840px-Cyber.jpg&amp;raw" width="840"></a><span data-dcnode-id="3553" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">Physical improvement can be accomplished by implanting technologies or using wearable devices.</span></div></div></div><span data-dcnode-id="3548" instrument_node="">
</span><p data-dcnode-id="3544"><b data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">Transparency and traceability</span></b><span data-dcnode-id="3545" instrument_node="">
</span></p><p data-dcnode-id="3539"><span data-dcnode-id="3543" instrument_node="">Data transparency and traceability are critical elements in an ethical system that protects the confidentiality of its participants. As organizations develop different methods of transparency and trust, they should focus on three areas: (1) </span><a class="mw-redirect" data-dcnode-id="3541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AI" title="AI"><span data-dcnode-id="3542" instrument_node="">AI</span></a><span data-dcnode-id="3540" instrument_node=""> and machine learning; (2) ensuring confidentiality and control of personal data; (3) ethically-validated design.
</span></p><p data-dcnode-id="3535"><b data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">Reinforcement of periphery</span></b><span data-dcnode-id="3536" instrument_node="">
</span></p><p data-dcnode-id="3527"><span data-dcnode-id="3534" instrument_node="">When using peripheral computing, information is collected and processed as close as possible to the sources, repositories and consumers of this information. This reduces the delay in the transmission of information, uses the capabilities of peripheral devices and provides greater user autonomy. It is believed that </span><a class="mw-redirect" data-dcnode-id="3532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Edge_computing" title="Edge computing"><span data-dcnode-id="3533" instrument_node="">peripheral computing</span></a><span data-dcnode-id="3531" instrument_node=""> will soon become the dominant factor in almost all industries. Complex peripherals, including </span><a data-dcnode-id="3529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ARobots_%28robotics%29" title="Robots (robotics)"><span data-dcnode-id="3530" instrument_node="">robots</span></a><span data-dcnode-id="3528" instrument_node="">, drones, autonomous vehicles and operating systems, will accelerate this transition.
</span></p><p data-dcnode-id="3523"><b data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">Distributed Cloud</span></b><span data-dcnode-id="3524" instrument_node="">
</span></p><p data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">Distributed cloud is the distribution of public cloud services to different locations, while the public cloud provider takes responsibility for the operation, management, updating and development of these services. The use of a distributed cloud marks a departure from the centralized model of public cloud services and indicates the advent of a new era in cloud computing.
</span></p><p data-dcnode-id="3517"><b data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">Standalone Things</span></b><span data-dcnode-id="3518" instrument_node="">
</span></p><p data-dcnode-id="3509"><span data-dcnode-id="3516" instrument_node="">Autonomous things are physical devices that use </span><a class="mw-redirect" data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AI" title="AI"><span data-dcnode-id="3515" instrument_node="">AI</span></a><span data-dcnode-id="3513" instrument_node=""> to automate functions previously performed by people. The most recognizable forms of autonomous things are robots, </span><a data-dcnode-id="3511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AUnmanned_aerial_vehicle_%28drone%2C_UAV%29" title="Unmanned aerial vehicle (drone, UAV)"><span data-dcnode-id="3512" instrument_node="">drones</span></a><span data-dcnode-id="3510" instrument_node="">, autonomous vehicles and equipment. As autonomous things spread, you should expect to move from autonomous intelligent things to whole complexes, when several devices will work together, regardless of people or with their participation. For example, robots can work in a coordinated assembly process. 
</span></p><span data-dcnode-id="3508" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3501" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="3502" href="/images/1/16/573981-ehang-184-min.png" style="width:842px;"><a class="image" data-dcnode-id="3506"><img alt="" border="0" class="thumbimage" data-dcnode-id="3507" height="473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/1/16/573981-ehang-184-min.png&amp;raw" width="840"></a><span data-dcnode-id="3505" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">Unmanned aerial vehicles should be expected from autonomous intelligent things to entire complexes when several devices work together</span></div></div></div><span data-dcnode-id="3500" instrument_node="">
</span><p data-dcnode-id="3496"><b data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">Practical blockchain</span></b><span data-dcnode-id="3497" instrument_node="">
</span></p><p data-dcnode-id="3492"><a data-dcnode-id="3494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ABlockchain" title="Blockchain"><span data-dcnode-id="3495" instrument_node="">Blockchain</span></a><span data-dcnode-id="3493" instrument_node=""> is able to transform all relationships in any industry, providing trust, transparency and secure data exchange in business ecosystems. Potentially, it can reduce costs, reduce transaction times, and optimize cash flows. It can be used to track deliveries, manage identification, and create smart contracts. However, so far, blockchain cannot be used at the corporate level due to a number of technical problems, including poor scalability and compatibility. However, analysts advise organizations to assess the benefits of blockchain, even if they do not expect the aggressive introduction of this technology in the near future.
</span></p><p data-dcnode-id="3488"><b data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">AI Security</span></b><span data-dcnode-id="3489" instrument_node="">
</span></p><p data-dcnode-id="3476"><span data-dcnode-id="3487" instrument_node="">AI and machine learning are widely used to optimize human decision-making, paving the way for hyperautomatization and the use of autonomous things. However, these transformations create new security problems, increasing the number of potential cyber </span><a class="mw-redirect" data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cyber_attacks" title="Cyber attacks"><span data-dcnode-id="3486" instrument_node="">attack</span></a><span data-dcnode-id="3484" instrument_node=""> points. </span><a class="mw-redirect" data-dcnode-id="3482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cyber_security" title="Cyber security"><span data-dcnode-id="3483" instrument_node="">Cybersecurity</span></a><span data-dcnode-id="3481" instrument_node=""> and risk specialists should focus on three key areas - the protection of AI-based systems, the use of AI to strengthen protection and the potential use of AI by intruders.</span><sup class="reference" data-dcnode-id="3478" id="cite_ref-14"><a data-dcnode-id="3479" href="#cite_note-14" title=""><span data-dcnode-id="3480" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3477" instrument_node="">
</span></p><span data-dcnode-id="3475" instrument_node="">
</span><a data-dcnode-id="3474" id="TrendForce:_Top_10_ICT_trends_for_2020" name="TrendForce:_Top_10_ICT_trends_for_2020"></a><h3 data-dcnode-id="3470"><span data-dcnode-id="3473" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">TrendForce: Top 10 ICT trends for 2020</span></span></h3><span data-dcnode-id="3469" instrument_node="">
</span><p data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">In mid-October 2019, the analytical company TrendForce presented a forecast for the development of the information and communication technology industry for 2020. The following are 10 key provisions.
</span></p><span data-dcnode-id="3466" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3459" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="3460" href="/images/1/10/658411001569475728.png" style="width:842px;"><a class="image" data-dcnode-id="3464"><img alt="" border="0" class="thumbimage" data-dcnode-id="3465" height="831" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/1/10/658411001569475728.png&amp;raw" width="840"></a><span data-dcnode-id="3463" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">10 Key Information and Communications Technology Development Regulations for 2020</span></div></div></div><span data-dcnode-id="3458" instrument_node="">
</span><p data-dcnode-id="3454"><b data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">Demand for AI, 5G and automation will allow the global semiconductor market to recover</span></b><span data-dcnode-id="3455" instrument_node="">
</span></p><p data-dcnode-id="3440"><span data-dcnode-id="3453" instrument_node="">The global semiconductor market collapsed in 2019 due to the consequences of trade disputes between the </span><a class="mw-redirect" data-dcnode-id="3451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/USA" title="USA"><span data-dcnode-id="3452" instrument_node="">United States</span></a><span data-dcnode-id="3450" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/China" title="China"><span data-dcnode-id="3449" instrument_node="">China</span></a><span data-dcnode-id="3447" instrument_node="">. Although the forecast for 2020 remains uncertain, it is assumed that the recovery of the market will be facilitated by demand related to </span><a class="mw-redirect" data-dcnode-id="3445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/5G" title="5G"><span data-dcnode-id="3446" instrument_node="">5G</span></a><span data-dcnode-id="3444" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AI" title="AI"><span data-dcnode-id="3443" instrument_node="">AI</span></a><span data-dcnode-id="3441" instrument_node=""> and automation applications.
</span></p><p data-dcnode-id="3436"><b data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">DRAM will evolve towards EUV and DDR5/LPDDR5</span></b><span data-dcnode-id="3437" instrument_node="">
</span></p><p data-dcnode-id="3432"><a data-dcnode-id="3434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ADRAM" title="DRAM"><span data-dcnode-id="3435" instrument_node="">DRAM</span></a><span data-dcnode-id="3433" instrument_node=""> manufacturers are actively working to increase power and reduce power consumption, and modules such as EUV and DDR5/LPDDR5 should come first. Although DDR5/LPDDR5 products will make their market debut and must go through the initial acceptance and selection stage, their advantages over DDR4/LPDDR4 are unlikely to go unnoticed. 
</span></p><p data-dcnode-id="3428"><b data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">5G Commercial Solution Portfolio Expands</span></b><span data-dcnode-id="3429" instrument_node="">
</span></p><p data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">Major manufacturers and suppliers of telecommunications equipment will implement various hardware and software solutions, competing for 5G market share. The main focus of the network architecture development will be on Standalone (SA) 5G technologies, so the growing demand for 5G New Radio (NR) equipment is very likely.
</span></p><p data-dcnode-id="3420"><b data-dcnode-id="3422"><a class="mw-redirect" data-dcnode-id="3424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Smartphone" title="Smartphone"><span data-dcnode-id="3425" instrument_node="">5G smartphones</span></a><span data-dcnode-id="3423" instrument_node=""> market share will exceed 15%</span></b><span data-dcnode-id="3421" instrument_node="">
</span></p><p data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">Smartphone manufacturers will focus on increasing screen space and flexibility, increasing the introduction of fingerprint sensors, memory optimization and 5G support. It is expected that more than 50% of smartphones with 5G support will be produced under Chinese brands.
</span></p><span data-dcnode-id="3417" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3410" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="3411" href="/images/b/bf/YJiriqXSPdWigY1fchL0QK5juUkDPsCJNyWZVXrq.jpg" style="width:842px;"><a class="image" data-dcnode-id="3415"><img alt="" border="0" class="thumbimage" data-dcnode-id="3416" height="562" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/b/bf/YJiriqXSPdWigY1fchL0QK5juUkDPsCJNyWZVXrq.jpg/840px-YJiriqXSPdWigY1fchL0QK5juUkDPsCJNyWZVXrq.jpg&amp;raw" width="840"></a><span data-dcnode-id="3414" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">5G smartphones market share will exceed 15%</span></div></div></div><span data-dcnode-id="3409" instrument_node="">
</span><p data-dcnode-id="3405"><b data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">Tablets will be a new battleground between mini LEDs and OLED</span></b><span data-dcnode-id="3406" instrument_node="">
</span></p><p data-dcnode-id="3400"><span data-dcnode-id="3404" instrument_node="">The production conditions of higher-end smartphones, which increase contrast thanks to mini-LED lighting, are becoming increasingly available. It is assumed that </span><a class="mw-redirect" data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Apple_iPad" title="Apple iPad"><span data-dcnode-id="3403" instrument_node="">iPad</span></a><span data-dcnode-id="3401" instrument_node=""> 2020 will be simultaneously equipped with mini LED backlight and OLED, so that tablets can become a new battleground between mini LEDs and OLED.
</span></p><p data-dcnode-id="3396"><b data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">Micro LED Could Win the Display Industry</span></b><span data-dcnode-id="3397" instrument_node="">
</span></p><p data-dcnode-id="3391"><span data-dcnode-id="3395" instrument_node="">More and more manufacturers are using </span><a data-dcnode-id="3393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AMicro_LED" title="Micro LED"><span data-dcnode-id="3394" instrument_node="">Micro LED</span></a><span data-dcnode-id="3392" instrument_node="">, but due to existing restrictions, the maximum size of such a display is 12 inches. However, the use of the latest technologies is quite capable of bringing Micro LED to the first place in the display market.
</span></p><p data-dcnode-id="3387"><b data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">Increasing implementation of 3D modules based on ToF solutions will contribute to the development of AR applications</span></b><span data-dcnode-id="3388" instrument_node="">
</span></p><p data-dcnode-id="3379"><span data-dcnode-id="3386" instrument_node="">ToF modules will be one of the main options for manufacturers of branded smartphones when developing rear cameras of devices. This will enhance </span><a data-dcnode-id="3384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AAugmented_Reality_%28AR%2C_Augmented_Reality%29" title="Augmented Reality (AR, Augmented Reality)"><span data-dcnode-id="3385" instrument_node="">augmented reality</span></a><span data-dcnode-id="3383" instrument_node=""> (</span><a class="mw-redirect" data-dcnode-id="3381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AR" title="AR"><span data-dcnode-id="3382" instrument_node="">AR)</span></a><span data-dcnode-id="3380" instrument_node=""> capabilities through accurate 3D depth mapping, which drives demand for AR applications.
</span></p><p data-dcnode-id="3375"><b data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">Touch capabilities are the foundation for value IoT</span></b><span data-dcnode-id="3376" instrument_node="">
</span></p><p data-dcnode-id="3371"><a class="mw-redirect" data-dcnode-id="3373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IoT" title="IoT"><span data-dcnode-id="3374" instrument_node="">IoT</span></a><span data-dcnode-id="3372" instrument_node=""> will increasingly penetrate different application markets and transform entire industries, stimulating process optimization and creating value-added services. Improved sensory capabilities will allow intelligent devices to respond more adequately to changes in the environment, which means that it will increase the value of the IoT as a whole.
</span></p><p data-dcnode-id="3367"><b data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">Race for the commercialization of unmanned aerial vehicles</span></b><span data-dcnode-id="3368" instrument_node="">
</span></p><p data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">In 2020, the number of commercial applications for unmanned vehicles will increase, but the cost of developing them is quite high, and car manufacturers will have to find new business models that will support the profitability of development.
</span></p><p data-dcnode-id="3361"><b data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">Standardized-cost solar panels are a thing of the past</span></b><span data-dcnode-id="3362" instrument_node="">
</span></p><p data-dcnode-id="3352"><span data-dcnode-id="3360" instrument_node="">The development </span><a data-dcnode-id="3358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ASolar_Power_%28Global_Market%29" title="Article:Solar Power (Global Market)"><span data-dcnode-id="3359" instrument_node="">of solar cell</span></a><span data-dcnode-id="3357" instrument_node=""> technologies has moved away from the standard cell cost estimate. Manufacturers now need to improve the efficiency of individual cells and the total power of the module, and they cannot set a specific battery price in the future market. Now the price will depend only on market demand and supply.</span><sup class="reference" data-dcnode-id="3354" id="cite_ref-15"><a data-dcnode-id="3355" href="#cite_note-15" title=""><span data-dcnode-id="3356" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3353" instrument_node="">
</span></p><span data-dcnode-id="3351" instrument_node="">
</span><a data-dcnode-id="3350" id="15_Key_Technologies_That_Could_Change_Our_Lives_-_Bank_of_America_Merrill_Lynch" name="15_Key_Technologies_That_Could_Change_Our_Lives_-_Bank_of_America_Merrill_Lynch"></a><h3 data-dcnode-id="3346"><span data-dcnode-id="3349" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">15 Key Technologies That Could Change Our Lives - Bank of America Merrill Lynch</span></span></h3><span data-dcnode-id="3345" instrument_node="">
</span><p data-dcnode-id="3338"><a data-dcnode-id="3343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3ABank_of_America" title="Bank of America"><span data-dcnode-id="3344" instrument_node="">Bank of America</span></a><span data-dcnode-id="3342" instrument_node=""> Merrill Lynch has studied technologies of the future that can change our lives and have an impact on industry with a total value of more than $13 trillion. The results of the Bank of America Merrill Lynch study were provided to </span><a class="mw-redirect" data-dcnode-id="3340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/TAdviser" title="TAdviser"><span data-dcnode-id="3341" instrument_node="">TAdviser</span></a><span data-dcnode-id="3339" instrument_node=""> on October 8, 2019.
</span></p><span data-dcnode-id="3337" instrument_node="">
</span><ul data-dcnode-id="3311"><li data-dcnode-id="3330"><a data-dcnode-id="3335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AQuantum_Computer_and_Quantum_Communication" title="Quantum Computer and Quantum Communication"><span data-dcnode-id="3336" instrument_node="">Quantum computers</span></a><span data-dcnode-id="3334" instrument_node=""> could solve problems that traditional </span><a class="mw-redirect" data-dcnode-id="3332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Computer" title="Computer"><span data-dcnode-id="3333" instrument_node="">computers</span></a><span data-dcnode-id="3331" instrument_node=""> would take a billion years to solve.
</span></li><li data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node=""> The 6G download speed can exceed 400 Gb/s.
</span></li><li data-dcnode-id="3323"><span data-dcnode-id="3327" instrument_node=""> Nanosatellites can provide the entire planet </span><a class="mw-redirect" data-dcnode-id="3325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet" title="Internet"><span data-dcnode-id="3326" instrument_node="">with Internet</span></a><span data-dcnode-id="3324" instrument_node="">. 
</span></li><li data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node=""> From the subsoil of the ocean you can extract 3 times more cobalt for the production of electric vehicles than from the subsoil of the earth.
</span></li><li data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node=""> Graphene (the thinnest and most durable material known to man) can have many revolutionary applications.
</span></li><li data-dcnode-id="3312"><a class="mw-redirect" data-dcnode-id="3317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="3318" instrument_node="">Artificial</span></a><span data-dcnode-id="3316" instrument_node=""> intelligence can match human </span><a class="mw-redirect" data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="3315" instrument_node="">intelligence</span></a><span data-dcnode-id="3313" instrument_node=""> as early as 2029.
</span></li></ul><span data-dcnode-id="3310" instrument_node="">
</span><p data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">
</span></p><p data-dcnode-id="3303"><span data-dcnode-id="3307" instrument_node="">These are just some of the 15 key technologies from this report that can change our lives and accelerate the impact of global megatrends. Despite the fact that these technologies look like ideas of the distant future, they are not as far away as we think. Failure </span><a class="mw-redirect" data-dcnode-id="3305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Identification" title="Identification"><span data-dcnode-id="3306" instrument_node="">to identify</span></a><span data-dcnode-id="3304" instrument_node=""> them could mean missing the next technological revolution.
</span></p><p data-dcnode-id="3295"><span data-dcnode-id="3302" instrument_node="">The pace of business transformation has accelerated significantly; but we expect even more exponential growth in the coming years. Thus, what seems to happen only in 10-15 years can happen much faster. An increase in the number of </span><a data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AData" title="Data"><span data-dcnode-id="3301" instrument_node="">data</span></a><span data-dcnode-id="3299" instrument_node=""> (doubling every 2-3 years), more processing power and the increasingly active spread of </span><a data-dcnode-id="3297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Product%3AArtificial_intelligence_%28AI%2C_Artificial_intelligence%2C_AI%29" title="Artificial intelligence (AI, Artificial intelligence, AI)"><span data-dcnode-id="3298" instrument_node="">artificial intelligence </span></a><span data-dcnode-id="3296" instrument_node="">(200 billion connected devices by 2025), will lead to the rapid introduction of breakthrough technologies.
</span></p><p data-dcnode-id="3281"><span data-dcnode-id="3294" instrument_node="">Non-standard solutions are needed to meet the emerging challenges and challenges facing the world. In the next 40 years, the planet will need to produce more food than all farmers and farmers have produced over the past 8,000 years. Next-generation technologies like vertical farming and lab-grown meat can be a solution. And geoengineering can mitigate the problem of global warming with investments of less than 1% of annual global capital investments in the </span><a class="mw-redirect" data-dcnode-id="3292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Oil_industry" title="Oil industry"><span data-dcnode-id="3293" instrument_node="">oil</span></a><span data-dcnode-id="3291" instrument_node=""> industry. In the next 10 years, </span><a class="mw-redirect" data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/5G" title="5G"><span data-dcnode-id="3290" instrument_node="">5G</span></a><span data-dcnode-id="3288" instrument_node=""> will not be able to cope with the exponential growth of data transmission. 6G can provide speeds up to 400 times faster than 5G. As of October 2019, 41% of the planet is still not connected to the </span><a class="mw-redirect" data-dcnode-id="3286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet" title="Internet"><span data-dcnode-id="3287" instrument_node="">Internet</span></a><span data-dcnode-id="3285" instrument_node="">. </span><a data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Satellite_communications_and_navigation" title="Satellite communications and navigation"><span data-dcnode-id="3284" instrument_node="">Satellite</span></a><span data-dcnode-id="3282" instrument_node=""> constellations can begin to provide wider access by 2021.
</span></p><span data-dcnode-id="3280" instrument_node="">

</span></p><p data-dcnode-id="2999"><span data-dcnode-id="3009" instrument_node="">According to Nick Jones, President of Research at Gartner, we are talking about 10 wireless technologies and trends that will stimulate the development of innovations in areas such as </span><a data-dcnode-id="3007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Robotics" title="Robotics"><span data-dcnode-id="3008" instrument_node="">robotics</span></a><span data-dcnode-id="3006" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Drones" title="Drones"><span data-dcnode-id="3005" instrument_node="">drones</span></a><span data-dcnode-id="3003" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Unmanned_vehicles" title="Unmanned vehicles"><span data-dcnode-id="3002" instrument_node="">unmanned vehicles</span></a><span data-dcnode-id="3000" instrument_node=""> and medical equipment.
</span></p><p data-dcnode-id="2994"><b data-dcnode-id="2996"><a class="mw-redirect" data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AWi-Fi" title="Wi-Fi"><span data-dcnode-id="2998" instrument_node="">Wi-Fi</span></a></b><span data-dcnode-id="2995" instrument_node="">
</span></p><p data-dcnode-id="2989"><span data-dcnode-id="2993" instrument_node="">Wi-Fi has existed for a long time, and this network technology will remain the main one for use in homes and offices until the end of 2024, the researchers are sure. In addition to simple communications, Wi-Fi will be used in more complex projects - for example, in radar equipment or as a component of two-factor </span><a data-dcnode-id="2991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/IB_-_Authentication" title="IB - Authentication"><span data-dcnode-id="2992" instrument_node="">authentication</span></a><span data-dcnode-id="2990" instrument_node=""> systems.
</span></p><p data-dcnode-id="2984"><b data-dcnode-id="2986"><a class="mw-redirect" data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/5G" title="5G"><span data-dcnode-id="2988" instrument_node="">5G</span></a></b><span data-dcnode-id="2985" instrument_node="">
</span></p><p data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">Some operators began to introduce fifth-generation (5G) networks in 2019, others will begin their construction in 2020. It is expected that the deployment of technology will take from 5 to 8 years. In some cases, it can supplement Wi-Fi, as it is economical for high-speed data transmission at large facilities, such as ports, airports and factories. Nick Jones believes that future versions of the 5G standard will improve the ability to use technology on the Internet of Things and systems where minimal data delay is required.

</span></p><p data-dcnode-id="2913"><span data-dcnode-id="2917" instrument_node="">It is a distributed self-organizing network of many&nbsp; sensors&nbsp; and actuators, united by a&nbsp; radio channel. According to Jones, wireless sensor networks have the potential to be used in a variety of areas - from medical diagnostics to object recognition and interaction with </span><a data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ASmart_home" title="Smart home"><span data-dcnode-id="2916" instrument_node="">smart home</span></a><span data-dcnode-id="2914" instrument_node=""> systems.

</span></p><p data-dcnode-id="2889"><span data-dcnode-id="2893" instrument_node="">It can be used by WiFi and 5G systems for high-speed data transmission (for example, </span><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3A4K_Ultra_HD" title="4K Ultra HD"><span data-dcnode-id="2892" instrument_node="">4K</span></a><span data-dcnode-id="2890" instrument_node=""> and 8K video) in a small radius.
</span></p><p data-dcnode-id="2885"><b data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">Backscatter</span></b><span data-dcnode-id="2886" instrument_node="">
</span></p><p data-dcnode-id="2879"><span data-dcnode-id="2884" instrument_node="">Backscatter technology can send data with very low power consumption. This feature makes the technology ideal for small network devices.</span><sup class="reference" data-dcnode-id="2881" id="cite_ref-16"><a data-dcnode-id="2882" href="#cite_note-16" title=""><span data-dcnode-id="2883" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2880" instrument_node="">
</span></p><p data-dcnode-id="2875"><b data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">SDR</span></b><span data-dcnode-id="2876" instrument_node="">
</span></p><p data-dcnode-id="2870"><span data-dcnode-id="2874" instrument_node="">Software Controlled&nbsp; Radio (SCR) transfers most of the signal processing from chips to </span><a data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ASoftware" title="Software"><span data-dcnode-id="2873" instrument_node="">software</span></a><span data-dcnode-id="2871" instrument_node="">, providing support for more frequencies and protocols. The popularity of SDR will grow as new protocols appear, Gartner is confident.

</span><p data-dcnode-id="2852"><span data-dcnode-id="2862" instrument_node="">In July 2019, </span><a class="new" data-dcnode-id="2860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DConsulting%2C_including_management_and_human_resources%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Consulting, including management and human resources (такой страницы не существует)"><span data-dcnode-id="2861" instrument_node="">the consulting</span></a><span data-dcnode-id="2859" instrument_node=""> company </span><a data-dcnode-id="2857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AMcKinsey" title="McKinsey"><span data-dcnode-id="2858" instrument_node="">McKinsey</span></a><span data-dcnode-id="2856" instrument_node=""> presented a report on technologies that can change life, business and the global economy in the coming years, including mobile Internet, </span><a class="mw-redirect" data-dcnode-id="2854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Unmanned_vehicles" title="Unmanned vehicles"><span data-dcnode-id="2855" instrument_node="">unmanned vehicles</span></a><span data-dcnode-id="2853" instrument_node=""> and advanced genomics in this list.
</span></p><p data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">According to analysts, by 2025 the potential economic effect of the introduction of such technologies will be within $14-33 trillion. This analysis is based on an in-depth analysis of key potential benefits, including better products and lower prices. The report includes the following process directions:
</span></p><span data-dcnode-id="2849" instrument_node="">
</span><ul data-dcnode-id="2812"><li data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node=""> mobile Internet;
</span></li><li data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node=""> automation;
</span></li><li data-dcnode-id="2841"><a class="mw-redirect" data-dcnode-id="2843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet_of_Things" title="Internet of Things"><span data-dcnode-id="2844" instrument_node="">Internet of Things</span></a><span data-dcnode-id="2842" instrument_node="">;
</span></li><li data-dcnode-id="2837"><a class="mw-redirect" data-dcnode-id="2839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Cloud_computing" title="Cloud computing"><span data-dcnode-id="2840" instrument_node="">cloud computing</span></a><span data-dcnode-id="2838" instrument_node="">;
</span></li><li data-dcnode-id="2832"><span data-dcnode-id="2836" instrument_node=""> advanced </span><a class="mw-redirect" data-dcnode-id="2834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Robots" title="Robots"><span data-dcnode-id="2835" instrument_node="">robotics</span></a><span data-dcnode-id="2833" instrument_node="">;
</span></li><li data-dcnode-id="2827"><span data-dcnode-id="2831" instrument_node=""> Autonomous </span><a class="mw-redirect" data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Transport" title="Transport"><span data-dcnode-id="2830" instrument_node="">vehicles</span></a><span data-dcnode-id="2828" instrument_node="">;
</span></li><li data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node=""> next generation genomics;
</span></li><li data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node=""> new means of energy storage;
</span></li><li data-dcnode-id="2819"><a class="new" data-dcnode-id="2821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3D3D_Printing%26action%3Dedit%26redlink%3D1" rel="nofollow" title="3D Printing (такой страницы не существует)"><span data-dcnode-id="2822" instrument_node="">3D printing</span></a><span data-dcnode-id="2820" instrument_node="">;
</span></li><li data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node=""> improved materials and fuel;
</span></li><li data-dcnode-id="2813"><a class="mw-redirect" data-dcnode-id="2815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Renewable_energy_sources" title="Renewable energy sources"><span data-dcnode-id="2816" instrument_node="">renewable energy sources</span></a><span data-dcnode-id="2814" instrument_node="">.
</span></li></ul><span data-dcnode-id="2811" instrument_node="">
</span><p data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">
</span></p><span data-dcnode-id="2808" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2801" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="2802" href="/images/3/3f/Снимок_экрана_2019-07-19_в_9.27.12.png" style="width:750px;"><a class="image" data-dcnode-id="2806"><img alt="" border="0" class="thumbimage" data-dcnode-id="2807" height="434" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/3/3f/%25D0%25A1%25D0%25BD%25D0%25B8%25D0%25BC%25D0%25BE%25D0%25BA_%25D1%258D%25D0%25BA%25D1%2580%25D0%25B0%25D0%25BD%25D0%25B0_2019-07-19_%25D0%25B2_9.27.12.png&amp;raw" width="748"></a><span data-dcnode-id="2805" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Projected economic impact of technology in 2025, McKinsey</span></div></div></div><span data-dcnode-id="2800" instrument_node="">
</span><p data-dcnode-id="2789"><span data-dcnode-id="2799" instrument_node="">One of the technologies included in the report is advanced robotics, that is, </span><a data-dcnode-id="2797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ARobots_%28robotics%29" title="Robots (robotics)"><span data-dcnode-id="2798" instrument_node="">robots</span></a><span data-dcnode-id="2796" instrument_node=""> or robotic tools with </span><a class="mw-redirect" data-dcnode-id="2794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/AI" title="AI"><span data-dcnode-id="2795" instrument_node="">AI that</span></a><span data-dcnode-id="2793" instrument_node=""> can perform tasks that were previously considered too delicate or uneconomical for automation. Thus, </span><a data-dcnode-id="2791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ARobot_surgeons" title="Robot surgeons"><span data-dcnode-id="2792" instrument_node="">robotic surgical systems</span></a><span data-dcnode-id="2790" instrument_node=""> make operational procedures less invasive, and robotic prosthetics and exoskeletons restore the lost functions of patients.
</span></p><p data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">Next-generation genomics combines DNA imaging with rapidly evolving computational and analytical capabilities. As our understanding of human genomic structure improves, so does the ability to manipulate genes and improve diagnosis. Next-generation genomics will offer similar advances for plants and animals, potentially increasing the agricultural productivity of vast regions, as well as creating new valuable substances, such as bacterium-based bio-diesel.
</span></p><span data-dcnode-id="2786" instrument_node="">
</span><div class="thumb tright floartoright 375" data-dcnode-id="2779" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="2780" href="/images/0/0c/Снимок_экрана_2019-07-19_в_9.27.52.png" style="width:395px;"><a class="image" data-dcnode-id="2784"><img alt="" border="0" class="thumbimage" data-dcnode-id="2785" height="619" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/0/0c/%25D0%25A1%25D0%25BD%25D0%25B8%25D0%25BC%25D0%25BE%25D0%25BA_%25D1%258D%25D0%25BA%25D1%2580%25D0%25B0%25D0%25BD%25D0%25B0_2019-07-19_%25D0%25B2_9.27.52.png&amp;raw" width="373"></a><span data-dcnode-id="2783" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Distribution of the economic impact of technology between developed and developing countries</span></div></div></div><span data-dcnode-id="2778" instrument_node="">
</span><p data-dcnode-id="2771"><a data-dcnode-id="2776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ALithium_ion_batteries_%28Li-ion%29" title="Lithium ion batteries (Li-ion)"><span data-dcnode-id="2777" instrument_node="">Lithium-ion batteries</span></a><span data-dcnode-id="2775" instrument_node=""> and fuel cells are already driving electric and hybrid cars, as well as billions of portable household devices. In the coming decade, progressive energy storage technologies will be able to increase the competitiveness of electric vehicles, deliver electricity to remote areas of </span><a data-dcnode-id="2773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3ADeveloping_countries" title="Developing countries"><span data-dcnode-id="2774" instrument_node="">developing countries</span></a><span data-dcnode-id="2772" instrument_node=""> and improve the efficiency of the energy system as a whole, according to a study released in July 2019.
</span></p><p data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">The potential benefits of the technologies discussed in the report are huge, but if business leaders and governments passively expect them to come, they will not have time to benefit or respond to the consequences. Business leaders must continually update their organizational strategies with ever-evolving technologies and use them to improve internal productivity. New technologies will allow you to create completely new products and services, but leaders do not need to be afraid to go beyond the old business models.
</span></p><span data-dcnode-id="2768" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2761" style="cursor: pointer;"><div data-dcnode-id="2762" href="/images/6/62/Снимок_экрана_2019-07-19_в_9.28.38.png" style="width:508px; margin:auto;"><a class="image" data-dcnode-id="2766"><img alt="" border="0" class="thumbimage" data-dcnode-id="2767" height="331" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/6/62/%25D0%25A1%25D0%25BD%25D0%25B8%25D0%25BC%25D0%25BE%25D0%25BA_%25D1%258D%25D0%25BA%25D1%2580%25D0%25B0%25D0%25BD%25D0%25B0_2019-07-19_%25D0%25B2_9.28.38.png&amp;raw" width="506"></a><span data-dcnode-id="2765" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">After the Industrial Revolution, the World Passed</span></div></div></div><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">unprecedented growth that has been driven by innovation. Calculation of world GDP per capita]]
</span></p><p data-dcnode-id="2746"><span data-dcnode-id="2757" instrument_node="">Policymakers can use advanced technologies to solve their own problems (for example, by deploying the </span><a class="mw-redirect" data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet" title="Internet"><span data-dcnode-id="2756" instrument_node="">Internet</span></a><span data-dcnode-id="2754" instrument_node=""> of Things to manage infrastructure). The nature of the work will continue to change and retraining of staff will be required. Some of the new technologies can be used to solve these problems, for example, by creating updated training systems using the mobile Internet. Governments will also need to consider new indicators that reflect not only the impact of </span><a data-dcnode-id="2752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Article%3AGDP_-_Gross_Domestic_Product_%28GDP%29" title="GDP - Gross Domestic Product (GDP)"><span data-dcnode-id="2753" instrument_node="">GDP</span></a><span data-dcnode-id="2751" instrument_node="">, and such an approach will help them strike a balance between stimulating growth and controlling public welfare.</span><sup class="reference" data-dcnode-id="2748" id="cite_ref-17"><a data-dcnode-id="2749" href="#cite_note-17" title=""><span data-dcnode-id="2750" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2747" instrument_node="">
</span></p><span data-dcnode-id="2745" instrument_node="">
</span><a data-dcnode-id="2744" id="A.T._Kearney:_companies_need_to_get_used_to_the_era_of_.22digital_disorder.22" name="A.T._Kearney:_companies_need_to_get_used_to_the_era_of_.22digital_disorder.22"></a><h3 data-dcnode-id="2740"><span data-dcnode-id="2743" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">A.T. Kearney: companies need to get used to the era of "digital disorder"</span></span></h3><span data-dcnode-id="2739" instrument_node="">
</span><p data-dcnode-id="2734"><span data-dcnode-id="2738" instrument_node="">Companies will have to get used to the era of "digital disorder," which is characterized by an increasingly complex combination of digital economy management rules in a growing geopolitical competition. This is stated in a study released by </span><a data-dcnode-id="2736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AA.T._Kearney" title="A.T. Kearney"><span data-dcnode-id="2737" instrument_node="">A.T. Kearney</span></a><span data-dcnode-id="2735" instrument_node=""> analysts at the end of June 2019.
</span></p><p data-dcnode-id="2729"><span data-dcnode-id="2733" instrument_node="">According to experts, by 2030 there will be a new digital era, the content of which will be determined by the trajectory of development of the global regulatory environment for technologies, as well as the degree of openness of the </span><a class="mw-redirect" data-dcnode-id="2731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Internet" title="Internet"><span data-dcnode-id="2732" instrument_node="">Internet</span></a><span data-dcnode-id="2730" instrument_node="">.
</span></p><span data-dcnode-id="2728" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2722" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="2723" href="/images/0/0f/User_interface_futuristic_digital_transformation_thinkstock_826567492-100740667-large.jpg" style="width:842px;"><a class="image" data-dcnode-id="2726"><img alt="" border="0" class="thumbimage" data-dcnode-id="2727" height="560" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/0/0f/User_interface_futuristic_digital_transformation_thinkstock_826567492-100740667-large.jpg/840px-User_interface_futuristic_digital_transformation_thinkstock_826567492-100740667-large.jpg&amp;raw" width="840"></a><span data-dcnode-id="2725" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2724"></div></div></div><span data-dcnode-id="2721" instrument_node="">
</span><p data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">To help firms prepare for a future era, A.T. Kearney introduced a strategic digital transformation scheme and warned that companies cannot afford to passively watch the digital revolution. They must actively adapt to the current disorder, as well as prepare for the future digital "order" through digital transformation.
</span></p><p data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">Much attention is paid to the "technological blow" associated with key issues such as consumer privacy, data protection and anticompetitive practices. According to experts, Mmogie governments seek to choose such a policy in order to minimize the shortcomings of the system, and these actions will directly affect the ability of companies to effectively use digital technologies in the coming years.
</span></p><p data-dcnode-id="2711"><span data-dcnode-id="2716" instrument_node="">This cycle of innovation, adoption and regulation is consistent with previous waves of technological change. The A.T. Kearney study proposes four scenarios for the appearance of the digital order, based on two main variables - regulatory activity and the development of the digital environment. Among the options presented there is both a "cold digital war" and a "split Internet. Experts believe that all options for the development of future technologies are possible, and in some markets they are already being implemented by the end of June 2019.</span><sup class="reference" data-dcnode-id="2713" id="cite_ref-18"><a data-dcnode-id="2714" href="#cite_note-18" title=""><span data-dcnode-id="2715" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2712" instrument_node="">
</span></p><span data-dcnode-id="2710" instrument_node="">
</span><a data-dcnode-id="2709" id="10_Gartner_process_trends_for_2019" name="10_Gartner_process_trends_for_2019"></a><h3 data-dcnode-id="2705"><span data-dcnode-id="2708" instrument_node=""> </span><span class="mw-headline" data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">10 Gartner process trends for 2019</span></span></h3><span data-dcnode-id="2704" instrument_node="">
</span><p data-dcnode-id="2699"><span data-dcnode-id="2703" instrument_node="">In April 2019, the analytical company </span><a class="mw-redirect" data-dcnode-id="2701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Company%3AGartner" title="Gartner"><span data-dcnode-id="2702" instrument_node="">Gartner</span></a><span data-dcnode-id="2700" instrument_node=""> named 10 technological trends for 2019.&nbsp;
</span></p><p data-dcnode-id="2695"><b data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">1. Stand-alone devices</span></b><span data-dcnode-id="2696" instrument_node="">
</span></p><p data-dcnode-id="2684"><span data-dcnode-id="2694" instrument_node="">Autonomous devices use </span><a class="mw-redirect" data-dcnode-id="2692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="2693" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="2691" instrument_node=""> to solve tasks traditionally performed by people. Five areas of development of autonomous devices are distinguished: </span><a class="mw-redirect" data-dcnode-id="2689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Robots" title="Robots"><span data-dcnode-id="2690" instrument_node="">robotics</span></a><span data-dcnode-id="2688" instrument_node="">, vehicles, </span><a class="mw-redirect" data-dcnode-id="2686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/UAV" title="UAV"><span data-dcnode-id="2687" instrument_node="">drones</span></a><span data-dcnode-id="2685" instrument_node="">, household appliances and applications. According to experts, the development of AI systems will increasingly be determined by the interaction of autonomous devices.
</span></p><span data-dcnode-id="2683" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2676" style="cursor: pointer;"><div class="thumbinner" data-dcnode-id="2677" href="/images/4/43/Orange-blue-technology-background-picture-id804292452.jpg" style="width:842px;"><a class="image" data-dcnode-id="2681"><img alt="" border="0" class="thumbimage" data-dcnode-id="2682" height="524" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/images/thumb/4/43/Orange-blue-technology-background-picture-id804292452.jpg/840px-Orange-blue-technology-background-picture-id804292452.jpg&amp;raw" width="840"></a><span data-dcnode-id="2680" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">According to Gartner, blockchain and virtual reality will be among the main technology trends in 2019</span></div></div></div><span data-dcnode-id="2675" instrument_node="">
</span><p data-dcnode-id="2671"><b data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">2. Augmented Analytics</span></b><span data-dcnode-id="2672" instrument_node="">
</span></p><p data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">Augmented analytics allows you to test more hypotheses and thus opens up more opportunities for processing and analyzing data. Automated summaries of augmented analytics will be built into enterprise applications to optimize decisions and actions of all employees.
</span></p><p data-dcnode-id="2665"><b data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">3. AI-based application development</span></b><span data-dcnode-id="2666" instrument_node="">
</span></p><p data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">With new platforms, professional application developers will be able to embed AI-based models and features into their work without the help of a data analyst. At the same time, part of the developer's tasks is solved automatically, and the development tools themselves evolve from solving simple problems to automating more complex activities due to built-in knowledge in a specific subject area.
</span></p><p data-dcnode-id="2659"><b data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">4. Digital doubles</span></b><span data-dcnode-id="2660" instrument_node="">
</span></p><p data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">A digital double is a digital reflection of a real object, process, or system. Individual digital doubles can interact with each other, forming more complex and large systems. They are mainly used on the Internet of Things: they provide technical monitoring, indicate possible ways to increase efficiency and are used to develop new technologies and services. It is assumed that the next step will be digital doubles of entire companies.
</span></p><p data-dcnode-id="2653"><b data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">5. Enhancing Peripheral Computing</span></b><span data-dcnode-id="2654" instrument_node="">
</span></p><p data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">In peripheral computing, information processing is performed on devices directly using this data in order to localize traffic and reduce delays. Analysts believe that the periphery will become increasingly intelligent thanks to built-in sensors, memory and AI-based computing components.
</span></p><p data-dcnode-id="2647"><b data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">6. Immersive Technology</span></b><span data-dcnode-id="2648" instrument_node="">
</span></p><p data-dcnode-id="2637"><a class="mw-redirect" data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Augmented_Reality" title="Augmented Reality"><span data-dcnode-id="2646" instrument_node="">Augmented</span></a><span data-dcnode-id="2644" instrument_node="">, </span><a class="new" data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php%3Ftitle%3DMixed_Reality_%28Hybrid_Reality%2C_Mixed_Reality%2C_MR%29%26action%3Dedit%26redlink%3D1" rel="nofollow" title="Mixed Reality (Hybrid Reality, Mixed Reality, MR) (такой страницы не существует)"><span data-dcnode-id="2643" instrument_node="">mixed</span></a><span data-dcnode-id="2641" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tadviser.com/index.php/Virtual_reality" title="Virtual reality"><span data-dcnode-id="2640" instrument_node="">virtual reality</span></a><span data-dcnode-id="2638" instrument_node=""> change the way the user perceives the world and form a new immersion experience. Gartner is confident that a multimodal interface will connect people to the digital world through hundreds of peripheral devices, affecting all senses and advanced machine-based "perception organs."&nbsp;
</span></p><span data-dcnode-id="2636" instrument_node="">
