a-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-50-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-50-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-50-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-50.png.webp 1200w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1661" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-50-1024x633.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-50-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-50-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-50-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-50.png 1200w" height="633" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" width="1024"></picture><noscript data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">&lt;picture class="wp-image-15748"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-50-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-50-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-50-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-50.png.webp 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;img width="1024" height="633" src="https://financer.com/app/uploads/2021/02/image-50-1024x633.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-50-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-50-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-50-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-50.png 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;/picture&gt;</span></noscript></figure><p data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Gold, often known as a ‘safe bet’ for investors, has also been rising in value since the first wave of lockdowns last February.</span></p><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">In January of 2021, the value of gold had risen by $656 from the previous year, growth which is still showing no signs of stopping.</span></p><h4 class="has-text-align-center" data-dcnode-id="1651" id="Value_of_Gold"><span data-dcnode-id="1652" instrument_node="">Value of Gold</span></h4><h6 class="has-text-align-center" data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">1.1.19 – 1.1.21</span></h6><div class="wp-block-image shortcode-no" data-dcnode-id="1642"><figure class="aligncenter size-large" data-dcnode-id="1643"><picture class="wp-image-15749" data-dcnode-id="1646"><source data-dcnode-id="1648" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-51-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-51-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-51-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-51.png.webp 1200w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1647" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-51-1024x633.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-51-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-51-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-51-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-51.png 1200w" height="633" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" width="1024"></picture><noscript data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">&lt;picture class="wp-image-15749"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-51-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-51-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-51-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-51.png.webp 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;img width="1024" height="633" src="https://financer.com/app/uploads/2021/02/image-51-1024x633.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-51-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-51-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-51-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-51.png 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;/picture&gt;</span></noscript></figure></div><blockquote class="wp-block-quote" data-dcnode-id="1637"><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">“The dollar will likely weaken modestly as the global recovery proceeds. Investors should keep an eye on currency exposures and consider beneficiaries of a weakening dollar, such as emerging markets.”</span></p><cite data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">JP Morgan Private Bank</span></cite></blockquote><h3 data-dcnode-id="1634" id="A_Looming_Debt_Crisis"><strong data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">A looming debt crisis</span></strong></h3><p data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">After a global pandemic, it’s not surprising that government debt is growing on a global scale. So, what can we expect from the year ahead?</span></p><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">In an interview by Jeffrey Caso from McKinsey, Professor Edward I. Altman said: “For companies that cannot buy back debt because they don’t have the cash, or those unable to issue new equity at attractive prices because their performance has been poor—these are the companies that I believe are going to default in increasing numbers in 2021”.</span></p><h4 data-dcnode-id="1627"><strong data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Government debt continues to grow</span></strong></h4><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">The pandemic has accelerated the levels of general government debt that many countries were facing even pre-2020. The graph below compares the debt levels of selected countries from 2018-2020, as a percentage of GDP.</span></p><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Levels in certain countries, such as Japan and Italy, were already high before the pandemic hit and have continued to grow. Whereas other countries, such as the United States, saw a sharp increase in 2020.</span></p><h4 class="has-text-align-center" data-dcnode-id="1621" id="General_government_debt_percent_of_GDP"><span data-dcnode-id="1622" instrument_node="">General government debt percent of GDP</span></h4><h6 class="has-text-align-center" data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">2018-2020</span></h6><figure class="wp-block-image size-large shortcode-no" data-dcnode-id="1613"><picture class="wp-image-15750" data-dcnode-id="1616"><source data-dcnode-id="1618" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-52-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-52-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-52-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-52.png.webp 1200w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1617" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-52-1024x633.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-52-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-52-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-52-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-52.png 1200w" height="633" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" width="1024"></picture><noscript data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">&lt;picture class="wp-image-15750"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-52-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-52-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-52-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-52.png.webp 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;img width="1024" height="633" src="https://financer.com/app/uploads/2021/02/image-52-1024x633.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-52-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-52-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-52-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-52.png 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;/picture&gt;</span></noscript></figure><h4 data-dcnode-id="1610"><strong data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Money printing</span></strong></h4><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">To keep up with these worrying levels of debt, some of the world’s central banks have been printing money at a potentially alarming rate.</span></p><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Both the Federal Reserve and the European Central Bank printed around three trillion dollars between 2018-2020, with results showing a significant rise for each of the five banks.</span></p><h4 class="has-text-align-center" data-dcnode-id="1604" id="Global_central_bank_balance_sheets_in_trillions_of_USD"><span data-dcnode-id="1605" instrument_node="">Global central bank balance sheets </span></h4><h6 class="has-text-align-center" data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">2008-2020</span></h6><div class="wp-block-image shortcode-no" data-dcnode-id="1595"><figure class="aligncenter size-large" data-dcnode-id="1596"><picture class="wp-image-15752" data-dcnode-id="1599"><source data-dcnode-id="1601" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-54-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-54-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-54-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-54.png.webp 1200w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1600" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-54-1024x633.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-54-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-54-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-54-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-54.png 1200w" height="633" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" width="1024"></picture><noscript data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">&lt;picture class="wp-image-15752"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-54-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-54-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-54-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-54.png.webp 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;img width="1024" height="633" src="https://financer.com/app/uploads/2021/02/image-54-1024x633.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-54-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-54-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-54-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-54.png 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;/picture&gt;</span></noscript></figure></div><h2 data-dcnode-id="1593" id="Three_Scenario_Predictions_for_2021"><span data-dcnode-id="1594" instrument_node="">Three Scenario Predictions for 2021</span></h2><p data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">We’ve taken a look at what the experts think and put together three possible scenarios for the remainder of 2021. </span></p><h3 data-dcnode-id="1587" id="Prediction_1_The_revival_of_the_roaring_20s"><span data-dcnode-id="1590" instrument_node="">📈 1st </span><strong data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Scenario: The revival of the roaring 20s</span></strong></h3><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Our most optimistic prediction is that 2021 will bring with it a revival of the roaring ’20s. After a year of unexpected hardship, the increased vaccine roll-out will kickstart economies and zero-COVID-19 will be achieved.</span></p><p data-dcnode-id="1580"><span data-dcnode-id="1584" instrument_node="">“Looking ahead to next year, respondents’ economic expectations are increasingly positive: 63 percent say their countries’ economies will be better six months from now.” Says</span><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/business-functions/strategy-and-corporate-finance/our-insights/economic-conditions-snapshot-december-2020-mckinsey-global-survey-results"><span data-dcnode-id="1583" instrument_node=""> McKinsey</span></a><span data-dcnode-id="1581" instrument_node="">.</span></p><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">People will be quick to spend the money saved from being stuck in the house over the last year, injecting a mini boost into the travel, retail and hospitality industries.&nbsp;</span></p><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">The financial markets will keep setting new all-time highs and personal and government debt will be slowly paid off with interest rates staying down. </span></p><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Federal Reserve Chairman, Jerome Powell&nbsp;said he won’t be raising rates for the foreseeable future. “We were in a good place in February of 2020, and we think we can get back there, I would say, much sooner than we had feared.”</span></p><div class="wp-block-image is-style-default shortcode-no" data-dcnode-id="1567"><figure class="alignleft size-large is-resized" data-dcnode-id="1568"><picture class="wp-image-15754" data-dcnode-id="1571"><source data-dcnode-id="1573" data-lazy-sizes="(max-width: 145px) 100vw, 145px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-193718.png.webp 268w, https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-193718-241x300.png.webp 241w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20145%20180'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1572" data-lazy-sizes="(max-width: 145px) 100vw, 145px" data-lazy-src="https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-193718.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-193718.png 268w, https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-193718-241x300.png 241w" height="180" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20145%20180'%3E%3C/svg%3E" width="145"></picture><noscript data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">&lt;picture class="wp-image-15754"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-193718.png.webp 268w, https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-193718-241x300.png.webp 241w" sizes="(max-width: 145px) 100vw, 145px"/&gt;&lt;img src="https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-193718.png" alt="" width="145" height="180" srcset="https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-193718.png 268w, https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-193718-241x300.png 241w" sizes="(max-width: 145px) 100vw, 145px"/&gt;&lt;/picture&gt;</span></noscript></figure></div><blockquote class="wp-block-quote is-style-default" data-dcnode-id="1562"><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">“We were in a good place in February of 2020, and we think we can get back there, I would say, much sooner than we had feared.”</span></p><cite data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Jerome Powell</span></cite></blockquote><p data-dcnode-id="1561"></p><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">This scenario may be the most possible, assuming that both the economic recovery plans and the coronavirus containment and vaccination plans go according to schedule.</span></p><h3 data-dcnode-id="1555" id="Prediction_2_Cautious_and_steady_post_vaccine_recovery"><span data-dcnode-id="1558" instrument_node="">📊 </span><strong data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">2nd Scenario: Cautious and steady post-vaccine recovery</span></strong></h3><p data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Our second prediction for 2021 is more neutral. Supply issues could delay the vaccine roll out until the end of the year, keeping borders closed in high-risk areas throughout the summer.</span></p><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Yet, with the absence of new major COVID-19 strains, local economies could slowly begin to rebuild, with social distancing measures in place.</span></p><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">The financial markets may begin to slow down, but this won’t undo the gains of recent months and there will be no major losses. Inflation will stay within expected levels and money printing will slow down with the hope of COVID-zero on the horizon.</span></p><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">With companies and schools becoming more adapted to the work-from-home culture, employment will steadily begin to rise.</span></p><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Acting Vice President of the World Bank, Ayhan Kose says, “Growth is coming back in 2021. At the global level, we are expecting growth to be around 4%. If you look at advanced economies they are going to deliver growth at around 3.3%. And if you look at emerging global economies we are expecting them to grow at around 5%.</span></p><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Not so good news is that it is still a subdued recovery. It is going to take time to recover from this devastating year 2020.”</span></p><h3 data-dcnode-id="1539" id="Prediction_3_Another_year_lost_to_Coronavirus"><span data-dcnode-id="1542" instrument_node="">📉 </span><strong data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">3rd Scenario: The Great Depression 2.0</span></strong></h3><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Our final prediction is our ‘worst-case scenario’.</span></p><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">New COVID-19 strains will wreak havoc and vaccines won’t be effective against all of the new strains sending us straight back to February 2020.</span></p><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Lockdowns continue across the globe until further notice, causing borders to close and economies to crash. Unemployment will rise, causing industry break-downs, loss in consumer demand, and a steady decrease in global trade.</span></p><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">This chain of events may trigger a sudden global stock market crash, that will even surpass the one experienced in March 2020.</span></p><p data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Policy makers will try to push urgent stimulus plans into the economy, but the decreasing confidence in the general economy and global currencies, will deem the stimulus plans ineffective in reviving the markets.</span></p><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Global economies will enter a period of prolonged stagflation, with soaring inflation rates, while the real economic output will keep shrinking.</span></p><p data-dcnode-id="1519"><span data-dcnode-id="1526" instrument_node="">Stores of value such as gold and real estate will start soaring, while hyperinflation will damage even further global consumer purchase power, especially for the lower-income class.</span><br data-dcnode-id="1525"><br data-dcnode-id="1524"><span data-dcnode-id="1523" instrument_node="">Global income and living standards inequality will rise to profound levels, which will cause extreme social and political unrest. The world, at this point, may enter a prolonged depression, which will be reminiscent of the </span><a data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Depression"><span data-dcnode-id="1522" instrument_node="">Great Depression in the 30s</span></a><span data-dcnode-id="1520" instrument_node="">.</span></p><h2 data-dcnode-id="1517" id="Final_thoughts"><span data-dcnode-id="1518" instrument_node="">Final thoughts</span></h2><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Thank you for reading our State of Finance and Global Predictions for 2021.</span></p><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Let us know in the comments below what you believe is in store for the year ahead, and which trends you are hopeful for.</span></p><span data-dcnode-id="1512" instrument_node=""> </span></article><section class="author-outer author-outer--post-page" data-dcnode-id="1478"><div class="container" data-dcnode-id="1479"><div class="author" data-dcnode-id="1480"><div class="author__left" data-dcnode-id="1496"><figure class="author__avatar" data-dcnode-id="1507"><img alt="" class="avatar avatar-95 photo avatar-default" data-dcnode-id="1510" data-lazy-src="https://financer.com/app/uploads/sites/11/2017/12/financer-icon-95x95.png" height="95" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2095%2095'%3E%3C/svg%3E" width="95"><noscript data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">&lt;img alt="" class="avatar avatar-95 photo avatar-default" height="95" src="https://financer.com/app/uploads/sites/11/2017/12/financer-icon-95x95.png" width="95"&gt;</span></noscript></figure><div class="author__name" data-dcnode-id="1499"><span class="author__role" data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Author</span></span><span class="author__fullname" data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Financer.com</span></span><span class="author__contacts" data-dcnode-id="1500"><a class="author__conta
