de-id="2235" instrument_node=""> </span></li><span data-dcnode-id="2233" instrument_node=""> </span><li class="block-fn-toc__list-item" data-dcnode-id="2225" data-id="Prediction_2_Cautious_and_steady_post_vaccine_recovery"><span data-dcnode-id="2232" instrument_node=""> </span><span class="block-fn-toc__list-number" data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node=""> 4.2.</span></span><span data-dcnode-id="2229" instrument_node=""> </span><a class="block-fn-toc__list-link" data-dcnode-id="2227" href="#Prediction_2_Cautious_and_steady_post_vaccine_recovery"><span data-dcnode-id="2228" instrument_node=""> 📊 2nd Scenario: Cautious and steady post-vaccine recovery </span></a><span data-dcnode-id="2226" instrument_node=""> </span></li><span data-dcnode-id="2224" instrument_node=""> </span><li class="block-fn-toc__list-item" data-dcnode-id="2216" data-id="Prediction_3_Another_year_lost_to_Coronavirus"><span data-dcnode-id="2223" instrument_node=""> </span><span class="block-fn-toc__list-number" data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node=""> 4.3.</span></span><span data-dcnode-id="2220" instrument_node=""> </span><a class="block-fn-toc__list-link" data-dcnode-id="2218" href="#Prediction_3_Another_year_lost_to_Coronavirus"><span data-dcnode-id="2219" instrument_node=""> 📉 3rd Scenario: The Great Depression 2.0 </span></a><span data-dcnode-id="2217" instrument_node=""> </span></li><span data-dcnode-id="2215" instrument_node=""> </span></ul><span data-dcnode-id="2213" instrument_node=""> </span><li class="block-fn-toc__list-item" data-dcnode-id="2205" data-id="Final_thoughts"><span data-dcnode-id="2212" instrument_node=""> </span><span class="block-fn-toc__list-number" data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">5.</span></span><span data-dcnode-id="2209" instrument_node=""> </span><a class="block-fn-toc__list-link" data-dcnode-id="2207" href="#Final_thoughts"><span data-dcnode-id="2208" instrument_node=""> Final thoughts </span></a><span data-dcnode-id="2206" instrument_node=""> </span></li><span data-dcnode-id="2204" instrument_node=""> </span></ul><span data-dcnode-id="2202" instrument_node=""> </span></div><h2 data-dcnode-id="2199" id="Key_takeaways"><span data-dcnode-id="2200" instrument_node="">The pessimistic vs the optimistic outlook </span></h2><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">There are two very different potential economic outlooks for 2021. We have presented each of them below, including the chain of events that may lead us either to a long recession, or a much-awaited path to recovery.</span></p><figure class="wp-block-table is-style-regular shortcode-no" data-dcnode-id="2150"><table class="has-fixed-layout table" data-dcnode-id="2151"><tbody data-dcnode-id="2152"><tr data-dcnode-id="2190"><td data-dcnode-id="2194"><strong data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">Pessimistic Outlook</span></strong></td><td data-dcnode-id="2191"><strong data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Optimistic Outlook</span></strong></td></tr><tr data-dcnode-id="2153"><td data-dcnode-id="2172"><span data-dcnode-id="2189" instrument_node="">1. Coronavirus uncontained</span><br data-dcnode-id="2188"><span data-dcnode-id="2187" instrument_node="">2. Prolonged lockdowns</span><br data-dcnode-id="2186"><span data-dcnode-id="2185" instrument_node="">3. Unemployment rises</span><br data-dcnode-id="2184"><span data-dcnode-id="2183" instrument_node="">4. Global trade struggles</span><br data-dcnode-id="2182"><span data-dcnode-id="2181" instrument_node="">5. Stock market crash</span><br data-dcnode-id="2180"><span data-dcnode-id="2179" instrument_node="">6. Ineffective stimulus plans</span><br data-dcnode-id="2178"><span data-dcnode-id="2177" instrument_node="">7. Global stagflation</span><br data-dcnode-id="2176"><span data-dcnode-id="2175" instrument_node="">8. Commodity prices soar</span><br data-dcnode-id="2174"><span data-dcnode-id="2173" instrument_node="">9. Long recession</span></td><td data-dcnode-id="2154"><span data-dcnode-id="2171" instrument_node="">1. Coronavirus contained</span><br data-dcnode-id="2170"><span data-dcnode-id="2169" instrument_node="">2. Economies fully operational</span><br data-dcnode-id="2168"><span data-dcnode-id="2167" instrument_node="">3. Unemployment falls</span><br data-dcnode-id="2166"><span data-dcnode-id="2165" instrument_node="">4. Global trade recovery</span><br data-dcnode-id="2164"><span data-dcnode-id="2163" instrument_node="">5. Stock market grow steadily</span><br data-dcnode-id="2162"><span data-dcnode-id="2161" instrument_node="">6. Stimulus plans halt</span><br data-dcnode-id="2160"><span data-dcnode-id="2159" instrument_node="">7. Global inflation rates below 2%</span><br data-dcnode-id="2158"><span data-dcnode-id="2157" instrument_node="">8. Commodity prices stabilize</span><br data-dcnode-id="2156"><span data-dcnode-id="2155" instrument_node="">9. Economic recovery</span></td></tr></tbody></table></figure><p data-dcnode-id="2149"></p><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">The fate of the economy in 2021 will also determine the long-term economic outlook. Right now, we will argue that the optimistic scenario seems more likely, but a negative reversal is also into play.</span></p><p data-dcnode-id="2142"><span data-dcnode-id="2146" instrument_node="">Will Europe’s Next Generation EU and Biden’s economic policies succeed in stabilizing the global economy and set the world on track for a brighter and more sustainable future?</span><br data-dcnode-id="2145"><br data-dcnode-id="2144"><span data-dcnode-id="2143" instrument_node="">Will Asian economies gain ground in trade and technological innovation and set the foundations to become the dominant forces in the global scene?</span></p><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Read below to find out what the experts have to say.</span></p><h2 data-dcnode-id="2138" id="The_New_Normal"><span data-dcnode-id="2139" instrument_node="">A New Normal</span></h2><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">To analyze the trends of 2021, we need to take a look back at the year 2020 and where we are starting from. Black swan events, such as the Coronavirus pandemic affected every country on the globe. However, that doesn’t mean we’re all starting the new financial year in the same boat.</span></p><p data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">In the following graph, you can see the GDP growth and unemployment rates of the top 10 GDP countries in the world.</span></p><h4 class="has-text-align-center" data-dcnode-id="2132" id="GDP_growth_and_unemployment_rate_"><span data-dcnode-id="2133" instrument_node="">GDP growth and unemployment rate </span></h4><h6 class="has-text-align-center" data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">2020</span></h6><div class="wp-block-image shortcode-no" data-dcnode-id="2123"><figure class="aligncenter size-large" data-dcnode-id="2124"><picture class="wp-image-15736" data-dcnode-id="2127"><source data-dcnode-id="2129" data-lazy-sizes="(max-width: 780px) 100vw, 780px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-38.png.webp 780w, https://financer.com/app/uploads/2021/02/image-38-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-38-768x476.png.webp 768w" sizes="(max-width: 780px) 100vw, 780px" srcset="https://financer.com/app/uploads/2021/02/image-38.png.webp 780w, https://financer.com/app/uploads/2021/02/image-38-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-38-768x476.png.webp 768w" type="image/webp"><img alt="" class="entered lazyloaded" data-dcnode-id="2128" data-lazy-sizes="(max-width: 780px) 100vw, 780px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-38.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-38.png 780w, https://financer.com/app/uploads/2021/02/image-38-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-38-768x476.png 768w" data-ll-status="loaded" height="483" sizes="(max-width: 780px) 100vw, 780px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//financer.com/app/uploads/2021/02/image-38.png&amp;raw" srcset="https://financer.com/app/uploads/2021/02/image-38.png 780w, https://financer.com/app/uploads/2021/02/image-38-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-38-768x476.png 768w" width="780"></picture><noscript data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">&lt;picture class="wp-image-15736"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-38.png.webp 780w, https://financer.com/app/uploads/2021/02/image-38-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-38-768x476.png.webp 768w" sizes="(max-width: 780px) 100vw, 780px"/&gt;&lt;img width="780" height="483" src="https://financer.com/app/uploads/2021/02/image-38.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-38.png 780w, https://financer.com/app/uploads/2021/02/image-38-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-38-768x476.png 768w" sizes="(max-width: 780px) 100vw, 780px"/&gt;&lt;/picture&gt;</span></noscript></figure></div><p data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">All of top 10 GDP countries had higher unemployment rates and decreasing GDP growth in 2020.</span></p><p data-dcnode-id="2116"><span data-dcnode-id="2120" instrument_node="">The United States had a GDP growth of just 3.1%, smaller than Canada and all their European counterparts, and an unemployment rate of 8.1%, which is more than </span><a data-dcnode-id="2118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bls.gov/opub/ted/2020/unemployment-rate-falls-to-6-point-9-percent-in-october-2020.htm%23%3A~%3Atext%3DThe%2520unemployment%2520rate%2520decreased%2520by%2CFebruary%2520rate%2520of%25203.5%2520percent."><span data-dcnode-id="2119" instrument_node="">double the rate recorded in February.</span></a><span data-dcnode-id="2117" instrument_node=""> </span></p><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">China stands out for having the best GDP growth/unemployment ratio, while Japan has the lowest unemployment rate, just above 2%.</span></p><p data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Since GDP growth and unemployment rates are strongly inversely correlated, we expect that a reversal of the 2021 unemployment trends will be drastic as soon as global lockdowns and travel restrictions come to end.</span></p><h3 data-dcnode-id="2109" id="The_Financial_Implications_of_COVID_19"><strong data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">The financial implications of COVID-19</span></strong></h3><p data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">The year 2020 will forever be defined by the worldwide Coronavirus (COVID-19) outbreak.</span></p><p data-dcnode-id="2102"><span data-dcnode-id="2106" instrument_node="">At the time of writing, there have been over </span><a data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldometers.info/coronavirus/"><span data-dcnode-id="2105" instrument_node="">114 million cases and over 2.5 million lives claimed</span></a><span data-dcnode-id="2103" instrument_node="">, and devastatingly, those numbers continue to grow each day.</span></p><p data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">This highly contagious virus has not just impacted those infected, specific countries or sectors. However, the whole world has felt the impact of COVID-19, and for many that impact was financial.</span></p><h4 data-dcnode-id="2097"><strong data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">Less than a flying start for the travel industry</span></strong></h4><p data-dcnode-id="2092"><span data-dcnode-id="2096" instrument_node="">Unsurprisingly, the aviation industry has been one of the hardest hit throughout the pandemic. IATA described the severity of the situation in their December 2020 Air Passenger Market </span><a data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iata.org/en/iata-repository/publications/economic-reports/air-passenger-monthly-analysis---december-2020/"><span data-dcnode-id="2095" instrument_node="">Analysis</span></a><span data-dcnode-id="2093" instrument_node="">.</span></p><p data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">“The year 2020 brought an unprecedented challenge to the airline industry in a form of closed borders, strict travel controls, and depressed travel confidence – all effects of the pandemic.</span></p><p data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">RPKs plunged by a dramatic 66% compared with 2019 – eight times faster than during the 12 months following the 9/11 attacks – considered to be the most severe aviation crisis prior to 2020.”</span></p><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">With many countries still in lockdown around the world and borders closed, we don’t expect the aviation industry to pick up for some time.</span></p><h4 class="has-text-align-center" data-dcnode-id="2084" id="Change_in_revenue_and_estimated_loss_within_the_aviation_industry"><span data-dcnode-id="2085" instrument_node="">Change in revenue and estimated loss within the aviation industry</span></h4><h6 class="has-text-align-center" data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">2019-2020</span></h6><figure class="wp-block-image size-large shortcode-no" data-dcnode-id="2076"><picture class="wp-image-15737" data-dcnode-id="2079"><source data-dcnode-id="2081" data-lazy-sizes="(max-width: 958px) 100vw, 958px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-39.png.webp 958w, https://financer.com/app/uploads/2021/02/image-39-300x185.png.webp 300w, https://financer.com/app/uploads/2021/02/image-39-768x475.png.webp 768w" sizes="(max-width: 958px) 100vw, 958px" srcset="https://financer.com/app/uploads/2021/02/image-39.png.webp 958w, https://financer.com/app/uploads/2021/02/image-39-300x185.png.webp 300w, https://financer.com/app/uploads/2021/02/image-39-768x475.png.webp 768w" type="image/webp"><img alt="" class="entered lazyloaded" data-dcnode-id="2080" data-lazy-sizes="(max-width: 958px) 100vw, 958px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-39.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-39.png 958w, https://financer.com/app/uploads/2021/02/image-39-300x185.png 300w, https://financer.com/app/uploads/2021/02/image-39-768x475.png 768w" data-ll-status="loaded" height="592" sizes="(max-width: 958px) 100vw, 958px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//financer.com/app/uploads/2021/02/image-39.png&amp;raw" srcset="https://financer.com/app/uploads/2021/02/image-39.png 958w, https://financer.com/app/uploads/2021/02/image-39-300x185.png 300w, https://financer.com/app/uploads/2021/02/image-39-768x475.png 768w" width="958"></picture><noscript data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">&lt;picture class="wp-image-15737"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-39.png.webp 958w, https://financer.com/app/uploads/2021/02/image-39-300x185.png.webp 300w, https://financer.com/app/uploads/2021/02/image-39-768x475.png.webp 768w" sizes="(max-width: 958px) 100vw, 958px"/&gt;&lt;img width="958" height="592" src="https://financer.com/app/uploads/2021/02/image-39.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-39.png 958w, https://financer.com/app/uploads/2021/02/image-39-300x185.png 300w, https://financer.com/app/uploads/2021/02/image-39-768x475.png 768w" sizes="(max-width: 958px) 100vw, 958px"/&gt;&lt;/picture&gt;</span></noscript></figure><p data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">According to this data from IATA, Asia Pacific took the largest financial loss during the peak of the crisis in April 2020, followed closely behind by Europe.</span></p><p data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">All continents had a minimum percentage change in revenue from the previous year of 27%, with both Europe and Latin America over 40%.</span></p><h4 data-dcnode-id="2069"><strong data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Losses in the hospitality industry</span></strong></h4><p data-dcnode-id="2064"><span data-dcnode-id="2068" instrument_node="">The hospitality industry also saw a significant drop in 2020. The graph below reveals the revenue growth in percentage from 2018 to the estimated numbers of 2024 in the United States, as predicted by</span><a data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/outlook/262/109/travel-tourism/united-states%23market-revenue"><span data-dcnode-id="2067" instrument_node=""> Statista</span></a><span data-dcnode-id="2065" instrument_node="">.</span></p><p data-dcnode-id="2059"><span data-dcnode-id="2063" instrument_node="">Unsurprisingly, </span><strong data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">all sectors from cruises to package holidays suffered losses in growth from 45-70% in 2020</span></strong><span data-dcnode-id="2060" instrument_node="">. However, Statista expects growth to rise steadily over the coming years, and by 2023 be at the same level of year-on-year growth experienced from 2018-2019.</span></p><h4 class="has-text-align-center" data-dcnode-id="2057" id="Estimated_change_in_revenue_in_the_travel_and_tourism_market_in_the_United_States"><span data-dcnode-id="2058" instrument_node="">Estimated percent change in revenue in the travel and tourism market in the United States</span></h4><h6 class="has-text-align-center" data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">2018-2024</span></h6><figure class="wp-block-image size-large shortcode-no" data-dcnode-id="2049"><picture class="wp-image-15781" data-dcnode-id="2052"><source data-dcnode-id="2054" data-lazy-sizes="(max-width: 998px) 100vw, 998px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-55.png.webp 998w, https://financer.com/app/uploads/2021/02/image-55-300x185.png.webp 300w, https://financer.com/app/uploads/2021/02/image-55-768x474.png.webp 768w" sizes="(max-width: 998px) 100vw, 998px" srcset="https://financer.com/app/uploads/2021/02/image-55.png.webp 998w, https://financer.com/app/uploads/2021/02/image-55-300x185.png.webp 300w, https://financer.com/app/uploads/2021/02/image-55-768x474.png.webp 768w" type="image/webp"><img alt="" class="entered lazyloaded" data-dcnode-id="2053" data-lazy-sizes="(max-width: 998px) 100vw, 998px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-55.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-55.png 998w, https://financer.com/app/uploads/2021/02/image-55-300x185.png 300w, https://financer.com/app/uploads/2021/02/image-55-768x474.png 768w" data-ll-status="loaded" height="616" sizes="(max-width: 998px) 100vw, 998px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//financer.com/app/uploads/2021/02/image-55.png&amp;raw" srcset="https://financer.com/app/uploads/2021/02/image-55.png 998w, https://financer.com/app/uploads/2021/02/image-55-300x185.png 300w, https://financer.com/app/uploads/2021/02/image-55-768x474.png 768w" width="998"></picture><noscript data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">&lt;picture class="wp-image-15781"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-55.png.webp 998w, https://financer.com/app/uploads/2021/02/image-55-300x185.png.webp 300w, https://financer.com/app/uploads/2021/02/image-55-768x474.png.webp 768w" sizes="(max-width: 998px) 100vw, 998px"/&gt;&lt;img width="998" height="616" src="https://financer.com/app/uploads/2021/02/image-55.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-55.png 998w, https://financer.com/app/uploads/2021/02/image-55-300x185.png 300w, https://financer.com/app/uploads/2021/02/image-55-768x474.png 768w" sizes="(max-width: 998px) 100vw, 998px"/&gt;&lt;/picture&gt;</span></noscript></figure><p data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">The future of travel is hard to imagine right now but based on the previous summer we can predict countries who were able to cope better with the pandemic to be the most popular.</span></p><p data-dcnode-id="2042"><span data-dcnode-id="2046" instrument_node="">Elizabeth Becker, writing for </span><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/2020/06/13/travel-tourism-coronavirus-pandemic-future/"><span data-dcnode-id="2045" instrument_node="">Foreign Policy</span></a><span data-dcnode-id="2043" instrument_node=""> believes some countries might not want to go back to pre-pandemic tourism levels. “Overnight, much of the world went from over-tourism to no tourism. Since then, locals have seen how their lives have improved without those insane crowds: clear skies with vistas stretching for miles, a drastic reduction of litter and waste, clean shorelines and canals, and a return of wildlife.”, which she says could make travel to such places more expensive than we have become accustomed to.</span></p><p data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Estimating that this approach will be in sharp contrast with other governments who “will compete for the shrinking tourist dollar by racing to the bottom, allowing the travel industry to regulate itself, using deep discounts to fill hotels and aeroplanes and revive over-tourism.”</span></p><p data-dcnode-id="2039"></p><div class="wp-block-image is-style-rounded shortcode-no" data-dcnode-id="2032"><figure class="alignleft size-thumbnail is-resized" data-dcnode-id="2033"><picture class="wp-image-15759" data-dcnode-id="2036"><source data-dcnode-id="2038" data-lazy-sizes="(max-width: 142px) 100vw, 142px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-195315-150x150.png.webp 150w, https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-195315-75x75.png.webp 75w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20142%20142'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="2037" data-lazy-sizes="(max-width: 142px) 100vw, 142px" data-lazy-src="https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-195315-150x150.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-195315-150x150.png 150w, https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-195315-75x75.png 75w" height="142" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20142%20142'%3E%3C/svg%3E" width="142"></picture><noscript data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">&lt;picture class="wp-image-15759"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-195315-150x150.png.webp 150w, https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-195315-75x75.png.webp 75w" sizes="(max-width: 142px) 100vw, 142px"/&gt;&lt;img src="https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-195315-150x150.png" alt="" width="142" height="142" srcset="https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-195315-150x150.png 150w, https://financer.com/app/uploads/2021/02/screen-shot-2021-02-19-at-195315-75x75.png 75w" sizes="(max-width: 142px) 100vw, 142px"/&gt;&lt;/picture&gt;</span></noscript></figure></div><blockquote class="wp-block-quote has-text-align-left is-style-default" data-dcnode-id="2027"><p data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">“Other governments will compete for the shrinking tourist dollar by racing to the bottom, allowing the travel industry to regulate itself, using deep discounts to fill hotels and airplanes and revive over-tourism.”</span></p><cite data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Elizabeth Becker</span></cite></blockquote><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">We predict that trends such as local ‘staycations’, road trips, and camping are also likely to grow in popularity in 2021. As travel lovers find a new appreciation for their local gems and avoid the cancellations and uncertainty which plagued holidaymakers in 2020.</span></p><h4 data-dcnode-id="2022"><strong data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">Will vaccinations save the day?</span></strong></h4><p data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">As many industries remain at a standstill and businesses become desperate to re-open, the recent vaccination measures could not have come soon enough.</span></p><h5 data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">Countries with a highly vaccinated population could experience the following benefits:</span></h5><ul class="is-style-default" data-dcnode-id="2011"><li data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Less strain on the healthcare system</span></li><li data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Economies reopen and recover</span></li><li data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">National and international travel between vaccinated countries&nbsp;</span></li></ul><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">The graph below shows the cumulative COVID-19 vaccination doses administered per 100 people, as of February 11th, 2021.</span></p><p data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">The United Kingdom is taking a current lead, with 20.67 per 100 people vaccinated. They have been praised for their strong vaccination effort starting with care-home patients, key-workers and vulnerable people who have been the worst affected during the pandemic so far.</span></p><h4 class="has-text-align-center" data-dcnode-id="2005" id="Cumulative_COVID_19_vaccination_doses_administered_per_100_people"><span data-dcnode-id="2006" instrument_node="">Cumulative COVID-19 vaccination doses administered per 100 people</span></h4><h6 class="has-text-align-center" data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">As of: 11.2.21</span></h6><div class="wp-block-image shortcode-no" data-dcnode-id="1996"><figure class="aligncenter size-large" data-dcnode-id="1997"><picture class="wp-image-15739" data-dcnode-id="2000"><source data-dcnode-id="2002" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-41-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-41-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-41-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-41.png.webp 1200w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="2001" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-41-1024x633.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-41-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-41-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-41-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-41.png 1200w" height="633" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" width="1024"></picture><noscript data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">&lt;picture class="wp-image-15739"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-41-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-41-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-41-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-41.png.webp 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;img width="1024" height="633" src="https://financer.com/app/uploads/2021/02/image-41-1024x633.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-41-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-41-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-41-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-41.png 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;/picture&gt;</span></noscript></figure></div><p data-dcnode-id="1988"><span data-dcnode-id="1995" instrument_node="">On the 16th of February, the</span><a data-dcnode-id="1993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/interactive/2020/us/covid-19-vaccine-doses.html"><span data-dcnode-id="1994" instrument_node=""> Centers for Disease Control and Prevention</span></a><span data-dcnode-id="1992" instrument_node=""> reported that in the United States providers were </span><strong data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">administering about 1.72 million doses per day</span></strong><span data-dcnode-id="1989" instrument_node=""> on average.</span></p><p data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">EU countries, on the other hand, have taken a slower approach to the vaccine rollout. Supply chain issues and a slow response from the EU to sign for the vaccine has meant that in the first quarter of 2021 they may receive only 40% of the amount they requested last August.</span></p><h4 data-dcnode-id="1983"><strong data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">How Asia responded to the COVID-19 crisis</span></strong></h4><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">The World Health Organisation (WHO) first reported a cluster of infectious pneumonia cases, later found to be COVID-19, on the 31st of December 2019, in Wuhan City, Hubei Province, China.</span></p><p data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">In the months that followed, the rest of the world caught up and began announcing large numbers of COVID-19 cases and deaths. But China, where the virus is predicted to have originated seemed to get the pandemic under control much more quickly than other countries as a result of a fast response, strict nationwide lockdown and screening measures.</span></p><h4 class="has-text-align-center" data-dcnode-id="1977" id="Total_COVID_19_cases_deaths_and_recoveries_in_the_top_10_GDP_countries_"><span data-dcnode-id="1978" instrument_node="">Total COVID-19 cases, deaths and recoveries in the top 10 GDP countries </span></h4><h6 class="has-text-align-center" data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">total cases as of: 11.2.21</span></h6><figure class="wp-block-image size-large shortcode-no" data-dcnode-id="1969"><picture class="wp-image-15740" data-dcnode-id="1972"><source data-dcnode-id="1974" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-42-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-42-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-42-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-42.png.webp 1200w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1973" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-42-1024x633.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-42-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-42-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-42-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-42.png 1200w" height="633" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" width="1024"></picture><noscript data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">&lt;picture class="wp-image-15740"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-42-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-42-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-42-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-42.png.webp 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;img width="1024" height="633" src="https://financer.com/app/uploads/2021/02/image-42-1024x633.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-42-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-42-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-42-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-42.png 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;/picture&gt;</span></noscript></figure><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">The graph above compares the number of COVID-19 cases, deaths and recovered patients in the top 10 GDP countries worldwide, as of the 15th of February 2021.</span></p><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">At the time of writing, the USA has had more than 29 Million cases and half a million deaths, which is more than 100 times higher than the death figure reported by China,</span></p><p data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">India, who had taken over the UK’s spot as the 5th largest economy in the world in 2019, is another country which has been badly affected by the pandemic. With 10,919,616 cases and 155,789 deaths, their economy has taken a hit and slipped behind, and are now not due to take back their place until 2024.</span></p><p data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Generally, East and South East Asia have been praised for their approach to handling the pandemic and getting it under control more successfully than the rest of the world.</span></p><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Many people put this down to their previous experience with the SARS outbreak between 2002 and 2004. However, consistent advice, swift action and stricter government intervention also played a role.</span></p><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Whatever the reason, experts predict that the many Asian countries who were able to return to normal more quickly will have a financial advantage over the parts of the world that were not.</span></p><h4 data-dcnode-id="1954"><strong data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">How Europe responded to COVID-19</span></strong></h4><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">All European countries took unique approaches in responding to the crisis. Some were quicker than others to react to the first wave and there were varying levels of the strictness of national and regional laws.&nbsp;</span></p><p data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">As of the 11th of February 2021, the EU has adopted the Recovery and Resilience Facility (RRF), which includes a €672.5 billion recovery fund. By the 30th of April 2021, all EU members need to submit their national recovery and resilience plans which will include their reform and investment agendas up until 2026.&nbsp;</span></p><p data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">The solidarity between European nations has been commended worldwide, with countries sharing hospital beds, supplies and doctors with their neighbours when needed.</span></p><h2 data-dcnode-id="1946" id="The_Financial_Trends_of_2021"><span data-dcnode-id="1947" instrument_node="">The Financial Trends of 2021</span></h2><p data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">Most of us entered 2020 with very little idea of the year we had ahead. With the insights from the past events though, we’re now in a better position to predict the financial trends of 2021.</span></p><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">The following sections will cover the financial trends within the following areas; ‘The rise of China and Asia’, ‘The Biden administration’, ‘European affairs’, ‘The Stock markets and currencies’ and ‘The growing global debt’.</span></p><h3 data-dcnode-id="1939" id="The_Rise_of_China_and_Asia"><strong data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">The rise of China and Asia</span></strong></h3><p data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">Since 1979, China has been one of the world’s fastest-growing economies. This trend has only accelerated over the last year and Asia, in general, seems to be on the rise.</span></p><h4 data-dcnode-id="1934"><strong data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Chinese economy predicted to overtake US</span></strong></h4><p data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">As a result of China’s successful response to the pandemic and the comparatively limited damage to their economy, many predict they will soon overtake the US, including The Centre for Economics and Business Research (CEBR) annual report.</span></p><p data-dcnode-id="1927"><span data-dcnode-id="1931" instrument_node="">The report claimed that due to the “skilful management of the pandemic and the hits to long term growth in the West […]</span><strong data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">the Chinese economy in dollar terms will overtake the US economy in 2028</span></strong><span data-dcnode-id="1928" instrument_node="">, a full 5 years earlier than we thought last year.”</span></p><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Going on to predict “the trend rate of growth for China to be 5.7% annually from 2021-25 and 4.5% annually from 2026-30 and 3.9% annually from 2031-35.”</span></p><p data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">According to CEBR, things don’t look so positive for the United States. Despite currently being the largest economy and one of the wealthiest countries in the world, they suggest “the trend rate of growth of the States to be 1.9% annually from 2022-24 and 1.6% annually for the rest of the forecast horizon,” which is 2.6% and 2.3% lower than China’s projected growth.</span></p><h4 class="has-text-align-center" data-dcnode-id="1921" id="World_economic_league_table_predictions"><span data-dcnode-id="1922" instrument_node="">World economic league table predictions</span></h4><h6 class="has-text-align-center" data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">2005-2035 </span></h6><div class="wp-block-image shortcode-no" data-dcnode-id="1912"><figure class="aligncenter size-large" data-dcnode-id="1913"><picture class="wp-image-15741" data-dcnode-id="1916"><source data-dcnode-id="1918" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-43-1024x634.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-43-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-43-768x476.png.webp 768w, https://financer.com/app/uploads/2021/02/image-43.png.webp 1327w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20634'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1917" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-43-1024x634.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-43-1024x634.png 1024w, https://financer.com/app/uploads/2021/02/image-43-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-43-768x476.png 768w, https://financer.com/app/uploads/2021/02/image-43.png 1327w" height="634" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20634'%3E%3C/svg%3E" width="1024"></picture><noscript data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">&lt;picture class="wp-image-15741"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-43-1024x634.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-43-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-43-768x476.png.webp 768w, https://financer.com/app/uploads/2021/02/image-43.png.webp 1327w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;img width="1024" height="634" src="https://financer.com/app/uploads/2021/02/image-43-1024x634.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-43-1024x634.png 1024w, https://financer.com/app/uploads/2021/02/image-43-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-43-768x476.png 768w, https://financer.com/app/uploads/2021/02/image-43.png 1327w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;/picture&gt;</span></noscript></figure></div><p data-dcnode-id="1909"><a data-dcnode-id="1910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//financer.com/finance-barometer-2021/"><span data-dcnode-id="1911" instrument_node="">Preview in new tab (opens in a new tab)</span></a></p><p data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">India, who has been steadily climbing up from a position of just 13 in 2005 is expected to be the third-largest economy by 2030. Indonesia, currently sitting at 15 is predicted to be the 8th largest economy by 2035.</span></p><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Furthermore, Italy, Australia and Korea are all predicted to slip down the table in the next 15 years.</span></p><h4 data-dcnode-id="1902"><strong data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">The RCEP forms the world’s largest trading bloc</span></strong></h4><div class="wp-block-image shortcode-no" data-dcnode-id="1895"><figure class="aligncenter size-large" data-dcnode-id="1896"><picture class="wp-image-15763" data-dcnode-id="1899"><source data-dcnode-id="1901" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/dreamstime-s-202904742.jpg.webp 800w, https://financer.com/app/uploads/2021/02/dreamstime-s-202904742-300x178.jpg.webp 300w, https://financer.com/app/uploads/2021/02/dreamstime-s-202904742-768x456.jpg.webp 768w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20475'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1900" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://financer.com/app/uploads/2021/02/dreamstime-s-202904742.jpg" data-lazy-srcset="https://financer.com/app/uploads/2021/02/dreamstime-s-202904742.jpg 800w, https://financer.com/app/uploads/2021/02/dreamstime-s-202904742-300x178.jpg 300w, https://financer.com/app/uploads/2021/02/dreamstime-s-202904742-768x456.jpg 768w" height="475" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20475'%3E%3C/svg%3E" width="800"></picture><noscript data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">&lt;picture class="wp-image-15763"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/dreamstime-s-202904742.jpg.webp 800w, https://financer.com/app/uploads/2021/02/dreamstime-s-202904742-300x178.jpg.webp 300w, https://financer.com/app/uploads/2021/02/dreamstime-s-202904742-768x456.jpg.webp 768w" sizes="(max-width: 800px) 100vw, 800px"/&gt;&lt;img width="800" height="475" src="https://financer.com/app/uploads/2021/02/dreamstime-s-202904742.jpg" alt="" srcset="https://financer.com/app/uploads/2021/02/dreamstime-s-202904742.jpg 800w, https://financer.com/app/uploads/2021/02/dreamstime-s-202904742-300x178.jpg 300w, https://financer.com/app/uploads/2021/02/dreamstime-s-202904742-768x456.jpg 768w" sizes="(max-width: 800px) 100vw, 800px"/&gt;&lt;/picture&gt;</span></noscript></figure></div><p data-dcnode-id="1890"><span data-dcnode-id="1894" instrument_node="">November 15th of 2020 marked the end of eight years of negotiations and confirmed the formation of the </span><strong data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Regional Comprehensive Economic Partnership</span></strong><span data-dcnode-id="1891" instrument_node=""> (RCEP).</span></p><p data-dcnode-id="1885"><span data-dcnode-id="1889" instrument_node="">Otherwise known as the </span><strong data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">world’s largest free trade agreement</span></strong><span data-dcnode-id="1886" instrument_node="">, which will cover 30% of global trade.</span></p><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">In the chart below you can see the total GDP of member countries of the EU, RCEP and NAFTA respectively.</span></p><h4 class="has-text-align-center" data-dcnode-id="1881" id="Total_GDP_of_member_countries_of_selected_regional_free_trade_agreements_"><span data-dcnode-id="1882" instrument_node="">Total GDP of member countries of selected regional free trade agreements </span></h4><h6 class="has-text-align-center" data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">2019</span></h6><figure class="wp-block-image size-large shortcode-no" data-dcnode-id="1873"><picture class="wp-image-15742" data-dcnode-id="1876"><source data-dcnode-id="1878" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-44-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-44-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-44-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-44.png.webp 1200w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1877" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-44-1024x633.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-44-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-44-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-44-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-44.png 1200w" height="633" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" width="1024"></picture><noscript data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">&lt;picture class="wp-image-15742"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-44-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-44-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-44-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-44.png.webp 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;img width="1024" height="633" src="https://financer.com/app/uploads/2021/02/image-44-1024x633.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-44-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-44-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-44-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-44.png 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;/picture&gt;</span></noscript></figure><div class="fn_block block_fn_msg_box boxed" data-dcnode-id="1865"><div class="fn_block__icon" data-dcnode-id="1872"></div><p data-dcnode-id="1871"></p><h4 data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">What countries are part of the RCEP?</span></h4><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Brunei, Cambodia, Indonesia, Laos, Malaysia, Myanmar, Philippines, Singapore, Thailand, Vietnam, Australia, Japan,&nbsp; New Zealand,&nbsp; South Korea and China.</span></p><p data-dcnode-id="1866"></p></div><h3 data-dcnode-id="1862" id="The_Biden_Administration"><strong data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">The Biden administration</span></strong></h3><p data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">As the largest economy in the world, what happens in the United States makes a fundamental impact on the global economy. The 2020 election brought the end of the uncertainty of the Trump era which we predict will help to stabilise markets.</span></p><p data-dcnode-id="1855"><span data-dcnode-id="1859" instrument_node="">The </span><a data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ing.com/Home.htm"><span data-dcnode-id="1858" instrument_node="">ING Group</span></a><span data-dcnode-id="1856" instrument_node=""> is skeptical and thinks that cross-country relationships may remain tainted by the former presidency, saying: “Despite the election of a new president, U.S. – China trade relations are unlikely to experience much of an improvement after a tumultuous few years of tit-for-tat tariff hikes.”</span></p><h4 data-dcnode-id="1851"><span data-dcnode-id="1854" instrument_node="">Biden’s plans</span><strong data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node=""> for a greener America</span></strong></h4><div class="wp-block-image shortcode-no" data-dcnode-id="1844"><figure class="aligncenter size-large" data-dcnode-id="1845"><picture class="wp-image-15766" data-dcnode-id="1848"><source data-dcnode-id="1850" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/dreamstime-s-85019048-1.jpg.webp 800w, https://financer.com/app/uploads/2021/02/dreamstime-s-85019048-1-300x200.jpg.webp 300w, https://financer.com/app/uploads/2021/02/dreamstime-s-85019048-1-768x512.jpg.webp 768w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20533'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1849" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://financer.com/app/uploads/2021/02/dreamstime-s-85019048-1.jpg" data-lazy-srcset="https://financer.com/app/uploads/2021/02/dreamstime-s-85019048-1.jpg 800w, https://financer.com/app/uploads/2021/02/dreamstime-s-85019048-1-300x200.jpg 300w, https://financer.com/app/uploads/2021/02/dreamstime-s-85019048-1-768x512.jpg 768w" height="533" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20533'%3E%3C/svg%3E" width="800"></picture><noscript data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">&lt;picture class="wp-image-15766"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/dreamstime-s-85019048-1.jpg.webp 800w, https://financer.com/app/uploads/2021/02/dreamstime-s-85019048-1-300x200.jpg.webp 300w, https://financer.com/app/uploads/2021/02/dreamstime-s-85019048-1-768x512.jpg.webp 768w" sizes="(max-width: 800px) 100vw, 800px"/&gt;&lt;img width="800" height="533" src="https://financer.com/app/uploads/2021/02/dreamstime-s-85019048-1.jpg" alt="" srcset="https://financer.com/app/uploads/2021/02/dreamstime-s-85019048-1.jpg 800w, https://financer.com/app/uploads/2021/02/dreamstime-s-85019048-1-300x200.jpg 300w, https://financer.com/app/uploads/2021/02/dreamstime-s-85019048-1-768x512.jpg 768w" sizes="(max-width: 800px) 100vw, 800px"/&gt;&lt;/picture&gt;</span></noscript></figure></div><p data-dcnode-id="1839"><span data-dcnode-id="1843" instrument_node="">Joe Biden is pushing for what he has described as a “</span><strong data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">clean energy revolution</span></strong><span data-dcnode-id="1840" instrument_node="">“. One of his first acts as president was to rejoin the Paris Agreement that former president Donald Trump withdrew from in 2017, which included pledging to reduce emission levels between 26-28% by 2025.</span></p><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">The president says, “If we can harness all of our energy and talents, and unmatchable American innovation, we can turn this threat into an opportunity to revitalize the U.S. energy sector and boost growth economy-wide.”</span></p><p data-dcnode-id="1832"><span data-dcnode-id="1836" instrument_node="">Claiming that the Biden administration’s response to climate change can create </span><strong data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">more than 10 million well-paying jobs</span></strong><span data-dcnode-id="1833" instrument_node=""> in the United States “if executed strategically.”</span></p><h5 data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">What’s included in Biden’s plan to tackle climate change?</span></h5><ul class="is-style-default" data-dcnode-id="1821"><li data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">$1.7 trillion USD investment in clean energy</span></li><li data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Promise to reach 100% clean energy by 2050 with net-zero emissions</span></li><li data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Record-breaking investment in zero-carbon technologies</span></li><li data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">10 million well-paying jobs across America</span></li></ul><h4 data-dcnode-id="1818"><strong data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">How America dealt with Coronavirus&nbsp;</span></strong></h4><p data-dcnode-id="1814"><a data-dcnode-id="1816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/mikepatton/"><span data-dcnode-id="1817" instrument_node="">Mike Patton</span></a><span data-dcnode-id="1815" instrument_node="">, writing for Forbes in October of 2020 said, “Prior to the pandemic, the U.S. economy was doing very well. Unemployment was at a 50-year low and inflation was also below the Fed’s target of 2.0%.</span></p><p data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">However, because we closed a significant portion of the U.S. economy, ‘real’ GDP growth (i.e. the % increase/decrease in economic growth compared to one year prior, ‘net’ of inflation), fell during the second quarter by an astounding 31.40%. These are numbers not seen since the Great Depression of the 1930s.</span></p><p data-dcnode-id="1808"><strong data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Unemployment spiked to its highest rate in the post-WWII era</span></strong><span data-dcnode-id="1809" instrument_node="">, hitting 14.7% earlier this year.”</span></p><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">However, unemployment rates have been steadily decreasing since their peak in April 2020.</span></p><h4 data-dcnode-id="1803"><strong data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Stimulus plans</span></strong></h4><p data-dcnode-id="1798"><span data-dcnode-id="1802" instrument_node="">The US House just passed a </span><a data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edition.cnn.com/2021/02/26/politics/stimulus-package-covid-relief-house-vote/index.html"><span data-dcnode-id="1801" instrument_node="">$1.9 trillion stimulus plan</span></a><span data-dcnode-id="1799" instrument_node=""> that will give a strong relief to American businesses and individuals. </span></p><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">The plan will provide up to $1,400 in stimulus checks which will be available for mixed citizenship families and adult dependents, who were left out of the previous two stimulus plans under the previous government.</span></p><p data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">The plan also aims to assist the unemployed, food stamp recipients, low-income households and small business owners, as well as struggling homeowners to pay their rent or taxes.</span></p><h4 data-dcnode-id="1791"><strong data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">America’s attitude towards the financial markets</span></strong></h4><p data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">Despite the turbulent year, America’s attitude towards the financial markets has remained steady. As the graph below shows, 55% of adults in the United States invested in the stock market in 2020.</span></p><p data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Although lower than the percentage of investors during the Great Recession, it is in line with the two years previous and has risen since 2016. With the vaccine and new stimulus checks being rolled out, we don’t expect this to decrease in the coming year.</span></p><h4 class="has-text-align-center" data-dcnode-id="1785" id="Share_of_adults_in_America_investing_in_stocks"><span data-dcnode-id="1786" instrument_node="">Share of adults in America investing in stocks</span></h4><h6 class="has-text-align-center" data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">1999-2020</span></h6><div class="wp-block-image shortcode-no" data-dcnode-id="1776"><figure class="aligncenter size-large" data-dcnode-id="1777"><picture class="wp-image-15743" data-dcnode-id="1780"><source data-dcnode-id="1782" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-45-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-45-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-45-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-45.png.webp 1200w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1781" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-45-1024x633.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-45-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-45-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-45-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-45.png 1200w" height="633" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" width="1024"></picture><noscript data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">&lt;picture class="wp-image-15743"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-45-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-45-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-45-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-45.png.webp 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;img width="1024" height="633" src="https://financer.com/app/uploads/2021/02/image-45-1024x633.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-45-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-45-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-45-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-45.png 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;/picture&gt;</span></noscript></figure></div><h3 data-dcnode-id="1772" id="Europe"><strong data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Europe</span></strong><span data-dcnode-id="1773" instrument_node="">‘s path to recovery</span></h3><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Europe went into 2020 expecting the ongoing Brexit saga to dominate the headlines, however, the pandemic unsurprisingly took centre stage instead. We’ve taken a look at how Europe is doing financially after such an unprecedented year.</span></p><h4 data-dcnode-id="1767"><strong data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">A post-Brexit Europe</span></strong></h4><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Although overshadowed in 2020 by COVID-19, Brexit is set to make a big impact on both the UK and EU in 2021. Already we can see the British pound (GBP) has significantly devalued against the Euro since the referendum result in 2016.&nbsp;</span></p><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">In January 2015 the GBP was 0.73 against 1 Euro, which is 0.18 lower than the 0.91 in December 2020. However, there may be light at the end of the tunnel for the GBP.</span></p><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">After the announcement of the vaccine, the GBP has seen a slight comeback after a peak of 0.94, which made them nearly 1-1. We’re now seeing numbers go back down to 0.89, as confidence grows in the UK economy due to the strong vaccine measures.&nbsp;</span></p><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">FX strategist Petr Krpata suggests the conclusion of Brexit has also made an impact.</span></p><blockquote class="wp-block-quote" data-dcnode-id="1754"><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node=""> “With the risk of a ‘no deal’ Brexit no longer hanging over markets, the persistent pound undervaluation of recent years should begin to dissipate”.</span></p><cite data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Petr Krpata</span></cite></blockquote><h4 class="has-text-align-center" data-dcnode-id="1752" id="GBP_per_1_Euro"><span data-dcnode-id="1753" instrument_node="">GBP per 1 Euro</span></h4><h6 class="has-text-align-center" data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">2015: Q4 – 2020: Q4</span></h6><figure class="wp-block-image size-large shortcode-no" data-dcnode-id="1744"><picture class="wp-image-15744" data-dcnode-id="1747"><source data-dcnode-id="1749" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-46-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-46-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-46-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-46.png.webp 1200w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1748" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-46-1024x633.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-46-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-46-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-46-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-46.png 1200w" height="633" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" width="1024"></picture><noscript data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">&lt;picture class="wp-image-15744"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-46-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-46-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-46-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-46.png.webp 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;img width="1024" height="633" src="https://financer.com/app/uploads/2021/02/image-46-1024x633.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-46-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-46-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-46-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-46.png 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;/picture&gt;</span></noscript></figure><p data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Migration between the UK and Europe is also expected to slow down now that a decision has been finalised. However, with COVID-19 reducing travel to such a great extent, it might be some time until we find out by just how much.&nbsp;</span></p><h4 data-dcnode-id="1739"><strong data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Next Generation EU&nbsp;</span></strong></h4><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">The graph below outlines the financial response to the pandemic as a share of GDP. Japan is currently taking a strong lead at 21.1%, much higher than the European numbers between 12% and 5%.&nbsp;</span></p><h4 class="has-text-align-center" data-dcnode-id="1735" id="Coronavirus_stimulus_packages_compared"><span data-dcnode-id="1736" instrument_node="">Coronavirus stimulus packages compared</span></h4><h6 class="has-text-align-center" data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">As of: 10.5.2020</span></h6><figure class="wp-block-image size-large shortcode-no" data-dcnode-id="1727"><picture class="wp-image-15745" data-dcnode-id="1730"><source data-dcnode-id="1732" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-47-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-47-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-47-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-47.png.webp 1200w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1731" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-47-1024x633.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-47-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-47-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-47-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-47.png 1200w" height="633" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" width="1024"></picture><noscript data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">&lt;picture class="wp-image-15745"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-47-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-47-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-47-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-47.png.webp 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;img width="1024" height="633" src="https://financer.com/app/uploads/2021/02/image-47-1024x633.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-47-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-47-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-47-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-47.png 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;/picture&gt;</span></noscript></figure><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">However, there have still been generous stimulus packages all over Europe. The European commission’s long term budget and the NextGenerationEU was confirmed on the 17th of December 2020.</span></p><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Ursula von der Leyen announced the total of €1.8 trillion euros which will be used to rebuild Europe post COVID-19. Saying they will “use the bulk of this money to help member states recover from the crisis and build up their long term resilience capacity.”</span></p><h4 data-dcnode-id="1720"><strong data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Growing unemployment in Europe</span></strong></h4><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Due to this government provided relief, unemployment rates didn’t skyrocket as much as many expected them to in 2020.&nbsp;</span></p><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Out of Europe’s five largest economies, France, the UK, Italy and Spain, all experienced an increase in unemployment, with Spain at the most worrying level of 20.8%. Germany, however, continues to keep the lowest unemployment rate out of the five and actually saw a drop in 2020 to just 0.3%.</span></p><h4 class="has-text-align-center" data-dcnode-id="1714" id="Unemployment_rate_of_the_largest_economies_in_Europe"><span data-dcnode-id="1715" instrument_node="">Unemployment rate of the largest economies in Europe</span></h4><h6 class="has-text-align-center" data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">2000 -2020</span></h6><figure class="wp-block-image size-large shortcode-no" data-dcnode-id="1706"><picture class="wp-image-15746" data-dcnode-id="1709"><source data-dcnode-id="1711" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-48-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-48-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-48-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-48.png.webp 1200w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1710" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-48-1024x633.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-48-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-48-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-48-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-48.png 1200w" height="633" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" width="1024"></picture><noscript data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">&lt;picture class="wp-image-15746"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-48-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-48-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-48-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-48.png.webp 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;img width="1024" height="633" src="https://financer.com/app/uploads/2021/02/image-48-1024x633.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-48-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-48-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-48-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-48.png 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;/picture&gt;</span></noscript></figure><p data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Although this seems relatively positive, analysts suggest everything is being temporarily propped up by furlough and other government support schemes, and that we will see the real results in late 2021 and beyond.</span></p><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">This prediction is in line with the graph below which shows how unemployment rises in the EU the moment lockdowns began to occur in February 2020.&nbsp;</span></p><h4 class="has-text-align-center" data-dcnode-id="1700" id="Unemployment_rate_in_the_EU"><span data-dcnode-id="1701" instrument_node="">Unemployment rate in the EU</span></h4><h6 class="has-text-align-center" data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">2000 -2020</span></h6><div class="wp-block-image shortcode-no" data-dcnode-id="1691"><figure class="aligncenter size-large" data-dcnode-id="1692"><picture class="wp-image-15747" data-dcnode-id="1695"><source data-dcnode-id="1697" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-49-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-49-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-49-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-49.png.webp 1200w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1696" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://financer.com/app/uploads/2021/02/image-49-1024x633.png" data-lazy-srcset="https://financer.com/app/uploads/2021/02/image-49-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-49-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-49-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-49.png 1200w" height="633" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20633'%3E%3C/svg%3E" width="1024"></picture><noscript data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">&lt;picture class="wp-image-15747"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/image-49-1024x633.png.webp 1024w, https://financer.com/app/uploads/2021/02/image-49-300x186.png.webp 300w, https://financer.com/app/uploads/2021/02/image-49-768x475.png.webp 768w, https://financer.com/app/uploads/2021/02/image-49.png.webp 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;img width="1024" height="633" src="https://financer.com/app/uploads/2021/02/image-49-1024x633.png" alt="" srcset="https://financer.com/app/uploads/2021/02/image-49-1024x633.png 1024w, https://financer.com/app/uploads/2021/02/image-49-300x186.png 300w, https://financer.com/app/uploads/2021/02/image-49-768x475.png 768w, https://financer.com/app/uploads/2021/02/image-49.png 1200w" sizes="(max-width: 1024px) 100vw, 1024px"/&gt;&lt;/picture&gt;</span></noscript></figure></div><h3 data-dcnode-id="1688" id="Stock_Markets_and_Currencies"><strong data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Stock markets and currencies</span></strong></h3><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">The Federal Reserve assured markets that interest rates will remain unchanged and S&amp;P 500 and Dow are at their highest since the lows of March 2020, making things look remarkably positive.</span></p><p data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">But what can we expect from the rest of 2021 in a world still vastly locked down?</span></p><h4 data-dcnode-id="1681"><strong data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Digital currencies explode</span></strong></h4><p data-dcnode-id="1680"></p><div class="wp-block-image shortcode-no" data-dcnode-id="1673"><figure class="aligncenter size-large" data-dcnode-id="1674"><picture class="wp-image-15768" data-dcnode-id="1677"><source data-dcnode-id="1679" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-srcset="https://financer.com/app/uploads/2021/02/dreamstime-s-107391056.jpg.webp 800w, https://financer.com/app/uploads/2021/02/dreamstime-s-107391056-300x225.jpg.webp 300w, https://financer.com/app/uploads/2021/02/dreamstime-s-107391056-768x576.jpg.webp 768w, https://financer.com/app/uploads/2021/02/dreamstime-s-107391056-702x526.jpg.webp 702w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20600'%3E%3C/svg%3E" type="image/webp"><img alt="" data-dcnode-id="1678" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://financer.com/app/uploads/2021/02/dreamstime-s-107391056.jpg" data-lazy-srcset="https://financer.com/app/uploads/2021/02/dreamstime-s-107391056.jpg 800w, https://financer.com/app/uploads/2021/02/dreamstime-s-107391056-300x225.jpg 300w, https://financer.com/app/uploads/2021/02/dreamstime-s-107391056-768x576.jpg 768w, https://financer.com/app/uploads/2021/02/dreamstime-s-107391056-702x526.jpg 702w" height="600" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20600'%3E%3C/svg%3E" width="800"></picture><noscript data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">&lt;picture class="wp-image-15768"&gt;&lt;source type="image/webp" srcset="https://financer.com/app/uploads/2021/02/dreamstime-s-107391056.jpg.webp 800w, https://financer.com/app/uploads/2021/02/dreamstime-s-107391056-300x225.jpg.webp 300w, https://financer.com/app/uploads/2021/02/dreamstime-s-107391056-768x576.jpg.webp 768w, https://financer.com/app/uploads/2021/02/dreamstime-s-107391056-702x526.jpg.webp 702w" sizes="(max-width: 800px) 100vw, 800px"/&gt;&lt;img width="800" height="600" src="https://financer.com/app/uploads/2021/02/dreamstime-s-107391056.jpg" alt="" srcset="https://financer.com/app/uploads/2021/02/dreamstime-s-107391056.jpg 800w, https://financer.com/app/uploads/2021/02/dreamstime-s-107391056-300x225.jpg 300w, https://financer.com/app/uploads/2021/02/dreamstime-s-107391056-768x576.jpg 768w, https://financer.com/app/uploads/2021/02/dreamstime-s-107391056-702x526.jpg 702w" sizes="(max-width: 800px) 100vw, 800px"/&gt;&lt;/picture&gt;</span></noscript></figure></div><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">The value of the dollar has been decreasing against the Euro and GBP since April 2020, yet digital currencies continue to grow.</span></p><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">When Tesla brought $1.5 billion Bitcoin in February, they contributed to an exponential growth which takes us to an unprecedented value of $50,000.00 per Bitcoin today. The company even claimed they “expect to begin accepting bitcoin as a form of payment for our products in the near future.”</span></p><p data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">We expect more S&amp;P 500 companies to follow suit and for the value of Bitcoin to continue to rise in 2021.&nbsp;</span></p><h4 class="has-text-align-center" data-dcnode-id="1665" id="Value_of_Bitcoin_"><span data-dcnode-id="1666" instrument_node="">Value of Bitcoin </span></h4><h6 class="has-text-align-center" data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">1.1.19 – 1.1.21</span></h6><figure class="wp-block-image size-large shortcode-no" data-dcnode-id="1657"><picture class="wp-image-15748" data-dcnode-id="1660"><source data-dcnode-id="1662" dat
