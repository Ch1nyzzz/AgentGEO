</span><p data-dcnode-id="594"><span data-dcnode-id="599" style="font-weight: 400;"><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.worldwildlife.org/" rel="attachment wp-att-32944"><img alt="Logo World Wildlife Fund" class="alignleft wp-image-32944 size-medium" data-dcnode-id="602" height="129" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Logo-World-Wildlife-Fund-e1456435119790-300x129.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/Logo-World-Wildlife-Fund-e1456435119790-300x129.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/Logo-World-Wildlife-Fund-e1456435119790-768x330.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/Logo-World-Wildlife-Fund-e1456435119790-500x215.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/Logo-World-Wildlife-Fund-e1456435119790.jpg 1600w" width="300"></a><span data-dcnode-id="600" instrument_node="">The World Wildlife Fund is an international NGO dedicated to protecting biodiversity against human impacts, whose mission is “</span></span><span data-dcnode-id="597" style="font-weight: 400;"><span data-dcnode-id="598" instrument_node=""> “to stop the degradation of the planet’s natural environment and to build a future in which humans live in harmony with nature.”</span></span><span data-dcnode-id="595" style="font-weight: 400;"><span data-dcnode-id="596" instrument_node=""> Their six main work areas focus on forests, marine life, freshwater life, wildlife, food, and climate. WWF is made up of 5 million members globally, and brings together business leaders, policymakers, and scientists to maximize their impact in over 100 program countries.</span></span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">&nbsp;</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="586"><strong data-dcnode-id="587"><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rare.org/"><span data-dcnode-id="589" instrument_node="">Rare</span></a></strong></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" style="font-weight: 400;"><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rare.org/" rel="attachment wp-att-33007"><img alt="rare-logo-horizontal" class="alignleft wp-image-33007" data-dcnode-id="584" height="142" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/rare-logo-horizontal.png&amp;raw" width="300"></a><span data-dcnode-id="582" instrument_node="">Rare is a conservation organization aiming to promote sustainable practices by changing human behavior in local communities. Instead of analyzing environmental issues, this NGO uses proven solutions such as sustainable agriculture, fisheries, and watersheds. Rare creates partnerships called “Pride campaigns” with local groups using&nbsp;social marketing and engagement to protect local biodiversity. Currently, Rare has developed over 245 partnerships in 56 countries.</span></span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">&nbsp;</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="572"><strong data-dcnode-id="573"><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rainforest-alliance.org/"><span data-dcnode-id="575" instrument_node="">Rainforest Alliance</span></a></strong></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="567" style="font-weight: 400;"><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rainforest-alliance.org/" rel="attachment wp-att-33008"><img alt="tablet-logo" class="alignleft wp-image-33008" data-dcnode-id="570" height="108" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/tablet-logo.png&amp;raw" width="300"></a><span data-dcnode-id="568" instrument_node="">Rainforest Alliance focuses on natural resource conservation and sustainable land use by improving business practices and consumer actions. The organization trains and works with farmers, foresters, and tourism developers to facilitate sustainable practices. Rainforest Alliance also assesses the farming and forestry industry through regular and surprise audits, and organizations that pass these audits are given the Rainforest Alliance Certified</span></span><span data-dcnode-id="565" style="font-weight: 400;"><span data-dcnode-id="566" instrument_node="">™ seal. Entrepreneurs, businesses, and industries around the world use the Rainforest Alliance to connect with a growing community of conservation-oriented consumers.</span></span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="559"><strong data-dcnode-id="560"><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bornfreeusa.org/"><span data-dcnode-id="562" instrument_node="">Born Free Foundation</span></a></strong></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" style="font-weight: 400;"><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bornfreeusa.org/" rel="attachment wp-att-33009"><img alt="BFF 05 trophy.ai" class="alignleft size-medium wp-image-33009" data-dcnode-id="557" height="150" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/BFF-logo-CS-300x150.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/BFF-logo-CS-300x150.jpg 300w, https://bestdelegate.com/wp-content/uploads/2010/08/BFF-logo-CS-768x385.jpg 768w, https://bestdelegate.com/wp-content/uploads/2010/08/BFF-logo-CS-500x251.jpg 500w, https://bestdelegate.com/wp-content/uploads/2010/08/BFF-logo-CS.jpg 1181w" width="300"></a><span data-dcnode-id="555" instrument_node="">Born Free Foundation is an international animal rights organization and wildlife charity. Their goals include protecting threatened species, ending animal cruelty, and preventing wildlife captivity, all of which serve their objective of wildlife and humans coexisting in an ecosystem. Born Free Foundation’s programs and projects have addressed welfare and conservation of animals. The organization also campaigns against “sport” hunting, the ivory trade, wildlife trafficking, and other causes.</span></span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">&nbsp;</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="545"><strong data-dcnode-id="546"><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.iucn.org/"><span data-dcnode-id="548" instrument_node="">IUCN</span></a></strong></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" style="font-weight: 400;"><a data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.iucn.org/" rel="attachment wp-att-33010"><img alt="IUCN-Logo.svg" class="alignleft wp-image-33010 size-medium" data-dcnode-id="543" height="133" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/IUCN-Logo.svg_-300x133.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/IUCN-Logo.svg_-300x133.png 300w, https://bestdelegate.com/wp-content/uploads/2010/08/IUCN-Logo.svg_-768x341.png 768w, https://bestdelegate.com/wp-content/uploads/2010/08/IUCN-Logo.svg_-500x222.png 500w, https://bestdelegate.com/wp-content/uploads/2010/08/IUCN-Logo.svg_.png 1280w" width="300"></a><span data-dcnode-id="541" instrument_node="">The International Union for Conservation of Nature (IUCN) is one of the largest nature conservation organizations in the world, founded in 1948 to protect biological diversity and reduce use of unsustainable energies and resources. Unlike many environmental organizations, IUCN doesn’t focus on public awareness efforts, but instead works directly with governments by lobbying and forming partnerships with influential organizations. IUCN is made up of 11,000 scientists, and IUCN staff work in 60 different countries all across the world with an annual budget of over $110 Million. </span></span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="534"><strong data-dcnode-id="535"><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biologicaldiversity.org/"><span data-dcnode-id="537" instrument_node="">Center for Biological Diversity</span></a></strong></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" style="font-weight: 400;"><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biologicaldiversity.org/" rel="attachment wp-att-33011"><img alt="CenterForBiologicalDiversity" class="alignleft size-medium wp-image-33011" data-dcnode-id="532" height="153" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/CenterForBiologicalDiversity-300x153.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/CenterForBiologicalDiversity-300x153.png 300w, https://bestdelegate.com/wp-content/uploads/2010/08/CenterForBiologicalDiversity.png 472w" width="300"></a><span data-dcnode-id="530" instrument_node="">The Center for Biological Diversity is an Arizona-based environmental organization boasting over 625,000 members across the United States. Working in 11 different states, since 1989 the Center for Biological Diversity has fought to protect ecosystems and biodiversity through scientific research, public awareness, and policy advocacy to protect biological life. The Center for Biological Diversity also brings forward legal cases against companies and local governments it believes are harming the environment, seeking to protect these spaces, and has a 93% success rate in their environmental lawsuits. </span></span></p><span data-dcnode-id="527" instrument_node="">
</span></div></div><span data-dcnode-id="524" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="413"><div class="su-spoiler-title" data-dcnode-id="521" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="523"></span><span data-dcnode-id="522" instrument_node="">SDG 16 - Promote peaceful and inclusive societies for sustainable development, provide access to justice for all and build effective, accountable and inclusive institutions at all levels</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="414"><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="516"><strong data-dcnode-id="517"><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnesty.org/en/"><span data-dcnode-id="519" instrument_node="">Amnesty International</span></a></strong></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" style="font-weight: 400;"><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnesty.org/en/" rel="attachment wp-att-33030"><img alt="loring-amnesty-international-logo" class="alignleft size-medium wp-image-33030" data-dcnode-id="514" height="135" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/loring-amnesty-international-logo-300x135.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/loring-amnesty-international-logo-300x135.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/loring-amnesty-international-logo-768x347.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/loring-amnesty-international-logo-500x226.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/loring-amnesty-international-logo.jpg 1070w" width="300"></a><span data-dcnode-id="512" instrument_node="">Amnesty International is comprised of over 7 million members worldwide, working to combat injustice and protect human rights. Advocating on issues such as fair trials, unmanned aerial vehicles, and public education, Amnesty International has won the Nobel Peace Prize for their work. Amnesty International is one of the largest advocacy organizations globally, and works on all the following issues, and more: Prisoner Rights, Poverty and Human Rights, the Death Penalty, Refugee Rights, Torture, Human Rights, LGBT Rights, and Censorship and Free Speech. </span></span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">&nbsp;</span></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="502"><strong data-dcnode-id="503"><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.transparency.org/"><span data-dcnode-id="505" instrument_node="">Transparency International</span></a></strong></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="497" style="font-weight: 400;"><a data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.transparency.org/" rel="attachment wp-att-32951"><img alt="images (2)" class="alignleft wp-image-32951" data-dcnode-id="500" height="73" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/images-2-e1456435853897.jpg&amp;raw" width="301"></a><span data-dcnode-id="498" instrument_node="">Transparency International is a civic organisation involved with promoting anti-corruption measures while ensuring that victims and witnesses are given voices in over 100 countries. &nbsp;The organization works within five core areas: climate change, business integrity, public sector integrity, open governance, and public transport. Furthermore, Transparency International has developed research programs and tools such as the Corruption Perceptions Index while</span></span><span data-dcnode-id="495" style="font-weight: 400;"><span data-dcnode-id="496" instrument_node="">&nbsp;in collaboration with businesses and governments to help inform the public about the status of government accountability in each country.&nbsp;</span></span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="489"><strong data-dcnode-id="490"><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ictj.org/"><span data-dcnode-id="492" instrument_node="">International Center for Transitional Justice</span></a></strong></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" style="font-weight: 400;"><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ictj.org/" rel="attachment wp-att-32952"><img alt="1147314523" class="alignleft wp-image-32952 size-medium" data-dcnode-id="487" height="105" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/1147314523-e1456435806241-300x105.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/1147314523-e1456435806241-300x105.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/1147314523-e1456435806241-500x175.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/1147314523-e1456435806241.jpg 709w" width="300"></a><span data-dcnode-id="485" instrument_node="">The International Center for Transitional Justice (ICTJ) is a non-profit organization that addresses human rights violations in the case of mass repression. The ICTJ assists in developing civic trust and accountability through providing legal expertise. The organization develops civic trust by&nbsp;advising state institutions, capacity building with other civil organizations, and analyzing transitional justice progress. </span></span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="478"><strong data-dcnode-id="479"><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icj.org/"><span data-dcnode-id="481" instrument_node="">International Commission of Jurists</span></a></strong></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="473" style="font-weight: 400;"><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icj.org/" rel="attachment wp-att-32953"><img alt="download (2)" class="alignleft size-medium wp-image-32953" data-dcnode-id="476" height="114" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/download-2-300x114.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/download-2-300x114.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/download-2.png 364w" width="300"></a><span data-dcnode-id="474" instrument_node="">A commission of 60 judges, the organization aims to use legal experience to solidify various international justice systems. The ICJ was created in 1952 and runs operations in five continents. The commission oversees the development of humanitarian law through publishing annual briefs and coordinating discussion forums about different global justice systems. Furthermore, the ICJ is well known for developing its Center for the Independence of Judges and Lawyers</span></span><span data-dcnode-id="471" style="font-weight: 400;"><span data-dcnode-id="472" instrument_node="">, an initiative focusing on improving judicial systems that are vulnerable and ensuring that the interests of victims of human rights are heard. </span></span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="465"><strong data-dcnode-id="466"><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opensocietyfoundations.org/"><span data-dcnode-id="468" instrument_node="">Open Society Foundations</span></a></strong></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" style="font-weight: 400;"><a data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opensocietyfoundations.org/" rel="attachment wp-att-32954"><img alt="Basic CMYK" class="alignleft size-medium wp-image-32954" data-dcnode-id="463" height="70" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/osf_logo_rgb.jpg-300x70.jpeg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/osf_logo_rgb.jpg-300x70.jpeg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/osf_logo_rgb.jpg-768x179.jpeg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/osf_logo_rgb.jpg-500x117.jpeg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/osf_logo_rgb.jpg.jpeg 1023w" width="300"></a><span data-dcnode-id="461" instrument_node="">Open Society Foundations (OSF) is an organization founded by philanthropist George Soros in 1979. OSF encourages the development of tolerant democratic societies where the diversity of opinions are heard, rather than repressed by governments. OSF focuses on five core areas: Education, Governance, Health, Media, and Justice. The organization provides several programs such as documentary photography projects and independent journalist initiatives to promote the concept of democracy and freedom of press.</span></span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="454"><strong data-dcnode-id="455"><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.trial-ch.org/"><span data-dcnode-id="457" instrument_node="">TRIAL</span></a></strong></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" style="font-weight: 400;"><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.trial-ch.org/" rel="attachment wp-att-32955"><img alt="download (1)" class="alignleft size-medium wp-image-32955" data-dcnode-id="452" height="109" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/download-1-300x109.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/download-1-300x109.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/download-1.jpg 373w" width="300"></a><span data-dcnode-id="450" instrument_node="">TRIAL (Track Impunity Always) is a tax exempt organization that operates under Swiss law. TRIAL was founded in 2002 for the purpose of providing law services for victims of international war crimes such as genocide. In addition, the organization provides law services through defending victims in the International Criminal Court and advocating for efficient judicial systems. &nbsp; TRIAL was founded at the same time the International Criminal Court was established to assist victims in the Rome Statute system.&nbsp;</span></span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="443"><strong data-dcnode-id="444"><a data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ibj.org/"><span data-dcnode-id="446" instrument_node="">International Bridges to Justice</span></a></strong></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" style="font-weight: 400;"><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ibj.org/" rel="attachment wp-att-32956"><img alt="IBJ" class="alignleft wp-image-32956 size-medium" data-dcnode-id="441" height="141" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/IBJ-e1456436115755-300x141.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/IBJ-e1456436115755-300x141.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/IBJ-e1456436115755-768x362.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/IBJ-e1456436115755-500x236.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/IBJ-e1456436115755.jpg 842w" width="300"></a><span data-dcnode-id="439" instrument_node="">International Bridges to Justice is a Geneva-based NGO dedicated to “protecting the basic legal rights of organized citizens in developing countries by guaranteeing all citizens the right to competent legal representation”. Founded by and comprised of defense lawyers, IBJ seeks to guarantee fair trials to all citizens of the world, and to “end torture this century”. &nbsp;IBJ’s work includes providing training to criminal defense lawyers, organizing roundtable discussions of defenders, prosecutors, and judges about justice, and raising awareness about legal rights among populations of developing countries. Their online platform “JusticeMakers” allows defenders to share expertise worldwide about their experiences. </span></span></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="432"><strong data-dcnode-id="433"><a data-dcnode-id="434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dcaf.ch/"><span data-dcnode-id="435" instrument_node="">Geneva Center for the Democratic Control of Armed Forces</span></a></strong></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" style="font-weight: 400;"><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dcaf.ch/" rel="attachment wp-att-32949"><img alt="DCAF_Logo_English" class="alignleft wp-image-32949 size-medium" data-dcnode-id="430" height="119" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/DCAF_Logo_English-e1456436250646-300x119.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/DCAF_Logo_English-e1456436250646-300x119.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/DCAF_Logo_English-e1456436250646.jpg 425w" width="300"></a><span data-dcnode-id="428" instrument_node="">DCAF, the “Geneva Center for the Democratic Control of Armed Forces” was founded by the Swiss Confederation to promote civilian influence over the armed forces of their country. Their work focuses on encouraging responsive security sectors accountable to the citizens of a state and obedient to Rule of Law and the goals of sustainable peace. DCAF has permanent offices in Lebanon, Belgium, Slovenia, Palestine, and Tunisia working with governments toward transparency and democratization.</span></span></p><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="421"><strong data-dcnode-id="422"><a data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.civicus.org/"><span data-dcnode-id="424" instrument_node="">CIVICUS</span></a></strong></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="416"><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.civicus.org/" rel="attachment wp-att-32957"><img alt="civicus_logo" class="alignleft wp-image-32957" data-dcnode-id="419" height="173" sizes="(max-width: 171px) 100vw, 171px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/civicus_logo-295x300.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/civicus_logo-295x300.jpg 295w, https://bestdelegate.com/wp-content/uploads/2016/02/civicus_logo-768x782.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/civicus_logo-491x500.jpg 491w, https://bestdelegate.com/wp-content/uploads/2016/02/civicus_logo.jpg 1179w" width="171"></a><span data-dcnode-id="417" instrument_node="">CIVICUS is an international organization comprised of civil-society organizations that wish to promote and protect the rights of civil society organizations globally. Their work covers three objectives: increase the influence of civil society in decision-making processes, connect civil society organizations and citizens to the available resources in their community, and enable civil society work through legal protections. CIVICUS is based in South Africa, however has membership in over 150 countries.</span></p><span data-dcnode-id="415" instrument_node="">
</span></div></div><span data-dcnode-id="412" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="374"><div class="su-spoiler-title" data-dcnode-id="409" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="411"></span><span data-dcnode-id="410" instrument_node="">SDG 17 - Strengthen the means of implementation and revitalize the global partnership for sustainable development</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="375"><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="404"><strong data-dcnode-id="405"><a data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ceres.org/"><span data-dcnode-id="407" instrument_node="">Ceres</span></a></strong></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" style="font-weight: 400;"><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ceres.org/" rel="attachment wp-att-32960"><img alt="logo_ceres" class="alignleft size-medium wp-image-32960" data-dcnode-id="402" height="142" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/logo_ceres-300x142.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/logo_ceres-300x142.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/logo_ceres-500x236.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/logo_ceres.jpg 635w" width="300"></a><span data-dcnode-id="400" instrument_node="">Ceres is a Boston-based sustainability advocacy organization that serves as a forum for organizations and businesses to promote sustainable practices and sustainable development. Ceres works to protect the biosphere, reduce waste and consumption, improve public education, and promote environmental remediation globally to achieve their goals. Ceres is funded by private investors, and works with top-level officials from the UN&nbsp;and national governments to set sustainability standards and ratings. Ceres works with governments to set sustainability regulations and incentives, and business and industry leaders to recognize the long-term economic impacts and risks of ignoring unsustainable practices. </span></span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="393"><strong data-dcnode-id="394"><a data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ngodpiexecom.org/"><span data-dcnode-id="396" instrument_node="">NGO/DPI Executive Committee</span></a></strong></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" style="font-weight: 400;"><a data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ngodpiexecom.org/"><img alt="Header" class="alignleft wp-image-32959 size-medium" data-dcnode-id="391" height="85" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Header-300x85.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/Header-300x85.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/Header.png 500w" width="300"></a><span data-dcnode-id="389" instrument_node="">The NGO/DPI Executive Committee is a council of UN-affiliated NGOs that work with the UN Department of Public Information to bridge the gap between civil society organizations and the UN in development policy-making. Each year the organization coordinates the DPI/NGO Conference jointly with the UN Department of Public Information, convening over 5000 NGO leaders for roundtable discussions and to debate the future of NGO involvement with UN activities, including adopting a final resolution that is presented to the United Nations Member States.</span></span></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="382"><strong data-dcnode-id="383"><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.weforum.org/"><span data-dcnode-id="385" instrument_node="">World Economic Forum</span></a></strong></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="377"><a data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.weforum.org/"><img alt="" class="alignleft wp-image-32961 size-medium" data-dcnode-id="380" height="148" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/World_economic_forum_logo-e1456436595915-300x148.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/World_economic_forum_logo-e1456436595915-300x148.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/World_economic_forum_logo-e1456436595915-768x380.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/World_economic_forum_logo-e1456436595915-500x247.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/World_economic_forum_logo-e1456436595915.jpg 1387w" width="300"></a><span data-dcnode-id="378" instrument_node="">The World Economic Forum (WEF) is a global non-profit based in Switzerland that works to promote international development and cooperation. The World Economic Forum works with policy makers from national governments, the UN, and civil society organizations to “bridge the gap” on climate change and sustainable development. Each year the central WEF meeting is held in Davos, however there are dozens of annual ministerial, youth, head of state, and regional meetings globally to engage the international community through the WEF.</span></p><span data-dcnode-id="376" instrument_node="">
</span></div></div><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"></p><span data-dcnode-id="370" instrument_node="">
