</span><article class="post_box grt top" data-dcnode-id="362" id="post-32386" itemscope="" itemtype="https://schema.org/BlogPosting"><span data-dcnode-id="1687" instrument_node="">
</span><link data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/ngoguide/&amp;raw" itemprop="mainEntityOfPage"><span data-dcnode-id="1685" instrument_node="">
</span><div class="headline_area" data-dcnode-id="1680"><span data-dcnode-id="1684" instrument_node="">
</span><h1 class="headline" data-dcnode-id="1682" itemprop="headline"><span data-dcnode-id="1683" instrument_node="">Model United Nations NGO Guide</span></h1><span data-dcnode-id="1681" instrument_node="">
</span></div><span data-dcnode-id="1679" instrument_node="">
</span><div class="post_content" data-dcnode-id="364" itemprop="articleBody"><span data-dcnode-id="1678" instrument_node="">
</span><img alt="sdgs-list-en" class="aligncenter wp-image-32868" data-dcnode-id="1677" height="430" sizes="(max-width: 749px) 100vw, 749px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/sdgs-list-en-500x287.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/sdgs-list-en-500x287.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/sdgs-list-en-300x172.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/sdgs-list-en-768x441.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/sdgs-list-en.jpg 1600w" width="749"><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1675" instrument_node="">Since the founding of the United Nations, NGOs have been critical members of the policy and implementation process. </span><strong data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">NGOs</span></strong><span data-dcnode-id="1672" instrument_node="">, or&nbsp;</span><strong data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Non-Governmental Organizations</span></strong><span data-dcnode-id="1669" instrument_node="">, are non-profit organizations working on humanitarian, human rights, and sustainable development issues worldwide.&nbsp;In Model UN, knowledge of NGOs will help you write a better position paper, deliver stronger speeches, and write more informed and realistic resolutions. &nbsp;However, in Model UN students often have a hard time finding NGOs to help with their solutions, and often use NGOs in the entirely wrong way! We’re hoping to fix that.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">On this page, we give you a list of NGOs working in nearly every area of work of the United Nations. &nbsp;However, before scrolling through this list (sorted by Sustainable Development Goal), we first need to discuss how to use NGOs in a Model UN Conference.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">In the UN System, NGOs have three&nbsp;main roles:</span></p><span data-dcnode-id="1661" instrument_node="">
</span><ol data-dcnode-id="1650"><span data-dcnode-id="1660" instrument_node="">
</span><li data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Sharing their research and expertise with the United Nations in the policy-making process</span></li><span data-dcnode-id="1657" instrument_node="">
</span><li data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Working directly with UN Departments and Programs to assist in the implementation of solutions</span></li><span data-dcnode-id="1654" instrument_node="">
</span><li data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Using their networks and local contacts to amplify the work of the UN through disseminating information and bringing global access to remote or unknown areas</span></li><span data-dcnode-id="1651" instrument_node="">
</span></ol><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1648" instrument_node="">This means that </span><strong data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">NGOs do not fund the UN, UN Programs, or UN solutions</span></strong><span data-dcnode-id="1645" instrument_node="">. They also do not take orders from the United Nations, though the UN can make recommendations&nbsp;for NGOs.</span></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">These facts give you many opportunities to use NGOs to make you a better&nbsp;delegate in Model UN. For example:</span></p><span data-dcnode-id="1640" instrument_node="">
</span><ul data-dcnode-id="1614"><span data-dcnode-id="1639" instrument_node="">
</span><li data-dcnode-id="1634"><span data-dcnode-id="1638" instrument_node="">In your </span><strong data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Position Paper</span></strong><span data-dcnode-id="1635" instrument_node="">, use research and solutions from NGOs to strengthen your ideas.</span></li><span data-dcnode-id="1633" instrument_node="">
</span><li data-dcnode-id="1628"><span data-dcnode-id="1632" instrument_node="">In your </span><strong data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Opening Speech</span></strong><span data-dcnode-id="1629" instrument_node="">, use NGOs to demonstrate why your solutions already work, and to show that your ideas and realistic and well-planned.</span></li><span data-dcnode-id="1627" instrument_node="">
</span><li data-dcnode-id="1622"><span data-dcnode-id="1626" instrument_node="">In your </span><strong data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Preambular Clauses</span></strong><span data-dcnode-id="1623" instrument_node="">, use NGOs to call attention to issue and recognize their hard work.</span></li><span data-dcnode-id="1621" instrument_node="">
</span><li data-dcnode-id="1616"><span data-dcnode-id="1620" instrument_node="">In your </span><strong data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Operative Clauses</span></strong><span data-dcnode-id="1617" instrument_node="">, use NGOs as a local network to help implement your solutions, as an amplifier for your public awareness campaigns, or as a reference point for new creative solutions.</span></li><span data-dcnode-id="1615" instrument_node="">
</span></ul><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">By coming to a conference prepared with the NGOs working on your topic (which you can find below), you can bring new ideas grounded in real-world solutions to the topic in your committee.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="1509"><div class="su-spoiler-title" data-dcnode-id="1607" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1609"></span><span data-dcnode-id="1608" instrument_node="">SDG 1 - End poverty in all its forms everywhere</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1510"><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1602"><strong data-dcnode-id="1603"><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//acumen.org/"><span data-dcnode-id="1605" instrument_node="">Acumen</span></a></strong></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1597"><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//acumen.org/"><img alt="ACUMEN" class="alignleft wp-image-32840 size-medium" data-dcnode-id="1600" height="177" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/ACUMEN-300x177.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/ACUMEN-300x177.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/ACUMEN.png 411w" width="300"></a><span data-dcnode-id="1598" instrument_node="">Acumen was founded in 2001 by CISCO and the Rockefeller Foundation to help build financial sustainability in organizations and small businesses in developing countries. Acumen makes investments in enterprises ranging from $300,000-$2,000,000 in six key areas: &nbsp;Water, Health, Housing, Energy, Agriculture, and Education. Rather than a traditional grant-making organization, Acumen invests in organizations rather than giving grants, and partners with corporate entities to find the capital for these initial investments to create new enterprises across Africa, Latin America, and Asia.</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1593" instrument_node="">
</span><p data-dcnode-id="1589"><strong data-dcnode-id="1590"><a data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.brac.net/"><span data-dcnode-id="1592" instrument_node="">BRAC</span></a></strong></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" style="font-weight: 400;"><a data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.brac.net/"><img alt="BRAC" class="alignleft wp-image-32841 size-medium" data-dcnode-id="1587" height="100" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/BRAC-300x100.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/BRAC-300x100.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/BRAC-768x256.png 768w, https://bestdelegate.com/wp-content/uploads/2016/02/BRAC-500x167.png 500w, https://bestdelegate.com/wp-content/uploads/2016/02/BRAC.png 1024w" width="300"></a><span data-dcnode-id="1585" instrument_node="">BRAC is a Bangladeshi-based NGO that has worked to alleviate poverty since 1972. It is considered by some to be the largest NGO in the world in terms of staff employed. BRAC works in Asia, Africa, and Haiti, and focuses on educating the “ultra-poor”, providing them with resources to start businesses, and giving them a support community to lift families out of poverty. BRAC has a strong focus on women and girls, and over 70% of their 100,000-person staff are women. BRAC works on economic development, education, public health, social development, and disaster relief.</span></span></p><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1578"><strong data-dcnode-id="1579"><a data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.care-international.org/"><span data-dcnode-id="1581" instrument_node="">CARE International</span></a></strong></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" style="font-weight: 400;"><a data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.care-international.org/"><img alt="Care" class="alignleft wp-image-32842 size-full" data-dcnode-id="1576" height="97" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Care.png&amp;raw" width="300"></a><span data-dcnode-id="1574" instrument_node="">CARE began following the Second World War when they sent “CARE Packages” to European communities to stem the rates of hunger in war-torn regions across Europe, however CARE now works globally. CARE International is a broad-ranging relief organization that focuses on several sectors to reduce global poverty. CARE works in over 90 countries, and operates over 900 projects annually. CARE’s main areas of work include HIV/AIDS, Food Security, Education, Gender Equality, Climate Change Mitigation, Water and Sanitation, and Economic Development in developing and least-developed countries.</span></span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1567"><strong data-dcnode-id="1568"><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.concernusa.org/"><span data-dcnode-id="1570" instrument_node="">Concern Worldwide</span></a></strong></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1562" style="font-weight: 400;"><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.concernusa.org/"><img alt="Concern" class="alignleft wp-image-32843 size-medium" data-dcnode-id="1565" height="105" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Concern-300x105.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/Concern-300x105.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/Concern-768x269.png 768w, https://bestdelegate.com/wp-content/uploads/2016/02/Concern-500x175.png 500w, https://bestdelegate.com/wp-content/uploads/2016/02/Concern.png 1854w" width="300"></a><span data-dcnode-id="1563" instrument_node="">Concern Worldwide is an Ireland-based development organization employing over 3,000 development professionals worldwide. Concern works on long-term poverty eradication in Asia, Africa, and the Caribbean through education and medical support. Concern also works on disaster relief globally, and forms part of the Humanitarian Accountability Partnership. Concern manages the “1000 days” campaign, seeking to improve nutrition for the 1000 days from the start of a pregnancy to the second birthday of a child. Concern’s three core areas of work are Climate Resilience, Health &amp; Nutrition, and Emergency Response.</span></span></p><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1554"><a data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oxfam.org/en"><span data-dcnode-id="1556" style="font-weight: 400;"><strong data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Oxfam International</span></strong><span data-dcnode-id="1557" instrument_node="">&nbsp;</span></span></a></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1549" style="font-weight: 400;"><a data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oxfam.org/en"><img alt="Oxfam" class="alignleft wp-image-32844 size-medium" data-dcnode-id="1552" height="115" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Oxfam-300x115.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/Oxfam-300x115.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/Oxfam-768x295.png 768w, https://bestdelegate.com/wp-content/uploads/2016/02/Oxfam-500x192.png 500w, https://bestdelegate.com/wp-content/uploads/2016/02/Oxfam.png 853w" width="300"></a><span data-dcnode-id="1550" instrument_node="">Oxfam International consists of 17 organizations within 90 countries, aiming to alleviate poverty around the world. Oxfam focuses on disaster management, inequality, and access to food. In immediate disaster situations, Oxfam assists with providing basic essentials such as hot meals, clean drinking water, and health care. In economic and social development, Oxfam provides business training and school supplies using donations. &nbsp;</span></span></p><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1540"><strong data-dcnode-id="1541"><a data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mercycorps.org/"><span data-dcnode-id="1543" instrument_node="">Mercy Corps</span></a></strong></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" style="font-weight: 400;"><a data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mercycorps.org/" rel="attachment wp-att-33033"><img alt="Mercy-Corps-Logo" class="alignleft size-medium wp-image-33033" data-dcnode-id="1538" height="106" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Mercy-Corps-Logo-300x106.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/Mercy-Corps-Logo-300x106.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/Mercy-Corps-Logo-768x271.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/Mercy-Corps-Logo-500x177.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/Mercy-Corps-Logo.jpg 1954w" width="300"></a><span data-dcnode-id="1536" instrument_node="">Mercy Corps is a global humanitarian aid organization of over 4,000 staff dedicated to providing emergency assistance, medical support, food relief, and economic development in post-conflict and disaster–stricken areas. One of the main forms of support provided by Mercy Corps is financial services to help guarantee to these other forms of support. To this day, Mercy Corps has supported over 16.7 million people with over $2 billion in financial services in over 40 different countries. </span></span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1529"><strong data-dcnode-id="1530"><a data-dcnode-id="1531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rescue.org/"><span data-dcnode-id="1532" instrument_node="">International Rescue Committee</span></a></strong></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1524" style="font-weight: 400;"><a data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rescue.org/" rel="attachment wp-att-33032"><img alt="International-Rescue-Committee-Jobs-kenya" class="alignleft size-medium wp-image-33032" data-dcnode-id="1527" height="78" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/International-Rescue-Committee-Jobs-kenya-300x78.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/International-Rescue-Committee-Jobs-kenya-300x78.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/International-Rescue-Committee-Jobs-kenya-768x200.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/International-Rescue-Committee-Jobs-kenya-500x130.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/International-Rescue-Committee-Jobs-kenya.jpg 960w" width="300"></a><span data-dcnode-id="1525" instrument_node="">The International Rescue Committee is a global humanitarian relief organization founded in 1933 at the request of Albert Einstein. The IRC provided emergency support to refugees and those displaced by war in over 40 countries. The IRCs main focuses are refugee resettlement, refugee camp support, and emergency aid to displaced persons. The IRC actively campaigns for the US to sign the UN Convention on the Rights of the Child. </span></span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1518"><strong data-dcnode-id="1519"><a data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.worldvision.org/"><span data-dcnode-id="1521" instrument_node="">World Vision International</span></a></strong></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1513" style="font-weight: 400;"><a data-dcnode-id="1515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.worldvision.org/" rel="attachment wp-att-33031"><img alt="WV_MASTER_LOGO-RGB" class="alignleft size-medium wp-image-33031" data-dcnode-id="1516" height="86" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/WV_MASTER_LOGO-RGB-300x86.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/WV_MASTER_LOGO-RGB-300x86.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/WV_MASTER_LOGO-RGB-768x221.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/WV_MASTER_LOGO-RGB-500x144.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/WV_MASTER_LOGO-RGB.jpg 945w" width="300"></a><span data-dcnode-id="1514" instrument_node="">World Vision is an international faith-based organization working in over 90 countries with annual revenues of nearly $3 Billion each year. Partnering with a variety of different UN organizations, World Vision works on emergency relief, education, health care, promotion of justice, and economic development. World Vision has over 40,000 employees globally. </span></span></p><span data-dcnode-id="1511" instrument_node="">
</span></div></div><span data-dcnode-id="1508" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="1455"><div class="su-spoiler-title" data-dcnode-id="1505" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1507"></span><span data-dcnode-id="1506" instrument_node="">SDG 2 - End hunger, achieve food security and improved nutrition and promote sustainable agriculture</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1456"><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1500"><strong data-dcnode-id="1501"><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneacrefund.org/"><span data-dcnode-id="1503" instrument_node="">One Acre Fund</span></a></strong></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1495" style="font-weight: 400;"><a data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneacrefund.org/"><img alt="One Acre Fund" class="alignleft wp-image-32845 size-medium" data-dcnode-id="1498" height="69" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/One-Acre-Fund-300x69.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/One-Acre-Fund-300x69.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/One-Acre-Fund-768x178.png 768w, https://bestdelegate.com/wp-content/uploads/2016/02/One-Acre-Fund-500x116.png 500w" width="300"></a><span data-dcnode-id="1496" instrument_node="">The One Acre Fund is an NGO that seeks to eradicate poverty and end hunger by empowering smallholder farms in developing countries. The One Acre Fund provides financing, seeds and supplies, training, and a network for farmers to develop their own farms to feed their families and their communities. The One Acre Fund currently works in Burundi, Rwanda, Tanzania, and Kenya, and helps more than 200,000 farm families each year. The One Acre Fund currently works with the US Agency for International Development (USAID) as well as the Bill and Melinda Gates Foundation and corporate partners.</span></span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1489"><strong data-dcnode-id="1490"><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.heifer.org/"><span data-dcnode-id="1492" instrument_node="">Heifer International</span></a></strong></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1483"><span data-dcnode-id="1484" style="font-weight: 400;"><a data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.heifer.org/"><img alt="Heifer" class="alignleft wp-image-32846 size-medium" data-dcnode-id="1487" height="140" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Heifer-300x140.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/Heifer-300x140.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/Heifer-500x234.png 500w, https://bestdelegate.com/wp-content/uploads/2016/02/Heifer.png 685w" width="300"></a><span data-dcnode-id="1485" instrument_node="">Heifer International seeks to eradicate poverty and hunger by sending livestock to families in need in developing countries and giving training in agriculture and animal husbandry. These animals are meant to provide self-sufficiency, and any offspring from the animals provided are to be shared with others in the community. Heifer International has distributed animals to more than 10 million families in over 125 countries. Heifer International holds “passing on the gift” as a core goal of their programs, encouraging families to become donors themselves through the products or offspring of the animals they are granted.</span></span></p><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1478"><strong data-dcnode-id="1479"><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gainhealth.org/"><span data-dcnode-id="1481" instrument_node="">Global Alliance for Improved Nutrition</span></a></strong></p><span data-dcnode-id="1477" instrument_node="">
</span><a data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gainhealth.org/"><img alt="GAIN-logo medium" class="alignleft wp-image-32847 size-medium" data-dcnode-id="1476" height="110" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/GAIN-300x110.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/GAIN-300x110.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/GAIN.jpg 446w" width="300"></a><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1472" style="font-weight: 400;"><span data-dcnode-id="1473" instrument_node="">The Global Alliance for Improved Nutrition (GAIN) was developed at the 2002 Special Session of the UN General Assembly on Children to address global hunger and malnutrition. GAIN works globally to guarantee proper nutrition for people living in poverty by working on food fortification (increasing the vitamin yields in foods), maternal and infant nutrition (through nutrition supplements), and assisting communities to develop more nutritious crops on their farms. GAIN has led to a 30% reduction in anemia of childbearing age women in China, a 5% reduction in Vitamin A deficiency for children in Nigeria, and many other impacts acro</span></span><span data-dcnode-id="1470" style="font-weight: 400;"><span data-dcnode-id="1471" instrument_node="">ss Latin America, Africa, and Southeast Asia.</span></span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1464"><strong data-dcnode-id="1465"><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kickstart.org/"><span data-dcnode-id="1467" instrument_node="">Kickstart International</span></a></strong></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1459" style="font-weight: 400;"><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kickstart.org/"><img alt="Kickstart" class="alignleft wp-image-32839 size-medium" data-dcnode-id="1462" height="92" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Kickstart-300x92.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/Kickstart-300x92.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/Kickstart.jpg 392w" width="300"></a><span data-dcnode-id="1460" instrument_node="">Kickstart International is a non-profit that provides manually-powered water pumps for irrigation in Sub-Saharan Africa. Kickstart seeks to empower farms to make more money and become self sufficient by giving them year-round access to water, rather than seasonal subsistence farming. Kickstart has sold more than 250,000 pumps for less than $200 each. Kickstart has received awards for their work with women and girls in rural areas from the U.S. State Department, and is a common case-study for enterprise-model NGOs in developing countries.</span></span><span data-dcnode-id="1458" instrument_node=""> </span></p></div></div><span data-dcnode-id="1454" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="1313"><div class="su-spoiler-title" data-dcnode-id="1451" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1453"></span><span data-dcnode-id="1452" instrument_node="">SDG 3 - Ensure healthy lives and promote well-being for all at all ages</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1314"><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1446"><strong data-dcnode-id="1447"><a data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/en/who-we-are/movement"><span data-dcnode-id="1449" instrument_node="">International Red Cross and Red Crescent Movement</span></a></strong></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" style="font-weight: 400;"><a data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icrc.org/en/who-we-are/movement" rel="attachment wp-att-33029"><img alt="ICRC-Red-Cross-Geneva" class="alignleft size-medium wp-image-33029" data-dcnode-id="1444" height="112" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/ICRC-Red-Cross-Geneva-300x112.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/ICRC-Red-Cross-Geneva-300x112.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/ICRC-Red-Cross-Geneva-500x186.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/ICRC-Red-Cross-Geneva.jpg 507w" width="300"></a><span data-dcnode-id="1442" instrument_node="">The International Red Cross and Red Crescent Movement is by most standards the largest international NGO, comprising 97 million worldwide volunteers, staff, and organization members worldwide. The International Red Cross and Red Crescent Movement is the parent organization of Red Cross and Red Crescent Federations worldwide, initially founded in 1863 as the International Committee of the Red Cross, and as won the Nobel Peace Prize on three separate occasions. With nearly $4 Billion in revenue each year, the Red Cross has the ability to operate in nearly every country worldwide. The ICRC provides emergency medical support, health services, food aid, and myriad other humanitarian relief activities worldwide. </span></span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1435"><strong data-dcnode-id="1436"><a data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.doctorswithoutborders.org/"><span data-dcnode-id="1438" instrument_node="">Doctors Without Borders</span></a></strong></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1430"><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.doctorswithoutborders.org/"><img alt="logo-homepage" class="alignleft wp-image-32860 size-medium" data-dcnode-id="1433" height="114" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/logo-homepage-e1456335222758-300x114.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/logo-homepage-e1456335222758-300x114.png 300w, https://bestdelegate.com/wp-content/uploads/2010/08/logo-homepage-e1456335222758-500x190.png 500w, https://bestdelegate.com/wp-content/uploads/2010/08/logo-homepage-e1456335222758.png 553w" width="300"></a><span data-dcnode-id="1431" instrument_node="">Doctors Without Borders/Médecins Sans Frontières (MSF), is a worldwide medical humanitarian organization that has reached over 80 countries in its efforts to provide aid to those struggling to survive when facing epidemics, hunger, displacement and natural disasters. In 1999, MSF won the Nobel Peace Prize due to its dedication to helping those who require medical assistance most, regardless of political and religious affiliations. MSF generates 90% of it’s funding from private donors, letting the organization utilize this money without any influence. Due to MSF’s successes, the organization is now capable of ensuring the transportation of required equipment to any area globally in under 24 hours.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1425"><strong data-dcnode-id="1426"><a data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pih.org/"><span data-dcnode-id="1428" instrument_node="">Partners in Health</span></a></strong></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1420"><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pih.org/" rel="attachment wp-att-32858"><img alt="Partners_in_Health_logo-e1413858181785" class="alignleft size-medium wp-image-32858" data-dcnode-id="1423" height="96" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/Partners_in_Health_logo-e1413858181785-300x96.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/Partners_in_Health_logo-e1413858181785-300x96.png 300w, https://bestdelegate.com/wp-content/uploads/2010/08/Partners_in_Health_logo-e1413858181785.png 451w" width="300"></a><span data-dcnode-id="1421" instrument_node="">Partners in Health strives to provide health care in areas where either minimal or no aid is available to poor patients. PIH works closely with the local government of nations and their medical and academic institutions for effective results in the following four stages: arriving in the area&nbsp;and discerning the amount of aid required, making personal house visits to patients to provide medication and medical advise, creating&nbsp;a healthcare system in conjunction with local institutions, and establishing a long term plan to assess the progress of the area. &nbsp;PIH is currently working&nbsp;in the following countries and communities: Haiti, Rwanda, Lesotho, Malawi, Mexico, Russia, Peru, the U.S. Navajo Nation, Liberia and Sierra Leone.</span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1415"><strong data-dcnode-id="1416"><a data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.clintonhealthaccess.org/"><span data-dcnode-id="1418" instrument_node="">CHAI</span></a></strong></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1410"><a data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.clintonhealthaccess.org/" rel="attachment wp-att-32857"><img alt="CHAI Logo" class="alignleft size-medium wp-image-32857" data-dcnode-id="1413" height="129" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/CHAI-Logo-300x129.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/CHAI-Logo-300x129.jpg 300w, https://bestdelegate.com/wp-content/uploads/2010/08/CHAI-Logo-768x329.jpg 768w, https://bestdelegate.com/wp-content/uploads/2010/08/CHAI-Logo-500x214.jpg 500w, https://bestdelegate.com/wp-content/uploads/2010/08/CHAI-Logo.jpg 1014w" width="300"></a><span data-dcnode-id="1411" instrument_node="">The Clinton Health Access Initiative (CHAI) is determined to salvage the lives of the individuals living with HIV/AIDs in the developing countries. The primary approach CHAI has taken is to provide more affordable antiretroviral treatment to individuals win developing countries. Ever since the creation of this organization in 2002, the Clinton Health Access Initiative&nbsp;has made antiretroviral treatment&nbsp;accessible to over 4 million patients globally. CHAI is currently expanding efforts to make viral load testing for those affected by HIV in the developing nations more accessible, thus helping to identify and stop the spread of HIV from infected patients.</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1405"><strong data-dcnode-id="1406"><a data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//amref.org/"><span data-dcnode-id="1408" instrument_node="">Amref</span></a></strong></p><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1400"><a data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//amref.org/" rel="attachment wp-att-32856"><img alt="AMref_Logo" class="alignleft size-medium wp-image-32856" data-dcnode-id="1403" height="163" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/AMref_Logo-300x163.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/AMref_Logo-300x163.jpg 300w, https://bestdelegate.com/wp-content/uploads/2010/08/AMref_Logo-768x418.jpg 768w, https://bestdelegate.com/wp-content/uploads/2010/08/AMref_Logo-500x272.jpg 500w, https://bestdelegate.com/wp-content/uploads/2010/08/AMref_Logo.jpg 1024w" width="300"></a><span data-dcnode-id="1401" instrument_node="">Amref serves as an organization with the priority of training the health workers of Africa in the medical areas which affect the continent to the greatest extent. 90% of Amref staff is African, contributing to local economies and carrying knowledge of the local traditions and challenges faced in each of their communities. Amref currently operates 160 programs in 30 African countries targeting the need to train health workers to address to following six health challenges: Maternal Health, Child Health, Infectious Diseases, Surgical Outreach, Water and Sanitation, and Health&nbsp;Worker Training.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1392"><strong data-dcnode-id="1393"><a data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.savethechildren.org/"><span data-dcnode-id="1395" instrument_node="">Save The Children</span></a></strong></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1387"><a data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.savethechildren.org/" rel="attachment wp-att-32861"><img alt="Save_The_Children" class="alignleft wp-image-32861 size-medium" data-dcnode-id="1390" height="68" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/Save_The_Children-e1456335346193-300x68.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/Save_The_Children-e1456335346193-300x68.jpg 300w, https://bestdelegate.com/wp-content/uploads/2010/08/Save_The_Children-e1456335346193-768x175.jpg 768w, https://bestdelegate.com/wp-content/uploads/2010/08/Save_The_Children-e1456335346193-500x114.jpg 500w, https://bestdelegate.com/wp-content/uploads/2010/08/Save_The_Children-e1456335346193.jpg 1800w" width="300"></a><span data-dcnode-id="1388" instrument_node="">Established in 1919 as a fund to provide food for children facing starvation post-WWI, Save the Children has grown to dedicate its efforts to all dangers children face around the world. Currently, Save The Children works in 120 countries and has been&nbsp;able to directly reach 55 million children through their efforts. Save The Children is dedicated towards creating a world where all children are ensured the rights to survival, protection, development and participation. While offering on-the-ground aid in times of emergencies, Save the Children also works to establish long term plans focused around restoring the lives of any children affected by natural disasters and war.</span></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1382"><strong data-dcnode-id="1383"><a data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.handicap-international.us/"><span data-dcnode-id="1385" instrument_node="">Handicap International</span></a></strong></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1377"><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.handicap-international.us/" rel="attachment wp-att-32855"><img alt="logo-handicap-international-lg" class="alignleft size-medium wp-image-32855" data-dcnode-id="1380" height="109" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/logo-handicap-international-lg-300x109.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/logo-handicap-international-lg-300x109.png 300w, https://bestdelegate.com/wp-content/uploads/2010/08/logo-handicap-international-lg.png 500w" width="300"></a><span data-dcnode-id="1378" instrument_node="">Handicap International, the co-recipient of the 1997 Nobel Peace Prize, is an organization dedicated to aiding victims of mine-related accidents and violence. Handicap International works in areas with overwhelming poverty and vulnerable populations due to the effects of these mine-related accidents to clear war debris and provide education to prevent further accidents. Many of these victims have disabilities and Handicap International works to create health and rehabilitation programs to integrate these affected individuals back into society. By&nbsp;providing education, reform programs and case-by-case care, Handicap International aims to protect the rights of individuals and improve&nbsp;their living conditions.</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1372"><strong data-dcnode-id="1373"><a data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.riders.org/"><span data-dcnode-id="1375" instrument_node="">Riders for Health</span></a></strong></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1368"><img alt="logo" class="alignleft wp-image-32854" data-dcnode-id="1370" height="113" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/logo-e1456335464553.png&amp;raw" width="301"><span data-dcnode-id="1369" instrument_node="">Riders for Health is a group focused on the need to acquire reliable transport throughout the African continent to be able to transport doctors and medicines efficiently. Without the ability to transport aid, the focus of many groups would be concentrated in high-population areas, which is why Riders for Health specializes in managing and maintaining vehicles for efficient transportation in sub-Saharan Africa. The management of four-wheel vehicles in conjunction with partnerships with the Ministries of Health, international and African-based NGOs and private sector organizations, Riders for Health delivers crucial health care to communities in Africa in a reliable and effective manner. Currently working in seven nations across Africa, Riders for Health has upgraded health care access to over 21 million people through the provision of 4-wheel vehicles and bicycles to health care workers.</span></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1358"><strong data-dcnode-id="1364"><a data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hki.org/"><span data-dcnode-id="1366" instrument_node="">Helen Keller International</span></a></strong><br data-dcnode-id="1363"><span data-dcnode-id="1362" instrument_node="">
</span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hki.org/" rel="attachment wp-att-32853"><img alt="" class="alignleft wp-image-33014 size-medium" data-dcnode-id="1361" height="60" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/logo-300x60.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/logo-300x60.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/logo-500x100.png 500w, https://bestdelegate.com/wp-content/uploads/2016/02/logo.png 550w" width="300"></a><span data-dcnode-id="1359" instrument_node="">Helen Keller International aims to prevent blindness and malnutrition through the enhancement of research and education worldwide. Helen Keller International relies on research conducted towards both blindness and malnutrition to advance medical solutions and access to these solutions for individuals in poor communities seeking access to these medicines. Helen Keller International also works to provide care for those with eye diseases to prevent vision loss. With 180 programs in 21 African and Asian nations, Helen Keller International collaborates with local groups and national organizations to create programs catered to the needs of different communities.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1353"><strong data-dcnode-id="1354"><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hollows.org/au/home"><span data-dcnode-id="1356" instrument_node="">Fred Hollows Foundation</span></a></strong></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1348"><a data-dcnode-id="1350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hollows.org/au/home" rel="attachment wp-att-32852"><img alt="fred-hollows-foundation_new" class="alignleft size-medium wp-image-32852" data-dcnode-id="1351" height="69" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/fred-hollows-foundation_new-300x69.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/fred-hollows-foundation_new-300x69.jpg 300w, https://bestdelegate.com/wp-content/uploads/2010/08/fred-hollows-foundation_new-500x114.jpg 500w, https://bestdelegate.com/wp-content/uploads/2010/08/fred-hollows-foundation_new.jpg 600w" width="300"></a><span data-dcnode-id="1349" instrument_node="">The Fred Hollows Foundation strives to prevent avoidable blindness in local communities. Many people who are blind in rural communities are blind due to the lack of access to quality healthcare or nutrition and the Fred Hollows Foundation helps provide individuals with this necessary care. The foundation also works to empower communities by training local nurses and doctors how to recognize, diagnose and treat eye problems which lead to blindness. Working in 25 countries, the FHF has prevented over 2 million people from losing partial or full eyesight.</span></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1343"><strong data-dcnode-id="1344"><a data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.saudecrianca.org.br/en/"><span data-dcnode-id="1346" instrument_node="">Brazil Child Health</span></a></strong></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1338"><a data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.saudecrianca.org.br/en/" rel="attachment wp-att-32851"><img alt="" class="alignleft wp-image-33015 size-medium" data-dcnode-id="1341" height="104" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/37fcef4-300x104.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/37fcef4-300x104.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/37fcef4-500x173.png 500w, https://bestdelegate.com/wp-content/uploads/2016/02/37fcef4.png 646w" width="300"></a><span data-dcnode-id="1339" instrument_node="">Founded in 1991, the Brazil Child Health Organization aims to encourage health awareness in Brazilian families with children who suffer chronic diseases while living in poverty. To promote the well-being of these children, Brazil Child Health focuses on education of families, access to medical diagnoses, and promotion of stable, health households.&nbsp;BCH bases its work on&nbsp;the Family Action Plan which outlines the actions&nbsp;families in poverty should take when a member of their family is suffering with chronic or life-threatening diseases.</span></p><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1332"><strong data-dcnode-id="1333"><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gavi.org/"><span data-dcnode-id="1336" instrument_node="">Gavi</span></a><span data-dcnode-id="1334" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1327"><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gavi.org/" rel="attachment wp-att-32847"><img alt="" class="alignleft size-medium wp-image-32847" data-dcnode-id="1330" height="110" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/GAIN-300x110.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/GAIN-300x110.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/GAIN.jpg 446w" width="300"></a><span data-dcnode-id="1328" instrument_node="">Founded in 2000, Gavi is an International Vaccine Alliance which partners the public and private sector to improve&nbsp;access to vaccines for individuals in developing countries. With the mission of creating equal access to necessary vaccines, Gavi funds vaccine production which leads to the drop in price in developing nations where individuals may be priced out of access to these vaccines otherwise. Gavi works towards co-financing policies which require nations to attribute money to the productions&nbsp;of more vaccines, putting pressure on governments&nbsp;to provide better care for their&nbsp;people. Since 2000, Gavi has provided vaccinations for&nbsp;over 500 million children and has prevented over 7 million deaths.</span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1322"><strong data-dcnode-id="1323"><a data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.psi.org/"><span data-dcnode-id="1325" instrument_node="">Population Services International</span></a></strong></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1315"><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.psi.org/" rel="attachment wp-att-32862"><img alt="logo design 1 v2" class="alignleft size-medium wp-image-32862" data-dcnode-id="1320" height="187" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/PSI-English-Logo-COLOR-1-300x187.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/PSI-English-Logo-COLOR-1-300x187.jpg 300w, https://bestdelegate.com/wp-content/uploads/2010/08/PSI-English-Logo-COLOR-1-500x312.jpg 500w, https://bestdelegate.com/wp-content/uploads/2010/08/PSI-English-Logo-COLOR-1.jpg 722w" width="300"></a><span data-dcnode-id="1318" instrument_node="">Population Services International (PSI) focuses on improving&nbsp;the health of individuals in developing nations. PSI stands firm with the belief that health services are only effective when communication is applied in communities, to ensure the community-wide acceptance of health efforts. PSI works in conjunction with local governments, ministries and local organizations in the following health challenges facing developing countries: lack of family planning, HIV and AIDS, barriers to maternal health, and the greatest threats to children under five, including malaria, diarrhea, pneumonia and malnutrition. PSI has helped prevent over 5,000,000&nbsp;unintended pregnancies and save over 270,000&nbsp;lives due to efforts made to address diseases like malaria, diarrhea and pneumonia which primarily target children.</span><br data-dcnode-id="1317"><span data-dcnode-id="1316" instrument_node="">
</span></p></div></div><span data-dcnode-id="1312" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="1216"><div class="su-spoiler-title" data-dcnode-id="1309" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1311"></span><span data-dcnode-id="1310" instrument_node="">SDG 4 - Ensure inclusive and equitable quality education and promote lifelong learning opportunities for all</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1217"><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1304"><strong data-dcnode-id="1305"><a data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikimediafoundation.org/"><span data-dcnode-id="1307" instrument_node="">Wikimedia Foundation</span></a></strong></p><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" style="font-weight: 400;"><a data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikimediafoundation.org/" rel="attachment wp-att-32871"><img alt="wikimedia" class="alignleft size-medium wp-image-32871" data-dcnode-id="1302" height="126" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/wikimedia-300x126.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/wikimedia-300x126.png 300w, https://bestdelegate.com/wp-content/uploads/2010/08/wikimedia-768x322.png 768w, https://bestdelegate.com/wp-content/uploads/2010/08/wikimedia-500x210.png 500w, https://bestdelegate.com/wp-content/uploads/2010/08/wikimedia.png 817w" width="300"></a><span data-dcnode-id="1300" instrument_node="">The Wikimedia Foundation is an organization dedicated to providing the public with free, educational content through their platform Wikipedia and many other sources. &nbsp;Wikimedia strives to become one of the world’s largest web databases and use its local influence to create catered community programs and bring free access to information previously limited to those with access to extensive libraries or the finances to buy the information that the foundation now shares for free. In 2015, The Global Journal named the Wikimedia Foundation the #1 Education NGO globally.&nbsp;The Foundation does not utilize advertisements as a source of funding and is funded solely off of donations they receive worldwide, which total in excess of $75 Million each year.&nbsp;</span></span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1291"><a data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.roomtoread.org/"><span data-dcnode-id="1293" style="font-weight: 400;"><strong data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Room to Read</span></strong><span data-dcnode-id="1294" instrument_node=""> </span></span></a></p><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" style="font-weight: 400;"><a data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.roomtoread.org/" rel="attachment wp-att-32873"><img alt="download" class="alignleft wp-image-32873" data-dcnode-id="1289" height="193" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/download.png&amp;raw" width="300"></a><span data-dcnode-id="1287" instrument_node="">Room to Read is a non-governmental organization (NGO) that aims to improve child literacy and gender equality in global education systems. Room to Read&nbsp;operates in Europe, &nbsp;Asia, and Africa to assist&nbsp;elementary school children with developing literacy skills. In addition, Room to Read provides students with donated books and sets up libraries in communities where there was previously a lack of access to sources of literature.&nbsp;Room to Read has established more than 17,000 libraries and 1930 schools&nbsp;as part of their goal to lift millions out of poverty.&nbsp;</span></span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1274"><strong data-dcnode-id="1275"><a data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pratham.org/"><span data-dcnode-id="1277" instrument_node="">Pratham</span></a></strong></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" style="font-weight: 400;"><a data-dcnode-id="1271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pratham.org/" rel="attachment wp-att-32875"><img alt="pratham" class="alignleft wp-image-32875" data-dcnode-id="1272" height="173" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/pratham-300x173.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/pratham-300x173.jpg 300w, https://bestdelegate.com/wp-content/uploads/2010/08/pratham-500x288.jpg 500w, https://bestdelegate.com/wp-content/uploads/2010/08/pratham.jpg 660w" width="300"></a><span data-dcnode-id="1270" instrument_node="">With the goal of providing universal education, Pratham has grown to be the largest education NGO in India, with programs in over 21 Indian states. &nbsp;In order to create better education-focused solutions to poverty, Pratham established “The Annual Status of Education Report” to assess the problems of education in developing nations. Pratham places the establishment of preschool education first, seeing that as&nbsp;the first step to exposing more children to education earlier, and keep them in school throughout their childhoods. Pratham works to bring the thousands of children it helps a year from basic familiarity&nbsp;they have regarding issues in their everyday lives to a deeper understanding of the causes of and solutions to these challenges. For&nbsp;Pratham’s successes in expanding education, the organization&nbsp;has been awarded the&nbsp;Global Development Network Award. </span></span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1263"><strong data-dcnode-id="1264"><a data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.escuelanueva.org/"><span data-dcnode-id="1266" instrument_node="">Fundación Escuela Nueva</span></a></strong></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1258" style="font-weight: 400;"><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.escuelanueva.org/" rel="attachment wp-att-32876"><img alt="logo_es" class="alignleft size-medium wp-image-32876" data-dcnode-id="1261" height="82" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/logo_es-300x82.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/logo_es-300x82.png 300w, https://bestdelegate.com/wp-content/uploads/2010/08/logo_es.png 350w" width="300"></a><span data-dcnode-id="1259" instrument_node="">Fundacion Escuela Nueva is a Colombian NGO providing quality education to underprivileged children. Since 1987, the NGO has maintained various schools known as “Escuelas Nuevas” &nbsp;to battle poverty. Primarily operating in South America and Asia, Fundacion Escuela Nueva assesses the cultural context of each potential project while creating an </span></span><i data-dcnode-id="1255"><span data-dcnode-id="1256" style="font-weight: 400;"><span data-dcnode-id="1257" instrument_node="">Escuela Nueva &nbsp;</span></span></i><span data-dcnode-id="1253" style="font-weight: 400;"><span data-dcnode-id="1254" instrument_node="">that provides the educational needs of that specific community, leveraging local knowledge and traditions combined with an international curriculum. &nbsp;&nbsp;</span></span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1247"><strong data-dcnode-id="1248"><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.planetread.org/"><span data-dcnode-id="1250" instrument_node="">Planet Read</span></a></strong></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" style="font-weight: 400;"><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.planetread.org/" rel="attachment wp-att-32878"><img alt="logo" class="alignleft wp-image-32878" data-dcnode-id="1245" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/logo-e1456622369381.gif&amp;raw" width="300"></a><span data-dcnode-id="1243" instrument_node="">Planet Read, an organization based in Canada, the USA and India, works towards the goal of a planet in which everyone can read and have access to reading opportunities. Planet Read utilizes mass media and information technologies to spread simple, innovative and effective solutions. Through their Same Language Subtitling programs, Planet Read helps millions of Indian children and adults learn and practice reading by allowing them to see the words they’re hearing in their TV shows, but spelled out in front of them. This, combined with specific mass-media programs to address the gender gap in reading, seeks to bring literacy to the over 200 million illiterate individuals across India.&nbsp;</span></span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1236"><strong data-dcnode-id="1237"><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.injazalarab.org/"><span data-dcnode-id="1239" instrument_node="">Injaz al-Arab</span></a></strong></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" style="font-weight: 400;"><a data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.injazalarab.org/" rel="attachment wp-att-32879"><img alt="INJAZ-Al-Arab-logo-large-qatarisbooming.com_" class="alignleft size-medium wp-image-32879" data-dcnode-id="1234" height="118" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/INJAZ-Al-Arab-logo-large-qatarisbooming.com_-300x118.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/INJAZ-Al-Arab-logo-large-qatarisbooming.com_-300x118.jpg 300w, https://bestdelegate.com/wp-content/uploads/2010/08/INJAZ-Al-Arab-logo-large-qatarisbooming.com_-500x197.jpg 500w, https://bestdelegate.com/wp-content/uploads/2010/08/INJAZ-Al-Arab-logo-large-qatarisbooming.com_.jpg 600w" width="300"></a><span data-dcnode-id="1232" instrument_node="">Injaz al-Arab is an organization based off of the belief that the key to curbing Arab youth unemployment is through training and the establishment of connections with businesses. By pairing&nbsp;young entrepreneurs with business leaders, Arab youth experienced hands-on training to address the social and economic challenges youth face in their communities. Injaz al-Arab has reached over 2 million individuals, empowering them to take control of their future by strengthening their workforce readiness, financial leadership and entrepreneurship.</span></span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1225"><strong data-dcnode-id="1226"><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.barefootcollege.org/"><span data-dcnode-id="1228" instrument_node="">Barefoot College</span></a></strong></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1220" style="font-weight: 400;"><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.barefootcollege.org/" rel="attachment wp-att-32872"><img alt="Barefoot-College" class="alignleft size-full wp-image-32872" data-dcnode-id="1223" height="212" sizes="(max-width: 212px) 100vw, 212px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/Barefoot-College.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/Barefoot-College.png 212w, https://bestdelegate.com/wp-content/uploads/2010/08/Barefoot-College-150x150.png 150w" width="212"></a><span data-dcnode-id="1221" instrument_node="">In 1965, Barefoot College was created to aid the poor, neglected and marginalized populations globally. Creating rural craft programs, Barefoot College allows workers to compete in markets and learn tactics that will aid them in pushing out of of their current state of poverty. Providing schooling paired with local traditional knowledge in their&nbsp;rural schools, Barefoot College spreads knowledge to alleviate socio-economic challenges&nbsp;at a local level. Barefoot college’s sustainable anti-poverty solutions include solar electrification, clean water, childhood education, livelihood development, and activism. Barefoot college focuses on LDCs and seeks sustainable and gender-empowering solutions to all the problems introduced in their program communities.&nbsp;</span></span></p><span data-dcnode-id="1218" instrument_node="">
</span></div></div><span data-dcnode-id="1215" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="1144"><div class="su-spoiler-title" data-dcnode-id="1212" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1214"></span><span data-dcnode-id="1213" instrument_node="">SDG 5 - Achieve gender equality and empower all women and girls</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1145"><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1207"><strong data-dcnode-id="1208"><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fawe.org/"><span data-dcnode-id="1210" instrument_node="">Forum for African Women Educationalists (FAWE)</span></a></strong></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" style="font-weight: 400;"><a data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fawe.org/" rel="attachment wp-att-32882"><img alt="FAWE_LOGO" class="alignleft size-medium wp-image-32882" data-dcnode-id="1205" height="66" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/FAWE_LOGO-300x66.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/FAWE_LOGO-300x66.png 300w, https://bestdelegate.com/wp-content/uploads/2010/08/FAWE_LOGO.png 482w" width="300"></a><span data-dcnode-id="1203" instrument_node="">The Forum for African Women Educationalists (FAWE) is working to eliminate gender disparities seen in the education systems within Africa. FAWE urges governments and organizations to work on legislation and policies towards equal treatment of girls and boys in school systems. With the belief that better educated girls lead to more stable communities because of their abilities play an active role in society, FAWE uses the following principles to work towards their mission: policy and community advocacy, interventions in communities, and mainstreaming of the issues to raise public awareness. FAWE is currently working in conjunction with communities, schools, ministries and other NGO’s in 33 African nations to advance the education of girls and women.</span></span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1196"><strong data-dcnode-id="1197"><a data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mariestopes.org/"><span data-dcnode-id="1199" instrument_node="">Marie Stopes International</span></a></strong></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" style="font-weight: 400;"><a data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mariestopes.org/"><img alt="Marie_Stopes_International_logo" class="alignleft wp-image-32880 size-medium" data-dcnode-id="1194" height="108" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/Marie_Stopes_International_logo-300x108.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/Marie_Stopes_International_logo-300x108.png 300w, https://bestdelegate.com/wp-content/uploads/2010/08/Marie_Stopes_International_logo.png 360w" width="300"></a><span data-dcnode-id="1192" instrument_node="">Marie Stopes International provides services for family planning and reproductive health for women and families in extreme poverty or in dangerous conditions. This NGO was founded in 1976 and named after Marie Stopes, a well-known reproductive rights advocate in the UK. &nbsp;Marie Stopes International has operations in 37 countries, making it one of the world’s most prominent family planning organizations. Using health centres and clinical outreach teams, Marie Stopes International provides safe abortions, HIV/STI treatment and prevention, family planning services, and maternal health services. This NGO also emphasizes advocacy for reproductive and maternal health, as well as partnerships with healthcare providers, the government, and other NGOs.</span></span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1185"><strong data-dcnode-id="1186"><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ippf.org/"><span data-dcnode-id="1188" instrument_node="">International Planned Parenthood Federation</span></a></strong></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1180" style="font-weight: 400;"><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ippf.org/" rel="attachment wp-att-32881"><img alt="ippf" class="alignleft size-medium wp-image-32881" data-dcnode-id="1183" height="95" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/ippf-300x95.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/ippf-300x95.png 300w, https://bestdelegate.com/wp-content/uploads/2010/08/ippf.png 380w" width="300"></a><span data-dcnode-id="1181" instrument_node="">In response to the hostility and imprisonment of women who fought for the right to control their fertility, the International Planned Parenthood Federation(IPPF) was found at the 3rd International Conference of Planned Parenthood in 1952. Since its establishment, this organization is working in 172 countries and has fulfilled over 65,000 service projects. As one of the most profound advocates for reproductive health information and the access to such services, the IPPF has distributed over 89 million sexual and reproductive health services. the IPPF recognizes access to such services as a fundamental human right and calls for the need to respect parenthood as a natural and precious part of one’s life determined solely by an individual’s choices.</span></span></p><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1174"><strong data-dcnode-id="1175"><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.akilahinstitute.org/"><span data-dcnode-id="1177" instrument_node="">Akilah Institute for Women</span></a></strong></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" style="font-weight: 400;"><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.akilahinstitute.org/" rel="attachment wp-att-32883"><img alt="Screen-Shot-2015-09-08-at-4.57.45-PM4" class="alignleft wp-image-32883 size-medium" data-dcnode-id="1172" height="114" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/Screen-Shot-2015-09-08-at-4.57.45-PM4-e1456419280771-300x114.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/Screen-Shot-2015-09-08-at-4.57.45-PM4-e1456419280771-300x114.png 300w, https://bestdelegate.com/wp-content/uploads/2010/08/Screen-Shot-2015-09-08-at-4.57.45-PM4-e1456419280771-768x292.png 768w, https://bestdelegate.com/wp-content/uploads/2010/08/Screen-Shot-2015-09-08-at-4.57.45-PM4-e1456419280771-500x190.png 500w, https://bestdelegate.com/wp-content/uploads/2010/08/Screen-Shot-2015-09-08-at-4.57.45-PM4-e1456419280771.png 925w" width="300"></a><span data-dcnode-id="1170" instrument_node="">The Akilah Institute for Women, a renowned college for women in Africa, strives to provide women an education designed to aid women in succeeding in leadership roles in business. Since the establishment of Akilah’s first campus in 2010, 90% of graduates have found employment within six months of graduation. As of&nbsp;the 5th anniversary since the institute’s creation, Akilah students earn incomes 13% higher than the national median and have a 100% internship placement rate for graduates.</span></span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1163"><strong data-dcnode-id="1164"><a data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.madre.org/"><span data-dcnode-id="1166" instrument_node="">Madre</span></a></strong></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" style="font-weight: 400;"><a data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.madre.org/" rel="attachment wp-att-32884"><img alt="1422281528_Horizontal MADRE Logo" class="alignleft size-medium wp-image-32884" data-dcnode-id="1161" height="93" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2010/08/1422281528_Horizontal-MADRE-Logo-300x93.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2010/08/1422281528_Horizontal-MADRE-Logo-300x93.jpg 300w, https://bestdelegate.com/wp-content/uploads/2010/08/1422281528_Horizontal-MADRE-Logo-768x239.jpg 768w, https://bestdelegate.com/wp-content/uploads/2010/08/1422281528_Horizontal-MADRE-Logo-500x156.jpg 500w, https://bestdelegate.com/wp-content/uploads/2010/08/1422281528_Horizontal-MADRE-Logo.jpg 1349w" width="300"></a><span data-dcnode-id="1159" instrument_node="">Madre is an international organization dedicated to standing up to injustices women face through organized and grassroots efforts. Madre partners with various organizations around the globe to create programs catered to the inequality women face in these nations while also providing women in the communities with food, water and health care. While creating initiatives in different nations, Madre also provides emergency and disaster relief to women. Madre’s primary focus is providing all women with basic rights and access to resources&nbsp;through all of the different areas of injustice Madre addresses. </span></span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1152"><strong data-dcnode-id="1153"><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.equalitynow.org/"><span data-dcnode-id="1155" instrument_node="">Equality Now</span></a></strong></p><span data-dcnode-id="1151" instrument_node="">
