</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" style="font-weight: 400;"><img alt="equality now" class="alignleft size-medium wp-image-32886" data-dcnode-id="1150" height="61" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/equality-now-300x61.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/equality-now-300x61.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/equality-now-500x102.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/equality-now.jpg 640w" width="300"><span data-dcnode-id="1149" instrument_node="">Equality Now, founded in 1992, is an organization which advocates for the respect and promotion of women and girls’ rights. Equality Now has documented the violence and gender discrimination women have faced across different countries and continents to spread the message of action worldwide. For effective results in local areas, Equality Now creates partnerships and coalitions with women’s rights groups&nbsp;in local communities to advocate for local, provincial, and national policy changes.&nbsp;</span></span></p><span data-dcnode-id="1146" instrument_node="">
</span></div></div><span data-dcnode-id="1143" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="1068"><div class="su-spoiler-title" data-dcnode-id="1140" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1142"></span><span data-dcnode-id="1141" instrument_node="">SDG 6 - Ensure availability and sustainable management of water and sanitation for all</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="1069"><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1135"><strong data-dcnode-id="1136"><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.waterforpeople.org/"><span data-dcnode-id="1138" instrument_node="">Water For People</span></a></strong></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" style="font-weight: 400;"><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.waterforpeople.org/" rel="attachment wp-att-32890"><img alt="" class="alignleft wp-image-33016" data-dcnode-id="1133" height="128" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/WFPlogo.png&amp;raw" width="299"></a><span data-dcnode-id="1131" instrument_node="">Water For People works across Latin America, Africa, and Asia to ensure long-term access to clean water and sanitation. Water For People is unique in that it focuses on specific towns and districts and works to provide access to water for all the people, businesses, and community resources in that area, while training local staff to continue maintenance to ensure the access to water will last for generations. Water For People also works to guarantee sanitation to some of the 2.4 billion people worldwide without access to sanitation services through their programs, and works closely with the local governments to carry out their work. &nbsp;</span></span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1123"><strong data-dcnode-id="1124"><a data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.projectwet.org/"><br data-dcnode-id="1127"><span data-dcnode-id="1126" instrument_node="">
Project WET Foundation</span></a></strong></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" style="font-weight: 400;"><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.projectwet.org/" rel="attachment wp-att-32891"><img alt="projwet-300x180" class="alignleft size-medium wp-image-32891" data-dcnode-id="1121" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/projwet-300x180-300x180.png&amp;raw" width="300"></a><span data-dcnode-id="1119" instrument_node="">Project WET (Water Education for Teachers) Foundation is an international NGO that works with UN Habitat to educate students and teachers globally about water management. Through this work, they seek to ensure communities can properly manage their water resources for drinking water, irrigation, and sanitation, and guarantee clean water as a right in their community. Project WET’s materials are used in over 60 countries and myriad languages, in partnership with more direct water security implementation NGOs. </span></span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1108"><strong data-dcnode-id="1109"><a data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.charitywater.org/"><br data-dcnode-id="1112"><span data-dcnode-id="1111" instrument_node="">
Charity:Water</span></a></strong></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" style="font-weight: 400;"><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.charitywater.org/" rel="attachment wp-att-32892"><img alt="cw_vertical_black" class="alignleft wp-image-32892 size-medium" data-dcnode-id="1106" height="170" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/cw_vertical_black-e1456419837494-300x170.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/cw_vertical_black-e1456419837494-300x170.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/cw_vertical_black-e1456419837494-500x283.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/cw_vertical_black-e1456419837494.jpg 599w" width="300"></a><span data-dcnode-id="1104" instrument_node="">Charity: Water is a water NGO that uses online marketing, a web-store, and in-person events to raise money for local water security organizations globally. Through their fundraising, Charity: Water has funded over 17,000 water initiatives in 24 countries, providing access to clean water for over 5,000,000 people. Charity: Water uses wells, water purification systems, water filtration systems, piping systems, and latrines to guarantee access to water in the communities it works in, and works with local groups to ensure local solutions to local problems.</span></span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1094"><strong data-dcnode-id="1095"><a data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//water.org/"><span data-dcnode-id="1097" instrument_node="">Water.org</span></a></strong></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" style="font-weight: 400;"><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//water.org/" rel="attachment wp-att-32893"><img alt="s323453238421049958_p2_i1_w300" class="alignleft wp-image-32893 size-full" data-dcnode-id="1092" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/s323453238421049958_p2_i1_w300-e1456419910583.jpeg&amp;raw" width="300"></a><span data-dcnode-id="1090" instrument_node="">Water.org works across the developing world on ensuring access to water and sanitation through a variety of locally-based programs. Water.org partners with local communities to determine what type of water project will be needed, what technologies will be used, and how this project will be maintained for years to come. Water.org also provided “Watercredit”, the ability for local ventures to start up without traditional financing to guarantee access to water in their communities, with the expectation that it will be paid back over time. </span></span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1077"><strong data-dcnode-id="1078"><a data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wateraid.org/"><span data-dcnode-id="1080" instrument_node="">WaterAid</span></a></strong></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" style="font-weight: 400;"><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wateraid.org/" rel="attachment wp-att-32894"><img alt="30c8c531-a1ee-4de3-92cf-7807e868c0c7Logo" class="alignleft size-medium wp-image-32894" data-dcnode-id="1075" height="86" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/30c8c531-a1ee-4de3-92cf-7807e868c0c7Logo-300x86.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/30c8c531-a1ee-4de3-92cf-7807e868c0c7Logo-300x86.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/30c8c531-a1ee-4de3-92cf-7807e868c0c7Logo-768x220.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/30c8c531-a1ee-4de3-92cf-7807e868c0c7Logo-500x143.jpg 500w" width="300"></a><span data-dcnode-id="1073" instrument_node="">WaterAid is one of the largest Water and Sanitation NGOs globally, impacting over 21 million people annually through their clean water programs. WaterAid works with the goal of universal access to clean and safe water by 2030, and currently works in 37 countries across North America, Central America, Africa, Europe, Asia, and the Pacific in pursuit of this goal. WaterAid works to promote inclusion as part of their work guaranteeing access to water to mitigate unfair distribution of water resources. WaterAid uses wells, composting latrines, and other tools to guarantee access to water, and has a strong advocacy arm to work with national and local governments to start their own water programs with WaterAid’s assistance. </span></span></p><span data-dcnode-id="1070" instrument_node="">
</span></div></div><span data-dcnode-id="1067" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="982"><div class="su-spoiler-title" data-dcnode-id="1064" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="1066"></span><span data-dcnode-id="1065" instrument_node="">SDG 7 - Ensure access to affordable, reliable, sustainable and modern energy for all</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="983"><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1059"><strong data-dcnode-id="1060"><a data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cleancookstoves.org/"><span data-dcnode-id="1062" instrument_node="">Global Alliance for Clean Cookstoves</span></a></strong></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1054" style="font-weight: 400;"><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cleancookstoves.org/" rel="attachment wp-att-32998"><img alt="download (2)" class="alignleft wp-image-32998" data-dcnode-id="1057" height="172" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/download-2-e1456514433114.jpg&amp;raw" width="300"></a><span data-dcnode-id="1055" instrument_node="">The World Health Organization predicts a staggering 4.3 million people are dying each year due to&nbsp;health problems related to the exposure of smoke from solid fuel stoves. The Global Alliance is an initiative for households to use environmentally friendly cookstoves as a clean and healthier alternative;&nbsp;conventional ways of cooking emit greenhouse gases and black carbon which is not only harmful for the health of people around it but also to the environment. Clean Cookstoves’ focus&nbsp;countries include: China, Bangladesh, India, Guatemala, Ghana, Kenya, Nigeria, and Uganda. Using clean stoves means&nbsp;less hassle for women to search for oil and more time to contribute to the workforce or continue schooling.</span></span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1045"><strong data-dcnode-id="1046"><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kopernik.ngo/"><span data-dcnode-id="1048" instrument_node="">Kopernik</span></a></strong></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" style="font-weight: 400;"><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kopernik.ngo/" rel="attachment wp-att-32995"><img alt="download (3)" class="alignleft size-medium wp-image-32995" data-dcnode-id="1043" height="150" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/download-3-300x150.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/download-3-300x150.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/download-3.png 500w" width="300"></a><span data-dcnode-id="1041" instrument_node="">Kopernik, headquartered in Indonesia, sells low cost renewable energy technologies to people living in less developed countries. Kopernik’s outreach strategy revolves around the idea of “the last mile” and how seemingly developed countries will often write off rural villages and struggling parts of the country. Kopernik strives to “serve the last mile” and bridge the gap between national capitals and poorer, harder-to-reach rural areas in their program countries. &nbsp;Kopernik has helped over 300,000 people worldwide&nbsp;by helping providing basic energy and electrification services, or through partner programs such as clean water initiatives.</span><br data-dcnode-id="1040"><span data-dcnode-id="1039" instrument_node="">
</span></span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1029"><strong data-dcnode-id="1030"><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.solarsister.org/"><span data-dcnode-id="1032" instrument_node="">Solar Sister</span></a></strong></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" style="font-weight: 400;"><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.solarsister.org/"><img alt="sosalr-sister-banner" class="alignleft wp-image-32999" data-dcnode-id="1027" height="107" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/sosalr-sister-banner-300x107.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/sosalr-sister-banner-300x107.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/sosalr-sister-banner-768x273.png 768w, https://bestdelegate.com/wp-content/uploads/2016/02/sosalr-sister-banner-500x178.png 500w, https://bestdelegate.com/wp-content/uploads/2016/02/sosalr-sister-banner.png 960w" width="300"></a><span data-dcnode-id="1025" instrument_node="">Research has shown that in communities with access to energy, women are twice as likely to be employed. Solar Sister does exactly what their name entails; provide&nbsp;alternative sources of clean and sustainable energy whilst promoting employment opportunities for women. Solar Sister is made up of over 2,000 African female entrepreneurs selling solar energy products from small lanterns to large scale solar installations. Solar Sister is currently operating and specifically targets remote communities in rural Africa in Tanzania, Uganda and Nigeria. Solar Sister has received significant&nbsp;praise for their initiative from the &nbsp;Global Alliance for Clean Cookstoves, World Food Program, and other notable NGOs and international organizations. Over 300,000 people benefit directly from the work of Solar Sister.</span></span></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1018"><strong data-dcnode-id="1019"><a data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wecaresolar.org/"><span data-dcnode-id="1021" instrument_node="">We Care Solar</span></a></strong></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" style="font-weight: 400;"><a data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wecaresolar.org/" rel="attachment wp-att-32993"><img alt="wecaresolar" class="alignleft size-medium wp-image-32993" data-dcnode-id="1016" height="95" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/wecaresolar-300x95.jpg&amp;raw" width="300"></a><span data-dcnode-id="1014" instrument_node="">We Care Solar is an NGO founded to address&nbsp;the lack of reliable energy sources in hospitals located near northern Nigeria. We Care Solar revolutionizes portable energy with a suitcase-sized generator grid, capable of supplying stable electricity for an extended period of time. The solar suitcase is specifically designed to be used by disaster relief teams who need to set up portable medical units and provide emergency medical relief to those impacted by the disaster. Easy to use, accessible, and affordable, We Care Solar seeks to revolutionize the world of energy in hard-to-reach off-grid populated areas of the world.&nbsp;</span></span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1005"><strong data-dcnode-id="1008"><a data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.climatesolutions.org/"><span data-dcnode-id="1010" instrument_node="">Climate Solutions</span></a></strong><span data-dcnode-id="1006" style="font-weight: 400;"><span data-dcnode-id="1007" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" style="font-weight: 400;"><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.climatesolutions.org/" rel="attachment wp-att-32938"><img alt="csrgbnotaghorz" class="alignleft size-medium wp-image-32938" data-dcnode-id="1003" height="60" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/csrgbnotaghorz-300x60.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/csrgbnotaghorz-300x60.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/csrgbnotaghorz-768x154.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/csrgbnotaghorz-500x100.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/csrgbnotaghorz.jpg 1644w" width="300"></a><span data-dcnode-id="1001" instrument_node="">Climate Solutions is a clean energy non-profit that works at the city level to promote clean energy practices to the political leadership in their focus cities across North America. Climate Solutions advocates for specific policies to raise the levels of clean energy in their focus communities, and has received recognition by Philanthropedia as a model for regionally-based organizations that can promote climate change mitigation. Climate Solutions advocates for higher-efficiency energy grids, adoption of advanced low-carbon fuels, and investment in renewable energies.</span></span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="994"><strong data-dcnode-id="995"><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.solar-aid.org/"><span data-dcnode-id="997" instrument_node="">SolarAid</span></a></strong></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" style="font-weight: 400;"><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.solar-aid.org/" rel="attachment wp-att-32997"><img alt="c50f8600e54ddfed0ed47023bb200688_400x400" class="alignleft wp-image-32997" data-dcnode-id="992" height="200" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/c50f8600e54ddfed0ed47023bb200688_400x400-300x300.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/c50f8600e54ddfed0ed47023bb200688_400x400-300x300.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/c50f8600e54ddfed0ed47023bb200688_400x400-150x150.png 150w, https://bestdelegate.com/wp-content/uploads/2016/02/c50f8600e54ddfed0ed47023bb200688_400x400.png 400w" width="200"></a><span data-dcnode-id="990" instrument_node="">An international charity with over 100 employees, with the intention to combat poverty and climate change, the goal of SolarAid is to eliminate non-renewable sources of energy in Africa. Through their extensive work, Solar Aid has provided&nbsp;10 million people with access to safe and clean solar lights, a saved a staggering 345 million dollars for&nbsp;families who no longer have to purchase kerosene and other non-renewable energy resources, totally&nbsp;880,000 tonnes of CO2 emissions being mitigated. SolarAid also manages an African Social enterprise “Sunnymoney” the largest solar light distributor in Africa. SolarAid is a branch of the company SolarCentury based in United Kingdom.</span></span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">&nbsp;</span></p><span data-dcnode-id="984" instrument_node="">
</span></div></div><span data-dcnode-id="981" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="931"><div class="su-spoiler-title" data-dcnode-id="978" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="980"></span><span data-dcnode-id="979" instrument_node="">SDG 8 - Promote sustained, inclusive and sustainable economic growth, full and productive employment and decent work for all</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="932"><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="973"><strong data-dcnode-id="974"><a data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rootcapital.org/"><span data-dcnode-id="976" instrument_node="">Root Capital</span></a></strong></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="968" style="font-weight: 400;"><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rootcapital.org/" rel="attachment wp-att-32897"><img alt="RootCapialLogos" class="alignleft size-medium wp-image-32897" data-dcnode-id="971" height="66" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/logo_tagline_color-300x66.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/logo_tagline_color-300x66.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/logo_tagline_color-768x170.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/logo_tagline_color-500x111.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/logo_tagline_color.jpg 800w" width="300"></a><span data-dcnode-id="969" instrument_node="">Root Capital is a social enterprise investment organization which targets the prosperity of poor rural areas in Latin America and Africa. Root Capital lends capital and delivers financial training to farmer associations and various private businesses to aid their development. By providing loans to these businesses, Root Capital help them create stronger market connections and&nbsp;stabilize their business so that one day they will be self-sufficient. Since 1999, Root Capital has issued over $740 million in credit to more than 530 businesses in both Latin America and Africa.</span></span></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="962"><strong data-dcnode-id="963"><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fonkoze.org/"><span data-dcnode-id="965" instrument_node="">Fonkoze</span></a></strong></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" style="font-weight: 400;"><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fonkoze.org/" rel="attachment wp-att-32898"><img alt="Fonkoze_Logo-inline_July2013" class="alignleft size-medium wp-image-32898" data-dcnode-id="960" height="63" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Fonkoze_Logo-inline_July2013-300x63.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/Fonkoze_Logo-inline_July2013-300x63.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/Fonkoze_Logo-inline_July2013-768x160.png 768w, https://bestdelegate.com/wp-content/uploads/2016/02/Fonkoze_Logo-inline_July2013-500x104.png 500w, https://bestdelegate.com/wp-content/uploads/2016/02/Fonkoze_Logo-inline_July2013.png 1059w" width="300"></a><span data-dcnode-id="958" instrument_node="">Fonkoze is a poverty alleviation organization in Haiti which provides women with the required resources and job training to escape poverty. Fonkoze partners with non-bank financial institutions in Haiti to provide these resources to women at affordable and sustainable lending rates. Fonkoze has established a ‘Staircase Out of Poverty’ plan to aid&nbsp;200,00 women and provide $90 million in remittances per year through it’s partnership with other financial institutions. </span></span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="951"><strong data-dcnode-id="952"><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.positiveplanetfoundation.org/"><span data-dcnode-id="954" instrument_node="">Positive Planet Foundation</span></a></strong></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" style="font-weight: 400;"><a data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.positiveplanetfoundation.org/" rel="attachment wp-att-32899"><img alt="logo-positive-planet-foundation" class="alignleft size-medium wp-image-32899" data-dcnode-id="949" height="65" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/logo-positive-planet-foundation-300x65.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/logo-positive-planet-foundation-300x65.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/logo-positive-planet-foundation-500x108.png 500w, https://bestdelegate.com/wp-content/uploads/2016/02/logo-positive-planet-foundation.png 630w" width="300"></a><span data-dcnode-id="947" instrument_node="">The Positive Planet Foundation aims to develop positive economies through micro-finance strategies. The Positive Planet Foundation has evolved into a movement which not only ensures the development of communities and regions, but focuses on creating long-term plans to further secure the prosperity of their programs. PPF outlines the way of alleviating poverty through micro-financing through improving access to financial services for entrepreneurs and funding enterprises to ensure&nbsp;basic rights such as health, water and education.</span></span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="940"><strong data-dcnode-id="941"><a data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kiva.org/"><span data-dcnode-id="943" instrument_node="">KIVA</span></a></strong></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" style="font-weight: 400;"><a data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kiva.org/" rel="attachment wp-att-32900"><img alt="kivaloans" class="alignleft size-medium wp-image-32900" data-dcnode-id="938" height="133" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/kivaloans-300x133.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/kivaloans-300x133.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/kivaloans-768x341.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/kivaloans-500x222.jpg 500w" width="300"></a><span data-dcnode-id="936" instrument_node="">One of the most well-known international micro-finance NGOs, KIVA upholds a mission of alleviating poverty by providing access to capital for people in need. Through lending, individuals are able to improve&nbsp;their living conditions&nbsp;even while living outside of communities with access to traditional forms of finance, credit, and banking. Working hand-in hand with microfinance institutions on five continents, KIVA has provided safe and affordable access to capital worldwide. &nbsp;KIVA’s field partners ensure the fluidity and success of the lending system primarily funded through donations and corporate sponsors, and a majority of loan recipients are women.&nbsp;</span></span></p><span data-dcnode-id="933" instrument_node="">
</span></div></div><span data-dcnode-id="930" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="887"><div class="su-spoiler-title" data-dcnode-id="927" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="929"></span><span data-dcnode-id="928" instrument_node="">SDG 9 - Build resilient infrastructure, promote inclusive and sustainable industrialization and foster innovation</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="888"><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="922"><strong data-dcnode-id="923"><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.miya-water.com/"><span data-dcnode-id="925" instrument_node="">MIYA</span></a></strong></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" style="font-weight: 400;"><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.miya-water.com/" rel="attachment wp-att-32905"><img alt="59610-tikun miya-bizua1-0708" class="alignleft wp-image-32905" data-dcnode-id="920" height="183" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/miya_logo-300x275.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/miya_logo-300x275.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/miya_logo-768x703.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/miya_logo-500x458.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/miya_logo.jpg 1030w" width="200"></a><span data-dcnode-id="918" instrument_node="">MIYA is a project of the Arison group dedicated to increasing access to clean water, specifically in urban areas. MIYA does this by building resilient and efficient water infrastructure in urban areas, alleviating the 33% loss of water in urban areas due to outdated infrastructure and unidentified leaks. MIYA works with local governments globally, and has completed over 150 programs across 4 continents. MIYA’s work helps increase access to water, reduces health risk from water (by reducing rates of water contamination in old pipes), and helps reduce energy spending in urban water management systems. </span></span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">&nbsp;</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="907"><strong data-dcnode-id="908"><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.developinnovations.com/"><br data-dcnode-id="911"><span data-dcnode-id="910" instrument_node="">
Development Innovations Group</span></a></strong></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" style="font-weight: 400;"><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.developinnovations.com/" rel="attachment wp-att-32906"><img alt="Development-Innovations-Group-recruitment" class="alignleft wp-image-32906" data-dcnode-id="905" height="101" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Development-Innovations-Group-recruitment.png&amp;raw" width="200"></a><span data-dcnode-id="903" instrument_node="">The Development Innovations Group (DIG) works to create financial and urban infrastructures to help lift communities out of poverty. By providing financial services to communities in poverty, DIG can help families start businesses, finance homes, or even finance public works projects with local governments, helping communities escape the poverty trap. DIG also works on physical infrastructure projects, such as water, sanitation, solid waste infrastructure, slum development, and even transportation infrastructure. DIG works in over 50 countries on every continent except for Australia, and works in post-emergency and post-conflict settings. </span></span></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="896"><strong data-dcnode-id="897"><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.constructionforchange.org/"><span data-dcnode-id="899" instrument_node="">Construction for Change</span></a></strong></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" style="font-weight: 400;"><a data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.constructionforchange.org/" rel="attachment wp-att-32907"><img alt="CFCLogoLarge-e1406227716588" class="alignleft wp-image-32907" data-dcnode-id="894" height="98" sizes="(max-width: 201px) 100vw, 201px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/CFCLogoLarge-e1406227716588-300x145.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/CFCLogoLarge-e1406227716588-300x145.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/CFCLogoLarge-e1406227716588-768x372.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/CFCLogoLarge-e1406227716588-500x242.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/CFCLogoLarge-e1406227716588.jpg 1548w" width="201"></a><span data-dcnode-id="892" instrument_node="">Construction for Change is an infrastructure NGO that partners with local NGOs for community-based construction projects. Construction for Change brings&nbsp;in international expertise on construction projects while leveraging local resources and local labor. &nbsp;Construction for Change handles design and project management to build new schools, medical facilities, and vocational training facilities across Asia and Africa. &nbsp;</span></span></p><span data-dcnode-id="889" instrument_node="">
</span></div></div><span data-dcnode-id="886" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="822"><div class="su-spoiler-title" data-dcnode-id="883" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="885"></span><span data-dcnode-id="884" instrument_node="">SDG 10 - Reduce inequality within and among countries</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="823"><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="878"><strong data-dcnode-id="879"><a data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanclothes.org/"><span data-dcnode-id="881" instrument_node="">Clean Clothes Campaign</span></a></strong></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" style="font-weight: 400;"><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cleanclothes.org/" rel="attachment wp-att-32908"><img alt="download" class="alignleft size-medium wp-image-32908" data-dcnode-id="876" height="76" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/download-300x76.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/download-300x76.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/download.jpg 445w" width="300"></a><span data-dcnode-id="874" instrument_node="">The Clean Clothes Campaign is an organization set to ensure the basic labor and safety&nbsp;rights of workers worldwide. By educating consumers and governments, CCC raises awareness for workers to advocate for their rights and achieve better living conditions. The CCC works in 16 European countries with trade unions and NGOs to protect interests of consumers in a nation. In collaboration of with over 200 organizations, the CCC creates campaign strategies catered to raise awareness for consumer and labor rights.</span></span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="867"><strong data-dcnode-id="868"><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.impacttlimited.com/"><span data-dcnode-id="870" instrument_node="">Impactt</span></a></strong></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" style="font-weight: 400;"><a data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.impacttlimited.com/" rel="attachment wp-att-32910"><img alt="impactt" class="alignleft wp-image-32910 size-medium" data-dcnode-id="865" height="156" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/impactt-e1456424017319-300x156.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/impactt-e1456424017319-300x156.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/impactt-e1456424017319.jpg 480w" width="300"></a><span data-dcnode-id="863" instrument_node="">Impactt is a leading consultancy group working to establish human rights and labor standards. In 2008, Impactt worked to establish programs discouraging child labor with 90 practitioners worldwide. Impactt works with the goal of creating initiatives which respect ethical and consumer considerations, are tailored to work well with businesses and workers and have a high likelihood of success. &nbsp;Impactt addresses both sides of labor standard debates, by advocating for stricter regulations from&nbsp;governments, as well as advocating directly to businesses to adopt better standards and galvanizing public awareness to encourage&nbsp;action.&nbsp;</span></span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="853"><strong data-dcnode-id="857"><br data-dcnode-id="859"><span data-dcnode-id="858" instrument_node="">
</span></strong><strong data-dcnode-id="854"><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.actionaidusa.org/"><span data-dcnode-id="856" instrument_node="">ActionAid</span></a></strong></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" style="font-weight: 400;"><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.actionaidusa.org/" rel="attachment wp-att-32912"><img alt="photos-2012-01-af5cbe74c63f148" class="alignleft size-medium wp-image-32912" data-dcnode-id="851" height="63" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/photos-2012-01-af5cbe74c63f148-300x63.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/photos-2012-01-af5cbe74c63f148-300x63.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/photos-2012-01-af5cbe74c63f148-768x161.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/photos-2012-01-af5cbe74c63f148-500x105.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/photos-2012-01-af5cbe74c63f148.jpg 1299w" width="300"></a><span data-dcnode-id="849" instrument_node="">ActionAId works in 45 countries to advocate for those in poverty and who face injustice. ActionAid focuses on unequal distribution of wealth in nations and the ability for powerful individuals to create institutions that&nbsp;undermine the needs of countries’&nbsp;poorer populations. ActionAid works at the local level to help restore people the rights they are denied, to address each case with the individual attention they deserve.&nbsp;</span></span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="842"><strong data-dcnode-id="843"><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fairfood.org/"><span data-dcnode-id="845" instrument_node="">FairFood International</span></a></strong></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="836"><span data-dcnode-id="837" style="font-weight: 400;"><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fairfood.org/" rel="attachment wp-att-32904"><img alt="images" class="alignleft size-medium wp-image-32904" data-dcnode-id="840" height="122" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/images-300x122.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/images-300x122.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/images.jpg 353w" width="300"></a><span data-dcnode-id="838" instrument_node="">FairFood International works to establish wages high enough so that workers are ensured the ability to account for day-to-day needs. The living wage campaign set by FairFood International calls for supermarkets to establish a living wage for their workers due to their role in supply chains. FairFood International’s work on the ground provides consumers with information regarding the abuse of workers and the rights they deserve to allow those being affected by unequal treatment the ability to voice against inequality. The work of FairFood International wishes to one day create social and economic equality in the workplace, with every working human being being able to provide from themselves and their family.&nbsp;</span></span></p><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="831"><strong data-dcnode-id="832"><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.industriall-union.org/"><span data-dcnode-id="834" instrument_node="">IndustriALL</span></a></strong></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" style="font-weight: 400;"><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.industriall-union.org/" rel="attachment wp-att-32911"><img alt="download (1)" class="alignleft wp-image-32911" data-dcnode-id="829" height="201" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/download-1.png&amp;raw" width="211"></a><span data-dcnode-id="827" instrument_node="">The IndustriALL global Union works with 140 countries in the mining, energy and manufacturing sectors to improve&nbsp;working conditions around the globe. IndustriALL advocates for&nbsp;a new economic order based on&nbsp;democracy and social justices. IndustriAll’s objectives and strategies include: creating stronger labor unions, increasing&nbsp;union membership, advocating for trade union rights with businesses and governments, promote new labor protection policies, promote social justice, promote equality in the workplace, and establish safer work conditions in the mining, energy, and manufacturing industries.</span></span></p><span data-dcnode-id="824" instrument_node="">
</span></div></div><span data-dcnode-id="821" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="779"><div class="su-spoiler-title" data-dcnode-id="818" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="820"></span><span data-dcnode-id="819" instrument_node="">SDG 11 - Make cities and human settlements inclusive, safe, resilient and sustainable</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="780"><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="813"><strong data-dcnode-id="814"><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.habitat.org/"><span data-dcnode-id="816" instrument_node="">Habitat for Humanity</span></a></strong></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" style="font-weight: 400;"><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.habitat.org/" rel="attachment wp-att-32929"><img alt="og-default-1200x630" class="alignleft size-medium wp-image-32929" data-dcnode-id="811" height="158" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/og-default-1200x630-300x158.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/og-default-1200x630-300x158.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/og-default-1200x630-768x403.png 768w, https://bestdelegate.com/wp-content/uploads/2016/02/og-default-1200x630-500x263.png 500w, https://bestdelegate.com/wp-content/uploads/2016/02/og-default-1200x630.png 1200w" width="300"></a><span data-dcnode-id="809" instrument_node="">Habitat for Humanity is a faith-based organization dedicated to providing homes to people who are homeless or stuck in slum housing. Originally brought to international prominence by the work of former US President Jimmy Carter, Habitat has helped nearly 7 million people since 1976 by improving their living conditions, working with over 1,400 local affiliates. Their work includes building homes, housing assistance, and home improvement in communities with the highest need.</span></span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">&nbsp;</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="799"><strong data-dcnode-id="800"><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.c40.org/"><span data-dcnode-id="802" instrument_node="">C40 Cities Climate Leadership Group</span></a></strong></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" style="font-weight: 400;"><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.c40.org/" rel="attachment wp-att-32930"><img alt="images (1)" class="alignleft size-medium wp-image-32930" data-dcnode-id="797" height="68" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/images-1-300x68.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/images-1-300x68.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/images-1.jpg 320w" width="300"></a><span data-dcnode-id="795" instrument_node="">The C40 Cities Climate Leadership Group is a collective of over 80 Mega-Cities dedicated to responsible climate policy, and is one of the most prominent organizations in the world when it comes to urban policy and climate change policy. C40 is a forum for cities to share experiences and best practices for reducing greenhouse gas emissions and climate risks, and cities can share their challenges or expertise.&nbsp;The cities collectively represent over half a billion people worldwide, and play a major role in international climate negotiations.&nbsp;</span></span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="788"><strong data-dcnode-id="789"><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.iufn.org/en/"><span data-dcnode-id="791" instrument_node="">IUFN</span></a></strong></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" style="font-weight: 400;"><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.iufn.org/en/" rel="attachment wp-att-32931"><img alt="logo" class="alignleft size-medium wp-image-32931" data-dcnode-id="786" height="81" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/logo-300x81.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/logo-300x81.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/logo-500x135.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/logo.jpg 542w" width="300"></a><span data-dcnode-id="784" instrument_node="">The International Urban Food Network is a research organization that focuses on sustainable urban food systems to guarantee sustainable cities and access to food for the entire population of cities. IUFN works with local decision-makers to provide them with the knowledge and expertise to create&nbsp;responsible food policies. Based on the needs of each of their program cities,&nbsp;IUFN works as an advocacy organization, technical consultant, or think-tank to promote sustainable urban food policy. &nbsp;</span></span></p><span data-dcnode-id="781" instrument_node="">
</span></div></div><span data-dcnode-id="778" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="736"><div class="su-spoiler-title" data-dcnode-id="775" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="777"></span><span data-dcnode-id="776" instrument_node="">SDG 12 - Ensure sustainable consumption and production patterns</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="737"><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="770"><strong data-dcnode-id="771"><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.footprintnetwork.org/"><span data-dcnode-id="773" instrument_node="">Global Footprint Network</span></a></strong></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" style="font-weight: 400;"><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.footprintnetwork.org/" rel="attachment wp-att-32932"><img alt="Global-Footprint-Network" class="alignleft size-medium wp-image-32932" data-dcnode-id="768" height="132" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Global-Footprint-Network-300x132.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/Global-Footprint-Network-300x132.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/Global-Footprint-Network-500x220.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/Global-Footprint-Network.jpg 519w" width="300"></a><span data-dcnode-id="766" instrument_node="">You’ve probably heard the term “Ecological Footprint”; this is where it started. The Global Footprint Network is an international think tank that provides companies, governments, and organizations the research and accounting tools to assess and reduce their footprint. The Global Footprint Network works in over 23 countries and 200 cities, as well as with educational institutions and business leaders across 70 partner organizations to plan projects for footprint reduction and evaluation to reduce resource consumption globally. &nbsp;</span></span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">&nbsp;</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="756"><strong data-dcnode-id="757"><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wbcsd.org/"><span data-dcnode-id="759" instrument_node="">World Business Council for Sustainable Development</span></a></strong></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" style="font-weight: 400;"><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wbcsd.org/" rel="attachment wp-att-32933"><img alt="WBCSD_logo_75_dpi_for_web" class="alignleft size-medium wp-image-32933" data-dcnode-id="754" height="102" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/WBCSD_logo_75_dpi_for_web-300x102.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/WBCSD_logo_75_dpi_for_web-300x102.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/WBCSD_logo_75_dpi_for_web.png 324w" width="300"></a><span data-dcnode-id="752" instrument_node="">The World Business Council for Sustainable Development is a global council of CEOs that evaluate reducing resource consumption for economic and environmental reasons. The WBCSD is one of the most influential and effective sustainable development research organizations, and one of the leading organizations for climate Corporate Social Responsibility (CSR) projects. WBCSD’s work has been rated second-most influential for sustainable development research among experts, second only to the European Union. The council advocates for sustainable development action in business and policy communities. </span></span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="745"><strong data-dcnode-id="746"><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carbontrust.com/"><span data-dcnode-id="748" instrument_node="">Carbon Trust</span></a></strong></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" style="font-weight: 400;"><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.carbontrust.com/" rel="attachment wp-att-32928"><img alt="logo (1)" class="alignleft size-medium wp-image-32928" data-dcnode-id="743" height="182" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/logo-1-300x182.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/logo-1-300x182.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/logo-1.jpg 326w" width="300"></a><span data-dcnode-id="741" instrument_node="">The Carbon Trust is a consumption reduction organization with nearly 200 staff globally whose mission is to move to a low-carbon sustainable economy. The Carbon Trust is a private no-dividend organization that works with clients (businesses and governments) to reduce their contribution to carbon emissions and increase their energy security. The Carbon Trust so far has reduced energy costs by over $6 Billion to date, and has cut global carbon emissions by 60 Megatons. </span></span></p><span data-dcnode-id="738" instrument_node="">
</span></div></div><span data-dcnode-id="735" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="665"><div class="su-spoiler-title" data-dcnode-id="732" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="734"></span><span data-dcnode-id="733" instrument_node="">SDG 13 - Take urgent action to combat climate change and its impacts</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="666"><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="727"><strong data-dcnode-id="728"><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.climatenetwork.org/"><span data-dcnode-id="730" instrument_node="">Climate Action Network</span></a></strong></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" style="font-weight: 400;"><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.climatenetwork.org/" rel="attachment wp-att-32937"><img alt="CAN" class="alignleft wp-image-32937 size-medium" data-dcnode-id="725" height="183" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/CAN-e1456434573928-300x183.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/CAN-e1456434573928-300x183.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/CAN-e1456434573928-768x469.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/CAN-e1456434573928-500x305.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/CAN-e1456434573928.jpg 868w" width="300"></a><span data-dcnode-id="723" instrument_node="">The Climate Action Network comprises nearly 1000 NGOs across the world to advocate for climate action at the local, national, and international levels by limiting emissions and bringing consumption to sustainable levels. CAN members work from over 100 countries online and at in-person conferences to set a comprehensive climate agenda on behalf of their collective of NGOs, and publishes regular reports and recommendations on climate action. </span></span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">&nbsp;</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">&nbsp;</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="710"><strong data-dcnode-id="711"><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wri.org/"><span data-dcnode-id="713" instrument_node="">World Resources Institute</span></a></strong></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" style="font-weight: 400;"><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wri.org/" rel="attachment wp-att-32939"><img alt="wri logo color" class="alignleft size-medium wp-image-32939" data-dcnode-id="708" height="105" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/wri-logo-color-300x105.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/wri-logo-color-300x105.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/wri-logo-color-768x268.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/wri-logo-color-500x174.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/wri-logo-color.jpg 1200w" width="300"></a><span data-dcnode-id="706" instrument_node="">The World Resources Institute is a non-profit dedicated to climate research that works in over 50 countries with nearly 500 experts and staff. WRI focuses on six inter-sectional issues related to the environment: climate, energy, food, forests, water, and cities and transportation. WRI’s research is used widely by policy makers across these issue areas, and provides recommendations on reducing waste, increasing clean energies, agricultural yield, and access to clean water, all with the goal of holistically improving the climate. </span></span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="699"><strong data-dcnode-id="700"><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//acadiacenter.org/"><span data-dcnode-id="702" instrument_node="">Acadia Center</span></a></strong></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" style="font-weight: 400;"><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//acadiacenter.org/" rel="attachment wp-att-32936"><img alt="acadia-environmental-research-nonprofit-logo" class="alignleft size-medium wp-image-32936" data-dcnode-id="697" height="109" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/acadia-environmental-research-nonprofit-logo-300x109.gif&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/acadia-environmental-research-nonprofit-logo-300x109.gif 300w, https://bestdelegate.com/wp-content/uploads/2016/02/acadia-environmental-research-nonprofit-logo-768x279.gif 768w, https://bestdelegate.com/wp-content/uploads/2016/02/acadia-environmental-research-nonprofit-logo-500x182.gif 500w" width="300"></a><span data-dcnode-id="695" instrument_node="">Acadia Center is a non-profit based on developing green economies and green technologies, which operates mainly in the United States. Acadia Center works with state, local, and regional governments to advocate for solutions to tackle climate change, and help provide these governments with the expertise needed to create proper policy responses. Acadia’s main areas of work include transportation, power generation, land use, and carbon emission reduction. </span></span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">&nbsp;</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="685"><strong data-dcnode-id="686"><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sierraclub.org/"><span data-dcnode-id="688" instrument_node="">Sierra Club</span></a></strong></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" style="font-weight: 400;"><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sierraclub.org/" rel="attachment wp-att-32994"><img alt="sierra club x2" class="alignleft size-medium wp-image-32994" data-dcnode-id="683" height="113" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Sierra-Club-Adopt-sign-300x113.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/Sierra-Club-Adopt-sign-300x113.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/Sierra-Club-Adopt-sign-768x288.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/Sierra-Club-Adopt-sign-500x188.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/Sierra-Club-Adopt-sign.jpg 900w" width="300"></a><span data-dcnode-id="681" instrument_node="">Sierra Club is the largest environmental organization in the United States, founded in 1892 long before the modern environmental movement. Sierra Club has 2.4 million members globally, and works mainly on advocacy for environmental goals. Sierra Club lobbied extensively for the US Clean Air and Clean Water Acts, and well as the Endangered Species Act. Sierra Club’s goals are to help lead the world to move past fossil fuels, and to preserve wildlife and biodiversity. With over 250 million acres of land protected and over 200 coal power plants retired due to their advocacy, Sierra Club is one of the world’s most influential climate organizations.</span></span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="674"><strong data-dcnode-id="675"><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.greenbeltmovement.org/"><span data-dcnode-id="677" instrument_node="">Green Belt Movement</span></a></strong></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" style="font-weight: 400;"><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.greenbeltmovement.org/" rel="attachment wp-att-32996"><img alt="r1171_129_green_belt_movement" class="alignleft size-medium wp-image-32996" data-dcnode-id="672" height="187" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/r1171_129_green_belt_movement-300x187.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/r1171_129_green_belt_movement-300x187.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/r1171_129_green_belt_movement-768x478.jpg 768w, https://bestdelegate.com/wp-content/uploads/2016/02/r1171_129_green_belt_movement-500x311.jpg 500w, https://bestdelegate.com/wp-content/uploads/2016/02/r1171_129_green_belt_movement.jpg 1143w" width="300"></a><span data-dcnode-id="670" instrument_node="">Founded in 1977 by Nobel Peace Price laureate Wangari Maathai, the Green Belt Movement is one of the most successful global climate NGOs seeking to combat deforestation and climate change by planting trees in communities across Africa, starting in Kenya. Through a network of 2000 local community organizations, the Green Belt Movement advocates for climate change awareness in rural communities, plants trees, and works with networks of women to promote female empowerment at the rural level. The movement to this day has planted over 50 million trees, and trained over 30,000 women in agricultural jobs&nbsp;to help them earn income. </span></span></p><span data-dcnode-id="667" instrument_node="">
</span></div></div><span data-dcnode-id="664" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="613"><div class="su-spoiler-title" data-dcnode-id="661" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="663"></span><span data-dcnode-id="662" instrument_node="">SDG 14 - Conserve and sustainably use the oceans, seas and marine resources for sustainable development</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="614"><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="654"><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.greenpeace.org/"><span data-dcnode-id="656" style="font-weight: 400;"><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Greenpeace</span></strong><span data-dcnode-id="657" instrument_node="">&nbsp;</span></span></a></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" style="font-weight: 400;"><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.greenpeace.org/" rel="attachment wp-att-32943"><img alt="Greenpeace-logo" class="alignleft size-medium wp-image-32943" data-dcnode-id="652" height="119" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Greenpeace-logo-300x119.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/Greenpeace-logo-300x119.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/Greenpeace-logo-768x304.png 768w, https://bestdelegate.com/wp-content/uploads/2016/02/Greenpeace-logo-500x198.png 500w, https://bestdelegate.com/wp-content/uploads/2016/02/Greenpeace-logo.png 890w" width="300"></a><span data-dcnode-id="650" instrument_node="">Greenpeace is one of the largest international NGOs working to maintain marine ecosystems. Funded solely by individual contributions, Greenpeace has 2.8 million members worldwide. Greenpeace’s campaigns focus on five core areas: saving the arctic, protecting forests, fighting global warming, eliminating harmful toxic chemicals from consumer products, and promoting sustainable agriculture. Greenpeace is also one of the most visible international NGOs, as their controversial practices have at times included their activists taking illegal actions such as destroying GMO crops or direct action against ships at sea. </span></span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="643"><strong data-dcnode-id="644"><a data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oceana.org/"><span data-dcnode-id="646" instrument_node="">Oceana</span></a></strong></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" style="font-weight: 400;"><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//oceana.org/" rel="attachment wp-att-32945"><img alt="Oceana_English_SideTagline_2Blue_RGB" class="alignleft size-medium wp-image-32945" data-dcnode-id="641" height="89" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Oceana_English_SideTagline_2Blue_RGB-300x89.png&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/Oceana_English_SideTagline_2Blue_RGB-300x89.png 300w, https://bestdelegate.com/wp-content/uploads/2016/02/Oceana_English_SideTagline_2Blue_RGB-768x228.png 768w, https://bestdelegate.com/wp-content/uploads/2016/02/Oceana_English_SideTagline_2Blue_RGB-500x149.png 500w, https://bestdelegate.com/wp-content/uploads/2016/02/Oceana_English_SideTagline_2Blue_RGB.png 1000w" width="300"></a><span data-dcnode-id="639" instrument_node="">Oceana is an international marine conservation NGO established in 2001 by a collection of foundations including the Pew Charitable Trusts and the Rockefeller Brothers Fund. Oceana’s work to protect the oceans so far has reached over one million square miles of ocean across 100 policy victories, through advocating to local, national, and international bodies to protect the ocean from over-consumption, pollution, and unsustainable transportation practices through science-based awareness campaigns. &nbsp;</span></span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="632"><strong data-dcnode-id="633"><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//us.whales.org/"><span data-dcnode-id="635" instrument_node="">Whale and Dolphin Conservation</span></a></strong></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" style="font-weight: 400;"><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//us.whales.org/" rel="attachment wp-att-32942"><img alt="WDC-RGB" class="alignleft size-medium wp-image-32942" data-dcnode-id="630" height="113" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/WDC-RGB-300x113.jpg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/WDC-RGB-300x113.jpg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/WDC-RGB.jpg 452w" width="300"></a><span data-dcnode-id="628" instrument_node="">Whale and Dolphin Conservation (WDC) is one of the largest international charities dedicated to the conservation of Whales and Dolphins. WDC works through public awareness campaigns, political lobbying, and field research to convince policy makers to pass laws protecting these animals in their natural habitat. WDC also conducts field rescues and conservation projects to directly protect specific whales and dolphins in their natural habitats, or in conserved areas to protect biodiversity. </span></span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="621"><strong data-dcnode-id="622"><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.asoc.org/"><span data-dcnode-id="624" instrument_node="">Antarctic and Southern Ocean Coalition</span></a></strong></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="616"><a data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.asoc.org/" rel="attachment wp-att-32946"><img alt="Antarctic_and_Southern_Ocean_Coalition_Logo" class="alignleft size-medium wp-image-32946" data-dcnode-id="619" height="249" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestdelegate.com/wp-content/uploads/2016/02/Antarctic_and_Southern_Ocean_Coalition_Logo-300x249.jpeg&amp;raw" srcset="https://bestdelegate.com/wp-content/uploads/2016/02/Antarctic_and_Southern_Ocean_Coalition_Logo-300x249.jpeg 300w, https://bestdelegate.com/wp-content/uploads/2016/02/Antarctic_and_Southern_Ocean_Coalition_Logo.jpeg 500w" width="300"></a><span data-dcnode-id="617" instrument_node="">The Antarctic and Southern Ocean Coalition (ASOC) is the only NGO dedicated solely to the preservation of the Southern Ocean and Antarctic Continent. ASOC is the main representation for the environmental NGO community in international bodies governing the Antarctic, serving the role of Environmental Observer within the Antarctic Treaty System. ASOC focuses on two core goals: establishing much of the Antarctic and Southern Ocean as “Marine Protected Areas”, and forming an internationally legally binding Polar Code that determines rules and regulations for all ships operating in the Southern Ocean.</span></p><span data-dcnode-id="615" instrument_node="">
</span></div></div><span data-dcnode-id="612" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-fancy su-spoiler-icon-plus su-spoiler-closed" data-dcnode-id="525"><div class="su-spoiler-title" data-dcnode-id="609" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="611"></span><span data-dcnode-id="610" instrument_node="">SDG 15 - Protect, restore and promote sustainable use of terrestrial ecosystems, sustainably manage forests, combat desertification, and halt and reverse land degradation and halt biodiversity loss</span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="526"><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="604"><strong data-dcnode-id="605"><a data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.worldwildlife.org/"><span data-dcnode-id="607" instrument_node="">World Wildlife Fund</span></a></strong></p><span data-dcnode-id="603" instrument_node="">
