</span><h2 class="title-main" data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">III. HUMANITARIAN ACTORS</span></h2><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="631" instrument_node=""> If a Government requests and/or accepts external assistance, a variety of international humanitarian actors may be asked to support disaster response and disaster response preparedness, including the UN, RCRC Movement, regional intergovernmental bodies, NGOs, assisting Governments, foreign militaries, and the private sector. </span><button class="btn-tootltip" data-dcnode-id="629" data-original-title="Because the scope of the Guide is limited to response and response preparedness, it is not possible to fully describe the significant   community of regional and international intergovernmental organizations that work in disaster mitigation and risk reduction. Three   examples include UN International Strategy for Disaster Reduction (UNISDR), Asian Disaster Reduction Centre (ADRC) and the Global Facility for Disaster Risk Reduction (GFDRR) of the World Bank." data-placement="bottom" data-toggle="tooltip" title="" type="button"><span data-dcnode-id="630" instrument_node="">1</span></button><span data-dcnode-id="628" instrument_node=""> Below is a short description of these different categories of international humanitarian actors. </span></p><span data-dcnode-id="626" instrument_node="">
</span><section class="section-note" data-dcnode-id="618"><span data-dcnode-id="625" instrument_node="">
</span><h3 data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">HOW TO READ THIS SECTION</span></h3><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node=""> Each category and sub-category of humanitarian actor includes and short description of who it is, what it does and how it works with Governments. </span></p><span data-dcnode-id="619" instrument_node="">
</span></section><span data-dcnode-id="617" instrument_node="">
</span><section data-dcnode-id="593" id="sec3A"><span data-dcnode-id="616" instrument_node="">
</span><h3 class="title-second" data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">A.UNITED NATIONS</span></h3><span data-dcnode-id="613" instrument_node="">
</span><span data-dcnode-id="610"><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanitarianresponse.info/" target="_blank" title=""><span data-dcnode-id="612" instrument_node="">UN Funds, Programmes and Specialized Agencies (UN Agencies)</span></a></span><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node=""> have their membership, leadership and budget processes separate from the UN Secretariat, but they are committed to work with and through the established UN coordination mechanisms and report to the UN Member States through their respective governing boards. The UN agencies, most of which also have pre-existing development-focused relationships with Member States, provide sector-specific support and expertise before, during and after a disaster. The main UN agencies with humanitarian mandates include Food and Agriculture Organization (FAO), International Organization for Migration (IOM), United Nations Development Programme (UNDP), United Nations Populations Fund (UNFPA), UN Refugee Agency (UNHCR), UN-Habitat, United Nations Children’s Fund (UNICEF), UN Women, World Food Programme (WFP) and World Health Organization (WHO). These agencies support a variety of disaster response needs. These include shelter, protection, food security, health, nutrition, education and livelihoods as well as common services like coordination, logistics and telecommunications. </span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="605" instrument_node=""> OCHA is the department in the UN Secretariat mandated to support the Emergency Relief Coordinator (ERC) at the global-level, and the UN Resident and/or Humanitarian Coordinator at the country-level </span><button class="btn-tootltip" data-dcnode-id="603" data-original-title="Detailed descriptions of the functions of the Emergency Relief Coordinator, the UN Resident Coordinator, the Humanitarian Coordinator and OCHA are provided in Chapter IV “International Coordination Mechanisms”." data-placement="bottom" data-toggle="tooltip" title="" type="button"><span data-dcnode-id="604" instrument_node="">2</span></button><span data-dcnode-id="602" instrument_node=""> Below is a short description of these different categories of international humanitarian actors. </span></p><span data-dcnode-id="600" instrument_node="">
</span><h4 class="title-third" data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">HOW DO UNITED NATIONS AGENCIES WORK WITH GOVERNMENTS?</span></h4><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node=""> At the country-level, the UN system works in partnership with National Disaster Management Offices (NDMOs) and with respective Government line ministries on emergency response preparedness and response. </span></p><span data-dcnode-id="594" instrument_node="">
</span></section><span data-dcnode-id="592" instrument_node="">
</span><section data-dcnode-id="562" id="sec3B"><span data-dcnode-id="591" instrument_node="">
</span><h3 class="title-second" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">B. RED CROSS AND RED CRESCENT MOVEMENT</span></h3><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node=""> The International Red Cross and Red Crescent (RCRC) Movement is the world’s largest humanitarian network, comprising nearly 100 million members, volunteers and supporters in 190 National Societies. Structurally, the RCRC Movement has three core components: </span></p><span data-dcnode-id="585" instrument_node="">
</span><ol data-dcnode-id="574"><span data-dcnode-id="584" instrument_node="">
</span><li data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">National Red Cross and Red Crescent Societies</span></li><span data-dcnode-id="581" instrument_node="">
</span><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">International Federation of Red Cross and Red Crescent Societies (IFRC)</span></li><span data-dcnode-id="578" instrument_node="">
</span><li data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">International Committee of the Red Cross (ICRC)</span></li><span data-dcnode-id="575" instrument_node="">
</span></ol><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node=""> Together, these components operate worldwide. Their mission is to prevent and alleviate human suffering wherever it may be found, to protect life and health, and to ensure respect for human beings, particularly in times of armed conflict and other emergencies. The Movement works in accordance with the fundamental principles of humanity, impartiality, neutrality, independence, voluntary service, unity and universality. </span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="569" instrument_node="">
</span><span data-dcnode-id="566"><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ifrc.org/en/who-we-are/the-movement/" target="_blank" title=""><span data-dcnode-id="568" instrument_node="">National Red Cross and Red Crescent Societies (National Societies)</span></a></span><span data-dcnode-id="565" instrument_node=""> occupy a unique place as auxiliaries to the public authorities in their countries. They provide disaster relief, support health and social programmes, and promote international humanitarian law and humanitarian values. </span></p><span data-dcnode-id="563" instrument_node="">
</span></section><span data-dcnode-id="561" instrument_node="">
</span><h3 class="title-third" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">HOW DO NATIONAL SOCIETIES WORK WITH GOVERNMENTS?</span></h3><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node=""> National Societies work alongside national and local public authorities in disaster situations. In Asia-Pacific, national societies are generally the first points of contact for Governments requesting additional support from IFRC (in natural disasters) and ICRC (in situations of armed conflict). National societies are not NGOs, so they have a different relationship with Governments and public authorities than registered NGOs. </span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="554" instrument_node="">
</span><span data-dcnode-id="551"><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ifrc.org/" target="_blank" title=""><span data-dcnode-id="553" instrument_node="">International Federation of the Red Cross and Red Crescent Societies (IFRC)</span></a></span><span data-dcnode-id="550" instrument_node=""> coordinates and directs assistance in natural disasters in support of the National Society. IFRC and National Societies also undertake preparedness, response and development work activities. These include disaster preparedness, emergency health, disaster law, water and sanitation, and humanitarian diplomacy. </span></p><span data-dcnode-id="548" instrument_node="">
</span><h3 class="title-third" data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">HOW DOES IFRC WORK WITH GOVERNMENTS?</span></h3><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node=""> IFRC interfaces with Governments directly and through the National Societies. In a disaster response, IFRC provides leadership in the development of crisis management policies and programming approaches, facilitates Movement coordination and cooperation, and supports operations through Emergency Plans of Actions and resource mobilization efforts. In Asia-Pacific, the IFRC has 10 offices, led from Kuala Lumpur, Malaysia, which support the humanitarian work of 38 National Red Cross and Red Crescent Societies, and which respond each year to more than 40 per cent of the world’s disasters and public health emergencies. </span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="541" instrument_node="">
</span><span data-dcnode-id="538"><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icrc.org/" target="_blank" title=""><span data-dcnode-id="540" instrument_node="">International Committee of the Red Cross (ICRC)</span></a></span><span data-dcnode-id="537" instrument_node=""> is an impartial, neutral and independent organization mandated to protect the lives and dignity of victims of war and other situations of violence. During armed conflict, ICRC is responsible for directing and coordinating the RCRC Movement’s international relief activities. ICRC promotes International Humanitarian Law (IHL) and draws attention to universal humanitarian principles. ICRC has been granted observer status to the UN General Assembly. Its headquarters are in Geneva, Switzerland and it has country and regional offices throughout Asia and the Pacific. </span></p><span data-dcnode-id="535" instrument_node="">
</span><h3 class="title-third" data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">HOW DOES ICRC WORK WITH GOVERNMENTS?</span></h3><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node=""> Based on its mandate under the 1949 Geneva Conventions, the ICRC deals directly with Governments. In situations of armed conflict and other situations of violence, the ICRC may coordinate the activities of other components of the RCRC Movement. </span></p><span data-dcnode-id="529" instrument_node="">
</span><section data-dcnode-id="453" id="sec3C"><span data-dcnode-id="528" instrument_node="">
</span><h3 class="title-second" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">C. REGIONAL ORGANIZATIONS AND INTERGOVERNMENTAL FORUMS</span></h3><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node=""> In the Asia-Pacific region, there are many intergovernmental organizations that offer humanitarian tools and services to Member States and participating States. Several regional intergovernmental organizations and forums active in emergency preparedness and response are described here (Figure 5): </span></p><span data-dcnode-id="522" instrument_node="">
</span><ol data-dcnode-id="499"><span data-dcnode-id="521" instrument_node="">
</span><li data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Association of Southeast Asian Nations (ASEAN)</span></li><span data-dcnode-id="518" instrument_node="">
</span><li data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">ASEAN Regional Forum (ARF)</span></li><span data-dcnode-id="515" instrument_node="">
</span><li data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">East Asia Summit (EAS)</span></li><span data-dcnode-id="512" instrument_node="">
</span><li data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">South Asia Association for Regional Cooperation (SAARC)</span></li><span data-dcnode-id="509" instrument_node="">
</span><li data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Pacific Islands Forum (PIF)</span></li><span data-dcnode-id="506" instrument_node="">
</span><li data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Pacific Community (SPC)</span></li><span data-dcnode-id="503" instrument_node="">
</span><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Asia-Pacific Economic Cooperation (APEC)</span></li><span data-dcnode-id="500" instrument_node="">
</span></ol><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="497" instrument_node="">
</span><span data-dcnode-id="494"><a data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.asean.org/" target="_blank" title=""><span data-dcnode-id="496" instrument_node="">Association of Southeast Asian Nations (ASEAN)</span></a></span><span data-dcnode-id="493" instrument_node=""> was formed in 1967 following the signing of the ASEAN Declaration by Indonesia, Malaysia, the Philippines, Singapore and Thailand. The aim was to ensure economic, social, cultural, technical and education cooperation, and to promote regional peace and stability through respect for justice and the rule of law and adherence to the principles of the United Nations Charter. Since the early 2000s, ASEAN has increased its focus on and investment in disaster management. This is a result of the high exposure many of its Member States have to natural disasters and their experience of various disasters, including the 2004 Indian Ocean Earthquake and Tsunami disaster and the 2008 Cyclone Nargis in Myanmar. The ASEAN Agreement on Disaster Management and Emergency Response (AADMER), signed in July 2005, is the first legally- binding regional framework in this area. </span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node=""> In late 2015, ASEAN produced its ASEAN Vision 2025 and corresponding ASEAN Vision 2025 on Disaster Management. These set ambitious targets for ASEAN’s forward trajectory on peace and security, economic and socio-cultural issues. It also integrated the organization’s and its Member States’ commitments with international frameworks such as the 2030 Sustainable Development Agenda, Sendai Framework for Disaster Risk Reduction and, by implication, the Paris Agreement on Climate Change Action and World Humanitarian Summit. Following its 2016 Summit, ASEAN also adopted the “One ASEAN One Response” Declaration, which states that, by 2020, ASEAN should be able to “respond to disasters outside the region, where appropriate, in partnership with regional and international agencies and centres.” </span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="487" instrument_node="">
</span><strong data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">The ASEAN Secretariat (ASEC)</span></strong><span data-dcnode-id="484" instrument_node=""> was set up in 1976 by the Foreign Ministers of ASEAN countries to initiate,facilitate and coordinate ASEAN stakeholder collaboration in order to realise the purposes and principles of ASEAN as reflected in the ASEAN Charter. Its primary role is ensuring greater efficiency in the coordination of ASEAN organs for more effective implementation of ASEAN projects and activities. Within ASEC the </span><strong data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Disaster Management and Humanitarian Assistance (DMHA) Division</span></strong><span data-dcnode-id="481" instrument_node=""> serves as the AADMER secretariat, facilitating and monitoring progress in the implementation of the AADMER and its Work Programme. The Division works closely with relevant ASEAN bodies, in particular the ASEAN Committee on Disaster Management (ACDM), as well as with the AHA Centre, ASEAN Dialogue Partners, the United Nations, civil society partners, the Red Cross and Red Crescent Movement, the private sector, academia, and other entities. The ASEC is located in Jakarta, Indonesia. </span></p><span data-dcnode-id="479" instrument_node="">
</span><h3 class="title-third" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">HOW DOES ASEAN WORK WITH GOVERNMENTS?</span></h3><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="475" instrument_node=""> As the primary regional coordinating agency in disaster management, </span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asiadisasterguide.unocha.org/www.ahacentre.org" target="_blank" title=""><span data-dcnode-id="474" instrument_node="">the AHA Centre</span></a><span data-dcnode-id="472" instrument_node=""> is the first point of contact for ASEAN Member States in the event of a disaster. In the event of large-scale disasters or pandemics, the AHA Centre’s Executive Director assumes the role of ASEAN HAC and coordinates with ASEAN’s Secretary General. </span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="469" instrument_node="">
</span><span data-dcnode-id="466"><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//aseanregionalforum.asean.org/" target="_blank" title=""><span data-dcnode-id="468" instrument_node="">ASEAN Regional Forum (ARF),</span></a></span><span data-dcnode-id="465" instrument_node=""> whose membership extends beyond the 10 ASEAN Member States to include 27 participants, </span><button class="btn-tootltip" data-dcnode-id="463" data-original-title="It also contributes to confidence-building and preventive diplomacy in the region. In addition to the 10 ASEAN Member States, current members include Australia, Bangladesh, Canada, China, the Democratic People’s Republic of Korea, the European Union, India, Japan, the Republic of Korea, Mongolia, New Zealand, Pakistan, Papua New Guinea, Russia, Sri Lanka, Timor-Leste and the United States." data-placement="bottom" data-toggle="tooltip" title="" type="button"><span data-dcnode-id="464" instrument_node="">3</span></button><span data-dcnode-id="462" instrument_node=""> is a platform developed to foster constructive dialogue and consultation on political and security issues of common interest, including cooperation on disaster management. All ARF initiatives and activities abide by the principle of co-chairmanship, whereby each initiative/activity are co-chaired by at least one ASEAN Member State and at least one non-ASEAN ARF member. </span></p><span data-dcnode-id="460" instrument_node="">
</span><h3 class="title-third" data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">HOW DOES ARF WORK WITH GOVERNMENTS?</span></h3><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node=""> The ARF provides a platform for dialogue through a series of annual meetings. The most senior of these is held annually at the Foreign Minister level in conjunction with the ASEAN Foreign Ministers’ Meeting and Post Ministerial Conference. </span></p><span data-dcnode-id="454" instrument_node="">
</span></section><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="451" instrument_node="">
</span><span data-dcnode-id="448"><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//asean.org/asean/external-relations/east-asia-summit-eas/" target="_blank" title=""><span data-dcnode-id="450" instrument_node="">East Asia Summit (EAS)</span></a></span><span data-dcnode-id="447" instrument_node=""> is a regional forum for dialogue on broad strategic, political and economic issues of common interest and concern. It brings together the leaders of the 10 ASEAN Member States, as well as Australia, China, Japan, India, Korea, New Zealand, Russian Federation and the United States. Disaster response and humanitarian assistance are among the wide range of regional concerns covered by the EAS agenda. </span></p><span data-dcnode-id="445" instrument_node="">
</span><h3 class="title-third" data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">HOW DOES EAS WORK WITH GOVERNMENTS?</span></h3><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node=""> As an intergovernmental forum, the EAS meets at the Head of State level each year following the annual ASEAN leaders’ meeting, but it does not have a permanent secretariat entity. Agreed initiatives may be carried out by EAS members on behalf of the forum, such as the EAS Rapid Disaster Response Toolkit developed by Emergency Management Australia and Indonesia’s National Agency for Disaster Management (BNPB) in collaboration with the NDMOs of the 18 EAS participating countries and in consultation with the ACDM. </span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="438" instrument_node="">
</span><span data-dcnode-id="435"><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saarc-sec.org/" target="_blank" title=""><span data-dcnode-id="437" instrument_node="">South Asian Association for Regional Cooperation (SAARC)</span></a></span><span data-dcnode-id="434" instrument_node=""> was established in 1985 and comprises eight Member States: Afghanistan, Bangladesh, Bhutan, India, Maldives, Nepal, Pakistan and Sri Lanka. SAARC’s objectives, as laid out in its Charter, include promoting the welfare of the peoples of South Asia and improving their quality of life; accelerating economic growth, social progress and cultural development in the region; promoting and strengthening collective self-reliance; and promoting active collaboration and mutual assistance in economic, social, cultural, technical and scientific fields. SAARC’s identified areas of cooperation include Environment, Natural Disasters and Biotechnology. SAARC’s humanitarian architecture, comprised of the </span><a data-dcnode-id="432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//saarc-sdmc.nic.in/" target="_blank" title=""><span data-dcnode-id="433" instrument_node="">Disaster Management Centre (SDMC)</span></a><span data-dcnode-id="431" instrument_node=""> and the SAARC Agreement on Rapid Response to Natural Disasters, was signed in November 2011. </span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="428" instrument_node="">
</span><span data-dcnode-id="425"><a data-dcnode-id="426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forumsec.org/" target="_blank" title=""><span data-dcnode-id="427" instrument_node="">Pacific Islands Forum (PIF)</span></a></span><span data-dcnode-id="424" instrument_node=""> is an international organization established by treaty with 16 Member States across the Pacific region. </span><button class="btn-tootltip" data-dcnode-id="422" data-original-title="PIF members are Australia, Cook Islands, Federated States of Micronesia, Fiji, Kiribati, Nauru, New Zealand, Niue, Palau, Papua New Guinea, Republic of Marshall Islands, Samoa, Solomon Islands, Tonga, Tuvalu, and Vanuatu. In addition to SPC and PIF, Pacific Island countries are also networked through the Secretariat of the Pacific Regional Environment Programme (SPREP), which focuses on climate change and resource sustainability." data-placement="bottom" data-toggle="tooltip" title="" type="button"><span data-dcnode-id="423" instrument_node="">4</span></button><span data-dcnode-id="421" instrument_node=""> The PIF is mandated to stimulate economic growth and enhance political governance and security for the region through the provision of policy advice. Additionally, it is mandated to strengthen regional cooperation and integration by coordinating, monitoring and evaluating the implementation of leaders’ decisions. The PIF secretariat is in Suva, Fiji. </span></p><span data-dcnode-id="419" instrument_node="">
</span><h3 class="title-third" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">HOW DOES PIF WORK WITH GOVERNMENTS?</span></h3><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node=""> PIF holds an annual meeting at Head of Government level, followed by a Post Forum Dialogue with key Government partners. Discussions include disaster response and disaster response preparedness. </span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="412" instrument_node="">
</span><span data-dcnode-id="409"><a data-dcnode-id="410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spc.int/" target="_blank" title=""><span data-dcnode-id="411" instrument_node="">Pacific Community (SPC)</span></a></span><span data-dcnode-id="408" instrument_node=""> supports the 22 Pacific Island countries and territories </span><button class="btn-tootltip" data-dcnode-id="406" data-original-title="SPC membership comprises the PIF nations plus the territories of American Samoa, French Polynesia, Guam, New Caledonia, Northern Mariana Islands, Pitcairn Islands, Tokelau and Wallis and Futuna, as well as France and the United States of America." data-placement="bottom" data-toggle="tooltip" title="" type="button"><span data-dcnode-id="407" instrument_node="">5</span></button><span data-dcnode-id="405" instrument_node=""> by addressing the risks posed by climate vulnerability and natural disasters. PC is engaged in all sciences concerned with the Earth, including geological, physical, chemical and biological processes. The PC organizes its work according to three technical programme areas: oceans and islands; water and sanitation; and disaster reduction. Its headquarters are in Suva, Fiji. </span></p><span data-dcnode-id="403" instrument_node="">
</span><h3 class="title-third" data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">HOW DOES SPC WORK WITH GOVERNMENTS?</span></h3><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node=""> Although not involved in disaster response, the PC provides Member States with basic geological knowledge to support their disaster response preparedness capabilities. </span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="396" instrument_node="">
</span><span data-dcnode-id="393"><a data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apec.org/" target="_blank" title=""><span data-dcnode-id="395" instrument_node="">Asia-Pacific Economic Cooperation (APEC)</span></a></span><span data-dcnode-id="392" instrument_node=""> is a forum of 21 Pacific Rim economies promoting free trade and economic cooperation. The APEC Emergency Preparedness Working Group (EPWG) coordinates and facilitates emergency and disaster preparedness within APEC. The EPWG is focused on reducing the risk of disasters and building business and community resilience through capacity building, information exchange, knowledge sharing and collaboration among its 21-member economies. In 2015, APEC Leaders adopted the APEC Disaster Reduction Risk Framework to address concerns resulting from the persistence of disasters in Asia-Pacific Region. </span></p><span data-dcnode-id="390" instrument_node="">
</span><h3 class="title-third" data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">HOW DOES APEC WORK WITH GOVERNMENTS?</span></h3><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node=""> The APEC Emergency Preparedness Working Group is co-chaired by two-member economies for two years and meets three times a year, including once with the heads of NDMOs. It holds additional workshops as required. </span></p><span data-dcnode-id="384" instrument_node="">
</span><figure class="app-wrap-img" data-dcnode-id="377"><span data-dcnode-id="383" instrument_node="">
</span><figcaption class="txt-blue" data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Figure 5. Regional Organizations and Intergovernmental Forums in Asia-Pacific</span></figcaption><span data-dcnode-id="380" instrument_node="">
</span><img alt="" data-dcnode-id="379" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asiadisasterguide.unocha.org/images/figure/fig-5.png&amp;raw"><span data-dcnode-id="378" instrument_node="">
</span></figure><span data-dcnode-id="376" instrument_node="">
</span><section class="section-study" data-dcnode-id="356"><span data-dcnode-id="375" instrument_node="">
</span><h4 data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">CASE STUDY 1. INTEROPERABILITY BETWEEN INTERNATIONAL AND REGIONAL ORGANIZATIONS</span></h4><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node=""> In 2015, the United Nations General Assembly called for strengthening cooperation between the UN and regional and sub-regional organizations via frameworks reflecting the comparative advantages of the UN and regional organizations. It also called for the need to institutionalise and consolidate the interdependence into policy. </span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node=""> Regional organizations are increasingly active in humanitarian action, working to mobilize their membership to support the Government of an affected member state. One of the most advanced regional organizations in this regard is ASEAN. </span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node=""> Since 2011, ASEAN and the UN have elaborated their cooperation on disaster management through the ASEAN-UN Joint Strategic Plan of Action on Disaster Management (JSPADM). The JSPADM outlines the mutual intentions and commitments of participating ASEAN and UN entities and agencies, and is guided by the strategies and priorities incorporated by ASEAN in its AADMER Work Programme. The current iteration of the JSPADM, which covers the period 2016-2020, is organized according to the eight priority programmes included in the AADMER Work Programme (2016-2020). </span></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node=""> A practical example of ASEAN-UN interoperability under the JSPADM is the work undertaken by ASEAN and OCHA on response coordination. At the strategic level, OCHA and ASEAN’s joint commitment to humanitarian advocacy, coordination, planning and financing have been codified through development and agreement of an Interoperability Brief that details how the ASEAN Secretary-General, when acting as the ASEAN Humanitarian Assistance Coordinator (AHAC), and the United Nations ERC and their respective offices will work together during and in between major disaster responses. </span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node=""> At the operational level, OCHA and the AHA Centre are also working to enhance interoperability between deployable international and regional response mechanisms, such as the UNDAC and ERAT teams, and the coordination platforms that they establish and support, the OSOCC and JOCCA. Thus, UNDAC and ERAT regularly participate in joint simulation exercises and training to test their interoperability in terms of coordination, assessment, information sharing, and response planning. Building on this practical experience, OCHA and AHA Centre have developed a set of standard operating procedures (SOPs) for the UNDAC and ERAT systems, for use in training team members and to guide their interaction during response. </span></p><span data-dcnode-id="357" instrument_node="">
</span></section><span data-dcnode-id="355" instrument_node="">
</span><section data-dcnode-id="332" id="sec3D"><span data-dcnode-id="354" instrument_node="">
</span><h3 class="title-second" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">D. NON-GOVERNMENTAL ORGANIZATIONS</span></h3><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node=""> Civil-society actors can be divided into two categories: national and community-based non-governmental organizations (NGOs) and international NGOs (INGOs). In addition to their independent relationships with Governments, NGOs assemble themselves according to networks and consortia on global, regional and national or sub-national levels. </span></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="343"><span data-dcnode-id="347" instrument_node="">
</span><span data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">National and community-based NGOs</span></span><span data-dcnode-id="344" instrument_node=""> are civil-society organizations that function within the national borders of their home country. These NGOs, often in partnership with UN agencies and larger international NGOs, support the emergency preparedness and response activities of communities and national Governments. They generally possess strong community-based networks that are critical for reaching disaster-affected communities. National NGOs are officially registered as national organizations with their host Governments and can be either secular or faith-based entities. </span></p><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="334"><span data-dcnode-id="341" instrument_node="">
</span><span data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">International NGOs</span></span><span data-dcnode-id="338" instrument_node=""> operating in emergency preparedness and response include humanitarian and multi-mandated organizations that work independently to provide humanitarian assistance. The largest international NGOs, in terms of annual expenditure, are generally based in North America and Europe, and have regional and country offices across Asia and the Pacific and other parts of the world. </span><button class="btn-tootltip" data-dcnode-id="336" data-original-title="According to ALNAP, the five largest international NGOs, measured by expenditure on humanitarian programming in 2015, were Médecins sans Frontières, International Rescue Committee, Oxfam International, the International Save the Children Alliance, and World Vision International." data-placement="bottom" data-toggle="tooltip" title="" type="button"><span data-dcnode-id="337" instrument_node="">6</span></button><span data-dcnode-id="335" instrument_node=""> There are also a growing number of NGOs based in Asia and the Pacific with programmes of international reach. International NGOs receive regular funding from donor Governments, private foundations and corporations, but an increasing proportion of their resources now comes from the general public in their countries of origin and countries of operation. Like national NGOs, international NGOs can also be secular or faith-based. </span></p><span data-dcnode-id="333" instrument_node="">
</span></section><span data-dcnode-id="331" instrument_node="">
</span><h3 class="title-third" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">HOW DO NGOS WORK WITH GOVERNMENTS?</span></h3><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node=""> National and international NGOs often organize themselves according to consortia to engage with Government systems. Many NGOs also engage directly with Governments at local or, for larger NGOs, at the national level. In most countries, there are a number of national NGO consortia that do not attempt to be broadly representative of the entire NGO community. These will interface with Governments on sector-specific bases. </span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node=""> The presence of international NGOs in host countries is facilitated by an official registration with the host Government and guided by individual memorandums of understanding with NDMOs and line ministries engaged in humanitarian and development activities. Many </span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node=""> international NGOs are engaged in ongoing disaster preparedness, disaster risk reduction (DRR), or development work in countries, which helps them to quickly respond during a humanitarian crisis. In some countries there is an INGO Forum, which is the main point of engagement for international and national coordination structures. </span></p><span data-dcnode-id="319" instrument_node="">
</span><section class="section-study" data-dcnode-id="250"><span data-dcnode-id="318" instrument_node="">
</span><h4 data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">CASE STUDY 2. NGO ORGANIZATION FOR COLLECTIVE ACTION AT REGIONAL AND GLOBAL-LEVELS</span></h4><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node=""> At regional and international levels, NGO consortia are key to ensuring NGOs are strongly engaged and have a collective voice in humanitarian affairs. </span></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="311" instrument_node=""> In Asia and the Pacific, 53 national NGOs from 20 countries participate in a regional consortium called the </span><strong data-dcnode-id="308"><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.adrrn.net/about.html" target="_blank" title=""><span data-dcnode-id="310" instrument_node="">Asian Disaster Reduction and Response Network (ADRRN).</span></a></strong><span data-dcnode-id="307" instrument_node=""> ADRRN aims to promote coordination and information sharing among NGOs and other stakeholders for effective disaster reduction and response. With a strong footprint in the region, the network members are constantly engaged with local communities, thereby; strengthening their disaster resilience; providing humanitarian aid like food, water, shelter and health care; protecting critical facilities like schools and hospitals; creating awareness; advocating for policy changes and improving the capacity of community-based organizations. </span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="304" instrument_node=""> The </span><strong data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">South Asia Together for Humanitarian Imperative (SATHI)</span></strong><span data-dcnode-id="301" instrument_node=""> is made up of eight country-based NGO networks from the countries in SAARC region. This regional collaboration initiative provides a platform for civil society exchange, learning and knowledge sharing, collaborative advocacy and technical or operational capacity sharing. </span></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="298" instrument_node=""> The </span><strong data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">AADMER Partnership Group (APG)</span></strong><span data-dcnode-id="295" instrument_node=""> is a regional network of NGOs in ASEAN region. This network currently consists of six international NGOs and is chaired by a regional NGO (Mercy Malaysia). The APG is presently in the process of broadening its membership to include more regional NGOs and national NGO consortia, with the aim of achieving over 50% regional membership by mid-2018. </span></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="287"><span data-dcnode-id="292" instrument_node=""> The </span><strong data-dcnode-id="289"><a data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//app.adpc.net/" target="_blank" title=""><span data-dcnode-id="291" instrument_node="">Asia Preparedness Partnership (APP)</span></a></strong><span data-dcnode-id="288" instrument_node=""> is a regional platform that brings together NGO consortia, NDMO and private sector representatives from six countries to support each other in disaster preparedness activities. The secretariat of the APP is provided by the Asian Disaster Preparedness Centre. </span></p><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="280"><span data-dcnode-id="285" instrument_node=""> The </span><strong data-dcnode-id="282"><a data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icvanetwork.org/" target="_blank" title=""><span data-dcnode-id="284" instrument_node="">International Council of Voluntary Agencies (ICVA)</span></a></strong><span data-dcnode-id="281" instrument_node=""> is a global network of over 110 national, regional and international NGOs. ICVA’s mission is to make humanitarian action more principled and effective by supporting NGOs’ efforts to influence policy and practice. ICVA is based in Geneva, Switzerland and has established regional hubs in Africa, Middle East and Asia to better support NGOs at regional and national levels. </span></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="278" instrument_node="">
</span><strong data-dcnode-id="275"><a data-dcnode-id="276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.schr.info/" target="_blank" title=""><span data-dcnode-id="277" instrument_node="">InterAction</span></a></strong><span data-dcnode-id="274" instrument_node=""> is an alliance of 180+ international NGOs and partners committed to eliminating extreme poverty and vulnerability, strengthening human rights and citizen participation, safeguarding a sustainable planet, promoting peace, and ensuring dignity for all people. </span></p><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="271" instrument_node=""> The </span><strong data-dcnode-id="268"><a data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.schr.info/" target="_blank" title=""><span data-dcnode-id="270" instrument_node="">Steering Committee for Humanitarian Response (SCHR)</span></a></strong><span data-dcnode-id="267" instrument_node=""> is a voluntary alliance of nine of the world’s leading international NGOs. The SCHR supports quality, accountability and learning in humanitarian action. </span></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="264" instrument_node=""> The </span><strong data-dcnode-id="261"><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//startnetwork.org/" target="_blank" title=""><span data-dcnode-id="263" instrument_node="">START Network,</span></a></strong><span data-dcnode-id="260" instrument_node=""> made up of 42 national and international aid agencies, aims to change the humanitarian system through a range of innovative aid programmes and by developing new forms of aid finance. </span></p><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="252"><span data-dcnode-id="257" instrument_node=""> The </span><strong data-dcnode-id="254"><a data-dcnode-id="255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.near.ngo/" target="_blank" title=""><span data-dcnode-id="256" instrument_node="">NEAR Network</span></a></strong><span data-dcnode-id="253" instrument_node=""> is a newly-formed global network, consisting of local and national organizations united by the goal of making sure that humanitarian action is locally-led and that more efficient and effective aid is delivered to people in need. </span></p><span data-dcnode-id="251" instrument_node="">
</span></section><span data-dcnode-id="249" instrument_node="">
</span><section data-dcnode-id="238" id="sec3E"><span data-dcnode-id="248" instrument_node="">
</span><h3 class="title-second" data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">E. ASSISTING GOVERNMENTS</span></h3><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="244" instrument_node="">
</span><span data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Assisting (donor) Governments</span></span><span data-dcnode-id="241" instrument_node=""> are central to disaster response. Governments can assist directly through bilateral contributions to affected States, including through the mobilization of in-kind aid of MCDA. They can also channel funding through multilateral agencies such as UN agencies, regional organizations, the RCRC Movement and NGOs. Several Governments routinely respond to the needs of disaster-affected States, both from within the Asia and the Pacific region as well as from Europe and the Americas (Figure 6). </span></p><span data-dcnode-id="239" instrument_node="">
</span></section><span data-dcnode-id="237" instrument_node="">
</span><h3 class="title-third" data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">HOW DO ASSISTING GOVERNMENTS WORK WITH AFFECTED GOVERNMENTS?</span></h3><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node=""> Many assisting Governments have established aid cooperation structures, often embedded in their respective Ministry of Foreign Affairs. The day-to-day management of the cooperation takes place through the embassies in the affected countries. </span></p><span data-dcnode-id="231" instrument_node="">
</span><figure class="app-wrap-img" data-dcnode-id="221"><span data-dcnode-id="230" instrument_node="">
</span><figcaption class="txt-blue" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Figure 6. Active Donors in Asia-Pacific</span></figcaption><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node=""> This graphic provides an overview of the top donors to the Asia-Pacific countries that suffered significant disasters each year between 2013-2017. </span></p><span data-dcnode-id="224" instrument_node="">
</span><img alt="" data-dcnode-id="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asiadisasterguide.unocha.org/images/figure/fig-6.png&amp;raw"><span data-dcnode-id="222" instrument_node="">
</span></figure><span data-dcnode-id="220" instrument_node="">
</span><section data-dcnode-id="203" id="sec3F"><span data-dcnode-id="219" instrument_node="">
</span><h3 class="title-second" data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">F. FOREIGN MILITARY ASSETS</span></h3><span data-dcnode-id="216" instrument_node="">
</span><p data-dcnode-id="211"><span data-dcnode-id="215" instrument_node=""> In large-scale natural disasters, where affected States request, welcome or accept international assistance, </span><span data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">foreign military assets (FMA)</span></span><span data-dcnode-id="212" instrument_node=""> are increasingly involved in response operations. FMA may deploy in another sovereign country on the basis of bilateral agreements, such as a Status of Forces Agreement (SOFA), or multilateral agreements between Governments. </span></p><span data-dcnode-id="210" instrument_node="">
</span><p data-dcnode-id="208"><span data-dcnode-id="209" instrument_node=""> For its part, the humanitarian community must determine a basic strategy and a coherent and consistent approach towards interaction with military actors and the use of foreign and/or national military assets to support humanitarian response operations. </span></p><span data-dcnode-id="207" instrument_node="">
</span><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node=""> OCHA and dedicated Humanitarian Civil-Military Coordination (UN-CMCoord) personnel have developed a UN-CMCoord strategy. It outlines the appropriate coordination mechanisms and liaison arrangements with national and/ or foreign military actors as necessary. This includes establishing links to all humanitarian actors and coordination bodies, as well as appropriate staffing and training within all organizations involved. </span></p><span data-dcnode-id="204" instrument_node="">
</span></section><span data-dcnode-id="202" instrument_node="">
</span><h3 class="title-third" data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">HOW DO FMA WORK IN SUPPORT OF GOVERNMENTS</span></h3><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="197"><span data-dcnode-id="198" instrument_node=""> Most requests for FMA by humanitarian organizations are for indirect assistance and infrastructure support, including engineering, transport and air lift capacity. FMA should only be deployed at the request, or with the consent, of the affected state and should be provided at no cost. FMA should be requested only where they can satisfy a critical humanitarian need and where there is no comparable civilian alternative, i.e. they are unique in capability and availability. According to the context and applicable UN-CMCoord strategy, a dedicated Request for Assistance (RFA) process for the use of FMA should be established as early as possible in the operation. </span></p><span data-dcnode-id="196" instrument_node="">
</span><section data-dcnode-id="137" id="sec3G"><span data-dcnode-id="195" instrument_node="">
</span><h3 class="title-second" data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">G. PRIVATE SECTOR</span></h3><span data-dcnode-id="192" instrument_node="">
</span><p data-dcnode-id="187"><span data-dcnode-id="191" instrument_node="">
</span><span data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">The Private sector</span></span><span data-dcnode-id="188" instrument_node=""> is a fundamental part of local communities affected by humanitarian crises, and it has long been engaged in humanitarian emergency preparedness, response and recovery. Private sector actors are present before humanitarian crises occur and as crises unfold, and they are among the first part of society to respond. Both small and large private sector actors, whether they are operating directly in humanitarian contexts or indirectly through supply chains, can leverage their own expertise, resources, channels and influence to </span></p><span data-dcnode-id="186" instrument_node="">
</span><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node=""> address humanitarian needs and make positive contributions to long-term sustainable peace and development. They can do so independently by working directly with people affected by humanitarian crises, as well as by collaborating with humanitarian organizations at the local, regional and international levels. </span></p><span data-dcnode-id="183" instrument_node="">
</span><p data-dcnode-id="177"><span data-dcnode-id="182" instrument_node="">
</span><span data-dcnode-id="179"><a data-dcnode-id="180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.connectingbusiness.org/" target="_blank" title=""><span data-dcnode-id="181" instrument_node="">Connecting Business initiative (CBi)</span></a></span><span data-dcnode-id="178" instrument_node=""> is a private sector-led, multi-stakeholder initiative that aims to transform the way the private sector engages before, during and after humanitarian crises. Led by OCHA and United Nations Development Programme (UNDP), CBi supports private sector networks’ efforts to create more resilient communities through coordinated action in disaster risk reduction, emergency preparedness, response and recovery. Through the CBi network, private sector entities are connected and contribute to country- based structures. Such collective action shows significant benefits and helps companies to: </span></p><span data-dcnode-id="176" instrument_node="">
</span><ol data-dcnode-id="156"><span data-dcnode-id="175" instrument_node="">
</span><li data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Protect their business and value chains from shocks by integrating disaster risk reduction into investment and business processes;</span></li><span data-dcnode-id="172" instrument_node="">
</span><li data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Stream-line their engagement through a single, coordinated channel rather than as individual entities;</span></li><span data-dcnode-id="169" instrument_node="">
</span><li data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">Identify partnership opportunities as a result of their connection to national disaster management planning, policies and processes;</span></li><span data-dcnode-id="166" instrument_node="">
</span><li data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Pool their resources for greater impact and fewer transaction costs;</span></li><span data-dcnode-id="163" instrument_node="">
</span><li data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">Access information that helps them to disseminate alerts and information in emergency situations, receive advice and connect to a support network of CBi global partners as well as CBi Member Networks; and</span></li><span data-dcnode-id="160" instrument_node="">
</span><li data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">Contribute to improving policies and regulations through collective private sector voice.</span></li><span data-dcnode-id="157" instrument_node="">
</span></ol><span data-dcnode-id="155" instrument_node="">
</span><p data-dcnode-id="153"><span data-dcnode-id="154" instrument_node=""> At the start of 2018, CBi supported five platforms in Asia and the Pacific – in Fiji, Myanmar, Philippines, Sri Lanka and Vanuatu, as well as a regional platform in the Pacific (Figure 7). </span></p><span data-dcnode-id="152" instrument_node="">
</span><p data-dcnode-id="147"><span data-dcnode-id="151" instrument_node=""> For more information: </span><a data-dcnode-id="149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.connectingbusiness.org/" target="_blank"><span data-dcnode-id="150" instrument_node="">www.connectingbusiness.org</span></a><span data-dcnode-id="148" instrument_node="">
</span></p><span data-dcnode-id="146" instrument_node="">
</span><figure class="app-wrap-img" data-dcnode-id="139"><span data-dcnode-id="145" instrument_node="">
</span><figcaption class="txt-blue" data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">Figure 7. Connecting Business Initiative National Hubs in Asia-Pacific</span></figcaption><span data-dcnode-id="142" instrument_node="">
</span><img alt="" data-dcnode-id="141" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asiadisasterguide.unocha.org/images/figure/fig-7.png&amp;raw"><span data-dcnode-id="140" instrument_node="">
</span></figure><span data-dcnode-id="138" instrument_node="">
</span></section><span data-dcnode-id="136" instrument_node="">
</span><h3 class="title-third" data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">HOW DOES THE PRIVATE SECTOR WORK WITH GOVERNMENTS?</span></h3><span data-dcnode-id="133" instrument_node="">
</span><p data-dcnode-id="131"><span data-dcnode-id="132" instrument_node=""> Governments may be approached by private sector companies that wish to offer assistance and should examine those offers on their own merits. The modalities for private sector assistance are varied, and it may be convenient to reach out to a broader spectrum of companies interested in contributing to disaster relief through the national or local level Chamber of Commerce (or equivalent) or CBi Network, where they exist. </span></p><span data-dcnode-id="130" instrument_node="">
</span><p data-dcnode-id="128"><span data-dcnode-id="129" instrument_node=""> The majority of private sector support for disaster response is conducted independently. Although the private sector has its own engagement with communities, it should, like other humanitarian stakeholders, coordinate activities with Governments and follow national response planning and strategies. </span></p><span data-dcnode-id="127" instrument_node="">
</span></div><span data-dcnode-id="125" instrument_node="">
