</span><h1 class="page-header" data-dcnode-id="5372"><span data-dcnode-id="5373" instrument_node="">Deliver Humanitarian Aid</span></h1><span data-dcnode-id="5371" instrument_node="">

</span><div class="content" data-dcnode-id="887"><span data-dcnode-id="5363" instrument_node="">
</span><div class="field-name-field-image" data-dcnode-id="5361"><img alt="A young girl standing near tents in refugee camp in Iraq." data-dcnode-id="5362" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.un.org/sites/un2.un.org/files/styles/banner-image-style-27-10/public/2021/05/young-girl-in-refugee-camp-iraq-2014.jpg%3Fitok%3D1_wRlR8D&amp;raw"></div><span data-dcnode-id="5360" instrument_node="">
</span><div class="image-metadata" data-dcnode-id="5357"><span class="photo-credit" data-dcnode-id="5358"><span data-dcnode-id="5359" instrument_node="">A young girl standing by her tent in the Warga Dalal camp in Zakho, northern Iraq in October 2014, where an estimated 2.8 million people were in need of food and approximately 800.000 people in urgent need of emergency shelter. The United Nations Refugee Agency (UNHCR) delivered supplies to that camp such as tent insulation and flooring which would keep refugees warm in the harsh winter months.  OCHA/Iason Athanasiadis</span></span></div><span data-dcnode-id="5356" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="889"><div class="field-items" data-dcnode-id="890"><div class="field-item even" data-dcnode-id="891" property="content:encoded"><div class="row" data-dcnode-id="5341"><span data-dcnode-id="5355" instrument_node="">
</span><div class="col-md-3 col-sm-12" data-dcnode-id="5353"><span data-dcnode-id="5354" instrument_node=""> </span></div><span data-dcnode-id="5352" instrument_node="">
</span><div class="col-md-6 col-sm-12" data-dcnode-id="5346"><p data-dcnode-id="5350"><span data-dcnode-id="5351" instrument_node="">One of the purposes of the United Nations, as stated in its Charter, is "to achieve international co-operation in solving international problems of an economic, social, cultural, or humanitarian character." The UN first did this in the aftermath of the Second World War on the devastated continent of Europe, which it helped to rebuild.</span></p><span data-dcnode-id="5349" instrument_node="">
</span><p data-dcnode-id="5347"><span data-dcnode-id="5348" instrument_node="">The Organization is now relied upon by the international community to coordinate humanitarian relief of emergencies due to natural and man-made disasters in areas beyond the relief capacity of national authorities alone.</span></p></div><span data-dcnode-id="5345" instrument_node="">
</span><div class="col-md-3 col-sm-12" data-dcnode-id="5343"><span data-dcnode-id="5344" instrument_node=""> </span></div><span data-dcnode-id="5342" instrument_node="">
</span></div><span data-dcnode-id="5340" instrument_node="">

</span><p class="photo-credit" data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node="">"Each day I wake up in the hope of bringing about change. A change in the life of someone in need." The psychosocial camp counsellor for Atma IDP camp, herself displaced since 2012, visits displaced families every day to talk about their stresses and offer support to children who have lost their parents.  ©OCHA</span></p><span data-dcnode-id="4829" instrument_node="">
</span><p data-dcnode-id="4821"><span data-dcnode-id="4828" instrument_node="">The </span><a data-dcnode-id="4826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unocha.org/"><span data-dcnode-id="4827" instrument_node="">Office for the Coordination of Humanitarian Affairs</span></a><span data-dcnode-id="4825" instrument_node=""> (OCHA) of the UN Secretariat is responsible for coordinating responses to emergencies. It does this through the </span><a data-dcnode-id="4823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//interagencystandingcommittee.org/"><span data-dcnode-id="4824" instrument_node="">Inter-Agency Standing Committee</span></a><span data-dcnode-id="4822" instrument_node="">, whose members include the UN system entities most responsible for providing emergency relief. A coordinated, system-wide approach to humanitarian relief is essential in providing assistance quickly and efficiently to those in need.</span></p><span data-dcnode-id="4820" instrument_node="">
</span><p data-dcnode-id="4812"><span data-dcnode-id="4819" instrument_node="">OCHA’s mandate stems from </span><a data-dcnode-id="4817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.un.org/Docs/journal/asp/ws.asp%3Fm%3DA/RES/46/182" target="_blank"><span data-dcnode-id="4818" instrument_node="">General Assembly resolution 46/182</span></a><span data-dcnode-id="4816" instrument_node=""> of December 1991, which states: "The leadership role of the Secretary-General is critical and must be strengthened to ensure better preparation for, as well as rapid and coherent response to, natural disasters and other emergencies. This should be achieved through coordinated support for prevention and preparedness measures and the optimal utilization of,</span><em data-dcnode-id="4814"><span data-dcnode-id="4815" instrument_node=""> inter alia</span></em><span data-dcnode-id="4813" instrument_node="">, an inter-agency standing committee, consolidated appeals, a central emergency revolving fund and a register of stand-by capacities."</span></p><span data-dcnode-id="4811" instrument_node="">

</span><p class="photo-credit" data-dcnode-id="4303"><span data-dcnode-id="4304" instrument_node="">2020: A year of unprecedented need around the world. CERF met the challenge - allocating a record $900 million, it delivered life-saving assistance in 52 countries with unparalleled speed. CERF provided a record $225 million to 20 underfunded and neglected crises. First ever global pandemic allocation. First ever allocation to NGOs, CERF helped humanitarian partners reach those in greatest need. ©CERF</span></p><span data-dcnode-id="4302" instrument_node="">
</span><p data-dcnode-id="4297"><span data-dcnode-id="4301" instrument_node="">The UN </span><a data-dcnode-id="4299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unocha.org/cerf/"><span data-dcnode-id="4300" instrument_node="">Central Emergency Response Fund (CERF)</span></a><span data-dcnode-id="4298" instrument_node="">, managed by OCHA, is one of the fastest and most effective ways to support rapid humanitarian response for people affected by natural disasters and armed conflict. CERF receives voluntary contributions year-round to provide immediate funding for life-saving humanitarian action anywhere in the world.</span></p><span data-dcnode-id="4296" instrument_node="">

</span><p class="grey-well" data-dcnode-id="4262"><span data-dcnode-id="4281" instrument_node="">The </span><a data-dcnode-id="4279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.undp.org/content/undp/en/home.html"><span data-dcnode-id="4280" instrument_node="">United Nations Development Programme</span></a><span data-dcnode-id="4278" instrument_node=""> (UNDP), the </span><a data-dcnode-id="4276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/"><span data-dcnode-id="4277" instrument_node="">United Nations Refugee Agency</span></a><span data-dcnode-id="4275" instrument_node=""> (UNHCR), the </span><a data-dcnode-id="4273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unicef.org/"><span data-dcnode-id="4274" instrument_node="">United Nations Children's Fund</span></a><span data-dcnode-id="4272" instrument_node=""> (UNICEF) and the </span><a data-dcnode-id="4270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wfp.org/"><span data-dcnode-id="4271" instrument_node="">World Food Programme</span></a><span data-dcnode-id="4269" instrument_node=""> (WFP) have primary roles in the delivery of relief assistance.</span><br data-dcnode-id="4268"><br data-dcnode-id="4267"><span data-dcnode-id="4266" instrument_node="">The </span><a data-dcnode-id="4264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.who.org/"><span data-dcnode-id="4265" instrument_node="">World Health Organization</span></a><span data-dcnode-id="4263" instrument_node=""> (WHO) coordinates the response to humanitarian health emergencies.</span></p></div><span data-dcnode-id="4260" instrument_node="">

</span><p data-dcnode-id="4241"><span data-dcnode-id="4245" instrument_node="">The </span><a data-dcnode-id="4243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.undp.org/content/undp/en/home.html"><span data-dcnode-id="4244" instrument_node="">United Nations Development Programme</span></a><span data-dcnode-id="4242" instrument_node=""> (UNDP) is responsible for operational activities for natural disaster mitigation, prevention and preparedness.</span></p><span data-dcnode-id="4240" instrument_node="">
</span><p data-dcnode-id="4235"><span data-dcnode-id="4239" instrument_node="">When emergencies occur, </span><a data-dcnode-id="4237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsdg.un.org/2030-agenda/leadership"><span data-dcnode-id="4238" instrument_node="">UNDP Resident Coordinators</span></a><span data-dcnode-id="4236" instrument_node=""> coordinate relief and rehabilitation efforts at the national level.</span></p></div><span data-dcnode-id="4233" instrument_node="">

</span><div class="col-md-6 col-sm-12" data-dcnode-id="3693"><h3 data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">Helping refugees</span></h3><span data-dcnode-id="3714" instrument_node="">
</span><p data-dcnode-id="3709"><span data-dcnode-id="3713" instrument_node="">The </span><a data-dcnode-id="3711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/"><span data-dcnode-id="3712" instrument_node="">UN Refugee Agency</span></a><span data-dcnode-id="3710" instrument_node=""> (UNHCR) emerged in the wake of World War II to help Europeans displaced by that conflict. The agency leads and coordinates international action to protect refugees and resolve refugee problems worldwide.</span></p><span data-dcnode-id="3708" instrument_node="">
</span><p data-dcnode-id="3700"><span data-dcnode-id="3707" instrument_node="">The General Assembly created the </span><a data-dcnode-id="3705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unrwa.org/"><span data-dcnode-id="3706" instrument_node="">United Nations Relief and Works Agency for Palestine Refugees in the Near East</span></a><span data-dcnode-id="3704" instrument_node=""> (UNRWA) to provide emergency relief to some 750,000 Palestine refugees, who had lost their homes and livelihoods as a result of the 1948 Arab-Israeli conflict. Today, some </span><a data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unrwa.org/palestine-refugees"><span data-dcnode-id="3703" instrument_node="">5 million Palestine refugees</span></a><span data-dcnode-id="3701" instrument_node=""> are eligible for UNRWA services.</span></p><span data-dcnode-id="3699" instrument_node="">
</span><p data-dcnode-id="3694"><span data-dcnode-id="3698" instrument_node="">The UN General Assembly hosted a </span><a data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//refugeesmigrants.un.org/summit"><span data-dcnode-id="3697" instrument_node="">high-level meeting</span></a><span data-dcnode-id="3695" instrument_node=""> on 19 September 2016 to address large movements of refugees and migrants, with the aim of bringing countries together behind a more humane and coordinated approach.</span></p></div><span data-dcnode-id="3692" instrument_node="">

</span><div class="col-md-6 col-sm-12" data-dcnode-id="3164"><h3 data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">Helping children</span></h3><span data-dcnode-id="3176" instrument_node="">
</span><p data-dcnode-id="3171"><span data-dcnode-id="3175" instrument_node="">Since its beginning, </span><a data-dcnode-id="3173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unicef.org/"><span data-dcnode-id="3174" instrument_node="">The United Nations Children's Fund (UNICEF)</span></a><span data-dcnode-id="3172" instrument_node=""> has strived to reach as many children as possible with effective, low-cost solutions to counter the biggest threats to their survival. UNICEF also consistently urges governments and warring parties to act more effectively to protect children.</span></p><span data-dcnode-id="3170" instrument_node="">
</span><p data-dcnode-id="3165"><span data-dcnode-id="3169" instrument_node="">The </span><a data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unicef.org/media/87611/file/Core%2520Commitments%2520for%2520Children%2520%28English%29.pdf"><span data-dcnode-id="3168" instrument_node="">Core Commitments for Children in Humanitarian Action</span></a><span data-dcnode-id="3166" instrument_node=""> – the CCCs – are the core UNICEF policy and framework for humanitarian action. They are at the heart of UNICEF's work on upholding the rights of children affected by humanitarian crises. The CCCs promote equality, transparency, responsibility and a results-oriented approach to enable predictable and timely collective humanitarian action. </span></p></div><span data-dcnode-id="3163" instrument_node="">
