</span><article data-dcnode-id="222" id="post-875"><span data-dcnode-id="963" instrument_node="">
</span><header class="entry-header clr" data-dcnode-id="957"><span data-dcnode-id="962" instrument_node="">
</span><h2 class="single-post-title entry-title" data-dcnode-id="960" itemprop="headline"><span data-dcnode-id="961" instrument_node="">17 Jobs You Can Get in Refugee Aid</span></h2><span data-dcnode-id="958" instrument_node="">
</span></header><span data-dcnode-id="955" instrument_node="">
</span><div class="thumbnail" data-dcnode-id="951"><span data-dcnode-id="954" instrument_node="">
</span><img alt="You are currently viewing 17 Jobs You Can Get in Refugee Aid" class="attachment-full size-full wp-post-image" data-dcnode-id="953" height="400" itemprop="image" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanitariancareers.com/wp-content/uploads/2021/04/Refugee-Girl-small-1.jpg&amp;raw" srcset="https://humanitariancareers.com/wp-content/uploads/2021/04/Refugee-Girl-small-1.jpg 600w, https://humanitariancareers.com/wp-content/uploads/2021/04/Refugee-Girl-small-1-300x200.jpg 300w" width="600"><span data-dcnode-id="952" instrument_node="">
</span></div><span data-dcnode-id="949" instrument_node="">
</span><div class="entry-content clr" data-dcnode-id="342" itemprop="text"><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="945"><span class="has-inline-color has-black-color" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Currently, in 2021, there are more people displaced by conflicts and disasters than in any time in human history. With 79.5 million refugees in the world, significant work is being done to assist displaced people. A career working with refugees can be highly rewarding, with the chance to directly impact people who have often lost all they have as they flee from war, crises or persecution.</span></span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="941"><span class="has-inline-color has-black-color" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">However, you may be wondering how the education and skills you have can be used in jobs helping refugees, or what kinds of roles organisations that work with refugee’s recruit? As the worldwide refugee crises is huge in scale there are almost unlimited role in the refugee aid sector. We’ve broken down some of the key jobs that work directly assisting refugees…</span></span></p><span data-dcnode-id="940" instrument_node="">
</span><h2 data-dcnode-id="935"><strong data-dcnode-id="936"><u data-dcnode-id="937"><span class="has-inline-color has-black-color" data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Field Coordinator</span></span></u></strong></h2><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="931"><span class="has-inline-color has-black-color" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">One of the main jobs you can get working with refugees is known as Field Coordinator. Humanitarian NGOs set-up bases of operations in areas where refugee settlements are established, and a Field Coordinator are responsible for managing refugee assistance projects at a specific base. The job of Field Coordinator oversees the direct implementation of refugee aid programmes.</span></span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="927"><span class="has-inline-color has-black-color" data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">The job Field Coordinator manages all aspects of an NGOs refugee aid operation. The role includes managing the team, ensuring logistics, finance and grant management, as well as overseeing safety and security and distribution of aid to refugees. Humanitarian NGOs working in refugee aid have a Field Coordinator for each area of operation, meaning responses with many refugee settlements will have multiple jobs.</span></span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="923"><span class="has-inline-color has-black-color" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">In order to get a job as a Field Coordinator working in refugee aid you need several years front-line humanitarian field experience. The position also requires extensive knowledge of humanitarian logistics, project management, HR, finance and grants. To be a Field Coordinator in a refugee response you also need strong understanding of how refugee assistance programmes are ran.</span></span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="919"><span class="has-inline-color has-black-color" data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Some of the top NGOs recruiting Field Coordinator jobs with refugees are:</span></span></p><span data-dcnode-id="918" instrument_node="">
</span><ul data-dcnode-id="901"><li data-dcnode-id="914"><a data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rescue.org/careers" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">International Rescue Committee</span></span></a></li><li data-dcnode-id="910"><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medecinsdumonde.org/en/recrutement/work-abroad" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Médecins du Monde</span></span></a></li><li data-dcnode-id="906"><a data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.solidarites.org/en/since-1980/join-us/jobs/" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Solidarites International</span></span></a></li><li data-dcnode-id="902"><span class="has-inline-color has-black-color" data-dcnode-id="903"><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.actioncontrelafaim.org/en/recruitment-what-we-offer/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="905" instrument_node="">Action Contre la Faim</span></a></span></li></ul><span data-dcnode-id="900" instrument_node="">
</span><h2 data-dcnode-id="895"><strong data-dcnode-id="896"><u data-dcnode-id="897"><span class="has-inline-color has-black-color" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Case Worker</span></span></u></strong></h2><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="891"><span class="has-inline-color has-black-color" data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Another important front-line job working with refugees is a Case Worker. Case Workers assist refugees directly with a ride range of issues. In countries of resettlement, Case Workers can help refugees with accessing services or asylum claims. In refugee camps, Case Workers can assist especially vulnerable refugees and help to ensure their protection.</span></span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="884"><span class="has-inline-color has-black-color" data-dcnode-id="885"><span data-dcnode-id="889" instrument_node="">The job of a Case Worker helps refugees with information, support, advocacy and guidance to ensure they can access services. The role of </span><a data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/social-care-network/2013/jun/21/day-in-life-refugee-integration-caseworker" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="888" instrument_node="">Case Worker is to help refugees settle in their new locatio</span></a><span data-dcnode-id="886" instrument_node="">n and assist them to integrate into the society they are now in. A crucial part of the job of Case Worker is to inform refugees of their rights and entitlements and help them to avoid exploitation.</span></span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="880"><span class="has-inline-color has-black-color" data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">The job of refugee Case Worker can be paid or a volunteer position. The position of Case Worker usually requires some experience working with refugees or vulnerable people. More senior jobs as refugee Case Workers may require qualifications in social work.</span></span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="876"><span class="has-inline-color has-black-color" data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">If you are looking for jobs as a Case Worker with refugees, check out the job pages for some these NGOs, among others:</span></span></p><span data-dcnode-id="875" instrument_node="">
</span><ul data-dcnode-id="858"><li data-dcnode-id="871"><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redcross.org.uk/get-involved/jobs" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">British Red Cross</span></span></a></li><li data-dcnode-id="867"><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rescue.org/careers" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">International Rescue Committee</span></span></a></li><li data-dcnode-id="863"><a data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugee-action.org.uk/about/jobs_at_refugee_action/" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Refugee Action</span></span></a></li><li data-dcnode-id="859"><span class="has-inline-color has-black-color" data-dcnode-id="860"><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refugeecouncil.org.uk/about-us/work-for-refugee-council/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="862" instrument_node="">Refugee Council England</span></a></span></li></ul><span data-dcnode-id="857" instrument_node="">
</span><h2 data-dcnode-id="852"><strong data-dcnode-id="853"><u data-dcnode-id="854"><span class="has-inline-color has-black-color" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Community Health Worker</span></span></u></strong></h2><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="848"><span class="has-inline-color has-black-color" data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Community Health Workers are on the front-line of refugee responses. The job of Community Health Worker is to distribute crucial health messaging to refugee populations, whilst also assisting them to gain access to healthcare. Community Health Workers are usually employed from the refugee community so as to ensure they are fully integrated into the refugee community’s needs.</span></span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="844"><span class="has-inline-color has-black-color" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">The job of Community Health Worker is a key position directly assisting refugees. When people are displaced, they often lose access to medical services. They can also struggle to get their health needs met as they migrate or in their new places of settlement. The role of Community Health Worker is to directly assist refugees in their health needs, whilst also making sure they have the medical information they need.</span></span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="840"><span class="has-inline-color has-black-color" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">If you want to be a Community Health Worker assisting refugees, you usually need some medical experience. You will also need some health-related qualifications, often in nursing, midwifery or as a paramedic. Community Health Workers often come from refugee populations, and so it is a great job to apply for if you are a refugee and want to work assisting your community.</span></span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="836"><span class="has-inline-color has-black-color" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Community Health Worker jobs are recruited locally in the field and so you will need to search local job boards.</span></span></p><span data-dcnode-id="835" instrument_node="">
</span><h2 data-dcnode-id="830"><strong data-dcnode-id="831"><u data-dcnode-id="832"><span class="has-inline-color has-black-color" data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Human Rights Lawyer</span></span></u></strong></h2><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="826"><span class="has-inline-color has-black-color" data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">A very important job that works with refugees is human rights lawyer. A human right lawyer can take on refugee cases where human rights have been violated and work to assist them to receive justice. The role of a human rights lawyer is to work on behalf of refugees through a range of legal avenues, addressing cases specific to individual, or groups of, refugees.</span></span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="822"><span class="has-inline-color has-black-color" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Working as a human rights lawyers means using legal proceeding to protect vulnerable people, often refugees, as well as working to protect, where possible, others from human rights violations. Human rights law is an extensive area of the legal profession and working as human rights lawyer can be a great way to use legal knowledge and qualifications to assist refugees.</span></span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="818"><span class="has-inline-color has-black-color" data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">To get a job as a human rights lawyer working in refugee aid you first need to go to law school. Once you have achieved the correct legal qualifications, ideally specialising in human rights, you need to go through the process in your country to become a certified lawyer. This is different for each country. After you are a qualified lawyer you also choose to focus on human rights work to help refugees.</span></span></p><span data-dcnode-id="817" instrument_node="">
</span><h2 data-dcnode-id="814"><span class="has-inline-color has-black-color" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">MHPSS Officer</span></span></h2><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="810"><span class="has-inline-color has-black-color" data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Mental health is fast becoming a key area in refugee aid. The job of Mental Health and Psycho-Social Support Officer (MHPSS) is to implement the mental health programme of an NGO assisting refugees. The job can work managing teams of psychologists and councillors, as well as developing MHPSS tools, practices and conducting supervisions. The role of MHPSS Officer is the main front-line mental health job working with refugees.</span></span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="806"><span class="has-inline-color has-black-color" data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">The position of MHPSS Officer oversees the day-to-day management of the mental health programme of an NGO working in refugee aid. Refugee MHPSS projects are often integrated with medical projects and the MHPSS Officer must work to ensure refugees that access healthcare can have their mental health needs met too. Refugee MHPSS projects also need to be culturally sensitive and MHPSS Officer must work to ensure this.</span></span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="802"><span class="has-inline-color has-black-color" data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">If you want to work as an MHPSS Officer helping refugees you first need to gain formal qualifications in mental health. You will then need to have some experience working on the front-line with refugees, such as in a councillor or social worker role.</span></span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="798"><span class="has-inline-color has-black-color" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Many NGOs are now including mental health support to refugees in their responses. Some of the leading NGOs recruiting MHPSS Officer jobs to work with refugees include:</span></span></p><span data-dcnode-id="797" instrument_node="">
</span><ul data-dcnode-id="779"><li data-dcnode-id="793"><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medecinsdumonde.org/en/recrutement/work-abroad" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Medecins du Monde</span></span></a></li><li data-dcnode-id="788"><a data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.premiere-urgence.org/en/recruitment/our-vacancies/" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Premiere Urgence</span></span><span data-dcnode-id="790" instrument_node=""> International</span></a></li><li data-dcnode-id="784"><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//careers.internationalmedicalcorps.org/" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">International Medical Corps</span></span></a></li><li data-dcnode-id="780"><span class="has-inline-color has-black-color" data-dcnode-id="781"><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.actioncontrelafaim.org/en/recruitment-what-we-offer/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="783" instrument_node="">Action Contra la Faim</span></a></span></li></ul><span data-dcnode-id="778" instrument_node="">
</span><h2 data-dcnode-id="773"><strong data-dcnode-id="774"><u data-dcnode-id="775"><span class="has-inline-color has-black-color" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Camp Manager</span></span></u></strong></h2><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="766"><span class="has-inline-color has-black-color" data-dcnode-id="767"><span data-dcnode-id="771" instrument_node="">When people are displaced, they often have no place to go. As a result, camps are established for refugees. Jobs in refugee aid that set-up and runs camps are known as Camp Coordination and Camp Management (CCCM) roles. The position of Camp Manager sits within the </span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cccmcluster.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="770" instrument_node="">CCCM Cluster</span></a><span data-dcnode-id="768" instrument_node=""> and is responsible for oversight of a specific refugee camp or area within a larger camp.</span></span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="762"><span class="has-inline-color has-black-color" data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">The job of Camp Manager is to ensure that refugees receive the services they need within the camp. This can mean overseeing the establishment of shelters, as well as ensuring food, water, education and healthcare for refugees in the camp. Another key part of the job of Camp Manager is to coordinate between refugee aid agencies in the camp to ensure all areas of need are covered.</span></span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="758"><span class="has-inline-color has-black-color" data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">To work in the position of Camp Manager within a refugee camp you need some years of professional experience working in refugee aid. You should also get formal qualifications in humanitarian aid, as well as trainings in effective camp management.</span></span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="754"><span class="has-inline-color has-black-color" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">There are some refugee aid agencies that specialise in camp management. These include:</span></span></p><span data-dcnode-id="753" instrument_node="">
</span><ul data-dcnode-id="740"><li data-dcnode-id="749"><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drc.ngo/about-us/career/vacancies/" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Danish Refugee Council</span></span></a></li><li data-dcnode-id="745"><span class="has-inline-color has-black-color" data-dcnode-id="746"><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="748" instrument_node="">UNHCR</span></a></span></li><li data-dcnode-id="741"><span class="has-inline-color has-black-color" data-dcnode-id="742"><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acted.org/en/get-involved/join-us/vacancies/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="744" instrument_node="">ACTED</span></a></span></li></ul><span data-dcnode-id="739" instrument_node="">
</span><h2 data-dcnode-id="734"><strong data-dcnode-id="735"><u data-dcnode-id="736"><span class="has-inline-color has-black-color" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Child Protection Coordinator</span></span></u></strong></h2><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="730"><span class="has-inline-color has-black-color" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Children are especially vulnerable when societies are distributed by displacement. The job of Child Protection Coordinator is to run refugee aid projects aiming to protect children from violence, abuse or exploitation. Using a variety of activities and services, the Child Protection Coordinator works to limit the impact of human displacement on children.</span></span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="726"><span class="has-inline-color has-black-color" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">The job of Child Protection Coordinator in a refugee aid agency includes setting-up safe spaces for children, building networks of referrals for especially vulnerable children and working to reunite children separated from their families. The position of Child Protection Coordinator working in refugee aid usually manages a team of Social Workers and Case Managers who also work directly with children.</span></span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="722"><span class="has-inline-color has-black-color" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">The requirements for working as Child Protection Coordinator assisting refugees is usually a qualification in social work or child protection. Some experience working directly with refugees, even in your home country, is also beneficial.</span></span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="718"><span class="has-inline-color has-black-color" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">There are lot of local NGOs working directly with refugees in child protection, so be sure to check. Some of the leading international NGOs that recruit Child Protection Coordinators to work with refugees include:</span></span></p><span data-dcnode-id="717" instrument_node="">
</span><ul data-dcnode-id="692"><li data-dcnode-id="713"><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savethechildren.net/careers/apply" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Save the Children</span></span></a></li><li data-dcnode-id="709"><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.warchild.org.uk/who-we-are/jobs" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">War Child</span></span></a></li><li data-dcnode-id="705"><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sos-childrensvillages.org/jobs" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">SOS Children’s Village</span></span></a></li><li data-dcnode-id="701"><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plan-international.org/about-us/jobs-careers-plan-international" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Plan International</span></span></a></li><li data-dcnode-id="697"><span class="has-inline-color has-black-color" data-dcnode-id="698"><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unicef.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="700" instrument_node="">UNICEF</span></a></span></li><li data-dcnode-id="693"><span class="has-inline-color has-black-color" data-dcnode-id="694"><a data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terredeshommes.org/jobs/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="696" instrument_node="">Terre des Hommes</span></a></span></li></ul><span data-dcnode-id="691" instrument_node="">
</span><h2 data-dcnode-id="686"><strong data-dcnode-id="687"><u data-dcnode-id="688"><span class="has-inline-color has-black-color" data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Advocacy Officer</span></span></u></strong></h2><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="682"><span class="has-inline-color has-black-color" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Advocacy aims to create long-term and systemic change. The job of Advocacy Officer in a refugee NGO is to work on advocacy campaigns around refugee rights. These can include working to improve refugee access to services, changing government policy towards refugees or fighting for improved refugee rights. The position of Advocacy Officer is one of the main campaigning jobs in refugee aid.</span></span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="678"><span class="has-inline-color has-black-color" data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">A key part of the job of Advocacy Officer is to network with stakeholders related to refugee issues to try and create long-term improvements. This can mean working with governments, policy makers, law enforcement and community groups to advocate on behalf of refugees. Advocacy Officers must also work closely with refugees themselves to build a strong understanding of their needs and issues.</span></span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="674"><span class="has-inline-color has-black-color" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Many people working in Advocacy Officer roles in refugee NGOs have a communications or policy background. Usually, a higher education degree is needed. It can be good to begin by volunteering on campaigns related to refugee aid before moving into jobs in advocacy.</span></span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="670"><span class="has-inline-color has-black-color" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Most organisations working with refugees have an advocacy and campaigns team. Some of the largest and most well-known NGOs in this area include:</span></span></p><span data-dcnode-id="669" instrument_node="">
</span><ul data-dcnode-id="656"><li data-dcnode-id="665"><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnesty.org/en/careers/" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Amnesty International</span></span></a></li><li data-dcnode-id="661"><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.transparency.org/en/career-tender-opportunities" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Transparency International</span></span></a></li><li data-dcnode-id="657"><span class="has-inline-color has-black-color" data-dcnode-id="658"><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//careers.hrw.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="660" instrument_node="">Human Rights Watch</span></a></span></li></ul><span data-dcnode-id="655" instrument_node="">
</span><h2 data-dcnode-id="650"><strong data-dcnode-id="651"><u data-dcnode-id="652"><span class="has-inline-color has-black-color" data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Gender-Based Violence Coordinator</span></span></u></strong></h2><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="646"><span class="has-inline-color has-black-color" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Many women around the world face violence, and this can increase when people are displaced. Refugee aid agencies employ Gender-Based Violence (GBV) Coordinators to set-up and run projects to assist women who are victims of violence, as well as protect women who may be victims of GBV. The job of GBV Coordinator is one the main refugee aid jobs working with displaced women.</span></span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="642"><span class="has-inline-color has-black-color" data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Gender-Based Violence Coordinators use a range of tools and practices to work with women who are, or may-be, victims of violence. This can include counselling work for refugee women, as well as establishing referral pathways for victims of GBV and strengthening community networks. Working as a GBV Coordinator for a refugee aid NGO is one of the best ways to assist women refugees.</span></span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="638"><span class="has-inline-color has-black-color" data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Requirements for working as a GBV Coordinator with refugees is usually a formal qualification in social work, gender studies or protection. Some previous experience working with refugees is also a common requirement.</span></span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="634"><span class="has-inline-color has-black-color" data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">A lot of refugee aid NGO’s work on women’s issues and GBV. Some organisations to check-out if you are interested in working in a GBV role with refugees include:</span></span></p><span data-dcnode-id="633" instrument_node="">
</span><ul data-dcnode-id="616"><li data-dcnode-id="629"><a data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//actionaid.org/jobs" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">ActionAid</span></span></a></li><li data-dcnode-id="625"><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plan-international.org/about-us/jobs-careers-plan-international" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Plan International</span></span></a></li><li data-dcnode-id="621"><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medecinsdumonde.org/en/recrutement/work-abroad" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Médecins du Monde</span></span></a></li><li data-dcnode-id="617"><span class="has-inline-color has-black-color" data-dcnode-id="618"><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//careers.internationalmedicalcorps.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="620" instrument_node="">International Medical Corps</span></a></span></li></ul><span data-dcnode-id="615" instrument_node="">
</span><h2 data-dcnode-id="610"><strong data-dcnode-id="611"><u data-dcnode-id="612"><span class="has-inline-color has-black-color" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Distribution Manger</span></span></u></strong></h2><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="606"><span class="has-inline-color has-black-color" data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Distribution Managers are responsible for overseeing the implementation of aid distributions to refugees. Many types of humanitarian aid are delivered to refugees using different distribution methods. The job of the Distribution Manager is to select the correct method of delivery for the aid being provided to refugees and for the wider context that the distribution is taking place in.</span></span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="602"><span class="has-inline-color has-black-color" data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">The job of the Distribution Manager on a refugee aid project is to assess the type of aid being delivered to refugees and develop plans and procedures for its safe and controlled distribution. It is also important the right types of aid reach refugees with specific needs and the role of Distribution Manager is to ensure aid reaches refugees correctly.</span></span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="598"><span class="has-inline-color has-black-color" data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">The requirement for working as a Distribution Manager on a refugee aid project is usually some previous experience in humanitarian aid, as well as formal qualifications, often in humanitarian action or logistics.</span></span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="594"><span class="has-inline-color has-black-color" data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Almost all NGOs do distributions as part of their refugee aid projects. However, the job of Distribution Manager is usually tasked with overseeing large distributions of aid. Some organisations that often employ Distribution Managers include:</span></span></p><span data-dcnode-id="593" instrument_node="">
</span><ul data-dcnode-id="580"><li data-dcnode-id="589"><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.who.int/" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">World Food Programme</span></span></a></li><li data-dcnode-id="585"><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drc.ngo/about-us/career/vacancies/" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Danish Refugee Council</span></span></a></li><li data-dcnode-id="581"><span class="has-inline-color has-black-color" data-dcnode-id="582"><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acted.org/en/get-involved/join-us/vacancies/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="584" instrument_node="">ACTED</span></a></span></li></ul><span data-dcnode-id="579" instrument_node="">
</span><h2 data-dcnode-id="574"><strong data-dcnode-id="575"><u data-dcnode-id="576"><span class="has-inline-color has-black-color" data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Policy Officer</span></span></u></strong></h2><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="570"><span class="has-inline-color has-black-color" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">The role of Policy Officer in refugee aid is one of the main positions developing policy positions to improve the situation for refugees. Many NGOs working with refugees, as well as think-tanks and governments, employ Policy Offices specialised in refugee issues to develop platforms. The role of Policy Officer is also to provide analysis and advise on how policies may impact refugees.</span></span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="566"><span class="has-inline-color has-black-color" data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">The job of Policy Officer within an organisation working to assist refugees is to research how current government policies impact displaced people as well as to develop improved policies. The position of Policy Officer is also to engage with other stakeholders across a range of refugee issues with the aim to develop joint platforms that can push for improved policies for refugees and asylum seekers.</span></span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="562"><span class="has-inline-color has-black-color" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">To work as a Policy Officer specialising in refugee aid you will need a higher education degree. You will also need expertise in policy, research and advocacy.</span></span></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="558"><span class="has-inline-color has-black-color" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Most major organisations working with refugees employ Policy Officers. Some of the largest include:</span></span></p><span data-dcnode-id="557" instrument_node="">
</span><ul data-dcnode-id="544"><li data-dcnode-id="553"><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savethechildren.net/careers/apply" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Save the Children</span></span></a></li><li data-dcnode-id="549"><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//odi.org/en/careers/" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Overseas Development Institute</span></span></a></li><li data-dcnode-id="545"><span class="has-inline-color has-black-color" data-dcnode-id="546"><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnesty.org/en/careers/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="548" instrument_node="">Amnesty International</span></a></span></li></ul><span data-dcnode-id="543" instrument_node="">
</span><h2 data-dcnode-id="538"><strong data-dcnode-id="539"><u data-dcnode-id="540"><span class="has-inline-color has-black-color" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Cash Programme Manager</span></span></u></strong></h2><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="534"><span class="has-inline-color has-black-color" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">The humanitarian industry is beginning to move more towards providing direct financial assistance to refugees. This is more efficient and gives refugees more choice and ability to meet their own needs. The main job that oversees the cash transfer programming for refugees is the Cash Programme Manager. Roles in cash transfer aid programmes to refugees are fast expanding.</span></span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="530"><span class="has-inline-color has-black-color" data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">The job of Cash Programme Manager is the main job overseeing cash distributions to refugees. Cash programming roles work to ensure funds are transferred correctly and securely to refugees in need and the position of the Cash Programme Manager is to make sure the NGO uses cash effectively as aid. Another key part of the job is ensuring that cash distributions to refugees does not disturb the local economy.</span></span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="526"><span class="has-inline-color has-black-color" data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Working as Cash Programme Manager as part of a refugee aid response is a specialised role. You will likely need a background in economics or livelihoods development, as well as some experience in micro-finance project management.</span></span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="522"><span class="has-inline-color has-black-color" data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Cash transfer programming is a growing sector within refugee aid. More refugee aid agencies are moving into cash transfer programming; some of the major ones working in the sector include:</span></span></p><span data-dcnode-id="521" instrument_node="">
</span><ul data-dcnode-id="500"><li data-dcnode-id="517"><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mercycorps.org/careers" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Mercy Corps</span></span></a></li><li data-dcnode-id="513"><a data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savethechildren.net/careers/apply" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Save the Children</span></span></a></li><li data-dcnode-id="509"><a data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plan-international.org/about-us/jobs-careers-plan-international" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Plan International</span></span></a></li><li data-dcnode-id="505"><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//careers.wvi.org/index.php" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">World Vision</span></span></a></li><li data-dcnode-id="501"><span class="has-inline-color has-black-color" data-dcnode-id="502"><a data-dcnode-id="503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calpnetwork.org/about/jobs/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="504" instrument_node="">Cash Learning Partnership</span></a></span></li></ul><span data-dcnode-id="499" instrument_node="">
</span><h2 data-dcnode-id="494"><strong data-dcnode-id="495"><u data-dcnode-id="496"><span class="has-inline-color has-black-color" data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Research Associate</span></span></u></strong></h2><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="490"><span class="has-inline-color has-black-color" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">There are lots of jobs you can get related to working with refugees in different areas of research. Many universities, as well as think-tanks, governments and international organisations recruit researchers to investigate refugee issues. The research produced helps these institutions develop tools, practices and policies to better assist refugees.</span></span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="486"><span class="has-inline-color has-black-color" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Jobs in research related to refugee aid cover a wide range of areas. Working as a researcher can include looking into the root causes of refugee crises, the experience of refugees and displaced people, as well as how to improve resettlement and repatriation. If you are interested in jobs combining refugee aid and research, there are plenty of positions out there.</span></span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="482"><span class="has-inline-color has-black-color" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">The requirements for getting a job in researching refugee issues are likely to include a university degree, probably up to PhD level. You may also need to begin working as research assistant before being able to undertake your own refugee aid research.</span></span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="478"><span class="has-inline-color has-black-color" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Almost all institutions that work assisting refugees will conduct research. Look for Research Associate roles at large NGOs and academic institutions that focus on refugee aid.</span></span></p><span data-dcnode-id="477" instrument_node="">
</span><h2 data-dcnode-id="472"><strong data-dcnode-id="473"><u data-dcnode-id="474"><span class="has-inline-color has-black-color" data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Logistics Officer</span></span></u></strong></h2><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="468"><span class="has-inline-color has-black-color" data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Another front-line job in refugee aid is Logistics Officer. The Logistics Officer is responsible for the day-to-day procurement, storage and movement of aid for refugee projects. The job of Logistics Officer is to ensure that the correct aid is delivered to the refugees in need effectively as possible. Logistics Officers coordinate the supply chain operation within a specific location of a refugee aid project.</span></span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="464"><span class="has-inline-color has-black-color" data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Alongside the purchasing, transportation and warehousing of aid for refugee project, the Logistics Officer must also effectively plan aid supply chains. The job of Logistics Officer on a refugee aid project often also includes overseeing the fleet of vehicles and premises management. The position of Logistics Officer is one of main supply chain and logistics jobs in a refugee aid project.</span></span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="460"><span class="has-inline-color has-black-color" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">The requirement to work as a Logistics Officer on a refugee aid project usually includes a formal qualification in humanitarian logistics. Often some experience in supply chain management, perhaps in the private sector is also asked for. You can also begin in a Logistics Assistant position to gain some experience.</span></span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="456"><span class="has-inline-color has-black-color" data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Almost all NGOs that work with refugee will have logistics positions. Some of the largest include:</span></span></p><span data-dcnode-id="455" instrument_node="">
</span><ul data-dcnode-id="438"><li data-dcnode-id="451"><a data-dcnode-id="452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//msf.org.uk/find-job" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Médecins San Frontier</span></span></a></li><li data-dcnode-id="447"><a data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savethechildren.net/careers/apply" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Save the Children</span></span></a></li><li data-dcnode-id="443"><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rescue.org/careers" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">International Rescue Committee</span></span></a></li><li data-dcnode-id="439"><span class="has-inline-color has-black-color" data-dcnode-id="440"><a data-dcnode-id="441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.actioncontrelafaim.org/en/recruitment-what-we-offer/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="442" instrument_node="">Action Contre la Faim</span></a></span></li></ul><span data-dcnode-id="437" instrument_node="">
</span><h2 data-dcnode-id="432"><strong data-dcnode-id="433"><u data-dcnode-id="434"><span class="has-inline-color has-black-color" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Cultural Mediator / Interpreter</span></span></u></strong></h2><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="428"><span class="has-inline-color has-black-color" data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">A key job working with refugees is the role of Cultural Mediator. Also known as an Interpreter, the position assists refugees with language translation, as well as liaising with authorities and organisations. The job of Cultural Mediator is also to help bridge the gap between the refugee’s culture and the context they are now in. The job of Cultural Mediator or Interpreter is a crucial job assisting refugees.</span></span></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="424"><span class="has-inline-color has-black-color" data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">When refugees begin to settle, either in camps, host communities or country’s they have relocated to, they require assistance adapting to their new surroundings. The job Cultural Mediator works with refugees to introduce them to their new culture, as well as assist them with formalities and bureaucracy. The position of Cultural Mediator can be crucial for refugees to access the services they need.</span></span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="420"><span class="has-inline-color has-black-color" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">If you want to work as a Cultural Mediator or An Interpreter assisting refugees you need to speak a second language. Cultural Mediators are also usually recruited from the same culture as the refugee community. Some knowledge of local refugee services and bureaucracy is also required.</span></span></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="416"><span class="has-inline-color has-black-color" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Cultural Mediators and Interrupters working with refugees are recruited both in the field and in countries where refugees settle. To find open position, look for postings by local NGOs and groups that assist refugees in your area.</span></span></p><span data-dcnode-id="415" instrument_node="">
</span><h2 data-dcnode-id="410"><strong data-dcnode-id="411"><u data-dcnode-id="412"><span class="has-inline-color has-black-color" data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Education Programme Manager</span></span></u></strong></h2><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="406"><span class="has-inline-color has-black-color" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">When children and young people are displaced, they can lose their access to education. Many aid organisations set-up projects to provide education to refugees and these are ran by the Education Programme Manager. The job of the Education Programme Manager is to oversee the implementation of education provision to refugees.</span></span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="402"><span class="has-inline-color has-black-color" data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">The position of Education Programme Manager in a refugee aid project includes establishing classrooms and teaching facilities, recruiting and managing teachers and sourcing the curriculum. The Education Programme Manager role is also responsible for project management of the refugee education programme, which can include supporting project logistics, budget management and external coordination.</span></span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="398"><span class="has-inline-color has-black-color" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">The main requirements to work as an Education Programme Manager in refugee aid usually includes a degree in humanitarian aid or international development, and/or formal qualifications in education.</span></span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="394"><span class="has-inline-color has-black-color" data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Some refugee aid organisations specialising in education projects that recruit Education Programme Manager roles include:</span></span></p><span data-dcnode-id="393" instrument_node="">
</span><ul data-dcnode-id="384"><li data-dcnode-id="389"><a data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savethechildren.net/careers/apply" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Save the Children</span></span></a></li><li data-dcnode-id="385"><span class="has-inline-color has-black-color" data-dcnode-id="386"><a data-dcnode-id="387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unicef.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="388" instrument_node="">UNICEF</span></a></span></li></ul><span data-dcnode-id="383" instrument_node="">
</span><h2 data-dcnode-id="378"><strong data-dcnode-id="379"><u data-dcnode-id="380"><span class="has-inline-color has-black-color" data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Shelter Advisor</span></span></u></strong></h2><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="374"><span class="has-inline-color has-black-color" data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Refugees and displaced populations are often in urgent need of shelter. As refugee aid agencies work to provide suitable accommodation, they require technical advice on shelter construction, provision, type and suitability. The job of Shelter Advisor provides this technical service and is the key advisory position to aid agencies establishing temporary or longer-term shelter for refugees.</span></span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="370"><span class="has-inline-color has-black-color" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">As an important technical position on many refugee aid projects, the Shelter Advisor is the main expert on how shelter should be provided to displaced populations. The job of Shelter Advisor is to give guidance to aid agencies on the correct establishment of appropriate, safe and suitable accommodation to refugees. Shelter Advisor’s are often employed when refugee camps are established but can also guide refugee aid agencies on assisting urban populations that need assistance in reconstruction.</span></span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="366"><span class="has-inline-color has-black-color" data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">If you want to work as a Shelter Advisor on refugee aid projects you are likely to need an architecture or engineering background. Some professional experience is also required and relevant trainings for shelter within refugee contexts.</span></span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="362"><span class="has-inline-color has-black-color" data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">There are lots of NGOs that work in shelter provision for refugees. Some that may be recruiting Shelter Advisor’s include:</span></span></p><span data-dcnode-id="361" instrument_node="">
</span><ul data-dcnode-id="344"><li data-dcnode-id="357"><span class="has-inline-color has-black-color" data-dcnode-id="358"><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shelterbox.org/contact/jobs/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="360" instrument_node="">ShelterBox</span></a></span></li><li data-dcnode-id="353"><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.savethechildren.net/careers/apply" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Save the Children</span></span></a></li><li data-dcnode-id="349"><a data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drc.ngo/about-us/career/vacancies/" rel="noreferrer noopener" target="_blank"><span class="has-inline-color has-black-color" data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Danish Refugee Council</span></span></a></li><li data-dcnode-id="345"><span class="has-inline-color has-black-color" data-dcnode-id="346"><a data-dcnode-id="347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="348" instrument_node="">UNHCR</span></a></span></li></ul><span data-dcnode-id="343" instrument_node="">
</span></div><span data-dcnode-id="340" instrument_node="">
</span><div class="post-tags clr" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">
