</span><div class="grid__item post-large--ten-twelfths" data-dcnode-id="481"><span data-dcnode-id="831" instrument_node="">
</span><header class="section-header" data-dcnode-id="826"><span data-dcnode-id="830" instrument_node="">
</span><h1 class="section-header__title" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">What challenges do Refugees and Migrants face?</span></h1><span data-dcnode-id="827" instrument_node="">
</span></header><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="824" instrument_node="">
</span><time data-dcnode-id="822" datetime="2019-11-05T19:23:00Z"><span data-dcnode-id="823" instrument_node="">November 5, 2019</span></time><span data-dcnode-id="821" instrument_node="">
</span><span class="meta-sep" data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">•</span></span><span data-dcnode-id="818" instrument_node="">
            Mohamed Malim
          
          
        </span></p><span data-dcnode-id="816" instrument_node="">
</span><div class="rte" data-dcnode-id="527" itemprop="articleBody"><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">The life of a refugee is hard, they’re fleeing places of war, hunger, famine, persecution and have gone through a tough journey to find a safe haven for themselves in a completely different journey.&nbsp;</span></p><span data-dcnode-id="812" instrument_node="">
</span><h2 data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Challenges for Refugees&nbsp;</span></h2><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><img alt="boy at school" data-dcnode-id="808" height="602" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0013/9129/6557/files/michael-mims-5PLuvm3pors-unsplash_large.jpg%3Fv%3D1573000264&amp;raw" width="909"></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" style="font-weight: 400;"><span data-dcnode-id="805" instrument_node="">They do so for the pursuit of a normal life for themselves and their families. Many cross dangerous terrains and weather conditions, put themselves and their loved ones at risk to cross international borders just to have a chance at a better life.</span></span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="800" style="font-weight: 400;"><span data-dcnode-id="801" instrument_node="">However, things aren’t as easy as one might imagine after they reach another country.</span></span><b data-dcnode-id="798"><span data-dcnode-id="799" instrument_node=""> They're still left with many problems and challenges that they have to face, often alone, scared, and traumatized.&nbsp;</span></b></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" style="font-weight: 400;"><span data-dcnode-id="795" instrument_node="">Challenges faced by refugees and migrants shape their new life in a completely foreign country.&nbsp; Understanding the barriers that stand in the way of refugees and migrants is an essential step in paving the way for their well-being.</span></span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="784"><b data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Learn how </span></b><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//epimonia.com/pages/about"><b data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Epimonia</span></b></a><b data-dcnode-id="785"><span data-dcnode-id="786" instrument_node=""> helps refugees and migrants begin a new life!</span></b></p><span data-dcnode-id="783" instrument_node="">
</span><h3 data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Overcoming a Language Barrier&nbsp;</span></h3><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><img alt="" data-dcnode-id="779" height="561" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0013/9129/6557/files/katie-manning-sOCT5bSYxrU-unsplash_large.jpg%3Fv%3D1573000091&amp;raw" width="748"></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" style="font-weight: 400;"><span data-dcnode-id="776" instrument_node="">Most refugees and migrants settle in countries that don’t speak their native tongue. If you take an example of a Syrian refugee migrating to the USA, it’s highly unlikely that they know English. Settling in the USA, where English is the primary language can be an uphill battle for refugees and migrants.</span></span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="768"><b data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Daily communication, getting a job, filling documentation or buying food, all of these require knowledge of the English language.</span></b><span data-dcnode-id="769" style="font-weight: 400;"><span data-dcnode-id="770" instrument_node=""> Similarly, refugees moving from Myanmar to Bangladesh, don’t speak their language.&nbsp;</span></span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" style="font-weight: 400;"><span data-dcnode-id="766" instrument_node="">This makes daily tasks more difficult for refugees. Granted, one can learn a new language, but doing so is no piece of cake either. There’s the question of managing it along with surviving on a daily basis and taking care of your dependents.&nbsp;</span></span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" style="font-weight: 400;"><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Related</span></strong><span data-dcnode-id="760" instrument_node="">: </span><strong data-dcnode-id="757"><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//epimonia.com/blogs/news/what-is-the-difference-between-a-refugee-and-an-immigrant" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="759" instrument_node="">What's the Difference Between a Refugee and an Immigrant?</span></a></strong></span></p><span data-dcnode-id="754" instrument_node="">
</span><h3 data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Raising Children as a Refugee</span></h3><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" style="font-weight: 400;"><span data-dcnode-id="750" instrument_node="">Raising children is definitely not an easy task. Doing so as a refugee or a migrant has additional challenges. </span></span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" style="font-weight: 400;"><span data-dcnode-id="746" instrument_node="">Their kids are growing up in a completely different society than they did. This puts them on a back foot as refugee or immigrant parents find it challenging on how to navigate through different situations.&nbsp;</span></span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" style="font-weight: 400;"><img alt="children playing with chalk" data-dcnode-id="742" height="599" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0013/9129/6557/files/tina-floersch-CcbnSarTldQ-unsplash_large.jpg%3Fv%3D1573000251&amp;raw" width="899"></span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" style="font-weight: 400;"><span data-dcnode-id="738" instrument_node="">The number of shared instances keeps decreasing and the parent-child dynamic keeps changing as time goes by. </span></span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" style="font-weight: 400;"><span data-dcnode-id="734" instrument_node="">If they’re being raised in an English-speaking country, the culture and mannerisms are completely alien to them, but they’re normal for the children as that is what they’ve seen their entire life. ]</span></span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" style="font-weight: 400;"><span data-dcnode-id="730" instrument_node="">In such cases, children receive no educational support from their refugee or migrant parents and have to rely completely on schools and teachers. </span></span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" style="font-weight: 400;"><span data-dcnode-id="726" instrument_node="">Any feedback or complaint regarding the children is more likely to be ignored if the parents don’t understand English.&nbsp;</span></span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="720"><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">The systematic differences that exist in today’s society put refugee parents and children at a disadvantage, especially when it comes to bullying and mental health.</span></strong></p><span data-dcnode-id="719" instrument_node="">
</span><h3 data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Looking for&nbsp;Work as a Refugee</span></h3><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" style="font-weight: 400;"><span data-dcnode-id="715" instrument_node="">Everyone needs a secure</span><strong data-dcnode-id="711"><span data-dcnode-id="714" instrument_node=""> </span><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upwardlyglobal.org/programs/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="713" instrument_node="">source of income</span></a></strong><span data-dcnode-id="710" instrument_node=""> to lead a happy life. As a refugee or migrant, finding that is often a struggle. This is applicable to both skilled and unskilled refugees.&nbsp;</span></span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" style="font-weight: 400;"><span data-dcnode-id="706" instrument_node="">Most employers require those job seekers to have an experience that’s relevant within the same country. It doesn’t matter if they were highly successful in another country, they have to start from scratch.</span></span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" style="font-weight: 400;"><span data-dcnode-id="702" instrument_node="">For unskilled refugees, the struggle is even harder. They are often exploited and underpaid because of their desperation and lack of support.&nbsp;</span></span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" style="font-weight: 400;"><span data-dcnode-id="698" instrument_node="">They have to learn the language of the land, find a job that helps them settle, more often than not they end up working in a labor-intensive field or one that is heavily unregulated, thus putting their lives at risk.</span></span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" style="font-weight: 400;"><span data-dcnode-id="694" instrument_node="">The language barrier often plays a huge role when it comes to securing work. Not only does it prohibit them from expressing their skills, but it also shuts doors to many jobs that an average native citizen could easily get, such as customer-oriented roles such as a retail employee or a fast-food worker.&nbsp;</span><br data-dcnode-id="693"></span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="681"><strong data-dcnode-id="682"><span data-dcnode-id="689" instrument_node="">Support your local refugee by purchasing </span><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//epimonia.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="688" instrument_node="">Epimonia's</span></a><span data-dcnode-id="686" instrument_node=""> original </span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//epimonia.com/collections/all/products/bracelets" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="685" instrument_node="">Embraclet</span></a><span data-dcnode-id="683" instrument_node=""> made from refugee life jackets!</span></strong></p><span data-dcnode-id="680" instrument_node="">
</span><h3 data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Finding Transportation as a Refugee</span></h3><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="675" style="font-weight: 400;"><span data-dcnode-id="676" instrument_node="">There have been studies that have linked access to transportation with the ability to get out of poverty. </span></span><b data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">IF</span></b><span data-dcnode-id="671" style="font-weight: 400;"><span data-dcnode-id="672" instrument_node=""> one has access to transportation, especially public transportation, they are more likely to take a job that’s further away thus not limiting job opportunities by location.&nbsp;</span></span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" style="font-weight: 400;"><img alt="cars at a stoplight" data-dcnode-id="668" height="495" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0013/9129/6557/files/nabeel-syed-Jk3-Uhdwjcs-unsplash_large.jpg%3Fv%3D1573000821&amp;raw" width="743"></span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" style="font-weight: 400;"><span data-dcnode-id="664" instrument_node="">In the case of refugees, access to </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.immigrationdirect.com/immigration-articles/can-i-get-a-drivers-license-without-having-a-green-card/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="663" instrument_node="">driving license doesn’t come easy.</span></a><span data-dcnode-id="661" instrument_node=""> A driver needs to be literate in order to pass the initial test in most countries.</span></span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" style="font-weight: 400;"><span data-dcnode-id="657" instrument_node="">For refugees and migrants, it is often difficult to commute by public transport. If they don’t speak the native language of the host country, figuring out how to go from point A to point B is exponentially difficult.&nbsp;</span></span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" style="font-weight: 400;"><span data-dcnode-id="653" instrument_node="">Many refugees and migrant families tend to share one car between multiple family members. More often than not, it comes down to the women and children to find alternate modes of transport for their commute. For someone that doesn’t speak the native language, this can be a highly intimidating and risky process.</span></span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="645"><strong data-dcnode-id="646"><span data-dcnode-id="649" instrument_node="">Related: </span><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//epimonia.com/blogs/news/19-ways-to-help-refugees" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="648" instrument_node="">19 Ways to Help Refugees</span></a></strong></p><span data-dcnode-id="644" instrument_node="">
</span><h3 data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Housing as a Refugee</span></h3><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" style="font-weight: 400;"><span data-dcnode-id="640" instrument_node="">More often than not safe housing is expensive. With most refugees and migrants stuck with low-paying jobs, this is a difficult scenario for them. This leaves room for greedy landlords to take advantage of their desperate situation.&nbsp;</span></span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" style="font-weight: 400;"><span data-dcnode-id="636" instrument_node="">Many charge fees and raise rent amounts illegally all the time while threatening evacuation, in most cases, refugees and migrants comply because they’re either unaware of their rights or simply don’t have the means to fight it out legally.</span></span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" style="font-weight: 400;"><span data-dcnode-id="632" instrument_node="">Due to the cash-crunch, many large refugees and migrant families end up staying under the same roof with little or no personal space. This creates a stressful environment for all and makes it difficult to live peacefully on a daily basis.</span></span></p><span data-dcnode-id="629" instrument_node="">
</span><h3 data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Access To Health Services</span></h3><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" style="font-weight: 400;"><span data-dcnode-id="625" instrument_node="">If you take the example of refugees or migrants coming into the USA, while there is an infrastructure readily available for everyone, accessing it is often a challenge.&nbsp;</span></span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><img alt="three girls siting together " data-dcnode-id="621" height="614" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0013/9129/6557/files/priscilla-du-preez-DAFh1p9huAE-unsplash_large.jpg%3Fv%3D1573002160&amp;raw" width="921"></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" style="font-weight: 400;"><span data-dcnode-id="618" instrument_node="">The language barrier and the inability to speak English and communicate with people pay a huge role.</span></span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" style="font-weight: 400;"><span data-dcnode-id="614" instrument_node="">Refugees are more likely to have </span><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ahrefs.com/site-explorer/overview/v2/prefix/live%3Ftarget%3Drefugeehealthta.org%252Fphysical-mental-health%252Fmental-health%252F" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">PTSD and depression</span></strong></a><span data-dcnode-id="610" instrument_node="">, especially refugee children. However, due to social taboo and the language barrier, they are less likely to go seek professional help.&nbsp;</span></span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" style="font-weight: 400;"><span data-dcnode-id="606" instrument_node="">In the case of a law and order conflict, they are unable to present their side of the story successfully due to the communication barrier, which can lead to potentially life-threatening situations.</span></span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" style="font-weight: 400;"><span data-dcnode-id="602" instrument_node="">Even if refugees and migrants do find a way to get access to some of these services, the experience is usually negative in one way or another as there is no support system in place for effective communication.</span></span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" style="font-weight: 400;"><strong data-dcnode-id="595"><span data-dcnode-id="598" instrument_node="">Related: </span><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//epimonia.com/blogs/news/biggest-causes-of-a-refugee-crisis" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="597" instrument_node="">Biggest Causes of a Refugee Crisis</span></a></strong></span></p><span data-dcnode-id="592" instrument_node="">
</span><h3 data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Cultural Barriers as a Refugee</span></h3><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" style="font-weight: 400;"><span data-dcnode-id="588" instrument_node="">It’s safe to assume that when refugees and migrants settle in another country, they are more often than not moving into a country that has a completely different culture than their native country. </span></span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" style="font-weight: 400;"><img alt="crowd waits for subway " data-dcnode-id="584" height="419" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0013/9129/6557/files/banter-snaps-lEKN0Vd257k-unsplash_large.jpg%3Fv%3D1573000683&amp;raw" width="745"></span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" style="font-weight: 400;"><span data-dcnode-id="580" instrument_node="">This has an intertwined effect on all other aspects of their lives. </span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newschannel10.com/story/30813994/refugees-face-cultural-barriers/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="579" instrument_node="">Cultural barriers</span></a><span data-dcnode-id="577" instrument_node=""> affect how they interact with everyone else, intentionally and unintentionally.&nbsp;</span></span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" style="font-weight: 400;"><span data-dcnode-id="573" instrument_node="">For the host country and its people, even deeds done with a good intention can come off as culturally insensitive or rude because of how they’re being perceived by refugees and migrants and vice versa.&nbsp;</span></span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" style="font-weight: 400;"><span data-dcnode-id="569" instrument_node="">For example, the festivals and traditions of refugees and migrants are vastly different from any host country. Celebrating them and integrating them in the host country is a long process of cultural sensitivity and acceptance.&nbsp;</span></span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="561"><b data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Children of migrants face bullying in school because of their different appearance and traditions, right from food, clothing to mannerisms</span></b><span data-dcnode-id="562" style="font-weight: 400;"><span data-dcnode-id="563" instrument_node="">. Cultural barriers find their way into all aspects of a refugee or migrants’ life.</span></span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="555"><strong data-dcnode-id="556"><span data-dcnode-id="559" instrument_node="">Related: </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//epimonia.com/blogs/news/how-the-us-immigration-system-works" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="558" instrument_node="">How the US immigration system works</span></a></strong></p><span data-dcnode-id="554" instrument_node="">
</span><h2 data-dcnode-id="551"><strong data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Conclusion</span></strong></h2><span data-dcnode-id="550" instrument_node="">
</span><meta charset="utf-8" data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="545"><strong data-dcnode-id="546"><img alt="" data-dcnode-id="547" height="498" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0013/9129/6557/files/nicole-geri-gMJ3tFOLvnA-unsplash_large.jpg%3Fv%3D1573000587&amp;raw" width="858"></strong></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" style="font-weight: 400;"><span data-dcnode-id="543" instrument_node="">Refugees and migrants are fleeing a life of extreme difficulty and hardships, they settle into a new country with hopes and aspirations of leading a better life.&nbsp;</span></span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" style="font-weight: 400;"><span data-dcnode-id="539" instrument_node="">These challenges often play spoilsport to such dreams and aspirations. Systemic recognition and action is the only way to ensure that refugees and migrants transition smoothly and they face fewer challenges while doing so.</span></span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="529"><b data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">If you want to help refugees and migrants make a smoother transition, visit&nbsp;</span></b><b data-dcnode-id="530"><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//epimonia.com/"><span data-dcnode-id="533" instrument_node="">Epimonia</span></a><span data-dcnode-id="531" instrument_node="">!</span></b></p><span data-dcnode-id="528" instrument_node="">
</span></div><span data-dcnode-id="526" instrument_node="">
