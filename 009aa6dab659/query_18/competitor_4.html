d distinct differences between both the movements. Though it is accepted that sometimes the movement of refugees and internally displaced persons’ overlap. While a multilateral treaty exists for the protection of refugees ( The Convention relating to Status of Refugees, 1951 and its 1967 Protocol) alongwith the mandate of a specialized international institution (United Nations High Commission for Refugees (UNHCR)), the status of IDPs remains in a flux.</span></p><p data-dcnode-id="1021" style="text-align: justify;"><span data-dcnode-id="1022" instrument_node="">India has been home to thousands of internally displaced people. From Kashmiri Pandits in 1990s to Muzzaffarnagar riot victims in 2014, India as a country has seen a steep escalation in the internal movement. However, it remains one of the countries which haven’t recognised Guiding Principles of Internal Development (GPID), the prime international framework available for protection of IDPs because of the reason that it came into existence without any intergovernmental negotiations when more than 17 countries in the world have domesticated the principles into its municipal law. As a result India plays within the vacuum and considers itself bereft of any obligation under law when both international and domestic legal framework mandates protection to be awarded to the IDPs.</span></p><p data-dcnode-id="1018" style="text-align: justify;"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Who are IDPs?</span></strong></p><p data-dcnode-id="1016" style="text-align: justify;"><span data-dcnode-id="1017" instrument_node="">The definition of IDPs which exist in International Law was provided by Mr. Deng, the 1998 human rights special representative of the Secretary-General while he drafted the GPID (known as Deng Principles popularly).</span></p><p data-dcnode-id="1014" style="text-align: justify;"><span data-dcnode-id="1015" instrument_node="">Internally Displaced Persons are:</span></p><p data-dcnode-id="1009" style="text-align: justify;"><span data-dcnode-id="1013" instrument_node="">“</span><em data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">persons or groups of persons who have been forced or obliged to flee or to leave their homes or places of habitual residence, in particular as a result of or in order to avoid the effects of armed conflict, situations of generalized violence, violations of human rights or natural or human-made disasters, and who have not crossed an internationally recognized State border</span></em><span data-dcnode-id="1010" instrument_node="">”</span></p><p data-dcnode-id="1007" style="text-align: justify;"><span data-dcnode-id="1008" instrument_node="">It is important to note that the movement of people has to be against their will and should be well within the territory of their country in order to be classified as an IDPs. Moreover, the movement is not just limited to the action/inaction of a state and its agencies, but even international organizations and corporations can induce displacement.</span></p><p data-dcnode-id="1005" style="text-align: justify;"><span data-dcnode-id="1006" instrument_node="">Also, the list of factors causing internal displacement isn’t exhaustive and other reasons can be accommodated. Displacement due to developmental projects is one of the examples which are wide spread and hasn’t been recognized perse in GPID. [It has been recognized in Kampala Convention, the IDP legal framework of African Union]</span></p><p data-dcnode-id="1003" style="text-align: justify;"><span data-dcnode-id="1004" instrument_node="">Despite the fact that definition of IDPs in the GPID is non – legal in nature, the Guiding Principles have gained international standing and authority.</span></p><p data-dcnode-id="1001" style="text-align: justify;"><span data-dcnode-id="1002" instrument_node="">The Guiding Principles provides for thirty principles which shall be observed by all authorities, groups and persons irrespective of their legal status and applied without any adverse distinction.</span></p><p data-dcnode-id="999" style="text-align: justify;"><span data-dcnode-id="1000" instrument_node="">The following principles ensure to prevent the causes of displacement -</span></p><br data-dcnode-id="998"><ul data-dcnode-id="980" style="text-align: justify;"><br data-dcnode-id="997"><span data-dcnode-id="996" instrument_node=""> </span><li data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">States must prevent and avoid conditions that might lead to displacement (Principle 5);</span></li><br data-dcnode-id="993"><span data-dcnode-id="992" instrument_node=""> </span><li data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">IDPs have a right to be protected against arbitrary displacement (Principle 6); Where displacement is unavoidable, guarantees should be put in place to minimize its effects (Principle 7);</span></li><br data-dcnode-id="989"><span data-dcnode-id="988" instrument_node=""> </span><li data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Displacement should never occur in a manner that violates the rights to life, dignity, liberty and security (Principle 8);</span></li><br data-dcnode-id="985"><span data-dcnode-id="984" instrument_node=""> </span><li data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">States have a particular obligation to protect against the displacement of groups that have a special dependency on, or attachment to, the land (Principle 9). .</span></li><br data-dcnode-id="981"></ul><br data-dcnode-id="979"><p data-dcnode-id="977" style="text-align: justify;"><span data-dcnode-id="978" instrument_node="">In addition, Freedom of movement, Right to Life, Right to Education, Right to be recognized as a person before law, Freedom of expression etc. are well recognized in GPID.</span></p><p data-dcnode-id="974" style="text-align: justify;"><strong data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">International Humanitarian Law (IHL) and Human Rights Law (IHRL)</span></strong></p><p data-dcnode-id="972" style="text-align: justify;"><span data-dcnode-id="973" instrument_node="">IHL protects IDPs and prevent displacement through Geneva Convention IV and its Additional Protocol I and II (AP 1 &amp; II) as well as via customary international law.</span></p><p data-dcnode-id="970" style="text-align: justify;"><span data-dcnode-id="971" instrument_node="">Article 49 prohibits individual or mass forcible transfer as well as deportations of civilians regardless of the motive except when the same is done for the security of population or when there is an imperative military necessity. Article 51(7) prohibits parties to conflict from directing movement of an entire population or an individual in order to shield military objectives and evacuation of children (Art. 78(1)). Willful transfer or deportation within or outside its territory is considered as a grave breach of the Protocol (Art. 85(4)(a)). Further, AP II prohibits forced movements of civilians because of the reason of the conflict and provides for specific provision against the transfer of children (Art. 17). Though the IDPs do not come within the meaning of ‘protected persons’, they are entitled to basic guarantees as provided for individuals to be treated humanely in all circumstances.</span></p><p data-dcnode-id="968" style="text-align: justify;"><span data-dcnode-id="969" instrument_node="">IDPs can seek protection under Human Rights Law via The Universal Declaration of Human Rights (UDHR), the International Covenant on Civil and Political Rights (ICCPR) and the International Covenant on Economic, Social and Cultural Rights (ICESCR). Other international human rights treaties relevant to IDP protection and assistance include the Convention on Elimination of Discrimination against Women (CEDAW) and the UN Convention on the Rights of the Child (UNCRC).</span></p><p data-dcnode-id="966" style="text-align: justify;"><span data-dcnode-id="967" instrument_node="">Infact, The Statute of the International Criminal Court (ICC) includes among its definition of crimes against humanity and war crime "deportation or forcible transfer of population. (Article 8(2)(b)(viii) and Article 7(1)(d)). The expression ‘displacement of a civilian population’ in the Rome Statute appears to cover transfer both within and beyond a border</span></p><p data-dcnode-id="963" style="text-align: justify;"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Indian Apathy</span></strong></p><p data-dcnode-id="961" style="text-align: justify;"><span data-dcnode-id="962" instrument_node="">As per the recent report by The Internal Displacement Monitoring Centre (IDMC) and the Norwegian Refugee Council, there are over 2.4 million IDPs in 2016 due to conflict, violence and disasters. Despite this fact, India has expressed fear that such intervention would result in violation of state sovereignty and that ‘humanitarian aid’ would become a justification for the interference of powerful states in the affairs of weaker states.</span></p><p data-dcnode-id="959" style="text-align: justify;"><span data-dcnode-id="960" instrument_node="">Therefore, incorporation of GPID into domestic law has been limited while 17 countries have adopted GPID in its municipal law.</span></p><p data-dcnode-id="957" style="text-align: justify;"><span data-dcnode-id="958" instrument_node="">In 2005, Communal Violence (Prevention, Control and Rehabilitation of Victims) Bill was proposed and drafted in the backdrop the Godhra and Bhagalpur Riot146 , with a purpose to</span></p><p data-dcnode-id="952" style="text-align: justify;"><span data-dcnode-id="956" instrument_node="">“</span><em data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">…to take effective measures to provide for the prevention and control of communal violence and to rehabilitate the victims of such violence…”</span></em><span data-dcnode-id="953" instrument_node="">.</span></p><p data-dcnode-id="950" style="text-align: justify;"><span data-dcnode-id="951" instrument_node="">The bill provided for the rehabilitation of the people affected by the communal violence and compensation by the State. However, the Bill was centre of many controversies and was withdrawn eventually in 2014.</span></p><p data-dcnode-id="948" style="text-align: justify;"><span data-dcnode-id="949" instrument_node="">The primary responsibility to award protection and humanitarian assistance to IDPs rests with the State because IDPs are people who haven’t crossed the national boundaries and are well within the country in itself calls for protection within India’s national laws as well as its international obligations w.r.t. human rights regime.</span></p><p data-dcnode-id="946" style="text-align: justify;"><span data-dcnode-id="947" instrument_node="">Union of India has by and large only recognised the movement of Kashmiri Pandits (KPs) from the valley in early 1990s as displacement. Though KPs are still considered as ‘migrants’ instead of IDPs by the Govt. fearing the humongous responsibility which will dawn upon them. Also, India frequently denies international humanitarian actors’ access to internally displaced populations, arguing that local governments take full care of the affected people.</span></p><p data-dcnode-id="943" style="text-align: justify;"><strong data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Constitutional Rights and International Law </span></strong></p><p data-dcnode-id="938" style="text-align: justify;"><span data-dcnode-id="942" instrument_node="">The rights guaranteed by GPID are synonymous to rights enshrined in the mentioned international covenants which have been ratified by India and thus attracting obligations towards it. The doctrine of </span><em data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">pacta sunt servanda </span></em><span data-dcnode-id="939" instrument_node="">mandates India that every treaty in force is binding upon it and must be performed in good faith and it may not invoke the provisions of its internal law as a justification for its failure to perform a treaty. Further, Article 18, VCLT places an obligation on the States to not indulge in any act which would defeat the object and purpose of that treaty which it has signed or ratified.</span></p><p data-dcnode-id="936" style="text-align: justify;"><span data-dcnode-id="937" instrument_node="">On the other hand, Constitution of India remains the charter which primarily protects and assists IDPs since they haven’t crossed the national borders. IDPs are also governed by the Protection of Human Rights Act, 1993 which provides citizens to seek enforcement of their human rights which are either guaranteed by Constitution or international covenants. The principles of GPID are synonymous to the fundamental rights guaranteed under the Part. III of the Constitution and hence, the same cannot be overlooked.</span></p><p data-dcnode-id="934" style="text-align: justify;"><span data-dcnode-id="935" instrument_node="">Fundamental rights extend to IDPs irrespective of their movement from their homes or habitual place of residence. Therefore, they shall be treated equally (Art.14) without any discrimination (Art. 15) &nbsp;on the grounds of religion, race, caste, sex, place of birth. They shall be provided with equal opportunity in public employment (Art. 16) and shall have freedom of speech and expression alongwith the right to assemble, form associations and to move freely within territory of India and practice their profession (Art. 19). Further, Article 39 directs the state to secure its citizens with right to an adequate means of livelihood and Article 41 rests obligation on the state to make effective provision to secure the right to work, education and to public assistance. Therefore, IDPs can approach SC or HC under Art. 32 or Art. 226 of the Constitution to seek redressal of the infringement of their fundamental rights.</span></p><p data-dcnode-id="931" style="text-align: justify;"><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Need for IDP Law</span></strong></p><p data-dcnode-id="929" style="text-align: justify;"><span data-dcnode-id="930" instrument_node="">Despite the presence of evidence of the movement of the people, government remains oblivious to their existence and continues to be in denial of their status. The long held stand of India has been to associate IDPs with migrants to dilute its responsibility to award them protection as mandated by international standards.</span></p><p data-dcnode-id="927" style="text-align: justify;"><span data-dcnode-id="928" instrument_node="">The lackadaisical attitude of the Indian government to not have a domestic legislation catering to IDPs is an extension to their stand against recognising Guiding Principles under the veil of ‘sovereignty’ and principle of ‘non-interference’. International human rights instruments and the provisions of its own Constitution provides India with the mandate to safeguard the rights of IDPs and it shall be failing in its duty by not paying heed to the plight of its own citizens whose status has remain unchanged. Therefore, there is a dire need to acknowledge and protect the rights of IDPs by bringing out a separate legislation and if the government of the day lacks political will for the same, the onus shall shift to Indian Judiciary to interpret the Constitution and International Law in the favour of IDPs.</span></p><p data-dcnode-id="921" style="text-align: justify;"><strong data-dcnode-id="922"><span data-dcnode-id="926" instrument_node="">Aakash Chandran is a 5</span><sup data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">th</span></sup><span data-dcnode-id="923" instrument_node=""> year student at Faculty of Law, Jamia Millia Islamia and a former intern at Asian-African Legal Consultative Organization (AALCO), New Delhi.</span></strong></p><br data-dcnode-id="920"><div class="_h8t" data-dcnode-id="901"><br data-dcnode-id="919"><div class="_5wd9 direction_ltr" data-dcnode-id="903" data-hover="tooltip" data-tooltip-content="Friday 10:21" data-tooltip-position="right" id="js_10j"><br data-dcnode-id="918"><div class="_5wde _n4o" data-dcnode-id="905"><br data-dcnode-id="917"><div class="_5w1r _3_om _5wdf" data-dcnode-id="907"><br data-dcnode-id="916"><div class="_4gx_" data-dcnode-id="909"><br data-dcnode-id="915"><div class="_d97" data-dcnode-id="911" style="text-align: justify;"><em data-dcnode-id="912"><span class="_5yl5" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">[The opinions expressed in this article are the personal opinions of the author. The facts and opinions appearing in the article do not reflect the views of LiveLaw and LiveLaw does not assume any responsibility or liability for the same]</span></span></em></div><br data-dcnode-id="910"></div><br data-dcnode-id="908"></div><br data-dcnode-id="906"></div><br data-dcnode-id="904"></div><br data-dcnode-id="902"></div></div></div></div></div></div><div class="extra-elements hide" data-dcnode-id="895" id="news_buzz_updates"></div><div class="row" data-dcnode-id="876"><div class="col-sm-12" data-dcnode-id="877"><div class="mid_section_menu m_top15" data-dcnode-id="878"><span data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Tags</span></span><a data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livelaw.in/tags/article-49"><span data-dcnode-id="892" instrument_node="">Article 49&nbsp;</span></a><a data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livelaw.in/tags/human-rights-law"><span data-dcnode-id="890" instrument_node="">Human Rights Law&nbsp;</span></a><a data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=htt ata-dcnode-id="840"><a class="view_more" data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livelaw.in/lawschool/articles"><span data-dcnode-id="842" instrument_node="">+ View more</span></a></div></div><div class="clearfix" data-dcnode-id="838"></div><div class="col-sm-12" data-dcnode-id="836"><div class="border_bottom" data-dcnode-id="837"></div></div></div></div><div class="row row_right_padding flex" data-dcnode-id="797"><div class="col-sm-4 r_padding0 flex" data-dcnode-id="822"><div class="box_cover_style m_top15" data-dcnode-id="823"><div class="img_width_full" data-dcnode-id="831"><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livelaw.in/lawschool/articles/rbis-de-minimis-regulatory-safeguards-inherent-enigma-surrounding-regulation-of-cryptocurrencies-177702"><img =""="" alt="RBIs De Minimis Regulatory Safeguards: Inherent Enigma Surrounding Regulation of Cryptocurrencies" data-dcnode-id="833" data-src="https://www.livelaw.in/h-upload/2020/03/05/500x300_370922-cryptocurrency.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livelaw.in/images/placeholder.svg&amp;raw" title="RBIs De Minimis Regulatory Safeguards: Inherent Enigma Surrounding Regulation of Cryptocurrencies"></a></div><h2 class="text_heading m_bottom30 m_top10" data-dcnode-id="828"><a class="color_black hover_color_red" data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livelaw.in/lawschool/articles/rbis-de-minimis-regulatory-safeguards-inherent-enigma-surrounding-regulation-of-cryptocurrencies-177702"><span data-dcnode-id="830" instrument_node="">RBI's De Minimis Regulatory Safeguards: Inherent Enigma Surrounding Regulation of Cryptocurrencies</span></a></h2><div class="color_black font_12 box_bottom_text" data-dcnode-id="824"><span class="icon-calendar" data-dcnode-id="827"></span><span class="convert-to-loc
