</span><p align="justify" data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">§ Developing active participation and Community spirit</span></p><span data-dcnode-id="930" instrument_node="">
</span><p align="justify" data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">§ Planning for the future</span></p><span data-dcnode-id="927" instrument_node="">
</span><p align="justify" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">§ Concentration on the ‘Life World’</span></p><span data-dcnode-id="924" instrument_node="">
</span><p align="justify" data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">§ Pleasure in education</span></p><span data-dcnode-id="921" instrument_node="">
</span></ul><p align="justify" data-dcnode-id="916"><i data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Empowerment</span></i><span data-dcnode-id="917" instrument_node="">: refugees and IDPs are people in transition. They should be empowered to express their perspectives and aspirations. Education should lead them into an active life without complacency. Girls and women should be given special attention in as far as traditionally men are the dominant group in gender relations; people with direct scars and wounds from their refugee experience and displacement should be given special empowerment to return into their community (of less individually affected persons). Sharing of capacities should be supported.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p align="justify" data-dcnode-id="911"><i data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Respect</span></i><span data-dcnode-id="912" instrument_node=""> for the other is an important goal: despite the shared fates, the individual coping with them is so diverse that there is no one-way pattern of communication among the group. In order to respect it is necessary to know and to learn about the recent histories of the members of a community. And it is necessary to establish respectful communication between the refugees and IDPs and their counterparts from government, supervising and organising agencies and supporters. It should be avoided that a mood of ‘privileged marginalized’ can develop.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p align="justify" data-dcnode-id="906"><i data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Critical realism</span></i><span data-dcnode-id="907" instrument_node=""> simply means that the given circumstances need not be liked, but should be accepted as a basis for present and future action. Wishful thinking and the insistence of empty ‘rights’ can be avoided if education leads towards a rational perception of a given reality. (Example: as long as it is not decided whether return to the original homestead or new settlements will be part of solution, it is useful to exchange opinions, but not to press in the one or the other direction). </span></p><span data-dcnode-id="905" instrument_node="">
</span><p align="justify" data-dcnode-id="901"><i data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Applicable knowledge</span></i><span data-dcnode-id="902" instrument_node="">: Whatever is emphasised in the syllabus should have a strong connection with application and a certain utilitarian approach, at least for the time being. This means necessarily that all acquired knowledge should be ‘practical’, but applicable indicates that the ownership of the acquired qualification should be in the centre of the learner’s perspective. </span></p><span data-dcnode-id="900" instrument_node="">
</span><p align="justify" data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">Learning under hardship should </span><i data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">motivate</span></i><span data-dcnode-id="896" instrument_node=""> a demand for further education and more qualifications. It is important that all education for refugees and IDPs should point at a future situation where the status will have become ‘normal’, i.e. integrated in the education patterns of the permanent environment in the foreseeable future.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p align="justify" data-dcnode-id="889"><span data-dcnode-id="893" instrument_node="">Education should support </span><i data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">active participation</span></i><span data-dcnode-id="890" instrument_node=""> of all clients in the agenda of their community. Democracy and the sense of ownership and republicanism should not be postponed until all problems are solved, but the solutions of problems (e.g. of conviviality and community building) should be prepared and ‘tested’ under the circumstances of refugee and IDP education.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p align="justify" data-dcnode-id="884"><i data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Planning for the future</span></i><span data-dcnode-id="885" instrument_node=""> is essential. There are quite a few visions ready to be developed: where do we want to belong and how do we want to live? The answers require a tough and unsentimental coping with the past and with individual experience. And the answers will depend on the objective status of the refugees and IDPs, so the ‘catchment’ of an educational activity should be aware of this. The establishment of self-victimisation and the role of outcasts should be avoided as a priority, while the critical realism should serve as a corrective to new myths for the future (Example: the overloaded vision of independence has hampered many efforts of Kosovo Albanians to deal properly with their presence both as refugees and permanents). </span></p><span data-dcnode-id="883" instrument_node="">
</span><p align="justify" data-dcnode-id="879"><i data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Concentration on the ‘Life-World’</span></i><span data-dcnode-id="880" instrument_node=""> is a key principle for education. The world of norms and rules for refugees and IDPs is highly important during the critical period of stabilising their community. Life-World, which includes neighbourhood, local informal communication, friendship and everyday habits, should become thematic in the curriculum and in the syllabus applied (this implies a warning against a ‘pathetic’ approach, which tries to explain the situation only on the normative level, while the moral and aesthetic round the clock standards are neglected and remain unchallenged). The problem of self-definition is central to this aspect. The Life-World approach also raises the question: who does teach, who shall teach? (The case study can be made with the diverse models after the exodus of thousands of Macedonians into Kosovo in 2001, when the Kosovo school system hosted many pupils and their teachers, and had to decide under which circumstances the whole system should be temporarily imported from Macedonia and when it should be integrated into the existing Kosovo structures). </span></p><span data-dcnode-id="878" instrument_node="">
</span><p align="justify" data-dcnode-id="874"><i data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Pleasure in education:</span></i><span data-dcnode-id="875" instrument_node=""> The goal here is not simply a playful childhood. The joy of being able to learn is not accidental to the educating process, but essential for the formation of personalities. (There are not many children-soldiers in our two regions, but the example is striking: only education and the empowerment of an autonomous and rich perspective for the own future can heal and stabilise at the same time. In our case, the pleasure-factor should also avoid a precocious growing up into an adult world, which does not serve as a good example – in most cases).</span></p><span data-dcnode-id="873" instrument_node="">
</span><p align="justify" data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Of course, the aspect of the present also includes drug prevention, gender education, hygiene and all other topics of an ‘ordinary’ education process. Hospitalisation and pseudo-autistic patterns of behaviour should be avoided – refugees and IDPs under restricted conditions of mobility should not adopt the attitudes of hospitalised patients, they are not under an explicit ‘therapy’, however many activities with refugees and IDPs have pseudo-therapeutic character; psychological supervision also of teaching staff and administrators is necessary from the beginning. This is an important aspect for the accreditation of external agencies which want to be included in the education of refugees and IDPs. </span></p><span data-dcnode-id="870" instrument_node="">
</span><p align="justify" data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Education must also prevent a vicious circle, stemming from the increasing frustration common with many refugees and especially IDPs. When the vision of a good future fades away, this gives leeway to revengeful ideas and an increasing potential for violence. </span></p><span data-dcnode-id="867" instrument_node="">
</span><p align="justify" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">A special problem for education is the westernisation of life-styles and its confrontation with the imperatives of old social patterns. This is true for both regions. In the Balkans, the particular Albanian aspect should be considered, as the reference to rules like the Dukagjini Code and the clan structure does not really represent the present state of mind, but can be used as a substitute for lacking alternative visions. </span></p><span data-dcnode-id="864" instrument_node="">
</span><p align="justify" data-dcnode-id="861"><b data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">8. Dealing with the future</span></b></p><span data-dcnode-id="860" instrument_node="">
</span><p align="justify" data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Both in the Caucasus and the Balkans the aspect of future is most precarious. What will be my life, our lives, in the foreseeable future and in the long term? To be very clear about this point: for many refugees and IDPs there is no future perspective available as we, in the West, would define it. This is also true for a large part of the rest of the population. Future does not exist ‘as such’ and unto itself. In many cases, it is nothing but a perpetuation of the miserable present and therefore not desirable or wanted. We can identify several impediments to the construction of a liveable future:</span></p><span data-dcnode-id="857" instrument_node="">
</span><p align="justify" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">- The myth of problem solution through one single issue strategy: e.g. independence for the Kosovo Albanians, ethnic purity for other groups, or the immediate effects from foreign aid.</span></p><span data-dcnode-id="854" instrument_node="">
</span><p align="justify" data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">- The postponement of life-world improvement by forcing the Hard Sectors: e.g. privatisation at a premature stage of reintegration of a society. </span></p><span data-dcnode-id="851" instrument_node="">
</span><p align="justify" data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">- Illusions about material standards of living and the related perpetuation of foreign support and internal subsidising. </span></p><span data-dcnode-id="848" instrument_node="">
</span><p align="justify" data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">- Unrealistic hopes for social protection and health care on standards known only by hearsay or from previous experience as guest-workers and other acquaintance with more prosperous societies. </span></p><span data-dcnode-id="845" instrument_node="">
</span><p align="justify" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">We hold that the construction of a good future relies on three basic principles:</span></p><span data-dcnode-id="842" instrument_node="">
</span><p align="justify" data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">- Support the re-integration of refugees and IDPs in their respective societies as fast as possible, and prepare them for this integrative process through education.</span></p><span data-dcnode-id="839" instrument_node="">
</span><p align="justify" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">- Give priority to the building of a civil society and civic virtues (as different from for a priority market-oriented democracy as a first step).</span></p><span data-dcnode-id="836" instrument_node="">
</span><p align="justify" data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">- Support a new-beginning approach with the refugees and IDPs and do not return, even temporarily, to structures of the past.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p align="justify" data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">These basics seem to be trivial. But especially the third one has major implications for the educational concept and what we would like to call “partial de-historisation”. It is clear and established that the past as collective history is always an essential element of society building and conceptualising of the future. But especially for refugees and IDPs, the over-emphatic account of the past, often as myth, can be treacherous. Empty or virtual rights and legitimacies are being constructed instead of facing both: the political and the moral reality of their fate. If there are claims to regain property, the solution is the establishment of the rule of law, and if there are demands for punishment of the perpetrators of the recent past, the same priority applies. </span></p><span data-dcnode-id="830" instrument_node="">
</span><p align="justify" data-dcnode-id="827"><b data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">9. Civic Education and Dealing with the Future</span></b></p><span data-dcnode-id="826" instrument_node="">
</span><p align="justify" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">It may be uncommon to link these two elements of education. In the case of refugees and IDPs, they should be linked in any educational approach. The understanding of a situation, where future shall be constructed, requires both: civic education and an understanding of labour and occupation in order to play a role in the political and social life of the group and the society into which this group will be embedded. </span></p><span data-dcnode-id="823" instrument_node="">
</span><p align="justify" data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">a. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Albeit the development of a critical mind is among the noblest educational aims, the education process itself should not be based on a negative foundation. (To paraphrase the German philosopher Adorno: in this kind of education it is necessary to aim at a right life within the wrong one). Thus, the education of all refugees and IDPs should be based on the positive basis that, at least, they are the ones who are given a chance, and they are the ones who can turn their lives from survival to active life. (The positive concept can be based on Hannah Arendt’s assumptions that being born is a positive concept in itself, and enables a person to be an active member in a sphere of public polity, which is necessary for the refugees and IDPs to emancipate themselves from their unwanted fate). </span></p><span data-dcnode-id="820" instrument_node="">
</span><p align="justify" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">b. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The civic virtues, which may also serve as a guideline and orientation for the curriculum, are primarily the following:</span></p><span data-dcnode-id="817" instrument_node="">
</span><p align="justify" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">- Citizenship</span></p><span data-dcnode-id="814" instrument_node="">
</span><p align="justify" data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">- Ownership</span></p><span data-dcnode-id="811" instrument_node="">
</span><p align="justify" data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">- Responsibility in a ‘republican’ sense</span></p><span data-dcnode-id="808" instrument_node="">
</span><p align="justify" data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">- Acceptance of the rule of law and the basic institutions</span></p><span data-dcnode-id="805" instrument_node="">
</span><p align="justify" data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">- Reliability and trust</span></p><span data-dcnode-id="802" instrument_node="">
</span><p align="justify" data-dcnode-id="785"><span data-dcnode-id="801" instrument_node="">These five virtues are basically what is needed for the building of democracy in every society. For refugees and many IDPs, it is crucial that they answer the question: whose society? There are two basic concepts: the return to an original society of belonging or an original environment; and the integration into a new, foreign, alien or even adversary society. </span><i data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Citizenship</span></i><span data-dcnode-id="798" instrument_node=""> and </span><i data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">ownership</span></i><span data-dcnode-id="795" instrument_node=""> are qualities, which develop long before they become formalised, say in an act of naturalisation or conferring a new ‘nationality’. The step from being an refugeesto becoming a citizen (with or without the middle step of being a ‘co-citizen’ (which basically means, a second class citizen), is critical to all education. Without an active participation of the refugees and IDPs in their own formative process, there is little chance to accomplish. ‘</span><i data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Republican’</span></i><span data-dcnode-id="792" instrument_node=""> means, on the one hand, that the rule of law is applicable without exception within the community of refugees and IDPs, irrespective of the behaviour and attitudes of both the peers and the surrounding ‘normal’ society; on the other hand, it means that certain spheres are respected as belonging to the ‘public’ sphere, as different from the ‘private’ sphere. This is touchy insofar as many cultural and traditional, also religious ‘privata’ must become part of the public discourse in order to get moved. A civil society in our understanding requires a peaceful and well-ruled process of competition among different values, lifestyles, convictions and life-world patterns. It is absolutely necessary to prevent the interpretation that the right to identity includes individual and collective refusal of the </span><i data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">rule of law</span></i><span data-dcnode-id="789" instrument_node="">. And it is useful that education prepares for a trusting relationship between the citizens and the </span><i data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">basic institutions</span></i><span data-dcnode-id="786" instrument_node="">, such as school, health systems, social protection and the general administration. Both the citizen and the institution should be reliable and trustworthy. </span></p><span data-dcnode-id="784" instrument_node="">
</span><p align="justify" data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">c. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; It is evident that the basic education for all refugees and IDPs should follow normal routines for the people ordered by age-group, capability and capacity. But for refugees and IDPs it is even more important that they get soon a connection between their individual development and the world of labour. If it were not cynical in many places, we should adopt the core goal of the EU education policy, ‘employability’, for our concept in the first place. In most cases however any regular employment is out of reach. Thus, the preparation by training and civic education should point even more effectively to the practical capacities of each student and adult in education, to produce and to earn a living through regular work. (It is part of the civic aspect of education to prevent people in general, refugees and IDPs in particular, from sliding into a criminal career simply from the fact that they have never learned how to work and that they would never be given a chance to work). </span></p><span data-dcnode-id="781" instrument_node="">
</span><p align="justify" data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">d. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Returning to the important decision (as described in Chapter 3) on whether refugees and IDPs shall be integrated as soon as possible into their new environment or shall be kept there under the imperative of return, educational consequences are crucial, both for civic education and vocational perspectives. Integration as a concept requires a functioning public education system which is ready to absorb a certain number of refugee children or adolescents. As long as language is not a big problem, and religion is not really divisive, such a strategy may be recommended, especially when foreign aid can be diverted into the school system easily and teachers are available (e.g. as was the case with many Macedonian-Albanian refugees in 2001, who got good education opportunities in Kosovo for some time, many of them with no clear idea about returning, others prepared to go as soon as possible). Of course, such a strategy requires a timely allocation of refugees and IDPs within the community, and this refers again to the Soft Sector environment. Civic education in this context should focus on a binary value-track, i.e. allow differentiated learning of both the original and the new cultural contexts. In the vocational field, special care should be given the competition for attractive work-places. </span></p><span data-dcnode-id="778" instrument_node="">
</span><p align="justify" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">If, however, a concept of return is being given priority, then the educational consequences are quite different: the preparation for return should be pivotal. The basic outlay of the EmpoR-project can be taken as a model, which is also transferable to refugeesand IDP situations. The return-strategy requires a scenario where the environment of refugees and IDPs is treated ‘like a foreign country’. If integration into the surrounding society is not an aim, then the conviviality and the social contacts should be prepared in a rather different way: from the side of the refugees and IDPs, categories such as gratitude, respect for and acceptance of temporary rules gain in importance. Of course, the intermediate stage of waiting and preparing for return should never end in an insular situation with strong elements of segregation or even detention (such as in Australia), and for education it is important to translate the temporary and the permanent set of values and living conditions. Civic education can utilize this situation by choosing a comparative approach in order to provide the returnees with a positive and understanding follow-up from their dwelling in a host-country. Vocational training, on the other hand, should mainly concentrate on what the returnees will find after their return instead of reflecting real labour market conditions in the host country.</span></p><span data-dcnode-id="775" instrument_node="">
</span><p align="justify" data-dcnode-id="772"><b data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">10. Recommendations</span></b></p><span data-dcnode-id="771" instrument_node="">
</span><p align="justify" data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">10.1 General Recommendations</span></p><span data-dcnode-id="768" instrument_node="">
</span><p align="justify" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">1) Education is the key sector to stabilize the social and cultural situation of refugees and IDPs. It is equally important to prepare for any kind of return, irrespective to which place, and for the integration of refugees and IDPs into a new social and cultural environment.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p align="justify" data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">2) Education for refugees and IDPs can become a powerful tool of pre-emptive diplomacy and a major factor in peace-keeping operations. </span></p><span data-dcnode-id="762" instrument_node="">
</span><p align="justify" data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">3) Any ‘situational’ approach requires a careful review of the legal status of refugees and new international binding rules for IDPs and returnees.</span></p><span data-dcnode-id="759" instrument_node="">
</span><p align="justify" data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">4) Education under post-war and post-conflict conditions should be pragmatic and not attempt to transfer models from safe and prosperous societies. Educational institutions should be protected as a priority, wherever the environment is still violent or war-stricken. </span></p><span data-dcnode-id="756" instrument_node="">
</span><p align="justify" data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">5) The right to education should not be restricted to primary education. All age groups and types of refugees and IDPs should be supplied with a maximum of educational care. </span></p><span data-dcnode-id="753" instrument_node="">
</span><p align="justify" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">6) The major educational aims should always focus on the fact that being a refugee or a displaced person is under no circumstance normal and should never become normal. All education has a community building component, into which the clients should be included.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p align="justify" data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">7) Education for refugees and IDPs should always be embedded into a concept of Soft Sector policy</span></p><span data-dcnode-id="747" instrument_node="">
</span><p align="justify" data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">8) The systematic approach should always reflect the interdependency between most Soft Sectors, as are:</span></p><span data-dcnode-id="744" instrument_node="">
</span><p align="justify" data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Education, science and training</span></p><span data-dcnode-id="741" instrument_node="">
</span><p align="justify" data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Public health, prevention</span></p><span data-dcnode-id="738" instrument_node="">
</span><p align="justify" data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Social protection</span></p><span data-dcnode-id="735" instrument_node="">
</span><p align="justify" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Culture</span></p><span data-dcnode-id="732" instrument_node="">
</span><p align="justify" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Environment</span></p><span data-dcnode-id="729" instrument_node="">
</span><p align="justify" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">9) They must interact within the limitations of a refugee and IDP situation with some priority Hard Sectors:</span></p><span data-dcnode-id="726" instrument_node="">
</span><p align="justify" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Rule of Law</span></p><span data-dcnode-id="723" instrument_node="">
</span><p align="justify" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Housing and food</span></p><span data-dcnode-id="720" instrument_node="">
</span><p align="justify" data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Occupation and Employment</span></p><span data-dcnode-id="717" instrument_node="">
</span><p align="justify" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Transport</span></p><span data-dcnode-id="714" instrument_node="">
</span><p align="justify" data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Security and Safety</span></p><span data-dcnode-id="711" instrument_node="">
</span><p align="justify" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">10) The educational strategy should be based on an objectivisation of the subjective disposition of the target groups. This means that education should not directly build on the perception of the clients’ self-references, but create a sort of observing and attentive distance. The main components are:</span></p><span data-dcnode-id="708" instrument_node="">
</span><p align="justify" data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Languages (potential for multi-lingualism)</span></p><span data-dcnode-id="705" instrument_node="">
</span><p align="justify" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Gender</span></p><span data-dcnode-id="702" instrument_node="">
</span><p align="justify" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Religion</span></p><span data-dcnode-id="699" instrument_node="">
</span><p align="justify" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Traditional heritage</span></p><span data-dcnode-id="696" instrument_node="">
</span><p align="justify" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Previous economic status (including property)</span></p><span data-dcnode-id="693" instrument_node="">
</span><p align="justify" data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">These five categories serve for any curriculum construction within concepts of ethnicity, civilisation and culture. </span></p><span data-dcnode-id="690" instrument_node="">
</span><p align="justify" data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">11) The inclusion of the clients and the participation of competent refugees and IDPs in the educational process should be supported. Even short-term organisation of education should provide in-service training of this group.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p align="justify" data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">12) There are two basic objectives for all policy: a focus on return and a focus on integration into the host community. Whatever is decided politically must be communicated clearly to the clients. This is a major educational task.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p align="justify" data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">10.2. Specific keywords</span></p><span data-dcnode-id="681" instrument_node="">
</span><p align="justify" data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Certain key words in the text are taken up and explained in this list :</span></p><span data-dcnode-id="678" instrument_node="">
</span><p align="justify" data-dcnode-id="675"><i data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Anamnestic Approach</span></i></p><span data-dcnode-id="674" instrument_node="">
</span><p align="justify" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Educational strategies for refugees and IDPs, especially in such complex and problematic regions such as the Balkans and the Caucasus, must be aware of the historical and cultural realities (or constructs) that form the background of the present humanitarian crisis. Education must be context-specific and ‘embedded’. </span></p><span data-dcnode-id="671" instrument_node="">
</span><p align="justify" data-dcnode-id="668"><i data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Belonging </span></i></p><span data-dcnode-id="667" instrument_node="">
</span><p align="justify" data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">The status of being a refugee or IDP is fundamentally defined by a desorientation or a loss of the sense of where to belong. Education must be aware of not imposing an artificial sanctuary. The starting point for all educational efforts is that the refugees and IDPs have a right to belong to a larger entity/community but at the moment is denied this right.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p align="justify" data-dcnode-id="661"><i data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Binary Value-Track</span></i></p><span data-dcnode-id="660" instrument_node="">
</span><p align="justify" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Since the future circumstances of refugees and IDPs are uncertain (return or permanent emigration?), education must help and enable them to live in a transitory world by keeping alive the existing cultural traditions and competencies and preparing for integration into a new social and cultural environment. There is a danger in returning refugees and IDPs to a society which has changed substantially in the meantime. Education should also make it clear to the clients that some of their social and cultural rights and titles may have disappeared in the meantime. Legal counselling should be part of the education process. </span></p><span data-dcnode-id="657" instrument_node="">
</span><p align="justify" data-dcnode-id="654"><i data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Clients</span></i></p><span data-dcnode-id="653" instrument_node="">
</span><p align="justify" data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Everywhere, education has a community building aspect to it that should also apply to refugees and IDPs. Thus, it should not be limited to children and adolescents but encompass young and old in an effort to make education an effective tool for the formation of a (temporary) community (systemic approach)</span></p><span data-dcnode-id="650" instrument_node="">
</span><p align="justify" data-dcnode-id="647"><i data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Curriculum</span></i></p><span data-dcnode-id="646" instrument_node="">
</span><p align="justify" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">The curriculum for refugees and IDP education in all its various aspects must follow one crucial goal: It must pave the way for the refugees and IDPs to regain control of their lifes in the most practical sense. Learning must open the path to overcome victimization. Therefore, practical skills of direct relevance to the given circumstances take priority over knowledge acquisition for its own sake. The curriculum should aim at democratic élites and citizens who are active in their community. This does not mean that education should be elitist. But a community of refugees and IDPs and the respective community, which will receive them in the future, will need democratic élites rather than outdated traditional peers.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p align="justify" data-dcnode-id="640"><i data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Learner-centred methods</span></i></p><span data-dcnode-id="639" instrument_node="">
</span><p align="justify" data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Since relevance is the main criterion for refugees and IDP education, the learner in his/her present circumstances has to be in the centre (and not an abstract set of educational goals and procedures). Determining what is relevant to the specific group of refugees and IDPs has to become part of the educational process and a way of rebuilding confidence in the learners’ own strength. Because many refugees and IDPs suffer from traumas and other grave learning indispositions, a special ‘didactic’ approach should be developed.</span></p><span data-dcnode-id="636" instrument_node="">
</span><p align="justify" data-dcnode-id="633"><i data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Personalities</span></i></p><span data-dcnode-id="632" instrument_node="">
</span><p align="justify" data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">In the case of refugees and IDPs, “identity” can be an ambiguous concept as it can imply a defensive attitude or intransigent norms. Education should offer a complementary or alternative frame of reference by emphasizing the development of “personalities”. The right to identity is often a misunderstood account to self-defined perceptions within a group. An open society requires a certain competition concerning life-worlds, value patterns, and life-styles. A mature personality can discriminate without sacrificing his or her personal opinion and point of view. </span></p><span data-dcnode-id="629" instrument_node="">
</span><p align="justify" data-dcnode-id="626"><i data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Participation and Shared Responsibilities</span></i></p><span data-dcnode-id="625" instrument_node="">
</span><p align="justify" data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Education means enabling and empowering. Thus, it must be organized in such a way that it activates the existing capacities of refugees and IDPs to take control again of their present and future lives. This is not the result, but the ongoing ‘methods’ of the educational process. Therefore, participation and shared responsibilities are essential in fostering self-reliance.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p align="justify" data-dcnode-id="619"><i data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Situational Approach</span></i></p><span data-dcnode-id="618" instrument_node="">
</span><p align="justify" data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">It is recommended that the legal status of refugees and IDPs is steadily developed, but not to the disadvantage of situational pragmatic policy reflecting the concrete circumstances. Education in refugee camps will vary significantly from education within an existing education system with institutions and a sound organisation. Multi-cultural situation can be more easily created than multi-ethnic ones. Cantonisation is not a recommended strategy for education. </span></p><span data-dcnode-id="615" instrument_node="">
</span><p align="justify" data-dcnode-id="612"><i data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Soft Sectors</span></i></p><span data-dcnode-id="611" instrument_node="">
</span><p align="justify" data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">A sustainable Soft Sector strategy is important for any successful education policy. This requires a tight coordination between the players, both local and international, who are in charge of the civil reconstruction of societies and the care for refugees and IDPs. The accreditation of education programs should include a minimum of checking the basics of Soft Sector policy, especially in the fields of education and social protection. </span></p><span data-dcnode-id="608" instrument_node="">
</span><p align="justify" data-dcnode-id="605"><b data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">APPENDIX 2</span></b></p><span data-dcnode-id="604" instrument_node="">
</span><p align="justify" data-dcnode-id="601"><b data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Hearing on </span></b></p><span data-dcnode-id="600" instrument_node="">
</span><p align="justify" data-dcnode-id="597"><b data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">EDUCATION OF REFUGEES AND INTERNALLY DISPLACED PERSONS</span></b></p><span data-dcnode-id="596" instrument_node="">
</span><p align="justify" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">European Youth Centre Budapest, 10 September 2003</span></p><span data-dcnode-id="593" instrument_node="">
</span><p align="justify" data-dcnode-id="589"><b data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Mr Huseynov (</span></b><span data-dcnode-id="590" instrument_node="">Rapporteur) thought that education was a small but important component in dealing with every humanitarian catastrophe which provoked a flow of refugees. Education was a basic right for all. The highest concentration of refugees and internally displaced persons (IDPs) in Europe was in the Caucasus and the Balkans, hence these two regions deserved special attention in the report in preparation. Refugees and IDPs were the product of wars and inter-state and inter-ethnic conflicts. While a solution was being sought to deal with these causes of human displacements by such bodies as OSCE, the Council of Europe could do much to alleviate the suffering of these people. Although the rights of refugees and IDPs were legally protected by various international texts, ranging from the UN Universal Declaration on Human Rights (art. 14) to the Geneva Convention, and significant ground work was done by various international organisations and NGOs, education was the most vulnerable element. There were various approaches to dealing with educational problems: from full integration of refugees and IDPs in the education system of the host country to the creation of a parallel system. Certain refugees, even housed in tents, could receive education in their mother tongue, such as the refugees from Armenia in Azerbaijan. It was far more difficult for those who found themselves isolated in a totally unknown linguistic environment, for instance Afghan, Kurd and other refugees in Ukraine and Russia. Many of them did not attend school for that reason. Azerbaijan hosted more than one million refugees and IDPs. The variety of the problems had to be taken into account when they were examined in a European context. </span></p><span data-dcnode-id="588" instrument_node="">
</span><p align="justify" data-dcnode-id="584"><b data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Mrs Lauritzen</span></b><span data-dcnode-id="585" instrument_node="">, UNHCR representative in Hungary, welcomed the Committee’s involvement in refugee education, which was a crucial and essential part of the assistance efforts of her organisation. UNHCR was responsible for the international protection of refugees and other persons of concern as well as for seeking durable solutions to their plight. There were currently some 22 million persons of concern to UNHCR. Refugees were defined in art. 1 of the 1951 Convention and 1967 Protocol relating to the Status of Refugees. Basically, their departure from their country of origin was involuntary, for fear of prosecution, and differed from that of migrants, whose departure was mostly voluntary, prompted by the wish to seek a better future. Art. 22 of the 1951 Geneva Convention referred specifically to obligations of contracting States in the field of education of refugees. When dealing with this issue, it was important to include not only refugees but also IDPs (who were not under UNHCR mandate unless so requested by the General Assembly or the Secretary General of the United Nations), asylum seekers and returnees, as well as stateless persons and (in Hungary) those “authorised to stay”. The challenge was to ensure reasonable educational provision for such persons whilst keeping in mind the long term solutions.</span></p><span data-dcnode-id="583" instrument_node="">
</span><p align="justify" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">The situation in Europe differed from that in most other parts of the world in so far as it was not usually a matter of massive influx of displaced persons but more a question of individual cases. Central and East European countries were considered by most asylum seekers as transit countries. The journey towards their final destination was long and dangerous and in that period the educational and psychological requirements of children were at stake.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p align="justify" data-dcnode-id="576"><b data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">The Chairman</span></b><span data-dcnode-id="577" instrument_node=""> asked for data on the number of refugees in Europe.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p align="justify" data-dcnode-id="571"><b data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Mrs Lauritzen </span></b><span data-dcnode-id="572" instrument_node="">said there were no statistics about the region covered by the Council of Europe as such but she could provide statistics on individual countries.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p align="justify" data-dcnode-id="566"><b data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Mr. Daxner</span></b><span data-dcnode-id="567" instrument_node=""> (consultant expert) believed that in Europe globalisation meant in the first place Europeanisation. It would take many years for the new Europe to emerge from the many old Europes.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p align="justify" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">He insisted that the existence of refugees should never be accepted as normal. Yet it was significant. There had been more than 50 displacements in the Balkans over the last century. Moral and psychological issues were at stake: a person suffering the fate of displacement always carried a history of torture, famine, rape and deprivation. Therefore education should only be part of a systemic approach, involving also politicians, social workers etc. One of the most difficult issues was whether an educational policy for refugees should be directed towards their integration in the host country or should help them return. There was no general rule but it was important to rationalise the decision. The wishes of the refugees and the intentions of host countries should be taken into account. The main thing was however not to make refugee status permanent, as was the case in the Lebanese and Syrian refugee camps, where the third generation of refugees were children who did not know the meaning of the word “home”.</span></p><span data-dcnode-id="562" instrument_node="">
</span><p align="justify" data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Once the survival of refugees was assured, education and social protection were the two pillars on which their future was built. The highest priority was the respect of rule of law and the more buffers there were between it and education, the more likely the two would fail. </span></p><span data-dcnode-id="559" instrument_node="">
</span><p align="justify" data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Without commenting on the reasons for the displacement of persons, he felt it was relevant to note, with regard to education, that a common factor between the Balkans and the Caucasus was that they were emerging from communist systems in which education had been used as a tool for enforcing nationalist ideologies.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p align="justify" data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">He also noted that in contrast to rebuilding roads, housing or energy plants, the rebuilding of viable health and education systems was extremely difficult and expensive in a post-conflict situation. There was considerable room for corruption, the costs were high and donors easily discouraged. </span></p><span data-dcnode-id="553" instrument_node="">
</span><p align="justify" data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">The countries from the Balkans and the Caucasus should pause from focussing on their past and begin to look into the future when dealing with refugees. </span></p><span data-dcnode-id="550" instrument_node="">
</span><p align="justify" data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Vocational training was a vital part of education for refugees because they needed more than ordinary schooling and, above all, a great deal of personal, psychological encouragement and empowerment and time to develop self respect. </span></p><span data-dcnode-id="547" instrument_node="">
</span><p align="justify" data-dcnode-id="543"><b data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Mr Devinsky</span></b><span data-dcnode-id="544" instrument_node=""> asked Mr Daxner to elaborate on the chances of creating an efficient educational system for refugees and IDPs in Kosovo.</span></p><span data-dcnode-id="542" instrument_node="">
</span><p align="justify" data-dcnode-id="538"><b data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Mr Korobeynikov </span></b><span data-dcnode-id="539" instrument_node="">referred to Mr Daxner’s remark about globalisation starting with Europeanisation and thought that this would be a good approach for tackling the problems of refugees and IDPs.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p align="justify" data-dcnode-id="533"><b data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Mr Daxner</span></b><span data-dcnode-id="534" instrument_node=""> said that in Kosovo there was an urgent need for primary and secondary education for refugees and IDPs. When head of UNMIK Education, he had assigned higher education for Serbs to the University of Mitrovica since the University in Pristina did not allow any Serbs in. He had favoured an integrative system as both previous systems – the official Yugoslav and the parallel system for the Kosovo Albanians – were outdated.</span></p><span data-dcnode-id="532" instrument_node="">
</span><p align="justify" data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Different regions of the world indeed needed intermediate steps towards globalisation, which had been achieved at an economic level, but they needed more time for adjustment at a political, social and cultural level. In the educational field this meant recognition of diplomas in foreign countries, this being especially important for refugees and IDPs.</span></p><span data-dcnode-id="529" instrument_node="">
</span><p align="justify" data-dcnode-id="522"><b data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Ms Temporal</span></b><span data-dcnode-id="526" instrument_node="">, Senior Education Officer in UNHCR, emphasized that UNHCR uphelds education as a fundamental human right as stipulated in the 1951 Refugee Convention as well as in various international instruments and declarations including the Framework for Action on Education For All and Millennium Development Goals. Education was a key to the future of the refugees. It had to be started at the earliest stage of emergency. UNHCR together with implementing partners and in partnerships with governmental bodies and other UN Agencies had been undertaking measures to provide basic education and achieve gender parity in education. The publication of the UNHCR Education Field Guidelines in February 2003 was one of the initiatives that UNHCR had done to improve the management of refugee education programmes. Issues and challenges in the process pf fulfilling the rights of refugees to education were many. Only about 36% of UNHCR’s population of concern had had access to education when the aim was to provide all school-age children with primary education. The other barriers to education and the recommendations made by the Assembly in Rec. 1596 (2003) on the situation of young migrants in Europe (and see </span><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assembly.coe.int/ASP/Doc/RefRedirectEN.asp%3FDoc%3DDoc.%25209645"><span data-dcnode-id="525" instrument_node="">Doc. 9645</span></a><span data-dcnode-id="523" instrument_node="">) also applied to refugees/IDPs. In addition, refugees in a number of host countries were excluded from schools even if those countries were signatories to the Convention on the Rights of the Child. Even if education was regarded by refugees as their priority, this was not equally matched with funding resources as prioritised by decision-makers and donors. Education was viewed as a “soft” sector and had often to compete with assistance for survival, hence, it had not been given the proper attention and priority that was deserved. Unlike food and clothing, education had a lasting effect on refugees as this was the only thing that they carried with them wherever they go. Education was not only mind-saving it was also life-saving. It was a tool for protection of children and youth and an instrument for social cohesion. Equal access and opportunities to education should therefore be unequivocably supported.</span></p><span data-dcnode-id="521" instrument_node="">
</span><p align="justify" data-dcnode-id="517"><b data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The Chairman</span></b><span data-dcnode-id="518" instrument_node=""> stressed that the Committee considered education as a priority in all circumstances, and this included refugees and IDPs.</span></p><span data-dcnode-id="516" instrument_node="">
</span><p align="justify" data-dcnode-id="512"><b data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Ms Schmidt</span></b><span data-dcnode-id="513" instrument_node="">, Programme Manager of the Hungarian Language School, introduced the young people who were going to share their experiences with the Committee. They all had refugee status and studied Hungarian. They had all integrated well into their host country although they had encountered many problems along the way.</span></p><span data-dcnode-id="511" instrument_node="">
</span><p align="justify" data-dcnode-id="507"><b data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Christian, D. M</span></b><span data-dcnode-id="508" instrument_node="">, 29, refugee from Cameroon, had seen many foreigners living in Hungary who were managing to get by without learning Hungarian. For him, however, learning the language of the host country was vital for his integration, and was also a way of showing his gratitude to the country which had given him refugee status. Thousands of prosecuted people around the world were not that lucky. The Hungarian language, however, was very difficult. On his arrival he had been caught in a vicious circle – he had to learn the language in order to find a job and integrate, but at the same time he had to work in order to sustain himself and pursue his language studies. He had passed a state language exam and wished to strengthen his knowledge but his job in an international company in Hungary was taking up all his time. State aid for refugees should perhaps be shortened to one year, rather than the current three, but during this time the refugees should do nothing but learn the language.</span></p><span data-dcnode-id="506" instrument_node="">
</span><p align="justify" data-dcnode-id="499"><b data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Mr Devinsky </span></b><span data-dcnode-id="503" instrument_node="">was interested in Christian’s educational background and the </span><b data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Chairman</span></b><span data-dcnode-id="500" instrument_node=""> wished to know whether he would stay in Hungary.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p align="justify" data-dcnode-id="494"><b data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Christian</span></b><span data-dcnode-id="495" instrument_node=""> explained that he had a college degree as a journalist and had continued his studies by correspondence on his arrival in Hungary. He intended staying as his wife was Hungarian. </span></p><span data-dcnode-id="493" instrument_node="">
</span><p align="justify" data-dcnode-id="489"><b data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Amalia K.</span></b><span data-dcnode-id="490" instrument_node="">, 36, refugee from Armenia, also found Hungarian very difficult and thought that at least six months were necessary in order to get the basics. However, studies alone were not enough, one had to be able to communicate with local people. The university studies that she had started in Armenia were of very high level and she was unable to pursue them now because of insufficient knowledge of the language and because of financial constraints. Earning a living had to be the priority. Her son would soon start his secondary studies at school. He was already fluent in Hungarian and was helping the family but was too young to start work.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p align="justify" data-dcnode-id="484"><b data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Dusan M.</span></b><span data-dcnode-id="485" instrument_node="">, 30, refugee from Serbia, had completed a university degree in medical sciences just before coming to Hungary four years ago and it had been difficult to find the psychological motivation to start from scratch in order to learn Hungarian. He had also been caught in the vicious circle of language-job. He had soon realised that a basic knowledge of the language only amounted to finding a basic job. The quality of his life had improved in parallel with a better knowledge of Hungarian. It had taken him two years in order to achieve the level which enabled him to use his professional competence in the way he would have done in his home country. He had found a very good job as a medical doctor in a pharmaceutical company.</span></p><span data-dcnode-id="483" instrument_node="">
</span><p align="justify" data-dcnode-id="476"><b data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Lika M.</span></b><span data-dcnode-id="480" instrument_node="">,</span><b data-dcnode-id="478"><span data-dcnode-id="479" instrument_node=""> </span></b><span data-dcnode-id="477" instrument_node="">21, refugee from Georgia (Abkhazia), had been a first-year university student when she had to flee her country without even being able to take her documents with her. She had made good progress in learning Hungarian, although not enough to be able to study. For the time being, she and her younger brother had to work in the grocery business of their parents in order to make a living. She dreamed of becoming a “normal” person, able to pursue her university studies and to take her destiny in her own hands. She was jealous when friends of hers told her how many interesting things they were doing as students. Financial problems were the biggest obstacle.</span></p><span data-dcnode-id="475" instrument_node="">
</span><p align="justify" data-dcnode-id="471"><b data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Jusup N.</span></b><span data-dcnode-id="472" instrument_node="">, refugee from Russia (Chechnya), had lived in Moscow but with the troubles in Chechnya had started having conflicts with his schoolmates. He had become a very successful junior wrestler. When his family arrived in Hungary he was 15 and he had found the first six months very difficult, without any friends and with all his free time occupied by the study of Hungarian. He enrolled in a bilingual (Russian - Hungarian) secondary grammar school but the tuition fee was a heavy burden for his family. Nevertheless, his fees were reduced because of his excellent marks. He was a national junior champion in wrestling. However, he could not participate in international competitions abroad because of visa problems. He had been sent back by the immigration authorities on his first trip abroad.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p align="justify" data-dcnode-id="468"><span data-dcnode-id="469" instrument_node=""> </span></p><span data-dcnode-id="467" instrument_node="">
</span><p align="justify" data-dcnode-id="460"><b data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The Chairman</span></b><span data-dcnode-id="464" instrument_node=""> pointed out that, normally, top sportsmen received all the facilities in order to obtain the nationality of the country for which they were competing and </span><b data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Mrs Lauritzen</span></b><span data-dcnode-id="461" instrument_node=""> assured him that the UNHCR offices could help in obtaining the appropriate travel permits.</span></p><span data-dcnode-id="459" instrument_node="">
</span><p align="justify" data-dcnode-id="455"><b data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Michael S.,</span></b><span data-dcnode-id="456" instrument_node=""> 21, refugee from Ethiopia, had finished high school in his country and wanted to continue his education but the school that he had found had asked him 2000 USD for tuition fees. The Hungarian refugee office had been unable to help.</span></p><span data-dcnode-id="454" instrument_node="">
</span><p align="justify" data-dcnode-id="447"><b data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Mrs Garamol</span></b><span data-dcnode-id="451" instrument_node=""> explained that the office could not fund studies in private schools and advised Michael to find a public school where tuition would be free of charge. </span><b data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Mrs Skarbøvik</span></b><span data-dcnode-id="448" instrument_node=""> encouraged him to try different schools.</span></p><span data-dcnode-id="446" instrument_node="">
</span><p align="justify" data-dcnode-id="439"><b data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Mrs Skarbøvik</span></b><span data-dcnode-id="443" instrument_node=""> and </span><b data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Mr McNamara</span></b><span data-dcnode-id="440" instrument_node=""> asked whether the Hungarian government required a specific level of language and whether there were exams.</span></p><span data-dcnode-id="438" instrument_node="">
</span><p align="justify" data-dcnode-id="434"><b data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Mr Daxner</span></b><span data-dcnode-id="435" instrument_node=""> asked the young refugees to say how their refugee status had made life more difficult for them than for ordinary migrants and whether they intended to stay in Hungary or to return to their countries of origin.</span></p><span data-dcnode-id="433" instrument_node="">
</span><p align="justify" data-dcnode-id="429"><b data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Dusan</span></b><span data-dcnode-id="430" instrument_node=""> was satisfied with his position and intended to stay.</span></p><span data-dcnode-id="428" instrument_node="">
</span><p align="justify" data-dcnode-id="424"><b data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Christian </span></b><span data-dcnode-id="425" instrument_node="">found that the refugee status did not give him a permanent position but for the time being it was satisfactory.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p align="justify" data-dcnode-id="419"><b data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Amalia</span></b><span data-dcnode-id="420" instrument_node=""> was satisfied with her Hungarian language studies which she believed were also a sign of respect for Hungary and for Europe. However, financial constraints placed a very heavy burden on refugees. Making a living, not studying, was the biggest problem.</span></p><span data-dcnode-id="418" instrument_node="">
</span><p align="justify" data-dcnode-id="414"><b data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Jusup</span></b><span data-dcnode-id="415" instrument_node=""> believed his status gave him security and peace of mind and allowed him to enjoy his life and his work. He wished to stay.</span></p><span data-dcnode-id="413" instrument_node="">
</span><p align="justify" data-dcnode-id="409"><b data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Michael</span></b><span data-dcnode-id="410" instrument_node=""> was happy with his status but regretted not being able to work. He had spent nine months in Hungary living in a Red Cross camp and found it difficult to pay for a ticket into town.</span></p><span data-dcnode-id="408" instrument_node="">
</span><p align="justify" data-dcnode-id="406"><span data-dcnode-id="407" instrument_node=""> </span></p><span data-dcnode-id="405" instrument_node="">
</span><p align="justify" data-dcnode-id="401"><b data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Mr Dobo</span></b><span data-dcnode-id="402" instrument_node="">, Head of the Refugee Directorate in the Hungarian Ministry of the Interior, dealt with the granting of refugee status but also involved facilitating the integration of refugees. Education, including that of adults, was a vital condition for it. Learning the language of the host country was extremely important. Other agencies and bodies should also play a role. The rights of recognised refugees were very close to those of Hungarian citizens. Elementary education was compulsory for recognised refugees and became so for other children with residence permits after spending one year in Hungary. Even before that parents could opt for public education. </span></p><span data-dcnode-id="400" instrument_node="">
</span><p align="justify" data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Although schools received subsidies for teaching children with different difficulties, they did not receive extra funds for dealing with refugees or asylum seekers. Parents of refugee children were entitled to a school enrolment benefit once a year through the local municipality. Refugees were also entitled to preparatory Hungarian language training free of charge but no schools had yet passed the necessary test for a licence under this provision. Meanwhile the UNHCR was funding a few elementary schools.</span></p><span data-dcnode-id="397" instrument_node="">
</span><p align="justify" data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">The government was now trying to adopt an inter-ministerial approach to the problem. Unfortunately the Ministry of Education had been unable so far to appoint a specific unit dealing with refugee education. No specific methods existed on how to prepare refugee children for the requirements of compulsory education. The system in general needed to be reviewed, in the context of the general review of the educational and social system.</span></p><span data-dcnode-id="394" instrument_node="">
</span><p align="justify" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Adult education was an important element in the education of refugees. The mutual recognition of diplomas between countries was also an issue on which a progress had to be made. </span></p><span data-dcnode-id="391" instrument_node="">
</span><p align="justify" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node=""> </span></p><span data-dcnode-id="388" instrument_node="">
</span><p align="justify" data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">To his knowledge there was no general rule for language requirements in order to find a job. Such requirements existed in the past for certain professions, such as doctors, but had been scrapped.</span></p><span data-dcnode-id="385" instrument_node="">
</span><p align="justify" data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">In a way refugees were privileged as they could apply for naturalisation after three years residence in Hungary, compared to eight for other foreigners.</span></p><span data-dcnode-id="382" instrument_node="">
</span><p align="justify" data-dcnode-id="378"><b data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Jusup</span></b><span data-dcnode-id="379" instrument_node=""> asked for clarification concerning Hungarian citizenship.</span></p><span data-dcnode-id="377" instrument_node="">
</span><p align="justify" data-dcnode-id="373"><b data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Mr Dobo</span></b><span data-dcnode-id="374" instrument_node=""> replied that the final decision by the President of the Republic should be taken within 21 months of the application.</span></p><span data-dcnode-id="372" instrument_node="">
</span><p align="justify" data-dcnode-id="368"><b data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">The Chairman</span></b><span data-dcnode-id="369" instrument_node=""> referred to a report on the Bologna process which had been prepared by the Committee and had just been adopted by the Standing Committee. Was Hungary a party to the Bologna process?</span></p><span data-dcnode-id="367" instrument_node="">
</span><p align="justify" data-dcnode-id="360"><b data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Mr Gabor, </span></b><span data-dcnode-id="364" instrument_node="">Head of Department of International Relations, Hungarian Ministry of Education,</span><b data-dcnode-id="362"><span data-dcnode-id="363" instrument_node=""> </span></b><span data-dcnode-id="361" instrument_node="">replied positively. The goals under this agreement had to be achieved by 2010. The universities had just introduced the credit transfer system (ECTS). An amendment of the current law on recognition of diplomas was being prepared by the Ministry. The current dual system of universities and other higher education institutions made it difficult to align the existing qualifications and this was why the government was moving towards a linear system.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p align="justify" data-dcnode-id="352"><b data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Mr Kováts</span></b><span data-dcnode-id="356" instrument_node="">, Project coordinator of the Menedék Association for Migrants, said that more than 170&nbsp;000 people had crossed the Hungarian border over the last 10 years seeking asylum – most of them using it as a transit country, others returning home. Although mass movements of this kind had been experienced by Hungary and its neighbours in the first half of the 20</span><sup data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">th</span></sup><span data-dcnode-id="353" instrument_node=""> century, the 40 years of closed borders under communism had left the country without the necessary experience in receiving people in need of protection. Most arrivals at present were from remote regions of other continents.</span></p><span data-dcnode-id="351" instrument_node="">
</span><p align="justify" data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">The education of these people was crucial in determining their economic and social integration.</span></p><span data-dcnode-id="348" instrument_node="">
</span><p align="justify" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">In relation to compulsory education, schools which catered for foreign pupils (foreign schools, bilingual schools) had far fewer problems than those which had to face the arrival of refugees (in neighbourhoods with foreign communities or close to reception centres). Most of the problems arose from three sources: 1/ Although the legislative background might be in place, there was no comprehensive policy to support it and those responsible for its implementation were not sufficiently informed. There was lack of support in securing access to education for families in difficult social situations. 2/ Teacher training did not include dealing with the inadequate language competence of the foreign pupils. Most schools were handling the situation as well as they could but teachers were nevertheless overburdened, there was no funding for extra costs and no professional control. 3/ Socio-cultural differences between the local and the foreign children created conflicts in the classroom. These problems occurred less frequently in well-established and integrated foreign communities, but were routine when refugee reception centres were nearby. Local communities would go as far as preventing foreign children from enrolling in the local school fearing that the quality of education would deteriorate.</span></p><span data-dcnode-id="345" instrument_node="">
</span><p align="justify" data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Certain refugees were highly motivated to enrol in higher education studies but their insufficient level of Hungarian and financial difficulties made this task difficult.</span></p><span data-dcnode-id="342" instrument_node="">
</span><p align="justify" data-dcnode-id="338"><b data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Mr Devinsky</span></b><span data-dcnode-id="339" instrument_node=""> asked whether Mr Kovats’ association cooperated with the Ministry of Education. ECTS was not a solution as most refugees came from countries where this did not exist.</span></p><span data-dcnode-id="337" instrument_node="">
</span><p align="justify" data-dcnode-id="333"><b data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">The Chairman</span></b><span data-dcnode-id="334" instrument_node=""> pointed out that successful integration of refugees was more than just learning a language and wondered what other social and cultural activities could be developed.</span></p><span data-dcnode-id="332" instrument_node="">
</span><p align="justify" data-dcnode-id="328"><b data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Mr Kováts </span></b><span data-dcnode-id="329" instrument_node="">said that his association had not entered into discussions with the Ministry of Education. The problem with qualifications was that many refugees had had to flee without even taking their identification documents with them, let alone their diplomas. Several initiatives for the integration of refugees had been taken by NGOs, such as training manuals.</span></p><span data-dcnode-id="327" instrument_node="">
</span><p align="justify" data-dcnode-id="323"><b data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Mrs Koháry</span></b><span data-dcnode-id="324" instrument_node="">, Director of the Hungarian Language School, said that before the fall of communism there had been almost no foreigners settling in Hungary and therefore there were no adequate language training facilities. Now that there were more than 80 different countries represented amongst the students in the school, there was a need for special teaching techniques, curricula and teacher training. The school was therefore confronted with several difficulties, not so much of a financial nature (they received a grant from the European Union), but in terms of methodology and sharing experience with other schools. Although this was not in the school’s jurisdiction, she was also trying to help refugees with their social, legal and family problems in cooperation with the relevant ministries and NGOs. There was however no umbrella organisation to tackle the whole range of problems.</span></p><span data-dcnode-id="322" instrument_node="">
</span><p align="justify" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">It was a mistake to believe that refugees should only concentrate on language learning upon their arrival in the host country. For those of them who found this very difficult it could turn counterproductive and discourage them totally. Language training had to be coupled with the granting of provisional employment opportunities such as voluntary work. For the most untrained refugees, some basic level of integration should be offered, for instance as social workers or through the performance of other socially useful tasks.</span></p><span data-dcnode-id="319" instrument_node="">
</span><p align="justify" data-dcnode-id="315"><b data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Mrs Skarbøvik</span></b><span data-dcnode-id="316" instrument_node=""> understood the importance of education and the financial difficulties that hampered it. She wondered whether the state should impose compulsory language training.</span></p><span data-dcnode-id="314" instrument_node="">
</span><p align="justify" data-dcnode-id="310"><b data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Mrs Koháry</span></b><span data-dcnode-id="311" instrument_node=""> did not believe that compulsory language training was the solution for everybody. Different people found different solutions – for instance Amalia’s son was in a normal Hungarian school although he had lost two years, whilst Jusup had found a special bilingual school. Schools in general had to be flexible, so that they could deal with individual situations. </span></p><span data-dcnode-id="309" instrument_node="">
</span><p align="justify" data-dcnode-id="305"><b data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Mr Daxner</span></b><span data-dcnode-id="306" instrument_node=""> concluded that the situation of refugees in Hungary was “on a first class coach”, compared to most of the rest of the world. Discussions on the best curriculum, number of hours, choice of teachers etc. were a matter of sophistication compared to the urgent needs of thousands of refugees in the world’s hot spots. There, the aim should be to meet at least the minimum educational standards of the host country. The problem was that in many cases host countries did not wish refugees to settle and were therefore not necessarily ready to install inclusive systems. Politicians and donor conferences always concentrated their efforts on dealing with the hard sectors and there was little understanding that the soft sector and education in particular was just as “hard” and no less expensive. Education and security were interdependent. </span></p><span data-dcnode-id="304" instrument_node="">
</span><p align="justify" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">The young refugees had described their language learning situations, but it would have been just as interesting to learn about their cultural integration. Refugees and displaced persons were also bearers of their own cultures. The main question was whether refugees should return. More displacements were likely to happen in the future and a continued commitment by parliamentarians was needed. </span></p><span data-dcnode-id="301" instrument_node="">
</span><p align="justify" data-dcnode-id="297"><b data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Mr Huseynov</span></b><span data-dcnode-id="298" instrument_node=""> thanked all the participants including the young refugees. This was a very noble discussion because it touched upon very important subjects for the development of the human person. He had written a schoolbook which had been introduced in several schools in Azerbaijan, including a refugee school where he had taught for one year. Education played a crucial role for integration into society and therefore all those concerned should join their efforts.</span></p><span data-dcnode-id="296" instrument_node="">
</span><p align="justify" data-dcnode-id="292"><b data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">The Chairman</span></b><span data-dcnode-id="293" instrument_node=""> closed the hearing by thanking everyone. He recalled that Mr Huseynov’s report should be adopted by the Committee on 17 October.</span></p><span data-dcnode-id="291" instrument_node="">
