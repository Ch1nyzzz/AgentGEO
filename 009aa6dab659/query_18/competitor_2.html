</span></td><td data-dcnode-id="1598"><div align="right" data-dcnode-id="1600"><img border="0" data-dcnode-id="1601" height="120" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assembly.coe.int/images/logos/Logo130X120.jpg&amp;raw" width="130"></div><span data-dcnode-id="1599" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1592" instrument_node="">
</span><hr data-dcnode-id="1591" size="1"><span data-dcnode-id="1590" instrument_node="">
</span><ul data-dcnode-id="1118"><p align="justify" data-dcnode-id="1587"><b data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Doc. 9996</span></b></p><span data-dcnode-id="1586" instrument_node="">
</span><p align="justify" data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">17 November 2003</span></p><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1580"><b data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Education of refugees and internally displaced persons </span></b></p><span data-dcnode-id="1579" instrument_node="">
</span><p align="justify" data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Report</span></p><span data-dcnode-id="1576" instrument_node="">
</span><p align="justify" data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Committee on Culture, Science and Education</span></p><span data-dcnode-id="1573" instrument_node="">
</span><p align="justify" data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Rapporteur: Mr Rafael Huseynov, Azerbaijan, Liberal, Democratic and Reformers’ Group</span></p><span data-dcnode-id="1570" instrument_node="">
</span><p align="justify" data-dcnode-id="1567"><i data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Summary</span></i></p><span data-dcnode-id="1566" instrument_node="">
</span><p align="justify" data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Education is essential to prepare refugees and internally displaced persons for life, for employment and for democratic citizenship. Their situation is abnormal and temporary and must be resolved either by return, integration in the host country or resettlement in a third country. A decision on which course to take should be a matter of priority. Pending that decision, educational provision must be made for each eventuality and at all appropriate levels.</span></p><span data-dcnode-id="1563" instrument_node="">
</span><p align="justify" data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Member states are asked to give priority to the planning of adequate measures to ensure that access to education is available for refugees and internally displaced persons. The Council of Europe should itself enter into partnership agreements with the European Union, UNHCR, Unicef and WHO to tackle the problems of refugees and internally displaced persons in specific areas of Europe on the educational, political, social and health levels.</span></p><span data-dcnode-id="1560" instrument_node="">
</span><p align="justify" data-dcnode-id="1557"><b data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">I.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Draft recommendation</span></b></p><span data-dcnode-id="1556" instrument_node="">
</span><p align="justify" data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">1. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The situation of refugees and internally displaced persons (IDPs) is an abnormal and temporary state that must be resolved either by return, integration in the host country or resettlement in a third country. A decision on which course to take should be a matter of priority. Pending such decision, educational provision must be made for each eventuality.</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p align="justify" data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">2. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; For refugees and IDPs education is a basic essential, as also, depending on age, are further education and vocational training. What is at stake is the preparation of such persons for life, for employment and for democratic citizenship. This is relevant for all persons in that position. It is made more difficult and onerous by delay in the decision on whether to return or stay.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p align="justify" data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">3. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Education can also be a tool for protection and for introducing tolerance, peace and conflict resolution between opposing communities, for developing notions of intercultural understanding and dialogue, for active peace-keeping operations and for combating the use of refugees as political hostages.</span></p><span data-dcnode-id="1547" instrument_node="">
</span><p align="justify" data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">4.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Refugees and IDPs require, in addition to the normal education, specific psychological care, cultural orientation and language training. This needs specially trained teachers and material.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><p align="justify" data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">5. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Co-ordination is necessary between the host government (and local community), governmental organisations (such as the United Nations High Commission for Refugees (UNHCR) and Unicef) and non-governmental organisations working with refugees and IDPs.</span></p><span data-dcnode-id="1541" instrument_node="">
</span><p align="justify" data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">6. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Considerable resources and sustained commitment by governments and donors are necessary for the education of refugees and IDPs. Such soft sector needs are too often ignored. More effective intervention at an early stage can reduce the long-term costs.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p align="justify" data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">7. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The Parliamentary Assembly has considered the situation of refugees and IDPs on several occasions. The present recommendation aims to reinforce attention on the problems and the priority of education. </span></p><span data-dcnode-id="1535" instrument_node="">
</span><p align="justify" data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">8. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Careful attention should, however, be paid to the very differing conditions of refugees and IDPs in different European countries. Their concentration is highest in the South Caucasus and the Balkans. Education under post-conflict conditions in such areas should be pragmatic and is very different from that in safe and prosperous societies.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p align="justify" data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">9. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The Assembly recommends that the Committee of Ministers invite member states to:</span></p><span data-dcnode-id="1529" instrument_node="">
</span><p align="justify" data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">i.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; give priority to the planning of adequate measures to ensure that access to education is available for refugees and IDPs pending the possibility of a durable solution of either voluntary repatriation or local integration;</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p align="justify" data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">ii.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; respect existing obligations for the provision of education for refugees and IDPs within the human rights framework and as indicated in the most recent UNHCR Guidelines;</span></p><span data-dcnode-id="1523" instrument_node="">
</span><p align="justify" data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">iii.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; change practices that dodge such international obligations, for example by defining what “authorised to stay” entails in terms of assessing educational assistance;</span></p><span data-dcnode-id="1520" instrument_node="">
</span><p align="justify" data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">iv.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; make efforts to facilitate the integration of refugee and IDP children into the school system of the host country;</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p align="justify" data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">v.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; facilitate the provision of further education and vocational training for refugees and IDPs so as to reduce their dependence and to enable them to have a normal life;</span></p><span data-dcnode-id="1514" instrument_node="">
</span><p align="justify" data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node=""> </span></p><span data-dcnode-id="1511" instrument_node="">
</span><p align="justify" data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">vi.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; take account of education already acquired by refugees and IDPs;</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p align="justify" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">vii.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; meet the supplementary costs involved in the education and language training of refugees and IDPs so as to give them both a chance to return to a viable life in their own country or remain in the host country; </span></p><span data-dcnode-id="1505" instrument_node="">
</span><p align="justify" data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">viii.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; train teachers for the specific education of refugees and IDPs.</span></p><span data-dcnode-id="1502" instrument_node="">
</span><p align="justify" data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">10. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The Assembly asks the Committee of Ministers to:</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p align="justify" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">i.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; examine models for teaching refugees and IDPs in key fields such as history, culture, civic education, religion and language;</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p align="justify" data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">ii.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; integrate the education and training of refugees and IDPs in a new interdisciplinary project;</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p align="justify" data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">iii.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; enter into partnership agreements with the European Union, UNHCR, Unicef and the World Health Organisation to tackle the problems of refugees and IDPs in specific areas of Europe on the educational, political, social and health levels (respectively).</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p align="justify" data-dcnode-id="1487"><b data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">II.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Explanatory memorandum</span></b></p><span data-dcnode-id="1486" instrument_node="">
</span><p align="justify" data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">by Mr Rafael Huseynov</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p align="justify" data-dcnode-id="1478"><span data-dcnode-id="1482" instrument_node="">On 26 September 2001, 22 Assembly members tabled a motion for a recommendation on “Rights to education of refugees and displaced people in Azerbaijan in the context of future development in the field of education in Europe” (</span><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assembly.coe.int/ASP/Doc/RefRedirectEN.asp%3FDoc%3DDoc.%25209237"><span data-dcnode-id="1481" instrument_node="">Doc. 9237</span></a><span data-dcnode-id="1479" instrument_node="">). </span></p><span data-dcnode-id="1477" instrument_node="">
</span><p align="justify" data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">In November 2001, the Assembly Bureau referred this motion to the Committee on Culture, Science and Education.</span></p><span data-dcnode-id="1474" instrument_node="">
</span><p align="justify" data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">In January 2002, the Committee discussed the motion and felt that the report’s scope should be widened to include countries other than Azerbaijan. It decided to appoint Mr Mehmet Saglam Rapporteur on the right to education for refugees and displaced persons, subject to the Bureau’s authorisation to extend the report’s scope. Authorisation was given in March.</span></p><span data-dcnode-id="1471" instrument_node="">
</span><p align="justify" data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Subsequent to parliamentary elections in Turkey Mr Saglam left the Assembly and the Committee appointed Mr Rafael Huseynov Rapporteur on 3 March 2003.</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p align="justify" data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Professor Michael Daxner, member of the Steering Committee on Higher Education and Research of the Council of Europe and former Co-Head (United Nations Mission In Kosovo - UNMIK) of the Department of Education and Science in Kosovo, was asked to prepare a memorandum on education for refugees and displaced persons (see Appendix 1).</span></p><span data-dcnode-id="1465" instrument_node="">
</span><p align="justify" data-dcnode-id="1457"><span data-dcnode-id="1464" instrument_node="">On 10 September 2003, the Committee held a Hearing on </span><i data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Education</span></i><span data-dcnode-id="1461" instrument_node=""> </span><i data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">of refugees and displaced persons in Europe</span></i><span data-dcnode-id="1458" instrument_node=""> with the participation of Prof. Daxner, a group of young refugees, representatives of UNHCR, the Hungarian Government and NGOs active in the field. The Rapporteur had the opportunity of expressing his views on the subject at that meeting. (see Appendix 2).</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p align="justify" data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">On 17 October 2003, the Committee on Culture, Science and Education approved the report and agreed that the explanatory memorandum would be the two aforementioned appendices plus the present introductory note. </span></p><span data-dcnode-id="1453" instrument_node="">
</span><p align="justify" data-dcnode-id="1450"><b data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">APPENDIX 1</span></b></p><span data-dcnode-id="1449" instrument_node="">
</span><p align="justify" data-dcnode-id="1446"><b data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">EDUCATION OF REFUGEES AND INTERNALLY DISPLACED PERSONS </span></b></p><span data-dcnode-id="1445" instrument_node="">
</span><p align="justify" data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">with special reference to the Caucasus and Balkan regions</span></p><span data-dcnode-id="1442" instrument_node="">
</span><p align="justify" data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Memorandum prepared by Prof. Michael Daxner, consultant expert</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p align="justify" data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Contents:</span></p><span data-dcnode-id="1436" instrument_node="">
</span><p align="justify" data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">1.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Executive Summary</span></p><span data-dcnode-id="1433" instrument_node="">
</span><p align="justify" data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">2.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The General Framework</span></p><span data-dcnode-id="1430" instrument_node="">
</span><p align="justify" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">3.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Educational Principles and Basics</span></p><span data-dcnode-id="1427" instrument_node="">
</span><p align="justify" data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">4.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Regional Specifications</span></p><span data-dcnode-id="1424" instrument_node="">
</span><p align="justify" data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">The Caucasus Region</span></p><span data-dcnode-id="1421" instrument_node="">
</span><p align="justify" data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">The Balkans</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p align="justify" data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">5.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The Soft Sector Approach</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p align="justify" data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">6.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Dealing with the Past</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p align="justify" data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">7.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Dealing with the Present</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p align="justify" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">8.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Dealing with the Future</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p align="justify" data-dcnode-id="1402"><span data-dcnode-id="1405" instrument_node="">9.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Civic Education and V</span><a data-dcnode-id="1404" name="P110_7518"></a><span data-dcnode-id="1403" instrument_node="">ocational Training</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p align="justify" data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">10.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Recommendations and specific key words</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p align="justify" data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">This paper was commissioned to the author in June 2003, and completed with the assistance of Dr. Jochen Fried, Vienna. </span></p><span data-dcnode-id="1395" instrument_node="">
</span><p align="justify" data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Refugees and internally displaced persons (hereafter IDPs) are generic terms for all persons living under the circumstances of forced dislocation. Being aware of the legal discussion as presented by UNHCR and others, the author wants to make clear that a definitive terminology is not intended.</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p align="justify" data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">For key words see 10.2.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p align="justify" data-dcnode-id="1386"><b data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">1. Executive Summary</span></b></p><span data-dcnode-id="1385" instrument_node="">
</span><p align="justify" data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Refugees and internally displaced persons have a right to education, but not all education offered is right for them. This justifies a thematic focus on these groups of deprived persons. The numbers of refugees and IDPs are increasing dramatically. The boundaries between different groups of dislocated persons are more unclear than ever: refugees under international law, displaced persons, migrants under hardship, asylum seekers, etc. The main aspect should always be in the focus: the humanitarian mission to act as fast and as effectively as possible in order to alleviate the fate of people who have lost their homes, their homeland, and most often much more than that.</span></p><span data-dcnode-id="1382" instrument_node="">
</span><p align="justify" data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">The Council of Europe is one among the intergovernmental organisations which enjoy the highest esteem in moral and humanitarian terms. Consequently, the issue of refugees and IDPs has been on its agenda and will remain there. Within the mandate of the Council, two regions have been suffering from immense population moves, ethnic purging, violent dislocation of individuals and particular groups: the Balkans (the author deliberately uses this term for a specific part of South East Europe, which does not contain any colloquial pejorative), and the Caucasus Region. While special attention is given to these regions in this report, the general aspect of the problem remains universal and is thus treated as a core element in a concept of the building of civil societies and democracies.</span></p><span data-dcnode-id="1379" instrument_node="">
</span><p align="justify" data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Education is among the few fundamental elements which an emerging civil society needs, together with the rule of law, social protection, basic shelter and nutrition, and a minimum of security and safety. Education always implies processes and cannot be delivered as any commodity. This makes it difficult to provide a sound planning and provision of education to those who are affected by violent environments and traumatic individual and collective situations, such as refugees and IDPs. This report tries to cope with some of the major problems in the broader context. </span></p><span data-dcnode-id="1376" instrument_node="">
</span><p align="justify" data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">The main approach focuses on the fact that no education policy can be developed by itself. Education is always embedded in a tight network of social, political and cultural structures, which are – under the circumstances of emergency – very hard to streamline and organize. Instead of pushing education backstage, where ‘it can wait’, it should always be included in the main actions of the vanguard, i.e. when the exploration of a strategy for refugees and IDPs is being conducted. </span></p><span data-dcnode-id="1373" instrument_node="">
</span><p align="justify" data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">The report presents the elements of such a strategy with much emphasis on its systemic qualities and sufficient care of the particularities which make it impossible to draw simply a ‘master plan’. The report also recognizes the admirable work done in the past and heavily relies on both the experience of many organisations and agencies in the field as well as theoretical considerations. However, this is not an analytical paper to be added to the ‘literature’ on refugees and IDPs. It is more directed to political decision makers and educational strategists in order to provide a few ‘European’ specifications to a universal concern. This has some very concrete dimensions: will the countries in South East Europe, which are likely to be associated with the EU or even become members rather sooner than later, cope differently with the problems of refugees and IDPs than the Caucasian region, which is far from integration into the EU? Will the considerations on our topic enable the Council of Europe to improve its stand against competing or concurring organisations, which are active on the same turf, such as OSCE, and thus create better coordination and division of labour? Will the programs be attractive to additional contributions from the member states, when it comes to the implementation of specific projects by the Council? </span></p><span data-dcnode-id="1370" instrument_node="">
</span><p align="justify" data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">The approach starts with educational basics and a clear focus on those (“Soft”) sectors which form the environment for a sound educational strategy. Specific regional differences are added as far as necessary. The core of the pedagogical program is located in the differentiated approach towards past, present and future. From there, civic education and vocational perspectives are developed. The report finally presents a few recommendations which should serve as a complement to the foundations and elaborations made by the Council on behalf of refugees and IDPs in the past.</span></p><span data-dcnode-id="1367" instrument_node="">
</span><p align="justify" data-dcnode-id="1364"><b data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">2. The General Framework</span></b></p><span data-dcnode-id="1363" instrument_node="">
</span><p align="justify" data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">a. Refugees and IDPs are a common problem in all zones of conflict worldwide. They do not represent a homogenous social group, but are divided into quite a few specific regional differences, closely related to their social, cultural, political and geographical environment. Asylum seekers, including those from European countries, temporarily and permanently dislocated persons and the multi-dimensional tasks of relocation create a complex situation, in which education plays an eminent role. </span></p><span data-dcnode-id="1360" instrument_node="">
</span><p align="justify" data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">b. External actors (such as international agencies, intergovernmental and governmental organisations, NGOs etc.) must also reflect their own role in all activities. The way external actors are perceived by the target groups gains increasingly in importance. The conduct of the external players is as decisive on the inclination of the refugees and IDPs orientation as the policies of their own peers and the attractors or repellents from their home country.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p align="justify" data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">c. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; There are many organisations and agencies, such as UNHCR, which are focused on dealing with refugees and IDPs in a quite professional and expert manner; in many cases GOs and NGOs act on site in local or regional contexts. Not all experience and expertise can be transferred from one focus of action to another. </span></p><span data-dcnode-id="1354" instrument_node="">
</span><p align="justify" data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">d. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Among the various fields of refugee and IDP work, there are some rough criteria for systematising the area of action:</span></p><span data-dcnode-id="1351" instrument_node="">
</span><p align="justify" data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">- The political environment (such as post-war situations, imminent belligerent circumstances)</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p align="justify" data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">-&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The causes and perspectives of the circumstances which produced refugees and IDPs (wars, famine, dictatorship, ethnic and religious conflicts)</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p align="justify" data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">- The economic environment</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p align="justify" data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">- The material environment (famine, housing, natural hardship)</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p align="justify" data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">- The cultural and social environments</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p align="justify" data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">e.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Education is one of the areas where all context-related circumstances merge and concentrate. Following the theory on Soft Sector development (Chapter 5), education, science and social protection are the main elements in a comprehensive Soft Sector approach. </span></p><span data-dcnode-id="1333" instrument_node="">
</span><p align="justify" data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">f.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; In order to give sound and feasible recommendations it is necessary to include all age groups and social ‘definitions’ of refugees and IDPs into an educational review and assessment; i.e. it does not suffice to concentrate on primary school education under the aspect of the most visible and representative group of affected children. Pre-school education can play an eminent role in stabilising a defined group as can the stratum of elderly and retired persons within the spectrum.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p align="justify" data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node=""> </span></p><span data-dcnode-id="1327" instrument_node="">
</span><p align="justify" data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">g. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Education is not just one element among civic institutions. It is assumed that a functional education system is a key to implementing civil administration within a specially needy group of persons.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p align="justify" data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">h. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Some political aspects of each environment for action should be clarified in advance:</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p align="justify" data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">- Which group among the affected people enjoys a certain recognition under the Conventions for Refugees and other rules of international laws, and where should additional frameworks be created in order to offer similar standards (with many IDPs, this is a certain problem, because the delineation between them and recognised refugees is often blurred)?</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p align="justify" data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">- Who is in charge?</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p align="justify" data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">These two questions are very important when it comes to the decision on whether refugees and IDPs shall receive an education under the rules of the receiving country or an international community, or under the rules of their home community, however distant it may be. The problem may be lesser for majority groups, but minority refugees and IDPs need much better attention in this respect.</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p align="justify" data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">- Do plans for problem-solving exist, or are they being developed by ‘doing’?</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p align="justify" data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">- What side-actions are needed (e.g., fundraising)?</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p align="justify" data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">- Are there physical time-pressures, such as the arrival of winter? etc.</span></p><span data-dcnode-id="1303" instrument_node="">
</span><p align="justify" data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">It is necessary to have a good overview over the environment of the refugee and IDP situation before going into education and other Soft Sectors (anamnestic and diagnostic approaches).</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p align="justify" data-dcnode-id="1297"><b data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">3. Educational principles and basics</span></b></p><span data-dcnode-id="1296" instrument_node="">
</span><p align="justify" data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">a. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The right to education must not be denied to anyone. Thus, refugees and IDPs are only ‘special cases’ within an overall concept.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p align="justify" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Two basic facts compete with regard to this special sector of education: </span></p><span data-dcnode-id="1290" instrument_node="">
</span><p align="justify" data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">- The pressure of time and the singular circumstances, under which education for refugees and IDPs must be organized versus</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p align="justify" data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">- A prepared scheme and strategy for this sector, within a wider framework of education under the responsibility of those, who are also in charge for refugees and IDPs. </span></p><span data-dcnode-id="1284" instrument_node="">
</span><p align="justify" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">For all educational policies it is decisive to know whether an approach to integrate refugees and IDPs into a target society shall be given priority over any kind of returns. This strategic decision is certainly not only a result of deliberations among the refugees and IDPs, but also among the leaders of the receiving countries or those politically responsible for this group and the constellation of political forces in the target territory. And here the voices of the refugees and IDPs should be better listened to than in the past. Refugees and IDPs are never ‘invited’ and not often ‘welcome’. The mix of intrinsic and extrinsic motives to receive and accept them must be carefully studied within the ‘anamnestic approach’, as to avoid a policy based on wrong assumptions and expectations. </span></p><span data-dcnode-id="1281" instrument_node="">
</span><p align="justify" data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">It would be better for many refugees and IDPs if their receiving host-country acts out of mere compliance with international conventions and self-evident morals of human rights and humanity than out of friend-enemy-scheme of welcome and rejected subjects.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p align="justify" data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">b. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Both the Baltic and Caucasus regions suffer from and enjoy the results of disintegration of a socialist power. However, there are significant differences: While the Caucasus region has created a number of political entities with different inclinations towards the old system and modern Russia, this is not the case in former Yugoslavia. The new states and territories after the FRY disintegration are in a certain way mirrors of the same conflict between an ethnic and a societal identity (i.e. between a Yugoslav and a Bosnian, Serbian, Croatian, etc. identity). The notion of a ‘Russian’ identity seems to be no real problem in the Caucasus, but the effects from unfreezing the ethnic differences after the deep-freeze communist period tends to be very violent and volatile at the same time. </span></p><span data-dcnode-id="1275" instrument_node="">
</span><p align="justify" data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">This is of importance to the education issue insofar as the building of a sense of community spirit and belonging is inhibited by such an amorphous foundation of societies, which are open for all kinds of inappropriate nationalist ideologies and populist ideas.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p align="justify" data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Education should transcend the limits of both nation-state and ethnic state identity. The pedagogical syllogism is quite striking: refugees and IDPs are living examples for such a transgression of nation states and integral political entities. Education as pre-emptive diplomacy is perhaps the most effective instrument to prepare refugees and IDPs for societies yet not realised. </span></p><span data-dcnode-id="1269" instrument_node="">
</span><p align="justify" data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">c. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; While this approach refers to the background and serves as a basis for diversification of educational approaches in the implementation of education strategies, it should not hamper the efforts to act quickly and considering the other Soft Sector impacts on a given situation. </span></p><span data-dcnode-id="1266" instrument_node="">
</span><p align="justify" data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">d. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The next step from anamnesis to diagnosis or analytical preparation is crucial:</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p align="justify" data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">What consequences must be drawn from what we know about the status (individual, collective) of the refugees and IDPs? </span></p><span data-dcnode-id="1260" instrument_node="">
</span><p align="justify" data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">This is rough profiling: While the pedagogical aspects need information about the educational status of the diverse groups within one cohort of refugees and IDPs, the Soft Sector approach will inform about the ‘environment’ which the cohorts come from and which they would need. </span></p><span data-dcnode-id="1257" instrument_node="">
</span><p align="justify" data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Example: some refugees have been dislocated for many years, they are almost ‘habitual displaced persons’. For them, ‘return’ and ‘duration of stay in a camp or provisional location’ has a completely different context from that for those, who were displaced or have only recently escaped, with fresh memories of their suffering and the circumstances of their rescue. One of the biggest dangers is the habitualisation of ‘privileging the marginalised’. While enlightened models of democracy usually refer to majority rule and minority protection, communitarian and value-based models tend towards ‘positive discrimination’. This phenomenon has produced many different examples, but in our case we can focus on one problem: The very moment it may seem to be desirable to remain in the status of refugees or IDP, the cause is lost. It may sound strange but by this a new sub-ethnicity is created in the host country.</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p align="justify" data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">e. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Educational basics are principles and values, on which all work should be grounded. The following list is necessarily incomplete, however, it is ordered along the lines of practical educational work within the circumstances, which will be likely to prevail for the majority of refugees and IDPs. It tries to reconcile the means of direct action with the aims of the educational process. </span></p><span data-dcnode-id="1251" instrument_node="">
</span><p align="justify" data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Children have a right to their childhood, adolescents to their growing into society and their own future, and adults should be educated to become again masters of their biography. (This will lead towards a relativity of identity, and a growing importance of the building of personalities).</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p align="justify" data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Education is the way to make them understand themselves in their real situation and to understand the situation as one to be coped with under irregular conditions (The life as permanent refugees, as we know it e.g. from some Palestinians, is the worst extreme among the negative perspectives)</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p align="justify" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Education should be based on the attempt to create a solid backbone of ‘life-world’ routines in the everyday life of refugees and IDPs. The process and procedures of learning should be given priority over an ideal and balanced curriculum. Learner-centred methods and approaches should be at the centre of all attempts. </span></p><span data-dcnode-id="1242" instrument_node="">
</span><p align="justify" data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Questions of belonging and the wishes to belong are as important as the notion of ownership and participation in social life.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p align="justify" data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Since the situation of all affected persons (clients, their peers and families, their supervisors and regulators etc.) is one complex network of interdependent structures, a ‘systemic’ approach is advisable: all related persons should be represented in the process of shared responsibilities as the basis for an organisational framework.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p align="justify" data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">The creation of an artificial or virtual life within the educational ‘island’ should be avoided. Education can help to protect the integrity of individuals and groups, but it should not shut out the realistic view of the world and the specific environment with all its conditions, as it is. </span></p><span data-dcnode-id="1233" instrument_node="">
</span><p align="justify" data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">There is no question that this catalogue complies with all charters and conventions on human rights, children rights and good practice in the field. However, the grounding on these principles requires still a high degree of flexibility and adaptability of a given system.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p align="justify" data-dcnode-id="1227"><b data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">4. Regional Specifications</span></b></p><span data-dcnode-id="1226" instrument_node="">
</span><p align="justify" data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">a. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Most of the educational visions and their application to refugees and IDPs are universal and globally shared. However, there are among other differentiations some which relate to the regional context. Both, the Caucasian and the Balkan regions have undergone terribly violent conflicts, which range from civil wars to terrorism and violence exacted by organised crime. The main difference between the two areas is that the Caucasus was, until 1989, for almost a century totally immersed in a rigid system, while the Balkans have always been more disparate. The Soviet official ‘policy on nationalities’ had unsuccessfully, however efficiently, suppressed all kinds of multi-ethnicity beyond the folklore level, and caused a lot of suffering and toll by displacements and relocations. The Balkan and South East Europe history of the 20th century shows more than 50 such relocations and population shifts, which affected over 2 million persons and were both internally and externally induced, and had diverse reasons.</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p align="justify" data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">b. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Since the end of the Cold War, information and analysis of the political situation in these regions in general, of refugees and IDPs in particular, is available on all levels of comprehension. It is not the aim of this document to review and abridge this rich material. The political framework for the following considerations is given by the fact that the circumstances of the Caucasus are mainly determined by the quest for establishing a nation-state, while in the Balkans similar ideas are overshadowed by the supra-national unification concept of the European Union. In both regions the idea of the traditional nation-state has come too late and runs the risk of creating ethnic people states rather than nation states in transition. This is of utmost importance for the future of IDPs and returning refugees.</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p align="justify" data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node=""> </span></p><span data-dcnode-id="1217" instrument_node="">
</span><p align="justify" data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">c. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Education in the 19th and early 20th centuries served the formation of the traditional nation state as one of its prime objectives. Its hidden curriculum was almost always focused on national identity, exclusion and collective assertion. There are strong tendencies to repeat this pattern under the present and totally different circumstances. While it is easy to agree that the old goals are no longer valid, it will be crucial for education to develop a new framework which looks into a future unleashed from the nationalistic and aggressive elements of history, both from the victims and the victors sides. While the old education had been inspired by imperialist external powers, the new framework should be based much more on the self-determined volition of the respective peoples. Therefore, a merely ethnic diversification as we find it in the Caucasus will not be successful; in this respect, the minimal cooperation in the Balkans provides more hope. All this affects the policies for refugees and IDPs even more than the rest of the population: because they are the living surface of the conflicts, and they represent their roots. </span></p><span data-dcnode-id="1214" instrument_node="">
</span><p align="justify" data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">d. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; In the Balkans, we have some factors which must be considered in advance.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p align="justify" data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">We call for an “anamnestic approach”, i.e. an effort to understand, what all refugees and IDPs in the region have in common, and what are specific needs of specific groups. Any concept should bear in mind that</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p align="justify" data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">- there were more than fifty population relocations, waves of displacement and forced migration, expulsion and permanent population drain over the last century, affecting over 2 million people (conservative estimate);</span></p><span data-dcnode-id="1205" instrument_node="">
</span><p align="justify" data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">- there are two’modes’, which are never really congruent: On the one side there is wide variety of individual experience:traumatic memories of recent violence, rape, loss of family members, destruction of property, deprivation of future, and individual and group humiliation. This concurs with objective social and economic conditions, where education and the retention of cultural and customary strongholds might have become secondary (dis-rooting phenomenon). (The best examples are the dispute about the ‘Yugoslav’ versus ethnic (Croatian, Serbian…) identities, and consequently a different construction of ‘who has done what on which side?’.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><p align="justify" data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Only one major group does not belong to the Slavic speaking majority of affected persons (Albanians mainly from Kosovo). However, the structures of Socialist education prevail in all systems, and are treated with different emphasis, though not along ethnic lines.</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p align="justify" data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">The ethnic question, which seems to be dominant in all problems, is more likely to be a construct, the elements of which: religion, language, conflict adversities and coalitions, and geographical and economic factors may have higher significance. </span></p><span data-dcnode-id="1196" instrument_node="">
</span><p align="justify" data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">The post-war reality in former Yugoslavia concurs with the effects of non-war-related events (brain-drain, the petrification of IDP status of Serbs from Kosovo as IDPs in Serbia etc.). The issue of the status talks on Kosovo are a special case within the whole framework. </span></p><span data-dcnode-id="1193" instrument_node="">
</span><p align="justify" data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">The high numbers of IDPs in Serbia pose a special problem due to the fact that the question of citizenship will gain in importance both by the implementation of the new state ‘Serbia-Montenegro’ and by the registration policies of the Kosovo provisional self-government. </span></p><span data-dcnode-id="1190" instrument_node="">
</span><p align="justify" data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">For a legal account of the classification of Refugees and Internally Displaced Persons see the official documents of UNHCR and, with special regard to our problems, the Essay by Michael Jandl: UNHCR´s Involvement with Internally Displaced Personas. (Harvard Law School, December 1996). While the impressive data of the paper are outdated, the basic change of paradigm into the ‘Situational approach’ is still valid. Cf. the recent updating for Serbia and Kosovo by UNMIK (Peggy Hicks, Office of the Special Representative of the Secretary General - SRSG). However, in none of these documents does education play a significant role in the prospect of implementing the rights of and support of IDPs. </span></p><span data-dcnode-id="1187" instrument_node="">
</span><p align="justify" data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">- The Kosovo approach deserves special attention. The distinction between (legal) refugees and IDPs is vague because of the tricky relationship between the territory under SEC 1244 and the Republic of Serbia (now Serbia and Montenegro) and the former Federal Republic of Yugoslavia. On a very small territory, many minority returns are being invited to resettle, which has become a rather successful agenda for UNMIK (The polite sharing of responsibility with the Provisional Institutions of Self Government hides the incompetence of this PISG and its strong restraints from acting according to the principles, which, as in all other fields of UNMIK rule, are unified under the slogan “standards before status”). This success is certainly not visible for the Serbs, either for those who were entitled to return to Kosovo of for those who are denied the right to re-settle there and dwell as IDPs in Serbia proper. </span></p><span data-dcnode-id="1184" instrument_node="">
</span><p align="justify" data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">- Ms. Peggy Hicks, who is one of the most acclaimed experts in the field, has clearly adopted a situational approach, but the UNMIK administration must realise that a flawed negotiation base with the governments of FRY, Serbia and S-M has removed all hope for a fast and sustained solution of the problem. The education question is a function of talks on education between the two parties – and therefore in effect suspended. (cf. Documents and Records Assembly Meeting 10 July 2003).</span></p><span data-dcnode-id="1181" instrument_node="">
</span><p align="justify" data-dcnode-id="1175"><span data-dcnode-id="1180" instrument_node="">Reference is made to Ms. Hicks and the policy of the SRSG because many of the problems are typical for all refugees and IDP situations. While the focus on ‘standards before status’ was the creed of the outgoing SRSG, this meant that certain standards and benchmarks would be conditional for any substantial frameworks in the upcoming talks on the status of Kosovo</span><sup data-dcnode-id="1177"><a data-dcnode-id="1178" href="#P248_31217" name="P248_31218"><span data-dcnode-id="1179" instrument_node="">1</span></a></sup><span data-dcnode-id="1176" instrument_node="">. In a summary before the meeting of the Kosovo Assembly, Hicks explains this strategy, but also highlights very important obstacles, among them organised crime, lack of orientation, lack of funding (even where pledges had been made), and security. </span></p><span data-dcnode-id="1174" instrument_node="">
</span><p align="justify" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">The region has long experience of population exchanges, migration, and discrimination of minorities. However, the potential to absorb other groups is relatively high, mainly among Slavic speakers. The educational systems after 1945 have until today preserved a relatively unified pattern, imposed by the socialist governments. (This is also true for the Kosovo Albanians, who used to maintain a quasi-Yugoslav system of education even when underground 1992-1999). The relative level of education and science was well developed and notably higher than in other regions of the world. This explains why many refugees and IDPs, especially older ones, have a good level of education which can be made use of in the strategies of refugees education. The big problem is that the countries of origin, mainly Serbia and Croatia, are modernising, i.e. Europeanising, their systems much faster than other countries, such as Albania or Bosnia-Herzegovina. The refugees and IDPs must be prepared for such change and not focus on the successful tradition of the past. European standards are the key approach to unifying interests in education, cf. Bologna Process.</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p align="justify" data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">e. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The same approach for the Caucasus region makes one aware of the fact that the region is geographically rather easy to locate, but ethnically and culturally even more diverse than the Balkans. While the Balkans enjoy one homogenous language area with one big exception (Albanian) and a few minority languages, the Caucasian region shows much more genuine diversity (as opposed to the constructed diversity in South East Europe). There is a greater religious and traditional variety and less clear political perspectives for not yet recognised political entities (such as Abkhasia): this indicates a different set of conditions that should be considered before action. There is also a great gap between prosperous and extremely poor economic conditions</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p align="justify" data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">The negative psychological reference for all recognised Caucasian countries is the continuation of a ‘Russian’ state (The Russian Federation or the Confederation of Independent States (CIS)), which creates nevertheless no positive common interest to foster regional cooperation, based on modern European standards. Economic development alone will not solve these problems. Abkhasia and Chechnya are good examples for the reluctance of all related players to tackle jointly fundamental problems. Cultural peculiarities, such as the exchange of alphabets and letters in some countries, are not really rational in any constructive sense, but easily become instruments of identity-building. The Turkish-Armenian conflict is also reflected in ambivalent policies of several European and American partners, and influences value patterns and ways of dealing with history. The real status (not the legal or symbolic one) of a group of refugees and IDPs will be determined also by the extent of recognition which the country or territory of origin enjoys with the major players in the international game.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p align="justify" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">These examples are significant for the difficulties to approach refugees and IDPs. Education in the Caucasian region might need a very strong international commitment with a tendency of elaborating common interests rather than follow an exaggerated policy of difference. Conflicts are likely to become defused by convincing and sustainable educational development than by formal democracy alone.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p align="justify" data-dcnode-id="1159"><b data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">5. The Soft Sector Approach</span></b></p><span data-dcnode-id="1158" instrument_node="">
</span><p align="justify" data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Usually, education in conflict and post-war areas is conducted by more than one actor, i.e. the legitimate government in power. Many international and national agencies, GOs, NGOs and individual experts and supporters concur with local actors, regularly and irregularly employed in the education ‘system’ of a state, a territory, a province or a local structure. The same is true for the handling of refugees and IDPs. For both, the Balkans and the Caucasian region, it is true that the complexity is very high due to the impact of international interventions on diverse levels, depending on the political entity where the education for refugees and IDPs shall be established. </span></p><span data-dcnode-id="1155" instrument_node="">
</span><p align="justify" data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">We hold that the rule of law is essential for all possible constellations of political and economic restructuring of a country, and that, consequently, all sectors of civil development should be placed under this rule. Thus, education must be given a formal and legitimate framework within a concept of the rule of law, irrespective of who is ‘in charge’ of this rule.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p align="justify" data-dcnode-id="1147"><span data-dcnode-id="1151" instrument_node="">One of the best examples of incomplete compliance with this principle is the unclear mandate of SC</span><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assembly.coe.int/ASP/Doc/RefRedirectEN.asp%3FDoc%3D%2520Resolution%25201244"><span data-dcnode-id="1150" instrument_node=""> Resolution 1244</span></a><span data-dcnode-id="1148" instrument_node=""> on UNMIK rule in Kosovo, where all ‘Civil Administration’ is put under the responsibility of the UN, while ‘education’ and ‘health’ are claimed as to belong to the legitimate rights of the Republic of Serbia (and Montenegro) by the Government in Belgrade, because of the same Resolutions avoidance of fixing new political statuses for the political entities in the region. Another example is the consequence of the Dayton agreement in Bosnia-Herzegovina, creating 16 different systems of education following the lines of ethnically defined cantons. </span></p><span data-dcnode-id="1146" instrument_node="">
</span><p align="justify" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Civil administration is a key element in peacekeeping and peace-building. For systematic reasons, and as one lesson learned from the Balkans after 1991, we make a basic distinction between ‘Hard’ and ‘Soft’ sectors. The first comprise, Security, Economy, Energy, Transport, Infrastructure, Labour and Employment. The latter comprise Education, science, Health, Social Protection and Social Policy, Labour Administration, Environment, Culture… Judiciary and the Media enjoy a special position between both Sectors. </span></p><span data-dcnode-id="1143" instrument_node="">
</span><p align="justify" data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">The division is useful for some important aspects of reconstruction and reconciliation. While the Hard Sectors follow established patterns concerning investments, modes of operation, normative standards, and routines of implementation, which are not entirely, but to a high degree independent from the societal environment, this is not the case with the Soft Sectors: They depend highly on the actual social constructions, life-world realities, individual and collective idiosyncrasies and constellations.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p align="justify" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Three main assumptions hold valid for the Soft and Hard Sectors approach:</span></p><span data-dcnode-id="1137" instrument_node="">
</span><ul data-dcnode-id="1127"><p align="justify" data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">§ Soft Sectors must be given priority support in order to stabilise both the Hard Sector development and the people’s trust in and motivation for civil society development;</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p align="justify" data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">§ Among all Soft Sectors, education and social protection have significant positions, which exert high impact on the other sectors;</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p align="justify" data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">§ Security and safety concepts must focus on the protection of Soft Sectors in a specific way. </span></p><span data-dcnode-id="1128" instrument_node="">
</span></ul><p align="justify" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">In the case of education for refugees and IDPs, the Soft Sector approach allows a systematic strategy, i.e. on by which the different elements and factors of civil administration are not isolated.</span></p><span data-dcnode-id="1124" instrument_node="">
</span><p align="justify" data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">The Grid of Sectors: (only the main sectors are listed)</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p align="justify" data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node=""> HARD SECTORS&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; SOFT SECTORS</span></p></ul><span data-dcnode-id="1117" instrument_node="">

</span></td><td data-dcnode-id="1104" valign="top"><p align="justify" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node=""> EDUCATION </span></p><span data-dcnode-id="1105" instrument_node="">
</span></td></tr><tr data-dcnode-id="1091"><td data-dcnode-id="1097" valign="top"><p align="justify" data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">ECONOMY</span></p><span data-dcnode-id="1098" instrument_node="">
</span></td><td data-dcnode-id="1092" valign="top"><p align="justify" data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node=""> HEALTH</span></p><span data-dcnode-id="1093" instrument_node="">
</span></td></tr><tr data-dcnode-id="1079"><td data-dcnode-id="1085" valign="top"><p align="justify" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">INFRASTRUCTURE</span></p><span data-dcnode-id="1086" instrument_node="">
</span></td><td data-dcnode-id="1080" valign="top"><p align="justify" data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node=""> SOCIAL PRFOTECTION</span></p><span data-dcnode-id="1081" instrument_node="">
</span></td></tr><tr data-dcnode-id="1067"><td data-dcnode-id="1073" valign="top"><p align="justify" data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">TRANSPORT</span></p><span data-dcnode-id="1074" instrument_node="">
</span></td><td data-dcnode-id="1068" valign="top"><p align="justify" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node=""> CULTURE</span></p><span data-dcnode-id="1069" instrument_node="">
</span></td></tr><tr data-dcnode-id="1055"><td data-dcnode-id="1061" valign="top"><p align="justify" data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">ENERGY</span></p><span data-dcnode-id="1062" instrument_node="">
</span></td><td data-dcnode-id="1056" valign="top"><p align="justify" data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node=""> ENVIRONMENT</span></p><span data-dcnode-id="1057" instrument_node="">
</span></td></tr></tbody></table></ul><span data-dcnode-id="1051" instrument_node="">
</span><ul data-dcnode-id="28"><p align="justify" data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node=""> ß MEDIA AND JURISDICTION à</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p align="justify" data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">The approach implies that for the area of refugees and IDPs a policy should be adopted in analogy to the greater application of this approach for whole systems and governments. For education, this has the following implications:</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p align="justify" data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">It is necessary to identify those sectors, which are directly related to education:</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p align="justify" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">- Buildings, where classrooms are needed</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p align="justify" data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">- Teachers salaries and pensions, where regular schooling can be envisaged</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p align="justify" data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">-&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Vocational training according to the realistic perspectives for employment among refugees and IDPs</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p align="justify" data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">- Civic education and instruction wherever participation of refugees and IDPs is wanted</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p align="justify" data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">- Safe transport of students and teachers</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p align="justify" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">- Security measures to protect persons and installations</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p align="justify" data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">- Regular health care related to educational needs and appropriate prevention measures</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p align="justify" data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Etc.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p align="justify" data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">It would be an exaggeration to demand solutions in of all these related sectors before the educational process can start. On the contrary, they should be included in the educational strategy in the course of establishing educational routines, which are student-centred, learning-focused, and with a practical relation to the refugees and IDPs environment. To what extent Soft Sector policies from the world outside the refugees and IDPs constellation can be transferred, should be investigated beforehand. </span></p><span data-dcnode-id="1015" instrument_node="">
</span><p align="justify" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">The Soft Sector approach requires a comprehensive concept for all education under its rule; i.e. education is not only a function and result of good governance, but one of its constituent elements. </span></p><span data-dcnode-id="1012" instrument_node="">
</span><p align="justify" data-dcnode-id="1009"><b data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">6. Dealing with the Past</span></b></p><span data-dcnode-id="1008" instrument_node="">
</span><p align="justify" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">For systematic reasons, this report differentiates among the diverse stages of time-experience for the refugees and IDPs. Obviously, both in the Caucasus and the Balkans, the past, both far away and recent, plays a dominant role in the construction of ideological patterns and cultural habitus.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p align="justify" data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Probably there is no group in a conflict area which is so dependent on a permanent reflection of the past than refugees and IDPs. There is even a hypothesis that the past serves not only to re-establish a group identity, but is used to create a new one, where it had not been before or was completely different (Nora 2002). Of course, there are more and overlapping layers of past with refugees and IDPs: The recent past concurs or even competes with earlier layers, and all this is transported through the whole process of flight, rescue and displacement; the disentangling of these layers is one of the foremost educational aims.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p align="justify" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">The questions of where do I come from?, and where do I (want to) belong?, are inseparably linked to this aspect. However, it does not imply that education for refugees and IDPs should necessarily start with a kind of history teaching. The recent history and experience is probably highly traumatised and distorted. The disentanglement should rather begin with a subtle separation of subjective views (of the individuals) and those beliefs and perceptions constructed by the peers and the social group. </span></p><span data-dcnode-id="999" instrument_node="">
</span><p align="justify" data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">(Examples: For a raped women it may be more important to deal with her physical and mental wounds than with the honour of her clan; for a starving person, the rules of distribution of edibles according to established traditions may be secondary; for one who has lost its personal property, the rule of law may be at once important etc.)</span></p><span data-dcnode-id="996" instrument_node="">
</span><p align="justify" data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">On the other hand on can generalise that strong and sound social integration in the past may help to create ‘links’ which relieve individuals from their acute pains and help them to connect with a life-world both known and functional. </span></p><span data-dcnode-id="993" instrument_node="">
</span><p align="justify" data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">The diagnostic approach should try to start with investigation and identification of elements among the prevailing pattern. This will also allow one to decide to what extent peers among the refugees and IDPs should participate in the content side of education from the scratch. It is important to be aware of real religious commitment as opposed to religion as a make-up for outdated policies of clan and family powers.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p align="justify" data-dcnode-id="987"><i data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Specifications for the Caucasus</span></i></p><span data-dcnode-id="986" instrument_node="">
</span><p align="justify" data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">How far should the pre-Soviet history play a legitimising or orientating role in concepts of collective remembrance and identity building The curriculum should make it clear that no historical fact whatsoever justifies per se concrete political action in the present. </span></p><span data-dcnode-id="983" instrument_node="">
</span><p align="justify" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Some of the Caucasian peoples have deep-rooted cultural characteristics which are most difficult to reconcile with modern and enlightened pluralistic concepts. This problem cannot be solved by further cantonisation or territorial containment for each and every tribe and clan. The pedagogical aim is therefore to create common interest. </span></p><span data-dcnode-id="980" instrument_node="">
</span><p align="justify" data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Analysis of the remnants of the old Soviet thinking under the pretext of a new and changed view of the world shows that Ugrecic’s statement that the vocabulary has changed, but the grammar remains untouched, is very true also for the Caucasus. </span></p><span data-dcnode-id="977" instrument_node="">
</span><p align="justify" data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">The extreme economic imbalance and the related dependency on foreign investment and interests (oil and gas) should be reflected in the educational concepts.</span></p><span data-dcnode-id="974" instrument_node="">
</span><p align="justify" data-dcnode-id="971"><i data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Specifications for the Balkans</span></i></p><span data-dcnode-id="970" instrument_node="">
</span><p align="justify" data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">The Balkans and the rest of South East Europe have lost much of their constituent impact on the whole of Europe after World War I. Thus, historical continuity needs to be demystified and disarmed. The interface with the European enlightenment should be created by a sustained educational effort. “Too little territory for so much history”.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p align="justify" data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">The pejorative view of Balkan characteristics has created an unhealthy competition between inferiority and stubborn supremacy myths. The deconstruction of this effect is not only a task for the diverse history projects (e.g. Council of Europe), but should underlie all curriculum. </span></p><span data-dcnode-id="964" instrument_node="">
</span><p align="justify" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Refugees and IDPs are confronted with many returnees and migrants to and from western countries, thus providing a proliferation of many more different opinions and values than in other refugees contexts. Many refugees and IDPs know the West quite well and therefore know the ideas represented by the international interventions. </span></p><span data-dcnode-id="961" instrument_node="">
</span><p align="justify" data-dcnode-id="958"><b data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">7. Dealing with the Present</span></b></p><span data-dcnode-id="957" instrument_node="">
</span><p align="justify" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Being a refugee or becoming displaced is never normal. However, some groups have a long experience in living under such conditions, others experience them for the first time in their lives. The diagnostic approach can rely on broad and reliable research (UNHCR, IMIS etc.) in order to identify distinct groups, which need differentiated measures. In all cases, the educational basics, the Soft Sector grid, and one rationale should be at the beginning: the present should rather be used to prepare for the future than to cover them.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p align="justify" data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">A rescued person will be grateful for a moment that his or her life has been saved. But then it is likely that concern for the future, the next week, months or years will become pivotal. </span></p><span data-dcnode-id="951" instrument_node="">
</span><p align="justify" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">The principles for dealing with the present should be few, well based and applied with as few exceptions as possible:</span></p><span data-dcnode-id="948" instrument_node="">
</span><ul data-dcnode-id="920"><p align="justify" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">§ Empowerment</span></p><span data-dcnode-id="945" instrument_node="">
</span><p align="justify" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">§ Sense of respect and individual dignity</span></p><span data-dcnode-id="942" instrument_node="">
</span><p align="justify" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">§ Critical realism</span></p><span data-dcnode-id="939" instrument_node="">
</span><p align="justify" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">§ Applicable knowledge</span></p><span data-dcnode-id="936" instrument_node="">
</span><p align="justify" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">§ Motivating further learning and education</span></p><span data-dcnode-id="933" instrument_node="">
