</span><meta content="<h3>Context</h3><p>The global refugee crisis requires that researchers, policymakers, and clinicians comprehend the magnitude of the psychological consequences of forced displacement and the factors that moderate them. To date, no empirical synthesis of research on these issues has been undertaken.</p><h3>Objective</h3><p>To meta-analytically establish the extent of compromised mental health among refugees (including internally displaced persons, asylum seekers, and stateless persons) using a worldwide study sample. Potential moderators of mental health outcomes were examined, including enduring contextual variables (eg, postdisplacement accommodation and economic opportunity) and refugee characteristics.</p><h3>Data sources</h3><p>Published studies (1959-2002) were obtained using broad searches of computerized databases (PsycINFO and PILOTS), manual searches of reference lists, and interviews with prominent authors.</p><h3>Study selection</h3><p>Studies were selected if they investigated a refugee group and at least 1 nonrefugee comparison group and reported 1 or more quantitative group comparison on measures of psychopathology. Fifty-six reports met inclusion criteria (4.4% of identified reports), yielding 59 independent comparisons and including 67,294 participants (22,221 refugees and 45,073 nonrefugees).</p><h3>Data extraction</h3><p>Data on study and report characteristics, study participant characteristics, and statistical outcomes were extracted using a coding manual and subjected to blind recoding, which indicated high reliability. Methodological quality information was coded to assess potential sources of bias.</p><h3>Data synthesis</h3><p>Effect size estimates for the refugee-nonrefugee comparisons were averaged across psychopathology measures within studies and weighted by sample size. The weighted mean effect size was 0.41 (SD, 0.02; range, -1.36 to 2.91 [SE, 0.01]), indicating that refugees had moderately poorer outcomes. Postdisplacement conditions moderated mental health outcomes. Worse outcomes were observed for refugees living in institutional accommodation, experiencing restricted economic opportunity, displaced internally within their own country, repatriated to a country they had previously fled, or whose initiating conflict was unresolved. Refugees who were older, more educated, and female and who had higher predisplacement socioeconomic status and rural residence also had worse outcomes. Methodological differences between studies affected effect sizes.</p><h3>Conclusions</h3><p>The sociopolitical context of the refugee experience is associated with refugee mental health. Humanitarian efforts that improve these conditions are likely to have positive impacts.</p>" data-dcnode-id="186" lang="" name="citation_abstract"><span data-dcnode-id="185" instrument_node="">

</span><div class="abstract" data-dcnode-id="38" id="abstract"><span data-dcnode-id="87" instrument_node="">
</span><h2 class="title" data-dcnode-id="85"><span data-dcnode-id="86" instrument_node="">
        Abstract
        
      </span></h2><span data-dcnode-id="84" instrument_node="">
</span><div class="abstract-content selected" data-dcnode-id="40" id="enc-abstract"><span data-dcnode-id="83" instrument_node="">
</span><p data-dcnode-id="78"><span data-dcnode-id="82" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="80"><span data-dcnode-id="81" instrument_node="">
          Context:
        </span></strong><span data-dcnode-id="79" instrument_node="">
      
      The global refugee crisis requires that researchers, policymakers, and clinicians comprehend the magnitude of the psychological consequences of forced displacement and the factors that moderate them. To date, no empirical synthesis of research on these issues has been undertaken.
    </span></p><span data-dcnode-id="77" instrument_node="">
</span><p data-dcnode-id="72"><span data-dcnode-id="76" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="74"><span data-dcnode-id="75" instrument_node="">
          Objective:
        </span></strong><span data-dcnode-id="73" instrument_node="">
      
      To meta-analytically establish the extent of compromised mental health among refugees (including internally displaced persons, asylum seekers, and stateless persons) using a worldwide study sample. Potential moderators of mental health outcomes were examined, including enduring contextual variables (eg, postdisplacement accommodation and economic opportunity) and refugee characteristics.
    </span></p><span data-dcnode-id="71" instrument_node="">
</span><p data-dcnode-id="66"><span data-dcnode-id="70" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="68"><span data-dcnode-id="69" instrument_node="">
          Data sources:
        </span></strong><span data-dcnode-id="67" instrument_node="">
      
      Published studies (1959-2002) were obtained using broad searches of computerized databases (PsycINFO and PILOTS), manual searches of reference lists, and interviews with prominent authors.
    </span></p><span data-dcnode-id="65" instrument_node="">
</span><p data-dcnode-id="60"><span data-dcnode-id="64" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="62"><span data-dcnode-id="63" instrument_node="">
          Study selection:
        </span></strong><span data-dcnode-id="61" instrument_node="">
      
      Studies were selected if they investigated a refugee group and at least 1 nonrefugee comparison group and reported 1 or more quantitative group comparison on measures of psychopathology. Fifty-six reports met inclusion criteria (4.4% of identified reports), yielding 59 independent comparisons and including 67,294 participants (22,221 refugees and 45,073 nonrefugees).
    </span></p><span data-dcnode-id="59" instrument_node="">
</span><p data-dcnode-id="54"><span data-dcnode-id="58" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="56"><span data-dcnode-id="57" instrument_node="">
          Data extraction:
        </span></strong><span data-dcnode-id="55" instrument_node="">
      
      Data on study and report characteristics, study participant characteristics, and statistical outcomes were extracted using a coding manual and subjected to blind recoding, which indicated high reliability. Methodological quality information was coded to assess potential sources of bias.
    </span></p><span data-dcnode-id="53" instrument_node="">
</span><p data-dcnode-id="48"><span data-dcnode-id="52" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="50"><span data-dcnode-id="51" instrument_node="">
          Data synthesis:
        </span></strong><span data-dcnode-id="49" instrument_node="">
      
      Effect size estimates for the refugee-nonrefugee comparisons were averaged across psychopathology measures within studies and weighted by sample size. The weighted mean effect size was 0.41 (SD, 0.02; range, -1.36 to 2.91 [SE, 0.01]), indicating that refugees had moderately poorer outcomes. Postdisplacement conditions moderated mental health outcomes. Worse outcomes were observed for refugees living in institutional accommodation, experiencing restricted economic opportunity, displaced internally within their own country, repatriated to a country they had previously fled, or whose initiating conflict was unresolved. Refugees who were older, more educated, and female and who had higher predisplacement socioeconomic status and rural residence also had worse outcomes. Methodological differences between studies affected effect sizes.
    </span></p><span data-dcnode-id="47" instrument_node="">
</span><p data-dcnode-id="42"><span data-dcnode-id="46" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="44"><span data-dcnode-id="45" instrument_node="">
          Conclusions:
        </span></strong><span data-dcnode-id="43" instrument_node="">
      
      The sociopolitical context of the refugee experience is associated with refugee mental health. Humanitarian efforts that improve these conditions are likely to have positive impacts.
    </span></p><span data-dcnode-id="41" instrument_node="">
