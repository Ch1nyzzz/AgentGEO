</span><h1 class="center" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Asylum Seekers Support</span></h1><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">&nbsp;</span></p><span data-dcnode-id="249" instrument_node="">
</span><h2 class="center" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Housing Advice</span></h2><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">The 1951 United Nations Convention on Refugees defines a refugee as someone who has fled their country due to 'a well founded fear of being persecuted for reasons of race, religion, nationality, membership of a particular social group or political opinion'.</span></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">An asylum seeker is someone who arrives in a new country and makes an asylum application. It is then up to the Government to decide if their claim meets the definition of a refugee.</span></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Under the Immigration and Asylum Act of 1999, asylum seekers who arrived in the UK after 2 April 2000 are not provided for by the Council. The Home Office provides housing and support services through the United Kingdom Border Agency (UKBA)</span></p><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Under the National Assistance Act of 1948 different rules may apply to asylum seekers who arrived prior to 3 April 2000. Please contact the Greater Manchester Immigration Aid Unit for further information regarding this.</span></p><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Asylum Seekers whose application has been refused often encounter homelessness and face difficulty in obtaining accommodation. Advice can be provided from the links below.</span></p><span data-dcnode-id="231" instrument_node="">
</span><ul data-dcnode-id="211"><span data-dcnode-id="230" instrument_node="">
