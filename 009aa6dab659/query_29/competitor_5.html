</span><h2 data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Refugee resettlement</span></h2><span data-dcnode-id="1503" instrument_node="">
</span><span class="lead" data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Some of the most vulnerable refugees are resettled in other countries under internationally agreed resettlement schemes. We are there for them from the minute they step off the plane. </span></span><span data-dcnode-id="1500" instrument_node="">
</span></div><span data-dcnode-id="1498" instrument_node="">
</span></div><span data-dcnode-id="1496" instrument_node="">
</span></div><span data-dcnode-id="1494" instrument_node="">

</span><section class="content-wrapper" data-dcnode-id="776" id="content" role="main"><span data-dcnode-id="1487" instrument_node="">
</span><div class="" data-dcnode-id="862"><span data-dcnode-id="1486" instrument_node="">
</span><article class="post-type-page" data-dcnode-id="864" id="post-6005"><span data-dcnode-id="1485" instrument_node="">
</span><div class="container" data-dcnode-id="866"><span data-dcnode-id="1484" instrument_node="">
</span><div class="row" data-dcnode-id="868"><span data-dcnode-id="1483" instrument_node="">
</span><div class="col-lg-8 offset-lg-2" data-dcnode-id="870"><span data-dcnode-id="1482" instrument_node="">
</span><section class="article-content" data-dcnode-id="872"><span data-dcnode-id="1481" instrument_node="">
</span><div class="main-content" data-dcnode-id="1473"><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Most refugees are unable to travel far beyond the borders of their home countries. They often live in refugee camps or in poverty in neighbouring countries for years. Many children have lived their entire lives in camps.</span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Some refugees who are particularly vulnerable due to health conditions, or because they are at a high risk of harm or exploitation, are selected for resettlement by the United Nations. They are transferred to countries like the UK, which has agreed to offer them a safe place where they can finally rebuild their lives.</span></p><span data-dcnode-id="1474" instrument_node="">
</span></div><span data-dcnode-id="1472" instrument_node="">
</span><div class="row block-fact block-pad" data-dcnode-id="1455"><span data-dcnode-id="1471" instrument_node="">
</span><div class="col-sm-12" data-dcnode-id="1457"><span data-dcnode-id="1470" instrument_node="">
</span><div class="fact fact- fact-blue fact-tear- fact-noimage" data-dcnode-id="1459"><span data-dcnode-id="1469" instrument_node="">
</span><div class="content" data-dcnode-id="1461"><span data-dcnode-id="1468" instrument_node="">
</span><h2 data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">23,665</span></h2><span data-dcnode-id="1465" instrument_node="">
</span><span class="copy" data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">The number of refugees the UK resettled from 2016-2020.</span></span><span data-dcnode-id="1462" instrument_node="">
</span></div><span data-dcnode-id="1460" instrument_node="">
</span></div><span data-dcnode-id="1458" instrument_node="">
</span></div><span data-dcnode-id="1456" instrument_node="">

</span><div class="row block-divide" data-dcnode-id="1447"><span data-dcnode-id="1453" instrument_node="">

</span><hr class="large" data-dcnode-id="1451"><span data-dcnode-id="1450" instrument_node="">
</span></div><span data-dcnode-id="1448" instrument_node="">
</span></div><span data-dcnode-id="1446" instrument_node="">
</span><div class="row block-heading" data-dcnode-id="1438"><span data-dcnode-id="1445" instrument_node="">
</span><div class="col-sm-12" data-dcnode-id="1440"><span data-dcnode-id="1444" instrument_node="">
</span><h3 data-dcnode-id="1442" style="text-align:center;"><span data-dcnode-id="1443" instrument_node="">How we help</span></h3><span data-dcnode-id="1441" instrument_node="">
</span></div><span data-dcnode-id="1439" instrument_node="">
</span></div><span data-dcnode-id="1437" instrument_node="">
</span><div class="row block-copy block-pad" data-dcnode-id="1429"><span data-dcnode-id="1436" instrument_node="">
</span><div class="col-sm-12" data-dcnode-id="1431"><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">We give resettled refugees the support they need to rebuild their lives. Working with local communities, groups and public services, we ensure they have a warm welcome and a home in which to begin their new lives. We support them to learn English, understand local customs, and access healthcare and education. And we help them to meet local people and gain confidence and independence.</span></p><span data-dcnode-id="1432" instrument_node="">
</span></div><span data-dcnode-id="1430" instrument_node="">
</span></div><span data-dcnode-id="1428" instrument_node="">
</span><div class="row block-quote block-pad" data-dcnode-id="1406"><span data-dcnode-id="1427" instrument_node="">
</span><div class="col-sm-12" data-dcnode-id="1408"><span data-dcnode-id="1426" instrument_node="">
</span><div class="quote quote-left quote-white quote-tear- quote-noimage" data-dcnode-id="1410"><span data-dcnode-id="1425" instrument_node="">
</span><img class="lazy" data-dcnode-id="1424" data-src="" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201%201'%3E%3C/svg%3E"><span data-dcnode-id="1423" instrument_node="">
</span><div class="content" data-dcnode-id="1412"><span data-dcnode-id="1422" instrument_node="">
</span><span class="copy" data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">“We had to be taught everything: how to get on a bus, what to say to the driver, things like setting up bank accounts, registering with a GP and how to pay for things at a supermarket. Refugee Council helped us a lot in every way. They have helped us feel independent.”</span></span><span data-dcnode-id="1419" instrument_node="">
</span><span class="name" data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Abou Ali,</span></span><span data-dcnode-id="1416" instrument_node=""> </span><span class="desc" data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">resettled Syrian refugee</span></span><span data-dcnode-id="1413" instrument_node=""> </span></div><span data-dcnode-id="1411" instrument_node="">
</span></div><span data-dcnode-id="1409" instrument_node="">
</span></div><span data-dcnode-id="1407" instrument_node="">
</span></div><span data-dcnode-id="1405" instrument_node="">
</span><div class="row block-fact block-pad" data-dcnode-id="1349"><span data-dcnode-id="1404" instrument_node="">

</span><h4 class="white stat" data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">0.6%</span></h4><span data-dcnode-id="1395" instrument_node="">
