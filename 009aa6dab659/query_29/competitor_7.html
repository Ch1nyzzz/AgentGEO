</span><h2 class="panel-title" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Related</span></h2><span data-dcnode-id="933" instrument_node="">

</span><div class="panel-body" data-dcnode-id="911"><span data-dcnode-id="930" instrument_node="">
</span><ul data-dcnode-id="913"><span data-dcnode-id="929" instrument_node="">
</span><li data-dcnode-id="925"><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottishrefugeecouncil.org.uk/" target="_blank"><div class="icon-chevron-right" data-dcnode-id="928"></div><span data-dcnode-id="927" instrument_node="">Scottish Refugee Council</span></a></li><span data-dcnode-id="924" instrument_node="">
</span><li data-dcnode-id="920"><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gov.uk/government/publications/uk-resettlement-programmes-funding-instruction-2020-to-2021" target="_blank"><div class="icon-chevron-right" data-dcnode-id="923"></div><span data-dcnode-id="922" instrument_node="">UK resettlement programmes: funding instruction 2020 to 2021</span></a></li><span data-dcnode-id="919" instrument_node="">
</span><li data-dcnode-id="915"><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//refugeesaberdeenshire.wordpress.com/" target="_blank"><div class="icon-chevron-right" data-dcnode-id="918"></div><span data-dcnode-id="917" instrument_node="">Refugees Aberdeenshire New Scots</span></a></li><span data-dcnode-id="914" instrument_node="">
</span></ul><span data-dcnode-id="912" instrument_node="">
</span></div><span data-dcnode-id="910" instrument_node="">
</span></div><span data-dcnode-id="908" instrument_node="">
</span></div><span data-dcnode-id="906" instrument_node="">
</span><div class="col-xs-12 col-sm-9 col-sm-pull-3" data-dcnode-id="717"><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="898"><span class="imagerightborder" data-dcnode-id="903"><img alt="A group of Syrian refugees standing on a beach" data-dcnode-id="904" data-id="39564" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aberdeenshire.gov.uk/media/25497/syrian_refugeess.jpg%3Fwidth%3D409%26height%3D307&amp;raw"></span><span data-dcnode-id="902" instrument_node="">In 2015,&nbsp;the UK Government&nbsp;announced an extension to the Syrian Vulnerable Persons’ Relocation Scheme (SVPR) and pledged to resettle 20,000 refugees by 2020. The Scottish Government committed to resettling a minimum of 2,000 refugees and Aberdeenshire Council pledged to resettle 50 families via the </span><span data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Syrian Vulnerable Persons’ Relocation Scheme (SVPR)</span></span><span data-dcnode-id="899" instrument_node=""> and 8 families via the Vulnerable Children’s Scheme (VCRS). In November 2019, councillors acknowledged that this target had been met and agreed to continue resettling approximately 12&nbsp;to 15 refugee families per year.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">On 13th September 2021, the Home Secretary and the Secretary of State for Housing, Communities and Local Government, wrote to Council Leaders and Chief Executives, thanking them for their support but urging councils to go further with resettlement offers. They announced details of the new Afghan Citizens Resettlement Scheme (ACRS) and how it will interact with the existing Afghan Relocation and Assistance Policy Scheme (ARAP) and the United Kingdom Resettlement Scheme (UKRS). Aberdeenshire Council had an ongoing commitment to resettling 12&nbsp;to 15 families per year via UKRS, but with two new additional schemes in operation, we have re-evaluated our commitment and the council will now resettle 30 families per year across the three schemes.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="893" instrument_node="">Aberdeenshire had no previous experience of supporting refugees. We are not an asylum dispersal area, so numbers of </span><a data-dcnode-id="891" href="#refugee"><span data-dcnode-id="892" instrument_node="">refugees</span></a><span data-dcnode-id="890" instrument_node=""> and </span><a data-dcnode-id="888" href="#asylumskeeker"><span data-dcnode-id="889" instrument_node="">asylum seekers</span></a><span data-dcnode-id="887" instrument_node=""> living in&nbsp;Aberdeenshire were estimated in single figures. Most councils in the UK with resettlement experience managed resettlement via housing teams, but Aberdeenshire took a slightly different approach to coordinate the programme. We are proud that our resettlement programme places equal value and importance on the capacity building of the individual refugee, family and settled community as resettlement essentials&nbsp;such as access to:</span></p><span data-dcnode-id="885" instrument_node="">
</span><ul data-dcnode-id="871"><span data-dcnode-id="884" instrument_node="">
</span><li data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">housing</span></li><span data-dcnode-id="881" instrument_node="">
</span><li data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">health</span></li><span data-dcnode-id="878" instrument_node="">
</span><li data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">education</span></li><span data-dcnode-id="875" instrument_node="">
</span><li data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">employment</span></li><span data-dcnode-id="872" instrument_node="">
</span></ul><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">An underpinning community development approach ensures creative solutions can be found within people and communities.</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="863"><span class="feature-item-text" data-dcnode-id="864"><a data-dcnode-id="866" id="refugee" target="_blank"></a><span data-dcnode-id="865" instrument_node="">Refugee</span></span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">A refugee is someone who has been granted status and permission to stay in the UK for a limited period (normally 5 years). Refugees have similar rights as UK citizens. All our families are refugees with 5 years Leave to Remain. After 5 years, families apply for Settled Status (Indefinite Leave to Remain). If they are granted Settled Status, they will be entitled to apply for citizenship 12 months later – if they can meet stringent English language requirements, pay a fee and pass the Life in the UK Test.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="855"><span class="feature-item-text" data-dcnode-id="856"><a data-dcnode-id="858" id="asylumskeeker" target="_blank"></a><span data-dcnode-id="857" instrument_node="">Asylum seeker</span></span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">The definition of an asylum seeker is someone who arrives in the UK and seeks sanctuary. Until they receive a decision as to whether or not they will be granted refugee status and temporary leave to remain, they are known as an asylum seeker. In the UK, this means they you are allocated asylum housing and weekly cash support, with limited rights and access to services. Glasgow is the main asylum dispersal area in Scotland.</span></p><span data-dcnode-id="851" instrument_node="">
</span><h3 data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">United Kingdom Resettlement&nbsp;Scheme (UKRS)</span></h3><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="847" instrument_node="">Families coming to Aberdeenshire are resettled via the </span><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/publications/uk-resettlement-programmes-funding-instruction-2021-to-2022" target="_blank"><span data-dcnode-id="846" instrument_node="">United Kingdom Resettlement&nbsp;Scheme (UKRS)</span></a><span data-dcnode-id="844" instrument_node="">. This programme replaced the SVPR and VCRS programmes from 1st April 2020.</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="841" instrument_node="">The&nbsp;</span><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/" target="_blank"><span data-dcnode-id="840" instrument_node="">United Nations High Commission for Refugees (UNHCR)</span></a><span data-dcnode-id="838" instrument_node=""> identifies and submits potential cases for consideration and families are then screened and considered. Priority is given to those most vulnerable and at-risk including:</span></p><span data-dcnode-id="836" instrument_node="">
</span><ul data-dcnode-id="825"><span data-dcnode-id="835" instrument_node="">
</span><li data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">people with learning or physical disabilities</span></li><span data-dcnode-id="832" instrument_node="">
</span><li data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">survivors of torture</span></li><span data-dcnode-id="829" instrument_node="">
</span><li data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">young women and girls at risk of exploitation</span></li><span data-dcnode-id="826" instrument_node="">
</span></ul><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Cases can be rejected on security, war crimes or other grounds.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="820" instrument_node="">Once the screening process has been completed a full medical assessment is conducted by the </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unitedkingdom.iom.int/" target="_blank"><span data-dcnode-id="819" instrument_node="">International Organisation for Migration (IOM)</span></a><span data-dcnode-id="817" instrument_node=""> in the host country. Full details of the case and medical history are sent to Aberdeenshire for assessment of need. Eligibility is then confirmed, and IOM starts preparing visa and travel arrangements.</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">The Home Office allocates funding for every family resettled to Aberdeenshire. This funding covers 100% of resettlement expenditure including staffing costs, interpreters and preparing homes for arrival. Only essential furniture and items can be provided so local communities donate prams, toys, books and rugs to ensure that every family has a little extra to make their house a home.</span></p><span data-dcnode-id="812" instrument_node="">
</span><h3 data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Afghan Relocation and Assistance Policy (ARAP)</span></h3><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="808" instrument_node="">The </span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/publications/afghan-relocations-and-assistance-policy/afghan-relocations-and-assistance-policy-information-and-guidance" target="_blank"><span data-dcnode-id="807" instrument_node="">ARAP scheme</span></a><span data-dcnode-id="805" instrument_node=""> launched on 1st April 2021 and will continue to remain open and operate indefinitely. Under the ARAP scheme, any current or former locally employed staff directly employed by Her Majesty's Government assessed to be at serious risk of threat to life will be eligible to apply for ARAP regardless of their employment status, rank or role, or length of time served.</span></p><span data-dcnode-id="803" instrument_node="">
</span><h3 data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Afghan Citizens' Resettlement Scheme (ACRS)</span></h3><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="799" instrument_node="">The </span><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/guidance/afghan-citizens-resettlement-scheme" target="_blank"><span data-dcnode-id="798" instrument_node="">Afghan citizens’ resettlement scheme (ACRS)</span></a><span data-dcnode-id="796" instrument_node=""> provides protection for people at risk identified as in need. Th scheme will prioritise:</span></p><span data-dcnode-id="794" instrument_node="">
</span><ul data-dcnode-id="786"><span data-dcnode-id="793" instrument_node="">
</span><li data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">those who have assisted the UK efforts in Afghanistan and stood up for values such as democracy, women’s rights, freedom of speech, and rule of law</span></li><span data-dcnode-id="790" instrument_node="">
</span><li data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">vulnerable people, including women and girls at risk, and members of minority groups at risk (including ethnic and religious minorities and LGBT+)</span></li><span data-dcnode-id="787" instrument_node="">
</span></ul><span data-dcnode-id="785" instrument_node="">
</span><h3 data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">The role of our Refugee Resettlement Team&nbsp;</span></h3><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">The Refugee Resettlement Team has a wide range of professional backgrounds including housing, social work, education, business, community development and oil&nbsp;and&nbsp;gas, and includes bilingual Arabic speakers. They&nbsp;team consists of council employees but&nbsp;it is funded directly by the Home Office.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Once resettlement has been approved by UNHCR and the Home Office, the Refugee Resettlement Team will begin preparations for arrival. This involves:</span></p><span data-dcnode-id="776" instrument_node="">
</span><ul data-dcnode-id="762"><span data-dcnode-id="775" instrument_node="">
</span><li data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">preparing a home with basic essential items</span></li><span data-dcnode-id="772" instrument_node="">
</span><li data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">arranging health assessments</span></li><span data-dcnode-id="769" instrument_node="">
</span><li data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">school and ESOL class enrolment</span></li><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Jobcentre appointments</span></li><span data-dcnode-id="763" instrument_node="">
</span></ul><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">When a family arrive, they are met at the airport by the team, taken to their new home and helped to feel safe and settle. Over the next few months, the team will provide intensive support to encourage and enable families to independence.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">After 12 months, home visits stop and support is reduced to advice only unless a family is particularly vulnerable.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Our job is to ensure all necessary long term mainstream supports are in place if required. During this period, new Scots’ families take a giant leap from being scared and uncertain on arrival to being confident and managing their own lives and goals.</span></p><span data-dcnode-id="752" instrument_node="">
</span><h3 data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">New Scots, new homes, new lives</span></h3><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Aberdeenshire new Scots’ families have embraced their new homes and new communities. Many are ambassadors for communities they love and are determined to contribute in any way they can. Most families arrive with little or no English, but in a few years some are now university undergraduates, engineers and care workers. New businesses have been formed built on traditional skills of cooking and tailoring and new friendships formed. Refugee resettlement is brutal and it’s not an end result, it’s an opportunity for a new life, new opportunities and hope.</span></p><span data-dcnode-id="746" instrument_node="">
</span><h3 data-dcnode-id="743"><a data-dcnode-id="745" id="contact" target="_blank"></a><span data-dcnode-id="744" instrument_node="">Get in touch, volunteer, donate</span></h3><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="741" instrument_node="">For more information or if you would like to volunteer or donate, please email </span><a data-dcnode-id="739" href="mailto:RefugeeResettlementTeam@aberdeenshire.gov.uk"><span data-dcnode-id="740" instrument_node="">RefugeeResettlementTeam@aberdeenshire.gov.uk</span></a><span data-dcnode-id="738" instrument_node="">.</span></p><span data-dcnode-id="736" instrument_node="">
