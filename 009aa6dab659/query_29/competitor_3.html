</span><div data-dcnode-id="617" id="resettlement"><span data-dcnode-id="630" instrument_node="">
</span><header class="entry-header" data-dcnode-id="625"><span data-dcnode-id="629" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Resettlement</span></h1><span data-dcnode-id="626" instrument_node=""> </span></header><span data-dcnode-id="624" instrument_node="">
</span><div class="entry-content" data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">
</span></div><span data-dcnode-id="621" instrument_node="">
</span><footer class="entry-footer" data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">
</span></footer><span data-dcnode-id="618" instrument_node="">
</span></div><span data-dcnode-id="616" instrument_node="">
</span></article><span data-dcnode-id="614" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="597" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="613" instrument_node="">
</span><h3 data-dcnode-id="611" itemprop="name"><span data-dcnode-id="612" instrument_node="">What is Resettlement?</span></h3><span data-dcnode-id="610" instrument_node="">
</span><div data-dcnode-id="599" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="609" instrument_node="">
</span><div data-dcnode-id="601" itemprop="text"><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">UNHCR is mandated to find durable solutions for refugees.&nbsp; There are three possibilities: voluntary repatriation, local integration in the country of asylum, and resettlement to a third country. Voluntary repatriation remains the preferred durable solution of refugee situations.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Resettlement involves the selection and transfer of refugees from the&nbsp; State in which they have sought asylum to a third State which has agreed to admit them – as refugees&nbsp; but with permanent residence status. Resettlement is a limited option available only to refugees who meet precise criteria – only a tiny percentage (less that 1%) of refugees get resettled. Resettlement is not a right. Resettlement consideration is based on protection needs and done on an on-going basis as part of UNHCR’s everyday work.&nbsp; Refugees are not considered on the basis of how long they have been in Kenya.</span></p><span data-dcnode-id="602" instrument_node="">
</span></div><span data-dcnode-id="600" instrument_node="">
</span></div><span data-dcnode-id="598" instrument_node="">
</span></div><span data-dcnode-id="596" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="576" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="595" instrument_node="">
</span><h3 data-dcnode-id="593" itemprop="name"><span data-dcnode-id="594" instrument_node="">How are refugees identified for resettlement?</span></h3><span data-dcnode-id="592" instrument_node="">
</span><div data-dcnode-id="578" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="591" instrument_node="">
</span><div data-dcnode-id="580" itemprop="text"><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Resettlement cases are initiated by referrals from other UNHCR protection units or external referrals from select partner organizations. Referrals are based on an assessment of resettlement needs based on UNHCR principles and guidelines. You cannot apply for resettlement. UNHCR identifies refugees for resettlement consideration on an on-going basis by monitoring specific protection needs and vulnerabilities.&nbsp;&nbsp; The identification of a refugee as being particularly vulnerable does not necessarily mean that the refugee is either eligible for or in need of resettlement. Only persons who have been recognized and registered as a refugee by the Kenyan authorities or UNHCR may be considered for resettlement.</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Each year, resettlement countries decide how they will allocate resettlement places among the millions of refugees throughout the world. UNHCR can only consider cases within these limits.&nbsp;&nbsp; Since resettlement places are very limited, UNHCR must prioritize the cases of refugees who have the most urgent protection needs and vulnerabilities.</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Resettlement is a limited option at the disposal of UNHCR to address a refugee’s vulnerability. While assessing an individual case, voluntary repatriation and local integration prospects will also be taken into account.</span></p><span data-dcnode-id="581" instrument_node="">
</span></div><span data-dcnode-id="579" instrument_node="">
</span></div><span data-dcnode-id="577" instrument_node="">
</span></div><span data-dcnode-id="575" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="561" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="574" instrument_node="">
</span><h3 data-dcnode-id="572" itemprop="name"><span data-dcnode-id="573" instrument_node="">Can I apply for resettlement?</span></h3><span data-dcnode-id="571" instrument_node="">
</span><div data-dcnode-id="563" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="570" instrument_node="">
</span><div data-dcnode-id="565" itemprop="text"><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">No. Resettlement is not initiated by an individual refugee application. You should not assume that you have a resettlement case unless you are advised so by the Resettlement Unit.</span></p><span data-dcnode-id="566" instrument_node="">
</span></div><span data-dcnode-id="564" instrument_node="">
</span></div><span data-dcnode-id="562" instrument_node="">
</span></div><span data-dcnode-id="560" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="540" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="559" instrument_node="">
</span><h3 data-dcnode-id="557" itemprop="name"><span data-dcnode-id="558" instrument_node="">Do I have a right to be considered for resettlement?</span></h3><span data-dcnode-id="556" instrument_node="">
</span><div data-dcnode-id="542" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="555" instrument_node="">
</span><div data-dcnode-id="544" itemprop="text"><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">No, resettlement, unlike protection, is not a right. Resettlement is a solution that only applies to refugees in very specific circumstances.</span></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Resettlement is not automatic. Recognition of refugee status does not necessarily mean that a refugee has a case for resettlement.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Resettlement is not a right embodied in international law. There is no obligation on countries to accept refugees for resettlement.</span></p><span data-dcnode-id="545" instrument_node="">
</span></div><span data-dcnode-id="543" instrument_node="">
</span></div><span data-dcnode-id="541" instrument_node="">
</span></div><span data-dcnode-id="539" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="513" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="538" instrument_node="">
</span><h3 data-dcnode-id="536" itemprop="name"><span data-dcnode-id="537" instrument_node="">What criteria does UNHCR use to choose cases for resettlement?</span></h3><span data-dcnode-id="535" instrument_node="">
</span><div data-dcnode-id="515" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="534" instrument_node="">
</span><div data-dcnode-id="517" itemprop="text"><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">UNHCR has specific global criteria and methodologies for resettlement case identification. To qualify:</span></p><span data-dcnode-id="530" instrument_node="">
</span><ul data-dcnode-id="519"><span data-dcnode-id="529" instrument_node="">
</span><li data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">One must have been granted refugee status. Asylum-seekers cannot be processed for resettlement.</span></li><span data-dcnode-id="526" instrument_node="">
</span><li data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">There must be no prospects for voluntary repatriation or local integration.</span></li><span data-dcnode-id="523" instrument_node="">
</span><li data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Refugees must fall under one of the UNHCR resettlement submission categories.</span></li><span data-dcnode-id="520" instrument_node="">
</span></ul><span data-dcnode-id="518" instrument_node="">
</span></div><span data-dcnode-id="516" instrument_node="">
</span></div><span data-dcnode-id="514" instrument_node="">
</span></div><span data-dcnode-id="512" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="498" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="511" instrument_node="">
</span><h3 data-dcnode-id="509" itemprop="name"><span data-dcnode-id="510" instrument_node="">What happens if I am identified for resettlement?</span></h3><span data-dcnode-id="508" instrument_node="">
</span><div data-dcnode-id="500" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="507" instrument_node="">
</span><div data-dcnode-id="502" itemprop="text"><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">You will be informed of this by UNHCR and will be invited for an interview. The Resettlement Unit uses a two–step process.&nbsp; Phase 1 is an initial interview to review the referral reasons, family structure and other evidence and Phase 2 is an application completion interview.</span></p><span data-dcnode-id="503" instrument_node="">
</span></div><span data-dcnode-id="501" instrument_node="">
</span></div><span data-dcnode-id="499" instrument_node="">
</span></div><span data-dcnode-id="497" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="483" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="496" instrument_node="">
</span><h3 data-dcnode-id="494" itemprop="name"><span data-dcnode-id="495" instrument_node="">Should I stop working or studying when my case considered for resettlement?</span></h3><span data-dcnode-id="493" instrument_node="">
</span><div data-dcnode-id="485" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="492" instrument_node="">
</span><div data-dcnode-id="487" itemprop="text"><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">No. Even if your case is identified for resettlement, it may take a long time for the process to be completed. Due to limited quotas and specific requirements for these quotas, having a referral or an interview with a resettlement staff member does not guarantee a submission.&nbsp; It depends on available quotas provided by countries.&nbsp; Unfortunately, the UNHCR has many cases that have been “deprioritized” due to this reason. &nbsp;Further your case could also be found to be inappropriate for submission.</span></p><span data-dcnode-id="488" instrument_node="">
</span></div><span data-dcnode-id="486" instrument_node="">
</span></div><span data-dcnode-id="484" instrument_node="">
</span></div><span data-dcnode-id="482" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="468" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="481" instrument_node="">
</span><h3 data-dcnode-id="479" itemprop="name"><span data-dcnode-id="480" instrument_node="">I was told that if I paid money to someone, I would be resettled. Is this true?</span></h3><span data-dcnode-id="478" instrument_node="">
</span><div data-dcnode-id="470" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="477" instrument_node="">
</span><div data-dcnode-id="472" itemprop="text"><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">All services provided by UNHCR and partners are free of cost. You should not pay money for any services, including resettlement.</span></p><span data-dcnode-id="473" instrument_node="">
</span></div><span data-dcnode-id="471" instrument_node="">
</span></div><span data-dcnode-id="469" instrument_node="">
</span></div><span data-dcnode-id="467" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="450" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="466" instrument_node="">
</span><h3 data-dcnode-id="464" itemprop="name"><span data-dcnode-id="465" instrument_node="">What will I be asked in a resettlement interview?</span></h3><span data-dcnode-id="463" instrument_node="">
</span><div data-dcnode-id="452" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="462" instrument_node="">
</span><div data-dcnode-id="454" itemprop="text"><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">During the resettlement interview, a refugee will be asked a variety of questions. To facilitate a smooth process and a fair assessment, the refugee is requested to ensure that they tell the truth. The interview is an opportunity for the refugee to present his/her situation so that UNHCR can have a detailed understanding of the circumstances of the case. The refugee is reminded to provide any relevant identity, travel, or other documents which they may have. The fact that you were interviewed does not guarantee that you will be resettled.</span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">UNHCR conducts the interview individually with each adult refugee applicants in the case. The interview is conducted in the language preferred by the refugee applicant and also, he/she can express their preference as to the interpreter and gender of the interviewer.</span></p><span data-dcnode-id="455" instrument_node="">
</span></div><span data-dcnode-id="453" instrument_node="">
</span></div><span data-dcnode-id="451" instrument_node="">
</span></div><span data-dcnode-id="449" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="429" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="448" instrument_node="">
</span><h3 data-dcnode-id="446" itemprop="name"><span data-dcnode-id="447" instrument_node="">If I have been interviewed for resettlement, when should I follow-up on my case?</span></h3><span data-dcnode-id="445" instrument_node="">
</span><div data-dcnode-id="431" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="444" instrument_node="">
</span><div data-dcnode-id="433" itemprop="text"><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">A refugee can inquire as to the status of a case through the helpline or on a counselling day. However, simply because the Resettlement Unit received a referral does not mean the Resettlement Unit can process the case immediately.</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Different countries have different requirements.&nbsp; If your case does not meet the requirements of the countries the case may have to be deprioritized and revisited at another time when there are opportunities. Requirements of countries sometimes involve nationalities, case sizes, ages of refugees, languages, etc.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Further, the Resettlement Unit is working with a large number of cases that are currently pending, many of which are urgent. Many cases had to be deprioritized due to the lack of available quotas. Please be patient. It is a long process.</span></p><span data-dcnode-id="434" instrument_node="">
</span></div><span data-dcnode-id="432" instrument_node="">
</span></div><span data-dcnode-id="430" instrument_node="">
</span></div><span data-dcnode-id="428" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="414" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="427" instrument_node="">
</span><h3 data-dcnode-id="425" itemprop="name"><span data-dcnode-id="426" instrument_node="">What happens if I have been interviewed for resettlement and there is a change in my family, such as marriage, birth or death?</span></h3><span data-dcnode-id="424" instrument_node="">
</span><div data-dcnode-id="416" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="423" instrument_node="">
</span><div data-dcnode-id="418" itemprop="text"><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">You should inform UNHCR as soon as possible. Registration changes will be done by RAS.</span></p><span data-dcnode-id="419" instrument_node="">
</span></div><span data-dcnode-id="417" instrument_node="">
</span></div><span data-dcnode-id="415" instrument_node="">
</span></div><span data-dcnode-id="413" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="399" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="412" instrument_node="">
</span><h3 data-dcnode-id="410" itemprop="name"><span data-dcnode-id="411" instrument_node="">How do I know if I have a resettlement case?</span></h3><span data-dcnode-id="409" instrument_node="">
</span><div data-dcnode-id="401" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="408" instrument_node="">
</span><div data-dcnode-id="403" itemprop="text"><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">If you suspect a referral for resettlement in your case has been made but you have not been contacted by the&nbsp; Resettlement Unit about your referral, you can inquire whether your referral was received and the outcome through the Helpline.</span></p><span data-dcnode-id="404" instrument_node="">
</span></div><span data-dcnode-id="402" instrument_node="">
</span></div><span data-dcnode-id="400" instrument_node="">
</span></div><span data-dcnode-id="398" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="384" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="397" instrument_node="">
</span><h3 data-dcnode-id="395" itemprop="name"><span data-dcnode-id="396" instrument_node="">Can I choose which country I would like to be resettled to?</span></h3><span data-dcnode-id="394" instrument_node="">
</span><div data-dcnode-id="386" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="393" instrument_node="">
</span><div data-dcnode-id="388" itemprop="text"><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">No. Resettlement is not a right and resettlement places are limited; UNHCR does not submit cases to countries according to refugees’ preferences.</span></p><span data-dcnode-id="389" instrument_node="">
</span></div><span data-dcnode-id="387" instrument_node="">
</span></div><span data-dcnode-id="385" instrument_node="">
</span></div><span data-dcnode-id="383" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="369" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="382" instrument_node="">
</span><h3 data-dcnode-id="380" itemprop="name"><span data-dcnode-id="381" instrument_node="">Who makes the final decision on my case for resettlement?</span></h3><span data-dcnode-id="379" instrument_node="">
</span><div data-dcnode-id="371" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="378" instrument_node="">
</span><div data-dcnode-id="373" itemprop="text"><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">The final decision is made by the country of resettlement.</span></p><span data-dcnode-id="374" instrument_node="">
</span></div><span data-dcnode-id="372" instrument_node="">
</span></div><span data-dcnode-id="370" instrument_node="">
</span></div><span data-dcnode-id="368" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="351" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="367" instrument_node="">
</span><h3 data-dcnode-id="365" itemprop="name"><span data-dcnode-id="366" instrument_node="">How can I know the status of my resettlement case with UNHCR?</span></h3><span data-dcnode-id="364" instrument_node="">
</span><div data-dcnode-id="353" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="363" instrument_node="">
</span><div data-dcnode-id="355" itemprop="text"><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Due to the large number of cases that the RST Unit handles, they may not be able to give feedback on your case all the time. If reasonable time has lapsed since the last time you received feedback on your case, you can inquire on the status of your case through the Helpline.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">For cases that have already been submitted to a RST country, some RST countries have channels for tracking case progress. In general, be patient, you will be contacted any time there is a new development in your case.</span></p><span data-dcnode-id="356" instrument_node="">
</span></div><span data-dcnode-id="354" instrument_node="">
</span></div><span data-dcnode-id="352" instrument_node="">
</span></div><span data-dcnode-id="350" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="336" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="349" instrument_node="">
</span><h3 data-dcnode-id="347" itemprop="name"><span data-dcnode-id="348" instrument_node="">How long does it take between the resettlement interview and departure?</span></h3><span data-dcnode-id="346" instrument_node="">
</span><div data-dcnode-id="338" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="345" instrument_node="">
</span><div data-dcnode-id="340" itemprop="text"><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">The entire resettlement process is complex and takes a long time. Different cases are also processed at different timelines depending on many factors. Refugees whose cases have been submitted for resettlement should be patient while the case is being processed. It may be one to two years, or sometimes longer, for a final decision and departure to the resettlement country.</span></p><span data-dcnode-id="341" instrument_node="">
</span></div><span data-dcnode-id="339" instrument_node="">
</span></div><span data-dcnode-id="337" instrument_node="">
</span></div><span data-dcnode-id="335" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="321" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="334" instrument_node="">
</span><h3 data-dcnode-id="332" itemprop="name"><span data-dcnode-id="333" instrument_node="">What happens if my case is rejected for resettlement? </span></h3><span data-dcnode-id="331" instrument_node="">
</span><div data-dcnode-id="323" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="330" instrument_node="">
</span><div data-dcnode-id="325" itemprop="text"><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">If your case is rejected, you will be informed and your resettlement case will be closed, and you will be no longer with the resettlement process.</span></p><span data-dcnode-id="326" instrument_node="">
</span></div><span data-dcnode-id="324" instrument_node="">
</span></div><span data-dcnode-id="322" instrument_node="">
</span></div><span data-dcnode-id="320" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="303" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="319" instrument_node="">
</span><h3 data-dcnode-id="317" itemprop="name"><span data-dcnode-id="318" instrument_node="">Can I appeal in case of denial?</span></h3><span data-dcnode-id="316" instrument_node="">
</span><div data-dcnode-id="305" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="315" instrument_node="">
</span><div data-dcnode-id="307" itemprop="text"><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">It depends on the stage at which the case is denied. If your case is denied at UNHCR level, there is no right of appeal.</span></p><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">If your case is rejected by a resettlement country, the decision will tell you if there is a chance for appeal or not. Some countries have an opportunity for appeal while others do not. For instance, the USA has an appeal procedure known as Request for Review (RFR) within 90 days when upon receiving the decision letter.</span></p><span data-dcnode-id="308" instrument_node="">
</span></div><span data-dcnode-id="306" instrument_node="">
</span></div><span data-dcnode-id="304" instrument_node="">
</span></div><span data-dcnode-id="302" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="288" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="301" instrument_node="">
</span><h3 data-dcnode-id="299" itemprop="name"><span data-dcnode-id="300" instrument_node="">My case was rejected by a resettlement country. When will my case be resubmitted?</span></h3><span data-dcnode-id="298" instrument_node="">
</span><div data-dcnode-id="290" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="297" instrument_node="">
</span><div data-dcnode-id="292" itemprop="text"><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Your case was rejected for reasons that were made available to you. We are currently being faced with a shortage of resettlement slots.&nbsp; Accordingly, we are currently not resubmitting cases that have previously been rejected.&nbsp;&nbsp; With the US you may be able to file a Request for Review (RfR). It is important, however, that you know why the case has been rejected so you can address that issue in the RfR. This information can be obtained from the country that was processing your case.</span></p><span data-dcnode-id="293" instrument_node="">
</span></div><span data-dcnode-id="291" instrument_node="">
</span></div><span data-dcnode-id="289" instrument_node="">
</span></div><span data-dcnode-id="287" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="273" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="286" instrument_node="">
</span><h3 data-dcnode-id="284" itemprop="name"><span data-dcnode-id="285" instrument_node="">Can I withdraw my application after it was submitted for resettlement?</span></h3><span data-dcnode-id="283" instrument_node="">
</span><div data-dcnode-id="275" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="282" instrument_node="">
</span><div data-dcnode-id="277" itemprop="text"><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Yes. Once you withdraw your case, UNHCR will close your resettlement case and you will no longer be processed for resettlement.</span></p><span data-dcnode-id="278" instrument_node="">
</span></div><span data-dcnode-id="276" instrument_node="">
</span></div><span data-dcnode-id="274" instrument_node="">
</span></div><span data-dcnode-id="272" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="258" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="271" instrument_node="">
</span><h3 data-dcnode-id="269" itemprop="name"><span data-dcnode-id="270" instrument_node="">Can I change the country of resettlement? </span></h3><span data-dcnode-id="268" instrument_node="">
</span><div data-dcnode-id="260" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="267" instrument_node="">
</span><div data-dcnode-id="262" itemprop="text"><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">No. Refugee applicants do not have any preferences concerning the resettlement countries. It will be determined by UNHCR based on your profile meeting the resettlement criteria imposed by the resettlement countries.</span></p><span data-dcnode-id="263" instrument_node="">
</span></div><span data-dcnode-id="261" instrument_node="">
</span></div><span data-dcnode-id="259" instrument_node="">
</span></div><span data-dcnode-id="257" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="243" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="256" instrument_node="">
</span><h3 data-dcnode-id="254" itemprop="name"><span data-dcnode-id="255" instrument_node="">If I am resettled can my family members join me afterwards?</span></h3><span data-dcnode-id="253" instrument_node="">
</span><div data-dcnode-id="245" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="252" instrument_node="">
</span><div data-dcnode-id="247" itemprop="text"><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">UNHCR cannot&nbsp; guarantee&nbsp; the resettlement of your family members who are left behind. It depends upon the resettlement countries’ laws and decision whether they may join you afterwards.</span></p><span data-dcnode-id="248" instrument_node="">
</span></div><span data-dcnode-id="246" instrument_node="">
</span></div><span data-dcnode-id="244" instrument_node="">
</span></div><span data-dcnode-id="242" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="228" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="241" instrument_node="">
</span><h3 data-dcnode-id="239" itemprop="name"><span data-dcnode-id="240" instrument_node="">Will I be able to work in the resettlement country?</span></h3><span data-dcnode-id="238" instrument_node="">
</span><div data-dcnode-id="230" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="237" instrument_node="">
</span><div data-dcnode-id="232" itemprop="text"><span data-dcnode-id="236" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Yes. Resettlement is based on the expectation that you will have some permanent legal status in the RST country.</span></p><span data-dcnode-id="233" instrument_node="">
</span></div><span data-dcnode-id="231" instrument_node="">
</span></div><span data-dcnode-id="229" instrument_node="">
</span></div><span data-dcnode-id="227" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="213" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="226" instrument_node="">
</span><h3 data-dcnode-id="224" itemprop="name"><span data-dcnode-id="225" instrument_node="">Can I apply directly for resettlement through an Embassy?</span></h3><span data-dcnode-id="223" instrument_node="">
</span><div data-dcnode-id="215" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="222" instrument_node="">
</span><div data-dcnode-id="217" itemprop="text"><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">No. If it is resettlement then the Resettlement Countries directly contact with UNHCR and allocate quota for the refugees.</span></p><span data-dcnode-id="218" instrument_node="">
</span></div><span data-dcnode-id="216" instrument_node="">
</span></div><span data-dcnode-id="214" instrument_node="">
</span></div><span data-dcnode-id="212" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="198" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="211" instrument_node="">
</span><h3 data-dcnode-id="209" itemprop="name"><span data-dcnode-id="210" instrument_node="">Can I join my family members in a third country through family reunification procedures?</span></h3><span data-dcnode-id="208" instrument_node="">
</span><div data-dcnode-id="200" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="207" instrument_node="">
</span><div data-dcnode-id="202" itemprop="text"><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Yes, you can join your family members in a third country through the family reunification procedures however it is not guaranteed and will only happen once the family reunification is accepted by the resettlement country. Upon acceptance, you will be called upon for the process by UNHCR.</span></p><span data-dcnode-id="203" instrument_node="">
</span></div><span data-dcnode-id="201" instrument_node="">
</span></div><span data-dcnode-id="199" instrument_node="">
</span></div><span data-dcnode-id="197" instrument_node="">
</span><div class="onebox_faq" data-dcnode-id="183" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="196" instrument_node="">
</span><h3 data-dcnode-id="194" itemprop="name"><span data-dcnode-id="195" instrument_node="">Is the resettlement process and/or UNHCR’s services free of charge? </span></h3><span data-dcnode-id="193" instrument_node="">
</span><div data-dcnode-id="185" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="192" instrument_node="">
</span><div data-dcnode-id="187" itemprop="text"><span data-dcnode-id="191" instrument_node="">
</span><p data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Yes. UNHCR does not charge any money to refugee applicants for the process.</span></p><span data-dcnode-id="188" instrument_node="">
</span></div><span data-dcnode-id="186" instrument_node="">
</span></div><span data-dcnode-id="184" instrument_node="">
</span></div><span data-dcnode-id="182" instrument_node="">
