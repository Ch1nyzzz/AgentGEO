</span><div class="section the_content has_content" data-dcnode-id="580"><div class="section_wrapper" data-dcnode-id="581"><div class="the_content_wrapper" data-dcnode-id="582"><p data-dcnode-id="912"><em data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">(Original Post Date: Aug 30, 2021 | Last Updated: February 3, 2022)</span></em></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">&nbsp;</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="905"><strong data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">The following info-page is curated by the BC Refugee Hub with the most up-to-date information on Canada’s Afghan Refugee Resettlement Program.</span></strong></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">&nbsp;</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="900" instrument_node="">The Government of Canada has announced the resettlement of 20,000 vulnerable Afghan nationals to Canada.</span><span class="Apple-converted-space" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="895" instrument_node="">This will be done through:</span><span class="Apple-converted-space" data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="891" instrument_node="">
</span><ul data-dcnode-id="884"><span data-dcnode-id="890" instrument_node="">
</span><li data-dcnode-id="886"><span data-dcnode-id="889" instrument_node="">A special immigration program for Afghan nationals, and their families, who assisted the Government of Canada in Afghanistan; and,</span><span class="Apple-converted-space" data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="885" instrument_node="">
</span></ul><span data-dcnode-id="883" instrument_node="">
</span><ul data-dcnode-id="876"><span data-dcnode-id="882" instrument_node="">
</span><li data-dcnode-id="878"><span data-dcnode-id="881" instrument_node="">A special humanitarian program focused on resettling vulnerable Afghan refugees who are outside of Afghanistan and who do not have a durable solution in a third country.</span><span class="Apple-converted-space" data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="877" instrument_node="">
</span></ul><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="874" instrument_node="">Resettlement for the special humanitarian program for Afghan refugees outside of Afghanistan will be via the Private Sponsorship of Refugees (PSR) and the Government Assisted Refugees (GAR) programs.</span><span class="Apple-converted-space" data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">&nbsp;</span></p><span data-dcnode-id="867" instrument_node="">
</span><hr data-dcnode-id="866"><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="862"><strong data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Canada’s Resettlement Assistant Program</span></strong></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Government Assisted Refuges (GARs) arrive to Canada and are supported under the Resettlement Assistance Program (RAP).</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="848"><em data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Current</span></em><span data-dcnode-id="855" instrument_node=""> Afghan arrivals to British Columbia are being supported by ISS</span><em data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">of</span></em><span data-dcnode-id="852" instrument_node="">BC’s Resettlement Assistance Program (RAP) which is funded by the Government of Canada – </span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/immigration-refugees-citizenship.html" rel="noopener" target="_blank"><span data-dcnode-id="851" instrument_node="">Immigrant, Refugees and Citizenship Canada (IRCC)</span></a><span data-dcnode-id="849" instrument_node="">.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="846" instrument_node="">RAP has two main components: income support and assistance for a range of immediate essential services.&nbsp;Immediate and essential services are delivered by ISS</span><em data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">of</span></em><span data-dcnode-id="843" instrument_node="">BC in the Metro Vancouver region, generally within the first 4-6 weeks of a newcomer’s arrival in Canada. Activities include the following:</span></p><span data-dcnode-id="841" instrument_node="">
</span><ul data-dcnode-id="824"><span data-dcnode-id="840" instrument_node="">
</span><li data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">meeting newcomers at the airport or final destination in Canada</span></li><span data-dcnode-id="837" instrument_node="">
</span><li data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">providing temporary accommodation</span></li><span data-dcnode-id="834" instrument_node="">
</span><li data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">providing basic orientation to Canada, life skills training and financial orientation</span></li><span data-dcnode-id="831" instrument_node="">
</span><li data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">assisting in finding permanent accommodation</span></li><span data-dcnode-id="828" instrument_node="">
</span><li data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">referring to other settlement programs</span></li><span data-dcnode-id="825" instrument_node="">
</span></ul><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="822" instrument_node="">RAP Program Key Forms and Activities – This </span><a data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//refugeehub.issbc.org/wp-content/uploads/2016/03/RAP-Activities-and-Forms-final.pdf" rel="noopener" target="_blank"><span data-dcnode-id="821" instrument_node="">info-sheet</span></a><span data-dcnode-id="819" instrument_node=""> provides a list of key forms and activities undertaken within the first three weeks in the RAP program.</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="816" instrument_node="">ISSofBC RAP Info-sheet – This </span><a data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcrefugeehub.ca/wp-content/uploads/2021/10/ISSofBC-RAP-Program-Info-graphic-October-2021.pdf" rel="noopener" target="_blank"><span data-dcnode-id="815" instrument_node="">info-sheet</span></a><span data-dcnode-id="813" instrument_node=""> shows the timeline and key activities undertaken by ISSofBC’s Resettlement Assistance Program (RAP) that supports newcomer Government Assisted Refugees (GARs) within the first two weeks of arrival.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">&nbsp;</span></p><span data-dcnode-id="808" instrument_node="">
</span><hr data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="803"><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Latest Arrival Figures</span></strong></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="801" instrument_node="">Arrivals to British Columbia are provided by ISSofBC – </span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issbc.org/our-resource/key-figures" rel="noopener" target="_blank"><span data-dcnode-id="800" instrument_node="">here</span></a></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="796" instrument_node="">Arrivals to cities across Canada are provided by Immigration, Refugees and Citizenship Canada (IRCC) – </span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/immigration-refugees-citizenship/services/refugees/afghanistan/key-figures.html" rel="noopener" target="_blank"><span data-dcnode-id="795" instrument_node="">here</span></a></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">&nbsp;</span></p><span data-dcnode-id="789" instrument_node="">
</span><hr data-dcnode-id="788"><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="784"><strong data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">BC-Specific Community Resources for Afghan Newcomers:</span></strong></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="782" instrument_node="">ISSofBC’s BC Refugee Hub, in partnership with </span><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//linktr.ee/bc4afghans" rel="noopener" target="_blank"><span data-dcnode-id="781" instrument_node="">BC4Afghans</span></a><span data-dcnode-id="779" instrument_node="">, have compiled a list of BC-specific community resources for Afghan newcomers. The resources listed in this document include:</span></p><span data-dcnode-id="777" instrument_node="">
</span><ul data-dcnode-id="763"><span data-dcnode-id="776" instrument_node="">
</span><li data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Afghan affiliated community organizations</span></li><span data-dcnode-id="773" instrument_node="">
</span><li data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Religious institutions</span></li><span data-dcnode-id="770" instrument_node="">
</span><li data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Grocery stores</span></li><span data-dcnode-id="767" instrument_node="">
</span><li data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Medical services</span></li><span data-dcnode-id="764" instrument_node="">
</span></ul><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Many of the resources listed show languages available, along with contact information to make it easily accessible to newcomer Afghans resettling in the Metro Vancouver region.</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="756"><a data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcrefugeehub.ca/wp-content/uploads/2021/09/BC_Resources_For_Afghans_Sept2021.pdf" rel="noopener" target="_blank"><span data-dcnode-id="758" instrument_node="">Download here&gt;&gt;</span></a></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">&nbsp;</span></p><span data-dcnode-id="752" instrument_node="">
