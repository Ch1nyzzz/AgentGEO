</span><p data-dcnode-id="1851"><span data-dcnode-id="1858" style="color: #009bdb;"><strong data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">The invasion of Ukraine has resulted in a humanitarian crisis in a region already overwhelmed by internally displaced people, refugees, and asylum seekers.</span></strong></span><span data-dcnode-id="1857" instrument_node=""> We anticipate the increased number of Eastern Europeans coming through our shelter will continue, as seeking asylum at the southern border is the only option available to many in the short-term. </span><strong data-dcnode-id="1853"><span data-dcnode-id="1856" instrument_node="">In the coming days as the plight of Ukrainians and other Eastern Europeans continues to unfold – among many other conflicts and humanitarian crises across the world – Jewish Family Service of San Diego stands at the ready to </span><em data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">Welcome the Stranger</span></em></strong><span data-dcnode-id="1852" instrument_node="">.</span></p><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1846"><a data-dcnode-id="1847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jfssd.org/help-asylum-seekers-from-around-the-world/"><strong data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Learn more &gt;&gt;</span></strong></a></p><span data-dcnode-id="1845" instrument_node="">
</span></div><span data-dcnode-id="1843" instrument_node="">
</span></div><span data-dcnode-id="1841" instrument_node="">
</span><div class="wpb_text_column wpb_content_element info-box" data-dcnode-id="1824"><span data-dcnode-id="1840" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1826"><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1833"><strong data-dcnode-id="1834"><span data-dcnode-id="1837" style="color: #009bdb;"><span data-dcnode-id="1838" instrument_node="">Join Us In Building a Welcoming Community for Afghan Families.</span></span><br data-dcnode-id="1836"><span data-dcnode-id="1835" instrument_node="">
When the humanitarian situation in Afghanistan unfolded late in 2021, JFS immediately mobilized to welcome Afghan families seeking to rebuild their lives in safety in our community. Our commitment to welcome 500 refugees is only made possible by the support of the community and our partners.</span></strong></p><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1828"><a data-dcnode-id="1829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jfssd.org/afghan-evacuation/"><strong data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">Learn more &gt;&gt;</span></strong></a></p><span data-dcnode-id="1827" instrument_node="">
</span></div><span data-dcnode-id="1825" instrument_node="">
</span></div><span data-dcnode-id="1823" instrument_node="">
</span><div class="wpb_text_column wpb_content_element orange-title" data-dcnode-id="1813"><span data-dcnode-id="1822" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1815"><span data-dcnode-id="1821" instrument_node="">
</span><h2 data-dcnode-id="1817"><span data-dcnode-id="1820" instrument_node="">Today, more than 84 million people are forcibly displaced worldwide.</span><br data-dcnode-id="1819"><span data-dcnode-id="1818" instrument_node="">
Less than 1% have returned or been resettled.</span></h2><span data-dcnode-id="1816" instrument_node="">
</span></div><span data-dcnode-id="1814" instrument_node="">
</span></div><span data-dcnode-id="1812" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1801"><span data-dcnode-id="1811" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1803"><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Since 1918, JFS has maintained its commitment to welcoming refugees from around the world. From the moment a refugee arrives in San Diego, our dedicated staff and volunteers work with them side by side to build stability and adjust to a new culture and way of life.</span></p><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">On any given day, we help families enroll their children in school; gain proficiency in English; learn to navigate banking systems, public transportation, and community resources; further their education; find permanent employment; and become contributing members of the community. Together, we empower refugees to rebuild their lives and create a brighter future for their families.</span></p><span data-dcnode-id="1804" instrument_node="">
</span></div><span data-dcnode-id="1802" instrument_node="">
</span></div><span data-dcnode-id="1800" instrument_node="">

</span><p data-dcnode-id="1765" style="text-align: center;"><span data-dcnode-id="1769" instrument_node="">You can help ensure San Diego remains a welcoming place for those in search of a safer life—free from violence and persecution with a gift to JFS’s </span><em data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Welcome the Stranger</span></em><span data-dcnode-id="1766" instrument_node=""> Fund.</span></p><span data-dcnode-id="1764" instrument_node="">

</span><p data-dcnode-id="1743"><em data-dcnode-id="1744"><strong data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">“The story of today’s refugees is really the story of all of us—and for those who have lost everything, one act of kindness can make all the difference.”</span></strong></em></p><span data-dcnode-id="1742" instrument_node="">

</span><h2 data-dcnode-id="1715" style="text-align: center;"><strong data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Who We Help</span></strong></h2><span data-dcnode-id="1714" instrument_node="">
</span></div><span data-dcnode-id="1712" instrument_node="">
</span></div><span data-dcnode-id="1710" instrument_node="">
</span><div class="vc_row wpb_row vc_inner vc_row-fluid" data-dcnode-id="1656"><div class="wpb_column vc_column_container vc_col-sm-8" data-dcnode-id="1670"><div class="vc_column-inner" data-dcnode-id="1671"><div class="wpb_wrapper" data-dcnode-id="1672"><span data-dcnode-id="1709" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1674"><span data-dcnode-id="1708" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1676"><span data-dcnode-id="1707" instrument_node="">
</span><h5 class="blue" data-dcnode-id="1703"><span class="blue-title" data-dcnode-id="1704"><strong data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Refugees</span></strong></span></h5><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">A refugee is someone who has been forced to flee his or her country because of persecution, war or violence. Most likely, they cannot return home or are afraid to do so. Today, there are more than 25.4 million refugees worldwide. More than half are children under the age of 18.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1696" instrument_node="">
</span><h5 class="blue" data-dcnode-id="1692"><span class="blue-title" data-dcnode-id="1693"><strong data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Asylees</span></strong></span></h5><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">A person in the United States or at a port of entry who is found to be unable or unwilling to return to his or her country of nationality, or to seek the protection of that country because of persecution or a well-founded fear of persecution.</span></p><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1685" instrument_node="">
</span><h5 class="blue" data-dcnode-id="1681"><span class="blue-title" data-dcnode-id="1682"><strong data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">SIV Holders</span></strong></span></h5><span data-dcnode-id="1680" instrument_node="">
</span><p data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Because of their cooperation with the United States military, individuals who served as translators/interpreters for U.S. troops in Iraq and Afghanistan often become targets of violence and persecution in countries, making it unsafe for them to remain. The US government created the Special Immigrant Visa (SIV) program to allow them to resettle in the United State as permanent legal residents while receiving the same services as refugees.</span></p><span data-dcnode-id="1677" instrument_node="">
</span></div><span data-dcnode-id="1675" instrument_node="">
</span></div><span data-dcnode-id="1673" instrument_node="">
</span></div></div></div><div class="wpb_column vc_column_container vc_col-sm-4" data-dcnode-id="1657"><div class="vc_column-inner" data-dcnode-id="1658"><div class="wpb_wrapper" data-dcnode-id="1659"><span data-dcnode-id="1669" instrument_node="">
</span><div class="wpb_single_image wpb_content_element vc_align_center vc_custom_1544038634909" data-dcnode-id="1661"><span data-dcnode-id="1668" instrument_node="">
</span><figure class="wpb_wrapper vc_figure" data-dcnode-id="1663"><span data-dcnode-id="1667" instrument_node="">
</span><div class="vc_single_image-wrapper vc_box_border_grey" data-dcnode-id="1665"><img alt="" class="vc_single_image-img attachment-full" data-dcnode-id="1666" height="600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jfssd.org/wp-content/uploads/2018/12/refugee-child.jpg&amp;raw" width="536"></div><span data-dcnode-id="1664" instrument_node="">
</span></figure><span data-dcnode-id="1662" instrument_node="">
</span></div><span data-dcnode-id="1660" instrument_node="">
</span></div></div></div></div></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="1479"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="1480"><div class="vc_column-inner" data-dcnode-id="1481"><div class="wpb_wrapper" data-dcnode-id="1482"><span data-dcnode-id="1651" instrument_node="">
</span><div class="wpb_text_column wpb_content_element vc_custom_1544038160791" data-dcnode-id="1642"><span data-dcnode-id="1650" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1644"><span data-dcnode-id="1649" instrument_node="">
</span><h2 data-dcnode-id="1646" style="text-align: center;"><strong data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">How We Help</span></strong></h2><span data-dcnode-id="1645" instrument_node="">
</span></div><span data-dcnode-id="1643" instrument_node="">
</span></div><span data-dcnode-id="1641" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1633"><span data-dcnode-id="1640" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1635"><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">The federal government’s objective is for all refugees to be self-sufficient within 90 days. Before a refugee even arrives to San Diego, JFS resettlement staff are making the necessary preparations to welcome them to our community. During their initial 90-day Reception &amp; Placement (R&amp;P) period, we provide the core services required by the federal government and continue to assist as them on their journey towards self-sufficiency.</span></p><span data-dcnode-id="1636" instrument_node="">
</span></div><span data-dcnode-id="1634" instrument_node="">
</span></div><span data-dcnode-id="1632" instrument_node="">
</span><div class="vc_row wpb_row vc_inner vc_row-fluid" data-dcnode-id="1483"><div class="wpb_column vc_column_container vc_col-sm-6" data-dcnode-id="1548"><div class="vc_column-inner" data-dcnode-id="1549"><div class="wpb_wrapper" data-dcnode-id="1550"><span data-dcnode-id="1631" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1552"><span data-dcnode-id="1630" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1554"><span data-dcnode-id="1629" instrument_node="">
</span><h5 class="blue" data-dcnode-id="1625"><span class="blue-title" data-dcnode-id="1626"><strong data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Pre-Arrival Preparation, Reception &amp; Placement</span></strong></span></h5><span data-dcnode-id="1624" instrument_node="">
</span><ul data-dcnode-id="1613"><span data-dcnode-id="1623" instrument_node="">
</span><li data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Coordination with family members in our community.</span></li><span data-dcnode-id="1620" instrument_node="">
</span><li data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Airport pick up on day of arrival.</span></li><span data-dcnode-id="1617" instrument_node="">
</span><li data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Placement in a secure, fully furnished apartment, including safety orientation and explanation of amenities.</span></li><span data-dcnode-id="1614" instrument_node="">
</span></ul><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1609" instrument_node="">
</span><h5 class="blue" data-dcnode-id="1605"><span class="blue-title" data-dcnode-id="1606"><strong data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Immigration and Naturalization</span></strong></span></h5><span data-dcnode-id="1604" instrument_node="">
</span><ul data-dcnode-id="1596"><span data-dcnode-id="1603" instrument_node="">
</span><li data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Applications and petitions for green cards, replacement of immigration documents, work and travel authorizations, and petitioning for family members.</span></li><span data-dcnode-id="1600" instrument_node="">
</span><li data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Classes for Citizenship interview, English and Civics tests.</span></li><span data-dcnode-id="1597" instrument_node="">
</span></ul><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1592" instrument_node="">
</span><h5 class="blue" data-dcnode-id="1588"><span class="blue-title" data-dcnode-id="1589"><strong data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Case Management</span></strong></span></h5><span data-dcnode-id="1587" instrument_node="">
</span><ul data-dcnode-id="1570"><span data-dcnode-id="1586" instrument_node="">
</span><li data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Coordinate intake and enrollment in all eligible services, including R&amp;P and employment programs.</span></li><span data-dcnode-id="1583" instrument_node="">
</span><li data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Schedule Initial Health Screening.</span></li><span data-dcnode-id="1580" instrument_node="">
</span><li data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Assist with applications for public benefits.</span></li><span data-dcnode-id="1577" instrument_node="">
</span><li data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Enroll children in school.</span></li><span data-dcnode-id="1574" instrument_node="">
</span><li data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Provide clothing, food, and other necessities based on need.</span></li><span data-dcnode-id="1571" instrument_node="">
</span></ul><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1566" instrument_node="">
</span><h5 class="blue" data-dcnode-id="1562"><span class="blue-title" data-dcnode-id="1563"><strong data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Cultural Orientation Classes</span></strong></span></h5><span data-dcnode-id="1561" instrument_node="">
</span><ul data-dcnode-id="1556"><span data-dcnode-id="1560" instrument_node="">
</span><li data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Acculturation classes to assist with community orientation and introduction to the resettlement process, community and public services, basic laws and customs, financial literacy, housing, medical literacy, American culture and holidays, the U.S. education system, and job readiness.</span></li><span data-dcnode-id="1557" instrument_node="">
</span></ul><span data-dcnode-id="1555" instrument_node="">
</span></div><span data-dcnode-id="1553" instrument_node="">
</span></div><span data-dcnode-id="1551" instrument_node="">
</span></div></div></div><div class="wpb_column vc_column_container vc_col-sm-6" data-dcnode-id="1484"><div class="vc_column-inner" data-dcnode-id="1485"><div class="wpb_wrapper" data-dcnode-id="1486"><span data-dcnode-id="1547" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1488"><span data-dcnode-id="1546" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1490"><span data-dcnode-id="1545" instrument_node="">
</span><h5 class="blue" data-dcnode-id="1541"><span class="blue-title" data-dcnode-id="1542"><strong data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Acculturation Services</span></strong></span></h5><span data-dcnode-id="1540" instrument_node="">
</span><ul data-dcnode-id="1529"><span data-dcnode-id="1539" instrument_node="">
</span><li data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Enrollment in ESL classes.</span></li><span data-dcnode-id="1536" instrument_node="">
</span><li data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Short-term counseling to assist with adjustment and other cultural issues such as banking, medical care, public transportation and schools.</span></li><span data-dcnode-id="1533" instrument_node="">
</span><li data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Connection to Friendly Match volunteers providing friendship and support.</span></li><span data-dcnode-id="1530" instrument_node="">

</span><h2 data-dcnode-id="1474" style="text-align: center;"><span data-dcnode-id="1475" instrument_node="">The Refugee Journey to San Diego</span></h2><span data-dcnode-id="1473" instrument_node="">
</span></div><span data-dcnode-id="1471" instrument_node="">
</span></div><span data-dcnode-id="1469" instrument_node="">
</span><div class="vc_row wpb_row vc_inner vc_row-fluid" data-dcnode-id="1441"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="1442"><div class="vc_column-inner" data-dcnode-id="1443"><div class="wpb_wrapper" data-dcnode-id="1444"><span data-dcnode-id="1468" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1446"><span data-dcnode-id="1467" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1448"><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Refugee Resettlement is a complex, multi-lateral system. The U.S. Admissions Program determines how refugee resettlement operates in the United States. Some of the Parties involved in the refugee journey are: The United Nations High Commissioner for Refugees (UNHCR), the International Organization for Migration (IOM), the U.S. Department of State, the U.S. Citizenship and Immigration Services (USCIS), 9 National Affiliate Resettlement Agencies, and local resettlement agencies such as JFS.</span></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Once a case has been referred to the United States by the UNHCR, the U.S. Government screens the refugee and determines whether it would like to admit them for resettlement. Depending on the location where the refugee will be resettling, the case is referred to one of 9 National Affiliate Agencies, who then refer the case to local resettlement agencies such as JFS.</span></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1456"><a data-dcnode-id="1458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hias.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1459" instrument_node="">HIAS</span></a><span data-dcnode-id="1457" instrument_node="">, originally the Hebrew Immigrant Aid Society, is a nonprofit organization providing humanitarian assistance to refugees and asylum seekers. Established in 1881, HIAS originally aided Jewish refugees fleeing Russia and Eastern Europe. Today, the organization resettles refugees and asylum seekers from countries all over the globe.</span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1454" instrument_node="">As our National Affiliate, HIAS works in partnership with JFS to ensure the safety and successful resettlement of refugees referred to San Diego County. We are proud to share a history and ongoing commitment to the Jewish value of </span><em data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Welcoming the Stranger</span></em><span data-dcnode-id="1451" instrument_node="">.</span></p><span data-dcnode-id="1449" instrument_node="">
</span></div><span data-dcnode-id="1447" instrument_node="">
</span></div><span data-dcnode-id="1445" instrument_node="">
</span></div></div></div></div></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="1411"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="1412"><div class="vc_column-inner" data-dcnode-id="1413"><div class="wpb_wrapper" data-dcnode-id="1414"><span data-dcnode-id="1436" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1428"><span data-dcnode-id="1435" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1430"><span data-dcnode-id="1434" instrument_node="">
</span><h2 data-dcnode-id="1432" style="text-align: center;"><span data-dcnode-id="1433" instrument_node="">Lautenberg Program</span></h2><span data-dcnode-id="1431" instrument_node="">
</span></div><span data-dcnode-id="1429" instrument_node="">
</span></div><span data-dcnode-id="1427" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1416"><span data-dcnode-id="1426" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1418"><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">The Lautenberg Amendment was first enacted in 1990 as part of the U.S. foreign operations budget to facilitate the resettlement of Jews from the former Soviet Union and allowed HIAS to bring tens of thousands to safety. As the world refugee situation changed, the Lautenberg Amendment was expanded to include persecuted religious minorities in other countries, such as Jews, Christians, and Baha’is from Iran. Despite being a crucial part of U.S. refugee policy, it expires each year and must be reauthorized. (Source: HIAS)</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">JFS is one of the few resettlement agencies in the county that can process Lautenberg applications. We also process Lautenberg applications for individuals from surrounding areas who are trying to bring their loved ones to safety.</span></p><span data-dcnode-id="1419" instrument_node="">
</span></div><span data-dcnode-id="1417" instrument_node="">

</span><p data-dcnode-id="1364"><span data-dcnode-id="1370" instrument_node="">Resettling a refugee can be a years’ long commitment. It requires the coordinated action of international and local agencies – and the compassion of everyday people, who give their time and support to helping families overcome difficult pasts and move toward a more stable future. From helping newly arrived families learn to use public transportation, to </span><a data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jfssd.org/momentum"><span data-dcnode-id="1369" instrument_node="">giving a few dollars each month</span></a><span data-dcnode-id="1367" instrument_node="">, there’s a part for all of us in Moving Forward </span><em data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Together.</span></em></p><span data-dcnode-id="1363" instrument_node="">
