</span></div><span data-dcnode-id="1014" instrument_node="">

</span><div class="sppb-addon sppb-addon-text-block 0" data-dcnode-id="967"><span data-dcnode-id="1010" instrument_node="">
</span><h3 class="sppb-addon-title" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">About UNHCR Canada:</span></h3><span data-dcnode-id="1007" instrument_node="">
</span><div class="sppb-addon-content" data-dcnode-id="969"><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1005"></p><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">UNHCR CANADA IS NOT A CANADIAN REGISTERED CHARITY. Each year, this is one of the charities most requested by donors. Yet, since it isn't a registered charity, UNHCR Canada does not file an annual return, or provide financial statements. As such, there is no information for us to report.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="999"><a data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.charityintelligence.ca/research-and-news/ci-views/31-disaster-response/707-ukraine-how-to-help"><span data-dcnode-id="1001" instrument_node="">Ci's Special Report on Ukraine: How to help</span></a></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">As a UN agency, UNHCR is a qualified donee. This means UNHCR Canada can issue tax donation receipts.&nbsp;UNHCR Canada has no financial transparency or reports showing how Canadian donations were spent or the work and people these donations supported.&nbsp;</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">What we find unusual is that UNHCR has registered as a charity in the UK and Australia, and provides these donors with full reports and meets all the charity requirements in the UK and Australia. Despite fundraising in Canada since 1976, and Canadians having the same high expectations of charities that giving should be more than just getting a tax receipt, UNHCR has not chosen to register as a charity in Canada.&nbsp;</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">UNICEF Canada, another UN charity, chose to be a registered charity in 1955. UNICEF Canada is financially transparent and reports how much money it raises, the work it does and the people it helps (see Charity Intelligence's report on </span><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.charityintelligence.ca/charity-details/16-unicef-canada"><span data-dcnode-id="990" instrument_node="">UNICEF Canada</span></a><span data-dcnode-id="988" instrument_node="">).</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">We have spoken with UNHCR management over the years. UNHCR Canada has asked to be posted on Ci's website. We sincerely wish we had information to post.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">UNHCR Canada is the Canadian branch of the UN High Commission for Refugees. The UNHCR was founded in December 1950, succeeding earlier agencies like the UN Relief and Rehabilitation Administration, and prior to that the International Refugee Organization that fell out of favour in 1947.&nbsp;&nbsp;</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">UNHCR Canada fundraises from Canadians to raise donations to protect refugees, people who have been forcibly displaced or who are stateless, to assist in their voluntary repatriation, local integration or resettlement in a third county. UNHCR’s mandate does not cover Palestine. UNHCR’s mandate has grown to include humanitarian aid.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">UNHCR is headquartered in Geneva, Switzerland, the headquarters of the UN. It is governed by the UN General Assembly and the UN Economic and Social Council. UN General Assembly elects High Commissioners every five years. The current High Commissioner is Italian diplomat, Filippo Grandi who was elected in 2016. UN General Assembly extended Grandi's term to 2023.&nbsp;</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">As of December 2020, UNHCR operates in 138 countries, has 18,015 full-time staff, and its F2021 budget is US$9.2 billion.</span></p><p data-dcnode-id="971"></p><span data-dcnode-id="970" instrument_node="">

</span><div class="sppb-addon-content" data-dcnode-id="913"><p data-dcnode-id="920"></p><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">In Canada, UNHCR's website posts that its protection work in Canada includes: strengthening Canada’s asylum system by ensuring it protects asylum-seekers and guarantees their fair access to the refugee state determination process, ending the detention of asylum-seekers, strengthening the government’s data collection on asylum-seekers and refugees, and advocating on key protection issues. UNHCR Canada makes public information and educational materials to help keep Canadians informed and build support for refugees in Canada and abroad.&nbsp;</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Charity Intelligence cannot assess the impact of UNHCR given the lack&nbsp;of transparency and accountability.</span></p><p data-dcnode-id="914"></p></div><span data-dcnode-id="912" instrument_node="">

</span><a class="anchor" data-dcnode-id="528" id="top"><span data-dcnode-id="532" instrument_node=""> </span><h1 class="navAnchor" data-dcnode-id="530" style="padding-top: 130px; margin-top: -130px;"><span data-dcnode-id="531" instrument_node="">My anchor</span></h1><span data-dcnode-id="529" instrument_node=""> </span></a><span data-dcnode-id="527" instrument_node="">

</span><h2 class="sppb-addon-title" data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Comments &amp; Contact</span></h2><span data-dcnode-id="515" instrument_node="">
</span></div><span data-dcnode-id="513" instrument_node="">
</span></div><span data-dcnode-id="511" instrument_node="">
</span><div class="clearfix" data-dcnode-id="429" id="sppb-addon-1549917617861"><span data-dcnode-id="510" instrument_node="">
</span><div class="sppb-addon sppb-addon-text-block 0" data-dcnode-id="431"><span data-dcnode-id="509" instrument_node="">
</span><h3 class="sppb-addon-title" data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Comments added by the Charity:</span></h3><span data-dcnode-id="506" instrument_node="">
</span><div class="sppb-addon-content" data-dcnode-id="433"><span data-dcnode-id="505" instrument_node="">
</span><div data-dcnode-id="435" id="comments"><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="501"><em data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Comments provided by UNHCR Canada October 6, 2021</span></em></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">The Office of the United Nations High Commissioner for Refugees (UNHCR) is a global organization dedicated to saving lives, protecting rights and building a better future for refugees, forcibly displaced communities and stateless people. UNHCR, also known as the UN Refugee Agency, operates in more than 130 countries and has had offices in Canada since 1976.</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">The Private Sector Partnerships (PSP) office for UNHCR Canada is based in Toronto. UNHCR Canada’s PSP office actively raises funds in Canada and engages the public to learn more about the plight of refugees and forcibly displaced people through mailings, advertising and digital engagement. UNHCR Canada’s PSP office is responsible for raising funds from individuals, foundations and corporate entities within Canada and remitting them to UNHCR’s programs around the world.</span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Donations to UNHCR Canada currently do not fund programs within Canada. The money is remitted globally and applied either to the highest priority needs of the organization or to the area to which the donor has specified.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">In 2020, of every dollar donated to UNHCR—including contributions from governments and private individuals— 84 cents went to implement programs. This is a high efficiency rate and is gained in part from our global scale.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="487" instrument_node="">Under Canadian law, as a body of the United Nations, UNHCR Canada is a </span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/revenue-agency/services/charities-giving/charities/policies-guidance/qualified-donees.html"><span data-dcnode-id="486" instrument_node="">Qualified</span></a><span data-dcnode-id="484" instrument_node=""> Donee as defined by the Canada Revenue Agency (CRA). This allows us to issue tax receipts for donations. Many other countries such as the US and the UK do not make this distinction for UN agencies, hence the need to register charitable entities which are called “National Partners” in those countries.</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="481" instrument_node="">You can learn more about how UNHCR Canada fundraises </span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/about-us/about-unhcr/about-unhcr-canada/how-we-fundraise/"><span data-dcnode-id="480" instrument_node="">here</span></a><span data-dcnode-id="478" instrument_node=""> and you can learn more about where donor money goes </span><a data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/our-work/where-your-money-goes"><span data-dcnode-id="477" instrument_node="">here.</span></a></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">The UNHCR Canada PSP office gains many benefits from an efficiency standpoint in not registering as a charity: overhead such as salaries, IT and HR are paid from global accounts allowing us to leverage economies of scale.</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="470" instrument_node="">UNHCR seeks to ensure the greatest level of transparency in reporting how funds have been allocated and the impact that monetary contributions have had on the ability to carry out our vital, lifesaving work in support of millions of refugees and forcibly displaced people worldwide. On </span><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reporting.unhcr.org/donor-profiles"><span data-dcnode-id="469" instrument_node="">UNHCR’s Global Focus</span></a><span data-dcnode-id="467" instrument_node=""> website, we offer a comprehensive breakdown by donor country of funds contributed and how the contributions were earmarked and allocated.</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">UNHCR is funded almost entirely by voluntary contributions. Most of UNHCR’s programs are funded by governments, but partnerships with corporations, foundations and private individuals also constitute important sources of funding.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="461" instrument_node="">In 2020, 85 per cent of UNHCR’s funding worldwide came from governments and the European Union, while 11 per cent came from private sector donors. In 2020, UNHCR Canada raised $15.3 million from private donors. An analysis and overview of UNHCR’s programmatic funding in 2020 can be found </span><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reporting.unhcr.org/sites/default/files/gr2020/pdf/Chapter_Financial.pdf"><span data-dcnode-id="460" instrument_node="">here.</span></a></p><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Money raised from Canadian private donors is listed as “private donors” in Canada. Government funding an also be viewed on this website.</span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="453" instrument_node="">UNHCR also publishes an </span><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/en-my/6062e54a4.pdf"><span data-dcnode-id="452" instrument_node="">annual donor impact report</span></a><span data-dcnode-id="450" instrument_node=""> and a more </span><a data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/flagship-reports/globalreport/"><span data-dcnode-id="449" instrument_node="">comprehensive overview and report on all of our organization’s work</span></a><span data-dcnode-id="447" instrument_node="">.</span></p><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">We are in active consideration as to whether to register as a charitable entity in Canada. This would confer numerous benefits, including the ability to share audited financial statements with our donors just for our Canadian operation. There are also downsides to pursuing this option, including the potential to have increased costs of fundraising—all these considerations are being actively weighed and discussed.</span></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="441" instrument_node="">Regardless of the direction we ultimately maintain or pursue, donors to UNHCR in Canada can see global reporting on our program implementation and impact. To learn more about UNHCR and the latest about our work worldwide, please visit </span><a data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.ca/"><span data-dcnode-id="440" instrument_node="">https://www.unhcr.ca</span></a><span data-dcnode-id="438" instrument_node="">.</span></p><span data-dcnode-id="436" instrument_node=""> </span></div><span data-dcnode-id="434" instrument_node="">
</span></div><span data-dcnode-id="432" instrument_node="">
</span></div><span data-dcnode-id="430" instrument_node="">
