=""> </span></span><span data-dcnode-id="587" instrument_node="">(h) Establishing contact in such manner as he may think best with private organizations dealing with refugee questions ; </span></p><span data-dcnode-id="585" instrument_node=""> </span><p data-dcnode-id="581"><span data-dcnode-id="583" id="N66053"><span data-dcnode-id="584" instrument_node=""> </span></span><span data-dcnode-id="582" instrument_node="">(i) Facilitating the co-ordination of the efforts of private organizations concerned with the welfare of refugees. </span></p><span data-dcnode-id="580" instrument_node=""> </span></div><span data-dcnode-id="578" instrument_node=""> </span><a class="link_return" data-dcnode-id="576" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0137_0000_2_return" title="Go back to text"><span data-dcnode-id="577" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="545"><span data-dcnode-id="573" id="Noterqdi_0828-9999_2001_num_14_1_T2_0138_0000_1"><span data-dcnode-id="574" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">3. </span></span><div class="noteBody" data-dcnode-id="549"><span data-dcnode-id="570" instrument_node=""> </span><p data-dcnode-id="566"><span data-dcnode-id="568" id="N66080"><span data-dcnode-id="569" instrument_node=""> </span></span><span data-dcnode-id="567" instrument_node="">9 See in particular UNHCR background papers on the first theme of the "third track" of the Global Consultations on International Protection on the protection of refugees in situations of mass influx. </span></p><span data-dcnode-id="565" instrument_node=""> </span><p data-dcnode-id="561"><span data-dcnode-id="563" id="N66083"><span data-dcnode-id="564" instrument_node=""> </span></span><span data-dcnode-id="562" instrument_node="">10 The latest (1993) World Conference on Human Rights has acknowledged this link in paragraph 23 of the Vienna Declaration and Programme of Action. </span></p><span data-dcnode-id="560" instrument_node=""> </span><p data-dcnode-id="556"><span data-dcnode-id="558" id="N66086"><span data-dcnode-id="559" instrument_node=""> </span></span><span data-dcnode-id="557" instrument_node="">" See UN doc. A/AC. 96/830. </span></p><span data-dcnode-id="555" instrument_node=""> </span><p data-dcnode-id="551"><span data-dcnode-id="553" id="N66089"><span data-dcnode-id="554" instrument_node=""> </span></span><span data-dcnode-id="552" instrument_node="">12 See UN doc. A/AC. 96/930. </span></p><span data-dcnode-id="550" instrument_node=""> </span></div><span data-dcnode-id="548" instrument_node=""> </span><a class="link_return" data-dcnode-id="546" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0138_0000_1_return" title="Go back to text"><span data-dcnode-id="547" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="520"><span data-dcnode-id="543" id="Noterqdi_0828-9999_2001_num_14_1_T2_0139_0000_4"><span data-dcnode-id="544" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">4. </span></span><div class="noteBody" data-dcnode-id="524"><span data-dcnode-id="540" instrument_node=""> </span><p data-dcnode-id="536"><span data-dcnode-id="538" id="N66135"><span data-dcnode-id="539" instrument_node=""> </span></span><span data-dcnode-id="537" instrument_node="">13 See in particular N. Blokker and S. Muller, eds., Towards More Effective Supervision by International Organizations : Essays in Honour of Henry G. Schermers , vol. 1(Dordrecht, Martinus Nijhoff, 1994), Some Concluding Observations, pp. 275-80. </span></p><span data-dcnode-id="535" instrument_node=""> </span><p data-dcnode-id="531"><span data-dcnode-id="533" id="N66138"><span data-dcnode-id="534" instrument_node=""> </span></span><span data-dcnode-id="532" instrument_node="">14 See Blokker/Muller, supra note 13, p. 275. </span></p><span data-dcnode-id="530" instrument_node=""> </span><p data-dcnode-id="526"><span data-dcnode-id="528" id="N66141"><span data-dcnode-id="529" instrument_node=""> </span></span><span data-dcnode-id="527" instrument_node="">15 See E. Lauterpacht, ed., International Law : Being the Collected Papers of Hersch Laupterpacht Collected Papers (Cambridge[Eng.], Cambridge University Press, 1970), vol. II, p. 47. </span></p><span data-dcnode-id="525" instrument_node=""> </span></div><span data-dcnode-id="523" instrument_node=""> </span><a class="link_return" data-dcnode-id="521" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0139_0000_4_return" title="Go back to text"><span data-dcnode-id="522" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="485"><span data-dcnode-id="518" id="Noterqdi_0828-9999_2001_num_14_1_T2_0140_0000_1"><span data-dcnode-id="519" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">5. </span></span><div class="noteBody" data-dcnode-id="489"><span data-dcnode-id="515" instrument_node=""> </span><p data-dcnode-id="511"><span data-dcnode-id="513" id="N66168"><span data-dcnode-id="514" instrument_node=""> </span></span><span data-dcnode-id="512" instrument_node="">16 See also the Preamble of the 1951 Convention : </span></p><span data-dcnode-id="510" instrument_node=""> </span><p data-dcnode-id="506"><span data-dcnode-id="508" id="N66171"><span data-dcnode-id="509" instrument_node=""> </span></span><span data-dcnode-id="507" instrument_node="">Nothing that the United Nations High Commissioner for Refugees is charged with the task of supervising international conventions providing for the protection of refugees, and recognizing that the effective co-ordination of measures taken to deal with this problem will depend upon the co-operation of States with the High Commissioner... </span></p><span data-dcnode-id="505" instrument_node=""> </span><p data-dcnode-id="501"><span data-dcnode-id="503" id="N66174"><span data-dcnode-id="504" instrument_node=""> </span></span><span data-dcnode-id="502" instrument_node="">17 See Article 22 of the UN Charter. </span></p><span data-dcnode-id="500" instrument_node=""> </span><p data-dcnode-id="496"><span data-dcnode-id="498" id="N66177"><span data-dcnode-id="499" instrument_node=""> </span></span><span data-dcnode-id="497" instrument_node="">18 Convention Determining the State Responsible for Examining Applications for Asylum Lodged in One of the Member States of the European Community. </span></p><span data-dcnode-id="495" instrument_node=""> </span><p data-dcnode-id="491"><span data-dcnode-id="493" id="N66180"><span data-dcnode-id="494" instrument_node=""> </span></span><span data-dcnode-id="492" instrument_node="">19 See UN doc. A/AC. 96/930, para. 42. </span></p><span data-dcnode-id="490" instrument_node=""> </span></div><span data-dcnode-id="488" instrument_node=""> </span><a class="link_return" data-dcnode-id="486" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0140_0000_1_return" title="Go back to text"><span data-dcnode-id="487" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="465"><span data-dcnode-id="483" id="Noterqdi_0828-9999_2001_num_14_1_T2_0141_0000_3"><span data-dcnode-id="484" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">6. </span></span><div class="noteBody" data-dcnode-id="469"><span data-dcnode-id="480" instrument_node=""> </span><p data-dcnode-id="476"><span data-dcnode-id="478" id="N66230"><span data-dcnode-id="479" instrument_node=""> </span></span><span data-dcnode-id="477" instrument_node="">20 This practice is described in more detail later under the subheading "State practice". </span></p><span data-dcnode-id="475" instrument_node=""> </span><p data-dcnode-id="471"><span data-dcnode-id="473" id="N66233"><span data-dcnode-id="474" instrument_node=""> </span></span><span data-dcnode-id="472" instrument_node="">21 The ICJ stated that '...a matter within the State's domestic jurisdiction, will cease to be such if the State has undertaken obligations towards other States with respect to that matter (Aegean Sea Continental Shelf Case , ICJ Reports 1978, p. 25). See also Advisory Opinion of the ICJ, 'Interpretation of Peace Treaties with Bulgaria, Hungary and Romania', ICJ Reports 1950, pp. 70-71 : ' ... The interpretation of the terms of a treaty ... could not be considered as a question essentially within the domestic jurisdiction of a State. It is a question of international law . . . </span></p><span data-dcnode-id="470" instrument_node=""> </span></div><span data-dcnode-id="468" instrument_node=""> </span><a class="link_return" data-dcnode-id="466" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0141_0000_3_return" title="Go back to text"><span data-dcnode-id="467" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="440"><span data-dcnode-id="463" id="Noterqdi_0828-9999_2001_num_14_1_T2_0142_0000_1"><span data-dcnode-id="464" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">7. </span></span><div class="noteBody" data-dcnode-id="444"><span data-dcnode-id="460" instrument_node=""> </span><p data-dcnode-id="456"><span data-dcnode-id="458" id="N66260"><span data-dcnode-id="459" instrument_node=""> </span></span><span data-dcnode-id="457" instrument_node="">22 See V. Turk, "The Role of UNHCR in the Development of International Refugee Law", in F. Nicholson &amp; P. Twomey, eds., Refuge Rights and Realities : Evolving International Concepts and Regimes (Cambridge, Cambridge University Press, 1999), pp. 153-73 ; I.C. Jackson, The Refugee Concept in Group Situations (The Hague, Martinus Nijhoff, 1999 ) ; UNHCR, 'Complementary Forms of Protection : Their Nature and Relationship to the International Refugee Protection Regime', UN doc. EC/50/SC/CRP. 1 8. </span></p><span data-dcnode-id="455" instrument_node=""> </span><p data-dcnode-id="451"><span data-dcnode-id="453" id="N66263"><span data-dcnode-id="454" instrument_node=""> </span></span><span data-dcnode-id="452" instrument_node="">23 See UN doc. A/AC. 96/830, paragraph 68. </span></p><span data-dcnode-id="450" instrument_node=""> </span><p data-dcnode-id="446"><span data-dcnode-id="448" id="N66266"><span data-dcnode-id="449" instrument_node=""> </span></span><span data-dcnode-id="447" instrument_node="">24 See Article 56 in conjunction with Article 55 of the UN Charter. </span></p><span data-dcnode-id="445" instrument_node=""> </span></div><span data-dcnode-id="443" instrument_node=""> </span><a class="link_return" data-dcnode-id="441" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0142_0000_1_return" title="Go back to text"><span data-dcnode-id="442" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="420"><span data-dcnode-id="438" id="Noterqdi_0828-9999_2001_num_14_1_T2_0143_0000_2"><span data-dcnode-id="439" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">8. </span></span><div class="noteBody" data-dcnode-id="424"><span data-dcnode-id="435" instrument_node=""> </span><p data-dcnode-id="431"><span data-dcnode-id="433" id="N66308"><span data-dcnode-id="434" instrument_node=""> </span></span><span data-dcnode-id="432" instrument_node="">25 See also more generally N. Robinson, Convention relating to the Status of Refugees : Its History, Contents and Interpretation ; a Commentary (New York : Institute of Jewish Affairs, 1953), p. 142, who writes in a footnote that the General Assembly envisaged UNHCR as a means of making the Convention a dynamic and living reality (UN doc. SR.24), p. 22. </span></p><span data-dcnode-id="430" instrument_node=""> </span><p data-dcnode-id="426"><span data-dcnode-id="428" id="N66311"><span data-dcnode-id="429" instrument_node=""> </span></span><span data-dcnode-id="427" instrument_node="">26 See UN docs. E/AC.32/L.3, E/AC.32/L.26 ; E/AC.32/L.32 ; E/1618 and Corr.l ; E/AC.32/5 and Corr.l : E/OR(XI)/Annex 32 ; E/AC.32/L.40 ; E/1850 ; E/AC.32/8 ; A/Conf.2/1. See also Robinson, supra note 25, who writes on p. 143 that Article 35 is the result of the existence of UNHCR and of paragraph 6 of the Preamble to the Convention and who sees in Article 35 the transformation of the General Assembly resolution calling upon all states to cooperate with UNHCR into a legally binding obligation for states. </span></p><span data-dcnode-id="425" instrument_node=""> </span></div><span data-dcnode-id="423" instrument_node=""> </span><a class="link_return" data-dcnode-id="421" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0143_0000_2_return" title="Go back to text"><span data-dcnode-id="422" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="395"><span data-dcnode-id="418" id="Noterqdi_0828-9999_2001_num_14_1_T2_0144_0000_1"><span data-dcnode-id="419" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">9. </span></span><div class="noteBody" data-dcnode-id="399"><span data-dcnode-id="415" instrument_node=""> </span><p data-dcnode-id="411"><span data-dcnode-id="413" id="N66341"><span data-dcnode-id="414" instrument_node=""> </span></span><span data-dcnode-id="412" instrument_node="">27 See Executive Committee Conclusions Nos. 41 (i), 42 (h), 52 (1). </span></p><span data-dcnode-id="410" instrument_node=""> </span><p data-dcnode-id="406"><span data-dcnode-id="408" id="N66344"><span data-dcnode-id="409" instrument_node=""> </span></span><span data-dcnode-id="407" instrument_node="">28 For instance, both Article 28 of the Schengen Implementation Convention and Article 2 of the Dublin Convention Determining the State Responsible for Examining Applications for Asylum Lodged in One of the Member States of the Community reaffirm the commitment of the Contracting Parties to co¬ operate with UNHCR in the implementation of the international refugee instruments, which extends to UNHCR's supervisory role. </span></p><span data-dcnode-id="405" instrument_node=""> </span><p data-dcnode-id="401"><span data-dcnode-id="403" id="N66347"><span data-dcnode-id="404" instrument_node=""> </span></span><span data-dcnode-id="402" instrument_node="">29 See, for instance, Declaration No. 17 annexed to Treaty of Amsterdam on Article 63 of the Treaty Establishing the European Community ; Council Resolution on Minimum Guarantees for Asylum Procedures, 20 June 1995, paragraph 31 ; Directive on Minimum Standards for Giving Temporary Protection in the Even of a Mass Influx of Displaced Persons, June 2001 , paragraph 1 1 . </span></p><span data-dcnode-id="400" instrument_node=""> </span></div><span data-dcnode-id="398" instrument_node=""> </span><a class="link_return" data-dcnode-id="396" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0144_0000_1_return" title="Go back to text"><span data-dcnode-id="397" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="360"><span data-dcnode-id="393" id="Noterqdi_0828-9999_2001_num_14_1_T2_0145_0000_2"><span data-dcnode-id="394" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">10. </span></span><div class="noteBody" data-dcnode-id="364"><span data-dcnode-id="390" instrument_node=""> </span><p data-dcnode-id="386"><span data-dcnode-id="388" id="N66382"><span data-dcnode-id="389" instrument_node=""> </span></span><span data-dcnode-id="387" instrument_node="">30 See also Article 45 of this Convention, which provides that UN organs may be represented, may provide expert advice on the Convention's implementation in areas falling within the scope of their respective mandates, when implementation of the Convention of the Rights of the Child is considered. The Article also states that the Committee shall transmit to competent bodies reports from States Parties that contain a request, or indicate a need, for technical advice or assistance. </span></p><span data-dcnode-id="385" instrument_node=""> </span><p data-dcnode-id="381"><span data-dcnode-id="383" id="N66385"><span data-dcnode-id="384" instrument_node=""> </span></span><span data-dcnode-id="382" instrument_node="">31 See, for instance, UNHCR's submission to the Supreme Court of Canada in Suresh v. The Minister of Citizenship and Immigration (S.C.C. No. 27790). This case raises some important issues of international refugee law and international human rights law, particularly the relationship between Article 33 of the 1951 Convention and Articles 3 and 16 of the UN Convention Against Torture. </span></p><span data-dcnode-id="380" instrument_node=""> </span><p data-dcnode-id="376"><span data-dcnode-id="378" id="N66388"><span data-dcnode-id="379" instrument_node=""> </span></span><span data-dcnode-id="377" instrument_node="">32 See , UN Doc. A/AC. 96/898 (3 July 1998) . ; B.Gorlick, " Human Rights and Refugees : Enhancing Protection Through International Human Rights Law", UNHCR New Issues in Refugee Research, working paper n°30, (october 2000) . </span></p><span data-dcnode-id="375" instrument_node=""> </span><p data-dcnode-id="371"><span data-dcnode-id="373" id="N66391"><span data-dcnode-id="374" instrument_node=""> </span></span><span data-dcnode-id="372" instrument_node="">33 See, D. Bethlehem &amp; E. Lauterpacht, "The Scope and Content of the Principle of Non-refoulement' , paper presented at the Cambridge meeting of the second track of the Global Consultations on International Protection, (July 2001). </span></p><span data-dcnode-id="370" instrument_node=""> </span><p data-dcnode-id="366"><span data-dcnode-id="368" id="N66394"><span data-dcnode-id="369" instrument_node=""> </span></span><span data-dcnode-id="367" instrument_node="">34 For the legal reasoning justifying a broad understanding of "conventions", see V. Tiirk, Das Fliichtlingshochkommissariat der Vereinten Nationen, UNHCR, (Berlin : Duncker &amp; Humblot , 1992) at 167. </span></p><span data-dcnode-id="365" instrument_node=""> </span></div><span data-dcnode-id="363" instrument_node=""> </span><a class="link_return" data-dcnode-id="361" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0145_0000_2_return" title="Go back to text"><span data-dcnode-id="362" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="330"><span data-dcnode-id="358" id="Noterqdi_0828-9999_2001_num_14_1_T2_0146_0000_1"><span data-dcnode-id="359" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">11. </span></span><div class="noteBody" data-dcnode-id="334"><span data-dcnode-id="355" instrument_node=""> </span><p data-dcnode-id="351"><span data-dcnode-id="353" id="N66427"><span data-dcnode-id="354" instrument_node=""> </span></span><span data-dcnode-id="352" instrument_node="">35 This refers to the "general interest", as Chowdhury put it ; see Tareq. M.R. Chowdhury, Legal Framework of International Supervision , (Stockholm : University of Stockholm, 1 986)at 1 76. </span></p><span data-dcnode-id="350" instrument_node=""> </span><p data-dcnode-id="346"><span data-dcnode-id="348" id="N66430"><span data-dcnode-id="349" instrument_node=""> </span></span><span data-dcnode-id="347" instrument_node="">36 Ibid, at 7. </span></p><span data-dcnode-id="345" instrument_node=""> </span><p data-dcnode-id="341"><span data-dcnode-id="343" id="N66433"><span data-dcnode-id="344" instrument_node=""> </span></span><span data-dcnode-id="342" instrument_node="">37 Ibid, at 181 ,258. </span></p><span data-dcnode-id="340" instrument_node=""> </span><p data-dcnode-id="336"><span data-dcnode-id="338" id="N66436"><span data-dcnode-id="339" instrument_node=""> </span></span><span data-dcnode-id="337" instrument_node="">38 Ibid. at 9-10 , 258 : "As international organizations are an institutionalized means of international co¬ operation, the coercive element in "enforcement" plays a rather insignificant role compared to other "enforcement" techniques." He has preventive action in mind. </span></p><span data-dcnode-id="335" instrument_node=""> </span></div><span data-dcnode-id="333" instrument_node=""> </span><a class="link_return" data-dcnode-id="331" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0146_0000_1_return" title="Go back to text"><span data-dcnode-id="332" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="305"><span data-dcnode-id="328" id="Noterqdi_0828-9999_2001_num_14_1_T2_0148_0000_1"><span data-dcnode-id="329" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">12. </span></span><div class="noteBody" data-dcnode-id="309"><span data-dcnode-id="325" instrument_node=""> </span><p data-dcnode-id="321"><span data-dcnode-id="323" id="N66496"><span data-dcnode-id="324" instrument_node=""> </span></span><span data-dcnode-id="322" instrument_node="">39 See, Independent expert study, Effective Implementation of International Instruments on Human Rights, Including Reporting Obligations under International Instruments on Human Rights, UN Doc. A/44/668 (8 November 1 989), at 4. </span></p><span data-dcnode-id="320" instrument_node=""> </span><p data-dcnode-id="316"><span data-dcnode-id="318" id="N66499"><span data-dcnode-id="319" instrument_node=""> </span></span><span data-dcnode-id="317" instrument_node="">40 See, E.G. Lentini, supra note 2 at 197 ; See, also C. Tomuschat, "A Right to Asylum", (1992) Human Rights L.J. , at 257. </span></p><span data-dcnode-id="315" instrument_node=""> </span><p data-dcnode-id="311"><span data-dcnode-id="313" id="N66502"><span data-dcnode-id="314" instrument_node=""> </span></span><span data-dcnode-id="312" instrument_node="">41 The fact that UNHCR issued a Handbook on Procedures and Criteria for Determining Refugee Status (1979, reedited 1992) is indicative of UNHCR's role in this regard. </span></p><span data-dcnode-id="310" instrument_node=""> </span></div><span data-dcnode-id="308" instrument_node=""> </span><a class="link_return" data-dcnode-id="306" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0148_0000_1_return" title="Go back to text"><span data-dcnode-id="307" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="275"><span data-dcnode-id="303" id="Noterqdi_0828-9999_2001_num_14_1_T2_0149_0000_2"><span data-dcnode-id="304" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">13. </span></span><div class="noteBody" data-dcnode-id="279"><span data-dcnode-id="300" instrument_node=""> </span><p data-dcnode-id="296"><span data-dcnode-id="298" id="N66540"><span data-dcnode-id="299" instrument_node=""> </span></span><span data-dcnode-id="297" instrument_node="">42 See, Executive Committee Conclusions, Nos 47 (s)(u), at 53-55 . </span></p><span data-dcnode-id="295" instrument_node=""> </span><p data-dcnode-id="291"><span data-dcnode-id="293" id="N66543"><span data-dcnode-id="294" instrument_node=""> </span></span><span data-dcnode-id="292" instrument_node="">43 See, Executive Committee Conclusion ,No 72 (e)(f). </span></p><span data-dcnode-id="290" instrument_node=""> </span><p data-dcnode-id="286"><span data-dcnode-id="288" id="N66546"><span data-dcnode-id="289" instrument_node=""> </span></span><span data-dcnode-id="287" instrument_node="">44 See, UN Doc. A/ AC. 96/930 and UN Doc. A/AC.96/951. </span></p><span data-dcnode-id="285" instrument_node=""> </span><p data-dcnode-id="281"><span data-dcnode-id="283" id="N66549"><span data-dcnode-id="284" instrument_node=""> </span></span><span data-dcnode-id="282" instrument_node="">45 See, Executive Committee Conclusion No. 41 (o), which notes the importance of promoting a favourable climate of public opinion in order to facilitate the exercise of UNHCR's international protection function. It also emphasises the need for the special situation and needs of refugees and asylum-seekers to be brought fully to the attention of the public, welcomes UNHCR's efforts in this regard and states that these should be fully supported by governments. </span></p><span data-dcnode-id="280" instrument_node=""> </span></div><span data-dcnode-id="278" instrument_node=""> </span><a class="link_return" data-dcnode-id="276" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0149_0000_2_return" title="Go back to text"><span data-dcnode-id="277" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="255"><span data-dcnode-id="273" id="Noterqdi_0828-9999_2001_num_14_1_T2_0150_0000_4"><span data-dcnode-id="274" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">14. </span></span><div class="noteBody" data-dcnode-id="259"><span data-dcnode-id="270" instrument_node=""> </span><p data-dcnode-id="266"><span data-dcnode-id="268" id="N66606"><span data-dcnode-id="269" instrument_node=""> </span></span><span data-dcnode-id="267" instrument_node="">46 The numbers in brackets refer to the relevant Executive Committee Conclusions. </span></p><span data-dcnode-id="265" instrument_node=""> </span><p data-dcnode-id="261"><span data-dcnode-id="263" id="N66609"><span data-dcnode-id="264" instrument_node=""> </span></span><span data-dcnode-id="262" instrument_node="">47 See, UN Doc. EC/SCP/66. </span></p><span data-dcnode-id="260" instrument_node=""> </span></div><span data-dcnode-id="258" instrument_node=""> </span><a class="link_return" data-dcnode-id="256" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0150_0000_4_return" title="Go back to text"><span data-dcnode-id="257" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="240"><span data-dcnode-id="253" id="Noterqdi_0828-9999_2001_num_14_1_T2_0151_0000_4"><span data-dcnode-id="254" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">15. </span></span><div class="noteBody" data-dcnode-id="244"><span data-dcnode-id="250" instrument_node=""> </span><p data-dcnode-id="246"><span data-dcnode-id="248" id="N66666"><span data-dcnode-id="249" instrument_node=""> </span></span><span data-dcnode-id="247" instrument_node="">See, the 1954 Convention relating to the Status of Stateless Persons and the 1961 Convention on the Reduction of Statelessness ; as for UNHCR's role, see, UNHCR's Activities in the Field of Statelessness : Progress Report, UN Doc. EC/51/SC/CRP.13, at para. 5, Evaluation of UNHCR's Role and Activities in Relation to Statelessness /ssues, EPAU/2001/09, (July 2001). </span></p><span data-dcnode-id="245" instrument_node=""> </span></div><span data-dcnode-id="243" instrument_node=""> </span><a class="link_return" data-dcnode-id="241" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0151_0000_4_return" title="Go back to text"><span data-dcnode-id="242" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="215"><span data-dcnode-id="238" id="Noterqdi_0828-9999_2001_num_14_1_T2_0152_0000_3"><span data-dcnode-id="239" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">16. </span></span><div class="noteBody" data-dcnode-id="219"><span data-dcnode-id="235" instrument_node=""> </span><p data-dcnode-id="231"><span data-dcnode-id="233" id="N66704"><span data-dcnode-id="234" instrument_node=""> </span></span><span data-dcnode-id="232" instrument_node="">49 The following references are not exhaustive but reflect particular aspects of countries' international obligations under the Convention at the national level, 1951, art.35. ; See, for instance, the Law on Asylum of Albania, 1998, art. 20(4). ; Law No. 1952-893 of France, art. 3. ; the Aliens Act of Poland, art.49(2). ; Refugee Law of Romania, 1996, art 9(1). ; the Law on Asylum of Slovenia, art.30. ; the Implementing Decree of Law 5/1984 of Spain, art.2(l ). ;the Law of Angola, 8/1990, art. 10. ; Ordinance 77053 of Djibouti, art.3. and Ordinance 77054 of Djibouti ,art.6. ; the Asylum Law of Ghana, 1992, section 4,9(3) (a) . ; the Refugees Act of Namibia, 1999, section 7 . ; Decree 464/1985 of Argentina, art.3. ; Decree No. 19639 of Bolivia, the Law No. 9474 of Brazil, 1997, art. 14(7) (1) . ; Bill C -31 of Canada , section 161 , 2000. ; Executive Resolution No. 461/1984 of Panama, art. 5. </span></p><span data-dcnode-id="230" instrument_node=""> </span><p data-dcnode-id="226"><span data-dcnode-id="228" id="N66707"><span data-dcnode-id="229" instrument_node=""> </span></span><span data-dcnode-id="227" instrument_node="">See, for instance, the Law No. 1952-893 of France , art .5 ; Presidential Decree No. 61/99 of Greece, art. 3(5). </span></p><span data-dcnode-id="225" instrument_node=""> </span><p data-dcnode-id="221"><span data-dcnode-id="223" id="N66710"><span data-dcnode-id="224" instrument_node=""> </span></span><span data-dcnode-id="222" instrument_node="">" Even in Belgium, a longstanding party to the 1951 Convention, IJNHCR used to be fully responsible for the determination of refugee status ; see, Johnson, "Refugee Law Reform in Europe : The Belgian Example"(Columbia Journal of Transnational Law , 1989) at p. 591. </span></p><span data-dcnode-id="220" instrument_node=""> </span></div><span data-dcnode-id="218" instrument_node=""> </span><a class="link_return" data-dcnode-id="216" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0152_0000_3_return" title="Go back to text"><span data-dcnode-id="217" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="180"><span data-dcnode-id="213" id="Noterqdi_0828-9999_2001_num_14_1_T2_0153_0000_1"><span data-dcnode-id="214" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">17. </span></span><div class="noteBody" data-dcnode-id="184"><span data-dcnode-id="210" instrument_node=""> </span><p data-dcnode-id="206"><span data-dcnode-id="208" id="N66734"><span data-dcnode-id="209" instrument_node=""> </span></span><span data-dcnode-id="207" instrument_node="">52 See, for instance, the Law on Asylum of Albania,1998,art . 27(4). ; the Law on Refugees of Bulgaria, 1 98 1 , section 4(2). ; Presidential Decree No. 61/99 of Greece, art . 1 (7) , 2 (8) ,3 (10), and 4 (7). ; the Refugee Act of Ireland, 1996, sections 11 (3) , 16 (8). ; Immigration Act of Norway, 1991, art . 21. ; the Law 15/98 of Portugal, art . 1 1 (4) , 14 (3) , 18 (l)-(4) , 22 (3) , and 24 (2) . ; the Law on Asylum of Slovenia, art. 10(3) . ; the Implementing Decree of Law 5/1 984 of Spain, art. 1 9 (3) , 20 (1 ) (a) , 21 (1). ; Bill C -31 of Canada, section 161. ; Executive Resolution No. 461/1984 of Panama, art .22 . </span></p><span data-dcnode-id="205" instrument_node=""> </span><p data-dcnode-id="201"><span data-dcnode-id="203" id="N66737"><span data-dcnode-id="204" instrument_node=""> </span></span><span data-dcnode-id="202" instrument_node="">53 See See, for instance, the Law 15/98 of Portugal art. 19 -23. ; the Law on Asylum of Slovenia , art. 10(3). ; the Asylum Law 5/1984 of Spain, art.5 (5) . </span></p><span data-dcnode-id="200" instrument_node=""> </span><p data-dcnode-id="196"><span data-dcnode-id="198" id="N66740"><span data-dcnode-id="199" instrument_node=""> </span></span><span data-dcnode-id="197" instrument_node="">54 See, for instance, the Asylum Law of Albania , 1998 , art. 16 (3), 20 (1) and 23 (3). ; the Asylum Law of Austria, art. 39 (4). ; the Law on Refugees of Bulgaria, 1999 , sections 4 (2) and 20 . ; the Asylum Act of the Czech Republic, sections 37 and 38 . ; the Asylum Procedure Act of Germany , art. 9 (1 ). ;Decree No. 95-507 of France . ; the Presidential Decree No. 61/1 999 of Greece , art. 2(11). ; the Refugee Law of Latvia, 1998 , art .6 (1). ; the Immigration ActofNorway , 1991, art. 34 . ; the Aliens Act of Poland , art. 49 (1) . ; the Asylum Law 15/98 of Portugal , art. 49 (1) . ; the Ordinance of Romania, 2000 , art. 22(5). ; the Law on Asylum of Slovenia , art. 31 (3) . ; Decree No. 1598 of Colombia , 1995 , art. 13 . ;Decree 464/1985 , art.4 , ;the Law on Refugees of Armenia, 1999 , art. 19 . In most countnes in all regions of the world, UNHCR access to asylum applicants, refugees and returnees is granted in practice. </span></p><span data-dcnode-id="195" instrument_node=""> </span><p data-dcnode-id="191"><span data-dcnode-id="193" id="N66743"><span data-dcnode-id="194" instrument_node=""> </span></span><span data-dcnode-id="192" instrument_node="">55 See, for instance, Implementing Decree of Law 5/1984 of Spain , art. 20 (1) (a) and 21(1). ; the Law on Asylum of Switzerland, 1998 , art. 23 (3) . </span></p><span data-dcnode-id="190" instrument_node=""> </span><p data-dcnode-id="186"><span data-dcnode-id="188" id="N66746"><span data-dcnode-id="189" instrument_node=""> </span></span><span data-dcnode-id="187" instrument_node="">56 Slovenia has even legislated on this, see, the Law on Asylum art. 10(2). </span></p><span data-dcnode-id="185" instrument_node=""> </span></div><span data-dcnode-id="183" instrument_node=""> </span><a class="link_return" data-dcnode-id="181" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0153_0000_1_return" title="Go back to text"><span data-dcnode-id="182" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="160"><span data-dcnode-id="178" id="Noterqdi_0828-9999_2001_num_14_1_T2_0154_0000_2"><span data-dcnode-id="179" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">18. </span></span><div class="noteBody" data-dcnode-id="164"><span data-dcnode-id="175" instrument_node=""> </span><p data-dcnode-id="171"><span data-dcnode-id="173" id="N66784"><span data-dcnode-id="174" instrument_node=""> </span></span><span data-dcnode-id="172" instrument_node="">57 See , UN Doc. EC/47/SC/CRP.27., at para. 7-9. </span></p><span data-dcnode-id="170" instrument_node=""> </span><p data-dcnode-id="166"><span data-dcnode-id="168" id="N66787"><span data-dcnode-id="169" instrument_node=""> </span></span><span data-dcnode-id="167" instrument_node="">58 See, the concluding observations of the Cambridge Expert Roundtable organised by UNHCR and the Lauterpacht Research Centre for International Law, (9-10 July 2001) , on line : &lt; http ://www.unhcr.ch&gt;. </span></p><span data-dcnode-id="165" instrument_node=""> </span></div><span data-dcnode-id="163" instrument_node=""> </span><a class="link_return" data-dcnode-id="161" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0154_0000_2_return" title="Go back to text"><span data-dcnode-id="162" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="135"><span data-dcnode-id="158" id="Noterqdi_0828-9999_2001_num_14_1_T2_0155_0000_3"><span data-dcnode-id="159" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">19. </span></span><div class="noteBody" data-dcnode-id="139"><span data-dcnode-id="155" instrument_node=""> </span><p data-dcnode-id="151"><span data-dcnode-id="153" id="N66833"><span data-dcnode-id="154" instrument_node=""> </span></span><span data-dcnode-id="152" instrument_node="">59 These are areas which were, for instance, identified in the context of the informal consultations on measures to ensure international protection to all who need it . See ,UN Doc. EC/47/SC/CRP.27, at para .7-9. </span></p><span data-dcnode-id="150" instrument_node=""> </span><p data-dcnode-id="146"><span data-dcnode-id="148" id="N66836"><span data-dcnode-id="149" instrument_node=""> </span></span><span data-dcnode-id="147" instrument_node="">60 Some of these suggestions were put forward for consideration by the Sub-Committee of the Whole on International Protection : see ,UN Docs. EC/SCP/54 ; EC/SCP/66 ; and EC/1992/SCP/CRP.10. As for academic literature on the subject, which is scarce, see, in particular Kâlin, supra note. 5, but also Lentini, supra note. 2, at pp. 196-7. </span></p><span data-dcnode-id="145" instrument_node=""> </span><p data-dcnode-id="141"><span data-dcnode-id="143" id="N66839"><span data-dcnode-id="144" instrument_node=""> </span></span><span data-dcnode-id="142" instrument_node="">61 See, the concluding observations of the Cambridge Expert Roundtable organised by UNHCR and the Lauterpacht Research Centre for International Law, 9-10 July 2001 , on line : UNHCR's Global Consultations : &lt; http ://www.unhcr.ch&gt;. </span></p><span data-dcnode-id="140" instrument_node=""> </span></div><span data-dcnode-id="138" instrument_node=""> </span><a class="link_return" data-dcnode-id="136" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0155_0000_3_return" title="Go back to text"><span data-dcnode-id="137" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="120"><span data-dcnode-id="133" id="Noterqdi_0828-9999_2001_num_14_1_T2_0157_0000_2"><span data-dcnode-id="134" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">20. </span></span><div class="noteBody" data-dcnode-id="124"><span data-dcnode-id="130" instrument_node=""> </span><p data-dcnode-id="126"><span data-dcnode-id="128" id="N66902"><span data-dcnode-id="129" instrument_node=""> </span></span><span data-dcnode-id="127" instrument_node="">62 See, also in this connection the concluding observations of the Cambridge Expert Roundtable. </span></p><span data-dcnode-id="125" instrument_node=""> </span></div><span data-dcnode-id="123" instrument_node=""> </span><a class="link_return" data-dcnode-id="121" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0157_0000_2_return" title="Go back to text"><span data-dcnode-id="122" instrument_node="">↵</span></a></div></div></div><span data-dcnode-id="117" instrument_node=""> </span></div><span data-dcnode-id="115" instrument_node=""> </sp
