nably necessary in order to achieve the object and purpose of supervising the international legal framework governing refugee protection. With this in mind, it is now important to agree on a conceptual framework against which it is possible to analyse how supervision has developed in practice.</span></p><span data-dcnode-id="1325" instrument_node=""> </span><p data-dcnode-id="1321"><span data-dcnode-id="1323" id="N66411" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1324" instrument_node=""> </span></span><span data-dcnode-id="1322" instrument_node="">Tareq Chowdhury, who has analysed the concept of international supervision extensively, defines supervision as:</span></p><span data-dcnode-id="1320" instrument_node=""> </span><p data-dcnode-id="1316"><span data-dcnode-id="1318" id="N66414" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1319" instrument_node=""> </span></span><span data-dcnode-id="1317" instrument_node="">a legal process which empowers authorized institutions to apply certain procedures to assure the proper functioning of the legal order by inducing subjects to observe obligations incumbent on them. All the procedures by which existing substantive rules of law are further elaborated, applied and enforced, would be considered to have contributed to the supervision. A discussion of international supervision is therefore, a discussion of those procedures through which legal order induces subjects to observe law.36</span></p><span data-dcnode-id="1315" instrument_node=""> </span><p data-dcnode-id="1311"><span data-dcnode-id="1313" id="N66417" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1314" instrument_node=""> </span></span><span data-dcnode-id="1312" instrument_node="">While the above conceptualisation may not necessarily always be applicable in the specific context of international refugee protection, it provides a useful analytical framework, which may help to advance the analysis of the UNHCR's supervisory responsibility. For the purpose of this paper, supervision by an international institution contains (i) an element of collection of information concerning the application of provisions of the international refugee instruments by the respective contracting states; (ii) the assessment of this information in light of the applicable norms; and (iii) some kind of enforcement mechanism to ensure remedial action and norm compliance by the states concerned37. All three actions are closely inter-related and core components of any supervisory role.</span></p><span data-dcnode-id="1310" instrument_node=""> </span><p data-dcnode-id="1306"><span data-dcnode-id="1308" id="N66420" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1309" instrument_node=""> </span></span><span data-dcnode-id="1307" instrument_node="">According to Chowdhury , when the review process leads to the identification of an unlawful act, the enforcement phase of the supervisory function is activated. Enforcement has two objectives: the prevention of wrongful behaviour and the redress of wrongful behaviour, by means of either punitive or non-punitive measures38.</span></p><span data-dcnode-id="1305" instrument_node=""> </span><span data-dcnode-id="1303" id="Noterqdi_0828-9999_2001_num_14_1_T2_0146_0000_1_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1304" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1300" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0146_0000_1" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">11</span></sup></a><span data-dcnode-id="1299" instrument_node=""> </span><hr data-dcnode-id="1298" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1296" id="rqdi_0828-9999_2001_num_14_1_T2_0147_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1297" instrument_node=""> </span></span><span data-dcnode-id="1295" instrument_node=""> </span><p data-dcnode-id="1291"><span data-dcnode-id="1293" id="N66444" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1294" instrument_node=""> </span></span><span data-dcnode-id="1292" instrument_node="">Unhcr ' s Supervisory Responsibility</span></p><span data-dcnode-id="1290" instrument_node=""> </span><p data-dcnode-id="1286"><span data-dcnode-id="1288" id="N66447" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1289" instrument_node=""> </span></span><span data-dcnode-id="1287" instrument_node="">147</span></p><span data-dcnode-id="1285" instrument_node=""> </span><p data-dcnode-id="1281"><span data-dcnode-id="1283" id="N66450" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1284" instrument_node=""> </span></span><span data-dcnode-id="1282" instrument_node="">As can be seen from the above analysis and apart from Articles 35(2) and 36 of the 1951 Convention, no specific legal provisions elaborate on the implementation of the UNHCR's supervisory function. It is therefore essential to examine the actual practice of the UNHCR in this area, to see to what extent this practice has been formalised by the Executive Committee and to analyse how it corresponds to actual state practice. Other supervisory mechanisms, particularly in the area of human rights law, have served as useful models on which to draw in the analysis of supervisory tools.</span></p><span data-dcnode-id="1280" instrument_node=""> </span><p data-dcnode-id="1274"><span data-dcnode-id="1278" id="N66453" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1279" instrument_node=""> </span></span><span data-dcnode-id="1277" instrument_node=""> </span><span data-dcnode-id="1275" id="rqdi_0828-9999_2001_num_14_1_T2_0147_0000_1" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1276" instrument_node=""> </span></span></p><h4 data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">VII. The UNHCR's organisational practice</span></h4><span data-dcnode-id="1271" instrument_node=""> </span><p data-dcnode-id="1270"></p><span data-dcnode-id="1269" instrument_node=""> </span><p data-dcnode-id="1265"><span data-dcnode-id="1267" id="N66461" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1268" instrument_node=""> </span></span><span data-dcnode-id="1266" instrument_node="">As regards the first element of supervision (" information gathering "), Article 35(2) (b and c) and Article 36 of the 1951 Convention set out clear obligations for states to provide information on the application of the Convention. This is indicative of how the UNHCR's supervisory function is intended to be exercised.</span></p><span data-dcnode-id="1264" instrument_node=""> </span><p data-dcnode-id="1260"><span data-dcnode-id="1262" id="N66464" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1263" instrument_node=""> </span></span><span data-dcnode-id="1261" instrument_node="">Information gathering is greatly facilitated by the presence of the UNHCR offices in the majority of states parties to the international refugee instruments. Without an effective field presence it would be difficult for the UNHCR to monitor the broad range of state and non-state measures in relation to asylum-seekers and refugees and to keep up-to-date with administrative practice, jurisprudence and relevant legislative processes. By being present, the UNHCR, in its dealings with its government and other counterparts, is generally able to gather necessary information, which enables an appropriate monitoring of state practice. Relevant domestic laws, regulations, decrees, instructions, administrative decisions and other related administrative measures are regularly measured against the international refugee instruments. This task obviously needs to be performed by qualified legal staff who are experts in the national legal framework and well versed in international refugee/human rights law.</span></p><span data-dcnode-id="1259" instrument_node=""> </span><p data-dcnode-id="1255"><span data-dcnode-id="1257" id="N66467" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1258" instrument_node=""> </span></span><span data-dcnode-id="1256" instrument_node="">The second element of international supervision relates to the assessment of this information in the light of international refugee law and standards. In the UNHCR's context, this essentially means analysis of and reporting on state practice by the Office itself. Reporting by the UNHCR serves not least to ensure some consistency in the application of standards, to achieve harmonisation of interpretations of provisions of international refugee law, to set in train the development of common standards, and to ensure international co-operation. Effective reporting would entail that at any point in time the UNHCR would be able to provide an overview and analysis of current state practice in a given country in relation to a specific issue affecting asylum-seekers and refugees. This has obvious resource and staffing implications. There is, however, currently no mechanism available that would ensure institutionalised reporting on inconsistencies or violations ascertained. By contrast, in human rights law it is generally recognised that state reporting procedures are of central importance to the effectiveness of the international human rights regime. State reporting is regarded as a multi-faceted undertaking that serves a variety of objectives both domestically and internationally and is based on</span></p><span data-dcnode-id="1254" instrument_node=""> </span><hr data-dcnode-id="1253" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1251" id="rqdi_0828-9999_2001_num_14_1_T2_0148_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1252" instrument_node=""> </span></span><span data-dcnode-id="1250" instrument_node=""> </span><p data-dcnode-id="1246"><span data-dcnode-id="1248" id="N66474" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1249" instrument_node=""> </span></span><span data-dcnode-id="1247" instrument_node="">148</span></p><span data-dcnode-id="1245" instrument_node=""> </span><p data-dcnode-id="1241"><span data-dcnode-id="1243" id="N66477" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1244" instrument_node=""> </span></span><span data-dcnode-id="1242" instrument_node="">(2001) 14.1 Revue québécoise de droit international</span></p><span data-dcnode-id="1240" instrument_node=""> </span><p data-dcnode-id="1236"><span data-dcnode-id="1238" id="N66480" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1239" instrument_node=""> </span></span><span data-dcnode-id="1237" instrument_node="">the assumption that the examination of such reports by the treaty monitoring body would lead to a dialogue between that state and the experts and to progressive improvements in compliance39.</span></p><span data-dcnode-id="1235" instrument_node=""> </span><p data-dcnode-id="1231"><span data-dcnode-id="1233" id="N66483" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1234" instrument_node=""> </span></span><span data-dcnode-id="1232" instrument_node="">As for the third element , enforcement , international refugee law and international human rights law have institutionally developed in different directions. In human rights law, three different systems have in essence evolved institutionally to "enforce" human rights: (i) political processes, such as the Commission on Human Rights; (ii) quasi-judicial models, such as the specialist human rights treaty monitoring bodies charged with the oversight of treaty performance; and (iii) judicial mechanisms, such as the European Court of Human Rights whose judgements are binding and enforceable in member states. The genesis of the UNHCR's supervisory role predates the institutional developments that have taken place in the human rights area. While prescribing this supervisory responsibility, neither the UNHCR Statute nor any other provisions of international refugee law explicitly provide for a mechanism of enforcement that would induce states parties to the international refugee instruments to fulfil their obligations. It has therefore been argued in academic literature that the UNHCR's effectiveness as an enforcement mechanism remains unclear40.</span></p><span data-dcnode-id="1230" instrument_node=""> </span><p data-dcnode-id="1226"><span data-dcnode-id="1228" id="N66486" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1229" instrument_node=""> </span></span><span data-dcnode-id="1227" instrument_node="">It is true that the UNHCR cannot as such "enforce" its views. In the UNHCR's practice and understanding, "enforcement" means in effect a wide range of intervention and advocacy activities covering the whole spectrum of displacement ranging from admission, reception, determination of refugee status to improvement of standards, régularisation of stay or return. The objective of these activities is to ensure the adherence of states to internationally accepted standards of conduct with regard to refugees and asylum-seekers and to assist in building up the capacity of authorities to do so. In efforts to harmonise the application of the refugee definition criteria, the UNHCR has, for instance, sought to influence state practice by providing guidance on the eligibility of certain groups of refugees and by advising the authorities, courts and other bodies on the interpretation and practical application of the provisions of the international refugee instruments41. The UNHCR's involvement in precedent-setting cases, including through submissions to courts, has also often resulted in positive developments in a number of countries.</span></p><span data-dcnode-id="1225" instrument_node=""> </span><p data-dcnode-id="1221"><span data-dcnode-id="1223" id="N66489" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1224" instrument_node=""> </span></span><span data-dcnode-id="1222" instrument_node="">Intervention generally encompasses the political, diplomatic and legal work that is required to address protection issues, to take remedial action and to influence legislation and national practice. This is done by conducting a constructive dialogue with the government concerned, relevant regional and local authorities at all levels, the parliament, the judiciary, the academic community and other relevant institutions,</span></p><span data-dcnode-id="1220" instrument_node=""> </span><span data-dcnode-id="1218" id="Noterqdi_0828-9999_2001_num_14_1_T2_0148_0000_1_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1219" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1215" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0148_0000_1" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">12</span></sup></a><span data-dcnode-id="1214" instrument_node=""> </span><hr data-dcnode-id="1213" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1211" id="rqdi_0828-9999_2001_num_14_1_T2_0149_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1212" instrument_node=""> </span></span><span data-dcnode-id="1210" instrument_node=""> </span><p data-dcnode-id="1206"><span data-dcnode-id="1208" id="N66510" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1209" instrument_node=""> </span></span><span data-dcnode-id="1207" instrument_node="">Unhcr 's Supervisons Responsibility</span></p><span data-dcnode-id="1205" instrument_node=""> </span><p data-dcnode-id="1201"><span data-dcnode-id="1203" id="N66513" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1204" instrument_node=""> </span></span><span data-dcnode-id="1202" instrument_node="">149</span></p><span data-dcnode-id="1200" instrument_node=""> </span><p data-dcnode-id="1196"><span data-dcnode-id="1198" id="N66516" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1199" instrument_node=""> </span></span><span data-dcnode-id="1197" instrument_node="">including even non-state actors, by making formal or informal representations or submitting the UNHCR's observations to them in an appropriate form. Depending on the interlocutor, the UNHCR's views are generally communicated in the form of letters, notes verbales, aide-mémoires, public domain positions, or "non-papers". In the case of the judiciary, they are communicated as amicus curiae briefs or other submissions, and for parliamentary commissions, often by means of written or oral statements. For the UNHCR, this dialogue can be carried out at the local, the regional and/or the headquarters level. When legislation is in the process of being adopted or implemented, it also entails the submission of quality expert opinions based on in-depth knowledge of and familiarity with national state practice and international refugee law.</span></p><span data-dcnode-id="1195" instrument_node=""> </span><p data-dcnode-id="1191"><span data-dcnode-id="1193" id="N66519" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1194" instrument_node=""> </span></span><span data-dcnode-id="1192" instrument_node="">In addition, the UNHCR engages in standard-setting and promotional activities42, making its special expertise available by offering advisory services, technical assistance and training43. A number of these activities are described in more detail in the 2000 and 2001 Notes on International Protection44 . The UNHCR may also issue public statements in case of concerns or departures from the international refugee instruments and standards45.</span></p><span data-dcnode-id="1190" instrument_node=""> </span><p data-dcnode-id="1186"><span data-dcnode-id="1188" id="N66522" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1189" instrument_node=""> </span></span><span data-dcnode-id="1187" instrument_node="">In summary, although the UNHCR as such does not have an enforcement mechanism comparable, for instance, to the human rights treaty monitoring bodies, the aforementioned activities on their own or taken together, depending on the circumstances, could have the effect of soft "enforcement".</span></p><span data-dcnode-id="1185" instrument_node=""> </span><p data-dcnode-id="1179"><span data-dcnode-id="1183" id="N66525" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1184" instrument_node=""> </span></span><span data-dcnode-id="1182" instrument_node=""> </span><span data-dcnode-id="1180" id="rqdi_0828-9999_2001_num_14_1_T2_0149_0000_1" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1181" instrument_node=""> </span></span></p><h4 data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">VIII. Elaboration of the UNHCR's supervisory responsibility by the Executive Committee of the High Commissioner's Programme</span></h4><span data-dcnode-id="1176" instrument_node=""> </span><p data-dcnode-id="1175"></p><span data-dcnode-id="1174" instrument_node=""> </span><p data-dcnode-id="1170"><span data-dcnode-id="1172" id="N66533" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1173" instrument_node=""> </span></span><span data-dcnode-id="1171" instrument_node="">The Executive Committee is the only specialised forum, which exists at the global level for the development of international standards relating to refugees. The annual conclusions adopted by the Executive Committee on matters related to international protection are indicative of international consensus in certain areas and fulfil an important standard-setting function. The Executive Committee has, to some extent, conceptualised the UNHCR's supervisory role, albeit not always by referring explicitly to the concept of supervision. The understanding of the Executive Committee mirrors to a great extent the UNHCR's own understanding of this function. The various elements identified by the Executive Committee provide an</span></p><span data-dcnode-id="1169" instrument_node=""> </span><span data-dcnode-id="1167" id="Noterqdi_0828-9999_2001_num_14_1_T2_0149_0000_2_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1168" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1164" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0149_0000_2" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">13</span></sup></a><span data-dcnode-id="1163" instrument_node=""> </span><hr data-dcnode-id="1162" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1160" id="rqdi_0828-9999_2001_num_14_1_T2_0150_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1161" instrument_node=""> </span></span><span data-dcnode-id="1159" instrument_node=""> </span><p data-dcnode-id="1155"><span data-dcnode-id="1157" id="N66557" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1158" instrument_node=""> </span></span><span data-dcnode-id="1156" instrument_node="">150</span></p><span data-dcnode-id="1154" instrument_node=""> </span><p data-dcnode-id="1150"><span data-dcnode-id="1152" id="N66560" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1153" instrument_node=""> </span></span><span data-dcnode-id="1151" instrument_node="">(2001) 14.1 Revue québécoise de droit international</span></p><span data-dcnode-id="1149" instrument_node=""> </span><p data-dcnode-id="1145"><span data-dcnode-id="1147" id="N66563" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1148" instrument_node=""> </span></span><span data-dcnode-id="1146" instrument_node="">important framework and the necessary tools for the effective exercise of the UNHCR's supervisory function. They are summarised below:</span></p><span data-dcnode-id="1144" instrument_node=""> </span><p data-dcnode-id="1138"><span data-dcnode-id="1142" id="N66566" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1143" instrument_node=""> </span></span><span data-dcnode-id="1141" instrument_node=""> </span><span data-dcnode-id="1139" id="rqdi_0828-9999_2001_num_14_1_T2_0150_0000_1" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1140" instrument_node=""> </span></span></p><h5 data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">A. Monitoring</span></h5><span data-dcnode-id="1135" instrument_node=""> </span><p data-dcnode-id="1134"></p><span data-dcnode-id="1133" instrument_node=""> </span><p data-dcnode-id="1129"><span data-dcnode-id="1131" id="N66574" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1132" instrument_node=""> </span></span><span data-dcnode-id="1130" instrument_node="">The UNHCR is entitled to monitor and report on the situation of refugees and asylum-seekers and to follow up its interventions with states in this regard. Intervention includes making representations to governments and other relevant actors on protection concerns [1(g)]46.</span></p><span data-dcnode-id="1128" instrument_node=""> </span><p data-dcnode-id="1122"><span data-dcnode-id="1126" id="N66577" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1127" instrument_node=""> </span></span><span data-dcnode-id="1125" instrument_node=""> </span><span data-dcnode-id="1123" id="rqdi_0828-9999_2001_num_14_1_T2_0150_0000_2" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1124" instrument_node=""> </span></span></p><h5 data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">B. State reporting</span></h5><span data-dcnode-id="1119" instrument_node=""> </span><p data-dcnode-id="1118"></p><span data-dcnode-id="1117" instrument_node=""> </span><p data-dcnode-id="1113"><span data-dcnode-id="1115" id="N66585" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1116" instrument_node=""> </span></span><span data-dcnode-id="1114" instrument_node="">The UNHCR could follow up on the application and implementation of the 1951 Convention and 1967 Protocol as well as applicable regional instruments in various states parties to the 1951 Convention , including national practice and procedures for the recognition of refugee status, and submit a report to the Executive Committee on the subject [2(c)], Governments should co-operate with the UNHCR in matters relating to the implementation of the international refugee instruments [16(h)], In order to facilitate the UNHCR's supervisory role, they should provide information and statistical data concerning implementation [57 (preamble)].</span></p><span data-dcnode-id="1112" instrument_node=""> </span><p data-dcnode-id="1108"><span data-dcnode-id="1110" id="N66588" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1111" instrument_node=""> </span></span><span data-dcnode-id="1109" instrument_node="">The UNHCR was requested in 1989 to prepare a more detailed report on implementation of the 1951 Convention. The Executive Committee called upon states to facilitate this task, including through the timely provision to the UNHCR, when requested, of detailed information on implementation of the Convention in their respective countries [57(d), 61(1), 65(l)(m), 77(e), 79(f)]. Only 28 states replied to a questionnaire on implementation of the 1951 Convention and 1967 Protocol circulated by the UNHCR. In 1991, when the UNHCR submitted to the Executive Committee the interim report on implementation47, the Executive Committee requested the UNHCR to accord public access to states' replies to this questionnaire with the agreement of the states concerned [65(l)(m)]. In 1992, the Executive Committee called upon the UNHCR and all states to work together to strengthen implementation, through heightened promotional efforts, better monitoring arrangements and more harmonised application of the refugee definition criteria [68(c)]. In 1995, the Executive Committee reminded states parties to provide the High Commissioner with detailed information on the implementation of the Convention and urged those which had not complied with this undertaking to do so [77(e)],</span></p><span data-dcnode-id="1107" instrument_node=""> </span><p data-dcnode-id="1101"><span data-dcnode-id="1105" id="N66591" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1106" instrument_node=""> </span></span><span data-dcnode-id="1104" instrument_node=""> </span><span data-dcnode-id="1102" id="rqdi_0828-9999_2001_num_14_1_T2_0150_0000_3" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1103" instrument_node=""> </span></span></p><h5 data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">C. UNHCR access</span></h5><span data-dcnode-id="1098" instrument_node=""> </span><p data-dcnode-id="1097"></p><span data-dcnode-id="1096" instrument_node=""> </span><p data-dcnode-id="1092"><span data-dcnode-id="1094" id="N66599" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1095" instrument_node=""> </span></span><span data-dcnode-id="1093" instrument_node="">The UNHCR shall be given prompt and unhindered access to asylum applicants, refugees and returnees [22(111), 33(h), 72(b), 73(b)(iii), 77(q), 79(p)] and</span></p><span data-dcnode-id="1091" instrument_node=""> </span><span data-dcnode-id="1089" id="Noterqdi_0828-9999_2001_num_14_1_T2_0150_0000_4_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1090" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1086" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0150_0000_4" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">14</span></sup></a><span data-dcnode-id="1085" instrument_node=""> </span><hr data-dcnode-id="1084" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1082" id="rqdi_0828-9999_2001_num_14_1_T2_0151_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1083" instrument_node=""> </span></span><span data-dcnode-id="1081" instrument_node=""> </span><p data-dcnode-id="1077"><span data-dcnode-id="1079" id="N66617" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1080" instrument_node=""> </span></span><span data-dcnode-id="1078" instrument_node="">Unhcr 's Supervisory Responsibility</span></p><span data-dcnode-id="1076" instrument_node=""> </span><p data-dcnode-id="1072"><span data-dcnode-id="1074" id="N66620" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1075" instrument_node=""> </span></span><span data-dcnode-id="1073" instrument_node="">151</span></p><span data-dcnode-id="1071" instrument_node=""> </span><p data-dcnode-id="1067"><span data-dcnode-id="1069" id="N66623" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1070" instrument_node=""> </span></span><span data-dcnode-id="1068" instrument_node="">shall be allowed to supervise the well-being of persons entering reception centres, camps or other refugee settlements [22(111), 48(4)(d)]. The UNHCR may monitor the personal security of refugees and asylum-seekers and take appropriate action to prevent or redress violations thereof [72(e)],</span></p><span data-dcnode-id="1066" instrument_node=""> </span><p data-dcnode-id="1060"><span data-dcnode-id="1064" id="N66626" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1065" instrument_node=""> </span></span><span data-dcnode-id="1063" instrument_node=""> </span><span data-dcnode-id="1061" id="rqdi_0828-9999_2001_num_14_1_T2_0151_0000_1" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1062" instrument_node=""> </span></span></p><h5 data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">D. Right to contact the UNHCR</span></h5><span data-dcnode-id="1057" instrument_node=""> </span><p data-dcnode-id="1056"></p><span data-dcnode-id="1055" instrument_node=""> </span><p data-dcnode-id="1051"><span data-dcnode-id="1053" id="N66634" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1054" instrument_node=""> </span></span><span data-dcnode-id="1052" instrument_node="">Asylum applicants and refugees, including those being detained, shall be entitled to contact the UNHCR and should be duly informed of this right [8(e)(iv), 22 III, 44(g)],</span></p><span data-dcnode-id="1050" instrument_node=""> </span><p data-dcnode-id="1044"><span data-dcnode-id="1048" id="N66637" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1049" instrument_node=""> </span></span><span data-dcnode-id="1047" instrument_node=""> </span><span data-dcnode-id="1045" id="rqdi_0828-9999_2001_num_14_1_T2_0151_0000_2" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1046" instrument_node=""> </span></span></p><h5 data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">E. Participation in refugee status determination procedures</span></h5><span data-dcnode-id="1041" instrument_node=""> </span><p data-dcnode-id="1040"></p><span data-dcnode-id="1039" instrument_node=""> </span><p data-dcnode-id="1035"><span data-dcnode-id="1037" id="N66645" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1038" instrument_node=""> </span></span><span data-dcnode-id="1036" instrument_node="">The UNHCR may participate in various forms in procedures for determining refugee status [28(e)], It may be necessary for the UNHCR, with the consent of the authorities of the asylum country, to certify that a person is considered a refugee within the UNHCR mandate [35(e)],</span></p><span data-dcnode-id="1034" instrument_node=""> </span><p data-dcnode-id="1028"><span data-dcnode-id="1032" id="N66648" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1033" instrument_node=""> </span></span><span data-dcnode-id="1031" instrument_node=""> </span><span data-dcnode-id="1029" id="rqdi_0828-9999_2001_num_14_1_T2_0151_0000_3" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1030" instrument_node=""> </span></span></p><h5 data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">F. The UNHCR advisory services</span></h5><span data-dcnode-id="1025" instrument_node=""> </span><p data-dcnode-id="1024"></p><span data-dcnode-id="1023" instrument_node=""> </span><p data-dcnode-id="1019"><span data-dcnode-id="1021" id="N66656" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1022" instrument_node=""> </span></span><span data-dcnode-id="1020" instrument_node="">The UNHCR should provide constant advice on the practical application of the provisions of international refugee instruments by countries exposed to large-scale influx of refugees [19(d)], As for the application of the cessation clauses, the UNHCR should be appropriately involved [69 (preamble)]. It is considered important to maintain a constant dialogue on developing standards of protection with governments, non-governmental organisations and academic institutions and to fill lacunae in international refugee law, particularly regarding asylum-seekers and the physical protection of refugees and asylum-seekers [29(j)]. The fact that the UNHCR issued a Handbook relating to procedures and criteria for determining refugee status and that the UNHCR was asked to circulate significant decisions on the determination of refugee status is indicative of the UNHCR's role in any harmonisation process [8(g)].</span></p><span data-dcnode-id="1018" instrument_node=""> </span><p data-dcnode-id="1014"><span data-dcnode-id="1016" id="N66659" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1017" instrument_node=""> </span></span><span data-dcnode-id="1015" instrument_node="">In summary, it may be useful to consolidate the various elements of the UNHCR's supervisory role in a single conclusion of the Executive Committee and to identify practical suggestions to strengthen implementation of the UNHCR's supervisory function. Such a conclusion could also be used to clarify the UNHCR's supervisory role in relation to international conventions relating to stateless persons48.</span></p><span data-dcnode-id="1013" instrument_node=""> </span><span data-dcnode-id="1011" id="Noterqdi_0828-9999_2001_num_14_1_T2_0151_0000_4_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1012" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1008" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0151_0000_4" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">15</span></sup></a><span data-dcnode-id="1007" instrument_node=""> </span><hr data-dcnode-id="1006" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1004" id="rqdi_0828-9999_2001_num_14_1_T2_0152_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1005" instrument_node=""> </span></span><span data-dcnode-id="1003" instrument_node=""> </span><p data-dcnode-id="999"><span data-dcnode-id="1001" id="N66674" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1002" instrument_node=""> </span></span><span data-dcnode-id="1000" instrument_node="">152</span></p><span data-dcnode-id="998" instrument_node=""> </span><p data-dcnode-id="994"><span data-dcnode-id="996" id="N66677" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="997" instrument_node=""> </span></span><span data-dcnode-id="995" instrument_node="">(2001) 14.1 Revue québécoise de droit international</span></p><span data-dcnode-id="993" instrument_node=""> </span><p data-dcnode-id="987"><span data-dcnode-id="991" id="N66680" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="992" instrument_node=""> </span></span><span data-dcnode-id="990" instrument_node=""> </span><span data-dcnode-id="988" id="rqdi_0828-9999_2001_num_14_1_T2_0152_0000_2" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="989" instrument_node=""> </span></span></p><h4 data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">IX. State practice</span></h4><span data-dcnode-id="984" instrument_node=""> </span><p data-dcnode-id="983"></p><span data-dcnode-id="982" instrument_node=""> </span><p data-dcnode-id="978"><span data-dcnode-id="980" id="N66688" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="981" instrument_node=""> </span></span><span data-dcnode-id="979" instrument_node="">States' support of the various elements and tools of the UNHCR's supervisory responsibility has found an important expression in the Conclusions of the Executive Committee as summarised above. The aforementioned listing can therefore be considered to be a basic operational framework for the exercise of the UNHCR's supervisory role.</span></p><span data-dcnode-id="977" instrument_node=""> </span><p data-dcnode-id="973"><span data-dcnode-id="975" id="N66691" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="976" instrument_node=""> </span></span><span data-dcnode-id="974" instrument_node="">In terms of other expressions of state practice, notably in national legislation and administrative practice, obligations stemming from Article 35 of the 1951 Convention have primarily been implemented by involving the UNHCR in national refugee status determination procedures. The UNHCR has generally worked with states, offering its expertise as required, in order to ensure that procedures work effectively, taking into account the nature and scale of the refugee caseload, as well as the prevailing circumstances in the particular country concerned.</span></p><span data-dcnode-id="972" instrument_node=""> </span><p data-dcnode-id="968"><span data-dcnode-id="970" id="N66694" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="971" instrument_node=""> </span></span><span data-dcnode-id="969" instrument_node="">The role of the UNHCR in refugee status determination procedures can take different forms, ranging from membership in a status determination commission, to an advisory function whereby the UNHCR can express its views to the authorities that are making decisions at the first instance and/or appeal levels. In a number of countries, the UNHCR sits as an observer on the committee that advises the authority competent to determine refugee status49. In some states, a UNHCR representative is a member of the appeals commission that reviews decisions denying or withdrawing refugee status50.</span></p><span data-dcnode-id="967" instrument_node=""> </span><p data-dcnode-id="963"><span data-dcnode-id="965" id="N66697" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="966" instrument_node=""> </span></span><span data-dcnode-id="964" instrument_node="">The UNHCR's participation in the process of refugee status determination may contribute to a harmonisation of practices in applying the refugee definition. Although a number of states have found it appropriate to entrust the UNHCR with a substantive role in their determination procedures, in the UNHCR's view, it is neither necessary nor in line with its general functions to assume alone the decision-making responsibility51. Instead, a meaningful participatory role should be tailored to the country situation. In countries that have not acceded to international refugee instruments, the UNHCR has undertaken determination of refugee status under its own mandate.</span></p><span data-dcnode-id="962" instrument_node=""> </span><span data-dcnode-id="960" id="Noterqdi_0828-9999_2001_num_14_1_T2_0152_0000_3_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="961" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="957" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0152_0000_3" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">16</span></sup></a><span data-dcnode-id="956" instrument_node=""> </span><hr data-dcnode-id="955" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="953" id="rqdi_0828-9999_2001_num_14_1_T2_0153_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="954" instrument_node=""> </span></span><span data-dcnode-id="952" instrument_node=""> </span><p data-dcnode-id="948"><span data-dcnode-id="950" id="N66718" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="951" instrument_node=""> </span></span><span data-dcnode-id="949" instrument_node="">Unhcr 's Supervisory Responsibility</span></p><span data-dcnode-id="947" instrument_node=""> </span><p data-dcnode-id="943"><span data-dcnode-id="945" id="N66721" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="946" instrument_node=""> </span></span><span data-dcnode-id="944" instrument_node="">153</span></p><span data-dcnode-id="942" instrument_node=""> </span><p data-dcnode-id="938"><span data-dcnode-id="940" id="N66724" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="941" instrument_node=""> </span></span><span data-dcnode-id="939" instrument_node="">A quick survey of the various forms of UNHCR involvement in refugee status determination procedures leads to the conclusion that most countries foresee, at a minimum, an advisory-consultative role for the UNHCR. To perform this role, the UNHCR is, as a rule, notified of asylum applications, informed of the course of the procedure and has guaranteed access to files and decisions which may be taken up with the authorities, as appropriate52. The UNHCR is also entitled to submit its observations on cases should it deem so necessary53. Asylum applicants and refugees are generally granted access to the UNHCR and vice 'versa, either by law or administrative practice54. In some countries, the UNHCR is more substantially involved in special procedures at the airport or in expulsion or deportation procedures55. To ensure conformity with international refugee law and standards, the UNHCR is entitled to influence the legislative process and is generally requested to provide comments on and technical input into draft refugee legislation and related administrative decrees56.</span></p><span data-dcnode-id="937" instrument_node=""> </span><p data-dcnode-id="933"><span data-dcnode-id="935" id="N66727" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="936" instrument_node=""> </span></span><span data-dcnode-id="934" instrument_node="">Compared to other international involvement in national legal and administrative systems, the exercise of the UNHCR' s supervisory role is rather unique in this respect. In fact, it may be the only UN organisation that is directly involved in national law-making, national procedures and national decision-making. This is not to say that such involvement does not have its own sets of difficulties, such as the possibility of being perceived to be closely associated with government policies. Other problems concern a real or perceived lack of independence because of dependency on the funding of donor countries as well as operational obstacles hindering the implementation of certain aspects of supervision, for instance, through denial of access to refugees or inadequate involvement in the legislative process. These difficulties are, however, of a practical nature that would need to be addressed at the practical, operational level. It would be wrong to deduce from these problems a need to change the supervisory system as a whole. Before embarking on a discussion</span></p><span data-dcnode-id="932" instrument_node=""> </span><span data-dcnode-id="930" id="Noterqdi_0828-9999_2001_num_14_1_T2_0153_0000_1_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="931" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="927" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0153_0000_1" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">17</span></sup></a><span data-dcnode-id="926" instrument_node=""> </span><hr data-dcnode-id="925" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="923" id="rqdi_0828-9999_2001_num_14_1_T2_0154_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="924" instrument_node=""> </span></span><span data-dcnode-id="922" instrument_node=""> </span><p data-dcnode-id="918"><span data-dcnode-id="920" id="N66754" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="921" instrument_node=""> </span></span><span data-dcnode-id="919" instrument_node="">154</span></p><span data-dcnode-id="917" instrument_node=""> </span><p data-dcnode-id="913"><span data-dcnode-id="915" id="N66757" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="916" instrument_node=""> </span></span><span data-dcnode-id="914" instrument_node="">(2001) 14.1 Revue québécoise de droit international</span></p><span data-dcnode-id="912" instrument_node=""> </span><p data-dcnode-id="908"><span data-dcnode-id="910" id="N66760" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="911" instrument_node=""> </span></span><span data-dcnode-id="909" instrument_node="">about how to enhance the UNHCR's supervisory role, it is therefore crucial to acknowledge the achievements that have been made by involving an international institution in domestic legal and administrative contexts and to build any strengthening of the UNHCR's role around these achievements.</span></p><span data-dcnode-id="907" instrument_node=""> </span><p data-dcnode-id="901"><span data-dcnode-id="905" id="N66763" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="906" instrument_node=""> </span></span><span data-dcnode-id="904" instrument_node=""> </span><span data-dcnode-id="902" id="rqdi_0828-9999_2001_num_14_1_T2_0154_0000_1" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="903" instrument_node=""> </span></span></p><h4 data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">X. Possible areas for further discussion</span></h4><span data-dcnode-id="898" instrument_node=""> </span><p data-dcnode-id="897"></p><span data-dcnode-id="896" instrument_node=""> </span><p data-dcnode-id="892"><span data-dcnode-id="894" id="N66771" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="895" instrument_node=""> </span></span><span data-dcnode-id="893" instrument_node="">At the conceptual level, a number of initiatives have been taken over the past ten years to move the discussion forward. In response to the unsuccessful attempt to install a reporting mechanism by states parties on the implementation of their responsibilities under the applicable international refugee instruments, the Sub-Committee of the Whole on International Protection made a number of suggestions that were partly followed up in practice. The proposals ranged from a more regularised system of reporting, periodic meetings of states parties to review problems and progress with implementation, to harmonised regional processes for interpretation and application of the refugee instruments.</span></p><span data-dcnode-id="891" instrument_node=""> </span><p data-dcnode-id="887"><span data-dcnode-id="889" id="N66774" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="890" instrument_node=""> </span></span><span data-dcnode-id="888" instrument_node="">The debate was again taken forward by the informal consultations on measures to ensure international protection to all who need it. These so-called "gap-consultations" discussed, inter alia , the UNHCR's supervisory role and encouraged the UNHCR to use the existing legal framework and its own discretion to strengthen its supervisory responsibility, for instance, through enhanced dialogue with states and/or in terms of regular reporting to the Executive Committee or, through ECOSOC, to the General Assembly57.</span></p><span data-dcnode-id="886" instrument_node=""> </span><p data-dcnode-id="882"><span data-dcnode-id="884" id="N66777" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="885" instrument_node=""> </span></span><span data-dcnode-id="883" instrument_node="">In the context of the Global Consultations on International Protection, a number of concrete proposals were developed on the basis of a discussion paper prepared by Walter Kâlin and as a result of the Cambridge Expert Roundtable held in July 2001 58 . Kàlin's paper focused less on the UNHCR itself. It rather compared different models of international supervision and examined their potential relevance to the refugee law context, suggesting in essence a differentiation between the exercise of the UNHCR's supervisory role on the one hand and oversight mechanisms to be established by the states parties themselves, for instance, in the form of a "peer review" within the Executive Committee framework, on the other. The Cambridge Expert Roundtable discussed in some detail the pros and cons of various approaches, such as the appointment by the High Commissioner of expert advisers to assess implementation in relation to particular issues/situations or peer review mechanisms within and outside the Executive Committee framework. It remains to be seen how this will develop further, particularly in the context of discussions at the forthcoming Ministerial Meeting on the occasion of the 50th anniversary of the 1951 Convention , which will be held in Geneva on 12-13 December 2001.</span></p><span data-dcnode-id="881" instrument_node=""> </span><span data-dcnode-id="879" id="Noterqdi_0828-9999_2001_num_14_1_T2_0154_0000_2_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="880" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="876" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0154_0000_2" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">18</span></sup></a><span data-dcnode-id="875" instrument_node=""> </span><hr data-dcnode-id="874" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="872" id="rqdi_0828-9999_2001_num_14_1_T2_0155_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="873" instrument_node=""> </span></span><span data-dcnode-id="871" instrument_node=""> </span><p data-dcnode-id="867"><span data-dcnode-id="869" id="N66795" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="870" instrument_node=""> </span></span><span data-dcnode-id="868" instrument_node="">Unhcr 's Supervisory Responsibility</span></p><span data-dcnode-id="866" instrument_node=""> </span><p data-dcnode-id="862"><span data-dcnode-id="864" id="N66798" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="865" instrument_node=""> </span></span><span data-dcnode-id="863" instrument_node="">155</span></p><span data-dcnode-id="861" instrument_node=""> </span><p data-dcnode-id="857"><span data-dcnode-id="859" id="N66801" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="860" instrument_node=""> </span></span><span data-dcnode-id="858" instrument_node="">This paper has set out the basic framework for the exercise of the UNHCR's supervisory responsibility. Four areas have emerged as subjects requiring further examination in the context of the various discussions concerning the strengthening of the UNHCR's supervisory role. In essence, these are: (i) differing interpretation regarding the content/ application of provisions of the international refugee instruments, standards and principles; (ii) state reporting as a whole; (iii) the question of institutionalising a constructive dialogue with states parties to the international refugee instruments on their implementation at regular intervals; and (iv) measures of enforcement59.</span></p><span data-dcnode-id="856" instrument_node=""> </span><p data-dcnode-id="852"><span data-dcnode-id="854" id="N66804" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="855" instrument_node=""> </span></span><span data-dcnode-id="853" instrument_node="">Based on these four areas, the following paragraphs set out the current state of debate and examine a number of suggestions60 that could be considered further:</span></p><span data-dcnode-id="851" instrument_node=""> </span><p data-dcnode-id="845"><span data-dcnode-id="849" id="N66807" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="850" instrument_node=""> </span></span><span data-dcnode-id="848" instrument_node=""> </span><span data-dcnode-id="846" id="rqdi_0828-9999_2001_num_14_1_T2_0155_0000_1" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="847" instrument_node=""> </span></span></p><h5 data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">A. What happens when a conflict arises between the UNHCR's assessment and those of a state concerning the application of provisions of the international refugee instruments ?</span></h5><span data-dcnode-id="842" instrument_node=""> </span><p data-dcnode-id="841"></p><span data-dcnode-id="840" instrument_node=""> </span><p data-dcnode-id="836"><span data-dcnode-id="838" id="N66815" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="839" instrument_node=""> </span></span><span data-dcnode-id="837" instrument_node="">An important way to resolve differences of interpretation on disputed concepts is the UNHCR's active and meaningful involvement in regional harmonisation efforts. This may, however, not be adequate, particularly in regions with no regional harmonisation processes. Borrowing from the human rights treaty monitoring bodies, it would be possible for the UNHCR to issue' general comments on the interpretation of provisions of the international refugee instruments and disseminated its legal positions on a formalised basis (as UN documents). It is doubtful, though, whether a more formalised publication of legal positions would resolve the question of establishing the UNHCR as the ultimate legal authority for interpreting the provisions of the international refugee instruments.</span></p><span data-dcnode-id="835" instrument_node=""> </span><p data-dcnode-id="829"><span data-dcnode-id="833" id="N66818" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="834" instrument_node=""> </span></span><span data-dcnode-id="832" instrument_node=""> </span><span data-dcnode-id="830" id="rqdi_0828-9999_2001_num_14_1_T2_0155_0000_2" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="831" instrument_node=""> </span></span></p><h5 data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">B. Would it be useful to regularise a system of periodic reporting on implementation of the international refugee instruments and an ensuing assessment of these reports by the UNHCR on a more structured basis ?</span></h5><span data-dcnode-id="826" instrument_node=""> </span><p data-dcnode-id="825"></p><span data-dcnode-id="824" instrument_node=""> </span><p data-dcnode-id="820"><span data-dcnode-id="822" id="N66826" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="823" instrument_node=""> </span></span><span data-dcnode-id="821" instrument_node="">An interesting idea that has been put forward in this connection is the organisation of periodic meetings of states parties to review problems and progress on implementation61. Alternatively, the UNHCR could request specific information on an ad hoc basis as regards the implementation of specific articles of the international</span></p><span data-dcnode-id="819" instrument_node=""> </span><span data-dcnode-id="817" id="Noterqdi_0828-9999_2001_num_14_1_T2_0155_0000_3_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="818" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="814" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0155_0000_3" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">19</span></sup></a><span data-dcnode-id="813" instrument_node=""> </span><hr data-dcnode-id="812" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="810" id="rqdi_0828-9999_2001_num_14_1_T2_0156_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="811" instrument_node=""> </span></span><span data-dcnode-id="809" instrument_node=""> </span><p data-dcnode-id="805"><span data-dcnode-id="807" id="N66847" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="808" instrument_node=""> </span></span><span data-dcnode-id="806" instrument_node="">156</span></p><span data-dcnode-id="804" instrument_node=""> </span><p data-dcnode-id="800"><span data-dcnode-id="802" id="N66850" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="803" instrument_node=""> </span></span><span data-dcnode-id="801" instrument_node="">(2001) 14.1 Revue québécoise de droit international</span></p><span data-dcnode-id="799" instrument_node=""> </span><p data-dcnode-id="795"><span data-dcnode-id="797" id="N66853" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="798" instrument_node=""> </span></span><span data-dcnode-id="796" instrument_node="">refugee instruments. Whatever form the reporting procedure took, it would be essential for it to strike a balance between the need to be independent and the UNHCR's actual dependence on donor countries. It would also need to strike a balance between the need for the UNHCR to maintain credibility and ensure norm compliance by states on the one hand and continued co-operation by states on the other.</span></p><span data-dcnode-id="794" instrument_node=""> </span><p data-dcnode-id="790"><span data-dcnode-id="792" id="N66856" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="793" instrument_node=""> </span></span><span data-dcnode-id="791" instrument_node="">The options below and any variations thereof as regards reporting procedures could, for instance, be discussed further:</span></p><span data-dcnode-id="789" instrument_node=""> </span><p data-dcnode-id="785"><span data-dcnode-id="787" id="N66859" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="788" instrument_node=""> </span></span><span data-dcnode-id="786" instrument_node="">-States parties to the international refugee conventions would report at regular intervals on legislative, judicial, administrative or other measures they have taken to give effect to the provisions of these instruments following a questionnaire that specifies the information to be supplied. States would be required to publish their initial reports. The UNHCR would examine whether the state's law and practices agree with or differ from the provisions and standards of the relevant international instruments. In doing so, the UNHCR may also consider responses to the report submitted by NGOs, individuals and other states. The IJNHCR would make a preliminary report, which would be discussed with the authorities of the state concerned in a confidential manner. The IJNHCR would conclude its evaluation after this discussion, make recommendations and send its report to the state which would be given reasonable time to respond. The UNHCR would include its concluding observations and recommendations together with any state response in its report to the General Assembly. The state in question would be required to report on the implementation of the recommendations within a given timeframe. This proposal may be rather straightforward and in line with other known reporting mechanisms, but it is also important to bear in mind that state reporting has only worked to a limited extent and often not necessarily improved implementation effectively. As described earlier, there have been various attempts on the part of the UNHCR and its Executive Committee to establish a procedure, without much success. States appear reluctant to take on another reporting obligation.</span></p><span data-dcnode-id="784" instrument_node=""> </span><p data-dcnode-id="780"><span data-dcnode-id="782" id="N66862" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="783" instrument_node=""> </span></span><span data-dcnode-id="781" instrument_node="">-If state reporting in the above form is not considered viable, a more formal direct supervisory mechanism initiated by the UNHCR could perhaps be feasible. Such a direct monitoring system, which the UNHCR offices to some extent already perform all over the world, could be based on systematic monitoring studies undertaken by the UNHCR at regular intervals. It could, for instance, be conceived that a UNHCR monitoring team would visit a state to discuss its policies, to review legal provisions, administrative decrees and decisions and state practice as a whole in the area of refugee protection. Whilst the local UNHCR office would act as Secretariat, NGOs, other states and individuals would be entitled to submit their views. The UNHCR team would then deliver a "reasoned opinion" on the state's compliance with international refugee law and standards and provide recommendations. This opinion would, first, be discussed confidentially with the government. The UNHCR team would conclude its evaluation after this discussion, make precise concluding recommendations and send its report to the state which would be given reasonable time to respond. Finally, the UNHCR would include the</span></p><span data-dcnode-id="779" instrument_node=""> </span><hr data-dcnode-id="778" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="776" id="rqdi_0828-9999_2001_num_14_1_T2_0157_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="777" instrument_node=""> </span></span><span data-dcnode-id="775" instrument_node=""> </span><p data-dcnode-id="771"><span data-dcnode-id="773" id="N66869" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="774" instrument_node=""> </span></span><span data-dcnode-id="772" instrument_node="">Unhcr 's Supervisory Responsibility</span></p><span data-dcnode-id="770" instrument_node=""> </span><p data-dcnode-id="766"><span data-dcnode-id="768" id="N66872" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="769" instrument_node=""> </span></span><span data-dcnode-id="767" instrument_node="">157</span></p><span data-dcnode-id="765" instrument_node=""> </span><p data-dcnode-id="761"><span data-dcnode-id="763" id="N66875" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="764" instrument_node=""> </span></span><span data-dcnode-id="762" instrument_node="">concluding observations and recommendations together with any state response in its report to the General Assembly. The state in question would subsequently report on the implementation of the recommendations within a given timeframe.</span></p><span data-dcnode-id="760" instrument_node=""> </span><p data-dcnode-id="756"><span data-dcnode-id="758" id="N66878" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="759" instrument_node=""> </span></span><span data-dcnode-id="757" instrument_node="">-In a variation of the above procedure, it has also been suggested that an advisory group of independent experts be appointed by the High Commissioner (perhaps in consultation with the Executive Committee)62. The independent experts would be required to carry out their task with discretion, objectivity and independence and fulfil the functions foreseen by the UNHCR monitoring team (as under bb). The full independence of such a group would have a particularly positive effect on the "review process". Alternatively, surveys regarding the implementation of the 1951 Convention/ 1 967 Protocol or the appointment by the High Commissioner of special experts or of a working group on certain themes, countries or regions could be other similar measures of supervision in this regard. This might have the benefit of providing a broader approach that did not "point the finger" at a single state.</span></p><span data-dcnode-id="755" instrument_node=""> </span><p data-dcnode-id="751"><span data-dcnode-id="753" id="N66881" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="754" instrument_node=""> </span></span><span data-dcnode-id="752" instrument_node="">-Another possibility could be the development of an institutionalised dialogue on the basis of the annual protection reporting exercise undertaken by the UNHCR which could be made accessible to governments and eventually also the public. Every year, the UNHCR offices are required to carry out a thorough review of national state practice on the basis of a detailed questionnaire. This information assists the UNHCR generally in monitoring compliance with the international refugee instruments. A more systematic use of this reporting process could be useful to ensure compliance. In this case, UNHCR offices would prepare the report on an annual basis. They would submit the report to their government counterparts for comments within a certain timeframe. In the course of a "constructive dialogue" with the government, the local UNHCR office would elaborate specific concluding observations/general comments on this process and make recommendations, including offers for advisory services and technical assistance. This information could be used in the UNHCR' s annual reporting to the Executive Committee and to the General Assembly.</span></p><span data-dcnode-id="750" instrument_node=""> </span><p data-dcnode-id="744"><span data-dcnode-id="748" id="N66884" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="749" instrument_node=""> </span></span><span data-dcnode-id="747" instrument_node=""> </span><span data-dcnode-id="745" id="rqdi_0828-9999_2001_num_14_1_T2_0157_0000_1" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="746" instrument_node=""> </span></span></p><h5 data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">C. Are there other effective instruments of supervision that would ensure compliance by States with their international obligations ?</span></h5><span data-dcnode-id="741" instrument_node=""> </span><p data-dcnode-id="740"></p><span data-dcnode-id="739" instrument_node=""> </span><p data-dcnode-id="735"><span data-dcnode-id="737" id="N66892" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="738" instrument_node=""> </span></span><span data-dcnode-id="736" instrument_node="">It could be considered, for instance, that an optional protocol to the J 951 Convention be drafted, granting individuals or groups a right to submit communications to the UNHCR concerning non-compliance with the Convention and the UNHCR to pronounce itself on violations ascertained. This, however, could lead to a fragmentation of the Convention regime in that it would be up to each state individually to opt for and accept such an enforcement mechanism.</span></p><span data-dcnode-id="734" instrument_node=""> </span><p data-dcnode-id="730"><span data-dcnode-id="732" id="N66895" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="733" instrument_node=""> </span></span><span data-dcnode-id="731" instrument_node="">These issues illustrate the complexity of the subject and show that a ready-made, full-fledged model does not easily come to mind. Discussions concerning the way forward require great care in order not to upset what has already been achieved.</span></p><span data-dcnode-id="729" instrument_node=""> </span><span data-dcnode-id="727" id="Noterqdi_0828-9999_2001_num_14_1_T2_0157_0000_2_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="728" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="724" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0157_0000_2" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">20</span></sup></a><span data-dcnode-id="723" instrument_node=""> </span><hr data-dcnode-id="722" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="720" id="rqdi_0828-9999_2001_num_14_1_T2_0158_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="721" instrument_node=""> </span></span><span data-dcnode-id="719" instrument_node=""> </span><p data-dcnode-id="715"><span data-dcnode-id="717" id="N66910" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="718" instrument_node=""> </span></span><span data-dcnode-id="716" instrument_node="">158</span></p><span data-dcnode-id="714" instrument_node=""> </span><p data-dcnode-id="710"><span data-dcnode-id="712" id="N66913" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="713" instrument_node=""> </span></span><span data-dcnode-id="711" instrument_node="">(2001) 14.1 Revue québécoise de droit international</span></p><span data-dcnode-id="709" instrument_node=""> </span><p data-dcnode-id="705"><span data-dcnode-id="707" id="N66916" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="708" instrument_node=""> </span></span><span data-dcnode-id="706" instrument_node="">* * *</span></p><span data-dcnode-id="704" instrument_node=""> </span><p data-dcnode-id="700"><span data-dcnode-id="702" id="N66919" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="703" instrument_node=""> </span></span><span data-dcnode-id="701" instrument_node="">The UNHCR's supervisory responsibility is a specific emanation of the UNHCR's international protection function that is directly linked to ensuring a principled application of existing treaty obligations. The rationale behind this role is that supervision by an international organisation is indispensable for a functioning, predictable and credible framework of international co-operation and to ensure the proper functioning of such a system. In the context of refugee protection, it is important to ensure the resolution of refugee problems and harmonisation of international refugee law on the basis of objective evaluations and judgements.</span></p><span data-dcnode-id="699" instrument_node=""> </span><p data-dcnode-id="695"><span data-dcnode-id="697" id="N66922" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="698" instrument_node=""> </span></span><span data-dcnode-id="696" instrument_node="">The UNHCR has adopted a certain organisational practice, which aims at realising this objective and basic function without jeopardising operational effectiveness on the ground. This practice has, generally, met with the acquiescence of states whose cooperation is a necessary pre-condition for the exercise of any supervisory function. The practice, coupled with states' acceptance, also forms the backdrop to the basic framework of the UNHCR's supervisory role. It needs to be consolidated and strengthened. In developing supervision further, it is crucial to bear in mind the lessons learned from the human rights mechanisms where the proliferation of different supervisory mechanisms has led to duplication, compartmentalisation and coordination problems, thus undermining their effectiveness. This must be avoided in the refugee context. Whatever further model or mechanism finally emerges in the area of refugee protection, it will need to build on the existing structure (which is the UNHCR) and advance the achievements that have already been made.</span></p><span data-dcnode-id="694" instrument_node=""> </span><p data-dcnode-id="690"><span data-dcnode-id="692" id="N66925" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="693" instrument_node=""> </span></span><span data-dcnode-id="691" instrument_node="">Against this background, the Global Consultations on International Protection which were launched in 2000 to revitalise the international refugee protection regime will provide an opportunity to take this debate further in the interest of effective and principled refugee protection.</span></p><span data-dcnode-id="689" instrument_node=""> </span></div><div class="notes" data-dcnode-id="119" xmlns:html="http://www.w3.org/1999/xhtml"><hr data-dcnode-id="687"><h3 class="noteHeading" data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Notes</span></h3><div class="note" data-dcnode-id="645"><span data-dcnode-id="683" id="Noterqdi_0828-9999_2001_num_14_1_T2_0136_0000_2"><span data-dcnode-id="684" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">1. </span></span><div class="noteBody" data-dcnode-id="649"><span data-dcnode-id="680" instrument_node=""> </span><p data-dcnode-id="676"><span data-dcnode-id="678" id="N65970"><span data-dcnode-id="679" instrument_node=""> </span></span><span data-dcnode-id="677" instrument_node="">' See . UN GA , Res. 1 946, A/45 </span></p><span data-dcnode-id="675" instrument_node=""> </span><p data-dcnode-id="671"><span data-dcnode-id="673" id="N65973"><span data-dcnode-id="674" instrument_node=""> </span></span><span data-dcnode-id="672" instrument_node="">2 See E.J. Lentini,«The Definition of Refugees in International Law : Proposals for the Future» (1985) 6 Boston College Third World Law Journal, p. 195 </span></p><span data-dcnode-id="670" instrument_node=""> </span><p data-dcnode-id="666"><span data-dcnode-id="668" id="N65976"><span data-dcnode-id="669" instrument_node=""> </span></span><span data-dcnode-id="667" instrument_node="">3 See Doc. off. E/SCP/54 and EC/1992/SCP/CRP.10. </span></p><span data-dcnode-id="665" instrument_node=""> </span><p data-dcnode-id="661"><span data-dcnode-id="663" id="N65979"><span data-dcnode-id="664" instrument_node=""> </span></span><span data-dcnode-id="662" instrument_node="">4 See, for instance, Saul Takahashi, "Effective Monitoring of the Refugee Convention", paper presented at The Refugee Convention 50 Years On ; Critical Perspectives, Future Prospects II, International Studies Association conference, Chicago, February 2001 ; Amnesty International, Refugees : Human Rights have no Borders , Recommendation 11, 1997 ; Canadian Council for Refugees, 'Brief on the Occasion of the 50U| Session of the Executive Committee of the UHCR, October 1999. </span></p><span data-dcnode-id="660" instrument_node=""> </span><p data-dcnode-id="656"><span data-dcnode-id="658" id="N65982"><span data-dcnode-id="659" instrument_node=""> </span></span><span data-dcnode-id="657" instrument_node="">5 See Walter Kalin, "Supervising the 1951 Convention on the Status of Refugees : Article 35 and Beyond", background paper commissioned by UNHCR ; concluding observations of the Cambridge Expert Roundtable organised by UNHCR and the Lauterpacht Research Centre for International Law, 9-10 July 2001 (both available on UNHCR's Global Consultations website, http ://www.unhcr.ch/issues/asvlum/globalconsult/main.htm) </span></p><span data-dcnode-id="655" instrument_node=""> </span><p data-dcnode-id="651"><span data-dcnode-id="653" id="N65985"><span data-dcnode-id="654" instrument_node=""> </span></span><span data-dcnode-id="652" instrument_node="">6 For more information see A.F. Bayefsky,ed., The UN Human Rights Treaty System : Universality at the Crossroads (The Hague, Kluwer Law International, 2000) and P. Alston and J. Crawford, eds., The Future of UN Human Rights Treaty Monitoring (Cambridge, Cambridge University Press, 2000). </span></p><span data-dcnode-id="650" instrument_node=""> </span></div><span data-dcnode-id="648" instrument_node=""> </span><a class="link_return" data-dcnode-id="646" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0136_0000_2_return" title="Go back to text"><span data-dcnode-id="647" instrument_node="">↵</span></a></div><div class="note" data-dcnode-id="575"><span data-dcnode-id="643" id="Noterqdi_0828-9999_2001_num_14_1_T2_0137_0000_2"><span data-dcnode-id="644" instrument_node=""> </span></span><span class="noteLabel" data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">2. </span></span><div class="noteBody" data-dcnode-id="579"><span data-dcnode-id="640" instrument_node=""> </span><p data-dcnode-id="636"><span data-dcnode-id="638" id="N66020"><span data-dcnode-id="639" instrument_node=""> </span></span><span data-dcnode-id="637" instrument_node="">7 For instance, in the context of voluntary repatriation, the Executive Committee has clarified UNHCR's monitoring responsibilities, particularly in its Conclusion No. 40. </span></p><span data-dcnode-id="635" instrument_node=""> </span><p data-dcnode-id="631"><span data-dcnode-id="633" id="N66023"><span data-dcnode-id="634" instrument_node=""> </span></span><span data-dcnode-id="632" instrument_node="">8 See in particular paragraph 8 of the Statute, which sets out in more detail the function of international protection : </span></p><span data-dcnode-id="630" instrument_node=""> </span><p data-dcnode-id="626"><span data-dcnode-id="628" id="N66026"><span data-dcnode-id="629" instrument_node=""> </span></span><span data-dcnode-id="627" instrument_node="">The High Commissioner shall provide for the protection of refugees falling under the competence of his Office by : </span></p><span data-dcnode-id="625" instrument_node=""> </span><p data-dcnode-id="621"><span data-dcnode-id="623" id="N66029"><span data-dcnode-id="624" instrument_node=""> </span></span><span data-dcnode-id="622" instrument_node="">(a) Promoting the conclusion and ratification of international conventions for the protection of refugees, supervising their application and proposing amendments thereto ; </span></p><span data-dcnode-id="620" instrument_node=""> </span><p data-dcnode-id="616"><span data-dcnode-id="618" id="N66032"><span data-dcnode-id="619" instrument_node=""> </span></span><span data-dcnode-id="617" instrument_node="">(b) Promoting through special agreements with governments the execution of any measures calculated to improve the situation of refugees and to reduce the number requiring protection ; </span></p><span data-dcnode-id="615" instrument_node=""> </span><p data-dcnode-id="611"><span data-dcnode-id="613" id="N66035"><span data-dcnode-id="614" instrument_node=""> </span></span><span data-dcnode-id="612" instrument_node="">(c) Assisting governmental and private efforts to promote voluntary repatriation or assimilation within new national communities ; </span></p><span data-dcnode-id="610" instrument_node=""> </span><p data-dcnode-id="606"><span data-dcnode-id="608" id="N66038"><span data-dcnode-id="609" instrument_node=""> </span></span><span data-dcnode-id="607" instrument_node="">(d) Promoting the admission of refugees, not excluding those in the most destitute categories, to the territories of States ; </span></p><span data-dcnode-id="605" instrument_node=""> </span><p data-dcnode-id="601"><span data-dcnode-id="603" id="N66041"><span data-dcnode-id="604" instrument_node=""> </span></span><span data-dcnode-id="602" instrument_node="">(e) Endeavouring to obtain permission for refugees to transfer their assets and especially those necessary for their resettlement ; </span></p><span data-dcnode-id="600" instrument_node=""> </span><p data-dcnode-id="596"><span data-dcnode-id="598" id="N66044"><span data-dcnode-id="599" instrument_node=""> </span></span><span data-dcnode-id="597" instrument_node="">(f) Obtaining from governments information concerning the number and conditions of refugees in their territories and the laws and regulations concerning them ; </span></p><span data-dcnode-id="595" instrument_node=""> </span><p data-dcnode-id="591"><span data-dcnode-id="593" id="N66047"><span data-dcnode-id="594" instrument_node=""> </span></span><span data-dcnode-id="592" instrument_node="">(g) Keeping in close touch with the governments and intergovernmental organizations concerned ; </span></p><span data-dcnode-id="590" instrument_node=""> </span><p data-dcnode-id="586"><span data-dcnode-id="588" id="N66050"><span data-dcnode-id="589" instrument_node
