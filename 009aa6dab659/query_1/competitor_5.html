guageId%3Dfr_FR%26b%3D6205%26t%3D1452609384000&amp;raw" rel="stylesheet" type="text/css"><span data-dcnode-id="2638" instrument_node=""> </span><link data-dcnode-id="2637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/lightbox2/2.9.0/css/lightbox.min.css&amp;raw" rel="stylesheet" type="text/css"><span data-dcnode-id="2636" instrument_node=""> </span><link data-dcnode-id="2635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css&amp;raw" rel="stylesheet" type="text/css"><span data-dcnode-id="2634" instrument_node=""> </span><span data-dcnode-id="2630" instrument_node=""> </span><span data-dcnode-id="2628" instrument_node=""> </span><span data-dcnode-id="2625" instrument_node=""> </span><span data-dcnode-id="2622" instrument_node=""> </span><span data-dcnode-id="2620" instrument_node=""> </span><link data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persee.fr/doc/rqdi_0828-9999_2001_num_14_1_2018&amp;raw" rel="canonical"><span data-dcnode-id="2618" instrument_node=""> </span><link data-dcnode-id="2617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//purl.org/dc/elements/1.1/&amp;raw" rel="schema.DC"><span data-dcnode-id="2616" instrument_node=""> </span><meta content="https://www.persee.fr/doc/rqdi_0828-9999_2001_num_14_1_2018" data-dcnode-id="2615" name="URL"><span data-dcnode-id="2614" instrument_node=""> </span><meta content="rqdi_0828-9999_2001_num_14_1_2018" data-dcnode-id="2613" name="DC.identifier"><span data-dcnode-id="2612" instrument_node=""> </span><meta content="UNHCR 's Supervisory Responsibility" data-dcnode-id="2611" name="DC.title"><span data-dcnode-id="2610" instrument_node=""> </span><meta content="article" data-dcnode-id="2609" name="DC.type"><span data-dcnode-id="2608" instrument_node=""> </span><meta content="eng" data-dcnode-id="2607" name="DC.language"><span data-dcnode-id="2606" instrument_node=""> </span><meta content="free" data-dcnode-id="2605" name="DC.rights"><span data-dcnode-id="2604" instrument_node=""> </span><meta content="Persée - Portail des revues scientifiques en SHS" data-dcnode-id="2603" name="DC.publisher"><span data-dcnode-id="2602" instrument_node=""> </span><meta content="rqdi_0828-9999_2001_num_14_1" data-dcnode-id="2601" name="DC.isPartOf"><span data-dcnode-id="2600" instrument_node=""> </span><meta content="2001" data-dcnode-id="2599" name="DC.date"><span data-dcnode-id="2598" instrument_node=""> </span><meta content="0828-9999" data-dcnode-id="2597" name="DC.isPartOf"><span data-dcnode-id="2596" instrument_node=""> </span><meta content="Revue québécoise de droit international" data-dcnode-id="2595" name="DC.isPartOf"><span data-dcnode-id="2594" instrument_node=""> </span><meta content="Türk, Volker" data-dcnode-id="2593" name="DC.creator"><span data-dcnode-id="2592" instrument_node=""> </span><meta content="La Convention de 1951 et son Protocole de 1967 ont créé le HCR en tant qu'organisation internationale ayant le mandat de fournir une protection internationale aux réfugies en supervisant, entre autres, l'application de ce régime juridique international. Le HCR peut ainsi mettre en place des procédures afin de s'assurer du bon fonctionnement de l'ordre juridique en obligeant les états signataires à respecter les obligations qui leur incombent. Cet article a pour but de décrire le rôle de supervision du HCR dans le contexte plus large de son mandat international, d'analyser son contenu et d'entrevoir les voies possibles afin de renforcer et de développer ce rôle." data-dcnode-id="2591" lang="fr" name="DC.description"><span data-dcnode-id="2590" instrument_node=""> </span><meta content="The 1951 Convention and its 1967 Protocol created UNHCR as the international institution mandated to provide international protection to refugees, inter alia by supervising the application of this international legal regime. Supervision is defined as a legal process that empowers authorized institutions to apply certain procedures to assure the proper functioning of the legal order by inducing subjects to observe obligations incumbent on them. This paper describes UNHCR's supervisory role within the broader context of its international mandate, analyses its content and proposes possible avenues that could be developed to enhance that role. The author points out that in the context of refugee protection, it is important to ensure the resolution of refugee problems and harmonization of international refugee law on the basis of objective evaluations and judgments." data-dcnode-id="2589" lang="en" name="DC.description"><span data-dcnode-id="2588" instrument_node=""> </span><meta content="UNHCR 's Supervisory Responsibility" data-dcnode-id="2587" name="citation_title"><span data-dcnode-id="2586" instrument_node=""> </span><meta content="135" data-dcnode-id="2585" name="citation_firstpage"><span data-dcnode-id="2584" instrument_node=""> </span><meta content="158" data-dcnode-id="2583" name="citation_lastpage"><span data-dcnode-id="2582" instrument_node=""> </span><meta content="https://www.persee.fr/docAsPDF/rqdi_0828-9999_2001_num_14_1_2018.pdf" data-dcnode-id="2581" name="citation_pdf_url"><span data-dcnode-id="2580" instrument_node=""> </span><meta content="https://www.persee.fr/doc/rqdi_0828-9999_2001_num_14_1_2018" data-dcnode-id="2579" name="rft_id"><span data-dcnode-id="2578" instrument_node=""> </span><meta content="Revue québécoise de droit international" data-dcnode-id="2577" name="citation_journal_title"><span data-dcnode-id="2576" instrument_node=""> </span><meta content="2001" data-dcnode-id="2575" name="citation_year"><span data-dcnode-id="2574" instrument_node=""> </span><meta content="14" data-dcnode-id="2573" name="citation_volume"><span data-dcnode-id="2572" instrument_node=""> </span><meta content="1" data-dcnode an data-dcnode-id="2071" instrument_node=""> </span><div class="document-details-content tab-content hide" data-dcnode-id="2034" hidden="true" style="display: none;"><span data-dcnode-id="2070" instrument_node=""> </span><div aria-labelledby="yui_patched_v3_11_0_1_1650834653448_257" class="tab-pane active" data-dcnode-id="2036" id="doc-cite" role="tabpanel"><span data-dcnode-id="2069" instrument_node=""> </span><p data-dcnode-id="2064"><span data-dcnode-id="2068" instrument_node=""> Türk Volker. UNHCR 's Supervisory Responsibility. In: </span><em data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Revue Québécoise de droit international</span></em><span data-dcnode-id="2065" instrument_node="">, volume 14-1, 2001. Cinquantenaire de la Convention de Genève sur les réfugiés, sous la direction de Michael Barutciski . pp. 135-158.</span></p><span data-dcnode-id="2063" instrument_node=""> </span><p data-dcnode-id="2059"><span data-dcnode-id="2062" instrument_node=""> </span><a data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persee.fr/doc/rqdi_0828-9999_2001_num_14_1_2018"><span data-dcnode-id="2061" instrument_node=""> www.persee.fr/doc/rqdi_0828-9999_2001_num_14_1_2018</span></a></p><span data-dcnode-id="2058" instrument_node=""> </span><ul class="export-bib-refs" data-dcnode-id="2038"><span data-dcnode-id="2057" instrument_node=""> </span><li data-dcnode-id="2052"><span data-dcnode-id="2056" instrument_node=""> </span><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persee.fr/docAsBibTex/rqdi_0828-9999_2001_num_14_1_2018.bib"><span data-dcnode-id="2055" instrument_node=""> BibTex</span></a><span data-dcnode-id="2053" instrument_node=""> </span></li><span data-dcnode-id="2051" instrument_node=""> </span><li data-dcnode-id="2046"><span data-dcnode-id="2050" instrument_node=""> </span><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refworks.com/express/ExpressImport.asp%3Fvendor%3DPersee%26filter%3DRefWorks%25252520Tagged%25252520Format%26encoding%3D65001%26url%3Dhttps%3A//www.persee.fr/docAsRefworks/rqdi_0828-9999_2001_num_14_1_2018.ris" target="RefWorksMain"><span data-dcnode-id="2049" instrument_node=""> RefWorks</span></a><span data-dcnode-id="2047" instrument_node=""> </span></li><span data-dcnode-id="2045" instrument_node=""> </span><li data-dcnode-id="2040"><span data-dcnode-id="2044" instrument_node=""> </span><a data-dcnode-id="2042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.persee.fr/docAsRIS/rqdi_0828-9999_2001_num_14_1_2018.ris"><span data-dcnode-id="2043" instrument_node=""> RIS (ProCite, Endnote, ...)</span></a><span data-dcnode-id="2041" instrument_node=""> </span></li><span data-dcnode-id="2039" instrument_node=""> </span></ul><span data-dcnode-id="2037" instrument_node=""> </span></div><span data-dcnode-id="2035" instrument_node=""> </span></div><span data-dcnode-id="2033" instrument_node=""> </span></div></div><span data-dcnode-id="2030" instrument_node=""> </span></div><span data-dcnode-id="2028" instrument_node=""> </span><div class="tab-content-container" data-dcnode-id="114" id="doc-content"><span data-dcnode-id="2027" instrument_node=""> </span><div class="tab-content-item-content" data-dcnode-id="116" data-display-mode="image" id="page-container"><span data-dcnode-id="2026" instrument_node=""> </span><div data-dcnode-id="118"><span data-dcnode-id="2024" instrument_node=""> </span><div class="abstract" data-dcnode-id="2015" id="front.1_div.1" xml:lang="eng"><h3 data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Résumé (eng)</span></h3><span data-dcnode-id="2021" instrument_node=""> </span><p data-dcnode-id="2017"><span data-dcnode-id="2019" id="N65725" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="2020" instrument_node=""> </span></span><span data-dcnode-id="2018" instrument_node="">The 1951 Convention and its 1967 Protocol created UNHCR as the international institution mandated to provide international protection to refugees, inter alia by supervising the application of this international legal regime. Supervision is defined as a legal process that empowers authorized institutions to apply certain procedures to assure the proper functioning of the legal order by inducing subjects to observe obligations incumbent on them. This paper describes UNHCR's supervisory role within the broader context of its international mandate, analyses its content and proposes possible avenues that could be developed to enhance that role. The author points out that in the context of refugee protection, it is important to ensure the resolution of refugee problems and harmonization of international refugee law on the basis of objective evaluations and judgments.</span></p><span data-dcnode-id="2016" instrument_node=""> </span></div><span data-dcnode-id="2014" instrument_node=""> </span><div class="abstract" data-dcnode-id="2005" id="front.1_div.2" xml:lang="fre"><h3 data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Résumé (fre)</span></h3><span data-dcnode-id="2011" instrument_node=""> </span><p data-dcnode-id="2007"><span data-dcnode-id="2009" id="N65733" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="2010" instrument_node=""> </span></span><span data-dcnode-id="2008" instrument_node="">La Convention de 1951 et son Protocole de 1967 ont créé le HCR en tant qu'organisation internationale ayant le mandat de fournir une protection internationale aux réfugies en supervisant, entre autres, l'application de ce régime juridique international. Le HCR peut ainsi mettre en place des procédures afin de s'assurer du bon fonctionnement de l'ordre juridique en obligeant les états signataires à respecter les obligations qui leur incombent. Cet article a pour but de décrire le rôle de supervision du HCR dans le contexte plus large de son mandat international, d'analyser son contenu et d'entrevoir les voies possibles afin de renforcer et de développer ce rôle.</span></p><span data-dcnode-id="2006" instrument_node=""> </span></div><span data-dcnode-id="2004" instrument_node=""> </span><div class="contents" data-dcnode-id="1839" id="front.1_div.3"><h3 data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node=""> Plan</span></h3><span data-dcnode-id="2001" instrument_node=""> </span><ol data-dcnode-id="1841" xmlns:html="http://www.w3.org/1999/xhtml"><li data-dcnode-id="1994" value="1"><span data-dcnode-id="1999" id="N65746"><span data-dcnode-id="2000" instrument_node=""> </span></span><span data-dcnode-id="1998" instrument_node="">I. Introduction</span><a class="link_ptr" data-dcnode-id="1996" href="#rqdi_0828-9999_2001_num_14_1_T2_0136_0000_1" title="I. Introduction"><span data-dcnode-id="1997" instrument_node="">[link]</span></a><span data-dcnode-id="1995" instrument_node=""> </span></li><li data-dcnode-id="1987" value="2"><span data-dcnode-id="1992" id="N65753"><span data-dcnode-id="1993" instrument_node=""> </span></span><span data-dcnode-id="1991" instrument_node="">II. The concept of international protection</span><a class="link_ptr" data-dcnode-id="1989" href="#rqdi_0828-9999_2001_num_14_1_T2_0137_0000_1" title="II. The concept of international protection"><span data-dcnode-id="1990" instrument_node="">[link]</span></a><span data-dcnode-id="1988" instrument_node=""> </span></li><li data-dcnode-id="1980" value="3"><span data-dcnode-id="1985" id="N65760"><span data-dcnode-id="1986" instrument_node=""> </span></span><span data-dcnode-id="1984" instrument_node="">III. The concept of supervision in international law</span><a class="link_ptr" data-dcnode-id="1982" href="#rqdi_0828-9999_2001_num_14_1_T2_0139_0000_1" title="III. The concept of supervision in international law"><span data-dcnode-id="1983" instrument_node="">[link]</span></a><span data-dcnode-id="1981" instrument_node=""> </span></li><li data-dcnode-id="1973" value="4"><span data-dcnode-id="1978" id="N65767"><span data-dcnode-id="1979" instrument_node=""> </span></span><span data-dcnode-id="1977" instrument_node="">IV. Legal basis of the UNHCR's supervisory responsibility</span><a class="link_ptr" data-dcnode-id="1975" href="#rqdi_0828-9999_2001_num_14_1_T2_0139_0000_2" title="IV. Legal basis of the UNHCR's supervisory responsibility"><span data-dcnode-id="1976" instrument_node="">[link]</span></a><span data-dcnode-id="1974" instrument_node=""> </span></li><li data-dcnode-id="1944" value="5"><span data-dcnode-id="1971" id="N65774"><span data-dcnode-id="1972" instrument_node=""> </span></span><span data-dcnode-id="1970" instrument_node="">V. Scope of application of the UNHCR's supervisory role</span><a class="link_ptr" data-dcnode-id="1968" href="#rqdi_0828-9999_2001_num_14_1_T2_0141_0000_1" title="V. Scope of application of the UNHCR's supervisory role"><span data-dcnode-id="1969" instrument_node="">[link]</span></a><span data-dcnode-id="1967" instrument_node=""> </span><ol data-dcnode-id="1946"><li data-dcnode-id="1957" value="1"><span data-dcnode-id="1965" id="N65783"><span data-dcnode-id="1966" instrument_node=""> </span></span><span data-dcnode-id="1964" instrument_node="">A. Application </span><i data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">ratione personae </span></i><span data-dcnode-id="1961" instrument_node=""> </span><a class="link_ptr" data-dcnode-id="1959" href="#rqdi_0828-9999_2001_num_14_1_T2_0141_0000_2" title="A. Application"><span data-dcnode-id="1960" instrument_node="">[link]</span></a><span data-dcnode-id="1958" instrument_node=""> </span></li><li data-dcnode-id="1947" value="2"><span data-dcnode-id="1955" id="N65794"><span data-dcnode-id="1956" instrument_node=""> </span></span><span data-dcnode-id="1954" instrument_node="">B. Application </span><i data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">ratione materiae </span></i><span data-dcnode-id="1951" instrument_node=""> </span><a class="link_ptr" data-dcnode-id="1949" href="#rqdi_0828-9999_2001_num_14_1_T2_0143_0000_1" title="B. Application"><span data-dcnode-id="1950" instrument_node="">[link]</span></a><span data-dcnode-id="1948" instrument_node=""> </span></li></ol><span data-dcnode-id="1945" instrument_node=""> </span></li><li data-dcnode-id="1937" value="6"><span data-dcnode-id="1942" id="N65807"><span data-dcnode-id="1943" instrument_node=""> </span></span><span data-dcnode-id="1941" instrument_node="">VI. Supervision in the context of the UNHCR</span><a class="link_ptr" data-dcnode-id="1939" href="#rqdi_0828-9999_2001_num_14_1_T2_0145_0000_1" title="VI. Supervision in the context of the UNHCR"><span data-dcnode-id="1940" instrument_node="">[link]</span></a><span data-dcnode-id="1938" instrument_node=""> </span></li><li data-dcnode-id="1930" value="7"><span data-dcnode-id="1935" id="N65814"><span data-dcnode-id="1936" instrument_node=""> </span></span><span data-dcnode-id="1934" instrument_node="">VII. The UNHCR's organisational practice</span><a class="link_ptr" data-dcnode-id="1932" href="#rqdi_0828-9999_2001_num_14_1_T2_0147_0000_1" title="VII. The UNHCR's organisational practice"><span data-dcnode-id="1933" instrument_node="">[link]</span></a><span data-dcnode-id="1931" instrument_node=""> </span></li><li data-dcnode-id="1879" value="8"><span data-dcnode-id="1928" id="N65821"><span data-dcnode-id="1929" instrument_node=""> </span></span><span data-dcnode-id="1927" instrument_node="">VIII. Elaboration of the UNHCR's supervisory responsibility by the Executive Committee of the High Commissioner's Programme</span><a class="link_ptr" data-dcnode-id="1925" href="#rqdi_0828-9999_2001_num_14_1_T2_0149_0000_1" title="VIII. Elaboration of the UNHCR's supervisory responsibility by the Executive Committee of the High Commissioner's Programme"><span data-dcnode-id="1926" instrument_node="">[link]</span></a><span data-dcnod ument_node=""> </span></span><span data-dcnode-id="1893" instrument_node="">E. Participation in refugee status determination procedures</span><a class="link_ptr" data-dcnode-id="1891" href="#rqdi_0828-9999_2001_num_14_1_T2_0151_0000_2" title="E. Participation in refugee status determination procedures"><span data-dcnode-id="1892" instrument_node="">[link]</span></a><span data-dcnode-id="1890" instrument_node=""> </span></li><li data-dcnode-id="1882" value="6"><span data-dcnode-id="1887" id="N65865"><span data-dcnode-id="1888" instrument_node=""> </span></span><span data-dcnode-id="1886" instrument_node="">F. The UNHCR advisory services</span><a class="link_ptr" data-dcnode-id="1884" href="#rqdi_0828-9999_2001_num_14_1_T2_0151_0000_3" title="F. The UNHCR advisory services"><span data-dcnode-id="1885" instrument_node="">[link]</span></a><span data-dcnode-id="1883" instrument_node=""> </span></li></ol><span data-dcnode-id="1880" instrument_node=""> </span></li><li data-dcnode-id="1872" value="9"><span data-dcnode-id="1877" id="N65874"><span data-dcnode-id="1878" instrument_node=""> </span></span><span data-dcnode-id="1876" instrument_node="">IX. State practice</span><a class="link_ptr" data-dcnode-id="1874" href="#rqdi_0828-9999_2001_num_14_1_T2_0152_0000_2" title="IX. State practice"><span data-dcnode-id="1875" instrument_node="">[link]</span></a><span data-dcnode-id="1873" instrument_node=""> </span></li><li data-dcnode-id="1842" value="10"><span data-dcnode-id="1870" id="N65881"><span data-dcnode-id="1871" instrument_node=""> </span></span><span data-dcnode-id="1869" instrument_node="">X. Possible areas for further discussion</span><a class="link_ptr" data-dcnode-id="1867" href="#rqdi_0828-9999_2001_num_14_1_T2_0154_0000_1" title="X. Possible areas for further discussion"><span data-dcnode-id="1868" instrument_node="">[link]</span></a><span data-dcnode-id="1866" instrument_node=""> </span><ol data-dcnode-id="1844"><li data-dcnode-id="1859" value="1"><span data-dcnode-id="1864" id="N65890"><span data-dcnode-id="1865" instrument_node=""> </span></span><span data-dcnode-id="1863" instrument_node="">A. What happens when a conflict arises between the UNHCR's assessment and those of a state concerning the application of provisions of the international refugee instruments ?</span><a class="link_ptr" data-dcnode-id="1861" href="#rqdi_0828-9999_2001_num_14_1_T2_0155_0000_1" title="A. What happens when a conflict arises between the UNHCR's assessment and those of a state concerning the application of provisions of the international refugee instruments ?"><span data-dcnode-id="1862" instrument_node="">[link]</span></a><span data-dcnode-id="1860" instrument_node=""> </span></li><li data-dcnode-id="1852" value="2"><span data-dcnode-id="1857" id="N65897"><span data-dcnode-id="1858" instrument_node=""> </span></span><span data-dcnode-id="1856" instrument_node="">B. Would it be useful to regularise a system of periodic reporting on implementation of the international refugee instruments and an ensuing assessment of these reports by the UNHCR on a more structured basis ?</span><a class="link_ptr" data-dcnode-id="1854" href="#rqdi_0828-9999_2001_num_14_1_T2_0155_0000_2" title="B. Would it be useful to regularise a system of periodic reporting on implementation of the international refugee instruments and an ensuing assessment of these reports by the UNHCR on a more structured basis ?"><span data-dcnode-id="1855" instrument_node="">[link]</span></a><span data-dcnode-id="1853" instrument_node=""> </span></li><li data-dcnode-id="1845" value="3"><span data-dcnode-id="1850" id="N65904"><span data-dcnode-id="1851" instrument_node=""> </span></span><span data-dcnode-id="1849" instrument_node="">C. Are there other effective instruments of supervision that would ensure compliance by States with their international obligations ?</span><a class="link_ptr" data-dcnode-id="1847" href="#rqdi_0828-9999_2001_num_14_1_T2_0157_0000_1" title="C. Are there other effective instruments of supervision that would ensure compliance by States with their international obligations ?"><span data-dcnode-id="1848" instrument_node="">[link]</span></a><span data-dcnode-id="1846" instrument_node=""> </span></li></ol><span data-dcnode-id="1843" instrument_node=""> </span></li></ol><span data-dcnode-id="1840" instrument_node=""> </span></div><span data-dcnode-id="1838" instrument_node=""> </span><h3 data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Texte intégral</span></h3><div class="text" data-dcnode-id="688" itemprop="articleBody"><span data-dcnode-id="1835" instrument_node=""> </span><hr data-dcnode-id="1834" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1832" id="rqdi_0828-9999_2001_num_14_1_T2_0135_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1833" instrument_node=""> </span></span><span data-dcnode-id="1831" instrument_node=""> </span><p data-dcnode-id="1827"><span data-dcnode-id="1829" id="N65922" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1830" instrument_node=""> </span></span><span data-dcnode-id="1828" instrument_node="">;</span></p><span data-dcnode-id="1826" instrument_node=""> </span><p data-dcnode-id="1822"><span data-dcnode-id="1824" id="N65925" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1825" instrument_node=""> </span></span><span data-dcnode-id="1823" instrument_node="">UNHCR'S SUPERVISORY RESPONSIBILITY</span></p><span data-dcnode-id="1821" instrument_node=""> </span><p data-dcnode-id="1817"><span data-dcnode-id="1819" id="N65928" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1820" instrument_node=""> </span></span><span data-dcnode-id="1818" instrument_node="">By Volker Turk*</span></p><span data-dcnode-id="1816" instrument_node=""> </span><span data-dcnode-id="1814" id="Noterqdi_0828-9999_2001_num_14_1_T2_0135_0000_4" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1815" instrument_node=""> </span></span><span data-dcnode-id="1813" instrument_node=""> [Note: </span><p data-dcnode-id="1809"><span data-dcnode-id="1811" id="N65935" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1812" instrument_node=""> </span></span><span data-dcnode-id="1810" instrument_node="">Chief, Protection Policy and Legal Advice Section, Department of International Protection, UNHCR, Geneva. The views expressed are the personal views of the author and may not necessarily be shared by the United Nations or by UNHCR. My thanks go to Frances Nicholson and Alexander Beck for their valuable comments. </span></p><span data-dcnode-id="1808" instrument_node=""> ] </span><hr data-dcnode-id="1807" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1805" id="rqdi_0828-9999_2001_num_14_1_T2_0136_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1806" instrument_node=""> </span></span><span data-dcnode-id="1804" instrument_node=""> </span><p data-dcnode-id="1800"><span data-dcnode-id="1802" id="N65943" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1803" instrument_node=""> </span></span><span data-dcnode-id="1801" instrument_node="">136</span></p><span data-dcnode-id="1799" instrument_node=""> </span><p data-dcnode-id="1795"><span data-dcnode-id="1797" id="N65946" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1798" instrument_node=""> </span></span><span data-dcnode-id="1796" instrument_node="">(2001) 14.1 Revue québécoise de droit international</span></p><span data-dcnode-id="1794" instrument_node=""> </span><p data-dcnode-id="1788"><span data-dcnode-id="1792" id="N65949" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1793" instrument_node=""> </span></span><span data-dcnode-id="1791" instrument_node=""> </span><span data-dcnode-id="1789" id="rqdi_0828-9999_2001_num_14_1_T2_0136_0000_1" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1790" instrument_node=""> </span></span></p><h4 data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">I. Introduction</span></h4><span data-dcnode-id="1785" instrument_node=""> </span><p data-dcnode-id="1784"></p><span data-dcnode-id="1783" instrument_node=""> </span><p data-dcnode-id="1779"><span data-dcnode-id="1781" id="N65957" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1782" instrument_node=""> </span></span><span data-dcnode-id="1780" instrument_node="">Since the establishment of the United Nations, a wide range of issues of an international dimension, on the fact that states are unable to solve problems in isolation from each other, have been regulated at the universal level. The General Assembly recognized the issue of forced displacement as a matter of international concern as early as 19461. This awareness has translated into the establishment of a universal legal and institutional framework providing for the protection of refugees, at the core of which is the 1951 Convention relating to the Status of Refugees and its 1967 Protocol. The overall framework also included the creation of the UNHCR as the international institution mandated to provide international protection to refugees, inter alia by supervising the application of this international legal regime.</span></p><span data-dcnode-id="1778" instrument_node=""> </span><p data-dcnode-id="1774"><span data-dcnode-id="1776" id="N65960" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1777" instrument_node=""> </span></span><span data-dcnode-id="1775" instrument_node="">The question of the UNHCR' s supervisory role has received heightened attention in the nineties, not least because it was felt that full and effective implementation of the 1951 Convention was lacking in many parts of the world and that strengthened international supervision could ensure better norm compliance. One observer has highlighted the main concern by arguing that it is domestic implementation which allows states unilaterally to manipulate the refugee definition "to suit their perceived national and foreign policy interests"2. There have been a number of attempts by the UNHCR3 to strengthen and even formalise oversight in the refugee protection area. A number of NGOs4 have also been particularly vocal in pressing for enhanced international supervision of the international refugee instruments. This topic has recently been the subject of discussion in the context of the second track of the Global Consultations on International Protection . Furthermore, its consideration takes place against the background of ongoing efforts to reform the human rights treaty monitoring system6.</span></p><span data-dcnode-id="1773" instrument_node=""> </span><p data-dcnode-id="1769"><span data-dcnode-id="1771" id="N65963" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1772" instrument_node=""> </span></span><span data-dcnode-id="1770" instrument_node="">The purpose of this paper is to describe the UNHCR' s supervisory role within the broader context of its international protection mandate, to analyse its content, and to propose for discussion possible avenues that could be developed to enhance that role. The international support of national protection in countries of</span></p><span data-dcnode-id="1768" instrument_node=""> </span><span data-dcnode-id="1766" id="Noterqdi_0828-9999_2001_num_14_1_T2_0136_0000_2_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1767" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1763" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0136_0000_2" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">1</span></sup></a><span data-dcnode-id="1762" instrument_node=""> </span><hr data-dcnode-id="1761" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1759" id="rqdi_0828-9999_2001_num_14_1_T2_0137_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1760" instrument_node=""> </span></span><span data-dcnode-id="1758" instrument_node=""> </span><p data-dcnode-id="1754"><span data-dcnode-id="1756" id="N65993" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1757" instrument_node=""> </span></span><span data-dcnode-id="1755" instrument_node="">Unhcr 's Supervisory Responsibility</span></p><span data-dcnode-id="1753" instrument_node=""> </span><p data-dcnode-id="1749"><span data-dcnode-id="1751" id="N65996" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1752" instrument_node=""> </span></span><span data-dcnode-id="1750" instrument_node="">137</span></p><span data-dcnode-id="1748" instrument_node=""> </span><p data-dcnode-id="1744"><span data-dcnode-id="1746" id="N65999" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1747" instrument_node=""> </span></span><span data-dcnode-id="1745" instrument_node="">origin, which relates to the UNHCR's direct involvement and concern with the protection of nationals in their own countries, is also treated in diverse instruments which entrust the UNHCR with additional responsibilities. (Among these groups are returnees, the internally displaced, persons threatened with displacement or otherwise at risk, and stateless persons.) Describing the specificities of protection and monitoring in such circumstances, although they are of a similar nature, would, however, go beyond the scope of this paper7.</span></p><span data-dcnode-id="1743" instrument_node=""> </span><p data-dcnode-id="1737"><span data-dcnode-id="1741" id="N66002" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1742" instrument_node=""> </span></span><span data-dcnode-id="1740" instrument_node=""> </span><span data-dcnode-id="1738" id="rqdi_0828-9999_2001_num_14_1_T2_0137_0000_1" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1739" instrument_node=""> </span></span></p><h4 data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">II. The concept of international protection</span></h4><span data-dcnode-id="1734" instrument_node=""> </span><p data-dcnode-id="1733"></p><span data-dcnode-id="1732" instrument_node=""> </span><p data-dcnode-id="1728"><span data-dcnode-id="1730" id="N66010" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1731" instrument_node=""> </span></span><span data-dcnode-id="1729" instrument_node="">The Statute of the UNHCR and the 1 95 1 Convention relating to the Status of Refugees were adopted fifty years ago, in the aftermath of massive population movements. Drafted while the world was still in shock at the horrors of the Second World War that outraged the conscience of mankind, its texts bear witness to the direct experience of the main drafters. They were mindful of the need for a world in which human beings should be able to enjoy freedom from fear. Their strengthened faith in fundamental human rights and in the dignity and worth of the human person, helped to solidify the concept of international protection of refugees.</span></p><span data-dcnode-id="1727" instrument_node=""> </span><p data-dcnode-id="1723"><span data-dcnode-id="1725" id="N66013" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1726" instrument_node=""> </span></span><span data-dcnode-id="1724" instrument_node="">In accordance with paragraphs 1 and 8 of its Statute , the UNHCR has assumed the primary function of providing international protection to refugees8. Ever since, this function has remained a central part of the UNHCR's responsibilities. It has a highly dynamic character and emanates essentially from the UNHCR's operational practice and the practice of states in providing protection to millions of refugees.</span></p><span data-dcnode-id="1722" instrument_node=""> </span><span data-dcnode-id="1720" id="Noterqdi_0828-9999_2001_num_14_1_T2_0137_0000_2_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1721" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1717" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0137_0000_2" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">2</span></sup></a><span data-dcnode-id="1716" instrument_node=""> </span><hr data-dcnode-id="1715" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1713" id="rqdi_0828-9999_2001_num_14_1_T2_0138_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1714" instrument_node=""> </span></span><span data-dcnode-id="1712" instrument_node=""> </span><p data-dcnode-id="1708"><span data-dcnode-id="1710" id="N66061" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1711" instrument_node=""> </span></span><span data-dcnode-id="1709" instrument_node="">138</span></p><span data-dcnode-id="1707" instrument_node=""> </span><p data-dcnode-id="1703"><span data-dcnode-id="1705" id="N66064" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1706" instrument_node=""> </span></span><span data-dcnode-id="1704" instrument_node="">(2001) 14.1 Revue québécoise de droit international</span></p><span data-dcnode-id="1702" instrument_node=""> </span><p data-dcnode-id="1698"><span data-dcnode-id="1700" id="N66067" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1701" instrument_node=""> </span></span><span data-dcnode-id="1699" instrument_node="">The concept of international refugee protection, along with human rights law, helped spearhead a revolution in the overall international legal regime. The individual, including those lacking in national protection, was recognised as the inherent bearer of human rights. The absence of effective national protection -the failure or inability by the country of origin to fulfil the responsibility for safeguarding human rights -became a matter of international concern and responsibility. Filling this protection vacuum required the creation of a specific regime of rights for refugees. The main responsibility for safeguarding the human rights of refugees lies with states; the role of the UNHCR is to ensure that governments take the necessary measures, starting with admission and ending with the realisation of durable solutions. Increasingly, especially in situations of large-scale influx, the international community's capacity to support and assist particularly affected states, including through the UNHCR, has become an important element of the effectiveness of international protection9.</span></p><span data-dcnode-id="1697" instrument_node=""> </span><p data-dcnode-id="1693"><span data-dcnode-id="1695" id="N66070" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1696" instrument_node=""> </span></span><span data-dcnode-id="1694" instrument_node="">The underlying broader international framework of international protection predates the establishment of the UNHCR, not least because of the various legal and institutional arrangements that preceded the creation of the UNHCR and the adoption of the 1951 Convention. It draws heavily on different sources of international law and has evolved generally over time from the idea of international protection as a surrogate for consular and diplomatic protection to including gradually broader notions of human rights protection. Today, the institution of international refugee protection, whilst unique in the international legal system, is embedded in the broader international human rights protection regime10 and also generally linked to effective forms of international cooperation.</span></p><span data-dcnode-id="1692" instrument_node=""> </span><p data-dcnode-id="1688"><span data-dcnode-id="1690" id="N66073" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1691" instrument_node=""> </span></span><span data-dcnode-id="1689" instrument_node="">The unparalleled character of the UNHCR' s international protection function essentially revolves around two distinctive features: (i) its "operationality"; and (ii) its "supervisory function". Both features, and their expressions in the UNHCR's practice, are intrinsically linked and intertwined. Since the focus of this paper is not on the various facets of the operational role of the UNHCR's international protection mandate, suffice it to say that its extensive field presence enables it to fulfil protection functions and to deliver assistance to refugees and other persons of concern. The 1994 UNHCR Note on International Protection sets out in some detail the conceptual understanding of international protection", while the 2000 Note on International Protection focuses in particular on how the UNHCR has "operationalised" its international protection mandate12. By contrast, descriptions of the UNHCR's supervisory role are scant. Before proceeding to the UNHCR, it is therefore helpful to explore the concept of international supervision generally.</span></p><span data-dcnode-id="1687" instrument_node=""> </span><span data-dcnode-id="1685" id="Noterqdi_0828-9999_2001_num_14_1_T2_0138_0000_1_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1686" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1682" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0138_0000_1" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">3</span></sup></a><span data-dcnode-id="1681" instrument_node=""> </span><hr data-dcnode-id="1680" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1678" id="rqdi_0828-9999_2001_num_14_1_T2_0139_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1679" instrument_node=""> </span></span><span data-dcnode-id="1677" instrument_node=""> </span><p data-dcnode-id="1673"><span data-dcnode-id="1675" id="N66097" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1676" instrument_node=""> </span></span><span data-dcnode-id="1674" instrument_node="">Unhcr 's Supervisory Responsibility</span></p><span data-dcnode-id="1672" instrument_node=""> </span><p data-dcnode-id="1668"><span data-dcnode-id="1670" id="N66100" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1671" instrument_node=""> </span></span><span data-dcnode-id="1669" instrument_node="">139</span></p><span data-dcnode-id="1667" instrument_node=""> </span><p data-dcnode-id="1661"><span data-dcnode-id="1665" id="N66103" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1666" instrument_node=""> </span></span><span data-dcnode-id="1664" instrument_node=""> </span><span data-dcnode-id="1662" id="rqdi_0828-9999_2001_num_14_1_T2_0139_0000_1" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1663" instrument_node=""> </span></span></p><h4 data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">III. The concept of supervision in international law</span></h4><span data-dcnode-id="1658" instrument_node=""> </span><p data-dcnode-id="1657"></p><span data-dcnode-id="1656" instrument_node=""> </span><p data-dcnode-id="1652"><span data-dcnode-id="1654" id="N66111" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1655" instrument_node=""> </span></span><span data-dcnode-id="1653" instrument_node="">Supervision of international treaties by an international institution was seen as progress in international affairs at the time of its emergence. Niels Blokker and Sam Muller13, write that originally, states themselves supervised international agreements. This, they say, no longer works with more complex international relations and large multilateral conventions. Thus the need arose to establish more objective means of supervision, as opposed to traditional, decentralised and subjective supervision by states. According to them, as a result, international organisations were created with the special task of supervising rule compliance by states. Initially, though, international organisations were vested with restricted powers to supervise rule compliance by states parties to multilateral agreements. They also point out that supervision by international organisations is generally considered more political and mostly lacks the characteristics of judicial supervision, such as independence, objective rules, due process and the binding effect of the decision. This is important background information for a closer assessment of the UNHCR's supervisory role.</span></p><span data-dcnode-id="1651" instrument_node=""> </span><p data-dcnode-id="1647"><span data-dcnode-id="1649" id="N66114" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1650" instrument_node=""> </span></span><span data-dcnode-id="1648" instrument_node="">It is also useful, against this background, to reflect on the very purpose of international supervision. The purpose of international supervision relating to the application of provisions of international instruments is, first and foremost, to promote compliance with these rules14. In this sense, international supervision furthers one of the main objectives of the essence of law itself, which is "... to give effect, through appropriate limitation and international supervision of the international sovereignty of states, to the principle that the protection of the human personality and of its fundamental rights is the ultimate purpose of all law, national and international ..."'5. Based on this understanding of international supervision, it is now possible to examine the UNHCR's supervisory role.</span></p><span data-dcnode-id="1646" instrument_node=""> </span><p data-dcnode-id="1640"><span data-dcnode-id="1644" id="N66117" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1645" instrument_node=""> </span></span><span data-dcnode-id="1643" instrument_node=""> </span><span data-dcnode-id="1641" id="rqdi_0828-9999_2001_num_14_1_T2_0139_0000_2" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1642" instrument_node=""> </span></span></p><h4 data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">IV. Legal basis of the UNHCR's supervisory responsibility</span></h4><span data-dcnode-id="1637" instrument_node=""> </span><p data-dcnode-id="1636"></p><span data-dcnode-id="1635" instrument_node=""> </span><p data-dcnode-id="1631"><span data-dcnode-id="1633" id="N66125" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1634" instrument_node=""> </span></span><span data-dcnode-id="1632" instrument_node="">The UNHCR's supervisory responsibility is an integral and inherent part of its international refugee protection function. It is laid down explicitly in paragraph 8 of the UNHCR Statute :</span></p><span data-dcnode-id="1630" instrument_node=""> </span><p data-dcnode-id="1626"><span data-dcnode-id="1628" id="N66128" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1629" instrument_node=""> </span></span><span data-dcnode-id="1627" instrument_node="">The High Commissioner shall provide for the protection of refugees falling under the competence of his Office by: (a) promoting the conclusion and ratification of international conventions for the protection of refugees, supervising their application and proposing amendments thereto; ... (underlining added).</span></p><span data-dcnode-id="1625" instrument_node=""> </span><span data-dcnode-id="1623" id="Noterqdi_0828-9999_2001_num_14_1_T2_0139_0000_4_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1624" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1620" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0139_0000_4" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">4</span></sup></a><span data-dcnode-id="1619" instrument_node=""> </span><hr data-dcnode-id="1618" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1616" id="rqdi_0828-9999_2001_num_14_1_T2_0140_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1617" instrument_node=""> </span></span><span data-dcnode-id="1615" instrument_node=""> </span><p data-dcnode-id="1611"><span data-dcnode-id="1613" id="N66149" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1614" instrument_node=""> </span></span><span data-dcnode-id="1612" instrument_node="">140</span></p><span data-dcnode-id="1610" instrument_node=""> </span><p data-dcnode-id="1606"><span data-dcnode-id="1608" id="N66152" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1609" instrument_node=""> </span></span><span data-dcnode-id="1607" instrument_node="">(2001) 14.1 Revue québécoise de droit international</span></p><span data-dcnode-id="1605" instrument_node=""> </span><p data-dcnode-id="1601"><span data-dcnode-id="1603" id="N66155" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1604" instrument_node=""> </span></span><span data-dcnode-id="1602" instrument_node="">No specific provisions of the Statute elaborate, however, on the UNHCR's supervisory responsibility or provide the UNHCR with any specific enforcement powers.</span></p><span data-dcnode-id="1600" instrument_node=""> </span><p data-dcnode-id="1596"><span data-dcnode-id="1598" id="N66158" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1599" instrument_node=""> </span></span><span data-dcnode-id="1597" instrument_node="">Articles 35 and 36 of the 1951 Convention relating to the Status of Refugees 16, Article II of its 1967 Protocol and Article VIII of the 1969 OAU Convention governing the specific aspects of refugee problems in Africa contain the corresponding treaty obligations of states in this area. In essence, states parties to these international refugee instruments undertake to co-operate with the UNHCR in the exercise of its functions, and shall in particular facilitate its duty of supervising the application of the provisions of these instruments. This is specified further in Article 35(2) and Article 36 of the 1951 Convention. Pursuant to Article 35(2), states undertake to provide the UNHCR, in the appropriate form, with information and statistical data concerning the condition of refugees and the implementation of the 1951 Convention, including laws, regulations and decrees relating to refugees. Article 36 requires states parties to communicate to the UN Secretary-General the laws and regulations which they may adopt to ensure the application of this Convention. While Article 36 nominally mentions the Secretary-General, in practice these communications are directed to the UNHCR. After all, the UNHCR is the main body within the UN system responsible for refugee matters and as such a subsidiary organ of the UN General Assembly17.</span></p><span data-dcnode-id="1595" instrument_node=""> </span><p data-dcnode-id="1591"><span data-dcnode-id="1593" id="N66161" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1594" instrument_node=""> </span></span><span data-dcnode-id="1592" instrument_node="">Broader states' acceptance of the UNHCR's supervisory responsibility is also reflected, inter alia, in recommendation (e) of the 1984 Cartagena Declaration and the Preamble to the 1957 Agreement relating to Refugee Seamen. Furthermore, both Article 28 of the 1990 Schengen Implementation Convention and Article 2 of the 1990 Dublin Convention 8 reaffirm the commitment of the contracting parties to co¬ operate with the UNHCR in the implementation of the international refugee instruments, which extends to the UNHCR's supervisory role. The declaration to the final act of the 1997 Treaty of Amsterdam, which foresees consultations with the UNHCR in the area of harmonisation of refugee law and policies, can be seen as a concrete implementation by European Union member states of their responsibility to co-operate with the UNHCR in the exercise of its supervisory responsibility. Indeed, in practice, the UNHCR actively contributes to the EU harmonization process by providing detailed policy and legal opinions on the various draft texts, as well as by preparing substantive background documentation both on state practice and on relevant international refugee law standards19.</span></p><span data-dcnode-id="1590" instrument_node=""> </span><span data-dcnode-id="1588" id="Noterqdi_0828-9999_2001_num_14_1_T2_0140_0000_1_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1589" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1585" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0140_0000_1" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">5</span></sup></a><span data-dcnode-id="1584" instrument_node=""> </span><hr data-dcnode-id="1583" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1581" id="rqdi_0828-9999_2001_num_14_1_T2_0141_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1582" instrument_node=""> </span></span><span data-dcnode-id="1580" instrument_node=""> </span><p data-dcnode-id="1576"><span data-dcnode-id="1578" id="N66188" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1579" instrument_node=""> </span></span><span data-dcnode-id="1577" instrument_node="">Unhcr 's Supervisor}' Responsibility</span></p><span data-dcnode-id="1575" instrument_node=""> </span><p data-dcnode-id="1571"><span data-dcnode-id="1573" id="N66191" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1574" instrument_node=""> </span></span><span data-dcnode-id="1572" instrument_node="">141</span></p><span data-dcnode-id="1570" instrument_node=""> </span><p data-dcnode-id="1566"><span data-dcnode-id="1568" id="N66194" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1569" instrument_node=""> </span></span><span data-dcnode-id="1567" instrument_node="">In those cases where the UNHCR's supervisory responsibility is not referred to in a refugee instrument explicitly or where states are not party to any international refugee instrument, state obligations in this area can more broadly be found in Articles 1(3), 2(2), 2(5), 55 and 56 of the UN Charter in combination with paragraph 8(a) of the UNHCR Statute. Arguably, the content of Article 35 of the 1951 Convention could possibly constitute a rule of customary international law, not least because a specific organisational supervisory practice developed by the UNHCR, coupled with a consequent acquiescence by states in relation to this practice, is discernible20. In the light of the foregoing analysis, it is also important to note that Article 2(7) of the UN Charter is not a valid argument against an intervention by the UNHCR in the area of international refugee protection21.</span></p><span data-dcnode-id="1565" instrument_node=""> </span><p data-dcnode-id="1561"><span data-dcnode-id="1563" id="N66197" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1564" instrument_node=""> </span></span><span data-dcnode-id="1562" instrument_node="">In summary, a closer analysis of the provisions regulating the UNHCR's supervisory role and of corresponding states' obligations leads to the conclusion that, apart from Article 35(2) and Article 36, there is no proper procedure implementing the UNHCR's supervisory responsibility. Nor has an international enforcement mechanism as such been established in this area. It is therefore essential to analyse the actual content of this responsibility and of states' corresponding obligations by examining the practice of the UNHCR, its Executive Committee and states in this area.</span></p><span data-dcnode-id="1560" instrument_node=""> </span><p data-dcnode-id="1554"><span data-dcnode-id="1558" id="N66200" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1559" instrument_node=""> </span></span><span data-dcnode-id="1557" instrument_node=""> </span><span data-dcnode-id="1555" id="rqdi_0828-9999_2001_num_14_1_T2_0141_0000_1" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1556" instrument_node=""> </span></span></p><h4 data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">V. Scope of application of the UNHCR's supervisory role</span></h4><span data-dcnode-id="1551" instrument_node=""> </span><p data-dcnode-id="1550"></p><span data-dcnode-id="1549" instrument_node=""> </span><p data-dcnode-id="1545"><span data-dcnode-id="1547" id="N66208" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1548" instrument_node=""> </span></span><span data-dcnode-id="1546" instrument_node="">Before proceeding to a more detailed analysis of how the UNHCR's supervisory role has been implemented, it is valuable to clarify to whom this function applies and in respect of which instruments. In order to arrive at this clarification, it is important to interpret this role in light of its ordinary meaning, guided by the object and purpose of the UNHCR's broader international protection function and the applicable international refugee instruments. Regard is also had to the travaux préparatoires , as applicable in this specific context.</span></p><span data-dcnode-id="1544" instrument_node=""> </span><p data-dcnode-id="1538"><span data-dcnode-id="1542" id="N66211" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1543" instrument_node=""> </span></span><span data-dcnode-id="1541" instrument_node=""> </span><span data-dcnode-id="1539" id="rqdi_0828-9999_2001_num_14_1_T2_0141_0000_2" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1540" instrument_node=""> </span></span></p><h5 data-dcnode-id="1533"><span data-dcnode-id="1537" instrument_node="">A. Application </span><i data-dcnode-id="1535" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1536" instrument_node="">ratione personae </span></i><span data-dcnode-id="1534" instrument_node=""> </span></h5><span data-dcnode-id="1532" instrument_node=""> </span><p data-dcnode-id="1531"></p><span data-dcnode-id="1530" instrument_node=""> </span><p data-dcnode-id="1526"><span data-dcnode-id="1528" id="N66223" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1529" instrument_node=""> </span></span><span data-dcnode-id="1527" instrument_node="">Paragraph 8 of the UNHCR Statute refers to refugees. It is generally understood that this term comprises also asylum-seekers and refugees in the broader sense. The UNHCR's competence in respect of refugees covers all forms of forced displacement originating from man-made disasters. This may, however, not</span></p><span data-dcnode-id="1525" instrument_node=""> </span><span data-dcnode-id="1523" id="Noterqdi_0828-9999_2001_num_14_1_T2_0141_0000_3_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1524" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1520" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0141_0000_3" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">6</span></sup></a><span data-dcnode-id="1519" instrument_node=""> </span><hr data-dcnode-id="1518" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1516" id="rqdi_0828-9999_2001_num_14_1_T2_0142_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1517" instrument_node=""> </span></span><span data-dcnode-id="1515" instrument_node=""> </span><p data-dcnode-id="1511"><span data-dcnode-id="1513" id="N66241" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1514" instrument_node=""> </span></span><span data-dcnode-id="1512" instrument_node="">142</span></p><span data-dcnode-id="1510" instrument_node=""> </span><p data-dcnode-id="1506"><span data-dcnode-id="1508" id="N66244" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1509" instrument_node=""> </span></span><span data-dcnode-id="1507" instrument_node="">(2001) 14.1 Revue québécoise de droit international</span></p><span data-dcnode-id="1505" instrument_node=""> </span><p data-dcnode-id="1501"><span data-dcnode-id="1503" id="N66247" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1504" instrument_node=""> </span></span><span data-dcnode-id="1502" instrument_node="">necessarily be matched by obligations formally accepted by states22. Sometimes it has been argued that the UNHCR' s supervisory role does not apply to persons outside the scope of the particular country's formal legal responsibilities. The General Assembly, however, entrusted the UNHCR with providing international protection to, and seeking durable solutions for, all refugees, whether formally recognised or not, who fall within the Office's mandate, and this mandate is not restricted by international obligations assumed by a particular state. In summary, it is argued in this paper that the UNHCR's supervisory responsibility extends to all refugees falling under the UNHCR's competence in accordance with relevant General Assembly resolutions, whether or not they are considered refugees within the scope of these International refugee protection instruments, including in countries that have not acceded to these instruments.</span></p><span data-dcnode-id="1500" instrument_node=""> </span><p data-dcnode-id="1496"><span data-dcnode-id="1498" id="N66250" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1499" instrument_node=""> </span></span><span data-dcnode-id="1497" instrument_node="">The dichotomy between the UNHCR responsibilities on the one hand and limited obligations formally accepted by certain states on the other remains a major challenge. In this connection, the 1994 Note on International Protection observed that the tasks of international protection which the international community had conferred upon UNHCR had to some extent outgrown the legal tools that were available to accomplish them. The Note also observed that significant numbers of people who were in need of international protection were, for a variety of reasons, outside the effective scope of the principal international refugee instruments23. The question arises whether the UNHCR's supervisory role and corresponding state obligations in this regard could be activated as a legal basis to address precisely the protection needs of those categories of persons who are in need of international protection, but, at present, not within the application of the international legal framework of refugee protection.</span></p><span data-dcnode-id="1495" instrument_node=""> </span><p data-dcnode-id="1491"><span data-dcnode-id="1493" id="N66253" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1494" instrument_node=""> </span></span><span data-dcnode-id="1492" instrument_node="">This proposition requires further elaboration. By way of recapitulation, Article 35 of the 1951 Convention is in essence a provision that concretises the general obligations of UN member states to cooperate with the UN24. At the same time, it establishes an explicit contractual link between the 1951 Convention and the UNHCR Statute , that is, the legal framework of the UNHCR's mandate and competence. Arguably, this strengthens indirectly the authority of the General Assembly resolutions in relation to the UNHCR, not least because the UNHCR Statute itself has foreseen the possibility of expanding the scope of the UNHCR's activities in its paragraphs 3 and 9. When acceding to the 1 95 1 Convention , it is assumed that states would be aware of the fact that the UNHCR has a broader competence ratione personae and that its mandate is a living phenomenon evolving dynamically through subsequent General Assembly resolutions. In this connection, it</span></p><span data-dcnode-id="1490" instrument_node=""> </span><span data-dcnode-id="1488" id="Noterqdi_0828-9999_2001_num_14_1_T2_0142_0000_1_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1489" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1485" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0142_0000_1" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">7</span></sup></a><span data-dcnode-id="1484" instrument_node=""> </span><hr data-dcnode-id="1483" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1481" id="rqdi_0828-9999_2001_num_14_1_T2_0143_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1482" instrument_node=""> </span></span><span data-dcnode-id="1480" instrument_node=""> </span><p data-dcnode-id="1476"><span data-dcnode-id="1478" id="N66274" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1479" instrument_node=""> </span></span><span data-dcnode-id="1477" instrument_node="">Unhcr 's Supervisory Responsibility</span></p><span data-dcnode-id="1475" instrument_node=""> </span><p data-dcnode-id="1471"><span data-dcnode-id="1473" id="N66277" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1474" instrument_node=""> </span></span><span data-dcnode-id="1472" instrument_node="">143</span></p><span data-dcnode-id="1470" instrument_node=""> </span><p data-dcnode-id="1466"><span data-dcnode-id="1468" id="N66280" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1469" instrument_node=""> </span></span><span data-dcnode-id="1467" instrument_node="">is important to bear in mind that the UNHCR at the time of its establishment was already required to follow an unrestricted refugee definition, while states could restrict the geographical or temporal applicability of the refugee definition. In this sense, the gap between broader UNHCR responsibilities and the more limited formal, legal obligations of states was already apparent at the time of the drafting of the Convention. The wording of Article 35 itself does not seem to limit cooperation with the UNHCR to the obligations formally undertaken by states, including those circumscribed by reservations made at the time of accession. The "dynamic" character of the obligation to cooperate with the UNHCR is, to some extent, also reflected in the reference contained in Article 35(1) to "any other agency of the United Nations which may succeed it". In this sense, the provision contemplates that, should the UNHCR be abolished and a successor agency be established, states would continue to be obligated to any such future agency.</span></p><span data-dcnode-id="1465" instrument_node=""> </span><p data-dcnode-id="1461"><span data-dcnode-id="1463" id="N66283" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1464" instrument_node=""> </span></span><span data-dcnode-id="1462" instrument_node="">The functional link established in Article 35 between the 1951 Convention and the UNHCR Statute, including its subsequent development by the General Assembly, may be construed to enable an evolutionary adaptation of the provisions of the 1951 Convention to the changing actual situation and its manifestation in the evolving competence of the UNHCR25. In this sense, it could be argued that Article 35 has the potential to address the gap between institutional responsibilities entrusted to the UNHCR and the often limited obligations formally accepted by states by creating obligations to cooperate with the UNHCR proportional to the UNHCR' s competencies ratione personae and ratione materiae.</span></p><span data-dcnode-id="1460" instrument_node=""> </span><p data-dcnode-id="1456"><span data-dcnode-id="1458" id="N66286" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1459" instrument_node=""> </span></span><span data-dcnode-id="1457" instrument_node="">By way of additional argument, an analysis of the travaux préparatoires of the 1951 Convention would seem to support this proposition. When examining the various drafts of Article 35, it is possible to discern an evolution in the deliberations starting from lesser forms of cooperation and resulting in a more elaborate, open and evolutionary role for the UNHCR26.</span></p><span data-dcnode-id="1455" instrument_node=""> </span><p data-dcnode-id="1449"><span data-dcnode-id="1453" id="N66289" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1454" instrument_node=""> </span></span><span data-dcnode-id="1452" instrument_node=""> </span><span data-dcnode-id="1450" id="rqdi_0828-9999_2001_num_14_1_T2_0143_0000_1" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1451" instrument_node=""> </span></span></p><h5 data-dcnode-id="1444"><span data-dcnode-id="1448" instrument_node="">B. Application </span><i data-dcnode-id="1446" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1447" instrument_node="">ratione materiae </span></i><span data-dcnode-id="1445" instrument_node=""> </span></h5><span data-dcnode-id="1443" instrument_node=""> </span><p data-dcnode-id="1442"></p><span data-dcnode-id="1441" instrument_node=""> </span><p data-dcnode-id="1437"><span data-dcnode-id="1439" id="N66301" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1440" instrument_node=""> </span></span><span data-dcnode-id="1438" instrument_node="">To exercise its international protection function vis-à-vis states, the UNHCR relies on its Statute, including the extension of its competence through subsequent General Assembly and ECOSOC resolutions, and on the whole body of universal and regional refugee law and standards, complemented by relevant international human rights and humanitarian law instruments, as well as relevant national legislation and</span></p><span data-dcnode-id="1436" instrument_node=""> </span><span data-dcnode-id="1434" id="Noterqdi_0828-9999_2001_num_14_1_T2_0143_0000_2_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1435" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1431" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0143_0000_2" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">8</span></sup></a><span data-dcnode-id="1430" instrument_node=""> </span><hr data-dcnode-id="1429" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1427" id="rqdi_0828-9999_2001_num_14_1_T2_0144_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1428" instrument_node=""> </span></span><span data-dcnode-id="1426" instrument_node=""> </span><p data-dcnode-id="1422"><span data-dcnode-id="1424" id="N66319" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1425" instrument_node=""> </span></span><span data-dcnode-id="1423" instrument_node="">144</span></p><span data-dcnode-id="1421" instrument_node=""> </span><p data-dcnode-id="1417"><span data-dcnode-id="1419" id="N66322" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1420" instrument_node=""> </span></span><span data-dcnode-id="1418" instrument_node="">(2001) 14.1 Revue québécoise de droit international</span></p><span data-dcnode-id="1416" instrument_node=""> </span><p data-dcnode-id="1412"><span data-dcnode-id="1414" id="N66325" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1415" instrument_node=""> </span></span><span data-dcnode-id="1413" instrument_node="">key jurisprudence. This body of law and standards constitutes the international refugee protection regime at the core of which are the UNHCR Statute and the 1 95 1 Convention/ 1967 Protocol. It is a dynamic set of explicit and implicit rules. To obtain a better overview, given the different sources of law involved, it may indeed be a useful exercise to consolidate these rules in a comprehensive manner. Inherent in this regime is also a certain legal authority that states have vested in the UNHCR's international protection function in the form of its supervisory role. The values which constitute the fundamental assumptions that underlie this particular regime and define its very nature are: universality, impartiality and fundamental notions of humanity. This is particularly relevant to efforts by the UNHCR to strengthen the international protection regime through its supervisory role.</span></p><span data-dcnode-id="1411" instrument_node=""> </span><p data-dcnode-id="1407"><span data-dcnode-id="1409" id="N66328" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1410" instrument_node=""> </span></span><span data-dcnode-id="1408" instrument_node="">Clearly, in accordance with paragraph 8 of the UNHCR Statute , the UNHCR is competent to supervise international conventions for the protection of refugees. The wording is open and flexible and does not restrict the scope of applicability of the UNHCR's supervisory function to one or other specific international refugee convention. The UNHCR is therefore competent qua its Statute to supervise all conventions relevant to refugee protection, and has in fact done so in practice. Moreover, as described earlier, most international refugee conventions explicitly establish a link to the UNHCR's supervisory function as regards the application of their provisions.</span></p><span data-dcnode-id="1406" instrument_node=""> </span><p data-dcnode-id="1402"><span data-dcnode-id="1404" id="N66331" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1405" instrument_node=""> </span></span><span data-dcnode-id="1403" instrument_node="">Since related international standards concerning the protection of refugees, adopted by the Executive Committee, the General Assembly or by regional organisations, often constitute guidelines or even "implementing tools" in application of these conventions, the UNHCR's supervisory role necessarily also extends to these standards. They do not have the same legal value as international treaties, but they are nevertheless important tools in the appraisal of how international refugee conventions are being applied.</span></p><span data-dcnode-id="1401" instrument_node=""> </span><p data-dcnode-id="1397"><span data-dcnode-id="1399" id="N66334" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1400" instrument_node=""> </span></span><span data-dcnode-id="1398" instrument_node="">The same applies to regional instruments, even, arguably, to those that do not specifically refer to the UNHCR's supervisory role, because they relate to the provision of complementary protection27. Most of these regional instruments either refer to the 1951 Convention/ 1 967 Protocol or contain a provision according to which the regional agreements apply without prejudice to them28. For instance, the various resolutions and directives harmonising asylum policy and practice within the European Union explicitly foresee some form of a consultative role for the UNHCR, which implies recognition of the UNHCR's supervisory function29.</span></p><span data-dcnode-id="1396" instrument_node=""> </span><span data-dcnode-id="1394" id="Noterqdi_0828-9999_2001_num_14_1_T2_0144_0000_1_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1395" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1391" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0144_0000_1" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">9</span></sup></a><span data-dcnode-id="1390" instrument_node=""> </span><hr data-dcnode-id="1389" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1387" id="rqdi_0828-9999_2001_num_14_1_T2_0145_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1388" instrument_node=""> </span></span><span data-dcnode-id="1386" instrument_node=""> </span><p data-dcnode-id="1382"><span data-dcnode-id="1384" id="N66355" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1385" instrument_node=""> </span></span><span data-dcnode-id="1383" instrument_node="">Unhcr's Supervisory Responsibility</span></p><span data-dcnode-id="1381" instrument_node=""> </span><p data-dcnode-id="1377"><span data-dcnode-id="1379" id="N66358" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1380" instrument_node=""> </span></span><span data-dcnode-id="1378" instrument_node="">145</span></p><span data-dcnode-id="1376" instrument_node=""> </span><p data-dcnode-id="1372"><span data-dcnode-id="1374" id="N66361" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1375" instrument_node=""> </span></span><span data-dcnode-id="1373" instrument_node="">The UNHCR, in the exercise of its supervisory role, may also have recourse to provisions in human rights treaties that refer either explicitly to refugees (for example, Article 22 of the 1989 Convention on the Rights of the Child)30 or apply to them implicitly. While, clearly, the respective treaty monitoring bodies have the primary competence to supervise, the UNHCR may, arguably, fulfil a subsidiary function regarding the application of these provisions as long as treaty monitoring by the competent bodies has not been activated31. More generally, the UNHCR has undertaken a number of activities to identify and strengthen the linkages between international refugee law and international human rights law so that each could be better used for the protection of refugees32. In this sense, the UNHCR has, for instance, followed closely the work of the six human rights treaty monitoring bodies and regional human rights institutions, such as the European Court of Human Rights, to reinforce the understanding and coverage of refugee protection issues in these forums.</span></p><span data-dcnode-id="1371" instrument_node=""> </span><p data-dcnode-id="1367"><span data-dcnode-id="1369" id="N66364" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1370" instrument_node=""> </span></span><span data-dcnode-id="1368" instrument_node="">In countries that have not acceded to any international refugee instrument, the legal basis for the UNHCR's supervisory role is its Statute and those norms and principles of international law applicable to refugees that apply to all states, regardless of accession to international instruments. Norms of customary international law relating to the protection of refugees, such as the principle of non-refoulement 33 could, arguably, be covered by the UNHCR's supervisory role, although the term "convention" in paragraph 8 of the Statute seems to refer only to one source of international law, namely international treaties34.</span></p><span data-dcnode-id="1366" instrument_node=""> </span><p data-dcnode-id="1360"><span data-dcnode-id="1364" id="N66367" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1365" instrument_node=""> </span></span><span data-dcnode-id="1363" instrument_node=""> </span><span data-dcnode-id="1361" id="rqdi_0828-9999_2001_num_14_1_T2_0145_0000_1" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1362" instrument_node=""> </span></span></p><h4 data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">VI. Supervision in the context of the UNHCR</span></h4><span data-dcnode-id="1357" instrument_node=""> </span><p data-dcnode-id="1356"></p><span data-dcnode-id="1355" instrument_node=""> </span><p data-dcnode-id="1351"><span data-dcnode-id="1353" id="N66375" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1354" instrument_node=""> </span></span><span data-dcnode-id="1352" instrument_node="">The supervisory competence of an international organisation is generally determined by the very objective of the treaty and the reasoning for establishing the</span></p><span data-dcnode-id="1350" instrument_node=""> </span><span data-dcnode-id="1348" id="Noterqdi_0828-9999_2001_num_14_1_T2_0145_0000_2_return" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1349" instrument_node=""> </span></span><a class="notelink" data-dcnode-id="1345" href="#Noterqdi_0828-9999_2001_num_14_1_T2_0145_0000_2" title="Go to note" xmlns:html="http://www.w3.org/1999/xhtml"><sup data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">10</span></sup></a><span data-dcnode-id="1344" instrument_node=""> </span><hr data-dcnode-id="1343" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1341" id="rqdi_0828-9999_2001_num_14_1_T2_0146_0000" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1342" instrument_node=""> </span></span><span data-dcnode-id="1340" instrument_node=""> </span><p data-dcnode-id="1336"><span data-dcnode-id="1338" id="N66402" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1339" instrument_node=""> </span></span><span data-dcnode-id="1337" instrument_node="">146</span></p><span data-dcnode-id="1335" instrument_node=""> </span><p data-dcnode-id="1331"><span data-dcnode-id="1333" id="N66405" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1334" instrument_node=""> </span></span><span data-dcnode-id="1332" instrument_node="">(2001) 14.1 Revue québécoise de droit international</span></p><span data-dcnode-id="1330" instrument_node=""> </span><p data-dcnode-id="1326"><span data-dcnode-id="1328" id="N66408" xmlns:html="http://www.w3.org/1999/xhtml"><span data-dcnode-id="1329" instrument_node=""> </span></span><span data-dcnode-id="1327" instrument_node="">international organisation in the first place35. While no definition of the UNHCR's supervisory role exists, the Statute has provided the basis for a broad concept of supervision which goes beyond any treaty basis, extending to all refugees falling under the UNHCR's competence and including regional instruments and standards, as well as general principles and norms of international law applicable to refugees. In this connection, it is also useful to recall that the UNHCR has an implied power qua its Statute to define and adopt such measures as are reaso
