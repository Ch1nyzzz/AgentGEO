ata-dcnode-id="5349" instrument_node=""> </span><span data-dcnode-id="5347" instrument_node=""> </span><p class="delivering-the-response-description description ng-binding ng-scope ng-isolate-scope" data-dcnode-id="5344" data-ellipsis="" data-ng-bind="item.description" data-overflowed="false" ng-if="item.cssClassName == 'delivering-the-response'"><span data-dcnode-id="5345" instrument_node="">Protection and service delivery for persons of concern in emergencies requires setting up emergency response operations, including UNHCR’s presence and support services. This section provides guidance on all aspects of managing and delivering the emergency operation, including good practices for sector responses (organised by operational context - urban, rural, camp), selected emergency standards and indicators, as well as UNHCR’s processes and rules for programme, supply, administration, finance, human resources, and information and communication technology (ICT).</span></p><span data-dcnode-id="5342" instrument_node=""> </span><span data-dcnode-id="5340" instrument_node=""> </span></div><span data-dcnode-id="5337" instrument_node=""> </span></span><span data-dcnode-id="5335" instrument_node=""> </span><span data-dcnode-id="5333" instrument_node=""> </span></span><span data-dcnode-id="5331" instrument_node=""> </span></span><span data-dcnode-id="5329" instrument_node=""> </span><a class="dropdown-close" data-dcnode-id="5327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emergency.unhcr.org/entry/257802"><span data-dcnode-id="5328" instrument_node="">×</span></a><span data-dcnode-id="5326" instrument_node=""> </span></div><span data-dcnode-id="5323" instrument_node=""> </span></li><li class="nav-item nav-item-leading-and-coordinating" data-dcnode-id="5208" ng-class="{'small': item.type == 'childlessCategory', 'opened': item.id == activeTopicId}" ng-repeat="item in links.data.topics"><span data-dcnode-id="5320" instrument_node=""> </span><a breadcru e-id="5164" instrument_node="">Working in emergency operations can be extremely stressful, and may take place under difficult living conditions. Staying healthy can be a challenge, both psychologically and physically. UNHCR values the welfare of staff and emergency responders. This section provides advice for emergency responders on different aspects of staying healthy, and where to seek help in case needed. It describes support mechanisms in place for UNHCR staff and affiliated workforce, and summarises related policies and guidance.</span></p><span data-dcnode-id="5162" instrument_node=""> </span><ul class="see-all-entries-link" data-dcnode-id="5154"><span data-dcnode-id="5161" instrument_node=""> </span><li data-dcnode-id="5156"><span data-dcnode-id="5160" instrument_node=""> </span><a class="ng-binding" data-dcnode-id="5158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emergency.unhcr.org/entry/257802/topic/14413/staff-wellbeing" ng-href="./topic/14413/staff-wellbeing"><span data-dcnode-id="5159" instrument_node="">See all entries</span></a><span data-dcnode-id="5157" instrument_node=""> </span></li><span data-dcnode-id="5155" instrument_node=""> </span></ul><span data-dcnode-id="5153" instrument_node=""> </span></div><span data-dcnode-id="5150" instrument_node=""> </span><span data-dcnode-id="5148" instrument_node=""> </span><span data-dcnode-id="5146" instrument_node=""> </span></div><span data-dcnode-id="5143" instrument_node=""> </span></span><span data-dcnode-id="5141" instrument_node=""> </span></span><span data-dcnode-id="5139" instrument_node=""> </span></span><span data-dcnode-id="5137" instrument_node=""> </span><a class="dropdown-close" data-dcnode-id="5135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//emergency.unhcr.org/entry/257802"><span data-dcnode-id="5136" instrument_node="">×</span></a><span data-dcnode-id="5134" instrument_node=""> </span></div><span data-dcnode-id="5131" instrumen pan><span data-dcnode-id="4542" instrument_node=""> </span><div class="ng-isolate-scope" current-topic="currentTopic" data-dcnode-id="117" encoded-data="encodedData" entry="entry.data" translation="translation" widgets="widgets"><span data-dcnode-id="4541" instrument_node=""> </span><div class="entry-structure-holder ng-scope" data-dcnode-id="195" ng-include="templateUrl" onload="runUpdateHrefs()"><div class="content row ng-scope" data-dcnode-id="196"><span data-dcnode-id="4539" instrument_node=""> </span><div class="col-xs-12 col-md-4 pull-right" data-dcnode-id="4491"><span data-dcnode-id="4538" instrument_node=""> </span><div class="top-tips ng-scope" data-dcnode-id="4494" ng-if="topTips.value.length > 0"><span data-dcnode-id="4536" instrument_node=""> </span><h3 class="ng-binding" data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">Key points</span></h3><span data-dcnode-id="4533" instrument_node=""> </span><span bbcode="topTips.value" class="ng-isolate-scope" data-dcnode-id="4496"><strong data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">DO</span></strong><br data-dcnode-id="4530"><span data-dcnode-id="4529" instrument_node=""> </span><ul data-dcnode-id="4516"><li data-dcnode-id="4527"><span data-dcnode-id="4528" instrument_node="">Analyse the feasibility of cash, and justify the reasons for not using cash.</span></li><li data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">Establish SOPs for CBI.</span></li><li data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">Agree with partners on a collaborative approach to CBI.</span></li><li data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">Establish a multi-functional team to oversee a CBI.</span></li><li data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">Involve PoC in all the steps of cash delivery.</span></li><li data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">Reach out to CBI experts in house.</span></li></ul><strong data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node=""> </span></strong><br data-dcnode-id="4513"><span data-dcnode-id="4512" instrument_node=""> </span><strong data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">DON'T</span></strong><br data-dcnode-id="4509"><span data-dcnode-id="4508" instrument_node=""> </span><ul data-dcnode-id="4497"><li data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node="">Adopt forms of assistance because we have used them in the past.</span></li><li data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">Establish cash delivery mechanisms in a silo (separate from partners and government).</span></li><li data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">Think that you can deliver cash without sufficient resources and expertise.</span></li><li data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">Stop advocating for CBI if the government is not in favour.</span></li><li data-dcnode-id="4498"><span data-dcnode-id="4499" instrument_node="">Leave cash delivery to the cash focal point; it is a multi-functional operation.</span></li></ul></span><span data-dcnode-id="4495" instrument_node=""> </span></div><span data-dcnode-id="4492" instrument_node=""> </span></div><span data-dcnode-id="4490" instrument_node=""> </span><div class="col-xs-12 col-md-8 pull-left" data-dcnode-id="321"><span data-dcnode-id="4489" instrument_node=""> </span><div class="field ng-scope" data-dcnode-id="4441" ng-repeat="field in entry.fields" ng-switch="" on="field.type"><span data-dcnode-id="4487" instrument_node=""> </span><span class="ng-scope" data-dcnode-id="4449" ng-switch-when="text"><span data-dcnode-id="4485" instrument_node=""> </span><h3 data-dcnode-id="4480"><span class="number ng-binding" data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">1</span></span><span class="headline ng-binding" data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">Overview</span></span></h3><span data-dcnode-id="4479" instrument_node=""> </span><span bbcode="field.value" class="field_text ng-isolate-scope" data-dcnode-id="4453"><span data-dcnode-id="4478" instrument_node="">This Entry provides guidance to field operations when they consider the introduction of cash based interventions (CBIs), including multi-purpose cash grants (MPGs).</span><br data-dcnode-id="4477"><br data-dcnode-id="4476"><span data-dcnode-id="4475" instrument_node="">A ‘</span><strong data-dcnode-id="4473"><span data-dcnode-id="4474" instrument_node="">cash-based intervention</span></strong><span data-dcnode-id="4472" instrument_node="">' is any intervention in which cash or vouchers for goods or services are provided to refugees and other persons of concern (PoC) either as individuals or as representatives of a community.</span><br data-dcnode-id="4471"><span data-dcnode-id="4470" instrument_node=""> </span><br data-dcnode-id="4469"><span data-dcnode-id="4468" instrument_node=""> </span><strong data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">Note</span></strong><span data-dcnode-id="4465" instrument_node="">. Cash or vouchers that are provided to governments or other state actors, or to humanitarian workers or service providers, are not CBIs. The terms CBI, ‘cash-based transfer' and ‘cash transfer programming' are interchangeable.</span><br data-dcnode-id="4464"><span data-dcnode-id="4463" instrument_node=""> </span><br data-dcnode-id="4462"><span data-dcnode-id="4461" instrument_node=""> </span><strong data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">Multipurpose cash grants (MPGs)</span></strong><span data-dcnode-id="4458" instrument_node=""> are regular or one-off cash transfers to a household that fully or partially cover a set of basic or recovery needs in different sectors (for instance, for shelter, food, education, and livelihood) and support protection and solutions outcomes. By definition, MPGs are unrestricted cash transfers that put beneficiary choice (the prioritisation by beneficiaries of their own needs) at the centre of programming. They are designed to offer refugees and other PoC as much dignity, flexibility and efficiency as possible commensurate with their needs and capacities.</span><br data-dcnode-id="4457"><span data-dcnode-id="4456" instrument_node=""> </span><br data-dcnode-id="4455"><span data-dcnode-id="4454" instrument_node="">  Assuming the context is appropriate, the steps and tools for implementing CBIs are outlined below.</span></span><span data-dcnode-id="4452" instrument_node=""> </span><span data-dcnode-id="4450" instrument_node=""> </span></span><span data-dcnode-id="4448" instrument_node=""> </span><span data-dcnode-id="4446" instrument_node=""> </span><span data-dcnode-id="4444" instrument_node=""> </span><span data-dcnode-id="4442" instrument_node=""> </span></div><div class="field ng-scope" data-dcnode-id="4403" ng-repeat="field in entry.fields" ng-switch="" on="field.type"><span data-dcnode-id="4439" instrument_node=""> </span><span class="ng-scope" data-dcnode-id="4411" ng-switch-when="text"><span data-dcnode-id="4437" instrument_node=""> </span><h3 data-dcnode-id="4432"><span class="number ng-binding" data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">2</span></span><span class="headline ng-binding" data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">Protection objectives</span></span></h3><span data-dcnode-id="4431" instrument_node=""> </span><span bbcode="field.value" class="field_text ng-isolate-scope" data-dcnode-id="4415"><ul data-dcnode-id="4416"><li data-dcnode-id="4429"><span data-dcnode-id="4430" instrument_node="">To give PoC the right to choose how they meet their basic needs, taking their changing needs into consideration.</span></li><li data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">To boost the host economy and so create a better environment for asylum and co-existence.</span></li><li data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">To facilitate PoC access to national services.</span></li><li data-dcnode-id="4423"><span data-dcnode-id="4424" instrument_node="">To promote a rights-based, community-based and participatory approach.</span></li><li data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">To increase refugees' self-reliance, by combining cash and livelihood interventions.</span></li><li data-dcnode-id="4419"><span data-dcnode-id="4420" instrument_node="">To help people to be economically active, and thereby achieve financial inclusion.</span></li><li data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">To link humanitarian cash programmes to national social safety net programmes, whenever possible. If this cannot be done at the outset, programmes should mirror existing systems in order to facilitate a smooth transition later on.</span></li></ul></span><span data-dcnode-id="4414" instrument_node=""> </span><span data-dcnode-id="4412" instrument_node=""> </span></span><span data-dcnode-id="4410" instrument_node=""> </span><span data-dcnode-id="4408" instrument_node=""> </span><span data-dcnode-id="4406" instrument_node=""> </span><span data-dcnode-id="4404" instrument_node=""> </span></div><div class="field ng-scope" data-dcnode-id="4163" ng-repeat="field in entry.fields" ng-switch="" on="field.type"><span data-dcnode-id="4401" instrument_node=""> </span><span class="ng-scope" data-dcnode-id="4171" ng-switch-when="text"><span data-dcnode-id="4399" instrument_node=""> </span><h3 data-dcnode-id="4394"><span class="number ng-binding" data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">3</span></span><span class="headline ng-binding" data-dcnode-id="4395"><span data-dcnode-id="4396" instrument_node="">Underlying principles and standards</span></span></h3><span data-dcnode-id="4393" instrument_node=""> </span><span bbcode="field.value" class="field_text ng-isolate-scope" data-dcnode-id="4175"><strong data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">CBI policy outlines the following lines of action:</span></strong><br data-dcnode-id="4390"><span data-dcnode-id="4389" instrument_node=""> </span><ul data-dcnode-id="4376"><li data-dcnode-id="4387"><span data-dcnode-id="4388" instrument_node="">Embed CBI as a corporate priority.</span></li><li data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">Proactively consider cash when you evaluate different forms of transfer.</span></li><li data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">Exercise leadership; promote coherence and complementarity.</span></li><li data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">Maximize partnership by ensuring that all aspects of CBI programmes are joined up.</span></li><li data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">Use direct transfer wherever possible to deliver cash assistance to refugees and other PoC.</span></li><li data-dcnode-id="4377"><span data-dcnode-id="4378" instrument_node="">Ensure that CBI programmes are subject to appropriate financial controls.</span></li></ul><strong data-dcnode-id="4373"><br data-dcnode-id="4375"><span data-dcnode-id="4374" instrument_node="">Do a cash feasibility and response analysis</span></strong><br data-dcnode-id="4372"><span data-dcnode-id="4371" instrument_node="">UNHCR multi-functional teams should employ the </span><em data-dcnode-id="4369"><span data-dcnode-id="4370" instrument_node="">Cash feasibility and response analysis toolkit</span></em><span data-dcnode-id="4368" instrument_node=""> to decide whether CBI is feasible in a given operation. Use the toolkit after undertaking a needs assessment and if there is evidence that CBI is an appropriate way to address PoC needs.</span><br data-dcnode-id="4367"><span data-dcnode-id="4366" instrument_node=""> </span><br data-dcnode-id="4365"><span data-dcnode-id="4364" instrument_node="">To establish the feasibility of CBI, analyse the seven key areas outlined below.</span><br data-dcnode-id="4363"><br data-dcnode-id="4362"><span data-dcnode-id="4361" instrument_node=""> </span><span data-dcnode-id="4348" instrument_node=""> </span><span data-dcnode-id="4346" instrument_node=""> </span><span data-dcnode-id="4323" instrument_node=""> </span><span data-dcnode-id="4321" instrument_node=""> </span><span data-dcnode-id="4295" instrument_node=""> </span><span data-dcnode-id="4293" instrument_node=""> </span><span data-dcnode-id="4268" instrument_node=""> </span><span data-dcnode-id="4266" instrument_node=""> </span><span data-dcnode-id="4248" instrument_node=""> </span><span data-dcnode-id="4246" instrument_node=""> </span><span data-dcnode-id="4219" instrument_node=""> </span><span data-dcnode-id="4217" instrument_node=""> </span><span data-dcnode-id="4198" instrument_node=""> </span><span data-dcnode-id="4196" instrument_node=""> </span><span data-dcnode-id="4180" instrument_node=""> </span><span data-dcnode-id="4178" instrument_node=""> </span><table data-dcnode-id="4176"><tbody data-dcnode-id="4177"><tr data-dcnode-id="4347"><td data-dcnode-id="4355"><span data-dcnode-id="4360" instrument_node=""> </span><strong data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">Area ofanalysis </span></strong><strong data-dcnode-id="4357"></strong><br data-dcnode-id="4356"></td><td data-dcnode-id="4349"><span data-dcnode-id="4354" instrument_node=""> </span><strong data-dcnode-id="4352"><span data-dcnode-id="4353" instrument_node="">Key questionsand main tools</span></strong><strong data-dcnode-id="4351"></strong><br data-dcnode-id="4350"></td></tr><tr data-dcnode-id="4322"><td data-dcnode-id="4338"><span data-dcnode-id="4345" instrument_node=""> </span><strong data-dcnode-id="4343"><span data-dcnode-id="4344" instrument_node="">1.      </span></strong><strong data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">Market access and capacity</span></strong><strong data-dcnode-id="4340"></strong><br data-dcnode-id="4339"></td><td data-dcnode-id="4324"><span data-dcnode-id="4337" instrument_node="">  Arelocal,regional, and national markets accessible? Can they providethe goods or services that are required? Ca they do so at anappropriate price? If demand increases following the introduction of a CBIprogramme, can markets respond ?</span><br data-dcnode-id="4336"><span data-dcnode-id="4335" instrument_node="">Maintool. </span><a data-dcnode-id="4331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/593e856e7" target="_blank"><span data-dcnode-id="4334" instrument_node="">UNHCR,</span><em data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node=""> Market Assessment Companion Guide andToolkit</span></em></a><span data-dcnode-id="4330" instrument_node="">.</span><u data-dcnode-id="4329"></u><br data-dcnode-id="4328"><em data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node=""> </span></em><br data-dcnode-id="4325"></td></tr><tr data-dcnode-id="4294"><td data-dcnode-id="4313"><span data-dcnode-id="4320" instrument_node=""> </span><strong data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">2.      </span></strong><strong data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">Protection risks and benefits</span></strong><strong data-dcnode-id="4315"></strong><br data-dcnode-id="4314"></td><td data-dcnode-id="4296"><span data-dcnode-id="4312" instrument_node="">   Whatare the protection risks and benefits of using CBIs compared withalternatives? What are the protection implications forindividuals, householdsand communities? How can these risks be mitigatedand managed?</span><br data-dcnode-id="4311"><span data-dcnode-id="4310" instrument_node="">Maintools.</span><strong data-dcnode-id="4307"><em data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node=""> </span></em></strong><a data-dcnode-id="4303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cashlearning.org/downloads/erc-guide-for-protection-in-cash-based-interventions-web.pdf" target="_blank"><span data-dcnode-id="4306" instrument_node="">UNHCR,</span><em data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node=""> Guide for Protection in Cash-BasedInterventions</span></em></a><span data-dcnode-id="4302" instrument_node="">;and UNHCR, </span><a data-dcnode-id="4299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cashlearning.org/downloads/erc-protection-risks-and-benefits-analysis-tool-web.pdf" target="_blank"><em data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">Protection Risk and Benefit Analysis Tool</span></em></a><span data-dcnode-id="4298" instrument_node="">.</span><br data-dcnode-id="4297"></td></tr><tr data-dcnode-id="4267"><td data-dcnode-id="4285"><span data-dcnode-id="4292" instrument_node=""> </span><strong data-dcnode-id="4290"><span data-dcnode-id="4291" instrument_node="">3.      </span></strong><strong data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">Financial risks and benefits</span></strong><strong data-dcnode-id="4287"></strong><br data-dcnode-id="4286"></td><td data-dcnode-id="4269"><span data-dcnode-id="4284" instrument_node="">  Whatare the potential financial risks and benefits of using CBIs? Howcan risks be mitigated and managed?</span><br data-dcnode-id="4283"><span data-dcnode-id="4282" instrument_node="">Main tool. UNHCR, </span><em data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">Templatefor country-level standard operating procedures (SOPs) for UNHCR cash-basedinterventions</span></em><strong data-dcnode-id="4278"><span data-dcnode-id="4279" instrument_node=""> </span></strong><span data-dcnode-id="4277" instrument_node="">(</span><a data-dcnode-id="4275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intranet.unhcr.org/en/protection-programme/cash-based-interventions.html" target="_blank"><span data-dcnode-id="4276" instrument_node="">CBIintranet</span></a><span data-dcnode-id="4274" instrument_node="">).</span><strong data-dcnode-id="4273"></strong><br data-dcnode-id="4272"><span data-dcnode-id="4271" instrument_node=""> </span><br data-dcnode-id="4270"></td></tr><tr data-dcnode-id="4247"><td data-dcnode-id="4258"><span data-dcnode-id="4265" instrument_node=""> </span><strong data-dcnode-id="4263"><span data-dcnode-id="4264" instrument_node="">4.      </span></strong><strong data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">Political context</span></strong><strong data-dcnode-id="4260"></strong><br data-dcnode-id="4259"></td><td data-dcnode-id="4249"><span data-dcnode-id="4257" instrument_node="">  Whatis the host government's position on providing CBIsto PoC, nationally orlocally? What are other CBI actors,including the Government, doing? What is the regulatory environment?</span><br data-dcnode-id="4256"><span data-dcnode-id="4255" instrument_node="">Maintool. Best practice is summarised in UNHCR, </span><em data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">Cash feasibility and response analysis toolkit.</span></em><br data-dcnode-id="4252"><span data-dcnode-id="4251" instrument_node=""> </span><br data-dcnode-id="4250"></td></tr><tr data-dcnode-id="4218"><td data-dcnode-id="4232"><span data-dcnode-id="4245" instrument_node=""> </span><strong data-dcnode-id="4243"><span data-dcnode-id="4244" instrument_node="">5.      </span></strong><strong data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">Transfer mechanisms and deliveryoptions </span></strong><strong data-dcnode-id="4240"></strong><br data-dcnode-id="4239"><strong data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node=""> </span></strong><br data-dcnode-id="4236"><strong data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node=""> </span></strong><br data-dcnode-id="4233"></td><td data-dcnode-id="4220"><span data-dcnode-id="4231" instrument_node="">  Whichorganizations provide financial services? Whatis their coverage and how reliable is theservice they provide? How long might it take to contractand establish the required services? What is the regulatory environment?</span><br data-dcnode-id="4230"><span data-dcnode-id="4229" instrument_node="">Maintool. UNHCR, </span><a data-dcnode-id="4225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/598c69db7" target="_blank"><em data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">CashDelivery Mechanism Assessment Tool </span></em><span data-dcnode-id="4226" instrument_node="">(CDMAT)</span></a><span data-dcnode-id="4224" instrument_node="">.</span><br data-dcnode-id="4223"><span data-dcnode-id="4222" instrument_node=""> </span><br data-dcnode-id="4221"></td></tr><tr data-dcnode-id="4197"><td data-dcnode-id="4209"><span data-dcnode-id="4216" instrument_node=""> </span><strong data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">6.      </span></strong><strong data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">Costs and cost-efficiency</span></strong><strong data-dcnode-id="4211"></strong><br data-dcnode-id="4210"></td><td data-dcnode-id="4199"><span data-dcnode-id="4208" instrument_node="">   Whatis the cost of delivering CBIs, relative to alternativeoptions? What are the costs ofdifferent transfer mechanisms?</span><br data-dcnode-id="4207"><span data-dcnode-id="4206" instrument_node="">Maintool. Best practice is summarised in UNHCR, </span><em data-dcnode-id="4204"><span data-dcnode-id="4205" instrument_node="">Cash feasibility and responseanalysis toolkit</span></em><span data-dcnode-id="4203" instrument_node="">.</span><br data-dcnode-id="4202"><span data-dcnode-id="4201" instrument_node=""> </span><br data-dcnode-id="4200"></td></tr><tr data-dcnode-id="4179"><td data-dcnode-id="4188"><span data-dcnode-id="4195" instrument_node=""> </span><strong data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">7.      </span></strong><strong data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">Skills and capacity </span></strong><strong data-dcnode-id="4190"></strong><br data-dcnode-id="4189"></td><td data-dcnode-id="4181"><span data-dcnode-id="4187" instrument_node=""> Whatskills are available in the operation that will assistdelivery of CBI? What level of commitment is there? Consider a range offunctions, including information technology (IT) and budgetingand accounting. What additional internal capacityis needed?</span><br data-dcnode-id="4186"><span data-dcnode-id="4185" instrument_node="">Maintool. An overview of the steps required toestablish a CBI is attached to this Entry.</span><br data-dcnode-id="4184"><span data-dcnode-id="4183" instrument_node=""> </span><br data-dcnode-id="4182"></td></tr></tbody></table></span><span data-dcnode-id="4174" instrument_node=""> </span><span data-dcnode-id="4172" instrument_node=""> </span></span><span data-dcnode-id="4170" instrument_node=""> </span><span data-dcnode-id="4168" instrument_node=""> </span><span data-dcnode-id="4166" instrument_node=""> </span><span data-dcnode-id="4164" instrument_node=""> </span></div><div class="field ng-scope" data-dcnode-id="4100" ng-repeat="field in entry.fields" ng-switch="" on="field.type"><span data-dcnode-id="4161" instrument_node=""> </span><span class="ng-scope" data-dcnode-id="4108" ng-switch-when="text"><span data-dcnode-id="4159" instrument_node=""> </span><h3 data-dcnode-id="4154"><span class="number ng-binding" data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">4</span></span><span class="headline ng-binding" data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">Protection Risks</span></span></h3><span data-dcnode-id="4153" instrument_node=""> </span><span bbcode="field.value" class="field_text ng-isolate-scope" data-dcnode-id="4112"><u data-dcnode-id="4150"><span data-dcnode-id="4152" instrument_node="">Protection risks and benefits</span><br data-dcnode-id="4151"></u><br data-dcnode-id="4149"><span data-dcnode-id="4148" instrument_node="">Always prepare a protection risk mitigation matrix when you design an assistance programme. It will help you to identify the potential harmful effects and risks of CBIs, who is at risk, how serious the harms might be, how likely they are to occur, and whether the programme's design can mitigate risks (by selecting particular payment, delivery or feedback mechanisms, for example). An example of a protection risk mitigation matrix can be found on the </span><a data-dcnode-id="4146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intranet.unhcr.org/en/protection-programme/cash-based-interventions/standing-operating-procedures.html" target="_blank"><span data-dcnode-id="4147" instrument_node="">intranet</span></a><span data-dcnode-id="4145" instrument_node="">.</span><br data-dcnode-id="4144"><span data-dcnode-id="4143" instrument_node=""> </span><br data-dcnode-id="4142"><span data-dcnode-id="4141" instrument_node="">  Weigh risks against potential benefits; consider alternative forms of transfer if risks cannot be mitigated. Monitor programmes regularly; establish accountability frameworks with effective feedback and response mechanisms.</span><br data-dcnode-id="4140"><span data-dcnode-id="4139" instrument_node=""> </span><br data-dcnode-id="4138"><span data-dcnode-id="4137" instrument_node="">  In summary, when you assess whether a CBI programme is feasible, ask the following key questions to assess protection risks and benefits:</span><br data-dcnode-id="4136"><span data-dcnode-id="4135" instrument_node=""> </span><ul data-dcnode-id="4120"><li data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">Are affected communities included as participants in all phases of the programme cycle?</span></li><li data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">Will MPGs create or exacerbate protection risks or improve benefits for individuals, households and communities?</span></li><li data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">Have individuals with different or specific needs and protection risks been consulted?</span></li><li data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">Have two-way feedback mechanisms and focal points been established to ensure regular communication?</span></li><li data-dcnode-id="4125"><span data-dcnode-id="4126" instrument_node="">Are we working closely with colleagues in protection and other relevant sectors?</span></li><li data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">Have we done a gender, age and diversity analysis?</span></li><li data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">Does the MPG design take account of complementary activities and services?</span></li></ul><span data-dcnode-id="4119" instrument_node=""> </span><br data-dcnode-id="4118"><span data-dcnode-id="4117" instrument_node="">  For further information on protection risk and benefits analysis, see UNHCR, </span><a data-dcnode-id="4114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cashlearning.org/downloads/operational-guidance-and-toolkit-for-multipurpose-cash-grants---web.pdf" target="_blank"><em data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">Operational Guidance and Toolkit for Multipurpose Cash Grants</span></em></a><span data-dcnode-id="4113" instrument_node="">, pp. 33-35.</span></span><span data-dcnode-id="4111" instrument_node=""> </span><span data-dcnode-id="4109" instrument_node=""> </span></span><span data-dcnode-id="4107" instrument_node=""> </span><span data-dcnode-id="4105" instrument_node=""> </span><span data-dcnode-id="4103" instrument_node=""> </span><span data-dcnode-id="4101" instrument_node=""> </span></div><div class="field ng-scope" data-dcnode-id="4064" ng-repeat="field in entry.fields" ng-switch="" on="field.type"><span data-dcnode-id="4098" instrument_node=""> </span><span class="ng-scope" data-dcnode-id="4072" ng-switch-when="text"><span data-dcnode-id="4096" instrument_node=""> </span><h3 data-dcnode-id="4091"><span class="number ng-binding" data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">5</span></span><span class="headline ng-binding" data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">Other risks</span></span></h3><span data-dcnode-id="4090" instrument_node=""> </span><span bbcode="field.value" class="field_text ng-isolate-scope" data-dcnode-id="4076"><u data-dcnode-id="4087"><span data-dcnode-id="4089" instrument_node="">Other risks and hazards (security, political, reputational, etc.)</span><br data-dcnode-id="4088"></u><br data-dcnode-id="4086"><span data-dcnode-id="4085" instrument_node="">  During feasibility planning, it is important to assess the financial and operational risks associated with particular methods of transfer and delivery mechanism, including the harms they might cause, and the probability that harm will occur. Use UNHCR's </span><em data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">Risk Mitigation Matrix</span></em><span data-dcnode-id="4082" instrument_node=""> to assess risks, identify who is at risk and the possible harms, and set out mitigating measures. Based on this analysis, assess whether the risks are such that a CBI programme cannot be justified or cannot be implemented. Additional risks that need to be analysed include legal, political and socio-economic risks.</span><br data-dcnode-id="4081"><span data-dcnode-id="4080" instrument_node="">  An example of a financial risk mitigation matrix can be found on the </span><a data-dcnode-id="4078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intranet.unhcr.org/en/protection-programme/cash-based-interventions/standing-operating-procedures.html" target="_blank"><span data-dcnode-id="4079" instrument_node="">intranet</span></a><span data-dcnode-id="4077" instrument_node="">.</span></span><span data-dcnode-id="4075" instrument_node=""> </span><span data-dcnode-id="4073" instrument_node=""> </span></span><span data-dcnode-id="4071" instrument_node=""> </span><span data-dcnode-id="4069" instrument_node=""> </span><span data-dcnode-id="4067" instrument_node=""> </span><span data-dcnode-id="4065" instrument_node=""> </span></div><div class="field ng-scope" data-dcnode-id="4027" ng-repeat="field in entry.fields" ng-switch="" on="field.type"><span data-dcnode-id="4062" instrument_node=""> </span><span class="ng-scope" data-dcnode-id="4035" ng-switch-when="text"><span data-dcnode-id="4060" instrument_node=""> </span><h3 data-dcnode-id="4055"><span class="number ng-binding" data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">6</span></span><span class="headline ng-binding" data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">Key decision points</span></span></h3><span data-dcnode-id="4054" instrument_node=""> </span><span bbcode="field.value" class="field_text ng-isolate-scope" data-dcnode-id="4039"><span data-dcnode-id="4053" instrument_node="">The multi-sectoral nature of UNHCR's refugee mandate makes it sensible to use CBIs because they can address a range of needs cost-effectively, during displacement and on return. Before designing and implementing a CBI response, it is essential to:</span><br data-dcnode-id="4052"><span data-dcnode-id="4051" instrument_node=""> </span><ul data-dcnode-id="4046"><li data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">Determine whether to use cash, based on a feasibility assessment and analysis.</span></li><li data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">Agree collaboration arrangements with partners if cash is feasible. In refugee settings, UNHCR should coordinate a cash approach with sectors and agencies, as well as with the Government and safety net programmes.</span></li></ul><br data-dcnode-id="4045"><span data-dcnode-id="4044" instrument_node="">UNHCR's </span><a data-dcnode-id="4041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cms.emergency.unhcr.org/documents/11982/48012/UNHCR%2BGuidance%2Bon%2BCash-Based%2BInterventions%2Bdescribes%2Bhow%2Bto%2Bdetermine%2Bthe%2Bdelivery%2Bmechanism%2Bfor%2BCBIs/2ddc49a7-a245-4f8e-9ba9-3eabe4537249" target="_blank"><em data-dcnode-id="4042"><span data-dcnode-id="4043" instrument_node="">Guidance on Cash-Based Interventions in Displacement Settings</span></em></a><span data-dcnode-id="4040" instrument_node=""> will help teams to analyse whether CBIs are an appropriate way to achieve protection and assistance goals, and to design suitable programmes.</span></span><span data-dcnode-id="4038" instrument_node=""> </span><span data-dcnode-id="4036" instrument_node=""> </span></span><span data-dcnode-id="4034" instrument_node=""> </span><span data-dcnode-id="4032" instrument_node=""> </span><span data-dcnode-id="4030" instrument_node=""> </span><span data-dcnode-id="4028" instrument_node=""> </span></div><div class="field ng-scope" data-dcnode-id="3724" ng-repeat="field in entry.fields" ng-switch="" on="field.type"><span data-dcnode-id="4025" instrument_node=""> </span><span class="ng-scope" data-dcnode-id="3732" ng-switch-when="text"><span data-dcnode-id="4023" instrument_node=""> </span><h3 data-dcnode-id="4018"><span class="number ng-binding" data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node="">7</span></span><span class="headline ng-binding" data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">Key steps</span></span></h3><span data-dcnode-id="4017" instrument_node=""> </span><span bbcode="field.value" class="field_text ng-isolate-scope" data-dcnode-id="3736"><span data-dcnode-id="4016" instrument_node="">To implement a CBI in an emergency, take the following steps:</span><br data-dcnode-id="4015"><span data-dcnode-id="4014" instrument_node=""> </span><ul data-dcnode-id="3993"><li data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">Establish a multi-functional team (MFT). Include staff who have expertise in cash management and distribution.</span></li><li data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">Establish a CBI focal point who can coordinate with counterparts in HQ, with the MFT, and with partners.</span></li><li data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">Link with existing coordination systems and partners who are already implementing CBIs (on advocacy, data collection, targeting, delivery of assistance, etc.).</span></li><li data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">Do a rapid needs assessment (or similar programme) to guide your programme design.</span></li><li data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">Assess the market (for access, availability of goods, prices, etc.).</span></li><li data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node="">Consider political factors, including support for cash and CBI.</span></li><li data-dcnode-id="4000"><span data-dcnode-id="4001" instrument_node="">Consider the relative merits of multipurpose cash grants and sectoral cash grants and decide the value of the grants that will be distributed.</span></li><li data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">Identify an appropriate financial service provider or partner who is competent to deliver the services you require swiftly and in an appropriate manner.</span></li><li data-dcnode-id="3996"><span data-dcnode-id="3997" instrument_node="">Because it is a priority to facilitate the financial inclusion of refugees, seek arrangements that will enable them to open individual bank accounts.</span></li><li data-dcnode-id="3994"><span data-dcnode-id="3995" instrument_node="">Develop standard operating procedures (SOPs) that set out in precise terms how the CBI is to be implemented. Make use of technology wherever it will improve efficiency or access.</span></li></ul><br data-dcnode-id="3992"><span data-dcnode-id="3991" instrument_node="">The table below indicates how a CBI should be designed and implemented in an emergency.</span><br data-dcnode-id="3990"><span data-dcnode-id="3989" instrument_node=""> </span><strong data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">Note</span></strong><span data-dcnode-id="3986" instrument_node="">. The sub-steps are not always chronological. These activities can and should happen in parallel.</span><br data-dcnode-id="3985"><br data-dcnode-id="3984"><span data-dcnode-id="3983" instrument_node=""> </span><span data-dcnode-id="3969" instrument_node=""> </span><span data-dcnode-id="3967" instrument_node=""> </span><span data-dcnode-id="3963" instrument_node=""> </span><span data-dcnode-id="3961" instrument_node=""> </span><span data-dcnode-id="3957" instrument_node=""> </span><span data-dcnode-id="3955" instrument_node=""> </span><span data-dcnode-id="3951" instrument_node=""> </span><span data-dcnode-id="3949" instrument_node=""> </span><span data-dcnode-id="3945" instrument_node=""> </span><span data-dcnode-id="3943" instrument_node=""> </span><span data-dcnode-id="3935" instrument_node=""> </span><span data-dcnode-id="3933" instrument_node=""> </span><span data-dcnode-id="3929" instrument_node=""> </span><span data-dcnode-id="3927" instrument_node=""> </span><span data-dcnode-id="3923" instrument_node=""> </span><span data-dcnode-id="3921" instrument_node=""> </span><span data-dcnode-id="3913" instrument_node=""> </span><span data-dcnode-id="3911" instrument_node=""> </span><span data-dcnode-id="3907" instrument_node=""> </span><span data-dcnode-id="3905" instrument_node=""> </span><span data-dcnode-id="3901" instrument_node=""> </span><span data-dcnode-id="3899" instrument_node=""> </span><span data-dcnode-id="3895" instrument_node=""> </span><span data-dcnode-id="3893" instrument_node=""> </span><span data-dcnode-id="3889" instrument_node=""> </span><span data-dcnode-id="3887" instrument_node=""> </span><span data-dcnode-id="3883" instrument_node=""> </span><span data-dcnode-id="3881" instrument_node=""> </span><span data-dcnode-id="3877" instrument_node=""> </span><span data-dcnode-id="3875" instrument_node=""> </span><span data-dcnode-id="3871" instrument_node=""> </span><span data-dcnode-id="3869" instrument_node=""> </span><span data-dcnode-id="3865" instrument_node=""> </span><span data-dcnode-id="3863" instrument_node=""> </span><span data-dcnode-id="3855" instrument_node=""> </span><span data-dcnode-id="3853" instrument_node=""> </span><span data-dcnode-id="3849" instrument_node=""> </span><span data-dcnode-id="3847" instrument_node=""> </span><span data-dcnode-id="3843" instrument_node=""> </span><span data-dcnode-id="3841" instrument_node=""> </span><span data-dcnode-id="3837" instrument_node=""> </span><span data-dcnode-id="3835" instrument_node=""> </span><span data-dcnode-id="3831" instrument_node=""> </span><span data-dcnode-id="3829" instrument_node=""> </span><span data-dcnode-id="3825" instrument_node=""> </span><span data-dcnode-id="3823" instrument_node=""> </span><span data-dcnode-id="3819" instrument_node=""> </span><span data-dcnode-id="3817" instrument_node=""> </span><span data-dcnode-id="3811" instrument_node=""> </span><span data-dcnode-id="3809" instrument_node=""> </span><span data-dcnode-id="3805" instrument_node=""> </span><span data-dcnode-id="3803" instrument_node=""> </span><span data-dcnode-id="3799" instrument_node=""> </span><span data-dcnode-id="3797" instrument_node=""> </span><span data-dcnode-id="3793" instrument_node=""> </span><span data-dcnode-id="3791" instrument_node=""> </span><span data-dcnode-id="3787" instrument_node=""> </span><span data-dcnode-id="3785" instrument_node=""> </span><span data-dcnode-id="3781" instrument_node=""> </span><span data-dcnode-id="3779" instrument_node=""> </span><span data-dcnode-id="3771" instrument_node=""> </span><span data-dcnode-id="3769" instrument_node=""> </span><span data-dcnode-id="3765" instrument_node=""> </span><span data-dcnode-id="3763" instrument_node=""> </span><span data-dcnode-id="3759" instrument_node=""> </span><span data-dcnode-id="3757" instrument_node=""> </span><span data-dcnode-id="3753" instrument_node=""> </span><span data-dcnode-id="3751" instrument_node=""> </span><span data-dcnode-id="3747" instrument_node=""> </span><span data-dcnode-id="3745" instrument_node=""> </span><span data-dcnode-id="3741" instrument_node=""> </span><span data-dcnode-id="3739" instrument_node=""> </span><table data-dcnode-id="3737"><tbody data-dcnode-id="3738"><tr data-dcnode-id="3968"><td data-dcnode-id="3979" rowspan="5"><strong data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">Engage with stakeholders</span></strong><br data-dcnode-id="3980"></td><td data-dcnode-id="3970"><span data-dcnode-id="3978" instrument_node=""> </span><strong data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node="">Identify </span></strong><span data-dcnode-id="3975" instrument_node="">a </span><strong data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">CBIfocal point</span></strong><span data-dcnode-id="3972" instrument_node="">.</span><br data-dcnode-id="3971"></td></tr><tr data-dcnode-id="3962"><td data-dcnode-id="3964"><span data-dcnode-id="3966" instrument_node="">   Establish or activate a multi-functionalteam (MFT) or cash task team (CTT).</span><br data-dcnode-id="3965"></td></tr><tr data-dcnode-id="3956"><td data-dcnode-id="3958"><span data-dcnode-id="3960" instrument_node="">   Contact external stakeholders and find out whether a cashworking group (CWG) is active.</span><br data-dcnode-id="3959"></td></tr><tr data-dcnode-id="3950"><td data-dcnode-id="3952"><span data-dcnode-id="3954" instrument_node="">   Assess the skills and capacity of theMFT and partners.</span><br data-dcnode-id="3953"></td></tr><tr data-dcnode-id="3944"><td data-dcnode-id="3946"><span data-dcnode-id="3948" instrument_node="">   Designand conduct a training for (i) UNHCR staff and (ii) partners (if needed).</span><br data-dcnode-id="3947"></td></tr><tr data-dcnode-id="3934"><td data-dcnode-id="3939" rowspan="3"><strong data-dcnode-id="3941"><span data-dcnode-id="3942" instrument_node="">Assess needs and determine objectives</span></strong><br data-dcnode-id="3940"></td><td data-dcnode-id="3936"><span data-dcnode-id="3938" instrument_node="">   Identify and analyse existing CBI assessments and reports.</span><br data-dcnode-id="3937"></td></tr><tr data-dcnode-id="3928"><td data-dcnode-id="3930"><span data-dcnode-id="3932" instrument_node="">   Analyse needs.</span><br data-dcnode-id="3931"></td></tr><tr data-dcnode-id="3922"><td data-dcnode-id="3924"><span data-dcnode-id="3926" instrument_node="">   Determine programme objectives.</span><br data-dcnode-id="3925"></td></tr><tr data-dcnode-id="3912"><td data-dcnode-id="3917" rowspan="9"><strong data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">Analyse options and choose the best combination</span></strong><br data-dcnode-id="3918"></td><td data-dcnode-id="3914"><span data-dcnode-id="3916" instrument_node="">   Assesspolitical feasibility.</span><br data-dcnode-id="3915"></td></tr><tr data-dcnode-id="3906"><td data-dcnode-id="3908"><span data-dcnode-id="3910" instrument_node="">  Conduct a market analysis.</span><br data-dcnode-id="3909"></td></tr><tr data-dcnode-id="3900"><td data-dcnode-id="3902"><span data-dcnode-id="3904" instrument_node="">  Assess protection risks and benefits, and safety considerations(macro).</span><br data-dcnode-id="3903"></td></tr><tr data-dcnode-id="3894"><td data-dcnode-id="3896"><span data-dcnode-id="3898" instrument_node="">  Assess delivery options. (Include a macrorisk assessment of the financial sector.)</span><br data-dcnode-id="3897"></td></tr><tr data-dcnode-id="3888"><td data-dcnode-id="3890"><span data-dcnode-id="3892" instrument_node="">  Assess cost efficiency.</span><br data-dcnode-id="3891"></td></tr><tr data-dcnode-id="3882"><td data-dcnode-id="3884"><span data-dcnode-id="3886" instrument_node="">  Assess the skills and capacity ofpotential implementing partners and financial service providers.</span><br data-dcnode-id="3885"></td></tr><tr data-dcnode-id="3876"><td data-dcnode-id="3878"><span data-dcnode-id="3880" instrument_node="">  Determine whether t is appropriate to apply conditionalities.</span><br data-dcnode-id="3879"></td></tr><tr data-dcnode-id="3870"><td data-dcnode-id="3872"><span data-dcnode-id="3874" instrument_node="">  Select a form of transfer or a combinationof forms; and a delivery mechanism.</span><br data-dcnode-id="3873"></td></tr><tr data-dcnode-id="3864"><td data-dcnode-id="3866"><span data-dcnode-id="3868" instrument_node="">  Refineobjectives.</span><br data-dcnode-id="3867"></td></tr><tr data-dcnode-id="3854"><td data-dcnode-id="3859" rowspan="13"><strong data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">Plan, design and implement the response</span></strong><br data-dcnode-id="3860"></td><td data-dcnode-id="3856"><span data-dcnode-id="3858" instrument_node="">  Develop the programme strategy. Decide how you will targetbeneficiaries, and the value of the cash transfer.</span><br data-dcnode-id="3857"></td></tr><tr data-dcnode-id="3848"><td data-dcnode-id="3850"><span data-dcnode-id="3852" instrument_node="">   Design and test IT solutions.</span><br data-dcnode-id="3851"></td></tr><tr data-dcnode-id="3842"><td data-dcnode-id="3844"><span data-dcnode-id="3846" instrument_node="">   Assess operational and financialrisks and develop a strategy to mitigate them.</span><br data-dcnode-id="3845"></td></tr><tr data-dcnode-id="3836"><td data-dcnode-id="3838"><span data-dcnode-id="3840" instrument_node=""> Assess protection risks and develop a strategy to mitigate them.</span><br data-dcnode-id="3839"></td></tr><tr data-dcnode-id="3830"><td data-dcnode-id="3832"><span data-dcnode-id="3834" instrument_node="">  Develop a communications andinformation strategy for internal and external stakeholders.</span><br data-dcnode-id="3833"></td></tr><tr data-dcnode-id="3824"><td data-dcnode-id="3826"><span data-dcnode-id="3828" instrument_node="">   Plan the allocation of resources.</span><br data-dcnode-id="3827"></td></tr><tr data-dcnode-id="3818"><td data-dcnode-id="3820"><span data-dcnode-id="3822" instrument_node="">   Draft and publicise terms ofreference and a request-for-proposals. Select partners (financial serviceproviders or implementing partners) and finalize contracts.</span><br data-dcnode-id="3821"></td></tr><tr data-dcnode-id="3810"><td data-dcnode-id="3812"><span data-dcnode-id="3816" instrument_node="">   Determine criteria for selecting retailers who will participate(if appropriate).</span><em data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node=""> </span></em><br data-dcnode-id="3813"></td></tr><tr data-dcnode-id="3804"><td data-dcnode-id="3806"><span data-dcnode-id="3808" instrument_node="">   Select a vendor to create or managevouchers (if required).</span><br data-dcnode-id="3807"></td></tr><tr data-dcnode-id="3798"><td data-dcnode-id="3800"><span data-dcnode-id="3802" instrument_node="">  Develop country-specific SOPs that set out administrative andfinancial procedures.</span><br data-dcnode-id="3801"></td></tr><tr data-dcnode-id="3792"><td data-dcnode-id="3794"><span data-dcnode-id="3796" instrument_node=""> Secure approval for the SOPs.</span><br data-dcnode-id="3795"></td></tr><tr data-dcnode-id="3786"><td data-dcnode-id="3788"><span data-dcnode-id="3790" instrument_node="">  Train partners.</span><br data-dcnode-id="3789"></td></tr><tr data-dcnode-id="3780"><td data-dcnode-id="3782"><span data-dcnode-id="3784" instrument_node=""> Establish financial arrangements and transfer funds.</span><br data-dcnode-id="3783"></td></tr><tr data-dcnode-id="3770"><td data-dcnode-id="3775" rowspan="6"><strong data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">Monitor, listen, evaluate and learn </span></strong><br data-dcnode-id="3776"></td><td data-dcnode-id="3772"><span data-dcnode-id="3774" instrument_node="">  Managethe caseload.</span><br data-dcnode-id="3773"></td></tr><tr data-dcnode-id="3764"><td data-dcnode-id="3766"><span data-dcnode-id="3768" instrument_node="">  Monitor the distribution of cash orvouchers.</span><br data-dcnode-id="3767"></td></tr><tr data-dcnode-id="3758"><td data-dcnode-id="3760"><span data-dcnode-id="3762" instrument_node=""> Make changes to the CBI as necessary.</span><br data-dcnode-id="3761"></td></tr><tr data-dcnode-id="3752"><td data-dcnode-id="3754"><span data-dcnode-id="3756" instrument_node="">   Monitor financial reconciliation andservice payments.</span><br data-dcnode-id="3755"></td></tr><tr data-dcnode-id="3746"><td data-dcnode-id="3748"><span data-dcnode-id="3750" instrument_node="">   Report.</span><br data-dcnode-id="3749"></td></tr><tr data-dcnode-id="3740"><td data-dcnode-id="3742"><span data-dcnode-id="3744" instrument_node="">   Review the programme.</span><br data-dcnode-id="3743"></td></tr></tbody></table></span><span data-dcnode-id="3735" instrument_node=""> </span><span data-dcnode-id="3733" instrument_node=""> </span></span><span data-dcnode-id="3731" instrument_node=""> </span><span data-dcnode-id="3729" instrument_node=""> </span><span data-dcnode-id="3727" instrument_node=""> </span><span data-dcnode-id="3725" instrument_node=""> </span></div><div class="field ng-scope" data-dcnode-id="3690" ng-repeat="field in entry.fields" ng-switch="" on="field.type"><span data-dcnode-id="3722" instrument_node=""> </span><span class="ng-scope" data-dcnode-id="3698" ng-switch-when="text"><span data-dcnode-id="3720" instrument_node=""> </span><h3 data-dcnode-id="3715"><span class="number ng-binding" data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">8</span></span><span class="headline ng-binding" data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">Key management considerations</span></span></h3><span data-dcnode-id="3714" instrument_node=""> </span><span bbcode="field.value" class="field_text ng-isolate-scope" data-dcnode-id="3702"><ul data-dcnode-id="3703"><li data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">In line with UNHCR's policy on CBI, operations will systematically and proactively consider the feasibility of using CBIs as the preferred form of transfer in emergencies.</span></li><li data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node=""> Decisions to use only in-kind assistance must be based on solid evidence that this option is preferred by beneficiaries, or is a necessary response to the weakness of markets or financial service providers.</span></li><li data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">In inter-agency fora, UNHCR should seek proactively to integrate CBIs in emergency responses and accept a coordination role where CBIs are adopted.</span></li><li data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">UNHCR should not allow a position to arise in which it loses cash funding because of the food/non-food division of responsibilities with WFP. Where donors push for a single agency model, UNHCR should seek to be the lead agency for multi-purpose cash, including for food and non-food.</span></li><li data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">Where it does not use CBIs in an emergency, notably after the first six months, UNHCR must be able to explain why.</span></li></ul></span><span data-dcnode-id="3701" instrument_node=""> </span><span data-dcnode-id="3699" instrument_node=""> </span></span><span data-dcnode-id="3697" instrument_node=""> </span><span data-dcnode-id="3695" instrument_node=""> </span><span data-dcnode-id="3693" instrument_node=""> </span><span data-dcnode-id="3691" instrument_node=""> </span></div><div class="field ng-scope" data-dcnode-id="3655" ng-repeat="field in entry.fields" ng-switch="" on="field.type"><span data-dcnode-id="3688" instrument_node=""> </span><span class="ng-scope" data-dcnode-id="3663" ng-switch-when="text"><span data-dcnode-id="3686" instrument_node=""> </span><h3 data-dcnode-id="3681"><span class="number ng-binding" data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">9</span></span><span class="headline ng-binding" data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">Resources and partnerships</span></span></h3><span data-dcnode-id="3680" instrument_node=""> </span><span bbcode="field.value" class="field_text ng-isolate-scope" data-dcnode-id="3667"><ul data-dcnode-id="3668"><li data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">UNHCR will cooperate on CBI with host governments, agency partners, PoC, donors, and private sector actors (particularly if they have expertise or comparative advantages in areas critical to the delivery and effectiveness of cash assistance). Use shared mechanisms accessible to all the humanitarian actors in a response. Do not establish parallel delivery systems for CBI unless there is no other option.</span></li><span data-dcnode-id="3677" instrument_node=""> </span><li data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">Wherever possible, transfer cash assistance through a financial service provider. </span></li><span data-dcnode-id="3674" instrument_node=""> </span><li data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node="">If they are to function effectively, CBIs must be supported by an active multi-functional team that includes (at minimum) colleagues from supply, finance, programming, and protection, as well as sectoral colleagues. Each has a role to play in the different phases of a CBI: assessment of needs, markets, and financial service providers; analysis of risks; choice of the transfer and delivery mechanism; procurement and contracting; implementation and monitoring. </span></li><span data-dcnode-id="3671" instrument_node=""> </span><li data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">Seek support. The CBI Section at HQ stands ready to offer technical advice, deploy CBI experts, provide training, support the procurement process, communicate CBI achievements, and more.</span></li></ul></span><span data-dcnode-id="3666" instrument_node=""> </span><span data-dcnode-id="3664" instrument_node=""> </span></span><span data-dcnode-id="3662" instrument_node=""> </span><span data-dcnode-id="3660" instrument_node=""> </span><span data-dcnode-id="3658" instrument_node=""> </span><span data-dcnode-id="3656" instrument_node=""> </span></div><div class="field ng-scope" data-dcnode-id="3623" ng-repeat="field in entry.fields" ng-switch="" on="field.type"><span data-dcnode-id="3653" instrument_node=""> </span><span data-dcnode-id="3651" instrument_node=""> </span><div class="links ng-scope" data-dcnode-id="3629" ng-switch-when="links"><span data-dcnode-id="3649" instrument_node=""> </span><h3 data-dcnode-id="3644"><span class="number ng-binding" data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">10</span></span><span class="headline ng-binding" data-dcnode-id="3645"><span data-dcnode-id="3646" instrument_node="">Links</span></span></h3><span data-dcnode-id="3643" instrument_node=""> </span><span bbcode="field.value" class="ng-isolate-scope" data-dcnode-id="3631"><a data-dcnode-id="3640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/59fc35bd7" target="_blank"><span data-dcnode-id="3642" instrument_node="">Cash Based Interventions for WASH Programmes in Refugee Settings</span><br data-dcnode-id="3641"></a><a data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/598c0eda7" target="_blank"><span data-dcnode-id="3639" instrument_node="">Cash for Health: Key learnings from a cash for health intervention in Jordan</span></a><a data-dcnode-id="3636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/59fc362e7" target="_blank"><span data-dcnode-id="3637" instrument_node="">CaLP/UNHCR, Review of the Common Cash Facility in Jordan</span></a><a data-dcnode-id="3634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/5a14306a7" target="_blank"><span data-dcnode-id="3635" instrument_node="">The Greece Cash Alliance, Meeting Basic Needs through a harmonized Partnership System for Cash Assistance</span></a><a data-dcnode-id="3632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unhcr.org/5a280f297" target="_blank"><span data-dcnode-id="3633" instrument_node="">Cash for education – A global review of UNHCR programs in refugee situations</span></a></span><span data-dcnode-id="3630" instrument_node=""> </span></div><span data-dcnode-id="3628" instrument_node=""> </span><span data-dcnode-id="3626" instrument_node=""> </span><span data-dcnode-id="3624" instrument_node=""> </span></div><div class="field ng-scope" data-dcnode-id="451" ng-repeat="field in entry.fields" ng-switch="" on="field.type"><span data-dcnode-id="3621" instrument_node=""> </span><span data-dcnode-id="3619" instrument_node=""> </span><span data-dcnode-id="3617" instrument_node=""> </span><div class="media ng-scope" data-dcnode-id="455" ng-switch-when="media"><span data-dcnode-id="3615" instrument_node=""> </span><h3 data-dcnode-id="3610"><span class="number ng-binding" data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">11</span></span><span class="headline ng-binding" da
