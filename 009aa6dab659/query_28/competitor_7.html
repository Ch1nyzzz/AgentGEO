</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Over three decades have passed since the end of the Nigerian Civil War (1967 – 1970). During almost thirty months of fighting between the Federal Government and Biafran secessionists, the conflict received more attention from the west than any other previous African ‘emergency.’ From the standpoint of the international humanitarian sector, Biafra served as one of the first conflicts where issues of more contemporary complex emergencies began to develop. Biafra taught the international community how to better provide and coordinate aid and assistance to those affected by a complex emergency. From these lessons came the beginnings of a framework for several issues, including: dealing with internally displaced persons (IDPs), negotiating humanitarian access and repatriation of unaccompanied children. However, in spite of Biafra’s importance, the world seems to have little recollection of this conflict and the lessons learned.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">The lessons that can be learned from Biafra seem to share a common thread of coordination, and the lack thereof. This commonality unites these lessons with the present, since problems of coordination have been found in many of the subsequent, large-scale humanitarian emergencies. The United Nations Coordination of the International Humanitarian Response to the Gulf Crisis, published in 1992, clearly points to this:</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1508" instrument_node="">“Coordination” is one of the most overused and least understood terms in international parlance today. Those providing financial and moral support for humanitarian activities are increasingly insistent that coordination be improved and duplication, waste and competition be avoided.</span><a data-dcnode-id="1506" href="#_edn2" name="_ednref2"><span data-dcnode-id="1507" instrument_node=""> [2]</span></a></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">The purpose of this study is to re-visit the events of Biafra and, through debate in the humanitarian and academic communities, reconsider the lessons learned. The reason for this reconsideration is simple: little has been accomplished in terms of putting the lessons learned in Biafra to practise in present day complex emergencies.</span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">This study is unique, in that it is based largely upon firsthand, formerly confidential documents from the archives of the United Nations High Commissioner for Refugees (UNHCR) and the United States Department of State. These documents have never before been openly considered in the context of the conflict in Biafra. The use of these documents throughout this study allows for a fresh look at a conflict, from which many of today’s most pressing humanitarian issues have their beginnings. Of particular relevance, are three issues on which this study focuses: protecting and assisting IDPs, negotiating humanitarian access and repatriation of unaccompanied children.</span></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1495"><strong data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Background</span></strong></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">The civil war in Nigeria is generally recognized as one of the first conflicts in which large-scale humanitarian aid operations were conducted at the regional level. With this in mind, this study will look broadly at the issues concerning IDPs, achieving negotiated humanitarian access and the repatriation of unaccompanied children during the Nigerian Civil War. It will consider some similarities to present-day emergencies, and look at what lessons can be learned from each issue as a means for solving problems in the future.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">The roots of the conflict in Nigeria are ethnic and religious in nature. Political lines drawn up in 1914 by British colonial rulers had little regard for the vast diversity that existed within the new boundaries of the colony. Different groups, united under artificial constraints, had very little in common in terms of culture, ethnicity and religion. It was these conditions that set the stage for conflict.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">In 1960, Nigeria peacefully gained its independence from Great Britain. However, many social disparities remained unchecked. The Northern and Southern regions of Nigeria were on opposite ends of the spectrum in terms of socioeconomic development. The 1999 International Committee of the Red Cross Report on the Rules of War provides a vivid picture of these disparities:</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1484" instrument_node="">Primary amongst the differences was the disparity of educational levels between North and South – so vast that it was feared that the North would not have enough qualified civil servants to constitute a smoothly running government. In addition, economic development in the South had far outpaced that of the North. In the South, Nigerians had benefited from education and access to the colonial apparatus, while the North lacked an entrepreneurial and commercial class.</span><a data-dcnode-id="1482" href="#_edn3" name="_ednref3"><span data-dcnode-id="1483" instrument_node=""> [3]</span></a></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">The violence began on 15 January 1966. A coup, led by military officers, resulted in the assassination of the prime minister and other top-ranking officials. The coup failed, but its negative impact dragged the country further into crisis. In the chaos that followed, General Aguiyi Ironsi declared himself leader of Nigeria on 16 January, adopting military rule. Ironsi, an Eastern Ibo, took on an agenda aimed at domination of the country.</span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1476" instrument_node="">On 15 March 1967, three people were injured during an anti-Ibo demonstration in a market in the Western town of Ibadan. </span><em data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">The Times</span></em><span data-dcnode-id="1473" instrument_node="">, in Great Britain, reported that, “the incident is seen as the first phase of a reprisal against the order by Col. Ojukwu [the Eastern region’s governor] banning West Nigerians from his region.”</span><a data-dcnode-id="1471" href="#_edn4" name="_ednref4"><span data-dcnode-id="1472" instrument_node=""> [4]</span></a></p><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">On 30 May, Ojukwu formally declared the secession of the Eastern region and the formation of the ‘Republic of Biafra.’ Tensions reached their peak in July 1967, with the assassination of Ironsi and the subsequent counter-coup that followed, led by officers from the North. On 1 August 1967, General Yakubu Gowon became the new head of state, maintaining military rule and adopting a policy of uniting Nigeria. What followed was a protracted civil war, lasting almost two and-a-half years.</span></p><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Unlike other previous conflicts within Africa, the Nigerian Civil War did not go unnoticed internationally. The heavy use of the media, primarily television, (used by both sides to gain international sympathy for their cause), fed images to the world on a daily basis. The primary images shown were shocking pictures of the starvation of millions of children. The world suddenly took a critical interest in the conflict and called for humanitarian action to be taken. J.M. Clevenger, in his 1975 thesis, described this:</span></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1462" instrument_node="">The time was ripe for the internationalisation of the relief operation. A sudden burst of publicity from the world’s press in May and June 1968 brought the impending disaster to the forefront of the world’s attention and stimulated the development of a massive international effort to rescue starving Nigerians and Biafrans.</span><a data-dcnode-id="1460" href="#_edn5" name="_ednref5"><span data-dcnode-id="1461" instrument_node=""> [5]</span></a></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">One of the organizations present within Nigeria prior to the conflict was the United States Peace Corps. Following their missions, two of its volunteers, Jim and Susan Hummer, were hired by the Nigerian Federal Government to teach in secondary school, and shared some of their experiences and perspectives of the civil war:</span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1454" instrument_node="">One Nigerian official we knew well was reluctant to comment on the Federal Government’s prosecution of the war. He told us it was not their custom to criticize their leaders or to “wash their linen in public.” We were aware that there was a military blockade and that those within the Eastern Region were being denied food and the necessary supplies in order to hasten their surrender. We knew that innocent people were dying from starvation and disease. We also knew that the Nigerians we lived and worked with supported the reunification of their country. They were very certain that the Federal Government would accomplish this goal through steady tightening of the blockade as the Federal forces continued to move deep into the secession area.</span><a data-dcnode-id="1452" href="#_edn6" name="_ednref6"><span data-dcnode-id="1453" instrument_node=""> [6] </span></a></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1447"><strong data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Internally displaced persons</span></strong></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1445" instrument_node="">The term ‘internally displaced person’ had not yet been coined at the time of this conflict. Throughout the literature and first-hand sources consulted for this section, it was found that the term ‘refugee’ was largely used for both those internally displaced, as well as for those outside their country of origin. However, this was not the case for UNHCR, which did have such a distinction. Instances found in the present-day definition of internally displaced persons reflect that, in many respects, the situation that existed in Biafra was identical in nature. This is especially true of the causation, which, argues Cohen and Deng, is predominantly as a result of “conflict among different ethnic groups or between governments and minorities of a different race, language, culture, or religion.”</span><a data-dcnode-id="1443" href="#_edn7" name="_ednref7"><span data-dcnode-id="1444" instrument_node=""> [7]</span></a></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1440" instrument_node="">This particular cause of internal displacement clearly existed in Biafra. Large-scale displacement began in September 1966, after Ojukwu concluded that the safety of Easterners living outside the region could no longer be guaranteed, and asked them to return home. This request, combined with the revenge massacres of Northerners in Port Harcourt, Enugu and other Eastern cities, led to a counter-exodus of non-Easterners from the region.</span><a data-dcnode-id="1438" href="#_edn8" name="_ednref8"><span data-dcnode-id="1439" instrument_node=""> [8] </span></a><span data-dcnode-id="1437" instrument_node=""> By the final quarter of 1966, there were hundreds of thousands of IDPs throughout Nigeria/Biafra.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1432"><strong data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Problems of protection and assistance </span></strong></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1430" instrument_node="">The most severe problems for those internally displaced came with the Federal Government’s declaration of an embargo and blockade of Biafra in 1967, which kept out precious commodities, including salt, meat and fish (staples of the Nigerian diet). In response, Biafra tried to increase its production of chickens and eggs, but as refugees from other parts of Nigeria flooded in and food stocks dwindled, so hunger grew.</span><a data-dcnode-id="1428" href="#_edn9" name="_ednref9"><span data-dcnode-id="1429" instrument_node=""> [9] </span></a><span data-dcnode-id="1427" instrument_node=""> The IDPs most affected by this artificially created famine, were children, the victims of ‘total’ war. An early fact-finding mission in 1968, conducted by ICRC Doctor Edwin Spirgi, found that at least 300,000 children suffering from kwashiorkor.</span><a data-dcnode-id="1425" href="#_edn10" name="_ednref10"><span data-dcnode-id="1426" instrument_node=""> [10] </span></a></p><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1422" instrument_node="">By the summer of 1968, the ICRC reported that three million children were near death. A combination of the vast numbers of displaced persons throughout Nigeria and the federal blockage on food was driving more than 2,500 people into the hospital every week.</span><a data-dcnode-id="1420" href="#_edn11" name="_ednref11"><span data-dcnode-id="1421" instrument_node=""> [11] </span></a><span data-dcnode-id="1419" instrument_node="">Besides the deadly kwashiorkor, common ailments among the internally displaced included acute exhaustion and hunger. There was also a high need amongst IDPs for vaccination against various diseases.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Temporary camps established by the international community attempted to assist in the protection of those internally displaced. However, life in the camps was bleak. A personal account from Dr. Philip Emeagwali, who, as a child, spent many months in the St. Joseph’s Primary School of Awka – Etiti camp, tells of his experience:</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1413" instrument_node="">Many children in our camp suffered from the malnutrition disease called kwashiorkor. We stood in line for warm milk, dried stockfish (</span><em data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">okporoko</span></em><span data-dcnode-id="1410" instrument_node="">) and corn meal. My mentor (I have forgotten his name, but called him “teacher”) was forcefully conscripted into the Biafran army. After three days of military training, he was posted to the war front. Teacher never returned from the war front. He was the only child of his mother. [When someone died in the camp] we unceremoniously buried the dead at the bushes behind our camp. My niece, “Baby” Okwuosa and my paternal step-grandmother were buried without a funeral.</span><a data-dcnode-id="1408" href="#_edn12" name="_ednref12"><span data-dcnode-id="1409" instrument_node=""> [12]</span></a></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Another serious problem for IDPs came at the end of the war in January 1970. This involved how to meet the needs of the unaccompanied children displaced by the conflict. A memorandum for the creation of a welfare scheme for children stated:</span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1402" instrument_node="">These [displaced] children have to be returned sooner or later, but for the time, money and effort lavished on them to be meaningful, arrangements must be made for their continuing care and supervision upon their return. As yet no plans exist for this mainly because no properly coordinated and overall programme has been set up for the welfare of the children here in Biafra.</span><a data-dcnode-id="1400" href="#_edn13" name="_ednref13"><span data-dcnode-id="1401" instrument_node=""> [13]</span></a></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1397" instrument_node="">Between 20 February and 20 March 1970, the International Social Service (ISS) and International Union for Child Welfare (IUCW) conducted a mission to Nigeria, visiting centers that had been established to deal with the unaccompanied children. The primary purpose of the centers was to assist in the identification of as many of the children as possible. However, very few had been able to achieve this monumental task. The report stated that, “this work [identification] is most difficult with those groups of children which had moved several times during the war period.”</span><a data-dcnode-id="1395" href="#_edn14" name="_ednref14"><span data-dcnode-id="1396" instrument_node=""> [14] </span></a><span data-dcnode-id="1394" instrument_node=""> However, the mission found that, for the most part, the children were well cared for and there were very few staff that were “unprepared to understand and meet the needs of the children living in large groups away from their normal family environment.”</span><a data-dcnode-id="1392" href="#_edn15" name="_ednref15"><span data-dcnode-id="1393" instrument_node=""> [15]</span></a></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1389" instrument_node="">In June 1970, the first statistics concerning the number of displaced children were released. The estimated number of children inside Nigeria was 30,000, “most of whom will have to be accommodated in the [receiving] centers, at least in transition to more permanent placement.”</span><a data-dcnode-id="1387" href="#_edn16" name="_ednref16"><span data-dcnode-id="1388" instrument_node=""> [16]</span></a></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1384" instrument_node="">On 3 June, in response to the needs of the displaced children, the IUCW and the Federal Military Government of Nigeria reached an agreement in Lagos. It formed a “system for the [children’s] identification, tracing their families and the promotion of family reunion as well as the children’s care on a temporary or long-term basis.”</span><a data-dcnode-id="1382" href="#_edn17" name="_ednref17"><span data-dcnode-id="1383" instrument_node=""> [17] </span></a></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1377"><strong data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">The role of UNHCR</span></strong></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">On 9 November 1967, a confidential meeting was held between High Commissioner Prince Sadruddin Aga Khan and representatives of Biafra. The topic of the meeting was to discuss the problems of Ibo and the minority tribes in Eastern Nigeria resulting from the civil war. The following indicates the High Commissioner’s response and policy position:</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1372" instrument_node="">The High Commissioner informed [the representatives from Biafra] that the statute of the Office empowers him to assist in solving problems of refugees at the request of governments of countries of asylum. A refugee, in this context, is a person who is outside his country and does not, for various specified reasons, wish to avail himself of the protection of his country of origin. Since “Biafra” is not recognized as a separate state, the displaced people from other parts of Nigeria into Eastern Nigeria do not fall within the mandate of the Office and, therefore, there is nothing the Office could do for them.</span><a data-dcnode-id="1370" href="#_edn18" name="_ednref18"><span data-dcnode-id="1371" instrument_node=""> [18]</span></a></p><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1367" instrument_node="">UNHCR took a position that reflected its mandate and, in doing so, could not offer protection nor assistance to those displaced persons in Biafra.</span><a data-dcnode-id="1365" href="#_edn19" name="_ednref19"><span data-dcnode-id="1366" instrument_node=""> [19] </span></a><span data-dcnode-id="1364" instrument_node="">Despite this position, UNHCR did closely monitor the problem of internal displacement. Material found in the UNHCR’s archives suggests that its reasoning for doing so was because of the large number of persons who crossed frontiers into several West African states, including Gabon and the Ivory Coast.</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1358"><strong data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">International response</span></strong><span data-dcnode-id="1359" instrument_node=""> By May 1968, international non-governmental organizations (NGOs), including the International Committee of the Red Cross (ICRC), United Nations Children’s Fund (UNICEF), OXFAM, Caritas, World Food Programme (WFP), United Nations Development Programme (UNDP), World Council of Churches (WCC) and the Young Men’s Christian Association (YMCA), were distributing supplies and dozens of other organizations were also providing assistance. It is the ICRC that is largely credited for leading the internal humanitarian operations within Nigeria/Biafra during the conflict.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1356" instrument_node="">In April 1969, the ICRC, greatly helped by supplies and medical teams from UNICEF and the WCC, was running the biggest relief operation they had ever mounted, employed many hundreds of foreigners, Swiss delegates, doctors seconded from the national societies and expatriates, as well as 2,000 Nigerians.</span><a data-dcnode-id="1354" href="#_edn20" name="_ednref20"><span data-dcnode-id="1355" instrument_node=""> [20] </span></a><span data-dcnode-id="1353" instrument_node=""> The ICRC had 400 vehicles and various ships and aircraft, delivering over three million meals a week in Biafra.</span><a data-dcnode-id="1351" href="#_edn21" name="_ednref21"><span data-dcnode-id="1352" instrument_node=""> [21] </span></a><span data-dcnode-id="1350" instrument_node=""> Between 1967 and 1970, some 60,000 tons of food was distributed to the starving population.</span><a data-dcnode-id="1348" href="#_edn22" name="_ednref22"><span data-dcnode-id="1349" instrument_node=""> [22] </span></a><span data-dcnode-id="1347" instrument_node=""> The ICRC also carried out an extensive vaccination program.</span><a data-dcnode-id="1345" href="#_edn23" name="_ednref23"><span data-dcnode-id="1346" instrument_node=""> [23] </span></a></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1338"><strong data-dcnode-id="1339"><span data-dcnode-id="1342" instrument_node="">Negotiating humanitarian access</span><a data-dcnode-id="1340" href="#_edn24" name="_ednref24"><span data-dcnode-id="1341" instrument_node=""> [24]</span></a></strong></p><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1336" instrument_node="">The term ‘negotiated humanitarian access,’ like that of ‘internally displaced person,’ had not yet been coined at the time of Biafra. Instead, the term ‘negotiated agreement’ was found in several sources consulted, which had a similar meaning to ‘negotiated access.’ Similar to the present day, there was no pre-planned framework for negotiating access; rather it was done primarily on an </span><em data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">ad hoc</span></em><span data-dcnode-id="1333" instrument_node=""> basis, by a variety of actors, mostly at the highest levels of government. Biafra is very likely to have been the first complex emergency where such negotiations took place solely in the name of transportation of aid to affected groups.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">This section considers the development of negotiated access talks, primarily between the United States, the Federal Government of Nigeria and ICRC, and the extent to which they succeeded in reaching their objectives.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1325"><strong data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">The access process: trial and error</span></strong></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">By 1968, the fighting between the Federal Government and Biafran forces had escalated and, in response to the amount of civilians in need of relief, the international community made its first efforts to supply aid to those affected populations.</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1320" instrument_node="">The first transport efforts were by religious organizations that chartered planes to send in aid, “sometimes permitting weapons to travel alongside.”</span><a data-dcnode-id="1318" href="#_edn25" name="_ednref25"><span data-dcnode-id="1319" instrument_node=""> [25] </span></a><span data-dcnode-id="1317" instrument_node="">This was done primarily because no alternative existed in terms of being able to bargain with the warring parties. Secondly, since an open ‘air corridor’ existed, gunrunners took advantage of the opportunity to fly their supplies into Biafra as well. This created a situation of protection for both gunrunners and aid flights. This is because the warring parties did not want to be held responsible for shooting down a humanitarian aircraft and drawing negative attention upon themselves. Although such early efforts managed to get in some aid, the fact that weapons were sometimes transported in by the humanitarian airlifts, and gunrunners misused the system provided by the airlift, only served to increase the mistrust between the warring parties.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Unlike the independent religious groups, organizations such as the ICRC, were bound by Article 23 of the 1949 Geneva Conventions, which states:</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1311" instrument_node="">All delivery of aid in this kind of situation was to be subordinate to the agreement of the contracting power, who had to be convinced that the relief would go only to the civilians to whom it was destined and that enemy troops would derive no gain or advantage from it.</span><a data-dcnode-id="1309" href="#_edn26" name="_ednref26"><span data-dcnode-id="1310" instrument_node=""> [26] </span></a></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">This created difficulties for the organization, but after recognizing just how severe the humanitarian problems were, Gowon gave the ICRC authorization to begin flying relief into Biafra in early 1968. Although this gesture was seen as positive, only one plane carrying 16 to 20 tons of food per night was being delivered.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1303" instrument_node="">However, the airlift did manage to expand with support from other International Red Cross Societies. On 8 April 1968, the ICRC commenced a regular flight operation direct from Europe to Biafra via Fernando Poo Island.</span><a data-dcnode-id="1301" href="#_edn27" name="_ednref27"><span data-dcnode-id="1302" instrument_node="">[27] </span></a><span data-dcnode-id="1300" instrument_node=""> But even this was short-lived, for by August 1968, the “mercy” flights of the ICRC ceased, reportedly because “Biafran arms planes have taken advantage of the reduced flak Gowon puts up against the mercy flights, so that Gowon has stopped making any special provisions and the Red Cross has had some near misses.”</span><a data-dcnode-id="1298" href="#_edn28" name="_ednref28"><span data-dcnode-id="1299" instrument_node=""> [28]</span></a></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Despite the setbacks, negotiations continued. The warring parties both firmly believed that the humanitarian aid that did make it in was going to help support the other side’s military efforts. Thus, the element of mistrust became one of the primary factors that hindered the amount of aid reaching the affected populations.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1289"><em data-dcnode-id="1290"><strong data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">United States support</span></strong></em></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1287" instrument_node="">United States policy toward Nigeria in 1968 was, on the whole, in agreement with the Organization of African Unity’s position of supporting a “unified” Nigeria. In terms of other African states’ support for such a policy, “more than thirty-five recognized Biafra or showed sympathy toward Biafra. The rest of them were in favor of the unified Nigeria, partly because they all shuddered at the thought of breaking up over tribal ground.” </span><a data-dcnode-id="1285" href="#_edn29" name="_ednref29"><span data-dcnode-id="1286" instrument_node="">[29]</span></a></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1282" instrument_node="">A 12 August 1968 cable from the United States National Security Council to the President’s Special Assistant outlined specific U.S. policy toward the conflict: </span><a data-dcnode-id="1280" href="#_edn30" name="_ednref30"><span data-dcnode-id="1281" instrument_node="">[30]</span></a></p><span data-dcnode-id="1278" instrument_node="">
</span><ul data-dcnode-id="1261"><span data-dcnode-id="1277" instrument_node="">
</span><li data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Stimulate the Red Cross to serve as the international cover for a relief operation.</span></li><span data-dcnode-id="1274" instrument_node="">
</span><li data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Confidentially put pressure on both sides to agree to a settlement or at least to a relief agreement.</span></li><span data-dcnode-id="1271" instrument_node="">
</span><li data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Offer all help necessary to make a relief operation work.</span></li><span data-dcnode-id="1268" instrument_node="">
</span><li data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Push particularly hard on Gowon to dramatize the fact that it is not the Federal Government keeping the food out of Biafra.</span></li><span data-dcnode-id="1265" instrument_node="">
</span><li data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">-Work out the logistics of the relief scheme so that it is ready to move as soon as political arrangements are made.</span></li><span data-dcnode-id="1262" instrument_node="">
</span></ul><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">In an effort to reopen the air corridor, Edward Hamilton of the United States National Security Council staff proposed to:</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1256" instrument_node="">Persuade Gowon to permit airdrops of food from planes departing from Federal territory. This would allow him to inspect cargoes to be sure there are no arms; dramatize the fact that he wants to feed the hungry; and it would actually move sizeable amounts of food into Biafra.</span><a data-dcnode-id="1254" href="#_edn31" name="_ednref31"><span data-dcnode-id="1255" instrument_node=""> [31]</span></a></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">As the United States was preparing this proposal, the ICRC was working on a new plan to airlift aid from an airstrip in Federal territory to one in Biafra. However, with both of these plans for a new air ‘mercy’ corridor, there came many problems: 1) should Gowon and Ojukwu approve the plan, they would need to each provide an airstrip for the exclusive use of humanitarian actors under the guidance of the ICRC and, 2) they would need to at least provide some sort of guarantee that those international aid workers would be safe from attack.</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">The United States Embassy in Lagos presented both proposals to Gowon on 14 August 1968. However, they were rejected. A State Department cable on the 15 August stated:</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1239"><span data-dcnode-id="1245" instrument_node="">Gowon told the [United States Ambassador] that he had already decided that the FMG [Federal Military Government] could not accept the ICRC’s proposal for a relief airstrip because the airstrip that Ojukwu had offered was already under attack and likely to fall into FRG hands soon and because he did not like the way the ICRC had handled the matter, attempting to face the FMG with </span><em data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">fait accompli</span></em><span data-dcnode-id="1242" instrument_node="">.</span><a data-dcnode-id="1240" href="#_edn32" name="_ednref32"><span data-dcnode-id="1241" instrument_node=""> [32]</span></a></p><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">In response, United States President Lyndon B. Johnson sent Gowon a cable concerning the proposed access corridor. Johnson attempted to appeal to Gowon personally in order to get him to reconsider the proposal. The cable read:</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1234" instrument_node="">Knowing that you [Gowon] share my own deep concern over the suffering of those innocent persons, I feel justified in addressing this personal appeal to you to give your urgent agreement to the ICRC proposals for an air mercy corridor. Hopefully, this can be followed by rapid agreement on a land corridor.</span><a data-dcnode-id="1232" href="#_edn33" name="_ednref33"><span data-dcnode-id="1233" instrument_node=""> [33]</span></a></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1229" instrument_node="">Once again, there was rejection from the Federal Government. For the international community, especially the ICRC and United States, this meant “frustration by the failure of Biafra and the Federal Government to reach agreement on the methods of transportation and distribution.”</span><a data-dcnode-id="1227" href="#_edn34" name="_ednref34"><span data-dcnode-id="1228" instrument_node=""> [34] </span></a><span data-dcnode-id="1226" instrument_node=""> J.M. Clevenger noted the complexity of this issue:</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1223" instrument_node="">Neither of the belligerents was willing to concede the superiority of humanitarian over political considerations, which made it impossible to reach any agreement about the routes and methods to be used for moving relief supplies through the Federal blockade. In these circumstances, the humanitarian agencies felt compelled, given the gravity of the nutritional situation inside the enclave [of Biafra] in the summer of 1968, to step up their ‘clandestine’ airlift of relief supplies.</span><a data-dcnode-id="1221" href="#_edn35" name="_ednref35"><span data-dcnode-id="1222" instrument_node=""> [35]</span></a></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Another difficulty lay in the internal operations of the access negotiations. Since there were several relief organizations working within Biafra, it became difficult to coordinate one united effort amongst them. Instead, there emerged an element of competition amongst humanitarian organizations. A cable from the National Security Council to the President’s Special Assistant noted this on 14 November 1968:</span></p><span data-dcnode-id="1216" instrument_node="">
[There are] very real difficulties of getting relief organizations to pull together and of persuading the two sides in the civil war to let them operate as freely as necessary.</span><a data-dcnode-id="1214" href="#_edn36" name="_ednref36"><span data-dcnode-id="1215" instrument_node=""> [36]</span></a><p data-dcnode-id="1213"></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Because of the amount of media attention being given to the conflict, American public opinion grew in favour of humanitarian support for Biafra. At the Congressional level, Senators Kennedy and Mondale, among others, had been approached by church voluntary agencies to help secure eight Globemaster transports [aircraft] for the international relief effort. Secretary Dean Rusk recommended in a 24 December 1968 United States Security Council meeting that,</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1208" instrument_node="">The only real problem [with supplying these aircraft to the various church voluntary agencies] is with the [Nigerian] Federal Government. They are bound to object to our giving planes, if only because they regard the voluntary agencies as pro-Biafran and sometimes gunrunners. We have to come up with 8 planes rather than 6 and can afford to split the contribution between the voluntary agencies and Red Cross, which puts a better face on it for the Feds. This deal makes eminent good sense. It will cost us nothing, can save lives, and will, for the time being at least, lessen the Congressional heat here at home.</span><a data-dcnode-id="1206" href="#_edn37" name="_ednref37"><span data-dcnode-id="1207" instrument_node=""> [37] </span></a></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1203" instrument_node="">The plan, approved by President Johnson the following day, would significantly help the ICRC in its efforts to airlift aid into Biafra. Representatives from Biafra met secretly with Rusk to discus the preparation of an airfield to be used “exclusively” for relief. Rusk reported that although there were many problems with this proposal, “we are quietly offering to send in an expert from one of the relief agencies to see what they have in mind. We are telling the Biafrans, as we tell everyone else, that we are closing no options on saving lives.”</span><a data-dcnode-id="1201" href="#_edn38" name="_ednref38"><span data-dcnode-id="1202" instrument_node=""> [38] </span></a></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1198" instrument_node="">By the end of 1968, a new airstrip had been opened in Biafra for ICRC use. Aware of this, the Federal Government allowed the flights to resume, however, on an “at your own risk” basis. In January 1969, the ICRC successfully negotiated with the Governments of Equatorial Guinea and Dahomey to use airstrips for flying in relief to Biafra. With airstrips on Fernando Poo island, Equatorial Guinea and at Contonou, Dahomey “the humanitarian aid airlifts occurred under the auspices of Inter-Church Aid” between 1 and 2 February 1969.</span><a data-dcnode-id="1196" href="#_edn39" name="_ednref39"><span data-dcnode-id="1197" instrument_node=""> [39]</span></a></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">The United States and ICRC reached an agreement of cooperation in early 1969, dividing the access negotiations between air and land corridors, the United States taking the former. Although previous efforts to negotiate a land corridor under President Johnson had failed, it was agreed that the Nixon Administration to make a final attempt:</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1190" instrument_node="">The Americans believed that use of the Cross River was the best way to get large-scale relief into Biafra, with foodstuffs off-load onto shallow watercraft from ocean-going vessels. This Cross River project was eventually agreed to in principle by both sides, but it was largely a meaningless gesture, as the parties subsequently refused to discuss specifics.</span><a data-dcnode-id="1188" href="#_edn40" name="_ednref40"><span data-dcnode-id="1189" instrument_node=""> [40]</span></a></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1185" instrument_node="">Politically, the possibility of a land corridor seemed impossible. One of the many disagreements between the warring parties was simple, yet it illustrates both the mistrust and complexity of what was occurring: Ojukwu forbade the necessary food to reach the country through a neutral corridor for fear Nigerian troops would poison it.</span><a data-dcnode-id="1183" href="#_edn41" name="_ednref41"><span data-dcnode-id="1184" instrument_node=""> [41] </span></a><span data-dcnode-id="1182" instrument_node="">The ICRC continued to successfully airlift aid into Biafra, although each flight was still done on an “at your own risk” basis. This only lasted four months, when the risks involved tragically cost the organization. On 5 June, an ICRC DC-7 aircraft was shot down by the Federal air force over Biafra, killing the three aid workers on board. Because of this incident, serious disputes over the conduct of relief operations arose and the airlift was again suspended.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1179" instrument_node="">Access talks between July and September 1969 produced an agreement between the ICRC and Federal Government concerning daytime flights.</span><a data-dcnode-id="1177" href="#_edn42" name="_ednref42"><span data-dcnode-id="1178" instrument_node=""> [42] </span></a><span data-dcnode-id="1176" instrument_node=""> The agreement was signed on 13 September. However, the next day, it was rejected by the Biafran government on the grounds that it contained “no adequate guarantee against Nigerian military exploitation of the flights.”</span><a data-dcnode-id="1174" href="#_edn43" name="_ednref43"><span data-dcnode-id="1175" instrument_node=""> [43] </span></a></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1171" instrument_node="">Effectively, this incident ended any more attempts to negotiate access. A formal agreement was signed on 2 October 1969 in Lagos between the Federal Government and the ICRC, terminating the role of the ICRC as relief coordinating authority in Federal territory.</span><a data-dcnode-id="1169" href="#_edn44" name="_ednref44"><span data-dcnode-id="1170" instrument_node=""> [44] </span></a></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1160"><em data-dcnode-id="1164"><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">‘Ground rules’</span></strong></em><strong data-dcnode-id="1161"><a data-dcnode-id="1162" href="#_edn45" name="_ednref45"><span data-dcnode-id="1163" instrument_node=""> [45]</span></a></strong></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">One of the factors that caused frustration for the United States in its access negotiations with the warring parties was the inability to come to an agreement on what the ‘ground rules’ for access should be. Without agreement on such rules, talks between the warring parties and United States were largely ineffective. Several factors contributed to the inability to reach agreement on the ground rules, including: mistrust of humanitarian actors (which were seen, at times, as pro-Biafran) and mistrust of the humanitarian airlift itself (which was viewed as a ‘cover’ for running guns into both Nigeria and Biafra).</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">In a 1970 interview, Secretary Dean Rusk pointed out the frustration that occurred over the inability to agree on the ground rules for access:</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1152" instrument_node="">We [the United States] were concerned about food supplies for the Biafrans; we were ready to put in large amounts of food ourselves from our own stocks and were prepared to divert food ships going to other countries to Biafra. But the leaders of the two sides in Nigeria never could get together on the ground rules for furnishing food to the Biafrans, so the problem was not the availability of food but the ability to get it to those who were hungry.</span><a data-dcnode-id="1150" href="#_edn46" name="_ednref46"><span data-dcnode-id="1151" instrument_node=""> [46]</span></a></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1147" instrument_node="">Access negotiations experienced many difficulties, making them only partly successful. These difficulties or “points of friction,” as noted in 1977 by Dr. David P. Forsythe, included:</span><a data-dcnode-id="1145" href="#_edn47" name="_ednref47"><span data-dcnode-id="1146" instrument_node=""> [47]</span></a></p><span data-dcnode-id="1143" instrument_node="">
</span><ul data-dcnode-id="1129"><span data-dcnode-id="1142" instrument_node="">
</span><li data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Shielding of the gunrunners by ICRC planes, albeit unintended.</span></li><span data-dcnode-id="1139" instrument_node="">
</span><li data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">The ICRC had asked Lagos to lift its blockade in the fall of 1967.</span></li><span data-dcnode-id="1136" instrument_node="">
</span><li data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">The Federal military requisitioned some Red Cross aircraft for military purposes.</span></li><span data-dcnode-id="1133" instrument_node="">
</span><li data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">The Federal air force bombed not only civilian targets in Biafra, but Red Cross installations as well – and Red Cross personnel were killed by Federal troops.</span></li><span data-dcnode-id="1130" instrument_node="">
</span></ul><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1125"><strong data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Repatriation of unaccompanied children</span></strong></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">In August 1968, evacuations led by Caritas International, began transporting children out of Nigeria to Sao Tome. Subsequent evacuations to Gabon were arranged by other international organizations, including the “Biafran” National Red Cross Society, the Order of Malta, the French Red Cross and Terre des Hommes. Similar evacuations also took place to the Ivory Coast.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1118"><strong data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">The Ifekwunigwe repatriation scheme</span></strong></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">In January 1969, Dr. A.E. Ifekwunigwe, Chief Paediatrician of the Okporoh Hospital (Nigeria), published a memorandum on the welfare scheme for refugee children, which created a framework to be used for the eventual repatriation of the evacuated children. Because of his position and experience (having participated extensively in the 1968 evacuation), Ifekwunigwe was entrusted by the Federal authorities with coordinating the repatriation of the Nigerian children. In January 1970, Ifekwunigwe published a second memorandum as a follow-up.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Ifekwunigwe’s memoranda were extremely valuable in that they served as the framework adopted as the final repatriation scheme. They provided detailed analysis and solutions, while addressing the shortcomings of the evacuation process. Most importantly, they provided the evidence that repatriation of unaccompanied children was a key policy concern for all sides involved in the Biafran conflict.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">In his memorandum of 17 January 1969, Ifekwunigwe wrote:</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1107" instrument_node="">one should consider the problem not in the narrow context of evacuation of a very small proportion of the children abroad, but one should take a global view of the situation and think of evacuation of children abroad as just one facet.</span><a data-dcnode-id="1105" href="#_edn48" name="_ednref48"><span data-dcnode-id="1106" instrument_node=""> [48] </span></a><span data-dcnode-id="1104" instrument_node=""> With regard to the coordination of the evacuation program, he noted that “there has been no definite plan to guide them as to the priorities of our needs and no attempt has been made to coordinate their activities in order to avoid the waste that results from duplication of effort. They should be encouraged as much as possible to devote their attention to what can be done for the children here in Biafra rather than having their attention diverted by the scheme for evacuating the children abroad.”</span><a data-dcnode-id="1102" href="#_edn49" name="_ednref49"><span data-dcnode-id="1103" instrument_node=""> [49]</span></a></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Ifekwunigwe’s plan allowed for the process of repatriation not to be rushed. It rested largely on making sure that the ‘best interests’ of the children were met and that adequate staff (properly trained) and ‘reception’ centers were available before the children were moved from the host countries. Ifekwunigwe wrote:</span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1096" instrument_node="">It is desirable that the children should be returned to “Biafra” when they are well enough. The period varies with individual children, but this is generally about 3 to 6 months. However, as stressed earlier, for the exercise to be worthwhile, adequate arrangements for their resettlement and continuing care must be made. It is possible to set up camps for these children on return, but this has limitations and obvious disadvantages. Even if they go to a camp immediately on return, it should be only a transit camp for about 2 to 4 weeks and every effort should be made to place them either in their own homes or with a suitable guardian. A register of such children in the area should be kept by a Welfare Officer, specially appointed to pay home visits on them. The Relief Organizations should be encouraged to set up a Nutrition Center in each area to which these children have been returned.</span><a data-dcnode-id="1094" href="#_edn50" name="_ednref50"><span data-dcnode-id="1095" instrument_node=""> [50]</span></a></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1089"><strong data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Moving toward repatriation</span></strong></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">In April 1970, a meeting at UNHCR was held to begin planning for the possible participation in the repatriation of the children from Gabon and the Ivory Coast. One of the main points discussed was the pilot repatriation scheme, which was first drafted in January 1969 and 1970 by Dr. A.E. Ifekwunigwe (as seen above.) This plan was tentatively agreed to by the Federal Government of Nigeria, as well as the Governments of Ivory Coast and Gabon, but final assurances that the children’s well-being would be ensured was still a topic of primary concern.</span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1084" instrument_node="">At the meeting, UNHCR decided to take a role in the repatriation, thus making its services available to the Governments of Nigeria, Gabon and the Ivory Coast. In terms of the status of the children as defined by its mandate, UNHCR held that it “did not consider these children to be refugees and therefore, its offer of assistance [in the repatriation] falls within its good offices activities.”</span><a data-dcnode-id="1082" href="#_edn51" name="_ednref51"><span data-dcnode-id="1083" instrument_node=""> [51] </span></a><span data-dcnode-id="1081" instrument_node="">The Federal Government of Nigeria also held this position, having indicated in a memorandum to the High Commissioner that it “is unable to accept that one of the criteria under which the status of refugee is conferred on any person under the appropriate Geneva Convention is a voluntary wish of the person to live outside his country.”</span><a data-dcnode-id="1079" href="#_edn52" name="_ednref52"><span data-dcnode-id="1080" instrument_node=""> [52] </span></a><span data-dcnode-id="1078" instrument_node="">Instead, the Federal Government referred to the children as “evacuees.”</span><a data-dcnode-id="1076" href="#_edn53" name="_ednref53"><span data-dcnode-id="1077" instrument_node=""> [53] </span></a></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1073" instrument_node="">On 3 May 1970, an article appeared in the </span><em data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">New York Enquirer</span></em><span data-dcnode-id="1070" instrument_node=""> based on an interview with Princess Cecilia Bourban Parma concerning her experiences that she claimed to have had with affected children in Biafra during the conflict. In a letter from the Embassy of Nigeria in Washington, DC to Robin Jordan, Chairperson of Americans for Children’s Relief, it was believed that the interview was designed to:</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1067" instrument_node="">…arouse sympathy for, and perpetuate the idea of, the secession and the rebellion, well over three months after the civil war has ended, and at a time when those who engaged in this civil war are working together towards reconciliation and rehabilitation of all concerned. Such an article, and its publication at this time, is an unfortunate act and a disservice to everyone, and not least to those who Princess Cecilia claims to espouse.”</span><a data-dcnode-id="1065" href="#_edn54" name="_ednref54"><span data-dcnode-id="1066" instrument_node=""> [54] </span></a></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1062" instrument_node="">The interview focused on Bourban Parma’s supposed 15 months in Biafra, and never once mentions that any sort of international concern was being given to the war-affected children of Biafra.</span><a data-dcnode-id="1060" href="#_edn55" name="_ednref55"><span data-dcnode-id="1061" instrument_node=""> [55] </span></a><span data-dcnode-id="1059" instrument_node="">A few weeks later, Bourban Parma denied conducting the interview, calling it “fabricated.”</span><a data-dcnode-id="1057" href="#_edn56" name="_ednref56"><span data-dcnode-id="1058" instrument_node=""> [56] </span></a><span data-dcnode-id="1056" instrument_node="">Although not directly involved, UNHCR monitored the situation very closely, as Americans for Children’s Relief was playing a key role in the repatriation and the incident could have potentially complicated relations with the Federal Government of Nigeria.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Negotiating repatriation</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">UNHCR’s role of negotiator did not begin until the final details for the repatriation scheme had been worked out between the Governments of Nigeria, Gabon and the Ivory Coast. The original request for UNHCR to step-in came from the Federal Government of Nigeria, which was experiencing difficulties attempting to negotiate on its own with two governments who did not believe that it was stable enough for the repatriation:</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1047" instrument_node="">Nigeria remained acutely aware of the support of Gabon and the Ivory Coast for the Biafran cause during the war, while Gabon and the Ivory Coast wished reassurances that conditions in the former secessionist areas were suitable for the return of the children.</span><a data-dcnode-id="1045" href="#_edn57" name="_ednref57"><span data-dcnode-id="1046" instrument_node=""> [57] </span></a></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">The second factor involved international borders. Since the children had been evacuated to Gabon and the Ivory Coast, each government felt that is was solely responsible for those children within its borders and, therefore, did not wish to have any sort of international intervention. This was especially true with the Government of Gabon, who, in March 1970, issued a message to those international organizations dealing with the Nigerian children, as received through the United States Embassy in Livreville:</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1039" instrument_node="">President Bongo of Gabon convoked all the local voluntary agencies to inform them that they should not become involved in the question of Nigerian children, who were the sole responsibility of the Gabonese Government.</span><a data-dcnode-id="1037" href="#_edn58" name="_ednref58"><span data-dcnode-id="1038" instrument_node=""> [58] </span></a></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1034" instrument_node="">On 5 May 1970, High Commissioner Prince Sadruddin Aga Khan sent a cable to Gowon expressing his willingness to send UNHCR Director of Operations Thomas Jamieson to Lagos to begin to “discuss how UNHCR might proceed to assist with the humanitarian objective of repatriating the children now outside of Nigeria.”</span><a data-dcnode-id="1032" href="#_edn59" name="_ednref59"><span data-dcnode-id="1033" instrument_node=""> [59] </span></a><span data-dcnode-id="1031" instrument_node=""> To help matters, on 20 May, President Bongo of Gabon announced that he was willing to begin negotiations for the repatriation of Nigerian children within his country. A UNHCR cable of 20 May stated:</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1028" instrument_node="">Arrangements for the return to Nigeria of children evacuated to Gabon from former Biafra could only be made through direct negotiations between Nigerian and Gabonese representatives, with the possible mediation of Cameroon President Ahmadon Ahidjo.”</span><a data-dcnode-id="1026" href="#_edn60" name="_ednref60"><span data-dcnode-id="1027" instrument_node=""> [60] </span></a></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Although both of these steps were small, they were the first concrete commitments made by UNHCR and Gabon to begin to work toward the repatriation.</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1018"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Reaching agreement</span></strong></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1016" instrument_node="">It took until the beginning of June 1970 for Gowon to respond to the High Commissioner’s offer. Gowon had previously met with Antonie Noel, Chief of the Legal Section for Africa and Asia of UNHCR in February 1970 and had requested assistance in ascertaining the exact numbers of the Nigerian children and their supporting staff inside Gabon, the Ivory Coast and Sao Tome; and in helping to provide the identities of those children. Gowon reminded the High Commissioner that he had not yet heard from him on the progress made towards those two points, and once again requested his assistance in the matter. The High Commissioner compiled the information for Gowon one week later, thus helping to seal the final details for the repatriation. The following relevant information was included:</span><a data-dcnode-id="1014" href="#_edn61" name="_ednref61"><span data-dcnode-id="1015" instrument_node=""> [61]</span></a></p><span data-dcnode-id="1012" instrument_node="">
</span><ul data-dcnode-id="995"><span data-dcnode-id="1011" instrument_node="">
</span><li data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">3,940 Nigerian children in Gabon, 2,792 of whom have been identified.</span></li><span data-dcnode-id="1008" instrument_node="">
</span><li data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">908 Nigerian children in the Ivory Coast and it is unsure how many have been identified.</span></li><span data-dcnode-id="1005" instrument_node="">
</span><li data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Between 120 and 130 in Sao Tome and it is unsure how many have been identified.</span></li><span data-dcnode-id="1002" instrument_node="">
</span><li data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">The children in general are in good health and are being taken care of either by the government concerned, jointly with the local Red Cross Society, and/or by private confessional and non-confessional agencies.</span></li><span data-dcnode-id="999" instrument_node="">
</span><li data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">The High Commissioner recently took steps to obtain all necessary data on the children concerned (identity with photographs, place of birth, physical and mental conditions, etc.) This work is now being carried out in the Ivory Coast and will be available shortly.</span></li><span data-dcnode-id="996" instrument_node="">
</span></ul><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">On 25 June 1970, it was announced that Gabon and Nigeria had agreed on:</span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="990" instrument_node="">… a rapid and dignified repatriation of refugee children evacuated from secessionist Biafra in 1968. Under an agreement worked out through the mediation of President Ahmadou Ahidjo of Cameroon, Nigeria has undertaken to transport the children home as soon as possible. About 3,500 youngsters will be involved.</span><a data-dcnode-id="988" href="#_edn62" name="_ednref62"><span data-dcnode-id="989" instrument_node=""> [62]</span></a></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">The High Commissioner, in order to further assist in the effort, made the decision to help fund the repatriation in late July 1970. Together with funding from UNHCR and cooperation between the Governments of Gabon, the Ivory Coast and Nigeria, the repatriation was ready to take place. As had been outlined in the Ifekwunigwe memorandums, receiving centers had been established under the auspices of the Nigerian Red Cross, supported by other international organizations, including WFP and UNICEF.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="982" instrument_node="">By September 1970, 891 children in the Ivory Coast had been identified and, with completed dossiers (at the earlier request of the Federal Government), were ready to be repatriated. In October, the High Commissioner was called upon to “help negotiate the final arrangements between the Governments of Nigeria, Gabon and the Ivory Coast for the airlifting of the children.”</span><a data-dcnode-id="980" href="#_edn63" name="_ednref63"><span data-dcnode-id="981" instrument_node=""> [63] </span></a></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">A few weeks later, Thomas Jamieson, UNHCR Director of Operations, conducted his mission (which had been originally proposed to Gowon in June 1970) and found:</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="974" instrument_node="">… all of the centers, each with a capacity to accommodate 300 to 350 children, were adequately equipped and staffed, largely by Nigerians, and ready to receive the children. Food supplied had been donated by WFP and blankets and equipment by UNICEF.”</span><a data-dcnode-id="972" href="#_edn64" name="_ednref64"><span data-dcnode-id="973" instrument_node=""> [64]</span></a></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="969" instrument_node="">Between 9 and 22 November 1970, the operation to repatriate the 891 children from the Ivory Coast took place. The airlift for the children in Gabon occurred in two stages: the first between 23 November and 20 December, and the second between 11 January and 8 February 1971. In all, 3,711 of the refugee children in Gabon and the Ivory Coast were repatriated by an airlift totalling 78 flights.</span><a data-dcnode-id="967" href="#_edn65" name="_ednref65"><span data-dcnode-id="968" instrument_node=""> [65] </span></a><span data-dcnode-id="966" instrument_node="">The total cost of the operation was estimated to be about $500,000, of which Denmark [the largest donor] contributed $76,000.</span><a data-dcnode-id="964" href="#_edn66" name="_ednref66"><span data-dcnode-id="965" instrument_node=""> [66]</span></a></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="959"><strong data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Conclusion </span></strong></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">As discussed in the introduction, a key common theme that emerged in the three areas of foci of this research was that of coordination. Indeed, coordination continues to be a key problem that hinders current day complex emergencies. The following list of lessons which can be drawn from the Biafran conflict share many similarities to present day complex emergencies:</span></p><span data-dcnode-id="955" instrument_node="">
</span><ol data-dcnode-id="929"><span data-dcnode-id="954" instrument_node="">
</span><li data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">In times of conflict, internal displacement will inevitably occur and the needs of IDPs will need to be identified (including protection and assistance issues) and the means found to implement programs to meet those needs. It is important to identify how to best implement such programs and who should be involved in their planning and implementation.</span></li><span data-dcnode-id="951" instrument_node="">
</span><li data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Although the circumstances under which access negotiations take place vary, it is important to establish a clear, pre-set framework for how such negotiations will be conducted. The ability to accomplish this allows for effective communication between the actors involved (including the warring parties) and the ability to establish a clear set of ground rules at the onset of negotiations.</span></li><span data-dcnode-id="948" instrument_node="">
</span><li data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Establishing a clear set of ground rules with the warring parties fosters trust between the various actors involved, increasing the potential for success in negotiating access.</span></li><span data-dcnode-id="945" instrument_node="">
</span><li data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">It is vital to develop a framework for the methods of transportation and distribution of aid with the warring parties as early as possible. This will minimize confusion over which organizations are participating in the access negotiations and the delivery of aid, and provides the warring parties with a clear and concise plan of action.</span></li><span data-dcnode-id="942" instrument_node="">
</span><li data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">If the evacuation of children from the affected region(s) is not coordinated effectively, then efforts are likely to be duplicated and valuable time wasted.</span></li><span data-dcnode-id="939" instrument_node="">
</span><li data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">There is a need to recognize, that regardless of the magnitude of the evacuation, it will not be possible to remove all children from the affected region(s). Thus, it is important for more attention to be paid to those children who are left within the affected region(s) in terms of humanitarian assistance. Furthermore, by allowing host countries to take responsibility for what they have volunteered to do (taking in the children), primary concern can be given to those children left in the affected region(s).</span></li><span data-dcnode-id="936" instrument_node="">
</span><li data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">The process of repatriation of unaccompanied children should not be rushed. It requires careful planning and time to ensure that the best interests of the children are met.</span></li><span data-dcnode-id="933" instrument_node="">
</span><li data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">If possible, the identification of unaccompanied children before, or during, evacuation saves both time and confusion when it is time to safely repatriate them.</span></li><span data-dcnode-id="930" instrument_node="">
</span></ol><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="925"><strong data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Have we learned from Biafra?</span></strong></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Unfortunately, not a great deal seems to have been learnt from the experience of Biafra. During the three subsequent decades, many of the problems faced continue in present day complex emergencies. Although some of issues faced today also emerged in Biafra, some of the lessons which the international community should have learnt have not been implemented. Several of the most recent emergencies, such as Bosnia and Rwanda, illustrate this all too clearly.</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">In order that the events in Biafra in the 1960s become no more than a fading memory, studies such as this, should remind us of what did happen and what was learned as a result. It is important to draw upon the experience of past conflicts as a means of assessing lessons learned.</span></p><span data-dcnode-id="918" instrument_node="">
