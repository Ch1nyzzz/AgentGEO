</span><h2 class="block text-3xl sm:text-4xl font-bold mt-10.5 md:mt-20 mb-8 md:mb-9 sm:max-w-194" data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">The Sustainable Development Goals in The Gambia</span></h2><span data-dcnode-id="2741" instrument_node="">
</span><div class="sm:max-w-194" data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">
    The Sustainable Development Goals are a global call to action to end poverty, protect the earth's environment and climate, and ensure that people everywhere can enjoy peace and prosperity. These are the goals the UN is working on in The Gambia.

The Resident Coordinator leads the UN Country Team (UNCT) and ensures that the UN agencies support the national development priorities through three UNDAF outcome areas.

These are: (i) Governance, Economic Management and Human Rights supporting initiatives aimed at strengthening national institutions responsible for economic and financial management and oversee reforms to guarantee people their human rights; (ii) Human capital development supporting access to education and health care services, improving equitable quality and access to water, sanitation and hygiene, social protection and gender and youth empowerment; and (iii) Sustainable agriculture, natural resources, environment and climate change management covering agricultural production and productivity, food and nutrition security, environmental management, mainstream climate change in environment and disaster risk management.

The UN Country Team coordinate their work through joint Work Plans.

</span><div class="mt-1 lg:mt-6 text-white" data-dcnode-id="2271"><span class="rounded-full h-2 w-2 inline-block me-2.5 bg-un-blue" data-dcnode-id="2273"></span><span data-dcnode-id="2272" instrument_node="">Story</span></div><span data-dcnode-id="2270" instrument_node="">
</span><div class="mt-3 lg:mt-8 text-gray-400 text-xs" data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">03 February 2022</span></div><span data-dcnode-id="2267" instrument_node="">
</span><div class="mt-8 lg:mt-10 text-white text-3xl font-bold line-clamp-3" data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">A new social contract for education to address the youth unemployment crisis in Africa</span></div><span data-dcnode-id="2264" instrument_node="">
</span><div class="mt-10 line-clamp-5 text-white" data-dcnode-id="2196"><span data-dcnode-id="2263" instrument_node="">Besides being a fundamental right for each human being as enshrined in Article 26 of the&nbsp;</span><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.un.org/en/about-us/universal-declaration-of-human-rights" tabindex="-1"><span data-dcnode-id="2262" instrument_node="">Universal Declaration of Human Rights</span></a><span data-dcnode-id="2260" instrument_node="">, quality education boosts youth employment, reduces inequalities, closes the gender gap, promotes well-being, and contributes to sustainable development. Still, millions of people around the world do not have access to quality education and are facing poverty, violence, and other forms of exploitation and abuse. The COVID-19 pandemic, which caused the closures of many educational institutions and programmes exacerbated the situation.&nbsp;

As Africa commemorated the&nbsp;</span><a data-dcnode-id="2258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsdg.un.org/latest/stories/pursuit-education-all-five-stories-courage-ability-and-innovation" tabindex="-1"><span data-dcnode-id="2259" instrument_node="">fourth International Day of Education</span></a><span data-dcnode-id="2257" instrument_node="">&nbsp;on 24 January, under the theme “Changing Course, Transforming Education”, the lack of quality education in many African countries continues to contribute to the continent’s high rates of youth unemployment. This scourge is impacting the optimistic “Africa Rising” narrative and undermines progress towards the achievement of the&nbsp;</span><a data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdgs.un.org/2030agenda" tabindex="-1"><span data-dcnode-id="2256" instrument_node="">2030 Agenda&nbsp;</span></a><span data-dcnode-id="2254" instrument_node="">and the Sustainable Development Goals (</span><a data-dcnode-id="2252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.un.org/sustainabledevelopment/sustainable-development-goals/" tabindex="-1"><span data-dcnode-id="2253" instrument_node="">SDGs</span></a><span data-dcnode-id="2251" instrument_node="">).&nbsp;

&nbsp;

An urgent need to turn the tide by fulfilling international commitments on education &nbsp;

In 2012, the African Union (AU) set a goal of reducing youth and women unemployment on the continent by&nbsp;</span><a data-dcnode-id="2249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//au.int/sites/default/files/pages/32899-file-assembly_declaration_from_the_au_website_final.pdf" tabindex="-1"><span data-dcnode-id="2250" instrument_node="">2% annually between 2012 and 2022</span></a><span data-dcnode-id="2248" instrument_node="">. In essence, &nbsp;AU member countries committed to creating 8 million new jobs annually during the next decade. This year marks the end of that decade, and little has changed on the ground.&nbsp;

Indeed, according to the&nbsp;</span><a data-dcnode-id="2246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ilo.org/global/research/global-reports/weso/2019/lang--en/index.htm" tabindex="-1"><span data-dcnode-id="2247" instrument_node="">International Labour Organization's 2019 World Employment and Social Outlook Trends report</span></a><span data-dcnode-id="2245" instrument_node="">, Africa continues to have the highest rate of youth unemployment in the world. Data from the&nbsp;</span><a data-dcnode-id="2243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//afrobarometer.org/" tabindex="-1"><span data-dcnode-id="2244" instrument_node="">Afrobarometer Network</span></a><span data-dcnode-id="2242" instrument_node="">&nbsp;– a partnership platform bringing together researchers surveying democracy, governance, and society – as well as&nbsp;</span><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//uis.unesco.org/en/topic/education-africa" tabindex="-1"><span data-dcnode-id="2241" instrument_node="">UNESCO</span></a><span data-dcnode-id="2239" instrument_node="">&nbsp;appears to similarly suggest that a significant number of young people in the region do not have the same opportunity to complete their education and/or get a decent job, particularly&nbsp;</span><a data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oecd-ilibrary.org/docserver/939b7bcd-en.pdf%3Fexpires%3D1643810034%26id%3Did%26accname%3Dguest%26checksum%3DBB54B489E432A0C1F421D6FA60CF5F8A" tabindex="-1"><span data-dcnode-id="2238" instrument_node="">women and girls in rural areas</span></a><span data-dcnode-id="2236" instrument_node="">.&nbsp;

Promoting quality education as a pillar of sustainable, just, and peaceful societies



Education provides the key for young people to enter the labor market and become financially independent while contributing to their personal well being and that of their communities as a whole. As a&nbsp;</span><a data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bmcpublichealth.biomedcentral.com/articles/10.1186/1471-2458-11-606" tabindex="-1"><span data-dcnode-id="2235" instrument_node="">2011 study</span></a><span data-dcnode-id="2233" instrument_node="">&nbsp;of&nbsp;</span><a data-dcnode-id="2231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.who.int/" tabindex="-1"><span data-dcnode-id="2232" instrument_node="">WHO</span></a><span data-dcnode-id="2230" instrument_node="">&nbsp;global maternal and perinatal health data, for example, shows, there could be a correlation between the level of education that a woman achieves and her risk of dying from pregnancy-related causes. &nbsp;

Promoting education has therefore the potential to be an effective tool for catalyzing social and economic change in Africa. And several UN programmes in the continent focus on boosting access to quality education, including what&nbsp;</span><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unicef.org/" tabindex="-1"><span data-dcnode-id="2229" instrument_node="">UNICEF</span></a><span data-dcnode-id="2227" instrument_node="">&nbsp;</span><a data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unicef.org/mozambique/en/education" tabindex="-1"><span data-dcnode-id="2226" instrument_node="">does in Mozambique</span></a><span data-dcnode-id="2224" instrument_node="">&nbsp;on primary schools and a&nbsp;</span><a data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unhcr.org/" tabindex="-1"><span data-dcnode-id="2223" instrument_node="">UNHCR</span></a><span data-dcnode-id="2221" instrument_node="">&nbsp;initiative that&nbsp;</span><a data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reporting.unhcr.org/document/237" tabindex="-1"><span data-dcnode-id="2220" instrument_node="">supports refugees in Tanzania</span></a><span data-dcnode-id="2218" instrument_node="">. Activities that provide access to quality education can also be leveraged to provide support on other issues, such as food security. That is the case for initiatives to provide healthy and nutritious meals to primary school children.&nbsp;

The way forward: Pathways to success

A new social contract that addresses the on-going education crisis is essential to move forward. This vision is outlined in the&nbsp;</span><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unesdoc.unesco.org/ark%3A/48223/pf0000379707" tabindex="-1"><span data-dcnode-id="2217" instrument_node="">2021 UNESCO report on the Futures of Education</span></a><span data-dcnode-id="2215" instrument_node="">&nbsp;and&nbsp;</span><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unesdoc.unesco.org/ark%3A/48223/pf0000380334" tabindex="-1"><span data-dcnode-id="2214" instrument_node="">echoed by the call</span></a><span data-dcnode-id="2212" instrument_node="">&nbsp;of&nbsp;</span><a data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unesco.org/en" tabindex="-1"><span data-dcnode-id="2211" instrument_node="">UNESCO</span></a><span data-dcnode-id="2209" instrument_node="">’s Director-General, Audrey Azoulay, on the occasion of this year’s International Day of Education: &nbsp;


</span><strong data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">''Glaring inequalities, a damaged planet, growing polarization and the devastating impact of the pandemic present us with a generational choice: continue on an unsustainable path or radically change course. […] If we are to transform the future, if we are to change course, we must rethink education. This means forging a new social contract for education […].”&nbsp;</span></strong><span data-dcnode-id="2206" instrument_node="">


In Africa, this new social contract should focus on boosting collaboration between Government, UN teams, non-governmental organizations and other development partners to prioritise urgent investments towards providing access to high-quality education for all. Actions should target key groups, including people living in remote areas, underprivileged neighbourhoods, communities speaking indigenous languages and other vulnerable population. We should also encourage youth-led initiatives to facilitate access to learning resources, including volunteering and cost-sharing. &nbsp;

Addressing the education challenges hampering Africa’s development can no longer wait. The UN should continue to lead the way, with country teams in the region re-affirming our commitment to supporting Africa as the continent mobilizes a whole-of-society approach to “change course” and “transform education” to make it accessible for all. Young people must be empowered to lead the charge towards a future that is sustainable, prosperous, and equitable –&nbsp;</span><strong data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">a future that leaves no one behind.&nbsp;</span></strong><span data-dcnode-id="2203" instrument_node="">
</span><strong data-dcnode-id="2198"><span data-dcnode-id="2202" instrument_node="">Written by George Lwanda, Senior Development Coordination Officer and Team Leader, Office of the United Nations Resident Coordinator in The Gambia. Editorial support provided by the Development Coordination Office (DCO) team. For more information on the United Nations’ work in the Gambia, please visit&nbsp;</span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gambia.un.org/" tabindex="-1"><span data-dcnode-id="2201" instrument_node="">Gambia.UN.org</span></a><span data-dcnode-id="2199" instrument_node="">.&nbsp;</span></strong><span data-dcnode-id="2197" instrument_node="">

</span><div class="mt-10 line-clamp-5 text-white" data-dcnode-id="2096"><span data-dcnode-id="2100" instrument_node="">The Gambia can facilitate the “re-imagining” of governance in the Sahel region, according to UN Sahel Coordinator Abdoulaye Mar Dieye, who met with government officials on 15 and 16 February 2022. Mr. Dieye was in the country to discuss the possibility of the government of The Gambia&nbsp;hosting a high-level regional summit on governance in the Sahel region.

&nbsp;

Mr. Dieye lauded The Gambia’s government for its achievements in democratic governance and social cohesiveness over the last five years. The UN Under-Secretary-General emphasized the importance of these achievements because at least five Sahel countries have seen unlawful changes in administration since 2020 and invited the country to host a high-level regional forum on governance in the Sahel.

</span><strong data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">An urgent need to create space for all to proffer solutions to harness the Sahel’s development potential </span></strong><span data-dcnode-id="2097" instrument_node="">

The Sahel region is one of the most fragile regions in the world. The causes of this fragility are primarily man-made. Illustrating this, people from the ten Sahel nations that took part in the UN75 global dialogues listed climate change and environmental concerns as the leading causes of fragility in the Sahel. A further 44% cited armed conflict, political instability, terrorism, or organized crime as the main threat to the region’s sustainable development.

Despite its vulnerability, the region offers enormous potential. With the proper governing mechanisms in place, the Sahel may serve as a model for the rest of the world. For this to happen, however, the first step is to create a platform for all Sahelians to explore solutions to boost regional leadership and governance.

Creating a platform to strengthen inclusive governance is also consistent with the views delivered to Mr Mar Dieye last year during a series of consultations he held with youth in the Sahel dubbed “voices from the Sahel” in 2021.

</span><div class="mt-8 lg:mt-10 text-white text-3xl font-bold line-clamp-3" data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">SRSG for West Africa promotes prosperous, democratic Gambia</span></div><span data-dcnode-id="2011" instrument_node="">
</span><div class="mt-10 line-clamp-5 text-white" data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">The UN in The Gambia is committed to helping the country build a prosperous, democratic, and inclusive country. That was the message from Mr. Mahamat Saleh Annadif, the United Nations official in charge of monitoring political developments and facilitating efforts to consolidate peace and democratic governance to improve the lives of people in West Africa.

On January 18, 2022, Ms. Seraphine Wakana, the UN Resident Coordinator in The Gambia, welcomed the Special Representative of the United Nations Secretary-General (SRSG) for West Africa and the Sahel to Africa's smiling coast. Mr. Annadif was in the country to reaffirm the United Nations commitment to peace and inter-party cooperation and attend President Adama Barrow's inauguration.

The SRSG met with several presidential hopefuls during his two-day visit. In the company of the UN Resident Coordinator in The Gambia, Mr. Annadif met with Mr. Ousainou Darboe, leader of the United Democratic Party, Hon. Mama Kandeh, leader of the Gambia Democratic Congress (GDC), and Hon. Halifa Sallah, Secretary General of the People’s Democratic Organization for Independence and Socialism (PDOIS).

Mr. Mahamat Saleh Annadif emphasized the crucial role of The Gambia's political leaders in preserving peace and stability while promoting the country's embryonic democracy.

The SRSG lauded all presidential candidates for their contributions to the country's democratic space and freedom. "While several countries in the region have had political difficulties," the SRSG said, "countries such as The Gambia and Cape Verde serve as good models of democratic consolidation."

He applauded the integrity of candidates who are unhappy with the results of the 2021 presidential election, saying that they are disputing the results in a way that promotes peace and strengthens the rule of law. “The West African region needs many more good examples of democratic consolidation”, the SRSG said.

The UN Resident Coordinator reiterated the SRSG's message, assuring political leaders of the UN commitment to advancing democracy and reforms to ensure The Gambia's peace and stability. "The UN is here to assist you in consolidating democracy and reforms by strengthening institutions that will ensure The Gambia preserves peace and stability," Ms. Seraphine Wakana added.

</span><div class="mt-8 lg:mt-10 text-white text-3xl font-bold line-clamp-3" data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">From the Streets of Banjul to The Frontlines of COP26</span></div><span data-dcnode-id="1924" instrument_node="">
</span><div class="mt-10 line-clamp-5 text-white" data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Intense, world-changing temperatures, floods, and unprecedented heat waves—are driving home a sobering reality: Our planet is changing before our eyes and we are digging our own graves. If there is anything this tells us, it is the urgency to take action to save the planet for generations to come regardless of age, faith or sex.

Age is no obstacle for creating an impact, as Fatou Jeng shows. Her hometown of Banjul in The Gambia has suffered the detrimental effects of climate change. Sea level rise and coastal erosion present serious long-term challenges to Gambia's development. There is consensus that climate change could result&nbsp;in up to 1 m rise in the sea level which means Fatou’s home city of Banjul would experience severe floods. The Gambia is primarily low-lying and a 1 m rise in sea level could potentially inundate over 8% of the country's land area. She still dared to take immediate action to be the change she wants - choosing not just her safety but that of her entire community. A courageous but inspiring decision to dare to help create a better future.&nbsp;

This trailblazing youth climate activist has a lot under her belt, from founding the youth-led environmental non-government organization called Clean Earth Gambia.&nbsp;She serves as one of the 30 young people selected to organize the first-ever UN Youth Climate Summit in 2019. Outside of The Gambia, she is the policy operations lead for the Women and Gender United Nations Framework Convention on Climate Change Youth Constituency YOUNGO, where she has been a driving force for policy submissions on gender and climate change. In The Gambia, she has trained more than 500 school children about climate change and continues to spread awareness about environmental issues to local communities and youth organizations.

“Real change is driven by young people. If we want something done, we cannot leave it to the older generation and this is why I am at the forefront of trying to save our planet,” Fatou said. This year, she was recognized as one of the Top 100 Young African Conservation Leaders by the African Alliance of YMCAs, the&nbsp;African Wildlife Fund and a collection of many more international non-profit organizations.

As the founder of Clean Earth Gambia, she explains that the goal of the organization is to create awareness about issues concerning the environment, most importantly climate change, and teach and train more than 500 school children about climate change as well as environmental issues to local communities. Fatou is attending COP26 in Scotland as part of the young people worldwide who have gathered to hold their leaders accountable and demand action today.&nbsp;“I expect climate justice to be at the heart of COP26 with loss and damage and climate financing not only put on paper but effectively implemented because we have no time. We are facing a climate emergency,” an energized and excited Fatou said.&nbsp;&nbsp;

In September this year, The Gambia submitted their updated national climate plan, officially known as Nationally Determined Contribution under the Paris Agreement, showing a strong commitment to protecting this biodiversity and building resilience to future climate shocks while also decreasing overall greenhouse gas emissions. The UN has been supporting the government to keep global warming at 1.5 degrees and meet the goals of the Paris Agreement.

The UN continues to support capacity building efforts, and the provision of agricultural inputs and market opportunities for farmers and communities. Through nation-wide intervention, gender responsive Good Agricultural Practices (GAP) training was provided to 14,670 farmers through the establishment of 489 farmer field schools, exceeding the annual UNDAF target of 10,000 farmers.

</span><div class="mt-8 lg:mt-10 text-white text-3xl font-bold line-clamp-3" data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">On the United Nations’ 76th anniversary – Why we must be hopeful for the future - by Seraphine Wakana, UN Resident Coordinator</span></div><span data-dcnode-id="1837" instrument_node="">
</span><div class="mt-10 line-clamp-5 text-white" data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Even before the COVID-19 pandemic, The Gambia, like most countries, was already grappling with enormous challenges – climate change, youth unemployment, irregular migration and increasing inequalities.&nbsp; Now, the effects of the pandemic are threatening to further unravel decades of progress to build a more inclusive and equal society for everyone.&nbsp; But we have come too far to slow down.&nbsp; Our strength and hope for the future lies in our shared vision for a more prosperous nation.

While the pandemic has upended lives and shattered economies, it has also revealed the power of unity and solidarity in development.&nbsp; When we all mobilized and came together to fight COVID-19, we protected thousands, including our most loved ones, from the virus and averted a potentially worse disaster.&nbsp; Through multilateral cooperation, a hallmark of the United Nations, we are now starting to build back better.

This week, the world is celebrating the 76th anniversary of the United Nations.&nbsp; For 76 years, the United Nations has been working with governments across the world to prevent conflict, restore hope and dignity for the deprived and build a better world for everyone.&nbsp; Our mission in The Gambia is no different – we work with the government, civil society, private sector, local communities, children, young people and women to support the country’s development aspirations and protect human rights.&nbsp; &nbsp;

Fundamentally, at the heart of the work of the United Nations in The Gambia are the rights, welfare and development of young people and women, two groups that represent beacons of hope.&nbsp; Their energy and determination to overcome the numerous challenges they face daily and usher in a new era of hope and prosperity for everyone are the reasons we must remain hopeful for the future.

We will work with young people and women to bridge the inclusion and gender gaps and provide more opportunities for growth and development.&nbsp; Young people and women must have access to quality education, training, skills building and services to innovate and, in so doing, help them build&nbsp; lives protected from violence, abuse and exploitation. &nbsp;

Building back better requires sustained efforts to tackle the pandemic, and our best chance is vaccination.&nbsp; Thus, the United Nations is leading unprecedented global and multilateral efforts to ensure equitable distribution of COVID-19 vaccines across the world.&nbsp; Despite being the smallest country on mainland Africa, The Gambia was among the first five countries on the continent to receive the COVID-19 vaccines via the COVAX facility – a coalition of UN and other agencies working to make vaccines available to all.&nbsp; As a result, more than 12 per cent of the total eligible population in The Gambia has been fully vaccinated, but the road ahead is still long. &nbsp;

With the arrival of more vaccines, we must encourage everyone to get vaccinated. We must step up national efforts to make vaccines available to those willing to take the jab and encourage the unvaccinated to consider taking the vaccine. We must remind everyone that the virus is still with us, cases may still rise and more disruptions to education and economic activities will further stall the country’s recovery efforts.&nbsp; We can minimize these aftershocks and help protect more people from COVID-19 deaths and hospitalizations when we all get vaccinated.

As with the national effort to curtail the pandemic, the United Nations has always supported The Gambia through numerous other challenges to its social and economic development.&nbsp; We have always been there to help build a society for every single Gambian, irrespective of faith, gender or economic standing – a society where every child can go to school, where every girl and woman is protected from violence, where the environment is protected, where the economy is strong and inclusive, where jobs are available for all and where migrants, refugees and other vulnerable groups are also protected. In short, no one should be left behind.&nbsp; &nbsp;

As The Gambia heads to the polls to vote in the presidential elections in December, the United Nations encourages all actors, including political parties and their leaders, to promote peace during and after the vote. This is a commitment we must all make and hold ourselves accountable to.

Happy UN Day!

&nbsp;

</span><div class="mt-8 lg:mt-10 text-white text-3xl font-bold line-clamp-3" data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">The Gambia Holds Validation of Draft Report on&nbsp;Global Compact for Migration</span></div><span data-dcnode-id="1750" instrument_node="">
</span><div class="mt-10 line-clamp-5 text-white" data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">National stakeholders, with support from the UN Network on Migration, led by IOM, OHCHR and UNICEF, gathered to validate the draft voluntary national review report of The Gambia's progress in implementing the Global Compact for Migration (GCM)'s 23 objectives. Tracking the country's&nbsp;progress is a vital step in unleashing the benefits of well-managed migration, also providing stakeholders an opportunity to&nbsp;reassess their&nbsp;priorities among the objectives.

The national review process will feed into the first ECOWAS sub-regional review, the continental review process for Africa, and then the global review in 2022.

</span><div class="mt-8 lg:mt-10 text-white text-3xl font-bold line-clamp-3" data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">UNFPA Representative Presents Credentials to the Minister of Foreign Affairs</span></div><span data-dcnode-id="1641" instrument_node="">
</span><div class="mt-10 line-clamp-5 text-white" data-dcnode-id="1634"><strong data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">BANJUL 5 April 2022</span></strong><span data-dcnode-id="1638" instrument_node=""> – The honourable Minister of Foreign Affairs, International Cooperation and Gambians Abroad, Dr. Mamadou Tangara has today, Tuesday 5 April 2022 received credentials of the new Country Representative of the United Nations Population Fund (UNFPA) Ms. Ndeye Rose Sarr.

During the meeting, Hon. Minister Tangara congratulated Ms. Sarr on her appointment and assuming duties in The Gambia. He welcomed her to the country and assured her of the Government of The Gambia’s commitment to continue collaborating with UNFPA to realise sexual and reproductive health for all, and ensuring that the country fulfills its international obligations to protect and empowerment women and girls.

Ms. Sarr recognised the government for over four decades of cooperation with UNFPA and assured the Hon. Minister of her agency’s continued commitment to support The Gambia in achieving its development aspirations. She commended the country for ratifying various international instruments aimed at protecting the rights and welfare of women and girls and seized the opportunity to reiterate the need to implement the provisions of these legal frameworks and create an environment where women, girls and other vulnerable groups can thrive in dignity and health. Ms. Sarr highlighted that UNFPA will continue to invest in attaining better health and development indicators, particularly in improving maternal health care, promoting sexual and reproductive health for all and addressing Gender-Based Violence and harmful practices in The Gambia.

UNFPA is currently developing its 9th Country Programme with the Government of The Gambia. The Country Programme Document will align with the country’s development priorities and contribute towards achieving the Sustainable Development Goals.

Prior to her appointment, Ms. Sarr served as the Regional Desk Specialist for West and Central Africa, where she provided leadership, policy advice and strategic partnerships building for the region.

</span><div class="mt-3 lg:mt-8 text-gray-400 text-xs" data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">25 November 2020</span></div><span data-dcnode-id="1475" instrument_node="">
</span><div class="mt-8 lg:mt-10 text-white text-3xl font-bold line-clamp-3" data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Peacebuilding Commission Press Statement </span></div><span data-dcnode-id="1472" instrument_node="">
</span><div class="mt-10 line-clamp-5 text-white" data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Consistent with its long-standing engagement in support of a democratic transition in The Gambia, which started at the beginning of 2017, the Commission reiterated yesterday its commitment to help mobilize international support for the government’s peacebuilding priorities.

The Commission expressed concern about the current impasse in the Constitutional review process and encouraged the Government of The Gambia to continue its efforts to engage in dialogue and build consensus with all relevant stakeholders around the constitutional draft with a view to re-table it at the National Assembly. The Commission took note of the participation of civil society groups in the process and encouraged the Government to continue its dialogue and consultations to ensure inclusivity and transparency in the review process that reflects the aspirations of the Gambian people. The Commission took note of the Government’s intention to re-table the draft Constitution to allow for it to be put for referendum by June 2021, well ahead of the general elections in December 2021.&nbsp;

The Commission acknowledged that the stalled constitutional process is likely to impact on the other overlapping reforms, notably the transitional justice and security sector reform processes. The Commission praised the work of the Truth Reconciliation and Reparation Commission (TRRC), which resumed public hearings on 12 October, and welcomed steps taken to formally adopt and begin the implementation of the 2020-2024 Security Sector Reform Strategy (SSRS) and the National Security Strategy, which should pave the way for the operationalization of The Gambia’s National Security Policy. In that regard, the Commission welcomed continuous collective efforts by the UN system and partners to help enhance capacity of national SSR coordination and oversight bodies and to align international SSR assistance to national reform priorities.

The Commission praised the Government of The Gambia for its efforts to enable the meaningful participation of civil society organizations in peacebuilding efforts. In that regard, the Commission recognized the important work of the West Africa Network for Peacebuilding (WANEP) and the Association of Non-Governmental Organizations in The Gambia (TANGO) and encouraged further international support to help empower young women and men who are in the frontlines of peacebuilding work on the ground, and who have so far played a critical role in the transitional reforms. Support for the work has become all the more important in view of the COVID-19 pandemic.&nbsp;

The Commission welcomed the preparations of the Independent Electoral Commission (IEC) for the presidential election in December 2021, the National Assembly elections in April 2022 and the local government elections in May 2023. The Commission called upon The Gambia’s partners to help cover the 90% budget gap for the implementation of the IEC’s support project, developed by UNDP, for the 2020-2022 electoral cycle.

The Commission reiterated its concern about the negative socio-economic impact of the COVID-19 pandemic, which has already curtailed economic activity and resulted in lay-offs in the tourism and business sectors, disrupted the livelihoods of farmers, and increased unemployment among youth further straining social safety nets. With 81.3% of Gambian women working in agriculture and retail trade, the impact is felt disproportionately by them. Reported cases of gender-based violence have increased during the pandemic requiring more effective efforts to better protect women. The Commission also called for strengthened strategic partnerships between the United Nations regional and sub-regional organizations and IFIs in support of peacebuilding priorities in The Gambia.

The Commission noted the significant contributions of the Peacebuilding Fund in support of peacebuilding in The Gambia, with a total investment of US$20 million since March 2017 in support of transitional justice, security sector reform, women and youth empowerment and other peacebuilding priorities. The Commission expressed hope that the replenishment of the PBF in January 2021 will enable the Fund to continue to support critical peacebuilding priorities in The Gambia and other conflict-affected settings around the world.

</span><div class="mt-8 lg:mt-10 text-white text-3xl font-bold line-clamp-3" data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">UNDP and The University of The Gambia (UTG) sign a Memorandum of Understanding (MoU) </span></div><span data-dcnode-id="1390" instrument_node="">
</span><div class="mt-10 line-clamp-5 text-white" data-dcnode-id="1382"><span data-dcnode-id="1389" instrument_node="">As part of its gradual phasing, AccLabGM by extension of UNDP, will support and co-host activities with UTG to strengthen its standing as the national partner in the Lab handover framework. Through this partnership, UTG will conduct academic research on gender and women’s empowerment and changing organizational culture through the Gender Equality Seal and feeding this knowledge to organizations and policy makers through the development of knowledge products and publications. In collaborating with UNDP The Gambia, all the Schools within UTG will select a particular SDG or SDGs that is or are in line with their mandate to deliver to The Gambian public. The UTG will establish a Centre for Sustainable Development and Policy Studies (UTG-Think Tank) as a hub for learning, policy analysis, debate, and to coordinate the overall implementation of this collaboration. In the spirit of this collaboration, UNDP The Gambia will help UTG mobilize resources to facilitate and enhance the overall implementation of this collaboration.

UTG as the premier public institution of higher learning in The Gambia, is key in collaborating with UNDP The Gambia to implement the SDGs in the country. The University is already contributing towards the implementation of SDG 4 which is Quality Education. Another step taken by UTG is the implementation of SDG 17 which is Partnerships to Achieve the Goals – by partnering with many institutions like UNDP in realizing the SDGs for The Gambia.

For more information and media interviews, contact: Mariam Njai, Communications Analyst, UNDP The Gambia: Tel; +220 3303180, Email: </span><a data-dcnode-id="1387" href="mailto:mariam.njai@undp.org" tabindex="-1"><span data-dcnode-id="1388" instrument_node="">mariam.njai@undp.org</span></a><span data-dcnode-id="1386" instrument_node=""> And Musa Baldeh, Communications Officer, UTG Relations Office: Tel; +220 3650084, Email: </span><a data-dcnode-id="1384" href="mailto:mubaldeh@utg.edu.gm" tabindex="-1"><span data-dcnode-id="1385" instrument_node="">mubaldeh@utg.edu.g</span></a><span data-dcnode-id="1383" instrument_node="">

</span><div class="mt-3 lg:mt-8 text-gray-400 text-xs" data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">02 October 2020</span></div><span data-dcnode-id="1305" instrument_node="">
</span><div class="mt-8 lg:mt-10 text-white text-3xl font-bold line-clamp-3" data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Food losses increase during COVID-19, a major hurdle to Africa’s development</span></div><span data-dcnode-id="1302" instrument_node="">
</span><div class="mt-10 line-clamp-5 text-white" data-dcnode-id="1258"><span data-dcnode-id="1301" instrument_node="">
</span><strong data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Accra.&nbsp;</span></strong><span data-dcnode-id="1298" instrument_node="">– The first ever International Day of Awareness of Food Loss and Waste will be marked tomorrow with a call to action for African countries to bolster their efforts and encourage private sector investments to reduce food losses and waste.

			The Food and Agriculture Organization of the United Nations (FAO) </span><a data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/international-day-awareness-food-loss-waste/en/" tabindex="-1"><span data-dcnode-id="1297" instrument_node="">estimates</span></a><span data-dcnode-id="1295" instrument_node=""> that food losses in sub-Saharan Africa add up to $4 billion annually.

			Across Africa, the vast majority of food loss happens between harvest and the point of sale - very little is wasted by consumers after purchase. Some of the leading causes of food loss in Africa are a lack of cold chain facilities especially for perishables, unreliable and inadequate storage facilities and insufficient agro-processing skills among smallholder farming communities.

			“The COVID-19 pandemic has triggered a wake-up call for the need to radically transform our food systems to make them more efficient and sustainable for people and planet. Tackling food loss and waste, and particularly post-harvest loss reduction, in Africa is essential to achieve that goal,” FAO Assistant Director-General and Regional Representative for Africa Abebe Haile-Gabriel said on the eve of the international day. &nbsp;

			</span><strong data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">COVID-19 drives up food losses</span></strong><span data-dcnode-id="1292" instrument_node="">
</span><a data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/documents/card/en/c/ca9056en" tabindex="-1"><span data-dcnode-id="1291" instrument_node="">According to FAO analysts</span></a><span data-dcnode-id="1289" instrument_node="">, the COVID-19 pandemic has caused consumers in many low-income countries to purchase only staple carbohydrates and non-perishables, resulting in perishable food often being wasted in markets. Physical distancing measures in some countries have reduced the number of customers in markets, also resulting in increased food losses and reduced incomes for traders.

			</span><a data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/publications/sofa/en/" tabindex="-1"><span data-dcnode-id="1288" instrument_node="">Studies commissioned by FAO</span></a><span data-dcnode-id="1286" instrument_node=""> before the pandemic estimate that on-farm losses in sub-Saharan Africa for fruits and vegetables are up to 50 percent, the highest in the world. For cereals and pulses, the on-farm losses are up to 18 percent, equal highest in the world with parts of Asia.

			When food is lost or wasted, all the resources that were used to produce the food, including water, land, energy, labour and capital, are also wasted.

			</span><strong data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Transforming food systems to reduce loss and waste </span></strong><span data-dcnode-id="1283" instrument_node="">

			Reducing food losses on farms and at harvest time, particularly in countries with high levels of food insecurity, can make great inroads towards food security and improved nutrition.

			Such changes are a responsibility shared by governments, the private sector, civil society, development agencies, research and academic institutions, and consumers.

			To mark tomorrow’s international day, </span><a data-dcnode-id="1281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/documents/card/en/c/cb0641en" tabindex="-1"><span data-dcnode-id="1282" instrument_node="">governments and decision makers are being called on</span></a><span data-dcnode-id="1280" instrument_node=""> to target investments and create incentives to bolster efforts to reduce food losses. Education campaigns targeted at consumers on the meaning of “use-by” and “best before date” labelling are also encouraged, particularly in urban centres in developing countries, where food waste shows an increasing trend.

			Operators along the food supply chain, including retailers, are being called on to scale up their actions to reduce food loss and waste, and research institutions and academia are urged to further develop innovations that can be rapidly put to good use.

			</span><strong data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Snapshot of FAO’s actions for reduced food loss and waste</span></strong><span data-dcnode-id="1277" instrument_node="">

			Through an FAO project with the African Union and The Rockefeller Foundation in Kenya, Tanzania, Zambia and Zimbabwe, practical storage solutions such as hermetically-sealed bags that can store grain for longer, and improved crates to transport fresh fruits and vegetables to reduce damage during transportation were piloted and adopted by stakeholders. Policy support was also provided to African Union member countries through the African Union Commission to guide the scale-up of these successes and other solutions. A continental post-harvest management strategy was also developed.

			Through Agricultural Transformation Centres in Africa, FAO is linking farmers to agro-processing hubs which have been strategically located in high-production areas. In Zambia, for example, FAO is working with the government and communities to equip women’s groups to start food processing initiatives such as turning ground nuts into nutritious nut paste.

			FAO, the International Fund for Agricultural Development and the World Food Programme have jointly implemented a project funded by the Swiss Agency for Development and Cooperation (SADC) in Burkina Faso, the Democratic Republic of Congo and Uganda targeting the estimated 35 percent of on-farm losses in cereals and pulses.

			In Ethiopia, FAO with funding support from SADC, is supporting farmers to use metal silos and hermetically-sealed bags, and the private sector, particularly young entrepreneurs, are being encouraged to fabricate the silos for household grain storage, among other project activities. In Eswatini, Tanzania, Uganda and Zambia are participating in an FAO-led global project to strengthen weaknesses along the food supply chain that could lead to food loss and waste.

			The UN General Assembly adopted a resolution in 2019 designating the International Day of Awareness of Food Loss and Waste to be observed each year on 29 September. FAO facilitates observance of the day globally, in collaboration with the UN Environment Programme (UNEP).

			&nbsp;

			</span><strong data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Stop food loss and waste. For the people. For the planet. </span></strong><span data-dcnode-id="1274" instrument_node="">
