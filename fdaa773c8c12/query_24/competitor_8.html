</span><div class="06368bc9afc60666b5f00fdd96551407" data-dcnode-id="982" data-index="4" style="float: none; margin:10px 0 10px 0; text-align:center;"><span data-dcnode-id="992" instrument_node="">

</span><span data-dcnode-id="983" instrument_node="">
</span></div><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="978"><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/paris.jpg"><img alt="paris" class="alignnone size-full wp-image-15491" data-dcnode-id="980" height="422" loading="lazy" sizes="(max-width: 749px) 100vw, 749px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/paris.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2018/01/paris.jpg 749w, https://justfunfacts.com/wp-content/uploads/2018/01/paris-300x169.jpg 300w" width="749"></a></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="973"><strong data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Paris</span></strong><span data-dcnode-id="974" instrument_node=""> is the capital and most populous city in France.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="971" instrument_node="">It is </span><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">located</span></strong><span data-dcnode-id="968" instrument_node=""> along the </span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-the-seine-river/"><span data-dcnode-id="967" instrument_node="">Seine River</span></a><span data-dcnode-id="965" instrument_node=""> in northern central France.</span></p><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="962" instrument_node="">The </span><strong data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">population</span></strong><span data-dcnode-id="959" instrument_node=""> in 2016 is estimated to be as much as </span><strong data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">2.34 million</span></strong><span data-dcnode-id="956" instrument_node="">. The population of the city of Paris reached a historic high of 2.9 million in 1921 but then declined; between 1954 and 1999 it declined at every census, falling to 2.15 in 1999, but after that it began to climb again.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="953" instrument_node="">Paris covers an </span><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">area</span></strong><span data-dcnode-id="950" instrument_node=""> of </span><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">105 square kilometers</span></strong><span data-dcnode-id="947" instrument_node=""> (41 square miles).</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="932"><strong data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Paris is spread widely on both banks of the river Seine</span></strong><span data-dcnode-id="942" instrument_node=""> and includes </span><strong data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">two islands</span></strong><span data-dcnode-id="939" instrument_node="">, the </span><strong data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Île Saint-Louis</span></strong><span data-dcnode-id="936" instrument_node=""> and the larger </span><strong data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Île de la Cité</span></strong><span data-dcnode-id="933" instrument_node="">, which form the oldest part of the city.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="930" instrument_node="">Overall, the </span><strong data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">city is relatively flat</span></strong><span data-dcnode-id="927" instrument_node="">, and the lowest point is 35 meters (115 feet) above sea level. Paris has several prominent hills, the highest of which is Montmartre at 130 meters (427 feet).</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="922"><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/paris-2.jpg"><img alt="paris-2" class="alignnone size-full wp-image-15492" data-dcnode-id="924" height="541" loading="lazy" sizes="(max-width: 810px) 100vw, 810px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/paris-2.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2018/01/paris-2.jpg 810w, https://justfunfacts.com/wp-content/uploads/2018/01/paris-2-300x200.jpg 300w" width="810"></a></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="917"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Paris was founded around 250 BC by the Parisii, a sub-tribe of the Celtic Senones</span></strong><span data-dcnode-id="918" instrument_node="">. They settled on the Île de la Cité and on the banks of the Seine, built bridges and a fort, minted coins, and began to trade with other river settlements in Europe.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="915" instrument_node="">In </span><strong data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">52 BC</span></strong><span data-dcnode-id="912" instrument_node="">, a Roman army led by Titus Labienus defeated the Parisii and established a Gallo-Roman garrison town called </span><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Lutetia</span></strong><span data-dcnode-id="909" instrument_node="">.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="903"><strong data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">The town was Christianised in the 3rd century AD</span></strong><span data-dcnode-id="904" instrument_node="">, and after the collapse of the Roman Empire, it was occupied by Clovis I, the King of the Franks, who made it his capital in 508.</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="898"><strong data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">In 987 AD, Paris became the capital of France</span></strong><span data-dcnode-id="899" instrument_node="">.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="896" instrument_node="">During the </span><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">French Renaissance period</span></strong><span data-dcnode-id="893" instrument_node="">, from the late 15th century to the early 17th century, Paris became a center of art, architecture and science.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="888"><a data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/paris-history.jpg"><img alt="paris history" class="alignnone size-full wp-image-15493" data-dcnode-id="890" height="408" loading="lazy" sizes="(max-width: 749px) 100vw, 749px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/paris-history.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2018/01/paris-history.jpg 749w, https://justfunfacts.com/wp-content/uploads/2018/01/paris-history-300x163.jpg 300w" width="749"></a></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="883"><strong data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">In the mid-1800s, Napoleon III hired civic planner Georges-Eugene Hausmann to modernize Paris</span></strong><span data-dcnode-id="884" instrument_node="">. Hausmann’s designs gave the city wide, tree-lined boulevards, large public parks, a new sewer system and other public works projects.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="878"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">From 1940 to 1944, the city of Paris was occupied by the Germans</span></strong><span data-dcnode-id="879" instrument_node="">. By 1942, there was a massive deportation of French Jews and by 1944, the city of Paris is liberated by the Allied Forces.</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">The last Nazi commander in charge of Paris famously claimed he saved the City of Light from an insane Hitler who wanted it flattened. A French historian, however, told The Local that version of events is pure fantasy from the self-aggrandizing former general.</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">The </span><strong data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">name “Paris”</span></strong><span data-dcnode-id="870" instrument_node=""> is derived from its early inhabitants, the Celtic Parisii tribe.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="865"><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/paris-3.jpg"><img alt="paris-3" class="alignnone size-full wp-image-15494" data-dcnode-id="867" height="160" loading="lazy" sizes="(max-width: 768px) 100vw, 768px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/paris-3.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2018/01/paris-3.jpg 768w, https://justfunfacts.com/wp-content/uploads/2018/01/paris-3-300x63.jpg 300w" width="768"></a></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="863" instrument_node="">Paris is often referred to as </span><strong data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">The City of Light</span></strong><span data-dcnode-id="860" instrument_node=""> (La Ville Lumière), both because of its leading role during&nbsp;the Age of Enlightenment, and more literally because Paris was one of the first European cities to adopt gas street lighting. In the 1860s, the boulevards and streets of Paris were illuminated by 56,000 gas lamps.</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="855"><strong data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">The city of love, fashion capital, literary paradise, a city know by many monikers.</span></strong></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="851"><strong data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Classic, innovative and offbeat, the capital offers a unique cultural journey through 1,803 monuments, 173 museums and many other exceptional places.</span></strong></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="849" instrument_node="">The </span><strong data-dcnode-id="846"><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-the-eiffel-tower/"><span data-dcnode-id="848" instrument_node="">Eiffel Tower</span></a></strong><span data-dcnode-id="845" instrument_node=""> may be the most famous monument in the world and is certainly the most emblematic of Paris. It’s hard to believe that the structure was dismissed as a monstrosity when it was first unveiled. The Eiffel Tower was designed by Alexandre-Gustave Eiffel and built for the Paris Exhibition of 1889, which marked the centenary of the French Revolution. The tower consists of 15,000 steel sections held together by 2.5 million rivets. This innovative structure is now considered a masterful architectural feat and is one of the top tourist attractions in Paris.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="840"><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/eiffel-tower.jpg"><img alt="eiffel tower" class="alignnone size-full wp-image-15495" data-dcnode-id="842" height="468" loading="lazy" sizes="(max-width: 749px) 100vw, 749px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/eiffel-tower.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2018/01/eiffel-tower.jpg 749w, https://justfunfacts.com/wp-content/uploads/2018/01/eiffel-tower-300x187.jpg 300w" width="749"></a></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="838" instrument_node="">The </span><strong data-dcnode-id="835"><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-the-louvre/"><span data-dcnode-id="837" instrument_node="">Louvre</span></a></strong><span data-dcnode-id="834" instrument_node=""> or the </span><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Louvre Museum</span></strong><span data-dcnode-id="831" instrument_node="">&nbsp;is the most visited and famous museum in the world. The museum is housed in the Louvre Palace, originally built as a fortress in the late 12th to 13th century under Philip II. </span><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-leonardo-da-vinci/"><span data-dcnode-id="830" instrument_node="">Leonardo da Vinci</span></a><span data-dcnode-id="828" instrument_node="">’s </span><a data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-mona-lisa/"><span data-dcnode-id="827" instrument_node="">Mona Lisa</span></a><span data-dcnode-id="825" instrument_node=""> is undoubtedly one of the most famous pieces of art in the Louvre, with people from all walks of life travelling to the museum to catch a glimpse of the world famous painting.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="820"><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/louvre.jpg"><img alt="louvre" class="alignnone size-full wp-image-15496" data-dcnode-id="822" height="507" loading="lazy" sizes="(max-width: 758px) 100vw, 758px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/louvre.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2018/01/louvre.jpg 758w, https://justfunfacts.com/wp-content/uploads/2018/01/louvre-300x201.jpg 300w" width="758"></a></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="814"><strong data-dcnode-id="816"><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-notre-dame-cathedral/"><span data-dcnode-id="818" instrument_node="">Notre-Dame Cathedral</span></a></strong><span data-dcnode-id="815" instrument_node=""> stands in the heart of Paris on the Ile de la Cité. The cathedral is widely considered to be one of the finest examples of French Gothic architecture, and it is among the largest and best-known church buildings in the Catholic Church in France, and in the world. Built between 1163 and 1345, the Notre Dame Cathedral is also one of the most visited religious buildings in the world: it has more that 13 million visitors per year!</span></p><div class="06368bc9afc60666b5f00fdd96551407" data-dcnode-id="803" data-index="9" style="float: none; margin:10px 0 10px 0; text-align:center;"><span data-dcnode-id="813" instrument_node="">
</span><span data-dcnode-id="811" instrument_node="">
</span><span data-dcnode-id="809" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-6260915381859367" data-ad-format="auto" data-ad-slot="5239509707" data-dcnode-id="808" style="display:block"></ins><span data-dcnode-id="807" instrument_node="">
</span><span data-dcnode-id="804" instrument_node="">
</span></div><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="799"><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/notre-dame-cathedral.jpg"><img alt="notre-dame cathedral" class="alignnone size-full wp-image-15497" data-dcnode-id="801" height="468" loading="lazy" sizes="(max-width: 749px) 100vw, 749px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/notre-dame-cathedral.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2018/01/notre-dame-cathedral.jpg 749w, https://justfunfacts.com/wp-content/uploads/2018/01/notre-dame-cathedral-300x187.jpg 300w" width="749"></a></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="797" instrument_node="">The </span><strong data-dcnode-id="794"><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-the-arc-de-triomphe/"><span data-dcnode-id="796" instrument_node="">Arc de Triomphe</span></a></strong><span data-dcnode-id="793" instrument_node=""> is one of the most famous monuments in Paris. It is dedicated to the victorious French armies of the Revolution and the First Empire. The triumphal arch is in honor of those who fought for France, in particular, those who fought during the Napoleonic Wars. Built between 1806 and 1836, it’s iconic in style and sculpture to the decoration popular at the first half of the 19th century and visitors can admire its delicate design and engravings.</span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="788"><a data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/arc-de-triomphe.jpg"><img alt="arc de triomphe" class="alignnone size-full wp-image-15499" data-dcnode-id="790" height="407" loading="lazy" sizes="(max-width: 752px) 100vw, 752px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/arc-de-triomphe.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2018/01/arc-de-triomphe.jpg 752w, https://justfunfacts.com/wp-content/uploads/2018/01/arc-de-triomphe-300x162.jpg 300w" width="752"></a></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="786" instrument_node="">The tree-lined </span><strong data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Avenue des Champs-Elysees</span></strong><span data-dcnode-id="783" instrument_node=""> is Paris’s most famous street and has even been described as the most beautiful avenue in the world. Almost two kilometers (1.2 miles) long, the boulevard connects the Arc de Triomphe and the Place de la Concorde. Life in Paris centers around the Champs-Elysees. It’s an avenue lined with restaurants, upscale boutiques, museums and night clubs. It’s home to the Bastille Day military parade and the end of the Tour de France.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="778"><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/champs-elysees.jpg"><img alt="champs elysees" class="alignnone size-full wp-image-15500" data-dcnode-id="780" height="506" loading="lazy" sizes="(max-width: 758px) 100vw, 758px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/champs-elysees.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2018/01/champs-elysees.jpg 758w, https://justfunfacts.com/wp-content/uploads/2018/01/champs-elysees-300x200.jpg 300w" width="758"></a></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="776" instrument_node="">The </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-the-musee-dorsay/"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Musée d’Orsay</span></strong></a><span data-dcnode-id="772" instrument_node=""> is a national museum in Paris, on the left bank of the Seine opposite the Louvre and facing towards the river. The museum is internationally renowned for its collection of impressionist art and is one of Paris’ top attractions.</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="767"><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/mus%25C3%25A9e-d-orsay.jpg"><img alt="musée d'orsay" class="alignnone size-full wp-image-15501" data-dcnode-id="769" height="346" loading="lazy" sizes="(max-width: 756px) 100vw, 756px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/mus%25C3%25A9e-d-orsay.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2018/01/musée-d-orsay.jpg 756w, https://justfunfacts.com/wp-content/uploads/2018/01/musée-d-orsay-300x137.jpg 300w" width="756"></a></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="765" instrument_node="">One of the most noticeable landmarks in Paris is the striking white-domed basilica of the </span><strong data-dcnode-id="762"><a data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-the-sacre-coeur/"><span data-dcnode-id="764" instrument_node="">Sacre-Coeur</span></a></strong><span data-dcnode-id="761" instrument_node="">. It is located at the summit of the butte Montmartre, the highest point in the city. This stunning basilica draws many tourists every year to see its marble architecture and gorgeous interior.</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="756"><a data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/sacre-coeur.jpg"><img alt="sacre-coeur" class="alignnone size-full wp-image-15502" data-dcnode-id="758" height="506" loading="lazy" sizes="(max-width: 758px) 100vw, 758px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/sacre-coeur.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2018/01/sacre-coeur.jpg 758w, https://justfunfacts.com/wp-content/uploads/2018/01/sacre-coeur-300x200.jpg 300w" width="758"></a></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="748"><strong data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">There are 37 bridges within Paris</span></strong><span data-dcnode-id="752" instrument_node="">. The </span><strong data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Pont Neuf</span></strong><span data-dcnode-id="749" instrument_node="">&nbsp;[photo below] is the oldest standing bridge in Paris. It was built with interruptions in the work, from 1578 to 1607.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="744"><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/pont-neuf.jpg"><img alt="pont neuf" class="alignnone size-full wp-image-15503" data-dcnode-id="746" height="501" loading="lazy" sizes="(max-width: 755px) 100vw, 755px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/pont-neuf.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2018/01/pont-neuf.jpg 755w, https://justfunfacts.com/wp-content/uploads/2018/01/pont-neuf-300x199.jpg 300w" width="755"></a></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="739"><strong data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">There are about 6,100 streets in Paris</span></strong><span data-dcnode-id="740" instrument_node="">. The Rue de Vaugirard, which at 4.3 kilometers (2.7 miles) is the longest street in Paris. At 3.3 metres (10.8 feet) wide and 5.75 metres (18.7 feet) long the Rue des Degrés in the 2nd arrondissement has the distinction of being the shortest street in Paris.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="737" instrument_node="">There are also </span><strong data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">450 parks and gardens in the city</span></strong><span data-dcnode-id="734" instrument_node="">, spread out across more than (485 Hectares) 1,200 acres. The two most famous are the </span><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Tuileries Garden</span></strong><span data-dcnode-id="731" instrument_node=""> and the </span><strong data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Luxembourg Garden</span></strong><span data-dcnode-id="728" instrument_node="">.</span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="725" instrument_node="">There are </span><strong data-dcnode-id="720"><span data-dcnode-id="724" instrument_node="">470,000 </span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-trees/"><span data-dcnode-id="723" instrument_node="">trees</span></a><span data-dcnode-id="721" instrument_node=""> in Paris</span></strong><span data-dcnode-id="719" instrument_node="">, and every single one of them is documented, measured and referenced.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="716" instrument_node="">There are </span><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">more than 400 movie screens in Paris</span></strong><span data-dcnode-id="713" instrument_node="">, a hundred of which are operated by France’s government art program, Art et Essai.</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="710" instrument_node="">Paris is home to some of the top bakeries in the world. </span><strong data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">There are approximately 1200 bakeries in Paris</span></strong><span data-dcnode-id="707" instrument_node="">.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="702"><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/paris-bakery.jpg"><img alt="paris bakery" class="alignnone size-full wp-image-15504" data-dcnode-id="704" height="506" loading="lazy" sizes="(max-width: 758px) 100vw, 758px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/paris-bakery.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2018/01/paris-bakery.jpg 758w, https://justfunfacts.com/wp-content/uploads/2018/01/paris-bakery-300x200.jpg 300w" width="758"></a></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">In Paris, the </span><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">baguette</span></strong><span data-dcnode-id="697" instrument_node=""> is an indispensable part of everyday life.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="692"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Paris has an estimated 40,000 restaurants!</span></strong></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">In France, the term </span><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">haute couture</span></strong><span data-dcnode-id="687" instrument_node=""> is protected by law and is defined by the Chambre de commerce et d’industrie de Paris based in Paris.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="678"><em data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Fluctuat nec mergitur</span></em><span data-dcnode-id="682" instrument_node=""> is a Latin phrase meaning </span><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">“Tossed by the waves but never sunk”</span></strong><span data-dcnode-id="679" instrument_node="">. The motto has been used since at least 1358 by the city of Paris.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="676" instrument_node="">In the </span><strong data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">1860s</span></strong><span data-dcnode-id="673" instrument_node="">, an artistic movement known as </span><strong data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">French Impressionism</span></strong><span data-dcnode-id="670" instrument_node="">&nbsp;emerged, featuring the work of a group of Paris-based artists that included Claude Monet and Pierre-Auguste Renoir.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="665"><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/monet-painting.jpg"><img alt="monet painting" class="size-full wp-image-15506 aligncenter" data-dcnode-id="667" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2018/01/monet-painting.jpg&amp;raw" width="240"></a></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="657"><strong data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">In the 1920’s and 1930’s Paris was one of the world’s most important hotbeds of experimentation in art and literature</span></strong><span data-dcnode-id="661" instrument_node="">. Salvador Dali, </span><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-pablo-picasso/"><span data-dcnode-id="660" instrument_node="">Pablo Picasso</span></a><span data-dcnode-id="658" instrument_node="">, and the “Lost Generation” of English-speaking writers like Ernest Hemingway, James Joyce, James Baldwin, Gertrude Stein, and Ezra Pound make Paris their home.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="653"><strong data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">More than 20 million people in total are said to come to this city each year.</span></strong></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="651" instrument_node="">A dozen or so Japanese tourists a year have to be repatriated from the French capital, after falling prey to what’s become known as “</span><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Paris syndrome.”</span></strong><span data-dcnode-id="648" instrument_node=""> That is what some polite Japanese tourists suffer when they discover that Parisians can be rude or the city does not meet their expectations. The experience can apparently be too stressful for some and they suffer a psychiatric breakdown.</span></p><span data-dcnode-id="646" instrument_node="">
