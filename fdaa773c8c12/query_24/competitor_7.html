</span><div class="td-post-header" data-dcnode-id="814"><span data-dcnode-id="831" instrument_node="">
</span><header class="td-post-title" data-dcnode-id="816"><span data-dcnode-id="830" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">97 Interesting Facts About France</span></h1><span data-dcnode-id="827" instrument_node="">
</span><div class="td-module-meta-info" data-dcnode-id="818"><span data-dcnode-id="826" instrument_node="">
</span><div class="td-post-author-name" data-dcnode-id="820"><div class="td-author-by" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">By</span></div><span data-dcnode-id="823" instrument_node=""> </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/author/thefactfile-staff/"><span data-dcnode-id="822" instrument_node="">Editorial Staff</span></a></div><span data-dcnode-id="819" instrument_node=""> </span></div><span data-dcnode-id="817" instrument_node="">
</span></header><span data-dcnode-id="815" instrument_node="">
</span></div><span data-dcnode-id="813" instrument_node="">
</span><div class="td-post-content" data-dcnode-id="210"><span data-dcnode-id="812" instrument_node="">
</span><p class="last-updated" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Last updated on April 19th, 2022</span></p><p data-dcnode-id="764"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">France,</span></strong><span data-dcnode-id="807" instrument_node=""> officially the&nbsp;French Republic, is a sovereign state&nbsp;located in&nbsp;Western Europe. It has an </span><strong data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">area</span></strong><span data-dcnode-id="804" instrument_node=""> of 643,801 square km. It has several overseas regions and territories also. Paris is its </span><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">capital</span></strong><span data-dcnode-id="801" instrument_node=""> and largest city. French is its official </span><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">language</span></strong><span data-dcnode-id="798" instrument_node="">. Its official </span><strong data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">currency</span></strong><span data-dcnode-id="795" instrument_node=""> is Euro (€) (EUR). Its eight </span><strong data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">bordering</span></strong><span data-dcnode-id="792" instrument_node=""> </span><strong data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">countries</span></strong><span data-dcnode-id="789" instrument_node="">&nbsp;are </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/interesting-facts-andorra/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="788" instrument_node="">Andorra</span></a><span data-dcnode-id="786" instrument_node="">, </span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/belgium-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="785" instrument_node="">Belgium</span></a><span data-dcnode-id="783" instrument_node="">, </span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/germany-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="782" instrument_node="">Germany</span></a><span data-dcnode-id="780" instrument_node="">, </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/italy-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="779" instrument_node="">Italy</span></a><span data-dcnode-id="777" instrument_node="">, </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/luxembourg-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="776" instrument_node="">Luxembourg</span></a><span data-dcnode-id="774" instrument_node="">, </span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/monaco-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="773" instrument_node="">Monaco </span></a><span data-dcnode-id="771" instrument_node="">(a principality), </span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/spain-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="770" instrument_node="">Spain</span></a><span data-dcnode-id="768" instrument_node="">, and </span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/switzerland-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="767" instrument_node="">Switzerland</span></a><span data-dcnode-id="765" instrument_node="">.</span></p><span data-dcnode-id="763" instrument_node="">
</span><h2 data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Here are 97&nbsp;interesting facts about France, covering its history, geography, notable people, food, culture, economics, famous monuments and much more.</span></h2><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="753"><strong data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">1.</span></strong><span data-dcnode-id="757" instrument_node=""> Now for certain you did not know this. All over the world, cities are riddled with dozens of road signs and among them is the stop sign. But did you know that </span><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">the city of Paris has only one stop sign?</span></strong><span data-dcnode-id="754" instrument_node=""> Now you know.</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><img alt="stop-sign" class="wp-image-12832 aligncenter td-animation-stack-type0-2" data-dcnode-id="751" height="400" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/stop-sign-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/stop-sign-min.jpg 640w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/stop-sign-min-300x300.jpg 300w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/stop-sign-min-150x150.jpg 150w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/stop-sign-min-420x420.jpg 420w" width="400"></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="742"><strong data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">2.</span></strong><span data-dcnode-id="746" instrument_node=""> For many people, the thought of even staying in the same room with a dead body is pure torture. But in France, </span><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">you are legally allowed to marry a dead person.</span></strong><span data-dcnode-id="743" instrument_node=""> Truly whoever said love never dies was not wrong.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="734"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">3.</span></strong><span data-dcnode-id="738" instrument_node=""> When you give birth to a child, it is your natural and legal responsibility to take care of it. You do not need to be rewarded for that. But in France, </span><strong data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">parents who successfully raise several children with dignity are awarded the Medal of the French Family</span></strong><span data-dcnode-id="735" instrument_node=""> (La Médaille de La Famille Française) by the government.</span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="724"><strong data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">4.</span></strong><span data-dcnode-id="730" instrument_node=""> We all know that France’s capital, Paris is the globally renowned city of love. Well, what you did not know but you probably guessed is that </span><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">a study conducted by the Durex</span></strong><span data-dcnode-id="727" instrument_node=""> in 2003 found out that </span><strong data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">French people have the most sex in a year.</span></strong></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="713"><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">5.</span></strong><span data-dcnode-id="720" instrument_node="">&nbsp;</span><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Did you know that there is a small town in the Savoie region of France named Pussy?&nbsp;</span></strong><span data-dcnode-id="717" instrument_node="">Anyway, maybe it was called so because of a high population of </span><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/facts-about-cats/" rel="noopener" target="_blank"><span data-dcnode-id="716" instrument_node="">cats</span></a><span data-dcnode-id="714" instrument_node=""> in the area. You will never know.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="705"><strong data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">6.</span></strong><span data-dcnode-id="709" instrument_node=""> It is a well-known fact that so many people have perished because of love. With so much love in the air, the same must be true in France. Studies have revealed that this country has </span><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">the highest number of depressed people;</span></strong><span data-dcnode-id="706" instrument_node=""> therefore, becoming the world’s most depressed country.</span></p><span data-dcnode-id="704" instrument_node="">
</span><h2 data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Flag of France</span></h2><span data-dcnode-id="701" instrument_node="">
</span><figure aria-describedby="caption-attachment-5694" class="wp-caption aligncenter" data-dcnode-id="696" id="attachment_5694" style="width: 500px"><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Flag-of-France.gif"><img alt="Flag of France" class="wp-image-5694 size-full td-animation-stack-type0-2" data-dcnode-id="700" height="334" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Flag-of-France.gif&amp;raw" width="500"></a><figcaption class="wp-caption-text" data-dcnode-id="697" id="caption-attachment-5694"><span data-dcnode-id="698" instrument_node="">The national flag of France. Image credit – CIA</span></figcaption></figure><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="689"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">7.</span></strong><span data-dcnode-id="692" instrument_node=""> When a king receives the reign of power, it is expected that he will serve for a very long time. But did you know that one of the shortest reigns for a king was in France? If you did not know then </span><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">King Louis XIX’s reign as the leader of France lasted for only 20 minutes.</span></strong></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="682"><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">8.</span></strong><span data-dcnode-id="685" instrument_node=""> Sports and games for most people are just a means of entertainment. Too many rules kill the fun in many things. For this reason, nobody would want a game that has too many rules. But in France, there is </span><strong data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">a traditional ball game called boules that has a 70-page long rule book.</span></strong></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="674"><strong data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">9.</span></strong><span data-dcnode-id="678" instrument_node=""> The luckiest person in history could easily be one of France’s former presidents. </span><strong data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">President Charles de Gaulle has gone down in history to be the person who has survived the most assassination attempts in the world.</span></strong><span data-dcnode-id="675" instrument_node=""> President Gaulle survived 32 attempts on his life earning himself a place in the Guinness Book of World Records.</span></p><span data-dcnode-id="673" instrument_node="">
</span><figure aria-describedby="caption-attachment-7749" class="wp-caption aligncenter" data-dcnode-id="667" id="attachment_7749" style="width: 382px"><img alt="President Charles de Gaulle of France" class="wp-image-7749 size-full td-animation-stack-type0-2" data-dcnode-id="672" height="480" loading="lazy" sizes="(max-width: 382px) 100vw, 382px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/President-Charles-de-Gaulle-of-France.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/President-Charles-de-Gaulle-of-France.jpg 382w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/President-Charles-de-Gaulle-of-France-239x300.jpg 239w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/President-Charles-de-Gaulle-of-France-334x420.jpg 334w" width="382"><figcaption class="wp-caption-text" data-dcnode-id="668" id="caption-attachment-7749"><span data-dcnode-id="671" instrument_node="">Former president of France – Charles de Gaulle. Image via </span><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACommander_of_Free_French_Forces_Charles_de_Gaulle_seated%28cropped%29jpg.jpg%23/media/File%3ACommander_of_Free_French_Forces_Charles_de_Gaulle_seated%28cropped%29jpg.jpg" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="670" instrument_node="">Wikipedia.org</span></a></figcaption></figure><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="659"><strong data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">10.</span></strong><span data-dcnode-id="663" instrument_node=""> Do you know that a town in France could have been the Holy See and the headquarters of the Pope and the Catholic Church? In 1309, </span><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">the headquarters of the Catholic Church was moved</span></strong><span data-dcnode-id="660" instrument_node=""> by Pope Clement V from Rome to Avignon in France. It was later returned to Rome in 1377.</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="651"><strong data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">11.</span></strong><span data-dcnode-id="655" instrument_node=""> An interesting fact about France tells us that </span><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">all roads in the country have a point where they all start.</span></strong><span data-dcnode-id="652" instrument_node=""> This point is named Point Zero, and it is marked by a bronze star that is set on the pavement near the Notre Dame Cathedral’s main entrance in Paris.</span></p><span data-dcnode-id="650" instrument_node="">
</span><figure aria-describedby="caption-attachment-12834" class="wp-caption aligncenter" data-dcnode-id="644" id="attachment_12834" style="width: 500px"><img alt="Point zéro des routes de France." class="wp-image-12834 td-animation-stack-type0-2" data-dcnode-id="649" height="332" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Point-z%25C2%25ACro-des-routes-de-France.-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Point-z¬ro-des-routes-de-France.-min.jpg 640w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Point-z¬ro-des-routes-de-France.-min-300x199.jpg 300w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Point-z¬ro-des-routes-de-France.-min-632x420.jpg 632w" width="500"><figcaption class="wp-caption-text" data-dcnode-id="645" id="caption-attachment-12834"><span data-dcnode-id="648" instrument_node="">Point zéro des routes de France. Image via&nbsp;</span><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/sergemelki/3354064020/in/photolist-dnXRwF-29wQ1LE-7Eu8fo-7bCkWQ-8VXq4q-bp3Eoe-aY7n1R-RZ6HNM-22YwBXe-MwuLii-M5xucW-6ew9Fp-67oso1-S7tFs3-astosK-nownov-6LGqgr-5CXyYE-2nrC55-RZ6HJD-4YZ5T-9CizAu-5NP62K-6ewPGT-d1pys-MwuNhZ-Q8nhGk-av6x9k-kaug" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="647" instrument_node="">Serge Melki</span></a></figcaption></figure><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="636"><strong data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">12.</span></strong><span data-dcnode-id="640" instrument_node=""> If you ask anyone, they will tell you that the UK has </span><strong data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">the highest consumption of pure alcohol per year </span></strong><span data-dcnode-id="637" instrument_node="">when compared to the U.S. and France. But the truth of the matter is that France has the highest consumption of 10.9 liters, followed by the UK at 8.2 liters, and finally the U.S at 6.3 liters per year per person.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="625"><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">13.</span></strong><span data-dcnode-id="632" instrument_node=""> France is the </span><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">largest country in the European Union</span></strong><span data-dcnode-id="629" instrument_node="">. It comprises almost 1/5</span><sup data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">th</span></sup><span data-dcnode-id="626" instrument_node=""> of the total EU area.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="614"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">14.</span></strong><span data-dcnode-id="621" instrument_node=""> It would be </span><strong data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">interesting for kids</span></strong><span data-dcnode-id="618" instrument_node=""> to note that France </span><strong data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">resembles the shape of a hexagon</span></strong><span data-dcnode-id="615" instrument_node="">. Hence, it is also known as ‘the hexagon.’</span></p><span data-dcnode-id="613" instrument_node="">
</span><h2 data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">France on the map</span></h2><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="590"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="591" frameborder="0" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/embed%3Fpb%3D%211m18%211m12%211m3%211d10939052.42014527%212d-7.415647549037549%213d47.981493792926955%212m3%211f0%212f0%213f0%213m2%211i1024%212i768%214f13.1%213m3%211m2%211s0xd54a02933785731%253A0x6bfd3f96c747d9f7%212sFrance%215e0%213m2%211sen%212sin%214v1555129269410%215m2%211sen%212sin&amp;raw" style="border: 0;" width="600"><html data-dcnode-id="593"><head data-dcnode-id="604"><meta charset="utf-8"><span data-dcnode-id="608" instrument_node="">
</span><span data-dcnode-id="605" instrument_node="">

</span><body data-dcnode-id="594"><span data-dcnode-id="602" instrument_node="">
</span><div data-dcnode-id="601" id="mapDiv"></div><span data-dcnode-id="600" instrument_node="">
</span><span data-dcnode-id="597" instrument_node="">
</span><span data-dcnode-id="595" instrument_node="">
</span></body></html></iframe></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="582"><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">15.</span></strong><span data-dcnode-id="586" instrument_node=""> There are more than five million people of </span><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Arab and African descent living in France</span></strong><span data-dcnode-id="583" instrument_node="">. In the past, France was a colony where people from various regions from across the world came and settled.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="574"><strong data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">16.</span></strong><span data-dcnode-id="578" instrument_node=""> France is </span><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">the most-visited country</span></strong><span data-dcnode-id="575" instrument_node=""> in the world. France welcomed 84 million foreign tourists in 2013. And the French are expecting to increase the annual figure to 100 million by the end of 2030.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="563"><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">17.</span></strong><span data-dcnode-id="570" instrument_node=""> After </span><a data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/germany-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="569" instrument_node="">Germany</span></a><span data-dcnode-id="567" instrument_node="">, France has the </span><strong data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">second-largest population of EU nations</span></strong><span data-dcnode-id="564" instrument_node="">. And 85% of its population lives in urban areas.</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="555"><strong data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">18.</span></strong><span data-dcnode-id="559" instrument_node=""> However, other languages and dialects are also popular in France; French is the official and&nbsp;</span><strong data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">first language of 88%</span></strong><span data-dcnode-id="556" instrument_node=""> of its population.</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="544"><strong data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">19.</span></strong><span data-dcnode-id="551" instrument_node=""> </span><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/italy-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="550" instrument_node="">Italy </span></a><span data-dcnode-id="548" instrument_node="">is to the west of France. There are </span><strong data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">a million Italian-speaking people</span></strong><span data-dcnode-id="545" instrument_node=""> in France, most of whom live close to the Italian border.</span></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="530"><strong data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">20.</span></strong><span data-dcnode-id="540" instrument_node=""> Did you know that </span><strong data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">the longest confirmed human lifespan on record</span></strong><span data-dcnode-id="537" instrument_node=""> belongs to a French woman,&nbsp;</span><strong data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Jeanne Calment,</span></strong><span data-dcnode-id="534" instrument_node="">&nbsp;who lived for 122 years and 164 days? Calment was born on February 21st, 1875, and died on August 4th, 1997. Interestingly, she </span><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">outlived both her daughter and grandson by several decades</span></strong><span data-dcnode-id="531" instrument_node="">.</span></p><span data-dcnode-id="529" instrument_node="">
</span><figure aria-describedby="caption-attachment-7748" class="wp-caption aligncenter" data-dcnode-id="523" id="attachment_7748" style="width: 263px"><img alt="Jeanne-Calment from France on her 121st Birthday" class="wp-image-7748 size-full td-animation-stack-type0-2" data-dcnode-id="528" height="380" loading="lazy" sizes="(max-width: 263px) 100vw, 263px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Jeanne-Calment-from-France.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Jeanne-Calment-from-France.jpg 263w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Jeanne-Calment-from-France-208x300.jpg 208w" width="263"><figcaption class="wp-caption-text" data-dcnode-id="524" id="caption-attachment-7748"><span data-dcnode-id="527" instrument_node="">News photograph of Jeanne Calment celebrating her 121st birthday. Image via </span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeanne_Calment%23/media/File%3AJeanne-Calment-1996.jpg" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="526" instrument_node="">Wikipedia.org</span></a></figcaption></figure><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="515"><strong data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">21. Electric cars</span></strong><span data-dcnode-id="519" instrument_node=""> are quite popular in France. France leads all other European countries in total sales of electric cars. A total of </span><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">8,779 passenger electric cars</span></strong><span data-dcnode-id="516" instrument_node=""> were registered in France in 2013.</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="507"><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">22.</span></strong><span data-dcnode-id="511" instrument_node=""> The parachute, the hot air balloon, the motion picture camera, the bicycle and inflatable tires for cars&nbsp;</span><strong data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">are all French inventions</span></strong><span data-dcnode-id="508" instrument_node="">. The French are obviously very intelligent people!</span></p><span data-dcnode-id="506" instrument_node="">
</span><h2 data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Facts about famous French people, French customs, their wine and time zones</span></h2><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="484"><strong data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">23.</span></strong><span data-dcnode-id="500" instrument_node=""> </span><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/marie-curie-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="499" instrument_node="">Marie Curie</span></a><span data-dcnode-id="497" instrument_node="">, Blaise Pascal, Pierre Curie and Joseph Fourier are some of the </span><strong data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">famous scientists</span></strong><span data-dcnode-id="494" instrument_node=""> from France. (Read some interesting facts about </span><a data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/albert-einstein-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="493" instrument_node="">Albert Einstein</span></a><span data-dcnode-id="491" instrument_node="">, </span><a data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/henry-ford-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="490" instrument_node="">Henry Ford</span></a><span data-dcnode-id="488" instrument_node=""> and </span><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/isaac-newton-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="487" instrument_node="">Isaac Newton</span></a><span data-dcnode-id="485" instrument_node="">)</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="476"><strong data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">24.</span></strong><span data-dcnode-id="480" instrument_node=""> In France, it is customary to greet others and say ‘Hello’ and ‘good morning or afternoon,’ depending on the time of the day. It is all about </span><strong data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">being polite</span></strong><span data-dcnode-id="477" instrument_node="">.</span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="468"><strong data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">25.</span></strong><span data-dcnode-id="472" instrument_node=""> The French love polite people.&nbsp;This is the reason why a coffee shop in </span><strong data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">France sells cheap coffee to those</span></strong><span data-dcnode-id="469" instrument_node=""> of its customers who greet and say ‘bonjour’ before ordering their favorite coffee.</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="460"><strong data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">26.</span></strong><span data-dcnode-id="464" instrument_node=""> The license plates that we see today on automobiles were </span><strong data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">first introduced in France</span></strong><span data-dcnode-id="461" instrument_node="">.</span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="452"><strong data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">27.</span></strong><span data-dcnode-id="456" instrument_node=""> In France, it is </span><strong data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">illegal to name</span></strong><span data-dcnode-id="453" instrument_node=""> a pig “Napoleon.”</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="444"><strong data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">28.</span></strong><span data-dcnode-id="448" instrument_node=""> France is one of the </span><strong data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">largest producers of wine</span></strong><span data-dcnode-id="445" instrument_node=""> in the world. They produce between 7-8 billion bottles every year. Many of these wines are sold internationally at hefty prices, while the rest are consumed locally in the country.</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="437"><strong data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">29.&nbsp;</span></strong><strong data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Condom vending machines</span></strong><span data-dcnode-id="438" instrument_node=""> can be found in almost 90% of the high schools in France.</span></p><span data-dcnode-id="436" instrument_node="">
</span><figure aria-describedby="caption-attachment-12835" class="wp-caption aligncenter" data-dcnode-id="432" id="attachment_12835" style="width: 500px"><img alt="" class="size-full wp-image-12835 td-animation-stack-type0-2" data-dcnode-id="435" height="334" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Products-of-Durex-a-brand-of-condoms-originally-developed-and-produced-in-the-UK-by-SSL-International.-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Products-of-Durex-a-brand-of-condoms-originally-developed-and-produced-in-the-UK-by-SSL-International.-min.jpg 500w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Products-of-Durex-a-brand-of-condoms-originally-developed-and-produced-in-the-UK-by-SSL-International.-min-300x200.jpg 300w" width="500"><figcaption class="wp-caption-text" data-dcnode-id="433" id="caption-attachment-12835"><span data-dcnode-id="434" instrument_node="">Products of Durex, a brand of condoms. Photo: monticello / Shutterstock.com</span></figcaption></figure><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="424"><strong data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">30.</span></strong><span data-dcnode-id="428" instrument_node=""> There are </span><strong data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">12 time zones</span></strong><span data-dcnode-id="425" instrument_node=""> in use in France. This is the highest number among any nation in the world.</span></p><span data-dcnode-id="423" instrument_node="">
</span><h2 data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">France facts, continued . . .</span></h2><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="410"><strong data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">31. </span></strong><span data-dcnode-id="417" instrument_node="">Between 1814 and 1830, t</span><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">he French flag</span></strong><span data-dcnode-id="414" instrument_node="">&nbsp;</span><strong data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">was plain white (no color, just white)</span></strong><span data-dcnode-id="411" instrument_node="">.</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="405"><strong data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">32. French people appreciate</span></strong><span data-dcnode-id="406" instrument_node=""> if you greet them in French.</span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="397"><strong data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">33.</span></strong><span data-dcnode-id="401" instrument_node=""> Until 2012, </span><strong data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">wearing trousers</span></strong><span data-dcnode-id="398" instrument_node=""> for women in France was illegal.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="389"><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">34.</span></strong><span data-dcnode-id="393" instrument_node=""> More people in Africa </span><strong data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">speak French</span></strong><span data-dcnode-id="390" instrument_node=""> than people in France.</span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="381"><strong data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">35.</span></strong><span data-dcnode-id="385" instrument_node=""> In France, it is mandatory to secure permission from the government as well as other retailers </span><strong data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">to open a store</span></strong><span data-dcnode-id="382" instrument_node=""> that is more than 300 square meters in area.</span></p><span data-dcnode-id="380" instrument_node="">
</span><figure aria-describedby="caption-attachment-12836" class="wp-caption aligncenter" data-dcnode-id="376" id="attachment_12836" style="width: 500px"><img alt="" class="size-full wp-image-12836 td-animation-stack-type0-2" data-dcnode-id="379" height="332" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Smiling-baby-girl-lying-on-a-bed-sleeping-on-blue-sheets.-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Smiling-baby-girl-lying-on-a-bed-sleeping-on-blue-sheets.-min.jpg 500w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Smiling-baby-girl-lying-on-a-bed-sleeping-on-blue-sheets.-min-300x199.jpg 300w" width="500"><figcaption class="wp-caption-text" data-dcnode-id="377" id="caption-attachment-12836"><span data-dcnode-id="378" instrument_node="">Smiling baby girl lying on a bed sleeping on blue sheets.</span></figcaption></figure><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="368"><strong data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">36. The French sleep the most</span></strong><span data-dcnode-id="372" instrument_node=""> among people in the developed world. On average, they sleep&nbsp;</span><strong data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">8.83 hours</span></strong><span data-dcnode-id="369" instrument_node="">&nbsp;per day.</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="357"><strong data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">37.</span></strong><span data-dcnode-id="364" instrument_node=""> There are more than </span><strong data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">1,500 bike stations in Paris</span></strong><span data-dcnode-id="361" instrument_node="">. You can rent a bike from any of these stations at a cost of one Euro for one day, and return the bike at any other station. If you are in Paris now, </span><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.velib.paris.fr/Stations-in-Paris" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="360" instrument_node="">check this link and grab a bike here</span></a><span data-dcnode-id="358" instrument_node="">.</span></p><span data-dcnode-id="356" instrument_node="">
</span><figure aria-describedby="caption-attachment-12837" class="wp-caption aligncenter" data-dcnode-id="350" id="attachment_12837" style="width: 500px"><img alt="A bike station in Paris." class="wp-image-12837 td-animation-stack-type0-2" data-dcnode-id="355" height="333" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/A-bike-station-in-Paris-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/A-bike-station-in-Paris-min.jpg 640w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/A-bike-station-in-Paris-min-300x200.jpg 300w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/A-bike-station-in-Paris-min-631x420.jpg 631w" width="500"><figcaption class="wp-caption-text" data-dcnode-id="351" id="caption-attachment-12837"><span data-dcnode-id="354" instrument_node="">A bike station in Paris. Image via –&nbsp;</span><a data-dcnode-id="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/30998987%40N03/13633774145/in/photolist-21ZLcdm-jWecxk-4UVHrk-6ZcM3Z-6ZgQUd-6ZZxne-7197Xe-mLLE4t-mLLTox-mLLJng-mLLHL8-mLNrbj-8eV1iW-cpTiTh-2ynr32-ZHxNBp-8dhxvv-719fDi-asg5sr-71dehd-b6msK6-dTGt7k-7Lu2ef-5pFLv7-iHZh89-6jPnkk-6ZcNNv-6ZZGUF-6ZJ6kH-4bHD6B-4bMEhW-8Am3tb-6oyTFr-6oySnx-6oyUYi-719gjx-6oBFNS-71dhRs-onRzmv-bzesv7-Vs4xUL" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="353" instrument_node="">Flickr</span></a></figcaption></figure><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="336"><strong data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">38.</span></strong><span data-dcnode-id="346" instrument_node="">&nbsp;The French begin their </span><strong data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">new year in September</span></strong><span data-dcnode-id="343" instrument_node=""> (physiologically speaking). It is called </span><strong data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">“la rentrée.”</span></strong><span data-dcnode-id="340" instrument_node="">&nbsp;At this time, many things happen in France: kids start school, businesses receive their tax bills, etc. The French are always in a </span><strong data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">mood for celebrations</span></strong><span data-dcnode-id="337" instrument_node=""> and vacations.</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="331"><strong data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">39. Fourteen percent</span></strong><span data-dcnode-id="332" instrument_node=""> of the population of Paris consists of non-nationals.</span></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="323"><strong data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">40.</span></strong><span data-dcnode-id="327" instrument_node=""> If you were in France long term, it is highly likely that you would get absorbed in their culture and would </span><strong data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">want to abandon your nationality and culture</span></strong><span data-dcnode-id="324" instrument_node=""> for theirs.</span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="315"><strong data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">41.</span></strong><span data-dcnode-id="319" instrument_node=""> Currently, traditional French </span><strong data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">cooking is on the decline</span></strong><span data-dcnode-id="316" instrument_node="">&nbsp;in France. The majority of the restaurants in France serve prepared meals instead of fresh cuisine.</span></p><span data-dcnode-id="314" instrument_node="">
</span><h2 data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Facts about the Mona Lisa, Eiffel Tower, food, french women, Tour de France</span></h2><span data-dcnode-id="311" instrument_node="">
</span><figure aria-describedby="caption-attachment-12838" class="wp-caption aligncenter" data-dcnode-id="307" id="attachment_12838" style="width: 500px"><img alt="Mona Lisa at the Louvre Museum. Paris, France. Photo: Resul Muslu / Shutterstock.comMona Lisa at the Louvre Museum. Paris, France. " class="size-full wp-image-12838 td-animation-stack-type0-1" data-dcnode-id="310" height="334" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Mona-Lisa-at-the-Louvre-Museum.-Paris-France.-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Mona-Lisa-at-the-Louvre-Museum.-Paris-France.-min.jpg 500w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Mona-Lisa-at-the-Louvre-Museum.-Paris-France.-min-300x200.jpg 300w" width="500"><figcaption class="wp-caption-text" data-dcnode-id="308" id="caption-attachment-12838"><span data-dcnode-id="309" instrument_node="">Mona Lisa at the Louvre Museum. Paris, France. Photo: Resul Muslu / Shutterstock.com</span></figcaption></figure><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="296"><strong data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">42.</span></strong><span data-dcnode-id="303" instrument_node=""> Paris is home to many of </span><strong data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">the world’s most famous art pieces</span></strong><span data-dcnode-id="300" instrument_node="">&nbsp;including </span><strong data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">the Mona Lisa and Venus de Milo</span></strong><span data-dcnode-id="297" instrument_node="">. These works of art can be seen in the Louvre Museum, which is among the world’s largest museums.</span></p><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="289"><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Related:&nbsp;</span></strong><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/leonardo-da-vinci-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="292" instrument_node="">Interesting facts about Leonardo Da Vinci</span></a><span data-dcnode-id="290" instrument_node="">,&nbsp;who created the Mona Lisa.</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="281"><strong data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">43.</span></strong><span data-dcnode-id="285" instrument_node=""> Champagne, a sparkling wine, is only produced in&nbsp;</span><strong data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">a specific “Champagne region”</span></strong><span data-dcnode-id="282" instrument_node=""> of France. Wine produced in any other region would not be called Champagne.</span></p><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="270"><strong data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">44. The Eiffel Tower</span></strong><span data-dcnode-id="277" instrument_node=""> is named after its engineer,&nbsp;‘</span><strong data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Gustave Eiffel.’</span></strong><span data-dcnode-id="274" instrument_node="">&nbsp;It is one of </span><strong data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">the most recognized structures in the world,</span></strong><span data-dcnode-id="271" instrument_node="">&nbsp;even though its construction was criticized by some of France’s leading artists and intellectuals.</span></p><span data-dcnode-id="269" instrument_node="">
</span><figure aria-describedby="caption-attachment-12840" class="wp-caption aligncenter" data-dcnode-id="265" id="attachment_12840" style="width: 500px"><img alt="Paris, Eiffel tower at sunrise." class="size-full wp-image-12840 td-animation-stack-type0-1" data-dcnode-id="268" height="333" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Paris-Eiffel-tower-at-sunrise.-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Paris-Eiffel-tower-at-sunrise.-min.jpg 500w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2015/11/Paris-Eiffel-tower-at-sunrise.-min-300x200.jpg 300w" width="500"><figcaption class="wp-caption-text" data-dcnode-id="266" id="caption-attachment-12840"><span data-dcnode-id="267" instrument_node="">Paris, Eiffel tower at sunrise.</span></figcaption></figure><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="260"><strong data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">45.</span></strong><span data-dcnode-id="261" instrument_node=""> It is painted every seven years, taking five tons of paint to complete the job each time.</span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="252"><strong data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">46.</span></strong><span data-dcnode-id="256" instrument_node="">&nbsp;The Eiffel Tower is </span><strong data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">the most-visited paid monument</span></strong><span data-dcnode-id="253" instrument_node=""> in the world. It was erected in 1889.</span></p><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="241"><strong data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">47.</span></strong><span data-dcnode-id="248" instrument_node=""> It is as high as an </span><strong data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">81-story building</span></strong><span data-dcnode-id="245" instrument_node="">. The tower was the tallest man-made structure in the world for almost 41 years until the erection of the </span><strong data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Chrysler Building in New York City</span></strong><span data-dcnode-id="242" instrument_node=""> in 1930.</span></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="236"><strong data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">48. Ten thousand African slaves</span></strong><span data-dcnode-id="237" instrument_node=""> were freed after the French Revolution.</span></p><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="228"><strong data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">49.</span></strong><span data-dcnode-id="232" instrument_node=""> The world’s </span><strong data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">first true department store</span></strong><span data-dcnode-id="229" instrument_node=""> was opened in Paris in 1838.</span></p><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="217"><strong data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">50.</span></strong><span data-dcnode-id="224" instrument_node=""> French people are quite </span><strong data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">passionate about their food</span></strong><span data-dcnode-id="221" instrument_node="">. Before eating a meal, it is considered polite to say ‘</span><strong data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Bon Appetit.’</span></strong><span data-dcnode-id="218" instrument_node="">&nbsp;This literally means “good appetite” to everyone who is eating along with you.</span></p><span data-dcnode-id="216" instrument_node="">
