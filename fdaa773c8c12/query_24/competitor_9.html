</span><article class="entry content-bg single-entry post-1362 post type-post status-publish format-standard has-post-thumbnail hentry category-facts tag-cool-facts-about-the-eiffel-tower tag-eiffel-tower-fact-for-kids tag-eiffel-tower-history-facts tag-facts-about-the-eiffel-tower-for-kids tag-france-eiffel-tower-facts tag-fun-facts-about-the-eiffel-tower tag-interesting-fact-about-the-eiffel-tower tag-interesting-facts-about-eiffel-tower tag-paris-eiffel-tower-facts" data-dcnode-id="822" id="post-1362"><span data-dcnode-id="1482" instrument_node="">
</span><div class="entry-content-wrap" data-dcnode-id="824"><span data-dcnode-id="1481" instrument_node="">
</span><div class="entry-content single-content" data-dcnode-id="875"><span data-dcnode-id="1480" instrument_node="">
</span><div class="code-block code-block-1" data-dcnode-id="1472" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1479" instrument_node="">
</span><span data-dcnode-id="1477" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-3102162174470613" data-ad-format="auto" data-ad-slot="1354690259" data-dcnode-id="1476" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1475" instrument_node="">
</span></div><span data-dcnode-id="1471" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1468"><figure class="alignleft" data-dcnode-id="1469"><img alt="Fun Facts about the Eiffel Tower for Kids" class="wp-image-1365" data-dcnode-id="1470" height="220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.growkido.com/wp-content/uploads/2021/09/Fun-Facts-about-the-Eiffel-Tower-for-Kids.jpg&amp;raw" width="159"></figure></div><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1466" instrument_node="">Are you planning a trip to the </span><strong data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">capital city of France</span></strong><span data-dcnode-id="1463" instrument_node=""> with your family? Your kids must be excited to visit the Eiffel Tower. Well, who isn’t? And even if you are not visiting, it is great fun to know about the historical monuments, right.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">We have gathered some amazing Eiffel Tower facts for kids in this article that will give you information about the related history, its construction, and other such things. Let us start then.</span></p><span data-dcnode-id="1458" instrument_node="">
</span><h2 data-dcnode-id="1455"><strong data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">11 Interesting &amp; Fun Facts about the Eiffel Tower for Kids</span></strong></h2><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1453" instrument_node="">Standing for 130 years and more, the Eiffel Tower has made its place in the list of historical monuments since 1964. It is a </span><a data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/list/" rel="noopener" target="_blank"><span data-dcnode-id="1452" instrument_node="">UNESCO World Heritage Site</span></a><span data-dcnode-id="1450" instrument_node=""> since the year 1991.</span></p><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">There is a good amount of history behind the making of this prestigious tower, which is the symbol of the city of Paris today.</span></p><span data-dcnode-id="1445" instrument_node="">
</span><h3 data-dcnode-id="1442"><strong data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">1. It was the tallest structure until 1930</span></strong></h3><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1440" instrument_node="">The Eiffel Tower stood as the tallest structure in the world until 1930, when the Chrysler Building was constructed. There are </span><strong data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">1665 steps</span></strong><span data-dcnode-id="1437" instrument_node=""> in the Tower to reach the top of it.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Although the public is allowed to go up to the second floor of the tower on foot and take the elevator thereafter.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">There are three floors of the tower. They are 347 steps from the esplanade up to the first floor. The second floor consists of 327 steps, and from there it is 991 steps till the top.</span></p><div class="code-block code-block-2" data-dcnode-id="1422" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1429" instrument_node="">
</span><span data-dcnode-id="1427" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-3102162174470613" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="6741366381" data-dcnode-id="1426" style="display:block; text-align:center;"></ins><span data-dcnode-id="1425" instrument_node="">
</span></div><span data-dcnode-id="1421" instrument_node="">
</span><h3 data-dcnode-id="1418"><strong data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">2. It is repainted every 7 years</span></strong></h3><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1416" instrument_node="">It takes 15 months and&nbsp;</span><strong data-dcnode-id="1413"><span data-dcnode-id="1414" data-preserver-spaces="true"><span data-dcnode-id="1415" instrument_node="">60 tons</span></span></strong><span data-dcnode-id="1411" data-preserver-spaces="true"><span data-dcnode-id="1412" instrument_node="">&nbsp;of paint to paint the Eiffel Tower. It is repainted every seven years to preserve this beauty. And it is painted by 25 painters who do the job by hand using paintbrushes.&nbsp;</span></span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" data-preserver-spaces="true"><span data-dcnode-id="1408" instrument_node="">The tower has been painted 18 times since its construction in the last 130 years. It was originally red-brown, but today it is bronze in look. Seventy-two engineers, scientists and mathematicians worked to construct this tower, and all their names are engraved on its side.&nbsp;</span></span></p><span data-dcnode-id="1405" instrument_node="">
</span><h3 data-dcnode-id="1402"><strong data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">3. The Eiffel Tower grows every summer</span></strong></h3><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Standing at an original height of 1024 feet (without the antennas), the Eiffel Tower is known for growing each summer. Yes, you read it correctly. When the city’s temperature reaches around 104 degrees Fahrenheit, the metal base of the tower expands.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1397" instrument_node="">This makes the tower </span><strong data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">gain 6 inches</span></strong><span data-dcnode-id="1394" instrument_node=""> of height during the summers. This phenomenon is reversed during the winters, and the tower shrinks back to its original height losing the six inches that it gained during the summers.</span></p><span data-dcnode-id="1392" instrument_node="">
</span><h3 data-dcnode-id="1389"><strong data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">4. History of the Eiffel Tower</span></strong></h3><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1384"><a data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Eiffel" rel="noopener" target="_blank"><span data-dcnode-id="1387" instrument_node="">Alexandre Gustave Eiffel</span></a><span data-dcnode-id="1385" instrument_node=""> constructed the Eiffel Tower to commemorate the French Revolution and celebrate its 100th anniversary. The tower is named after him. He got the idea of making the tower after playing a partial role in making the Statue of Liberty.</span></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1382" instrument_node="">If you are interested in knowing more about the Statue of Liberty then refer to our article – </span><a data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.growkido.com/statue-of-liberty-facts-for-kids/"><span data-dcnode-id="1381" instrument_node="">11 Interesting &amp; Fun Facts about Statue of Liberty for Kids</span></a></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1377" instrument_node="">Two other engineers came up with the original designs of the Eiffel Tower. These were </span><strong data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Maurice Koechlin</span></strong><span data-dcnode-id="1374" instrument_node=""> and </span><strong data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Emile Nouguier</span></strong><span data-dcnode-id="1371" instrument_node="">. They were the senior and chief engineers of the engineering firm that constructed the Eiffel Tower. The main architect of the project was </span><strong data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Stephen Sauvestre</span></strong><span data-dcnode-id="1368" instrument_node="">.</span></p><span data-dcnode-id="1366" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1363"><figure class="aligncenter" data-dcnode-id="1364"><img alt="interesting fact about the Eiffel tower" class="wp-image-1363" data-dcnode-id="1365" height="325" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.growkido.com/wp-content/uploads/2021/09/interesting-fact-about-the-Eiffel-tower.jpg&amp;raw" width="700"></figure></div><span data-dcnode-id="1362" instrument_node="">
</span><h3 data-dcnode-id="1359"><strong data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">5. It was a temporary construction</span></strong></h3><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1357" instrument_node="">The tower was originally meant to be kept for 20 years. The people of Paris also wanted to take it down since they viewed it as an eyesore. After 20 years, the city of Paris realised that the tower could be used for many purposes, majorly for&nbsp;</span><strong data-dcnode-id="1354"><span data-dcnode-id="1355" data-preserver-spaces="true"><span data-dcnode-id="1356" instrument_node="">communication</span></span></strong><span data-dcnode-id="1352" data-preserver-spaces="true"><span data-dcnode-id="1353" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1345" data-preserver-spaces="true"><span data-dcnode-id="1349" instrument_node="">The military made use of the tower by using it as a wireless telegraph transmitter. The tower also helped in capturing&nbsp;</span><strong data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Mata Hari</span></strong><span data-dcnode-id="1346" instrument_node="">, a spy during the First World War, by intercepting a message.&nbsp;</span></span></p><div class="code-block code-block-3" data-dcnode-id="1336" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1343" instrument_node="">
</span><span data-dcnode-id="1341" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-3102162174470613" data-ad-format="auto" data-ad-slot="5568719663" data-dcnode-id="1340" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1339" instrument_node="">
</span></div><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" data-preserver-spaces="true"><span data-dcnode-id="1334" instrument_node="">Today, it is used to send television and radio signals across the capital city of Paris and beyond it as well.&nbsp;</span></span></p><span data-dcnode-id="1331" instrument_node="">
</span><h3 data-dcnode-id="1328"><strong data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">6. Accommodation in the tower</span></strong></h3><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1326" instrument_node="">When the Eiffel Tower was initially built, it has </span><strong data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">three restaurants</span></strong><span data-dcnode-id="1323" instrument_node=""> on its first floor, a French restaurant along with a Russian and a Flemish one. It also had an Anglo-American bar. Later on, the Flemish restaurant was transformed into a </span><strong data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">theatre</span></strong><span data-dcnode-id="1320" instrument_node=""> with a capacity of 250 seats.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1317" instrument_node="">There were </span><strong data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">laboratories</span></strong><span data-dcnode-id="1314" instrument_node=""> at the top for conducting experiments. There was also a small apartment that was reserved for Gustave Eiffel, which is now open as an exhibition for the public. It has wax mannequins of him, his daughter, and other notable guests like Thomas Edison.</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node="">An </span><strong data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">apartment</span></strong><span data-dcnode-id="1308" instrument_node=""> with a kitchen, two bedrooms and a lounge was built in May 2016 to accommodate four winners of the UEFA Euro 2016 football tournament.</span></p><span data-dcnode-id="1306" instrument_node="">
</span><h3 data-dcnode-id="1303"><strong data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">7. Eiffel Tower is made of only iron</span></strong></h3><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1301" instrument_node="">It is surprising to know that the world-famous tower of Paris is made up of only iron. The Eiffel Tower is made up of 7,000 metric tons of&nbsp;</span><strong data-dcnode-id="1298"><span data-dcnode-id="1299" data-preserver-spaces="true"><span data-dcnode-id="1300" instrument_node="">puddled iron</span></span></strong><span data-dcnode-id="1296" data-preserver-spaces="true"><span data-dcnode-id="1297" instrument_node="">, a form of wrought iron. It is tough and can be easily welded.&nbsp;</span></span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1292" data-preserver-spaces="true"><span data-dcnode-id="1293" instrument_node="">It was made to stand for only 20 years, but grateful to the correct calculations of Gustave, the tower never needed modification. It has stood strongly and elegantly for 130 years. However, it takes approximately 1.12 million US dollars each year for the maintenance of the tower.&nbsp;</span></span></p><span data-dcnode-id="1290" instrument_node="">
</span><h3 data-dcnode-id="1287"><strong data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">8. Eiffel Tower is a symbol of love</span></strong></h3><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1285" instrument_node="">Originally constructed to commemorate the French Revolution, Eiffel Tower has become the symbol of love over the years. Couples visiting the tower can enjoy the </span><strong data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">360-degree view</span></strong><span data-dcnode-id="1282" instrument_node=""> from the top along with a glass of champagne from one of the bars situated there.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Each year thousands of marriage proposals are made under it. Various painters and artists have made the tower a subject of their art.</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">It has been a part of many movies of numerous genres and languages. Some of the most famous movies are ‘A View to Kill’, ‘Superman 2’, ‘Hugo’, and ‘Lucy’.</span></p><span data-dcnode-id="1274" instrument_node="">
</span><h3 data-dcnode-id="1271"><strong data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">9. The Iron Lady</span></strong></h3><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1269" instrument_node="">Standing for over 130 years straight, the Eiffel Tower has got a nickname by its very own people. The French have given the nickname of&nbsp;</span><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">La Dame de Fer&nbsp;</span></strong><span data-dcnode-id="1266" instrument_node="">to it, which translates into&nbsp;</span><strong data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">The Iron Lady</span></strong><span data-dcnode-id="1263" instrument_node="">. The tower was constructed as an entry gate to the World Fair of 1889.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Many French artists and intellectuals criticized it for its design. Some thought that it was polluting the view of the Parisian sky. But 20 years later, the city of Paris understood its importance and decided to preserve it.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><h3 data-dcnode-id="1255"><strong data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">10. The construction of the Eiffel Tower</span></strong></h3><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1246"><strong data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">18,000 separate pieces</span></strong><span data-dcnode-id="1247" data-preserver-spaces="true"><span data-dcnode-id="1251" instrument_node="">&nbsp;were made in Gustave Eiffel’s factory, which was located on the outskirts of Paris. These 18,000 pieces were assembled with the help of wooden scaffolding and small steam cranes. The iron tower is held together by more than&nbsp;</span><strong data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">2.5 million rivets</span></strong><span data-dcnode-id="1248" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" data-preserver-spaces="true"><span data-dcnode-id="1244" instrument_node="">Around 300 workers helped in building the tower, and there has been no report of any casualties while they worked. Some of the slaves of that time also had the opportunity of helping in the construction of it.&nbsp;</span></span></p><span data-dcnode-id="1241" instrument_node="">
</span><h3 data-dcnode-id="1238"><strong data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">11. Eiffel Tower was sold twice</span></strong></h3><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1236" instrument_node="">A man named </span><strong data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Victor Lustig</span></strong><span data-dcnode-id="1233" instrument_node=""> sold the Eiffel Tower twice. Well, of course, it was not a genuine business that he did. He was a con man who was aware of the fact that the tower was not in its best condition after the </span><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">First World War</span></strong><span data-dcnode-id="1230" instrument_node="">.</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">So he forged some documents and called up a secret meeting of the scrap dealers. The first person who fell into his trap was Andre Poisson, who gave bribes and money for the tower with which Victor and his accomplice fled to Vienna.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">The second time he tried to repeat the scam, his target reached the police, although he managed to escape.</span></p><span data-dcnode-id="1222" instrument_node="">
</span><h2 data-dcnode-id="1219"><strong data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Quick Facts about The Eiffel Tower</span></strong></h2><span data-dcnode-id="1218" instrument_node="">
</span><ul data-dcnode-id="1185"><li data-dcnode-id="1214"><strong data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Locally Nicknamed:</span></strong><span data-dcnode-id="1215" instrument_node=""> La dame de fer (The Iron Lady)</span></li><li data-dcnode-id="1210"><strong data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Location:</span></strong><span data-dcnode-id="1211" instrument_node=""> Champ de Mars, 5 Avenue Anatole France, 75007 Paris, France, Europe</span></li><li data-dcnode-id="1206"><strong data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Building Type:</span></strong><span data-dcnode-id="1207" instrument_node=""> Wrought-iron Lattice Tower</span></li><li data-dcnode-id="1202"><strong data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Height:</span></strong><span data-dcnode-id="1203" instrument_node="">&nbsp; 324m (1,063 ft)</span></li><li data-dcnode-id="1198"><strong data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Built:</span></strong><span data-dcnode-id="1199" instrument_node=""> Between January 28th, 1887 and March 15th, 1889</span></li><li data-dcnode-id="1194"><strong data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Annual Visitors:</span></strong><span data-dcnode-id="1195" instrument_node=""> 7 million (estimate)</span></li><li data-dcnode-id="1190"><strong data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Lifts/elevators:</span></strong><span data-dcnode-id="1191" instrument_node=""> 8</span></li><li data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">The tower has three levels for visitors, with restaurants on the first and second levels.</span></li><li data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Tallest man-made structure in the world from 1889 to 1930</span></li></ul><span data-dcnode-id="1184" instrument_node="">
</span><h2 data-dcnode-id="1181"><strong data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Frequently Asked Questions (FAQs)</span></strong></h2><span data-dcnode-id="1180" instrument_node="">
</span><div class="schema-faq wp-block-yoast-faq-block" data-dcnode-id="945"><div class="schema-faq-section" data-dcnode-id="1172" id="faq-question-1630949564655"><strong class="schema-faq-question" data-dcnode-id="1177"><strong data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Where is the Eiffel tower located?</span></strong></strong><span data-dcnode-id="1176" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">The Eiffel Tower stands on the Champs de Mars in Paris, France.</span></p><span data-dcnode-id="1173" instrument_node=""> </span></div><span data-dcnode-id="1171" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1163" id="faq-question-1630949585767"><strong class="schema-faq-question" data-dcnode-id="1168"><strong data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Is the Eiffel tower wonder of the world?</span></strong></strong><span data-dcnode-id="1167" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">It is not a wonder of the world since it is not from the age of classical antiquities.</span></p><span data-dcnode-id="1164" instrument_node=""> </span></div><span data-dcnode-id="1162" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1154" id="faq-question-1630949608271"><strong class="schema-faq-question" data-dcnode-id="1159"><strong data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">When was the Eiffel Tower built?</span></strong></strong><span data-dcnode-id="1158" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">The Eiffel Tower was built in 1889.</span></p><span data-dcnode-id="1155" instrument_node=""> </span></div><span data-dcnode-id="1153" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1145" id="faq-question-1630949625220"><strong class="schema-faq-question" data-dcnode-id="1150"><strong data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Who built the Eiffel tower?</span></strong></strong><span data-dcnode-id="1149" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Gustave Eiffel and his company designed and built the tower.</span></p><span data-dcnode-id="1146" instrument_node=""> </span></div><span data-dcnode-id="1144" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1136" id="faq-question-1630949643271"><strong class="schema-faq-question" data-dcnode-id="1141"><strong data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Who designed the Eiffel tower?</span></strong></strong><span data-dcnode-id="1140" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">The designers of the Eiffel Tower are Maurice Koechlin and Emile Nouguier.</span></p><span data-dcnode-id="1137" instrument_node=""> </span></div><span data-dcnode-id="1135" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1124" id="faq-question-1630949659380"><strong class="schema-faq-question" data-dcnode-id="1132"><strong data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">How did the Eiffel tower get its name?</span></strong></strong><span data-dcnode-id="1131" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1126"><span data-dcnode-id="1130" instrument_node="">Eiffel tower is named after the engineer </span><strong data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Gustave Eiffel </span></strong><span data-dcnode-id="1127" instrument_node="">whose company built it.</span></p><span data-dcnode-id="1125" instrument_node=""> </span></div><span data-dcnode-id="1123" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1115" id="faq-question-1630949681282"><strong class="schema-faq-question" data-dcnode-id="1120"><strong data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">How long did it take Gustave Eiffel to build the Eiffel tower?</span></strong></strong><span data-dcnode-id="1119" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">It took 2 years, 2 months, and 5 days for the entire construction of the Eiffel Tower.</span></p><span data-dcnode-id="1116" instrument_node=""> </span></div><span data-dcnode-id="1114" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1103" id="faq-question-1630949715769"><strong class="schema-faq-question" data-dcnode-id="1111"><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Where was the Eiffel tower originally going to be built?</span></strong></strong><span data-dcnode-id="1110" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1105"><span data-dcnode-id="1109" instrument_node="">Eiffel tower was supposed to be built in </span><strong data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Barcelona</span></strong><span data-dcnode-id="1106" instrument_node=""> but the city rejected the plan and Gustave Eiffel was forced to pitch the project somewhere else.</span></p><span data-dcnode-id="1104" instrument_node=""> </span></div><span data-dcnode-id="1102" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1088" id="faq-question-1630949732669"><strong class="schema-faq-question" data-dcnode-id="1099"><strong data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Why was the Eiffel Tower built?</span></strong></strong><span data-dcnode-id="1098" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1090"><span data-dcnode-id="1097" instrument_node="">The Eiffel Tower was built to mark the </span><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">100th anniversary</span></strong><span data-dcnode-id="1094" instrument_node=""> of the </span><strong data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">French Revolution</span></strong><span data-dcnode-id="1091" instrument_node="">.</span></p><span data-dcnode-id="1089" instrument_node=""> </span></div><span data-dcnode-id="1087" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1076" id="faq-question-1630949802332"><strong class="schema-faq-question" data-dcnode-id="1084"><strong data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">What does the Eiffel tower stand for?</span></strong></strong><span data-dcnode-id="1083" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1078"><span data-dcnode-id="1082" instrument_node="">It stands for the </span><strong data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">industrial advancement</span></strong><span data-dcnode-id="1079" instrument_node=""> and the use and impact of iron and steel in the construction industry.</span></p><span data-dcnode-id="1077" instrument_node=""> </span></div><span data-dcnode-id="1075" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1067" id="faq-question-1630949820406"><strong class="schema-faq-question" data-dcnode-id="1072"><strong data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Why is the Eiffel tower so famous?</span></strong></strong><span data-dcnode-id="1071" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">It is famous because of its modern and artistic design that was uncommon during the time of its construction. You can have a view of about fifty miles of Paris from its top.</span></p><span data-dcnode-id="1068" instrument_node=""> </span></div><span data-dcnode-id="1066" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1058" id="faq-question-1630949836314"><strong class="schema-faq-question" data-dcnode-id="1063"><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">How long did it take to build the Eiffel tower?</span></strong></strong><span data-dcnode-id="1062" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">It began on January 26, 1887, and was completed on March 31, 1889 hence took 2 years, 2 months, and 5 days.</span></p><span data-dcnode-id="1059" instrument_node=""> </span></div><span data-dcnode-id="1057" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1049" id="faq-question-1630949857420"><strong class="schema-faq-question" data-dcnode-id="1054"><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">What is the Eiffel tower made of?</span></strong></strong><span data-dcnode-id="1053" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">The Eiffel Tower is made up of cast iron and steel which were sourced from Romania.</span></p><span data-dcnode-id="1050" instrument_node=""> </span></div><span data-dcnode-id="1048" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1040" id="faq-question-1630949874890"><strong class="schema-faq-question" data-dcnode-id="1045"><strong data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">How much does the Eiffel tower weigh?</span></strong></strong><span data-dcnode-id="1044" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">The total weight of the Eiffel Tower is 10,100 tons.</span></p><span data-dcnode-id="1041" instrument_node=""> </span></div><span data-dcnode-id="1039" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1031" id="faq-question-1630949898249"><strong class="schema-faq-question" data-dcnode-id="1036"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">How tall is the Eiffel tower?</span></strong></strong><span data-dcnode-id="1035" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">The current height of the tower is 1063 feet and the original height without the antennas is 1024 feet.</span></p><span data-dcnode-id="1032" instrument_node=""> </span></div><span data-dcnode-id="1030" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1022" id="faq-question-1630949921765"><strong class="schema-faq-question" data-dcnode-id="1027"><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">How many stories is the Eiffel tower?</span></strong></strong><span data-dcnode-id="1026" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">The Eiffel Tower has three floors of its own and is about 81-stories high.</span></p><span data-dcnode-id="1023" instrument_node=""> </span></div><span data-dcnode-id="1021" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1013" id="faq-question-1630949937028"><strong class="schema-faq-question" data-dcnode-id="1018"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">How much did it cost to build the Eiffel tower?</span></strong></strong><span data-dcnode-id="1017" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">It cost 8.3 million francs which is equal to 41.5 million US dollars in today’s time.</span></p><span data-dcnode-id="1014" instrument_node=""> </span></div><span data-dcnode-id="1012" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="1001" id="faq-question-1630949960183"><strong class="schema-faq-question" data-dcnode-id="1009"><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">How many steps are in the Eiffel tower?</span></strong></strong><span data-dcnode-id="1008" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">There are </span><strong data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">1665 steps</span></strong><span data-dcnode-id="1004" instrument_node=""> in total from the esplanade up to the top but the stairway from the second floor to the top is not open for the public.</span></p><span data-dcnode-id="1002" instrument_node=""> </span></div><span data-dcnode-id="1000" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="992" id="faq-question-1630949976707"><strong class="schema-faq-question" data-dcnode-id="997"><strong data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">How many stairs does the Eiffel tower have?</span></strong></strong><span data-dcnode-id="996" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">You have to climb up 674 stairs to reach the second floor of the tower and from there you need to take the lift to reach the top. There are 991 stairs from the second floor to the top.</span></p><span data-dcnode-id="993" instrument_node=""> </span></div><span data-dcnode-id="991" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="983" id="faq-question-1630949991935"><strong class="schema-faq-question" data-dcnode-id="988"><strong data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">How often does the Eiffel tower get repainted?</span></strong></strong><span data-dcnode-id="987" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">The Eiffel Tower gets a repaint every 7 years.</span></p><span data-dcnode-id="984" instrument_node=""> </span></div><span data-dcnode-id="982" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="974" id="faq-question-1630950013654"><strong class="schema-faq-question" data-dcnode-id="979"><strong data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">How long will the Eiffel Tower last?</span></strong></strong><span data-dcnode-id="978" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">With regular painting as has been done in the last 130 years, the tower can last for thousands of years from now. In the meanwhile, if the components are replaced one by one, it might stand for even longer.</span></p><span data-dcnode-id="975" instrument_node=""> </span></div><span data-dcnode-id="973" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="965" id="faq-question-1630950029148"><strong class="schema-faq-question" data-dcnode-id="970"><strong data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Who gave the Eiffel tower to France?</span></strong></strong><span data-dcnode-id="969" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">It is believed that the Eiffel Tower is a gift from the United States to France but it is not true. The Tower was completely constructed in France itself.</span></p><span data-dcnode-id="966" instrument_node=""> </span></div><span data-dcnode-id="964" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="956" id="faq-question-1630950045054"><strong class="schema-faq-question" data-dcnode-id="961"><strong data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">How many people visit the Eiffel tower each year?</span></strong></strong><span data-dcnode-id="960" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">An average of over 6 million people climbs the Eiffel Tower each year.</span></p><span data-dcnode-id="957" instrument_node=""> </span></div><span data-dcnode-id="955" instrument_node=""> </span><div class="schema-faq-section" data-dcnode-id="947" id="faq-question-1630950060697"><strong class="schema-faq-question" data-dcnode-id="952"><strong data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Who owns the Eiffel tower?</span></strong></strong><span data-dcnode-id="951" instrument_node=""> </span><p class="schema-faq-answer" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">The City of Paris owns the Eiffel Tower and its management is taken over by the development company Society d’Exploitation de la Tour Eiffel (SETE).</span></p><span data-dcnode-id="948" instrument_node=""> </span></div><span data-dcnode-id="946" instrument_node=""> </span></div><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">So these were some interesting Eiffel Tower facts for kids. It is always better to have some insight about the places you are about to visit. We hope the article gave you enough knowledge about this worldwide famous symbol of France.</span></p><span data-dcnode-id="941" instrument_node="">
