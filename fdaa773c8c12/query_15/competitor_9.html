dcnode-id="1262" instrument_node="">But did you know that Bordeaux is also </span><strong data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">famous for its Michelin restaurants</span></strong><span data-dcnode-id="1259" instrument_node="">? Or that the city is </span><strong data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">home to the longest Europe shopping street</span></strong><span data-dcnode-id="1256" instrument_node="">?&nbsp;</span></p><p data-dcnode-id="1250"><span data-dcnode-id="1254" instrument_node="">Let’s discover </span><strong data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">35 interesting facts about Bordeaux</span></strong><span data-dcnode-id="1251" instrument_node=""> to learn more about this city! 🚀</span></p><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">&nbsp;</span></p><div class="no_bullets contracted" data-dcnode-id="1211" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="1240"><span data-dcnode-id="1247" instrument_node="">TABLE OF CONTENTS</span><span data-dcnode-id="1246" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node="">[</span><a data-dcnode-id="1243" href="#"><span data-dcnode-id="1244" instrument_node="">show</span></a><span data-dcnode-id="1242" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="1212" style="display: none;"><li data-dcnode-id="1237"><a data-dcnode-id="1238" href="#facts-on-bordeaux-to-learn-all-about-it"><span data-dcnode-id="1239" instrument_node="">Facts on Bordeaux to Learn All About It</span></a></li><li data-dcnode-id="1234"><a data-dcnode-id="1235" href="#the-best-bordeaux-facts"><span data-dcnode-id="1236" instrument_node="">The Best Bordeaux Facts</span></a></li><li data-dcnode-id="1231"><a data-dcnode-id="1232" href="#bordeaux-fun-facts"><span data-dcnode-id="1233" instrument_node="">Bordeaux Fun Facts</span></a></li><li data-dcnode-id="1228"><a data-dcnode-id="1229" href="#bordeaux-cathedral-facts"><span data-dcnode-id="1230" instrument_node="">Bordeaux Cathedral Facts</span></a></li><li data-dcnode-id="1225"><a data-dcnode-id="1226" href="#bordeaux-facts-for-kids"><span data-dcnode-id="1227" instrument_node="">Bordeaux Facts for Kids</span></a></li><li data-dcnode-id="1222"><a data-dcnode-id="1223" href="#general-facts-of-bordeaux"><span data-dcnode-id="1224" instrument_node="">General Facts of Bordeaux</span></a></li><li data-dcnode-id="1219"><a data-dcnode-id="1220" href="#bordeaux-flag"><span data-dcnode-id="1221" instrument_node="">Bordeaux Flag</span></a></li><li data-dcnode-id="1216"><a data-dcnode-id="1217" href="#more-facts"><span data-dcnode-id="1218" instrument_node="">More Facts!</span></a></li><li data-dcnode-id="1213"><a data-dcnode-id="1214" href="#the-full-list-of-35-bordeaux-facts"><span data-dcnode-id="1215" instrument_node="">The Full List of 35 Bordeaux Facts</span></a></li></ul></div></div><h2 data-dcnode-id="1207"><span data-dcnode-id="1208" id="facts-on-bordeaux-to-learn-all-about-it"><span data-dcnode-id="1209" instrument_node="">Facts on Bordeaux to Learn All About It</span></span></h2><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Ready to learn all about Bordeaux?</span></p><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Facts are one of the best ways to learn more about something, and I personally love to read them! I’ve put together for you quite a bit of facts on Bordeaux; I’ve split them in 5 categories:</span></p><ul data-dcnode-id="1192"><li data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">The best Bordeaux facts</span></li><li data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Bordeaux fun facts</span></li><li data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Bordeaux cathedral facts</span></li><li data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Bordeaux facts for kids</span></li><li data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">General facts of Bordeaux</span></li></ul><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Let’s dive in straight away with our first category! 🔥</span></p><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="1185"><span data-dcnode-id="1186" id="the-best-bordeaux-facts"><span data-dcnode-id="1187" instrument_node="">The Best Bordeaux Facts</span></span></h2><p data-dcnode-id="1180"><span data-dcnode-id="1184" instrument_node="">Bordeaux (unexpectedly pronounced like “Bordo”) is a port city and a </span><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theetlrblog.com/5-luxury-destinations-to-visit-in-france/" rel="noopener" target="_blank"><span data-dcnode-id="1183" instrument_node="">France luxury destination</span></a><span data-dcnode-id="1181" instrument_node=""> located in the southwestern part of the country. This first part is going to be about the best general facts of the city.&nbsp;</span></p><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1175"><strong data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">1. If you have already heard of Bordeaux, that is probably because of its wine</span></strong></p><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Not only is Bordeaux’s wine reputed nationally, it is also one of the best on the planet. Locally, it is obviously a big part of the economy.</span></p><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">In terms of numbers, there are 287,000 acres of vineyards, 10,000 estates producing wines and 960 million bottles of wine every year!</span></p><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1167"><img alt="1 - facts about bordeaux wine" class="aligncenter wp-image-109775" data-dcnode-id="1168" height="563" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/1-facts-about-bordeaux-wine.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/1-facts-about-bordeaux-wine.jpg 800w, https://www.kevmrc.com/wp-content/uploads/2021/10/1-facts-about-bordeaux-wine-768x960.jpg 768w" width="450"></p><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1162"><strong data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">2. The most beautiful sight in Bordeaux is arguably the “Place de la Bourse”</span></strong></p><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">“Place de la Bourse” is an amazing city square in Bordeaux. Not only are the buildings themselves beautiful, but there is also a huge water area that reflects the sky for a harmonious picture.</span></p><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">It took 45 years to be built, from 1730 to 1775. When the main architect died, his son took over and finished the project.</span></p><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1154"><img alt="2 - bordeaux facts about place de la bourse" class="aligncenter size-full wp-image-109776" data-dcnode-id="1155" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/2-bordeaux-facts-about-place-de-la-bourse.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/2-bordeaux-facts-about-place-de-la-bourse.jpg 1200w, https://www.kevmrc.com/wp-content/uploads/2021/10/2-bordeaux-facts-about-place-de-la-bourse-768x512.jpg 768w" width="1200"></p><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1149"><strong data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">3. The French Revolution reached Bordeaux as well</span></strong></p><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Right in the middle of Place de la Bourse, there used to be a statue of Louis XV, but it was torn down during the French Revolution.</span></p><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Bordeaux is not the only city in which that happened: throughout the whole country, at that time, many symbols of the past monarchy were surgically removed.</span></p><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1140"><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">4. An important icon of the city is the fountain of Three Graces</span></strong></p><p data-dcnode-id="1135"><span data-dcnode-id="1139" instrument_node="">Though the statue was torn down, another beautiful peace of art was built in its place: the </span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.33-bordeaux.com/fontaine-3-graces.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1138" instrument_node="">fountain of Three Graces</span></a><span data-dcnode-id="1136" instrument_node="">.</span></p><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">This bronze marvel was added to Place de la Bourse in 1869. It has now become one of the most important symbols of the city.</span></p><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1129"><img alt="4 - bordeaux fun facts about les 3 graces" class="aligncenter size-full wp-image-109777" data-dcnode-id="1130" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/4-bordeaux-fun-facts-about-les-3-graces.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/4-bordeaux-fun-facts-about-les-3-graces.jpg 1200w, https://www.kevmrc.com/wp-content/uploads/2021/10/4-bordeaux-fun-facts-about-les-3-graces-768x512.jpg 768w" width="1200"></p><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1124"><strong data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">5. The first official record of Bordeaux wine-making dates back to the 4th century AD</span></strong></p><p data-dcnode-id="1119"><span data-dcnode-id="1123" instrument_node="">Wine-making is an old tradition in Bordeaux. In fact, it is </span><em data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">very</span></em><span data-dcnode-id="1120" instrument_node=""> old.</span></p><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">In one of his poems, Ausonius mentioned growing vines himself, and also enjoying a bit of the beverage once in a while. In his honor, Château Ausone, one of the finest Saint-Emilion producers, named itself after the poet in 1781.</span></p><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1113"><img alt="5 - facts bordeaux wineries" class="aligncenter wp-image-109778" data-dcnode-id="1114" height="563" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/5-facts-bordeaux-wineries.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/5-facts-bordeaux-wineries.jpg 800w, https://www.kevmrc.com/wp-content/uploads/2021/10/5-facts-bordeaux-wineries-768x960.jpg 768w" width="450"></p><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1108"><strong data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">6. Not only is Bordeaux reputed for its wine, but it is also home to Michelin-starred restaurants</span></strong></p><p data-dcnode-id="1103"><span data-dcnode-id="1107" instrument_node="">This is probably a common feature of most big cities in France. They are all renowned for both their </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/interesting-facts-about-french-food" rel="noopener" target="_blank"><span data-dcnode-id="1106" instrument_node="">food</span></a><span data-dcnode-id="1104" instrument_node=""> and their beverages. In Bordeaux, while wine is everywhere, there are still lots of amazing restaurants.</span></p><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">27 restaurants are starred in Bordeaux, making it a gourmet’s paradise.</span></p><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1096"><strong data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">7. The magnificent châteaux, usually next to the vineyards, are quite recent</span></strong></p><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">While they look very ancient and historical, these fantastic castles date back to the 18th century.</span></p><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">They were an idea from the richer Bordelais, who wanted to add a luxurious dimension to their vineyards, which was at that time a very smart and efficient marketing opportunity.</span></p><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1088"><img alt="7 - vineyard castle facts about bordeaux france" class="aligncenter wp-image-109779" data-dcnode-id="1089" height="563" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/7-vineyard-castle-facts-about-bordeaux-france.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/7-vineyard-castle-facts-about-bordeaux-france.jpg 800w, https://www.kevmrc.com/wp-content/uploads/2021/10/7-vineyard-castle-facts-about-bordeaux-france-768x960.jpg 768w" width="450"></p><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1083"><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">8. Modern wine-making techniques originated from Bordeaux</span></strong></p><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Bordeaux is not only about wealthiness and fancy wines, it is also the place where many of the most used wine-making techniques were created.</span></p><p data-dcnode-id="1077"><a data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589mile_Peynaud" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1080" instrument_node="">Émile Peynaud</span></a><span data-dcnode-id="1078" instrument_node=""> is a famous oenologist who contributed to those techniques a lot, through research.</span></p><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1072"><strong data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">9. There are precise rules to respect if you want to make quality Bordeaux wine</span></strong></p><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">As I have just told you about, wine-making techniques take their roots in Bordeaux.</span></p><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">For instance, red grapes need to be fully ripe when picked up. Tasting skills need to be developed to become a wine professional. Also, the quality starts with the grapes, you will never get a decent wine with poor quality grapes.</span></p><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1064"><img alt="9 - bordeaux france facts about wine" class="aligncenter size-full wp-image-109780" data-dcnode-id="1065" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/9-bordeaux-france-facts-about-wine.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/9-bordeaux-france-facts-about-wine.jpg 1200w, https://www.kevmrc.com/wp-content/uploads/2021/10/9-bordeaux-france-facts-about-wine-768x512.jpg 768w" width="1200"></p><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1059"><strong data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">10. Some English people call Bordeaux wine “Claret”</span></strong></p><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Why is that? This originates from the Middle Ages, when sugar in general was very expensive. People wanted to enjoy a sweet drink, so wine was at that time very pale and sugary.</span></p><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">When it was exported to England, it was called “vinum clarum” or “vin clar”, and “clairet” in French.</span></p><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1050"><strong data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">11. The “Place des Quinconces” is a beautiful and large square in Bordeaux</span></strong></p><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">This square is in fact one of the largest city squares in all of Europe! It is around 63 acres total.</span></p><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Its origins are quite peculiar: in 1820, to prevent a rebellion against the rest of the city, this square was laid out. Today, it regularly hosts fairgrounds.</span></p><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1042"><img alt="11 - place des quinconces" class="aligncenter size-full wp-image-109781" data-dcnode-id="1043" height="858" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/11-place-des-quinconces.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/11-place-des-quinconces.jpg 1200w, https://www.kevmrc.com/wp-content/uploads/2021/10/11-place-des-quinconces-768x549.jpg 768w" width="1200"></p><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1037"><strong data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">12. “Ugugu” is a battle cry and is written under each main statue in the Place des Quinconces</span></strong></p><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">If you look closely under the statues in the Place des Quinconces, you will see the word “Ugugu”. This is a Cambodian battle cry, in honor of the Khmer who brought wine varietals to the city.</span></p><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">The sculptures were built from 1894 to 1902.</span></p><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1028"><strong data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">13. The Grand Theatre of Bordeaux was built in honor of arts and light</span></strong></p><p data-dcnode-id="1023"><span data-dcnode-id="1027" instrument_node="">The </span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bordeaux-tourism.co.uk/sites-monuments/opera-house%3F_wrapper_format%3Dhtml" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1026" instrument_node="">Grand Theatre of Bordeaux</span></a><span data-dcnode-id="1024" instrument_node=""> is truly grand. It was inaugurated in 1780 and designed by Victor Louis. The idea behind it was to represent light and arts in general.</span></p><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">It looks like an old Roman or Greek building, with characteristic white pillars.</span></p><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1016"><strong data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">14. There are still lots of artists working in the Grand Theatre of Bordeaux </span></strong></p><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Today, you can also see the Bordeaux National Opera in the Grand Theatre.</span></p><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Permanent artists still work there, with around 110 musicians from the National Orchestra, 38 dancers from the National Ballet and 37 singers from the National Opera Choir.</span></p><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1008"><img alt="13 - bordeaux grand theatre" class="aligncenter size-full wp-image-109782" data-dcnode-id="1009" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/13-bordeaux-grand-theatre.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/13-bordeaux-grand-theatre.jpg 1200w, https://www.kevmrc.com/wp-content/uploads/2021/10/13-bordeaux-grand-theatre-768x512.jpg 768w" width="1200"></p><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">We are done with the best facts about Bordeaux France, but now let’s go onto the fun side of the city. 👇</span></p><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="999"><span data-dcnode-id="1000" id="bordeaux-fun-facts"><span data-dcnode-id="1001" instrument_node="">Bordeaux Fun Facts</span></span></h2><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">The city of Bordeaux has some very unexpected and funny things that you probably have never heard of, and I have gathered 7 fun facts about Bordeaux France right below.&nbsp;</span></p><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">&nbsp;</span></p><p data-dcnode-id="992"><strong data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">15. Bordeaux was the place where French officials would head to during war times</span></strong></p><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">While French armies are jokingly renowned as always surrendering, it is true that their officials tend to stay as far from the fights as possible.</span></p><p data-dcnode-id="985"><span data-dcnode-id="989" instrument_node="">During the Franco-Prussian War, they left for Bordeaux, and during World War II, to London, from where “Général De Gaulle” made his famous </span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unesco.org/new/fileadmin/MULTIMEDIA/HQ/CI/CI/pdf/mow/nomination_forms/france_and_uk_appeal_18_june_1940.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="988" instrument_node="">Appeal of 18 June</span></a><span data-dcnode-id="986" instrument_node=""> speech.</span></p><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">&nbsp;</span></p><p data-dcnode-id="980"><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">16. We have to thank the Romans for the Bordeaux wine</span></strong></p><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Nowadays, Bordeaux and its area are renowned to be one of the best places in the world for red wine. Wine lovers from all around the globe dream of going there someday for some exquisite tasting.</span></p><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Well, before France they have to thank… Rome! Romans introduced wine to the region in the middle of the first century.</span></p><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">&nbsp;</span></p><p data-dcnode-id="971"><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">17. The University of Bordeaux was founded by the Pope and the Archbishop</span></strong></p><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">It is pretty rare that the Church is the one founding universities, but the one in Bordeaux was established by Pope Eugene IV in 1441.</span></p><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">It is also said that the idea to create a university in Bordeaux has to be credited to the Archbishop, but anyway the Church sure had to do something with it.</span></p><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">&nbsp;</span></p><p data-dcnode-id="962"><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">18. The longest shopping street in Europe is in Bordeaux</span></strong></p><p data-dcnode-id="957"><span data-dcnode-id="961" instrument_node="">If you like going on shopping sprees, then Bordeaux is the place for you (other than </span><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/interesting-facts-about-paris-france" rel="noopener" target="_blank"><span data-dcnode-id="960" instrument_node="">Paris</span></a><span data-dcnode-id="958" instrument_node="">, of course).</span></p><p data-dcnode-id="952"><span data-dcnode-id="956" instrument_node="">In </span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bordeaux-tourism.co.uk/cultural-heritage/rue-sainte-catherine.html%3F_wrapper_format%3Dhtml" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="955" instrument_node="">Rue Sainte-Catherine</span></a><span data-dcnode-id="953" instrument_node="">, which is 1.2 km / 0.6 miles long, you will be pleased with all the reputed shops, shopping centres and other cafés.</span></p><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">&nbsp;</span></p><p data-dcnode-id="948"><img alt="18 - rue sainte catherine" class="aligncenter wp-image-109783" data-dcnode-id="949" height="563" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/18-rue-sainte-catherine.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/18-rue-sainte-catherine.jpg 800w, https://www.kevmrc.com/wp-content/uploads/2021/10/18-rue-sainte-catherine-768x960.jpg 768w" width="450"></p><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">&nbsp;</span></p><p data-dcnode-id="943"><strong data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">19. One of the most powerful lasers in the world is in Bordeaux</span></strong></p><p data-dcnode-id="938"><span data-dcnode-id="942" instrument_node="">The </span><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www-lmj.cea.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="941" instrument_node="">Laser Mégajoule</span></a><span data-dcnode-id="939" instrument_node=""> is truly an optic wonder. It is among the most powerful ones on the planet and helps scientists lead fundamental research, as well as developing plasma and laser technologies.</span></p><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Its original cost was around 2 billion euros, which were paid by the French Ministry of Defence.</span></p><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">&nbsp;</span></p><p data-dcnode-id="931"><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">20. Some of the most famous aircrafts are built in Bordeaux</span></strong></p><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">This is less known than it should be, according to me, but Bordeaux hosts around 20,000 people that work in the aeronautic industries.</span></p><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">In fact, lots of famous aircrafts are built there, like the Dassault Falcon private jets, the military Rafale, the Airbus A380 cockpit and the boosters of Ariane 5.</span></p><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">&nbsp;</span></p><p data-dcnode-id="923"><img alt="20 - airbus" class="aligncenter size-full wp-image-109784" data-dcnode-id="924" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/20-airbus.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/20-airbus.jpg 1200w, https://www.kevmrc.com/wp-content/uploads/2021/10/20-airbus-768x512.jpg 768w" width="1200"></p><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">&nbsp;</span></p><p data-dcnode-id="918"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">21. Bordeaux is home to one of the world’s main wine festivals</span></strong></p><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Vinexpo is one of the biggest international wine fairs. It is dedicated to wine and is located in Bordeaux, one of the most important wine cities on the planet.</span></p><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">It was created in 1981, and features conferences, tastings and winegrowing. There are around 2,400 winegrowers for almost 50,000 visitors every year.</span></p><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">&nbsp;</span></p><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">And that’s it for the fun facts about Bordeaux! The next part will be about a very specific monument, the St. Andrew Cathedral. 👇</span></p><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="905"><span data-dcnode-id="906" id="bordeaux-cathedral-facts"><span data-dcnode-id="907" instrument_node="">Bordeaux Cathedral Facts</span></span></h2><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Cathedrals are always important in terms of historical and architectural feats of strength, especially in a Western country like France. For the Bordeaux Cathedral, I have 7 facts to tell you about:</span></p><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">&nbsp;</span></p><p data-dcnode-id="898"><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">22. We still do not know exactly how old the Bordeaux Cathedral is</span></strong></p><p data-dcnode-id="893"><span data-dcnode-id="897" instrument_node="">The </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cathedrale-bordeaux.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="896" instrument_node="">Bordeaux Cathedral</span></a><span data-dcnode-id="894" instrument_node=""> is a wonderful example of what a Roman Catholic Church ideally looks like. It is dedicated to Saint Andrew and is also the seat of the Archbishop of Bordeaux.</span></p><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">It was consecrated in 1096, but its first mention was in 814… so when was it actually built?</span></p><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">&nbsp;</span></p><p data-dcnode-id="887"><img alt="22 - bordeaux cathedral facts" class="aligncenter size-full wp-image-109785" data-dcnode-id="888" height="790" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/22-bordeaux-cathedral-facts.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/22-bordeaux-cathedral-facts.jpg 1200w, https://www.kevmrc.com/wp-content/uploads/2021/10/22-bordeaux-cathedral-facts-768x506.jpg 768w" width="1200"></p><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">&nbsp;</span></p><p data-dcnode-id="882"><strong data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">23. The Bordeaux Cathedral is a mix of style</span></strong></p><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Nowadays, if you look at the Cathedral as it is, you will immediately think of a Gothic style.</span></p><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">However, it used to be Romanesque, but lots of the Cathedral (apart from the inside walls) were rebuilt in the Gothic style, from the 12th to the 16th centuries.</span></p><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">&nbsp;</span></p><p data-dcnode-id="873"><strong data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">24. How huge is the Bordeaux Cathedral? Very.</span></strong></p><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Because it is seated in such a widely open area, you can easily realize how big the Bordeaux Cathedral is.</span></p><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">If you want more numbers, well it is 127 meters / 417 feet long, 27 meters / 89 feet high and 18 meters / 59 feet large.</span></p><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">&nbsp;</span></p><p data-dcnode-id="865"><img alt="24 - fun facts about bordeaux" class="aligncenter size-full wp-image-109786" data-dcnode-id="866" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/24-fun-facts-about-bordeaux.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/24-fun-facts-about-bordeaux.jpg 1200w, https://www.kevmrc.com/wp-content/uploads/2021/10/24-fun-facts-about-bordeaux-768x512.jpg 768w" width="1200"></p><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">&nbsp;</span></p><p data-dcnode-id="860"><strong data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">25. There were supposed to be four bell-towers in the Bordeaux Cathedral</span></strong></p><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">When the Cathedral was first planned, there were supposed to be four bell-towers. At the moment, you can only see two spires on the side of “Rue Vital-Carles”.</span></p><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">That is because half of them were abandoned due to how heavy the structure would have been… so heavy that it would have sunk into the swampland.</span></p><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">&nbsp;</span></p><p data-dcnode-id="851"><strong data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">26. The most notable event that took place in the Bordeaux Cathedral is a royal marriage</span></strong></p><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Strategic royal marriages were present in every European country in the Middle Ages, as it is one of the best ways to solidify a relationship between countries, sometimes rivals.</span></p><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">In 1137, Eleanor of Aquitaine married Louis VII, later to become King of France, in the Bordeaux Cathedral.</span></p><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">&nbsp;</span></p><p data-dcnode-id="843"><img alt="26 - bordeaux history facts about cathedral" class="aligncenter wp-image-109787" data-dcnode-id="844" height="563" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/26-bordeaux-history-facts-about-cathedral.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/26-bordeaux-history-facts-about-cathedral.jpg 800w, https://www.kevmrc.com/wp-content/uploads/2021/10/26-bordeaux-history-facts-about-cathedral-768x960.jpg 768w" width="450"></p><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">&nbsp;</span></p><p data-dcnode-id="838"><strong data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">27. The biggest bell-tower of the Cathedral is isolated from the building</span></strong></p><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">The bell-tower Pey-Berland was named after the most famous Archbishop of Bordeaux (who founded the university), and was built between 1440 and 1450. The Archbishop is buried behind the altar of the Cathedral.</span></p><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">While it used to be linked to the Cathedral, the bell-tower is now by itself, on the side.</span></p><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">&nbsp;</span></p><p data-dcnode-id="829"><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">28. If you are brave enough, you can see the whole city from the Pey-Berland tower</span></strong></p><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Not only is the Pey-Berland bell-tower very high, but it also bears large bells. It was listed as a historic monument by the French government in 1862.</span></p><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">If you want, you can reach the terrace at the top of the tower, after climbing 231 steps in a spiral. Though it is exhausting, the view is simply stunning.</span></p><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">&nbsp;</span></p><p data-dcnode-id="821"><img alt="28 - bordeaux facts for kids about the cathedral" class="aligncenter size-full wp-image-109788" data-dcnode-id="822" height="801" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/28-bordeaux-facts-for-kids-about-the-cathedral.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/28-bordeaux-facts-for-kids-about-the-cathedral.jpg 1200w, https://www.kevmrc.com/wp-content/uploads/2021/10/28-bordeaux-facts-for-kids-about-the-cathedral-768x513.jpg 768w" width="1200"></p><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">&nbsp;</span></p><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">There you go, you now know everything about the Bordeaux Cathedral. Onto the last part. 👇</span></p><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="812"><span data-dcnode-id="813" id="bordeaux-facts-for-kids"><span data-dcnode-id="814" instrument_node="">Bordeaux Facts for Kids</span></span></h2><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">The last part of this list of facts is dedicated to kids. While every fact is suited for everyone, I insist on having a special part for the younger ones and their special curiosity.&nbsp;</span></p><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">&nbsp;</span></p><p data-dcnode-id="805"><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">29. Bordeaux’s region was first named Burdigalia</span></strong></p><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Unlike several big cities in Western Europe, Bordeaux was not first occupied by the Romans. The area was inhabited in around 567 BC by a Celtic tribe, who named it Burdigalia.</span></p><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">It was still conquered by the Romans later, in 60 BC, and Bordeaux started to be a commercial center after that.</span></p><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">&nbsp;</span></p><p data-dcnode-id="796"><strong data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">30. Historically, there were lots of raids in Bordeaux</span></strong></p><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">The city of Bordeaux has been relatively unlucky throughout the centuries, as it was attacked several times by different people and tribes.</span></p><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">First, in both 276 and 409, the Vandals sacked the city. Then, only 5 years later, there was a Visigoth raid. Finally, it was time for the Franks to attack in 498.</span></p><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">&nbsp;</span></p><p data-dcnode-id="787"><strong data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">31. Bordeaux is the sixth-largest city in France</span></strong></p><p data-dcnode-id="773"><span data-dcnode-id="786" instrument_node="">Paris, </span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/interesting-facts-about-marseille-france" rel="noopener" target="_blank"><span data-dcnode-id="785" instrument_node="">Marseille</span></a><span data-dcnode-id="783" instrument_node="">, </span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/interesting-facts-about-lyon-france" rel="noopener" target="_blank"><span data-dcnode-id="782" instrument_node="">Lyon</span></a><span data-dcnode-id="780" instrument_node="">, </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/interesting-facts-about-toulouse-france" rel="noopener" target="_blank"><span data-dcnode-id="779" instrument_node="">Toulouse</span></a><span data-dcnode-id="777" instrument_node=""> and </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/interesting-facts-about-nice-france" rel="noopener" target="_blank"><span data-dcnode-id="776" instrument_node="">Nice</span></a><span data-dcnode-id="774" instrument_node=""> are the biggest cities in the country, and Bordeaux comes after them.</span></p><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">There are around 260,000 inhabitants in the city itself, but if you include the metropolitan area, that number reaches more than a million people.</span></p><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">&nbsp;</span></p><p data-dcnode-id="767"><img alt="31 - facts on bordeaux city" class="aligncenter size-full wp-image-109789" data-dcnode-id="768" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/31-facts-on-bordeaux-city.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/31-facts-on-bordeaux-city.jpg 1200w, https://www.kevmrc.com/wp-content/uploads/2021/10/31-facts-on-bordeaux-city-768x512.jpg 768w" width="1200"></p><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">&nbsp;</span></p><p data-dcnode-id="762"><strong data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">32. Bordeaux is right next to the Atlantic Ocean</span></strong></p><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Around 500 kilometers / 310 miles southwest of Paris lies Bordeaux. Just like the French capital, Bordeaux is built around a river, the Garonne.</span></p><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">The river divides the city into two parts and ends its course into the Atlantic ocean, around an hour away from the urban area.</span></p><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">&nbsp;</span></p><div class="wp-caption aligncenter" data-dcnode-id="752" id="attachment_109790" style="width: 1210px"><img alt="32 - bordeaux interesting facts" aria-describedby="caption-attachment-109790" class="wp-image-109790 size-full" data-dcnode-id="755" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/32-bordeaux-interesting-facts.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/32-bordeaux-interesting-facts.jpg 1200w, https://www.kevmrc.com/wp-content/uploads/2021/10/32-bordeaux-interesting-facts-768x512.jpg 768w" width="1200"><p class="wp-caption-text" data-dcnode-id="753" id="caption-attachment-109790"><span data-dcnode-id="754" instrument_node="">Arcachon Bay about 1 hour drive from Bordeaux</span></p></div><p data-dcnode-id="749"><strong data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">33. Bordeaux is classified “City of Art and History”</span></strong></p><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">If you have ever been to Bordeaux, you can immediately see how important the historical and architectural heritage is to the city as a whole.</span></p><p data-dcnode-id="742"><span data-dcnode-id="746" instrument_node="">There are 362 historical monuments, which is only bested by Paris in France. Some of these </span><a data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/famous-landmarks-in-france" rel="noopener" target="_blank"><span data-dcnode-id="745" instrument_node="">landmarks</span></a><span data-dcnode-id="743" instrument_node=""> even date back to Roman times!</span></p><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">&nbsp;</span></p><p data-dcnode-id="738"><img alt="33 - city of art and history" class="aligncenter size-full wp-image-109791" data-dcnode-id="739" height="1080" loading="lazy" sizes="(max-width: 1620px) 100vw, 1620px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/33-city-of-art-and-history.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/33-city-of-art-and-history.jpg 1620w, https://www.kevmrc.com/wp-content/uploads/2021/10/33-city-of-art-and-history-768x512.jpg 768w, https://www.kevmrc.com/wp-content/uploads/2021/10/33-city-of-art-and-history-1536x1024.jpg 1536w" width="1620"></p><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">&nbsp;</span></p><p data-dcnode-id="733"><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">34. Both tourists and cinema production teams regularly go to Bordeaux</span></strong></p><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">In Bordeaux, there is one of the biggest 18th-century architectural urban areas. Every gate, street and building has a unique and majestic feeling.</span></p><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">It is even one of the French cities alongside Nancy to have seen lots of big scale projects for its urban area.</span></p><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">&nbsp;</span></p><p data-dcnode-id="724"><strong data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">35. The climate in Bordeaux is oceanic</span></strong></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">The climate in Bordeaux is a bit unique. It is not quite Mediterranean because of how often it rains during summer, but summers are hotter and its winters are milder than most other oceanic climate cities.</span></p><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Because of the westerly Atlantic winds, winters are cool, and because of the Bay of Biscay, the summers are both warm and long.</span></p><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">&nbsp;</span></p><p data-dcnode-id="716"><img alt="35 - bordeaux climate" class="aligncenter wp-image-109792" data-dcnode-id="717" height="675" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kevmrc.com/wp-content/uploads/2021/10/35-bordeaux-climate.jpg&amp;raw" srcset="https://www.kevmrc.com/wp-content/uploads/2021/10/35-bordeaux-climate.jpg 800w, https://www.kevmrc.com/wp-content/uploads/2021/10/35-bordeaux-climate-768x1152.jpg 768w" width="450"></p><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">&nbsp;</span></p><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">So there you have them, these were the whole 35 Bordeaux France facts. I hope you enjoyed them and you learned something new today.</span></p><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">In case you want to learn more about the city or the country as a whole, feel free to keep reading, as I still have lots of facts to tell you about.&nbsp;</span></p><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="705"><span data-dcnode-id="706" id="general-facts-of-bordeaux"><span data-dcnode-id="707" instrument_node="">General Facts of Bordeaux</span></span></h2><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">You’ll find below a few general facts of Bordeaux, to learn more about this French city:</span></p><ul data-dcnode-id="672"><li data-dcnode-id="699"><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Name</span></strong><span data-dcnode-id="700" instrument_node="">: Bordeaux</span></li><li data-dcnode-id="695"><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Province</span></strong><span data-dcnode-id="696" instrument_node="">: Bordeaux</span></li><li data-dcnode-id="691"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Region</span></strong><span data-dcnode-id="692" instrument_node="">: Nouvelle-Aquitaine</span></li><li data-dcnode-id="687"><strong data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Land area</span></strong><span data-dcnode-id="688" instrument_node="">: 49.36 km² / 19.06 sq mi</span></li><li data-dcnode-id="683"><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Population</span></strong><span data-dcnode-id="684" instrument_node="">: 260,000</span></li><li data-dcnode-id="679"><strong data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Name of inhabitants</span></strong><span data-dcnode-id="680" instrument_node="">: Bordelais, Bordelaise (French)</span></li><li data-dcnode-id="673"><strong data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Website</span></strong><span data-dcnode-id="676" instrument_node="">: </span><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bordeaux.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="675" instrument_node="">Bordeaux</span></a></li></ul><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="667"><s ode-id="551" id="the-full-list-of-35-bordeaux-facts"><span data-dcnode-id="552" instrument_node="">The Full List of 35 Bordeaux Facts</span></span></h2><ol data-dcnode-id="479"><li data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">If you have already heard of Bordeaux, that is probably because of its wine</span></li><li data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">The most beautiful sight in Bordeaux is arguably the “Place de la Bourse”</span></li><li data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">The French Revolution reached Bordeaux as well</span></li><li data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">An important icon of the city is the fountain of Three Graces</span></li><li data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">The first official record of Bordeaux wine-making dates back to the 4th century AD</span></li><li data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Not only is Bordeaux reputed for its wine, but it is also home to Michelin-starred restaurants</span></li><li data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">The magnificent châteaux, usually next to the vineyards, are quite recent</span></li><li data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Modern wine-making techniques originated from Bordeaux</span></li><li data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">There are precise rules to respect if you want to make quality Bordeaux wine</span></li><li data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Some English people call Bordeaux wine “Claret”</span></li><li data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">The “Place des Quinconces” is a beautiful and large square in Bordeaux</span></li><li data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">“Ugugu” is a battle cry and is written under each main statue in the Place des Quinconces</span></li><li data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">The Grand Theatre of Bordeaux was built in honor of arts and light</span></li><li data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">There are still lots of artists working in the Grand Theatre of Bordeaux</span></li><li data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Bordeaux was the place where French officials would head to during war times</span></li><li data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">We have to thank the Romans for the Bordeaux wine</span></li><li data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">The University of Bordeaux was founded by the Pope and the Archbishop</span></li><li data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">The longest shopping street in Europe is in Bordeaux</span></li><li data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">One of the most powerful lasers in the world is in Bordeaux</span></li><li data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Some of the most famous aircrafts are built in Bordeaux</span></li><li data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Bordeaux is home to one of the world’s main wine festivals</span></li><li data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">We still do not know exactly how old the Bordeaux Cathedral is</span></li><li data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">The Bordeaux Cathedral is a mix of style</span></li><li data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">How huge is the Bordeaux Cathedral? Very.</span></li><li data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">There were supposed to be four bell-towers in the Bordeaux Cathedral</span></li><li data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">The most notable event that took place in the Bordeaux Cathedral is a royal marriage</span></li><li data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">The biggest bell-tower of the Cathedral is isolated from the building</span></li><li data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">If you are brave enough, you can see the whole city from the Pey-Berland tower</span></li><li data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Bordeaux’s region was first named Burdigalia</span></li><li data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Historically, there were lots of raids in Bordeaux</span></li><li data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Bordeaux is the sixth-largest city in France</span></li><li data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Bordeaux is right next to the Atlantic Ocean</span></li><li data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Bordeaux is classified “City of Art and History”</span></li><li data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Both tourists and cinema production teams regularly go to Bordeaux</span></li><li data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">The climate in Bordeaux is oceanic</span></li></ol><p data-dcnode-id="472"><span data-dcnode-id="478" instrument_node="">&nbsp;</span><br data-dcnode-id="477"><span data-dcnode-id="476" instrument_node=""> Share the knowledge! </span><strong data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Click on the buttons below</span></strong><span data-dcnode-id="473" instrument_node=""> to share these facts with your friends, and help them learn more about the world 🙂</span></p></div><div class="pin-it-section row" data-dcnode-id="452"><div class="col-sm-4" data-dcnode-id="465"><span data-dcnode-id="470" instrument_node=""> </span><a aria-label="Share this article on Pinterest with a Vertical Pin" data-dcnode-id="466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&am
