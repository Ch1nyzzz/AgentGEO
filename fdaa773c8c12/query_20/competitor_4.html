</span><h1 class="entry-title" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Eiffel Tower Information and Facts</span></h1><span data-dcnode-id="1171" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1158"><span data-dcnode-id="1170" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1165"><span data-dcnode-id="1169" instrument_node="">Updated on </span><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetowerinfo.com/eiffel-tower-information-facts/" rel="bookmark"><time class="updated" data-dcnode-id="1167" datetime="2020-01-17T14:29:26+08:00"><span data-dcnode-id="1168" instrument_node="">01/17/2020</span></time></a></span><span class="byline" data-dcnode-id="1160"><span data-dcnode-id="1164" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1161"><a class="url fn n" data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetowerinfo.com/author/philip-chou/"><span data-dcnode-id="1163" instrument_node="">Philjake</span></a></span></span><span data-dcnode-id="1159" instrument_node=""> </span></div><span data-dcnode-id="1156" instrument_node="">

</span><div class="entry-content" data-dcnode-id="756"><span data-dcnode-id="1152" instrument_node="">
</span><div class="panel-layout" data-dcnode-id="833" id="pl-4562"><div class="panel-grid panel-no-style" data-dcnode-id="834" id="pg-4562-0"><div class="panel-grid-cell" data-dcnode-id="835" id="pgc-4562-0-0"><div class="so-panel widget widget_sow-editor panel-first-child" data-dcnode-id="1120" data-index="0" id="panel-4562-0-0-0"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1121"><span data-dcnode-id="1151" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1123"><span data-dcnode-id="1150" instrument_node="">
</span><figure aria-labelledby="figcaption_attachment_4566" class="wp-caption aligncenter" data-dcnode-id="1146" id="attachment_4566" style="width: 695px"><img alt="Eiffel Tower" class="wp-image-4566 size-full" data-attachment-id="4566" data-comments-opened="0" data-dcnode-id="1149" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="eiffel-tower-paris" data-large-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-paris.jpg?fit=695%2C675&amp;ssl=1" data-medium-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-paris.jpg?fit=300%2C291&amp;ssl=1" data-orig-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-paris.jpg?fit=695%2C675&amp;ssl=1" data-orig-size="695,675" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/eiffel-tower-paris/" height="675" sizes="(max-width: 695px) 100vw, 695px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-paris.jpg%3Fresize%3D695%252C675%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-paris.jpg?w=695&amp;ssl=1 695w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-paris.jpg?resize=300%2C291&amp;ssl=1 300w" width="695"><figcaption class="wp-caption-text" data-dcnode-id="1147" id="figcaption_attachment_4566"><span data-dcnode-id="1148" instrument_node="">Eiffel Tower</span></figcaption></figure><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1144" instrument_node="">The Eiffel Tower in Paris is one of the most well known structures in the world, the iron lattice tower is an icon of France and has been one of the most visited tourist attractions in the country and the world. (Details: </span><a data-dcnode-id="1142" href="#tourism"><span data-dcnode-id="1143" instrument_node="">Tourist information of the Eiffel Tower</span></a><span data-dcnode-id="1141" instrument_node="">.)</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1138" instrument_node="">Eiffel Tower is named after Gustave Eiffel, who was a local engineer in Paris, it was his company designed and built the tower, and the tower is Gustave Eiffel's most notable work, one of other notable works designed by him is the interior framework of </span><a data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetowerinfo.com/statue-of-liberty-information-facts/"><span data-dcnode-id="1137" instrument_node="">the Statue of Liberty</span></a><span data-dcnode-id="1135" instrument_node="">.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Eiffel Tower was built as the centerpiece of and the entrance to the 1889 Exposition of Paris, a World's Fair to celebrate the centennial of the French Revolution.</span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">The tower is located on the Champ de Mars in Paris, France.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1125"><img alt="" class="size-full wp-image-4577 aligncenter" data-attachment-id="4577" data-comments-opened="0" data-dcnode-id="1126" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;10&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;Canon EOS DIGITAL REBEL&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1152425311&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;85&quot;,&quot;iso&quot;:&quot;100&quot;,&quot;shutter_speed&quot;:&quot;0.004&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="paris-eiffel-tower-skyline" data-large-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-skyline.jpg?fit=1024%2C683&amp;ssl=1" data-medium-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-skyline.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-skyline.jpg?fit=1024%2C683&amp;ssl=1" data-orig-size="1024,683" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/paris-eiffel-tower-skyline/" height="464" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-skyline.jpg%3Fresize%3D1024%252C683%26ssl%3D1&amp;raw" srcset="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-skyline.jpg?w=1024&amp;ssl=1 1024w, https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-skyline.jpg?resize=300%2C200&amp;ssl=1 300w, https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-skyline.jpg?resize=768%2C512&amp;ssl=1 768w, https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-skyline.jpg?resize=272%2C182&amp;ssl=1 272w" width="695"></p><span data-dcnode-id="1124" instrument_node="">
</span></div><span data-dcnode-id="1122" instrument_node="">
</span></div></div><div class="widget_text so-panel widget widget_custom_html" data-dcnode-id="1110" data-index="1" id="panel-4562-0-0-1"><div class="textwidget custom-html-widget" data-dcnode-id="1111"><span data-dcnode-id="1118" instrument_node="">
</span><span data-dcnode-id="1116" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1114726545140483" data-ad-format="auto" data-ad-slot="1798459857" data-dcnode-id="1115" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1114" instrument_node="">
</span></div></div><div class="so-panel widget widget_sow-editor" data-dcnode-id="1069" data-index="2" id="panel-4562-0-0-2"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1070"><span data-dcnode-id="1109" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1072"><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1104"><strong data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Eiffel Tower stands 324 meters (1063 feet) tall</span></strong><span data-dcnode-id="1105" instrument_node="">, about the same height as an 80-story office building, or an 100-story residential building, it is the tallest structure in Paris.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><figure aria-labelledby="figcaption_attachment_4570" class="wp-caption aligncenter" data-dcnode-id="1099" id="attachment_4570" style="width: 800px"><img alt="Aerial view of Eiffel Tower" class="wp-image-4570 size-full" data-attachment-id="4570" data-comments-opened="0" data-dcnode-id="1102" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="eiffel-tower-aerial-view" data-large-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-aerial-view.jpg?fit=800%2C677&amp;ssl=1" data-medium-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-aerial-view.jpg?fit=300%2C254&amp;ssl=1" data-orig-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-aerial-view.jpg?fit=800%2C677&amp;ssl=1" data-orig-size="800,677" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/eiffel-tower-aerial-view/" height="588" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-aerial-view.jpg%3Fresize%3D800%252C677%26ssl%3D1&amp;raw" srcset="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-aerial-view.jpg?w=800&amp;ssl=1 800w, https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-aerial-view.jpg?resize=300%2C254&amp;ssl=1 300w, https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-aerial-view.jpg?resize=768%2C650&amp;ssl=1 768w" width="695"><figcaption class="wp-caption-text" data-dcnode-id="1100" id="figcaption_attachment_4570"><span data-dcnode-id="1101" instrument_node="">Aerial view of Eiffel Tower</span></figcaption></figure><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1097" instrument_node="">The tower was initially built to be 300 meters tall(984 feet), that height gave it the title of world's tallest man-made structure upon its completion, surpassing the 169 m(555 ft)-tall Washington Monument in America, and the tower kept holding that title for 41 years, until being replaced by the 319 m-tall </span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetowerinfo.com/buildings-list/chrysler-building/"><span data-dcnode-id="1096" instrument_node="">Chrysler Building</span></a><span data-dcnode-id="1094" instrument_node=""> in New York City in 1930, now the Chrysler Building is shorter than the Eiffel Tower since a 24-m long antenna was added to the top of the Eiffel Tower, increasing its height to the current height of 324 meters.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090"><img alt="" class="size-full wp-image-4578 aligncenter" data-attachment-id="4578" data-comments-opened="0" data-dcnode-id="1091" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="paris-eiffel-tower-aerial" data-large-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-aerial.jpg?fit=960%2C540&amp;ssl=1" data-medium-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-aerial.jpg?fit=300%2C169&amp;ssl=1" data-orig-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-aerial.jpg?fit=960%2C540&amp;ssl=1" data-orig-size="960,540" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/paris-eiffel-tower-aerial/" height="391" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-aerial.jpg%3Fresize%3D960%252C540%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-aerial.jpg?w=960&amp;ssl=1 960w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-aerial.jpg?resize=300%2C169&amp;ssl=1 300w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/paris-eiffel-tower-aerial.jpg?resize=768%2C432&amp;ssl=1 768w" width="695"></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1088" instrument_node="">Eiffel claimed the idea of building a tower as the centerpiece of the world's fair was inspired by the Latting Observatory built in New York in 1853.</span><br data-dcnode-id="1087"><span data-dcnode-id="1086" instrument_node="">
The shape of the tower and its structural details was designed by Maurice Koechlin in joint with Émile Nouguier, both of whom were working in Gustave Eiffel's engineering company as senior engineers, they came out the idea of the basic shape of the tower in 1884, five years before its completion, the idea is a great pylon that consists of four lattice girders, which stand apart at the base and come together at the top, joined together by metal trusses at regular intervals.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><img alt="" class="size-full wp-image-4587 aligncenter" data-attachment-id="4587" data-comments-opened="0" data-dcnode-id="1083" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="pylon-eiffel-tower" data-large-file="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/pylon-eiffel-tower.jpg?fit=550%2C664&amp;ssl=1" data-medium-file="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/pylon-eiffel-tower.jpg?fit=248%2C300&amp;ssl=1" data-orig-file="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/pylon-eiffel-tower.jpg?fit=550%2C664&amp;ssl=1" data-orig-size="550,664" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/pylon-eiffel-tower/" height="664" sizes="(max-width: 550px) 100vw, 550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/pylon-eiffel-tower.jpg%3Fresize%3D550%252C664%26ssl%3D1&amp;raw" srcset="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/pylon-eiffel-tower.jpg?w=550&amp;ssl=1 550w, https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/pylon-eiffel-tower.jpg?resize=248%2C300&amp;ssl=1 248w" width="550"></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Then the two engineers asked the head of company's architectural department, Stephen Sauvestre, to contribute to the design. Sauvestre added decorative arches to the base of the tower, a glass pavilion to the first level, and other embellishments, these few elements are the only non-structural elements on the tower, the four decorative arches added by Sauvestre serves to make the tower look more substantial and attractive.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><figure aria-labelledby="figcaption_attachment_4567" class="wp-caption aligncenter" data-dcnode-id="1074" id="attachment_4567" style="width: 940px"><img alt="The decorative arches at base of the tower" class="wp-image-4567 size-full" data-attachment-id="4567" data-comments-opened="0" data-dcnode-id="1077" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="eiffel-tower-arches" data-large-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-arches.jpg?fit=940%2C670&amp;ssl=1" data-medium-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-arches.jpg?fit=300%2C214&amp;ssl=1" data-orig-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-arches.jpg?fit=940%2C670&amp;ssl=1" data-orig-size="940,670" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/eiffel-tower-arches/" height="495" sizes="(max-width: 940px) 100vw, 940px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-arches.jpg%3Fresize%3D940%252C670%26ssl%3D1&amp;raw" srcset="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-arches.jpg?w=940&amp;ssl=1 940w, https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-arches.jpg?resize=300%2C214&amp;ssl=1 300w, https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-arches.jpg?resize=768%2C547&amp;ssl=1 768w" width="695"><figcaption class="wp-caption-text" data-dcnode-id="1075" id="figcaption_attachment_4567"><span data-dcnode-id="1076" instrument_node="">The decorative arches at base of the tower</span></figcaption></figure><span data-dcnode-id="1073" instrument_node="">
</span></div><span data-dcnode-id="1071" instrument_node="">
</span></div></div><div class="widget_text so-panel widget widget_custom_html" data-dcnode-id="1059" data-index="3" id="panel-4562-0-0-3"><div class="textwidget custom-html-widget" data-dcnode-id="1060"><span data-dcnode-id="1067" instrument_node="">
</span><span data-dcnode-id="1065" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1114726545140483" data-ad-format="auto" data-ad-slot="1798459857" data-dcnode-id="1064" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1063" instrument_node="">
</span></div></div><div class="so-panel widget widget_sow-editor" data-dcnode-id="1023" data-index="4" id="panel-4562-0-0-4"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="1024"><span data-dcnode-id="1058" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="1026"><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">The tower's base is square, measuring 125 meters (410 ft) on each side. The lattice tower is made of wrought iron that weighs 7,300 tons, and the addition of lifts, shops and antenna on the top have bring the total weight to approximately 10,100 tons, that's about the total weight of 5500 cars.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><figure aria-labelledby="figcaption_attachment_4569" class="wp-caption aligncenter" data-dcnode-id="1050" id="attachment_4569" style="width: 995px"><img alt="The base of the Eiffel Tower" class="wp-image-4569 size-full" data-attachment-id="4569" data-comments-opened="0" data-dcnode-id="1053" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="eiffel-tower-base" data-large-file="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-base.jpg?fit=995%2C662&amp;ssl=1" data-medium-file="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-base.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-base.jpg?fit=995%2C662&amp;ssl=1" data-orig-size="995,662" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/eiffel-tower-base/" height="462" sizes="(max-width: 995px) 100vw, 995px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-base.jpg%3Fresize%3D995%252C662%26ssl%3D1&amp;raw" srcset="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-base.jpg?w=995&amp;ssl=1 995w, https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-base.jpg?resize=300%2C200&amp;ssl=1 300w, https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-base.jpg?resize=768%2C511&amp;ssl=1 768w, https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-base.jpg?resize=272%2C182&amp;ssl=1 272w" width="695"><figcaption class="wp-caption-text" data-dcnode-id="1051" id="figcaption_attachment_4569"><span data-dcnode-id="1052" instrument_node="">The base of the Eiffel Tower</span></figcaption></figure><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1048" instrument_node="">There are 3 levels with usable space, the first and second levels can be seen on the two distinct bridging structures at lower portion of the tower, the third level can be found at the top of the tower, just under the antenna.</span><br data-dcnode-id="1047"><span data-dcnode-id="1046" instrument_node="">
The First Level has two restaurants, a bar, a 250-seat theater, and a private apartment.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><figure aria-labelledby="figcaption_attachment_4572" class="wp-caption aligncenter" data-dcnode-id="1040" id="attachment_4572" style="width: 950px"><img alt="A restaurant in the Eiffel Tower" class="wp-image-4572 size-full" data-attachment-id="4572" data-comments-opened="0" data-dcnode-id="1043" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="restaurant-eiffel-tower" data-large-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/restaurant-eiffel-tower.jpg?fit=950%2C630&amp;ssl=1" data-medium-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/restaurant-eiffel-tower.jpg?fit=300%2C199&amp;ssl=1" data-orig-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/restaurant-eiffel-tower.jpg?fit=950%2C630&amp;ssl=1" data-orig-size="950,630" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/restaurant-eiffel-tower/" height="461" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/restaurant-eiffel-tower.jpg%3Fresize%3D950%252C630%26ssl%3D1&amp;raw" srcset="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/restaurant-eiffel-tower.jpg?w=950&amp;ssl=1 950w, https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/restaurant-eiffel-tower.jpg?resize=300%2C199&amp;ssl=1 300w, https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/restaurant-eiffel-tower.jpg?resize=768%2C509&amp;ssl=1 768w" width="695"><figcaption class="wp-caption-text" data-dcnode-id="1041" id="figcaption_attachment_4572"><span data-dcnode-id="1042" instrument_node="">A restaurant in the Eiffel Tower</span></figcaption></figure><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1038" instrument_node="">The Second Level also has a restaurant, which has its own lift to access.</span><br data-dcnode-id="1037"><span data-dcnode-id="1036" instrument_node="">
The Third Level(top level) has a bar and a viewing platform at a height of 276 meters(906 ft), it's a very popular tourist destination.</span><br data-dcnode-id="1035"><span data-dcnode-id="1034" instrument_node="">
There's also a small apartment on top level, it was reserved for Gustave Eiffel to entertain guests, now the apartment is open to the public, the rooms are still decorated in the style of old times, and there are lifelike wax figures of Eiffel and some of his notable guests displayed in the apartment.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><figure aria-labelledby="figcaption_attachment_4588" class="wp-caption aligncenter" data-dcnode-id="1028" id="attachment_4588" style="width: 907px"><img alt="The lifelike wax figures in the department on the Eiffel Tower" class="wp-image-4588 size-full" data-attachment-id="4588" data-comments-opened="0" data-dcnode-id="1031" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="lifelike-figures-eiffel-tower" data-large-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/lifelike-figures-eiffel-tower.jpg?fit=907%2C604&amp;ssl=1" data-medium-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/lifelike-figures-eiffel-tower.jpg?fit=300%2C200&amp;ssl=1" data-orig-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/lifelike-figures-eiffel-tower.jpg?fit=907%2C604&amp;ssl=1" data-orig-size="907,604" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/lifelike-figures-eiffel-tower/" height="463" sizes="(max-width: 907px) 100vw, 907px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/lifelike-figures-eiffel-tower.jpg%3Fresize%3D907%252C604%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/lifelike-figures-eiffel-tower.jpg?w=907&amp;ssl=1 907w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/lifelike-figures-eiffel-tower.jpg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/lifelike-figures-eiffel-tower.jpg?resize=768%2C511&amp;ssl=1 768w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/lifelike-figures-eiffel-tower.jpg?resize=272%2C182&amp;ssl=1 272w" width="695"><figcaption class="wp-caption-text" data-dcnode-id="1029" id="figcaption_attachment_4588"><span data-dcnode-id="1030" instrument_node="">The lifelike wax figures of Edison(left) and Eiffel(right) in the department at the top level of the Eiffel Tower</span></figcaption></figure><span data-dcnode-id="1027" instrument_node="">
</span></div><span data-dcnode-id="1025" instrument_node="">
</span></div></div><div class="widget_text so-panel widget widget_custom_html" data-dcnode-id="1013" data-index="5" id="panel-4562-0-0-5"><div class="textwidget custom-html-widget" data-dcnode-id="1014"><span data-dcnode-id="1021" instrument_node="">
</span><span data-dcnode-id="1019" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1114726545140483" data-ad-format="auto" data-ad-slot="1798459857" data-dcnode-id="1018" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1017" instrument_node="">
</span></div></div><div class="so-panel widget widget_sow-editor" data-dcnode-id="978" data-index="6" id="panel-4562-0-0-6"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="979"><span data-dcnode-id="1012" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="981"><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">The three levels can be accessed by taking lifts or climbing staircases, there are over 300 steps from ground level to the First Level, same as that of from First Level to Second Level. A total of 1710 steps are needed to climb up to the viewing platform on the top level, for this, visitors usually ascend to there by lift.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1007" instrument_node="">The color of the body of tower is lighter at the top, gradually getting darker towards the bottom to complement the Parisian sky. The color was originally reddish brown, and changed to a bronze color known as "Eiffel Tower Brown" in 1968.</span><br data-dcnode-id="1006"><span data-dcnode-id="1005" instrument_node="">
To prevent the tower from rusting, around 60 tons of paint are added to the tower every seven years, it has been repainted for about 20 times since it was built.</span><br data-dcnode-id="1004"><span data-dcnode-id="1003" instrument_node="">
There are 20,000 light bulbs on the Eiffel Tower, every night Eiffel Tower will be lit up in orange color, the color of the lights will be different on days of festivals or special events. The top of the tower has high-powered searchlights installed, making the tower a beacon in Paris' night sky.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="997"><img alt="" class="size-full wp-image-4571 aligncenter" data-attachment-id="4571" data-comments-opened="0" data-dcnode-id="1000" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="eiffel-tower-night-view" data-large-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-night-view.jpg?fit=555%2C675&amp;ssl=1" data-medium-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-night-view.jpg?fit=247%2C300&amp;ssl=1" data-orig-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-night-view.jpg?fit=555%2C675&amp;ssl=1" data-orig-size="555,675" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/eiffel-tower-night-view/" height="675" sizes="(max-width: 555px) 100vw, 555px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-night-view.jpg%3Fresize%3D555%252C675%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-night-view.jpg?w=555&amp;ssl=1 555w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-night-view.jpg?resize=247%2C300&amp;ssl=1 247w" width="555"><br data-dcnode-id="999"><span data-dcnode-id="998" instrument_node="">
A list of the names of 72 French scientists, engineers and mathematicians is engraved on first level of the tower in recognition of their contribution to the building of the tower.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><img alt="" class="size-full wp-image-4568 aligncenter" data-attachment-id="4568" data-comments-opened="0" data-dcnode-id="995" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="engraved-names-eiffel-tower" data-large-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/engraved-names-eiffel-tower.jpg?fit=635%2C475&amp;ssl=1" data-medium-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/engraved-names-eiffel-tower.jpg?fit=300%2C224&amp;ssl=1" data-orig-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/engraved-names-eiffel-tower.jpg?fit=635%2C475&amp;ssl=1" data-orig-size="635,475" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/engraved-names-eiffel-tower/" height="475" sizes="(max-width: 635px) 100vw, 635px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/engraved-names-eiffel-tower.jpg%3Fresize%3D635%252C475%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/engraved-names-eiffel-tower.jpg?w=635&amp;ssl=1 635w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/engraved-names-eiffel-tower.jpg?resize=300%2C224&amp;ssl=1 300w" width="635"></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="992" instrument_node="">The design of Eiffel Tower had drawn criticism from many celebrities of that time, including some most important figures in Paris like Guy de Maupassant, Adolphe Bouguereau and Charles Gounod, they depicted the tower as useless, hideous, and monstrous, believing it will ruin the city views of Paris as that it can overwhelm other landmark buildings of the city while appearing like a gigantic smokestack.</span><br data-dcnode-id="991"><span data-dcnode-id="990" instrument_node="">
To these criticisms, Gustave Eiffel explained that the tower is distant enough from other landmark buildings, and when completed it will look better than what is shown in the design draft, the tower will be as great as the Pyramid in Egypt.</span><br data-dcnode-id="989"><span data-dcnode-id="988" instrument_node="">
The criticism and protests didn't stop the project, because the tower had already been approved to build and was under construction.</span><br data-dcnode-id="987"><span data-dcnode-id="986" instrument_node="">
After the completion of the tower, lots of protesters changed their mind, but there still were some people holding their initial attitude, like Maupassant, who is said to have lunch in the restaurant on the Eiffel Tower every day, because it is one place in the city that the tower itself can't be seen.</span><br data-dcnode-id="985"><span data-dcnode-id="984" instrument_node="">
Since it was built in 1889, the Eiffel Tower had become a global cultural icon of France and the symbol of Paris. The tower is one of the most recognizable structures in the world, it has been featured in numerous literature, films, TV series and the like.</span></p><span data-dcnode-id="982" instrument_node="">

</span><ins class="adsbygoogle" data-ad-client="ca-pub-1114726545140483" data-ad-format="auto" data-ad-slot="1798459857" data-dcnode-id="973" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="972" instrument_node="">
</span></div></div><div class="so-panel widget widget_sow-editor panel-last-child" data-dcnode-id="836" data-index="8" id="panel-4562-0-0-8"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="837"><span data-dcnode-id="967" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="839"><span data-dcnode-id="966" instrument_node="">
</span><h2 data-dcnode-id="963"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">History of the Eiffel Tower</span></strong></h2><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="961" instrument_node="">In 1886, an open competition was held for the centerpiece of the 1889 Exposition, in May of that year, Eiffel's proposal was chosen. The contract for building of the tower was signed in January 1887, and work on foundations of the tower started shortly.</span><br data-dcnode-id="960"><span data-dcnode-id="959" instrument_node="">
The foundations were completed in June, followed by the erection of the ironwork.</span><br data-dcnode-id="958"><span data-dcnode-id="957" instrument_node="">
The process of erecting the Eiffel Tower is very different from erecting a regular skyscraper, they created pieces of components of the tower in a factory in suburb of Paris, and shipped the finished components to the construction site of the tower using horse-drawn carts, then these components were joined together using rivets on the construction site, about 2.5 million rivets were used, no drilling or shaping was done on site.</span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="949"><img alt="" class="size-full wp-image-4579 aligncenter" data-attachment-id="4579" data-comments-opened="0" data-dcnode-id="954" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="historic-picture-eiffel-tower" data-large-file="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/historic-picture-eiffel-tower.jpg?fit=1024%2C670&amp;ssl=1" data-medium-file="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/historic-picture-eiffel-tower.jpg?fit=300%2C196&amp;ssl=1" data-orig-file="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/historic-picture-eiffel-tower.jpg?fit=1024%2C670&amp;ssl=1" data-orig-size="1024,670" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/historic-picture-eiffel-tower/" height="455" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/historic-picture-eiffel-tower.jpg%3Fresize%3D1024%252C670%26ssl%3D1&amp;raw" srcset="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/historic-picture-eiffel-tower.jpg?w=1024&amp;ssl=1 1024w, https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/historic-picture-eiffel-tower.jpg?resize=300%2C196&amp;ssl=1 300w, https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/historic-picture-eiffel-tower.jpg?resize=768%2C503&amp;ssl=1 768w" width="695"><br data-dcnode-id="953"><span data-dcnode-id="952" instrument_node="">
Three hundred workers participated in the construction of the tower, excluding the workers in the factory for creating the components of the tower.</span><br data-dcnode-id="951"><span data-dcnode-id="950" instrument_node="">
The tower was structurally completed in the end of March 1889, only some lifts, facilities and some minor elements were still being installed or built. The tower opened to public on May 6, nine days after the opening of the exposition, at that time still no lifts were in service, even so, there were still nearly 30,000 visitors climb up to the top of the tower through its staircases, before the lifts entered service on May 26.</span></p><span data-dcnode-id="948" instrument_node="">
</span><figure aria-labelledby="figcaption_attachment_4589" class="wp-caption aligncenter" data-dcnode-id="944" id="attachment_4589" style="width: 885px"><img alt="The Eiffel Tower seen during the 1889 Exposition in Paris" class="wp-image-4589 size-full" data-attachment-id="4589" data-comments-opened="0" data-dcnode-id="947" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="exposition-paris-1889" data-large-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/exposition-paris-1889.jpg?fit=885%2C665&amp;ssl=1" data-medium-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/exposition-paris-1889.jpg?fit=300%2C225&amp;ssl=1" data-orig-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/exposition-paris-1889.jpg?fit=885%2C665&amp;ssl=1" data-orig-size="885,665" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/exposition-paris-1889/" height="522" sizes="(max-width: 885px) 100vw, 885px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/exposition-paris-1889.jpg%3Fresize%3D885%252C665%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/exposition-paris-1889.jpg?w=885&amp;ssl=1 885w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/exposition-paris-1889.jpg?resize=300%2C225&amp;ssl=1 300w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/exposition-paris-1889.jpg?resize=768%2C577&amp;ssl=1 768w" width="695"><figcaption class="wp-caption-text" data-dcnode-id="945" id="figcaption_attachment_4589"><span data-dcnode-id="946" instrument_node="">The Eiffel Tower seen during the 1889 Exposition in Paris</span></figcaption></figure><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="942" instrument_node="">If the Eiffel Tower was built today, it would cost about US$31 million.</span><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node="">
The Eiffel Tower was permitted to stand there for just 20 years, it was to be teared down in 1909, but the City of Paris remained the tower as it was realized that the tower could be used for broadcasting purposes. This is not the only time the Eiffel Tower survived from potential demolition, in August 1944 during World War II, Hitler ordered General Dietrich von Choltitz, the military governor of Paris, to demolish the tower, but Von Choltitz disobeyed the order, the Eiffel Tower survived again. And in 1967, the mayor of Montreal negotiated a secret agreement with Charles de Gaulle for the tower to be dismantled and temporarily relocated to Montreal to serve as a landmark and tourist attraction during Expo 67. The company operating the Eiffel Tower refused to do so, as they fear that the tower would not be permitted to be restored in its original location again.</span><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node="">
In 1957, the current antenna atop the tower was added, bumping the height of the tower to 324 meters from 300 meters.</span></p><span data-dcnode-id="936" instrument_node="">
</span><h2 data-dcnode-id="933" id="tourism"><strong data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Tourism:</span></strong></h2><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">The Eiffel Tower is the most visited paid monument in the world, more than 250 million people have visited the tower since it was completed in 1889. And about 7 million people ascend the tower every year, this amount of people is two times of that of the </span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetowerinfo.com/buildings-list/empire-state-building/"><span data-dcnode-id="930" instrument_node="">Empire State Building</span></a><span data-dcnode-id="928" instrument_node=""> in New York City.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="920"><strong data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">The admission tickets for the Eiffel Tower can be booked by </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tiqets.com/en/paris-c66746/eiffel-tower-summit-guided-visit-p975507%3Fpartner%3Dthetowerinfo" rel="nofollow"><span data-dcnode-id="924" instrument_node="">clicking here</span></a><span data-dcnode-id="922" instrument_node="">.</span></strong></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">As mentioned earlier, visitors can ascend to all 3 levels of the tower at different heights, the highest accessible position is the observation deck on the Third Level, it's at 276 meters(906 ft) high above the ground, and is the highest observation deck in Europe Union and Western Europe, by contrast, the second highest one is the observatory on the Shard in London, which is 245 meters high.</span></p><span data-dcnode-id="916" instrument_node="">
</span><figure aria-labelledby="figcaption_attachment_4574" class="wp-caption aligncenter" data-dcnode-id="912" id="attachment_4574" style="width: 960px"><img alt="A close up view of the observation deck on Third Level of the Eiffel Tower" class="wp-image-4574 size-full" data-attachment-id="4574" data-comments-opened="0" data-dcnode-id="915" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="observatory-eiffel-tower" data-large-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/observatory-eiffel-tower.jpg?fit=960%2C540&amp;ssl=1" data-medium-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/observatory-eiffel-tower.jpg?fit=300%2C169&amp;ssl=1" data-orig-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/observatory-eiffel-tower.jpg?fit=960%2C540&amp;ssl=1" data-orig-size="960,540" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/observatory-eiffel-tower/" height="391" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/observatory-eiffel-tower.jpg%3Fresize%3D960%252C540%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/observatory-eiffel-tower.jpg?w=960&amp;ssl=1 960w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/observatory-eiffel-tower.jpg?resize=300%2C169&amp;ssl=1 300w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/observatory-eiffel-tower.jpg?resize=768%2C432&amp;ssl=1 768w" width="695"><figcaption class="wp-caption-text" data-dcnode-id="913" id="figcaption_attachment_4574"><span data-dcnode-id="914" instrument_node="">A close up view of the observation deck on Third Level of the Eiffel Tower</span></figcaption></figure><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">From the observation deck visitors can enjoy the panoramic view of Paris, getting the clear aerial views of all the notable landmark buildings in the city, like the Seine, Notre Dame, the Louvre, Les Invalides, the Arc de Triomphe, etc.</span></p><span data-dcnode-id="908" instrument_node="">

</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">A glass floor was installed on the First Level of the tower during the a refurbishment in 2014, visitors can stand on it to watch down at the views below it.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><img alt="" class="size-full wp-image-4584 aligncenter" data-attachment-id="4584" data-comments-opened="0" data-dcnode-id="889" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="glass-floor-eiffel-tower" data-large-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/glass-floor-eiffel-tower.jpg?fit=850%2C605&amp;ssl=1" data-medium-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/glass-floor-eiffel-tower.jpg?fit=300%2C214&amp;ssl=1" data-orig-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/glass-floor-eiffel-tower.jpg?fit=850%2C605&amp;ssl=1" data-orig-size="850,605" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/glass-floor-eiffel-tower/" height="495" sizes="(max-width: 850px) 100vw, 850px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/glass-floor-eiffel-tower.jpg%3Fresize%3D850%252C605%26ssl%3D1&amp;raw" srcset="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/glass-floor-eiffel-tower.jpg?w=850&amp;ssl=1 850w, https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/glass-floor-eiffel-tower.jpg?resize=300%2C214&amp;ssl=1 300w, https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/glass-floor-eiffel-tower.jpg?resize=768%2C547&amp;ssl=1 768w" width="695"></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">The Eiffel Tower is located at the intersection of the quai Branly and the Pont d'Iéna, on the Champ de Marscan, some convenient ways to get there is by metro or RER, by taxi, or simply walk towards the tower if it's not far from you. The nearest Paris Métro station is Bir-Hakeim and the nearest RER station is Champ de Mars-Tour Eiffel.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">There are lots of </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.huffingtonpost.com/2014/08/28/replicas-eiffel-tower_n_3721294.html"><span data-dcnode-id="882" instrument_node="">replicas of the Eiffel Tower</span></a><span data-dcnode-id="880" instrument_node=""> around the world, the largest one is a 1:2 scale replica in Las Vegas.</span></p><span data-dcnode-id="878" instrument_node="">
</span><figure aria-labelledby="figcaption_attachment_4573" class="wp-caption aligncenter" data-dcnode-id="874" id="attachment_4573" style="width: 880px"><img alt="A replica of the Eiffel Tower in Las Vegas" class="wp-image-4573 size-full" data-attachment-id="4573" data-comments-opened="0" data-dcnode-id="877" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="las-vegas-eiffel-tower" data-large-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/las-vegas-eiffel-tower.jpg?fit=880%2C665&amp;ssl=1" data-medium-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/las-vegas-eiffel-tower.jpg?fit=300%2C227&amp;ssl=1" data-orig-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/las-vegas-eiffel-tower.jpg?fit=880%2C665&amp;ssl=1" data-orig-size="880,665" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/las-vegas-eiffel-tower/" height="525" sizes="(max-width: 880px) 100vw, 880px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/las-vegas-eiffel-tower.jpg%3Fresize%3D880%252C665%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/las-vegas-eiffel-tower.jpg?w=880&amp;ssl=1 880w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/las-vegas-eiffel-tower.jpg?resize=300%2C227&amp;ssl=1 300w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/las-vegas-eiffel-tower.jpg?resize=768%2C580&amp;ssl=1 768w" width="695"><figcaption class="wp-caption-text" data-dcnode-id="875" id="figcaption_attachment_4573"><span data-dcnode-id="876" instrument_node="">A replica of the Eiffel Tower in Las Vegas</span></figcaption></figure><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">And Macau also has a 1:2 scale replica, built in 2016 as a part of The Venetian Macao.</span></p><span data-dcnode-id="870" instrument_node="">
</span><figure aria-labelledby="figcaption_attachment_6522" class="wp-caption aligncenter" data-dcnode-id="866" id="attachment_6522" style="width: 518px"><img alt="The replica of the Eiffel Tower in Macau" class="wp-image-6522 size-full" data-attachment-id="6522" data-comments-opened="0" data-dcnode-id="869" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="eiffel-tower-macau" data-large-file="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-macau.jpg?fit=518%2C647&amp;ssl=1" data-medium-file="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-macau.jpg?fit=240%2C300&amp;ssl=1" data-orig-file="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-macau.jpg?fit=518%2C647&amp;ssl=1" data-orig-size="518,647" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/eiffel-tower-macau/" height="647" sizes="(max-width: 518px) 100vw, 518px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-macau.jpg%3Fresize%3D518%252C647%26ssl%3D1&amp;raw" srcset="https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-macau.jpg?w=518&amp;ssl=1 518w, https://i1.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-macau.jpg?resize=240%2C300&amp;ssl=1 240w" width="518"><figcaption class="wp-caption-text" data-dcnode-id="867" id="figcaption_attachment_6522"><span data-dcnode-id="868" instrument_node="">The replica of the Eiffel Tower in Macau</span></figcaption></figure><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Including the one in Macau, China has a total of three replicas of the Eiffel Tower, the most similar one is a 1:3 replica in Hangzhou, even its surrounding area is very similar to that of the original. Another one is in a theme park in Shenzhen called Window of the World.</span></p><span data-dcnode-id="862" instrument_node="">
</span><figure aria-labelledby="figcaption_attachment_4576" class="wp-caption aligncenter" data-dcnode-id="858" id="attachment_4576" style="width: 595px"><img alt="A replica of the Eiffel Tower in Hangzhou" class="wp-image-4576 size-full" data-attachment-id="4576" data-comments-opened="0" data-dcnode-id="861" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="hangzhou-eiffel-tower-replica" data-large-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/hangzhou-eiffel-tower-replica.jpg?fit=595%2C410&amp;ssl=1" data-medium-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/hangzhou-eiffel-tower-replica.jpg?fit=300%2C207&amp;ssl=1" data-orig-file="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/hangzhou-eiffel-tower-replica.jpg?fit=595%2C410&amp;ssl=1" data-orig-size="595,410" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/hangzhou-eiffel-tower-replica/" height="410" sizes="(max-width: 595px) 100vw, 595px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/hangzhou-eiffel-tower-replica.jpg%3Fresize%3D595%252C410%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/hangzhou-eiffel-tower-replica.jpg?w=595&amp;ssl=1 595w, https://i0.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/hangzhou-eiffel-tower-replica.jpg?resize=300%2C207&amp;ssl=1 300w" width="595"><figcaption class="wp-caption-text" data-dcnode-id="859" id="figcaption_attachment_4576"><span data-dcnode-id="860" instrument_node="">A replica of the Eiffel Tower in Hangzhou, the buildings on the two sides is also based on that of the Paris.</span></figcaption></figure><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">The Kings Island in Ohio also has a 1:3 scale replica of the Eiffel Tower, it's built on the entrance to the park and its top offers a view of the entire park.</span></p><span data-dcnode-id="854" instrument_node="">
</span><figure aria-labelledby="figcaption_attachment_6523" class="wp-caption aligncenter" data-dcnode-id="850" id="attachment_6523" style="width: 518px"><img alt="The replica of the Eiffel Tower in Kings Island" class="wp-image-6523 size-full" data-attachment-id="6523" data-comments-opened="0" data-dcnode-id="853" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="eiffel-tower-kings-island" data-large-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-kings-island.jpg?fit=518%2C653&amp;ssl=1" data-medium-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-kings-island.jpg?fit=238%2C300&amp;ssl=1" data-orig-file="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-kings-island.jpg?fit=518%2C653&amp;ssl=1" data-orig-size="518,653" data-permalink="https://thetowerinfo.com/eiffel-tower-information-facts/eiffel-tower-kings-island/" height="653" sizes="(max-width: 518px) 100vw, 518px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-kings-island.jpg%3Fresize%3D518%252C653%26ssl%3D1&amp;raw" srcset="https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-kings-island.jpg?w=518&amp;ssl=1 518w, https://i2.wp.com/thetowerinfo.com/wp-content/uploads/2018/08/eiffel-tower-kings-island.jpg?resize=238%2C300&amp;ssl=1 238w" width="518"><figcaption class="wp-caption-text" data-dcnode-id="851" id="figcaption_attachment_6523"><span data-dcnode-id="852" instrument_node="">The replica of the Eiffel Tower in Kings Island</span></figcaption></figure><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="848" instrument_node="">Aside from the replicas, the Eiffel Tower has inspired the designs of some other towers in the world, the most notable one of them is the </span><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetowerinfo.com/tokyo-tower-facts/"><span data-dcnode-id="847" instrument_node="">Tokyo Tower</span></a><span data-dcnode-id="845" instrument_node=""> in </span><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thetowerinfo.com/tallest-buildings-tokyo/"><span data-dcnode-id="844" instrument_node="">Tokyo</span></a><span data-dcnode-id="842" instrument_node="">, Japan, the tower is extremely similar to the Eiffel Tower in terms of shape and height, and it's also a iron lattice tower, being used as an observation tower for tourism.</span></p><span data-dcnode-id="840" instrument_node="">
