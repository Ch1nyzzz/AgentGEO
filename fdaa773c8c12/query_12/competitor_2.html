  Since its construction, more than 120 million visitors from all over the world have marveled at the Eiffel Tower. Historian Bertrand Lemoine looks back at the career and achievements of its prolific builder, Gustave Eiffel.      </span></div><span data-dcnode-id="1554" instrument_node="">
</span><div class="article-contenu" data-dcnode-id="977"><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1552" instrument_node="">"Gustave Eiffel was the perfect example of a 19th century engineer: inventive and daring,” says Lemoine, who is himself an engineer, architect, and specialist in the history of architecture at the CNRS.</span><a class="see-footnote" data-dcnode-id="1550" href="#footnote1_33z6ew0" id="footnoteref1_33z6ew0" title="Centre André Chastel (CNRS / Université Paris-IV / Ministère de la culture et de la communication). "><span data-dcnode-id="1551" instrument_node="">1</span></a><span data-dcnode-id="1549" instrument_node=""> “Eiffel graduated from the Central School of Arts and Manufactures</span><a class="see-footnote" data-dcnode-id="1547" href="#footnote2_m0kmn4r" id="footnoteref2_m0kmn4r" title="École centrale des arts et manufactures. "><span data-dcnode-id="1548" instrument_node="">2</span></a><span data-dcnode-id="1546" instrument_node=""> in 1855, a major time of growth, stemming from several concurrent factors: the rapid economic expansion of Europe, at the height of its industrial revolution; the appearance of a new material, rolled iron, which was lighter and cheaper than stone; and decisive progress in mechanics.”</span></p><span data-dcnode-id="1544" instrument_node="">
</span><div class="section-heading" data-dcnode-id="1227" id="article-contenu1"><h2 data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">A globe-trotting engineer</span></h2><p data-dcnode-id="1538"><span data-dcnode-id="1541" instrument_node="">In this favorable context, Eiffel became an internationally renowned structural engineer not only through the design of the world-famous Eiffel Tower, but also as a result of the 300 or so structures he built all over the world, including bridges, viaducts, roof structures, churches, and stations. His contributions to scientific research shouldn't be forgotten either.&nbsp;</span><br data-dcnode-id="1540"><span data-dcnode-id="1539" instrument_node="">
&nbsp;</span></p><div class="asset-wrapper asset aid-2225 asset-image" data-dcnode-id="1442"><span data-dcnode-id="1537" instrument_node="">

</span></div><p data-dcnode-id="1441"></p><p data-dcnode-id="1437"><span data-dcnode-id="1440" instrument_node="">Eiffel had all the makings of a great engineer. Encouraged by his success in a steel construction company, where he headed in particular the construction site for the Bordeaux railway bridge, he set up his very own company at the age of 32. He surrounded himself with efficient technicians and inventive engineers, and started establishing lasting partnerships with investors. At the time, structural engineering was increasingly in demand. Railways were expanding throughout Europe, and stations, bridges, and public buildings were changing the landscape. “Iron enabled you to build fast: The parts were mass-produced in workshops, and they could be sent back to the factory in case of problems.&nbsp;</span><span data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">On site, all you had to do was to assemble them with rivets,” Lemoine explains. It was not unlike a Meccano model construction kit, but on a grand scale, in sharp contrast to traditional building sites, where stones had to be cut and recut on the construction site to fit—a process that could drag on for years. Furthermore, the scientific laws that explained how materials deformed due to the stresses and shapes of structures, discovered by Claude-Louis Navier in 1821, were now commonly being applied.</span></span></p><p data-dcnode-id="1436"></p><div class="asset-wrapper asset aid-2226 asset-image" data-dcnode-id="1340"><span data-dcnode-id="1435" instrument_node="">

</span><div class="image-legende" data-dcnode-id="1425"><span data-dcnode-id="1429" instrument_node="">
          The Budapest train station in Hungary. With its great hall made entirely of metal, it remains one of the engineer's great feats.      </span><a class="popup-link" data-dcnode-id="1427" href="#image-aid-2226"><i class="icon-fullsize" data-dcnode-id="1428"></i></a><span data-dcnode-id="1426" instrument_node=""> </span></div><span data-dcnode-id="1424" instrument_node="">

</span><div class="section-heading" data-dcnode-id="987" id="article-contenu2"><h2 data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">A tower to rise above the others</span></h2><p data-dcnode-id="1210"><span data-dcnode-id="1214" instrument_node="">The idea of a tower was being mooted. It would be taller than any structure ever built, even outstripping the Washington Monument, which was 169 meters tall. Two engineers from the Eiffel company, Émile Nouguier and Maurice Koechlin, designed a 300 meter-high tower. Although Eiffel initially showed little interest, he was won over by the embellishments added by the architect Stephen Sauvestre, and registered a patent.</span><a class="see-footnote" data-dcnode-id="1212" href="#footnote3_yjts33l" id="footnoteref3_yjts33l" title="Patent registered under the names of Eiffel, Nouguier, and Koechlin, which Eiffel later bought back from the two engineers."><span data-dcnode-id="1213" instrument_node="">3</span></a><span data-dcnode-id="1211" instrument_node="">&nbsp;</span></p><div class="asset-wrapper asset aid-2223 asset-image" data-dcnode-id="1114"><span data-dcnode-id="1209" instrument_node="">

</span><h3 data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Coulisses</span></h3><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">
  December 1887: Before the first level was completed, making the whole structure stable, the four legs were held up by scaffolding. Eiffel had the idea of placing boxes filled with sand inside them, as was done in Ancient Egypt. Removing a little of the sand slightly lowered an entire leg, and above all, enabled all four legs to be adjusted to the same height. Had they been just a few millimeters off, the rivets would not have fit in the holes of the plates that were then assembled.</span></p><span data-dcnode-id="939" instrument_node="">
