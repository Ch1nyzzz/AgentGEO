</span><h1 data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">How often do they paint the Eiffel Tower?</span></h1><span data-dcnode-id="768" instrument_node="">
</span></div><span data-dcnode-id="766" instrument_node="">
</span><div class="answer" data-dcnode-id="688" style="font-size:16px;"><span data-dcnode-id="765" instrument_node="">
</span><div data-dcnode-id="755"><span data-dcnode-id="756"><span data-dcnode-id="757"><span data-dcnode-id="764" instrument_node="">The </span><b data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Tower</span></b><span data-dcnode-id="761" instrument_node=""> has been re-</span><b data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">painted</span></b><span data-dcnode-id="758" instrument_node=""> 18 times since its initial construction, an average of once every seven years.</span></span></span></div><br data-dcnode-id="754"><p data-dcnode-id="747"><a class="lc" data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//askinglot.com/open-detail/221221" rel="nofollow" target="_blank"><span data-dcnode-id="753" instrument_node="">Click to see full answer</span></a><span data-dcnode-id="751" instrument_node="">. </span><br data-dcnode-id="750"><br data-dcnode-id="749"><span data-dcnode-id="748" instrument_node=""> Considering this,  when was Eiffel Tower last painted?</span></p><p data-dcnode-id="731"><span data-dcnode-id="732"><span data-dcnode-id="733"><span data-dcnode-id="746" instrument_node="">When it opened in 1889, the </span><b data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Eiffel Tower</span></b><span data-dcnode-id="743" instrument_node=""> sported a reddish-brown color. A decade later, it was coated in yellow </span><b data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">paint</span></b><span data-dcnode-id="740" instrument_node="">. The </span><b data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">tower</span></b><span data-dcnode-id="737" instrument_node=""> was also yellow-brown and chestnut brown before the adoption of the current, specially mixed “</span><b data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Eiffel Tower</span></b><span data-dcnode-id="734" instrument_node=""> Brown” in 1968.</span></span></span></p><p data-dcnode-id="717"><span data-dcnode-id="730" instrument_node="">Similarly,  was the Eiffel tower painted red? </span><span data-dcnode-id="718"><span data-dcnode-id="719"><span data-dcnode-id="729" instrument_node="">The </span><b data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Eiffel Tower</span></b><span data-dcnode-id="726" instrument_node=""> was originally a deep </span><b data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">red</span></b><span data-dcnode-id="723" instrument_node="">, chosen in an attempt to combat rust, before being re-</span><b data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">painted</span></b><span data-dcnode-id="720" instrument_node=""> ochre in 1892. The turn of the century saw its hue change to yellow, before the colour was deemed "too optimistic" for the era and a change was made to a yellow-brown from 1907.</span></span></span></p><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node=""> In this regard,  what color is the Eiffel Tower 2019?</span></p><p data-dcnode-id="704"><span data-dcnode-id="714" instrument_node=""> </span><span data-dcnode-id="705"><span data-dcnode-id="706"><span data-dcnode-id="713" instrument_node="">According to Gustave Eiffel, the French civil engineer and architect, the original </span><b data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">red</span></b><span data-dcnode-id="710" instrument_node=""> color made it easier to protect the structure from rust. But since its construction, the tower has been painted ochre, yellow and several shades of </span><b data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">brown</span></b><span data-dcnode-id="707" instrument_node="">.</span></span></span></p><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">How much does the paint on the Eiffel Tower weigh?</span></p><p data-dcnode-id="690"><span data-dcnode-id="691"><span data-dcnode-id="692"><b data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Eiffel Tower</span></b><span data-dcnode-id="699" instrument_node=""> awaits monumental </span><b data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">paint</span></b><span data-dcnode-id="696" instrument_node=""> job. A new coat, in three different shades and </span><b data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">weighing</span></b><span data-dcnode-id="693" instrument_node=""> 60 tons, will be applied by hand.</span></span></span></p><span data-dcnode-id="689" instrument_node="">
