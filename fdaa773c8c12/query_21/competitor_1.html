</span><div class="field--name-field-chapeau" data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">
                                              Gustave Eiffel had the very rare privilege of enjoying worldwide fame thanks to the Tower that bears his name. But who was he really? By Bertrand Lemoine.

                                        </span></div><span data-dcnode-id="1646" instrument_node="">
</span><div class="field--name-field-body" data-dcnode-id="1609"><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1640"><a data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toureiffel.paris/en/the-monument/gustave-eiffel"><strong data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Gustave Eiffel</span></strong></a><span data-dcnode-id="1641" instrument_node="">'s name became famous when the Tower rose high up into the Paris sky. But he had already made a solid reputation for himself in the world of steel construction, both as an engineer and as a contractor. He was born in 1832 in Burgundy where his mother ran a coal trading business. His family, originally from the Rhineland, bears a German surname: Boenickhausen. In time the family took the name Eiffel, in memory of the range of hills originating from this region, a change that was only officially formalized in 1879.&nbsp;</span></p><span data-dcnode-id="1639" instrument_node="">
</span><h2 data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Early leadership skills</span></h2><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">With a gift for science, Gustave joined a prestigious engineering school, the École Centrale des Arts et Manufactures. After three years of studies, where he proved himself to be a rather carefree, energetic and undisciplined student, he left in 1855, the year of the first Universal Exposition in France. He was destined for a career in the chemical industry since his uncle owned a paint factory. But a family dispute kept him away from this path and he found a job with a construction engineer, Charles Nepveu, where he quickly took on responsibilities. After a stint with a railway company, at the age of 26 he took over the management of the construction site of one of the largest engineering structures of the time, the Bordeaux railway bridge over the Garonne River. Here, he revealed his talents as an organizer and leader of men, even saving a worker from drowning.</span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1632"></p><figure class="caption caption-img align-center" data-dcnode-id="1625" role="group"><span data-dcnode-id="1631" instrument_node="">
</span><img alt="Photo Viaduc Porto" data-dcnode-id="1630" data-entity-type="file" data-entity-uuid="b8ae562b-61fc-4c36-a178-cd553d4eee98" height="420" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toureiffel.paris/sites/default/files/inline-images/pont_porto.jpg&amp;raw" width="600"><span data-dcnode-id="1629" instrument_node="">
</span><figcaption data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Maria Pia viaduct, Porto&nbsp;</span></figcaption><span data-dcnode-id="1626" instrument_node="">
</span></figure><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1623"></p><span data-dcnode-id="1622" instrument_node="">
</span><h2 data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">A full career even before the Tower</span></h2><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">After some work in the southwest, he decided to set up on his own and founded his own company at the age of 32, first as a consulting engineer and then as a full-fledged builder, specializing in metal construction at a time when the railways were booming. His first major success came in 1867 with the construction of two viaducts on the Sioule River in central France. After the war of 1870, he sought to move his operations to Peru and Chile, with the support of a partner, but quickly gave up. Then came two major commissions in 1875, one for the Western Railway Station in Budapest, Hungary, and the other for the Maria Pia Viaduct in Porto, Portugal designed by his new partner, the engineer Théophile Seyrig. This was followed by a long list of successful steel constructions, bridges and structures, mainly in France but also in Portugal, Spain and Romania. Eiffel proved as skillful a negotiator as he was a business executive, probably more so than an expert engineer – even if he introduced a certain number of innovations to the principles of structural assembly or to inventive constructions, such as the reinforcement of the Statue of Liberty in New York, the mobile dome of the Nice Observatory or the small bridges sold in kits.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><h2 data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">At 51, the adventure of the 1,000-foot tower began</span></h2><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">In 1884, at the age of 51, Eiffel led his company to 4th or 5th place among French companies in the field. It was at this time that his two main engineers, Émile Nouguier and Maurice Koechlin, who had replaced Seyrig as head of research, proposed the idea of a 1,000-foot (300-meter) tower. Eiffel's great merit would be to have given substance to this a priori utopian idea. After the success of the Tower, Eiffel would be drawn into the scandal of the Panama Canal, for which he began building ten giant locks. This painful episode meant the end of his contracting career for him but the beginning of a new adventure. He then invested part of his comfortable fortune and most of his time and energy in various scientific research, initially intended to demonstrate the Tower's usefulness. Here he proved himself to be a true scientist – one of the pioneers of meteorology, aerodynamics and radiotelegraphy. He died at the age of 93, surrounded by many children and grandchildren, a figure who had already become world famous thanks to the Tower that bears his name.</span></p><span data-dcnode-id="1610" instrument_node="">
</span></div><span data-dcnode-id="1608" instrument_node="">
