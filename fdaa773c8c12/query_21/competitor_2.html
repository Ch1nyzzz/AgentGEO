</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="921" id="mntl-sc-block_1-0-5"><span data-dcnode-id="922" instrument_node="">
Eiffel was a fast learner. By 1858 he was directing bridge construction. In 1866 he went into business for himself and in 1868 formed a company, Eiffel &amp; Cie. That company installed a&nbsp;major bridge, the Ponte Dona Maria, in Porto, Portugal with a 525-foot steel arch, and the highest bridge in France, the Garabit Viaduct, before eventually dissolving.

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="906" id="mntl-sc-block_1-0-7"><span data-dcnode-id="907" instrument_node="">
Eiffel’s list of constructions is daunting. He built the Nice Observatory, the Cathedral of San Pedro de Tacna in Peru, plus theaters, hotels, and fountains.
</span></p><span data-dcnode-id="905" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="904" id="mntl-sc-block_1-0-8"></div><span data-dcnode-id="903" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="902" id="toc-eiffels-work-on-the-statue-of-liberty"></span><span data-dcnode-id="901" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="896" id="mntl-sc-block_1-0-9"><span data-dcnode-id="900" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node=""> Eiffel's Work on the Statue of Liberty </span></span><span data-dcnode-id="897" instrument_node=""> </span></h2><span data-dcnode-id="895" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="890" id="mntl-sc-block_1-0-10"><span data-dcnode-id="894" instrument_node="">
Among his many great constructions, one project rivaled the Eiffel Tower in terms of fame and glory: designing the interior frame for the </span><a data-component="link" data-dcnode-id="892" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/who-designed-the-statue-of-liberty-1991696"><span data-dcnode-id="893" instrument_node="">Statue of Liberty</span></a><span data-dcnode-id="891" instrument_node="">. Eiffel took the design—by sculptor Frédéric Auguste Bartholdi—and made it a reality, creating an internal framework around which the massive statue could be sculpted. It was Eiffel who conceived of the two spiral staircases inside the statue.
</span></p><span data-dcnode-id="889" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="888" id="mntl-sc-block_1-0-11"></div><span data-dcnode-id="887" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="886" id="toc-the-eiffel-tower"></span><span data-dcnode-id="885" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="880" id="mntl-sc-block_1-0-12"><span data-dcnode-id="884" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="882"><span data-dcnode-id="883" instrument_node=""> The Eiffel Tower </span></span><span data-dcnode-id="881" instrument_node=""> </span></h2><span data-dcnode-id="879" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="874" id="mntl-sc-block_1-0-13"><span data-dcnode-id="878" instrument_node="">
The Statue of Liberty was finished and opened in 1886. The next year work began on Eiffel’s defining piece, a tower for the 1889 Universal Exposition in Paris, France, built to honor the 100th anniversary of the </span><a data-component="link" data-dcnode-id="876" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/beginners-guide-to-the-french-revolution-1221900"><span data-dcnode-id="877" instrument_node="">French Revolution</span></a><span data-dcnode-id="875" instrument_node="">. Construction of the Eiffel Tower, an astounding feat of engineering, took more than two years, but it was worth the wait. Visitors flocked to the stunning 300 meter-high work—at the time the world’s tallest man-made structure—and made the exhibition one of the few world's fairs to make a profit.
</span></p><span data-dcnode-id="873" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="862" id="mntl-sc-block_1-0-14"><div class="comp mntl-block" data-dcnode-id="863" id="mntl-block_7-0"><span data-dcnode-id="872" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="860" id="toc-eiffels-death-and-legacy"></span><span data-dcnode-id="859" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="854" id="mntl-sc-block_1-0-15"><span data-dcnode-id="858" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="856"><span data-dcnode-id="857" instrument_node=""> Eiffel's Death and Legacy </span></span><span data-dcnode-id="855" instrument_node=""> </span></h2><span data-dcnode-id="853" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="851" id="mntl-sc-block_1-0-16"><span data-dcnode-id="852" instrument_node="">
The Eiffel Tower was originally supposed to be taken down after the fair, but the decision was reconsidered. The architectural wonder remained, and is now as popular as ever, drawing immense crowds each day.
</span></p><span data-dcnode-id="850" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="849" id="mntl-sc-block_1-0-17"></div><span data-dcnode-id="848" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="846" id="mntl-sc-block_1-0-18"><span data-dcnode-id="847" instrument_node="">
Eiffel died in 1923 at the age of 91.
