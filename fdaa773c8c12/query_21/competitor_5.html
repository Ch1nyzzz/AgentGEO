</span></div><section data-dcnode-id="713" id="early-life"><h2 data-dcnode-id="728" id="early-life"><span data-dcnode-id="729" instrument_node="">Early Life</span></h2><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Alexandre-Gustave Eiffel was born in Dijon, France on December 15, 1832. Interested in construction at an early age, he attended the École Polytechnique and later the École Centrale des Arts et Manufactures (College of Art and Manufacturing) in Paris, from which he graduated in 1855. Setting out on his career, Eiffel specialized in metal construction, most notably bridges. He worked on several over the next few decades, letting mathematics find ways to build lighter, stronger structures.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="723"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="724" data-zone-count="2"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;sizes&quot;:[&quot;970x250&quot;],&quot;classes&quot;:[&quot;is-970x250&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]}, ="">Early Projects</span></h2><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">One of Eiffel's first projects came in 1858 when he oversaw the building of  an iron bridge at Bordeaux, and by 1866 Eiffel had set up his own  company. By the time he designed the arched Gallery of Machines for the  Paris Exhibition of 1867, his reputation was solidified. In 1876,  he designed the 525-foot steel-arched Ponte Maria Pia Bridge over the Douro River in  Oporto, Portugal, which was completed the following year. Working from the same design nearly 20 years later, he  built the renowned 540-foot Garabit viaduct in Truyère, France. Suspended 400 feet above the surface of the water, it was the highest  bridge in the world for years after its construction.</span></p><span data-dcnode-id="708" instrument_node=""> </span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">As his  career advanced, Eiffel moved away from bridge work, such as in 1879 when  he created the dome for the astronomical observatory in Nice, France,  notable in that the dome was movable. That same year, when the Statue of  Liberty's initial internal engineer, Eugène Viollet-le-Duc,  unexpectedly died, Eiffel was hired to replace him on the project. He created a  new support system for the statue that would rely on a skeletal  structure instead of weight to support the copper skin. Eiffel and his team  built the statue from the ground up and then dismantled it for its  journey to New York Harbor.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="703"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="704" data-zone-count="2"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,& vent, 'click', 'phx-track-id', false) &amp;&amp; window.phoenixStopEventPropagation &amp;&amp; phoenixStopEventPropagation(event);" oncontextmenu="return window.phoenixStopEventPropagation &amp;&amp; phoenixStopEventPropagation(event);" phx-track-id="Title" rel=""><h2 aria-level="2" class="m-ellipsis--text m-card--header-text" data-dcnode-id="635" role="heading"><span data-dcnode-id="636" instrument_node="">Ocean Vuong</span></h2></a></phoenix-ellipsis><div class="m-card--metadata" data-dcnode-id="628"><div class="m-card--metadata-a" data-dcnode-id="629"><span class="mm-card-metadata-slot" data-dcnode-id="630"><span class="mm-card--metadata-text" data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">(1988–)</span></span></span></div></div></div></phoenix-card></phoenix-super-link></div></phoenix-non-personalized-recommendations-tracking></section></div></section></section><section data-dcnode-id="599" id="eiffel-tower"><h2 data-dcnode-id="617" id="eiffel-tower"><span data-dcnode-id="618" instrument_node="">Eiffel Tower</span></h2><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Eiffel is most famous for what  would become known as the Eiffel Tower, which was begun in 1887 for the  1889 Universal Exposition in Paris. The tower is composed of 12,000  different components and 2,500,000 rivets, all designed and assembled to  handle wind pressure. The structure is a marvel in material economy,  which Eiffel perfected in his years of building bridges—if it were  melted down, the tower's metal would only fill up its base about two and  a half inches deep.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-2" data-dcnode-id="612"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-2" data-dcnode-id="613" data-zone-count="3"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-c11a49cd8a0847efb42f10b436c3eccb&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-2&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;2&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;2&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-c11a49cd8a0847efb42f10b436c3eccb&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.biography.com/scientist&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="614"></phoenix-ad></div></aside><span data-dcnode-id="611" instrument_node=""> </span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Onlookers were both awed that Eiffel could build  the world's tallest structure (at 984 feet) in just two years and torn  by the tower's unique design, most deriding it as hideously  modern and useless. Despite the tower's immediate draw as a tourist  attraction, only years later did critics and Parisians begin to view the  structure as a work of art.</span></p><span data-dcnode-id="608" instrument_node=""> </span><p data-dcnode-id="603"><span data-dcnode-id="607" instrument_node="">The tower also directed Eiffel's  interest to the field of aerodynamics, and he used the structure for  several experiments and built the first aerodynamic laboratory at its  base, later moving the lab to the outskirts of Paris. The lab included  a wind tunnel, and Eiffel's work there influenced some of  the first aviators, including the Wright Brothers. Eiffel went on to write  several books on aerodynamics, most notably </span><em data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Resistance of the Air and Aviation</span></em><span data-dcnode-id="604" instrument_node="">, first published in 1907.</span></p><span data-dcnode-id="602" instrument_node=""> </span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Eiffel turned his interest to meteorology in his final years, studying the subject at length before his death on December 27, 1923.</span></p></section></section><section class="m-person--factcheck l-person--factcheck" data-dcnode-id="590"><h2 class="m-person--factcheck-hed" data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Fact Check</span></h2><p data-dcnode-id="591"><span data-dcnode-id="595" instrument_node="">We strive for accuracy and fairness. If you see so
