</span><span data-dcnode-id="2203" id="freeTextContainer4016538783383986680"><b data-dcnode-id="2214"><span data-dcnode-id="2221" instrument_node="">Read </span><a data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//agelesspagesreviews.blogspot.com/2011/09/review-lady-of-rivers-by-philippa.html" rel="nofollow noopener"><span data-dcnode-id="2220" instrument_node="">This Review</span></a><span data-dcnode-id="2218" instrument_node=""> &amp; More Like It </span><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/agelesspagesreviews.blogspot.com" rel="nofollow noopener"><span data-dcnode-id="2217" instrument_node="">On My Blog</span></a><span data-dcnode-id="2215" instrument_node="">!</span></b><br data-dcnode-id="2213"><br data-dcnode-id="2212"><br data-dcnode-id="2211"><span data-dcnode-id="2210" instrument_node="">Though not nearly as hair-pullingly irritating as its predecessor </span><i data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">The Red Queen</span></i><span data-dcnode-id="2207" instrument_node="">, (which irritated me so much I didn't even review it. Who wants to read four+ paragraphs of "UGH" and "WHY DOES SHE DO THIS!" and "Shouldn't Margaret of Anjou be the Red Queen NOT Margaret Beaufort?") </span><i data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="2204" instrument_node=""> has its fair share of problems. This time the story follows Jacquetta of Luxembourg, Dowager Duchess of Bedford, historically remembered most as the moth</span></span><span data-dcnode-id="2202" instrument_node="">
</span><span data-dcnode-id="2122" id="freeText4016538783383986680" style="display:none"><b data-dcnode-id="2194"><span data-dcnode-id="2201" instrument_node="">Read </span><a data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//agelesspagesreviews.blogspot.com/2011/09/review-lady-of-rivers-by-philippa.html" rel="nofollow noopener"><span data-dcnode-id="2200" instrument_node="">This Review</span></a><span data-dcnode-id="2198" instrument_node=""> &amp; More Like It </span><a data-dcnode-id="2196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/agelesspagesreviews.blogspot.com" rel="nofollow noopener"><span data-dcnode-id="2197" instrument_node="">On My Blog</span></a><span data-dcnode-id="2195" instrument_node="">!</span></b><br data-dcnode-id="2193"><br data-dcnode-id="2192"><br data-dcnode-id="2191"><span data-dcnode-id="2190" instrument_node="">Though not nearly as hair-pullingly irritating as its predecessor </span><i data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">The Red Queen</span></i><span data-dcnode-id="2187" instrument_node="">, (which irritated me so much I didn't even review it. Who wants to read four+ paragraphs of "UGH" and "WHY DOES SHE DO THIS!" and "Shouldn't Margaret of Anjou be the Red Queen NOT Margaret Beaufort?") </span><i data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="2184" instrument_node=""> has its fair share of problems. This time the story follows Jacquetta of Luxembourg, Dowager Duchess of Bedford, historically remembered most as the mother of Elizabeth Woodville, the wife of King Edward IV of England. This novel has an additional focus on witchcraft/charms/herbs that the previous novels lack (exception: </span><i data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">The Queen's Fool</span></i><span data-dcnode-id="2181" instrument_node=""> [Tudor Series #4] has a supernatural element for the main character as well, but less hackneyed and also less of a deux ex machina) - and a move I cannot fully support. Using the legend of the mermaid-like Melusine/a as an ancestor to Jacquetta's House (a "fact" which was repeated ad nauseam - one reviewer was keeping a count of mentions and I stopped paying attention after #20) to justify this fantastical element, Jacquetta is shown to be quite adept as well as having considerable powers. I felt that reducing Jacquetta's hard-won influence and knowledge to a charlatan-like propensity to "read the cards" did the character a serious disservice. If the author wants to write a strong, determined historical fiction about a woman in the 1500s - by all means do so! But don't reduce her accomplishments and feats by flavoring the success with "magic". I also was out off by some inconsistencies within the novel (I am not even </span><b data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">touching</span></b><span data-dcnode-id="2178" instrument_node=""> historical inaccuracies) such as Richard being referred to as a squire, a knight, and then a squire once more without any mention as to a knighting ceremony or why he would've been reduced to the status of a squire after achieving knighthood.</span><br data-dcnode-id="2177"><br data-dcnode-id="2176"><span data-dcnode-id="2175" instrument_node="">Self-important and strident, Jacquetta is not the typical woman of her times (the novel begins in 1430) and the message that she, and strong, commanding women like her, are not welcome and face death for their knowledge. Gregory uses several famous women to illustrate this point - repeatedly - throughout the novel. Joan of Arc(!), Duchess Eleanor of Gloucester, and the even the proud Cecily Neville are all brought low before her eyes, seemingly just to teach Jacquetta caution. I can't say I cared too much for this version of Jacquetta, though I did warm to her particularly in the last fifty pages of the book. She rarely demonstrates a feeling or idea, most of this entire novel is "told" rather than shown. Having married her first husband's squire (Robert Woodville) for love, I found a sad lack of chemistry between the two. Example: how do I know Jacquetta loves Richard? She says she does. That's it, that's all; no real emotion or demonstrances of genuine affection. Stiff and awkward dialog along with clunky exposition do the two lovers no favors either. The first-person perspective was well-used, and Gregory even manages to show a battle scene without randomly/abruptly changing perspective and locales. It also helps that Jacquetta, though often annoying and slightly ridiculous is far easier to read than Margaret Beaufort's cold arrogance in </span><i data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">The Red Queen</span></i><span data-dcnode-id="2172" instrument_node="">.</span><br data-dcnode-id="2171"><br data-dcnode-id="2170"><span data-dcnode-id="2169" instrument_node="">Gregory does a fine job with the atmosphere of the story, as she usually does. There's a decent amount of tension constantly teeming around Jacquetta: her witchcraft/magic abilities, her illegal marriage, her husband is far sent away (again and again), birthing 16 (!!!!) children, running from battles, her fear of persecution, etc. For all my complaints, I will say that this is far from a staid novel; the kickoff to the War of Roses is excellent fodder for suspense and ridiculous amounts of tension between royal houses. The frequent and bloody battle scenes add much to the feel of the novel, creating a dark and foreboding air. Intrigue among the court is what Gregory does best and the novel succeeds the most when it is within the confines of the scheming court. While the writing itself can be stiff and overly formal, I noticed less and less over the book. Whether it's because the quality of the writing itself improved or I adjusted to Gregory's "style" is up for debate. I do find the random jumps in the chronology (a year here, three years there) to be very distracting from the flow of the narrative and also FULL of info-dumping. Short, very pointed chapters explain away the missing years but left me feeling very dissatisfied. For instance after Jacquetta marries Robert without permission (a rather big no-no for a Duchess), the story completely skips over the intervening years of poverty and struggle and instead flashes forward to when the newlyweds are re-welcomed at Court. I felt slightly cheated by this particular jump; Jacquetta struggling to earn a living versus the entitled pampered life she led before would have provided a nice dichotomy between the lifestyles of the rich and the poor of England.</span><br data-dcnode-id="2168"><br data-dcnode-id="2167"><span data-dcnode-id="2166" instrument_node="">A novel that both entertains and irritates, Gregory uses a lot of the same "tricks" that so many deride her over. There is the constant repetition of names with titles, of past accomplishments, who is related to whom... as if she has no faith in her readership to tell characters apart. Added to explanations of "why" and "how" people do things instead of </span><i data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">showing</span></i><span data-dcnode-id="2163" instrument_node=""> them, Gregory can be frustrating to read. I know it's frowned upon to quote from an ARC but this passage exemplifies many readers issues with Gregory:</span><br data-dcnode-id="2162"><br data-dcnode-id="2161"><span data-dcnode-id="2160" instrument_node=""> </span><blockquote data-dcnode-id="2146"><span data-dcnode-id="2159" instrument_node="">"'Edmund Beaufort Duke of Somerset...'</span><br data-dcnode-id="2158"><br data-dcnode-id="2157"><span data-dcnode-id="2156" instrument_node=""> [...]</span><br data-dcnode-id="2155"><br data-dcnode-id="2154"><span data-dcnode-id="2153" instrument_node=""> 'You mean Edmund Beaufort Duke of Somerset? The man who lost us Normandy [...] but for the King's unswerving belief in his kinsman and the Queen's misplaced affection...</span><br data-dcnode-id="2152"><br data-dcnode-id="2151"><span data-dcnode-id="2150" instrument_node=""> [...]</span><br data-dcnode-id="2149"><br data-dcnode-id="2148"><span data-dcnode-id="2147" instrument_node=""> 'I'll be commanded by the man who gave away Normandy. '"</span></blockquote><br data-dcnode-id="2145"><br data-dcnode-id="2144"><br data-dcnode-id="2143"><span data-dcnode-id="2142" instrument_node="">Instead of just using "Edmund" or "Beaufort" or even "Somerset", the man's name has to be supplied twice, along with his title and his most recent accomplishment in the novel. Furthermore, the author even explains why the Duke is so beloved instead of showing so and trusting her readers to pick up on the plotline. Gregory clearly buys into the "Somerset + Margaret of Anjou = Edward, Prince of Wales" theory so why not try to SHOW such instead of having a character narrate the information? I understand this is a historical fiction, so dates/events might get mixed around and changed but underestimating your readers to the point you have to hammer in every title, every detail is insulting.</span><br data-dcnode-id="2141"><br data-dcnode-id="2140"><span data-dcnode-id="2139" instrument_node="">The ending felt, to me, rather abrupt and uneven. The finale of this novel transitions to the very beginning of </span><i data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">The White Queen</span></i><span data-dcnode-id="2136" instrument_node="">: with Jacquetta's beautiful daughter Elizabeth Woodville standing by the road looking to enchant King Edward IV. I had hoped for more time with Jacquetta. I would've preferred less focus on the early years in order to see what Gregory would do with this character later on in the century; I was much more interested in what would happen after the Rivers family switched from Lancaster to the York side. I also wonder why this novel was published third, when it would make the most sense to read first in the series. Not only is it chronologically first,but it is a stronger effort than </span><i data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">The Red Queen</span></i><span data-dcnode-id="2133" instrument_node=""> or </span><i data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">The White Queen</span></i><span data-dcnode-id="2130" instrument_node="">. I think I may be running out of time and affection for Ms. Gregory. I loved her Tudor novels when I first read them sixish years ago (though I'd probably not in a re-read now) but this series has so far done little to make me fall in love. With such a drama-filled, absolutely interesting and dynamic era, I can't help but feel there should be </span><b data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">more</span></b><span data-dcnode-id="2127" instrument_node=""> substance and less drama/dresses to </span><i data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">The Lady in the Rivers</span></i><span data-dcnode-id="2124" instrument_node="">. </span><br data-dcnode-id="2123"></span><span data-dcnode-id="2121" instrument_node="">
</span><a data-dcnode-id="2119" data-text-id="4016538783383986680" href="#" onclick="swapContent($(this));; return false;"><span data-dcnode-id="2120" instrument_node="">...more</span></a><span data-dcnode-id="2118" instrument_node="">

</span><span data-dcnode-id="2019" id="freeTextContainer12443838394897964178"><span data-dcnode-id="2026" instrument_node="">Having caught up with Philippa Gregory’s novels to date earlier this year (bar her pre-TOBG works) and being well aware of the forthcoming publication of her latest books – </span><i data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="2023" instrument_node=""> – I decided to give this a go when I saw an early published version of the novel in duty free at the airport. Whilst there were parts of </span><i data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="2020" instrument_node=""> that I definitely enjoyed, such as some of the imagery and descriptions, I kept running into certain issues. I had initially intended to address</span></span><span data-dcnode-id="2018" instrument_node="">
</span><span data-dcnode-id="1961" id="freeText12443838394897964178" style="display:none"><span data-dcnode-id="2017" instrument_node="">Having caught up with Philippa Gregory’s novels to date earlier this year (bar her pre-TOBG works) and being well aware of the forthcoming publication of her latest books – </span><i data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="2014" instrument_node=""> – I decided to give this a go when I saw an early published version of the novel in duty free at the airport. Whilst there were parts of </span><i data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="2011" instrument_node=""> that I definitely enjoyed, such as some of the imagery and descriptions, I kept running into certain issues. I had initially intended to address these individually, but it swiftly became clear that these were simply the SAME issues cropping up over and over again. Furthermore, these are not problems that are unique to </span><i data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="2008" instrument_node="">, but endemic in </span><i data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">all</span></i><span data-dcnode-id="2005" instrument_node=""> of Gregory’s novels to a greater or lesser extent. There are numerous examples throughout </span><i data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="2002" instrument_node=""> of all my following points, but I'm not going to provide quotes here, so check out my updates as I read along to refer to examples of all of these.</span><br data-dcnode-id="2001"><br data-dcnode-id="2000"><span data-dcnode-id="1999" instrument_node="">Repetition, repetition, repetition. It’s impossible to read a Philippa Gregory novel without running into the infernal repetition. Themes are overdone – in this novel, Melusina crops up by name no less than 26 times, and her importance to Jacquetta’s family and the theme of water is given way more significance than it probably had in the real historical characters’ lives. Characters are often referred to by full name and title, repeatedly, by other characters who know them intimately, almost as if we’ve forgotten who Somerset or Bedford are when they’ve been around for the past 100 pages and we last saw them less than 10 pages ago. Yes, I get it. I don’t need to be hammered over the head with this. I get the feeling that Gregory does this because she thinks her readers won’t be able to keep straight who’s who, but I just feel like I’m being talked down to and not given nearly enough credit as a reader.</span><br data-dcnode-id="1998"><br data-dcnode-id="1997"><span data-dcnode-id="1996" instrument_node="">Repetition may be the most annoying feature of </span><i data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="1993" instrument_node="">, but in my opinion the most fundamental problem with the novel was that far too many historical events are related to us through secondhand narrative and occur "offstage". Frequently, we don’t even get a scene where a character finds out this secondhand information through dialogue with others let alone experiencing it firsthand. Granted, Jacquetta is the novel’s first-person narrator and can’t have experienced every event herself, but even so, surely we can have scenes where she finds out for herself in "live" time? Instead Jacquetta just speaks directly to the reader in narrative and TELLS us what has been going on, on far too many occasions. It’s phrased in such a way that we have no clue how she herself heard about this. As a result I felt like I was asked to buy into an awful lot that I never saw for myself. This is boring. I want to SEE what’s going on, or at least find out at the same time Jacquetta does.</span><br data-dcnode-id="1992"><br data-dcnode-id="1991"><i data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="1988" instrument_node=""> also suffers from rather simplistic use of language. The novel is full of subject-verb sentences, the simplest kind of sentence, and frequently the dialogue between characters felt far too anachronistic. Typos crept in, and I even spotted the occasional Twilightism (problems with the construction of the sentences which alter their meaning). I think a skill of a good historical novellist is to make the characters speak in a way that is authentic to the times, but their sentiments are entirely identifiable – they are modern-minded in some way, but speak in a period-appropriate voice and with period-appropriate attitudes – Philippa Gregory’s characters fail to achieve this. Jacquetta especially sometimes seemed far too modern in her ideas (Gregory really pushes heavily the militant feminist angle this time round) and at other times she seemed quite a simple character, almost foolish. I think reliance on character stupidity to explain an historical event is simply not an enjoyable thing to read compared to a complex but believable and smart motivation/explanation.</span><br data-dcnode-id="1987"><br data-dcnode-id="1986"><span data-dcnode-id="1985" instrument_node="">The historical accuracy is dubious, with fanciful interludes often creeping in, regularly veering into total fantasy. </span><a class="jsShowSpoiler spoilerAction" data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="1978" style="display: none"><span data-dcnode-id="1982" instrument_node="">[I highly doubt that the Duke of Bedford married Jacquetta in order to keep her a virgin so she could be a seer for his experiments into alchemy </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="1979" instrument_node="">]</span></span><span data-dcnode-id="1977" instrument_node="">. And that’s just one example. Again, Gregory appears to do this under the assumption that her readers need to be spoon-fed their history. As if we won't understand the real history if she gives it to us in all its complex, occasionally confusing glory. Either that or she’s a poor writer. Neither scenario is appealing – a poor writer or a writer dumbing down deliberately for her readership. The author bias for or against certain people was not as blatant here as certain other Gregory novels, but it was still obvious who Gregory liked and didn’t like, and they received treatment accordingly. I want complex grey characters, indeed a veritable rainbow. I don’t want caricatures.</span><br data-dcnode-id="1976"><br data-dcnode-id="1975"><span data-dcnode-id="1974" instrument_node="">One of the oddest things about </span><i data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="1971" instrument_node=""> was that there almost didn’t seem to </span><i data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">be</span></i><span data-dcnode-id="1968" instrument_node=""> a plot. It felt like a vehicle to get the book from A (Jacquetta’s childhood) to B (the moment where </span><i data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">The White Queen</span></i><span data-dcnode-id="1965" instrument_node=""> begins), stumbling through the key events like a join-the-dots but without an overall big picture.</span><br data-dcnode-id="1964"><br data-dcnode-id="1963"><span data-dcnode-id="1962" instrument_node="">And that's the bottom line. These same things seem to keep cropping up in Gregory's novels time and again, and frankly by now it's tedious.</span></span><span data-dcnode-id="1960" instrument_node="">

</span><span data-dcnode-id="1852" id="freeTextContainer14141611229270467541"><span data-dcnode-id="1859" instrument_node="">"I put the charm bracelet away in the purse and return it to my jewel case. I don't need a spell to foresee the future; I am going to make it happen."</span><br data-dcnode-id="1858"><span data-dcnode-id="1857" instrument_node="">--Philippa Gregory, The Lady of the Rivers</span><br data-dcnode-id="1856"><br data-dcnode-id="1855"><br data-dcnode-id="1854"><span data-dcnode-id="1853" instrument_node="">The third book in Philippa Gregory's The Cousins' War series is The Lady of the Rivers which chronicles Jaquetta of Luxembourg. While this is the third book in the series I hesitated reading this because I wasn't sure if this particular woman in history would interest me. I read The White Queen, the first b</span></span><span data-dcnode-id="1851" instrument_node="">
</span><span data-dcnode-id="1819" id="freeText14141611229270467541" style="display:none"><span data-dcnode-id="1850" instrument_node="">"I put the charm bracelet away in the purse and return it to my jewel case. I don't need a spell to foresee the future; I am going to make it happen."</span><br data-dcnode-id="1849"><span data-dcnode-id="1848" instrument_node="">--Philippa Gregory, The Lady of the Rivers</span><br data-dcnode-id="1847"><br data-dcnode-id="1846"><br data-dcnode-id="1845"><span data-dcnode-id="1844" instrument_node="">The third book in Philippa Gregory's The Cousins' War series is The Lady of the Rivers which chronicles Jaquetta of Luxembourg. While this is the third book in the series I hesitated reading this because I wasn't sure if this particular woman in history would interest me. I read The White Queen, the first book in the series which follows Elizabeth Woodville, and absolutely LOVED it! The newest and fourth book in the series I actually read next called The Kingmaker's Daughter; this tells the life of Anne Neville, daughter of Richard Neville, Earl of Warwick and eventual wife of Richard III. Again, loved this book. So I decided to go back and read this one and I cannot understand my hesitation. This book was enthralling!</span><br data-dcnode-id="1843"><br data-dcnode-id="1842"><span data-dcnode-id="1841" instrument_node="">I must premise, I am a HUGE English history geek. I have read more books about the Tudors than I care to admit to and am creeping up on that number with this era about the Plantagenets. I also am very hesitant to admit that this family might be stealing the place in my heart that was previously held by the Tudors. They are slowly but surely surpassing them. This is huge. But anyways, I can understand that this type of writing or book might not appeal to everyone but I absolutely cannot get enough of Gregory's writing. I am obsessed with this entire 200 year time period that she has written about and I devour her books like they're fast paced young adult novels; I just love them. </span><br data-dcnode-id="1840"><br data-dcnode-id="1839"><span data-dcnode-id="1838" instrument_node="">So back to Jaquetta, her story starts out very interestingly because while in her uncle's keeping they have captured Joan of Arc. Weird, right? This time in her life and seeing Joan's inevitable fate cements her fear of being caught and tried for witchcraft for the rest of her life. Jaquetta descends from Melusina, the water goddess, and she is blessed (or cursed) with the Sight. Because of this Jaquetta eventually catches the eye of the Duke of Bedford and he proposes marriage. He's about two and a half times her age, her at roughly 15, him at almost forty. And while this is not unheard of in these times, his reason for wanting her is. He does not want her as his bedmate, he will not take her virginity, he does not desire to make an heir, instead he wants her pure in order to use her gift to find the Elixir of Life. </span><br data-dcnode-id="1837"><br data-dcnode-id="1836"><span data-dcnode-id="1835" instrument_node="">This all comes to naught obviously and throughout her marriage she is slowly starting to fall for her husband's squire, Richard Woodville *sigh*. He is handsome, strong, courageous, and kind. After her husband's death, and a little trickery, she finally convinces him to marry her. He was worried he was too far beneath her and would be the ruin of her, but alas, true love prevails and with a heavy fine they are left to their devices and a very happy marriage. </span><br data-dcnode-id="1834"><br data-dcnode-id="1833"><span data-dcnode-id="1832" instrument_node="">The rest of the novel takes us through their lives together which include no less than 12 children, the marriage of Henry VI to Margaret of Anjou, the beginning of the battles of the Cousins' War with Richard, Duke of York, and the eventual demise of Henry and Margaret with the rise of Edward IV of York. </span><br data-dcnode-id="1831"><br data-dcnode-id="1830"><span data-dcnode-id="1829" instrument_node="">I devoured this 437 page novel in about a day and a half...no joke..this is how much I love this stuff. Gregory's writing is so poetic and flowing that you forget you are reading about actual historical events and the drama that goes on rivals any non-historical fiction work out there. Seriously people, the best stories are those rooted in the past.</span><br data-dcnode-id="1828"><br data-dcnode-id="1827"><span data-dcnode-id="1826" instrument_node="">The only negative I have are some of the battle scenes got a little boring to me, but they were not long or drawn out I was just impatient to get to the meat of what happens after. I also reeeeeally wish Gregory would have taken us to the arrest and execution of her husband and son. We get this story both in The White Queen and The Kingmaker's Daughter but I would have love love loved to hear her personal perspective of the situation. Oh well, we can't get everything we wish for. </span><br data-dcnode-id="1825"><br data-dcnode-id="1824"><span data-dcnode-id="1823" instrument_node="">I also love how much power and strength Gregory gives to her heroines. In a time where women were regarded as property of their fathers then husbands then sons, she weaves tale after tale of women rising up and wielding the power that is within their reach. And while some women take things too far and create their own downfall (Anne Boleyn, Margaret of Anjoy, Katherine Howard, etc.), there are those that know how to play the game and solidify their spot in the world (Jaquetta, Elizabeth Woodville, and Elizabeth of York). I find it so interesting how Gregory portrays these strong women of the time and how easily they could have played such major roles of the time but just had to be kept more behind the scenes.</span><br data-dcnode-id="1822"><br data-dcnode-id="1821"><span data-dcnode-id="1820" instrument_node="">Like I said, I cannot get enough of this time period, I mentally swoon over Richard Woodville and Edward IV and I am totally going to now re-read The White Queen so I can re-live, yet again, the courtship and life of Edward IV and Elizabeth Woodville.</span></span><span data-dcnode-id="1818" instrument_node="">

</span><span data-dcnode-id="1313" id="freeTextContainer638383523638569936"><span data-dcnode-id="1317" instrument_node=""> - This review was first published in the November 2011 edition of The Historical Novels Review -</span><br data-dcnode-id="1316"><br data-dcnode-id="1315"><span data-dcnode-id="1314" instrument_node="">Philippa Gregory’s third entry in her Cousins’ Wars series features an unusual character: Jacquetta Woodville, mother of Elizabeth, who in turn gave birth to the princes who disappeared mysteriously in the Tower. In THE LADY OF THE RIVERS, Ms Gregory travels further back in time, bringing us a glimpse of the seeds of the epic conflict that will be known as the War of the Roses. French-born Jacquetta </span></span><span data-dcnode-id="1312" instrument_node="">
</span><span data-dcnode-id="1301" id="freeText638383523638569936" style="display:none"><span data-dcnode-id="1311" instrument_node=""> - This review was first published in the November 2011 edition of The Historical Novels Review -</span><br data-dcnode-id="1310"><br data-dcnode-id="1309"><span data-dcnode-id="1308" instrument_node="">Philippa Gregory’s third entry in her Cousins’ Wars series features an unusual character: Jacquetta Woodville, mother of Elizabeth, who in turn gave birth to the princes who disappeared mysteriously in the Tower. In THE LADY OF THE RIVERS, Ms Gregory travels further back in time, bringing us a glimpse of the seeds of the epic conflict that will be known as the War of the Roses. French-born Jacquetta first weds an older duke more interested in her supernatural gifts than her physical ones; upon his death, she defies convention to find love with his squire, whose loyalty to the crown brings them heavy responsibilities. </span><br data-dcnode-id="1307"><br data-dcnode-id="1306"><span data-dcnode-id="1305" instrument_node="">Through Jacquetta’s eyes, we’re given a wide-angle view of the lethal intrigues that plague the English court, where a young, weakling king is manipulated by his nobles, and accusations of witchcraft are wielded to destroy opponents. The end of the Hundred Years’ War, when England lost its territories in France, offers a compelling backdrop to Jacquetta’s personal trials as she endures repeated separations from her husband and witnesses the depredations of power-hungry courtiers. When her fortunes increase with the arrival of Margaret of Anjou, a princess brought to wed the king, the novel becomes more intimate, as well. </span><br data-dcnode-id="1304"><br data-dcnode-id="1303"><span data-dcnode-id="1302" instrument_node="">Margaret is a compelling character who steals the show— not yet the Lancastrian virago of legend, Gregory depicts her as a brash, beautiful girl tethered to a man better suited to prayer than bed play; Margaret’s vulnerability and fallible relationship with Jacquetta bring humanity to the crowded historical events. Jacquetta’s magical gifts are underplayed except for one crucial episode; and her astounding fertility and perennial passion for her husband, as well as her keen insight, center her as a voice of reason in a complex, treacherous era. </span></span><span data-dcnode-id="1300" instrument_node="">

</span><span data-dcnode-id="521" id="freeTextContainer12730193632469410972"><span data-dcnode-id="530" instrument_node="">Philippa Gregory is one of the world’s foremost historical novelists. She wrote her first ever novel, </span><i data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Wideacre</span></i><span data-dcnode-id="527" instrument_node="">, when she was completing her PhD in eighteenth-century literature and it sold worldwide, heralding a new era for historical fiction.</span><br data-dcnode-id="526"><br data-dcnode-id="525"><span data-dcnode-id="524" instrument_node="">Her flair for blending history and imagination developed into a signature style and Philippa went on to write many bestselling novels, including&nbsp;</span><i data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">The Other Bo</span></i></span><span data-dcnode-id="520" instrument_node="">
</span><span data-dcnode-id="488" id="freeText12730193632469410972" style="display:none"><span data-dcnode-id="519" instrument_node="">Philippa Gregory is one of the world’s foremost historical novelists. She wrote her first ever novel, </span><i data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Wideacre</span></i><span data-dcnode-id="516" instrument_node="">, when she was completing her PhD in eighteenth-century literature and it sold worldwide, heralding a new era for historical fiction.</span><br data-dcnode-id="515"><br data-dcnode-id="514"><span data-dcnode-id="513" instrument_node="">Her flair for blending history and imagination developed into a signature style and Philippa went on to write many bestselling novels, including&nbsp;</span><i data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">The Other Boleyn Girl</span></i><span data-dcnode-id="510" instrument_node=""> and </span><i data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">The White Queen</span></i><span data-dcnode-id="507" instrument_node="">.</span><br data-dcnode-id="506"><br data-dcnode-id="505"><span data-dcnode-id="504" instrument_node="">Now a recognised authority on women’s history, Philippa graduated from the University of Sussex and received a PhD from the University of Edinburgh, where she is a Regent and was made Alumna of the Year in 2009. She holds honorary degrees from Teesside University and the University of Sussex. She is a fellow of the Universities of Sussex and Cardiff and an honorary research fellow at Birkbeck University of London.</span><br data-dcnode-id="503"><br data-dcnode-id="502"><span data-dcnode-id="501" instrument_node="">Philippa is a member of the Society of Authors and in 2016, was presented with the Outstanding Contribution to Historical Fiction Award by the Historical Writers’ Association. In 2018, she was awarded an Honorary Platinum Award by Nielsen for achieving significant lifetime sales across her entire book output.</span><br data-dcnode-id="500"><br data-dcnode-id="499"><span data-dcnode-id="498" instrument_node="">She welcomes visitors to her site </span><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.philippagregory.com/" rel="nofollow noopener"><span data-dcnode-id="497" instrument_node="">www.PhilippaGregory.com</span></a><span data-dcnode-id="495" instrument_node="">.</span><br data-dcnode-id="494"><br data-dcnode-id="493"><span data-dcnode-id="492" instrument_node="">Philippa's Facebook page:</span><br data-dcnode-id="491"><a data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/PhilippaGregoryOfficial/" rel="nofollow noopener"><span data-dcnode-id="490" instrument_node="">https://www.facebook.com/PhilippaGregoryOfficial</span></a></span><span data-dcnode-id="487" instrument_node="">
