</span><span data-dcnode-id="4944" id="freeTextContainer3874944732355388863"><i data-dcnode-id="4948"><span data-dcnode-id="4949" instrument_node="">“Any woman who dares to make her own destiny will always put herself in danger.” </span></i><br data-dcnode-id="4947"><br data-dcnode-id="4946"><span data-dcnode-id="4945" instrument_node="">This was my first Philippa Gregory novel, and my first historical novel this year. (Although I tried to read Outlander. But I put it aside after 200 pages because it was sexist.) I fully enjoyed this book and am super intrigued to continue this series. The British Royals and their history always sparked an interest in me and while this novel satisfied me 100%, it also made my hunger even bigger. Since my knowledge o</span></span><span data-dcnode-id="4943" instrument_node="">
</span><span data-dcnode-id="4922" id="freeText3874944732355388863" style="display:none"><i data-dcnode-id="4941"><span data-dcnode-id="4942" instrument_node="">“Any woman who dares to make her own destiny will always put herself in danger.” </span></i><br data-dcnode-id="4940"><br data-dcnode-id="4939"><span data-dcnode-id="4938" instrument_node="">This was my first Philippa Gregory novel, and my first historical novel this year. (Although I tried to read Outlander. But I put it aside after 200 pages because it was sexist.) I fully enjoyed this book and am super intrigued to continue this series. The British Royals and their history always sparked an interest in me and while this novel satisfied me 100%, it also made my hunger even bigger. Since my knowledge of British (or basically any) history is basically nonexistent, historical books always manage to captivate me. Since the events are real and Google knows everything it's a challenge not to look everything up right away.</span><br data-dcnode-id="4937"><br data-dcnode-id="4936"><span data-dcnode-id="4935" instrument_node="">Philippa Gregory's writing is fantastic, romantic and wise. There are so many beautiful quotes in this book. Since it's an adult, historical novel in English it took me a while longer to read than your typical YA story, but I still loved it lots.</span><br data-dcnode-id="4934"><span data-dcnode-id="4933" instrument_node="">I also love the portrayal of the main character and any other woman in this book. Yes, it's the 15th century and women had no rights whatsoever. But while keeping everything historically accurate, the author still managed to write a powerful, independent and intelligent woman. Jacquetta was aware that, as a woman between many power-hungry men, she needed to tread carefully, but she never lost her dignity. (Not like some other female main character, who jumped back in time, and let her husband hit her just to forgive him a second later. And that was supposedly 300 years after Jacquetta lived. Never again tell me historical accuracy needs women to be disrespected.)</span><br data-dcnode-id="4932"><br data-dcnode-id="4931"><span data-dcnode-id="4930" instrument_node="">The never-ending power game, the back and forth between running and ruling are somewhat tiring but that isn't Philippa Gregory's fault. These royals are incredibly stubborn and often too stupid to rule a country.</span><br data-dcnode-id="4929"><br data-dcnode-id="4928"><span data-dcnode-id="4927" instrument_node="">What frightens me is the sheer size of this series. I doubt that I will finish it in the next few years, but I will continue it for sure.</span><br data-dcnode-id="4926"><br data-dcnode-id="4925"><a data-dcnode-id="4923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/kaispellmeier/" rel="nofollow noopener"><span data-dcnode-id="4924" instrument_node="">Find more of my books on Instagram</span></a></span><span data-dcnode-id="4921" instrument_node="">

</span><span class="readable" data-dcnode-id="4793" id="reviewTextContainer405310293"><span data-dcnode-id="4830" instrument_node="">
</span><span data-dcnode-id="4825" id="freeTextContainer17871144082364092703"><span data-dcnode-id="4829" instrument_node="">I have been fascinated by the Tudors and Plantagenets most of my life. I knew the various kings and queens, as well as how they ascended to the throne. But to focus on all the women behind the scenes and then in front of the scenes was a fantastic approach. Definitely will continue this series.</span><br data-dcnode-id="4828"><br data-dcnode-id="4827"><span data-dcnode-id="4826" instrument_node="">The setting and the descriptions are magical. You feel transported to the time frame. You are half in a bit of shock and a bit of concern, all knowing some of this actually happened. Of course, some of it </span></span><span data-dcnode-id="4824" instrument_node="">
</span><span data-dcnode-id="4798" id="freeText17871144082364092703" style="display:none"><span data-dcnode-id="4823" instrument_node="">I have been fascinated by the Tudors and Plantagenets most of my life. I knew the various kings and queens, as well as how they ascended to the throne. But to focus on all the women behind the scenes and then in front of the scenes was a fantastic approach. Definitely will continue this series.</span><br data-dcnode-id="4822"><br data-dcnode-id="4821"><span data-dcnode-id="4820" instrument_node="">The setting and the descriptions are magical. You feel transported to the time frame. You are half in a bit of shock and a bit of concern, all knowing some of this actually happened. Of course, some of it is fully made up... but to know these people were real and these women gave birth to and raised Kings and Queens. And some even became Queen themselves.</span><br data-dcnode-id="4819"><br data-dcnode-id="4818"><span data-dcnode-id="4817" instrument_node="">I almost wish I could be a fly on a wall some 4oo+ years ago to see what was really going on!</span><br data-dcnode-id="4816"><br data-dcnode-id="4815"><b data-dcnode-id="4807"><span data-dcnode-id="4814" instrument_node="">
</span><i data-dcnode-id="4809"><span data-dcnode-id="4813" instrument_node="">

</span></i><span data-dcnode-id="4808" instrument_node="">
</span></b><br data-dcnode-id="4806"><span data-dcnode-id="4805" instrument_node="">For those new to me or my reviews... here's the scoop: I read A LOT. I write A LOT. And now I blog A LOT. First the book review goes on Goodreads, and then I send it on over to my WordPress blog at </span><a data-dcnode-id="4803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thisismytruthnow.com/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="4804" instrument_node="">https://thisismytruthnow.com</span></a><span data-dcnode-id="4802" instrument_node="">, where you'll also find TV &amp; Film reviews, the revealing and introspective 365 Daily Challenge and lots of blogging about places I've visited all over the world. And you can find all my social media profiles to get the details on the who/what/when/where and my pictures. Leave a comment and let me know what you think. Vote in the poll and ratings. Thanks for stopping by. </span><i data-dcnode-id="4800"><span data-dcnode-id="4801" instrument_node="">Note</span></i><span data-dcnode-id="4799" instrument_node="">: All written content is my original creation and copyrighted to me, but the graphics and images were linked from other sites and belong to them. Many thanks to their original creators.</span></span><span data-dcnode-id="4797" instrument_node="">

</span><span data-dcnode-id="4683" id="freeTextContainer13043415874252297102"><span data-dcnode-id="4687" instrument_node="">I have a problem with authors thinking that they have to reach a larger mass audience once they are popular. It is comparable to a musician who “sells out”. The Lady of the Rivers certainly portrayed a dummied down storyline which started with the immediate opener. Perhaps Gregory is so popular now, that she took away much of the magic so evident in some of her earlier works to reach a wider audience. </span><br data-dcnode-id="4686"><br data-dcnode-id="4685"><span data-dcnode-id="4684" instrument_node="">The theme of my complaints against The Lady of the Rivers is the lack of depth. Admittedly, thi</span></span><span data-dcnode-id="4682" instrument_node="">
</span><span data-dcnode-id="4655" id="freeText13043415874252297102" style="display:none"><span data-dcnode-id="4681" instrument_node="">I have a problem with authors thinking that they have to reach a larger mass audience once they are popular. It is comparable to a musician who “sells out”. The Lady of the Rivers certainly portrayed a dummied down storyline which started with the immediate opener. Perhaps Gregory is so popular now, that she took away much of the magic so evident in some of her earlier works to reach a wider audience. </span><br data-dcnode-id="4680"><br data-dcnode-id="4679"><span data-dcnode-id="4678" instrument_node="">The theme of my complaints against The Lady of the Rivers is the lack of depth. Admittedly, this novel is a fast page-turner but solely because it is easy to read and has very short chapters (several were only one page); and not because it is overly intriguing or capturing. The book is rather slow in the beginning (even by page 109, I was bored) and it was obvious that this is because Gregory didn’t have much research to include. Is it a coincidence that the latter part of the book is more interesting and not as sparse when describing the battles? Not at all. Sadly, even the events which were described appeared glossed over which relates back to the lack of depth element. </span><br data-dcnode-id="4677"><br data-dcnode-id="4676"><span data-dcnode-id="4675" instrument_node="">Although Jacquetta is the main character, her character development is extremely weak, to say the least. Her inner feelings and actions never felt fully disclosed and understood, making her seem very one-dimensional. Moreover, many of the other female characters also felt very demeaned and ill-described. Joan of Arc was portrayed quite foolishly and Margaret of Anjou was even more annoying than usual. Margaret of Anjou is already “known” as being villainous but at least she has drama and depth. In The Lady of the Rivers, she just comes off as a spoiled teenager in a teen film. Plus, more of the book was about Margaret of Anjou than Jacquetta. I found this all to be disappointing because none of the characters were likable or encouraged support. Imagine a star-studded ensemble cast in a movie but with a terrible plot and poor acting. That is the best way to describe this book. </span><br data-dcnode-id="4674"><br data-dcnode-id="4673"><span data-dcnode-id="4672" instrument_node="">Sadly, even the proposed highlights were unsatisfying. Moments in the plot which were meant to be “strong” such as Richard Woodville declaring his love to Jacquetta; were elementary, rushed, and so predictable that I actually rolled my eyes. The inescapability caused the story to be very difficult to “get into”. I have to admit, there were SOME strong points throughout but I have to judge the novel on the whole, and overall, the momentous events covered (Hundred Years War, Wars of the Roses) were barely even scraped in potential by Gregory. The Lady of the Rivers is more of a summary of these events or YA novel. </span><br data-dcnode-id="4671"><br data-dcnode-id="4670"><span data-dcnode-id="4669" instrument_node="">Some contradictory points were also evident. For example: the novel stressed that the Earl of Suffolk opposed Margaret’s marriage to Henry but then about a page later said that he predicted its success. Um… sure. I also have to ask, did they actually say “hi” during this time period? Jacquetta surely did in this novel. I may not be a linguistic expert but never, ever, have I come across the word “hi” in any other Plantagenet or Tudor novel and I have read countless sources. This bothered me. Also, the churching ceremony appeared to be described in the manner of the rules set forth by Margaret Beaufort which she obviously didn’t do yet at the time of this novel. </span><br data-dcnode-id="4668"><br data-dcnode-id="4667"><span data-dcnode-id="4666" instrument_node="">Let’s not even get into the complaint which is evident by all readers across the board: the overuse of the titles (ie. “My lord, the Duke of Bedford”).</span><br data-dcnode-id="4665"><br data-dcnode-id="4664"><span data-dcnode-id="4663" instrument_node="">The end of the book was the best, similarly to how the Battle of Bosworth scene at the end of The Red Queen was surely the highlight and climax. It also set the lead-in to The White Queen quite seamlessly, especially if one would want to re-read it after The Lady of the Rivers. </span><br data-dcnode-id="4662"><br data-dcnode-id="4661"><span data-dcnode-id="4660" instrument_node="">I will give Gregory credit where credit is due that she attempted to cover a person who doesn’t have a million biographies or sources available on her. Jacquetta is a lesser known individual and I support bringing the “underdogs” to the table. I admit that I may be a little harsh and that I shouldn’t expect a thorough novel when such little information is available. However, Gregory should have instead transversed this as a novel about Margaret of Anjou, then. I do support the effort, however. </span><br data-dcnode-id="4659"><br data-dcnode-id="4658"><span data-dcnode-id="4657" instrument_node="">Overall, not AS terrible as I suspected but definitely a dummied down version. Either Gregory is losing her spark or I’m just slipping out of the target market. </span><br data-dcnode-id="4656"></span><span data-dcnode-id="4654" instrument_node="">

</span><span data-dcnode-id="4446" id="freeTextContainer1902876122293915345"><span data-dcnode-id="4456" instrument_node="">I’ve always had a love hate relationship with Philippa Gregory. Sometimes she does what she does extraordinarily well, and sometimes she writes crap like this. </span><br data-dcnode-id="4455"><br data-dcnode-id="4454"><span data-dcnode-id="4453" instrument_node="">I really struggled with this one. I just found Jacquetta’s story </span><b data-dcnode-id="4448"><span data-dcnode-id="4452" instrument_node="">

</span><span data-dcnode-id="4386" id="freeText1902876122293915345" style="display:none"><span data-dcnode-id="4444" instrument_node="">I’ve always had a love hate relationship with Philippa Gregory. Sometimes she does what she does extraordinarily well, and sometimes she writes crap like this. </span><br data-dcnode-id="4443"><br data-dcnode-id="4442"><span data-dcnode-id="4441" instrument_node="">I really struggled with this one. I just found Jacquetta’s story </span><b data-dcnode-id="4436"><span data-dcnode-id="4440" instrument_node="">
</span><u data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">SO</span></u><span data-dcnode-id="4437" instrument_node="">
</span></b><span data-dcnode-id="4435" instrument_node=""> uninteresting. When I was reading it I couldn’t help but wonder how better this series would have been if Margaret of Anjou had her own novel. This way another perspective of the wars would have been covered. Moreover, this isn’t even chronological with the previous two books or the one after it; it’s just a random prequel stuck in the middle. It’s strange, and, if anything, it disrupts the series.</span><br data-dcnode-id="4434"><br data-dcnode-id="4433"><b data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node=""> I want more Margaret! Give me more Margaret!</span></b><br data-dcnode-id="4430"><br data-dcnode-id="4429"><span data-dcnode-id="4428" instrument_node=""> </span><img alt="description" class="gr-hostedUserImg" data-dcnode-id="4427" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1454611687ra/17991802.gif&amp;raw" width="400"><br data-dcnode-id="4426"><br data-dcnode-id="4425"><span data-dcnode-id="4424" instrument_node="">This really isn’t the best reaction to have to a book of this type. If you’re immediately wishing for a different character, then you know something isn’t quite right. Jacquetta’s story had the potential to be interesting because of the suggestions of witchcraft. But, it was all too vague. The author couldn’t directly allude to the fact that she was or wasn’t a witch. Witchcraft is obviously fictional, and this is a realism novel so she couldn’t say she had magic. Nor could she say that she wasn’t because of the rumours. This resulted in a disappointing dynamic. I wish she went with either side of the picture because what we’re left is a character who doesn’t actually seem to know what she is or isn’t. It was a little bit weird.</span><br data-dcnode-id="4423"><br data-dcnode-id="4422"><span data-dcnode-id="4421" instrument_node="">This just needed more Margaret of Anjou. In the other books the characters view her as the villain; she is simply the “bad queen.” Only in this book does Philippa Gregory bother to show a glimpse of her story. I think it would have been incredibly interesting to see how she interpreted the events, and that way I think we would have had a fairly overall picture of the war. Well, at least from the perspective of the powerful women/queens. So far, York and the Tudor faction of the house of Lancaster have had their story told. But, Margaret of Anjou remains a quiet bystander to the events. Where is her voice? Where is her tale? Her minor part in this novel was not enough; this novel was not enough to establish her presence in this series. </span><br data-dcnode-id="4420"><br data-dcnode-id="4419"><b data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node=""> A weak story when Margaret went </span></b><br data-dcnode-id="4416"><br data-dcnode-id="4415"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="4414" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1454611764ra/17991825.gif&amp;raw" width="400"><span data-dcnode-id="4413" instrument_node=""> </span><br data-dcnode-id="4412"><br data-dcnode-id="4411"><span data-dcnode-id="4410" instrument_node="">This book was also, undoubtedly, too long. Some of the chapters were packed out and far too long, the opening was terrible; it was the worse beginning in the series. The romance was okay. It felt secretive and at the same time realistic. But, I just didn’t care about it. It didn’t feel relevant to the major events. I wanted to see the Cousins War, the Wars of the Roses, and how it affected the lives of the overlooked women in positions of power and persuasion. This was a random tangent to the story, one that I needn’t have read. This was, definitely, the bad egg in this series. </span><br data-dcnode-id="4409"><br data-dcnode-id="4408"><span data-dcnode-id="4407" instrument_node="">I just felt that there was far too much wrong with this book for me to enjoy it. It lacked a lot of the politics, and conniving characters of the previous two books. It also lacked any sense of narrative drive; I had no real reason to carry on reading this after Margret left the scene. This was too unlike the rest of the series for it to feel like it was actually part of the series. Jacquetta’s characterisation was too weak and confused for it to evoke any investment. I didn’t like this book, but the rest of the series is really good. Well, except for the last book, </span><i data-dcnode-id="4405"><span data-dcnode-id="4406" instrument_node=""> The King’s Curse</span></i><span data-dcnode-id="4404" instrument_node="">, but I’ll get to that at a later date. </span><br data-dcnode-id="4403"><br data-dcnode-id="4402"><u data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">The Cousin's War Series </span></u><br data-dcnode-id="4399"><span data-dcnode-id="4398" instrument_node="">1. The White Queen- </span><a data-dcnode-id="4396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/" rel="nofollow noopener"><span data-dcnode-id="4397" instrument_node="">A strong four stars</span></a><br data-dcnode-id="4395"><span data-dcnode-id="4394" instrument_node="">2. The Red Queen- </span><a data-dcnode-id="4392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/826636241" rel="nofollow noopener"><span data-dcnode-id="4393" instrument_node="">A fair three stars</span></a><br data-dcnode-id="4391"><span data-dcnode-id="4390" instrument_node="">3. The Lady of the Rivers- </span><b data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node=""> A Margaretless two stars</span></b><br data-dcnode-id="4387"></span><span data-dcnode-id="4385" instrument_node="">

</span><span data-dcnode-id="4263" id="freeText11078190899421634033" style="display:none"><span data-dcnode-id="4271" instrument_node="">The Lady of the Rivers (The Plantagenet and Tudor Novels, #1; Cousins War #3), Philippa Gregory</span><br data-dcnode-id="4270"><span data-dcnode-id="4269" instrument_node="">The Lady of the Rivers is a 2011 historical novel by Philippa Gregory, part of her series The Cousins' War. The story is narrated by Jacquetta of Luxembourg, mother of Elizabeth Woodville, and covers the reign of the Lancastrian King Henry VI. The novel serves as a prequel to Gregory's The White Queen (2009), the story of Elizabeth's reign as Queen consort of England.</span><br data-dcnode-id="4268"><span data-dcnode-id="4267" instrument_node="">Fourteen-year-old Jacquetta, whose noble family claims descendance from the water goddess Melusine, learns the secrets of her inherited powers from her great-aunt Jehanne, the Demoiselle of Luxembourg. Jacquetta befriends Joan of Arc, who is a prisoner at her uncle's castle, but later watches in horror as Joan is burned at the stake by the English-backed church. Three years later at age 17, Jacquetta is given in marriage to John, Duke of Bedford, the uncle to King Henry VI and the English regent in France. On their wedding night, however, the Duke explains that he wishes to keep her a virgin so that she may use the powers of her family in their purest form in his alchemical experiments seeking the ability to turn iron into gold. He later dies and leaves Jacquetta a wealthy widow at 20. She and the Duke's handsome squire Richard Woodville realize that they have fallen in love and become lovers. Returning to England, they marry in secret before the king can remarry her to someone else. Exiled from court in disgrace, Jacquetta and Richard soon have their first child, Elizabeth. ...</span><br data-dcnode-id="4266"><br data-dcnode-id="4265"><span data-dcnode-id="4264" instrument_node="">ا. شربیانی</span></span><span data-dcnode-id="4262" instrument_node="">

</span><span data-dcnode-id="4177" id="freeTextContainer12669268973687229123"><b data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">**This review may be considered slightly spoilerish so enter at your own risk**</span></b><br data-dcnode-id="4180"><br data-dcnode-id="4179"><span data-dcnode-id="4178" instrument_node="">Lady of the Rivers is the third book in Gregory's Cousins' War series, and focuses on Jacquetta of Luxembourg. While staying in France with her uncle, Jacquetta *meets* imprisoned Joan of Arc and the two share some BFF time together with the tarot cards and the wheel of fortune. After Joan meets her unhappy end, the beauteous Jacquetta catches the eye of the powerful Duke of Bedford, uncle to young king Henry VI. Jacq</span></span><span data-dcnode-id="4176" instrument_node="">
</span><span data-dcnode-id="4148" id="freeText12669268973687229123" style="display:none"><b data-dcnode-id="4174"><span data-dcnode-id="4175" instrument_node="">**This review may be considered slightly spoilerish so enter at your own risk**</span></b><br data-dcnode-id="4173"><br data-dcnode-id="4172"><span data-dcnode-id="4171" instrument_node="">Lady of the Rivers is the third book in Gregory's Cousins' War series, and focuses on Jacquetta of Luxembourg. While staying in France with her uncle, Jacquetta *meets* imprisoned Joan of Arc and the two share some BFF time together with the tarot cards and the wheel of fortune. After Joan meets her unhappy end, the beauteous Jacquetta catches the eye of the powerful Duke of Bedford, uncle to young king Henry VI. Jacquetta's worries about being ravished by her older husband come to naught as he's more interested in using Jacquetta's virginal qualities to aid his experiments - experiments that have something to do with alchemy, the philosopher's stone and the unicorn. If you are scratching your head over this, rest assured I was doing the same thing. I didn't understand it then and I don't understand it now.</span><br data-dcnode-id="4170"><br data-dcnode-id="4169"><span data-dcnode-id="4168" instrument_node="">Her older husband eventually dies and Jacquetta waits for the King's councilers to choose another husband after her year of mourning. John's squire Richard Woodville has other ideas, and Jacquetta is willing to risk the king's wrath for the sake of true love. The marriage is a fruitful one and Jacquetta spends lots of time in the country producing one baby after another (yawn). The wheel of fortune spins again when the king marries Margaret of Anjou and Jacquetta is summoned to serve the new Queen, but that marriage isn't exactly smooth sailing, and one thing leads to another until a little dispute erupts between the houses of Lancaster and York.</span><br data-dcnode-id="4167"><br data-dcnode-id="4166"><span data-dcnode-id="4165" instrument_node="">That's about as much plot summary you'll get from me, I'd rather discuss the reading experience, starting with the repetitive text. The Melusine count exceeded twenty, and that's not counting the water/river/fishy woman references or the tally would be much higher. There are times when nothing much happens in Jacquetta and Richard's lives (making babies, cooling heels in Calais for a year waiting for the king to do something), and it would have served the story better just to fast forward a few years with a brief mention rather than more tedious detail on what isn't happening.</span><br data-dcnode-id="4164"><br data-dcnode-id="4163"><span data-dcnode-id="4162" instrument_node="">I don't understand the great need to repeat same words three times in a single sentence, </span><b data-dcnode-id="4160"><span data-dcnode-id="4161" instrument_node="">over and over and over again</span></b><span data-dcnode-id="4159" instrument_node=""> (can't quote examples from the ARC, sorry). Then there are the mind-numbing reminders to the reader of who is who via the *as you know, Bob* method. Any time Jacquetta mentions her first husband in a conversation he is always my Lord John, Duke of Bedford. Margaret will mention her uncle in a conversation with an intimate friend as my uncle, the king of France (I think everyone at court would know that she was niece to the king of France). And Richard of York, reviled by all the Lancastrians is always always always (see, I can do things in threes) Richard Duke of York. Every time. I got it the first time, and did not need to be clubbed over the head with it :(</span><br data-dcnode-id="4158"><br data-dcnode-id="4157"><span data-dcnode-id="4156" instrument_node="">The characters were all rather *meh*, neither good nor bad, just incredibly uninteresting. Instead of filling us in on the politics and intrigues of the court that caused these wars, we get endless exposition on the court on progress, as well as how </span><s data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">Edmund Beaufort Duke of </span></s><span data-dcnode-id="4153" instrument_node="">Somerset dotes on Margaret of Anjou, bringing her all those sweet little presents. All in all, a very disappointing read and not one I'd recommend for those wanting more background and insight into the Wars of the Roses - there are much better choices out there with Penman's fabulous Sunne in Splendor still being the gold standard. Library only, then buy it if you love it. Two stars.</span><br data-dcnode-id="4152"><br data-dcnode-id="4151"><span data-dcnode-id="4150" instrument_node="">**This review is based upon a digital ARC received from Net Galley and might differ from the final edition.</span><br data-dcnode-id="4149"></span><span data-dcnode-id="4147" instrument_node="">

</span><span data-dcnode-id="3973" id="freeText7226586858418403167" style="display:none"><span data-dcnode-id="4030" instrument_node="">I really did enjoy reading this Cousins War installment featuring Jacquetta, The Lady Rivers, even though each time I had to key the name of the book into Goodreads, I typed </span><i data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">“The Lady of Shallott”</span></i><span data-dcnode-id="4027" instrument_node=""> :) I'm a sucker for that poem!</span><br data-dcnode-id="4026"><span data-dcnode-id="4025" instrument_node=""> </span><br data-dcnode-id="4024"><span data-dcnode-id="4023" instrument_node="">My only grizzle is that being numbered Cousins War #3, you would think that it would be following in a chronological sense after The White Queen and The Red Queen but this is not so. </span><br data-dcnode-id="4022"><br data-dcnode-id="4021"><span data-dcnode-id="4020" instrument_node="">Currently, the chronological order that these books should be read in is: (as shown on </span><a data-dcnode-id="4018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/series/55424-the-cousins-war" rel="noopener nofollow" target="_blank"><span data-dcnode-id="4019" instrument_node="">https://www.goodreads.com/series/5542...</span></a><span data-dcnode-id="4017" instrument_node="">)</span><br data-dcnode-id="4016"><br data-dcnode-id="4015"><span data-dcnode-id="4014" instrument_node="">The Lady of the Rivers</span><br data-dcnode-id="4013"><span data-dcnode-id="4012" instrument_node="">The Red Queen</span><br data-dcnode-id="4011"><span data-dcnode-id="4010" instrument_node="">The White Queen</span><br data-dcnode-id="4009"><span data-dcnode-id="4008" instrument_node="">The Kingmaker's Daughter</span><br data-dcnode-id="4007"><span data-dcnode-id="4006" instrument_node="">The White Princess</span><br data-dcnode-id="4005"><span data-dcnode-id="4004" instrument_node="">The Last Rose / The King's Curse (not yet released)</span><br data-dcnode-id="4003"><br data-dcnode-id="4002"><span data-dcnode-id="4001" instrument_node="">NOTE - where The Last Rose fits on this list is currently unknown.</span><br data-dcnode-id="4000"><br data-dcnode-id="3999"><br data-dcnode-id="3998"><span data-dcnode-id="3997" instrument_node="">BUT - The books are numbered (and show on Goodreads) in publication order. </span><br data-dcnode-id="3996"><span data-dcnode-id="3995" instrument_node=""> </span><br data-dcnode-id="3994"><span data-dcnode-id="3993" instrument_node="">The White Queen (Cousins War #1)</span><br data-dcnode-id="3992"><span data-dcnode-id="3991" instrument_node="">The Red Queen (Cousins War #2)</span><br data-dcnode-id="3990"><span data-dcnode-id="3989" instrument_node="">The Lady of the Rivers (Cousins War #3)</span><br data-dcnode-id="3988"><span data-dcnode-id="3987" instrument_node="">The Kingmaker's Daughter (Cousins War #4)</span><br data-dcnode-id="3986"><span data-dcnode-id="3985" instrument_node="">The White Princess (Cousins War #5)</span><br data-dcnode-id="3984"><span data-dcnode-id="3983" instrument_node="">The King's Curse (Cousins War #6)</span><br data-dcnode-id="3982"><br data-dcnode-id="3981"><span data-dcnode-id="3980" instrument_node="">So if you follow the publication order, like this foolish woman here did, you're all out of order! I didn't like leaping all over the place in time. Personally, I'd have liked to read the damn series in order! Be warned about this anomaly if you haven't read this really interesting and entertaining series by Ms P Gregory yet.</span><br data-dcnode-id="3979"><br data-dcnode-id="3978"><span data-dcnode-id="3977" instrument_node="">Okay, grizzle over, 4★ </span><br data-dcnode-id="3976"><br data-dcnode-id="3975"><span data-dcnode-id="3974" instrument_node="">P.S. You could not have kept me at a royal court in England in the 15th and 16th century for all the money in the world. I like my head just where it is - planted very firmly on my shoulders, thank you very much.</span></span><span data-dcnode-id="3972" instrument_node="">

</span><span data-dcnode-id="3797" id="freeTextContainer13787136483496593708"><span data-dcnode-id="3804" instrument_node="">Where I got the book: review galley from NetGalley.</span><br data-dcnode-id="3803"><br data-dcnode-id="3802"><span data-dcnode-id="3801" instrument_node="">Philippa Gregory takes a step back farther in time with The Lady of the Rivers; after exploring the lives of the various Tudor women in a succession of novels, she now dives into the rich and complicated history of the Wars of the Roses. This was a period in the 1400s in which two branches of the Plantagenet royal family struggled for power over England (and various bits of France). </span><br data-dcnode-id="3800"><br data-dcnode-id="3799"><span data-dcnode-id="3798" instrument_node="">The protagonist in The Lady of the Rivers is Jacquetta of Luxem</span></span><span data-dcnode-id="3796" instrument_node="">
</span><span data-dcnode-id="3773" id="freeText13787136483496593708" style="display:none"><span data-dcnode-id="3795" instrument_node="">Where I got the book: review galley from NetGalley.</span><br data-dcnode-id="3794"><br data-dcnode-id="3793"><span data-dcnode-id="3792" instrument_node="">Philippa Gregory takes a step back farther in time with The Lady of the Rivers; after exploring the lives of the various Tudor women in a succession of novels, she now dives into the rich and complicated history of the Wars of the Roses. This was a period in the 1400s in which two branches of the Plantagenet royal family struggled for power over England (and various bits of France). </span><br data-dcnode-id="3791"><br data-dcnode-id="3790"><span data-dcnode-id="3789" instrument_node="">The protagonist in The Lady of the Rivers is Jacquetta of Luxembourg, who is not generally a well-known historical figure. The story covers Jacquetta's life from adolescence to middle age, and Gregory fans will realize that it ends with the beginning of Gregory's 2009 novel The White Queen.</span><br data-dcnode-id="3788"><br data-dcnode-id="3787"><span data-dcnode-id="3786" instrument_node="">I've been critical of Gregory's kings-and-queens novels in the past, mostly because I would like to see more pure fiction from her, but I enjoyed The Lady of the Rivers. As usual, though, I did not find the protagonist particularly interesting; I felt that she was an observer of history rather than being a participant in it. Of course, in those days a noblewoman's role was to run the house and lands while the men fought (Jacquetta does plenty of that) and produce children (Jacquetta had sixteen). So maybe the impression of passivity that I received was due to the necessity of sticking fairly close to historical fact. The bits of white magic that all of Gregory's heroines inevitably indulge in do not come across as exciting enough to compensate me for the lack of action.</span><br data-dcnode-id="3785"><br data-dcnode-id="3784"><span data-dcnode-id="3783" instrument_node="">And yet there were some definite improvements over recent novels in the series. For one thing, Jacquetta gets to travel around quite a bit, and even though she's not in the battles I did get a better sense of being near to the action than I usually do. And the supporting cast was good; I particularly liked Margaret of Anjou, Henry VI's queen, and I found the account of Henry VI's mental illness compelling. There were several other memorable characters; in fact, I now understand the Wars of the Roses a whole lot better. So if you read historical fiction for the history, you'll be satisfied.</span><br data-dcnode-id="3782"><br data-dcnode-id="3781"><span data-dcnode-id="3780" instrument_node="">I'm not going to say much about Gregory's writing idiosyncracies here, since what I was reading was a galley (which had not even been edited for capitalization and paragraph layout; that surprised me). I desperately want to send her the gift of a big bag of semicolons, though. Gregory is the undisputed queen of the comma splice.</span><br data-dcnode-id="3779"><br data-dcnode-id="3778"><span data-dcnode-id="3777" instrument_node="">One last comment; I have been reading Gregory for years, and am fascinated to note that the novels are getting less sensual as time goes on. This one was PG-rated.</span><br data-dcnode-id="3776"><br data-dcnode-id="3775"><span data-dcnode-id="3774" instrument_node="">Overall impression: a good Gregory, and recommended for lovers of English history. </span></span><span data-dcnode-id="3772" instrument_node="">

</span><span data-dcnode-id="3647" id="freeTextContainer11996617586469828575"><span data-dcnode-id="3656" instrument_node="">I was really looking forward to reading this and was </span><b data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">tragically disappointed.</span></b><br data-dcnode-id="3653"><br data-dcnode-id="3652"><span data-dcnode-id="3651" instrument_node="">This was my first Philippa Gregory novel. She's written so many that I'm keen to read, as I'm fascinated by this era of history, and this was recommended as the best one to start with, so that I can read the series' chronologically. I think maybe that was a mistake.</span><br data-dcnode-id="3650"><br data-dcnode-id="3649"><span data-dcnode-id="3648" instrument_node="">I feel like this is more of a supplementary novel, more entertaining for those who know what comes later. This story dragged so much for me, and I just wasn'</span></span><span data-dcnode-id="3646" instrument_node="">
</span><span data-dcnode-id="3624" id="freeText11996617586469828575" style="display:none"><span data-dcnode-id="3645" instrument_node="">I was really looking forward to reading this and was </span><b data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">tragically disappointed.</span></b><br data-dcnode-id="3642"><br data-dcnode-id="3641"><span data-dcnode-id="3640" instrument_node="">This was my first Philippa Gregory novel. She's written so many that I'm keen to read, as I'm fascinated by this era of history, and this was recommended as the best one to start with, so that I can read the series' chronologically. I think maybe that was a mistake.</span><br data-dcnode-id="3639"><br data-dcnode-id="3638"><span data-dcnode-id="3637" instrument_node="">I feel like this is more of a supplementary novel, more entertaining for those who know what comes later. This story dragged so much for me, and I just wasn't invested. Firstly, it took over 100 pages just to get to the plot described in the blurb. Then it was a tedious cycle: Baby - war - baby - war ... this woman was popping out so many kids and none of them are given the time of day so why would I care? And then the wars are so repetitive, and back and forth, and the way that it's all told just makes it so </span><i data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">bland</span></i><span data-dcnode-id="3634" instrument_node="">. </span><br data-dcnode-id="3633"><br data-dcnode-id="3632"><span data-dcnode-id="3631" instrument_node="">Margaret is a horrible person, and I mostly despised her. I really felt like Jacquetta and Richard were on the wrong side the entire time. They're fighting for terrible people, and I get that, but it's such a stated fact, there's no emotional investment so you kinda just question why? </span><br data-dcnode-id="3630"><br data-dcnode-id="3629"><span data-dcnode-id="3628" instrument_node="">I think the way the story is written in first person, present tense, made it completely emotionless. I felt nothing throughout this entire novel. I didn't really care who lived or died, what cities were lost or won ... zero emotional attachment from me. I wanted characters that I could really root for and admire and there were none to be found.</span><br data-dcnode-id="3627"><br data-dcnode-id="3626"><span data-dcnode-id="3625" instrument_node="">Overall, I'm glad to be done with this because it was just a massive disappointment. I'll continue reading the series, but I'm really hoping it improves.</span></span><span data-dcnode-id="3623" instrument_node="">

</span><span data-dcnode-id="3514" id="freeText13880104217095493774" style="display:none"><span data-dcnode-id="3525" instrument_node="">Hands down, Philippa Gregory is my favorite English historical novelist. She brings the era she is exploring to life and always tells the story from such a personal point of view that you feel you are, or at least know, the main character. I also love that she takes historical women who have been literally overlooked by historians and brings their stories, their stuggles, into the light.</span><br data-dcnode-id="3524"><br data-dcnode-id="3523"><span data-dcnode-id="3522" instrument_node="">The Lady of the Rivers is Jacquetta Woodville, lady-in-waiting to Margaret of Anjou, who becomes the Queen of England in 1445. Jacquetta is a fascinating person, wise and true and regal. She is a direct descendant of Melusina, the water goddess of legend, and this lineage gives her some powers that separate her from the everyday people around her. This aspect of the story is handled beautifully and without anything that makes it seem preposterous or unrealistic. </span><br data-dcnode-id="3521"><br data-dcnode-id="3520"><span data-dcnode-id="3519" instrument_node="">If there is anything more interesting or captivating (and sometimes more confusing) than the British royal house during the Wars of the Roses and the Tudor eras, I do not know what it would be. These times are gold in Gregory’s hands. Like some of her characters, she practices alchemy, she spins gold from paper pages.</span><br data-dcnode-id="3518"><br data-dcnode-id="3517"><span data-dcnode-id="3516" instrument_node="">I am gradually working my way through her canon, and having read them completely out of order, I keep wanting to begin at the beginning and read them chronologically. If God grants me the time, I will not grudge starting over. They are well-worth a second read.</span><br data-dcnode-id="3515"></span><span data-dcnode-id="3513" instrument_node="">

</span><span data-dcnode-id="3400" id="freeTextContainer10348045144775953061"><i data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="3410" instrument_node=""> was an okay kind of book. After watching the TV shows </span><i data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">The White Queen</span></i><span data-dcnode-id="3407" instrument_node=""> and </span><i data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">The White Princess</span></i><span data-dcnode-id="3404" instrument_node=""> I have been kind of dying to read this series. However, this book was just an okay kind of beginning to it.</span><br data-dcnode-id="3403"><br data-dcnode-id="3402"><span data-dcnode-id="3401" instrument_node="">Jacquetta of Luxembourg was a pretty interesting character to read about. Well, after so many chapters because the first half of this book was completely boring. Which is why I rated it what I did. It did start to pick up a little bit better after the half way point.. but ther</span></span><span data-dcnode-id="3399" instrument_node="">
</span><span data-dcnode-id="3374" id="freeText10348045144775953061" style="display:none"><i data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="3396" instrument_node=""> was an okay kind of book. After watching the TV shows </span><i data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">The White Queen</span></i><span data-dcnode-id="3393" instrument_node=""> and </span><i data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">The White Princess</span></i><span data-dcnode-id="3390" instrument_node=""> I have been kind of dying to read this series. However, this book was just an okay kind of beginning to it.</span><br data-dcnode-id="3389"><br data-dcnode-id="3388"><span data-dcnode-id="3387" instrument_node="">Jacquetta of Luxembourg was a pretty interesting character to read about. Well, after so many chapters because the first half of this book was completely boring. Which is why I rated it what I did. It did start to pick up a little bit better after the half way point.. but there wasn't much to this book if I'm being honest.</span><br data-dcnode-id="3386"><br data-dcnode-id="3385"><i data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="3382" instrument_node=""> was written like a diary. Again, it was mostly boring in my eyes. Probably because I've read some books that were kind of a diary and they were so much better. Maybe it's the whole genre being different than I usually read or just that there's not a lot of information out there about Jacquetta.. but I was just mostly bored in this book.</span><br data-dcnode-id="3381"><br data-dcnode-id="3380"><span data-dcnode-id="3379" instrument_node="">When Jacquetta was a young girl she married the duke of Bedford. From this connection, she was instantly dragged into the war of the roses. Cousins battling against one another for power and land. I didn't really like Jacquetta in the beginning of the book, but once the cousin war and more people were introduced I started to like her a little bit more.</span><br data-dcnode-id="3378"><br data-dcnode-id="3377"><span data-dcnode-id="3376" instrument_node="">Overall, it was okay. I wish this book was a little bit better so that I could be more excited about diving into the second book but I'll take what I can get at this point. </span><br data-dcnode-id="3375"></span><span data-dcnode-id="3373" instrument_node="">

</span><span data-dcnode-id="3292" id="freeTextContainer7705440735923582374"><span data-dcnode-id="3299" instrument_node="">In </span><i data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="3296" instrument_node="">, Philippa Gregory continues her Wars of the Roses saga (I balk at calling it the Cousins’ War) with the story of Jacquetta, Duchess of Bedford, mother to Edward IV’s queen, Elizabeth Woodville. Like her daughter Elizabeth, Jacquetta is possessed of supernatural powers.</span><br data-dcnode-id="3295"><br data-dcnode-id="3294"><span data-dcnode-id="3293" instrument_node="">First, I did strongly appreciate one aspect of this novel: the sympathetic portrayal of Jacquetta and the Woodville family. Most novels about the Wars of the Roses portray the Woodvilles negatively, to the</span></span><span data-dcnode-id="3291" instrument_node="">
</span><span data-dcnode-id="3264" id="freeText7705440735923582374" style="display:none"><span data-dcnode-id="3290" instrument_node="">In </span><i data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">The Lady of the Rivers</span></i><span data-dcnode-id="3287" instrument_node="">, Philippa Gregory continues her Wars of the Roses saga (I balk at calling it the Cousins’ War) with the story of Jacquetta, Duchess of Bedford, mother to Edward IV’s queen, Elizabeth Woodville. Like her daughter Elizabeth, Jacquetta is possessed of supernatural powers.</span><br data-dcnode-id="3286"><br data-dcnode-id="3285"><span data-dcnode-id="3284" instrument_node="">First, I did strongly appreciate one aspect of this novel: the sympathetic portrayal of Jacquetta and the Woodville family. Most novels about the Wars of the Roses portray the Woodvilles negatively, to the point of making them into cardboard villains, and it was refreshing to see Gregory take a different tack. </span><br data-dcnode-id="3283"><br data-dcnode-id="3282"><span data-dcnode-id="3281" instrument_node="">Unfortunately, there’s not much else about this book I liked. Jacquetta’s first husband, John, Duke of Bedford, who served as Regent of France during Henry VI’s minority, was an interesting man faced with the very difficult task of holding on to England’s possessions in France while at the same time dealing with political infighting in England. Gregory turns him into a rather pathetic sort who marries pretty young Jacquetta only to make use of her gift of seeing into the future. Other important players of the time, such as John’s younger brother, Humphrey, Duke of Gloucester, and his ambitious wife, Eleanor, make appearances, but their dramatic potential is never realized. Margaret of Anjou shows promise when she first appears in the novel, but soon becomes the she-wolf, complete with budding psychotic son, familiar to anyone who's read a lot of Wars of the Roses fiction.</span><br data-dcnode-id="3280"><br data-dcnode-id="3279"><span data-dcnode-id="3278" instrument_node="">Early on in the book, the widowed Jacquetta makes a scandalous marriage to her first husband’s squire, Richard Woodville. The novel then quickly jumps ahead into the court of the grown Henry VI and his French bride, Margaret of Anjou, whom Jacquetta serves. At this point, Jacquetta is reduced to the role of standing by and shaking her head as Henry and Margaret drag the country into civil war. Except to read the occasional Tarot card and to give Margaret sound advice, which is usually ignored, Jacquetta plays almost a minor role in her own novel.</span><br data-dcnode-id="3277"><br data-dcnode-id="3276"><span data-dcnode-id="3275" instrument_node="">The writing in this novel simply isn't up to the standard of some of Gregory's earlier efforts. I thoroughly enjoyed </span><i data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">The Boleyn Inheritance</span></i><span data-dcnode-id="3272" instrument_node="">, especially Katherine Howard's chapters, which I thought caught the voice of the ditzy young queen perfectly. The first-person present tense here is simply mind-numbing, with needless repetition. Too often, Jacquetta says something, then tells us what she said. </span><br data-dcnode-id="3271"><br data-dcnode-id="3270"><span data-dcnode-id="3269" instrument_node="">For me, however, the novel’s biggest flaw was what was not inside it—Jacquetta’s later years. The most dramatic events of Jacquetta’s life, her being accused and exonerated of witchcraft, the murders of her husband and her son John, and her flight into sanctuary with her daughter, belong to this period, as does the controversial role the Woodvilles allegedly played in the trial of Sir Thomas Cook, but Gregory chose to end her novel well before these things occurred. It’s her novel and her choice, but I for one would have loved to have seen how Jacquetta reacted to the controversy her family’s sudden rise generated, how she fought the charges against her, and how she dealt with the murders of her husband and John. With this missing, the impression as we close the book (or turn off the Kindle, in my case) is that of a pleasant but rather milquetoast Jacquetta: Wendy the Good Little Witch.</span><br data-dcnode-id="3268"><br data-dcnode-id="3267"><span data-dcnode-id="3266" instrument_node="">I received an electronic review copy of this novel from Net Galley.</span><br data-dcnode-id="3265"></span><span data-dcnode-id="3263" instrument_node="">

</span><span data-dcnode-id="2959" id="freeTextContainer14915604218573598232"><span data-dcnode-id="2965" instrument_node="">4.5/5</span><br data-dcnode-id="2964"><br data-dcnode-id="2963"><u data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Reread notes from January 2021</span></u><span data-dcnode-id="2960" instrument_node="">: I loved every second of this reread!! I could talk for a long time about the women in Philippa Gregory's stories. The first time I read this book, I learned a lot about Jacquetta of Luxembourg and her marriage-for-love to Richard Woodville, after losing her first husband John, Duke of Bedford. This time, I was able to focus more on her role at Queen Margaret's court and the swiftly-moving politics of that time. This story takes place just before and at the be</span></span><span data-dcnode-id="2958" instrument_node="">
</span><span data-dcnode-id="2890" id="freeText14915604218573598232" style="display:none"><span data-dcnode-id="2957" instrument_node="">4.5/5</span><br data-dcnode-id="2956"><br data-dcnode-id="2955"><u data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">Reread notes from January 2021</span></u><span data-dcnode-id="2952" instrument_node="">: I loved every second of this reread!! I could talk for a long time about the women in Philippa Gregory's stories. The first time I read this book, I learned a lot about Jacquetta of Luxembourg and her marriage-for-love to Richard Woodville, after losing her first husband John, Duke of Bedford. This time, I was able to focus more on her role at Queen Margaret's court and the swiftly-moving politics of that time. This story takes place just before and at the beginning of the Wars of the Roses. </span><br data-dcnode-id="2951"><br data-dcnode-id="2950"><span data-dcnode-id="2949" instrument_node="">This year, I'm reading through Philippa Gregory's Plantagenet and Tudor novels in chronological order. Next up is The White Queen, which features Jacquetta's daughter, Elizabeth Woodville. </span><br data-dcnode-id="2948"><br data-dcnode-id="2947"><span data-dcnode-id="2946" instrument_node="">***</span><br data-dcnode-id="2945"><br data-dcnode-id="2944"><u data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">Full review from 4.3.20</span></u><span data-dcnode-id="2941" instrument_node="">: </span><a data-dcnode-id="2939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/3209142546" rel="nofollow noopener"><span data-dcnode-id="2940" instrument_node="">Tidelands</span></a><span data-dcnode-id="2938" instrument_node=""> was my first Philippa Gregory reading experience and I cannot stop thinking about it. Since I still have a few months before </span><a data-dcnode-id="2936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/50277441-dark-tides" rel="nofollow noopener"><span data-dcnode-id="2937" instrument_node="">the second Tidelands novel</span></a><span data-dcnode-id="2935" instrument_node=""> becomes available, I decided to start on some of Ms. Gregory's other books, which I am reading in </span><a data-dcnode-id="2933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/series/187905-the-plantagenet-and-tudor-novels" rel="nofollow noopener"><span data-dcnode-id="2934" instrument_node="">the combined Plantagenet and Tudor Novels order</span></a><span data-dcnode-id="2932" instrument_node="">.</span><br data-dcnode-id="2931"><br data-dcnode-id="2930"><span data-dcnode-id="2929" instrument_node="">The Lady of the Rivers is the story of Jacquetta of Luxembourg and her marriages, first to John the Duke of Bedford, and then to Richard Woodville. Jacquetta is a descendant of the water spirit Melusina, which means that she has a special Sight. It is because of this unique ability that John, the Duke of Bedford, marries her but it turns out that he is uninterested in her as a person. He only wants to use her Sight for his advancement. After his death, her marriage to John's squire Richard Woodville is one that is born out of love, and this is where Jacquetta begins her family line. </span><br data-dcnode-id="2928"><br data-dcnode-id="2927"><span data-dcnode-id="2926" instrument_node="">Jacquetta works at court for Queen Margaret, which is trying on her personally and also trying on her family. Jacquetta is reluctant to use her Sight when the Queen asks, but she occasionally does, and she also travels around with the Queen when she goes to stay in her various houses. This keeps her away from her own family for months at a time, but she is still a loving mother to her children. Richard Woodville also works in King Henry VI's military, which keeps him away from her for large portions of time because the King is currently at war over control of the English throne. Their marriage really appealed to me because when Jacquetta married Richard, she married down socially, which was not something that was usually done and it was very risky for her. Their relationship was very romantic and normal (as normal as it could be back then), which was wonderful because marriage back then was nothing like it is now and often people were put together in order to seal an agreement or combine riches. </span><br data-dcnode-id="2925"><br data-dcnode-id="2924"><span data-dcnode-id="2923" instrument_node="">I loved this story so much. There's something about Philippa Gregory's writing that wraps all around you and makes you feel like you're </span><i data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">there</span></i><span data-dcnode-id="2920" instrument_node="">. The language is beautiful and descriptive, and I crave it when I'm not reading it. This isn't a light story by any means-there is drama and war and romance and death and issues of class. But court politics and political intrigue are some of my favorite parts of fiction, particularly in medieval fiction, and I'm thrilled to get to experience aspects of world history that I'm not very knowledgeable about. Taking small breaks from the story so I could go research people, places, events in Jacquetta's story was the best part. I was meant to be entertained by this book, but I also feel like I learned a lot. </span><br data-dcnode-id="2919"><br data-dcnode-id="2918"><span data-dcnode-id="2917" instrument_node="">I will say that I liked this one slightly less than </span><a data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/3209142546" rel="nofollow noopener"><span data-dcnode-id="2916" instrument_node="">Tidelands</span></a><span data-dcnode-id="2914" instrument_node=""> (which I have RAVED over to anyone that will listen). I think that's because the cast of characters is much larger because of all of the people that cross Jacquetta's path while at court. I had a bit of a time keeping the names straight (Richard of York, John of Bedford, Margaret of Anjou, etc) but once I figured it all out, it was a bit easier in the reading. There were also a couple of chapters toward the end that were battle-heavy, and this dragged the story a little bit, to the point where I had to reread those chapters.</span><br data-dcnode-id="2913"><br data-dcnode-id="2912"><span data-dcnode-id="2911" instrument_node="">Overall, the attention to the details of the 1400's was magnificent. Just delicious. And I loved Jacquetta's second marriage to Richard Woodville SO MUCH; they were so loving and supportive to one another and they cared so deeply for their family. The next book in the series is The White Queen, which follows Jacquetta's oldest daughter Elizabeth and her marriage to Edward IV. </span><br data-dcnode-id="2910"><br data-dcnode-id="2909"><br data-dcnode-id="2908"><u data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">Audiobook Notes</span></u><span data-dcnode-id="2905" instrument_node="">: I alternated listening to the audiobook with reading the print copy, and I just want to say that it was wonderfully done and a pleasure to listen to. Narrated by Bianca Amato, I </span><i data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">loved</span></i><span data-dcnode-id="2902" instrument_node=""> hearing her read in her beautiful accent. And her pronunciation of the places and names was splendid. I've noticed that she does not narrate the entire series, but I really wish she did. </span><br data-dcnode-id="2901"><br data-dcnode-id="2900"><span data-dcnode-id="2899" instrument_node="">Title: The Lady of the Rivers by Philippa Gregory</span><br data-dcnode-id="2898"><span data-dcnode-id="2897" instrument_node="">Series: The Plantagenet and Tudor Novels #1</span><br data-dcnode-id="2896"><span data-dcnode-id="2895" instrument_node="">Narrated by: Bianca Amato</span><br data-dcnode-id="2894"><span data-dcnode-id="2893" instrument_node="">Length: 19 hours, 7 minutes, Unabridged</span><br data-dcnode-id="2892"><span data-dcnode-id="2891" instrument_node="">Publisher: Simon &amp; Schuster Audio</span></span><span data-dcnode-id="2889" instrument_node="">

</span><span data-dcnode-id="2677" id="freeTextContainer11602439972305843804"><span data-dcnode-id="2678" instrument_node="">I thoroughly enjoyed The Lady of the Rivers. I love historical books that draw from real history, and this was a good one. I'm not overly familiar with the events covered in this story, so I can't give a full assessment as to its historical accuracy, but its attention to even the smallest details was both plausible and engaging. Of course, there's no doubt that many of the day-to-day activities were heavily embroidered with fiction, but that's necessary when telling a story of characters who die</span></span><span data-dcnode-id="2676" instrument_node="">
</span><span data-dcnode-id="2670" id="freeText11602439972305843804" style="display:none"><span data-dcnode-id="2675" instrument_node="">I thoroughly enjoyed The Lady of the Rivers. I love historical books that draw from real history, and this was a good one. I'm not overly familiar with the events covered in this story, so I can't give a full assessment as to its historical accuracy, but its attention to even the smallest details was both plausible and engaging. Of course, there's no doubt that many of the day-to-day activities were heavily embroidered with fiction, but that's necessary when telling a story of characters who died almost six hundred years ago.</span><br data-dcnode-id="2674"><span data-dcnode-id="2673" instrument_node="">The main protagonist, Jacquetta (later lady in waiting to Margaret of Anjou, who became queen of England when she married Henry VI) was interesting and likeable. Her journey from innocent young girl given in marriage to a man far older than her, to a woman who had a lot of influence in England's royal court was fascinating and opened my eyes to historical events that I'd only previously viewed briefly and distantly. This book brought me close to those events and made me feel as though I was witnessing them firsthand, which was an experience I enjoyed immensely.</span><br data-dcnode-id="2672"><span data-dcnode-id="2671" instrument_node="">If you love history interwoven with fiction, you should give this book a try.</span></span><span data-dcnode-id="2669" instrument_node="">

</span><span data-dcnode-id="2582" id="freeTextContainer7560664568135901669"><span data-dcnode-id="2586" instrument_node="">Two and a half stars</span><br data-dcnode-id="2585"><br data-dcnode-id="2584"><span data-dcnode-id="2583" instrument_node="">The Lady of the Rivers follows the story of Jacquetta, the mother of Elizabeth Woodville, (who becomes Queen of England), from a privileged child of the family Luxemburg in France, a family descended from the goddess Melusina; through her encounter with Joan of Arc; an early marriage to the Duke of Bedford, regent of France, uncle to King Henry of Lancaster, who exposes her to alchemy and secret books of forbidden knowledge, and subsequently, accusations of witchcraft. Upon t</span></span><span data-dcnode-id="2581" instrument_node="">
</span><span data-dcnode-id="2554" id="freeText7560664568135901669" style="display:none"><span data-dcnode-id="2580" instrument_node="">Two and a half stars</span><br data-dcnode-id="2579"><br data-dcnode-id="2578"><span data-dcnode-id="2577" instrument_node="">The Lady of the Rivers follows the story of Jacquetta, the mother of Elizabeth Woodville, (who becomes Queen of England), from a privileged child of the family Luxemburg in France, a family descended from the goddess Melusina; through her encounter with Joan of Arc; an early marriage to the Duke of Bedford, regent of France, uncle to King Henry of Lancaster, who exposes her to alchemy and secret books of forbidden knowledge, and subsequently, accusations of witchcraft. Upon the Dukes death, Jacquetta follows her heart and against royal consent, marries Richard Woodville and is banished to the country side, descending from a Duchess to the wife of a squire. When Margaret of Anjou is brought over to England to marry King Henry of Lancaster, Jacquetta, as her relative, is retrieved from the countryside to befriend the new Queen. Jacquetta is soon the constant companion of Queen Margaret and privy to the secrets and intrigues that surround the throne of the unfortunate, King Henry. Witchcraft, alchemy, being best friends with a much malaligned Queen, this has all the elements to be a great read, but…</span><br data-dcnode-id="2576"><span data-dcnode-id="2575" instrument_node=""> </span><br data-dcnode-id="2574"><span data-dcnode-id="2573" instrument_node="">First, I must tell you that I am a fan of Philippa Gregory as my bookcases will attest. I have almost all her books and the last four are in hardcover. So, as you can imagine, I was shocked when in the midst of The Lady of the Rivers to find myself not enjoying this story very much at all. Why, I started to wonder. Have I just read too much historical fiction? Have I overloaded on the genre? I had always thought I could read about history, and especially about different view points in history, until, well… my eyes bled. I do not expect historical fiction to be completely accurate, after all the second word in that genre is fiction. And, when you really put your mind to it all history is fiction to a certain extent, as history is the story left behind by the victors or simply by those in power. It is the propaganda and slander of the day carried forward to the present. So within historical fiction is the opportunity to present another side of the story. I mistakenly believed that, finally, I would be given the Lancastrian point of view during the war of the roses. </span><br data-dcnode-id="2572"><span data-dcnode-id="2571" instrument_node=""> </span><br data-dcnode-id="2570"><span data-dcnode-id="2569" instrument_node="">The York rise to the throne of England was yet another power grab in England’s long history of power grabs. The Celt took England from the prehistoric people, who were invaded by the Saxons and Danes, who lost power to the Romans who came and went, and, finally, William the Conqueror came long and established Norman rule, setting the stage for the Plantagenet’s and their eventual power squabbles that led to the war of the roses. With all this history of conquest in England, I do not understand the need for writers to be so protective of the house of York. The house of Lancaster was the ruling house, how is that they were defeated? That story would be well worth reading about. We all know that the Woodville’s changed sides following the York victory of Edward IV in 1461, and, of the fateful meeting in 1464 of Elizabeth Woodville and King Edward, if only because we all read Gregory’s The White Queen. But in The Lady of Rivers, I wanted to read the Lancastrian point of view, read about their story. Unfortunately I am still waiting.</span><br data-dcnode-id="2568"><br data-dcnode-id="2567"><br data-dcnode-id="2566"><span data-dcnode-id="2565" instrument_node="">The underlying theme, or lesson, of The Lady of the Rivers is one of caution for strong women who seek power. Those women who crossed the line from ornamental to power seeking were taken down either through accusations of witchcraft, adultery or being ‘unnatural.’ And, I applaud Gregory for presenting this premise. Gregory presents Joan of Arc, who as we all know was burned at the stake, as an example early in the book, of what historically happened to women when they seeked and assumed power during the middle ages. Another example is the sister in law of Jacquetta, Duchess of Gloucester, Eleanor, who married to the Uncle and heir to King Henry of Lancaster, assumes too much power and privilege, and consequently, is accused of witchcraft and sent to convent from which she never leaves. Jacquetta, herself, with her family history of magic and witchcraft must walk a careful line and avoids being to publically forward in her opinions and actions in order to avoid the scrutiny of the male powers of the time.</span><br data-dcnode-id="2564"><br data-dcnode-id="2563"><span data-dcnode-id="2562" instrument_node="">So, I naturally believed, as similarly to other of Gregory’s books, this book, while told from the first person point of view of Jacquetta, was in fact the story of Queen Margaret of Anjou. A small point, the woman on the cover of the book has red coppery coloured hair like Margaret, while Jacquetta is supposed to have had white blond hair which she passed down to her daughter Elizabeth. So who is this book about? This should be, as framed by Gregory herself, the story of Margaret, a woman fighting to save the throne for her son against the male powers of the time and being beaten down and defamed by those same men who grab the throne and the power of the land for themselves. But, instead of Margaret’s point of view of a woman disempowered, we are given the same old Yorkist slander of adultery and unnatural female behaviour, Margaret the wolf. I confess to being greatly disappointed, as I believed Philippa Gregory had indeed set out writing a potentially great inspiring novel of one woman’s tragic struggle against overwhelming odds, only to turn her into a cartoon. </span><br data-dcnode-id="2561"><span data-dcnode-id="2560" instrument_node=""> </span><br data-dcnode-id="2559"><span data-dcnode-id="2558" instrument_node="">In, closing, as Jacquetta abandons her friend Margaret for the house of York, so too, does Philippa Gregory abandon a much defamed Queen to the slanders of history. </span><br data-dcnode-id="2557"><span data-dcnode-id="2556" instrument_node=""> </span><br data-dcnode-id="2555"></span><span data-dcnode-id="2553" instrument_node="">

</span><span data-dcnode-id="2453" id="freeText1567004838258987071" style="display:none"><span data-dcnode-id="2462" instrument_node="">The novels begin with Jacquetta of Luxembourg's friendship with Joan of Arc, in her final days of imprisonment before being burned at the stake, and Jacquetta's powers as a seeress.</span><br data-dcnode-id="2461"><br data-dcnode-id="2460"><span data-dcnode-id="2459" instrument_node="">Jacquetta is at 17 given as a bride to the Duke of Bedford, whos'e interest in her is purely for her psychic abilities and how she can be of indispensable help to him in the world of alchemy and divination.</span><br data-dcnode-id="2458"><span data-dcnode-id="2457" instrument_node="">After his death, Jacquetta marries Richard Woodville, a true love match, and becomes the friend of confidante of Queen Margaret, the fiery and vengeful queen of the pious, neurotic and effete Henry VI. The fortunes of Richard and Jacquetta are swept up in the War of Roses, and the saga ends with their change of allegiance to the House of York, and the betrothal of Jacquetta's daughter, Elizabeth Woodville, to Edward March of York (to be Edward IV).</span><br data-dcnode-id="2456"><br data-dcnode-id="2455"><span data-dcnode-id="2454" instrument_node="">Like the master of English historical fiction before her, Jean Plaidy, Phillipa Gregory is s specialist in bringing to life the sagas of strong women at the center of events of English medieval and Tudor history, and their trials and tribulations in struggling to preserve their place and of their that of their children, in the sweeping saga of a court and events essentially controlled by men. This is one of Gregory's best novels yet, and a prequel to The White Queen, in fact if you have not read any of her Cousins War series it would be recommended to read this one first as it sets the scene perfectly for The White Queen. Lively, vibrant, sensitive, descriptive, captures key events and struggles in the War of Roses.</span>< </span><span data-dcnode-id="2350" id="freeTextContainer5216838917050150471"><span data-dcnode-id="2354" instrument_node="">Where to begin...It had been a while since I'd read a Philippa Gregory book (and I'd liked her books in the past--</span><a data-dcnode-id="2352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/37470.The_Other_Boleyn_Girl__The_Tudor_Court___2_" rel="nofollow noopener" title="The Other Boleyn Girl (The Tudor Court, #2) by Philippa Gregory"><span data-dcnode-id="2353" instrument_node="">The Other Boleyn Girl</span></a><span data-dcnode-id="2351" instrument_node=""> being my favorite), so I was looking forward to reading The Lady of the Rivers after I won it through First-Reads. After starting it, I quickly realized PG's writing has become a shadow of its former self. Devoting an entire book to Jacquetta was questionable to begin with; for all the royal goings-on that she was privy to, her life really wasn't all that exciti</span></span><span data-dcnode-id="2349" instrument_node="">
</span><span data-dcnode-id="2338" id="freeText5216838917050150471" style="display:none"><span data-dcnode-id="2348" instrument_node="">Where to begin...It had been a while since I'd read a Philippa Gregory book (and I'd liked her books in the past--</span><a data-dcnode-id="2346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/37470.The_Other_Boleyn_Girl__The_Tudor_Court___2_" rel="nofollow noopener" title="The Other Boleyn Girl (The Tudor Court, #2) by Philippa Gregory"><span data-dcnode-id="2347" instrument_node="">The Other Boleyn Girl</span></a><span data-dcnode-id="2345" instrument_node=""> being my favorite), so I was looking forward to reading The Lady of the Rivers after I won it through First-Reads. After starting it, I quickly realized PG's writing has become a shadow of its former self. Devoting an entire book to Jacquetta was questionable to begin with; for all the royal goings-on that she was privy to, her life really wasn't all that exciting. The novel consisted a lot of such-and-such happened and then I went into confinement and had another baby (I believe the grand total was 14). Since not as much is widely known about Jacquetta as, say, Anne Boleyn, I was expecting some further character development and insight into who she was. Unfortunately, PG does extremely little character development and for most of the book I couldn't ascertain if Jacquetta was just stupidly ignorant or so innocent that she couldn't quite grasp political implications. All of the other characters were as equally one dimensional and you really couldn't love or hate any of them because they were just...there. PG should have just written a non-fiction book about Jacquetta since she really didn't offer any insight into Jacquetta which, in my mind, is part of the point of historical fiction. But, oh yeah, Jacquetta's life isn't really that interesting to begin with! The beginning of the novel was really reminiscent of an Arthurian legend to me: Jacquetta is married to John of Lancaster, 1st Duke of Bedford (a.k.a. Arthur), but she is really in love with Richard Woodville, the Duke's Chamberlain (a.k.a. Lancelot). All of the magical infusions in the story really made this seem even more so. When Jacquetta finally realizes she is to be parted with Richard, her verbal reaction was incredibly stilted. I would compare it to a modern woman finding out that she was going to have to live without her cell phone, "But, I've always had a cellphone...what will I ever do without one?" After Richard got a taste of Jacquetta's virginal, unicorn beckoning magical huha, Bam! they were inseparable and there really wasn't any more to their relationship than that. Well, in PG's imagination at least.</span><br data-dcnode-id="2344"><br data-dcnode-id="2343"><span data-dcnode-id="2342" instrument_node="">Two other major gripes I had with the book were the constant reminders of who characters were. Within pages it was literally, "Duchess Eleanor", "The duchess", and then "Eleanor, the duchess". Readers aren't that stupid that they can't remember who one of the main characters is and what title they hold! Also, I really didn't understand why PG had Lewis die at age 12 when the family tree says he died in infancy. Now I know infancy is a loose term, but shouldn't it be 'adolescence' or 'childhood' by that age? Maybe not, but it seemed so to me.</span><br data-dcnode-id="2341"><br data-dcnode-id="2340"><span data-dcnode-id="2339" instrument_node="">Overall, the story was okay and even entertaining in parts with the King and Margaret. I don't think this novel could ever have been a 5 star book considering the subject alone, but it definitely would have garnered a higher rating if PG had just explored her characters more and had fun writing it. I really got the feeling that the book was more of a chore for PG to write rather than a pleasure. I wish she could tap into her imagination like she used to to at least write a page-turner with some scandalous and interesting people. 2 stars.</span></span><span data-dcnode-id="2337" instrument_node="">
