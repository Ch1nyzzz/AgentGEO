</span><p data-dcnode-id="1324"><img alt="The Bookkeeper's Skull Cover" class="wp-image-7496 aligncenter" data-attachment-id="7496" data-comments-opened="1" data-dcnode-id="1325" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="The Bookkeeper’s Skull Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2021/11/the-bookkeepers-skull-cover.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2021/11/the-bookkeepers-skull-cover.jpg?w=198" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2021/11/the-bookkeepers-skull-cover.jpg" data-orig-size="1399,2115" data-permalink="https://unseenlibrary.com/2021/11/17/waiting-on-wednesday-upcoming-warhammer-40000-novels/the-bookkeepers-skull-cover/" height="941" loading="lazy" sizes="(max-width: 622px) 100vw, 622px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2021/11/the-bookkeepers-skull-cover.jpg%3Fw%3D622%26h%3D941&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2021/11/the-bookkeepers-skull-cover.jpg?w=622&amp;h=941 622w, https://unseenlibrarycom.files.wordpress.com/2021/11/the-bookkeepers-skull-cover.jpg?w=1244&amp;h=1882 1244w, https://unseenlibrarycom.files.wordpress.com/2021/11/the-bookkeepers-skull-cover.jpg?w=99&amp;h=150 99w, https://unseenlibrarycom.files.wordpress.com/2021/11/the-bookkeepers-skull-cover.jpg?w=198&amp;h=300 198w, https://unseenlibrarycom.files.wordpress.com/2021/11/the-bookkeepers-skull-cover.jpg?w=768&amp;h=1161 768w, https://unseenlibrarycom.files.wordpress.com/2021/11/the-bookkeepers-skull-cover.jpg?w=677&amp;h=1024 677w" width="622"></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1320"><strong data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Publisher: Black Library (Audiobook – 18 January 2022)</span></strong></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1311"><strong data-dcnode-id="1312"><span data-dcnode-id="1318" instrument_node="">Series: </span><em data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Warhammer 40,000</span></em><span data-dcnode-id="1315" instrument_node="">/</span><em data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Warhammer Horror</span></em></strong></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1307"><strong data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Length: 4 hours and 32 minutes</span></strong></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1303"><strong data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">My Rating: 4.5 out of 5 stars</span></strong></p><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1301" instrument_node="">Get ready to dive back into the crazy and terrifying </span><em data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Warhammer 40,000</span></em><span data-dcnode-id="1298" instrument_node=""> universe with the clever and exciting read, </span><em data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">The Bookkeeper’s Skull</span></em><span data-dcnode-id="1295" instrument_node=""> by acclaimed author Justin D. Hill, which serves as a great entry in the </span><em data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Warhammer Horror</span></em><span data-dcnode-id="1292" instrument_node=""> sub-series.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1289" instrument_node="">Despite not being even halfway done yet, 2022 has already produced some epic new entries in the </span><em data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Warhammer 40,000</span></em><span data-dcnode-id="1286" instrument_node=""> universe, including </span><a data-dcnode-id="1282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/01/20/warhammer-40000-steel-tread-by-andy-clark/"><em data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Steel Tread</span></em><span data-dcnode-id="1283" instrument_node=""> by Andy Clark</span></a><span data-dcnode-id="1281" instrument_node="">, </span><a data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/02/09/the-twice-dead-king-reign-by-nate-crowley/"><em data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Reign</span></em><span data-dcnode-id="1278" instrument_node=""> by Nate Crowley</span></a><span data-dcnode-id="1276" instrument_node="">, </span><a data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/02/24/warhammer-40000-day-of-ascension-by-adrian-tchaikovsky/"><em data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Day of Ascension</span></em><span data-dcnode-id="1273" instrument_node=""> by Adrian Tchaikovsky</span></a><span data-dcnode-id="1271" instrument_node=""> and </span><a data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/03/10/warhammer-40000-krieg-by-steve-lyons/"><em data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Krieg</span></em><span data-dcnode-id="1268" instrument_node=""> by Steve Lyons</span></a><span data-dcnode-id="1266" instrument_node="">, just to name a few.&nbsp; After these awesome reads, there was no way I wasn’t going to check out </span><em data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">The Bookkeeper’s Skull</span></em><span data-dcnode-id="1263" instrument_node="">, especially when it had such an intriguing name.&nbsp; </span><em data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">The Bookkeeper’s Skull</span></em><span data-dcnode-id="1260" instrument_node=""> is an awesome book that forms part of a sub-series of </span><em data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Warhammer</span></em><span data-dcnode-id="1257" instrument_node=""> tie-in fiction known as </span><em data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Warhammer Horror</span></em><span data-dcnode-id="1254" instrument_node="">.&nbsp; This series unsurprisingly presents the reader with horror-based stories in its various universes and has already produced some very cool sounding reads.&nbsp; </span><em data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">The Bookkeeper’s Skull</span></em><span data-dcnode-id="1251" instrument_node=""> is my first brush with this horror series, and I was very excited to read one, especially as it was written by Justin D. Hill, a fantastic author who has been impressing recently with several great novels, including his </span><em data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Cadia</span></em><span data-dcnode-id="1248" instrument_node=""> series.&nbsp; I loved the unique and clever story that Hill came up with for</span><em data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node=""> The Bookkeeper’s Skull</span></em><span data-dcnode-id="1245" instrument_node="">.</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Throughout the Imperium of Man, many planets serve the God Emperor in different ways.&nbsp; For the agri-world of Potence, its only duty is to meet the iron-firm food quotas levied upon it by Imperial hierarchy, ensuring that the armies of the Imperium are supplied with all the food they need to fight the aliens and the heretics.&nbsp; The enforcers, implacable lawmen with the ability to deal out death on an arbitrary basis, roam the planet and the farms of Potence, ensuring that the populace and serfs do all there is to produce the appropriate amounts.</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Rudgard Howe is a new enforcer recruit who has just reported to duty.&nbsp; The son of the planet’s chief enforcer, Rudgard faces a deadly future which will eventually force him to kill his older brothers to claim his dying father’s position.&nbsp; But before he faces his family, he must learn the ropes by journeying out to the farmsteads of the planet and ensuring they can meet their quotas.&nbsp; Travelling with a veteran enforcer, Rudgard learns the hard truths about life in the Imperium and the necessities of justice in keeping the planet running.&nbsp; However, no lessons will prepare Rudgard for the horrors awaiting the enforcers at their final destination, the far-flung farmstead of Thorsarbour.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Located out in an ancient and unknown region of the planet, Thorsarbour is a cursed settlement, with its overseers poorly led and its serfs living in terror of the strange presences they claim to feel.&nbsp; Finding the settlement far behind its quotas, the enforcers attempt to whip the farm into shape, but between the unnatural feeling of the land surrounding Thorsarbour and the dangerous presence of a bloody sanguinary cult amongst the serfs, they have their work cut out for them.&nbsp; Worse, a series of unexplained and brutal murders are occurring around Thorsarbour, each one accompanied by mysterious strawman placed near the body.&nbsp; As Rudgard tries to uncover the cause of these mysterious deaths before they destabilise their work, the enforcers begin to discover something unnatural behind them.&nbsp; Can they discover the culprit before it is too late, or will the horrors of Thorsarbour consume them all?</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1233" instrument_node="">This was a really interesting first dive into the </span><em data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Warhammer Horror</span></em><span data-dcnode-id="1230" instrument_node=""> series for me and it is one that I am very glad that I undertook.&nbsp; </span><em data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">The Bookkeeper’s Skull</span></em><span data-dcnode-id="1227" instrument_node=""> is an excellent novel that very quickly grabbed my attention with its clever storytelling and fantastic, fast-paced plot.&nbsp; Hill manages to do a lot with this story in a very short amount of time as </span><em data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">The Bookkeeper’s Skull</span></em><span data-dcnode-id="1224" instrument_node=""> has a pretty short run time.&nbsp; Despite this, the reader is quickly and succinctly introduced to the main character and narrator, Rudgard, and the world of Potence, in a great couple of opening chapters, before dropping them right into the horror of Thorsarbour.&nbsp; Once the narrator arrives then you are quickly struck by the unnatural and freaky nature of the location, as they encounter several of the unusual issues surrounding the farmstead.&nbsp; Following the initial discovery of a multitude of bodies and death, the protagonists encounter one dangerous situation after another, as they contend with religious fanatics, terrified serfs and overseers, monstrous farm animals, mysterious strawmen, a strange and prophetic girl, and a mysterious force brutally killing off everyone in the compound.&nbsp; Even with so much happening, the pace of this novel never slackens, and there is a very high death count as everything goes wrong in some very brutal way.&nbsp; I was pretty hooked on this novel from the very start, and I loved where the story went, even if it did get a little predictable towards the end.&nbsp; I had a fairly good idea of who was going to live and die from the start, as well as who the killer was likely to be (the title is very suggestive).&nbsp; I do think that the novel slightly fell apart at the very end, as Hill chooses to leave a little too much mystery behind what sort of force might be ultimately responsible for the events of the book, but this was still an amazing story that I had a lot of fun with.</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1203"><em data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">The Bookkeeper’s Skull</span></em><span data-dcnode-id="1219" instrument_node=""> turned out to be a pretty good </span><em data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Warhammer 40,000</span></em><span data-dcnode-id="1216" instrument_node=""> novel, and I liked how it fit into the wider universe.&nbsp; This novel is closely related to one of Hill’s other novels, </span><em data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Cadian Honour</span></em><span data-dcnode-id="1213" instrument_node="">, which is also set on the world of Potence and features an older version of the protagonist.&nbsp; I love it when a novel provides an interesting connection to an author’s previous work, especially one that provides some exciting context and personal history, and this was a great example of that.&nbsp; Despite this, people interested in checking out </span><em data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">The Bookkeeper’s Skull</span></em><span data-dcnode-id="1210" instrument_node=""> don’t need to have any pre-knowledge of Hill’s writing or any other </span><em data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Warhammer 40,000</span></em><span data-dcnode-id="1207" instrument_node=""> novels to enjoy this excellent book.&nbsp; Indeed, this is a fantastic introduction to both Hill’s writing and the wider </span><em data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Warhammer</span></em><span data-dcnode-id="1204" instrument_node=""> universe and could be an interesting first book to readers curious about either.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1201" instrument_node="">I was very impressed with how the author was able to meld horror elements into this </span><em data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Warhammer 40,000</span></em><span data-dcnode-id="1198" instrument_node=""> novel to create a unique and impressive story.&nbsp; Hill did a beautiful job of creating a powerful and creepy atmosphere for this novel right off the bat, especially as the opening chapter features a sinister and freaky toy/companion that the protagonist had as a child (seriously, WTF).&nbsp; This dark atmosphere only increases as the book continues, especially once the characters arrive at Thorsarbour.&nbsp; Between the brutal conditions imposed upon the serfs, the unsettling atmosphere, the undercurrent of fear, the crazed religious cult of self-mutilating fanatics, the graphic murders and the haunting presence of several otherworldly characters, you have all the elements you need for a truly impressive and memorable horror tale.&nbsp; The pacing of the killings is excellent, and the reader finds themselves drawn in by their cruel and bloody nature as the bodies keep dropping in even more elaborate ways.&nbsp; These killings also work well with the presence of the cult and the appearance of all the strawmen and other agricultural elements, and the book ends up with vibes reminiscent of films like </span><em data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">The Wicker Man</span></em><span data-dcnode-id="1195" instrument_node=""> or </span><em data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Children of the Corn</span></em><span data-dcnode-id="1192" instrument_node="">, especially with a pale and potentially psychic child talking about a supernatural figure responsible for the killings.&nbsp; This ended up being an awesome horror read, and I find myself getting really drawn into the creepy story thanks to some of the freaky elements it contained.</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1189" instrument_node="">This proved to be a particularly good </span><em data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Warhammer 40,000</span></em><span data-dcnode-id="1186" instrument_node=""> novel due to the distinctive setting.&nbsp; </span><em data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">The Bookkeeper’s Skull</span></em><span data-dcnode-id="1183" instrument_node=""> takes place on a seemingly peaceful agri-world, which gives the reader some intriguing insights into this wider universe.&nbsp; I loved the cool look at the various archaic ways that this spacefaring civilisation gets food and other resources.&nbsp; The entire agri-world acts in a mostly feudalistic manner, with practically enslaved serfs doing much of the work on farmsteads.&nbsp; The blend of gothic science fiction with modern and ancient agriculture elements works really well and it serves as a brilliant background for this darker tale.&nbsp; Indeed, many of the book’s horror elements are derived from just how bleak and harsh the Imperium of Man truly is and just how badly they treat their own citizens (and they’re the good guys, apparently).&nbsp; Hill paints some truly shocking pictures of the conditions on this world, including some very gruesome depictions of a rabid self-mutilating cult and some brutal scenes of violence that the enforcers inflict upon the people.&nbsp; However, the most disturbing part of this world is Gambol, a being who is revealed to be a former criminal who had their arms and legs amputated, his mind modified by technology, and then dressed as a clown to become the protagonist’s childhood toy.&nbsp; This disturbing figure, equipped with his festering flesh-plugs (shudder!), is sprung on you in the first few pages of the book and really helps to set the horror mood for the reader, as well as just how dark and horrific the Imperium can get (they do this sort of thing to a lot of people).&nbsp; I loved how grim and dark Hill made this </span><em data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Warhammer</span></em><span data-dcnode-id="1180" instrument_node=""> story and you really get a sense of just how messed up everything is.</span></p><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1177" instrument_node="">I quite enjoyed the character of Rudgard, who serves as the central protagonist and narrator.&nbsp; </span><em data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">The Bookkeeper’s Skull</span></em><span data-dcnode-id="1174" instrument_node=""> is told from Rudgard’s point of view in a chronicle format, so you get a real sense of this excellent character both as an experienced enforcer and the young rookie he is in this novel.&nbsp; This version of Rudgard is a young and inexperienced man who is trying to live up to his family’s legacy, which includes a cruel father, two murderous brothers and an insane mother.&nbsp; Sent out on routine mission with veteran enforcer Tarrini, Rudgard quickly learns all the terrible truths about his job as he essentially becomes an executioner.&nbsp; Because of his past and the terrible events of this book, you get to see Rudgard turn into the no-nonsense figure from Hill’s previous novels, and I liked the continued change in his character.&nbsp; I enjoyed the excellent mentor/mentee relationship he forms with Tarrini, as well as the narrators continued comments attempting or excusing some of his actions.&nbsp; These considered and compelling notations from the older Rudgard give some interesting context to both the younger and older versions of the character, and it is interesting to see how much he has changed and developed over the years.&nbsp; While I did think that parts of his backstory were wrapped up a little too quickly, this was still a fantastic examination of a great character and I look forward to seeing more of him in some of Hill’s other works.</span></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1171" instrument_node="">I made sure to grab the audiobook version of </span><em data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">The Bookkeeper’s Skull</span></em><span data-dcnode-id="1168" instrument_node="">, which proved to be an incredible way to enjoy this brilliant novel.&nbsp; Due to the shorter length of the story, this is a relatively quick audiobook with a rough run time of four and a half hours, which can be powered through extremely quickly.&nbsp; I found that the audiobook format was highly conducive to the powerful horror mood of the novel and I personally felt that it really enhanced the tension and fear that the story produced.&nbsp; A lot of the reason why I enjoyed this audiobook was the excellent voice work from narrator Matthew Hunt.&nbsp; Hunt, who has lent his voice to several </span><em data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Warhammer</span></em><span data-dcnode-id="1165" instrument_node=""> audio productions in the past, had an excellent voice for this audiobook, and I felt that he captured both the main character and the overall tension of this novel extremely well.&nbsp; Hunt moved this audiobook along at a swift and compelling pace that really grabs the attention and ensures that you keep listening as events get darker and darker.&nbsp; Throw in some fantastic and fitting voices (Gambol’s near childlike voice is pretty damn freaky, and I loved the sly and manipulative voice given to the cult leader), and you have an outstanding audiobook that is really worth checking out.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1162" instrument_node="">Overall, </span><em data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">The Bookkeeper’s Skull</span></em><span data-dcnode-id="1159" instrument_node=""> by Justin D. Hill is an outstanding and epic </span><em data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Warhammer Horror</span></em><span data-dcnode-id="1156" instrument_node=""> novel that I had a brilliant time reading.&nbsp; Hill came up with a clever and captivating story that does an excellent job combining freaky horror elements with the expansive and fun </span><em data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Warhammer 40,000</span></em><span data-dcnode-id="1153" instrument_node=""> universe.&nbsp; I loved my first taste of the </span><em data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Warhammer Horror</span></em><span data-dcnode-id="1150" instrument_node=""> brand and I look forward to checking out more of it in the future, as well as some more exceptional writing from Hill.</span></p><span data-dcnode-id="1148" instrument_node="">
</span></div><span data-dcnode-id="1145" instrument_node="">
</span></div><span data-dcnode-id="1143" instrument_node="">
