</span><p data-dcnode-id="2334"><img alt="Star Wars - Kenobi Cover" class="wp-image-8879 aligncenter" data-attachment-id="8879" data-comments-opened="1" data-dcnode-id="2335" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Star Wars – Kenobi Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover.jpg?w=197" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover.jpg" data-orig-size="1880,2862" data-permalink="https://unseenlibrary.com/2022/04/20/www-wednesday-20-april-2022/star-wars-kenobi-cover/" height="936" loading="lazy" sizes="(max-width: 615px) 100vw, 615px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover.jpg%3Fw%3D615%26h%3D936&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover.jpg?w=615&amp;h=936 615w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover.jpg?w=1230&amp;h=1872 1230w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover.jpg?w=99&amp;h=150 99w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover.jpg?w=197&amp;h=300 197w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover.jpg?w=768&amp;h=1169 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover.jpg?w=673&amp;h=1024 673w" width="615"></p><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2330"><strong data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Publisher: Random House Audio (Audiobook – 27 August 2013)</span></strong></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2324"><strong data-dcnode-id="2325"><span data-dcnode-id="2328" instrument_node="">Series: </span><em data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">Star Wars Legends</span></em></strong></p><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2320"><strong data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">Length: 13 hours and 36 minutes</span></strong></p><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2316"><strong data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">My Rating: 4.5 out of 5 stars</span></strong></p><span data-dcnode-id="2315" instrument_node="">
</span><p data-dcnode-id="2307"><span data-dcnode-id="2314" instrument_node="">Welcome back to my Throwback Thursday series, where I republish old reviews, review books I have read before or review older books I have only just had a chance to read.&nbsp; For this week’s Throwback Thursday I take another look awesome book from the </span><em data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Star Wars Legends</span></em><span data-dcnode-id="2311" instrument_node=""> range, </span><em data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Kenobi</span></em><span data-dcnode-id="2308" instrument_node=""> by John Jackson Miller.</span></p><span data-dcnode-id="2306" instrument_node="">
</span><p data-dcnode-id="2276"><span data-dcnode-id="2305" instrument_node="">As I mentioned last week, I have been going out of my way to read some of the older </span><em data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Star Wars Legends</span></em><span data-dcnode-id="2302" instrument_node=""> tie-in novels, especially after all the fun I had recently reading and reviewing </span><a data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/04/15/throwback-thursday-star-wars-darth-plagueis-by-james-luceno/"><em data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">Darth Plagueis</span></em></a><span data-dcnode-id="2298" instrument_node="">.&nbsp; Despite no longer being considered canon since the Disney buyout, the </span><em data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">Star Wars Legends</span></em><span data-dcnode-id="2295" instrument_node=""> range contains some cracking reads, including the awesome horror read </span><a data-dcnode-id="2292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2019/01/31/throwback-thursday-star-wars-death-troopers-by-joe-schreiber/"><em data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Death Troopers</span></em></a><span data-dcnode-id="2291" instrument_node="">, the brutal prison novel </span><a data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/04/23/throwback-thursday-star-wars-maul-lockdown-by-joe-schreiber/"><em data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">Maul: Lockdown</span></em></a><span data-dcnode-id="2287" instrument_node="">, and the fun heist novel </span><a data-dcnode-id="2284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2019/12/20/throwback-thursday-star-wars-scoundrels-by-timothy-zahn/"><em data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Scoundrels</span></em></a><span data-dcnode-id="2283" instrument_node="">.&nbsp; I have been meaning to check out some other great </span><em data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">Legends</span></em><span data-dcnode-id="2280" instrument_node=""> novel for a while, but the one that I have been particularly excited to read is the 2013 novel, </span><em data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">Kenobi</span></em><span data-dcnode-id="2277" instrument_node="">.</span></p><span data-dcnode-id="2275" instrument_node="">
</span><p data-dcnode-id="2246"><em data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Kenobi</span></em><span data-dcnode-id="2272" instrument_node="">, which was one of the last novels released as part of the </span><em data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Legends</span></em><span data-dcnode-id="2269" instrument_node=""> line, is an intriguing read that follows Obi-Wan Kenobi in the aftermath of </span><em data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Revenge of the Sith</span></em><span data-dcnode-id="2266" instrument_node=""> and follows his early adventures on Tatooine.&nbsp; Not only does this book have an intriguing plot, but the upcoming release of the new </span><em data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">Obi-Wan Kenobi</span></em><span data-dcnode-id="2263" instrument_node=""> television series has got me more curious about this novel and I really wanted to see what differences occur between it and the show.&nbsp; I was also drawn to fact that </span><em data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Kenobi</span></em><span data-dcnode-id="2260" instrument_node=""> was written by the supremely talented tie-in author John Jackson Miller.&nbsp; Miller is a great author, who has written not only some intriguing </span><em data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Star Wars</span></em><span data-dcnode-id="2257" instrument_node=""> books but also some fantastic </span><em data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Star Trek</span></em><span data-dcnode-id="2254" instrument_node=""> novels, including </span><a data-dcnode-id="2251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2020/11/10/star-trek-discovery-die-standing-by-john-jackson-miller/"><em data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Die Standing</span></em></a><span data-dcnode-id="2250" instrument_node="">, which was particularly awesome.&nbsp; As such, I was pretty sure I was in for an outstanding time reading </span><em data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Kenobi</span></em><span data-dcnode-id="2247" instrument_node="">, and I definitely wasn’t disappointed.</span></p><span data-dcnode-id="2245" instrument_node="">
</span><p data-dcnode-id="2243"><img alt="Star Wars - Kenobi Cover 2" class="alignnone size-full wp-image-8886" data-attachment-id="8886" data-comments-opened="1" data-dcnode-id="2244" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Star Wars – Kenobi Cover 2" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-2.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-2.jpg?w=300" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-2.jpg" data-orig-size="890,602" data-permalink="https://unseenlibrary.com/2022/04/21/throwback-thursday-star-wars-kenobi-by-john-jackson-miller/star-wars-kenobi-cover-2/" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-2.jpg%3Fw%3D640&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-2.jpg?w=640 640w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-2.jpg?w=150 150w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-2.jpg?w=300 300w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-2.jpg?w=768 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-2.jpg 890w"></p><span data-dcnode-id="2242" instrument_node="">
</span><p data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">These are dark days for the galaxy.&nbsp; The Republic and the Jedi have fallen, and the Empire, along with its Sith masters, has risen in its place.&nbsp; All hope looks lost, except for an orphaned baby boy, now living on Tatooine, and watched over by a solitary protector, former Jedi Master Obi-Wan Kenobi.&nbsp; After failing to save his fallen apprentice, Obi-Wan has retreated to the wilds of Tatooine, determined to hone his abilities, protect his charge, and wait for the day that hope is ready to return to the galaxy. &nbsp;Sticking to the outskirts of the planet, Obi-Wan has taken on a new persona of Ben, a mysterious bearded and robed stranger, living alone in the desert and hiding from his past.&nbsp; However, despite all his attempts to blend in, Ben is still a Jedi, and trouble follows him wherever he goes.</span></p><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">A deadly conflict is brewing in the deserts of Tatooine as enterprising moisture farmers clash with desperate Tusken Raiders.&nbsp; The settlers are terrified of a new and ruthless Tusken war chief who has leading raids against their farmsteads, resulting in series of brutal retaliatory attacks.&nbsp; When the fight seeks to engulf some of Ben’s new friends, he is again dragged into a war he never asked for.&nbsp; Discovering a grave injustice as innocents are killed for a matter of greed, Ben will once again call upon the powers of the Force to ensure justice is done.&nbsp; But can he achieve his goals without revealing to the entire planet that he is a Jedi, or will his greatest secret be uncovered along with the galaxy’s last hope?</span></p><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2228"><span data-dcnode-id="2235" instrument_node="">Wow, this was a pretty impressive and captivating </span><em data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">Star Wars</span></em><span data-dcnode-id="2232" instrument_node=""> novel from Miller that does a wonderful job showing a unique period in an iconic character’s life.&nbsp; Featuring a brilliant and surprising story, set in the iconic backdrop of Tatooine, </span><em data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Kenobi</span></em><span data-dcnode-id="2229" instrument_node=""> is an excellent read that I had an amazing time getting through.</span></p><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2226" instrument_node="">I must admit that I was a little surprised with how this story turned out.&nbsp; With a name like </span><em data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Kenobi</span></em><span data-dcnode-id="2223" instrument_node="">, you would assume that the narrative would be primarily told by Obi-Wan as he tried to settle in and survive on Tatooine.&nbsp; However, Obi-Wan isn’t even a point-of-view character in this book, instead the story revolves more around some of the local people of Tatooine as they encounter Obi-Wan (or Ben, as he is known to them).&nbsp; While on paper this might sound weird, it actually works really well and Miller tells a taught, powerful and compelling narrative that perfectly utilises its titular character as a mysterious and somewhat unknown figure.&nbsp; Focusing on a growing battle between Tatooine settlers and the Tusken Raiders, the story shows the impact of the arriving Ben on these long-standing communities.&nbsp; Miller does a great job of introducing several excellent and impressive new characters who become connected to this early version of Ben Kenobi.&nbsp; Their story soon devolves into a fast-paced, character-driven adventure as Ben finds himself caught between the opposing sides.&nbsp; The growing war between them takes some interesting turns, including monsters, gangsters and hidden Jedi, and introduces a fantastic villain with some clever motivations.&nbsp; Miller does a great job of working the desolate setting of Tatooine and the excellent characters into this story, and you soon become attached to both as they enhance the overall the story.&nbsp; Everything comes together into a captivating and moving conclusion that is exciting, emotional, and a little dark in places, bringing everything together in a satisfying way.&nbsp; This intriguing story proves to be exceeding addictive and I really love the distinctive tale that Miller came up with.</span></p><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2189"><span data-dcnode-id="2220" instrument_node="">This proved to be a particularly good entry in the </span><em data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">Star Wars Legends</span></em><span data-dcnode-id="2217" instrument_node=""> canon, and Miller does an outstanding job of tying this story into the wider universe.&nbsp; Set right after the final scene of </span><em data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">Revenge of the Sith</span></em><span data-dcnode-id="2214" instrument_node="">, you get some intriguing views of the new galaxy under the Empire, as well as Kenobi’s early attempts to settle into obscurity on Tatooine (including the answer to the question: why did he keep the last name Kenobi? The answer may surprise you).&nbsp; Thanks to Miller’s excellent writing and the close relationship to the third prequel film, </span><em data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Kenobi</span></em><span data-dcnode-id="2211" instrument_node=""> is an easy novel to get into for anyone who has seen the films, and most readers will really appreciate the cool story it contains.&nbsp; There are multiple references to all three prequel films and </span><em data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">A New Hope</span></em><span data-dcnode-id="2208" instrument_node=""> in this book, and I know a lot of people will appreciate seeing how several of these events impacted the wider Tatooine community in surprisingly ways.&nbsp; Miller also makes sure to provide a ton of compelling references to some more obscure </span><em data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Star Wars Legends</span></em><span data-dcnode-id="2205" instrument_node=""> elements, including multiple characters and events from certain comics, such as </span><em data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Outlander</span></em><span data-dcnode-id="2202" instrument_node=""> arc of </span><em data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Star Wars: Republic</span></em><span data-dcnode-id="2199" instrument_node=""> and the </span><em data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Star Wars Legacy</span></em><span data-dcnode-id="2196" instrument_node=""> series.&nbsp; Some references are pretty ingrained in certain part of the Tusken Raider character’s backstories and motivations, although readers can probably get away without knowing too much about them as Miller does summarise the most relevant details.&nbsp; As such, there is a lot here for the hard-core </span><em data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Star Wars</span></em><span data-dcnode-id="2193" instrument_node=""> and </span><em data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Legends</span></em><span data-dcnode-id="2190" instrument_node=""> fans to enjoy with this book, and most readers will enjoy seeing how it ties into the former canon.</span></p><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2186"><img alt="Star Wars - Kenobi Cover 3" class="size-full wp-image-8887 aligncenter" data-attachment-id="8887" data-comments-opened="1" data-dcnode-id="2187" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Star Wars – Kenobi Cover 3" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-3.jpg?w=602" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-3.jpg?w=209" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-3.jpg" data-orig-size="602,866" data-permalink="https://unseenlibrary.com/2022/04/21/throwback-thursday-star-wars-kenobi-by-john-jackson-miller/star-wars-kenobi-cover-3/" sizes="(max-width: 602px) 100vw, 602px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-3.jpg%3Fw%3D640&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-3.jpg 602w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-3.jpg?w=104 104w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-3.jpg?w=209 209w"></p><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2171"><span data-dcnode-id="2184" instrument_node="">I have to say that I was quite impressed with how Miller utilises the barren and desolate planet of Tatooine as a setting in </span><em data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Kenobi</span></em><span data-dcnode-id="2181" instrument_node="">.&nbsp; This book serves as a particularly good guide to Tatooine in the </span><em data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Legends</span></em><span data-dcnode-id="2178" instrument_node=""> canon, and you are soon immersed in the various cultures and landscapes of this deadly planet.&nbsp; Not only are there multiple breathtaking and powerful depictions of the unforgiving desert landscape that the characters are forced to survive on but there are some fantastic looks at some of the creatures, monsters and threats that exist in the desert, most of which are encountered by the protagonists at some point.&nbsp; The readers are also treated to an intensive look at some of the main groups of people living on Tatooine, particularly the moisture farmers and the Tusken Raiders.&nbsp; I loved the depictions of these two different groups, with Miller amping up the resemblance to old West settlers and Native Americans in their cultures, disbursement, and conflict (the phrase “dancing with Tuskens” was used at one point).&nbsp; I learnt a surprising amount about moisture farming in this novel, which was pretty fun, and it was really interesting to see some of the outcasts and settlers who take up the hard lifestyle.&nbsp; However, the best depictions involve the Tuskens, who are featured pretty heavily thanks to the use of supporting character A’Yark.&nbsp; You get some fascinating looks at the tough and often unexplained Tuskens throughout </span><em data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Kenobi</span></em><span data-dcnode-id="2175" instrument_node=""> and end up coming away with some compelling looks at their culture and lifestyles, as well as some mentions about their most distinctive members in the </span><em data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Legends</span></em><span data-dcnode-id="2172" instrument_node=""> canon.&nbsp; I really appreciated the way that Miller portrayed them as a desperate people, thanks to several distinctive events from the films and the comics, and this becomes a major part of their motivations for fighting the settlers and coming into contact with Obi-Wan.&nbsp; You really get a deep look at this entire setting and its people throughout the course of the story and I am extremely glad Miller featured them so heavily</span></p><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2169" instrument_node="">Unsurprisingly, considering the title of this novel, the reader gets quite an intriguing look at the character of Obi-Wan Kenobi.&nbsp; This version of Obi-Wan is recently arrived on Tatooine, only just removed from delivering baby Luke to his aunt and uncle, and now trying to find his place in the new, darker universe.&nbsp; I really enjoyed how Obi-Wan was portrayed in this novel, especially as Miller made the interesting choice not to use him as a point-of-view character.&nbsp; Instead, you see him purely through the eyes of the rest of the cast as the mysterious and weird hermit, Ben.&nbsp; This actually works really well on many levels, providing at times a distant view of the protagonist that is reminiscent of Ben’s initial introductions in </span><em data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">A New Hope</span></em><span data-dcnode-id="2166" instrument_node="">.&nbsp; I really enjoyed the other character’s impressions of Ben, especially as the character is trying to hide his Jedi abilities, and the fun reactions to his apparently odd actions are quite entertaining at times.</span></p><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2163" instrument_node="">Despite Kenobi not being a point-of-view character, you do get some quite detailed impressions of his current state of mind, and it soon becomes apparent that Obi-Wan is emotionally raw after the events of </span><em data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Revenge of the Sith</span></em><span data-dcnode-id="2160" instrument_node="">.&nbsp; The other characters are quick to notice his apparent sadness, especially through certain noticeable reactions to particular topics, such as his past or the state of the galaxy.&nbsp; While these other characters may not understand their significance, the reader certainly does, and Miller does a good job of showcasing his deep pain.&nbsp; This troubled emotional state is also highlighted by several interludes that feature Obi-Wan’s attempted conversations with Qui-Gon Jinn in the Force, which summarise some of the recent events from Ben’s perspective while also examining his state of mind.&nbsp; As the novel continues, certain events and revelations start to push Kenobi’s buttons, especially the actions of the book’s antagonist.&nbsp; This eventually leads up to a big emotional outburst from Ben as he talks to one of the other characters about his failings in his past.&nbsp; Watching him beat himself up for Anakin turning to the Dark Side, as well as the fall of the Jedi and the death of all his friends, is pretty heartbreaking, and it makes for the best scene in the entire novel.&nbsp; I found it fascinating to see all these emotions unfurl as the plot continue, and the use of other character’s as the primary witnesses and interpreters of this, did a surprisingly good job of exploring the character’s mental state and showcasing just how alone and damaged he truly was.</span></p><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2157" instrument_node="">While Obi-Wan does get a substantial amount of focus throughout </span><em data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Kenobi</span></em><span data-dcnode-id="2154" instrument_node="">, the story is primarily told through the eyes of three separate point-of-view characters who Obi-Wan interacts with in different ways.&nbsp; All three characters are pretty fascinating in their own right, and Miller sets up some brilliant and clever storylines around them.&nbsp; My favourite of these is probably rancher and businessman Orrin Gault, who has an impressive and captivating character arc in </span><em data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Kenobi</span></em><span data-dcnode-id="2151" instrument_node="">.&nbsp; Initially portrayed as a compassionate, generous and ambitious moisture farmer who has set up the settler militia to oppose the Tusken Raids, Orrin appears to be a decent and noble figure.&nbsp; However, Orrin has a dark side brought on by hidden motivations and dealings, and it soon becomes clear that many of the issues impacting the other characters are the result of his machinations.&nbsp; Miller slowly reveals the full extent of Orrin’s misdeeds throughout the course of Kenobi, and he eventually turns into quite a conniving and distinctive antagonist.&nbsp; The author provides some outstanding and powerful moments for Orrin throughout the book, and there are some interesting similarities between his fall and that of Anakin Skywalker.&nbsp; I deeply enjoyed the full extent of his powerful arc in </span><em data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Kenobi</span></em><span data-dcnode-id="2148" instrument_node="">, especially as Miller comes up with a particularly dark end to his story, and his inclusion really added to overall impact and strength of this book’s narrative.</span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">The other major human character is Kallie Calwell, a store owner who runs the local watering hole and supply shop with her children and who has a close relationship with Orrin Gault.&nbsp; Kallie ends up becoming one of the leading figures of the book after she and her daughter are the first settlers in the area to encounter the mysterious Ben and are instantly enthralled by his mysterious persona.&nbsp; Kallie serves as a good narrator for a large portion of the novel and ends up being the central point of view figure for most of the interactions with Ben due to her romantic interest in him.&nbsp; While I must admit I wasn’t the biggest fan of Kallie’s character (she was a bit too one-note and her constant family issues got tiring), she did have some intriguing scenes, especially when she interacted with Ben.&nbsp; She ended up getting the most out of him emotionally, and her connection got him to open up at times to discuss his issues.</span></p><span data-dcnode-id="2143" instrument_node="">
</span><p data-dcnode-id="2138"><span data-dcnode-id="2142" instrument_node="">The other major point of view character was the deeply fascinating figure of A’Yark, the leader of the Tusken Raiders who have been raiding the local settlements.&nbsp; Given the title of Plug Eye by the locals due to only having one mysterious red eye, A’Yark stands as a hard and uncompromising figure, determined to save their dying tribe without losing their traditions and sense of honour.&nbsp; Thanks to A’Yark’s powerfully written scenes, you get a real sense of what it is to be a Tusken Raider, and they serve as captivating figure in comparison to the other characters in the book.&nbsp; A’Yark has great story arc in this novel, and the intriguing growth, as well as their ability to adapt to certain situations, made them particularly fun to watch.&nbsp; They also have some interesting connections to Obi-Wan and the Jedi Order, thanks to their former brother-in-law, and this results in some compelling scenes as A’Yark knows what Kenobi is and what he can do.&nbsp; All these characters, and more, add some fascinating elements to the </span><em data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Kenobi</span></em><span data-dcnode-id="2139" instrument_node=""> novel, and I really appreciated the powerful and complex story that Miller wove around them.</span></p><span data-dcnode-id="2137" instrument_node="">
</span><p data-dcnode-id="2135"><img alt="Star Wars - Kenobi Cover 4" class="wp-image-8888 aligncenter" data-attachment-id="8888" data-comments-opened="1" data-dcnode-id="2136" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Star Wars – Kenobi Cover 4" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-4.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-4.jpg?w=200" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-4.jpg" data-orig-size="1880,2821" data-permalink="https://unseenlibrary.com/2022/04/21/throwback-thursday-star-wars-kenobi-by-john-jackson-miller/star-wars-kenobi-cover-4/" height="887" loading="lazy" sizes="(max-width: 591px) 100vw, 591px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-4.jpg%3Fw%3D591%26h%3D887&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-4.jpg?w=591&amp;h=887 591w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-4.jpg?w=1182&amp;h=1774 1182w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-4.jpg?w=100&amp;h=150 100w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-4.jpg?w=200&amp;h=300 200w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-4.jpg?w=768&amp;h=1152 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/star-wars-kenobi-cover-4.jpg?w=682&amp;h=1024 682w" width="591"></p><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2111"><span data-dcnode-id="2133" instrument_node="">I doubt anyone would be surprised that I checked out </span><em data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Kenobi’s</span></em><span data-dcnode-id="2130" instrument_node=""> audiobook format, as I have a great love of the </span><em data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Star Wars</span></em><span data-dcnode-id="2127" instrument_node=""> audiobook format.&nbsp; Naturally this worked out very well for me as the </span><em data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Kenobi</span></em><span data-dcnode-id="2124" instrument_node=""> audiobook was pretty damn awesome.&nbsp; With a run time of just over 13 and a half hours, this was a relatively easy audiobook to get through and I managed to power through it over the course of several days.&nbsp; Like most of the </span><em data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Star Wars</span></em><span data-dcnode-id="2121" instrument_node=""> audiobooks, </span><em data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Kenobi</span></em><span data-dcnode-id="2118" instrument_node=""> featured a great selection of iconic </span><em data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Star Wars</span></em><span data-dcnode-id="2115" instrument_node=""> sound effects and music with which the producers use to produce an atmosphere and help listeners visuals all the cool things going on.&nbsp; Both were really good throughout </span><em data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Kenobi</span></em><span data-dcnode-id="2112" instrument_node="">, with the sound effects in particularly being put to great use.&nbsp; I did think that the use of John William’s epic score was a little more subtle here than in other books, but it still ended up enhancing some key scenes throughout the novel and giving them some extra emotional power.</span></p><span data-dcnode-id="2110" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2109" instrument_node="">I was also very impressed by the narration of the </span><em data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Kenobi</span></em><span data-dcnode-id="2106" instrument_node=""> audiobook, especially as the producers made excellent use of one of </span><a data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/09/28/top-ten-tuesday-my-favourite-audiobook-narrators/"><span data-dcnode-id="2105" instrument_node="">my favourite audiobook narrators</span></a><span data-dcnode-id="2103" instrument_node="">, Jonathan Davis.&nbsp; Davis is a brilliant narrator who has lent his epic voice out to multiple </span><em data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Star Wars</span></em><span data-dcnode-id="2100" instrument_node=""> productions over the years, including </span><a data-dcnode-id="2097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2019/05/12/star-wars-master-apprentice-by-claudia-gray-audiobook-review/"><em data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">Master &amp; Apprentice</span></em></a><span data-dcnode-id="2096" instrument_node="">, </span><a data-dcnode-id="2093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2020/04/24/throwback-thursday-stars-wars-lords-of-the-sith-by-paul-s-kemp/"><em data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Lords of the Sith</span></em></a><span data-dcnode-id="2092" instrument_node=""> and the </span><a data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2020/03/17/star-wars-dooku-jedi-lost/"><em data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Dooku: Jedi Lost</span></em></a><span data-dcnode-id="2088" instrument_node=""> audio drama.&nbsp; He does another exceptional job with </span><em data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Kenobi</span></em><span data-dcnode-id="2085" instrument_node="">, perfectly portraying all the characters of this novel with real aplomb.&nbsp; He does a pretty good job with Obi-Wan, making himself sound as much like Ewan McGregor as possible, and I loved how intense he became during some of his more dramatic scenes.&nbsp; Davis also provides distinctive voices for all the new characters in the novel, which I felt did a great job portraying their relevant personalities.&nbsp; I particularly loved the scratchy and coarse voices of the various Tusken Raider characters, such as A’Yark, and you got a real sense of their rage and despair they have at their current situation.&nbsp; This epic voice work really added to the quality of the </span><em data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Kenobi</span></em><span data-dcnode-id="2082" instrument_node=""> audiobook, and when combined with the usual awesome </span><em data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Star Wars</span></em><span data-dcnode-id="2079" instrument_node=""> sound effects and music, ensured that this was an absolute treat to listen to.</span></p><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2057"><span data-dcnode-id="2076" instrument_node="">Overall, </span><em data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Kenobi</span></em><span data-dcnode-id="2073" instrument_node=""> by John Jackson Miller is a brilliant and powerful </span><em data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Star Wars</span></em><span data-dcnode-id="2070" instrument_node=""> novel that did an outstanding job of examining this complex and pivotal figure.&nbsp; Perfectly examining the early days of Obi-Wan Kenobi’s life on Tatooine, this impressive </span><em data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Star Wars Legends</span></em><span data-dcnode-id="2067" instrument_node=""> novel contains an intriguing, character driven novel that provides an interesting perspective on this hidden Jedi master which I deeply enjoyed.&nbsp; Making full use of some great new characters and the desolate desert setting, this was a compelling and addictive narrative that is really hard to put down.&nbsp; Highly recommended, especially in its audiobook format, </span><em data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Kenobi</span></em><span data-dcnode-id="2064" instrument_node=""> is a great entry in the </span><em data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Star Wars Legends</span></em><span data-dcnode-id="2061" instrument_node=""> range and I look forward to seeing if any elements from it are used in the upcoming </span><em data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Obi-Wan Kenobi</span></em><span data-dcnode-id="2058" instrument_node=""> television show.</span></p><span data-dcnode-id="2056" instrument_node="">

</span><div class="entry-meta" data-dcnode-id="2021"><span data-dcnode-id="2040" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2035"><span data-dcnode-id="2039" instrument_node="">On </span><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/04/20/www-wednesday-20-april-2022/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="2037" datetime="2022-04-20T16:28:41+00:00"><span data-dcnode-id="2038" instrument_node="">April 20, 2022</span></time></a></span><span class="byline" data-dcnode-id="2030"><span data-dcnode-id="2034" instrument_node=""> By </span><span class="author vcard" data-dcnode-id="2031"><a class="url fn n" data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/author/unseenlibrary8/"><span data-dcnode-id="2033" instrument_node="">The Unseen Library</span></a></span></span><span class="cat-links" data-dcnode-id="2026"><span data-dcnode-id="2029" instrument_node="">In </span><a data-dcnode-id="2027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/category/www-wednesday/" rel="category tag"><span data-dcnode-id="2028" instrument_node="">WWW Wednesday</span></a></span><span class="comments-link" data-dcnode-id="2023"><a data-dcnode-id="2024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/04/20/www-wednesday-20-april-2022/%23respond"><span data-dcnode-id="2025" instrument_node="">Leave a comment</span></a></span><span data-dcnode-id="2022" instrument_node=""> </span></div><span data-dcnode-id="2019" instrument_node="">

</span><div class="entry-content" data-dcnode-id="1897"><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="2008"><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//samannelizabeth.wordpress.com/2022/04/20/www-wednesday-20-april-2022/"><span data-dcnode-id="2014" instrument_node="">WWW Wednesday</span></a><span data-dcnode-id="2012" instrument_node="">&nbsp;is a weekly meme hosted by&nbsp;</span><a data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//samannelizabeth.wordpress.com/"><span data-dcnode-id="2011" instrument_node="">Taking on a World of Words</span></a><span data-dcnode-id="2009" instrument_node="">, where bloggers share the books that they’ve recently finished, what they are currently reading and what books they are planning to read next. Essentially you have to answer three questions (the Three Ws):</span></p><span data-dcnode-id="2007" instrument_node="">

d="1985" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1984" instrument_node="">I have been really getting into this excellent historical drama from Australian author Kelly Rimmer, who really impressed me last year with her previous book, </span><a data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/05/15/the-warsaw-orphan-by-kelly-rimmer/"><em data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">The Warsaw Orphan</span></em></a><span data-dcnode-id="1980" instrument_node="">.&nbsp; Her latest novel, </span><em data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">The German Wife</span></em><span data-dcnode-id="1977" instrument_node="">, tells a complex and multi-layered story about the family of a former Nazi scientist who was recruited by the Americans to work on the US rocket program, and who face many issues from their new American neighbors.&nbsp; Containing an exceedingly intense narrative set around some powerful depictions of both Nazi German and 1950s America, </span><em data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">The German Wife</span></em><span data-dcnode-id="1974" instrument_node=""> is a brilliant read and I will hopefully finish it off in the next day or so.</span></p><span data-dcnode-id="1972" instrument_node="">

</span><p data-dcnode-id="1941"><span data-dcnode-id="1958" instrument_node="">I only just started the epic new novel from bestselling fantasy author John Gwynne, </span><em data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">The Hunger of the Gods</span></em><span data-dcnode-id="1955" instrument_node="">.&nbsp; The sequel to last year’s incredible </span><a data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/06/27/the-shadow-of-the-gods-by-john-gwynne/"><em data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">The Shadow of the Gods</span></em></a><span data-dcnode-id="1951" instrument_node=""> (one of </span><a data-dcnode-id="1949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/12/28/top-ten-tuesday-my-favourite-books-of-2021/"><span data-dcnode-id="1950" instrument_node="">my favourite books</span></a><span data-dcnode-id="1948" instrument_node=""> and </span><a data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/12/21/top-ten-tuesday-my-favourite-audiobooks-of-2021/"><span data-dcnode-id="1947" instrument_node="">audiobooks</span></a><span data-dcnode-id="1945" instrument_node=""> of 2021), </span><em data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">The Hunger of the Gods</span></em><span data-dcnode-id="1942" instrument_node=""> looks set to be another outstanding novel and I cannot wait to see what exceptional, dark fantasy craziness occurs here.&nbsp; This is a pretty massive audiobook so it might take me a little while to get through it, but hopefully I will have made some major progress by this time next week.</span></p><span data-dcnode-id="1940" instrument_node="">
