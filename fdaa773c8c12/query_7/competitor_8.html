</span><p data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">I’ve just had a rather good week for book collecting, which included a particularly big parcel from one publisher that was filled with awesome reads.&nbsp; As these books included some pretty amazing novels, including a couple that I was extremely excited to get, I figured I would do a Book Haul post to gloat about, I mean, lovingly highlight, the latest additions to my collection.&nbsp; All the below books sound really cool and I can’t wait to get through them all.</span></p><span data-dcnode-id="2675" instrument_node="">
</span><h2 data-dcnode-id="2670" style="text-align:center;"><a data-dcnode-id="2671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/12/15/waiting-on-wednesday-the-hunger-of-the-gods-by-john-gwynne/"><em data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">The Hunger of the Gods</span></em><span data-dcnode-id="2672" instrument_node=""> by John Gwynne</span></a></h2><span data-dcnode-id="2669" instrument_node="">
</span><p data-dcnode-id="2667"><img alt="The Hunger of the Gods Cover" class="wp-image-7779 aligncenter" data-attachment-id="7779" data-comments-opened="1" data-dcnode-id="2668" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="The Hunger of the Gods Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2021/12/the-hunger-of-the-gods-cover.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2021/12/the-hunger-of-the-gods-cover.jpg?w=195" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2021/12/the-hunger-of-the-gods-cover.jpg" data-orig-size="1661,2560" data-permalink="https://unseenlibrary.com/2021/12/15/waiting-on-wednesday-the-hunger-of-the-gods-by-john-gwynne/the-hunger-of-the-gods-cover/" height="873" loading="lazy" sizes="(max-width: 567px) 100vw, 567px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2021/12/the-hunger-of-the-gods-cover.jpg%3Fw%3D567%26h%3D873&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2021/12/the-hunger-of-the-gods-cover.jpg?w=567&amp;h=873 567w, https://unseenlibrarycom.files.wordpress.com/2021/12/the-hunger-of-the-gods-cover.jpg?w=1134&amp;h=1746 1134w, https://unseenlibrarycom.files.wordpress.com/2021/12/the-hunger-of-the-gods-cover.jpg?w=97&amp;h=150 97w, https://unseenlibrarycom.files.wordpress.com/2021/12/the-hunger-of-the-gods-cover.jpg?w=195&amp;h=300 195w, https://unseenlibrarycom.files.wordpress.com/2021/12/the-hunger-of-the-gods-cover.jpg?w=768&amp;h=1184 768w, https://unseenlibrarycom.files.wordpress.com/2021/12/the-hunger-of-the-gods-cover.jpg?w=664&amp;h=1024 664w" width="567"></p><span data-dcnode-id="2666" instrument_node="">
</span><p data-dcnode-id="2645"><span data-dcnode-id="2665" instrument_node="">So let us start this Book Haul off with the book I was most excited to get, the epic </span><em data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">The Hunger of the Gods</span></em><span data-dcnode-id="2662" instrument_node=""> by John Gwynne, one of </span><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/01/04/top-ten-tuesday-most-anticipated-books-releasing-in-the-first-half-of-2022-fantasy/"><span data-dcnode-id="2661" instrument_node="">my most anticipated reads for 2022</span></a><span data-dcnode-id="2659" instrument_node="">.&nbsp; The sequel to Gwynne’s brilliant </span><a data-dcnode-id="2656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/06/27/the-shadow-of-the-gods-by-john-gwynne/"><em data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">The Shadow of the Gods</span></em></a><span data-dcnode-id="2655" instrument_node=""> (one of </span><a data-dcnode-id="2653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/12/28/top-ten-tuesday-my-favourite-books-of-2021/"><span data-dcnode-id="2654" instrument_node="">my favourite books</span></a><span data-dcnode-id="2652" instrument_node=""> and </span><a data-dcnode-id="2650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/12/21/top-ten-tuesday-my-favourite-audiobooks-of-2021/"><span data-dcnode-id="2651" instrument_node="">audiobooks</span></a><span data-dcnode-id="2649" instrument_node=""> of 2021), this outstanding novel continues the impressive, Norse inspired, dark fantasy </span><em data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">Bloodsworn Saga</span></em><span data-dcnode-id="2646" instrument_node=""> in a big way by setting reborn gods against each other as savage warriors battle for revenge, glory and survival.&nbsp; I have already started this awesome novel and it is turning out to pretty damn good, and this is probably going to get another five-star rating from me.&nbsp; Also, just check out that incredible cover!!!!!</span></p><span data-dcnode-id="2644" instrument_node="">
</span><p data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2641" instrument_node="">
</span><h2 data-dcnode-id="2637" style="text-align:center;"><em data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">The German Wife</span></em><span data-dcnode-id="2638" instrument_node=""> by Kelly Rimmer</span></h2><span data-dcnode-id="2636" instrument_node="">
</span><p data-dcnode-id="2634"><img alt="The German Wife Cover" class="wp-image-8876 aligncenter" data-attachment-id="8876" data-comments-opened="1" data-dcnode-id="2635" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="The German Wife Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=196" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg" data-orig-size="1807,2764" data-permalink="https://unseenlibrary.com/2022/04/20/www-wednesday-20-april-2022/the-german-wife-cover/" height="861" loading="lazy" sizes="(max-width: 562px) 100vw, 562px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg%3Fw%3D562%26h%3D861&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=562&amp;h=861 562w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=1124&amp;h=1719 1124w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=98&amp;h=150 98w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=196&amp;h=300 196w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=768&amp;h=1175 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=669&amp;h=1024 669w" width="562"></p><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2624"><span data-dcnode-id="2632" instrument_node="">I was also lucky enough to receive historical drama </span><em data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">The German Wife</span></em><span data-dcnode-id="2629" instrument_node=""> from Australian author Kelly Rimmer, who blew me away last year with her moving novel, </span><a data-dcnode-id="2626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/05/15/the-warsaw-orphan-by-kelly-rimmer/"><em data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">The Warsaw Orphan</span></em></a><span data-dcnode-id="2625" instrument_node="">.&nbsp; I actually have already read this great book and it was another powerful historical drama that presents a complex portrayal of life under the Nazis and the lasting consequences of the choices people make.</span></p><span data-dcnode-id="2623" instrument_node="">
</span><p data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2620" instrument_node="">
</span><h2 data-dcnode-id="2616" style="text-align:center;"><em data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Desperate Undertaking</span></em><span data-dcnode-id="2617" instrument_node=""> by Lindsey Davis</span></h2><span data-dcnode-id="2615" instrument_node="">
</span><p data-dcnode-id="2613"><img alt="Desperate Undertaking Cover 2" class="wp-image-8880 aligncenter" data-attachment-id="8880" data-comments-opened="1" data-dcnode-id="2614" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Desperate Undertaking Cover 2" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/desperate-undertaking-cover-2.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/desperate-undertaking-cover-2.jpg?w=195" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/desperate-undertaking-cover-2.jpg" data-orig-size="1840,2836" data-permalink="https://unseenlibrary.com/2022/04/20/www-wednesday-20-april-2022/desperate-undertaking-cover-2/" height="879" loading="lazy" sizes="(max-width: 570px) 100vw, 570px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/desperate-undertaking-cover-2.jpg%3Fw%3D570%26h%3D879&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/desperate-undertaking-cover-2.jpg?w=570&amp;h=879 570w, https://unseenlibrarycom.files.wordpress.com/2022/04/desperate-undertaking-cover-2.jpg?w=1140&amp;h=1758 1140w, https://unseenlibrarycom.files.wordpress.com/2022/04/desperate-undertaking-cover-2.jpg?w=97&amp;h=150 97w, https://unseenlibrarycom.files.wordpress.com/2022/04/desperate-undertaking-cover-2.jpg?w=195&amp;h=300 195w, https://unseenlibrarycom.files.wordpress.com/2022/04/desperate-undertaking-cover-2.jpg?w=768&amp;h=1184 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/desperate-undertaking-cover-2.jpg?w=664&amp;h=1024 664w" width="570"></p><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2583"><span data-dcnode-id="2611" instrument_node="">I was very, very happy to receive the latest </span><em data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">Flavia Albia</span></em><span data-dcnode-id="2608" instrument_node=""> novel from historical fiction author Lindsey Davis, </span><em data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Desperate Undertaking</span></em><span data-dcnode-id="2605" instrument_node="">.&nbsp; The </span><em data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">Flavia Albia</span></em><span data-dcnode-id="2602" instrument_node=""> books are some of my favourite historical fiction novels and they are a brilliant and much anticipated addition to my yearly reading schedule (some of the best ones include </span><a data-dcnode-id="2599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2018/11/29/throwback-thursday-canberra-weekly-column-historical-crime-fiction/"><em data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">The Third Nero</span></em></a><span data-dcnode-id="2598" instrument_node="">, </span><a data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2018/05/30/pandoras-boy-by-lindsey-davis/"><em data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">Pandora’s Boy</span></em></a><span data-dcnode-id="2594" instrument_node="">, </span><a data-dcnode-id="2588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2020/06/01/the-grove-of-the-caesars-by-lindsey-davis/"><em data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">The</span></em><span data-dcnode-id="2591" instrument_node=""> </span><em data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">Grove of the Caesars</span></em></a><span data-dcnode-id="2587" instrument_node="">).&nbsp; I just started reading </span><em data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">Desperate Undertakings</span></em><span data-dcnode-id="2584" instrument_node=""> today and I am already loving its great story about a serial killer who is murdering members of ancient Rome’s theatre scene in some elaborate, play inspired ways.&nbsp; This already shaping up to be one of the better entries in this long-running series and I cannot wait to see how it all comes together.</span></p><span data-dcnode-id="2582" instrument_node="">
</span><p data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2579" instrument_node="">
</span><h2 data-dcnode-id="2575" style="text-align:center;"><em data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">The Man in the Bunker</span></em><span data-dcnode-id="2576" instrument_node=""> by Rory Clements</span></h2><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2572"><img alt="The Man in the Bunker" class="wp-image-8905 aligncenter" data-attachment-id="8905" data-comments-opened="1" data-dcnode-id="2573" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="The Man in the Bunker" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-man-in-the-bunker.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-man-in-the-bunker.jpg?w=195" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-man-in-the-bunker.jpg" data-orig-size="1843,2835" data-permalink="https://unseenlibrary.com/2022/04/24/book-haul-24-april-2022/the-man-in-the-bunker/" height="869" loading="lazy" sizes="(max-width: 564px) 100vw, 564px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/the-man-in-the-bunker.jpg%3Fw%3D564%26h%3D869&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/the-man-in-the-bunker.jpg?w=564&amp;h=869 564w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-man-in-the-bunker.jpg?w=1128&amp;h=1735 1128w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-man-in-the-bunker.jpg?w=98&amp;h=150 98w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-man-in-the-bunker.jpg?w=195&amp;h=300 195w" width="564"></p><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2570" instrument_node="">Another great book I was excited to get is the latest entry in the </span><em data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">Tom Wilde</span></em><span data-dcnode-id="2567" instrument_node=""> series, </span><em data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">The Man in the Bunker</span></em><span data-dcnode-id="2564" instrument_node=""> by Rory Clements.&nbsp; Set at the end of World War II, this interesting read will follow protagonist Tom Wilde as he attempts to determine whether Hitler died in the bunker or actually escaped.&nbsp; Sure to be a great historical thriller, I cannot wait to read this book.</span></p><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2559" instrument_node="">
</span><h2 data-dcnode-id="2555" style="text-align:center;"><em data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">One Foot in the Fade</span></em><span data-dcnode-id="2556" instrument_node=""> by Luke Arnold</span></h2><span data-dcnode-id="2554" instrument_node="">
</span><p data-dcnode-id="2552"><img alt="One Foot in the Fade Cover" class="wp-image-7980 aligncenter" data-attachment-id="7980" data-comments-opened="1" data-dcnode-id="2553" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="One Foot in the Fade Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/01/one-foot-in-the-fade-cover.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/01/one-foot-in-the-fade-cover.jpg?w=193" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/01/one-foot-in-the-fade-cover.jpg" data-orig-size="1650,2560" data-permalink="https://unseenlibrary.com/2022/01/04/top-ten-tuesday-most-anticipated-books-releasing-in-the-first-half-of-2022-fantasy/one-foot-in-the-fade-cover/" height="871" loading="lazy" sizes="(max-width: 561px) 100vw, 561px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/01/one-foot-in-the-fade-cover.jpg%3Fw%3D561%26h%3D871&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/01/one-foot-in-the-fade-cover.jpg?w=561&amp;h=871 561w, https://unseenlibrarycom.files.wordpress.com/2022/01/one-foot-in-the-fade-cover.jpg?w=1122&amp;h=1742 1122w, https://unseenlibrarycom.files.wordpress.com/2022/01/one-foot-in-the-fade-cover.jpg?w=97&amp;h=150 97w, https://unseenlibrarycom.files.wordpress.com/2022/01/one-foot-in-the-fade-cover.jpg?w=193&amp;h=300 193w, https://unseenlibrarycom.files.wordpress.com/2022/01/one-foot-in-the-fade-cover.jpg?w=768&amp;h=1192 768w, https://unseenlibrarycom.files.wordpress.com/2022/01/one-foot-in-the-fade-cover.jpg?w=660&amp;h=1024 660w" width="561"></p><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2532"><span data-dcnode-id="2550" instrument_node="">Australian author Luke Arnold’s </span><em data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">Fetch Phillips</span></em><span data-dcnode-id="2547" instrument_node=""> urban fantasy series continues with the third book, </span><em data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">One Foot in the Fade</span></em><span data-dcnode-id="2544" instrument_node="">.&nbsp; The intriguing follow-up to Arnold’s first two novels, </span><a data-dcnode-id="2541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2020/01/27/the-last-smile-in-sunder-city-by-luke-arnold/"><em data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">The Last Smile in Sunder City</span></em></a><span data-dcnode-id="2540" instrument_node=""> and </span><a data-dcnode-id="2537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2020/10/27/canberra-weekly-column-fantasy-6/"><em data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">Dead Man in a Ditch</span></em></a><span data-dcnode-id="2536" instrument_node="">, </span><em data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">One Foot in the Fade</span></em><span data-dcnode-id="2533" instrument_node=""> will once again follow protagonist Fetch Phillips as he continues to try and bring magic back to his city.&nbsp; This time he must deal with mysterious falling angels landing on the street which will no doubt leave to another awesome mystery.</span></p><span data-dcnode-id="2531" instrument_node="">
</span><p data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2528" instrument_node="">
</span><h2 data-dcnode-id="2524" style="text-align:center;"><em data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Wake</span></em><span data-dcnode-id="2525" instrument_node=""> by Shelley Burr</span></h2><span data-dcnode-id="2523" instrument_node="">
</span><p data-dcnode-id="2521"><img alt="Wake Cover" class="wp-image-8906 aligncenter" data-attachment-id="8906" data-comments-opened="1" data-dcnode-id="2522" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Wake Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/wake-cover.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/wake-cover.jpg?w=196" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/wake-cover.jpg" data-orig-size="1808,2764" data-permalink="https://unseenlibrary.com/2022/04/24/book-haul-24-april-2022/wake-cover/" height="865" loading="lazy" sizes="(max-width: 566px) 100vw, 566px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/wake-cover.jpg%3Fw%3D566%26h%3D865&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/wake-cover.jpg?w=566&amp;h=865 566w, https://unseenlibrarycom.files.wordpress.com/2022/04/wake-cover.jpg?w=1132&amp;h=1730 1132w, https://unseenlibrarycom.files.wordpress.com/2022/04/wake-cover.jpg?w=98&amp;h=150 98w, https://unseenlibrarycom.files.wordpress.com/2022/04/wake-cover.jpg?w=196&amp;h=300 196w, https://unseenlibrarycom.files.wordpress.com/2022/04/wake-cover.jpg?w=768&amp;h=1174 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/wake-cover.jpg?w=670&amp;h=1024 670w" width="566"></p><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2512"><span data-dcnode-id="2519" instrument_node="">One of the most interesting novels I received as part of this haul is the compelling new debut from Canberran author Shelley Burr, </span><em data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">Wake</span></em><span data-dcnode-id="2516" instrument_node="">.&nbsp; Set in small town, outback Australia, </span><em data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Wake</span></em><span data-dcnode-id="2513" instrument_node=""> is an incredible mystery thriller which sees a determined investigator attempt to solve an impossible disappearance.&nbsp; I deeply love the sound of this extremely compelling and very dark narrative and I look forward to finding out the clever secrets contained within.</span></p><span data-dcnode-id="2511" instrument_node="">
</span><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2508" instrument_node="">
</span><h2 data-dcnode-id="2504" style="text-align:center;"><em data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">Skyward Flight</span></em><span data-dcnode-id="2505" instrument_node=""> by Brandon Sanderson and Janci Patterson</span></h2><span data-dcnode-id="2503" instrument_node="">
</span><p data-dcnode-id="2501"><img alt="Skyward Flight Cover" class="wp-image-8907 aligncenter" data-attachment-id="8907" data-comments-opened="1" data-dcnode-id="2502" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Skyward Flight Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/skyward-flight-cover.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/skyward-flight-cover.jpg?w=196" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/skyward-flight-cover.jpg" data-orig-size="1808,2771" data-permalink="https://unseenlibrary.com/2022/04/24/book-haul-24-april-2022/skyward-flight-cover/" height="865" loading="lazy" sizes="(max-width: 564px) 100vw, 564px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/skyward-flight-cover.jpg%3Fw%3D564%26h%3D865&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/skyward-flight-cover.jpg?w=564&amp;h=865 564w, https://unseenlibrarycom.files.wordpress.com/2022/04/skyward-flight-cover.jpg?w=1128&amp;h=1730 1128w, https://unseenlibrarycom.files.wordpress.com/2022/04/skyward-flight-cover.jpg?w=98&amp;h=150 98w, https://unseenlibrarycom.files.wordpress.com/2022/04/skyward-flight-cover.jpg?w=196&amp;h=300 196w, https://unseenlibrarycom.files.wordpress.com/2022/04/skyward-flight-cover.jpg?w=768&amp;h=1177 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/skyward-flight-cover.jpg?w=668&amp;h=1024 668w" width="564"></p><span data-dcnode-id="2500" instrument_node="">
</span><p data-dcnode-id="2459"><span data-dcnode-id="2499" instrument_node="">I was quite excited to receive a copy of </span><em data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">Skyward Flight</span></em><span data-dcnode-id="2496" instrument_node="">, the ultimate companion to Brandon Sanderson’s </span><em data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Skyward</span></em><span data-dcnode-id="2493" instrument_node=""> series.&nbsp; I have a lot of love for the </span><em data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Skyward</span></em><span data-dcnode-id="2490" instrument_node=""> novels which follows a determined teenage fighter pilot who is determined to save her planet from an alien invasion.&nbsp; Made up of </span><a data-dcnode-id="2487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2018/12/28/skyward-by-brandon-sanderson/"><em data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">Skyward</span></em></a><span data-dcnode-id="2486" instrument_node=""> (one of </span><a data-dcnode-id="2484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2018/12/31/my-top-ten-reads-for-2018/"><span data-dcnode-id="2485" instrument_node="">my favourite books of 2018</span></a><span data-dcnode-id="2483" instrument_node="">), </span><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2019/11/19/starsight-by-brandon-sanderson/"><em data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Starsight</span></em></a><span data-dcnode-id="2479" instrument_node=""> (one of </span><a data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2019/12/31/top-ten-tuesday-my-top-books-of-2019/"><span data-dcnode-id="2478" instrument_node="">my favourite books of 2019</span></a><span data-dcnode-id="2476" instrument_node="">) and </span><a data-dcnode-id="2473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/12/21/cytonic-by-brandon-sanderson/"><em data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">Cytonic</span></em></a><span data-dcnode-id="2472" instrument_node="">, this has been an awesome series to read, and </span><em data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">Skyward Flight</span></em><span data-dcnode-id="2469" instrument_node=""> will provide some further context to the existing books.&nbsp; Collecting the three novellas, </span><em data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Sunreach</span></em><span data-dcnode-id="2466" instrument_node="">, </span><em data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">ReDawn</span></em><span data-dcnode-id="2463" instrument_node=""> and </span><em data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">Evershore</span></em><span data-dcnode-id="2460" instrument_node="">, which Sanderson cowrote with Janci Patterson, the stories in this book focus on the supporting cast from the first two novels and showcases what happens while the protagonist is trapped in another dimension.&nbsp; I have been meaning to explore these novellas for a while and this big volume looks to be the ultimate opportunity to finally do that.</span></p><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2455" instrument_node="">
</span><h2 data-dcnode-id="2451" style="text-align:center;"><em data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">Blood Sugar</span></em><span data-dcnode-id="2452" instrument_node=""> by Sascha Rothchild</span></h2><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2448"><img alt="Blood Sugar Cover" class="wp-image-8908 aligncenter" data-attachment-id="8908" data-comments-opened="1" data-dcnode-id="2449" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Blood Sugar Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/blood-sugar-cover.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/blood-sugar-cover.jpg?w=195" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/blood-sugar-cover.jpg" data-orig-size="1843,2835" data-permalink="https://unseenlibrary.com/2022/04/24/book-haul-24-april-2022/blood-sugar-cover-2/" height="855" loading="lazy" sizes="(max-width: 555px) 100vw, 555px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/blood-sugar-cover.jpg%3Fw%3D555%26h%3D855&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/blood-sugar-cover.jpg?w=555&amp;h=855 555w, https://unseenlibrarycom.files.wordpress.com/2022/04/blood-sugar-cover.jpg?w=1110&amp;h=1707 1110w, https://unseenlibrarycom.files.wordpress.com/2022/04/blood-sugar-cover.jpg?w=98&amp;h=150 98w, https://unseenlibrarycom.files.wordpress.com/2022/04/blood-sugar-cover.jpg?w=195&amp;h=300 195w" width="555"></p><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2439"><span data-dcnode-id="2446" instrument_node="">Easily the most uniquely entertaining sounding book I received in this haul was the fantastic murder mystery book, </span><em data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Blood Sugar</span></em><span data-dcnode-id="2443" instrument_node=""> by Sascha Rothchild.&nbsp; The debut novel from Rothchild, </span><em data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">Blood Sugar</span></em><span data-dcnode-id="2440" instrument_node=""> tells the tale of a killer, Ruby, who finds herself accused of four separate murders.&nbsp; However, Ruby only committed three of the murders, and now the crime she didn’t commit may finally bring her down.</span></p><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2435" instrument_node="">
</span><h2 data-dcnode-id="2431" style="text-align:center;"><em data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Portrait of a Thief</span></em><span data-dcnode-id="2432" instrument_node=""> by Grace D. Li</span></h2><span data-dcnode-id="2430" instrument_node="">
</span><p data-dcnode-id="2428"><img alt="Potrait of a Thief Cover" class="wp-image-8909 aligncenter" data-attachment-id="8909" data-comments-opened="1" data-dcnode-id="2429" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Potrait of a Thief Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/potrait-of-a-thief-cover.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/potrait-of-a-thief-cover.jpg?w=196" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/potrait-of-a-thief-cover.jpg" data-orig-size="1590,2430" data-permalink="https://unseenlibrary.com/2022/04/24/book-haul-24-april-2022/potrait-of-a-thief-cover/" height="861" loading="lazy" sizes="(max-width: 563px) 100vw, 563px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/potrait-of-a-thief-cover.jpg%3Fw%3D563%26h%3D861&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/potrait-of-a-thief-cover.jpg?w=563&amp;h=861 563w, https://unseenlibrarycom.files.wordpress.com/2022/04/potrait-of-a-thief-cover.jpg?w=1126&amp;h=1722 1126w, https://unseenlibrarycom.files.wordpress.com/2022/04/potrait-of-a-thief-cover.jpg?w=98&amp;h=150 98w, https://unseenlibrarycom.files.wordpress.com/2022/04/potrait-of-a-thief-cover.jpg?w=196&amp;h=300 196w, https://unseenlibrarycom.files.wordpress.com/2022/04/potrait-of-a-thief-cover.jpg?w=768&amp;h=1174 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/potrait-of-a-thief-cover.jpg?w=670&amp;h=1024 670w" width="563"></p><span data-dcnode-id="2427" instrument_node="">
</span><p data-dcnode-id="2422"><span data-dcnode-id="2426" instrument_node="">Another great debut novel I was excited to get was </span><em data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">Portrait of a Thief</span></em><span data-dcnode-id="2423" instrument_node=""> from Grace D. Li.&nbsp; This book is billed as a heist novel that also looks at unique friendships and culture as five Chinese American students attempt to steal valuable Chinese artworks from an American museum.&nbsp; I love the idea of a heist story that also looks at five character’s relationships with both their home and adopted countries, and I am very keen to try this novel out.</span></p><span data-dcnode-id="2421" instrument_node="">
</span><p data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2418" instrument_node="">
</span><h2 data-dcnode-id="2414" style="text-align:center;"><em data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">No Less The Devil</span></em><span data-dcnode-id="2415" instrument_node=""> by Stuart MacBride</span></h2><span data-dcnode-id="2413" instrument_node="">
</span><p data-dcnode-id="2411"><img alt="No Less the Devil Cover" class="wp-image-8910 aligncenter" data-attachment-id="8910" data-comments-opened="1" data-dcnode-id="2412" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="No Less the Devil Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/no-less-the-devil-cover.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/no-less-the-devil-cover.jpg?w=196" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/no-less-the-devil-cover.jpg" data-orig-size="1807,2764" data-permalink="https://unseenlibrary.com/2022/04/24/book-haul-24-april-2022/no-less-the-devil-cover/" height="854" loading="lazy" sizes="(max-width: 558px) 100vw, 558px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/no-less-the-devil-cover.jpg%3Fw%3D558%26h%3D854&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/no-less-the-devil-cover.jpg?w=558&amp;h=854 558w, https://unseenlibrarycom.files.wordpress.com/2022/04/no-less-the-devil-cover.jpg?w=1116&amp;h=1708 1116w, https://unseenlibrarycom.files.wordpress.com/2022/04/no-less-the-devil-cover.jpg?w=98&amp;h=150 98w, https://unseenlibrarycom.files.wordpress.com/2022/04/no-less-the-devil-cover.jpg?w=196&amp;h=300 196w, https://unseenlibrarycom.files.wordpress.com/2022/04/no-less-the-devil-cover.jpg?w=768&amp;h=1175 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/no-less-the-devil-cover.jpg?w=669&amp;h=1024 669w" width="558"></p><span data-dcnode-id="2410" instrument_node="">
</span><p data-dcnode-id="2399"><span data-dcnode-id="2409" instrument_node="">The final book I received was </span><em data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">No Less the Devil</span></em><span data-dcnode-id="2406" instrument_node=""> from bestselling author Stuart MacBride.&nbsp; Serving as the latest entry in the </span><em data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Oldcastle</span></em><span data-dcnode-id="2403" instrument_node=""> series, </span><em data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">No Less the Devil</span></em><span data-dcnode-id="2400" instrument_node=""> will focus on both a hunt for a notorious serial killer and a mysterious case of another killer caught up in a shadowy conspiracy.&nbsp; This sounds like a great, dark mystery and I am curious to try out Stuart MacBride’s work for the first time.</span></p><span data-dcnode-id="2398" instrument_node="">
</span><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2395" instrument_node="">
</span><p data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">Well that’s the end of this latest Book Haul post.&nbsp; As you can see I have quite a bit of reading to do at the moment thanks to all these awesome books that have come in.&nbsp; Let me know which of the above you are most interested in and make sure to check back in a few weeks to see my reviews of them.</span></p><span data-dcnode-id="2392" instrument_node="">
</span></div><span data-dcnode-id="2389" instrument_node="">
</span></div><span data-dcnode-id="2387" instrument_node="">

</span><header class="entry-header" data-dcnode-id="2339"><span data-dcnode-id="2381" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2378"><a data-dcnode-id="2379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/04/21/throwback-thursday-star-wars-kenobi-by-john-jackson-miller/" rel="bookmark"><span data-dcnode-id="2380" instrument_node="">Throwback Thursday: Star Wars: Kenobi by John Jackson&nbsp;Miller</span></a></h1><span data-dcnode-id="2377" instrument_node="">
