</span><header class="entry-header" data-dcnode-id="3407"><span data-dcnode-id="3437" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="3434"><a data-dcnode-id="3435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/04/26/top-ten-tuesday-my-favourite-books-with-dragons-on-the-cover/" rel="bookmark"><span data-dcnode-id="3436" instrument_node="">Top Ten Tuesday – My Favourite Books with Dragons on the&nbsp;Cover</span></a></h1><span data-dcnode-id="3433" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="3410"><span data-dcnode-id="3432" instrument_node="">
</span><span class="posted-on" data-dcnode-id="3427"><span data-dcnode-id="3431" instrument_node="">On </span><a data-dcnode-id="3428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/04/26/top-ten-tuesday-my-favourite-books-with-dragons-on-the-cover/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="3429" datetime="2022-04-26T16:50:58+00:00"><span data-dcnode-id="3430" instrument_node="">April 26, 2022</span></time></a></span><span class="byline" data-dcnode-id="3422"><span data-dcnode-id="3426" instrument_node=""> By </span><span class="author vcard" data-dcnode-id="3423"><a class="url fn n" data-dcnode-id="3424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/author/unseenlibrary8/"><span data-dcnode-id="3425" instrument_node="">The Unseen Library</span></a></span></span><span class="cat-links" data-dcnode-id="3415"><span data-dcnode-id="3421" instrument_node="">In </span><a data-dcnode-id="3419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/category/fantasy/" rel="category tag"><span data-dcnode-id="3420" instrument_node="">Fantasy</span></a><span data-dcnode-id="3418" instrument_node="">, </span><a data-dcnode-id="3416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/category/list/" rel="category tag"><span data-dcnode-id="3417" instrument_node="">List</span></a></span><span class="comments-link" data-dcnode-id="3412"><a data-dcnode-id="3413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/04/26/top-ten-tuesday-my-favourite-books-with-dragons-on-the-cover/%23comments"><span data-dcnode-id="3414" instrument_node="">5 Comments</span></a></span><span data-dcnode-id="3411" instrument_node=""> </span></div><span data-dcnode-id="3408" instrument_node="">
</span></header><span data-dcnode-id="3405" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3110"><span data-dcnode-id="3404" instrument_node="">
</span><p data-dcnode-id="3397"><a data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thatartsyreadergirl.com/top-ten-tuesday/"><span data-dcnode-id="3403" instrument_node="">Top Ten Tuesday</span></a><span data-dcnode-id="3401" instrument_node=""> is a weekly meme that currently resides at </span><a data-dcnode-id="3399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thatartsyreadergirl.com/"><span data-dcnode-id="3400" instrument_node="">The Artsy Reader Girl</span></a><span data-dcnode-id="3398" instrument_node=""> and features bloggers sharing lists on various book topics.&nbsp; For this week’s Top Ten Tuesday participants are tasked with listing their top books that have covers with a specific design element chosen by the blogger, for example books with certain colours, items or animals on their cover.&nbsp; I thought that this was a pretty clever idea for a topic and I decided to go big with it and choose book covers that have the ultimate animal for my list, dragons.</span></p><span data-dcnode-id="3396" instrument_node="">
</span><p data-dcnode-id="3388"><span data-dcnode-id="3395" instrument_node="">Let’s face it, we all love dragons!&nbsp; They are some of the coolest creatures in mythology, with multiple cultures having their own version or alteration of the dragon in their storytelling traditions.&nbsp; Due to how iconic there are, the use of dragons in storytelling naturally transferred itself across to the world of fantasy fiction, becoming one of the most classic and well utilised monsters or companion creatures in books and movies, such as </span><em data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">The Hobbit</span></em><span data-dcnode-id="3392" instrument_node=""> and the </span><em data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">A Song of Ice and Fire</span></em><span data-dcnode-id="3389" instrument_node=""> series. &nbsp;As such there are multiple book covers out there that feature dragons to some degree and I was curious to see which ones amongst them were my favourite.</span></p><span data-dcnode-id="3387" instrument_node="">
</span><p data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">To pull this list together, I had a think about all the best books that featured cool dragon-related cover art.&nbsp; There were quite a few of these awesome, dragon-covered novels so I decided to limit myself to only using books that I have actually read.&nbsp; In addition, because dragon-centric series tend to use images of the creatures across multiple entries, I will limit myself to one novel from each franchise, just to create a bit of variety.&nbsp; This still leaves me with a pretty impressive collection of novels to choose from and I had to do some severe cutting to get it down to a top ten list with my typical honourable mentions section.&nbsp; I think the list turned out pretty well as there are some great novels below with awesome dragon imagery on their covers.</span></p><span data-dcnode-id="3384" instrument_node="">
</span><p data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">I will quickly note that I did have a couple of issues finding good quality pictures of some of the relevant covers I wanted to feature here, particularly for some of the older novels, but I have still tried to feature them as best I can.&nbsp; Apologies in advance if some of them don’t turn out perfect.</span></p><span data-dcnode-id="3381" instrument_node="">
</span><h2 data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">Honourable Mentions</span></h2><span data-dcnode-id="3378" instrument_node="">

55" instrument_node="">

</span><p data-dcnode-id="3234" style="text-align:center;"><a data-dcnode-id="3235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2019/12/27/the-bone-ships-by-r-j-barker/"><strong data-dcnode-id="3236"><em data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">The Bone Ships</span></em><span data-dcnode-id="3237" instrument_node=""> by R. J. Barker</span></strong></a></p><span data-dcnode-id="3233" instrument_node="">

</span><p data-dcnode-id="3222"><span data-dcnode-id="3229" instrument_node="">All three books in Barker’s </span><em data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">The Tide Child</span></em><span data-dcnode-id="3226" instrument_node=""> trilogy featured iconography of the series’ water-dragons, but I think the first entry, </span><em data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">The Bone Ships</span></em><span data-dcnode-id="3223" instrument_node="">, looks the best.</span></p><span data-dcnode-id="3221" instrument_node="">

</span><p data-dcnode-id="3200"><span data-dcnode-id="3207" instrument_node="">You can’t have a dragon-based list without featuring an entry from Paoloini’s </span><em data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">Inheritance</span></em><span data-dcnode-id="3204" instrument_node=""> Cycle.&nbsp; All four novels in this series featured dragons on their cover, although I think that this cover from </span><em data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">Eldest</span></em><span data-dcnode-id="3201" instrument_node=""> was the most striking.</span></p><span data-dcnode-id="3199" instrument_node="">

</span><p data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3151" style="text-align:center;"><strong data-dcnode-id="3152"><em data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">Harry Potter and the Goblet of Fire</span></em><span data-dcnode-id="3153" instrument_node=""> by J. K. Rowling</span></strong></p><span data-dcnode-id="3150" instrument_node="">

566"></p><span data-dcnode-id="3147" instrument_node="">

er-2.jpg 568w" width="555"></p><span data-dcnode-id="3141" instrument_node="">

</span><p data-dcnode-id="3130"><img alt="Dragonclaw Cover" class="wp-image-8952 aligncenter" data-attachment-id="8952" data-comments-opened="1" data-dcnode-id="3131" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Dragonclaw Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/dragonclaw-cover.jpg?w=285" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/dragonclaw-cover.jpg?w=180" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/dragonclaw-cover.jpg" data-orig-size="285,476" data-permalink="https://unseenlibrary.com/2022/04/26/top-ten-tuesday-my-favourite-books-with-dragons-on-the-cover/dragonclaw-cover-2/" height="777" loading="lazy" sizes="(max-width: 465px) 100vw, 465px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/dragonclaw-cover.jpg%3Fw%3D465%26h%3D777&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/dragonclaw-cover.jpg 285w, https://unseenlibrarycom.files.wordpress.com/2022/04/dragonclaw-cover.jpg?w=90&amp;h=150 90w" width="465"></p><span data-dcnode-id="3129" instrument_node="">
</span><p data-dcnode-id="3121"><span data-dcnode-id="3128" instrument_node="">The original cover of the first entry in Australian author Kate Forsyth’s </span><em data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">The Witches of Eileanan</span></em><span data-dcnode-id="3125" instrument_node=""> series, </span><em data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Dragonclaw</span></em><span data-dcnode-id="3122" instrument_node="">, had a great dragon picture on it, and it serves as an excellent first impression of an amazing fantasy book.</span></p><span data-dcnode-id="3120" instrument_node="">
</span><p data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3117" instrument_node="">
</span><p data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3114" instrument_node="">
</span><p data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">Well, that’s my list.&nbsp; As you can see there are some incredible books out there that make great uses of dragons on their covers.&nbsp; All the above novels are really good, and you will have an incredible time reading them, while also appreciating their stunning, dragon-filled covers.&nbsp; I had a lot of fun coming up with this list, and I will have to think about replicating it with another creature, item or colour in the future.&nbsp; In the meantime, let me know what your favourite books with dragons on the cover are in the comments below.</span></p><span data-dcnode-id="3111" instrument_node="">

</span><span class="posted-on" data-dcnode-id="3017"><span data-dcnode-id="3021" instrument_node="">On </span><a data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/04/26/the-german-wife-by-kelly-rimmer/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="3019" datetime="2022-04-26T15:51:20+00:00"><span data-dcnode-id="3020" instrument_node="">April 26, 2022</span></time></a></span><span class="byline" data-dcnode-id="3012"><span data-dcnode-id="3016" instrument_node=""> By </span><span class="author vcard" data-dcnode-id="3013"><a class="url fn n" data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/author/unseenlibrary8/"><span data-dcnode-id="3015" instrument_node="">The Unseen Library</span></a></span></span><span class="cat-links" data-dcnode-id="2999"><span data-dcnode-id="3011" instrument_node="">In </span><a data-dcnode-id="3009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/category/australian/" rel="category tag"><span data-dcnode-id="3010" instrument_node="">Australian</span></a><span data-dcnode-id="3008" instrument_node="">, </span><a data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/category/drama/" rel="category tag"><span data-dcnode-id="3007" instrument_node="">Drama</span></a><span data-dcnode-id="3005" instrument_node="">, </span><a data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/category/five-star-books/" rel="category tag"><span data-dcnode-id="3004" instrument_node="">Five-Star Books</span></a><span data-dcnode-id="3002" instrument_node="">, </span><a data-dcnode-id="3000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/category/historical-fiction/" rel="category tag"> </span><div class="entry-content" data-dcnode-id="2892"><span data-dcnode-id="2988" instrument_node="">
</span><p data-dcnode-id="2986"><img alt="The German Wife Cover" class="wp-image-8876 aligncenter" data-attachment-id="8876" data-comments-opened="1" data-dcnode-id="2987" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="The German Wife Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=196" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg" data-orig-size="1807,2764" data-permalink="https://unseenlibrary.com/2022/04/20/www-wednesday-20-april-2022/the-german-wife-cover/" height="891" loading="lazy" sizes="(max-width: 583px) 100vw, 583px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg%3Fw%3D583%26h%3D891&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=583&amp;h=891 583w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=1166&amp;h=1782 1166w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=98&amp;h=150 98w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=196&amp;h=300 196w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=768&amp;h=1175 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-german-wife-cover.jpg?w=669&amp;h=1024 669w" width="583"></p><span data-dcnode-id="2985" instrument_node="">
</span><p data-dcnode-id="2982"><strong data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">Publisher: Hachette Australia (Trade Paperback – 27 April 2022)</span></strong></p><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2978"><strong data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">Series: Standalone</span></strong></p><span data-dcnode-id="2977" instrument_node="">
</span><p data-dcnode-id="2974"><strong data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">Length: 450 pages</span></strong></p><span data-dcnode-id="2973" instrument_node="">
</span><p data-dcnode-id="2970"><strong data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">My Rating: 5 out of 5 stars</span></strong></p><span data-dcnode-id="2969" instrument_node="">
</span><p data-dcnode-id="2964"><span data-dcnode-id="2968" instrument_node="">One of Australia’s best authors, Kelly Rimmer, returns with another beautiful and exceedingly moving historical drama, </span><em data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">The German Wife</span></em><span data-dcnode-id="2965" instrument_node="">, which takes readers to the edge of despair and back again with its deep and bleak plot.</span></p><span data-dcnode-id="2963" instrument_node="">
</span><p data-dcnode-id="2951"><span data-dcnode-id="2962" instrument_node="">Kelly Rimmer is an outstanding author who specialises in writing great historical drama novels and who was one of the better authors I was lucky enough to experience for the first time last year when I received a copy of her 2021 novel, </span><a data-dcnode-id="2959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/05/15/the-warsaw-orphan-by-kelly-rimmer/"><em data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">The Warsaw Orphan</span></em></a><span data-dcnode-id="2958" instrument_node="">.&nbsp; </span><em data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">The Warsaw Orphan</span></em><span data-dcnode-id="2955" instrument_node=""> was a brilliant and extremely powerful read that showcased multiple sides of the horror and terror experienced in the Warsaw Ghetto while also telling the unique tale of two young people who tried to smuggle young children outside the ghetto walls.&nbsp; Brutal, extreme and yet filled with hope, this was a deeply moving novel that ended up an incredible read.&nbsp; Due to how great this novel was, I was extremely keen to check out more stuff from Rimmer and I was extremely happy when I found myself receive a copy of her latest novel, </span><em data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">The German Wife</span></em><span data-dcnode-id="2952" instrument_node="">.</span></p><span data-dcnode-id="2950" instrument_node="">
</span><p data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">Berlin, 1930.&nbsp; Sofie Rhodes can only watch in horror as the Nazi Party starts to take control of her country, slowly morphing it into a nation of hatred and fear.&nbsp; Already facing financial ruin after World War I and the Depression, Sofie and her husband, Jürgen, find themselves receiving special attention from the Nazis due to Jürgen’s scientific speciality.&nbsp; When Jürgen is forcibly recruited to Hitler’s top-secret rocket project, Sofie finds herself constantly under surveillance and forced to conform to Nazi ideology, including turning her back on her Jewish best friend, Mayim.</span></p><span data-dcnode-id="2947" instrument_node="">
</span><p data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">Many years later, in 1950, Sofie and her remaining children emigrate to a small town in Alabama to be with Jürgen, whose past with the Nazis has been pardoned and erased in exchange for his work on the US space program.&nbsp; Determined to make a new life for herself and her family in America, Sofie soon discovers old and new prejudices both from the hostile Americans and the other German families living in town with them.</span></p><span data-dcnode-id="2944" instrument_node="">
</span><p data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">Isolated and hated, Sofie finds her path crossing with American housewife Lizzie Miller, who has her own history of loss and despair during the Depression.&nbsp; Shocked that her husband and government are so eager to be working with former Nazis, Lizzie keeps finding herself in conflict with Sofie, while rumour and gossip about the Rhodes family swirl around town.&nbsp; When these rumours lead to violence and anger, the new community will be torn apart as the true history of the Rhodes family comes tumbling out.&nbsp; Can this troubled family finally find redemption in a new land, or will the horrors of the war and Nazi ambition follow them wherever they go?</span></p><span data-dcnode-id="2941" instrument_node="">
</span><p data-dcnode-id="2936"><span data-dcnode-id="2940" instrument_node="">Damn, this was an intense and captivating read.&nbsp; Rimmer went all out with the emotional feels here in </span><em data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">The German Wife</span></em><span data-dcnode-id="2937" instrument_node="">, producing a powerful, moving and tragic tale of love, loss and moral compromise.&nbsp; Perfectly portraying some fascinating elements of the darkest part of our history, this was an exceptional read that gets a full five-star rating from me.</span></p><span data-dcnode-id="2935" instrument_node="">
</span><p data-dcnode-id="2927"><span data-dcnode-id="2934" instrument_node="">I cannot emphasise enough how good the story in </span><em data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">The German Wife</span></em><span data-dcnode-id="2931" instrument_node=""> was as Rimmer produced a deeply dramatic historical tale with an impressive scope that comes together beautifully.&nbsp; Split between its two point-of-view characters, Sofie Rhodes and Lizzie Miller, </span><em data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">The German Wife</span></em><span data-dcnode-id="2928" instrument_node=""> presents a complex, time-hopping narrative as the reader is shown the protagonists conflict as well as the events that led them to meet for the first time.&nbsp; Half the book takes place in 1950 Alabama, where both ladies live with their respective families, while the other half of the book goes back and sequentially examines their pasts from 1930 onward.&nbsp; This provides the reader with an intriguing view of both the Depression in America and the rise of Nazism in Germany, while also providing some intriguing context for the characters’ actions in 1950.&nbsp; This mixture of perspectives and time periods works extremely well, and Rimmer melds them together perfectly to tell a taught and emotionally rich tale.&nbsp; The past injustices and emotional traumas that occur in these earlier timelines contrast perfectly with the issues they are having in the 1950s, and it was great to see all the events that built towards the attitudes and emotions they had when they were older.&nbsp; It also provides three unique storylines (1930s America, 1930s Germany and 1950s America), all three of which contained some intriguing side characters and captivating historical elements, which was extremely compelling.</span></p><span data-dcnode-id="2926" instrument_node="">
</span><p data-dcnode-id="2918"><span data-dcnode-id="2925" instrument_node="">Out of the three main plot lines that </span><em data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">The German Wife</span></em><span data-dcnode-id="2922" instrument_node=""> contained, I personally thought the examinations of Sofie and Jürgen’s time in Nazi Germany were the best.&nbsp; These scenes are particularly compelling, as they show the characters thrust into the middle of events they can’t escape from as they are forced to work with the Nazis and accept the changes to the country.&nbsp; Watching these inherently good characters make compromise after compromise and suffer constant emotional trauma and betrayal is pretty heartbreaking, but it produces some brilliant and memorable scenes that will really hit you in the feels.&nbsp; This context, and Lizzie’s excellent backstory, are worked into the 1950s storyline extremely well, and the various time periods compliment each other well, especially as Rimmer works to provide several cryptic hints about past events in the future chapters, which really adds to the reader’s apprehension.&nbsp; All these storylines, including the one in the 1950s, which examines the many issues the Rhodeses face when they emigrate to America, as well as the conflict that occurs between Sofie and Lizzie, are brilliantly written and loaded with emotional moments that hit you hard.&nbsp; There is also some great character work contained with </span><em data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">The German Wife</span></em><span data-dcnode-id="2919" instrument_node=""> as Rimmer really builds up her central two characters, as well as the excellent supporting cast, providing them with captivating and compelling personal histories, which are fully explored in the flashback scenes.&nbsp; This great story, combined with the fantastic characters and the historical settings, is a narrative that will sit with me for a long time.</span></p><span data-dcnode-id="2917" instrument_node="">
</span><p data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">Rimmer also provides a detailed and impressive look at various historical elements that occurred between 1930 and 1950 in both America and Germany.&nbsp; The author clearly did a ton of research on multiple subjects before writing this book, and it really shows as the story progresses.&nbsp; These historical elements include a pretty comprehensive look at life in America during the Depression, as one point of view characters journeys around several parts of the deeply impacted South, and there are some great scenes, especially some of the early ones that take place in an extremely dusty climate.&nbsp; There is also a great examination of both the Nazi and American rocket programs that occurred during this period, as Jürgen serves as a technician for both governments.&nbsp; I found the examination of the V2 program to be extremely interesting, and Rimmer goes into exquisite detail here, with Jürgen serving as an intriguing stand-in for historical figure Wernher von Braun.&nbsp; This allows for the reader to see a slightly abridged version of the program (its shown through the eyes of his wife who is getting most of her knowledge second hand), but there is still a lot of great detail here, including the eventual change in objectives, the continued failure, the desire for it to succeed by the Nazis, as well as all the terrible things that resulted from it.&nbsp; However, a good part of the book is also reserved to examine one of the most fascinating parts of the Nazi rocket program, the subsequent responsive Operation Paperclip by the Americans, which pardoned many of the German scientists and moved them to America with altered pasts to help their fledgling space program.&nbsp; I loved seeing this movement to another country told through the eyes of both a wife of one of the scientists and an American citizen who finds out about the program, and it produces some brilliant and clever scenes that help showcases this extremely well.</span></p><span data-dcnode-id="2914" instrument_node="">
</span><p data-dcnode-id="2906"><span data-dcnode-id="2913" instrument_node="">I also really need to highlight Rimmer’s examination of the Nazi takeover of Germany that occurred in all Sofie’s flashback chapters.&nbsp; Rimmer already has a lot of experience showcasing the evils of the Nazis from her previous books, but </span><em data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">The German Wife</span></em><span data-dcnode-id="2910" instrument_node=""> probably contains one of her best depictions of this as it showed how a normal German citizen’s life was turned upside down in just a few years.&nbsp; The author really hammers home just how creatively evil the Nazis were in corrupting their own country, as you see the full gradual process take effect.&nbsp; The author meticulously recounts every change that the Nazis implemented, all of which served to ensure the loyalty of its people and to terrorise those they hated.&nbsp; You get to see the full range of controls that the Nazis enacted, including threatening job security, disappearances by the secret police, control of the media, turning friends and neighbours against each other, providing a common enemy, and even brainwashing children in the schools.&nbsp; All of this is pretty damn intense, especially as there are some notable modern parallels, and it is darkly fascinating to see everything that the Nazis did.&nbsp; However, the true brilliance of the way that Rimmer explores it in </span><em data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">The German Wife</span></em><span data-dcnode-id="2907" instrument_node="">, is to show how people like the Rhodes reacted to it.&nbsp; Watching them become horrified by the changes to their country and the people around them is pretty intense, but the real drama occurs when they are forced to make compromises.&nbsp; Sofia and Jürgen are constantly faced with the choice of helping the Nazis (either directly or indirectly by not opposing them), or to face various consequences for themselves and their families.&nbsp; Their decisions, despite always appearing to be their best option, eventually drag them deeper into complicity with the Nazis, so much so that Jürgen becomes a reluctant member of the SS and bears some responsibility for utilising slave labour in terrible conditions.&nbsp; This is such a horrifying thing to witness, especially as the reader is left to wonder what they would have done in a similar situation.&nbsp; They way the scenarios are written, with the Rhodes punished every time they move away from the party goals really ensure that you have no idea how you would have acted it makes some of the reactions from the 1950s American characters sound extremely naïve as a result.&nbsp; This was such a powerful and impressive inclusion from Rimmer and I felt that this brilliant portrayal of the Nazi’s techniques for control of their own citizens added so much to book’s outstanding plot.</span></p><span data-dcnode-id="2905" instrument_node="">
</span><p data-dcnode-id="2894"><span data-dcnode-id="2904" instrument_node="">With </span><em data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">The German Wife</span></em><span data-dcnode-id="2901" instrument_node="">, Kelly Rimmer continues to shine as one of Australia’s most exceptional authors of historical dramas.&nbsp; This outstanding contains an extremely moving and heartbreaking tale from some of the darkest moments in 19</span><sup data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">th</span></sup><span data-dcnode-id="2898" instrument_node=""> century history.&nbsp; With powerful views of life during both the Depression and the rise of the Nazis, readers will quickly become engrossed with this impressive tale and well-written central characters.&nbsp; </span><em data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">The German Wife</span></em><span data-dcnode-id="2895" instrument_node=""> was insanely good and will leave readers stunned with how the story comes together.&nbsp; A deeply memorable and intense read, I cannot recommend this book enough.</span></p><span data-dcnode-id="2893" instrument_node="">
</span></div><span data-dcnode-id="2890" instrument_node="">
</span></div><span data-dcnode-id="2888" instrument_node="">

</span><p data-dcnode-id="2844"><img alt="A Comedy of Terrors Cover" class="wp-image-5212 aligncenter" data-attachment-id="5212" data-comments-opened="1" data-dcnode-id="2845" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="A Comedy of Terrors Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover.jpg?w=195" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover.jpg" data-orig-size="1843,2835" data-permalink="https://unseenlibrary.com/2021/02/10/waiting-on-wednesday-2021-historical-fiction-reads/a-comedy-of-terrors-cover/" height="911" loading="lazy" sizes="(max-width: 592px) 100vw, 592px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover.jpg%3Fw%3D592%26h%3D911&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover.jpg?w=592&amp;h=911 592w, https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover.jpg?w=1184&amp;h=1822 1184w, https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover.jpg?w=98&amp;h=150 98w, https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover.jpg?w=195&amp;h=300 195w, https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover.jpg?w=768&amp;h=1181 768w, https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover.jpg?w=666&amp;h=1024 666w" width="592"></p><span data-dcnode-id="2843" instrument_node="">
</span><p data-dcnode-id="2840"><strong data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">Publisher: Hodder &amp; Stoughton (Trade Paperback – 1 April 2021)</span></strong></p><span data-dcnode-id="2839" instrument_node="">
</span><p data-dcnode-id="2833"><strong data-dcnode-id="2834"><span data-dcnode-id="2838" instrument_node="">Series: </span><em data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">Flavia Albia</span></em><span data-dcnode-id="2835" instrument_node=""> – Book Nine</span></strong></p><span data-dcnode-id="2832" instrument_node="">
</span><p data-dcnode-id="2829"><strong data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">Length: 386 pages</span></strong></p><span data-dcnode-id="2828" instrument_node="">
</span><p data-dcnode-id="2825"><strong data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">My Rating: 4 out of 5 stars</span></strong></p><span data-dcnode-id="2824" instrument_node="">
</span><p data-dcnode-id="2785"><span data-dcnode-id="2823" instrument_node="">I am a big fan of several great historical fiction series currently running, but one I find to be particularly entertaining is the </span><em data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">Flavia Albia</span></em><span data-dcnode-id="2820" instrument_node=""> series from bestselling author Lindsey Davis.&nbsp; Davis has been dominating the ancient historical murder mystery scene for years, first with her extensive </span><em data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">Marcus Didius Falco</span></em><span data-dcnode-id="2817" instrument_node=""> novels, and then with the successor </span><em data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">Flavia Albia</span></em><span data-dcnode-id="2814" instrument_node=""> series, which follows the daughter of the original series’ protagonist.&nbsp; While I never had the opportunity to get into the </span><em data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">Falco</span></em><span data-dcnode-id="2811" instrument_node=""> novels, I have been reading the </span><em data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">Flavia Albia</span></em><span data-dcnode-id="2808" instrument_node=""> books since the outset and have had a brilliant time with all of them, including </span><a data-dcnode-id="2805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2018/11/29/throwback-thursday-canberra-weekly-column-historical-crime-fiction/"><em data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">The Third Nero</span></em></a><span data-dcnode-id="2804" instrument_node="">, </span><a data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2018/05/30/pandoras-boy-by-lindsey-davis/"><em data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Pandora’s Boy</span></em></a><span data-dcnode-id="2800" instrument_node="">, </span><a data-dcnode-id="2797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2019/08/01/a-capitol-death-by-lindsey-davis/"><em data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">A Capitol Death</span></em></a><span data-dcnode-id="2796" instrument_node="">, and </span><a data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2020/06/01/the-grove-of-the-caesars-by-lindsey-davis/"><em data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">The Grove of the Caesars</span></em></a><span data-dcnode-id="2792" instrument_node="">, each of which have been excellent in their own way.&nbsp; Indeed, this is such a great series that I have been pretty eager to start reading the latest novel, </span><em data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">Desperate Undertaking</span></em><span data-dcnode-id="2789" instrument_node="">, which I just got my hands on a couple of days ago.&nbsp; I really want to read it next, but before I start, I absolutely must do a review of the preceding novel in the series, </span><em data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">A Comedy of Terrors</span></em><span data-dcnode-id="2786" instrument_node="">.</span></p><span data-dcnode-id="2784" instrument_node="">
</span><p data-dcnode-id="2771"><em data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">A Comedy of Terrors</span></em><span data-dcnode-id="2781" instrument_node=""> was the ninth book in the </span><em data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">Flavia Albia</span></em><span data-dcnode-id="2778" instrument_node=""> series and was released this time last year.&nbsp; I had initially planned to read </span><em data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">A Comedy of Terrors</span></em><span data-dcnode-id="2775" instrument_node=""> when it first came out, but unfortunately, it took me a little longer to grab it than I intended.&nbsp; By the time I was able to fit it into my reading schedule, I was a bit rushed off my feet with other reviews and other reading (excuses, excuses!), so I never got a chance to really write anything about it when I finished.&nbsp; This was an inexcusable oversight of my behalf, and it is one that I really wanted to fix before checking out </span><em data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Desperate Undertaking</span></em><span data-dcnode-id="2772" instrument_node="">, so here we are.</span></p><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Plot Synopsis:</span></p><span data-dcnode-id="2767" instrument_node="">
</span><p data-dcnode-id="2764"><em data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">In Rome, 89 A.D., poisonings, murders, and a bloody gang war of retribution breaks out during the festival of Saturnalia, and when her husband, Tiberius, becomes a target, it’s time for Flavia Albia to take matters into her own hands — in Lindsey Davis’s next historical mystery,&nbsp;A Comedy of Terrors.</span></em></p><em data-dcnode-id="2759"><span data-dcnode-id="2763" instrument_node="">
</span><p data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">Flavia Albia, daughter and successor of private informer Marcus Didius Falco is twiddling her thumbs with no clients during the December festival of Saturnalia. But that doesn’t mean all is quiet. Her husband Tiberius and the Fourth Cohort are battling organized crime interests that are going to war over the festival nuts. A series of accidental poisonings, then bloody murders of rival nut-sellers, and finally a gruesome warning to Tiberius from the hidden criminal powers to back off.</span></p><span data-dcnode-id="2760" instrument_node="">
</span></em><p data-dcnode-id="2756"><em data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">Albia has had just about enough and combines forces with Tiberius to uncover the hidden criminal gangs trying to worm their way into the establishment at a banquet of the emperor Domitian.</span></em></p><span data-dcnode-id="2755" instrument_node="">
</span><p data-dcnode-id="2750"><em data-dcnode-id="2752"><br data-dcnode-id="2754"><span data-dcnode-id="2753" instrument_node="">
A Comedy of Terrors</span></em><span data-dcnode-id="2751" instrument_node=""> was another fun book from Davis that takes the reader back to ancient Rome to investigate an intriguing mystery.&nbsp; In this case, the book revolves around Flavia and her family’s dangerous interaction with a criminal gang who are trying to take advantage of a religious festival and have come into conflict with Flavia’s husband Tiberius.&nbsp; This results in an interesting story which sees Flavia getting involved in several conflicts, intimidation attempts, assorted mysteries and other connected events, all in the name of investigating the gang’s activities and trying to bring them down.&nbsp; At the same time, Flavia is dealing with multiple personal and familial issues, as she and Tiberius now find themselves responsible for Tiberius’s semi-orphaned nephews.</span></p><span data-dcnode-id="2749" instrument_node="">
</span><p data-dcnode-id="2738"><span data-dcnode-id="2748" instrument_node="">I must admit that this wasn’t my absolute favourite </span><em data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">Flavia Albia</span></em><span data-dcnode-id="2745" instrument_node=""> novel, and I felt that the story was lacking some of the usual flair and tight storytelling that I usually so enjoy from Davis’s novels.&nbsp; </span><em data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">A Comedy of Terrors’s</span></em><span data-dcnode-id="2742" instrument_node=""> narrative was a bit unfocused in places, particularly when it came to main storyline involving the ancient Roman gang.&nbsp; Rather than the series’ typical attention on a central investigation, this was a bit more of a meandering affair, which, while interesting in places, did seem to go on some random tangents.&nbsp; There was also a much greater examination of the protagonist’s home life, as not only did Flavia and Tiberius have their young relatives to look after, but there was also some domestic drama around their unusual household of slaves, servants and random family members.&nbsp; While I enjoyed seeing the continued domestic evolution of the formerly wild Flavia and the notoriously honest Tiberius, which resulted in several rather entertaining scenes, I could see newer readers who came for the mystery getting a bit frustrated with this extra attention on family life.&nbsp; Still, </span><em data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">A Comedy of Terrors</span></em><span data-dcnode-id="2739" instrument_node=""> did have some great moments throughout its plot, and Davis did the usual excellent job of combining crime fiction and historical elements together into an entertaining story filled with the writer’s fantastic sense of humour.&nbsp; In addition, the characters were sharply written as always, there were some intriguing historical crime fiction elements to the plot (who would have thought there was criminal opportunity in festival nuts?), and I still really enjoy the author’s inclusion of modern attitudes and reactions in this historical environment.&nbsp; I particularly loved the final resolution of the case which saw a classic gangster move turned around on its user in dramatic fashion, which served as an amazing end to this fantastic book.</span></p><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2723"><span data-dcnode-id="2736" instrument_node="">Overall, </span><em data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">A Comedy of Terrors</span></em><span data-dcnode-id="2733" instrument_node=""> was another great addition to the </span><em data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">Flavia Albia</span></em><span data-dcnode-id="2730" instrument_node=""> series by Lindsey Davis.&nbsp; While it lacked some of the focus and compelling mystery of some of Davis’ most impressive reads, this was still a clever piece of historical crime fiction, and I loved seeing the continuation of her character-driven storylines.&nbsp; A must read for fans of this series, I cannot wait to see what happens in the 10</span><sup data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">th</span></sup><span data-dcnode-id="2727" instrument_node=""> book, </span><em data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Desperate Undertakings</span></em><span data-dcnode-id="2724" instrument_node="">.</span></p><span data-dcnode-id="2722" instrument_node="">
</span><p data-dcnode-id="2720"><img alt="A Comedy of Terrors Cover 2" class="wp-image-5213 aligncenter" data-attachment-id="5213" data-comments-opened="1" data-dcnode-id="2721" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="A Comedy of Terrors Cover 2" data-large-file="https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover-2.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover-2.jpg?w=195" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover-2.jpg" data-orig-size="651,1000" data-permalink="https://unseenlibrary.com/2021/02/10/waiting-on-wednesday-2021-historical-fiction-reads/a-comedy-of-terrors-cover-2/" height="886" loading="lazy" sizes="(max-width: 577px) 100vw, 577px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover-2.jpg%3Fw%3D577%26h%3D886&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover-2.jpg?w=577&amp;h=886 577w, https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover-2.jpg?w=98&amp;h=150 98w, https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover-2.jpg?w=195&amp;h=300 195w, https://unseenlibrarycom.files.wordpress.com/2021/02/a-comedy-of-terrors-cover-2.jpg 651w" width="577"></p><span data-dcnode-id="2719" instrument_node="">
