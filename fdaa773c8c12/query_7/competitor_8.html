</span><div class="entry-content" data-dcnode-id="1766"><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1853" instrument_node="">Welcome to my weekly segment, Waiting on Wednesday, where I look at upcoming books that I am planning to order and review in the next few months and which I think I will really enjoy. &nbsp;I run this segment in conjunction with the </span><a data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wishfulendings.com/2016/12/coming-2017-cant-wait-wednesday-book.html"><span data-dcnode-id="1852" instrument_node="">Can’t-Wait Wednesday</span></a><span data-dcnode-id="1850" instrument_node=""> meme that is currently running at </span><a data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wishfulendings.com/"><span data-dcnode-id="1849" instrument_node="">Wishful Endings</span></a><span data-dcnode-id="1847" instrument_node="">. &nbsp;Stay tuned to see reviews of these books when I get a copy of them.&nbsp; For this latest Waiting on Wednesday I look at an awesome upcoming legal thriller that is likely to be one of the most entertaining reads of 2022 with </span><em data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">The Accomplice</span></em><span data-dcnode-id="1844" instrument_node=""> by Steve Cavanagh.</span></p><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1840"><img alt="The Accomplice Cover" class="wp-image-8871 aligncenter" data-attachment-id="8871" data-comments-opened="1" data-dcnode-id="1841" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="The Accomplice Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-accomplice-cover.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-accomplice-cover.jpg?w=195" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-accomplice-cover.jpg" data-orig-size="2144,3306" data-permalink="https://unseenlibrary.com/2022/04/20/waiting-on-wednesday-the-accomplice-by-steve-cavanagh/the-accomplice-cover/" height="1271" loading="lazy" sizes="(max-width: 825px) 100vw, 825px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/the-accomplice-cover.jpg%3Fw%3D825%26h%3D1271&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/the-accomplice-cover.jpg?w=825&amp;h=1271 825w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-accomplice-cover.jpg?w=1650&amp;h=2542 1650w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-accomplice-cover.jpg?w=97&amp;h=150 97w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-accomplice-cover.jpg?w=195&amp;h=300 195w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-accomplice-cover.jpg?w=768&amp;h=1184 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-accomplice-cover.jpg?w=664&amp;h=1024 664w" width="825"></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1827"><span data-dcnode-id="1838" instrument_node="">Last year I was lucky enough to receive a copy of the sixth book in Steve Cavanagh’s </span><em data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Eddie Flynn</span></em><span data-dcnode-id="1835" instrument_node=""> series of legal thrillers, </span><a data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/09/15/the-devils-advocate-by-steve-cavanagh/"><em data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">The Devil’s Advocate</span></em></a><span data-dcnode-id="1831" instrument_node="">, which turned out to be a wildly addictive novel with a fun and captivating story.&nbsp; Following the adventures of titular protagonist Eddie Flynn, former conman turned expert defence attorney, the </span><em data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Eddie Flynn</span></em><span data-dcnode-id="1828" instrument_node=""> novels have been some of the more interesting and unique thrillers of the last few years, with Cavanagh coming up with a range of awesome and complex scenarios for his protagonist to wiggle through.</span></p><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1818"><span data-dcnode-id="1825" instrument_node="">I deeply enjoyed my first foray into this series, especially as </span><em data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">The Devil’s Advocate</span></em><span data-dcnode-id="1822" instrument_node=""> featured, amongst other distinctive inclusions, a murderous district attorney, corrupt cops, a range of ridiculous and entertaining legal strategies, as well as several improbable but hilarious twists.&nbsp; As such, I have been keeping a close out for Cavanagh’s next novel and I was very excited when I saw that </span><em data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">The Accomplice</span></em><span data-dcnode-id="1819" instrument_node=""> is coming out soon.</span></p><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1810"><em data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">The Accomplice</span></em><span data-dcnode-id="1814" instrument_node="">, which is currently set for release in late July 2022, will be the seventh book in the </span><em data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Eddie Flynn</span></em><span data-dcnode-id="1811" instrument_node=""> series and will present the author’s cocky and exceedingly likeable protagonist with another seemingly impossible legal scenario.&nbsp; This time, Flynn will have to prove that the most hated women in America, the wife of a notorious and at-large serial killer, didn’t know anything about her husbands’ crimes.&nbsp; While this is already a pretty cool scenario, Cavanagh will apparently raise the stakes even further by throwing in a potentially murderous and guilty client, a rogue former-FBI agent and the returning serial killer who plans to murder anyone associated with the case, including Eddie Flynn.</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1808" instrument_node="">All these elements sound pretty damn epic and I am deeply intrigued to see how it all comes together.&nbsp; Based on how much I enjoyed </span><em data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">The Devil’s Advocate</span></em><span data-dcnode-id="1805" instrument_node=""> I am highly confident I am going to have a wonderful and enjoyable time with </span><em data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">The Accomplice</span></em><span data-dcnode-id="1802" instrument_node="">, and I am sure it will be one of the more zany and unique novels of the year.</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">Plot Synopsis:</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1794"><em data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">THE MOST HATED WOMAN IN AMERICA</span></em></p><em data-dcnode-id="1771"><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">The Sandman killings have been solved. Daniel Miller murdered fourteen people before he vanished. His wife, Carrie, now faces trial as his accomplice. The FBI, the District Attorney, the media and everyone in America believe she knew and helped cover up her husband’s crimes.</span></p><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">THE LAWYER</span></p><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Eddie Flynn won’t take a case unless his client is innocent. Now, he has to prove to a jury, and the entire world, that Carrie Miller was just another victim of the Sandman. She didn’t know her husband’s dark side and she had no part in the murders. But so far, Eddie and his team are the only ones who believe her.</span></p><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">THE FORMER FBI AGENT</span></p><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">Gabriel Lake used to be a federal agent, before someone tried to kill him. Now, he’s an investigator with a vendetta against the Sandman. He’s the only one who can catch him, because he believes that everything the FBI knows about serial killers is wrong.</span></p><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">THE KILLER</span></p><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">With his wife on trial, the Sandman is forced to come out of hiding to save her from a life sentence. He will kill to protect her and everyone involved in the case is a target.</span></p><span data-dcnode-id="1772" instrument_node="">
</span></em><p data-dcnode-id="1768"><em data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Even Eddie Flynn…</span></em></p><span data-dcnode-id="1767" instrument_node="">
</span></div><span data-dcnode-id="1764" instrument_node="">
</span></div><span data-dcnode-id="1762" instrument_node="">
</span></article><span data-dcnode-id="1759" instrument_node="">
</span><article class="post-8847 post type-post status-publish format-standard hentry category-list tag-a-beautiful-mind tag-book-adaptation tag-die-hard tag-films tag-forrest-gump tag-hannibal-lector-trilogy tag-harry-potter tag-harry-potter-films tag-james-bond tag-james-bond-films tag-jurassic-park tag-list tag-slumdog-millionaire tag-the-great-escape tag-the-hobbit tag-the-hunger-games tag-the-hunger-games-series tag-the-lord-of-the-rings tag-the-lord-of-the-rings-trilogy tag-the-princess-bride tag-the-shawshank-redemption tag-top-ten-tuesday" data-dcnode-id="1376" id="post-8847"><span data-dcnode-id="1758" instrument_node="">
</span><div class="entry-wrapper" data-dcnode-id="1378"><span data-dcnode-id="1757" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1729"><span data-dcnode-id="1756" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1753"><a data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/04/19/top-ten-tuesday-favourite-films-film-series-based-on-books/" rel="bookmark"><span data-dcnode-id="1755" instrument_node="">Top Ten Tuesday – Favourite Films/Film Series Based on&nbsp;Books</span></a></h1><span data-dcnode-id="1752" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1732"><span data-dcnode-id="1751" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1746"><span data-dcnode-id="1750" instrument_node="">On </span><a data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/04/19/top-ten-tuesday-favourite-films-film-series-based-on-books/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="1748" datetime="2022-04-19T15:55:04+00:00"><span data-dcnode-id="1749" instrument_node="">April 19, 2022</span></time></a></span><span class="byline" data-dcnode-id="1741"><span data-dcnode-id="1745" instrument_node=""> By </span><span class="author vcard" data-dcnode-id="1742"><a class="url fn n" data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/author/unseenlibrary8/"><span data-dcnode-id="1744" instrument_node="">The Unseen Library</span></a></span></span><span class="cat-links" data-dcnode-id="1737"><span data-dcnode-id="1740" instrument_node="">In </span><a data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/category/list/" rel="category tag"><span data-dcnode-id="1739" instrument_node="">List</span></a></span><span class="comments-link" data-dcnode-id="1734"><a data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/04/19/top-ten-tuesday-favourite-films-film-series-based-on-books/%23comments"><span data-dcnode-id="1736" instrument_node="">10 Comments</span></a></span><span data-dcnode-id="1733" instrument_node=""> </span></div><span data-dcnode-id="1730" instrument_node="">
</span></header><span data-dcnode-id="1727" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1381"><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1719"><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thatartsyreadergirl.com/top-ten-tuesday/"><span data-dcnode-id="1725" instrument_node="">Top Ten Tuesday</span></a><span data-dcnode-id="1723" instrument_node=""> is a weekly meme that currently resides at </span><a data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thatartsyreadergirl.com/"><span data-dcnode-id="1722" instrument_node="">The Artsy Reader Girl</span></a><span data-dcnode-id="1720" instrument_node=""> and features bloggers sharing lists on various book topics.&nbsp; The official topic for this week is Bookish Merchandise I’d love to Own, which does sound fun, although I have no idea what I would put up as my choices.&nbsp; As such, I thought I’d take this opportunity to finally post a list that I have been thinking about for a few weeks, looking at my top ten favourite films or film series that are based on books.</span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1717" instrument_node="">Adapting bestselling novels and books into movies is something Hollywood has been doing for decades, often with great success.&nbsp; While some adaptations that failed, either due to the original source material or general problems with production, many have turned out to be exceedingly epic films that I have deeply enjoyed. &nbsp;This is something I have been thinking of a lot lately, not only because some great books have film adaptations coming out soon (</span><a data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/04/05/bullet-train-by-kotaro-isaka/"><em data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Bullet Train</span></em><span data-dcnode-id="1714" instrument_node=""> by Kotaro Isaka</span></a><span data-dcnode-id="1712" instrument_node=""> and </span><a data-dcnode-id="1708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/09/17/throwback-thursday-the-gray-man-by-mark-greaney/"><em data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">The Gray Man</span></em><span data-dcnode-id="1709" instrument_node=""> by Mark Greaney</span></a><span data-dcnode-id="1707" instrument_node=""> for examples), but also because I just saw the latest </span><em data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Fantastic Beasts</span></em><span data-dcnode-id="1704" instrument_node=""> film.&nbsp; So, as I tend to when my mind wanders along this track, I started researching and listing all the various films that are based on books and tried to work out what my absolute favourites were. &nbsp;This turned out to be such a fun list to pull together that I just had to share it up on the blog.</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1701" instrument_node="">To appear on this list, the relevant film or series needs to be based on a book in some shape or form.&nbsp; In trying to work out what are my absolute favourites I am looking at a few things, general quality of the film, how much I enjoyed it as well as whether it is a good adaptation of the source material.&nbsp; In a few cases, I may not have read the books the films are adapted from, but I have still included them here due to the quality of the film.&nbsp; I decided to exclude films based off comics from this list as I already have a few lists for this (an </span><a data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/07/13/top-ten-tuesday-the-marvel-cinematic-universe-movies-ranked-including-black-widow/"><span data-dcnode-id="1700" instrument_node="">MCU list</span></a><span data-dcnode-id="1698" instrument_node="">, a </span><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2021/08/10/top-ten-tuesday-my-favourite-dc-films-ranked/"><span data-dcnode-id="1697" instrument_node="">DC Comics movie list</span></a><span data-dcnode-id="1695" instrument_node="">, and an </span><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2020/11/03/top-ten-tuesday-favourite-animated-comic-book-movies/"><span data-dcnode-id="1694" instrument_node="">animated comic movie list</span></a><span data-dcnode-id="1692" instrument_node="">).&nbsp; Despite this, I still ended up with a ton of potential entries for this list and I had to do a ton of cutting to get it down to 10 with my usual generous honourable mentions section.&nbsp; The end result is pretty interesting and I think that it does a good job reflecting which film adaptions are my favourite.</span></p><span data-dcnode-id="1690" instrument_node="">
</span><h2 data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Honourable Mentions:</span></h2><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1682" style="text-align:center;"><strong data-dcnode-id="1683"><em data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">The Hobbit</span></em><span data-dcnode-id="1684" instrument_node=""> trilogy</span></strong></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1679"><img alt="The Hobbit Poster" class="wp-image-8851 aligncenter" data-attachment-id="8851" data-comments-opened="1" data-dcnode-id="1680" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="The Hobbit Poster" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-hobbit-poster.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-hobbit-poster.jpg?w=200" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-hobbit-poster.jpg" data-orig-size="2000,3000" data-permalink="https://unseenlibrary.com/2022/04/19/top-ten-tuesday-favourite-films-film-series-based-on-books/the-hobbit-poster/" height="844" loading="lazy" sizes="(max-width: 562px) 100vw, 562px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/the-hobbit-poster.jpg%3Fw%3D562%26h%3D844&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/the-hobbit-poster.jpg?w=562&amp;h=844 562w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-hobbit-poster.jpg?w=1124&amp;h=1686 1124w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-hobbit-poster.jpg?w=100&amp;h=150 100w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-hobbit-poster.jpg?w=200&amp;h=300 200w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-hobbit-poster.jpg?w=768&amp;h=1152 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-hobbit-poster.jpg?w=683&amp;h=1024 683w" width="562"></p><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1677" instrument_node="">While this series does have some issues, and probably shouldn’t have been broken up into a trilogy, I had fun with it and there are some good moments throughout these movies.&nbsp; I think that </span><em data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">The Hobbit: An Unexpected Journey</span></em><span data-dcnode-id="1674" instrument_node=""> and </span><em data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">The Desolation of Smaug</span></em><span data-dcnode-id="1671" instrument_node=""> were really well done, its just a shame that </span><em data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">The Battle of Five Armies</span></em><span data-dcnode-id="1668" instrument_node=""> didn’t live up to its full potential and really dragged the whole trilogy down.</span></p><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1658" style="text-align:center;"><strong data-dcnode-id="1659"><em data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Hannibal Lector</span></em><span data-dcnode-id="1660" instrument_node=""> trilogy</span></strong></p><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1655"><img alt="The Silence of the Lambs Poster" class="wp-image-8852 aligncenter" data-attachment-id="8852" data-comments-opened="1" data-dcnode-id="1656" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="The Silence of the Lambs Poster" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-silence-of-the-lambs-poster.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-silence-of-the-lambs-poster.jpg?w=203" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-silence-of-the-lambs-poster.jpg" data-orig-size="2011,2968" data-permalink="https://unseenlibrary.com/2022/04/19/top-ten-tuesday-favourite-films-film-series-based-on-books/the-silence-of-the-lambs-poster/" height="830" loading="lazy" sizes="(max-width: 562px) 100vw, 562px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/the-silence-of-the-lambs-poster.jpg%3Fw%3D562%26h%3D830&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/the-silence-of-the-lambs-poster.jpg?w=562&amp;h=830 562w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-silence-of-the-lambs-poster.jpg?w=1124&amp;h=1660 1124w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-silence-of-the-lambs-poster.jpg?w=102&amp;h=150 102w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-silence-of-the-lambs-poster.jpg?w=203&amp;h=300 203w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-silence-of-the-lambs-poster.jpg?w=768&amp;h=1133 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-silence-of-the-lambs-poster.jpg?w=694&amp;h=1024 694w" width="562"></p><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1653" instrument_node="">I had to mention these dark thrillers somewhere on this list as they are pretty damn iconic and cool. &nbsp;Based on the works of Thomas Harris, </span><em data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">The Silence of the Lambs</span></em><span data-dcnode-id="1650" instrument_node="">, </span><em data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Hannibal</span></em><span data-dcnode-id="1647" instrument_node=""> and </span><em data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Red Dragon</span></em><span data-dcnode-id="1644" instrument_node=""> are pretty awesome films with some brilliant performances from Anthony Hopkins and others (Ralph Fiennes in </span><em data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Red Dragon</span></em><span data-dcnode-id="1641" instrument_node=""> is extremely good).&nbsp; Also, mad props to the </span><em data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">Hannibal</span></em><span data-dcnode-id="1638" instrument_node=""> television show, if I do a list about television shows based on books, that will make the cut for sure.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1628" style="text-align:center;"><strong data-dcnode-id="1629"><em data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">James Bond</span></em><span data-dcnode-id="1630" instrument_node=""> films</span></strong></p><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><img alt="Tomorrow Never Dies Poster" class="wp-image-7699 aligncenter" data-attachment-id="7699" data-comments-opened="1" data-dcnode-id="1626" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Tomorrow Never Dies Poster" data-large-file="https://unseenlibrarycom.files.wordpress.com/2021/12/tomorrow-never-dies-poster.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2021/12/tomorrow-never-dies-poster.jpg?w=203" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2021/12/tomorrow-never-dies-poster.jpg" data-orig-size="1962,2901" data-permalink="https://unseenlibrary.com/2021/12/07/top-ten-tuesday-my-favourite-james-bond-films-ranked-december-2021/tomorrow-never-dies-poster/" height="824" loading="lazy" sizes="(max-width: 558px) 100vw, 558px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2021/12/tomorrow-never-dies-poster.jpg%3Fw%3D558%26h%3D824&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2021/12/tomorrow-never-dies-poster.jpg?w=558&amp;h=824 558w, https://unseenlibrarycom.files.wordpress.com/2021/12/tomorrow-never-dies-poster.jpg?w=1116&amp;h=1648 1116w, https://unseenlibrarycom.files.wordpress.com/2021/12/tomorrow-never-dies-poster.jpg?w=101&amp;h=150 101w, https://unseenlibrarycom.files.wordpress.com/2021/12/tomorrow-never-dies-poster.jpg?w=203&amp;h=300 203w, https://unseenlibrarycom.files.wordpress.com/2021/12/tomorrow-never-dies-poster.jpg?w=768&amp;h=1136 768w, https://unseenlibrarycom.files.wordpress.com/2021/12/tomorrow-never-dies-poster.jpg?w=693&amp;h=1024 693w" width="558"></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1623" instrument_node="">I have already mentioned in a previous list how much I loved the </span><em data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">James Bond</span></em><span data-dcnode-id="1620" instrument_node=""> films, but I had to include them here as well.&nbsp; Based on the novels by Ian Flemming, this whole series is very fun, and there are some truly impressive and iconic films here.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1611" style="text-align:center;"><strong data-dcnode-id="1612"><em data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">A Beautiful Mind</span></em></strong></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1608"><img alt="A Beautiful Mind Poster" class="wp-image-8855 aligncenter" data-attachment-id="8855" data-comments-opened="1" data-dcnode-id="1609" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="A Beautiful Mind Poster" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/a-beautiful-mind-poster.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/a-beautiful-mind-poster.jpg?w=202" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/a-beautiful-mind-poster.jpg" data-orig-size="1010,1500" data-permalink="https://unseenlibrary.com/2022/04/19/top-ten-tuesday-favourite-films-film-series-based-on-books/a-beautiful-mind-poster/" height="833" loading="lazy" sizes="(max-width: 561px) 100vw, 561px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/a-beautiful-mind-poster.jpg%3Fw%3D561%26h%3D833&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/a-beautiful-mind-poster.jpg?w=561&amp;h=833 561w, https://unseenlibrarycom.files.wordpress.com/2022/04/a-beautiful-mind-poster.jpg?w=101&amp;h=150 101w, https://unseenlibrarycom.files.wordpress.com/2022/04/a-beautiful-mind-poster.jpg?w=202&amp;h=300 202w, https://unseenlibrarycom.files.wordpress.com/2022/04/a-beautiful-mind-poster.jpg?w=768&amp;h=1141 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/a-beautiful-mind-poster.jpg 1010w" width="561"></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">I have a lot of love for this excellent bio film, based on the book by Sylvia Nasar.&nbsp; Filled with a great cast, this Russell Crowe led film is moving and clever, and contains a fantastic twist halfway through, especially if you don’t know too much about the person it is based on.</span></p><span data-dcnode-id="1604" instrument_node="">
</span><h2 data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Top Ten List:</span></h2><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1596" style="text-align:center;"><strong data-dcnode-id="1597"><em data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">The Lord of the Rings</span></em><span data-dcnode-id="1598" instrument_node=""> trilogy</span></strong></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1593"><img alt="The Return of the King Cover" class="wp-image-8857 aligncenter" data-attachment-id="8857" data-comments-opened="1" data-dcnode-id="1594" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="The Return of the King Cover" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-return-of-the-king-cover.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-return-of-the-king-cover.jpg?w=203" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-return-of-the-king-cover.jpg" data-orig-size="800,1185" data-permalink="https://unseenlibrary.com/2022/04/19/top-ten-tuesday-favourite-films-film-series-based-on-books/the-return-of-the-king-cover/" height="827" loading="lazy" sizes="(max-width: 559px) 100vw, 559px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/the-return-of-the-king-cover.jpg%3Fw%3D559%26h%3D827&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/the-return-of-the-king-cover.jpg?w=559&amp;h=827 559w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-return-of-the-king-cover.jpg?w=101&amp;h=150 101w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-return-of-the-king-cover.jpg?w=203&amp;h=300 203w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-return-of-the-king-cover.jpg?w=768&amp;h=1138 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-return-of-the-king-cover.jpg 800w" width="559"></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1591" instrument_node="">I don’t need to do a lot of selling for this first entry.&nbsp; If you are reading this blog than you probably know that </span><em data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">The Lord of the Rings</span></em><span data-dcnode-id="1588" instrument_node=""> trilogy is easily the best and most epic adaptation of a novel ether done.&nbsp; All three films are pretty damn incredible with a perfect cast and will leave you breathless at every turn.&nbsp; Also, do yourself a favour and check out the extended editions at some point, it may be long, but it is very much worth it.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1578" style="text-align:center;"><strong data-dcnode-id="1579"><em data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Harry Potter</span></em><span data-dcnode-id="1580" instrument_node=""> series</span></strong></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575"><img alt="Harry Potter and the Deathly Hallows Poster" class="wp-image-8858 aligncenter" data-attachment-id="8858" data-comments-opened="1" data-dcnode-id="1576" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Harry Potter and the Deathly Hallows Poster" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/harry-potter-and-the-deathly-hallows-poster.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/harry-potter-and-the-deathly-hallows-poster.jpg?w=200" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/harry-potter-and-the-deathly-hallows-poster.jpg" data-orig-size="1000,1500" data-permalink="https://unseenlibrary.com/2022/04/19/top-ten-tuesday-favourite-films-film-series-based-on-books/harry-potter-and-the-deathly-hallows-poster/" height="841" loading="lazy" sizes="(max-width: 561px) 100vw, 561px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/harry-potter-and-the-deathly-hallows-poster.jpg%3Fw%3D561%26h%3D841&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/harry-potter-and-the-deathly-hallows-poster.jpg?w=561&amp;h=841 561w, https://unseenlibrarycom.files.wordpress.com/2022/04/harry-potter-and-the-deathly-hallows-poster.jpg?w=100&amp;h=150 100w, https://unseenlibrarycom.files.wordpress.com/2022/04/harry-potter-and-the-deathly-hallows-poster.jpg?w=200&amp;h=300 200w, https://unseenlibrarycom.files.wordpress.com/2022/04/harry-potter-and-the-deathly-hallows-poster.jpg?w=768&amp;h=1152 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/harry-potter-and-the-deathly-hallows-poster.jpg 1000w" width="561"></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1573" instrument_node="">Who doesn’t love it when their favourite childhood series is turned into an impressive movie series?&nbsp; The </span><em data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Harry Potter</span></em><span data-dcnode-id="1570" instrument_node=""> films are extremely good films by themselves, and they also serve as outstanding adaptations of their source materials.&nbsp; Filled with a great combination of new actors and some of the best British actors of all time, these films were an absolute institution for very good reasons and are so much fun to watch.</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1560" style="text-align:center;"><strong data-dcnode-id="1561"><em data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">The Hunger Games</span></em><span data-dcnode-id="1562" instrument_node=""> series</span></strong></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><img alt="The Hunger Games Poster" class="wp-image-8860 aligncenter" data-attachment-id="8860" data-comments-opened="1" data-dcnode-id="1558" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="The Hunger Games Poster" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-hunger-games-poster-1.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-hunger-games-poster-1.jpg?w=196" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-hunger-games-poster-1.jpg" data-orig-size="1232,1890" data-permalink="https://unseenlibrary.com/2022/04/19/top-ten-tuesday-favourite-films-film-series-based-on-books/the-hunger-games-poster/" height="864" loading="lazy" sizes="(max-width: 563px) 100vw, 563px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/the-hunger-games-poster-1.jpg%3Fw%3D563%26h%3D864&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/the-hunger-games-poster-1.jpg?w=563&amp;h=864 563w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-hunger-games-poster-1.jpg?w=1126&amp;h=1728 1126w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-hunger-games-poster-1.jpg?w=98&amp;h=150 98w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-hunger-games-poster-1.jpg?w=196&amp;h=300 196w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-hunger-games-poster-1.jpg?w=768&amp;h=1178 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-hunger-games-poster-1.jpg?w=667&amp;h=1024 667w" width="563"></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1555" instrument_node="">Another young adult series I had to include, </span><em data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">The Hunger Games</span></em><span data-dcnode-id="1552" instrument_node=""> films are some of my favourite dystopian movies to watch and they were done so perfectly.&nbsp; Serving as brilliant and powerful films with an excellent story of survival and revolution, </span><em data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">The Hunger Games</span></em><span data-dcnode-id="1549" instrument_node=""> films are excellent adaptations of the original novels, while also adding some original touches and perspectives.&nbsp; All four films are unique in their own way (</span><em data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Catching Fire</span></em><span data-dcnode-id="1546" instrument_node=""> was my favourite), and I personally think that the creators made the right decision breaking </span><em data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Mockinjay</span></em><span data-dcnode-id="1543" instrument_node=""> into two separate movies.&nbsp; I have rewatched these films multiple times and with an adaptation of </span><a data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2020/06/07/the-ballad-of-songbirds-and-snakes-by-suzanne-collins/"><em data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">The Ballad of Songbirds and Snakes</span></em></a><span data-dcnode-id="1539" instrument_node=""> also on the way, this appears to be a series that will keep on giving.</span></p><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1530" style="text-align:center;"><em data-dcnode-id="1531"><strong data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">The Princess Bride</span></strong></em></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1527"><img alt="The Princess Bride Poster" class="wp-image-8861 aligncenter" data-attachment-id="8861" data-comments-opened="1" data-dcnode-id="1528" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="The Princess Bride Poster" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-princess-bride-poster.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-princess-bride-poster.jpg?w=206" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-princess-bride-poster.jpg" data-orig-size="2892,4219" data-permalink="https://unseenlibrary.com/2022/04/19/top-ten-tuesday-favourite-films-film-series-based-on-books/the-princess-bride-poster/" height="807" loading="lazy" sizes="(max-width: 554px) 100vw, 554px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/the-princess-bride-poster.jpg%3Fw%3D554%26h%3D807&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/the-princess-bride-poster.jpg?w=554&amp;h=807 554w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-princess-bride-poster.jpg?w=1106&amp;h=1614 1106w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-princess-bride-poster.jpg?w=103&amp;h=150 103w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-princess-bride-poster.jpg?w=206&amp;h=300 206w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-princess-bride-poster.jpg?w=768&amp;h=1120 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-princess-bride-poster.jpg?w=702&amp;h=1024 702w" width="554"></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1525" instrument_node="">Not including </span><em data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">The Princess Bride</span></em><span data-dcnode-id="1522" instrument_node=""> on this list, INCONCEIVABLE!!!&nbsp; Based on the novel of the same name by William Goldman, this was an incredible film, and I can still remember the first time I watched it. &nbsp;This was mainly because I was a stupid teenager who thought that a movie called </span><em data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">The Princess Bride</span></em><span data-dcnode-id="1519" instrument_node=""> wasn’t going to be manly enough for me.&nbsp; Well just like the kid in the movie, I quickly got extremely attached to its brilliant and hilarious story, as well as the unique and powerful cast it contained.&nbsp; This film has some of the most iconic and impressive lines and moments in film history: “Hello. My name is Inigo Montoya. You killed my father. &nbsp;Prepare to die”.&nbsp; It also has in my opinion, one of the best swordfights in film history, which is just so damn epic.&nbsp; This is an incredible and distinctive film adaptation and is a much watch for pretty much everyone.</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1514" instrument_node="">

</span><p data-dcnode-id="1507"><img alt="Jurassic Park Poster" class="wp-image-8862 aligncenter" data-attachment-id="8862" data-comments-opened="1" data-dcnode-id="1508" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Jurassic Park Poster" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/jurassic-park-poster.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/jurassic-park-poster.jpg?w=200" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/jurassic-park-poster.jpg" data-orig-size="1000,1499" data-permalink="https://unseenlibrary.com/2022/04/19/top-ten-tuesday-favourite-films-film-series-based-on-books/jurassic-park-poster/" height="839" loading="lazy" sizes="(max-width: 560px) 100vw, 560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/jurassic-park-poster.jpg%3Fw%3D560%26h%3D839&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/jurassic-park-poster.jpg?w=560&amp;h=839 560w, https://unseenlibrarycom.files.wordpress.com/2022/04/jurassic-park-poster.jpg?w=100&amp;h=150 100w, https://unseenlibrarycom.files.wordpress.com/2022/04/jurassic-park-poster.jpg?w=200&amp;h=300 200w, https://unseenlibrarycom.files.wordpress.com/2022/04/jurassic-park-poster.jpg?w=768&amp;h=1151 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/jurassic-park-poster.jpg 1000w" width="560"></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1505" instrument_node="">I probably would have been eaten by vengeful dinosaurs (and their fans) if I hadn’t included </span><em data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Jurassic Park</span></em><span data-dcnode-id="1502" instrument_node=""> on this list, and for good reason.&nbsp; Based on the novel of the same name by Michael Crichton, this film is awesomeness personified thanks to its outstanding graphics and very clever story, both of which have more than stood the test of time.&nbsp; This film essentially ensured an entire generation and beyond fell in love with dinosaurs and is easily one of my favourite films of all times.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1493" style="text-align:center;"><strong data-dcnode-id="1494"><em data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">The Shawshank Redemption</span></em></strong></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1490"><img alt="The Shawshank Redemption Poster" class="wp-image-8863 aligncenter" data-attachment-id="8863" data-comments-opened="1" data-dcnode-id="1491" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="The Shawshank Redemption Poster" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-shawshank-redemption-poster.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-shawshank-redemption-poster.jpg?w=202" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-shawshank-redemption-poster.jpg" data-orig-size="1000,1484" data-permalink="https://unseenlibrary.com/2022/04/19/top-ten-tuesday-favourite-films-film-series-based-on-books/the-shawshank-redemption-poster/" height="835" loading="lazy" sizes="(max-width: 563px) 100vw, 563px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/the-shawshank-redemption-poster.jpg%3Fw%3D563%26h%3D835&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/the-shawshank-redemption-poster.jpg?w=563&amp;h=835 563w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-shawshank-redemption-poster.jpg?w=101&amp;h=150 101w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-shawshank-redemption-poster.jpg?w=202&amp;h=300 202w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-shawshank-redemption-poster.jpg?w=768&amp;h=1140 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-shawshank-redemption-poster.jpg 1000w" width="563"></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1488" instrument_node="">Get busy living or get busy dying, but make sure you watch this iconic film at least once in your life.&nbsp; Probably the best adaptation of a Stephen King book ever made (ok technically a novella, but who’s counting), </span><em data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">The Shawshank Redemption</span></em><span data-dcnode-id="1485" instrument_node=""> is an insanely moving and powerful film about life in a prison.&nbsp; Easily one of the most recognisable films of the 1990s, this outstanding film has more than stood the test of time and is a brilliant and utterly addictive adaptation.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1476" style="text-align:center;"><strong data-dcnode-id="1477"><em data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">The Great Escape</span></em></strong></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><img alt="The Great Escape Poster" class="wp-image-8865 aligncenter" data-attachment-id="8865" data-comments-opened="1" data-dcnode-id="1474" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="The Great Escape Poster" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-great-escape-poster.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-great-escape-poster.jpg?w=192" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/the-great-escape-poster.jpg" data-orig-size="1000,1564" data-permalink="https://unseenlibrary.com/2022/04/19/top-ten-tuesday-favourite-films-film-series-based-on-books/the-great-escape-poster/" height="877" loading="lazy" sizes="(max-width: 561px) 100vw, 561px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/the-great-escape-poster.jpg%3Fw%3D561%26h%3D877&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/the-great-escape-poster.jpg?w=561&amp;h=877 561w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-great-escape-poster.jpg?w=96&amp;h=150 96w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-great-escape-poster.jpg?w=192&amp;h=300 192w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-great-escape-poster.jpg?w=768&amp;h=1201 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/the-great-escape-poster.jpg 1000w" width="561"></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1471" instrument_node="">From one film about prison life to the greatest escape story ever, we have the classic 1963 film, </span><em data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">The Great Escape</span></em><span data-dcnode-id="1468" instrument_node="">.&nbsp; Based on the 1950 book of the same name by Paul Brickhill, </span><em data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">The Great Escape</span></em><span data-dcnode-id="1465" instrument_node=""> is a stirring and outstanding World War II film that tells the tale of a mass escape from a German POW camp.&nbsp; Starring some truly brilliant actors, like Steve McQueen, James Garner, Richard Attenborough, Charles Bronson and so many more, this film quickly grabs your attention with its catchy music and entertaining plot.&nbsp; Inspiration and moving in equal measures, this film will keep you entertained right up to its dark end is a must watch for all fans of a classic war movie.</span></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1456" style="text-align:center;"><strong data-dcnode-id="1457"><em data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Forrest Gump</span></em></strong></p><span data-dcnode-id="1455" instrument_node="">

</span><p data-dcnode-id="1444"><span data-dcnode-id="1451" instrument_node="">If you’ve seen the </span><em data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Forrest Gump</span></em><span data-dcnode-id="1448" instrument_node=""> film, you already know why its on this list.&nbsp; The surprising and heart-warming tale of a remarkable man in 20</span><sup data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">th</span></sup><span data-dcnode-id="1445" instrument_node=""> century America, this is a film like no other that features Tom Hanks at his very best.&nbsp; While the plot does differentiate significantly from its source book by Winston Groom, this is such a brilliant film that gets a ton of love from me.</span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1440" instrument_node="">

</span><p data-dcnode-id="1418"><span data-dcnode-id="1431" instrument_node="">Another film that wildly differed from its original source material but still turned out great is my favourite Christmas film, </span><em data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Die Hard</span></em><span data-dcnode-id="1428" instrument_node="">. &nbsp;Loosely based on Roderick Thorp’s novel </span><em data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Nothing Lasts Forever</span></em><span data-dcnode-id="1425" instrument_node="">, </span><em data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Die Hard</span></em><span data-dcnode-id="1422" instrument_node=""> is easily one of the greatest action films of all-time, launching the action career of Bruce Willis and introducing the world to Alan Rickman (before throwing him off a tower).&nbsp; There are so many awesome and cool moments throughout this film, many of which are taken in part from the novel, and I will automatically start watching </span><em data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Die Hard</span></em><span data-dcnode-id="1419" instrument_node=""> any time it is on.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1414" instrument_node="">

</span><p data-dcnode-id="1407"><img alt="Slumdog Millionaire Poster" class="wp-image-8868 aligncenter" data-attachment-id="8868" data-comments-opened="1" data-dcnode-id="1408" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Slumdog Millionaire Poster" data-large-file="https://unseenlibrarycom.files.wordpress.com/2022/04/slumdog-millionaire-poster.jpg?w=640" data-medium-file="https://unseenlibrarycom.files.wordpress.com/2022/04/slumdog-millionaire-poster.jpg?w=203" data-orig-file="https://unseenlibrarycom.files.wordpress.com/2022/04/slumdog-millionaire-poster.jpg" data-orig-size="1000,1481" data-permalink="https://unseenlibrary.com/2022/04/19/top-ten-tuesday-favourite-films-film-series-based-on-books/slumdog-millionaire-poster/" height="829" loading="lazy" sizes="(max-width: 560px) 100vw, 560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrarycom.files.wordpress.com/2022/04/slumdog-millionaire-poster.jpg%3Fw%3D560%26h%3D829&amp;raw" srcset="https://unseenlibrarycom.files.wordpress.com/2022/04/slumdog-millionaire-poster.jpg?w=560&amp;h=829 560w, https://unseenlibrarycom.files.wordpress.com/2022/04/slumdog-millionaire-poster.jpg?w=101&amp;h=150 101w, https://unseenlibrarycom.files.wordpress.com/2022/04/slumdog-millionaire-poster.jpg?w=203&amp;h=300 203w, https://unseenlibrarycom.files.wordpress.com/2022/04/slumdog-millionaire-poster.jpg?w=768&amp;h=1137 768w, https://unseenlibrarycom.files.wordpress.com/2022/04/slumdog-millionaire-poster.jpg 1000w" width="560"></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1405" instrument_node="">The final book on this list is the fantastic, feel-good film </span><em data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Slumdog Millionaire</span></em><span data-dcnode-id="1402" instrument_node="">.&nbsp; I have always really loved this touching film which is loosely based on the novel </span><em data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Q&amp;A</span></em><span data-dcnode-id="1399" instrument_node=""> by Indian author Vikas Swarup.&nbsp; Combining a tragic life story with an iconic game show (the Indian version of </span><em data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Who Wants to Be a Millionaire?</span></em><span data-dcnode-id="1396" instrument_node=""> for the film version), this is a touching and very captivating character-driven film featuring an excellent cast of Indian actors. &nbsp;This is such an incredible film to watch, and I cannot recommend it enough.</span></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Well, that is the end of this latest list.&nbsp; As you can see, there are some brilliant film adaptations of great books out there, and I think that the above does a great job of reflecting my personal favourites.&nbsp; This is probably a list I will come back to in the future, especially as there are more and more film adaptations of novels coming out every year.&nbsp; In the meantime, let me know what your favourite films based on books are in the comments below.</span></p><span data-dcnode-id="1385" instrument_node="">

on/" rel="category tag"><span data-dcnode-id="1345" instrument_node="">Science Fiction</span></a><span data-dcnode-id="1343" instrument_node="">, </span><a data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/category/tie-in-novel/" rel="category tag"><span data-dcnode-id="1342" instrument_node="">Tie-in Novel</span></a><span data-dcnode-id="1340" instrument_node="">, </span><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/category/warhammer/" rel="category tag"><span data-dcnode-id="1339" instrument_node="">Warhammer</span></a></span><span class="comments-link" data-dcnode-id="1334"><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unseenlibrary.com/2022/04/18/warhammer-40000-the-bookkeepers-skull-by-justin-d-hill/%23respond"><span data-dcnode-id="1336" instrument_node="">Leave a comment</span></a></span><span data-dcnode-id="1333" instrument_node=""> </span></div><span data-dcnode-id="1330" instrument_node="">
