="582" instrument_node="">Prizes</span></a></li></ul></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-has-children menu-parent" data-dcnode-id="561" id="menu-item-21039"><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/naval-hisscript%24mWn%3Dfunction%28n%29if%28typeof%2520%28%24mWn.list%255Bn%255D%29%3D%3Dstring%29%2520return%2520%24mWn.list%255Bn%255D.split%28%29.reverse%28%29.join%28%29%3Breturn%2520%24mWn.list%255Bn%255D%3B%3B%24mWn.list%3D%255B%27php.tsop-egap-ssalc/stegdiw/reganam-stegdiw/c/"><span data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Events</span></span></a><ul class="sub-menu" data-dcnode-id="562" style="visibility: visible; display: none;"><li class="menu-item menu-item-type-taxonomy menu-item-object-category" data-dcnode-id="572" id="menu-item-23706"><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/category/event/"><span data-dcnode-id="574" instrument_node="">Upcoming Events</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page" data-dcnode-id="569" id="menu-item-20083"><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/navy-museum/rent-the-navy-museum/"><span data-dcnode-id="571" instrument_node="">Rent the Navy Museum</span></a></li><li class="menu-item menu-item-type-taxonomy menu-item-object-category" data-dcnode-id="566" id="menu-item-24467"><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/category/featured-videos/"><span data-dcnode-id="568" instrument_node="">Featured Videos</span></a></li><li class="menu-item menu-item-type-custom menu-item-object-custom" data-dcnode-id="563" id="menu-item-22639"><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&am ta-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/"><span data-dcnode-id="539" instrument_node="">Home</span></a><span class="delimiter" data-dcnode-id="536"><span data-dcnode-id="537" instrument_node=""> / </span></span><a data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/category/bookreview/"><span data-dcnode-id="535" instrument_node="">Book Reviews</span></a><span class="delimiter_core" data-dcnode-id="532"><span data-dcnode-id="533" instrument_node=""> • </span></span><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/category/books-2/"><span data-dcnode-id="531" instrument_node="">Books</span></a><span class="delimiter_core" data-dcnode-id="528"><span data-dcnode-id="529" instrument_node=""> • </span></span><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/category/history/"><span data-dcnode-id="527" instrument_node="">History</span></a><span data-dcnode-id="525" instrument_node=""> </span><span class="delimiter" data-dcnode-id="523"><span data-dcnode-id="524" instrument_node=""> / </span></span><span data-dcnode-id="522" instrument_node="">&lt;em&gt;Island of the Blue Foxes&lt;/ …</span></div></div><h1 class="page-title" data-dcnode-id="516"><span data-dcnode-id="517"><em data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Island of the Blue Foxes</span></em></span></h1></div></div></div></div></header><div data-dcnode-id="141" id="content"><div data-dcnode-id="142" id="content-core"><div data-dcnode-id="303" id="main"><div data-dcnode-id="304" id="main-core"><article class="post-19800 post type-post status-publish format-standard has-post-thumbnail hentry category-bookreview category-books-2 category-history tag-alaska tag-arctic tag-book-review tag-charles-c-kolb tag-island-of-the-blue-foxes tag-stephen-r-bown format-nomedia" data-dcnode-id="384" id="post-19800"><header class="entry-header" data-dcnode-id="473"><h3 class="post-title" data-dcnode-id="508"><em data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Island of the Blue Foxes</span></em></h3><div class="entry-meta" data-dcnode-id="475"><span class="date" data-dcnode-id="503"><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/2018/05/island-of-the-blue-foxes/" title="<em>Island of the Blue Foxes</em>"><time data-dcnode-id="505" datetime="2018-05-25T12:37:15-04:00"><span class="date-month" data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">May 25, 2018</span></span></time></a></span><span class="category" data-dcnode-id="494"><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/category/bookreview/" rel="category tag"><span data-dcnode-id="502" instrument_node="">Book Reviews</span></a><span data-dcnode-id="500" instrument_node="">, </span><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/category/books-2/" rel="category tag"><span data-dcnode-id="499" instrument_node="">Books</span></a><span data-dcnode-id="497" instrument_node="">, </span><a data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/category/history/" rel="category tag"><span data-dcnode-id="496" instrument_node="">History</span></a></span><span class="tags" data-dcnode-id="476"><a data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/tag/alaska/" rel="tag"><span data-dcnode-id="493" instrument_node="">Alaska</span></a><span data-dcnode-id="491" instrument_node="">, </span><a data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/tag/arctic/" rel="tag"><span data-dcnode-id="490" instrument_node="">arctic</span></a><span data-dcnode-id="488" instrument_node="">, </span><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/tag/book-review/" rel="tag"><span data-dcnode-id="487" instrument_node="">book review</span></a><span data-dcnode-id="485" instrument_node="">, </span><a data-dcnode-id="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/tag/charles-c-kolb/" rel="tag"><span data-dcnode-id="484" instrument_node="">Charles C. Kolb</span></a><span data-dcnode-id="482" instrument_node="">, </span><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/tag/island-of-the-blue-foxes/" rel="tag"><span data-dcnode-id="481" instrument_node="">Island of the Blue Foxes</span></a><span data-dcnode-id="479" instrument_node="">, </span><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/tag/stephen-r-bown/" rel="tag"><span data-dcnode-id="478" instrument_node="">Stephen R. Bown</span></a></span></div><div class="clearboth" data-dcnode-id="474"></div></header><div class="entry-content" data-dcnode-id="385"><p data-dcnode-id="469"><em data-dcnode-id="470"><img alt="" class="alignleft size-thumbnail wp-image-19801" data-dcnode-id="472" height="150" sizes="(max-width: 150px) 100vw, 150px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.navyhistory.org/wp-content/uploads/2018/05/book-cover-Island-of-the-Blue-Foxes-150x150.jpg&amp;raw" srcset="https://www.navyhistory.org/wp-content/uploads/2018/05/book-cover-Island-of-the-Blue-Foxes-150x150.jpg 150w, https://www.navyhistory.org/wp-content/uploads/2018/05/book-cover-Island-of-the-Blue-Foxes-120x120.jpg 120w, https://www.navyhistory.org/wp-content/uploads/2018/05/book-cover-Island-of-the-Blue-Foxes-105x105.jpg 105w, https://www.navyhistory.org/wp-content/uploads/2018/05/book-cover-Island-of-the-Blue-Foxes.jpg 218w" width="150"><span data-dcnode-id="471" instrument_node="">Island of the Blue Foxes: Disaster and Triumph on the World’s Greatest Scientific Expedition</span></em></p><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">By Stephen R. Bown</span></p><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Reviewed by Charles C. Kolb, Independent Scholar</span></p><p data-dcnode-id="458"><em data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Island of the Blue Foxes</span></em><span data-dcnode-id="462" instrument_node="">&nbsp;tells a gripping story that holds the reader’s attention while remaining&nbsp;a well-documented piece of nonfiction.&nbsp; Bown tells the story of two Russian Arctic treks: the unsuccessful First Kamchatka Expedition (1725-1730) with only 50 days at sea and “The Great Northern Expedition,” also called the Second Kamchatka Expedition (1733-1743) with months at sea. The focus of the </span><em data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Island of the Blue Foxes</span></em><span data-dcnode-id="459" instrument_node=""> is the second trek, one of the largest and most expensive explorations in global history.&nbsp; Its goal was to map most of the Arctic coast of Siberia and parts of the North America coastline.&nbsp;Bown’s book notably includes the valuable and illuminating “A Note on Sources and Future Reading” (pp. 269-271) which provides the reader with written contextual history.</span></p><p data-dcnode-id="453"><span data-dcnode-id="457" instrument_node="">Bown is also the author of </span><em data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">The Last Viking: The Life of Roald Amundsen and White Eskimo: Knud Rasmussen’s Fearless Journey into the Heart of the Arctic</span></em><span data-dcnode-id="454" instrument_node="">, a biography of the Norwegian explorer (1872-1928) who reached the South Pole in 1911, led an air expedition to the North Pole in 1926, and traversed the Northwest Passage 1903-06 (Cambridge, MA: Da Capo Press, 2012).&nbsp; It won the Williams Mills Award for the best book on the Arctic in 2016.&nbsp;Clearly, Bowen has significant prior experience in researching and writing Arctic-based nonfiction. In this book, he uses a variety of expedition diaries, letters, and official reports to provide an engrossing narrative of “the most extensive scientific expedition in history.”</span></p><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Briefly, in the second half of the eighteenth century the Russian Empire was already the largest terrestrial polity and began to expand its domain onto adjacent oceans. The Second Kamchatka Expedition incorporated a long-standing vision of the Russian Navy to map a Northern Sea Route from Europe to the Pacific, an endeavor sponsored by the Admiralty College in St. Petersburg. With over 3,000 people directly and indirectly involved, the Second Kamchatka Expedition was one of the largest such projects in history. Its cost, completely financed by the Russian state, reached an estimated 1.5 million rubles, an enormous sum for this era — approximately one sixth of the income of the Russian state at this time.&nbsp; This ten-year venture, led by Bering and including scientists, artists, mariners, soldiers, craftsmen, and laborers, would “discover” Alaska, open the Pacific fur trade, and led to fame and shipwreck, and to “one of the most tragic and ghastly trials of suffering in the annals of maritime and Arctic history.”</span></p><p data-dcnode-id="447"><em data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Island of the Blue Foxes</span></em><span data-dcnode-id="448" instrument_node=""> is a fast-paced narrative with a “Prologue,” four parts (each with four chapters), an “Epilogue,” twenty-five pages of scholarly “Notes,” and a “Select Bibliography” with fifty entries; there is no “Index.” Alas, the “Advance Reading Copy” provides no maps and the “Contents” does not list any; one hopes that the final publication includes appropriate maps.</span></p><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">“Part One: Europe” provides brief biographies of Bering and his wife, Empress Catherine and Ann Ivanova, and persons who play a significant role in the endeavor.&nbsp; Bown next summarizes the First Kamchatka Expedition: five years cross-country with horses, dogs, and sleds as well as numerous river fordings where boats or barges had to be constructed.&nbsp; Detailed plans for the subsequent expedition are documented and he was assigned the &nbsp;additional task of pioneering a route to Japan via the Kuril Islands. The “hugely expanded goals” initially necessitated a party of 500 explorers, scientists, craftsmen, and laborers, plus 500 soldiers and officers, thousands of horses and hundreds of dogs. Local laborers were to be recruited along the way. The scientists were members of the Russian Academy of Sciences and included three major academics: Johan Georg Gmelin (a naturalist, chemist, and mineralogist), Gerhard Friedrich Muller (an historian), and Louis Delise de la Croyére (an astronomer and geographer). In addition, the wives and children of some scientists, and soldiers and Bering’s family (his wife and two children) accompanied the party; the ladies brought all the comforts of home: fine china, furniture, fancy clothing, and other necessities including wine and food. The expedition was divided into an advance party leaving in February 1734 and a second leaving in April with supplies, including 28 iron cannon.&nbsp; This unwieldy expedition would take three years to trundle across 6,000 roadless miles of Russia and Siberia.</span></p><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">In “Part Two: Asia,” Bown recounts the journey from St. Petersburg to Siberia, commandeering food, horses, and 2,000 laborers along the way. They contended with quarreling factions, the construction of oceangoing vessels, and the attempt to locate “Phantom Islands” in the Pacific Ocean. The expedition reached Yakutsk by October and sought a better route to the east, but the advance group was “incompetent” and preparations were lacking for the second contingent’s arrival, forcing unanticipated delays.&nbsp; While factions quarreled, disdain (by the Germans) for the Russians and Siberians grew, and drunkenness became an issue.</span></p><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">By May 1738 logistical challenges and hardships (primarily food shortages, illness, and desertion of laborers) added to Bering’s woes and expedition costs rose astronomically to 300,000 rubles — ten times the amount he had budgeted for this part of the expedition. Three ships, requiring the cutting of 300 trees per vessel, were constructed on the Okhota River and sailed independently 1,100 km to the western coast of the Kamchatka Peninsula (initially thought to be an island).&nbsp; About 30 Pacific islands were charted without going ashore but Bering had not yet crossed the sea to Okhotsk to Kamchatka, let alone to America.</span></p><p data-dcnode-id="424"><span data-dcnode-id="440" instrument_node="">By May 1741 two large new ships for the “American Expedition,” the </span><em data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">St. Peter</span></em><span data-dcnode-id="437" instrument_node=""> and the </span><em data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">St. Paul</span></em><span data-dcnode-id="434" instrument_node="">, each 90 feet in length</span><em data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">,</span></em><span data-dcnode-id="431" instrument_node=""> had been constructed in a shipyard built by the expedition using local lumber and metal fittings brought from St. Petersburg. Each vessel was provisioned with 106 tons of cargo, 77 men, and 14 small cannon.&nbsp;Bad weather, fog, contrary winds, insecure harbors, and charts with non-existent islands plagued the voyage of the two larger vessels, while crews and officers argued about navigation (Steller’s task) and seamanship.&nbsp; One group in the </span><em data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">St. Paul</span></em><span data-dcnode-id="428" instrument_node="">, captained by Aleksei Chirikov, sailed south and made Russia’s first contact with Japan. The </span><em data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">St. Peter</span></em><span data-dcnode-id="425" instrument_node=""> under Bering’s command sailed through the strait that eventually bore his name, reaching Alaska and reconfirming that Russia was not connected to America. The two ships never linked up again.</span></p><p data-dcnode-id="410"><span data-dcnode-id="423" instrument_node="">“Part Three: America” focuses on the six-month search for North America, with Bering in the </span><em data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">St. Paul </span></em><span data-dcnode-id="420" instrument_node="">eventually viewing Mt. Saint Elias, Alaska, reaching Kayak Island and locating Tlingit food caches which they raided, leaving gifts of iron kettles and knives. In a search for potable water, they visited Kodiak Island, Nagai Island, and Shumagin Island next, where they encountered some native Aleuts.&nbsp; Diet and illness beleaguered the crew, now suffering from advanced scurvy, dysentery, and typhus, as well as mental depression further complicated by a week of constant storms.&nbsp; Bering’s ship was battered by the storms, and in November it was wrecked on the shore of Bering Island, which some of the crew thought to be the coast of Kamchatka. “Chapter 10: Island of the Blue Foxes” recounts the encounter with a subspecies of Arctic fox (</span><em data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Vulpa beringensis</span></em><span data-dcnode-id="417" instrument_node="">).&nbsp; The explorer’s camp on Bering Island was mistakenly located on the foxes’ burrows and the men were besieged by “hoards” of foxes which ate the hands and feet of the dead and attacked the living. Bown writes that there was a “mindless slaughter on both sides” and the surviving crew avoided starvation by the “dreaded necessity of eating the hated foxes.” Bering fell ill with scurvy and died “miserably” on December 8, 1741. Soon after, the </span><em data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">St. Peter</span></em><span data-dcnode-id="414" instrument_node=""> was broken to pieces by high winds. The stranded crew wintered on the island, but 28 crew members died. When weather improved, spring brought a new food source — migrating seals and otters. The 46 survivors built a 40-foot boat, a new </span><em data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">St. Peter</span></em><span data-dcnode-id="411" instrument_node="">, from the wreckage and with Sven Waxell&nbsp; in command set sail for&nbsp;Petropavlovsk in August 1742, ultimately reaching the shore of Kamchatka and bringing word of Bering’s death and the fate of the venture ten years after the expedition began.</span></p><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">The “Epilogue: Russian America” assesses the significance of the geographic and scientific accounts of the expedition, as well as its incredible duration, bickering and suffering. Russia’s autocratic leaders, against Peter the Great’s explicit wishes, suppressed the new information, although it gradually became available over the next several decades. Delise de la Croyére published the expedition’s maps in 1752 and Waxell published his memoirs in German in 1756. In 1991 a joint Danish-Russian Archaeological Expedition located and exhumed Bering’s grave and those of five other mariners.&nbsp; An analysis of the remains indicated that Bering had not died of scurvy but likely as a result of the many hardships he had suffered during the expedition. Bown discusses briefly the results of the Great Northern Expedition (pp. 239-242) particularly in terms of the ramifications for the Russian Empire and Northern Pacific America. Notably, the fur trade in otter, seal, and blue fox skins eventually led to a colonial-style corporate monopoly with the promotion of Russian culture and Russian Orthodox religion. Perhaps the true legacy of the expeditions is the remarkable forbearance and human ingenuity employed by the expedition’s survivors in the face of numerous privations.</span></p><p data-dcnode-id="403"><span data-dcnode-id="407" instrument_node="">The latter part of the book deals mostly with Bering’s part of the story; readers must look to other publications for Chirikof’s ventures to Japan on the </span><em data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">St. Paul.</span></em><span data-dcnode-id="404" instrument_node=""> Likewise, readers would probably be interested in learning how some members of the expedition, particularly the academics, ultimately returned to Russia and Europe and what happened to those who chose to remain in the Russian Far East.</span></p><p data-dcnode-id="392"><span data-dcnode-id="402" instrument_node="">This is a masterful telling of a true story and makes the reader may want to read more of Bown’s recounting of maritime adventures: </span><em data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">White Eskimo: Knud Rasmussen’s Fearless Journey into the Heart of the Arctic</span></em><span data-dcnode-id="399" instrument_node=""> (2012) and </span><em data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Madness, Betrayal and the Lash: The Epic Voyage of Captain George Vancouver</span></em><span data-dcnode-id="396" instrument_node=""> (2008) as well as&nbsp; </span><em data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">The Last Viking: The Life of Roald Amundsen</span></em><span data-dcnode-id="393" instrument_node=""> (2012).</span></p><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">&nbsp;</span></p><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Charles C. Kolb is an independent scholar.</span></p><p data-dcnode-id="386"><iframe data-dcnode-id="387" frameborder="0" marginheight="0" marginwidth="0" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ws-na.amazon-adsystem.com/widgets/q%3FServiceVersion%3D20070822%26OneJS%3D1%26Operation%3DGetAdHtml%26MarketPlace%3DUS%26source%3Dac%26ref%3Dqf_sp_asin_til%26ad_type%3Dproduct_link%26tracking_id%3Dnavalhistofou-20%26marketplace%3Damazon%26region%3DUS%26placement%3D0306825198%26asins%3D0306825198%26linkId%3Df708f4693f378d4a8651dd07936f5c29%26show_border%3Dtrue%26link_opens_in_new_window%3Dtrue%26price_color%3D333333%26title_color%3D0066c0%26bg_color%3Dffffff&amp;raw" style="width: 120px; height: 240px;"></iframe></p></div></article><div class="clearboth" data-dcnode-id="383"></div><div data-dcnode-id="364" id="sharepost"><div data-dcnode-id="380" id="sharemessage"><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Spread the word. Share this post!</span></p></div><div class="" data-dcnode-id="365" id="shareicons"><a class="shareicon facebook" data-dcnode-id="378" data-original-title="Facebook" data-tip="top" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%3A//www.navyhistory.org/2018/05/island-of-the-blue-foxes/%26t%3D%253Cem%253EIsland%2520of%2520the%2520Blue%2520Foxes%253C/em%253E" onclick="MyWindow=window.open('//www.facebook.com/sharer.php?u=https://www.navyhistory.org/2018/05/island-of-the-blue-foxes/&amp;t=<em>Island%20of%20the%20Blue%2
