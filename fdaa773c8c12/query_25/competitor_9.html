</span><h1 class="" data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">The cultural significance of ‘Hamilton’s’ diverse cast</span></h1><span data-dcnode-id="1368" instrument_node="">
</span><div class="line-breaker" data-dcnode-id="1367"></div><span data-dcnode-id="1366" instrument_node="">
</span><h2 data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">“This is the story of America then, told by America now.”</span></h2><span data-dcnode-id="1363" instrument_node="">
</span><div class="author-name" data-dcnode-id="1358"><span data-dcnode-id="1362" instrument_node="">
By </span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hypable.com/author/ariana/"><span data-dcnode-id="1361" instrument_node="">Ariana Quiñónez</span></a><span data-dcnode-id="1359" instrument_node="">
</span></div><span data-dcnode-id="1357" instrument_node="">
</span><div data-dcnode-id="1352" id="div-gpt-1x1"><span data-dcnode-id="1356" instrument_node="">
</span><span data-dcnode-id="1353" instrument_node="">
</span></div><span data-dcnode-id="1351" instrument_node="">
</span><section class="ad-leaderboard-splitter special-video-container mobile-none" data-dcnode-id="1345"><div class="ad-leaderboard-splitter-container" data-dcnode-id="1346"><div class="video-unit" data-dcnode-id="1347"><div data-dcnode-id="1348" id="div-gpt-ad-1565103344697-1" style="width: 728px; max-height: 90px; margin: 10px 0px 10px 0px;"></div></div></div></section><span data-dcnode-id="1344" instrument_node="">

</span><div class="ros-content" data-dcnode-id="545"><span data-dcnode-id="1341" instrument_node="">
</span><div class="short-layout-inner-content-container" data-dcnode-id="779"><span data-dcnode-id="1340" instrument_node="">
</span><div class="mobile-only" data-dcnode-id="1331"><span data-dcnode-id="1339" instrument_node="">
</span><section class="ad-leaderboard-splitter mobile-only" data-dcnode-id="1333"><div class="ad-leaderboard-splitter-container" data-dcnode-id="1334"><div class="video-unit" data-dcnode-id="1335"><div data-dcnode-id="1336" id="div-gpt-ad-1565103440866-0" style="width: 320px; max-height: 50px;"></div></div></div></section><span data-dcnode-id="1332" instrument_node=""> </span></div><span data-dcnode-id="1330" instrument_node="">
</span><div class="inner-content" data-dcnode-id="1149" id="article-content"><span data-dcnode-id="1329" instrument_node="">
</span><section class="ad-leaderboard-splitter" data-dcnode-id="1316"><span data-dcnode-id="1328" instrument_node="">
</span><div class="ad-leaderboard-splitter-container" data-dcnode-id="1320"><span data-dcnode-id="1327" instrument_node="">
</span><div class="video-unit" data-dcnode-id="1322"><span data-dcnode-id="1326" instrument_node="">

</span></section><span data-dcnode-id="1315" instrument_node="">
</span><div class="mobile-none" data-dcnode-id="1307"><span data-dcnode-id="1314" instrument_node="">
</span><div data-dcnode-id="1309" id="div-gpt-ad-special-0"><span data-dcnode-id="1313" instrument_node="">
</span><span data-dcnode-id="1310" instrument_node="">
</span></div><span data-dcnode-id="1308" instrument_node="">
</span></div><span data-dcnode-id="1306" instrument_node="">
</span><div class="ad-leaderboard-splitter mobile-only" data-dcnode-id="1298"><span data-dcnode-id="1305" instrument_node="">
</span><div data-dcnode-id="1300" id="div-gpt-ad-special-0"><span data-dcnode-id="1304" instrument_node="">
</span><span data-dcnode-id="1301" instrument_node="">
</span></div><span data-dcnode-id="1299" instrument_node="">
</span></div><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1296" instrument_node="">They were rebels and geniuses. Free-thinkers full of contradictions. They were ballsy, educated, and entitled— and they set the world on fire, believing they could create a new kind of country.</span><span data-dcnode-id="1295" id="more-252608"></span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">The Founding Fathers loom large in our American history. After all, they managed to set up a system of government that, for the most part, still holds up almost two-hundred and fifty years later. “We hold these truths to be self-evident…”— we read their words and still want to believe in that kind of world-altering idealism.</span></p><section class="ad-leaderboard-splitter" data-dcnode-id="1284"><div class="ad-leaderboard-splitter-container" data-dcnode-id="1286"><div class="video-unit" data-dcnode-id="1287"></div></div><div data-dcnode-id="1285" style="clear: both;"></div></section><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1279"><img alt="Hamilton" class="alignleft size-full wp-image-252612 entered error" data-dcnode-id="1282" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton.jpg" data-lazy-srcset="https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton.jpg 800w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-215x108.jpg 215w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-620x310.jpg 620w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-400x200.jpg 400w" data-ll-status="error" height="400" onerror="this.style.display=&quot;none&quot;;" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton.jpg&amp;raw" srcset="https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton.jpg 800w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-215x108.jpg 215w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-620x310.jpg 620w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-400x200.jpg 400w" style="display: none;" width="800"><noscript data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">&lt;img src="https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton.jpg" alt="Hamilton" width="800" height="400" class="alignleft size-full wp-image-252612" srcset="https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton.jpg 800w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-215x108.jpg 215w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-620x310.jpg 620w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-400x200.jpg 400w" sizes="(max-width: 800px) 100vw, 800px" onerror='this.style.display="none";'&gt;</span></noscript></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">As a woman of color and a descendant of immigrants, I’ve always had a complicated relationship with the Founding Father narrative. I devoured the soap opera histories surrounding both their personal and political lives, and respected the way that they beat the odds to seemingly create a lasting nation through sheer force of will. The world was waiting for them to fail, but they chose to push through and fight and write and scream and claw their way towards the completion of a country, bickering with each other the entire way there because they understood that the stakes were so incredibly high. This is what the founding of our country stands for, I wanted to believe: the idea that anything is possible if you only have the tenacity and brilliance to make it happen.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">And yet, a part of me also understands that there is an inherent separation between this formative time in our history and me. As a woman of color, regardless of my own abilities, I would never have had a place in “the room where it happens.” I’m forced to recognize that our American history is fraught with both pride and terror. And that just as these men fought for their freedom, they also denied the most basic rights to others. In other words: as much as I identify with the Founding Fathers, they didn’t know that they were fighting for me.</span></p><section class="ad-leaderboard-splitter special-video-container mobile-none" data-dcnode-id="1267"><div class="ad-leaderboard-splitter-container" data-dcnode-id="1268"><div class="video-unit" data-dcnode-id="1269"><div data-dcnode-id="1270" id="div-gpt-ad-1565103914156-0" style="width: 728px; max-height: 90px; margin: 10px 0px 10px 0px;"></div></div></div></section><section class="ad-leaderboard-splitter mobile-only" data-dcnode-id="1261"><div class="ad-leaderboard-splitter-container" data-dcnode-id="1262"><div class="video-unit" data-dcnode-id="1263"><div data-dcnode-id="1264" id="div-gpt-ad-1565104100978-0"></div></div></div></section><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1259" instrument_node="">But history belongs to those who write it, and with the hit Broadway show </span><em data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Hamilton</span></em><span data-dcnode-id="1256" instrument_node="">, Lin-Manuel Miranda is rewriting the Founding Father narrative to purposefully reflect the kind of country we live in today. Choosing to cast the founders of our country as people of color may not be “historically” accurate, but it is culturally accurate as a reflection of a 21st century nation built by immigrants. Lin-Manuel Miranda’s version of history suddenly becomes an inclusive one, inviting every American to see his or herself reflected in the story of the Founding Fathers.</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1250"><img alt="Hamilton and Jefferson" class="alignleft size-full wp-image-252619" data-dcnode-id="1253" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-and-Jefferson.jpg" data-lazy-srcset="https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-and-Jefferson.jpg 800w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-and-Jefferson-215x108.jpg 215w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-and-Jefferson-620x310.jpg 620w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-and-Jefferson-400x200.jpg 400w" height="400" onerror="this.style.display=&quot;none&quot;;" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20400'%3E%3C/svg%3E" width="800"><noscript data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">&lt;img src="https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-and-Jefferson.jpg" alt="Hamilton and Jefferson" width="800" height="400" class="alignleft size-full wp-image-252619" srcset="https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-and-Jefferson.jpg 800w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-and-Jefferson-215x108.jpg 215w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-and-Jefferson-620x310.jpg 620w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-and-Jefferson-400x200.jpg 400w" sizes="(max-width: 800px) 100vw, 800px" onerror='this.style.display="none";'&gt;</span></noscript></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">As the son of Puerto Rican immigrants, Lin-Manuel Miranda undoubtedly understood Alexander Hamilton’s struggle to rise above expectations and prove himself in a new place. Within the musical, Alexander Hamilton’s life is lauded as the ultimate immigrant story, and yet we also witness how no matter how much he thrives, men who fear his power and vision of the future continue to hold his roots against him by taking cheap shots at his heritage. At his boldest Hamilton facetiously declares, “Immigrants: we get the job done.” But on a personal level, the line that is most striking is one of his first— “He looked at me like I was stupid; I’m not stupid.” </span></p><section class="ad-leaderboard-splitter" data-dcnode-id="1240"><div class="ad-leaderboard-splitter-container" data-dcnode-id="1241"><div class="zergnet zergnet-in-article" data-dcnode-id="1242"><div class="zergnet-header-row" data-dcnode-id="1244"><div class="zergnet-header" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Article Continues Below</span></div></div><div data-dcnode-id="1243" id="zergnet-widget-71919"></div></div></div></section><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1238" instrument_node="">That incessant struggle to prove one’s own self-worth is at the heart of the Founding Father narrative, and with </span><em data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Hamilton</span></em><span data-dcnode-id="1235" instrument_node="">’s diverse cast, it becomes a parallel to the struggle that every immigrant goes through as well, especially when living amidst a political climate that still struggles to address the uncomfortable issues surrounding race. </span><em data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Hamilton</span></em><span data-dcnode-id="1232" instrument_node=""> is about taking back the original narrative to universalize it for the kind of America our country has grown into today.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1226"><img alt="Hamilton cast" class="alignleft size-full wp-image-252615" data-dcnode-id="1229" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-cast.jpg" data-lazy-srcset="https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-cast.jpg 800w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-cast-215x108.jpg 215w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-cast-620x310.jpg 620w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-cast-400x200.jpg 400w" height="400" onerror="this.style.display=&quot;none&quot;;" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20400'%3E%3C/svg%3E" width="800"><noscript data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">&lt;img src="https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-cast.jpg" alt="Hamilton cast" width="800" height="400" class="alignleft size-full wp-image-252615" srcset="https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-cast.jpg 800w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-cast-215x108.jpg 215w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-cast-620x310.jpg 620w, https://w7w5t4b3.rocketcdn.me/wp-content/uploads/2015/10/Hamilton-cast-400x200.jpg 400w" sizes="(max-width: 800px) 100vw, 800px" onerror='this.style.display="none";'&gt;</span></noscript></p><span data-dcnode-id="1225" instrument_node="">

        </span></div><div class="comment__content" data-dcnode-id="1101"><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">21st century America is not a country 'built by immigrants'</span></p><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">It's a country where immigrants have come and stolen the cultural heritage created by the tens of millions of white hands who made up both the working and legislative classes before 1965.</span></p><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">So, yeah, whatever boosts your ego. Steal some more. Steal all of history, erase it to make you feel better. It's reprehensible.</span></p><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Of course, the show is produced by a guy raised in a Jewish household. Part of the ongoing Jewish project to eradicate the white people of the world and erase and appropriate their history and heroic creations.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1090"><div class="comment__name clearfix" data-dcnode-id="1094"><img class="comment__avatar" data-dcnode-id="1099" height="32" src="https://c.disquscdn.com/uploads/users/13034/9320/avatar92.jpg?1526393507" width="32"/><strong data-dcnode-id="1096"><a data-dcnode-id="1097" href=""><span data-dcnode-id="1098" instrument_node="">Junky Jones</span></a></strong><span data-dcnode-id="1095" instrument_node=""> • 6 years ago
        </span></div><div class="comment__content" data-dcnode-id="1091"><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">I've never heard about this until now.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1078"><div class="comment__name clearfix" data-dcnode-id="1084"><img class="comment__avatar" data-dcnode-id="1089" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="1086"><a data-dcnode-id="1087" href=""><span data-dcnode-id="1088" instrument_node="">Kat</span></a></strong><span data-dcnode-id="1085" instrument_node=""> • 6 years ago
        </span></div><div class="comment__content" data-dcnode-id="1079"><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">I saw Hamilton for the first time in August, and now that I've had a changed to listen to the cast album on repeat over the past few weeks, I'm excitedly looking forward to seeing it again this Friday.</span></p><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">I've been a huge musical theatre fan for most of my life, and Hamilton has quickly become my favorite show. It's made me see the founding fathers as real people with dreams and flaws. I really identify with Hamilton's work ethic and his ability to work his way up through the bottom through hard work ("Why do you write like you're running out of time?"). I can relate to that.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1068"><div class="comment__name clearfix" data-dcnode-id="1072"><img class="comment__avatar" data-dcnode-id="1077" height="32" src="https://c.disquscdn.com/uploads/users/3294/3865/avatar92.jpg?1538097531" width="32"/><strong data-dcnode-id="1074"><a data-dcnode-id="1075" href=""><span data-dcnode-id="1076" instrument_node="">Samma</span></a></strong><span data-dcnode-id="1073" instrument_node=""> • 6 years ago
        </span></div><div class="comment__content" data-dcnode-id="1069"><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">I am extremely jealous of you right now. I'm dying to see this show.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1058"><div class="comment__name clearfix" data-dcnode-id="1062"><img class="comment__avatar" data-dcnode-id="1067" height="32" src="https://c.disquscdn.com/uploads/users/22666/238/avatar92.jpg?1495120890" width="32"/><strong data-dcnode-id="1064"><a data-dcnode-id="1065" href=""><span data-dcnode-id="1066" instrument_node="">Kade Greenburg</span></a></strong><span data-dcnode-id="1063" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="1059"><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">I understand wanting to accommodate different cultures and races into a play, but why Hamilton? This is grossly inaccurate...there would be no diversity it would be all white people! Take your diversity elsewhere.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="1048"><div class="comment__name clearfix" data-dcnode-id="1052"><img class="comment__avatar" data-dcnode-id="1057" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="1054"><a data-dcnode-id="1055" href=""><span data-dcnode-id="1056" instrument_node="">Jack</span></a></strong><span data-dcnode-id="1053" instrument_node=""> • 5 years ago
