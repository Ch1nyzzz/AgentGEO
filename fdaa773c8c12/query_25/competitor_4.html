</span><h2 data-dcnode-id="4286" id="section---WhatWasTheTariffOf1816"><span data-dcnode-id="4287" instrument_node=""> What Was the Tariff of 1816?</span></h2><p data-dcnode-id="4278"><span data-dcnode-id="4285" instrument_node="">The </span><b data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">Tariff of 1816</span></b><span data-dcnode-id="4282" instrument_node=""> was the first high tariff approved by Congress in order to move the country towards protectionism. </span><b data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">Protectionism</span></b><span data-dcnode-id="4279" instrument_node=""> is an economic strategy in which foreign goods are taxed at high rates in order to encourage citizens to purchase locally made goods. For countries like Great Britain who could produce cloth more efficiently than American textile factories in the North, they could sell their cloth in the United States for a cheaper price than the American-made cloth. </span></p><p data-dcnode-id="4276"><span data-dcnode-id="4277" instrument_node="">The Tariff of 1816 placed a high import tax on foreign cloth in order to make Britsh cloth more expensive,which helped the struggling U.S. clothing manufacturers. While this was used to help American industry, it was only intended to last a few years. </span></p><span data-dcnode-id="4275" instrument_node="">
</span></article><span data-dcnode-id="4273" instrument_node="">

</span><article class="" data-dcnode-id="3559" id="seo-transcript-container-2"><span data-dcnode-id="3836" instrument_node="">
</span><div class="transcript wikiContent" data-dcnode-id="3693" id="transcriptMain" ng-non-bindable=""><span data-dcnode-id="3835" instrument_node="">
</span><div class="faded-content" data-dcnode-id="3711"><span data-dcnode-id="3834" instrument_node="">
</span><h2 data-dcnode-id="3832" id="section---TheProtectiveTariffOf1816BackgroundAndContext"><span data-dcnode-id="3833" instrument_node=""> The Protective Tariff of 1816: Background and Context</span></h2><p data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">The Protective Tariff of 1816 was a tariff designed to help the country through a difficult period. After having gained independence from Great Britain in 1781, the United States began to rely on tariff income as the main source of federal revenue. This was done in order to minimize the amount of taxes that had to be placed on American citizens; so the federal government instead relied on taxing foreign countries through trade. This created issues, especially as the United States became entangled in European conflict. This ultimately harmed American industry and began a process of protectionism which had long-term ramifications. </span></p><p data-dcnode-id="3829"></p><span data-dcnode-id="3828" instrument_node="">
</span><span data-dcnode-id="3822" instrument_node="">
</span><span data-dcnode-id="3821" instrument_node="">
</span><span data-dcnode-id="3820" instrument_node="">
</span><span data-dcnode-id="3817" instrument_node="">
</span><span data-dcnode-id="3815" instrument_node="">
</span><span data-dcnode-id="3813" instrument_node="">
</span><table border="0" class="imageplugin" data-dcnode-id="3812"><caption align="bottom" data-dcnode-id="3823"><span data-dcnode-id="3827" instrument_node="">
</span><p data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">Textile Factories were rapidly being established in New England.</span></p><span data-dcnode-id="3824" instrument_node="">
</span></caption><tbody data-dcnode-id="3814"><tr data-dcnode-id="3816"><td data-dcnode-id="3818"><img alt="" data-dcnode-id="3819" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fast.wistia.com/cimages/multimages/16/lowell6949524561958969249.png&amp;raw"></td></tr></tbody></table><p data-dcnode-id="3811"></p><h3 data-dcnode-id="3809" id="section---TheDevelopmentOfDomesticIndustry"><span data-dcnode-id="3810" instrument_node=""> The Development of Domestic Industry</span></h3><p data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">In the early 1800s, the United States was just beginning the Industrial Revolution. Great Britain had already been shipping cotton from India to their textile mills and became the world's main supplier of cloth. This is the first industry to be industrialized because cloth took an incredibly long amount of time to create by hand, making it one of the most profitable things to make with machines. As a part of Great Britain in the 1700s, the thirteen colonies had begun this process of industrialization. However, by the early 1800s United States manufacturing was not nearly as efficient. </span></p><p data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">In the early 1800s, the United States became involved in tensions between the French and British as they both tried to stop the U.S. from trading with the other. Because U.S. manufacturing had not developed as fast as Americans hoped, the country relied on imports from these two countries to supply its goods. However, once the United States and Great Britain went to war in the War of 1812 over this issue, it meant that the United States was completely cut off from trade, since the British were blockading American ports. This forced U.S. manufacturing to progress much faster, since the country was now forced to produce its own goods. </span></p><h3 data-dcnode-id="3803" id="section---PriorTariffs"><span data-dcnode-id="3804" instrument_node=""> Prior Tariffs</span></h3><p data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">The first tariff of the United States was established by Congress in 1789. This placed a base fee on all goods coming into the country. The government's goal was to encourage domestic manufacturing and continue the trend of industrialization. Other tariff acts were passed between 1789 and 1816, but they were never very high. Since the United States relied on tariffs for income, it could not afford to discourage too much foreign trade. </span></p><h2 data-dcnode-id="3799" id="section---TheHistoryOfTheProtectiveTariffOf1816"><span data-dcnode-id="3800" instrument_node=""> The History of the Protective Tariff of 1816</span></h2><p data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">The War of 1812 ended in 1815 and ushered in the return of trade with Europe. However, the country needed another source of revenue because the budget was too large to be supported without adding another tax somewhere in the economy. While Americans themselves could be taxed, this was politically unpopular because the citizens had fought so hard to fight taxes only a few decades before. </span></p><h3 data-dcnode-id="3795" id="section---WhatWasThePurposeOfTheTariffOf1816"><span data-dcnode-id="3796" instrument_node=""> What Was the Purpose of the Tariff of 1816?</span></h3><p data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">With domestic production having increased so much during the War of 1812, and with Congress in need of another source of revenue, a protectionist tariff was developed which put a high tax on all textile goods imported into the United States. This tariff targeted the British, who were sending their cheap cloth and undercutting American manufacturers. It also placed a tariff on goods like iron and leather, which were typically imported by both the British and French. This tariff was only intended to be a temporary rise in tariffs which would go back down in 1820. </span></p><h3 data-dcnode-id="3791" id="section---ThePassingOfTheTariffOf1816"><span data-dcnode-id="3792" instrument_node=""> The Passing of the Tariff of 1816</span></h3><p data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node="">The Tariff of 1816 was primarily supported by industrialist northerners who thought factories were the future of the country. They were willing to pay more for American-made goods in order to encourage U.S. manufacturing. However, the country was still primarily farmers who did not want to pay more for goods, even if it meant that the American industry would be getting the money. </span></p><p data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">Even though it was going to make some goods more expensive, many southern politicians supported it. Those who did not support this tariff were called free traders and supported minimal tariffs to encourage international trade. However, after having just won the War of 1812, many southerners were willing to support this legislation because they thought it would be good for the future of the country and help the country prepare in case another war with the British broke out. On April 27, 1816, this tariff was approved as part of President James Madison's plan to help develop American industry. </span></p><p data-dcnode-id="3786"></p><span data-dcnode-id="3785" instrument_node="">
</span><span data-dcnode-id="3779" instrument_node="">
</span><span data-dcnode-id="3778" instrument_node="">
</span><span data-dcnode-id="3777" instrument_node="">
</span><span data-dcnode-id="3774" instrument_node="">
</span><span data-dcnode-id="3772" instrument_node="">
</span><span data-dcnode-id="3770" instrument_node="">
</span><table border="0" class="imageplugin" data-dcnode-id="3769"><caption align="bottom" data-dcnode-id="3780"><span data-dcnode-id="3784" instrument_node="">
</span><p data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">James Madison wrote the U.S. Constitution and entered the country into the War of 1812 with the British.</span></p><span data-dcnode-id="3781" instrument_node="">
</span></caption><tbody data-dcnode-id="3771"><tr data-dcnode-id="3773"><td data-dcnode-id="3775"><img alt="" data-dcnode-id="3776" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fast.wistia.com/cimages/multimages/16/394px-james_madison7467880047395693364.jpg&amp;raw"></td></tr></tbody></table><p data-dcnode-id="3768"></p><h3 data-dcnode-id="3766" id="section---TheMainProvisionsOfTheTariffOf1816"><span data-dcnode-id="3767" instrument_node=""> The Main Provisions of the Tariff of 1816</span></h3><p data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">The primary provision of the Tariff of 1816 was that it placed a 25% tariff on all cotton and wool products imported into the United States. Even though the British could make textiles more efficiently, this tariff made American textiles much cheaper than any others sold inside the country. It also placed a 25% tariff on all war materials such as iron and leather; because when the War of 1812 was declared the country was not prepared for the production needs. Many wanted to make sure this never happened again. </span></p><span data-dcnode-id="3763" instrument_node="">
</span><div class="hidden" data-dcnode-id="3713" ng-non-bindable=""><h2 data-dcnode-id="3761" id="section---TheImpactOfTheTariffOf1816"><span data-dcnode-id="3762" instrument_node=""> The Impact of the Tariff of 1816</span></h2><p data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">In the 40 years since the colonists had declared independence, several things had changed in the country. Most notable, the cotton gin was invented, which made cotton production in the American South one of the most productive cotton-producing regions in the world. With this invention and American industrialization, James Madison hoped that the United States could soon become economically independent from the rest of the world. After seeing how much the U.S. relied on foreign imports, American politicians saw the economy had to change. </span></p><h3 data-dcnode-id="3757" id="section---TheTariffOf1816AndDiplomaticTensions"><span data-dcnode-id="3758" instrument_node=""> The Tariff of 1816 and Diplomatic Tensions</span></h3><p data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">Once passed, the Tariff of 1816 did help to encourage industrialization in the economy. However, southern politicians realized high tariffs were not in their interest. The South depended on free trade in order to profit off of cotton production made more efficient by the cotton gin. This cotton was primarily sold to the British, and southern states came to rely on the exportation of cotton to fuel their economies. </span></p><p data-dcnode-id="3754"></p><span data-dcnode-id="3753" instrument_node="">
</span><span data-dcnode-id="3747" instrument_node="">
</span><span data-dcnode-id="3746" instrument_node="">
</span><span data-dcnode-id="3745" instrument_node="">
</span><span data-dcnode-id="3742" instrument_node="">
</span><span data-dcnode-id="3740" instrument_node="">
</span><span data-dcnode-id="3738" instrument_node="">
</span><table border="0" class="imageplugin" data-dcnode-id="3737"><caption align="bottom" data-dcnode-id="3748"><span data-dcnode-id="3752" instrument_node="">
</span><p data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">This tariff would have harmed the economy if the British restarted war with the country due to this, especially because the U.S. did not have a large army.</span></p><span data-dcnode-id="3749" instrument_node="">
</span></caption><tbody data-dcnode-id="3739"><tr data-dcnode-id="3741"><td data-dcnode-id="3743"><img alt="" data-dcnode-id="3744" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fast.wistia.com/cimages/multimages/16/640px-hms_endymion_yaws_to_rake_uss_president6199516637291629922.jpg&amp;raw"></td></tr></tbody></table><p data-dcnode-id="3736"></p><p data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">This tariff also raised diplomatic tensions with European countries because the United States was a major market for European nations to sell their goods. This encouraged European countries to establish similar tariff rates on goods coming out of the United States. This made it more difficult for southern states to profit from cotton since the British, and Europe in general, were primary buyers of southern cotton. For these reasons, southern states began to oppose protectionist policies in order to protect their own economic interests, starting with their opposition to the Tariff of 1820. </span></p><h3 data-dcnode-id="3732" id="section---TheTariffOf1816AndGovernmentBudgetSurpluses"><span data-dcnode-id="3733" instrument_node=""> The Tariff of 1816 and Government Budget Surpluses</span></h3><p data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">In the short term, the Tariff of 1816 resulted in a surplus which solved the budget issue coming out of the War of 1812. This was because European countries initially continued sending goods to the United States and paying the tariff because Americans were a very large market, regardless of the tariff rate. This encouraged the U.S. government to continue this policy because it proved to be so profitable. Once the tariff ended in 1820, politicians voted to reinstate it. As a result, high tariff rates became integral to the U.S. economy. </span></p><h2 data-dcnode-id="3728" id="section---TheSignificanceOfTheProtectiveTariffOf1816"><span data-dcnode-id="3729" instrument_node=""> The Significance of the Protective Tariff of 1816</span></h2><p data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">With the success of the Tariff of 1816 for northern manufacturing, the United States continued this reliance on tariffs into the 20th century. However, after the Civil War, managing the country was becoming so expensive that additional taxes on citizens began to be implemented. Eventually, with the passage of the 16th Amendment which made income taxes legal, the United States began to rely more and more on direct taxing of individuals. The 1920s was the final period in American history in which tariffs were kept at high rates. The U.S. government during this period practiced protectionism as a response to WWI and the American desire to stay out of European conflict. However, once the Great Depression occurred and countries began to rely on international trade more and more, countries began to form free trade agreements, which lowered tariffs between most countries to very small percentages (around 2-3 percent). </span></p><p data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">Because the successor of this tariff encouraged further protectionism, this tariff also help to create division between the North and the South. Because both regions were affected differently by high tariffs, protectionism continued to raise tensions between the regions until the outbreak of the Civil War. </span></p><h2 data-dcnode-id="3722" id="section---LessonSummary"><span data-dcnode-id="3723" instrument_node=""> Lesson Summary</span></h2><p data-dcnode-id="3714"><span data-dcnode-id="3721" instrument_node="">The </span><b data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">Tariff of 1816</span></b><span data-dcnode-id="3718" instrument_node=""> was designed to protect American industry. This is called </span><b data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">protectionism</span></b><span data-dcnode-id="3715" instrument_node=""> and was opposed by some in the South called free-traders. While industry was growing in the North, the South was still mainly agriculture-based and needed to export its cash crops to make a profit. Even though it would make goods more expensive, enough southerners supported it to approve it in 1816. After having won the War of 1812, many people thought growth in American manufacturing could help it prepare for war with the British if it ever came again. However, this was not meant to be a permanent change and was only set to last until 1820. This tariff targeted wool and cotton products in order to help struggling American textile factories, which could not sell goods as cheaply as the British. However, this 25% tariff rate was so profitable in the short term that high tariffs like this were renewed several times into the 1920s until the U.S. moved more towards a free trade system.</span></p></div><span data-dcnode-id="3712" instrument_node="">
</span></div><span data-dcnode-id="3710" instrument_node="">
</span><div class="article-cutoff-div" data-dcnode-id="3695"><span data-dcnode-id="3709" instrument_node="">

</span><p data-dcnode-id="3699"><span data-dcnode-id="3707" instrument_node="">

</span></div><span data-dcnode-id="3696" instrument_node="">

</span><h4 data-dcnode-id="3681" itemprop="name"><span data-dcnode-id="3682" instrument_node="">What was the Tariff of 1816 and what did it provide?</span></h4><span data-dcnode-id="3680" instrument_node="">
</span><div data-dcnode-id="3672" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="3679" instrument_node="">
</span><div data-dcnode-id="3674" itemprop="text"><span data-dcnode-id="3678" instrument_node="">
</span><p data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">The Tariff of 1816 was a 25% tax on all wool and cotton goods imported into the United States from foreign nations. This provided the U.S. government with a budget surplus and helped the country continue the process of industrialization.</span></p><span data-dcnode-id="3675" instrument_node="">
</span></div><span data-dcnode-id="3673" instrument_node="">
</span></div><span data-dcnode-id="3671" instrument_node="">
</span></div><span data-dcnode-id="3669" instrument_node="">
</span><div data-dcnode-id="3655" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="3668" instrument_node="">
</span><h4 data-dcnode-id="3666" itemprop="name"><span data-dcnode-id="3667" instrument_node="">How did the Tariff of 1816 hurt the South?</span></h4><span data-dcnode-id="3665" instrument_node="">
</span><div data-dcnode-id="3657" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="3664" instrument_node="">
</span><div data-dcnode-id="3659" itemprop="text"><span data-dcnode-id="3663" instrument_node="">
</span><p data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">The Tariff of 1816 hurt the South because it made goods more expensive by eliminating all competitors to American-made goods. It also encouraged tariff retaliation from the British, which hurt the South since Great Britain was the main buyer of southern cotton. This tariff battle hurt the profitability of southern cotton production.</span></p><span data-dcnode-id="3660" instrument_node="">
</span></div><span data-dcnode-id="3658" instrument_node="">
</span></div><span data-dcnode-id="3656" instrument_node="">
</span></div><span data-dcnode-id="3654" instrument_node="">
</span><div data-dcnode-id="3640" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="3653" instrument_node="">
</span><h4 data-dcnode-id="3651" itemprop="name"><span data-dcnode-id="3652" instrument_node="">Who started the Tariff of 1816?</span></h4><span data-dcnode-id="3650" instrument_node="">
</span><div data-dcnode-id="3642" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="3649" instrument_node="">
</span><div data-dcnode-id="3644" itemprop="text"><span data-dcnode-id="3648" instrument_node="">
</span><p data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">The Tariff of 1816 was part of James Madison's plan to help make the United States self-sufficient. After going through the War of 1812, the U.S. jumpstarted its industrialization. However, this tariff was designed to continue this trend and potentially prepare the country for war with the British or another European power.</span></p><span data-dcnode-id="3645" instrument_node="">
</span></div><span data-dcnode-id="3643" instrument_node="">
