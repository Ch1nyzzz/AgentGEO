</span><div class="translations_title" data-dcnode-id="1794"><span data-dcnode-id="1797" instrument_node="">Available in other languages: </span><a class="translation_link" data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/trans/fr/1-16022/excalibur/" rel="alternate"><span data-dcnode-id="1796" instrument_node="">French</span></a></div><span data-dcnode-id="1793" instrument_node="">

</span><div class="body" data-dcnode-id="1286"><span data-dcnode-id="1767" instrument_node="">
</span><article data-dcnode-id="1325"><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1745"><a data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Excalibur/"><span data-dcnode-id="1765" instrument_node="">Excalibur</span></a><span data-dcnode-id="1763" instrument_node=""> is the sword of </span><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/King_Arthur/"><span data-dcnode-id="1762" instrument_node="">King Arthur</span></a><span data-dcnode-id="1760" instrument_node=""> in Sir </span><a data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Thomas_Malory/"><span data-dcnode-id="1759" instrument_node="">Thomas Malory</span></a><span data-dcnode-id="1757" instrument_node="">'s iconic work </span><em data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Le Morte D'Arthur </span></em><span data-dcnode-id="1754" instrument_node="">published in in 1485 CE. The sword was originally introduced in Geoffrey of Monmouth's </span><em data-dcnode-id="1750"><span data-dcnode-id="1753" instrument_node="">History of the Kings of </span><a data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/britain/"><span data-dcnode-id="1752" instrument_node="">Britain</span></a></em><span data-dcnode-id="1749" instrument_node=""> (1136 CE) as </span><em data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Caliburnus</span></em><span data-dcnode-id="1746" instrument_node=""> (or Caliburn) and further developed by later writers before Malory immortalized it in his work. The sword, from its first appearance, is a powerful weapon in the hands of a skilled warrior and retains that reputation in every story which features it.</span></p><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1743" instrument_node="">As with many other magical or powerful swords in legend or </span><a data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/mythology/"><span data-dcnode-id="1742" instrument_node="">mythology</span></a><span data-dcnode-id="1740" instrument_node="">, it is identified with a single hero and should not be allowed to fall into the hands of an enemy owing to its inherent power. In the case of Excalibur, when Arthur is dying of his wounds following his </span><a data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/disambiguation/battle/"><span data-dcnode-id="1739" instrument_node="">battle</span></a><span data-dcnode-id="1737" instrument_node=""> with Mordred, it must be returned to its source, the Lady of the Lake, rather than being entrusted to whichever knight - no matter how noble - might succeed Arthur as king.</span></p><div class="ad_Mobile_Intext ahe-ad" data-dcnode-id="1725"><span data-dcnode-id="1735" instrument_node="">
</span><a class="ad_membership_notice" data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/membership/%3Futm_source%3Dahe%26utm_medium%3Dremove-ads-button%26utm_campaign%3Dmembership" rel="nofollow"><span data-dcnode-id="1734" instrument_node="">Remove Ads</span></a><span data-dcnode-id="1732" instrument_node="">
</span><h4 data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Advertisement</span></h4><span data-dcnode-id="1729" instrument_node="">
</span><div class="adcontainer innerwrapper" data-dcnode-id="1727" id="div-adcontainer-AHE_Mobile_Intext_1"><span data-dcnode-id="1728" instrument_node="">
</span></div><span data-dcnode-id="1726" instrument_node="">
</span></div><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1701"><span data-dcnode-id="1723" instrument_node="">This rule does not always hold true in every version of the legend, however. In the poem </span><em data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Conte du Graal</span></em><span data-dcnode-id="1720" instrument_node="">, Provencal poet </span><a data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Chretien_de_Troyes/"><span data-dcnode-id="1719" instrument_node="">Chretien de Troyes</span></a><span data-dcnode-id="1717" instrument_node=""> (c. 1130 - c. 1190 CE) makes Excalibur (called </span><em class="gr-progress" data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Escalibor</span></em><span data-dcnode-id="1714" instrument_node="">) Sir Gawain's weapon. In the </span><em data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Vulgate Cycle</span></em><span data-dcnode-id="1711" instrument_node=""> (1215-1235 CE) and the </span><em data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Post-Vulgate Cycle</span></em><span data-dcnode-id="1708" instrument_node=""> (c. 1240-1250 CE) Arthur presents Gawain with Excalibur who then loans it to </span><a data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Lancelot/"><span data-dcnode-id="1707" instrument_node="">Lancelot</span></a><span data-dcnode-id="1705" instrument_node=""> for his defense of </span><a data-dcnode-id="1703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Guinevere/"><span data-dcnode-id="1704" instrument_node="">Guinevere</span></a><span data-dcnode-id="1702" instrument_node="">. Gawain then returns the sword to Arthur for his final battle with Mordred and, afterwards, it must be returned to the Lady of the Lake.</span></p><span data-dcnode-id="1700" instrument_node="">
</span><h3 data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Swords in Mythology</span></h3><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1696" instrument_node="">The concept of a "sword of power" did not originate with the Arthurian legend. </span><a data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Greek_Mythology/"><span data-dcnode-id="1695" instrument_node="">Greek mythology</span></a><span data-dcnode-id="1693" instrument_node=""> mentions a number of magical swords and, especially, the </span><em data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">harpe</span></em><em data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node=""> </span></em><span data-dcnode-id="1688" instrument_node="">used by the </span><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Titan/"><span data-dcnode-id="1687" instrument_node="">titan</span></a><span data-dcnode-id="1685" instrument_node=""> Cronos to overthrow his father Uranus. </span><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Julius_Caesar/"><span data-dcnode-id="1684" instrument_node="">Julius Caesar</span></a><span data-dcnode-id="1682" instrument_node="">'s sword, the </span><em data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Crocea Mors</span></em><span data-dcnode-id="1679" instrument_node=""> was supposed to have supernatural powers as was the Sword of </span><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Mars/"><span data-dcnode-id="1678" instrument_node="">Mars</span></a><span data-dcnode-id="1676" instrument_node=""> wielded by </span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Attila_the_Hun/"><span data-dcnode-id="1675" instrument_node="">Attila the Hun</span></a><span data-dcnode-id="1673" instrument_node="">. The </span><em data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Gianjiang</span></em><span data-dcnode-id="1670" instrument_node=""> and </span><em data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Moye </span></em><span data-dcnode-id="1667" instrument_node="">swords of the Chinese Spring and Autumn Period are also supposed to have been imbued with great power by their makers.</span></p><div class="ad_Mobile_Intext ahe-ad" data-dcnode-id="1655"><span data-dcnode-id="1665" instrument_node="">
</span><a class="ad_membership_notice" data-dcnode-id="1663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/membership/%3Futm_source%3Dahe%26utm_medium%3Dremove-ads-button%26utm_campaign%3Dmembership" rel="nofollow"><span data-dcnode-id="1664" instrument_node="">Remove Ads</span></a><span data-dcnode-id="1662" instrument_node="">
</span><h4 data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Advertisement</span></h4><span data-dcnode-id="1659" instrument_node="">
</span><div class="adcontainer innerwrapper" data-dcnode-id="1657" id="div-adcontainer-AHE_Mobile_Intext_2"><span data-dcnode-id="1658" instrument_node="">
</span></div><span data-dcnode-id="1656" instrument_node="">
</span></div><span data-dcnode-id="1654" instrument_node="">
</span><div class="big_quote" data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Excalibur is frequently associated with another Arthurian motif, the Sword in the Stone, but these are actually two different swords.</span></div><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1650" instrument_node="">In the biblical Book of Genesis, after the Fall of Man, God sets his cherubim to stand watch to the east of the </span><a data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Garden_of_Eden/"><span data-dcnode-id="1649" instrument_node="">Garden of Eden</span></a><span data-dcnode-id="1647" instrument_node=""> along with a flaming sword "which turned every way" to prevent Adam and Eve from returning. The </span><a data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Shinto/"><span data-dcnode-id="1646" instrument_node="">Shinto</span></a><span data-dcnode-id="1644" instrument_node=""> storm god </span><a data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Susanoo/"><span data-dcnode-id="1643" instrument_node="">Susanoo</span></a><span data-dcnode-id="1641" instrument_node=""> finds a magical sword in the tail of a dragon and this eventually became part of the Japanese imperial regalia. </span><a data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Norse_Mythology/"><span data-dcnode-id="1640" instrument_node="">Norse mythology</span></a><span data-dcnode-id="1638" instrument_node=""> frequently makes use of magic swords, such as Gram, the weapon of Sigmund and his son Sigurd and the </span><a data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/celt/"><span data-dcnode-id="1637" instrument_node="">Celts</span></a><span data-dcnode-id="1635" instrument_node=""> wove a number of magical swords into their tales, including the </span><em data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Claiomh Solais </span></em><span data-dcnode-id="1632" instrument_node="">(</span><em data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">kleeve</span></em><em data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node=""> </span></em><em data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">sollish</span></em><span data-dcnode-id="1625" instrument_node="">), the Sword of Light which triumphs over darkness. The 11th century CE Spanish hero El Cid was claimed to have two magic swords and the 8th century CE French champion Roland wielded his famous blade Durendal and fell with it defending the Pass of Roncevaux in the epic Song of Roland.</span></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Although there are these precedents for earlier magical or supernaturally powerful swords, Excalibur is arguably the most famous. It is frequently associated with another Arthurian motif, the Sword in the Stone, but these are actually two different swords. In some versions of the legend, the Sword in the Stone is broken in Arthur's first battle and is replaced by Excalibur while, in others, the Sword in the Stone substantiates Arthur's right to rule (as only he can draw the blade from the rock) as the son and successor of Uther Pendragon while Excalibur serves as a symbol of his power as king.</span></p><div class="grey_box" data-dcnode-id="1603" id="mobilenewsletter"><span data-dcnode-id="1620" instrument_node="">

</span><h3 data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">THE FAMOUS NAME &amp; ORIGIN</span></h3><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1598" instrument_node="">The name Excalibur may originate in the work </span><em data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Culhwch and Olwen </span></em><span data-dcnode-id="1595" instrument_node="">from the </span><em data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Mabinogion</span></em><span data-dcnode-id="1592" instrument_node="">, a collection of Welsh legends, if one accepts a date of composition as c. 1100 CE. The </span><em data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Mabinogion </span></em><span data-dcnode-id="1589" instrument_node="">only exists in manuscripts from the 13th and 14th centuries, however, and some scholars date it at 1200 CE. In this tale Arthur's sword is called Caledvwich which derives from the Latin </span><em data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">chalybs</span></em><span data-dcnode-id="1586" instrument_node=""> ("steel" or "iron") and means "hard cleft". Caledvwich as the name for a sword of power most likely comes from the mythological Irish blade </span><em data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Caladbolg</span></em><span data-dcnode-id="1583" instrument_node=""> (which means "voracious") carried by the king Fergus mac Roich in the Ulster Cycle of Irish mythology.</span></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1580"></p><figure class="image_intext_wrapper" data-dcnode-id="1560" rel="6643"><span data-dcnode-id="1579" instrument_node="">
</span><a data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/image/6643/king-arthur--the-lady-of-the-lake/" title="King Arthur &amp; the Lady of the Lake"><span data-dcnode-id="1578" instrument_node="">
</span><picture data-dcnode-id="1570"><span data-dcnode-id="1577" instrument_node=""> </span><source data-dcnode-id="1576" srcset="/img/r/p/500x600/6643.jpg.webp?v=1631622602" type="image/webp"><span data-dcnode-id="1575" instrument_node=""> </span><source data-dcnode-id="1574" srcset="/img/r/p/500x600/6643.jpg?v=1631622602" type="image/jpeg"><span data-dcnode-id="1573" instrument_node="">
</span><img alt="King Arthur &amp; the Lady of the Lake" class="in_text_image" data-dcnode-id="1572" height="600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/img/r/p/500x600/6643.jpg%3Fv%3D1631622602&amp;raw" width="398"><span data-dcnode-id="1571" instrument_node="">
</span></picture><span data-dcnode-id="1569" instrument_node="">
</span><figcaption class="image_caption" data-dcnode-id="1564"><div class="figtitle" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">King Arthur &amp; the Lady of the Lake</span></div><div class="figauthor" data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Walter Crane (Public Domain)</span></div></figcaption><span data-dcnode-id="1563" instrument_node="">
</span></a><span data-dcnode-id="1561" instrument_node="">
</span></figure><p data-dcnode-id="1559"></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1557" instrument_node="">Geoffrey of Monmouth calls Arthur's sword </span><em data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Caliburnus</span></em><span data-dcnode-id="1554" instrument_node=""> in Medieval Latin which is a more direct use of the Latin </span><em data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">chalybs</span></em><span data-dcnode-id="1551" instrument_node=""> as "steel" but denotes a particularly hard or effective blade. Essentially, by the time Geoffrey was </span><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/writing/"><span data-dcnode-id="1550" instrument_node="">writing</span></a><span data-dcnode-id="1548" instrument_node="">, the name of Arthur's blade would be understood as "famous sword" or "great sword" because of the earlier associations of </span><em data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">chalybs</span></em><span data-dcnode-id="1545" instrument_node=""> with mythological weapons.</span></p><div class="ad_Mobile_Intext ahe-ad" data-dcnode-id="1533"><span data-dcnode-id="1543" instrument_node="">
</span><a class="ad_membership_notice" data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/membership/%3Futm_source%3Dahe%26utm_medium%3Dremove-ads-button%26utm_campaign%3Dmembership" rel="nofollow"><span data-dcnode-id="1542" instrument_node="">Remove Ads</span></a><span data-dcnode-id="1540" instrument_node="">
</span><h4 data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Advertisement</span></h4><span data-dcnode-id="1537" instrument_node="">
</span><div class="adcontainer innerwrapper" data-dcnode-id="1535" id="div-adcontainer-AHE_Mobile_Intext_3"><span data-dcnode-id="1536" instrument_node="">
</span></div><span data-dcnode-id="1534" instrument_node="">
</span></div><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1531" instrument_node="">The French poet Wace (c. 1110-1174 CE) translated Geoffrey's work into Old French vernacular and re-named the sword</span><em data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node=""> </span></em><em data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Chaliburn</span></em><span data-dcnode-id="1526" instrument_node="">. Chretien de Troyes changed the name to </span><em data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Escalibor</span></em><span data-dcnode-id="1523" instrument_node="">. When the Arthurian legend was translated into English, </span><em data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Chaliburn</span></em><span data-dcnode-id="1520" instrument_node="">/</span><em data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Escalibor</span></em><span data-dcnode-id="1517" instrument_node=""> became Excalibur. Malory, drawing on the </span><em data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Vulgate Cycle</span></em><span data-dcnode-id="1514" instrument_node="">, calls Arthur's sword </span><em data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Excalibur</span></em><span data-dcnode-id="1511" instrument_node=""> shortly after Arthur has found and drawn the Sword in the Stone, linking the name with that weapon, and this association has stuck. Later, however, once this first sword is broken in battle, it is made clear that Arthur must receive the "true Excalibur" from a mystical source, the Lady of the Lake, and </span><a data-dcnode-id="1509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Merlin/"><span data-dcnode-id="1510" instrument_node="">Merlin</span></a><span data-dcnode-id="1508" instrument_node=""> (who seems to be the magical force behind both swords) guides him to the place where it will be offered to him. No explanation is given as to the meaning, power, or origin of the sword and, in fact, Malory focuses more attention on the scabbard.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1505" instrument_node="">Whether presented as the Sword in the Stone or given by the Lady of the Lake, it is clear Excalibur comes from another realm. This motif follows from an established paradigm in </span><a data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/celt/"><span data-dcnode-id="1504" instrument_node="">Celtic</span></a><span data-dcnode-id="1502" instrument_node=""> lore of magical weapons, such as the spear of Cuchulain or the sword of Fergus mac Roich, having been forged in a mystical realm. The same device, however, is used in legends from many cultures around the world. The great swords of </span><em data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Gianjiang</span></em><span data-dcnode-id="1499" instrument_node=""> and </span><em data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Moye</span></em><span data-dcnode-id="1496" instrument_node="">, for example, also have mystical origins. In the case of Excalibur, the sword develops from a mighty weapon to a symbol of divinely inspired justice and redemption. When the weapon is first mentioned in Geoffrey of Monmouth's work, no magical attributes are ascribed to it.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><div class="youtube-embed-wrapper" data-dcnode-id="1491"><div class="youtube-embed-container" data-dcnode-id="1492"><iframe allowfullscreen="" data-dcnode-id="1493" data-src="https://www.youtube.com/embed/P4USmGPfK2M?autoplay=0" frameborder="0" title="King Arthur: This History and Story of King Arthur and His Knights of the Round Table"></iframe></div></div><span data-dcnode-id="1490" instrument_node="">
</span><h3 data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">THE POWER OF THE SWORD</span></h3><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1486" instrument_node="">In Book IX of </span><em data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">History of the Kings of Britain</span></em><span data-dcnode-id="1483" instrument_node="">, Caliburn is first referenced as "the best of swords, that was forged within the isle of Avallon" and is listed by Geoffrey along with Arthur's other gear as an item of particular importance. As Arthur is preparing to meet the </span><a data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Saxons/"><span data-dcnode-id="1482" instrument_node="">Saxons</span></a><span data-dcnode-id="1480" instrument_node=""> in battle at Bath, Geoffrey writes:</span></p><div class="ad_Mobile_Intext ahe-ad" data-dcnode-id="1468"><span data-dcnode-id="1478" instrument_node="">
</span><a class="ad_membership_notice" data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/membership/%3Futm_source%3Dahe%26utm_medium%3Dremove-ads-button%26utm_campaign%3Dmembership" rel="nofollow"><span data-dcnode-id="1477" instrument_node="">Remove Ads</span></a><span data-dcnode-id="1475" instrument_node="">
</span><h4 data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Advertisement</span></h4><span data-dcnode-id="1472" instrument_node="">
</span><div class="adcontainer innerwrapper" data-dcnode-id="1470" id="div-adcontainer-AHE_Mobile_Intext_4"><span data-dcnode-id="1471" instrument_node="">
</span></div><span data-dcnode-id="1469" instrument_node="">
</span></div><span data-dcnode-id="1467" instrument_node="">
</span><blockquote data-dcnode-id="1459"><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1465" instrument_node="">He did set upon his head a helm of </span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/gold/"><span data-dcnode-id="1464" instrument_node="">gold</span></a><span data-dcnode-id="1462" instrument_node=""> graven with the semblance of a dragon. Upon his shoulders, moreover, did he bear the shield that was named Pridwen, wherein, upon the inner side, was painted the image of holy Mary, Mother of God, that many a time and oft did call her back unto his memory. Girt was he also with Caliburn, best of swords, that was forged within the Isle of Avallon; and the lance that did grace his right hand was called by the name Ron, a tall lance and stout, full meet to do slaughter withal. (188)</span></p><span data-dcnode-id="1460" instrument_node="">
</span></blockquote><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">The Saxons have broken trust with Arthur after they had sworn a treaty of peace and so the battle is a matter of personal honor as well as a necessary defense of his realm. Geoffrey describes a hard-fought battle in which the Saxons hold the high ground and inflict heavy casualties on the Britons under Arthur. The Saxons continue to hold their position until the day is almost gone and then Arthur has finally had enough and leads a final charge on their position himself. Geoffrey writes:</span></p><span data-dcnode-id="1455" instrument_node="">
</span><blockquote data-dcnode-id="1450"><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Arthur waxed wroth at the stubborness of their resistance, and the slowness of his own advance, and drawing forth Caliburn, his sword, crieth aloud in the name of Holy Mary, and thrusteth him forward with a swift onset into the thickest press of the enemy's ranks. Whomsoever he touched, calling upon God, he slew at a single blow, nor did he once slacken in his onslaught until that he had slain four hundred and seventy men single-handed with his sword Caliburn. This, when the Britons beheld, they followed him up in close rank dealing slaughter on every side. (189)</span></p><span data-dcnode-id="1451" instrument_node="">
</span></blockquote><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Excalibur is described in more or less the same way every time it appears in a story. In Malory's work, when Arthur is attacked by King Lot, he is at first beaten until he unleashes the power of his sword:</span></p><span data-dcnode-id="1446" instrument_node="">
</span><blockquote data-dcnode-id="1441"><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Therewith King Lot smote down King Arthur. With that, his four knights rescued him and set him on horseback; then he drew his sword Excalibur, and it was so bright in his enemies' eyes that it gave light like thirty torches. Therewith he put them back and slew many people. (13)</span></p><span data-dcnode-id="1442" instrument_node="">
</span></blockquote><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Arthur confronts Lot early in Malory's version of the legend and it seems as though Excalibur is the same sword as the one Arthur earlier drew from the stone. This has caused confusion between two weapons which are often identified as the same but are not.</span></p><div class="ad_Mobile_Intext ahe-ad" data-dcnode-id="1427"><span data-dcnode-id="1437" instrument_node="">
</span><a class="ad_membership_notice" data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/membership/%3Futm_source%3Dahe%26utm_medium%3Dremove-ads-button%26utm_campaign%3Dmembership" rel="nofollow"><span data-dcnode-id="1436" instrument_node="">Remove Ads</span></a><span data-dcnode-id="1434" instrument_node="">
</span><h4 data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Advertisement</span></h4><span data-dcnode-id="1431" instrument_node="">
</span><div class="adcontainer innerwrapper" data-dcnode-id="1429" id="div-adcontainer-AHE_Mobile_Intext_5"><span data-dcnode-id="1430" instrument_node="">
</span></div><span data-dcnode-id="1428" instrument_node="">
</span></div><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1425"></p><figure class="image_intext_wrapper" data-dcnode-id="1405" rel="6667"><span data-dcnode-id="1424" instrument_node="">
</span><a data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/image/6667/excalibur-from-the-1981-film-excalibur/" title="Excalibur, from the 1981 Film Excalibur"><span data-dcnode-id="1423" instrument_node="">
</span><picture data-dcnode-id="1415"><span data-dcnode-id="1422" instrument_node=""> </span><source data-dcnode-id="1421" srcset="/img/r/p/500x600/6667.jpg.webp?v=1634407204" type="image/webp"><span data-dcnode-id="1420" instrument_node=""> </span><source data-dcnode-id="1419" srcset="/img/r/p/500x600/6667.jpg?v=1634407204" type="image/jpeg"><span data-dcnode-id="1418" instrument_node="">
</span><img alt="Excalibur, from the 1981 Film Excalibur" class="in_text_image" data-dcnode-id="1417" height="600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/img/r/p/500x600/6667.jpg%3Fv%3D1634407204&amp;raw" width="400"><span data-dcnode-id="1416" instrument_node="">
</span></picture><span data-dcnode-id="1414" instrument_node="">
</span><figcaption class="image_caption" data-dcnode-id="1409"><div class="figtitle" data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Excalibur, from the 1981 Film Excalibur</span></div><div class="figauthor" data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Eduardo Otubo (CC BY)</span></div></figcaption><span data-dcnode-id="1408" instrument_node="">
</span></a><span data-dcnode-id="1406" instrument_node="">
</span></figure><p data-dcnode-id="1404"></p><span data-dcnode-id="1403" instrument_node="">
</span><h3 data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">THE SWORD IN THE STONE</span></h3><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1399" instrument_node="">The concept of the Sword in the Stone was added to the Arthurian legend by the French poet Robert de Boron (12th century CE) in his </span><em data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Merlin</span></em><span data-dcnode-id="1396" instrument_node="">. Robert de Boron presents the sword as anchored in an anvil which later writers changed to a stone. The </span><em data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Vulgate Cycle</span></em><span data-dcnode-id="1393" instrument_node=""> of the legend differentiates between the sword that Arthur drew from the stone and Excalibur and this tradition is continued in the Post-Vulgate Cycle and repeated in Malory's work.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Although Arthur's sword is identified as Excalibur early in Malory's version, it becomes clear that it is not the true Excalibur since this sword is broken in Arthur's fight with King Pellinore. Pellinore gets the best of Arthur after his sword breaks and tells him to yield but the young king will not. In order to save both their lives, Merlin puts Pellinore to sleep and then takes Arthur to receive the true Excalibur from the Lady of the Lake. Arthurian scholar Norris J. Lacy writes:</span></p><span data-dcnode-id="1388" instrument_node="">
</span><blockquote data-dcnode-id="1383"><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">In certain texts (and in popular Arthurian lore), Excalibur is also the Sword in the Stone, but such an identification is incompatible with the tradition, found, for example, in the Post-Vulgate Cycle and Malory, whereby the sword is given to Arthur (and finally taken from him) by a hand in the lake. (176)</span></p><span data-dcnode-id="1384" instrument_node="">
</span></blockquote><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Since Excalibur is defined by its power and strength it cannot be the same weapon which is broken in Arthur's encounter with Pellinore. Even so, according to Merlin, it is not Excalibur which is so extraordinary but its scabbard. Merlin asks Arthur, "Which pleases you better, the sword or the scabbard?" and Arthur answers, "The sword pleases me better." Merlin then rebukes him:</span></p><span data-dcnode-id="1379" instrument_node="">
</span><blockquote data-dcnode-id="1374"><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">"Ye are the more unwise," said Merlin, "for the scabbard is worth ten of the sword. While ye have the scabbard upon you, ye shall never lose any blood, be ye ever so sorely wounded. Therefore always keep the scabbard with you." (37)</span></p><span data-dcnode-id="1375" instrument_node="">
</span></blockquote><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1372" instrument_node="">This detail becomes significant later in Malory's version of the story when Arthur's sister, Morgan le Fay, steals the scabbard. She had hoped to defeat Arthur through magic by pitting her lover Sir Accolon against Arthur, giving Accolon the true Excalibur and Arthur a fake (a plot device taken almost directly from the Irish </span><em data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Ulster Cycle</span></em><span data-dcnode-id="1369" instrument_node="">). When Arthur's sword breaks he knows it is not Excalibur and manages to defeat and kill Accolon. Morgan takes the magical scabbard in revenge and throws it into a lake; thus dooming Arthur in his final battle with Mordred.</span></p><span data-dcnode-id="1367" instrument_node="">
</span><h3 data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">SIGNIFICANCE OF EXCALIBUR</span></h3><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1363" instrument_node="">The sword has become more famous than the powerful scabbard and continues as a symbol of Arthur's virtue and power. Later works, including El Cid and the Song of Roland, draw on the symbolism of Excalibur for their heroes. J.R.R. Tolkien's famous trilogy of </span><em data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">The Lord of the Rings</span></em><span data-dcnode-id="1360" instrument_node=""> relies on the symbolism of a sword of power which is broken and must be made whole to convey the concept of the return of the rightful king; a plot device which is similar to the Sword in the Stone motif where the land suffers after Uther Pendragon's </span><a data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/disambiguation/Death/"><span data-dcnode-id="1359" instrument_node="">death</span></a><span data-dcnode-id="1357" instrument_node=""> until the legitimate king is able to draw the magical sword from the stone.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1354"></p><figure class="image_intext_wrapper" data-dcnode-id="1334" rel="6666"><span data-dcnode-id="1353" instrument_node="">
</span><a data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/image/6666/sir-bedevere-returns-excalibur-to-the-lake/" title="Sir Bedevere Returns Excalibur to the Lake"><span data-dcnode-id="1352" instrument_node="">
</span><picture data-dcnode-id="1344"><span data-dcnode-id="1351" instrument_node=""> </span><source data-dcnode-id="1350" srcset="/img/r/p/500x600/6666.jpg.webp?v=1634407203" type="image/webp"><span data-dcnode-id="1349" instrument_node=""> </span><source data-dcnode-id="1348" srcset="/img/r/p/500x600/6666.jpg?v=1634407203" type="image/jpeg"><span data-dcnode-id="1347" instrument_node="">
</span><img alt="Sir Bedevere Returns Excalibur to the Lake" class="in_text_image" data-dcnode-id="1346" height="600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/img/r/p/500x600/6666.jpg%3Fv%3D1634407203&amp;raw" width="429"><span data-dcnode-id="1345" instrument_node="">
</span></picture><span data-dcnode-id="1343" instrument_node="">
</span><figcaption class="image_caption" data-dcnode-id="1338"><div class="figtitle" data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Sir Bedevere Returns Excalibur to the Lake</span></div><div class="figauthor" data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Walter Crane (Public Domain)</span></div></figcaption><span data-dcnode-id="1337" instrument_node="">
</span></a><span data-dcnode-id="1335" instrument_node="">
</span></figure><p data-dcnode-id="1333"></p><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">More than simply a literary device, however, Excalibur has come to represent the noblest aspects of the Arthurian legend. Although it is always described as a sword of power, that power is wielded in the best interests of the people, of justice, not in the self-interest of the king. Excalibur is given to Arthur through magical means, by the Lady of the Lake; it is not a weapon forged in this world but in another. The sword comes from this other realm and, once Arthur is defeated and dying, it must be returned there. This motif is not unique to the Arthurian legend but is borrowed from Celtic tradition in which the magical weapon must be returned to its source.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">In some versions of the story, the knight Sir Girflet, who has survived the final battle between Arthur and Mordred, is given the task of throwing Excalibur back into the lake; in Malory this falls to Sir Bedevere. Whether Girflet or Bedevere, Arthur's command that Excalibur be returned to where it came from goes unheeded twice since the knight he sends on the errand cannot see the sense in throwing away such a noble and powerful weapon. This failure on the part of one of Arthur's most trusted companions resonates with the Christian story of the betrayal of Christ by Judas, as it is intended to, and points to the same meaning: that the world cannot understand or appreciate the efforts of the divine will to help it rise to more than what it thinks it can be.</span></p><span data-dcnode-id="1326" instrument_node="">
</span></article><span data-dcnode-id="1324" instrument_node="">

</span><a class="thickbox outline_button visual_timeline_button" data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/ajax/ajax_print_visual_timeline.php%3Ftag%3DExcalibur%26width%3D950%26height%3D600" rel="nofollow" title="Visual Timeline"><span data-dcnode-id="468" instrument_node="">Visual Timeline</span></a><span data-dcnode-id="466" instrument_node="">
</span><ul data-dcnode-id="353" id="time_list"><span data-dcnode-id="465" instrument_node="">
</span><li class="timeline_entry" data-dcnode-id="460" id="tl_4931" title=""><span data-dcnode-id="464" instrument_node="">
</span><div class="date" data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">c. 460&nbsp;CE - c. 560&nbsp;CE</span></div><span data-dcnode-id="461" instrument_node="">
Probable dates for historical Arthur, King of the Britons.
</span></li><span data-dcnode-id="459" instrument_node="">
</span><li class="timeline_entry" data-dcnode-id="451" id="tl_4929" title=""><span data-dcnode-id="458" instrument_node="">
</span><div class="date" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">c. 830&nbsp;CE</span></div><span data-dcnode-id="455" instrument_node="">
Welsh Historian Nennius first mentions Arthur as king and hero of </span><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/disambiguation/battle/"><span data-dcnode-id="454" instrument_node="">Battle</span></a><span data-dcnode-id="452" instrument_node=""> of Badon Hill.
</span></li><span data-dcnode-id="450" instrument_node="">
</span><li class="timeline_entry" data-dcnode-id="442" id="tl_4930" title=""><span data-dcnode-id="449" instrument_node="">
</span><div class="date" data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">c. 1095&nbsp;CE - c. 1143&nbsp;CE</span></div><span data-dcnode-id="446" instrument_node="">
Life of historian William of Malmesbury who mentions Arthur as </span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/war/"><span data-dcnode-id="445" instrument_node="">war</span></a><span data-dcnode-id="443" instrument_node="">-chief of Britons, not king.
</span></li><span data-dcnode-id="441" instrument_node="">
</span><li class="timeline_entry" data-dcnode-id="430" id="tl_4934" title=""><span data-dcnode-id="440" instrument_node="">
</span><div class="date" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">c. 1130&nbsp;CE - c. 1190&nbsp;CE</span></div><span data-dcnode-id="437" instrument_node="">
Life of French Poet </span><a data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Chretien_de_Troyes/"><span data-dcnode-id="436" instrument_node="">Chretien de Troyes</span></a><span data-dcnode-id="434" instrument_node=""> who introduces Grail Quest, </span><a data-dcnode-id="432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Lancelot/"><span data-dcnode-id="433" instrument_node="">Lancelot</span></a><span data-dcnode-id="431" instrument_node="">, and other elements to Arthurian Legend; calls sword Escalibur.
</span></li><span data-dcnode-id="429" instrument_node="">
</span><li class="timeline_entry" data-dcnode-id="421" id="tl_4932" title=""><span data-dcnode-id="428" instrument_node="">
</span><div class="date" data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">1136&nbsp;CE</span></div><span data-dcnode-id="425" instrument_node="">
Geoffrey of Monmouth's History of the Kings of </span><a data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/britain/"><span data-dcnode-id="424" instrument_node="">Britain</span></a><span data-dcnode-id="422" instrument_node=""> introduces Arthurian Legend and Arthur's sword as Caliburn.
</span></li><span data-dcnode-id="420" instrument_node="">
</span><li class="timeline_entry" data-dcnode-id="415" id="tl_4933" title=""><span data-dcnode-id="419" instrument_node="">
</span><div class="date" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">c. 1160&nbsp;CE</span></div><span data-dcnode-id="416" instrument_node="">
French Poet Wace develops Arthurian Legend further, adds Round Table, calls sword Chaliburn.
</span></li><span data-dcnode-id="414" instrument_node="">
</span><li class="timeline_entry" data-dcnode-id="409" id="tl_4936" title=""><span data-dcnode-id="413" instrument_node="">
</span><div class="date" data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">c. 1170&nbsp;CE - c. 1220&nbsp;CE</span></div><span data-dcnode-id="410" instrument_node="">
Life of German Poet Wolfram von Eschenbach who develops Arthurian Legend in his poem Parzival.
</span></li><span data-dcnode-id="408" instrument_node="">
</span><li class="timeline_entry" data-dcnode-id="400" id="tl_4935" title=""><span data-dcnode-id="407" instrument_node="">
</span><div class="date" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">c. 1190&nbsp;CE</span></div><span data-dcnode-id="404" instrument_node="">
French Poet Robert de Boron develops Arthurian Legend further including Grail Quest, </span><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Merlin/"><span data-dcnode-id="403" instrument_node="">Merlin</span></a><span data-dcnode-id="401" instrument_node="">, Sword in the Stone.
</span></li><span data-dcnode-id="399" instrument_node="">
</span><li class="timeline_entry" data-dcnode-id="394" id="tl_4938" title=""><span data-dcnode-id="398" instrument_node="">
</span><div class="date" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">c. 1190&nbsp;CE - c. 1220&nbsp;CE</span></div><span data-dcnode-id="395" instrument_node="">
Layamon translates Arthurian Legends into English.
</span></li><span data-dcnode-id="393" instrument_node="">
</span><li class="timeline_entry" data-dcnode-id="388" id="tl_4937" title=""><span data-dcnode-id="392" instrument_node="">
</span><div class="date" data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">c. 1200&nbsp;CE</span></div><span data-dcnode-id="389" instrument_node="">
The Welsh Mabinogion influences development of Arthurian Legend.
</span></li><span data-dcnode-id="387" instrument_node="">
</span><li class="timeline_entry" data-dcnode-id="382" id="tl_4939" title=""><span data-dcnode-id="386" instrument_node="">
</span><div class="date" data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">c. 1210&nbsp;CE</span></div><span data-dcnode-id="383" instrument_node="">
Gottfried von Strassburg writes Tristan, contributes to Arthurian Legend.
</span></li><span data-dcnode-id="381" instrument_node="">
</span><li class="timeline_entry" data-dcnode-id="373" id="tl_4940" title=""><span data-dcnode-id="380" instrument_node="">
</span><div class="date" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">c. 1215&nbsp;CE - c. 1235&nbsp;CE</span></div><span data-dcnode-id="377" instrument_node="">
The Vulgate Cycle of the Arthurian Legend composed in English Prose; Arthur's sword is </span><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Excalibur/"><span data-dcnode-id="376" instrument_node="">Excalibur</span></a><span data-dcnode-id="374" instrument_node="">.
</span></li><span data-dcnode-id="372" instrument_node="">
</span><li class="timeline_entry" data-dcnode-id="361" id="tl_4941" title=""><span data-dcnode-id="371" instrument_node="">
</span><div class="date" data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">c. 1469&nbsp;CE</span></div><span data-dcnode-id="368" instrument_node="">
Sir </span><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Thomas_Malory/"><span data-dcnode-id="367" instrument_node="">Thomas Malory</span></a><span data-dcnode-id="365" instrument_node=""> composes Le Morte D'Arthur, definitive version of Arthurian Legend including </span><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldhistory.org/Excalibur/"><span data-dcnode-id="364" instrument_node="">Excalibur</span></a><span data-dcnode-id="362" instrument_node=""> as the king's sword.
</span></li><span data-dcnode-id="360" instrument_node="">
</span><li class="timeline_entry" data-dcnode-id="355" id="tl_4942" title=""><span data-dcnode-id="359" instrument_node="">
</span><div class="date" data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">1485&nbsp;CE</span></div><span data-dcnode-id="356" instrument_node="">
Le Morte D'Arthur published by William Caxton, becomes instant best-seller popularizing Arthurian Legend.
</span></li><span data-dcnode-id="354" instrument_node="">
</span></ul><span data-dcnode-id="352" instrument_node="">
</span></div><span data-dcnode-id="350" instrument_node="">
