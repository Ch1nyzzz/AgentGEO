</span><img alt="" class="attachment- size- wp-post-image" data-dcnode-id="2353" height="628" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yourselfquotes.com/wp-content/uploads/MunibaMazari-Quotes-1.png&amp;raw" srcset="https://www.yourselfquotes.com/wp-content/uploads/MunibaMazari-Quotes-1.png 1200w, https://www.yourselfquotes.com/wp-content/uploads/MunibaMazari-Quotes-1-300x157.png 300w, https://www.yourselfquotes.com/wp-content/uploads/MunibaMazari-Quotes-1-1024x536.png 1024w, https://www.yourselfquotes.com/wp-content/uploads/MunibaMazari-Quotes-1-768x402.png 768w, https://www.yourselfquotes.com/wp-content/uploads/MunibaMazari-Quotes-1-115x60.png 115w" width="1200"><span data-dcnode-id="2352" instrument_node=""> </span><meta content="https://www.yourselfquotes.com/wp-content/uploads/MunibaMazari-Quotes-1-1000x600.png" data-dcnode-id="2351" itemprop="url"><span data-dcnode-id="2350" instrument_node="">

</span><p data-dcnode-id="2327"><span data-dcnode-id="2336" style="color: #000000;"><span data-dcnode-id="2337" instrument_node="">It’s the story of an iron lady who made people realize that sometimes problems are not big, we are small because we can’t handle them. She believes that real happiness does not lie in success, money, name, and fame but lies within gratitude. Some bad incidence can break you physically and deform your body but transform your soul and turn you into the best version of yours. Today I am talking about </span></span><span data-dcnode-id="2335" instrument_node="">Muniba Mazari</span><span data-dcnode-id="2328" style="color: #000000;"><span data-dcnode-id="2334" instrument_node="">. She is inspired by his gratitude. She is a </span><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yourselfquotes.com/motivational-speakers-of-india/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2333" instrument_node="">Motivational Speaker</span></a><strong data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">, Artist, and TV Host</span></strong><span data-dcnode-id="2329" instrument_node=""> from Baloch, Pakistan.</span></span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2308"><span data-dcnode-id="2312" style="color: #000000;"><span data-dcnode-id="2325" instrument_node="">A Baloch Pakistani </span><strong data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Muniba Mazari</span></strong><span data-dcnode-id="2322" instrument_node=""> was born on March 1987. Her father was an artist and grown up in Pakistan. She has two siblings </span><strong data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Sarfraz Ali Mazari</span></strong><span data-dcnode-id="2319" instrument_node=""> and </span><strong data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Zulfiqar Ali Mazari</span></strong><span data-dcnode-id="2316" instrument_node="">. She is an artist, motivational speaker, model, tv host, and national goodwill woman ambassador of </span><a data-dcnode-id="2314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.un.org.pk/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2315" instrument_node="">Pakistan in United Nation</span></a><span data-dcnode-id="2313" instrument_node="">. She has left paralyzed after a serious car accident when she was going with her husband. She survived this accident, but she is </span></span><span data-dcnode-id="2311" instrument_node="">in</span><span data-dcnode-id="2309" style="color: #000000;"><span data-dcnode-id="2310" instrument_node=""> the wheelchair for lifelong.</span></span></p><span data-dcnode-id="2307" instrument_node="">
</span><p data-dcnode-id="2294"><span data-dcnode-id="2295" style="color: #000000;"><span data-dcnode-id="2306" instrument_node="">She was born in a conservative family. Muniba married at the age of 18 years due to family force as she was not ready to marry nevertheless </span><strong data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Muniba Mazari Wedding</span></strong><span data-dcnode-id="2303" instrument_node=""> successfully arranged by her family in 2005. Muniba Mazari’s husband was an air force pilot in the Pakistan army and now he is a commercial pilot in private airlines. </span><strong data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">Muniba Mazari’s Husband’s </span></strong><span data-dcnode-id="2299" style="color: #333333;"><span data-dcnode-id="2300" instrument_node="">name is</span></span><strong data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node=""> Khurram Shahzad</span></strong><span data-dcnode-id="2296" instrument_node=""> who had divorced her in 2015 due to her physical condition.</span></span></p><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2291" style="color: #000000;"><span data-dcnode-id="2292" instrument_node="">After a tragic car accident, her doctor told her that she would be not able to sit, walk and give birth to a child. However, she can sit now in a wheelchair.</span></span></p><span data-dcnode-id="2289" instrument_node="">
</span><p data-dcnode-id="2281"><span data-dcnode-id="2287" style="color: #000000;"><span data-dcnode-id="2288" instrument_node="">She is a bachelor’s in fine art and she is running </span></span><a data-dcnode-id="2284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.munibamazari.com/main/acrylics.html" rel="noopener" target="_blank"><strong data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">“Muniba’s Canvas”</span></strong></a><span data-dcnode-id="2282" style="color: #000000;"><span data-dcnode-id="2283" instrument_node="">. She claimed that she is a mixed media artist, but indeed you will see in her all artistic image that is abstract of a woman’s life. Apart from art, she is also the mother of a child. She has adopted a baby boy, his name is Nael.</span></span></p><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2278"><img alt="Muniba Mazari Son" class="aligncenter size-full wp-image-19707" data-dcnode-id="2279" height="992" loading="lazy" sizes="(max-width: 794px) 100vw, 794px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yourselfquotes.com/wp-content/uploads/Muniba-Mazari-Son.jpg&amp;raw" srcset="https://www.yourselfquotes.com/wp-content/uploads/Muniba-Mazari-Son.jpg 794w, https://www.yourselfquotes.com/wp-content/uploads/Muniba-Mazari-Son-240x300.jpg 240w, https://www.yourselfquotes.com/wp-content/uploads/Muniba-Mazari-Son-768x960.jpg 768w, https://www.yourselfquotes.com/wp-content/uploads/Muniba-Mazari-Son-16x20.jpg 16w" width="794"></p><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2240"><span data-dcnode-id="2260" style="color: #000000;"><span data-dcnode-id="2276" instrument_node="">Today, she is participating in many social activities. She is helping a poor child and suffering from Thalassemia with the support of </span><strong data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">UNICEF</span></strong><span data-dcnode-id="2273" instrument_node="">. She was awarded by many world’s leading organizations like </span><span data-dcnode-id="2270" style="color: #0000ff;"><strong data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">WCCI Lahore Division</span></strong></span><span data-dcnode-id="2269" instrument_node="">, </span><span data-dcnode-id="2266" style="color: #003366;"><strong data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">UN, CGC</span></strong></span><span data-dcnode-id="2265" instrument_node="">, </span><span data-dcnode-id="2262" style="color: #ff6600;"><strong data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">The Karc Brothers Award 2017</span></strong></span><span data-dcnode-id="2261" instrument_node="">,</span></span><span data-dcnode-id="2259" instrument_node=""> </span><a data-dcnode-id="2256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/pictures/56cbd9b7e4b062f6b59a49a0/muniba-mazari/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Forbes 30</span></strong></a><span data-dcnode-id="2241" style="color: #000000;"><span data-dcnode-id="2254" style="color: #003366;"><span data-dcnode-id="2255" instrument_node="">,</span></span><span data-dcnode-id="2253" instrument_node=""> </span><span data-dcnode-id="2250" style="color: #ff0000;"><strong data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">BBC’s&nbsp;</span></strong></span><span data-dcnode-id="2247" style="color: #800000;"><strong data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Top 100 Women</span></strong></span><span data-dcnode-id="2246" instrument_node="">, </span><span data-dcnode-id="2243" style="color: #003366;"><strong data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">NPC</span></strong></span><span data-dcnode-id="2242" instrument_node=""> for her work and achievement.</span></span></p><span data-dcnode-id="2239" instrument_node="">
</span><h2 data-dcnode-id="2235"><span data-dcnode-id="2236" style="color: #003366;"><strong data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Muniba Mazari Quotes</span></strong></span></h2><span data-dcnode-id="2234" instrument_node="">
</span><blockquote data-dcnode-id="2227"><p data-dcnode-id="2228"><strong data-dcnode-id="2229"><span data-dcnode-id="2232" style="color: #000000;"><span data-dcnode-id="2233" instrument_node="">“Pray for those who see their failure in your success!” </span></span><span data-dcnode-id="2230" style="color: #800000;"><span data-dcnode-id="2231" instrument_node="">― Muniba Mazari</span></span></strong></p></blockquote><span data-dcnode-id="2226" instrument_node="">
