</span><div class="single-post-content-wrapper" data-dcnode-id="349"><span data-dcnode-id="1244" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1240"><img alt="" class="wp-image-29885" data-dcnode-id="1243" height="415" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/133406809f705d5aa55303e614e865ba.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/133406809f705d5aa55303e614e865ba.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/133406809f705d5aa55303e614e865ba.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Photo Courtesy: tognopop/Wikimedia</span></figcaption></figure><span data-dcnode-id="1239" instrument_node=""> </span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Landmark structures that were built to stand the test of time were usually meticulously preserved over the years, allowing them to appear close to the same as they did when they were constructed. These buildings, monuments and other valuable cultural assets are found all over the world and attract millions of visitors each year.</span></p><div data-dcnode-id="1236" id="grs_1"></div><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">However, many famous landmarks no longer look the same, either due to a lack of maintenance, natural disasters or human intervention. These famous landmarks have changed significantly, sometimes making them difficult to recognize.</span></p><h2 data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Golden Gate Bridge, San Francisco</span></h2><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">The Golden Gate Bridge is a famous landmark and a spectacle of engineering. Spanning 1.7 miles across the Golden Gate strait that connects San Francisco with Marin County, the bridge supports more than 112,000 vehicles per day.</span></p><span data-dcnode-id="1228" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1224"><img alt="" class="wp-image-29886" data-dcnode-id="1227" height="415" loading="lazy" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/0eae80173f9041fd353235c1abe89755.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/0eae80173f9041fd353235c1abe89755.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/0eae80173f9041fd353235c1abe89755.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Photo Courtesy: US National Park Service/Wikimedia, RichN/Wikimedia</span></figcaption></figure><span data-dcnode-id="1223" instrument_node=""> </span><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Chicago engineer Joseph Strauss designed the structure that took more than four years to complete. When it opened to traffic on May 27, 1937, the Golden Gate Bridge had the longest suspended bridge span in the world. Stringent maintenance for more than 80 years has helped the bridge resist turbulent waters, strong winds, a corrosive atmosphere and earthquake forces.</span></p><h2 data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Times Square, New York City</span></h2><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">In the city that never sleeps, Times Square is a bustling collection of Broadway theaters, cinemas, prominent restaurants and electronic billboards. Every New Year’s Eve, thousands gather to watch the magical New Year’s ball drop during the last 60 seconds before the new year begins.</span></p><div class="global-site-magnite-ad" data-dcnode-id="1205"><div class="adwrapper adbordertop adborderbottom" data-dcnode-id="1206"><span data-dcnode-id="1216" instrument_node="">
</span><div class="adtext" data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">ADVERTISEMENT</span></div><span data-dcnode-id="1213" instrument_node="">

</span></div></div><span data-dcnode-id="1204" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1200"><img alt="" class="wp-image-29889" data-dcnode-id="1203" height="415" loading="lazy" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/f63cd65fa3f0c846f8a40b7cf7190966.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/f63cd65fa3f0c846f8a40b7cf7190966.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/f63cd65fa3f0c846f8a40b7cf7190966.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Photo Courtesy: Shorpy/Wikimedia, Coffe/Pixabay</span></figcaption></figure><span data-dcnode-id="1199" instrument_node=""> </span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Initially called Long Acre Square, the name was changed in 1905 when The New York Times built Times Tower, the city’s second-largest building at the time. Over the past century, Times Square has undergone numerous adjustments, including a difficult period after the Great Depression. However, it has survived and is a popular tourist destination today.</span></p><h2 data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Fremont Street, Las Vegas</span></h2><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">In the last century, perhaps no other city has changed as much as Las Vegas. From a small desert town with a population of 2,400 in 1900, the Las Vegas Valley quickly became one of the fastest growing metropolitan areas in the United States. The population now numbers more than 2.4 million.</span></p><div class="two-column_ads" data-dcnode-id="1166"><div class="global-site-ad two-column-ad-view" data-dcnode-id="1180"><div class="global-site-magnite-ad" data-dcnode-id="1181"><div class="adwrapper adbordertop adborderbottom" data-dcnode-id="1182"><span data-dcnode-id="1192" instrument_node="">
</span><div class="adtext" data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">ADVERTISEMENT</span></div><span data-dcnode-id="1189" instrument_node="">

</span><figure class="wp-block-image size-full" data-dcnode-id="1161"><img alt="" class="wp-image-29890" data-dcnode-id="1164" height="415" loading="lazy" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/7d0539be64686a0d482a4beff7e89bb5.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/7d0539be64686a0d482a4beff7e89bb5.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/7d0539be64686a0d482a4beff7e89bb5.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Photo Courtesy: that_Chrysler_guy/Wikimedia, Tim Pearce/Flickr</span></figcaption></figure><span data-dcnode-id="1160" instrument_node=""> </span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">While the growth of Vegas can be attributed to gambling and the proliferation of casinos on the Strip, Fremont Street, the historical center and the first gambling district, has also evolved over time. Today, it’s covered with a canopy that offers an air-conditioned, seven-block pedestrian zone for visitors.</span></p><h2 data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Great Sphinx, Giza</span></h2><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">The Great Sphinx is the largest and most famous monolith statue in the world. The limestone structure sits adjacent to the Great Pyramids of Giza in Egypt and depicts a mythical creature with a human head and the body of a lion.</span></p><div class="global-site-magnite-ad" data-dcnode-id="1142"><div class="adwrapper adbordertop adborderbottom" data-dcnode-id="1143"><span data-dcnode-id="1153" instrument_node="">
</span><div class="adtext" data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">ADVERTISEMENT</span></div><span data-dcnode-id="1150" instrument_node="">
</span><div class="between-content-ad" data-dcnode-id="1145"><span data-dcnode-id="1149" instrument_node="">
</span><div class="magniteAdUnit" data-adheight="90" data-adwidth="728" data-class="322166814/www.reference.com/Reference_Desktop_Feed_Center3_728x90" data-dcnode-id="1147" data-divid="article_756756823" id="article_756756823" style="text-align: center"><span data-dcnode-id="1148" instrument_node="">
</span></div><span data-dcnode-id="1146" instrument_node="">
</span></div><span data-dcnode-id="1144" instrument_node="">
</span></div></div><span data-dcnode-id="1141" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1137"><img alt="" class="wp-image-29893" data-dcnode-id="1140" height="415" loading="lazy" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/4ae2d429e1699ae614371c60332509cf.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/4ae2d429e1699ae614371c60332509cf.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/4ae2d429e1699ae614371c60332509cf.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Photo Courtesy: Bernard Spragg.NZ/Flickr, ThureSUK/Pixabay</span></figcaption></figure><span data-dcnode-id="1136" instrument_node=""> </span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Although the precise age is not known, the drab, colorless sculpture shows the impact that centuries of desert weather and vandalism have taken on the majestic figure. The recent discovery of paint on parts of the Sphinx even suggests that it was more colorful in its original glory days, as shown by this replica built at the Luxor Hotel in Las Vegas.</span></p><h2 data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Mount Rushmore, South Dakota</span></h2><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Beginning in 1927, sculptors spent 14 years carving the faces of U.S. Presidents Washington, Jefferson, Roosevelt (Teddy) and Lincoln into the side of a mountain in the Black Hills of South Dakota. Chosen by sculptor Gutzon Borglum, these presidents represent the most significant events in the country’s history.</span></p><div class="global-site-magnite-ad" data-dcnode-id="1118"><div class="adwrapper adbordertop adborderbottom" data-dcnode-id="1119"><span data-dcnode-id="1129" instrument_node="">
</span><div class="adtext" data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">ADVERTISEMENT</span></div><span data-dcnode-id="1126" instrument_node="">
</span><div class="between-content-ad" data-dcnode-id="1121"><span data-dcnode-id="1125" instrument_node="">
</span><div class="magniteAdUnit" data-adheight="90" data-adwidth="728" data-class="322166814/www.reference.com/Reference_Desktop_Feed_Center4_728x90" data-dcnode-id="1123" data-divid="article_1783812516" id="article_1783812516" style="text-align: center"><span data-dcnode-id="1124" instrument_node="">
</span></div><span data-dcnode-id="1122" instrument_node="">
</span></div><span data-dcnode-id="1120" instrument_node="">
</span></div></div><span data-dcnode-id="1117" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1113"><img alt="" class="wp-image-29895" data-dcnode-id="1116" height="415" loading="lazy" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/63ddf8001172c716440e96a9ae04e2e8.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/63ddf8001172c716440e96a9ae04e2e8.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/63ddf8001172c716440e96a9ae04e2e8.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Photo Courtesy: 2.0 Generic/Flickr, 2.0 Generic/Flickr</span></figcaption></figure><span data-dcnode-id="1112" instrument_node=""> </span><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Dynamite was the choice for blasting the hard granite rock off the mountain. A “honeycombing” procedure followed, which allowed small pieces to be removed by hand. Thomas Jefferson was originally carved to the left of George Washington. However, the face cracked and had to be removed. It was re-carved to the right of Washington.</span></p><h2 data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">The Brandenburg Gate, Berlin</span></h2><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Since its opening on August 6, 1791, the Brandenburg Gate has seen its share of historically significant events. It survived a conquest by Napoleon’s soldiers, who stole the most distinctive feature, the Quadriga, and carried it back to France as a victory trophy. It was later returned to Berlin after Napoleon’s defeat.</span></p><div class="global-site-magnite-ad" data-dcnode-id="1094"><div class="adwrapper adbordertop adborderbottom" data-dcnode-id="1095"><span data-dcnode-id="1105" instrument_node="">

</span><figure class="wp-block-image size-full" data-dcnode-id="801"><img alt="" class="wp-image-29920" data-dcnode-id="804" height="415" loading="lazy" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/0a5f4a88396bbc116d8ee1b9407fb917.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/0a5f4a88396bbc116d8ee1b9407fb917.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/0a5f4a88396bbc116d8ee1b9407fb917.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Photo Courtesy: Lothar Wilhelmy/Wikimedia, garethwiscombe/Wikimedia</span></figcaption></figure><span data-dcnode-id="800" instrument_node=""> </span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Is it a formation that was used to study the movements of the sun and moon? Did a race of giants position the stones, or did aliens use their superior technology to create the formation? Maybe it was an ancient concert hall with excellent outdoor acoustics. Some have even suggested it was built as an ancient team-building exercise. Regardless of the purpose, Stonehenge has remained mostly intact for centuries.</span></p><h2 data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Statue of Liberty, New York City</span></h2><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">A gift from the people of France to the U.S. following the American Revolution, the Statue of Liberty is a massive neoclassical sculpture that resides in New York Harbor. Designed by French sculptor Frédéric Auguste Bartholdi, the robed statue with a raised torch and stone tablet measures more than 305 feet tall.</span></p><div class="global-site-magnite-ad" data-dcnode-id="782"><div class="adwrapper adbordertop adborderbottom" data-dcnode-id="783"><span data-dcnode-id="793" instrument_node="">

</span><figure class="wp-block-image size-full" data-dcnode-id="681"><img alt="" class="wp-image-29930" data-dcnode-id="684" height="415" loading="lazy" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/fc936f2fe69e1d05629ecce4d580e2d8.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/fc936f2fe69e1d05629ecce4d580e2d8.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/fc936f2fe69e1d05629ecce4d580e2d8.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Photo Courtesy: InSapphoWeTrust/Flickr, seattlemunicipalarchives/Wikimedia</span></figcaption></figure><span data-dcnode-id="680" instrument_node=""> </span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Built with modern engineering techniques, the Space Needle reaches a height of 605 feet and resists winds up to 200 mph as well as earthquakes up to a 9.1 magnitude. The towering structure attracted 2.3 million visitors for its grand opening at the 1962 World’s Fair. Visitors can ride the elevator to the observation deck at the top in a mere 41 seconds.</span></p><h2 data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Gateway Arch, St. Louis</span></h2><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Reaching the top of the Gateway Arch by tram is no simple task. Visitors must climb more than 96 steps, stand and wait for 30 to 60 minutes and refrain from using the bathroom for quite some time since there are no restrooms at the top. However, for those who make it, the reward is a view to the east and west that stretches up to 30 miles.</span></p><div class="global-site-magnite-ad" data-dcnode-id="662"><div class="adwrapper adbordertop adborderbottom" data-dcnode-id="663"><span data-dcnode-id="673" instrument_node="">

</span></div><span data-dcnode-id="666" instrument_node="">
</span></div><span data-dcnode-id="664" instrument_node="">
</span></div></div><span data-dcnode-id="661" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="657"><img alt="" class="wp-image-29931" data-dcnode-id="660" height="415" loading="lazy" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/2fd431d423a9671c622185e87064122d.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/2fd431d423a9671c622185e87064122d.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/2fd431d423a9671c622185e87064122d.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Photo Courtesy: Missouri State Archives/Flickr, Daniel Schwen/Wikimedia</span></figcaption></figure><span data-dcnode-id="656" instrument_node=""> </span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">At a height of 630 feet, the structure is the tallest arch in the world. In 1974, it placed fourth on the list of Most Visited Man-Made Attractions. It became a national landmark in 1987.</span></p><h2 data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Chernobyl Swimming Pool, Pripyat, Ukraine</span></h2><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">The Chernobyl Nuclear Power Plant became an infamous unintentional landmark on April 25, 1986, when an explosion resulted in high levels of radiation exposure throughout the surrounding area. Some areas in the nearby town of Pripyat will remain uninhabitable for thousands of years.</span></p><div class="global-site-magnite-ad" data-dcnode-id="638"><div class="adwrapper adbordertop adborderbottom" data-dcnode-id="639"><span data-dcnode-id="649" instrument_node="">

</span></div></div><span data-dcnode-id="637" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="633"><img alt="" class="wp-image-29932" data-dcnode-id="636" height="415" loading="lazy" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/3880b00f0c56d1cda5204831e4f10640.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/3880b00f0c56d1cda5204831e4f10640.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/3880b00f0c56d1cda5204831e4f10640.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Photo Courtesy: Timm Suess/Wikipedia, Darek83/Wikimedia</span></figcaption></figure><span data-dcnode-id="632" instrument_node=""> </span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">One of those areas includes the Azure Swimming Pool. Built in the 1970s, it was one of three popular indoor swimming spots in the once bustling town. However, now the ruins of the pool lie within the exclusion zone. It’s illegal to live there, yet nearly 150 people still call it home.</span></p><h2 data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">World Trade Center, New York City</span></h2><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">No one will ever forget that fateful day on September 11, 2001, when the Twin Towers came down, altering the New York City skyline forever. Although the World Trade Center was composed of seven buildings, the two iconic towers rose above most of the surrounding buildings and were identifiable from any part of the city.</span></p><div class="global-site-magnite-ad" data-dcnode-id="614"><div class="adwrapper adbordertop adborderbottom" data-dcnode-id="615"><span data-dcnode-id="625" instrument_node="">
</span><div class="adtext" data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">ADVERTISEMENT</span></div><span data-dcnode-id="622" instrument_node="">

</span></div><span data-dcnode-id="618" instrument_node="">
</span></div><span data-dcnode-id="616" instrument_node="">
</span></div></div><span data-dcnode-id="613" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="609"><img alt="" class="wp-image-29935" data-dcnode-id="612" height="415" loading="lazy" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/532d9c030cece9dfe181d94485b3b1cf.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/532d9c030cece9dfe181d94485b3b1cf.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/532d9c030cece9dfe181d94485b3b1cf.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Photo Courtesy: Cathy Baird/Wikipedia, JeffMok/Wikimedia</span></figcaption></figure><span data-dcnode-id="608" instrument_node=""> </span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">The missing landmark towers created an eerie void in the city for quite some time, but a new tower at One World Trade Center was erected and opened in their place in 2014. The New York skyline was once again graced with a landmark skyscraper.</span></p><h2 data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Dharahara Tower, Nepal</span></h2><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Kathmandu is famous for its many temples, including Pashupatinath, perhaps the country’s most valuable Hindu temple. The noisy and vibrant capital city, Nepal, also has several important monuments as well as one historical landmark that is no more.</span></p><div class="global-site-magnite-ad" data-dcnode-id="590"><div class="adwrapper adbordertop adborderbottom" data-dcnode-id="591"><span data-dcnode-id="601" instrument_node="">
</span><div class="adtext" data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">ADVERTISEMENT</span></div><span data-dcnode-id="598" instrument_node="">
</span><div class="between-content-ad" data-dcnode-id="593"><span data-dcnode-id="597" instrument_node="">
</span><div class="magniteAdUnit" data-adheight="90" data-adwidth="728" data-class="322166814/www.reference.com/Reference_Desktop_ContentPage_Center_Bottom_728x90" data-dcnode-id="595" data-divid="article_395384387" id="article_395384387" style="text-align: center"><span data-dcnode-id="596" instrument_node="">
</span></div><span data-dcnode-id="594" instrument_node="">
</span></div><span data-dcnode-id="592" instrument_node="">
</span></div></div><span data-dcnode-id="589" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="585"><img alt="" class="wp-image-29937" data-dcnode-id="588" height="415" loading="lazy" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/757455191582412a161ab2d11f5ba8f6.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/757455191582412a161ab2d11f5ba8f6.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/757455191582412a161ab2d11f5ba8f6.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Photo Courtesy: Francisco Anzola/Flickr, Parazlaure/Wikimedia</span></figcaption></figure><span data-dcnode-id="584" instrument_node=""> </span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">The spectacular Dharahara Tower, built in 1932, rose nine stories high, making it the highest structure in Nepal. A spiral staircase led visitors up the 213 steps to the top, where a circular balcony provided a magnificent panoramic view of the Kathmandu Valley. The structure remained intact through multiple powerful earthquakes but collapsed when a 7.8-magnitude earthquake struck the area in 2015.</span></p><h2 data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Morandi Bridge, Genoa, Italy</span></h2><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Highway bridges are built to allow vehicle transportation over an otherwise impassable object, like a river, bay or another highway. They are practical engineering marvels that can also become popular landmarks for the pleasing view they add to the landscape.</span></p><div class="global-site-magnite-ad" data-dcnode-id="566"><div class="adwrapper adbordertop adborderbottom" data-dcnode-id="567"><span data-dcnode-id="577" instrument_node="">
</span><div class="adtext" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">ADVERTISEMENT</span></div><span data-dcnode-id="574" instrument_node="">
</span><div class="between-content-ad" data-dcnode-id="569"><span data-dcnode-id="573" instrument_node="">
</span><div class="magniteAdUnit" data-adheight="90" data-adwidth="728" data-class="322166814/www.reference.com/Reference_Desktop_Feed_Center6_728x90" data-dcnode-id="571" data-divid="article_1318995078" id="article_1318995078" style="text-align: center"><span data-dcnode-id="572" instrument_node="">

</span></div><span data-dcnode-id="568" instrument_node="">
</span></div></div><span data-dcnode-id="565" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="561"><img alt="" class="wp-image-29939" data-dcnode-id="564" height="415" loading="lazy" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/6da3a8a5c2ceff3d34845789fe515cca.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/6da3a8a5c2ceff3d34845789fe515cca.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/6da3a8a5c2ceff3d34845789fe515cca.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Photo Courtesy: Bruno/Wikimedia, Alessio Sbarbaro/Wikimedia</span></figcaption></figure><span data-dcnode-id="560" instrument_node=""> </span><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">The Morandi Bridge in Genoa was one of those landmarks. It served as a critical link from Italy to France and other parts of Europe via route A10 and connected two sections of the city that were separated by the Polcevera river. However, on August 14, 2018, the landmark bridge came crashing down during a severe storm. The remaining structure has since been demolished.</span></p><h2 data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Lincoln Memorial, Washington D.C.</span></h2><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Although Congress passed bills to commission a monument in Abraham Lincoln’s honor two years after his death, it took nearly 50 years for the monument to break ground. The original design was a bit exaggerated with 31 pedestrian statues, six statues with an equestrian theme and a towering 12-foot-high statue of the president.</span></p><div class="global-site-magnite-ad" data-dcnode-id="542"><div class="adwrapper adbordertop adborderbottom" data-dcnode-id="543"><span data-dcnode-id="553" instrument_node="">
</span><div class="adtext" data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">ADVERTISEMENT</span></div><span data-dcnode-id="550" instrument_node="">
</span><div class="between-content-ad" data-dcnode-id="545"><span data-dcnode-id="549" instrument_node="">
</span><div class="magniteAdUnit" data-adheight="90" data-adwidth="728" data-class="322166814/www.reference.com/Reference_Desktop_Feed_Center3_728x90" data-dcnode-id="547" data-divid="article_2737854564" id="article_2737854564" style="text-align: center"><span data-dcnode-id="548" instrument_node="">
</span></div><span data-dcnode-id="546" instrument_node="">
</span></div><span data-dcnode-id="544" instrument_node="">
</span></div></div><span data-dcnode-id="541" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="537"><img alt="" class="wp-image-29940" data-dcnode-id="540" height="415" loading="lazy" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/32b9a69d9c8e837cd5b420d1f5100a72.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/32b9a69d9c8e837cd5b420d1f5100a72.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/32b9a69d9c8e837cd5b420d1f5100a72.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Photo Courtesy: adampaulclay/Pixabay, Unknown/Wikimedia</span></figcaption></figure><span data-dcnode-id="536" instrument_node=""> </span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">The final version was more subtle, but it did include a reflection pool that extends to the Washington Monument. Many significant events have been held at the Lincoln Memorial over the years. Perhaps the most notable was Dr. Martin Luther King’s “I Have a Dream” speech in 1963.</span></p><h2 data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Taj Mahal, India</span></h2><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">The Taj Mahal is a massive mausoleum made of white marble constructed in the mid-1600s by the Mughal emperor Shah Jahan in memory of his favorite wife. When the Mughal Empire fell in the late 19th century, the tomb fell into disrepair. However, just before 1900, Lord Curzon, the British Viceroy of India, ordered the Taj Mahal to be restored.</span></p><span data-dcnode-id="529" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="525"><img alt="" class="wp-image-29943" data-dcnode-id="528" height="415" loading="lazy" sizes="(max-width: 738px) 100vw, 738px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reference.com/wp-content/uploads/sites/2/2020/01/ff92947ee17833367abddf33030eb01d.jpg&amp;raw" srcset="https://www.reference.com/wp-content/uploads/sites/2/2020/01/ff92947ee17833367abddf33030eb01d.jpg 738w, https://www.reference.com/wp-content/uploads/sites/2/2020/01/ff92947ee17833367abddf33030eb01d.jpg?resize=300,169 300w" width="738"><figcaption data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Photo Courtesy: wellcomecollection/Wikimedia, Dhirad/Wikimedia</span></figcaption></figure><span data-dcnode-id="524" instrument_node=""> </span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">The mausoleum is considered a hub of Muslim art in India and an admired masterpiece of the world’s heritage. Currently, the Taj Mahal is well maintained and hosts millions of visitors yearly, but it still suffers damage each year, primarily from pollution.</span></p><span data-dcnode-id="521" instrument_node="">
