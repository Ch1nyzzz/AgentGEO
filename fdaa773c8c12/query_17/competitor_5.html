</span><div class="entry-content" data-dcnode-id="696"><span data-dcnode-id="1608" instrument_node="">
</span><h2 data-dcnode-id="1604"><strong data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Famous Landmarks&nbsp;In&nbsp;France</span></strong><span data-dcnode-id="1605" instrument_node="">&nbsp;</span></h2><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">It’s the most-visited country in the world, so it’s not entirely surprising that there’s a vast wealth of famous landmarks in France to explore.&nbsp; Join us as we embark on a virtual journey around over 30 of the&nbsp;best&nbsp;landmarks of France, which will hopefully whet your appetite for further discoveries in this extraordinary country.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Some of the landmarks in France that we’ve included are more famous than others. The Eiffel Tower and Arc de Triomphe are universally&nbsp;recognised.&nbsp; If you didn’t know Notre Dame Cathedral before 2019, you almost certainly do now, after the tragic fire that engulfed much of its roof.&nbsp;&nbsp;</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">We’ve devoted most of this article to French landmarks outside the capital.&nbsp; Within a 100-mile radius of Paris you’ll find six of the greatest Gothic cathedrals in Europe (and the world).&nbsp; Venture further and you’ll find some of the wonders of the Normandy coastline including Le Mont St Michel, or the chateaux of the Loire Valley. Further south you’ll discover Roman temples and arenas, fortified hilltop villages and endless sweeps of lavender fields across the Provence landscape.&nbsp;</span></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">It’s a wonderful journey – we hope you enjoy it as much as us.&nbsp;</span></p><span data-dcnode-id="1591" instrument_node="">
</span><h3 data-dcnode-id="1586"><span data-dcnode-id="1590" instrument_node="">1. </span><strong data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Eiffel Tower</span></strong><span data-dcnode-id="1587" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1585" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1581"><img alt="Image of the Eiffel Tower Paris France" class="wp-image-236490" data-dcnode-id="1584" data-spai="1" data-spai-upd="645" height="430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai2/w_645%2Bq_lossy%2Bret_img%2Bto_webp/https%3A//delveintoeurope.com/wp-content/uploads/2021/06/what-is-france-famous-for-eiffel-tower.jpg&amp;raw" width="645"><figcaption data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Doesn’t really need  caption, does it?</span></figcaption></figure><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1576"><em data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Not merely a landmark, but the symbol of Paris, and France</span></em><span data-dcnode-id="1577" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1574" instrument_node="">La Tour Eiffel is the best-known of the landmarks of Paris, an unmistakable shape and silhouette that is shorthand for ‘France’ the world over. It’s one of a select number of European landmarks – like Big Ben or the Leaning Tower of Pisa – that almost transcend fame.&nbsp;</span><em data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Everyone</span></em><span data-dcnode-id="1571" instrument_node="">&nbsp;knows what and where it is. And climbing it is a rite of passage if you visit Paris – there are three&nbsp;etages, or stages, where you can stop. The third stage is almost 900 feet high, and the other great Paris landmarks seem awfully small from up there.&nbsp;</span></p><span data-dcnode-id="1569" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-2d862ff ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1563"><div class="ugb-inner-block" data-dcnode-id="1564"><div class="ugb-block-content" data-dcnode-id="1565"><hr class="ugb-divider__hr" data-dcnode-id="1566"></div></div></div><span data-dcnode-id="1562" instrument_node="">
</span><h3 data-dcnode-id="1557"><span data-dcnode-id="1561" instrument_node="">2. </span><strong data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Pont du Gard</span></strong><span data-dcnode-id="1558" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1556" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1552"><img alt="Image of the Pont du Gard Aqueduct France" class="wp-image-235296" data-dcnode-id="1555" data-spai="1" data-spai-upd="645" height="430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai2/w_645%2Bq_lossy%2Bret_img%2Bto_webp/https%3A//delveintoeurope.com/wp-content/uploads/2021/05/famous-landmarks-in-france-pont-du-gard-aqueduct.jpg&amp;raw" width="645"><figcaption data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">The magnificent Pont du Gard</span></figcaption></figure><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1547"><em data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">What DID the Romans do for us…?</span></em><span data-dcnode-id="1548" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1545" instrument_node="">One of the most&nbsp;recognisable&nbsp;French landmarks with its three rows of arches, the Pont du Gard is a Roman aqueduct built to supply water to the nearby town of Nemausus, now Nimes.&nbsp; It spans the Gardon river, dates from the 1</span><sup data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">st</span></sup><span data-dcnode-id="1542" instrument_node="">&nbsp;century AD and remained in use for 500 years, until its channels clogged up. One of the easiest </span><a data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//delveintoeurope.com/the-best-day-trips-from-avignon-france/"><span data-dcnode-id="1541" instrument_node="">day trips from Avignon</span></a><span data-dcnode-id="1539" instrument_node=""> or Nimes, it’s one of the most remarkable places to visit in France.&nbsp;</span></p><span data-dcnode-id="1537" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-fbe1ee1 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1531"><div class="ugb-inner-block" data-dcnode-id="1532"><div class="ugb-block-content" data-dcnode-id="1533"><hr class="ugb-divider__hr" data-dcnode-id="1534"></div></div></div><span data-dcnode-id="1530" instrument_node="">
</span><h3 data-dcnode-id="1525"><span data-dcnode-id="1529" instrument_node="">3. </span><strong data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Notre Dame de Paris</span></strong><span data-dcnode-id="1526" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1524" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1520"><img alt="Image of Notre Dame Cathedral Paris before the 2019 fire" class="wp-image-236939" data-dcnode-id="1523" data-spai="1" data-spai-upd="645" height="430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai2/w_645%2Bq_lossy%2Bret_img%2Bto_webp/https%3A//delveintoeurope.com/wp-content/uploads/2021/06/famous-landmarks-france-notre-dame-cathedral-paris.jpg&amp;raw" width="645"><figcaption data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Notre Dame de Paris in all its glory, above the river Seine</span></figcaption></figure><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1515"><em data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Gothic masterpiece awaiting&nbsp;restoration after severe fire&nbsp;damage</span></em><span data-dcnode-id="1516" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Notre Dame Cathedral is one of the greatest landmarks of France, and one of the finest Gothic buildings to survive the Middle Ages.&nbsp; Most of the great French cathedrals are dedicated to Notre Dame – Our Lady – but when anyone&nbsp;says,’Notre&nbsp;Dame’, it’s Notre Dame de Paris they mean.&nbsp;Immortalised&nbsp;in Victor Hugo’s novel Notre Dame de Paris (usually titled The Hunchback of Notre Dame in English), the Cathedral suffered a catastrophic fire which destroyed its spire and much of its roof in April 2019. It’ll be some years before we see it in all its glory again, but most of its artworks were saved by Cathedral staff.&nbsp;</span></p><span data-dcnode-id="1511" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-a772364 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1505"><div class="ugb-inner-block" data-dcnode-id="1506"><div class="ugb-block-content" data-dcnode-id="1507"><hr class="ugb-divider__hr" data-dcnode-id="1508"></div></div></div><span data-dcnode-id="1504" instrument_node="">
</span><h3 data-dcnode-id="1499"><span data-dcnode-id="1503" instrument_node="">4. </span><strong data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Millau Viaduct</span></strong><span data-dcnode-id="1500" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1498" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1496"><img alt="Image of the Millau Viaduct at sunset" class="wp-image-235290" data-dcnode-id="1497" data-spai="1" data-spai-upd="645" height="430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai2/w_645%2Bq_lossy%2Bret_img%2Bto_webp/https%3A//delveintoeurope.com/wp-content/uploads/2021/05/famous-landmarks-france-millau-viaduct.jpg&amp;raw" width="645"></figure><span data-dcnode-id="1495" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1491"><img alt="Image of the Millau Viaduct France at night" class="wp-image-235295" data-dcnode-id="1494" data-spai="1" data-spai-upd="645" height="430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai2/w_645%2Bq_lossy%2Bret_img%2Bto_webp/https%3A//delveintoeurope.com/wp-content/uploads/2021/05/famous-landmarks-in-france-millau-viaduct.jpg&amp;raw" width="645"><figcaption data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Looking upwards at the Viaduc de Millau from Peyre</span></figcaption></figure><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1487"><em data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">The highest bridge in Europe</span></em></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1485" instrument_node="">The tallest, and one of the most impressive&nbsp;</span><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//delveintoeurope.com/bridges-in-europe/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1484" instrument_node="">bridges in Europe</span></a><span data-dcnode-id="1482" instrument_node="">, Norman Foster’s&nbsp;Viaduc&nbsp;de Millau carries the A75 autoroute (motorway) that links Paris and Montpellier across the deep Tarn valley a few miles from the town of Millau. It’s a very graceful structure, supported by white piers of differing height, and the road stands up to 270&nbsp;metres&nbsp;above the valley floor. There are designated viewpoints, including one just to the north of the Viaduct – take the exit 1 km before the bridge.&nbsp; Also&nbsp;take a look&nbsp;at the lovely village of Peyre, just below the Viaduct.&nbsp;</span></p><span data-dcnode-id="1480" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-703836d ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1474"><div class="ugb-inner-block" data-dcnode-id="1475"><div class="ugb-block-content" data-dcnode-id="1476"><hr class="ugb-divider__hr" data-dcnode-id="1477"></div></div></div><span data-dcnode-id="1473" instrument_node="">
</span><h3 data-dcnode-id="1468"><span data-dcnode-id="1472" instrument_node="">5. </span><strong data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Louvre Museum</span></strong><span data-dcnode-id="1469" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1467" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1463"><img alt="Image of the Louvre Museum and Pyramid at night Paris France" class="wp-image-236941" data-dcnode-id="1466" data-spai="1" data-spai-upd="645" height="430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai2/w_645%2Bq_lossy%2Bret_img%2Bto_webp/https%3A//delveintoeurope.com/wp-content/uploads/2021/06/famous-landmarks-in-france-louvre-museum-paris.jpg&amp;raw" width="645"><figcaption data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">The Pyramid serves as the entrance to the Musee du Louvre</span></figcaption></figure><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1458"><em data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">A great Paris landmark without, one of the great museums of the world lies within</span></em><span data-dcnode-id="1459" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1456" instrument_node="">When I first visited the Louvre in the 1980s, this extraordinary museum was better known for&nbsp;the exhibits within, rather than the admittedly&nbsp;magnificent&nbsp;Palace in which it is housed. That changed with the expansion of the Museum to include the entire Louvre Palace, and the addition of I M Pei’s superb glass pyramid, leading to an underground entrance. It works beautifully in conjunction with the late medieval Palace behind. It’s best known as the home of Leonardo da Vinci’s&nbsp;</span><em data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Mona Lisa</span></em><span data-dcnode-id="1453" instrument_node="">&nbsp;but there’s enough to see to keep you there for days.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="1451" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-5a19bd1 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1445"><div class="ugb-inner-block" data-dcnode-id="1446"><div class="ugb-block-content" data-dcnode-id="1447"><hr class="ugb-divider__hr" data-dcnode-id="1448"></div></div></div><span data-dcnode-id="1444" instrument_node="">
</span><h3 data-dcnode-id="1439"><span data-dcnode-id="1443" instrument_node="">6. </span><strong data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Rouen Cathedral</span></strong><span data-dcnode-id="1440" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1438" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1434"><img alt="Image of a light projection on the west front of Rouen Cathedral France" class="wp-image-235298" data-dcnode-id="1437" data-spai="1" data-spai-upd="645" height="430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai2/w_645%2Bq_lossy%2Bret_img%2Bto_webp/https%3A//delveintoeurope.com/wp-content/uploads/2021/05/famous-landmarks-in-france-rouen-cathedral.jpg&amp;raw" width="645"><figcaption data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">A projection from a son et lumiere show on Rouen Cathedral’s west front </span></figcaption></figure><span data-dcnode-id="1433" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1429"><img alt="Image of a medieval house and one of the towers of Rouen Cathedral Normandy France" class="wp-image-235286" data-dcnode-id="1432" data-spai="1" data-spai-upd="645" height="968" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai2/w_645%2Bq_lossy%2Bret_img%2Bto_webp/https%3A//delveintoeurope.com/wp-content/uploads/2021/05/famous-churches-in-france-rouen-cathedral.jpg&amp;raw" width="645"><figcaption data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">The Tour St Romain of Rouen Cathedral and one of many half-timbered houses around the city</span></figcaption></figure><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1424"><em data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">The muse of Monet</span></em><span data-dcnode-id="1425" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">The west front of Rouen Cathedral was one of the&nbsp;favourite&nbsp;subjects of Impressionist master, who lived a short distance up the Seine valley at Giverny. He painted it over 30 times to study the effect of light on the Cathedral’s west façade at different times of day and year. This famous French landmark is best-known for its west front, but it’s also a Gothic masterpiece, with the later addition of the tallest church spire in France, at 495 feet in height.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="1420" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-bba2275 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1414"><div class="ugb-inner-block" data-dcnode-id="1415"><div class="ugb-block-content" data-dcnode-id="1416"><hr class="ugb-divider__hr" data-dcnode-id="1417"></div></div></div><span data-dcnode-id="1413" instrument_node="">
</span><h3 data-dcnode-id="1408"><span data-dcnode-id="1412" instrument_node="">7. </span><strong data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Arc de&nbsp;Triomphe</span></strong><span data-dcnode-id="1409" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1407" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1403"><img alt="Image of the Arc de Triomphe seen from the Eiffel Tower Paris France " class="wp-image-236940" data-dcnode-id="1406" data-spai="1" height="959" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk1OSIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTU5IiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA2JTJGZmFtb3VzLWxhbmRtYXJrcy1pbi1mcmFuY2UtYXJjLWRlLXRyaW9tcGhlLmpwZyIgZGF0YS13PSIxNDQwIiBkYXRhLWg9Ijk1OSIgZGF0YS1iaXA9IiI+PC9zdmc+" width="1440"><figcaption data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">An unusual view of the Arc de Triomphe – from the Eiffel Tower</span></figcaption></figure><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1398"><em data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Possibly the most famous – and busiest – traffic roundabout in the world</span></em><span data-dcnode-id="1399" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Stand&nbsp;outside the Louvre, looking at the handsome Arc&nbsp;de&nbsp; Triomphe&nbsp;du Carrousel at the entrance to the Tuileries Gardens. In the distance you’ll see its more famous cousin, the Arc de Triomphe de&nbsp;l’Etoile, at the top of the Avenue des Champs-Elysees. The Arc de Triomphe, one of the most familiar landmarks in Paris, is the focal point of the city’s Axe Historique (Historic Axis). It was built to&nbsp;honour&nbsp;the French&nbsp;soldiers who died in the Revolutionary and Napoleonic&nbsp;Wars, and&nbsp;was completed in 1836. The Tomb of the Unknown Soldier, who died during World War I, is beneath the arch.&nbsp;</span></p><span data-dcnode-id="1394" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-6e3181d ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1388"><div class="ugb-inner-block" data-dcnode-id="1389"><div class="ugb-block-content" data-dcnode-id="1390"><hr class="ugb-divider__hr" data-dcnode-id="1391"></div></div></div><span data-dcnode-id="1387" instrument_node="">
</span><h3 data-dcnode-id="1382"><span data-dcnode-id="1386" instrument_node="">8. </span><strong data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Hotel&nbsp;Negresco&nbsp;Nice</span></strong><span data-dcnode-id="1383" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1381" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1377"><img alt="Image of Hotel Le Negresco Nice France" class="wp-image-235285" data-dcnode-id="1380" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGZmFtb3VzLWJ1aWxkaW5ncy1vZi1mcmFuY2UtaG90ZWwtbmVncmVzY28tbmljZS5qcGciIGRhdGEtdz0iMTQ0MCIgZGF0YS1oPSI5NjAiIGRhdGEtYmlwPSIiPjwvc3ZnPg==" width="1440"><figcaption data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Hotel Le Negresco, one of the most luxurious hotels in France</span></figcaption></figure><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1372"><em data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">One of the most famous luxury hotels in France</span></em><span data-dcnode-id="1373" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1370" instrument_node="">The&nbsp;Negresco&nbsp;Hotel, on the Promenade des&nbsp;Anglais&nbsp;overlooking the Mediterranean, is one of the finest luxury hotels in Europe.&nbsp; It has been welcoming guests since 1913, though many of the furnishings and artwork date back to the 17</span><sup data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">th</span></sup><span data-dcnode-id="1367" instrument_node="">&nbsp;and 18</span><sup data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">th</span></sup><span data-dcnode-id="1364" instrument_node="">&nbsp;centuries.&nbsp; Tastefully opulent, Le&nbsp;Negresco&nbsp;is also home to the world-renowned Le Chantecler Restaurant.&nbsp;</span></p><span data-dcnode-id="1362" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-0026b5f ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1356"><div class="ugb-inner-block" data-dcnode-id="1357"><div class="ugb-block-content" data-dcnode-id="1358"><hr class="ugb-divider__hr" data-dcnode-id="1359"></div></div></div><span data-dcnode-id="1355" instrument_node="">
</span><h3 data-dcnode-id="1350"><span data-dcnode-id="1354" instrument_node="">9. </span><strong data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Chateau de Versailles</span></strong><span data-dcnode-id="1351" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1349" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1345"><img alt="Iamge of the Hall of Mirrors at the Palace of Versailles France" class="wp-image-236943" data-dcnode-id="1348" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA2JTJGZnJhbmNlLWZhbW91cy1sYW5kbWFya3MtcGFsYWNlLW9mLXZlcnNhaWxsZXMuanBnIiBkYXRhLXc9IjE0NDAiIGRhdGEtaD0iOTYwIiBkYXRhLWJpcD0iIj48L3N2Zz4=" width="1440"><figcaption data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">The Hall of Mirrors at the Palais de Versailles</span></figcaption></figure><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1340"><em data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Enormous palace complex on outskirts of Paris</span></em><span data-dcnode-id="1341" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1338" instrument_node="">The vast Palace of Versailles was built by the Sun King, Louis XIV, in the 17</span><sup data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">th</span></sup><span data-dcnode-id="1335" instrument_node="">&nbsp;century, and he relocated his entire court and retinue there from Paris. As well as the main palace, the complex also includes the Grand Trianon and Petit Trianon Palaces, and the&nbsp;Hameau&nbsp;(Hamlet) of Queen Marie Antoinette. The most famous room in the Palace is the Hall of Mirrors (Galerie des Glaces), where&nbsp;the 1919 Treaty of Versailles- which formally ended World War I (and, some would argue, sowed the seeds of World War II) was signed.&nbsp; &nbsp;&nbsp;</span></p><span data-dcnode-id="1333" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-15b6017 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1327"><div class="ugb-inner-block" data-dcnode-id="1328"><div class="ugb-block-content" data-dcnode-id="1329"><hr class="ugb-divider__hr" data-dcnode-id="1330"></div></div></div><span data-dcnode-id="1326" instrument_node="">
</span><h3 data-dcnode-id="1321"><span data-dcnode-id="1325" instrument_node="">10. </span><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Carcassonne&nbsp;Cité</span></strong><span data-dcnode-id="1322" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1320" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1316"><img alt="Image of Carcassonne citadel at night" class="wp-image-235302" data-dcnode-id="1319" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGZnJhbmNlLWxhbmRtYXJrLWNhcmNhc3Nvbm5lLmpwZyIgZGF0YS13PSIxNDQwIiBkYXRhLWg9Ijk2MCIgZGF0YS1iaXA9IiI+PC9zdmc+" width="1440"><figcaption data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Carcassonne in its magnificent entirety</span></figcaption></figure><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1311"><em data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Not just a fairytale castle – but a whole citadel</span></em><span data-dcnode-id="1312" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1309" instrument_node="">One of the most intriguing French famous landmarks, the&nbsp;cité&nbsp;de Carcassonne&nbsp;is a hugely&nbsp;impressive fortified&nbsp;city in south-west France. By the 13th&nbsp;century it was an important fortress on the border between France and the Crown of Aragon (part of modern Spain), and it withstood English attacks during the Hundred Years War with </span><a data-dcnode-id="1307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//delveintoeurope.com/lednice-castle/"><span data-dcnode-id="1308" instrument_node="">England</span></a><span data-dcnode-id="1306" instrument_node="">. Its importance diminished as France acquired land as far south as the Pyrenees. Facing demolition in the 19</span><sup data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">th</span></sup><span data-dcnode-id="1303" instrument_node="">&nbsp;century, funds were raised to restore it under the guidance of Eugene Viollet-le-Duc.&nbsp;</span></p><span data-dcnode-id="1301" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-6d24012 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1295"><div class="ugb-inner-block" data-dcnode-id="1296"><div class="ugb-block-content" data-dcnode-id="1297"><hr class="ugb-divider__hr" data-dcnode-id="1298"></div></div></div><span data-dcnode-id="1294" instrument_node="">
</span><h3 data-dcnode-id="1289"><span data-dcnode-id="1293" instrument_node="">11. </span><strong data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Sacré&nbsp;Coeur Basilica, Paris</span></strong><span data-dcnode-id="1290" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1288" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1284"><img alt="Image of Sacre Coeur Basilica Paris France" class="wp-image-236946" data-dcnode-id="1287" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGZmFtb3VzLWxhbmRtYXJrcy1wYXJpcy1zYWNyZS1jb2V1ci5qcGciIGRhdGEtdz0iMTQ0MCIgZGF0YS1oPSI5NjAiIGRhdGEtYmlwPSIiPjwvc3ZnPg==" width="1440"><figcaption data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Sacre Coeur, the famous Paris landmark atop the Butte de Montmartre</span></figcaption></figure><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1279"><em data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Landmark church with a bird’s eye view of Paris</span></em><span data-dcnode-id="1280" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">The Basilica of Sacré&nbsp;Coeur (Sacred Heart of Jesus) is one of the most prominent and famous&nbsp;landmarks in Paris, occupying an excellent vantage point&nbsp;at the summit of the Butte de Montmartre hill which overlooks the city. It was built between 1875 and 1914 to the design of Paul Abadie.&nbsp; It’s almost Byzantine in style with its domes and arches, though its exterior in white travertine stone is&nbsp;fairly simple. The classic view of Sacré&nbsp;Coeur is from the foot of the hill below.&nbsp;&nbsp;</span></p><span data-dcnode-id="1275" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-394f177 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1269"><div class="ugb-inner-block" data-dcnode-id="1270"><div class="ugb-block-content" data-dcnode-id="1271"><hr class="ugb-divider__hr" data-dcnode-id="1272"></div></div></div><span data-dcnode-id="1268" instrument_node="">
</span><h3 data-dcnode-id="1264"><span data-dcnode-id="1267" instrument_node="">12. </span><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Roussillon Village, Provence</span></strong></h3><span data-dcnode-id="1263" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1259"><img alt="Image of Roussillon village and Mont Ventoux France" class="wp-image-235300" data-dcnode-id="1262" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGZmFtb3VzLXZpbGxhZ2VzLWluLWZyYW5jZS1yb3Vzc2lsbG9uLmpwZyIgZGF0YS13PSIxNDQwIiBkYXRhLWg9Ijk2MCIgZGF0YS1iaXA9IiI+PC9zdmc+" width="1440"><figcaption data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">The ochre village of Roussillon with Mont Ventoux in the background</span></figcaption></figure><span data-dcnode-id="1258" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1254"><img alt="Image of colourful houses in Roussillon village Provence France" class="wp-image-235287" data-dcnode-id="1257" data-spai="1" height="1536" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDI0IDE1MzYiIHdpZHRoPSIxMDI0IiBoZWlnaHQ9IjE1MzYiIGRhdGEtdT0iaHR0cHMlM0ElMkYlMkZkZWx2ZWludG9ldXJvcGUuY29tJTJGd3AtY29udGVudCUyRnVwbG9hZHMlMkYyMDIxJTJGMDUlMkZmYW1vdXMtZnJlbmNoLWJ1aWxkaW5ncy1yb3Vzc2lsbG9uLWhvdXNlcy5qcGciIGRhdGEtdz0iMTAyNCIgZGF0YS1oPSIxNTM2IiBkYXRhLWJpcD0iIj48L3N2Zz4=" width="1024"><figcaption data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">The vivid, bright colours of Roussillon</span></figcaption></figure><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1250"><em data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">An oasis of ochre in a desert of green</span></em></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">The village of Roussillon is remarkable for its ochre&nbsp;colouring&nbsp;and quarries, which are surrounded by green Provencal countryside.&nbsp; It’s one of the most beautiful villages in France, with some stunning&nbsp;colourful&nbsp;houses, not all of which are ochre.&nbsp; A pathway from the village, the Sentier des&nbsp;Ocres, leads through some of the local quarries. The rich&nbsp;colour&nbsp;is reminiscent of some of the great American canyons in Utah and Arizona. The village also offers great views of nearby Mont&nbsp;Ventoux.&nbsp;</span></p><span data-dcnode-id="1246" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-dc9ce33 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1240"><div class="ugb-inner-block" data-dcnode-id="1241"><div class="ugb-block-content" data-dcnode-id="1242"><hr class="ugb-divider__hr" data-dcnode-id="1243"></div></div></div><span data-dcnode-id="1239" instrument_node="">
</span><h3 data-dcnode-id="1234"><span data-dcnode-id="1238" instrument_node="">13. </span><strong data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Abbesses Metro Station Entrance, Paris</span></strong><span data-dcnode-id="1235" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1229"><em data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Iconic station entrance like the wing of a butterfly</span></em><span data-dcnode-id="1230" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Possibly the smallest French landmark on our list, the ‘dragonfly’ entrance to Abbesses Metro station is the most exquisite. This gorgeous Art Nouveau entrance, or&nbsp;edicule, was designed by Hector&nbsp;Guimard, with a wrought iron and glass roof and the distinctive ‘Metropolitain’ sign in Art Nouveau-style lettering. It’s on line 12, near the foot of Montmartre hill, a short walk from two other famous Parisian&nbsp;landmarks,&nbsp; Sacre&nbsp;Coeur and the Moulin Rouge.&nbsp;</span></p><span data-dcnode-id="1225" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-f52e258 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1219"><div class="ugb-inner-block" data-dcnode-id="1220"><div class="ugb-block-content" data-dcnode-id="1221"><hr class="ugb-divider__hr" data-dcnode-id="1222"></div></div></div><span data-dcnode-id="1218" instrument_node="">
</span><h3 data-dcnode-id="1213"><span data-dcnode-id="1217" instrument_node="">14. </span><strong data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Quai Ste Catherine, Honfleur Harbour, Normandy</span></strong><span data-dcnode-id="1214" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1212" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1210"><img alt="Image of Quai Ste Catherine and the Old Harbour in Honfleur France" class="wp-image-235292" data-dcnode-id="1211" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGZmFtb3VzLWxhbmRtYXJrcy1pbi1mcmFuY2UtaG9uZmxldXItdmlldXgtYmFzc2luLmpwZyIgZGF0YS13PSIxNDQwIiBkYXRhLWg9Ijk2MCIgZGF0YS1iaXA9IiI+PC9zdmc+" width="1440"></figure><span data-dcnode-id="1209" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1205"><img alt="Image of Old Harbour in Honfleur Normandy France" class="wp-image-235305" data-dcnode-id="1208" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGbW9zdC1iZWF1dGlmdWwtcGxhY2VzLWluLWZyYW5jZS1ob25mbGV1ci5qcGciIGRhdGEtdz0iMTQ0MCIgZGF0YS1oPSI5NjAiIGRhdGEtYmlwPSIiPjwvc3ZnPg==" width="1440"><figcaption data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">A closer view of Quai Ste Catherine</span></figcaption></figure><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1200"><em data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">One of the most beautiful&nbsp;harbours&nbsp;– and streets – in France</span></em><span data-dcnode-id="1201" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">The Vieux Bassin is the oldest part of the port of Honfleur, which is on the opposite side of the mouth of the river Seine from the much larger port of Le Havre. The northern side of the Bassin is Quai Ste Catherine, a handsome row of tall slate-fronted townhouses which has been a draw for artists (including Monet) and tourists for well over a century. It’s named after the impressive wooden church of Ste Catherine nearby.&nbsp;</span></p><span data-dcnode-id="1196" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-f8e5172 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1190"><div class="ugb-inner-block" data-dcnode-id="1191"><div class="ugb-block-content" data-dcnode-id="1192"><hr class="ugb-divider__hr" data-dcnode-id="1193"></div></div></div><span data-dcnode-id="1189" instrument_node="">
</span><h3 data-dcnode-id="1184"><span data-dcnode-id="1188" instrument_node="">15. </span><strong data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Beauvais Cathedral</span></strong><span data-dcnode-id="1185" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1183" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1179"><img alt="Image of the high Gothic vaulting in Beauvais Cathedral Oise France" class="wp-image-236933" data-dcnode-id="1182" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA2JTJGZmFtb3VzLWxhbmRtYXJrcy1pbi1mcmFuY2UtYmVhdXZhaXMtY2F0aGVkcmFsLmpwZyIgZGF0YS13PSIxNDQwIiBkYXRhLWg9Ijk2MCIgZGF0YS1iaXA9IiI+PC9zdmc+" width="1440"><figcaption data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Built to reach the heavens – the vault of Beauvais Cathedral reached higher than anyone else in the Middle Ages</span></figcaption></figure><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1174"><em data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Unfinished Gothic masterpiece with the highest Gothic vault in the world</span></em><span data-dcnode-id="1175" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Medieval bishops were a competitive lot, often trying to outdo one another with their vast cathedrals. Beauvais, an hour north of Paris, aimed for the sky, building the highest Gothic vault – and indeed the highest nave roof – on the planet.&nbsp; Collapsed buttresses and a central tower, not to mention the Hundred Years War, meant that the original plans were never fulfilled. The result is a patch-up job with a truncated nave. Even when you stand at the back of the Cathedral, your eyes can’t quite take in the whole scene from the floor to the apex of the&nbsp;157 foot&nbsp;(47&nbsp;metre) vault – I had to tilt my head on its side to see it all at once.&nbsp; Perhaps not one of the most famous French landmarks, but surely one of the most remarkable.&nbsp;</span></p><span data-dcnode-id="1170" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-6f31279 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1164"><div class="ugb-inner-block" data-dcnode-id="1165"><div class="ugb-block-content" data-dcnode-id="1166"><hr class="ugb-divider__hr" data-dcnode-id="1167"></div></div></div><span data-dcnode-id="1163" instrument_node="">
</span><h3 data-dcnode-id="1158"><span data-dcnode-id="1162" instrument_node="">16. </span><strong data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Maison&nbsp;Carrée, Nimes</span></strong><span data-dcnode-id="1159" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1157" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1153"><img alt="Image of the Maison Carree Roman temple in Nimes France" class="wp-image-235288" data-dcnode-id="1156" data-spai="1" height="1536" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDI0IDE1MzYiIHdpZHRoPSIxMDI0IiBoZWlnaHQ9IjE1MzYiIGRhdGEtdT0iaHR0cHMlM0ElMkYlMkZkZWx2ZWludG9ldXJvcGUuY29tJTJGd3AtY29udGVudCUyRnVwbG9hZHMlMkYyMDIxJTJGMDUlMkZmYW1vdXMtZnJlbmNoLW1vbnVtZW50cy1tYWlzb24tY2FycmVlLmpwZyIgZGF0YS13PSIxMDI0IiBkYXRhLWg9IjE1MzYiIGRhdGEtYmlwPSIiPjwvc3ZnPg==" width="1024"><figcaption data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">The Maison Carree at dusk</span></figcaption></figure><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1148"><em data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Beautifully preserved Roman temple in the heart of Nimes</span></em><span data-dcnode-id="1149" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">The Maison&nbsp;Carrée&nbsp;is one of the finest ancient monuments in France.&nbsp; Its most memorable feature is its portico, with six Corinthian pillars, one of the best of its kind to have survived. It used to house the Musee des Beaux Arts de Nimes, but now stands empty, as it did in ancient times. The ancient temple contrasts with the modern Carré&nbsp;d’Art&nbsp;museum across the street, designed by Norman Foster. It’s a short walk away from the other main Nimes attraction, the&nbsp;Arènes, or Amphitheatre.&nbsp;</span></p><span data-dcnode-id="1144" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-29473d4 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1138"><div class="ugb-inner-block" data-dcnode-id="1139"><div class="ugb-block-content" data-dcnode-id="1140"><hr class="ugb-divider__hr" data-dcnode-id="1141"></div></div></div><span data-dcnode-id="1137" instrument_node="">
</span><h3 data-dcnode-id="1132"><span data-dcnode-id="1136" instrument_node="">17. </span><strong data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Étretat&nbsp;Chalk Cliffs</span></strong><span data-dcnode-id="1133" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1131" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1127"><img alt="Iamge of the chalk cliffs of Etretat Normandy France" class="wp-image-236938" data-dcnode-id="1130" data-spai="1" height="962" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MiIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYyIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA2JTJGZmFtb3VzLWxhbmRtYXJrcy1mcmFuY2UtZXRyZXRhdC1jbGlmZnMuanBnIiBkYXRhLXc9IjE0NDAiIGRhdGEtaD0iOTYyIiBkYXRhLWJpcD0iIj48L3N2Zz4=" width="1440"><figcaption data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">The splendid cliffs of Etretat</span></figcaption></figure><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1118"><em data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">The highlight of Normandy’s&nbsp;</span></em><em data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Côte&nbsp;</span></em><em data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">d’Albâtre</span></em><span data-dcnode-id="1119" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1116" instrument_node="">The&nbsp;Falaises&nbsp;d’</span><strong data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1113" instrument_node="">Étretat&nbsp;are famous white chalk cliffs and natural rock formations either side of the small Norman seaside town of&nbsp;Étretat, north of the port of Le Havre on the scenic Alabaster Coast.&nbsp; It is among the most famous places to visit in Normandy, with a superb white sand beach as well as the cliffs to admire. The best-known cliff is the Falaise&nbsp;d’Aval, just to the south-west of the town, with its famous sea arch which resembles an elephant’s trunk being dipped in the water.&nbsp;</span></p><span data-dcnode-id="1111" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-c324a63 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1105"><div class="ugb-inner-block" data-dcnode-id="1106"><div class="ugb-block-content" data-dcnode-id="1107"><hr class="ugb-divider__hr" data-dcnode-id="1108"></div></div></div><span data-dcnode-id="1104" instrument_node="">
</span><h3 data-dcnode-id="1099"><span data-dcnode-id="1103" instrument_node="">18. </span><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Arles Amphitheatre</span></strong><span data-dcnode-id="1100" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1098" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1094"><img alt="Image of the Amphitheatre or Arenes in Arles Provence France" class="wp-image-235301" data-dcnode-id="1097" data-spai="1" height="961" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MSIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYxIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGZnJhbmNlLWZhbW91cy1sYW5kbWFya3MtYXJsZXMtYXJlbmVzLmpwZyIgZGF0YS13PSIxNDQwIiBkYXRhLWg9Ijk2MSIgZGF0YS1iaXA9IiI+PC9zdmc+" width="1440"><figcaption data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">The exterior of Les Arenes d’Arles</span></figcaption></figure><span data-dcnode-id="1093" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1089"><img alt="Image of the interior of the Amphitheatre in Arles France" class="wp-image-235289" data-dcnode-id="1092" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGZmFtb3VzLWxhbmRtYXJrcy1mcmFuY2UtYXJsZXMtYW1waGl0aGVhdHJlLmpwZyIgZGF0YS13PSIxNDQwIiBkYXRhLWg9Ijk2MCIgZGF0YS1iaXA9IiI+PC9zdmc+" width="1440"><figcaption data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">And the interior</span></figcaption></figure><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1084"><em data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">One of the greatest Roman arenas – still in use 2,000 years on</span></em><span data-dcnode-id="1085" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1082" instrument_node="">Les Arenes&nbsp;d’Arles&nbsp;was built in the 1</span><sup data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">st</span></sup><span data-dcnode-id="1079" instrument_node="">&nbsp;century AD, not long after its inspiration, the Colosseum in Rome.&nbsp; It’s smaller than the great Roman arena but arguably in better condition – it’s still used for events including (no-kill) bullfights and summer concerts. The towers are a medieval addition, built to help turn the&nbsp;amphitheatre&nbsp;into a fortress. Climb one for an unrivalled view of the rooftops of this fine old city and the river Rhône.&nbsp;</span></p><span data-dcnode-id="1077" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-c83c9ab ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1071"><div class="ugb-inner-block" data-dcnode-id="1072"><div class="ugb-block-content" data-dcnode-id="1073"><hr class="ugb-divider__hr" data-dcnode-id="1074"></div></div></div><span data-dcnode-id="1070" instrument_node="">
</span><h3 data-dcnode-id="1065"><span data-dcnode-id="1069" instrument_node="">19. </span><strong data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Chartres Cathedral</span></strong><span data-dcnode-id="1066" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1064" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1060"><img alt="Image of early medieval stained glass in Chartres Cathedral France" class="wp-image-236188" data-dcnode-id="1063" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGZmFtb3VzLWxhbmRtYXJrcy1pbi1mcmFuY2UtY2hhcnRyZXMtY2F0aGVkcmFsLXdpbmRvdy5qcGciIGRhdGEtdz0iMTQ0MCIgZGF0YS1oPSI5NjAiIGRhdGEtYmlwPSIiPjwvc3ZnPg==" width="1440"><figcaption data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Chartres Cathedral is famous for its stunning stained glass</span></figcaption></figure><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1055"><em data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">One of the greatest buildings of the Middle Ages</span></em><span data-dcnode-id="1056" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1053" instrument_node="">One of the greatest landmarks France has is&nbsp;Notre Dame de Chartres, the astonishing Gothic cathedral in the city of Chartres, 50 miles (80 km) south-west of Paris in the Ile-de-France region. Much of it dates from the 13</span><sup data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">th</span></sup><span data-dcnode-id="1050" instrument_node="">&nbsp;century – one of the west towers was added later – but it is possibly the pinnacle of European Gothic architecture.&nbsp; It was built to house the Sancta&nbsp;Camisia&nbsp;relic- a veil believed to have been worn by the Virgin Mary during the birth of Christ. The Cathedral is perhaps best-known for its incredible array of medieval stained glass.&nbsp;</span></p><span data-dcnode-id="1048" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-91388e1 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1042"><div class="ugb-inner-block" data-dcnode-id="1043"><div class="ugb-block-content" data-dcnode-id="1044"><hr class="ugb-divider__hr" data-dcnode-id="1045"></div></div></div><span data-dcnode-id="1041" instrument_node="">
</span><h3 data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node="">20. </span><strong data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Gordes</span></strong><span data-dcnode-id="1037" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1035" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1031"><img alt="Image of the village of Gordes in Provence France" class="wp-image-235303" data-dcnode-id="1034" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGaGlzdG9yaWNhbC1wbGFjZXMtaW4tZnJhbmNlLWdvcmRlcy5qcGciIGRhdGEtdz0iMTQ0MCIgZGF0YS1oPSI5NjAiIGRhdGEtYmlwPSIiPjwvc3ZnPg==" width="1440"><figcaption data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Gordes</span></figcaption></figure><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1026"><em data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Picture-perfect Provencal village&nbsp;</span></em><span data-dcnode-id="1027" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Gordes is one of the most beautiful villages in Provence and, indeed, France. The best view of it is from the approach road, the centuries-old stone buildings hugging the steep sides of the hill. It has long been an inspiration for artists, and there’s a museum featuring the work of Pol Mara within the chateau. The village is a warren of back streets and alleyways, and the best thing to do there is just wander.&nbsp; While in the area, also check out the nearby Village des Bories (stone hive-shaped huts) and the chateau at Lacoste.&nbsp;</span></p><span data-dcnode-id="1022" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-b4f47f4 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="1016"><div class="ugb-inner-block" data-dcnode-id="1017"><div class="ugb-block-content" data-dcnode-id="1018"><hr class="ugb-divider__hr" data-dcnode-id="1019"></div></div></div><span data-dcnode-id="1015" instrument_node="">
</span><h3 data-dcnode-id="1010"><span data-dcnode-id="1014" instrument_node="">21. </span><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Le Mont St Michel</span></strong><span data-dcnode-id="1011" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1003"><em data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Abbey said to be inspired by three visions of the Archangel&nbsp;</span></em><em data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Michael</span></em><span data-dcnode-id="1004" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="1001" instrument_node="">Le Mont St Michel – the Mount of St Michael – is among the best-known monuments of France, and most&nbsp;beautiful&nbsp;</span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//delveintoeurope.com/islands-in-europe/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1000" instrument_node="">islands in Europe</span></a><span data-dcnode-id="998" instrument_node="">. It’s a tiny granite tidal island next to the estuary of the Couesnon, the ancient boundary between the duchies of Normandy and Brittany. It’s named after St Michael the Archangel, who is said to have appeared to a local bishop three times urging him to build a monastery at this precarious location. The monastery – one of the finest churches in France – was indeed built, as was the picturesque (but now heavily touristed) village below, and fortifications around the shore. One of the greatest landmarks in Europe.&nbsp;</span></p><span data-dcnode-id="996" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-4b52b0c ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="990"><div class="ugb-inner-block" data-dcnode-id="991"><div class="ugb-block-content" data-dcnode-id="992"><hr class="ugb-divider__hr" data-dcnode-id="993"></div></div></div><span data-dcnode-id="989" instrument_node="">
</span><h3 data-dcnode-id="984"><span data-dcnode-id="988" instrument_node="">22. </span><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Albi Cathedral</span></strong><span data-dcnode-id="985" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="983" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="979"><img alt="Image of Albi Cathedral Tarn France" class="wp-image-235304" data-dcnode-id="982" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGbGFuZG1hcmtzLWZyYW5jZS1hbGJpLWNhdGhlZHJhbC5qcGciIGRhdGEtdz0iMTQ0MCIgZGF0YS1oPSI5NjAiIGRhdGEtYmlwPSIiPjwvc3ZnPg==" width="1440"><figcaption data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">The Cathedral of Ste Cecile towering above Albi and the river Tarn</span></figcaption></figure><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="974"><em data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">What is it – a church or a castle?</span></em><span data-dcnode-id="975" instrument_node="">&nbsp;</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">The bulky brick&nbsp;Cathedrale&nbsp;Ste Cecile soars high above the rooftops of Albi, and its vast form, thick walls and narrow windows give it the appearance of a forbidding fortress rather than a Cathedral. One of the most underrated landmarks of France, it was meant to intimidate, demonstrating the might of the Church against heretics such as the&nbsp;Albigensians, or Cathars, who were persecuted for their different views to Rome. The interior couldn’t contrast more with it, a lavishly decorated church that became a UNESCO World Heritage Site in 2010.&nbsp;</span></p><span data-dcnode-id="970" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-5de03bb ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="964"><div class="ugb-inner-block" data-dcnode-id="965"><div class="ugb-block-content" data-dcnode-id="966"><hr class="ugb-divider__hr" data-dcnode-id="967"></div></div></div><span data-dcnode-id="963" instrument_node="">
</span><h3 data-dcnode-id="958"><span data-dcnode-id="962" instrument_node="">23. </span><strong data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Chateau de Chambord&nbsp;</span></strong><span data-dcnode-id="959" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="957" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="953"><img alt="Image of the Chateau de Chambord Loire Valley France" class="wp-image-236187" data-dcnode-id="956" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGZmFtb3VzLWxhbmRtYXJrcy1pbi1mcmFuY2UtY2hhbWJvcmQuanBnIiBkYXRhLXc9IjE0NDAiIGRhdGEtaD0iOTYwIiBkYXRhLWJpcD0iIj48L3N2Zz4=" width="1440"><figcaption data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">The Chateau de Chambord – a humble hunting lodge with a mere 282 fireplaces </span></figcaption></figure><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="948"><em data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Does one building really need 282 fireplaces?</span></em><span data-dcnode-id="949" instrument_node="">&nbsp;</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">The Loire Valley chateaux are among the most famous buildings in France, so we’ve gone with the biggest of the lot, Chambord Chateau, a few&nbsp;kilometres&nbsp;east of the lovely little city of Blois. It was built by King Francois I as a hunting lodge – with a mere 440 rooms – while he continued to reside a few miles away at the chateau in Blois&nbsp;and also&nbsp;at nearby Amboise. It’s a phenomenal building in the French Renaissance style, which was never quite finished. Its roofscape is particularly striking, its turrets, and cupolas resembling the skyline of a great medieval city.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="944" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-eb14855 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="938"><div class="ugb-inner-block" data-dcnode-id="939"><div class="ugb-block-content" data-dcnode-id="940"><hr class="ugb-divider__hr" data-dcnode-id="941"></div></div></div><span data-dcnode-id="937" instrument_node="">
</span><h3 data-dcnode-id="932"><span data-dcnode-id="936" instrument_node="">24. </span><strong data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Provence Lavender Fields</span></strong><span data-dcnode-id="933" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="931" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="929"><img alt="Image of a lavender field in Provence" class="wp-image-235293" data-dcnode-id="930" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGZmFtb3VzLWxhbmRtYXJrcy1pbi1mcmFuY2UtbGF2ZW5kZXItZmllbGRzLmpwZyIgZGF0YS13PSIxNDQwIiBkYXRhLWg9Ijk2MCIgZGF0YS1iaXA9IiI+PC9zdmc+" width="1440"></figure><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="924"><em data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">The most famous seasonal landmarks in France</span></em><span data-dcnode-id="925" instrument_node="">&nbsp;</span></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">The lavender fields of Provence cover huge swathes of the southern French landscape each year, turning the countryside into countless symmetrical rows of fragrant purple. The most famous lavender field in Provence is one outside the Abbaye de&nbsp;Senanque, and you’ll also find fields close to the towns of Banon, Sault and Aurel, and eastwards around the towns of&nbsp;Manosque&nbsp;and&nbsp;Valensole. The only way to see them is to drive yourself or join a lavender fields tour.&nbsp;</span></p><span data-dcnode-id="920" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-5b96561 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="914"><div class="ugb-inner-block" data-dcnode-id="915"><div class="ugb-block-content" data-dcnode-id="916"><hr class="ugb-divider__hr" data-dcnode-id="917"></div></div></div><span data-dcnode-id="913" instrument_node="">
</span><h3 data-dcnode-id="908"><span data-dcnode-id="912" instrument_node="">25. </span><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Dune of Pilat, Arcachon</span></strong><span data-dcnode-id="909" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="907" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="903"><img alt="Image of the enormous Dune du PIlat sand dune Arcachon France" class="wp-image-236944" data-dcnode-id="906" data-spai="1" height="956" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk1NiIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTU2IiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA2JTJGbmF0dXJhbC1sYW5kbWFya3MtaW4tZnJhbmNlLWR1bmUtZHUtcGlsYXQuanBnIiBkYXRhLXc9IjE0NDAiIGRhdGEtaD0iOTU2IiBkYXRhLWJpcD0iIj48L3N2Zz4=" width="1440"><figcaption data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">The vast Dune du Pilat rises above the coastline of Les Landes, south of Bordeaux</span></figcaption></figure><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="898"><em data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">The tallest sand dune in Europe</span></em><span data-dcnode-id="899" instrument_node="">&nbsp;</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">The Grande Dune du Pilat is the highest sand dune on the continent, 110&nbsp;metres&nbsp;high yet one of the toughest of France’s landmarks to climb. It’s the focal point of a surprisingly small dune system, a few&nbsp;kilometres&nbsp;to the south of&nbsp;Arcachon&nbsp;– it’s 2.7 km long and around 500&nbsp;metres&nbsp;wide. It’s well worth the tough climb for the view of the endless beaches on the Bay of Biscay and, inland, the forests of Les Landes.&nbsp;&nbsp;</span></p><span data-dcnode-id="894" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-ce748c9 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="888"><div class="ugb-inner-block" data-dcnode-id="889"><div class="ugb-block-content" data-dcnode-id="890"><hr class="ugb-divider__hr" data-dcnode-id="891"></div></div></div><span data-dcnode-id="887" instrument_node="">
</span><h3 data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">26. </span><strong data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">St Michel&nbsp;d’Aiguilhe&nbsp;Chapel ,&nbsp;Le Puy en&nbsp;Velay</span></strong><span data-dcnode-id="883" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="875"><em data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">If Mont St Michel is an unusual place to build a church, wait until you see&nbsp;</span></em><em data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">this</span></em><span data-dcnode-id="876" instrument_node="">&nbsp;</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">The Auvergne city of Le Puy en&nbsp;Velay&nbsp;is best known for its lentils and as one of the main starting points for the Camino de Santiago pilgrimage route.&nbsp; It’s also home to one of the most improbable&nbsp;buildings in France, the gorgeous 10</span><sup data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">th</span></sup><span data-dcnode-id="870" instrument_node="">&nbsp;century church of St Michel&nbsp;d’Aiguilhe&nbsp;(which translates as ‘St Michael of The Needle’). Even if it was at ground level it would be one of the loveliest early medieval churches in France. However, it happens to be built on an almost sheer outcrop of volcanic rock, so it’s a 268-step schlep to the summit.&nbsp;&nbsp;</span></p><span data-dcnode-id="868" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-a18abe5 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="862"><div class="ugb-inner-block" data-dcnode-id="863"><div class="ugb-block-content" data-dcnode-id="864"><hr class="ugb-divider__hr" data-dcnode-id="865"></div></div></div><span data-dcnode-id="861" instrument_node="">
</span><h3 data-dcnode-id="856"><span data-dcnode-id="860" instrument_node="">27. </span><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Mont&nbsp;Ventoux</span></strong><span data-dcnode-id="857" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="855" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="851"><img alt="Image of Mont Ventoux Provence France at sunrise" class="wp-image-235284" data-dcnode-id="854" data-spai="1" height="963" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MyIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYzIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGYmVzdC1wbGFjZXMtdG8tdmlzaXQtaW4tZnJhbmNlLW1vbnQtdmVudG91eC5qcGciIGRhdGEtdz0iMTQ0MCIgZGF0YS1oPSI5NjMiIGRhdGEtYmlwPSIiPjwvc3ZnPg==" width="1440"><figcaption data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Dawn behind Mont Ventoux, the highest mountain in Provence</span></figcaption></figure><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="846"><em data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">The highest point in Provence and a famous port of call for the Tour de France</span></em><span data-dcnode-id="847" instrument_node="">&nbsp;</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">The barren Mont&nbsp;Ventoux&nbsp;– Windy Mountain – is one of the most famous places in France. It’s the highest summit in Provence proper, 1,909&nbsp;metres&nbsp;(6,263 feet) above sea level, and it’s visible throughout much of the region. The drive to the summit rewards you with an extraordinary panorama over southern France, but if the mistral is blowing, the mountain lives up to its name. Spare a thought for the riders who&nbsp;have to&nbsp;pedal their way to the summit during the Tour de France.&nbsp;&nbsp;</span></p><span data-dcnode-id="842" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-3997872 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="836"><div class="ugb-inner-block" data-dcnode-id="837"><div class="ugb-block-content" data-dcnode-id="838"><hr class="ugb-divider__hr" data-dcnode-id="839"></div></div></div><span data-dcnode-id="835" instrument_node="">
</span><h3 data-dcnode-id="830"><span data-dcnode-id="834" instrument_node="">28. </span><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Mont Blanc</span></strong><span data-dcnode-id="831" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="829" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="825"><img alt="Image of Mont Blanc near Chamonix Alps France" class="wp-image-236936" data-dcnode-id="828" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA2JTJGZmFtb3VzLWZyYW5jZS1sYW5kbWFya3MtbW9udC1ibGFuYy5qcGciIGRhdGEtdz0iMTQ0MCIgZGF0YS1oPSI5NjAiIGRhdGEtYmlwPSIiPjwvc3ZnPg==" width="1440"><figcaption data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Mont Blanc is the highest point in the Apls</span></figcaption></figure><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="820"><em data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">The highest point in the Alps</span></em><span data-dcnode-id="821" instrument_node="">&nbsp;</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Mont Blanc – ‘White Mountain’ in English – is the highest mountain in Western Europe, at 4,808&nbsp;metres&nbsp;(15,774 feet). It is only surpassed in all of&nbsp;Europe by Mount Elbrus in southern Russia. Climbing it is a two-day undertaking via the popular&nbsp;Gouter&nbsp;Route – allow at least the same for the descent. The summit is&nbsp;on the French-Italian border, with both countries&nbsp;having long-standing claims over it. One of the most famous places of France, and one of the most spectacular.&nbsp;</span></p><span data-dcnode-id="816" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-a60696b ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="810"><div class="ugb-inner-block" data-dcnode-id="811"><div class="ugb-block-content" data-dcnode-id="812"><hr class="ugb-divider__hr" data-dcnode-id="813"></div></div></div><span data-dcnode-id="809" instrument_node="">
</span><h3 data-dcnode-id="804"><span data-dcnode-id="808" instrument_node="">29. </span><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Pont&nbsp;d’Avignon</span></strong><span data-dcnode-id="805" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="803" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="799"><img alt="Image of the Pont St Benezet and Cathedral Avignon Provence France" class="wp-image-235297" data-dcnode-id="802" data-spai="1" height="1536" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDI0IDE1MzYiIHdpZHRoPSIxMDI0IiBoZWlnaHQ9IjE1MzYiIGRhdGEtdT0iaHR0cHMlM0ElMkYlMkZkZWx2ZWludG9ldXJvcGUuY29tJTJGd3AtY29udGVudCUyRnVwbG9hZHMlMkYyMDIxJTJGMDUlMkZmYW1vdXMtbGFuZG1hcmtzLWluLWZyYW5jZS1wb250LXN0LWJlbmV6ZXQtYXZpZ25vbi5qcGciIGRhdGEtdz0iMTAyNCIgZGF0YS1oPSIxNTM2IiBkYXRhLWJpcD0iIj48L3N2Zz4=" width="1024"><figcaption data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">The Pont St Benezet and  Avignon Cathedral at dusk</span></figcaption></figure><span data-dcnode-id="798" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="794"><img alt="Image of the Pont St Benezet Avignon France" class="wp-image-235291" data-dcnode-id="797" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGZmFtb3VzLWxhbmRtYXJrcy1pbi1mcmFuY2UtYXZpZ25vbi1icmlkZ2UuanBnIiBkYXRhLXc9IjE0NDAiIGRhdGEtaD0iOTYwIiBkYXRhLWJpcD0iIj48L3N2Zz4=" width="1440"><figcaption data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">The Pont d’Avignon looking towards Villeneuve-lez-Avignon</span></figcaption></figure><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="781"><em data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Inspired the song ‘Sur le&nbsp;</span></em><em data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">pont</span></em><em data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">&nbsp;</span></em><em data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">d’Avignon</span></em><em data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">’</span></em><span data-dcnode-id="782" instrument_node="">&nbsp;</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="779" instrument_node="">The city of Avignon is home to two famous French landmarks – the imposing, indeed forbidding, Palais des Papes and the four arches of the Pont St&nbsp;Benezet&nbsp;which reach out forlornly into the river Rhône, never to reach the opposite bank. At one time the bridge did successfully span this famous French river, but most of the arches weren’t able to withstand its floods. The Chapel of St Nicholas on the bridge housed the relics of the 12</span><sup data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">th</span></sup><span data-dcnode-id="776" instrument_node="">&nbsp;century St&nbsp;Benezet, who instigated the building of the bridge after a vision. They are now housed in the church of St Didier in Avignon.&nbsp;</span></p><span data-dcnode-id="774" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-ebd6dc4 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="768"><div class="ugb-inner-block" data-dcnode-id="769"><div class="ugb-block-content" data-dcnode-id="770"><hr class="ugb-divider__hr" data-dcnode-id="771"></div></div></div><span data-dcnode-id="767" instrument_node="">
</span><h3 data-dcnode-id="760"><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">3</span></strong><span data-dcnode-id="764" instrument_node="">0. </span><strong data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Les Baux de Provence</span></strong><span data-dcnode-id="761" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="759" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="755"><img alt="Image of the village of Les Baux de Provence France" class="wp-image-235299" data-dcnode-id="758" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA1JTJGZmFtb3VzLWxhbmRtYXJrcy1pbi1wcm92ZW5jZS1sZXMtYmF1eC1kZS1wcm92ZW5jZS5qcGciIGRhdGEtdz0iMTQ0MCIgZGF0YS1oPSI5NjAiIGRhdGEtYmlwPSIiPjwvc3ZnPg==" width="1440"><figcaption data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Les Baux de Provence</span></figcaption></figure><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="746"><em data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Dramatically sited village in the&nbsp;</span></em><em data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Alpilles</span></em><em data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">&nbsp;hills</span></em><span data-dcnode-id="747" instrument_node="">&nbsp;</span></p><span data-dcnode-id="745" instrument_node="">
