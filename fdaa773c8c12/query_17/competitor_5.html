</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">One of a cluster of famous France landmarks in this corner of Provence (it’s very close to Arles and Avignon), Les Baux de Provence enjoys one of the most impressive settings of any villages in Provence. The village and medieval castle were built on a rocky hill that is part of the&nbsp;Alpilles&nbsp;range, and command great views over the olive groves and coastal plain below. Apart from the castle, the village has several art galleries, two medieval churches and some delightful corners and alleyways.&nbsp;</span></p><span data-dcnode-id="742" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-61b62f0 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="736"><div class="ugb-inner-block" data-dcnode-id="737"><div class="ugb-block-content" data-dcnode-id="738"><hr class="ugb-divider__hr" data-dcnode-id="739"></div></div></div><span data-dcnode-id="735" instrument_node="">
</span><h3 data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">31. </span><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Bonifacio Cliffs, Corsica</span></strong><span data-dcnode-id="731" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="729" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="725"><img alt="Image of the cliffs of Bonifacio Corsica France" class="wp-image-236937" data-dcnode-id="728" data-spai="1" height="1536" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDI0IDE1MzYiIHdpZHRoPSIxMDI0IiBoZWlnaHQ9IjE1MzYiIGRhdGEtdT0iaHR0cHMlM0ElMkYlMkZkZWx2ZWludG9ldXJvcGUuY29tJTJGd3AtY29udGVudCUyRnVwbG9hZHMlMkYyMDIxJTJGMDYlMkZmYW1vdXMtbGFuZG1hcmtzLWZyYW5jZS1ib25pZmFjaW8tY2xpZmZzLWNvcnNpY2EuanBnIiBkYXRhLXc9IjEwMjQiIGRhdGEtaD0iMTUzNiIgZGF0YS1iaXA9IiI+PC9zdmc+" width="1024"><figcaption data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Bonifacio, near the southern tip of Corsica</span></figcaption></figure><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">At its southernmost tip, Bonifacio is one of the best places to visit in Corsica, one of the most beautiful islands in Europe.&nbsp; The old town is perched on a narrow peninsula with a marina on one side and dramatic white limestone and granite cliffs on the seaward side. Houses are huddled together along the clifftop, while rock-cut paths, including the Escalier du Roi&nbsp;d’Aragon, lead you on a further adventure along the cliff faces and down to the shoreline. The fantastic coastal scenery continues to the nearby Capo&nbsp;Pertusato&nbsp;headland and beyond.&nbsp;&nbsp;</span></p><span data-dcnode-id="721" instrument_node="">
</span><div class="wp-block-ugb-divider ugb-divider ugb-4b2a4c0 ugb-divider--v2 ugb-divider--design-basic ugb-main-block" data-dcnode-id="715"><div class="ugb-inner-block" data-dcnode-id="716"><div class="ugb-block-content" data-dcnode-id="717"><hr class="ugb-divider__hr" data-dcnode-id="718"></div></div></div><span data-dcnode-id="714" instrument_node="">
</span><h3 data-dcnode-id="709"><span data-dcnode-id="713" instrument_node="">32. </span><strong data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Place Stanislas, Nancy</span></strong><span data-dcnode-id="710" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="708" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="704"><img alt="Image of Place Stanislas Nancy Lorraine France" class="wp-image-236942" data-dcnode-id="707" data-spai="1" height="960" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNDQwIDk2MCIgd2lkdGg9IjE0NDAiIGhlaWdodD0iOTYwIiBkYXRhLXU9Imh0dHBzJTNBJTJGJTJGZGVsdmVpbnRvZXVyb3BlLmNvbSUyRndwLWNvbnRlbnQlMkZ1cGxvYWRzJTJGMjAyMSUyRjA2JTJGZmFtb3VzLWxhbmRtYXJrcy1pbi1mcmFuY2UtcGxhY2Utc3RhbmlzbGFzLW5hbmN5LmpwZyIgZGF0YS13PSIxNDQwIiBkYXRhLWg9Ijk2MCIgZGF0YS1iaXA9IiI+PC9zdmc+" width="1440"><figcaption data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">The delightful Place Stanislas is the centrepiece of beautiful Nancy</span></figcaption></figure><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="702" instrument_node="">Place Stanislas is one of the finest </span><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//delveintoeurope.com/squares-in-europe/"><span data-dcnode-id="701" instrument_node="">squares in Europe</span></a><span data-dcnode-id="699" instrument_node="">, built by the former King of Poland Stanislaw Leszczynski after his accession as Duke of Lorraine in 1752 to link the old and new parts of the eastern city of Nancy. It’s a remarkable ensemble of buildings, including the Hotel de Ville (City Hall), Grand Hotel, Opera House and Museum. Two corners of the square are decorated with elaborate golden gates, and there is also a fine triumphal arch, the Arc Here. One of the most famous monuments in France, Europe hadn’t seen anything quite like it. It’s now&nbsp;a UNESCO&nbsp;World Heritage Site.&nbsp; &nbsp;&nbsp;</span></p><span data-dcnode-id="697" instrument_node="">
