</span><div data-dcnode-id="1247" style="text-align:center;"><a data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/articles"><span data-dcnode-id="1249" instrument_node="">England Articles</span></a></div><h1 data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">16 Of The Most Famous Landmarks In England</span></h1><h3 data-dcnode-id="1242"><strong data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">A Best of England Article</span></strong></h3><div data-dcnode-id="1229" style="padding:5px;text-align:center;"><a data-dcnode-id="1240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Tyne_%2526_Wear/Gateshead/Angel_of_the_North/pictures/1186114"><img border="1" data-dcnode-id="1241" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1186114.jpg&amp;raw"></a><p class="small" data-dcnode-id="1230"><strong data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Angel of the North in Gateshead. - </span></strong><span data-dcnode-id="1237" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/g0emf/pictures"><span data-dcnode-id="1236" instrument_node="">Dave Brown</span></a><span data-dcnode-id="1234" instrument_node=""> (</span><a data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/g0emf/pictures"><span data-dcnode-id="1233" instrument_node="">view gallery</span></a><span data-dcnode-id="1231" instrument_node="">)</span></p></div><div data-dcnode-id="1218" style="margin:5px 10px 5px 10px;"><span data-dcnode-id="1228" instrument_node="">There are countless wonderful and awe-inspiring </span><strong data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">landmarks throughout England</span></strong><span data-dcnode-id="1225" instrument_node="">, from its fabulous castles, cathedrals, and other great feats of engineering and architecture, to its incredible natural landmarks such as the beautiful white cliffs of Dover along the southern coast. Here we list some of the most famous and most recognisable of them all, for you to see and learn more about through the pictures and information. Please note this is not a definitive list of </span><em data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">all</span></em><span data-dcnode-id="1222" instrument_node=""> of England's landmarks, but a list of what we consider to be some of England's most famous and most recognisable landmarks. We may follow it up with a more definitive list, perhaps covering landmarks by each county in England, but for now we hope you enjoy checking out some of the </span><strong data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">best landmarks England has to offer</span></strong><span data-dcnode-id="1219" instrument_node="">.</span></div><div data-dcnode-id="1214" style="text-align:center;color:#003300;margin:15px 0px 10px 0px;"><b data-dcnode-id="1215"><i data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Please share the beauty of England by sharing this article...</span></i></b></div><div data-dcnode-id="1170" style="margin-top:10px;margin-bottom:10px;"><div class="sharethis-inline-share-buttons st-center st-has-labels st-inline-share-buttons st-animated" data-dcnode-id="1171" id="st-1"><div class="st-total st-hidden" data-dcnode-id="1207"><span data-dcnode-id="1213" instrument_node="">

</span></div><div data-dcnode-id="1125" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">1. Buckingham Palace, London </span></h2><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Greater_London/London/Buckingham_Palace/pictures/1017969"><img data-dcnode-id="1158" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1017969.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="1147"><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Buckingham Palace, London - </span></strong><span data-dcnode-id="1154" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/101225/pictures"><span data-dcnode-id="1153" instrument_node="">Stephan Tzenov</span></a><span data-dcnode-id="1151" instrument_node=""> (</span><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/101225/pictures"><span data-dcnode-id="1150" instrument_node="">view gallery</span></a><span data-dcnode-id="1148" instrument_node="">)</span></p><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Buckingham Palace is the first home and office of the Royal family in England, and has been the home to British sovereigns since 1837. It is where heads of state visit, and is used for banquets and other state and royal occassions. Originally it was a town house built for the Duke of Buckingham in 1703. It was later purchased by George III in 1762 and used as one of the royal family's London homes. 14 of George III's 15 children were born at the palace. George IV who reigned between 1820-30 employed John Nash to build a new palace around the old Buckingham House. Both he and his brother King William IV who reigned from 1830 to 1837 died before the new palace was fully completed, and so Queen Victoria was the first monarch to live at the palace in 1837, making it the royal family's main London residence. Buckingham Palace is decorated with priceless works of art that form part of the Royal Collection, one of the major art collections in the world today. It is also one of the worlds most familiar buildings and over 50,000 people visit the palace each year as guests to banquets, lunches, garden parties and receptions. During August and September when The Queen makes her annual visit to Scotland, the Palace's nineteen state rooms are open to visitors who get to see all the lavish furnishings and some of the most priceless works of art in the world. Also open to the public at this time is the gardens which are a haven for wildlife and offer great views of the garden front of the palace and the 19th century lake</span></p><p data-dcnode-id="1144"></p><ul data-dcnode-id="1130"><li data-dcnode-id="1139"><strong data-dcnode-id="1140"><a data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Greater_London/London/Buckingham_Palace/pictures"><span data-dcnode-id="1143" instrument_node="">More pictures of Buckingham Palace</span></a><span data-dcnode-id="1141" instrument_node="">...</span></strong></li><li data-dcnode-id="1135"><strong data-dcnode-id="1136"><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Greater_London/London/Buckingham_Palace/accommodation"><span data-dcnode-id="1138" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="1131"><strong data-dcnode-id="1132"><a data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Greater_London/London/Buckingham_Palace/pictures/add"><span data-dcnode-id="1134" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="1129"></p><div data-dcnode-id="1126" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="1127" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="1128" instrument_node="">ID#35</span></p></div></div><div data-dcnode-id="1085" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">2. Stonehenge </span></h2><a data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Wiltshire/Amesbury/Stonehenge/pictures/1187755"><img data-dcnode-id="1122" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1187755.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="1111"><strong data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Stonehenge (2) - June 21, 2003 - </span></strong><span data-dcnode-id="1118" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/judithhays/pictures"><span data-dcnode-id="1117" instrument_node="">Judith Hays</span></a><span data-dcnode-id="1115" instrument_node=""> (</span><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/judithhays/pictures"><span data-dcnode-id="1114" instrument_node="">view gallery</span></a><span data-dcnode-id="1112" instrument_node="">)</span></p><p data-dcnode-id="1105"><span data-dcnode-id="1110" instrument_node="">Stonehenge is one of the most famous prehistoric monuments in the world and one of England's most iconic landmarks,  consisting of a ring of large standing stones that reach 13 feet high and weigh in at around 25 tonnes.</span><br data-dcnode-id="1109"><span data-dcnode-id="1108" instrument_node="">
It is believed to have been constructed between 3000 BC and 2000 BC, with the surrounding circular eathworks dating back to around 3100 BC. Stonehenge is a UNESCO World Heritage Site, managed by English Heritage and owned by the Crown. </span><br data-dcnode-id="1107"><span data-dcnode-id="1106" instrument_node="">
Its purpose has been the topic of much debate, with theories ranging from a druid temple, to that of a solar calendar for ancient astronomers, but strong evidence now suggests that it was used as some sort of burial site and ceremonial complex, after hundreds of human bones were discovered at the site. </span></p><p data-dcnode-id="1104"></p><ul data-dcnode-id="1090"><li data-dcnode-id="1099"><strong data-dcnode-id="1100"><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Wiltshire/Amesbury/Stonehenge/pictures"><span data-dcnode-id="1103" instrument_node="">More pictures of Stonehenge</span></a><span data-dcnode-id="1101" instrument_node="">...</span></strong></li><li data-dcnode-id="1095"><strong data-dcnode-id="1096"><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Wiltshire/Amesbury/Stonehenge/accommodation"><span data-dcnode-id="1098" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="1091"><strong data-dcnode-id="1092"><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Wiltshire/Amesbury/Stonehenge/pictures/add"><span data-dcnode-id="1094" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="1089"></p><div data-dcnode-id="1086" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="1087" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="1088" instrument_node="">ID#155</span></p></div></div><div data-dcnode-id="1037" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">3. Durdle Door, Devon coast </span></h2><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Dorset/Wareham/Durdle_Door/pictures/1174090"><img data-dcnode-id="1082" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1174090.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="1071"><strong data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Durdle Door, Dorset - </span></strong><span data-dcnode-id="1078" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/Wahian/pictures"><span data-dcnode-id="1077" instrument_node="">Paul Hilton</span></a><span data-dcnode-id="1075" instrument_node=""> (</span><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/Wahian/pictures"><span data-dcnode-id="1074" instrument_node="">view gallery</span></a><span data-dcnode-id="1072" instrument_node="">)</span></p><p data-dcnode-id="1057"><span data-dcnode-id="1070" instrument_node="">On a coast of fabulous high white cliffs there are few views to rival the spectacular Durdle Door.  This natural phenomena, carved by the sea must rank as one of the most photographed scenes on the Jurassic Coast, it is certainly one of the coastal wonders of Britain.  </span><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">
</span><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">
It is a beautiful place, a shingle cove surrounded by rocks where a 'door' has been formed by the sea eating away at relatively soft rock, leaving an exquisite open arch of hard Portland stone.  Crystal clear waters flow through the door, sweeping softly up the pretty sloping beach which is used for bathing and this, together with other little coves make it a pleasurable place for sub-aqua enthusiasts.</span><br data-dcnode-id="1065"><span data-dcnode-id="1064" instrument_node="">
</span><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">
Lying a short distance from famed Lulworth Cove where fascinating arms of rock enfold pools of water left by a retreating tide, make this a picturesque and exciting place to explore.  Lulworth has delightful thatched cottages, pleasant shops and friendly inns and quaint shops, and cafe's.  At nearby Bat's Head, a smaller arch carved by waves can be seen - this is affectionately known as the 'mousehole' it is beneath massive rock formations jutting out into the sea.  From the mossy headland above there are seascapes of incomparable splendour.</span><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">
</span><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">
Places to visit include:  Bowleaze Cove, Kimmeridge Bay, Swanage Railway, Corfe Castle (NT) and Wareham - pretty market town.</span></p><p data-dcnode-id="1056"></p><ul data-dcnode-id="1042"><li data-dcnode-id="1051"><strong data-dcnode-id="1052"><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Dorset/Wareham/Durdle_Door/pictures"><span data-dcnode-id="1055" instrument_node="">More pictures of Durdle Door</span></a><span data-dcnode-id="1053" instrument_node="">...</span></strong></li><li data-dcnode-id="1047"><strong data-dcnode-id="1048"><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Dorset/Wareham/Durdle_Door/accommodation"><span data-dcnode-id="1050" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="1043"><strong data-dcnode-id="1044"><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Dorset/Wareham/Durdle_Door/pictures/add"><span data-dcnode-id="1046" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="1041"></p><div data-dcnode-id="1038" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="1039" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="1040" instrument_node="">ID#26</span></p></div></div><span data-dcnode-id="1035" instrument_node="">
</span><span data-dcnode-id="1033" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-0763328592621217" data-ad-format="auto" data-ad-slot="7264467728" data-dcnode-id="1032" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1031" instrument_node="">
</span><div data-dcnode-id="981" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">4. Houses Of Parliament and Big Ben </span></h2><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Greater_London/London/Houses_of_Parliament/pictures/1039794"><img data-dcnode-id="1026" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1039794.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="1015"><strong data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Houses of Parliament - </span></strong><span data-dcnode-id="1022" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/thomas2279/pictures"><span data-dcnode-id="1021" instrument_node="">David Thomas</span></a><span data-dcnode-id="1019" instrument_node=""> (</span><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/thomas2279/pictures"><span data-dcnode-id="1018" instrument_node="">view gallery</span></a><span data-dcnode-id="1016" instrument_node="">)</span></p><p data-dcnode-id="1001"><span data-dcnode-id="1014" instrument_node="">The Houses of Parliament, also known as The Palace of Westminster has been the seat of the two Houses of Parliament called the House of Lords and the House of Commons since 1512. The Commons is made up of elected Members of Parliament (MP's) from different political parties (Labour, Liberal Democrates, Conservative, etc). The party with the most MP's forms the Government of England, with its leader becoming Prime Minister of England. MP's from other parties make up the Opposition. The Commons debate legislations in both houses before passing them through as law. </span><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">
</span><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">
Originally built for Edward the Confessor in 1042, The Palace of Westminster has been the place where virtually all English Monarchs since William the Conquerer have been coronated. In 1512 a fire broke out and the palace stopped being a royal residence, but the Lords continued to meet there. The Palace of Westminster has been home to the English Parliament ever since. </span><br data-dcnode-id="1009"><span data-dcnode-id="1008" instrument_node="">
</span><br data-dcnode-id="1007"><span data-dcnode-id="1006" instrument_node="">
Another fire raged through the palace in 1834 destroying much of it, except the Jewel Tower and Westminster Hall which dates from 1097 and its hammerbeam roof dating from the 14th century. This part of the palace was saved by Lord Melbourne, the Prime Minister at the time who saved the great hall by arranging for the fire engines to be brought right into the hall and then he personally supervised the fire fighting. The present magnificent building is Mock Gothic and was designed by Victorian Architect Sir Charles Barry and was finished in 1870. On the main picture above you will see the two main towers. The one on the right of the picture is Big Ben, and the tower on the left is Victoria Tower which contains 1.5 million acts of Parliament passed since 1497. Victoria Tower also flies the union jack whenever Parliament is sitting.</span><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">
</span><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">
Every November the Fifth, England comemorates the death of Guy Fawkes, who along with others tried to blow up the king and the Houses of Parliament back in 1605. On this date in England fireworks fill the sky nationwide and bonfires light in every town and village</span></p><p data-dcnode-id="1000"></p><ul data-dcnode-id="986"><li data-dcnode-id="995"><strong data-dcnode-id="996"><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Greater_London/London/Houses_of_Parliament/pictures"><span data-dcnode-id="999" instrument_node="">More pictures of Houses of Parliament</span></a><span data-dcnode-id="997" instrument_node="">...</span></strong></li><li data-dcnode-id="991"><strong data-dcnode-id="992"><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Greater_London/London/Houses_of_Parliament/accommodation"><span data-dcnode-id="994" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="987"><strong data-dcnode-id="988"><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Greater_London/London/Houses_of_Parliament/pictures/add"><span data-dcnode-id="990" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="985"></p><div data-dcnode-id="982" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="983" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="984" instrument_node="">ID#33</span></p></div></div><div data-dcnode-id="931" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">5. Windsor Castle </span></h2><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Berkshire/Windsor/Windsor_Castle/pictures/1002339"><img data-dcnode-id="978" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1002339.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="967"><strong data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Windsor Castle from the Thames. Taken Aug/Sept 2003 - </span></strong><span data-dcnode-id="974" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/103714/pictures"><span data-dcnode-id="973" instrument_node="">Andrew Irving</span></a><span data-dcnode-id="971" instrument_node=""> (</span><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/103714/pictures"><span data-dcnode-id="970" instrument_node="">view gallery</span></a><span data-dcnode-id="968" instrument_node="">)</span></p><p data-dcnode-id="951"><span data-dcnode-id="966" instrument_node="">There are over 4,000 castles in England, many of which are incredible landmarks and instantly recognisable to many, however as this is a list of the most famous landmarks, there is one castle inparticular that is perhaps better known throughout the world due to it being a place of royal residence, as it has been for around 950 years, and that is Windsor Castle - royal residence of the Queen, and the largest inhabited castle in the world.</span><br data-dcnode-id="965"><br data-dcnode-id="964"><span data-dcnode-id="963" instrument_node="">Founded by William the Conqueror in the 11th century, Windsor Castle is where the Queen spends most of her weekends and several full weeks at a time in residence as she hosts guest such as politicians, public figures, overseas monarchs and presidents, and many services are held including the Order of the Garter and the Royal Ascot race meeting. </span><br data-dcnode-id="962"><br data-dcnode-id="961"><span data-dcnode-id="960" instrument_node="">Within the famous grounds is St George's Chapel, which is one of the finest examples of Gothic architecture in England, and which remains an active centre for worship, and a place for royal wedding celebrations. The Chapel is also the place where Queen Elizabeth The Queen Mother lies buried with her husband, King George VI, and also Princess Margaret, her younger daughter. In the famous Round Tower can be found the Royal Archives and the Royal Photograph Collection. </span><br data-dcnode-id="959"><br data-dcnode-id="958"><span data-dcnode-id="957" instrument_node="">The castle is open to the public all year round and really is a must-visit place. </span><br data-dcnode-id="956"><br data-dcnode-id="955"><span data-dcnode-id="954" instrument_node="">To plan your visit, please visit </span><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rct.uk/visit/windsor-castle" target="_blank"><span data-dcnode-id="953" instrument_node="">https://www.rct.uk/visit/windsor-castle</span></a></p><p data-dcnode-id="950"></p><ul data-dcnode-id="936"><li data-dcnode-id="945"><strong data-dcnode-id="946"><a data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Berkshire/Windsor/Windsor_Castle/pictures"><span data-dcnode-id="949" instrument_node="">More pictures of Windsor Castle</span></a><span data-dcnode-id="947" instrument_node="">...</span></strong></li><li data-dcnode-id="941"><strong data-dcnode-id="942"><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Berkshire/Windsor/Windsor_Castle/accommodation"><span data-dcnode-id="944" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="937"><strong data-dcnode-id="938"><a data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Berkshire/Windsor/Windsor_Castle/pictures/add"><span data-dcnode-id="940" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="935"></p><div data-dcnode-id="932" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="933" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="934" instrument_node="">ID#191</span></p></div></div><span data-dcnode-id="929" instrument_node="">
</span><span data-dcnode-id="927" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-0763328592621217" data-ad-format="auto" data-ad-slot="7264467728" data-dcnode-id="926" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="925" instrument_node="">
</span><div data-dcnode-id="859" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">6. Canterbury Cathedral </span></h2><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Kent/Canterbury/Canterbury_Cathedral/pictures/1210323"><img data-dcnode-id="920" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1210323.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="909"><strong data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Canterbury Cathedral over the wall - </span></strong><span data-dcnode-id="916" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/Mobscooter/pictures"><span data-dcnode-id="915" instrument_node="">Mobscooter</span></a><span data-dcnode-id="913" instrument_node=""> (</span><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/Mobscooter/pictures"><span data-dcnode-id="912" instrument_node="">view gallery</span></a><span data-dcnode-id="910" instrument_node="">)</span></p><p data-dcnode-id="879"><span data-dcnode-id="908" instrument_node="">This magnificent cathedral has been a place of pilgrimage for hundreds of years.  It was the scene of Thomas a' Becket's murder in 1170, the spot is marked by a plaque, later he was made a Saint, there is a magnificent shrine to him in the Cathedral.</span><br data-dcnode-id="907"><span data-dcnode-id="906" instrument_node="">
</span><br data-dcnode-id="905"><span data-dcnode-id="904" instrument_node="">
The building is renowned for its fantastic Norman crypt, believed to be the largest in the world; it is also known for its wonderful series of chapel's. The impressive Lady Chapel is quite possibly the best of these, it has fine stone screens - a gift of the Black Prince who wanted the chapel to be his final resting place. The Black Prince's Chantry is an early Norman chapel once used by the Huguenots; it takes its name from alterations made by the Black Prince.  Two of the oldest chapels in the cathedral are opposite the north transept, these are dedicated to St.Mary Magdalene and St.Nicholas.  St. Gabriel's chapel has Byzantine frescoes dating from the early 1100's in here visitors can see pillars carved with figures and animals.  And in the great east crypt is yet another magnificent chapel of our Lady, this has a ceiling decorated with crowns carrying the letter "M".</span><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node="">
</span><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node="">
Originally the cathedral was founded in the year 597, but nothing of these buildings remain.  The buildings we see today are the product of early craftsmen following the Conquest.  Much of the glory of Canterbury Cathedral rests with two men, William of Sens, who designed the choir and apse after the fire of 1174, and Henry Yevele, who designed the nave in 1374. Late in the 15th-century the central Bell Harry Tower was added.</span><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">
</span><br data-dcnode-id="897"><span data-dcnode-id="896" instrument_node="">
Superb elaborate monuments can be seen throughout the cathedral, and in Trinity Chapel on the south side visitors can see the magnificent tomb of Edward the Black Prince, son of Edward III, who died in 1376.  On the north side lie the bodies of King Henry IV and his wife Joan of Navarre, they rest in a canopied tomb with splendid alabaster effigies. </span><br data-dcnode-id="895"><span data-dcnode-id="894" instrument_node="">
</span><br data-dcnode-id="893"><span data-dcnode-id="892" instrument_node="">
Historically, Thomas a' Becket is Canterbury Cathedral's most famous Archbishop, but Thomas Cranmer was Archbishop here during the Reformation, it is he that compiled the early Prayer Books for what was to become the established Church of England.  During the reign of Mary I when the Catholic religion was restored Cardinal Pole was anointed Archbishop.  Of the men who served as Archbishop during the reign of Elizabeth I, the two best known are John Whitgift and Matthew Parker.</span><br data-dcnode-id="891"><span data-dcnode-id="890" instrument_node="">
</span><br data-dcnode-id="889"><span data-dcnode-id="888" instrument_node="">
Most recently in the 20th-century, the late Pope John Paul, leader of the Roman Catholic Church met with Archbishop John Runcie in 1982 at Canterbury Cathedral.  The two men knelt together in silent prayer at the shrine of Thomas a' Becket.  </span><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">
</span><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">
This is an awesome place which is undeniably beautiful, it's rich historic past is illustrated at every turn you make and this applies to the magnificent architecture of the exterior as much as it does to its glorious interior.  </span><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">
</span><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">
To visit Canterbury Cathedral is to part-take of one of life's most rewarding spiritual experiences.</span></p><p data-dcnode-id="878"></p><ul data-dcnode-id="864"><li data-dcnode-id="873"><strong data-dcnode-id="874"><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Kent/Canterbury/Canterbury_Cathedral/pictures"><span data-dcnode-id="877" instrument_node="">More pictures of Canterbury Cathedral</span></a><span data-dcnode-id="875" instrument_node="">...</span></strong></li><li data-dcnode-id="869"><strong data-dcnode-id="870"><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Kent/Canterbury/Canterbury_Cathedral/accommodation"><span data-dcnode-id="872" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="865"><strong data-dcnode-id="866"><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Kent/Canterbury/Canterbury_Cathedral/pictures/add"><span data-dcnode-id="868" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="863"></p><div data-dcnode-id="860" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="861" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="862" instrument_node="">ID#8874</span></p></div></div><div data-dcnode-id="801" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">7. The White Cliffs of Dover </span></h2><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Kent/Dover/The_White_Cliffs_of_Dover/pictures/1171158"><img data-dcnode-id="856" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1171158.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="845"><strong data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Dover - </span></strong><span data-dcnode-id="852" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/zbig75/pictures"><span data-dcnode-id="851" instrument_node="">Zbigniew Siwik</span></a><span data-dcnode-id="849" instrument_node=""> (</span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/zbig75/pictures"><span data-dcnode-id="848" instrument_node="">view gallery</span></a><span data-dcnode-id="846" instrument_node="">)</span></p><p data-dcnode-id="821"><span data-dcnode-id="844" instrument_node="">Often called the Gateway to England, the white cliffs of Dover along the southern coast of England are without doubt one of the country's most famous landmarks,  and have also become a symbol of freedom and hope, being strongly associated with the wartime defence of Britain, after the popular World War 2 song by Dame Vera Lynn "(There'll Be Bluebirds Over) The White Cliffs of Dover" -</span><br data-dcnode-id="843"><span data-dcnode-id="842" instrument_node="">
</span><br data-dcnode-id="841"><span data-dcnode-id="840" instrument_node="">
There'll be bluebirds over</span><br data-dcnode-id="839"><span data-dcnode-id="838" instrument_node="">
The white cliffs of Dover</span><br data-dcnode-id="837"><span data-dcnode-id="836" instrument_node="">
Tomorrow, just you wait and see</span><br data-dcnode-id="835"><span data-dcnode-id="834" instrument_node="">
There'll be love and laughter</span><br data-dcnode-id="833"><span data-dcnode-id="832" instrument_node="">
And peace ever after</span><br data-dcnode-id="831"><span data-dcnode-id="830" instrument_node="">
Tomorrow, when the world is free</span><br data-dcnode-id="829"><span data-dcnode-id="828" instrument_node="">
</span><br data-dcnode-id="827"><span data-dcnode-id="826" instrument_node="">
During the various wars throughout the centuries, the white cliffs of Dover were often a soldiers last sight of England as he went off to war, and should he survive, the cliffs were often the first thing he would see on his return, and were thus a great cause for excitement and celebration having made it home.</span><br data-dcnode-id="825"><span data-dcnode-id="824" instrument_node="">
</span><br data-dcnode-id="823"><span data-dcnode-id="822" instrument_node="">
Today, the White Cliffs of Dover are still a great cause for celebration as one of England's most fantastic natural features standing some 350 feet high, and stretching for 8 miles along the southern coast of England.</span></p><p data-dcnode-id="820"></p><ul data-dcnode-id="806"><li data-dcnode-id="815"><strong data-dcnode-id="816"><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Kent/Dover/The_White_Cliffs_of_Dover/pictures"><span data-dcnode-id="819" instrument_node="">More pictures of The White Cliffs of Dover</span></a><span data-dcnode-id="817" instrument_node="">...</span></strong></li><li data-dcnode-id="811"><strong data-dcnode-id="812"><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Kent/Dover/The_White_Cliffs_of_Dover/accommodation"><span data-dcnode-id="814" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="807"><strong data-dcnode-id="808"><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Kent/Dover/The_White_Cliffs_of_Dover/pictures/add"><span data-dcnode-id="810" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="805"></p><div data-dcnode-id="802" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="803" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="804" instrument_node="">ID#9175</span></p></div></div><span data-dcnode-id="799" instrument_node="">
</span><span data-dcnode-id="797" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-0763328592621217" data-ad-format="auto" data-ad-slot="7264467728" data-dcnode-id="796" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="795" instrument_node="">
</span><div data-dcnode-id="745" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">8. Blackpool Tower, Lancashire </span></h2><a data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Lancashire/Blackpool/pictures/1107427"><img data-dcnode-id="790" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1107427.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="779"><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Beach and Tower - </span></strong><span data-dcnode-id="786" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/kennyb/pictures"><span data-dcnode-id="785" instrument_node="">Ken Bolton</span></a><span data-dcnode-id="783" instrument_node=""> (</span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/kennyb/pictures"><span data-dcnode-id="782" instrument_node="">view gallery</span></a><span data-dcnode-id="780" instrument_node="">)</span></p><p data-dcnode-id="765"><span data-dcnode-id="778" instrument_node="">Blackpool, long famous for its vast illuminated Golden Mile, commenced its rise to fame way back in the Victorian Era when the famous seafront consisted of no more than a single row of houses.  In those far off days the resort was quiet, serene and just another of England's quaint fishing villages.  Then came the building of the railways and the building of Central Station in 1846, and from this point onwards, tourists flocked to Blackpool en-mass.   The North Pier was built in 1863 and the Winter Gardens were established in 1876.  Thus, the future of this quiet backwater as a mainline tourist resort, was assured. For good or ill, this famous resort has never looked back. The number of visitors doubled, trebled until it reached its peak of around 8 million visitors during the mid-1960's.  Today even greater number is estimated.</span><br data-dcnode-id="777"><span data-dcnode-id="776" instrument_node="">
</span><br data-dcnode-id="775"><span data-dcnode-id="774" instrument_node="">
The resort is probably best known for its famous Tower, built in 1894 it was for many years, at a soaring height of 518ft, the highest building in England.  The Tower could be seen from Cumbria in the north of England and from the Hills of North Wales.  From the top of this famous building there are magnificent views over the town and surrounding coastline. From this unique vantage point there is an unrivalled view of an ocean tinged gold by the rays of a setting sun.  Beneath this fabulous view lies the bustle of the Golden Mile where one can experience anything from a freak show to a fortune teller!  The mile is strewn with bars, disco's, amusement arcades, pubs and restaurants.  The whole area is a riot of colour from the millions of colourful lights that form the famous illuminations.  </span><br data-dcnode-id="773"><span data-dcnode-id="772" instrument_node="">
</span><br data-dcnode-id="771"><span data-dcnode-id="770" instrument_node="">
Each of the three piers is brightly lit and has its own theatre presenting live entertainment.  Many of todays (and yesterdays) theatrical stars have started their careers in the theatres and pubs of Blackpools golden mile.  The vast Pleasure Beach is known to have offered some of the first and most thrilling amusement park rides in Britain.  The whole area is brash, bold and breezy. It is a place of great fun for the very young and the young at heart.  A fish and chip supper straight from paper wraps whilst strolling along the prom is a must, so are welks and cockles from a fish bar at lunch time.  </span><br data-dcnode-id="769"><span data-dcnode-id="768" instrument_node="">
</span><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">
A few short miles away is the more sedate resort of Lytham St. Annes, home to one of the countries great championship golf courses.  All along this coast you will find mile after mile of gorgeous golden beaches and the choice is yours; sand and sun, a gentle round of golf, serious shopping in Lytham followed by a fun filled night under the stars and bright lights of Blackpool. Hectic, did I hear you say, some would say - one of lifes great experiences and definately not to be missed!</span></p><p data-dcnode-id="764"></p><ul data-dcnode-id="750"><li data-dcnode-id="759"><strong data-dcnode-id="760"><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Lancashire/Blackpool/pictures"><span data-dcnode-id="763" instrument_node="">More pictures of Blackpool</span></a><span data-dcnode-id="761" instrument_node="">...</span></strong></li><li data-dcnode-id="755"><strong data-dcnode-id="756"><a data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Lancashire/Blackpool/accommodation"><span data-dcnode-id="758" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="751"><strong data-dcnode-id="752"><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Lancashire/Blackpool/pictures/add"><span data-dcnode-id="754" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="749"></p><div data-dcnode-id="746" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="747" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="748" instrument_node="">ID#243</span></p></div></div><div data-dcnode-id="687" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">9. Cheddar Gorge, Somerset </span></h2><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Somerset/Cheddar/pictures/1135421"><img data-dcnode-id="742" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1135421.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="731"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Cheddar Gorge - </span></strong><span data-dcnode-id="738" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/lucyrita/pictures"><span data-dcnode-id="737" instrument_node="">Lucia Ladomerszky</span></a><span data-dcnode-id="735" instrument_node=""> (</span><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/lucyrita/pictures"><span data-dcnode-id="734" instrument_node="">view gallery</span></a><span data-dcnode-id="732" instrument_node="">)</span></p><p data-dcnode-id="707"><span data-dcnode-id="730" instrument_node="">Each year, thousands of visitors are drawn to Chedder and the wild beauty of the magnificent hills through which this famous gorge is cut.  Often called 'Englands Grand Canyon'  Chedder Gorge was carved out by a river that now runs underground.  On each side of the road that leads down to the village, cliffs rise majestically to the great heights of the Mendips Hills that are said to have been home to man and beast for thousands of years.  This fact is evidenced by several long barrows that date to the New Stone Age of around 3,000 BC.  There is evidence too, of a prosperous Bronze Age period and of Roman occupation.  This is an area with a long history which has travelled through turbulent times and has seen various industries come and go.  At one time mining featured heavily here, but always, over many centuries, and long before the vast underground caverns were opened for man to explore, farming has been at the heart of the communities that dwell within the Mendips.</span><br data-dcnode-id="729"><span data-dcnode-id="728" instrument_node="">
</span><br data-dcnode-id="727"><span data-dcnode-id="726" instrument_node="">
It is the tourist attraction of the vast underground caverns that causes thousands of visitors to flock to Chedder. They queue in their hundreds to see the spectacular underground chambers which feature crystalline formations that have been created by water action.  The caves are beautifully lit and present the visitor with a magical spectacle which is well worth seeing.  </span><br data-dcnode-id="725"><span data-dcnode-id="724" instrument_node="">
</span><br data-dcnode-id="723"><span data-dcnode-id="722" instrument_node="">
Just as cavers continue to explore the cavernous underground of these hollow, limestone hills, many climbers come here to scale the rock faces of the great cliffs that fill the ancient gorge.  Some come quite unprepaired for the weather changes, for in the high upland regions, change comes swiftly, sunlight gives way to swirling mist and it is then that one is easily trapped.  Fortunately, Chedder has an experienced rescue team than annually, both saves and helps many inexperienced climbers.  One can quite understand the desire to climb these beautiful hills, the scenery all around is quite magical and from the high ridges there are wonderful vistas of the Bristol Channel and Brean Down and, on clear days, the hills of Wales come into view.</span><br data-dcnode-id="721"><span data-dcnode-id="720" instrument_node="">
</span><br data-dcnode-id="719"><span data-dcnode-id="718" instrument_node="">
This is hallowed ground for the naturalist, the Mendip Hills reveal a rich bounty of flora and fauna.  The fragile looking but sturdy Chedder Pink, once gathered in bunches by the tourists of a hundred years or so ago, is now a rare flower and grows only in Chedder Gorge, blooming in the high summer months.  In late summer and autumn, many Butterflies can be spotted, they feed on the wild hedgegrow flowers such as  red campion and marjoram.  Many herbs and berries grow in the wooded areas. Blackberries grow in great profusion, and in cool, spacious openings between the trees you can find rosebay willowherb and paris.  The woodland regions are rich with a multiple of trees, there are huge old oaks, towering maples, gracious limes and douglas firs. In spring delicate bluebells and wood anemones grow in abundance forming a splendid carpet in the undergrowth beneath the trees.</span><br data-dcnode-id="717"><span data-dcnode-id="716" instrument_node="">
In autumn, the delicate colours of spring and summer give way to deeper hues when the leaves of trees and bushes change from green to brilliant red, copper and gold.  There is a rare peace to be found in these wooded areas where often all that can be heard is the sound of birdsong from the birds who inhabit these woods.  </span><br data-dcnode-id="715"><span data-dcnode-id="714" instrument_node="">
</span><br data-dcnode-id="713"><span data-dcnode-id="712" instrument_node="">
High on the Hills, narrow lanes wend through ancient hamlets and delightful little villages.  The surrounding land is a criss cross of fields hemmed in by leafy hedges and drystone walling.  Old farmhouses, strongly built to withstand the icy blast of the winterwinds are surrounded by lush meadows, grazed by cattle and sheep.  Here you are a world away from the tourist Chedder below, it is a region of sheer enchantment where every turn offers a fresh delight.</span><br data-dcnode-id="711"><span data-dcnode-id="710" instrument_node="">
</span><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">
In the village of Chedder you will find many gift shops; Somerset cider is plentiful as is the famous cheese for which this area is renowned.  There are several inns and public houses and a couple of traditional fish and chip shops.  There is much to do, see and admire in this area but your abiding memory will be the sheer grandeur of the scenery where the highest point echoes the words of the song - On a clear day - for the view is just that - as though you could see forever more!</span></p><p data-dcnode-id="706"></p><ul data-dcnode-id="692"><li data-dcnode-id="701"><strong data-dcnode-id="702"><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Somerset/Cheddar/pictures"><span data-dcnode-id="705" instrument_node="">More pictures of Cheddar</span></a><span data-dcnode-id="703" instrument_node="">...</span></strong></li><li data-dcnode-id="697"><strong data-dcnode-id="698"><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Somerset/Cheddar/accommodation"><span data-dcnode-id="700" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="693"><strong data-dcnode-id="694"><a data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Somerset/Cheddar/pictures/add"><span data-dcnode-id="696" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="691"></p><div data-dcnode-id="688" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="689" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="690" instrument_node="">ID#39</span></p></div></div><span data-dcnode-id="685" instrument_node="">
</span><span data-dcnode-id="683" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-0763328592621217" data-ad-format="auto" data-ad-slot="7264467728" data-dcnode-id="682" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="681" instrument_node="">
</span><div data-dcnode-id="641" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">10. Angel of the North, Gateshead </span></h2><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Tyne_%2526_Wear/Gateshead/Angel_of_the_North/pictures/1119599"><img data-dcnode-id="676" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1119599.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="665"><strong data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Angel of the North - </span></strong><span data-dcnode-id="672" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/iainmavin/pictures"><span data-dcnode-id="671" instrument_node="">Iain Mavin</span></a><span data-dcnode-id="669" instrument_node=""> (</span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/iainmavin/pictures"><span data-dcnode-id="668" instrument_node="">view gallery</span></a><span data-dcnode-id="666" instrument_node="">)</span></p><p data-dcnode-id="661"><span data-dcnode-id="664" instrument_node="">Britain's largest sculpture, The Angel of the North weighs in at 208 tonnes and stands 20 metres high. It was based on artist Antony Gormley's own body and has wings spanning  54 metres.</span><br data-dcnode-id="663"><span data-dcnode-id="662" instrument_node="">
This huge sculpture overlooks the A1 at Gateshead and at least 90,000 motorists a day will pass it by. It can also be seen on the train journey from London to Edinburgh.</span></p><p data-dcnode-id="660"></p><ul data-dcnode-id="646"><li data-dcnode-id="655"><strong data-dcnode-id="656"><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Tyne_%2526_Wear/Gateshead/Angel_of_the_North/pictures"><span data-dcnode-id="659" instrument_node="">More pictures of Angel of the North</span></a><span data-dcnode-id="657" instrument_node="">...</span></strong></li><li data-dcnode-id="651"><strong data-dcnode-id="652"><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Tyne_%2526_Wear/Gateshead/Angel_of_the_North/accommodation"><span data-dcnode-id="654" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="647"><strong data-dcnode-id="648"><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Tyne_%2526_Wear/Gateshead/Angel_of_the_North/pictures/add"><span data-dcnode-id="650" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="645"></p><div data-dcnode-id="642" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="643" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="644" instrument_node="">ID#148</span></p></div></div><div data-dcnode-id="601" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">11. Tower Bridge, London </span></h2><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Greater_London/London/Tower_Bridge/pictures/1067194"><img data-dcnode-id="638" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1067194.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="627"><strong data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Tower Bridge - </span></strong><span data-dcnode-id="634" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/jomosoft/pictures"><span data-dcnode-id="633" instrument_node="">John Frings</span></a><span data-dcnode-id="631" instrument_node=""> (</span><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/jomosoft/pictures"><span data-dcnode-id="630" instrument_node="">view gallery</span></a><span data-dcnode-id="628" instrument_node="">)</span></p><p data-dcnode-id="621"><span data-dcnode-id="626" instrument_node="">London Tower Bridge was completed in 1894. It is a beautiful piece of Victorian engineering and is one of the many symbols of London. The bridge itself was powered by steam right up until 1976 when the system was electrified. The bridge is 135 ft high and 200 ft wide and in its heyday was opened 5 times a day to let big ships through. The two towers are joined near the top by a catwalk which gives beautiful views along the river Thames.</span><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node="">
The bridge now offers The Tower Bridge Experience, which gives interactive displays showing the Bridge in action and detailing its entire history. You also get a walk along the catwalk and a look at the steam engine which once powered the bridge.</span><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node="">
</span></p><p data-dcnode-id="620"></p><ul data-dcnode-id="606"><li data-dcnode-id="615"><strong data-dcnode-id="616"><a data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Greater_London/London/Tower_Bridge/pictures"><span data-dcnode-id="619" instrument_node="">More pictures of Tower Bridge</span></a><span data-dcnode-id="617" instrument_node="">...</span></strong></li><li data-dcnode-id="611"><strong data-dcnode-id="612"><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Greater_London/London/Tower_Bridge/accommodation"><span data-dcnode-id="614" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="607"><strong data-dcnode-id="608"><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Greater_London/London/Tower_Bridge/pictures/add"><span data-dcnode-id="610" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="605"></p><div data-dcnode-id="602" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="603" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="604" instrument_node="">ID#31</span></p></div></div><span data-dcnode-id="599" instrument_node="">

</span><ins class="adsbygoogle" data-ad-client="ca-pub-0763328592621217" data-ad-format="auto" data-ad-slot="7264467728" data-dcnode-id="596" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="595" instrument_node="">
</span><div data-dcnode-id="555" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">12. Seven Sisters Cliffs, East Sussex </span></h2><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/East_Sussex/Cuckmere_Haven/Seven_Sisters_Country_Park/pictures/1203312"><img data-dcnode-id="590" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1203312.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="579"><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Seven Sisters, East Sussex - </span></strong><span data-dcnode-id="586" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/Sila/pictures"><span data-dcnode-id="585" instrument_node="">Kathleen Brookes</span></a><span data-dcnode-id="583" instrument_node=""> (</span><a data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/Sila/pictures"><span data-dcnode-id="582" instrument_node="">view gallery</span></a><span data-dcnode-id="580" instrument_node="">)</span></p><p data-dcnode-id="575"><span data-dcnode-id="578" instrument_node="">Although not quite as famous as the White Cliffs of Dover further along the coast, these chalk cliffs in East Sussex are just as breathtaking and are often used as a movie/TV stand-in for the Dover cliffs, as being left to erode naturally they remain a brighter white in comparison to the cliffs at Dover which are slightly more green due to protection, which allows plantlife to establish itself.</span><br data-dcnode-id="577"><span data-dcnode-id="576" instrument_node="">Notable appearences on TV and film include at the beginning of Robin Hood: Prince of Thieves, at the end of the World War II film Atonement, in the 2015 film Mr. Holmes, the 2019 film Hope Gap, and in the 2020 film Summerland. </span></p><p data-dcnode-id="574"></p><ul data-dcnode-id="560"><li data-dcnode-id="569"><strong data-dcnode-id="570"><a data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/East_Sussex/Cuckmere_Haven/Seven_Sisters_Country_Park/pictures"><span data-dcnode-id="573" instrument_node="">More pictures of Seven Sisters Country Park</span></a><span data-dcnode-id="571" instrument_node="">...</span></strong></li><li data-dcnode-id="565"><strong data-dcnode-id="566"><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/East_Sussex/Cuckmere_Haven/Seven_Sisters_Country_Park/accommodation"><span data-dcnode-id="568" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="561"><strong data-dcnode-id="562"><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/East_Sussex/Cuckmere_Haven/Seven_Sisters_Country_Park/pictures/add"><span data-dcnode-id="564" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="559"></p><div data-dcnode-id="556" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="557" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="558" instrument_node="">ID#9803</span></p></div></div><div data-dcnode-id="503" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">13. Ironbridge, Shropshire </span></h2><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Shropshire/Ironbridge/pictures/1007206"><img data-dcnode-id="552" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1007206.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="541"><strong data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Ironbridge, Telford, Shropshire. UK - </span></strong><span data-dcnode-id="548" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/100749/pictures"><span data-dcnode-id="547" instrument_node="">John Powell</span></a><span data-dcnode-id="545" instrument_node=""> (</span><a data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/100749/pictures"><span data-dcnode-id="544" instrument_node="">view gallery</span></a><span data-dcnode-id="542" instrument_node="">)</span></p><p data-dcnode-id="523"><span data-dcnode-id="540" instrument_node="">This town is named for the famous bridge that spans the River Severn - the world's first Iron Bridge.  Completed in 1781 it was built by Abraham Darby III to advertise his ironworks at nearby Coalbrookdale.  Within a year the worth of Iron as a building material was proven. During that period, a flood had washed away all the other bridges except for this one. </span><br data-dcnode-id="539"><span data-dcnode-id="538" instrument_node="">
</span><br data-dcnode-id="537"><span data-dcnode-id="536" instrument_node="">
It was the pioneering work of Abraham Darby's grandfather in the iron industry that earned this little town the distinction of being the cradle of the Industrial Revolution.  The ironworks at Coalbrookdale saw the birth of the very first Iron wheels, Iron rails, Iron boat, Aquaduct, Iron framed buildings and the famous bridge.</span><br data-dcnode-id="535"><span data-dcnode-id="534" instrument_node="">
</span><br data-dcnode-id="533"><span data-dcnode-id="532" instrument_node="">
Much of the industrial heritage of Ironbridge and Coalbrookdale is preserved by the Ironbridge Gorge Museum. This is an enchanted valley of working museums and real history. On show are images and objects from an industrial revolution which changed forever not only the great heartland of the Midlands but many other towns and Cities throughout England, if not the World.  It is Coalbrookdale that we have to thank for that which is the pride of every English country kitchen - the Aga oven, for it was here that this unique oven was first invented.</span><br data-dcnode-id="531"><span data-dcnode-id="530" instrument_node="">
</span><br data-dcnode-id="529"><span data-dcnode-id="528" instrument_node="">
Centre of industry this area may be but there is some very pleasant countryside close-by with an abundance of public houses where a genial host will be happy to serve you with a tasty meal and a good pint of his excellent ale.</span><br data-dcnode-id="527"><span data-dcnode-id="526" instrument_node="">
</span><br data-dcnode-id="525"><span data-dcnode-id="524" instrument_node="">
The Wrekin is a local beauty spot and Benthall Hall owned by the National Trust is well worth a visit.  The mighty River Severn  meanders merrily throughout this area and at times, is almost in-line with the Severn Valley Steam Railway line which runs from Kidderminster to the nearby town of Bridgenorth.</span></p><p data-dcnode-id="522"></p><ul data-dcnode-id="508"><li data-dcnode-id="517"><strong data-dcnode-id="518"><a data-dcnode-id="520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Shropshire/Ironbridge/pictures"><span data-dcnode-id="521" instrument_node="">More pictures of Ironbridge</span></a><span data-dcnode-id="519" instrument_node="">...</span></strong></li><li data-dcnode-id="513"><strong data-dcnode-id="514"><a data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Shropshire/Ironbridge/accommodation"><span data-dcnode-id="516" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="509"><strong data-dcnode-id="510"><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Shropshire/Ironbridge/pictures/add"><span data-dcnode-id="512" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="507"></p><div data-dcnode-id="504" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="505" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="506" instrument_node="">ID#258</span></p></div></div><span data-dcnode-id="501" instrument_node="">
</span><span data-dcnode-id="499" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-0763328592621217" data-ad-format="auto" data-ad-slot="7264467728" data-dcnode-id="498" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="497" instrument_node="">
</span><div data-dcnode-id="442" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">14. Hadrian's Wall </span></h2><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Northumberland/Bardon_Mill/Hadrian%2527s_Wall_%2526_Housesteads_Fort/pictures/1156687"><img data-dcnode-id="492" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1156687.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="481"><strong data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Hadrians Wall - </span></strong><span data-dcnode-id="488" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/HappySnapper/pictures"><span data-dcnode-id="487" instrument_node="">Martin Humphreys</span></a><span data-dcnode-id="485" instrument_node=""> (</span><a data-dcnode-id="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/HappySnapper/pictures"><span data-dcnode-id="484" instrument_node="">view gallery</span></a><span data-dcnode-id="482" instrument_node="">)</span></p><p data-dcnode-id="480"></p><p data-dcnode-id="466"><span data-dcnode-id="479" instrument_node="">Built in AD 122 under the orders of the emperor Hadrian to guard the northern frontiers of the Roman Empire, </span><strong data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Hadrian's Wall</span></strong><span data-dcnode-id="476" instrument_node=""> is an incredible feat of engineering, crossing 73 miles of northern Britain from Wallsend on the east coast of England, to Bowness-on-Solway in the west. It was made a UNESCO World Heritage Site in 1987.</span><br data-dcnode-id="475"><br data-dcnode-id="474"><span data-dcnode-id="473" instrument_node="">A common misconception is that the wall was built by Roman slaves, however this is incorrect. The wall was actually built by skilled Roman legionary masons, with labour provided by thousands of auxiliary soldiers. It is thought to have taken around 6 years to complete the wall. </span><br data-dcnode-id="472"><br data-dcnode-id="471"><span data-dcnode-id="470" instrument_node="">Although initially built to defend Roman controlled Britain from the barbarians in the north,&nbsp; the wall and garrisons stationed along it were often overrun by the barbarians, and the wall was eventually abandoned after 40 years for a new wall of turf in Scotland. However this did not work so the romans reverted back to Hadrian's Wall. </span><br data-dcnode-id="469"><br data-dcnode-id="468"><span data-dcnode-id="467" instrument_node="">There are many sites where you can visit the wall today, and we recommend visiting the English Heritage website to begin planning your visit to this remarkable British landmark.Their website contains all the information you would need, including a history of Hadrian's Wall and lots of facts and stories.</span></p><p data-dcnode-id="463"><a data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.english-heritage.org.uk/visit/places/hadrians-wall/" target="_blank"><span data-dcnode-id="465" instrument_node="">https://www.english-heritage.org.uk/visit/places/hadrians-wall/</span></a></p><p data-dcnode-id="462"></p><p data-dcnode-id="461"></p><ul data-dcnode-id="447"><li data-dcnode-id="456"><strong data-dcnode-id="457"><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Northumberland/Bardon_Mill/Hadrian%2527s_Wall_%2526_Housesteads_Fort/pictures"><span data-dcnode-id="460" instrument_node="">More pictures of Hadrian's Wall &amp; Housesteads Fort</span></a><span data-dcnode-id="458" instrument_node="">...</span></strong></li><li data-dcnode-id="452"><strong data-dcnode-id="453"><a data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Northumberland/Bardon_Mill/Hadrian%2527s_Wall_%2526_Housesteads_Fort/accommodation"><span data-dcnode-id="455" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="448"><strong data-dcnode-id="449"><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Northumberland/Bardon_Mill/Hadrian%2527s_Wall_%2526_Housesteads_Fort/pictures/add"><span data-dcnode-id="451" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="446"></p><div data-dcnode-id="443" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="444" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="445" instrument_node="">ID#3724</span></p></div></div><div data-dcnode-id="403" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">15. Brighton Pier, East Sussex </span></h2><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/East_Sussex/Brighton/Brighton_Pier/pictures/1117582"><img data-dcnode-id="439" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1117582.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="428"><strong data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Brighton Pier - </span></strong><span data-dcnode-id="435" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/Belinda/pictures"><span data-dcnode-id="434" instrument_node="">Belinda Neasham</span></a><span data-dcnode-id="432" instrument_node=""> (</span><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/Belinda/pictures"><span data-dcnode-id="431" instrument_node="">view gallery</span></a><span data-dcnode-id="429" instrument_node="">)</span></p><p data-dcnode-id="423"><span data-dcnode-id="427" instrument_node="">Britain is home to the oldest pleasure pier in the world, Ryde Pier on the Isle of Wight which was built in 1813, however the most famous of all Britain's piers is the one at Brighton which was opened in 1899 and is visited by millions of people each year. It is a beautiful treasure from Victorian times and is home to </span><span class="ILfuVd" data-dcnode-id="424"><span class="hgKElc" data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">a waterfront theme park with rides, restaurants, arcades and other activities, and of course a beautiful view across the south-coast of England. </span></span></span></p><p data-dcnode-id="422"></p><ul data-dcnode-id="408"><li data-dcnode-id="417"><strong data-dcnode-id="418"><a data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/East_Sussex/Brighton/Brighton_Pier/pictures"><span data-dcnode-id="421" instrument_node="">More pictures of Brighton Pier</span></a><span data-dcnode-id="419" instrument_node="">...</span></strong></li><li data-dcnode-id="413"><strong data-dcnode-id="414"><a data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/East_Sussex/Brighton/Brighton_Pier/accommodation"><span data-dcnode-id="416" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="409"><strong data-dcnode-id="410"><a data-dcnode-id="411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/East_Sussex/Brighton/Brighton_Pier/pictures/add"><span data-dcnode-id="412" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="407"></p><div data-dcnode-id="404" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="405" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="406" instrument_node="">ID#10497</span></p></div></div><span data-dcnode-id="401" instrument_node="">
