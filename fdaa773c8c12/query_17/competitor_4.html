</span><div data-dcnode-id="352" style="margin-bottom:10px;margin-top:10px;background-color:#ffffff;border:1px solid grey;padding: 0px 10px 5px 10px;"><h2 data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">16. The Eden Project, Cornwall </span></h2><a data-dcnode-id="391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Cornwall/Bodelva/The_Eden_Project/pictures/1020799"><img data-dcnode-id="392" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/img/X/1020799.jpg&amp;raw" width=""></a><p class="small" data-dcnode-id="381"><strong data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Biodomes of the Eden project in evening light. - </span></strong><span data-dcnode-id="388" instrument_node="">Image by PicturesOfEngland.com member </span><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/JonathanCharles/pictures"><span data-dcnode-id="387" instrument_node="">Jonathan Charles</span></a><span data-dcnode-id="385" instrument_node=""> (</span><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/user/JonathanCharles/pictures"><span data-dcnode-id="384" instrument_node="">view gallery</span></a><span data-dcnode-id="382" instrument_node="">)</span></p><p data-dcnode-id="372"><span data-dcnode-id="380" instrument_node="">Last but not least on this list of famous England Landmarks is the brilliant Eden Project in Cornwall, England, which is a fascinating dome structure containing a collection of</span><span data-dcnode-id="377"><span data-dcnode-id="378"><span data-dcnode-id="379" instrument_node=""> plants that are collected from many diverse climates and environments. It was constructed in 2001 to </span></span></span><span data-dcnode-id="374"><span data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">support biodiversity and be educational in the inter-dependence of plants and people, and boasts the world's largest rain forest in captivity, complete with humid jungle, waterfalls, and a </span></span></span><span data-dcnode-id="373" instrument_node="">rainforest canopy walkway that takes you above the treetops. There is much more to this fantastic world-famous attraction too, such as world-class scultpures and art,&nbsp; 30 acres of wonderful outdoor garden displays, educational centres, and delicious locally-sourced food in the cafes, all making for a great day out to remember. </span></p><p data-dcnode-id="371"></p><ul data-dcnode-id="357"><li data-dcnode-id="366"><strong data-dcnode-id="367"><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Cornwall/Bodelva/The_Eden_Project/pictures"><span data-dcnode-id="370" instrument_node="">More pictures of The Eden Project</span></a><span data-dcnode-id="368" instrument_node="">...</span></strong></li><li data-dcnode-id="362"><strong data-dcnode-id="363"><a data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Cornwall/Bodelva/The_Eden_Project/accommodation"><span data-dcnode-id="365" instrument_node="">Nearby accommodation</span></a></strong></li><li data-dcnode-id="358"><strong data-dcnode-id="359"><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.picturesofengland.com/England/Cornwall/Bodelva/The_Eden_Project/pictures/add"><span data-dcnode-id="361" instrument_node="">Add your pictures</span></a></strong></li></ul><p data-dcnode-id="356"></p><div data-dcnode-id="353" style="text-align:center;margin:0px;padding:0px;"><p class="small" data-dcnode-id="354" style="color:#999999;margin:0px;padding:0px;"><span data-dcnode-id="355" instrument_node="">ID#130</span></p></div></div><d
