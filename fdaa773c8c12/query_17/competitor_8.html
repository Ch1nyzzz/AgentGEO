de-id="1325" instrument_node="">12</span></span><span data-dcnode-id="1323" instrument_node=""> The Spire of Dublin</span></a></li><li data-dcnode-id="1316"><a data-dcnode-id="1317" href="#Killarney_National_Park_County_Kerry"><span class="toc_number toc_depth_1" data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">13</span></span><span data-dcnode-id="1318" instrument_node=""> Killarney National Park, County Kerry</span></a></li><li data-dcnode-id="1311"><a data-dcnode-id="1312" href="#Kilmainham_Gaol_Dublin"><span class="toc_number toc_depth_1" data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">14</span></span><span data-dcnode-id="1313" instrument_node=""> Kilmainham Gaol, Dublin</span></a></li><li data-dcnode-id="1306"><a data-dcnode-id="1307" href="#Gallarus_Oratory_on_Dingle_Peninsula"><span class="toc_number toc_depth_1" data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">15</span></span><span data-dcnode-id="1308" instrument_node=""> Gallarus Oratory on Dingle Peninsula</span></a></li><li data-dcnode-id="1301"><a data-dcnode-id="1302" href="#Kylemore_Abbey_County_Galway"><span class="toc_number toc_depth_1" data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">16</span></span><span data-dcnode-id="1303" instrument_node=""> Kylemore Abbey, County Galway</span></a></li><li data-dcnode-id="1296"><a data-dcnode-id="1297" href="#Hill_of_Tara_County_Meath"><span class="toc_number toc_depth_1" data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">17</span></span><span data-dcnode-id="1298" instrument_node=""> Hill of Tara, County Meath</span></a></li><li data-dcnode-id="1291"><a data-dcnode-id="1292" href="#Samuel_Beckett_Bridge_Dublin"><span class="toc_number toc_depth_1" data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">18</span></span><span data-dcnode-id="1293" instrument_node=""> Samuel Beckett Bridge, Dublin</span></a></li><li data-dcnode-id="1286"><a data-dcnode-id="1287" href="#Titanic_Belfast_Northern_Ireland"><span class="toc_number toc_depth_1" data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">19</span></span><span data-dcnode-id="1288" instrument_node=""> Titanic Belfast, Northern Ireland</span></a></li><li data-dcnode-id="1281"><a data-dcnode-id="1282" href="#Giants_Causeway_Northern_Ireland"><span class="toc_number toc_depth_1" data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">20</span></span><span data-dcnode-id="1283" instrument_node=""> Giants Causeway, Northern Ireland</span></a></li></ul></div><span data-dcnode-id="1278" instrument_node="">
</span><h2 data-dcnode-id="1273"><span data-dcnode-id="1274" id="Famous_Landmarks_in_Ireland"><span data-dcnode-id="1277" instrument_node="">F</span><strong data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">amous Landmarks in Ireland</span></strong></span></h2><span data-dcnode-id="1272" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="1265"><img alt="Ross Castle, Killarney National Park, County Kerry, Ireland." class="wp-image-4325 lazy-loaded" data-dcnode-id="1271" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Ross_Castle_Killarney_Ireland.jpg" height="667" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/uploads/2020/11/Ross_Castle_Killarney_Ireland.jpg&amp;raw" width="1536"><noscript data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">&lt;img loading="lazy" src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Ross_Castle_Killarney_Ireland.jpg" alt="Ross Castle, Killarney National Park, County Kerry, Ireland." class="wp-image-4325" width="1536" height="667"/&gt;</span></noscript><figcaption data-dcnode-id="1266"><em data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">There are many fabulous castles in Ireland, such as Ross Castle in Killarney National Park in County Kerry.</span></em></figcaption></figure><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Ireland is known for its beautiful landscapes, rugged coastlines, lively culture and rich history. This unique combination leaves a footprint on the landscape which can be seen in the diversity of the landmarks in Ireland.&nbsp;</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">A landmark is a distinguishing natural or manmade feature, object or structure of significant aesthetic, historical or cultural importance.&nbsp;</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">In Ireland, remarkable landmarks are found throughout the country so it is difficult to narrow down the list to just a few. This post introduces you to the unmissable Irish landmarks that you will find nowhere else in the world.&nbsp;</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Top Dublin landmarks are included in this article, as well as famous landmarks in Northern Ireland.&nbsp;</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Please note that the numbers do not indicate any particular order or ranking. We think that all of these landmarks are well worth visiting and should be added to your bucket list!</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1245"><strong data-dcnode-id="1246"><a data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/what-is-ireland-known-for/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1248" instrument_node="">What to know what Ireland is famous for? Read here for some interesting insights!</span></a></strong></p><span data-dcnode-id="1244" instrument_node="">
</span><h2 data-dcnode-id="1240"><span data-dcnode-id="1241" id="Skellig_Islands"><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Skellig Islands</span></strong></span></h2><span data-dcnode-id="1239" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="1232"><img alt="Bee-hive huts on Skellig Michael, Ireland." class="wp-image-4327 lazy-loaded" data-dcnode-id="1238" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Bee-Hive_Huts_Skellig_Michael_Ireland.jpg" data-srcset="" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/uploads/2020/11/Bee-Hive_Huts_Skellig_Michael_Ireland.jpg&amp;raw" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Bee-Hive_Huts_Skellig_Michael_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Bee-Hive_Huts_Skellig_Michael_Ireland-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Bee-Hive_Huts_Skellig_Michael_Ireland-768x512.jpg 768w" width="1536"><noscript data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Bee-Hive_Huts_Skellig_Michael_Ireland.jpg" alt="Bee-hive huts on Skellig Michael, Ireland." class="wp-image-4327" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Bee-Hive_Huts_Skellig_Michael_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Bee-Hive_Huts_Skellig_Michael_Ireland-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Bee-Hive_Huts_Skellig_Michael_Ireland-768x512.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><figcaption data-dcnode-id="1233"><em data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">The bee-hive huts built by the monks are still very well preserved on this remote island.</span></em></figcaption></figure><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">The two, rocky, steep-sided islands off the south west coast of Ireland were once thought to be the edge of the known world. Today, the larger of the two islands, Skellig Michael (Scelig Mhichíl) is one of the most famous of all Irish landmarks for its historical and environmental importance and more recently, its otherworldly appearance in the Star Wars Episode VII “The Force Awakens”.&nbsp;</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Sometime between the 6th and 8th centuries, the first monks settled on Skellig Michael and built the iconic bee-hive huts as part of a Christian monastery.&nbsp;</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1224" instrument_node="">The isolated nature of the location, roughly 12 km off the coast of </span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/kerry-ireland/" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">County Kerry</span></strong></a><span data-dcnode-id="1220" instrument_node="">, has helped to preserve the early Christian settlement in remarkable condition, which resulted in the island being designated as a </span><strong data-dcnode-id="1217"><a data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/list/757/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1219" instrument_node="">UNESCO World Heritage Site</span></a></strong><span data-dcnode-id="1216" instrument_node=""> in 1996.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Both Skellig Michael and the smaller island, Little Skellig are home to protected seabirds such as Storm-petrels, Puffins, Guillimots and Kittiwakes and are important internationally recognised breeding areas.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1210" instrument_node="">In recent times, Skellig Michael has become even more well known due to its use as a </span><strong data-dcnode-id="1207"><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/star-wars-ireland/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1209" instrument_node="">filming location for Star Wars </span></a></strong><span data-dcnode-id="1206" instrument_node="">and the smaller of the islands, </span><strong data-dcnode-id="1203"><a data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/harry-potter-ireland/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1205" instrument_node="">Little Skellig was also featured in the Harry Potter Film</span></a></strong><span data-dcnode-id="1202" instrument_node="">.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Due to the sensitive nature of settlement and the protected seabird colonies, visitors are only allowed to visit Skellig Michael during the summer months and strict visitor quotas apply.&nbsp;</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">If you do wish to visit, make sure you book a place on the ferry boat to Skellig Michael well in advance to ensure that you will be able to enjoy the wonder of this amazing landmark.&nbsp;</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Skellig Michael landing tour boats depart from Portmagee, Caherdaniel or Ballinskelligs Pier in County Kerry. In Portmagee you will also find the Skellig Experience where you can learn more about Skellig Michael and its rich history.&nbsp;</span></p><span data-dcnode-id="1191" instrument_node="">
</span><h2 data-dcnode-id="1187"><span data-dcnode-id="1188" id="Newgrange_and_Bru_na_Boinnenbsp"><strong data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Newgrange and Brú na Bóinne&nbsp;</span></strong></span></h2><span data-dcnode-id="1186" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="1176"><img alt="Newgrange passage tomb, Brú na Bóinne, County Meath Ireland." class="wp-image-3172 lazy-loaded" data-dcnode-id="1185" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/03/medium-Newgrange.jpg" data-srcset="" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/uploads/2020/03/medium-Newgrange.jpg&amp;raw" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/03/medium-Newgrange.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2020/03/medium-Newgrange-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/03/medium-Newgrange-768x512.jpg 768w" width="1536"><noscript data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/03/medium-Newgrange.jpg" alt="Newgrange passage tomb, Brú na Bóinne, County Meath Ireland." class="wp-image-3172" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/03/medium-Newgrange.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2020/03/medium-Newgrange-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/03/medium-Newgrange-768x512.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="1177"><em data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">The well known landmark of Newgrange is instantly recognisable by its iconic white stone facade.</span></em><br data-dcnode-id="1180"><em data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Photo by Brian Morrison / Tourism Ireland via Ireland’s Content Pool</span></em></figcaption></figure><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1174" instrument_node="">Another </span><strong data-dcnode-id="1171"><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/list/659" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1173" instrument_node="">UNESCO World Heritage Site</span></a></strong><span data-dcnode-id="1170" instrument_node=""> is the Brú na Boinne Complex in the Boyne Valley, County Meath. The area in and around the River Boyne has been a focal point of human settlement in Ireland for over 6,000 years, resulting in a rich archeological history.&nbsp;</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">The most famous of the Irish landmarks in Brú na Bóinne are the three passage tombs of Knowth, Dowth and Newgrange that were built about 5000 years ago during the Late Stone Age period. (Yes, they are older than the Egyptian pyramids!)&nbsp;</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Newgrange is the one of the most recognised historical landmarks in Ireland. This neolithic monument has a unique alignment that allows sunlight to enter the burial chamber only in the days around the winter solstice.&nbsp;</span></p><span data-dcnode-id="1162" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="1155"><img alt="Newgrange Entrance Stone" class="wp-image-4343 lazy-loaded" data-dcnode-id="1161" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Entrance_Stone_Newgrange_Ireland.jpg" data-srcset="" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/uploads/2020/11/Entrance_Stone_Newgrange_Ireland.jpg&amp;raw" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Entrance_Stone_Newgrange_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Entrance_Stone_Newgrange_Ireland-300x197.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Entrance_Stone_Newgrange_Ireland-768x503.jpg 768w" width="1536"><noscript data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Entrance_Stone_Newgrange_Ireland.jpg" alt="Newgrange Entrance Stone" class="wp-image-4343" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Entrance_Stone_Newgrange_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Entrance_Stone_Newgrange_Ireland-300x197.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Entrance_Stone_Newgrange_Ireland-768x503.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><figcaption data-dcnode-id="1156"><em data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">The Newgrange passage tomb entrance stone is particularly ornate. The sunlight enters the chamber through the opening above the doorway.</span></em></figcaption></figure><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">The megalithic art on the entrance stone and the standing stones around the large mound is truly exquisite. Depictions of spirals, chevrons, triangles and arcs can be seen in the intricate ancient carvings.</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">The Brú na Bóinne Visitor Centre provides additional background and information about the site and guided tours of the passage tomb are available. It is also possible to apply there for the draw to be one of the lucky few to be inside the tomb for the occurrence of the winter solstice.&nbsp;</span></p><span data-dcnode-id="1148" instrument_node="">
</span><h2 data-dcnode-id="1145"><span data-dcnode-id="1146" id="Guinness_Storehouse"><span data-dcnode-id="1147" instrument_node="">Guinness Storehouse</span></span></h2><span data-dcnode-id="1144" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="1137"><img alt="Gravity Bar in the Guinness Storehouse, Dublin, Ireland." class="wp-image-1396 lazy-loaded" data-dcnode-id="1143" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2019/05/Gravity_Bar_View_Guinness_Storehouse_Dublin_Ireland-1024x536.jpg" data-srcset="" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/uploads/2019/05/Gravity_Bar_View_Guinness_Storehouse_Dublin_Ireland-1024x536.jpg&amp;raw" srcset="https://www.letsgoireland.com/wp-content/uploads/2019/05/Gravity_Bar_View_Guinness_Storehouse_Dublin_Ireland-1024x536.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2019/05/Gravity_Bar_View_Guinness_Storehouse_Dublin_Ireland-300x157.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2019/05/Gravity_Bar_View_Guinness_Storehouse_Dublin_Ireland-768x402.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2019/05/Gravity_Bar_View_Guinness_Storehouse_Dublin_Ireland.jpg 1200w" width="1536"><noscript data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2019/05/Gravity_Bar_View_Guinness_Storehouse_Dublin_Ireland-1024x536.jpg" alt="Gravity Bar in the Guinness Storehouse, Dublin, Ireland." class="wp-image-1396" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2019/05/Gravity_Bar_View_Guinness_Storehouse_Dublin_Ireland-1024x536.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2019/05/Gravity_Bar_View_Guinness_Storehouse_Dublin_Ireland-300x157.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2019/05/Gravity_Bar_View_Guinness_Storehouse_Dublin_Ireland-768x402.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2019/05/Gravity_Bar_View_Guinness_Storehouse_Dublin_Ireland.jpg 1200w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="1138"><em data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">The impressive view from the Gravity Bar in the Guinness Storehouse, Dublin.</span></em></figcaption></figure><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">One of the things Ireland is most known for is its famous beer Guinness. It is therefore no coincidence that one of the most popular landmarks in Ireland is the Guinness Storehouse in Dublin. In fact, it has been the most visited attraction in Ireland for several years with over 1.7 million visitors in 2018.&nbsp;</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Arthur Guinness founded Guinness in 1759 and started his brewery in St. James’s Gate in Dublin, where Guinness is still produced today.&nbsp;</span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">The Guinness Storehouse visitor center building is situated next to the St. James’s Gate Brewery and extends over seven floors detailing the brewing process, as well as the history and marketing concepts of this hugely successful company.&nbsp;</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Reviews of this attraction often state that visitors highly enjoy the Gravity Bar on top of the Guinness Storehouse. This is where they will experience unbeatable views of the Dublin City skyline along with a perfect pint of the Irish “Black Stuff”, if they so wish.&nbsp;</span></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1120"><strong data-dcnode-id="1121"><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/dublin-3-day-itinerary/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1123" instrument_node="">For more tips about the Guinness Storehouse read our other article here.&nbsp;</span></a></strong></p><span data-dcnode-id="1119" instrument_node="">
</span><h2 data-dcnode-id="1116"><span data-dcnode-id="1117" id="Cliffs_of_Moher"><span data-dcnode-id="1118" instrument_node="">Cliffs of Moher</span></span></h2><span data-dcnode-id="1115" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="1108"><img alt="Cliffs of Moher, County Clare, Ireland" class="wp-image-3506 lazy-loaded" data-dcnode-id="1114" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/06/Cliff-Coast-Cliffs-of-Moher-Sunset_©Christopher-Hill-Photographic-1024x800.jpg" data-srcset="" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/uploads/2020/06/Cliff-Coast-Cliffs-of-Moher-Sunset_%25C2%25A9Christopher-Hill-Photographic-1024x800.jpg&amp;raw" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/06/Cliff-Coast-Cliffs-of-Moher-Sunset_©Christopher-Hill-Photographic-1024x800.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2020/06/Cliff-Coast-Cliffs-of-Moher-Sunset_©Christopher-Hill-Photographic-300x234.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/06/Cliff-Coast-Cliffs-of-Moher-Sunset_©Christopher-Hill-Photographic-768x600.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/06/Cliff-Coast-Cliffs-of-Moher-Sunset_©Christopher-Hill-Photographic.jpg 1536w" width="1536"><noscript data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/06/Cliff-Coast-Cliffs-of-Moher-Sunset_©Christopher-Hill-Photographic-1024x800.jpg" alt="Cliffs of Moher, County Clare, Ireland" class="wp-image-3506" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/06/Cliff-Coast-Cliffs-of-Moher-Sunset_©Christopher-Hill-Photographic-1024x800.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2020/06/Cliff-Coast-Cliffs-of-Moher-Sunset_©Christopher-Hill-Photographic-300x234.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/06/Cliff-Coast-Cliffs-of-Moher-Sunset_©Christopher-Hill-Photographic-768x600.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/06/Cliff-Coast-Cliffs-of-Moher-Sunset_©Christopher-Hill-Photographic.jpg 1536w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="1109"><em data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">The world famous Cliffs of Moher at sunset.</span></em></figcaption></figure><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">The Cliffs of Moher are undoubtedly one of the most internationally famous Irish landmarks and a highly popular tourist attraction in Ireland.&nbsp;</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1103" instrument_node="">Situated on the west coast of the country in County Clare, the Cliffs of Moher are just one of the star attractions along the </span><strong data-dcnode-id="1100"><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/the-wild-atlantic-way/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1102" instrument_node="">Wild Atlantic Way </span></a></strong><span data-dcnode-id="1099" instrument_node="">coastal drive. The cliff edge stretches about 8 km (5 miles) along the Atlantic Ocean coastline coast and reaches 214 meters (702 feet) at the highest point.&nbsp;</span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">The view of the towering wall of rock looks particularly stunning at sunset, when the rays of the sun illuminate the rockface.&nbsp;</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">A modern visitor center has been built to enhance the Cliffs of Moher visitor experience and provide more background and information about the geography and geology of the area.&nbsp;</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1090" instrument_node="">Due to their unique geology the Burren and the Cliffs of Moher have been designated a </span><strong data-dcnode-id="1087"><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unesco.org/new/en/natural-sciences/environment/earth-sciences/unesco-global-geoparks/list-of-unesco-global-geoparks/ireland/burren-cliffs-of-moher/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1089" instrument_node="">UNESCO Global Geopark</span></a></strong><span data-dcnode-id="1086" instrument_node="">.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Visitors often plan a day tour to the Cliffs of Moher in combination with a visit to the nearby Burren. Tour buses to the Cliffs of Moher depart daily from the main cities including Dublin, Galway and Cork.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1080" instrument_node="">The cliffs have also been used as filming locations for both </span><strong data-dcnode-id="1077"><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/harry-potter-ireland/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1079" instrument_node="">Harry Potter</span></a></strong><span data-dcnode-id="1076" instrument_node=""> and the </span><strong data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Princess Bride </span></strong><span data-dcnode-id="1073" instrument_node="">movies</span><strong data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">.&nbsp;</span></strong></p><span data-dcnode-id="1069" instrument_node="">
</span><h2 data-dcnode-id="1065"><span data-dcnode-id="1066" id="HaPenny_Bridge_Dublin"><strong data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Ha’Penny Bridge Dublin</span></strong></span></h2><span data-dcnode-id="1064" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="1055"><img alt="Ha’Penny Bridge, Dublin, Ireland" class="wp-image-4359 lazy-loaded" data-dcnode-id="1063" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/The-Ha-penny-Bridge_Tourism_Ireland-1024x435.jpg" data-srcset="" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/uploads/2020/11/The-Ha-penny-Bridge_Tourism_Ireland-1024x435.jpg&amp;raw" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/The-Ha-penny-Bridge_Tourism_Ireland-1024x435.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The-Ha-penny-Bridge_Tourism_Ireland-300x128.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The-Ha-penny-Bridge_Tourism_Ireland-768x327.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The-Ha-penny-Bridge_Tourism_Ireland-1536x653.jpg 1536w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The-Ha-penny-Bridge_Tourism_Ireland-scaled.jpg 2048w" width="1536"><noscript data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/11/The-Ha-penny-Bridge_Tourism_Ireland-1024x435.jpg" alt="Ha’Penny Bridge, Dublin, Ireland" class="wp-image-4359" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/The-Ha-penny-Bridge_Tourism_Ireland-1024x435.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The-Ha-penny-Bridge_Tourism_Ireland-300x128.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The-Ha-penny-Bridge_Tourism_Ireland-768x327.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The-Ha-penny-Bridge_Tourism_Ireland-1536x653.jpg 1536w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The-Ha-penny-Bridge_Tourism_Ireland-scaled.jpg 2048w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="1056"><em data-dcnode-id="1057"><span data-dcnode-id="1060" instrument_node="">The Ha’Penny Bridge is one of the most famous sights in Dublin. </span><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">Photo courtesy of Tourism Ireland via Ireland’s Content Pool</span></em></figcaption></figure><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">The Ha’Penny Bridge is arguably one of Dublin’s best loved landmarks and one of Ireland’s best known bridges. Built in 1816, this iconic pedestrian bridge spans the River Liffey.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">The cast iron bridge arches elegantly 3 meters over the river, has a 43 meters span and is 3.5 meters wide. Decorative lamp posts add to the special charm to this landmark.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">It was built by the Liffey ferry operator William Walsh, who decided to construct a bridge rather than repair his aging ferries. A toll of half a penny was charged to cross the bridge until about 1919, hence the name “Ha’Penny”. The official name of the bridge is the Liffey Bridge.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">As the bridge is very centrally located in Dublin City and close to Temple Bar, it is popular with tourists, as well as Dubliners alike with tens of thousands of people traveling across it each day.&nbsp;</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Movies such as Far and Away (1992) and Michael Collins (1996) also feature this bridge.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><h2 data-dcnode-id="1035"><span data-dcnode-id="1036" id="Poulnabrone_Dolmen_in_the_Burren"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Poulnabrone Dolmen in the Burren</span></strong></span></h2><span data-dcnode-id="1034" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="1027"><img alt="" class="lazy-hidden wp-image-4329" data-dcnode-id="1033" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Poulnabrone_Dolmen_Burren_Ireland.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Poulnabrone_Dolmen_Burren_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Poulnabrone_Dolmen_Burren_Ireland-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Poulnabrone_Dolmen_Burren_Ireland-768x512.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Poulnabrone_Dolmen_Burren_Ireland.jpg" alt="" class="wp-image-4329" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Poulnabrone_Dolmen_Burren_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Poulnabrone_Dolmen_Burren_Ireland-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Poulnabrone_Dolmen_Burren_Ireland-768x512.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><figcaption data-dcnode-id="1028"><em data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">The Poulnabrone portal dolmen is an impressive landmark in the Burren.</span></em></figcaption></figure><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">The Poulnabrone Portal Dolmen is an iconic landmark located on the karst limestone pavement of the Burren, County Clare. Undoubtedly this megalithic monument is one of the most famous of Irish portal tombs and is designated a National Monument of Ireland.&nbsp;</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Not only is the structure of the monument highly impressive, but the lunar-like rocky surroundings make it a very striking feature on the landscape and a popular destination for tourists and photographers alike!</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">The portal dolmen of Poulnabrone stands almost 2 meters tall and has a capstone roughly 3.5 meters in length. It consists of upright stones and topped by a slanted capstone. The large stone behind the tomb is thought to have been another capstone that has since collapsed.&nbsp;</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Given the basic tools and equipment (ropes, pulleys and ramps etc.) that were available at the time this was built, it is even more impressive that such portal stones could be maneuvered into place and still remain standing to the present day.&nbsp;</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1013" instrument_node="">In 1986, the Poulnabrone dolmen site was excavated and the human remains of about 22 individuals, both adults and children were found in the burial chamber</span><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">.</span></strong><span data-dcnode-id="1010" instrument_node=""> Along with the remains, other ancient artifacts such as pendants, beads, a polished stone axe and pottery were found in the burial chamber.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><h2 data-dcnode-id="1005"><span data-dcnode-id="1006" id="Blarney_Castle"><span data-dcnode-id="1007" instrument_node="">Blarney Castle</span></span></h2><span data-dcnode-id="1004" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="997"><img alt="Blarney Castle and Gardens, County Cork, Ireland." class="lazy-hidden wp-image-2266" data-dcnode-id="1003" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2019/09/Blarney-Castle-County-Cork-Ireland-in-spring-1024x536.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2019/09/Blarney-Castle-County-Cork-Ireland-in-spring-1024x536.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2019/09/Blarney-Castle-County-Cork-Ireland-in-spring-300x157.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2019/09/Blarney-Castle-County-Cork-Ireland-in-spring-768x402.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2019/09/Blarney-Castle-County-Cork-Ireland-in-spring.jpg 1200w" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2019/09/Blarney-Castle-County-Cork-Ireland-in-spring-1024x536.jpg" alt="Blarney Castle and Gardens, County Cork, Ireland." class="wp-image-2266" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2019/09/Blarney-Castle-County-Cork-Ireland-in-spring-1024x536.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2019/09/Blarney-Castle-County-Cork-Ireland-in-spring-300x157.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2019/09/Blarney-Castle-County-Cork-Ireland-in-spring-768x402.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2019/09/Blarney-Castle-County-Cork-Ireland-in-spring.jpg 1200w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="998"><em data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">The beautiful Blarney Castle and Gardens awaits those who wish to kiss the Blarney Stone. </span></em></figcaption></figure><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="995" instrument_node="">Situated in the south west of Ireland, a short distance outside </span><strong data-dcnode-id="992"><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/cork-ireland/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="994" instrument_node="">Cork City</span></a></strong><span data-dcnode-id="991" instrument_node=""> is the Blarney Castle, home of the internationally famous Blarney Stone. Originally dating back to about 1200, the castle has a rich history and was occupied by Cormac MacCarthy, the King of Munster in the 12th century.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="988" instrument_node="">Many tourists travel especially to </span><strong data-dcnode-id="985"><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/day-trips-from-cork/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="987" instrument_node="">Cork</span></a></strong><span data-dcnode-id="984" instrument_node=""> to visit this popular Irish tourist attraction. The experience of kissing the Blarney Stone, by hanging backwards over a high drop, is one of the main highlights. All of those who complete this act of aerial acrobatics is said to receive the gift of eloquence for life…. Try it for yourself and see!</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Furthermore, the grounds surrounding the castle are exceptionally well maintained and a wonderful place to explore. There are several different gardens including an arboretum, Poison Garden and a Fern Garden.&nbsp;</span></p><span data-dcnode-id="979" instrument_node="">
</span><h2 data-dcnode-id="974"><span data-dcnode-id="975" id="Trinity_College_Dublin_and_the_Book_of_Kells"><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Trinity College Dublin and the Book of Kell</span></strong><span data-dcnode-id="976" instrument_node="">s</span></span></h2><span data-dcnode-id="973" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="964"><img alt="View of the Long Room of Trinity College Dublin, Ireland." class="lazy-hidden wp-image-4357" data-dcnode-id="972" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Trinity-College-Dublin_Unknown_Tourism_Ireland-767x1024.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Trinity-College-Dublin_Unknown_Tourism_Ireland-767x1024.jpg 767w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Trinity-College-Dublin_Unknown_Tourism_Ireland-225x300.jpg 225w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Trinity-College-Dublin_Unknown_Tourism_Ireland-768x1025.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Trinity-College-Dublin_Unknown_Tourism_Ireland.jpg 899w" sizes="(max-width: 767px) 100vw, 767px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Trinity-College-Dublin_Unknown_Tourism_Ireland-767x1024.jpg" alt="View of the Long Room of Trinity College Dublin, Ireland." class="wp-image-4357" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Trinity-College-Dublin_Unknown_Tourism_Ireland-767x1024.jpg 767w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Trinity-College-Dublin_Unknown_Tourism_Ireland-225x300.jpg 225w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Trinity-College-Dublin_Unknown_Tourism_Ireland-768x1025.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Trinity-College-Dublin_Unknown_Tourism_Ireland.jpg 899w" sizes="(max-width: 767px) 100vw, 767px" /&gt;</span></noscript><figcaption data-dcnode-id="965"><em data-dcnode-id="966"><span data-dcnode-id="969" instrument_node="">The Long Room of Trinity College Dublin is one of the most beautiful libraries in the world. </span><br data-dcnode-id="968"><span data-dcnode-id="967" instrument_node="">Photo courtesy of Tourism Ireland via Ireland’s Content Pool</span></em></figcaption></figure><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">On College Green, right in the center of Ireland’s capital is Trinity College Dublin, the oldest university in the country. The beautiful 18th-century monuments and buildings, as well as gardens and sports grounds make the university a lovely place to wander around and explore.&nbsp;</span></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Former Trinity students include Oscar Wilde, Samuel Beckett, Bram Stoker, as well as the female presidents of Ireland Mary Robinson and Mary McAleese to name but a few. </span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="953"><strong data-dcnode-id="954"><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/normal-people-ireland-filming-locations/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="956" instrument_node="">Sally Rooney, the author of Normal People also studied here and many parts of the hit series were filmed on the campus.</span></a></strong></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">The Book of Kells is probably one of the highlights of Trinity College Dublin, with hundreds of thousands of visitors flocking to see this unique medieval illuminated manuscript each year.&nbsp;</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Thought to date back to about the 8th century, this national treasure was kept for many years in the Abbey of Kells in County Meath, hence its name.&nbsp;</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">It contains the four Gospels of the New Testament exquisitely decorated with illustrations and ornamentation. The Chi Rho page and the cover page of each of the Gospels are exceptionally ornately decorated.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">In addition to viewing the manuscript itself, visitors also have access to the Long Room, arguably one of the most beautiful libraries in the world. The old library has a wooden barrel vaulted ceiling and its rows of bookshelves and busts are remarkably striking.</span></p><span data-dcnode-id="940" instrument_node="">
</span><h2 data-dcnode-id="937"><span data-dcnode-id="938" id="Rock_of_Cashel"><span data-dcnode-id="939" instrument_node="">Rock of Cashel</span></span></h2><span data-dcnode-id="936" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="929"><img alt="Rock of Cashel, COunty Tipperary, Ireland" class="lazy-hidden wp-image-4124" data-dcnode-id="935" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/10/Rock_of_Cashel_Ireland.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2020/10/Rock_of_Cashel_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/10/Rock_of_Cashel_Ireland-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/10/Rock_of_Cashel_Ireland-768x512.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/10/Rock_of_Cashel_Ireland.jpg" alt="Rock of Cashel, COunty Tipperary, Ireland" class="wp-image-4124" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/10/Rock_of_Cashel_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/10/Rock_of_Cashel_Ireland-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/10/Rock_of_Cashel_Ireland-768x512.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><figcaption data-dcnode-id="930"><em data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">From the Rock of Cashel there are unrivalled view of the surrounding landscape. </span></em></figcaption></figure><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="927" instrument_node="">For more than 1,000 years, the Rock of Cashel in County Tipperary has been a site of great importance in Ireland and it is now one of the highlights of </span><strong data-dcnode-id="924"><a data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/east-coast-of-ireland/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="926" instrument_node="">Ireland’s Ancient East</span></a></strong><span data-dcnode-id="923" instrument_node=""> historical trail.&nbsp;</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">The rocky outcrop commands excellent views over the lower lying areas, making it a very strategic location that was once the seat of the Kings of Munster. It is even said to be the spot that Saint Patrick converted King Aenghus to Christianity.</span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Around the 12th century, the site was given to the church and over the following centuries the number of buildings at the location continued to expand. </span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">They include a round tower (unfortunately not accessible to the public), as well as an architecturally significant 12th century Romanesque chapel, a 13th century cathedral, a 15th century Tower House and the Hall of the Vicars Choral.</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">A wander around the nearby less well known, but highly impressive Hore Abbey, as well as&nbsp;Cashel town is also worth it.&nbsp;&nbsp;</span></p><span data-dcnode-id="909" instrument_node="">
</span><h2 data-dcnode-id="905"><span data-dcnode-id="906" id="Dun_Aonghasa_on_the_Aran_Islands"><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Dún Aonghasa on the Aran Islands</span></strong></span></h2><span data-dcnode-id="904" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="895"><img alt="Dún Aonghasa on Inis Mór, County Galway, Ireland." class="lazy-hidden wp-image-4354" data-dcnode-id="903" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Dun-Aengus-Inishmore-Aran-Islands-County-Galway_C_Failte-IrelandTourism-Irelandy_by_Gareth_McCormack-1024x682.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Dun-Aengus-Inishmore-Aran-Islands-County-Galway_C_Failte-IrelandTourism-Irelandy_by_Gareth_McCormack-1024x682.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Dun-Aengus-Inishmore-Aran-Islands-County-Galway_C_Failte-IrelandTourism-Irelandy_by_Gareth_McCormack-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Dun-Aengus-Inishmore-Aran-Islands-County-Galway_C_Failte-IrelandTourism-Irelandy_by_Gareth_McCormack-768x512.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Dun-Aengus-Inishmore-Aran-Islands-County-Galway_C_Failte-IrelandTourism-Irelandy_by_Gareth_McCormack-1536x1023.jpg 1536w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Dun-Aengus-Inishmore-Aran-Islands-County-Galway_C_Failte-IrelandTourism-Irelandy_by_Gareth_McCormack.jpg 1801w" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Dun-Aengus-Inishmore-Aran-Islands-County-Galway_C_Failte-IrelandTourism-Irelandy_by_Gareth_McCormack-1024x682.jpg" alt="Dún Aonghasa on Inis Mór, County Galway, Ireland." class="wp-image-4354" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Dun-Aengus-Inishmore-Aran-Islands-County-Galway_C_Failte-IrelandTourism-Irelandy_by_Gareth_McCormack-1024x682.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Dun-Aengus-Inishmore-Aran-Islands-County-Galway_C_Failte-IrelandTourism-Irelandy_by_Gareth_McCormack-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Dun-Aengus-Inishmore-Aran-Islands-County-Galway_C_Failte-IrelandTourism-Irelandy_by_Gareth_McCormack-768x512.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Dun-Aengus-Inishmore-Aran-Islands-County-Galway_C_Failte-IrelandTourism-Irelandy_by_Gareth_McCormack-1536x1023.jpg 1536w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Dun-Aengus-Inishmore-Aran-Islands-County-Galway_C_Failte-IrelandTourism-Irelandy_by_Gareth_McCormack.jpg 1801w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="896"><em data-dcnode-id="897"><span data-dcnode-id="900" instrument_node="">Dún Aonghasa with the crashing waves of the Atlantic Ocean at the base of the cliff. </span><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">Photo by Gareth McCormack, copyright Fáilte Ireland/Tourism Ireland via Ireland’s Content Pool</span></em></figcaption></figure><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="893" instrument_node="">Off the </span><strong data-dcnode-id="890"><a data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/west-coast-of-ireland/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="892" instrument_node="">west coast </span></a></strong><span data-dcnode-id="889" instrument_node="">of County Galway lie the three islands of Inis Mór (Inishmore), Inis Meáin (Inishmaan) and Inis Oírr (Inisheer), known collectively as the Aran Islands.&nbsp;</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">The largest of these islands, Inis Mór, is home to one of the most impressive promontory forts in the world, Dún Aonghasa. This prehistoric stone fort is literally perched on the edge of a cliff edge 100 meters above the crashing waves of the wild Atlantic Ocean.&nbsp;</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Earliest settlement at Dún Aonghusa is thought to date back over 3,000 years. The structure has been modified and fortified through the Bronze Age and Iron Age. Originally, the fort was probably oval in shape, but over time parts have collapsed into the sea, giving it its current D-shape.&nbsp;</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">The defence system of the fort consists of four concentric walls that are up to 4 meters thick in places. The outermost wall encompasses an area of about 6 hectares (14 acres), making it a large ruin by prehistoric standards.&nbsp;</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">In addition to the walls, there is also a field of up-right rocks, known as a “Cheval de frise”. While some of the walls and steps have been restored, other parts, including the up-right rock field are very well preserved.&nbsp;</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">As well as having a tour of this heritage site, it is really worth spending some time exploring the unique scenery and culture of the Aran Islands.&nbsp;</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">The rocky landscape, somewhat similar to the Burren in County Clare, is framed by miles and miles of stone walls. The Irish playwright, John Millington Synge, was particularly fond of the islands. During his visits, he collected folklore and learned Irish, which is still predominantly spoken on the islands today.&nbsp;</span></p><span data-dcnode-id="869" instrument_node="">
</span><h2 data-dcnode-id="866"><span data-dcnode-id="867" id="The_Spire_of_Dublin"><span data-dcnode-id="868" instrument_node="">The Spire of Dublin</span></span></h2><span data-dcnode-id="865" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="858"><img alt="The Spire on O'Connell Street, Dublin, Ireland." class="lazy-hidden wp-image-4331" data-dcnode-id="864" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/The_Spire_Dublin-652x1024.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/The_Spire_Dublin-652x1024.jpg 652w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The_Spire_Dublin-191x300.jpg 191w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The_Spire_Dublin-768x1205.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The_Spire_Dublin-979x1536.jpg 979w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The_Spire_Dublin-scaled.jpg 1305w" sizes="(max-width: 652px) 100vw, 652px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/11/The_Spire_Dublin-652x1024.jpg" alt="The Spire on O'Connell Street, Dublin, Ireland." class="wp-image-4331" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/The_Spire_Dublin-652x1024.jpg 652w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The_Spire_Dublin-191x300.jpg 191w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The_Spire_Dublin-768x1205.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The_Spire_Dublin-979x1536.jpg 979w, https://www.letsgoireland.com/wp-content/uploads/2020/11/The_Spire_Dublin-scaled.jpg 1305w" sizes="(max-width: 652px) 100vw, 652px" /&gt;</span></noscript><figcaption data-dcnode-id="859"><em data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">You can’t miss The Spire on O’Connell Street in Dublin City!</span></em></figcaption></figure><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="856" instrument_node="">One striking landmark in </span><strong data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Dublin</span></strong><span data-dcnode-id="853" instrument_node=""> City centre is “The Spire” or the “Monument of Light” (“Túr Solais” in Irish). This stainless steel, needle shaped monument stands 120 meters tall, with the base measuring 3 meters in diameter and the apex just 15 centimeters.&nbsp;</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">An international competition was held to select the design for the monument, which was won by the London-based Ian Ritchie Architects.</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">It is a relatively modern addition to the Dublin skyline having been completed in January 2003. Situated on O’Connell Street at the site of the former Nelson Pillar, this landmark has pride of place in the capital.&nbsp;</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">As usual, the Dubliners were quick to christen the monument with some creative monikers such as the “Spike” and the “Stiletto in the Ghetto”.</span></p><span data-dcnode-id="842" instrument_node="">
</span><h2 data-dcnode-id="839"><span data-dcnode-id="840" id="Killarney_National_Park_County_Kerry"><span data-dcnode-id="841" instrument_node="">Killarney National Park, County Kerry</span></span></h2><span data-dcnode-id="838" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="832"><img alt="Lady's View in Killarney National Park, County Kerry." class="lazy-hidden wp-image-4181" data-dcnode-id="837" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/10/Ladys_View_Killarney_National_Park_Ireland.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2020/10/Ladys_View_Killarney_National_Park_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/10/Ladys_View_Killarney_National_Park_Ireland-300x191.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/10/Ladys_View_Killarney_National_Park_Ireland-768x488.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/10/Ladys_View_Killarney_National_Park_Ireland.jpg" alt="Lady's View in Killarney National Park, County Kerry." class="wp-image-4181" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/10/Ladys_View_Killarney_National_Park_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/10/Ladys_View_Killarney_National_Park_Ireland-300x191.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/10/Ladys_View_Killarney_National_Park_Ireland-768x488.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><figcaption data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">The vista from Lady’s View in Killarney National Park, County Kerry.</span></figcaption></figure><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="830" instrument_node="">In the south west of Ireland lies County Kerry, home to Killarney National Park. This incredibly scenic landscape was designated as the first national park in Ireland in </span><strong data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">1932</span></strong><span data-dcnode-id="827" instrument_node=""> and recognised as a UNESCO Biosphere Reserve in 1991.&nbsp;</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">The park is highly regarded internationally for its ecological value in terms of its flora, fauna and unique woodland areas. It has a broad diversity of bryophytes (mosses and liverworts), as well as several very rare, protected species including the Killarney fern. Native red deer (as well as the non-native sika deer) are also found within the park.&nbsp;</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Undoubtedly, the Lakes of Killarney are one of the park’s main highlights. On the shores of one of the lakes, Lough Leane, lies the idyllically situated Ross Castle.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">For amazing views of the landscape that was greatly influenced by the ice age, head to Ladies View for an unparalleled vista.&nbsp;</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">In the park, there are several wonderful walking trails of different difficult levels suitable for all abilities.&nbsp;</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Other places that should not be missed within the park include 19th century Muckross House and Gardens, Muckross Abbey and the picturesque Torc Waterfall.&nbsp;&nbsp;</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Killarney town is only a short distance away from the park, as is the famous Gap of Dunloe. While in the area, it is also possible to take a trip around the Ring of Kerry, one of Ireland’s most scenic driving routes.</span></p><span data-dcnode-id="807" instrument_node="">
</span><h2 data-dcnode-id="802"><span data-dcnode-id="803" id="Kilmainham_Gaol_Dublin"><strong data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Kilmainham Gaol</span></strong><span data-dcnode-id="804" instrument_node="">, Dublin</span></span></h2><span data-dcnode-id="801" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="794"><img alt="Interior of Kilmainham Gaol, Dublin, Ireland." class="lazy-hidden wp-image-3648" data-dcnode-id="800" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/08/Kilmainham-Gaol-Dublin-Ireland.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2020/08/Kilmainham-Gaol-Dublin-Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/08/Kilmainham-Gaol-Dublin-Ireland-300x201.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/08/Kilmainham-Gaol-Dublin-Ireland-768x514.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/08/Kilmainham-Gaol-Dublin-Ireland.jpg" alt="Interior of Kilmainham Gaol, Dublin, Ireland." class="wp-image-3648" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/08/Kilmainham-Gaol-Dublin-Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/08/Kilmainham-Gaol-Dublin-Ireland-300x201.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/08/Kilmainham-Gaol-Dublin-Ireland-768x514.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><figcaption data-dcnode-id="795"><em data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">The classic old prison architecture inside Kilmainham Gaol is well worth seeing!</span></em></figcaption></figure><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">From both a historical and architectural point of Kilmainham Gaol (pronounced “jail” and often misspelled as Kilmainham Goal) played a central role in the Irish civil war.&nbsp;</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Located near the Phoenix Park on the outskirts of Dublin City, this is definitely a very important historical landmark.</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Nearly all of the main freedom fighters (such as Robert Emmet and Charles Stewart Parnell) and the rebel leaders of the Easter Rising (including Patrick Pearse and Thomas MacDonagh) were incarcerated and many executed in this prison.&nbsp;</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">In fact, Ireland’s first president, Èamonn de Valera, was one of the last prisoners to leave the prison before it closed.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">In addition to its important place in Irish history, this building has also been used as a filming location for several different films, including “The Italian Job”, “In the Name of the Father” (1993) and more recently, “The Wind that Shakes the Barley” (2006). U2 also featured the building in their video for the song “A Celebration”.&nbsp;</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Tours of Kilmainham Gaol museum are available, enabling visitors to learn more about the history and view the impressive interior prison architecture of this famous national monument. Be sure to book your tour a day or two in advance. Only a limited number of people are allowed per tour and this is a popular attraction.</span></p><span data-dcnode-id="775" instrument_node="">
</span><h2 data-dcnode-id="771"><span data-dcnode-id="772" id="Gallarus_Oratory_on_Dingle_Peninsula"><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Gallarus Oratory on Dingle Peninsula</span></strong></span></h2><span data-dcnode-id="770" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="763"><img alt="" class="lazy-hidden wp-image-4335" data-dcnode-id="769" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Gallarus_Oratory_Ireland.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Gallarus_Oratory_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Gallarus_Oratory_Ireland-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Gallarus_Oratory_Ireland-768x512.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Gallarus_Oratory_Ireland.jpg" alt="" class="wp-image-4335" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Gallarus_Oratory_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Gallarus_Oratory_Ireland-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Gallarus_Oratory_Ireland-768x512.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><figcaption data-dcnode-id="764"><em data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">The unusual structure of Gallarus Oratory looks more like an upturned boat rather than the traditional design of a church. </span></em></figcaption></figure><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">One of Ireland’s most unusual looking landmarks is one that dates back to about the 12th century. Gallarus Oratory, on the Dingle Peninsula in County Kerry, is a small stone building with a very distinctive appearance, thought to have been used as a small church or oratory.</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Dry stone masonry was used to create a corbelled vault that resembles an upturned boat. The precise positioning of overlaid stones created sloping sides that ensure that the rain and elements are kept out of the structure.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">The interior of the building is very dimly lit as the only light comes from the doorway at the entrance and a single round window on the rear wall</span></p><span data-dcnode-id="753" instrument_node="">
</span><h2 data-dcnode-id="750"><span data-dcnode-id="751" id="Kylemore_Abbey_County_Galway"><span data-dcnode-id="752" instrument_node="">Kylemore Abbey, County Galway</span></span></h2><span data-dcnode-id="749" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="739"><img alt="Kylemore Abbey, Connemara, County Galway" class="lazy-hidden wp-image-4352" data-dcnode-id="748" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Kylemore-Abbey_Chris_Hill-1024x683.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Kylemore-Abbey_Chris_Hill-1024x683.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Kylemore-Abbey_Chris_Hill-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Kylemore-Abbey_Chris_Hill-768x512.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Kylemore-Abbey_Chris_Hill-1536x1024.jpg 1536w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Kylemore-Abbey_Chris_Hill.jpg 1800w" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Kylemore-Abbey_Chris_Hill-1024x683.jpg" alt="Kylemore Abbey, Connemara, County Galway" class="wp-image-4352" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Kylemore-Abbey_Chris_Hill-1024x683.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Kylemore-Abbey_Chris_Hill-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Kylemore-Abbey_Chris_Hill-768x512.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Kylemore-Abbey_Chris_Hill-1536x1024.jpg 1536w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Kylemore-Abbey_Chris_Hill.jpg 1800w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="740"><em data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Kylemore Abbey set and the scenic surroundings of Lough Pollacapall in Connemara, County Galway. </span></em><br data-dcnode-id="743"><em data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Photo by Chris Hill / Tourism Ireland via Ireland’s Content Pool</span></em></figcaption></figure><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="737" instrument_node="">One very photogenic Irish landmark is Kylemore Abbey in Connemara National Park, </span><strong data-dcnode-id="734"><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/galway-ireland/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="736" instrument_node="">County Galway</span></a></strong><span data-dcnode-id="733" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Built as a private home by Mitchell Henry and his wife Margaret Henry in the 19th century, the stunning Kylemore Castle is a popular attraction along the Wild Atlantic Way coastal drive. The reflections of the building in Lough Pollacapall add beauty to this particularly picturesque landmark.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">In 1920, Benedictine nuns from Ypres in Belgium founded an abbey on the grounds of the castle after their own abbey was destroyed by bombing during the First World War. The gothic church and Victorian walled garden have been restored and maintained by the nuns down through the years. Kylemore Abbey was also home to a boarding school for girls until it closed in 2010.&nbsp;</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Visitors can experience tours of the Abbey to learn more about its rich history and enjoy wandering in the gardens.</span></p><span data-dcnode-id="722" instrument_node="">
</span><h2 data-dcnode-id="719"><span data-dcnode-id="720" id="Hill_of_Tara_County_Meath"><span data-dcnode-id="721" instrument_node="">Hill of Tara, County Meath</span></span></h2><span data-dcnode-id="718" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="711"><img alt="Hill of Tara, County Meath, Ireland." class="lazy-hidden wp-image-4341" data-dcnode-id="717" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Hill_of_Tara_Ireland-1.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Hill_of_Tara_Ireland-1.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Hill_of_Tara_Ireland-1-300x225.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Hill_of_Tara_Ireland-1-768x575.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Hill_of_Tara_Ireland-1.jpg" alt="Hill of Tara, County Meath, Ireland." class="wp-image-4341" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Hill_of_Tara_Ireland-1.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Hill_of_Tara_Ireland-1-300x225.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Hill_of_Tara_Ireland-1-768x575.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><figcaption data-dcnode-id="712"><em data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">In this aerial photograph of the Hill of Tara, the circular earthen rings and the Mound of Hostages to the bottom right of the image can be seen. </span></em></figcaption></figure><span data-dcnode-id="710" instrument_node="">
