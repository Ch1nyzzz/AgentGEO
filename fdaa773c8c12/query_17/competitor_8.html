</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">The area in and around the Boyne Valley in County Meath was a hotspot of activity during the Stone, Bronze and Iron Ages. The Hill of Tara, the ancient Seat of Power of Ireland, can attest to this fact. This famous mound has a rich archeological history and is the source of many fanciful Irish myths and legends dating back over 3,000 years.&nbsp;</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Today, the most recognizable feature of the Hill of Tara is the raised circular earthen mounds are still visible on the landscape. During its high time in the late Stone Age and early Iron Age, the Hill of Tara was the inaugural site of the High Kings of Ireland, with significant importance as an entrance to the otherworld in Pagan belief.&nbsp;</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">One of the most intriguing ancient monuments is the standing stone Lia Fáil- or Stone of Destiny, one of treasures of the Tutha de Dannan which is said to cry out when the rightful high King touches it.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">In the surrounding area there are a number of other monuments also dating to this period, the oldest being a passage tomb named The Mound of Hostages. Other monuments hidden beneath the surface have been discovered using aerial photography and geophysical survey work.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">More information about this fascinating ancient site can be found in the The Hill of Tara Visitor Centre.</span></p><span data-dcnode-id="695" instrument_node="">
</span><h2 data-dcnode-id="690"><span data-dcnode-id="691" id="Samuel_Beckett_Bridge_Dublin"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Samuel Beckett Bridge</span></strong><span data-dcnode-id="692" instrument_node="">, Dublin</span></span></h2><span data-dcnode-id="689" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="681"><img alt="Samuel Beckett Bridge, Dublin, Ireland." class="lazy-hidden wp-image-4333" data-dcnode-id="688" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Samuel_Beckett_Bridge_Dublin_Ireland.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Samuel_Beckett_Bridge_Dublin_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Samuel_Beckett_Bridge_Dublin_Ireland-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Samuel_Beckett_Bridge_Dublin_Ireland-768x511.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Samuel_Beckett_Bridge_Dublin_Ireland.jpg" alt="Samuel Beckett Bridge, Dublin, Ireland." class="wp-image-4333" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Samuel_Beckett_Bridge_Dublin_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Samuel_Beckett_Bridge_Dublin_Ireland-300x200.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Samuel_Beckett_Bridge_Dublin_Ireland-768x511.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><figcaption data-dcnode-id="682"><span data-dcnode-id="685" instrument_node="">T</span><em data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">he elegant and very fitted harp inspired design of the Samuel Beckett Bridge is a unmissable landmark in Dublin.</span></em></figcaption></figure><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">The second of Dublin’s famous bridge landmarks is the Samuel Beckett Bridge. This contemporary bridge was opened in 2009 and links Sir John Rogerson Quay to the Docklands area of Dublin City.&nbsp;</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">The stunning design, created by the Spaniard, Santiago Calatrava, and has won several international awards. The slender design of the structure was inspired by the Irish harp, which has been the national symbol of Ireland for centuries.&nbsp;</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">At its highest point, the steel pylon reaches 46 meters (151 feet) above the River Liffey. The bridge is 124 meters (407 feet) long and 27 meters (89 feet) wide and is open both to pedestrians and vehicular traffic. The structure rotates through 90 ° degrees to allow taller vessels to pass.&nbsp;</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">It is named after the Dubliner, Samuel Becket, who was the winner of the Nobel Prize for Literature in 1969.&nbsp;</span></p><span data-dcnode-id="668" instrument_node="">
</span><h2 data-dcnode-id="665"><span data-dcnode-id="666" id="Titanic_Belfast_Northern_Ireland"><span data-dcnode-id="667" instrument_node="">Titanic Belfast, Northern Ireland</span></span></h2><span data-dcnode-id="664" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="655"><img alt="Titanic Belfast in the Titanic Quarter, Northern Ireland" class="lazy-hidden wp-image-4348" data-dcnode-id="663" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris_Hill-1024x927.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris_Hill-1024x927.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris_Hill-300x272.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris_Hill-768x696.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris_Hill.jpg 1325w" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris_Hill-1024x927.jpg" alt="Titanic Belfast in the Titanic Quarter, Northern Ireland" class="wp-image-4348" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris_Hill-1024x927.jpg 1024w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris_Hill-300x272.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris_Hill-768x696.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris_Hill.jpg 1325w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="656"><em data-dcnode-id="657"><span data-dcnode-id="660" instrument_node="">The Titanic Belfast is a stunningly beautiful landmark that pays tribute to the RMS Titanic as well as the history of shipbuilding in the Titanic Quarter area. </span><br data-dcnode-id="659"><span data-dcnode-id="658" instrument_node="">Photo copyright Chris Hill / Tourism Ireland via Ireland’s Content Pool</span></em></figcaption></figure><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="653" instrument_node="">Not only is the Titanic Belfast one of the most modern and interesting visitor attraction in </span><strong data-dcnode-id="650"><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/northern-ireland/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="652" instrument_node="">Northern Ireland</span></a></strong><span data-dcnode-id="649" instrument_node="">, the spectacular architecture of the building makes it one of the best Belfast landmarks.&nbsp;</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">The museum is situated on the site of the former Harland &amp; Wolff shipyard where the actual RMS Titanic vessel was built for the White Star Line Company. In a nod to the heritage of the area, this part of Belfast City has been renamed the Titanic Quarter.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Designed to resemble the prows of a ship, the elaborate Aluminium outer structure of the museum is inspired by the maritime influences.</span></p><span data-dcnode-id="641" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="631"><img alt="Titanic Belfast and the Titanica sculpture by Rowan Gillespie, Belfast, Northern Ireland" class="lazy-hidden wp-image-4350" data-dcnode-id="640" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris-Hill_Tourism-Ireland-768x1024.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris-Hill_Tourism-Ireland-768x1024.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris-Hill_Tourism-Ireland-225x300.jpg 225w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris-Hill_Tourism-Ireland.jpg 900w" sizes="(max-width: 768px) 100vw, 768px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris-Hill_Tourism-Ireland-768x1024.jpg" alt="Titanic Belfast and the Titanica sculpture by Rowan Gillespie, Belfast, Northern Ireland" class="wp-image-4350" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris-Hill_Tourism-Ireland-768x1024.jpg 768w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris-Hill_Tourism-Ireland-225x300.jpg 225w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Titanic-Belfast_C_Chris-Hill_Tourism-Ireland.jpg 900w" sizes="(max-width: 768px) 100vw, 768px" /&gt;</span></noscript><figcaption data-dcnode-id="632"><em data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">The light catches the Titanic Belfast building in a mesmerising way. “Titanica” by Rowan Gillespie is the sculpture of the diving woman, similar to the female figure heads on ships bows located in front of the museum. </span></em><br data-dcnode-id="635"><em data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Photo copyright Chris Hill / Tourism Ireland via Ireland’s Content Pool</span></em></figcaption></figure><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">The Titanic visitor experience is second to none, with state of the art galleries and interactive exhibits enabling you to explore the world of Titanic in depth, from the ship building process through the disastrous maiden voyage and the underwater remains.</span></p><span data-dcnode-id="627" instrument_node="">
</span><h2 data-dcnode-id="622"><span data-dcnode-id="623" id="Giants_Causeway_Northern_Ireland"><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Giants Causeway</span></strong><span data-dcnode-id="624" instrument_node="">, Northern Ireland</span></span></h2><span data-dcnode-id="621" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="614"><img alt="" class="lazy-hidden wp-image-4339" data-dcnode-id="620" data-lazy-type="image" data-src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Giants_Causeway_Northern_Ireland.jpg" data-srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Giants_Causeway_Northern_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Giants_Causeway_Northern_Ireland-300x197.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Giants_Causeway_Northern_Ireland-768x505.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1536"><noscript data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">&lt;img src="https://www.letsgoireland.com/wp-content/uploads/2020/11/Giants_Causeway_Northern_Ireland.jpg" alt="" class="wp-image-4339" width="1536" srcset="https://www.letsgoireland.com/wp-content/uploads/2020/11/Giants_Causeway_Northern_Ireland.jpg 1000w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Giants_Causeway_Northern_Ireland-300x197.jpg 300w, https://www.letsgoireland.com/wp-content/uploads/2020/11/Giants_Causeway_Northern_Ireland-768x505.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript><figcaption data-dcnode-id="615"><em data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">It is easy to see why the incredible landscape of the Giant’s Causeway was the insipration for myths and legends!</span></em></figcaption></figure><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="612" instrument_node="">The </span><strong data-dcnode-id="609"><a data-dcnode-id="610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/list/369" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="611" instrument_node="">UNESCO World Heritage Site</span></a></strong><span data-dcnode-id="608" instrument_node=""> of the Giant’s Causeway in County Antrim is undoubtedly a very impressive landmark and probably the best known of all the Northern Ireland landmarks. Legend has it that it was built by the Irish warrior Finn McCool in order to fight the Scottish giant Benandonner!</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">The 40,000 or so dark basalt columns create intricate landscapes of staircases along the Antrim coast. This natural phenomenon was created by volcanic activity over 50 million years ago.</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Visitors travel from all over the world to view this incredible place and experience the Giant’s Causeway Visitor Centre. In fact the Giant’s Causeway is the most popular attraction in Northern Ireland. It received about 1.5 million visitors in 2019.&nbsp;</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">So there you have it! We will continue to add to this list over time.&nbsp;</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="593"><strong data-dcnode-id="594"><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/what-is-ireland-known-for/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="596" instrument_node="">If you want to learn about what Ireland is known for, as well as facts about Ireland and some famous people in Ireland then read our post here!</span></a></strong></p><span data-dcnode-id="592" instrument_node="">
</span><div class="addtoany_share_save_container addtoany_content addtoany_content_bottom" data-dcnode-id="552"><div class="a2a_kit a2a_kit_size_32 addtoany_list" data-a2a-title="Famous Landmarks in Ireland you should visit" data-a2a-url="https://www.letsgoireland.com/landmarks-in-ireland/" data-dcnode-id="553" style="line-height: 32px;"><a class="a2a_button_twitter" data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/%23twitter" rel="nofollow noopener" target="_blank" title="Twitter"><span class="a2a_svg a2a_s__default a2a_s_twitter" data-dcnode-id="589" style="background-color: transparent;"><svg aria-hidden="true" data-dcnode-id="590" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M28 8.557a9.913 9.913 0 01-2.828.775 4.93 4.93 0 002.166-2.725 9.738 9.738 0 01-3.13 1.194 4.92 4.92 0 00-3.593-1.55 4.924 4.924 0 00-4.794 6.049c-4.09-.21-7.72-2.17-10.15-5.15a4.942 4.942 0 00-.665 2.477c0 1.71.87 3.214 2.19 4.1a4.968 4.968 0 01-2.23-.616v.06c0 2.39 1.7 4.38 3.952 4.83-.414.115-.85.174-1.297.174-.318 0-.626-.03-.928-.086a4.935 4.935 0 004.6 3.42 9.893 9.893 0 01-6.114 2.107c-.398 0-.79-.023-1.175-.068a13.953 13.953 0 007.55 2.213c9.056 0 14.01-7.507 14.01-14.013 0-.213-.005-.426-.015-.637.96-.695 1.795-1.56 2.455-2.55z" data-dcnode-id="591" fill="#89c056"></path></svg></span><span class="a2a_label" data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Twitter</span></span></a><a class="a2a_button_pinterest" data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.letsgoireland.com/%23pinterest" rel="nofollow noopener" target="_blank" title="Pinterest"><span class="a2a_svg a2a_s__default a2a_s_pinterest" data-dcnode-id="583" style="background-color: transparent;"><svg aria-hidden="true" data-dcnode-id="584" focusable="false" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M16.539 4.5c-6.277 0-9.442
