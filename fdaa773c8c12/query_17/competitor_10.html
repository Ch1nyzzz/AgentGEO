</span><h1 class="entry-title" data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Famous Landmarks in&nbsp;Cordillera</span></h1><span data-dcnode-id="2571" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="2557"><span data-dcnode-id="2570" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2564"><a data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lamadridblog.wordpress.com/2016/11/09/the-wonders-of-cordillera/" rel="bookmark"><time class="entry-date published" data-dcnode-id="2568" datetime="2016-11-09T11:23:19+00:00"><span data-dcnode-id="2569" instrument_node="">November 9, 2016</span></time><time class="updated" data-dcnode-id="2566" datetime="2016-11-20T08:43:59+00:00"><span data-dcnode-id="2567" instrument_node="">November 20, 2016</span></time></a></span><span class="byline" data-dcnode-id="2559"><span data-dcnode-id="2563" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="2560"><a class="url fn n" data-dcnode-id="2561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lamadridblog.wordpress.com/author/lamadridblog/"><span data-dcnode-id="2562" instrument_node="">lamadridblog</span></a></span></span><span data-dcnode-id="2558" instrument_node=""> </span></div><span data-dcnode-id="2555" instrument_node=""> </span></header><span data-dcnode-id="2553" instrument_node="">
</span><div class="entry-content" data-dcnode-id="668"><span data-dcnode-id="2552" instrument_node="">
</span><h2 data-dcnode-id="2549" style="text-align:center;"><span data-dcnode-id="2550" style="color:#000000;"><span data-dcnode-id="2551" instrument_node="">1. &nbsp;Tourist Spots And Destinations Worth Visiting In La Trinidad, Benguet</span></span></h2><span data-dcnode-id="2548" instrument_node="">
</span><div data-dcnode-id="2530"><span data-dcnode-id="2547" instrument_node="">
</span><p data-dcnode-id="2536"><span data-dcnode-id="2537" style="color:#000000;"><i data-dcnode-id="2543"><b data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">Note</span></b><span data-dcnode-id="2544" instrument_node="">: This is a contributed piece by Nicole L. Melendez, a second year tourism student from one of the major universities in Baguio City. Ms. Melendez is hoping to build her own hotel in the La Trinidad Valley someday.</span></i><span data-dcnode-id="2542" instrument_node=""> [</span><u data-dcnode-id="2539"><i data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Updated with corrections and suggestions from readers.</span></i></u><span data-dcnode-id="2538" instrument_node="">]</span></span></p><span data-dcnode-id="2535" instrument_node="">
</span><p data-dcnode-id="2532"><span data-dcnode-id="2533" style="color:#000000;"><span data-dcnode-id="2534" instrument_node="">La Trinidad is the capital town of the province of Benguet in the Cordillera Administrative Region or CAR. The town is just a few kilometers away from the city of Baguio. Most of the town lies in what is often referred to as the La Trinidad Valley which is an old volcanic crater. Running through the valley is the Balili River.</span></span></p><span data-dcnode-id="2531" instrument_node="">
</span></div><span data-dcnode-id="2529" instrument_node="">
</span><div data-dcnode-id="2526"><span data-dcnode-id="2527" style="color:#000000;"><span data-dcnode-id="2528" instrument_node="">&nbsp;</span></span></div><span data-dcnode-id="2525" instrument_node="">
</span><div data-dcnode-id="2522"><span data-dcnode-id="2523" style="color:#000000;"><span data-dcnode-id="2524" instrument_node="">As mentioned earlier, La Trinidad is very near Baguio City. If you take a passenger jeep or a taxi, travel time can take fifteen to thirty minutes provided that there are no hangups in vehicle traffic. Jeeps and taxis traversing the Baguio City-La Trinidad route operate 24/7 so getting there and back is not much of a problem.</span></span></div><span data-dcnode-id="2521" instrument_node="">
</span><div data-dcnode-id="2518"><span data-dcnode-id="2519" style="color:#000000;"><span data-dcnode-id="2520" instrument_node="">&nbsp;</span></span></div><span data-dcnode-id="2517" instrument_node="">
</span><div data-dcnode-id="2514"><span data-dcnode-id="2515" style="color:#000000;"><span data-dcnode-id="2516" instrument_node="">Before we go to the tourist destinations and spots in La Trinidad, Benguet, let’s show you first how to get there if you are coming from Baguio City. If you are taking a cab, there’s no problem as you can just inform the driver that your destination is La Trinidad. You however have to be particular as to where in La Trinidad you will get off the cab. Well-known drop-off points are Bell Church (Km 3), Pines Park (Km 4), Tiong San (Km 4), Marosans (Km 4), Public Market (Km 5), Jollibee (Km 5), McDonalds (Km 5), Benguet State University Main Gate (Km 6), and Capitol (Km 6).</span></span></div><span data-dcnode-id="2513" instrument_node="">
</span><div data-dcnode-id="2510"><span data-dcnode-id="2511" style="color:#000000;"><span data-dcnode-id="2512" instrument_node="">&nbsp;</span></span></div><span data-dcnode-id="2509" instrument_node="">
</span><div data-dcnode-id="2506"><span data-dcnode-id="2507" style="color:#000000;"><span data-dcnode-id="2508" instrument_node="">If you are taking a public utility jeep, there are two stations in Baguio City for La Trinidad-bound jeeps. The main station is located at the former Rabbit Bus Terminal along Magsaysay Avenue. This station is just a few meters from the Baguio Center Mall. The second jeepney station is located just below the Baguio City Hall and above Rizal Park. Minimum fare is Php8.50.</span></span></div><span data-dcnode-id="2505" instrument_node="">
</span><div data-dcnode-id="2502"><span data-dcnode-id="2503" style="color:#000000;"><span data-dcnode-id="2504" instrument_node="">&nbsp;</span></span></div><span data-dcnode-id="2501" instrument_node="">
</span><div data-dcnode-id="2498"><span data-dcnode-id="2499" style="color:#000000;"><span data-dcnode-id="2500" instrument_node="">And here are the tourist spots and destinations in La Trinidad, Benguet.</span></span></div><span data-dcnode-id="2497" instrument_node="">
</span><div data-dcnode-id="2494"><span data-dcnode-id="2495" style="color:#000000;"><span data-dcnode-id="2496" instrument_node="">&nbsp;</span></span></div><span data-dcnode-id="2493" instrument_node="">
</span><div data-dcnode-id="2486"><span data-dcnode-id="2487" style="color:#000000;"><b data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">1)</span></b><b data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node=""> The Strawberry Farm</span></b><span data-dcnode-id="2488" instrument_node=""> – This is where majority of the famous Baguio strawberries are planted and harvested. Strawberries are often associated with Baguio City but the fact is these are farmed in La Trinidad. The farm occupies several hectares within Km 5 and Km 6. Near the farms are dozens of stalls selling ripe and freshly-picked strawberries. You can go into the fields and pick your own strawberries if you want. Strawberries aren’t the only plants being nurtured in the farm. There are also flowers and various vegetables like cabbages and carrots.</span></span></div><span data-dcnode-id="2485" instrument_node="">
</span><span data-dcnode-id="2484" instrument_node="">
</span><span data-dcnode-id="2483" instrument_node="">
</span><span data-dcnode-id="2482" instrument_node="">
</span><span data-dcnode-id="2477" instrument_node="">
</span><span data-dcnode-id="2475" instrument_node="">
</span><span data-dcnode-id="2474" instrument_node="">
</span><span data-dcnode-id="2469" instrument_node="">
</span><span data-dcnode-id="2467" instrument_node="">
</span><span data-dcnode-id="2465" instrument_node="">
</span><table align="center" cellpadding="0" cellspacing="0" class="tr-caption-container" data-dcnode-id="2464"><tbody data-dcnode-id="2466"><tr data-dcnode-id="2476"><td data-dcnode-id="2478"><span data-dcnode-id="2479" style="color:#000000;"><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lamadridblog.files.wordpress.com/2016/11/a7c32-la-trinidad-strawberries.jpg" style="color:#000000;"><img border="0" data-dcnode-id="2481" height="409.5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lamadridblog.files.wordpress.com/2016/11/a7c32-la-trinidad-strawberries.jpg%3Fw%3D600&amp;raw" width="600"></a></span></td></tr><tr align="right" data-dcnode-id="2468"><td class="tr-caption" data-dcnode-id="2470"><span data-dcnode-id="2471" style="color:#000000;"><i data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">Photo: Shubert Ciencia via Flickr</span></i></span></td></tr></tbody></table><span data-dcnode-id="2463" instrument_node="">
</span><div data-dcnode-id="2458"><span data-dcnode-id="2459" style="color:#000000;"><b data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">2) Mt. Kalugong</span></b><span data-dcnode-id="2460" instrument_node=""> – This is a low-lying mountain overlooking the La Trinidad Valley. You can reach it via Tabangaoen (a sitio of barangay Balili) or via Tawang. A main feature of the mountain are its various rock formations. Also in the area are tree swings, picnic tables and traditionally-built houses which you can rent out at affordable fees. It’s a nice little place to hike to and have a picnic with friends and family.</span></span></div><span data-dcnode-id="2457" instrument_node="">
</span><span data-dcnode-id="2456" instrument_node="">
</span><span data-dcnode-id="2455" instrument_node="">
</span><span data-dcnode-id="2454" instrument_node="">
</span><span data-dcnode-id="2449" instrument_node="">
</span><span data-dcnode-id="2447" instrument_node="">
</span><span data-dcnode-id="2446" instrument_node="">
</span><span data-dcnode-id="2441" instrument_node="">
</span><span data-dcnode-id="2439" instrument_node="">
</span><span data-dcnode-id="2437" instrument_node="">
</span><table align="center" cellpadding="0" cellspacing="0" class="tr-caption-container" data-dcnode-id="2436"><tbody data-dcnode-id="2438"><tr data-dcnode-id="2448"><td data-dcnode-id="2450"><span data-dcnode-id="2451" style="color:#000000;"><a data-dcnode-id="2452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lamadridblog.files.wordpress.com/2016/11/56ecf-mt-kalugong-eco-park.jpg" style="color:#000000;"><img border="0" data-dcnode-id="2453" height="447" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lamadridblog.files.wordpress.com/2016/11/56ecf-mt-kalugong-eco-park.jpg%3Fw%3D600%26h%3D447&amp;raw" width="600"></a></span></td></tr><tr align="right" data-dcnode-id="2440"><td class="tr-caption" data-dcnode-id="2442"><span data-dcnode-id="2443" style="color:#000000;"><i data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Photo: Mt. Kalugong Eco Park via Facebook.</span></i></span></td></tr></tbody></table><span data-dcnode-id="2435" instrument_node="">
</span><div data-dcnode-id="2430"><span data-dcnode-id="2431" style="color:#000000;"><b data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">3) Mt. Jumbo (also known as Mt. Yangbaw or Jhangbow)</span></b><span data-dcnode-id="2432" instrument_node=""> – This is a much bigger mountain than Mt. Kalugong. It’s not a developed place so you won’t find picnic tables, houses or any man-made structures in the area. It’s a great place for hiking. And the view of the La Trinidad Valley from atop the mountain is beautiful and magnificent.</span></span></div><span data-dcnode-id="2429" instrument_node="">
</span><span data-dcnode-id="2428" instrument_node="">
</span><span data-dcnode-id="2427" instrument_node="">
</span><span data-dcnode-id="2426" instrument_node="">
</span><span data-dcnode-id="2421" instrument_node="">
</span><span data-dcnode-id="2419" instrument_node="">
</span><span data-dcnode-id="2418" instrument_node="">
</span><span data-dcnode-id="2413" instrument_node="">
</span><span data-dcnode-id="2411" instrument_node="">
</span><span data-dcnode-id="2409" instrument_node="">
</span><table align="center" cellpadding="0" cellspacing="0" class="tr-caption-container" data-dcnode-id="2408"><tbody data-dcnode-id="2410"><tr data-dcnode-id="2420"><td data-dcnode-id="2422"><span data-dcnode-id="2423" style="color:#000000;"><a data-dcnode-id="2424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lamadridblog.files.wordpress.com/2016/11/6d33d-mt-jumbo-yangbaw-la-trinidad.jpg" style="color:#000000;"><img border="0" data-dcnode-id="2425" height="399" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lamadridblog.files.wordpress.com/2016/11/6d33d-mt-jumbo-yangbaw-la-trinidad.jpg%3Fw%3D600%26h%3D399&amp;raw" width="600"></a></span></td></tr><tr align="right" data-dcnode-id="2412"><td class="tr-caption" data-dcnode-id="2414"><span data-dcnode-id="2415" style="color:#000000;"><i data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Photo: Richard Kinnud via his blog La Trinidad.</span></i></span></td></tr></tbody></table><span data-dcnode-id="2407" instrument_node="">
</span><div data-dcnode-id="2402"><span data-dcnode-id="2403" style="color:#000000;"><b data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">4) The Tawang Stone Church</span></b><span data-dcnode-id="2404" instrument_node=""> – Needless to stay, this is a church constructed mostly from rocks found in the area. The church can be found in barangay Tawang. To get there, you need to hike a little as the church is located high up a mountain slope and quite far from the main highway. [Unfortunately, we don’t have a photo of the church. You’ll have to go there if you wish to see how it looks.]</span></span></div><span data-dcnode-id="2401" instrument_node="">
</span><div data-dcnode-id="2398"><span data-dcnode-id="2399" style="color:#000000;"><span data-dcnode-id="2400" instrument_node="">&nbsp;</span></span></div><span data-dcnode-id="2397" instrument_node="">
</span><div data-dcnode-id="2392"><span data-dcnode-id="2393" style="color:#000000;"><b data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">5) The Longlong Communal Forest</span></b><span data-dcnode-id="2394" instrument_node=""> – This is a stretch of wooded area in Puguis, La Trinidad. It also serves as a watershed. To get there, you can either hike up there or take a taxi. The forest is a good place for small walks and picnics. There’s also a small hut there which also serves as a view deck. From the deck, you can see the entirety of the La Trinidad Valley below.</span></span></div><span data-dcnode-id="2391" instrument_node="">

</span><p data-dcnode-id="2321"><span data-dcnode-id="2322" style="color:#000000;"><span data-dcnode-id="2323" instrument_node="">Bonus tip: Unlike Baguio City, the town doesn’t have a lot of dining places. Recommended places where you can grab something to eat include Jack’s Restaurant, Marosan’s, and Kaleis. The town also has branches of McDonald’s and Jollibee if you prefer food from these chains.</span></span></p><span data-dcnode-id="2320" instrument_node="">

</span><p data-dcnode-id="2310"><span data-dcnode-id="2311" style="color:#000000;"><span data-dcnode-id="2312" instrument_node="">If you know of other places in La Trinidad worth visiting, feel free to tell us about it in the comments section below. Thanks a lot.</span></span></p><span data-dcnode-id="2309" instrument_node="">
</span><p data-dcnode-id="2306"><span data-dcnode-id="2307" style="color:#000000;"><span data-dcnode-id="2308" instrument_node="">Suggested places from our readers: Kairuz Cafe, Cafe Tahru and Kai Cafe for dining. Bahong, the rose capital of the Philippines. King Loui’s Farm (not sure where this is located).</span></span></p><span data-dcnode-id="2305" instrument_node="">
</span></div><span data-dcnode-id="2303" instrument_node="">
</span><h2 data-dcnode-id="2299" style="text-align:center;"><span data-dcnode-id="2300" style="color:#000000;"><strong data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">2.&nbsp;16 places you should visit in Baguio</span></strong></span></h2><span data-dcnode-id="2298" instrument_node="">
</span><div class="featured-media" data-dcnode-id="2285"><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2294"><span data-dcnode-id="2295" style="color:#000000;"><img alt="Burnham Park" class="" data-dcnode-id="2296" height="473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/myguide.ph/wp-content/uploads/myguide-burnhampark-945x657.jpg&amp;raw" width="681"></span></p><span data-dcnode-id="2293" instrument_node="">
</span><div class="media-caption-container" data-dcnode-id="2287"><span data-dcnode-id="2292" instrument_node="">
</span><p class="media-caption" data-dcnode-id="2289" style="text-align:center;"><span data-dcnode-id="2290" style="color:#000000;"><span data-dcnode-id="2291" instrument_node="">Man-made lake at Burnham Park.</span></span></p><span data-dcnode-id="2288" instrument_node="">
</span></div><span data-dcnode-id="2286" instrument_node="">
</span></div><span data-dcnode-id="2284" instrument_node="">
</span><div class="post-content" data-dcnode-id="1701"><span data-dcnode-id="2283" instrument_node="">
</span><div class="cresta-share-icon first_style" data-dcnode-id="2280" id="crestashareiconincontent"><span data-dcnode-id="2281" style="color:#000000;"><span data-dcnode-id="2282" instrument_node="">&nbsp;</span></span></div><span data-dcnode-id="2279" instrument_node="">
</span><p data-dcnode-id="2276"><span data-dcnode-id="2277" style="color:#000000;"><span data-dcnode-id="2278" instrument_node="">Its mountainous terrain and strategic location within the Cordillera mountain range give Baguio City the advantages of a cool temperature and scenic views.</span></span></p><span data-dcnode-id="2275" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" style="color:#000000;"><span data-dcnode-id="2274" instrument_node="">The city has an abundance of forest reserves, parks, and pine trees, and the high elevation provides many places – from the city center to the outskirts – with sweeping vistas.</span></span></p><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2269" style="color:#000000;"><span data-dcnode-id="2270" instrument_node="">Aside from its unique mix of natural and historical attractions, a combination of cultures that incorporates Spanish, American, and native Ibaloi and Cordilleran tribal influences gives the city a unique socio-cultural flavor.</span></span></p><span data-dcnode-id="2267" instrument_node="">
</span><p data-dcnode-id="2264"><span data-dcnode-id="2265" style="color:#000000;"><span data-dcnode-id="2266" instrument_node="">As a retail and urban hub, Baguio boasts of an economic zone and a technology enclave as well as a number of stores carrying imported and top brands.</span></span></p><span data-dcnode-id="2263" instrument_node="">
</span><p data-dcnode-id="2260"><span data-dcnode-id="2261" style="color:#000000;"><span data-dcnode-id="2262" instrument_node="">Co-existing with these establishments are souvenir and other shops selling goods distinctly Baguio such as strawberry products, knitted wear, woodcraft, and silver jewelries.</span></span></p><span data-dcnode-id="2259" instrument_node="">
</span><p data-dcnode-id="2255"><span data-dcnode-id="2256" style="color:#000000;"><strong data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Baguio center attractions</span></strong></span></p><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2251"><span data-dcnode-id="2252" style="color:#000000;"><span data-dcnode-id="2253" instrument_node="">Within the Baguio central business district are several spots identified as tourist draws by the City Government. They are of walking distance from many Baguio accommodation establishments and include parks, shopping areas, and historical monuments.</span></span></p><span data-dcnode-id="2250" instrument_node="">
</span><h3 data-dcnode-id="2247"><span data-dcnode-id="2248" style="color:#000000;"><span data-dcnode-id="2249" instrument_node="">1. City Hall building</span></span></h3><span data-dcnode-id="2246" instrument_node="">
</span><p data-dcnode-id="2242"><span data-dcnode-id="2243" style="color:#000000;"><a data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//myguide.ph/wp-content/uploads/baguio-cityhall1.jpg" style="color:#000000;"><img alt="Baguio City Hall" data-dcnode-id="2245" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/myguide.ph/wp-content/uploads/baguio-cityhall1.jpg&amp;raw"></a></span></p><span data-dcnode-id="2241" instrument_node="">
</span><p data-dcnode-id="2238"><span data-dcnode-id="2239" style="color:#000000;"><span data-dcnode-id="2240" instrument_node="">Your tour within the city center should start at City Hall. This current building, constructed in 1949-1950, replaced the one built in 1910 during the term of E.W. Reynolds, first city mayor, hat was destroyed during World War II in 1945.</span></span></p><span data-dcnode-id="2237" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2235" style="color:#000000;"><span data-dcnode-id="2236" instrument_node="">To get more details about this building, such as how to get there or its GPS coordinates, and the other sites in the list, download the Baguio Guide from the Google Play Store.</span></span></p><span data-dcnode-id="2233" instrument_node="">
</span><h3 data-dcnode-id="2230"><span data-dcnode-id="2231" style="color:#000000;"><span data-dcnode-id="2232" instrument_node="">2. Burnham Park</span></span></h3><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2226" style="color:#000000;"><a data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//myguide.ph/wp-content/uploads/myguide-burnhampark.jpg" style="color:#000000;"><img alt="Burnham Park" data-dcnode-id="2228" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/myguide.ph/wp-content/uploads/myguide-burnhampark.jpg&amp;raw"></a></span></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2221"><span data-dcnode-id="2222" style="color:#000000;"><span data-dcnode-id="2223" instrument_node="">One of the interesting nature spots in Baguio is an urban park named after the American architect, Daniel H. Burnham, who laid plans for the city in the 1900’s. The park is a sprawling green space encompassing 32 hectares right in the city center. It is just a few minutes walk from City Hall.</span></span></p><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2217"><span data-dcnode-id="2218" style="color:#000000;"><span data-dcnode-id="2219" instrument_node="">The Baguio Guide app provides a list of the different activities you can do in Burnham Park.</span></span></p><span data-dcnode-id="2216" instrument_node="">
</span><h3 data-dcnode-id="2213"><span data-dcnode-id="2214" style="color:#000000;"><span data-dcnode-id="2215" instrument_node="">3. Baguio Cathedral</span></span></h3><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2208"><span data-dcnode-id="2209" style="color:#000000;"><a data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//myguide.ph/wp-content/uploads/myguide-baguiocathedral.jpg" style="color:#000000;"><img alt="Baguio Cathedral" data-dcnode-id="2211" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/myguide.ph/wp-content/uploads/myguide-baguiocathedral.jpg&amp;raw"></a></span></p><span data-dcnode-id="2207" instrument_node="">
</span><p data-dcnode-id="2204"><span data-dcnode-id="2205" style="color:#000000;"><span data-dcnode-id="2206" instrument_node="">Standing on a hill originally referred to as “Kampo” by the native Ibalois, the Our Lady of Atonement Cathedral depicts Gothic architectural influences in its twin spires, stained glass, and rose windows.</span></span></p><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2200"><span data-dcnode-id="2201" style="color:#000000;"><span data-dcnode-id="2202" instrument_node="">The structure also has a distinctive pink color. It was built in phases starting in 1920 not by the Spaniards by a Catholic Mission established by missionaries of the Congregatio Immaculati Cordis Mariae (CICM) from Belgium in 1907.</span></span></p><span data-dcnode-id="2199" instrument_node="">
</span><h3 data-dcnode-id="2196"><span data-dcnode-id="2197" style="color:#000000;"><span data-dcnode-id="2198" instrument_node="">4. Baguio City Public Market</span></span></h3><span data-dcnode-id="2195" instrument_node="">
</span><p data-dcnode-id="2191"><span data-dcnode-id="2192" style="color:#000000;"><a data-dcnode-id="2193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//myguide.ph/wp-content/uploads/myguide-baguiomarket.jpg" style="color:#000000;"><img alt="Baguio public market" data-dcnode-id="2194" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/myguide.ph/wp-content/uploads/myguide-baguiomarket.jpg&amp;raw"></a></span></p><span data-dcnode-id="2190" instrument_node="">
</span><p data-dcnode-id="2187"><span data-dcnode-id="2188" style="color:#000000;"><span data-dcnode-id="2189" instrument_node="">Baguio is known for its strawberries and in no other area in the city is this fruit sold cheaply and in abundance than in the public market.</span></span></p><span data-dcnode-id="2186" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2184" style="color:#000000;"><span data-dcnode-id="2185" instrument_node="">Also called Abanao Market, it is located at the foot of Session Road along Magsaysay Avenue.</span></span></p><span data-dcnode-id="2182" instrument_node="">
</span><p data-dcnode-id="2178"><span data-dcnode-id="2179" style="color:#000000;"><strong data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Other tourist draws</span></strong></span></p><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2174"><span data-dcnode-id="2175" style="color:#000000;"><span data-dcnode-id="2176" instrument_node="">Trips to other attractions take more time because they’re located some distance from the city’s nucleus. Such trips need to be planned and the route plotted ahead of time especially since Baguio has a lot of one way streets.</span></span></p><span data-dcnode-id="2173" instrument_node="">
</span><h3 data-dcnode-id="2170"><span data-dcnode-id="2171" style="color:#000000;"><span data-dcnode-id="2172" instrument_node="">5. Baguio Botanical Garden</span></span></h3><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2166" style="color:#000000;"><a data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//myguide.ph/wp-content/uploads/baguio-botanical-garden.jpg" style="color:#000000;"><img alt="Baguio Botanical Garden" data-dcnode-id="2168" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/myguide.ph/wp-content/uploads/baguio-botanical-garden.jpg&amp;raw"></a></span></p><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2161"><span data-dcnode-id="2162" style="color:#000000;"><span data-dcnode-id="2163" instrument_node="">Take a stroll along the winding trails and stone steps of the Baguio Botanical Garden. It has a wide range of flowering, herbal, and decorative plants interspersed with pine trees. Some plants are even for sale.</span></span></p><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2157"><span data-dcnode-id="2158" style="color:#000000;"><span data-dcnode-id="2159" instrument_node="">The garden’s main entrance is along Leonard Wood Road, between the Teacher’s Camp and Pacdal Circle. It had been in the past been called Igorot Village, Imelda Park, and Centennial Park. Within the huge park are relics from its Igorot Village days, such as tribal huts and sculptures.</span></span></p><span data-dcnode-id="2156" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2154" style="color:#000000;"><span data-dcnode-id="2155" instrument_node="">There are pocket gardens within the park dedicated to Baguio’s sister cities. There is a network of Japanese tunnels as well. The Baguio Botanical Garden is just a kilometer away from the city center.</span></span></p><span data-dcnode-id="2152" instrument_node="">
</span><h3 data-dcnode-id="2149"><span data-dcnode-id="2150" style="color:#000000;"><span data-dcnode-id="2151" instrument_node="">6. Mines View Park</span></span></h3><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2145" style="color:#000000;"><a data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//myguide.ph/wp-content/uploads/myguide-minesviewpark.jpg" style="color:#000000;"><img alt="Mines View Park" data-dcnode-id="2147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/myguide.ph/wp-content/uploads/myguide-minesviewpark.jpg&amp;raw"></a></span></p><span data-dcnode-id="2143" instrument_node="">
</span><p data-dcnode-id="2140"><span data-dcnode-id="2141" style="color:#000000;"><span data-dcnode-id="2142" instrument_node="">No other spot encapsulates the city’s breathtaking scenery better than Mines View Park.</span></span></p><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2137" style="color:#000000;"><span data-dcnode-id="2138" instrument_node="">The park, located in the outskirts of Baguio, offers a wide and clear view of Benguet’s mountain ranges where gold, silver, and other ores were once mined, hence its name.</span></span></p><span data-dcnode-id="2135" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" style="color:#000000;"><span data-dcnode-id="2134" instrument_node="">Souvenir items and other Baguio products are sold in the area. Silver jewelry, which the city is known for, is sold at the Ibay’s and Pilak branches in Mines View.</span></span></p><span data-dcnode-id="2131" instrument_node="">
</span><h3 data-dcnode-id="2128"><span data-dcnode-id="2129" style="color:#000000;"><span data-dcnode-id="2130" instrument_node="">7. Camp John Hay</span></span></h3><span data-dcnode-id="2127" instrument_node="">
</span><p data-dcnode-id="2123"><span data-dcnode-id="2124" style="color:#000000;"><a data-dcnode-id="2125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//myguide.ph/wp-content/uploads/myguide-campjohnhay.jpg" style="color:#000000;"><img alt="camp john hay" data-dcnode-id="2126" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/myguide.ph/wp-content/uploads/myguide-campjohnhay.jpg&amp;raw"></a></span></p><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2120" style="color:#000000;"><span data-dcnode-id="2121" instrument_node="">Camp John Hay has often been referred to as the “little Baguio” with Baguio City. The urban design for Baguio created by American architect Daniel H. Burnham in the 1900’s was for a community with a population expected to reach but not breach 25,000.</span></span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2115"><span data-dcnode-id="2116" style="color:#000000;"><span data-dcnode-id="2117" instrument_node="">Some 100 years later, the city’s population has grown to over 10 times more. There are more people, houses, and cars on the road.</span></span></p><span data-dcnode-id="2114" instrument_node="">
</span><p data-dcnode-id="2111"><span data-dcnode-id="2112" style="color:#000000;"><span data-dcnode-id="2113" instrument_node="">Camp John Hay offers a picture of Baguio City as it used to be. More information about Camp John Hay and the things you shouldn’t miss in the mountain resort can be found at the Baguio Guide mobile app that’s offered for free download in the Google Play Store.</span></span></p><span data-dcnode-id="2110" instrument_node="">
</span><h3 data-dcnode-id="2107"><span data-dcnode-id="2108" style="color:#000000;"><span data-dcnode-id="2109" instrument_node="">8. Wright Park</span></span></h3><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2102"><span data-dcnode-id="2103" style="color:#000000;"><a data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//myguide.ph/wp-content/uploads/myguide-wrightpark.jpg" style="color:#000000;"><img alt="Visitors may ride any  of the horses at Wright Park." data-dcnode-id="2105" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/myguide.ph/wp-content/uploads/myguide-wrightpark.jpg&amp;raw"></a></span></p><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2098"><span data-dcnode-id="2099" style="color:#000000;"><span data-dcnode-id="2100" instrument_node="">A favorite of kids and adults alike in Baguio is Wright Park where an organization of pony boys offers horseback rides. It is located northeast of the city center.</span></span></p><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2094"><span data-dcnode-id="2095" style="color:#000000;"><span data-dcnode-id="2096" instrument_node="">From the horseback riding area, a stone stairway leads to the “Pool of the Pines,” a quiet stretch with a 100-meter long shallow and narrow pool lined on both sides by Baguio’s towering pines.</span></span></p><span data-dcnode-id="2093" instrument_node="">
</span><p data-dcnode-id="2090"><span data-dcnode-id="2091" style="color:#000000;"><span data-dcnode-id="2092" instrument_node="">The park is named after Luke Edward Wright, American governor-general of the Philippines (1904-1906).</span></span></p><span data-dcnode-id="2089" instrument_node="">
</span><h3 data-dcnode-id="2086"><span data-dcnode-id="2087" style="color:#000000;"><span data-dcnode-id="2088" instrument_node="">9. The Mansion</span></span></h3><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2082"><span data-dcnode-id="2083" style="color:#000000;"><span data-dcnode-id="2084" instrument_node="">Built in 1908, The Mansion on Leonard Wood Road housed a succession of American governor-generals. It is located just across Wright Park.</span></span></p><span data-dcnode-id="2081" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2079" style="color:#000000;"><span data-dcnode-id="2080" instrument_node="">It is now utilized as the official residence of the Philippine President in the summer capital. The Baguio Guide app contains more information about this Baguio attraction such as where they got the inspiration for its wrought iron gates.</span></span></p><span data-dcnode-id="2077" instrument_node="">
</span><h3 data-dcnode-id="2074"><span data-dcnode-id="2075" style="color:#000000;"><span data-dcnode-id="2076" instrument_node="">10. Philippine Military Academy</span></span></h3><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2069"><span data-dcnode-id="2070" style="color:#000000;"><a data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//myguide.ph/wp-content/uploads/myguide-pma.jpg" style="color:#000000;"><img alt="PMA Baguio" data-dcnode-id="2072" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/myguide.ph/wp-content/uploads/myguide-pma.jpg&amp;raw"></a></span></p><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2065"><span data-dcnode-id="2066" style="color:#000000;"><span data-dcnode-id="2067" instrument_node="">This premier military institution has its beginnings in Spanish colonial times. Established in the 19th century, it became the venue for the training for sons of soldiers and those aspiring for higher military positions.</span></span></p><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2061"><span data-dcnode-id="2062" style="color:#000000;"><span data-dcnode-id="2063" instrument_node="">Don’t forget to check out the Philippine Military Academy museum, which displays memorabilia related to the development of the academy. PMA allows visitors a peek into a typical cadet room at the museum.</span></span></p><span data-dcnode-id="2060" instrument_node="">
</span><h3 data-dcnode-id="2057"><span data-dcnode-id="2058" style="color:#000000;"><span data-dcnode-id="2059" instrument_node="">11. Tam-Awan Village</span></span></h3><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2052"><span data-dcnode-id="2053" style="color:#000000;"><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//myguide.ph/wp-content/uploads/myguide-tamawan.jpg" style="color:#000000;"><img alt="Tam-awan Village" data-dcnode-id="2055" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/myguide.ph/wp-content/uploads/myguide-tamawan.jpg&amp;raw"></a></span></p><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2049" style="color:#000000;"><span data-dcnode-id="2050" instrument_node="">Set on a rolling slope along Lt. G. Tacay Road, Tam-Awan Village promotes and preserves tribal and indigenous cultures and practices.</span></span></p><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2044"><span data-dcnode-id="2045" style="color:#000000;"><span data-dcnode-id="2046" instrument_node="">It offers accommodations in authentic dwelling places of Benguet’s different tribes. The village features seven Ifugao and two Kalinga huts made of indigenous materials.</span></span></p><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2040"><span data-dcnode-id="2041" style="color:#000000;"><span data-dcnode-id="2042" instrument_node="">Following the trail within the village’s mountainous terrain will lead guests to great views of the surrounding environs. The West Philippine Sea sunset, on a clear day, may be viewed from the area.</span></span></p><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2036"><span data-dcnode-id="2037" style="color:#000000;"><span data-dcnode-id="2038" instrument_node="">Lodging and entrance fees provided in the free Baguio Guide mobile app that’s available for download at the Google Play Store.</span></span></p><span data-dcnode-id="2035" instrument_node="">
</span><h3 data-dcnode-id="2032"><span data-dcnode-id="2033" style="color:#000000;"><span data-dcnode-id="2034" instrument_node="">12. BenCab Museum</span></span></h3><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2029" style="color:#000000;"><span data-dcnode-id="2030" instrument_node="">National artist Benedicto Cabrera displays his collection of paintings, drawings, prints, and sculpture at the BenCab Museum.</span></span></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2024"><span data-dcnode-id="2025" style="color:#000000;"><span data-dcnode-id="2026" instrument_node="">Located along Km. 6 Asin Road, Cabrera’s museum also features works of rising contemporary artists.</span></span></p><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2020"><span data-dcnode-id="2021" style="color:#000000;"><span data-dcnode-id="2022" instrument_node="">An interesting albeit mature spot in the museum is the Erotica Gallery. Drawings, paintings, sculpture, and other artworks by various artists with an erotic subject or theme are displayed there.</span></span></p><span data-dcnode-id="2019" instrument_node="">
</span><h3 data-dcnode-id="2016"><span data-dcnode-id="2017" style="color:#000000;"><span data-dcnode-id="2018" instrument_node="">13. Ifugao Wood Carvers Village</span></span></h3><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" style="color:#000000;"><span data-dcnode-id="2014" instrument_node="">The way to BenCab museum is dotted with woodcarving shops. The area is known as the Ifugao Wood Carvers Village. Beautiful, hand-carved products are sold at low prices in the shops.</span></span></p><span data-dcnode-id="2011" instrument_node="">
</span><h3 data-dcnode-id="2008"><span data-dcnode-id="2009" style="color:#000000;"><span data-dcnode-id="2010" instrument_node="">14. Lourdes Grotto</span></span></h3><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" style="color:#000000;"><a data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//myguide.ph/wp-content/uploads/myguide-lourdesgrotto.jpg" style="color:#000000;"><img alt="Lourdes Grotto" data-dcnode-id="2006" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/myguide.ph/wp-content/uploads/myguide-lourdesgrotto.jpg&amp;raw"></a></span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="1999"><span data-dcnode-id="2000" style="color:#000000;"><span data-dcnode-id="2001" instrument_node="">A shrine to the Lady of the Lourdes is located close to the BenCab Museum. The Our Lady of the Lourdes Grotto is accessible through the Dominican Hill Road and pilgrims need to climb 252 steps to reach it.</span></span></p><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1995"><span data-dcnode-id="1996" style="color:#000000;"><span data-dcnode-id="1997" instrument_node="">Since it is located on a high elevation, the shrine also offers fantastic views of the mountainsides.</span></span></p><span data-dcnode-id="1994" instrument_node="">
</span><h3 data-dcnode-id="1991"><span data-dcnode-id="1992" style="color:#000000;"><span data-dcnode-id="1993" instrument_node="">15. The Prayer Mountain and Tourism Center (Dominican Hill)</span></span></h3><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1986"><span data-dcnode-id="1987" style="color:#000000;"><a data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//myguide.ph/wp-content/uploads/myguide-diplomathotel.jpg" style="color:#000000;"><img alt="Diplomat Hotel" data-dcnode-id="1989" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/myguide.ph/wp-content/uploads/myguide-diplomathotel.jpg&amp;raw"></a></span></p><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1982"><span data-dcnode-id="1983" style="color:#000000;"><span data-dcnode-id="1984" instrument_node="">When the Americans were encouraging people to come to Baguio, the councils of the Province of the Dominican Order voted to construct a monastery on a 17-hectare property they had acquired in the city.</span></span></p><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1979" style="color:#000000;"><span data-dcnode-id="1980" instrument_node="">The monastery was later turned into the Diplomat Hotel that is now abandoned and in ruins on Dominican Hill. Residents even say it’s haunted.</span></span></p><span data-dcnode-id="1977" instrument_node="">
</span><h3 data-dcnode-id="1974"><span data-dcnode-id="1975" style="color:#000000;"><span data-dcnode-id="1976" instrument_node="">16. Bell Church</span></span></h3><span data-dcnode-id="1973" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1971" style="color:#000000;"><span data-dcnode-id="1972" instrument_node="">Located on the border of Baguio City and La Trinidad Valley, this cluster of temples called Bell Church features oriental architecture, ornate gateway, dragon ornaments, and Buddha-guarded windows. It sits atop a hill. The priest in the Bell Temple preaches a mixture of Buddhism, Taoism, Confucianism, and Christianity.</span></span></p><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1967" style="color:#000000;"><span data-dcnode-id="1968" instrument_node="">Aside from a list of top places to visit, the Baguio Guide mobile app that is offered for free download at the Google Play Store also contains information on Baguio hotels, restaurants, and other key information.</span></span></p><span data-dcnode-id="1965" instrument_node="">
</span><div class="apppromo" data-dcnode-id="1703"><span data-dcnode-id="1964" instrument_node="">
</span><h3 data-dcnode-id="1961"><span data-dcnode-id="1962" style="color:#000000;"><span data-dcnode-id="1963" instrument_node="">BAGUIO GUIDE</span></span></h3><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1957"><span data-dcnode-id="1958" style="color:#000000;"><img alt="baguio-guide" class="" data-dcnode-id="1959" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/myguide.ph/wp-content/uploads/baguio-guide-168x300.png&amp;raw"></span></p><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1953"><span data-dcnode-id="1954" style="color:#000000;"><span data-dcnode-id="1955" instrument_node="">Get a guide to Baguio City in your phone or tablet by downloading our free Baguio Guide from the Google Play Store or Windows Phone Store. The app is a comprehensive guide to the Philippines’ summer capital, listing things to do and places to stay or go to. It also contains a portable directory of important contact numbers and DOT-accredited establishments.</span></span></p><span data-dcnode-id="1952" instrument_node="">
</span><h2 data-dcnode-id="1949" style="text-align:center;"><span data-dcnode-id="1950" style="color:#000000;"><span data-dcnode-id="1951" instrument_node="">3.&nbsp;Mt. Province</span></span></h2><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1945"><span class="innerFont" data-dcnode-id="1946" style="color:#000000;"><span data-dcnode-id="1947" instrument_node="">TOURIST ATTRACTIONS</span></span></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1942" style="color:#000000;"><span data-dcnode-id="1943" instrument_node="">HISTORICAL</span></span></p><span data-dcnode-id="1940" instrument_node="">
</span><p data-dcnode-id="1933"><span data-dcnode-id="1938" style="color:#000000;"><span data-dcnode-id="1939" instrument_node="">Rizal Memorial Plaza (Bontoc)</span></span><br data-dcnode-id="1937"><span data-dcnode-id="1936" instrument_node="">
</span><span data-dcnode-id="1934" style="color:#000000;"><span data-dcnode-id="1935" instrument_node=""> Found at the heart of the capital town. The statue of Dr. Jose Rizal stands towering the plaza, which serves as a good respite and also as a playground and meeting venue for programs and other gatherings.</span></span></p><span data-dcnode-id="1932" instrument_node="">
</span><p data-dcnode-id="1929"><span data-dcnode-id="1930" style="color:#000000;"><span data-dcnode-id="1931" instrument_node="">CULTURAL</span></span></p><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1926" style="color:#000000;"><span data-dcnode-id="1927" instrument_node="">Bontoc Village Museum (Bontoc)</span></span><br data-dcnode-id="1925"><span data-dcnode-id="1924" instrument_node="">
</span><span data-dcnode-id="1922" style="color:#000000;"><span data-dcnode-id="1923" instrument_node=""> Located within the Catholic Sister’s Convent and Saint Vincent’s Elementary School. Sister Basil Gekiere, ICM, founded it. It features a range of artifacts crafted by the Igorots for domestic purposes, to be used for traditional celebrations or practices. Inside the museum, one could appreciate the distinct richness of the Igorot’s way of life. Beside the museum building is a model of traditional Bontoc village, which highlights some of the various aspects of the Bontoc material culture.</span></span></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1918" style="color:#000000;"><span data-dcnode-id="1919" instrument_node="">Backstrap and Loom Weaving Houses</span></span><br data-dcnode-id="1917"><span data-dcnode-id="1916" instrument_node="">
</span><span data-dcnode-id="1914" style="color:#000000;"><span data-dcnode-id="1915" instrument_node=""> Loom weaving is done in Sabangan and Sagada. Samoki, a village in Bontoc specialize in backstrap weaving. Various colorful woven materials like knapsacks, placemats, bags and purses among other products.</span></span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1910" style="color:#000000;"><span data-dcnode-id="1911" instrument_node="">Ato/Dap-ay</span></span><br data-dcnode-id="1909"><span data-dcnode-id="1908" instrument_node="">
</span><span data-dcnode-id="1906" style="color:#000000;"><span data-dcnode-id="1907" instrument_node=""> Traditionally, it is a place where the council of elders hold various ceremonies, meetings and happenings which maybe religious, social and political in nature. It is a public structure used as a dormitory by the bachelors, widowers, young boys and visitors in the village. A fireplace is built at the center and a wooden pole stands opposite it where heads of animals butchered and sacrificed are hung.</span></span></p><span data-dcnode-id="1904" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1902" style="color:#000000;"><span data-dcnode-id="1903" instrument_node="">NATURAL</span></span></p><span data-dcnode-id="1900" instrument_node="">

</span><span data-dcnode-id="1894" style="color:#000000;"><span data-dcnode-id="1895" instrument_node=""> Eighteen kilometers up from Bontoc; 30 minutes by chartered of Public Utility Jeepney ride (Bontoc-Mainit – 1:00 to 2:00 p.m.) or two (2) hours by foot.</span></span></p><span data-dcnode-id="1892" instrument_node="">

</span><p data-dcnode-id="1869"><span data-dcnode-id="1874" style="color:#000000;"><span data-dcnode-id="1875" instrument_node="">Caves / Hanging Coffins</span></span><br data-dcnode-id="1873"><span data-dcnode-id="1872" instrument_node="">
</span><span data-dcnode-id="1870" style="color:#000000;"><span data-dcnode-id="1871" instrument_node=""> Feature shimmering underground streams with golden or silvery stalactite and stalagmite formations and cool nature pools inside. Hanging coffins placed high steep rock formations.</span></span></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1866" style="color:#000000;"><span data-dcnode-id="1867" instrument_node="">Sagada</span></span><br data-dcnode-id="1865"><span data-dcnode-id="1864" instrument_node="">
</span><span data-dcnode-id="1862" style="color:#000000;"><span data-dcnode-id="1863" instrument_node=""> Matangkib Cave, Sugong Cave, Lumiyang Cave, Sumaguing Cave, Balangagan Cave, Nangongogan Cave, Latipan Cave, Cansil Cave</span></span></p><span data-dcnode-id="1860" instrument_node="">

</span><h2 data-dcnode-id="1693" style="text-align:center;"><span data-dcnode-id="1694" style="color:#000000;"><span data-dcnode-id="1695" instrument_node="">&nbsp;</span></span></h2><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1689"><span class="innerFont" data-dcnode-id="1690" style="color:#000000;"><span data-dcnode-id="1691" instrument_node="">TOURIST ATTRACTIONS</span></span></p><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1686" style="color:#000000;"><span data-dcnode-id="1687" instrument_node="">HISTORICAL</span></span></p><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1681"><span data-dcnode-id="1682" style="color:#000000;"><span data-dcnode-id="1683" instrument_node="">Aguinaldo Hill</span></span></p><span data-dcnode-id="1680" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" style="color:#000000;"><span data-dcnode-id="1679" instrument_node="">It is located at Barangay Asibanglan-Pinukpuk Road at Allaguia junction. Gen. Aguinaldo used this hill as a common post during the Philippine-American war.</span></span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1673"><span data-dcnode-id="1674" style="color:#000000;"><span data-dcnode-id="1675" instrument_node="">CULTURAL</span></span></p><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1670" style="color:#000000;"><span data-dcnode-id="1671" instrument_node="">Mini-Museum of Kalinga</span></span></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" style="color:#000000;"><span data-dcnode-id="1667" instrument_node="">A mini-museum was initiated and established by the Kalinga Special Development Authority situated in their office building at Bulanao, Tabuk.</span></span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1662" style="color:#000000;"><span data-dcnode-id="1663" instrument_node="">NATURAL</span></span></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1658" style="color:#000000;"><span data-dcnode-id="1659" instrument_node="">Sungang ViewPoint</span></span><br data-dcnode-id="1657"><span data-dcnode-id="1656" instrument_node="">
</span><span data-dcnode-id="1654" style="color:#000000;"><span data-dcnode-id="1655" instrument_node=""> The viewpoint affords a majestic view of the valley villages and mountains of Tinglayan, Tanudan, Tabuk and Lubuagan. A very good view of the Tulgao and Dananao Rice Terraces can be seen at the viewpoint.</span></span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1650" style="color:#000000;"><span data-dcnode-id="1651" instrument_node="">Palan-ah falls and hot springs</span></span><br data-dcnode-id="1649"><span data-dcnode-id="1648" instrument_node="">
</span><span data-dcnode-id="1646" style="color:#000000;"><span data-dcnode-id="1647" instrument_node=""> This waterfalls is located at Tulgao West, Tinglayan. The name is derived from the native term Pinalpallang-ah which means chair. The falls spray down from approximately 100 meters above forming a pool where during a sunny day, one practically swims at the end of the rainbow.</span></span></p><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1642" style="color:#000000;"><span data-dcnode-id="1643" instrument_node="">Mt. Mating-oy Dinayao (Sleeping Beauty)</span></span><br data-dcnode-id="1641"><span data-dcnode-id="1640" instrument_node="">
</span><span data-dcnode-id="1638" style="color:#000000;"><span data-dcnode-id="1639" instrument_node=""> These fabled mountain ranges in the border of the municipalities of Tinglayan and Tanudan and they take the form of a sleeping lady supinely lying at its back. A vantage view of the profile can be seen from the Sungang view or from Basao.</span></span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1634" style="color:#000000;"><span data-dcnode-id="1635" instrument_node="">Tinglayan Rice Terraces</span></span><br data-dcnode-id="1633"><span data-dcnode-id="1632" instrument_node="">
</span><span data-dcnode-id="1630" style="color:#000000;"><span data-dcnode-id="1631" instrument_node=""> From the Sungang View Point, the Dananao and Tulgao Rice Terraces can be viewed. These rice terraces are like an amphitheater along the whole mountain slopes.</span></span></p><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1626" style="color:#000000;"><span data-dcnode-id="1627" instrument_node="">Lubo and Mangali Rice Terraces</span></span><br data-dcnode-id="1625"><span data-dcnode-id="1624" instrument_node="">
</span><span data-dcnode-id="1622" style="color:#000000;"><span data-dcnode-id="1623" instrument_node=""> The rice terraces surrounds the villages of Lubo. The best time to view the rice terraces is during the planting season and when the rice terraces are already ready for harvest.</span></span></p><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1618" style="color:#000000;"><span data-dcnode-id="1619" instrument_node="">Mount Binaratan</span></span><br data-dcnode-id="1617"><span data-dcnode-id="1616" instrument_node="">
</span><span data-dcnode-id="1614" style="color:#000000;"><span data-dcnode-id="1615" instrument_node=""> This fabled mountain is located in Dacalan. It is the entry point of General Emilio Aguinaldo during his retreat to Kalinga.</span></span></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1610" style="color:#000000;"><span data-dcnode-id="1611" instrument_node="">Taga-aran aran Kabunian</span></span><br data-dcnode-id="1609"><span data-dcnode-id="1608" instrument_node="">
</span><span data-dcnode-id="1606" style="color:#000000;"><span data-dcnode-id="1607" instrument_node=""> This area is located above Barangay Lubo at the source of Gaburao Creek. At the side is a cave where Kabunian stayed while sawing lumber for his house.</span></span></p><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1602" style="color:#000000;"><span data-dcnode-id="1603" instrument_node="">Ugid Maling Subterranean River</span></span><br data-dcnode-id="1601"><span data-dcnode-id="1600" instrument_node="">
</span><span data-dcnode-id="1598" style="color:#000000;"><span data-dcnode-id="1599" instrument_node=""> Located four kilometers away from Poblacion, Balbalan and a good three and half hours ride from the Capital Town. It is a maze of cavernous boulders and rocks atop each other forming a cavern.</span></span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1594" style="color:#000000;"><span data-dcnode-id="1595" instrument_node="">Balbalasang National Park</span></span><br data-dcnode-id="1593"><span data-dcnode-id="1592" instrument_node="">
</span><span data-dcnode-id="1590" style="color:#000000;"><span data-dcnode-id="1591" instrument_node=""> This is a monument of the opposition of the Kalingas against the logging companies.</span></span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1586" style="color:#000000;"><span data-dcnode-id="1587" instrument_node="">Buaya Caves</span></span><br data-dcnode-id="1585"><span data-dcnode-id="1584" instrument_node="">
</span><span data-dcnode-id="1582" style="color:#000000;"><span data-dcnode-id="1583" instrument_node=""> It is similar to Sagada Caves with stalactites and stalagmites formations. The caves are interconnected with each other and cover the whole mountain slope.</span></span></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1578" style="color:#000000;"><span data-dcnode-id="1579" instrument_node="">Aciga Tree</span></span><br data-dcnode-id="1577"><span data-dcnode-id="1576" instrument_node="">
</span><span data-dcnode-id="1574" style="color:#000000;"><span data-dcnode-id="1575" instrument_node=""> This is perhaps the biggest acacia tree in Kalinga within a village. It is found at the school ground of the Aciga Elementary School and it is rumored that the tree is a landmark for the treasures of Yamashita.</span></span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1570" style="color:#000000;"><span data-dcnode-id="1571" instrument_node="">Bonnong Lakes and Asibanglan Lakes</span></span><br data-dcnode-id="1569"><span data-dcnode-id="1568" instrument_node="">
</span><span data-dcnode-id="1566" style="color:#000000;"><span data-dcnode-id="1567" instrument_node=""> These are a mountain lakes in Pinukpuk where eels thrive and can be recommended area for research.</span></span></p><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1562" style="color:#000000;"><span data-dcnode-id="1563" instrument_node="">Aguinaldo Hill</span></span><br data-dcnode-id="1561"><span data-dcnode-id="1560" instrument_node="">
</span><span data-dcnode-id="1558" style="color:#000000;"><span data-dcnode-id="1559" instrument_node=""> This the hill where the Katipuneros made their last stand in Kalinga from the pursuing the Americans from Abra.</span></span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1554" style="color:#000000;"><span data-dcnode-id="1555" instrument_node="">Padcharao Lake</span></span><br data-dcnode-id="1553"><span data-dcnode-id="1552" instrument_node="">
</span><span data-dcnode-id="1550" style="color:#000000;"><span data-dcnode-id="1551" instrument_node=""> The name is derived from the plants that abounds in the lake called â€œChargoâ€ in the Pasil and is located approximately from 1, 800 to 2, 000 meters above sea level.</span></span></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1546" style="color:#000000;"><span data-dcnode-id="1547" instrument_node="">Pasil Natural Dam</span></span><br data-dcnode-id="1545"><span data-dcnode-id="1544" instrument_node="">
</span><span data-dcnode-id="1542" style="color:#000000;"><span data-dcnode-id="1543" instrument_node=""> It is located at Puapo, Dangtalan and was formed after the mountain side eroded. It is ideal for boating and picnic site during the summer months.</span></span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1538" style="color:#000000;"><span data-dcnode-id="1539" instrument_node="">Kabunian Bridge and Springs</span></span><br data-dcnode-id="1537"><span data-dcnode-id="1536" instrument_node="">
</span><span data-dcnode-id="1534" style="color:#000000;"><span data-dcnode-id="1535" instrument_node=""> These two natural landmarks are found in Maglucsad and Galdang respectively.</span></span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1530" style="color:#000000;"><span data-dcnode-id="1531" instrument_node="">Guinaang Village</span></span><br data-dcnode-id="1529"><span data-dcnode-id="1528" instrument_node="">
</span><span data-dcnode-id="1526" style="color:#000000;"><span data-dcnode-id="1527" instrument_node=""> This village has its historical importance to Kalinga as the retreat haven of Pres. Aguinaldo. This is where the Headquarters were located and the campsite.</span></span></p><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1522" style="color:#000000;"><span data-dcnode-id="1523" instrument_node="">Mabilong Weavers Village</span></span><br data-dcnode-id="1521"><span data-dcnode-id="1520" instrument_node="">
</span><span data-dcnode-id="1518" style="color:#000000;"><span data-dcnode-id="1519" instrument_node=""> This is the center of the ethnic weaving industry in the province. The village is along the road and one can buy souvenirs right from the weavers.</span></span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1514" style="color:#000000;"><span data-dcnode-id="1515" instrument_node="">Bananao and Manangol Viewpoint</span></span><br data-dcnode-id="1513"><span data-dcnode-id="1512" instrument_node="">
</span><span data-dcnode-id="1510" style="color:#000000;"><span data-dcnode-id="1511" instrument_node=""> This is along the road towards Tinglayan and one can have a panoramic view of the Chico River.</span></span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1506" style="color:#000000;"><span data-dcnode-id="1507" instrument_node="">Elephant Hill</span></span><br data-dcnode-id="1505"><span data-dcnode-id="1504" instrument_node="">
</span><span data-dcnode-id="1502" style="color:#000000;"><span data-dcnode-id="1503" instrument_node=""> This is located in Rizal and is a site of an archeological digging where the other half of the remains of the elephant war dug.</span></span></p><span data-dcnode-id="1500" instrument_node="">
