</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" style="color:#000000;"><span data-dcnode-id="1439" instrument_node="">HISTORICAL</span></span></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1434" style="color:#000000;"><span data-dcnode-id="1435" instrument_node="">Philippine War Memorial Shrine (Kiangan)</span></span><br data-dcnode-id="1433"><span data-dcnode-id="1432" instrument_node="">
</span><span data-dcnode-id="1430" style="color:#000000;"><span data-dcnode-id="1431" instrument_node=""> Gigantic memorial shrine to commemorate the end of World War II. It is a concrete pyramid type structure, which resembles an oversized Ifugao native house located at Linda, Kiangan. It depicts historical events from Filipino opposition, to the Death March and the role of the Ifugao and American troops in the defeat of General Yamashita. It could be used as a viewpoint of the Poblacion, other neighboring barangays and the capital town of Lagawe. The shrine is ten (10) kilometers away or 15 minutes drive from the capital town.</span></span></p><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1426" style="color:#000000;"><span data-dcnode-id="1427" instrument_node="">Million Dollar Hill</span></span><br data-dcnode-id="1425"><span data-dcnode-id="1424" instrument_node="">
</span><span data-dcnode-id="1422" style="color:#000000;"><span data-dcnode-id="1423" instrument_node=""> The hill overlooking the Poblacion of Kiangan. It got its name from the last war when the allied armies spent millions of dollars worth of bombs and ammunitions to annihilate the enemies in the area.</span></span></p><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1418" style="color:#000000;"><span data-dcnode-id="1419" instrument_node="">General Yamashita’s Surrender Site</span></span><br data-dcnode-id="1417"><span data-dcnode-id="1416" instrument_node="">
</span><span data-dcnode-id="1414" style="color:#000000;"><span data-dcnode-id="1415" instrument_node=""> House relics memorializing the end of W.W. II in the Philippines. Details of the surrender and signing are available. From here, General Yamashita was brought to Baguio for his formal surrender to the victorious Allies.</span></span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1410" style="color:#000000;"><span data-dcnode-id="1411" instrument_node="">Mt. Nagchayan</span></span><br data-dcnode-id="1409"><span data-dcnode-id="1408" instrument_node="">
</span><span data-dcnode-id="1406" style="color:#000000;"><span data-dcnode-id="1407" instrument_node=""> The site where Japanese troops fought fierce battles during W.W. II. The mountain has several grottos stone walled trenches and foxholes. One can also find rusty shells on this old battleground.</span></span></p><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" style="color:#000000;"><span data-dcnode-id="1403" instrument_node="">CULTURAL</span></span></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1398" style="color:#000000;"><span data-dcnode-id="1399" instrument_node="">Ifugao Museum (Kiangan)</span></span><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">
</span><span data-dcnode-id="1394" style="color:#000000;"><span data-dcnode-id="1395" instrument_node=""> This museum displays Ifugao artifacts and is under the supervision of the National Museum of the Philippines. It is 32 meters away facing the shrine and 300 meters away from the Municipal Hall.</span></span></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1390" style="color:#000000;"><span data-dcnode-id="1391" instrument_node="">Tam-an Village</span></span><br data-dcnode-id="1389"><span data-dcnode-id="1388" instrument_node="">
</span><span data-dcnode-id="1386" style="color:#000000;"><span data-dcnode-id="1387" instrument_node=""> A typical village situated 240 steps down from the Banaue Hotel’s swimming pool. Woodcarving and hand woven products are produced and sold to travelers.</span></span></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1382" style="color:#000000;"><span data-dcnode-id="1383" instrument_node="">Bokiawan Village</span></span><br data-dcnode-id="1381"><span data-dcnode-id="1380" instrument_node="">
</span><span data-dcnode-id="1378" style="color:#000000;"><span data-dcnode-id="1379" instrument_node=""> Twelve (12) kilometers from Banaue located in the center of the Bokiawan rice terraces where traditional Ifugao practices of land use and livelihood still exist.</span></span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1374" style="color:#000000;"><span data-dcnode-id="1375" instrument_node="">Pula and Cambulo Native Village</span></span><br data-dcnode-id="1373"><span data-dcnode-id="1372" instrument_node="">
</span><span data-dcnode-id="1370" style="color:#000000;"><span data-dcnode-id="1371" instrument_node=""> Is a rustic village in the first leg of the trekking route from Banaue viewpoint to Banga-an. This cobbled stone village offers a native house stay. The ancient craft of bark cloth weaving thrives here.</span></span></p><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1366" style="color:#000000;"><span data-dcnode-id="1367" instrument_node="">Apfo or Burial Tombs</span></span><br data-dcnode-id="1365"><span data-dcnode-id="1364" instrument_node="">
</span><span data-dcnode-id="1362" style="color:#000000;"><span data-dcnode-id="1363" instrument_node=""> These are large stone mausoleums containing the bones of the town’s ancient warriors and elite. The construction of these Igloos represents the resourceful use of Ifugao stoning technique.</span></span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1358" style="color:#000000;"><span data-dcnode-id="1359" instrument_node="">Makaliwagha &amp; Lebhong Burial Caves</span></span><br data-dcnode-id="1357"><span data-dcnode-id="1356" instrument_node="">
</span><span data-dcnode-id="1354" style="color:#000000;"><span data-dcnode-id="1355" instrument_node=""> Are filled with wood coffins and the remains of the first people of Mayoyao. A legend tells of an attentive lizard leading people to these three chambers designating each one for men, women and children.</span></span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1350" style="color:#000000;"><span data-dcnode-id="1351" instrument_node="">Lumauig Stone</span></span><br data-dcnode-id="1349"><span data-dcnode-id="1348" instrument_node="">
</span><span data-dcnode-id="1346" style="color:#000000;"><span data-dcnode-id="1347" instrument_node=""> Is a huge enchanted black rock held by only three smaller stones in the middle of the Balangbang river. It is believed to mean that Mayoyao people will stay strong and happy as long as the stone stands.</span></span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" style="color:#000000;"><span data-dcnode-id="1343" instrument_node="">OTHER SCENIC SITES:</span></span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1338" style="color:#000000;"><span data-dcnode-id="1339" instrument_node="">Bocos Village Poitan Village</span></span><br data-dcnode-id="1337"><span data-dcnode-id="1336" instrument_node="">
</span><span data-dcnode-id="1334" style="color:#000000;"><span data-dcnode-id="1335" instrument_node=""> Batad Village Hapao Village</span></span><br data-dcnode-id="1333"><span data-dcnode-id="1332" instrument_node="">
</span><span data-dcnode-id="1330" style="color:#000000;"><span data-dcnode-id="1331" instrument_node=""> Bangaan Village Ducligan Village</span></span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" style="color:#000000;"><span data-dcnode-id="1327" instrument_node="">These villages are characterized by the presence of a wholesome community where the livelihood activities are within the surroundings, and the houses are clustered in a designated area. They showcase the typical Ifugao community.</span></span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1322" style="color:#000000;"><span data-dcnode-id="1323" instrument_node="">NATURAL</span></span></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1318" style="color:#000000;"><span data-dcnode-id="1319" instrument_node="">Bintakan Cave (Lagawe)</span></span><br data-dcnode-id="1317"><span data-dcnode-id="1316" instrument_node="">
</span><span data-dcnode-id="1314" style="color:#000000;"><span data-dcnode-id="1315" instrument_node=""> It is located at the rocky slope of Ibulao, which is about 2 kilometers from the provincial capitol. The mouth of the cave is overlooking the Ibulao River. It is a three-room cave with dripping water that forms stalactites and stalagmites of different beautiful shapes. It can be reached by tricycle ride and 20-minute ascent to the mouth of the cave.</span></span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1310" style="color:#000000;"><span data-dcnode-id="1311" instrument_node="">Nah-toban Cave (Lagawe)</span></span><br data-dcnode-id="1309"><span data-dcnode-id="1308" instrument_node="">
</span><span data-dcnode-id="1306" style="color:#000000;"><span data-dcnode-id="1307" instrument_node=""> The cave is much larger than Bintakan Cave and has a descending entrance with four rooms but there are still other rooms unexplored. It is located at Boliwong, Lagawe, about 4 kilometers hike from the Poblacion passing through trails. Huge quantities of guano are found in the cave.</span></span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1302" style="color:#000000;"><span data-dcnode-id="1303" instrument_node="">Tocucan Sulfur Hot Spring (Tinoc)</span></span><br data-dcnode-id="1301"><span data-dcnode-id="1300" instrument_node="">
</span><span data-dcnode-id="1298" style="color:#000000;"><span data-dcnode-id="1299" instrument_node=""> A sulfuric hot spring at Barangay Tukukan in the Municipality of Tinoc. This can be reached by a two-hour hike from Monsoyosoy, Buguias, and Benguet.</span></span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1294" style="color:#000000;"><span data-dcnode-id="1295" instrument_node="">Guihob Natural Swimming Pool (Banaue)</span></span><br data-dcnode-id="1293"><span data-dcnode-id="1292" instrument_node="">
</span><span data-dcnode-id="1290" style="color:#000000;"><span data-dcnode-id="1291" instrument_node=""> A four kilometer drive from Banaue, Poblacion. One has to hop and jump over huge boulders to reach the crystal clear waters of Guihob. It is a perfect place for those who prefer a cool and refreshing swim.</span></span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1286" style="color:#000000;"><span data-dcnode-id="1287" instrument_node="">Tappiya Waterfalls (Banaue)</span></span><br data-dcnode-id="1285"><span data-dcnode-id="1284" instrument_node="">
</span><span data-dcnode-id="1282" style="color:#000000;"><span data-dcnode-id="1283" instrument_node=""> About 30 minutes from Batad Village is a cascading waterfall with its enormous natural pool for swimming. A visit to Batad would be incomplete without seeing this beautiful waterfall.</span></span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1278" style="color:#000000;"><span data-dcnode-id="1279" instrument_node="">Buyukan Waterfalls (Hungduan)</span></span><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">
</span><span data-dcnode-id="1274" style="color:#000000;"><span data-dcnode-id="1275" instrument_node=""> This can only be reached by a three-hour hike from Poblacion, Hungduan. This is located in Barangay Abatan and is near the border of Hungduan and Tinoc municipalities.</span></span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1270" style="color:#000000;"><span data-dcnode-id="1271" instrument_node="">Ambuwaya Lake (Kiangan)</span></span><br data-dcnode-id="1269"><span data-dcnode-id="1268" instrument_node="">
</span><span data-dcnode-id="1266" style="color:#000000;"><span data-dcnode-id="1267" instrument_node=""> Legend says that the area was once a large sitio that became a lake because some children killed and made fun of the leeches in the spring. The lake is deep and good for swimming and boating. The shaded surroundings is an ideal place for picnics. It is now the site of a research on fishing culture. The lake is four (4) kilometers from the town center of Kiangan and can be reached by four-wheel drive vehicles.</span></span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1262" style="color:#000000;"><span data-dcnode-id="1263" instrument_node="">Ducligan Hot Springs (Banaue)</span></span><br data-dcnode-id="1261"><span data-dcnode-id="1260" instrument_node="">
</span><span data-dcnode-id="1258" style="color:#000000;"><span data-dcnode-id="1259" instrument_node=""> These hot springs are found at the bank of Ducligan River and adjacent to a deep pool. Ducligan is 21 kilometers away from the Poblacion.</span></span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1254" style="color:#000000;"><span data-dcnode-id="1255" instrument_node="">O’ phaw Mahencha Falls</span></span><br data-dcnode-id="1253"><span data-dcnode-id="1252" instrument_node="">
</span><span data-dcnode-id="1250" style="color:#000000;"><span data-dcnode-id="1251" instrument_node=""> (Leap of Mahencha) Located about six kilometers from the town proper is a series of high cascading falls. Local folklore says that a beautiful Mahencha had to jump 13 to 5 meters into the water to retrieve her native amber necklace which fell while she was taking a bath.</span></span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1246" style="color:#000000;"><span data-dcnode-id="1247" instrument_node="">Tenogtog Water Falls</span></span><br data-dcnode-id="1245"><span data-dcnode-id="1244" instrument_node="">
</span><span data-dcnode-id="1242" style="color:#000000;"><span data-dcnode-id="1243" instrument_node=""> Located five kilometers from town, it has three natural pools rising about 12 meters from each other. The water falls from the pool cascades to the next in beautiful succession. Untouched by human hands, these natural pools provide clear cool mountain spring water.</span></span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1238" style="color:#000000;"><span data-dcnode-id="1239" instrument_node="">Bagnit Waterfalls and Numbungug Waterfalls</span></span><br data-dcnode-id="1237"><span data-dcnode-id="1236" instrument_node="">
</span><span data-dcnode-id="1234" style="color:#000000;"><span data-dcnode-id="1235" instrument_node=""> Are located in Julongan barangay. Bagnit is a stunning series of cascading falls running over 250 feet, while Numbungug Waterfall is a single majestic fall of over 80 feet into height falling to the Ibulao river tributaries.</span></span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1230" style="color:#000000;"><span data-dcnode-id="1231" instrument_node="">Chuyong Viewpoint</span></span><br data-dcnode-id="1229"><span data-dcnode-id="1228" instrument_node="">
</span><span data-dcnode-id="1226" style="color:#000000;"><span data-dcnode-id="1227" instrument_node=""> Is located near the town proper which affords a panoramic vista of the Mayoyao World Heritage site cluster. The glory of the site is unrivaled.</span></span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1222" style="color:#000000;"><span data-dcnode-id="1223" instrument_node="">Kibayuyong Stone</span></span><br data-dcnode-id="1221"><span data-dcnode-id="1220" instrument_node="">
</span><span data-dcnode-id="1218" style="color:#000000;"><span data-dcnode-id="1219" instrument_node=""> This is a legendary stone which lies next to the Hapao river. The site offers an adventurous spot for river swimming and diving.</span></span></p><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1214" style="color:#000000;"><span data-dcnode-id="1215" instrument_node="">Bogya Hot Springs</span></span><br data-dcnode-id="1213"><span data-dcnode-id="1212" instrument_node="">
</span><span data-dcnode-id="1210" style="color:#000000;"><span data-dcnode-id="1211" instrument_node=""> Is located in Ba-ang that lie in the Hapao river which serves as delightful respite after trekking.</span></span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" style="color:#000000;"><span data-dcnode-id="1207" instrument_node="">MAN – MADE</span></span></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1202" style="color:#000000;"><span data-dcnode-id="1203" instrument_node="">Banaue Rice Terraces (Banaue)</span></span><br data-dcnode-id="1201"><span data-dcnode-id="1200" instrument_node="">
</span><span data-dcnode-id="1198" style="color:#000000;"><span data-dcnode-id="1199" instrument_node=""> Dubbed as the Eight Wonder of the World. The rice terraces start from the base of the mountain range and reach up to several thousands feet high. It is said that its length, if put end to end would encircle half of the globe. Made 2,000 years ago, these rice terraces manifest the engineering skill and ingenuity of the sturdy Ifugaos. In 1995, it was inscribed in the UNESCO Heritage List as a Continuing Cultural Landscape.</span></span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1194" style="color:#000000;"><span data-dcnode-id="1195" instrument_node="">Batad Rice Terraces (Banaue)</span></span><br data-dcnode-id="1193"><span data-dcnode-id="1192" instrument_node="">
</span><span data-dcnode-id="1190" style="color:#000000;"><span data-dcnode-id="1191" instrument_node=""> These rice terraces are shaped like of an amphitheater and is located in barangay Batad. It can be reached by a twelve-kilometer ride from Banaue Hotel and a 2-hour hike uphill through mountain trails.</span></span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1186" style="color:#000000;"><span data-dcnode-id="1187" instrument_node="">Mayoyao Rice Terraces (Mayoyao)</span></span><br data-dcnode-id="1185"><span data-dcnode-id="1184" instrument_node="">
</span><span data-dcnode-id="1182" style="color:#000000;"><span data-dcnode-id="1183" instrument_node=""> This spot is 44 kilometers away from Poblacion, Banaue. The Poblacion of Mayoyao lies in the midst of these rice terraces thus upon arrival in the town, one is awed with a breathtaking view of the rice terraces where all the dikes are tiered with flat stones.</span></span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1178" style="color:#000000;"><span data-dcnode-id="1179" instrument_node="">Hapao Rice Terraces (Hungduan)</span></span><br data-dcnode-id="1177"><span data-dcnode-id="1176" instrument_node="">
</span><span data-dcnode-id="1174" style="color:#000000;"><span data-dcnode-id="1175" instrument_node=""> This is another stonewalled rice terraces located in the municipality of Hungduan and is 55 kilometers from the capital town of Lagawe.</span></span></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1170" style="color:#000000;"><span data-dcnode-id="1171" instrument_node="">Magat Dam (Alfonso Lista)</span></span><br data-dcnode-id="1169"><span data-dcnode-id="1168" instrument_node="">
</span><span data-dcnode-id="1166" style="color:#000000;"><span data-dcnode-id="1167" instrument_node=""> It is reputedly the biggest dam in Asia. This is located near the municipality of Alfonso Lista and about 25 kilometers from the town center of Santa Maria.</span></span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1162" style="color:#000000;"><span data-dcnode-id="1163" instrument_node="">Nagacadan Rice Terraces</span></span><br data-dcnode-id="1161"><span data-dcnode-id="1160" instrument_node="">
</span><span data-dcnode-id="1158" style="color:#000000;"><span data-dcnode-id="1159" instrument_node=""> Are found in Kiangan and these show how forest management and rice terracing are complementary.</span></span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" style="color:#000000;"><span data-dcnode-id="1155" instrument_node="">SPECIAL INTEREST</span></span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1150" style="color:#000000;"><span data-dcnode-id="1151" instrument_node="">Mt. Amuyao</span></span><br data-dcnode-id="1149"><span data-dcnode-id="1148" instrument_node="">
</span><span data-dcnode-id="1146" style="color:#000000;"><span data-dcnode-id="1147" instrument_node=""> This 8th highest peak in the Philippines with an elevation of 2,702 meters (8,865) above sea level is located between the boundary line of Banaue and Mayoyao and between Ifugao and Mountain Province. Its summit provides the climber with a breath-taking panorama of Mountain Province, Isabela, Nueva Viscaya and Ifugao. Mayoyao legend says that the first Ifugao couple, Bugan and Wigan took refuge in this mountain during the 40-day deluge that inundated the province. Being the only survivors, they became the first ancestors of the Ifugaos.</span></span></p><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1142" style="color:#000000;"><span data-dcnode-id="1143" instrument_node="">Mount Napulawan</span></span><br data-dcnode-id="1141"><span data-dcnode-id="1140" instrument_node="">
</span><span data-dcnode-id="1138" style="color:#000000;"><span data-dcnode-id="1139" instrument_node=""> Located in the municipality of Hungduan, this mountain is very accessible to mountain trekkers. The thick tropical rain forest and its rare flora fascinate conquerors of this peak. Trees near the peak are unusually short.</span></span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1134" style="color:#000000;"><span data-dcnode-id="1135" instrument_node="">Mount Anapawon</span></span><br data-dcnode-id="1133"><span data-dcnode-id="1132" instrument_node="">
</span><span data-dcnode-id="1130" style="color:#000000;"><span data-dcnode-id="1131" instrument_node=""> Centrally located in Ifugao, this mountain peak is considered a potential camping site to be developed in the province. It provides a breathtaking view of Hungduan municipality, and the low-lying municipalities of Lagawe and Kiangan and the rice terraces of Hingyon.</span></span></p><span data-dcnode-id="1128" instrument_node="">

</span><div data-dcnode-id="1121"><span data-dcnode-id="1122" style="color:#000000;"><span data-dcnode-id="1123" instrument_node="">&nbsp;</span></span></div><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1117"><span class="innerFont" data-dcnode-id="1118" style="color:#000000;"><span data-dcnode-id="1119" instrument_node="">TOURIST ATTRACTIONS</span></span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1114" style="color:#000000;"><span data-dcnode-id="1115" instrument_node="">HISTORICAL</span></span></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1110" style="color:#000000;"><span data-dcnode-id="1111" instrument_node="">Casa Real</span></span><br data-dcnode-id="1109"><span data-dcnode-id="1108" instrument_node="">
</span><span data-dcnode-id="1106" style="color:#000000;"><span data-dcnode-id="1107" instrument_node=""> A facade of the first provincial capitol of Abra, located at Bucay, Abra.</span></span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1102" style="color:#000000;"><span data-dcnode-id="1103" instrument_node="">Grabriela Silang Monument</span></span><br data-dcnode-id="1101"><span data-dcnode-id="1100" instrument_node="">
