</span><span class="category" data-dcnode-id="1314"><span data-dcnode-id="1318" instrument_node="">Posted in </span><a data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyinyourstate.com/states/alabama/"><span data-dcnode-id="1317" instrument_node="">Alabama</span></a><span data-dcnode-id="1315" instrument_node=""> </span></span><span data-dcnode-id="1313" instrument_node="">

</span><span class="author" data-dcnode-id="1301"><span data-dcnode-id="1304" instrument_node="">by </span><a data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlyinyourstate.com/author/jyoung/" rel="author" title="Posts by Jennifer Young"><span data-dcnode-id="1303" instrument_node="">Jennifer Young</span></a></span><span data-dcnode-id="1300" instrument_node=""> </span></div><span data-dcnode-id="1298" instrument_node="">
</span><h1 data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">10 Historical Landmarks You Absolutely Must Visit In Alabama</span></h1><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Many historical events have taken place in Alabama. Fortunately, several historical landmarks are scattered throughout Alabama that allow us to learn all about the state’s history. Sure, reading about Alabama’s historical events and/or landmarks in a book is always an option, but nothing compares to seeing an actual landmark up close and in person. Listed below are 10 historical landmarks in Alabama that are definitely worth visiting.</span></p><span data-dcnode-id="1292" instrument_node="">
</span><div class="content-covid19-disclaimer-v1" data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">
			During these uncertain times, please keep safety in mind and consider adding destinations to your bucket list to visit at a later date.
		</span></div><span data-dcnode-id="1289" instrument_node="">
</span><div class="gallery gallery-instance-1 gallery-post-308919" data-dcnode-id="1065" id="gallery-1"><span data-dcnode-id="1288" instrument_node="">
</span><figure class="gallery-item attachment-308945 orientation-landscape size-large" data-dcnode-id="1271"><span data-dcnode-id="1287" instrument_node="">
</span><figcaption class="gallery-caption" data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">1. USS Alabama (BB-60) - Mobile, AL</span></figcaption><span data-dcnode-id="1284" instrument_node="">
</span><div class="gallery-image-container" data-dcnode-id="1280"><span data-dcnode-id="1283" instrument_node="">
</span><img alt="" class="gallery-image" data-dcnode-id="1282" data-pin-description="1. USS Alabama (BB-60) - Mobile, AL" data-pin-url="https://www.onlyinyourstate.com/alabama/historical-landmarks-al/" height="470" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/1399349438_01692141d3_o-700x470.jpg&amp;raw" width="700"><span data-dcnode-id="1281" instrument_node="">
</span></div><span data-dcnode-id="1279" instrument_node="">
</span><div class="gallery-credit" data-dcnode-id="1276"><a data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/hyku/1399349438/in/photolist-38E2Qs-38zt5H-38E2BL-38zsBZ-38ztmt-38E1Dd-392q1N-38zsQX-38E2xm-38E1ub-38zsmi-38E25o-38zsrM-392pV5-38ztAe-38E1S7-38zsW6-38E1zb-38E2jL-392pQY-38zeNV-38yWSi-38WS6v-38DAZh-38zfV4-38DD9w-75vYKb-38zdEP-38Du9m-38zewX-38DRbf-4W96mH-38yUje-38z8Ez-kvwrfh-38DDAS-38zdra-38z7tg-38Dzcu-38z5XZ-38yY2V-38zcY8-38Dtps-38DRGo-38DPnf-38zd9p-38DQwY-38zgFt-38zdii-75s7vg" target="_blank"><span data-dcnode-id="1278" instrument_node="">flickr/Josh Hallett</span></a></div><span data-dcnode-id="1275" instrument_node="">
</span><div class="gallery-description" data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">The USS Alabama (BB-60) was commissioned in 1942 and served in World War II. This historic battleship was retired in 1962 and taken to Mobile Bay in 1964 to be opened as a museum the following year. In 1986, the USS Alabama (BB-60) was added to the National Historic Landmark registry.</span></div><span data-dcnode-id="1272" instrument_node="">
</span></figure><span data-dcnode-id="1270" instrument_node="">
</span><figure class="gallery-item attachment-308948 orientation-landscape size-large" data-dcnode-id="1251"><span data-dcnode-id="1269" instrument_node="">
</span><figcaption class="gallery-caption" data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">2. Gaineswood - Demopolis, AL</span></figcaption><span data-dcnode-id="1266" instrument_node="">
</span><div class="gallery-image-container" data-dcnode-id="1260"><span data-dcnode-id="1265" instrument_node="">
</span><img alt="" class="gallery-image lazy-load javascript-required" data-dcnode-id="1264" data-pin-description="2. Gaineswood - Demopolis, AL" data-pin-url="https://www.onlyinyourstate.com/alabama/historical-landmarks-al/" data-src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/AL-Landmark-4-700x467.jpg" height="467" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/themes/oiys-2017-08/images/img-lazy-load.jpg&amp;raw" width="700"><noscript data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">&lt;img width="700" height="467" src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/AL-Landmark-4-700x467.jpg" class=" gallery-image  lazy-load " alt="" loading="lazy"  data-pin-description="2. Gaineswood - Demopolis, AL"  data-pin-url="https://www.onlyinyourstate.com/alabama/historical-landmarks-al/" /&gt;</span></noscript><span data-dcnode-id="1261" instrument_node="">
</span></div><span data-dcnode-id="1259" instrument_node="">
</span><div class="gallery-credit" data-dcnode-id="1256"><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AGaineswood_by_Highsmith_001.jpg" target="_blank"><span data-dcnode-id="1258" instrument_node="">wikimedia commons/Carol M. Highsmith</span></a></div><span data-dcnode-id="1255" instrument_node="">
</span><div class="gallery-description" data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Gaineswood, which was built between the years 1843-1861, is the grandest plantation home ever built in Marengo County, Alabama and is one of the most remarkable examples of Greek Revival architecture still standing in the state today.</span></div><span data-dcnode-id="1252" instrument_node="">
</span></figure><span data-dcnode-id="1250" instrument_node="">
</span><span data-dcnode-id="1248" instrument_node=""> </span><span data-dcnode-id="1246" instrument_node="">
</span><div class="advertisement-google no-print gallery-ad" data-dcnode-id="1239"><span data-dcnode-id="1245" instrument_node="">
</span><div data-dcnode-id="1241" id="inline1-1"></div><span data-dcnode-id="1240" instrument_node=""> </span></div><span data-dcnode-id="1238" instrument_node="">
</span><figure class="gallery-item attachment-308947 orientation-landscape size-large" data-dcnode-id="1219"><span data-dcnode-id="1237" instrument_node="">
</span><figcaption class="gallery-caption" data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">3. Fort Morgan - Fort Morgan, AL</span></figcaption><span data-dcnode-id="1234" instrument_node="">
</span><div class="gallery-image-container" data-dcnode-id="1228"><span data-dcnode-id="1233" instrument_node="">
</span><img alt="" class="gallery-image lazy-load javascript-required" data-dcnode-id="1232" data-pin-description="3. Fort Morgan - Fort Morgan, AL" data-pin-url="https://www.onlyinyourstate.com/alabama/historical-landmarks-al/" data-src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/AL-Landmark-3-700x525.jpg" height="525" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/themes/oiys-2017-08/images/img-lazy-load.jpg&amp;raw" width="700"><noscript data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">&lt;img width="700" height="525" src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/AL-Landmark-3-700x525.jpg" class=" gallery-image  lazy-load " alt="" loading="lazy"  data-pin-description="3. Fort Morgan - Fort Morgan, AL"  data-pin-url="https://www.onlyinyourstate.com/alabama/historical-landmarks-al/" /&gt;</span></noscript><span data-dcnode-id="1229" instrument_node="">
</span></div><span data-dcnode-id="1227" instrument_node="">
</span><div class="gallery-credit" data-dcnode-id="1224"><a data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AFortMorgan02.jpg" target="_blank"><span data-dcnode-id="1226" instrument_node="">wikimedia commons/Edibobb</span></a></div><span data-dcnode-id="1223" instrument_node="">
</span><div class="gallery-description" data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Fort Morgan, located at the mouth of Mobile Bay, Alabama, is a historic masonry star fort that was named in honor of Revolutionary War hero Daniel Morgan. It became a National Historic Landmark in 1960. And in 2007, it was listed as "one of the nation's 10 most endangered battle sites" by the Civil War Preservation Trust.</span></div><span data-dcnode-id="1220" instrument_node="">
</span></figure><span data-dcnode-id="1218" instrument_node="">
</span><figure class="gallery-item attachment-308954 orientation-landscape size-large" data-dcnode-id="1199"><span data-dcnode-id="1217" instrument_node="">
</span><figcaption class="gallery-caption" data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">4. Alabama State Capitol - Montgomery, AL</span></figcaption><span data-dcnode-id="1214" instrument_node="">
</span><div class="gallery-image-container" data-dcnode-id="1208"><span data-dcnode-id="1213" instrument_node="">
</span><img alt="" class="gallery-image lazy-load javascript-required" data-dcnode-id="1212" data-pin-description="4. Alabama State Capitol - Montgomery, AL" data-pin-url="https://www.onlyinyourstate.com/alabama/historical-landmarks-al/" data-src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/4588634635_6248f21b83_o-700x466.jpg" height="466" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/themes/oiys-2017-08/images/img-lazy-load.jpg&amp;raw" width="700"><noscript data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">&lt;img width="700" height="466" src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/4588634635_6248f21b83_o-700x466.jpg" class=" gallery-image  lazy-load " alt="" loading="lazy"  data-pin-description="4. Alabama State Capitol - Montgomery, AL"  data-pin-url="https://www.onlyinyourstate.com/alabama/historical-landmarks-al/" /&gt;</span></noscript><span data-dcnode-id="1209" instrument_node="">
</span></div><span data-dcnode-id="1207" instrument_node="">
</span><div class="gallery-credit" data-dcnode-id="1204"><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/wrherndon/4588634635/in/photolist-7ZtXdg-z8Mpa-qAyby2-EvCAv-EvCAk-6roqSo-7ndgJf-5imMGA-7n9nmZ-8TUCHt-7ndgWJ-5dH3jb-8TSFP2-8VdhQ-gLqB4-8ZmJcM-8nmZXZ-64hJ6v-6dQHaN-8VdhP-6dLyNP-BNp4uY-CAmUG3-7tUngE-8oWHnz-9HKRK4-7ZtXfD-konv9D-CRS9f6-9VWJ5e-6roqoQ-8VcV8-5dH38W-8TWXRB-8VdNo-8Zqfiu-8TVLS3-7tUn9s-8ZpWbb-5imMP3-gK79Z-8ZmJcx-CKUTs4-8oZSkJ-7ndhaA-7tUncY-7tQqU6-8TVLDU-uSaBz-7n9oeF" target="_blank"><span data-dcnode-id="1206" instrument_node="">flickr/Bill Herndon</span></a></div><span data-dcnode-id="1203" instrument_node="">
</span><div class="gallery-description" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">The Alabama State Capitol, located on Capitol Hill, is listed on the National Register of Historic Places as the First Confederate Capitol. This historic building was declared a National Historic Landmark on December 19, 1960.</span></div><span data-dcnode-id="1200" instrument_node="">
</span></figure><span data-dcnode-id="1198" instrument_node="">
</span><figure class="gallery-item attachment-308949 orientation-landscape size-large" data-dcnode-id="1179"><span data-dcnode-id="1197" instrument_node="">
</span><figcaption class="gallery-caption" data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">5. Edmund Pettus Bridge - Selma, AL</span></figcaption><span data-dcnode-id="1194" instrument_node="">
</span><div class="gallery-image-container" data-dcnode-id="1188"><span data-dcnode-id="1193" instrument_node="">
</span><img alt="" class="gallery-image lazy-load javascript-required" data-dcnode-id="1192" data-pin-description="5. Edmund Pettus Bridge - Selma, AL" data-pin-url="https://www.onlyinyourstate.com/alabama/historical-landmarks-al/" data-src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/AL-Landmark-7-700x467.jpg" height="467" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/themes/oiys-2017-08/images/img-lazy-load.jpg&amp;raw" width="700"><noscript data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">&lt;img width="700" height="467" src="https://img-aws.ehowcdn.com/700x/cdn.onlyinyourstate.com/wp-content/uploads/2016/04/AL-Landmark-7-700x467.jpg" class=" gallery-image  lazy-load " alt="" loading="lazy"  data-pin-description="5. Edmund Pettus Bridge - Selma, AL"  data-pin-url="https://www.onlyinyourstate.com/alabama/historical-landmarks-al/" /&gt;</span></noscript><span data-dcnode-id="1189" instrument_node="">
</span></div><span data-dcnode-id="1187" instrument_node="">
</span><div class="gallery-credit" data-dcnode-id="1184"><a data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AThe_Edmund_Pettus_Bridge_07326v.jpg" target="_blank"><span data-dcnode-id="1186" instrument_node="">wikimedia commons/Carol M. Highsmith</span></a></div><span data-dcnode-id="1183" instrument_node="">
</span><div class="gallery-description" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">The Edmund Pettus Bridge, built in 1940, is a steel through arch bridge with a central span of 250 feet. It was the site of Bloody Sunday on March 7, 1965. During this historical event, armed policemen attacked civil rights demonstrators with clubs and tear gas as they were attempting to march to Montgomery. The Edmund Pettus Bridge became a National Historic Landmark on March 11, 2013.</span></div><span data-dcnode-id="1180" instrument_node="">
</span></figure><span data-dcnode-id="1178" instrument_node="">
</span><figure class="gallery-item attachment-308951 orientation-landscape size-large" data-dcnode-id="1159"><span data-dcnode-id="1177" instrument_node="">
</span><figcaption class="gallery-caption" data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">6. Town of Mooresville</span></figcaption><span data-dcnode-id="1174" instrument_node="">

</span><div class="gallery-description" data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Mooresville, which was incorporated on November 16, 1818, is one of the oldest towns in Alabama. The entire town is listed on the National Register of Historic Places. Mooresville's post office opened in 1840, making it the state's oldest post office still in operation today.</span></div><span data-dcnode-id="1160" instrument_node="">

</span><div class="gallery-image-container" data-dcnode-id="1148"><span data-dcnode-id="1153" instrument_node="">

</span></div><span data-dcnode-id="1147" instrument_node="">
</span><div class="gallery-credit" data-dcnode-id="1144"><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ATannehill_Furnace_2007.jpg" target="_blank"><span data-dcnode-id="1146" instrument_node="">wikimedia commons/Dystopos</span></a></div><span data-dcnode-id="1143" instrument_node="">
</span><div class="gallery-description" data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Tannehill Ironworks, which was built during the years 1859-1862, was a major supplier of iron for Confederate ordnance. Tannehill Ironworks was added to the National Register of Historic Places on July 24, 1972 as Tannehill Furnace.</span></div><span data-dcnode-id="1140" instrument_node="">
</span></figure><span data-dcnode-id="1138" instrument_node="">

</span><div class="gallery-description" data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Ivy Green, which was built in 1820, is the childhood home of Helen Keller - First Lady of Courage. The well pump where Helen Keller first communicated with Anne Sullivan is located on the property.</span></div><span data-dcnode-id="1108" instrument_node="">

</span><div class="gallery-image-container" data-dcnode-id="1096"><span data-dcnode-id="1101" instrument_node="">

</span><div class="gallery-credit" data-dcnode-id="1092"><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moundville_Archaeological_Site" target="_blank"><span data-dcnode-id="1094" instrument_node="">wikipedia</span></a></div><span data-dcnode-id="1091" instrument_node="">
</span><div class="gallery-description" data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">The Moundville Archaeological Site consists of 29 platform mounds around a rectangular plaza. This historic site was occupied by Native Americans of the Mississippian culture from around 1000 AD to 1450 AD, and it was added to the National Register of Historic Places in 1966.</span></div><span data-dcnode-id="1088" instrument_node="">

</span></div><span data-dcnode-id="1075" instrument_node="">
</span><div class="gallery-credit" data-dcnode-id="1072"><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AUnion_Station_Montgomery_2008.JPG" target="_blank"><span data-dcnode-id="1074" instrument_node="">wikimedia commons/Spyder Monkey</span></a></div><span data-dcnode-id="1071" instrument_node="">
</span><div class="gallery-description" data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Union Station, a historic former train station in Montgomery, Alabama, was built in 1898 by the Louisville and Nashville Railroad. Rail service ended in 1979, and the station is now being used as the Montgomery Area Visitor Center. In 1973, Union Station was added to the National Register of Historic Places. In 1976, it became a National Historic Landmark.</span></div><span data-dcnode-id="1068" instrument_node="">

</span><h1 data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Most Alabamians Are Unfamiliar With The History Behind This Famous Bank</span></h1><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Alabama is home to many historic buildings, including the Old State Bank Building. The Old State Bank Building is Alabama’s oldest standing bank building, and the history behind it is fascinating! For a closer look at what makes this historic landmark one of the state’s most interesting pieces of architecture, read on.</span></p><span data-dcnode-id="402" instrument_node="">
</span><div class="gallery gallery-instance-1 gallery-post-860080" data-dcnode-id="205" id="gallery-1"><span data-dcnode-id="401" instrument_node="">

</span><figcaption class="gallery-caption" data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">The Old State Bank Building is located in Decatur at 925 Bank Street. In addition to it being one of Alabama's most impressive pieces of architecture, it's also the most photographed landmark in the city.</span></figcaption><span data-dcnode-id="397" instrument_node="">
