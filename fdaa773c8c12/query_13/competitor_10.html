</span><header class="entry-header" data-dcnode-id="1842"><span data-dcnode-id="1848" instrument_node="">
</span><h1 class="post-title" data-dcnode-id="1844"><a data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.structuremag.org/%3Fp%3D3626" rel="bookmark" title="Permalink to The Eiffel Tower at 125 Years"><span data-dcnode-id="1847" instrument_node="">The Eiffel Tower at 125 Years</span></a><span data-dcnode-id="1845" instrument_node="">
</span></h1><span data-dcnode-id="1843" instrument_node="">
</span></header><span data-dcnode-id="1840" instrument_node="">
</span><div class="row" data-dcnode-id="1813"><span data-dcnode-id="1839" instrument_node="">
</span><div class="span8 entry-info" data-dcnode-id="1817" style="margin-top:0px;"><span data-dcnode-id="1838" instrument_node=""> Jul, 2014             
          
				</span><span class="meta-sep" data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">By</span></span><span data-dcnode-id="1835" instrument_node=""> </span><a class="author url fn" data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.structuremag.org/%3Fauthor_name%3Droumenmladjov" rel="author" title="Posts by Roumen V. Mladjov, S.E., P.E."><span data-dcnode-id="1834" instrument_node="">Roumen V. Mladjov, S.E., P.E.</span></a><span class="by-author" data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node=""> In </span></span><span data-dcnode-id="1830" instrument_node="">
</span><a data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.structuremag.org/%3Fcat%3D189" rel="category"><span data-dcnode-id="1829" instrument_node="">Articles</span></a><span data-dcnode-id="1827" instrument_node="">, </span><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.structuremag.org/%3Fcat%3D17" rel="category"><span data-dcnode-id="1826" instrument_node="">Historic Structures</span></a><span data-dcnode-id="1824" instrument_node="">
</span><span class="comments-link" data-dcnode-id="1819"><a class="comments-link" data-dcnode-id="1820" href="#comments"><span class="21$s" data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Comments</span></span><span data-dcnode-id="1821" instrument_node=""> 2</span></a></span><span data-dcnode-id="1818" instrument_node="">
</span></div><span data-dcnode-id="1816" instrument_node="">
</span><div class="divider-post span8" data-dcnode-id="1815" style="margin-bottom:0px;"></div><span data-dcnode-id="1814" instrument_node="">
</span></div><span data-dcnode-id="1812" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1703"><span data-dcnode-id="1811" instrument_node="">
</span><h2 data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">The Symbols of Progress Do Not Have an Age</span></h2><span data-dcnode-id="1808" instrument_node="">
</span><p data-dcnode-id="1802"><span data-dcnode-id="1807" instrument_node="">March 31, 2014 marked the 125</span><sup data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">th</span></sup><span data-dcnode-id="1804" instrument_node=""> anniversary of the inauguration of the Eiffel Tower. Erected in 1889 on Champs de Mars in Paris for the Fourth World Exposition, the Eiffel Tower became famous even before its opening.</span><span data-dcnode-id="1803" id="more-3626"></span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">This technical achievement became a symbol of Paris and all France. Humans, who for millennia tried to achieve more than those who came before, did not succeed for more than 4,500 years to exceed the height of the pyramids in Egypt. The tallest spires of Gothic cathedrals barely stand higher than the Great Pyramid in Giza, but then the Eiffel Tower reached into the sky, twice as tall. Today it is the most visited monument in the world; every year, more than six million people pay tribute to the old “iron lady.” The tower, subject to so much controversy during its planning and construction, is now one of the planet’s most famous structures.</span></p><span data-dcnode-id="1798" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1793" id="attachment_3627" style="width: 192px"><a data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.structuremag.org/wp-content/uploads/0714-hs-1.jpg"><img alt="The Eiffel Tower" aria-describedby="caption-attachment-3627" class="size-medium wp-image-3627" data-dcnode-id="1797" height="300" sizes="(max-width: 182px) 100vw, 182px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.structuremag.org/wp-content/uploads/0714-hs-1-182x300.jpg&amp;raw" srcset="https://www.structuremag.org/wp-content/uploads/0714-hs-1-182x300.jpg 182w, https://www.structuremag.org/wp-content/uploads/0714-hs-1.jpg 486w" width="182"></a><p class="wp-caption-text" data-dcnode-id="1794" id="caption-attachment-3627"><span data-dcnode-id="1795" instrument_node="">The Eiffel Tower</span></p></div><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1791" instrument_node="">It is normal to ask what makes this tower so popular. While it is easy to understand the admiration caused by an edifice 300.5 meters (984 feet) tall near the end of the 19</span><sup data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">th</span></sup><span data-dcnode-id="1788" instrument_node=""> century, it is more difficult to explain why this old iron lattice structure still has such a strong effect, even though buildings have already reached heights above 800 meters (2,625 feet). If, at its completion 125 years ago, the tower was a sensation, why – even in the age of electronics, satellites, and people walking on the moon – does it still have such a strong effect on us? It cannot be mere skill that has transformed it from a technical achievement to a masterpiece of human effort.</span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Standing at the base of the tower and looking upward at its elegant lines reaching the sky, one feels proud to be a human being. Perhaps this is the main reason – the Eiffel Tower symbolizes the eternal human striving toward new heights, as the first monument built not to the gods or to an emperor, but to ourselves and to our unlimited human possibilities.</span></p><span data-dcnode-id="1783" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1782" instrument_node="">This creation is a result of the development and achievement of metallurgical and construction technologies, experience gained from many bold and complicated structures, and challenges and competitions between engineers, architects, companies and nations. The Eiffel Tower is the materialized symbol of progress during the Industrial Revolution of the 19</span><sup data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">th</span></sup><span data-dcnode-id="1779" instrument_node=""> century. In the 1870s and 1880s, the favorable conditions for such technical achievements were building fast:</span></p><span data-dcnode-id="1777" instrument_node="">
</span><ul data-dcnode-id="1757"><span data-dcnode-id="1776" instrument_node="">
</span><li data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Significant advancement of the industry;</span></li><span data-dcnode-id="1773" instrument_node="">
</span><li data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Development of construction materials, techniques and technologies;</span></li><span data-dcnode-id="1770" instrument_node="">
</span><li data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Competitions on World Expositions;</span></li><span data-dcnode-id="1767" instrument_node="">
</span><li data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Better structural engineering knowledge and experience;</span></li><span data-dcnode-id="1764" instrument_node="">
</span><li data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">A new Universal (World) exposition planned for 1889 in Paris, and strong desire in France to recapture her previous glory; and</span></li><span data-dcnode-id="1761" instrument_node="">
</span><li data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">The right man for accomplishing a super task – Alexandre Gustave Eiffel.</span></li><span data-dcnode-id="1758" instrument_node="">
</span></ul><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Alexandre Gustave Eiffel was born 1832 in Dijon, France. He graduated from L’Ecole Centrale des Arts et Manufactures in 1855 as a chemical engineer. After one year with Nepveu &amp; Cie, a railway construction company, he started working in 1857 as an engineer for the railway company Pauvel &amp; Cie, where he became chief of the construction office.</span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">In 1866, Eiffel established his own company – Eiffel et Cie from 1868, later Compagnie des Etablissements Eiffel from 1879 – with which he designed and built railways, bridges and structures in Europe, Africa, South America and Asia. Eiffel built with his team more than a hundred significant bridges and other structures, gaining a lot of practical experience and establishing his reputation as someone with the greatest structural skills of all his contemporary engineers. Parts of his work are two remarkable bridges that are considered as the general rehearsal for his highest achievement, the Eiffel Tower:</span></p><span data-dcnode-id="1750" instrument_node="">
</span><ul data-dcnode-id="1742"><span data-dcnode-id="1749" instrument_node="">
</span><li data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Maria Pia Bridge, built in 1877 over the Duoro River in Porto, Portugal, with a 160-meter (525-foot) span; and</span></li><span data-dcnode-id="1746" instrument_node="">
</span><li data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Garabit Viaduct, built in 1884 over the Truyere River, France, with a 165-meter (541-foot) span.</span></li><span data-dcnode-id="1743" instrument_node="">
</span></ul><span data-dcnode-id="1741" instrument_node="">
</span><p data-dcnode-id="1730"><span data-dcnode-id="1740" instrument_node="">Among other well-known projects, Eiffel was also the engineer for the support frame structure of the Statue of Liberty in New York City, </span><em data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Le Palais des Machines</span></em><span data-dcnode-id="1737" instrument_node=""> for the 1878 Paris Universal Exposition, the </span><em data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Bon Marché</span></em><span data-dcnode-id="1734" instrument_node=""> department store in Paris, the iron framing for the cathedral of Notre-Dame and a revolving cupola for the Nice Observatory. Eiffel’s goal was always to build structures that were</span><em data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node=""> lighter, cheaper, and stronger at the same time</span></em><span data-dcnode-id="1731" instrument_node="">.</span></p><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">In 1886, an open competition was announced for the centerpiece of the Exposition Universal in Paris, and all entries had to include a study for a 300-meter (984-foot) metal tower on Champs de Mars. The exposition was organized to show that “the law of progress is immortal, just as progress itself is infinite.” After winning the competition, Eiffel’s company was awarded the design and construction of the tower. Eiffel was assisted in the project by his leading engineers, Maurice Koechlin and Emile Nouguier, and the architect Stephen Sauvestre.</span></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">The tower structure is built with 7,300 tons of wrought iron. Eiffel’s design office needed 5,330 drawings for the tower and its 18,038 elements, which were connected with 2.5 million rivets. Horse-drawn carts transported preassembled parts of the structure from the company workshop near Paris to the site. Up to 120 workers on the site and 330 in the workshop were involved with fabrication and erection.</span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">The construction started on January 28, 1887 and was completed after two years, two months, and three days on March 31, 1889. The height of the tower when completed in 1889 was 300.65 meters (986 feet). The tower base is a square, 125 meters (410 feet) per side. In 1957, an antenna was added, which brought the total height to 320.75 meters (1,052 feet). In 2000, the tower’s height reached 324 meters (1,063 feet) after the installation of another antenna.</span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">The elegant lines of the tower are purely functional, as the hyperbolic shape of the legs is driven by a design for optimal resistance to wind loads. As David P. Billington states, “The Eiffel Tower’s shape expresses visually the engineer’s ideal for resisting the forces of wind.” This approach to tall structure design was developed by Eiffel during his bridge-building in the Massif Central of France, characterized by very strong winds. The tall piers of the Garabit Viaduct were designed on the same principle.</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Eiffel was well aware that his new structure would be more than just a tower:</span></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">“…it would symbolize not only the art of the modern engineer, but also the century of Industry and Science in which we are living, and for which the way was prepared by the great scientific movement of the eighteenth century and by the Revolution of 1789, to which this monument will be built as an expression of France’s gratitude.”</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Eiffel encouraged multiple uses of the tower beyond its original entertainment purpose. He himself used it for research on wind forces and velocity, meteorological observations and air resistance on falling bodies; his cabinet can still be seen on the third level near the top. The tower was used for transmitting radio signals from 1898, and as a military radio post in 1903; it transmitted the first public radio program in 1925, and has been used more recently for television broadcasting.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1707" instrument_node="">The Eiffel Tower remains unique in shape; its pure, exposed forms are elegant and slender, simultaneously providing a feeling of strength and stability. This combined expression of strength and lightness is characteristic of the few truly great structures in the world, and the Eiffel Tower definitely belongs to this group. After 125 years, the Eiffel Tower remains an example of excellent engineering, and a great contribution to the art of structural engineering. There is still a lot to learn from the old iron lady.</span><img alt="▪" class="emoji" data-dcnode-id="1706" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/25aa.svg&amp;raw"></p><span data-dcnode-id="1704" instrument_node="">
</span></div><span data-dcnode-id="1701" instrument_node="">
</span></div><span data-dcnode-id="1699" instrument_node="">

</span><section data-dcnode-id="1681"><div class="span8" data-dcnode-id="1682"><div class="row" data-dcnode-id="1683"><div class="span8 divider-strip author" data-dcnode-id="1688"><h3 data-dcnode-id="1689"><span data-dcnode-id="1692" instrument_node="">About the author &nbsp;⁄&nbsp;</span><span data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Roumen V. Mladjov, S.E., P.E.</span></span></h3></div><div class="span1" data-dcnode-id="1687"></div><div class="span7" data-dcnode-id="1684"><p data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Roumen V. Mladjov’s expertise comprises structural and bridge engineering and construction management; his main interests are structural performance, seismic resistance, efficiency, and economy. (rmladjov@gmail.com)</span></p></div></div></div></section><span data-dcnode-id="1680" instrument_node="">
