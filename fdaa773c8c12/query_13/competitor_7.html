</span><h1 data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">History of art: The Eiffel Tower</span></h1><span data-dcnode-id="1472" instrument_node="">
</span><br data-dcnode-id="1471"><span data-dcnode-id="1470" instrument_node="">
</span><section data-dcnode-id="677"><span data-dcnode-id="1469" instrument_node="">
</span><article data-dcnode-id="679"><span data-dcnode-id="1468" instrument_node="">
</span><div class="pull-right hidden-xs" data-dcnode-id="1454" style="width: 320px; height: 620px"><span data-dcnode-id="1467" instrument_node="">
</span><div class="pull-right" data-dcnode-id="1456" style="width: 300px; height: 600px"><span data-dcnode-id="1466" instrument_node="">
</span><span data-dcnode-id="1464" instrument_node="">
</span><span data-dcnode-id="1462" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8333002011485169" data-ad-format="auto" data-ad-slot="6201389651" data-dcnode-id="1461" style="display:block"></ins><span data-dcnode-id="1460" instrument_node="">
</span><span data-dcnode-id="1457" instrument_node="">
</span></div><span data-dcnode-id="1455" instrument_node="">
</span></div><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">The history of art is a school subject taught to varying degrees in the National Education. Its purpose is to teach artistic works that have been realized in the past from a symbolic point of view. She strives to highlight artists, their lives, their opinions and how they emerge through their works. It also explains the impact of a work on the public in a cultural, demographic or religious context.</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">The Eiffel Tower is a work of art in the field of architecture, it is usually in the curriculum of most courses. The rest of this page provides explanations on its construction, its origins and the public's view of it.</span></p><span data-dcnode-id="1447" instrument_node="">

﻿



</span><div data-dcnode-id="1402" style=""><span data-dcnode-id="1446" instrument_node="">

</span><h4 class="modal-title" data-dcnode-id="1422"><span class="glyphicon glyphicon-camera" data-dcnode-id="1424"></span><span data-dcnode-id="1423" instrument_node=""> The Eiffel Tower in the evening</span></h4><span data-dcnode-id="1421" instrument_node="">

</span><img alt="The Eiffel Tower in the evening" class="imgModal img-responsive center-block" data-dcnode-id="1415" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/images/Photos/Tour-Eiffel-001.jpg&amp;raw"><span data-dcnode-id="1414" instrument_node="">
</span><p class="imgModalLegende" data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">General view of the Eiffel Tower, with the district of La Défense, in the distance</span></p><span data-dcnode-id="1411" instrument_node="">
</span></div><span data-dcnode-id="1409" instrument_node="">
</span></div><span data-dcnode-id="1407" instrument_node="">

</span></div><span data-dcnode-id="1403" instrument_node="">
</span></div><span data-dcnode-id="1401" instrument_node="">
</span><br data-dcnode-id="1400"><span data-dcnode-id="1399" instrument_node="">
</span><h2 data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Distinction of levels</span></h2><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">But before going further, we must distinguish the curriculum because the National Education does not expect the same knowledge from the students depending on levels. Click on your level. Note that the difference between the primary, secondary and university level in art history does not lie in the format to be used to answer the questions but in the depth of the answer. This means that the learning mechanism is the same, regardless of the level of the student. So in primary school you have to answer in the same way as for higher level courses, but of course by lightening the answers. For secondary and university level, it will be necessary to adapt the answer according to the actual level of the students. Thus for fifth graders, who have just graduated from this cycle, the answers will be more in the "primary" part, but with supplements while the academics will have to complete their homework by information taken elsewhere in the site.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><br data-dcnode-id="1392"><span data-dcnode-id="1391" instrument_node="">
</span><div aria-multiselectable="false" class="panel-group" data-dcnode-id="680" id="accordion" role="tablist"><span data-dcnode-id="1390" instrument_node="">
</span><span data-dcnode-id="1388" instrument_node="">
</span><div class="panel panel-default" data-dcnode-id="1282"><span data-dcnode-id="1387" instrument_node="">
</span><div class="panel-heading" data-dcnode-id="1376" id="headingPrimaire" role="tab"><span data-dcnode-id="1386" instrument_node="">
</span><h3 class="panel-title" data-dcnode-id="1378"><span data-dcnode-id="1385" instrument_node="">
</span><a aria-controls="collapsePrimaire" aria-expanded="true" data-dcnode-id="1380" data-parent="#accordion" data-toggle="collapse" href="#collapsePrimaire"><span data-dcnode-id="1384" instrument_node="">
</span><span class="PuceRouge" data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node=""> Elementary level</span></span><span data-dcnode-id="1381" instrument_node="">
</span></a><span data-dcnode-id="1379" instrument_node="">
</span></h3><span data-dcnode-id="1377" instrument_node="">
</span></div><span data-dcnode-id="1375" instrument_node="">
</span><div aria-labelledby="headingPrimaire" class="panel-collapse collapse" data-dcnode-id="1284" id="collapsePrimaire" role="tabpanel"><span data-dcnode-id="1374" instrument_node="">
</span><div class="panel-body" data-dcnode-id="1286"><span data-dcnode-id="1373" instrument_node="">
</span><span data-dcnode-id="1371" instrument_node="">
</span><div class="row" data-dcnode-id="1288"><span data-dcnode-id="1370" instrument_node="">
</span><div class="col-md-12" data-dcnode-id="1290"><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">When we say "primary level", we should rather say "cycle 3", from CM1 to 6th. It is at this age that students are most likely to do this kind of work when they are young.</span></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">What is expected from the history of art is an analysis of the forms, techniques, meanings and uses of the work studied. Regarding the Eiffel Tower a primary school student can answer factual questions, this is usually done in class, but if he has to produce a text himself on the monument, he will have to rely on these 4 work items.</span></p><span data-dcnode-id="1363" instrument_node="">
</span><br data-dcnode-id="1362"><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">But first of all you have to start with some simple information to locate the monument.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">The Eiffel Tower is an iron tower that was built in the center of Paris, facing the Palais de Chaillot, on the Champs de Mars. She is in the 7th arrondissement of Paris. It is made of beams and metal beams that intermingle. The builder of the tower called Gustave Eiffel, he called it "the tower of 300m". It was designed by Maurice Koechlin, his head of study department, and Emile Nouguier, the head of the methods department. Gustave Eiffel was a late 20th century entrepreneur who specialized in building bridges. Its most impressive bridge is the Garabit viaduct, which is in Cantal, but it has made many others.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">The Eiffel Tower was the tallest building in the world at its construction. It was only overtaken in 1936 after the construction of the Empire State Building in New York.</span></p><span data-dcnode-id="1352" instrument_node="">
</span><br data-dcnode-id="1351"><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Puis, il faut faire une analyse des formes, qui peut être exprimée ainsi.</span></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1346" instrument_node="">The Eiffel Tower is an iron building, it is a set of interlocking beams that has the shape of a pyramid with curved sides. The base is made of 4 pillars containing </span><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Stairs-of-the-Eiffel-tower.php"><span data-dcnode-id="1345" instrument_node="">stairs</span></a><span data-dcnode-id="1343" instrument_node=""> and lifts that meet on the 2nd floor. From there, the four pillars form a single pylon rising to a height of 324m. There are 3 floors at the Eiffel Tower, each floor has 2 levels. The first floor is large, large, there are 3 modern pavilions containing shops, a museum, a conference room, a restaurant, etc. The second floor is older, it is in the same state as at the time of construction. The third floor is much smaller than the others, there is an interior gallery and above a gallery in the open air.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">The shape of the Eiffel Tower has been studied with great precision. The engineers made precise calculations to be sure that it would not collapse. They studied the weight she would make to know if the soil would move or not.</span></p><span data-dcnode-id="1338" instrument_node="">
</span><br data-dcnode-id="1337"><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">This description naturally leads to the analysis of techniques.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">To build such a tower it was necessary to use several techniques. Gustave Eiffel had an entire service to find the methods of manufacturing the tower. It started with the foundations, which were hand-dug by workers. The earth served to smooth the soil, and when there was too much it was thrown out of Paris. Two pillars require another technique: We put a kind of bell upside down on the ground and the workers dug inside. Little by little the bell sank into the ground. When they arrived at the right level they poured concrete into the bell, to make the foundation.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Above the foundations a large block of stone was built and the first beams were laid. As soon as it was too high to work with simple scaffolds, large wooden scaffolds were built on which the beams leaned. On the first floor, the workers had put sandboxes. By pouring the sand little by little the pillars could go down a little to get right. They had also put large cylinders in the pillars to guide them.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">The beams were prepared at Gustave Eiffel's workshop, they were even mounted when they were small. On the construction site the workers installed and riveted them: It consists in putting a very hot rivet in the holes which gather two beams and to hammer hard to crush the heads. That way the beams were together and could not move.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Once the alignment of the first floor was done the workers built the galleries of this floor, then the complete floor, and they mounted on the 1st floor of the scaffolding to continue the construction. it was necessary to use cranes to mount the beams so high. These cranes were put on the rails of the elevators (which were only installed later). That way the crane built the rails on which she would climb a little later.</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">It is thanks to all these techniques that the Eiffel tower could be mounted.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><br data-dcnode-id="1317"><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Then we must ask the question of the meaning of the Eiffel Tower.</span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Apart from that, it would be a strange question to wonder what the Eiffel Tower meant. But in the sense of a duty on the history of art, it is necessary to indicate all that this tower signifies, its symbols. At primary level, it suffices to indicate that it is an important symbol of the city of Paris, and more generally of France. Moreover, when a foreign country wants to symbolize France, it will almost always use the silhouette of the Eiffel Tower. There is another important symbol, but it is an ancient symbol: The Eiffel Tower is above all the proof of the French technological know-how, since it was created on purpose to show what the French could do to their industries. Remember that it was built for the 1889 World Fair.</span></p><span data-dcnode-id="1310" instrument_node="">
</span><br data-dcnode-id="1309"><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Finally comes the 4th part, that on the use</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">The use of the Eiffel Tower has evolved over time. Built as we have just seen for the World Fair of 1889 where it was necessary to show the know-how of France, it was immediately used to earn money, since visitors were in a hurry, at least initially, to mount on it. It is Gustave Eiffel who obtained the concession, ie the right to charge visitors for 20 years. After 20 years the tower had to be demolished. And to avoid that Eiffel has developed scientific experiments that have proved the usefulness of the tower. Suddenly, the tower had a new use, that of allowing scientific experiments. The soldiers then discovered that they could use it to communicate by radio, and the tower was saved definitively.</span></p><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Subsequently and until today the Eiffel Tower serves as a place of visit for tourists. It beautifies Paris, that we can not imagine without it, while at the beginning, on the contrary, Eiffel received strong opposition for its construction.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><br data-dcnode-id="1298"><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">All that remains is to give a personal opinion of this monument. There, it is more difficult to propose since it depends on the way the student perceives it. Does it find it beautiful? Well proportioned? Great? This is the most personal part, so it's a part that has to be done entirely by the student.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Well, there were some ways to do a history of art at the primary level, or more specifically at Cycle 2 because Cycle 1 is not really the right age to make history of art is rather an initiation that is offered to them.</span></p><span data-dcnode-id="1291" instrument_node="">

</span><a aria-controls="collapseSecondaire" aria-expanded="true" data-dcnode-id="1269" data-parent="#accordion" data-toggle="collapse" href="#collapseSecondaire"><span data-dcnode-id="1273" instrument_node="">
</span><span class="PuceRouge" data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node=""> High school level</span></span><span data-dcnode-id="1270" instrument_node="">

</span></h3><span data-dcnode-id="1266" instrument_node="">

</span><br data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">
</span><h2 data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">What must a duty in art history contain?</span></h2><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">The practice of teaching the history of the arts is based on three elements of the teaching of the history of the arts:</span></p><span data-dcnode-id="1250" instrument_node="">
</span><ul data-dcnode-id="1239"><span data-dcnode-id="1249" instrument_node="">
</span><li data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Historical periods</span></li><span data-dcnode-id="1246" instrument_node="">
</span><li data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Artistic domains</span></li><span data-dcnode-id="1243" instrument_node="">
</span><li data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Thematic lists</span></li><span data-dcnode-id="1240" instrument_node="">
</span></ul><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">We must find the answers to its 3 elements in the history of art. Moreover the works are analyzed starting from at least four criteria: forms, techniques, meanings, uses. It is through these four criteria that we will study the Eiffel Tower.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><br data-dcnode-id="1234"><span data-dcnode-id="1233" instrument_node="">
</span><h3 data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Shape analysis</span></h3><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1229" instrument_node="">This criterion consists of studying categories, types, genres, artistic styles, structure or composition. This is a fairly important criterion for the Eiffel Tower is a technological object whose shape as well as size has been of great importance. This part is just as important for the study of </span><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Taj-Mahal/History-of-art.php"><span data-dcnode-id="1228" instrument_node="">Taj Mahal in Art History</span></a><span data-dcnode-id="1226" instrument_node="">, for example, whereas for the </span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Statue-of-Liberty/History-of-art.php"><span data-dcnode-id="1225" instrument_node="">Statue of Liberty</span></a><span data-dcnode-id="1223" instrument_node="">, it's going to be the techniques and the meanings.</span></p><span data-dcnode-id="1221" instrument_node="">
</span><h3 data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Analysis of techniques </span></h3><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">This second criterion allows the study of materials, materials, tools, supports, instruments, but also methods and techniques bodily, gestural, instrumental. Regarding the Eiffel Tower this part is really important, it is she who will contain the most information because the methods used, as well as techniques and materials, have been fully documented and can be studied in detail.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><h3 data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Meaning Analysis</span></h3><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Third criterion in the description of a work, it approaches the messages (transmitted, received, or interpreted), the senses (usual, general, particular, the variations of the senses in the time and the space), the code , sign (meaning / signified), reception, interpretation, decoding and decryption. It is a criterion that will highlight the symbolism of the Eiffel Tower, of course, and we will see that it is the least developed part.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><h3 data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Usage analysis</span></h3><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">This last criterion leads to study the function, the use, the categories of recipients and users, the destination, the use, the transformation, the rejections, or the diversions of the work. If this part is very important, it does not need a particularly long development with regard to the Eiffel Tower, whose function is simple and the straight historical trajectory.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Finally, it is important to give your feelings about the work, what it evokes for you. This part being purely subjective, it can not be developed here, and yet there is still a short text giving my own feeling on the monument.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><br data-dcnode-id="1199"><span data-dcnode-id="1198" instrument_node="">
</span><h2 data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Presentation of the Eiffel Tower</span></h2><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">But like any description of a work of art, it is obligatory to begin with a short description of the context, the author and his work.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><h3 data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Introduction</span></h3><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1188" instrument_node="">Initially named "The 300m tower", the Eiffel Tower took the name of its author once completed, rather quickly. She was named in gratitude to her builder </span><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Gustave-Eiffel.php"><span data-dcnode-id="1187" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="1185" instrument_node="">, a public works contractor specializing in the construction of metal bridges and viaducts. Born December 15, 1832 in Dijon he will be raised by his grandmother. He will do his high school in this city, then integrate the Ecole Centrale de Paris from which he graduated in 1855. He then specializes in metallurgy, a new science, the metallurgical industry is booming (We are in the industrial revolution ). Working for a year for Charles Nepveu, a steam engine builder, he followed his career with a position of responsibility, in 1857, to the design office of Pauwels et Compagnie where he designed his first bridge, that of Bordeaux.</span></p><span data-dcnode-id="1183" instrument_node="">

﻿

</span><em data-dcnode-id="1176"><small data-dcnode-id="1177"><p class="text-center" data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Gustave Eiffel</span></p></small></em><span data-dcnode-id="1175" instrument_node="">

</span><h4 class="modal-title" data-dcnode-id="1158"><span class="glyphicon glyphicon-camera" data-dcnode-id="1160"></span><span data-dcnode-id="1159" instrument_node=""> Gustave Eiffel</span></h4><span data-dcnode-id="1157" instrument_node="">
</span></div><span data-dcnode-id="1155" instrument_node="">
</span><span data-dcnode-id="1153" instrument_node="">
</span><div class="modal-body" data-dcnode-id="1146"><span data-dcnode-id="1152" instrument_node="">
</span><img alt="Gustave Eiffel" class="imgModal img-responsive center-block" data-dcnode-id="1151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/images/Histoire/Gustave-Eiffel.jpg&amp;raw"><span data-dcnode-id="1150" instrument_node="">
</span><p class="imgModalLegende" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Gustave Eiffel</span></p><span data-dcnode-id="1147" instrument_node="">
</span></div><span data-dcnode-id="1145" instrument_node="">
</span></div><span data-dcnode-id="1143" instrument_node="">
</span></div><span data-dcnode-id="1141" instrument_node="">
</span></div><span data-dcnode-id="1139" instrument_node="">
</span></div><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1136" instrument_node="">He left his post in 1866 to become a consulting engineer, then set up his business in 1867 with which he would obtain wealth and recognition. Author of numerous bridges and viaducts throughout Europe, then throughout the world (Portugal, Romania, Algeria, Siam, etc.), he will realize some unusual constructions: Budapest Station, internal structure of the </span><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Statue-of-Liberty"><span data-dcnode-id="1135" instrument_node="">state of Liberty</span></a><span data-dcnode-id="1133" instrument_node="">, in New York, etc.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1130" instrument_node="">From 1887 he devoted himself to the study of a metal tower of 1000 feet, which represents a challenge for all the architects of the world. This tower, which some people think is unachievable, will be born of the spirit of its head of study </span><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Maurice-Koechlin.php"><span data-dcnode-id="1129" instrument_node="">Maurice Koechlin</span></a><span data-dcnode-id="1127" instrument_node="">. </span><a data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Emile-Nouguier.php"><span data-dcnode-id="1126" instrument_node="">Emile Nouguier</span></a><span data-dcnode-id="1124" instrument_node="">, his head of the methods department, is also working on this project. At the same time, Paris is hosting the 1889 World's Fair. Eiffel therefore proposes to build this tower as a gateway to the exhibition. A competition is launched for its edification, so this is the origin of the Eiffel Tower: The competition of the World Exhibition of 1889.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1121" instrument_node="">The tower was built from 1888 to 1889. It was inaugurated on March 31, 1889. Expected to be demolished 20 years later, at the end of the exploitation concession given to Eiffel, it will be saved by the army that will be there. makes tests of conclusive radio teletransmissions. Meanwhile, Eiffel has multiplied the </span><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Scientific-applications-of-the-Eiffel-tower.php"><span data-dcnode-id="1120" instrument_node="">Scientific applications</span></a><span data-dcnode-id="1118" instrument_node=""> to prove its usefulness. That's why she always stands in the center of Paris.</span></p><span data-dcnode-id="1116" instrument_node="">
</span><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node="">
</span><h3 data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">How does she fit into the works of her time?</span></h3><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Because of its high emotional impact, the Parisian Eiffel Tower was never seriously ranked among the "technological titans" that marked the end of the 19th century.</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">The end of the nineteenth century and the beginning of the twentieth century are marked by the escalation of the great world powers in the world of arts and technology. The new possibilities offered by industrial culture fascinate both engineers and artists. Their collaboration does not only generate tin heroes (here, iron puddled) but also dizzy towers and ships "titanic" sometimes bear this name ...</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">At that time, France was not yet one of the leading figures in the world and regarded such demonstrations of power with suspicion. Later, in 1941, in the momentum of its development, America was to take the lead of this gigantomania with the presidential sculptures of the Rushmore Mountains in South Dakota.</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p class="PuceRouge" data-dcnode-id="1098"><span data-dcnode-id="1101" instrument_node="">More detail about the </span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Technological-context-of-the-Eiffel-tower.php"><span data-dcnode-id="1100" instrument_node="">The technological context at the end of the 19th century</span></a></p><span data-dcnode-id="1097" instrument_node="">
</span><br data-dcnode-id="1096"><span data-dcnode-id="1095" instrument_node="">
</span><h3 data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Analyse des formes</span></h3><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">As the name suggests the Eiffel Tower is part of the field of architecture. Its tower name can be seen as a usurpation, in fact it is more of a pylon than a tower. It is post-industrial style of the late nineteenth century, according to the will of these designers and in accordance with the time. It is not a neo-industrial style as we can find nowadays, that is to say a style imitating what existed at that time, but made of modern materials.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">This is not an artistic movement per se. What we call "post-industrial style late nineteenth century" has become one in the twentieth century, with reference to the use of industrial parts as a decoration. But at that time nobody was aware of the artistic impact that the industry could bring. It's the opposite that happened, since, as the work began, about forty recognized artists </span><a data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Reticences-of-artists.php"><span data-dcnode-id="1087" instrument_node="">wrote a letter</span></a><span data-dcnode-id="1085" instrument_node=""> published in "Le quotidien" of February 14, 1888 to denounce the ugliness of Paris by "from the train station to kilometers". Here is an excerpt from this letter:</span></p><span data-dcnode-id="1083" instrument_node="">
</span><blockquote data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">
		It suffices, moreover, to realize what we are doing, to imagine for a moment a vertiginously ridiculous tower, overlooking Paris, as well as a gigantic factory chimney, crushing with its barbaric mass Notre-Dame, the Saint "Chapel, the dome of the Invalides, the Arc de Triomphe, all our humiliated monuments, all our shrunken architectures, which will disappear in this astonishing dream. And for twenty years, we will see how to stretch out over the entire city, still quivering with the genius of so many centuries, we will see the odious shadow of the odious column of bolted sheet metal stretch like an ink stain ...
		</span></blockquote><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">More pragmatically the shape of the Eiffel Tower is dependent on the laws of physics. To build a 300m iron tower, it must meet the criteria of form that are imposed without any artistic consideration. Moreover, a few years later, a London competition was launched to build a tower taller than Paris, under the same conditions. The only viable project was an octagonal tower whose actual construction forced the architect to transform it into a pyramid with 4 pillars, exactly the same shape as his little sister. We can therefore conclude that the shape of the Eiffel Tower is imposed by its very nature of high-rise tower.</span></p><span data-dcnode-id="1077" instrument_node="">

﻿

</span><h4 class="modal-title" data-dcnode-id="1052"><span class="glyphicon glyphicon-camera" data-dcnode-id="1054"></span><span data-dcnode-id="1053" instrument_node=""> The tower March 12, 1889</span></h4><span data-dcnode-id="1051" instrument_node="">

</span><span data-dcnode-id="1047" instrument_node="">

</span><img alt="The tower March 12, 1889" class="imgModal img-responsive center-block" data-dcnode-id="1045" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/images/Histoire/Evolution/Construction-tour-Eiffel-1889.03.12.jpg&amp;raw"><span data-dcnode-id="1044" instrument_node="">
</span><p class="imgModalLegende" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">The Eiffel Tower March 12, 1889, shortly before its opening</span></p><span data-dcnode-id="1041" instrument_node="">
</span></div><span data-dcnode-id="1039" instrument_node="">
</span></div><span data-dcnode-id="1037" instrument_node="">
</span></div><span data-dcnode-id="1035" instrument_node="">
</span></div><span data-dcnode-id="1033" instrument_node="">
</span></div><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">The Eiffel Tower is a curved pyramid based on four independent pillars meeting at the 2nd floor to form a single pylon. It has 3 floors: A first while the pillars are not yet joined, a second at the joint of the pillars, and a third at the top. Sometimes it is called the 4th floor to designate the rooms containing the technical broadcasting facilities that are above the third floor, but their proximity makes it seem like a single floor. Note also the presence of an intermediate floor between the 2nd and 3rd, it was used for transhipment of passengers to the construction, when the lifts were not yet able to climb the 160m separating them in one go.</span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">But more than its shape, it's the decorations that give the style of the Eiffel Tower. Initially the decorations were very busy, at least that's how we perceive them today. We can talk about baroque style. In 1937, but especially in 1980 the new developments made the tower very modern, the floors had clean forms, rectilinear, angular. The first floor was redone again in 2011, it is now even more refined and modern, but of a rounded style, like the pavilions or the elevator stations.</span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Light plays an important role in the shapes of the Eiffel Tower. By integrating itself within the structure itself, it does not just highlight its silhouette but represents one of the structural elements, an element that exists only in the evening, of course.</span></p><span data-dcnode-id="1022" instrument_node="">
</span><br data-dcnode-id="1021"><span data-dcnode-id="1020" instrument_node="">
</span><h3 data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Analysis of techniques</span></h3><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">The construction of the Eiffel Tower required great skills in several areas. It is therefore normal that this part is one of the longest. The tower is composed of interlocking beams on which the floors come to rest, which can be seen as plates cutting the axis of the tower. We call "crossbowmen" the main beams that structure the building, they start from the bases at a rate of 4 per pillars and join 2 to 2 at the second floor, to meet all at the top. But before asking the question of the techniques used for the rise of metal architecture, we must start with all that has been necessary to do before.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1013" instrument_node="">The design of the plans did not require special techniques, it is </span><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Maps-of-the-Eiffel-tower.php"><span data-dcnode-id="1012" instrument_node="">plans</span></a><span data-dcnode-id="1010" instrument_node=""> quite classic, well that there were a lot of pages and technical drawings. It is to the realization of the foundations that really began the use of the particular techniques.</span></p><span data-dcnode-id="1008" instrument_node="">

﻿



</span><div data-dcnode-id="963" style="float:right"><span data-dcnode-id="1007" instrument_node="">
</span><img alt="The foundations of the foundations" class="img-responsive pull-right imgAgrandissable" data-dcnode-id="1006" data-modal="Fondations" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/images/Vignettes/Histoire/Fondations-V.jpg&amp;raw" style="margin-left: 8px"><span data-dcnode-id="1005" instrument_node="">
</span><em data-dcnode-id="1001"><small data-dcnode-id="1002"><p class="text-center" data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">The foundations of the foundations</span></p></small></em><span data-dcnode-id="1000" instrument_node="">
</span><span data-dcnode-id="998" instrument_node="">
</span><div class="Fondations modal fade" data-dcnode-id="965"><span data-dcnode-id="997" instrument_node="">

</span><div class="modal-content" data-dcnode-id="969"><span data-dcnode-id="995" instrument_node="">

</span><button class="close" data-dcnode-id="987" data-dismiss="modal" type="button"><span aria-hidden="true" data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">×</span></span><span class="sr-only" data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Close</span></span></button><span data-dcnode-id="986" instrument_node="">
</span><h4 class="modal-title" data-dcnode-id="983"><span class="glyphicon glyphicon-camera" data-dcnode-id="985"></span><span data-dcnode-id="984" instrument_node=""> The foundations of the foundations</span></h4><span data-dcnode-id="982" instrument_node="">
</span></div><span data-dcnode-id="980" instrument_node="">
</span><span data-dcnode-id="978" instrument_node="">
</span><div class="modal-body" data-dcnode-id="971"><span data-dcnode-id="977" instrument_node="">
</span><img alt="The foundations of the foundations" class="imgModal img-responsive center-block" data-dcnode-id="976" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/images/Histoire/Fondations.jpg&amp;raw"><span data-dcnode-id="975" instrument_node="">
</span><p class="imgModalLegende" data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">The foundations of one of the pillars of the Eiffel Tower</span></p><span data-dcnode-id="972" instrument_node="">
</span></div><span data-dcnode-id="970" instrument_node="">
</span></div><span data-dcnode-id="968" instrument_node="">
</span></div><span data-dcnode-id="966" instrument_node="">
</span></div><span data-dcnode-id="964" instrument_node="">
</span></div><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="958"><strong data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">foundations</span></strong><span data-dcnode-id="959" instrument_node=""> were done in two different ways. Those are the furthest from the Seine, they were made by hand, with shovels. The land was distributed on the site to level the level but the surplus, quite substantial, was evacuated by horse-drawn dumpers or more modern steam locomotives. The two northern foundations received water infiltration, they were too close to the Seine. The method used to avoid drowning was original, it had already been tested on other sites. It consisted of placing a metal bell of the size of the foundations, upside down, on the ground and to send air under pressure. Thus compressed the air prevented the water from infiltrating and the workmen could dig in the bell without being disturbed by the infiltrations. There was an airlock that allowed the workers to come in and out of the bell, mostly used to evacuate the land. As the digging progressed, the bell sank into the ground until it was at the proper depth. Workers and equipment were evacuated and concrete was poured.</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">In the foundations of the concrete blocks were poured, it is large block on which support the pillars. It is on these massifs that was fixed the starting shoe for the crossbowmen.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="953" instrument_node="">The </span><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">connection between the foundations and the pillars</span></strong><span data-dcnode-id="950" instrument_node=""> was made using a hoof in which a counter-shoe was wedged. One could turn slightly and move relative to the other and between the two Gustave Eiffel had a hydraulic cylinder installed high power. So when the four pillars were built, the jacks could push them slightly until they were all aligned at the level of the first floor, something impossible to achieve the first time. The presence of these cylinders has fueled the legend that the Eiffel Tower is mounted on a cylinder, which is false since they were dismantled as soon as the first floor was finished.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="947" instrument_node="">The </span><strong data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">assembly of the beams</span></strong><span data-dcnode-id="944" instrument_node=""> was done in the workshop, as often as it was possible. The idea was to minimize work on the site. The beams should not weigh more than 80 kg to be able to be raised to 2 men, without mechanical assistance. They were assembled according to the riveting technique which consists in hot crushing a rivet, a kind of big nail, in the holes of two beams to unite them. A team of riveters was composed of 4 people, one who positioned the rivet in the hole, one who held it in place while a third hit him on the other side, and a fourth in charge of heating them in a brazier.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="941" instrument_node="">As soon as the pillars began to rise, it was necessary to use wooden scaffolds, one per pillar, placed under each pillar. After a certain height the pillar was too cantilever to hold alone, it was likely to tip over. Scaffolding was therefore not only a means of mounting materials and assembling, but it also served to maintain the balance of each pillar. At the first floor level, </span><strong data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">sandboxes</span></strong><span data-dcnode-id="938" instrument_node=""> were installed at the top of the scaffolding. A sand box is a technique for finely adjusting the height of a pillar, in the case of the Eiffel Tower. The latter leaned on caissons filled with sand. By partially emptying the sand it was possible to adjust the height of the pillar very slowly. When the four pillars were at the right height, the heavy connecting beams of the first floor were mounted. From there, there was no risk of collapse of the structure.</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="935" instrument_node="">To erect the beams </span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Emile-Nouguier.php"><span data-dcnode-id="934" instrument_node="">Emile Nouguier</span></a><span data-dcnode-id="932" instrument_node="">, head of the method study bureau, had planned the use of </span><strong data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">cranes</span></strong><span data-dcnode-id="929" instrument_node="">. These cranes were mounted on the rails that were to serve, at the end of construction, lifts, so that they mounted in the structure at the same time. More original: The cranes were also used to mount the rails of future lifts, so they created their own future paths! The climbing technique of a crane was quite complex. It had to be stopped by cleats, made to climb with a large hauling screw, followed by two safety cylinders, then climb the platform and lock it all. But it had to be done several times, the run of the cylinders was only 50cm.</span></p><span data-dcnode-id="927" instrument_node="">

﻿



</span><div data-dcnode-id="882" style="float:left"><span data-dcnode-id="926" instrument_node="">
</span><img alt="The first floor under construction" class="img-responsive pull-left imgAgrandissable" data-dcnode-id="925" data-modal="Construction-14-01-1888" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/images/Vignettes/Construction/Construction-14-01-1888-V.jpg&amp;raw" style="margin-right: 8px"><span data-dcnode-id="924" instrument_node="">
</span><em data-dcnode-id="920"><small data-dcnode-id="921"><p class="text-center" data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">The first floor under construction</span></p></small></em><span data-dcnode-id="919" instrument_node="">
</span><span data-dcnode-id="917" instrument_node="">
</span><div class="Construction-14-01-1888 modal fade" data-dcnode-id="884"><span data-dcnode-id="916" instrument_node="">
</span><div class="modal-dialog modal-lg" data-dcnode-id="886"><span data-dcnode-id="915" instrument_node="">

</span><button class="close" data-dcnode-id="906" data-dismiss="modal" type="button"><span aria-hidden="true" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">×</span></span><span class="sr-only" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Close</span></span></button><span data-dcnode-id="905" instrument_node="">
</span><h4 class="modal-title" data-dcnode-id="902"><span class="glyphicon glyphicon-camera" data-dcnode-id="904"></span><span data-dcnode-id="903" instrument_node=""> The first floor under construction</span></h4><span data-dcnode-id="901" instrument_node="">
</span></div><span data-dcnode-id="899" instrument_node="">
</span><span data-dcnode-id="897" instrument_node="">
</span><div class="modal-body" data-dcnode-id="890"><span data-dcnode-id="896" instrument_node="">
</span><img alt="The first floor under construction" class="imgModal img-responsive center-block" data-dcnode-id="895" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/images/Construction/Construction-14-01-1888.jpg&amp;raw"><span data-dcnode-id="894" instrument_node="">
</span><p class="imgModalLegende" data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Work during the construction of the first floor</span></p><span data-dcnode-id="891" instrument_node="">
</span></div><span data-dcnode-id="889" instrument_node="">
</span></div><span data-dcnode-id="887" instrument_node="">
</span></div><span data-dcnode-id="885" instrument_node="">
</span></div><span data-dcnode-id="883" instrument_node="">
</span></div><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">From the first floor the techniques used were the same: Cranes and beam assembly by scaffolding. On the second platform the scaffoldings were at the end of the race, they were dismantled and abandoned, only the cranes were used, but they had to be modified because there are no more rails from the 2nd because the tower is transformed in pylon, from the 2nd floor. The two elevator cages are distributed on both sides of a central pylon around which were assembled two new cranes which mounted according to a protocol a little different but quite similar.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">The techniques used to build the Eiffel Tower were therefore not particularly innovative, but it was the size of the site that made them so characteristic. The list of techniques used in the construction of the Eiffel Tower is almost infinite. We find the following trades for example:</span></p><span data-dcnode-id="875" instrument_node="">
</span><ul data-dcnode-id="846"><span data-dcnode-id="874" instrument_node="">
</span><li data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Engineers in metal architecture</span></li><span data-dcnode-id="871" instrument_node="">
</span><li data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Designers</span></li><span data-dcnode-id="868" instrument_node="">
</span><li data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Editors</span></li><span data-dcnode-id="865" instrument_node="">
</span><li data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Workers specialized in forging and machining</span></li><span data-dcnode-id="862" instrument_node="">
</span><li data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Careerists</span></li><span data-dcnode-id="859" instrument_node="">
</span><li data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Horse drivers</span></li><span data-dcnode-id="856" instrument_node="">
</span><li data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Mechanics</span></li><span data-dcnode-id="853" instrument_node="">
</span><li data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Assemblers</span></li><span data-dcnode-id="850" instrument_node="">
</span><li data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">riveters</span></li><span data-dcnode-id="847" instrument_node="">
</span></ul><span data-dcnode-id="845" instrument_node="">
</span><p class="PuceRouge" data-dcnode-id="841"><span data-dcnode-id="844" instrument_node="">More detail about the </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Construction-of-the-Eiffel-tower.php"><span data-dcnode-id="843" instrument_node="">Construction of the Eiffel tower</span></a></p><span data-dcnode-id="840" instrument_node="">
</span><br data-dcnode-id="839"><span data-dcnode-id="838" instrument_node="">
</span><h3 data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Meaning Analysis</span></h3><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">The Eiffel Tower was not built for an artistic purpose, so it is clear that this part will be the least developed of all. The analysis of meanings must be concerned with the messages that the monument passes to its recipients. In fact there are not enough, but they do exist and are in the origin of the Eiffel Tower. This tower was built for one purpose: To show the know-how of France in the industrial world.</span></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="831" instrument_node="">This is the original message. The tower was originally known as the "1000-foot tower" and then "300-meter tower" before it naturally took the name of its author. The idea was therefore just to achieve a feat, that of building a gigantic tower with modern materials, the </span><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Iron-of-the-Eiffel-tower.php"><span data-dcnode-id="830" instrument_node="">puddled iron</span></a><span data-dcnode-id="828" instrument_node="">. It served as an entrance gate to the 1889 World's Fair, because of the launch of the competition for its construction, and its goal was reached since a little around the world there was talk about it and its creator.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Later the message changed. The Eiffel Tower has quickly become what it is today: The symbol of Paris, and beyond that of France as a whole. It is indeed the Eiffel Tower that we represent when we want to symbolize France in a single logo, a single image, a single description in a book. It alone marks the imagination of the spectator / reader who associates an entire people to this metal structure. The reach of the tower depends on where you are. In France, the Eiffel Tower is a representation of the capital. In Europe and even elsewhere in the world, it represents France, but sometimes it is the Eiffel Tower that is chosen to represent Europe, although it is more rare.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">We can say that this monument symbolizes French genius, Paris and France, but that's about all, the tower has no particular symbolic burden. Note the will of the developers of the first floor, which recently placed everywhere "Places to kiss" (places to kiss) bringing on the tower itself the image of romance that the capital of the country.</span></p><span data-dcnode-id="820" instrument_node="">
</span><br data-dcnode-id="819"><span data-dcnode-id="818" instrument_node="">
</span><h3 data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Usage Analysis</span></h3><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">During its history, the Eiffel Tower has had many uses. The first is the main, it is related to its origin, its role was to highlight the French know-how in the technological field of the late nineteenth century. But since its construction, the use of the monument as a tourist site was one of its main functions. It was even designed for that since the original 20-year lease was supposed to be used to supplement the financing of the book.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="811" instrument_node="">But these are not the only uses that have been made of the building. At the end of the 19th century it was the first time that we had a 300m tower, and that in full Paris. It was therefore tempting to make a scientific use of it, which was done as soon as it was built. There was a meteorological laboratory, one of the first, and for the first time we could study the difference in weather between the ground and the altitude of 300m. (see the </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Weather-observations-at-the-Eiffel-tower-in-1889.php"><span data-dcnode-id="810" instrument_node="">Weather Observations 1889</span></a><span data-dcnode-id="808" instrument_node=""> and </span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Weather-observations-at-the-Eiffel-tower-in-1890.php"><span data-dcnode-id="807" instrument_node="">1890</span></a><span data-dcnode-id="805" instrument_node=""> There were applications in the fields of physics, with the study of the </span><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Study-of-the-solar-spectrum.php"><span data-dcnode-id="804" instrument_node="">solar spectrum</span></a><span data-dcnode-id="802" instrument_node="">, </span><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Atmospheric-absorption-of-radiations.php"><span data-dcnode-id="801" instrument_node="">Atmospheric Absorption of Radiation</span></a><span data-dcnode-id="799" instrument_node="">, the </span><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Pressure-of-the-wind.php"><span data-dcnode-id="798" instrument_node="">Pressure</span></a><span data-dcnode-id="796" instrument_node=""> and the </span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Air-resistance.php"><span data-dcnode-id="795" instrument_node="">air resistance</span></a><span data-dcnode-id="793" instrument_node="">, equipment, which consisted in installing a </span><a data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Free-air-pressure-gauge.php"><span data-dcnode-id="792" instrument_node="">high-pressure manometer</span></a><span data-dcnode-id="790" instrument_node=""> at the top of the tower, the military domain with the </span><a data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Military-broadcasting.php"><span data-dcnode-id="789" instrument_node="">military broadcasting</span></a><span data-dcnode-id="787" instrument_node="">, the </span><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Optical-telegraphy.php"><span data-dcnode-id="786" instrument_node="">optical telegraphy</span></a><span data-dcnode-id="784" instrument_node="">, but also in the </span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Air-navigation.php"><span data-dcnode-id="783" instrument_node="">aerial navigation</span></a><span data-dcnode-id="781" instrument_node=""> and optics with the development of </span><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Telephotography.php"><span data-dcnode-id="780" instrument_node="">the telephotography</span></a><span data-dcnode-id="778" instrument_node="">. But it is the aerodynamics that has the most advanced with the Eiffel Tower. </span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Gustave-Eiffel.php"><span data-dcnode-id="777" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="775" instrument_node=""> had set up equipment for studying the air resistance of different geometrical shapes and it is thanks to these results that the the first wings of the plane were created, launching aeronautics.</span></p><span data-dcnode-id="773" instrument_node="">

﻿

</span><h4 class="modal-title" data-dcnode-id="748"><span class="glyphicon glyphicon-camera" data-dcnode-id="750"></span><span data-dcnode-id="749" instrument_node=""> Photo of the Pantheon</span></h4><span data-dcnode-id="747" instrument_node="">

</span><img alt="Photo of the Pantheon" class="imgModal img-responsive center-block" data-dcnode-id="741" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/images/Sciences/Vue-de-la-tour-Pantheon.jpg&amp;raw"><span data-dcnode-id="740" instrument_node="">
</span><p class="imgModalLegende" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">First shot of the Pantheon taken at telephoto</span></p><span data-dcnode-id="737" instrument_node="">

</span></div><span data-dcnode-id="729" instrument_node="">
</span></div><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="726" instrument_node="">All these experiences took place during the first years of the tower, at a time when its creator wanted to prove its usefulness and thus save it from destruction (which was done). But later she had other uses, such as, for example, serve as advertising medium to a car brand, which wrote the famous letters CITROEN on one side of the tower. Much more recently it served to pay tribute to the victims of the various attacks that took place in Paris, then in Brussels, which was done by adopting, for a night, </span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Lighting-of-the-Eiffel-tower.php"><span data-dcnode-id="725" instrument_node="">the colors of the flag of the country touched</span></a><span data-dcnode-id="723" instrument_node="">, even extinguishing.</span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">The Eiffel Tower is also a support for the sportsmen, and that also of all time. We think of the race "The vertical of the Eiffel Tower", which consists of climbing as fast as possible to the 2nd floor of the tower. We remember a skating champion, Taïg Kris, who jumped from the first floor in rollerblading on a reception ramp located on the ground, it was in 2009. A few years before, in 1989, it is a tightrope walker, Philippe Petit , which joins the first floor to the roof of the Trocadero while walking on a cable.</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">The Eiffel Tower is therefore used for a lot of events, but it's rarely artistic events.</span></p><span data-dcnode-id="715" instrument_node="">
</span><br data-dcnode-id="714"><span data-dcnode-id="713" instrument_node="">
</span><h3 data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Personal Feelings</span></h3><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Hard to give guidelines for the study of the Eiffel Tower when it comes to give his personal feeling about this monument, simply because if it is personal, the feeling can not be reproduced as it is for others. However, I can give my own feelings about it, it can serve as a basis for work.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">My personal feeling is that there are several Eiffel towers, it depends on how you approach it. If you look at it from a distance, in aerial view, or with a general view of Paris, it is especially the impression of greatness that is put forward. Its size is impressive, and associated with the delicacy of its lace, I feel that it is incredibly light. Its beauty is therefore rather aerial. On the other hand, when I look closely, I am rather impressed by the solidity of the building. The metal links, by interposed rivets, reinforce the impression of solidity that one can vaguely have when one sees it closely. The Eiffel Tower then sends back a feeling of strength, it impresses the one who looks at it. Finally when I'm on the tower, in the floors, it has the mechanical beauty of perfectly oiled gear. Beauty is technological, in the industrial sense of the term.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">The Eiffel Tower is indeed a work of art, but the way I perceive it depends a lot on where I stand.</span></p><span data-dcnode-id="701" instrument_node="">
</span><br data-dcnode-id="700"><span data-dcnode-id="699" instrument_node="">
