omponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3721"><div class="q-box unzoomed" data-dcnode-id="3722" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3723" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-7a63b31be2cebd3e6493b6e05c70519d-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3717" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3718" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3719" instrument_node="">Earthquakes are measured on the moment-magnitude scale, which is the successor to the Richter scale. It’s a logarithmic system, where going up 2.0 magnitude corresponds to a 1000x increase in energy.</span></span></p><span data-dcnode-id="3716" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3713" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3714" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3715" instrument_node="">That means that a magnitude 10.0 earthquake is roughly 6x more powerful than the worst earthquake ever recorded.</span></span></p><span data-dcnode-id="3712" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3709" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3710" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3711" instrument_node="">Although there are some buildings that could withstand that, location matters a lot in how earthquake-proof a structure is. The Burj Khalifa is built in Dubai, which isn’t on a major fault. The nearest one is in Iran, around 100 miles away:</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3705" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3706"><div class="q-box unzoomed" data-dcnode-id="3707" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3708" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-047a38ed5e5ea6c5556c3c3bfe71f897-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3702" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3703" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3704" instrument_node="">As a massive landmark structure, the building has no real expected lifespan, so the design was made a lot more earthquake-resistant than usual for the area. Even then, it’s only rated safe to magnitude 7.0. Keep in mind, that magnitude 7.0 earthquake is pretty much “the strongest earthquake we would ever reasonably expect to happen here.”</span></span></p><span data-dcnode-id="3701" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3696" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3699" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3700" instrument_node="">A magnitude 10 earthquake is… 32,000x more powerful than that. It would most likely be </span></span><span data-dcnode-id="3697" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3698" instrument_node="">leveled.</span></span></p><span data-dcnode-id="3695" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3692" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3693" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3694" instrument_node="">Not because it’s weak to earthquakes, but because that kind of earthquake is in the “direct impact from an asteroid” territory.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3610" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3611" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3612" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3626" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3658" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3659" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3669" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3670" style="box-sizing: border-box; position: relative;"><button aria  style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2966" instrument_node="">The Burj-Khalifa is designed for a magnitude 7.0 earthquake, which is significantly stronger than what the regulations for the area require based on the earthquakes that have been measured.</span></span></p><span data-dcnode-id="2963" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2960" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2961" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2962" instrument_node="">Unfortunately, that’s not the same thing as a magnitude 8.0 earthquake. We don’t know how much extra capacity the building has, because what “withstand” means varies from designer to designer and code to code. There’s actually pretty strong debate internal to the earthquake engineering community on what it should be standardized to.</span></span></p><span data-dcnode-id="2959" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2956" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2957" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2958" instrument_node="">If, when the designers say it can “withstand” a magnitude 7 earthquake, they mean that there’s no loss of structural performance, then it would likely be able to take a magnitude 8 earthquake without being heavily damaged, although it would be dicey.</span></span></p><span data-dcnode-id="2955" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2952" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id= ="">In terms of height Burj Khalifa is 830 metres or 2723 ft. tall.</span></span></p><span data-dcnode-id="2732" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2729" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2730" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2731" instrument_node="">Let's compare this height with other significant things.</span></span></p><ul class="q-box" data-dcnode-id="2708" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="2726" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2727" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2728" instrument_node="">It's equivalent to 455 people standing one over other (assuming Height of 6 feet per person)</span></span></li><li class="q-relative" data-dcnode-id="2719" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2724" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2725" instrument_node="">It's equivalent to 22 </span></span><span data-dcnode-id="2722" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2723" instrument_node="">Barosaurus</span></span><span data-dcnode-id="2720" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2721" instrument_node=""> [tallest dinosaur in the world (125 feet tall) ]</span></span></li><li class="q-relative" data-dcnode-id="2716" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2717" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2718" instrument_node="">It's equivalent to roughly 3 eiffel towers</span></span></li><li class="q-relative" data-dcnode-id="2709" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2714" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2715" instrument_node="">It's</span></span><span data-dcnode-id="2712" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2713" instrument_node=""> </span></span><span data-dcnode-id="2710" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2711" instrument_node="">roughly equivalent to 1/12742 times of diameter of earth.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2705" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2706" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2707" instrument_node="">It's just a comparison of different heights which can help you relate better.</span></span></p><span data-dcnode-id="2704" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2701" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2702" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2703" instrument_node="">Thank you.</span></span></p></span></span></div><div data-dcnode-id="2697"></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mt--small qu-color--gray_light qu-passColorToLinks" data-dcnode-id="2666" style="box-sizing: border-box;"><span data-dcnode-id="2667"><span class="q-box qu-display--none" data-dcnode-id="2693" style="box-siz roducing that magnitude of quake would be long enough to ring the planet. (I’m guessing the dynamics of that are not linear anyway.)</span></span></p><span data-dcnode-id="2496" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2493" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2494" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2495" instrument_node="">The strongest earthquake on record was 9.5 in Chile in 1960 (from the USGS article cited above).</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2481" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2482" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2483" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2484" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabin -wordBreak--break-word qu-textAlign--start" data-dcnode-id="2460" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2461" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2462" instrument_node="">It seems that magnitude 10 earthquakes are not possible. Keep in mind that it’s a logarithmic (base 10) scale. A magnitude 10 would be about 100 times more energetic than the San Francisco quake of 1906. According the the above USGS article a fault capable of producing that magnitude of quake would be long enough to ring the planet. (I’m guessing the dynamics of that are not linear anyway.)</span></span></p><span data-dcnode-id="2459" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2456" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2457" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2458" instrument_node="">The strongest earthquake on record was 9.5 in Chile in 1960 (from the USGS article cited above). A magnitude 10 would be several times more powerful. (Roughly. I’m not so good with doing fractional exponents in my head.)</span></span></p><span data-dcnode-id="2455" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2452" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2453" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2454" instrument_node="">Considering that the Burj Khalifa is not in a highly earthquake prone area it seems that the likelihood of an earthquake several times more powerful than the strongest on record is effectively nil.</span></span></p><span data-dcnode-id="2451" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2448" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2449" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2450" instrument_node="">Considering the expense and effort dedication to its construction I expect it was over engineered to the seismic requirements of the location.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2376" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2377" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2378" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2392" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2414" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2415" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2425" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2426" style="box-sizing: border-box; position: relative;"><button aria-label="2 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSel
