</span><li data-dcnode-id="341"><span data-dcnode-id="345" instrument_node="">Why not </span><a data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//support.zoom.us/hc/en-us/articles/201362153-Sharing-your-screen-content-or-second-camera"><span data-dcnode-id="344" instrument_node="">share your screen</span></a><span data-dcnode-id="342" instrument_node=""> and play the video to introduce the activity?</span></li><span data-dcnode-id="340" instrument_node="">
</span><li data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Plan ahead and let everyone know what equipment they’ll need for the session. You could adapt the activity to build a tower using other things you can find at home.</span></li><span data-dcnode-id="337" instrument_node="">
</span><li data-dcnode-id="329"><span data-dcnode-id="336" instrument_node="">Check out&nbsp;</span><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scouts.org.uk/volunteers/scouts-at-home/taking-scouts-online/digital-platforms-for-scouts/"><span data-dcnode-id="335" instrument_node="">the advice on using Zoom</span></a><span data-dcnode-id="333" instrument_node="">&nbsp;and other popular digital platforms and the&nbsp;</span><a data-dcnode-id="331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scouts.org.uk/volunteers/scouts-at-home/taking-scouts-online/staying-safe-online/"><span data-dcnode-id="332" instrument_node="">guidance on being safe online</span></a><span data-dcnode-id="330" instrument_node="">.</span></li><span data-dcnode-id="328" instrument_node="">
</span></ul></span></div></div></div></div></div><div class="row" data-dcnode-id="256"><div class="col-12 col-md-12 col-lg-11 col-xl-11" data-dcnode-id="257"><div class="content-root" data-dcnode-id="258"><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">&nbsp;</span></p><span data-dcnode-id="318" instrument_node="">
</span><h3 data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Super structures</span></h3><span data-dcnode-id="315" instrument_node="">
</span><ol data-dcnode-id="310"><span data-dcnode-id="314" instrument_node="">
</span><li data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Everyone should think about some of the biggest or tallest buildings in the world. Which ones can you name? What makes them special or interesting? Some structures to mention:</span></li><span data-dcnode-id="311" instrument_node="">
</span></ol><span data-dcnode-id="309" instrument_node="">
</span><ul data-dcnode-id="292"><span data-dcnode-id="308" instrument_node="">
</span><li data-dcnode-id="294" style="list-style-type: none;"><span data-dcnode-id="307" instrument_node="">
</span><ul data-dcnode-id="296"><span data-dcnode-id="306" instrument_node="">
</span><li data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">The Eiffel Tower. Built in 1889, over 5,300 drawings were made of this 324 metre high tower in Paris. Gustave Eiffel designed the legs of the tower to stand at an angle of at 54 degrees for maximum wind resistance.</span></li><span data-dcnode-id="303" instrument_node="">
</span><li data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">The Great Pyramid of Giza. The oldest and largest of the pyramids in Egypt, and the oldest of the Seven Wonders of the World. It was built in 2580 BC. Pyramids have a wide base and a narrow top, creating a very sturdy and rigid shape.</span></li><span data-dcnode-id="300" instrument_node="">
</span><li data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">The Golden Gate Bridge. Opened in 1937, this suspension bridge over San Francisco Bay has a span of 1,300 metres and cost $35 million to make. Suspension bridges work by transferring the weight of the bridge deck and vehicles up through the suspender rods to the main suspension cable, which then transfers the weight to the bridge towers and anchor rods which go into the ground.</span></li><span data-dcnode-id="297" instrument_node="">
</span></ul><span data-dcnode-id="295" instrument_node="">
</span></li><span data-dcnode-id="293" instrument_node="">
</span></ul><span data-dcnode-id="291" instrument_node="">
</span><ol data-dcnode-id="283" start="2"><span data-dcnode-id="290" instrument_node="">
</span><li data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Everyone should think about a time they were on a bridge, a cliff, or a roof. What was it like? Was the weather the same as it was down on the ground? How are tall buildings made to withstand extreme weather conditions? The experiment will look at the shapes and forces of buildings, and how they are all pushing and pulling against each other.</span></li><span data-dcnode-id="287" instrument_node="">
</span><li data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Everyone should split into small teams and draw some tall towers. Which shapes are the strongest? (Triangles). Think about the materials you will be using (spaghetti and marshmallows). Are your structures going to be possible with the materials we have? How will you make it both the tallest and strongest of all the teams?</span></li><span data-dcnode-id="284" instrument_node="">
</span></ol><span data-dcnode-id="282" instrument_node="">
</span><h3 data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Get building</span></h3><span data-dcnode-id="279" instrument_node="">
</span><ol data-dcnode-id="271"><span data-dcnode-id="278" instrument_node="">
</span><li data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Once each team has decided on a final design for their tower, they should build it using only the materials they’ve been given. The person leading the activity should time 10 minutes for them to do this.</span></li><span data-dcnode-id="275" instrument_node="">
</span><li data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Everyone should think carefully about how they are using their materials. It’s important not to waste them, or your tower won’t be as tall or as strong as it could be.</span></li><span data-dcnode-id="272" instrument_node="">
</span></ol><span data-dcnode-id="270" instrument_node="">
</span><h3 data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Tower power</span></h3><span data-dcnode-id="267" instrument_node="">
</span><ol data-dcnode-id="259"><span data-dcnode-id="266" instrument_node="">
</span><li data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Everyone should look at the towers the other teams have created. Is one the tallest? Is it also the strongest, or does it have some structural problems? Look at the different construction methods used. Has one been the most successful?</span></li><span data-dcnode-id="263" instrument_node="">
</span><li data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">As a group, decide which tower is the tallest and strongest. Why it was the best? It should be as straight as possible, so that forces of gravity cannot pull it to one side. It may have used strong triangle shapes. It may have used lots of smaller pieces of spaghetti, rather than a few long ones, which spreads the weight of the tower. It may be narrower at the top than the bottom, which provides a strong base for supporting the weight of the tower.</span></li><span data-dcnode-id="260" instrument_node="">
</span></ol></div></div></div></section><div data-dcnode-id="200"><section class="bg-pink p-6 mb-8" data-dcnode-id="246"><h4 data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Reflection</span></h4><div data-dcnode-id="247"><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">This activity was about learning new skills. What were the factors that made the towers strong? What made the towers less sturdy? What kinds of jobs involve using these skills?</span></p><span data-dcnode-id="250" instrument_node="">
</span><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">This activity was also about working in a team. How well did your team work together to make the tower? Would you do anything differently if you were going to build a tower again?&nbsp;</span></p></div></section><section data-dcnode-id="201"><div data-dcnode-id="202" data-v-ba383ade="" id="safety-block"><div class="mb-8" data-dcnode-id="203" data-v-ba383ade="" id="safety-block-main"><h4 data-dcnode-id="244" data-v-ba383ade=""><span data-dcnode-id="245" instrument_node="">Safety</span></h4><div data-dcnode-id="228" data-v-ba383ade=""><div class="d-block" data-dcnode-id="229" data-v-ba383ade=""><p data-dcnode-id="230"><span data-dcnode-id="243" instrument_node="">All activities must be safely managed. Use the </span><a data-dcnode-id="241" data-udi="umb://document/37884d39e67e4489bc923106c14dc5f4" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scouts.org.uk/volunteers/staying-safe-and-safeguarding/safe-scouting-cards/staying-safe-safety-checklist/staying-safe-leaders/" rel="noopener" target="_blank" title="Staying Safe - Leaders"><span data-dcnode-id="242" instrument_node="">safety checklist</span></a><span data-dcnode-id="240" instrument_node=""> to help you plan and risk assess your activity. Do a </span><a data-dcnode-id="238" data-udi="umb://document/66074a90ead34223a1ca874ffe8c6849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scouts.org.uk/volunteers/staying-safe-and-safeguarding/risk-assessments/" rel="noopener" target="_blank" title="Risk assessments"><span data-dcnode-id="239" instrument_node="">risk assessment</span></a><span data-dcnode-id="237" instrument_node="">&nbsp;and take appropriate steps to reduce risk. Always get approval for the activity and have suitable </span><a data-dcnode-id="235" data-udi="umb://document/00eeb47a1d1a4ec88fec7492167383e2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scouts.org.uk/volunteers/staying-safe-and-safeguarding/safety/planning-and-assessing-risk/guidance-for-supervision-of-activities/" rel="noopener" target="_blank" title="Guidance for supervision of activities"><span data-dcnode-id="236" instrument_node="">supervision</span></a><span data-dcnode-id="234" instrument_node="">&nbsp;and an </span><a data-dcnode-id="232" data-udi="umb://document/ccdf852c3a074c619b4b78d1baf28429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scouts.org.uk/volunteers/running-your-section/intouch/" rel="noopener" target="_blank" title="InTouch"><span data-dcnode-id="233" instrument_node="">InTouch</span></a><span data-dcnode-id="231" instrument_node="">&nbsp;process.</span></p></div></div><dl data-dcnode-id="211" data-v-ba383ade=""><dt data-dcnode-id="226" data-v-ba383ade=""><span data-dcnode-id="227" instrument_node="">Science</span></dt><dd data-dcnode-id="219" data-v-ba383ade=""><p data-dcnode-id="220"><span data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">Supervise young people, and only do science activities that are advised and age appropriate for your section. Test activities first, to make sure you’re confident you can lead them safely. </span></span><span data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Use protective clothing where necessary.</span></span><span data-dcnode-id="221"></span></p></dd><dt data-dcnode-id="217" data-v-ba383ade=""><span data-dcnode-id="218" instrument_node="">Sharp objects</span></dt><dd data-dcnode-id="212" data-v-ba383ade=""><p data-dcnode-id="213"><span data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Teach young people how to use sharp objects safely. Supervise them appropriately throughout. Store all sharp objects securely, out of the reach of young people. </span></span><span data-dcnode-id="214"></span></p></dd></dl></div></div></section></div></div><div class="x-reflow mb-4" data-dcnode-id="186"><button aria-expanded="false" class="d-flex align-items-center justify-content-between w-100 text-left text-reset p-4 bg-light" data-dcnode-id="192" gtm-event-action="Accordion click" gtm-event-category="Accordions"><h4 class="mb-0 text-left pe-none" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node=""> Change the level of challenge </span></h4><div class="pe-none" data-dcnode-id="193"><svg class="font-size-lg text-primary d-print-none feather feather-plus" data-dcnode-id="194" fill="none" height="24px" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24px" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="196" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="195" x1="5" x2="19" y1="12" y2="12"></line></svg></div></button><div class="d-print-block" data-dcnode-id="187" style="display:none;"><div class="p-4" data-dcnode-id="188"><div data-dcnode-id="189"><p data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">Choose different materials if working on a small scale is too fiddly. Introduce more rules by limiting teams to building their towers using one shape (triangles, squares, rectangles or – if you want to make it really challenging – circles).</span></p></div></div></div></div><div class="x-reflow mb-4" data-dcnode-id="167"><button aria-expanded="false" class="d-flex align-items-center justify-content-between w-100 text-left text-reset p-4 bg-light" data-dcnode-id="179" gtm-event-action="Accordion click" gtm-event-category="Accordions"><h4 class="mb-0 text-left pe-none" data-dcnode-id="184"><span data-dcnode-id="185" instrument_node=""> Make it accessible </span></h4><div class="pe-none" data-dcnode-id="180"><svg class="font-size-lg text-primary d-print-none feather feather-plus" data-dcnode-id="181" fill="none" height="24px" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24px" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="183" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="182" x1="5" x2="19" y1="12" y2="12"></line></svg></div></button><div class="d-print-block" data-dcnode-id="168" style="display:none;"><div class="p-4" data-dcnode-id="169"><span data-dcnode-id="170"><div data-dcnode-id="176"><p data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Ensure any members who struggle with fine motor skills are in a supportive team.</span></p></div><i data-dcnode-id="171"><p data-dcnode-id="172"><span data-dcnode-id="175" instrument_node="">All Scout activities should be </span><a data-dcnode-id="173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scouts.org.uk/volunteers/inclusion-and-diversity/supporting-those-with-additional-needs-and-neurodiversity/reasonable-adjustments/badges-and-awards/" rel="noopener" target="_blank" title="Guidance on flexibility"><span data-dcnode-id="174" instrument_node="">inclusive and accessible.</span></a></p></i></span></div></div></div><div class="d-lg-none" data-dcnode-id="136"><div class="x-reflow mb-4" data-dcnode-id="151"><button aria-expanded="false" class="d-flex align-items-center justify-content-between w-100 text-left text-reset p-4 bg-light" data-dcnode-id="160" gtm-event-action="Accordion click" gtm-event-category="Accordions"><h4 class="mb-0 text-left pe-none" data-dcnode-id="165"><span data-dcnode-id="166" instrument_node=""> This activity counts towards </span></h4><div class="pe-none" data-dcnode-id="161"><svg class="font-size-lg text-primary d-print-none feather feather-plus" data-dcnode-id="162" fill="none" height="24px" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24px" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="164" x1="12" x2="12" y1="5" y2="19"></line><line data-dcnode-id="163" x1="5" x2="19" y1="12" y2="12"></line></svg></div></button><div class="d-
