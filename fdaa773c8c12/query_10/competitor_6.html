</span><div class="post-2550 post type-post status-publish format-standard has-post-thumbnail hentry category-responses-anthology odd" data-dcnode-id="455" id="post-2550"><span data-dcnode-id="580" instrument_node="">
</span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hieroglyph.asu.edu/2014/08/structural-design-of-the-tall-tower/Array" title="Structural Design of the Tall Tower"><img alt="" class="attachment-story-feature size-story-feature wp-post-image" data-dcnode-id="579" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hieroglyph.asu.edu/wp-content/uploads/2014/08/tower-hjelmstad-324x300.jpg&amp;raw" width="324"></a><span data-dcnode-id="577" instrument_node="">
</span><div class="post-content" data-dcnode-id="457"><span data-dcnode-id="576" instrument_node="">
</span><h2 class="posttitle" data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Structural Design of the Tall Tower</span></h2><span data-dcnode-id="573" instrument_node="">
</span><p class="date" data-dcnode-id="564"><span data-dcnode-id="572" instrument_node="">
							August 22, 2014 </span><span data-dcnode-id="568"><span data-dcnode-id="571" instrument_node="">in </span><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hieroglyph.asu.edu/category/books/anthology/responses-anthology/" rel="category tag"><span data-dcnode-id="570" instrument_node="">Responses</span></a></span><span data-dcnode-id="567" instrument_node=""> </span><span class="post-utility alignright" data-dcnode-id="566"></span><span data-dcnode-id="565" instrument_node="">
</span></p><span data-dcnode-id="563" instrument_node="">
</span><div class="entry" data-dcnode-id="494"><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">The challenge of building tall structures has lured people like me into the profession of structural engineering for a long time. Managing our gravitational well in order to elevate usable space above the surface of the Earth is harder than it looks. And it’s not just gravity holding us down. The ebbs and flows of that thin sheet of fluid that is our atmosphere and ground shifts caused by tectonic movement create a difficult physical environment for building tall.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Despite training for the moment for my entire career, I was a bit stunned when Neal Stephenson asked me if a 20 km tall tower could be built. As a structural engineer I was still basking in the glow of the achievement of the Burj Khalifa—the current world’s tallest building standing 830 m tall. The notion of creating a structure 25 times taller than the tallest structure in the world was at odds with the gradual increments that have long characterized the evolution of tall buildings and long bridges. What? Do that next?</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="555" instrument_node="">Neal had been inspired by a speculative paper from about a decade earlier—written by scientist and science fiction writer Geoffrey Landis—that claimed a tower 15 to 25 km high could be built from steel. A tower of that height could double the payload to orbit of a conventional rocket, he argued. The proposal that Landis had made appears to have been based on the assumption that, at a given level, the structure need only provide vertical resistance to the accumulated weight of the tower and payload above it. Engineers basically manage force by increase resisting area to reduce stress. In essence, Landis had proposed a vertical column with cross sectional area large enough to keep the stress below the available strength of the material. The weight of the resisting material gets to be a large part of the load. If you add material to reduce stress you also add to the cause of that stress. The result is an exponential cascade of material from top to bottom. Steel is strong, but it is also heavy. This simple model suggests that the total weight of material required is </span><em data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">W = P</span></em><span data-dcnode-id="552" instrument_node=""> </span><em data-dcnode-id="547"><span data-dcnode-id="551" instrument_node="">(e</span><sup data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">µ</span></sup><span data-dcnode-id="548" instrument_node=""> – 1)</span></em><span data-dcnode-id="546" instrument_node="">, where </span><em data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">P</span></em><span data-dcnode-id="543" instrument_node=""> is the payload at the top and </span><em data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">µ = ρh/σ</span></em><span data-dcnode-id="540" instrument_node=""> is the ratio of the density times height to the strength of the material—a sort of characteristic number of the tall tower. So the weight of material is basically the payload multiplied by a factor that gets exponentially large as the height goes up. If you want to carry no load then you need no material. One key engineering challenge is to figure out what </span><em data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">P</span></em><span data-dcnode-id="537" instrument_node=""> should be. How much does Cape Canaveral weigh? The Burj Khalifa weighs 0.5 million tonnes empty. So to put the Burj Khalifa up on top of the tower would require about 5 million tonnes of the best steel you can get. The upshot of these “back of the envelope” figures is that the 20 km tower seems very doable. That might have been the inspiration of Landis’s comment that the tower would be easy to achieve with today’s materials.</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">The simple Landis model gives us a baseline number for what it might take to realize the tower, but it ignores the lateral forces caused by wind and the possibility of the tower buckling under its own weight. To have lateral stability the tower must have bending resistance. Now, not only is the area of material important, so is its distribution. The tower needs girth.</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">The main design problem is to determine the shape that minimizes the weight of material while providing adequate strength. We narrowed the design space by considering symmetric towers with circular plans because we had no good reason to assume that the wind would blow in a particular direction, but we allowed for the possibility that the radius of the tower could vary with the height. The tower would need to have a wide base to resist overturning, but should be narrower in the upper reaches to project a smaller area in the most intense winds.</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">The tall tower will extend into the jet stream—a wind environment far more demanding than any we design for on the surface of the Earth. Some data indicated that the wind velocity would peak at about 90 m/s at about two thirds of the way up from the base. The wind load model we adopted was fairly primitive, but included the variation of air density with height along with the variation of wind velocity. The force on the structure is the accumulation of the forces on each member of the structure. We sought a design that would catch the least wind, narrowing the neck of the tower in the most intense portion of the jet stream.</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">While some data are available on winds in the troposphere, it is generally not tailored to what a structural engineer needs to know. It is a basic truth of structural engineering that the structure will be exposed to the environment all of the time and probably for hundreds of years. There is no instant in all of that time that can be passed off as insignificant. The structure will have to bear it all and while the most intense loads might be rare, the likelihood of occurrence over the lifetime is significant and the consequence of being unable to meet the demands that nature serves up are dire.</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">To advance the design at a more refined level, we developed a reticulated model, grafted some of the shape assumptions from the simpler models, and added a simple optimization engine to keep the stresses below allowable levels for the material for each member. Even at this more refined level the model blurs many details. Neal had always imagined that the tower would need to have a “fractal” structure (like the Eiffel Tower). What that means is that the tower would comprise mega-members that would be made of smaller members (laced together in some sort of trussed configuration) and those smaller members would be made of members smaller yet. And so on until the members that you actually build with can actually be made (and lifted). One consequence of the fractal geometry is that not all of the material can be oriented in the optimal direction (e.g., vertical for vertical loads). Some of the material must be invested in bracing—the members must be tied together to transmit the forces of wind and gravity over the structure so that it can mobilize its structural resistance.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="519" instrument_node="">For the reticulated model we created a design that would allow a variable number of levels (like stories in a tall building except that each “story” in the tower is about the height of the Burj Khalifa) and a variable number of primary columns. We imagined the plan as concentric circles to give the tower a “wall thickness.” At each level we created a truss ring that would transfer the loads at that level across all of the primary columns. The tower radius builds from a broad base (covering about 25 km</span><sup data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">2</span></sup><span data-dcnode-id="516" instrument_node=""> in recent designs); it tapers in the region of the jet stream and blossoms at the top to provide usable real estate. With a four-sided geometry the tower looks a lot like the Eiffel Tower (except for the flair at the top)—an inevitable consequence of the forces it must resist. For a given geometry we optimized the structure with an algorithm that simply put more material in areas where stresses were high and took away material from areas where the stresses were low. Hence, for a given geometry we could find the minimum amount of material required. A recent design suggests that we are in the neighborhood of 250 million tonnes of steel—a healthy fraction of world annual steel production.</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">The truss geometry provided a sort of “level-zero” layout of the fractal structure, but it did not explicitly model all of the additional fractal levels. For a tower with twenty levels there are about a thousand members. In a fractal structure each member replicates the geometry of the larger structure. Therefore, modeling at the next level of the fractal geometry would have a million members. One more fractal level would give a billion members. An investigation of the fractal nature of the structure revealed an important result—as the number of fractal levels increases the wind area of the members also increases unfavorably. While the fractalization allows the wind to “blow right through the structure” it traps wind on the way in and on the way out. The fractalization thins out the members but there are more of them and member stability requirements at the smallest level determine the exposed fractal area. The implication of this observation is that the main members would likely need to be enclosed in a sheathing to reduce the wind drag. The demands of the wind have fostered interesting speculation about whether or not it is possible to use aerodynamics to help mitigate the wind induced stresses. The wind could be employed as a passive system that mobilizes uplift when needed most.</span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">At present the tower is conceptualized only at the level of broad brush strokes. The design of the tower has opened areas of fundamental inquiry into the nature of the jet stream and the nature of air flow around and through fractal structures. Many design questions remain. A method of construction is yet to be devised—it is difficult to imagine the traditional steel worker toiling at minus 60 Celsius in air so thin that a Nepali Sherpa would be left gasping. That paradigm will need to give way to a robot-based approach (or perhaps even more clever strategies). The foundations of this enormous structure will bring unprecedented challenges to geotechnical engineers. What about transportation? Imagine a train system spiraling around the exterior of the tower. Imagine an airport two kilometers above the surface of the Earth.</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">It is evident that the lightest structures have the coarsest fractal geometry. But the horizontal bracing members at the first level of a twenty-level tower with five sides are longer than the longest bridge span in the world today. Each member will be a monumental record-shattering design in its own right. We still have to figure out how to do that. And the details are mind-numbingly complex. The basic geometry of how the members come together to form a structural joint capable of transmitting the huge forces is a challenge. A strategy for joining the members to form the structure is not solved and is made more complicated by the very cold temperatures in the upper reaches of the structure. And questions about the integrity of the structure in the event of an attack or natural disaster remain unresolved. The ordinary strategy of adding redundancy brings enormous additional weight.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">This journey to wrap my mind around the possibility of the tall tower has caused me to recalibrate nearly everything I have ever thought about building tall. Along the way, every time my engineering sensibilities said “no” I would struggle back to “why not?” The idea is just big enough to keep you from trying to extend what has been done just a little bit further—it is an idea big enough to drive new thought.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Is the Tall Tower possible? Yes, theoretically. Is it feasible? Who is to say? That is more a question of human will than anything else. We still await the flood of ideas for use of the tower, and therein lies the case for building it. Oh, and by the way, if you put more stuff on the tower we will need to increase the size a bit.</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="496"><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hieroglyph.asu.edu/wp-content/uploads/2014/08/Hjelmstad-on-Stephenson-Structural-Design-of-the-Tall-Tower.pdf"><span data-dcnode-id="498" instrument_node="">Hjelmstad on Stephenson – Structural Design of the Tall Tower</span></a></p><span data-dcnode-id="495" instrument_node="">
</span></div><span data-dcnode-id="493" instrument_node="">

</span></div><span data-dcnode-id="482" instrument_node="">
</span><div class="description" data-dcnode-id="475"><span data-dcnode-id="481" instrument_node="">Hjelmstad's research focuses on computational mechanics, earthquake engineering, stability of structures, optimization, structural identification, nondestructive evaluation of large structures, and numerical simulation of complex structures. He is a member of several professional associations for engineers and serves as associate editor of the </span><em data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Journal of Constructional Steel Research</span></em><span data-dcnode-id="478" instrument_node=""> and the</span><em data-dcnode-id="476"><span data-dcnode-id="477" instrument_node=""> ASCE Journal of Structural Engineering.</span></em></div></div><span data-dcnode-id="473" instrument_node="">

</span><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hieroglyph.asu.edu/members/danieder/" rel="nofollow"><span data-dcnode-id="430" instrument_node="">Dani Eder</span></a><span data-dcnode-id="428" instrument_node=""> said on </span><a data-dcnode-id="425" href="#comment-189"><span class="time-since" data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">September 16, 2014</span></span></a><span data-dcnode-id="424" instrument_node=""> </span></p><span data-dcnode-id="422" instrument_node="">

</span><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">&gt; “A recent design suggests that we are in the neighborhood of 250 million tonnes of steel—a healthy fraction of world annual steel production.”</span></p><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">We studied tall towers at Boeing more than a decade ago.  As you discussed above, the mass of the tower depends strongly on the strength/density ratio of the material.  Carbon/Epoxy performs much better than steel, being both stronger and lighter by large margins.  In this application, the higher strength overcomes the higher cost vs. steel.</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Our design assumed a triangulated truss, where each truss element is a Carbon/Epoxy tube with sufficient cross section to withstand the required compressive and tensile loads.  Around each tube are ring bearings, and a pivoting airfoil, which reduces drag by about a factor of ten compared to a circular tube.  Since we don’t know which way the wind will blow, the airfoil pivots like a weather vane to present the lowest drag.</span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Individual truss elements are assembled into trusses, and the trusses in turn are assembled into larger trusses.  Two levels of truss sizes are sufficient for a 20 km tower.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">&gt; A method of construction is yet to be devised</span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Our approach is to build it “From the Top Down”.  The topmost section is assembled first, at ground level.  Hydraulic jacks of the type used for lift-slab construction are used to raise this section by one truss module, and the next highest section is then installed under it.  You repeat this process as many times as needed.  This way all the construction happens at ground level.  Because the tower is likely tapered with a base width 5-10% of the height, you provide movable foundation blocks that move outwards as the construction progresses.  Once the tower is completed, you grout the movable blocks in place to become the permanent foundation.</span></p><span data-dcnode-id="401" instrument_node="">
</span></div><span data-dcnode-id="399" instrument_node="">
