</span></div><div class="fusion-clearfix" data-dcnode-id="594"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-39 fusion_builder_column_1_4 1_4 fusion-one-fourth fusion-column-last" data-dcnode-id="587" style="width:25%;width:calc(25% - ( ( 4% ) * 0.25 ) );margin-top:60px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="588" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><span class="fusion-imageframe imageframe-none imageframe-10 hover-type-none" data-dcnode-id="590"><img alt="epcot coca cola" class="lazyload img-responsive wp-image-2718" data-dcnode-id="591" data-orig-sizes="(max-width: 800px) 100vw, 200px" data-orig-src="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-12.jpg" data-sizes="auto" data-srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-12-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-12.jpg 348w" height="348" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-12.jpg&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27348%27%20height%3D%27348%27%20viewBox%3D%270%200%20348%20348%27%3E%3Crect%20width%3D%27348%27%20height%3D%27348%27%20fill-opacity%3D%220%22%2F%3E%3C%2Fsvg%3E" title="epcot coca cola" width="348"></span><div class="fusion-clearfix" data-dcnode-id="589"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-40 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="570" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="571" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-31" data-dcnode-id="573"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="584" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Electric Umbrella Restaurant Secrets</span></strong></h2><span data-dcnode-id="583" instrument_node="">
</span><ul data-dcnode-id="575"><span data-dcnode-id="582" instrument_node="">
</span><li data-dcnode-id="577"><span data-dcnode-id="581" instrument_node="">See if you can find the talking trash can inside the </span><em data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Electric Umbrella Restaurant</span></em><span data-dcnode-id="578" instrument_node="">. It’s the only one plugged in!</span></li><span data-dcnode-id="576" instrument_node="">
</span></ul><span data-dcnode-id="574" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="572"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-41 fusion_builder_column_3_4 3_4 fusion-three-fourth fusion-column-first" data-dcnode-id="544" style="width:75%;width:calc(75% - ( ( 4% ) * 0.75 ) );margin-right: 4%;margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="545" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-32" data-dcnode-id="547"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="567" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Living with the Land Secrets</span></strong></h2><span data-dcnode-id="566" instrument_node="">
</span><ul data-dcnode-id="558"><span data-dcnode-id="565" instrument_node="">
</span><li data-dcnode-id="560"><span data-dcnode-id="564" instrument_node="">Check out the street number on the mailbox of the farmhouse at </span><em data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Living with the Land</span></em><span data-dcnode-id="561" instrument_node="">. It’s “82,” representing the year Epcot opened to the public (1982).</span></li><span data-dcnode-id="559" instrument_node="">
</span></ul><span data-dcnode-id="557" instrument_node="">
</span><ul data-dcnode-id="549"><span data-dcnode-id="556" instrument_node="">
</span><li data-dcnode-id="551"><span data-dcnode-id="555" instrument_node="">There are some amazing crops growing indoors at </span><em data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Living with the Land</span></em><span data-dcnode-id="552" instrument_node="">. In fact, one of the tomato trees holds the Guinness Book of World Records title for the most yield in one year. It produced an astonishing 32,000 tomatoes – weighing around 1,152 pounds – in just one year!</span></li><span data-dcnode-id="550" instrument_node="">
</span></ul><span data-dcnode-id="548" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="546"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-42 fusion_builder_column_1_4 1_4 fusion-one-fourth fusion-column-last" data-dcnode-id="539" style="width:25%;width:calc(25% - ( ( 4% ) * 0.25 ) );margin-top:70px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="540" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><span class="fusion-imageframe imageframe-none imageframe-11 hover-type-none" data-dcnode-id="542"><img alt="best epcot secrets" class="lazyload img-responsive wp-image-2712" data-dcnode-id="543" data-orig-sizes="(max-width: 800px) 100vw, 200px" data-orig-src="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-06.jpg" data-sizes="auto" data-srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-06-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-06.jpg 348w" height="348" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-06.jpg&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27348%27%20height%3D%27348%27%20viewBox%3D%270%200%20348%20348%27%3E%3Crect%20width%3D%27348%27%20height%3D%27348%27%20fill-opacity%3D%220%22%2F%3E%3C%2Fsvg%3E" title="best epcot secrets" width="348"></span><div class="fusion-clearfix" data-dcnode-id="541"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-43 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="494" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="495" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-33" data-dcnode-id="497"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="536" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Mission: Space – Epcot Secrets</span></strong></h2><span data-dcnode-id="535" instrument_node="">
</span><ul data-dcnode-id="527"><span data-dcnode-id="534" instrument_node="">
</span><li data-dcnode-id="529"><span data-dcnode-id="533" instrument_node="">The </span><em data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Mission: Space</span></em><span data-dcnode-id="530" instrument_node=""> attraction at Epcot uses more computer power than the real NASA Space Shuttle. Seems hard to believe!</span></li><span data-dcnode-id="528" instrument_node="">
</span></ul><span data-dcnode-id="526" instrument_node="">
</span><ul data-dcnode-id="518"><span data-dcnode-id="525" instrument_node="">
</span><li data-dcnode-id="520"><span data-dcnode-id="524" instrument_node="">In </span><em data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Mission: Space</span></em><span data-dcnode-id="521" instrument_node="">, try pressing all the switches and dials at once. Don’t be alarmed if you hear Gary Sinise’s voice over the speaker telling you to cut it out! Gary Sinise also stars in the pre-ride video and narrates the ride.</span></li><span data-dcnode-id="519" instrument_node="">
</span></ul><span data-dcnode-id="517" instrument_node="">
</span><ul data-dcnode-id="509"><span data-dcnode-id="516" instrument_node="">
</span><li data-dcnode-id="511"><span data-dcnode-id="515" instrument_node="">See if you can find Hidden Mickeys in the ceiling and walls at the </span><em data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Mission: Space </span></em><span data-dcnode-id="512" instrument_node="">gift shop.</span></li><span data-dcnode-id="510" instrument_node="">
</span></ul><span data-dcnode-id="508" instrument_node="">
</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="505" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">MouseGear – Epcot Secrets</span></strong></h2><span data-dcnode-id="504" instrument_node="">
</span><ul data-dcnode-id="499"><span data-dcnode-id="503" instrument_node="">
</span><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Walk behind MouseGear to see a wonderful little butterfly garden.</span></li><span data-dcnode-id="500" instrument_node="">
</span></ul><span data-dcnode-id="498" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="496"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-44 fusion_builder_column_3_4 3_4 fusion-three-fourth fusion-column-first" data-dcnode-id="473" style="width:75%;width:calc(75% - ( ( 4% ) * 0.75 ) );margin-right: 4%;margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="474" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-34" data-dcnode-id="476"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="491" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Spaceship Earth Secrets</span></strong></h2><span data-dcnode-id="490" instrument_node="">
</span><ul data-dcnode-id="478"><span data-dcnode-id="489" instrument_node="">
</span><li data-dcnode-id="480"><span data-dcnode-id="488" instrument_node="">If you are looking for a dry place to wait out a rain shower, head underneath </span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disneyworld.disney.go.com/attractions/epcot/spaceship-earth/"><em data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Spaceship Earth</span></em></a><span data-dcnode-id="484" instrument_node="">. The structure has an innovative drainage system that collects rainwater, then channels it down a support structure and into the </span><em data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">World Showcase Lagoon</span></em><span data-dcnode-id="481" instrument_node="">.</span></li><span data-dcnode-id="479" instrument_node="">
</span></ul><span data-dcnode-id="477" instrument_node="">

</span><ul data-dcnode-id="456"><span data-dcnode-id="463" instrument_node="">
</span><li data-dcnode-id="458"><span data-dcnode-id="462" instrument_node="">If you are wondering why your flight number is “5505” on </span><em data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Soarin’</span></em><span data-dcnode-id="459" instrument_node="">, it’s because Imagineers used the ride’s opening date of May 5, 2005.</span></li><span data-dcnode-id="457" instrument_node="">
</span></ul><span data-dcnode-id="455" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="453"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-47 fusion_builder_column_3_4 3_4 fusion-three-fourth fusion-column-first" data-dcnode-id="435" style="width:75%;width:calc(75% - ( ( 4% ) * 0.75 ) );margin-right: 4%;margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="436" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-36" data-dcnode-id="438"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="448" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Test Track Secrets</span></strong></h2><span data-dcnode-id="447" instrument_node="">
</span><ul data-dcnode-id="440"><span data-dcnode-id="446" instrument_node="">
</span><li data-dcnode-id="442"><em data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Test Track</span></em><span data-dcnode-id="443" instrument_node=""> is the fastest ride in all of Walt Disney World (65 mph).</span></li><span data-dcnode-id="441" instrument_node="">
</span></ul><span data-dcnode-id="439" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="437"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-48 fusion_builder_column_1_4 1_4 fusion-one-fourth fusion-column-last" data-dcnode-id="430" style="width:25%;width:calc(25% - ( ( 4% ) * 0.25 ) );margin-top:40px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="431" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><span class="fusion-imageframe imageframe-none imageframe-13 hover-type-none" data-dcnode-id="433"><img alt="testtrack Epcot" class="lazyload img-responsive wp-image-2717" data-dcnode-id="434" data-orig-sizes="(max-width: 800px) 100vw, 200px" data-orig-src="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-11.jpg" data-sizes="auto" data-srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-11-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-11.jpg 348w" height="348" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-11.jpg&amp;raw" srcset="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27348%27%20height%3D%27348%27%20viewBox%3D%270%200%20348%20348%27%3E%3Crect%20width%3D%27348%27%20height%3D%27348%27%20fill-opacity%3D%220%22%2F%3E%3C%2Fsvg%3E" title="testtrack Epcot" width="348"></span><div class="fusion-clearfix" data-dcnode-id="432"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-49 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="383" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="384" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-37" data-dcnode-id="386"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="427" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">The Seas with Nemo &amp; Friends Secrets</span></strong></h2><span data-dcnode-id="426" instrument_node="">
</span><ul data-dcnode-id="415"><span data-dcnode-id="425" instrument_node="">
</span><li data-dcnode-id="417"><span data-dcnode-id="424" instrument_node="">The aquarium holds 5.7 million gallons of saltwater, measures 203’ in diameter, and has a depth of 27’. </span><em data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Spaceship Earth</span></em><span data-dcnode-id="421" instrument_node=""> (160’ in diameter) could fit comfortably inside this massive structure! The saltwater aquarium was the largest of its kind in the world until </span><em data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Georgia Aquarium</span></em><span data-dcnode-id="418" instrument_node=""> surpassed it in 2005.</span></li><span data-dcnode-id="416" instrument_node="">
</span></ul><span data-dcnode-id="414" instrument_node="">
</span><ul data-dcnode-id="394"><span data-dcnode-id="413" instrument_node="">
</span><li data-dcnode-id="396"><span data-dcnode-id="412" instrument_node="">The</span><em data-dcnode-id="410"><span data-dcnode-id="411" instrument_node=""> Living Seas Pavilion </span></em><span data-dcnode-id="409" instrument_node="">was renamed</span><em data-dcnode-id="407"><span data-dcnode-id="408" instrument_node=""> The Seas with Nemo &amp; Friends</span></em><span data-dcnode-id="406" instrument_node=""> in 2005. It was the first Pavilion at Epcot to be named after an animated Disney movie. </span><em data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Circle of Life: An Environmental Fable </span></em><span data-dcnode-id="403" instrument_node="">at </span><em data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">The Land Pavilion</span></em><span data-dcnode-id="400" instrument_node=""> was the first Epcot? attraction based on an animated Disney property. It was based on the </span><em data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Lion King</span></em><span data-dcnode-id="397" instrument_node=""> and opened in 1995.</span></li><span data-dcnode-id="395" instrument_node="">
</span></ul><span data-dcnode-id="393" instrument_node="">
</span><ul data-dcnode-id="388"><span data-dcnode-id="392" instrument_node="">
</span><li data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">You may notice the very large overhang when exiting the building. This was constructed to allow your eyes to re-adjust to the natural sunlight.</span></li><span data-dcnode-id="389" instrument_node="">
</span></ul><span data-dcnode-id="387" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="385"></div></div></div></div></div><div class="fusion-fullwidth fullwidth-box fusion-builder-row-4 nonhundred-percent-fullwidth non-hundred-percent-height-scrolling" data-dcnode-id="332" style="background-color: rgba(255,255,255,0);background-position: center center;background-repeat: no-repeat;padding-top:0px;padding-right:0px;padding-bottom:0px;padding-left:0px;margin-bottom: 0px;margin-top: 0px;border-width: 0px 0px 0px 0px;border-color:#eae9e9;border-style:solid;"><div class="fusion-builder-row fusion-row" data-dcnode-id="333"><div class="fusion-layout-column fusion_builder_column fusion-builder-column-50 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="334" style="margin-top:10px;margin-bottom:20px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="335" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;border-width: 1px 1px 1px 1px;border-color:#000000;border-style:solid;padding: 27px 14px 14px 14px;"><div class="fusion-text fusion-text-38" data-dcnode-id="337"><p data-dcnode-id="355"><span data-dcnode-id="380" instrument_node="">We hope that this list of Epcot secrets has inspired you to make this dynamic park a top priority on your Disney World itinerary. It’s truly a fascinating destination to experience! Feel free to browse our other Secrets pages, as well as our </span><strong data-dcnode-id="377"><a data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//magicguides.com/best-places-to-eat-epcot"><span data-dcnode-id="379" instrument_node="">Best Places to Eat in Epcot</span></a></strong><span data-dcnode-id="376" instrument_node="">,&nbsp; </span><a data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//magicguide
