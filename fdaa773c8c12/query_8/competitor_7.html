</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Epcot was designed with amazing attention to detail, so much so that many guests overlook the hidden places and secret spots which make this theme park truly shine. We have created a list of Epcot secrets to help you discover some of the quirky facts, off-the-beaten-path attractions, and hidden corners of this Disney theme park. &nbsp;It’s a fascinating destination and these Epcot secrets can only enhance your experience!</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Walt Disney World’s Epcot can really transport you to a different world. Whether it’s the educational and thrilling attractions, beautiful grounds and imagery, or the world-class cuisine and shopping, there is something for everyone at Epcot. This Disney World theme park is a treasure in every respect and should be a top priority on your Disney vacation itinerary. Now, let’s share some of those Epcot Secrets with you.</span></p><span data-dcnode-id="1367" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1365"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-1 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="1357" style="margin-top:0px;margin-bottom:45px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1358" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="imageframe-align-center" data-dcnode-id="1360"><span class="fusion-imageframe imageframe-none imageframe-1 hover-type-none" data-dcnode-id="1361"><img alt="list of epcot secrets" class="img-responsive wp-image-2705 lazyautosizes lazyloaded" data-dcnode-id="1362" data-orig-sizes="(max-width: 800px) 100vw, 550px" data-orig-src="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets.jpg" data-sizes="auto" data-srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-200x811.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-400x1623.jpg 400w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets.jpg 550w" height="2231" sizes="550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets.jpg&amp;raw" srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-200x811.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-400x1623.jpg 400w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets.jpg 550w" title="Epcot Secrets list" width="550"></span></div><div class="fusion-clearfix" data-dcnode-id="1359"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-2 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="1347" style="margin-top:45px;margin-bottom:15px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1348" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;background-color:#8e8e8e;padding: 15px 0px 15px 10px;"><div class="fusion-text fusion-text-2" data-dcnode-id="1350"><h1 class="fusion-responsive-typography-calculated" data-dcnode-id="1352" data-fontsize="34" data-lineheight="47.6px" style="text-align: center; --fontSize:34; line-height: 1.4;"><strong data-dcnode-id="1353"><span data-dcnode-id="1354" style="color: #ffffff;"><em data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">The Not-So-Secret History of Epcot</span></em></span></strong></h1><span data-dcnode-id="1351" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1349"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-3 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="1337" style="margin-top:35px;margin-bottom:20px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1338" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-3" data-dcnode-id="1340"><p data-dcnode-id="1342"><span data-dcnode-id="1346" instrument_node="">Walt Disney World opened Epcot on October 2, 1982, and – with nearly 12 million annual guests – has since become the 3</span><sup data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">rd</span></sup><span data-dcnode-id="1343" instrument_node=""> most visited theme park in the world. The park’s name is an acronym for “Experimental Prototype Community of Tomorrow.” Epcot’s stated mission is to celebrate human achievement, international culture, and technological innovation. Because of this emphasis, the theme park is frequently referred to as the “permanent World’s Fair.”</span></p><span data-dcnode-id="1341" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1339"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-4 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="1327" style="margin-top:45px;margin-bottom:15px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1328" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;background-color:#8e8e8e;padding: 15px 0px 15px 10px;"><div class="fusion-text fusion-text-4" data-dcnode-id="1330"><h1 class="fusion-responsive-typography-calculated" data-dcnode-id="1332" data-fontsize="34" data-lineheight="47.6px" style="text-align: center; --fontSize:34; line-height: 1.4;"><strong data-dcnode-id="1333"><span data-dcnode-id="1334" style="color: #ffffff;"><em data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">General Epcot Secrets</span></em></span></strong></h1><span data-dcnode-id="1331" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1329"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-5 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="1308" style="margin-top:35px;margin-bottom:20px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1309" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-5" data-dcnode-id="1311"><p data-dcnode-id="1313"><span data-dcnode-id="1326" instrument_node="">Epcot is essentially laid out as two theme parks in one – </span><strong data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">World Showcase</span></strong><span data-dcnode-id="1323" instrument_node=""> and </span><strong data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Future World</span></strong><span data-dcnode-id="1320" instrument_node="">.&nbsp; </span><em data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">World Showcase</span></em><span data-dcnode-id="1317" instrument_node=""> represents the culture and cuisine of 11 different countries from around the world, while </span><em data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Future World</span></em><span data-dcnode-id="1314" instrument_node=""> mixes thrill rides with educational exhibits. Each Epcot pavilion captivates guests with its own unique magic and allure. Here are a few general Epcot secrets:</span></p><span data-dcnode-id="1312" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1310"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-6 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="1268" style="margin-top:35px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1269" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-6" data-dcnode-id="1271"><ul data-dcnode-id="1303"><span data-dcnode-id="1307" instrument_node="">
</span><li data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Walt Disney envisioned people living at Epcot, but this plan never came to fruition. His original concept for the park was to create a “real city that would never cease to be a blueprint of the future.”</span></li><span data-dcnode-id="1304" instrument_node="">
</span></ul><span data-dcnode-id="1302" instrument_node="">
</span><ul data-dcnode-id="1294"><span data-dcnode-id="1301" instrument_node="">
</span><li data-dcnode-id="1296"><span data-dcnode-id="1300" instrument_node="">Epcot spans 300 acres, which is twice the size of </span><a data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//magicguides.com/magic-kingdom-secrets/"><span data-dcnode-id="1299" instrument_node="">Magic Kingdom</span></a><span data-dcnode-id="1297" instrument_node="">.</span></li><span data-dcnode-id="1295" instrument_node="">
</span></ul><span data-dcnode-id="1293" instrument_node="">
</span><ul data-dcnode-id="1279"><span data-dcnode-id="1292" instrument_node="">
</span><li data-dcnode-id="1281"><span data-dcnode-id="1291" instrument_node="">The distance around the entire </span><em data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">World Showcase Lagoon</span></em><span data-dcnode-id="1288" instrument_node=""> – from </span><em data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">China</span></em><span data-dcnode-id="1285" instrument_node=""> to </span><em data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Canada</span></em><span data-dcnode-id="1282" instrument_node=""> – is 1.25 miles. (Mexico is on one end, then Norway, then China.)</span></li><span data-dcnode-id="1280" instrument_node="">
</span></ul><span data-dcnode-id="1278" instrument_node="">
</span><ul data-dcnode-id="1273"><span data-dcnode-id="1277" instrument_node="">
</span><li data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">When World Showcase was constructed, space for 10 additional countries remained. Norway and Morocco Pavilions were added later, but there is still room for 8 more!</span></li><span data-dcnode-id="1274" instrument_node="">
</span></ul><span data-dcnode-id="1272" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1270"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-7 fusion_builder_column_3_4 3_4 fusion-three-fourth fusion-column-first" data-dcnode-id="1240" style="width:75%;width:calc(75% - ( ( 4% ) * 0.75 ) );margin-right: 4%;margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1241" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-7" data-dcnode-id="1243"><ul data-dcnode-id="1254"><span data-dcnode-id="1267" instrument_node="">
</span><li data-dcnode-id="1256"><span data-dcnode-id="1266" instrument_node="">Thanks to the magic of fiber optic lighting, </span><em data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Future World</span></em><span data-dcnode-id="1263" instrument_node=""> really comes to life at nighttime. Between </span><em data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Spaceship Earth</span></em><span data-dcnode-id="1260" instrument_node=""> and </span><em data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Innoventions Plaza</span></em><span data-dcnode-id="1257" instrument_node="">, the pavement becomes illuminated and animated when the sun goes down. Most guests bypass this area at night, so this dazzling display of lighting magic remains somewhat of an Epcot secret. (Innoventions Plaza is Innovations East plus Innoventions West)</span></li><span data-dcnode-id="1255" instrument_node="">
</span></ul><span data-dcnode-id="1253" instrument_node="">
</span><ul data-dcnode-id="1245"><span data-dcnode-id="1252" instrument_node="">
</span><li data-dcnode-id="1247"><span data-dcnode-id="1251" instrument_node="">One reason why the concrete paths around </span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripadvisor.com/LocationPhotoDirectLink-g34515-d1036082-i171445146-Epcot_World_Showcase-Orlando_Florida.html"><span data-dcnode-id="1250" instrument_node="">World Showcase Lagoon</span></a><span data-dcnode-id="1248" instrument_node=""> are red is to make the grass appear greener.</span></li><span data-dcnode-id="1246" instrument_node="">
</span></ul><span data-dcnode-id="1244" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1242"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-8 fusion_builder_column_1_4 1_4 fusion-one-fourth fusion-column-last" data-dcnode-id="1235" style="width:25%;width:calc(25% - ( ( 4% ) * 0.25 ) );margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1236" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><span class="fusion-imageframe imageframe-none imageframe-2 hover-type-none" data-dcnode-id="1238"><img alt="epcot secrets list" class="img-responsive wp-image-2713 lazyautosizes lazyloaded" data-dcnode-id="1239" data-orig-sizes="(max-width: 800px) 100vw, 200px" data-orig-src="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-07.jpg" data-sizes="auto" data-srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-07-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-07.jpg 348w" height="348" sizes="164px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-07.jpg&amp;raw" srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-07-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-07.jpg 348w" title="epcot secrets list" width="348"></span><div class="fusion-clearfix" data-dcnode-id="1237"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-9 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="1216" style="margin-top:0px;margin-bottom:20px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1217" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-8" data-dcnode-id="1219"><ul data-dcnode-id="1230"><span data-dcnode-id="1234" instrument_node="">
</span><li data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Each country in World Showcase has the exact same frontage space. While some countries cover more land on the inside, Disney World wanted all countries to have equal frontage on the outside. The same is true with the height of each country’s tallest structure. The Eiffel Tower or mountains in Canada Pavilion, for example, may appear taller than some of the structures in other countries. However, this is not the case. “Forced perspective” gives the illusion of height.</span></li><span data-dcnode-id="1231" instrument_node="">
</span></ul><span data-dcnode-id="1229" instrument_node="">
</span><ul data-dcnode-id="1221"><span data-dcnode-id="1228" instrument_node="">
</span><li data-dcnode-id="1223"><span data-dcnode-id="1227" instrument_node="">Disney hires natives of each country represented in </span><em data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">World Showcase</span></em><span data-dcnode-id="1224" instrument_node="">. This presents guests with a wonderful opportunity to interact with Cast Members who have a first-hand perspective of the country they represent.</span></li><span data-dcnode-id="1222" instrument_node="">
</span></ul><span data-dcnode-id="1220" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1218"></div></div></div></div></div><div class="fusion-fullwidth fullwidth-box fusion-builder-row-2 nonhundred-percent-fullwidth non-hundred-percent-height-scrolling" data-dcnode-id="633" style="background-color: rgba(255,255,255,0);background-position: center center;background-repeat: no-repeat;padding-top:0px;padding-right:0px;padding-bottom:0px;padding-left:0px;margin-bottom: 0px;margin-top: 0px;border-width: 0px 0px 0px 0px;border-color:#eae9e9;border-style:solid;"><div class="fusion-builder-row fusion-row" data-dcnode-id="634"><div class="fusion-layout-column fusion_builder_column fusion-builder-column-10 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="1204" style="margin-top:45px;margin-bottom:15px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1205" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;background-color:#8e8e8e;padding: 15px 0px 15px 10px;"><div class="fusion-text fusion-text-9" data-dcnode-id="1207"><h1 class="fusion-responsive-typography-calculated" data-dcnode-id="1209" data-fontsize="34" data-lineheight="47.6px" style="text-align: center; --fontSize:34; line-height: 1.4;"><strong data-dcnode-id="1210"><span data-dcnode-id="1211" style="color: #ffffff;"><em data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">World Showcase- Epcot Secrets</span></em></span></strong></h1><span data-dcnode-id="1208" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1206"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-11 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="1176" style="margin-top:35px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1177" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-10" data-dcnode-id="1179"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="1201" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">African Outpost Secrets</span></strong></h2><span data-dcnode-id="1200" instrument_node="">
</span><ul data-dcnode-id="1192"><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1194"><span data-dcnode-id="1198" instrument_node="">Beware of those wooden crates lying around </span><em data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">African Outpost</span></em><span data-dcnode-id="1195" instrument_node="">. You may get soaked if you open one!</span></li><span data-dcnode-id="1193" instrument_node="">
</span></ul><span data-dcnode-id="1191" instrument_node="">
</span><ul data-dcnode-id="1181"><span data-dcnode-id="1190" instrument_node="">
</span><li data-dcnode-id="1183"><span data-dcnode-id="1189" instrument_node="">At around 5 pm, the drawbridge opens and barges are launched into the lagoon to prepare for the </span><a data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disneyworld.disney.go.com/entertainment/epcot/illuminations-reflections-of-earth/"><em data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">IlluniNations</span></em><span data-dcnode-id="1186" instrument_node=""> fireworks show</span></a><span data-dcnode-id="1184" instrument_node="">. Guests must wait until after the drawbridge is lowered back into place to cross.</span></li><span data-dcnode-id="1182" instrument_node="">
</span></ul><span data-dcnode-id="1180" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1178"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-12 fusion_builder_column_3_4 3_4 fusion-three-fourth fusion-column-first" data-dcnode-id="1153" style="width:75%;width:calc(75% - ( ( 4% ) * 0.75 ) );margin-right: 4%;margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1154" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-11" data-dcnode-id="1156"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="1173" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">The American Adventure Pavilion Secrets</span></strong></h2><span data-dcnode-id="1172" instrument_node="">
</span><ul data-dcnode-id="1158"><span data-dcnode-id="1171" instrument_node="">
</span><li data-dcnode-id="1160"><span data-dcnode-id="1170" instrument_node="">The Colonial-style building at </span><em data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">The American Adventure Pavilion</span></em><span data-dcnode-id="1167" instrument_node=""> uses </span><em data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">reverse</span></em><span data-dcnode-id="1164" instrument_node=""> </span><a data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forced_perspective"><span data-dcnode-id="1163" instrument_node="">forced perspective</span></a><span data-dcnode-id="1161" instrument_node=""> to make the structure appear smaller than it really is. From the outside, it looks as though the building is two and a half stories. In actuality, it has 5 stories! Disney Imagineers determined that the building had to be large enough to house its auditorium, but not so large that the structure would appear inappropriate for Colonial times. They added massive windows and doorways to create the illusion of a smaller building.</span></li><span data-dcnode-id="1159" instrument_node="">
</span></ul><span data-dcnode-id="1157" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1155"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-13 fusion_builder_column_1_4 1_4 fusion-one-fourth fusion-column-last" data-dcnode-id="1148" style="width:25%;width:calc(25% - ( ( 4% ) * 0.25 ) );margin-top:70px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1149" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><span class="fusion-imageframe imageframe-none imageframe-3 hover-type-none" data-dcnode-id="1151"><img alt="interesting things at epcot" class="img-responsive wp-image-2709 lazyautosizes lazyloaded" data-dcnode-id="1152" data-orig-sizes="(max-width: 800px) 100vw, 200px" data-orig-src="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-03.jpg" data-sizes="auto" data-srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-03-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-03.jpg 348w" height="348" sizes="164px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-03.jpg&amp;raw" srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-03-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-03.jpg 348w" title="interesting things at epcot" width="348"></span><div class="fusion-clearfix" data-dcnode-id="1150"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-14 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="1126" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1127" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-12" data-dcnode-id="1129"><ul data-dcnode-id="1143"><span data-dcnode-id="1147" instrument_node="">
</span><li data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">The facade was constructed using 110,000 handmade bricks from Georgia red clay. Each brick was aged to look authentic.</span></li><span data-dcnode-id="1144" instrument_node="">
</span></ul><span data-dcnode-id="1142" instrument_node="">
</span><ul data-dcnode-id="1137"><span data-dcnode-id="1141" instrument_node="">
</span><li data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Notice that you are led up to the second floor to watch the show. The secret reason for this is because all the props, staging, and equipment used during the show are stored beneath the audience’s seats. They are secretly slid in and out of this area during the performance.</span></li><span data-dcnode-id="1138" instrument_node="">
</span></ul><span data-dcnode-id="1136" instrument_node="">
</span><ul data-dcnode-id="1131"><span data-dcnode-id="1135" instrument_node="">
</span><li data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">There is an interesting painting of a World War II-era B-17 bomber in the left corner of the rotunda. As you walk back and forth in front of the painting, the plane appears to shift with your movement.</span></li><span data-dcnode-id="1132" instrument_node="">
</span></ul><span data-dcnode-id="1130" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1128"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-15 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="1094" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1095" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-13" data-dcnode-id="1097"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="1123" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Canada Pavilion Secrets</span></strong></h2><span data-dcnode-id="1122" instrument_node="">
</span><ul data-dcnode-id="1108"><span data-dcnode-id="1121" instrument_node="">
</span><li data-dcnode-id="1110"><span data-dcnode-id="1120" instrument_node="">Forced perspective was used in the design of </span><em data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Hotel du Canada</span></em><span data-dcnode-id="1117" instrument_node="">. </span><em data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">The structure – which was </span></em><span data-dcnode-id="1114" instrument_node="">modeled after the </span><em data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Château Laurier</span></em><span data-dcnode-id="1111" instrument_node=""> hotel in Ottawa – stands at only 3 stories tall. However, Disney Imagineers added 5 stories of windows to make the hotel appear taller.</span></li><span data-dcnode-id="1109" instrument_node="">
</span></ul><span data-dcnode-id="1107" instrument_node="">
</span><ul data-dcnode-id="1099"><span data-dcnode-id="1106" instrument_node="">
</span><li data-dcnode-id="1101"><span data-dcnode-id="1105" instrument_node="">Of the three totem poles on display in the </span><em data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Canada Pavilion</span></em><span data-dcnode-id="1102" instrument_node="">, only one is genuine. The “real” totem pole is 30-feet tall and weighs 700-pounds. It was carved by a Tsimshian Indian named David Boxley and depicts a traditional story told amongst Northwest Coastal Indians. The other two totem poles are made of stacked fiberglass.</span></li><span data-dcnode-id="1100" instrument_node="">
</span></ul><span data-dcnode-id="1098" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1096"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-16 fusion_builder_column_3_4 3_4 fusion-three-fourth fusion-column-first" data-dcnode-id="1069" style="width:75%;width:calc(75% - ( ( 4% ) * 0.75 ) );margin-right: 4%;margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1070" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-14" data-dcnode-id="1072"><ul data-dcnode-id="1083"><span data-dcnode-id="1093" instrument_node="">
</span><li data-dcnode-id="1085"><span data-dcnode-id="1092" instrument_node="">Right before </span><em data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">IllumiNations: Reflections of Earth</span></em><span data-dcnode-id="1089" instrument_node=""> begins, a large rock near one of the Nikon picture spots does something peculiar. The top of the “rock” opens, and sound and lighting equipment for the </span><em data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">IllumiNations</span></em><span data-dcnode-id="1086" instrument_node=""> show appears. It’s quite a sight to behold!</span></li><span data-dcnode-id="1084" instrument_node="">
</span></ul><span data-dcnode-id="1082" instrument_node="">
</span><ul data-dcnode-id="1074"><span data-dcnode-id="1081" instrument_node="">
</span><li data-dcnode-id="1076"><span data-dcnode-id="1080" instrument_node="">The landscape in the </span><em data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Canada Pavilion</span></em><span data-dcnode-id="1077" instrument_node=""> changes with the seasons to simulate the seasons of Canada. White during winter, red and gold during autumn, and so on. And when the trees grow too tall, they are replaced with smaller ones.</span></li><span data-dcnode-id="1075" instrument_node="">
</span></ul><span data-dcnode-id="1073" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1071"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-17 fusion_builder_column_1_4 1_4 fusion-one-fourth fusion-column-last" data-dcnode-id="1064" style="width:25%;width:calc(25% - ( ( 4% ) * 0.25 ) );margin-top:10px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1065" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><span class="fusion-imageframe imageframe-none imageframe-4 hover-type-none" data-dcnode-id="1067"><img alt="Interesting things at Epcot" class="img-responsive wp-image-2715 lazyautosizes lazyloaded" data-dcnode-id="1068" data-orig-sizes="(max-width: 800px) 100vw, 200px" data-orig-src="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-09.jpg" data-sizes="auto" data-srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-09-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-09.jpg 348w" height="348" sizes="164px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-09.jpg&amp;raw" srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-09-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-09.jpg 348w" title="Interesting things at Epcot" width="348"></span><div class="fusion-clearfix" data-dcnode-id="1066"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-18 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="1048" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1049" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-15" data-dcnode-id="1051"><ul data-dcnode-id="1053"><span data-dcnode-id="1063" instrument_node="">
</span><li data-dcnode-id="1055"><span data-dcnode-id="1062" instrument_node="">While in Canada, stroll through the picturesque and tranquil </span><em data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Victoria Gardens</span></em><span data-dcnode-id="1059" instrument_node="">, a replica of </span><em data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Butchart Gardens</span></em><span data-dcnode-id="1056" instrument_node=""> in Vancouver. The serene waterfall was added to the gardens to mask the sounds of a noisy generator directly behind it.</span></li><span data-dcnode-id="1054" instrument_node="">
</span></ul><span data-dcnode-id="1052" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1050"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-19 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="1031" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1032" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-16" data-dcnode-id="1034"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="1045" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">China Pavilion Secrets</span></strong></h2><span data-dcnode-id="1044" instrument_node="">
</span><ul data-dcnode-id="1036"><span data-dcnode-id="1043" instrument_node="">
</span><li data-dcnode-id="1038"><span data-dcnode-id="1042" instrument_node="">The </span><em data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Temple of Heaven</span></em><span data-dcnode-id="1039" instrument_node=""> is a smaller-scale recreation of the original landmark in Beijing. If you speak while standing exactly in the middle of the building, you will hear your voice echo back to you. This is because the temple is “acoustically perfect.”</span></li><span data-dcnode-id="1037" instrument_node="">
</span></ul><span data-dcnode-id="1035" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1033"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-20 fusion_builder_column_3_4 3_4 fusion-three-fourth fusion-column-first" data-dcnode-id="1009" style="width:75%;width:calc(75% - ( ( 4% ) * 0.75 ) );margin-right: 4%;margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1010" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-17" data-dcnode-id="1012"><ul data-dcnode-id="1023"><span data-dcnode-id="1030" instrument_node="">
</span><li data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">If you purchase a souvenir fan at </span><em data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">China Pavilion</span></em><span data-dcnode-id="1026" instrument_node="">, a Cast Member will personalize it by writing your name in Chinese.</span></li><span data-dcnode-id="1024" instrument_node="">
</span></ul><span data-dcnode-id="1022" instrument_node="">
</span><ul data-dcnode-id="1014"><span data-dcnode-id="1021" instrument_node="">
</span><li data-dcnode-id="1016"><span data-dcnode-id="1020" instrument_node="">Wondering why the pathways in the </span><em data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">China Pavilion</span></em><span data-dcnode-id="1017" instrument_node=""> seem unusually narrow and chaotic? It’s because Imagineers designed them this way to simulate the crowded sidewalk experience of Chinese cities.</span></li><span data-dcnode-id="1015" instrument_node="">
</span></ul><span data-dcnode-id="1013" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="1011"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-21 fusion_builder_column_1_4 1_4 fusion-one-fourth fusion-column-last" data-dcnode-id="1004" style="width:25%;width:calc(25% - ( ( 4% ) * 0.25 ) );margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="1005" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><span class="fusion-imageframe imageframe-none imageframe-5 hover-type-none" data-dcnode-id="1007"><img alt="things to see at epcot" class="img-responsive wp-image-2708 lazyautosizes lazyloaded" data-dcnode-id="1008" data-orig-sizes="(max-width: 800px) 100vw, 200px" data-orig-src="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-02.jpg" data-sizes="auto" data-srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-02-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-02.jpg 348w" height="348" sizes="164px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-02.jpg&amp;raw" srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-02-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-02.jpg 348w" title="fan at epcot" width="348"></span><div class="fusion-clearfix" data-dcnode-id="1006"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-22 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="981" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="982" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-18" data-dcnode-id="984"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="1001" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">France Pavilion Secrets</span></strong></h2><span data-dcnode-id="1000" instrument_node="">
</span><ul data-dcnode-id="986"><span data-dcnode-id="999" instrument_node="">
</span><li data-dcnode-id="988"><span data-dcnode-id="998" instrument_node="">You may notice that the pavement becomes darker between </span><em data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">France </span></em><span data-dcnode-id="995" instrument_node="">and </span><em data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Morocco</span></em><span data-dcnode-id="992" instrument_node=""> </span><em data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Pavilions</span></em><span data-dcnode-id="989" instrument_node="">. This is meant to represent the Strait of Gibraltar, even though the actual strait lies between Morocco and Spain.</span></li><span data-dcnode-id="987" instrument_node="">
</span></ul><span data-dcnode-id="985" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="983"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-23 fusion_builder_column_3_4 3_4 fusion-three-fourth fusion-column-first" data-dcnode-id="959" style="width:75%;width:calc(75% - ( ( 4% ) * 0.75 ) );margin-right: 4%;margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="960" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-19" data-dcnode-id="962"><ul data-dcnode-id="973"><span data-dcnode-id="980" instrument_node="">
</span><li data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">The </span><em data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Eiffel Tower</span></em><span data-dcnode-id="976" instrument_node=""> is one of the only Epcot buildings which guests cannot access.</span></li><span data-dcnode-id="974" instrument_node="">
</span></ul><span data-dcnode-id="972" instrument_node="">
</span><ul data-dcnode-id="964"><span data-dcnode-id="971" instrument_node="">
</span><li data-dcnode-id="966"><span data-dcnode-id="970" instrument_node="">Imagineers designed the </span><em data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Eiffel Tower</span></em><span data-dcnode-id="967" instrument_node=""> to appear larger by making the bottom much wider than the top. They feared that birds perching on the tower would spoil the illusion of its height, so Imagineers installed natural bird deterrents to keep them away.</span></li><span data-dcnode-id="965" instrument_node="">
</span></ul><span data-dcnode-id="963" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="961"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-24 fusion_builder_column_1_4 1_4 fusion-one-fourth fusion-column-last" data-dcnode-id="954" style="width:25%;width:calc(25% - ( ( 4% ) * 0.25 ) );margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="955" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><span class="fusion-imageframe imageframe-none imageframe-6 hover-type-none" data-dcnode-id="957"><img alt="hidden epcot" class="img-responsive wp-image-2711 lazyautosizes lazyloaded" data-dcnode-id="958" data-orig-sizes="(max-width: 800px) 100vw, 200px" data-orig-src="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-05.jpg" data-sizes="auto" data-srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-05-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-05.jpg 348w" height="348" sizes="164px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-05.jpg&amp;raw" srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-05-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-05.jpg 348w" title="hidden epcot" width="348"></span><div class="fusion-clearfix" data-dcnode-id="956"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-25 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="916" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="917" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-20" data-dcnode-id="919"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="951" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Germany Pavilion Secrets</span></strong></h2><span data-dcnode-id="950" instrument_node="">
</span><ul data-dcnode-id="942"><span data-dcnode-id="949" instrument_node="">
</span><li data-dcnode-id="944"><span data-dcnode-id="948" instrument_node="">Like in other Disney World parks, there are Hidden Mickeys around every corner of Epcot. When you are in the </span><em data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Germany Pavilion</span></em><span data-dcnode-id="945" instrument_node="">, see if you can find the Hidden Mickeys inside the train set. (Hint: look towards the church and brown-colored castle)</span></li><span data-dcnode-id="943" instrument_node="">
</span></ul><span data-dcnode-id="941" instrument_node="">
</span><ul data-dcnode-id="933"><span data-dcnode-id="940" instrument_node="">
</span><li data-dcnode-id="935"><span data-dcnode-id="939" instrument_node="">If you happen to be in </span><em data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Germany</span></em><span data-dcnode-id="936" instrument_node=""> around the top of the hour, look for the clock tower towards the back of the courtyard. On the hour, a cute (wooden) boy and girl emerge to ring the bell as chimes fill the air!</span></li><span data-dcnode-id="934" instrument_node="">
</span></ul><span data-dcnode-id="932" instrument_node="">
</span><ul data-dcnode-id="921"><span data-dcnode-id="931" instrument_node="">
</span><li data-dcnode-id="923"><span data-dcnode-id="930" instrument_node="">Walk to the far back corner of the </span><em data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Germany Pavilion</span></em><span data-dcnode-id="927" instrument_node=""> and notice a wall covered by a mural. If you knock on it, you will hear a hollow sound. The area behind the wall was intended to be the entrance to the </span><em data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Rhine River Cruise</span></em><span data-dcnode-id="924" instrument_node=""> boat ride, but this attraction was never opened.</span></li><span data-dcnode-id="922" instrument_node="">
</span></ul><span data-dcnode-id="920" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="918"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-26 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="881" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="882" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-21" data-dcnode-id="884"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="913" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Italy Pavilion Secrets</span></strong></h2><span data-dcnode-id="912" instrument_node="">
</span><ul data-dcnode-id="904"><span data-dcnode-id="911" instrument_node="">
</span><li data-dcnode-id="906"><span data-dcnode-id="910" instrument_node="">If you head to the fountains behind the shops at </span><em data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Italy Pavilion</span></em><span data-dcnode-id="907" instrument_node="">, look for a set of small red buttons. Push them and watch as water sprays out from several different locations!</span></li><span data-dcnode-id="905" instrument_node="">
</span></ul><span data-dcnode-id="903" instrument_node="">
</span><ul data-dcnode-id="886"><span data-dcnode-id="902" instrument_node="">
</span><li data-dcnode-id="888"><span data-dcnode-id="901" instrument_node="">The </span><em data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Fontana de Nettuno –</span></em><span data-dcnode-id="898" instrument_node=""> in the central plaza known as the </span><em data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Plaza del Teatro</span></em><span data-dcnode-id="895" instrument_node=""> – was inspired by Gian Lorenzo Bernini’s </span><em data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Fountain of Trevi</span></em><span data-dcnode-id="892" instrument_node=""> in Rome. Neptune, the God of the Sea, boldly stands in the center of the fountain with his trident in hand. If the fountain looks familiar, you may have seen the original fountain featured in Federico Fellini’s classic film </span><em data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">La Dolce Vita</span></em><span data-dcnode-id="889" instrument_node="">.</span></li><span data-dcnode-id="887" instrument_node="">
</span></ul><span data-dcnode-id="885" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="883"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-27 fusion_builder_column_3_4 3_4 fusion-three-fourth fusion-column-first" data-dcnode-id="855" style="width:75%;width:calc(75% - ( ( 4% ) * 0.75 ) );margin-right: 4%;margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="856" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-22" data-dcnode-id="858"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="878" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Japan Pavilion Secrets</span></strong></h2><span data-dcnode-id="877" instrument_node="">
</span><ul data-dcnode-id="866"><span data-dcnode-id="876" instrument_node="">
</span><li data-dcnode-id="868"><span data-dcnode-id="875" instrument_node="">As you enter the </span><em data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Japan Pavilion</span></em><span data-dcnode-id="872" instrument_node="">, glance over to your right and note the statue. The government of Japan gifted this statue to Magic Kingdom when it first opened, but it was later moved to Epcot when the </span><em data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Japan Pavilion</span></em><span data-dcnode-id="869" instrument_node=""> was built.</span></li><span data-dcnode-id="867" instrument_node="">
</span></ul><span data-dcnode-id="865" instrument_node="">
</span><ul data-dcnode-id="860"><span data-dcnode-id="864" instrument_node="">
</span><li data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">The Japanese pagoda has five stories. Each story represents an element from which Buddhists believe all things in the universe are created. In ascending order, they are earth, water, fire, wind, and sky.</span></li><span data-dcnode-id="861" instrument_node="">
</span></ul><span data-dcnode-id="859" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="857"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-28 fusion_builder_column_1_4 1_4 fusion-one-fourth fusion-column-last" data-dcnode-id="850" style="width:25%;width:calc(25% - ( ( 4% ) * 0.25 ) );margin-top:70px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="851" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><span class="fusion-imageframe imageframe-none imageframe-7 hover-type-none" data-dcnode-id="853"><img alt="Epcot facts" class="img-responsive wp-image-2737 lazyautosizes lazyloaded" data-dcnode-id="854" data-orig-sizes="(max-width: 800px) 100vw, 200px" data-orig-src="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-13.jpg" data-sizes="auto" data-srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-13-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-13.jpg 347w" height="347" sizes="164px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-13.jpg&amp;raw" srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-13-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-13.jpg 347w" title="Epcot facts" width="347"></span><div class="fusion-clearfix" data-dcnode-id="852"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-29 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="757" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="758" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-23" data-dcnode-id="760"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="847" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Mexico Pavilion Secrets</span></strong></h2><span data-dcnode-id="846" instrument_node="">
</span><ul data-dcnode-id="841"><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">The pyramid in Mexico didn’t always have those fabulous relief carvings adorning its sides. These were added after Disney Cast Members noticed kids really liked to climb the steps!</span></li><span data-dcnode-id="842" instrument_node="">
</span></ul><span data-dcnode-id="840" instrument_node="">
</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="837" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Morocco Pavilion Secrets</span></strong></h2><span data-dcnode-id="836" instrument_node="">
</span><ul data-dcnode-id="825"><span data-dcnode-id="835" instrument_node="">
</span><li data-dcnode-id="827"><span data-dcnode-id="834" instrument_node="">The King of Morocco was so excited when his country was asked to join Epcot’s </span><em data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">World Showcase</span></em><span data-dcnode-id="831" instrument_node=""> that he sent his own men to construct the area, free of charge. To this day, the King sends craftsmen to repair and make improvements to the </span><em data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Morocco Pavilion</span></em><span data-dcnode-id="828" instrument_node="">, still free of charge.</span></li><span data-dcnode-id="826" instrument_node="">
</span></ul><span data-dcnode-id="824" instrument_node="">
</span><ul data-dcnode-id="816"><span data-dcnode-id="823" instrument_node="">
</span><li data-dcnode-id="818"><span data-dcnode-id="822" instrument_node="">All the tiles and carvings in the </span><em data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Morocco Pavilion</span></em><span data-dcnode-id="819" instrument_node=""> were handmade. Each mosaic has at least one flawed tile in its design. Since religious belief dictates that only Allah can create something that is “perfect,” Moroccan artisans intentionally added flawed features to make the tiles imperfect.</span></li><span data-dcnode-id="817" instrument_node="">
</span></ul><span data-dcnode-id="815" instrument_node="">
</span><ul data-dcnode-id="798"><span data-dcnode-id="814" instrument_node="">
</span><li data-dcnode-id="800"><span data-dcnode-id="813" instrument_node="">As other pavilions in </span><em data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">World Showcase</span></em><span data-dcnode-id="810" instrument_node=""> light up as part of the </span><em data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">IllumiNations</span></em><span data-dcnode-id="807" instrument_node=""> show, the temple in the </span><em data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Morocco</span></em><span data-dcnode-id="804" instrument_node=""> </span><em data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Pavilion </span></em><span data-dcnode-id="801" instrument_node="">stays dark so as to not violate their religious beliefs.</span></li><span data-dcnode-id="799" instrument_node="">
</span></ul><span data-dcnode-id="797" instrument_node="">
</span><ul data-dcnode-id="783"><span data-dcnode-id="796" instrument_node="">
</span><li data-dcnode-id="785"><span data-dcnode-id="795" instrument_node="">The back side of Hollywood Studio’s attraction </span><em data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Twilight Zone Tower of Terror</span></em><span data-dcnode-id="792" instrument_node=""> is extremely visible when you are in </span><em data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Morocco</span></em><span data-dcnode-id="789" instrument_node="">. Imagineers didn’t want this structure to interfere with guest’s Epcot experience, so they decorated the back side of the building to blend in perfectly with the scenery of the </span><em data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Morocco Pavilion</span></em><span data-dcnode-id="786" instrument_node="">.</span></li><span data-dcnode-id="784" instrument_node="">
</span></ul><span data-dcnode-id="782" instrument_node="">
</span><ul data-dcnode-id="771"><span data-dcnode-id="781" instrument_node="">
</span><li data-dcnode-id="773"><span data-dcnode-id="780" instrument_node="">The museum in the </span><em data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Morocco Pavilion</span></em><span data-dcnode-id="777" instrument_node=""> isn’t necessarily a secret, but many guests miss it entirely. Hidden behind an ornately tiled doorway, the little museum – known as the </span><em data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Gallery of Arts and History</span></em><span data-dcnode-id="774" instrument_node=""> – exhibits a variety of wonderful art and artifacts from Morocco.</span></li><span data-dcnode-id="772" instrument_node="">
</span></ul><span data-dcnode-id="770" instrument_node="">
</span><ul data-dcnode-id="762"><span data-dcnode-id="769" instrument_node="">
</span><li data-dcnode-id="764"><span data-dcnode-id="768" instrument_node="">To learn more secret facts and discover hidden spots, take the 20-minute guided tour of the </span><em data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Morocco Pavilion</span></em><span data-dcnode-id="765" instrument_node="">. It’s informative, fun, and free!</span></li><span data-dcnode-id="763" instrument_node="">
</span></ul><span data-dcnode-id="761" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="759"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-30 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="740" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="741" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-24" data-dcnode-id="743"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="754" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Norway – Epcot Secrets</span></strong></h2><span data-dcnode-id="753" instrument_node="">
</span><ul data-dcnode-id="745"><span data-dcnode-id="752" instrument_node="">
</span><li data-dcnode-id="747"><span data-dcnode-id="751" instrument_node="">There is a museum inside </span><em data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Stave Church</span></em><span data-dcnode-id="748" instrument_node="">. Hidden behind two imposing wooden doors and a red Viking sign, the museum houses a variety of Norwegian artifacts, including an authentic Viking sword dating back over 1,000 years!</span></li><span data-dcnode-id="746" instrument_node="">
</span></ul><span data-dcnode-id="744" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="742"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-31 fusion_builder_column_3_4 3_4 fusion-three-fourth fusion-column-first" data-dcnode-id="727" style="width:75%;width:calc(75% - ( ( 4% ) * 0.75 ) );margin-right: 4%;margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="728" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-25" data-dcnode-id="730"><ul data-dcnode-id="732"><span data-dcnode-id="739" instrument_node="">
</span><li data-dcnode-id="734"><span data-dcnode-id="738" instrument_node="">Not only does </span><em data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Kringla Bakeri Og Kafe</span></em><span data-dcnode-id="735" instrument_node=""> have great pretzels and pastries, but the café also has real grass growing on its roof! Cast Members hop onto the roof when the grass needs trimming (they use clippers, not goats or lawnmowers). If you look closely, you may be able to spot the hidden sprinkler system.</span></li><span data-dcnode-id="733" instrument_node="">
</span></ul><span data-dcnode-id="731" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="729"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-32 fusion_builder_column_1_4 1_4 fusion-one-fourth fusion-column-last" data-dcnode-id="722" style="width:25%;width:calc(25% - ( ( 4% ) * 0.25 ) );margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="723" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><span class="fusion-imageframe imageframe-none imageframe-8 hover-type-none" data-dcnode-id="725"><img alt="epcot secrets disney world" class="img-responsive wp-image-2716 lazyautosizes lazyloaded" data-dcnode-id="726" data-orig-sizes="(max-width: 800px) 100vw, 200px" data-orig-src="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-10.jpg" data-sizes="auto" data-srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-10-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-10.jpg 348w" height="348" sizes="164px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-10.jpg&amp;raw" srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-10-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-10.jpg 348w" title="epcot secrets" width="348"></span><div class="fusion-clearfix" data-dcnode-id="724"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-33 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="693" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="694" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-26" data-dcnode-id="696"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="719" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">United Kingdom – Epcot Secrets</span></strong></h2><span data-dcnode-id="718" instrument_node="">
</span><ul data-dcnode-id="707"><span data-dcnode-id="717" instrument_node="">
</span><li data-dcnode-id="709"><span data-dcnode-id="716" instrument_node="">The small bridge that crosses between the </span><em data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">UK</span></em><span data-dcnode-id="713" instrument_node=""> and </span><em data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">France Pavilions</span></em><span data-dcnode-id="710" instrument_node=""> represents crossing the English Channel.</span></li><span data-dcnode-id="708" instrument_node="">
</span></ul><span data-dcnode-id="706" instrument_node="">
</span><ul data-dcnode-id="698"><span data-dcnode-id="705" instrument_node="">
</span><li data-dcnode-id="700"><span data-dcnode-id="704" instrument_node="">The tops of the chimneys in the </span><em data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">United Kingdom Pavilion</span></em><span data-dcnode-id="701" instrument_node=""> were painted black to look like soot from working chimneys.</span></li><span data-dcnode-id="699" instrument_node="">
</span></ul><span data-dcnode-id="697" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="695"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-34 fusion_builder_column_3_4 3_4 fusion-three-fourth fusion-column-first" data-dcnode-id="668" style="width:75%;width:calc(75% - ( ( 4% ) * 0.75 ) );margin-right: 4%;margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="669" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-27" data-dcnode-id="671"><ul data-dcnode-id="685"><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="687"><span data-dcnode-id="691" instrument_node="">Disney Imagineers came up with the name “</span><em data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Rose &amp; Crown Pub”</span></em><span data-dcnode-id="688" instrument_node=""> after their research found that the words “Rose” and “Crown” were the two most common words used to name pubs in the UK. They combined these words to name this popular Epcot pub.</span></li><span data-dcnode-id="686" instrument_node="">
</span></ul><span data-dcnode-id="684" instrument_node="">
</span><ul data-dcnode-id="673"><span data-dcnode-id="683" instrument_node="">
</span><li data-dcnode-id="675"><span data-dcnode-id="682" instrument_node="">There is a great little park – modeled after </span><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.royalparks.org.uk/parks/hyde-park"><span data-dcnode-id="681" instrument_node="">Hyde Park</span></a><span data-dcnode-id="679" instrument_node=""> in London – behind the shops and restaurants of the </span><em data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">UK Pavilion</span></em><span data-dcnode-id="676" instrument_node="">. Most people don’t even notice this area, but worth taking the time to explore.&nbsp; There is even a real hedge maze!</span></li><span data-dcnode-id="674" instrument_node="">
</span></ul><span data-dcnode-id="672" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="670"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-35 fusion_builder_column_1_4 1_4 fusion-one-fourth fusion-column-last" data-dcnode-id="663" style="width:25%;width:calc(25% - ( ( 4% ) * 0.25 ) );margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="664" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><span class="fusion-imageframe imageframe-none imageframe-9 hover-type-none" data-dcnode-id="666"><img alt="rose and crown pub epcot" class="img-responsive wp-image-2714 lazyautosizes lazyloaded" data-dcnode-id="667" data-orig-sizes="(max-width: 800px) 100vw, 200px" data-orig-src="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-08.jpg" data-sizes="auto" data-srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-08-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-08.jpg 348w" height="348" sizes="164px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-08.jpg&amp;raw" srcset="https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-08-200x200.jpg 200w, https://i0.wp.com/magicguides.com/wp-content/uploads/2017/05/Epcot-Secrets-08.jpg 348w" title="rose and crown pub epcot" width="348"></span><div class="fusion-clearfix" data-dcnode-id="665"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-36 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="635" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="636" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-28" data-dcnode-id="638"><ul data-dcnode-id="652"><span data-dcnode-id="662" instrument_node="">
</span><li data-dcnode-id="654"><span data-dcnode-id="661" instrument_node="">Notice the architecture in the row of shops on the right side of the </span><em data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">United Kingdom Pavilion</span></em><span data-dcnode-id="658" instrument_node="">. These buildings were constructed to represent different time periods in UK history. The first shop – the </span><em data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Tea Caddy </span></em><span data-dcnode-id="655" instrument_node="">– features a thatched roof, low ceilings, hearth, and dark lighting, all typical of the 1600s. The second shop – with its higher ceilings and simple wrought iron lighting fixtures – represents the 1700’s. The third building was constructed in typical 1800’s neoclassical fashion, with ornate windows and lighting.</span></li><span data-dcnode-id="653" instrument_node="">
</span></ul><span data-dcnode-id="651" instrument_node="">
</span><ul data-dcnode-id="640"><span data-dcnode-id="650" instrument_node="">
</span><li data-dcnode-id="642"><span data-dcnode-id="649" instrument_node="">The </span><em data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">HRC</span></em><span data-dcnode-id="646" instrument_node=""> (Historic Research Section) is an area inside the </span><em data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">United Kingdom Pavilion</span></em><span data-dcnode-id="643" instrument_node=""> where Cast Members help you research information about your family history. You can even get your family crest printed as a souvenir.</span></li><span data-dcnode-id="641" instrument_node="">
</span></ul><span data-dcnode-id="639" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="637"></div></div></div></div></div><div class="fusion-fullwidth fullwidth-box fusion-builder-row-3 nonhundred-percent-fullwidth non-hundred-percent-height-scrolling" data-dcnode-id="381" style="background-color: rgba(255,255,255,0);background-position: center center;background-repeat: no-repeat;padding-top:0px;padding-right:0px;padding-bottom:0px;padding-left:0px;margin-bottom: 0px;margin-top: 0px;border-width: 0px 0px 0px 0px;border-color:#eae9e9;border-style:solid;"><div class="fusion-builder-row fusion-row" data-dcnode-id="382"><div class="fusion-layout-column fusion_builder_column fusion-builder-column-37 fusion_builder_column_1_1 1_1 fusion-one-full fusion-column-first fusion-column-last" data-dcnode-id="623" style="margin-top:45px;margin-bottom:15px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="624" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;background-color:#8e8e8e;padding: 15px 0px 15px 10px;"><div class="fusion-text fusion-text-29" data-dcnode-id="626"><h1 class="fusion-responsive-typography-calculated" data-dcnode-id="628" data-fontsize="34" data-lineheight="47.6px" style="text-align: center; --fontSize:34; line-height: 1.4;"><strong data-dcnode-id="629"><span data-dcnode-id="630" style="color: #ffffff;"><em data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Future World – Epcot Secrets</span></em></span></strong></h1><span data-dcnode-id="627" instrument_node="">
</span></div><div class="fusion-clearfix" data-dcnode-id="625"></div></div></div><div class="fusion-layout-column fusion_builder_column fusion-builder-column-38 fusion_builder_column_3_4 3_4 fusion-three-fourth fusion-column-first" data-dcnode-id="592" style="width:75%;width:calc(75% - ( ( 4% ) * 0.75 ) );margin-right: 4%;margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper fusion-flex-column-wrapper-legacy" data-dcnode-id="593" style="background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;padding: 0px 0px 0px 0px;"><div class="fusion-text fusion-text-30" data-dcnode-id="595"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="620" data-fontsize="30" data-lineheight="45px" style="--fontSize:30; line-height: 1.5;"><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Club Cool Secrets</span></strong></h2><span data-dcnode-id="619" instrument_node="">
</span><ul data-dcnode-id="597"><span data-dcnode-id="618" instrument_node="">
</span><li data-dcnode-id="599"><em data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Club Cool</span></em><span data-dcnode-id="615" instrument_node=""> is located behind the Starbucks near </span><em data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Innovations West</span></em><span data-dcnode-id="612" instrument_node="">. This attraction allows guests to sample different varieties of Coca-Cola sodas from around the world. Try the melon-flavored </span><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fanta"><em data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Fanta Melon Frosty</span></em></a><span data-dcnode-id="608" instrument_node=""> from Thailand, the bubblegum-flavored </span><em data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Inca Cola</span></em><span data-dcnode-id="605" instrument_node=""> from Peru, or the bitter </span><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beverly_%28drink%29"><em data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Beverly</span></em><span data-dcnode-id="602" instrument_node=""> cola</span></a><span data-dcnode-id="600" instrument_node=""> from Italy (beware!), to name a few. All the samples are free of charge!</span></li><span data-dcnode-id="598" instrument_node="">
</span></ul><span data-dcnode-id="596" instrument_node="">
