-level-3" data-dcnode-id="1452"><a class="ez-toc-link ez-toc-heading-15" data-dcnode-id="1453" href="#Petrin_Tower" title="Petřín Tower"><span data-dcnode-id="1454" instrument_node="">Petřín Tower</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1449"><a class="ez-toc-link ez-toc-heading-16" data-dcnode-id="1450" href="#Petrin_Hill" title="Petřín Hill"><span data-dcnode-id="1451" instrument_node="">Petřín Hill</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1446"><a class="ez-toc-link ez-toc-heading-17" data-dcnode-id="1447" href="#Vrtba_Garden" title="Vrtba Garden"><span data-dcnode-id="1448" instrument_node="">Vrtba Garden</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1443"><a class="ez-toc-link ez-toc-heading-18" data-dcnode-id="1444" href="#Strelecky_Island" title="Střelecký Island"><span data-dcnode-id="1445" instrument_node="">Střelecký Island</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1440"><a class="ez-toc-link ez-toc-heading-19" data-dcnode-id="1441" href="#Decayed_Human_Arm_in_St_James_Church" title="Decayed Human Arm in St. James Church"><span data-dcnode-id="1442" instrument_node="">Decayed Human Arm in St. James Church</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1437"><a class="ez-toc-link ez-toc-heading-20" data-dcnode-id="1438" href="#Royal_Garden" title="Royal Garden"><span data-dcnode-id="1439" instrument_node="">Royal Garden</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1434"><a class="ez-toc-link ez-toc-heading-21" data-dcnode-id="1435" href="#Lennon_Wall_possibly_a_hidden_gem_in_Prague" title="Lennon Wall (possibly a hidden gem in Prague?)"><span data-dcnode-id="1436" instrument_node="">Lennon Wall (possibly a hidden gem in Prague?)</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1431"><a class="ez-toc-link ez-toc-heading-22" data-dcnode-id="1432" href="#Vajanovy_Sady" title="Vajanovy Sady"><span data-dcnode-id="1433" instrument_node="">Vajanovy Sady</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1428"><a class="ez-toc-link ez-toc-heading-23" data-dcnode-id="1429" href="#Airship_Gulliver" title="Airship Gulliver"><span data-dcnode-id="1430" instrument_node="">Airship Gulliver</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1425"><a class="ez-toc-link ez-toc-heading-24" data-dcnode-id="1426" href="#Gardens_Below_the_Prague_Castle_a_true_Hidden_gem_in_Prague" title="Gardens Below the Prague Castle (a true Hidden gem in Prague)"><span data-dcnode-id="1427" instrument_node="">Gardens Below the Prague Castle (a true Hidden gem in Prague)</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1422"><a class="ez-toc-link ez-toc-heading-25" data-dcnode-id="1423" href="#Havlicek_Gardens" title="Havlíček Gardens"><span data-dcnode-id="1424" instrument_node="">Havlíček Gardens</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1419"><a class="ez-toc-link ez-toc-heading-26" data-dcnode-id="1420" href="#Go_to_a_Puppet_Show_in_Prague" title="Go to a Puppet Show in Prague"><span data-dcnode-id="1421" instrument_node="">Go to a Puppet Show in Prague</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1416"><a class="ez-toc-link ez-toc-heading-27" data-dcnode-id="1417" href="#The_Dead_Horse_Upside_Down" title="The Dead Horse: Upside Down"><span data-dcnode-id="1418" instrument_node="">The Dead Horse: Upside Down</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1413"><a class="ez-toc-link ez-toc-heading-28" data-dcnode-id="1414" href="#Franciscan_Gardens" title="Franciscan Gardens"><span data-dcnode-id="1415" instrument_node="">Franciscan Gardens</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1410"><a class="ez-toc-link ez-toc-heading-29" data-dcnode-id="1411" href="#Communism_Museum" title="Communism Museum"><span data-dcnode-id="1412" instrument_node="">Communism Museum</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1405"><a class="ez-toc-link ez-toc-heading-30" data-dcnode-id="1406" href="#What_to_Eat_in_Prague" title="What to Eat in Prague?"><span data-dcnode-id="1407" instrument_node="">What to Eat in Prague?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1402"><a class="ez-toc-link ez-toc-heading-31" data-dcnode-id="1403" href="#Where_to_Stay_in_Prague" title="Where to Stay in Prague?"><span data-dcnode-id="1404" instrument_node="">Where to Stay in Prague?</span></a></li></ul></nav></div><span data-dcnode-id="1398" instrument_node="">
</span><h2 data-dcnode-id="1394"><span class="ez-toc-section" data-dcnode-id="1397" id="Hidden_Gems_in_Prague"></span><span data-dcnode-id="1396" instrument_node="">Hidden Gems in Prague</span><span class="ez-toc-section-end" data-dcnode-id="1395"></span></h2><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">We have visited the Charles Bridge and barely been able to walk across it! We needed to shuffle – very NOT cool.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">We are not saying to NOT visit the iconic locations in Prague, many of these are what makes Prague so special after all but we love discovering secret places during our travels, hidden gems that are not overcrowded – this is part of the magic of travel for us.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Therefore, with no further adieu, here are our favourite hidden gems in Prague.</span></p><span data-dcnode-id="1384" instrument_node="">
</span><h3 data-dcnode-id="1380"><span class="ez-toc-section" data-dcnode-id="1383" id="Wallenstein_Garden"></span><span data-dcnode-id="1382" instrument_node="">Wallenstein Garden</span><span class="ez-toc-section-end" data-dcnode-id="1381"></span></h3><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">In Letenská in Malá Strana in Prague, the Wallenstein Garden is home to a beautiful large lake and Baroque-styled statues.</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">We went to photograph the Charles Bridge early morning, it was absolutely filled with tourists so we decided to shoot at the Wallenstein Garden instead. No-one was around. Yippee!!</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">This amazing garden was made alongside the Wallenstein Castle from 1623-1629.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Ambling in the garden is pleasurable while watching birds flying about. Look out for white and blue Peacocks with all their feathers out. They are soooo beautiful!!</span></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">&nbsp;Concerts and theatrical performances often play in&nbsp;summer in the garden.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">The entrance is completely free so it is definitely worth a visit.</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">It is open from&nbsp;Monday to Friday from 7:30am–6:00pm. Saturday and Sunday from 10:30am-6:00pm.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1354"><img alt="hidden-gems-prague-Wallenstein-arden" class="alignnone size-full wp-image-34562 lazyloaded" data-dcnode-id="1357" data-sizes="(max-width: 486px) 100vw, 486px" data-src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-Wallenstein-arden.jpg" data-srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-Wallenstein-arden.jpg 486w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-Wallenstein-arden-240x300.jpg 240w" height="608" sizes="(max-width: 486px) 100vw, 486px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-Wallenstein-arden.jpg&amp;raw" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-Wallenstein-arden.jpg 486w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-Wallenstein-arden-240x300.jpg 240w" width="486"><noscript data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">&lt;img class="alignnone size-full wp-image-34562" src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-Wallenstein-arden.jpg" alt="hidden-gems-prague-Wallenstein-arden" width="486" height="608" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-Wallenstein-arden.jpg 486w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-Wallenstein-arden-240x300.jpg 240w" sizes="(max-width: 486px) 100vw, 486px" /&gt;</span></noscript></p><span data-dcnode-id="1353" instrument_node="">
</span><h3 data-dcnode-id="1349"><span class="ez-toc-section" data-dcnode-id="1352" id="Colloredo-Mansfeld_Palace"></span><span data-dcnode-id="1351" instrument_node="">Colloredo-Mansfeld Palace</span><span class="ez-toc-section-end" data-dcnode-id="1350"></span></h3><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Huddled in Karlova, this palace also goes by the name, Galerie hlavniho Mesta Prahy.</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">This stunning palace standings in the Knights of the Cross Square.</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Originally, it was built in Roman and Gothic style. In 1735, Prince Heinrich Paul von Mansfeld-Fondi bought the Palace and restored it in Baroque style.</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">The four gigantic wings create a rectangular courtyard. Situated inside its walls is a beautiful fountain with a Neptune Statue made of sandstone.</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">What we love is that everything inside is well preserved&nbsp;from the statues to the wallpaper; the interior of every part of the magnificent Palace is original.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">The most beautiful part of the palace is the Piano Nobile – the Dance Hall – which is decorated by paintings illustrating Olympic gods.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">If you’re in Prague, you simply have to visit this divine Palace. You can either take a tour guide with you or self explore.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">It is important to note that the Palace is closed on Mondays. From Tuesday to Sunday it is open from 10:00am–6:00pm.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">There is an admission fee of 60 CZK ($2.50 USD) to enter.</span></p><span data-dcnode-id="1321" instrument_node="">
</span><h3 data-dcnode-id="1317"><span class="ez-toc-section" data-dcnode-id="1320" id="Thunovska_Street"></span><span data-dcnode-id="1319" instrument_node="">Thunovská Street</span><span class="ez-toc-section-end" data-dcnode-id="1318"></span></h3><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Thunovská Street, aka the yellow street in Prague,</span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">You will be happy to know that Thunovská Street is located in Malá Strana in the heart of Prague.</span></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">The street got its&nbsp; name from the Thunovský Palace, which nowadays serves as the office of the British Embassy.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">There are also some popular attractions around the street such as the&nbsp;&nbsp;Prague Castle and the St. Vitus Cathedral.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">There is an eerie legend associated with this street. It is said the ghost of Salieri – an Italian Composer haunts the street.</span></p><span data-dcnode-id="1301" instrument_node="">
</span><h3 data-dcnode-id="1297"><span class="ez-toc-section" data-dcnode-id="1300" id="Absinthe_Bar"></span><span data-dcnode-id="1299" instrument_node="">Absinthe Bar</span><span class="ez-toc-section-end" data-dcnode-id="1298"></span></h3><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">One thing that Mike was desperate to do while in Prague was to visit an Absinthe Bar – the traditional drink of Prague.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">As it is a traditional drink Prague has a ton of absinthe bars and shops. Astoundingly, they serve absinthe cocktails, absinthe coffee, absinthe ice-cream and even absinthe soap. Who knew alcohol could be used to make soap?</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">You can even find delicious absinthe at the Green Devil’s Absinth Bar &amp; Shop in Old Town. The atmosphere is distinctive with all the green decorations and the staff is helpful.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">The absinthe menu includes absinthe creams, absinthe cocktails and drinks. Your experience there will be as eccentric as the place itself.</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">The bar is open from 12:00pm-1:00am daily.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1277"><img alt="Absinthe-Bar-hidden-gem-prague" class="alignnone size-full wp-image-34563 lazyloaded" data-dcnode-id="1280" data-sizes="(max-width: 911px) 100vw, 911px" data-src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague.jpg" data-srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague.jpg 911w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague-600x400.jpg 600w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague-300x200.jpg 300w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague-768x513.jpg 768w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague-735x491.jpg 735w" height="608" sizes="(max-width: 911px) 100vw, 911px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague.jpg&amp;raw" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague.jpg 911w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague-600x400.jpg 600w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague-300x200.jpg 300w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague-768x513.jpg 768w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague-735x491.jpg 735w" width="911"><noscript data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">&lt;img class="alignnone size-full wp-image-34563" src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague.jpg" alt="Absinthe-Bar-hidden-gem-prague" width="911" height="608" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague.jpg 911w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague-600x400.jpg 600w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague-300x200.jpg 300w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague-768x513.jpg 768w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Absinthe-Bar-hidden-gem-prague-735x491.jpg 735w" sizes="(max-width: 911px) 100vw, 911px" /&gt;</span></noscript></p><span data-dcnode-id="1276" instrument_node="">
</span><h3 data-dcnode-id="1272"><span class="ez-toc-section" data-dcnode-id="1275" id="Loreta"></span><span data-dcnode-id="1274" instrument_node="">Loreta</span><span class="ez-toc-section-end" data-dcnode-id="1273"></span></h3><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Loreta is a monastery in the Hradčany district in Prague.</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">This Baroque pilgrimage site has stood for almost 400 years, welcoming pilgrims and tourists to its grand interior.</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Inside the monastery you will find chapels like the Nativity of Our Lord and Our Lady of Sorrows. You will also find stunning walkways and gardens</span></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Loreta also has a tower with a&nbsp;bell carillon of 27 bells that carols the Marian song, “A Thousand Times We Greet Thee.”</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">In the amazing treasury on the first floor you can admire the Prague Sun – adorned with 6222 diamonds. Built in 1626, it was designed by Giovanni Orsi, an Italian architect.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">It is open from 1st April to 31st October from 9:00am-5:00pm and from 1st November to 31st March from 9:30am-4:00pm.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">There is an entrance fee is 150Kč per adult and children from 6-15 get a reduced fair of 80Kč.&nbsp;Family ticket (2 adults plus kids under 15) 310Kč.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><h3 data-dcnode-id="1246"><span class="ez-toc-section" data-dcnode-id="1249" id="Swan_Feeding_Spot_Near_Charles_Bridge"></span><span data-dcnode-id="1248" instrument_node="">‘Swan Feeding Spot’ Near Charles Bridge</span><span class="ez-toc-section-end" data-dcnode-id="1247"></span></h3><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Near the Charles bridge, there is a stunning spot where you can feed swans. It is also great for photography.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">From the Bridge to Mala Strana and turn right.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1235"><img alt="hidden-gems-prague" class="alignnone size-full wp-image-34565 lazyloaded" data-dcnode-id="1238" data-sizes="(max-width: 486px) 100vw, 486px" data-src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague.jpg" data-srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague.jpg 486w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-240x300.jpg 240w" height="608" sizes="(max-width: 486px) 100vw, 486px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague.jpg&amp;raw" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague.jpg 486w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-240x300.jpg 240w" width="486"><noscript data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">&lt;img class="alignnone size-full wp-image-34565" src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague.jpg" alt="hidden-gems-prague" width="486" height="608" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague.jpg 486w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-240x300.jpg 240w" sizes="(max-width: 486px) 100vw, 486px" /&gt;</span></noscript></p><span data-dcnode-id="1234" instrument_node="">
</span><h3 data-dcnode-id="1230"><span class="ez-toc-section" data-dcnode-id="1233" id="Cernin_Garden"></span><span data-dcnode-id="1232" instrument_node="">Černín Garden</span><span class="ez-toc-section-end" data-dcnode-id="1231"></span></h3><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Christened as Černínská Zahrada, this garden is another hidden attraction in Loreta Square.</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">This beautiful terrace garden was sketched by the architect Francesco Caratti in the 17th Century.</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Originally in the Baroque-style, it was later altered by Domenico Rossi.</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">The garden has two levels with a summer house, Sala Terrena and a Hercules statue.</span></p><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">The larger pool is located on the upper level while the smaller of the two pools flows from the upper to the lower level.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">In total, there are four&nbsp;alluring gardens. Nowadays, the “Ministry of Foreign Affairs” utilizes the garden for their uses.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">The garden is open on Saturday and Sunday from May to September from 10:00am-5:00pm.</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">You will be happy to know that it is free to enter!</span></p><span data-dcnode-id="1205" instrument_node="">
</span><h3 data-dcnode-id="1201"><span class="ez-toc-section" data-dcnode-id="1204" id="Vystaviste_Praha"></span><span data-dcnode-id="1203" instrument_node="">Výstaviště Praha</span><span class="ez-toc-section-end" data-dcnode-id="1202"></span></h3><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Výstaviště is an exhibition ground nestled close to the metro station on the Metro line C Nádraží Holešovice and the Stromovka Park in Prague.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">The grounds are formed by various building, the prominent one being the Industrial Palace. Other areas are the Křižík’s Light fountain, World of the Oceans aquarium and the Lapidarium of the National Museum.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Every spring, St. Matthew’s Fair takes place in the Amusement park in the northern end of the ground. A vast variety of cultural and entertainment events, 50+ exhibition projects and trade fairs are arranged in this place. All of the displays are creative and showcase the Czech culture and traditions.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">If you want to experience the true Praguian culture and architecture, then drop by this spot, a true hidden gem.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><h3 data-dcnode-id="1184"><span class="ez-toc-section" data-dcnode-id="1187" id="Sex_Machine_Museum"></span><span data-dcnode-id="1186" instrument_node="">Sex Machine Museum</span><span class="ez-toc-section-end" data-dcnode-id="1185"></span></h3><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">In 2002, a sex Machine Museum was established in Old Town in Prague.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">It features a lot of sex devices used since ancient times up to modern day toys.</span></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Being in a sex museum is an interesting experience and it’s informative to say the least; you get know about various unusal devices.</span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Inside the museum, you will discover the culture of sex and traditional vintage devices and accessories. Some devices have a story behind them while others are just plain scary!</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">It’s a quirky place with its erotic instruments and sex history lesson. If you’re fascinated by that kind of thing, then drop by the museum.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">It is open from 10:00am-11:00pm daily. There is an entrance fee of&nbsp;250Kč per adult to enter.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">If you are planning a trip to Prague make sure you not only visit the well known tourist attractions such as the Prague Castle but also include some of the hidden gems above in your itinerary.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1158"><img alt="hidden-gems-prague-sex-museum" class="alignnone size-full wp-image-34566 lazyload" data-dcnode-id="1161" data-sizes="(max-width: 406px) 100vw, 406px" data-src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-sex-museum_.jpg" data-srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-sex-museum_.jpg 406w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-sex-museum_-200x300.jpg 200w" height="608" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="406"><noscript data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">&lt;img class="alignnone size-full wp-image-34566" src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-sex-museum_.jpg" alt="hidden-gems-prague-sex-museum" width="406" height="608" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-sex-museum_.jpg 406w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-sex-museum_-200x300.jpg 200w" sizes="(max-width: 406px) 100vw, 406px" /&gt;</span></noscript></p><span data-dcnode-id="1157" instrument_node="">
</span><h3 data-dcnode-id="1153"><span class="ez-toc-section" data-dcnode-id="1156" id="Lyckovo_Namesti"></span><span data-dcnode-id="1155" instrument_node="">Lyčkovo Náměstí</span><span class="ez-toc-section-end" data-dcnode-id="1154"></span></h3><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">The Lyčkovo Square features an Art Nouveau Primary School and a lovely park.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Situated near both the Kaizlovy Sady and the Baroque Invalidovna building, the square is not that hard to spot.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Constructed in 1904, the building of the school is an architectural gem. Painted in beige with the roof being brick red, the building has a simple black and white clock above the entrance.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">The Art Nouveau style was planned by the architect Josef Sakař.&nbsp;</span></p><span data-dcnode-id="1140" instrument_node="">
</span><h3 data-dcnode-id="1136"><span class="ez-toc-section" data-dcnode-id="1139" id="Statue_of_the_Brown_noser"></span><span data-dcnode-id="1138" instrument_node="">Statue of the Brown noser</span><span class="ez-toc-section-end" data-dcnode-id="1137"></span></h3><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">This is truely one of the funniest things we have ever seen.</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">It’s a sculpture crafted by the visual artist David Černý. He created the ‘work of art’ in 2003.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">The massive lower halves of two bodies are leaning against the side of the building with a large hole at the junction of the legs.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Viewer are encouraged to climb a ladder and stick their head inside the anus.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Surprisingly, inside the hole is a television showing President Václav Klaus and Artist Milan Knížák feeding each other human waste as the Queen’s utters, “We are champions.”</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Want to see this weird statue? Then, visit the back garden of the Art Museum Futura at 49 Holečkova.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><h3 data-dcnode-id="1113"><span class="ez-toc-section" data-dcnode-id="1116" id="Municipal_Library_in_Prague"></span><span data-dcnode-id="1115" instrument_node="">Municipal Library in Prague</span><span class="ez-toc-section-end" data-dcnode-id="1114"></span></h3><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">The Municipal Library in Prague was something we were very excited to see while in Prague.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Why?</span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">There is an incredible infinity tunnel of books inside the library.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Sadly, on the day we visited the entire museum was closed for renovations which was very disappointing.</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Other interesting aspects of the museum include that it is one of the largest libraries in the Czech Republic and houses a bible from 1488.</span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">If you are interested to visit it is located on Mariánské náměstí 98/1. It is closed on Sunday but open Monday 1 pm – 8 pm, Tuesday – Friday 9 am – 8 pm and Saturday 1 pm – 6 pm</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Here is what the museum looks like from the outside:</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1087"><img alt="Municipal-Library-Prague-hidden-gems-prague" class="alignnone size-full wp-image-34577 lazyload" data-dcnode-id="1090" data-sizes="(max-width: 406px) 100vw, 406px" data-src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/Municipal-Library-Prague-hidden-gems-prague.jpg" data-srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/Municipal-Library-Prague-hidden-gems-prague.jpg 406w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Municipal-Library-Prague-hidden-gems-prague-200x300.jpg 200w" height="608" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="406"><noscript data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">&lt;img class="alignnone size-full wp-image-34577" src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/Municipal-Library-Prague-hidden-gems-prague.jpg" alt="Municipal-Library-Prague-hidden-gems-prague" width="406" height="608" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/Municipal-Library-Prague-hidden-gems-prague.jpg 406w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Municipal-Library-Prague-hidden-gems-prague-200x300.jpg 200w" sizes="(max-width: 406px) 100vw, 406px" /&gt;</span></noscript></p><span data-dcnode-id="1086" instrument_node="">
</span><h3 data-dcnode-id="1082"><span class="ez-toc-section" data-dcnode-id="1085" id="Jubilee_Synagogue"></span><span data-dcnode-id="1084" instrument_node="">Jubilee Synagogue</span><span class="ez-toc-section-end" data-dcnode-id="1083"></span></h3><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">The Jubilee Synagogue was built in 1906.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">A blend of the decorative Moorish and Art Nouveau styles can be seen in the wonderful interior; the colors used are vivid and deep.</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">On the front of the synagogue is an arch that covers a rosette window on which David’s star is crafted.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Two turrets guard the entrance and inscriptions in Hebrew and Czech are written on the western front face.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">In the women’s gallery, there is an exhibition that shows how atrociously the Russians treated the Jews, compelling them to migrate.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">You can also discover the Tablet of Mosses inside this Jewish building.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Nestled in the Jewish area in Prague, this synagogue will teleport you to Jerusalem.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">It is open from April to October from 11:00am–5:00pm daily except Saturday and Jewish holidays.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">There is an entrance fee of 100Kč to enter.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><h3 data-dcnode-id="1050"><span class="ez-toc-section" data-dcnode-id="1053" id="Petrin_Tower"></span><span data-dcnode-id="1052" instrument_node="">Petřín Tower</span><span class="ez-toc-section-end" data-dcnode-id="1051"></span></h3><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Better known as Prague’s Eiffel Tower, this tower shows the most breathtaking sights of Prague from way high up.</span></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">It was built in 1891 for the Jubilee Exhibition as a miniature copy of the Eiffel Tower in Paris.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">There are 299 steps to reach the top of the tower. If you are elderly or disabled, there is an elevator you can take.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">There are amazing views at the top of the&nbsp;Petřín Tower.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">It is open&nbsp;10:00am-10:00pm daily.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">There is an entrance fee of&nbsp;&nbsp;60Kč per adult and 40Kč for children between 3-15 years, students and retired people.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1027"><img alt="hidden-gems-Petřín-Tower" class="alignnone size-full wp-image-34567 lazyload" data-dcnode-id="1030" data-sizes="(max-width: 406px) 100vw, 406px" data-src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-Petřín-Tower.jpg" data-srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-Petřín-Tower.jpg 406w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-Petřín-Tower-200x300.jpg 200w" height="608" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="406"><noscript data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">&lt;img class="alignnone size-full wp-image-34567" src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-Petřín-Tower.jpg" alt="hidden-gems-Petřín-Tower" width="406" height="608" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-Petřín-Tower.jpg 406w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-Petřín-Tower-200x300.jpg 200w" sizes="(max-width: 406px) 100vw, 406px" /&gt;</span></noscript></p><span data-dcnode-id="1026" instrument_node="">
</span><h3 data-dcnode-id="1022"><span class="ez-toc-section" data-dcnode-id="1025" id="Petrin_Hill"></span><span data-dcnode-id="1024" instrument_node="">Petřín Hill</span><span class="ez-toc-section-end" data-dcnode-id="1023"></span></h3><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">This peaceful hidden hill is mapped with twisting pathways and hidden gardens.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Spectacular views will greet you from the 19th century Petřín Tower. Petřín is renowned for its rocky terrain and rose gardens.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">It can be found in Praha 1 above the left bank of the Vltava River.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><h3 data-dcnode-id="1008"><span class="ez-toc-section" data-dcnode-id="1011" id="Vrtba_Garden"></span><span data-dcnode-id="1010" instrument_node="">Vrtba Garden</span><span class="ez-toc-section-end" data-dcnode-id="1009"></span></h3><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Around 1720, this appealing Baroque garden was made because of František Maximilian Kaňka’s quick thinking. It’s one of the beautiful gardens on the slope of the Petřín Hill in Malá Strana.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Yet, it’s a bit hard to find because of its unattractive gate.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">The garden is small with stylish staircases, flower beds, terraces, banisters, statues and hedges.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">As its beautiful in every season, weddings, art exhibitions, garden parties and theatrical performances are regularly held there.</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">It is open from&nbsp;April to October from 10:00am-7:00pm daily.</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">There is an entrance fee of&nbsp;40Kč per adult, 25Kč for children and students and 100Kč for family.</span></p><span data-dcnode-id="989" instrument_node="">
</span><h3 data-dcnode-id="985"><span class="ez-toc-section" data-dcnode-id="988" id="Strelecky_Island"></span><span data-dcnode-id="987" instrument_node="">Střelecký Island</span><span class="ez-toc-section-end" data-dcnode-id="986"></span></h3><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Under the Legion Bridge in the center of the city, lies this enchanting hidden island with mature trees.</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">It’s a romantic yet unknown island in Prague. Often, concerts, open-air festivals and other cultural events are assembled there.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Bring your cameras if you ever decide to stop by the island. You have to take pictures of the astounding view from the Vltava River.</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">It is open from November to March from 6:00am-8:00pm and from April to October from 6:00am-11:00pm.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="968"><img alt="Střelecký-Island" class="alignnone size-full wp-image-34569 lazyload" data-dcnode-id="971" data-sizes="(max-width: 911px) 100vw, 911px" data-src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/Střelecký-Island.jpg" data-srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/Střelecký-Island.jpg 911w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Střelecký-Island-600x400.jpg 600w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Střelecký-Island-300x200.jpg 300w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Střelecký-Island-768x513.jpg 768w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Střelecký-Island-735x491.jpg 735w" height="608" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="911"><noscript data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">&lt;img class="alignnone size-full wp-image-34569" src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/Střelecký-Island.jpg" alt="Střelecký-Island" width="911" height="608" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/Střelecký-Island.jpg 911w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Střelecký-Island-600x400.jpg 600w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Střelecký-Island-300x200.jpg 300w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Střelecký-Island-768x513.jpg 768w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Střelecký-Island-735x491.jpg 735w" sizes="(max-width: 911px) 100vw, 911px" /&gt;</span></noscript></p><span data-dcnode-id="967" instrument_node="">
</span><h3 data-dcnode-id="963"><span class="ez-toc-section" data-dcnode-id="966" id="Decayed_Human_Arm_in_St_James_Church"></span><span data-dcnode-id="965" instrument_node="">Decayed Human Arm in St. James Church</span><span class="ez-toc-section-end" data-dcnode-id="964"></span></h3><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">This is seriously too weird to be true!!</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">The Church may be a tourist destination but few have heard about the human arm that dangles from a meat hook near the entrance.</span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">This black, withered arm makes the already Gothic Church seem even more eerie. Want to hear a really gruesome tale behind the arm from the 16th or 17th Century?</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">The legend goes that a thief once sneaked into the St. James Church. He was awed by the beauty of the Church and the jewels embellished on the statues. Subsequently, he tried to steal the gems on an icon of the Virgin Mary.</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Suddenly, the icon came alive and griped his arm. The next morning, a couple of monks found him trapped inside. Unable to free him, they were forced to ask help from the butchers. During the horrendous process, the screams of the thief could be heard for miles. Thieves are openly warned not to steal from the Church or they might suffer the same fate.</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">If you would like to see it, it is open&nbsp;9:30am-12:00pm and 2:00pm-4:00pm</span></p><span data-dcnode-id="944" instrument_node="">
</span><h3 data-dcnode-id="940"><span class="ez-toc-section" data-dcnode-id="943" id="Royal_Garden"></span><span data-dcnode-id="942" instrument_node="">Royal Garden</span><span class="ez-toc-section-end" data-dcnode-id="941"></span></h3><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Stationed in the Prague Castle, this garden was created in 1534 by Emperor Ferdinand I of Habsburg.</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Tranquility can be found abundantly in this old vineyard turned garden.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">It’s particularly cool due to its rare and exotic plants and botanic botanical specimens.</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">The decorative flowerbeds display its Baroque-style and Giardinetto (an eatery with art on the walls) near the Royal Summer Palace represents the Renaissance style.</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">You can enter the gardems via the three entrances: one is the northern gate near the Royal Summer Palace and two are the western gates in the street of U Prašného Mostu.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">It is open from mid-June to mid-September from 10:00am-6:00pm daily. The entrance fee is&nbsp;20Kč per person.</span></p><span data-dcnode-id="921" instrument_node="">
</span><h3 data-dcnode-id="917"><span class="ez-toc-section" data-dcnode-id="920" id="Lennon_Wall_possibly_a_hidden_gem_in_Prague"></span><span data-dcnode-id="919" instrument_node="">Lennon Wall (possibly a hidden gem in Prague?)</span><span class="ez-toc-section-end" data-dcnode-id="918"></span></h3><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">The Lennon Wall, a dedication to John Lennon in Prague, is a pretty cool and unique thing to do in Prague.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">It is fairly popular with tourists but considering that I did not know about it until my third visit to Prague, we are including it as a hidden gem.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">The wall is a beautiful mural of street art dedicated to the legend John Lennon.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">You will often find buskers at the wall singing John Lennon songs.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">While we were there, there was a busker with a sign, ‘getting money so I can fix my time machine to return to the 70’s’</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">It is of course free to visit and located in Mala Strana, across the Charles bridge from the old town and turn left.</span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="894"><img alt="Lennon-wall-prague" class="alignnone size-full wp-image-34571 lazyload" data-dcnode-id="897" data-sizes="(max-width: 406px) 100vw, 406px" data-src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/Lennon-wall-prague.jpg" data-srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/Lennon-wall-prague.jpg 406w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Lennon-wall-prague-200x300.jpg 200w" height="608" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="406"><noscript data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">&lt;img class="alignnone size-full wp-image-34571" src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/Lennon-wall-prague.jpg" alt="Lennon-wall-prague" width="406" height="608" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/Lennon-wall-prague.jpg 406w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Lennon-wall-prague-200x300.jpg 200w" sizes="(max-width: 406px) 100vw, 406px" /&gt;</span></noscript></p><span data-dcnode-id="893" instrument_node="">
</span><h3 data-dcnode-id="889"><span class="ez-toc-section" data-dcnode-id="892" id="Vajanovy_Sady"></span><span data-dcnode-id="891" instrument_node="">Vajanovy Sady</span><span class="ez-toc-section-end" data-dcnode-id="890"></span></h3><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Huddled in U Lužického semináře 17 in Praha 1, Vajanovy Sady is also called Vojan Gardens – the Garden of Eden.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">You can relax on the benches by immersing yourself in a good book or sightsee in the Vojan Gardens.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Amid the tress, lies an ornamental fish pond and a glasshouse.&nbsp;</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Spring is the best time to view the stunning well-maintained flower beds. In spring, the Magnolia trees are also in full bloom.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">It is open daily from 8:00am. The closing time depends on the months From February to March and October to November it closes 5:00pm, from April to September at 7:00pm, from December to January at 4:00pm.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">There is no admission fee to enter the park.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Note: There is a children’s corner and wheel chairs can be brought inside.</span></p><span data-dcnode-id="867" instrument_node="">
</span><h3 data-dcnode-id="863"><span class="ez-toc-section" data-dcnode-id="866" id="Airship_Gulliver"></span><span data-dcnode-id="865" instrument_node="">Airship Gulliver</span><span class="ez-toc-section-end" data-dcnode-id="864"></span></h3><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">In 2013, the DOS Centre’s management had the grand idea to introduce something that would clash with the existing architecture.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Martin Rajniš, an infamous architect was hired and the result was outstanding. A 42m long and 10m wide airship was constructed with steel and wood.</span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">In 2016, it was open to the public. It’s a paradise for book lovers as many literary discussions are carried put inside its walls. If you’re in Prague, visit this distinctive monument on the rooftop of the DOX Centre’s building.</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">If you want to check it out, it is open Monday, Saturday and Sunday from 10:00am-6:00pm. Wednesday and Friday from 10:00am-7:00pm and on Thursday from 10:00am-9:00pm.</span></p><span data-dcnode-id="850" instrument_node="">
</span><h3 data-dcnode-id="846"><span class="ez-toc-section" data-dcnode-id="849" id="Gardens_Below_the_Prague_Castle_a_true_Hidden_gem_in_Prague"></span><span data-dcnode-id="848" instrument_node="">Gardens Below the Prague Castle (a true Hidden gem in Prague)</span><span class="ez-toc-section-end" data-dcnode-id="847"></span></h3><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">The Gardens below the Prague Castle are such a picturesque place to explore in Prague.</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">One of the best parts of the gardens is that they provide absolutely incredible views of the city.</span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">These gardens are situated nearby the Prague Castle. A good option is to visit them either before or after a visit to Prague Castle.</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">These gardens are so beautiful, they will take your breath away. Inside the garden are many stunning intricately designed areas, romantic winding stairways and benches to sit back and smell the roses.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">As one would expect, they are particularly beautiful in Spring when all the flowers are in full bloom.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">They gardens are open daily from 10.00am – 8:00pm at night. The entrance fee is 80Kč per person.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Note: The gardens involve a lot of stairs so they may not be suitable for small children or the elderly.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="820"><img alt="Gardens-Below-the-Prague-Castle" class="alignnone size-full wp-image-34576 lazyload" data-dcnode-id="823" data-sizes="(max-width: 911px) 100vw, 911px" data-src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/Gardens-Below-the-Prague-Castle.jpg" data-srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/Gardens-Below-the-Prague-Castle.jpg 911w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Gardens-Below-the-Prague-Castle-600x400.jpg 600w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Gardens-Below-the-Prague-Castle-300x200.jpg 300w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Gardens-Below-the-Prague-Castle-768x513.jpg 768w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Gardens-Below-the-Prague-Castle-735x491.jpg 735w" height="608" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="911"><noscript data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">&lt;img class="alignnone size-full wp-image-34576" src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/Gardens-Below-the-Prague-Castle.jpg" alt="Gardens-Below-the-Prague-Castle" width="911" height="608" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/Gardens-Below-the-Prague-Castle.jpg 911w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Gardens-Below-the-Prague-Castle-600x400.jpg 600w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Gardens-Below-the-Prague-Castle-300x200.jpg 300w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Gardens-Below-the-Prague-Castle-768x513.jpg 768w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/Gardens-Below-the-Prague-Castle-735x491.jpg 735w" sizes="(max-width: 911px) 100vw, 911px" /&gt;</span></noscript></p><span data-dcnode-id="819" instrument_node="">
</span><h3 data-dcnode-id="815"><span class="ez-toc-section" data-dcnode-id="818" id="Havlicek_Gardens"></span><span data-dcnode-id="817" instrument_node="">Havlíček Gardens</span><span class="ez-toc-section-end" data-dcnode-id="816"></span></h3><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">On the edge of the Vršovice, Nusle and the Vinohrady neighborhoods in Prague, the Havlíček Gardens are fashioned in the Italian Renaissance style.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">It’s an English Park with statues, fountains, water cascades (mini waterfalls), lakes and pavilions.</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">The park is also called Grébovka Park as its founder Moritz Gröbe had to buy it in 1870 in very bad condition.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">You can leisurely sit in the delightful Vineyard Gazebo and the Grébovka Pavilion garden café with its unique replica of the Bowling Alley from the 1870s.&nbsp;</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">It is open from 6:00am-10:00pm daily.</span></p><span data-dcnode-id="799" instrument_node="">
</span><h3 data-dcnode-id="795"><span class="ez-toc-section" data-dcnode-id="798" id="Go_to_a_Puppet_Show_in_Prague"></span><span data-dcnode-id="797" instrument_node="">Go to a Puppet Show in Prague</span><span class="ez-toc-section-end" data-dcnode-id="796"></span></h3><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">The Czech Republic and Prague has a long history with puppets so it is interesting to go to a puppet show while in Prague.</span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">From the 17th century, puppet shows were big in the Czech Republic due to cost. Being a country who appreciates frugality, it was less expensive to run puppet shows than regular shows.</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">The puppet shows started as a cruel form of adult entertainment. These days they are a great family activity while in Prague.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">I think marionettes are particularly cool as I used to collect them as a kid.</span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">One puppet theatre in easy walking distance from the Old Town is the National Marionette Theatre on Zatecka 98-1.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="775"><img alt="prague-puppets" class="alignnone size-full wp-image-34572 lazyload" data-dcnode-id="778" data-sizes="(max-width: 406px) 100vw, 406px" data-src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-puppets.jpg" data-srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-puppets.jpg 406w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-puppets-200x300.jpg 200w" height="608" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="406"><noscript data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">&lt;img class="alignnone size-full wp-image-34572" src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-puppets.jpg" alt="prague-puppets" width="406" height="608" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-puppets.jpg 406w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-puppets-200x300.jpg 200w" sizes="(max-width: 406px) 100vw, 406px" /&gt;</span></noscript></p><span data-dcnode-id="774" instrument_node="">
</span><h3 data-dcnode-id="770"><span class="ez-toc-section" data-dcnode-id="773" id="The_Dead_Horse_Upside_Down"></span><span data-dcnode-id="772" instrument_node="">The Dead Horse: Upside Down</span><span class="ez-toc-section-end" data-dcnode-id="771"></span></h3><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">David Černý struck again with his idea of King Wenceslas riding an upside-down dead horse.</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">As you stroll into the atrium of the Lucerna Palace, you will be greeted by the sight of a Monarch on an upside-down horse. This comical statue is located inside the Palace in Vodickova.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">This statue is worthy of making a monumental statement. In fact, many believe that the artist created it to taunt the past and present leadership of Prague.</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Still, it’s only a theory as the artist has not revealed the inspiration that led him to this statue.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Don’t skip out on this interesting statue; it’s also highly photogenic so bring your cameras.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">The Dead Horse is available for viewing Monday to Friday from 9:30am-7:00pm. Closed on Saturday and Sunday. It is a free attraction in Prague.</span></p><span data-dcnode-id="751" instrument_node="">
</span><h3 data-dcnode-id="747"><span class="ez-toc-section" data-dcnode-id="750" id="Franciscan_Gardens"></span><span data-dcnode-id="749" instrument_node="">Franciscan Gardens</span><span class="ez-toc-section-end" data-dcnode-id="748"></span></h3><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">These gardens are a true oasis in the heart of the city. This exuberant garden was made in the 14th Century.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">In the summer, the span metal arches above the benches are brimming with fragrant roses. Moreover, fruit trees, herb beds, fountains and sculptures are scattered around the gardens, making it a quite magical place.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">It also has a playground with swings and a sand box for the little ones to immerse themselves in.</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Tucked in Vodičkova in Nové Město, it’s near the Jungmannovo Square and the Wenceslas Square.&nbsp;</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">If you would like to visit it is open from 7:00am-10:00pm daily.</span></p><span data-dcnode-id="731" instrument_node="">
</span><h3 data-dcnode-id="727"><span class="ez-toc-section" data-dcnode-id="730" id="Communism_Museum"></span><span data-dcnode-id="729" instrument_node="">Communism Museum</span><span class="ez-toc-section-end" data-dcnode-id="728"></span></h3><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">In the heart of the Old Town of Prague you will find the communism museum.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">If you are into history, this is a great place to visit. The museum includes many interesting exhibitions about the time in history when Prague was a communist state.</span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">It is very interesting as it provides an informative account of the post–World War II Communist regime in Czechoslovakia, behind the Iron Curtain.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">If you would like to visit the museum is located at V Celnici 4 in Prague. It costs 290Kč per adult,&nbsp; 250Kč for students and 270Kč for seniors.</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="710"><img alt="hidden-gems-prague-communism-museum" class="alignnone size-full wp-image-34574 lazyload" data-dcnode-id="713" data-sizes="(max-width: 406px) 100vw, 406px" data-src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-communism-museum.jpg" data-srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-communism-museum.jpg 406w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-communism-museum-200x300.jpg 200w" height="608" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="406"><noscript data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">&lt;img class="alignnone size-full wp-image-34574" src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-communism-museum.jpg" alt="hidden-gems-prague-communism-museum" width="406" height="608" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-communism-museum.jpg 406w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/hidden-gems-prague-communism-museum-200x300.jpg 200w" sizes="(max-width: 406px) 100vw, 406px" /&gt;</span></noscript></p><span data-dcnode-id="709" instrument_node="">
</span><h2 data-dcnode-id="705"><span class="ez-toc-section" data-dcnode-id="708" id="What_to_Eat_in_Prague"></span><span data-dcnode-id="707" instrument_node="">What to Eat in Prague?</span><span class="ez-toc-section-end" data-dcnode-id="706"></span></h2><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Food in Prague gives us so much joy – it is one of our favourite cuisines and so delicious.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">An absolute favourite meal of ours in Prague is Prague duck. We have both actually named it as our last ‘green mile’ meal which is saying a lot.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Here is where we would recommend eating duck in Prague:</span></p><span data-dcnode-id="695" instrument_node="">
</span><ul data-dcnode-id="685"><span data-dcnode-id="694" instrument_node="">
</span><li data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Malostranske St (Street Heading up to Prague Castle there are many restaurants serving Duck)</span></li><span data-dcnode-id="691" instrument_node="">
</span><li data-dcnode-id="687"><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//coupletraveltheworld.com/hilton-prague-old-town-review/"><span data-dcnode-id="690" instrument_node="">Zinc Restaurant in Hilton Old Town Prague</span></a><span data-dcnode-id="688" instrument_node=""> (serving amazing duck buns!)</span></li><span data-dcnode-id="686" instrument_node="">
</span></ul><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">For half a duck with red cabbage and dumplings expect to pay around 350Kč. It is enough for two people for lunch or a light dinner.</span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="677"><strong data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Tip</span></strong><span data-dcnode-id="678" instrument_node="">: For the best value, make sure you are getting half a duck. Sometimes, you will order a quarter of a duck or s single portion and pay almost as much!</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="672"><img alt="prague-duck-hidden-gems-prague" class="alignnone size-full wp-image-34578 lazyload" data-dcnode-id="675" data-sizes="(max-width: 911px) 100vw, 911px" data-src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-duck-hidden-gems-prague.jpg" data-srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-duck-hidden-gems-prague.jpg 911w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-duck-hidden-gems-prague-600x400.jpg 600w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-duck-hidden-gems-prague-300x200.jpg 300w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-duck-hidden-gems-prague-768x513.jpg 768w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-duck-hidden-gems-prague-735x491.jpg 735w" height="608" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="911"><noscript data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">&lt;img class="alignnone size-full wp-image-34578" src="http://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-duck-hidden-gems-prague.jpg" alt="prague-duck-hidden-gems-prague" width="911" height="608" srcset="https://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-duck-hidden-gems-prague.jpg 911w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-duck-hidden-gems-prague-600x400.jpg 600w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-duck-hidden-gems-prague-300x200.jpg 300w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-duck-hidden-gems-prague-768x513.jpg 768w, https://coupletraveltheworld.com/wp-content/uploads/2019/08/prague-duck-hidden-gems-prague-735x491.jpg 735w" sizes="(max-width: 911px) 100vw, 911px" /&gt;</span></noscript></p><span data-dcnode-id="671" instrument_node="">
</span><h2 data-dcnode-id="667"><span class="ez-toc-section" data-dcnode-id="670" id="Where_to_Stay_in_Prague"></span><span data-dcnode-id="669" instrument_node="">Where to Stay in Prague?</span><span class="ez-toc-section-end" data-dcnode-id="668"></span></h2><span data-dcnode-id="666" instrument_node="">
