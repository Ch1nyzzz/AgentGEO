le (World’s Fair) to mark the 100-year anniversary of the </span><a data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sp.auth.adobe.com/topics/french-revolution"><span data-dcnode-id="815" instrument_node="">French Revolution</span></a><span data-dcnode-id="813" instrument_node="">. More than 100 artists submitted competing plans for a monument to be built on the Champ-de-Mars, located in central Paris, and serve as the exposition’s entrance. The commission was granted to Eiffel et Compagnie, a consulting and construction firm owned by the acclaimed bridge builder, architect and metals expert Alexandre-Gustave Eiffel. While Eiffel himself often receives full credit for the monument that bears his name, it was one of his employees—a structural engineer named Maurice Koechlin—who came up with and fine-tuned the concept. Several years earlier, the pair had collaborated on the Statue of Liberty’s metal armature.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="809"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="810" data-zone-count="2"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks fo ixStopEventPropagation &amp;&amp; phoenixStopEventPropagation(event);" oncontextmenu="return window.phoenixStopEventPropagation &amp;&amp; phoenixStopEventPropagation(event);"><span data-dcnode-id="751" instrument_node="">1973</span></a></div><phoenix-ellipsis class="m-ellipsis m-card--header" data-dcnode-id="745"><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sp.auth.adobe.com/this-day-in-history/arab-american-chrysler-dodge-strike-walkout-detroit" onclick="return phoenixTrackClickEvent(this, event, 'click', 'phx-track-id', true) &amp;&amp; window.phoenixStopEventPropagation &amp;&amp; phoenixStopEventPropagation(event);" oncontextmenu="return window.phoenixStopEventPropagation &amp;&amp; phoenixStopEventPropagation(event);" phx-track-id="Title" rel=""><h2 aria-level="2" class="m-ellipsis--text m-card--header-text" data-dcnode-id="747" role="heading"><span data-dcnode-id="748" instrument_node="">Arab American autoworkers lead walkout at Chrysler’s Dodge Main plant</span></h2></a></phoenix-ellipsis></div></phoenix-card></phoenix-super-link></div></phoenix-recommendations></section></div></section><p data-dcnode-id="732"><span data-dcnode-id="736" instrument_node="">Eiffel reportedly rejected Koechlin’s original plan for the tower, instructing him to add more ornate flourishes. The final design called for more than 18,000 pieces of puddle iron, a type of wrought iron used in construction, and 2.5 million rivets. Several hundred workers spent two years assembling the framework of the iconic lattice tower, which at its inauguration in March 1889 stood nearly 1,000 feet high and was the tallest structure in the world—a distinction it held until the completion of </span><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sp.auth.adobe.com/topics/us-states/new-york"><span data-dcnode-id="735" instrument_node="">New York</span></a><span data-dcnode-id="733" instrument_node=""> City’s Chrysler Building in 1930. (In 1957, an antenna was added that increased the structure’s height by 65 feet, making it taller than the Chrysler Building but not the Empire State Building, which had surpassed its neighbor in 1931.) Initially, only the Eiffel Tower’s second-floor platform was open to the public; later, all three levels, two of which now feature restaurants, would be reachable by stairway or one of eight elevators.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-1" data-dcnode-id="729"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-1" data-dcnode-id="730" data-zone-count="3"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-fcf6ea39dc034610940ff127e4308ec2&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-1&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;1&q uot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-aa29a744060e4a99af428bf85855f848&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-1&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;1&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;1&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-aa29a744060e4a99af428bf85855f848&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.history.com/topics/landmarks&quot;},&quot;showBlockthrough&quot;:true,&quot;blockthroughTag&quot;:&quot;5b9a907fab-168&quot;}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="720"></phoenix-ad></div></aside><h2 data-dcnode-id="716" id="section_2"><span data-dcnode-id="717" instrument_node="">The Eiffel Tower Becomes a Permanent Feature of the Paris Skyline     </span></h2><p data-dcnode-id="708"><span data-dcnode-id="715" instrument_node="">Originally intended as a temporary exhibit, the Eiffel Tower was almost torn down and scrapped in 1909. City officials opted to save it after recognizing its value as a radiotelegraph station. Several years later, during </span><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sp.auth.adobe.com/topics/world-war-i"><span data-dcnode-id="714" instrument_node="">World War I</span></a><span data-dcnode-id="712" instrument_node="">, the Eiffel Tower intercepted enemy radio communications, relayed zeppelin alerts and was used to dispatch emergency troop reinforcements. It escaped destruction a second time during </span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sp.auth.adobe.com/topics/world-war-ii"><span data-dcnode-id="711" instrument_node="">World War II</span></a><span data-dcnode-id="709" instrument_node="">: Hitler initially ordered the demolition of the city’s most cherished symbol, but the command was never carried out. Also during the German occupation of Paris, French resistance fighters famously cut the Eiffel Tower’s elevator cables so that the Nazis had to climb the stairs.</span></p><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Over the years, the Eiffel Tower has been the site of numerous high-profile stunts, ceremonial events and even scientific experiments. In 1911, for instance, the German physicist Theodor Wulf used an electrometer to detect higher levels of radiation at its top than at its base, observing the effects of what are now called cosmic rays. The Eiffel Tower has also inspired more than 30 replicas and similar structures in various cities around the world.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-2" data-dcnode-id="703"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-2" data-dcnode-id="704" data-zone-count="3"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-adb71120a8d540dc8e9ff0443398c413&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-2&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;2&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;2&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-adb71120a8d540dc8e9ff0443398c413&quot;,&quot;adUnitPath&quot;:&quot;/88059007,5936/www.history.com/topics/landmarks&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="705"></phoenix-ad></div></aside><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Now one of the most recognizable structures on the planet, the Eiffel Tower underwent a major facelift in 1986 and is repainted every seven years. It welcomes more visitors than any other paid monument in the world—an estimated 7 million people per year. Some 500 employees are responsible for its daily operations, working in its restaurants, manning its elevators, ensuring its security and directing the eager crowds flocking the tower’s platforms to enjoy panoramic views of the City of Lights.</span></p></div><div class="m-detail--blockthrough-ads" data-dcnode-id="698"><span class="bt-uid-tg" data-dcnode-id="699" style="display: none !important" uid="5b9a9071f7-168"></span></div><div class="m-detail--sponsor" data-dcnode-id="697"></div><footer class="m-detail--footer" data-dcnode-id="581"><aside class="m-detail--citation l-detail--citation" data-dcnode-id="649"><a data-dcnode-id="696" name="citation"></a><div data-dcnode-id="650"><h2 data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Citation Information</span></h2><div class="m-detail--citation-meta" data-dcnode-id="689"><h3 data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Article Title</span></h3><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Eiffel Tower </span></p></div><div class="m-detail--citation-meta" data-dcnode-id="682"><h3 data-dcnode-id="683"><s
