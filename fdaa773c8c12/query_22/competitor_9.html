nt-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5538" instrument_node="">of</span></span><span data-dcnode-id="5535" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5536" instrument_node=""> the Eiffel Tower, but how much do you really know </span></span><span data-dcnode-id="5533" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5534" instrument_node="">about </span></span><span data-dcnode-id="5531" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5532" instrument_node="">it? In honor of our new </span></span><span data-dcnode-id="5529" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="5530" instrument_node="">Paris walking tours</span></span><span data-dcnode-id="5527" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5528" instrument_node="">, and to help you in your quest to be a more knowledgeable and well-rounded human being, we’ve put together a short history of the Tower that includes all the little nuggets of info that you don’t know, have never learned, and may have never even suspected.</span></span></p><span data-dcnode-id="5525" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5522" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5523" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="5524" instrument_node="">It was built partly to massage Frances (badly wounded) national pride.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="5518" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="5519"><div class="q-box unzoomed" data-dcnode-id="5520" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="5521" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-91653cd842496c38769ba084d95fa926-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5515" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5516" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5517" instrument_node="">La Tache Noir by Albert Bettannier depicts a schoolteacher showing his pupils Alsace-Lorraine on a map. It’s marked in black because it had recently been lost to Germany in a crushing blow to national morale.</span></span></p><span data-dcnode-id="5514" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5511" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5512" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5513" instrument_node="">The 19th century was a turbulent one for France. She opened on a high note by taking control of much of Europe in the Napoleonic wars, but internal strife and wider geopolitics chipped away at the empire until, in 1870, the French were routed by the Germans in the Franco-Prussian war, the Second Empire Fell, and France’s territorial holdings were reduced to a shadow of their former size. In Paris, which had recently been surpassed by London as the world’s most populace city, confidence was running at all-time lows and the men running the Third Republic were in dire need of something to boost the national morale.</span></span></p><span data-dcnode-id="5510" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5507" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5508" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5509" instrument_node="">They found it in the form of the 1889 World Fair which became a sort of coming out party for the “new and improved” Paris – compared to the one that had been trounced by Germany – as it looked towards the 20th century. The Eiffel tower was conceived of as a sort of tiara for the exhibition grounds. It would show off the technological advances and design prowess of France while also functioning as an old-fashioned Napoleonic symbol of greatness. It would make France, as its architect, Gustave Eiffel said, “the only country with a 300-meter flagpole.”</span></span></p><span data-dcnode-id="5506" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5503" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5504" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="5505" instrument_node="">Initially, it was a 300-meter failure.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="5500" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="5501" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="5502" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-b8af99e4ab3b8f06d13abca5a7c06d69&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5497" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5498" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5499" instrument_node="">A 19-Century political cartoon mocking the supposedly monstrous size of the Eiffel Tower.</span></span></p><span data-dcnode-id="5496" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5493" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5494" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5495" instrument_node="">Almost as soon as construction began on the tower, an influential cabal of Parisian artists and architects went atomic with their outrage. A famous passage from their widely circulated petition, “Artists Against the Eiffel Tower” read:</span></span></p><span data-dcnode-id="5492" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5489" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5490" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5491" instrument_node="">“We, writers, painters, sculptors, architects and passionate devotees of the hitherto untouched beauty of Paris, protest with all our strength, with all our indignation in the name of slighted French taste, against the erection … of this useless and monstrous Eiffel Tower … To bring our arguments home, imagine for a moment a giddy, ridiculous tower dominating Paris like a gigantic black smokestack, crushing under its barbaric bulk Notre Dame, the Tour Saint-Jacques, the Louvre, the Dome of les Invalides, the Arc de Triomphe, all of our humiliated monuments will disappear in this ghastly dream. And for twenty years … we shall see stretching like a blot of ink the hateful shadow of the hateful column of bolted sheet metal.”</span></span></p><span data-dcnode-id="5488" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5481" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5486" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5487" instrument_node="">If the literati were feeling kind they called it the “Metal Asparagus”. If they weren’t, it became a “solitary riddled </span></span><span data-dcnode-id="5484" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5485" instrument_node="">suppositoire”</span></span><span data-dcnode-id="5482" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5483" instrument_node="">. Perhaps the most repeated, and probably most apocryphal, story of tower hate is that the writer Guy de Maupassant frequently ate lunch in it because it was the only place in Paris where you couldn’t see the tower.</span></span></p><span data-dcnode-id="5480" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5477" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5478" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="5479" instrument_node="">Gustave Eiffel also had a hand in another monument you might have heard of.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="5473" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="5474"><div class="q-box unzoomed" data-dcnode-id="5475" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="5476" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-a3989d1fa835152ee6ec1da8f48ab863-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5470" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5471" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5472" instrument_node="">If not for the skeleton that Gustave Eiffel and his company designed for her, the Statue of Liberty might not look as good as she does today.</span></span></p><span data-dcnode-id="5469" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5458" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5467" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5468" instrument_node="">Eiffel didn’t actually design the tower that bears his name; it was his associates, Émile Nouguier and Maurice Koechlin, who came up with the design. But they did so under the direction of Eiffel in his firm, the </span></span><span data-dcnode-id="5465" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5466" instrument_node="">Compagnie des Établissements Eiffel</span></span><span data-dcnode-id="5463" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5464" instrument_node="">,. It wasn’t the first world-changing monument Eiffel and his team had worked on, either. In 1879 the internal designer for the </span></span><span data-dcnode-id="5461" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="5462" instrument_node="">Statue of Liberty</span></span><span data-dcnode-id="5459" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5460" instrument_node=""> (also built in France), Eugene Viollet-le-Duc, died suddenly, leaving the construction crews in desperate need of someone who knew a thing or two about building large metal towers. Eiffel and Koechlin rejected Viollet-le-Duc’s original idea to make the bronze exterior of Lady Liberty bear all her weight and instead installed an iron skeleton inside of her for support.</span></span></p><span data-dcnode-id="5457" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5454" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5455" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="5456" instrument_node="">Despite what some of Paris’ cultural elite said, almost everyone else loved it.</span></span></p><span data-dcnode-id="5453" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5450" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5451" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5452" instrument_node="">The year it was constructed the tower had 2 million visitors. These days it gets about 6.9 million per year bringing the grand total to something around 250 million since 1889. In its first year, it was visited by eight African kings, the Prince of Wales, Thomas Edison and Buffalo Bill, to name a few.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="5373" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="5374" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="5375" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="5389" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="5416" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="5417" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="5427" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="5428" style="box-sizing: border-box; position: relative;"><button aria-label="5 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="5429" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; transition-timing-function: ease-out; border-width: 0px; outline: none; color: inherit; background-color: transparent;" tabindex="0"><div class="q-relative qu-display--inline-flex" data-dcnode-id="5435" style="box-sizing: border-box; position: relative; z-index: 1;"><div /span></p><span data-dcnode-id="3303" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3300" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3301" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3302" instrument_node="">It was conceived by Gustave Eiffel himself in 1889 as an observatory, personal apartment and laboratory for weather and radio experiments.</span></span></p><span data-dcnode-id="3299" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3296" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3297" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3298" instrument_node="">It was kept secret at first but soon became the talk of the town, as rich bourgeois tried —unsuccessfully— to rent it from Eiffel for huge sums of money.</span></span></p><span data-dcnode-id="3295" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3292" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3293" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3294" instrument_node="">When visiting the top floor of the Eiffel tower today, people can have a look, through a glass window, at a portion of this “secret place”, which is Eiffel’s office, where wax figures of Eiffel and Thomas Edison have been installed as an hommage to a meeting the two men had there once.</span></span></p><span data-dcnode-id="3291" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3288" style="box-sizing: bor e="box-sizing: border-box;"><span data-dcnode-id="1289" instrument_node="">Originally Answered: </span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/What-keeps-the-Eiffel-Tower-from-rusting%3Fno_redirect%3D1" style="box-sizing: border-box; border-radius: inherit;" target="_top"><span data-dcnode-id="1288" instrument_node="">What keeps the Eiffel Tower from rusting?</span></a></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="1273" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit; cursor: initial;" tabindex="-1" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="1274" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1276" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1277"><span class="q-box qu-userSelect--text" data-dcnode-id="1278" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1283" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1284" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1285" instrument_node="">One of the biggest factors in longevity of the Tower is that it is made from Wrought Iron, over 99% pure. It oxidizes (rusts) VERY slowly. Some commentators say it is painted for cosmetic reasons, not to preserve it. I must agree.</span></span></p><span data-dcnode-id="1282" instrument_node=""> </span><p class="q-text qu-displa --hidden" data-dcnode-id="703" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="704" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="705" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="724" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="725" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="726" instrument_node="">The Eiffel Tower is one of the most famous buildings in the world. It was built for the World’s Fair in 1889. It became very popular and so the French decided not to demolish it when the World’s Fair was over. Later it was used as a radio tower. But in 1925 the tower was in a bad condition, and there were articles about the problem in the newspapers. A man called Victor Lustig read one of those articles and he had an idea. He „borrowed“ some notepaper from the French Ministry of Posts. He wrote to five French businessmen. His letter invited them to a secret meeting at a hotel in Paris.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="721" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="722" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="723" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-8bd82f09ef174bba7ff4d503ea0ba48c-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="718" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="719" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="720" instrument_node="">When the</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="706" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="707" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="708" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="709" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="710" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="715" style=" e articles about the problem in the newspapers. A man called Victor Lustig read one of those articles and he had an idea. He „borrowed“ some notepaper from the French Ministry of Posts. He wrote to five French businessmen. His letter invited them to a secret meeting at a hotel in Paris.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="695" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="696" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="697" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-8bd82f09ef174bba7ff4d503ea0ba48c-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="692" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="693" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="694" instrument_node="">When the businessmen arrived, a friend of Lustig took them to a private room. He said he was Mr Lustig‘s secretary. The five men sat at a long table and waited for Mr Lustig. Then Lustig came into the room and said, „I have some important and very secret news. The Eiffel Tower is in a dangerous condition. Unfortunately, we must demolish it. I‘m sure you understand why you are here - there are 70,000 tons of metal in the Eiffel Tower.“</span></span></p><span data-dcnode-id="691" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="688" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="689" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="690" instrument_node="">The five men listened to Lustig. Then they went away. After a week they each offered a different amount of money for the 70,000 tons of metal. The „lucky“ businessman was André Poisson. Lustig took his money and told Poisson that he was now the owner of the Eiffel tower. Lustig and his „secretary“ left the country immediately. But Poisson was so ashamed that he did not go to the police. When Lustig learned that this André Poisson hadn’t told anyone, he returned to Paris. And believe it or not, he could sell the Eiffel Tower a second time. What a salesman!</span></span></p><span data-dcnode-id="687" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="684" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="685" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="686" instrument_node="">The Council of Paris owns the Eiffel Tower now</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="607" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="608" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="609" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="623" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="650" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcn
