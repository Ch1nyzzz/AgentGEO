</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">The Eiffel tower is one of the most visited monuments around Paris; it’s even its emblem. The Iron lady was constructed by Gustave Eiffel in 1889 for the World Expo, originally it was destined to be destroyed immediately after, but it was saved thanks’ to the installation of a TSF issuer.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">It goes up to 990 feet above the ground, which made it the biggest monument in the world for a long time. This is the reason that every floor gives you a breath-taking view on Paris’s landscape.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Every day, thousands of tourists rush from the Champs de Mars to ascend into it; sometimes it’s very difficult to get an entry ticket! This is why at FlyView we give you the ability to avoid the unfishable lines and get on top while you’re flying thanks to our state of the art flight simulator and VR headsets.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="622"><strong data-dcnode-id="623"><span data-dcnode-id="624" lang="EN-US"><span data-dcnode-id="625" instrument_node="">It’s an incredible realistic visit of the Eiffel tower that will make you see it from a whole new angle! </span></span></strong></p><span data-dcnode-id="621" instrument_node=""> </span></div><span data-dcnode-id="619" instrument_node="">
