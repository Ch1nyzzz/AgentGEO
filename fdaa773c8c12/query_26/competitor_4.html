</span><p data-dcnode-id="952"><img alt="People sitting on blankets, waiting to watch a show at a Paris outdoor cinema" class="alignnone size-full wp-image-54415" data-dcnode-id="963" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-outdoor-cinema.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-outdoor-cinema.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-outdoor-cinema-624x401.jpeg 624w" width="700"><noscript data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-outdoor-cinema.jpeg" alt="People sitting on blankets, waiting to watch a show at a Paris outdoor cinema" width="700" height="450" class="alignnone size-full wp-image-54415" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-outdoor-cinema.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-outdoor-cinema-624x401.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="960"><span data-dcnode-id="959" instrument_node="">
During the fair weather months, Paris offers a number of free, family-friendly activities in the great outdoors. Among the most popular is the </span><a class="darklink" data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-show-exhibition/135268/open-air-cinema" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="958" instrument_node="">Cinema en Plein Air Festival</span></a><span data-dcnode-id="956" instrument_node=""> in the 19th arrondissement, in which classic and groundbreaking films (many in English with French subtitles) are screened on the lawn of the Parc de la Villette. Do as the Parisians do: bring along a picnic and make an evening out of it under the stars. Another outdoor film festival, the </span><a class="darklink" data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-show-exhibition/135268/open-air-cinema" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="955" instrument_node="">Cinéma au Clair de Lune</span></a><span data-dcnode-id="953" instrument_node="">, is organized by the Forum des Images and holds screenings in popular parks and gardens across the city. Nine outdoor venues are selected each year, past venues include the stairs of the Butte de Montmartre, Place des Vosges, and Parc Montsouris. From May through October, music lovers can enjoy themed concerts throughout Paris’ green spaces at the events of Musique Côté Jardins – those traveling with kids should check out “Les Pestacles,” held in the Parc Floral every Wednesday. This series within a series, with music and interactive workshops, is devoted to children aged 2 and up.</span></p><span data-dcnode-id="951" instrument_node="">
</span><h3 data-dcnode-id="947"><span data-dcnode-id="950" instrument_node="">39. </span><a data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/bike-paris-day-tour-eiffel-tower-champs-elysees-more-t554/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris12" rel="noopener sponsored" target="_blank"><span data-dcnode-id="949" instrument_node="">Take a Bike Tour</span></a></h3><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="933"><img alt="Bike tour in Paris." class="alignnone size-full wp-image-9674" data-dcnode-id="945" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-bike-tour-versailles.jpg&amp;raw" width="700"><noscript data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-bike-tour-versailles.jpg" alt="Bike tour in Paris." width="700" height="450" class="alignnone size-full wp-image-9674" /&gt;</span></noscript><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node="">
Bike tours are a great, interactive way to see Paris and the major city attractions. The most popular tour company is </span><a data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fattiretours.com/paris%3Fref%3Dsdtravel" rel="noopener sponsored" target="_blank"><span data-dcnode-id="940" instrument_node="">Fat Tire Bike Tours</span></a><span data-dcnode-id="938" instrument_node="">. They offer morning and evening rides, as well as day trips out to Versailles and Monet’s garden at Giverny. The pace is relaxed and leisurely, with extra time set aside to rest and get to know your fellow tour goers. It’s a great chance for solo travelers to make new friends, and family-friendly, with 20″ and 24″ kids bikes available and special options to accommodate riders with children under 6. Morning tours start at 10:30am and go past the Eiffel Tower, the Louvre, and Invalides and include a café stop in the Tuileries Gardens for lunch. The whole thing lasts about 3 1/2 hours. The Paris Night Tour takes a different route, through the Latin Quarter and along the River Seine, past illuminated city landmarks at sunset. It also includes a boat cruise on the Seine and (wine is provided), as well as a stop at the famous Berthillon ice cream shop on the Ile Saint-Louis.</span><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">
</span><em data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Metro: Dupleix</span></em></p><span data-dcnode-id="932" instrument_node="">
</span><h3 data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">40. Jardin du Luxembourg</span></h3><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="913"><img alt="Toy boats in the Luxembourg Garden of Paris, France" class="alignnone size-full wp-image-9039" data-dcnode-id="928" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/Luxembourg-Garden-Paris-1.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Luxembourg-Garden-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Luxembourg-Garden-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Luxembourg-Garden-Paris-1-624x401.jpg 624w" width="700"><noscript data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/09/Luxembourg-Garden-Paris-1.jpg" alt="Toy boats in the Luxembourg Garden of Paris, France" width="700" height="450" class="alignnone size-full wp-image-9039" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Luxembourg-Garden-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Luxembourg-Garden-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Luxembourg-Garden-Paris-1-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="925"><span data-dcnode-id="924" instrument_node="">
One of the prettiest formal gardens in Paris. Situated between Saint-Germain-des-Prés and the Latin Quarter is </span><a class="darklink" data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71393/Jardin-du-Luxembourg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="923" instrument_node="">Luxembourg Gardens</span></a><span data-dcnode-id="921" instrument_node="">, where you’ll find Parisians and tourists lounging on metal chairs and wooden benches, playing chess or casually taking a stroll. It’s a place to unwind and people watch, though there are numerous points of interest. One of the highlights is grand </span><a class="darklink" data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71365/Senat-Palais-du-Luxembourg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="920" instrument_node="">Luxembourg Palace</span></a><span data-dcnode-id="918" instrument_node="">, originally built to be the royal residence for Queen Marie de Medicis in 1612. After the revolution, it was modified for legislative purposes and currently houses the French Senate. Luxembourg Garden is a great place to visit with kids: the pool near the palace has toy sailing boats to rent, there’s a fantastic playground, a vintage carousel (the oldest one in Paris, designed by Charles Garnier), pony rides, concerts in the bandstand, and puppet shows at the Théâtre du Luxembourg, one of the largest theaters of its kind. Enjoy a picnic in the apple and pear orchard, visit the greenhouses to take in an exotic collection of orchids, or stroll among the park’s many statues – there are over one hundred (including the first model of the Statue of Liberty).</span><br data-dcnode-id="917"><span data-dcnode-id="916" instrument_node="">
</span><em data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Metro: Rennes</span></em></p><span data-dcnode-id="912" instrument_node="">
</span><h3 data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">41. Outdoor Markets</span></h3><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="886"><img alt="People shop at a covered outdoor market in Paris" class="alignnone size-full wp-image-54419" data-dcnode-id="908" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-markets.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-markets.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-markets-624x401.jpeg 624w" width="700"><noscript data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-markets.jpeg" alt="People shop at a covered outdoor market in Paris" width="700" height="450" class="alignnone size-full wp-image-54419" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-markets.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-markets-624x401.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="905"><span data-dcnode-id="904" instrument_node="">
Shopping at an outdoor farmer’s market is such a fun, Parisian experience that’s easy to come by – each neighborhood has its own that pops up once or twice a week. The biggest and most popular is the </span><a class="darklink" data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/shopping-paris/73869/Marche-Bastille" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="903" instrument_node="">Marché Bastille</span></a><span data-dcnode-id="901" instrument_node="">, located along the Boulevard Richard Lenoir. With nearly one hundred stalls, shoppers have their pick of the best produce in the city, as well as other amazing edibles like sea salt, roast chicken, farm made cheeses, and freshly baked bread. Plan to spend at least a few hours strolling the aisles, sampling wares, and snacking on fresh crepes or oysters along the way. The </span><a class="darklink" data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/shopping-paris/73861/Marche-Raspail" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="900" instrument_node="">Marché Raspail</span></a><span data-dcnode-id="898" instrument_node=""> on the Boulevard Raspail is an open-air market specializing in organic and bio items. It’s a slightly smaller market with about 40 vendors, but because of its well-to-do location in the 6th arrondissement, expect to find outstanding quality (and prices to match), as well as the occasional French celebrity. For a cheaper and less touristy experience, check out the </span><a class="darklink" data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/shopping-paris/93225/Marche-Beauvau-Marche-d-Aligre" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="897" instrument_node="">Marché d’Aligre</span></a><span data-dcnode-id="895" instrument_node="">. In the 12th arrondissement, between the market at Bastille and place de la Nation is a market which represents the diversity of this district – North African vendors mix with artisanal producers, offering some of the most unique finds in the city. Open six days a week, there are two sections – the indoor market called Marché Beauvau and the outdoor section which fills up the Place d’Aligre and the rue d’Aligre. Visitors will find everything from craft beer to local coffee, a vegetarian butcher, and one selling horse meat.</span><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">
</span><em data-dcnode-id="887"><span data-dcnode-id="892" instrument_node="">Metro for Marché Bastille: Bastille</span><br data-dcnode-id="891"><span data-dcnode-id="890" instrument_node="">
Metro for Marché Raspail: Notre Dames Des Champs</span><br data-dcnode-id="889"><span data-dcnode-id="888" instrument_node="">
Metro for Marché d’Aligre: Ledru-Rollin</span></em></p><span data-dcnode-id="885" instrument_node="">
</span><h3 data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">42. Parc de la Villette</span></h3><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="857"><img alt="villette-paris-1" class="alignnone size-full wp-image-9042" data-dcnode-id="881" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/Villette-Paris-1.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Villette-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Villette-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Villette-Paris-1-624x401.jpg 624w" width="700"><noscript data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/09/Villette-Paris-1.jpg" alt="villette-paris-1" width="700" height="450" class="alignnone size-full wp-image-9042" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Villette-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Villette-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Villette-Paris-1-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="878"><span data-dcnode-id="877" instrument_node="">
There is something for everyone at the </span><a class="darklink" data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lavillette.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="876" instrument_node="">Parc de la Villette</span></a><span data-dcnode-id="874" instrument_node="">. Situated in northeast Paris, with over 100 acres of tranquil green space and numerous attractions, playgrounds, modern architecture, and a planetarium, it’s no wonder the park receives 10 million visitors each year. Kids will love the </span><a class="darklink" data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cite-sciences.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="873" instrument_node="">Cité des Sciences et de l’Industrie</span></a><span data-dcnode-id="871" instrument_node="">, the biggest science museum in Europe, and especially the museum’s interactive adventure playground for 2-12 year olds, Cité des Enfants. In another part of the park, a permanent tented space known as </span><a class="darklink" data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.timeout.fr/paris/spectacle/theatre/espace-chapiteaux" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="870" instrument_node="">Espace Chapiteaux</span></a><span data-dcnode-id="868" instrument_node=""> hosts circus and acrobatic groups. The Canal de L’Ourcq runs through the Parc de la Villette, and there are </span><a class="darklink" data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canauxrama.com/en/cruise/canal-ourcq-call-of-the-wild-cruise.html%23croisiere" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="867" instrument_node="">boat tours</span></a><span data-dcnode-id="865" instrument_node=""> here that take visitors around the park or to other sites around Paris. Parisians flock to the park in the summer for their free movie festival and to see concerts at Le Zenith and Le Trabendo. Music lovers enjoy the </span><a class="darklink" data-dcnode-id="863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.citedelamusique.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="864" instrument_node="">Cité de la Musique</span></a><span data-dcnode-id="862" instrument_node=""> which houses the Paris Conservatory, a great museum for musical instruments, and the newest and most dramatic addition to the park, the Philharmonie de Paris. Recently opened in 2015 and designed by the well-known French architect Jean Nouvel, the Philharmonie is known as one of the most innovative buildings in Paris and the permanent home of the Paris Orchestra.</span><br data-dcnode-id="861"><span data-dcnode-id="860" instrument_node="">
</span><em data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Metro: Porte de la Vilette or Porte de Pantin</span></em></p><span data-dcnode-id="856" instrument_node="">
</span><h3 data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">43. Jardin des Tuileries</span></h3><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="825"><img alt="The Grande Roue de Paris in Les Jardines des Tuilleries" class="alignnone size-full wp-image-9271" data-dcnode-id="852" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/10/Tuilleries-Paris.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2016/10/Tuilleries-Paris.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/10/Tuilleries-Paris-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/10/Tuilleries-Paris-624x401.jpg 624w" width="700"><noscript data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/10/Tuilleries-Paris.jpg" alt="The Grande Roue de Paris in Les Jardines des Tuilleries" width="700" height="450" class="alignnone size-full wp-image-9271" srcset="https://santorinidave.com/wp-content/uploads/2016/10/Tuilleries-Paris.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/10/Tuilleries-Paris-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/10/Tuilleries-Paris-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="849"><span data-dcnode-id="848" instrument_node="">
The magnificent </span><a class="darklink" data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71304/Jardin-des-Tuileries" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="847" instrument_node="">Jardin des Tuileries</span></a><span data-dcnode-id="845" instrument_node=""> is popular all year round due to its central location next to the Louvre, and it offers a ton of activities for both kids and adults alike. The summer months have a lively, fairground atmosphere during the Tuileries </span><a class="darklink" data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-show-exhibition/135470/fete-des-tuileries" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="844" instrument_node="">annual carnival</span></a><span data-dcnode-id="842" instrument_node="">. From the end of June to the end of August, visitors can ride on bumper cars and wooden carrousel horses, visit a hall of mirrors, or choose from any of the 60 attractions offered. In the winter months, take a ride on the </span><a class="darklink" data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.giantwheel.eu/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="841" instrument_node="">Grand Roue de Paris</span></a><span data-dcnode-id="839" instrument_node="">, just next to the </span><a class="darklink" data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/transport/90907/Place-de-la-Concorde" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="838" instrument_node="">Place de la Concorde</span></a><span data-dcnode-id="836" instrument_node="">. An enormous world-traveling ferris wheel, it was built in Paris in 2000 and always returns home for the holidays. From a vantage point of 70 meters high, you’ll have incredible views of Paris. Set up as a highlight of the Christmas village on the Champs-Elysées it starts running every November and operates through mid-February. Year round, the Jardin des Tuileries is home to two well-known museums: in the northwest corner is the </span><a class="darklink" data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jeudepaume.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="835" instrument_node="">Jeu de Paume</span></a><span data-dcnode-id="833" instrument_node="">, an arts center for modern and postmodern photography, and in the southwest corner near the river Seine is </span><a class="darklink" data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.musee-orangerie.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="832" instrument_node="">L’Orangerie</span></a><span data-dcnode-id="830" instrument_node="">, which houses Monet’s massive and awe-inspiring Water Lilies paintings. The Tuileries makes for a very family-friendly stop: next to the playground is an in-ground trampoline for 2-12 years olds to work off some energy, and in quieter moments they can feed ducks at the nearby pond.</span><br data-dcnode-id="829"><span data-dcnode-id="828" instrument_node="">
</span><em data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Metro: Tuileries</span></em></p><span data-dcnode-id="824" instrument_node="">
</span><h3 data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">44. Shakespeare &amp; Company</span></h3><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="805"><img alt="What is the best bookstore in Paris?" class="alignnone size-full wp-image-9671" data-dcnode-id="820" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/01/best-bookshops-paris-shakespeare-company.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2017/01/best-bookshops-paris-shakespeare-company.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/01/best-bookshops-paris-shakespeare-company-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/01/best-bookshops-paris-shakespeare-company-624x401.jpg 624w" width="700"><noscript data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/01/best-bookshops-paris-shakespeare-company.jpg" alt="What is the best bookstore in Paris?" width="700" height="450" class="alignnone size-full wp-image-9671" srcset="https://santorinidave.com/wp-content/uploads/2017/01/best-bookshops-paris-shakespeare-company.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/01/best-bookshops-paris-shakespeare-company-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/01/best-bookshops-paris-shakespeare-company-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="817"><span data-dcnode-id="816" instrument_node="">
</span><a class="darklink" data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shakespeareandcompany.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="815" instrument_node="">Shakespeare &amp; Company</span></a><span data-dcnode-id="813" instrument_node=""> is a literary legend, a popular bookstore that first published James Joyce’s Ulysses and was frequented by the likes of Ernest Hemmingway. Though the bookstore’s current iteration merely pays tribute to </span><a class="darklink" data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shakespeareandcompany.com/35/history/95/sylvia-beachs-shakespeare-and-company-1919-1941" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="812" instrument_node="">Sylvia Beach’s 1919 original</span></a><span data-dcnode-id="810" instrument_node=""> (located at 12 rue Odéon), it retains much of the same charm and spirit as it’s roaring 20s predecessor. Back in the day, Shakespeare &amp; Company was a hub of the literary community, and aspiring writers like Joyce, Hemmingway, and Henry Miller used to borrow books from the store’s rental library (with Miller notoriously never returning them). The shop was permanently closed in 1940 under WWII German occupation. In the 1950s, after George Whitman’s newish bookstore at 37 Rue de la Bûcherie, Le Mistral, became an indispensable gathering place for young writers (especially popular with Beat Generation writers like William S. Burroughs and Allen Ginsberg), Sylvia Beach publicly gave Whitman the name of her beloved bookstore. He officially christened his location Shakespeare &amp; Company in 1964, after Beach’s death. Today the shop is run by Whitman’s daughter, Sylvia Beach Whitman, named after the iconic shop’s first owner. Inside, visitors can spend hours searching through the vast array of English language books, or simply curl up and read the International Herald Tribune next to the picturesque window overlooking the Seine.</span><br data-dcnode-id="809"><span data-dcnode-id="808" instrument_node="">
</span><em data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Metro: Saint-Michel</span></em></p><span data-dcnode-id="804" instrument_node="">
</span><h3 data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">45. Grand Palais</span></h3><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="788"><img alt="grand palais and Pont Alexandre III  paris city France" class="alignnone size-full wp-image-9043" data-dcnode-id="800" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/Grand-Palais-Paris-1.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Grand-Palais-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Grand-Palais-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Grand-Palais-Paris-1-624x401.jpg 624w" width="700"><noscript data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/09/Grand-Palais-Paris-1.jpg" alt="grand palais and Pont Alexandre III  paris city France" width="700" height="450" class="alignnone size-full wp-image-9043" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Grand-Palais-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Grand-Palais-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Grand-Palais-Paris-1-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="797"><span data-dcnode-id="796" instrument_node="">
The </span><a class="darklink" data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grandpalais.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="795" instrument_node="">Grand Palais</span></a><span data-dcnode-id="793" instrument_node="">, with its stunning Beaux-Arts architecture and more steel than the Eiffel Tower, was an architectural marvel when it was built for the Universal Exposition of 1900. One of the city’s most iconic buildings, with vaulted rooftops of glass and iron, the Grand Palais was designated as a historic monument in 2000 and now hosts roughly 40 events a year. Though the structure was dedicated “by the French Republic to the glory of French art,” many of the events and exhibitions held inside are fun and youthful, and the space is used in the most creative and unusual ways. In recent years, for a few weeks in June, the Grand Palais has recreated the 1950s by becoming a giant drive in movie-theater known as Cinema Paradiso. Dozens of cars were pre-parked inside the enormous 12,000 sq. meter space, and movie-goers settled in to watch a themed series of popular films on a 25sq. meter screen. Each Christmas time, from mid-December through the first week of January, the Grand Palais is converted into the world’s largest indoor ice skating rink, and skating under the giant glass dome is a magical experience. Visit at night – the rink has light shows and stays open until 2am.</span><br data-dcnode-id="792"><span data-dcnode-id="791" instrument_node="">
</span><em data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Metro: Champs-Élysées-Clemenceau</span></em></p><span data-dcnode-id="787" instrument_node="">
</span><h3 data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">46. Musée de l’Orangerie</span></h3><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="765"><img alt="Musee de L'Orangerie Paris" class="alignnone size-full wp-image-9888" data-dcnode-id="783" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/03/MuseeLOrangerie-Attractions-Paris.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2017/03/MuseeLOrangerie-Attractions-Paris.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/03/MuseeLOrangerie-Attractions-Paris-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/03/MuseeLOrangerie-Attractions-Paris-624x401.jpg 624w" width="700"><noscript data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/03/MuseeLOrangerie-Attractions-Paris.jpg" alt="Musee de L&amp;#039;Orangerie Paris" width="700" height="450" class="alignnone size-full wp-image-9888" srcset="https://santorinidave.com/wp-content/uploads/2017/03/MuseeLOrangerie-Attractions-Paris.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/03/MuseeLOrangerie-Attractions-Paris-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/03/MuseeLOrangerie-Attractions-Paris-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="780"><span data-dcnode-id="779" instrument_node="">
Fans of impressionist painting should visit </span><a class="darklink" data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.musee-orangerie.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="778" instrument_node="">Musée de l’Orangerie</span></a><span data-dcnode-id="776" instrument_node=""> in the Jardin de Tuileries to experience one of the most monumental feats in early twentieth century painting: Claude Monet’s masterwork, Water Lilies (</span><em data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Nymphéas</span></em><span data-dcnode-id="773" instrument_node="">). Painted over nearly one hundred linear meters of canvas, the sheer size and scale of it surrounds the viewer for a truly unique experience. Monet himself worked with the Louvre’s head architect, Camille Lefèvre, to plan the layout of this group of eight compositions. Displayed in two consecutive oval rooms (representing the symbol of infinity), with natural light streaming in from overhead, the massive panels simulate an effect that Monet described as creating an “illusion of an endless whole, of a wave with no horizon and no shore.” Monet reportedly had such an attachment to the paintings that he couldn’t bear to part with them; the paintings stayed with him until his death in 1926, and were finally displayed for the public at L’Orangerie in May 1927. Diehard fans should plan a pilgrimage to the artist’s garden at Giverny, where Water Lilies was painted.</span><br data-dcnode-id="772"><span data-dcnode-id="771" instrument_node="">
</span><em data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Metro: Concorde</span></em><span data-dcnode-id="768" instrument_node=""> </span><a class="photocredit" data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/davehamster/8164338973" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="767" instrument_node="">photo credit</span></a></p><span data-dcnode-id="764" instrument_node="">
</span><h3 data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">47. Visit a Rooftop Beekeeper</span></h3><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="752"><img alt="Visit a rooftop beehive in Paris, France" class="alignnone size-full wp-image-9040" data-dcnode-id="760" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/beehive-Paris-1.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2016/09/beehive-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/beehive-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/beehive-Paris-1-624x401.jpg 624w" width="700"><noscript data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/09/beehive-Paris-1.jpg" alt="Visit a rooftop beehive in Paris, France" width="700" height="450" class="alignnone size-full wp-image-9040" srcset="https://santorinidave.com/wp-content/uploads/2016/09/beehive-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/beehive-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/beehive-Paris-1-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="757"><span data-dcnode-id="756" instrument_node="">
Spread out through the rooftops and nestled among even some of the city’s famous landmarks are beehives which produce one of the most unusual and delicious souvenirs around: Parisian honey. In recent years, urban rooftops have become a great place for beekeepers to harvest their honey – what more picturesque spot can you imagine than the top of Notre Dame Cathedral, Grand Palais, or the Opera Garnier? Even places like the Eiffel Park Hotel, the Mandarin-Oriental and legendary restaurant La Tour d’Argent keep bees on their rooftops and either sell or serve their honey to guests. Parisian bees have access to the magnificent floral displays in the city’s gardens and public parks, resulting in honey that has a taste as unique as the city itself. As opposed to honey produced in, say, lavender fields, the abundance of local and exotic trees in Paris, combined with herb and rooftop gardens and the flower boxes of private balconies results in a truly distinctive flavor, and a collective total of seven tons per year. Beekeepers have been installing hives all across the city over the past decade, and Parisian honey has become so popular that it reportedly sells for 200 euros per kilo in Japan. For an up close look at an urban beekeeping operation, private visits can be organized with </span><a class="darklink" data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lemieldeparis.com/mieldeparis" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="755" instrument_node="">Audric de Campeau of Miel de Paris</span></a><span data-dcnode-id="753" instrument_node=""> who works from the top of Ecole Militaire.</span></p><span data-dcnode-id="751" instrument_node="">
</span><h3 data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">48. Street Art in Paris</span></h3><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="729"><img alt="Grafitti of a giant octopus on a building wall" class="alignnone size-full wp-image-54410" data-dcnode-id="747" height="451" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-street-art.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-street-art.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-street-art-624x402.jpeg 624w" width="700"><noscript data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-street-art.jpeg" alt="Grafitti of a giant octopus on a building wall" width="700" height="451" class="alignnone size-full wp-image-54410" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-street-art.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-street-art-624x402.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="744"><span data-dcnode-id="743" instrument_node="">
There’s a surprising amount of street art hidden throughout Paris, and French urban artists play a distinctive role in the country’s creative community – From Space Invader, whose mosaic pixel work is modeled after 8 bit video games, to the TED Prize winning JR, who recently covered the pyramid of the Louvre. French art historians generally trace the birth of street art to the ruins of Les Halles in the 1970s: Once the lifeblood of Paris, the fresh food market Les Halles was destroyed in 1971 in order to construct a shopping center and metro station. The artist Gérard Zlotykamien entered the abandoned ruins and used spray paint to create shapes of human bodies, evoking the destruction of Hiroshima. From these beginnings, the city’s urban creatives have cultivated a thriving street art scene with several neighborhoods worth exploring. Most people head to the area around Oberkampf, Belleville and Menilmontant, a rapidly gentrifying area in Northeast Paris that is home to numerous artists’ ateliers. </span><a class="darklink" data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goo.gl/maps/P2Ro5YnveahHGv6N9" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="742" instrument_node="">Rue Dénoyez</span></a><span data-dcnode-id="740" instrument_node=""> is a great starting point: a side alley near the Belleville metro stop, where the walls are completely covered in a wide range of styles. At the corner of Rue Saint Maur and Rue Oberkampf is </span><a class="darklink" data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lemur.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="739" instrument_node="">Le Mur</span></a><span data-dcnode-id="737" instrument_node="">. Le Mur means “the wall” in French, but it also stands for “Modulable. Urbain. Reactif.” Twice a month, a different urban artist is commissioned to fill the space, with over 200 artists showcased so far. Past work can be seen on their website. To get a deeper and more comprehensive look at urban art around the city, take a tour with </span><a class="darklink" data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//streetartparis.fr/street-art-tours-paris/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="736" instrument_node="">Street Art Paris</span></a><span data-dcnode-id="734" instrument_node="">: Guided walks are offered in Belleville, Montmartre, and Oberkampf, with a 2 ½ hour tour costing €20.</span><br data-dcnode-id="733"><span data-dcnode-id="732" instrument_node="">
</span><em data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Metro: Belleville or Oberkampf</span></em></p><span data-dcnode-id="728" instrument_node="">
</span><h3 data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">49. Jazz clubs in Paris</span></h3><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="699"><img alt="The famous Jazz Caves of Paris are located in the lower Montmartre" class="alignnone size-full wp-image-9263" data-dcnode-id="724" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/10/Jazz-club-Paris.jpg&amp;raw" width="700"><noscript data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/10/Jazz-club-Paris.jpg" alt="The famous Jazz Caves of Paris are located in the lower Montmartre" width="700" height="450" class="alignnone size-full wp-image-9263" /&gt;</span></noscript><br data-dcnode-id="721"><span data-dcnode-id="720" instrument_node="">
Paris is home to some of the most celebrated jazz venues in the world, historically centered around the Montmartre and Saint Germain des Pres districts. After World War I, the 1920s saw American jazz musicians and entertainers settling in Lower Montmartre, creating a Harlem in Paris with numerous clubs and cabarets. Jazz continued to thrive there until the 1940s, when American music was banned during Nazi-occupied Paris. Jazz sessions and concerts then continued in secret, within the soundproof underground cellars of St.Germain-des-Pres, and the “jazz caves” were born. Nowadays, jazz can be heard every night of the week and in almost any part of the city. One of the best spots is </span><a class="darklink" data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.caveaudelahuchette.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="719" instrument_node="">Le Caveau de la Huchette</span></a><span data-dcnode-id="717" instrument_node="">, an historic spot that’s hosted such legends as Lionel Hampton, Art Blakey, and Count Basie. Old school jazz lovers should head a little further south to </span><a class="darklink" data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petitjournalmontparnasse.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="716" instrument_node="">Le Petit Journal Montparnasse</span></a><span data-dcnode-id="714" instrument_node=""> in the 14th arrondissement, while over in the 1st you’ll find plenty of options along Rue des Lombards (with the standout being </span><a class="darklink" data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ducdeslombards.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="713" instrument_node="">Le Duc des Lombards</span></a><span data-dcnode-id="711" instrument_node="">). And the jazz spirit is still alive in Montmartre, where visitors and tourists alike frequent local hangouts like </span><a class="darklink" data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//autourdemidi.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="710" instrument_node="">Autour de Midi et Minuit</span></a><span data-dcnode-id="708" instrument_node="">.</span><br data-dcnode-id="707"><span data-dcnode-id="706" instrument_node="">
</span><em data-dcnode-id="700"><span data-dcnode-id="705" instrument_node="">Metro for Le Caveau de la Huchette: Saint Michel</span><br data-dcnode-id="704"><span data-dcnode-id="703" instrument_node="">
Metro for Le Duc des Lombards: Chatelet</span><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">
Metro for Autour de Midi: Blanche</span></em></p><span data-dcnode-id="698" instrument_node="">
</span><h3 data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">50. Promenade Plantée</span></h3><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="670"><img alt="Beautiful walking path in the 12th Arrondissement in Paris" class="alignnone size-full wp-image-8938" data-dcnode-id="694" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/Promenade-plantee-Paris-1.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Promenade-plantee-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Promenade-plantee-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Promenade-plantee-Paris-1-624x401.jpg 624w" width="700"><noscript data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">&lt;img loading="lazy" loading="lazy" class="alignnone size-full wp-image-8938" src="https://santorinidave.com/wp-content/uploads/2016/09/Promenade-plantee-Paris-1.jpg" alt="Beautiful walking path in the 12th Arrondissement in Paris" width="700" height="450" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Promenade-plantee-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Promenade-plantee-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Promenade-plantee-Paris-1-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="691"><span data-dcnode-id="690" instrument_node="">
For an off the beaten path look at Paris, visit the </span><a class="darklink" data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71237/Coulee-verte-Rene-Dumont-ex-Promenade-Plantee" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="689" instrument_node="">Coulée verte René-Dumont</span></a><span data-dcnode-id="687" instrument_node="">, also known as the </span><em data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Promenade Plantée</span></em><span data-dcnode-id="684" instrument_node=""> (tree lined walkway), one of the world’s first elevated parks and precursor to New York City’s Highline. Repurposing the abandoned Vincennes railway line which operated from 1859 to 1969, this elevated pathway of viaducts and footbridges connects Place de la Bastille to the </span><a class="darklink" data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71314/Bois-de-Vincennes" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="683" instrument_node="">Bois de Vincennes park</span></a><span data-dcnode-id="681" instrument_node="">, with nearly 3 miles of walkway through the 12th arrondissement, a little known district in Eastern Paris. During your walk you’ll encounter a blend of urban architecture and nature, with cherry and hazelnut trees, climbing plants, rosebushes, and lavender planted along the way. Details such as the 1930s art deco style police station near the start of Rue de Rambouillet are a stand out, as well as the </span><a class="darklink" data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.paris.fr/equipements/jardin-de-reuilly-paul-pernin-2573" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="680" instrument_node="">Jardin de Reuilly</span></a><span data-dcnode-id="678" instrument_node="">, where the pathway drops back down to street level. Stop there for a picnic and to enjoy sparkling water from Paris’s first fizzy water fountain. The Promenade navigates through various heights and terrain, at points going through underground tunnels or as high as 3 stories. Perhaps the prettiest use of space is the </span><a class="darklink" data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/shopping-paris/73812/Le-Viaduc-des-Arts" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="677" instrument_node="">Viaduc des Arts</span></a><span data-dcnode-id="675" instrument_node="">, a restored section of the Promenade Plantée located beneath the footpath. Utilizing the arches underneath the railroad tracks, the city created a collection of beautiful, glass fronted spaces with curved, 30 foot high ceilings. Running along Avenue Daumesnil, this section houses over fifty galleries, ateliers, and boutiques for local artists and craftsmen making everything from musical instruments and handmade porcelain to glass blown vases and unique tapestries.</span><br data-dcnode-id="674"><span data-dcnode-id="673" instrument_node="">
</span><em data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Metro: Bastille or Gare de Lyon</span></em></p><span data-dcnode-id="669" instrument_node="">
</span><h3 data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">51. Palais de Tokyo</span></h3><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="647"><img alt="The Palais de Tokyo is the best place in Paris to see modern art" class="alignnone size-full wp-image-9275" data-dcnode-id="665" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/10/Palais-de-Tokyo-Paris.jpg&amp;raw" width="700"><noscript data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/10/Palais-de-Tokyo-Paris.jpg" alt="The Palais de Tokyo is the best place in Paris to see modern art" width="700" height="450" class="alignnone size-full wp-image-9275" /&gt;</span></noscript><br data-dcnode-id="662"><span data-dcnode-id="661" instrument_node="">
The </span><a class="darklink" data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//palaisdetokyo.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="660" instrument_node="">Palais de Tokyo</span></a><span data-dcnode-id="658" instrument_node=""> is one of the most unique contemporary art spaces in Paris; to get a sense of upcoming talent, head here. One of the museum’s goals is to foster and promote young French artists, working with regional centers and art schools around France. In this way, the institution has gained a reputation for becoming a springboard for the country’s rising talent, as well as fostering international contemporary art collaborations. One of the most unusual aspects of the Palais de Tokyo is that it has no permanent collection, acting almost like a gallery rather than a museum. Since 2002, the west wing of the building has hosted the Site de Création Contemporaine, featuring exhibitions of contemporary art. After being renovated in 2012, it holds thirty to forty exhibitions a year and is among one of the largest spaces of its kind in Europe. The building’s east wing houses the city’s museum of modern art, the </span><em data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Musée d’Art Moderne de la Ville de Paris</span></em><span data-dcnode-id="655" instrument_node="">, also known as MaM. If you’re traveling with kids, don’t miss the </span><a class="darklink" data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//palaisdetokyo.com/en/en-famille/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="654" instrument_node="">Little Palais</span></a><span data-dcnode-id="652" instrument_node="">, which offers special activities and workshops for children. And the best part? Night owls and crowd-avoiders can appreciate the Palais de Tokyo almost every evening until midnight.</span><br data-dcnode-id="651"><span data-dcnode-id="650" instrument_node="">
</span><em data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Metro: Alma-Marceau or Iéna</span></em></p><span data-dcnode-id="646" instrument_node="">
</span><h3 data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">52. Musée de la Mode de la Ville de Paris</span></h3><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="627"><img alt="Exterior of the Paris Fashion Museum" class="alignnone size-full wp-image-54424" data-dcnode-id="642" height="451" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-palais-galliera.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-palais-galliera.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-palais-galliera-624x402.jpeg 624w" width="700"><noscript data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-palais-galliera.jpeg" alt="Exterior of the Paris Fashion Museum" width="700" height="451" class="alignnone size-full wp-image-54424" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-palais-galliera.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-palais-galliera-624x402.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="639"><span data-dcnode-id="638" instrument_node="">
The </span><a class="darklink" data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.palaisgalliera.paris.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="637" instrument_node="">City of Paris Fashion Museum</span></a><span data-dcnode-id="635" instrument_node="">‘s collection includes over 70,000 pieces of clothing and accessories, spanning trends from the 18th century until present day. Inside the Palais Galliera in the 16th arrondissement, the museum represents a fascinating look at the evolution of French fashion – from garments worn by royalty to the Empire dresses of the 19th century to modern day creations. Historical treasures include 2 suits worn by the Dauphin, the future Louis XVII, a bodice once belonging to Marie Antoinette, and garments worn by Empress Josephine. Modern day pieces include Audrey Hepburn’s iconic </span><em data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Breakfast at Tiffany’s</span></em><span data-dcnode-id="632" instrument_node=""> dress as well as the first collection of Jean Paul Gaultier. The museum’s most impressive pieces are found in their haute couture collection: ushered in by Christian Dior’s groundbreaking 1947 “New Look,” the golden age of Parisian haute couture is defined by innovative silhouettes and impeccable tailor-made garments. With donations from luminaries such as the Duchess of Windsor, Baroness Rothschild and Princess Grace of Monaco, the museum’s compilation reflects the best of Paris’s couture houses.</span><br data-dcnode-id="631"><span data-dcnode-id="630" instrument_node="">
</span><em data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Metro: Alma-Marceau</span></em></p><span data-dcnode-id="626" instrument_node="">
</span><h3 data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">53. Take in the View from a Rooftop Bar</span></h3><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="598"><img alt="View of the Eiffel Tower from a rooftop bar in Paris" class="alignnone size-full wp-image-54420" data-dcnode-id="622" height="451" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-rooftop-bar.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-rooftop-bar.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-rooftop-bar-624x402.jpeg 624w" width="700"><noscript data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-rooftop-bar.jpeg" alt="View of the Eiffel Tower from a rooftop bar in Paris" width="700" height="451" class="alignnone size-full wp-image-54420" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-rooftop-bar.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-rooftop-bar-624x402.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="619"><span data-dcnode-id="618" instrument_node="">
In warm weather, the rooftop bars of Paris provide fantastic views of the city’s landmarks. The most talked about (and toughest to get into) is </span><a class="darklink" data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.leperchoir.tv/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="617" instrument_node="">Le Perchoir</span></a><span data-dcnode-id="615" instrument_node="">. It serves a local hipster crowd in the 11th who come to take in the 360 degree panorama – its off-the-beaten-path location means you won’t find many tourists. The same team has another outpost in the Marais, as well as a recently opened rooftop location – Le Perchoir Gare de l’Est – at the Gare de l’Est train station. A more posh option is </span><a class="darklink" data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shangri-la.com/paris/shangrila" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="614" instrument_node="">La Rooftop Lounge</span></a><span data-dcnode-id="612" instrument_node=""> at the Shangri-La Hotel in the 16th. The vistas from this luxury property are breathtaking and include a full view of the Eiffel Tower. If you’re in the mood for something more chill, head to </span><a class="darklink" data-dcnode-id="610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terrass-hotel.com/en/edmond" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="611" instrument_node="">Le Terrass en Haut</span></a><span data-dcnode-id="609" instrument_node="">. Tucked away in Montmartre on the 7th floor of a boutique hotel, its 180 degree panorama includes the Eiffel Tower, Invalides, and the Grand Palais.</span><br data-dcnode-id="608"><span data-dcnode-id="607" instrument_node="">
</span><em data-dcnode-id="599"><span data-dcnode-id="606" instrument_node="">Metro for Le Perchoir: Ménilmontant</span><br data-dcnode-id="605"><span data-dcnode-id="604" instrument_node="">
Metro for Le Perchoir de L’Est: Gare de l’Est</span><br data-dcnode-id="603"><span data-dcnode-id="602" instrument_node="">
Metro for Shangri-La Hotel: Iena</span><br data-dcnode-id="601"><span data-dcnode-id="600" instrument_node="">
Metro for Le Terrass en Haut: Blanche</span></em></p><span data-dcnode-id="597" instrument_node="">
</span><h3 data-dcnode-id="593"><span data-dcnode-id="596" instrument_node="">54. </span><a data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/wine-tasting-tour-de-france-t11120/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris13" rel="noopener sponsored" target="_blank"><span data-dcnode-id="595" instrument_node="">Wine Tasting</span></a></h3><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="571"><img alt="Exterior of Le Baron Rouge wine bar in Paris" class="alignnone size-full wp-image-54421" data-dcnode-id="591" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-wine-tasting.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-wine-tasting.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-wine-tasting-624x401.jpeg 624w" width="700"><noscript data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-wine-tasting.jpeg" alt="Exterior of Le Baron Rouge wine bar in Paris" width="700" height="450" class="alignnone size-full wp-image-54421" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-wine-tasting.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-wine-tasting-624x401.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="588"><span data-dcnode-id="587" instrument_node="">
With over 150,000 wineries, the world of French wine is vast and complex. If you’d like to expand your knowledge, there are classes that cater to first-timers as well as to more advanced palates. The best-known of the bunch is </span><a class="darklink" data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//o-chateau.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="586" instrument_node="">Ô Château</span></a><span data-dcnode-id="584" instrument_node="">, a popular wine bar and serious training center for oenophiles. Ô Château offers daily wine tastings with 1 hour intro classes (30 euros per person) for the uninitiated, and more advanced courses for connoisseurs. The sessions are casual and fun, and all are taught by expert sommeliers. Another option is based out of the popular wine shop </span><a class="darklink" data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ldgparis.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="583" instrument_node="">La Derniere Goutte</span></a><span data-dcnode-id="581" instrument_node="">. The staff here is super knowledgeable as well as bi-lingual, so it’s well-known as a haven for visiting wine connoisseurs. Classes are small, and each one is taught by the shop’s owner. Discussions cater to the participants’ level of wine knowledge, covering a wide range of topics – though they generally include an overview of wine regions and food pairings. Classes are 55 euros per person and last about 2 to 2 ½ hours. Another fun option is the </span><a class="darklink" data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parisbymouth.com/food-wine-tours/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="580" instrument_node="">Paris by Mouth</span></a><span data-dcnode-id="578" instrument_node=""> tour of natural wine bars. On this tour you’ll visit several shops and wine bars, with emphasis on the growing trend toward natural wines. The tour takes place in an off-the-beaten-path area in the 11th, offering a bit of insight into Parisian daily life.</span><br data-dcnode-id="577"><span data-dcnode-id="576" instrument_node="">
</span><em data-dcnode-id="572"><span data-dcnode-id="575" instrument_node="">Metro for Ô Château: Les Halles</span><br data-dcnode-id="574"><span data-dcnode-id="573" instrument_node="">
Metro for La Derniere Goutte: Saint-Germain-des-Prés</span></em></p><span data-dcnode-id="570" instrument_node="">
</span><h3 data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">55. Eat Lunch at a Michelin Star Restaurant</span></h3><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="547"><img alt="Exterior of David Toutain restaurant in Paris" class="alignnone size-full wp-image-54413" data-dcnode-id="566" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-michelin-restaurants.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-michelin-restaurants.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-michelin-restaurants-624x401.jpeg 624w" width="700"><noscript data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-michelin-restaurants.jpeg" alt="Exterior of David Toutain restaurant in Paris" width="700" height="450" class="alignnone size-full wp-image-54413" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-michelin-restaurants.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-michelin-restaurants-624x401.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="563"><span data-dcnode-id="562" instrument_node="">
If you’re a foodie visiting Paris, be sure to book a lunch at one of the city’s numerous Michelin starred restaurants. Haute cuisine is no longer only for the elite, and while it’s possible to find dinner at a few 1 star restaurants without breaking the bank, generally you’ll find more reasonable prices (with much of the same food on offer) at midday. One of the most innovative 1 stars in Paris, </span><a class="darklink" data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.davidtoutain.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="561" instrument_node="">Restaurant David Toutain</span></a><span data-dcnode-id="559" instrument_node=""> offers a lunch-only 3 course menu for 55€. The ambiance is minimal and pretty, a perfect compliment to the unusual creations he serves up. (Like Jerusalem artichoke ice cream or smoked beets that could almost pass for charcuterie.) And over in the 11th, one of the most vibrant foodie neighborhoods in Paris yet out of the main tourist throng, you’ll find the award-winning </span><a class="darklink" data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.septime-charonne.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="558" instrument_node="">Septime</span></a><span data-dcnode-id="556" instrument_node="">. Loved by visitors and Parisians alike, this place is popular and with good reason – at 30€ for a 3-course lunch, it’s a great value.</span><br data-dcnode-id="555"><span data-dcnode-id="554" instrument_node="">
</span><em data-dcnode-id="548"><span data-dcnode-id="553" instrument_node="">Metro for Saturne: Bourse</span><br data-dcnode-id="552"><span data-dcnode-id="551" instrument_node="">
Metro for David Toutain: La Tour-Maubourg</span><br data-dcnode-id="550"><span data-dcnode-id="549" instrument_node="">
Metro for Septime: Charonne</span></em></p><span data-dcnode-id="546" instrument_node="">
</span><h3 data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">56. Péniche along the Seine</span></h3><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="502"><img alt="Peniches, permanently-docked boats along the Seine River in Paris" class="alignnone size-full wp-image-9270" data-dcnode-id="542" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/10/Peniche-Paris.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2016/10/Peniche-Paris.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/10/Peniche-Paris-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/10/Peniche-Paris-624x401.jpg 624w" width="700"><noscript data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/10/Peniche-Paris.jpg" alt="Peniches, permanently-docked boats along the Seine River in Paris" width="700" height="450" class="alignnone size-full wp-image-9270" srcset="https://santorinidave.com/wp-content/uploads/2016/10/Peniche-Paris.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/10/Peniche-Paris-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/10/Peniche-Paris-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="539"><span data-dcnode-id="538" instrument_node="">
Small river boats that stay permanently docked along the river Seine or the canals of Saint Martin and Ourq, péniche are particularly Parisian. Though the best translation might be “houseboat,” most have been converted into floating concert venues, cocktail bars, and restaurants, and offer a unique way to enjoy the city’s nightlife. One of the best is </span><a class="darklink" data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lebateauphare.co/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="537" instrument_node="">Le Batofar</span></a><span data-dcnode-id="535" instrument_node="">, perched near the National Library of France in the 13th, where guests have the option to enjoy a relaxed drink on the open air deck or head downstairs to the concert space below. Just next door is </span><a class="darklink" data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.damedecanton.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="534" instrument_node="">La Dame de Canton</span></a><span data-dcnode-id="532" instrument_node="">, an exotic Chinese junk which was the first to sail past the Cape of Good Hope – now a dedicated concert space and restaurant. Over near the Pont Alexandre III in the 7th, you’ll find </span><a class="darklink" data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-restaurant/116895/Rosa-Bonheur-sur-Seine" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="531" instrument_node="">Rosa Bonheur sur Seine</span></a><span data-dcnode-id="529" instrument_node="">. The all wood and glass bar and restaurant is incredibly popular, and attracts a young professional crowd. One of the most unique is </span><a class="darklink" data-dcnode-id="527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//penichecinema.net/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="528" instrument_node="">La Péniche Cinéma</span></a><span data-dcnode-id="526" instrument_node="">, which show screenings in its projection room that contains a rollback canvas roof. Family-friendly péniche include the marine-themed bookstore </span><a class="darklink" data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.penichelibrairie.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="525" instrument_node="">L’Eau et les Rêves</span></a><span data-dcnode-id="523" instrument_node=""> in the 19th (the space houses a library, café, kid’s area), the </span><a class="darklink" data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marchesurleau.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="522" instrument_node="">Marché sur l’Eau</span></a><span data-dcnode-id="520" instrument_node=""> (a floating fruit and vegetable market), and the </span><a class="darklink" data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.penicheantipode.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="519" instrument_node="">Péniche Antipode</span></a><span data-dcnode-id="517" instrument_node="">, a houseboat transformed into a theater with kids shows during the day and plays and music events for adults in the evenings.</span><br data-dcnode-id="516"><span data-dcnode-id="515" instrument_node="">
</span><em data-dcnode-id="503"><span data-dcnode-id="514" instrument_node="">Metro for Le Batofar and La Dame de Canton: Bibliothèque François Mitterrand</span><br data-dcnode-id="513"><span data-dcnode-id="512" instrument_node="">
Metro for Rosa Bonheur sur Seine: Invalides</span><br data-dcnode-id="511"><span data-dcnode-id="510" instrument_node="">
Metro for La Péniche Cinéma: Porte de la Villette</span><br data-dcnode-id="509"><span data-dcnode-id="508" instrument_node="">
Metro for L’Eau et les Rêves: Crimée</span><br data-dcnode-id="507"><span data-dcnode-id="506" instrument_node="">
Metro for Marché sur l’Eau: Crimée</span><br data-dcnode-id="505"><span data-dcnode-id="504" instrument_node="">
Metro for Péniche Antipode: Église de Pantin</span></em></p><span data-dcnode-id="501" instrument_node="">
</span><h3 data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">57. Eat Innovative French Cuisine</span></h3><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="467"><img alt="Sample the innovative cuisine of Paris at these shops and restaurants " class="alignnone size-full wp-image-9272" data-dcnode-id="497" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/10/Experimental-cuisine-Paris.jpg&amp;raw" width="700"><noscript data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/10/Experimental-cuisine-Paris.jpg" alt="Sample the innovative cuisine of Paris at these shops and restaurants " width="700" height="450" class="alignnone size-full wp-image-9272" /&gt;</span></noscript><br data-dcnode-id="494"><span data-dcnode-id="493" instrument_node="">
Though France’s culinary traditions are world famous, it’s worth exploring the innovation of the city’s top chefs, bakers, pastry makers and chocolatiers. Since 2010, </span><a class="darklink" data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gontran-cherrier.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="492" instrument_node="">Gontran Cherrier</span></a><span data-dcnode-id="490" instrument_node=""> and his namesake bakery has been churning out some of the most interesting breads in Paris. Featuring multigrain curry loaves, chickpea lemon rolls, bright red paprika sandwich buns, or squid ink with cumin grains, a visit to his bakery in the 18th arrondissement is both fun and flavorful. In the world of pastry, everyone knows </span><a class="darklink" data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pierreherme.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="489" instrument_node="">Pierre Herme</span></a><span data-dcnode-id="487" instrument_node="">‘s unusual macaron flavors like chocolate and foie gras, but for an Asian twist check out </span><a class="darklink" data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sadaharuaoki.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="486" instrument_node="">Sadaharu Aoki</span></a><span data-dcnode-id="484" instrument_node="">. This former contender for Patissier of the Year fuses traditional French pastries with ingredients from his native Japan, creating matcha opera cakes and black sesame eclairs. For fine dining check out </span><a class="darklink" data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.davidtoutain.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="483" instrument_node="">David Toutain</span></a><span data-dcnode-id="481" instrument_node=""> and his experimental take on French cuisine. After working with some of the biggest names in the business like Pierre Gagnaire and Alain Passard, Toutain opened up his own place in 2013. Since then he’s continued to produce some of the most modern French cooking in the city with dishes like fish skin chips dotted with trout roe, kiwi and oysters, and Jerusalem artichoke ice cream. Finally, chocolate lovers can’t miss the award-winning and always innovative </span><a class="darklink" data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patrickroger.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="480" instrument_node="">Patrick Roger</span></a><span data-dcnode-id="478" instrument_node="">. Highlights at his shop include chocolates with jasmine tea, Guinness beer and poppy seed, or his best-selling basil with lemon.</span><br data-dcnode-id="477"><span data-dcnode-id="476" instrument_node="">
</span><em data-dcnode-id="468"><span data-dcnode-id="475" instrument_node="">Metro for Gontran Cherrier: Abbesses</span><br data-dcnode-id="474"><span data-dcnode-id="473" instrument_node="">
Metro for Sadaharu Aoki: Rennes</span><br data-dcnode-id="472"><span data-dcnode-id="471" instrument_node="">
Metro for David Toutain: La Tour-Maubourg</span><br data-dcnode-id="470"><span data-dcnode-id="469" instrument_node="">
Metro for Patrick Roger: multiple locations</span></em></p><span data-dcnode-id="466" instrument_node="">
</span><h3 data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">58. Late Night Paris</span></h3><span data-dcnode-id="463" instrument_node="">
