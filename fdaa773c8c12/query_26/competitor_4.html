</span><p data-dcnode-id="1489"><img alt="Cemetery of Pere Lachaise, Paris, France" class="alignnone size-full wp-image-9887" data-dcnode-id="1501" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/03/CimetierePereLachaise-Attractions-Paris.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2017/03/CimetierePereLachaise-Attractions-Paris.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/03/CimetierePereLachaise-Attractions-Paris-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/03/CimetierePereLachaise-Attractions-Paris-624x401.jpg 624w" width="700"><noscript data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/03/CimetierePereLachaise-Attractions-Paris.jpg" alt="Cemetery of Pere Lachaise, Paris, France" width="700" height="450" class="alignnone size-full wp-image-9887" srcset="https://santorinidave.com/wp-content/uploads/2017/03/CimetierePereLachaise-Attractions-Paris.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/03/CimetierePereLachaise-Attractions-Paris-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/03/CimetierePereLachaise-Attractions-Paris-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1498"><span data-dcnode-id="1497" instrument_node="">
The world’s most visited cemetery. Famous for being the final resting place of Jim Morrison, </span><a class="darklink" data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71470/Cimetiere-du-Pere-Lachaise" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1496" instrument_node="">Père Lachaise</span></a><span data-dcnode-id="1494" instrument_node=""> also houses the remains of many other French and international luminaries, whose unique and ornate headstones form a sort of unusual sculpture garden in tribute to the dead. In addition to the Morrison tomb, other popular grave sites include those of Oscar Wilde and Édith Piaf. Keep looking, and you’ll find the burial sites of influential writers and personalities (Molière, Balzac, and Gertrude Stein), composers (Frédéric Chopin and George Bizet), and artists (Eugene Delacroix, Camille Pissarro, Georges Seurat, and Amedeo Modigliani). Famously, the grave site of the opera singer, Maria Callas, holds only an empty urn – her ashes, originally buried in Père Lachaise, were stolen and later spread off the coast of Greece. The cemetery’s monuments honoring World War II concentration camp victims are quite moving, and worth a visit as well. Visitors can pick up a map at the conservation office by the entrance on Boulevard Ménilmontant. Pro tip: get off at the metro stop Gambetta (instead of Père Lachaise) to begin your visit at the back of the cemetery and enjoy a leisurely stroll downhill.</span><br data-dcnode-id="1493"><span data-dcnode-id="1492" instrument_node="">
</span><em data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Metro: Gambetta</span></em></p><span data-dcnode-id="1488" instrument_node="">
</span><h3 data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">21. Shopping at the Grand Magasins</span></h3><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1450"><img alt="Galeries Lafayette in Paris, France" class="alignnone size-full wp-image-8967" data-dcnode-id="1484" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/Galeries-Lafayette-Paris-1.jpg&amp;raw" width="700"><noscript data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/09/Galeries-Lafayette-Paris-1.jpg" alt="Galeries Lafayette in Paris, France" width="700" height="450" class="alignnone size-full wp-image-8967" /&gt;</span></noscript><br data-dcnode-id="1481"><span data-dcnode-id="1480" instrument_node="">
The department stores of Paris are worth a visit even if you’re not a serious shopper. Known as the </span><em data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Grand Magasins</span></em><span data-dcnode-id="1477" instrument_node="">, these stores, with their magnificent art nouveau glass domes, sweeping staircases, and elegant interiors, bear little resemblance to the sterile shopping malls back home. Most were built in the 1850s and 1860s – a revolution in retail at the time. Paris’ first department store, </span><a class="darklink" data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lebonmarche.com/en.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1476" instrument_node="">Le Bon Marché</span></a><span data-dcnode-id="1474" instrument_node="">, set the standard, and boasts Gustave Eiffel as one of its building’s contributing architects. With its stunning stained glass done, </span><a class="darklink" data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.galerieslafayette.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1473" instrument_node="">Galeries Lafayette</span></a><span data-dcnode-id="1471" instrument_node="">, is reportedly the second most popular destination in Paris after the Eiffel Tower, and well known for selling luxury brands like Louis Vuitton. The best time of year to visit Galeries Lafayette and its neighbor, </span><a class="darklink" data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.groupe-printemps.com/en/printemps" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1470" instrument_node="">Printemps</span></a><span data-dcnode-id="1468" instrument_node="">, is at Christmastime, when elaborate animatronic window displays delight both kids and adults alike. </span><a class="darklink" data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhv.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1467" instrument_node="">BHV</span></a><span data-dcnode-id="1465" instrument_node="">, which stands for </span><em data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Bazar de l’Hôtel de Ville</span></em><span data-dcnode-id="1462" instrument_node="">, is located in the trendy Marais and is probably the most diverse of the bunch. There’s practically everything under one roof: you can buy anything from a hammer in the store’s hardware section to a dress from Marc Jacobs, or take a cooking class at the Alain Ducasse cookery school. The best time for shopping in Paris is during </span><em data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">les soldes</span></em><span data-dcnode-id="1459" instrument_node="">, the twice a year retail event (in January and June) when the French government allows shops to discount their inventory. If you can’t make it to Paris during the soldes, bring your non-French passport to the department store’s customer service desk to receive a 10% tourist discount card. At BHV they make it even easier with no card necessary – just produce your passport at the register for the discount.</span><br data-dcnode-id="1458"><span data-dcnode-id="1457" instrument_node="">
</span><em data-dcnode-id="1451"><span data-dcnode-id="1456" instrument_node="">Metro for Le Bon Marché: Sèvres-Babylone</span><br data-dcnode-id="1455"><span data-dcnode-id="1454" instrument_node="">
Metro for Galeries Lafayette: Chaussée d’Antin-La Fayette</span><br data-dcnode-id="1453"><span data-dcnode-id="1452" instrument_node="">
Metro for BHV: Hotel de Ville</span></em></p><span data-dcnode-id="1449" instrument_node="">
</span><h3 data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">22. Take a Hot Air Balloon Ride</span></h3><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1428"><img alt="Best hot air balloons tours in Paris with views of river and Eiffel Tower." class="alignnone size-full wp-image-9681" data-dcnode-id="1445" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/01/hot-air-balloon-ride-in-paris-near-eiffel-tower.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2017/01/hot-air-balloon-ride-in-paris-near-eiffel-tower.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/01/hot-air-balloon-ride-in-paris-near-eiffel-tower-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/01/hot-air-balloon-ride-in-paris-near-eiffel-tower-624x401.jpg 624w" width="700"><noscript data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/01/hot-air-balloon-ride-in-paris-near-eiffel-tower.jpg" alt="Best hot air balloons tours in Paris with views of river and Eiffel Tower." width="700" height="450" class="alignnone size-full wp-image-9681" srcset="https://santorinidave.com/wp-content/uploads/2017/01/hot-air-balloon-ride-in-paris-near-eiffel-tower.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/01/hot-air-balloon-ride-in-paris-near-eiffel-tower-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/01/hot-air-balloon-ride-in-paris-near-eiffel-tower-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1442"><span data-dcnode-id="1441" instrument_node="">
If you want to get a unique view of Paris and avoid the lines at the Eiffel Tower, take a hot air balloon ride instead. Visitors can float nearly 500 feet above ground in the world’s largest hot air balloon, the </span><a class="darklink" data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ballondeparis.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1440" instrument_node="">Ballon Generali</span></a><span data-dcnode-id="1438" instrument_node="">. The balloon, which has operated inside the Parc André Citroën in the 15th arrondissement since 1999, is connected to the ground with a hydroelectrically-activated cable, and has a large and stable platform that accommodates 30 people. Once up, visitors can move around freely to take in the bird’s eye view of the Champs de Mars, Sacré Coeur, Notre Dame and other Parisian landmarks. This attraction is great for all ages, and trips run daily. Afterwards, hang out at the </span><a class="darklink" data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71445/Parc-Andre-Citroen" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1437" instrument_node="">Parc André Citroën</span></a><span data-dcnode-id="1435" instrument_node="">. The Parc, constructed over the remains of the abandoned Citroën auto plant, is little known to tourists and is the only green space in Paris that opens directly onto the river. Kids and adults both find it the perfect place to relax and enjoy nice weather: on warm summer days you’ll find kids running through the water fountains or playing ping pong. Adults may enjoy the several themed gardens or the two large greenhouses housing numerous exotic trees and rare plants. Balloon admission is 12 euros for adults, 6 euros for children aged 3-11, and free for children under 3. Admission to the park is free. </span><a class="photocredit" data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/o_0/28207319993/"><span data-dcnode-id="1434" instrument_node="">photo credit</span></a><br data-dcnode-id="1432"><span data-dcnode-id="1431" instrument_node="">
</span><em data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Metro: Javel-André-Citroën or Balard</span></em></p><span data-dcnode-id="1427" instrument_node="">
</span><h3 data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">23. Velib</span></h3><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1400"><img alt="Rent velib bikes in Paris." class="alignnone size-full wp-image-9673" data-dcnode-id="1423" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-paris-rent-bike-velib.jpg&amp;raw" width="700"><noscript data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-paris-rent-bike-velib.jpg" alt="Rent velib bikes in Paris." width="700" height="450" class="alignnone size-full wp-image-9673" /&gt;</span></noscript><br data-dcnode-id="1420"><span data-dcnode-id="1419" instrument_node="">
Instead of using the metro, take advantage of the city’s </span><a class="darklink" data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.velib-metropole.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1418" instrument_node="">bike share system</span></a><span data-dcnode-id="1416" instrument_node="">. It’s a cheap and fun way to get around, and with more than 23,000 bikes in the system, there’s always one available. Paris is a relatively compact city so you don’t need to bike very far to get anywhere, and dedicated bike lanes make it extra safe. If you don’t feel comfortable biking in the streets, find a Velib station near one of the city’s large green spaces like the </span><a class="darklink" data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71393/Jardin-du-Luxembourg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1415" instrument_node="">Jardin du Luxembourg</span></a><span data-dcnode-id="1413" instrument_node=""> or the </span><a class="darklink" data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71152/Parc-du-Champ-de-Mars" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1412" instrument_node="">Champ de Mars</span></a><span data-dcnode-id="1410" instrument_node=""> near the Eiffel Tower, or use the bikes to explore the bigger parks like the </span><a class="darklink" data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71494/Bois-de-Boulogne" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1409" instrument_node="">Bois de Boulogne</span></a><span data-dcnode-id="1407" instrument_node=""> or the </span><a class="darklink" data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71314/Bois-de-Vincennes" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1406" instrument_node="">Bois de Vincennes</span></a><span data-dcnode-id="1404" instrument_node="">. They allow bikes and you won’t be riding in city traffic. Using the system is easy: riders sign up for either a day pass (€1.70) or a weekly pass (€8), then use the bikes as much as desired within a 24-hour or seven day period, respectively. Extra fees are charged for late returns, in order to ensure enough bikes in the system for everyone. Though you can buy a pass directly at the Velib station kiosks, the interface is small and not very intuitive – you’ll have a much easier time </span><a class="darklink" data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.velib-metropole.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1403" instrument_node="">purchasing passes online</span></a><span data-dcnode-id="1401" instrument_node="">.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><h3 data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">24. Antique Shopping at the Auction House</span></h3><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1372"><img alt="Antique shopping in Paris, France." class="alignnone size-full wp-image-9667" data-dcnode-id="1395" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/01/paris-drouot-antique-shopping-market.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2017/01/paris-drouot-antique-shopping-market.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/01/paris-drouot-antique-shopping-market-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/01/paris-drouot-antique-shopping-market-624x401.jpg 624w" width="700"><noscript data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/01/paris-drouot-antique-shopping-market.jpg" alt="Antique shopping in Paris, France." width="700" height="450" class="alignnone size-full wp-image-9667" srcset="https://santorinidave.com/wp-content/uploads/2017/01/paris-drouot-antique-shopping-market.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/01/paris-drouot-antique-shopping-market-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/01/paris-drouot-antique-shopping-market-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1392"><span data-dcnode-id="1391" instrument_node="">
Most visitors head north to the </span><a class="darklink" data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pucesdeparissaintouen.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1390" instrument_node="">Marché aux Puce</span></a><span data-dcnode-id="1388" instrument_node=""> flea market to hunt for great deals on antique and vintage pieces. Over the years however, the marché’s popularity has driven prices up. A better option is the </span><a class="darklink" data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drouot.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1387" instrument_node="">Drouot</span></a><span data-dcnode-id="1385" instrument_node="">, the largest auction house in France, which deals primarily in fine art and antiques and is open to the public. This famed auction house is ranked among the best in the world, along with Christie’s and Sotheby’s, though starting prices can be surprisingly reasonable. Check their website for the schedule of upcoming auctions or pick up the </span><a class="darklink" data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gazette-drouot.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1384" instrument_node="">Gazette de l’Hôtel Drouot</span></a><span data-dcnode-id="1382" instrument_node=""> at a newsstand. The building itself has twenty rooms, and hosts multiple auctions simultaneously. Auction goers range from amateurs to avid collectors, and all have the chance to view items in person on the morning of the sale from 11am to 12pm, or the day before from 11am to 6pm – auctioneers and experts are available to answer questions and give estimates. Some of the Drouot’s best deals come from estate sales, when prominent families of French society will unload their family heirlooms under anonymity, in order to protect their social reputation. Located in the 9th arrondissement, just down the street from </span><a class="darklink" data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.galerieslafayette.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1381" instrument_node="">Galeries Lafayette</span></a><span data-dcnode-id="1379" instrument_node="">. </span><a class="photocredit" data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/loneyss/14038415750/"><span data-dcnode-id="1378" instrument_node="">photo credit</span></a><br data-dcnode-id="1376"><span data-dcnode-id="1375" instrument_node="">
</span><em data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Metro: Richelieu-Drouot</span></em></p><span data-dcnode-id="1371" instrument_node="">
</span><h3 data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">25. Marché des Enfants Rouges</span></h3><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1340"><img alt="Best markets in Paris." class="alignnone size-full wp-image-9677" data-dcnode-id="1367" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-paris-food-market.jpg&amp;raw" width="700"><noscript data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-paris-food-market.jpg" alt="Best markets in Paris." width="700" height="450" class="alignnone size-full wp-image-9677" /&gt;</span></noscript><br data-dcnode-id="1364"><span data-dcnode-id="1363" instrument_node="">
Tucked away in the Upper Marais is the </span><a class="darklink" data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/shopping-paris/73876/Marche-couvert-les-Enfants-Rouges" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1362" instrument_node="">Marché des Enfants Rouges</span></a><span data-dcnode-id="1360" instrument_node=""> – a small but lively covered market that offers a mix of casual food stalls, small restaurants, and farmer’s market vendors. Over 400 years old, the market’s name translates to “market of the red children,” and refers to the red-uniformed orphans who once lived at a hospice nearby. Now, it’s a popular place with locals, and the vibe is relaxed and fun – a total contrast to the formal dining Paris is known for. There are numerous vendors to choose from, with something for everyone. Highlights include </span><a class="darklink" data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/Marocaintraiteur/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1359" instrument_node="">Le Traiteur Marocain</span></a><span data-dcnode-id="1357" instrument_node="">, a Moroccan joint that serves excellent couscous and tagines. (Don’t be put off by the line, it moves quickly and once you’ve ordered at the counter you’ll be seated at one of their exclusive tables.) Another is the highly entertaining </span><a class="darklink" data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/ChezAlainMiamMiam/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1356" instrument_node="">Chez Alain Miam Miam</span></a><span data-dcnode-id="1354" instrument_node="">, known just as much for the chef’s singing and bantering with customers as for their artful buckwheat galettes and sandwiches. Alain’s is a strictly take away affair so prepare to eat while you’re walking around the market. Other notable spots include </span><a class="darklink" data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/pages/Chez-Taeko/440545109374612" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1353" instrument_node="">Chez Taeko</span></a><span data-dcnode-id="1351" instrument_node=""> which sells Japanese bentos, </span><a class="darklink" data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leburgerfermier.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1350" instrument_node="">Le Burger Fermier des Enfants Rouges</span></a><span data-dcnode-id="1348" instrument_node="">, and the charming bistro </span><a class="darklink" data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/lestaminet11eme/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1347" instrument_node="">L’Estaminet</span></a><span data-dcnode-id="1345" instrument_node="">.</span><br data-dcnode-id="1344"><span data-dcnode-id="1343" instrument_node="">
</span><em data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Metro: Filles du Calvaire</span></em></p><span data-dcnode-id="1339" instrument_node="">
</span><h3 data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">26. Eat Ethnic</span></h3><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1318"><img alt="Eating ethnic food in Paris." class="alignnone size-full wp-image-9679" data-dcnode-id="1335" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-eat-good-food.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-eat-good-food.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-eat-good-food-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-eat-good-food-624x401.jpg 624w" width="700"><noscript data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-eat-good-food.jpg" alt="Eating ethnic food in Paris." width="700" height="450" class="alignnone size-full wp-image-9679" srcset="https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-eat-good-food.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-eat-good-food-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-eat-good-food-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1332"><span data-dcnode-id="1331" instrument_node="">
It might surprise people that Paris is one of the most multi-cultural cities in Europe, with nearly 20 percent of the city’s population was born outside of France. All throughout Paris are blocks or entire neighborhoods that feel like you’ve been transported to another part of the globe, and is the city filled with great ethnic eateries. Probably the most famous is </span><a class="darklink" data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asdufallafel.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1330" instrument_node="">L’as du Falafel</span></a><span data-dcnode-id="1328" instrument_node=""> in the historically Jewish Marais, where folks queue up for what many claim is the best falafel in the world. Most of the 13th arrondissement is home to a large Chinese and Vietnamese population, with entire areas devoted to Asian grocers, specialty shops and some of the best pho and dim sum in town. If you’re craving Indian food, the neighborhood known as La Chapelle just next to the </span><a class="darklink" data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/transport/73398/Gare-du-Nord" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1327" instrument_node="">Gare du Nord</span></a><span data-dcnode-id="1325" instrument_node=""> has dosas and curries to rivel those you’d get on the subcontinent, and a stop at </span><a class="darklink" data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saravanabhavan.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1324" instrument_node="">Saravanaa Bhavan</span></a><span data-dcnode-id="1322" instrument_node=""> being an absolute must before you catch your train. Clustered around the metro stop Barbès-Rochechouart is a mix of North African shops, eateries, bakeries, and even a weekly neighborhood market selling produce and second hand items. And visitors may have already stumbled upon the city’s unofficial Little Tokyo, a section in the 2nd arrondissement near the </span><a class="darklink" data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.operadeparis.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1321" instrument_node="">Opera Garnier</span></a><span data-dcnode-id="1319" instrument_node=""> where Japanese noodle shops dominate Rue Sainte-Anne.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><h3 data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">27. Go for a Swim</span></h3><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1291"><img alt="Under water shot of racing lanes in lap pool" class="alignnone size-full wp-image-8974" data-dcnode-id="1313" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/swimming-pool-Paris-1.jpg&amp;raw" width="700"><noscript data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/09/swimming-pool-Paris-1.jpg" alt="Under water shot of racing lanes in lap pool" width="700" height="450" class="alignnone size-full wp-image-8974" /&gt;</span></noscript><br data-dcnode-id="1310"><span data-dcnode-id="1309" instrument_node="">
Water lovers will want to check out Paris’ incredible public swimming pools – many of which are art deco marvels or offer fantastic views. The most notable is the </span><a class="darklink" data-dcnode-id="1307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.piscine-baker.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1308" instrument_node="">Piscine Josephine Baker</span></a><span data-dcnode-id="1306" instrument_node="">, which is built into a giant floating barge on the Seine. The 250 sq. meter pool accommodates swimmers of all levels alongside saunas, a jacuzzi, and a 50 sq. meter wading pool just for children. The best part is when the retractable glass roof opens up to an incomparable view of the river from the sundeck. Over in the Latin Quarter is the </span><a class="darklink" data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/72876/Piscine-Pontoise" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1305" instrument_node="">Piscine Pontoise</span></a><span data-dcnode-id="1303" instrument_node="">, a beautiful art deco construction built in 1934. With its two mezzanine levels, mosaics, columns, and a glass roof, this light filled structure has been listed as a historical monument. Late night swimmers will appreciate that the pool stays open until midnight. Not far away in the 13th is the </span><a class="darklink" data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/72885/Piscine-de-la-Butte-aux-Cailles" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1302" instrument_node="">Piscine de la Butte-aux-Cailles</span></a><span data-dcnode-id="1300" instrument_node=""> – probably the most futuristic looking of any public pool in Paris, and another historical monument (there are only two in the city). Opened in 1924, this structure, with vaulted concrete arches and bright yellow interior, has three separate swimming pools that stay an impressive 28°C (82 F) due to its natural sulphurous spring.</span><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">
</span><em data-dcnode-id="1292"><span data-dcnode-id="1297" instrument_node="">Metro for Piscine Josephine Baker: Quai de la Gare</span><br data-dcnode-id="1296"><span data-dcnode-id="1295" instrument_node="">
Metro for Piscine Pontoise: Maubert-Mutualité</span><br data-dcnode-id="1294"><span data-dcnode-id="1293" instrument_node="">
Metro for Piscine de la Butte aux Cailles: Tolbiac</span></em></p><span data-dcnode-id="1290" instrument_node="">
</span><h3 data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">28. Rue des Martyrs</span></h3><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1258"><img alt="Pedestrians walk and shop on the Rue des Martyrs in Paris" class="alignnone size-full wp-image-54426" data-dcnode-id="1286" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-rue-des-martyrs.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-rue-des-martyrs.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-rue-des-martyrs-624x401.jpeg 624w" width="700"><noscript data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-rue-des-martyrs.jpeg" alt="Pedestrians walk and shop on the Rue des Martyrs in Paris" width="700" height="450" class="alignnone size-full wp-image-54426" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-rue-des-martyrs.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-rue-des-martyrs-624x401.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node="">
Rue des Martyrs is one of the best streets in Paris and yet somehow remains outside of the tourist throng. It stretches roughly half a mile, crossing from the 9th arrondissement up into Montmartre towards the Sacré-Coeur. Whole books have even been written about it, like the Elaine Sciolino classic, </span><em data-dcnode-id="1279"><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2drWAGL" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1281" instrument_node="">The Only Street in Paris</span></a></em><span data-dcnode-id="1278" instrument_node="">. All at once visitors will experience a slice of small town Parisian life, colorful history, and some of the best specialty food shops in the city. There’s something for everyone: Small boutiques dot the street, and the area has recently become a fashion destination with shops like </span><a class="darklink" data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//maisonkitsune.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1277" instrument_node="">Maison Kitsune</span></a><span data-dcnode-id="1275" instrument_node="">. The </span><a class="darklink" data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.michou.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1274" instrument_node="">Cabaret Michou</span></a><span data-dcnode-id="1272" instrument_node=""> in the Montmartre section has hosted everyone from Liza Minelli to Jacques Chirac. Foodies will love the incredible selection of award winning producers like </span><a class="darklink" data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fromagerie-beillevaire.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1271" instrument_node="">Fromagerie Pascal Beillevaire</span></a><span data-dcnode-id="1269" instrument_node=""> (they make the butter for the Michelin starred Jules Verne restaurant), acclaimed baker </span><a class="darklink" data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arnaud-delmontel.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1268" instrument_node="">Arnaud Delmontel</span></a><span data-dcnode-id="1266" instrument_node="">, and award-winning pastry chef </span><a class="darklink" data-dcnode-id="1264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sebastiengaudard.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1265" instrument_node="">Sebastien Gaudard</span></a><span data-dcnode-id="1263" instrument_node="">. History buffs will enjoy the story behind the street’s name: after the decapitation of Paris’ first bishop, Saint Denis, under the Roman Empire, legend states that he picked up his head and walked the length of this street before dying.</span><br data-dcnode-id="1262"><span data-dcnode-id="1261" instrument_node="">
</span><em data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Metro: Notre-Dame-de-Lorette</span></em></p><span data-dcnode-id="1257" instrument_node="">
</span><h3 data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">29. Explore Paris’s Covered Passages</span></h3><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1211"><img alt="Shops lining the brightly-lit hallway of a Parisian covered shopping arcade" class="alignnone size-full wp-image-54411" data-dcnode-id="1253" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-covered-passages.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-covered-passages.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-covered-passages-624x401.jpeg 624w" width="700"><noscript data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-covered-passages.jpeg" alt="Shops lining the brightly-lit hallway of a Parisian covered shopping arcade" width="700" height="450" class="alignnone size-full wp-image-54411" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-covered-passages.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-covered-passages-624x401.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1250"><span data-dcnode-id="1249" instrument_node="">
For a step back in time, take a stroll through one of the city’s ornate shopping galleries. Constructed as early as the 1790s, these glass and iron roofed arcades (many are richly decorated with marble and lavish woodwork) were where Parisians of another era did their shopping. In the 1850s there were approximately 150 covered passages across Paris, and although only about twenty remain, several have retained their old world charm. The </span><a class="darklink" data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.galerie-vivienne.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1248" instrument_node="">Galerie Vivienne</span></a><span data-dcnode-id="1246" instrument_node="">, built in 1823, is one of the most beautiful and best preserved in Paris. Architecture enthusiasts will admire the mosaic floors and glass rotunda, while wine lovers will want to visit </span><a class="darklink" data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caves-legrand.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1245" instrument_node="">Legrand Filles et Fils</span></a><span data-dcnode-id="1243" instrument_node="">, a century-old cellar built in 1880. Another nearby is the popular </span><a class="darklink" data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/100264/Passage-des-Panoramas" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1242" instrument_node="">Passage des Panoramas</span></a><span data-dcnode-id="1240" instrument_node="">. Erected in 1799, this arcade was a prime destination for stamp and coin collectors back in the day but now hosts a collection of vintage post card shops, restaurants, and the </span><a class="darklink" data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatre-des-varietes.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1239" instrument_node="">Théâtre des Variétés</span></a><span data-dcnode-id="1237" instrument_node="">. Foodies have enjoyed its recent renaissance as a culinary destination, dining at notable restaurants such as </span><a class="darklink" data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//racinesparis.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1236" instrument_node="">Racines</span></a><span data-dcnode-id="1234" instrument_node="">, </span><a class="darklink" data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lecoinstotvino.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1233" instrument_node="">Coinstot Vino</span></a><span data-dcnode-id="1231" instrument_node="">, and </span><a class="darklink" data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frenchparadox.paris/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1230" instrument_node="">Canard et Champagne</span></a><span data-dcnode-id="1228" instrument_node="">. Across the street is the </span><a class="darklink" data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/100263/Passage-Jouffroy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1227" instrument_node="">Passage Jouffroy</span></a><span data-dcnode-id="1225" instrument_node="">, home to Paris’s wax museum, </span><a class="darklink" data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grevin-paris.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1224" instrument_node="">Musee Grevin</span></a><span data-dcnode-id="1222" instrument_node="">, charming tea salons, and a mix of specialty boutiques such as </span><a class="darklink" data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canesegas.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1221" instrument_node="">M. Segas</span></a><span data-dcnode-id="1219" instrument_node="">, seller of antique walking sticks. Finally, a short distance away is the </span><a class="darklink" data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/100255/Passage-du-Grand-Cerf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1218" instrument_node="">Passage du Grand Cerf</span></a><span data-dcnode-id="1216" instrument_node="">: With its 40 ft high ceilings, this charming 1825 structure is home to funky furniture, art, and fabric shops.</span><br data-dcnode-id="1215"><span data-dcnode-id="1214" instrument_node="">
</span><em data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Metro: Grands Boulevards</span></em></p><span data-dcnode-id="1210" instrument_node="">
</span><h3 data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">30. Parisian Breweries</span></h3><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1178"><img alt="Good draft beer in Paris" class="alignnone size-full wp-image-8969" data-dcnode-id="1206" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/brewery-Paris-1.jpg&amp;raw" width="700"><noscript data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/09/brewery-Paris-1.jpg" alt="Good draft beer in Paris" width="700" height="450" class="alignnone size-full wp-image-8969" /&gt;</span></noscript><br data-dcnode-id="1203"><span data-dcnode-id="1202" instrument_node="">
Micro-breweries have been cropping up all over Paris recently, and the city now has a thriving craft beer scene. The first to open in Paris proper was </span><a class="darklink" data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brasserielagouttedor.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1201" instrument_node="">Brasserie de la Goutte d’Or</span></a><span data-dcnode-id="1199" instrument_node="">, in 2012. Started by Thierry Roche and located in a lively West African section of the 18th, this brewery takes inspiration from the neighborhood by creating unique brews that use ingredients from the nearby </span><a class="darklink" data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.timeout.com/paris/en/shopping/marche-dejean" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1198" instrument_node="">Marché Dejean</span></a><span data-dcnode-id="1196" instrument_node="">: ginger, hibiscus, hot pepper, pomegranate and dates. Notable beers include the Myrha (a pale ale with date sugar) and Château Rouge (a spiced red beer). Visitors are welcome Thursday to Saturday, 5-7pm. Another name you’ll see popping up all over Paris is </span><a class="darklink" data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//deck-donohue.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1195" instrument_node="">Deck &amp; Donohue</span></a><span data-dcnode-id="1193" instrument_node="">. Opened in 2014, these two friends fulfilled a lifelong dream and now supply many of the top restaurants in the city. Their brewery is open to the public on Saturdays: take a tour and hang out in the up-and-coming neighborhood of Montreuil. One of the newer (and more central) breweries is </span><a class="darklink" data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bapbap.paris/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1192" instrument_node="">BAPBAP</span></a><span data-dcnode-id="1190" instrument_node="">, near Republique. The name stands for </span><em data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Brassée à Paris, Bue à Paris</span></em><span data-dcnode-id="1187" instrument_node=""> (brewed in Paris, drunk in Paris) and this local brewery housed in a former parking garage boasts a 4,000 liter brewing capacity. Full tours are bookable through their website and cost 10 euros.</span><br data-dcnode-id="1186"><span data-dcnode-id="1185" instrument_node="">
</span><em data-dcnode-id="1179"><span data-dcnode-id="1184" instrument_node="">Metro for Brasserie de la Goutte d’Or: Barbes-Rochechouart</span><br data-dcnode-id="1183"><span data-dcnode-id="1182" instrument_node="">
Metro for Deck &amp; Donohue: Robespierre</span><br data-dcnode-id="1181"><span data-dcnode-id="1180" instrument_node="">
Metro for BAPBAP: Republique</span></em></p><span data-dcnode-id="1177" instrument_node="">
</span><h3 data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">31. Fondation Louis Vuitton</span></h3><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1152"><img alt="Beautiful art gallery in the Bois de Boulogne" class="alignnone size-full wp-image-8939" data-dcnode-id="1173" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/Fondation-Louis-Vuitton-Paris-1.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Fondation-Louis-Vuitton-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Fondation-Louis-Vuitton-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Fondation-Louis-Vuitton-Paris-1-624x401.jpg 624w" width="700"><noscript data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">&lt;img loading="lazy" loading="lazy" class="alignnone size-full wp-image-8939" src="https://santorinidave.com/wp-content/uploads/2016/09/Fondation-Louis-Vuitton-Paris-1.jpg" alt="Beautiful art gallery in the Bois de Boulogne" width="700" height="450" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Fondation-Louis-Vuitton-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Fondation-Louis-Vuitton-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Fondation-Louis-Vuitton-Paris-1-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1170"><span data-dcnode-id="1169" instrument_node="">
With its breathtaking glass sails and avant-garde technology, </span><a class="darklink" data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fondationlouisvuitton.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1168" instrument_node="">Fondation Louis Vuitton</span></a><span data-dcnode-id="1166" instrument_node="">, designed by Frank Gehry and opened in 2014, has already become a Parisian icon. Set inside the tranquil </span><a class="darklink" data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71494/Bois-de-Boulogne" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1165" instrument_node="">Bois de Boulogne</span></a><span data-dcnode-id="1163" instrument_node=""> in the 16th arrondissement, this latest addition to the city’s art and culture scene is a work of art in itself. Inspired by the glasswork of existing Parisian landmarks, Gehry’s futuristic form of light and glass mimics a sailboat’s wind-inflated sails. Inside, find eleven gallery spaces, a concert venue, a bookstore, and the fine dining restaurant, </span><a class="darklink" data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fondationlouisvuitton.fr/en/the-restaurant.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1162" instrument_node="">Le Frank</span></a><span data-dcnode-id="1160" instrument_node="">. The Fondation contains permanent works by Jean-Michel Basquiat, Jeff Koons, Ellworth Kelly, and Olafur Eliasson, in addition to hosting temporary exhibitions. From multi level terraces, visitors enjoy panoramic views of the city with the skyscrapers of La Défense and the Eiffel Tower in the distance – those traveling with kids can stop at the reception desk to borrow an iPad loaded with interactive games to help liven up their visit. Also be sure to visit the neighboring </span><a class="darklink" data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jardindacclimatation.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1159" instrument_node="">Jardin d’Acclimatation</span></a><span data-dcnode-id="1157" instrument_node="">, a 49 acre amusement park devoted entirely to children. With a petting zoo, puppet shows, miniature golf course, and science center, there are plenty of options to keep kids of all ages entertained. If you happen to visit on a Sunday, take advantage of the brunch at the Jardin’s Le Pavillon Des Oiseaux. Their 32 euro buffet (15 euros for kids) will entertain younger children with face painting, magicians, balloon artists and other activities. Getting out to the Fondation Louis Vuitton can be tricky, but the museum now offers a shuttle bus for 1 euro that runs every 15 minutes between the museum and the Charles de Gaulle-Étoile metro.</span><br data-dcnode-id="1156"><span data-dcnode-id="1155" instrument_node="">
</span><em data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Metro: Charles de Gaulle-Étoile</span></em></p><span data-dcnode-id="1151" instrument_node="">
</span><h3 data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">32. Walk in Hemingway’s Footsteps</span></h3><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1111"><img alt="Where did Hemingway live in Paris" class="alignnone size-full wp-image-9031" data-dcnode-id="1147" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/Hemingway-Paris-1.jpg&amp;raw" width="700"><noscript data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/09/Hemingway-Paris-1.jpg" alt="Where did Hemingway live in Paris" width="700" height="450" class="alignnone size-full wp-image-9031" /&gt;</span></noscript><br data-dcnode-id="1144"><span data-dcnode-id="1143" instrument_node="">
Ernest Hemingway famously wrote that “if you are lucky enough to have lived in Paris as a young man then wherever you go for the rest of your life, it stays with you, for Paris is a moveable feast.” The author’s youth was spent in Left Bank cafés, in which and of which he wrote such celebrated works such as </span><em data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">A Moveable Feast</span></em><span data-dcnode-id="1140" instrument_node=""> and </span><em data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">The Sun Also Rises</span></em><span data-dcnode-id="1137" instrument_node="">. Many of his favorite bars and coffeehouses are still around, and a few spots, like his apartments at 74 rue Cardinal Lemoine and 39 rue Descartes, are marked with commemorative plaques. </span><a class="darklink" data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cafedeflore.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1136" instrument_node="">Café de Flore</span></a><span data-dcnode-id="1134" instrument_node=""> and </span><a class="darklink" data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lesdeuxmagots.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1133" instrument_node="">Les Deux Magots</span></a><span data-dcnode-id="1131" instrument_node=""> are two of Hemingway’s most famous haunts – Les Deux Magots in particular was a popular spot for Paris’ literary and intellectual elite in the 1920s, which included Jean-Paul Sartre and Simone de Beauvoir. Hemingway even used the cafe as a setting in </span><em data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">The Sun Also Rises</span></em><span data-dcnode-id="1128" instrument_node="">, though he wrote most of that novel (and first read F. Scott Fitzgerald’s manuscript of The Great Gatsby) at </span><a class="darklink" data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.closeriedeslilas.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1127" instrument_node="">La Closerie des Lilas</span></a><span data-dcnode-id="1125" instrument_node="">. Movie-goers may recognize the interior of the restaurant </span><a class="darklink" data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.polidor.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1124" instrument_node="">Polidor</span></a><span data-dcnode-id="1122" instrument_node="">, which was used in Woody Allen’s movie </span><em data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Midnight in Paris</span></em><span data-dcnode-id="1119" instrument_node="">, and also a particular favorite of Hemingway’s. And no Hemingway tribute would be complete without a visit to the bookstore </span><a class="darklink" data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shakespeareandcompany.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1118" instrument_node="">Shakespeare &amp; Company</span></a><span data-dcnode-id="1116" instrument_node="">. Now located on rue de la Bûcherie, in Hemingway’s day it was at 12 rue Odéon, where the penniless author would borrow books from the store’s rental library.</span><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node="">
</span><em data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Metro: Saint-Germain-des-Prés or Odeon</span></em></p><span data-dcnode-id="1110" instrument_node="">
</span><h3 data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">33. Centre Pompidou</span></h3><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1088"><img alt="Colorful exterior of the Centre Pompidou in Paris" class="alignnone size-full wp-image-54427" data-dcnode-id="1106" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-centre-pompidou.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-centre-pompidou.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-centre-pompidou-624x401.jpeg 624w" width="700"><noscript data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-centre-pompidou.jpeg" alt="Colorful exterior of the Centre Pompidou in Paris" width="700" height="450" class="alignnone size-full wp-image-54427" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-centre-pompidou.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-centre-pompidou-624x401.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1103"><span data-dcnode-id="1102" instrument_node="">
Modern art and architecture lovers will want to check out the </span><a class="darklink" data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.centrepompidou.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1101" instrument_node="">Centre Georges Pompidou</span></a><span data-dcnode-id="1099" instrument_node="">, a 20th century museum that’s recognizable for its exposed skeleton of crazy colored tubing. In addition to housing the National Museum of Modern Art, the Centre Pompidou has a permanent collection, broken into two periods: modern (1905 to 1960, think Matisse and Picasso) and contemporary (1960 to the present, featuring works from Andy Warhol and Anish Kapoor). Past temporary exhibitions at the Centre include David Hockney, Jeff Koons, and Frank Gehry. Beyond the incredible art, visitors will also enjoy the view. The top floor provides breathtaking panoramas of Paris, which guests can enjoy while having dinner or a drink at the fabulous restaurant </span><a class="darklink" data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//restaurantgeorgesparis.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1098" instrument_node="">Georges</span></a><span data-dcnode-id="1096" instrument_node="">. The plaza around the museum is home to whimsical pieces like the Stravinsky Fountain, a collection of 16 sculptures that move and spray water. Street performers and jugglers can often be found entertaining crowds at the nearby cafés. Don’t miss the </span><a class="darklink" data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.centrepompidou.fr/en/collections/brancusis-studio" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1095" instrument_node="">Atelier Brancusi</span></a><span data-dcnode-id="1093" instrument_node="">: the entire studio workshop of the late French artist, Constantin Brancusi, has been reconstructed across the piazza, and contains over 130 of his original sculptures, drawings, paintings, and photographs.</span><br data-dcnode-id="1092"><span data-dcnode-id="1091" instrument_node="">
</span><em data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Metro: Rambuteau</span></em></p><span data-dcnode-id="1087" instrument_node="">
</span><h3 data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">34. Visit a Luxury hotel</span></h3><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1056"><img alt="Cool bars in Paris." class="alignnone size-full wp-image-9666" data-dcnode-id="1083" height="449" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/01/paris-best-bars-in-luxury-hotel-hemingway-at-the-ritz.jpg&amp;raw" width="700"><noscript data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/01/paris-best-bars-in-luxury-hotel-hemingway-at-the-ritz.jpg" alt="Cool bars in Paris." width="700" height="449" class="alignnone size-full wp-image-9666" /&gt;</span></noscript><br data-dcnode-id="1080"><span data-dcnode-id="1079" instrument_node="">
These five star establishments with their ornate surroundings and incomparable views offer a completely indulgent way to enjoy the city. If staying at a luxury hotel is out of your budget, you can always enjoy a bit of the high life at the hotel bar. Most are open to the public and will give you a glimpse into some of the most exclusive properties in the city. One of the most notable is the Ritz Carlton’s newly renovated </span><a class="darklink" data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ritzparis.com/en-GB/bars-and-restaurants/bar-hemingway" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1078" instrument_node="">Bar Hemingway</span></a><span data-dcnode-id="1076" instrument_node="">, a favorite haunt of the legendary author. The bar boasts a richly wood paneled interior and head bartender Colin Field – considered by many to be the best bartender in the world. For a spectacular view of the city, dine or drink at The Peninsula’s </span><a class="darklink" data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peninsula.com/en/paris/hotel-fine-dining/french-rooftop-loiseau-blanc" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1075" instrument_node="">L’Oiseau Blanc</span></a><span data-dcnode-id="1073" instrument_node="">. From its panoramic perch in the 16th, guests take in the Eiffel Tower, Arc de Triomphe and Notre Dame Cathedral, all from the bar’s terrace or aviation inspired interior. Another standout hotel to visit is the Four Seasons’ George V. Head through its lavish marble courtyard past stunning floral arrangements to any of the hotel’s </span><a class="darklink" data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fourseasons.com/paris/dining/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1072" instrument_node="">4 elegant eateries</span></a><span data-dcnode-id="1070" instrument_node="">. Those traveling with kids can bypass the bar in favor of a family-friendly afternoon tea. Most hotels offer some version of high tea, with one of the most unique tea settings being that of the </span><a class="darklink" data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shangri-la.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1069" instrument_node="">Shangri-La</span></a><span data-dcnode-id="1067" instrument_node="">, a luxury hotel crafted from the former residence of Napoleon’s grandnephew. </span><a class="photocredit" data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/nglklm/8017661179/"><span data-dcnode-id="1066" instrument_node="">photo credit</span></a><br data-dcnode-id="1064"><span data-dcnode-id="1063" instrument_node="">
</span><em data-dcnode-id="1057"><span data-dcnode-id="1062" instrument_node="">Metro for Bar Hemingway: Concorde</span><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">
Metro for L’Oiseau Blanc: Kléber</span><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">
Metro for George V: George V</span></em></p><span data-dcnode-id="1055" instrument_node="">
</span><h3 data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">35. Picnic on the Seine</span></h3><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1030"><img alt="Picnic on Paris river." class="alignnone size-full wp-image-9675" data-dcnode-id="1051" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-paris-eat-picnic-seine.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-paris-eat-picnic-seine.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-paris-eat-picnic-seine-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-paris-eat-picnic-seine-624x401.jpg 624w" width="700"><noscript data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-paris-eat-picnic-seine.jpg" alt="Picnic on Paris river." width="700" height="450" class="alignnone size-full wp-image-9675" srcset="https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-paris-eat-picnic-seine.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-paris-eat-picnic-seine-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-paris-eat-picnic-seine-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1048"><span data-dcnode-id="1047" instrument_node="">
Paris is the perfect place to have a picnic, and there are numerous spots along the river that will turn a simple baguette and bottle of wine into something magical. A favorite spot is the </span><a class="darklink" data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71519/Square-du-Vert-Galant" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1046" instrument_node="">Square du Vert-Galant</span></a><span data-dcnode-id="1044" instrument_node=""> just next to the Pont Neuf. This park, located on the tip of the Île de la Cité, has been immortalized in movies because of its romantic views of the Pont des Arts in the distance, with boats passing nearby on the Seine. Really anywhere along the banks of the Seine is beautiful, but another favorite spot is near the </span><a class="darklink" data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/transport/73135/Pont-Alexandre-III" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1043" instrument_node="">Pont Alexandre III</span></a><span data-dcnode-id="1041" instrument_node="">, widely regarded as the most beautiful bridge in Paris. With its beaux-arts style, art nouveau lamps and ornate winged horses flanking either end, this magnificent sight is enhanced even more by the Grand Palais just across the river. Picnicking in Paris has become such a pastime that there are even dedicated services to help you: </span><a class="darklink" data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/lechicpicnic/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1040" instrument_node="">Paris Picnic</span></a><span data-dcnode-id="1038" instrument_node=""> lets customers choose between two packages: Le Classique, which contains standard picnic offerings (baguette, cheese, wine, etc.), or Le Chic, which offers fancier nosh like champagne and foie gras. Packages are customizable, include utensils and a picnic blanket (yours to keep), and are delivered across the city to various locations like the Eiffel Tower or Jardin du Luxembourg. Craving something more specific? The food delivery site </span><a class="darklink" data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foodora.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1037" instrument_node="">Foodora</span></a><span data-dcnode-id="1035" instrument_node=""> allows customers to order from the menus of favorite Paris restaurants, for pick-up near one of their picnic friendly delivery spots.</span><br data-dcnode-id="1034"><span data-dcnode-id="1033" instrument_node="">
</span><em data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Metro: Pont Neuf or Invalides</span></em></p><span data-dcnode-id="1029" instrument_node="">
</span><h3 data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">36. Take in the Arts</span></h3><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="991"><img alt="Masterpieces architecture Opera Garnier, Paris, France" class="alignnone size-full wp-image-9036" data-dcnode-id="1025" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/Garnier-opera-house-Paris-1.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Garnier-opera-house-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Garnier-opera-house-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Garnier-opera-house-Paris-1-624x401.jpg 624w" width="700"><noscript data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/09/Garnier-opera-house-Paris-1.jpg" alt="Masterpieces architecture Opera Garnier, Paris, France" width="700" height="450" class="alignnone size-full wp-image-9036" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Garnier-opera-house-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Garnier-opera-house-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Garnier-opera-house-Paris-1-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1022"><span data-dcnode-id="1021" instrument_node="">
Visitors to Paris shouldn’t forget to check out the city’s world class theater, dance, and concert venues. It’s not only a chance to watch France’s most talented artists perform, but also to admire some of the city’s most interesting architecture from the inside. The opulent </span><a class="darklink" data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.operadeparis.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1020" instrument_node="">Palais Garnier</span></a><span data-dcnode-id="1018" instrument_node=""> hosts the </span><a class="darklink" data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.operadeparis.fr/en/artists/ballet" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1017" instrument_node="">Ballet de l’Opéra de Paris</span></a><span data-dcnode-id="1015" instrument_node="">, the oldest national ballet company in the world. The building is one of the most beautiful and historic in France, and offers an unbeatable and elegant way to take in the most established names in dance. </span><a class="darklink" data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.operadeparis.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1014" instrument_node="">The Opera Bastille</span></a><span data-dcnode-id="1012" instrument_node=""> in the 12th is a newer construction, and the principal performance venue for the </span><a class="darklink" data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.operadeparis.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1011" instrument_node="">Paris National Opera’s</span></a><span data-dcnode-id="1009" instrument_node=""> celebrated performances of Wagner, Puccini and Mozart. The brand new auditorium of the </span><a class="darklink" data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//philharmoniedeparis.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1008" instrument_node="">Philharmonie de Paris</span></a><span data-dcnode-id="1006" instrument_node=""> opened in January 2015 and was designed by leading French architect Jean Nouvel. It is known as one of the most innovative buildings in Paris, and is the new permanent home of the </span><a class="darklink" data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.orchestredeparis.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1005" instrument_node="">Orchestre de Paris</span></a><span data-dcnode-id="1003" instrument_node="">. It’s family-friendly, as well: the Philharmonie de Paris houses a </span><a class="darklink" data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//philharmoniedeparis.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1002" instrument_node="">music museum</span></a><span data-dcnode-id="1000" instrument_node=""> and offers numerous activities for children of all ages, starting from 3 months and up.</span><br data-dcnode-id="999"><span data-dcnode-id="998" instrument_node="">
</span><em data-dcnode-id="992"><span data-dcnode-id="997" instrument_node="">Metro for Palais Garnier: Opera</span><br data-dcnode-id="996"><span data-dcnode-id="995" instrument_node="">
Metro for Opera Bastille: Bastille</span><br data-dcnode-id="994"><span data-dcnode-id="993" instrument_node="">
Metro for Philharmonie de Paris: Porte de Pantin</span></em></p><span data-dcnode-id="990" instrument_node="">
</span><h3 data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">37. Saint Sulpice</span></h3><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="968"><img alt="Saint Sulpice Tours in Paris, France" class="alignnone size-full wp-image-9035" data-dcnode-id="986" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/St-Sulpice-Paris-1.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2016/09/St-Sulpice-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/St-Sulpice-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/St-Sulpice-Paris-1-624x401.jpg 624w" width="700"><noscript data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/09/St-Sulpice-Paris-1.jpg" alt="Saint Sulpice Tours in Paris, France" width="700" height="450" class="alignnone size-full wp-image-9035" srcset="https://santorinidave.com/wp-content/uploads/2016/09/St-Sulpice-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/St-Sulpice-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/St-Sulpice-Paris-1-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="983"><span data-dcnode-id="982" instrument_node="">
This </span><a class="darklink" data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/93215/Eglise-Saint-Sulpice" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="981" instrument_node="">magnificent baroque church</span></a><span data-dcnode-id="979" instrument_node=""> in the upscale Saint-Germain neighborhood occupies a special place in Parisian history. Built in several phases and under the guidance of countless architects, the church’s construction lasted almost a century (from 1646 to 1745), and to this day the building remains incomplete – the south tower was never finished, rising to a height of only 68 meters vs. the north tower’s 73 meters. Because of its reputation as a wealthy and fashionable church, numerous celebrated sacraments have been held at St. Sulpice, such as the christenings of the Marquis de Sade and Charles Baudelaire, and the wedding of Victor Hugo. More recently, Saint Sulpice was immortalized in pop culture as a key location in Dan Brown’s novel, </span><em data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">The Da Vinci Code</span></em><span data-dcnode-id="976" instrument_node="">. Inside, take in the stunning frescos of Eugene Delacroix and </span><a class="darklink" data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/93215/Eglise-Saint-Sulpice" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="975" instrument_node="">the massive 1781 organ</span></a><span data-dcnode-id="973" instrument_node="">, one of the largest organs in the world. It’s astounding 6,588 pipes have been played by musicians like Marcel Dupré and Charles-Mari Widor, and its concerts draw countless visitors. One of the best times to go on Sunday mornings, when mass is followed by a 25-minute organ recital.</span><br data-dcnode-id="972"><span data-dcnode-id="971" instrument_node="">
</span><em data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Metro: Saint Sulpice</span></em></p><span data-dcnode-id="967" instrument_node="">
</span><h3 data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">38. Free Outdoor Events</span></h3><span data-dcnode-id="964" instrument_node="">
