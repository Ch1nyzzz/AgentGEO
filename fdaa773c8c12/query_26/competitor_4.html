https%3A//www.getyourguide.com/paris-catacombs-l2605/catacombs-of-paris-small-group-restricted-access-tour-t160007/%3Fpartner_id%3DSOFBH69%26cmp%3Dparis17" rel="noopener sponsored" target="_blank"><span data-dcnode-id="2007" instrument_node="">Catacombs (VIP Access)</span></a><span data-dcnode-id="2005" instrument_node=""> • </span><a data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t65756/%3Fpartner_id%3DSOFBH69%26cmp%3Dparis18" rel="noopener sponsored" target="_blank"><span data-dcnode-id="2004" instrument_node="">Musee d’Orsay</span></a><span data-dcnode-id="2002" instrument_node=""> •&nbsp;</span><a data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t2907/%3Fpartner_id%3DSOFBH69%26cmp%3Dparis19" rel="noopener sponsored" target="_blank"><span data-dcnode-id="2001" instrument_node="">Grevin Wax Museum</span></a><span data-dcnode-id="1999" instrument_node=""> • </span><a data-dcnode-id="1997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t72481/%3Fpartner_id%3DSOFBH69%26cmp%3Dparis20" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1998" instrument_node="">Picasso Museum</span></a></strong></li><span data-dcnode-id="1994" instrument_node="">

</span><h2 data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">The 62 Best Things To Do in Paris</span></h2><span data-dcnode-id="1989" instrument_node="">
</span><h3 data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">1. Walk</span></h3><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1963"><img alt="Pedestrians walking through the streets of Paris" class="alignnone size-full wp-image-54416" data-dcnode-id="1985" height="451" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-walking-tours.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-walking-tours.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-walking-tours-624x402.jpeg 624w" width="700"><noscript data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-walking-tours.jpeg" alt="Pedestrians walking through the streets of Paris" width="700" height="451" class="alignnone size-full wp-image-54416" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-walking-tours.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-walking-tours-624x402.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1982"><span data-dcnode-id="1981" instrument_node="">
My favorite thing to do in most big cities is to walk and Paris is no exception. It’s the best way to experience the city’s culture, daily workings, and personality (and it’s free). If you want to learn about a city’s past then a museum, palace, or historical sight will be best. But if you want to take in today’s Paris then walking is the way to do it. When it comes to walking as a means for exploration there are few wrong ways: the most untouristy routes will yield the most dramatic discoveries. I hesitate to offer a walking tour as the point isn’t to see this sight or that building but to absorb the culture that is all around you. That said, I know few will take me up on my gambit if they spend the day walking through an industrial park. So here are some general routes (diversions and wrong turns encouraged): Start at the Arc de Triomphe and make your way to the Place de la Bastille (6.1 km). Start at the Eiffel Tower and make your way to the Notre Dame (4.5 km). Start at the Sacre Coeur and make your way to the Luxembourg Gardens (4.7 km). </span><strong data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Guided Paris Walking Tours</span></strong><span data-dcnode-id="1978" instrument_node="">: </span><a data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/marais-quarter-private-guided-walking-tour-t43976/%3Fpartner_id%3DSOFBH69%26cmp%3Dparis-walk1" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1977" instrument_node="">Marais</span></a><span data-dcnode-id="1975" instrument_node=""> • </span><a data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/montmartre-the-belle-epoque-private-walking-tour-t41349/%3Fpartner_id%3DSOFBH69%26cmp%3Dparis-walk2" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1974" instrument_node="">Montmartre &amp; Sacré Coeur</span></a><span data-dcnode-id="1972" instrument_node=""> • </span><a data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/paris-highlights-full-day-tour-t122388/%3Fpartner_id%3DSOFBH69%26cmp%3Dparis-walk3" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1971" instrument_node="">Paris Highlights</span></a><span data-dcnode-id="1969" instrument_node=""> • </span><a data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/paris-3-hour-aligre-market-walking-food-tour-tasting-t90819/%3Fpartner_id%3DSOFBH69%26cmp%3Dparis-walk4" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1968" instrument_node="">Aligre Market</span></a><span data-dcnode-id="1966" instrument_node=""> • </span><a data-dcnode-id="1964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/3-hours-private-sightseeing-walking-tour-of-paris-t15729/%3Fpartner_id%3DSOFBH69%26cmp%3Dparis-walk5" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1965" instrument_node="">Private Sightseeing Tour</span></a></p><span data-dcnode-id="1962" instrument_node="">
</span><h3 data-dcnode-id="1958"><span data-dcnode-id="1961" instrument_node="">2. </span><a data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t193898/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris8" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1960" instrument_node="">Take a Cruise on the Seine</span></a></h3><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1934"><img alt="A tour boat cruising down the Seine river at sunset" class="alignnone size-full wp-image-54432" data-dcnode-id="1956" height="451" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-seine-cruise.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-seine-cruise.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-seine-cruise-624x402.jpeg 624w" width="700"><noscript data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-seine-cruise.jpeg" alt="A tour boat cruising down the Seine river at sunset" width="700" height="451" class="alignnone size-full wp-image-54432" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-seine-cruise.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-seine-cruise-624x402.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1953"><span data-dcnode-id="1952" instrument_node="">
A boat cruise on the Seine is a unique and easy way to take in many of the major sights of Paris at once. There are many options to choose from. Most companies offer a basic 1 hour deal that travels past the Eiffel Tower, Musee D’Orsay, the Louvre, Grand Palais, and Notre Dame Cathedral. All offer guided commentary, and prices are more or less the same, with </span><a class="darklink" data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vedettesdupontneuf.com/cruises/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1951" instrument_node="">Vedettes du Pont Neuf</span></a><span data-dcnode-id="1949" instrument_node=""> being the cheapest at 10 euros for a morning cruise and 12 euros for afternoon and evening tours if you buy your tickets online. Beyond pricing, you might want to consider which location is the most convenient for you. Vedettes du Pont Neuf starts and stops at the Pont Neuf bridge, while </span><a class="darklink" data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bateaux-mouches.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1948" instrument_node="">Bateaux Mouches</span></a><span data-dcnode-id="1946" instrument_node=""> starts in the 8th near the Grand Palais, and </span><a class="darklink" data-dcnode-id="1944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bateauxparisiens.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1945" instrument_node="">Bateaux Parisiens</span></a><span data-dcnode-id="1943" instrument_node=""> has two locations – one near the Eiffel Tower and the other near Notre Dame Cathedral. All companies offer an afternoon lunch cruise, typically costing between 40-60 euros. Dinner options are more expensive, with prices depending on things like seating (window table, front of the boat), entertainment, and other fancy add ons. For a more romantic excursion, plan a cruise at dusk so that you can watch the Eiffel Tower sparkle on the hour.</span><br data-dcnode-id="1942"><span data-dcnode-id="1941" instrument_node="">
</span><em data-dcnode-id="1935"><span data-dcnode-id="1940" instrument_node="">Metro for Vedettes du Pont Neuf: Pont Neuf</span><br data-dcnode-id="1939"><span data-dcnode-id="1938" instrument_node="">
Metro for Bateaux Mouches: Alma/Marceau</span><br data-dcnode-id="1937"><span data-dcnode-id="1936" instrument_node="">
Metro for Bateaux Parisiens: Bir-Hakeim or Trocadero</span></em></p><span data-dcnode-id="1933" instrument_node="">
</span><h3 data-dcnode-id="1929"><span data-dcnode-id="1932" instrument_node="">3. </span><a data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/skip-the-line-eiffel-tower-tour-with-summit-access-t62484/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris9" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1931" instrument_node="">Eiffel Tower</span></a></h3><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1912"><img alt="Eiffel Tower, as seen from the Trocadero across the Seine" class="alignnone size-full wp-image-54417" data-dcnode-id="1927" height="451" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-eiffel-tower.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-eiffel-tower.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-eiffel-tower-624x402.jpeg 624w" width="700"><noscript data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-eiffel-tower.jpeg" alt="Eiffel Tower, as seen from the Trocadero across the Seine" width="700" height="451" class="alignnone size-full wp-image-54417" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-eiffel-tower.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-eiffel-tower-624x402.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1924"><span data-dcnode-id="1923" instrument_node="">
A trip to Paris wouldn’t be complete without a visit to the </span><a class="darklink" data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toureiffel.paris/fr" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1922" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="1920" instrument_node="">, the city’s most iconic landmark. All first-time visitors brave the crowds and lines to ascend one of the most famous landmarks in the world. Built in 1889, the tower is 1,063 feet tall – roughly the same height as an 81 story building. All the major landmarks of Paris can be seen from the top, and in good weather you can even see as far as the Chartres Cathedral – 90 kilometers away. Tickets to the top are 17 euros for adults, 14.50 for ages 12-24 and 8 euros for kids aged 4-11 years old – you’ll save time by </span><a data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/skip-the-line-eiffel-tower-tour-with-summit-access-t62484/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris9" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1919" instrument_node="">buying your tickets online</span></a><span data-dcnode-id="1917" instrument_node=""> in advance (up to three months beforehand). If you do buy your tickets the day of your visit, take the stairs up to the second level floor and purchase tickets there – there will still be a line, but it’s shorter than the one at ground level. If you’ve been to the Eiffel Tower before, it’s worth a repeat visit now that the exclusive secret apartment of Gustave Eiffel has been revealed. Visitors can enjoy a peek into the private apartment at the top of the tower, used by Monsieur Eiffel to entertain such elite guests as Thomas Edison.</span><br data-dcnode-id="1916"><span data-dcnode-id="1915" instrument_node="">
</span><em data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Metro: Bir Hakeim or Ecole Militaire</span></em></p><span data-dcnode-id="1911" instrument_node="">
</span><h3 data-dcnode-id="1907"><span data-dcnode-id="1910" instrument_node="">4. </span><a data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/skip-the-line-visit-the-louvre-with-a-licensed-guide-t46070/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris14" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1909" instrument_node="">The Louvre</span></a></h3><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1890"><img alt="The Louvre Museum and glass pyramid" class="alignnone size-full wp-image-54425" data-dcnode-id="1905" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-louvre.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-louvre.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-louvre-624x401.jpeg 624w" width="700"><noscript data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-louvre.jpeg" alt="The Louvre Museum and glass pyramid" width="700" height="450" class="alignnone size-full wp-image-54425" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-louvre.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-louvre-624x401.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1902"><span data-dcnode-id="1901" instrument_node="">
The </span><a class="darklink" data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.louvre.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1900" instrument_node="">Louvre Museum</span></a><span data-dcnode-id="1898" instrument_node=""> is a must for any first time visitor to Paris, but there are few things to keep in mind. First, the Louvre is big. Don’t expect to see all of it in one visit. You’re better off strategizing beforehand, and prioritizing those particular pieces or exhibits you want to see. And with so much to see, you’ll need to take a breather. Once you have a ticket, readmission is no problem – enjoy a picnic lunch next door at the Jardin des Tuileries or a coffee at the nearby Palais Royal to recharge. Secondly, the Louvre will be crowded. You’ll save time </span><a data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/louvre-museum-l3224/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris14" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1897" instrument_node="">buying tickets online</span></a><span data-dcnode-id="1895" instrument_node=""> in advance, though you’ll still have to queue in a long security line. Avoid the worst crowds by visiting on a Wednesday or Friday evening, when the Louvre stays open until 9:45pm. The longest entrance line will inevitably be the one next to IM Pei’s Pyramid; better options are through the underground shopping mall or the entrance at the Porte des Lions. If you’re traveling with kids, it’s worth downloading the Louvre app or picking up one of the interactive Nintendo 3DS guides to help them navigate their visit. Or take them to the museum’s Tactile Gallery, a section of the Louvre with plaster or resin casts of the original sculptures. It was originally designed with the visually impaired in mind, so they could touch and feel the masterpieces up close, but everyone will enjoy having a more interactive experience with the artwork.</span><br data-dcnode-id="1894"><span data-dcnode-id="1893" instrument_node="">
</span><em data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Metro: Palais Royal-Musée du Louvre</span></em></p><span data-dcnode-id="1889" instrument_node="">
</span><h3 data-dcnode-id="1885"><span data-dcnode-id="1888" instrument_node="">5. </span><a data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/orsay-museum-must-see-tour-t41344/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris15" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1887" instrument_node="">Musée d’Orsay</span></a></h3><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1874"><img alt="Exterior photo of the Orsay Museum" class="alignnone size-full wp-image-9889" data-dcnode-id="1883" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/03/MuseeDOrsay-Attractions-Paris.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2017/03/MuseeDOrsay-Attractions-Paris.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/03/MuseeDOrsay-Attractions-Paris-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/03/MuseeDOrsay-Attractions-Paris-624x401.jpg 624w" width="700"><noscript data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/03/MuseeDOrsay-Attractions-Paris.jpg" alt="Exterior photo of the Orsay Museum" width="700" height="450" class="alignnone size-full wp-image-9889" srcset="https://santorinidave.com/wp-content/uploads/2017/03/MuseeDOrsay-Attractions-Paris.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/03/MuseeDOrsay-Attractions-Paris-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/03/MuseeDOrsay-Attractions-Paris-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1880"><span data-dcnode-id="1879" instrument_node="">
With one of the most impressive collections of Impressionist and post-Impressionist works in the world, the Musée d’Orsay will delight any lover of Van Gogh, Monet, or Renoir. The building was once a Belle Epoque train station, and is in itself a work of art, with stunning details throughout. The Musée d’Orsay was created ultimately as an artistic bridge, linking and filling in the gaps between the collections of the National Museum of Modern Art, the Musée du Jeu de Paume, and the Louvre. The Musée d’Orsay’s collection has been largely formed by works from those three institutions, and focuses primarily on Western art created between 1848 and 1914. Though most visitors come for the museum’s painting collections, they should not pass up the rooftop terrace with its views over the Paris rooftops. From its position on the left bank of the Seine, visitors can see out to the hills of Montmartre and Sacré Coeur.</span><br data-dcnode-id="1878"><span data-dcnode-id="1877" instrument_node="">
</span><em data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Metro: Assemblée Nationale</span></em></p><span data-dcnode-id="1873" instrument_node="">
</span><h3 data-dcnode-id="1869"><span data-dcnode-id="1872" instrument_node="">6. </span><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/paris-skip-the-line-arc-de-triomphe-tickets-t66157/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris16" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1871" instrument_node="">Arc de Triomphe</span></a></h3><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1855"><img alt="The majestic Arc de Triomphe in Paris, France" class="alignnone size-full wp-image-9279" data-dcnode-id="1867" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/10/Arc-de-Triomphe-Paris.jpg&amp;raw" width="700"><noscript data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/10/Arc-de-Triomphe-Paris.jpg" alt="The majestic Arc de Triomphe in Paris, France" width="700" height="450" class="alignnone size-full wp-image-9279" /&gt;</span></noscript><br data-dcnode-id="1864"><span data-dcnode-id="1863" instrument_node="">
A symbol of French patriotism, the stately </span><a class="darklink" data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.paris-arc-de-triomphe.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1862" instrument_node="">Arc de Triomphe</span></a><span data-dcnode-id="1860" instrument_node=""> was ordered by Napoleon, who famously told his soldiers, “You will return home through arches of triumph.” Finished in 1836, the arch is older than the Eiffel Tower, and engraved with the names of the first French Republic’s 128 battles, as well as those of the 558 generals who took part in them. At the base of the arch is an eternal flame, re-lit every evening at 6:30pm, commemorating the tomb of the Unknown Soldier. If you’re up for some exercise, climb to the top (the only way to get up) to admire the view. From there you can see down the Champs-Elysées, the Eiffel Tower and the enormous traffic ring that encircles the arch. Don’t attempt to cross it – there’s an underground tunnel on the Avenue de la Grande Armee. The best days to visit are on major national holidays like Armistice Day or Bastille Day, when the day starts off with a military parade along the Champs-Elysées and the arch is decked out with a giant flag. Otherwise, go around sunset for the nicest views.</span><br data-dcnode-id="1859"><span data-dcnode-id="1858" instrument_node="">
</span><em data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Metro: Charles de Gaulle-Étoile</span></em></p><span data-dcnode-id="1854" instrument_node="">
</span><h3 data-dcnode-id="1850"><span data-dcnode-id="1853" instrument_node="">7. </span><a data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/notre-dame-cathedral-private-family-tour-with-binoculars-t168801/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris17" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1852" instrument_node="">Notre Dame</span></a></h3><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1833"><img alt="Notre Dame Tours in Paris." class="alignnone size-full wp-image-9670" data-dcnode-id="1848" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-paris-notre-dame-tour.jpg&amp;raw" width="700"><noscript data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-paris-notre-dame-tour.jpg" alt="Notre Dame Tours in Paris." width="700" height="450" class="alignnone size-full wp-image-9670" /&gt;</span></noscript><br data-dcnode-id="1845"><span data-dcnode-id="1844" instrument_node="">
</span><em data-dcnode-id="1839"><span data-dcnode-id="1843" instrument_node="">Update: Access is closed due to the fire but this tour of the </span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/notre-dame-cathedral-private-family-tour-with-binoculars-t168801/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris17a" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1842" instrument_node="">Île de la Cité and area</span></a><span data-dcnode-id="1840" instrument_node=""> is an excellent way to learn the history of the Notre Dame. Immortalized in literature and films, Notre Dame Cathedral is a masterpiece of French gothic architecture.</span></em><span data-dcnode-id="1838" instrument_node=""> The church itself is over 800 years old, and took over 300 years to build. Even if you aren’t religious, you’ll appreciate its magnificent structure, sculptures and stained glass. Highlights include the famous stained glass Rose Windows, and the many individually carved sculptures and gargoyles. In the South Tower is the Notre Dame’s oldest and most famous bell “Emmanuel,” which weighs over 28,000 pounds. Climb up the narrow 387 steps to the top to have a closer look, as well as to enjoy a stunning view from above. It’s an active Catholic church, so daily vespers and Sunday services are held, but no time is as special as Christmas Eve – A full program of Christmas carols sung by a children’s choir starts at 4:30pm, continuing throughout the night until the 11:55pm ringing of the church bell, which signals the beginning of midnight mass.</span><br data-dcnode-id="1837"><span data-dcnode-id="1836" instrument_node="">
</span><em data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Metro: Cité</span></em></p><span data-dcnode-id="1832" instrument_node="">
</span><h3 data-dcnode-id="1828"><span data-dcnode-id="1831" instrument_node="">8. </span><a data-dcnode-id="1829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/sacre-coeur-and-dome-with-expert-tour-guide-t74304/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris18" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1830" instrument_node="">Sacre-Couer</span></a></h3><span data-dcnode-id="1827" instrument_node="">
</span><p data-dcnode-id="1808"><img alt="Sacre Couer cathedral in Paris" class="alignnone size-full wp-image-54428" data-dcnode-id="1826" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-sacre-coeur.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-sacre-coeur.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-sacre-coeur-624x401.jpeg 624w" width="700"><noscript data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-sacre-coeur.jpeg" alt="Sacre Couer cathedral in Paris" width="700" height="450" class="alignnone size-full wp-image-54428" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-sacre-coeur.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-sacre-coeur-624x401.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1823"><span data-dcnode-id="1822" instrument_node="">
Many people come to </span><a class="darklink" data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sacre-coeur-montmartre.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1821" instrument_node="">Sacré-Coeur</span></a><span data-dcnode-id="1819" instrument_node=""> church to admire the views from its Montmartre hilltop perch, but the Basilica and surrounding area have much to offer, as well. In contrast to the Gothic churches of the Middle Ages like Notre Dame, Sacré-Coeur was inspired by structures like the Hagia Sophia in Istanbul and San Marco in Venice. Once you ascend the summit (either by foot or the funicular), you’ll notice that the atmosphere is lively with street performers and people picnicking on the grass. Continue climbing up, and you’ll get an amazing view from its 271-ft high dome, one of the highest points in the city. Once inside, settle into silence (required, as this is an active church) and appreciate the incredible golden mosaic, one of the largest of its kind, depicting Christ with a golden heart and outstretched arms. Afterwards, grab lunch and a squid ink baguette not too far away at </span><a class="darklink" data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gontran-cherrier.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1818" instrument_node="">Gontran Cherrier</span></a><span data-dcnode-id="1816" instrument_node=""> or head down Rue Lepic. Fans of the movie Amelie will recognize the carousel at the base of Sacré-Coeur, as well as the Café des Deux Moulins, where she worked as a waitress. Continue further down the hill and head towards </span><a class="darklink" data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/transport/73172/Rue-des-Martyrs" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1815" instrument_node="">Rue des Martyrs</span></a><span data-dcnode-id="1813" instrument_node="">, one of the best streets in Paris, for a slice of village life.</span><br data-dcnode-id="1812"><span data-dcnode-id="1811" instrument_node="">
</span><em data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Metro: Anvers</span></em></p><span data-dcnode-id="1807" instrument_node="">
</span><h3 data-dcnode-id="1803"><span data-dcnode-id="1806" instrument_node="">9. </span><a data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/-t56388/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris8a" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1805" instrument_node="">Versailles</span></a></h3><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1775"><img alt="Beautiful chateau at Fontainebleau, France " class="size-full wp-image-8940" data-dcnode-id="1801" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/Fountainebleau-chateau-Paris-1.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Fountainebleau-chateau-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Fountainebleau-chateau-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Fountainebleau-chateau-Paris-1-624x401.jpg 624w" width="700"><noscript data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">&lt;img loading="lazy" loading="lazy" class="size-full wp-image-8940" src="https://santorinidave.com/wp-content/uploads/2016/09/Fountainebleau-chateau-Paris-1.jpg" alt="Beautiful chateau at Fontainebleau, France " width="700" height="450" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Fountainebleau-chateau-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Fountainebleau-chateau-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Fountainebleau-chateau-Paris-1-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1798"><span data-dcnode-id="1797" instrument_node="">
Note: The best way to see everything is on one of the wonderfully awesome </span><a data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fattiretours.com/paris/tours/Versailles-Bike-Tour%3Fref%3Dsdtravel" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1796" instrument_node="">Fat Tire Bike Tours of Versailles</span></a><span data-dcnode-id="1794" instrument_node="">. With its majestic palace and manicured gardens, Versailles should not be missed. Though Versailles can appear daunting due to its massive size and (no matter what time of year) massive crowds, a fun way to cover a lot of ground and avoid the masses is to do a </span><a data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fattiretours.com/paris/tours/Versailles-Bike-Tour%3Fref%3Dsdtravel" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1793" instrument_node="">bike tour of Versailles</span></a><span data-dcnode-id="1791" instrument_node=""> or rent bikes. Within Chateau de Versailles Park there are 3 bike rental locations, starting at 6.50 euros/1 hour or 17 euros for the day. Getting to Versailles from Paris is an easy train ride that should take less than an hour – most people take the </span><a class="darklink" data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parisbytrain.com/rer-c-train-map/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1790" instrument_node="">RER C</span></a><span data-dcnode-id="1788" instrument_node=""> because it stops near popular tourist sites like the </span><a class="darklink" data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.musee-orsay.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1787" instrument_node="">Musee d’Orsay</span></a><span data-dcnode-id="1785" instrument_node="">. At about 8 euros round trip, this is the cheapest option. (Note that the RER C line branches off and you want to make sure you are getting off at “Versailles Chateau Rives Gauche.”) If you want to beat the crowds or just get out of town for the day, there are several other noteworthy chateaus within an hour of Paris and all worth visiting. The village of Fontainebleu has a beautiful </span><a class="darklink" data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chateaudefontainebleau.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1784" instrument_node="">medieval castle</span></a><span data-dcnode-id="1782" instrument_node=""> that was once the residence of Louis VII and Napoleon III, and is now a UNESCO World Heritage Site. And the stunning chateau in Chantilly houses the </span><a class="darklink" data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chateaudechantilly.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1781" instrument_node="">Musée Condé</span></a><span data-dcnode-id="1779" instrument_node="">, where you’ll find an impressive art collection of 15th and 16th century works in addition to dedicated activities for children. You can read more about visiting Versailles from Paris </span><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/versailles-from-paris" rel="noopener" target="_blank"><span data-dcnode-id="1778" instrument_node="">here</span></a><span data-dcnode-id="1776" instrument_node="">.</span></p><span data-dcnode-id="1774" instrument_node="">
</span><h3 data-dcnode-id="1770"><span data-dcnode-id="1773" instrument_node="">10. </span><a data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/full-champagne-wine-day-tour-from-paris-t68846/%3Fpartner_id%3DSOFBH69%26cmp%3Dparis-champ" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1772" instrument_node="">Champagne Tasting in Champagne</span></a></h3><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1739"><img alt="Vineyards at Montagne de Reims, France" class="alignnone size-full wp-image-8941" data-dcnode-id="1768" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/Reims-Champagne-Paris-1.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Reims-Champagne-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Reims-Champagne-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Reims-Champagne-Paris-1-624x401.jpg 624w" width="700"><noscript data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">&lt;img loading="lazy" loading="lazy" class="alignnone size-full wp-image-8941" src="https://santorinidave.com/wp-content/uploads/2016/09/Reims-Champagne-Paris-1.jpg" alt="Vineyards at Montagne de Reims, France" width="700" height="450" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Reims-Champagne-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Reims-Champagne-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Reims-Champagne-Paris-1-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1765"><span data-dcnode-id="1764" instrument_node="">
With its world famous cellars, the Champagne region is an easy day trip from Paris. Reims, one of the area’s most important cities and home to many of the biggest names in bubbly, is 45 minutes away by train. There you’ll be able to tour and taste at some of the most famous Champagne houses in the world, like </span><a class="darklink" data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ruinart.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1763" instrument_node="">Ruinart</span></a><span data-dcnode-id="1761" instrument_node="">, </span><a class="darklink" data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.veuveclicquot.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1760" instrument_node="">Veuve Cliquot</span></a><span data-dcnode-id="1758" instrument_node="">, and </span><a class="darklink" data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taittinger.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1757" instrument_node="">Taittinger</span></a><span data-dcnode-id="1755" instrument_node=""> (a standout – the cellars are housed in a former 13th century abbey). Getting to Reims is pretty straightforward, and the train drops off in the city center. Most cellars are walkable from the train station, with </span><a class="darklink" data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mumm.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1754" instrument_node="">G. H. Mumm</span></a><span data-dcnode-id="1752" instrument_node=""> and </span><a class="darklink" data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.champagnedecazanove.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1751" instrument_node="">Champagne Charles de Cazanove</span></a><span data-dcnode-id="1749" instrument_node=""> about 10 minutes away by foot, and all offer tours for a small entry fee. Numerous trains (almost 20 per day) run from Gare de l’Est, with one way ticket prices starting at 15 euros. Tickets are bookable via the French rail system </span><a class="darklink" data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sncf.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1748" instrument_node="">SNCF</span></a><span data-dcnode-id="1746" instrument_node=""> – just be sure to book the high speed 45 minute TGV trains which run direct or you’ll be stuck on the slower TER trains which can take nearly 2 hours. If you happen to be in Paris in early December, head to </span><a class="darklink" data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.ot-epernay.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1745" instrument_node="">Epernay</span></a><span data-dcnode-id="1743" instrument_node="">, where every second weekend is the </span><a class="darklink" data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//habitsdelumiere.epernay.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1742" instrument_node="">Habits de Lumière</span></a><span data-dcnode-id="1740" instrument_node=""> festival, a 3-day long celebration where all the houses along the Avenue de Champagne throw open their doors for a big party complete with tastings, live bands and a parade.</span></p><span data-dcnode-id="1738" instrument_node="">
</span><h3 data-dcnode-id="1734"><span data-dcnode-id="1737" instrument_node="">11. </span><a data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/market-visit-and-cooking-class-with-chef-marthe-t11768/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris10a" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1736" instrument_node="">Take a Cooking Class</span></a></h3><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1713"><img alt="Classic French Mussels Dish" class="alignnone size-full wp-image-9032" data-dcnode-id="1732" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/Cooking-class-Paris-1.jpg&amp;raw" width="700"><noscript data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/09/Cooking-class-Paris-1.jpg" alt="Classic French Mussels Dish" width="700" height="450" class="alignnone size-full wp-image-9032" /&gt;</span></noscript><br data-dcnode-id="1729"><span data-dcnode-id="1728" instrument_node="">
Cooking classes are a wonderful, hands-on way to enjoy the delights of French food. With so many classes to choose from, you can take a course with anyone from a French home cook to a top chef. Channel your inner Julia Child at </span><a class="darklink" data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cordonbleu.edu/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1727" instrument_node="">Le Cordon Bleu</span></a><span data-dcnode-id="1725" instrument_node="">, where the woman who brought French food to the States first started her famous career. The school offers lots of classes to choose from – everything from a full French meal to a bread making course, and even “Les Petits Cordons Bleus” classes for 8-12 year olds. The fun starts at 9am, when students join chef Paule Caillat on a stroll through a French market to pick out and purchase ingredients. Then head to her personal kitchen to prepare and enjoy a full meal together. For a “top chef” experience, take a class with Top Chef finalist </span><a class="darklink" data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pierresang.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1724" instrument_node="">Pierre Sang Boyer</span></a><span data-dcnode-id="1722" instrument_node=""> at one of his top rated restaurants. One of the most talked about chefs in Paris, Boyer is of Korean heritage, and students have the option of taking a traditional French cooking class, a Korean version, or chance to shop along with him at a local market. He even has a class with recipes tailored just for kids.</span><br data-dcnode-id="1721"><span data-dcnode-id="1720" instrument_node="">
</span><em data-dcnode-id="1714"><span data-dcnode-id="1719" instrument_node="">Metro for Le Cordon Bleu: Charles Michels</span><br data-dcnode-id="1718"><span data-dcnode-id="1717" instrument_node="">
Metro for Promenades Gourmandes: Arts et Metiers</span><br data-dcnode-id="1716"><span data-dcnode-id="1715" instrument_node="">
Metro for Pierre Sang Boyer: Oberkampf</span></em></p><span data-dcnode-id="1712" instrument_node="">
</span><h3 data-dcnode-id="1708"><span data-dcnode-id="1711" instrument_node="">12. </span><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/paris-gourmet-marais-t55274/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris10b" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1710" instrument_node="">Take a Food Tour</span></a></h3><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1695"><img alt="Best food tours in Paris." class="alignnone size-full wp-image-9678" data-dcnode-id="1706" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-good-food-tour.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-good-food-tour.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-good-food-tour-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-good-food-tour-624x401.jpg 624w" width="700"><noscript data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-good-food-tour.jpg" alt="Best food tours in Paris." width="700" height="450" class="alignnone size-full wp-image-9678" srcset="https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-good-food-tour.jpg 700w, https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-good-food-tour-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-do-in-paris-good-food-tour-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1703"><span data-dcnode-id="1702" instrument_node="">
Food tours are a fun way to get an overview of French cuisine and discover a Parisian neighborhood at the same time. There are lots of options out there and each company handles the format differently, but two of the best are Culinary Tours of Paris and Paris by Mouth. </span><a class="darklink" data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culinarytoursofparis.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1701" instrument_node="">Culinary Tours of Paris</span></a><span data-dcnode-id="1699" instrument_node=""> visits three different restaurants, eating one course of a meal at each: appetizers, main course, and dessert. In between stops, guests learn the historical background of the area. These tours generally last 3 ½ hours and cost 110 euros per person. </span><a class="darklink" data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parisbymouth.com/food-wine-tours/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1698" instrument_node="">Paris by Mouth</span></a><span data-dcnode-id="1696" instrument_node=""> food tours are led by guides that have a deep background in the food industry, and focus on high quality producers. (The wine tour is led by a former sommelier for Mario Batali.) These neighborhood-centric tours include stops at award-winning vendors for bread, pastry, charcuterie, cheese, chocolate, and wine, with variations to showcase the best of each area. Groups spend the first hour or so visiting each of these places and learning lots of useful information before settling in at a wine shop for a cozy picnic (or grand tasting), paired with a few bottles of wine. The tours are family friendly and can provide juice for children. The price is 95 euros per person – tasting fees included – and tours generally last three hours.</span></p><span data-dcnode-id="1694" instrument_node="">
</span><h3 data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">13. Paris through the Ages</span></h3><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1666"><img alt="The Pantheon in Paris" class="alignnone size-full wp-image-54418" data-dcnode-id="1690" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-pantheon.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-pantheon.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-pantheon-624x401.jpeg 624w" width="700"><noscript data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-pantheon.jpeg" alt="The Pantheon in Paris" width="700" height="450" class="alignnone size-full wp-image-54418" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-pantheon.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-pantheon-624x401.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1687"><span data-dcnode-id="1686" instrument_node="">
Many people don’t realize that Paris was once an outpost of the Roman empire, with some of its ruins are still intact, or that one of the most technologically advanced buildings in France stands in the city center. For architecture enthusiasts, the </span><a class="darklink" data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripsavvy.com/guide-to-the-5th-arrondissement-1618702" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1685" instrument_node="">5th arrondissement</span></a><span data-dcnode-id="1683" instrument_node=""> has treasures from almost every era, ranging from Roman ruins and the fortress like Medieval museum, to the neoclassical Pantheon and the innovative Institut du Monde Arabe. Nowhere else can you find such a diverse array of architectural styles in such a relatively small geographic area. Start at the </span><a class="darklink" data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.musee-moyenage.fr/en/site/the-ancient-thermae.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1682" instrument_node="">Thermes de Cluny</span></a><span data-dcnode-id="1680" instrument_node="">, the ruins of Roman baths dating from the third century when Paris was known as Lutetia. A portion of the baths, now considered an archeological site, is visible from the Boulevard Saint Michel, though much of it (including the impressive frigidarium, which still retains fragments of original wall painting and mosaics) has been incorporated into the </span><a class="darklink" data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.musee-moyenage.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1679" instrument_node="">Musée National du Moyen Age</span></a><span data-dcnode-id="1677" instrument_node="">, next door. The Musée itself is a well preserved example of medieval Parisian architecture; built in 1334 to house the abbots of Cluny, the structure has Gothic and Renaissance elements and was converted to a public museum in 1843. About a ten minute walk away is the 18th century </span><a class="darklink" data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71071/Pantheon" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1676" instrument_node="">Pantheon</span></a><span data-dcnode-id="1674" instrument_node="">. Its luminous dome and neoclassic façade were completed in 1790, and it now houses the remains of famous Frenchmen like Voltaire and Victor Hugo. About a fifteen minute stroll towards the Seine is the </span><a class="darklink" data-dcnode-id="1672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imarabe.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1673" instrument_node="">Institut du Monde Arabe</span></a><span data-dcnode-id="1671" instrument_node="">, exceptional in its postmodern construction and use of technology. At first glance, the exterior of the building appears to be covered in a repeating pattern of geometric shapes, but upon further inspection you’ll discover that these are actually 240 photo-sensitive motor-controlled apertures, like camera shutters, that automatically open and close to control the light that enters the building and create a filtered effect inside.</span><br data-dcnode-id="1670"><span data-dcnode-id="1669" instrument_node="">
</span><em data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Metro: Cluny-La Sorbonne</span></em></p><span data-dcnode-id="1665" instrument_node="">
</span><h3 data-dcnode-id="1661"><span data-dcnode-id="1664" instrument_node="">14. </span><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/disneyland-paris-2-parks-ticket-1-2-3-4-5-day-t19562/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris10" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1663" instrument_node="">Disneyland</span></a></h3><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1645"><img alt="Disneyland theme park in Paris, France " class="alignnone size-full wp-image-8977" data-dcnode-id="1659" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/Disneyland-Paris-1.jpg&amp;raw" width="700"><noscript data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/09/Disneyland-Paris-1.jpg" alt="Disneyland theme park in Paris, France " width="700" height="450" class="alignnone size-full wp-image-8977" /&gt;</span></noscript><br data-dcnode-id="1656"><span data-dcnode-id="1655" instrument_node="">
If you’ve been to the other locations, you’ll be familiar with most of the attractions in </span><a class="darklink" data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disneylandparis.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1654" instrument_node="">Disneyland Paris</span></a><span data-dcnode-id="1652" instrument_node="">, but it’s still worth a visit to see your favorite characters a la Francaise: The new live show at the park’s Animagique Theater, ‘</span><a class="darklink" data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disneylandparis.com/en-us/entertainment/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1651" instrument_node="">Mickey and the Magician</span></a><span data-dcnode-id="1649" instrument_node="">,’ stars Mickey as a magician’s assistant in 19th century Paris. Getting out to Disneyland Paris is easy – If you’re staying in the city center, you can pick up the RER A train (red line) from several points around Paris. (Note that the RER trains serve suburban commuters and require a different ticket than the metro.) Line A ends at Marne la Vallée just next to the gates of Disney Village and the theme parks at Disneyland. A single ride ticket will cost about 8 euros, and the trip takes about 45 minutes. Depending on how seriously you want to tackle the park, most people find one day enough and don’t feel it necessary to spend the night. If you do prefer to stay out there, the best hotel is </span><a class="darklink" data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disneylandparis.com/en-us/hotels/disneyland-hotel/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1648" instrument_node="">Disneyland Hotel Marne La Valle</span></a><span data-dcnode-id="1646" instrument_node=""> situated right by the park entrance. Those heading straight to Disneyland from the airport can take a direct TGV train from Charles de Gaulle Airport to the stop Marne la Vallée-Chessy (Disneyland Paris). The whole trip takes under 20 minutes, with ticket prices ranging between €15 and €20 depending on the time of the train.</span></p><span data-dcnode-id="1644" instrument_node="">
</span><h3 data-dcnode-id="1640"><span data-dcnode-id="1643" instrument_node="">15. </span><a data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/paris-catacombs-skip-the-line-ticket-t66985/%3Fpartner_id%3DSOFBH69%26cmp%3Dhd-paris11" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1642" instrument_node="">Underground Paris</span></a></h3><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1610"><img alt="Piles of human bones and a signpost in French in the Parisian catacombs" class="alignnone size-full wp-image-54408" data-dcnode-id="1638" height="451" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-catacombs.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-catacombs.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-catacombs-624x402.jpeg 624w" width="700"><noscript data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-catacombs.jpeg" alt="Piles of human bones and a signpost in French in the Parisian catacombs" width="700" height="451" class="alignnone size-full wp-image-54408" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-catacombs.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-catacombs-624x402.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1635"><span data-dcnode-id="1634" instrument_node="">
Beneath the city streets of Paris lie vast networks of tunnels, sewers and canals that are unbeknownst to most visitors and offer an otherworldly look into Parisian history. The most famous of these are the </span><a class="darklink" data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.catacombes.paris.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1633" instrument_node="">Catacombs</span></a><span data-dcnode-id="1631" instrument_node="">: between 1785 and 1860, in order to relieve overcrowding and eradicate disease in Parisian cemeteries, some six million bodies were dug up and moved into these former limestone quarries, part of a larger network of 180 miles of tunnels and mines. Another popular underground attraction is the </span><a class="darklink" data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/paris-museum-monument/71499/Musee-des-egouts-de-Paris" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1630" instrument_node="">Musée des égouts</span></a><span data-dcnode-id="1628" instrument_node="">: a fascinating museum devoted to the city’s sewer system. Highlighting the work of prefect Baron Haussmann, who changed the cityscape of Paris in the 1850s, the Musée des égouts takes you into a portion of what many consider to be his finest accomplishment – Paris’ 1,300 mile sewage system. Haussmann also gave Paris the </span><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/activity/paris-l16/cruise-on-the-seine-canal-st-martin-930am-t5671%3Fpartner_id%3DSOFBH69%26cmp%3Dparis" rel="noopener sponsored" target="_blank"><span data-dcnode-id="1627" instrument_node="">Canal St. Martin</span></a><span data-dcnode-id="1625" instrument_node="">, a portion of which runs underground beneath the Place de la Bastille. </span><a class="darklink" data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canauxrama.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1624" instrument_node="">Boat cruises</span></a><span data-dcnode-id="1622" instrument_node=""> of the canal pass through this 19th century tunnel, where visitors can see a crypt containing the remains of nearly 500 victims of the 1830 revolution. Aboveground, each victim’s name is inscribed on the Colonne de Juillet. Finally, if you’re visiting the Louvre, be sure to check out the basement. There you’ll find the </span><a class="darklink" data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.louvre.fr/en/explore/the-palace/the-history-of-the-louvre-on-display%23tabs" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1621" instrument_node="">excavated foundations of the royal castle</span></a><span data-dcnode-id="1619" instrument_node=""> which existed on the site between 1190 and the 16th century.</span><br data-dcnode-id="1618"><span data-dcnode-id="1617" instrument_node="">
</span><em data-dcnode-id="1611"><span data-dcnode-id="1616" instrument_node="">Metro for Musée des égouts: Alma-Marceau</span><br data-dcnode-id="1615"><span data-dcnode-id="1614" instrument_node="">
Metro for the Catacombs: Denfert-Rochereau</span><br data-dcnode-id="1613"><span data-dcnode-id="1612" instrument_node="">
Metro for the Canauxrama Boat Tour: Bastille</span></em></p><span data-dcnode-id="1609" instrument_node="">
</span><h3 data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">16. Sweets on Rue du Bac</span></h3><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1578"><img alt="Enjoy French Pastries on the Rue du Bac" class="size-full wp-image-8936" data-dcnode-id="1605" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/Pastries-Paris-1.jpg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Pastries-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Pastries-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Pastries-Paris-1-624x401.jpg 624w" width="700"><noscript data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">&lt;img loading="lazy" loading="lazy" class="size-full wp-image-8936" src="https://santorinidave.com/wp-content/uploads/2016/09/Pastries-Paris-1.jpg" alt="Enjoy French Pastries on the Rue du Bac" width="700" height="450" srcset="https://santorinidave.com/wp-content/uploads/2016/09/Pastries-Paris-1.jpg 700w, https://santorinidave.com/wp-content/uploads/2016/09/Pastries-Paris-1-300x193.jpg 300w, https://santorinidave.com/wp-content/uploads/2016/09/Pastries-Paris-1-624x401.jpg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1602"><span data-dcnode-id="1601" instrument_node="">
For anyone with a sweet tooth, Rue du Bac is not to be missed. In just a three block span, you’ll encounter several of Paris’s best pastry and chocolate shops clustered together north of Le Bon Marche. Kids will love the whimsical pink interior and pastries displayed under glass cloche. The shop, though small, feels like an edible museum with their takes on a deconstructed Baba au Rhum (a kit you assemble yourself), their enormous sculptural brioche, and their not to be missed Paris-Brest pastry filled with hazelnut cream. Kids will love the whimsical pink interior and pastries displayed under glass cloche. Next up is Des </span><a class="darklink" data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.desgateauxetdupain.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1600" instrument_node="">Gâteaux et Du Pain</span></a><span data-dcnode-id="1598" instrument_node="">, a boulangerie/patisserie from Claire Damon, who makes some of the most beautiful pastries with unusual combinations. Try the “Vert Absinthe,” a delicate tart flavored with lime, mint, green tomato, and angelica confit. Just next door is </span><a class="darklink" data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jacquesgenin.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1597" instrument_node="">Jacques Genin</span></a><span data-dcnode-id="1595" instrument_node="">, known for his chocolates, caramels and pâtes de fruits. He built his reputation supplying chocolates and sweets to many of the top luxury hotels in Paris (the Plaza Athénée and Le Meurice, among others), and his mango passionfruit caramels are the stuff of legend. Finish off at the shop of </span><a class="darklink" data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chocolat-chapon.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1594" instrument_node="">Patrice Chapon</span></a><span data-dcnode-id="1592" instrument_node="">, former ice cream maker for the Queen of England. His talents have transitioned to chocolate, and his fabulous chocolate mousses – available in several flavors – come served up like an ice cream cone. Other highlights along Rue du Bac include the Belgian chocolatier </span><a class="darklink" data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eu.marcolini.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1591" instrument_node="">Pierre Marcolini</span></a><span data-dcnode-id="1589" instrument_node="">, an outpost of </span><a class="darklink" data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.angelina-paris.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1588" instrument_node="">Angelina</span></a><span data-dcnode-id="1586" instrument_node=""> (famous for their hot chocolate), and </span><a class="darklink" data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dalloyau.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1585" instrument_node="">Dalloyau</span></a><span data-dcnode-id="1583" instrument_node=""> (credited with inventing the Opéra cake).</span><br data-dcnode-id="1582"><span data-dcnode-id="1581" instrument_node="">
</span><em data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Metro: Sèvres-Babylone</span></em></p><span data-dcnode-id="1577" instrument_node="">
</span><h3 data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">17. Place des Vosges</span></h3><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1558"><img alt="Fountain and green lawn surrounded by Haussman-style buildings in Paris" class="alignnone size-full wp-image-54409" data-dcnode-id="1573" height="450" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2020/10/paris-attraction-place-des-vosges.jpeg&amp;raw" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-place-des-vosges.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-place-des-vosges-624x401.jpeg 624w" width="700"><noscript data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-place-des-vosges.jpeg" alt="Fountain and green lawn surrounded by Haussman-style buildings in Paris" width="700" height="450" class="alignnone size-full wp-image-54409" srcset="https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-place-des-vosges.jpeg 700w, https://santorinidave.com/wp-content/uploads/2020/10/paris-attraction-place-des-vosges-624x401.jpeg 624w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><br data-dcnode-id="1570"><span data-dcnode-id="1569" instrument_node="">
Take a stroll under the vaulted arches of the oldest square in Paris. With its beautiful 17th century architecture, large grassy area and kid’s playground, </span><a class="darklink" data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/transport/73189/Place-des-Vosges" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1568" instrument_node="">Place des Vosges</span></a><span data-dcnode-id="1566" instrument_node=""> is the perfect place to take a break from the busy activity of the Marais, and long predates all the hip boutiques and bars in this trendy neighborhood. Four centuries ago, the square was the home of King Henry II and Queen Catherine de Medici, and was known as the Palais des Tournelles. Henry IV christened it the Place Royale in 1612, and it became the center of royal festivities until its final incarnation during the French revolution, when it was renamed the Place des Vosges to honor the first department to pay taxes to Napoleon’s republic. Over the years, the picturesque red brick and stone houses, nine along each side of the square, have attracted a number of famous residents – Victor Hugo being the most famous among them. No. 6 Place des Vosges is the </span><a class="darklink" data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.maisonsvictorhugo.paris.fr/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1565" instrument_node="">Maison de Victor Hugo</span></a><span data-dcnode-id="1563" instrument_node="">, a museum of the famous author’s home of 16 years. There are numerous cafes, restaurants, shops, and galleries that line the formal garden, but the best part of Place des Vosges might be the little bit of tranquility it offers within the city center. Sip a coffee under the arches, or find a spot on the grass and enjoy a picnic. If you’re traveling with kids, they can enjoy the playground while you people watch.</span><br data-dcnode-id="1562"><span data-dcnode-id="1561" instrument_node="">
</span><em data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Metro: Saint Paul</span></em></p><span data-dcnode-id="1557" instrument_node="">
</span><h3 data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">18. Go for Crepes</span></h3><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1532"><img alt="Where to buy crepes in Paris." class="alignnone size-full wp-image-9668" data-dcnode-id="1553" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2017/01/best-things-to-ear-paris-crepes.jpg&amp;raw" width="700"><noscript data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2017/01/best-things-to-ear-paris-crepes.jpg" alt="Where to buy crepes in Paris." width="700" height="450" class="alignnone size-full wp-image-9668" /&gt;</span></noscript><br data-dcnode-id="1550"><span data-dcnode-id="1549" instrument_node="">
You’ll find crepes practically everywhere in Paris – from late night street vendors to farmer’s market stalls and gourmet creperies – but the best can be found in the city’s 14th arrondissement, home to a large Breton community. (Crepes are Brittany’s most well-known and loved culinary export.) The bulk of creperies are located near the soaring Montparnasse Tower, positioned one after the other with over a dozen to choose from. For a traditional – and delicious – experience, choose the </span><em data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">galette complète</span></em><span data-dcnode-id="1546" instrument_node=""> (a hearty buckwheat crepe with gruyere cheese, ham, and egg) at </span><a class="darklink" data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//parisbymouth.com/creperie-josselin/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1545" instrument_node="">Creperie Josselin</span></a><span data-dcnode-id="1543" instrument_node="">. The place is constantly hopping with tourists and regulars alike, most tucking in to the restaurant’s famous </span><em data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">couple</span></em><span data-dcnode-id="1540" instrument_node=""> – a decadent double stacked galette with your choice of filling in the middle. For a more upscale take on the crepe, trek over to the </span><a class="darklink" data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.breizhcafe.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1539" instrument_node="">Breizh Café</span></a><span data-dcnode-id="1537" instrument_node=""> in the Marais for a gussied up version filled with organic ingredients and refined combinations like seared scallops and tarragon cream. Whichever you prefer, don’t forget to wash everything down with some Breton cider.</span><br data-dcnode-id="1536"><span data-dcnode-id="1535" instrument_node="">
</span><em data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Metro: Edgar Quintet</span></em></p><span data-dcnode-id="1531" instrument_node="">
</span><h3 data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">19. Montparnasse Tower</span></h3><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1506"><img alt="The best views in Paris are from the Montparnasse Tower" class="alignnone size-full wp-image-8963" data-dcnode-id="1527" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//santorinidave.com/wp-content/uploads/2016/09/Montparnasse-Tower-View-Paris-1.jpg&amp;raw" width="700"><noscript data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">&lt;img loading="lazy" loading="lazy" src="https://santorinidave.com/wp-content/uploads/2016/09/Montparnasse-Tower-View-Paris-1.jpg" alt="The best views in Paris are from the Montparnasse Tower" width="700" height="450" class="alignnone size-full wp-image-8963" /&gt;</span></noscript><br data-dcnode-id="1524"><span data-dcnode-id="1523" instrument_node="">
The </span><a class="darklink" data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tourmontparnasse56.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1522" instrument_node="">Montparnasse Tower</span></a><span data-dcnode-id="1520" instrument_node=""> boasts some of the best views to be found in Paris. The modern skyscraper’s 56th-floor observation center offers visitors a 360 degree panorama of the city that includes the Eiffel Tower, creating one of the most </span><a class="darklink" data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.huffpost.com/entry/tour-montparnasse_n_5609433" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1519" instrument_node="">postcard perfect photo opportunities</span></a><span data-dcnode-id="1517" instrument_node=""> around. Because it’s highly underrated as a tourist destination, there are few (if any) lines to get in, and the open air observation spaces are relatively crowd free. The Tower’s elevator is one of the fastest in Europe, reaching the 56th floor in a record 38 seconds. Get a snack at the Tower’s </span><a class="darklink" data-dcnode-id="1515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tourmontparnasse56.com/en/experience/panoramic-observation-deck/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1516" instrument_node="">360 Café</span></a><span data-dcnode-id="1514" instrument_node=""> or the Tower’s seasonal champagne bar (summer only). For a gourmet dining experience, book a table at Le </span><a class="darklink" data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cieldeparis.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1513" instrument_node="">Ciel de Paris</span></a><span data-dcnode-id="1511" instrument_node=""> (the Paris Sky), the highest panoramic restaurant in the city.</span><br data-dcnode-id="1510"><span data-dcnode-id="1509" instrument_node="">
</span><em data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Metro: Edgar Quintet</span></em></p><span data-dcnode-id="1505" instrument_node="">
</span><h3 data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">20. Cimetière du Père Lachaise</span></h3><span data-dcnode-id="1502" instrument_node="">
