</span></p><p data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">Tours include media presentations, exhibits, and commentary by guides that serve to educate visitors about the dam's features and operations, while the Dam Tour even includes exploring passages within the dam itself. For visitors planning to both take a tour and look around the structure, it's recommended to plan for at least 2 hours on site.

		Through the interactive re-telling of true stories, this unique museum covers the history of organized crime in America and the law's attempts to combat it. The museum is home to hundreds of artifacts, which are integrated into the storyline of each exhibit and which track the mob in America from the late 19th century to today. 
</span></p><p data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">Events such as the St. Valentine's Day Massacre and mob relationships with Hollywood and politicians are explored, as is the pivotal role of the Prohibition in the mob's legacy in America. The museum provides a comprehensive look into how deeply the mob has influenced American culture, economics, and politics over the last century.

		Located near the basin that served as a major stopover for settlers traveling on the Cave Valley Road, this park is named for the six historic charcoal ovens located on site. The beehive-shaped ovens were in operation between 1876 and 1879, during the silver boom period. 
</span></p><p data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">Once their purpose of producing charcoal ceased, they served to shelter people during bad weather and rumor has it that bandits used the ovens as a hideout. The park provides plenty of recreational resources, including picnic facilities, camping, trails (for hiking and biking during summer and for cross-country skiing and snowshoeing in the winter), fishing, and nature study.

		The National Atomic Testing Museum is devoted to educating the public about the country's nuclear weapons testing at the Nevada test site in order to promote a better understanding of the role that testing plays in deterring nuclear weapons and in geo-political history. 
</span></p><p data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">The museum collects and preserves artifacts related to not only the Nevada test site, but also atomic testing, the Cold War, nuclear science, radiological science, and related technology. Currently, the museum's collection includes more than 16,000 artifacts, many of them rare. Aside from showcasing the collection in exhibits, the 8,000-square-foot space also features learning activities on topics such as atmospheric and underground testing, radiation, and the atomic age.

		The mission of the National Association of Automobile Museums (NAAM) is to safeguard automobile artifacts and educate the public about the effect the car has had on American society. The Harrah Collection exhibits more than 200 cars, including rare, vintage, classic, celebrity, race, and one-of-a-kind models, which were owned by casino magnate Bill Hurrah. 
</span></p><p data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Exhibits set against each car showcase street scenes from the given car's era, starting with the early 20th century. Aside from exhibits and galleries, which visitors can explore through either audio or daily guided tours, the museum features storyboards, theatrical presentations, and a gift shop. The museum receives approximately two million visitors a year and is open daily except for Thanksgiving and Christmas Day.

</span></p><p data-dcnode-id="2367"><i data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">The Harrah Collection, 10 South Lake Street, Reno, NV 89501, Phone: 775-333-9300</span></i><span data-dcnode-id="2368" instrument_node="">

</span></p><p data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">The parks are regularly redesigned and Mt. Rose ensures that a number of terrain park options are available to guests. The resort's terrain split is 20% beginner, 30% intermediate, 40% advanced, and 10% expert. Both private and group lessons are available for all ages and levels.

		This 10,000-square-foot museum is the brainchild of the Las Vegas Pinball Collectors Club and houses the largest collection of pinball machines in the world open to the public. The machines are from the 1950s to the late 2000s, with most being from when the game was at its height of popularity (1960s–1980s), and belong to club member Tim Arnold. 
</span></p><p data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">The machines, while not new, have been restored to a like-new condition, with games costing 25 or 50 cents a play. Pinball enthusiasts can enjoy playing on authentic 1950s wood rail, 1960s wedgehead, and multiplayer 1970s machines. As a non-profit, the museum distributes any excess revenue to charity.

		Over 300 people, including 80 performers, are involved in making this Cirque du Soleil production happen. Kà contains a total of 14 scenes and tells the coming-of-age saga of imperial twins who embark on a dangerous journey. As with all Cirque du Soleil productions, Kà is lavish and replete with acrobatics, martial arts, pyrotechnics, and aerial performances. 
</span></p><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Unlike other productions though, Kà has four pre-shows: Ticket holders are greeted by Kà villagers as they enter the theater; 20 minutes before curtain, musicians play; 10 minutes before, actors leap and flip into the audience using ropes; and 5 minutes before, a troupe informs the audience that the use of cameras or cell phones is prohibited

</span></p><p data-dcnode-id="1403"><i data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Ka Theater, MGM Grand, 3799 S Las Vegas Blvd, Las Vegas, NV 89109, Phone: 877-880-0880</span></i><span data-dcnode-id="1404" instrument_node="">

</span></p><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Titanic: The Artifact Exhibition

</span></p><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Located at the Luxor resort and visited by over 25 million people, the 25,000-square-foot Titanic: The Artifact Exhibition is the best attended in the world. The exhibition contains more than 250 authentic, haunting artifacts recovered from the Titanic's wreckage, located 2.5 miles below the ocean's surface. 
</span></p><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">View the whistles used on board, the floor tiles that lay in the first-class smoking room, an unopened bottle of 1900 vintage champagne, luggage, and more. The exhibition also has recreations of the vessel's most famous rooms and features, like the Grand Staircase and the Promenade Deck and even includes a part of the Titanic's hull.
