</span><p data-dcnode-id="2631"><i data-dcnode-id="2675"><b data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">The Lavender Hill Mob</span></b></i><span data-dcnode-id="2674" instrument_node=""> is a 1951 </span><a data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comedy_film" title="Comedy film"><span data-dcnode-id="2673" instrument_node="">comedy film</span></a><span data-dcnode-id="2671" instrument_node=""> from </span><a data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ealing_Studios" title="Ealing Studios"><span data-dcnode-id="2670" instrument_node="">Ealing Studios</span></a><span data-dcnode-id="2668" instrument_node="">, written by </span><a data-dcnode-id="2666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/T._E._B._Clarke" title="T. E. B. Clarke"><span data-dcnode-id="2667" instrument_node="">T. E. B. Clarke</span></a><span data-dcnode-id="2665" instrument_node="">, directed by </span><a data-dcnode-id="2663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Crichton" title="Charles Crichton"><span data-dcnode-id="2664" instrument_node="">Charles Crichton</span></a><span data-dcnode-id="2662" instrument_node="">, starring </span><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alec_Guinness" title="Alec Guinness"><span data-dcnode-id="2661" instrument_node="">Alec Guinness</span></a><span data-dcnode-id="2659" instrument_node=""> and </span><a data-dcnode-id="2657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stanley_Holloway" title="Stanley Holloway"><span data-dcnode-id="2658" instrument_node="">Stanley Holloway</span></a><span data-dcnode-id="2656" instrument_node=""> and featuring </span><a data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sid_James" title="Sid James"><span data-dcnode-id="2655" instrument_node="">Sid James</span></a><span data-dcnode-id="2653" instrument_node=""> and </span><a data-dcnode-id="2651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfie_Bass" title="Alfie Bass"><span data-dcnode-id="2652" instrument_node="">Alfie Bass</span></a><span data-dcnode-id="2650" instrument_node="">. The title refers to </span><a data-dcnode-id="2648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lavender_Hill" title="Lavender Hill"><span data-dcnode-id="2649" instrument_node="">Lavender Hill</span></a><span data-dcnode-id="2647" instrument_node="">, a street in </span><a data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battersea" title="Battersea"><span data-dcnode-id="2646" instrument_node="">Battersea</span></a><span data-dcnode-id="2644" instrument_node="">, a district of </span><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_London" title="South London"><span data-dcnode-id="2643" instrument_node="">South London</span></a><span data-dcnode-id="2641" instrument_node="">, in the </span><a class="mw-redirect" data-dcnode-id="2639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UK_postcodes" title="UK postcodes"><span data-dcnode-id="2640" instrument_node="">postcode</span></a><span data-dcnode-id="2638" instrument_node=""> district </span><a class="mw-redirect" data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London_SW11" title="London SW11"><span data-dcnode-id="2637" instrument_node="">SW11</span></a><span data-dcnode-id="2635" instrument_node="">, near to </span><a data-dcnode-id="2633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clapham_Junction_railway_station" title="Clapham Junction railway station"><span data-dcnode-id="2634" instrument_node="">Clapham Junction railway station</span></a><span data-dcnode-id="2632" instrument_node="">.
</span></p><p data-dcnode-id="2609"><span data-dcnode-id="2630" instrument_node="">The </span><a data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Film_Institute" title="British Film Institute"><span data-dcnode-id="2629" instrument_node="">British Film Institute</span></a><span data-dcnode-id="2627" instrument_node=""> ranked </span><i data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">The Lavender Hill Mob</span></i><span data-dcnode-id="2624" instrument_node=""> the </span><a data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BFI_Top_100_British_films" title="BFI Top 100 British films"><span data-dcnode-id="2623" instrument_node="">17th greatest British film of all time</span></a><span data-dcnode-id="2621" instrument_node="">. The original film was digitally restored and re-released to UK cinemas on 29 July 2011 to celebrate its 60th anniversary.</span><sup class="reference" data-dcnode-id="2618" id="cite_ref-2"><a data-dcnode-id="2619" href="#cite_note-2"><span data-dcnode-id="2620" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2617" instrument_node=""> It is one of fifteen films listed in the category "Art" on the </span><a data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vatican%2527s_list_of_films" title="Vatican's list of films"><span data-dcnode-id="2616" instrument_node="">Vatican film list</span></a><span data-dcnode-id="2614" instrument_node="">.</span><sup class="reference" data-dcnode-id="2611" id="cite_ref-3"><a data-dcnode-id="2612" href="#cite_note-3"><span data-dcnode-id="2613" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2610" instrument_node="">

</span><h2 data-dcnode-id="2522"><span class="mw-headline" data-dcnode-id="2530" id="Plot"><span data-dcnode-id="2531" instrument_node="">Plot</span></span><span class="mw-editsection" data-dcnode-id="2523"><span class="mw-editsection-bracket" data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">[</span></span><a data-dcnode-id="2526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Lavender_Hill_Mob%26action%3Dedit%26section%3D1" title="Edit section: Plot"><span data-dcnode-id="2527" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2521" instrument_node="">
</span><p data-dcnode-id="2504"><span data-dcnode-id="2520" instrument_node="">Henry Holland lives the life of luxury in </span><a data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rio_de_Janeiro" title="Rio de Janeiro"><span data-dcnode-id="2519" instrument_node="">Rio de Janeiro</span></a><span data-dcnode-id="2517" instrument_node="">, and spends an evening dining out with a British visitor. During their meal, he narrates a story concerning how he changed his life by instigating an intricate gold bullion robbery. One year ago, Holland served as an unambitious London bank clerk, who for twenty years was in charge of gold bullion deliveries. Although dedicated to his job due to his reputation for fussing over details, he had begun to devise a scheme to steal a consignment of gold bullion. However, his plan had a flaw - selling it on the </span><a data-dcnode-id="2515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_market" title="Black market"><span data-dcnode-id="2516" instrument_node="">black market</span></a><span data-dcnode-id="2514" instrument_node=""> in Britain was too risky, and he was at a loss as to how to smuggle it abroad. One evening at his boarding house in </span><a data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lavender_Hill" title="Lavender Hill"><span data-dcnode-id="2513" instrument_node="">Lavender Hill</span></a><span data-dcnode-id="2511" instrument_node="">, he meets with artist Alfred Pendlebury, who has taken up lodgings in the building. A conversation with him leads him to discover that Pendlebury owns a </span><a data-dcnode-id="2509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foundry" title="Foundry"><span data-dcnode-id="2510" instrument_node="">foundry</span></a><span data-dcnode-id="2508" instrument_node=""> that makes presents and souvenirs that are sold in holiday destinations, one of which is </span><a data-dcnode-id="2506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris" title="Paris"><span data-dcnode-id="2507" instrument_node="">Paris</span></a><span data-dcnode-id="2505" instrument_node="">.
</span></p><p data-dcnode-id="2499"><span data-dcnode-id="2503" instrument_node="">Realizing that Pendlebury is the key to his plan's success, Holland explains his scheme to the artist who agrees to help. When the clerk discovers he is due to be transferred to another bank department, the pair quickly move their plan into action, recruiting the aid of petty thieves, Lackery Wood and Shorty Fisher. On the day of the robbery, Wood and Fisher hijack the bullion van and switch the gold to one of Pendlebury's works van. Holland then assumes the role of an unfortunate victim who is hailed as a hero for raising the alarm, after nearly drowning by accident. As his associates melt down the gold bullion and recast it as </span><a data-dcnode-id="2501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eiffel_Tower" title="Eiffel Tower"><span data-dcnode-id="2502" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="2500" instrument_node=""> paperweights to be exported abroad, Holland gives false statements and misleading clues to the police, led by Inspector Farrow. The group soon toast to their success, despite Wood and Fisher being unable to travel to Paris to collect their share in person, entrusting the other two to provide it.
</span></p><p data-dcnode-id="2494"><span data-dcnode-id="2498" instrument_node="">The day after their last consignment of stolen gold is sent to Paris, Holland and Pendlebury head to France to retrieve them from a souvenir kiosk atop the Eiffel Tower supplied by Pendlebury's firm. However, the pair are horrified when they find one of the boxes containing the golden paperweights has been opened by mistake due to a language mix-up. Discovering six have been sold to a group of English schoolgirls, the pair make a wild chase to pursue after them back to Britain. Both manage to track down the schoolgirls, but only manage to get back five of the paperweights. The girl holding the sixth one refuses, intending to deliver it to a policeman she is friends with. Holland and Pendlebury pursue after the girl, and watch in horror as it is brought to an exhibition of police history and methods at </span><a data-dcnode-id="2496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hendon_Police_College" title="Hendon Police College"><span data-dcnode-id="2497" instrument_node="">Hendon Police College</span></a><span data-dcnode-id="2495" instrument_node="">. Holland's worst fears come true when Farrow, having begun to realize the truth, spots the paperweight and orders a chemical test on it.
</span></p><p data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Left with no choice, Holland snatches it, and he and Pendlebury make their escape in a stolen police car. A confusing pursuit begins across London, as Holland uses the car's radio to feed false, misleading information to the officers pursuing the pair. However, both find themselves forced to offer a passing police officer a lift on the car's footplate, causing them to be eventually discovered. As Pendlebury becomes trapped, Holland escapes with the six golden paperweights, which leave him with a tidy sum to enjoy a new life. After finishing his tale to his visitor back in the present day, Holland admits that the money is now all gone. As the pair prepare to leave, the visitor is revealed  as a police officer, and that Holland has been finally arrested for his crime as the story concludes.
</span></p><span data-dcnode-id="2491" instrument_node="">

</span><p data-dcnode-id="2290"><span data-dcnode-id="2305" instrument_node="">Screenwriter Clarke is said to have come up with the idea of a clerk robbing his own bank while doing research for the film </span><i data-dcnode-id="2302"><a data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pool_of_London_%28film%29" title="Pool of London (film)"><span data-dcnode-id="2304" instrument_node="">Pool of London</span></a></i><span data-dcnode-id="2301" instrument_node=""> (1951), a crime thriller surrounding a jewel theft. He consulted the </span><a data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_of_England" title="Bank of England"><span data-dcnode-id="2300" instrument_node="">Bank of England</span></a><span data-dcnode-id="2298" instrument_node=""> on the project and it set up a special committee to advise on how best the robbery could take place.</span><sup class="reference" data-dcnode-id="2295" id="cite_ref-TheAurumFilmEncyclopediaGangsters_4-0"><a data-dcnode-id="2296" href="#cite_note-TheAurumFilmEncyclopediaGangsters-4"><span data-dcnode-id="2297" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="2292" id="cite_ref-EmpireSpecialCollectorsEditionTheGreatestCrimeMoviesEver_5-0"><a data-dcnode-id="2293" href="#cite_note-EmpireSpecialCollectorsEditionTheGreatestCrimeMoviesEver-5"><span data-dcnode-id="2294" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2291" instrument_node="">
</span></p><p data-dcnode-id="2281"><span data-dcnode-id="2289" instrument_node="">Extensive location filming was made in both London and Paris.</span><sup class="reference" data-dcnode-id="2286" id="cite_ref-6"><a data-dcnode-id="2287" href="#cite_note-6"><span data-dcnode-id="2288" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2285" instrument_node=""> The scenes show a London still marked by bomb sites from the </span><a class="mw-redirect" data-dcnode-id="2283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_World_War" title="Second World War"><span data-dcnode-id="2284" instrument_node="">Second World War</span></a><span data-dcnode-id="2282" instrument_node="">.

</span><p data-dcnode-id="2189"><span data-dcnode-id="2213" instrument_node="">The scene where Holland and Pendlebury run down the Eiffel Tower's spiral staircase and become increasingly </span><a data-dcnode-id="2211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dizziness" title="Dizziness"><span data-dcnode-id="2212" instrument_node="">dizzy</span></a><span data-dcnode-id="2210" instrument_node=""> and erratic, as does the camera work, presages </span><a data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Stewart" title="James Stewart"><span data-dcnode-id="2209" instrument_node="">James Stewart</span></a><span data-dcnode-id="2207" instrument_node="">'s condition in </span><a data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Hitchcock" title="Alfred Hitchcock"><span data-dcnode-id="2206" instrument_node="">Alfred Hitchcock</span></a><span data-dcnode-id="2204" instrument_node="">'s </span><i data-dcnode-id="2201"><a data-dcnode-id="2202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vertigo_%28film%29" title="Vertigo (film)"><span data-dcnode-id="2203" instrument_node="">Vertigo</span></a></i><span data-dcnode-id="2200" instrument_node="">, made seven years later.</span><sup class="reference" data-dcnode-id="2197" id="cite_ref-EmpireSpecialCollectorsEditionTheGreatestCrimeMoviesEver_5-1"><a data-dcnode-id="2198" href="#cite_note-EmpireSpecialCollectorsEditionTheGreatestCrimeMoviesEver-5"><span data-dcnode-id="2199" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2196" instrument_node=""> A film montage of sensational newspaper headlines marks the crime as taking place in August 1950, whilst posters for the Hendon exhibition state that it marks the centenary of the death of </span><a class="mw-redirect" data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sir_Robert_Peel" title="Sir Robert Peel"><span data-dcnode-id="2195" instrument_node="">Sir Robert Peel</span></a><span data-dcnode-id="2193" instrument_node="">, which occurred on 2nd July 1850. In the car chase scene at the end of the film, an officer uses a </span><a data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Police_box" title="Police box"><span data-dcnode-id="2192" instrument_node="">police box</span></a><span data-dcnode-id="2190" instrument_node=""> to report seeing a police car being driven by a man in a top hat. In fact, the driver is a modern-day police officer from the exhibition wearing the uniform of the police as originally set up in 1829 by Peel, known as "Bobbies" or "Peelers" after him.
</span></p><span data-dcnode-id="2188" instrument_node="">

</span><p data-dcnode-id="2155"><i data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">The Lavender Hill Mob</span></i><span data-dcnode-id="2174" instrument_node=""> had its charity world premiere at the </span><a class="mw-redirect" data-dcnode-id="2172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marble_Arch_Odeon" title="Marble Arch Odeon"><span data-dcnode-id="2173" instrument_node="">Marble Arch Odeon</span></a><span data-dcnode-id="2171" instrument_node=""> cinema in London on the 28th of June 1951.</span><sup class="reference" data-dcnode-id="2168" id="cite_ref-Art_&amp;_Hue_1-1"><a data-dcnode-id="2169" href="#cite_note-Art_&amp;_Hue-1"><span data-dcnode-id="2170" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2167" instrument_node=""> The film was popular at the British box office.</span><sup class="reference" data-dcnode-id="2164" id="cite_ref-7"><a data-dcnode-id="2165" href="#cite_note-7"><span data-dcnode-id="2166" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2163" instrument_node=""> It had rentals of $580,000 at the U.S. box office.</span><sup class="reference" data-dcnode-id="2160" id="cite_ref-8"><a data-dcnode-id="2161" href="#cite_note-8"><span data-dcnode-id="2162" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="2157" id="cite_ref-9"><a data-dcnode-id="2158" href="#cite_note-9"><span data-dcnode-id="2159" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2156" instrument_node="">
</span></p><span data-dcnode-id="2154" instrument_node="">
