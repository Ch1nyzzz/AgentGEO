</span><p data-dcnode-id="1855"><span data-dcnode-id="1908" instrument_node="">"</span><b data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">The Iron Ceiling</span></b><span data-dcnode-id="1905" instrument_node="">" is the fifth episode of the </span><a data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agent_Carter_%28season_1%29" title="Agent Carter (season 1)"><span data-dcnode-id="1904" instrument_node="">first season</span></a><span data-dcnode-id="1902" instrument_node=""> of the American television series </span><i data-dcnode-id="1899"><a data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agent_Carter_%28TV_series%29" title="Agent Carter (TV series)"><span data-dcnode-id="1901" instrument_node="">Agent Carter</span></a></i><span data-dcnode-id="1898" instrument_node="">, inspired by the films </span><i data-dcnode-id="1895"><a data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Captain_America%3A_The_First_Avenger" title="Captain America: The First Avenger"><span data-dcnode-id="1897" instrument_node="">Captain America: The First Avenger</span></a></i><span data-dcnode-id="1894" instrument_node=""> and </span><i data-dcnode-id="1891"><a data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Captain_America%3A_The_Winter_Soldier" title="Captain America: The Winter Soldier"><span data-dcnode-id="1893" instrument_node="">Captain America: The Winter Soldier</span></a></i><span data-dcnode-id="1890" instrument_node="">, and the </span><a data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marvel_One-Shots" title="Marvel One-Shots"><span data-dcnode-id="1889" instrument_node="">Marvel One-Shot</span></a><span data-dcnode-id="1887" instrument_node=""> short film also titled </span><i data-dcnode-id="1884"><a data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agent_Carter_%28film%29" title="Agent Carter (film)"><span data-dcnode-id="1886" instrument_node="">Agent Carter</span></a></i><span data-dcnode-id="1883" instrument_node="">. It features the </span><a data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marvel_Comics" title="Marvel Comics"><span data-dcnode-id="1882" instrument_node="">Marvel Comics</span></a><span data-dcnode-id="1880" instrument_node=""> character </span><a data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peggy_Carter" title="Peggy Carter"><span data-dcnode-id="1879" instrument_node="">Peggy Carter</span></a><span data-dcnode-id="1877" instrument_node=""> as she goes on a mission to infiltrate a </span><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leviathan_%28Marvel_Comics%29" title="Leviathan (Marvel Comics)"><span data-dcnode-id="1876" instrument_node="">Leviathan</span></a><span data-dcnode-id="1874" instrument_node=""> </span><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Room_%28comics%29" title="Red Room (comics)"><span data-dcnode-id="1873" instrument_node="">military complex</span></a><span data-dcnode-id="1871" instrument_node=""> with the </span><a data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sgt._Fury_and_his_Howling_Commandos" title="Sgt. Fury and his Howling Commandos"><span data-dcnode-id="1870" instrument_node="">Howling Commandos</span></a><span data-dcnode-id="1868" instrument_node="">, and is set in the </span><a data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marvel_Cinematic_Universe" title="Marvel Cinematic Universe"><span data-dcnode-id="1867" instrument_node="">Marvel Cinematic Universe</span></a><span data-dcnode-id="1865" instrument_node=""> (MCU), sharing continuity with the </span><a data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Marvel_Cinematic_Universe_films" title="List of Marvel Cinematic Universe films"><span data-dcnode-id="1864" instrument_node="">films of the franchise</span></a><span data-dcnode-id="1862" instrument_node="">. The episode was written by </span><a data-dcnode-id="1860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jose_Molina_%28writer%29" title="Jose Molina (writer)"><span data-dcnode-id="1861" instrument_node="">Jose Molina</span></a><span data-dcnode-id="1859" instrument_node=""> and directed by </span><a data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Leto" title="Peter Leto"><span data-dcnode-id="1858" instrument_node="">Peter Leto</span></a><span data-dcnode-id="1856" instrument_node="">.
</span></p><p data-dcnode-id="1830"><a data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hayley_Atwell" title="Hayley Atwell"><span data-dcnode-id="1854" instrument_node="">Hayley Atwell</span></a><span data-dcnode-id="1852" instrument_node=""> reprises her role as Carter from the film series, and is joined by regular cast members </span><a data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_D%2527Arcy" title="James D'Arcy"><span data-dcnode-id="1851" instrument_node="">James D'Arcy</span></a><span data-dcnode-id="1849" instrument_node="">, </span><a data-dcnode-id="1847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chad_Michael_Murray" title="Chad Michael Murray"><span data-dcnode-id="1848" instrument_node="">Chad Michael Murray</span></a><span data-dcnode-id="1846" instrument_node="">, </span><a data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enver_Gjokaj" title="Enver Gjokaj"><span data-dcnode-id="1845" instrument_node="">Enver Gjokaj</span></a><span data-dcnode-id="1843" instrument_node="">, and </span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shea_Whigham" title="Shea Whigham"><span data-dcnode-id="1842" instrument_node="">Shea Whigham</span></a><span data-dcnode-id="1840" instrument_node="">. </span><a data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neal_McDonough" title="Neal McDonough"><span data-dcnode-id="1839" instrument_node="">Neal McDonough</span></a><span data-dcnode-id="1837" instrument_node=""> guest stars as </span><a data-dcnode-id="1835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dum_Dum_Dugan" title="Dum Dum Dugan"><span data-dcnode-id="1836" instrument_node="">Dum Dum Dugan</span></a><span data-dcnode-id="1834" instrument_node="">, also reprising his role from the films, the leader of the Howling Commandos. Though no other Howling Commandos from the films appear, due to scheduling issues, the episode does introduce new Commandos to the MCU based on existing comics characters. The episode also introduces the origins of the </span><a data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_Widow_%28Marvel_Comics%29" title="Black Widow (Marvel Comics)"><span data-dcnode-id="1833" instrument_node="">Black Widow</span></a><span data-dcnode-id="1831" instrument_node=""> program, which plays a significant part in several MCU films.
</span></p><p data-dcnode-id="1822"><span data-dcnode-id="1829" instrument_node="">"The Iron Ceiling" originally aired on </span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Broadcasting_Company" title="American Broadcasting Company"><span data-dcnode-id="1828" instrument_node="">ABC</span></a><span data-dcnode-id="1826" instrument_node=""> on February 3, 2015, and according to </span><a data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nielsen_ratings" title="Nielsen ratings"><span data-dcnode-id="1825" instrument_node="">Nielsen Media Research</span></a><span data-dcnode-id="1823" instrument_node="">, was watched by 4.20 million viewers.

</span><h2 data-dcnode-id="1667"><span class="mw-headline" data-dcnode-id="1675" id="Plot"><span data-dcnode-id="1676" instrument_node="">Plot</span></span><span class="mw-editsection" data-dcnode-id="1668"><span class="mw-editsection-bracket" data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">[</span></span><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Iron_Ceiling%26action%3Dedit%26section%3D1" title="Edit section: Plot"><span data-dcnode-id="1672" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1665" instrument_node="">In 1937 Russia, young girls are trained as merciless assassins to infiltrate America. Each night they are hand cuffed to their beds, a practice that one such girl, "Dottie Underwood", still carries out in 1946 as she lives incognito as the new neighbor of Strategic Scientific Reserve (SSR) agent </span><a data-dcnode-id="1663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peggy_Carter" title="Peggy Carter"><span data-dcnode-id="1664" instrument_node="">Peggy Carter</span></a><span data-dcnode-id="1662" instrument_node="">. Before Carter leaves for work one morning, Underwood manages to steal the key to her apartment. At the SSR, a high level cryptographer is struggling to decode a message received on a confiscated Russian typewriter with a long-range transmitter. Carter uses her cryptography skills and knowledge of Russian to decode the message herself, and finds map coordinates leading to a </span><a data-dcnode-id="1660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Room_%28comics%29" title="Red Room (comics)"><span data-dcnode-id="1661" instrument_node="">Soviet military complex</span></a><span data-dcnode-id="1659" instrument_node="">. The message suggests that at this complex </span><a data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Howard_Stark" title="Howard Stark"><span data-dcnode-id="1658" instrument_node="">Howard Stark</span></a><span data-dcnode-id="1656" instrument_node="">, who the SSR have been hunting, will be selling weapons to </span><a data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leviathan_%28Marvel_Comics%29" title="Leviathan (Marvel Comics)"><span data-dcnode-id="1655" instrument_node="">Leviathan</span></a><span data-dcnode-id="1653" instrument_node="">, which Chief </span><a data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roger_Dooley" title="Roger Dooley"><span data-dcnode-id="1652" instrument_node="">Roger Dooley</span></a><span data-dcnode-id="1650" instrument_node=""> explains is a covert Russian organization. Dooley tasks Agents Thompson, Ramirez, and Li to meet up with a tactical unit and infiltrate the complex to cut off the exchange and arrest Stark for treason. Carter convinces Dooley to allow her to go if she can get the 107th Regiment to assist as their tactical unit, which she does, having fought with them as a friend during World War II.
</span></p><p data-dcnode-id="1626"><span data-dcnode-id="1648" instrument_node="">As they are preparing to leave, Thompson tricks Agent Sousa into walking in on Carter as she is dressing, creating an awkward and embarrassing moment for them both. Before he leaves her be, Sousa notices two bullet hole wounds on Carter's shoulder. Thompson, Carter, Ramirez, and Li fly to the Russian border where they meet up with several members of the 107th: </span><a data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dum_Dum_Dugan" title="Dum Dum Dugan"><span data-dcnode-id="1647" instrument_node="">Dum Dum Dugan</span></a><span data-dcnode-id="1645" instrument_node="">, </span><a data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Happy_Sam_Sawyer" title="Happy Sam Sawyer"><span data-dcnode-id="1644" instrument_node="">Happy Sam Sawyer</span></a><span data-dcnode-id="1642" instrument_node="">, </span><a data-dcnode-id="1640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Junior_Juniper" title="Junior Juniper"><span data-dcnode-id="1641" instrument_node="">Junior Juniper</span></a><span data-dcnode-id="1639" instrument_node="">, and </span><a data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pinky_Pinkerton" title="Pinky Pinkerton"><span data-dcnode-id="1638" instrument_node="">Pinky Pinkerton</span></a><span data-dcnode-id="1636" instrument_node="">, a group that Juniper has nicknamed the "</span><a data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sgt._Fury_and_his_Howling_Commandos" title="Sgt. Fury and his Howling Commandos"><span data-dcnode-id="1635" instrument_node="">Howling Commandos</span></a><span data-dcnode-id="1633" instrument_node="">". On their way to the complex, Carter and Dugan share some bourbon (from her private stash) and reminisce about their war days, fighting alongside their friend (and Carter's great love) </span><a data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Captain_America" title="Captain America"><span data-dcnode-id="1632" instrument_node="">Steve Rogers</span></a><span data-dcnode-id="1630" instrument_node="">, while also noting that they are most likely headed into a trap. Later, the whole group share war stories, and Carter convinces Thompson to tell them about how he earned the </span><a data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Navy_Cross" title="Navy Cross"><span data-dcnode-id="1629" instrument_node="">Navy Cross</span></a><span data-dcnode-id="1627" instrument_node=""> – he had fallen asleep on watch in the Pacific during the War, and had awoken to find Japanese soldiers filling the camp. He killed them all before there were any American casualties, and before some of his comrades had even woken up.
</span></p><p data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Infiltrating the complex, the group finds the boarding school where Dottie was trained, and discover supposed children's films filled with subliminal messaging. They come across a lone young girl, who Dugan approaches. She at first seems innocent, but reveals that Carter and Dugan were indeed correct about this being a trap when she stabs Dugan in the chest and shoots Juniper dead, before escaping. Looking to escape oncoming Leviathan soldiers, the surviving members of the group carry on into the complex and come across two prisoners: a brilliant engineer who has been tasked with creating weapons from Leviathan based on stolen Stark designs; and his psychiatrist, who attempts to keep him sane while he does it. The group continues, taking the prisoners with them, but they are all soon cornered by the soldiers, and Agent Li is killed in the firefight. The engineer, Nikola, tries to negotiate with the survivors, putting Sawyer's life on the line, so his psychiatrist, Dr. Ivchenko, kills him. Dugan blows a hole in the wall for the group to escape through, and Carter holds the enemy off to help the others escape when Thompson freezes up under fire. Back at the plane, the SSR agents and Howling Commandos part ways. Ivchenko decides to go with the agents back to America, willing to help them fight Leviathan in any way he can. On the flight home, Thompson explains why he froze up: fighting now makes him feel guilty because of what really happened in the War – the Japanese soldiers had been carrying a white flag, but Thompson noticed this after he had already killed them all. He buried the flag to hide what he had done, and his comrades believed him to be a hero.
</span></p><p data-dcnode-id="1616"><span data-dcnode-id="1623" instrument_node="">While Carter is gone, Underwood searches her room and comes across photographs of the Stark weapons that the SSR have confiscated. She takes one of the photographs with her, otherwise leaving the room exactly as she found it. Dooley meets with an old friend of his, a journalist who had investigated the Battle of </span><a data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Finow" title="Finow"><span data-dcnode-id="1622" instrument_node="">Finow</span></a><span data-dcnode-id="1620" instrument_node="">, as Dooley is doing, and too had discovered that the Russian soldiers were massacred before the Germans even arrived, and that Stark had been involved in some sort of cover-up. Dooley learns that Stark had gotten into a fight with a General John McGuinness, but over what is unknown (Dooley approaches Stark's butler </span><a data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edwin_Jarvis" title="Edwin Jarvis"><span data-dcnode-id="1619" instrument_node="">Edwin Jarvis</span></a><span data-dcnode-id="1617" instrument_node=""> for answers, but Jarvis tells him nothing), and McGuinness has recently died while Stark has broken ties with the military. Sousa meanwhile searches through photographs of a woman who has been interfering with the Stark investigation. Though her face is not captured, Sousa can see that she has the same two bullet holes on her shoulder, and realizes that Carter is most likely a traitor.
</span></p><span data-dcnode-id="1615" instrument_node="">
</span><h2 data-dcnode-id="1605"><span class="mw-headline" data-dcnode-id="1613" id="Production"><span data-dcnode-id="1614" instrument_node="">Production</span></span><span class="mw-editsection" data-dcnode-id="1606"><span class="mw-editsection-bracket" data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">[</span></span><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Iron_Ceiling%26action%3Dedit%26section%3D2" title="Edit section: Production"><span data-dcnode-id="1610" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1604" instrument_node="">
</span><h3 data-dcnode-id="1594"><span class="mw-headline" data-dcnode-id="1602" id="Development"><span data-dcnode-id="1603" instrument_node="">Development</span></span><span class="mw-editsection" data-dcnode-id="1595"><span class="mw-editsection-bracket" data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">[</span></span><a data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Iron_Ceiling%26action%3Dedit%26section%3D3" title="Edit section: Development"><span data-dcnode-id="1599" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1593" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1592" instrument_node="">In January 2015, Marvel announced that the fifth episode would be titled "The Iron Ceiling", to be written by </span><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jose_Molina_%28writer%29" title="Jose Molina (writer)"><span data-dcnode-id="1591" instrument_node="">Jose Molina</span></a><span data-dcnode-id="1589" instrument_node="">, with </span><a data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Leto" title="Peter Leto"><span data-dcnode-id="1588" instrument_node="">Peter Leto</span></a><span data-dcnode-id="1586" instrument_node=""> directing.</span><sup class="reference" data-dcnode-id="1583" id="cite_ref-debriefing_1-0"><a data-dcnode-id="1584" href="#cite_note-debriefing-1"><span data-dcnode-id="1585" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1582" instrument_node="">
</span></p><span data-dcnode-id="1580" instrument_node="">
</span><h3 data-dcnode-id="1570"><span class="mw-headline" data-dcnode-id="1578" id="Writing"><span data-dcnode-id="1579" instrument_node="">Writing</span></span><span class="mw-editsection" data-dcnode-id="1571"><span class="mw-editsection-bracket" data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">[</span></span><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Iron_Ceiling%26action%3Dedit%26section%3D4" title="Edit section: Writing"><span data-dcnode-id="1575" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1568" instrument_node="">Discussing the fact that Carter gets her first proper field assignment in this episode, executive producer Tara Butters stated "It’s a big turning point for her relationship with all of her colleagues, both good and bad, so I think it’s a nice moment. [S]he’s officially on this mission, which means Dooley let her go on this mission. That shows [where Dooley’s head is at after] episode four ... his character has some interesting developments. And Peggy and Thompson’s relationship really changes, [as] we learn a lot more about Thompson’s backstory. He’s been a nice foil for Peggy, and he seems like just a chauvinistic jerk, but we actually learn more about him. Then [with] Sousa, their relationship changes in a very different way. It’s a very key episode into how all of their relationships are going to evolve."</span><sup class="reference" data-dcnode-id="1565" id="cite_ref-ExploresBW_2-0"><a data-dcnode-id="1566" href="#cite_note-ExploresBW-2"><span data-dcnode-id="1567" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1564" instrument_node="">
</span></p><span data-dcnode-id="1562" instrument_node="">
</span><h3 data-dcnode-id="1552"><span class="mw-headline" data-dcnode-id="1560" id="Casting"><span data-dcnode-id="1561" instrument_node="">Casting</span></span><span class="mw-editsection" data-dcnode-id="1553"><span class="mw-editsection-bracket" data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">[</span></span><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Iron_Ceiling%26action%3Dedit%26section%3D5" title="Edit section: Casting"><span data-dcnode-id="1557" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1551" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1542"><div class="thumbinner" data-dcnode-id="1543" style="width:172px;"><a class="image" data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANeal_McDonough_%2831197145535%29_%28cropped%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="1550" data-file-height="2848" data-file-width="2203" decoding="async" height="220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/04/Neal_McDonough_%252831197145535%2529_%2528cropped%2529.jpg/170px-Neal_McDonough_%252831197145535%2529_%2528cropped%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/04/Neal_McDonough_%2831197145535%29_%28cropped%29.jpg/255px-Neal_McDonough_%2831197145535%29_%28cropped%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/04/Neal_McDonough_%2831197145535%29_%28cropped%29.jpg/340px-Neal_McDonough_%2831197145535%29_%28cropped%29.jpg 2x" width="170"></a><span data-dcnode-id="1548" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1544"><div class="magnify" data-dcnode-id="1546"><a class="internal" data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANeal_McDonough_%2831197145535%29_%28cropped%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="1545" instrument_node="">Special guest star Neal McDonough reprises his role from past MCU projects in the episode</span></div></div></div><span data-dcnode-id="1541" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1540" instrument_node="">In January 2015, Marvel revealed that main cast members </span><a data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hayley_Atwell" title="Hayley Atwell"><span data-dcnode-id="1539" instrument_node="">Hayley Atwell</span></a><span data-dcnode-id="1537" instrument_node="">, </span><a data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_D%2527Arcy" title="James D'Arcy"><span data-dcnode-id="1536" instrument_node="">James D'Arcy</span></a><span data-dcnode-id="1534" instrument_node="">, </span><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chad_Michael_Murray" title="Chad Michael Murray"><span data-dcnode-id="1533" instrument_node="">Chad Michael Murray</span></a><span data-dcnode-id="1531" instrument_node="">, </span><a data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enver_Gjokaj" title="Enver Gjokaj"><span data-dcnode-id="1530" instrument_node="">Enver Gjokaj</span></a><span data-dcnode-id="1528" instrument_node="">, and </span><a data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shea_Whigham" title="Shea Whigham"><span data-dcnode-id="1527" instrument_node="">Shea Whigham</span></a><span data-dcnode-id="1525" instrument_node=""> would star as </span><a data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peggy_Carter" title="Peggy Carter"><span data-dcnode-id="1524" instrument_node="">Peggy Carter</span></a><span data-dcnode-id="1522" instrument_node="">, </span><a data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edwin_Jarvis" title="Edwin Jarvis"><span data-dcnode-id="1521" instrument_node="">Edwin Jarvis</span></a><span data-dcnode-id="1519" instrument_node="">, Jack Thompson, Daniel Sousa, and </span><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roger_Dooley" title="Roger Dooley"><span data-dcnode-id="1518" instrument_node="">Roger Dooley</span></a><span data-dcnode-id="1516" instrument_node="">, respectively.</span><sup class="reference" data-dcnode-id="1513" id="cite_ref-debriefing_1-1"><a data-dcnode-id="1514" href="#cite_note-debriefing-1"><span data-dcnode-id="1515" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1512" instrument_node=""> It was also revealed that the guest cast for the episode would include </span><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eddie_Shin" title="Eddie Shin"><span data-dcnode-id="1511" instrument_node="">Eddie Shin</span></a><span data-dcnode-id="1509" instrument_node=""> as Agent Li, </span><a data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greg_Serano" title="Greg Serano"><span data-dcnode-id="1508" instrument_node="">Greg Serano</span></a><span data-dcnode-id="1506" instrument_node=""> as Agent Ramirez, </span><a data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neal_McDonough" title="Neal McDonough"><span data-dcnode-id="1505" instrument_node="">Neal McDonough</span></a><span data-dcnode-id="1503" instrument_node=""> as </span><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dum_Dum_Dugan" title="Dum Dum Dugan"><span data-dcnode-id="1502" instrument_node="">Dum Dum Dugan</span></a><span data-dcnode-id="1500" instrument_node="">, </span><a data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bridget_Regan" title="Bridget Regan"><span data-dcnode-id="1499" instrument_node="">Bridget Regan</span></a><span data-dcnode-id="1497" instrument_node=""> as Dottie Underwood, </span><a data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonard_Roberts" title="Leonard Roberts"><span data-dcnode-id="1496" instrument_node="">Leonard Roberts</span></a><span data-dcnode-id="1494" instrument_node=""> as </span><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Happy_Sam_Sawyer" title="Happy Sam Sawyer"><span data-dcnode-id="1493" instrument_node="">Happy Sam Sawyer</span></a><span data-dcnode-id="1491" instrument_node="">, James Austin Kerr as </span><a data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Junior_Juniper" title="Junior Juniper"><span data-dcnode-id="1490" instrument_node="">Junior Juniper</span></a><span data-dcnode-id="1488" instrument_node="">, </span><a data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Short_%28actor%29" title="Richard Short (actor)"><span data-dcnode-id="1487" instrument_node="">Richard Short</span></a><span data-dcnode-id="1485" instrument_node=""> as </span><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pinky_Pinkerton" title="Pinky Pinkerton"><span data-dcnode-id="1484" instrument_node="">Pinky Pinkerton</span></a><span data-dcnode-id="1482" instrument_node="">, </span><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ralph_Brown" title="Ralph Brown"><span data-dcnode-id="1481" instrument_node="">Ralph Brown</span></a><span data-dcnode-id="1479" instrument_node=""> as Dr. Ivchenko and </span><a data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jared_Gertner" title="Jared Gertner"><span data-dcnode-id="1478" instrument_node="">Jared Gertner</span></a><span data-dcnode-id="1476" instrument_node=""> as cryptographer.</span><sup class="reference" data-dcnode-id="1473" id="cite_ref-debriefing_1-2"><a data-dcnode-id="1474" href="#cite_note-debriefing-1"><span data-dcnode-id="1475" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1472" instrument_node=""> However, Kerr did not receive guest star credit in the episode. Though they were not officially announced by Marvel, </span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Glover_%28actor%29" title="John Glover (actor)"><span data-dcnode-id="1471" instrument_node="">John Glover</span></a><span data-dcnode-id="1469" instrument_node=""> and </span><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alex_Veadov" title="Alex Veadov"><span data-dcnode-id="1468" instrument_node="">Alex Veadov</span></a><span data-dcnode-id="1466" instrument_node=""> guest star as a friend of Dooley's and the Russian engineer Nikola, respectively.</span><sup class="reference" data-dcnode-id="1463" id="cite_ref-CARecap_3-0"><a data-dcnode-id="1464" href="#cite_note-CARecap-3"><span data-dcnode-id="1465" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1462" instrument_node=""> Regan reprises her role from earlier in the series.</span><sup class="reference" data-dcnode-id="1459" id="cite_ref-Ep3Synopsis_4-0"><a data-dcnode-id="1460" href="#cite_note-Ep3Synopsis-4"><span data-dcnode-id="1461" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1458" instrument_node=""> McDonough reprises his role from </span><i data-dcnode-id="1455"><a data-dcnode-id="1456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Captain_America%3A_The_First_Avenger" title="Captain America: The First Avenger"><span data-dcnode-id="1457" instrument_node="">Captain America: The First Avenger</span></a></i><span data-dcnode-id="1454" instrument_node="">, </span><i data-dcnode-id="1451"><a data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agent_Carter_%28film%29" title="Agent Carter (film)"><span data-dcnode-id="1453" instrument_node="">Marvel One-Shot: Agent Carter</span></a></i><span data-dcnode-id="1450" instrument_node="">, and </span><i data-dcnode-id="1447"><a data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agents_of_S.H.I.E.L.D." title="Agents of S.H.I.E.L.D."><span data-dcnode-id="1449" instrument_node="">Agents of S.H.I.E.L.D.</span></a></i><span data-dcnode-id="1446" instrument_node="">.</span><sup class="reference" data-dcnode-id="1443" id="cite_ref-McDonoughSHIELD_5-0"><a data-dcnode-id="1444" href="#cite_note-McDonoughSHIELD-5"><span data-dcnode-id="1445" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="1440" id="cite_ref-McDonoughMOS_6-0"><a data-dcnode-id="1441" href="#cite_note-McDonoughMOS-6"><span data-dcnode-id="1442" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1439" instrument_node="">
</span></p><p data-dcnode-id="1426"><span data-dcnode-id="1437" instrument_node="">When explaining the introduction of the </span><a data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sgt._Fury_and_his_Howling_Commandos" title="Sgt. Fury and his Howling Commandos"><span data-dcnode-id="1436" instrument_node="">Howling Commandos</span></a><span data-dcnode-id="1434" instrument_node=""> to the series, executive producer Tara Butters noted that "when you’re doing any production, especially a TV show where things happen very quickly, you never know, as far as actors go, who’s going to be available, [or] who’s going to be interested in doing a TV show." Ultimately, McDonough was able to reprise his role as Dugan, while the other Commandos (Sawyer, Juniper, and Pinkerton) were all introduced to the MCU in this episode. These "new" Commandos are not original characters, but established Commandos in the comics.</span><sup class="reference" data-dcnode-id="1431" id="cite_ref-ExploresBW_2-1"><a data-dcnode-id="1432" href="#cite_note-ExploresBW-2"><span data-dcnode-id="1433" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="1428" id="cite_ref-THRJan2015_7-0"><a data-dcnode-id="1429" href="#cite_note-THRJan2015-7"><span data-dcnode-id="1430" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1427" instrument_node="">
</span></p><span data-dcnode-id="1425" instrument_node="">
</span><h3 data-dcnode-id="1415"><span class="mw-headline" data-dcnode-id="1423" id="Design"><span data-dcnode-id="1424" instrument_node="">Design</span></span><span class="mw-editsection" data-dcnode-id="1416"><span class="mw-editsection-bracket" data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">[</span></span><a data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Iron_Ceiling%26action%3Dedit%26section%3D6" title="Edit section: Design"><span data-dcnode-id="1420" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1408"><span data-dcnode-id="1413" instrument_node="">Series costume designer Giovanna Ottobre-Melton introduced the SSR tactical uniform in this episode, which she intended to have "a pseudo-military meets World War II underground" look. She explained that "The tactical black jacket is a four-pocket field style with epaulets, and is lined in a subtle olive wool plaid. The belt is a thick military black cotton web and metal buckle. The shirts were designed in a classic military winter olive wool with epaulets. The olive wool ties are actual World War II military ties. The cargo pants were constructed in olive Harris tweed wool with beautiful flecks of color. The uniform pants are tucked into dark brown leather boots. For Peggy's boots, I chose boots with leather straps that wrap around the calf – it was a hybrid nod to the World War II military spats and puttee cloth wraps of World War I." For the Howling Commandos, Ottobre-Melton aimed for consistency with the Commandos previously seen in the MCU. Multiple versions of these costumes were created for the episode's action sequences.</span><sup class="reference" data-dcnode-id="1410" id="cite_ref-Fashion_8-0"><a data-dcnode-id="1411" href="#cite_note-Fashion-8"><span data-dcnode-id="1412" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1409" instrument_node="">
</span></p><p data-dcnode-id="1402"><span data-dcnode-id="1407" instrument_node="">Concerning the young girls depicted in the episode, Ottobre-Melton researched boarding schools that specialized in mind control education for children. "For the dormitory scene, I chose plain stark muslin nightgowns for the young girls. In the main classroom, the uniform was created using a classic white short sleeve blouse, accented with a blood red tie, and a black pleated mid-calf skirt. For their physical training scene, I used black wool knitted shorts and white cotton tank tops, accented with a small red branding design. For their teacher, she was dressed in stark grey and black vintage sourced uniforms also using a red scarf accent." The girl encountered by the SSR in the episode "is wearing a black knitted wool pullover with red shoulder epaulets, matched with the uniform black pleated skirt and black stockings."</span><sup class="reference" data-dcnode-id="1404" id="cite_ref-Fashion_8-1"><a data-dcnode-id="1405" href="#cite_note-Fashion-8"><span data-dcnode-id="1406" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1403" instrument_node="">
</span></p><span data-dcnode-id="1401" instrument_node="">
</span><h3 data-dcnode-id="1391"><span class="mw-headline" data-dcnode-id="1399" id="Visual_effects"><span data-dcnode-id="1400" instrument_node="">Visual effects</span></span><span class="mw-editsection" data-dcnode-id="1392"><span class="mw-editsection-bracket" data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">[</span></span><a data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Iron_Ceiling%26action%3Dedit%26section%3D7" title="Edit section: Visual effects"><span data-dcnode-id="1396" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1362"><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_Light_%2526_Magic" title="Industrial Light &amp; Magic"><span data-dcnode-id="1389" instrument_node="">Industrial Light &amp; Magic</span></a><span data-dcnode-id="1387" instrument_node=""> (ILM) and </span><a data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Base_FX" title="Base FX"><span data-dcnode-id="1386" instrument_node="">Base FX</span></a><span data-dcnode-id="1384" instrument_node=""> created the visual effects for the episode.</span><sup class="reference" data-dcnode-id="1381" id="cite_ref-ArtVFX_9-0"><a data-dcnode-id="1382" href="#cite_note-ArtVFX-9"><span data-dcnode-id="1383" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1380" instrument_node=""> The plane used by the SSR to go on their mission was a real </span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scale_model" title="Scale model"><span data-dcnode-id="1379" instrument_node="">miniature model</span></a><span data-dcnode-id="1377" instrument_node="">, with CGI propellers added. Filming was then done with a </span><a class="mw-redirect" data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_screen" title="Green screen"><span data-dcnode-id="1376" instrument_node="">green screen</span></a><span data-dcnode-id="1374" instrument_node="">, and ILM added a </span><a data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matte_painting" title="Matte painting"><span data-dcnode-id="1373" instrument_node="">matte painting</span></a><span data-dcnode-id="1371" instrument_node=""> background to complete the shots.</span><sup class="reference" data-dcnode-id="1368" id="cite_ref-PlaneVFX_10-0"><a data-dcnode-id="1369" href="#cite_note-PlaneVFX-10"><span data-dcnode-id="1370" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1367" instrument_node=""> For the fighting sequences, every muzzle flare and ricocheting bullet was added during post-production.</span><sup class="reference" data-dcnode-id="1364" id="cite_ref-FightVFX_11-0"><a data-dcnode-id="1365" href="#cite_note-FightVFX-11"><span data-dcnode-id="1366" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1363" instrument_node="">
</span></p><span data-dcnode-id="1361" instrument_node="">
</span><h3 data-dcnode-id="1351"><span class="mw-headline" data-dcnode-id="1359" id="Marvel_Cinematic_Universe_tie-ins"><span data-dcnode-id="1360" instrument_node="">Marvel Cinematic Universe tie-ins</span></span><span class="mw-editsection" data-dcnode-id="1352"><span class="mw-editsection-bracket" data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">[</span></span><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Iron_Ceiling%26action%3Dedit%26section%3D8" title="Edit section: Marvel Cinematic Universe tie-ins"><span data-dcnode-id="1356" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1349" instrument_node="">The episode introduces the </span><a data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Room_%28comics%29" title="Red Room (comics)"><span data-dcnode-id="1348" instrument_node="">Red Room</span></a><span data-dcnode-id="1346" instrument_node=""> and the origins of the </span><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_Widow_%28Marvel_Comics%29" title="Black Widow (Marvel Comics)"><span data-dcnode-id="1345" instrument_node="">Black Widow</span></a><span data-dcnode-id="1343" instrument_node=""> program,</span><sup class="reference" data-dcnode-id="1340" id="cite_ref-ExploresBW_2-2"><a data-dcnode-id="1341" href="#cite_note-ExploresBW-2"><span data-dcnode-id="1342" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1339" instrument_node=""> which will eventually produce </span><a data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natasha_Romanoff_%28Marvel_Cinematic_Universe%29" title="Natasha Romanoff (Marvel Cinematic Universe)"><span data-dcnode-id="1338" instrument_node="">Natasha Romanoff</span></a><span data-dcnode-id="1336" instrument_node="">,</span><sup class="reference" data-dcnode-id="1333" id="cite_ref-Dottie_12-0"><a data-dcnode-id="1334" href="#cite_note-Dottie-12"><span data-dcnode-id="1335" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1332" instrument_node=""> who appears in multiple MCU films portrayed by </span><a data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scarlett_Johansson" title="Scarlett Johansson"><span data-dcnode-id="1331" instrument_node="">Scarlett Johansson</span></a><span data-dcnode-id="1329" instrument_node="">.</span><sup class="reference" data-dcnode-id="1326" id="cite_ref-JohanssonBW_13-0"><a data-dcnode-id="1327" href="#cite_note-JohanssonBW-13"><span data-dcnode-id="1328" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1325" instrument_node="">
</span></p><span data-dcnode-id="1323" instrument_node="">
