</span><span class="readable" data-dcnode-id="1180" id="reviewTextContainer122216551"><span data-dcnode-id="1220" instrument_node="">
</span><span data-dcnode-id="1212" id="freeTextContainer3324710464124972690"><span data-dcnode-id="1219" instrument_node="">Wow wow wow! I reallllllllly loved this book.</span><br data-dcnode-id="1218"><br data-dcnode-id="1217"><span data-dcnode-id="1216" instrument_node="">Mina was amazing. Strong, brave, loyal, and amazingly good-spirited, given everything she had to deal with. And Rhys... I really loved him. It is hard to find the words. A reluctant hero, a guy who pulled himself up out of the horrible life he had as a child, but yet still managed to be a good man. </span><br data-dcnode-id="1215"><br data-dcnode-id="1214"><span data-dcnode-id="1213" instrument_node="">Both of these characters are people who don't handle emotions well. I don't want to get into the reasons why (except to assure you all that it is well done</span></span><span data-dcnode-id="1211" instrument_node="">
</span><span data-dcnode-id="1185" id="freeText3324710464124972690" style="display:none"><span data-dcnode-id="1210" instrument_node="">Wow wow wow! I reallllllllly loved this book.</span><br data-dcnode-id="1209"><br data-dcnode-id="1208"><span data-dcnode-id="1207" instrument_node="">Mina was amazing. Strong, brave, loyal, and amazingly good-spirited, given everything she had to deal with. And Rhys... I really loved him. It is hard to find the words. A reluctant hero, a guy who pulled himself up out of the horrible life he had as a child, but yet still managed to be a good man. </span><br data-dcnode-id="1206"><br data-dcnode-id="1205"><span data-dcnode-id="1204" instrument_node="">Both of these characters are people who don't handle emotions well. I don't want to get into the reasons why (except to assure you all that it is well done and believable), because the way the author feeds the reveals and the backstories is just too artfully done; I refuse to spoil anything. But watching these two discover this tremendous affection for each other is honestly beautiful. At times it is heartbreaking.</span><br data-dcnode-id="1203"><br data-dcnode-id="1202"><span data-dcnode-id="1201" instrument_node="">And the plot itself is well constructed. The world is a wonderful one to romp in, and the Black Guard arc is fabulous.</span><br data-dcnode-id="1200"><br data-dcnode-id="1199"><span data-dcnode-id="1198" instrument_node="">Let's talk for a moment about steampunk.</span><br data-dcnode-id="1197"><br data-dcnode-id="1196"><span data-dcnode-id="1195" instrument_node="">I love the gadgetry of it. I love the look of it. But in books, though I enjoy the hell out of it, I generally find it to be pretty clunky. Don't get me wrong, I have read some fabulous steampunk books. But personally, I have a very visual imagination. So when I am reading steampunk books, the reading itself is very stop/start - I am always pausing to puzzle out how something would look, or work, or sound. All the description the author puts in, with these amazingly cool gadgets, generally has to coalesce in my head and form a picture.</span><br data-dcnode-id="1194"><br data-dcnode-id="1193"><span data-dcnode-id="1192" instrument_node="">I can't tell you why this wasn't the case for this book, but it wasn't. For whatever reason, the images "on screen" in my head just flowed like water. It wasn't stop/start at all. The author really did a tremendous job with it in this book. All the fun of steampunk, without the clunky bits on the page. </span><br data-dcnode-id="1191"><br data-dcnode-id="1190"><span data-dcnode-id="1189" instrument_node="">If I were to offer ANY criticism at all, I would just briefly whine that we didn't get another chapter or so at the end of the book. The resolution between Mina and Rhys happened LITERALLY in the last 3 pages, and there was just not enough time (for me) to revel in the joy as they finally understood each other. But did that diminish my enjoyment of the book? Not at all.</span><br data-dcnode-id="1188"><br data-dcnode-id="1187"><span data-dcnode-id="1186" instrument_node="">This book was really fantastic, and overall I am just terribly excited for this entire series. I can't wait to see where it goes next!</span></span><span data-dcnode-id="1184" instrument_node="">

</span><span data-dcnode-id="471" id="freeTextContainer4978327072827878105"><b data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Book info:</span></b><span data-dcnode-id="481" instrument_node=""> I am the author of the Iron Seas steampunk romance series. </span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//meljeanbrook.com/books/the-iron-seas/the-iron-seas-guide/" rel="nofollow noopener"><span data-dcnode-id="480" instrument_node="">I've written a guide to the world (including a map) on my website.</span></a><span data-dcnode-id="478" instrument_node=""> </span><br data-dcnode-id="477"><br data-dcnode-id="476"><span data-dcnode-id="475" instrument_node="">I also write a paranormal romance series, the Guardians. </span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//meljeanbrook.com/books/the-guardian-series/primer/" rel="nofollow noopener"><span data-dcnode-id="474" instrument_node="">That series guide is also on my website, including a "The Story So Far" feature,</span></a><span data-dcnode-id="472" instrument_node=""> which allows you to catch up on all of the books that previously released in the series if you start after the first installm</span></span><span data-dcnode-id="470" instrument_node="">
</span><span data-dcnode-id="443" id="freeText4978327072827878105" style="display:none"><b data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Book info:</span></b><span data-dcnode-id="467" instrument_node=""> I am the author of the Iron Seas steampunk romance series. </span><a data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//meljeanbrook.com/books/the-iron-seas/the-iron-seas-guide/" rel="nofollow noopener"><span data-dcnode-id="466" instrument_node="">I've written a guide to the world (including a map) on my website.</span></a><span data-dcnode-id="464" instrument_node=""> </span><br data-dcnode-id="463"><br data-dcnode-id="462"><span data-dcnode-id="461" instrument_node="">I also write a paranormal romance series, the Guardians. </span><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//meljeanbrook.com/books/the-guardian-series/primer/" rel="nofollow noopener"><span data-dcnode-id="460" instrument_node="">That series guide is also on my website, including a "The Story So Far" feature,</span></a><span data-dcnode-id="458" instrument_node=""> which allows you to catch up on all of the books that previously released in the series if you start after the first installment. </span><br data-dcnode-id="457"><br data-dcnode-id="456"><b data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Goodreads info:</span></b><span data-dcnode-id="453" instrument_node=""> I am slowly, slowly adding to my shelves and reviews. It's unlikely that I will join many book discussions (especially of my own work) simply because I don't want to stifle reader conversation. </span><br data-dcnode-id="452"><br data-dcnode-id="451"><b data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Bio:</span></b><span data-dcnode-id="448" instrument_node=""> Meljean was raised in the middle of the woods, and hid under her blankets at night with fairy tales, comic books, and romances. She left the forest and went on a misguided tour through the world of accounting before focusing on her first loves, reading and writing–and she realized that monsters, superheroes, and happily-ever-afters are easily found between the covers, as well as under them, so she set out to make her own.</span><br data-dcnode-id="447"><br data-dcnode-id="446"><span data-dcnode-id="445" instrument_node="">Meljean lives in Portland, Oregon with her husband and daughter.</span><br data-dcnode-id="444"></span><span data-dcnode-id="442" instrument_node="">
