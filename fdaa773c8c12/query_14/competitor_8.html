</span><span data-dcnode-id="3913" id="freeTextContainer17448688409625121776"><span data-dcnode-id="3914" instrument_node="">My review of The Iron Duke won’t do enough of justice. The entire time I read, my jaw was dropped in amazement. The Iron Duke has wowed me in some many ways. Meljean Brook is an author I’m loyal to, through and through. It’s a great feeling to have started with an author since the beginning of their writing career and watch them evolve and continue to astound with every single book they’ve written. The Iron Duke is mind-blowing in such a way that it may just turn the romance genre on its ear, in</span></span><span data-dcnode-id="3912" instrument_node="">
</span><span data-dcnode-id="3883" id="freeText17448688409625121776" style="display:none"><span data-dcnode-id="3911" instrument_node="">My review of The Iron Duke won’t do enough of justice. The entire time I read, my jaw was dropped in amazement. The Iron Duke has wowed me in some many ways. Meljean Brook is an author I’m loyal to, through and through. It’s a great feeling to have started with an author since the beginning of their writing career and watch them evolve and continue to astound with every single book they’ve written. The Iron Duke is mind-blowing in such a way that it may just turn the romance genre on its ear, including the Steampunk genre that still has many readers scratching their heads in confusion because they just can’t understand it.</span><br data-dcnode-id="3910"><br data-dcnode-id="3909"><span data-dcnode-id="3908" instrument_node="">The plot of The Iron Duke is one of the most complex I’ve read in a long time. The last author who made my head spin in such a way was Anne Bishop’s Black Jewels Trilogy. Bishop’s books have such intricate world-building, where it’s nearly impossible to explain it all. The same applies here with The Iron Duke. What I can tell you is that the world Meljean has created is a very scary and uncomfortable place, and one I wouldn’t want to live in. For the past two-hundred years, the Horde has ruled most of Europe, very much like a terrorist organization that sends fear into the hearts of many, including England. The Horde has far reaching hands, but those who were lucky enough to escape parts of Europe, mainly England, to America, are now slowly returning back to the land they left behind. The reason the British fell to the Horde was that the Horde hid things called nanogents, invisible bugs, into tea and sugar where they traded it very cheaply. Then the Horde the activated the bugs. This gave them control over the British. Can you just imagine, with a touch of a button, where someone has the power to make your body do whatever it wants? Or suppress your emotions where you don’t have the freedom to feel the way you want to? The Horde is able to do all this and so much more. And then one man rose up and went on a suicide mission to end the Horde’s slavery. Nine years ago, The Iron Duke, known as Rhys Tarhaearn, former pirate captain and recently titled Duke of Anglesey flew his ship into the Horde’s controlling tower, ending the Horde’s reign over England and becoming their national hero.</span><br data-dcnode-id="3907"><br data-dcnode-id="3906"><span data-dcnode-id="3905" instrument_node="">Detective Inspector Mina Wentworth knows the Iron Duke’s reputation very well. Mina’s parents are poor even with their Lord and Lady title, and their daughter is ridiculed and spit upon because Mina was conceived during a state function the Horde held where all the peers of the realm were required to attend. The Horde planned a Frenzy, forcing the guest to engage in sexual acts with anyone and anybody. Mina was the outcome and has Horde blood running through her veins. But an important fact to bear in mind is that Mina loves her parents and visa-versa. They protect and care for one another deeply.</span><br data-dcnode-id="3904"><br data-dcnode-id="3903"><span data-dcnode-id="3902" instrument_node="">Mina finds purpose in her job as an inspector, even though her latest investigation leads her straight to the Iron Duke’s doorsteps. A body has been dropped from an airship, and is some sort of warning against the duke. The Duke wants to handle matters himself, and away from the police, including “handling” Mina in his own special way. Mina refuses to succumb to the Iron Duke’s regard toward her, but has no choice but to let him join her on the investigation because what he wants, he gets. </span><br data-dcnode-id="3901"><br data-dcnode-id="3900"><span data-dcnode-id="3899" instrument_node="">Someone is building an invention, a weapon the Horde would use, if they could to take over England again. Mina has a personal stake in the case when her younger brother, who’s training aboard Rhys’s former air ship, which is used by the British Navy, has been hijacked and the crew held for ransom. Now Mina has to rescue her brother and try to save England at the same time.</span><br data-dcnode-id="3898"><br data-dcnode-id="3897"><span data-dcnode-id="3896" instrument_node="">Mina won’t be alone on this mission. Rhys will come with her, using not only his brains and former skill as a pirate, but along with a few trusted friends such as the Lady Yasmeen Corsair, the captain of her own airship, and Rhys’s close friend Scarsdale, a drunk who is afraid of heights, but has a man’s back during a fight. Mina has so much to lose because Rhys has targeted her for his own. He has laid claim to Mina, and the price he’s asking is too high for her to accept. Rhys is not one to take no for an answer, and soon he’s cutting away at Mina’s resolve where she wants to give into the desires The Iron Duke is offering regardless of the consequences.</span><br data-dcnode-id="3895"><br data-dcnode-id="3894"><span data-dcnode-id="3893" instrument_node="">Everyone so often I’ll have a call to action telling people to buy a book and drop any other book they’re reading at the moment. Here I am again with that call for The Iron Duke. There are not enough adjectives to describe what a wonderful experience I had while reading The Iron Duke. This is one book that makes me want to applaud because it’s so damn good. Meljean brings forth the steam, and I’m not just talking about the steam from the airships and machines within these pages. The things that come out of Rhys’s mouth in regards to what he wants to do to Mina, and then does to her, had me blushing. Hello? Me, your pervy KB blushing over a love scene? That takes immense skill from an author to be able to make me have such a reaction. The amount of times Rhys gives pleasure to Mina, and the way it’s describe in graphic detail, will make you melt into a pile of goo. This is one relationship that’s incredibly passionate and straight up sex on a stick. Something very important to keep in mind is that Mina is no pushover when it comes to Rhys. Poor Rhys never stood a chance with Mina. She is his salvation, and soon his reason for breathing.</span><br data-dcnode-id="3892"><br data-dcnode-id="3891"><span data-dcnode-id="3890" instrument_node="">There’s a combination of swashbuckling fights that brings to mind the 1935 movie, Captain Blood, ravenous, crazed zombies, and enough science fiction and fantasy to make you agog because Meljean makes it work so well together when it shouldn’t.</span><br data-dcnode-id="3889"><br data-dcnode-id="3888"><span data-dcnode-id="3887" instrument_node="">While reading The Iron Duke, I couldn’t stop thinking about the 1984 movie, The Terminator. There are many subtle instances of that movie within the story, mainly because of what the Horde made people become. The Iron Duke can be taken somewhat in the literal sense when it comes to Rhys, but make no mistake; he’s not a mindless machine, but very much a man who feels. If James Cameron ever got his hands on The Iron Duke, that movie would be a blockbuster of epic proportions.</span><br data-dcnode-id="3886"><br data-dcnode-id="3885"><span data-dcnode-id="3884" instrument_node="">If you don’t read The Iron Duke, you’re making a big mistake. The Iron Duke may be one of the most influential books published this year that I’ve read. Meljean, I applaud you, and invoke my phrase I use sparingly where, “I want to have babies” with The Iron Duke, and if I could, would roll around with it to soak up its excellence.</span></span><span data-dcnode-id="3882" instrument_node="">

</span><span data-dcnode-id="3777" id="freeTextContainer12036840847876886388"><span data-dcnode-id="3787" instrument_node="">Rbrs #9</span><br data-dcnode-id="3786"><br data-dcnode-id="3785"><span data-dcnode-id="3784" instrument_node="">This was a shock. I kind of liked this one! It's a decently written action book and for more than half the pages it has a real plot, mostly. There are phrases that make me think "steampunk," like this nifty one: </span><i data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">...they ran into the street, past a long vehicle that clipped along on dozens of narrow legs like a centipede, the seats loaded with children and guarded by hard-eyed nuns armed with scimitars.</span></i><span data-dcnode-id="3781" instrument_node=""> I guess there isn't too much that's steampunk about that sentence, but I like it.</span><br data-dcnode-id="3780"><br data-dcnode-id="3779"><span data-dcnode-id="3778" instrument_node="">Meljea</span></span><span data-dcnode-id="3776" instrument_node="">
</span><span data-dcnode-id="3756" id="freeText12036840847876886388" style="display:none"><span data-dcnode-id="3775" instrument_node="">Rbrs #9</span><br data-dcnode-id="3774"><br data-dcnode-id="3773"><span data-dcnode-id="3772" instrument_node="">This was a shock. I kind of liked this one! It's a decently written action book and for more than half the pages it has a real plot, mostly. There are phrases that make me think "steampunk," like this nifty one: </span><i data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">...they ran into the street, past a long vehicle that clipped along on dozens of narrow legs like a centipede, the seats loaded with children and guarded by hard-eyed nuns armed with scimitars.</span></i><span data-dcnode-id="3769" instrument_node=""> I guess there isn't too much that's steampunk about that sentence, but I like it.</span><br data-dcnode-id="3768"><br data-dcnode-id="3767"><span data-dcnode-id="3766" instrument_node="">Meljean's world-building is scattered throughout the book, a little frustrating because I couldn't pick it up easily by skimming and had to actually read it (and many things were confusing until the background explanation caught up), but not all dumbed down. She doesn't make the mistake of trying to get too detailed with the science and screwing things up, although this also seemed to introduce holes. It's pretty convoluted...I think the gist is that over 200 years ago the leader of the Asian Horde/Mongols requested a delegation of European scientists to visit. These scientists were seized and forced to create things for war, including nanobots (yes yes, big stretch, but this is a place where she skips explanation) that were placed in sugar for years as a preliminary measure. Before the Horde invaded, these nanobots were activated and radio waves were used to control everyone who had eaten that sugar. Fast forward about 200 years, the Iron Duke was able to destroy the radio tower and the Horde was overthrown in England (another explanation skip, one that's confusing instead of maybe unnecessary, why wasn't he affected by the radio signal? different frequency, but how? did natural reproduction affect the nanobots? was he able to alter them somehow?). Nine years after that revolution, the nation is still dealing with recovery from that time, the return of those who had fled to America and their wealth (and lack of suffering), the nanobots that are still present in everyone and provide benefits but also the fear that control may be re-established, and prejudice against those with Asian features. Oh, and in nations where the Horde cleaned out the people and wanted to prevent uprisings, instead of salting the earth they salted the people with another kind of nanobot that turned them into zombies.</span><br data-dcnode-id="3765"><br data-dcnode-id="3764"><span data-dcnode-id="3763" instrument_node="">Aaaaaand then our story starts. Sheesh. The background was more interesting than the main couple.</span><br data-dcnode-id="3762"><br data-dcnode-id="3761"><span data-dcnode-id="3760" instrument_node="">The story starts out fairly simple but involving, a murder mystery that turns out to be bigger than expected. The world-building, again, fun and quite interesting. Unfortunately, just past the halfway mark, she seems to have gotten into a panic about the relatively slow development of the romance part of the story and just inserts sexytimes without much reason. They way the Iron Duke plots to get the woman? Dumb. The actual sexytimes? Egads, why is it always unwilling and then she can't keep away from him? Dumb. There are numerous side characters who are introduced as if they'll be important but then removed - they're in they're out. And then the climax. Dumb.</span><br data-dcnode-id="3759"><br data-dcnode-id="3758"><span data-dcnode-id="3757" instrument_node="">Blah, maybe I didn't like it, now that I think about it. The first half wasn't bad, or maybe my standards are greatly lowered when I tackle an RBRS selection (admittedly they're not what I'd select for myself, but we're reading them anyway in a group). Just thinking about the romance though, the "romance," makes me dislike it more.</span></span><span data-dcnode-id="3755" instrument_node="">

</span><span data-dcnode-id="3603" id="freeTextContainer17513669792250883533"><span data-dcnode-id="3626" instrument_node="">Why does Germany get to have a cool cover???</span><br data-dcnode-id="3625"><br data-dcnode-id="3624"><img class="gr-hostedUserImg" data-dcnode-id="3623" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380344220i/699262.jpg&amp;raw"><br data-dcnode-id="3622"><br data-dcnode-id="3621"><span data-dcnode-id="3620" instrument_node="">@our cover: Dude! Put a shirt on!</span><br data-dcnode-id="3619"><br data-dcnode-id="3618"><span data-dcnode-id="3617" instrument_node="">I really have a problem with these typical shirtless dude covers. Could you get shallower than that? Buy a book just ‘cause a hot dude is on the cover. Book porn, that’s what this is…</span><br data-dcnode-id="3616"><br data-dcnode-id="3615"><span data-dcnode-id="3614" instrument_node="">My first thoughts when starting the book were (in this exact order):</span><br data-dcnode-id="3613"><br data-dcnode-id="3612"><b data-dcnode-id="3604"><span data-dcnode-id="3611" instrument_node="">A life without sugar!!! The horrooor!!!!</span><br data-dcnode-id="3610"><br data-dcnode-id="3609"><span data-dcnode-id="3608" instrument_node="">Pirates *droools*</span><br data-dcnode-id="3607"><br data-dcnode-id="3606"><span data-dcnode-id="3605" instrument_node="">Tahaeram or whatever wtf is that name?? I can’t even remember it! Why didn’t they call him Bob? That would be easy </span></b></span><span data-dcnode-id="3602" instrument_node="">
</span><span data-dcnode-id="3439" id="freeText17513669792250883533" style="display:none"><span data-dcnode-id="3601" instrument_node="">Why does Germany get to have a cool cover???</span><br data-dcnode-id="3600"><br data-dcnode-id="3599"><img class="gr-hostedUserImg" data-dcnode-id="3598" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380344220i/699262.jpg&amp;raw"><br data-dcnode-id="3597"><br data-dcnode-id="3596"><span data-dcnode-id="3595" instrument_node="">@our cover: Dude! Put a shirt on!</span><br data-dcnode-id="3594"><br data-dcnode-id="3593"><span data-dcnode-id="3592" instrument_node="">I really have a problem with these typical shirtless dude covers. Could you get shallower than that? Buy a book just ‘cause a hot dude is on the cover. Book porn, that’s what this is…</span><br data-dcnode-id="3591"><br data-dcnode-id="3590"><span data-dcnode-id="3589" instrument_node="">My first thoughts when starting the book were (in this exact order):</span><br data-dcnode-id="3588"><br data-dcnode-id="3587"><b data-dcnode-id="3573"><span data-dcnode-id="3586" instrument_node="">A life without sugar!!! The horrooor!!!!</span><br data-dcnode-id="3585"><br data-dcnode-id="3584"><span data-dcnode-id="3583" instrument_node="">Pirates *droools*</span><br data-dcnode-id="3582"><br data-dcnode-id="3581"><span data-dcnode-id="3580" instrument_node="">Tahaeram or whatever wtf is that name?? I can’t even remember it! Why didn’t they call him Bob? That would be easy to remember.</span><br data-dcnode-id="3579"><br data-dcnode-id="3578"><span data-dcnode-id="3577" instrument_node="">Pirates of the skies so freakin’ awesome!!!</span><br data-dcnode-id="3576"><br data-dcnode-id="3575"><span data-dcnode-id="3574" instrument_node="">ZOMG ZOMBIES!!!!!!</span></b><br data-dcnode-id="3572"><br data-dcnode-id="3571"><span data-dcnode-id="3570" instrument_node="">So after these *droolface* comments I was expecting the book to be something big. Well, I guess you could ignore the Bob one… but you get it. Soo much potential! *facepalm*</span><br data-dcnode-id="3569"><br data-dcnode-id="3568"><span data-dcnode-id="3567" instrument_node="">I’ll explain the *facepalm* in a second.</span><br data-dcnode-id="3566"><br data-dcnode-id="3565"><span data-dcnode-id="3564" instrument_node="">I’ll start with some simple images. </span><b data-dcnode-id="3562"><span data-dcnode-id="3563" instrument_node="">How I see steampunk:</span></b><br data-dcnode-id="3561"><br data-dcnode-id="3560"><img class="gr-hostedUserImg" data-dcnode-id="3559" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380344220i/699263._SX540_.jpg&amp;raw" width="500"><br data-dcnode-id="3558"><img class="gr-hostedUserImg" data-dcnode-id="3557" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380344220i/699264.jpg&amp;raw" width="500"><br data-dcnode-id="3556"><img class="gr-hostedUserImg" data-dcnode-id="3555" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380344220i/699265._SX540_.jpg&amp;raw" width="500"><br data-dcnode-id="3554"><img class="gr-hostedUserImg" data-dcnode-id="3553" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380344220i/699266.jpg&amp;raw" width="500"><br data-dcnode-id="3552"><img class="gr-hostedUserImg" data-dcnode-id="3551" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380344220i/699267.jpg&amp;raw" width="500"><br data-dcnode-id="3550"><br data-dcnode-id="3549"><br data-dcnode-id="3548"><b data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">How I see steampunk in this book:</span></b><br data-dcnode-id="3545"><br data-dcnode-id="3544"><img class="gr-hostedUserImg" data-dcnode-id="3543" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380344220i/699268.jpg&amp;raw"><img class="gr-hostedUserImg" data-dcnode-id="3542" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380344220i/699269.jpg&amp;raw"><br data-dcnode-id="3541"><br data-dcnode-id="3540"><span data-dcnode-id="3539" instrument_node="">Yep! It eventually ended up into something like this. Sadly…</span><br data-dcnode-id="3538"><br data-dcnode-id="3537"><span data-dcnode-id="3536" instrument_node="">It started with an interesting plot. The whole bug in sugar and tea mindcontrol gig seemed really good. Great inventions and amazing places throughout the story. It had a more urban fantasy feel than a romance-whatever one. It was a great combination of action, drama and love. I was really impressed.</span><br data-dcnode-id="3535"><br data-dcnode-id="3534"><span data-dcnode-id="3533" instrument_node="">I don’t know why but I got the Bonnie and Clyde vibe out of this. Made me remember this great painting done by </span><a data-dcnode-id="3532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//adonihs.deviantart.com/" rel="nofollow noopener" target="_blank"></a><span data-dcnode-id="3531" instrument_node="">Adonihs.</span><br data-dcnode-id="3530"><br data-dcnode-id="3529"><img class="gr-hostedUserImg" data-dcnode-id="3528" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380344220i/699270._SY540_.jpg&amp;raw" width="500"><br data-dcnode-id="3527"><br data-dcnode-id="3526"><span data-dcnode-id="3525" instrument_node="">Hmmm let me think… what other good stuff does it have? Oh yes! Scarsdale was a nice character. A coward, but funny. Reminded me of the brother dude from </span><a data-dcnode-id="3524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.imdb.com/title/tt0120616/" rel="nofollow noopener" target="_blank"></a><span data-dcnode-id="3523" instrument_node="">The Mummy. And don’t let me start with what they did to that awesome movie. I’d end up having a seizure.</span><br data-dcnode-id="3522"><br data-dcnode-id="3521"><span data-dcnode-id="3520" instrument_node="">Aaaaaand then the book got ruined. </span><br data-dcnode-id="3519"><br data-dcnode-id="3518"><span data-dcnode-id="3517" instrument_node="">Mina’s drama started, Traheean whatever his name is got in heat for her and all the action went to hell. Then he started getting dirty with her and she rejected him, then he insists and she gives in but is afraid to have an orgasm because she had a lesbian moment with her BFF in the past. Mindcontrol sh*t. What the f*ck??? How can you ruin such a good book like that?? Like I care about her mental issues or her damn orgies or whatever!! Stupid!</span><br data-dcnode-id="3516"><br data-dcnode-id="3515"><span data-dcnode-id="3514" instrument_node="">Why did the author have to create such an idiotic heroine??? Seriously, the book is awesome, it has such great elements that I LOVED (steampunk stuff, zombies, action, a half-iron-thing dude) so you can understand how I feel when I think that this could have been a perfect book for me. Now I can’t give it a high score because of the beautiful Mina. Thank you dude, you just ruined the book for me!</span><br data-dcnode-id="3513"><br data-dcnode-id="3512"><span data-dcnode-id="3511" instrument_node="">Before I go on with the review I have to do some </span><b data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">Find and Replace</span></b><span data-dcnode-id="3508" instrument_node=""> in this book.</span><br data-dcnode-id="3507"><br data-dcnode-id="3506"><img class="gr-hostedUserImg" data-dcnode-id="3505" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380344220i/699271._SY540_.jpg&amp;raw"><br data-dcnode-id="3504"><br data-dcnode-id="3503"><span data-dcnode-id="3502" instrument_node="">Stupid Mina! *angry face* again. *imitates her squeaky voice* </span><i data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">“Oh smoking hells the big bad zombies are coming! AAAAAA!!!!”</span></i><br data-dcnode-id="3499"><br data-dcnode-id="3498"><span data-dcnode-id="3497" instrument_node="">She is the most selfish character you could find. She wants the dude’s love but she doesn’t want a relationship with him because she’ll get too much bad publicity and ruin her family. One, the dude’s a hero and you’d get good publicity. Two, wtf is this attitude? Could you be more stupid than this? The guy is offering a carte blanche and she turns it down. Three, Mina you’re an idiot. Four, I hate you Meljean Brook for creating this disastrous character that ruined another pirate book for me. Five, I need a shotgun. Pronto.</span><br data-dcnode-id="3496"><br data-dcnode-id="3495"><span data-dcnode-id="3494" instrument_node="">And Rhys giving up his life for a selfish ass is stupid. I wanted a strong male character and I got this in-heat-muscle-filled-iron-man dude. At first he was damn awesome and now look at him. Ugh this book makes me get violent!!</span><br data-dcnode-id="3493"><br data-dcnode-id="3492"><img class="gr-hostedUserImg" data-dcnode-id="3491" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380344220i/699272._SY540_.jpg&amp;raw"><br data-dcnode-id="3490"><br data-dcnode-id="3489"><span data-dcnode-id="3488" instrument_node="">Oh yeah now she’s content after taking a bullet for him and becoming a f*cking hero. Now she’s all strong and more masculine than Rhys. I didn’t think this book would be such a huge pissing contest.</span><br data-dcnode-id="3487"><br data-dcnode-id="3486"><span data-dcnode-id="3485" instrument_node="">Should I bother saying that I hope the next book is better? I have a weakness for pirates and zombies dammit!!</span><br data-dcnode-id="3484"><br data-dcnode-id="3483"><span data-dcnode-id="3482" instrument_node="">Just a thought. If Rhys, say, trips and falls over Mina. Just by mistake... If there’s a banana peel on the floor it wouldn’t be *cough* because of *cough* me *cough* or anything. But as a concept. He trips and falls. He’s heavy like a tank. The answer to the equation is Mina dying a horrible death right? Where the hell did I put those bananas...</span><br data-dcnode-id="3481"><br data-dcnode-id="3480"><br data-dcnode-id="3479"><b data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">Top 5 quotes</span></b><br data-dcnode-id="3476"><br data-dcnode-id="3475"><b data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">#5</span></b><i data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node=""> His gaze searched her features. Finally, he gave a short nod—as if she needed his permission to proceed. He certainly had a high opinion of himself. Unfortunately, everyone else in England shared that view. </span></i><br data-dcnode-id="3470"><br data-dcnode-id="3469"><b data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">#4</span></b><i data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node=""> Dead people of all sorts were more tolerable than most of those living. </span></i><br data-dcnode-id="3464"><br data-dcnode-id="3463"><b data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">#3</span></b><i data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node=""> “And inspector . . .” He strode forward and stared down at her, his gaze fierce. “You run. Because I am not taking a zombie into my bed.” </span></i><br data-dcnode-id="3458"><br data-dcnode-id="3457"><b data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">#2</span></b><i data-dcnode-id="3451"><span data-dcnode-id="3454" instrument_node=""> “We’ve both lived many years in London, and our paths never crossed. After today, I cannot imagine we’ll meet again or have reason to be alone.”</span><br data-dcnode-id="3453"><span data-dcnode-id="3452" instrument_node="">“You’ll go wherever there are dead bodies.” He released the gate. “I can arrange for several to be found.” </span></i><br data-dcnode-id="3450"><br data-dcnode-id="3449"><b data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">#1</span></b><i data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node=""> “Of course I wear armor. I am sitting with a pirate, a mercenary, an adventurer, and a bounder. If a shot is not fired tonight, I daresay that your reputations are nothing but lies.” </span></i><br data-dcnode-id="3444"><br data-dcnode-id="3443"><span data-dcnode-id="3442" instrument_node="">For a proper view of my "wonderful" review visit </span><a data-dcnode-id="3441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//zombiehazard.blogspot.com/2011/08/iron-duke-iron-seas-1.html" rel="nofollow noopener" target="_blank"></a><span data-dcnode-id="3440" instrument_node="">ZombieHazard.</span></span><span data-dcnode-id="3438" instrument_node="">

        rated it
        </span><span class="staticStars notranslate" data-dcnode-id="3361" title="really liked it"><span class="staticStar p10" data-dcnode-id="3366" size="15x15"><span data-dcnode-id="3367" instrument_node="">really liked it</span></span><span class="staticStar p10" data-dcnode-id="3365" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3364" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3363" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3362" size="15x15"></span></span><span data-dcnode-id="3360" instrument_node="">

</span><div class="reviewText stacked" data-dcnode-id="3294"><span data-dcnode-id="3357" instrument_node="">
</span><span class="readable" data-dcnode-id="3296" id="reviewTextContainer121666808"><span data-dcnode-id="3356" instrument_node="">
</span><span data-dcnode-id="3345" id="freeTextContainer7265378566001949476"><span data-dcnode-id="3355" instrument_node="">The Iron Duke by Meljean Brook</span><br data-dcnode-id="3354"><br data-dcnode-id="3353"><span data-dcnode-id="3352" instrument_node="">I was not prepared for this book.</span><br data-dcnode-id="3351"><br data-dcnode-id="3350"><span data-dcnode-id="3349" instrument_node="">My expectation for a steampunk romance was based on The Parasol Protectorate series by Gail Carriger. Those books are light-hearted fun, filled with kooky inventions and a no-nonsense heroine. The steampunk part of Carriger's world provides an entertaining and funky backdrop for the story. The humor is very tongue-in-cheek, right up my alley.</span><br data-dcnode-id="3348"><br data-dcnode-id="3347"><span data-dcnode-id="3346" instrument_node="">The Iron Duke couldn't be more different. While Carriger's world is political, it's also quit</span></span><span data-dcnode-id="3344" instrument_node="">
</span><span data-dcnode-id="3301" id="freeText7265378566001949476" style="display:none"><span data-dcnode-id="3343" instrument_node="">The Iron Duke by Meljean Brook</span><br data-dcnode-id="3342"><br data-dcnode-id="3341"><span data-dcnode-id="3340" instrument_node="">I was not prepared for this book.</span><br data-dcnode-id="3339"><br data-dcnode-id="3338"><span data-dcnode-id="3337" instrument_node="">My expectation for a steampunk romance was based on The Parasol Protectorate series by Gail Carriger. Those books are light-hearted fun, filled with kooky inventions and a no-nonsense heroine. The steampunk part of Carriger's world provides an entertaining and funky backdrop for the story. The humor is very tongue-in-cheek, right up my alley.</span><br data-dcnode-id="3336"><br data-dcnode-id="3335"><span data-dcnode-id="3334" instrument_node="">The Iron Duke couldn't be more different. While Carriger's world is political, it's also quite silly (the effeminate vampire friend, quirky side kick, lusty werewolf husband). Brook's post-apocalyptic world is dark, atmospheric and sinister. There is nothing remotely funny about the politics in this book. The hierarchies of her society--the bounders, the buggers, the Horde, the military--are fraught with hostility and racial discrimination. While Carriger's creative steampunk inventions elicited a smile--such as Alexia's fully outfitted parasol--the mechanics of Brook's world are straight from a horror movie. Mechanical "bugs" infiltrate the human body, and are controlled by radio frequencies enslaving the entire human population of Great Britain. Horrifying images of humans with machines as body parts reminded me of Quentin Tarantino's movie Grindhouse...remember Rose McGowan's half-machine gun leg? She would fit right into this troubling world.</span><br data-dcnode-id="3333"><br data-dcnode-id="3332"><span data-dcnode-id="3331" instrument_node="">Mina's very existence is the result of unspeakable acts, and the fact that everyone recognizes her as a product of Horde rape is crushing. This blatant racial discrimination also evoked images of half-white/half-Asian children left behind in Vietnam after the war. There is a lot of dark and ugly political stuff in this book....a much darker spin on the alternate industrial revolution reality of a steampunk world than Carriger's version.</span><br data-dcnode-id="3330"><br data-dcnode-id="3329"><span data-dcnode-id="3328" instrument_node="">Overall, the book is excellent. The story is very compelling--suspenseful, riveting. Brook is a powerful storyteller. The heroine Mina is incredible. Saddled with an unbelievably traumatic family history, she has risen above it to become a force to be reckoned with...courageous and filled with integrity. Which is most troubling to the hero Rhys, who is mercenary without shame.</span><br data-dcnode-id="3327"><br data-dcnode-id="3326"><span data-dcnode-id="3325" instrument_node="">Mina is the real hero of this book. She is phenomenal. The scene where she saves Rhys and his crew from a sea monster is extraordinary. Dangling upside down from a rope, she shoots a harpoon into the creature's eye and saves the ship from its evil clutches. Rock on! The climatic scene where she again saves Rhys by throwing her body in front of a bullet intended for him is heart-wrenching. How fantastic that her mother quickly whips together a mechanical heart from various body parts to save her daughter. I have to admit that I thought about the metal stent in my artery as I read this scene. It made me feel a little bit better about my "spare part" and sort of cool in a steampunky way!</span><br data-dcnode-id="3324"><br data-dcnode-id="3323"><span data-dcnode-id="3322" instrument_node="">The relationship between Rhys and Mina is intense. He is the rugged, swash-buckling legendary hero...fearless, but filled with moral ambiguity. Mina fears the powerful feelings he evokes inside of her, reminding her of her mindless past, dictated by the Horde. The heady lust building between them is fantastic, but I actually found their physical relationship at times distracting from the overall story. (Did I just say that? What is happening to me????) It's difficult to blend a romantic and erotic story with a political fantasy like this. I sometimes felt like the story was jumping back and forth between the lusty relationship and the plot. I also wish we had a bit more insight about Rhys' character.</span><br data-dcnode-id="3321"><br data-dcnode-id="3320"><span data-dcnode-id="3319" instrument_node="">A few things bothered me. One, I didn't like the threat of Mina's younger brother being sold into sexual slavery/torture (or worse) being dangled over our heads for a good portion of the book. It made me tense and worried, and ended up being a false threat when we discovered he was fine.</span><br data-dcnode-id="3318"><br data-dcnode-id="3317"><span data-dcnode-id="3316" instrument_node="">Also, the hero's past was difficult to reconcile with his intense sexuality. If a hero has a sexually tortured past, it needs to be be pretty strongly addressed in a romance. (JR Ward did a fabulous job with this in Lover Awakened. She clearly showed how Zsadist's relationship with Bella healed this part of his tortured psyche). I don't think that Brook adequately addressed this in The Iron Duke, even though it did occur to Mina in one of the erotic scenes.</span><br data-dcnode-id="3315"><br data-dcnode-id="3314"><span data-dcnode-id="3313" instrument_node="">Finally, my biggest beef was the ending. Rhys was incredibly single-minded for most of the book...he would have Mina no matter what. He was willing to go to any lengths (illegal, immoral, etc) to possess her. Then, he sends her away after learning of her public humiliation concerning their relationship, and that's it. Even after she takes a bullet for him, he doesn't visit her. He just happens to see her in the street and stops to talk to her. A totally random meeting! Get out! That sure doesn't seem in character for this guy. The wrap up at the end (they finally profess their love for each other) could have been longer. It was a bit too rushed for me. If you're writing a romance, don't skimp on the HEA, baby!</span><br data-dcnode-id="3312"><br data-dcnode-id="3311"><span data-dcnode-id="3310" instrument_node="">Overall, this book is astoundingly good. It has fascinating world-building, strong political symbolism, and truly memorable characters. It opened up a whole new side of steampunk fantasy that has me utterly intrigued. Although I must admit Brook's vision scares the holy hell out of me. I think I'd rather visit Carriger's steampunk world--armed with a kick ass parasol of course.</span><br data-dcnode-id="3309"><br data-dcnode-id="3308"><span data-dcnode-id="3307" instrument_node="">Grade: A-/B+</span><br data-dcnode-id="3306"><br data-dcnode-id="3305"><br data-dcnode-id="3304"><span data-dcnode-id="3303" instrument_node="">Penelope</span><br data-dcnode-id="3302"></span><span data-dcnode-id="3300" instrument_node="">

</span><span data-dcnode-id="3066" id="freeText13658853064715291366" style="display:none"><span data-dcnode-id="3173" instrument_node="">God, I love steampunk! If you have never read steampunk before, let this one be your first! </span><br data-dcnode-id="3172"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="3171" height="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1428526327i/14440252._SY540_.jpg&amp;raw" width="400"><br data-dcnode-id="3170"><br data-dcnode-id="3169"><span data-dcnode-id="3168" instrument_node="">Steampunk has such amazing components in it anyway, but </span><a data-dcnode-id="3166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/24009.Meljean_Brook" rel="nofollow noopener" title="Meljean Brook"><span data-dcnode-id="3167" instrument_node="">Meljean Brook</span></a><span data-dcnode-id="3165" instrument_node="">'s </span><a data-dcnode-id="3163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/7864587.The_Iron_Duke__Iron_Seas___1_" rel="nofollow noopener" title="The Iron Duke (Iron Seas, #1) by Meljean Brook"><span data-dcnode-id="3164" instrument_node="">The Iron Duke</span></a><span data-dcnode-id="3162" instrument_node=""> steps it up like </span><b data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">500</span></b><span data-dcnode-id="3159" instrument_node=""> notches. I loved the originality and the humor. But just a heads up: It's steampunk romance...so expect a bit of bow chicka wow wow. I have only read young-adult steampunk up to this point, so I thought the addition of adult romance was a lot of fun. To date, this is my favorite steampunk novel I have ever read. The hero is sexy as hell, the heroine is kick-ass while still remaining emotionally vulnerable, and the world setup is simply fabulous...and I have to admit I did an embarrassing happy dance when I found out this is only the first of a series of novels and novellas! Check it out and get ready to enter a world both old and new, but very much its own. Enjoy!!</span><br data-dcnode-id="3158"><br data-dcnode-id="3157"><span data-dcnode-id="3156" instrument_node="">Note: My only notable complaint is that our hero went by three different names throughout the novel which was somewhat confusing for me at times. At any given time, he was referenced as The Iron Duke, Trahearn, or Rhys. Yes, his name is Rhys Trahearn and he is also known in this world as The Iron Duke, but it still took a minute to get used to.</span><br data-dcnode-id="3155"><br data-dcnode-id="3154"><b data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">My favorite quote:</span></b><br data-dcnode-id="3151"><i data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">“And you’ve just come from Parliament? How are you finding that?” “It’s much like piracy. You tell your enemies that if they don’t fall in line, you’ll leave them to die.”</span></i><br data-dcnode-id="3148"><br data-dcnode-id="3147"><span data-dcnode-id="3146" instrument_node="">The </span><u data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">Iron Seas</span></u><span data-dcnode-id="3143" instrument_node=""> series includes the following installments (as of April 2015):</span><br data-dcnode-id="3142"><span data-dcnode-id="3141" instrument_node="">#0.4-</span><a data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/19050244.The_Blushing_Bounder__Iron_Seas___0_4_" rel="nofollow noopener" title="The Blushing Bounder (Iron Seas, #0.4) by Meljean Brook"><span data-dcnode-id="3140" instrument_node="">The Blushing Bounder</span></a><br data-dcnode-id="3138"><span data-dcnode-id="3137" instrument_node="">#0.5-</span><a data-dcnode-id="3135" href="https://chatnoir </span><span data-dcnode-id="2672" id="freeTextContainer9890583798965344241"><span data-dcnode-id="2679" instrument_node="">I'm not writing a review for this one; I'm just going to mention a couple of things that "bugged" me:</span><br data-dcnode-id="2678"><br data-dcnode-id="2677"><span data-dcnode-id="2676" instrument_node="">1. This was more adventure than romance at least for the first 2/3 of the book. And despite the fact that it's focused on the suspense/action, two out of four battles against the vilains took place in no more than a paragraph. Totally anti-climatic.</span><br data-dcnode-id="2675"><br data-dcnode-id="2674"><span data-dcnode-id="2673" instrument_node="">2. This was my first steampunk and I think it may be my last. For the first 150 pages I got sick of reading about people with hammers instead of legs,</span></span><span data-dcnode-id="2671" instrument_node="">
</span><span data-dcnode-id="2651" id="freeText9890583798965344241" style="display:none"><span data-dcnode-id="2670" instrument_node="">I'm not writing a review for this one; I'm just going to mention a couple of things that "bugged" me:</span><br data-dcnode-id="2669"><br data-dcnode-id="2668"><span data-dcnode-id="2667" instrument_node="">1. This was more adventure than romance at least for the first 2/3 of the book. And despite the fact that it's focused on the suspense/action, two out of four battles against the vilains took place in no more than a paragraph. Totally anti-climatic.</span><br data-dcnode-id="2666"><br data-dcnode-id="2665"><span data-dcnode-id="2664" instrument_node="">2. This was my first steampunk and I think it may be my last. For the first 150 pages I got sick of reading about people with hammers instead of legs, mechanical lungs that needed extended tubes in their shoulders to work, pincers instead of hands and so on. The icing on the cake were the zombies that are described as mindless, vicious and highly infecting. Thankfully, the second part of the book on the airship was lighter and devoid of too many mental images like those.</span><br data-dcnode-id="2663"><br data-dcnode-id="2662"><span data-dcnode-id="2661" instrument_node="">3. The hero is described as cold and tortured in the beginning of the book. Well, I definitely didn't see it at least where the heroine was concerned. He touches her and he's immediately a goner. Puddle in her feet, lapdog in her arms. He will do anything to have her (although it's not love, he just wants to 'shag' he, but he's never felt so strongly for anyone else, et cetera et cetera). I'm sure many readers love the posessive/obsessive hero who is willing to cut his wrists and bleed himself dry so the heroine won't die of thirst, but for me this is sappy; sweet and sappy. I know however that most people love this kind of hero, so what's a minus for me is probably a plus for others.</span><br data-dcnode-id="2660"><br data-dcnode-id="2659"><span data-dcnode-id="2658" instrument_node="">4. I didn't particularly like the heroine or could understand all her actions and decisions. Again, this has only to do with my personal likes and dislikes rather than something particular in her behavior except for the fact that I thought she teased him and at the same time repelled him for more than was necessary. </span><br data-dcnode-id="2657"><br data-dcnode-id="2656"><span data-dcnode-id="2655" instrument_node="">As it's obvious, the reasons I didn't particularly enjoy it are purely personal; it was just </span><i data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">not</span></i><span data-dcnode-id="2652" instrument_node=""> my cup of tea in too many areas. On the contrary, it was well written, fast paced (even though I didn't particularly like it, I was never bored) and had a couple of very interesting secondary characters. Will I go on with the rest of the series? Not likely but it's not out of the question either.</span></span><span data-dcnode-id="2650" instrument_node="">

</span><span data-dcnode-id="2542" id="freeTextContainer9223924852098762773"><span data-dcnode-id="2549" instrument_node="">Detective Inspector investigates a murder and uncovers a treasonous plot and fucks a pirate/duke/war hero/nanotechnology superman a lot in alt history England, also zombies.</span><br data-dcnode-id="2548"><br data-dcnode-id="2547"><span data-dcnode-id="2546" instrument_node="">I feel somewhat betrayed. I was promised terrible books on the level of </span><i data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Skye O’Whatsit</span></i><span data-dcnode-id="2543" instrument_node=""> and that one where the hero’s name is actually Fulk, and then you hand me this. And I found it inexplicably charming! I mean, it’s a weird post catastrophe England with functioning prosthetics and airships (and apparently vibrators), and it</span></span><span data-dcnode-id="2541" instrument_node="">
</span><span data-dcnode-id="2517" id="freeText9223924852098762773" style="display:none"><span data-dcnode-id="2540" instrument_node="">Detective Inspector investigates a murder and uncovers a treasonous plot and fucks a pirate/duke/war hero/nanotechnology superman a lot in alt history England, also zombies.</span><br data-dcnode-id="2539"><br data-dcnode-id="2538"><span data-dcnode-id="2537" instrument_node="">I feel somewhat betrayed. I was promised terrible books on the level of </span><i data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">Skye O’Whatsit</span></i><span data-dcnode-id="2534" instrument_node=""> and that one where the hero’s name is actually Fulk, and then you hand me this. And I found it inexplicably charming! I mean, it’s a weird post catastrophe England with functioning prosthetics and airships (and apparently vibrators), and it’s all murder! plot! Africa! Random kraken! Sea battle! Orgasms!</span><br data-dcnode-id="2533"><br data-dcnode-id="2532"><span data-dcnode-id="2531" instrument_node="">The romance, though. It’s of that reluctant woman/determined man type, where he is absolutely and unquestioningly certain that he will have her, in whatever capacity he wants her at that moment. Vagina entitlement, you know? In his case, very literal. Which also comes with that approach to sex where penetration is the absolute end, and nothing else really counts or satisfies. Reading these sorts of romances always feels uncomfortable in the way staring down the barrel of other people’s kinks does. Particularly when it’s an outgrown kink of mine, shed when I developed a taste for relationships of equality and nontraditional power dynamics etc. And by “outgrown” I mean “since I was eleven.” This one is trying to get at the kink under a glossy wrapping of modern sensibilities (less rapiness), and I think in doing so it made the kink very uncomfortable and the modern gloss very awkward. </span><br data-dcnode-id="2530"><br data-dcnode-id="2529"><span data-dcnode-id="2528" instrument_node="">Still. I did like our heroine, who dealt with the postwar racial prejudice directed at her in ways that were not very deep, but believable. And she wasn’t </span><i data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">plucky</span></i><span data-dcnode-id="2525" instrument_node="">, she was competent. The hero didn’t like her because she’s different from all those other boringly submissive misses (thus condemning women for being what generations of men demanded that they be), he just likes her. I do too; I’m just confused about why she likes him. I think what I’m complaining of here is what I always complain of in romances: I realize attraction is often inexplicable, but I would like to get a sense of how these people fit together, psychologically, and how they grow into each other above and beyond the groin shorthand.</span><br data-dcnode-id="2524"><br data-dcnode-id="2523"><span data-dcnode-id="2522" instrument_node="">Also, I cannot </span><i data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">believe</span></i><span data-dcnode-id="2519" instrument_node=""> we made it through that entire book without one single iron penis joke.</span><br data-dcnode-id="2518"></span><span data-dcnode-id="2516" instrument_node="">

</span><i data-dcnode-id="2189"><span data-dcnode-id="2196" instrument_node="">"You may continue to call me inspector,"&nbsp;</span><br data-dcnode-id="2195"><span data-dcnode-id="2194" instrument_node="">"And you may call me Rhys.""I won't."</span><br data-dcnode-id="2193"><span data-dcnode-id="2192" instrument_node="">"Even when I'm in your bed?"</span><br data-dcnode-id="2191"><span data-dcnode-id="2190" instrument_node="">Mina dropped her hand to her gun. </span></i><span data-dcnode-id="2188" instrument_node="">

</span></blockquote><br data-dcnode-id="2184"><span data-dcnode-id="2183" instrument_node="">"I agree. That was too brazen." he leaned in toward her, taking up too much space she could hardly draw. Breath. "I should have said my bed, yes?" </span><br data-dcnode-id="2182"><br data-dcnode-id="2181"><span data-dcnode-id="2180" instrument_node="">Who knew Steampunk, Zombies, Kraken, a feisty detective and a brazenly golden earring wearing gorgeous pirate could make for such an exciting and sexy read? Well I sure didn't! I should have never waited so long to read this book. I suddenly have a desire </span><s data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">fantasy</span></s><span data-dcnode-id="2177" instrument_node=""> to seek out a brazen good hoop wearing pirate......Errrr of course what I probably would find is something most likely resembling a pimp with fake ghetto fabulous attire.&nbsp;</span><br data-dcnode-id="2176"><br data-dcnode-id="2175"><span data-dcnode-id="2174" instrument_node="">For 200 anguishing years the </span><b data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Mongol Horde</span></b><span data-dcnode-id="2171" instrument_node=""> has controlled England through fear and&nbsp;nano-agents laced in their food supplies such as sugar. The Horde continued to manipulate and restrain an oppressed&nbsp;society using nano-agent devices to manipulate their behavior. These restricted mechanical behaviors consisted of; &nbsp;manipulating emotions, suppressing anger, causing breeding frenzies leading to rape, immobility and rendering the bounders (English citizens) useless in revolt attempts against the Horde.</span><br data-dcnode-id="2170"><br data-dcnode-id="2169"><b data-dcnode-id="2164"><span data-dcnode-id="2168" instrument_node="">
</span><i data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Not a gentlemen, but the pirate captain, His Bastard Grace, the Iron Duke. It didn't matter which. He knew exactly what he was about.</span></i><span data-dcnode-id="2165" instrument_node="">
</span></b><span data-dcnode-id="2163" instrument_node=""> </span><br data-dcnode-id="2162"><br data-dcnode-id="2161"><span data-dcnode-id="2160" instrument_node="">The Iron Duke begins 10 years after </span><b data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Rhys Trahearn</span></b><span data-dcnode-id="2157" instrument_node=""> a merchant captain rescued the bounders (England civilians) from the severely brutal &nbsp;Horde Control when he destroyed their powerful and suppressive reign. The Control tower he demolished was a signal tower that communicated with the nano agents infecting the population controlling the helpless citizens with a click of a button. This heroic </span><s data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">almost suicide mission</span></s><span data-dcnode-id="2154" instrument_node=""> and brazen act saved the population from the Horde control gaining him a heroic reputation as a force to be recogned with and the revered title of pirate hero </span><b data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">The Iron Duke</span></b><span data-dcnode-id="2151" instrument_node="">.&nbsp;</span><br data-dcnode-id="2150"><br data-dcnode-id="2149"><span data-dcnode-id="2148" instrument_node="">Now free of the Horde tyranny those fortunate citizens who fled England for the New World during the Horde authority have returned to England with gold, riches and a superiority complex. This book is plagued with horribly painful prejudices towards the less fortunate citizens that have been infected with nano agents against their will and those birthed in poverty under the Horde rule.</span><br data-dcnode-id="2147"><br data-dcnode-id="2146"><b data-dcnode-id="2131"><span data-dcnode-id="2145" instrument_node="">
</span><i data-dcnode-id="2133"><span data-dcnode-id="2144" instrument_node="">"It doesn't matter I'd pay it for you."</span><br data-dcnode-id="2143"><span data-dcnode-id="2142" instrument_node="">Her laugh was short and hollow. Of course he would.</span><br data-dcnode-id="2141"><span data-dcnode-id="2140" instrument_node="">"At what price?" </span><br data-dcnode-id="2139"><span data-dcnode-id="2138" instrument_node="">His eyes narrowed. "Wouldn't &nbsp;your brother be worth it?"</span><br data-dcnode-id="2137"><span data-dcnode-id="2136" instrument_node="">A man raised in a crèche might not understand how much Mina valued her family. And so she'd forgive him that question, just this once. But she couldn't prevent the bitterness from claiming her voice. "Yes, Your Grace he is. Which means that I would be in your service for a very long time, because Andrew's worth is a hundred times greater, than any man who uses a threat on his life to strong-arm me into bed."</span><br data-dcnode-id="2135"><span data-dcnode-id="2134" instrument_node="">Amusement touched his hard mouth. "I take my opportunities where I find them, inspector."</span></i><span data-dcnode-id="2132" instrument_node="">
</span></b><span data-dcnode-id="2130" instrument_node=""> </span><br data-dcnode-id="2129"><br data-dcnode-id="2128"><span data-dcnode-id="2127" instrument_node="">Meet </span><b data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Mina,</span></b><span data-dcnode-id="2124" instrument_node=""> also referred to as </span><b data-dcnode-id="2119"><span data-dcnode-id="2123" instrument_node="">
</span><i data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Detective Inspector Wilhelmina Wentworth</span></i><span data-dcnode-id="2120" instrument_node="">
</span></b><span data-dcnode-id="2118" instrument_node=""> she's a feisty and fierce loyal protagonist I've grown to admire. Her mother was rapped by the Horde during a nano agent controlled breeding frenzy, and it was painful for her mother to see the product of her rape that she gouged out her own eyes upon first viewing her Horde daughter. Her mother has since had new eyes installed by the talented Blacksmith and her mother now recovered from that emotionally painful experience is now an advocate for bounder citizen equality as well as making lives more productive for women. &nbsp;Sadly she's been afflicted with the nano agent buggers her Horde physical features are visible and it's obvious to everyone around her that she has Horde blood in her veins resembling the Horde. This has caused her traumatic grief her entire life. She has to work and excel in her work duties just to be treated as almost an equal. It's so sad because she's a good person, loyal, honest, feisty, fearless and people treat her with disgust and actually physically cause hem to her just because she was an unfortunate product of rape by the Horde.&nbsp;</span><br data-dcnode-id="2117"><br data-dcnode-id="2116"><span data-dcnode-id="2115" instrument_node="">Luckily she has an amazingly tender and honorable protector in her inspector partner</span><b data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node=""> Constable Newberry.</span></b><span data-dcnode-id="2112" instrument_node=""> He's a happily married loyal co-worker that has a devoted friendship with Mina, and he plays the role of her personal bodyguard protecting her from bigots and other other hostile victimizers lurking in the dark for unsuspecting Mina. I look forward to reading more about Constable Newberry in future installments.</span><br data-dcnode-id="2111"><span data-dcnode-id="2110" instrument_node="">&nbsp;</span><br data-dcnode-id="2109"><span data-dcnode-id="2108" instrument_node="">In the beginning Mina has been given the task of investigating a murder victim that has been </span><i data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">literally</span></i><span data-dcnode-id="2105" instrument_node=""> been dropped off on the doorstep </span><s data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">lavish estate</span></s><span data-dcnode-id="2102" instrument_node=""> of Rhys Trahearn, The Iron Duke. Together they begin investigating this murder, and from then begins the exciting thrill ride. The Iron Duke sets his goal on possessing Mina as his own in bed or in work, until he discovers that not only is she slipping into his fantasies frequently she's also taking up a spot in his heart, and he discovers he wants to save the same spot for himself in her heart.</span><br data-dcnode-id="2101"><br data-dcnode-id="2100"><span data-dcnode-id="2099" instrument_node="">I'll start of by saying I simply loved this book. When I wasn't reading I was thinking about </span><s data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">The Iron Duke</span></s><span data-dcnode-id="2096" instrument_node=""> the murder investigation. The Iron Duke is everything I desire in a hero. He's brooding, arrogant, powerful, rich, masculine, cold and detached, yet tender when he chooses, &nbsp;and with an insatiable appetite for "shagging" the only object of his desires. With his take charge, and ask for question later attitude this Pirate Hero is a force to reckoned with. There were times in this story I felt the steam and desired a fan to cool myself off because it was as if I were a voyeur on these sizzling excursions.&nbsp;</span><br data-dcnode-id="2095"><br data-dcnode-id="2094"><b data-dcnode-id="2089"><span data-dcnode-id="2093" instrument_node="">
</span><i data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node=""> "But don't be mistaken, Mina. I don't crusade on principles. I just protect whats mine. They were on the Terror, so they're mine. And when I found Andrew, I wanted your gratitude." </span></i><span data-dcnode-id="2090" instrument_node="">
</span></b><span data-dcnode-id="2088" instrument_node=""> </span><br data-dcnode-id="2087"><br data-dcnode-id="2086"><span data-dcnode-id="2085" instrument_node="">Soon Mina and Rhys find themselves on a race against time to rescue his pirate cargo ship the Terror from evildoers especially because he feels it's his duty to protect his employees and Mina's brother happens to be one of them on that ship. So bound by his honorable captain duty to save his ship as well as his men aboard, he also seeks to save Mina's brother Andrew out of employer duty as well as a Hail Mary attempt to capture her approval and perhaps her heart.</span><br data-dcnode-id="2084"><br data-dcnode-id="2083"><span data-dcnode-id="2082" instrument_node="">Other characters worthy of mentioning In The Iron Duke were Yasmeen also known as </span><b data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Lady Cosair, Archimedes Fox,</span></b><span data-dcnode-id="2079" instrument_node=""> and </span><b data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Scarsdale</span></b><span data-dcnode-id="2076" instrument_node="">. Lady Cosair is a hilarious addition to this story due to her brazen and cold and calculating personality. She comes across as a tough as nails brutal character that you do not want to go up against because she can hold her own. I sense that she actually &nbsp;behaves in this manner as a coping mechanism in order to protect herself from either future pain or pain from her past. I know we will discover her entire story in the next novel The Iron Seas because she and Archimedes Fox are the main focus of the next novel. The Iron Duke's best friend Scarsdale is a drunken hot mess, and his behavior just brightens up the entire story, I'm really hoping his book will be sooner rather than later.</span><br data-dcnode-id="2075"><br data-dcnode-id="2074"><span data-dcnode-id="2073" instrument_node="">I absolutely </span><b data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">loved</span></b><span data-dcnode-id="2070" instrument_node=""> this story. The Iron Duke has everything I adore; a feisty courageous heroine, a gorgeous sexual tyrant hero, fighting, zombies, steampunk, kraken, imaginatively creative &nbsp;world building, steamy passionate scenes, loyalty, family values, friendship&nbsp;and most favorable of all honor.</span><br data-dcnode-id="2069"><br data-dcnode-id="2068"><b data-dcnode-id="2060"><span data-dcnode-id="2067" instrument_node="">
</span><i data-dcnode-id="2062"><br data-dcnode-id="2066"><span data-dcnode-id="2065" instrument_node="">Holding her still as he inhalled, as if drawing in her scent. He lifted his head, but didn't release her. His thumb brushed her bottom lip. "You will accept&nbsp;me. And now I will know you, even if you come to me in the dark."&nbsp;</span><br data-dcnode-id="2064"><span data-dcnode-id="2063" instrument_node="">Know her? Arrogant, insufferable knacker. Her hand shot to the front of his breeches, making claws of her fingers, and trapping his genitals in a tight grip.&nbsp;"And even in the dark, now I'll know that I'm ripping off the right cods." </span></i><span data-dcnode-id="2061" instrument_node="">
</span></b><span data-dcnode-id="2059" instrument_node=""> </span><br data-dcnode-id="2058"><br data-dcnode-id="2057"><br data-dcnode-id="2056"><span data-dcnode-id="2055" instrument_node="">Like what you see find more of my reviews at: </span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//missvainsparanormalfantasy.com/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="2054" instrument_node="">http://MissVainsParanormalFantasy.com</span></a><span data-dcnode-id="2052" instrument_node=""> </span><br data-dcnode-id="2051"><br data-dcnode-id="2050"></span><span data-dcnode-id="2048" instrument_node="">

</span><span data-dcnode-id="1796" id="freeTextContainer3180121708317562957"><span data-dcnode-id="1811" instrument_node="">A thrilling 4.5 stars.</span><br data-dcnode-id="1810"><span data-dcnode-id="1809" instrument_node="">I was not sure how I would go with this one. Just a heads-up: there was a scene that might be termed dub-con, </span><a class="jsShowSpoiler spoilerAction" data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="1802" style="display: none"><span data-dcnode-id="1806" instrument_node="">[(not the full act, but a sexual act) </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="1803" instrument_node="">]</span></span><span data-dcnode-id="1801" instrument_node=""> and I normally run screaming from these scenes, but it somehow worked for me. It may not work for everyone. </span><br data-dcnode-id="1800"><span data-dcnode-id="1799" instrument_node="">Some terrific world-building by the author and I was completely riveted so that I could not put the book down, especially the last quarter or so. Kick-arse action all the way!</span><br data-dcnode-id="1798"><span data-dcnode-id="1797" instrument_node="">It all takes plac</span></span><span data-dcnode-id="1795" instrument_node="">
</span><span data-dcnode-id="1749" id="freeText3180121708317562957" style="display:none"><span data-dcnode-id="1794" instrument_node="">A thrilling 4.5 stars.</span><br data-dcnode-id="1793"><span data-dcnode-id="1792" instrument_node="">I was not sure how I would go with this one. Just a heads-up: there was a scene that might be termed dub-con, </span><a class="jsShowSpoiler spoilerAction" data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="1785" style="display: none"><span data-dcnode-id="1789" instrument_node="">[(not the full act, but a sexual act) </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="1786" instrument_node="">]</span></span><span data-dcnode-id="1784" instrument_node=""> and I normally run screaming from these scenes, but it somehow worked for me. It may not work for everyone. </span><br data-dcnode-id="1783"><span data-dcnode-id="1782" instrument_node="">Some terrific world-building by the author and I was completely riveted so that I could not put the book down, especially the last quarter or so. Kick-arse action all the way!</span><br data-dcnode-id="1781"><span data-dcnode-id="1780" instrument_node="">It all takes place in a steam punk world where a nation simply called the Horde conquered England but has now been defeated and kicked out. Complex ideas of nanotech and mech tech (combined with airships and some zombies, even) make for some intense focus in order to understand it all, but it was worth it.</span><br data-dcnode-id="1779"><br data-dcnode-id="1778"><span data-dcnode-id="1777" instrument_node="">The two MCs are great- Mina is the police inspector and of mixed race, Rhys is an adventurer and pirate/merchant turned duke (Hereditary titles were reclaimed after the enemy was vanquished.) She is intelligent, tough and fiercely independent. He is commanding and forceful, but truly wishes only to make her happy. He is incredibly selfless in this regard. Both are damaged and traumatised in their own way.</span><br data-dcnode-id="1776"><span data-dcnode-id="1775" instrument_node="">The failure to communicate their feelings became a tad annoying towards the end </span><a class="jsShowSpoiler spoilerAction" data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="1768" style="display: none"><span data-dcnode-id="1772" instrument_node="">[ neither believes the other loves them because they will not confess his/her own feelings to the other. Mutual stoopidness! </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="1769" instrument_node="">]</span></span><span data-dcnode-id="1767" instrument_node=""> but it was a lovely, emotional finish. </span><br data-dcnode-id="1766"><img class="gr-hostedUserImg" data-dcnode-id="1765" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1512736327ra/24628874.gif&amp;raw"><br data-dcnode-id="1764"><span data-dcnode-id="1763" instrument_node="">Not sure if I will read on, as the next books don't sound so great to me - not my type of heroes/heroines (I am a bit traditional, I admit!)- but so glad I read this one!</span><br data-dcnode-id="1762"><br data-dcnode-id="1761"><span data-dcnode-id="1760" instrument_node="">Just heard the audio (March 2018): fabulous! This book is such a great story, the world-building wonderful. The MCs are difficult characters, so they had to work hard for their HEA. Loved the audio book, really brought it to life. I now understand why you might want to become a sailor on a tall ship. The scenes involving the navy totally gripped me when listening, and I saw everything in my mind's eye. I really do love this book. And I love the duke- what a guy. And Mina- her family, everything. I probably should make it 5 stars!</span></span><span data-dcnode-id="1748" instrument_node="">

</span></p><span data-dcnode-id="1632" instrument_node=""> </span><p data-dcnode-id="1627"><span data-dcnode-id="1631" instrument_node="">
</span><b data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Absolutely brilliant!</span></b><span data-dcnode-id="1628" instrument_node="">
</span></p><span data-dcnode-id="1626" instrument_node=""> </span><p data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">I had no idea that steampunk was such a wonderful genre. The world created in this book was amazing! There’s the nanoagents, which are bugs that the Horde hid in tea and sugar, which almost everyone in England ingested, and by which the Horde controlled everyone until the Iron Duke freed them from the Horde. You have people with mechanical body parts, then there’s the ratcatchers, which are modified alley cats, their bone</span></p></span><span data-dcnode-id="1622" instrument_node="">
</span><span data-dcnode-id="1589" id="freeText4054165163646295912" style="display:none"><p data-dcnode-id="1617"><span data-dcnode-id="1621" instrument_node="">
</span><i data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Just as amazing as the first time I read it.</span></i><span data-dcnode-id="1618" instrument_node="">
</span></p><span data-dcnode-id="1616" instrument_node=""> </span><p data-dcnode-id="1611"><span data-dcnode-id="1615" instrument_node="">
</span><b data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Absolutely brilliant!</span></b><span data-dcnode-id="1612" instrument_node="">
</span></p><span data-dcnode-id="1610" instrument_node=""> </span><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">I had no idea that steampunk was such a wonderful genre. The world created in this book was amazing! There’s the nanoagents, which are bugs that the Horde hid in tea and sugar, which almost everyone in England ingested, and by which the Horde controlled everyone until the Iron Duke freed them from the Horde. You have people with mechanical body parts, then there’s the ratcatchers, which are modified alley cats, their bones replaced with steel. And the zombies. I have not yet read a book with zombies, and I thoroughly enjoyed them in this novel. I love Meljean Brook’s writing. She described this world so perfectly that I could imagine everything in detail. </span></p><span data-dcnode-id="1607" instrument_node=""> </span><p data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Mina is a detective inspector, and because of the way she was conceived she is treated like dirt by the population. However, she doesn’t let this get her down, and continues to be a great detective. I really liked Mina, and I loved her attitude and how she didn’t let anyone walk over her. </span></p><span data-dcnode-id="1604" instrument_node=""> </span><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Then there is Rhys, the Iron Duke. Oh, how I loved him. I loved how he was with Mina, how instantly fascinated he was with her, and how attracted he was to her. </span></p><span data-dcnode-id="1601" instrument_node=""> </span><blockquote data-dcnode-id="1596"><span data-dcnode-id="1600" instrument_node="">
</span><b data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">He’d never needed anything as much as he needed her. Self-preservation warned him to push her away. He couldn’t stand the thought of it, only wanted to bring her in closer. But if she didn’t come to need him in return, then away or close, it wouldn’t matter—either one would destroy him. </span></b><span data-dcnode-id="1597" instrument_node="">
</span></blockquote><span data-dcnode-id="1595" instrument_node=""> </span><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">The chemistry between Mina and Rhys was absolutely wonderful. Their relationship was slow building, because of Mina’s past experience under the control of the Horde she was very afraid of her feelings towards Rhys. I loved how Rhys pursued Mina, and he never gave up, no matter how hard she tried to push him away. Both were so good at hiding their true feelings for one other, showing indifference when the exact opposite was true. </span></p><span data-dcnode-id="1592" instrument_node=""> </span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">This book was absolutely wonderful, and I can’t wait to continue with this series. I will definitely be reading many more steampunk books! </span></p></span><span data-dcnode-id="1588" instrument_node="">

</span><span data-dcnode-id="1465" id="freeTextContainer2535222430124772232"><span data-dcnode-id="1472" instrument_node="">I enjoyed this a lot, yet I still don’t feel like I really </span><i data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">get</span></i><span data-dcnode-id="1469" instrument_node=""> steampunk. The worldbuilding seems largely based on “this is wicked cool and/or scary” rather than on a logical chain of events. I never did get how, in this obviously very sexist world, women get to be on the police force.</span><br data-dcnode-id="1468"><br data-dcnode-id="1467"><span data-dcnode-id="1466" instrument_node="">The book’s biggest strength is its heroine. Mina is brave, determined, caring, yet also vulnerable -- everything you would want in a cop, or a heroine. I found myself just a bit disappointed in Rhys, a fairly stand</span></span><span data-dcnode-id="1464" instrument_node="">
</span><span data-dcnode-id="1430" id="freeText2535222430124772232" style="display:none"><span data-dcnode-id="1463" instrument_node="">I enjoyed this a lot, yet I still don’t feel like I really </span><i data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">get</span></i><span data-dcnode-id="1460" instrument_node=""> steampunk. The worldbuilding seems largely based on “this is wicked cool and/or scary” rather than on a logical chain of events. I never did get how, in this obviously very sexist world, women get to be on the police force.</span><br data-dcnode-id="1459"><br data-dcnode-id="1458"><span data-dcnode-id="1457" instrument_node="">The book’s biggest strength is its heroine. Mina is brave, determined, caring, yet also vulnerable -- everything you would want in a cop, or a heroine. I found myself just a bit disappointed in Rhys, a fairly standard romance hero. Not that that’s a </span><i data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">bad</span></i><span data-dcnode-id="1454" instrument_node=""> thing -- I love romance, obviously I love romance heroes. I guess I was just expecting someone a little more out of the ordinary. </span><a class="jsShowSpoiler spoilerAction" data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="1447" style="display: none"><span data-dcnode-id="1451" instrument_node="">[The fact that he turns out to be literally made of iron doesn’t count. </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="1448" instrument_node="">]</span></span><span data-dcnode-id="1446" instrument_node=""> The best thing about him was his horror at realizing he had misunderstood Mina's sexual signals, in a a very powerful scene. (I did not read him as a rapist at all, by the way, as quite a few readers have.)</span><br data-dcnode-id="1445"><br data-dcnode-id="1444"><span data-dcnode-id="1443" instrument_node="">The backstory of the characters was fascinating but I found myself yearning to know more about how people who were quite tortured wound up with such sane, healthy relationships. Again, not quite sure how we got from A to Z.</span><br data-dcnode-id="1442"><br data-dcnode-id="1441"><span data-dcnode-id="1440" instrument_node="">And a last complaint... if I never see the word “shagged” again, it will be too soon.</span><br data-dcnode-id="1439"><br data-dcnode-id="1438"><span data-dcnode-id="1437" instrument_node="">But -- awesome adventure, fascinating characters, intriguing world (even if I didn’t really get it) and some angsty romance.</span><br data-dcnode-id="1436"><br data-dcnode-id="1435"><span data-dcnode-id="1434" instrument_node="">Good stuff.</span><br data-dcnode-id="1433"><br data-dcnode-id="1432"><span data-dcnode-id="1431" instrument_node="">10/21 I've been skimming the book prior to reading the next in the series, and have decided to upgrade my rating it to 4 1/2 stars.</span></span><span data-dcnode-id="1429" instrument_node="">
