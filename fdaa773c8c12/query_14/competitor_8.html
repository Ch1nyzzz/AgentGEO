</span><span data-dcnode-id="5720" id="freeTextContainer5316169865854715374"><i data-dcnode-id="5724"><span data-dcnode-id="5731" instrument_node="">Dear dad, </span><br data-dcnode-id="5730"><br data-dcnode-id="5729"><span data-dcnode-id="5728" instrument_node="">I know you follow and read my goodreads reviews, which I appreciate, really, but I just wanted to let you know that while this is a sci-fi/alternate history book that is pretty interesting in a lot of ways it is also a romance novel that I read for a book club and it has lots of VERY EXPLICIT sex parts that I might mention, explicitly, in this review. So it is ok if you don't want to read this one. </span><br data-dcnode-id="5727"><br data-dcnode-id="5726"><span data-dcnode-id="5725" instrument_node="">Sincerely, your son</span></i><br data-dcnode-id="5723"><br data-dcnode-id="5722"><span data-dcnode-id="5721" instrument_node="">The Iron Dukes sits at the intersection of everywhere and nowhere in </span></span><span data-dcnode-id="5719" instrument_node="">
</span><span data-dcnode-id="5619" id="freeText5316169865854715374" style="display:none"><i data-dcnode-id="5711"><span data-dcnode-id="5718" instrument_node="">Dear dad, </span><br data-dcnode-id="5717"><br data-dcnode-id="5716"><span data-dcnode-id="5715" instrument_node="">I know you follow and read my goodreads reviews, which I appreciate, really, but I just wanted to let you know that while this is a sci-fi/alternate history book that is pretty interesting in a lot of ways it is also a romance novel that I read for a book club and it has lots of VERY EXPLICIT sex parts that I might mention, explicitly, in this review. So it is ok if you don't want to read this one. </span><br data-dcnode-id="5714"><br data-dcnode-id="5713"><span data-dcnode-id="5712" instrument_node="">Sincerely, your son</span></i><br data-dcnode-id="5710"><br data-dcnode-id="5709"><span data-dcnode-id="5708" instrument_node="">The Iron Dukes sits at the intersection of everywhere and nowhere in terms of my reading habits: it's science-fictiony, which is a genre I enjoy and read a decent amount of (I even have a dedicated book club!) and it's a romance, which I have never read at all unless you count just reading the sex scenes in books I thought might be dirty when I was about 11. Which I think we can agree is really not the same thing.</span><br data-dcnode-id="5707"><br data-dcnode-id="5706"><span data-dcnode-id="5705" instrument_node="">I certainly had some preconceived notions about romance books that I can't say have been proven or disproven by this one, because being an alternate-history steampunk story that is actually a rather ambitious yarn, I wager it makes an effort in terms of narrative that something like </span><a data-dcnode-id="5703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/6494811.Wicked_Harvest" rel="nofollow noopener" title="Wicked Harvest by Anitra Lynn McLeod"><span data-dcnode-id="5704" instrument_node="">Wicked Harvest</span></a><span data-dcnode-id="5702" instrument_node=""> perhaps does not. That said, there are also sex scenes that are, if anything, rather raunchier than what I expected to read, forgoing polite euphemisms almost entirely (</span><i data-dcnode-id="5700"><span data-dcnode-id="5701" instrument_node="">Search Results: Showing All 24 Instances of the Word "Cock"</span></i><span data-dcnode-id="5699" instrument_node="">). And it still has a rippling, shirtless male chest on the cover -- thanks for the save, Kindle edition!</span><br data-dcnode-id="5698"><br data-dcnode-id="5697"><span data-dcnode-id="5696" instrument_node="">So first let us discuss the part of the book I liked, which was the non-romancy part: Steampunk is a genre I have a passing familiarity with, having </span><a data-dcnode-id="5694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/239239.The_Prestige" rel="nofollow noopener" title="The Prestige by Christopher Priest"><span data-dcnode-id="5695" instrument_node="">read</span></a><span data-dcnode-id="5693" instrument_node=""> </span><a data-dcnode-id="5691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/119322.The_Golden_Compass__His_Dark_Materials___1_" rel="nofollow noopener" title="The Golden Compass (His Dark Materials, #1) by Philip Pullman"><span data-dcnode-id="5692" instrument_node="">quite</span></a><span data-dcnode-id="5690" instrument_node=""> </span><a data-dcnode-id="5688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/287861.Mortal_Engines__The_Hungry_City_Chronicles___1_" rel="nofollow noopener" title="Mortal Engines (The Hungry City Chronicles, #1) by Philip Reeve"><span data-dcnode-id="5689" instrument_node="">a</span></a><span data-dcnode-id="5687" instrument_node=""> </span><a data-dcnode-id="5685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/2412562.The_Alchemy_of_Stone" rel="nofollow noopener" title="The Alchemy of Stone by Ekaterina Sedia"><span data-dcnode-id="5686" instrument_node="">few</span></a><span data-dcnode-id="5684" instrument_node=""> </span><a data-dcnode-id="5682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/1137215.Boneshaker__The_Clockwork_Century___1_" rel="nofollow noopener" title="Boneshaker (The Clockwork Century, #1) by Cherie Priest"><span data-dcnode-id="5683" instrument_node="">books</span></a><span data-dcnode-id="5681" instrument_node=""> often categorized that way (though like most sub-genres of sci-fi, categorization is somewhat arbitrary). It's also the hot fad right now, which is why it totally makes sense that an author who just got done cashing in on paranormal romance would give it a go. And as a genre effort, The Iron Duke is... surprisingly good. It creates a pretty interesting alternate Victorian era in which Europe has been ravaged by a mysterious force known as The Horde that has infected the populace with tiny nanomachines that allow them to be controlled via radio towers, and The Iron Duke is lauded as a hero for saving the populace from the mind control menace. There are a bunch of well imagined extraneous details that I loved, such as the fact that cats infected with nanoagents have become </span><a data-dcnode-id="5679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/131037909" rel="nofollow noopener"><span data-dcnode-id="5680" instrument_node="">armored, unkillable predators</span></a><span data-dcnode-id="5678" instrument_node="">, and also there are steel sharks and giant kraken (</span><a data-dcnode-id="5676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/97271401" rel="nofollow noopener"><span data-dcnode-id="5677" instrument_node="">!</span></a><span data-dcnode-id="5675" instrument_node="">).</span><br data-dcnode-id="5674"><br data-dcnode-id="5673"><span data-dcnode-id="5672" instrument_node="">This is all absolutely ridiculous, of course, but steampunk almost always is -- I haven't read one book yet that truly justified how such advanced technology could be invented so long ago with just a few tweaks of the timeline (did you know if Abe Lincoln hadn't been assassinated, for example, by 1900 the U.S. army would have defeated Mexico with the aid of robotic exoskeletons? It's true, look it up). The important part is that it is fun to read about, and the book does a pretty good job of sketching this world without going into exhaustive and unnecessary detail (which might have resulted in me </span><i data-dcnode-id="5670"><span data-dcnode-id="5671" instrument_node="">not entirely understanding the plot</span></i><span data-dcnode-id="5669" instrument_node="">, but based on other reviews, that was my fault). And it actually has a well-developed (not like that!) (No, really, not like that, we are told) and interesting female protagonist for the most part. Police inspector Mina is strong-willed and opinionated and unwilling to sit back and act pretty in proper Victorian fashion, and she is a lot more fun to read about than the bland heroine of Boneshaker, which was one of the most-celebrated sci-fi novels of 2009 that I happened to find very nearly terrible. She's investigating a murder that will come to involve politics the world over, as well as, of course, The Iron Duke!</span><br data-dcnode-id="5668"><br data-dcnode-id="5667"><span data-dcnode-id="5666" instrument_node="">Because yes, it is also, unfortunately, a romance novel, and why? The answer seems to be that romance is the kind of book the author can sell, because she doesn't seem particularly into creating a nuanced relationship between Mina and the Duke (who has a name but it totally doesn't matter). Because while Mina operates in an interesting political and social sphere, where we can see how the influence of Horde control has changed the ways traditional gender roles are perceived, with many women freely allowed to be badass and promiscuous without anyone batting an eyelash, the attraction between the leads is rote and unmotivated and totally uninteresting, like instantly HE MUST HAVE HER and even though she wants to resist, the Duke just makes her feel all HOT DOWN THERE and this goes on for pages and pages, often stopping the very interesting thriller/murder mystery plot cold.</span><br data-dcnode-id="5665"><br data-dcnode-id="5664"><span data-dcnode-id="5663" instrument_node="">At first the purple prose is just annoying (</span><i data-dcnode-id="5661"><span data-dcnode-id="5662" instrument_node="">"No armor. No buckles. Only a few layers of cotton and ten feet of parlor separated his mouth from her breasts."</span></i><span data-dcnode-id="5660" instrument_node="">), but then the sexytimes really kick in and the author just starts cutting and pasting and rearranging stock phrases like "rigid" and "lips" and "wet" and "suck" and "arching" and calling them sex scenes, and they aren't particularly interesting. I couldn't stop thinking of </span><a data-dcnode-id="5658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.albinoblacksheep.com/text/bloodninja" rel="nofollow noopener"><span data-dcnode-id="5659" instrument_node="">"I put on my robe and wizard's hat"</span></a><span data-dcnode-id="5657" instrument_node="">, which if you have not read you really must go and read </span><i data-dcnode-id="5655"><span data-dcnode-id="5656" instrument_node="">RIGHT NOW</span></i><span data-dcnode-id="5654" instrument_node=""> (and then go read </span><a data-dcnode-id="5652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//people.ambrosiasw.com/~andrew/funny/bloodcyber.html" rel="nofollow noopener"><span data-dcnode-id="5653" instrument_node="">all of these</span></a><span data-dcnode-id="5651" instrument_node="">). </span><br data-dcnode-id="5650"><br data-dcnode-id="5649"><span data-dcnode-id="5648" instrument_node="">I mean, this: </span><i data-dcnode-id="5646"><span data-dcnode-id="5647" instrument_node="">"Her musky scent threatened to drive him out of his mind, more heady than any perfume, any wine."</span></i><span data-dcnode-id="5645" instrument_node=""> Or this: </span><i data-dcnode-id="5643"><span data-dcnode-id="5644" instrument_node="">"You inspired me... You didn't have to fight when you destroyed the Horde. So I decided to make your tower explode."</span></i><span data-dcnode-id="5642" instrument_node=""> Or, god, this one: </span><i data-dcnode-id="5640"><span data-dcnode-id="5641" instrument_node="">"His heavy sac (?) buffeted (!?) her clitoris with each annihilating (!?!) stroke."</span></i><span data-dcnode-id="5639" instrument_node=""> I mean, come </span><i data-dcnode-id="5637"><span data-dcnode-id="5638" instrument_node="">on</span></i><span data-dcnode-id="5636" instrument_node="">, get back to the giant squid attack.</span><br data-dcnode-id="5635"><br data-dcnode-id="5634"><span data-dcnode-id="5633" instrument_node="">And I haven't even touched all the really odd gender dynamics at play, and the way Mina is independent but really appears to want to be dominated and the Duke is a caring dude but also </span><i data-dcnode-id="5631"><span data-dcnode-id="5632" instrument_node="">pretty much a rapist</span></i><span data-dcnode-id="5630" instrument_node=""> by the end (and he is doing it for her own good question mark?). Ceridwen's </span><a data-dcnode-id="5628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/143390525" rel="nofollow noopener"><span data-dcnode-id="5629" instrument_node="">review</span></a><span data-dcnode-id="5627" instrument_node=""> made an interesting point about how Mina is trying to come to terms with a past sexual violation through her experiences with the Duke (the Horde used to use their tower to whip the populace into sex Frenzies so they would produce more worker bees), and that aspect makes their interactions a bit more compelling, but I don't think it is developed consistently enough to be interesting rather than just... off-putting (unless you like to read about rape). I know some people who have been sexually abused can certainly become aroused in recreating those situations through sex play (thanks for the info, Dan Savage's Savage Lovecast!), but it didn't quite work for me here. I needed more of Mina than her lame internal struggles if I'm going to give the book that much credit.</span><br data-dcnode-id="5626"><br data-dcnode-id="5625"><span data-dcnode-id="5624" instrument_node="">Um, so this is getting pretty long. I will say that for my first romance, it was A LOT better than I was expecting it to be, and I think toning down the explicit sex, reducing the emphasis on the myopic leads' hormones and beefing up the sci-fi elements a bit more could have made this an excellent genre entry. Instead it's a weird hybrid, but a pretty good read.</span><br data-dcnode-id="5623"><br data-dcnode-id="5622"><i data-dcnode-id="5620"><span data-dcnode-id="5621" instrument_node="">Search Results: Showing All 13 Instances of the Word "Rigid"</span></i></span><span data-dcnode-id="5618" instrument_node="">

</span><span data-dcnode-id="5507" id="freeTextContainer15281906422685760797"><span data-dcnode-id="5523" instrument_node="">This is the third novel I've read belabelled Steampunk and so far it is the best.</span><br data-dcnode-id="5522"><br data-dcnode-id="5521"><span data-dcnode-id="5520" instrument_node="">Unlike Clare's rendition of </span><a data-dcnode-id="5518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/7171637.Clockwork_Angel__The_Infernal_Devices___1_" rel="nofollow noopener" title="Clockwork Angel (The Infernal Devices, #1) by Cassandra Clare"><span data-dcnode-id="5519" instrument_node="">Clockwork Angel</span></a><span data-dcnode-id="5517" instrument_node="">, Brook's The Iron Duke doesn't nervously flirt with Steampunk but wantonly embraces it like a Steampunk addict chasing after its next hit.</span><br data-dcnode-id="5516"><br data-dcnode-id="5515"><span data-dcnode-id="5514" instrument_node="">Similarly to Carriger's </span><a data-dcnode-id="5512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/6381205.Soulless__The_Parasol_Protectorate___1_" rel="nofollow noopener" title="Soulless (The Parasol Protectorate, #1) by Gail Carriger"><span data-dcnode-id="5513" instrument_node="">Soulless</span></a><span data-dcnode-id="5511" instrument_node="">, The Iron Duke is heavy on romance though with far more satisfying love scenes and lacking in the supernatural, paranormal element.</span><br data-dcnode-id="5510"><br data-dcnode-id="5509"><span data-dcnode-id="5508" instrument_node="">No, Brook understands Steampunk and she executed it well, creating a worl</span></span><span data-dcnode-id="5506" instrument_node="">
</span><span data-dcnode-id="5439" id="freeText15281906422685760797" style="display:none"><span data-dcnode-id="5505" instrument_node="">This is the third novel I've read belabelled Steampunk and so far it is the best.</span><br data-dcnode-id="5504"><br data-dcnode-id="5503"><span data-dcnode-id="5502" instrument_node="">Unlike Clare's rendition of </span><a data-dcnode-id="5500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/7171637.Clockwork_Angel__The_Infernal_Devices___1_" rel="nofollow noopener" title="Clockwork Angel (The Infernal Devices, #1) by Cassandra Clare"><span data-dcnode-id="5501" instrument_node="">Clockwork Angel</span></a><span data-dcnode-id="5499" instrument_node="">, Brook's The Iron Duke doesn't nervously flirt with Steampunk but wantonly embraces it like a Steampunk addict chasing after its next hit.</span><br data-dcnode-id="5498"><br data-dcnode-id="5497"><span data-dcnode-id="5496" instrument_node="">Similarly to Carriger's </span><a data-dcnode-id="5494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/6381205.Soulless__The_Parasol_Protectorate___1_" rel="nofollow noopener" title="Soulless (The Parasol Protectorate, #1) by Gail Carriger"><span data-dcnode-id="5495" instrument_node="">Soulless</span></a><span data-dcnode-id="5493" instrument_node="">, The Iron Duke is heavy on romance though with far more satisfying love scenes and lacking in the supernatural, paranormal element.</span><br data-dcnode-id="5492"><br data-dcnode-id="5491"><span data-dcnode-id="5490" instrument_node="">No, Brook understands Steampunk and she executed it well, creating a world styled off 19th century England but with a rich and textured history. Don't be fooled by the confusing, awkward and clunky beginning. Brook didn't choose the best method to relay the backstory of Horde control and a mechanical population at odds with the wealthy elitists who refuse "nanoagents". </span><br data-dcnode-id="5489"><br data-dcnode-id="5488"><span data-dcnode-id="5487" instrument_node="">However, this confusing introduction is soon swept away by the fantasy of men with piston-operated arms, mechanical eyes, steel-plated sabre-cats, Krakken, air-ships, automatons and all the whimsy that a novel like this deserves.</span><br data-dcnode-id="5486"><br data-dcnode-id="5485"><span data-dcnode-id="5484" instrument_node="">The story may revolve around the romance of the two leads, The Iron Duke and Mina, an intelligent, cold, strong Inspector, but it also focuses heavily on the mystery and adventure aspect. It includes a full cast of interesting and rich characters, enough turns and twists to keep you guessing and different, textured environments to keep you turning the page.</span><br data-dcnode-id="5483"><br data-dcnode-id="5482"><span data-dcnode-id="5481" instrument_node="">The romance began, for me, as the weakest aspect of this story. The Iron Duke, Trahearn, Rhys or whatever you want to call him, is An Alpha with a capital A. In fact, he rarely deviates from the genre mainstay as the rich, capable, manly, intelligent person who is immediately dazzled and enchanted by the cold, resisting heroine. In fact, he was downright giving me Woodiwiss flashbacks.</span><br data-dcnode-id="5480"><br data-dcnode-id="5479"><span data-dcnode-id="5477"><span data-dcnode-id="5478" instrument_node="">[image error]</span></span><br data-dcnode-id="5476"><i data-dcnode-id="5474"><span data-dcnode-id="5475" instrument_node="">No! No! Please! No!!!!</span></i><br data-dcnode-id="5473"><br data-dcnode-id="5472"><span data-dcnode-id="5471" instrument_node="">You know who I'm talking about. The kind of RAM (Romanticized Alpha Male) who thinks No means, "You just haven't gotten me helpless and alone enough" and who eventually comes to hold dearer the heroine's continued rebuffs over any freely available blowjob. Every time I read one of these books, I can't help but think the writers are kidding themselves. Yes, your heroine is ewnique and special but if he can get it easier from a tavern wench, then why bother with the cold, frigid heroine? After reading that sentence, I'm kind of wondering whether I should have been born a man...</span><br data-dcnode-id="5470"><br data-dcnode-id="5469"><img alt="bar wench" class="gr-hostedUserImg" data-dcnode-id="5468" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380343998i/699111.jpg&amp;raw"><br data-dcnode-id="5467"><i data-dcnode-id="5465"><span data-dcnode-id="5466" instrument_node="">The bar wench is easier, she comes with beer and she won't expect you to call her in the morning. What's not to love?</span></i><span data-dcnode-id="5464" instrument_node=""> </span><br data-dcnode-id="5463"><br data-dcnode-id="5462"><span data-dcnode-id="5461" instrument_node="">However, all is saved by the female protagonist, Mina. Two words: Kick. Ass. There is nothing stupid, helpless, ineffectual or ridiculous about her. She manages to get through the ENTIRE novel without making me hate her for existing. Which is what female protagonists having been doing to me a lot lately (*shakes fist at almost the entire YA genre). Not only that, but her competence and intelligence makes sense since she is, indeed, an inspector and she damn well acts like one. She pulls a gun if she needs to and she gets shit done all the while being professional, capable, yet realistic and... well, pretty damn relatable. Also, the sex. And don't lie and think it's not that important. It's damn important and Brook definitely delivers on that part. Which makes Mina's character that little more likable to me as she isn't the virginal prude. In fact, a lot of this novel was about her developing a comfortableness with her own sexuality, which I really enjoyed. </span><br data-dcnode-id="5460"><br data-dcnode-id="5459"><span data-dcnode-id="5458" instrument_node="">And as the novel progresses, Trahearn becomes more human and less RAM. I wouldn't say I ever truly warmed to him completely. He still remained pretty firmly in the RAM camp but Mina and his relationship with her was just so awesome that I managed to forget it. Maybe it's because he came on way too thick at the beginning. I don't find it sexy when a man corners me and kisses me against my will when I've repeatedly told him no. I didn't find it sexy in this novel either. In fact, Brook was a little too happy with this plot device and at a couple of points managed to make me quite annoyed with Trahearn. But then Mina shot him and I felt so much better. </span><br data-dcnode-id="5457"><br data-dcnode-id="5456"><img alt="drunk" class="gr-hostedUserImg" data-dcnode-id="5455" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380343998i/699112.jpg&amp;raw"><br data-dcnode-id="5454"><i data-dcnode-id="5452"><span data-dcnode-id="5453" instrument_node="">SOooooooo much better!</span></i><br data-dcnode-id="5451"><br data-dcnode-id="5450"><span data-dcnode-id="5449" instrument_node="">Over all, I felt the writing was solid, the story telling became fantastic after the first clunky scene and that this book was a very solid four stars.</span><br data-dcnode-id="5448"><br data-dcnode-id="5447"><span data-dcnode-id="5446" instrument_node="">In fact, if Brooks had written Trahearn just a little differently, I think I might even have given this story five stars. Still, as it is, it's a very good read. I recommend it to romance readers, steampunk enthusiasts and anybody who's just into a fun, adventure novel that won't let you down in the imagination department.</span><br data-dcnode-id="5445"><br data-dcnode-id="5444"><img alt="steampunk" class="gr-hostedUserImg" data-dcnode-id="5443" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1380343998i/699113.jpg&amp;raw"><br data-dcnode-id="5442"><i data-dcnode-id="5440"><span data-dcnode-id="5441" instrument_node="">This novel is kind of like that... awesome with a side of bullet sandwich!</span></i></span><span data-dcnode-id="5438" instrument_node="">

</span><span data-dcnode-id="5336" id="freeTextContainer5506184657696857220"><span data-dcnode-id="5349" instrument_node="">zombies. kraken. pirates. automatons. marriage reform. nanotech. mongols. just another classic steampunk romance, right? or maybe not - this is my first one. </span><br data-dcnode-id="5348"><br data-dcnode-id="5347"><span data-dcnode-id="5346" instrument_node="">it was crazy - none of the other bodice rippers wanted to read the shapeshifter romance!! come on guys!!shapeshifters!!! romance!!! i am so curious about the mechanics of it, but i am not going to read one without the protective cloak of the rest of the rippers. </span><br data-dcnode-id="5345"><br data-dcnode-id="5344"><span data-dcnode-id="5343" instrument_node="">so -steampunk...</span><br data-dcnode-id="5342"><br data-dcnode-id="5341"><span data-dcnode-id="5340" instrument_node="">i mean, honestly, there wasn't anything </span><i data-dcnode-id="5338"><span data-dcnode-id="5339" instrument_node="">wrong</span></i><span data-dcnode-id="5337" instrument_node=""> with this book; i</span></span><span data-dcnode-id="5335" instrument_node="">
</span><span data-dcnode-id="5302" id="freeText5506184657696857220" style="display:none"><span data-dcnode-id="5334" instrument_node="">zombies. kraken. pirates. automatons. marriage reform. nanotech. mongols. just another classic steampunk romance, right? or maybe not - this is my first one. </span><br data-dcnode-id="5333"><br data-dcnode-id="5332"><span data-dcnode-id="5331" instrument_node="">it was crazy - none of the other bodice rippers wanted to read the shapeshifter romance!! come on guys!!shapeshifters!!! romance!!! i am so curious about the mechanics of it, but i am not going to read one without the protective cloak of the rest of the rippers. </span><br data-dcnode-id="5330"><br data-dcnode-id="5329"><span data-dcnode-id="5328" instrument_node="">so -steampunk...</span><br data-dcnode-id="5327"><br data-dcnode-id="5326"><span data-dcnode-id="5325" instrument_node="">i mean, honestly, there wasn't anything </span><i data-dcnode-id="5323"><span data-dcnode-id="5324" instrument_node="">wrong</span></i><span data-dcnode-id="5322" instrument_node=""> with this book; it replicated a lot of the typical romance conventions and fell into the same booby-traps (which is totally not the right word, but i got to say "booby") - two strong-willed people like this shouldn't really spend this much time running away from each other, legitimate reasons or no. sex should not be this complicated. in this book, racial and gender issues were legitimate roadblocks, but between the two of them they had guns and money and a title and and self-confidence and an iron freaking skeleton - these two should not have anything standing in the way of whatever they want. these are the kind of people who tell other people the way things are going to be, not sheep people who are slaves to silly societal norms. i mean, i personally would not have put up with his sexual pushiness, but she seems okay with occasionally being pushed up against a wall and getting the physical equivalent of "you mean yes when you say no, right??" so to each his own.</span><br data-dcnode-id="5321"><br data-dcnode-id="5320"><span data-dcnode-id="5319" instrument_node="">but he is such a schizophrenic male lead. sometimes he is a calculating pushy rapist, sometimes he is all secret philanthropy and delicate treatment of the feelings of others.but who needs consistency? who reads to reconcile conflicting personality traits?? shes got a burning knot, he's got a hot ridge of flesh - these crazy kids were made to clench and twine and growl and clutch and rub!! we are in romance country, it doesn't need to make sense or have any real-world applications!</span><br data-dcnode-id="5318"><br data-dcnode-id="5317"><span data-dcnode-id="5316" instrument_node="">and her - she can save kids from monsters but she can't figure out how to get laid?? this world is kind of awesome; i would much rather have had the conflict be external (zombie, war, monsters) than internal "noooo don't put your mouth on my vagina, it makes me too craaaaazy". i mean, there is plenty of external conflict, i just think her sexual resistance was (while explained adequately) retarted and less interesting than zombies.</span><br data-dcnode-id="5315"><br data-dcnode-id="5314"><span data-dcnode-id="5313" instrument_node="">but the rest of it was pretty fun. i should probably read more fantasy, so i can get those muscles honed, because it took me more time than i care to admit to get myself situated in this world. i had to go back and reread several pages over and over, and it wasn't her fault, it was me - there were so many details that i had trouble cementing them in this here swiss-cheese brain. </span><br data-dcnode-id="5312"><br data-dcnode-id="5311"><span data-dcnode-id="5310" instrument_node="">so, for a bodice ripper read, it was better than most. </span><br data-dcnode-id="5309"><span data-dcnode-id="5308" instrument_node="">i like reading things i would never read otherwise - it makes me (a) broad.</span><br data-dcnode-id="5307"><br data-dcnode-id="5306"><img class="gr-hostedUserImg" data-dcnode-id="5305" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1528725630i/25720315.png&amp;raw"><a data-dcnode-id="5303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bloggycomelately.com/" rel="nofollow noopener"><span data-dcnode-id="5304" instrument_node="">come to my blog!</span></a></span><span data-dcnode-id="5301" instrument_node="">

</span><span data-dcnode-id="5177" id="freeTextContainer5783183573187075661"><span data-dcnode-id="5178" instrument_node="">I have to hand it to Meljean Brook. She created a wonderfully-detailed and fantastical world in this book. If a reader is wondering what 'steampunk' is, I will definitely point them towards this book. I was very impressed how she integrated nanotechnology into her world-building, and the nanotech fit very well in this universe. There are some aspects that seem rather dystopian, despite the fact that this is a Victorian-like setting. The use of robotic technology has some great applications, but </span></span><span data-dcnode-id="5176" instrument_node="">
</span><span data-dcnode-id="5159" id="freeText5783183573187075661" style="display:none"><span data-dcnode-id="5175" instrument_node="">I have to hand it to Meljean Brook. She created a wonderfully-detailed and fantastical world in this book. If a reader is wondering what 'steampunk' is, I will definitely point them towards this book. I was very impressed how she integrated nanotechnology into her world-building, and the nanotech fit very well in this universe. There are some aspects that seem rather dystopian, despite the fact that this is a Victorian-like setting. The use of robotic technology has some great applications, but some are rather horrific. In this story, a large degree of the world, particularly Europe and associated continents, has been subjugated by the Horde, which I intepreted to be the Mongols (as in Genghis Khan). Many of the major cities of Europe are under occupation or have been razed to ruins. Zombies roam the unoccupied territories, humans who were infected by nanobots that caused them to become vicious, cannibalistic monsters. However, many regular humans are infected with nanobots that enhance them in many positive, and some negative ways. The problem is that the Horde can control those humans, called buggers, with radio signals. In this world, the Horde are hated and despised, which creates a lot of problems for the heroine, Mina. She is the product of a Horde "frenzy" in which control of her mother's body (via control of the nanobots by radio signals) was overtaken by the Horde, and she engaged in a Horde orgy, resorting in Mina. She was so horrified at the sight of her half-Horde baby that she gouged her eyes out. Yeah, right away, I knew this story was going to be kind of dark.</span><br data-dcnode-id="5174"><br data-dcnode-id="5173"><span data-dcnode-id="5172" instrument_node="">I was very impressed with the meticulous world-building and attention to detail in this story. In addition, there are several major players who all want a say in the future of England, and the rest of the world, grabbing any kind of power or edge they can to gain that. This book has everything: mechanically-enhanced humans and animals, pirates, zombies, giant sea monsters, airships, you name it. However, it was so well-done, it never came off as over-the-top. While this book probably wouldn't work for straight romance fans, or even some fantasy/science fiction fans, I loved it, because I got a kick out of how imaginative and unique this Victorian world was. Despite my enjoyment, this wasn't an easy read for me. I often had to reread certain passages to make sure I was getting a clear understanding (that's not due to Ms. Brook's fault, but to my inexperience in reading a lot of science fiction-type literature and not having a head for political intrigue storylines). That's okay, because I wanted to get a full grasp of this book, and it certainly enhanced my enjoyment.</span><br data-dcnode-id="5171"><br data-dcnode-id="5170"><span data-dcnode-id="5169" instrument_node="">In my opinion, Ms. Brook didn't let her romance fans down. The love story between Rhys and Mina is equally important. I was eagerly awaiting the arrival of The Iron Duke when I started this book. When he showed up, I was not disappointed. He's a very unique character, which some aspects that I had not encountered in a hero thus far. I loved his vitality, his ruthless nature, his determination. Mina has a pull on him that compels him throughout this book. He is the kind of man who will move mountains to get his woman, which definitely works for me. Even outside of that, I respected him for his strength in enduring a very rough past, his determination to do what was necessary and to protect others. He might have seemed self-absorbed (he put importance on protecting what was his, whether it was his ship, the sailors, on it, or his properties and subjects as the Iron Duke). He didn't really like the ceremony of being a Duke, but he took the responsibility seriously, because that was the kind of man he was. He wasn't a smooth, refined character, which is fine with me. When he considers his feelings for Mina, they are described in a very rough way, but the emotions behind them are pure, and he definitely shows his love for her, not just physical infatuation.</span><br data-dcnode-id="5168"><br data-dcnode-id="5167"><span data-dcnode-id="5166" instrument_node=""> As for Mina, I couldn't have liked her more as a heroine. She's tough, really tough. But she's not hard or frustrating. Any armor she has, I can't fault her for it. Because of her heritage as half-Horde, she is despised by many in London. They try to attack and harm her physically, so she has to have a bodyguard at all times, the hulking but gentle Constable Newberry. Those who don't hate her, fear her because her features remind them of the Horde. This aspect of the story hit home with me. Prejudice of any kind always does. Being judged by your features, your heritage, the color of your skin is wrong. Even if there are many of your heritage who are bad, that doesn't mean that you are. Because of being a woman and half-Horde, Mina has to work four times as hard just to be respected for her abilities as a Detective Inspector, and she's not afraid to do that. Rhys determined pursuit is a huge problem for her. She knows that their involvement is just going to cause more fodder for the distrust and lack of respect that the public holds for her. Even if she's very attracted to him, and he reaches her carefully guarded heart. </span><br data-dcnode-id="5165"><br data-dcnode-id="5164"><span data-dcnode-id="5163" instrument_node="">The relationship between Rhys and Mina develops very well. They start out as untrusting allies, with a reluctant attraction. As the story progresses, they come to respect and understand each other, and the love blossoms between them naturally. And their passion is red-hot. Rhys is a primal, demanding lover. However, he doesn't force Mina. Understanding what her issues are about being in control of her passions, he patiently works past those issues, and it's a beautiful thing to read. He won't be the kind of guy who whispers sweet, elegant words in a woman's ear. But he shows and tells a woman how much she means to him in simple, but effective ways. That definitely speaks to me. As for as Rhys and Mina getting their HEA, just being in love wasn't enough. They had to deal with the issues that they faced with their enemies, and the society they lived in. Although the romantic in me loves when a couple can easily surmount obstacles and be together, the realistic knows that's not always a simple thing. I like that Ms. Brook didn't allow their problems to just blow away in a puff of smoke because Mina was a "great person" and Rhys was the powerful "Iron Duke." However, I was completely satisfied with the romantic conclusion in this story, which I am very glad to say.</span><br data-dcnode-id="5162"><br data-dcnode-id="5161"><span data-dcnode-id="5160" instrument_node="">My experience with steampunk is fairly limited, but I love the ideas and the concepts of this genre of fantasy/science fiction. I highly recommend this novel to a reader who wants to experience this genre. Although this is not a simple world, there's a very fascinating world here that Ms. Brook created. The complex textures--Victorian setting, science fiction, fantasy, pulp fiction, adventure, romance, seafaring/pirate elements--just made this an even better read for me. This was a thoroughly enjoyable, engrossing book, and I will be looking out for the forthcoming books in the Iron Seas series with great expectation.</span></span><span data-dcnode-id="5158" instrument_node="">

</span><span data-dcnode-id="5062" id="freeTextContainer333500752076965018"><span data-dcnode-id="5066" instrument_node="">I enjoyed it a LOT, just one thing brought it down from 5 stars, which I will specify at the end. (BTW Has VERY racy scenes as a warning to the non-smutty lovers, but that wasn't my -1 star point haha)</span><br data-dcnode-id="5065"><br data-dcnode-id="5064"><span data-dcnode-id="5063" instrument_node="">I would give worldbuilding: 5 stars. The first chapter is a bit confusing, but the world that is spun out over the novel is ENDLESSLY interesting, one of the few books that has made me read SLOWLY to see what all the steampunk stuff really is about. FASCINATING history with the Horde and the nanobu</span></span><span data-dcnode-id="5061" instrument_node="">
</span><span data-dcnode-id="5045" id="freeText333500752076965018" style="display:none"><span data-dcnode-id="5060" instrument_node="">I enjoyed it a LOT, just one thing brought it down from 5 stars, which I will specify at the end. (BTW Has VERY racy scenes as a warning to the non-smutty lovers, but that wasn't my -1 star point haha)</span><br data-dcnode-id="5059"><br data-dcnode-id="5058"><span data-dcnode-id="5057" instrument_node="">I would give worldbuilding: 5 stars. The first chapter is a bit confusing, but the world that is spun out over the novel is ENDLESSLY interesting, one of the few books that has made me read SLOWLY to see what all the steampunk stuff really is about. FASCINATING history with the Horde and the nanobugs, I just cannot sing praises enough about the rich playground the author has invented here. Looking forward to MANY more books in this world.</span><br data-dcnode-id="5056"><br data-dcnode-id="5055"><span data-dcnode-id="5054" instrument_node="">Heroine: 5 stars. LOVE LOVE LOVED THIS CHARACTER! I thought the worldbuilding lent itself to the creation of a very rich character, one that deals with ostracism and race in a way that is so understanding, so interesting SO NOT CLICHED. I really thought this character could be one that arcs over book after book without settling down with a guy, she was that strong. For a very romance book, it's a relief and a pleasure. I was rooting for her all the way pretty much.</span><br data-dcnode-id="5053"><br data-dcnode-id="5052"><span data-dcnode-id="5051" instrument_node="">Hero: 3 stars :( UHHHHHG. Ok, he was hot sometimes, but honest to god the word "Shag" just rubbed me the wrong way, IN ADDITION he was kinda a bully and just tried to force the heroine to do what he wanted in a way that felt almost predatorial. Now, some of this was because of his backstory, but no one else really called him out on his bullying, not even the heroine most of the time. If you read my reviews I'm not a big fan of "YOU MY WOMAN" men, so this might be my peeve, but I had to express some reservation for the record.</span><br data-dcnode-id="5050"><br data-dcnode-id="5049"><span data-dcnode-id="5048" instrument_node="">ANYWAY, loved the book, if you're into the racy steampunk/scifi/fantasy/historical romance genre, this will be a hit for you :) Looking forward to the next!</span><br data-dcnode-id="5047"><br data-dcnode-id="5046"></span><span data-dcnode-id="5044" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="4936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/3282244-catherine%3Fshelf%3Dexcellent"><span data-dcnode-id="4937" instrument_node="">excellent</span></a><span data-dcnode-id="4935" instrument_node="">

</span><span class="readable" data-dcnode-id="4864" id="reviewTextContainer114850823"><span data-dcnode-id="4929" instrument_node="">
</span><span data-dcnode-id="4923" id="freeTextContainer15366636053818071132"><b data-dcnode-id="4927"><span data-dcnode-id="4928" instrument_node="">I won this ARC in a contest at Dear Author.</span></b><br data-dcnode-id="4926"><br data-dcnode-id="4925"><span data-dcnode-id="4924" instrument_node="">I have a confession to make... I was afraid to read this book. I have a serious love affair with this author's Guardian series. I mean, how many of my Goodreads friends did I nag into reading it lately? Five? I know they finally broke down and read it just to shut me up, but that's okay, because they loved it anyway and I got more people to talk about it with. So, I was afraid something would happen and I wouldn't be able to get into the new series and </span></span><span data-dcnode-id="4922" instrument_node="">
</span><span data-dcnode-id="4869" id="freeText15366636053818071132" style="display:none"><b data-dcnode-id="4920"><span data-dcnode-id="4921" instrument_node="">I won this ARC in a contest at Dear Author.</span></b><br data-dcnode-id="4919"><br data-dcnode-id="4918"><span data-dcnode-id="4917" instrument_node="">I have a confession to make... I was afraid to read this book. I have a serious love affair with this author's Guardian series. I mean, how many of my Goodreads friends did I nag into reading it lately? Five? I know they finally broke down and read it just to shut me up, but that's okay, because they loved it anyway and I got more people to talk about it with. So, I was afraid something would happen and I wouldn't be able to get into the new series and I'd lose a favorite author. Thank God I slapped the neurotic out of myself and read it! It was great!</span><br data-dcnode-id="4916"><br data-dcnode-id="4915"><span data-dcnode-id="4914" instrument_node="">So this is an alternate view of England. Two hundred years ago some of the English, now referred to as bounders, fled the Horde and only returned to England after the Iron Duke had broken the Horde control. The bounders aren't very popular because they've come back to try to claim their titles and their land and are rich, while the people of England who stayed and suffered are poor. The Horde hid nanoagents (or bugs) in the sugar they traded with England. When the time was right, they activated the bugs and thus began the Horde control. Nine years ago, the Iron Duke had broken the Horde control on England. For his trouble, his pirating was pardoned and his was awarded a Dukedom.</span><br data-dcnode-id="4913"><br data-dcnode-id="4912"><span data-dcnode-id="4911" instrument_node="">This book opens with Mina Wentworth being called to the house of the Iron Duke to investigate a murder. She works for the Metropolitan Police Force and is very good at her job. The Iron Duke, Rhys Trahaearn, is willing to let her investigate, but wants to be involved and informed of all the particulars. Because of his particular status in England, Mina is forced to agree.</span><br data-dcnode-id="4910"><br data-dcnode-id="4909"><span data-dcnode-id="4908" instrument_node="">It took me a while to figure out exactly why Mina was a pariah in her own society. I don't know if the author was slowly hinting at it, or if I'm just slow, but it took me a while to figure out exactly who the Horde were and why her connection to them would be easy to spot. I was expecting something to do with the nanos or prosthetics. I had a lightbulb moment midway through and felt really dumb. Please let it have been the author's plan and not me being dense! :P Once I figured it out, those insults made a lot more sense...</span><br data-dcnode-id="4907"><br data-dcnode-id="4906"><span data-dcnode-id="4905" instrument_node="">The beginning of this book was hard for me to get into. Not because of the writing or the characters or anything, it just took me a while to fully acquaint myself with the technology aspect of it. I've got to admit, I find it a lot easier to watch a steampunk movie than read a steampunk book. A movie requires much less understanding for me than a book, and I'll own it - I just don't understand engines. The details start coming about engines and machines and it just blows my mind. So, I think this won't affect anyone who understands these aspects better than I do. I struggled for a while, but did eventually understand the technology and the world. But that lack of understanding isn't unique to this book. I </span><i data-dcnode-id="4903"><span data-dcnode-id="4904" instrument_node="">always</span></i><span data-dcnode-id="4902" instrument_node=""> feel it when reading steampunk. It's just me.</span><br data-dcnode-id="4901"><br data-dcnode-id="4900"><span data-dcnode-id="4899" instrument_node="">I loved the characters in this book! Not just Mina and Rhys, but the side characters too. Yasmeen, Lady Cosair, a merchant captain with a bad ass attitude. Archimedes Fox, the adventurer who seems to have quite an attachment to one of the other characters. Scarsdale, an excellent character who despairs about Trahaearn's blunt speech and who is incapable of getting onto an airship without being extremely drunk, drugged, or knocked out. And then there's Mina's coworker, Constable Newberry... What an absolute sweetie. I really enjoyed his relationship and loyalty to Mina.</span><br data-dcnode-id="4898"><br data-dcnode-id="4897"><span data-dcnode-id="4896" instrument_node="">Mina was an excellent heroine. She's smart and assessing at all times. She doesn't go looking for trouble, but she won't back down either. The years under Horde control have had a huge impact on her. She </span><i data-dcnode-id="4894"><span data-dcnode-id="4895" instrument_node="">will not</span></i><span data-dcnode-id="4893" instrument_node=""> be controlled again. Not by a person, and not by her own emotions. Her situation in life is so sad. Where can she go so people will look at her and see something other than the Horde? She is constantly having to hide in the shadows and prove her own worth. Poor girl. She lives in fear, although it is not always apparent. Fear of being controlled, fear of being hurt, fear of being the cause of her family's suffering. Her every action is influenced by those fears.</span><br data-dcnode-id="4892"><br data-dcnode-id="4891"><span data-dcnode-id="4890" instrument_node="">Rhys is a hero who just wants to be ignored. He likes the power and influence his name gives him, but he doesn't want the hero worship. He doesn't want people to look at him and thank him, it makes him uncomfortable. The public takes his image and runs with it and no one seems to care about the truth of his past. He doesn't care, a lie can serve him better than the truth at times. Unfortunately, he seems to forget the image he has been given and pushes Mina and tests her, not knowing that she's judging his actions by who she </span><i data-dcnode-id="4888"><span data-dcnode-id="4889" instrument_node="">thinks</span></i><span data-dcnode-id="4887" instrument_node=""> he is. </span><br data-dcnode-id="4886"><br data-dcnode-id="4885"><span data-dcnode-id="4884" instrument_node="">Rhys had a really harsh childhood that has shaped his view of the world and his relationships to people. He values people by their use to them and keeps them or discards them depending on their value. He knows that everyone has a price, and has no problem with manipulating someone into the situation he wants them to be in. Thank goodness for Scarsdale. He's the voice of reason telling Rhys when he's fumbling things with his pursuit of Mina. I cracked up at the severe understatement of the term, "bad sport," that Rhys and Scarsdale kept throwing around. I loved Rhys though, because once he figured out that his manipulation was doing more harm than good he dropped it and started tweaking another angle.</span><br data-dcnode-id="4883"><br data-dcnode-id="4882"><span data-dcnode-id="4881" instrument_node="">There is a part in this book that I think is going to make some readers uncomfortable. I, personally, loved that it was there and that they had to deal with it in an honest and adult way. It was, sincerely, an honest mistake. Rhys didn't mean to do it like that, and Mina couldn't help her reaction. I loved how it all worked out.</span><br data-dcnode-id="4880"><br data-dcnode-id="4879"><span data-dcnode-id="4878" instrument_node="">Can I just point out that there are zombies in here! How cool is that? I didn't read the summary of the book, I just wanted it based on the author, so they were a big surprise. I loved their roll and I loved the explanation for their existence! </span><br data-dcnode-id="4877"><br data-dcnode-id="4876"><span data-dcnode-id="4875" instrument_node="">The only problem I had was toward the end. Mina and Rhys and their total miscommunication made me want to smack their heads together. It totally fit with their characters, and the fact that they seem to speak a different language at times, but I still found it a bit frustrating. I just wanted to sit them both down and have an intervention! But it was wonderful too. </span><br data-dcnode-id="4874"><br data-dcnode-id="4873"><span data-dcnode-id="4872" instrument_node="">I cannot wait to read the next book!!! </span><br data-dcnode-id="4871"><span data-dcnode-id="4870" instrument_node=""> </span></span><span data-dcnode-id="4868" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="4784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/237469-mir%3Fshelf%3Dadventure"><span data-dcnode-id="4785" instrument_node="">adventure</span></a><span data-dcnode-id="4783" instrument_node="">

</span><span data-dcnode-id="4772" id="freeTextContainer5126379541657835023"><span data-dcnode-id="4776" instrument_node="">This book was both lots of fun and quite disappointing. </span><br data-dcnode-id="4775"><br data-dcnode-id="4774"><span data-dcnode-id="4773" instrument_node="">The alternate history of a Mongol-dominated England with mind-controlling nanoagents, steampunk body grafts, and forced social reorganization was original and fascinating. Brook worked the steampunk elements into the story and the lives of the characters in a more intimate and plot-effecting way, and she also showed how the political and scientific changes common to this genre would not be superficial window-dressing on the same old Victori</span></span><span data-dcnode-id="4771" instrument_node="">
</span><span data-dcnode-id="4753" id="freeText5126379541657835023" style="display:none"><span data-dcnode-id="4770" instrument_node="">This book was both lots of fun and quite disappointing. </span><br data-dcnode-id="4769"><br data-dcnode-id="4768"><span data-dcnode-id="4767" instrument_node="">The alternate history of a Mongol-dominated England with mind-controlling nanoagents, steampunk body grafts, and forced social reorganization was original and fascinating. Brook worked the steampunk elements into the story and the lives of the characters in a more intimate and plot-effecting way, and she also showed how the political and scientific changes common to this genre would not be superficial window-dressing on the same old Victorian-stereotype world but would cause changes in gender roles, family relations, local and world economies, international diplomacy, religious practice -- this is some fascinating territory for exploration she is setting up here.</span><br data-dcnode-id="4766"><br data-dcnode-id="4765"><span data-dcnode-id="4764" instrument_node="">And then. Then. Instead of developing all this </span><b data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">really awesome material</span></b><span data-dcnode-id="4761" instrument_node="">, she decided to write a romance. And not even a good romance. A generic romance. The same disgusting, sexist, rapey “romance” people have been writing for decades. A woman who seems strong and independent but is afraid of her emotions and desires. An ultra-alpha-male man who overpowers her and forces himself on her, because no doesn’t mean no, especially if women are saying no for practical reasons like not wanting lose their jobs and reputations. But because this is a romance the reader knows the two main characters are Meant To Be so it doesn’t count as rape. And we know they are in love even though they pretty much just think about and have lots of un-hot sex. Because in Romancelandia being really horny for a particular person proves that person is your One True Love. Even if you don’t like them. </span><br data-dcnode-id="4760"><br data-dcnode-id="4759"><span data-dcnode-id="4758" instrument_node="">I don’t want to go on an anti-romance rant here. I have no issue with stories including romance as an element. I even think the romantic pairing here could have been good, especially if Brook had spent more pages fleshing out Rhys’ personality instead or his, er, flesh. His character here seemed, not precisely two-dimensional, but one-sided. We see his aggression, his controlling nature, his sense of responsibility – the elements anyone meeting him would identify. Even when we get the story from his point of view, there aren’t a lot of other personality traits. And that made it hard to see him and Mina falling in love. Rather than instant lust followed by standard romance-genre manipulations and throbbings, I would have enjoyed a process where in the course of fighting zombies and solving mysteries, two people learned to respect one another and fell in love. </span><br data-dcnode-id="4757"><br data-dcnode-id="4756"><span data-dcnode-id="4755" instrument_node="">This uninspired, unoriginal romance story was especially disappointing because it took away time from a story and a world that I really did want to hear more about. There were several elements that could have been explored more fully, and some fairly important inconsistencies that should have been worked out. For instance, if marriage hasn’t been the norm for generations, and most people don’t live in nuclear families, why is it that it would ruin Mina’s reputation to have people know that she had a lover? Brook actually states at one point early on that most women live in small groups with their kids and support themselves and one another, so obviously they must be taking lovers. I felt that Brook wanted think about ways in which society could be different and explore how mores are artificial – and then at the same time she wanted to stick with hoary old tried-and-true romance themes even when they didn’t make sense. I wish she had used the page space spent describing sex to instead develop how society had changed or why the Horde made giant sharks or giving more details about the Ivory Market. Or even working out some of the kinks in the plot!</span><br data-dcnode-id="4754"></span><span data-dcnode-id="4752" instrument_node="">

</span><span data-dcnode-id="4659" id="freeTextContainer9700457419097411546"><span data-dcnode-id="4660" instrument_node="">London freed by the former pirate "The Iron Duke" is still a London chock-full of resentment, violence, economic insecurity, destroyed body parts replaced by machinery, and racism against half-breeds descended from the city's former masters, the Mongolians known as The Horde. Detective Inspector Mina Wentworth is one of those luckless, product of - and later, victim of - the ability of the Horde to make their pet English do as they pleased, sexually and otherwise. Inspector Wentworth has a lot t</span></span><span data-dcnode-id="4658" instrument_node="">
</span><span data-dcnode-id="4644" id="freeText9700457419097411546" style="display:none"><span data-dcnode-id="4657" instrument_node="">London freed by the former pirate "The Iron Duke" is still a London chock-full of resentment, violence, economic insecurity, destroyed body parts replaced by machinery, and racism against half-breeds descended from the city's former masters, the Mongolians known as The Horde. Detective Inspector Mina Wentworth is one of those luckless, product of - and later, victim of - the ability of the Horde to make their pet English do as they pleased, sexually and otherwise. Inspector Wentworth has a lot to deal with: everyday contempt from Londoners still angry over their former servitude, a noble family in dire financial straits, a body dropped from a zeppelin onto the Iron Duke's estate, and a beloved younger brother lost or kidnapped. Perhaps her biggest problem, one she won't admit even to herself: she has a hankering for that Iron Dick.</span><br data-dcnode-id="4656"><br data-dcnode-id="4655"><span data-dcnode-id="4654" instrument_node="">Overall this was surprisingly impressive, despite its laughable cover and designation as some sort of Steampunk Romance (not that I have anything against Steampunk or Romance). Meljean Brook is a really talented writer and the world she constructs is almost dizzying in its complexity and layers of history. But the story never feels cluttered. This alternate England is deeply, richly imagined - so much so that it could have been too much. Brook's imagination is a fertile one, and in the hands of a lesser author, the story could have been easily overwhelmed by all of the creativity on display. But her smooth, exciting narrative and deliberate parsing out of details give her book an appealing suppleness. This is an easy world to get lost in!</span><br data-dcnode-id="4653"><br data-dcnode-id="4652"><span data-dcnode-id="4651" instrument_node="">The romantic elements are key - this being a romance novel, after all, and despite all of the fun, strange worldbuilding - and those scenes ended up being either the most tedious or some of the more striking parts of the novel. Fortunately, the romance improves over the course of the story.</span><br data-dcnode-id="4650"><br data-dcnode-id="4649"><span data-dcnode-id="4648" instrument_node="">To the former: Mina's constant perception of the Iron Duke as one very bad and very untrustworthy dude becomes very very tiresome, very very quickly. It really gets ridiculous and it just goes on and on. Eyes were rolled, very hard. The Duke's instant obsession with Mina alternates between creepily aggressive and amusingly sweet and soft; despite that schizophrenia, overall he was not a particularly interesting character. </span><br data-dcnode-id="4647"><br data-dcnode-id="4646"><span data-dcnode-id="4645" instrument_node="">But to the latter: the reader soon learns that Mina's hesitation around intimacy is coming from her experience with intimacy being forced upon her. (And it turns out that that is something she has in common with her paramour.) Rape and its emotional aftermath are topics that deserve to be treated with delicacy and empathy; I really respected Brook's skill and care when dealing with such things. She made those past traumas central to her two protagonists' psyches and profound influences on their sexual behavior, yet she also made sure that the impact of those traumas could be overcome. Good job, author.</span></span><span data-dcnode-id="4643" instrument_node="">

</span><span data-dcnode-id="4518" id="freeTextContainer5053681849251414312"><span data-dcnode-id="4527" instrument_node="">Hordes! Buggers! Bounders! Frenzy, oh my!</span><br data-dcnode-id="4526"><br data-dcnode-id="4525"><span data-dcnode-id="4524" instrument_node="">What a world. It took a while for me to understand this extremely imaginative world, but I enjoyed every moment of this book. </span><br data-dcnode-id="4523"><br data-dcnode-id="4522"><i data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">The Iron Duke</span></i><span data-dcnode-id="4519" instrument_node=""> portrays an alternative history in a very different Europe. The Horde controls people through nanotechnology. People, especially those living in polluted London, are infected with these agents because they have healing properties. When certain radio frequencies are transmitted, the infected people, known as the Bugger</span></span><span data-dcnode-id="4517" instrument_node="">
</span><span data-dcnode-id="4478" id="freeText5053681849251414312" style="display:none"><span data-dcnode-id="4516" instrument_node="">Hordes! Buggers! Bounders! Frenzy, oh my!</span><br data-dcnode-id="4515"><br data-dcnode-id="4514"><span data-dcnode-id="4513" instrument_node="">What a world. It took a while for me to understand this extremely imaginative world, but I enjoyed every moment of this book. </span><br data-dcnode-id="4512"><br data-dcnode-id="4511"><i data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">The Iron Duke</span></i><span data-dcnode-id="4508" instrument_node=""> portrays an alternative history in a very different Europe. The Horde controls people through nanotechnology. People, especially those living in polluted London, are infected with these agents because they have healing properties. When certain radio frequencies are transmitted, the infected people, known as the Buggers go into a Frenzy. </span><br data-dcnode-id="4507"><br data-dcnode-id="4506"><span data-dcnode-id="4505" instrument_node="">This is a world full of imaginative contraptions and genetically/mechanically altered creatures and zombies, too! There are airships, mechanical carts, mechanical page turners, even mechanical sex toys. Mechanically altered people exist as well, reminiscent of Star Trek’s Borg.</span><br data-dcnode-id="4504"><br data-dcnode-id="4503"><span data-dcnode-id="4502" instrument_node="">Our story begins when a man is dropped from an airship on to The Iron Duke’s house. Inspector Mina Wentworth is dispatched to investigate the crime. The Iron Duke, also known as Rhys Traheaern, is immediately attracted to Mina. Rhys arranges to use his former pirate contacts in order to help Mina solve the crime.</span><br data-dcnode-id="4501"><br data-dcnode-id="4500"><span data-dcnode-id="4499" instrument_node="">Rhys uses this opportunity to get closer to Mina, the woman he wants to shag. The romance aspect is not spectacular, but there are some hot and heavy moments. </span><br data-dcnode-id="4498"><br data-dcnode-id="4497"><span data-dcnode-id="4496" instrument_node="">I really enjoyed the author’s sense of humor. There were some really funny lines and some very clever pillow talk. </span><br data-dcnode-id="4495"><br data-dcnode-id="4494"><span data-dcnode-id="4493" instrument_node="">Did I mention that there are sea monsters in this book? “Release the Kraken!” A most memorable scene with a very large, mechanically enhanced sea monster kept me at the edge of my seat. </span><br data-dcnode-id="4492"><br data-dcnode-id="4491"><span data-dcnode-id="4490" instrument_node="">I loved the secondary characters, especially Yasmeen, The Lady Corsair. Airship pilot, mercenary, I hope that there are more stories planned for her – just her acrobatics alone were spectacular.</span><br data-dcnode-id="4489"><br data-dcnode-id="4488"><span data-dcnode-id="4487" instrument_node="">So there you have it – a book with zombies, sea monsters, Borg-like people, all sorts of mechanical gadgets. Can’t wait to read the next book in the series!</span><br data-dcnode-id="4486"><br data-dcnode-id="4485"><b data-dcnode-id="4480"><span data-dcnode-id="4484" instrument_node="">Update May 23, 2012 - The Iron Duke is now on the </span><a data-dcnode-id="4482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//badassbookreviews.com/the-best-badass-zombie-books/" rel="nofollow noopener"><span data-dcnode-id="4483" instrument_node="">Badass Book Reviews' Best Badass Zombie Books List</span></a><span data-dcnode-id="4481" instrument_node="">. Check it out!</span></b><br data-dcnode-id="4479"></span><span data-dcnode-id="4477" instrument_node="">

</span><span data-dcnode-id="4283" id="freeTextContainer17395954494734398729"><span data-dcnode-id="4284" instrument_node="">A few hundred years before the novel opens, the Asian Horde took over much of the Western world with a mix of force and superior technology. Lacking any navy of merit, they had to be a bit creative in their attack on Britain, choosing to smuggle nanoagents into the cheap sugar and tea they exported to the island nation. As the people ate and drank, they unwittingly infected themselves with tiny bits of self-replicating machinery. While the "bugs" made people stronger, hastened healing and allowe</span></span><span data-dcnode-id="4282" instrument_node="">
</span><span data-dcnode-id="4259" id="freeText17395954494734398729" style="display:none"><span data-dcnode-id="4281" instrument_node="">A few hundred years before the novel opens, the Asian Horde took over much of the Western world with a mix of force and superior technology. Lacking any navy of merit, they had to be a bit creative in their attack on Britain, choosing to smuggle nanoagents into the cheap sugar and tea they exported to the island nation. As the people ate and drank, they unwittingly infected themselves with tiny bits of self-replicating machinery. While the "bugs" made people stronger, hastened healing and allowed a wide range of prosthetic enhancements, the downside was that the Horde could control the infected via a radio frequency transmitted by a tall tower in London.</span><br data-dcnode-id="4280"><br data-dcnode-id="4279"><span data-dcnode-id="4278" instrument_node="">The story takes place nine years after Rhys Trahaearn, now known as the Iron Duke, blows up the tower, freeing all of Britain from Horde control. After a bloody revolution where a mad populace attacked the Horde and each other in a fury borne of a lifetime of tight control suddenly ended, Britain is at a crossroads. The descendants of the wealthy Brits who fled England before they were infected have returned, creating tension between the infected "buggers" and the uninfected "bounders" as to who has more right to Britain. Does it belong to the people who spent the past few hundred years hiding out in Manhattan City in the New World, or to those who endured and overcame Horde rule, but will always be susceptible to control because of their bugs?</span><br data-dcnode-id="4277"><br data-dcnode-id="4276"><span data-dcnode-id="4275" instrument_node="">In the midst of this heady drama, a body literally lands on the Iron Duke's front steps and Detective Inspector Mina Wentworth is called in to investigate. Born after a "Frenzy," where a Horde signal causes all buggers to copulate with each other, she's the half-breed daughter of a English countess and a Horde member who was at the state dinner her mother was attending. Though her parents are noble and she's a distinguished member of the Metropolitan Police force, she encounters constant abuse due to her Asian features. As a result, she's a bit like Eve Dallas - a big squishy ball of insecurities well hidden under a granite facade. Through the love of her supportive family and a singular dedication to her work, she gets by in a world she feels completely apart from.</span><br data-dcnode-id="4274"><br data-dcnode-id="4273"><span data-dcnode-id="4272" instrument_node="">Working on the mystery of the body tossed onto the Iron Duke's steps tests her resolve. As a former pirate, Rhys is accustomed to taking whatever it is her desires, and he decides that Mina will be his latest acquisition. As they fly and sail around England, Europe and Africa unraveling the murder mystery and uncovering a doomsday plot that endangers all the buggers in Britain, the two also are working to figure each other out. Rhys is determined to have her, and Mina is determined to resist him, lest everything she or her family has worked for go up in smoke in the subsequent mockery of the Iron Duke taking up with a "Jade whore."</span><br data-dcnode-id="4271"><br data-dcnode-id="4270"><span data-dcnode-id="4269" instrument_node="">The world-building was superbly done, creating a full, complex world and divulging it at a natural pace throughout the book. All of the secondary characters were fully-fleshed out, providing bits of humor, drama, action and everything in-between when the plot required it but without feeling convenient. The action keeps a steady, energetic pace throughout the book, making it a hard book to put down at times. Brook has created a stunning steampunk setting that's creative and expansive while remaining entirely accessible. There are easily drawn parallels to our own world and the messy politics of today without anything being obvious, sanctimonious or preachy. It's complex enough a world to let you forge your own theories of what is afoot, and approachable enough that you'd want to do so.</span><br data-dcnode-id="4268"><br data-dcnode-id="4267"><span data-dcnode-id="4266" instrument_node="">While I loved the steampunk aspects quite a bit, the romance didn't move me. There was just something about the romance that left me kinda cold. I almost resented the breaks in the action plot and half-skimmed the sex. Their emotions towards each other felt a bit forced, so I felt like a voyeur watching them together. The sex didn't seem to be resolving a tension between them - anguish over memories of a past Frenzy notwithstanding - and so it felt gratuitous.</span><br data-dcnode-id="4265"><br data-dcnode-id="4264"><span data-dcnode-id="4263" instrument_node="">Part of the issue might have been that I didn't feel I really knew Rhys or Mina. I loved them as catalysts for the action - Rhys the alpha, protecting what he considers his and Mina the fighter, always trying to forge order from chaos - but didn't get a good feel for them as humans. I was told that Rhys "respected the hell out of" Mina, but I was never really shown why. What made her so special to him? What about Rhys tempted Mina? I needed to see more talking, vulnerability and emotional intimacy between them. As it was, I was told they were hot for each other, and I watched them bone, and that was the romance.</span><br data-dcnode-id="4262"><br data-dcnode-id="4261"><span data-dcnode-id="4260" instrument_node="">As a romance, it lacks a certain something. As a straight sci-fi, I think I'd have loved this book unreservedly. The world she's created and the secondary characters she populated it with are absolutely spellbinding. For all its faults, it was still a hard book to put down. I'm certainly itching to read the sequel a year from now.</span></span><span data-dcnode-id="4258" instrument_node="">

</span><span data-dcnode-id="4146" id="freeTextContainer8487138624762672695"><i data-dcnode-id="4153"><b data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">Initial reaction:</span></b><span data-dcnode-id="4157" instrument_node=""> This book was </span><i data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">exquisite</span></i><span data-dcnode-id="4154" instrument_node="">. If I could give it 6 stars, I would. :o)</span></i><br data-dcnode-id="4152"><br data-dcnode-id="4151"><span data-dcnode-id="4150" instrument_node="">All I want to know is, what kind of peyote was this woman smoking when she dreamt up this amazing world? ^__^ It is proving exceedingly difficult for me to adequately express what it is about this book that makes me love it so. In fact, I can almost guarantee I won't be pleased with this review. ^_^ But I'll make mention of a couple thoughts in broad strokes.</span><br data-dcnode-id="4149"><br data-dcnode-id="4148"><span data-dcnode-id="4147" instrument_node="">...beginning with the world. Brooks' world(building) was</span></span><span data-dcnode-id="4145" instrument_node="">
</span><span data-dcnode-id="4107" id="freeText8487138624762672695" style="display:none"><i data-dcnode-id="4138"><b data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">Initial reaction:</span></b><span data-dcnode-id="4142" instrument_node=""> This book was </span><i data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">exquisite</span></i><span data-dcnode-id="4139" instrument_node="">. If I could give it 6 stars, I would. :o)</span></i><br data-dcnode-id="4137"><br data-dcnode-id="4136"><span data-dcnode-id="4135" instrument_node="">All I want to know is, what kind of peyote was this woman smoking when she dreamt up this amazing world? ^__^ It is proving exceedingly difficult for me to adequately express what it is about this book that makes me love it so. In fact, I can almost guarantee I won't be pleased with this review. ^_^ But I'll make mention of a couple thoughts in broad strokes.</span><br data-dcnode-id="4134"><br data-dcnode-id="4133"><span data-dcnode-id="4132" instrument_node="">...beginning with the world. Brooks' world(building) was perhaps my favorite aspect. The story begins much as I'd expect some Austenian-like historical novel to do; at a ball and amongst the polite society of England. But almost immediately, Brook starts to "pan out the frame" so to speak, revealing bits of curious descriptions until we realize that while this world is familiar, it's altered most considerably.</span><br data-dcnode-id="4131"><br data-dcnode-id="4130"><span data-dcnode-id="4129" instrument_node="">To call it simply "steampunk" does not do enough to capture it all, either. At one point I thought to myself that the book had a somewhat post-apocalyptic feel to it. Also that there were serious machinations about race, culture, identity and human nature. Many steampunk books can be fun and fantastical, and though this book presents such a characteristic (in great style, mind you), there's something quite grim and horrifying, as well.</span><br data-dcnode-id="4128"><br data-dcnode-id="4127"><span data-dcnode-id="4126" instrument_node="">I love that Brook clearly put much deep thought into the history behind the Iron Seas world; it actually plays quite considerably into the motivations of individuals and group entities. Not many books of this subgenre do so: things simply are because they are (which is not inherently a bad thing, btw). I visited Brook's website and found a short writeup on what actual historical events were altered to arrive at the universe in this book. I appreciated the consideration, and am impressed by the relevance it has in so many aspects of the story.</span><br data-dcnode-id="4125"><br data-dcnode-id="4124"><span data-dcnode-id="4123" instrument_node="">Now, the cast of characters. They are perhaps what brought out much of that aforementioned "fun and fantastical" nature. Every last one of the main cast displayed a beautiful range of emotions and personality. Each one did or said something that at one point made me chuckle, and at another point made me sad. In short, the supporting cast was superbly compelling.</span><br data-dcnode-id="4122"><br data-dcnode-id="4121"><span data-dcnode-id="4120" instrument_node="">The main couple is fantastic. I can't really put into words the extent of my adoration for Rhys and Mina, both separated and when interacting. I felt that the progression of the romance was well-paced and complemented the main storyline very well. And that's all I'll say to that end. </span><i data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">Trust me</span></i><span data-dcnode-id="4117" instrument_node=""> when I say that--if you've yet to read the book--you'll want to discover both characters for yourself, and learn about their complexities in context.</span><br data-dcnode-id="4116"><br data-dcnode-id="4115"><span data-dcnode-id="4114" instrument_node="">Okay, as predicted I'm already fed up with my review. So I'll sum up: I found this world to be so different, so exhilarating, so chilling. I would recommend this book to just about every PnR junkie I know...especially those who can appreciate 1) some complexity in their storyline and 2) extensive worldbuilding. And zombies. ^_^</span><br data-dcnode-id="4113"><br data-dcnode-id="4112"><br data-dcnode-id="4111"><span data-dcnode-id="4110" instrument_node="">P.S. - Apparently the second book of the series will follow one of the minor characters from The Iron Duke (starts with a Y- and ends with an -asmeen) ^_^). I already have it at the very top of my 2011 to-read list. ^__^</span><br data-dcnode-id="4109"><br data-dcnode-id="4108"></span><span data-dcnode-id="4106" instrument_node="">
