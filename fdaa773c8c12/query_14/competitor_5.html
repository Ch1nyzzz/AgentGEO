</span><span data-dcnode-id="5996" id="freeText7600027637670050770" style="display:none"><span data-dcnode-id="6006" instrument_node="">Wicked faeries and fantastic danger… Welcome to book one of the new trilogy in New York Times bestselling author Julie Kagawa’s Iron Fey fantasy series, as infamous prankster Puck finally has a chance to tell his story and stand with allies new and old to save Faery and the world. For fans of Holly Black and Cassandra Clare!</span><br data-dcnode-id="6005"><br data-dcnode-id="6004"><span data-dcnode-id="6003" instrument_node="">“YOU MAY HAVE HEARD OF ME…”</span><br data-dcnode-id="6002"><br data-dcnode-id="6001"><span data-dcnode-id="6000" instrument_node="">Robin Goodfellow. Puck. Prankster, joker, raven, fool… King Oberon’s right-hand jester from A Midsummer Night’s Dream. The legends are many, but the truth will now be known, as Puck finally tells his own story and faces a threat from a time before Faery began. A threat that brings him face-to-face with a new enemy…himself.</span><br data-dcnode-id="5999"><br data-dcnode-id="5998"><span data-dcnode-id="5997" instrument_node="">With the Iron Queen Meghan Chase and her prince consort, Puck’s longtime rival Ash, and allies old and new by his side, Puck begins a fantastical and dangerous adventure not to be missed or forgotten. Evenfall is coming, and with it a reckoning that even their combined powers and wits may not vanquish, as a shadow falls over the lands of Faery and the world slips into chaos.</span></span><span data-dcnode-id="5995" instrument_node="">

</span><span class="readable" data-dcnode-id="5101" id="reviewTextContainer3010003833"><span data-dcnode-id="5234" instrument_node="">
</span><span data-dcnode-id="5214" id="freeTextContainer2173338580555391842"><blockquote data-dcnode-id="5232"><span data-dcnode-id="5233" instrument_node="">“I could see my reflection in her gaze, the horns jutting out of my hair, the slightly feral look that seemed normal for me now. My heartbeat picked up, and my mouth went dry as this deadly, confident, beautiful assassin held my gaze without fear.”</span></blockquote><br data-dcnode-id="5231"><br data-dcnode-id="5230"><span data-dcnode-id="5229" instrument_node="">I initially rated this 3 stars, but the more I thought about it, the angrier I got, so buckle in your seatbelts. </span><br data-dcnode-id="5228"><br data-dcnode-id="5227"><span data-dcnode-id="5226" instrument_node="">Me to The Iron Raven:</span><br data-dcnode-id="5225"><br data-dcnode-id="5224"><img class="gr-hostedUserImg" data-dcnode-id="5223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1481294506ra/21408686.gif&amp;raw"><br data-dcnode-id="5222"><br data-dcnode-id="5221"><span data-dcnode-id="5220" instrument_node="">I'm too mad to structure this properly, so this will just be a list of thoughts/things that infuriated me:</span><br data-dcnode-id="5219"><br data-dcnode-id="5218"><span data-dcnode-id="5217" instrument_node="">-</span><b data-dcnode-id="5215"><span data-dcnode-id="5216" instrument_node="">Why another</span></b></span><span data-dcnode-id="5213" instrument_node="">
</span><span data-dcnode-id="5106" id="freeText2173338580555391842" style="display:none"><blockquote data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">“I could see my reflection in her gaze, the horns jutting out of my hair, the slightly feral look that seemed normal for me now. My heartbeat picked up, and my mouth went dry as this deadly, confident, beautiful assassin held my gaze without fear.”</span></blockquote><br data-dcnode-id="5210"><br data-dcnode-id="5209"><span data-dcnode-id="5208" instrument_node="">I initially rated this 3 stars, but the more I thought about it, the angrier I got, so buckle in your seatbelts. </span><br data-dcnode-id="5207"><br data-dcnode-id="5206"><span data-dcnode-id="5205" instrument_node="">Me to The Iron Raven:</span><br data-dcnode-id="5204"><br data-dcnode-id="5203"><img class="gr-hostedUserImg" data-dcnode-id="5202" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1481294506ra/21408686.gif&amp;raw"><br data-dcnode-id="5201"><br data-dcnode-id="5200"><span data-dcnode-id="5199" instrument_node="">I'm too mad to structure this properly, so this will just be a list of thoughts/things that infuriated me:</span><br data-dcnode-id="5198"><br data-dcnode-id="5197"><span data-dcnode-id="5196" instrument_node="">-</span><b data-dcnode-id="5194"><span data-dcnode-id="5195" instrument_node="">Why another heterosexual, white romance?</span></b><span data-dcnode-id="5193" instrument_node=""> Just why?? Puck is a faerie and Kagawa has previously confirmed on Twitter that fey have no fixed sexual orientation. In the book, Puck tells us that he has had romantic interactions with creatures of all genders and species. Then why fucking play it safe? Why give us this piss-weak attempt at representation, then not show it on page? I’m especially disappointed because Kagawa used #OwnVoices to promote her </span><a data-dcnode-id="5191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/36672988.Shadow_of_the_Fox__Shadow_of_the_Fox___1_" rel="nofollow noopener" title="Shadow of the Fox (Shadow of the Fox, #1) by Julie Kagawa"><span data-dcnode-id="5192" instrument_node="">Shadow of the Fox</span></a><span data-dcnode-id="5190" instrument_node=""> series, but remained conspicuously silent during BLM. You can argue that she doesn’t want her Twitter to be for anything but author promo, but in my opinion, if you wanna reap the benefits of the diversity card, you have to give back to the community in return. I’m not saying she should be out there holding a sign on the street, but she can at least use her influence to promote resources and organizations.</span><br data-dcnode-id="5189"><br data-dcnode-id="5188"><span data-dcnode-id="5187" instrument_node="">-There’s too much mention of kissing when they really mean sex. Teenagers. Have. Sex. They likely talk about it more than we do because hormones. So stop clutching your pearls and just say the word sex. I’m not asking for graphic erotica, but this is just prudish.</span><br data-dcnode-id="5186"><br data-dcnode-id="5185"><span data-dcnode-id="5184" instrument_node="">-The word "stubborn" gets thrown around too much. I have hated that word since YA Paranormal Romances ruined it. You know what I'm talking about—the male love interest will sigh through his aquiline nose and say the heroine is being stubborn when he really means she has no self-preservation skills and Darwinism will take care of her. These characters are exactly the same. They use the word stubborn when they really mean idiotic, or if I’m being generous, loyal to a fault. I'll be happy if I never see the word "stubborn" used in a positive context again, k thanks.</span><br data-dcnode-id="5183"><br data-dcnode-id="5182"><span data-dcnode-id="5181" instrument_node="">-We get kissy-kissy scenes between Ash and Meghan and seriously, </span><b data-dcnode-id="5179"><span data-dcnode-id="5180" instrument_node="">those two just need to fuck off already.</span></b><span data-dcnode-id="5178" instrument_node=""> I would’ve preferred they play a minimum role because this is a new series and they were titular characters in the first series. But they're still very much prominent, and I suspect it's because Kagawa wants to (not so) indirectly praise their epic romance.</span><br data-dcnode-id="5177"><br data-dcnode-id="5176"><img class="gr-hostedUserImg" data-dcnode-id="5175" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1613814455ra/30897622.gif&amp;raw"><br data-dcnode-id="5174"><br data-dcnode-id="5173"><span data-dcnode-id="5172" instrument_node="">-The big bad was laughable. </span><a class="jsShowSpoiler spoilerAction" data-dcnode-id="5170"><span data-dcnode-id="5171" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="5165" style="display: none"><span data-dcnode-id="5169" instrument_node="">[After all that hype, what defeats the creature is the power of lurve. Okay, maybe not exactly love, but positive thoughts. Just say riddikulus, mate, and save us all some time </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="5166" instrument_node="">]</span></span><br data-dcnode-id="5164"><br data-dcnode-id="5163"><span data-dcnode-id="5162" instrument_node="">-Nyx, Puck's love interest, is boring. She was fiercely loyal to the Lady of the Forgotten and is now loyal to Kerrian, the new King of the Forgotten. I figured she’d be more upset that Kerrian murdered her queen, but I guess the narrative wanted to usher us in another direction so oopsie, no time for that grievance! She would’ve been a far more interesting character if she had to wrestle with her past and new loyalties.</span><br data-dcnode-id="5161"><br data-dcnode-id="5160"><b data-dcnode-id="5158"><span data-dcnode-id="5159" instrument_node="">Anything dark is just glossed over in general.</span></b><span data-dcnode-id="5157" instrument_node=""> Puck was wounded by the creature near the beginning and is consequentially reverting back to Robin Goodfellow, the vicious faerie he used to be, who had no conscience and would play cruel pranks. We get a very sanctified version of Robin Goodfellow though. Puck gets horns and goat hindquarters and says a few mean words to Ash, and that’s it. The book feels the need to remind us every few pages that Puck is feeling these daaaark things and he doesn’t want to be that person, but all these reminders only serve as a smokescreen for the fact we're never going to get Dark!Puck. It's all tell, no show. Kagawa is too scared of making this book semi-nuanced, so she never actually lets Puck off his reins. Does she genuinely think readers will turn on Puck if he does something cruel, like bomb a village with rats? The YA community is way too obsessed with villains. Most of them are still salivating over the Darkling from </span><a data-dcnode-id="5155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/10194157.Shadow_and_Bone__The_Shadow_and_Bone_Trilogy___1_" rel="nofollow noopener" title="Shadow and Bone (The Shadow and Bone Trilogy, #1) by Leigh Bardugo"><span data-dcnode-id="5156" instrument_node="">Shadow and Bone</span></a><span data-dcnode-id="5154" instrument_node=""> and he murdered and mutilated people. </span><br data-dcnode-id="5153"><br data-dcnode-id="5152"><span data-dcnode-id="5151" instrument_node="">-The flashbacks were the only interesting parts of the book, but they were far too few. We only get two from what I recall. We don't get a gay encounter in the flashbacks either. Lame. </span><br data-dcnode-id="5150"><br data-dcnode-id="5149"><b data-dcnode-id="5147"><span data-dcnode-id="5148" instrument_node="">The Iron Raven could have been magnificent. The ingredients were there and they were just squandered. That's what angers me the most.</span></b><br data-dcnode-id="5146"><br data-dcnode-id="5145"><br data-dcnode-id="5144"><span data-dcnode-id="5143" instrument_node="">Pre-review: Why are all old-timer YA authors revisiting their debuts these days? First Tahereh Mafi, then Marie Lu, and now Julie Kagawa. </span><br data-dcnode-id="5142"><br data-dcnode-id="5141"><span data-dcnode-id="5140" instrument_node="">Honestly I think this is linked to the incoming trend of YA authors moving into adult fiction. Sarah J. Mass is set to release Crescent City, and Leigh Bardugo just released Ninth House. They’re catching up with their audience. The readers that read Throne of Glass back when it first came out are adults now and might yearn for more mature content. Writing adult fiction is a good way to tap into your existing fanbase (and keep them for the more cynical-minded). Revisiting old series carries the same logic. Of course I’m going to fucking read The Iron Raven, even though the tropes would make present-day me throw up my eyeballs. They’re capitalizing off nostalgia and you know what—you got. Hook, line, and Puck-shaped sinker.</span></span><span data-dcnode-id="5105" instrument_node="">

</span><span data-dcnode-id="4991" id="freeTextContainer844186186715688514"><b data-dcnode-id="5000"><span data-dcnode-id="5001" instrument_node="">At this point, authors are just taking advantage of our nostalgia. But you know what? I'm ok with that.</span></b><span data-dcnode-id="4999" instrument_node=""> I have been waiting for my main-man Puck, AKA: Robin Goodfellow, AKA: one-of-my-favorite-characters-of-all-time-and-forever, to get his book, and after a whole decade of waiting, he finally did. </span><br data-dcnode-id="4998"><br data-dcnode-id="4997"><span data-dcnode-id="4996" instrument_node="">That said, after I read it, I up the book down, stared into the emptiness and had no idea what I even thought about it. I've been postponing my review for days because I don't know what to say. </span><br data-dcnode-id="4995"><br data-dcnode-id="4994"><b data-dcnode-id="4992"><span data-dcnode-id="4993" instrument_node="">Did I e</span></b></span><span data-dcnode-id="4990" instrument_node="">
</span><span data-dcnode-id="4908" id="freeText844186186715688514" style="display:none"><b data-dcnode-id="4988"><span data-dcnode-id="4989" instrument_node="">At this point, authors are just taking advantage of our nostalgia. But you know what? I'm ok with that.</span></b><span data-dcnode-id="4987" instrument_node=""> I have been waiting for my main-man Puck, AKA: Robin Goodfellow, AKA: one-of-my-favorite-characters-of-all-time-and-forever, to get his book, and after a whole decade of waiting, he finally did. </span><br data-dcnode-id="4986"><br data-dcnode-id="4985"><span data-dcnode-id="4984" instrument_node="">That said, after I read it, I up the book down, stared into the emptiness and had no idea what I even thought about it. I've been postponing my review for days because I don't know what to say. </span><br data-dcnode-id="4983"><br data-dcnode-id="4982"><b data-dcnode-id="4974"><span data-dcnode-id="4981" instrument_node="">Did I enjoy it? Yes. For sure. </span><br data-dcnode-id="4980"><span data-dcnode-id="4979" instrument_node="">Did I love it? No. Not really.</span><br data-dcnode-id="4978"><span data-dcnode-id="4977" instrument_node="">Was it full o the same stuff I loved in the Iron Fey? It certainly was.</span><br data-dcnode-id="4976"><span data-dcnode-id="4975" instrument_node="">Did it fill me with the same joy as the Iron Fey? It certainly did not.</span></b><br data-dcnode-id="4973"><br data-dcnode-id="4972"><span data-dcnode-id="4971" instrument_node="">So, here we are. </span><br data-dcnode-id="4970"><br data-dcnode-id="4969"><b data-dcnode-id="4967"><span data-dcnode-id="4968" instrument_node="">First, let me tell you, I love Puck. He's funny and charming and very entertaining to read about.</span></b><span data-dcnode-id="4966" instrument_node=""> I loved being in his head and getting to see just how complex he is. I loved him as the main character, although I did have an issue with the narrative style and wording (see below). </span><br data-dcnode-id="4965"><br data-dcnode-id="4964"><span data-dcnode-id="4963" instrument_node="">The rest of our beloved gang is also back with Grimalkin, Ash, and Megan. I missed that squad so much! We also have a new character, Nyx, who I honestly felt pretty ambivalent towards. She was cool but not necessarily memorable for me. Then again, I was too busy focusing on Puck and all the other OG cast. </span><br data-dcnode-id="4962"><br data-dcnode-id="4961"><span data-dcnode-id="4960" instrument_node="">The plot is fast-paced and action-packed. There was a moment right before Puck meets up with Ash and Megan that kind of dragged for me, but once the gang was together, it all picked up again. </span><br data-dcnode-id="4959"><br data-dcnode-id="4958"><span data-dcnode-id="4957" instrument_node="">The writing is good for the most part and I enjoyed the way the world and character dialogue was written. </span><b data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">Still, the book is repetitive</span></b><span data-dcnode-id="4954" instrument_node="">. Puck goes through the same inner monologue too many times. It's the same pity party over and over. It goes with the same phrasing and word choice and while I did feel for him at first, by the third or fourth time of the same sad fest, I just rolled my eyes </span><br data-dcnode-id="4953"><br data-dcnode-id="4952"><span data-dcnode-id="4951" instrument_node="">Also, through the book we see Puck revert to the Robin Goodfellow from legend that everyone feared. And every time this would get mentioned, it was in the same repetitive monologue. It got old quick. It was also underwhelming. </span><b data-dcnode-id="4949"><span data-dcnode-id="4950" instrument_node="">I wanted to see a cruel, sadistic, bloodthirsty Robin Goodfellow because that's what they kept hyping up but that's not what we got. It was all talk. </span></b><span data-dcnode-id="4948" instrument_node="">Other than some shady things he said and some slightly more powerful uses of magic, he wasn't all that bad or terrifying. It's like the author was afraid that to show the full darkness in him because it might damage his likable persona. </span><br data-dcnode-id="4947"><br data-dcnode-id="4946"><span data-dcnode-id="4945" instrument_node="">Then there was the romance. I liked it. And didn't like it. Romance is not the main focus of the book so don't worry. Nor are there any wild declarations of love, which is why I liked it. But according to my calculations, this book takes place over four or five days. I've never been in love, so maybe I'm wrong, but </span><b data-dcnode-id="4943"><span data-dcnode-id="4944" instrument_node="">4-5 business days aren't enough to fall in love with someone. Especially when that someone has such little character development. And especially when you're a centuries-old faerie and not a naive teenage boy.</span></b><span data-dcnode-id="4942" instrument_node=""> It just felt rushed and forced to me. Like Puck needed a love interest and the author said, yeah why not. </span><br data-dcnode-id="4941"><br data-dcnode-id="4940"><b data-dcnode-id="4938"><span data-dcnode-id="4939" instrument_node="">In the end, I did enjoy this one. It was a fun read and I recommend it to any fans of The Iron Fey. </span></b><br data-dcnode-id="4937"><br data-dcnode-id="4936"><span data-dcnode-id="4935" instrument_node="">Lastly, this is just a suggestion. Do you have to read The Iron Fey and The Iron Fey: Call of the Forgotten series to understand this book? Technically no. Should you? Probably yes. Considering that most of the characters in this book (literally everyone except for Nyx) are from the previous novels and that the entire plot of this book is a consequence of the things that happened prior, you might lack a lot of background information. But, do with that information what you will. </span><br data-dcnode-id="4934"><br data-dcnode-id="4933"><i data-dcnode-id="4931"><span data-dcnode-id="4932" instrument_node="">**I received an ARC of this book from the publisher in exchange for an honest review. All opinions are my own.**</span></i><br data-dcnode-id="4930"><br data-dcnode-id="4929"><span data-dcnode-id="4928" instrument_node="">Follow Me Here Too:</span><b data-dcnode-id="4909"><span data-dcnode-id="4927" instrument_node=""> </span><a data-dcnode-id="4925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thebookcovergirls.wordpress.com/" rel="nofollow noopener"><span data-dcnode-id="4926" instrument_node="">My Blog</span></a><span data-dcnode-id="4924" instrument_node=""> || </span><a data-dcnode-id="4922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/covergirlreads" rel="nofollow noopener"><span data-dcnode-id="4923" instrument_node="">Twitter</span></a><span data-dcnode-id="4921" instrument_node=""> || </span><a data-dcnode-id="4919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloglovin.com/blogs/book-cover-girl-19339391" rel="nofollow noopener" target="_blank"><span data-dcnode-id="4920" instrument_node="">Bloglovin'</span></a><span data-dcnode-id="4918" instrument_node=""> || </span><a data-dcnode-id="4916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/thebookcovergirls//" rel="nofollow noopener"><span data-dcnode-id="4917" instrument_node="">Instagram</span></a><span data-dcnode-id="4915" instrument_node=""> || </span><a data-dcnode-id="4913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebookcovergirls.tumblr.com/" rel="nofollow noopener"><span data-dcnode-id="4914" instrument_node="">Tumblr</span></a><span data-dcnode-id="4912" instrument_node=""> || </span><a data-dcnode-id="4910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/thebookcovergirls/" rel="nofollow noopener"><span data-dcnode-id="4911" instrument_no </span></b><span data-dcnode-id="4665" instrument_node="">. </span><br data-dcnode-id="4664"><br data-dcnode-id="4663"><span data-dcnode-id="4662" instrument_node="">Puck always seemed to be cheerful &amp; uncaring about a lot, but damnn he's totally different on the inside and it showed. The amount of times I wanted to cry over Puck's pain :(((</span><br data-dcnode-id="4661"><img class="gr-hostedUserImg" data-dcnode-id="4660" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1610237212ra/30671394.gif&amp;raw"><br data-dcnode-id="4659"><br data-dcnode-id="4658"><span data-dcnode-id="4657" instrument_node="">And I loved that we got to learn wayyyy more about Puck's past. Like </span><b data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">A LOT</span></b><span data-dcnode-id="4654" instrument_node=""> more and how he used to be centuries ago. Really makes you understand him so much more &lt;333</span><br data-dcnode-id="4653"><br data-dcnode-id="4652"><span data-dcnode-id="4651" instrument_node="">════☩══✠══☩════</span><br data-dcnode-id="4650"><br data-dcnode-id="4649"><blockquote data-dcnode-id="4638"><span data-dcnode-id="4648" instrument_node="">
</span><b data-dcnode-id="4640"><span data-dcnode-id="4647" instrument_node="">
</span><i data-dcnode-id="4642"><span data-dcnode-id="4646" instrument_node="">"Generally, I find a dagger is a much better alternative to stopping someone's heart than a surprise party.</span><br data-dcnode-id="4645"><br data-dcnode-id="4644"><span data-dcnode-id="4643" instrument_node="">There's far less of a chance they'll stab you back."</span></i><span data-dcnode-id="4641" instrument_node="">
</span></b><span data-dcnode-id="4639" instrument_node="">
</span></blockquote><br data-dcnode-id="4637"><span data-dcnode-id="4636" instrument_node="">Yes, she sounds very concerning but I </span><b data-dcnode-id="4631"><span data-dcnode-id="4635" instrument_node="">
</span><i data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">adore</span></i><span data-dcnode-id="4632" instrument_node="">
</span></b><span data-dcnode-id="4630" instrument_node=""> that. Nyx is supposedly Puck's new love interest and she's super cool. Puck himself called her an </span><b data-dcnode-id="4628"><span data-dcnode-id="4629" instrument_node="">Ash 2.0</span></b><span data-dcnode-id="4627" instrument_node=""> and I CAN SEE THAT.😂 </span><br data-dcnode-id="4626"><br data-dcnode-id="4625"><span data-dcnode-id="4624" instrument_node="">The way I want to talk more about her, but I think it's much better if you see for yourself.😏 I'll just say that she's very very skilled assassin and Julie made many references to </span><i data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">Sailor Moon</span></i><span data-dcnode-id="4621" instrument_node=""> that related to Nyx.</span><br data-dcnode-id="4620"><br data-dcnode-id="4619"><span data-dcnode-id="4618" instrument_node="">But as much as I did like her, I found the romance between Puck and her a little lacking :/</span><br data-dcnode-id="4617"><span data-dcnode-id="4616" instrument_node="">Although, it's probably just a me thing, but I literally shrieked and had a goofy smile on my face every time I saw a </span><b data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">MeghanxAsh</span></b><span data-dcnode-id="4613" instrument_node=""> scene. </span><br data-dcnode-id="4612"><br data-dcnode-id="4611"><span data-dcnode-id="4610" instrument_node="">I was </span><b data-dcnode-id="4605"><span data-dcnode-id="4609" instrument_node="">
</span><i data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">living</span></i><span data-dcnode-id="4606" instrument_node="">
</span></b><span data-dcnode-id="4604" instrument_node=""> for those moments.</span><br data-dcnode-id="4603"><blockquote data-dcnode-id="4592"><span data-dcnode-id="4602" instrument_node="">
</span><b data-dcnode-id="4594"><span data-dcnode-id="4601" instrument_node="">
</span><i data-dcnode-id="4596"><span data-dcnode-id="4600" instrument_node="">Ash started to say something, and she glared at him. "Unless I don't get any rest from the constant hovering of an overprotective Winter faery who is worried that I'm not getting enough rest."</span><br data-dcnode-id="4599"><br data-dcnode-id="4598"><span data-dcnode-id="4597" instrument_node="">Ash slumped in defeat. "Fine," I heard him say. "As you wish, my queen. But if you pass out or fall asleep during the fight with the big monster, I get to be 'unbearably overprotective' for the next month."</span></i><span data-dcnode-id="4595" instrument_node="">

</span></blockquote><br data-dcnode-id="4580"><span data-dcnode-id="4579" instrument_node="">I wish I could fall into Ash's arms :(</span><br data-dcnode-id="4578"><s data-dcnode-id="4576"><span data-dcnode-id="4577" instrument_node="">yes, clearly something is wrong with me, i know</span></s><br data-dcnode-id="4575"><img class="gr-hostedUserImg" data-dcnode-id="4574" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1605803684ra/30400008.gif&amp;raw"><br data-dcnode-id="4573"><br data-dcnode-id="4572"><span data-dcnode-id="4571" instrument_node="">But you can't have an </span><b data-dcnode-id="4566"><span data-dcnode-id="4570" instrument_node="">

</span></b><span data-dcnode-id="4565" instrument_node=""> book without our ✨favourite✨ cait sith-- </span><b data-dcnode-id="4563"><span data-dcnode-id="4564" instrument_node="">Grimalkin</span></b><span data-dcnode-id="4562" instrument_node="">. He was as 'helpful' as always and the star of the show </span><s data-dcnode-id="4560"><span data-dcnode-id="4561" instrument_node="">other than Ash ofc.</span></s><span data-dcnode-id="4559" instrument_node=""> His "Because I am a cat" responses were as </span><s data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">infuriating</span></s><span data-dcnode-id="4556" instrument_node=""> hilarious as always. You could give me a whole series on Grimalkin and I'll read it.😹 </span><br data-dcnode-id="4555"><br data-dcnode-id="4554"><span data-dcnode-id="4553" instrument_node="">wait, that's actually a really good idea...if Julie did that, I'd die of happiness.</span><br data-dcnode-id="4552"><br data-dcnode-id="4551"><blockquote data-dcnode-id="4531"><span data-dcnode-id="4550" instrument_node="">
</span><b data-dcnode-id="4533"><span data-dcnode-id="4549" instrument_node="">
</span><i data-dcnode-id="4535"><span data-dcnode-id="4548" instrument_node="">"We've learned a lot since then. When I first came through here with Ironhorse, I was younger, and much more..." She paused.</span><br data-dcnode-id="4547"><br data-dcnode-id="4546"><span data-dcnode-id="4545" instrument_node="">"Reckless?" Ash said quietly beside her.</span><br data-dcnode-id="4544"><br data-dcnode-id="4543"><span data-dcnode-id="4542" instrument_node="">"Impulsive," Grimalkin added up front without turning around.</span><br data-dcnode-id="4541"><br data-dcnode-id="4540"><span data-dcnode-id="4539" instrument_node="">"Prone to shrieking?" I put in, not about to be left out.</span><br data-dcnode-id="4538"><br data-dcnode-id="4537"><span data-dcnode-id="4536" instrument_node="">The Iron Queen glared at us all. "All those things, I suppose," she said in a flat voice that hinted at retribution later on.</span></i><span data-dcnode-id="4534" instrument_node="">
</span></b><span data-dcnode-id="4532" instrument_node="">
</span></blockquote><br data-dcnode-id="4530"><span data-dcnode-id="4529" instrument_node="">That moment when they all gang up on Meghan😂 They're not wrong tho</span><br data-dcnode-id="4528"><br data-dcnode-id="4527"><span data-dcnode-id="4526" instrument_node="">Now the reason why I thought of this story as deserving a </span><b data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">3 star</span></b><span data-dcnode-id="4523" instrument_node=""> is because it kinda felt like it was </span><b data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">lacking</span></b><span data-dcnode-id="4520" instrument_node=""> the </span><b data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">same magic</span></b><span data-dcnode-id="4517" instrument_node=""> that I felt the </span><b data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">original series</span></b><span data-dcnode-id="4514" instrument_node=""> had. There's definitely been lots of improvement in terms of writing, although I've always loved Julie's writing.</span><br data-dcnode-id="4513"><br data-dcnode-id="4512"><span data-dcnode-id="4511" instrument_node="">There was also (and might just be me) the amount of times I saw </span><b data-dcnode-id="4506"><span data-dcnode-id="4510" instrument_node="">
</span><i data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">"smirk"</span></i><span data-dcnode-id="4507" instrument_node="">
</span></b><span data-dcnode-id="4505" instrument_node=""> being used AND IT WAS SO ANNOYING. Like the characters can smirk and all, but when they're smirking basically ever five pages, ahahahaha that's just too much. </span><br data-dcnode-id="4504"><br data-dcnode-id="4503"><span data-dcnode-id="4502" instrument_node="">sTOP SMIRKING. </span><br data-dcnode-id="4501"><br data-dcnode-id="4500"><span data-dcnode-id="4499" instrument_node="">nO MORE SMIRKING.</span><br data-dcnode-id="4498"><img class="gr-hostedUserImg" data-dcnode-id="4497" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1610239296ra/30671478.gif&amp;raw"><br data-dcnode-id="4496"><s data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">if the next book I read has a lot of 'smirks', I'm gonna throw it across the room and burn it</span></s><br data-dcnode-id="4493"><br data-dcnode-id="4492"><span data-dcnode-id="4491" instrument_node="">Ahhh this has successfully made me want to reread </span><i data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">The Iron Fey</span></i><span data-dcnode-id="4488" instrument_node=""> series. </span><br data-dcnode-id="4487"><br data-dcnode-id="4486"><b data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">I've been apart from Ash for far too long.</span></b><br data-dcnode-id="4483"><br data-dcnode-id="4482"><br data-dcnode-id="4481"><span data-dcnode-id="4480" instrument_node="">════☩══✠══☩════</span><br data-dcnode-id="4479"><br data-dcnode-id="4478"><i data-dcnode-id="4476"><span data-dcnode-id="4477" instrument_node="">Eternally grateful to Inkyard Press for sending me an ARC via Edelweiss in exchange for an honest review. All quotes in this review are subject to change upon release date.</span></i></span><span data-dcnode-id="4474" instrument_node="">

</span><span data-dcnode-id="4367" id="freeTextContainer11078263844945325153"><i data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">The Iron Raven</span></i><span data-dcnode-id="4383" instrument_node=""> is the first installment of a new trilogy set within the world of Julie Kagawa's much loved </span><i data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">Iron Fey</span></i><span data-dcnode-id="4380" instrument_node=""> series.</span><br data-dcnode-id="4379"><br data-dcnode-id="4378"><span data-dcnode-id="4377" instrument_node="">There have been seven previous full-length novels, as well as a handful of novellas, in this series. This is the first to feature Robin Goodfellow, aka Puck, as the narrator.</span><br data-dcnode-id="4376"><br data-dcnode-id="4375"><img class="gr-hostedUserImg" data-dcnode-id="4374" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1488306642ra/22100517.gif&amp;raw"><br data-dcnode-id="4373"><br data-dcnode-id="4372"><span data-dcnode-id="4371" instrument_node="">I must confess, I have never read any of the </span><i data-dcnode-id="4369"><span data-dcnode-id="4370" instrument_node="">Iron Fey</span></i><span data-dcnode-id="4368" instrument_node=""> novels. In spite of that, I still had a ton of fun reading this and fell in love with the characters. Kagawa did an incredible job making this access</span></span><span data-dcnode-id="4366" instrument_node="">
</span><span data-dcnode-id="4272" id="freeText11078263844945325153" style="display:none"><i data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">The Iron Raven</span></i><span data-dcnode-id="4363" instrument_node=""> is the first installment of a new trilogy set within the world of Julie Kagawa's much loved </span><i data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">Iron Fey</span></i><span data-dcnode-id="4360" instrument_node=""> series.</span><br data-dcnode-id="4359"><br data-dcnode-id="4358"><span data-dcnode-id="4357" instrument_node="">There have been seven previous full-length novels, as well as a handful of novellas, in this series. This is the first to feature Robin Goodfellow, aka Puck, as the narrator.</span><br data-dcnode-id="4356"><br data-dcnode-id="4355"><img class="gr-hostedUserImg" data-dcnode-id="4354" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1488306642ra/22100517.gif&amp;raw"><br data-dcnode-id="4353"><br data-dcnode-id="4352"><span data-dcnode-id="4351" instrument_node="">I must confess, I have never read any of the </span><i data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">Iron Fey</span></i><span data-dcnode-id="4348" instrument_node=""> novels. In spite of that, I still had a ton of fun reading this and fell in love with the characters. Kagawa did an incredible job making this accessible to Readers new to this world.</span><br data-dcnode-id="4347"><br data-dcnode-id="4346"><span data-dcnode-id="4345" instrument_node="">With this being said, I'm sure for long-time fans of the series, this book is full of nostalgic content and it will be even more wonderful for them to read.</span><br data-dcnode-id="4344"><br data-dcnode-id="4343"><img class="gr-hostedUserImg" data-dcnode-id="4342" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1613321477ra/30866090.gif&amp;raw"><br data-dcnode-id="4341"><br data-dcnode-id="4340"><span data-dcnode-id="4339" instrument_node="">I was excited to pick this up because Kagawa's </span><i data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">Shadow of the Fox</span></i><span data-dcnode-id="4336" instrument_node=""> trilogy is my favorite YA Fantasy trilogy of all time.</span><br data-dcnode-id="4335"><br data-dcnode-id="4334"><span data-dcnode-id="4333" instrument_node="">Her witty and vibrant writing style mesh extremely well with my tastes. In fact, after this, I am quite tempted to go back and read the </span><i data-dcnode-id="4331"><span data-dcnode-id="4332" instrument_node="">Iron Fey</span></i><span data-dcnode-id="4330" instrument_node=""> series from the beginning!</span><br data-dcnode-id="4329"><br data-dcnode-id="4328"><img class="gr-hostedUserImg" data-dcnode-id="4327" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1576532603ra/28623302.gif&amp;raw"><br data-dcnode-id="4326"><br data-dcnode-id="4325"><span data-dcnode-id="4324" instrument_node="">This novel is a classic adventure story, complete with a dangerous quest, set in the land of the Fae. </span><br data-dcnode-id="4323"><br data-dcnode-id="4322"><span data-dcnode-id="4321" instrument_node="">It begins when Puck chances upon the King of the Forgotten, Kierran, who needs to get a message to his mother, Meghan, the Iron Queen. He needs to warn her of a vicious monster currently wrecking havoc in the Between.</span><br data-dcnode-id="4320"><br data-dcnode-id="4319"><img class="gr-hostedUserImg" data-dcnode-id="4318" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1613321477ra/30866091.gif&amp;raw"><br data-dcnode-id="4317"><br data-dcnode-id="4316"><span data-dcnode-id="4315" instrument_node="">When the monster does show its face, it is unlike anything Puck as ever encountered. He's injured during the confrontation, as is Puck's new friend, the lady's assassin, Nyx.</span><br data-dcnode-id="4314"><br data-dcnode-id="4313"><span data-dcnode-id="4312" instrument_node="">After seeking healing aide from a local goblin, Puck and Nyx set out together to find Meghan and engage her help with putting a stop to the monster's reign of terror.</span><br data-dcnode-id="4311"><br data-dcnode-id="4310"><img class="gr-hostedUserImg" data-dcnode-id="4309" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1613321477ra/30866092.gif&amp;raw"><br data-dcnode-id="4308"><br data-dcnode-id="4307"><span data-dcnode-id="4306" instrument_node="">I really enjoyed Puck as narrator. He is sarcastic and funny, even in the most dire of situations. He is also a character struggling with past hurts and negative aspects of his own personality. </span><br data-dcnode-id="4305"><br data-dcnode-id="4304"><span data-dcnode-id="4303" instrument_node="">I always love a quest. As a hodge-podge team of traveling companions are constructed, you just know that you are in for an action-packed good time. That was certainly the case here.</span><br data-dcnode-id="4302"><br data-dcnode-id="4301"><img class="gr-hostedUserImg" data-dcnode-id="4300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1473311617ra/20444651.gif&amp;raw"><br data-dcnode-id="4299"><br data-dcnode-id="4298"><span data-dcnode-id="4297" instrument_node="">Puck and Nyx are ultimately joined by Meghan, Ash, Coaleater and Grim, as they try to find out the truth behind the monster and what threatens the lands of the Fae.</span><br data-dcnode-id="4296"><br data-dcnode-id="4295"><span data-dcnode-id="4294" instrument_node="">They encounter some dangerous obstacles and a whole host of magical and mythical creatures along the way; all while trying to navigate their own interpersonal challenges.</span><br data-dcnode-id="4293"><br data-dcnode-id="4292"><img class="gr-hostedUserImg" data-dcnode-id="4291" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1549502825ra/27026813.gif&amp;raw"><br data-dcnode-id="4290"><br data-dcnode-id="4289"><span data-dcnode-id="4288" instrument_node="">I was completely swept up into this world. As always, Kagawa's character interactions stole the show for me. I love her dialogue and laughed out loud numerous times.</span><br data-dcnode-id="4287"><br data-dcnode-id="4286"><span data-dcnode-id="4285" instrument_node="">The ending is a compelling cliffhanger, leaving off with a prophecy that definitely let's the Reader know this adventure is far from over.</span><br data-dcnode-id="4284"><br data-dcnode-id="4283"><img class="gr-hostedUserImg" data-dcnode-id="4282" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1613321477ra/30866093.gif&amp;raw"><br data-dcnode-id="4281"><br data-dcnode-id="4280"><span data-dcnode-id="4279" instrument_node="">Thank you so much to the publisher, Inkyard Press, for providing me with a copy to read and and review.</span><br data-dcnode-id="4278"><br data-dcnode-id="4277"><span data-dcnode-id="4276" instrument_node="">I had so much fun with it and cannot wait for the next book to be released!!!</span><br data-dcnode-id="4275"><br data-dcnode-id="4274"><img class="gr-hostedUserImg" data-dcnode-id="4273" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1613321477ra/30866094.gif&amp;raw"></span><span data-dcnode-id="4271" instrument_node="">

</span><span data-dcnode-id="3845" id="freeTextContainer9663059221924050111"><b data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">FULL OF NOSTALGIA - LACKING IN ORIGINALITY</span></b><br data-dcnode-id="3848"><br data-dcnode-id="3847"><span data-dcnode-id="3846" instrument_node="">I always have and always will love The Iron Fey books. And I love Julie Kagawa for making this amazing universe filled with such great characters. And I definitely want her to keep writing books in this series as long as she has stories to tell. But that's the issue for me. This didn't feel like Kagawa had a story to tell. It didn't feel new or fresh to me. Finally we get Puck's story, but it just didn't do him the justice he deserves. It was definitely </span></span><span data-dcnode-id="3844" instrument_node="">
</span><span data-dcnode-id="3724" id="freeText9663059221924050111" style="display:none"><b data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">FULL OF NOSTALGIA - LACKING IN ORIGINALITY</span></b><br data-dcnode-id="3841"><br data-dcnode-id="3840"><span data-dcnode-id="3839" instrument_node="">I always have and always will love The Iron Fey books. And I love Julie Kagawa for making this amazing universe filled with such great characters. And I definitely want her to keep writing books in this series as long as she has stories to tell. But that's the issue for me. This didn't feel like Kagawa had a story to tell. It didn't feel new or fresh to me. Finally we get Puck's story, but it just didn't do him the justice he deserves. It was definitely not a bad book, don't get me wrong. It's just that I know that Kagawa is capable of so much more!</span><br data-dcnode-id="3838"><br data-dcnode-id="3837"><blockquote data-dcnode-id="3827"><span data-dcnode-id="3836" instrument_node="">
</span><b data-dcnode-id="3829"><span data-dcnode-id="3835" instrument_node="">
</span><i data-dcnode-id="3831"><span data-dcnode-id="3834" instrument_node="">"[...] my best laid plans always seem to backfire on me, so better not to have any to begin with."</span><br data-dcnode-id="3833"><span data-dcnode-id="3832" instrument_node="">- Puck</span></i><span data-dcnode-id="3830" instrument_node="">
</span></b><span data-dcnode-id="3828" instrument_node="">
</span></blockquote><br data-dcnode-id="3826"><br data-dcnode-id="3825"><b data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">👍 What I Liked 👍</span></b><br data-dcnode-id="3822"><br data-dcnode-id="3821"><u data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">Puck</span></u><span data-dcnode-id="3818" instrument_node="">: I will always love Puck! He is so full of mischief and fun, it's hard not to like him. Sometimes he walks the line between what's acceptable and what's not, but that's part of his charm. There were some aspects, however, of Puck's character that I did not enjoy in this book (see below) but I am still so happy that he finally gets a story of his own, because he definitely deserves that!</span><br data-dcnode-id="3817"><br data-dcnode-id="3816"><u data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">Nostalgia</span></u><span data-dcnode-id="3813" instrument_node="">: The nostalgia was definitely strong with this one. I was 19 or 20 when I read the original trilogy and I fell instantly in love. The characters, the universe, the magic - it ticks all my boxes. And I always enjoy a dose of nostalgia, which this book certainly delivered. We get back to the Nevernever and get to meet Grimalkin, Meghan, Kierran and Ash again. I think that was the highlight of this book for me.</span><br data-dcnode-id="3812"><br data-dcnode-id="3811"><b data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">👎 What I Disliked 👎</span></b><br data-dcnode-id="3808"><br data-dcnode-id="3807"><u data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">Repetition</span></u><span data-dcnode-id="3804" instrument_node="">: This word covers a lot of aspects of this book. First - Puck exhibits a lot of repetitive thought patterns that got quite old as the story went on. Second - the themes of this book seemed very repetitive of the themes in earlier books. I wanted this story to stretch and take me somewhere new. Sadly, that didn't happen.</span><br data-dcnode-id="3803"><br data-dcnode-id="3802"><u data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">Not far enough</span></u><span data-dcnode-id="3799" instrument_node="">: The whole book is such a tease. It built up to something that never happened. </span><a class="jsShowSpoiler spoilerAction" data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="3792" style="display: none"><span data-dcnode-id="3796" instrument_node="">[ All the way through, we see Puck reverting back to his former, darker self. We get a look inside his darkest thoughts and we see him lash out a couple of times. But he never actually goes all the way. They are all just thoughts in his head. He never acts on anything. </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="3793" instrument_node="">]</span></span><span data-dcnode-id="3791" instrument_node=""> So the entire buildup just fizzled into nothing, making a large part of this book feel unnecessary. </span><br data-dcnode-id="3790"><br data-dcnode-id="3789"><b data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">AN EXAMPLE OF HOW HYPOCRITICAL I CAN BE:</span></b><br data-dcnode-id="3786"><br data-dcnode-id="3785"><b data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">*Me, whenever Cassandra Clare releases a new Shadowhunter series*:</span></b><span data-dcnode-id="3782" instrument_node=""> Is that woman incapable of writing something original? Why doesn't she branch out and do something new? Stretch herself a bit?</span><br data-dcnode-id="3781"><br data-dcnode-id="3780"><b data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">*Me, whenever Julie Kagawa releases a new Iron Fey series*:</span></b><span data-dcnode-id="3777" instrument_node=""> OMG! I am so excited, I need this now!! 😍😍</span><br data-dcnode-id="3776"><br data-dcnode-id="3775"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="3774" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1443860647ra/16423061.gif&amp;raw" width="400"><br data-dcnode-id="3773"><br data-dcnode-id="3772"><b data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">Follow me for more book loving content!</span></b><br data-dcnode-id="3769"><a data-dcnode-id="3767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//majaholmelund.wixsite.com/bibliophiliadk" rel="nofollow noopener"><span data-dcnode-id="3768" instrument_node="">Blog</span></a><span data-dcnode-id="3766" instrument_node=""> ✨ </span><a data-dcnode-id="3764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/www.facebook.com/BibliophiliaDK" rel="nofollow noopener"><span data-dcnode-id="3765" instrument_node="">Facebook</span></a><span data-dcnode-id="3763" instrument_node=""> ✨ </span><a data-dcnode-id="3761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/bibliophiliadk/" rel="nofollow noopener"><span data-dcnode-id="3762" instrument_node="">Instagram</span></a><span data-dcnode-id="3760" instrument_node=""> ✨ </span><a data-dcnode-id="3758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/BibliophiliaDK" rel="nofollow noopener"><span data-dcnode-id="3759" instrument_node="">Twitter</span></a><span data-dcnode-id="3757" instrument_node=""> </span><br data-dcnode-id="3756"><a data-dcnode-id="3754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//majaholmelund.wixsite.com/bibliophiliadk/post/12-books-to-read-if-you-love-jane-austen" rel="nofollow noopener"><span data-dcnode-id="3755" instrument_node="">Blog Post: 15 Book </span><span data-dcnode-id="3624" id="freeTextContainer3917531308627702984"><span data-dcnode-id="3628" instrument_node="">I received this book for free in exchange for an honest review. This does not affect my opinion of the book or the content of my review.My opinion of this brand-new series will differ vastly from the many fans of the Iron Fey world. As you know based on my review of Shadow’s Legacy, I am an Iron Fey newbie so I am looking at this world through a fresh pair of eyes and by golly I had a wonderful experience.</span><br data-dcnode-id="3627"><br data-dcnode-id="3626"><span data-dcnode-id="3625" instrument_node="">The story followed the events in Shadow’s Legacy. The land of the Fey is at risk. Something</span></span><span data-dcnode-id="3623" instrument_node="">
</span><span data-dcnode-id="3591" id="freeText3917531308627702984" style="display:none"><span data-dcnode-id="3622" instrument_node="">I received this book for free in exchange for an honest review. This does not affect my opinion of the book or the content of my review.My opinion of this brand-new series will differ vastly from the many fans of the Iron Fey world. As you know based on my review of Shadow’s Legacy, I am an Iron Fey newbie so I am looking at this world through a fresh pair of eyes and by golly I had a wonderful experience.</span><br data-dcnode-id="3621"><br data-dcnode-id="3620"><span data-dcnode-id="3619" instrument_node="">The story followed the events in Shadow’s Legacy. The land of the Fey is at risk. Something ominous is lurking in the Shadows and it’s up to Robin Goodfellow aka Puck and his friends to find a solution to ending this threat. However, they will discover that ridding their kingdom of this threat would not be as easy as they thought.</span><br data-dcnode-id="3618"><br data-dcnode-id="3617"><span data-dcnode-id="3616" instrument_node="">I had a wonderful time interacting with the characters. Puck lived up to his name of being a prankster. He had many facets, and it was fun discovering them all. Fun, charming and entertaining. He had me laughing out around many times throughout the story. I loved how the author delved into his past. I learnt of his struggles in the past. How he loved and lost and how the sound of his name struck fear in others. </span><br data-dcnode-id="3615"><br data-dcnode-id="3614"><span data-dcnode-id="3613" instrument_node="">Nyx, a Forgotten moon elf, whom I had the pleasure of meeting in the prequel, was such a badass. Her memories of her past were bleak, but she never forgot her skills as an assassin and her allegiance to the Queen of the Forgotten. On learning the Queen was dead, her allegiance switched to protecting Keirran. Hence her purpose on this mission. Fearless, strong and determined, and the perfect match for Puck.</span><br data-dcnode-id="3612"><br data-dcnode-id="3611"><span data-dcnode-id="3610" instrument_node="">The supporting cast added their special blend of magic to the story. Grimalkin made my day. His actions and responses while it infuriated Puck had me laughing my head off.</span><br data-dcnode-id="3609"><br data-dcnode-id="3608"><span data-dcnode-id="3607" instrument_node="">Each character was dealing with their own personal struggles while trying to fight off the threat to the Fey kingdom.</span><br data-dcnode-id="3606"><br data-dcnode-id="3605"><span data-dcnode-id="3604" instrument_node="">Puck and Nyx may not have shared romantic moments, not that there was time available for such things. However, the sparks between them burned brightly. I am looking forward to see how their relationship progresses.</span><br data-dcnode-id="3603"><br data-dcnode-id="3602"><span data-dcnode-id="3601" instrument_node="">A fast-paced read, Iron Raven had me flipping the pages. It took me on a magical journey where danger abound in every corner.</span><br data-dcnode-id="3600"><br data-dcnode-id="3599"><span data-dcnode-id="3598" instrument_node="">I loved the world the author created and found myself completely caught up in it. I couldn’t get enough of it.</span><br data-dcnode-id="3597"><br data-dcnode-id="3596"><span data-dcnode-id="3595" instrument_node="">All in all this was a fabulous start to this new series. It was a great way for older fans to dive back into this awesome world and catch up with favourite characters. </span><br data-dcnode-id="3594"><a data-dcnode-id="3592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.totallyaddicted2reading.com/2021/02/reviews-shadows-legacy-and-iron-raven-by-julie-kagawa.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3593" instrument_node="">This review was originally posted on Totally Addicted to Reading</span></a></span><span data-dcnode-id="3590" instrument_node="">

</span><img class="gr-hostedUserImg" data-dcnode-id="3457" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1612730191i/30829109._SY540_.jpg&amp;raw" width="300"><span data-dcnode-id="3456" instrument_node="">
</span></blockquote><br data-dcnode-id="3454"><span data-dcnode-id="3453" instrument_node="">Julie Kagawa launches her new Fantasy YA series, Iron Fey: Evenfall with this tale of famous trickster and the beautiful fey assassin who has captured his attention. </span><br data-dcnode-id="3452"><blockquote data-dcnode-id="3448"><span data-dcnode-id="3451" instrument_node="">
</span><b data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node=""> “Fine. Sit down, get some popco</span></b></blockquote></span><span data-dcnode-id="3446" instrument_node="">
</span><span data-dcnode-id="3346" id="freeText1780290155830120503" style="display:none"><blockquote data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">HAPPY BOOK BIRTHDAY</span></blockquote><br data-dcnode-id="3443"><b data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">Facts: </span></b><span data-dcnode-id="3440" instrument_node=""> </span><i data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">The Iron Raven</span></i><span data-dcnode-id="3437" instrument_node=""> is book #1 of the </span><i data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">Iron Fey: Evenfall</span></i><span data-dcnode-id="3434" instrument_node=""> series by Julie Kagawa. This book is a spin-off of the Iron Fey series. It is told from </span><u data-dcnode-id="3432"><span data-dcnode-id="3433" instrument_node="">Puck’s point of view</span></u><span data-dcnode-id="3431" instrument_node=""> and ends with a </span><u data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">resolved ending</span></u><span data-dcnode-id="3428" instrument_node=""> an intro to the next book. Genres: </span><b data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">Fantasy Young Adult</span></b><span data-dcnode-id="3425" instrument_node=""> | </span><b data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">Folklore adaptation</span></b><span data-dcnode-id="3422" instrument_node=""> </span><br data-dcnode-id="3421"><blockquote data-dcnode-id="3417"><span data-dcnode-id="3420" instrument_node="">
</span><img class="gr-hostedUserImg" data-dcnode-id="3419" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1612730191i/30829109._SY540_.jpg&amp;raw" width="300"><span data-dcnode-id="3418" instrument_node="">
</span></blockquote><br data-dcnode-id="3416"><span data-dcnode-id="3415" instrument_node="">Julie Kagawa launches her new Fantasy YA series, Iron Fey: Evenfall with this tale of famous trickster and the beautiful fey assassin who has captured his attention. </span><br data-dcnode-id="3414"><blockquote data-dcnode-id="3406"><span data-dcnode-id="3413" instrument_node="">
</span><b data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node=""> “Fine. Sit down, get some popcorn, and I’ll tell you the sordid tale of how Robin Goodfellow grew a conscience. A long time ago,”</span></b><span data-dcnode-id="3410" instrument_node=""> I began in a grand voice,</span><b data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node=""> “in a galaxy far, far away… Wait, hold up. Wrong story. Lemme try that again.”</span></b><span data-dcnode-id="3407" instrument_node=""> ~ Puck</span></blockquote><br data-dcnode-id="3405"><span data-dcnode-id="3404" instrument_node="">The Nevernever is once again under threat. A powerful creature who is seemingly invincible is saturating the faeries with negative emotions and turning them in the mean versions of themselves. It is up to Puck and his new acquaintance Nyx, to warn the rulers of the Iron Realm and find a way to defeat this monster. </span><br data-dcnode-id="3403"><br data-dcnode-id="3402"><span data-dcnode-id="3401" instrument_node="">But even before their journey begins, the initial confrontation with the creature has changed Puck. Slowly, character traits from the cruel and vengeful persona he thought long dead begin to surface along with horns and hooves, and soon the fear inspiring Robin Goodfellow is breaking through. Can they defeat this creature before it affects the rest of Nevernever is a similar way? And will killing it bring the happy jokester back?</span><br data-dcnode-id="3400"><blockquote data-dcnode-id="3395"><span data-dcnode-id="3399" instrument_node="">
</span><b data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node=""> “No one likes a horny Robin Goodfellow.”</span></b><span data-dcnode-id="3396" instrument_node=""> ~ Puck</span></blockquote><br data-dcnode-id="3394"><span data-dcnode-id="3393" instrument_node="">The Iron Fey series, was one of those series I fell head over heels in love with when it first came out. I couldn’t get enough of it. I devoured every bit of it, and I couldn’t get enough of Ash and Megan like in “An Iron Fey Valentine,” and Puck was never far behind. I always wanted him to get his HEA. I appreciate this spin-off which is his long overdue story. </span><br data-dcnode-id="3392"><blockquote data-dcnode-id="3388"><span data-dcnode-id="3391" instrument_node="">
</span><img class="gr-hostedUserImg" data-dcnode-id="3390" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1612730840i/30829157._SY540_.jpg&amp;raw" width="300"><span data-dcnode-id="3389" instrument_node="">
</span></blockquote><br data-dcnode-id="3387"><span data-dcnode-id="3386" instrument_node="">The Iron Raven pulses with action and brilliant world building that leaps off the pages. I could picture magnificent Lord of the Rings like scenes with the deftly written descriptions of creatures and landscapes. But mostly, I reveled in getting to know Puck from his point of view. Fans of the Iron Fey had known the happy go lucky jester, but not all of his past nor the deep down emotional wounds he’s suffered. I loved how well Miss Kagawa developed his character and can’t wait to get to read more. </span><br data-dcnode-id="3385"><blockquote data-dcnode-id="3380"><span data-dcnode-id="3384" instrument_node="">
</span><b data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node=""> “Not getting killed by beautiful assassins is something I aspire to every day.” ~ Puck</span></b><span data-dcnode-id="3381" instrument_node="">
</span></blockquote><br data-dcnode-id="3379"><span data-dcnode-id="3378" instrument_node="">Of course, there are several other important characters like Nyx, a Forgotten moon elf and skilled assassin, bodyguard of Keirran, son of Ash and Megan, rulers of the Iron Realm. She’s smart, funny with her own sad backstory and perfect for Puck. And of course an Iron Fey story couldn’t be without the Iron Queen, Ice-boy and the infamous Grimalkin.</span><br data-dcnode-id="3377"><br data-dcnode-id="3376"><span data-dcnode-id="3375" instrument_node="">By the numbers quick review:</span><br data-dcnode-id="3374"><span data-dcnode-id="3373" instrument_node="">World building: 💌💌💌💌💌++</span><br data-dcnode-id="3372"><span data-dcnode-id="3371" instrument_node="">Character development: 👤👤👤👤👤++</span><br data-dcnode-id="3370"><span data-dcnode-id="3369" instrument_node="">Plot: 📚📚📚📚📚</span><br data-dcnode-id="3368"><span data-dcnode-id="3367" instrument_node="">Romance: 💕💕💕</span><br data-dcnode-id="3366"><span data-dcnode-id="3365" instrument_node="">Rating: 5</span><br data-dcnode-id="3364"><br data-dcnode-id="3363"><span data-dcnode-id="3362" instrument_node="">Amazon -&gt; </span><a data-dcnode-id="3360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3cYMqKD" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3361" instrument_node="">https://amzn.to/3cYMqKD</span></a><br data-dcnode-id="3359"><br data-dcnode-id="3358"><span data-dcnode-id="3357" instrument_node="">★ I was given an ARC of this book courtesy of the author via NetGalley. The excerpts are from that copy. I am voluntarily reviewing this title. ★</span><br data-dcnode-id="3356"><br data-dcnode-id="3355"><a data-dcnode-id="3353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/Tjlovestoread/" rel="nofollow noopener"><span data-dcnode-id="3354" instrument_node="">Stalk me on FaceBook</span></a><span data-dcnode-id="3352" instru </span><span data-dcnode-id="3019" id="freeText14203314466751716759" style="display:none"><span data-dcnode-id="3032" instrument_node="">It has been a while since I've ran into Robin Goodfellow. So I was very excited to dive into </span><i data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">The Iron Raven</span></i><span data-dcnode-id="3029" instrument_node="">. Especially since it has been on my TBR for a year - exactly a year. After diving into this, I'll admit that things were okay. I liked seeing everyone from Julie's previous series but I was also really worried about Robin and the world.</span><br data-dcnode-id="3028"><br data-dcnode-id="3027"><span data-dcnode-id="3026" instrument_node="">The darkness throughout this definitely kept everyone on their toes - including me. I just kept hoping things were going to get better and that Robin would fight the evil that was lurking within him. It helped that the people who knew him the best could easily see that something was different about him. </span><br data-dcnode-id="3025"><br data-dcnode-id="3024"><span data-dcnode-id="3023" instrument_node="">I also really liked getting to meet Nyx in this. She definitely brought something different to the story and the world. I can't wait for their next adventure since Meghan's kid is now missing. I'm excited for the sequel but hate waiting at the same time. </span><br data-dcnode-id="3022"><br data-dcnode-id="3021"><span data-dcnode-id="3020" instrument_node="">So, in the end, I guess I'll just keep twiddling my thumbs until the next book lands in my lap.</span></span><span data-dcnode-id="3018" instrument_node="">

</span><span data-dcnode-id="2760" id="freeTextContainer896699688336436388"><blockquote data-dcnode-id="2763"><span data-dcnode-id="2767" instrument_node=""> </span><b data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node=""> "I smile, because it's either that or get vindictive. And no one likes me when I'm vindictive." </span></b><span data-dcnode-id="2764" instrument_node=""> </span></blockquote><br data-dcnode-id="2762"><span data-dcnode-id="2761" instrument_node="">In the original series, Puck was by far my favorite and I was so excited to hear his story. When I opened this book and started reading, I was thrilled. Young Robin Goodfellow. Nice, a story from the past. Awesome. And then... Then the story was told in the years after every other book Julie Kagawa wrote about this world and I practically started living for the flashbacks into the past. Those were </span></span><span data-dcnode-id="2759" instrument_node="">
</span><span data-dcnode-id="2743" id="freeText896699688336436388" style="display:none"><blockquote data-dcnode-id="2754"><span data-dcnode-id="2758" instrument_node=""> </span><b data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node=""> "I smile, because it's either that or get vindictive. And no one likes me when I'm vindictive." </span></b><span data-dcnode-id="2755" instrument_node=""> </span></blockquote><br data-dcnode-id="2753"><span data-dcnode-id="2752" instrument_node="">In the original series, Puck was by far my favorite and I was so excited to hear his story. When I opened this book and started reading, I was thrilled. Young Robin Goodfellow. Nice, a story from the past. Awesome. And then... Then the story was told in the years after every other book Julie Kagawa wrote about this world and I practically started living for the flashbacks into the past. Those were amazing! But the actual story and what it did to Puck... </span><a class="jsShowSpoiler spoilerAction" data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="2745" style="display: none"><span data-dcnode-id="2749" instrument_node="">[Not that we saw much of him, it was evil Robin Goodfellow that the beast turned him into all the way and while I liked him in the flashbacks, he didn't click with the present, for me at least. Yes, he needed to work through stuff and let all that past go but still. </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="2746" instrument_node="">]</span></span><span data-dcnode-id="2744" instrument_node=""> And this book brought characters back into the fold that I had completely forgotten about because I didn't care in the previous books, so for me personally, this wasn't the book I was hoping for but this is what happens when you have high expectiations. Sometimes they're too high. I can still see that Julie Kagawa has once again written something truly amazing, I just wasn't in the right mindset for it. Plus, I felt like this was just one long prologue/introduction to what comes next, I don't know if that was just me...</span></span><span data-dcnode-id="2742" instrument_node="">

                    </span><a data-dcnode-id="2628" href="#" onclick="Effect.toggle('reviewTextContainer3552264778'); return false;"><span data-dcnode-id="2629" instrument_node="">click here.</span></a><span data-dcnode-id="2627" instrument_node="">

</span><span class="readable" data-dcnode-id="2560" id="reviewTextContainer3552264778" style="display:none"><span data-dcnode-id="2624" instrument_node="">
</span><span data-dcnode-id="2619" id="freeTextContainer11886655497432204450"><span data-dcnode-id="2623" instrument_node="">For fans of Julie’ Kagawa’s Iron Fey series, reading Iron Raven feels like returning home. She has honored the Iron Fey world and kicked it into high gear with an epic journey of friendship and loyalty foreshadowed by darker notes of jealousy and revenge. </span><br data-dcnode-id="2622"><br data-dcnode-id="2621"><span data-dcnode-id="2620" instrument_node="">In Iron Raven, Robin Goodfellow- affectionately known as Puck, is in the driver’s seat, and boy does he take us for a ride. As an avid fan of the series, I think I speak for all of us when I say- FINALLY !!! Puck has been a constant fan favorit</span></span><span data-dcnode-id="2618" instrument_node="">
</span><span data-dcnode-id="2565" id="freeText11886655497432204450" style="display:none"><span data-dcnode-id="2617" instrument_node="">For fans of Julie’ Kagawa’s Iron Fey series, reading Iron Raven feels like returning home. She has honored the Iron Fey world and kicked it into high gear with an epic journey of friendship and loyalty foreshadowed by darker notes of jealousy and revenge. </span><br data-dcnode-id="2616"><br data-dcnode-id="2615"><span data-dcnode-id="2614" instrument_node="">In Iron Raven, Robin Goodfellow- affectionately known as Puck, is in the driver’s seat, and boy does he take us for a ride. As an avid fan of the series, I think I speak for all of us when I say- FINALLY !!! Puck has been a constant fan favorite with his sharp mind, outrageous antics, and the uncanny ability to always be in trouble or causing it !</span><br data-dcnode-id="2613"><br data-dcnode-id="2612"><i data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">“You know me. The impossible has a nasty habit of landing right in my lap. The same goes for any type of curse, disaster, bad luck or calamity. I’m a trouble magnet- one of the perks of being me.” </span></i><br data-dcnode-id="2609"><br data-dcnode-id="2608"><span data-dcnode-id="2607" instrument_node="">The root of his magic and the man himself has always intrigued me so it was insightful to get Puck’s perspective from the beginning of a lot of pivotal moments in his life; how King Oberon seduced him with the promise of power, the beginning of a friendship with a certain prince, and exactly how he got himself entangled in all the courts of Faerie. </span><br data-dcnode-id="2606"><br data-dcnode-id="2605"><span data-dcnode-id="2604" instrument_node="">Julie Kagawa masterfully handled Puck in Iron Raven by going after the one thing that’s greater than his magical ability- his EGO. The poetic justice was too sweet as Puck, the famous trickster of all realms, whose reputation always proceeds him, encounters a wickedly dangerous primordial who has never heard of him. </span><br data-dcnode-id="2603"><br data-dcnode-id="2602"><i data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">“She stared right back at me, unafraid of me, my name oy my reputation… my mouth went dry as this deadly confident beautiful assassin held my gaze without fear."</span></i><br data-dcnode-id="2599"><br data-dcnode-id="2598"><span data-dcnode-id="2597" instrument_node="">In the world of Fey, none can manipulate Glamour like Puck. Many know him for his legendary feats but few know how close each of those daredevil acts could have been his last. This new danger in “The Between” forces Puck to take a long hard look at the life he’s lived and forces him to face every deep dark emotion he’s long kept buried. </span><br data-dcnode-id="2596"><br data-dcnode-id="2595"><span data-dcnode-id="2594" instrument_node="">Readers get to be a voyager in the life of "Puck of old"- and experience his cold, unfeeling, and emotionless past. For this Puck, old feelings die hard, and we see true how the enmity of the Iron Fey lives strong even in the most neutral of places. </span><br data-dcnode-id="2593"><br data-dcnode-id="2592"><span data-dcnode-id="2591" instrument_node="">While it got pretty heavy, I knew without a doubt Puck would be there with his trademark humor and sarcasm. I also appreciated that we finally got to address the elephant in the room i.e. the love triangle. In my opinion, Puck is the bravest of them all to have loved, lost, and loved again. </span><br data-dcnode-id="2590"><br data-dcnode-id="2589"><i data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">“Ash had gone to the end of the world to be with Meghan. But I had gone to the End of the World for her too. Because I’d love her and I wanted her to be happy, even if it wasn’t with me."</span></i><br data-dcnode-id="2586"><br data-dcnode-id="2585"><span data-dcnode-id="2584" instrument_node="">Iron Raven picks off from the last novel so expect to see some fan-favorites such as Grimalkin, Ash, Meghan as they join forces to save the “Between” and the NeverNever from certain doom! </span><br data-dcnode-id="2583"><br data-dcnode-id="2582"><span data-dcnode-id="2581" instrument_node="">As much as I enjoyed the book and cannot wait for the sequel, there were certain aspects that were sore points for me. While I appreciate the importance of the overall story and it’s many intricate layers, the inclusion of copious amounts of supernatural from Gargoyle to Fae troll, Nature Folk, and Lightning horses was a LOTTT to keep up with. </span><br data-dcnode-id="2580"><br data-dcnode-id="2579"><span data-dcnode-id="2578" instrument_node="">I love Julie Kagawa and her style of writing but it did feel slightly monotonous as there were multiple scenes depicting, “Something dark had descended and turned normally peaceful creatures vengeful.” Then at about 80% of the book, they encounter a mysterious dark and make a decision to investigate it ( I honestly thought that’s what they were doing for the entire book before ????? )</span><br data-dcnode-id="2577"><br data-dcnode-id="2576"><span data-dcnode-id="2575" instrument_node="">My last pain point was the character of Nyx and her compatibility with Puck. When a character as grand and epic as Puck finds his lady love, after all his trials and tribulations and heartache, it needs to be dynamite!!!!!!!! She needs to be freaking legendary and for me personally, I found their interactions needed more strength and passion. While I have my concerns on whether she can live up to the legend of Puck, I look forward to seeing how their relationship progresses. </span><br data-dcnode-id="2574"><br data-dcnode-id="2573"><span data-dcnode-id="2572" instrument_node="">Despite these minor details, Iron Raven did Puck proud and I am so happy to see some self-growth on his behalf. As an immortal, it may be impossible to forget but that’s where the beauty of forgiveness comes in. </span><br data-dcnode-id="2571"><br data-dcnode-id="2570"><span data-dcnode-id="2569" instrument_node="">I know this doesn’t need to be said but in true Julie Kagawa fashion, we end with the MOTHER of all cliffhangers. I would definitely recommend Iron Raven and are keen to see how the groundwork for the inevitable “Evenfall” progress in future novels. </span><br data-dcnode-id="2568"><br data-dcnode-id="2567"><span data-dcnode-id="2566" instrument_node="">A huge thank you to Edelweiss for providing me with an arc of Iron Raven, all views and opinions expressed above are my own.</span></span><span data-dcnode-id="2564" instrument_node="">
