</span><span data-dcnode-id="2463" id="freeTextContainer4817623416686274960"><b data-dcnode-id="2474"><span data-dcnode-id="2478" instrument_node="">
</span><i data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">"I felt a tiny prick of gleeful satisfaction. There was so much I hadn't done in many, many years; maybe it was time to remind everyone, Iron Fey included, why Robin Goodfellow was a faery you did not want to cross."</span></i><span data-dcnode-id="2475" instrument_node="">
</span></b><br data-dcnode-id="2473"><br data-dcnode-id="2472"><span data-dcnode-id="2471" instrument_node="">Julie Kagawa has done it AGAIN.</span><br data-dcnode-id="2470"><br data-dcnode-id="2469"><span data-dcnode-id="2468" instrument_node=""> </span><img alt="description" class="gr-hostedUserImg" data-dcnode-id="2467" height="205" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1612121003ra/30789572.gif&amp;raw" width="330"><br data-dcnode-id="2466"><br data-dcnode-id="2465"><span data-dcnode-id="2464" instrument_node="">I am so giddy, because The Iron Raven was just perfection. We get to go back to the world of the Iron Fey, meet up with all of our favorite characters, explore some old hurts, meet new interesting characters, and FURTHER explore this magical world.</span></span><span data-dcnode-id="2462" instrument_node="">
</span><span data-dcnode-id="2422" id="freeText4817623416686274960" style="display:none"><b data-dcnode-id="2457"><span data-dcnode-id="2461" instrument_node="">
</span><i data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">"I felt a tiny prick of gleeful satisfaction. There was so much I hadn't done in many, many years; maybe it was time to remind everyone, Iron Fey included, why Robin Goodfellow was a faery you did not want to cross."</span></i><span data-dcnode-id="2458" instrument_node="">
</span></b><br data-dcnode-id="2456"><br data-dcnode-id="2455"><span data-dcnode-id="2454" instrument_node="">Julie Kagawa has done it AGAIN.</span><br data-dcnode-id="2453"><br data-dcnode-id="2452"><span data-dcnode-id="2451" instrument_node=""> </span><img alt="description" class="gr-hostedUserImg" data-dcnode-id="2450" height="205" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1612121003ra/30789572.gif&amp;raw" width="330"><br data-dcnode-id="2449"><br data-dcnode-id="2448"><span data-dcnode-id="2447" instrument_node="">I am so giddy, because The Iron Raven was just perfection. We get to go back to the world of the Iron Fey, meet up with all of our favorite characters, explore some old hurts, meet new interesting characters, and FURTHER explore this magical world.</span><br data-dcnode-id="2446"><br data-dcnode-id="2445"><span data-dcnode-id="2444" instrument_node="">From the bottom of my heart, thank you for </span><s data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">not sucking</span></s><span data-dcnode-id="2441" instrument_node=""> exceeding expectations.</span><br data-dcnode-id="2440"><br data-dcnode-id="2439"><span data-dcnode-id="2438" instrument_node="">🗡️ PUCK was SO much fun to read about! I love that he becomes more than just the jester, or Meghan's best friend/romance rival to Ash. There is still resentment that Puck has to deal with, but that only makes him human and I appreciated that we get to see him work through his emotions and get to the bottom of them. Puck's descent into wickedness allows Julie Kagawa to explore not only the good side of Puck, but the way he used to be the feared Robin Goodfellow.</span><br data-dcnode-id="2437"><br data-dcnode-id="2436"><span data-dcnode-id="2435" instrument_node="">The Iron Raven also works to flesh out the world of the Fey, and showcases Puck's past. There are stories set in the past that speak to Puck's evolution from Robin Goodfellow to Puck, and I enjoyed every single one of them. Specially, the one about when Puck met Ash. I am a total Ash fan, but even I can admit this is the story in which Puck shines leaving Ash in the background (as it should be) while still bringing back the old scooby gang. We get to tour the Iron Realm as it stands today (lots of bug contraptions), and even re-visit some old haunts. I love the descriptions of the different Fey and how distinct they are--I like to picture the forgotten as the Heartless from KH, and the Iron Fey (while being superior in every way) still manage to be kind/weird/quirky in true Meghan fashion.</span><br data-dcnode-id="2434"><br data-dcnode-id="2433"><span data-dcnode-id="2432" instrument_node="">Yeah that's right, we get to hang out with Meghan again! We also see Ash, Kierran (briefly--he is much less ROMEO in this one and much more badass), and Grimalkin. I also loved the new characters! Nyx, a forgotten who used to protect The Lady, awoken from her slumber, an assassin with a tragic past, and Coaleater, a descendant from Iron Horse who serves to be the tank of the group. </span><br data-dcnode-id="2431"><br data-dcnode-id="2430"><span data-dcnode-id="2429" instrument_node="">All in all Julie Kagawa managed to create an RPG team out of the group: Puck (the bard), Meghan (the dark mage), Ash (the swordsman), Nix (the assassin), Coaleater (the tank), and Grim... the know it all? He doesn't fight so he really doesn't count.</span><br data-dcnode-id="2428"><br data-dcnode-id="2427"><span data-dcnode-id="2426" instrument_node="">The new baddie is interesting and brings new life unto the world. The characters are a joy to return to, the world is further expanded and fun to explore, Puck is both his worst self and his best self and I enjoyed getting to read about both sides of him. I think we got a winner and I can't wait for the sequel!</span><br data-dcnode-id="2425"><br data-dcnode-id="2424"><span data-dcnode-id="2423" instrument_node="">PS; I find it funny this story can still be classified as YA--no explicit scenes-but all the characters are like eternal Fae that got stuck as teenagers somehow. Golden.</span></span><span data-dcnode-id="2421" instrument_node="">

</span><span data-dcnode-id="2330" id="freeText7790026018880867148" style="display:none"><span data-dcnode-id="2333" instrument_node="">i was lucky to review an ARC for this book from ink yard press and i really enjoyed it. ALL OPINIONS ARE MY OWN.</span><br data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node="">The Iron Raven series is the first book in the spinoff series to the Iron King series. you don’t have to read one to understand the other but I encourage it. This takes place in the point of view of Robin Goodfellow- basically the famous prankster in all the the realms. He journeys with new found friends and old to track down a monster that’s been wreaking havoc in the world of the fey. characters from the iron King series do show up in this book. Reading this from Robin’s point of view was very interesting. He’s funny, brave, and relatable. i think my favorite part of this book were the characters. We get introduced to a new character Nyx, killer badass assassin. Robin and Nyx’s flirtatious banter was enjoyable. Overall great start to the new spin off series. I’ll admit some parts were slow and there could’ve been more world building. This was very fun to read! Can’t wait for book 2!</span></span><span data-dcnode-id="2329" instrument_node="">

</span><span data-dcnode-id="2157" id="freeTextContainer11304774485841108890"><span data-dcnode-id="2166" instrument_node="">The nostalgia was strong with this one. As I'm sure many readers will be able to relate to, I read the og Iron Fey books yearrrssss ago and I loved them.</span><br data-dcnode-id="2165"><br data-dcnode-id="2164"><img class="gr-hostedUserImg" data-dcnode-id="2163" height="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1611849927ra/30773215.gif&amp;raw" width="600"><br data-dcnode-id="2162"><br data-dcnode-id="2161"><br data-dcnode-id="2160"><br data-dcnode-id="2159"><span data-dcnode-id="2158" instrument_node="">I was pretty excited for Puck finally getting his time in the spotlight but I had yet to read the trilogy between the two with Ethan and Keirran so I quickly tried to fit those in before starting this one. I'm glad I did as it filled in many gaps. Kagawa does a fine job breifly recapping so you won't be lost if you haven't read them but the expe</span></span><span data-dcnode-id="2156" instrument_node="">
</span><span data-dcnode-id="2076" id="freeText11304774485841108890" style="display:none"><span data-dcnode-id="2155" instrument_node="">The nostalgia was strong with this one. As I'm sure many readers will be able to relate to, I read the og Iron Fey books yearrrssss ago and I loved them.</span><br data-dcnode-id="2154"><br data-dcnode-id="2153"><img class="gr-hostedUserImg" data-dcnode-id="2152" height="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1611849927ra/30773215.gif&amp;raw" width="600"><br data-dcnode-id="2151"><br data-dcnode-id="2150"><br data-dcnode-id="2149"><br data-dcnode-id="2148"><span data-dcnode-id="2147" instrument_node="">I was pretty excited for Puck finally getting his time in the spotlight but I had yet to read the trilogy between the two with Ethan and Keirran so I quickly tried to fit those in before starting this one. I'm glad I did as it filled in many gaps. Kagawa does a fine job breifly recapping so you won't be lost if you haven't read them but the experience is always going to be much fuller if you do. I did find with Ethan's books as well as this one, I may have outgrown these novels.</span><br data-dcnode-id="2146"><br data-dcnode-id="2145"><img class="gr-hostedUserImg" data-dcnode-id="2144" height="281" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1611849927ra/30773209.gif&amp;raw" width="498"><br data-dcnode-id="2143"><br data-dcnode-id="2142"><br data-dcnode-id="2141"><br data-dcnode-id="2140"><span data-dcnode-id="2139" instrument_node="">While they are still good to me and have that same general feel to them that I remember from the original books, I'm not the same reader I suppose. I think it's such a fine line to walk when trying to recreate nostalgic magic with your original readers and alao stay within the same age group perimeters of the original story, it's now attempting to pander to two very different audiences and it can be really tough to do. I think I came in hoping for Cobra Kai.</span><br data-dcnode-id="2138"><br data-dcnode-id="2137"><img class="gr-hostedUserImg" data-dcnode-id="2136" height="280" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1611849927ra/30773211.gif&amp;raw" width="498"><br data-dcnode-id="2135"><br data-dcnode-id="2134"><span data-dcnode-id="2133" instrument_node="">I wanted the same cheesy young nostalgia from the original but with some juicy adult humor/story thrown in too and while it definitely delivered on the nostalgia end, the other end was missing and I felt that lost piece. I wanted a bit of the story or characters to have grown with me too. And while many years have passed in the story I just didn't feel like anything much had matured along with the passing of time and that was a let down to me.</span><br data-dcnode-id="2132"><br data-dcnode-id="2131"><img class="gr-hostedUserImg" data-dcnode-id="2130" height="277" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1611849927ra/30773213.gif&amp;raw" width="498"><br data-dcnode-id="2129"><br data-dcnode-id="2128"><br data-dcnode-id="2127"><br data-dcnode-id="2126"><span data-dcnode-id="2125" instrument_node="">Ultimately it made it slower going for me to get through because I wasn't as excited to keep picking it up. I'm a total mood reader though and I've been juggling this one with non-fiction political science books so that heavy contrast and my mood could definitely play a part in my feelings towards it currently as well. Things didn't really pick up for me until the last 30% or so. Once Puck met up with Meghan and Ash I found I enjoyed it more. I love Puck though so it was kinda disappointing that it took the trio to make me actually invest in the story.</span><br data-dcnode-id="2124"><br data-dcnode-id="2123"><strong data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Some of the things I did enjoy: </span></strong><br data-dcnode-id="2120"><br data-dcnode-id="2119"><img class="gr-hostedUserImg" data-dcnode-id="2118" height="248" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1611849927ra/30773212.gif&amp;raw" width="387"><br data-dcnode-id="2117"><br data-dcnode-id="2116"><br data-dcnode-id="2115"><span data-dcnode-id="2114" instrument_node="">• More backstory from Puck.</span><br data-dcnode-id="2113"><span data-dcnode-id="2112" instrument_node="">• Meghan and Ash scenes.</span><br data-dcnode-id="2111"><span data-dcnode-id="2110" instrument_node="">• Being back in the NeverNever</span><br data-dcnode-id="2109"><span data-dcnode-id="2108" instrument_node="">• The final battle when Puck brought his special brand of fun and levity which was sorely lacking throughout most of the book (but at least it was for a good reason).</span><br data-dcnode-id="2107"><br data-dcnode-id="2106"><strong data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Things I found lacking: </span></strong><br data-dcnode-id="2103"><br data-dcnode-id="2102"><img class="gr-hostedUserImg" data-dcnode-id="2101" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1611849927ra/30773214.gif&amp;raw" width="244"><br data-dcnode-id="2100"><span data-dcnode-id="2099" instrument_node="">• Story/character maturity.</span><br data-dcnode-id="2098"><span data-dcnode-id="2097" instrument_node="">• Chemistry between Puck and Nyx.</span><br data-dcnode-id="2096"><span data-dcnode-id="2095" instrument_node="">• Puck's ability to be a compelling MC on his own *at least in regards to this novel*.</span><br data-dcnode-id="2094"><br data-dcnode-id="2093"><span data-dcnode-id="2092" instrument_node="">All in all I suppose I am curious to know what happens next but I'm not quite sure yet if it is enough to actually pick up the next book or not. I might end up waiting to see how others feel after reading the next one before I make that decision.</span><br data-dcnode-id="2091"><br data-dcnode-id="2090"><img class="gr-hostedUserImg" data-dcnode-id="2089" height="396" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1611849927ra/30773210.gif&amp;raw" width="498"><br data-dcnode-id="2088"><br data-dcnode-id="2087"><br data-dcnode-id="2086"><br data-dcnode-id="2085"><span data-dcnode-id="2084" instrument_node="">I would definitely recommend this one to young readers, it is still a good story, but for people like me that mostly aged out of middle grade/teen type books I wouldn't go in expecting any more than just that or you will likely be disappointed.</span><br data-dcnode-id="2083"><br data-dcnode-id="2082"><strong data-dcnode-id="2077"><span data-dcnode-id="2081" instrument_node="">
</span><em data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">I received an arc of this book from Inkyard Press via Netgalley and this is my honest review. </span></em><span data-dcnode-id="2078" instrument_node="">

</span><span data-dcnode-id="1847" id="freeTextContainer17259030190909990051"><b data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Immediate thoughts when finishing the book:</span></b><span data-dcnode-id="1863" instrument_node=""> Why Julie?? Why do you always do this to me??</span><br data-dcnode-id="1862"><br data-dcnode-id="1861"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1860" height="275" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1629905935ra/31831238.gif&amp;raw" width="400"><br data-dcnode-id="1859"><br data-dcnode-id="1858"><span data-dcnode-id="1857" instrument_node="">Welcome to Puck's world. And can I say finally? Puck has been a constant force in the </span><i data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Iron Fey</span></i><span data-dcnode-id="1854" instrument_node=""> series, but always as a side character. During this time you can see that there is so much to this character, but Kagawa only ever gave us the bare minimum. Well not anymore. Puck finally get his own series and I couldn't be happier. </span><br data-dcnode-id="1853"><br data-dcnode-id="1852"><span data-dcnode-id="1851" instrument_node="">This series takes place after the </span><i data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">Call of the Forgotten</span></i><span data-dcnode-id="1848" instrument_node=""> series so I do recommend r</span></span><span data-dcnode-id="1846" instrument_node="">
</span><span data-dcnode-id="1820" id="freeText17259030190909990051" style="display:none"><b data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Immediate thoughts when finishing the book:</span></b><span data-dcnode-id="1843" instrument_node=""> Why Julie?? Why do you always do this to me??</span><br data-dcnode-id="1842"><br data-dcnode-id="1841"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1840" height="275" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.gr-assets.com/hostedimages/1629905935ra/31831238.gif&amp;raw" width="400"><br data-dcnode-id="1839"><br data-dcnode-id="1838"><span data-dcnode-id="1837" instrument_node="">Welcome to Puck's world. And can I say finally? Puck has been a constant force in the </span><i data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Iron Fey</span></i><span data-dcnode-id="1834" instrument_node=""> series, but always as a side character. During this time you can see that there is so much to this character, but Kagawa only ever gave us the bare minimum. Well not anymore. Puck finally get his own series and I couldn't be happier. </span><br data-dcnode-id="1833"><br data-dcnode-id="1832"><span data-dcnode-id="1831" instrument_node="">This series takes place after the </span><i data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Call of the Forgotten</span></i><span data-dcnode-id="1828" instrument_node=""> series so I do recommend reading the main series + the first spinoff to get a basis of what's going on. As per usual, there's a new threat in the Nevernever that requires our gang to get back together and trek through the unknown to save the day. A lot of faves are back here and I just reveled in it. But we also got to know some new characters and I enjoyed the expansion of the world. </span><br data-dcnode-id="1827"><br data-dcnode-id="1826"><span data-dcnode-id="1825" instrument_node="">What's interesting about this new monster is what he brings out in everyone. Wherever this monster goes, aggression and anger follow. Once normally calm fey are now starting fights. It's even affecting our own Puck. I'll be honest, it was really hard to be in his head for most of this book because there was just so much anger and hostility. We all know what happened between him and Ash - and even him and Meghan - but here we get to really delve into how Puck felt about it and how it's still affecting him. He's always one with a smile but no one ever knows what's going on inside. And let me tell you, there's a lot going on inside. </span><br data-dcnode-id="1824"><br data-dcnode-id="1823"><span data-dcnode-id="1822" instrument_node="">It was really hard to read his internal struggle with emotions. Especially in the scenes with Ash and Meghan. My heart just hurts for all the pain this trio has gone through. But can we talk about that cliffhanger ending? I don't know why Julie dislikes us so. It's just mean. </span><br data-dcnode-id="1821"></span><span data-dcnode-id="1819" instrument_node="">

</span><span data-dcnode-id="1728" id="freeTextContainer1967917784345516740"><span data-dcnode-id="1733" instrument_node="">Updated February 18, 2021:</span><br data-dcnode-id="1732"><span data-dcnode-id="1731" instrument_node="">The Iron Raven</span><br data-dcnode-id="1730"><span data-dcnode-id="1729" instrument_node="">The Iron Raven is amazing, fun, and exciting. Legendary Robin Goodfellow aka Puck, King Oberon’s righthand jester has many legends only now gets to tell his story as he faces a new threat from a time before Faery began, himself. With the help of the Iron Queen and her prince consort and allies both old and new by his side, Puck begins a thrilling but also dangerous adventure. Evenfall is coming and with it a judgement that not even their combined powers or</span></span><span data-dcnode-id="1727" instrument_node="">
</span><span data-dcnode-id="1685" id="freeText1967917784345516740" style="display:none"><span data-dcnode-id="1726" instrument_node="">Updated February 18, 2021:</span><br data-dcnode-id="1725"><span data-dcnode-id="1724" instrument_node="">The Iron Raven</span><br data-dcnode-id="1723"><span data-dcnode-id="1722" instrument_node="">The Iron Raven is amazing, fun, and exciting. Legendary Robin Goodfellow aka Puck, King Oberon’s righthand jester has many legends only now gets to tell his story as he faces a new threat from a time before Faery began, himself. With the help of the Iron Queen and her prince consort and allies both old and new by his side, Puck begins a thrilling but also dangerous adventure. Evenfall is coming and with it a judgement that not even their combined powers or wit can vanquish as a shadow falls over Faery and the world slowly slips into chaos. The Iron Raven is filled with action, adventure, danger and a bit of romance.</span><br data-dcnode-id="1721"><br data-dcnode-id="1720"><span data-dcnode-id="1719" instrument_node="">Robin Goodfellow/Puck enjoys life especially pulling a prank or two wherever he is at in the Nevernever or in the Human World. When Keirann, King of the Forgotten asks him for help when the Forgotten begin to act strangely thanks to a new fey that changes other faerie’s emotions. To warn the courts against this new threat, Puck and Nyx travel to meet with Meghan, the Iron Queen. To find out what is causing the change in both Puck and other Fey, Puck, Nyx, Meghan and Ash travel with the guidance of Grim.</span><br data-dcnode-id="1718"><br data-dcnode-id="1717"><span data-dcnode-id="1716" instrument_node="">During their journey, Puck’s transformation has taken a toll on his mind, reverting back to a dark side of himself that could put others in danger. The group encounters yet another prophecy involving their new enemy and just want this new threat could mean for everyone and the Nevernever. Puck’s inner struggle due to his transformation is also torn between his growing emotions for Nyx. As the group continues to find and learn more about their new enemy, what they discover is far worse than they expect.</span><br data-dcnode-id="1715"><br data-dcnode-id="1714"><span data-dcnode-id="1713" instrument_node="">There is so much about this book I love that I don’t know where to begin. First off, we get to learn about Puck’s past of before he became Oberon’s jester and the life before he met Ash and Meghan, the good and the bad. We get to see his inner struggles, emotions and his past which is more than what I expected to learn and his relationships with Ash and Meghan. It was also so great to see one of my favorite trios back together. One more thing that really popped out was his growing relationship with Nyx. *squeal* I have high hopes for this. </span><br data-dcnode-id="1712"><br data-dcnode-id="1711"><span data-dcnode-id="1710" instrument_node="">Overall, The Iron Raven was incredible. I am jumping in excitement. The Iron Fey series is one of my favorites and love that we get more books, more of my favorite characters and more of this world. Puck has always been one of my favorite characters of the Iron Fey series next to Grim and now he gets his own series. The ending left me excited and eager for the next book.</span><br data-dcnode-id="1709"><br data-dcnode-id="1708"><span data-dcnode-id="1707" instrument_node="">Updated June 22, 2020:</span><br data-dcnode-id="1706"><span data-dcnode-id="1705" instrument_node="">It has a cover!</span><br data-dcnode-id="1704"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="1703" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1592841853i/29687886._SY540_.jpg&amp;raw" width="200"><br data-dcnode-id="1702"><br data-dcnode-id="1701"><span data-dcnode-id="1700" instrument_node="">I want it!</span><br data-dcnode-id="1699"><img </span><span data-dcnode-id="1582" id="freeText11663101096293907900" style="display:none"><a data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenerddaily.com/review-the-iron-raven-by-julie-kagawa/" rel="nofollow noopener"><span data-dcnode-id="1596" instrument_node="">Originally published on The Nerd Daily</span></a><span data-dcnode-id="1594" instrument_node=""> | Review by Ellie King</span><br data-dcnode-id="1593"><br data-dcnode-id="1592"><span data-dcnode-id="1591" instrument_node="">The Iron Raven is the first book in a new spin-off of The Iron Fey series by New York Times bestselling author, Julie Kagawa and for fans of The Iron Fey series, this has been long sought after. I had the pleasure of meeting Kagawa in Melbourne in 2019 and she let slip that there was going to be another book based in the Iron Fey world. The excitement in the room was palpable, but when she further elaborated to say this book would be starring the one and only Puck, it exploded. Since then I have been impatiently waiting for it to arrive!</span><br data-dcnode-id="1590"><br data-dcnode-id="1589"><span data-dcnode-id="1588" instrument_node="">For readers new to the story, Puck is King Oberon’s jester (from A Midsummer Night’s Dream), a powerful prankster and joker. He is featured throughout pop culture and Kagawa has incorporated it all and gave him further life in The Iron Fey series. In the Faery lands, there are many legends of Puck, some are myth and some are true, but The Iron Raven is the beginning of setting the record straight. On top of finding out more about our favourite joker, a dangerous new threat is taking hold and will require Puck to team up with old friends and new to save not only the Faery lands, but the human world.</span><br data-dcnode-id="1587"><br data-dcnode-id="1586"><a data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenerddaily.com/review-the-iron-raven-by-julie-kagawa/" rel="nofollow noopener"><span data-dcnode-id="1585" instrument_node="">Read the FULL REVIEW on The Nerd Daily</span></a><span data-dcnode-id="1583" instrument_node=""> </span></span><span data-dcnode-id="1581" instrument_node="">

</span><span data-dcnode-id="1389" id="freeTextContainer5111680820325986515"><span data-dcnode-id="1390" instrument_node="">The Iron Raven is a spin off from The Iron Fey series and is the first instalment of a brand new triology. An enjoyable and engaging book and I had so much fun reading it. This is a light fantasy full of characters and all manner of faeries, goblins, creatures and monsters. Action-packed and fast-paced it is a quick and compelling read with some wonderful detailed and well constructed world building. I haven’t read any of the author’s previous books but there is enough filler and character back </span></span><span data-dcnode-id="1388" instrument_node="">
</span><span data-dcnode-id="1377" id="freeText5111680820325986515" style="display:none"><span data-dcnode-id="1387" instrument_node="">The Iron Raven is a spin off from The Iron Fey series and is the first instalment of a brand new triology. An enjoyable and engaging book and I had so much fun reading it. This is a light fantasy full of characters and all manner of faeries, goblins, creatures and monsters. Action-packed and fast-paced it is a quick and compelling read with some wonderful detailed and well constructed world building. I haven’t read any of the author’s previous books but there is enough filler and character back history in here that I didn’t feel the need. The writing is good and the plot is well thought though, however I felt the general overall feel of the book may appeal more to the younger end of YA readers. </span><br data-dcnode-id="1386"><br data-dcnode-id="1385"><span data-dcnode-id="1384" instrument_node="">The characters are lively and colourful and it was wonderful discovering them, but my heart goes out to Puck. What a fabulous character, so cocky, self-assured and hilariously funny. Some of the things he said made me laugh out loud. I also loved the dark and sinister side to him and his impressive magic system. Nyx of the Forgotten is another favourite, a feisty and formidable assassin adept at wielding a pair of lethal blades, but also has a softer more gentle side. She shares a few little romantic moments with the main character, a chaste kiss here and there and some flirtatious banter. There was definitely a spark here but the romance was not in the forefront of the story, the focus being primarily on the adventure. </span><br data-dcnode-id="1383"><br data-dcnode-id="1382"><span data-dcnode-id="1381" instrument_node="">A fabulous start to a new series which sets the scene for the rest of the series and the cliffhanger ending leaves you wanting more. This is definitely one to pick up if you like exciting fantasy adventure stories with a cast of wicked faeries, goblins, monsters and fantastical creatures. </span><br data-dcnode-id="1380"><br data-dcnode-id="1379"><span data-dcnode-id="1378" instrument_node="">Thank you to the publisher for the gifted copy to review. </span></span><span data-dcnode-id="1376" instrument_node="">

</span><span data-dcnode-id="1173" id="freeTextContainer16529071973630140665"><span data-dcnode-id="1183" instrument_node="">DNF at 25%</span><br data-dcnode-id="1182"><br data-dcnode-id="1181"><span data-dcnode-id="1180" instrument_node="">Everyone in their reviews is talking about nostalgia. About old fond memories of a series we all grew up with as YA readers. But I'm just over here staring at complete incredulity on how such an annoying, childish book got published, ESPECIALLY with a main protag like Puck.</span><br data-dcnode-id="1179"><br data-dcnode-id="1178"><span data-dcnode-id="1177" instrument_node="">Now I get it. HE'S PUCK. ROBIN GOODFELLOW. HE'S SUPPOSED TO BE DUMB AND WILD AND CRAZY. But Quippy McQuipperson is quipping and smirking more than any Marvel Movie protag has and I can't take it anymore!!!</span><br data-dcnode-id="1176"><br data-dcnode-id="1175"><span data-dcnode-id="1174" instrument_node="">Julie Kagaw</span></span><span data-dcnode-id="1172" instrument_node="">
</span><span data-dcnode-id="1161" id="freeText16529071973630140665" style="display:none"><span data-dcnode-id="1171" instrument_node="">DNF at 25%</span><br data-dcnode-id="1170"><br data-dcnode-id="1169"><span data-dcnode-id="1168" instrument_node="">Everyone in their reviews is talking about nostalgia. About old fond memories of a series we all grew up with as YA readers. But I'm just over here staring at complete incredulity on how such an annoying, childish book got published, ESPECIALLY with a main protag like Puck.</span><br data-dcnode-id="1167"><br data-dcnode-id="1166"><span data-dcnode-id="1165" instrument_node="">Now I get it. HE'S PUCK. ROBIN GOODFELLOW. HE'S SUPPOSED TO BE DUMB AND WILD AND CRAZY. But Quippy McQuipperson is quipping and smirking more than any Marvel Movie protag has and I can't take it anymore!!!</span><br data-dcnode-id="1164"><br data-dcnode-id="1163"><span data-dcnode-id="1162" instrument_node="">Julie Kagawa either fucking kills it and manages to take you on an amazing fantastical journey (Blood of Eden, Shadow of the Fox) or just is so immature and elementary in her writing (Talon and from what I'm vaguely remembering the Iron Fey, we were just all young and it was 2010 anyways, what were standards!?) I just do not get how she goes from being an absolute queen to this trash. The steampunk is so cringey. The descriptions of the fae feel half assed or too try hard. like REALLY? so help me god.</span></span><span data-dcnode-id="1160" instrument_node="">
