</span><li data-dcnode-id="1659"><span data-dcnode-id="1672" instrument_node="">...that the manned mission to </span><a data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Mars" title="Mars"><span data-dcnode-id="1671" instrument_node="">Mars</span></a><span data-dcnode-id="1669" instrument_node=""> where </span><a data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Human" title="Human"><span data-dcnode-id="1668" instrument_node="">humanity</span></a><span data-dcnode-id="1666" instrument_node=""> first came into contact with the </span><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Traveler" title="Traveler"><span data-dcnode-id="1665" instrument_node="">Traveler</span></a><span data-dcnode-id="1663" instrument_node=""> was called </span><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Ares_One" title="Ares One"><span data-dcnode-id="1662" instrument_node="">Ares One</span></a><span data-dcnode-id="1660" instrument_node="">?</span></li><span data-dcnode-id="1658" instrument_node="">
</span><li data-dcnode-id="1647"><span data-dcnode-id="1657" instrument_node="">...that </span><a data-dcnode-id="1655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Zhalo_Supercell" title="Zhalo Supercell"><span data-dcnode-id="1656" instrument_node="">Zhalo Supercell</span></a><span data-dcnode-id="1654" instrument_node=""> was originally named after the </span><a class="extiw" data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukonvasara" title="wikipedia:Ukonvasara"><span data-dcnode-id="1653" instrument_node="">hammer</span></a><span data-dcnode-id="1651" instrument_node=""> of the Finnish thunder god </span><a class="extiw" data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukko" title="wikipedia:Ukko"><span data-dcnode-id="1650" instrument_node="">Ukko</span></a><span data-dcnode-id="1648" instrument_node="">?</span></li><span data-dcnode-id="1646" instrument_node="">
</span><li data-dcnode-id="1634"><span data-dcnode-id="1645" instrument_node="">...that in </span><i data-dcnode-id="1642"><a data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Destiny_2" title="Destiny 2"><span data-dcnode-id="1644" instrument_node="">Destiny 2</span></a></i><span data-dcnode-id="1641" instrument_node="">, </span><a data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Earth" title="Earth"><span data-dcnode-id="1640" instrument_node="">Earth</span></a><span data-dcnode-id="1638" instrument_node="">'s continents are backwards in the </span><a data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Director" title="Director"><span data-dcnode-id="1637" instrument_node="">Director</span></a><span data-dcnode-id="1635" instrument_node="">?</span></li><span data-dcnode-id="1633" instrument_node="">
</span><li data-dcnode-id="1621"><span data-dcnode-id="1632" instrument_node="">...that </span><a data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Last_Wish" title="Last Wish"><span data-dcnode-id="1631" instrument_node="">Last Wish</span></a><span data-dcnode-id="1629" instrument_node=""> is the first </span><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Raid" title="Raid"><span data-dcnode-id="1628" instrument_node="">Raid</span></a><span data-dcnode-id="1626" instrument_node=""> in </span><i data-dcnode-id="1623"><a data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Destiny_2" title="Destiny 2"><span data-dcnode-id="1625" instrument_node="">Destiny 2</span></a></i><span data-dcnode-id="1622" instrument_node=""> to feature multiple bosses?</span></li></ul><span data-dcnode-id="1619" instrument_node=""> </span></div><span data-dcnode-id="1617" instrument_node="">

</span><h2 data-dcnode-id="1166"><span class="mw-headline" data-dcnode-id="1174" id="History"><span data-dcnode-id="1175" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="1167"><span class="mw-editsection-bracket" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">[</span></span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Iron_Lords%3Faction%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="1171" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">
</span></span></p><span data-dcnode-id="1161" instrument_node="">
</span><dl data-dcnode-id="1152"><dd data-dcnode-id="1156"><span data-dcnode-id="1160" instrument_node="">"</span><i data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Some know the legend. But no one truly knows how the Iron Lords died their final deaths. That was something you had to be there for. To witness. To remember. To know even heroes can die. And survival is not always a victory.</span></i><span data-dcnode-id="1157" instrument_node="">"</span></dd><span data-dcnode-id="1155" instrument_node="">
</span><dd data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">— Lord Saladin</span></dd></dl><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1150" instrument_node="">In the first years after the </span><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Collapse" title="Collapse"><span data-dcnode-id="1149" instrument_node="">Collapse</span></a><span data-dcnode-id="1147" instrument_node="">, a time before the rise of the </span><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Vanguard" title="Vanguard"><span data-dcnode-id="1146" instrument_node="">Vanguard</span></a><span data-dcnode-id="1144" instrument_node=""> and the </span><a data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Last_City" title="Last City"><span data-dcnode-id="1143" instrument_node="">Last City</span></a><span data-dcnode-id="1141" instrument_node="">, some of the earliest Guardians to be revived chose not to protect the world, but subjugate it.</span><sup class="reference" data-dcnode-id="1138" id="cite_ref-What’s_Going_On_In_Destiny’s_Story_–_2016_Edition_2-0"><a data-dcnode-id="1139" href="#cite_note-What%E2%80%99s_Going_On_In_Destiny%E2%80%99s_Story_%E2%80%93_2016_Edition-2"><span data-dcnode-id="1140" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1137" instrument_node=""> Taking over various parts of the planet, some Guardians became </span><a data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Warlord" title="Warlord"><span data-dcnode-id="1136" instrument_node="">Warlords</span></a><span data-dcnode-id="1134" instrument_node=""> and injustice reigned, with the rest of the populace living under the tyranny of the various factions. Eventually, Guardians with integrity chose to stand up to their tyrannical brethren and form the Iron Lords.</span><sup class="reference" data-dcnode-id="1131" id="cite_ref-What’s_Going_On_In_Destiny’s_Story_–_2016_Edition_2-1"><a data-dcnode-id="1132" href="#cite_note-What%E2%80%99s_Going_On_In_Destiny%E2%80%99s_Story_%E2%80%93_2016_Edition-2"><span data-dcnode-id="1133" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1130" instrument_node=""> More and more noble Guardians joined the cause until an army hundreds strong was formed and the oppressive warlords were deposed, along with the </span><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Fallen" title="Fallen"><span data-dcnode-id="1129" instrument_node="">Fallen</span></a><span data-dcnode-id="1127" instrument_node=""> who ravaged the </span><a data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Earth" title="Earth"><span data-dcnode-id="1126" instrument_node="">Earth</span></a><span data-dcnode-id="1124" instrument_node="">. One former </span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Warlord" title="Warlord"><span data-dcnode-id="1123" instrument_node="">Warlord</span></a><span data-dcnode-id="1121" instrument_node="">, Lord Felwinter, was swayed by the Iron Lord's message and decided to join their cause.</span><sup class="reference" data-dcnode-id="1118" id="cite_ref-What’s_Going_On_In_Destiny’s_Story_–_2016_Edition_2-2"><a data-dcnode-id="1119" href="#cite_note-What%E2%80%99s_Going_On_In_Destiny%E2%80%99s_Story_%E2%80%93_2016_Edition-2"><span data-dcnode-id="1120" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1117" instrument_node="">
</span></p><p data-dcnode-id="1097"><span data-dcnode-id="1115" instrument_node="">Following the Warlord conflict, the Iron Lords dedicated themselves to defending survivors of the </span><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Collapse" title="Collapse"><span data-dcnode-id="1114" instrument_node="">Collapse</span></a><span data-dcnode-id="1112" instrument_node=""> and restoring civilization. The Iron Lords protected the newly constructed walls of the </span><a class="mw-redirect" data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/City" title="City"><span data-dcnode-id="1111" instrument_node="">City</span></a><span data-dcnode-id="1109" instrument_node=""> in the infamous Battle of </span><a data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Six_Fronts" title="Six Fronts"><span data-dcnode-id="1108" instrument_node="">Six Fronts</span></a><span data-dcnode-id="1106" instrument_node=""> against six Fallen approaches, and not a single front faltered.</span><sup class="reference" data-dcnode-id="1103" id="cite_ref-3"><a data-dcnode-id="1104" href="#cite_note-3"><span data-dcnode-id="1105" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1102" instrument_node=""> During this conflict, the Iron Lords were known for their invincible patrols and their contributions to the great Wall-Building, cementing their legend.</span><sup class="reference" data-dcnode-id="1099" id="cite_ref-4"><a data-dcnode-id="1100" href="#cite_note-4"><span data-dcnode-id="1101" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1098" instrument_node="">
</span></p><p data-dcnode-id="1051"><span data-dcnode-id="1096" instrument_node="">Seeking a way to rebuild what was lost during the Collapse, they eventually found </span><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/SIVA" title="SIVA"><span data-dcnode-id="1095" instrument_node="">SIVA</span></a><span data-dcnode-id="1093" instrument_node="">. Hoping it would be able to build ships and colonies, the Iron Lords pushed through the </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Cosmodrome" title="Cosmodrome"><span data-dcnode-id="1092" instrument_node="">Cosmodrome</span></a><span data-dcnode-id="1090" instrument_node=""> despite </span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Rasputin" title="Rasputin"><span data-dcnode-id="1089" instrument_node="">Rasputin</span></a><span data-dcnode-id="1087" instrument_node="">'s desperate attempts to sway them and suffered the loss of hundreds of Lords to a combination of aerial strikes, a </span><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Frame" title="Frame"><span data-dcnode-id="1086" instrument_node="">Frame</span></a><span data-dcnode-id="1084" instrument_node=""> army, and SIVA constructs.</span><sup class="reference" data-dcnode-id="1081" id="cite_ref-5"><a data-dcnode-id="1082" href="#cite_note-5"><span data-dcnode-id="1083" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1080" instrument_node=""> Ultimately, the venture would result in the loss of all save for </span><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Saladin_Forge" title="Saladin Forge"><span data-dcnode-id="1079" instrument_node="">Saladin Forge</span></a><span data-dcnode-id="1077" instrument_node=""> and </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Efrideet" title="Efrideet"><span data-dcnode-id="1076" instrument_node="">Efrideet</span></a><span data-dcnode-id="1074" instrument_node="">, who had disappeared to live in the wilds beyond the city. The eight Iron Lords who made it, save for Lord Saladin, sacrificed themselves to contain the biomechanical plague by sealing themselves within its replication chamber before it had time to escape.</span><sup class="reference" data-dcnode-id="1071" id="cite_ref-6"><a data-dcnode-id="1072" href="#cite_note-6"><span data-dcnode-id="1073" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1070" instrument_node=""> The sacrifices of the most well-known Lords are honored at the </span><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Iron_Temple" title="Iron Temple"><span data-dcnode-id="1069" instrument_node="">Iron Temple</span></a><span data-dcnode-id="1067" instrument_node=""> atop </span><a data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Felwinter_Peak" title="Felwinter Peak"><span data-dcnode-id="1066" instrument_node="">Felwinter Peak</span></a><span data-dcnode-id="1064" instrument_node="">, and celebrated in the </span><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Iron_Banner" title="Iron Banner"><span data-dcnode-id="1063" instrument_node="">Iron Banner</span></a><span data-dcnode-id="1061" instrument_node=""> tournament. The names of their signature weapons are lent to various Iron Banner equipment, such as the Felwinter's Lie </span><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Shotgun" title="Shotgun"><span data-dcnode-id="1060" instrument_node="">Shotgun</span></a><span data-dcnode-id="1058" instrument_node=""> and the Jolder's Hammer </span><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Machine_Gun" title="Machine Gun"><span data-dcnode-id="1057" instrument_node="">Machine Gun</span></a><span data-dcnode-id="1055" instrument_node="">. The second generation of the Lords, the </span><a class="mw-redirect" data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Iron_Wolves" title="Iron Wolves"><span data-dcnode-id="1054" instrument_node="">Iron Wolves</span></a><span data-dcnode-id="1052" instrument_node="">, and their weapons are likewise honored by the Iron Banner.
</span></p><span data-dcnode-id="1050" instrument_node="">
</span><h3 data-dcnode-id="1040"><span class="mw-headline" data-dcnode-id="1048" id="Iron_Wolves"><span data-dcnode-id="1049" instrument_node="">Iron Wolves</span></span><span class="mw-editsection" data-dcnode-id="1041"><span class="mw-editsection-bracket" data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">[</span></span><a data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Iron_Lords%3Faction%3Dedit%26section%3D2" title="Edit section: Iron Wolves"><span data-dcnode-id="1045" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">
</span></span></p><span data-dcnode-id="1035" instrument_node="">
</span><dl data-dcnode-id="1023"><dd data-dcnode-id="1030"><span data-dcnode-id="1034" instrument_node="">"</span><i data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">In our darkest hour, nine Iron Wolves emerged from the ruins.</span></i><span data-dcnode-id="1031" instrument_node="">"</span></dd><span data-dcnode-id="1029" instrument_node="">
</span><dd data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">— Wolfswood Cloak description.</span><sup class="reference" data-dcnode-id="1025" id="cite_ref-WolfswoodCloak_7-0"><a data-dcnode-id="1026" href="#cite_note-WolfswoodCloak-7"><span data-dcnode-id="1027" instrument_node="">[7]</span></a></sup></dd></dl><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="1021" instrument_node="">The </span><b data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Iron Wolves</span></b><span data-dcnode-id="1018" instrument_node=""> were a group of </span><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Guardian" title="Guardian"><span data-dcnode-id="1017" instrument_node="">Guardians</span></a><span data-dcnode-id="1015" instrument_node=""> who were the </span><a class="mw-selflink selflink" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Iron Lords</span></a><span data-dcnode-id="1012" instrument_node="">'s second generation after their inception and came to the </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Last_City" title="Last City"><span data-dcnode-id="1011" instrument_node="">Last City</span></a><span data-dcnode-id="1009" instrument_node="">'s defense during one of its darkest hours. Like their counterparts, the Wolves were felled in what would become The </span><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Plaguelands" title="Plaguelands"><span data-dcnode-id="1008" instrument_node="">Plaguelands</span></a><span data-dcnode-id="1006" instrument_node=""> during the first war with SIVA. The </span><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Iron_Banner" title="Iron Banner"><span data-dcnode-id="1005" instrument_node="">Iron Banner</span></a><span data-dcnode-id="1003" instrument_node=""> tournament is held in honor of both the Iron Lords and the Iron Wolves.</span><sup class="reference" data-dcnode-id="1000" id="cite_ref-8"><a data-dcnode-id="1001" href="#cite_note-8"><span data-dcnode-id="1002" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="997" id="cite_ref-WolfswoodCloak_7-1"><a data-dcnode-id="998" href="#cite_note-WolfswoodCloak-7"><span data-dcnode-id="999" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="994" id="cite_ref-9"><a data-dcnode-id="995" href="#cite_note-9"><span data-dcnode-id="996" instrument_node="">[9]</span></a></sup><span data-dcnode-id="993" instrument_node="">

</span><ul data-dcnode-id="686"><li data-dcnode-id="733"><span data-dcnode-id="741" instrument_node="">The Iron Lords' classes were mostly speculated from the items of the </span><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Iron_Banner" title="Iron Banner"><span data-dcnode-id="740" instrument_node="">Iron Banner</span></a><span data-dcnode-id="738" instrument_node="">, although new information from the </span><i data-dcnode-id="735"><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Rise_of_Iron" title="Rise of Iron"><span data-dcnode-id="737" instrument_node="">Rise of Iron</span></a></i><span data-dcnode-id="734" instrument_node=""> DLC confirmed them all.</span></li><span data-dcnode-id="732" instrument_node="">
</span><li data-dcnode-id="725"><a class="extiw" data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radegast_%28god%29" title="wikipedia:Radegast (god)"><span data-dcnode-id="731" instrument_node="">Radegast</span></a><span data-dcnode-id="729" instrument_node=""> is the name of the slavic god of hospitality, but is </span><a class="extiw" data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radagast" title="wikipedia:Radagast"><span data-dcnode-id="728" instrument_node="">better known</span></a><span data-dcnode-id="726" instrument_node=""> as one of the five wizards from J.R.R. Tolkien's Lord of the Rings.</span></li><span data-dcnode-id="724" instrument_node="">
</span><li data-dcnode-id="720"><a class="extiw" data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perun" title="wikipedia:Perun"><span data-dcnode-id="723" instrument_node="">Perun</span></a><span data-dcnode-id="721" instrument_node=""> is the slavic god of thunder and lightning.</span></li><span data-dcnode-id="719" instrument_node="">
</span><li data-dcnode-id="715"><a class="extiw" data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timur" title="wikipedia:Timur"><span data-dcnode-id="718" instrument_node="">Timur</span></a><span data-dcnode-id="716" instrument_node="">, also known as Tamerlane, was a 14th century Turkic-Mongol conqueror.</span></li><span data-dcnode-id="714" instrument_node="">
</span><li data-dcnode-id="703"><span data-dcnode-id="713" instrument_node="">There are several artifacts in </span><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Destiny" title="Destiny"><span data-dcnode-id="712" instrument_node="">Destiny</span></a><span data-dcnode-id="710" instrument_node=""> that are named after the </span><a class="mw-redirect" data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Iron_Wolves" title="Iron Wolves"><span data-dcnode-id="709" instrument_node="">Iron Wolves</span></a><span data-dcnode-id="707" instrument_node=""> that are available as random drops or as rewards from the monthly </span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Iron_Banner" title="Iron Banner"><span data-dcnode-id="706" instrument_node="">Iron Banner</span></a><span data-dcnode-id="704" instrument_node=""> tournament but unlike those for the Iron Lords, they give little to no information on their classes.</span></li><span data-dcnode-id="702" instrument_node="">
</span><li data-dcnode-id="697"><span data-dcnode-id="701" instrument_node="">Saladin's namesake was the first </span><a class="extiw" data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saladin" title="wikipedia:Saladin"><span data-dcnode-id="700" instrument_node="">Sultan of Egypt</span></a><span data-dcnode-id="698" instrument_node=""> and founder of the Ayyubid dynasty.</span></li><span data-dcnode-id="696" instrument_node="">
</span><li data-dcnode-id="687"><span data-dcnode-id="695" instrument_node="">The name Iron Wolves, or simply wolves, was originally used a derogatory term used by </span><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.destinypedia.com/Warlord" title="Warlord"><span data-dcnode-id="694" instrument_node="">Warlords</span></a><span data-dcnode-id="692" instrument_node=""> when referring the Iron Lords.</span><sup class="reference" data-dcnode-id="689" id="cite_ref-10"><a data-dcnode-id="690" href="#cite_note-10"><span data-dcnode-id="691" instrument_node="">[10]</span></a></sup><span data-dcnode-id="688" instrument_node=""> Why this team officially took up the title is unknown, but they managed to give the name a positive meaning.</span></li></ul><span data-dcnode-id="685" instrument_node="">
