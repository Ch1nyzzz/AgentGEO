</span><div class="content" data-dcnode-id="3232"><span data-dcnode-id="3250" instrument_node="">
</span><div class="text show-more__control" data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">There's no doubt about it: Meryl Streep will be nominated for her 17th Academy Award for her portrayal of Britain's most controversial Prime Minister, Margaret Thatcher, in this otherwise underwhelming biopic. Streep is mesmerizing as usual, but the mode of storytelling employed by screenwriter Abi Morgan and director Phyllida Lloyd – sporadic flashbacks among elongated stretches of following the elderly and mentally fragile Maggie – is a huge misfire. The scenes which recount her path from young adulthood through to local politics and then to her 11 years of turbulent leadership are intriguing, however they are too far and few between to really grip. Sure, it checks off the list as far as famous moments go, but a more in depth insight into how she ran the country would've been nice.</span></div><span data-dcnode-id="3247" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">Biopics are always a problem. That's why the long form, HBO style is infinitely more suitable and altogether more satisfying. Okay, now, once that aside, let me talk about Meryl Streep. A miracle! She does the impossible, not only manages to inhabit Thatcher, she also reveals her under a slightly different light. The human light. No matter how much at odds I've been with her politics, I saw that human side through Meryl Streep's eyes and realized that I had forgotten to remember, Thatcher was a human being, a woman breaking ground. She loved her husband but put her career first, as most men in her position do. Her drive is a mystery as much a mystery as Meryl Streep's art. After seeing the film, me, a life long anti-Thatcher, I have to say that it's a fair portrait of the woman. The ones who never heard of Margaret Thatcher, and there are, two of them were sitting next to me in theater, I think they thought "The Iron Lady" was the female version of "Iron Man" but even them surrendered to the character trough the glories of this other giant of our generation, Meryl Streep.</span></div><span data-dcnode-id="3162" instrument_node="">

</span><path d="M10.197 0L6 4.304 1.803 0 0 1.85 6 8l6-6.15" data-dcnode-id="3060" fill="#2572B3" fill-rule="evenodd"></path><span data-dcnode-id="3059" instrument_node="">

</span><div class="content" data-dcnode-id="3036"><span data-dcnode-id="3050" instrument_node="">
</span><div class="text show-more__control" data-dcnode-id="3039"><span data-dcnode-id="3049" instrument_node="">In purely cynical terms, one has to wonder if the makers of The Iron Lady wanted to release a film about old age and senility but were warned that such a sombre topic would never perform well at the box office. You can almost imagine some studio executive saying "no, no, no, we can't possibly promote that sort of movie. Unless you make it about someone famous that would make people go and see it." Although advertised as an account of the life and political career of Margaret Thatcher, the film doesn't come close to doing justice to such a vast topic. Instead we get a whistle-stop tour of key events – five minutes of the miners' strike, five minutes of the Brighton bombing, three minutes about Poll Tax, and so on. The nearest the film gets to real depth, politically-speaking, is when it devotes fifteen whole minutes of precious screen time to the Falklands War.</span><br data-dcnode-id="3048"><br data-dcnode-id="3047"><span data-dcnode-id="3046" instrument_node="">No, this is not a true political biopic in the usual sense. What we have here is a thin and rather dull story about an old lady's deteriorating health, punctuated along the way with flashbacks to the events that shaped her career. The fact that the old lady in question is Margaret Thatcher comes across almost as a gimmick. They could have made the film about any elderly lady, fictional or real - it would scarcely have mattered. All the important aspects of Thatcher's policies and the legacy her government left behind are dealt with in far too shallow a manner, while any insight into Thatcher as a person gets lost amidst an onrush of excessive newsreel footage. Indeed, it seems as if 25% of the film comprises of these old archival bits and pieces, which really is a case of overkill.</span><br data-dcnode-id="3045"><br data-dcnode-id="3044"><span data-dcnode-id="3043" instrument_node="">Since the narrative amounts to nothing more than a series of jerky flashbacks, all superficial and absurdly brief, one wonders if there is any reason to watch the film at all. Fortunately, there is one aspect of The Iron Lady that shines like a glowing beacon through the gloom – and that is the marvellous performance of Meryl Streep. Streep's portrayal of the former Prime Minister is a masterclass in screen acting. The voice, the mannerisms, the physical appearance, the haughty attitude she nails it all. There are some notable names alongside her in the cast too, but generally they are in sub-par form. In some cases they're undone by poor writing, like Jim Broadbent's cartoonish "ghost of Dennis Thatcher", while others simply have too little screen time to get their teeth into the part (Richard E. Grant for example who, as Michael Heseltine, is so under-used that he simply fails to register).</span><br data-dcnode-id="3042"><br data-dcnode-id="3041"><span data-dcnode-id="3040" instrument_node="">Some might say the film has been made a generation too soon, since the scars of Thatcherite politics still run deep in many parts of the UK. Nonetheless, a controversial but powerful biopic could and should have resulted here if anyone associated with it had shown the courage to take a standpoint. Timidly, the film neither celebrates nor condemns Thatcher. It wimps out by presenting its entire story through the eyes of her as a mentally fragile old lady, thereby avoiding the need to "take a side". All in all, The Iron Lady is a missed opportunity. Streep's performance drags it up to the level of a watchable curiosity item but that's about the best it can offer.</span></div><span data-dcnode-id="3038" instrument_node="">

</span><div class="text show-more__control clickable" data-dcnode-id="2986"><span data-dcnode-id="2990" instrument_node="">When the film begins, it's a little confusing. Since Margaret Thatcher has been suffering in real life from dementia is recent years, her muddled thoughts are mirrored in the film. For example, some of the scenes with her husband take place AFTER his death--as she didn't always realize he was not there. It's all quite sad and is probably NOT the way many want to remember this great lady. However, there is nothing evil about aging and memory problems--and I applaud the film for its unflinching view of a severely debilitated woman--but why spend so much of the film on this? It was THE theme of the movie--more so than her political life. It also made the film VERY confusing and difficult to follow--and the sequence is quite jarring. In hindsight, I would have preferred a more traditional narrative and I assume most others would agree--especially since too much of the film is about her jumbled mind today and not her many achievements. It also might have been best that such a pathetic sort of persona had come out well after Thatcher's death--it seemed rather sad to do a film like this now. I would have simply ended the film after she stepped down as Prime Minister.</span><br data-dcnode-id="2989"><br data-dcnode-id="2988"><span data-dcnode-id="2987" instrument_node="">Despite this well deserved criticism, it's still a film I recommend. Although the writing could have been better, the acting and makeup couldn't. Meryl Streep rightfully earned the Oscar for Best Actress for this one--perhaps her best performance to date. To put it succinctly, she WAS Margaret Thatcher! And, to make this illusion even more real, the makeup was perfect--aging her in a manner that made you truly believe what you were seeing.</span></div><span data-dcnode-id="2985" instrument_node="">

</span></a><span data-dcnode-id="2913" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2905"><span data-dcnode-id="2912" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2909"><a data-dcnode-id="2910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur20552756/"><span data-dcnode-id="2911" instrument_node="">TheLittleSongbird</span></a></span><span class="review-date" data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">16 November 2016</span></span><span data-dcnode-id="2906" instrument_node="">
</span></div><span data-dcnode-id="2904" instrument_node="">
</span><div class="content" data-dcnode-id="2880"><span data-dcnode-id="2903" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2883"><span data-dcnode-id="2902" instrument_node="">Margaret Thatcher was a fascinating if controversial woman, who has garnered strong opinions on either side. 'The Iron Lady' also boasted quite a cast, with the likes of Meryl Streep and Jim Broadbent, what could go wrong? </span><br data-dcnode-id="2901"><br data-dcnode-id="2900"><span data-dcnode-id="2899" instrument_node="">The answer is, a lot did. 'The Iron Lady' is not complete dreck, but it could have been much, much better and doesn't do justice to Thatcher at all. The best thing about it is the acting, with the star of the film undoubtedly being the miraculous central performance of Meryl Streep as Thatcher. This is not a caricature or an impersonation, this performance feels genuine and real, showing that Streep did her homework researching Thatcher and her mannerisms.</span><br data-dcnode-id="2898"><br data-dcnode-id="2897"><span data-dcnode-id="2896" instrument_node="">Jim Broadbent brings heart and warmth to the ghostly Dennis, in lesser hands this could have been a gimmick but Streep and Broadbent's chemistry is quite heartfelt and really tries to bring believability to scenes not deserving of that effort. Alexandra Roach is also solid as is an unrecognisable Olivia Coleman. Other than the acting, the make-up is extremely good with the actors very believably made up, the locations and costumes are suitably evocative and there is the odd intriguing scene that are too far and between.</span><br data-dcnode-id="2895"><br data-dcnode-id="2894"><span data-dcnode-id="2893" instrument_node="">It is such a shame that the rest of 'The Iron Lady' falls flat. The supporting/secondary roles consist of spot and recognise the actor but the roles are too sketchily developed and under-utilised to make a proper impression. Phyllida Lloyd's talents as a theatre director don't translate here, here her direction is elephantine and the film is often haphazardly filmed and chaotically edited, especially the flashbacks. Thomas Newman's score is not among his best work, it's not awful certainly but it's more dreary than hypnotic and too derivative of other and better scores of his. The use of Beethoven's "Emperor" Concerto is moving though.</span><br data-dcnode-id="2892"><br data-dcnode-id="2891"><span data-dcnode-id="2890" instrument_node="">Narratively, the story is unfocused and chaotic. There is too much focus on the older Thatcher suffering from dementia, and the scenes which dominate the film are incredibly dull and repetitive, there was little interesting about them, they seemed to exploit this awful condition with little sympathy for it rather than make Thatcher interesting and says little about her as a person and it was very difficult to not tire of the film early on. Much more interesting events, especially what Thatcher was famous for and conflicts of the time, are either mentioned but glossed over, introduced but quickly given short shrift or omitted entirely. In the end, hardly anything is learnt about Thatcher as a person or what made her famous or important and we don't really care at the end of the day.</span><br data-dcnode-id="2889"><br data-dcnode-id="2888"><span data-dcnode-id="2887" instrument_node="">Similarly, the script is also very sketchy and stilted with too much focus on the wrong things and more interesting elements severely underdeveloped or out of sight. It also seemed too careful not to offend, while it can be appreciated that the film didn't want to make Thatcher an angel or a villain or be one-sided it just felt like things were played too safe and like the writer Abi Morgan couldn't decide what her opinion on Thatcher was. She was a controversial figure certainly, but there was room for a complex characterisation and while Streep's performance is without complaint and that didn't really come.</span><br data-dcnode-id="2886"><br data-dcnode-id="2885"><span data-dcnode-id="2884" instrument_node="">Overall, a pretty weak film saved by the acting, Streep is the star here and issues about her winning the Oscar are none. 4/10 Bethany Cox</span></div><span data-dcnode-id="2882" instrument_node="">
</span><span data-dcnode-id="2881" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="2762"><span data-dcnode-id="2769" instrument_node="">Meryl Streep did great, off course, but the manuscript was the worst imaginable. I came to see a movie about Margaret Thatcher's life. Instead they produced a movie about an old lady's dealing with the loss of her husband. Shame on the producers. Shame, shame, shame.</span><br data-dcnode-id="2768"><br data-dcnode-id="2767"><span data-dcnode-id="2766" instrument_node="">The beginning of the movie starts with Margaret Thatcher at old age. Fine, I thought. Soon they will cut to a flash back and tell the story of her life. Nope. No such luck. The middle and the end was also about Margaret Thatcher's old age. Admittedly with glimpses of flash back. But the producers were evidently much more interested in telling the story of her last days, than the story of her life. A better title would have been, "The Death of Margaret Thatcher".</span><br data-dcnode-id="2765"><br data-dcnode-id="2764"><span data-dcnode-id="2763" instrument_node="">I look forward to someone else making a movie about Margaret Thatcher's LIFE. And by all means choose Meryl Streep again, cause she IS a great actress.</span></div><span data-dcnode-id="2761" instrument_node="">

</span><div class="text show-more__control clickable" data-dcnode-id="2700"><span data-dcnode-id="2713" instrument_node="">Before viewing, "The Iron Lady", I didn't really know much about Margaret Thatcher. Other than she was the prime minister of England for 11 years, she was a very controversial figure and still is to this day. So I was really interested to see the film and I decided to visit the WGA screening.</span><br data-dcnode-id="2712"><br data-dcnode-id="2711"><span data-dcnode-id="2710" instrument_node="">Now let me begin by saying, Meryl Streep embodies Margaret Thatcher. She doesn't just look like her, but she talks like her, her facial expressions are spot on. Meryl Streep becomes Margaret Thatcher. I would be shocked if she doesn't win an Oscar for this performance. The supporting cast is good too, Jim Broadbent gives an excellent performance, everyone is just great.</span><br data-dcnode-id="2709"><br data-dcnode-id="2708"><span data-dcnode-id="2707" instrument_node="">However aside from the top notch acting, the movie had a few flaws. The story was uninteresting at times, the flashback scenes were a bit muddled and a little confusing. The movie felt a little too safe, it tried too hard, not to be controversial. Although I don't entirely blame the film itself for that. Margaret Thatcher was such a decisive person, that whichever side the film picked, it would be criticized by a lot of people. I guess the film ultimately achieved the goal.</span><br data-dcnode-id="2706"><br data-dcnode-id="2705"><span data-dcnode-id="2704" instrument_node="">I also liked the movie didn't dwell too much on the politics, but on the character of Margaret Thatcher. We see the human side of The Iron Lady herself, beyond all the partisan politics and rumors, we get to see a very personal and sad side of her. The subplot focusing on Thacther's grief over her husband's death, as the older version battles with hallucinations and an unwillingness to let go of her dear Denis are heartbreaking.</span><br data-dcnode-id="2703"><br data-dcnode-id="2702"><span data-dcnode-id="2701" instrument_node="">Overall the movie was really well done, but just shy of greatness. Meryl Streep's performance and the supporting cast, truly elevates the film into a great biopic. Although I wished a little more time was spent on focusing on her political life, the movie successfully showed a deep and moving side of the prime minister. Which a lot of biopics fail to do. Whatever your opinions might be on Margaret Thatcher, don't fault the movie because of the opinion. And I highly respect Phyllida LLoyd, Meryl Streep, Abi Morgan and others for trying to portray such a decisive and highly controversial figure.</span></div><span data-dcnode-id="2699" instrument_node="">

</span></a><span data-dcnode-id="2562" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2554"><span data-dcnode-id="2561" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2558"><a data-dcnode-id="2559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur2483625/"><span data-dcnode-id="2560" instrument_node="">bkoganbing</span></a></span><span class="review-date" data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">23 September 2012</span></span><span data-dcnode-id="2555" instrument_node="">
</span></div><span data-dcnode-id="2553" instrument_node="">
</span><div class="content" data-dcnode-id="2532"><span data-dcnode-id="2552" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2535"><span data-dcnode-id="2551" instrument_node="">Even today though she's been out as Prime Minister of the United Kingdom for over 20 years now the name of Margaret Thatcher still rings with controversy over the decisions she made in her tenure. Like that monarch of England whose reign ended over 400 years ago, she took the responsibility of her country as serious as Elizabeth I and nothing else stood in her way.</span><br data-dcnode-id="2550"><br data-dcnode-id="2549"><span data-dcnode-id="2548" instrument_node="">Margaret Thatcher as a first minister rather than a monarch did not have to deal with sex because she had to provide for an heir. Elizabeth had many male favorites over the years, but no one single individual to provide the support and backing that Dennis Thatcher gave to his spouse.</span><br data-dcnode-id="2547"><br data-dcnode-id="2546"><span data-dcnode-id="2545" instrument_node="">The Iron Lady is the story of a marriage only in this marriage it was behind every successful woman there is a good man. The film is a look at Margaret Thatcher in her dotage as the British would say as she's trying to adjust to the death of her beloved Dennis. During the course of the movie we see flashbacks to some of the tumultuous times during her ministry. Thatcher has the distinction of being both the longest reigning prime minister of the 20th century and the only woman for her country. In fact you have to go back to William Pitt the Younger and Robert Walpole to find longer reigns.</span><br data-dcnode-id="2544"><br data-dcnode-id="2543"><span data-dcnode-id="2542" instrument_node="">When I did a review of the first Thin Man movie for which William Powell got his first Oscar nomination I said it was unjust to nominate him without Myrna Loy. That's true here as Meryl Streep won her third Oscar playing Thatcher, nay investing herself in the soul of Thatcher she's that good in the part. Like The Thin Man this is a joint performance and Jim Broadbent should have gotten Oscar recognition himself as the supportive and self effacing Dennis Thatcher.</span><br data-dcnode-id="2541"><br data-dcnode-id="2540"><span data-dcnode-id="2539" instrument_node="">In fact if The Iron Lady has a weakness it's in the lack of any other characters being developed. The rest of the cast are just cardboard cutouts supporting Streep and Broadbent.</span><br data-dcnode-id="2538"><br data-dcnode-id="2537"><span data-dcnode-id="2536" instrument_node="">Still Margaret Thatcher if she has not totally slipped off into the good night of Alzheimer's Disease, she ought to be proud of this film tribute to her.</span></div><span data-dcnode-id="2534" instrument_node="">
</span><span data-dcnode-id="2533" instrument_node="">

</span><a class="title" data-dcnode-id="2463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw2715174/"><span data-dcnode-id="2464" instrument_node=""> Insulting in its concept, amateurish in its execution
</span></a><span data-dcnode-id="2462" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2454"><span data-dcnode-id="2461" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2458"><a data-dcnode-id="2459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur1090944/"><span data-dcnode-id="2460" instrument_node="">dierregi</span></a></span><span class="review-date" data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">5 December 2012</span></span><span data-dcnode-id="2455" instrument_node="">
</span></div><span data-dcnode-id="2453" instrument_node="">
</span><div class="content" data-dcnode-id="2432"><span data-dcnode-id="2452" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2435"><span data-dcnode-id="2451" instrument_node="">I never followed closely Thatcher's political career, but I know it was very controversial. However, she was one of the most influential people of the 80's and probably had to work twice as hard just because she was a woman. </span><br data-dcnode-id="2450"><br data-dcnode-id="2449"><span data-dcnode-id="2448" instrument_node="">Bearing only this in mind and regardless of the political side I take, I found this movie very distasteful. The script is messy, with a misogynistic bent and I also disliked the acting. I was expecting the story of the first (and so far the only) woman to become Prime Minister in the UK. But instead I got a demented old lady who spends her time talking to the ghost of her long deceased husband. Half of the movie is nothing but following the old lady around the house. She could have been any wealthy housewife reminiscing about the good old days rather than Mrs. Thatcher.</span><br data-dcnode-id="2447"><br data-dcnode-id="2446"><span data-dcnode-id="2445" instrument_node="">All the "action" concerning her career takes place in the past, but even then we get silly scenes such as her children running after her car and begging mummy to stay home rather than "abandoning" them for her job. During one of the flashbacks we are shown Dennis asking Margaret to marry him and she answering that she will not be one of those women who stay home doing the washing-up. I immediately knew that a scene showing her washing the dishes was bound to come. It does indeed, as if to show that staying home and being a good housewife would have been a much better idea. This is what I call corny scriptwriting.</span><br data-dcnode-id="2444"><br data-dcnode-id="2443"><span data-dcnode-id="2442" instrument_node="">Throughout the whole movie, Thatcher seems the only woman to inhabit Britain. Even if at the end of her career there must have been other women in politics, she is always shown alone among the men.</span><br data-dcnode-id="2441"><br data-dcnode-id="2440"><span data-dcnode-id="2439" instrument_node="">Interspersed is far too much original footage, so that the whole editing looks homemade, with grainy old footage mixed in whenever the "narration" gets stack. Not that there is much narration to speak of. just the old lady alone with Dennis'ghost. </span><br data-dcnode-id="2438"><br data-dcnode-id="2437"><span data-dcnode-id="2436" instrument_node="">As far as Streep interpretation is concerned, I found her annoying, even if accurate in her accent. More than an interpretation, it seemed a caricature,grotesque and excessive. She seemed demented even when she was playing "normal". Also weird and grotesque Jim Broadbent as Dennis and supremely weird the angle we are shown Thatcher's colleagues and interlocutors.</span></div><span data-dcnode-id="2434" instrument_node="">
</span><span data-dcnode-id="2433" instrument_node="">

</span><a class="title" data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw2559438/"><span data-dcnode-id="2364" instrument_node=""> The Iron Lady Is More Than A Little Rusty
</span></a><span data-dcnode-id="2362" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2354"><span data-dcnode-id="2361" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2358"><a data-dcnode-id="2359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur4038332/"><span data-dcnode-id="2360" instrument_node="">the_rattlesnake25</span></a></span><span class="review-date" data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">2 February 2012</span></span><span data-dcnode-id="2355" instrument_node="">
</span></div><span data-dcnode-id="2353" instrument_node="">
</span><div class="content" data-dcnode-id="2311"><span data-dcnode-id="2352" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2314"><span data-dcnode-id="2351" instrument_node="">It is not a rare occurrence to see a biopic centred on a political figure emerge during any given calendar year, nor is it uncommon to see a biopic appear when the subject is still alive. But, it is unusual to see a film materialize when the said political figure is controversial in nature and divides opinion across the board.</span><br data-dcnode-id="2350"><br data-dcnode-id="2349"><span data-dcnode-id="2348" instrument_node="">Director Phyllida Lloyd proves why it is so unusual in her biopic of Margaret Thatcher entitled 'The Iron Lady' – the nickname attributed to Thatcher by the Soviet press after her scathing attack on the Communist model – which gently saunters between the important political moments in her life, whilst also trying to convey an appearance of regret, sadness and guilt by creating a humanized portrayal of a woman once dubbed "the most hated woman in British Politics."</span><br data-dcnode-id="2347"><br data-dcnode-id="2346"><span data-dcnode-id="2345" instrument_node="">But instead of creating an engaging piece which examines the life of one of the most enigmatic Prime Ministers of the twentieth century, the audience instead is left with a dull, uninspired mess which simply evades some of the most important social, economic and political events of her life to instead attempt to create some semblance of regret and humanity from the inner depths of this aging former Head of State.</span><br data-dcnode-id="2344"><br data-dcnode-id="2343"><span data-dcnode-id="2342" instrument_node="">Told through the flashbacks of an ailing former Head of State, Margaret (Meryl Streep) constantly engages in conversation with her deceased husband Denis (Jim Broadbent) and her daughter Carol (Olivia Colman), as she remembers past events – the good, the bad and the downright terrible – during her time as a young woman attempting to achieve some form of acceptance in the male-centric world of British politics, and finally as the first female head of a Western government.</span><br data-dcnode-id="2341"><br data-dcnode-id="2340"><span data-dcnode-id="2339" instrument_node="">From the tender opening moments to the solemn conclusion of this biopic, Phyllida Lloyd sets out to portray Maggie as a human being through her declining on-screen health which also mirrors the current state of the former Prime Minister. At eighty-six years old, Thatcher is understandably frail with her mental health constantly on the decline; it is an unfortunate prerequisite of aging, but it is not only common to those who have lived polarised lives in the eyes of the British public.</span><br data-dcnode-id="2338"><br data-dcnode-id="2337"><span data-dcnode-id="2336" instrument_node="">While Lloyd shows Thatcher constantly remembering past events, she never imposes any judgement, opinion or verdict upon anything that is visualized, instead treating it as a nostalgic and deeply sentimental walk-down-memory lane. Maggie remembers her successes and failings, but falls short of actually stating some form verdict on her past choices. Instead of watching a frail Margaret Thatcher dissect the events of her life, the audience is simply left to, uninterestingly, watch as they're recreated.</span><br data-dcnode-id="2335"><br data-dcnode-id="2334"><span data-dcnode-id="2333" instrument_node="">Aside from the portrayal of the frailty of Thatcher, her career itself is constantly over-shadowed by the more tender moments that Lloyd wishes to portray. The audience is essentially treated to a simple-minded examination of her early political career which extends as far as saying that Margaret Thatcher went into politics because she had ambition, found trouble in the form of institutionalized sexism and eventually established herself due to her husband Denis's influence as a middle-class businessman.</span><br data-dcnode-id="2332"><br data-dcnode-id="2331"><span data-dcnode-id="2330" instrument_node="">Other major events in Thatcher's career, including her challenge and rise to the leadership of the Conservative Party and the various controversial policies introduced during her reign as Prime Minister (privatisation, unemployment and the closure of twenty-five coal mines in 1985 among others) are simply portrayed as minor events.</span><br data-dcnode-id="2329"><br data-dcnode-id="2328"><span data-dcnode-id="2327" instrument_node="">Very little of the one hour and forty-five minute running time concerns itself with these events, aside from the occasional use of archive footage depicting public anarchy in the United Kingdom during the testing times of economic hardship during the 1980's, the audience is left to understand little in the way of why Thatcher chose to commit to certain policies except for the fact that she was a stern and incredibly stubborn woman when it came to deciding what and where she would impose upon the British public.</span><br data-dcnode-id="2326"><br data-dcnode-id="2325"><span data-dcnode-id="2324" instrument_node="">However, despite the major flaws in the form of Lloyd's film wishing to be somewhat of a cinematic memorial to Thatcher rather than a straight-edged biopic examining her tumultuous life, the saving grace comes in the form of Meryl Streep's wonderful performance as the famous leading lady. She is strong, commanding and visceral as Baroness Thatcher, constantly dominating the screen and drawing the audience's attention toward her prestigious manner.</span><br data-dcnode-id="2323"><br data-dcnode-id="2322"><span data-dcnode-id="2321" instrument_node="">Jim Broadbent as her late husband Denis, Richard E. Grant and Anthony Head among others, are depicted somewhat as 'Spitting Image-esque' caricatures of men who were nothing more than emasculated doormats in both a personal and a political cabinet, who didn't have the guts and gall to stand up to their overbearing leader. While Olivia Colman provides the only true emotional response in the form of Maggie's daughter Carol Thatcher, but these performances cannot save Lloyd's film from its own severe narrative flaws.</span><br data-dcnode-id="2320"><br data-dcnode-id="2319"><span data-dcnode-id="2318" instrument_node="">Since its inception, Phyllida Lloyd's Margaret Thatcher biopic has courted controversy among the family and various political circles of the former Prime Minister, and it is this controversy which has no doubt had a profound effect on the production of the film. Rather than becoming an intricate and interesting examination of a woman who was, and still is, worshipped and loathed by many members of the general public in Great Britain and Ireland, it instead became a slow inoffensive look at a woman who at eighty-six years old is shown to regret some aspects of her life.</span><br data-dcnode-id="2317"><br data-dcnode-id="2316"><span data-dcnode-id="2315" instrument_node="">'The Iron Lady' has an enormous amount of untouched potential that another director, producer or artist should be looking to exploit in the immediate future. And whoever should tackle this biopic, should once again call upon the talents of Meryl Streep and Olivia Colman as their performances save this film from being more boring and dreary than the most recent Conservative Party Conference.</span></div><span data-dcnode-id="2313" instrument_node="">

</span></a><span data-dcnode-id="2241" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="2233"><span data-dcnode-id="2240" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="2237"><a data-dcnode-id="2238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur37834951/"><span data-dcnode-id="2239" instrument_node="">maximkong</span></a></span><span class="review-date" data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">18 November 2012</span></span><span data-dcnode-id="2234" instrument_node="">
</span></div><span data-dcnode-id="2232" instrument_node="">
</span><div class="content" data-dcnode-id="2214"><span data-dcnode-id="2231" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="2217"><span data-dcnode-id="2230" instrument_node="">This movie does not deserve my time to write a review on it but anyway, the reviews from actual colleagues of Margaret are already available online and I have copied the press release from the people that matters (and by the way, Meryl, at least you deserve the award this time around for not playing so much as yourself like you did in your other acting roles) </span><br data-dcnode-id="2229"><br data-dcnode-id="2228"><span data-dcnode-id="2227" instrument_node="">'It bears little resemblance to reality': Mrs Thatcher's former personal assistant lashes out at film for portrayal of Iron Lady" Cynthia Crawford, who worked for Lady Thatcher throughout her Downing Street tenure, said some scenes in the £10million film were 'totally unrelated to the truth'.</span><br data-dcnode-id="2226"><br data-dcnode-id="2225"><span data-dcnode-id="2224" instrument_node="">She attacked the decision to release the film during the 86-year-old former prime minister's lifetime as 'beyond the boundaries'. Mrs Crawford, nicknamed Crawfie, became a confidante to Lady Thatcher after she began working for her in 1978, and still visits her regularly. Mrs Crawford, 74, said: 'The dementia scenes are disproportionate to her life and her business and her being prime minister, I think that's really very sad - Lady Thatcher's policy was you look forward and you don't look back. 'If they had made the film about the 11-and-a-half years of her life as prime minister it could have been absolutely fantastic.' Miss Streep, 62, won a Golden Globe this week for her portrayal of Lady Thatcher and she has also been nominated for a Bafta and tipped for an Oscar. In her acceptance speech at the awards ceremony in Los Angeles she thanked 'everybody in England that let me come and trample all over their history', but faced accusations of ungracious behaviour for failing to thank Lady Thatcher.</span><br data-dcnode-id="2223"><br data-dcnode-id="2222"><span data-dcnode-id="2221" instrument_node="">Mrs Crawford said Miss Streep had captured the former prime minister's voice and her mannerisms, but said she 'hadn't quite got the walk'. She praised scenes depicting her career, including her role in the Falklands and the miners' strike, saying: 'I thought those were done well but the dementia scenes were not.' She added: 'I can assure you that all the domestic scenes in the film are just absolutely inconceivable. They're just not right and totally unrelated to the truth.' Mrs Crawford said: 'To produce this in Lady Thatcher's lifetime is beyond the boundaries and very cruel, but it is only a film, which will soon be forgotten. Her name and her legacy will forever be mentioned in the history of Great Britain.' She has become the latest of her friends and ex-colleagues to criticise the film, which focuses on Lady Thatcher's battle with dementia. '</span><br data-dcnode-id="2220"><br data-dcnode-id="2219"><span data-dcnode-id="2218" instrument_node="">{This excerpt was sourced from the Daily Mail}</span></div><span data-dcnode-id="2216" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="2087"><span data-dcnode-id="2103" instrument_node="">Although Meryl Streep's performance was truly brilliant, the film was not.</span><br data-dcnode-id="2102"><br data-dcnode-id="2101"><span data-dcnode-id="2100" instrument_node="">The switch from now to past events and back again didn't seem to follow any logic and everything seemed to be treated in an over superficial manner. There are a few substantial historical inaccuracies with regard to the Labour Party. </span><br data-dcnode-id="2099"><br data-dcnode-id="2098"><span data-dcnode-id="2097" instrument_node="">*Spoilers*</span><br data-dcnode-id="2096"><br data-dcnode-id="2095"><span data-dcnode-id="2094" instrument_node="">Far too many newsreel clips are used from the actual time, superimposed by Mrs Thatcher's car being mobbed by angry protesters. At no point were protesters ever able to get that close to the PM's car and such incidents showing people actually pressing up against the car are entirely fictitious.</span><br data-dcnode-id="2093"><br data-dcnode-id="2092"><span data-dcnode-id="2091" instrument_node="">The leader of the opposition is incorrectly shown as Michael Foot during the Heath government, when he didn't become leader of the party until after Labour's defeat in 1979. The actual leader was Harold Wilson who isn't even portrayed in the film.</span><br data-dcnode-id="2090"><br data-dcnode-id="2089"><span data-dcnode-id="2088" instrument_node="">During Margaret Thatcher's time as the Leader of the Opposition, Harold Wilson was Prime Minister, resigning in favour of James Callaghan who actually lost the election to Mrs Thatcher in 1979. Again omitted by the film.</span></div><span data-dcnode-id="2086" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">THE IRON LADY is an ultimately disappointing biopic of the female Conservative prime minister and the fault lies almost entirely with the screenplay. For some reason, the decision was made to set the film at the end of Thatcher's life, when she was beset by dementia and constantly hallucinating and remembering better days. The genuinely good bits are all shown in flashbacks chronicling her rise to power and the major events of her leadership. I found the whole dementia plotting to be more than a little distasteful and unnecessary; it gets repetitive after a while and doesn't really add anything to the story. It's a shame that nobody can tell their stories in a simple chronological way anymore. As for Meryl Streep, she gets the accent spot on for the most part, but looks nothing like Thatcher and feels very hollow inside. The distracting old age prosthetics don't help much either. The actress playing the young version is much more convincing. The supporting cast are great too but have oh-so-little to contribute here.</span></div><span data-dcnode-id="2006" instrument_node="">

</span><path d="M10.197 0L6 4.304 1.803 0 0 1.85 6 8l6-6.15" data-dcnode-id="1939" fill="#2572B3" fill-rule="evenodd"></path><span data-dcnode-id="1938" instrument_node="">

</span><div class="content" data-dcnode-id="1912"><span data-dcnode-id="1929" instrument_node="">
</span><div class="text show-more__control" data-dcnode-id="1915"><span data-dcnode-id="1928" instrument_node="">I steeled myself to watch this film; I had seen the trailer and it had filled me with fear. Donning a Kevlar vest and protective wrap-round glasses to deflect excessive radiation, I entered the cinema with grim anticipation of camp heart-of-darkness horror. As it turned out though, "The Iron Lady" is more sugar-sweet seduction than full-steam-ahead torpedo fire and that soft approach may be more insidious for the target audience. The use of Baroness Thatcher's dementia to explore the woman's history in flashback sequences is a useful distancing device that at once humanises her but removes and dehumanises the victims of her policies, and this becomes both the film's saving grace (aside from its lead actor) as a character study and its weakness as a historical document.</span><br data-dcnode-id="1927"><br data-dcnode-id="1926"><span data-dcnode-id="1925" instrument_node="">The film simply wouldn't have worked without Meryl Streep in the lead role: Streep all but submerges herself in the character of Thatcher. Her portrayal of MT looks eerily accurate: she embodies MT's vulnerabilities as wife, mother, politician, Prime Minister and dementia victim as well as the woman's more familiar public face as formidable and steely. One highlight scene comes near the end in which MT in the twilight years of her reign holds a meeting with her Cabinet and one man confesses he hadn't given her an important timetable and the paper he has handed to her is a first draft; Thatcher rips him apart over his spelling and tardiness and the other ministers around him wilt from the full force of the burning light streaming from her being. At once viewers see MT as she must have appeared to her minions – exacting and tough as nails – and also cracks in the carapace: the expression on her face after her ministers depart softens and shows exhaustion and her fingers and hands tremble, as though to suggest that whipping the errant minister took more out of her than of him.</span><br data-dcnode-id="1924"><br data-dcnode-id="1923"><span data-dcnode-id="1922" instrument_node="">Apart from Streep's astonishing acting, the film itself has little plot and must rely on Thatcher's career from the 1950s to her downfall in 1990 for narrative direction. Jim Broadbent and Olivia Colman as Thatcher's husband Dennis and daughter Carol are little more than one- dimensional stereotypes: Dennis shows nothing of the forceful millionaire businessman who supported MT financially and smoothed her path to No 1 top dog, and Carol is reduced to a caregiver role. (In real life, Carol is a journalist / writer / media celebrity who started her career working for The Sydney Morning Herald in Australia.) Son Mark Thatcher barely figures in the film and that along with other moments indicates an extreme unwillingness on the script's part to confront some of the less savoury aspects of MT's general career and ideological persuasion: far from refusing to work with fascist thugs as suggested in the film's Falklands War episode, the British worked with fascist-ruled Chile during that war; and MT's son was later investigated by South African authorities in the late 1990s for loan sharking and was also accused of racketeering in Texas about the same time. (And of course there was that little Equatorial Guinea coup d'état attempt escapade in 2004 for which Mark Thatcher was fined 3 million rand and received a suspended jail term.) Other characters in the film simply flit by and register very little on viewers' radar.</span><br data-dcnode-id="1921"><br data-dcnode-id="1920"><span data-dcnode-id="1919" instrument_node="">Even as a sympathetic and small-scale character study, the film has obvious flaws and omissions: what happened in the young Margaret Roberts's life as grocer's daughter that made her decide to enter politics at a time when women were expected to be wives and stay-at-home mothers? What happened later on to prompt her to challenge for the Conservative Party leadership in the mid-1970s? (It cannot just have been a desire to upset people.) Why did she decide to change her image from a dowdy housewife politician with a shrill voice to a hard-headed plutonium blonde bombshell with the deep throaty tones? Where and how did she acquire and adopt the economic philosophy, championed by economists Milton Friedman and Frederick Hayek, of less government intervention and greater privatisation of the economy that was to transform Britain so much during her tenure as Prime Minister and beyond? The film's narrow focus on Thatcher as a child of the working classes fighting entrenched social and economic class-based attitudes and becoming a role model to all women diverts viewers' attention away from asking these and other uncomfortable questions about how politicians use public relations and spin-doctoring to further their careers and impose particular ideologies and polices on a restive populace. Posing MT as a role model for girls and women in fighting gender inequality also overlooks the fact that MT is consistently shown to be a woman with a somewhat masculine style of thinking and behaving that likely would alienate and drive away any potential female friends and allies.</span><br data-dcnode-id="1918"><br data-dcnode-id="1917"><span data-dcnode-id="1916" instrument_node="">Remove Streep and what is left? Hardly anything that would qualify as a film: the ending in which the ghost Dennis finally disappears from Thatcher's life is comic and leaves the film hanging as it were from an invisibly crumbling cliff. This in itself says something that subtly and ironically undercuts the film's message: for all her being championed as a role model and leader for women in politics, Margaret Thatcher ultimately depended on a man of wealth and elevated social position to rise to the top.</span></div><span data-dcnode-id="1914" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">One spent so much time detesting Margaret Thatcher's policies and its consequences that one forgets she was a human being. Silly isn't it? Yes, but true. Now Meryl Streep, with all her powers, reminds us. Mrs Thatcher was a real person, a real woman and no matter how much we disagree with her, we cannot dismiss her. Meryl Streep makes sure of that. Her performance is an extraordinary piece of art and I have the feeling that it will grow in meaning and scope as time goes on. The humanity of the actress at the service of a political icon that thought that it didn't matter what people felt but what they thought as if the two were mutually exclusive. Thank you Meryl Streep, you've done something that my grandchilden's grandchildren will benefit from.</span></div><span data-dcnode-id="1864" instrument_node="">

</span><a class="title" data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw4567035/"><span data-dcnode-id="1794" instrument_node=""> The Iron Lady rusts into a melodramatic biopic that needed ironing out.
</span></a><span data-dcnode-id="1792" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1784"><span data-dcnode-id="1791" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1788"><a data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur67902729/"><span data-dcnode-id="1790" instrument_node="">TheMovieDiorama</span></a></span><span class="review-date" data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">7 January 2019</span></span><span data-dcnode-id="1785" instrument_node="">
</span></div><span data-dcnode-id="1783" instrument_node="">
</span><div class="content" data-dcnode-id="1777"><span data-dcnode-id="1782" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Political films, including biopics, are often fraught with personal views from critics and audiences. Atleast that is what I told myself to explain the low scoring reviews. Having now seen this, there is a more sinister issue that has manifested itself. An ageing Margaret Thatcher, now suffering with dementia, remembers the fading memories of her powerful and prolific life. Regardless of your own political views and whether or not you agree with the controversial choices that she made. There is no denying she was an important figure in British politics and an empowering woman who stood up against her peers and rivals. If you were to watch this, you would've got a glimpse of that power and ruthlessness. Unfortunately, The Iron Lady feels more like "The Frail Woman". Exploiting an illness such as dementia and utilising it as a plot device to build a narrative, is terribly unscrupulous for any individual. Purposefully attempting to inject sympathy for the eponymous figure, it actually makes the whole ordeal cold and disconnected. Her personable qualities are detracted as we watch this once strong person become frail and weak, preventing you from emotionally connecting with her. At only 104 minutes long, about half of that runtime is used effectively in portraying Thatcher's career. But even then the Brighton bombing, the miners' strike and Falklands War were vastly glossed over to make more room for her dementia. It's unashamedly insensitive, which is frustrating when considering Streep's magnificent transformative performance. She truly became Thatcher, to the point where Streep vanished. In fact, the entire cast were excellent, particularly Broadbent. Newman's score is consistently good as always, and cosmetic aspects were well executed. However, for a film about the most uncompromising and longest-serving Prime Minister of the UK, this biopic failed to provide that power. A fragmented narrative resembling the degenerative process of dementia was not the correct method of storytelling. At all.</span></div><span data-dcnode-id="1779" instrument_node="">

</span></a><span data-dcnode-id="1707" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1699"><span data-dcnode-id="1706" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1703"><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur3092368/"><span data-dcnode-id="1705" instrument_node="">DJRMewzique</span></a></span><span class="review-date" data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">13 January 2012</span></span><span data-dcnode-id="1700" instrument_node="">
</span></div><span data-dcnode-id="1698" instrument_node="">
</span><div class="content" data-dcnode-id="1674"><span data-dcnode-id="1697" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1677"><span data-dcnode-id="1696" instrument_node="">At last, the long-awaited film of the life of Margaret Thatcher arrived in theatres and, more importantly, the long-awaited performance of guaranteed-another-Oscar-nomination Meryl Streep.</span><br data-dcnode-id="1695"><br data-dcnode-id="1694"><span data-dcnode-id="1693" instrument_node="">With a bit of a thud.</span><br data-dcnode-id="1692"><br data-dcnode-id="1691"><span data-dcnode-id="1690" instrument_node="">Entering the theatre, I hoped this film would be an entertaining history lesson on the reign of the much loved/hated Thatcher, as I remember her being in power, but as I was a kid, I remember little about any details of her days ruling the UK. However, by the time the credits rolled, I felt I didn't learn very much. At all.</span><br data-dcnode-id="1689"><br data-dcnode-id="1688"><span data-dcnode-id="1687" instrument_node="">Early reviews critiqued this film for focusing too much on Thatcher in her later years, stricken with dementia. This is couldn't be any more true. In a very clichéd, seen-it-all-before fashion, Thatcher's life is rolled out in fragmented segments as an older Thatcher reminisces with the ghost of her late husband, played by Jim Broadbent.</span><br data-dcnode-id="1686"><br data-dcnode-id="1685"><span data-dcnode-id="1684" instrument_node="">Yes, The Iron Lady is primarily portrayed as a woman who speaks with a hallucination of her husband, thus making her flashbacks seem less like fact and more like fanciful bit memories of a crazy person. Very short, sporadic flashbacks that don't offer up much detail, nuance or information and insight into the woman herself. It was more like looking through a flashback of headlines that lead you to skim through the article rather than reading it.</span><br data-dcnode-id="1683"><br data-dcnode-id="1682"><span data-dcnode-id="1681" instrument_node="">And such a delivery is a real disservice not just to an audience craving some real glimpse into the life of the first female leader of the Western world, but to both Thatcher and Meryl Streep themselves, whose riveting performance is lost in a film with no real direction, focus or substance.</span><br data-dcnode-id="1680"><br data-dcnode-id="1679"><span data-dcnode-id="1678" instrument_node="">There is no doubt that the Golden-Globe-nominated Streep is a lock for her seventeenth Oscar nomination, as her transformation into the titular woman of iron is extraordinary. Sadly, I cannot say the same about the film.</span></div><span data-dcnode-id="1676" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Meryl Streep's performance in this movie was phenomenal. Unfortunately the movie (if you can call it that) was not. If you want to go see a movie about the life and career of Margaret Thatcher do not waste your time. If you want to see an elderly woman struggling with dementia for 2 hours then this is your movie. The movie barely goes over Thatcher's rise to prime minister or her personal life. Instead 80% of the movie focuses on Thatcher's current health state, only showing her confused and disoriented. The movie does a few 5 minute flashes to her past but it probably only amounts to about 25 minutes. Finally I find it despicable that instead of highlighting Thatcher's achievements, Hollywood choose to exploit her dementia a condition she has kept from the public and tried to be extremely private about.</span></div><span data-dcnode-id="1591" instrument_node="">

</span><a class="title" data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw2562122/"><span data-dcnode-id="1521" instrument_node=""> Wrong, Highly Unethical Concept
</span></a><span data-dcnode-id="1519" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1511"><span data-dcnode-id="1518" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1515"><a data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur22584681/"><span data-dcnode-id="1517" instrument_node="">vespet2000</span></a></span><span class="review-date" data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">7 February 2012</span></span><span data-dcnode-id="1512" instrument_node="">
</span></div><span data-dcnode-id="1510" instrument_node="">
</span><div class="content" data-dcnode-id="1483"><span data-dcnode-id="1509" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1486"><span data-dcnode-id="1508" instrument_node="">It's simply wrong to make a biographical film about a person, as extraordinary as Margaret Thatcher and devote, I don't know, 70 or 80% of the time to her rather depressing late years of deteriorating health, especially on the mental side. And the real life Margaret Thatcher is a rather private person who tried to keep her health problems secret. Thus, most of what this film presents is obviously a piece of guesswork. Moreover, Thatcher's children described the film as "left-wing fantasy" and we also know that Thatcher's daughter Carol was often with her during this period. So, what's the point of a film, that pretends to be "biographical" when 80% of it is guesswork at best, and somebody else's fiction at worst? </span><br data-dcnode-id="1507"><br data-dcnode-id="1506"><span data-dcnode-id="1505" instrument_node="">It is also highly unethical to delve into the mental condition of a living person who tried and tries to keep her private life and health issues really private. There are reasons why we call it "private" and doctor-patient confidentiality "confidential". It seems like those principles are beyond the intellectual (moral, or both) capacity of the Hollywood suits behind this movie.</span><br data-dcnode-id="1504"><br data-dcnode-id="1503"><span data-dcnode-id="1502" instrument_node="">Thatcher became a household name, not only in the UK, but throughout the world, and yet, all her political achievements are presented in a telegraphic style, sometimes just as segments of a news bulletin read by some news presenter. She was called 'the iron lady' by the Soviet propaganda machine in an attempt to discredit her image, her strong positions and alliance with Reagan formed the core of the entire Western policy toward the Soviet union resulting in winning the Cold War, and yet, the authors of this movie choose to completely disregard this side of her story, as if this was some annoying mosquito, just spoiling the bizarre shadenfreude fun they are having with the senile, 80-year old lady.</span><br data-dcnode-id="1501"><br data-dcnode-id="1500"><span data-dcnode-id="1499" instrument_node="">Thatcher herself is adamant during one of her fights with her husband that he always knew she puts her works first and yet, the film tries to focus on her private life issues, again, by means of sheer guesswork. Why? The only explanation is ideological spin, since the creators try to present the old and rather frail former prime minister as sad, doubting her past, and in some scenes she is even insecure not only as an old, senile lady, wandering around her digs, but also during her prime time, as a head of government. Priceless screening time is wasted while none of the issues she had to deal with is presented with any depth whatsoever.</span><br data-dcnode-id="1498"><br data-dcnode-id="1497"><span data-dcnode-id="1496" instrument_node="">Occasionally, the film is reduced to a vaudeville, as in the scene where she is about to enter her No.10 residence for the first time as a PM or employs one-dimensional clichés, such as the symbolism of Thatcher talking about 'taking the wheel in her own hands' and then pushing the car to the right, while her daughter is in the driving seat. What is the purpose of this demented symbolism? No matter how unwashed the masses are, they can still figure that this film is about a confident, self-made woman who takes matters in her own hands and pushes her country to the right. Why an obvious metaphor, pointing at the obvious? </span><br data-dcnode-id="1495"><br data-dcnode-id="1494"><span data-dcnode-id="1493" instrument_node="">The only true merit, that can be attributed to this unhinged and rather prolonged exercise in shadenfreude, is that it represents the true spirit of her public life in general – a strong-willed, principled person, a woman with SPINE, successfully fighting against an intellectually and morally constipated establishment, unhinged left-wing militants and impotent political opposition. Well, the political opposition turned out impotent because it was Margaret Thatcher who single-handedly rendered it that way. There are some truly powerful moments, however, when the young Margaret was listening to her father's speech, clearly, his words having authoritative, formative, inspirational influence on what she was about to become, or when she masterfully fights off the attacks of both her political opponents and spineless colleagues.</span><br data-dcnode-id="1492"><br data-dcnode-id="1491"><span data-dcnode-id="1490" instrument_node="">Obviously, Meryl Streep is a very good actress, and she is spot on Thatcher's voice and mannerisms, but this is just good professionalism, nothing extraordinary, way too many actors are capable of doing that these days. Does she deserve another Oscar for this performance? If there is nothing better this year on the movie front in her category, hell yes.</span><br data-dcnode-id="1489"><br data-dcnode-id="1488"><span data-dcnode-id="1487" instrument_node="">The only reason this picture should be seen is as a weird example of how a biopic (of a person of Margaret Thatcher's caliber) should not be made,it's a half-baked distraction of what her real biography should look like .</span></div><span data-dcnode-id="1485" instrument_node="">
</span><span data-dcnode-id="1484" instrument_node="">

</span><a class="title" data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/review/rw2526972/"><span data-dcnode-id="1415" instrument_node=""> Streep is mesmerising in this beautifully made human drama of a woman who changed the face of Britain
</span></a><span data-dcnode-id="1413" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1405"><span data-dcnode-id="1412" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1409"><a data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur18874471/"><span data-dcnode-id="1411" instrument_node="">theycallmemrglass</span></a></span><span class="review-date" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">1 December 2011</span></span><span data-dcnode-id="1406" instrument_node="">
</span></div><span data-dcnode-id="1404" instrument_node="">
</span><div class="content" data-dcnode-id="1386"><span data-dcnode-id="1403" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1389"><span data-dcnode-id="1402" instrument_node="">Saw this very early preview screening in London.</span><br data-dcnode-id="1401"><br data-dcnode-id="1400"><span data-dcnode-id="1399" instrument_node="">This was a most beautifully made film, funny and very poignant. There is absolutely no question in my mind that Meryl Streep has sealed her umpteenth term in the greatest actress office. She is absolutely spellbinding. Like Thatcher, with her male cabinet, Meryl Streep grabs her co stars by the balls and roars "gentleman, I WILL get another Oscar". She will and she deserves it, there is no actress I can think of in the last 2 centuries that can match her versatility and greatness. I could watch this again a couple more times just to absorb Streep's beautiful, immaculate and nuanced performance. OK I must stop my love letter to Streep.</span><br data-dcnode-id="1398"><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">Admirably, this film really doesn't paint any biased view of Thatcher whatsoever. It neither glorifies or humiliate her, it just tells a very human story about a woman that happened to changed the face of Britain. It covers both her flaws and virtues. We see her drive, tenacity, perseverance, intelligence , and her love and dependence for Dennis countered by her insecurities, bullying, and self pity. No one can deny that Thatcher was always a lady of fierce conviction (hence the obvious nickname and title of the film). It was her asset and her downfall and that is what this is mainly about. All the political events occur in the background, the focus is always on the mind of Thatcher. It also covers a great deal of her twilight years which is both funny and sad as she deals with dementia. The film is structured in flashbacks which I admit is rather old hat but is very well done.</span><br data-dcnode-id="1395"><br data-dcnode-id="1394"><span data-dcnode-id="1393" instrument_node="">The supporting cast are great, particularly the ever reliable Jim Broadbent as Dennis Thatcher and Anthony Head as Geoffrey Howard (her loyal aide) but they are all so tiny compared to...OK, I said I wont mention Streep again...but you know...she is the greatest. Ever.</span><br data-dcnode-id="1392"><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node="">A must see. Even Thatcher haters can enjoy many moments of Thatcher suffering in the film. And for those of you who aren't too familiar with Margaret Thatcher, either because you are too young or live across the pond, enjoy this for Meryl Streep's stunning craftsmanship.</span></div><span data-dcnode-id="1388" instrument_node="">

</span></a><span data-dcnode-id="1316" instrument_node=""> </span><div class="display-name-date" data-dcnode-id="1308"><span data-dcnode-id="1315" instrument_node="">
</span><span class="display-name-link" data-dcnode-id="1312"><a data-dcnode-id="1313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/user/ur15362855/"><span data-dcnode-id="1314" instrument_node="">Nigelees</span></a></span><span class="review-date" data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">10 February 2012</span></span><span data-dcnode-id="1309" instrument_node="">
</span></div><span data-dcnode-id="1307" instrument_node="">
</span><div class="content" data-dcnode-id="1301"><span data-dcnode-id="1306" instrument_node="">
</span><div class="text show-more__control clickable" data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">I watched the Iron Lady last night and quite frankly I am amazed at some of the reviews which state that the film is a disappointment despite an outstanding performance from Meryl Streep. Firstly, I really don't think that this film is about politics and naturally all those who viewed it expecting to see a retrospective of Margarets time as PM would be disappointed. But the film is about life. All of us could,in time , suffer in the same way. The film is clearly about the ravages of old age on a person who literally was a giant among men. She had to fight at every turn for her principles and whether you agreed with them or not she had more courage than most. The greatest compliment I can make about this film is that from the first few minutes I was not watching Meryl Streep but Thatcher herself as her performance is truly amazing. It isn't the fact that it is an impression as some have said it is the subtle nuances - movement of the head, a slight cough, a look etc. It isn't surprising that she has been Oscar nominated for this performance and in my view she will win hands down. If you want to see a well constructed study of life in decline go see this film but if you're looking for a biopic of her life in power don't bother.</span></div><span data-dcnode-id="1303" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1092"><span data-dcnode-id="1105" instrument_node="">*Contains Spoilers* Just been to see The Iron Lady and was sorely disappointed with the film from start to finish. The main reasons for me were because.....</span><br data-dcnode-id="1104"><br data-dcnode-id="1103"><span data-dcnode-id="1102" instrument_node="">The majority of the film is centred around Margaret Thatcher in her later years and how she is coping with life without her husband, Denis, and with onsetting memory loss and ill health. I was looking forward to getting more insight into her time in politics as Prime Minister. Unfortunately the focus is simply not there and felt in short supply in terms of screen time for when these were broached.</span><br data-dcnode-id="1101"><br data-dcnode-id="1100"><span data-dcnode-id="1099" instrument_node="">The little time that there is reference in the film to some of the major events (riots, Falklands, IRA, Brighton bombing etc) these are always associated with real footage, and these simply did not work for me. The juxtaposition between shots of Margaret &amp; her entourage versus the real footage is so jarring as to feel almost amateurish in my opinion.</span><br data-dcnode-id="1098"><br data-dcnode-id="1097"><span data-dcnode-id="1096" instrument_node="">I'm not going to make any comment on the actual politics of Margaret Thatcher (everyone will have their own feelings on 'MT' as a person &amp; as a politician), but interestingly there seemed to be a real reluctance in the film to do this either. There was no full exploration of the good v the bad in terms of Margaret's behaviour or decision-making / the real political successes v the real political failures etc. I suspect there was a lot of 'smoothing over' of some of the events when the hard-hitting facts would have made for a far more interesting watch.</span><br data-dcnode-id="1095"><br data-dcnode-id="1094"><span data-dcnode-id="1093" instrument_node="">Sadly, I only have to compare The Iron Lady to The Ides of March to see how much of a disappointment The Iron Lady is and what a wasted opportunity to make an exceptional film about a well-known Brit. Whether Meryl Streep's performance will land her an Oscar, we'll wait and see, but to me there seems something a bit incongruous with someone winning a best actor/actress award off the back of such a poor film overall. Sorry Meryl - loved you in It's Complicated!</span></div><span data-dcnode-id="1091" instrument_node="">

</span><div class="text show-more__control" data-dcnode-id="1003"><span data-dcnode-id="1013" instrument_node="">During a montage where Margaret Thatcher's rising in the polls and is, for her party at least, on top of her political game, an aggressive punk rock tune blasts over the scene – and it's against Margaret Thatcher. There you have the underlying tone of this biopic weaving back and forth from an aged Thatcher, hallucinating her dead husband and trying to recall pieces from a jigsaw puzzle life, to the young climber growing up poor, asserting herself as a lone woman amongst the barking men of Parliament, and eventually becoming Prime Minister of England.</span><br data-dcnode-id="1012"><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">But we never get to know who she was, what she did, or why she did it; unless you count sporadic jump cuts of mobs protesting against her, which, like that punk song, provides a subliminal cue card to remind the audience how and what to feel, but never why.</span><br data-dcnode-id="1009"><br data-dcnode-id="1008"><span data-dcnode-id="1007" instrument_node="">Now the question: How was Meryl Streep's performance? Well the iconic actress, donning surprisingly realistic Aged makeup, does a fine job as the older Thatcher struggling to hold her mind together – but it's impossible to judge her as the historical figure since another actress played the assertive young woman who fought for that place where, by the time Streep takes over, is lost in a jumbled collection of newsreels and pointless monologues... always returning to the old lady suffering the beginning stages of dementia, who, like the film itself, is never quite sure what's going on.</span><br data-dcnode-id="1006"><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">For More Reviews: www.cultfilmfreaks.com</span></div><span data-dcnode-id="1002" instrument_node="">
