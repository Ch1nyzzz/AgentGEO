</span><h1 class="entry-title" data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">The Lady Arthur of&nbsp;Camelot</span></h1><span data-dcnode-id="2002" instrument_node=""> </span></header><span data-dcnode-id="1999" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1975"><span data-dcnode-id="1998" instrument_node="">
</span><span class="byline" data-dcnode-id="1993"><span data-dcnode-id="1997" instrument_node="">
</span><a data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//genderfluidnews.com/author/tgkadee/" rel="author" title="Posts by Cooper &amp; Kadee"><span data-dcnode-id="1996" instrument_node="">Cooper &amp; Kadee</span></a><span data-dcnode-id="1994" instrument_node=""> </span></span><span data-dcnode-id="1992" instrument_node="">
</span><span class="cat-links" data-dcnode-id="1987"><span data-dcnode-id="1991" instrument_node="">
</span><a data-dcnode-id="1989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//genderfluidnews.com/category/uncategorized/" rel="category tag"><span data-dcnode-id="1990" instrument_node="">Uncategorized</span></a><span data-dcnode-id="1988" instrument_node=""> </span></span><span data-dcnode-id="1985" instrument_node="">

</span><time class="entry-date published updated" data-dcnode-id="1982" datetime="2021-11-03T21:32:46+00:00"><span data-dcnode-id="1983" instrument_node="">November 3, 2021</span></time><span data-dcnode-id="1981" instrument_node=""> </span></span><span data-dcnode-id="1979" instrument_node="">
</span><span class="word-count" data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">11 Minutes</span></span><span data-dcnode-id="1976" instrument_node=""> </span></div><span data-dcnode-id="1973" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1640"><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">La Demoiselle d Arthur</span></p><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">And her Knights of the Table Round</span></p><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">In which Arthur, KIng of the Britons, does find</span></p><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">himself a lady fair</span></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">It was The Feast of Saint George, and in the Great Hall of Camelot, King Arthur and his knights gathered for a banquet.&nbsp; The seven famed hearths blazed with mighty fires, and the room swam in the succulent smell of roasting pork, veal and venison.&nbsp; Servants scurried here and there, refilling mugs with ale, but the food waited– as it always did on the Feast of Saint George– for the occurence a miracle.</span></p><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">“Arthur,” Sir Yvain said, and not for the first time.&nbsp; “Just a slice.&nbsp; I am famished.”</span></p><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">“Patience,” Arthur said.&nbsp; “The meal will be all the more satisfying knowing that you earned it through your pious devotion.”</span></p><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">“But I am sooo hungry.”</span></p><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">“You will make it, my friend,” Arthur said, patting him on the wrist.&nbsp; “I am sure you will.”</span></p><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">“This waiting for miracles is for fools,” Mordred said. “Irish blarney.&nbsp; We are Celts, and it is time to admit that.”</span></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Arthur hid his irritation behind a fatherly smile. “Our faith has delivered us many victories in war. Our traditions guide our footsteps, so we do not stray…”</span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">“Into the forest of folly,” Mordred groaned.&nbsp; “Yes, I recall as you have only said that same thing to me, I don’t know?&nbsp; There are fewer stars in the heavens, I will say that much.”</span></p><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Arthur sighed.&nbsp; It was a failing on his part, but he did not like Mordred.&nbsp; Arthur, in fact, would never have awarded the arrogant young man a place at the round table, but for the fact that the boy’s mother, Morgana, had begged him, and she was his sister, and the boy his nephew.&nbsp; Yet, Arthur considered his inability to like his nephew as falling short of his Christian obligations as an Uncle.</span></p><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">“Remember, Arthur,” Lancelot said, breaking off his conversation with Percival.&nbsp; “We united England for the benefit of the future generations.”</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">“That may have been a mistake,” Arthur said, taking a sip of ale.&nbsp; “It may we have made things too easy on the young.”</span></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Mordred scowled, dreading another if you only knew how hard I had it when I was your age speech. “I need warm myself by the fire,” Mordred said, getting up and sauntering over to one of the great hearths, mug of ale in hand.&nbsp; As he walked, he marvelled at the floor of the great hall– all intricate mosaic tiles, artfully laid out in the images of the Roman gods– a floor left over from those who originally constructed this mighty hall, the Roman Legions who had held this fort, it was said, for many hundreds of years.</span></p><span data-dcnode-id="1924" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">There was the image of a man atop a mountain, bolt of lightning in his hands.&nbsp; A woman hunting. Few Britons remembered anymore who these Gods were, their stories, but the images had always fascinated Mordred, and since he’d first come here as a child, he’d made up stories to go with the images.</span></p><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">The walls of Great Hall had been plastered and painted with the images of the Celtic Gods– and these names Mordred did know.&nbsp; Dadga, Morrigan, Brigid and Danus among so many more.&nbsp; Mordred reached up and gently lay his fingers on the image of Mighty Dagda, and his heart sang, even to grow cold as he looked over and saw the image of the cross.</span></p><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Mordred frowned and looked back to his Celtic Gods.&nbsp; His mother Morgana had told him all the stories, had told him of the way the Irish had come and turned the people of Briton against their traditions.&nbsp; “The Irish,” Morgana had said in disgust. “Of course, they of all people would fall in love with a religion that serves wine in the middle of the ceremony!”</span></p><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">It had only been a few generations since the Christians had come to Briton, and Morgana had filled Mordred with a zeal to restore the old gods, to sweep these Irish and their wine soaked rituals into the sea. He glanced over at Arthur, who now laughed and drank with his men, but Mordred could see the grey starting to fill his head, the wrinkles about his eyes.&nbsp; How long?&nbsp; He wondered. How long until that old fool dies, and I can fix all that he has done wrong to our people?</span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Arthur, despite Mordred’s irritating display, felt a general sense of well-being.&nbsp; Indeed, after many fierce battles, the warring kingdoms of Briton now stood united.&nbsp; The people prospered, and he’d established a uniform system of justice to be applied through all the lands.&nbsp; Built roads.&nbsp; I am, he thought, looking about the fine men gathered at his round table, perhaps the greatest king ever.</span></p><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Just as that thought crossed his mind, the doors to the great hall flung open, the steel bound oaken frames slamming against the stone walls, sending a terrible noise like thunder through the chamber.&nbsp; A chill wind came swirling into the room, followed by the clatter of horses’ hooves, and then a mighty white steed trotted into the hall, upon which rode a tiny, slender figure in flashing chain mail and an iron helmet, the visor pulled down.</span></p><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">“Ah,” Arthur called out.&nbsp; “Our miracle arrives.”</span></p><span data-dcnode-id="1903" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Mordred scowled.&nbsp; He scowled often.&nbsp; In this case, it rankled that once again Arthur and his expectations of miracles on St George’s Day had been fulfilled.</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">The tiny figure leapt from the house, landing with a “clang” and then immediately drew its sword.&nbsp; The hand of every knight went to the sword that rested next to his chair, thinking this strange little man meant harm to Arthur, but the King, trusting their visitor the manifestation of divine providence, waved his hand.</span></p><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">“Why do you come to the Court of Arthur, King of all the Britons?”&nbsp; He asked.</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">The figure lowered its sword and dropped to a knee.&nbsp; “I have come to join the round table.”</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">The men all laughed, as this figure seemed a child, and far too small to be of use in battle.&nbsp; Arthur chuckled as well.&nbsp; “Show me your face.”</span></p><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1887" instrument_node="">“Yes, your highness.”&nbsp; The helmet came off, and golden hair spilled out, pouring down over the shoulders.&nbsp; It appeared they </span><em data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">were</span></em><span data-dcnode-id="1884" instrument_node=""> speaking to a child, and a girl child at that.</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">“Are you a girl?”&nbsp; Arthur asked.</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">“Yes,” the girl said, her eyes hard, serious, determined.&nbsp; If she heard the laughter, she did not acknowledge it. “And I am pure of heart and stout of arm.&nbsp; I have come across the sea from Leon, where I had a vision of the Virgin Mary.&nbsp; She told me I was to travel here and join the round table.”</span></p><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">“Indeed?”&nbsp; Arthur said, glancing around at his men, who were all chuckling, and yet curious as well.&nbsp; This was, after all, the St George’s miracle, and so must not be dismissed. “Your name?”</span></p><span data-dcnode-id="1873" instrument_node="">
</span><p data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">“Ceridwen,” the girl said.</span></p><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Mordred, who’d been watching with practiced teen-age boredom, started at the name.&nbsp; It was the name of a celtic goddess, but could this be the shape-shifter, herself?</span></p><span data-dcnode-id="1867" instrument_node="">
</span><p data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">Arthur looked at the young girl.&nbsp; She appeared to be about 12 or 13.&nbsp; These miracles usually involved some sort of test for him or one of his knights, but in this case he’d been merely asked a question.&nbsp; Perhaps, he decided, I am called on to show grace.&nbsp; He adopted his fatherly ‘about to give bad news’ look and tone. “Well, little one, you are certainly bold to have made such a journey, and I do not question your heart.&nbsp; But, brave as you are, the life of a knight is not suited to a young girl.”</span></p><span data-dcnode-id="1864" instrument_node="">
</span><p data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Now, Ceridwen smiled.&nbsp; “Are you saying, great king, that I am too young?”</span></p><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">“Indeed,” Arthur said.&nbsp; “But what if I were to send you to be with my wife and the other ladies?&nbsp; You could try on a beautiful dress or do other such things as ladies do.”</span></p><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">“I travelled across the sea to join the round table,” the girl said.&nbsp; “And if I am too young, then I will grow older.”&nbsp; With that, she stood and waved her arms and all watched in wonder as she sprouted, growing a full foot and now standing 6 feet tall.&nbsp; No longer did she have a youthful face, but that of a grown woman.&nbsp;&nbsp;</span></p><span data-dcnode-id="1855" instrument_node="">
</span><p data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">The men all gasped.</span></p><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">“I am no longer too young.&nbsp; I request, again, that you make me one of your knights.”</span></p><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Arthur thought.&nbsp; What was the meaning of this test? He couldn’t just let any person join his retinue, and more, women were not allowed to serve as warriors.&nbsp; It would be– unChristian of him. “You may no longer be too young,” he said. “But you have not proven your skill with a sword.&nbsp; You must defeat another knight in a duel if you would be shown as worthy.”</span></p><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">“Very well,” Ceridwen said.&nbsp; “I challenge every man in this room to a dual.&nbsp; Who will fight me?”</span></p><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">The men all shrank back and averted their eyes.&nbsp; Not Gawain nor Pervical, not Galahad, Agravain or Lancelot would meet the challenge.&nbsp; First, because it was unheard of for a man of noble Christian blood to fight a woman, and second because this woman clearly knew magic.</span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Three times in total did Ceridwen call out the men of the roundtable, and three times the men did decline to meet her in battle.&nbsp; Mordred sipped his ale, loving it all as both Arthur and his men seemed utterly cowed by this arrogant woman– if she, indeed, was a woman and not a goddess!</span></p><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1836" instrument_node="">Ceridwen then turned to Arthur. “None of your </span><em data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">brave </span></em><span data-dcnode-id="1833" instrument_node="">knights will meet me.&nbsp; Therefore, by the laws of chivalry, I am declared winner over them all.&nbsp; I ask for a third time that you make me a knight of the round table.”&nbsp; She looked Arthur directly in the eyes, and her look was of total defiance.</span></p><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Arthur considered, and shook his head.&nbsp; “You mention the courtly laws,” he said.&nbsp; “Then, surely you must know by those very same laws that a woman can not be made a knight.&nbsp; Would you ask me to dishonor myself by breaking the law?”</span></p><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">“No, my noble lord, but I would point out that the laws do allow a king to make any, and I do quote, “ any person a knight who he deems worthy, the judgment of the king superseding all other strictures.”</span></p><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">At this, some of the men chuckled.&nbsp; Mordred laughed out loud, as he loved seeing his Uncle made to look the fool.</span></p><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Arthur grimaced.&nbsp; This girl, miracle or not, was proving as annoying as Mordred, and she was trying his patience, and it snapped.&nbsp; “You are being ridiculous,” he said.&nbsp; “You are&nbsp; a sorcerous, a witch, and your spells and trickery do not change the fact that women are not meant to fight.&nbsp; I can no more make a woman a knight than I could make a kitten a tiger.&nbsp; Be gone from my hall, and waste no more of my time with your foolishness.”</span></p><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">The hall grew silent as all waited to see what Ceridwen would do.&nbsp; The only sound was the popping of the fires.&nbsp; Ceridwen sheathed her sword. She put her face in her hands, and for a moment seemed to be sobbing, but then she looked up, a wicked smile on her face, and she raised her hands, crying out, “You say a woman can not serve as a knight, Arthur?&nbsp; Perhaps you should be one!”</span></p><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">With that, a great wind once more swept into the hall, forming a vortex which lifted Arthur off his feet.&nbsp; He began to spin, slowly, struggling against the wind which seemed to have pinned his arms to his sides, to have taken his voice.&nbsp; Arthur’s men rose, meaning to rush to his defense, but the wind pushed them back, heels scraping across the floor, and they were all thrown against the walls and pinned there, writhing helplessly against the power of Ceridwen.</span></p><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">All eyes were on Arthur now, and all looked in wonder as each time he spun, he was changed.&nbsp; Turn– and long, thick hair now swirled about his head.&nbsp; Turn– and now he seemed smaller than before.&nbsp; Turn— and his breeches and tunic vanished, replaced by a woman’s gown.&nbsp; Turn– and the gown did hug a shapely figure, slender waist, rounded hips.&nbsp; Turn- and from the top of the dress spilled soft white breasts. Turn– and now narrow shoulders replaced his manly frame.&nbsp; Turn– and dainty white arms dangled from his sleeveless dress.</span></p><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">The hall went dark, and all could hear Ceridwen laughing.&nbsp;&nbsp;</span></p><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">“Arthur King, did he declare, a maiden could not be a knight</span></p><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">He swaggered and bellowed and played the man</span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">But Ceridwen had other plans</span></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Now that king a man no more</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Now does he take a woman’s shape</span></p><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Now does he face a woman’s fate</span></p><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Small and pretty and soft and weak</span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">No this girl is not a king</span></p><span data-dcnode-id="1783" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">Nor can she a warrior be</span></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Lady Arthur is meant for homemaking</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">A fertile mother and devoted wife</span></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">This now becomes Arthur’s life</span></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Oh, why or why, she will cry</span></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Oh my, oh my, she’d rather die</span></p><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">For being a woman, after once a king</span></p><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Only sorrow her new life brings</span></p><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">The winds died down.&nbsp; Arthur lowered to the floor, stumbling slightly.&nbsp; He had felt himself changing, but did not understand the nature of the changes.&nbsp; He now looked down to see his fresh, new breasts– soft and round.&nbsp; He felt cold, and plucked at the clothes he wore, realizing he wore a dress, horrified, humiliated.&nbsp; He looked at his hands, his slender wrists, his soft white arms, and his mind fought against it. He struggled, refusing to accept what his eyes were telling him, the words of Ceridwen’s song.&nbsp; “A woman?”&nbsp; He said, shocked at the sound of his voice.&nbsp; “No.”</span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Arthur’s knights stared at him, at the woman he’d become. &nbsp; In truth, it was part due to shock, and it was part because he was now the most lovely woman any of them had ever seen, with a face that would make an angel weep.&nbsp; They all knew this fair maiden was none other than their King.&nbsp; They all stood frozen, no one knowing what to do or say.&nbsp; Ceridwen continued her song.</span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Is there no hope?&nbsp; Must Arthur be</span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">A maiden fair for all his years?</span></p><span data-dcnode-id="1747" instrument_node="">
</span><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">There is a way for our damsel dear</span></p><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">To escape her little life of tears</span></p><span data-dcnode-id="1741" instrument_node="">
</span><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">By midsomer, our virgin sweet</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Must use her pure and womanly heart</span></p><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">To tame a unicorn with feminine art</span></p><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">To present to me by end of longest day</span></p><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Shall the lady fail or be delayed</span></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">a maiden faire then she must stay</span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Arthur, sweet lass, for ever more</span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">No more a knight, no more a king</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">This truth from her down mouth</span></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">She did decry.</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Once more, Ceridwen waved her arms.&nbsp; The knights and Arthur found themselves freed from her spell. The men charged Ceridwen, but she leapt upon her steed and rode out of the hall, leaving behind only her laughter.&nbsp; Arthur had tried to charge his tormenter, but unused to a woman’s dress, he’d stepped on the hem and stumbled, falling to the ground, his long, black hair hanging around his face like a curtain.&nbsp; He felt the wrongness of his body, his clothes.&nbsp; It didn’t seem possible that he found himself a woman? No.&nbsp;</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">A hand reached down, coming into his vision.&nbsp; Arthur took it, and was helped to his feet, surprised how small and soft his hand felt in this man’s coarse, calloused grip.&nbsp; As he stood, he looked up to see Mordred’s grinning face looking down at him–&nbsp; how short am I? Arthur wondered.</span></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">“Milady,” Mordred said, putting a hand on the small of Atthur’s back and guiding him toward the exit.&nbsp; “You must flee!</span></p><span data-dcnode-id="1702" instrument_node="">
</span><div class="sharedaddy sd-like-enabled sd-sharing-enabled" data-dcnode-id="1642" id="jp-post-flair"><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="1687"><div class="robots-nocontent sd-block sd-social sd-social-icon-text sd-sharing" data-dcnode-id="1688"><h3 class="sd-title" data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="1689"><ul data-dcnode-id="1690" data-sharing-events-added="true"><li class="share-twitter" data-dcnode-id="1696"><a class="share-twitter sd-button share-icon" data-dcnode-id="1697" data-shared="sharing-twitter-3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//genderfluidnews.com/2021/11/03/the-lady-arthur-of-camelot/%3Fshare%3Dtwitter%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Twitter"><span data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Twitter</span></span></a></li><li class="share-facebook" data-dcnode-id="1692"><a class="share-facebook sd-button share-icon" data-dcnode-id="1693" data-shared="sharing-facebook-3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//genderfluidnews.com/2021/11/03/the-lady-arthur-of-camelot/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Facebook</span></span></a></li><li class="share-end" data-dcnode-id="1691"></li></ul></div></div></div><div class="sharedaddy sd-block sd-like jetpack-likes-widget-wrapper jetpack-likes-widget-unloaded" data-dcnode-id="1675" data-name="like-post-frame-96834177-3014-62664f4e8d983" data-src="//widgets.wp.com/likes/index.html?ver=20220105#blog_id=96834177&amp;post_id=3014&amp;origin=genderfluidnews.wordpress.com&amp;obj_id=96834177-3014-62664f4e8d983&amp;domain=genderfluidnews.com" data-title="Like or Reblog" id="like-post
