</span><p data-dcnode-id="1946"><span data-dcnode-id="1959" instrument_node="">The main premise of the book is the rise of a socialist mass movement in the US&nbsp;– strong enough to have a real chance of winning national elections, getting to power, and implementing a radical socialist regime. Conservatives feel alarmed and threatened by this prospect, to the point of seizing power and establishing a brutal dictatorship in order to avert it. In fact, such a movement never arose in the United States, where socialist parties and movements would remain marginal throughout the 20th century. However, such mass left-wing movements would arise in Italy in the early 1920s, in Germany in the early 1920s, and in Spain in the late 1930s, leading conservatives in those countries to support, respectively, </span><a data-dcnode-id="1957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benito_Mussolini" title="Benito Mussolini"><span data-dcnode-id="1958" instrument_node="">Benito Mussolini</span></a><span data-dcnode-id="1956" instrument_node="">, </span><a data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adolf_Hitler" title="Adolf Hitler"><span data-dcnode-id="1955" instrument_node="">Adolf Hitler</span></a><span data-dcnode-id="1953" instrument_node="">, and </span><a data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francisco_Franco" title="Francisco Franco"><span data-dcnode-id="1952" instrument_node="">Francisco Franco</span></a><span data-dcnode-id="1950" instrument_node="">, out of motives similar to those of Jack London's "Oligarchs". London foresaw the Oligarchic tyranny arising in the English-speaking United States and Britain while Germany and Austria would for a time hold out against it before finally succumbing; in practice, it would be </span><a data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Germany" title="Nazi Germany"><span data-dcnode-id="1949" instrument_node="">Nazi Germany</span></a><span data-dcnode-id="1947" instrument_node=""> which spearheaded fascism in its most virulent form, while the British and Americans stood against it.
</span></p><p data-dcnode-id="1904"><span data-dcnode-id="1945" instrument_node="">The book is considered to be "the earliest of the modern dystopian fiction",</span><sup class="reference" data-dcnode-id="1942" id="cite_ref-3"><a data-dcnode-id="1943" href="#cite_note-3"><span data-dcnode-id="1944" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1941" instrument_node=""> in the form of </span><a data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_science_fiction" title="Social science fiction"><span data-dcnode-id="1940" instrument_node="">social science fiction</span></a><span data-dcnode-id="1938" instrument_node=""> as employed by novels such as </span><a data-dcnode-id="1935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/We_%28novel%29" title="We (novel)"><i data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">We</span></i></a><span data-dcnode-id="1934" instrument_node="">, </span><i data-dcnode-id="1931"><a data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brave_New_World" title="Brave New World"><span data-dcnode-id="1933" instrument_node="">Brave New World</span></a></i><span data-dcnode-id="1930" instrument_node="">, and </span><i data-dcnode-id="1927"><a data-dcnode-id="1928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A_Canticle_for_Leibowitz" title="A Canticle for Leibowitz"><span data-dcnode-id="1929" instrument_node="">A Canticle for Leibowitz</span></a></i><span data-dcnode-id="1926" instrument_node="">, it chronicles the rise of an </span><a data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oligarchy" title="Oligarchy"><span data-dcnode-id="1925" instrument_node="">oligarchic</span></a><span data-dcnode-id="1923" instrument_node=""> tyranny in the United States. In </span><i data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">The Iron Heel</span></i><span data-dcnode-id="1920" instrument_node="">, Jack London's </span><a data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialism" title="Socialism"><span data-dcnode-id="1919" instrument_node="">socialist</span></a><span data-dcnode-id="1917" instrument_node=""> views are explicitly on display. A distant forerunner of dystopian political novels and stories of the 1950s, 1960s, and 70s, such as </span><a data-dcnode-id="1915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aldous_Huxley" title="Aldous Huxley"><span data-dcnode-id="1916" instrument_node="">Aldous Huxley</span></a><span data-dcnode-id="1914" instrument_node="">'s "Brave New World", the book stresses future changes in society and politics while paying much less attention to technological changes. The book is unusual among London's writings (and in the literature of the time in general) in being a </span><a data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First-person_narrative" title="First-person narrative"><span data-dcnode-id="1913" instrument_node="">first-person narrative</span></a><span data-dcnode-id="1911" instrument_node=""> of a woman protagonist written by a man. Much of the narrative is set in the </span><a data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Francisco_Bay_Area" title="San Francisco Bay Area"><span data-dcnode-id="1910" instrument_node="">San Francisco Bay Area</span></a><span data-dcnode-id="1908" instrument_node="">. Other events take place in </span><a data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sonoma_County%2C_California" title="Sonoma County, California"><span data-dcnode-id="1907" instrument_node="">Sonoma County</span></a><span data-dcnode-id="1905" instrument_node="">.
</span></p><span data-dcnode-id="1903" instrument_node="">
</span><h2 data-dcnode-id="1893"><span class="mw-headline" data-dcnode-id="1901" id="Summary"><span data-dcnode-id="1902" instrument_node="">Summary</span></span><span class="mw-editsection" data-dcnode-id="1894"><span class="mw-editsection-bracket" data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">[</span></span><a data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Iron_Heel%26action%3Dedit%26section%3D2" title="Edit section: Summary"><span data-dcnode-id="1898" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1881"><span data-dcnode-id="1891" instrument_node="">The novel is told via the </span><a class="mw-redirect" data-dcnode-id="1889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Framing_device" title="Framing device"><span data-dcnode-id="1890" instrument_node="">framing device</span></a><span data-dcnode-id="1888" instrument_node=""> of a manuscript found centuries after the action takes place and footnotes by a scholar, Anthony Meredith, circa 2600 </span><a data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anno_Domini" title="Anno Domini"><span data-dcnode-id="1887" instrument_node="">AD</span></a><span data-dcnode-id="1885" instrument_node=""> or 419 B.O.M. (the Brotherhood of Man). Jack London writes at two levels, sporadically having Meredith correcting the errors of Avis Everhard through his own future prism, while at the same time, exposing the often incomplete understanding of this distant future perspective. Meredith's introduction also reveals that the protagonist's efforts will fail, giving the work an air of foreordained </span><a data-dcnode-id="1883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tragedy" title="Tragedy"><span data-dcnode-id="1884" instrument_node="">tragedy</span></a><span data-dcnode-id="1882" instrument_node="">. 
</span></p><p data-dcnode-id="1873"><span data-dcnode-id="1880" instrument_node="">The story proper begins with Avis Everhard, a daughter of a renowned physicist, John Cunningham, and future wife of socialist Ernest Everhard. At first, Avis Everhard does not agree with Ernest's assertion that the whole contemporary social system is based on </span><a data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exploitation_of_labour" title="Exploitation of labour"><span data-dcnode-id="1879" instrument_node="">exploitation of labour</span></a><span data-dcnode-id="1877" instrument_node="">. She proceeds to investigate the conditions the workers live in and those terrible conditions make her change her mind and accept Ernest's worldview. Similarly, Bishop Morehouse does not initially believe in the horrors described by Ernest but then becomes convinced of their truth and is confined to a </span><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychiatric_hospital" title="Psychiatric hospital"><span data-dcnode-id="1876" instrument_node="">madhouse</span></a><span data-dcnode-id="1874" instrument_node=""> because of his new views.
</span></p><p data-dcnode-id="1868"><span data-dcnode-id="1872" instrument_node="">The story covers the years 1912 through 1932 in which the </span><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oligarchy" title="Oligarchy"><span data-dcnode-id="1871" instrument_node="">Oligarchy</span></a><span data-dcnode-id="1869" instrument_node=""> (or "Iron Heel") arises in the United States. Japan conquers East Asia and creates its own empire, India gains independence, and Europe becomes socialist. Canada, Mexico, and Cuba form their own Oligarchies and are aligned with the U.S. (London remains silent as to events transpiring in the rest of the world.)
</span></p><p data-dcnode-id="1863"><span data-dcnode-id="1867" instrument_node="">In North America, the Oligarchy maintains power for three centuries until the Revolution succeeds and ushers in the Brotherhood of Man. During the years of the novel, the First Revolt is described and preparations for the Second Revolt are discussed. From the perspective of Everhard, the imminent Second Revolt is sure to succeed. Given Meredith's </span><a data-dcnode-id="1865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frame_story" title="Frame story"><span data-dcnode-id="1866" instrument_node="">frame story</span></a><span data-dcnode-id="1864" instrument_node="">, the reader knows that Ernest Everhard's hopes will go unfulfilled until centuries after his death.
</span></p><p data-dcnode-id="1837"><span data-dcnode-id="1862" instrument_node="">The Oligarchy is the largest monopoly of </span><a class="mw-redirect" data-dcnode-id="1860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trust_%2819th_century%29" title="Trust (19th century)"><span data-dcnode-id="1861" instrument_node="">trusts</span></a><span data-dcnode-id="1859" instrument_node=""> (or </span><a data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robber_baron_%28industrialist%29" title="Robber baron (industrialist)"><span data-dcnode-id="1858" instrument_node="">robber barons</span></a><span data-dcnode-id="1856" instrument_node="">) who manage to squeeze out the middle class by </span><a data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bankruptcy" title="Bankruptcy"><span data-dcnode-id="1855" instrument_node="">bankrupting</span></a><span data-dcnode-id="1853" instrument_node=""> most small to mid-sized business as well as reducing all farmers to effective </span><a data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serfdom" title="Serfdom"><span data-dcnode-id="1852" instrument_node="">serfdom</span></a><span data-dcnode-id="1850" instrument_node="">. This Oligarchy maintains power through a "labor </span><a data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caste" title="Caste"><span data-dcnode-id="1849" instrument_node="">caste</span></a><span data-dcnode-id="1847" instrument_node="">" and the </span><a data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mercenary" title="Mercenary"><span data-dcnode-id="1846" instrument_node="">Mercenaries</span></a><span data-dcnode-id="1844" instrument_node="">. Laborers in essential industries like steel and rail are elevated and given decent wages, housing, and education. Indeed, the tragic turn in the novel (and Jack London's core warning to his contemporaries) is the treachery of these favored </span><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade_union" title="Trade union"><span data-dcnode-id="1843" instrument_node="">unions</span></a><span data-dcnode-id="1841" instrument_node=""> which break with the other unions and side with the Oligarchy. Further, a second, military </span><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caste" title="Caste"><span data-dcnode-id="1840" instrument_node="">caste</span></a><span data-dcnode-id="1838" instrument_node=""> is formed: the Mercenaries. The Mercenaries are officially the army of the US but are in fact in the employ of the Oligarchs.
</span></p><p data-dcnode-id="1832"><span data-dcnode-id="1836" instrument_node="">Asgard is the name of a fictional wonder-city, constructed by the Oligarchy to be admired and appreciated as well as lived in. Thousands of </span><a data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proletariat" title="Proletariat"><span data-dcnode-id="1835" instrument_node="">proletarians</span></a><span data-dcnode-id="1833" instrument_node=""> live in terrible poverty there, and are used whenever a public work needs to be completed, such as the building of a levee or a canal.
</span></p><span data-dcnode-id="1831" instrument_node="">
</span><h2 data-dcnode-id="1821"><span class="mw-headline" data-dcnode-id="1829" id="Analysis"><span data-dcnode-id="1830" instrument_node="">Analysis</span></span><span class="mw-editsection" data-dcnode-id="1822"><span class="mw-editsection-bracket" data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">[</span></span><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Iron_Heel%26action%3Dedit%26section%3D3" title="Edit section: Analysis"><span data-dcnode-id="1826" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1820" instrument_node="">
</span><table class="box-Unreferenced_section plainlinks metadata ambox ambox-content ambox-Unreferenced" data-dcnode-id="1777" role="presentation"><tbody data-dcnode-id="1778"><tr data-dcnode-id="1779"><td class="mbox-image" data-dcnode-id="1816"><div data-dcnode-id="1817" style="width:52px"><a class="image" data-dcnode-id="1818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="1819" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="1780"><div class="mbox-text-span" data-dcnode-id="1781"><span data-dcnode-id="1815" instrument_node="">This section </span><b data-dcnode-id="1808"><span data-dcnode-id="1814" instrument_node="">does not </span><a data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="1813" instrument_node="">cite</span></a><span data-dcnode-id="1811" instrument_node=""> any </span><a data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="1810" instrument_node="">sources</span></a></b><span data-dcnode-id="1807" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="1796"><span data-dcnode-id="1806" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Iron_Heel%26action%3Dedit"><span data-dcnode-id="1805" instrument_node="">improve this section</span></a><span data-dcnode-id="1803" instrument_node=""> by </span><a data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="1802" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="1800" instrument_node="">. Unsourced material may be challenged and </span><a data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Burden_of_evidence" title="Wikipedia:Verifiability"><span data-dcnode-id="1799" instrument_node="">removed</span></a><span data-dcnode-id="1797" instrument_node="">.</span></span><span data-dcnode-id="1795" instrument_node=""> </span><span class="date-container" data-dcnode-id="1789"><i data-dcnode-id="1790"><span data-dcnode-id="1794" instrument_node="">(</span><span class="date" data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">October 2017</span></span><span data-dcnode-id="1791" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="1782"><i data-dcnode-id="1783"><span data-dcnode-id="1788" instrument_node=""> (</span><small data-dcnode-id="1785"><a data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="1787" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="1784" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1775" instrument_node="">Jack London ambitiously predicted a breakdown of the US republic starting a few years past 1908, but various events have caused his predicted future to diverge from actual history. Most crucially, though London placed quite accurately the time when international tensions will reach their peak (1913 in </span><i data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">The Iron Heel</span></i><span data-dcnode-id="1772" instrument_node="">, </span><a data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="1771" instrument_node="">1914 in actual history</span></a><span data-dcnode-id="1769" instrument_node="">), he (like many others at the time) predicted that when this moment came, labor solidarity would prevent a war that would include the US, Germany and other nations.
</span></p><p data-dcnode-id="1751"><span data-dcnode-id="1767" instrument_node="">Further, London assumed that the </span><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_Party_of_America" title="Socialist Party of America"><span data-dcnode-id="1766" instrument_node="">Socialist Party</span></a><span data-dcnode-id="1764" instrument_node=""> would become a mass party in the United States, strong enough to have a realistic chance of winning national elections and gaining power, while remaining a revolutionary party still committed to the dismantling of </span><a data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capitalism" title="Capitalism"><span data-dcnode-id="1763" instrument_node="">capitalism</span></a><span data-dcnode-id="1761" instrument_node="">. The whole book is based on </span><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Marx" title="Karl Marx"><span data-dcnode-id="1760" instrument_node="">Marx's</span></a><span data-dcnode-id="1758" instrument_node=""> view that capitalism is inherently unsustainable. This would precipitate a brutal counter-reaction, with capitalists preserving their power by discarding democracy and instituting a brutal repressive regime. Although this exact scenario never came to pass in the US, where the Socialist Party remained small and marginal, events closely followed London's script elsewhere; for example, in Chile in 1973, where the government of socialist president </span><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salvador_Allende" title="Salvador Allende"><span data-dcnode-id="1757" instrument_node="">Salvador Allende</span></a><span data-dcnode-id="1755" instrument_node=""> was overthrown by a CIA-backed coup led by </span><a data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Augusto_Pinochet" title="Augusto Pinochet"><span data-dcnode-id="1754" instrument_node="">General Augusto Pinochet</span></a><span data-dcnode-id="1752" instrument_node="">. This prompted later publishers of London's book to use a cover illustration depicting a poster of Allende being ground beneath the heel of a boot.
</span></p><p data-dcnode-id="1725"><span data-dcnode-id="1750" instrument_node="">The idea of a strong </span><i data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">and</span></i><span data-dcnode-id="1747" instrument_node=""> militant mass Socialist Party emerging in the US was linked by London with his prediction that the middle class would shrink as </span><a data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monopoly" title="Monopoly"><span data-dcnode-id="1746" instrument_node="">monopolistic</span></a><span data-dcnode-id="1744" instrument_node=""> </span><a data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trust_%28business%29" title="Trust (business)"><span data-dcnode-id="1743" instrument_node="">trusts</span></a><span data-dcnode-id="1741" instrument_node=""> crushed labor and small- to mid-sized businesses. Instead the US </span><a data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Progressive_Era" title="Progressive Era"><span data-dcnode-id="1740" instrument_node="">Progressive Era</span></a><span data-dcnode-id="1738" instrument_node=""> led to a breakup of the trusts, notably the application of the </span><a class="mw-redirect" data-dcnode-id="1736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sherman_Antitrust_Act" title="Sherman Antitrust Act"><span data-dcnode-id="1737" instrument_node="">Sherman Antitrust Act</span></a><span data-dcnode-id="1735" instrument_node=""> to </span><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standard_Oil" title="Standard Oil"><span data-dcnode-id="1734" instrument_node="">Standard Oil</span></a><span data-dcnode-id="1732" instrument_node=""> in 1911. At the same time, reforms such as </span><a data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade_union" title="Trade union"><span data-dcnode-id="1731" instrument_node="">labor unions</span></a><span data-dcnode-id="1729" instrument_node=""> rights were passed during the Progressive Era, with further reforms during the </span><a data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Deal" title="New Deal"><span data-dcnode-id="1728" instrument_node="">New Deal</span></a><span data-dcnode-id="1726" instrument_node=""> of the 1930s. Further, economic prosperity led to dramatic growth of the middle class in the 1920s and after World War II.
</span></p><p data-dcnode-id="1705"><span data-dcnode-id="1724" instrument_node="">Through the writing of Everhard and, particularly, the distant future perspective of Meredith, London demonstrated his belief in the </span><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Historical_materialism" title="Historical materialism"><span data-dcnode-id="1723" instrument_node="">historical materialism</span></a><span data-dcnode-id="1721" instrument_node="">, which Marxists such as Friedrich </span><a class="mw-redirect" data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Engels" title="Engels"><span data-dcnode-id="1720" instrument_node="">Engels</span></a><span data-dcnode-id="1718" instrument_node="">, </span><a data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgi_Plekhanov" title="Georgi Plekhanov"><span data-dcnode-id="1717" instrument_node="">Georgi Plekhanov</span></a><span data-dcnode-id="1715" instrument_node=""> or Vladimir </span><a class="mw-redirect" data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lenin" title="Lenin"><span data-dcnode-id="1714" instrument_node="">Lenin</span></a><span data-dcnode-id="1712" instrument_node=""> have interpreted as predicting an inevitable succession from </span><a data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feudalism" title="Feudalism"><span data-dcnode-id="1711" instrument_node="">feudalism</span></a><span data-dcnode-id="1709" instrument_node=""> through capitalism and then socialism, ending in a period without a state (also known as full </span><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communism" title="Communism"><span data-dcnode-id="1708" instrument_node="">communism</span></a><span data-dcnode-id="1706" instrument_node="">), based on Marx's maxim of "from each according to his ability, to each according to his need."
</span></p><span data-dcnode-id="1704" instrument_node="">
</span><h2 data-dcnode-id="1694"><span class="mw-headline" data-dcnode-id="1702" id="Publication_history_and_reception"><span data-dcnode-id="1703" instrument_node="">Publication history and reception</span></span><span class="mw-editsection" data-dcnode-id="1695"><span class="mw-editsection-bracket" data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">[</span></span><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Iron_Heel%26action%3Dedit%26section%3D4" title="Edit section: Publication history and reception"><span data-dcnode-id="1699" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1678"><i data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">The Iron Heel</span></i><span data-dcnode-id="1690" instrument_node=""> was published in 1908 by </span><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Platt_Brett_Sr." title="George Platt Brett Sr."><span data-dcnode-id="1689" instrument_node="">George Platt Brett Sr.</span></a><span data-dcnode-id="1687" instrument_node="">, who suggested only the deletion of a footnote which he deemed libelous before publication. It sold 50,000 copies in hardcover but generally did not earn the praise of critics. A reviewer in </span><i data-dcnode-id="1684"><a data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Outlook_%28New_York_City%29" title="The Outlook (New York City)"><span data-dcnode-id="1686" instrument_node="">The Outlook</span></a></i><span data-dcnode-id="1683" instrument_node=""> concluded that "as a work of fiction it has little to commend it, and as a socialist tract it is distinctly unconvincing".</span><sup class="reference" data-dcnode-id="1680" id="cite_ref-Kershaw164_2-1"><a data-dcnode-id="1681" href="#cite_note-Kershaw164-2"><span data-dcnode-id="1682" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1679" instrument_node="">
</span></p><span data-dcnode-id="1677" instrument_node="">
</span><h2 data-dcnode-id="1667"><span class="mw-headline" data-dcnode-id="1675" id="Influences_and_effects"><span data-dcnode-id="1676" instrument_node="">Influences and effects</span></span><span class="mw-editsection" data-dcnode-id="1668"><span class="mw-editsection-bracket" data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">[</span></span><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Iron_Heel%26action%3Dedit%26section%3D5" title="Edit section: Influences and effects"><span data-dcnode-id="1672" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1641"><i data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">The Iron Heel</span></i><span data-dcnode-id="1663" instrument_node=""> is cited by </span><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Orwell" title="George Orwell"><span data-dcnode-id="1662" instrument_node="">George Orwell</span></a><span data-dcnode-id="1660" instrument_node="">'s biographer </span><a data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Shelden" title="Michael Shelden"><span data-dcnode-id="1659" instrument_node="">Michael Shelden</span></a><span data-dcnode-id="1657" instrument_node=""> as having influenced Orwell's most famous novel </span><i data-dcnode-id="1654"><a data-dcnode-id="1655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nineteen_Eighty-Four" title="Nineteen Eighty-Four"><span data-dcnode-id="1656" instrument_node="">Nineteen Eighty-Four</span></a></i><span data-dcnode-id="1653" instrument_node="">.</span><sup class="reference" data-dcnode-id="1650" id="cite_ref-Shelden_4-0"><a data-dcnode-id="1651" href="#cite_note-Shelden-4"><span data-dcnode-id="1652" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1649" instrument_node=""> Orwell himself described London as having made "a very remarkable prophecy of the rise of </span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fascism" title="Fascism"><span data-dcnode-id="1648" instrument_node="">Fascism</span></a><span data-dcnode-id="1646" instrument_node="">" and believed that London's understanding of the primitive had made him a better prophet "than many better-informed and more logical thinkers."</span><sup class="reference" data-dcnode-id="1643" id="cite_ref-5"><a data-dcnode-id="1644" href="#cite_note-5"><span data-dcnode-id="1645" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1642" instrument_node="">
Specifically, Orwell's protagonist Winston Smith, like London's Avis Everhard, keeps a diary where he writes down his rebellious thoughts and experiences. However, while Everhard's diary remained hidden during the centuries of tyranny to be discovered and published later, Smith's diary falls into the hands of the book's harsh Thought Police, whose interrogator tells Smith not to expect posterity to vindicate him: "Posterity will never hear of you, we will vaporize you". 
</span></p><p data-dcnode-id="1627"><a data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harry_Bridges" title="Harry Bridges"><span data-dcnode-id="1640" instrument_node="">Harry Bridges</span></a><span data-dcnode-id="1638" instrument_node="">, influential labor leader in the mid-1900s, was "set afire" by Jack London's </span><i data-dcnode-id="1635"><a data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Sea-Wolf" title="The Sea-Wolf"><span data-dcnode-id="1637" instrument_node="">The Sea-Wolf</span></a></i><span data-dcnode-id="1634" instrument_node=""> and </span><i data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">The Iron Heel.</span></i><sup class="reference" data-dcnode-id="1629" id="cite_ref-Bridges_6-0"><a data-dcnode-id="1630" href="#cite_note-Bridges-6"><span data-dcnode-id="1631" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1628" instrument_node="">
</span></p><p data-dcnode-id="1609"><a data-dcnode-id="1625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Granville_Hicks" title="Granville Hicks"><span data-dcnode-id="1626" instrument_node="">Granville Hicks</span></a><span data-dcnode-id="1624" instrument_node="">, reviewing </span><a data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kurt_Vonnegut" title="Kurt Vonnegut"><span data-dcnode-id="1623" instrument_node="">Kurt Vonnegut</span></a><span data-dcnode-id="1621" instrument_node="">'s </span><i data-dcnode-id="1618"><a data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Player_Piano_%28novel%29" title="Player Piano (novel)"><span data-dcnode-id="1620" instrument_node="">Player Piano</span></a></i><span data-dcnode-id="1617" instrument_node="">, was reminded of </span><i data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">The Iron Heel</span></i><span data-dcnode-id="1614" instrument_node="">: "we are taken into the future and shown an America ruled by a tiny oligarchy, and here too there is a revolt that fails."</span><sup class="reference" data-dcnode-id="1611" id="cite_ref-Hicks1952-08-17_7-0"><a data-dcnode-id="1612" href="#cite_note-Hicks1952-08-17-7"><span data-dcnode-id="1613" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1610" instrument_node="">
</span></p><p data-dcnode-id="1595"><span data-dcnode-id="1608" instrument_node="">Chapter 7 of </span><i data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">The Iron Heel</span></i><span data-dcnode-id="1605" instrument_node=""> is an almost verbatim copy of an </span><a data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irony" title="Irony"><span data-dcnode-id="1604" instrument_node="">ironic</span></a><span data-dcnode-id="1602" instrument_node=""> essay by </span><a data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frank_Harris" title="Frank Harris"><span data-dcnode-id="1601" instrument_node="">Frank Harris</span></a><span data-dcnode-id="1599" instrument_node=""> (see </span><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jack_London%23Plagiarism_accusations" title="Jack London"><span data-dcnode-id="1598" instrument_node="">Jack London §&nbsp;Plagiarism accusations</span></a><span data-dcnode-id="1596" instrument_node="">).
</span></p><p data-dcnode-id="1586"><span data-dcnode-id="1594" instrument_node="">London's novella </span><i data-dcnode-id="1591"><a data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Scarlet_Plague" title="The Scarlet Plague"><span data-dcnode-id="1593" instrument_node="">The Scarlet Plague</span></a></i><span data-dcnode-id="1590" instrument_node=""> (1912), and some of his short stories, are placed in a dystopian future setting that closely resembles that of </span><i data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">The Iron Heel,</span></i><span data-dcnode-id="1587" instrument_node=""> although there is no actual continuity of situations or characters.
</span></p><p data-dcnode-id="1572"><a data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frederic_Tuten" title="Frederic Tuten"><span data-dcnode-id="1585" instrument_node="">Frederic Tuten</span></a><span data-dcnode-id="1583" instrument_node="">'s debut novel </span><i data-dcnode-id="1580"><a data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Adventures_of_Mao_on_the_Long_March" title="The Adventures of Mao on the Long March"><span data-dcnode-id="1582" instrument_node="">The Adventures of Mao on the Long March</span></a></i><span data-dcnode-id="1579" instrument_node=""> uses extensive quotes from </span><i data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">The Iron Heel</span></i><span data-dcnode-id="1576" instrument_node="">, placing them alongside details of Chinese history from 1912 to </span><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mao_Zedong" title="Mao Zedong"><span data-dcnode-id="1575" instrument_node="">Mao</span></a><span data-dcnode-id="1573" instrument_node="">'s rise to power.
</span></p><span data-dcnode-id="1571" instrument_node="">
</span><h2 data-dcnode-id="1561"><span class="mw-headline" data-dcnode-id="1569" id="Adaptations"><span data-dcnode-id="1570" instrument_node="">Adaptations</span></span><span class="mw-editsection" data-dcnode-id="1562"><span class="mw-editsection-bracket" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">[</span></span><a data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DThe_Iron_Heel%26action%3Dedit%26section%3D6" title="Edit section: Adaptations"><span data-dcnode-id="1566" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1559" instrument_node="">The novel has been adapted into two Russian films: </span><i data-dcnode-id="1556"><a data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Iron_Heel_%28film%29" title="The Iron Heel (film)"><span data-dcnode-id="1558" instrument_node="">The Iron Heel</span></a></i><span data-dcnode-id="1555" instrument_node=""> (1919) and </span><i data-dcnode-id="1552"><a data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Iron_Heel_of_Oligarchy" title="The Iron Heel of Oligarchy"><span data-dcnode-id="1554" instrument_node="">The Iron Heel of Oligarchy</span></a></i><span data-dcnode-id="1551" instrument_node=""> (1999). The first was produced in the immediate aftermath of the </span><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/October_Revolution" title="October Revolution"><span data-dcnode-id="1550" instrument_node="">October Revolution</span></a><span data-dcnode-id="1548" instrument_node="">, the second - when real-life Oligarchs came to dominate the economy of post-Soviet Russia.  
</span></p><p data-dcnode-id="1531"><span data-dcnode-id="1546" instrument_node="">A stage adaptation by </span><a data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Einhorn" title="Edward Einhorn"><span data-dcnode-id="1545" instrument_node="">Edward Einhorn</span></a><span data-dcnode-id="1543" instrument_node=""> was produced in 2016 in New York.  According to </span><i data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">The New York Times</span></i><span data-dcnode-id="1540" instrument_node="">,  "it serves up food for thought with an appealing heart-on-sleeve warmth".</span><sup class="reference" data-dcnode-id="1537" id="cite_ref-8"><a data-dcnode-id="1538" href="#cite_note-8"><span data-dcnode-id="1539" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1536" instrument_node="">  The adaptation was turned into a three-part audio drama podcast in 2021.</span><sup class="reference" data-dcnode-id="1533" id="cite_ref-9"><a data-dcnode-id="1534" href="#cite_note-9"><span data-dcnode-id="1535" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1532" instrument_node="">
</span></p><span data-dcnode-id="1530" instrument_node="">
