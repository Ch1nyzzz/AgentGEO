</span></header><section class="article-body" data-dcnode-id="824" id="article-body" itemprop="articleBody"><span data-dcnode-id="1619" instrument_node=""> </span><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Paris is a city that's bursting at the seams with beauty. It's internationally renowned for its contributions to fashion, beauty, architecture, and of course, all of the arts, including the culinary. It's packed full of breath-taking landmarks, but there are few monuments in the world as iconic as the Eiffel Tower.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><span data-dcnode-id="1612" instrument_node=""> </span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">It's been imitated several times by architects all over the world, but the original still has a certain je ne sais quoi that simply can't be duplicated. That's probably what makes it one of Paris' most Instagram-able places.</span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">There are a lot of things that everyone knows about the Eiffel Tower, but there are even more things that a surprising amount of people don't - and this list covers them both!</span></p><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1598"><strong data-dcnode-id="1602"><em data-dcnode-id="1603"><span data-dcnode-id="1604" data-preserver-spaces="true"><span data-dcnode-id="1605" instrument_node="">Updated by Gabriel Kirellos, November 8th, 2021:</span></span></em></strong><em data-dcnode-id="1599"><span data-dcnode-id="1600" data-preserver-spaces="true"><span data-dcnode-id="1601" instrument_node=""> The Eiffel Tower is a historical and monumental landmark in Paris and globally. The tower is more than 133 years old, and exciting facts keep emerging about it. We have updated this list to include some additional unknown and mind-boggling facts about Eiffel Tower, including the engraved names, the post office, and how a despised dictator tried to destroy it.</span></span></em></p><span data-dcnode-id="1597" instrument_node="">
</span><span data-dcnode-id="1595" instrument_node=""> </span><p data-dcnode-id="1589"><span data-dcnode-id="1593" data-preserver-spaces="true"><span data-dcnode-id="1594" instrument_node="">RELATED: </span></span><a class="editor-rtfLink" data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thetravel.com/paris-vacation-instagram-locations-bucket-list/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1591" data-preserver-spaces="true"><span data-dcnode-id="1592" instrument_node="">Paris: 10 Most Instagram-able Spots to Cross Off Your Bucket List</span></span></a></p><span data-dcnode-id="1588" instrument_node="">
</span><span data-dcnode-id="1586" instrument_node="">
</span><span data-dcnode-id="1584" instrument_node="">
</span><span data-dcnode-id="1582" instrument_node="">
</span><h2 data-dcnode-id="1577" id="it-was-built-as-an-entrance-for-the-1889-world-s-fair"><span data-dcnode-id="1581" instrument_node=""> </span><span class="item-num" data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">13 </span></span><span data-dcnode-id="1578" instrument_node=""> 10. It Was Built As An Entrance For The 1889 World's Fair</span></h2><span data-dcnode-id="1576" instrument_node="">
</span><div class="body-img landscape" data-dcnode-id="1551"><span data-dcnode-id="1575" instrument_node="">

</span><figure data-dcnode-id="1555"><span data-dcnode-id="1573" instrument_node="">

</span><span data-dcnode-id="1570" instrument_node="">
</span><source data-dcnode-id="1569" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Entrance-Arch-1.jpg?q=50&amp;fit=crop&amp;w=1500&amp;dpr=1.5" media="(min-width: 1024px)" sizes="1500px" srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Entrance-Arch-1.jpg?q=50&amp;fit=crop&amp;w=1500&amp;dpr=1.5"><span data-dcnode-id="1568" instrument_node="">

</span><source data-dcnode-id="1563" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Entrance-Arch-1.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5" media="(min-width: 0px)" sizes="480px" srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Entrance-Arch-1.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5"><span data-dcnode-id="1562" instrument_node="">
</span><span data-dcnode-id="1560" instrument_node="">
</span><img alt="Eiffel Tower 1889" class="lazyloaded" data-dcnode-id="1559" data-img-url="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Entrance-Arch-1.jpg" height="600" width="1200"><span data-dcnode-id="1558" instrument_node="">
</span></picture><span data-dcnode-id="1556" instrument_node="">
</span></figure><span data-dcnode-id="1554" instrument_node="">
</span></div><span data-dcnode-id="1552" instrument_node="">
</span></div><span data-dcnode-id="1550" instrument_node=""> </span><p data-dcnode-id="1547"><span data-dcnode-id="1548" data-preserver-spaces="true"><span data-dcnode-id="1549" instrument_node="">In honor of the French Revolution's hundredth anniversary, Paris hosted the 1889 Exposition Universelle, known in English as the 1889 World's Fair. It was set to be hosted in the heart of the city at the Champ de Mars, a large public park, and an elaborate entry arch was to be erected to serve as the main exhibit.</span></span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1544" data-preserver-spaces="true"><span data-dcnode-id="1545" instrument_node="">Artists from all over the nation sent in their concepts for a structure. Still, the project fell into the hands of a construction firm owned by </span></span><a class="editor-rtfLink" data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toureiffel.paris/en/the-monument/gustave-eiffel" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1542" data-preserver-spaces="true"><span data-dcnode-id="1543" instrument_node="">Gustave Eiffel</span></span></a><span data-dcnode-id="1539" data-preserver-spaces="true"><span data-dcnode-id="1540" instrument_node="">, an architect and bridge-builder who also helped design the Statue of Liberty.</span></span></p><span data-dcnode-id="1537" instrument_node="">
</span><div class="ad-odd" data-dcnode-id="1532"><span data-dcnode-id="1534" instrument_node="">
</span></div><span data-dcnode-id="1531" instrument_node="">
</span><span data-dcnode-id="1529" instrument_node="">
</span><h2 data-dcnode-id="1524" id="the-current-design-was-not-the-original-concept"><span data-dcnode-id="1528" instrument_node=""> </span><span class="item-num" data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">12 </span></span><span data-dcnode-id="1525" instrument_node=""> 9. The Current Design Was Not The Original Concept</span></h2><span data-dcnode-id="1523" instrument_node="">
</span><div class="body-img landscape" data-dcnode-id="1498"><span data-dcnode-id="1522" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1500" style="padding-bottom: 50%; cursor: pointer;"><span data-dcnode-id="1521" instrument_node="">
</span><figure data-dcnode-id="1502"><span data-dcnode-id="1520" instrument_node="">
</span><picture data-dcnode-id="1504"><span data-dcnode-id="1519" instrument_node="">
</span><span data-dcnode-id="1517" instrument_node="">
</span><source data-dcnode-id="1516" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Design.jpg?q=50&amp;fit=crop&amp;w=1500&amp;dpr=1.5" media="(min-width: 1024px)" sizes="1500px" srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Design.jpg?q=50&amp;fit=crop&amp;w=1500&amp;dpr=1.5"><span data-dcnode-id="1515" instrument_node="">
</span><source data-dcnode-id="1514" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Design.jpg?q=50&amp;fit=crop&amp;w=943&amp;dpr=1.5" media="(min-width: 768px)" sizes="943px" srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Design.jpg?q=50&amp;fit=crop&amp;w=943&amp;dpr=1.5"><span data-dcnode-id="1513" instrument_node="">
</span><source data-dcnode-id="1512" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Design.jpg?q=50&amp;fit=crop&amp;w=767&amp;dpr=1.5" media="(min-width: 481px)" sizes="767px" srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Design.jpg?q=50&amp;fit=crop&amp;w=767&amp;dpr=1.5"><span data-dcnode-id="1511" instrument_node="">
</span><source data-dcnode-id="1510" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Design.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5" media="(min-width: 0px)" sizes="480px" srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Design.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5"><span data-dcnode-id="1509" instrument_node="">
</span><span data-dcnode-id="1507" instrument_node="">
</span><img alt="Eiffel Tower Under Construction" class="lazyloaded" data-dcnode-id="1506" data-img-url="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Design.jpg" height="600" width="1200"><span data-dcnode-id="1505" instrument_node="">
</span></picture><span data-dcnode-id="1503" instrument_node="">
</span></figure><span data-dcnode-id="1501" instrument_node="">
</span></div><span data-dcnode-id="1499" instrument_node="">
</span></div><span data-dcnode-id="1497" instrument_node=""> </span><p data-dcnode-id="1489"><span data-dcnode-id="1495" data-preserver-spaces="true"><span data-dcnode-id="1496" instrument_node="">The iconic structure that is the modern Eiffel Tower is not what was initially pitched to Gustave Eiffel. One of his senior engineers, Maurice Koechlin, was the principal designer for the project, with some </span></span><a class="editor-rtfLink" data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2013/07/11/world/europe/eiffel-tower-fast-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1493" data-preserver-spaces="true"><span data-dcnode-id="1494" instrument_node="">help</span></span></a><span data-dcnode-id="1490" data-preserver-spaces="true"><span data-dcnode-id="1491" instrument_node=""> from Emile Nouguier, a fellow engineer, and Stephen Sauvestre, the leader of the company's architectural department.</span></span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1486" data-preserver-spaces="true"><span data-dcnode-id="1487" instrument_node="">The initial sketches that were shown to Eiffel were rejected. His vision of the tower was an elaborate and detailed structure, and he found that the design plans were too minimal. In 1884, he approved of the design, and construction began in 1887.</span></span></p><span data-dcnode-id="1484" instrument_node="">
</span><div class="ad-even" data-dcnode-id="1481"></div><span data-dcnode-id="1480" instrument_node="">
</span><span data-dcnode-id="1477" instrument_node="">
</span><h2 data-dcnode-id="1472" id="there-were-protests-against-its-construction"><span data-dcnode-id="1476" instrument_node=""> </span><span class="item-num" data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">11 </span></span><span data-dcnode-id="1473" instrument_node=""> 8. There Were Protests Against Its Construction</span></h2><span data-dcnode-id="1471" instrument_node="">
</span><div class="body-img landscape" data-dcnode-id="1446"><span data-dcnode-id="1470" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1448" style="padding-bottom: 50%; cursor: pointer;"><span data-dcnode-id="1469" instrument_node="">
</span><figure data-dcnode-id="1450"><span data-dcnode-id="1468" instrument_node="">
</span><picture data-dcnode-id="1452"><span data-dcnode-id="1467" instrument_node="">
</span><span data-dcnode-id="1465" instrument_node="">
</span><source data-dcnode-id="1464" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Protests.jpg?q=50&amp;fit=crop&amp;w=1500&amp;dpr=1.5" media="(min-width: 1024px)" sizes="1500px" srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Protests.jpg?q=50&amp;fit=crop&amp;w=1500&amp;dpr=1.5"><span data-dcnode-id="1463" instrument_node="">
</span><source data-dcnode-id="1462" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Protests.jpg?q=50&amp;fit=crop&amp;w=943&amp;dpr=1.5" media="(min-width: 768px)" sizes="943px" srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Protests.jpg?q=50&amp;fit=crop&amp;w=943&amp;dpr=1.5"><span data-dcnode-id="1461" instrument_node="">
</span><source data-dcnode-id="1460" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Protests.jpg?q=50&amp;fit=crop&amp;w=767&amp;dpr=1.5" media="(min-width: 481px)" sizes="767px" srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Protests.jpg?q=50&amp;fit=crop&amp;w=767&amp;dpr=1.5"><span data-dcnode-id="1459" instrument_node="">
</span><source data-dcnode-id="1458" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Protests.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5" media="(min-width: 0px)" sizes="480px" srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Protests.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5"><span data-dcnode-id="1457" instrument_node="">
</span><span data-dcnode-id="1455" instrument_node="">
</span><img alt="Eiffel Tower in Summer" class="lazyloaded" data-dcnode-id="1454" data-img-url="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Eiffel-Tower-Protests.jpg" height="600" width="1200"><span data-dcnode-id="1453" instrument_node="">
</span></picture><span data-dcnode-id="1451" instrument_node="">
</span></figure><span data-dcnode-id="1449" instrument_node="">
</span></div><span data-dcnode-id="1447" instrument_node="">
</span></div><span data-dcnode-id="1445" instrument_node=""> </span><p data-dcnode-id="1434"><span data-dcnode-id="1443" data-preserver-spaces="true"><span data-dcnode-id="1444" instrument_node="">It's one of the world's most beloved landmarks now, but believe it or not, the Eiffel Tower was met with protests at the time of its conception. The government was presented with a </span></span><a class="editor-rtfLink" data-dcnode-id="1440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.discoverfrance.net/France/Paris/Monuments-Paris/Eiffel.shtml" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1441" data-preserver-spaces="true"><span data-dcnode-id="1442" instrument_node="">petition</span></span></a><span data-dcnode-id="1438" data-preserver-spaces="true"><span data-dcnode-id="1439" instrument_node=""> that contained over 300 signatures, which read, </span></span><em data-dcnode-id="1435"><span data-dcnode-id="1436" data-preserver-spaces="true"><span data-dcnode-id="1437" instrument_node="">"We, the writers, painters, sculptors, architects, and lovers of the beauty of Paris, do protest with all our vigor and all our indignation, in the name of French taste and endangered French art and history, against the useless and monstrous Eiffel Tower."</span></span></em></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" data-preserver-spaces="true"><span data-dcnode-id="1432" instrument_node="">Additionally, there were concerns among nature lovers that the tower's height could potentially interfere with the birds that flew over Paris.</span></span></p><span data-dcnode-id="1429" instrument_node="">
</span><span data-dcnode-id="1427" instrument_node=""> </span><p data-dcnode-id="1424"><span data-dcnode-id="1425" data-preserver-spaces="true"><span data-dcnode-id="1426" instrument_node="">However, none of these things made much of a difference, and the tower ultimately became one of France's most beloved and iconic structures.</span></span></p><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1417"><span data-dcnode-id="1421" data-preserver-spaces="true"><span data-dcnode-id="1422" instrument_node="">RELATED: </span></span><a class="editor-rtfLink" data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thetravel.com/iconic-worlds-fair-structures-still-standing/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1419" data-preserver-spaces="true"><span data-dcnode-id="1420" instrument_node="">The 10 Most Iconic World's Fair Structures That Are Still Standing</span></span></a></p><span data-dcnode-id="1416" instrument_node="">
</span><div class="ad-odd" data-dcnode-id="1414"></div><span data-dcnode-id="1413" instrument_node="">
</span><span data-dcnode-id="1411" instrument_node="">
</span><h2 data-dcnode-id="1406" id="it-was-only-meant-to-stand-for-20-years"><span data-dcnode-id="1410" instrument_node=""> </span><span class="item-num" data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">10 </span></span><span data-dcnode-id="1407" instrument_node=""> 7. It Was Only Meant To Stand For 20 Years</span></h2><span data-dcnode-id="1405" instrument_node="">
</span><div class="body-img landscape" data-dcnode-id="1380"><span data-dcnode-id="1404" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1382" style="padding-bottom: 50%; cursor: pointer;"><span data-dcnode-id="1403" instrument_node="">
</span><figure data-dcnode-id="1384"><span data-dcnode-id="1402" instrument_node="">
</span><picture data-dcnode-id="1386"><span data-dcnode-id="1401" instrument_node="">
</span><span data-dcnode-id="1399" instrument_node="">
</span><source data-dcnode-id="1398" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/The-Eiffel-Tower-was-only-meant-to-stand-for20-Years.jpg?q=50&amp;fit=crop&amp;w=1500&amp;dpr=1.5" media="(min-width: 1024px)" sizes="1500px" srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/The-Eiffel-Tower-was-only-meant-to-stand-for20-Years.jpg?q=50&amp;fit=crop&amp;w=1500&amp;dpr=1.5"><span data-dcnode-id="1397" instrument_node="">
</span><source data-dcnode-id="1396" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/The-Eiffel-Tower-was-only-meant-to-stand-for20-Years.jpg?q=50&amp;fit=crop&amp;w=943&amp;dpr=1.5" media="(min-width: 768px)" sizes="943px" srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/The-Eiffel-Tower-was-only-meant-to-stand-for20-Years.jpg?q=50&amp;fit=crop&amp;w=943&amp;dpr=1.5"><span data-dcnode-id="1395" instrument_node="">
</span><source data-dcnode-id="1394" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/The-Eiffel-Tower-was-only-meant-to-stand-for20-Years.jpg?q=50&amp;fit=crop&amp;w=767&amp;dpr=1.5" media="(min-width: 481px)" sizes="767px" srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/The-Eiffel-Tower-was-only-meant-to-stand-for20-Years.jpg?q=50&amp;fit=crop&amp;w=767&amp;dpr=1.5"><span data-dcnode-id="1393" instrument_node="">
</span><source data-dcnode-id="1392" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/The-Eiffel-Tower-was-only-meant-to-stand-for20-Years.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5" media="(min-width: 0px)" sizes="480px" srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/The-Eiffel-Tower-was-only-meant-to-stand-for20-Years.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5"><span data-dcnode-id="1391" instrument_node="">
</span><span data-dcnode-id="1389" instrument_node="">
</span><img alt="Eiffel Tower Sunset" class="lazyloaded" data-dcnode-id="1388" data-img-url="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/The-Eiffel-Tower-was-only-meant-to-stand-for20-Years.jpg" height="600" width="1200"><span data-dcnode-id="1387" instrument_node="">
</span></picture><span data-dcnode-id="1385" instrument_node="">
</span></figure><span data-dcnode-id="1383" instrument_node="">
</span></div><span data-dcnode-id="1381" instrument_node="">
</span></div><span data-dcnode-id="1379" instrument_node=""> </span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">The tower was built to give the French an opportunity to show off their industrial capabilities while celebrating the centennial of the French Revolution at the World's Fair in 1889. It was intended to be a temporary monument that would only stand for 20 years before being torn down.</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Citizens of Paris and most of the world learned about and saw the structure and fell in love with it. The antenna at the top was useful for telegrams, so the plans to tear it down never came to fruition.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><div class="ad-even" data-dcnode-id="1370"></div><span data-dcnode-id="1369" instrument_node="">

</span><p data-dcnode-id="1322"><span data-dcnode-id="1328" data-preserver-spaces="true"><span data-dcnode-id="1329" instrument_node="">Including its antenna, it is approximately 1,060 feet (320 meters) tall on an average day, but that's subject to change </span></span><a class="editor-rtfLink" data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.telegraph.co.uk/travel/destinations/europe/france/paris/articles/Eiffel-Tower-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1326" data-preserver-spaces="true"><span data-dcnode-id="1327" instrument_node="">depending on the weather</span></span></a><span data-dcnode-id="1323" data-preserver-spaces="true"><span data-dcnode-id="1324" instrument_node="">. The sun also causes it to expand and grow approximately 6 inches taller, while the cold will cause it to shrink by around 6 inches.</span></span></p><span data-dcnode-id="1321" instrument_node="">

</span><span data-dcnode-id="1273" instrument_node=""> </span><p data-dcnode-id="1265"><span data-dcnode-id="1271" data-preserver-spaces="true"><span data-dcnode-id="1272" instrument_node="">However, all of those things pale in comparison to what took place in 2007. A woman from the United States, Erika LaBrie, was married to the Eiffel Tower and changed her name to </span></span><a class="editor-rtfLink" data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Erika_Eiffel" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1269" data-preserver-spaces="true"><span data-dcnode-id="1270" instrument_node="">Erika Eiffel</span></span></a><span data-dcnode-id="1266" data-preserver-spaces="true"><span data-dcnode-id="1267" instrument_node="">. She first came into contact with the Eiffel Tower in 2004 and experienced an immediate attraction to it.</span></span></p><span data-dcnode-id="1264" instrument_node="">

</span><span data-dcnode-id="1214" instrument_node=""> </span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">It remained the tallest man-made structure in the world for approximately four decades, from its construction in 1889 to 1930. The building that ultimately dethroned it was the Empire State Building, which stands at around 1,250 feet, or 381 meters, without taking its tip into account.</span></p><span data-dcnode-id="1211" instrument_node="">

</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" data-preserver-spaces="true"><span data-dcnode-id="1164" instrument_node="">He received several offers from people interested in spending even just a single night in the Eiffel Tower, but he turned all of them down. He used the apartment as a quiet place to carve out some time for himself and host some impressive guests, including Thomas Edison, the phonograph inventor.</span></span></p><span data-dcnode-id="1161" instrument_node="">

</span></div><span data-dcnode-id="1112" instrument_node="">
</span></div><span data-dcnode-id="1110" instrument_node=""> </span><p data-dcnode-id="1107"><span data-dcnode-id="1108" data-preserver-spaces="true"><span data-dcnode-id="1109" instrument_node="">If the soaring height of the Eiffel Tower seems intimidating from the ground, just wait until you see it from one of its three observatory platforms. They are located at approximately 200, 400, and 900 feet, connecting stairs, and elevators.</span></span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1104" data-preserver-spaces="true"><span data-dcnode-id="1105" instrument_node="">The only catch is that none of the elevators travel directly from the bottom to the top of the tower. Instead, they stop on the first and second platforms. It's recommended that visitors avoid getting off on the first level and head straight for the elevator to the top, which is located on the second one.</span></span></p><span data-dcnode-id="1102" instrument_node="">
</span><span data-dcnode-id="1100" instrument_node=""> </span><p data-dcnode-id="1097"><span data-dcnode-id="1098" data-preserver-spaces="true"><span data-dcnode-id="1099" instrument_node="">It's a lot easier to see the second and first floors on the way back down!</span></span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1094" data-preserver-spaces="true"><span data-dcnode-id="1095" instrument_node="">RELATED: </span></span><a class="editor-rtfLink" data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thetravel.com/paris-first-time-best-areas-to-stay/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1092" data-preserver-spaces="true"><span data-dcnode-id="1093" instrument_node="">10 Best Areas To Stay In During Your First Time In Paris</span></span></a></p><span data-dcnode-id="1089" instrument_node="">
</span><div class="ad-odd" data-dcnode-id="1087"></div><span data-dcnode-id="1086" instrument_node="">
</span><span data-dcnode-id="1084" instrument_node="">
</span><h2 data-dcnode-id="1079" id="it-has-been-sold-by-a-con-artist"><span data-dcnode-id="1083" instrument_node=""> </span><span class="item-num" data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">4 </span></span><span data-dcnode-id="1080" instrument_node=""> 1. It Has Been "Sold" By A Con Artist</span></h2><span data-dcnode-id="1078" instrument_node="">
</span><div class="body-img landscape" data-dcnode-id="1053"><span data-dcnode-id="1077" instrument_node="">
</span><div class="responsive-img img-article-item" data-dcnode-id="1055" style="padding-bottom: 50%; cursor: pointer;"><span data-dcnode-id="1076" instrument_node="">
</span><figure data-dcnode-id="1057"><span data-dcnode-id="1075" instrument_node="">
</span><picture data-dcnode-id="1059"><span data-dcnode-id="1074" instrument_node="">
</span><span data-dcnode-id="1072" instrument_node="">
</span><source data-dcnode-id="1071" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Victor-Lustig.jpg?q=50&amp;fit=crop&amp;w=1500&amp;dpr=1.5" media="(min-width: 1024px)" sizes="1500px"><span data-dcnode-id="1070" instrument_node="">
</span><source data-dcnode-id="1069" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Victor-Lustig.jpg?q=50&amp;fit=crop&amp;w=943&amp;dpr=1.5" media="(min-width: 768px)" sizes="943px"><span data-dcnode-id="1068" instrument_node="">
</span><source data-dcnode-id="1067" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Victor-Lustig.jpg?q=50&amp;fit=crop&amp;w=767&amp;dpr=1.5" media="(min-width: 481px)" sizes="767px"><span data-dcnode-id="1066" instrument_node="">
</span><source data-dcnode-id="1065" data-srcset="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Victor-Lustig.jpg?q=50&amp;fit=crop&amp;w=480&amp;dpr=1.5" media="(min-width: 0px)" sizes="480px"><span data-dcnode-id="1064" instrument_node="">
</span><span data-dcnode-id="1062" instrument_node="">
</span><img alt="Artist Victor Lustig" class="lazyload" data-dcnode-id="1061" data-img-url="https://static1.thetravelimages.com/wordpress/wp-content/uploads/2019/07/Victor-Lustig.jpg" height="600" width="1200"><span data-dcnode-id="1060" instrument_node="">
</span></picture><span data-dcnode-id="1058" instrument_node="">
</span></figure><span data-dcnode-id="1056" instrument_node="">
</span></div><span data-dcnode-id="1054" instrument_node="">
</span></div><span data-dcnode-id="1052" instrument_node=""> </span><p data-dcnode-id="1046"><a class="editor-rtfLink" data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victor_Lustig%23%2522Eiffel_Tower%2522_scam" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1050" data-preserver-spaces="true"><span data-dcnode-id="1051" instrument_node="">Victor Lustig</span></span></a><span data-dcnode-id="1047" data-preserver-spaces="true"><span data-dcnode-id="1048" instrument_node=""> was a remarkably skilled con artist from Austria-Hungary. He was infamous across Europe for his scams, but he truly made a name for himself when traveling to Paris in 1925. After reading a newspaper article that went into detail about the city's struggle of maintaining the Eiffel Tower as it was becoming increasingly more expensive, he saw an opportunity to make some quick cash.</span></span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" data-preserver-spaces="true"><span data-dcnode-id="1044" instrument_node="">He gathered a group of scrap metal dealers and convinced them that the city could no longer afford the structure's costs. To keep them from seeking any further information, he claimed that the city could not publicly announce the plans to sell the tower for scrap metal due to fear of public outcry.</span></span></p><span data-dcnode-id="1041" instrument_node="">
</span><span data-dcnode-id="1039" instrument_node=""> </span><p data-dcnode-id="1036"><span data-dcnode-id="1037" data-preserver-spaces="true"><span data-dcnode-id="1038" instrument_node="">Surprisingly, he found a buyer: a man named André Poisson. After he received his payment, he fled to Austria. He later returned and attempted to pull the same trick again, but this time, he was reported to the police and had no choice but to move to the United States to avoid being arrested.</span></span></p><span data-dcnode-id="1035" instrument_node="">
</span><div class="ad-even" data-dcnode-id="1033"></div><span data-dcnode-id="1032" instrument_node="">
</span><span data-dcnode-id="1029" instrument_node="">
</span><h2 data-dcnode-id="1022" id="hitler-ordered-the-tower-to-be-destroyed"><span data-dcnode-id="1028" instrument_node=""> </span><span class="item-num" data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">3 </span></span><span data-dcnode-id="1025" instrument_node=""> </span><span data-dcnode-id="1023" data-preserver-spaces="true"><span data-dcnode-id="1024" instrument_node="">Hitler Ordered The Tower To Be Destroyed</span></span></h2><span data-dcnode-id="1021" instrument_node="">
</span><span data-dcnode-id="1018" instrument_node="">
</span><div class="w-rich w-twitter" data-dcnode-id="1016" id="1344015601426161672"><span data-dcnode-id="1017" instrument_node="">
</span></div><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" data-preserver-spaces="true"><span data-dcnode-id="1014" instrument_node="">During World War II, Germany occupied France. Hitler ordered back then that the Eiffel Tower be destroyed. However, no one listened to him. Moreover, the Tower's elevator cables were cut by resistance fighters in France to force the Nazis to climb the Eiffel stairs and put their flag.</span></span></p><span data-dcnode-id="1011" instrument_node="">
</span><div class="ad-odd" data-dcnode-id="1008"></div><span data-dcnode-id="1007" instrument_node="">
</span><span data-dcnode-id="1005" instrument_node="">
</span><h2 data-dcnode-id="998" id="the-eiffel-tower-is-home-to-a-post-office"><span data-dcnode-id="1004" instrument_node=""> </span><span class="item-num" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">2 </span></span><span data-dcnode-id="1001" instrument_node=""> </span><span data-dcnode-id="999" data-preserver-spaces="true"><span data-dcnode-id="1000" instrument_node="">The Eiffel Tower Is Home To A Post Office</span></span></h2><span data-dcnode-id="997" instrument_node="">
</span><span data-dcnode-id="994" instrument_node="">
</span><div class="w-rich w-twitter" data-dcnode-id="992" id="1101936439028338694"><span data-dcnode-id="993" instrument_node="">
</span></div><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" data-preserver-spaces="true"><span data-dcnode-id="990" instrument_node="">On the first floor in the Eiffel Tower, a tiny post office can be found next to the gift shops. People can have the chance to get a 'carte postale' and a stamp to mail it from the post office in the Eiffel Tower. The mail will be delivered with the unique postmark.</span></span></p><span data-dcnode-id="987" instrument_node="">
</span><div class="ad-even" data-dcnode-id="985"></div><span data-dcnode-id="984" instrument_node="">
</span><span data-dcnode-id="981" instrument_node="">
</span><h2 data-dcnode-id="974" id="names-of-scientists-cover-the-eiffel-tower"><span data-dcnode-id="980" instrument_node=""> </span><span class="item-num" data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">1 </span></span><span data-dcnode-id="977" instrument_node=""> </span><span data-dcnode-id="975" data-preserver-spaces="true"><span data-dcnode-id="976" instrument_node="">Names Of Scientists Cover The Eiffel Tower</span></span></h2><span data-dcnode-id="973" instrument_node="">
</span><span data-dcnode-id="970" instrument_node="">
</span><div class="w-rich w-twitter" data-dcnode-id="968" id="1110167961388662786"><span data-dcnode-id="969" instrument_node="">
</span></div><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="965" data-preserver-spaces="true"><span data-dcnode-id="966" instrument_node="">There are 72 names of French scientists engraved on the Eiffel Tower. For some time, the engraved tributes were covered up. However, some restoration efforts made them visible again. Visitors who take their time to explore the tower can see some of the names cut into the iron, such as Dumas, Foucault, and Perrier.</span></span></p><span data-dcnode-id="963" instrument_node="">
