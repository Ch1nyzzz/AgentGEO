</span></ol><h1 class="afd-title-big afd-title-big--bmargin-big afd-mobile-margin" data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Eiffel Tower: The Latest Architecture and News</span></h1><p class="afd-search-description afd-mobile-margin" data-dcnode-id="1109"></p><div class="afd-post-stream clearfix" data-dcnode-id="1041" itemscope="" itemtype="http://schema.org/Article"><div class="custom-tag-streamlogo" data-dcnode-id="1108"></div><h3 class="afd-title--custom-tag afd-title-big--bmargin-small afd-mobile-margin" data-dcnode-id="1104"><a class="afd-title--black-link" data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/978080/paris-city-council-approves-gustafson-porter-plus-bowmans-landscape-plan-for-the-eiffel-tower-site"><span data-dcnode-id="1106" itemprop="name"><span data-dcnode-id="1107" instrument_node="">Paris City Council Approves Gustafson Porter + Bowman’s Landscape Plan for the Eiffel Tower Site</span></span></a></h3><meta content="2022-03-08" data-dcnode-id="1103" itemprop="datePublished"><div class="date-publication afd-mobile-margin" data-dcnode-id="1098"><span data-dcnode-id="1099"><time data-dcnode-id="1100" datetime="2022-03-08T10:30:00+00:00" lang="en"><span data-dcnode-id="1101" instrument_node="">March 08, 2022</span></time></span></div><div class="afd-post-content" data-dcnode-id="1057" itemprop="articleBody"><figure aria-labelledby="62266020e578c30165742932" class="js-image-size media-picture" data-dcnode-id="1092" data-height="352" data-width="640" style="width: 640px; height: 352px;"><a class="js-image-size__link lazy-anchor" data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/978080/paris-city-council-approves-gustafson-porter-plus-bowmans-landscape-plan-for-the-eiffel-tower-site" style="width: 640px; height: 352px;"><img alt="© MIR" class="b-lazy b-loaded" data-dcnode-id="1097" itemprop="image" longdesc="https://www.archdaily.com/978080/paris-city-council-approves-gustafson-porter-plus-bowmans-landscape-plan-for-the-eiffel-tower-site/62266020e578c30165742932-paris-city-council-approves-gustafson-porter-plus-bowmans-landscape-plan-for-the-eiffel-tower-site-photo" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.adsttc.com/media/images/6226/6020/e578/c301/6574/2932/newsletter/c-mir-for-gp-b-site-tour-eiffel-marchingtrees-wwio-le-pont-diena-plante.jpg%3F1646682151&amp;raw"></a><figcaption class="figcaption afd-desktop-e" data-dcnode-id="1094" id="62266020e578c30165742932"><span data-dcnode-id="1095" instrument_node="">© MIR</span></figcaption><i class="figcaption-cc-icon afd-desktop-e" data-dcnode-id="1093"></i></figure><p data-dcnode-id="1091"></p><p data-dcnode-id="1074"><span data-dcnode-id="1090" instrument_node="">Paris City Council granted final approval to G</span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gp-b.com/%3Futm_medium%3Dwebsite%26utm_source%3Darchdaily.com" target="_blank"><span data-dcnode-id="1089" instrument_node="">ustafson Porter + Bowman</span></a><span data-dcnode-id="1087" instrument_node="">'s landscape design for the </span><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/eiffel-tower"><span data-dcnode-id="1086" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="1084" instrument_node=""> site. The project is the result of </span><a class="editor-rtfLink" data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/917727/gustafson-porter-plus-bowman-wins-competition-to-redesign-eiffel-tower-site" target="_blank"><span data-dcnode-id="1083" instrument_node="">a 2019 international competition</span></a><span data-dcnode-id="1081" instrument_node=""> that sought to redesign the 2-kilometre axis leading up to the </span><a data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/eiffel-tower"><span data-dcnode-id="1080" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="1078" instrument_node="">, connecting Place du Trocadéro, Palais de Chaillot, Pont d'Iéna, Champ de Mars and the Military Academy. The landscape plan redefines this iconic green space in </span><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/paris"><span data-dcnode-id="1077" instrument_node="">Paris</span></a><span data-dcnode-id="1075" instrument_node=""> by increasing green areas by 35% and adding over 200 new trees, in addition to pedestrianizing the Iena bridge.</span></p><p data-dcnode-id="1073"></p><p class="thumbs afd-desktop-e clearfix" data-dcnode-id="1059"><a class="thumbs__link" data-dcnode-id="1071" data-nr-picture-id="622660206a67770165e4a96b" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/978080/paris-city-council-approves-gustafson-porter-plus-bowmans-landscape-plan-for-the-eiffel-tower-site/622660206a67770165e4a96b-paris-city-council-approves-gustafson-porter-plus-bowmans-landscape-plan-for-the-eiffel-tower-site-photo" rel="attachment"><img alt="© MIR" class="thumbs__img b-lazy" data-dcnode-id="1072" data-nr-picture-id="622660206a67770165e4a96b" data-pin-nopin="true" data-src="https://images.adsttc.com/media/images/6226/6020/6a67/7701/65e4/a96b/thumb_jpg/c-mir-for-gp-b-site-tour-eiffel-crystal-wwio-la-fontaine-de-varsovie-a-laube.jpg?1646682152" height="125" longdesc="https://www.archdaily.com/978080/paris-city-council-approves-gustafson-porter-plus-bowmans-landscape-plan-for-the-eiffel-tower-site/622660206a67770165e4a96b-paris-city-council-approves-gustafson-porter-plus-bowmans-landscape-plan-for-the-eiffel-tower-site-photo" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAA </span><div class="afd-post-stream clearfix editors_choice" data-dcnode-id="973" itemscope="" itemtype="http://schema.org/Article"><div class="custom-tag-streamlogo" data-dcnode-id="1039"></div><h3 class="afd-title--custom-tag afd-title-big--bmargin-small afd-mobile-margin" data-dcnode-id="1035"><a class="afd-title--black-link" data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/977462/is-fake-the-new-real-searching-for-an-architectural-reality"><span data-dcnode-id="1037" itemprop="name"><span data-dcnode-id="1038" instrument_node="">Is Fake the New Real? Searching for an Architectural Reality</span></span></a></h3><meta content="2022-02-25" data-dcnode-id="1034" itemprop="datePublished"><div class="date-publication afd-mobile-margin" data-dcnode-id="1029"><span data-dcnode-id="1030"><time data-dcnode-id="1031" datetime="2022-02-25T09:00:00+00:00" lang="en"><span data-dcnode-id="1032" instrument_node="">February 25, 2022</span></time></span></div><div class="afd-post-content" data-dcnode-id="989" itemprop="articleBody"><figure aria-labelledby="figcaption_newsroom-picture-att-id-621768fa3e4b3111af000036" class="featured-image js-image-size media-picture" data-dcnode-id="1023" data-height="427" data-width="640" id="newsroom-picture-att-id-621768fa3e4b3111af000036" style="width: 640px; height: 427px;"><a class="js-image-size__link lazy-anchor" data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/977462/is-fake-the-new-real-searching-for-an-architectural-reality" rel="attachment" style="width: 640px; height: 427px;"><img alt="Is Fake the New Real? Searching for an Architectural Reality, Marta Minujín, Parthenon of Books, Dokumenta 14, Kassel, Germany, 2017. Image by Anne-Catrin Schultz.. Image Courtesy of Real and Fake in Architecture–Close to the Original, Far from Authenticity?" class="b-lazy b-loaded" data-dcnode-id="1028" data-nr-picture-id="621768fa3e4b3111af000036" itemprop="image" longdesc="https://www.archdaily.com/977462/is-fake-the-new-real-searching-for-an-architectural-reality/621768fa3e4b3111af000036-is-fake-the-new-real-searching-for-an-architectural-reality-image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.adsttc.com/media/images/6217/68fa/3e4b/3111/af00/0036/newsletter/10._ParthenonKassel.jpg%3F1645701360&amp;raw"></a><figcaption class="figcaption afd-desktop-e" data-dcnode-id="1025" id="figcaption_newsroom-picture-att-id-621768fa3e4b3111af000036"><span data-dcnode-id="1026" instrument_node="">Marta Minujín, Parthenon of Books, Dokumenta 14, Kassel, Germany, 2017. Image by Anne-Catrin Schultz.. Image Courtesy of Real and Fake in Architecture–Close to the Original, Far from Authenticity?</span></figcaption><i class="figcaption-icon afd-desktop-e" data-dcnode-id="1024"></i></figure><p data-dcnode-id="1022"></p><p data-dcnode-id="1016"><em data-dcnode-id="1017"><span data-dcnode-id="1021" instrument_node="">Excerpt from the book: </span><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Real-Fake-Architecture-Original-Authenticity/dp/3869050187%3Futm_medium%3Dwebsite%26utm_source%3Darchdaily.com" target="_blank"><span data-dcnode-id="1020" instrument_node="">Real and Fake in Architecture–Close to the Original, Far from Authenticity?</span></a><span data-dcnode-id="1018" instrument_node=""> (Edition Axel Menges)</span></em></p><p data-dcnode-id="1015"></p><p data-dcnode-id="1014"></p><p data-dcnode-id="1006"><span data-dcnode-id="1013" instrument_node="">The term “fake” has been in the media frequently in the early 21</span><sup data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">st</span></sup><span data-dcnode-id="1010" instrument_node=""> century, referring to headlines and fictional statements that are perceived as real and are influencing public opinion and action. Replacing the historically more common term “propaganda,” fake news aims at misinformation and strives to “damage an agency, entity, or person, and/or gain financially or politically, often using sensationalist, dishonest, or outright fabricated headlines.”&nbsp;Tracing fake news and differentiating “real” information from personal opinions and identifying intentional (or unintentional) deceit can be complicated. It is similarly complex to trace the duality of fake and real in the built world. To explore the larger context of fake statements in architecture and environmental design, a look at the definition of </span><em data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">fake </span></em><span data-dcnode-id="1007" instrument_node="">and related terms might be necessary.</span></p><p data-dcnode-id="1005"></p><p class="thumbs afd-desktop-e clearfix" data-dcnode-id="991"><a class="thumbs__link" data-dcnode-id="1003" data-nr-picture-id="621769f03e4b31c673000040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/977462/is-fake-the-new-real-searching-for-an-architectural-reality/621769f03e4b31c673000040-is-fake-the-new-real-searching-for-an-architectural-reality-image" rel="attachment"><img alt="Am Römerberg 19-27 as seen from Römerberg from the southeast, Frankfurt/Main, Germany, 2011. Image by Simsalabimbam, distributed under a CC-BY-SA-4.0 license. Image Courtesy of Real and Fake in Architecture–Close to the Original, Far from Authenticity?" class="thumbs__img b-lazy" data-dcnode-id="1004" data-nr-picture-id="621769f03e4b31c673000040" data-pin-nopin="true" data-src="https://images.adsttc.com/media/images/6217/69f0/3e4b/31c6/7300/0040/thumb_jpg/14._Ro%CC%88merbergDevelopment.jpg?1645701598" height="125" longdesc="https://www.archdaily.com/977462/is-fake-the-new-real-searching-for-an-architectural-reality/621769f03e4b31c673000040-is-fake-the-new-real-searching-for-an-architectural-reality-image" src="data:image/ on afd-desktop-e" data-dcnode-id="892" id="55f1868d99e9bab13c000020"><span data-dcnode-id="893" instrument_node="">© Descriptive illustrated catalogue of the sixty-eight competitive designs for the great tower for London compiled and edited by Fred. C. Lynde</span></figcaption><i class="figcaption-cc-icon afd-desktop-e" data-dcnode-id="891"></i></figure><p data-dcnode-id="889"></p><p data-dcnode-id="875"><span data-dcnode-id="888" instrument_node="">While the </span><a data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/67788/ad-classics-eiffel-tower-gustave-eiffel/"><span data-dcnode-id="887" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="885" instrument_node=""> was negatively received at first for its utilitarian appearance, it soon became a major attraction for </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/paris"><span data-dcnode-id="884" instrument_node="">Paris</span></a><span data-dcnode-id="882" instrument_node="">, </span><a data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/france"><span data-dcnode-id="881" instrument_node="">France</span></a><span data-dcnode-id="879" instrument_node=""> in the late 19th century. It represented structural ingenuity and innovation and soon became a major feat, rising to 300 meters of7,500 tons of steel and iron. Just three years after its unveiling, </span><a data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/london"><span data-dcnode-id="878" instrument_node="">London</span></a><span data-dcnode-id="876" instrument_node=""> sponsored a competition for its own version of the tower in 1890. The Tower Company, Limited collected 68 designs, all variations of the design of the Eiffel Tower. Proposals were submitted from the United States, Canada, Germany, Sweden, Italy, Austria, Turkey and Australia. Many of the designs are bizarre interpretations of utilitarian structures, following the aesthetics of the Eiffel Tower, only bigger and taller.</span></p><p data-dcnode-id="874"></p><p data-dcnode-id="873"></p><p data-dcnode-id="868"><span data-dcnode-id="872" instrument_node="">Join us after the break for more on the story of the </span><a data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//wp.archdaily.com/tag/tower-of-london/%3Futm_medium%3Dwebsite%26utm_source%3Darchdaily.com" target="_blank"><span data-dcnode-id="871" instrument_node="">Tower of London</span></a><span data-dcnode-id="869" instrument_node="">.</span></p><p data-dcnode-id="867"></p></div><div class="hidden" data-dcnode-id="861"><span data-dcnode-id="864" itemprop="url"><span data-dcnode-id="865" instrument_node="">https://www.archdaily.com/304461/tower-of-london-competition-1890</span></span><span data-dcnode-id="862" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="863" instrument_node="">Irina Vinnitskaya</span></span></div><ul class="stream-socialbar clearfix afd-mobile-margin" data-dcnode-id="851"><li class="streamPost-bookmark" data-dcnode-id="855"><div class="single-bookmark" data-dcnode-id="856"><a class="afd-icon-text afd-save-item clearfix myarchdaily-multiple-fav" data-dcnode-id="857" data-image="https://images.adsttc.com/media/images/55f1/8718/99e9/bab1/3c00/0031/medium_jpg/7583385024_89fda80a36_o2.jpg?1441892116" data-insights-category="kth-signup-form" data-insights-id="1651310975066.1843" data-insights-label="nrd-save-this-bookmark" data-insights-value="3" data-message="Save this article" data-messagemobile="Save" data-status="create" data-title="Tower of London Competition 1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/304461/tower-of-london-competition-1890"><i class="afd-icon-text__icon afd-icon afd-icon--icon-folder-white" data-dcnode-id="860"></i><span class="afd-fl" data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Save this article</span></span></a></div></li><li class="stream-socialbar__more" data-dcnode-id="852"><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/304461/tower-of-london-competition-1890" title="Tower of London Competition 1890"><span data-dcnode-id="854" instrument_node="">Read more »</span></a></li></ul></div><span data-dcnode-id="849" instrument_node="">
</span><div class="afd-post-stream clearfix editors_choice" data-dcnode-id="793" itemscope="" itemtype="http://schema.org/Article"><div class="custom-tag-streamlogo" data-dcnode-id="848"></div><h3 class="afd-title--custom-tag afd-title-big--bmargin-small afd-mobile-margin" data-dcnode-id="844"><a class="afd-title--black-link" data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/895608/8-treasured-historic-architecture-sites-that-have-hosted-huge-rock-concerts"><span data-dcnode-id="846" itemprop="name"><span data-dcnode-id="847" instrument_node="">8 Treasured Historic Architecture Sites That Have Hosted Huge Rock Concerts</span></span></a></h3><meta content="2018-06-22" data-dcnode-id="843" itemprop="datePublished"><div class="date-publication afd-mobile-margin" data-dcnode-id="838"><span data-dcnode-id="839"><time data-dcnode-id="840" datetime="2018-06-22T13:30:00+00:00" lang="en"><span data-dcnode-id="841" instrument_node="">June 22, 2018</span></time></span></div><div class="afd-post-content" data-dcnode-id="809" itemprop="articleBody"><figure aria-labelledby="figcaption_newsroom-picture-att-id-5b119aecf197ccd7820002a4" class="featured-image js-image-size media-picture" data-dcnode-id="827" data-height="457" data-width="640" id="newsroom-picture-att-id-5b119aecf197ccd7820002a4" style="width: 640px; height: 457px;"><a class="js-image-size__link lazy-anchor" data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/895608/8-treasured-historic-architecture-sites-that-have-hosted-huge-rock-concerts" rel="attachment" style="width: 640px; height: 457px;"><img alt="8 Treasured Historic Architecture Sites That Have Hosted Huge Rock Concerts , © <a href='https://www.flickr.com/photos/thejointstaff/35142775934'>Flickr user thejointstaff</a> licensed under <a href='https://creativecommons.org/licenses/by/2.0/'>CC BY 2.0</a>" class="b-lazy b-loaded" data-dcnode-id="837" data-nr-picture-id="5b119aecf197ccd7820002a4" itemprop="image" longdesc="https://www.archdaily.com/895608/8-treasured-historic-architecture-sites-that-have-hosted-huge-rock-concerts/5b119aecf197ccd7820002a4-8-treasured-historic-architecture-sites-that-have-hosted-huge-rock-concerts-photo" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.adsttc.com/media/images/5b11/9aec/f197/ccd7/8200/02a4/newsletter/image4.jpg%3F1527880420&amp;raw"></a><figcaption class="figcaption afd-desktop-e" data-dcnode-id="829" id="figcaption_newsroom-picture-att-id-5b119aecf197ccd7820002a4"><span data-dcnode-id="835" instrument_node="">© </span><a class="sanitized-link" data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/thejointstaff/35142775934" target="_blank"><span data-dcnode-id="834" instrument_node="">Flickr user thejointstaff</span></a><span data-dcnode-id="832" instrument_node=""> licensed under </span><a class="sanitized-link" data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/2.0/" target="_blank"><span data-dcnode-id="831" instrument_node="">CC BY 2.0</span></a></figcaption><i class="figcaption-cc-icon afd-desktop-e" data-dcnode-id="828"></i></figure><p data-dcnode-id="826"></p><p data-dcnode-id="818" dir="ltr"><span data-dcnode-id="825" instrument_node="">Thanks to their loud, brash, and nocturnal nature, rock concerts are often held in dark bars and nightclubs designed to withstand the abuse of rowdy fans and guitar-smashing rockers. But as musicians earn a following, they eventually graduate from beer-soaked basements to prestigious theaters, outdoor amphitheaters, arenas, and stadiums. For performers and music fans alike, playing or attending a show in a space like Carnegie Hall, the Royal Albert Hall, Madison Square Garden or Colorado’s Red Rocks Amphitheater can be a momentous, once-in-a-lifetime opportunity that ties together the sublime power that great music and architecture can both evoke. As rare as these opportunities are, an exclusive group of iconic musicians have managed to reach an even higher level of prestige by organizing one-off performances amid humanity’s most treasured historical sites—from the </span><a data-dcnode-id="823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/acropolis"><span data-dcnode-id="824" instrument_node="">Acropolis</span></a><span data-dcnode-id="822" instrument_node=""> and ancient Mayan cities to the </span><a data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/colosseum"><span data-dcnode-id="821" instrument_node="">Colosseum</span></a><span data-dcnode-id="819" instrument_node=""> and the Eiffel Tower.</span></p><p data-dcnode-id="817"></p><p data-dcnode-id="816"></p><p data-dcnode-id="811"><span data-dcnode-id="815" instrument_node="">While these special concerts have given fans the chance to experience music history firsthand, many have also been mired in scandal as local officials and residents have raised </span><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/science/2007/sep/13/rock%3Futm_medium%3Dwebsite%26utm_source%3Darchdaily.com" target="_blank"><span data-dcnode-id="814" instrument_node="">concerns about potential damage to the sites</span></a><span data-dcnode-id="812" instrument_node=""> or inappropriate commercial misuse of treasured cultural landmarks. Despite these legitimate and often justified concerns, these nine iconic sites have hosted some of the most ambitious concerts in the history of popular music:</span></p><p data-dcnode-id="810"></p></div><div class="hidden" data-dcnode-id="804"><span data-dcnode-id="807" itemprop="url"><span data-dcnode-id="808" instrument_node="">https://www.archdaily.com/895608/8-treasured-historic-architecture-sites-that-have-hosted-huge-rock-concerts</span></span><span data-dcnode-id="805" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="806" instrument_node="">Jack McManus</span></span></div><ul class="stream-socialbar clearfix afd-mobile-margin" data-dcnode-id="794"><li class="streamPost-bookmark" data-dcnode-id="798"><div class="single-bookmark" data-dcnode-id="799"><a class="afd-icon-text afd-save-item clearfix myarchdaily-multiple-fav" data-dcnode-id="800" data-image="https://images.adsttc.com/media/images/5b11/9aec/f197/ccd7/8200/02a4/medium_jpg/image4.jpg?1527880420" data-insights-category="kth-signup-form" data-insights-id="1651310975066.5073" data-insights-label="nrd-save-this-bookmark" data-insights-value="4" data-message="Save this article" data-messagemobile="Save" data-status="create" data-title="8 Treasured Historic Architecture Sites That Have Hosted Huge Rock Concerts " href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/895608/8-treasured-historic-architecture-sites-that-have-hosted-huge-rock-concerts"><i class="afd-icon-text__icon afd-icon afd-icon--icon-folder-white" data-dcnode-id="803"></i><span class="afd-fl" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Save this article</span></span></a></div></li><li class="stream-socialbar__more" data-dcnode-id="795"><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/895608/8-treasured-historic-architecture-sites-that-have-hosted-huge-rock-concerts" title="8 Treasured Historic Architecture Sites That Have Hosted Huge Rock Concerts "><span data-dcnode-id="797" instrument_node="">Read more »</span></a></li></ul></div><span data-dcnode-id="792" instrument_node="">
</span><div class="afd-post-stream clearfix editors_choice" data-dcnode-id="730" itemscope="" itemtype="http://schema.org/Article"><div class="custom-tag-streamlogo" data-dcnode-id="791"></div><h3 class="afd-title--custom-tag afd-title-big--bmargin-small afd-mobile-margin" data-dcnode-id="787"><a class="afd-title--black-link" data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/893829/shortlist-announced-for-competition-to-redesign-the-eiffel-tower-visitor-experience"><span data-dcnode-id="789" itemprop="name"><span data-dcnode-id="790" instrument_node="">Shortlist Announced for Competition to Redesign the Eiffel Tower Visitor Experience</span></span></a></h3><meta content="2018-05-04" data-dcnode-id="786" itemprop="datePublished"><div class="date-publication afd-mobile-margin" data-dcnode-id="781"><span data-dcnode-id="782"><time data-dcnode-id="783" datetime="2018-05-04T16:00:00+00:00" lang="en"><span data-dcnode-id="784" instrument_node="">May 04, 2018</span></time></span></div><div class="afd-post-content" data-dcnode-id="746" itemprop="articleBody"><figure aria-labelledby="figcaption_newsroom-picture-att-id-5aec7d64f197cc334300037e" class="featured-image js-image-size media-picture" data-dcnode-id="775" data-height="444" data-width="640" id="newsroom-picture-att-id-5aec7d64f197cc334300037e" style="width: 640px; height: 444px;"><a class="js-image-size__link lazy-anchor" data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/893829/shortlist-announced-for-competition-to-redesign-the-eiffel-tower-visitor-experience" rel="attachment" style="width: 640px; height: 444px;"><img alt="Shortlist Announced for Competition to Redesign the Eiffel Tower Visitor Experience, Courtesy of AL_A" class="b-lazy b-loaded" data-dcnode-id="780" data-nr-picture-id="5aec7d64f197cc334300037e" itemprop="image" longdesc="https://www.archdaily.com/893829/shortlist-announced-for-competition-to-redesign-the-eiffel-tower-visitor-experience/5aec7d64f197cc334300037e-shortlist-announced-for-competition-to-redesign-the-eiffel-tower-visitor-experience-image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.adsttc.com/media/images/5aec/7d64/f197/cc33/4300/037e/newsletter/704-x-489.jpg%3F1525448031&amp;raw"></a><figcaption class="figcaption afd-desktop-e" data-dcnode-id="777" id="figcaption_newsroom-picture-att-id-5aec7d64f197cc334300037e"><span data-dcnode-id="778" instrument_node="">Courtesy of AL_A</span></figcaption><i class="figcaption-icon afd-desktop-e" data-dcnode-id="776"></i></figure><p data-dcnode-id="774"></p><p data-dcnode-id="764"><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/amanda-levete" target="_blank"><span data-dcnode-id="773" instrument_node="">Amanda Levete</span></a><span data-dcnode-id="771" instrument_node=""> is among one of four teams to be shortlisted for a competition to reimagine the visitor experience for the famous </span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/eiffel-tower" target="_blank"><span data-dcnode-id="770" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="768" instrument_node=""> in </span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/paris" target="_blank"><span data-dcnode-id="767" instrument_node="">Paris</span></a><span data-dcnode-id="765" instrument_node="">. The four teams, chosen from 42 entries, will be tasked with rethinking the ways in which people discover and interact with the tower, working in collaboration with the City of Paris government.</span></p><p data-dcnode-id="763"></p><p data-dcnode-id="762"></p><p data-dcnode-id="748"><span data-dcnode-id="761" instrument_node="">Titled “Discover, Approach, Visit,” the competition site covers 54 hectares of land on both sides of the River Seine, with the </span><a data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/eiffel-tower" target="_blank"><span data-dcnode-id="760" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="758" instrument_node=""> site located at the center. In preparation for </span><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/paris" target="_blank"><span data-dcnode-id="757" instrument_node="">Paris</span></a><span data-dcnode-id="755" instrument_node="">’ hosting of the </span><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/2024-olympics" target="_blank"><span data-dcnode-id="754" instrument_node="">2024 Olympic Games</span></a><span data-dcnode-id="752" instrument_node="">, the </span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/search/competitions" target="_blank"><span data-dcnode-id="751" instrument_node="">competition</span></a><span data-dcnode-id="749" instrument_node=""> asks teams to spend 10 months exploring how to enhance the visitor experience at the base of the tower, strengthen existing connections across the site, reconfigure public transport routes. </span></p><p data-dcnode-id="747"></p></div><div class="hidden" data-dcnode-id="741"><span data-dcnode-id="744" itemprop="url"><span data-dcnode-id="745" instrument_node="">https://www.archdaily.com/893829/shortlist-announced-for-competition-to-redesign-the-eiffel-tower-visitor-experience</span></span><span data-dcnode-id="742" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="743" instrument_node="">Niall Patrick Walsh</span></span></div><ul class="stream-socialbar clearfix afd-mobile-margin" data-dcnode-id="731"><li class="streamPost-bookmark" data-dcnode-id="735"><div class="single-bookmark" data-dcnode-id="736"><a class="afd-icon-text afd-save-item clearfix myarchdaily-multiple-fav" data-dcnode-id="737" data-image="https://images.adsttc.com/media/images/5aec/7d64/f197/cc33/4300/037e/medium_jpg/704-x-489.jpg?1525448031" data-insights-category="kth-signup-form" data-insights-id="1651310975066.7664" data-insights-label="nrd-save-this-bookmark" data-insights-value="5" data-message="Save this article" data-messagemobile="Save" data-status="create" data-title="Shortlist Announced for Competition to Redesign the Eiffel Tower Visitor Experience" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/893829/shortlist-announced-for-competition-to-redesign-the-eiffel-tower-visitor-experience"><i class="afd-icon-text__icon afd-icon afd-icon--icon-folder-white" data-dcnode-id="740"></i><span class="afd-fl" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Save this article</span></span></a></div></li><li class="stream-socialbar__more" data-dcnode-id="732"><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/893829/shortlist-announced-for-competition-to-redesign-the-eiffel-tower-visitor-experience" title="Shortlist Announced for Competition to Redesign the Eiffel Tower Visitor Experience"><span data-dcnode-id="734" instrument_node="">Read more »</span></a></li></ul></div><span data-dcnode-id="729" instrument_node="">
</span><div class="afd-post-stream clearfix" data-dcnode-id="663" itemscope="" itemtype="http://schema.org/Article"><div class="custom-tag-streamlogo" data-dcnode-id="728"></div><h3 class="afd-title--custom-tag afd-title-big--bmargin-small afd-mobile-margin" data-dcnode-id="724"><a class="afd-title--black-link" data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/891491/tiny-yet-incredibly-detailed-sketches-of-the-eiffel-tower-and-historic-cathedrals"><span data-dcnode-id="726" itemprop="name"><span data-dcnode-id="727" instrument_node="">Tiny (Yet Incredibly Detailed) Sketches of the Eiffel Tower and Historic Cathedrals</span></span></a></h3><meta content="2018-04-02" data-dcnode-id="723" itemprop="datePublished"><div class="date-publication afd-mobile-margin" data-dcnode-id="718"><span data-dcnode-id="719"><time data-dcnode-id="720" datetime="2018-04-02T12:00:00+00:00" lang="en"><span data-dcnode-id="721" instrument_node="">April 02, 2018</span></time></span></div><div class="afd-post-content" data-dcnode-id="679" itemprop="articleBody"><figure aria-labelledby="5abaee41f197cc66400000a2" class="js-image-size media-picture" data-dcnode-id="712" data-height="450" data-width="640" style="width: 640px; height: 450px;"><a class="js-image-size__link lazy-anchor" data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/891491/tiny-yet-incredibly-detailed-sketches-of-the-eiffel-tower-and-historic-cathedrals" style="width: 640px; height: 450px;"><img alt="Duomo Di Colonia. Courtesy Lorenzo Concas" class="b-lazy b-loaded" data-dcnode-id="717" itemprop="image" longdesc="https://www.archdaily.com/891491/tiny-yet-incredibly-detailed-sketches-of-the-eiffel-tower-and-historic-cathedrals/5abaee41f197cc66400000a2-tiny-yet-incredibly-detailed-sketches-of-the-eiffel-tower-and-historic-cathedrals-image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.adsttc.com/media/images/5aba/ee41/f197/cc66/4000/00a2/newsletter/Duomo_Di_Colonia.jpg%3F1522200124&amp;raw"></a><figcaption class="figcaption afd-desktop-e" data-dcnode-id="714" id="5abaee41f197cc66400000a2"><span data-dcnode-id="715" instrument_node="">Duomo Di Colonia. Courtesy Lorenzo Concas</span></figcaption><i class="figcaption-icon afd-desktop-e" data-dcnode-id="713"></i></figure><p data-dcnode-id="711"></p><p data-dcnode-id="703"><span data-dcnode-id="710" instrument_node="">Lorenzo Concas, an architect, photographer and light designer based in </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/florence"><span data-dcnode-id="709" instrument_node="">Florence</span></a><span data-dcnode-id="707" instrument_node="">, creates tiny sketches which are layered with an incredible amount of detail. The width of these drawings only spans the length of a fineliner, yet Concas manages to fit in detailed recreations of elaborate ornament. His drawings accentuate the play of light and dark on these </span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/gothic"><span data-dcnode-id="706" instrument_node="">Gothic</span></a><span data-dcnode-id="704" instrument_node=""> cathedrals and other famous monuments. </span></p><p data-dcnode-id="702"></p><p data-dcnode-id="701"></p><p data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">Using fineliners and Copic sketch markers, Concas captures these works of architecture from unique angles, allowing us to see the beauty and potential of these buildings in new ways. From intimate details of the Basilica di Santa Maria Novella to low angles which bring attention to the awe-inspiring height of the </span><a data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/eiffel-tower"><span data-dcnode-id="699" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="697" instrument_node="">, these drawings exhibit the power of the sketch and how architecture can come alive through pen and paper. </span></p><p data-dcnode-id="695"></p><p class="thumbs afd-desktop-e clearfix" data-dcnode-id="681"><a class="thumbs__link" data-dcnode-id="693" data-nr-picture-id="5abaee4cf197cc66400000a3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/891491/tiny-yet-incredibly-detailed-sketches-of-the-eiffel-tower-and-historic-cathedrals/5abaee4cf197cc66400000a3-tiny-yet-incredibly-detailed-sketches-of-the-eiffel-tower-and-historic-cathedrals-image" rel="attachment"><img alt="Tour Eiffel. Courtesy of Lorenzo Concas" class="thumbs__img b-lazy" data-dcnode-id="694" data-nr-picture-id="5abaee4cf197cc66400000a3" data-pin-nopin="true" data-src="https://images.adsttc.com/media/images/5aba/ee4c/f197/cc66/4000/00a3/thumb_jpg/Tour_Eiffel.jpg?1522200135" height="125" longdesc="https://www.archdaily.com/891491/tiny-yet-incredibly-detailed-sketches-of-the-eiffel-tower-and-historic-cathedrals/5abaee4cf197cc66400000a3-tiny-yet-incredibly-detailed-sketches-of-the-eiffel-tower-and-historic-cathedrals-image" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" title="Tour Eiffel. Courtesy of Lorenzo Concas" width="125"></a><a class="thumbs__link" data-dcnode-id="691" data-nr-picture-id="5abaee01f197cc664000009e" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/891491/tiny-yet-incredibly-detailed-sketches-of-the-eiffel-tower-and-historic-cathedrals/5abaee01f197cc664000009e-tiny-yet-incredibly-detailed-sketches-of-the-eiffel-tower-and-historic-cathedrals-image" rel="attachment"><img alt="Campanile di Giotto. Courtesy of Lorenzo Concas" class="thumbs__img b-lazy" data-dcnode-id="692" data-nr-picture-id="5abaee01f197cc664000009e" data-pin-nopin="true" data-src="https://images s/5a5c/9ad7/f197/cc25/0900/0404/medium_jpg/BeFunky_Collage.jpg?1516018379" itemprop="image" longdesc="https://www.archdaily.com/886227/fact-check-which-of-these-architecture-rumors-are-actually-true/5a5c9ad7f197cc2509000404-fact-check-which-of-these-architecture-rumors-are-actually-true-image" src="data:image/gif;base64,R0lGODlhAQABAIAAAAUEBAAAACwAAAAAAQABAAACAkQBADs="></a><figcaption class="figcaption afd-desktop-e" data-dcnode-id="648" id="figcaption_newsroom-picture-att-id-5a5c9ad7f197cc2509000404"></figcaption><i class="figcaption-icon afd-desktop-e" data-dcnode-id="647"></i></figure><p data-dcnode-id="645"></p><p data-dcnode-id="622"><span data-dcnode-id="644" instrument_node="">Fact-checking website </span><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/snopes"><span data-dcnode-id="643" instrument_node="">Snopes</span></a><span data-dcnode-id="641" instrument_node=""> (also known as the internet's </span><em data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">first</span></em><span data-dcnode-id="638" instrument_node=""> fact-checking website) has now been debunking Urban Legends and setting the record straight when it comes to "questionable" and/or fantastic stories for 23 years. </span><a data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.snopes.com/about-snopes/%3Futm_medium%3Dwebsite%26utm_source%3Darchdaily.com" target="_blank"><span data-dcnode-id="637" instrument_node="">In its two decades of operation</span></a><span data-dcnode-id="635" instrument_node="">, it has amassed not only thousands of well-researched explanations to perplexing myths but has also garnered the praise of news outlets like </span><em data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">The New York Times</span></em><span data-dcnode-id="632" instrument_node="">, </span><em data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">CNN</span></em><span data-dcnode-id="629" instrument_node="">, and </span><em data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Forbes</span></em><span data-dcnode-id="626" instrument_node="">. So what can </span><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/snopes"><span data-dcnode-id="625" instrument_node="">Snopes</span></a><span data-dcnode-id="623" instrument_node=""> tell us about our dear profession? Get your facts right with our list of dubious (and some not-so-dubious) claims about architecture, buildings, and city design.</span></p><p data-dcnode-id="621"></p></div><div class="hidden" data-dcnode-id="615"><span data-dcnode-id="618" itemprop="url"><span data-dcnode-id="619" instrument_node="">https://www.archdaily.com/886227/fact-check-which-of-these-architecture-rumors-are-actually-true</span></span><span data-dcnode-id="616" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="617" instrument_node="">AD Editorial Team</span></span></div><ul class="stream-socialbar clearfix afd-mobile-margin" data-dcnode-id="605"><li class="streamPost-bookmark" data-dcnode-id="609"><div class="single-bookmark" data-dcnode-id="610"><a class="afd-icon-text afd-save-item clearfix myarchdaily-multiple-fav" data-dcnode-id="611" data-image="https://images.adsttc.com/media/images/5a5c/9ad7/f197/cc25/0900/0404/medium_jpg/BeFunky_Collage.jpg?1516018379" data-insights-category="kth-signup-form" data-insights-id="1651310975066.699" data-insights-label="nrd-save-this-bookmark" data-insights-value="7" data-message="Save this article" data-messagemobile="Save" data-status="create" data-title="Fact Check: Which of These Architecture Rumors are Actually True?" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/886227/fact-check-which-of-these-architecture-rumors-are-actually-true"><i class="afd-icon-text__i -to-undergo-15-year-300-euros-million-renovation-project/587ccbc4e58ecea37600087d-the-eiffel-tower-to-undergo-15-year-300-euros-million-renovation-project-photo" src="data:image/gif;base64,R0lGODlhAQABAIAAAAUEBAAAACwAAAAAAQABAAACAkQBADs="></a><figcaption class="figcaption afd-desktop-e" data-dcnode-id="588" id="587ccbc4e58ecea37600087d"><span data-dcnode-id="589" instrument_node="">© Pixabay user Unsplash. Licensed under CC0 Public Domain</span></figcaption><i class="figcaption-cc-icon afd-desktop-e" data-dcnode-id="587"></i></figure><p data-dcnode-id="585"></p><p data-dcnode-id="580" dir="ltr"><span data-dcnode-id="584" instrument_node="">The </span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/eiffel-tower"><span data-dcnode-id="583" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="581" instrument_node=""> is set to undergo a massive renovation project: a 15-year, €300 Million endeavor that will preserve the attraction for decades to come.</span></p><p data-dcnode-id="579"></p><p data-dcnode-id="578"></p><p data-dcnode-id="573" dir="ltr"><span data-dcnode-id="577" instrument_node="">Built 128 years ago as a temporary structure for 1889 Universal Exhibition in </span><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/paris"><span data-dcnode-id="576" instrument_node="">Paris</span></a><span data-dcnode-id="574" instrument_node="">, the tower has since grown into a global icon, attracting nearly 7 million visitors per year and serving as an important symbol of French unity during times of both celebration and tragedy.</span></p><p data-dcnode-id="572"></p></div><div class="hidden" data-dcnode-id="566"><span data-dcnode-id="569" itemprop="url"><span data-dcnode-id="570" instrument_node="">https://www.archdaily.com/803472/the-eiffel-tower-to-undergo-15-year-300-euros-million-renovation-project</span></span><s ri20161013-11044-1i6yj36.jpg?1476379273" itemprop="image" longdesc="https://www.archdaily.com/797276/re-design-big-designs-what-if-it-was-designed-by-you/57ffc299e58ece518e00009d-re-design-big-designs-what-if-it-was-designed-by-you-image" src="data:image/gif;base64,R0lGODlhAQABAIAAAAUEBAAAACwAAAAAAQABAAACAkQBADs="></a><figcaption class="figcaption afd-desktop-e" data-dcnode-id="540" id="figcaption_newsroom-picture-att-id-57ffc299e58ece518e00009d"><span data-dcnode-id="541" instrument_node="">[RE]design BIG designs Eiffel Tower</span></figcaption><i class="figcaption-icon afd-desktop-e" data-dcnode-id="539"></i></figure><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">COMPETITION THEME – “[RE]design BIG designs” the goal is to think as the great names of architecture and to re-think BIG icons and monuments on it’s historical and urban context bringing it to our current days. “WHAT IF it was designed BY YOU”?? “How would you do it??” “What would this city be like?” Those are questions that we want participants to answer. The first building to [RE]design is the Eiffel Tower.</span></p></div><div class="hidden" data-dcnode-id="530"><span data-dcnode-id="533" itemprop="url"><span data-dcnode-id="534" instrument_node="">https://www.archdaily.com/797276/re-design-big-designs-what-if-it-was-designed-by-you</span></span><span data-dcnode-id="531" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="532" instrument_node="">Rene Submissions</span></span></div><ul class="stream-socialbar clearfix afd-mobile-margin" data-dcnode-id="520"><li class="streamPost-bookmark" data-dcnode-id="524"><div class="single-bookmark" data-dcnode-id="525"><a class="afd-icon-text afd-save-item clearfix myarchdaily-multiple-fav" data-dcnode-id="526" data-image="https://images.adsttc.com/media/images/57ff/c299/e58e/ce51/8e00/009d/medium_jpg/open-uri20161013-11044-1i6yj36.jpg?1476379273" data-insights-category="kth-signup-form" data-insights-id </span><div class="afd-post-stream clearfix" data-dcnode-id="469" itemscope="" itemtype="http://schema.org/Article"><div class="custom-tag-streamlogo" data-dcnode-id="517"></div><h3 class="afd-title--custom-tag afd-title-big--bmargin-small afd-mobile-margin" data-dcnode-id="513"><a class="afd-title--black-link" data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/774331/do-you-know-about-the-secret-apartment-at-the-top-of-the-eiffel-tower"><span data-dcnode-id="515" itemprop="name"><span data-dcnode-id="516" instrument_node="">Do You Know About the Secret Apartment at the Top of the Eiffel Tower?</span></span></a></h3><meta content="2015-09-26" data-dcnode-id="512" itemprop="datePublished"><div class="date-publication afd-mobile-margin" data-dcnode-id="507"><span data-dcnode-id="508"><time data-dcnode-id="509" datetime="2015-09-26T12:00:00+00:00" lang="en"><span data-dcnode-id="510" instrument_node="">September 26, 2015</span></time></span></div><div class="afd-post-content" data-dcnode-id="485" itemprop="articleBody"><figure aria-labelledby="figcaption_newsroom-picture-att-id-56056f28e58ece79a500027a" class="featured-image js-image-size media-picture" data-dcnode-id="501" data-height="426" data-width="640" id="newsroom-picture-att-id-56056f28e58ece79a500027a" style="width: 640px; height: 426px;"><a class="js-image-size__link lazy-anchor" data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/774331/do-you-know-about-the-secret-apartment-at-the-top-of-the-eiffel-tower" rel="attachment" style="width: 640px; height: 426px;"><img alt="Do You Know About the Secret Apartment at the Top of the Eiffel Tower?, © Flickr user: anirudhkoul licensed under CC BY-NC 2.0" class="b-lazy" data-dcnode-id="506" data-nr-picture-id="56056f28e58ece79a500027a" data-src="https://images.adsttc.com/media/images/5605/6f28/e58e/ce79/a500/027a/newsletter/stringio.jpg?1443196708" data-src-small="https://images.adsttc.com/media/images/5605/6f28/e58e/ce79/a500/027a/medium_jpg/stringio.jpg?1443196708" itemprop="image" longdesc="https://www.archdaily.com/774331/do-you-know-about-the-secret-apartment-at-the-top-of-the-eiffel-tower/56056f28e58ece79a500027a-do-you-know-about-the-secret-apartment-at-the-top-of-the-eiffel-tower-photo" src="data:image/gif;base64,R0lGODlhAQABAIAAAAUEBAAAACwAAAAAAQABAAACAkQBADs="></a><figcaption class="figcaption afd-desktop-e" data-dcnode-id="503" id="figcaption_newsroom-picture-att-id-56056f28e58ece79a500027a"><span data-dcnode-id="504" instrument_node="">© Flickr user: anirudhkoul licensed under CC BY-NC 2.0</span></figcaption><i class="figcaption-cc-icon afd-desktop-e" data-dcnode-id="502"></i></figure><p data-dcnode-id="500"></p><p data-dcnode-id="492"><span data-dcnode-id="499" instrument_node="">Since opening in 1889, over 250 million people have visited the iconic </span><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/tag/eiffel-tower" target="_blank"><span data-dcnode-id="498" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="496" instrument_node=""> in </span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/tag/paris" target="_blank"><span data-dcnode-id="495" instrument_node="">Paris</span></a><span data-dcnode-id="493" instrument_node="">. A rare experience for most, a trip to the Eiffel Tower includes long queues, beautiful views, and...a visit to Gustave Eiffel's private apartment? Unbeknownst to most 19th century Parisians (save for a privileged few), the tower's celebrated designer built himself a humble little abode 285 meters (935 feet) up the tower. Closed for decades, in recent years the management of the Eiffel Tower have opened Eiffel's apartment to the public, grand piano and all.</span></p><p data-dcnode-id="491"></p><p data-dcnode-id="490"></p><p data-dcnode-id="487"><em data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Enter Gustave Eiffel's secret&nbsp;apartment after the break</span></em></p><p data-dcnode-id="486"></p></div><div class="hidden" data-dcnode-id="480"><span data-dcnode-id="483" itemprop="url"><span data-dcnode-id="484" instrument_node="">https://www.archdaily.com/774331/do-you-know-about-the-secret-apartment-at-the-top-of-the-eiffel-tower</span></span><span data-dcnode-id="481" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="482" instrument_node="">Finn MacLeod</span></span></div><ul class="stream-socialbar clearfix afd-mobile-margin" data-dcnode-id="470"><li class="streamPost-bookmark" data-dcnode-id="474"><div class="single-bookmark" data-dcnode-id="475"><a class="afd-icon-text afd-save-item clearfix myarchdaily-multiple-fav" data-dcnode-id="476" data-image="https://images.adsttc.com/media/images/5605/6f28/e58e/ce79/a500/027a/medium_jpg/stringio.jpg?1443196708" data-insights-category="kth-signup-form" data-insights-id="1651310975066.1982" data-insights-label="nrd-save-this-bookmark" data-insights-value="10" data-message="Save this article" data-messagemobile="Save" data-status="create" data-title="Do You Know About the Secret Apartment at the Top of the Eiffel Tower?" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/774331/do-you-know-about-the-secret-apartment-at-the-top-of-the-eiffel-tower"><i class="afd-icon-text__icon afd-icon afd-icon--icon-folder-white" data-dcnode-id="479"></i><span class="afd-fl" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Save this article</span></span></a></div></li><li class="stream-socialbar__more" data-dcnode-id="471"><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/774331/do-you-know-about-the-secret-apartment-at-the-top-of-the-eiffel-tower" title="Do You Know About the Secret Apartment at the Top of the Eiffel Tower?"><span data-dcnode-id="473" instrument_node="">Read more »</span></a></li></ul></div><span data-dcnode-id="468" instrument_node="">
</span><div class="afd-post-stream clearfix editors_choice" data-dcnode-id="402" itemscope="" itemtype="http://schema.org/Article"><div class="custom-tag-streamlogo" data-dcnode-id="467"></div><h3 class="afd-title--custom-tag afd-title-big--bmargin-small afd-mobile-margin" data-dcnode-id="463"><a class="afd-title--black-link" data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos"><span data-dcnode-id="465" itemprop="name"><span data-dcnode-id="466" instrument_node="">The Architectural Lab: A History Of World Expos</span></span></a></h3><meta content="2015-04-30" data-dcnode-id="462" itemprop="datePublished"><div class="date-publication afd-mobile-margin" data-dcnode-id="457"><span data-dcnode-id="458"><time data-dcnode-id="459" datetime="2015-04-30T14:30:46+00:00" lang="en"><span data-dcnode-id="460" instrument_node="">April 30, 2015</span></time></span></div><div class="afd-post-content" data-dcnode-id="418" itemprop="articleBody"><figure aria-labelledby="55419042e58ece706c000346" class="js-image-size media-picture" data-dcnode-id="451" data-height="473" data-width="640" style="width: 640px; height: 473px;"><a class="js-image-size__link lazy-anchor" data-dcnode-id="455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos" style="width: 640px; height: 473px;"><img alt="The Universal Exposition of 1889. Image © Wikimedia Commons" class="b-lazy" data-dcnode-id="456" data-src="https://images.adsttc.com/media/images/5541/9042/e58e/ce70/6c00/0346/large_jpg/Eiffel_Tower_and_general_view_of_the_grounds__Exposition_Universal__1900__Paris__France_2.jpg?1430360114" data-src-small="https://images.adsttc.com/media/images/5541/9042/e58e/ce70/6c00/0346/medium_jpg/Eiffel_Tower_and_general_view_of_the_grounds__Exposition_Universal__1900__Paris__France_2.jpg?1430360114" itemprop="image" longdesc="https://www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos/55419042e58ece706c000346-the-architectural-lab-a-history-of-world-expos-photo" src="data:image/gif;base64,R0lGODlhAQABAIAAAAUEBAAAACwAAAAAAQABAAACAkQBADs="></a><figcaption class="figcaption afd-desktop-e" data-dcnode-id="453" id="55419042e58ece706c000346"><span data-dcnode-id="454" instrument_node="">The Universal Exposition of 1889. Image © Wikimedia Commons</span></figcaption><i class="figcaption-cc-icon afd-desktop-e" data-dcnode-id="452"></i></figure><p data-dcnode-id="450"></p><p data-dcnode-id="442"><span data-dcnode-id="449" instrument_node="">World Expos have long been important in advancing architectural innovation and discourse. Many of our most beloved monuments were designed and constructed specifically for world’s fairs, only to remain as iconic fixtures in the cities that host them. But what is it about Expos that seem to create such lasting architectural landmarks, and is this still the case today? Throughout history, each new Expo offered architects an opportunity to present radical ideas and use these events as a creative laboratory for testing bold innovations in design and building </span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/tag/technology/" target="_blank"><span data-dcnode-id="448" instrument_node="">technology</span></a><span data-dcnode-id="446" instrument_node="">. World’s fairs inevitably encourage competition, with every country striving to put their best foot forward at almost any cost. This carte blanche of sorts allows architects to eschew many of the programmatic constraints of everyday commissions and concentrate on expressing ideas in their purest form. Many masterworks such as </span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/109135/ad-classics-barcelona-pavilion-mies-van-der-rohe/" target="_blank"><span data-dcnode-id="445" instrument_node="">Mies van der Rohe’s German Pavilion (better known as the Barcelona Pavilion)</span></a><span data-dcnode-id="443" instrument_node=""> for the 1929 Barcelona International Exposition are so wholeheartedly devoted to their conceptual approach that they could only be possible in the context of an Exposition pavilion.</span></p><p data-dcnode-id="441"></p><p data-dcnode-id="440"></p><p data-dcnode-id="435"><span data-dcnode-id="439" instrument_node="">To celebrate the opening of </span><a data-dcnode-id="437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/tag/milan-expo-2015/" target="_blank"><span data-dcnode-id="438" instrument_node="">Expo Milano 2015</span></a><span data-dcnode-id="436" instrument_node=""> tomorrow, we’ve rounded up a few of history’s most noteworthy World Expositions to take a closer look at their impact on architectural development.</span></p><p data-dcnode-id="434"></p><p class="thumbs afd-desktop-e clearfix" data-dcnode-id="420"><a class="thumbs__link" data-dcnode-id="432" data-nr-picture-id="5541921be58ece5029000369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos/5541921be58ece5029000369-the-architectural-lab-a-history-of-world-expos-image" rel="attachment"><img alt="1964 New York World’s Fair . Image via People for the Pavillion website" class="thumbs__img b-lazy" data-dcnode-id="433" data-nr-picture-id="5541921be58ece5029000369" data-pin-nopin="true" data-src="https://images.adsttc.com/media/images/5541/921b/e58e/ce50/2900/0369/thumb_jpg/53345a5ec07a808489000180_ad-classics-new-york-state-pavillion-philip-johnson_img10.jpg?1430360599" height="125" longdesc="https://www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos/5541921be58ece5029000369-the-architectural-lab-a-history-of-world-expos-image" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" title="1964 New York World’s Fair . Image via People for the Pavillion website" width="125"></a><a class="thumbs__link" data-dcnode-id="430" data-nr-picture-id="5541951ee58ece706c00035d" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos/5541951ee58ece706c00035d-the-architectural-lab-a-history-of-world-expos-photo" rel="attachment"><img alt="Buckminster Fuller's Dome. Image © Flickr user abdallahh" class="thumbs__img b-lazy" data-dcnode-id="431" data-nr-picture-id="5541951ee58ece706c00035d" data-pin-nopin="true" data-src="https://images.adsttc.com/media/images/5541/951e/e58e/ce70/6c00/035d/thumb_jpg/546a753be58ecea75a00002f_ad-classics-montreal-biosphere-buckminster-fuller_abdallahh.jpg?1430361368" height="125" longdesc="https://www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos/5541951ee58ece706c00035d-the-architectural-lab-a-history-of-world-expos-photo" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" title="Buckminster Fuller's Dome. Image © Flickr user abdallahh" width="125"></a><a class="thumbs__link" data-dcnode-id="428" data-nr-picture-id="55422b4ee58ece706c00038f" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos/55422b4ee58ece706c00038f-the-architectural-lab-a-history-of-world-expos-photo" rel="attachment"><img alt="Barcelona Pavilion. Image © Gili Merin" class="thumbs__img b-lazy" data-dcnode-id="429" data-nr-picture-id="55422b4ee58ece706c00038f" data-pin-nopin="true" data-src="https://images.adsttc.com/media/images/5542/2b4e/e58e/ce70/6c00/038f/thumb_jpg/54c6abfce58ece9901000001_ad-classics-barcelona-pavilion-mies-van-der-rohe_mies72.jpg?1430399809" height="125" longdesc="https://www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos/554 a></p></div><div class="hidden" data-dcnode-id="413"><span data-dcnode-id="416" itemprop="url"><span data-dcnode-id="417" instrument_node="">https://www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos</span></span><span data-dcnode-id="414" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="415" instrument_node="">Evan Rawn</span></span></div><ul class="stream-socialbar clearfix afd-mobile-margin" data-dcnode-id="403"><li class="streamPost-bookmark" data-dcnode-id="407"><div class="single-bookmark" data-dcnode-id="408"><a class="afd-icon-text afd-save-item clearfix myarchdaily-multiple-fav" data-dcnode-id="409" data-image="https://images.adsttc.com/media/images/5541/9042/e58e/ce70/6c00/0346/medium_jpg/Eiffel_Tower_and_general_view_of_the_grounds__Exposition_Universal__1900__Paris__France_2.jpg?1430360114" data-insights-category="kth-signup-form" data-insights-id="1651310975066.878" data-insights-label="nrd-save-this-bookmark" data-insights-value="11" data-message="Save this article" data-messagemobile="Save" data-status="create" data-title="The Architectural Lab: A History Of World Expos " href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos"><i class="afd-icon-text__icon afd-icon afd-icon--icon-folder-white" data-dcnode-id="412"></i><span class="afd-fl" data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Save this article</span></span></a></div></li><li class="stream-socialbar__more" data-dcnode-id="404"><a data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/625936/the-architectural-lab-a-history-of-world-expos" title="The Architectural Lab: A History Of World Expos "><span data-dcnode-id="406" instrument_node="">Read more »</span></a></li></ul></div><span data-dcnode-id="401" instrument_node="">
</span><div class="afd-post-stream clearfix" data-dcnode-id="344" itemscope="" itemtype="http://schema.org/Article"><div class="custom-tag-streamlogo" data-dcnode-id="400"></div><h3 class="afd-title--custom-tag afd-title-big--bmargin-small afd-mobile-margin" data-dcnode-id="396"><a class="afd-title--black-link" data-dcnode-id="397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/596076/eiffel-tower-and-burj-khalifa-listed-top-3-in-global-selfie-rankings"><span data-dcnode-id="398" itemprop="name"><span data-dcnode-id="399" instrument_node="">Eiffel Tower and Burj Khalifa Listed Top 3 in Global “Selfie” Rankings</span></span></a></h3><meta content="2015-02-08" data-dcnode-id="395" itemprop="datePublished"><div class="date-publication afd-mobile-margin" data-dcnode-id="390"><span data-dcnode-id="391"><time data-dcnode-id="392" datetime="2015-02-08T05:00:00+00:00" lang="en"><span data-dcnode-id="393" instrument_node="">February 08, 2015</span></time></span></div><div class="afd-post-content" data-dcnode-id="360" itemprop="articleBody"><figure aria-labelledby="figcaption_newsroom-picture-att-id-54d531cfe58ece14f7000046" class="featured-image js-image-size media-picture" data-dcnode-id="384" data-height="580" data-width="386" id="newsroom-picture-att-id-54d531cfe58ece14f7000046" style="width: 386px; height: 580px;"><a class="js-image-size__link lazy-anchor" data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/596076/eiffel-tower-and-burj-khalifa-listed-top-3-in-global-selfie-rankings" rel="attachment" style="width: 386px; height: 580px;"><img alt="Eiffel Tower and Burj Khalifa Listed Top 3 in Global “Selfie” Rankings, Burj Khalifa. Image © Flickr CC user Christian van Elven" class="b-lazy" data-dcnode-id="389" data-nr-picture-id="54d531cfe58ece14f7000046" data-src="https://images.adsttc.com/media/images/54d5/31cf/e58e/ce14/f700/0046/medium_jpg/7198436780_fb561b02d2_o.jpg?1423258024" data-src-small="https://images.adsttc.com/media/images/54d5/31cf/e58e/ce14/f700/0046/medium_jpg/7198436780_fb561b02d2_o.jpg?1423258024" itemprop="image" longdesc="https://www.archdaily.com/596076/eiffel-tower-and-burj-khalifa-listed-top-3-in-global-selfie-rankings/54d531cfe58ece14f7000046-burj-khalifa" src="data:image/gif;base64,R0lGODlhAQABAIAAAAUEBAAAACwAAAAAAQABAAACAkQBADs="></a><figcaption class="figcaption afd-desktop-e" data-dcnode-id="386" id="figcaption_newsroom-picture-att-id-54d531cfe58ece14f7000046"><span data-dcnode-id="387" instrument_node="">Burj Khalifa. Image © Flickr CC user Christian van Elven</span></figcaption><i class="figcaption-cc-icon afd-desktop-e" data-dcnode-id="385"></i></figure><p data-dcnode-id="383"></p><p class="p1" data-dcnode-id="366"><span data-dcnode-id="382" instrument_node="">New research has found that (unsurprisingly) the </span><a data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/67788/ad-classics-eiffel-tower-gustave-eiffel/" target="_blank"><span data-dcnode-id="381" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="379" instrument_node=""> and </span><a data-dcnode-id="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/tag/burj-khalifa/" target="_blank"><span data-dcnode-id="378" instrument_node="">Burj Khalifa</span></a><span data-dcnode-id="376" instrument_node=""> - the world’s tallest building - are among the top three most popular backdrops for “</span><a data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/491891/sap-releases-rare-images-of-architecture-selfies/" target="_blank"><span data-dcnode-id="375" instrument_node="">selfies</span></a><span data-dcnode-id="373" instrument_node="">.” The study, conducted by </span><a data-dcnode-id="371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.attractiontix.co.uk/%3Futm_medium%3Dwebsite%26utm_source%3Darchdaily.com" target="_blank"><span data-dcnode-id="372" instrument_node="">attractiontix</span></a><span data-dcnode-id="370" instrument_node="">, used data from Instagram to come up with the list, of which the Colosseum in Rome and Barcelona’s </span><a data-dcnode-id="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/438992/ad-classics-la-sagrada-familia-antoni-gaudi/" target="_blank"><span data-dcnode-id="369" instrument_node="">La Sagrada Familia</span></a><span data-dcnode-id="367" instrument_node=""> seems to have also secured a top spot. </span></p><p data-dcnode-id="365"></p><p data-dcnode-id="364"></p><p class="p1" data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">The top 10 “selfied” attractions (in order) are:</span></p><p data-dcnode-id="361"></p></div><div class="hidden" data-dcnode-id="355"><span data-dcnode-id="358" itemprop="url"><span data-dcnode-id="359" instrument_node="">https://www.archdaily.com/596076/eiffel-tower-and-burj-khalifa-listed-top-3-in-global-selfie-rankings</span></span><span data-dcnode-id="356" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="357" instrument_node="">Karissa Rosenfield</span></span></div><ul class="stream-socialbar clearfix afd-mobile-margin" data-dcnode-id="345"><li class="streamPost-bookmark" data-dcnode-id="349"><div class="single-bookmark" data-dcnode-id="350"><a class="afd-icon-text afd-save-item clearfix myarchdaily-multiple-fav" data-dcnode-id="351" data-image="https://images.adsttc.com/media/images/54d5/31cf/e58e/ce14/f700/0046/medium_jpg/7198436780_fb561b02d2_o.jpg?1423258024" data-insights-category="kth-signup-form" data-insights-id="1651310975066.9387" data-insights-label="nrd-save-this-bookmark" data-insights-value="12" data-message="Save this article" data-messagemobile="Save" data-status="create" data-title="Eiffel Tower and Burj Kh es/52bc/5d14/e8e4/4efd/0900/00ba/medium_jpg/Screen_Shot_2013-12-26_at_9.35.24_AM.jpg?1388076296" itemprop="image" longdesc="https://www.archdaily.com/462479/lego-architecture-landmark-series-the-eiffel-tower/52bc5d14e8e44efd090000ba-lego-architecture-landmark-series-the-eiffel-tower-photo" src="data:image/gif;base64,R0lGODlhAQABAIAAAAUEBAAAACwAAAAAAQABAAACAkQBADs="></a><figcaption class="figcaption afd-desktop-e" data-dcnode-id="328" id="figcaption_newsroom-picture-att-id-52bc5d14e8e44efd090000ba"><span data-dcnode-id="329" instrument_node="">The Eiffel Tower. Image © LEGO® Architecture</span></figcaption><i class="figcaption-cc-icon afd-desktop-e" data-dcnode-id="327"></i></figure><p data-dcnode-id="325"></p><p data-dcnode-id="305"><a data-dcnode-id="323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/tag/lego/"><span data-dcnode-id="324" instrument_node="">LEGO</span></a><span data-dcnode-id="322" instrument_node="">® has announced the architecture series’ newest addition: </span><a data-dcnode-id="320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/67788/ad-classics-eiffel-tower-gustave-eiffel/"><span data-dcnode-id="321" instrument_node="">The Eiffel Tower (La tour Eiffel)</span></a><span data-dcnode-id="319" instrument_node="">. Named after its engineer, </span><a data-dcnode-id="316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archdaily.com/tag/gustave-eiffel/"><span data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Gustave Eiffel</span></span></a><span data-dcnode-id="315" instrument_node="">, the famous lattice structure is one of the most recognizable landmarks in the world. Built on the Champ de Mars in </span><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/paris"><span data-dcnode-id="314" instrument_node="">Paris</span></a><span data-dcnode-id="312" instrument_node="">, </span><a data-dcnode-id="310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/france"><span data-dcnode-id="311" instrument_node="">France</span></a><span data-dcnode-id="309" instrument_node="">, to serve as the entrance to the 1889 World’s Fair, The Eiffel Tower was the tallest structure in the world until 1930, and remains the tallest structure in </span><a data-dcnode-id="307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/tag/paris"><span data-dcnode-id="308" instrument_node="">Paris</span></a><span data-dcnode-id="306" instrument_node="">. More than 5,000 detailed drawings were required to assemble the 1063-foot tower’s 18,038 iron parts, which took just over two years to complete. </span></p><p data-dcnode-id="304"></p></div><div class="hidden" data-dcnode-id="298"><span data-dcnode-id="301" itemprop="url"><span data-dcnode-id="302" instrument_node="">https://www.archdaily.com/462479/lego-architecture-landmark-series-the-eiffel-tower</span></span><span data-dcnode-id="299" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span data-dcnode-id="300" instrument_node="">Karissa Rosenfield</span></span></div><ul class="stream-socialbar clearfix afd-mobile-margin" data-dcnode-id="288"><li class="streamPost-bookmark" data-dcnode-id="292"><div class="single-bookmark" data-dcnode-id="293"><a class="afd-icon-text afd-save-item clearfix myarchdaily-multiple-fav" data-dcnode-id="294" data-image="https://images.adsttc.com/media/images/52bc/5d14/e8e4/4efd/0900/00ba/medium_jpg/Screen_Shot_2013-12-26_at_9.35.24_AM.jpg?1388076296" data-insights-category="kth-signup-form" data-insights-id="1651310975066.3977" data-insights-label="nrd-save-this-bookmark" data-insights-value="13" data-message="Save this article" data-messagemobile="Save" data-status="create" data-title="LEGO® Architecture Landmark Series: The Eiffel Tower" href="https
