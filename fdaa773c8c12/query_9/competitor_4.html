</span><div class="md-intent-accordion mb-30 p-10 border border-gray-200 border-top-purple border-top-5 rounded-bl rounded-br shadow-sm" data-dcnode-id="1463" id="intent-accordion"><div class="title mb-5 font-weight-bold text-uppercase font-14 text-center" data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Top Questions</span></div><span data-dcnode-id="1536" instrument_node=""> </span><h3 class="accordion--question p-10 pr-25 bg-gray-100 mb-0 mt-5" data-dcnode-id="1533" data-value="1"><div class="pe-none" data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">What was the Eiffel Tower built for?</span></div></h3><span data-dcnode-id="1532" instrument_node=""> </span><div class="accordion--answer hidden border border-top-0" data-dcnode-id="1525"><div class="accordion--answer-copy p-20 bg-gray-50" data-dcnode-id="1526"><p class="font-16 lh-sm" data-dcnode-id="1527"><span data-dcnode-id="1531" instrument_node="">When the French government was organizing the International Exposition of 1889 to celebrate the centenary of the French Revolution, a competition was held for designs for a suitable monument. More than 100 plans were submitted, and the Centennial Committee chose that of the noted bridge engineer </span><a class="md-crosslink" data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Gustave-Eiffel"><span data-dcnode-id="1530" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="1528" instrument_node="">. When completed, the Eiffel Tower served as the entrance gateway to the exposition. </span></p></div></div><span data-dcnode-id="1524" instrument_node=""> </span><h3 class="accordion--question p-10 pr-25 bg-gray-100 mb-0 mt-5" data-dcnode-id="1521" data-value="2"><div class="pe-none" data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">What does the Eiffel Tower represent?</span></div></h3><span data-dcnode-id="1520" instrument_node=""> </span><div class="accordion--answer hidden border border-top-0" data-dcnode-id="1513"><div class="accordion--answer-copy p-20 bg-gray-50" data-dcnode-id="1514"><p class="font-16 lh-sm" data-dcnode-id="1515"><span data-dcnode-id="1519" instrument_node="">The Eiffel Tower was initially built to serve as the entrance gateway to the International Exposition of 1889 as well as a testament to French industrial ingenuity. It has since come to represent the distinct character of the city of </span><a class="md-crosslink" data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Paris"><span data-dcnode-id="1518" instrument_node="">Paris</span></a><span data-dcnode-id="1516" instrument_node="">. Its lights are also often turned on or off to reflect commemoration of major world events.</span></p></div></div><span data-dcnode-id="1512" instrument_node=""> </span><h3 class="accordion--question p-10 pr-25 bg-gray-100 mb-0 mt-5" data-dcnode-id="1509" data-value="3"><div class="pe-none" data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">What is the Eiffel Tower made of?</span></div></h3><span data-dcnode-id="1508" instrument_node=""> </span><div class="accordion--answer hidden border border-top-0" data-dcnode-id="1495"><div class="accordion--answer-copy p-20 bg-gray-50" data-dcnode-id="1496"><p class="font-16 lh-sm" data-dcnode-id="1497"><span data-dcnode-id="1507" instrument_node="">The Eiffel Tower is made almost entirely of open-lattice </span><a class="md-crosslink" data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/wrought-iron"><span data-dcnode-id="1506" instrument_node="">wrought iron</span></a><span data-dcnode-id="1504" instrument_node="">. </span><a class="md-crosslink" data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Gustave-Eiffel"><span data-dcnode-id="1503" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="1501" instrument_node=""> used his advanced knowledge of the behaviour of metal arch and metal truss forms under loading to design a light and airy but strong structure that presaged a revolution in </span><a class="md-crosslink" data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/civil-engineering"><span data-dcnode-id="1500" instrument_node="">civil engineering</span></a><span data-dcnode-id="1498" instrument_node=""> and architectural design. </span></p></div></div><span data-dcnode-id="1494" instrument_node=""> </span><h3 class="accordion--question p-10 pr-25 bg-gray-100 mb-0 mt-5" data-dcnode-id="1491" data-value="4"><div class="pe-none" data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Where is the Eiffel Tower located in Paris?</span></div></h3><span data-dcnode-id="1490" instrument_node=""> </span><div class="accordion--answer hidden border border-top-0" data-dcnode-id="1474"><div class="accordion--answer-copy p-20 bg-gray-50" data-dcnode-id="1475"><p class="font-16 lh-sm" data-dcnode-id="1476"><span data-dcnode-id="1489" instrument_node="">The Eiffel Tower can be found on the Champs de Mars at 5 Avenue Anatole France within the 7th arrondissement of </span><a class="md-crosslink" data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Paris"><span data-dcnode-id="1488" instrument_node="">Paris</span></a><span data-dcnode-id="1486" instrument_node="">. Situated on the “Left Bank,” meaning it is to the south of the </span><a class="md-crosslink" data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Seine-River"><span data-dcnode-id="1485" instrument_node="">Seine River</span></a><span data-dcnode-id="1483" instrument_node="">, the storied 7th arrondissement neighbourhood in Paris is home to many other famous tourist attractions, such as the </span><a class="md-crosslink" data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Musee-dOrsay"><span data-dcnode-id="1482" instrument_node="">Musée d’Orsay</span></a><span data-dcnode-id="1480" instrument_node=""> and the </span><a class="md-crosslink" data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Rodin-Museum"><span data-dcnode-id="1479" instrument_node="">Rodin Museum</span></a><span data-dcnode-id="1477" instrument_node="">. </span></p></div></div><span data-dcnode-id="1473" instrument_node=""> </span><h3 class="accordion--question p-10 pr-25 bg-gray-100 mb-0 mt-5" data-dcnode-id="1470" data-value="5"><div class="pe-none" data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">When does the Eiffel Tower sparkle?</span></div></h3><span data-dcnode-id="1469" instrument_node=""> </span><div class="accordion--answer hidden border border-top-0" data-dcnode-id="1465"><div class="accordion--answer-copy p-20 bg-gray-50" data-dcnode-id="1466"><p class="font-16 lh-sm" data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">The Eiffel Tower can be seen sparkling every night for five minutes each hour, at the precise start of the hour. The current lighting system has been in place since 1985, though the tower has been lit up in various fashions since its 1889 debut for the International Exposition, when gaslights were used.</span></p></div></div><span data-dcnode-id="1464" instrument_node=""> </span></div><span class="marker before-article" data-dcnode-id="1461"></span><div class="md-sentinel--spy-target" data-dcnode-id="1460"></div><section data-dcnode-id="1305" data-has-spy="true" data-level="1" id="ref1"><div class="assemblies inline-video" data-dcnode-id="1441"><div class="w-100" data-dcnode-id="1442"><figure class="md-assembly card print-false" data-assembly-id="16481" data-dcnode-id="1443"><div class="md-assembly-wrapper card-media" data-dcnode-id="1453" data-type="video"><a class="d-flex justify-content-center" data-dcnode-id="1454" data-id="22014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/video/22014/Eiffel-Tower-Paris" style="--aspect-ratio: 16/9"><img alt="Take in a top to bottom look at Paris's Eiffel Tower commissioned for International Exposition of 1889" data-dcnode-id="1459" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/14/22014-138-A86261CD/Eiffel-Tower-Paris.jpg%3Fw%3D800%26h%3D450%26c%3Dcrop&amp;raw"><div class="btn btn-xl btn-white btn-circle position-absolute shadow" data-dcnode-id="1455" style="top: 50%; transform: translateY(-50%)"><em class="material-icons" data-dcnode-id="1456" data-icon="play_arrow"></em></div></a></div><figcaption class="card-body" data-dcnode-id="1444"><div class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif" data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Take in a top to bottom look at Paris's Eiffel Tower commissioned for International Exposition of 1889</span></div><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Eiffel Tower, Paris</span></div><cite class="credit d-block mt-5" data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Encyclopædia Britannica, Inc.</span></cite><a class="font-14 mt-10 d-inline-block" data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Eiffel-Tower-Paris-France/images-videos"><span data-dcnode-id="1446" instrument_node="">See all videos for this article</span></a></figcaption></figure></div></div><p class="topic-paragraph" data-dcnode-id="1404"><strong data-dcnode-id="1438"><span data-dcnode-id="1440" id="ref69616"></span><span data-dcnode-id="1439" instrument_node="">Eiffel Tower</span></strong><span data-dcnode-id="1437" instrument_node="">, French </span><strong data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Tour Eiffel</span></strong><span data-dcnode-id="1434" instrument_node="">,  </span><a class="md-crosslink" data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Paris"><span data-dcnode-id="1433" instrument_node="">Parisian</span></a><span data-dcnode-id="1431" instrument_node=""> landmark that is also a technological masterpiece in building-construction history. When the French government was organizing the </span><span data-dcnode-id="1430" id="ref1270393"></span><a class="md-crosslink" data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/International-Exposition-of-1889"><span data-dcnode-id="1429" instrument_node="">International Exposition of 1889</span></a><span data-dcnode-id="1427" instrument_node=""> to celebrate the centenary of the </span><a class="md-crosslink" data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/French-Revolution"><span data-dcnode-id="1426" instrument_node="">French Revolution</span></a><span data-dcnode-id="1424" instrument_node="">, a competition was held for designs for a suitable monument. More than 100 plans were submitted, and the Centennial Committee accepted that of the noted </span><a class="md-crosslink" data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/bridge-engineering"><span data-dcnode-id="1423" instrument_node="">bridge</span></a><span data-dcnode-id="1421" instrument_node=""> engineer </span><span data-dcnode-id="1420" id="ref69617"></span><a class="md-crosslink" data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Gustave-Eiffel"><span data-dcnode-id="1419" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="1417" instrument_node="">. Eiffel’s concept of a 300-metre (984-foot) </span><a class="md-crosslink autoxref" data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/tower"><span data-dcnode-id="1416" instrument_node="">tower</span></a><span data-dcnode-id="1414" instrument_node=""> built almost entirely of open-lattice </span><a class="md-crosslink autoxref" data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/wrought-iron"><span data-dcnode-id="1413" instrument_node="">wrought iron</span></a><span data-dcnode-id="1411" instrument_node=""> aroused amazement, </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1409" data-term="skepticism" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/skepticism"><span data-dcnode-id="1410" instrument_node="">skepticism</span></a><span data-dcnode-id="1408" instrument_node="">, and no little opposition on </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1406" data-term="aesthetic" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/aesthetic"><span data-dcnode-id="1407" instrument_node="">aesthetic</span></a><span data-dcnode-id="1405" instrument_node=""> grounds. When completed, the tower served as the entrance gateway to the exposition.</span></p><span class="marker p1" data-dcnode-id="1402"></span><div class="assemblies" data-dcnode-id="1386"><div class="w-100" data-dcnode-id="1387"><figure class="md-assembly card print-false" data-assembly-id="76323" data-dcnode-id="1388"><div class="md-assembly-wrapper card-media" data-dcnode-id="1396" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1397" data-href="/media/1/180999/76323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/54/75854-050-E27E66C0/Eiffel-Tower-Paris.jpg" style="--aspect-ratio: 16/9"><img alt="Eiffel Tower" data-dcnode-id="1400" data-height="1600" data-width="1056" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/54/75854-050-E27E66C0/Eiffel-Tower-Paris.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1398"><em class="material-icons link-blue" data-dcnode-id="1399" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1389"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1394" data-href="/media/1/180999/76323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/54/75854-050-E27E66C0/Eiffel-Tower-Paris.jpg"><span data-dcnode-id="1395" instrument_node="">Eiffel Tower</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Eiffel Tower, Paris.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">© Corbis</span></cite></figcaption></figure></div></div><span class="marker AM1 am-inline" data-dcnode-id="1383"></span><span class="marker MOD1 mod-inline" data-dcnode-id="1381"></span><p class="topic-paragraph" data-dcnode-id="1361"><span data-dcnode-id="1380" instrument_node="">Nothing remotely like the Eiffel Tower had ever been built; it was twice as high as the dome of </span><a class="md-crosslink" data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Saint-Peters-Basilica"><span data-dcnode-id="1379" instrument_node="">St. Peter’s</span></a><span data-dcnode-id="1377" instrument_node=""> in </span><a class="md-crosslink" data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Rome"><span data-dcnode-id="1376" instrument_node="">Rome</span></a><span data-dcnode-id="1374" instrument_node=""> or the </span><a class="md-crosslink" data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Pyramids-of-Giza"><span data-dcnode-id="1373" instrument_node="">Great Pyramid of Giza</span></a><span data-dcnode-id="1371" instrument_node="">. In contrast to such older monuments, the tower was erected in only about two years (1887–89), with a small </span><a class="md-crosslink autoxref" data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/labor-in-economics"><span data-dcnode-id="1370" instrument_node="">labour force</span></a><span data-dcnode-id="1368" instrument_node="">, at slight cost. Making use of his advanced knowledge of the behaviour of metal arch and metal truss forms under loading, Eiffel designed a light, airy, but strong structure that presaged a revolution in </span><a class="md-crosslink" data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/civil-engineering"><span data-dcnode-id="1367" instrument_node="">civil engineering</span></a><span data-dcnode-id="1365" instrument_node=""> and architectural design. And, after it opened to the public on May 15, 1889, it ultimately </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1363" data-term="vindicated" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/vindicated"><span data-dcnode-id="1364" instrument_node="">vindicated</span></a><span data-dcnode-id="1362" instrument_node=""> itself aesthetically.</span></p><span class="marker p2" data-dcnode-id="1359"></span><span class="marker AM2 am-inline" data-dcnode-id="1357"></span><span class="marker MOD2 mod-inline" data-dcnode-id="1355"></span><p class="topic-paragraph" data-dcnode-id="1340"><span data-dcnode-id="1354" instrument_node="">The Eiffel Tower stands on four lattice-girder </span><a class="md-crosslink" data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/pier-architecture"><span data-dcnode-id="1353" instrument_node="">piers</span></a><span data-dcnode-id="1351" instrument_node=""> that taper inward and join to form a single large vertical tower. As they curve inward, the piers are connected to each other by networks of </span><a class="md-crosslink" data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/girder"><span data-dcnode-id="1350" instrument_node="">girders</span></a><span data-dcnode-id="1348" instrument_node=""> at two levels that afford viewing platforms for tourists. By contrast, the four semicircular arches at the tower’s base are purely aesthetic elements that serve no structural function. Because of their unique shape, which was dictated partly by engineering considerations but also partly by Eiffel’s artistic sense, the piers required elevators to </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1346" data-term="ascend" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/ascend"><span data-dcnode-id="1347" instrument_node="">ascend</span></a><span data-dcnode-id="1345" instrument_node=""> on a curve; the glass-cage machines designed by the </span><span data-dcnode-id="1344" id="ref69618"></span><a class="md-crosslink" data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Otis-Elevator-Company"><span data-dcnode-id="1343" instrument_node="">Otis Elevator Company</span></a><span data-dcnode-id="1341" instrument_node=""> of the United States became one of the principal features of the building, helping establish it as one of the world’s premier tourist attractions.</span></p><span class="marker p3" data-dcnode-id="1338"></span><div class="assemblies" data-dcnode-id="1325"><div class="w-100" data-dcnode-id="1326"><figure class="md-assembly card print-false" data-assembly-id="96054" data-dcnode-id="1327"><div class="md-assembly-wrapper card-media" data-dcnode-id="1333" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1334" data-href="/media/1/180999/96054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/83/99583-050-792F1327/Eiffel-Tower-Paris.jpg" style="--aspect-ratio: 16/9"><img alt="Eiffel Tower, Paris." data-dcnode-id="1337" data-height="1310" data-width="974" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/83/99583-050-792F1327/Eiffel-Tower-Paris.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1335"><em class="material-icons link-blue" data-dcnode-id="1336" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1328"><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Eiffel Tower, Paris.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">© Goodshoot/Jupiterimages</span></cite></figcaption></figure></div></div><span class="marker AM3 am-inline" data-dcnode-id="1323"></span><span class="marker MOD3 mod-inline" data-dcnode-id="1321"></span><p class="topic-paragraph" data-dcnode-id="1312"><span data-dcnode-id="1320" instrument_node="">The tower itself is 300 metres (984 feet) high. It rests on a base that is 5 metres (17 feet) high, and a television antenna atop the tower gives it a total elevation of 324 metres (1,063 feet). The Eiffel Tower was the tallest structure in the world until the topping off of the </span><span data-dcnode-id="1319" id="ref1270392"></span><a class="md-crosslink" data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Chrysler-Building"><span data-dcnode-id="1318" instrument_node="">Chrysler Building</span></a><span data-dcnode-id="1316" instrument_node=""> in </span><a class="md-crosslink" data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/New-York-City"><span data-dcnode-id="1315" instrument_node="">New York City</span></a><span data-dcnode-id="1313" instrument_node=""> in 1929.</span></p><span class="marker p4" data-dcnode-id="1310"></span><span class="marker AM4 am-inline" data-dcnode-id="1308"></span><span class="marker MOD4 mod-inline" data-dcnode-id="1306"></span></section><span data-dcnode-id="1304" instrument_node="">

</span></div><span class="marker before-article" data-dcnode-id="887"></span><div class="md-sentinel--spy-target" data-dcnode-id="886"></div><section data-dcnode-id="762" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="869"><strong data-dcnode-id="883"><span data-dcnode-id="885" id="ref1238297"></span><span data-dcnode-id="884" instrument_node="">Philippe Petit</span></strong><span data-dcnode-id="882" instrument_node="">,  (born August 13, 1949, </span><a class="md-crosslink autoxref" data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Nemours"><span data-dcnode-id="881" instrument_node="">Nemours</span></a><span data-dcnode-id="879" instrument_node="">, France), French-born high-wire walker who </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="877" data-term="attained" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/attained"><span data-dcnode-id="878" instrument_node="">attained</span></a><span data-dcnode-id="876" instrument_node=""> worldwide celebrity on August 7, 1974, with his unauthorized crossing between the newly built twin towers of the </span><a class="md-crosslink" data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/World-Trade-Center"><span data-dcnode-id="875" instrument_node="">World Trade Center</span></a><span data-dcnode-id="873" instrument_node=""> in </span><a class="md-crosslink autoxref" data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/New-York-City"><span data-dcnode-id="872" instrument_node="">New York City</span></a><span data-dcnode-id="870" instrument_node="">, about 1,350 feet (411 metres) above the ground. Petit was arrested for this exploit and for others, but he always presented himself as a performing artist rather than a daredevil or stunt man.</span></p><span class="marker p1" data-dcnode-id="867"></span><span class="marker AM1 am-inline" data-dcnode-id="865"></span><span class="marker MOD1 mod-inline" data-dcnode-id="863"></span><p class="topic-paragraph" data-dcnode-id="849"><span data-dcnode-id="862" instrument_node="">Petit, whose father was a military pilot, took little interest in school studies but diligently practiced such performance skills as juggling and </span><a class="md-crosslink autoxref" data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/art/conjuring"><span data-dcnode-id="861" instrument_node="">sleight of hand</span></a><span data-dcnode-id="859" instrument_node="">. After seeing </span><a class="md-crosslink" data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/art/circus-theatrical-entertainment"><span data-dcnode-id="858" instrument_node="">circus</span></a><span data-dcnode-id="856" instrument_node=""> high-wire acts, he strung a rope between two trees on his parents’ property and taught himself tightrope walking. As a young adult he supported himself as a </span><a class="md-crosslink" data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/art/juggler"><span data-dcnode-id="855" instrument_node="">juggler</span></a><span data-dcnode-id="853" instrument_node=""> on the streets of Paris. There he met the Czech aerialist Rudy Omankowsky, from whom he learned how to </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="851" data-term="rig" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/rig"><span data-dcnode-id="852" instrument_node="">rig</span></a><span data-dcnode-id="850" instrument_node=""> a wire for long walks at great heights.</span></p><span class="marker p2" data-dcnode-id="847"></span><span class="marker AM2 am-inline" data-dcnode-id="845"></span><span class="marker MOD2 mod-inline" data-dcnode-id="843"></span><p class="topic-paragraph" data-dcnode-id="835"><span data-dcnode-id="842" instrument_node="">On June 26, 1971, Petit executed his first big performance when he walked, without permission, between the tops of the two towers of the cathedral of </span><a class="md-crosslink" data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Notre-Dame-de-Paris"><span data-dcnode-id="841" instrument_node="">Notre-Dame de Paris</span></a><span data-dcnode-id="839" instrument_node="">, 223 feet (68 metres) above the ground. He moved his stage to Australia on June 3, 1973, when he walked, also without authorization, between the pylons (supporting towers) on the north end of the </span><a class="md-crosslink" data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Sydney-Harbour-Bridge"><span data-dcnode-id="838" instrument_node="">Sydney Harbour Bridge</span></a><span data-dcnode-id="836" instrument_node="">.</span></p><span class="marker p3" data-dcnode-id="833"></span><span class="marker AM3 am-inline" data-dcnode-id="831"></span><span class="marker MOD3 mod-inline" data-dcnode-id="829"></span><p class="topic-paragraph" data-dcnode-id="815"><span data-dcnode-id="828" instrument_node="">But Petit’s long-term ambition, conceived even before the towers were built, was to conquer the World Trade Center. He planned the event in secrecy over a period of months, pulling together a small group of helpers (including an “inside man” with an office in one of the towers), sneaking up to the top floors (then still uncompleted) to </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="826" data-term="reconnoiter" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/reconnoiter"><span data-dcnode-id="827" instrument_node="">reconnoiter</span></a><span data-dcnode-id="825" instrument_node="">, hiring a helicopter in order to get a good look at the roofs, and smuggling in bulky equipment. On the night before the performance, a confederate shot an arrow from one roof to the other. Fishing line, fastened to the arrow, was then used to pull a rope across, and eventually the heavy wire was put into place. Rigging took up most of the night, but Petit was ready to set out at about 7:00 </span><span class="text-smallcaps" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">am</span></span><span data-dcnode-id="822" instrument_node="">. He claimed to have made eight crossings between the towers in a period of about 45 minutes, embellishing the performance by sitting and lying down upon the wire as a crowd gathered below. Once he alighted, police sent him to a mental hospital to </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="820" data-term="ascertain" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/ascertain"><span data-dcnode-id="821" instrument_node="">ascertain</span></a><span data-dcnode-id="819" instrument_node=""> his sanity and then charged him with criminal trespassing and </span><a class="md-crosslink autoxref" data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/disorderly-conduct"><span data-dcnode-id="818" instrument_node="">disorderly conduct</span></a><span data-dcnode-id="816" instrument_node="">. The charges were later dismissed.</span></p><span class="marker p4" data-dcnode-id="813"></span><span class="marker AM4 am-inline" data-dcnode-id="811"></span><span class="marker MOD4 mod-inline" data-dcnode-id="809"></span><p class="topic-paragraph" data-dcnode-id="783"><span data-dcnode-id="808" instrument_node="">Petit came down from the World Trade Center tower a famous man, but he rejected many opportunities to capitalize on his celebrity. Settling in the United States, he did accept employment with the </span><a class="md-crosslink" data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Ringling-Brothers"><span data-dcnode-id="807" instrument_node="">Ringling Brothers</span></a><span data-dcnode-id="805" instrument_node=""> and Barnum &amp; Bailey circus in 1975. However, on January 7 of that year he fell in a practice session, breaking several bones and suffering internal injuries. He recovered but left the circus and went on to perform a variety of high-wire walks, indoors and outdoors, authorized and unauthorized. He made several walks inside the Cathedral of </span><a class="md-crosslink autoxref" data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/St-Johns-Newfoundland-and-Labrador"><span data-dcnode-id="804" instrument_node="">St. John</span></a><span data-dcnode-id="802" instrument_node=""> the Divine in New York City, where he became an artist-in-residence. In 1986 he reenacted, for an IMAX film, the French acrobat </span><a class="md-crosslink" data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Blondin"><span data-dcnode-id="801" instrument_node="">Blondin</span></a><span data-dcnode-id="799" instrument_node="">’s celebrated 1859 walk over a </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="797" data-term="gorge" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/gorge"><span data-dcnode-id="798" instrument_node="">gorge</span></a><span data-dcnode-id="796" instrument_node=""> below </span><a class="md-crosslink" data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Niagara-Falls-waterfall-North-America"><span data-dcnode-id="795" instrument_node="">Niagara Falls</span></a><span data-dcnode-id="793" instrument_node="">. In 1989, in celebration of the 200th anniversary of the </span><a class="md-crosslink" data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/French-Revolution"><span data-dcnode-id="792" instrument_node="">French Revolution</span></a><span data-dcnode-id="790" instrument_node="">, Petit walked 2,300 feet (700 metres) up an inclined wire, across the </span><a class="md-crosslink autoxref" data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Seine-River"><span data-dcnode-id="789" instrument_node="">Seine River</span></a><span data-dcnode-id="787" instrument_node="">, to the second level of the </span><a class="md-crosslink" data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Eiffel-Tower-Paris-France"><span data-dcnode-id="786" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="784" instrument_node="">.</span></p><span class="marker p5" data-dcnode-id="781"></span><span class="marker AM5 am-inline" data-dcnode-id="779"></span><span class="marker MOD5 mod-inline" data-dcnode-id="777"></span><p class="topic-paragraph" data-dcnode-id="769"><span data-dcnode-id="776" instrument_node="">Petit’s World Trade Center walk was the subject of several films, most notably the documentary </span><em data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Man on Wire</span></em><span data-dcnode-id="773" instrument_node=""> (2008) and the Hollywood dramatization </span><em data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">The Walk</span></em><span data-dcnode-id="770" instrument_node=""> (2015).</span></p><span class="marker p6" data-dcnode-id="767"></span><span class="marker AM6 am-inline" data-dcnode-id="765"></span><span class="marker MOD6 mod-inline" data-dcnode-id="763"></span></section><span data-dcnode-id="761" instrument_node="">
