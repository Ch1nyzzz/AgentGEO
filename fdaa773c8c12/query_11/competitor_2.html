</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="504" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="513"><p data-dcnode-id="12172"><span data-dcnode-id="12188" instrument_node="">
</span><b data-dcnode-id="12186"><span data-dcnode-id="12187" instrument_node="">Aviation pioneers</span></b><span data-dcnode-id="12185" instrument_node=""> are people directly and indirectly responsible for the advancement of flight, including people who worked to achieve </span><a class="mw-redirect" data-dcnode-id="12183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manned_flight" title="Manned flight"><span data-dcnode-id="12184" instrument_node="">manned flight</span></a><span data-dcnode-id="12182" instrument_node=""> before the invention of aircraft, as well as others who achieved significant "firsts" in </span><a data-dcnode-id="12180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aviation" title="Aviation"><span data-dcnode-id="12181" instrument_node="">aviation</span></a><span data-dcnode-id="12179" instrument_node=""> after </span><a class="mw-redirect" data-dcnode-id="12177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heavier-than-air" title="Heavier-than-air"><span data-dcnode-id="12178" instrument_node="">heavier-than-air</span></a><span data-dcnode-id="12176" instrument_node=""> flight became routine. Pioneers of aviation have contributed to the development of </span><a data-dcnode-id="12174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aeronautics" title="Aeronautics"><span data-dcnode-id="12175" instrument_node="">aeronautics</span></a><span data-dcnode-id="12173" instrument_node=""> in one or more ways: through science and theory, theoretical or applied design, by constructing models or experimental prototypes, the mass production of aircraft for commercial and government request, achievements in flight, and providing financial resources and publicity to expand the field of aviation.
</span></p><span data-dcnode-id="12171" instrument_node="">

</span><p data-dcnode-id="11994"><span data-dcnode-id="11995" instrument_node="">The table is organized by pioneer name in alphabetical order. Columns for Name, Date of birth/Date of death, Country and Achievement can be sorted in either ascending or descending order. If two pioneers are paired together, sorting by DOB or Country uses the information for the first of the pair. The Achievement column will sort according to the date of the pioneer's earliest significant contribution to aviation.
</span></p><span data-dcnode-id="11993" instrument_node="">
</span><h2 data-dcnode-id="11983"><span class="mw-headline" data-dcnode-id="11991" id="Inclusion_criteria"><span data-dcnode-id="11992" instrument_node="">Inclusion criteria</span></span><span class="mw-editsection" data-dcnode-id="11984"><span class="mw-editsection-bracket" data-dcnode-id="11989"><span data-dcnode-id="11990" instrument_node="">[</span></span><a data-dcnode-id="11987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DList_of_aviation_pioneers%26action%3Dedit%26section%3D4" title="Edit section: Inclusion criteria"><span data-dcnode-id="11988" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="11985"><span data-dcnode-id="11986" instrument_node="">]</span></span></span></h2><span data-dcnode-id="11982" instrument_node="">
</span><p data-dcnode-id="11980"><span data-dcnode-id="11981" instrument_node="">The list is of outright records, irrespective of race, nationality or gender, and in which at least one of the following criteria is met:
</span></p><span data-dcnode-id="11979" instrument_node="">
</span><ul data-dcnode-id="11949"><li data-dcnode-id="11975"><i data-dcnode-id="11977"><span data-dcnode-id="11978" instrument_node="">Scientific</span></i><span data-dcnode-id="11976" instrument_node=""> contribution to theory and principles (whether correct or not) that were used as contemporary resources, building blocks, or influenced period thought, significant scientific or theoretical achievements with model aircraft;</span></li><span data-dcnode-id="11974" instrument_node="">
</span><li data-dcnode-id="11970"><i data-dcnode-id="11972"><span data-dcnode-id="11973" instrument_node="">Designing</span></i><span data-dcnode-id="11971" instrument_node=""> any aircraft (pre-1910), or a distinct/innovative new design;</span></li><span data-dcnode-id="11969" instrument_node="">
</span><li data-dcnode-id="11965"><i data-dcnode-id="11967"><span data-dcnode-id="11968" instrument_node="">Constructing</span></i><span data-dcnode-id="11966" instrument_node=""> a prototype aircraft (pre-1910);</span></li><span data-dcnode-id="11964" instrument_node="">
</span><li data-dcnode-id="11960"><i data-dcnode-id="11962"><span data-dcnode-id="11963" instrument_node="">Manufacturing</span></i><span data-dcnode-id="11961" instrument_node=""> aircraft (including some direct or supervisory control over design) for commercial and/or military contracts (intended to represent founders of the aviation industry);</span></li><span data-dcnode-id="11959" instrument_node="">
</span><li data-dcnode-id="11955"><i data-dcnode-id="11957"><span data-dcnode-id="11958" instrument_node="">Flying</span></i><span data-dcnode-id="11956" instrument_node=""> (Aviator) solo in an aircraft and receiving a relevant flying certificate (pre-1910); or any significant national (e.g., a flight representing a country's first) or international achievement, or flight award (initial record holders or demolishing existing records, but not simply breaking established records);</span></li><span data-dcnode-id="11954" instrument_node="">
</span><li data-dcnode-id="11950"><i data-dcnode-id="11952"><span data-dcnode-id="11953" instrument_node="">Supporting</span></i><span data-dcnode-id="11951" instrument_node=""> aviation (e.g., positive publicity; personal, corporate and/or philanthropic sponsorship, education).</span></li></ul><span data-dcnode-id="11948" instrument_node="">
