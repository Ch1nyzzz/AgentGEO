DECEMBER 28 – BIRTHS – Scientists&nbsp;born&nbsp;on&nbsp;December&nbsp;28th</span></div><div class="daynameheading" data-dcnode-id="2527"><a data-dcnode-id="2529" name="TorvaldsLinus"></a><span data-dcnode-id="2528" instrument_node="">
&nbsp; Linus Torvalds</span></div><div data-dcnode-id="2506"><div class="dayleftcell100" data-dcnode-id="2520"><img alt="Thumbnail - Linus Torvalds" class="daythm" data-dcnode-id="2526" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/T/Torvalds_Linus/TorvaldsLinusThm.jpg&amp;raw" title="Linus Torvalds " width="100"><br data-dcnode-id="2525"><span class="noprint" data-dcnode-id="2521"><span class="imagesource" data-dcnode-id="2522"><a data-dcnode-id="2523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.google.com/103792075759735704833/posts" target="_blank"><span data-dcnode-id="2524" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="2507" style="margin-left:100px;padding:3px;"><span class="sprite icon-baby" data-dcnode-id="2519"></span><span data-dcnode-id="2518" instrument_node=""> &nbsp;Born 28 Dec 1969. &nbsp;</span><span class="footnote" data-dcnode-id="2514"><a class="locallink" data-dcnode-id="2515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/T/Torvalds_Linus/TorvaldsLinus-Quotations.htm"><span class="sprite icon-quotes" data-dcnode-id="2517"></span><span data-dcnode-id="2516" instrument_node=""> quotes</span></a></span><br data-dcnode-id="2513"><span data-dcnode-id="2512" instrument_node="">Finnish computer scientist who initiated and </span><a data-dcnode-id="2510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DWVTWCPoUt8w"><span data-dcnode-id="2511" instrument_node="">promoted</span></a><span data-dcnode-id="2509" instrument_node=""> the growth of the Linux computer operating system. While a computer science student, he created his own UNIX-like operating system on his own desktop personal computer (PC) because he was dissatisfied with the way Microsoft MS-DOS performed. By 1991, he had it sufficiently developed to share with the source code with other software developers, to use for free, and they could contribute their own improvements. This is the open-source model of sofware development. Linux, being free to use, is now the operating system of choice for many servers and web sites on the Internet, as well as other devices.«</span><div class="bookline" data-dcnode-id="2508"></div></div></div><div class="daynameheading" data-dcnode-id="2503"><a data-dcnode-id="2505" name="MullisKary"></a><span data-dcnode-id="2504" instrument_node="">
&nbsp; Kary B. Mullis</span></div><div data-dcnode-id="2461"><div class="dayleftcell100" data-dcnode-id="2496"><img alt="Thumbnail - Kary B. Mullis" class="daythm" data-dcnode-id="2502" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/M/Mullis_Kary/MullisKaryThm.jpg&amp;raw" title="Kary B. Mullis " width="100"><br data-dcnode-id="2501"><span class="noprint" data-dcnode-id="2497"><span class="imagesource" data-dcnode-id="2498"><a data-dcnode-id="2499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alumni.gatech.edu/news/alummag/sum94/mullis.html" target="_blank"><span data-dcnode-id="2500" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="2462" style="margin-left:100px;padding:3px;"><span class="sprite icon-baby" data-dcnode-id="2495"></span><span data-dcnode-id="2494" instrument_node=""> &nbsp;Born 28 Dec 1944. &nbsp;</span><span class="footnote" data-dcnode-id="2490"><a class="locallink" data-dcnode-id="2491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/M/Mullis_Kary/MullisKary-Quotations.htm"><span class="sprite icon-quotes" data-dcnode-id="2493"></span><span data-dcnode-id="2492" instrument_node=""> quotes</span></a></span><br data-dcnode-id="2489"><span data-dcnode-id="2488" instrument_node="">Kary Banks Mullis is an American biochemist who </span><a data-dcnode-id="2486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alumni.gatech.edu/news/alummag/sum94/mullis.html"><span data-dcnode-id="2487" instrument_node="">invented</span></a><span data-dcnode-id="2485" instrument_node=""> the polymerase chain reaction (</span><a data-dcnode-id="2483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.karymullis.com/"><span data-dcnode-id="2484" instrument_node="">PCR</span></a><span data-dcnode-id="2482" instrument_node="">) in 1983, for </span><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nobelprize.org/chemistry/laureates/1993/mullis-autobio.html"><span data-dcnode-id="2481" instrument_node="">which</span></a><span data-dcnode-id="2479" instrument_node=""> he </span><a data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nobelprize.org/chemistry/laureates/1993/press.html"><span data-dcnode-id="2478" instrument_node="">shared</span></a><span data-dcnode-id="2476" instrument_node="">&nbsp;(with </span><a class="locallink" data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/4/4_26.htm%23SmithMichael" title="local link"><span data-dcnode-id="2475" instrument_node=""> Michael Smith</span></a><span data-dcnode-id="2473" instrument_node="">) the 1993 Nobel Prize for Chemistry. The PCR </span><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.invent.org/hall_of_fame/109.html"><span data-dcnode-id="2472" instrument_node="">technique</span></a><span data-dcnode-id="2470" instrument_node=""> is simple, and within a few hours can make billions of copies of a specific stretch of DNA. It is a powerful aid in medical diagnosis of a bacterial or viral infection, able to use a very small sample of genetic material to identify the causative agent. PCR is valuable in genetics, and forensic science. With its use, genetic disorders can be identified from DNA samples. Using minute traces of tissue, PCR can yield sufficient DNA to identify parents and family kin, crime suspects, corpses, anthropological or ancient fossil remains. PCR is also a basic tool in gene sequencing.«</span><div class="bookline" data-dcnode-id="2463"><a class="amazonlink" data-dcnode-id="2467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/0817637508%3Fie%3DUTF%26tag%3Dtodayinsci-20%26link_code%3Das3" title="Amazon link"><span class="sprite icon-book" data-dcnode-id="2469"></span><span data-dcnode-id="2468" instrument_node=""> The Polymerase Chain Reaction</span></a><span data-dcnode-id="2466" instrument_node="">, </span><small data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">by Kary B. Mullis, et al. - book suggestion.</span></small></div></div></div><div class="daynameheading" data-dcnode-id="2458"><a data-dcnode-id="2460" name="SchmidtMaarten"></a><span data-dcnode-id="2459" instrument_node="">
&nbsp; Maarten Schmidt</span></div><div data-dcnode-id="2434"><div class="dayleftcell100" data-dcnode-id="2451"><img alt="Thumbnail - Maarten Schmidt" class="daythm" data-dcnode-id="2457" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/S/Schmidt_Maarten/SchmidtMaartenThm.jpg&amp;raw" title="Maarten Schmidt " width="100"><br data-dcnode-id="2456"><span class="noprint" data-dcnode-id="2452"><span class="imagesource" data-dcnode-id="2453"><a data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.phys-astro.sonoma.edu/BruceMedalists/BM2S.html%2385" target="_blank"><span data-dcnode-id="2455" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="2435" style="margin-left:100px;padding:3px;"><span class="sprite icon-baby" data-dcnode-id="2450"></span><span data-dcnode-id="2449" instrument_node=""> &nbsp;Born 28 Dec 1929. &nbsp;</span><span class="footnote" data-dcnode-id="2445"><a class="locallink" data-dcnode-id="2446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/S/Schmidt_Maarten/SchmidtMaarten-Quotations.htm"><span class="sprite icon-quotes" data-dcnode-id="2448"></span><span data-dcnode-id="2447" instrument_node=""> quotes</span></a></span><br data-dcnode-id="2444"><span data-dcnode-id="2443" instrument_node="">Dutch-born American </span><a data-dcnode-id="2441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maarten_Schmidt"><span data-dcnode-id="2442" instrument_node="">astronomer</span></a><span data-dcnode-id="2440" instrument_node=""> who in 1963 discovered </span><a data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quasar"><span data-dcnode-id="2439" instrument_node="">quasars</span></a><span data-dcnode-id="2437" instrument_node=""> (quasi-stellar objects). The hydrogen spectrum of these starlike objects shows a huge redshift, which indicates they are more distant than normal stars, travelling away at greater speed, and are among the oldest objects observed. In turn, this indicates they existed only when the universe was very young, and provides evidence against the steady state theory of Fred Hoyle. Schmidt is currently seeking to find the redshift above which there are no quasars, and he also studies x-ray and gamma ray sources.«</span><div class="bookline" data-dcnode-id="2436"></div></div></div><div class="daynameheading" data-dcnode-id="2431"><a data-dcnode-id="2433" name="VonNeumannJohn"></a><span data-dcnode-id="2432" instrument_node="">
&nbsp; John von Neumann</span></div><div data-dcnode-id="2394"><div class="dayleftcell100" data-dcnode-id="2424"><img alt="Thumbnail - John von Neumann" class="daythm" data-dcnode-id="2430" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/V/VonNeumann_John/VonNeumannJohnThm.jpg&amp;raw" title="John von Neumann " width="100"><br data-dcnode-id="2429"><span class="noprint" data-dcnode-id="2425"><span class="imagesource" data-dcnode-id="2426"><a data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ei.cs.vt.edu/~history/vN.GIF" target="_blank"><span data-dcnode-id="2428" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="2395" style="margin-left:100px;padding:3px;"><span class="sprite icon-baby" data-dcnode-id="2423"></span><span data-dcnode-id="2422" instrument_node=""> &nbsp;Born 28 Dec 1903; died </span><span class="quietlink" data-dcnode-id="2418"><a data-dcnode-id="2420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/2/2_08.htm%23VonNeumannJohn"><span data-dcnode-id="2421" instrument_node="">8 Feb</span></a><span data-dcnode-id="2419" instrument_node=""> 1957</span></span><span data-dcnode-id="2417" instrument_node=""> </span><small data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">at age 53</span></small><span data-dcnode-id="2414" instrument_node="">. &nbsp;</span><span class="footnote" data-dcnode-id="2410"><a class="locallink" data-dcnode-id="2411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/V/VonNeumann_John/VonNeumannJohn-Quotations.htm"><span class="sprite icon-quotes" data-dcnode-id="2413"></span><span data-dcnode-id="2412" instrument_node=""> quotes</span></a></span><br data-dcnode-id="2409"><span data-dcnode-id="2408" instrument_node="">Hungarian-American mathematician who made important </span><a data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ei.cs.vt.edu/~history/VonNeumann.html"><span data-dcnode-id="2407" instrument_node="">contributions</span></a><span data-dcnode-id="2405" instrument_node=""> in quantum physics, logic, meteorology, and computer science. He invented game theory, the branch of mathematics that analyses strategy and is now widely employed for military and economic purposes. During WW II, he studied the implosion method for bringing nuclear fuel to explosion and he participated in the development of the hydrogen bomb. He also set quantum theory upon a rigorous mathematical basis. In computer theory, von Neumann did much of the pioneering work in logical design, in the problem of obtaining reliable answers from a machine with unreliable components, the function of “memory,” and machine imitation of “randomness.”</span><span class="footnote" data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">[Image left: Von Neumann with ENIAC computer.]</span></span><div class="bookline" data-dcnode-id="2396"><a class="amazonlink" data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/082182676X%3Fie%3DUTF%26tag%3Dtodayinsci-20%26link_code%3Das3" title="Amazon link"><span class="sprite icon-book" data-dcnode-id="2402"></span><span data-dcnode-id="2401" instrument_node=""> John von Neumann</span></a><span data-dcnode-id="2399" instrument_node="">: The Scientific Genius Who Pioneered..., </span><small data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">by Norman MacRae. - book suggestion.</span></small></div></div></div><div class="daynameheading" data-dcnode-id="2391"><a data-dcnode-id="2393" name="RossbyCarl"></a><span data-dcnode-id="2392" instrument_node="">
&nbsp; Carl-Gustaf Rossby</span></div><div data-dcnode-id="2359"><div class="dayleftcell100" data-dcnode-id="2384"><img alt="Thumbnail - Carl-Gustaf Rossby" class="daythm" data-dcnode-id="2390" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/R/Rossby_CarlGustaf/RossbyCarlGustafThm.jpg&amp;raw" title="Carl-Gustaf Rossby " width="100"><br data-dcnode-id="2389"><span class="noprint" data-dcnode-id="2385"><span class="imagesource" data-dcnode-id="2386"><a data-dcnode-id="2387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aos.wisc.edu/~amanda/cgr_time.jpg" target="_blank"><span data-dcnode-id="2388" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="2360" style="margin-left:100px;padding:3px;"><span class="sprite icon-baby" data-dcnode-id="2383"></span><span data-dcnode-id="2382" instrument_node=""> &nbsp;Born 28 Dec 1898; died </span><span class="quietlink" data-dcnode-id="2378"><a data-dcnode-id="2380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/8/8_19.htm%23RossbyCarl"><span data-dcnode-id="2381" instrument_node="">19 Aug</span></a><span data-dcnode-id="2379" instrument_node=""> 1957</span></span><span data-dcnode-id="2377" instrument_node=""> </span><small data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">at age 58</span></small><span data-dcnode-id="2374" instrument_node="">. &nbsp;</span><span class="footnote" data-dcnode-id="2370"><a class="locallink" data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/R/Rossby_Carl/RossbyCarl-Quotations.htm"><span class="sprite icon-quotes" data-dcnode-id="2373"></span><span data-dcnode-id="2372" instrument_node=""> quotes</span></a></span><br data-dcnode-id="2369"><span data-dcnode-id="2368" instrument_node="">Swedish-American </span><a data-dcnode-id="2366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carl-Gustaf_Arvid_Rossby"><span data-dcnode-id="2367" instrument_node="">meteorologist</span></a><span data-dcnode-id="2365" instrument_node=""> who first explained the large-scale motions of the atmosphere in terms of fluid mechanics. His work contributed to developing meteorology as a science. Rossby first theorized about the existence of the </span><a data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jet_stream"><span data-dcnode-id="2364" instrument_node="">jet stream</span></a><span data-dcnode-id="2362" instrument_node=""> in 1939, and that it governs the easterly movement of most weather. U.S. Army Air Corps pilots flying B-29 bombing missions across the Pacific Ocean during World War II proved the jet stream's existence. The pilots found that when they flew from east to west, they experienced slower arrival times and fuel shortage problems. When flying from west to east, however, they found the opposite to be true. Rossby created mathematical models (Rossby equations) for computerized weather prediction (1950).«</span><div class="bookline" data-dcnode-id="2361"></div></div></div><div class="daynameheading" data-dcnode-id="2356"><a data-dcnode-id="2358" name="RomerAlfred"></a><span data-dcnode-id="2357" instrument_node="">
&nbsp; Alfred Sherwood Romer</span></div><div data-dcnode-id="2318"><div class="dayleftcell100" data-dcnode-id="2349"><img alt="Thumbnail - Alfred Sherwood Romer" class="daythm" data-dcnode-id="2355" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/R/Romer_Alfred/RomerAlfredThm.jpg&amp;raw" title="Alfred Sherwood Romer " width="100"><br data-dcnode-id="2354"><span class="noprint" data-dcnode-id="2350"><span class="imagesource" data-dcnode-id="2351"><a data-dcnode-id="2352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vertpaleo.org/awards/romer.html" target="_blank"><span data-dcnode-id="2353" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="2319" style="margin-left:100px;padding:3px;"><span class="sprite icon-baby" data-dcnode-id="2348"></span><span data-dcnode-id="2347" instrument_node=""> &nbsp;Born 28 Dec 1894; died </span><span class="quietlink" data-dcnode-id="2343"><a data-dcnode-id="2345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/11/11_05.htm%23RomerAlfred"><span data-dcnode-id="2346" instrument_node="">5 Nov</span></a><span data-dcnode-id="2344" instrument_node=""> 1973</span></span><span data-dcnode-id="2342" instrument_node=""> </span><small data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">at age 78</span></small><span data-dcnode-id="2339" instrument_node="">. &nbsp;</span><span class="footnote" data-dcnode-id="2335"><a class="locallink" data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/R/Romer_Alfred/RomerAlfred-Quotations.htm"><span class="sprite icon-quotes" data-dcnode-id="2338"></span><span data-dcnode-id="2337" instrument_node=""> quotes</span></a></span><br data-dcnode-id="2334"><span data-dcnode-id="2333" instrument_node="">U.S. </span><a data-dcnode-id="2331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nceas.ucsb.edu/~alroy/lefa/Romer.html"><span data-dcnode-id="2332" instrument_node="">paleontologist</span></a><span data-dcnode-id="2330" instrument_node=""> who studied the evolution of early vertebrates in biological terms of comparative anatomy and embryology. He researched muscle and limb evolution, the development and evolutionary history of cartilage and bone, and the structure and function of the nervous system. Further, he </span><a data-dcnode-id="2328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cartage.org.lb/en/themes/Biographies/MainBiographies/R/Romer/1.html"><span data-dcnode-id="2329" instrument_node="">traced</span></a><span data-dcnode-id="2327" instrument_node=""> the basic structural and functional changes that took place during the evolution of fishes to primitive terrestrial vertebrates and from these to modern vertebrates. He linked the form and function of animals to their environment. Romer was one of the first vertebrate palaeontologists to defend the idea of continental drift, having found striking similarities between Permian reptiles in western Texas and in Czechoslovakia.«</span><div class="bookline" data-dcnode-id="2320"><a class="amazonlink" data-dcnode-id="2324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/0226724883%3Fie%3DUTF%26tag%3Dtodayinsci-20%26link_code%3Das3" title="Amazon link"><span class="sprite icon-book" data-dcnode-id="2326"></span><span data-dcnode-id="2325" instrument_node=""> Vertebrate Paleontology</span></a><span data-dcnode-id="2323" instrument_node="">, </span><small data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">by Alfred Sherwood Romer. - book suggestion.</span></small></div></div></div><div class="daynameheading" data-dcnode-id="2315"><a data-dcnode-id="2317" name="HallowellAlfred"></a><span data-dcnode-id="2316" instrument_node="">
&nbsp; A. Irving Hallowell</span></div><div data-dcnode-id="2275"><div class="dayleftcell100" data-dcnode-id="2308"><img alt="Thumbnail - A. Irving Hallowell" class="daythm" data-dcnode-id="2314" height="115" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/H/Hallowell_Alfred/HallowellAlfredThm.jpg&amp;raw" title="A. Irving Hallowell " width="100"><br data-dcnode-id="2313"><span class="noprint" data-dcnode-id="2309"><span class="imagesource" data-dcnode-id="2310"><a data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//emuseum.mankato.msus.edu/information/biography/fghij/hallowell_alfred.html" target="_blank"><span data-dcnode-id="2312" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="2276" style="margin-left:100px;padding:3px;"><span class="sprite icon-baby" data-dcnode-id="2307"></span><span data-dcnode-id="2306" instrument_node=""> &nbsp;Born 28 Dec 1892; died </span><span class="quietlink" data-dcnode-id="2302"><a data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/10/10_10.htm%23HallowellAlfred"><span data-dcnode-id="2305" instrument_node="">10 Oct</span></a><span data-dcnode-id="2303" instrument_node=""> 1974</span></span><span data-dcnode-id="2301" instrument_node=""> </span><small data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">at age 81</span></small><span data-dcnode-id="2298" instrument_node="">.</span><br data-dcnode-id="2297"><span data-dcnode-id="2296" instrument_node="">Alfred Irving Hallowell was an American anthropologist who was an authority on the Northern Ojibwa Indians. He used tests of perception, and particularly favoured the </span><a class="locallink" data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/11/11_08.htm%23RorschachHermann" title="local link"><span data-dcnode-id="2295" instrument_node=""> Rorschach</span></a><span data-dcnode-id="2293" instrument_node=""> ink blot test to assess individual Ojibwa personalities. </span><a data-dcnode-id="2291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nap.edu/openbook/0309028884/html/194.html"><span data-dcnode-id="2292" instrument_node="">Hallowell</span></a><span data-dcnode-id="2290" instrument_node=""> collected a series of 266 Rorschach records from various Ojibwa communities, and although he never prepared an over-all summary of the results in the form of a sketch of typical Ojibwa personality structures, he used the data in a number of papers. All of Hallowell's field work was undertaken among American Indians. He </span><a data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//emuseum.mankato.msus.edu/information/biography/fghij/hallowell_alfred.html"><span data-dcnode-id="2289" instrument_node="">published</span></a><span data-dcnode-id="2287" instrument_node=""> many studies of the tribes and made important contributions to culture- and- personality theory. His book </span><i data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Culture and Experience</span></i><span data-dcnode-id="2284" instrument_node=""> appeared in 1955.«</span><div class="bookline" data-dcnode-id="2277"><a class="amazonlink" data-dcnode-id="2281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/0030551226%3Fie%3DUTF%26tag%3Dtodayinsci-20%26link_code%3Das3" title="Amazon link"><span class="sprite icon-book" data-dcnode-id="2283"></span><span data-dcnode-id="2282" instrument_node=""> The Ojibwa of Berens River, Manitoba</span></a><span data-dcnode-id="2280" instrument_node="">: Ethnography into History, </span><small data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">by A. Irving Hallowell, et al. - book suggestion.</span></small></div></div></div><div class="daynameheading" data-dcnode-id="2272"><a data-dcnode-id="2274" name="EddingtonArthur"></a><span data-dcnode-id="2273" instrument_node="">
&nbsp; Sir Arthur Stanley Eddington</span></div><div data-dcnode-id="2227"><div class="dayleftcell100" data-dcnode-id="2265"><img alt="Thumbnail - Sir Arthur Stanley Eddington" class="daythm" data-dcnode-id="2271" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/E/Eddington_Arthur/EddingtonArthurThm.jpg&amp;raw" title="Sir Arthur Stanley Eddington " width="100"><br data-dcnode-id="2270"><span class="noprint" data-dcnode-id="2266"><span class="imagesource" data-dcnode-id="2267"><a data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.phys-astro.sonoma.edu/BruceMedalists/BM2C-G.html%2319" target="_blank"><span data-dcnode-id="2269" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="2228" style="margin-left:100px;padding:3px;"><span class="sprite icon-baby" data-dcnode-id="2264"></span><span data-dcnode-id="2263" instrument_node=""> &nbsp;Born 28 Dec 1882; died </span><span class="quietlink" data-dcnode-id="2259"><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/11/11_22.htm%23EddingtonArthur"><span data-dcnode-id="2262" instrument_node="">22 Nov</span></a><span data-dcnode-id="2260" instrument_node=""> 1944</span></span><span data-dcnode-id="2258" instrument_node=""> </span><small data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">at age 61</span></small><span data-dcnode-id="2255" instrument_node="">. &nbsp;</span><span class="footnote" data-dcnode-id="2251"><a class="locallink" data-dcnode-id="2252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/E/Eddington_Arthur/EddingtonArthur-Quotations.htm"><span class="sprite icon-quotes" data-dcnode-id="2254"></span><span data-dcnode-id="2253" instrument_node=""> quotes</span></a></span><br data-dcnode-id="2250"><span data-dcnode-id="2249" instrument_node="">English </span><a data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.phys-astro.sonoma.edu/BruceMedalists/Eddington/index.html"><span data-dcnode-id="2248" instrument_node="">astrophysicist</span></a><span data-dcnode-id="2246" instrument_node="">, and </span><a data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//adsbit.harvard.edu/cgi-bin/nph-iarticle_query%3F1945ApJ...101..133R"><span data-dcnode-id="2245" instrument_node="">mathematician</span></a><span data-dcnode-id="2243" instrument_node=""> known for his work on the motion, distribution, evolution and structure of stars. He also interpreted </span><a class="locallink" data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/3/3_14.htm%23EinsteinAlbert" title="local link"><span data-dcnode-id="2242" instrument_node=""> Einstein's</span></a><span data-dcnode-id="2240" instrument_node=""> general theory of relativity. He was one of the first to suggest (1917) conversion of matter into radiation powered the stars. In 1919, he led a solar eclipse expedition which confirmed the predicted bending of starlight by gravity. He developed an equation for radiation pressure. In 1924, he derived an important mass-luminosity relation. He also studied pulsations in Cepheid variables, and the very high densities of white dwarfs. He sought fundamental relationships between the prinicipal physical constants. Eddington wrote many books for the general reader, including </span><i data-dcnode-id="2237"><a data-dcnode-id="2238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bibliomania.com/2/1/67/114/frameset.html"><span data-dcnode-id="2239" instrument_node="">Stars and Atoms</span></a></i><span data-dcnode-id="2236" instrument_node="">.«</span><div class="bookline" data-dcnode-id="2229"><a class="amazonlink" data-dcnode-id="2233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/0738801313%3Fie%3DUTF%26tag%3Dtodayinsci-20%26link_code%3Das3" title="Amazon link"><span class="sprite icon-book" data-dcnode-id="2235"></span><span data-dcnode-id="2234" instrument_node=""> The Eddington Enigma</span></a><span data-dcnode-id="2232" instrument_node="">, </span><small data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">by David Evans, David S. Evans. - book suggestion.</span></small></div></div></div><div class="daynameheading" data-dcnode-id="2224"><a data-dcnode-id="2226" name="HarkinsWilliam"></a><span data-dcnode-id="2225" instrument_node="">
&nbsp; William Draper Harkins</span></div><div data-dcnode-id="2196"><div class="dayleftcell100" data-dcnode-id="2217"><img alt="Thumbnail - William Draper Harkins" class="daythm" data-dcnode-id="2223" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/H/Harkins_William/HarkinsWilliamThm.jpg&amp;raw" title="William Draper Harkins " width="100"><br data-dcnode-id="2222"><span class="noprint" data-dcnode-id="2218"><span class="imagesource" data-dcnode-id="2219"><a data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//books.nap.edu/books/0309022452/html/48.html%23pagetop" target="_blank"><span data-dcnode-id="2221" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="2197" style="margin-left:100px;padding:3px;"><span class="sprite icon-baby" data-dcnode-id="2216"></span><span data-dcnode-id="2215" instrument_node=""> &nbsp;Born 28 Dec 1873; died </span><span class="quietlink" data-dcnode-id="2211"><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/3/3_07.htm%23HarkinsWilliam"><span data-dcnode-id="2214" instrument_node="">7 Mar</span></a><span data-dcnode-id="2212" instrument_node=""> 1951</span></span><span data-dcnode-id="2210" instrument_node=""> </span><small data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">at age 77</span></small><span data-dcnode-id="2207" instrument_node="">.</span><br data-dcnode-id="2206"><span data-dcnode-id="2205" instrument_node="">American nuclear chemist who was one of the first to </span><a data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//books.nap.edu/books/0309022452/html/48.html%23pagetop"><span data-dcnode-id="2204" instrument_node="">investigate</span></a><span data-dcnode-id="2202" instrument_node=""> the structure and fusion reactions of the nucleus. In 1920, Harkins predicted the existence of the neutron, subsequently discovered by </span><a class="locallink" data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/1/1_24.htm%23ChadwickEdwin" title="local link"><span data-dcnode-id="2201" instrument_node=""> Edwin Chadwick</span></a><span data-dcnode-id="2199" instrument_node="">'s experiment. He made pioneering studies of nuclear reactions with Wilson cloud chambers. In the early 1930's, (with M.D. Kamen) he built a cyclotron. Harkins demonstrated that in neutron bombardment reactions the first step in neutron capture is the formation of an “excited nucleus”&nbsp;of measurable lifetime, which subsequently splits into fragments. He also suggested that subatomic energy might provide enough energy to power the Sun over its lifetime.«</span><div class="bookline" data-dcnode-id="2198"></div></div></div><div class="daynameheading" data-dcnode-id="2193"><a data-dcnode-id="2195" name="GeikieArchibald"></a><span data-dcnode-id="2194" instrument_node="">
&nbsp; Sir Archibald Geikie</span></div><div data-dcnode-id="2152"><div class="dayleftcell100" data-dcnode-id="2186"><img alt="Thumbnail - Sir Archibald Geikie" class="daythm" data-dcnode-id="2192" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/G/Geikie_Archibald/GeikieArchibaldThm.jpg&amp;raw" title="Sir Archibald Geikie " width="100"><br data-dcnode-id="2191"><span class="noprint" data-dcnode-id="2187"><span class="imagesource" data-dcnode-id="2188"><a data-dcnode-id="2189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ourhistory.is.ed.ac.uk/images/d/da/Nh0094.jpg" target="_blank"><span data-dcnode-id="2190" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="2153" style="margin-left:100px;padding:3px;"><span class="sprite icon-baby" data-dcnode-id="2185"></span><span data-dcnode-id="2184" instrument_node=""> &nbsp;Born 28 Dec 1835; died </span><span class="quietlink" data-dcnode-id="2180"><a data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/11/11_10.htm%23GeikieArchibald"><span data-dcnode-id="2183" instrument_node="">10 Nov</span></a><span data-dcnode-id="2181" instrument_node=""> 1924</span></span><span data-dcnode-id="2179" instrument_node=""> </span><small data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">at age 88</span></small><span data-dcnode-id="2176" instrument_node="">. &nbsp;</span><span class="footnote" data-dcnode-id="2172"><a class="locallink" data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/G/Geikie_Archibald/GeikieArchibald-Quotations.htm"><span class="sprite icon-quotes" data-dcnode-id="2175"></span><span data-dcnode-id="2174" instrument_node=""> quotes</span></a></span><br data-dcnode-id="2171"><span data-dcnode-id="2170" instrument_node="">Scottish </span><a data-dcnode-id="2168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Archibald_Geikie"><span data-dcnode-id="2169" instrument_node="">geologist</span></a><span data-dcnode-id="2167" instrument_node=""> who assisted Murchison on the geological survey of Scotland, made original studies of the effects of glaciation in Scotland (1863), and became&nbsp;</span><a data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.geolsoc.org.uk/template.cfm%3Fname%3DLibraryArchive"><span data-dcnode-id="2166" instrument_node="">director</span></a><span data-dcnode-id="2164" instrument_node=""> (1867) of the new branch of the Geological Survey for Scotland. In 1881, he became director-general of the Geological Survey of the United Kingdom. Geikie prepared a geological map of Scotland (1892). He advocated microscopic petrography. Geikie travelled throughout Europe and in western America. He found the canyons of the Colorado confirmed his long-standing fluvial theory of erosion. He also gained experience in volcanic geology. Among other books and texts, he published </span><i data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">The Ancient Volcanoes of Great Britain</span></i><span data-dcnode-id="2161" instrument_node=""> (1897).«</span><div class="bookline" data-dcnode-id="2154"><a class="amazonlink" data-dcnode-id="2158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B0006AE1RM%3Fie%3DUTF%26tag%3Dtodayinsci-20%26link_code%3Das3" title="Amazon link"><span class="sprite icon-book" data-dcnode-id="2160"></span><span data-dcnode-id="2159" instrument_node=""> Landscape in history, and other essays</span></a><span data-dcnode-id="2157" instrument_node="">, </span><small data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">by Archibald Geikie. - book suggestion.</span></small></div></div></div><div class="daynameheading" data-dcnode-id="2149"><a data-dcnode-id="2151" name="FreseniusCarl"></a><span data-dcnode-id="2150" instrument_node="">
&nbsp; Carl Remigius Fresenius</span></div><div data-dcnode-id="2117"><div class="dayleftcell100" data-dcnode-id="2142"><img alt="Thumbnail - Carl Remigius Fresenius" class="daythm" data-dcnode-id="2148" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/F/Fresenius_Carl/FreseniusCarlThm.jpg&amp;raw" title="Carl Remigius Fresenius " width="100"><br data-dcnode-id="2147"><span class="noprint" data-dcnode-id="2143"><span class="imagesource" data-dcnode-id="2144"><a data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chemsoc.org/networks/enc/FECS/Fresenius.htm" target="_blank"><span data-dcnode-id="2146" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="2118" style="margin-left:100px;padding:3px;"><span class="sprite icon-baby" data-dcnode-id="2141"></span><span data-dcnode-id="2140" instrument_node=""> &nbsp;Born 28 Dec 1818; died </span><span class="quietlink" data-dcnode-id="2136"><a data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/6/6_11.htm%23FreseniusCarl"><span data-dcnode-id="2139" instrument_node="">11 Jun</span></a><span data-dcnode-id="2137" instrument_node=""> 1897</span></span><span data-dcnode-id="2135" instrument_node=""> </span><small data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">at age 78</span></small><span data-dcnode-id="2132" instrument_node="">. &nbsp;</span><span class="footnote" data-dcnode-id="2128"><a class="locallink" data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/F/Fresenius_Carl/FreseniusCarl-Quotations.htm"><span class="sprite icon-quotes" data-dcnode-id="2131"></span><span data-dcnode-id="2130" instrument_node=""> quotes</span></a></span><br data-dcnode-id="2127"><span data-dcnode-id="2126" instrument_node="">German analytical chemist who devised a method for systematic identification and separation of individual metal and non-metal ions, selecting the most suitable reactions from the many that were known. The book he wrote expounding this system (</span><i data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Anleitung zur qualitativen chemischen Analyse</span></i><span data-dcnode-id="2123" instrument_node="">, 1941) enjoyed great success. As it was the first to address this need, it became an enduring textbook. He followed this with a book on quantitative analysis (1846). Aged only 29, he founded the first chemical analysis and teaching laboratory, the Fresnius Training and Research Institute, in Wiesbaden, Germany. He founded the </span><i data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Zeitschrift für Analytische Chemie</span></i><span data-dcnode-id="2120" instrument_node=""> (Journal of Analytical Chemistry, 1862) which he edited until his death.«</span><div class="bookline" data-dcnode-id="2119"></div></div></div><div class="daynameheading" data-dcnode-id="2113"><a data-dcnode-id="2116" name="LawesJohn"></a><a data-dcnode-id="2115" name="Lawes"></a><span data-dcnode-id="2114" instrument_node="">
&nbsp; Sir John Bennet Lawes</span></div><div data-dcnode-id="2085"><div class="dayleftcell100" data-dcnode-id="2106"><img alt="Thumbnail - Sir John Bennet Lawes" class="daythm" data-dcnode-id="2112" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/L/Lawes_John/LawesJohnThm.jpg&amp;raw" title="Sir John Bennet Lawes " width="100"><br data-dcnode-id="2111"><span class="noprint" data-dcnode-id="2107"><span class="imagesource" data-dcnode-id="2108"><a data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rothamsted.bbsrc.ac.uk/corporate/Origins.html" target="_blank"><span data-dcnode-id="2110" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="2086" style="margin-left:100px;padding:3px;"><span class="sprite icon-baby" data-dcnode-id="2105"></span><span data-dcnode-id="2104" instrument_node=""> &nbsp;Born 28 Dec 1814; died </span><span class="quietlink" data-dcnode-id="2100"><a data-dcnode-id="2102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/8/8_31.htm%23LawesJohn"><span data-dcnode-id="2103" instrument_node="">31 Aug</span></a><span data-dcnode-id="2101" instrument_node=""> 1900</span></span><span data-dcnode-id="2099" instrument_node=""> </span><small data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">at age 85</span></small><span data-dcnode-id="2096" instrument_node="">.</span><br data-dcnode-id="2095"><span data-dcnode-id="2094" instrument_node="">(1st Baronet) English </span><a data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rothamsted.bbsrc.ac.uk/corporate/Origins.html"><span data-dcnode-id="2093" instrument_node="">agronomist</span></a><span data-dcnode-id="2091" instrument_node=""> who initiated the artificial fertiliser industry and founded the world's first agricultural research station. While a young man, he studied how manures improved growth of potted plants and crops. In 1842, having patented a method to make superphosphate by treating phosphate rock with sulphuric acid, he started the first artificial fertiliser factory. In 1843, Lawes opened the Rothamsted Experimental Station where he began a 57-yr collaboration with chemist </span><a data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.todayinsci.com/8/8_01.htm%23Gilbert"><span data-dcnode-id="2090" instrument_node="">Joseph Henry Gilbert</span></a><span data-dcnode-id="2088" instrument_node="">. They developed modern scientific agriculture, researching animal nutrition with different fodders, and the effect on crop yields of inorganic and organic fertilisers. Some of their long-term field experiments continue to this day.«</span><div class="bookline" data-dcnode-id="2087"></div></div></div><div class="daynameheading" data-dcnode-id="2081"><a data-dcnode-id="2084" name="BobbsJohn"></a><a data-dcnode-id="2083" name="Bobbs"></a><span data-dcnode-id="2082" instrument_node="">
&nbsp; John Stough Bobbs</span></div><div data-dcnode-id="2053"><div class="dayleftcell100" data-dcnode-id="2074"><img alt="Thumbnail - John Stough Bobbs" class="daythm" data-dcnode-id="2080" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/B/Bobbs_John/BobbsJohnThm.jpg&amp;raw" title="John Stough Bobbs " width="100"><br data-dcnode-id="2079"><span class="noprint" data-dcnode-id="2075"><span class="imagesource" data-dcnode-id="2076"><a data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medlib.iupui.edu/hom/bobbs.html" target="_blank"><span data-dcnode-id="2078" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="2054" style="margin-left:100px;padding:3px;"><span class="sprite icon-baby" data-dcnode-id="2073"></span><span data-dcnode-id="2072" instrument_node=""> &nbsp;Born 28 Dec 1809; died </span><span class="quietlink" data-dcnode-id="2068"><a data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/4/4_12.htm%23BobbsJohn"><span data-dcnode-id="2071" instrument_node="">12 Apr</span></a><span data-dcnode-id="2069" instrument_node=""> 1870</span></span><span data-dcnode-id="2067" instrument_node=""> </span><small data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">at age 60</span></small><span data-dcnode-id="2064" instrument_node="">.</span><br data-dcnode-id="2063"><span data-dcnode-id="2062" instrument_node="">American physician who </span><a data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medlib.iupui.edu/hom/bobbs.html"><span data-dcnode-id="2061" instrument_node="">performed</span></a><span data-dcnode-id="2059" instrument_node=""> the first U.S. gallstone </span><a data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.todayinsci.com/6/6_15.htm%23Gallstone"><span data-dcnode-id="2058" instrument_node="">operation</span></a><span data-dcnode-id="2056" instrument_node=""> in Indianapolis, Indiana, becoming known as "the father of cholecystotomy". The surgery was reported, 19-20 May 1868, to the Indiana State Medical Society of which he was president of the surgery section. Bobbs was a commissioner of the state's first hospital, the Indiana Hospital for the Insane. He was the state's first and most vocal advocate for a medical school, and he was founded the Indiana Medical college in 1869 (which was incorporated into the Indiana University School of Medicine in 1908). Earlier, he had served as state senator (1856-60). He was a civilian brigade surgeon during the Civil War.«</span><div class="bookline" data-dcnode-id="2055"></div></div></div><div class="daynameheading" data-dcnode-id="2050"><a data-dcnode-id="2052" name="HendersonThomas"></a><span data-dcnode-id="2051" instrument_node="">
&nbsp; Thomas Henderson</span></div><div data-dcnode-id="2005"><div class="dayleftcell100" data-dcnode-id="2043"><img alt="Thumbnail - Thomas Henderson" class="daythm" data-dcnode-id="2049" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/H/Henderson_Thomas/HendersonThomasMemorialThm.jpg&amp;raw" title="Thomas Henderson " width="100"><br data-dcnode-id="2048"><span class="noprint" data-dcnode-id="2044"><span class="imagesource" data-dcnode-id="2045"><a data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.roe.ac.uk/asewww/publications/journals/38/henderson.jpg" target="_blank"><span data-dcnode-id="2047" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="2006" style="margin-left:100px;padding:3px;"><span class="sprite icon-baby" data-dcnode-id="2042"></span><span data-dcnode-id="2041" instrument_node=""> &nbsp;Born 28 Dec 1798; died </span><span class="quietlink" data-dcnode-id="2037"><a data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/11/11_23.htm%23HendersonThomas"><span data-dcnode-id="2040" instrument_node="">23 Nov</span></a><span data-dcnode-id="2038" instrument_node=""> 1844</span></span><span data-dcnode-id="2036" instrument_node=""> </span><small data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">at age 45</span></small><span data-dcnode-id="2033" instrument_node="">.</span><br data-dcnode-id="2032"><span data-dcnode-id="2031" instrument_node="">Scottish astronomer, the first Scottish Astronomer Royal (1834), who was first to measure the parallax of a star (</span><i data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Alpha Centauri</span></i><span data-dcnode-id="2028" instrument_node="">, observed at the Cape of Good Hope) in 1831-33, but delayed publication of his results until Jan 1839. By then, a few months earlier, both </span><a class="locallink" data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/7/7_22.htm%23BesselFriedrich" title="local link"><span data-dcnode-id="2027" instrument_node=""> Friedrich Bessel</span></a><span data-dcnode-id="2025" instrument_node=""> and </span><a class="locallink" data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/4/4_15.htm%23StruveFriedrich" title="local link"><span data-dcnode-id="2024" instrument_node=""> Friedrich Struve</span></a><span data-dcnode-id="2022" instrument_node=""> had been recognized as first for their measurements of stellar parallaxes. </span><i data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">Alpha Centauri</span></i><span data-dcnode-id="2019" instrument_node=""> can be observed from the Cape, though not from Britain. It is now known to be the nearest star to the Sun, but is still so distant that its light takes 4.5 years to reach us. As Scottish Astronomer Royal in 1834, he worked diligently at the Edinburgh </span><a data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Henderson"><span data-dcnode-id="2018" instrument_node="">observatory</span></a><span data-dcnode-id="2016" instrument_node=""> for ten years, making over 60,000 observations of star positions before his death in 1844.«</span><span class="footnote" data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">[Image: Memorial tablet at the City Observatory, Edinburgh. No proper portrait of him exists]</span></span><div class="bookline" data-dcnode-id="2007"><a class="amazonlink" data-dcnode-id="2011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/0716737116%3Fie%3DUTF%26tag%3Dtodayinsci-20%26link_code%3Das3" title="Amazon link"><span class="sprite icon-book" data-dcnode-id="2013"></span><span data-dcnode-id="2012" instrument_node=""> Parallax</span></a><span data-dcnode-id="2010" instrument_node="">: The Race to Measure the Cosmos, </span><small data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">by Alan W. Hirshfeld. - book suggestion.</span></small></div></div></div><div class="daynameheading" data-dcnode-id="2002"><a data-dcnode-id="2004" name="ArnoldJoseph"></a><span data-dcnode-id="2003" instrument_node="">

DECEMBER 28 – DEATHS – Scientists&nbsp;died&nbsp;on&nbsp;December&nbsp;28th</span></div><div class="daynameheading" data-dcnode-id="1703"><a data-dcnode-id="1705" name="ArpHalton"></a><span data-dcnode-id="1704" instrument_node="">
&nbsp; Halton Christian Arp</span></div><div data-dcnode-id="1671"><div class="dayleftcell100" data-dcnode-id="1696"><img alt="Thumbnail - Halton Christian Arp" class="daythm" data-dcnode-id="1702" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/A/Arp_Halton/ArpHaltonThm.jpg&amp;raw" title="Halton Christian Arp " width="100"><br data-dcnode-id="1701"><span class="noprint" data-dcnode-id="1697"><span class="imagesource" data-dcnode-id="1698"><a data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ticino.tread.net/tradate/gat/arp/arp.htm" target="_blank"><span data-dcnode-id="1700" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="1672" style="margin-left:100px;padding:3px;"><span class="sprite icon-grave" data-dcnode-id="1695"></span><span data-dcnode-id="1694" instrument_node=""> &nbsp;Buried 28 Dec 2013 </span><small data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">at age 86</span></small><span data-dcnode-id="1691" instrument_node=""> (born </span><span class="quietlink" data-dcnode-id="1687"><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/3/3_21.htm%23ArpHalton"><span data-dcnode-id="1690" instrument_node="">21 Mar</span></a><span data-dcnode-id="1688" instrument_node=""> 1927</span></span><span data-dcnode-id="1686" instrument_node="">). &nbsp;</span><span class="footnote" data-dcnode-id="1682"><a class="locallink" data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/A/Arp_Halton/ArpHalton-Quotations.htm"><span class="sprite icon-quotes" data-dcnode-id="1685"></span><span data-dcnode-id="1684" instrument_node=""> quotes</span></a></span><br data-dcnode-id="1681"><span data-dcnode-id="1680" instrument_node="">American astronomer </span><a data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.astroleague.org/al/obsclubs/arppec/arphalt.html"><span data-dcnode-id="1679" instrument_node="">noted</span></a><span data-dcnode-id="1677" instrument_node=""> for challenging the theory that red shifts of quasars indicate their great distance. Arp is one of the key actors in the contemporary </span><a data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.haltonarp.com/"><span data-dcnode-id="1676" instrument_node="">debate</span></a><span data-dcnode-id="1674" instrument_node=""> on the origin and evolution of galaxies in the universe. His landmark compilation of peculiar galaxies led him to challenge the fundamental assumption of modern cosmology, that redshift is a uniform indicator of distance. Astronomers have debated Arp's assertion that quasars are related to peculiar galaxies since the late 1960s. Most astronomers believe that quasars are unrelated to the peculiar galaxies. Yet, no one has been able to explain why the quasars seem to be more numerous around the peculiar galaxies.</span><div class="bookline" data-dcnode-id="1673"></div></div></div><div class="daynameheading" data-dcnode-id="1668"><a data-dcnode-id="1670" name="LyleEldon"></a><span data-dcnode-id="1669" instrument_node="">
&nbsp; Eldon W. Lyle</span></div><div data-dcnode-id="1643"><div class="dayleftcell100" data-dcnode-id="1661"><img alt="Thumbnail - Eldon W. Lyle" class="daythm" data-dcnode-id="1667" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/L/Lyle_Eldon/LyleEldonThm.jpg&amp;raw" title="Eldon W. Lyle " width="100"><br data-dcnode-id="1666"><span class="noprint" data-dcnode-id="1662"><span class="imagesource" data-dcnode-id="1663"><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/sources.htm%23LyleEldon" target="_blank"><span data-dcnode-id="1665" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="1644" style="margin-left:100px;padding:3px;"><span class="sprite icon-grave" data-dcnode-id="1660"></span><span data-dcnode-id="1659" instrument_node=""> &nbsp;Died 28 Dec 1997 </span><small data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">at age 89</span></small><span data-dcnode-id="1656" instrument_node=""> (born </span><span class="quietlink" data-dcnode-id="1652"><a data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/12/12_05.htm%23LyleEldon"><span data-dcnode-id="1655" instrument_node="">5 Dec</span></a><span data-dcnode-id="1653" instrument_node=""> 1908</span></span><span data-dcnode-id="1651" instrument_node="">).</span><br data-dcnode-id="1650"><span data-dcnode-id="1649" instrument_node="">American plant pathologist who was an </span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.zoominfo.com/people/Lyle_Eldon_75149852.aspx"><span data-dcnode-id="1648" instrument_node="">expert</span></a><span data-dcnode-id="1646" instrument_node=""> on the diseases of roses. He lived in Tyler, Texas, and greatly assisted the city's rose-growing industry. His interest stretched over 50 years; his doctorate dissertation in 1937 was his first study on the control of black spot disease. He found that the chief source of black spot spores is from lesions on the canes, and not the black-spotted leaflets. When spraying for black spot, he found it was important to wet all the woody parts of the plant on a weekly basis. Affected leaflets, when left in place, in fact contributed to the food production of the rose plant. He also helped breed various rose varieties, investigated hybrids, genetic composition, cultural adaptation and the best use of fertilizers.«</span><div class="bookline" data-dcnode-id="1645"></div></div></div><div class="daynameheading" data-dcnode-id="1640"><a data-dcnode-id="1642" name="StevensWalter"></a><span data-dcnode-id="1641" instrument_node="">
&nbsp; Walter Le Conte Stevens</span></div><div data-dcnode-id="1625"><div data-dcnode-id="1626" style="margin-left:100px;padding:3px;"><span class="sprite icon-grave" data-dcnode-id="1639"></span><span data-dcnode-id="1638" instrument_node=""> &nbsp;Died 28 Dec 1927 </span><small data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">at age 80</span></small><span data-dcnode-id="1635" instrument_node=""> (born </span><span class="quietlink" data-dcnode-id="1631"><a data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/6/6_17.htm%23StevensWalter"><span data-dcnode-id="1634" instrument_node="">17 Jun</span></a><span data-dcnode-id="1632" instrument_node=""> 1847</span></span><span data-dcnode-id="1630" instrument_node="">).</span><br data-dcnode-id="1629"><span data-dcnode-id="1628" instrument_node="">American physicist.</span><div class="bookline" data-dcnode-id="1627"></div></div></div><div class="daynameheading" data-dcnode-id="1622"><a data-dcnode-id="1624" name="EiffelGustave"></a><span data-dcnode-id="1623" instrument_node="">
&nbsp; Gustave Eiffel</span></div><div data-dcnode-id="1575"><div class="dayleftcell100" data-dcnode-id="1615"><img alt="Thumbnail - Gustave Eiffel" class="daythm" data-dcnode-id="1621" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/E/Eiffel_Gustave/EiffelGustaveThm.jpg&amp;raw" title="Gustave Eiffel " width="100"><br data-dcnode-id="1620"><span class="noprint" data-dcnode-id="1616"><span class="imagesource" data-dcnode-id="1617"><a data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0895/0864/products/1632515_1024x1024.jpeg%3Fv%3D1449182028" target="_blank"><span data-dcnode-id="1619" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="1576" style="margin-left:100px;padding:3px;"><span class="sprite icon-grave" data-dcnode-id="1614"></span><span data-dcnode-id="1613" instrument_node=""> &nbsp;Died 28 Dec 1923 </span><small data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">at age 91</span></small><span data-dcnode-id="1610" instrument_node=""> (born </span><span class="quietlink" data-dcnode-id="1606"><a data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/12/12_15.htm%23EiffelGustave"><span data-dcnode-id="1609" instrument_node="">15 Dec</span></a><span data-dcnode-id="1607" instrument_node=""> 1832</span></span><span data-dcnode-id="1605" instrument_node="">). &nbsp;</span><span class="footnote" data-dcnode-id="1601"><a class="locallink" data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/E/Eiffel_Gustave/EiffelGustave-Quotations.htm"><span class="sprite icon-quotes" data-dcnode-id="1604"></span><span data-dcnode-id="1603" instrument_node=""> quotes</span></a></span><br data-dcnode-id="1600"><span data-dcnode-id="1599" instrument_node="">French civil </span><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Eiffel"><span data-dcnode-id="1598" instrument_node="">engineer</span></a><span data-dcnode-id="1596" instrument_node=""> who specialized in metal structures, known especially for the Eiffel Tower in Paris. He built his first of his iron bridges at Bordeaux (1858) and was among the first engineers to build bridge foundations using compressed-air caissons. His work includes designing the rotatable </span><a data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nice_Observatory"><span data-dcnode-id="1595" instrument_node="">dome</span></a><span data-dcnode-id="1593" instrument_node=""> for Nice Observatory on the summit of Mont Gros (1886), and the </span><a data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.endex.com/gf/buildings/eiffel/solgrid.jpg"><span data-dcnode-id="1592" instrument_node="">framework</span></a><span data-dcnode-id="1590" instrument_node="">for the </span><a data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statue_of_Liberty"><span data-dcnode-id="1589" instrument_node="">Statue of Liberty</span></a><span data-dcnode-id="1587" instrument_node=""> now in New York Harbour. After building the </span><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eiffel_Tower"><span data-dcnode-id="1586" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="1584" instrument_node=""> (1887-9), which he used for scientific research on meteorology, aerodynamics and radio telegraphy, he also built the first aerodynamic laboratory at Auteuil, outside Paris, where he pursued his research work without interruption during WW I.«</span><div class="bookline" data-dcnode-id="1577"><a class="amazonlink" data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/0750933089%3Fie%3DUTF%26tag%3Dtodayinsci-20%26link_code%3Das3" title="Amazon link"><span class="sprite icon-book" data-dcnode-id="1583"></span><span data-dcnode-id="1582" instrument_node=""> Eiffel</span></a><span data-dcnode-id="1580" instrument_node="">: The Genius Who Reinvented Himself, </span><small data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">by David I. Harvie. - book suggestion.</span></small></div></div></div><div class="daynameheading" data-dcnode-id="1572"><a data-dcnode-id="1574" name="RydbergJohannes"></a><span data-dcnode-id="1573" instrument_node="">
&nbsp; Johannes Robert Rydberg</span></div><div data-dcnode-id="1544"><div class="dayleftcell100" data-dcnode-id="1565"><img alt="Thumbnail - Johannes Robert Rydberg" class="daythm" data-dcnode-id="1571" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/R/Rydberg_Johannes/RydbergJohannesThm.jpg&amp;raw" title="Johannes Robert Rydberg " width="100"><br data-dcnode-id="1570"><span class="noprint" data-dcnode-id="1566"><span class="imagesource" data-dcnode-id="1567"><a data-dcnode-id="1568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aip.org/history/esva/html/rydberg_a1.html" target="_blank"><span data-dcnode-id="1569" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="1545" style="margin-left:100px;padding:3px;"><span class="sprite icon-grave" data-dcnode-id="1564"></span><span data-dcnode-id="1563" instrument_node=""> &nbsp;Died 28 Dec 1919 </span><small data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">at age 65</span></small><span data-dcnode-id="1560" instrument_node=""> (born </span><span class="quietlink" data-dcnode-id="1556"><a data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/11/11_08.htm%23RydbergJohannes"><span data-dcnode-id="1559" instrument_node="">8 Nov</span></a><span data-dcnode-id="1557" instrument_node=""> 1854</span></span><span data-dcnode-id="1555" instrument_node="">).</span><br data-dcnode-id="1554"><span data-dcnode-id="1553" instrument_node="">Swedish </span><a data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rydberg"><span data-dcnode-id="1552" instrument_node="">physicist</span></a><span data-dcnode-id="1550" instrument_node="">, known for the Rydberg constant in his empirical </span><a data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www-groups.dcs.st-and.ac.uk/~history/Mathematicians/Rydberg.html"><span data-dcnode-id="1549" instrument_node="">formula</span></a><span data-dcnode-id="1547" instrument_node=""> that related the wave numbers of the spectral lines of an element (1890). This formula expressed fundamental relationships in those lines, which he presumed were the result of the inner nature and structure of an element's atoms. In 1897, he suggested that an atomic number for each of the elements, rather than atomic weights, would be a better means for organizing the elements and their periodicity of their characteristics. His work did provided the basis for discovering the electron shell structure of the atom. It was later established that the integer number of positive charges on an element's nucleus (its number of protons) corresponded to his idea of atomic number.«</span><div class="bookline" data-dcnode-id="1546"></div></div></div><div class="daynameheading" data-dcnode-id="1541"><a data-dcnode-id="1543" name="HaleHoratio"></a><span data-dcnode-id="1542" instrument_node="">
&nbsp; Horatio Hale</span></div><div data-dcnode-id="1504"><div class="dayleftcell100" data-dcnode-id="1534"><img alt="Thumbnail - Horatio Hale" class="daythm" data-dcnode-id="1540" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/H/Hale_Horatio/HaleHoratioThm.jpg&amp;raw" title="Horatio Hale " width="100"><br data-dcnode-id="1539"><span class="noprint" data-dcnode-id="1535"><span class="imagesource" data-dcnode-id="1536"><a data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//members.tripod.com/~kajJ/images2/tetulo01.jpg" target="_blank"><span data-dcnode-id="1538" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="1505" style="margin-left:100px;padding:3px;"><span class="sprite icon-grave" data-dcnode-id="1533"></span><span data-dcnode-id="1532" instrument_node=""> &nbsp;Died 28 Dec 1896 </span><small data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">at age 79</span></small><span data-dcnode-id="1529" instrument_node=""> (born </span><span class="quietlink" data-dcnode-id="1525"><a data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/5/5_03.htm%23HaleHoratio"><span data-dcnode-id="1528" instrument_node="">3 May</span></a><span data-dcnode-id="1526" instrument_node=""> 1817</span></span><span data-dcnode-id="1524" instrument_node="">).</span><br data-dcnode-id="1523"><span data-dcnode-id="1522" instrument_node="">Horatio (Emmons) Hale was an American </span><a data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Horatio_Hale"><span data-dcnode-id="1521" instrument_node="">anthropologist</span></a><span data-dcnode-id="1519" instrument_node=""> whose </span><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.trussel.com/kir/hale.htm"><span data-dcnode-id="1518" instrument_node="">contributions</span></a><span data-dcnode-id="1516" instrument_node=""> to the science of ethnology, included his theory of the origin of the diversities of human languages and dialectsa theory suggested by his study of childlanguages (the languages invented by little children). He emphasized the importance of languages as tests of mental capacity and as criteria for the classification of human groups. Hale was the first to </span><a data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//members.tripod.com/~kajJ/images2/Tetulo.html"><span data-dcnode-id="1515" instrument_node="">discover</span></a><span data-dcnode-id="1513" instrument_node=""> that the Tutelos of Virginia belonged to the Siouan family, and to identify the Cherokee as a member of the Iroquoian family of speech. He sailed with the scientific corps of the Wilkes Exploring Expedition (1838-42) collecting linguistic materials. He used the drift of the Polynesian tongue as a clue to the migration of this race.«</span><div class="bookline" data-dcnode-id="1506"><a class="amazonlink" data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/1404375279%3Fie%3DUTF%26tag%3Dtodayinsci-20%26link_code%3Das3" title="Amazon link"><span class="sprite icon-book" data-dcnode-id="1512"></span><span data-dcnode-id="1511" instrument_node=""> The Iroquois Book of Rites</span></a><span data-dcnode-id="1509" instrument_node="">, </span><small data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">by Horatio Hale. - book suggestion.</span></small></div></div></div><div class="daynameheading" data-dcnode-id="1501"><a data-dcnode-id="1503" name="TournefortJoseph"></a><span data-dcnode-id="1502" instrument_node="">
&nbsp; Joseph Pitton de Tournefort</span></div><div data-dcnode-id="1459"><div class="dayleftcell100" data-dcnode-id="1494"><img alt="Thumbnail - Joseph Pitton de Tournefort" class="daythm" data-dcnode-id="1500" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/T/Tournefort_Joseph/TournefortJosephThm.jpg&amp;raw" title="Joseph Pitton de Tournefort " width="100"><br data-dcnode-id="1499"><span class="noprint" data-dcnode-id="1495"><span class="imagesource" data-dcnode-id="1496"><a data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//huntbot.andrew.cmu.edu/HIBD/Exhibitions/OrderFromChaos/pages/02Linnaeus/sources/Tournefort%2CJosephPittonde.shtml" target="_blank"><span data-dcnode-id="1498" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="1460" style="margin-left:100px;padding:3px;"><div class="dayrightcell100" data-dcnode-id="1492"><img alt="Thumbnail - " class="daythm" data-dcnode-id="1493" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/T/Tournefort_Joseph/ElemensDeBotaniqueThm.jpg&amp;raw" title=" " width="100"></div><span class="sprite icon-grave" data-dcnode-id="1491"></span><span data-dcnode-id="1490" instrument_node=""> &nbsp;Died 28 Dec 1708 </span><small data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">at age 52</span></small><span data-dcnode-id="1487" instrument_node=""> (born </span><span class="quietlink" data-dcnode-id="1483"><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/6/6_05.htm%23TournefortJoseph"><span data-dcnode-id="1486" instrument_node="">5 Jun</span></a><span data-dcnode-id="1484" instrument_node=""> 1656</span></span><span data-dcnode-id="1482" instrument_node="">). &nbsp;</span><span class="footnote" data-dcnode-id="1478"><a class="locallink" data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/T/Tournefort_Joseph/TournefortJoseph-Quotations.htm"><span class="sprite icon-quotes" data-dcnode-id="1481"></span><span data-dcnode-id="1480" instrument_node=""> quotes</span></a></span><br data-dcnode-id="1477"><span data-dcnode-id="1476" instrument_node="">French </span><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.newadvent.org/cathen/14799a.htm"><span data-dcnode-id="1475" instrument_node="">botanist</span></a><span data-dcnode-id="1473" instrument_node=""> and physician, whose pioneering systematic approach to botany included creating a system of plant classification that used the "genus" in the modern sense. On scientific expeditions, he collected many plant species from Greece, Asia Minor, and the Pyrenees. In </span><i data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Élémens de botanique</span></i><span data-dcnode-id="1470" instrument_node=""> (1694), he </span><a data-dcnode-id="1468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//huntbot.andrew.cmu.edu/HIBD/Exhibitions/OrderFromChaos/pages/02Linnaeus/sources/Tournefort%2CJosephPittonde.shtml"><span data-dcnode-id="1469" instrument_node="">arranged</span></a><span data-dcnode-id="1467" instrument_node=""> the petal-bearing plants into classes based on the form of the corolla, then into families based on the position of the corolla, and finally into genera as defined by the character of the fruit and seed. His system was used through the 18th century, elaborated by others such as Linnæus, but superceded as research advanced. Tournefort did not use a microscope and did no research on plant structure, function or reproduction.«</span><span class="footnote" data-dcnode-id="1462"><span data-dcnode-id="1466" instrument_node="">[Image right: </span><a data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bnf.fr/web-bnf/pedagos/dossitsm/gc255-90.htm"><span data-dcnode-id="1465" instrument_node="">(source)</span></a><span data-dcnode-id="1463" instrument_node="">]</span></span><div class="bookline" data-dcnode-id="1461"></div></div></div><div class="daynameheading" data-dcnode-id="1456"><a data-dcnode-id="1458" name="GrimaldiFrancesco"></a><span data-dcnode-id="1457" instrument_node="">
&nbsp; Francesco Maria Grimaldi</span></div><div data-dcnode-id="1417"><div class="dayleftcell100" data-dcnode-id="1449"><img alt="Thumbnail - Francesco Maria Grimaldi" class="daythm" data-dcnode-id="1455" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/G/Grimaldi_Francesco/GrimaldiFrancescoThm.jpg&amp;raw" title="Francesco Maria Grimaldi " width="100"><br data-dcnode-id="1454"><span class="noprint" data-dcnode-id="1450"><span class="imagesource" data-dcnode-id="1451"><a data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AFrancesco_Maria_Grimaldi.jpg" target="_blank"><span data-dcnode-id="1453" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="1418" style="margin-left:100px;padding:3px;"><span class="sprite icon-grave" data-dcnode-id="1448"></span><span data-dcnode-id="1447" instrument_node=""> &nbsp;Died 28 Dec 1663 </span><small data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">at age 45</span></small><span data-dcnode-id="1444" instrument_node=""> (born </span><span class="quietlink" data-dcnode-id="1440"><a data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/4/4_02.htm%23GrimaldiFrancesco"><span data-dcnode-id="1443" instrument_node="">2 Apr</span></a><span data-dcnode-id="1441" instrument_node=""> 1618</span></span><span data-dcnode-id="1439" instrument_node="">). &nbsp;</span><span class="footnote" data-dcnode-id="1435"><a class="locallink" data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/G/Grimaldi_Francesco/GrimaldiFrancesco-Quotations.htm"><span class="sprite icon-quotes" data-dcnode-id="1438"></span><span data-dcnode-id="1437" instrument_node=""> quotes</span></a></span><br data-dcnode-id="1434"><span data-dcnode-id="1433" instrument_node="">Italian physicist and mathematician who </span><a data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.newadvent.org/cathen/07034a.htm"><span data-dcnode-id="1432" instrument_node="">studied</span></a><span data-dcnode-id="1430" instrument_node=""> the diffraction of light. He observed the image on a screen in a darkened room of a tiny beam of sunlight after it passed pass through a fine screen (or a slit, edge of a screen, wire, hair, fabric or bird feather). The image had iridescent fringes, and deviated from a normal geometrical shadow. He coined the name </span><i data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">diffraction</span></i><span data-dcnode-id="1427" instrument_node=""> for this change of trajectory of the light passing near opaque objects (though, more specifically, it may have been interferences with two close sources that he observed). This provided evidence for later physicists to support the wave theory of light. With </span><a class="locallink" data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/4/4_17.htm%23RiccioliGiovanni" title="local link"><span data-dcnode-id="1426" instrument_node=""> Riccioli</span></a><span data-dcnode-id="1424" instrument_node="">, he investigated the object in free fall (1640-50), and found that distance of fall was proportional to the square of the time taken.«
&nbsp;</span><span class="footnote" data-dcnode-id="1420"><a class="locallink" data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/G/Grimaldi_Francesco/GrimaldiFrancesco-Bio.htm"><span class="sprite icon-more" data-dcnode-id="1423"></span><span data-dcnode-id="1422" instrument_node=""> more</span></a></span><div class="bookline" data-dcnode-id="1419"></div></div></div><br data-dcnode-id="1416" style="clear:all;"><span data-dcnode-id="1415" instrument_node="">
