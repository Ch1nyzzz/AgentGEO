DECEMBER 28 – EVENTS – Science&nbsp;events&nbsp;on&nbsp;December&nbsp;28th</span></div><div class="daynameheading" data-dcnode-id="1176"><a data-dcnode-id="1178" name="Galileo"></a><span data-dcnode-id="1177" instrument_node="">
&nbsp; Galileo satellite launched</span></div><div data-dcnode-id="1165"><div data-dcnode-id="1166" style="margin-left:100px;padding:3px;"><span class="sprite icon-calendar" data-dcnode-id="1175"></span><span data-dcnode-id="1174" instrument_node=""> &nbsp;
In 2005, the first in a network of satellites, named </span><i data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Galileo</span></i><span data-dcnode-id="1171" instrument_node="">, was launched by a consortium of European goverments and companies. It was expected that by 2011, </span><i data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Galileo</span></i><span data-dcnode-id="1168" instrument_node=""> was to consist of 30 satellites providing worldwide coverage as an alternative to the U.S. monopoly with its Global Positioning System (GPS). At a cost of $4 billion, it was Europe's biggest-ever space project, with one-third contributed by governments and the balance from eight companies. Since the American GPS is controlled by the military, the European satellite network is designed to ensure independance for civilian use, but also offer more precision for a paid service. Customers are expected to include service for small airports, transportation, and mobile phone manufacturers to build in navigation capabilities.«</span><div class="bookline" data-dcnode-id="1167"></div></div></div><div class="daynameheading" data-dcnode-id="1162"><a data-dcnode-id="1164" name="CarrElizabethBirth"></a><span data-dcnode-id="1163" instrument_node="">
&nbsp; Elizabeth Jordan Carr</span></div><div data-dcnode-id="1139"><div class="dayleftcell100" data-dcnode-id="1153"><img alt="Thumbnail - Elizabeth Jordan Carr" class="daythm" data-dcnode-id="1161" height="113" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/Events/Medical/EmbryoHuman4cellThm.jpg&amp;raw" title="Elizabeth Jordan Carr " width="100"><br data-dcnode-id="1160"><div class="footnote" data-dcnode-id="1158" style="width:100px;"><span data-dcnode-id="1159" instrument_node="">4-cell embryo</span></div><span class="noprint" data-dcnode-id="1154"><span class="imagesource" data-dcnode-id="1155"><a data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.advancedfertility.com/4cell.htm" target="_blank"><span data-dcnode-id="1157" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="1140" style="margin-left:100px;padding:3px;"><span class="sprite icon-calendar" data-dcnode-id="1152"></span><span data-dcnode-id="1151" instrument_node=""> &nbsp;
In 1981, the first American “test tube” baby conceived through </span><i data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">in vitro</span></i><span data-dcnode-id="1148" instrument_node=""> fertilization was born on this morning, a 5-lb 12-oz girl, at Norfolk General Hospital. The term “in vitro” is Latin for “in glass,” because conception takes place in a laboratory dish. The U.S. procedure was performed by the Howard and Georgeanna Jones Institute for Reproductive Medicine, which now draws patients from around the world with its advanced and comprehensive treatment of reproductive disorders, male and female. In vitro fertilization was a medical </span><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20031225095946/news.mpr.org/features/199711/20_smiths_fertility/part7/section1.shtml"><span data-dcnode-id="1147" instrument_node="">breakthrough</span></a><span data-dcnode-id="1145" instrument_node=""> because it helped doctors overcome intractable problems with a woman's fallopian tubes or a man's sperm count. The world's first “test-tube” baby, Louise Brown, was born in England, on </span><a class="locallink" data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/7/7_25.htm%23BrownLouiseBirth" title="local link"><span data-dcnode-id="1144" instrument_node=""> 25 Jul 1978</span></a><span data-dcnode-id="1142" instrument_node="">.</span><div class="bookline" data-dcnode-id="1141"></div></div></div><div class="daynameheading" data-dcnode-id="1136"><a data-dcnode-id="1138" name="NeutronRadiationPrecursor"></a><span data-dcnode-id="1137" instrument_node="">
&nbsp; Beryllium bombarded by alpha rays</span></div><div data-dcnode-id="1106"><div class="dayleftcell100" data-dcnode-id="1134"><img alt="Thumbnail - Beryllium bombarded by alpha rays" class="daythm" data-dcnode-id="1135" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/Events/NuclearParticles/BeAlphaNeutronThm.jpg&amp;raw" title="Beryllium bombarded by alpha rays " width="100"></div><div data-dcnode-id="1107" style="margin-left:100px;padding:3px;"><div data-dcnode-id="1125" style="width:99px;text-align:center;vertical-align:top;float:right;position:relative;padding:3px;"><img alt="Thumbnail - " class="daythm" data-dcnode-id="1133" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/J/JoliotCuries/JoliotCurieIreneThm.jpg&amp;raw" title=" " width="99"><br data-dcnode-id="1132"><div class="footnote" data-dcnode-id="1130" style="width:99px;"><span data-dcnode-id="1131" instrument_node="">Joliot-Curie</span></div><span class="noprint" data-dcnode-id="1126"><span class="imagesource" data-dcnode-id="1127"><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aip.org/history/esva/html/joliotcurie_i_a6.html" target="_blank"><span data-dcnode-id="1129" instrument_node="">(source)</span></a></span></span></div><span class="sprite icon-calendar" data-dcnode-id="1124"></span><span data-dcnode-id="1123" instrument_node=""> &nbsp;
In 1931, </span><a class="locallink" data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/9/9_12.htm%23JoliotCurieIrene" title="local link"><span data-dcnode-id="1122" instrument_node=""> Irene Joliot-Curie</span></a><span data-dcnode-id="1120" instrument_node=""> reported her study of the unusually penetrating radiation released when beryllium was bombarded by alpha particles seen by the German physicists, Walter Bothe and H. Becker in 1930. Joliot-Curie (daughter of </span><a class="locallink" data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/11/11_07.htm%23CurieMarie" title="local link"><span data-dcnode-id="1119" instrument_node=""> Marie</span></a><span data-dcnode-id="1117" instrument_node=""> and </span><a class="locallink" data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/5/5_15.htm%23CuriePierre" title="local link"><span data-dcnode-id="1116" instrument_node=""> Pierre Curie</span></a><span data-dcnode-id="1114" instrument_node="">) agreed with them that the radiation was energetic gamma rays. She further discovered that if the emitted radiation passed through paraffin (or other hydrogen containing materials), large numbers of protons were released. Since this was, in fact, a previously unknown result for gamma rays, she lacked an explanation. It was to be the experiments of </span><a class="locallink" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/10/10_20.htm%23ChadwickJames" title="local link"><span data-dcnode-id="1113" instrument_node=""> James Chadwick</span></a><span data-dcnode-id="1111" instrument_node=""> performed during 7-17 Feb that would discover the radiation was in fact new particles - neutrons.«</span><span class="footnote" data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">[Image: alpha particle striking a beryllium nucleus creates a carbon nucleus with the release of a neutron]</span></span><div class="bookline" data-dcnode-id="1108"></div></div></div><div class="daynameheading" data-dcnode-id="1103"><a data-dcnode-id="1105" name="{12-28-1904}"></a><span data-dcnode-id="1104" instrument_node="">
&nbsp; Wireless relays weather reports</span></div><div data-dcnode-id="1095"><div data-dcnode-id="1096" style="margin-left:100px;padding:3px;"><span class="sprite icon-calendar" data-dcnode-id="1102"></span><span data-dcnode-id="1101" instrument_node=""> &nbsp;
In 1904, the first weather reports relayed by wireless telegraphy were published in London.</span><span class="footnote" data-dcnode-id="1098"><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.todayinsci.com/sources.htm%23Times"><span data-dcnode-id="1100" instrument_node="">*</span></a></span><div class="bookline" data-dcnode-id="1097"></div></div></div><div class="daynameheading" data-dcnode-id="1092"><a data-dcnode-id="1094" name="LumiereFilm"></a><span data-dcnode-id="1093" instrument_node="">
&nbsp; Lumieres' first public performance</span></div><div data-dcnode-id="1065"><div class="dayleftcell100" data-dcnode-id="1085"><img alt="Thumbnail - Lumieres' first public performance" class="daythm" data-dcnode-id="1091" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/L/Lumieres/LumiereFilmThm.jpg&amp;raw" title="Lumieres' first public performance " width="100"><br data-dcnode-id="1090"><span class="noprint" data-dcnode-id="1086"><span class="imagesource" data-dcnode-id="1087"><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fomak.ch/R399/399_Aus_dem_Dunkeln.htm" target="_blank"><span data-dcnode-id="1089" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="1066" style="margin-left:100px;padding:3px;"><span class="sprite icon-calendar" data-dcnode-id="1084"></span><span data-dcnode-id="1083" instrument_node=""> &nbsp;
In 1895, the brothers </span><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.todayinsci.com/10/10_19.htm%23LumiereAuguste"><span data-dcnode-id="1082" instrument_node="">Auguste</span></a><span data-dcnode-id="1080" instrument_node=""> and </span><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.todayinsci.com/10/10_05.htm%23LumiereLouis"><span data-dcnode-id="1079" instrument_node="">Louis Lumière</span></a><span data-dcnode-id="1077" instrument_node=""> presented their motion-picture films in their first public performance, at the Salon Indien of the Grand Café, 14 Boulevard des Capucines in Paris. An earlier private first screening on </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.todayinsci.com/3/3_22.htm%23LumiereFirstFilm"><span data-dcnode-id="1076" instrument_node="">22 Mar 1895</span></a><span data-dcnode-id="1074" instrument_node=""> showed their first film, </span><i data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">La Sortie des ouvriers de l'usine Lumière</span></i><span data-dcnode-id="1071" instrument_node="">. This </span><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cinemedia.net/SFCV-RMIT-Annex/rnaughton/LUMIERE_BIO.html"><span data-dcnode-id="1070" instrument_node="">film</span></a><span data-dcnode-id="1068" instrument_node=""> was shot specially for the occasion. It shows workers leaving the Lumières' own factory in Lyon, which made all kinds of photographic products. The workers streamed out, most on foot, some on bicycles, followed by those with cars.«</span><div class="bookline" data-dcnode-id="1067"></div></div></div><div class="daynameheading" data-dcnode-id="1062"><a data-dcnode-id="1064" name="DewarLectures"></a><span data-dcnode-id="1063" instrument_node="">
&nbsp; Dewar lectures</span></div><div data-dcnode-id="1042"><div class="dayleftcell100" data-dcnode-id="1055"><img alt="Thumbnail - Dewar lectures" class="daythm" data-dcnode-id="1061" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/D/Dewar_James/DewarJamesThm.gif&amp;raw" title="Dewar lectures " width="100"><br data-dcnode-id="1060"><span class="noprint" data-dcnode-id="1056"><span class="imagesource" data-dcnode-id="1057"><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.essexind.com/cryo_page3.htm" target="_blank"><span data-dcnode-id="1059" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="1043" style="margin-left:100px;padding:3px;"><span class="sprite icon-calendar" data-dcnode-id="1054"></span><span data-dcnode-id="1053" instrument_node=""> &nbsp;
In 1893, Professor </span><a class="locallink" data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/9/9_20.htm%23DewarJames" title="local link"><span data-dcnode-id="1052" instrument_node=""> James Dewar</span></a><span data-dcnode-id="1050" instrument_node=""> gave six well-illustrated lectures on “Air gaseous and liquid,”&nbsp;at the Royal Institution, London, between this day and 9 Jan 1894. Some of the air in the room was liquified in the presence of the audience and it remained so for some time, when enclosed in a vacuum jacket. Again, 1 Apr 1898.</span><span class="footnote" data-dcnode-id="1045"><span data-dcnode-id="1049" instrument_node="">[</span><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.todayinsci.com/sources.htm%23HaydnsDictionaryOf%2520Dates"><span data-dcnode-id="1048" instrument_node="">*</span></a><span data-dcnode-id="1046" instrument_node=""> p.30]</span></span><div class="bookline" data-dcnode-id="1044"></div></div></div><div class="daynameheading" data-dcnode-id="1039"><a data-dcnode-id="1041" name="1228-PatentDishwasher"></a><span data-dcnode-id="1040" instrument_node="">
&nbsp; Dishwasher patent</span></div><div data-dcnode-id="1016"><div class="dayleftcell100" data-dcnode-id="1034"><img alt="Thumbnail - Dishwasher patent" class="daythm" data-dcnode-id="1038" height="85" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/Events/Patent/Dishwasher355139-01Thm.jpg&amp;raw" title="Dishwasher patent " width="100"><br data-dcnode-id="1037"><div class="footnote" data-dcnode-id="1035" style="width:100px;"><span data-dcnode-id="1036" instrument_node="">(USPTO)</span></div></div><div data-dcnode-id="1017" style="margin-left:100px;padding:3px;"><span class="sprite icon-calendar" data-dcnode-id="1033"></span><span data-dcnode-id="1032" instrument_node=""> &nbsp;
In 1886, the first U.S. patent for a commercially successful dishwasher was issued to Josephine Garis Cochrane (</span><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.todayinsci.com/Events/Patent/DishwashingMachine355139.htm"><span data-dcnode-id="1031" instrument_node="">No. 355,139</span></a><span data-dcnode-id="1029" instrument_node="">). Developed over a number of years, aher hand-operated </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uh.edu/engines/epi1476.htm"><span data-dcnode-id="1028" instrument_node="">machine</span></a><span data-dcnode-id="1026" instrument_node=""> provided "a continuous stream of either soap-suds or clear hot water" which was "supplied to a crate holding the racks or cages containing the dishes while the crate is rotated so as to bring the greater portion thereof under the action of the water." The company she founded to market the dishwasher to hotels and restaurants was purchased in the 1920's by the Hobart Corporation. They introduced the "KitchenAid" brand name that is known today (1949). The first U.S. patent for a dishwasher was issued </span><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.todayinsci.com/5/5_14.htm%23PatentDishwasher"><span data-dcnode-id="1025" instrument_node="">14 May 1850</span></a><span data-dcnode-id="1023" instrument_node=""> to Joel Houghton. «
&nbsp;</span><span class="footnote" data-dcnode-id="1019"><a class="locallink" data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/Events/Patent/DishwashingMachine355139.htm"><span class="sprite icon-more" data-dcnode-id="1022"></span><span data-dcnode-id="1021" instrument_node=""> more</span></a></span><div class="bookline" data-dcnode-id="1018"></div></div></div><div class="daynameheading" data-dcnode-id="1013"><a data-dcnode-id="1015" name="BridgeTayCollapse"></a><span data-dcnode-id="1014" instrument_node="">
&nbsp; Tay Bridge collapse</span></div><div data-dcnode-id="978"><div class="dayleftcell100" data-dcnode-id="1006"><img alt="Thumbnail - Tay Bridge collapse" class="daythm" data-dcnode-id="1012" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/Events/Bridges/BridgeTayCollapseThm.jpg&amp;raw" title="Tay Bridge collapse " width="100"><br data-dcnode-id="1011"><span class="noprint" data-dcnode-id="1007"><span class="imagesource" data-dcnode-id="1008"><a data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.railwaysarchive.co.uk/eventsummary.php%3FeventID%3D50%26PHPSESSID%3D1719642d672c54703107ee1fffc8521b" target="_blank"><span data-dcnode-id="1010" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="979" style="margin-left:100px;padding:3px;"><span class="sprite icon-calendar" data-dcnode-id="1005"></span><span data-dcnode-id="1004" instrument_node=""> &nbsp;
In 1879, at about 7:15 pm, as a train crossed the </span><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.open2.net/forensic_engineering/"><span data-dcnode-id="1003" instrument_node="">Tay Bridge</span></a><span data-dcnode-id="1001" instrument_node=""> during a gale, the central navigation spans </span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//taybridgedisaster.co.uk/"><span data-dcnode-id="1000" instrument_node="">collapsed</span></a><span data-dcnode-id="998" instrument_node="">. The locomotive and six carriages of pasengers fell into the Firth of Tay at Dundee, killing over 80 people, with no survivors. The Tay bridge, then the longest bridge in the world, had 85 spans and was nearly 2 miles long. The </span><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.uoguelph.ca/~frencha/tay_bridge.htm"><span data-dcnode-id="997" instrument_node="">collapse</span></a><span data-dcnode-id="995" instrument_node=""> of the bridge, opened only 19 months before, shocked the Victorian engineering profession and general public. The Court of Inquiry </span><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.open2.net/forensic_engineering/riddle/riddle_05.htm"><span data-dcnode-id="994" instrument_node="">concluded</span></a><span data-dcnode-id="992" instrument_node=""> that inadequate design and construction led to insufficient cross bracing to withstand the gale force winds. The designer, </span><a data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.todayinsci.com/2/2_25.htm%23BouchThomas"><span data-dcnode-id="991" instrument_node="">Sir Thomas Bouch</span></a><span data-dcnode-id="989" instrument_node="">, died only ten months after the disaster. To date, it remains the worst structural engineering failure in the British Isles.«</span><span class="footnote" data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">[Image: collapsed span in water beside broken columns after the collapse of the Tay Bridge.]</span></span><div class="bookline" data-dcnode-id="980"><a class="amazonlink" data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/0752431609%3Fie%3DUTF%26tag%3Dtodayinsci-20%26link_code%3Das3" title="Amazon link"><span class="sprite icon-book" data-dcnode-id="986"></span><span data-dcnode-id="985" instrument_node=""> Beautiful Railway Bridge of the Silvery Tay</span></a><span data-dcnode-id="983" instrument_node="">: Reinvestigating the Tay Bridge Disaster, </span><small data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">by Peter R. Lewis. - book suggestion.</span></small></div></div></div><div class="daynameheading" data-dcnode-id="975"><a data-dcnode-id="977" name="ChewingGum"></a><span data-dcnode-id="976" instrument_node="">
&nbsp; Chewing gum patented</span></div><div data-dcnode-id="936"><div class="dayleftcell100" data-dcnode-id="966"><img alt="Thumbnail - Chewing gum patented" class="daythm" data-dcnode-id="974" height="123" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/Events/Foods/ChicleCollectingThm.jpg&amp;raw" title="Chewing gum patented " width="100"><br data-dcnode-id="973"><div class="footnote" data-dcnode-id="971" style="width:100px;"><span data-dcnode-id="972" instrument_node="">Collecting chicle sap</span></div><span class="noprint" data-dcnode-id="967"><span class="imagesource" data-dcnode-id="968"><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.csi.cc.id.us/support/museum/nakbe/nakbe.html" target="_blank"><span data-dcnode-id="970" instrument_node="">(source)</span></a></span></span></div><div data-dcnode-id="937" style="margin-left:100px;padding:3px;"><span class="sprite icon-calendar" data-dcnode-id="965"></span><span data-dcnode-id="964" instrument_node=""> &nbsp;
In 1869, William Finley Semple of Mount Vernon, Ohio, was issued the first U.S. patent for chewing gum (</span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.todayinsci.com/Events/Patent/ChewingGum98304.htm"><span data-dcnode-id="963" instrument_node="">No. 98,304</span></a><span data-dcnode-id="961" instrument_node="">), made of "the combination of rubber with other articles adapted to the formation of an acceptable chewing gum", but he never commercially produced gum. That was </span><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uh.edu/engines/epi963.htm"><span data-dcnode-id="960" instrument_node="">done</span></a><span data-dcnode-id="958" instrument_node=""> by Thomas Adams of Staten Island, N.Y., who knew that </span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mobot.org/MOBOT/education/tropics/page8.html"><span data-dcnode-id="957" instrument_node="">chicle</span></a><span data-dcnode-id="955" instrument_node=""> could be chewed. His first experiments to vulcanize chicle for use as a rubber substitute were unsuccessful until he boiled a small batch of </span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//newcrop.hort.purdue.edu/newcrop/morton/sapodilla.html"><span data-dcnode-id="954" instrument_node="">chicle</span></a><span data-dcnode-id="952" instrument_node=""> in his kitchen and created the first chicle-based chewing gum. Testing sales at a local store, he found people liked his </span><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//members.aol.com/RKaczur/history.htm"><span data-dcnode-id="951" instrument_node="">gum</span></a><span data-dcnode-id="949" instrument_node="">. In 1871, Adams patented a gum-producing machine so he could increase production.
&nbsp;</span><span class="footnote" data-dcnode-id="945"><a class="locallink" data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//todayinsci.com/Events/Patent/ChewingGum98304.htm"><span class="sprite icon-more" data-dcnode-id="948"></span><span data-dcnode-id="947" instrument_node=""> more</span></a></span><div class="bookline" data-dcnode-id="938"><a class="amazonlink" data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/0812860500%3Fie%3DUTF%26tag%3Dtodayinsci-20%26link_code%3Das3" title="Amazon link"><span class="sprite icon-book" data-dcnode-id="944"></span><span data-dcnode-id="943" instrument_node=""> Great American Chewing Gum Book</span></a><span data-dcnode-id="941" instrument_node="">, </span><small data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">by Robert Hendrickson. - book suggestion.</span></small></div></div></div><div class="daynameheading" data-dcnode-id="933"><a data-dcnode-id="935" name="{12-28-1849}"></a><span data-dcnode-id="934" instrument_node="">
&nbsp; Dry-cleaning</span></div><div data-dcnode-id="919"><div data-dcnode-id="920" style="margin-left:100px;padding:3px;"><span class="sprite icon-calendar" data-dcnode-id="932"></span><span data-dcnode-id="931" instrument_node=""> &nbsp;
In 1849, it is said that dry-cleaning was accidentally discovered when M. Jolly-Bellin, a tailor, upset a lamp containing </span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cinet-online.net/english/news/history.htm"><span data-dcnode-id="930" instrument_node="">turpentine</span></a><span data-dcnode-id="928" instrument_node=""> oil on his tablecloth and noticed it had a cleaning effect. He opened the very first dry cleaning shop called "Teinturerie Jolly Bellin" on rue Saint Martin in Paris in 1825. Another </span><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.perkem.se/hiseng.htm"><span data-dcnode-id="927" instrument_node="">story</span></a><span data-dcnode-id="925" instrument_node=""> says that by accident the owner of a textile dye works in 1848 found that the liquid from an oil lamp could dissolve fat. While different stories reportedly tell of its origin, one thing in common is that fabric was accidentally saturated with a volatile liquid and, by surprise, the material appeared clean after it dried. One such </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.optonline.com/comptons/ceo/01402_A.html"><span data-dcnode-id="924" instrument_node="">tale</span></a><span data-dcnode-id="922" instrument_node=""> tells about a French sailor who accidentally fell into a vat of turpentine and when his soiled uniform dried, it was clean.</span><div class="bookline" data-dcnode-id="921"></div></div></div><br data-dcnode-id="918" style="clear:both;"><span data-dcnode-id="917" instrument_node="">
</span><div data-dcnode-id="908" style="width: 100%"><span data-dcnode-id="916" instrument_node="">
</span><span data-dcnode-id="914" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-3240812772684136" data-ad-format="autorelaxed" data-ad-slot="5531451146" data-dcnode-id="913" style="display:block"></ins><span data-dcnode-id="912" instrument_node="">
</span><span data-dcnode-id="909" instrument_node="">
</span></div><span data-dcnode-id="907" instrument_node="">
</span></div></div></div><span data-dcnode-id="903" instrument_node="">
