</span></p><p data-dcnode-id="3674"><span data-dcnode-id="3730" instrument_node="">In the early 1950s Coandă began to claim that he had flown his 1910 aircraft himself, and that the 1910 engine was the first </span><a data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motorjet" title="Motorjet"><span data-dcnode-id="3729" instrument_node="">motorjet</span></a><span data-dcnode-id="3727" instrument_node="">, using fuel injection and combustion to create its thrust.</span><sup class="reference" data-dcnode-id="3724" id="cite_ref-Winter1980_23-16"><a data-dcnode-id="3725" href="#cite_note-Winter1980-23"><span data-dcnode-id="3726" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3723" instrument_node=""> In 1955 and 1956, a number of aviation articles presented the Coandă version of 1910 events. He said he took off and crashed in December 1910 in the presence of aircraft makers </span><a data-dcnode-id="3721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Charles_Breguet" title="Louis Charles Breguet"><span data-dcnode-id="3722" instrument_node="">Louis Charles Breguet</span></a><span data-dcnode-id="3720" instrument_node=""> and </span><a data-dcnode-id="3718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gabriel_Voisin" title="Gabriel Voisin"><span data-dcnode-id="3719" instrument_node="">Gabriel Voisin</span></a><span data-dcnode-id="3717" instrument_node="">.</span><sup class="reference" data-dcnode-id="3714" id="cite_ref-Antoniu75_58-0"><a data-dcnode-id="3715" href="#cite_note-Antoniu75-58"><span data-dcnode-id="3716" instrument_node="">[58]</span></a></sup><span data-dcnode-id="3713" instrument_node=""> Coandă himself spoke on the subject, notably before the </span><a data-dcnode-id="3711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wings_Club" title="Wings Club"><span data-dcnode-id="3712" instrument_node="">Wings Club</span></a><span data-dcnode-id="3710" instrument_node=""> at New York's Biltmore Hotel on 18 January 1956 where he said "I intended to inject fuel into the air stream which would be ignited by the exhaust gases also channelled through the same circular vent", implying that he never finished the powerplant.</span><sup class="reference" data-dcnode-id="3707" id="cite_ref-Winter1980_23-17"><a data-dcnode-id="3708" href="#cite_note-Winter1980-23"><span data-dcnode-id="3709" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="3704" id="cite_ref-Winter2010_37-1"><a data-dcnode-id="3705" href="#cite_note-Winter2010-37"><span data-dcnode-id="3706" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3703" instrument_node=""> </span><a data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Caidin" title="Martin Caidin"><span data-dcnode-id="3702" instrument_node="">Martin Caidin</span></a><span data-dcnode-id="3700" instrument_node=""> wrote "The Coanda Story" for the May 1956 issue of </span><i data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">Flying</span></i><span data-dcnode-id="3697" instrument_node="">, based on a personal interview.</span><sup class="reference" data-dcnode-id="3694" id="cite_ref-Flying_1956_26-1"><a data-dcnode-id="3695" href="#cite_note-Flying_1956-26"><span data-dcnode-id="3696" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3693" instrument_node=""> For his article "He Flew in 1910", René Aubrey interviewed Coandă and wrote a contradictory story in the September 1956 </span><i data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">Royal Air Force Flying Review</span></i><span data-dcnode-id="3690" instrument_node="">, saying that Coandă had flown his unusual aircraft on 16 December 1910, that fuel was certainly injected, and that it was "the first jet flight in the world".</span><sup class="reference" data-dcnode-id="3687" id="cite_ref-Winter1980_23-18"><a data-dcnode-id="3688" href="#cite_note-Winter1980-23"><span data-dcnode-id="3689" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3686" instrument_node=""> In Aubrey's relation of the interview, the aircraft </span><a class="mw-redirect" data-dcnode-id="3684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stall_%28flight%29" title="Stall (flight)"><span data-dcnode-id="3685" instrument_node="">stalled</span></a><span data-dcnode-id="3683" instrument_node=""> after take-off, throwing Coandă clear, and "gently collapsed to the ground" where it burned.</span><sup class="reference" data-dcnode-id="3680" id="cite_ref-Winter1980_23-19"><a data-dcnode-id="3681" href="#cite_note-Winter1980-23"><span data-dcnode-id="3682" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3679" instrument_node=""> Aubrey wrote that the aircraft engine was "designed by a friend to Coandă's specification", and that its burning exhaust was "directed below and to each side of the fuselage, which was protected by asbestos in vulnerable places."</span><sup class="reference" data-dcnode-id="3676" id="cite_ref-Winter1980_23-20"><a data-dcnode-id="3677" href="#cite_note-Winter1980-23"><span data-dcnode-id="3678" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3675" instrument_node="">
</span></p><p data-dcnode-id="3666"><span data-dcnode-id="3673" instrument_node="">In </span><i data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">Jet Age Airlanes</span></i><span data-dcnode-id="3670" instrument_node=""> of 1956, Coandă himself published an article entitled "The First Jet Flight". He submitted the same text that Caidin had written for </span><i data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">Flying</span></i><span data-dcnode-id="3667" instrument_node=""> in May:
</span></p><span data-dcnode-id="3665" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3654"><div class="thumbinner" data-dcnode-id="3655" style="width:172px;"><a class="image" data-dcnode-id="3663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIICCR_G240_Ceausescu_Coanda_crop.jpg"><img alt="" class="thumbimage" data-dcnode-id="3664" data-file-height="444" data-file-width="310" decoding="async" height="243" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6c/IICCR_G240_Ceausescu_Coanda_crop.jpg/170px-IICCR_G240_Ceausescu_Coanda_crop.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6c/IICCR_G240_Ceausescu_Coanda_crop.jpg/255px-IICCR_G240_Ceausescu_Coanda_crop.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/6/6c/IICCR_G240_Ceausescu_Coanda_crop.jpg 2x" width="170"></a><span data-dcnode-id="3662" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3656"><div class="magnify" data-dcnode-id="3660"><a class="internal" data-dcnode-id="3661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIICCR_G240_Ceausescu_Coanda_crop.jpg" title="Enlarge"></a></div><a data-dcnode-id="3658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henri_Coand%25C4%2583" title="Henri Coandă"><span data-dcnode-id="3659" instrument_node="">Henri Coandă</span></a><span data-dcnode-id="3657" instrument_node=""> in 1967</span></div></div></div><span data-dcnode-id="3653" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="3645"><p data-dcnode-id="3646"><span data-dcnode-id="3650" instrument_node="">"In December, we brought the airplane out of its hangar at Issy-les-Moulineaux and, after a bit of coaxing, started the motor. I must admit that I was never a very outstanding pilot. I always seemed unable to shake off a vague apprehension and, that morning, in addition to my usual uneasiness, I was rather excited. I climbed into the cockpit, accelerated the motor, and felt the power from the jet thrust straining the plane forward. I gave the signal to remove the wheel blocks, and the plane started moving slowly ahead. I had anticipated that I would not attempt to fly today, but would make only ground tests on the small field at Issy-les-Moulineaux. The controls seemed too loose to me, so I injected fuel into the turbine. Too much! In a moment I was surrounded by flames! I had to cut back and reduce my power quickly. I worked the throttle and the flames subsided. Only then did I have opportunity to lift my head. I saw that the plane had gained speed, and that the walls of the ancient fortifications bordering the field were lunging toward me. I pulled back on the stick, only much too hard. In a moment the plane was airborne, lunging upward at a steep angle. I was flying—I felt the plane tipping—then slipping down on one wing. Instinctively, I cut the gas with my left hand and the jet fuel with my right. The next thing I knew, I found myself thrown free of the plane, which slowly came down, and burst into flames. It was impossible to determine from the wreckage whether the celluloid or the fuel was the cause of the fire. But the test was over. I had flown the first jet airplane."</span><sup class="reference" data-dcnode-id="3647" id="cite_ref-Flying_1956_26-2"><a data-dcnode-id="3648" href="#cite_note-Flying_1956-26"><span data-dcnode-id="3649" instrument_node="">[26]</span></a></sup></p></blockquote><span data-dcnode-id="3644" instrument_node="">
</span><p data-dcnode-id="3613"><span data-dcnode-id="3643" instrument_node="">A collection of aviation stories was published in 1957 by Major Victor Houart, a friend of Coandă's, who wrote that he was an eyewitness the day Coandă flew and crashed.</span><sup class="reference" data-dcnode-id="3640" id="cite_ref-Rises_and_Falls_6-1"><a data-dcnode-id="3641" href="#cite_note-Rises_and_Falls-6"><span data-dcnode-id="3642" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3639" instrument_node=""> One chapter of the book describes how Houart, together with a group of French </span><a data-dcnode-id="3637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dragoon" title="Dragoon"><span data-dcnode-id="3638" instrument_node="">dragoons</span></a><span data-dcnode-id="3636" instrument_node="">, watched as Coandă taxied twice around the airfield, lifted off to avoid the ruins of an old fortification wall, started flames from the engine by applying too much power, and was thrown from the aircraft the moment it hit the wall, with Coandă "not badly hurt".</span><sup class="reference" data-dcnode-id="3633" id="cite_ref-59"><a data-dcnode-id="3634" href="#cite_note-59"><span data-dcnode-id="3635" instrument_node="">[59]</span></a></sup><span data-dcnode-id="3632" instrument_node=""> Houart's version put the fuel tank in the overhead wing, which was metal. In further statements, Coandă said that his 1910 aircraft had movable </span><a class="mw-redirect" data-dcnode-id="3630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leading_edge_slot" title="Leading edge slot"><span data-dcnode-id="3631" instrument_node="">leading edge slots</span></a><span data-dcnode-id="3629" instrument_node="">,</span><sup class="reference" data-dcnode-id="3626" id="cite_ref-60"><a data-dcnode-id="3627" href="#cite_note-60"><span data-dcnode-id="3628" instrument_node="">[nb 1]</span></a></sup><span data-dcnode-id="3625" instrument_node=""> retractable landing gear and a fuel supply which was held in the overhead wing to reduce fuselage profile and thus drag.</span><sup class="reference" data-dcnode-id="3622" id="cite_ref-Flying_1956_26-3"><a data-dcnode-id="3623" href="#cite_note-Flying_1956-26"><span data-dcnode-id="3624" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3621" instrument_node=""> In 1965, Coandă presented a set of drawings, photographs and specifications of the 1910 aircraft to the </span><a data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Air_and_Space_Museum" title="National Air and Space Museum"><span data-dcnode-id="3620" instrument_node="">National Air and Space Museum</span></a><span data-dcnode-id="3618" instrument_node=""> (NASM), prepared by Huyck Corporation and received by Director S. Paul Johnston and early aviation curator Louis Casey.</span><sup class="reference" data-dcnode-id="3615" id="cite_ref-61"><a data-dcnode-id="3616" href="#cite_note-61"><span data-dcnode-id="3617" instrument_node="">[60]</span></a></sup><span data-dcnode-id="3614" instrument_node="">
</span></p><p data-dcnode-id="3573"><span data-dcnode-id="3612" instrument_node="">Rocket engineer </span><a data-dcnode-id="3610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/G._Harry_Stine" title="G. Harry Stine"><span data-dcnode-id="3611" instrument_node="">G. Harry Stine</span></a><span data-dcnode-id="3609" instrument_node=""> worked alongside Coandă from 1961 to 1965 at Huyck Corporation, and interviewed him in 1962.</span><sup class="reference" data-dcnode-id="3606" id="cite_ref-Rises_and_Falls_6-2"><a data-dcnode-id="3607" href="#cite_note-Rises_and_Falls-6"><span data-dcnode-id="3608" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3605" instrument_node=""> In 1967, the magazine </span><a data-dcnode-id="3602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flying_%28magazine%29" title="Flying (magazine)"><i data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node="">Flying</span></i></a><span data-dcnode-id="3601" instrument_node=""> printed an account written by Stine, which described the landing gear as retracting into the lower wing, with the fuel tank hidden in the upper wing.</span><sup class="reference" data-dcnode-id="3598" id="cite_ref-Stine1967_62-0"><a data-dcnode-id="3599" href="#cite_note-Stine1967-62"><span data-dcnode-id="3600" instrument_node="">[61]</span></a></sup><span data-dcnode-id="3597" instrument_node=""> Stine wrote that Coandă flew on 10 December 1910, and described the heat from the "two jet exhausts" as being "too much for me" after the powerplant was mounted in the aircraft.</span><sup class="reference" data-dcnode-id="3594" id="cite_ref-Stine1967_62-1"><a data-dcnode-id="3595" href="#cite_note-Stine1967-62"><span data-dcnode-id="3596" instrument_node="">[61]</span></a></sup><span data-dcnode-id="3593" instrument_node=""> In the 1980s after Coandă's death, Stine wrote a magazine article and a book mentioning the 1910 aircraft, including new details such as the name of master mechanic </span><a class="new" data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPierre_Clerget%26action%3Dedit%26redlink%3D1" title="Pierre Clerget (page does not exist)"><span data-dcnode-id="3592" instrument_node="">Pierre Clerget</span></a><span data-dcnode-id="3590" instrument_node=""> as the friend who helped build the turbo-propulseur.</span><sup class="reference" data-dcnode-id="3587" id="cite_ref-Rises_and_Falls_6-3"><a data-dcnode-id="3588" href="#cite_note-Rises_and_Falls-6"><span data-dcnode-id="3589" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3586" instrument_node=""> Stine's recounting of the 10 December flight included the group of eyewitness French dragoons, asbestos heat shields and metal deflector plates aft of the engine, intended taxiing with unintentional flight, a steep climb with a stall, Coandă thrown clear, and the aircraft crashing to the ground, burning.</span><sup class="reference" data-dcnode-id="3583" id="cite_ref-Rises_and_Falls_6-4"><a data-dcnode-id="3584" href="#cite_note-Rises_and_Falls-6"><span data-dcnode-id="3585" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3582" instrument_node=""> Stine gave his assessment that "Coanda's turbopropulseur had elements of a true jet", but that the patent application had no indication of the "critical stage—injection of fuel into the compressed air".</span><sup class="reference" data-dcnode-id="3579" id="cite_ref-Rises_and_Falls_6-5"><a data-dcnode-id="3580" href="#cite_note-Rises_and_Falls-6"><span data-dcnode-id="3581" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3578" instrument_node=""> He wrote that "although there were several jet-propelled aircraft in existence at an early time—the 1910 Coanda Jet and the 1938 Caproni Campini N.1—the first pure jet aircraft flight was made in Germany in 1938".</span><sup class="reference" data-dcnode-id="3575" id="cite_ref-63"><a data-dcnode-id="3576" href="#cite_note-63"><span data-dcnode-id="3577" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3574" instrument_node="">
</span></p><p data-dcnode-id="3553"><span data-dcnode-id="3572" instrument_node="">In 1965, Historian Emeritus </span><a data-dcnode-id="3570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_E._Garber" title="Paul E. Garber"><span data-dcnode-id="3571" instrument_node="">Paul E. Garber</span></a><span data-dcnode-id="3569" instrument_node=""> of the NASM interviewed Coandă, who related that the December 1910 flight was no accident, that he had seated himself in the cockpit intending to test five factors: aircraft structure, the engine, the wing lift, the balance of controls, and the aerodynamics. He said that the heat from the engine was "fantastic", but that he placed </span><a data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mica" title="Mica"><span data-dcnode-id="3568" instrument_node="">mica</span></a><span data-dcnode-id="3566" instrument_node=""> sheets and deflecting plates to direct the jet blast away from the wooden fuselage.</span><sup class="reference" data-dcnode-id="3563" id="cite_ref-Winter1980_23-21"><a data-dcnode-id="3564" href="#cite_note-Winter1980-23"><span data-dcnode-id="3565" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3562" instrument_node=""> Garber wrote that as Coandă's aircraft began to move forward and rise from the ground, "the exhaust flame, instead of fanning outward, curved inward and ignited the aircraft."</span><sup class="reference" data-dcnode-id="3559" id="cite_ref-Winter1980_23-22"><a data-dcnode-id="3560" href="#cite_note-Winter1980-23"><span data-dcnode-id="3561" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3558" instrument_node=""> In this interview Coandă said that he brought the aircraft back to earth under control, but the landing was "abrupt" and he was thrown clear of the airframe which was consumed completely by flame, the engine reduced to "a few handfuls of white powder."</span><sup class="reference" data-dcnode-id="3555" id="cite_ref-Winter1980_23-23"><a data-dcnode-id="3556" href="#cite_note-Winter1980-23"><span data-dcnode-id="3557" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3554" instrument_node="">
</span></p><span data-dcnode-id="3552" instrument_node="">
</span><h3 data-dcnode-id="3549"><span class="mw-headline" data-dcnode-id="3550" id="Rebuttals"><span data-dcnode-id="3551" instrument_node="">Rebuttals</span></span></h3><span data-dcnode-id="3548" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3539"><div class="thumbinner" data-dcnode-id="3540" style="width:172px;"><a class="image" data-dcnode-id="3546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoanda_turbo-propulseur_1910.jpg"><img alt="" class="thumbimage" data-dcnode-id="3547" data-file-height="504" data-file-width="220" decoding="async" height="389" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/48/Coanda_turbo-propulseur_1910.jpg/170px-Coanda_turbo-propulseur_1910.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/4/48/Coanda_turbo-propulseur_1910.jpg 1.5x" width="170"></a><span data-dcnode-id="3545" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3541"><div class="magnify" data-dcnode-id="3543"><a class="internal" data-dcnode-id="3544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoanda_turbo-propulseur_1910.jpg" title="Enlarge"></a></div><span data-dcnode-id="3542" instrument_node="">Details of the rotary fan portion of the 1910 engine</span></div></div></div><span data-dcnode-id="3538" instrument_node="">
</span><p data-dcnode-id="3506"><span data-dcnode-id="3537" instrument_node="">In 1960, </span><a data-dcnode-id="3535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Harvard_Gibbs-Smith" title="Charles Harvard Gibbs-Smith"><span data-dcnode-id="3536" instrument_node="">Charles Harvard Gibbs-Smith</span></a><span data-dcnode-id="3534" instrument_node="">, aviation historian at the </span><a class="mw-redirect" data-dcnode-id="3532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Science_Museum_%28London%29" title="Science Museum (London)"><span data-dcnode-id="3533" instrument_node="">Science Museum</span></a><span data-dcnode-id="3531" instrument_node=""> in London, reacted to the mid-1950s assertion that Coandă built and flew the first jet engine aircraft.</span><sup class="reference" data-dcnode-id="3528" id="cite_ref-Gibbs-Smith_book_1960_1-1"><a data-dcnode-id="3529" href="#cite_note-Gibbs-Smith_book_1960-1"><span data-dcnode-id="3530" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3527" instrument_node=""> Gibbs-Smith wrote that "there has recently arisen some controversy about this machine, designed by the Rumanian-born and French-domiciled Henri Coanda, which was exhibited at the Paris salon in October 1910. Until recently it has been accepted as an all-wood sesquiplane, with cantilever wings, powered by a 50&nbsp;hp Clerget engine driving a 'turbo-propulseur' in the form of a large but simple ducted air fan. This fan was fitted right across the machine's nose and the cowling covered the nose and part of the engine: the resulting 'jet' of plain air was to propel the aeroplane."</span><sup class="reference" data-dcnode-id="3524" id="cite_ref-Gibbs-Smith_book_1960_1-2"><a data-dcnode-id="3525" href="#cite_note-Gibbs-Smith_book_1960-1"><span data-dcnode-id="3526" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3523" instrument_node=""> He wrote that "no claims that it flew, or was even tested, were made at the time", and that the story of it flying suddenly appeared in the 1950s</span><sup class="reference" data-dcnode-id="3520" id="cite_ref-Gibbs-Smith_book_1960_1-3"><a data-dcnode-id="3521" href="#cite_note-Gibbs-Smith_book_1960-1"><span data-dcnode-id="3522" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3519" instrument_node="">—the aircraft was thus "disinterred from its obscurity."</span><sup class="reference" data-dcnode-id="3516" id="cite_ref-Gibbs-Smith_correspondence_2-1"><a data-dcnode-id="3517" href="#cite_note-Gibbs-Smith_correspondence-2"><span data-dcnode-id="3518" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3515" instrument_node=""> He wrote that the airfield at Issy-les-Moulineaux, a former military exercise ground where the test supposedly took place, was under the constant observation of the French Army who owned it, by French aviation reporters and photographers, and by aviation experts from other countries. He said that the airfield was the "most famous, most used, most observed, and most reported-on 'airfield' in Paris", and that all events, let alone an exciting crash and destruction by fire, would have been carried in local papers and described in military reports, but no contemporary accounts exist of the Coandă-1910 being tested, flown or destroyed.</span><sup class="reference" data-dcnode-id="3512" id="cite_ref-Gibbs-Smith_book_1960_1-4"><a data-dcnode-id="3513" href="#cite_note-Gibbs-Smith_book_1960-1"><span data-dcnode-id="3514" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3511" instrument_node=""> Gibbs-Smith countered the Coandă assertions point by point, saying that the aircraft did not have a retractable undercarriage, did not have leading or trailing edge wing slots, did not have a fuel tank overhead in the wing, and did not have fuel injected into any turbine. Gibbs-Smith pointed out that the pilot would have been killed by the heat if any combustion had been initiated in the engine's air stream.</span><sup class="reference" data-dcnode-id="3508" id="cite_ref-Gibbs-Smith_book_1960_1-5"><a data-dcnode-id="3509" href="#cite_note-Gibbs-Smith_book_1960-1"><span data-dcnode-id="3510" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3507" instrument_node="">
</span></p><p data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">In 1970 Gibbs-Smith wrote another account of the Coanda-1910, using much the same phrasing as in 1960:
</span></p><span data-dcnode-id="3503" instrument_node="">
</span><link data-dcnode-id="3502" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3492"><p data-dcnode-id="3493"><span data-dcnode-id="3501" instrument_node="">"Another unsuccessful, but prophetic, machine was the Coanda biplane (strictly speaking a sesquiplane) exhibited at the Paris Salon in October. It was of all-wood construction, with fully cantilevered wings—which did not look very robust—and an </span><i data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">Antoinette</span></i><span data-dcnode-id="3498" instrument_node="">-like fuselage with obliquely cruciform tail-unit; it was equipped with a reaction propulsion unit consisting of a 50&nbsp;hp Clerget engine driving a large ducted fan in front of it, the latter enclosed in a cowling which covered the nose of the machine and part of the engine: the fan was a simple air-fan driving back the air to form the propulsive 'jet'. Although inevitably earth-bound, this aircraft stands as the first full-size attempt at a jet-propelled aeroplane."</span><sup class="reference" data-dcnode-id="3495" id="cite_ref-Gibbs-Smith_1970_64-0"><a data-dcnode-id="3496" href="#cite_note-Gibbs-Smith_1970-64"><span data-dcnode-id="3497" instrument_node="">[63]</span></a></sup><span data-dcnode-id="3494" instrument_node="">
</span></p></blockquote><span data-dcnode-id="3491" instrument_node="">
</span><p data-dcnode-id="3479"><span data-dcnode-id="3490" instrument_node="">In 2010, Antoniu wrote that he thought Gibbs-Smith speculated on the basis of the </span><a data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evidence_of_absence" title="Evidence of absence"><span data-dcnode-id="3489" instrument_node="">evidence of absence</span></a><span data-dcnode-id="3487" instrument_node=""> that the aircraft was never tested or flown, but that Gibbs-Smith did not find any concrete evidence to support his position. Similarly, Antoniu was unable to find concrete proof of a test flight. Antoniu also wrote that Gibbs-Smith did not check the French patents claimed by Coandă in 1910 and 1911, describing the retractable gear, leading edge wing slot and upper wing fuel tank, and that he did not see photographs from private collections demonstrating aspects about which he wrote.</span><sup class="reference" data-dcnode-id="3484" id="cite_ref-Antoniu88_42-1"><a data-dcnode-id="3485" href="#cite_note-Antoniu88-42"><span data-dcnode-id="3486" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="3481" id="cite_ref-Antoniu97_65-0"><a data-dcnode-id="3482" href="#cite_note-Antoniu97-65"><span data-dcnode-id="3483" instrument_node="">[64]</span></a></sup><span data-dcnode-id="3480" instrument_node="">
</span></p><span data-dcnode-id="3478" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3469"><div class="thumbinner" data-dcnode-id="3470" style="width:222px;"><a class="image" data-dcnode-id="3476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoanda_1911_patent.jpg"><img alt="" class="thumbimage" data-dcnode-id="3477" data-file-height="1106" data-file-width="719" decoding="async" height="338" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/89/Coanda_1911_patent.jpg/220px-Coanda_1911_patent.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/89/Coanda_1911_patent.jpg/330px-Coanda_1911_patent.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/89/Coanda_1911_patent.jpg/440px-Coanda_1911_patent.jpg 2x" width="220"></a><span data-dcnode-id="3475" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3471"><div class="magnify" data-dcnode-id="3473"><a class="internal" data-dcnode-id="3474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoanda_1911_patent.jpg" title="Enlarge"></a></div><span data-dcnode-id="3472" instrument_node="">Coandă's US patent diagram for "Improvement in Propellers", filed 1911 and granted 1914</span></div></div></div><p data-dcnode-id="3459"><span data-dcnode-id="3468" instrument_node="">
In 1980, NASM historian </span><a data-dcnode-id="3466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frank_H._Winter" title="Frank H. Winter"><span data-dcnode-id="3467" instrument_node="">Frank H. Winter</span></a><span data-dcnode-id="3465" instrument_node=""> examined the 1965 drawings and specifications Coandă prepared while at Huyck Corporation and wrote an article about Coandă's claim: "There is a wholly new description of the inner workings of the machine that does not occur in any of the accounts given [in the 1910s] and which defies all of the patent specifications."</span><sup class="reference" data-dcnode-id="3462" id="cite_ref-Winter1980_23-24"><a data-dcnode-id="3463" href="#cite_note-Winter1980-23"><span data-dcnode-id="3464" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3461" instrument_node=""> He said Coandă told various conflicting stories about his claimed 1910 flight, and that Coandă produced a set of altered drawings as proof of his claims: </span><link data-dcnode-id="3460" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"></p><blockquote class="templatequote" data-dcnode-id="3453"><p data-dcnode-id="3454"><span data-dcnode-id="3458" instrument_node="">"The differences between this version of Coanda's story and his earlier one are marked and hardly need to be pointed out; though the obvious ones are: the planned versus the completely accidental and unintentional flight; the immediate flight versus the busy taxiing about the field; Coanda being thrown from the plane after it stalled versus Coanda pitched forward after landing, and so on. Apart from his personal recollections, Henri Coanda also bestowed upon the museum some drawings and illustrations of his turbo-propulseur. The drawings, purporting to show internal details of the machine, are unfortunately modern. That is to say, they were obviously executed in the 1960s, not in 1910 or 1911; worse, the fuel injection outlet tubes into the aft end of the turbine seems to be an even later addition to the original drawings. In brief, the drawings by themselves do not constitute evidence in Coanda's claim."</span><sup class="reference" data-dcnode-id="3455" id="cite_ref-Winter1980_23-25"><a data-dcnode-id="3456" href="#cite_note-Winter1980-23"><span data-dcnode-id="3457" instrument_node="">[23]</span></a></sup></p></blockquote><span data-dcnode-id="3452" instrument_node="">
</span><p data-dcnode-id="3443"><span data-dcnode-id="3451" instrument_node="">In his article, Winter wondered why Coandă did not add the novel feature of fuel injection and air stream combustion to his May 1911 patent applications if that feature had been present during his supposed flying experience five months earlier. Rather, Winter noted that the August 1910 patent filings in French were essentially the same as the May 1911 ones in English, and that all the descriptions were applicable to air </span><i data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">or water</span></i><span data-dcnode-id="3448" instrument_node=""> flowing through the device, meaning that the patents could not possibly include fuel combustion in the jet stream. He also noted that no mention was made in the early patents of asbestos or mica heat shields, or of any fuel injection or combustion.</span><sup class="reference" data-dcnode-id="3445" id="cite_ref-Winter1980_23-26"><a data-dcnode-id="3446" href="#cite_note-Winter1980-23"><span data-dcnode-id="3447" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3444" instrument_node="">
</span></p><p data-dcnode-id="3426"><span data-dcnode-id="3442" instrument_node="">While looking through aviation periodicals and Paris newspapers reporting for the month of December 1910, Winter found that there was a spell of bad weather at Issy during which no flying took place. This situation occurred mid-month, the period covering the conflicting dates (10 and 16 December) that Coandă said his aircraft was tested, flown and crashed.</span><sup class="reference" data-dcnode-id="3439" id="cite_ref-Winter1980_23-27"><a data-dcnode-id="3440" href="#cite_note-Winter1980-23"><span data-dcnode-id="3441" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3438" instrument_node=""> In their regular "Foreign Aviation News" column, </span><i data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">Flight</span></i><span data-dcnode-id="3435" instrument_node=""> magazine reported that the "blank period" of inclement weather at Issy ended on the 19th when Guillaume Busson tested a monoplane made by Armand Deperdussin.</span><sup class="reference" data-dcnode-id="3432" id="cite_ref-Flight,_31_December_1910_66-0"><a data-dcnode-id="3433" href="#cite_note-Flight,_31_December_1910-66"><span data-dcnode-id="3434" instrument_node="">[65]</span></a></sup><span data-dcnode-id="3431" instrument_node=""> Other aircraft tests and piloting activities were listed, with no mention of Coandă or his machine.</span><sup class="reference" data-dcnode-id="3428" id="cite_ref-Flight,_31_December_1910_66-1"><a data-dcnode-id="3429" href="#cite_note-Flight,_31_December_1910-66"><span data-dcnode-id="3430" instrument_node="">[65]</span></a></sup><span data-dcnode-id="3427" instrument_node="">
</span></p><p data-dcnode-id="3416"><span data-dcnode-id="3425" instrument_node="">Winter found that Camille (or Cosimo) Canovetti, an Italian civil and aviation engineer, had been working on a turbo-propulseur-style aviation engine before Coandă, and had attempted to show an aircraft with such an engine at the Aviation Exposition in Milan in 1909. Canovetti took out patents on his machine in 1909, and more in 1910.</span><sup class="reference" data-dcnode-id="3422" id="cite_ref-Winter1980_23-28"><a data-dcnode-id="3423" href="#cite_note-Winter1980-23"><span data-dcnode-id="3424" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3421" instrument_node=""> Canovetti wrote in 1911 that the 1910 appearance of the Coandă engine "called general attention" to designs like his.</span><sup class="reference" data-dcnode-id="3418" id="cite_ref-Winter1980_23-29"><a data-dcnode-id="3419" href="#cite_note-Winter1980-23"><span data-dcnode-id="3420" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3417" instrument_node="">
</span></p><span data-dcnode-id="3415" instrument_node="">
</span><h2 data-dcnode-id="3411"><span data-dcnode-id="3414" id="After_Coand.C4.83.27s_death"></span><span class="mw-headline" data-dcnode-id="3412" id="After_Coandă's_death"><span data-dcnode-id="3413" instrument_node="">After Coandă's death</span></span></h2><span data-dcnode-id="3410" instrument_node="">
</span><p data-dcnode-id="3388"><span data-dcnode-id="3409" instrument_node="">Modern reference books about aviation history represent the Coandă-1910 in various ways, if they mention the machine or the inventor at all. Some acknowledge Coandă as the discoverer of the </span><a data-dcnode-id="3407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coand%25C4%2583_effect" title="Coandă effect"><span data-dcnode-id="3408" instrument_node="">Coandă effect</span></a><span data-dcnode-id="3406" instrument_node=""> but give </span><a data-dcnode-id="3404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hans_von_Ohain" title="Hans von Ohain"><span data-dcnode-id="3405" instrument_node="">Hans von Ohain</span></a><span data-dcnode-id="3403" instrument_node=""> the honour of designing the first jet engine to power an aircraft in manned flight, and </span><a data-dcnode-id="3401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frank_Whittle" title="Frank Whittle"><span data-dcnode-id="3402" instrument_node="">Frank Whittle</span></a><span data-dcnode-id="3400" instrument_node=""> the honour of completing and patenting the first jet engine capable of such flight.</span><sup class="reference" data-dcnode-id="3397" id="cite_ref-67"><a data-dcnode-id="3398" href="#cite_note-67"><span data-dcnode-id="3399" instrument_node="">[66]</span></a></sup><span data-dcnode-id="3396" instrument_node=""> In their 1994 book </span><i data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">American Aviation</span></i><span data-dcnode-id="3393" instrument_node="">, authors Joe Christy and LeRoy Cook state that Coandă's 1910 aircraft was the first jet.</span><sup class="reference" data-dcnode-id="3390" id="cite_ref-68"><a data-dcnode-id="3391" href="#cite_note-68"><span data-dcnode-id="3392" instrument_node="">[67]</span></a></sup><span data-dcnode-id="3389" instrument_node="">
</span></p><p data-dcnode-id="3370"><span data-dcnode-id="3387" instrument_node="">Aviation author </span><a data-dcnode-id="3385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bill_Gunston" title="Bill Gunston"><span data-dcnode-id="3386" instrument_node="">Bill Gunston</span></a><span data-dcnode-id="3384" instrument_node=""> changed his mind two years after publishing a 1993 book in which he gave Coandă credit for the first jet engine. Gunston's 1995 description began: "Romanian Henri Coanda built a biplane with a Clerget inline piston engine which, instead of turning a propeller, drove a centrifugal compressor blowing air to the rear. The thrust was said to be 220&nbsp;kilograms [490&nbsp;lb], a figure the author disbelieves. On 10 December 1910 the aircraft thus powered inadvertently became airborne, crashed and burned. Often called 'a turbine aeroplane', this was of no more significance than the Campini aircraft mentioned later, and Coanda wisely decided to switch to a propeller."</span><sup class="reference" data-dcnode-id="3381" id="cite_ref-Gunston1995_69-0"><a data-dcnode-id="3382" href="#cite_note-Gunston1995-69"><span data-dcnode-id="3383" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3380" instrument_node=""> In his publication of 1998, </span><i data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">World Encyclopedia of Aero Engines: All major aircraft power plants, from the Wright brothers to the present day</span></i><span data-dcnode-id="3377" instrument_node="">, Gunston did not include Coanda; nor did he include Coanda in 2005's </span><i data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">Jane's Aero-Engines</span></i><span data-dcnode-id="3374" instrument_node=""> or 2006's </span><i data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">World Encyclopedia of Aero Engines</span></i><span data-dcnode-id="3371" instrument_node="">.
</span></p><p data-dcnode-id="3349"><a data-dcnode-id="3368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walter_J._Boyne" title="Walter J. Boyne"><span data-dcnode-id="3369" instrument_node="">Walter J. Boyne</span></a><span data-dcnode-id="3367" instrument_node="">, director of the </span><a data-dcnode-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Air_and_Space_Museum" title="National Air and Space Museum"><span data-dcnode-id="3366" instrument_node="">National Air and Space Museum</span></a><span data-dcnode-id="3364" instrument_node=""> and a prolific aviation author, mentions Coandă in passing a few times in his works. Boyne discusses Coandă briefly in one of his books, </span><i data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">The Leading Edge</span></i><span data-dcnode-id="3361" instrument_node="">: "Professor Henri Coanda, whose scientific work was impeccable, designed and built a jet aircraft in 1910; it, like Martin's Kitten [the </span><a data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_KF-1" title="Martin KF-1"><span data-dcnode-id="3360" instrument_node="">Martin KF-1</span></a><span data-dcnode-id="3358" instrument_node=""> biplane], was superbly built and technically advanced—and could not fly."</span><sup class="reference" data-dcnode-id="3355" id="cite_ref-Boyne1994_70-0"><a data-dcnode-id="3356" href="#cite_note-Boyne1994-70"><span data-dcnode-id="3357" instrument_node="">[69]</span></a></sup><span data-dcnode-id="3354" instrument_node=""> In a later magazine article sidebar, Boyne described more details: "Romanian inventor Henri Coanda attempted to fly a primitive jet aircraft in 1910, using a four-cylinder internal combustion engine to drive a compressor at 4,000 revolutions per minute. It was equipped with what today might be called an afterburner, producing an estimated 500&nbsp;pounds [2.3&nbsp;kN or 230&nbsp;kgf] of thrust. Countless loyal Coanda fans insist that the airplane flew. Others say it merely crashed."</span><sup class="reference" data-dcnode-id="3351" id="cite_ref-71"><a data-dcnode-id="3352" href="#cite_note-71"><span data-dcnode-id="3353" instrument_node="">[70]</span></a></sup><span data-dcnode-id="3350" instrument_node="">
</span></p><p data-dcnode-id="3333"><span data-dcnode-id="3348" instrument_node="">In 1980 and 1993, </span><i data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">Jane's Encyclopedia of Aviation</span></i><span data-dcnode-id="3345" instrument_node=""> included an entry on the 1910 aircraft, calling it the "Coanda turbine" and describing it as "the world's first jet-propelled aircraft to fly".</span><sup class="reference" data-dcnode-id="3342" id="cite_ref-Jane's_Encyclopedia_of_Aviation_72-0"><a data-dcnode-id="3343" href="#cite_note-Jane's_Encyclopedia_of_Aviation-72"><span data-dcnode-id="3344" instrument_node="">[71]</span></a></sup><span data-dcnode-id="3341" instrument_node=""> In 2003, Winter co-authored a book with fellow NASM curator F. Robert van der Linden: </span><i data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">100 Years of Flight: A Chronicle of Aerospace History, 1903–2003</span></i><span data-dcnode-id="3338" instrument_node="">. In the book the Coandă-1910 is described as an unsuccessful ducted fan aircraft lacking documentation to substantiate any flight test.</span><sup class="reference" data-dcnode-id="3335" id="cite_ref-73"><a data-dcnode-id="3336" href="#cite_note-73"><span data-dcnode-id="3337" instrument_node="">[72]</span></a></sup><span data-dcnode-id="3334" instrument_node="">
</span></p><p data-dcnode-id="3302"><span data-dcnode-id="3332" instrument_node="">Citing Carl A. Brown's 1985 </span><i data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">A History of Aviation</span></i><span data-dcnode-id="3329" instrument_node="">, Tim Brady, the Dean of Aviation at </span><a data-dcnode-id="3327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Embry%25E2%2580%2593Riddle_Aeronautical_University" title="Embry–Riddle Aeronautical University"><span data-dcnode-id="3328" instrument_node="">Embry–Riddle Aeronautical University</span></a><span data-dcnode-id="3326" instrument_node="">, wrote in 2000: "the development of the jet is, broadly, the story of three men: Henri Coanda, Sir Frank Whittle, and Pabst von Ohain..."</span><sup class="reference" data-dcnode-id="3323" id="cite_ref-Brady2000_74-0"><a data-dcnode-id="3324" href="#cite_note-Brady2000-74"><span data-dcnode-id="3325" instrument_node="">[73]</span></a></sup><span data-dcnode-id="3322" instrument_node=""> His description of Coandă's disputed test flight agreed that fuel injection and combustion had been initiated in the rotary compressor's vent, with the novel detail that the aircraft "flew for about a thousand feet [300&nbsp;m] before crashing into a wall."</span><sup class="reference" data-dcnode-id="3319" id="cite_ref-Brady2000_74-1"><a data-dcnode-id="3320" href="#cite_note-Brady2000-74"><span data-dcnode-id="3321" instrument_node="">[73]</span></a></sup><span data-dcnode-id="3318" instrument_node=""> In 1990 at the 24th Symposium of the International Academy of Astronautics, one of the papers presented included this sentence: "It is to Henri Coanda (1886–1972), a world famous inventor and pioneer of jet flight, that space engineering owes—beside one of the first model planes provided with a rocket engine (1905)—the construction and engine experiment of the first jet aircraft, the 'Coanda-1910'."</span><sup class="reference" data-dcnode-id="3315" id="cite_ref-75"><a data-dcnode-id="3316" href="#cite_note-75"><span data-dcnode-id="3317" instrument_node="">[74]</span></a></sup><span data-dcnode-id="3314" instrument_node=""> In 2007 in his popular book </span><i data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">Extreme Aircraft</span></i><span data-dcnode-id="3311" instrument_node="">, Ron Miller wrote that the powerplant in the Coandă-1910 was one of the "earliest attempts" at a jet engine, but was unsuccessful—it was "incapable of actual flight", unlike the engines designed by Whittle and Ohain.</span><sup class="reference" data-dcnode-id="3308" id="cite_ref-76"><a data-dcnode-id="3309" href="#cite_note-76"><span data-dcnode-id="3310" instrument_node="">[75]</span></a></sup><span data-dcnode-id="3307" instrument_node=""> The question of the Coandă-1910 being the first jet aircraft does not appear to be resolved, supporting Stine's view: "Whether Henri Coanda built the first true jet will probably be argued interminably."</span><sup class="reference" data-dcnode-id="3304" id="cite_ref-Rises_and_Falls_6-6"><a data-dcnode-id="3305" href="#cite_note-Rises_and_Falls-6"><span data-dcnode-id="3306" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3303" instrument_node="">
</span></p><p data-dcnode-id="3293"><span data-dcnode-id="3301" instrument_node="">In the 2000s, Dan Antoniu and other Romanian aviation experts investigated existing photographs of the Coandă-1910, leading them to believe that the aircraft presented at the exhibition was not finished, that it was exhibited with many improvisations. Antoniu published </span><i data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">Henri Coandă and his technical work during 1906–1918</span></i><span data-dcnode-id="3298" instrument_node="">, a 2010 book in which he said that the unfinished state of the aircraft led to Coandă filing several extra patents and starting a new series of studies with the aim of making the machine airworthy. For instance, Antoniu wrote that the exhaust pipes of the Clergét engine appeared free; there were no devices to redirect exhaust gases to the turbine as described in the patent, and there were no heat shields for crew protection. As well, the central attachment of the tubular struts holding the wings to the fuselage, with mere collars secured with screws, was judged by Antoniu as appearing potentially unsafe during take-off or landing because of the "considerable loads on the struts". The X-shaped empennage was covered at high angles by the horizontal stabiliser making it unusable, and any high-speed taxi would put the machine in danger of a nose-over.</span><sup class="reference" data-dcnode-id="3295" id="cite_ref-Antoniu66_77-0"><a data-dcnode-id="3296" href="#cite_note-Antoniu66-77"><span data-dcnode-id="3297" instrument_node="">[76]</span></a></sup><span data-dcnode-id="3294" instrument_node="">
</span></p><span data-dcnode-id="3292" instrument_node="">
</span><div data-dcnode-id="3291" style="clear:both;"></div><span data-dcnode-id="3290" instrument_node="">
</span><h2 data-dcnode-id="3287"><span class="mw-headline" data-dcnode-id="3288" id="Memorials_and_models"><span data-dcnode-id="3289" instrument_node="">Memorials and models</span></span></h2><span data-dcnode-id="3286" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3274"><div class="thumbinner" data-dcnode-id="3275" style="width:172px;"><a class="image" data-dcnode-id="3284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoand%25C4%2583_replica.jpg"><img alt="" class="thumbimage" data-dcnode-id="3285" data-file-height="3072" data-file-width="2304" decoding="async" height="227" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Coand%25C4%2583_replica.jpg/170px-Coand%25C4%2583_replica.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Coand%C4%83_replica.jpg/255px-Coand%C4%83_replica.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Coand%C4%83_replica.jpg/340px-Coand%C4%83_replica.jpg 2x" width="170"></a><span data-dcnode-id="3283" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3276"><div class="magnify" data-dcnode-id="3281"><a class="internal" data-dcnode-id="3282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoand%25C4%2583_replica.jpg" title="Enlarge"></a></div><span data-dcnode-id="3280" instrument_node="">Full-scale replica of the Coandă-1910 at the </span><a class="mw-redirect" data-dcnode-id="3278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Military_Museum_%28Romania%29" title="National Military Museum (Romania)"><span data-dcnode-id="3279" instrument_node="">National Military Museum</span></a><span data-dcnode-id="3277" instrument_node=""> in Bucharest</span></div></div></div><span data-dcnode-id="3273" instrument_node="">
</span><p data-dcnode-id="3231"><span data-dcnode-id="3272" instrument_node="">A full-size replica of the Coandă-1910, built in 2001, is displayed in Bucharest at the </span><a class="mw-redirect" data-dcnode-id="3270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Military_Museum_%28Romania%29" title="National Military Museum (Romania)"><span data-dcnode-id="3271" instrument_node="">National Military Museum</span></a><span data-dcnode-id="3269" instrument_node="">,</span><sup class="reference" data-dcnode-id="3266" id="cite_ref-78"><a data-dcnode-id="3267" href="#cite_note-78"><span data-dcnode-id="3268" instrument_node="">[77]</span></a></sup><span data-dcnode-id="3265" instrument_node=""> and a scale model is displayed in the </span><a class="mw-redirect" data-dcnode-id="3263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Air_and_Space_Museum" title="French Air and Space Museum"><span data-dcnode-id="3264" instrument_node="">French Air and Space Museum</span></a><span data-dcnode-id="3262" instrument_node=""> at </span><a class="mw-redirect" data-dcnode-id="3260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_%25E2%2580%2593_Le_Bourget_Airport" title="Paris – Le Bourget Airport"><span data-dcnode-id="3261" instrument_node="">Paris – Le Bourget Airport</span></a><span data-dcnode-id="3259" instrument_node="">.</span><sup class="reference" data-dcnode-id="3256" id="cite_ref-79"><a data-dcnode-id="3257" href="#cite_note-79"><span data-dcnode-id="3258" instrument_node="">[78]</span></a></sup><span data-dcnode-id="3255" instrument_node=""> At the site of the historic Issy-les-Moulineaux airfield, a large plaque lists the three pioneers of flight most closely associated with the airfield: </span><a data-dcnode-id="3253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Bl%25C3%25A9riot" title="Louis Blériot"><span data-dcnode-id="3254" instrument_node="">Louis Blériot</span></a><span data-dcnode-id="3252" instrument_node="">, </span><a data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alberto_Santos-Dumont" title="Alberto Santos-Dumont"><span data-dcnode-id="3251" instrument_node="">Alberto Santos-Dumont</span></a><span data-dcnode-id="3249" instrument_node=""> and </span><a data-dcnode-id="3247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henri_Farman" title="Henri Farman"><span data-dcnode-id="3248" instrument_node="">Henri Farman</span></a><span data-dcnode-id="3246" instrument_node="">.</span><sup class="reference" data-dcnode-id="3243" id="cite_ref-80"><a data-dcnode-id="3244" href="#cite_note-80"><span data-dcnode-id="3245" instrument_node="">[79]</span></a></sup><span data-dcnode-id="3242" instrument_node=""> Later, a plaque honouring Coandă and Romanian aviation engineer </span><a data-dcnode-id="3240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Traian_Vuia" title="Traian Vuia"><span data-dcnode-id="3241" instrument_node="">Traian Vuia</span></a><span data-dcnode-id="3239" instrument_node=""> was placed on a nearby building under the auspices of the mayor of Issy-les-Moulineaux, </span><i data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">L'Aéroclub de France</span></i><span data-dcnode-id="3236" instrument_node="">, and the Romanian Association for Aviation History.</span><sup class="reference" data-dcnode-id="3233" id="cite_ref-81"><a data-dcnode-id="3234" href="#cite_note-81"><span data-dcnode-id="3235" instrument_node="">[80]</span></a></sup><span data-dcnode-id="3232" instrument_node="">
</span></p><p data-dcnode-id="3209"><span data-dcnode-id="3230" instrument_node="">Construction on a full-sized functional replica of the plane began in March 2010 at </span><a data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Craiova" title="Craiova"><span data-dcnode-id="3229" instrument_node="">Craiova</span></a><span data-dcnode-id="3227" instrument_node="">, Romania, by a team of engineers and former test pilots from </span><a data-dcnode-id="3225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avioane_Craiova" title="Avioane Craiova"><span data-dcnode-id="3226" instrument_node="">I.R.Av. Craiova</span></a><span data-dcnode-id="3224" instrument_node="">.</span><sup class="reference" data-dcnode-id="3221" id="cite_ref-Reconstruction_82-0"><a data-dcnode-id="3222" href="#cite_note-Reconstruction-82"><span data-dcnode-id="3223" instrument_node="">[81]</span></a></sup><span data-dcnode-id="3220" instrument_node=""> The replica is based on plans that Coandă reworked in 1965 because the 1910 plans were lost. It uses metal for the fuselage rather than wood, and its intended engine is a true jet, the </span><a data-dcnode-id="3218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motorlet_M-701" title="Motorlet M-701"><span data-dcnode-id="3219" instrument_node="">Motorlet M-701</span></a><span data-dcnode-id="3217" instrument_node="">, made for the 1960s-era </span><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aero_L-29_Delf%25C3%25ADn" title="Aero L-29 Delfín"><span data-dcnode-id="3216" instrument_node="">Aero L-29 Delfín</span></a><span data-dcnode-id="3214" instrument_node=""> military trainer.</span><sup class="reference" data-dcnode-id="3211" id="cite_ref-83"><a data-dcnode-id="3212" href="#cite_note-83"><span data-dcnode-id="3213" instrument_node="">[82]</span></a></sup><span data-dcnode-id="3210" instrument_node="">
</span></p><p data-dcnode-id="3168"><span data-dcnode-id="3208" instrument_node="">In October 2010 the </span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Bank_of_Romania" title="National Bank of Romania"><span data-dcnode-id="3207" instrument_node="">National Bank of Romania</span></a><span data-dcnode-id="3205" instrument_node=""> issued a </span><a data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commemorative_coin" title="Commemorative coin"><span data-dcnode-id="3204" instrument_node="">commemorative silver coin</span></a><span data-dcnode-id="3202" instrument_node=""> for the centennial of the building of the first jet aircraft. The 10-</span><a data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanian_leu" title="Romanian leu"><span data-dcnode-id="3201" instrument_node="">lei</span></a><span data-dcnode-id="3199" instrument_node=""> piece is intended for coin collectors, with the official purchase price set at 220&nbsp;lei. It represents the aircraft on the obverse side and a portrait of Coandă on the reverse, including Romanian words which translate to "first jet aircraft".</span><sup class="reference" data-dcnode-id="3196" id="cite_ref-84"><a data-dcnode-id="3197" href="#cite_note-84"><span data-dcnode-id="3198" instrument_node="">[83]</span></a></sup><span data-dcnode-id="3195" instrument_node=""> The same month the philatelic section of the </span><a class="mw-redirect" data-dcnode-id="3193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Po%25C5%259Fta_Rom%25C3%25A2n%25C4%2583" title="Poşta Română"><span data-dcnode-id="3194" instrument_node="">Romanian Post</span></a><span data-dcnode-id="3192" instrument_node="">, </span><i data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">Romfilatelia</span></i><span data-dcnode-id="3189" instrument_node="">, produced a limited edition philatelic folder and a stamp commemorating the centennial of jet aircraft. The stamp presents a modern internal schema of the Coandă-1910, a drawing of the injectors and burners, and a quote from </span><a data-dcnode-id="3187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Eiffel" title="Gustave Eiffel"><span data-dcnode-id="3188" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="3186" instrument_node="">: "This boy was born 30 if not 50 years too early".</span><sup class="reference" data-dcnode-id="3183" id="cite_ref-85"><a data-dcnode-id="3184" href="#cite_note-85"><span data-dcnode-id="3185" instrument_node="">[84]</span></a></sup><span data-dcnode-id="3182" instrument_node=""> At the </span><a data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Parliament" title="European Parliament"><span data-dcnode-id="3181" instrument_node="">European Parliament</span></a><span data-dcnode-id="3179" instrument_node=""> in December, president </span><a data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jerzy_Buzek" title="Jerzy Buzek"><span data-dcnode-id="3178" instrument_node="">Jerzy Buzek</span></a><span data-dcnode-id="3176" instrument_node=""> opened a centennial exhibition celebrating the building and testing of the Coandă-1910.</span><sup class="reference" data-dcnode-id="3173" id="cite_ref-European_Parliament_86-0"><a data-dcnode-id="3174" href="#cite_note-European_Parliament-86"><span data-dcnode-id="3175" instrument_node="">[85]</span></a></sup><sup class="reference" data-dcnode-id="3170" id="cite_ref-87"><a data-dcnode-id="3171" href="#cite_note-87"><span data-dcnode-id="3172" instrument_node="">[86]</span></a></sup><span data-dcnode-id="3169" instrument_node="">
</span></p><span data-dcnode-id="3167" instrument_node="">

 data-dcnode-id="2417" instrument_node="">"Impressions of the Paris Air Show"</span></a><span data-dcnode-id="2415" instrument_node="">. </span><i data-dcnode-id="2412"><a class="mw-redirect" data-dcnode-id="2413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flight_%28magazine%29" title="Flight (magazine)"><span data-dcnode-id="2414" instrument_node="">Flight</span></a></i><span data-dcnode-id="2411" instrument_node="">: 881–883. </span><q data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">The Coanda, a large monoplane constructed entirely of wood, has in place of the customary propeller a turbine, or remarkably small proportions in relation to the size of the machine. A much greater tractive power is claimed, with at the same time less vibration.</span></q></cite><span class="Z3988" data-dcnode-id="2407" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=article&amp;rft.jtitle=Flight&amp;rft.atitle=Impressions+of+the+Paris+Air+Show&amp;rft.pages=881-883&amp;rft.date=1910-10-29&amp;rft.au=Oiseau&amp;rft_id=http%3A%2F%2Fwww.flightglobal.com%2Fpdfarchive%2Fview%2F1910%2F1910%2520-%25200883.html&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ACoand%C4%83-1910"></span></span><span data-dcnode-id="2405" instrument_node="">

</span><li data-dcnode-id="1899" id="cite_note-Antoniu74-32"><span class="mw-cite-backlink" data-dcnode-id="1909"><b data-dcnode-id="1910"><a aria-label="Jump up" data-dcnode-id="1911" href="#cite_ref-Antoniu74_32-0" title="Jump up"><span data-dcnode-id="1912" instrument_node="">^</span></a></b></span><span data-dcnode-id="1908" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1901"><span data-dcnode-id="1907" instrument_node="">Antoniu (2010), p. 74. "The article </span><i data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Coandă's New Aeroplane</span></i><span data-dcnode-id="1904" instrument_node=""> published by a daily Bucharest newspaper in 1910, provides us with some important information: </span><i data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">The aeroplane that received much praise in Parisian newspapers was built in the workshops of Clergét Company in Paris, a company well known for the construction of aeroplane engines. Mr. Coandă's new aeroplane will fly in 6–7 weeks near Paris, piloted by Weymann, one of the pilots celebrated at the Rennes aviation meeting. This aeroplane had advantages over others by the fact that it featured more stability and more speed than the existing planes."</span></i></span><span data-dcnode-id="1900" instrument_node="">

lass="Z3988" data-dcnode-id="1848" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=unknown&amp;rft.jtitle=Dossiers+historiques+et+techniques+a%C3%A9ronautique+fran%C3%A7aise&amp;rft.atitle=Cl%C3%A9ment-Bayard%2C+sans+peur+et+sans+reproche&amp;rft.pages=22&amp;rft.date=2007-03-16&amp;rft.aulast=Hartmann&amp;rft.aufirst=G%C3%A9rard&amp;rft_id=http%3A%2F%2Fwww.hydroretro.net%2Fetudegh%2Fclement-bayard.pdf&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ACoand%C4%83-1910"></span></span><span data-dcnode-id="1846" instrument_node="">
</span></li><span data-dcnode-id="1844" instrument_node="">
</span><li data-dcnode-id="1835" id="cite_note-Antoniu55-35"><span class="mw-cite-backlink" data-dcnode-id="1840"><b data-dcnode-id="1841"><a aria-label="Jump up" data-dcnode-id="1842" href="#cite_ref-Antoniu55_35-0" title="Jump up"><span data-dcnode-id="1843" instrument_node="">^</span></a></b></span><span data-dcnode-id="1839" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Antoniu (2010), pp. 55–59. "The complexity of the director, as it appears in the 1st patented version had major implications for the construction costs due to the multitude of elements that made it very difficult to build. Coandă simplified it and it was built from 15 independent elements made from cast aluminium that when assembled formed a more efficient director.&nbsp;... The new version of the propeller that the Coandă 1910 machine was equipped with, was partially included in the next patent application which included the new director system but with a different rotor."</span></span><span data-dcnode-id="1836" instrument_node="">
