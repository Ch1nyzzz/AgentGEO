</span><p data-dcnode-id="4599"><span data-dcnode-id="4624" instrument_node="">The </span><b data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">Coandă-1910</span></b><span data-dcnode-id="4621" instrument_node="">, designed by Romanian inventor </span><a data-dcnode-id="4619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henri_Coand%25C4%2583" title="Henri Coandă"><span data-dcnode-id="4620" instrument_node="">Henri Coandă</span></a><span data-dcnode-id="4618" instrument_node="">, was an unconventional </span><a class="mw-redirect" data-dcnode-id="4616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sesquiplane" title="Sesquiplane"><span data-dcnode-id="4617" instrument_node="">sesquiplane</span></a><span data-dcnode-id="4615" instrument_node=""> aircraft powered by a </span><a data-dcnode-id="4613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ducted_fan" title="Ducted fan"><span data-dcnode-id="4614" instrument_node="">ducted fan</span></a><span data-dcnode-id="4612" instrument_node="">. Called the "turbo-propulseur" by Coandă, its experimental engine consisted of a conventional </span><a class="mw-redirect" data-dcnode-id="4610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Piston_engine" title="Piston engine"><span data-dcnode-id="4611" instrument_node="">piston engine</span></a><span data-dcnode-id="4609" instrument_node=""> driving a multi-bladed </span><a class="mw-redirect" data-dcnode-id="4607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Centrifugal_blower" title="Centrifugal blower"><span data-dcnode-id="4608" instrument_node="">centrifugal blower</span></a><span data-dcnode-id="4606" instrument_node=""> which exhausted into a duct. The unusual aircraft attracted attention at the </span><a data-dcnode-id="4604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Air_Show" title="Paris Air Show"><span data-dcnode-id="4605" instrument_node="">Second International Aeronautical Exhibition</span></a><span data-dcnode-id="4603" instrument_node=""> in Paris in October 1910, being the only exhibit without a </span><a class="mw-redirect" data-dcnode-id="4601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Propeller_%28aircraft%29" title="Propeller (aircraft)"><span data-dcnode-id="4602" instrument_node="">propeller</span></a><span data-dcnode-id="4600" instrument_node="">, but the aircraft was not displayed afterwards and it fell from public awareness. Coandă used a similar turbo-propulseur to drive a snow sledge, but he did not develop it further for aircraft.
</span></p><p data-dcnode-id="4578"><span data-dcnode-id="4598" instrument_node="">Decades later, after the practical demonstration of </span><a data-dcnode-id="4596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motorjet" title="Motorjet"><span data-dcnode-id="4597" instrument_node="">motorjets</span></a><span data-dcnode-id="4595" instrument_node=""> and </span><a data-dcnode-id="4593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turbojet" title="Turbojet"><span data-dcnode-id="4594" instrument_node="">turbojets</span></a><span data-dcnode-id="4592" instrument_node="">, Coandă began to tell various conflicting stories about how his early experiments were precursors to the jet, even that his turbo-propulseur was the first motorjet engine with fuel </span><a data-dcnode-id="4590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Combustion" title="Combustion"><span data-dcnode-id="4591" instrument_node="">combustion</span></a><span data-dcnode-id="4589" instrument_node=""> in the airstream. He also claimed to have made a single brief flight in December 1910, crashing just after takeoff, the aircraft being destroyed by fire. Two aviation historians countered Coandă's version of events, saying there was no proof that the engine had combustion in the airstream, and no proof that the aircraft ever flew. In 1965, Coandă brought drawings forward to prove his claim of combustion ducting but these were shown to be reworked, differing substantially from the originals. Many aviation historians were dismissive, saying that Coandă's turbo-propulseur design involved a weak stream of "plain air", not a powerful jet of air expanding from fuel combustion.</span><sup class="reference" data-dcnode-id="4586" id="cite_ref-Gibbs-Smith_book_1960_1-0"><a data-dcnode-id="4587" href="#cite_note-Gibbs-Smith_book_1960-1"><span data-dcnode-id="4588" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="4583" id="cite_ref-Gibbs-Smith_correspondence_2-0"><a data-dcnode-id="4584" href="#cite_note-Gibbs-Smith_correspondence-2"><span data-dcnode-id="4585" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="4580" id="cite_ref-3"><a data-dcnode-id="4581" href="#cite_note-3"><span data-dcnode-id="4582" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4579" instrument_node="">
</span></p><p data-dcnode-id="4573"><span data-dcnode-id="4577" instrument_node="">In 2010, based on the notion that Coandă invented the first jet, the centennial of the jet aircraft was celebrated in Romania. A special coin and stamp were issued, and construction began on a working replica of the aircraft. At the </span><a data-dcnode-id="4575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Parliament" title="European Parliament"><span data-dcnode-id="4576" instrument_node="">European Parliament</span></a><span data-dcnode-id="4574" instrument_node="">, an exhibition commemorated the building and testing of the Coandă-1910.
</span></p><span data-dcnode-id="4572" instrument_node="">

</span><h2 data-dcnode-id="4453"><span class="mw-headline" data-dcnode-id="4454" id="Early_developments"><span data-dcnode-id="4455" instrument_node="">Early developments</span></span></h2><span data-dcnode-id="4452" instrument_node="">
</span><p data-dcnode-id="4369"><span data-dcnode-id="4451" instrument_node="">Coandă was interested in achieving reactive propelled flight as early as 1905, conducting tests of rockets attached to model aircraft at the </span><a data-dcnode-id="4449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanian_Land_Forces" title="Romanian Land Forces"><span data-dcnode-id="4450" instrument_node="">Romanian Army</span></a><span data-dcnode-id="4448" instrument_node=""> arsenal in </span><a data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bucharest" title="Bucharest"><span data-dcnode-id="4447" instrument_node="">Bucharest</span></a><span data-dcnode-id="4445" instrument_node="">.</span><sup class="reference" data-dcnode-id="4442" id="cite_ref-Cer_Senin,_Romanian_Air_Force_magazine,_2010_4-0"><a data-dcnode-id="4443" href="#cite_note-Cer_Senin,_Romanian_Air_Force_magazine,_2010-4"><span data-dcnode-id="4444" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4441" instrument_node=""> In secret, at </span><a data-dcnode-id="4439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spandau" title="Spandau"><span data-dcnode-id="4440" instrument_node="">Spandau</span></a><span data-dcnode-id="4438" instrument_node=""> in Germany, Coandă successfully tested a flying machine equipped with a single </span><a data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tractor_configuration" title="Tractor configuration"><span data-dcnode-id="4437" instrument_node="">tractor propeller</span></a><span data-dcnode-id="4435" instrument_node="">, and two </span><a data-dcnode-id="4433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Counter-rotating_propellers" title="Counter-rotating propellers"><span data-dcnode-id="4434" instrument_node="">counter-rotating propellers</span></a><span data-dcnode-id="4432" instrument_node=""> providing lift, powered by a 50-</span><a data-dcnode-id="4430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Horsepower" title="Horsepower"><span data-dcnode-id="4431" instrument_node="">horsepower</span></a><span data-dcnode-id="4429" instrument_node=""> (37&nbsp;</span><a data-dcnode-id="4427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Watt%23Kilowatt" title="Watt"><span data-dcnode-id="4428" instrument_node="">kW</span></a><span data-dcnode-id="4426" instrument_node="">) </span><a data-dcnode-id="4424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antoinette_%28manufacturer%29" title="Antoinette (manufacturer)"><span data-dcnode-id="4425" instrument_node="">Antoinette</span></a><span data-dcnode-id="4423" instrument_node=""> engine. Positioned along the fuselage centreline, the smaller rear lift propeller was mounted vertically, while the larger front one was inclined slightly forwards at 17&nbsp;</span><a data-dcnode-id="4421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Degree_%28angle%29" title="Degree (angle)"><span data-dcnode-id="4422" instrument_node="">degrees</span></a><span data-dcnode-id="4420" instrument_node="">.</span><sup class="reference" data-dcnode-id="4417" id="cite_ref-L'AérophileMarch1908_5-0"><a data-dcnode-id="4418" href="#cite_note-L'A%C3%A9rophileMarch1908-5"><span data-dcnode-id="4419" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4416" instrument_node=""> According to later claims, Coandă tested the aircraft at </span><a data-dcnode-id="4414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kassel" title="Kassel"><span data-dcnode-id="4415" instrument_node="">Cassel</span></a><span data-dcnode-id="4413" instrument_node="">, witnessed by the </span><a data-dcnode-id="4411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chancellor_of_Germany%23Chancellor_of_the_German_Empire_%281871%25E2%2580%25931918%29" title="Chancellor of Germany"><span data-dcnode-id="4412" instrument_node="">Chancellor</span></a><span data-dcnode-id="4410" instrument_node=""> of the German Empire </span><a data-dcnode-id="4408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bernhard_von_B%25C3%25BClow" title="Bernhard von Bülow"><span data-dcnode-id="4409" instrument_node="">Bernhard von Bülow</span></a><span data-dcnode-id="4407" instrument_node="">. It was around this time that Coandă's interest in jet propulsion began, claiming that the aircraft and a jet-propelled model were displayed in December 1907 at the </span><i data-dcnode-id="4405"><span data-dcnode-id="4406" instrument_node="">Sporthalle</span></i><span data-dcnode-id="4404" instrument_node=""> indoor sports arena in Berlin.</span><sup class="reference" data-dcnode-id="4401" id="cite_ref-Rises_and_Falls_6-0"><a data-dcnode-id="4402" href="#cite_note-Rises_and_Falls-6"><span data-dcnode-id="4403" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4400" instrument_node="">
Coandă continued his studies at </span><a data-dcnode-id="4398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Li%25C3%25A8ge" title="Liège"><span data-dcnode-id="4399" instrument_node="">Liège</span></a><span data-dcnode-id="4397" instrument_node="">, Belgium, where with his roommate and friend </span><a data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giovanni_Battista_Caproni" title="Giovanni Battista Caproni"><span data-dcnode-id="4396" instrument_node="">Giovanni Battista Caproni</span></a><span data-dcnode-id="4394" instrument_node=""> he built the Coandă-Caproni box glider, based on the plans of gliders designed by </span><a data-dcnode-id="4392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Otto_Lilienthal" title="Otto Lilienthal"><span data-dcnode-id="4393" instrument_node="">Otto Lilienthal</span></a><span data-dcnode-id="4391" instrument_node=""> and </span><a data-dcnode-id="4389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Octave_Chanute" title="Octave Chanute"><span data-dcnode-id="4390" instrument_node="">Octave Chanute</span></a><span data-dcnode-id="4388" instrument_node=""> which he previously studied at </span><a data-dcnode-id="4386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charlottenburg" title="Charlottenburg"><span data-dcnode-id="4387" instrument_node="">Charlottenburg</span></a><span data-dcnode-id="4385" instrument_node=""> and Spandau.</span><sup class="reference" data-dcnode-id="4382" id="cite_ref-CoandaMonograph2010_7-0"><a data-dcnode-id="4383" href="#cite_note-CoandaMonograph2010-7"><span data-dcnode-id="4384" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4381" instrument_node=""> In 1909 he was employed as technical director of the Liège-Spa Aeroclub, and at the end of that year, with the help of car manufacturer Joachim he built the Coandă-Joachim glider.</span><sup class="reference" data-dcnode-id="4378" id="cite_ref-L'Express_8-0"><a data-dcnode-id="4379" href="#cite_note-L'Express-8"><span data-dcnode-id="4380" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4377" instrument_node=""> Caproni was present when the glider was flown at </span><a data-dcnode-id="4375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spa%2C_Belgium" title="Spa, Belgium"><span data-dcnode-id="4376" instrument_node="">Spa-Malchamps</span></a><span data-dcnode-id="4374" instrument_node="">, Belgium.</span><sup class="reference" data-dcnode-id="4371" id="cite_ref-Samedi-Soire_9-0"><a data-dcnode-id="4372" href="#cite_note-Samedi-Soire-9"><span data-dcnode-id="4373" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4370" instrument_node="">
</span></p><span data-dcnode-id="4368" instrument_node="">
</span><h2 data-dcnode-id="4365"><span class="mw-headline" data-dcnode-id="4366" id="1910s"><span data-dcnode-id="4367" instrument_node="">1910s</span></span></h2><span data-dcnode-id="4364" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4352"><div class="thumbinner" data-dcnode-id="4353" style="width:172px;"><a class="image" data-dcnode-id="4362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoanda-1910_brochure.jpg"><img alt="" class="thumbimage" data-dcnode-id="4363" data-file-height="2555" data-file-width="1760" decoding="async" height="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/16/Coanda-1910_brochure.jpg/170px-Coanda-1910_brochure.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/16/Coanda-1910_brochure.jpg/255px-Coanda-1910_brochure.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/16/Coanda-1910_brochure.jpg/340px-Coanda-1910_brochure.jpg 2x" width="170"></a><span data-dcnode-id="4361" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4354"><div class="magnify" data-dcnode-id="4359"><a class="internal" data-dcnode-id="4360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoanda-1910_brochure.jpg" title="Enlarge"></a></div><span data-dcnode-id="4358" instrument_node="">"The Only Aeroplanes Without Propellers". This promotional brochure was available at the Paris salon in 1910.</span><sup class="reference" data-dcnode-id="4355" id="cite_ref-1910_Coanda_brochure_10-0"><a data-dcnode-id="4356" href="#cite_note-1910_Coanda_brochure-10"><span data-dcnode-id="4357" instrument_node="">[10]</span></a></sup></div></div></div><span data-dcnode-id="4351" instrument_node="">
</span><p data-dcnode-id="4322"><span data-dcnode-id="4350" instrument_node="">With the opening of the </span><a class="mw-redirect" data-dcnode-id="4347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589cole_nationale_sup%25C3%25A9rieure_de_l%27a%25C3%25A9ronautique_et_de_l%27espace" title="École nationale supérieure de l'aéronautique et de l'espace"><i data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">École supérieure d'aéronautique et de constructions mécaniques</span></i></a><span data-dcnode-id="4346" instrument_node=""> on 15 November 1909, Coandă moved to Paris. As a continuation of his Belgian experiments, and especially looking for a way to test wing </span><a class="mw-redirect" data-dcnode-id="4344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aerofoil" title="Aerofoil"><span data-dcnode-id="4345" instrument_node="">aerofoils</span></a><span data-dcnode-id="4343" instrument_node=""> at higher speeds, he contacted </span><a data-dcnode-id="4341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ernest_Archdeacon" title="Ernest Archdeacon"><span data-dcnode-id="4342" instrument_node="">Ernest Archdeacon</span></a><span data-dcnode-id="4340" instrument_node="">, the co-founder of </span><a data-dcnode-id="4337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A%25C3%25A9ro-Club_de_France" title="Aéro-Club de France"><i data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">L'Aero-Club de France</span></i></a><span data-dcnode-id="4336" instrument_node="">, who in turn directed Coandă to </span><a class="mw-redirect" data-dcnode-id="4334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustav_Eiffel" title="Gustav Eiffel"><span data-dcnode-id="4335" instrument_node="">Gustav Eiffel</span></a><span data-dcnode-id="4333" instrument_node=""> and </span><a data-dcnode-id="4331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Painlev%25C3%25A9" title="Paul Painlevé"><span data-dcnode-id="4332" instrument_node="">Paul Painlevé</span></a><span data-dcnode-id="4330" instrument_node="">. With their assistance, he gained approval to test different wing configurations and air resistance on a platform built by Eiffel at the front of a locomotive on the North of France railway. In March, he started flying lessons at Reims in a </span><a class="mw-redirect" data-dcnode-id="4328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hanriot_%28aircraft_company%29" title="Hanriot (aircraft company)"><span data-dcnode-id="4329" instrument_node="">Hanriot</span></a><span data-dcnode-id="4327" instrument_node=""> monoplane.</span><sup class="reference" data-dcnode-id="4324" id="cite_ref-L'Aérophile15Apr1910_11-0"><a data-dcnode-id="4325" href="#cite_note-L'A%C3%A9rophile15Apr1910-11"><span data-dcnode-id="4326" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4323" instrument_node="">
</span></p><p data-dcnode-id="4282"><span data-dcnode-id="4321" instrument_node="">Helped by his schoolfriend Cammarotta-AdornoIn, Coandă started to build his slender sesquiplane and the unusual </span><a data-dcnode-id="4319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aircraft_engine" title="Aircraft engine"><span data-dcnode-id="4320" instrument_node="">powerplant</span></a><span data-dcnode-id="4318" instrument_node=""> in a workshop in the courtyard of his house</span><sup class="reference" data-dcnode-id="4315" id="cite_ref-Cer_Senin,_Romanian_Air_Force_magazine,_2010_4-1"><a data-dcnode-id="4316" href="#cite_note-Cer_Senin,_Romanian_Air_Force_magazine,_2010-4"><span data-dcnode-id="4317" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="4312" id="cite_ref-12"><a data-dcnode-id="4313" href="#cite_note-12"><span data-dcnode-id="4314" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4311" instrument_node=""> where he tested the thrust of the powerplant on a </span><a data-dcnode-id="4309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dynamometer" title="Dynamometer"><span data-dcnode-id="4310" instrument_node="">dynamometer</span></a><span data-dcnode-id="4308" instrument_node="">, tests which are described in detail in the April 1910 edition of </span><i data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">La Technique Aéronautique</span></i><span data-dcnode-id="4305" instrument_node="">.</span><sup class="reference" data-dcnode-id="4302" id="cite_ref-Antoniu53_13-0"><a data-dcnode-id="4303" href="#cite_note-Antoniu53-13"><span data-dcnode-id="4304" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="4299" id="cite_ref-La_Technique_Aéronautique,_April_2010_14-0"><a data-dcnode-id="4300" href="#cite_note-La_Technique_A%C3%A9ronautique,_April_2010-14"><span data-dcnode-id="4301" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4298" instrument_node=""> He filed for several patents for the mechanism</span><sup class="reference" data-dcnode-id="4295" id="cite_ref-FR416541A_15-0"><a data-dcnode-id="4296" href="#cite_note-FR416541A-15"><span data-dcnode-id="4297" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4294" instrument_node=""> and aircraft</span><sup class="reference" data-dcnode-id="4291" id="cite_ref-GB191112908_16-0"><a data-dcnode-id="4292" href="#cite_note-GB191112908-16"><span data-dcnode-id="4293" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4290" instrument_node=""> on 30 May 1910, with later additions to the existing patents.</span><sup class="reference" data-dcnode-id="4287" id="cite_ref-FR418401A_17-0"><a data-dcnode-id="4288" href="#cite_note-FR418401A-17"><span data-dcnode-id="4289" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="4284" id="cite_ref-FR13502E_18-0"><a data-dcnode-id="4285" href="#cite_note-FR13502E-18"><span data-dcnode-id="4286" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4283" instrument_node="">
</span></p><p data-dcnode-id="4260"><span data-dcnode-id="4281" instrument_node="">Coandă exhibited the aircraft at the </span><a data-dcnode-id="4279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Air_Show%23History" title="Paris Air Show"><span data-dcnode-id="4280" instrument_node="">Second International Aeronautical Exhibition</span></a><span data-dcnode-id="4278" instrument_node=""> (commonly referred to as the Paris salon, or Paris flight salon) held from 15 October to 2 November 1910. Together with </span><a data-dcnode-id="4276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henri_Fabre" title="Henri Fabre"><span data-dcnode-id="4277" instrument_node="">Henri Fabre</span></a><span data-dcnode-id="4275" instrument_node="">'s </span><a data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fabre_Hydravion" title="Fabre Hydravion"><i data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">Hydravion</span></i></a><span data-dcnode-id="4271" instrument_node="">, the first </span><a data-dcnode-id="4269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Floatplane" title="Floatplane"><span data-dcnode-id="4270" instrument_node="">floatplane</span></a><span data-dcnode-id="4268" instrument_node="">, Coandă's aircraft and devices used for aerodynamic experiments were placed "in solitary state" in an upstairs gallery, separated from the more usual types of aircraft on the main exhibition floor.</span><sup class="reference" data-dcnode-id="4265" id="cite_ref-FlightGlobal_1910_p881-883_19-0"><a data-dcnode-id="4266" href="#cite_note-FlightGlobal_1910_p881-883-19"><span data-dcnode-id="4267" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="4262" id="cite_ref-L'Aérophile15Nov1910_20-0"><a data-dcnode-id="4263" href="#cite_note-L'A%C3%A9rophile15Nov1910-20"><span data-dcnode-id="4264" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4261" instrument_node="">
</span></p><p data-dcnode-id="4196"><span data-dcnode-id="4259" instrument_node="">The aircraft's construction was a novelty for the time. In contrast to the monoplane described in the July 1910 patent application,</span><sup class="reference" data-dcnode-id="4256" id="cite_ref-FR418401A_17-1"><a data-dcnode-id="4257" href="#cite_note-FR418401A-17"><span data-dcnode-id="4258" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4255" instrument_node=""> the exhibit was a sesquiplane which complicated the construction, but in return solved lateral stability control issues. The </span><a class="mw-redirect" data-dcnode-id="4253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cantilevered_wing" title="Cantilevered wing"><span data-dcnode-id="4254" instrument_node="">cantilevered wings</span></a><span data-dcnode-id="4252" instrument_node=""> were held in place at three points by tubular steel struts without any bracing from </span><a class="mw-redirect" data-dcnode-id="4250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flying_wires" title="Flying wires"><span data-dcnode-id="4251" instrument_node="">flying wires</span></a><span data-dcnode-id="4249" instrument_node="">. According to Coandă's description the wings were built with metal </span><a class="mw-redirect" data-dcnode-id="4247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spar_%28aviation%29" title="Spar (aviation)"><span data-dcnode-id="4248" instrument_node="">spars</span></a><span data-dcnode-id="4246" instrument_node="">, but existing photographs of the construction show a completely wooden internal structure. The trailing edges of the upper wing could be twisted separately or together for lateral control or braking during landing, and were controlled by pedals in the two-seat open cockpit.</span><sup class="reference" data-dcnode-id="4243" id="cite_ref-CoandaMonograph2010_7-1"><a data-dcnode-id="4244" href="#cite_note-CoandaMonograph2010-7"><span data-dcnode-id="4245" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4242" instrument_node=""> The fuselage, painted reddish-brown and highly polished, was described by </span><i data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">The Technical World</span></i><span data-dcnode-id="4239" instrument_node=""> magazine as having a framework of steel,</span><sup class="reference" data-dcnode-id="4236" id="cite_ref-TheTechnicalWorld_21-0"><a data-dcnode-id="4237" href="#cite_note-TheTechnicalWorld-21"><span data-dcnode-id="4238" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4235" instrument_node=""> though the construction photographs indicate that it had a wooden framework.</span><sup class="reference" data-dcnode-id="4232" id="cite_ref-CoandaMonograph2010_7-2"><a data-dcnode-id="4233" href="#cite_note-CoandaMonograph2010-7"><span data-dcnode-id="4234" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4231" instrument_node=""> This was triangular in cross-section with convex ribs edged with strips of steel, and strengthened with a covering of heat-shaped moulded plywood. Tubular radiators for engine cooling were located on either side of the cockpit. The vertical struts from the wings were secured to the fuselage with steel collars fixed with screws.</span><sup class="reference" data-dcnode-id="4228" id="cite_ref-CoandaMonograph2010_7-3"><a data-dcnode-id="4229" href="#cite_note-CoandaMonograph2010-7"><span data-dcnode-id="4230" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4227" instrument_node=""> The fuselage terminated in a cruciform </span><a data-dcnode-id="4225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empennage" title="Empennage"><span data-dcnode-id="4226" instrument_node="">empennage</span></a><span data-dcnode-id="4224" instrument_node=""> with control surfaces at 45° angles to vertical and horizontal.</span><sup class="reference" data-dcnode-id="4221" id="cite_ref-1910_Coanda_brochure_10-1"><a data-dcnode-id="4222" href="#cite_note-1910_Coanda_brochure-10"><span data-dcnode-id="4223" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4220" instrument_node=""> Four triangular surfaces at the rear of the tail were controlled using a pair of large </span><a data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antoinette_VII" title="Antoinette VII"><span data-dcnode-id="4219" instrument_node="">Antoinette VII</span></a><span data-dcnode-id="4217" instrument_node="">-style steering wheels mounted outside of the cockpit, one on each side, and were used for </span><a data-dcnode-id="4215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flight_dynamics" title="Flight dynamics"><span data-dcnode-id="4216" instrument_node="">pitch</span></a><span data-dcnode-id="4214" instrument_node=""> and directional control. It was an early instance of what are now known as </span><a data-dcnode-id="4212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/V-tail" title="V-tail"><span data-dcnode-id="4213" instrument_node="">ruddervators</span></a><span data-dcnode-id="4211" instrument_node="">.</span><sup class="reference" data-dcnode-id="4208" id="cite_ref-L'Aéronautique_22-0"><a data-dcnode-id="4209" href="#cite_note-L'A%C3%A9ronautique-22"><span data-dcnode-id="4210" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4207" instrument_node=""> Forward of the tail was a small horizontal </span><a class="mw-redirect" data-dcnode-id="4205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stabilizer_%28aircraft%29" title="Stabilizer (aircraft)"><span data-dcnode-id="4206" instrument_node="">stabiliser</span></a><span data-dcnode-id="4204" instrument_node="">. The fuel tank was located in the fuselage between the engine and the cockpit.</span><sup class="reference" data-dcnode-id="4201" id="cite_ref-1910_Coanda_brochure_10-2"><a data-dcnode-id="4202" href="#cite_note-1910_Coanda_brochure-10"><span data-dcnode-id="4203" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="4198" id="cite_ref-Winter1980_23-0"><a data-dcnode-id="4199" href="#cite_note-Winter1980-23"><span data-dcnode-id="4200" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4197" instrument_node="">
</span></p><p data-dcnode-id="4167"><span data-dcnode-id="4195" instrument_node="">The most remarkable feature of the aircraft was its engine. Instead of a </span><a class="mw-redirect" data-dcnode-id="4193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Propeller_%28aircraft%29" title="Propeller (aircraft)"><span data-dcnode-id="4194" instrument_node="">propeller</span></a><span data-dcnode-id="4192" instrument_node="">, a 50&nbsp;hp (37&nbsp;kW) inline water-cooled internal combustion engine built by </span><a class="new" data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPierre_Clerget%26action%3Dedit%26redlink%3D1" title="Pierre Clerget (page does not exist)"><span data-dcnode-id="4191" instrument_node="">Pierre Clerget</span></a><span data-dcnode-id="4189" instrument_node=""> at the </span><a data-dcnode-id="4187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cl%25C3%25A9ment-Bayard" title="Clément-Bayard"><span data-dcnode-id="4188" instrument_node="">Clément-Bayard</span></a><span data-dcnode-id="4186" instrument_node=""> workshop with funding from </span><i data-dcnode-id="4184"><span data-dcnode-id="4185" instrument_node="">L'Aero-Club de France</span></i><span data-dcnode-id="4183" instrument_node="">,</span><sup class="reference" data-dcnode-id="4180" id="cite_ref-Pierre_Clerget_24-0"><a data-dcnode-id="4181" href="#cite_note-Pierre_Clerget-24"><span data-dcnode-id="4182" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4179" instrument_node=""> placed in the forward section of the fuselage drove a rotary compressor through a 1:4 gearbox (1,000&nbsp;rpm on the Clerget turned the compressor at 4,000&nbsp;rpm), which drew air in from the front and expelled it rearward under compression and with added heat.</span><sup class="reference" data-dcnode-id="4176" id="cite_ref-Antoniu53b_25-0"><a data-dcnode-id="4177" href="#cite_note-Antoniu53b-25"><span data-dcnode-id="4178" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4175" instrument_node=""> The compressor, with a diameter of 50&nbsp;centimetres (20&nbsp;in), was located within a cowling at the front of the fuselage. According to later Coandă descriptions, cast aluminium components were also made by Clerget to create an engine with a weight of 1.8 kilograms per kilowatt (2.9&nbsp;lb/hp) – equivalent to a </span><a data-dcnode-id="4173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Power-to-weight_ratio" title="Power-to-weight ratio"><span data-dcnode-id="4174" instrument_node="">power-to-weight ratio</span></a><span data-dcnode-id="4172" instrument_node=""> of 0.59 kilowatts per kilogram (0.36&nbsp;hp/lb), a considerable achievement at the time.</span><sup class="reference" data-dcnode-id="4169" id="cite_ref-Flying_1956_26-0"><a data-dcnode-id="4170" href="#cite_note-Flying_1956-26"><span data-dcnode-id="4171" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4168" instrument_node="">
</span></p><p data-dcnode-id="4138"><span data-dcnode-id="4166" instrument_node="">Coandă's 1910s-era patents describe the inline piston engine's exhaust gases as being routed through heating channels or heat exchangers in contact with the central air flow, then sucked into the compressor inlet to reduce back-pressure on the engine while adding more heat and mass to the airflow.</span><sup class="reference" data-dcnode-id="4163" id="cite_ref-Winter1980_23-1"><a data-dcnode-id="4164" href="#cite_note-Winter1980-23"><span data-dcnode-id="4165" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4162" instrument_node=""> The turbo-propulseur was claimed to be capable of generating 2.20 kilonewtons (220&nbsp;kgf; 490&nbsp;lbf) of thrust.</span><sup class="reference" data-dcnode-id="4159" id="cite_ref-1910_Coanda_brochure_10-3"><a data-dcnode-id="4160" href="#cite_note-1910_Coanda_brochure-10"><span data-dcnode-id="4161" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4158" instrument_node=""> The powerplant was referred to in reports at the time by different terms: a turbine without propellers,</span><sup class="reference" data-dcnode-id="4155" id="cite_ref-FlightGlobal_1910_p881-883_19-1"><a data-dcnode-id="4156" href="#cite_note-FlightGlobal_1910_p881-883-19"><span data-dcnode-id="4157" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="4152" id="cite_ref-TheTechnicalWorld_21-1"><a data-dcnode-id="4153" href="#cite_note-TheTechnicalWorld-21"><span data-dcnode-id="4154" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4151" instrument_node=""> turbo-propulseur,</span><sup class="reference" data-dcnode-id="4148" id="cite_ref-Laerophile_27-0"><a data-dcnode-id="4149" href="#cite_note-Laerophile-27"><span data-dcnode-id="4150" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4147" instrument_node=""> ducted fan</span><sup class="reference" data-dcnode-id="4144" id="cite_ref-Flug-_und_Motor-Technik1910_28-0"><a data-dcnode-id="4145" href="#cite_note-Flug-_und_Motor-Technik1910-28"><span data-dcnode-id="4146" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4143" instrument_node=""> or a suction turbine.</span><sup class="reference" data-dcnode-id="4140" id="cite_ref-PopMech1911_29-0"><a data-dcnode-id="4141" href="#cite_note-PopMech1911-29"><span data-dcnode-id="4142" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4139" instrument_node="">
</span></p><span data-dcnode-id="4137" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4122"><div class="thumbinner" data-dcnode-id="4123" style="width:222px;"><a class="image" data-dcnode-id="4135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoanda_aircraft_at_1910_Paris_salon.jpg"><img alt="" class="thumbimage" data-dcnode-id="4136" data-file-height="318" data-file-width="589" decoding="async" height="119" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Coanda_aircraft_at_1910_Paris_salon.jpg/220px-Coanda_aircraft_at_1910_Paris_salon.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Coanda_aircraft_at_1910_Paris_salon.jpg/330px-Coanda_aircraft_at_1910_Paris_salon.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Coanda_aircraft_at_1910_Paris_salon.jpg/440px-Coanda_aircraft_at_1910_Paris_salon.jpg 2x" width="220"></a><span data-dcnode-id="4134" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4124"><div class="magnify" data-dcnode-id="4132"><a class="internal" data-dcnode-id="4133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoanda_aircraft_at_1910_Paris_salon.jpg" title="Enlarge"></a></div><span data-dcnode-id="4131" instrument_node="">An overhead view, showing the </span><a class="mw-redirect" data-dcnode-id="4129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clerget" title="Clerget"><span data-dcnode-id="4130" instrument_node="">Clerget</span></a><span data-dcnode-id="4128" instrument_node=""> engine's four upright cylinders aft of the rotary compressor. Upper and lower wings are mounted on steel tubes extending from the fuselage. A man stands in the fuselage near two </span><a data-dcnode-id="4126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antoinette_VII" title="Antoinette VII"><span data-dcnode-id="4127" instrument_node="">Antoinette VII</span></a><span data-dcnode-id="4125" instrument_node="">-style trim and steering wheels.</span></div></div></div><span data-dcnode-id="4121" instrument_node="">
</span><p data-dcnode-id="4088"><span data-dcnode-id="4120" instrument_node="">Aviation reporters from </span><i data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">The Aero</span></i><span data-dcnode-id="4117" instrument_node=""> and </span><i data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">La Technique Aeronautique</span></i><span data-dcnode-id="4114" instrument_node=""> were doubtful that the engine could provide sufficient thrust.</span><sup class="reference" data-dcnode-id="4111" id="cite_ref-Winter1980_23-2"><a data-dcnode-id="4112" href="#cite_note-Winter1980-23"><span data-dcnode-id="4113" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4110" instrument_node=""> The engine was noted in </span><i data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">The Aero</span></i><span data-dcnode-id="4107" instrument_node="">, reprinted in </span><i data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">Aircraft</span></i><span data-dcnode-id="4104" instrument_node="">, as being "of remarkably small proportions in relation to the size of the machine."</span><sup class="reference" data-dcnode-id="4101" id="cite_ref-FlightGlobal_1910_p881-883_19-2"><a data-dcnode-id="4102" href="#cite_note-FlightGlobal_1910_p881-883-19"><span data-dcnode-id="4103" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="4098" id="cite_ref-Aircraft1910_30-0"><a data-dcnode-id="4099" href="#cite_note-Aircraft1910-30"><span data-dcnode-id="4100" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4097" instrument_node=""> The writer said the turbo-propulseur was "claimed to give an enormous wind velocity", but the intake area seemed too small to produce the stated thrust, and that "it also appears as if enormous power would be necessary to drive it",</span><sup class="reference" data-dcnode-id="4094" id="cite_ref-Aircraft,_The_Aero,_1910_31-0"><a data-dcnode-id="4095" href="#cite_note-Aircraft,_The_Aero,_1910-31"><span data-dcnode-id="4096" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4093" instrument_node=""> more than supplied by the Clerget.</span><sup class="reference" data-dcnode-id="4090" id="cite_ref-Winter1980_23-3"><a data-dcnode-id="4091" href="#cite_note-Winter1980-23"><span data-dcnode-id="4092" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4089" instrument_node="">
</span></p><p data-dcnode-id="4067"><span data-dcnode-id="4087" instrument_node="">The Coandă-1910 was reportedly sold to </span><a data-dcnode-id="4085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Terres_Weymann" title="Charles Terres Weymann"><span data-dcnode-id="4086" instrument_node="">Charles Weymann</span></a><span data-dcnode-id="4084" instrument_node=""> in October 1910.</span><sup class="reference" data-dcnode-id="4081" id="cite_ref-FlightGlobal_1910_p881-883_19-3"><a data-dcnode-id="4082" href="#cite_note-FlightGlobal_1910_p881-883-19"><span data-dcnode-id="4083" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4080" instrument_node=""> A daily newspaper from Bucharest wrote in 1910 that the aircraft was constructed in Clerget's workshops and that it "will fly in 6–7 weeks near Paris, piloted by Weymann, one of the pilots celebrated at the Rennes aviation meeting."</span><sup class="reference" data-dcnode-id="4077" id="cite_ref-Antoniu74_32-0"><a data-dcnode-id="4078" href="#cite_note-Antoniu74-32"><span data-dcnode-id="4079" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4076" instrument_node=""> Another Bucharest newspaper listed the aircraft in November as "sold twice-over".</span><sup class="reference" data-dcnode-id="4073" id="cite_ref-Adeverul1910_33-0"><a data-dcnode-id="4074" href="#cite_note-Adeverul1910-33"><span data-dcnode-id="4075" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4072" instrument_node=""> It may be that Weymann expressed his willingness to buy the aircraft once tests had been carried out.</span><sup class="reference" data-dcnode-id="4069" id="cite_ref-Cer_Senin,_Romanian_Air_Force_magazine,_2010_4-2"><a data-dcnode-id="4070" href="#cite_note-Cer_Senin,_Romanian_Air_Force_magazine,_2010-4"><span data-dcnode-id="4071" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4068" instrument_node="">
</span></p><p data-dcnode-id="4033"><span data-dcnode-id="4066" instrument_node="">At the exhibition, reaction among observers was mixed. Some doubted the aircraft would fly,</span><sup class="reference" data-dcnode-id="4063" id="cite_ref-Aircraft,_The_Aero,_1910_31-1"><a data-dcnode-id="4064" href="#cite_note-Aircraft,_The_Aero,_1910-31"><span data-dcnode-id="4065" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4062" instrument_node=""> and focused on more likely machines such as the Sloan, the </span><a data-dcnode-id="4060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voisin_%28aircraft%29" title="Voisin (aircraft)"><span data-dcnode-id="4061" instrument_node="">Voisin</span></a><span data-dcnode-id="4059" instrument_node="">, or </span><a data-dcnode-id="4057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paulhan_biplane" title="Paulhan biplane"><span data-dcnode-id="4058" instrument_node="">Louis Paulhan's design</span></a><span data-dcnode-id="4056" instrument_node="">. Others gave special notice to the Coandă-1910, calling it original and ingenious.</span><sup class="reference" data-dcnode-id="4053" id="cite_ref-Winter1980_23-4"><a data-dcnode-id="4054" href="#cite_note-Winter1980-23"><span data-dcnode-id="4055" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4052" instrument_node=""> The reporter from </span><i data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">La Technique Aeronautique</span></i><span data-dcnode-id="4049" instrument_node=""> wrote, "In the absence of definitive trials, permitting the precise yield of this machine, it is without doubt premature to say it will supersede the propeller&nbsp;... the tentative is interesting and we watch it closely."</span><sup class="reference" data-dcnode-id="4046" id="cite_ref-Winter1980_23-5"><a data-dcnode-id="4047" href="#cite_note-Winter1980-23"><span data-dcnode-id="4048" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4045" instrument_node=""> The official exhibition report ignored the turbo-propulseur engine and instead described Coandă's novel wing design, and the unusual empennage.</span><sup class="reference" data-dcnode-id="4042" id="cite_ref-Winter1980_23-6"><a data-dcnode-id="4043" href="#cite_note-Winter1980-23"><span data-dcnode-id="4044" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4041" instrument_node=""> On 15 November 1910, </span><i data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">L'Aérophile</span></i><span data-dcnode-id="4038" instrument_node=""> wrote that if the machine were ever to develop as the inventor hoped, it would be "a beautiful dream".</span><sup class="reference" data-dcnode-id="4035" id="cite_ref-Winter1980_23-7"><a data-dcnode-id="4036" href="#cite_note-Winter1980-23"><span data-dcnode-id="4037" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4034" instrument_node="">
</span></p><span data-dcnode-id="4032" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4023"><div class="thumbinner" data-dcnode-id="4024" style="width:222px;"><a class="image" data-dcnode-id="4030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoanda_1910-Antoniu_Collection.jpg"><img alt="" class="thumbimage" data-dcnode-id="4031" data-file-height="227" data-file-width="439" decoding="async" height="114" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/e/e4/Coanda_1910-Antoniu_Collection.jpg/220px-Coanda_1910-Antoniu_Collection.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/e/e4/Coanda_1910-Antoniu_Collection.jpg/330px-Coanda_1910-Antoniu_Collection.jpg 1.5x, //upload.wikimedia.org/wikipedia/en/e/e4/Coanda_1910-Antoniu_Collection.jpg 2x" width="220"></a><span data-dcnode-id="4029" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4025"><div class="magnify" data-dcnode-id="4027"><a class="internal" data-dcnode-id="4028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoanda_1910-Antoniu_Collection.jpg" title="Enlarge"></a></div><span data-dcnode-id="4026" instrument_node="">Frontal view photograph. The horizontal stabiliser obscures the lower part of the X-shaped empennage. A second turbo-propulseur is displayed on a stand at the right.</span></div></div></div><span data-dcnode-id="4022" instrument_node="">
</span><p data-dcnode-id="3995"><span data-dcnode-id="4021" instrument_node="">After the exhibition the aircraft was moved to a Clément-Bayard workshop at </span><a data-dcnode-id="4019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Issy-les-Moulineaux" title="Issy-les-Moulineaux"><span data-dcnode-id="4020" instrument_node="">Issy-les-Moulineaux</span></a><span data-dcnode-id="4018" instrument_node=""> for further testing.</span><sup class="reference" data-dcnode-id="4015" id="cite_ref-Clément-Bayard,_Hartmann_34-0"><a data-dcnode-id="4016" href="#cite_note-Cl%C3%A9ment-Bayard,_Hartmann-34"><span data-dcnode-id="4017" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4014" instrument_node=""> This work is reflected by additions to the powerplant-related patents of 3 December.</span><sup class="reference" data-dcnode-id="4011" id="cite_ref-Cer_Senin,_Romanian_Air_Force_magazine,_2010_4-3"><a data-dcnode-id="4012" href="#cite_note-Cer_Senin,_Romanian_Air_Force_magazine,_2010-4"><span data-dcnode-id="4013" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="4008" id="cite_ref-FR13502E_18-1"><a data-dcnode-id="4009" href="#cite_note-FR13502E-18"><span data-dcnode-id="4010" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4007" instrument_node=""> A group of modern-day Romanian investigators led by Dan Antoniu, having examined photographs from 1910, concluded that the rotary compressor featured at the exhibition was a hybrid between the one described in the initial 30 May 1910 patent and that shown in a later patent application. They felt that the exhibition machine had a simpler director system, a different rotor with a smaller intake cone, and that the exhaust gas heat transfer system had not been implemented.</span><sup class="reference" data-dcnode-id="4004" id="cite_ref-Antoniu55_35-0"><a data-dcnode-id="4005" href="#cite_note-Antoniu55-35"><span data-dcnode-id="4006" instrument_node="">[35]</span></a></sup><span data-dcnode-id="4003" instrument_node=""> According to Gérard Hartmann in his </span><i data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">Dossiers historiques et techniques aéronautique française</span></i><span data-dcnode-id="4000" instrument_node="">, the propulsion system generated only 170&nbsp;N (17&nbsp;kgf; 38&nbsp;lbf) of thrust, and to generate enough thrust for the aircraft to take off (estimated by Coandă at 240&nbsp;N (24&nbsp;kgf; 54&nbsp;lbf)) Coandă would have had to spin the "turbine" (the rotary compressor) at a speed of 7,000&nbsp;rpm with the risk of it exploding. This was not tried, but Hartmann concluded that the experiment proved that the solution worked perfectly.</span><sup class="reference" data-dcnode-id="3997" id="cite_ref-Clément-Bayard,_Hartmann_34-1"><a data-dcnode-id="3998" href="#cite_note-Cl%C3%A9ment-Bayard,_Hartmann-34"><span data-dcnode-id="3999" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3996" instrument_node="">
</span></p><p data-dcnode-id="3982"><span data-dcnode-id="3994" instrument_node="">Henri Mirguet writing for </span><i data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">L'Aérophile</span></i><span data-dcnode-id="3991" instrument_node=""> magazine in January 1912, recalled the previous exhibition's machine as the "chief attraction" of the 1910 salon.</span><sup class="reference" data-dcnode-id="3988" id="cite_ref-Winter1980_23-8"><a data-dcnode-id="3989" href="#cite_note-Winter1980-23"><span data-dcnode-id="3990" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3987" instrument_node=""> He wrote that Coandă answered his "pressing—and indiscreet—questions" about the turbo-propulseur-powered aircraft at that earlier exhibit, telling him that the machine had attained a speed of 112&nbsp;kilometres per hour (70&nbsp;mph) during several "flight tests", an improbable answer about which Mirguet "reserved judgment", waiting for confirmation that never materialised.</span><sup class="reference" data-dcnode-id="3984" id="cite_ref-Winter1980_23-9"><a data-dcnode-id="3985" href="#cite_note-Winter1980-23"><span data-dcnode-id="3986" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3983" instrument_node="">
</span></p><span data-dcnode-id="3981" instrument_node="">
</span><h2 data-dcnode-id="3978"><span class="mw-headline" data-dcnode-id="3979" id="Related_developments"><span data-dcnode-id="3980" instrument_node="">Related developments</span></span></h2><span data-dcnode-id="3977" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3965"><div class="thumbinner" data-dcnode-id="3966" style="width:172px;"><a class="image" data-dcnode-id="3975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoanda_snow_sleigh.jpg"><img alt="" class="thumbimage" data-dcnode-id="3976" data-file-height="386" data-file-width="564" decoding="async" height="116" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/03/Coanda_snow_sleigh.jpg/170px-Coanda_snow_sleigh.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/03/Coanda_snow_sleigh.jpg/255px-Coanda_snow_sleigh.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/03/Coanda_snow_sleigh.jpg/340px-Coanda_snow_sleigh.jpg 2x" width="170"></a><span data-dcnode-id="3974" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3967"><div class="magnify" data-dcnode-id="3972"><a class="internal" data-dcnode-id="3973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACoanda_snow_sleigh.jpg" title="Enlarge"></a></div><span data-dcnode-id="3971" instrument_node="">The 1910 Coandă engine design was also used on a sledge designed for </span><a class="mw-redirect" data-dcnode-id="3969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyril_Vladimirovich%2C_Grand_Duke_of_Russia" title="Cyril Vladimirovich, Grand Duke of Russia"><span data-dcnode-id="3970" instrument_node="">Grand Duke Cyril of Russia</span></a><span data-dcnode-id="3968" instrument_node="">.</span></div></div></div><span data-dcnode-id="3964" instrument_node="">
</span><p data-dcnode-id="3932"><span data-dcnode-id="3963" instrument_node="">The additional turbo-propulseur patent application 13.502, dated 3 December 1910, was implemented on a double-seat motorised sled commissioned by </span><a class="mw-redirect" data-dcnode-id="3961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyril_Vladimirovich%2C_Grand_Duke_of_Russia" title="Cyril Vladimirovich, Grand Duke of Russia"><span data-dcnode-id="3962" instrument_node="">Cyril Vladimirovich, Grand Duke of Russia</span></a><span data-dcnode-id="3960" instrument_node="">.</span><sup class="reference" data-dcnode-id="3957" id="cite_ref-FR13502E_18-2"><a data-dcnode-id="3958" href="#cite_note-FR13502E-18"><span data-dcnode-id="3959" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="3954" id="cite_ref-PopMech1911_29-1"><a data-dcnode-id="3955" href="#cite_note-PopMech1911-29"><span data-dcnode-id="3956" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="3951" id="cite_ref-Antoniu80_36-0"><a data-dcnode-id="3952" href="#cite_note-Antoniu80-36"><span data-dcnode-id="3953" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3950" instrument_node=""> With the help of Despujols, a boat maker, and the motor manufacturer </span><a data-dcnode-id="3948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Automobiles_Gr%25C3%25A9goire" title="Automobiles Grégoire"><span data-dcnode-id="3949" instrument_node="">Gregoire</span></a><span data-dcnode-id="3947" instrument_node="">, Coandă supervised the building of a motor sled, powered by a 30&nbsp;hp (22&nbsp;kW) Gregoire engine driving the turbo-propulseur. The sledge was blessed by </span><a class="mw-redirect" data-dcnode-id="3945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Orthodox" title="Russian Orthodox"><span data-dcnode-id="3946" instrument_node="">Russian Orthodox</span></a><span data-dcnode-id="3944" instrument_node=""> priests at the Despujols plant near Paris on 2 December 1910. Starting the next day, it was exhibited for two weeks at the 12th Automobile Salon of France, alongside Gregoire-powered automobiles on the Gregoire stand. A number of automobile and general interest magazines published photographs or sketches of the sledge. A version of Coandă's turbo-propulseur design was shown for the second time in late 1910 at the </span><a data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_Palais" title="Grand Palais"><span data-dcnode-id="3943" instrument_node="">Grand Palais</span></a><span data-dcnode-id="3941" instrument_node=""> of Paris.</span><sup class="reference" data-dcnode-id="3938" id="cite_ref-Winter1980_23-10"><a data-dcnode-id="3939" href="#cite_note-Winter1980-23"><span data-dcnode-id="3940" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3937" instrument_node=""> One of the periodicals reported an expected speed of 60&nbsp;mph (97&nbsp;km/h), but no account exists of the sledge being tested.</span><sup class="reference" data-dcnode-id="3934" id="cite_ref-Winter2010_37-0"><a data-dcnode-id="3935" href="#cite_note-Winter2010-37"><span data-dcnode-id="3936" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3933" instrument_node="">
</span></p><p data-dcnode-id="3887"><span data-dcnode-id="3931" instrument_node="">Coandă continued to work on the Coandă-1910 project at the beginning of 1911, aiming to improve stability, increase the power of the turbo-propulseur, and to implement aerofoil improvements. He applied for new patents for aerodynamic investigations</span><sup class="reference" data-dcnode-id="3928" id="cite_ref-FR438964_38-0"><a data-dcnode-id="3929" href="#cite_note-FR438964-38"><span data-dcnode-id="3930" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3927" instrument_node=""> and improvements of the Coandă-1910.</span><sup class="reference" data-dcnode-id="3924" id="cite_ref-Antoniu84_39-0"><a data-dcnode-id="3925" href="#cite_note-Antoniu84-39"><span data-dcnode-id="3926" instrument_node="">[39]</span></a></sup><sup class="reference" data-dcnode-id="3921" id="cite_ref-FR441114_40-0"><a data-dcnode-id="3922" href="#cite_note-FR441114-40"><span data-dcnode-id="3923" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3920" instrument_node="">
Coandă described a different, more sturdy system for the attachment of the wings, which also enabled changes in the </span><a data-dcnode-id="3918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angle_of_attack" title="Angle of attack"><span data-dcnode-id="3919" instrument_node="">angle of attack</span></a><span data-dcnode-id="3917" instrument_node=""> and the centre of gravity. He aimed to obtain more power from the propulsion system, and design drawings show the arrangement of two air-cooled </span><a data-dcnode-id="3915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rotary_engine" title="Rotary engine"><span data-dcnode-id="3916" instrument_node="">rotary engines</span></a><span data-dcnode-id="3914" instrument_node=""> on the sides of the fuselage. The placement of the engines indicates that Coandă did not intend to inject fuel into the jet stream and ignite it as the cooling of the engines would have been compromised.</span><sup class="reference" data-dcnode-id="3911" id="cite_ref-Antoniu85_41-0"><a data-dcnode-id="3912" href="#cite_note-Antoniu85-41"><span data-dcnode-id="3913" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3910" instrument_node=""> The patent was annotated with an additional claim on 19 July 1911 which brought significant changes including the addition of retractable landing gear with dampers inside aerodynamic fairings with skids, removal of the horizontal stabiliser, a supporting surface was provided for each engine and their accessories were covered to improve aerodynamics.</span><sup class="reference" data-dcnode-id="3907" id="cite_ref-Antoniu88_42-0"><a data-dcnode-id="3908" href="#cite_note-Antoniu88-42"><span data-dcnode-id="3909" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="3904" id="cite_ref-FR15849E_43-0"><a data-dcnode-id="3905" href="#cite_note-FR15849E-43"><span data-dcnode-id="3906" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3903" instrument_node=""> Though Coandă continued to study rotary propulsion mechanisms, Antoniu believes that Coandă never implemented a practical solution because of the lack of funds.</span><sup class="reference" data-dcnode-id="3900" id="cite_ref-Antoniu161_44-0"><a data-dcnode-id="3901" href="#cite_note-Antoniu161-44"><span data-dcnode-id="3902" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3899" instrument_node="">
In May 1911 Coandă filed English-language patents on the turbo-propulseur design in the United Kingdom and the United States, as well as a second French-language patent filed in Switzerland,</span><sup class="reference" data-dcnode-id="3896" id="cite_ref-45"><a data-dcnode-id="3897" href="#cite_note-45"><span data-dcnode-id="3898" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3895" instrument_node=""> and he described it for the 1911 publication of </span><i data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">L'Annuaire de l'Air</span></i><span data-dcnode-id="3892" instrument_node="">.</span><sup class="reference" data-dcnode-id="3889" id="cite_ref-Winter1980_23-11"><a data-dcnode-id="3890" href="#cite_note-Winter1980-23"><span data-dcnode-id="3891" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3888" instrument_node="">
</span></p><p data-dcnode-id="3844"><span data-dcnode-id="3886" instrument_node="">The very expensive project of 1910, costing Coandă about one million francs, left him with limited funds. The possibility of a new contract with the French government led Coandă to build the Coandă-1911. He wished to win the French Army-organised </span><a data-dcnode-id="3884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reims_Military_Aviation_Competition%2C_1911" title="Reims Military Aviation Competition, 1911"><span data-dcnode-id="3885" instrument_node="">Military Aviation Competition at Reims</span></a><span data-dcnode-id="3883" instrument_node=""> in October, one that required two engines in each aircraft as a fail-safe strategy.</span><sup class="reference" data-dcnode-id="3880" id="cite_ref-Winter1980_23-12"><a data-dcnode-id="3881" href="#cite_note-Winter1980-23"><span data-dcnode-id="3882" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="3877" id="cite_ref-Antoniu92_46-0"><a data-dcnode-id="3878" href="#cite_note-Antoniu92-46"><span data-dcnode-id="3879" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3876" instrument_node=""> At the third aviation salon in Paris 1911, Coandă displayed a scale model of the aircraft which used two </span><a data-dcnode-id="3874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gnome_et_Rh%25C3%25B4ne%23Gnome" title="Gnome et Rhône"><span data-dcnode-id="3875" instrument_node="">Gnome</span></a><span data-dcnode-id="3873" instrument_node=""> rotary engines mounted back to back, connected by a </span><a data-dcnode-id="3871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bevel_gear" title="Bevel gear"><span data-dcnode-id="3872" instrument_node="">bevel gear</span></a><span data-dcnode-id="3870" instrument_node=""> to a single two-bladed propeller.</span><sup class="reference" data-dcnode-id="3867" id="cite_ref-47"><a data-dcnode-id="3868" href="#cite_note-47"><span data-dcnode-id="3869" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3866" instrument_node=""> The combination of two engines connected to one propeller was originally intended to drive a new turbine, but Coandă was unable to fund one.</span><sup class="reference" data-dcnode-id="3863" id="cite_ref-Antoniu93_48-0"><a data-dcnode-id="3864" href="#cite_note-Antoniu93-48"><span data-dcnode-id="3865" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3862" instrument_node=""> During trials the assembly did not provide enough traction and a four-bladed propeller was ordered. The mounting support of the engines, initially intended for a jet propulsion version, was not adequate for the new configuration so the forward chassis had to be modified.</span><sup class="reference" data-dcnode-id="3859" id="cite_ref-Antoniu93_48-1"><a data-dcnode-id="3860" href="#cite_note-Antoniu93-48"><span data-dcnode-id="3861" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3858" instrument_node="">
Henri Mirguet writing for </span><i data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">L'Aérophile</span></i><span data-dcnode-id="3855" instrument_node=""> magazine in January 1912 said that the new 1911 aircraft retained the fuselage, the frame and the wing of Coandă's 1910 design, but did not keep the turbo-propulseur or "the wooden wingloading surface including the forward longitudinal ribs". The aircraft was flown on 21 October 1911, but with modest results as the latest modifications, especially those related to the powerplant, did not compensate for the increased total weight of the aircraft. At the military contest, it did not meet the requirement for independent operation of each engine.</span><sup class="reference" data-dcnode-id="3852" id="cite_ref-Antoniu19_49-0"><a data-dcnode-id="3853" href="#cite_note-Antoniu19-49"><span data-dcnode-id="3854" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="3849" id="cite_ref-ConcursRemis,_Hartmann_50-0"><a data-dcnode-id="3850" href="#cite_note-ConcursRemis,_Hartmann-50"><span data-dcnode-id="3851" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="3846" id="cite_ref-51"><a data-dcnode-id="3847" href="#cite_note-51"><span data-dcnode-id="3848" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3845" instrument_node="">
</span></p><p data-dcnode-id="3825"><span data-dcnode-id="3843" instrument_node="">Following the 1911 exhibition, at the personal request of </span><a data-dcnode-id="3841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sir_George_White%2C_1st_Baronet" title="Sir George White, 1st Baronet"><span data-dcnode-id="3842" instrument_node="">Sir George White</span></a><span data-dcnode-id="3840" instrument_node="">, Coandă moved to the United Kingdom to take a position as chief engineer or chief designer at </span><a data-dcnode-id="3838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bristol_Aeroplane_Company" title="Bristol Aeroplane Company"><span data-dcnode-id="3839" instrument_node="">British and Colonial Aeroplane Company</span></a><span data-dcnode-id="3837" instrument_node=""> for a few years. In the next four decades Coandă worked on a great variety of inventions. During World War II he revived his earlier turbo-propulseur engine when he was contracted by the </span><a class="mw-redirect" data-dcnode-id="3835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Army_%28Wehrmacht%29" title="German Army (Wehrmacht)"><span data-dcnode-id="3836" instrument_node="">German Army</span></a><span data-dcnode-id="3834" instrument_node=""> in late 1942 to develop an air propulsion system for military ambulance snow sledges much like the one made for the Russian Grand Duke.</span><sup class="reference" data-dcnode-id="3831" id="cite_ref-Augmented_Flow_1946_52-0"><a data-dcnode-id="3832" href="#cite_note-Augmented_Flow_1946-52"><span data-dcnode-id="3833" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3830" instrument_node=""> The German contract concluded after one year, yielding no plans for production. Though Coandă had experimented with a variety of nozzles, and said that he had achieved a degree of success, no turbojet-engine-style fuel injection or combustion in the air stream was attempted.</span><sup class="reference" data-dcnode-id="3827" id="cite_ref-Augmented_Flow_1946_52-1"><a data-dcnode-id="3828" href="#cite_note-Augmented_Flow_1946-52"><span data-dcnode-id="3829" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3826" instrument_node="">
</span></p><p data-dcnode-id="3808"><span data-dcnode-id="3824" instrument_node="">Coandă and his 1910 aircraft were absent from much of aviation literature of the day. None of the annual issues of </span><i data-dcnode-id="3821"><a data-dcnode-id="3822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jane%2527s_All_the_World%2527s_Aircraft" title="Jane's All the World's Aircraft"><span data-dcnode-id="3823" instrument_node="">Jane's All the World's Aircraft</span></a></i><span data-dcnode-id="3820" instrument_node=""> ever mentioned the Coandă-1910 or its turbo-propulseur powerplant.</span><sup class="reference" data-dcnode-id="3817" id="cite_ref-Winter1980_23-13"><a data-dcnode-id="3818" href="#cite_note-Winter1980-23"><span data-dcnode-id="3819" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3816" instrument_node=""> The Soviet engineer </span><a data-dcnode-id="3814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolai_Rynin" title="Nikolai Rynin"><span data-dcnode-id="3815" instrument_node="">Nikolai Rynin</span></a><span data-dcnode-id="3813" instrument_node=""> made no mention of Coandă in his exhaustive nine-volume encyclopaedia on jet and rocket engines, written in the late 1920s and early '30s.</span><sup class="reference" data-dcnode-id="3810" id="cite_ref-Winter1980_23-14"><a data-dcnode-id="3811" href="#cite_note-Winter1980-23"><span data-dcnode-id="3812" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3809" instrument_node="">
</span></p><span data-dcnode-id="3807" instrument_node="">
</span><h2 data-dcnode-id="3804"><span class="mw-headline" data-dcnode-id="3805" id="Later_claims"><span data-dcnode-id="3806" instrument_node="">Later claims</span></span></h2><span data-dcnode-id="3803" instrument_node="">
</span><p data-dcnode-id="3769"><span data-dcnode-id="3802" instrument_node="">At the beginning of the </span><a class="mw-redirect" data-dcnode-id="3800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jet_age" title="Jet age"><span data-dcnode-id="3801" instrument_node="">jet age</span></a><span data-dcnode-id="3799" instrument_node="">, when the potential of reactive engines was recognised, several histories of the jet engine were written. A once-classified </span><a data-dcnode-id="3797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guggenheim_Aeronautical_Laboratory" title="Guggenheim Aeronautical Laboratory"><span data-dcnode-id="3798" instrument_node="">Guggenheim Aeronautical Laboratory</span></a><span data-dcnode-id="3796" instrument_node=""> and </span><a data-dcnode-id="3794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jet_Propulsion_Laboratory" title="Jet Propulsion Laboratory"><span data-dcnode-id="3795" instrument_node="">Jet Propulsion Laboratory</span></a><span data-dcnode-id="3793" instrument_node=""> study completed in 1946 described the Coandă-1910 as "probably not flown" but featuring "a mechanical jet propulsion device with a centrifugal blower", one in which heat from the Clerget piston engine "furnished auxiliary jet propulsion."</span><sup class="reference" data-dcnode-id="3790" id="cite_ref-Winter1980_23-15"><a data-dcnode-id="3791" href="#cite_note-Winter1980-23"><span data-dcnode-id="3792" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3789" instrument_node=""> In the editorial lead to their 1946 article on Coandă's "Augmented Flow",</span><sup class="reference" data-dcnode-id="3786" id="cite_ref-Augmented_Flow_1946_52-2"><a data-dcnode-id="3787" href="#cite_note-Augmented_Flow_1946-52"><span data-dcnode-id="3788" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3785" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="3782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flight_%28magazine%29" title="Flight (magazine)"><i data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">Flight</span></i></a><span data-dcnode-id="3781" instrument_node=""> terms it, "scarcely a jet".</span><sup class="reference" data-dcnode-id="3778" id="cite_ref-Augmented_Flow_1946,_editorial_53-0"><a data-dcnode-id="3779" href="#cite_note-Augmented_Flow_1946,_editorial-53"><span data-dcnode-id="3780" instrument_node="">[53]</span></a></sup><span data-dcnode-id="3777" instrument_node=""> In the same year Geoffrey G. Smith chronicled technological development in his book </span><i data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">Gas Turbines and Jet Propulsion for Aircraft</span></i><span data-dcnode-id="3774" instrument_node="">, but did not mention Coandă.</span><sup class="reference" data-dcnode-id="3771" id="cite_ref-54"><a data-dcnode-id="3772" href="#cite_note-54"><span data-dcnode-id="3773" instrument_node="">[54]</span></a></sup><span data-dcnode-id="3770" instrument_node="">
</span></p><p data-dcnode-id="3731"><span data-dcnode-id="3768" instrument_node="">In 1950's </span><i data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">l'aviation d'Ader et des temps héroiques</span></i><span data-dcnode-id="3765" instrument_node="">, the authors assert that Coandă flew the first jet aircraft at Issy-les-moulineaux for 30&nbsp;metres (100&nbsp;ft), ending with a crash.</span><sup class="reference" data-dcnode-id="3762" id="cite_ref-L_55-0"><a data-dcnode-id="3763" href="#cite_note-L-55"><span data-dcnode-id="3764" instrument_node="">[55]</span></a></sup><span data-dcnode-id="3761" instrument_node=""> In 1953, </span><i data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">Flight</span></i><span class="nowrap" data-dcnode-id="3757" style="padding-left:0.1em;"><span data-dcnode-id="3758" instrument_node="">'</span></span><span data-dcnode-id="3756" instrument_node="">s treatment of aircraft in the 50 years since the </span><a data-dcnode-id="3754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wright_brothers" title="Wright brothers"><span data-dcnode-id="3755" instrument_node="">Wright brothers</span></a><span data-dcnode-id="3753" instrument_node="">' flight included the Coandă-1910 "ducted fan" and said of Coandă that he "believes that he 'took off for a few feet, then came down hurriedly and broke two teeth</span><span data-dcnode-id="3751" style="padding-right:.15em;"><span data-dcnode-id="3752" instrument_node="">'</span></span><span data-dcnode-id="3750" instrument_node="">",</span><sup class="reference" data-dcnode-id="3747" id="cite_ref-King1953_56-0"><a data-dcnode-id="3748" href="#cite_note-King1953-56"><span data-dcnode-id="3749" instrument_node="">[56]</span></a></sup><span data-dcnode-id="3746" instrument_node=""> quoting J.W. Adderley's 1952 letter to the editor of </span><i data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">Flight</span></i><span data-dcnode-id="3743" instrument_node=""> after Adderley's discussion with Coandă in Paris at the end of World War II.</span><sup class="reference" data-dcnode-id="3740" id="cite_ref-Adderley1952_57-0"><a data-dcnode-id="3741" href="#cite_note-Adderley1952-57"><span data-dcnode-id="3742" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3739" instrument_node=""> Adderley said he "can definitely confirm that the power unit was of the ducted-fan type, similar in basic principles to the Caproni-Campini aircraft of the 1930s" (referring to the </span><a data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caproni_Campini_N.1" title="Caproni Campini N.1"><span data-dcnode-id="3738" instrument_node="">Caproni Campini N.1</span></a><span data-dcnode-id="3736" instrument_node="">).</span><sup class="reference" data-dcnode-id="3733" id="cite_ref-Adderley1952_57-1"><a data-dcnode-id="3734" href="#cite_note-Adderley1952-57"><span data-dcnode-id="3735" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3732" instrument_node="">
