</span><li data-dcnode-id="1711" id="cite_note-FR441114-40"><span class="mw-cite-backlink" data-dcnode-id="1740"><b data-dcnode-id="1741"><a aria-label="Jump up" data-dcnode-id="1742" href="#cite_ref-FR441114_40-0" title="Jump up"><span data-dcnode-id="1743" instrument_node="">^</span></a></b></span><span data-dcnode-id="1739" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1713"><link data-dcnode-id="1738" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation journal cs1 cs1-prop-jul-greg-uncertainty cs1-prop-foreign-lang-source" data-dcnode-id="1731"><a class="external text" data-dcnode-id="1736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jet100.com/images/FR441144.pdf" rel="nofollow"><span data-dcnode-id="1737" instrument_node="">"Perfectionnements aux appareils d'aviation et plus particulierment au aéroplanes a centres distincts, French patent 441.144"</span></a><span data-dcnode-id="1735" instrument_node=""> </span><span class="cs1-format" data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">(PDF)</span></span><span data-dcnode-id="1732" instrument_node=""> (in French). 30 July 1911.</span></cite><span class="Z3988" data-dcnode-id="1730" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=article&amp;rft.atitle=Perfectionnements+aux+appareils+d%27aviation+et+plus+particulierment+au+a%C3%A9roplanes+a+centres+distincts%2C+French+patent+441.144&amp;rft.date=1911-07-30&amp;rft_id=http%3A%2F%2Fwww.jet100.com%2Fimages%2FFR441144.pdf&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ACoand%C4%83-1910"></span><span data-dcnode-id="1729" instrument_node=""> </span><span class="cs1-hidden-error citation-comment" data-dcnode-id="1722"><code class="cs1-code" data-dcnode-id="1724"><span data-dcnode-id="1728" instrument_node="">{{</span><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3ACite_journal" title="Template:Cite journal"><span data-dcnode-id="1727" instrument_node="">cite journal</span></a><span data-dcnode-id="1725" instrument_node="">}}</span></code><span data-dcnode-id="1723" instrument_node="">: </span></span><span class="cs1-hidden-error citation-comment" data-dcnode-id="1714"><span data-dcnode-id="1721" instrument_node="">Cite journal requires </span><code class="cs1-code" data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">|journal=</span></code><span data-dcnode-id="1718" instrument_node=""> (</span><a data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3ACS1_errors%23missing_periodical" title="Help:CS1 errors"><span data-dcnode-id="1717" instrument_node="">help</span></a><span data-dcnode-id="1715" instrument_node="">)</span></span></span><span data-dcnode-id="1712" instrument_node="">
</span></li><span data-dcnode-id="1710" instrument_node="">
</span><li data-dcnode-id="1701" id="cite_note-Antoniu85-41"><span class="mw-cite-backlink" data-dcnode-id="1706"><b data-dcnode-id="1707"><a aria-label="Jump up" data-dcnode-id="1708" href="#cite_ref-Antoniu85_41-0" title="Jump up"><span data-dcnode-id="1709" instrument_node="">^</span></a></b></span><span data-dcnode-id="1705" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Antoniu (2010) p. 85. "One relevant aspect must be noted in the relation to the entire propulsion system that demonstrates that the reaction force was obtained only with air under pressure (motofan) like the engines of modern planes. In the case in which fuel was introduced in the exhaust channel, the hot gases would have enveloped the two rotary engines depriving them of the necessary cooling."</span></span><span data-dcnode-id="1702" instrument_node="">
</span></li><span data-dcnode-id="1700" instrument_node="">
</span><li data-dcnode-id="1680" id="cite_note-Antoniu88-42"><span class="mw-cite-backlink" data-dcnode-id="1685"><span data-dcnode-id="1699" instrument_node="">^ </span><a data-dcnode-id="1692" href="#cite_ref-Antoniu88_42-0"><span class="cite-accessibility-label" data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Jump up to: </span></span><sup data-dcnode-id="1693"><i data-dcnode-id="1694"><b data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">a</span></b></i></sup></a><span data-dcnode-id="1691" instrument_node=""> </span><a data-dcnode-id="1686" href="#cite_ref-Antoniu88_42-1"><sup data-dcnode-id="1687"><i data-dcnode-id="1688"><b data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">b</span></b></i></sup></a></span><span data-dcnode-id="1684" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Antoniu (2010), p. 88. "Major changes were made to the landing gear; he fitted them with dampeners and retraction mechanisms, the whole assembly being located inside aerodynamic pants with skids. On the external supports of the rotary engines he provided two supporting surfaces, he covered their accessories improving their aerodynamic, and together with the cruciform empennage they were intended to contribute to the longitudinal stability of the machine."</span></span><span data-dcnode-id="1681" instrument_node="">
</span></li><span data-dcnode-id="1679" instrument_node="">
</span><li data-dcnode-id="1649" id="cite_note-FR15849E-43"><span class="mw-cite-backlink" data-dcnode-id="1675"><b data-dcnode-id="1676"><a aria-label="Jump up" data-dcnode-id="1677" href="#cite_ref-FR15849E_43-0" title="Jump up"><span data-dcnode-id="1678" instrument_node="">^</span></a></b></span><span data-dcnode-id="1674" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1651"><link data-dcnode-id="1673" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation journal cs1 cs1-prop-jul-greg-uncertainty cs1-prop-foreign-lang-source" data-dcnode-id="1669"><a class="external text" data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//v3.espacenet.com/publicationDetails/originalDocument%3FCC%3DFR%26NR%3D15849E%26KC%3DE%26FT%3DD%26date%3D%26DB%3DEPODOC%26locale%3Den_EP" rel="nofollow"><span data-dcnode-id="1672" instrument_node="">"Perfectionnements aux appareils d'aviation et plus particulierement au aéroplanes a centres distincts, French patent 441.144 Addition 1 15.849"</span></a><span data-dcnode-id="1670" instrument_node=""> (in French). 4 October 1912.</span></cite><span class="Z3988" data-dcnode-id="1668" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=article&amp;rft.atitle=Perfectionnements+aux+appareils+d%27aviation+et+plus+particulierement+au+a%C3%A9roplanes+a+centres+distincts%2C+French+patent+441.144+Addition+1+15.849&amp;rft.date=1912-10-04&amp;rft_id=http%3A%2F%2Fv3.espacenet.com%2FpublicationDetails%2ForiginalDocument%3FCC%3DFR%26NR%3D15849E%26KC%3DE%26FT%3DD%26date%3D%26DB%3DEPODOC%26locale%3Den_EP&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ACoand%C4%83-1910"></span><span data-dcnode-id="1667" instrument_node=""> </span><span class="cs1-hidden-error citation-comment" data-dcnode-id="1660"><code class="cs1-code" data-dcnode-id="1662"><span data-dcnode-id="1666" instrument_node="">{{</span><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3ACite_journal" title="Template:Cite journal"><span data-dcnode-id="1665" instrument_node="">cite journal</span></a><span data-dcnode-id="1663" instrument_node="">}}</span></code><span data-dcnode-id="1661" instrument_node="">: </span></span><span class="cs1-hidden-error citation-comment" data-dcnode-id="1652"><span data-dcnode-id="1659" instrument_node="">Cite journal requires </span><code class="cs1-code" data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">|journal=</span></code><span data-dcnode-id="1656" instrument_node=""> (</span><a data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3ACS1_errors%23missing_periodical" title="Help:CS1 errors"><span data-dcnode-id="1655" instrument_node="">help</span></a><span data-dcnode-id="1653" instrument_node="">)</span></span></span><span data-dcnode-id="1650" instrument_node="">
</span></li><span data-dcnode-id="1648" instrument_node="">
</span><li data-dcnode-id="1639" id="cite_note-Antoniu161-44"><span class="mw-cite-backlink" data-dcnode-id="1644"><b data-dcnode-id="1645"><a aria-label="Jump up" data-dcnode-id="1646" href="#cite_ref-Antoniu161_44-0" title="Jump up"><span data-dcnode-id="1647" instrument_node="">^</span></a></b></span><span data-dcnode-id="1643" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Antoniu (2010), p. 161. "Soon after, he dedicated himself to the study of rotary internal combustion engines, which presented the advantage of lower weights, increased efficiency and power when supercharged with air compressors. However, this type of internal combustion engine featured the great disadvantage of insufficient cooling which Coandă tried to reduce. He designed a project for such an internal combustion engine, he was granted the patent FR443.531, to which he made successive revisions through the patents 16.508 and 16.587. We found no information about the construction of this type of engine or any of the versions featuring the revisions. It appears that these successive revisions were only the result of Coandă's calculations or revisions."</span></span><span data-dcnode-id="1640" instrument_node="">
</span></li><span data-dcnode-id="1638" instrument_node="">
</span><li data-dcnode-id="1618" id="cite_note-45"><span class="mw-cite-backlink" data-dcnode-id="1634"><b data-dcnode-id="1635"><a aria-label="Jump up" data-dcnode-id="1636" href="#cite_ref-45" title="Jump up"><span data-dcnode-id="1637" instrument_node="">^</span></a></b></span><span data-dcnode-id="1633" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1620"><a class="external text" data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//v3.espacenet.com/publicationDetails/originalDocument%3FCC%3DGB%26NR%3D191112740A%26KC%3DA%26FT%3DD%26date%3D19120118%26DB%3DEPODOC%26locale%3Den_gb" rel="nofollow"><span data-dcnode-id="1632" instrument_node="">British Patent GB191112740(A) applied for May 26, 1911</span></a><br data-dcnode-id="1630"><a class="external text" data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.google.com/patents/about%3Fid%3De9VOAAAAEBAJ" rel="nofollow"><span data-dcnode-id="1629" instrument_node="">US Patent 1104963 </span><i data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Propeller</span></i></a><span data-dcnode-id="1625" instrument_node="">. Filing date: 29 May 1911. Issue date: July 1914.</span><br data-dcnode-id="1624"><a class="external text" data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//v3.espacenet.com/publicationDetails/originalDocument%3FCC%3DCH%26NR%3D58323A%26KC%3DA%26FT%3DD%26date%3D19130301%26DB%3DEPODOC%26locale%3Den_EP" rel="nofollow"><span data-dcnode-id="1623" instrument_node="">Swiss patent CH58232(A)</span></a><span data-dcnode-id="1621" instrument_node="">, filed 26 May 1911, published 1 March 1913.</span></span><span data-dcnode-id="1619" instrument_node="">
</span></li><span data-dcnode-id="1617" instrument_node="">
</span><li data-dcnode-id="1608" id="cite_note-Antoniu92-46"><span class="mw-cite-backlink" data-dcnode-id="1613"><b data-dcnode-id="1614"><a aria-label="Jump up" data-dcnode-id="1615" href="#cite_ref-Antoniu92_46-0" title="Jump up"><span data-dcnode-id="1616" instrument_node="">^</span></a></b></span><span data-dcnode-id="1612" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Antoniu (2010), p. 92. "In 1911, the French army announced a competition to be held in October in Reims to equip its aviation with flying machines. Stimulated by an eventual deal with the French government, Coandă completed the project of a flying machine derived from the Coandă No.1 of 1910, as well as his latest projects protected by patents, which he modified as a result of the user's demands."</span></span><span data-dcnode-id="1609" instrument_node="">
</span></li><span data-dcnode-id="1607" instrument_node="">
</span><li data-dcnode-id="1588" id="cite_note-47"><span class="mw-cite-backlink" data-dcnode-id="1603"><b data-dcnode-id="1604"><a aria-label="Jump up" data-dcnode-id="1605" href="#cite_ref-47" title="Jump up"><span data-dcnode-id="1606" instrument_node="">^</span></a></b></span><span data-dcnode-id="1602" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1590"><link data-dcnode-id="1601" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation book cs1" data-dcnode-id="1592" id="CITEREFHayward1912"><span data-dcnode-id="1600" instrument_node="">Hayward, Charles Brian (1912). </span><a class="external text" data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archive.org/details/practicalaerona01haywgoog" rel="nofollow"><i data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Practical Aeronautics: an understandable presentation of interesting and essential facts in aeronautical science</span></i></a><span data-dcnode-id="1596" instrument_node="">. Chicago: American School of Correspondence. p.&nbsp;</span><a class="external text" data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archive.org/details/practicalaerona01haywgoog/page/n115" rel="nofollow"><span data-dcnode-id="1595" instrument_node="">91</span></a><span data-dcnode-id="1593" instrument_node="">.</span></cite><span class="Z3988" data-dcnode-id="1591" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=book&amp;rft.btitle=Practical+Aeronautics%3A+an+understandable+presentation+of+interesting+and+essential+facts+in+aeronautical+science&amp;rft.place=Chicago&amp;rft.pages=91&amp;rft.pub=American+School+of+Correspondence&amp;rft.date=1912&amp;rft.aulast=Hayward&amp;rft.aufirst=Charles+Brian&amp;rft_id=https%3A%2F%2Farchive.org%2Fdetails%2Fpracticalaerona01haywgoog&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ACoand%C4%83-1910"></span></span><span data-dcnode-id="1589" instrument_node="">
