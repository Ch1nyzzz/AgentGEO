Frame structures consist of struts joined to form a framework. Their strength is a
function of the strength of the elements and joints, and their organization. Often
a cladding or skin is added to the frame, but this rarely adds strength to the
structure. Examples of frame structures include most modern homes, bicycles,
and skeletons. Frame structures are relatively light, flexible, and easy to construct.
The most common frame configuration is the assembly of struts into triangles,
which are then assembled to form larger structures. Consider frame structures for
most large design applications.

Shell structures consist of a thin material that wraps around to contain a volume.
They maintain their form and support loads without a frame or solid mass inside.
Their strength is a function of their ability to distribute loads throughout the whole
structure. Examples of shell structures include bottles, airplane fuselages, and
domes. Shell structures are effective at resisting static forces that are applied
in specific ways, but are poor at resisting dynamic forces. For example, an egg
effectively resists loads that are applied to its top and bottom, but collapses
quickly when the loads are applied to its sides. Shell structures are lightweight
and economical with regard to material, but are complex to design and vulnerable
to catastrophic failure if the structure has imperfections or is damaged. Consider
shell structures for containers, small cast structures, shelters, and designs
requiring very large and lightweight spans. Large shell structures should generally
be reinforced by additional support elements to stabilize against buckling.2

Linear Perspective
When two vertical lines converge near their top ends, the converging ends of the
lines are perceived to be farther away than the diverging ends.

When the texture of a surface varies in density, the areas of greater density are

environments. Strongest depth effects are achieved when the visual cues are used
in combination; therefore, use as many of the cues as possible to achieve the
strongest effect, making sure that the cues are appropriate for the context.

trigger uncanny valley effects.

Although the uncanny valley is generally observed by animators and roboticists,
there are plenty of examples where the caveats of the principle are not abided.
For example, director Robert Zemeckis decided to depict computer-generated

fUncertainty Principle
The act of measuring certain sensitive variables in a
system can alter them, and confound the accuracy of
the measurement.


This principle is based on Heisenberg’s uncertainty principle in physics.
Heisenberg’s uncertainty principle states that both the position and momentum of
an atomic particle cannot be known because the simple act of measuring either
one of them affects the other. Similarly, the general uncertainty principle states
that the act of measuring sensitive variables in any system can alter them, and
confound the accuracy of the measurement. For example, a common method of
measuring computer performance is event logging: each event that is performed
by the computer is recorded. Event logging increases the visibility of what the
computer is doing and how it is performing, but it also consumes computing
resources, which interferes with the performance being measured.

The uncertainty introduced by a measure is a function of the sensitivity of
variables in a system, and the invasiveness of the measure. Sensitivity refers to
the ease with which a variable in a system is altered by the measure. Invasiveness
refers to the amount of interference introduced by the measure. Generally, the
invasiveness of the measure should be inversely related to the sensitivity of the
variable measured; the more sensitive the variable, the less invasive the measure.
For example, asking people what they think about a set of new product features
is a highly invasive measure that can yield inaccurate results. By contrast,
inconspicuously observing the way people interact with the features is a minimally
invasive measure, and will yield more reliable results.

In cases where highly invasive measures are used over long periods of time, it
is common for systems to become permanently altered in order to adapt to the
disruption of the measure. For example, the goal of standardized testing is to
measure student knowledge and predict achievement. However, the high stakes
associated with these tests change the system being measured: high stress levels
cause many students to perform poorly; schools focus on teaching the test to give
their students an advantage; students seek training on how to become test wise
and answer questions correctly without really knowing the answers; and so on. The
validity of the testing is thus compromised, and the invasiveness of the measure
fundamentally changes the focus of the system from learning to test-preparation.

Use low-invasive measures whenever possible. Avoid high-invasive measures;
they yield questionable results, reduce system efficiency, and can result in the
system adapting to the measures. Consider using natural system indicators of
performance when possible (e.g., number of widgets produced), rather than
measures that will consume resources and introduce interference (e.g., employee
log of hours worked).

See also Cost-Benefit, Expectation Effects, Feedback Loop, Framing, and
          Signal-to-Noise Ratio.

fUniform Connectedness
Elements that are connected by uniform visual properties,
such as color, are perceived to be more related than
elements that are not connected.


The principle of uniform connectedness is the most recent addition to the              1
                                                                                            The seminal work on uniform connectedness
                                                                                           is “Rethinking Perceptual Organization: The
principles referred to as Gestalt principles of perception. It asserts that elements
                                                                                           Role of Uniform Connectedness” by Stephen
connected to one another by uniform visual properties are perceived as a single            Palmer and Irvin Rock, 1994, Psychonomic
group or chunk and are interpreted as being more related than elements that                Bulletin &amp; Review, vol. 1, p. 29–55.
are not connected. For example, a simple matrix composed of dots is perceived
as columns when common regions or lines connect the dots vertically, and is
perceived as rows when common regions or lines connect the dots horizontally.1

There are two basic strategies for applying uniform connectedness in a design:
common regions and connecting lines. Common regions are formed when
edges come together and bound a visual area, grouping the elements within the
region. This technique is often used to group elements in software and buttons
on television remote controls. Connecting lines are formed when an explicit line
joins elements, grouping the connected elements. This technique is often used
to connect elements that are not otherwise obviously grouped (e.g., not located
closely together) or to imply a sequence.

Uniform connectedness will generally overpower the other Gestalt principles. In
a design where uniform connectedness is at odds with proximity or similarity, the
elements that are uniformly connected will appear more related than either the
proximal or similar elements. This makes uniform connectedness especially useful
when correcting poorly designed configurations that would otherwise be difficult
to modify. For example, the location of controls on a control panel is generally
not easily modified, but a particular set of controls can be grouped by connecting
them in a common region using paint or overlays. In this case, the uniform
connectedness resulting from the common region will overwhelm and correct the
poor control positions.

Use uniform connectedness to visually connect or group elements in a design.
Employ common regions to group text elements and clusters of control elements,
and connecting lines to group individual elements and imply sequence. Consider
this principle when correcting poorly designed control and display configurations.

See also Chunking, Figure-Ground Relationship, and Good Continuation.

A tendency to find a product desirable because
it has a high price.



Every student of economics learns that the price and demand of commodities are           1

                                                                                             The Theory of the Leisure Class: An Economic

                                                                                             Study of Institutions by Thorstein Veblen,
predicts that given two equivalent products, a lower price will increase demand              Macmillan, 1899. See also “Bandwagon,
and a higher price will decrease demand. The Veblen effect is one exception to               Snob, and Veblen Effects in the Theory of
this law. The economist Thorstein Veblen observed that in some cases increasing              Consumers’ Demand” by Harvey Leibenstein,
price can, by itself, increase demand and decreasing price can, by itself, decrease          Quarterly Journal of Economics, 1950, vol. 64,
                                                                                             p. 183–207.
demand. This effect is typically associated with luxury items and services such
as art, jewelry, clothes, cars, fine wines, hotels, and luxury cruises. The cause,       2
                                                                                             See, for example, “In Tuition Game, Popularity
according to Veblen, regards the human desire for status, of which he asserts two            Rises With Price” by Jonathan Glater and Alan
types: pecuniary emulation, defined as the desire to be perceived as belonging               Finder, New York Times, December 12, 2006.
to upper classes; and invidious comparison, defined as the desire to not be
perceived as belonging to lower classes.1

The Veblen effect is relevant when a good or service is plainly visible to others,
strongly associated with status or affluence, distinguishable from competitors
and knockoffs, and priced high relative to competitors. For example, many
universities have learned the hard way that parents and students equate the
quality of education with the price of tuition. To increase enrollment and address
complaints about the rising costs of education, many boards of trustees reduce
tuition. This, however, invariably results in a decrease, not an increase, in student
enrollment. Reducing the price of tuition decreases both the perceived quality of
the education offered by the school and the prestige of the school itself, which
correspondingly decreases demand. Conversely, when universities increase the
price of tuition, student enrollment increases. However, this increase creates
a perception problem of price gouging and a practical problem of affordability.
The solution adopted by many schools is to simultaneously increase the price of
tuition and the availability of hardship discounts and financial aid. This permits
an institution to increase enrollment, increase its patina of quality and prestige,
and appear benevolent by offering increased student discounts and assistance.2

discounting or assistance programs will undermine the effect.

Consider the Veblen effect in marketing and pricing when the basic conditions for
its application are satisfied. To leverage the effect, promote associations with high-
status people (e.g., celebrities). Ensure that form factor and branding clearly and
memorably distinguish products from competitors. Employ strategies to discourage
knockoffs, including legal protection (e.g., trademarks and patents), watermarking,
and aggressive counter advertising. Set pricing high based on the intangible
aspects of the offering versus its marginal cost.

information into logical categories, and then hides them within a parent control,
such as a software menu. The category names remain visible, but the controls
and information remain concealed until the parent control is activated. Context
sensitivity reveals and conceals controls and information based on different
system contexts. Relevant controls and information for a particular context are
made highly visible, and irrelevant controls (e.g., unavailable functions), are
minimized or hidden.

Visible controls and information serve as reminders for what is and is not possible.
Design systems that clearly indicate the system status, the possible actions that
can be performed, and the consequences of the actions performed. Immediately
acknowledge user actions with clear feedback. Avoid kitchen-sink visibility. Make
the degree of visibility of controls and information correspond to their relevance.
Use hierarchical organization and context sensitivity to minimize complexity and
maximize visibility.

fWabi-Sabi
Objects and environments that embody naturalness,
simplicity, and subtle imperfection achieve a deeper, more
meaningful aesthetic.


Wabi-sabi is at once a world view, philosophy of life, type of aesthetic, and, by
                                                                                       1
                                                                                           See Wabi-Sabi: For Artists, Designers, Poets
                                                                                           &amp; Philosophers by Leonard Koren, Stone
extension, principle of design. The term brings together two distinct Japanese
                                                                                           Bridge Press, 1994; and Wabi Sabi Style by
concepts: wabi, which refers to a kind of transcendental beauty achieved through           James Crowley and Sandra Crowley, Gibbs
subtle imperfection, such as pottery that reflects its handmade craftsmanship;             Smith, 2005.
and sabi, which refers to beauty that comes with time, such as the patina found
on aged copper. In the latter part of sixteenth-century Japan, a student of the Way
of Tea, Sen no Rikyu, was tasked to tend the garden by his master, Takeno Jo-o.
Rikyu cleared the garden of debris and scrupulously raked the grounds. Once the
garden was perfectly groomed, he proceeded to shake a cherry tree, causing a
few flowers and leaves to fall randomly to the ground. This is wabi-sabi.1

In many ways, the primary aesthetic ideals of wabi-sabi — impermanence,
imperfection, and incompleteness — run counter to traditional Western
aesthetic values. For example, Western values typically revere the symmetry of
manufactured forms and the durability of synthetic materials, whereas wabi-sabi
favors the asymmetry of organic forms and the perishability of natural materials.
Wabi-sabi should not, however, be construed as an unkempt or disorganized
aesthetic, a common mistaken association often referred to as wabi-slobby. A
defining characteristic of wabi-sabi is that an object or environment appears
respected and cared for, as with Rikyu’s garden. The aesthetic is not disordered,
but rather naturally ordered — that is, ordered in the way that nature is ordered,
drawn of crooked lines and curves instead of straight lines and right angles. With
the rise of the sustainability movement, Western ideals have begun to evolve
toward wabi-sabi, albeit for different reasons. A home interior designed to be wabi-
sabi would be clean and minimalist, employ unfinished natural materials such as
wood, stone, and metal, and use a palette of muted natural colors (e.g., browns,
greens, grays, and rusts). A home interior designed to be sustainable would also
employ many of the same natural materials, but the emphasis would be on their
sustainability and recyclability, not their aesthetics.

Though wabi-sabi is a humble aesthetic, it is also a sophisticated aesthetic that
runs contrary to many innate biases and Western cultural conventions.
Accordingly, consider wabi-sabi when designing for Eastern audiences or Western
audiences that have sophisticated artistic and design sensibilities. Incorporate
elements that embody impermanence, imperfection, and incompleteness in the
design. Employ these elements with subtlety, however, as their extremes can
undermine the integrity of the aesthetic (e.g., a dwelling that looks as though it
may collapse at any moment is too impermanent and too incomplete). Favor colors
drawn from nature, natural materials and finishes, and organic forms and motifs.

See also Biophilia Effect, Desire Line, Propositional Density, and Symmetry.

fWeakest Link
The use of a weak element that will fail in order to protect
other elements in the system from damage.


It is said that a chain is only as strong as its weakest link. This suggests that the
weakest link in a chain is also the least valuable and most expendable link—a
liability to the system that should be reinforced, replaced, or removed. However,
the weakest element in a system can be used to protect other more important
elements, essentially making the weakest link one of the most important
elements in the system. For example, electrical circuits are protected by fuses,
which are designed to fail so that a power surge doesn’t damage the circuit.
The fuse is the weakest link in the system. As such, the fuse is also the most
valuable link in the system.

The weakest link in a system can function in one of two ways: it can fail and
passively minimize damage, or it can fail and activate additional systems that
actively minimize damage. An example of a passive design is the use of fuses in
electrical circuits as described above. An example of an active design is the use
of automatic sprinklers in a building. Sprinkler systems are typically activated by
components that fail (e.g., liquid in a glass cell that expands to break the glass
when heated), which then activate the release of the water.

Applying the weakest link principle involves several steps: identify a failure
condition; identify or define the weakest link in the system for that failure
condition; further weaken the weakest link and strengthen the other links as
necessary to address the failure condition; and ensure that the weakest link
will only fail under the appropriate, predefined failure conditions. The weakest
link principle is limited in application to systems in which a particular failure
condition affects multiple elements in the system. Systems with decentralized and
disconnected elements cannot benefit from the principle since the links in the
chain are not connected.

The weakest link in a system exists by design or by default—either way, it is
always present. Therefore, consider the weakest link principle when designing
systems in which failures affect multiple elements. Use the weakest link to shut
down the system or activate other protective systems. Perform adequate testing to
ensure that only specified failure conditions cause the weakest link to fail. Further
weaken the weakest element and harden other elements as needed to ensure the
proper failure response.

See also Factor of Safety, Modularity, and Structural Forms.

fAbout the Authors

William Lidwell
Will Lidwell writes, speaks, and consults on matters of design and engineering
psychology. He is particularly interested in cross-disciplinary design and the
means by which organizations achieve and institutionalize innovation. Lidwell is
author of Deconstructing Product Design (Rockport Publishers) and Guidelines
for Excellence in Management (South-Western), and is a frequent contributor to
popular design magazines and journals. He lives and works out of his studio in
Houston, Texas.




Kritina Holden
Kritina Holden is the technical lead and acting manager of the NASA Johnson
Space Center Usability Testing and Analysis Facility (UTAF). She is responsible for
proposal writing, project planning, personnel tasking and mentoring, and ensuring
technical quality of UTAF products. She also serves a technical role, providing
human factors support to the Orion Crew Exploration Vehicle Cockpit team in
activities such as requirements development, task analysis, and crew evaluations.
Holden is an adjunct professor at the University of Houston–Clear Lake.




Jill Butler
Jill Butler has been drawing, designing, and creating things for as long as she
can remember. Some of her earliest memories include her mother’s dispensing
of design advice such as, “Everything looks better outlined in black” and “Odd
numbers of items are more interesting than even numbers.” To test these
theories, Butler worked as a designer and consultant for various organizations
before founding Stuff Creators Design Studio in 2002. She has also taught
design, desktop publishing, and typography classes at the University of Houston
and Kingwood Community College. An award-winning graphic designer, Butler
has interests ranging from information design and user experience design to
illustration and paper engineering. She lives and works in Houston, Texas.



For more information about Universal Principles of Design—including
updates, recommended readings, and author information—visit
www.universalprinciplesofdesign.com.
