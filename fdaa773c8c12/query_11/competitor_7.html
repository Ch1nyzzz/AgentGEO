Bold, Italics, and Underlining
Use bold, italics, and underlining for titles, labels, captions, and short word
sequences when the elements need to be subtly differentiated. Bolding is
generally preferred over other techniques as it adds minimal noise to the design
and clearly highlights target elements. Italics add minimal noise to a design,
but are less detectable and legible. Underlining adds considerable noise and
compromises legibility, and should be used sparingly if at all.2

Typeface
Uppercase text in short word sequences is easily scanned, and thus can be
advantageous when applied to labels and keywords within a busy display. Avoid
using different fonts as a highlighting technique. A detectable difference between
fonts is difficult to achieve without also disrupting the aesthetics of the typography.

Color
Color is a potentially effective highlighting technique, but should be used sparingly
and only in concert with other highlighting techniques. Highlight using a few
desaturated colors that are clearly distinct from one another.

Inversing
Inversing elements works well with text, but may not work as well with icons or
shapes. It is effective at attracting attention, but adds considerable noise to the
design and therefore should be used sparingly.

Blinking
Blinking—flashing an element between two states—is a powerful technique
for attracting attention. Blinking should be used only to indicate highly critical
information that requires an immediate response, such as an emergency status
light. It is important to be able to turn off the blinking once it is acknowledged,
as it compromises legibility, and distracts from other tasks.

See also Color, Legibility, and Readability.

somewhat surprising as lavish decoration is historically considered an indication of
affluence and luxury.

society and the perceived value associated with horror vacui—that is, for those
accustomed to having more, less is more, and for those accustomed to having
less, more is more. Others have speculated that the relationship is more a
function of education than affluence. This area of research is immature and much
follow-up is required to tease out the causal factors, but the preliminary findings
are compelling.2

fIconic Representation
The use of pictorial images to improve the recognition and
recall of signs and controls.


Iconic representation is the use of pictorial images to make actions, objects,           1
                                                                                             The seminal work in iconic representation is
                                                                                             Symbol Sourcebook by Henry Dreyfuss, Van
and concepts in a display easier to find, recognize, learn, and remember.
                                                                                             Nostrand Reinhold, 1984. The four kinds of
Iconic representations are used in signage, computer displays, and control                   iconic representation are derived from “Icons
panels. They can be used for identification (company logo), serve as a space-                at the Interface: Their Usefulness” by Yvonne
efficient alternative to text (road signs), or to draw attention to an item within an        Rogers, Interacting With Computers, vol. 1,
informational display (error icons appearing next to items in a list). There are four        p. 105–118.
types of iconic representation: similar, example, symbolic, and arbitrary.1

Similar icons use images that are visually analogous to an action, object, or
concept. They are most effective at representing simple actions, objects, or
concepts, and less effective when the complexity increases. For example, a sign
indicating a sharp curve ahead can be represented by a similar icon (e.g., curved
line). A sign to reduce speed, however, is an action not easily represented by
similar icons.

Example icons use images of things that exemplify or are commonly associated with
an action, object, or concept. They are particularly effective at representing complex
actions, objects, or concepts. For example, a sign indicating the location of an
airport uses an image of an airplane, rather than an image representing an airport.

Symbolic icons use images that represent an action, object, or concept at a higher
level of abstraction. They are effective when actions, objects, or concepts involve
well-established and easily recognizable objects. For example, a door lock control
on a car door uses an image of a padlock to indicate its function, even though the
padlock looks nothing like the actual control.

Arbitrary icons use images that bear little or no relationship to the action, object,
or concept—i.e., the relationship has to be learned. Generally, arbitrary icons
should only be used when developing cross-cultural or industry standards that will
be used for long periods of time. This gives people sufficient exposure to an icon
to make it an effective communication device. For example, the icon for radiation
must be learned, as nothing intrinsic to the image indicates radiation. Those who
work with radiation, however, recognize the symbol all over the world.

Iconic representation reduces performance load, conserves display and control
area, and makes signs and controls more understandable across cultures. Consider
similar icons when representations are simple and concrete. Use example icons
when representations are complex. Consider symbolic icons when representations
involve well-established and recognizable symbols. Consider arbitrary icons when
representations are to be used as standards. Generally, icons should be labeled
and share a common visual motif (style and color) for optimal performance.

See also Chunking, Performance Load, and Picture Superiority Effect.

A state of mental focus so intense that awareness of the
“real” world is lost, generally resulting in a feeling of joy
and satisfaction.


When perceptual and cognitive systems are under-taxed, people become apathetic         1
                                                                                           The elements of immersion adapted from
and bored. If they are over-taxed, people become stressed and frustrated.                  Flow: The Psychology of Optimal Experience
                                                                                           by Mihaly Csikszentmihalyi, Harper Collins
Immersion occurs when perceptual and cognitive systems are challenged at
                                                                                           Publishers, 1991. See also Narrative as Virtual

loses a sense of the “real” world and typically experiences intense feelings of joy        Hopkins University Press, 2000.
and satisfaction. Immersion can occur while working on a task, playing a game,
reading a book, or painting a picture. Immersion is characterized by one or more
of the following elements: 1

      •   challenges that can be overcome
      •   contexts where a person can focus without significant distraction
      •   clearly defined goals
      •   immediate feedback with regards to actions and overall performance
      •   a loss of awareness of the worries and frustrations of everyday life
      •   a feeling of control over actions, activities, and the environment
      •   a loss of concern regarding matters of the self (e.g., awareness of hunger

      •   a modified sense of time (e.g., hours can pass by in what seems

It is not clear which of these elements must be present in what combination to
create a generally immersive experience. For example, theme park rides can
provide rich sensory experiences with minimal cognitive engagement and still
be immersive. Conversely, complex games like chess can provide rich cognitive
engagement with minimal sensory experience and also be immersive. Given the
wide range of human cognitive abilities and relatively narrow range of perceptual
abilities, it is generally easier to design activities and environments that achieve
immersion through perceptual stimulation than through cognitive engagement.
However, perceptual immersion is more difficult to sustain for long periods of time
and is, therefore, usable only for relatively brief experiences. Optimal immersive
experiences involve both rich sensory experiences and rich cognitive engagement.

Incorporate elements of immersion in activities and environments that seek to
engage the attention of people over time—e.g., entertainment, instruction, games,
and exhibits. Provide clearly defined goals and challenges that can be overcome.
Design environments that minimize distractions, promote a feeling of control, and
provide feedback. Emphasize stimuli that distract people from the real world, and
suppress stimuli that remind them of the real world. Achieving the right balance
of elements to achieve immersion is more art than science; therefore, leave ample
time in the design process for experimentation and tuning.

See also Chunking, Depth of Processing, Inattentional Blindness, Performance

A method of information presentation in which information
is presented in descending order of importance.


The inverted pyramid refers to a method of information presentation in which                1
                                                                                                 The development of the inverted pyramid is
                                                                                                attributed to Edwin Stanton, Abraham Lincoln’s
critical information is presented first, and then additional elaborative information
                                                                                                Secretary of War (1865). See, for example, Just
is presented in descending order of importance. In the pyramid metaphor, the                    the Facts: How “Objectivity” Came to Define
broad base of the pyramid represents the least important information, while the                 American Journalism by David T. Z. Mindich,
tip of the pyramid represents the most important information. For example, in                   New York University Press, 2000.
traditional scientific writing, a historical foundation (tip of the pyramid) is presented
first, followed by arguments and evidence, and then a conclusion (base of the
pyramid). To invert the pyramid is to present the important information first, and
the background information last. The inverted pyramid has been a standard in
journalism for over one hundred years, and has found wide use in instructional
design, technical writing, and Internet publishing.1

The inverted pyramid consists of a lead (critical information) and a body (elaborative
information). The lead is a terse summary of the “what,” “where,” “when,” “who,”
“why,” and “how” of the information. The body consists of subsequent paragraphs
or chunks of information that elaborate facts and details in descending order of
importance. It is increasingly common in Internet publishing to present only the
lead, and make the body available upon request (e.g., with a “more…” link).

The inverted pyramid offers a number of benefits over traditional methods of
information presentation: it conveys the key aspects of the information quickly;
it establishes a context in which to interpret subsequent facts; initial chunks of
information are more likely to be remembered than later chunks of information; it
permits efficient searching and scanning of information; and information can be
easily edited for length, knowing that the least important information will always be
at the end. The efficiency of the inverted pyramid is also its limiting factor. While
it provides a succinct, information-dense method of information presentation, the
inverted pyramid does not allow the flexibility of building suspense or creating a
surprise ending, so is often perceived as uninteresting and boring.

Use the inverted pyramid when presentation efficiency is important. Develop
leads that present a concise overview of the information, followed by short chunks
of information of decreasing importance. If interestingness is important and has
been compromised, include multiple media, interesting layouts, and interactivity
to complement the information and actively engage audiences. When it is not
possible to use the inverted pyramid method (e.g., in standard scientific writing),
consider a compromise solution based on the principle by providing an executive
summary at the beginning to present the key findings.

See also Advance Organizer, Form Follows Function, Ockham’s Razor,

The process of organizing information into related
groupings in order to manage complexity and reinforce
relationships in the information.


Layering involves organizing information into related groupings and then               1

and three-dimensional.1                                                                2

Two-dimensional layering involves separating information into layers such that             53–65; 81–95 [Layering and Separation; Color
only one layer of information can be viewed at a time. Two-dimensional layers can          and Information].
be revealed in either a linear or nonlinear fashion. Linear layers are useful when
information has a clear beginning, middle, and end (e.g., stories), and are revealed
successively like pages in a book. Nonlinear layers are useful when reinforcing
relationships between the layers. The types of nonlinear layer relationships can
be hierarchical, parallel, or web. Hierarchical layers are useful when information
has superordinate and subordinate relationships within itself (e.g., organizational
chart), and are revealed top-down or bottom-up in rigid accordance with the
hierarchical structure. Parallel layers are useful when information is based on the
organization of other information (e.g., thesaurus), and are revealed through some
correspondence with that organization. Web layers are useful when information
has many different kinds of relationships within itself (e.g., hypertext), and are
revealed through any number of associative linkages to other layers.

Three-dimensional layering involves separating information into layers such
that multiple layers of information can be viewed at a time. Three-dimensional
layers are revealed as either opaque or transparent planes of information that
sit atop one another (i.e., in a third dimension). Opaque layers are useful when
additional information about a particular item is desired without switching
contexts (e.g., software pop-up windows). Transparent layers are useful when
overlays of information combine to illustrate concepts or highlight relationships
(e.g., weather maps).2

Use two-dimensional layering to manage complexity and direct navigation through
information. Consider linear layers when telling stories and presenting sequences
of time-based events, and use nonlinear layers when emphasizing relationships
within the information. Use three-dimensional layering to elaborate information
and illustrate concepts without switching contexts. Consider opaque layers when
presenting elaborative information, and transparent layers when illustrating
concepts or highlighting relationships in information.

fLife Cycle
All products progress sequentially through four stages of
existence: introduction, growth, maturity, and decline.


All products progress through stages of existence that roughly correspond to birth,         1
                                                                                                The seminal work on the product life cycle is
life, and death. For example, a new type of electronic device is envisioned and                 “International Investment and International
                                                                                                Trade in the Product Cycle” by Raymond
developed; its popularity grows; after a while its sales plateau; and then finally,             Vernon, Quarterly Journal of Economics, 1966,
the sales decline. Understanding the implications of each of the stages allows                  vol. 80, p. 190–207. A contemporary review
designers to prepare for the unique and evolving requirements of a product over                 of the product life cycle is found in Marketing
its lifetime. There are four basic stages of life for all products: introduction, growth,       Management by Philip Kotler, Prentice-Hall,
                                                                                                11th ed., 2002.
maturity, and decline.1

Introduction
The introduction stage is the official birth of a product. It will at times overlap with
the late testing stage of the development cycle. The design focus is to monitor
early use of the design to ensure proper performance, working closely with
customers to tune or patch the design as necessary.

Growth
The growth stage is the most challenging stage, where most products fail. The
design focus is to scale the supply and performance of the product to meet the
growing demand, and provide the level of support necessary to maintain customer
satisfaction and growth. Efforts to gather requirements for the next-generation
product should be underway at this stage.

Maturity
The maturity stage is the peak of the product life cycle. Product sales have begun
to diminish and competition from competitors is strong. The design focus at this
stage is to enhance and refine the product to maximize customer satisfaction and
retention. Design and development of the next generation product should be well
underway at this stage.

Decline
The decline stage is the end of the life cycle. Product sales continue to decline
and core market share is at risk. The design focus is to minimize maintenance
costs and develop transition strategies to migrate customers to new products.
Testing of the next generation product should begin at this stage.

Consider the life cycle of a product when planning and preparing for the future.
During the introduction phase, work closely with early adopters to refine and tune
products. During the growth stage, focus on scaling product supply and performance.
During the maturity stage, focus on customer satisfaction through performance
enhancements and improved support. During decline, focus on facilitating the
transition to next generation products. Note that the development cycle for the next-
generation product begins during the growth stage of a current-generation product.

See also Development Cycle, Hierarchy of Needs, Iteration, and Prototyping.

mapping is considered to be poor. For example, an electric window control on a

Good mapping is primarily a function of similarity of layout, behavior, or meaning.
When the layout of stovetop controls corresponds to the layout of burners, this
is similarity of layout; when turning a steering wheel left turns the car left, this is
similarity of behavior; when an emergency shut-off button is colored red, this is
similarity of meaning (e.g., most people associate red with stop). In each case,
similarity makes the control-effect relationship predictable, and therefore easy to use.3

Position controls so that their locations and behaviors correspond to the layout and
behavior of the device. Simple control-effect relationships work best. Avoid using
a single control for multiple functions whenever possible; it is difficult to achieve
good mappings for a one control-multiple effect relationship. In cases where this
is not possible, use visually distinct modes (e.g., different colors) to indicate active
functions. Be careful when relying on conventions to attach meaning to controls,
as different population groups may interpret the conventions differently (e.g., in
England, flipping a lightswitch up turns it off and flipping it down turns it on).

(e.g., making a robotic dog act like a real dog). Behavioral mimicry is useful for          William Morrow &amp; Company, 1998; and Cats’

existing solutions and design analogs. However, functional mimicry must be
performed with caution since the physical principles governing function may
not transfer from one context to another or from one scale to another (e.g., early
attempts at human flight by flapping wings).4

advances in design. Consider surface mimicry to improve usability, ensuring that
the perception of the design corresponds to how it functions or is to be used.
Consider behavioral mimicry to improve likeability, but exercise caution when
mimicking complex behaviors. Consider functional mimicry to assist in solving
mechanical and structural problems, but also consider transfer and scaling effects
that may undermine the success of the mimicked properties.

fMnemonic Device
A method of reorganizing information to make the
information easier to remember.


Mnemonic devices are used to reorganize information so that the information            1
                                                                                           The seminal contemporary work on
                                                                                           mnemonics is The Art of Memory by Frances
is simpler and more meaningful and, therefore, more easily remembered. They
                                                                                           A. Yates, University of Chicago Press, 1974.
involve the use of imagery or words in specific ways to link unfamiliar information
to familiar information that resides in memory. Mnemonic devices that involve
imagery are strongest when they are vivid, peculiar, and exaggerated in size or
quantity. Mnemonic devices that involve words are strongest when the words are
familiar and clearly related. Mnemonic devices are useful for remembering names
of new things, large amounts of rote information, and sequences of events or
procedures. A few examples of mnemonic devices include:1

First-Letter—The first letter of items to be recalled are used to form the first
letters in a meaningful phrase, or combined to form an acronym. For example,
Please Excuse My Dear Aunt Sally to assist in the recall of the arithmetic order of
operations: Parentheses, Exponents, Multiplication, Division, Addition, Subtraction;
or AIDS as a simple means of referring to and remembering Acquired Immune
Deficiency Syndrome.

Keyword—A word that is similar to, or a subset of, a word or phrase that is linked
to a familiar bridging image to aid in recall. For example, the insurance company
AFLAC makes its company name more memorable by reinforcing the similarity
of the pronunciation of AFLAC and the quack of the duck. The duck in the
advertising is the bridging image.

Rhyme—One or more words in a phrase are linked to other words in the phrase
through rhyming schemes to aid in recall. For example, red touches yellow kill a
fellow is a popular mnemonic to distinguish the venomous coral snake from the
nonvenomous king snake.

Feature-Name—A word that is related to one or more features of something that
is linked to a familiar bridging image to aid in recall. For example, the rounded
shape of the Volkswagen Beetle is a key feature of its biological namesake, which
serves as the bridging image.

Consider mnemonic devices when developing corporate and product identities,
slogans and logos for advertising campaigns, instructional materials dealing with
rote information and complex procedures, and other contexts in which ease
of recall is critical to success. Use vivid and concrete imagery and words that
leverage familiar and related concepts.

See also Chunking, Serial Position Effects, and von Restorff Effect.

A method of managing system complexity that involves
dividing large systems into multiple, smaller self-
contained systems.


Modularity is a structural principle used to manage complexity in systems.               1
                                                                                             The seminal work on modularity is Design
It involves identifying functional clusters of similarity in systems, and then               Rules: Volume I. The Power of Modularity
                                                                                             by Carliss Y. Baldwin and Kim B. Clark, MIT
transforming the clusters into interdependent self-contained systems (modules).              Press, 2000.
For example, the modular design of computer memory chips provides computer
owners the option of increasing the memory in their computer without any                 2
                                                                                             Many designers resist modularity for fear of
requirement to do so. If the design of the computer and memory chips were not                limiting creativity. However, modules applied
modular in this way, the only practical method of upgrading computer memory                  at the appropriate level will liberate designers
would be to buy a new computer. The option to easily and inexpensively improve               from useless activity and allow them to focus

advantage over non-modular designs.1

Modules should be designed to hide their internal complexity and interact with
other modules through simple interfaces. The result is an overall reduction
in system complexity and a decentralization of system architecture, which
improves reliability, flexibility, and maintainability. Additionally, a modular design
encourages innovation of modules, as well as competition regarding their design
and manufacture; it creates an opportunity for third parties to compete to develop
better modules.

The benefits of modular design are not without costs: modular systems are
significantly more complex to design than nonmodular systems. Designers must
have significant knowledge of the inner workings of a system and its environment
to decompose the systems into modules, and then make those modules function
together as a whole. Consequently, most modular systems that exist today did not
begin that way—they have been incrementally transformed to be more modular
as knowledge of the system increased.

Consider modularity when designing or modifying complex systems. Identify
functional clusters of similarity in systems, and clearly define their relationships
with other system elements. If feasible, create modules that conceal their
complexity and communicate with other modules through simple, standard
interfaces. Do not attempt complex modular designs without experienced
designers and a thorough understanding of the system. However, consider the
incremental modularization of existing systems, especially during maintenance
and product updates.2

See also 80/20 Rule, Chunking, and Cost-Benefit.

perceived as less attractive because it is further from the average facial appearance

prototypes are updated and the definition of facial beauty changes.

of beauty for that population. There are other elements that contribute to
attractiveness (e.g., smile versus scowl), but faces that are not average will

fNormal Distribution
A term used to describe a set of data, that when plotted,
forms the shape of a symmetrical, bell-shaped curve.1


Normal distributions result when many independently measured values of a               1
                                                                                           Also known as standard normal distribution,
                                                                                           Gaussian distribution, and bell curve.
variable are plotted. The resulting bell-shaped curve is symmetrical, rising from a
small number of cases at both extremes to a large number of cases in the middle.
Normal distributions are found everywhere—annual temperature averages,
                                                                                       2
                                                                                           Anthropometric data drawn from The Measure
                                                                                           of Man and Woman by Alvin R. Tilley and
stock market fluctuations, student test scores—and are thus commonly used to
                                                                                           Henry Dreyfuss Associates, The Whitney
determine the parameters of a design.                                                      Library of Design, 1993.

In a normal distribution, the average of the variable measured is also the most
common. As the variable deviates from this average, its frequency diminishes in
accordance with the area under the curve. However, it is a mistake to conclude
that the average is the preferred design parameter because it is the most
common. Generally, a range across the normal distribution must be considered
in defining design parameters, since variance between the average and the rest
of the population translates to the variance the design must accommodate. For
example, a shoe designed for the average of a population would fit only about 68
percent of the population.

Additionally, it is important to avoid trying to create something that is average in
all dimensions. A person average in one measure will not be average in other
measures. The probability that a person will match the average of their population
group in two measures is approximately 7 percent; this falls to less than 1 percent
for eight measures. The common belief that average people exist and are the
standard to which designers should design is called the “average person fallacy.”2

Where possible, create designs that will accommodate 98 percent of the
population; namely, the first to the 99th percentile. While design considerations
can be expanded to accommodate a larger portion of the population, generally,
the larger the audience accommodated, the greater the costs. Consideration of
the target population is key. When designing specifically for a narrow portion of
the population (e.g., airline seats that will accommodate 98 percent of American
males), it is crucial to obtain the appropriate measurement data for this very
specific group.

See also Convergence, Most Advanced Yet Acceptable, and Most Average Facial
         Appearance Effect.

Four social dynamics underlie NIH: belief that internal capabilities are superior
                                                                                            2006.
to external capabilities; fear of losing control; desire for credit and status; and

from a perception of superiority is often pervasive in organizations with a proud

capacity to consider external sources. Correction typically requires a significant
failure to humble the organization and reset the culture. Fear of losing control is
common when groups perceive a risk to their jobs or status in an organization,

investments in current or legacy initiatives is difficult to overcome. Correction

scanning to stay abreast of the activities of competitors and the industry in
general. Consider open innovation models, competitions (e.g., Netflix Prize), and
outside collaborations to institutionalize a meritocratic approach to new ideas.

A method for predictably altering behavior without
restricting options or significantly changing incentives.1


People prefer the path of least resistance when making decisions. When the path         1
                                                                                            Also known as choice architecture.
of least resistance happens to lead to a generally favorable outcome everyone is        2
                                                                                            The seminal work on nudges is Nudge:
happy. When the path of least resistance leads to a generally unfavorable
                                                                                            Improving Decisions About Health, Wealth,
outcome, however, the results are problematic. For example, when the default                and Happiness by Richard Thaler and Cass
option for new employees is to not be registered for a basic pension program,               Sunstein, Penguin, 2008. See also Choices,
savings rates are very low. However, when the default option is to enroll                   Values, and Frames by Daniel Kahneman
                                                                                            and Amos Tversky, Cambridge University
employees automatically into a basic pension plan, savings rates increase
                                                                                            Press, 2000.

The following methods are common nudging techniques:

  Defaults — Select defaults that do the least harm and most good (e.g., many
  lives are lost due to lack of available organ donations, a shortage that could be
  addressed by changing the default enrollment from opt-in to opt-out).

  Feedback — Provide visible and immediate feedback for actions and inactions
  (e.g., many modern automobiles have alert lights on the dashboard that stay on
  until the seatbelt is fastened, increasing seatbelt usage).

  Incentives — Avoid incentive conflicts and align incentives to preferred
  behaviors (e.g., the “Cash for Clunkers” legislation passed in the United States
  in 2009 provided a cash incentive for consumers to trade in older cars for new
  cars, boosting sales for the ailing automotive industry and reducing total energy
  consumption and pollution).

  Structured Choices — Provide the means to simplify and filter complexity to
  facilitate decision making (e.g., Netflix structures choices for customers to help
  them find movies, enabling them to search and browse based on titles, actors,
  directors, genres, and the recommendations of other customers).

  Visible Goals — Make simple performance measures clearly visible so that
  people can immediately assess their performance against a goal state (e.g.,
  clearly displaying manufacturing output and goals in factories is often, by itself,
  sufficient to increase productivity).2

Consider nudges in the design of objects and environments where behavior
modification is key. Set default states that correspond to the most generally
desired option, not the most conservative option. Provide clear, visible, and
immediate feedback to reinforce desired actions and mildly punish undesired
behaviors. Align incentives with desired behaviors, being careful to avoid incentive
conflict. Simplify and structure choices when decision-making parameters are
complex. Make goals and performance status clearly visible.

See also Affordance, Confirmation, Constraint, Framing, and Mapping.

There is also an aesthetic appeal to the principle, which likens the “cutting”

solution—the design is a cleaner, purer result.

fOperant Conditioning
A technique used to modify behavior by reinforcing
desired behaviors, and ignoring or punishing
undesired behaviors.1


Operant conditioning is probably the most researched and well-known technique           1
                                                                                            Also known as instrumental conditioning.
used to modify behavior. The technique involves increasing or decreasing a
particular behavior by associating the behavior with a positive or negative condition   2
                                                                                            The seminal work on operant conditioning is
(e.g., rewards or punishments). Operant conditioning is commonly applied to                 The Behavior of Organisms: An Experimental
                                                                                            Analysis by Burrhus F. Skinner, Appleton-
animal training, instructional design, video game design, incentive programs,
                                                                                            Century, 1938; a nice contemporary book on
gambling devices, counseling, and behavioral therapy. It is also finding increased          the subject is Don’t Shoot the Dog: The New
application in artificial intelligence. There are three basic operant conditioning          Art of Teaching and Training by Karen Pryor,
techniques: positive reinforcement, negative reinforcement, and punishment.2                Bantam Doubleday Dell, 1999.


Positive reinforcement increases the probability of a behavior by associating the
behavior with a positive condition; pulling the lever on a slot machine results in
positive visual and auditory feedback, and a possible monetary reward. Negative
reinforcement increases the probability of a behavior by associating the behavior
with the removal of a negative condition; fastening a seat belt in a car silences
an annoying buzzer. Punishment decreases the probability of a behavior by
associating the behavior with a negative condition; touching a poison mushroom
in a video game reduces the score. Positive and negative reinforcement should be
used instead of punishment whenever possible. Punishment should be reserved
for rapidly extinguishing a behavior, or it should not be used at all.

Reinforcement and punishment are administered after a behavior is performed
one or more times. When there is a clear and predictive relationship between the
frequency of a behavior and an outcome, behavior will be paced to do just what is
required to receive reinforcement or avoid punishment. When there is not a clear
and predictive relationship between the frequency of behavior and the outcome,
behavior will be performed more frequently and will be more resistant to extinction
(the loss of the desired behavior). An optimal behavior modification plan typically
includes predictable reinforcement early in training (fixed ratio schedules) and less
predictable reinforcement later in the training (variable ratio schedules).

Use operant conditioning in design contexts where behavioral change is required.
Focus on positive or negative reinforcement, rather than punishment whenever
possible. Use fixed ratio schedules of reinforcement early in training. As basic
behaviors are mastered, switch to variable schedules of reinforcement.

See also Classical Conditioning and Shaping.

fPersonas
A technique that employs fictitious users to guide decision
making regarding features, interactions, and aesthetics.


The design that seeks to accommodate everybody generally accommodates                   1
                                                                                            The seminal work on personas is The Inmates
nobody well. For example, the percentage of visitors who actually buy products              Are Running the Asylum: Why High-Tech
                                                                                            Products Drive Us Crazy and How to Restore
on an e-commerce website is typically quite small relative to the total number of
                                                                                            the Sanity by Alan Cooper, SAMS, 1999. See
visitors, but most website designs (and redesigns) fail to consider the differing           also The Persona Lifecycle: Keeping People in
needs of buyers versus browsers — that is, they design for the average visitor, an          Mind Throughout the Product Design by John
impersonal and homogenized construct derived from sources such as visitation                Pruitt and Tamara Adlin, Elsevier, 2006.
statistics, surveys, and usability testing. It is better to understand and perfectly
meet the needs of the critical few than to poorly meet the needs of many. It is this
specific problem that personas seek to address.1

Personas involve the creation of profiles for a small number of archetypal users,
each profile representing a composite of a subpopulation of users. Information
for the profiles is derived from user and stakeholder interviews, reviews of market
research and customer feedback, and statistics about how a product is used
when available. Done right, the number of personas is small, with typically no
more than three primary personas representing the primary target audience,
and up to four secondary personas when the needs of the user population are
highly stratified. Each persona is typically represented with a photograph, name,
description, and details about specific interests and relevant behaviors. It is often
useful for members of the design, development, and testing teams to role-play
different personas. This clarifies user needs and behaviors and is an effective
means of creating empathy for the user perspective. Personas not only make
the target audience more real to designers and engineers, they also ensure that
requirements are prioritized to specifically meet the needs of high-value users.

The use of personas in the design process is increasing in popularity, though
empirical evidence for the technique as compared to more traditional approaches
is lacking. The measurable merits of the approach are difficult to ascertain due
to the proprietary and relatively secretive nature of the methodology developed
by Cooper. The unfortunate result is an abundance of teachers, consultants,
and practitioners engaging in their own version or interpretation of personas.
Nevertheless, the anecdotal evidence for the general approach — especially its
user-sensitizing impact on designers and developers — is compelling.

Consider personas early in the design process to define and prioritize require-
ments. Keep persona profiles short, preferably one eye span, so that the
information can be easily consulted. Limit the number of primary personas to
three and secondary personas to four. Base personas on interviews and market
research — do not make them up or recycle personas from past projects. The time
required to research and develop personas is generally less than one month.

See also 80/20 Rule, Desire Line, Iteration, and Normal Distribution.

                                                                                             than Words?” by Allan Paivio, T. B. Rogers,

                                                                                             and Padric C. Smythe, Psychonomic Science,

picture superiority effect applies only when people are asked to recall something
after more than thirty seconds from the time of exposure. The picture superiority
effect is strongest when the pictures represent common, concrete things versus
abstract things, such as a picture of a flag versus a picture depicting the concept
of freedom, and when pictures are distinct from one another, such as a mix of
objects versus objects of a single type.

The picture superiority effect advantage increases further when people are
casually exposed to information and the exposure time is limited. For example,
an advertisement for a clock repair shop that includes a picture of a clock will
be better recalled than the same advertisement without the picture. People not
interested in clock repair who see the advertisement with the picture will also be
better able to recall the brand if the need for clock repair service arises at a later
time. The strength of the picture superiority effect diminishes as the information
becomes more complex. For example, people are able to recall events from a story
presented as a silent movie as well as events from the same story read as text.3

Use the picture superiority effect to improve the recognition and recall of key
information. Use pictures and words together, and ensure that they reinforce
the same information for optimal effect. Pictures and words that conflict create
interference and dramatically inhibit recall. Consider the inclusion of meaningful
pictures in advertising campaigns when possible, especially when the goal is to
build company and product brand awareness.

Priming is an effective means of influence when the stimulus introduced activates
concepts that are consistent with a preexisting need or goal. For example, showing
an image of a person drinking soda before a movie would have an effect on thirsty
people, inducing more of them to buy soda than would otherwise, but it would
have no effect on nonthirsty people. However, since everyone in the audience
shares the goal of wanting to see a good movie, showing positive imagery and
movie previews will prime the audience to react more favorably to the movie
generally than they would otherwise. It is this latter kind of indirect prime — the
prime that is unnoticed — that is the most effective. When viewing a typical
advertisement, the audience knows there is an attempt at influence, and they
may consciously counteract it. By contrast, when the students in the experiment
were primed for rudeness or politeness, there was no obvious direct link and no
conscious awareness of the manipulation. If you told them why they were being so
rude or so polite, they would respond with incredulity.

Consider priming in all aspects of design. First impressions, contexts, and
antecedent events are all opportunities to influence subsequent reactions and
behaviors — this includes the way products are presented in packaging, the
articles adjacent to advertisements in newspapers, and the experiences leading
from the parking lot to the entryway of a retail store. Favor indirect primes over
direct primes, as the former tends to be more persistent and leaves no trace.

See also Cathedral Effect, Expectation Effect, and Exposure Effect.

Objects and environments with high PD (PD &gt; 1) are perceived to be more

are rich in meaning. Aspire to achieve the highest propositional density possible,
but make sure the deep propositions are complementary. Contradictory deep
propositions can confuse the message and nullify prospective benefits.

fProspect-Refuge
A tendency to prefer environments with unobstructed views
(prospects) and areas of concealment and retreat (refuges).


People prefer environments where they can easily survey their surroundings and         1
                                                                                           The seminal work on prospect-refuge theory is
                                                                                           The Experience of Landscape by Jay Appleton,
quickly hide or retreat to safety if necessary. Environments with both prospect
                                                                                           John Wiley &amp; Sons, 1975.
and refuge elements are perceived as safe places to explore and dwell, and
consequently are considered more aesthetic than environments without these
                                                                                       2
                                                                                           See, for example, The Wright Space: Pattern
elements. The principle is based on the evolutionary history of humans, reasoning
                                                                                           and Meaning in Frank Lloyd Wright’s Houses
that environments with ample prospects and refuges increased the probability of            by Grant Hildebrand, University of Washington
survival for pre-humans and early humans.1                                                 Press, 1991.


The prospect-refuge principle suggests that people prefer the edges, rather than
middles of spaces; spaces with ceilings or covers overhead; spaces with few
access points (protected at the back or side); spaces that provide unobstructed
views from multiple vantage points; and spaces that provide a sense of safety and
concealment. The preference for these elements is heightened if the environment
is perceived to be hazardous or potentially hazardous.

Environments that achieve a balance between prospects and refuges are the
most preferred. In natural environments, prospects include hills, mountains, and
trees near open settings. Refuges include enclosed spaces such as caves, dense
vegetation, and climbable trees with dense canopies nearby. In human-created
environments, prospects include deep terraces and balconies, and generous use
of windows and glass doors. Refuges include alcoves with lowered ceilings and
external barriers, such as gates and fences.2

The design goal of prospect-refuge can be summarized as the development of
spaces where people can see without being seen. Consider prospect-refuge in
the creation of landscapes, residences, offices, and communities. Create multiple
vantage points within a space, so that the internal and external areas can be easily
surveyed. Make large, open areas more appealing by using screening elements
to create partial refuges with side- and back-barriers while maintaining clear lines
of sight (e.g., shrubbery, partitions). Balance the use of prospect and refuge
elements for optimal effect—e.g., sunken floors and ceilings that open to larger
spaces enclosed by windows and glass doors.

See also Biophilia Effect, Cathedral Effect, Defensible Space, Savanna Preference,
         and Wayfinding.

The advantages of recognition over recall are often exploited in the design of
interfaces for complex systems. For example, early computer systems used
a command line interface, which required recall memory for hundreds of
commands. The effort associated with learning the commands made computers
difficult to use. The contemporary graphical user interface, which presents
commands in menus, allows users to browse the possible options, and select
from them accordingly. This eliminates the need to have the commands in recall
memory, and greatly simplifies the usability of computers.

Decision-making is also strongly influenced by recognition. A familiar option is
often selected over an unfamiliar option, even when the unfamiliar option may be
the best choice. For example, in a consumer study, people participating in a taste
test rated a known brand of peanut butter as superior to two unknown brands,
even though one of the unknown brands was objectively better (determined by
earlier blind taste tests). Recognition of an option is often a sufficient condition for
making a choice.2

readily accessible menus, decision aids, and similar devices to make available
options clearly visible. Emphasize the development of recognition memory in training
programs, and the development of brand awareness in advertising campaigns.

fRedundancy
The use of more elements than necessary to maintain the
performance of a system in the event of failure of one or
more of the elements.


System failure is the failure of a system to achieve a goal—e.g., communicate a
                                                                                            1
                                                                                                See, for example, Why Buildings Fall Down:
                                                                                                How Structures Fail by Matthys Levy and Mario
message, maintain a structural load, or maintain operation. It is inevitable that
                                                                                                Salvadori, W.W. Norton, 1992; and “Achieving
elements within a system will fail. It is not inevitable, however, that the system as a         Reliability: The Evolution of Redundancy in
whole fails. Redundancy is the surest method of preventing system failure. There                American Manned Spacecraft” by James E.
are four kinds of redundancy: diverse, homogenous, active, and passive.1                        Tomayko, Journal of the British Interplanetary
                                                                                                Society, 1985, vol. 38, p. 545–552.
Diverse redundancy is the use of multiple elements of different types (e.g., use
of text, audio, and video to present the same information). Diverse redundancy is
resistant to a single cause of failure, but is complex to implement and maintain.
For example, high-speed trains often have diverse redundancy in their braking
systems—one electric brake, one hydraulic brake, and one pneumatic brake. A
single cause is unlikely to result in a cascade failure in all three braking systems.

Homogenous redundancy is the use of multiple elements of a single type (e.g.,
use of multiple independent strands to compose a rope). Homogenous redun-
dancy is relatively simple to implement and maintain but is susceptible to single
causes of failure—i.e., the type of cause that results in failure in one element
can result in failure of other redundant elements. For example, a sharp edge that
severs one strand of a rope can sever others.

Active redundancy is the application of redundant elements at all times (e.g.,
using multiple independent pillars to support a roof). Active redundancy guards
against both system and element failure—i.e., it distributes loads across all
elements such that the load on the each element and the overall system
is reduced. Active redundancy also allows for element failure, repair, and
substitution with minimal disruption of system performance.

Passive redundancy is the application of redundant elements only when an
active element fails (e.g., using a spare tire on a vehicle in the event of a flat tire).
Passive redundancy is ideal for noncritical elements, but it will result in system
failure when used for elements critical to system operation. Passive redundancy is
the simplest and most common kind of redundancy.

Use diverse redundancy for critical systems when the probable causes of failure
cannot be anticipated. Use homogenous redundancy when the probable causes
of failure can be anticipated. Use active redundancy for critical systems that must
maintain stable performance in the event of element failure or extreme changes
in system load. Use passive redundancy for noncritical elements within systems,
or systems in which performance interruptions are tolerable. The four kinds of
redundancy should be used in combination to achieve highly reliable systems.

See also Factor of Safety, Modularity, Structural Forms, and Weakest Link.

fRosetta Stone
A technique for communicating novel information using
elements of common understanding.


At some point during the fourth century, all knowledge about ancient Egyptian          1
                                                                                           See, for example, The Rosetta Stone and the
scripts was lost, leaving no way to decipher extant hieroglyphics found on                 Rebirth of Ancient Egypt by John Ray, Harvard
                                                                                           University Press, 2007; and “A Message from
papyrus documents, stone tablets, and Egyptian monuments. Then in 1799,
                                                                                           Earth” by Carl Sagan, Linda Salzman Sagan,
Napoleon’s army discovered an Egyptian artifact that contained writing in classical        and Frank Drake, Science, Feb. 25, 1972, vol.
Greek and ancient Egyptian. This Rosetta stone, as it would become known,                  175(4024), p. 881–884.
enabled scholars to use their extensive knowledge of Greek to comparatively
translate the Egyptian texts, which turned out to be hieroglyphics and Demotic,
a cursive form of hieroglyphic script. The Rosetta stone illustrates the power of
embedding elements of common understanding in messages to ensure that their
meaning can be unlocked by a receiver who may not understand the language
of transmission. The principle has broad applications, ranging from the design
of effective instruction (e.g., using familiarity with one concept to teach another)
to the development of games and puzzles (e.g., crossword puzzles) to devising
communications for extraterrestrial intelligences (e.g., plaques designed for the
Pioneer 10 and Pioneer 11 space probes).1

Applying the principle involves two basic but nontrivial steps. First, identify and
embed an element of common understanding, or a key, that the receiver will
understand. For example, researchers in extraterrestrial communication speculate
that mathematical concepts (e.g., prime numbers, pi, the Pythagorean theorem)
are strong candidates for keys in any attempted E.T. communication because
of their universality — irrespective of differing perceptual faculties and cognitive
systems, any civilization advanced enough to send or receive radio signals or
recover a space probe will necessarily have an understanding of fundamental
mathematical concepts. It is critical to make the key identifiable as a key. The
breakthrough that enabled the deciphering of the Egyptian text on the Rosetta
stone was discovering that the three languages represented a single message,
a fact that was not at all evident. Second, construct the message to be revealed
in stages, with each stage acting as a supporting key for subsequent stages.
For example, in designing crossword puzzles, there are words that are relatively
straightforward and solvable based on the clues provided, and then there are
words that can be solved only by filling in the intersecting words, in many cases
permitting the discovery of the solution without ever solving the clue.

Consider the Rosetta Stone principle to lay the foundation for communication
and learning. Incorporate an element of common understanding to be used
as a key for the receiver. Make it clear that the key is a key. Generally, favor
keys that reference concrete objects that can be detected by the senses versus
abstract concepts. When no verifiable element of common understanding can be
identified, consider embedding numerous keys in the message, and referencing
archetypal and universal concepts.

See also Advance Organizer, Archetypes, and Propositional Density.

A technique of composition in which a medium is divided
into thirds, creating aesthetic positions for the primary
elements of a design. 1


The rule of thirds is a technique derived from the use of early grid systems in
                                                                                      1
                                                                                          Also known as golden grid rule.

composition. It is applied by dividing a medium into thirds both vertically and
horizontally, creating an invisible grid of nine rectangles and four intersections.   2
                                                                                           A nice introduction to compositional concepts
                                                                                          is Design and Composition by Nathan
The primary element within a design is then positioned on an intersection of the
                                                                                          Goldstein, Prentice-Hall, 1997.
grid. The asymmetry of the resulting composition is interesting to look at, and
generally agreed to be aesthetic.

The technique has a loyal following in design circles due to its use by the
Renaissance masters and its rough relationship to the golden ratio. Although
dividing a design into thirds yields a ratio different from the golden ratio (i.e.,
the 2/3 section = 0.666 versus golden ratio = 0.618), the users of the technique

rough approximation.

as to imbalance the composition, consider centering the element rather than
using the rule of thirds—especially when the strength of the primary element is
reinforced by the surrounding elements or space. If the surrounding elements
or space do not reinforce the primary element, use the rule of thirds and add a
secondary element (known as a counterpoint) to the opposing intersection of the
primary element to bring the composition to balance. In designs where there is a
strong vertical or horizontal element, it is common practice to align the element
along one of the grid lines of corresponding orientation.2

See also Alignment, Golden Ratio, and Symmetry.

fScaling Fallacy
A tendency to assume that a system that works at one
scale will also work at a smaller or larger scale.1


Much is made of the relative strength of small insects as compared to that              1
                                                                                            Also known as cube law and law of sizes.
of humans. For example, a leafcutter ant can carry about 50 times its weight;
whereas an average human can only carry about half its weight. The standard             2
                                                                                            The seminal work on scaling is Dialogues
reasoning goes that an ant scaled to the size of a human would retain this                  Concerning Two New Sciences by Galileo
                                                                                            Galilei, Prometheus Books [reprint], 1991.
strength-weight advantage, giving a 200-pound ant the ability to lift 10,000 pounds.
In actuality, however, an ant scaled to this size would only be able to lift about
                                                                                        3
                                                                                            “Design Flaw Seen as Failure Cause in Trident
50 pounds, assuming it could move at all. The effect of gravity at small scales is
                                                                                            2 Tests” by Andrew Rosenthal, New York
miniscule, but the effect increases dramatically with the size of an object. This           Times, August 17, 1989, p. 1.
underscores the basic lesson of the scaling fallacy—systems act differently at
different scales. There are two basic kinds of scaling assumptions to avoid when
growing or shrinking a design: load assumptions, and interaction assumptions.2

Load assumptions occur when designers scale a design by some factor, and
assume that the working stresses on the design scale by that same factor. For
example, initial designs of the Trident 2 missile, designed to be launched from
submarines, underestimated the effects of water pressure and turbulence during
launch. The anticipated estimates for pressure and turbulence were based largely
on the Trident 1 missile, which was much shorter and roughly half the weight
of the Trident 2. When the specifications for the Trident 1 were scaled to meet
the specifications for the Trident 2, the working stresses on the missile did not
scale by the same factor as its physical specification. The result was multiple
catastrophic failures in early tests, and a major redesign of the missile.3

Interaction assumptions occur when designers scale a design, and assume that
the way people and other systems interact with the design will be the same at
other levels of scale. For example, the design of very tall buildings involves many
possible interactions that do not exist for buildings of lesser size—problems of
evacuation in the case of fire, people seeking to commit suicide or base-jump
off of the roof, symbolic target for terrorist attacks, to name a few. These kinds
of interaction effects are usually an indirect consequence of the design, and
therefore can be difficult to anticipate and manage.

The best way to avoid the scaling fallacy is to be aware of the tendency to
make scaling assumptions. Therefore, raise awareness of load and interaction
assumptions in the design process. Verify load assumptions through the use of
careful calculations, systematic testing, and appropriate factors of safety. Minimize
incorrect interaction assumptions through careful research of analogous designs,
and monitoring of how the design is used once implemented.

See also Factor of Safety, Feedback Loop, Modularity, and Structural Forms.

fSelf-Similarity
A property in which a form is made up of parts similar to
the whole or to one another.


Many forms in nature exhibit self-similarity, and as a result it is commonly held to     1
                                                                                             The seminal work on self-similarity is Fractal
                                                                                             Geometry of Nature by Benoit B. Mandelbrot,
be an intrinsically aesthetic property. Natural forms tend to exhibit self-similarity
                                                                                             W. H. Freeman &amp; Company, 1988.
at many different levels of scale, whereas human-created forms generally do not.
For example, an aerial view of a coastline reveals the same basic edge pattern,
whether standing at the waters edge or viewed from low-Earth orbit. Although
varying levels of detail are seen, the same pattern emerges—the detail is simply a
mosaic of smaller wholes.1

Naturally occurring self-similarity is usually the result of a basic algorithmic
process called recursion. Recursion occurs when a system receives input,
modifies it slightly, and then feeds the output back into the system as input. This
recursive loop results in subtle variations in the form—perhaps smaller, skewed,
or rearranged—but is still recognizable as an approximation of the basic form.
For example, a person standing between two mirrors facing each other yields
an infinite sequence of smaller reflections of the person in the opposing mirror.
Recursion occurs with the looping of the light between the two mirrors; self-
similarity is evident in the successively smaller images in the mirrors.

The ubiquity of self-similarity in nature hints at an underlying order and algorithm,
and suggests ways to enhance the aesthetic (and perhaps structural) composition
of human-created forms. Consider, for example, the self-similarity of form and
function found in the compound arch structures of the Roman aqueducts and
the flying buttresses of gothic cathedrals, structures that are beautiful in form
and rarely equaled in their structural strength and longevity. The self-similarity in
these structures exists at only a few levels of scale, but the resulting aesthetic and
structural integrity are dramatic.

Consider self-similarity in all aspects of a design: story plots, visual displays, and
structural compositions. The reuse of a single, basic form to create many levels
of metaforms mimics nature’s tendency towards parsimony and redundancy.
Explore the use of basic, self-similar elements in a design to create interesting
organizations at multiple levels of scale.

See also Archetypes, Propositional Density, Similarity, Symmetry, and Visuospacial
         Resonance.

A technique used to teach a desired behavior by reinforcing

Complex behaviors can be difficult to teach. Shaping is a strategy whereby             1

chained together to achieve a desired result. For example, to teach a mouse

                                                                                           Dorigo and Marco Colombetti, MIT Press, 1997.
Often, shaping occurs without awareness. For example, video games use shaping
when initial game levels require simple inputs in order to “beat” the level (obtain
the reinforcement), and then require increasingly difficult controller actions to
master higher levels of the game. Salespeople use a form of shaping when they
offer a prize to come to their location, provide food and drink to discuss the sale,
and then offer a discount for making a purchase decision that day. Each action
toward the goal behavior (making the sale) is reinforced.

During shaping, behaviors that have nothing to do with the desired behavior
can get incidentally reinforced. For example, when training a mouse to press
a lever, the mouse may incidentally press a lever with one foot in the air. The
reinforcement for the lever press may also inadvertently reinforce the fact that the
foot was in the air. This behavior then becomes an integrated, but unnecessary
component of the desired behavior; the mouse lifts its foot whenever it presses
the lever. The development of this kind of superstitious behavior is common with
humans as well.

Use shaping to train complex behaviors in games, simulations, and learning
environments. Shaping does not address the “hows” or “whys” of a task, and
should, therefore, primarily be used to teach rote procedures and refine complex
motor tasks. Shaping is being increasingly used to train complex behaviors in
artificial beings, and should be considered when developing adaptive systems.3

fSignal-to-Noise Ratio
The ratio of relevant to irrelevant information in a display. The
highest possible signal-to-noise ratio is desirable in design.


All communication involves the creation, transmission, and reception of                1
                                                                                            The seminal works on signal-to-noise ratio in
                                                                                           information design are “A Decision-Making
information. During each stage of this process, the form of the information—the
                                                                                           Theory of Visual Detection” by Wilson P.
signal—is degraded, and extraneous information—noise—is added. Degradation                 Tanner Jr. and John A. Swets, Psychological
reduces the amount of useful information by altering its form. Noise reduces clarity       Review, 1954, vol. 61, p. 401–409; and Visual
by diluting useful information with useless information. The clarity of information        Display of Quantitative Information by Edward
can be understood as the ratio of remaining signal to added noise. For example, a          R. Tufte, Graphics Press, 1983.
graph with no extraneous elements would have a high signal-to-noise ratio whereas,
a graph with many extraneous elements would have a low signal-to-noise ratio. The
goal of good design is to maximize signal and minimize noise, thereby producing a
high signal-to-noise ratio.1

Maximizing signal means clearly communicating information with minimal
degradation. Signal degradation occurs when information is presented inefficiently:
unclear writing, inappropriate graphs, or ambiguous icons and labels. Signal
clarity is improved through simple and concise presentation of information. Simple
designs incur minimal performance loads, enabling people to better focus on the
meaning of the information. Signal degradation is minimized through research
and careful decision-making. For example, failing to use the correct type of graph
to present a certain kind of data can fundamentally distort the meaning of the
information. It is therefore important to make good design decisions at the outset,
testing when necessary to verify design directions. Emphasizing key aspects of the
information can also reduce signal degradation—e.g., highlighting or redundantly
coding important elements in a design.

Minimizing noise means removing unnecessary elements, and minimizing the
expression of necessary elements. It is important to realize that every unnecessary
data item, graphic, line, or symbol steals attention away from relevant elements.
Such unnecessary elements should be avoided or else eliminated. Necessary
elements should be minimized to the degree possible without compromising
function. For example, the expression of lines in grids and tables should be
thinned, lightened, and possibly even removed. Every element in a design should
be expressed to the extent necessary, but not beyond the extent necessary.
Excess is noise.

Seek to maximize the signal-to-noise ratio in design. Increase signal by keeping
designs simple, and selecting design strategies carefully. Consider enhancing key
aspects of information through techniques like redundant coding and highlighting.
Use well-accepted standards and guidelines when available to leverage
conventions and promote consistent implementation. Minimize noise by removing
unnecessary elements, and minimizing the expression of elements.

See also Alignment, Horror Vacui, Layering, Performance Load, and Propositional

Similarity of color results in the strongest grouping effect; it is strongest when the
number of colors is small, and is decreasingly effective as the number of colors
increases. Similarity of size is effective when the sizes of elements are clearly
distinguishable from one another, and is an especially appropriate grouping
strategy when the size of elements has additional benefits (e.g., large buttons
are easier to press). Similarity of shape is the weakest grouping strategy; it is
best used when the color and size of other elements is uniform, or when used in
conjunction with size or color.2

Use similarity to indicate relatedness among elements in a design. Represent
elements such that their similarity corresponds to their relatedness, and represent
unrelated or ambiguously related items using different colors, sizes, and shapes.

effects, ensuring that elements are sufficiently distinct to be easily detectable.

fStickiness
A method for dramatically increasing the recognition,
recall, and unsolicited sharing of an idea or expression.


Popularized by Malcolm Gladwell in his book The Tipping Point, the term                 1
                                                                                            The seminal work on stickiness is Made to
stickiness refers to the ability of certain ideas to become lodged in the cul-              Stick: Why Some Ideas Survive and Others
                                                                                            Die by Chip Heath and Dan Heath, Random
tural consciousness. Stickiness applies to anything that can be seen, heard, or
                                                                                            House, 2007.
touched — slogans, advertisements, and products. Six variables appear to be key
in the creation of sticky ideas:1

1.    Simplicity — The idea can be expressed simply and succinctly, without
      sacrificing depth (e.g., “It’s the economy, stupid,” used during Bill Clinton’s
      1992 U.S. presidential campaign).

2.    Surprise — The idea contains an element of surprise, which grabs attention
      (e.g., when the Center for Science in the Public Interest wanted to alarm
      consumers to the amount of fat in movie popcorn, they noted that it had
      more fat than “a bacon-and-eggs breakfast, a Big Mac and fries for lunch,
      and a steak dinner with all the trimmings — combined!”).

3.    Concreteness — The idea is specific and concrete, using plain language or
      imagery (e.g., John F. Kennedy’s 1962 moon speech: “We choose to go to
      the moon in this decade…”).

4.    Credibility — The idea is believable, often communicated by a trusted source
      or as an appeal to common sense (e.g., Subway restaurants’ Jared campaign
      engaged the personal testimonials of Jared Fogle, complete with before and
      after photographs, to show the benefits of his Subway sandwich diet).

5.    Emotion — The idea elicits an emotional reaction (e.g., on Halloween in
      the 1960s and 1970s, false rumors circulated that sadists were putting
      razor blades in apples, panicking parents and effectively shutting down the
      tradition of trick-or-treating for much of the United States).

6.    Story — The idea is expressed in the context of a story, dramatically
      increasing its memorability and retelling (e.g., the Cabbage Patch Kids craze
      was due to the story attached to them — each doll is uniquely featured,
      named, and delivered with a birth certificate from BabyLand Hospital).

Consider stickiness in the design of instruction, advertising, products, and other
contexts involving memory. Keep messaging succinct, but profound. Employ sur-
prise to capture attention and motivate sharing. Ensure that ideas are expressed
using specific time frames and objects or events that are available to the senses.
Favor presenting evidence and letting people draw their own conclusions.
Incorporate affective triggers to evoke a strong emotional response. Couch ideas in
rich contexts to improve memorability and transmissibility.

See also Archetypes, Propositional Density, Storytelling, and von Restorff Effect.

fStorytelling
A method of creating imagery, emotions, and
understanding of events through an interaction between a
storyteller and an audience.


Storytelling is uniquely human. It is the original method of passing knowledge from      1
                                                                                             The seminal work on storytelling is Aristotle’s
one generation to the next, and remains one of the most compelling methods for               Poetics. Additional seminal references include,
richly communicating knowledge. Storytelling can be oral, as in the traditional              The Hero with a Thousand Faces by Joseph
                                                                                             Campbell, Princeton University Press, 1960;
telling of a tale; visual, as in an information graph or movie; or textual, as in a
                                                                                             and How to Tell a Story; and Other Essays by
poem or novel. More recently, digital storytelling has emerged, which involves               Mark Twain, Oxford University Press, 1996.
telling a story using digital media. This might take the form of a computerized slide        A nice contemporary reference on visual
show, a digital video, or educational software. A storyteller can be any instrument of       storytelling is Graphic Storytelling by Will Eisner,
information presentation that engages an audience to experience a set of events.1            Poorhouse Press, 1996.


Good storytelling experiences generally require certain fundamental elements.
While additional elements can be added to further augment the quality of a story
or storytelling experience, they can rarely be subtracted without detriment. The
fundamental elements are:

      •   Setting—The setting orients the audience, providing a sense of time and
          place for the story.

      •   Characters—Character identification is how the audience becomes
          involved in the story, and how the story becomes relevant.

      •   Plot—The plot ties events in the story together, and is the channel through
          which the story can flow.

      •   Invisibility—The awareness of the storyteller fades as the audience focuses
          on a good story. When engaged in a good movie or book, the existence of
          the medium is forgotten.

      •   Mood—Music, lighting, and style of prose create the emotional tone of
          the story.

      •   Movement—In a good story, the sequence and flow of events is clear and
          interesting. The storyline doesn’t stall.

Use storytelling to engage an audience in a design, evoke a specific emotional
response, or provide a rich context to enhance learning. When successfully
employed, an audience will experience and recall the events of the story in a personal
way—it becomes a part of them. This is a phenomenon unique to storytelling.

See also Framing, Immersion, Personas, Stickiness, and Wayfinding.

load or to contain and protect something: mass structures,
frame structures, and shell structures.
