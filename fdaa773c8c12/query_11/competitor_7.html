f10   Universal Principles of Design
fForeword



Courses in psychology and anthropology were glaringly absent from my
undergraduate and graduate design education. Indeed, a deeper understanding
of human behavior and a scholarly approach to design were almost entirely
overlooked. I left college with considerable knowledge in form making and very
little knowledge in understanding human perception and meaning making.
Universal Principles of Design is a resource that helps to fill in some of the gaps,
dispel myths, and give sound reasons for much of what is felt intuitively, and yet
not fully understood.

For years I’ve been a fan of the HGTV house buying-fixing-renovating shows on
TV, and I’ve never seen one person express a desire for low ceilings, rooms with
small windows, or a bad view. Universal Principles of Design guides the designer
toward the reasons that people love high, expansive ceilings — the Cathedral
Effect — and big windows with beautiful nature views — the Biophilia Effect. And
who would have guessed that high ceilings promote creativity and that views of
nature are restorative to the sense of well-being?

I’ve never really had reasons as to why some products resonate with many
people and others don’t, nor did I know that there’s a method to calculate the
human response. Intuitively, I’ve always felt that good design coupled with good
quality trumped all, and although those two qualities are a big part of the picture,
there’s much more to consider in the deeper underlying symbols and meanings.
Propositional Density looks at meaning in terms of analogies of shape, meaning,
and supposition. It gives the designer the ability to calculate the product design’s
capability to resonate with people. Maybe even more importantly, it gives the
designer a way to communicate with a client in terms of supporting the choices
that have been made for the design.

Universal Principles of Design brought me to a deeper understanding of the
human equation in design. There’s so much more to design than what meets the
eye in surface styling. Human motivation is mysterious and tied to subconscious
instincts, perceptions, and influences. Universal Principles of Design reveals
the driving forces behind human motivation and brings the designer to an
understanding of the intuitive. These principles aren’t guesswork. They’re real,
based on sound research, and they work.

 Kimberly Elam
 Chair of Graphic + Interactive Communication Department
 Ringling College of Art and Design


                                                                                       Foreword   11
fIntroduction




Not long ago, designers were eclectic generalists. They studied art, science, and
religion in order to understand the basic workings of nature, and then applied
what they learned to solve the problems of the day. Over time, the quantity and
complexity of accumulated knowledge led to increased specialization among
designers, and breadth of knowledge was increasingly traded for depth of
knowledge. This trend continues today. As designers become more specialized,
awareness of advances and discoveries in other areas of specialization diminishes.
This is inevitable and unfortunate, since much can be learned from progress in
other design disciplines.

Convenient access to cross-disciplinary design knowledge has not previously been
available. A designer interested in learning about other areas of specialization
would have to study texts from many different design disciplines. Determining
which texts in each discipline are worthy of study would be the first challenge,
deciphering the specialized terminology of the texts the second, and enduring the
depth of detail the third. The effort is significant, and rarely expended beyond brief
excursions into unfamiliar areas to research specific problems. The goal of this
book is to assist designers with these challenges, and reduce the effort required to
learn about the key principles of design across disciplines.

The concepts in this book, broadly referred to as “principles,” consist of laws,
guidelines, human biases, and general design considerations. The principles
were selected from a variety of design disciplines based on several factors,
including utility, degree of misuse or misunderstanding, and strength of supporting
evidence. The selection of 125 concepts should not be interpreted to mean that
there are only 125 relevant principles of design—there are obviously many more.




12   Universal Principles of Design
fThe book is organized alphabetically so that principles can be easily and quickly
referenced by name. For those interested in addressing a specific problem of
design, the principles have also been indexed by questions commonly confronting
designers (see previous page). Each principle is presented in a two-page format.
The left-hand page contains a succinct definition, a full description of the
principle, examples of its use, and guidelines for use. Side notes appear to the
right of the text, and provide elaborations and references. The right-hand page
contains visual examples and related graphics to support a deeper understanding
of the principle.

Sound design is not only within the reach of a small set of uniquely talented
individuals, but can be achieved by virtually all designers. The use of well-
established design principles increases the probability that a design will be
successful. Use Universal Principles of Design as a resource to increase your
cross-disciplinary knowledge and understanding of design, promote brainstorming
and idea generation for design problems, and refresh your memory of design
principles that are infrequently applied. Finally, use it as a means of checking
the quality of your design process and product. A paraphrase of William Strunk’s
famous admonition makes the point nicely:

    The best designers sometimes disregard the principles of design.
    When they do so, however, there is usually some compensating merit
    attained at the cost of the violation. Unless you are certain of doing
    as well, it is best to abide by the principles.



William Lidwell
Kritina Holden
Jill Butler

f80/20 Rule
A high percentage of effects in any large system are
caused by a low percentage of variables.1


The 80/20 rule asserts that approximately 80 percent of the effects generated

by any large system are caused by 20 percent of the variables in that system.
The 80/20 rule is observed in all large systems, including those in economics,
management, user interface design, quality control, and engineering, to name a

and unrelated effects—e.g., systems that are used by large numbers of people in
a variety of ways. A few examples of the 80/20 rule include: 2

     80 percent of a product’s usage involves 20 percent of its features.
     80 percent of a town’s traffic is on 20 percent of its roads.
     80 percent of a company’s revenue comes from 20 percent of its products.
     80 percent of innovation comes from 20 percent of the people.
     80 percent of progress comes from 20 percent of the effort.
     80 percent of errors are caused by 20 percent of the components.

The 80/20 rule is useful for focusing resources and, in turn, realizing greater
efficiencies in design. For example, if the critical 20 percent of a product’s
features are used 80 percent of the time, design and testing resources should
focus primarily on those features. The remaining 80 percent of the features should
be reevaluated to verify their value in the design. Similarly, when redesigning
systems to make them more efficient, focusing on aspects of the system beyond
the critical 20 percent quickly yields diminishing returns; improvements beyond
the critical 20 percent will result in less substantial gains that are often offset by
the introduction of errors or new problems into the system.

All elements in a design are not created equal. Use the 80/20 rule to assess the
value of elements, target areas of redesign and optimization, and focus resources
in an efficient manner. Noncritical functions that are part of the less-important 80
percent should be minimized or removed altogether from the design. When time
and resources are limited, resist efforts to correct and optimize designs beyond
the critical 20 percent, as such efforts yield diminishing returns. Generally, limit
the application of the 80/20 rule to variables in a system that are influenced by
many small and unrelated effects.

Objects and environments should be designed to be usable,
without modification, by as many people as possible.1

experience of accessible design increased, it became increasingly clear that many

Perceptibility is achieved when everyone can perceive the design, regardless                     Graeme J. Hardie, and Jaine P. Place, The

information using redundant coding methods (e.g., textual, iconic, and tactile);
provide compatibility with assistive sensory technologies (e.g., ALT tags for images
on the Internet); and position controls and information so that seated and standing
users can perceive them.

Operability is achieved when everyone can use the design, regardless of physical
abilities. Basic guidelines for improving operability are: minimize repetitive actions
and the need for sustained physical effort; facilitate use of controls through
good affordances and constraints; provide compatibility with assistive physical
technologies (e.g., wheelchair access); and position controls and information so
that seated and standing users can access them.

Simplicity is achieved when everyone can easily understand and use the design,
regardless of experience, literacy, or concentration level. Basic guidelines for
improving simplicity are: remove unnecessary complexity; clearly and consistently
code and label controls and modes of operation; use progressive disclosure to
present only relevant information and controls; provide clear prompting and
feedback for all actions; and ensure that reading levels accommodate a wide
range of literacy.

Forgiveness is achieved when designs minimize the occurrence and consequences
of errors. Basic guidelines for improving forgiveness are: use good affordances and
constraints (e.g., controls that can only be used the correct way) to prevent errors
from occurring; use confirmations and warnings to reduce the occurrence of errors;
and include reversible actions and safety nets to minimize the consequence of
errors (e.g., the ability to undo an action).

fAlignment
The placement of elements such that edges line up
along common rows or columns, or their bodies along a
common center.


Elements in a design should be aligned with one or more other elements. This            1
                                                                                            See, for example, Elements of Graph Design
                                                                                            by Stephen M. Kosslyn, W. H. Freeman and
creates a sense of unity and cohesion, which contributes to the design’s overall
                                                                                            Company, 1994, p. 172.
aesthetic and perceived stability. Alignment can also be a powerful means of
leading a person through a design. For example, the rows and columns of a
grid or table make explicit the relatedness of elements sharing those rows and
columns, and lead the eyes left-right and top-bottom accordingly. Edges of the
design medium (e.g., edge of a page or screen) and the natural positions on the
design medium (e.g., centerlines) should also be considered alignment elements.

In paragraph text, left-aligned and right-aligned text blocks provide more powerful
alignment cues than do center-aligned text blocks. The invisible column created
by left-aligned and right-aligned text blocks presents a clear, visual cue against
which other elements of the design can be aligned. Center-aligned text blocks,
conversely, provide more visually ambiguous alignment cues, and can be difficult
to connect with other elements. Justified text provides more alignment cues than
unjustified text, and should be used in complex compositions with many elements.

Although alignment is generally defined in terms of rows and columns, more
complex forms of alignment exist. In aligning elements along diagonals, for
example, the relative angles between the invisible alignment paths should be 30
degrees or greater; separation of less than 30 degrees is too subtle and difficult
to detect.1 In spiral or circular alignments, it may be necessary to augment or
highlight the alignment paths so that the alignment is perceptible; otherwise
the elements can appear disparate, and the design disordered. As with all such
principles of this type, there are exceptions (e.g., the misalignment of elements
to attract attention or create tension). However, these exceptions are rare, and
alignment should be considered the general rule.

For most designs, align elements into rows and columns or along a centerline.
When elements are not arranged in a row/column format, consider highlighting the
alignment paths. Use left- or right-justified text to create the best alignment cues,
and consider justified text for complex compositions.

See also Aesthetic-Usability Effect, Area Alignment, and Good Continuation.

fAnthropomorphic Form
A tendency to find forms that appear humanoid or exhibit
humanlike characteristics appealing.


Humans are predisposed to perceive certain forms and patterns as
                                                                                             1
                                                                                                 Empirical literature on anthropomorphic design
                                                                                                 is surprisingly nascent. See, for example,
humanlike — specifically, forms and patterns that resemble faces and body
                                                                                                 “From Seduction to Fulfillment: The Use of
proportions. This tendency, when applied to design, is an effective means of                     Anthropomorphic Form in Design” by Carl
getting attention, establishing a positive affective tone for interactions, and                  DiSalvo and Francine Gemperle, Proceedings
forming a relationship based, in part, on emotional appeal. To explore how                       of the 2003 International Conference
anthropomorphic form can be applied, consider the design of three bottles.1                      on Designing Pleasurable Products and
                                                                                                 Interfaces, 2003, p. 67–72.

The classic 1915 Coca-Cola “contour” bottle, often referred to as the “Mae West”
bottle due to its distinctly feminine proportions, was a break with the straight and
relatively featureless bottles of its day. In addition to its novelty, however, the bottle
benefited from a number of anthropomorphic projections such as health, vitality,
sexiness, and femininity, attributes that appealed to the predominantly female
buyers of the time. The Mae West comparison is apt, because like the actress,
the Coke bottle demanded (and got) the attention of all passersby.

Anthropomorphic forms do not necessarily need to look like a face or body to be
compelling. Consider the Adiri Natural Nurser baby bottle. The bottle is designed
to look and feel like a female breast, and not surprisingly it elicits the positive
associations people have with breastfeeding. The affective tone set by the bottle is
one of naturalness and caring. What parent would choose a traditional, inorganic-
looking bottle when such a supple, natural-looking substitute for the real thing
was available? This, of course, does not mean the bottle performs better than
nonanthropomorphic bottle designs, but it does mean the general inference of
most people, based on its appearance, is that it does perform better.

Lastly, the Method Dish Soap bottle, nicknamed the “dish butler,” brings a more
abstract anthropomorphic form to bear. The bottle transforms the perception of
dish soap bottles from utilitarian containers to be hidden beneath counters to
sculptural pieces to be displayed proudly atop counters. The large bulbous head
triggers baby-face bias cognitive wiring, reinforcing its aesthetic appeal as well as
associations such as safety, honesty, and purity. Labeling is applied in what would
be the chest region, with a round logo on top, giving it the appearance of a kind
of superhero costume. It is more than a dish soap bottle — it is a helper, an art
piece, and a symbol of sophistication and cleanliness.

Consider anthropomorphic forms to attract attention and establish emotional
connections. Favor more abstract versus realistic anthropomorphic forms, as
realistic depictions often decrease, not increase, aesthetic appeal. Use feminine
body proportions to elicit associations of sexuality and vitality. Use round
anthropomorphic forms to elicit babylike associations, and more angular forms to
elicit masculine, aggressive associations.

See also Baby-Face Bias, Contour Bias, Uncanny Valley, and Waist-to-Hip Ratio.

fArea Alignment
Alignment based on the area of elements versus the
edges of elements.


With the advent of professional design and engineering software, elements in a
design can be aligned with exacting precision. However, the alignment supported
by software is based on the edges of elements — including center alignment,
which calculates a center based on the edges. This method works well when
elements are relatively uniform and symmetrical, but less well when the elements
are nonuniform and asymmetrical. In these latter cases, it is preferable to align
based on the visual weight or area of the elements, a technique that must be
performed using the designer’s eye and judgment. Using edge alignment when
area alignment is called for is one of the most common errors in graphic design.

A satisfactory area alignment can be achieved by positioning an object along the
axis of alignment such that an equal amount of area or visual weight hangs on
either side — if the object had mass, it would be balanced on the axis. Unlike the
straight edge achieved by left- or right-aligning similar elements based on their
edges, alignment based on area invariably creates a ragged edge. This requires
that parts of elements hang in the gutters or margins when aligned with strongly
rectilinear elements, but it represents the strongest possible perceived alignment
that can be achieved for morphologically dissimilar elements.

The principle applies to text as well as graphical elements. For example, the
horizontal center of a left-aligned text chunk with a right ragged edge, based
on its area, would be to the left of a horizontal center based on its width — area
alignment calculates the horizontal center in consideration of the reduced area
of the ragged right edge, moving the horizontal center to the left, whereas edge
alignment simply calculates the horizontal center as though the text chunk were
a rectangle, with the right edge determined by the rightmost character. Other
common text examples include pull quotes, which should be aligned based on
the text edge and not on the quotation marks; and numbered or bulleted items,
which should be aligned based on the text edge and not on the numbers and
bullets, unless the specific intent is to subordinate the listed items.

Consider area alignment when incorporating dissimilar elements into a
composition. When objects are simple and symmetrical, align based on their
edges; otherwise, align based on their areas. Unless there is some extraordinary
overriding consideration, always hang pull quotes. Hang numbers and bullets
when listing items, except when the items are meant to be subordinate.

See also Alignment, Good Continuation, and Uniform Connectedness.

ceilings prime “confinement” and related concepts.

and development) favor large rooms with high ceilings. For tasks that require
detail-oriented work (e.g., surgical operating room) favor smaller rooms with
lower ceilings. In retail environments, favor spaces with high ceilings when
consumer choice requires imagination (e.g., home remodeling store) and
spaces with lower ceilings for more task-oriented shopping (e.g., convenience
store). Favor high ceilings to extend the time in which visitors remain on site

example, a logo design that is composed of recognizable elements does not need
to complete many of its lines and contours to be clear and effective. Reducing the
number of lines in the logo not only reduces its complexity, but it makes the logo
more interesting to look at—viewers subconsciously participate in the completion
of its design. Many forms of storytelling leverage closure in a similar way. For
example, in comic books, discrete scenes in time are presented to readers, who
then supply what happens in between. The storyline is a unique combination of
information provided by the storyteller, and information provided by the reader.2

Use closure to reduce the complexity and increase the interestingness of designs.
When designs involve simple and recognizable patterns, consider removing or
minimizing the elements in the design that can be supplied by viewers. When
designs involve more complex patterns, consider the use of transitional elements
to assist viewers in finding or forming the pattern.

fComparison
A method of illustrating relationships and patterns in
system behaviors by representing two or more system
variables in a controlled way.


People understand the way the world works by identifying relationships and             1
                                                                                           See, for example, Visual Explanations,
patterns in or between systems. One of the most powerful methods of identifying            Graphics Press, 1998; and Envisioning
                                                                                           Information, Graphics Press, 1990 both by
and understanding these relationships is to represent information in controlled            Edward R. Tufte.
ways so that comparisons can be made. Key techniques for making valid
comparisons are apples to apples, single contexts, and benchmarks.1

Apples to Apples
Comparison data should be presented using common measures and common
units. For example, when comparing crime rates of different countries, it is
necessary to account for differences in variables such as population, types of laws,
and level of law enforcement. Otherwise, conclusions based on the comparison
will be unreliable. Common methods of ensuring apples-to-apples comparisons
include clearly disclosing details of how variables were measured, making
corrections to the data as necessary to eliminate confounding variables, and
representing the variables using the same graphical and numerical standards.

Single Context
Comparison data should be presented in a single context, so that subtle differences
and patterns in the data are detectable. For example, the ability to detect patterns
across multiple graphs is lower if the graphs are located on separate pages versus
the same page. Common methods of representing information in single contexts
include the use of a small number of displays that combine many variables (versus
many separate displays), and multiple small views of system states (known as small
multiples) in a single display (versus multiple displays).

Benchmarks
Claims about evidence or phenomena should be accompanied by benchmark
variables so that clear and substantive comparisons can be made. For example,
claims about the seriousness of the size of the U.S. debt are meaningful only
when accompanied by benchmark information about U.S. gross national product
(GNP); a debt can appear serious when depicted as a quantity, but irrelevant when
presented as a percentage of GNP. Common types of benchmark data include past
performance data, competitor data, or data from well-accepted industry standards.

Use comparisons to convincingly illustrate patterns and relationships. Ensure
that compared variables are apples to apples by measuring and representing
variables in common ways, correcting for confounds in the data as necessary. Use
multivariate displays and small multiples to present comparisons in single contexts
when possible. Use benchmarks to anchor comparisons and provide a point of
reference from which to evaluate the data.

See also Garbage In–Garbage Out, Layering, and Signal-to-Noise Ratio.

fConfirmation
A technique for preventing unintended actions by requiring
verification of the actions before they are performed.1


Confirmation is a technique used for critical actions, inputs, or commands. It           1
                                                                                             Also known as verification principle and
provides a means for verifying that an action or input is intentional and correct            forcing function.

before it is performed. Confirmations are primarily used to prevent a class of errors
called slips, which are unintended actions. Confirmations slow task performance,
                                                                                         2
                                                                                             See, for example, The Design of Everyday
                                                                                             Things by Donald Norman, Doubleday, 1990;
and should be reserved for use with critical or irreversible operations only. When
                                                                                             and To Err Is Human: Building a Safer Health
the consequences of an action are not serious, or when actions are completely and            System edited by Linda T. Kohn, Janet M.
easily reversible, confirmations are not needed. There are two basic confirmation            Corrigan, and Molla S. Donaldson, National
techniques: dialog and two-step operation.2                                                  Academy Press, 2000.


Confirmation using a dialog involves establishing a verbal interaction with the
person using the system. It is most commonly represented as a dialog box on a
software display (e.g., “Are you sure you want to delete all files?”). In this method,
dialog boxes directly ask the user if the action was intended and if they would like
to proceed. Confirmations should be used sparingly, or people will become frus-
trated at the frequent interruption and then learn to ignore them. Dialog messages
should be concise but detailed enough to accurately convey the implications of
the action. The message should end with one question that is structured to be
answered Yes or No, or with an action verb that conveys the action to be performed
(the use of OK and Cancel should be avoided for confirmations). For less critical
confirmations that act more as reminders, an option to disable the confirmation
should be provided.

Confirmation using a two-step operation involves a preliminary step that must occur
prior to the actual command or input. This is most often used with hardware
controls, and is often referred to as an arm/fire operation—first you arm the
component, and then you fire (execute) it. For example, a switch cover might have
to be lifted in order to activate a switch, two people might have to turn two unique
keys in order to launch a nuclear weapon, or a control handle in a spacecraft might
have to be rotated and then pushed down in order to be activated. The purpose
of the two-step operation is to prevent accidental activation of a critical control.
If the operation works only when the two-step sequence has been completed,
it is unlikely that the operation will occur accidentally. Two-step operations are
commonly used for critical operations in aircraft, nuclear power plants, and other
environments involving dangerous operations.

Use confirmations to minimize errors in the performance of critical or irreversible
operations. Avoid overusing confirmations to ensure that they are unexpected
and uncommon; otherwise, they may be ignored. Use a two-step operation for
hardware confirmations, and a dialog box for software confirmations. Permit less
critical confirmations to be disabled after an initial confirmation.

See also Constraint, Errors, Forgiveness, and Garbage In–Garbage Out.

fConsistency
The usability of a system is improved when similar parts
are expressed in similar ways.


According to the principle of consistency, systems are more usable and learnable        1
                                                                                            Use consistent approaches when possible,
                                                                                            but do not compromise clarity or usability
when similar parts are expressed in similar ways. Consistency enables people to
                                                                                            for consistency. In the words of Emerson,
efficiently transfer knowledge to new contexts, learn new things quickly, and focus         “A foolish consistency is the hobgoblin of
attention on the relevant aspects of a task. There are four kinds of consistency:           little minds …”
aesthetic, functional, internal, and external.1

Aesthetic consistency refers to consistency of style and appearance (e.g.,
a company logo that uses a consistent font, color, and graphic). Aesthetic
consistency enhances recognition, communicates membership, and sets
emotional expectations. For example, Mercedes-Benz vehicles are instantly
recognizable because the company consistently features its logo prominently
on the hood or grill of its vehicles. The logo has become associated with quality
and prestige, and informs people how they should feel about the vehicle—i.e.,
respected and admired.

Functional consistency refers to consistency of meaning and action (e.g., a
traffic light that shows a yellow light before going to red). Functional consistency
improves usability and learnability by enabling people to leverage existing
knowledge about how the design functions. For example, videocassette recorder
control symbols, such as for rewind, play, forward, are now used on devices
ranging from slide projectors to MP3 music players. The consistent use of these
symbols on new devices enables people to leverage existing knowledge about how
the controls function, which makes the new devices easier to use and learn.

Internal consistency refers to consistency with other elements in the system
(e.g., signs within a park are consistent with one another). Internal consistency
cultivates trust with people; it is an indicator that a system has been designed, and
not cobbled together. Within any logical grouping elements should be aesthetically
and functionally consistent with one another.

External consistency refers to consistency with other elements in the environment
(e.g., emergency alarms are consistent across different systems in a control room).
External consistency extends the benefits of internal consistency across multiple,
independent systems. It is more difficult to achieve because different systems
rarely observe common design standards.

Consider aesthetic and functional consistency in all aspects of design. Use
aesthetic consistency to establish unique identities that can be easily recognized.
Use functional consistency to simplify usability and ease of learning. Ensure that
systems are always internally consistent, and externally consistent to the greatest
degree possible. When common design standards exist, observe them.

See also Modularity, Recognition Over Recall, and Similarity.

fConstraint
A method of limiting the actions that can be performed on
a system.


Constraints limit the possible actions that can be performed on a system. For            1
                                                                                             The seminal work on psychological constraints
example, dimming or hiding unavailable software controls constrains the options              is The Design of Everyday Things by Donald
                                                                                             Norman, Doubleday, 1990.
that can be selected. Proper application of constraints in this fashion makes
designs easier to use and dramatically reduces the probability of error during
                                                                                         2
                                                                                             Note that Norman uses the terms semantic
interaction. There are two basic kinds of constraints: physical constraints and
                                                                                             constraints, cultural constraints, and logical
psychological constraints.1                                                                  constraints.

Physical constraints limit the range of possible actions by redirecting physical
motion in specific ways. The three kinds of physical constraints are paths, axes,
and barriers. Paths convert applied forces into linear or curvilinear motion using
channels or grooves (e.g., scroll bar in software user interfaces). Axes convert
applied forces into rotary motion, effectively providing a control surface of infinite
length in a small space (e.g., a trackball). Barriers absorb or deflect applied
forces, thereby halting, slowing, or redirecting the forces around the barrier (e.g.,
boundaries of a computer screen). Physical constraints are useful for reducing the
sensitivity of controls to unwanted inputs, and denying certain kinds of inputs
altogether. Paths are useful in situations where the control variable range is
relatively small and bounded. Axes are useful in situations where control real
estate is limited, or the control variables are very large or unbounded. Barriers are
useful for denying errant or undesired actions.

Psychological constraints limit the range of possible actions by leveraging the
way people perceive and think about the world. The three kinds of psychological
constraints are symbols, conventions, and mappings. Symbols influence behavior
by communicating meaning through language, such as the text and icon on a
warning sign. Conventions influence behavior based on learned traditions and
practices, such as “red means stop, green means go.” Mappings influence
behavior based on the perceived relationships between elements. For example,
light switches that are close to a set of lights are perceived to be more related
than switches that are far away. Symbols are useful for labeling, explaining, and
warning using visual, aural, and tactile representation—all three if the message is
critical. Conventions indicate common methods of understanding and interacting,
and are useful for making systems consistent and easy to use. Mappings are
useful for implying what actions are possible based on the visibility, location, and
appearance of controls.2

Use constraints in design to simplify usability and minimize errors. Use physical
constraints to reduce the sensitivity of controls, minimize unintentional inputs,
and prevent or slow dangerous actions. Use psychological constraints to improve
the clarity and intuitiveness of a design.

See also Affordance, Archetypes, Control, Errors, Forgiveness, Mapping, and Nudge.

A tendency to favor objects with contours over objects
with sharp angles or points.


When presented with objects that possess sharp angles or pointed features, a
                                                                                        1
                                                                                            The seminal work on the contour bias is
                                                                                            “Humans Prefer Curved Visual Objects” by
region of the human brain involved in fear processing, the amygdala, is activated.
                                                                                            Moshe Bar and Maital Neta, Psychological
Likely a subconscious mechanism that evolved to detect potential threats, this              Science, 2006, vol. 17. See also “Visual
fear response suggests that angular features influence the way in which objects             Elements of Subjective Preference Modulate
are affectively and aesthetically perceived. Indeed, in experiments where subjects          Amygdala Activation” by Moshe Bar and
were presented with otherwise similar angled versus contoured objects (e.g.,                Maital Neta, Neuropsychologia, 2007, vol. 45.

round-faced watches versus square-faced watches), subjects strongly preferred
the more rounded, contoured objects. In some of these experiments, brain activity
was observed using functional magnetic resonance imaging (fMRI) as subjects
indicated their preference. The degree of amygdala activation was proportional
to the degree of angularity or sharpness of the object presented, and inversely
related to object preference. These effects were observed in both male and
female subjects, and suggest an innately rooted contour bias in humans.1

The picture is more complex, however, than to simply infer that all designs should
be made round to increase their appeal. Objects used in the experiments were
emotionally neutral. For example, a baby doll was not used for a contour object
as it carries with it a set of positive emotional associations and biases, and a
knife was not used for an angular object as it carries with it a set of negative
emotional associations and biases. It is clear that absent these competing biases
and associations, the contour bias is a relevant influencer of overall perception.
The degree to which the bias influences perception when competing biases
(e.g., baby-face bias) or semantically relevant perceptions (e.g., criminals use
knives) are at play is not yet clear. Additionally, objects with pointed features
elicited stronger activations in regions of the brain related to associative
processing, meaning that although the angular objects were less liked, they
elicited a deeper level of processing than did the contoured objects — they were,
in effect, more interesting and thought-provoking to look at. This seems consistent
with the kind of innate response one would expect from potential threats and
suggests a tradeoff between angular and contoured features: Angular objects are
more effective at attracting attention and engaging thought; contoured objects are
more effective at making a positive emotional and aesthetic impression.

Consider the contour bias in all aspects of design, but especially with regard to
objects and environments that are emotionally neutral. Use angular and pointy
features to attract attention and provoke thought. Use contoured features to make
a positive first impression. Generally, the degree of angularity corresponds with the
strength of amygdala activation, so ensure that the angularity of design elements
aligns with the design objectives.

fControl
The level of control provided by a system should be
related to the proficiency and experience levels of the
people using the system.


People should be able to exercise control over what a system does, but the level         1
                                                                                             See, for example, The Psychology of Human-
of control should be related to their proficiency and experience using the system.           Computer Interaction by Stuart K. Card,
                                                                                             Thomas P. Moran, and Allen Newell, Lawrence
Beginners do best with a reduced amount of control, while experts do best with
                                                                                             Erlbaum Associates, 1983; and The Humane
greater control. A simple example is when children learn to ride a bicycle. Initially,       Interface: New Directions for Designing
training wheels are helpful in reducing the difficulty of riding by reducing the             Interactive Systems by Jef Raskin, Addison-
level of control (e.g., eliminating the need to balance while riding). This allows the       Wesley 2000.
child to safely develop basic riding skills with minimal risk of accident or injury.
Once the basic skills are mastered, the training wheels get in the way, and hinder
performance. As expertise increases, so too does the need for greater control.1

A system can accommodate these varying needs by offering multiple ways to
perform a task. For example, novice users of word processors typically save
their documents by accessing the File menu and selecting Save, whereas more
proficient users typically save their documents using a keyboard shortcut. Both
methods achieve the same outcome, but one favors simplicity and structure,
while the other favors efficiency and flexibility. This tradeoff is standard when
allocating system control. Beginners benefit from structured interactions with
minimal choices, typically supported by prompts, constraints, and ready access
to help. Experts benefit from less structured interactions that provide more
direct access to functions, bypassing the support devices of beginners. Since
accommodating multiple methods increases the complexity of the system,
the number of methods for any given task should be limited to two—one for
beginners, and one for experts.

The need to provide expert shortcuts is limited to systems that are used frequently
enough for people to develop expertise. For example, the design of museum
kiosks and ATMs should assume that all users are first-time users, and not try
to accommodate varying levels of expertise. When systems are used frequently
enough for people to develop expertise, it is often useful to provide simple ways
to customize the system design. This represents the highest level of control a
design can provide. It enables the appearance and configuration of a system
to be aligned with personal preferences and level of expertise, and enables the
efficiency of use to be fine-tuned according to individual needs over time.

Consider the allocation of control in the design of complex systems. When
possible, use a method that is equally simple and efficient for beginners and
experts. Otherwise, provide methods specialized for beginners and experts.
Conceal expert methods to the extent possible to minimize complexity for
beginners. When systems are complex and frequently used, consider designs that
can be customized to conform to individual preference and levels of expertise.

See also Constraint, Flexibility-Usability Tradeoff, and Hierarchy of Needs.

fCost-Benefit
An activity will be pursued only if its benefits are equal to
or greater than the costs.


From a design perspective, the cost-benefit principle is typically used to assess
the financial return associated with new features and elements. The cost-benefit
principle can also be applied to determine design quality from a user perspective.
If the costs associated with interacting with a design outweigh the benefits, the
design is poor. If the benefits outweigh the costs, the design is good. For example,
walking some distance to see a museum exhibit constitutes a cost. The level of
interest in the exhibit constitutes a benefit. Thus, if the level of interest outweighs
the cost of the walk, the exhibit design is good.

The quality of every design aspect can be measured using the cost-benefit
principle. How much reading is too much to get the point of a message? How
many steps are too many to set the time and date of a video recorder? How
long is too long for a person to wait for a Web page to download? The answer
to all of these questions is that it depends on the benefits of the interaction. For
example, the often-cited maximum acceptable download time for pages on the
Internet is ten seconds. However, the acceptability of download time is a function
of the benefits provided by the downloaded page. A high-benefit page can more
than compensate for the cost of a download taking longer than ten seconds.
Conversely, a low-benefit page cannot compensate the cost of any download time.
Reducing interaction costs does improve the quality of the design, but to simply
design within cost limits without consideration of the interaction benefits misses
the point of design altogether—i.e., to provide benefit.

A common mistake regarding application of the cost-benefit principle is to
presume which aspects of a system will be perceived as costs, and which will
be perceived as benefits. For example, new design features or elements that
excite designers are often never used or even noticed by people who interact with
the design. In many cases, such features and elements increase the design’s
interaction costs by adding complexity to the system. In order to avoid this,
observe people interacting with the design or similar designs in the actual target
environment. Focus groups and usability tests are valuable in assessing the cost-
benefits of a design during development, when natural observation is not possible.

Consider the cost-benefit principle in all aspects of design. Do not make design
decisions based on cost parameters alone without due consideration of the
benefits realized from interactions. Verify cost-benefit perceptions of target
populations through careful observations, focus groups, and usability tests.

See also 80/20 Rule, Aesthetic-Usability Effect, and Expectation Effect.

Successful products typically follow four stages of
creation: requirements, design, development, and testing.


All products progress sequentially through basic stages of creation. Understanding         1

and using effective practices for each stage allows designers to maximize a

                                                                                               Product Developer’s Toolkit by Donald G.
Requirements
                                                                                               Reinertsen, Free Press, 1997.
In formal processes, requirements are gathered through market research, customer
feedback, focus groups, and usability testing. Informally, design requirements are
often derived from direct knowledge or experience. Design requirements are best
obtained through controlled interactions between designers and members of the
target audience, and not simply by asking people what they want or like—often
they do not know, or cannot clearly articulate their needs.

Design
This stage is where design requirements are translated into a form that yields a set
of specifications. The goal is to meet the design requirements, though an implicit
goal is to do so in a unique fashion. Excellent design is usually accomplished
through careful research of existing or analogous solutions, active brainstorming
of many diverse participants, ample use of prototyping, and many iterations of
trying, testing, and tuning concepts. A design that is appreciably the same at the
beginning and end of this stage is probably not much of a design.

Development
The development stage is where design specifications are transformed into an actual
product. The goal of development is to precisely meet the design specifications. Two
basic quality control strategies are used to accomplish this: reduce variability in the
materials, creations of parts, and assembly of parts; and verify that specifications are
being maintained throughout the development process.

Testing
The testing stage is where the product is tested to ensure that it meets design
requirements and specifications, and will be accepted by the target audience.
Testing at this stage generally focuses on the quality of modules and their
integration, real-world performance (real contexts, real users), and ease and
reliability of installation.

Gather requirements through controlled interactions with target audiences,
rather than simple feedback or speculation by team members. Use research,
brainstorming, prototyping, and iterative design to achieve optimal designs.
Minimize variability in products and processes to improve quality. Test all aspects
of the design to the degree possible.

A point of physical or attentional entry into a design.


People do judge books by their covers, Internet sites by their first pages, and         1
                                                                                            See, for example, Why We Buy: The Science
buildings by their lobbies. This initial impression of a system or environment              of Shopping by Paco Underhill, Touchstone

greatly influences subsequent perceptions and attitudes, which then affects the             Development by Walter A. Rutes, Richard H.

Such errors in entry point design annoy visitors who make it through, or deter
visitors altogether. Either way, it does not promote additional interaction. The key
elements of good entry point design are minimal barriers, points of prospect, and
progressive lures.1

Minimal Barriers
Barriers should not encumber entry points. Examples of barriers to entry are highly
trafficked parking lots, noisy displays with many unnecessary elements, sales-
people standing at the doors of retail stores, or anything that impedes people from
getting to and moving through an entry point. Barriers can be aesthetic as well as
functional in nature. For example, a poorly maintained building front or landscape
is an aesthetic barrier to entry.

Points of Prospect
Entry points should allow people to become oriented and clearly survey available
options. Points of prospect include store entrances that provide a clear view of
store layout and aisle signs, or Internet pages that provide good orientation cues
and navigation options. Points of prospect should provide sufficient time and
space for a person to review options with minimal distraction or disruption—i.e.,
people should not feel hurried or crowded by their surroundings or other people.

Progressive Lures
Lures should be used to attract and pull people through the entry point. Progressive
lures can be compelling headlines from the front page of a newspaper, greeters
at restaurants, or the display of popular products or destinations (e.g., restrooms)
just beyond the entry point of a store. Progressive lures get people to incrementally
approach, enter, and move through the entry point.

Maximize the effectiveness of the entry point in a design by reducing barriers,
establishing clear points of prospect, and using progressive lures. Provide
sufficient time and space for people to review opportunities for interaction at the
entry point. Consider progressive lures like highlighting, entry point greeters, and
popular offerings visibly located beyond the entry point to get people to enter and
progress through.

See also Immersion, Prospect-Refuge, and Wayfinding.

The expectation effect demonstrates that expectations can greatly influence
perceptions and behavior. For example, tell a large group of people that a new
product will change their lives, and a significant number will find their lives
changed—the belief is simply a device that helps create the change. Once a
person believes something will happen, the belief alone creates that possibility.
Unfortunately, this can have a negative impact on the ability to accurately measure
a design’s success. Since designers are naturally biased toward their designs,
they often unintentionally influence test subjects through words or actions, or may
omit certain results in order to corroborate their expectations. Test subjects often
respond by seeking to meet the expectations communicated to them.

Consider the expectation effect when introducing and promoting a design.
When trying to persuade, set expectations in a credible fashion for the target
audience rather than letting them form their own unbiased conclusions. When
evaluating a design, use proper test procedures to avoid biases resulting from
the expectation effect.

See also Exposure Effect, Framing, and Uncertainty Principle.

Familiarity plays a primary role in aesthetic appeal and acceptance; people like
things more when frequently exposed to them. For example, the initial resistance
by many people to the Vietnam Veterans Memorial was primarily caused by
a lack of familiarity with its minimalist, abstract design. Similar resistance was
experienced by Pablo Picasso with his Cubist works, Gustave Eiffel with the Eiffel
Tower, Frank Lloyd Wright with the Guggenheim Museum, and many others
whose works are today widely accepted as brilliant and beautiful. As the level
of exposure to these works increased with time, familiarity with the works also
increased and resulted in greater acceptance and popularity.

Use the exposure effect to strengthen advertising and marketing campaigns,
enhance the perceived credibility and aesthetic of designs, and generally improve
the way people think and feel about a message or product. Keep the exposures
brief, and separate them with periods of delay. The exposure effect will be strongest
for the first ten exposures; therefore, focus resources on early presentations for
maximum benefit. Expect and prepare for resistance to a design if it is significantly
different from the norm.

The term face-ism originated from research on gender bias in the media. It
was found that images of men in magazines, movies, and other media have
significantly higher face-ism ratios than images of women. This appears true
across most cultures, and is thought to reflect gender-stereotypical beliefs
regarding the characteristics of men and women. While there is little consensus
as to why this is the case, it is likely the result of unconscious processes resulting
from a mix of biological and cultural factors. In one experiment, for example, male
and female college students were randomly assigned a task to draw either a man
or a woman. The students were told they would be evaluated on their drawing
skills, and were given no additional instructions. Both genders drew men with
prominent and detailed faces, and drew women with full bodies and minimally
detailed faces.2

Consider face-ism in the representation of people in photographs and drawings.
When the design objective requires more thoughtful interpretations or associations,
use images with high face-ism ratios. When the design objective requires more
ornamental interpretations or associations, use images with low-face-ism ratios.
Note that the interpretations of the images will be the same irrespective of the
subject’s or viewer’s gender.

The size of the safety factor corresponds directly to the level of ignorance of the
design parameters. The greater the ignorance, the greater the safety factor. For
example, structures that are well understood and made of materials of consistent
quality, such as steel and concrete structures, typically use a safety factor ranging
from two to four. Structures that are well understood and made of materials of
varying quality, such as wood, may use a safety factor ranging from four to eight.
When ignorance is combined with materials of varying quality, the safety factor
can get quite large. For example, the designers of the Great Pyramid at Giza
unknowingly applied a safety factor of over twenty.2

Increasing the safety factor in a design translates into the addition of elements
(e.g., materials). More elements means more cost. New designs must typically
have large factors of safety because the number of unknowns is great. If a design
performs reliably over time, confidence that the unknowns in the system have
been managed combines with the pressure to reduce costs, and typically leads to
a “tuning” process to reduce elements and lower the safety factor. Unfortunately,
this process usually continues until an accident or failure occurs, at which point
cost considerations become secondary and safety factors are again increased.3

Use safety factors to minimize the probability of failure in a design. Apply them
in proportion to the ignorance of the design parameters and the severity of the
consequences of failure. Reduce safety factors with caution, especially when
specifications extend beyond design precedents. Observe the rated capacity of
a system when making decisions that stress system limits, and not the designed
capacity (capacity including factors of safety), except in cases of emergency.

See also Design by Committee, Errors, Modularity, Structural Forms, and

By concentrating on the problem in isolation (e.g., not considering changes in
player behavior) designers inadvertently created a positive feedback loop in which

injuries, which resulted in additional redesigns that made the helmet shells harder

Negative feedback loops are effective for resisting change. For example, the
Segway Human Transporter uses negative feedback loops to maintain equilibrium.
As a rider leans forward or backward, the Segway accelerates or decelerates to
keep the system in equilibrium. To achieve this smoothly, the Segway makes
one hundred adjustments every second. Given the high adjustment rate, the
oscillations around the point of equilibrium are so small as to not be detectable.
However, if fewer adjustments were made per second, the oscillations would
increase in size and the ride would become increasingly jerky.

A key lesson of feedback loops is that things are connected—changing one
variable in a system will affect other variables in that system and other systems.
This is important because it means that designers must not only consider
particular elements of a design, but also their relation to the design as a whole
and the greater environment. Consider positive feedback loops to perturb systems
to change, but include negative feedback loops to prevent runaway behaviors that
lead to system failure. Consider negative feedback loops to stabilize systems, but
be cautious in that too much negative feedback in a system can lead to stagnation.3

fFlexibility-Usability Tradeoff
As the flexibility of a system increases, the usability of the
system decreases.


The flexibility-usability tradeoff is related to the well-known maxim, jack of all trades,   1
                                                                                                 See, for example, The Invisible Computer
                                                                                                 by Donald A. Norman, MIT Press, 1999;
master of none. Flexible designs can perform more functions than specialized
                                                                                                 and “The Visible Problems of the Invisible
designs, but they perform the functions less efficiently. Flexible designs are, by               Computer: A Skeptical Look at Information
definition, more complex than inflexible designs, and as a result are generally more             Appliances” by Andrew Odlyzko, First Monday,
difficult to use. For example, a Swiss Army Knife has many attached tools that                   1999, vol. 4 (9), http://www.firstmonday.org.
increase its flexibility. These tools taken together are less usable and efficient than
corresponding individual tools that are more specialized but provide a flexibility of
use not available from any single tool. The flexibility-usability tradeoff exists because
accommodating flexibility entails satisfying a larger set of design requirements,
which invariably means more compromises and complexity in the design.1

It is a common assumption that designs should always be made as flexible as
possible. However, flexibility has real costs in terms of complexity, usability, time,
and money; it generally pays dividends only when an audience cannot clearly
anticipate its future needs. For example, personal computers are flexible devices
that are difficult to use, relative to more specialized devices like video game players.
However, the primary value of a personal computer is that it addresses uncertainty
about how it can and will be used: word processing, tax preparation, email. People
purchase video game players to play games, but they purchase personal computers
to satisfy a variety of needs, many of which are unknown at the time of purchase.

The ability of an audience to anticipate future uses of a product is a key indicator of
how they will value flexibility versus usability in design. When an audience can clearly
anticipate its needs, more specialized designs that target those needs will be favored.
When an audience cannot clearly define its needs, more flexible designs that enable
people to address future contingencies will be favored. The degree to which an
audience can or cannot define future needs should correspond to the degree of
specialization or flexibility in the design. As an audience comes to understand the
range of possible needs that can be satisfied, their needs become better defined
and, consequently, the designs need to become more specialized. This shift from
flexibility toward specialization over time is a general pattern observed in the evolution
of all systems, and should be considered in the life cycle of products.

The flexibility-usability tradeoff has implications for weighing the relative
importance of flexibility versus usability in a design. When an audience has a clear
understanding of its needs, favor specialized designs that target those needs as
efficiently as possible. When an audience has a poor understanding of its needs,
favor flexible designs to address the broadest possible set of future applications.
When designing multiple generations of products, consider the general shift toward
specialization as audience needs become more defined.

See also 80/20 Rule, Convergence, Hierarchy of Needs, Life Cycle, Modularity, and
         Progressive Disclosure.

fForgiveness
Designs should help people avoid errors and minimize the
negative consequences of errors when they do occur.


Human error is inevitable, but it need not be catastrophic. Forgiveness in design
helps prevent errors before they occur, and minimizes the negative consequences
of errors when they do occur. Forgiving designs provide a sense of security and
stability, which in turn, fosters a willingness to learn, explore, and use the design.
Common strategies for incorporating forgiveness in designs include:

Good Affordances— physical characteristics of the design that influence its
correct use (e.g., uniquely shaped plug that can only be inserted into the
appropriate receptacle).

Reversibility of Actions— one or more actions can be reversed if an error occurs or
the intent of the person changes (e.g., undo function in software).

Safety Nets—device or process that minimizes the negative consequences of a
catastrophic error or failure (e.g., pilot ejection seat in aircraft).

Confirmation—verification of intent that is required before critical actions are
allowed (e.g., lock that must be opened before equipment can be activated).

Warnings—signs, prompts, or alarms used to warn of imminent danger (e.g., road
signs warning of a sharp turn ahead).

Help —information that assists in basic operations, troubleshooting, and error
recovery (e.g., documentation or help line).

The preferred methods of achieving forgiveness in a design are affordances,
reversibility of actions, and safety nets. Designs that effectively use these strategies
require minimal confirmations, warnings, and help—i.e., if the affordances are
good, help is less necessary; if actions are reversible, confirmations are less
necessary; if safety nets are strong, warnings are less necessary. When using
confirmations, warnings, and help systems, avoid cryptic messages or icons.
Ensure that messages clearly state the risk or problem, and also what actions can
or should be taken. Keep in mind that too many confirmations or warnings impede
the flow of interaction and increase the likelihood that the confirmation or warning
will be ignored.

Create forgiving designs by using good affordances, reversibility of actions, and
safety nets. If this is not possible, be sure to include confirmations, warnings, and
a good help system. Be aware that the amount of help necessary to successfully
interact with a design is inversely proportional to the quality of the design—if a lot
of help is required, the design is poor.

See also Affordance, Confirmation, Errors, Factor of Safety, and Nudge.

fFraming
A technique that influences decision making and judgment
by manipulating the way information is presented.


Framing is the use of images, words, and context to manipulate how people think            1
                                                                                               The seminal work on framing is “The Framing
                                                                                               of Decisions and the Psychology of Choice” by
about something. Information can be presented in such a way as to emphasize
                                                                                               Amos Tversky and Daniel Kahneman, Science,
the positive (e.g., glass is half-full) or the negative (e.g., glass is half-empty). The       1981, vol. 211, p. 453–458. A nice treatment
type of frame used to present information dramatically affects how people make                 of the subject is The Psychology of Judgment
decisions and judgments, and is consequently a powerful influencer of behavior.                and Decision Making by Scott Plous, McGraw-
News media, politicians, propagandists, and advertisers all commonly use framing               Hill, 1993.
(knowingly or unknowingly) with great effect. 1

In October 2002, Russian Special Forces used a sedating gas to knock out
Chechen rebels who were holding over 750 hostages captive in the Moscow
Theater. The gas prevented the rebels from setting off explosives and killing all
of the hostages, but the gas itself caused the death of well over 100 hostages.
Newspapers throughout the world reported the incident in basically one of two
ways: Gas Kills Over 100 Hostages, or Gas Saves Over 500 Hostages. This event
is tragic no matter how it is presented, but judgment of the Russian efforts to free
the hostages is greatly influenced by the frame of its presentation. The negative
frame emphasizes the lives lost, and presents the information in a way that
suggests the Russians bungled the affair. The positive frame emphasizes the lives
saved, and presents the information in a way that suggests the Russians cleverly
salvaged a seemingly intractable situation. Similar positive and negative frames are
typically used in advertising. For example, it is common to see yogurt advertised
as 95 percent fat free, rather than 5 percent fat rich; and tobacco legislation has
been defeated more than once by framing the legislation as a matter of taxation,
instead of a matter of public health.

Positive frames tend to elicit positive feelings, and result in proactive and risk-
seeking behaviors. Negative frames tend to elicit negative feelings, resulting in
reactive and risk-avoiding behaviors. Stress and time pressures amplify these
behaviors, a phenomenon frequently exploited in high pressure sales: present a
product in a positive frame, present competitors in a negative frame, and time-
bound the decision to pressure the buy. However, when people are exposed to
multiple conflicting frames, the framing effect is neutralized, and people think and
act consistently with their own beliefs.

Use framing to elicit positive or negative feelings about a design, and to influence
behaviors and decision-making. Use positive frames to move people to action
(e.g., make a purchase) and negative frames to move people to inaction (e.g.,
prevent use of illegal drugs). To maintain a strong framing effect, make sure that
frames are not conflicting. Conversely, neutralize framing effects by presenting
multiple conflicting frames.

See also Expectation Effect, Exposure Effect, and Scarcity.

fGarbage In–Garbage Out
The quality of system output is dependent on the quality
of system input.1


The garbage in–garbage out principle is based on the observation that good inputs      1
                                                                                           Also known as GIGO.
generally result in good outputs, and bad inputs, barring design intervention,
generally result in bad outputs. The rule has been generalized over time to apply      2
                                                                                           While the garbage in–garbage out concept
to all systems, and is commonly invoked in domains such as business, education,            dates back to Charles Babbage (1864),
                                                                                           or earlier, the term is attributed to George
nutrition, and engineering, to name a few. The “garbage in” metaphor refers to
                                                                                           Fuechsel, a programming instructor who
one of two kinds of input problems: problems of type and problems of quality.2             used it as a teaching device in the late
                                                                                           1950s. It should be noted that Fuechsel
Problems of type occur when the incorrect type of input is fed into a system, such         used the principle to emphasize that
as entering a phone number into a credit card number field. Problems of type               “garbage out” is not the inevitable result
                                                                                           of “garbage in,” but rather a condition that
are serious because the input provided could be radically different from the input
                                                                                           should be addressed through design.
expected. This can be advantageous in that problems of type are relatively easy
to detect, but problematic in that they represent the maximum form of garbage
if undetected. Problems of type are generally caused by a class of errors called
mistakes—incorrect actions caused by conscious actions. The primary strategies
for minimizing problems of type are affordances and constraints. These strategies
structure input and minimize the frequency and magnitude of garbage input.

Problems of quality occur when the correct type of input is fed into a system, but
with defects, such as entering a phone number into a phone number field but
entering the wrong number. Depending on the frequency and severity of these
defects, problems of quality may or may not be serious. Mistyping one letter
in a name may have minor consequences (e.g., search item not found); trying
to request a download of fifty records but typing five thousand might lock up
the system. Problems of quality are generally caused by a class of errors called
slips—incorrect actions caused by unconscious, accidental actions. The primary
strategies for minimizing problems of quality are previews and confirmations.
These strategies allow the consequences of actions to be reviewed and verified
prior to input.

The best way to avoid garbage out is to prevent garbage in. Use affordances and
constraints to minimize problems of type. Use previews and confirmations to
minimize problems of quality. When input integrity is critical, use validation tests
to check integrity prior to input, and consider confirmation steps that require the
independent verification of multiple people. Consider mechanisms to automatically
flag and, in some cases, autocorrect bad input (e.g., automatic spelling correction
in word processors).

See also Errors, Feedback Loop, and Signal-to-Noise Ratio.

fGutenberg Diagram
A diagram that describes the general pattern followed by
the eyes when looking at evenly distributed, homogeneous
information.1


The Gutenberg diagram divides a display medium into four quadrants: the primary            1
                                                                                               Also known as the Gutenberg rule and the Z
optical area at the top left, the terminal area at the bottom right, the strong fallow         pattern of processing.

area at the top right, and the weak fallow area at the bottom left. According to
the diagram, Western readers naturally begin at the primary optical area and
                                                                                           2
                                                                                               The seminal work on the Gutenberg diagram is
                                                                                               attributed to the typographer Edmund Arnold,
move across and down the display medium in a series of sweeps to the terminal
                                                                                               who is said to have developed the concept in
area. Each sweep begins along an axis of orientation—a horizontal line created                 the 1950s. See, for example, Type &amp; Layout:
by aligned elements, text lines, or explicit segments—and proceeds in a left-to-               How Typography and Design Can Get Your
right direction. The strong and weak fallow areas lie outside this path and receive            Message Across or Get in the Way, by Colin
minimal attention unless visually emphasized. The tendency to follow this path                 Wheildon, Strathmoor Press, 1995.

is metaphorically attributed to reading gravity—the left-right, top-bottom habit
formed from reading.2

Designs that follow the diagram work in harmony with reading gravity, and return
readers to a logical axis of orientation, purportedly improving reading rhythm
and comprehension. For example, a layout following the Gutenberg diagram
would place key elements at the top left (e.g., headline), middle (e.g., image),
and bottom right (e.g., contact information). Though designs based directly or
indirectly on the Gutenberg diagram are widespread, there is little empirical
evidence that it contributes to improved reading rates or comprehension.

The Gutenberg diagram is likely only predictive of eye movement for heavy text
information, evenly distributed and homogeneous information, and blank pages or
displays. In all other cases, the weight of the elements of the design in concert with
their layout and composition will direct eye movements. For example, if a newspaper
has a very heavy headline and photograph in its center, the center will be the
primary optical area. Familiarity with the information and medium also influences
eye movements. For example, a person who regularly views information presented
in a consistent way is more likely to first look at areas that are often changing (e.g.,
new top stories) than areas that are the same (e.g., the title of a newspaper).

Consider the Gutenberg diagram to assist in layout and composition when the
elements are evenly distributed and homogeneous, or the design contains heavy
use of text. Otherwise, use the weight and composition of elements to lead the eye.

See also Alignment, Entry Point, Progressive Disclosure, and Serial Position Effects.

fHierarchy of Needs
In order for a design to be successful, it must meet
people’s basic needs before it can attempt to satisfy
higher-level needs.1


The hierarchy of needs principle specifies that a design must serve the low-level         1
                                                                                              The hierarchy of needs is based on Maslow’s
needs (e.g., it must function), before the higher-level needs, such as creativity,            Hierarchy of Needs.

can begin to be addressed. Good designs follow the hierarchy of needs principle,
whereas poor designs may attempt to meet needs from the various levels without
                                                                                          2
                                                                                              The seminal work on the concept of a
                                                                                              hierarchy of needs is Motivation and
building on the lower levels of the hierarchy first. The five key levels of needs in
                                                                                              Personality by Abraham Maslow, Addison-
the hierarchy are described below.2                                                           Wesley, 1987 [1954].

Functionality needs have to do with meeting the most basic design requirements.
For example, a video recorder must, at minimum, provide the capability to record,
play, and rewind recorded programs. Designs at this level are perceived to be of
little or no value.

Reliability needs have to do with establishing stable and consistent performance.
For example, a video recorder should perform consistently and play back recorded
programs at an acceptable level of quality. If the design performs erratically, or is
subject to frequent failure, reliability needs are not satisfied. Designs at this level
are perceived to be of low value.

Usability needs have to do with how easy and forgiving a design is to use. For
example, configuring a video recorder to record programs at a later time should be
easily accomplished, and the recorder should be tolerant of mistakes. If the difficulty
of use is too great, or the consequences of simple errors too severe, usability needs
are not satisfied. Designs at this level are perceived to be of moderate value.

Proficiency needs have to do with empowering people to do things better than
they could previously. For example, a video recorder that can seek out and record
programs based on keywords is a significant advance in recording capability,
enabling people to do things not previously possible. Designs at this level are
perceived to be of high value.

Creativity is the level in the hierarchy where all needs have been satisfied, and
people begin interacting with the design in innovative ways. The design, having
satisfied all other needs, is now used to create and explore areas that extend both
the design and the person using the design. Designs at this level are perceived to
be of the highest value, and often achieve cult-like loyalty among users.

Consider the hierarchy of needs in design, and ensure that lower-level needs are
satisfied before resources are devoted to serving higher-level needs. Evaluate
existing designs with respect to the hierarchy to determine where modifications
should be made.

See also 80/20 Rule, Aesthetic-Usability Effect, and Form Follows Function.
