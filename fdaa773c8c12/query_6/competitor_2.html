</span><br data-dcnode-id="781"><br data-dcnode-id="780"><span data-dcnode-id="779" instrument_node="">
The architects inspected the structure in the company of Gustave Eiffel (center, right). </span></span><span class="credit" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">FPG/Archive Photos/Getty Images</span></span></div></div><span data-dcnode-id="773" instrument_node="">

</span><br data-dcnode-id="769"><br data-dcnode-id="768"><span data-dcnode-id="767" instrument_node="">
The tower, which was being built for the Paris Exposition of 1889, had been completed to the second landing.  </span></span><span class="credit" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Three Lions/Getty Images</span></span></div></div><span data-dcnode-id="761" instrument_node="">
</span><div class="details-wrap" data-dcnode-id="753"><div class="page-count hidden-sm-down" data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">4 of 16</span></div><div class="description" data-dcnode-id="754" id="desc_1_4"><span class="caption-body" data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">One of the steel struts of the Eiffel Tower at the start of its construction.</span></span><span class="credit" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">FPG/Hulton Archive/Getty Images</span></span></div></div><span data-dcnode-id="752" instrument_node="">

</span><br data-dcnode-id="748"><br data-dcnode-id="747"><span data-dcnode-id="746" instrument_node="">
Before the project's start, 47 local artists had banded together to sign a petition protesting its construction.</span></span><span class="credit" data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">FPG/Hulton Archive/Getty Images</span></span></div></div><span data-dcnode-id="740" instrument_node="">
</span><div class="details-wrap" data-dcnode-id="732"><div class="page-count hidden-sm-down" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">6 of 16</span></div><div class="description" data-dcnode-id="733" id="desc_1_6"><span class="caption-body" data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Before it began construction, the Eiffel Tower project was marred by protests, especially from Parisian artists, who thought the structure would taint the city's beauty.</span></span><span class="credit" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Gamma-Keystone via Getty Images</span></span></div></div><span data-dcnode-id="731" instrument_node="">

</span><div class="details-wrap" data-dcnode-id="696"><div class="page-count hidden-sm-down" data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">10 of 16</span></div><div class="description" data-dcnode-id="697" id="desc_1_10"><span class="caption-body" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Construction began in 1887, starting with planting the foundations for the steel structure.</span></span><span class="credit" data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">SSPL/Getty Images</span></span></div></div><span data-dcnode-id="695" instrument_node="">
</span><div class="details-wrap" data-dcnode-id="687"><div class="page-count hidden-sm-down" data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">11 of 16</span></div><div class="description" data-dcnode-id="688" id="desc_1_11"><span class="caption-body" data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Gustave Eiffel (left) and a friend explore the newly built Eiffel Tower in Paris in 1889, the year of the Centennial Exposition.</span></span><span class="credit" data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Getty Images</span></span></div></div><span data-dcnode-id="686" instrument_node="">
</span><div class="details-wrap" data-dcnode-id="678"><div class="page-count hidden-sm-down" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">12 of 16</span></div><div class="description" data-dcnode-id="679" id="desc_1_12"><span class="caption-body" data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">The controversial tower was the world's tallest structure until the completion of New York City's Chrysler Building in 1930.</span></span><span class="credit" data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Roger Viollet via Getty Images</span></span></div></div><span data-dcnode-id="677" instrument_node="">
</span><div class="details-wrap" data-dcnode-id="669"><div class="page-count hidden-sm-down" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">13 of 16</span></div><div class="description" data-dcnode-id="670" id="desc_1_13"><span class="caption-body" data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">A view of the tower's interior. Despite its significance today, the Eiffel Tower was originally a controversial project that sparked mass protest from locals. </span></span><span class="credit" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">SSPL/Getty Images</span></span></div></div><span data-dcnode-id="668" instrument_node="">
</span><div class="details-wrap" data-dcnode-id="660"><div class="page-count hidden-sm-down" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">14 of 16</span></div><div class="description" data-dcnode-id="661" id="desc_1_14"><span class="caption-body" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Under the Eiffel Tower, two years after its construction began. It was finally completed in March 1889, just in time for the World's Fair in Paris.</span></span><span class="credit" data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Gamma-Keystone via Getty Images</span></span></div></div><span data-dcnode-id="659" instrument_node="">

</span><img alt="Early Construction Of Eiffel Tower" class="large-image embed-responsive-item lazyloaded" data-dcnode-id="565" data-src="//allthatsinteresting.com/thumb/630.501.https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/early-construction-of-eiffel-tower.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthatsinteresting.com/thumb/630.501.https%3A//allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/early-construction-of-eiffel-tower.jpg&amp;raw"><noscript data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">&lt;img class="large-image embed-responsive-item"

</span><div class="details" data-dcnode-id="553"><span data-dcnode-id="561" instrument_node="">
</span><div class="title" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Why The Eiffel Tower Was Built — And Why Parisians Wanted It Torn Right Back Down</span></div><span data-dcnode-id="558" instrument_node="">
</span><div class="button" data-dcnode-id="555"><div class="font-baseline-offset" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">View Gallery</span></div></div><span data-dcnode-id="554" instrument_node="">
</span></div><span data-dcnode-id="552" instrument_node="">
</span></div><span data-dcnode-id="550" instrument_node="">
</span></div><span data-dcnode-id="548" instrument_node="">
</span></div><span data-dcnode-id="546" instrument_node="">
</span></div><span data-dcnode-id="543" instrument_node="">
</span><p class="dropcaps" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">"A diabolic undertaking of a boilermaker with delusions of grandeur!" exclaimed French author Guy de Maupassant after he saw the Eiffel Tower for the first time. </span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Others called it a "truly tragic street lamp," a "mast of iron gymnasium apparatus, incomplete, confused and deformed," a "hideous column with railings, this infundibuliform chicken wire, glory to the wire and the slab, arrow of Notre-Dame of bric-a-brac." </span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">The Eiffel Tower is now a symbol of romance and beauty in the heart of the City of Lights, but countless critiques were leveled against the structure when it was first erected in the late 19th century. </span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Constructed for the 1889 World's Fair, the Eiffel Tower was originally built to commemorate the 100th anniversary of the French Revolution. But if a vocal group of Parisians had their way, the beloved monument would've been torn down immediately after the festivities were over.</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Even before construction commenced, the Eiffel Tower was marred by mass protests led by Parisian critics who dubbed the new landmark a "useless and monstrous" eyesore that would taint Paris forever.</span></p><span data-dcnode-id="528" instrument_node="">
</span><h2 data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Why Was The Eiffel Tower Built?</span></h2><span data-dcnode-id="525" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="516" id="attachment_272866"><img alt="Gustave Eiffel" aria-describedby="caption-attachment-272866" class="size-full wp-image-272866 post-img-portrait lazyloaded" data-dcnode-id="524" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/gustave-eiffel.jpg" data-srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/gustave-eiffel.jpg 800w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/gustave-eiffel-269x300.jpg 269w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/gustave-eiffel-768x857.jpg 768w" height="893" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/gustave-eiffel.jpg&amp;raw" srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/gustave-eiffel.jpg 800w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/gustave-eiffel-269x300.jpg 269w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/gustave-eiffel-768x857.jpg 768w" width="800"><noscript data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">&lt;img aria-describedby="caption-attachment-272866" src="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/gustave-eiffel.jpg" alt="Gustave Eiffel" width="800" height="893" class="size-full wp-image-272866 post-img-portrait" srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/gustave-eiffel.jpg 800w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/gustave-eiffel-269x300.jpg 269w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/gustave-eiffel-768x857.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="517" id="caption-attachment-272866"><span class="credit" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Spencer Arnold Collection/Hulton Archive/Getty Images</span></span><span class="caption-body" data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Gustave Eiffel's ambitious design of a 1,000-foot steel tower was chosen among 700 design proposals.</span></span></p></div><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Alexandre Gustave Eiffel was born on Dec. 15, 1832, and grew up in Dijon, the capital of Burgundy. Weaving was a common profession among his family members, but it was two chemist uncles who would have an outsized influence on him. They encouraged his interest in a variety of subjects. </span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Eiffel eventually turned his attention to metal work and moved to Paris, where he sought to make a name for himself. He landed a job under a railway construction engineer named Charles Nepveu, who later entrusted Eiffel with the execution of the Bordeaux Bridge. His work on the bridge was completed in 1860 and it led to many similar projects.</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">In 1886, the French government held a design competition to build a flagship structure for the upcoming World's Fair in Paris, which also coincided with the centennial commemoration of the French Revolution. This landmark design needed to be completed within three years.</span></p><span data-dcnode-id="506" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="497" id="attachment_272867"><img alt="The Construction Of The Eiffel Tower" aria-describedby="caption-attachment-272867" class="size-full wp-image-272867 post-img-landscape lazyloaded" data-dcnode-id="505" data-sizes="(max-width: 900px) 100vw, 900px" data-src="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/the-construction-of-eiffel-tower.jpg" data-srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/the-construction-of-eiffel-tower.jpg 900w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/the-construction-of-eiffel-tower-300x181.jpg 300w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/the-construction-of-eiffel-tower-768x464.jpg 768w" height="544" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/the-construction-of-eiffel-tower.jpg&amp;raw" srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/the-construction-of-eiffel-tower.jpg 900w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/the-construction-of-eiffel-tower-300x181.jpg 300w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/the-construction-of-eiffel-tower-768x464.jpg 768w" width="900"><noscript data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">&lt;img aria-describedby="caption-attachment-272867" src="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/the-construction-of-eiffel-tower.jpg" alt="The Construction Of The Eiffel Tower" width="900" height="544" class="size-full wp-image-272867 post-img-landscape" srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/the-construction-of-eiffel-tower.jpg 900w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/the-construction-of-eiffel-tower-300x181.jpg 300w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/the-construction-of-eiffel-tower-768x464.jpg 768w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="498" id="caption-attachment-272867"><span class="credit" data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Sepia Times/Universal Images Group via Getty Images</span></span><span class="caption-body" data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">The construction of the Eiffel Tower was initially met with protests from the city's artists.</span></span></p></div><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Confident in his skills as an architect, Eiffel decided to submit a design for the competition. His design for a steel lattice tower beat the 700 other submissions received by the Centennial Exposition Committee.</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Gustave Eiffel's design was tremendously ambitious. Standing at nearly 1,000 feet tall, the Eiffel Tower would outsize the Washington Monument, which at 555 feet was the tallest landmark in the world at the time. </span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Not only extremely tall for its time, the Eiffel Tower was also very intricate. It would be made of 18,000 wrought iron pieces held together with 2.5 million rivets, with four curved iron piers connected by a lattice of girders. After careful calculations, the tower's curves were designed to offer the maximum amount of efficient wind resistance. </span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Describing the design, Eiffel said, "Before coming together at the high pinnacle, the uprights appear to burst out of the ground, and in a way to be shaped by the action of the wind."</span></p><span data-dcnode-id="484" instrument_node="">
</span><h2 data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Parisians Protest The Eiffel Tower Construction</span></h2><span data-dcnode-id="481" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="472" id="attachment_272868"><img alt="Eiffel Tower Construction Workers" aria-describedby="caption-attachment-272868" class="size-full wp-image-272868 post-img-portrait lazyloaded" data-dcnode-id="480" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/eiffel-tower-construction-workers.jpg" data-srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/eiffel-tower-construction-workers.jpg 600w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/eiffel-tower-construction-workers-226x300.jpg 226w" height="797" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/eiffel-tower-construction-workers.jpg&amp;raw" srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/eiffel-tower-construction-workers.jpg 600w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/eiffel-tower-construction-workers-226x300.jpg 226w" width="600"><noscript data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">&lt;img aria-describedby="caption-attachment-272868" src="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/eiffel-tower-construction-workers.jpg" alt="Eiffel Tower Construction Workers" width="600" height="797" class="size-full wp-image-272868 post-img-portrait" srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/eiffel-tower-construction-workers.jpg 600w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/eiffel-tower-construction-workers-226x300.jpg 226w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="473" id="caption-attachment-272868"><span class="credit" data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Three Lions/Getty Images</span></span><span class="caption-body" data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Workers inside the tower's steel skeleton during the construction.</span></span></p></div><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">For Eiffel, the tower was a symbol of the modern century. He hoped that the structure would also prove useful for the work of meteorologists and cartographers given its tremendous height.</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">But not everyone was impressed. News of the dark steel tower sparked criticism from the public, mainly among the creative city's legion of artists. </span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Led by Charles Garnier, the architect behind the famed Grand Palais Garnier, hundreds of artists — mostly painters, poets, and writers — signed a public petition in protest of the Eiffel Tower.</span></p><span data-dcnode-id="462" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="453" id="attachment_272869"><img alt="Charles Garnier" aria-describedby="caption-attachment-272869" class="size-full wp-image-272869 post-img-portrait lazyloaded" data-dcnode-id="461" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/charles-garnier.jpg" data-srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/charles-garnier.jpg 600w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/charles-garnier-222x300.jpg 222w" height="810" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/charles-garnier.jpg&amp;raw" srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/charles-garnier.jpg 600w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/charles-garnier-222x300.jpg 222w" width="600"><noscript data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">&lt;img aria-describedby="caption-attachment-272869" src="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/charles-garnier.jpg" alt="Charles Garnier" width="600" height="810" class="size-full wp-image-272869 post-img-portrait" srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/charles-garnier.jpg 600w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/charles-garnier-222x300.jpg 222w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="454" id="caption-attachment-272869"><span class="credit" data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Wikimedia Commons</span></span><span class="caption-body" data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Architect Charles Garnier spearheaded protests against the Eiffel Tower, which culminated in a dramatic petition.</span></span></p></div><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="451" instrument_node="">The widely circulated petition was published on Valentine's Day in the local publication </span><em data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Le Temps</span></em><span data-dcnode-id="448" instrument_node=""> and </span><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mashable.com/2015/10/14/building-eiffel-tower/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="447" instrument_node="">made the group's stance clear</span></a><span data-dcnode-id="445" instrument_node=""> about the "gigantic black factory chimney" that they were certain would become an eyesore:</span></p><span data-dcnode-id="443" instrument_node="">
</span><blockquote data-dcnode-id="440"><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">We have come, writers, painters, sculptors, architects and passionate devotees of the hitherto untouched beauty of Paris, to protest with all our strength, all our indignation, in the name of slighted French taste...against the erection, in the heart of our capital, of this useless and monstrous Eiffel Tower...Will the city of Paris go on to associate itself with the baroques, with the mercantile imaginations of a machine builder, to become irreparably ugly and dishonor itself? For the Eiffel Tower, which commercial America itself would not want, is, doubtless, the dishonor of Paris. Everyone feels it, everyone says it, everyone deeply grieves it, and we are only a weak echo of the universal opinion, so legitimately alarmed.</span></p></blockquote><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">But Gustave Eiffel saw it differently. He believed his design, if successfully carried out, would be a monumental feat for society. He asserted that if one were to dismiss his tower, one might just as easily dismiss the ancient pyramids of Giza, since they were "only artificial mounds of dirt."</span></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">"We are not simply the country of entertainers," Eiffel argued, "but also that of engineers and builders called from across the world to build bridges, viaducts, stations and major monuments of modern industry, the Eiffel Tower deserves to be treated with consideration." </span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Fortunately for him, the French government felt the same way and construction on the Eiffel Tower began in earnest in January 1887.</span></p><span data-dcnode-id="430" instrument_node="">
</span><h2 data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">The Tower's Significance Today</span></h2><span data-dcnode-id="427" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="418" id="attachment_272873"><img alt="Photographing The Eiffel Tower" aria-describedby="caption-attachment-272873" class="size-full wp-image-272873 post-img-landscape lazyloaded" data-dcnode-id="426" data-sizes="(max-width: 900px) 100vw, 900px" data-src="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/photographing-the-eiffel-tower.jpg" data-srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/photographing-the-eiffel-tower.jpg 900w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/photographing-the-eiffel-tower-300x240.jpg 300w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/photographing-the-eiffel-tower-768x614.jpg 768w" height="720" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/photographing-the-eiffel-tower.jpg&amp;raw" srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/photographing-the-eiffel-tower.jpg 900w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/photographing-the-eiffel-tower-300x240.jpg 300w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/photographing-the-eiffel-tower-768x614.jpg 768w" width="900"><noscript data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">&lt;img aria-describedby="caption-attachment-272873" src="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/photographing-the-eiffel-tower.jpg" alt="Photographing The Eiffel Tower" width="900" height="720" class="size-full wp-image-272873 post-img-landscape" srcset="https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/photographing-the-eiffel-tower.jpg 900w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/photographing-the-eiffel-tower-300x240.jpg 300w, https://allthatsinteresting.com/wordpress/wp-content/uploads/2020/05/photographing-the-eiffel-tower-768x614.jpg 768w" sizes="(max-width: 900px) 100vw, 900px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="419" id="caption-attachment-272873"><span class="credit" data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Wikimedia Commons</span></span><span class="caption-body" data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Despite its rough beginnings, the Eiffel Tower is now a beloved icon of Paris.</span></span></p></div><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">While Gustave Eiffel may have exaggerated its architectural significance, the construction of the Eiffel Tower was indeed a monumental undertaking. </span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Due to the tower's unprecedented height, construction workers had to use moveable cranes, pyramidal scaffolds, and elevators to move 200 builders and the materials higher and higher as the tower was completed.</span></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">The construction of the Eiffel Tower was completed on March 31, 1889, just in time for the World's Fair. Despite initial protests, the impressive landmark that was once decried as a monstrosity slowly become France's most celebrated symbol. </span></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="407" instrument_node="">The Eiffel Tower eventually lost its title as the world's tallest structure after the Chrysler Building was erected in New York City in May 1930. Yet well over a century since its completion, the landmark remains the greatest emblem of Parisian elegance, and it continues to </span><a data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2013/07/11/world/europe/eiffel-tower-fast-facts/index.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="406" instrument_node="">attract about 7 million visitors</span></a><span data-dcnode-id="404" instrument_node=""> every year.  </span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">In contrast to its present-day popularity, Guy de Maupassant's iron disdain for the structure remained unwavering until his death four years after the monument's completion. He would boast to others that he often took his lunch inside the Eiffel Tower because "it's the only place in Paris where I don't have to see it."</span></p><span data-dcnode-id="399" instrument_node="">
</span><hr data-dcnode-id="398"><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="388"><em data-dcnode-id="389"><span data-dcnode-id="396" instrument_node="">Now that you've learned about why the Eiffel Tower was built, take a look at </span><a data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthatsinteresting.com/liberation-of-paris"><span data-dcnode-id="395" instrument_node="">33 photos from the liberation of Paris</span></a><span data-dcnode-id="393" instrument_node="">. Then, enjoy </span><a data-dcnode-id="391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//allthatsinteresting.com/pictures-of-paris-1960s"><span data-dcnode-id="392" instrument_node="">the Paris of the 1960s with these 44 striking photos</span></a><span data-dcnode-id="390" instrument_node="">.</span></em></p><span data-dcnode-id="387" instrument_node="">
</span></article><span data-dcnode-id="385" instrument_node="">
