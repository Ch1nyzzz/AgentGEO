</span><h2 data-dcnode-id="7550"><span class="mw-headline" data-dcnode-id="7551" id="Illumination_copyright"><span data-dcnode-id="7552" instrument_node="">Illumination copyright</span></span></h2><span data-dcnode-id="7549" instrument_node="">
</span><link data-dcnode-id="7548" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7544" role="note"><span data-dcnode-id="7547" instrument_node="">Further information: </span><a data-dcnode-id="7545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_panorama%23France" title="Freedom of panorama"><span data-dcnode-id="7546" instrument_node="">Freedom of panorama §&nbsp;France</span></a></div><span data-dcnode-id="7543" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7534"><div class="thumbinner" data-dcnode-id="7535" style="width:222px;"><a class="image" data-dcnode-id="7541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APhotographing_the_Eiffel_Tower_at_dusk.jpg"><img alt="" class="thumbimage" data-dcnode-id="7542" data-file-height="4000" data-file-width="5000" decoding="async" height="176" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/84/Photographing_the_Eiffel_Tower_at_dusk.jpg/220px-Photographing_the_Eiffel_Tower_at_dusk.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/84/Photographing_the_Eiffel_Tower_at_dusk.jpg/330px-Photographing_the_Eiffel_Tower_at_dusk.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/84/Photographing_the_Eiffel_Tower_at_dusk.jpg/440px-Photographing_the_Eiffel_Tower_at_dusk.jpg 2x" width="220"></a><span data-dcnode-id="7540" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7536"><div class="magnify" data-dcnode-id="7538"><a class="internal" data-dcnode-id="7539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APhotographing_the_Eiffel_Tower_at_dusk.jpg" title="Enlarge"></a></div><span data-dcnode-id="7537" instrument_node="">The Eiffel Tower illuminated in 2015</span></div></div></div><span data-dcnode-id="7533" instrument_node="">
</span><p data-dcnode-id="7494"><span data-dcnode-id="7532" instrument_node="">The tower and its image have been in the </span><a data-dcnode-id="7530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_domain" title="Public domain"><span data-dcnode-id="7531" instrument_node="">public domain</span></a><span data-dcnode-id="7529" instrument_node=""> since 1993, 70 years after Eiffel's death.</span><sup class="reference" data-dcnode-id="7526" id="cite_ref-94"><a data-dcnode-id="7527" href="#cite_note-94"><span data-dcnode-id="7528" instrument_node="">[94]</span></a></sup><span data-dcnode-id="7525" instrument_node=""> In June 1990 a French court ruled that a special lighting display on the tower in 1989 to mark the tower's 100th anniversary was an "original visual creation" protected by copyright. The </span><a data-dcnode-id="7523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Court_of_Cassation_%28France%29" title="Court of Cassation (France)"><span data-dcnode-id="7524" instrument_node="">Court of Cassation</span></a><span data-dcnode-id="7522" instrument_node="">, France's judicial court of last resort, upheld the ruling in March 1992.</span><sup class="reference" data-dcnode-id="7519" id="cite_ref-95"><a data-dcnode-id="7520" href="#cite_note-95"><span data-dcnode-id="7521" instrument_node="">[95]</span></a></sup><span data-dcnode-id="7518" instrument_node=""> The </span><span data-dcnode-id="7515" title="French-language text"><i data-dcnode-id="7516" lang="fr"><span data-dcnode-id="7517" instrument_node="">Société d'Exploitation de la Tour Eiffel</span></i></span><span data-dcnode-id="7514" instrument_node=""> (SETE) now considers any illumination of the tower to be a separate work of art that falls under copyright.</span><sup class="reference" data-dcnode-id="7511" id="cite_ref-96"><a data-dcnode-id="7512" href="#cite_note-96"><span data-dcnode-id="7513" instrument_node="">[96]</span></a></sup><span data-dcnode-id="7510" instrument_node=""> As a result, the SNTE alleges that it is illegal to publish contemporary photographs of the lit tower at night without permission in France and some other countries for commercial use.</span><sup class="reference" data-dcnode-id="7507" id="cite_ref-97"><a data-dcnode-id="7508" href="#cite_note-97"><span data-dcnode-id="7509" instrument_node="">[97]</span></a></sup><sup class="reference" data-dcnode-id="7504" id="cite_ref-98"><a data-dcnode-id="7505" href="#cite_note-98"><span data-dcnode-id="7506" instrument_node="">[98]</span></a></sup><span data-dcnode-id="7503" instrument_node=""> For this reason, it is often rare to find images or videos of the lit tower at night on stock image sites,</span><sup class="reference" data-dcnode-id="7500" id="cite_ref-petapixeleiffel_99-0"><a data-dcnode-id="7501" href="#cite_note-petapixeleiffel-99"><span data-dcnode-id="7502" instrument_node="">[99]</span></a></sup><span data-dcnode-id="7499" instrument_node=""> and media outlets rarely broadcast images or videos of it.</span><sup class="reference" data-dcnode-id="7496" id="cite_ref-thecultureeiffel_100-0"><a data-dcnode-id="7497" href="#cite_note-thecultureeiffel-100"><span data-dcnode-id="7498" instrument_node="">[100]</span></a></sup><span data-dcnode-id="7495" instrument_node="">
</span></p><p data-dcnode-id="7476"><span data-dcnode-id="7493" instrument_node="">The imposition of copyright has been controversial. The Director of Documentation for what was then called the </span><span data-dcnode-id="7490" title="French-language text"><i data-dcnode-id="7491" lang="fr"><span data-dcnode-id="7492" instrument_node="">Société Nouvelle d'exploitation de la Tour Eiffel</span></i></span><span data-dcnode-id="7489" instrument_node=""> (SNTE), Stéphane Dieu, commented in 2005: "It is really just a way to manage commercial use of the image, so that it isn't used in ways [of which] we don't approve".</span><sup class="reference" data-dcnode-id="7486" id="cite_ref-fastco_101-0"><a data-dcnode-id="7487" href="#cite_note-fastco-101"><span data-dcnode-id="7488" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7485" instrument_node=""> SNTE made over €1&nbsp;million from copyright fees in 2002.</span><sup class="reference" data-dcnode-id="7482" id="cite_ref-102"><a data-dcnode-id="7483" href="#cite_note-102"><span data-dcnode-id="7484" instrument_node="">[102]</span></a></sup><span data-dcnode-id="7481" instrument_node=""> However, it could also be used to restrict the publication of tourist photographs of the tower at night, as well as hindering non-profit and semi-commercial publication of images of the illuminated tower.</span><sup class="reference" data-dcnode-id="7478" id="cite_ref-artjournal_103-0"><a data-dcnode-id="7479" href="#cite_note-artjournal-103"><span data-dcnode-id="7480" instrument_node="">[103]</span></a></sup><span data-dcnode-id="7477" instrument_node="">
</span></p><p data-dcnode-id="7467"><span data-dcnode-id="7475" instrument_node="">The copyright claim itself has never been tested in courts to date, according to a 2014 article in the </span><i data-dcnode-id="7473"><span data-dcnode-id="7474" instrument_node="">Art Law Journal</span></i><span data-dcnode-id="7472" instrument_node="">, and there has never been an attempt to track down millions of netizens who have posted and shared their images of the illuminated tower on the Internet worldwide. It added, however, that permissive situation may arise on commercial use of such images, like in a magazine, on a film poster, or on product packaging.</span><sup class="reference" data-dcnode-id="7469" id="cite_ref-104"><a data-dcnode-id="7470" href="#cite_note-104"><span data-dcnode-id="7471" instrument_node="">[104]</span></a></sup><span data-dcnode-id="7468" instrument_node="">
</span></p><p data-dcnode-id="7457"><span data-dcnode-id="7466" instrument_node="">French doctrine and jurisprudence allows pictures incorporating a copyrighted work as long as their presence is incidental or accessory to the subject being represented,</span><sup class="reference" data-dcnode-id="7463" id="cite_ref-105"><a data-dcnode-id="7464" href="#cite_note-105"><span data-dcnode-id="7465" instrument_node="">[105]</span></a></sup><span data-dcnode-id="7462" instrument_node=""> a reasoning akin to the </span><i data-dcnode-id="7459"><a data-dcnode-id="7460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De_minimis" title="De minimis"><span data-dcnode-id="7461" instrument_node="">de minimis</span></a></i><span data-dcnode-id="7458" instrument_node=""> rule. Therefore, SETE may be unable to claim copyright on photographs of Paris which happen to include the lit tower.
</span></p><span data-dcnode-id="7456" instrument_node="">
</span><h2 data-dcnode-id="7453"><span class="mw-headline" data-dcnode-id="7454" id="Height_changes"><span data-dcnode-id="7455" instrument_node="">Height changes</span></span></h2><span data-dcnode-id="7452" instrument_node="">

</span></p><span data-dcnode-id="7268" instrument_node="">
