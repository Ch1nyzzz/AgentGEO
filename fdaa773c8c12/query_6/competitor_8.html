</span><p data-dcnode-id="9656"><span data-dcnode-id="9718" instrument_node="">The </span><b data-dcnode-id="9716"><span data-dcnode-id="9717" instrument_node="">Eiffel Tower</span></b><span data-dcnode-id="9715" instrument_node=""> (</span><span class="rt-commentedText nowrap" data-dcnode-id="9701"><span class="IPA nopopups noexcerpt" data-dcnode-id="9702"><a data-dcnode-id="9703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AIPA/English" title="Help:IPA/English"><span data-dcnode-id="9714" instrument_node="">/</span><span data-dcnode-id="9705" style="border-bottom:1px dotted"><span data-dcnode-id="9712" title="/ˈ/: primary stress follows"><span data-dcnode-id="9713" instrument_node="">ˈ</span></span><span data-dcnode-id="9710" title="/aɪ/: 'i' in 'tide'"><span data-dcnode-id="9711" instrument_node="">aɪ</span></span><span data-dcnode-id="9708" title="'f' in 'find'"><span data-dcnode-id="9709" instrument_node="">f</span></span><span data-dcnode-id="9706" title="/əl/: 'le' in 'bottle'"><span data-dcnode-id="9707" instrument_node="">əl</span></span></span><span data-dcnode-id="9704" instrument_node="">/</span></a></span></span><span data-dcnode-id="9700" instrument_node=""> </span><a data-dcnode-id="9695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3APronunciation_respelling_key" title="Help:Pronunciation respelling key"><i data-dcnode-id="9696" title="English pronunciation respelling"><span data-dcnode-id="9698" style="font-size:90%"><span data-dcnode-id="9699" instrument_node="">EYE</span></span><span data-dcnode-id="9697" instrument_node="">-fəl</span></i></a><span data-dcnode-id="9694" instrument_node="">; </span><a data-dcnode-id="9692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_language" title="French language"><span data-dcnode-id="9693" instrument_node="">French</span></a><span data-dcnode-id="9691" instrument_node="">: </span><i data-dcnode-id="9689" lang="fr"><span data-dcnode-id="9690" instrument_node="">tour Eiffel</span></i><span data-dcnode-id="9688" instrument_node=""> </span><small data-dcnode-id="9687"></small><span class="IPA" data-dcnode-id="9684" title="Representation in the International Phonetic Alphabet (IPA)"><a data-dcnode-id="9685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AIPA/French" title="Help:IPA/French"><span data-dcnode-id="9686" instrument_node="">[tuʁ‿ɛfɛl]</span></a></span><span data-dcnode-id="9683" instrument_node=""> </span><span class="nowrap" data-dcnode-id="9673" style="font-size:85%"><span data-dcnode-id="9682" instrument_node="">(</span><span class="unicode haudio" data-dcnode-id="9675"><span class="fn" data-dcnode-id="9676"><span data-dcnode-id="9679" style="white-space:nowrap;margin-right:.25em;"><a data-dcnode-id="9680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATour_Eiffel_Pronunciation.ogg" title="About this sound"><img alt="" data-dcnode-id="9681" data-file-height="20" data-file-width="20" decoding="async" height="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Loudspeaker.svg/11px-Loudspeaker.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Loudspeaker.svg/17px-Loudspeaker.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Loudspeaker.svg/22px-Loudspeaker.svg.png 2x" width="11"></a></span><a class="internal" data-dcnode-id="9677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/e/eb/Tour_Eiffel_Pronunciation.ogg" title="Tour Eiffel Pronunciation.ogg"><span data-dcnode-id="9678" instrument_node="">listen</span></a></span></span><span data-dcnode-id="9674" instrument_node="">)</span></span><span data-dcnode-id="9672" instrument_node="">) is a </span><a class="mw-redirect" data-dcnode-id="9670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wrought-iron" title="Wrought-iron"><span data-dcnode-id="9671" instrument_node="">wrought-iron</span></a><span data-dcnode-id="9669" instrument_node=""> </span><a data-dcnode-id="9667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lattice_tower" title="Lattice tower"><span data-dcnode-id="9668" instrument_node="">lattice tower</span></a><span data-dcnode-id="9666" instrument_node=""> on the </span><a data-dcnode-id="9664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Champ_de_Mars" title="Champ de Mars"><span data-dcnode-id="9665" instrument_node="">Champ de Mars</span></a><span data-dcnode-id="9663" instrument_node=""> in </span><a data-dcnode-id="9661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris" title="Paris"><span data-dcnode-id="9662" instrument_node="">Paris</span></a><span data-dcnode-id="9660" instrument_node="">, France. It is named after the engineer </span><a data-dcnode-id="9658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Eiffel" title="Gustave Eiffel"><span data-dcnode-id="9659" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="9657" instrument_node="">, whose company designed and built the tower.
</span></p><p data-dcnode-id="9634"><span data-dcnode-id="9655" instrument_node="">Locally nicknamed "</span><i data-dcnode-id="9653"><span data-dcnode-id="9654" instrument_node="">La dame de fer</span></i><span data-dcnode-id="9652" instrument_node="">" (French for "Iron Lady"), it was constructed from 1887 to 1889 as the centerpiece of the </span><a data-dcnode-id="9650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281889%29" title="Exposition Universelle (1889)"><span data-dcnode-id="9651" instrument_node="">1889 World's Fair</span></a><span data-dcnode-id="9649" instrument_node=""> and was initially criticized by some of France's leading artists and intellectuals for its design, but it has become a global </span><a data-dcnode-id="9647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_icon" title="Cultural icon"><span data-dcnode-id="9648" instrument_node="">cultural icon</span></a><span data-dcnode-id="9646" instrument_node=""> of France and one of the most recognizable structures in the world.</span><sup class="reference" data-dcnode-id="9643" id="cite_ref-Key_figures_3-0"><a data-dcnode-id="9644" href="#cite_note-Key_figures-3"><span data-dcnode-id="9645" instrument_node="">[3]</span></a></sup><span data-dcnode-id="9642" instrument_node=""> The Eiffel Tower is the most visited monument with an entrance fee in the world; 6.91&nbsp;million people ascended it in 2015. The Tower was made a </span><a data-dcnode-id="9640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monument_historique" title="Monument historique"><span data-dcnode-id="9641" instrument_node="">Monument historique</span></a><span data-dcnode-id="9639" instrument_node=""> in 1964 and named part of UNESCO World Heritage Site ("Paris, Banks of the Seins") in 1991.</span><sup class="reference" data-dcnode-id="9636" id="cite_ref-4"><a data-dcnode-id="9637" href="#cite_note-4"><span data-dcnode-id="9638" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9635" instrument_node="">
</span></p><p data-dcnode-id="9607"><span data-dcnode-id="9633" instrument_node="">The tower is 330 metres (1,083&nbsp;ft) tall,</span><sup class="reference" data-dcnode-id="9630" id="cite_ref-5"><a data-dcnode-id="9631" href="#cite_note-5"><span data-dcnode-id="9632" instrument_node="">[5]</span></a></sup><span data-dcnode-id="9629" instrument_node=""> about the same height as an 81-storey building, and the </span><a data-dcnode-id="9627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_tallest_buildings_and_structures_in_the_Paris_region" title="List of tallest buildings and structures in the Paris region"><span data-dcnode-id="9628" instrument_node="">tallest structure in Paris</span></a><span data-dcnode-id="9626" instrument_node="">. Its base is square, measuring 125 metres (410&nbsp;ft) on each side. During its construction, the Eiffel Tower surpassed the </span><a data-dcnode-id="9624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington_Monument" title="Washington Monument"><span data-dcnode-id="9625" instrument_node="">Washington Monument</span></a><span data-dcnode-id="9623" instrument_node=""> to become the </span><a class="mw-redirect" data-dcnode-id="9621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_tallest_freestanding_structures_in_the_world%23Timeline_of_world%27s_tallest_freestanding_structures" title="List of tallest freestanding structures in the world"><span data-dcnode-id="9622" instrument_node="">tallest man-made structure</span></a><span data-dcnode-id="9620" instrument_node=""> in the world, a title it held for 41 years until the </span><a data-dcnode-id="9618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chrysler_Building" title="Chrysler Building"><span data-dcnode-id="9619" instrument_node="">Chrysler Building</span></a><span data-dcnode-id="9617" instrument_node=""> in New York City was finished in 1930. It was the first structure in the world to surpass both the 200-metre and 300-metre mark in height. Due to the addition of a broadcasting </span><a class="mw-redirect" data-dcnode-id="9615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aerial_%28radio%29" title="Aerial (radio)"><span data-dcnode-id="9616" instrument_node="">aerial</span></a><span data-dcnode-id="9614" instrument_node=""> at the top of the tower in 1957, it is now taller than the Chrysler Building by 5.2 metres (17&nbsp;ft). Excluding transmitters, the Eiffel Tower is the </span><a data-dcnode-id="9612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_tallest_structures_in_France" title="List of tallest structures in France"><span data-dcnode-id="9613" instrument_node="">second tallest free-standing structure in France</span></a><span data-dcnode-id="9611" instrument_node=""> after the </span><a data-dcnode-id="9609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Millau_Viaduct" title="Millau Viaduct"><span data-dcnode-id="9610" instrument_node="">Millau Viaduct</span></a><span data-dcnode-id="9608" instrument_node="">.
</span></p><p data-dcnode-id="9596"><span data-dcnode-id="9606" instrument_node="">The tower has three levels for visitors, with restaurants on the first and second levels. The top level's upper platform is 276&nbsp;m (906&nbsp;ft) above the ground – the highest </span><a data-dcnode-id="9604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Observation_deck" title="Observation deck"><span data-dcnode-id="9605" instrument_node="">observation deck</span></a><span data-dcnode-id="9603" instrument_node=""> accessible to the public in the </span><a data-dcnode-id="9601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="9602" instrument_node="">European Union</span></a><span data-dcnode-id="9600" instrument_node="">. Tickets can be purchased to ascend by stairs or </span><a data-dcnode-id="9598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elevator" title="Elevator"><span data-dcnode-id="9599" instrument_node="">lift</span></a><span data-dcnode-id="9597" instrument_node=""> to the first and second levels. The climb from ground level to the first level is over 300 steps, as is the climb from the first level to the second. Although there is a staircase to the top level, it is usually accessible only by lift.
</span></p><span data-dcnode-id="9595" instrument_node="">

</span><h2 data-dcnode-id="9288"><span class="mw-headline" data-dcnode-id="9289" id="History"><span data-dcnode-id="9290" instrument_node="">History</span></span></h2><span data-dcnode-id="9287" instrument_node="">
</span><h3 data-dcnode-id="9284"><span class="mw-headline" data-dcnode-id="9285" id="Origin"><span data-dcnode-id="9286" instrument_node="">Origin</span></span></h3><span data-dcnode-id="9283" instrument_node="">
</span><p data-dcnode-id="9246"><span data-dcnode-id="9282" instrument_node="">The design of the Eiffel Tower is attributed to </span><a data-dcnode-id="9280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maurice_Koechlin" title="Maurice Koechlin"><span data-dcnode-id="9281" instrument_node="">Maurice Koechlin</span></a><span data-dcnode-id="9279" instrument_node=""> and </span><a data-dcnode-id="9277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589mile_Nouguier" title="Émile Nouguier"><span data-dcnode-id="9278" instrument_node="">Émile Nouguier</span></a><span data-dcnode-id="9276" instrument_node="">, two senior engineers working for the </span><a data-dcnode-id="9274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Eiffel" title="Gustave Eiffel"><span data-dcnode-id="9275" instrument_node="">Compagnie des Établissements Eiffel</span></a><span data-dcnode-id="9273" instrument_node="">. It was envisioned after discussion about a suitable centerpiece for the proposed </span><a data-dcnode-id="9271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281889%29" title="Exposition Universelle (1889)"><span data-dcnode-id="9272" instrument_node="">1889 Exposition Universelle</span></a><span data-dcnode-id="9270" instrument_node="">, a </span><a data-dcnode-id="9268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World%2527s_fair" title="World's fair"><span data-dcnode-id="9269" instrument_node="">world's fair</span></a><span data-dcnode-id="9267" instrument_node=""> to celebrate the centennial of the </span><a data-dcnode-id="9265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Revolution" title="French Revolution"><span data-dcnode-id="9266" instrument_node="">French Revolution</span></a><span data-dcnode-id="9264" instrument_node="">. Eiffel openly acknowledged that inspiration for a tower came from the </span><a data-dcnode-id="9262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latting_Observatory" title="Latting Observatory"><span data-dcnode-id="9263" instrument_node="">Latting Observatory</span></a><span data-dcnode-id="9261" instrument_node=""> built in New York City in 1853.</span><sup class="reference" data-dcnode-id="9258" id="cite_ref-6"><a data-dcnode-id="9259" href="#cite_note-6"><span data-dcnode-id="9260" instrument_node="">[6]</span></a></sup><span data-dcnode-id="9257" instrument_node=""> In May 1884, working at home, Koechlin made a sketch of their idea, described by him as "a great pylon, consisting of four lattice girders standing apart at the base and coming together at the top, joined together by metal </span><a data-dcnode-id="9255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Truss" title="Truss"><span data-dcnode-id="9256" instrument_node="">trusses</span></a><span data-dcnode-id="9254" instrument_node=""> at regular intervals".</span><sup class="reference" data-dcnode-id="9251" id="cite_ref-7"><a data-dcnode-id="9252" href="#cite_note-7"><span data-dcnode-id="9253" instrument_node="">[7]</span></a></sup><span data-dcnode-id="9250" instrument_node=""> Eiffel initially showed little enthusiasm, but he did approve further study, and the two engineers then asked </span><a data-dcnode-id="9248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Sauvestre" title="Stephen Sauvestre"><span data-dcnode-id="9249" instrument_node="">Stephen Sauvestre</span></a><span data-dcnode-id="9247" instrument_node="">, the head of the company's architectural department, to contribute to the design. Sauvestre added decorative arches to the base of the tower, a glass pavilion to the first level, and other embellishments.
</span></p><span data-dcnode-id="9245" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="9228"><div class="thumbinner" data-dcnode-id="9229" style="width:172px;"><a class="image" data-dcnode-id="9243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMaurice_koechlin_pylone.jpg"><img alt="" class="thumbimage" data-dcnode-id="9244" data-file-height="1086" data-file-width="750" decoding="async" height="246" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/53/Maurice_koechlin_pylone.jpg/170px-Maurice_koechlin_pylone.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/53/Maurice_koechlin_pylone.jpg/255px-Maurice_koechlin_pylone.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/53/Maurice_koechlin_pylone.jpg/340px-Maurice_koechlin_pylone.jpg 2x" width="170"></a><span data-dcnode-id="9242" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9230"><div class="magnify" data-dcnode-id="9240"><a class="internal" data-dcnode-id="9241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMaurice_koechlin_pylone.jpg" title="Enlarge"></a></div><span data-dcnode-id="9239" instrument_node="">First drawing of the Eiffel Tower by Maurice Koechlin including size comparison with other Parisian landmarks such as </span><a class="mw-redirect" data-dcnode-id="9237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Notre_Dame_de_Paris" title="Notre Dame de Paris"><span data-dcnode-id="9238" instrument_node="">Notre Dame de Paris</span></a><span data-dcnode-id="9236" instrument_node="">, the </span><a data-dcnode-id="9234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%258Ele_aux_Cygnes%23Statue_of_Liberty_replica" title="Île aux Cygnes"><span data-dcnode-id="9235" instrument_node="">Statue of Liberty</span></a><span data-dcnode-id="9233" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="9231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vend%25C3%25B4me_Column" title="Vendôme Column"><span data-dcnode-id="9232" instrument_node="">Vendôme Column</span></a></div></div></div><p data-dcnode-id="9220"><span data-dcnode-id="9227" instrument_node="">
The new version gained Eiffel's support: he bought the rights to the patent on the design which Koechlin, Nougier, and Sauvestre had taken out, and the design was put on display at the Exhibition of Decorative Arts in the autumn of 1884 under the company name. On 30 March 1885, Eiffel presented his plans to the </span><span data-dcnode-id="9224" title="French-language text"><i data-dcnode-id="9225" lang="fr"><span data-dcnode-id="9226" instrument_node="">Société des Ingénieurs Civils</span></i></span><span data-dcnode-id="9223" instrument_node="">; after discussing the technical problems and emphasising the practical uses of the tower, he finished his talk by saying the tower would symbolise </span></p><blockquote class="templatequote" data-dcnode-id="9214" style="text-align:justify"><p data-dcnode-id="9215"><span data-dcnode-id="9219" instrument_node="">[n]ot only the art of the modern engineer, but also the century of Industry and Science in which we are living, and for which the way was prepared by the great scientific movement of the eighteenth century and by the Revolution of 1789, to which this monument will be built as an expression of France's gratitude.</span><sup class="reference" data-dcnode-id="9216" id="cite_ref-loyrette116_8-0"><a data-dcnode-id="9217" href="#cite_note-loyrette116-8"><span data-dcnode-id="9218" instrument_node="">[8]</span></a></sup></p></blockquote><span data-dcnode-id="9213" instrument_node="">
</span><p data-dcnode-id="9201"><span data-dcnode-id="9212" instrument_node="">Little progress was made until 1886, when </span><a data-dcnode-id="9210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jules_Gr%25C3%25A9vy" title="Jules Grévy"><span data-dcnode-id="9211" instrument_node="">Jules Grévy</span></a><span data-dcnode-id="9209" instrument_node=""> was re-elected as president of France and </span><a data-dcnode-id="9207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589douard_Lockroy" title="Édouard Lockroy"><span data-dcnode-id="9208" instrument_node="">Édouard Lockroy</span></a><span data-dcnode-id="9206" instrument_node=""> was appointed as minister for trade. A budget for the exposition was passed and, on 1 May, Lockroy announced an alteration to the terms of the open competition being held for a centrepiece to the exposition, which effectively made the selection of Eiffel's design a foregone conclusion, as entries had to include a study for a 300&nbsp;m (980&nbsp;ft) four-sided metal tower on the Champ de Mars.</span><sup class="reference" data-dcnode-id="9203" id="cite_ref-loyrette116_8-1"><a data-dcnode-id="9204" href="#cite_note-loyrette116-8"><span data-dcnode-id="9205" instrument_node="">[8]</span></a></sup><span data-dcnode-id="9202" instrument_node=""> (A 300-metre tower was then considered a herculean engineering effort). On 12 May, a commission was set up to examine Eiffel's scheme and its rivals, which, a month later, decided that all the proposals except Eiffel's were either impractical or lacking in details.
</span></p><p data-dcnode-id="9195"><span data-dcnode-id="9200" instrument_node="">After some debate about the exact location of the tower, a contract was signed on 8 January 1887. Eiffel signed it acting in his own capacity rather than as the representative of his company, the contract granting him 1.5&nbsp;million francs toward the construction costs: less than a quarter of the estimated 6.5 million francs. Eiffel was to receive all income from the commercial exploitation of the tower during the exhibition and for the next 20 years. He later established a separate company to manage the tower, putting up half the necessary capital himself.</span><sup class="reference" data-dcnode-id="9197" id="cite_ref-9"><a data-dcnode-id="9198" href="#cite_note-9"><span data-dcnode-id="9199" instrument_node="">[9]</span></a></sup><span data-dcnode-id="9196" instrument_node="">
</span></p><span data-dcnode-id="9194" instrument_node="">
</span><h3 data-dcnode-id="9190"><span data-dcnode-id="9193" id="Artists.27_protest"></span><span class="mw-headline" data-dcnode-id="9191" id="Artists'_protest"><span data-dcnode-id="9192" instrument_node="">Artists' protest</span></span></h3><span data-dcnode-id="9189" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9173"><div class="thumbinner" data-dcnode-id="9174" style="width:172px;"><a class="image" data-dcnode-id="9187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACaricature_Gustave_Eiffel.png"><img alt="" class="thumbimage" data-dcnode-id="9188" data-file-height="400" data-file-width="227" decoding="async" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Caricature_Gustave_Eiffel.png/170px-Caricature_Gustave_Eiffel.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/7/7f/Caricature_Gustave_Eiffel.png 1.5x" width="170"></a><span data-dcnode-id="9186" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9175"><div class="magnify" data-dcnode-id="9184"><a class="internal" data-dcnode-id="9185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACaricature_Gustave_Eiffel.png" title="Enlarge"></a></div><span data-dcnode-id="9183" instrument_node="">Caricature of Gustave Eiffel comparing the Eiffel tower to the </span><a data-dcnode-id="9181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Egyptian_pyramids" title="Egyptian pyramids"><span data-dcnode-id="9182" instrument_node="">Pyramids</span></a><span data-dcnode-id="9180" instrument_node="">, published in </span><i data-dcnode-id="9177"><a data-dcnode-id="9178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Temps" title="Le Temps"><span data-dcnode-id="9179" instrument_node="">Le Temps</span></a></i><span data-dcnode-id="9176" instrument_node="">, February 14, 1887.</span></div></div></div><span data-dcnode-id="9172" instrument_node="">
</span><p data-dcnode-id="9144"><span data-dcnode-id="9171" instrument_node="">The proposed tower had been a subject of controversy, drawing criticism from those who did not believe it was feasible and those who objected on artistic grounds. Prior to the Eiffel Tower's construction, no structure had ever been constructed to a height of 300 m, or even 200 m for that matter,</span><sup class="reference" data-dcnode-id="9168" id="cite_ref-10"><a data-dcnode-id="9169" href="#cite_note-10"><span data-dcnode-id="9170" instrument_node="">[10]</span></a></sup><span data-dcnode-id="9167" instrument_node=""> and many people believed it was impossible. These objections were an expression of a long-standing debate in France about the relationship between architecture and engineering. It came to a head as work began at the Champ de Mars: a "Committee of Three Hundred" (one member for each metre of the tower's height) was formed, led by the prominent architect </span><a data-dcnode-id="9165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Garnier_%28architect%29" title="Charles Garnier (architect)"><span data-dcnode-id="9166" instrument_node="">Charles Garnier</span></a><span data-dcnode-id="9164" instrument_node=""> and including some of the most important figures of the arts, such as </span><a data-dcnode-id="9162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William-Adolphe_Bouguereau" title="William-Adolphe Bouguereau"><span data-dcnode-id="9163" instrument_node="">William-Adolphe Bouguereau</span></a><span data-dcnode-id="9161" instrument_node="">, </span><a data-dcnode-id="9159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guy_de_Maupassant" title="Guy de Maupassant"><span data-dcnode-id="9160" instrument_node="">Guy de Maupassant</span></a><span data-dcnode-id="9158" instrument_node="">, </span><a data-dcnode-id="9156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Gounod" title="Charles Gounod"><span data-dcnode-id="9157" instrument_node="">Charles Gounod</span></a><span data-dcnode-id="9155" instrument_node=""> and </span><a data-dcnode-id="9153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jules_Massenet" title="Jules Massenet"><span data-dcnode-id="9154" instrument_node="">Jules Massenet</span></a><span data-dcnode-id="9152" instrument_node="">. A petition called "Artists against the Eiffel Tower" was sent to the Minister of Works and Commissioner for the Exposition, </span><a data-dcnode-id="9150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adolphe_Alphand" title="Adolphe Alphand"><span data-dcnode-id="9151" instrument_node="">Adolphe Alphand</span></a><span data-dcnode-id="9149" instrument_node="">, and it was published by </span><i data-dcnode-id="9146"><a data-dcnode-id="9147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Temps_%28Paris%29" title="Le Temps (Paris)"><span data-dcnode-id="9148" instrument_node="">Le Temps</span></a></i><span data-dcnode-id="9145" instrument_node=""> on 14 February 1887:
</span></p><span data-dcnode-id="9143" instrument_node="">
</span><link data-dcnode-id="9142" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="9136" style="text-align:justify"><p data-dcnode-id="9137"><span data-dcnode-id="9141" instrument_node="">We, writers, painters, sculptors, architects and passionate devotees of the hitherto untouched beauty of Paris, protest with all our strength, with all our indignation in the name of slighted French taste, against the erection … of this useless and monstrous Eiffel Tower … To bring our arguments home, imagine for a moment a giddy, ridiculous tower dominating Paris like a gigantic black smokestack, crushing under its barbaric bulk Notre Dame, the Tour Saint-Jacques, the Louvre, the Dome of les Invalides, the Arc de Triomphe, all of our humiliated monuments will disappear in this ghastly dream. And for twenty years … we shall see stretching like a blot of ink the hateful shadow of the hateful column of bolted sheet metal.</span><sup class="reference" data-dcnode-id="9138" id="cite_ref-11"><a data-dcnode-id="9139" href="#cite_note-11"><span data-dcnode-id="9140" instrument_node="">[11]</span></a></sup></p></blockquote><span data-dcnode-id="9135" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="9121"><div class="thumbinner" data-dcnode-id="9122" style="width:172px;"><a class="image" data-dcnode-id="9133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGuillaume_Apollinaire_Calligramme.JPG"><img alt="" class="thumbimage" data-dcnode-id="9134" data-file-height="440" data-file-width="327" decoding="async" height="229" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Guillaume_Apollinaire_Calligramme.JPG/170px-Guillaume_Apollinaire_Calligramme.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Guillaume_Apollinaire_Calligramme.JPG/255px-Guillaume_Apollinaire_Calligramme.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/f/fc/Guillaume_Apollinaire_Calligramme.JPG 2x" width="170"></a><span data-dcnode-id="9132" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9123"><div class="magnify" data-dcnode-id="9130"><a class="internal" data-dcnode-id="9131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGuillaume_Apollinaire_Calligramme.JPG" title="Enlarge"></a></div><span data-dcnode-id="9129" instrument_node="">A </span><a data-dcnode-id="9127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Calligram" title="Calligram"><span data-dcnode-id="9128" instrument_node="">calligram</span></a><span data-dcnode-id="9126" instrument_node=""> by </span><a data-dcnode-id="9124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guillaume_Apollinaire" title="Guillaume Apollinaire"><span data-dcnode-id="9125" instrument_node="">Guillaume Apollinaire</span></a></div></div></div><span data-dcnode-id="9120" instrument_node="">
</span><p data-dcnode-id="9107"><span data-dcnode-id="9119" instrument_node="">Gustave Eiffel responded to these criticisms by comparing his tower to the </span><a data-dcnode-id="9117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Egyptian_pyramids" title="Egyptian pyramids"><span data-dcnode-id="9118" instrument_node="">Egyptian pyramids</span></a><span data-dcnode-id="9116" instrument_node="">: "My tower will be the tallest edifice ever erected by man. Will it not also be grandiose in its way? And why would something admirable in Egypt become hideous and ridiculous in Paris?"</span><sup class="reference" data-dcnode-id="9113" id="cite_ref-Souriau_12-0"><a data-dcnode-id="9114" href="#cite_note-Souriau-12"><span data-dcnode-id="9115" instrument_node="">[12]</span></a></sup><span data-dcnode-id="9112" instrument_node=""> These criticisms were also dealt with by Édouard Lockroy in a letter of support written to Alphand, sardonically saying,</span><sup class="reference" data-dcnode-id="9109" id="cite_ref-13"><a data-dcnode-id="9110" href="#cite_note-13"><span data-dcnode-id="9111" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9108" instrument_node=""> "Judging by the stately swell of the rhythms, the beauty of the metaphors, the elegance of its delicate and precise style, one can tell this protest is the result of collaboration of the most famous writers and poets of our time", and he explained that the protest was irrelevant since the project had been decided upon months before, and construction on the tower was already under way.
</span></p><p data-dcnode-id="9101"><span data-dcnode-id="9106" instrument_node="">Indeed, Garnier was a member of the Tower Commission that had examined the various proposals, and had raised no objection. Eiffel was similarly unworried, pointing out to a journalist that it was premature to judge the effect of the tower solely on the basis of the drawings, that the Champ de Mars was distant enough from the monuments mentioned in the protest for there to be little risk of the tower overwhelming them, and putting the aesthetic argument for the tower: "Do not the laws of natural forces always conform to the secret laws of harmony?"</span><sup class="reference" data-dcnode-id="9103" id="cite_ref-14"><a data-dcnode-id="9104" href="#cite_note-14"><span data-dcnode-id="9105" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9102" instrument_node="">
</span></p><p data-dcnode-id="9088"><span data-dcnode-id="9100" instrument_node="">Some of the protesters changed their minds when the tower was built; others remained unconvinced.</span><sup class="reference" data-dcnode-id="9097" id="cite_ref-times1_4_89_15-0"><a data-dcnode-id="9098" href="#cite_note-times1_4_89-15"><span data-dcnode-id="9099" instrument_node="">[15]</span></a></sup><span data-dcnode-id="9096" instrument_node=""> </span><a data-dcnode-id="9094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guy_de_Maupassant" title="Guy de Maupassant"><span data-dcnode-id="9095" instrument_node="">Guy de Maupassant</span></a><span data-dcnode-id="9093" instrument_node=""> supposedly ate lunch in the tower's restaurant every day because it was the one place in Paris where the tower was not visible.</span><sup class="reference" data-dcnode-id="9090" id="cite_ref-Jonnes_16-0"><a data-dcnode-id="9091" href="#cite_note-Jonnes-16"><span data-dcnode-id="9092" instrument_node="">[16]</span></a></sup><span data-dcnode-id="9089" instrument_node="">
</span></p><p data-dcnode-id="9076"><span data-dcnode-id="9087" instrument_node="">By 1918, it had become a symbol of Paris and of France after Guillaume Apollinaire wrote a nationalist poem in the shape of the tower (a </span><a data-dcnode-id="9085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Calligram" title="Calligram"><span data-dcnode-id="9086" instrument_node="">calligram</span></a><span data-dcnode-id="9084" instrument_node="">) to express his feelings about the war against Germany.</span><sup class="reference" data-dcnode-id="9081" id="cite_ref-Greet_17-0"><a data-dcnode-id="9082" href="#cite_note-Greet-17"><span data-dcnode-id="9083" instrument_node="">[17]</span></a></sup><span data-dcnode-id="9080" instrument_node=""> Today, it is widely considered to be a remarkable piece of </span><a data-dcnode-id="9078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Structural_art" title="Structural art"><span data-dcnode-id="9079" instrument_node="">structural art</span></a><span data-dcnode-id="9077" instrument_node="">, and is often featured in films and literature.
</span></p><span data-dcnode-id="9075" instrument_node="">
</span><h3 data-dcnode-id="9072"><span class="mw-headline" data-dcnode-id="9073" id="Construction"><span data-dcnode-id="9074" instrument_node="">Construction</span></span></h3><span data-dcnode-id="9071" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9060"><div class="thumbinner" data-dcnode-id="9061" style="width:222px;"><a class="image" data-dcnode-id="9069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALes_fondations_de_la_Tour_Eiffel%2C_ma%25C3%25A7onneries.jpg"><img alt="" class="thumbimage" data-dcnode-id="9070" data-file-height="377" data-file-width="512" decoding="async" height="162" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/36/Les_fondations_de_la_Tour_Eiffel%252C_ma%25C3%25A7onneries.jpg/220px-Les_fondations_de_la_Tour_Eiffel%252C_ma%25C3%25A7onneries.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/36/Les_fondations_de_la_Tour_Eiffel%2C_ma%C3%A7onneries.jpg/330px-Les_fondations_de_la_Tour_Eiffel%2C_ma%C3%A7onneries.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/36/Les_fondations_de_la_Tour_Eiffel%2C_ma%C3%A7onneries.jpg/440px-Les_fondations_de_la_Tour_Eiffel%2C_ma%C3%A7onneries.jpg 2x" width="220"></a><span data-dcnode-id="9068" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9062"><div class="magnify" data-dcnode-id="9066"><a class="internal" data-dcnode-id="9067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALes_fondations_de_la_Tour_Eiffel%2C_ma%25C3%25A7onneries.jpg" title="Enlarge"></a></div><a data-dcnode-id="9064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foundation_%28engineering%29" title="Foundation (engineering)"><span data-dcnode-id="9065" instrument_node="">Foundations</span></a><span data-dcnode-id="9063" instrument_node=""> of the Eiffel Tower</span></div></div></div><span data-dcnode-id="9059" instrument_node="">
</span><p data-dcnode-id="9037"><span data-dcnode-id="9058" instrument_node="">Work on the foundations started on 28 January 1887.</span><sup class="reference" data-dcnode-id="9055" id="cite_ref-origins_18-0"><a data-dcnode-id="9056" href="#cite_note-origins-18"><span data-dcnode-id="9057" instrument_node="">[18]</span></a></sup><span data-dcnode-id="9054" instrument_node=""> Those for the east and south legs were straightforward, with each leg resting on four 2&nbsp;m (6.6&nbsp;ft) concrete slabs, one for each of the principal girders of each leg. The west and north legs, being closer to the river </span><a data-dcnode-id="9052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seine" title="Seine"><span data-dcnode-id="9053" instrument_node="">Seine</span></a><span data-dcnode-id="9051" instrument_node="">, were more complicated: each slab needed two </span><a data-dcnode-id="9049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deep_foundation" title="Deep foundation"><span data-dcnode-id="9050" instrument_node="">piles</span></a><span data-dcnode-id="9048" instrument_node=""> installed by using compressed-air </span><a data-dcnode-id="9046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caisson_%28engineering%29" title="Caisson (engineering)"><span data-dcnode-id="9047" instrument_node="">caissons</span></a><span data-dcnode-id="9045" instrument_node=""> 15&nbsp;m (49&nbsp;ft) long and 6&nbsp;m (20&nbsp;ft) in diameter driven to a depth of 22&nbsp;m (72&nbsp;ft)</span><sup class="reference" data-dcnode-id="9042" id="cite_ref-19"><a data-dcnode-id="9043" href="#cite_note-19"><span data-dcnode-id="9044" instrument_node="">[19]</span></a></sup><span data-dcnode-id="9041" instrument_node=""> to support the concrete slabs, which were 6&nbsp;m (20&nbsp;ft) thick. Each of these slabs supported a block of </span><a data-dcnode-id="9039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Limestone" title="Limestone"><span data-dcnode-id="9040" instrument_node="">limestone</span></a><span data-dcnode-id="9038" instrument_node=""> with an inclined top to bear a supporting shoe for the ironwork.
</span></p><p data-dcnode-id="9017"><span data-dcnode-id="9036" instrument_node="">Each shoe was anchored to the stonework by a pair of bolts 10&nbsp;cm (4&nbsp;in) in diameter and 7.5&nbsp;m (25&nbsp;ft) long. The foundations were completed on 30 June, and the erection of the ironwork began. The visible work on-site was complemented by the enormous amount of exacting preparatory work that took place behind the scenes: the drawing office produced 1,700 general drawings and 3,629 detailed drawings of the 18,038 different parts needed.</span><sup class="reference" data-dcnode-id="9033" id="cite_ref-20"><a data-dcnode-id="9034" href="#cite_note-20"><span data-dcnode-id="9035" instrument_node="">[20]</span></a></sup><span data-dcnode-id="9032" instrument_node=""> The task of drawing the components was complicated by the complex angles involved in the design and the degree of precision required: the position of rivet holes was specified to within 1&nbsp;mm (0.04&nbsp;in) and angles worked out to one </span><a class="mw-redirect" data-dcnode-id="9030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arcsecond" title="Arcsecond"><span data-dcnode-id="9031" instrument_node="">second of arc</span></a><span data-dcnode-id="9029" instrument_node="">.</span><sup class="reference" data-dcnode-id="9026" id="cite_ref-21"><a data-dcnode-id="9027" href="#cite_note-21"><span data-dcnode-id="9028" instrument_node="">[21]</span></a></sup><span data-dcnode-id="9025" instrument_node=""> The finished components, some already riveted together into sub-assemblies, arrived on horse-drawn carts from a factory in the nearby Parisian suburb of </span><a data-dcnode-id="9023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Levallois-Perret" title="Levallois-Perret"><span data-dcnode-id="9024" instrument_node="">Levallois-Perret</span></a><span data-dcnode-id="9022" instrument_node=""> and were first bolted together, with the bolts being replaced with rivets as construction progressed. No drilling or shaping was done on site: if any part did not fit, it was sent back to the factory for alteration. In all, 18,038 pieces were joined together using 2.5&nbsp;million rivets.</span><sup class="reference" data-dcnode-id="9019" id="cite_ref-origins_18-1"><a data-dcnode-id="9020" href="#cite_note-origins-18"><span data-dcnode-id="9021" instrument_node="">[18]</span></a></sup><span data-dcnode-id="9018" instrument_node="">
</span></p><p data-dcnode-id="8981"><span data-dcnode-id="9016" instrument_node="">At first, the legs were constructed as </span><a data-dcnode-id="9014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cantilever" title="Cantilever"><span data-dcnode-id="9015" instrument_node="">cantilevers</span></a><span data-dcnode-id="9013" instrument_node="">, but about halfway to the first level construction was paused to create a substantial timber </span><a class="mw-redirect" data-dcnode-id="9011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scaffold" title="Scaffold"><span data-dcnode-id="9012" instrument_node="">scaffold</span></a><span data-dcnode-id="9010" instrument_node="">. This renewed concerns about the structural integrity of the tower, and sensational headlines such as "Eiffel Suicide!" and "Gustave Eiffel Has Gone Mad: He Has Been Confined in an Asylum" appeared in the tabloid press.</span><sup class="reference" data-dcnode-id="9007" id="cite_ref-22"><a data-dcnode-id="9008" href="#cite_note-22"><span data-dcnode-id="9009" instrument_node="">[22]</span></a></sup><span data-dcnode-id="9006" instrument_node=""> At this stage, a small "creeper" </span><a data-dcnode-id="9004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crane_%28machine%29" title="Crane (machine)"><span data-dcnode-id="9005" instrument_node="">crane</span></a><span data-dcnode-id="9003" instrument_node=""> designed to move up the tower was installed in each leg. They made use of the guides for the lifts which were to be fitted in the four legs. The critical stage of joining the legs at the first level was completed by the end of March 1888.</span><sup class="reference" data-dcnode-id="9000" id="cite_ref-origins_18-2"><a data-dcnode-id="9001" href="#cite_note-origins-18"><span data-dcnode-id="9002" instrument_node="">[18]</span></a></sup><span data-dcnode-id="8999" instrument_node=""> Although the metalwork had been prepared with the utmost attention to detail, provision had been made to carry out small adjustments to precisely align the legs; </span><a class="mw-redirect" data-dcnode-id="8997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydraulic" title="Hydraulic"><span data-dcnode-id="8998" instrument_node="">hydraulic</span></a><span data-dcnode-id="8996" instrument_node=""> </span><a data-dcnode-id="8994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jack_%28device%29" title="Jack (device)"><span data-dcnode-id="8995" instrument_node="">jacks</span></a><span data-dcnode-id="8993" instrument_node=""> were fitted to the shoes at the base of each leg, capable of exerting a force of 800 tonnes, and the legs were intentionally constructed at a slightly steeper angle than necessary, being supported by </span><a data-dcnode-id="8991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sand_box_%28civil_engineering%29" title="Sand box (civil engineering)"><span data-dcnode-id="8992" instrument_node="">sandboxes</span></a><span data-dcnode-id="8990" instrument_node=""> on the scaffold. Although construction involved 300 on-site employees,</span><sup class="reference" data-dcnode-id="8987" id="cite_ref-origins_18-3"><a data-dcnode-id="8988" href="#cite_note-origins-18"><span data-dcnode-id="8989" instrument_node="">[18]</span></a></sup><span data-dcnode-id="8986" instrument_node=""> due to Eiffel's safety precautions and the use of movable gangways, guardrails and screens, only one person died.</span><sup class="reference" data-dcnode-id="8983" id="cite_ref-23"><a data-dcnode-id="8984" href="#cite_note-23"><span data-dcnode-id="8985" instrument_node="">[23]</span></a></sup><span data-dcnode-id="8982" instrument_node="">
</span></p><span data-dcnode-id="8980" instrument_node="">

</span><h4 data-dcnode-id="8848"><span class="mw-headline" data-dcnode-id="8849" id="Lifts"><span data-dcnode-id="8850" instrument_node="">Lifts</span></span></h4><span data-dcnode-id="8847" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8838"><div class="thumbinner" data-dcnode-id="8839" style="width:222px;"><a class="image" data-dcnode-id="8845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATour_Eiffel_Ascenseur_Roux%2C_Combaluzier_et_Lepape.jpg"><img alt="" class="thumbimage" data-dcnode-id="8846" data-file-height="485" data-file-width="600" decoding="async" height="178" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/14/Tour_Eiffel_Ascenseur_Roux%252C_Combaluzier_et_Lepape.jpg/220px-Tour_Eiffel_Ascenseur_Roux%252C_Combaluzier_et_Lepape.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/14/Tour_Eiffel_Ascenseur_Roux%2C_Combaluzier_et_Lepape.jpg/330px-Tour_Eiffel_Ascenseur_Roux%2C_Combaluzier_et_Lepape.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/14/Tour_Eiffel_Ascenseur_Roux%2C_Combaluzier_et_Lepape.jpg/440px-Tour_Eiffel_Ascenseur_Roux%2C_Combaluzier_et_Lepape.jpg 2x" width="220"></a><span data-dcnode-id="8844" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8840"><div class="magnify" data-dcnode-id="8842"><a class="internal" data-dcnode-id="8843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATour_Eiffel_Ascenseur_Roux%2C_Combaluzier_et_Lepape.jpg" title="Enlarge"></a></div><span data-dcnode-id="8841" instrument_node="">The Roux, Combaluzier &amp; Lepape lifts during construction. Note the drive sprockets and chain in the foreground.</span></div></div></div><span data-dcnode-id="8837" instrument_node="">
</span><p data-dcnode-id="8831"><span data-dcnode-id="8836" instrument_node="">Equipping the tower with adequate and safe passenger lifts was a major concern of the government commission overseeing the Exposition. Although some visitors could be expected to climb to the first level, or even the second, lifts clearly had to be the main means of ascent.</span><sup class="reference" data-dcnode-id="8833" id="cite_ref-vogel_20_24-0"><a data-dcnode-id="8834" href="#cite_note-vogel_20-24"><span data-dcnode-id="8835" instrument_node="">[24]</span></a></sup><span data-dcnode-id="8832" instrument_node="">
</span></p><p data-dcnode-id="8818"><span data-dcnode-id="8830" instrument_node="">Constructing lifts to reach the first level was relatively straightforward: the legs were wide enough at the bottom and so nearly straight that they could contain a straight track, and a contract was given to the French company Roux, Combaluzier &amp; Lepape for two lifts to be fitted in the east and west legs.</span><sup class="reference" data-dcnode-id="8827" id="cite_ref-vogel_28_25-0"><a data-dcnode-id="8828" href="#cite_note-vogel_28-25"><span data-dcnode-id="8829" instrument_node="">[25]</span></a></sup><span data-dcnode-id="8826" instrument_node=""> Roux, Combaluzier &amp; Lepape used a pair of endless chains with rigid, articulated links to which the car was attached. Lead weights on some links of the upper or return sections of the chains counterbalanced most of the car's weight. The car was pushed up from below, not pulled up from above: to prevent the chain buckling, it was enclosed in a conduit. At the bottom of the run, the chains passed around 3.9&nbsp;m (12&nbsp;ft 10&nbsp;in) diameter </span><a data-dcnode-id="8824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sprocket" title="Sprocket"><span data-dcnode-id="8825" instrument_node="">sprockets</span></a><span data-dcnode-id="8823" instrument_node="">. Smaller sprockets at the top guided the chains.</span><sup class="reference" data-dcnode-id="8820" id="cite_ref-vogel_28_25-1"><a data-dcnode-id="8821" href="#cite_note-vogel_28-25"><span data-dcnode-id="8822" instrument_node="">[25]</span></a></sup><span data-dcnode-id="8819" instrument_node="">
</span></p><span data-dcnode-id="8817" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="8808"><div class="thumbinner" data-dcnode-id="8809" style="width:172px;"><a class="image" data-dcnode-id="8815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEiffel-Otis_lift-poyet.jpg"><img alt="" class="thumbimage" data-dcnode-id="8816" data-file-height="550" data-file-width="435" decoding="async" height="215" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/de/Eiffel-Otis_lift-poyet.jpg/170px-Eiffel-Otis_lift-poyet.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/de/Eiffel-Otis_lift-poyet.jpg/255px-Eiffel-Otis_lift-poyet.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/de/Eiffel-Otis_lift-poyet.jpg/340px-Eiffel-Otis_lift-poyet.jpg 2x" width="170"></a><span data-dcnode-id="8814" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8810"><div class="magnify" data-dcnode-id="8812"><a class="internal" data-dcnode-id="8813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEiffel-Otis_lift-poyet.jpg" title="Enlarge"></a></div><span data-dcnode-id="8811" instrument_node="">The Otis lifts originally fitted in the north and south legs</span></div></div></div><span data-dcnode-id="8807" instrument_node="">
</span><p data-dcnode-id="8790"><span data-dcnode-id="8806" instrument_node="">Installing lifts to the second level was more of a challenge because a straight track was impossible. No French company wanted to undertake the work. The European branch of </span><a class="mw-redirect" data-dcnode-id="8804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Otis_Elevator_Company" title="Otis Elevator Company"><span data-dcnode-id="8805" instrument_node="">Otis Brothers &amp; Company</span></a><span data-dcnode-id="8803" instrument_node=""> submitted a proposal but this was rejected: the fair's charter ruled out the use of any foreign material in the construction of the tower. The deadline for bids was extended but still no French companies put themselves forward, and eventually the contract was given to Otis in July 1887.</span><sup class="reference" data-dcnode-id="8800" id="cite_ref-vogel_23-4_26-0"><a data-dcnode-id="8801" href="#cite_note-vogel_23-4-26"><span data-dcnode-id="8802" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8799" instrument_node=""> Otis were confident they would eventually be given the contract and had already started creating designs.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8792" style="white-space:nowrap;"><span data-dcnode-id="8798" instrument_node="">[</span><i data-dcnode-id="8794"><a data-dcnode-id="8795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8796" title="This claim needs references to reliable sources. (March 2021)"><span data-dcnode-id="8797" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8793" instrument_node="">]</span></sup><span data-dcnode-id="8791" instrument_node="">
</span></p><p data-dcnode-id="8774"><span data-dcnode-id="8789" instrument_node="">The car was divided into two superimposed compartments, each holding 25 passengers, with the lift operator occupying an exterior platform on the first level. </span><a data-dcnode-id="8787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Power_%28physics%29" title="Power (physics)"><span data-dcnode-id="8788" instrument_node="">Motive power</span></a><span data-dcnode-id="8786" instrument_node=""> was provided by an inclined hydraulic ram 12.67&nbsp;m (41&nbsp;ft 7&nbsp;in) long and 96.5&nbsp;cm (38.0&nbsp;in) in diameter in the tower leg with a stroke of 10.83&nbsp;m (35&nbsp;ft 6&nbsp;in): this moved a carriage carrying six sheaves. Five fixed sheaves were mounted higher up the leg, producing an arrangement similar to a </span><a data-dcnode-id="8784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Block_and_tackle" title="Block and tackle"><span data-dcnode-id="8785" instrument_node="">block and tackle</span></a><span data-dcnode-id="8783" instrument_node=""> but acting in reverse, multiplying the stroke of the piston rather than the force generated. The hydraulic pressure in the driving cylinder was produced by a large open reservoir on the second level. After being exhausted from the cylinder, the water was pumped back up to the reservoir by two pumps in the machinery room at the base of the south leg. This reservoir also provided power to the lifts to the first level.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8776" style="white-space:nowrap;"><span data-dcnode-id="8782" instrument_node="">[</span><i data-dcnode-id="8778"><a data-dcnode-id="8779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8780" title="This claim needs references to reliable sources. (March 2021)"><span data-dcnode-id="8781" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8777" instrument_node="">]</span></sup><span data-dcnode-id="8775" instrument_node="">
</span></p><p data-dcnode-id="8768"><span data-dcnode-id="8773" instrument_node="">The original lifts for the journey between the second and third levels were supplied by Léon Edoux. A pair of 81&nbsp;m (266&nbsp;ft) hydraulic rams were mounted on the second level, reaching nearly halfway up to the third level. One lift car was mounted on top of these rams: cables ran from the top of this car up to sheaves on the third level and back down to a second car. Each car travelled only half the distance between the second and third levels and passengers were required to change lifts halfway by means of a short gangway. The 10-ton cars each held 65 passengers.</span><sup class="reference" data-dcnode-id="8770" id="cite_ref-27"><a data-dcnode-id="8771" href="#cite_note-27"><span data-dcnode-id="8772" instrument_node="">[27]</span></a></sup><span data-dcnode-id="8769" instrument_node="">
</span></p><span data-dcnode-id="8767" instrument_node="">
</span><h3 data-dcnode-id="8764"><span class="mw-headline" data-dcnode-id="8765" id="Inauguration_and_the_1889_exposition"><span data-dcnode-id="8766" instrument_node="">Inauguration and the 1889 exposition</span></span></h3><span data-dcnode-id="8763" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8754"><div class="thumbinner" data-dcnode-id="8755" style="width:222px;"><a class="image" data-dcnode-id="8761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AExposition_Universelle_de_Paris_1889_-_Universit%25C3%25A4ts-_und_Landesbibliothek_Darmstadt.jpg"><img alt="" class="thumbimage" data-dcnode-id="8762" data-file-height="4432" data-file-width="6288" decoding="async" height="155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/72/Exposition_Universelle_de_Paris_1889_-_Universit%25C3%25A4ts-_und_Landesbibliothek_Darmstadt.jpg/220px-Exposition_Universelle_de_Paris_1889_-_Universit%25C3%25A4ts-_und_Landesbibliothek_Darmstadt.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/72/Exposition_Universelle_de_Paris_1889_-_Universit%C3%A4ts-_und_Landesbibliothek_Darmstadt.jpg/330px-Exposition_Universelle_de_Paris_1889_-_Universit%C3%A4ts-_und_Landesbibliothek_Darmstadt.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/72/Exposition_Universelle_de_Paris_1889_-_Universit%C3%A4ts-_und_Landesbibliothek_Darmstadt.jpg/440px-Exposition_Universelle_de_Paris_1889_-_Universit%C3%A4ts-_und_Landesbibliothek_Darmstadt.jpg 2x" width="220"></a><span data-dcnode-id="8760" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8756"><div class="magnify" data-dcnode-id="8758"><a class="internal" data-dcnode-id="8759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AExposition_Universelle_de_Paris_1889_-_Universit%25C3%25A4ts-_und_Landesbibliothek_Darmstadt.jpg" title="Enlarge"></a></div><span data-dcnode-id="8757" instrument_node="">View of the 1889 World's Fair</span></div></div></div><span data-dcnode-id="8753" instrument_node="">
</span><p data-dcnode-id="8732"><span data-dcnode-id="8752" instrument_node="">The main structural work was completed at the end of March 1889 and, on 31 March, Eiffel celebrated by leading a group of government officials, accompanied by representatives of the press, to the top of the tower.</span><sup class="reference" data-dcnode-id="8749" id="cite_ref-times1_4_89_15-1"><a data-dcnode-id="8750" href="#cite_note-times1_4_89-15"><span data-dcnode-id="8751" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8748" instrument_node=""> Because the lifts were not yet in operation, the ascent was made by foot, and took over an hour, with Eiffel stopping frequently to explain various features. Most of the party chose to stop at the lower levels, but a few, including the structural engineer, Émile Nouguier, the head of construction, Jean Compagnon, the President of the City Council, and reporters from </span><i data-dcnode-id="8745"><a data-dcnode-id="8746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Figaro" title="Le Figaro"><span data-dcnode-id="8747" instrument_node="">Le Figaro</span></a></i><span data-dcnode-id="8744" instrument_node=""> and </span><i data-dcnode-id="8741"><a class="mw-redirect" data-dcnode-id="8742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Monde_Illustr%25C3%25A9" title="Le Monde Illustré"><span data-dcnode-id="8743" instrument_node="">Le Monde Illustré</span></a></i><span data-dcnode-id="8740" instrument_node="">, completed the ascent. At 2:35&nbsp;pm, Eiffel hoisted a large </span><a data-dcnode-id="8738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flag_of_France" title="Flag of France"><span data-dcnode-id="8739" instrument_node="">Tricolour</span></a><span data-dcnode-id="8737" instrument_node=""> to the accompaniment of a 25-gun salute fired at the first level.</span><sup class="reference" data-dcnode-id="8734" id="cite_ref-28"><a data-dcnode-id="8735" href="#cite_note-28"><span data-dcnode-id="8736" instrument_node="">[28]</span></a></sup><span data-dcnode-id="8733" instrument_node="">
</span></p><p data-dcnode-id="8718"><span data-dcnode-id="8731" instrument_node="">There was still work to be done, particularly on the lifts and facilities, and the tower was not opened to the public until nine days after the opening of the exposition on 6 May; even then, the lifts had not been completed. The tower was an instant success with the public, and nearly 30,000 visitors made the 1,710-step climb to the top before the lifts entered service on 26 May.</span><sup class="reference" data-dcnode-id="8728" id="cite_ref-Exposition_29-0"><a data-dcnode-id="8729" href="#cite_note-Exposition-29"><span data-dcnode-id="8730" instrument_node="">[29]</span></a></sup><span data-dcnode-id="8727" instrument_node="">
Tickets cost 2 francs for the first level, 3 for the second, and 5 for the top, with half-price admission on Sundays,</span><sup class="reference" data-dcnode-id="8724" id="cite_ref-30"><a data-dcnode-id="8725" href="#cite_note-30"><span data-dcnode-id="8726" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8723" instrument_node=""> and by the end of the exhibition there had been 1,896,987 visitors.</span><sup class="reference" data-dcnode-id="8720" id="cite_ref-Key_figures_3-1"><a data-dcnode-id="8721" href="#cite_note-Key_figures-3"><span data-dcnode-id="8722" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8719" instrument_node="">
</span></p><p data-dcnode-id="8708"><span data-dcnode-id="8717" instrument_node="">After dark, the tower was lit by hundreds of gas lamps, and a beacon sent out three beams of red, white and blue light. Two searchlights mounted on a circular rail were used to illuminate various buildings of the exposition. The daily opening and closing of the exposition were announced by a cannon at the top.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8710" style="white-space:nowrap;"><span data-dcnode-id="8716" instrument_node="">[</span><i data-dcnode-id="8712"><a data-dcnode-id="8713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8714" title="This claim needs references to reliable sources. (March 2021)"><span data-dcnode-id="8715" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8711" instrument_node="">]</span></sup><span data-dcnode-id="8709" instrument_node="">
</span></p><span data-dcnode-id="8707" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="8698"><div class="thumbinner" data-dcnode-id="8699" style="width:172px;"><a class="image" data-dcnode-id="8705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGeorges_Garen_embrasement_tour_Eiffel.jpg"><img alt="" class="thumbimage" data-dcnode-id="8706" data-file-height="1400" data-file-width="894" decoding="async" height="266" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/76/Georges_Garen_embrasement_tour_Eiffel.jpg/170px-Georges_Garen_embrasement_tour_Eiffel.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/76/Georges_Garen_embrasement_tour_Eiffel.jpg/255px-Georges_Garen_embrasement_tour_Eiffel.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/76/Georges_Garen_embrasement_tour_Eiffel.jpg/340px-Georges_Garen_embrasement_tour_Eiffel.jpg 2x" width="170"></a><span data-dcnode-id="8704" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8700"><div class="magnify" data-dcnode-id="8702"><a class="internal" data-dcnode-id="8703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGeorges_Garen_embrasement_tour_Eiffel.jpg" title="Enlarge"></a></div><span data-dcnode-id="8701" instrument_node="">Illumination of the tower at night during the exposition</span></div></div></div><span data-dcnode-id="8697" instrument_node="">
</span><p data-dcnode-id="8678"><span data-dcnode-id="8696" instrument_node="">On the second level, the French newspaper </span><i data-dcnode-id="8694"><span data-dcnode-id="8695" instrument_node="">Le Figaro</span></i><span data-dcnode-id="8693" instrument_node=""> had an office and a printing press, where a special souvenir edition, </span><i data-dcnode-id="8691"><span data-dcnode-id="8692" instrument_node="">Le Figaro de la Tour</span></i><span data-dcnode-id="8690" instrument_node="">, was made. There was also a </span><a data-dcnode-id="8688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/P%25C3%25A2tisserie" title="Pâtisserie"><span data-dcnode-id="8689" instrument_node="">pâtisserie</span></a><span data-dcnode-id="8687" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8680" style="white-space:nowrap;"><span data-dcnode-id="8686" instrument_node="">[</span><i data-dcnode-id="8682"><a data-dcnode-id="8683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8684" title="This claim needs references to reliable sources. (March 2021)"><span data-dcnode-id="8685" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8681" instrument_node="">]</span></sup><span data-dcnode-id="8679" instrument_node="">
</span></p><p data-dcnode-id="8666"><span data-dcnode-id="8677" instrument_node="">At the top, there was a post office where visitors could send letters and postcards as a memento of their visit. </span><a data-dcnode-id="8675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Graffiti" title="Graffiti"><span data-dcnode-id="8676" instrument_node="">Graffitists</span></a><span data-dcnode-id="8674" instrument_node=""> were also catered for: sheets of paper were mounted on the walls each day for visitors to record their impressions of the tower. Gustave Eiffel described some of the responses as </span><i data-dcnode-id="8672"><span data-dcnode-id="8673" instrument_node="">vraiment curieuse</span></i><span data-dcnode-id="8671" instrument_node=""> ("truly curious").</span><sup class="reference" data-dcnode-id="8668" id="cite_ref-31"><a data-dcnode-id="8669" href="#cite_note-31"><span data-dcnode-id="8670" instrument_node="">[31]</span></a></sup><span data-dcnode-id="8667" instrument_node="">
</span></p><p data-dcnode-id="8637"><span data-dcnode-id="8665" instrument_node="">
Famous visitors to the tower included the </span><a data-dcnode-id="8663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_VII" title="Edward VII"><span data-dcnode-id="8664" instrument_node="">Prince of Wales</span></a><span data-dcnode-id="8662" instrument_node="">, </span><a data-dcnode-id="8660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarah_Bernhardt" title="Sarah Bernhardt"><span data-dcnode-id="8661" instrument_node="">Sarah Bernhardt</span></a><span data-dcnode-id="8659" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Cody" title="William Cody"><span data-dcnode-id="8658" instrument_node="">"Buffalo Bill" Cody</span></a><span data-dcnode-id="8656" instrument_node=""> (his Wild West show was an attraction at the exposition) and </span><a data-dcnode-id="8654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Edison" title="Thomas Edison"><span data-dcnode-id="8655" instrument_node="">Thomas Edison</span></a><span data-dcnode-id="8653" instrument_node="">.</span><sup class="reference" data-dcnode-id="8650" id="cite_ref-Exposition_29-1"><a data-dcnode-id="8651" href="#cite_note-Exposition-29"><span data-dcnode-id="8652" instrument_node="">[29]</span></a></sup><span data-dcnode-id="8649" instrument_node=""> Eiffel invited Edison to his private apartment at the top of the tower, where Edison presented him with one of his </span><a data-dcnode-id="8647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phonograph" title="Phonograph"><span data-dcnode-id="8648" instrument_node="">phonographs</span></a><span data-dcnode-id="8646" instrument_node="">, a new invention and one of the many highlights of the exposition.</span><sup class="reference" data-dcnode-id="8643" id="cite_ref-32"><a data-dcnode-id="8644" href="#cite_note-32"><span data-dcnode-id="8645" instrument_node="">[32]</span></a></sup><span data-dcnode-id="8642" instrument_node=""> Edison signed the </span><a data-dcnode-id="8640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guestbook" title="Guestbook"><span data-dcnode-id="8641" instrument_node="">guestbook</span></a><span data-dcnode-id="8639" instrument_node=""> with this message: </span><link data-dcnode-id="8638" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"></p><blockquote class="templatequote" data-dcnode-id="8634" style="text-align:justify"><p data-dcnode-id="8635"><span data-dcnode-id="8636" instrument_node="">To M Eiffel the Engineer the brave builder of so gigantic and original specimen of modern Engineering from one who has the greatest respect and admiration for all Engineers including the Great Engineer the Bon Dieu, Thomas Edison.</span></p></blockquote><span data-dcnode-id="8633" instrument_node="">
</span><p data-dcnode-id="8624"><span data-dcnode-id="8632" instrument_node="">Eiffel had a permit for the tower to stand for 20 years. It was to be dismantled in 1909, when its ownership would revert to the </span><a data-dcnode-id="8630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris" title="Paris"><span data-dcnode-id="8631" instrument_node="">City of Paris</span></a><span data-dcnode-id="8629" instrument_node="">. The City had planned to tear it down (part of the original contest rules for designing a tower was that it should be easy to dismantle) but as the tower proved to be valuable for radio telegraphy, it was allowed to remain after the expiry of the permit, and from 1910 it also became part of the International Time Service.</span><sup class="reference" data-dcnode-id="8626" id="cite_ref-33"><a data-dcnode-id="8627" href="#cite_note-33"><span data-dcnode-id="8628" instrument_node="">[33]</span></a></sup><span data-dcnode-id="8625" instrument_node="">
</span></p><p data-dcnode-id="8615"><span data-dcnode-id="8623" instrument_node="">Eiffel made use of his apartment at the top of the tower to carry out </span><a data-dcnode-id="8621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meteorology" title="Meteorology"><span data-dcnode-id="8622" instrument_node="">meteorological observations</span></a><span data-dcnode-id="8620" instrument_node="">, and also used the tower to perform experiments on the action of air resistance on falling bodies.</span><sup class="reference" data-dcnode-id="8617" id="cite_ref-34"><a data-dcnode-id="8618" href="#cite_note-34"><span data-dcnode-id="8619" instrument_node="">[34]</span></a></sup><span data-dcnode-id="8616" instrument_node="">
</span></p><span data-dcnode-id="8614" instrument_node="">
</span><h3 data-dcnode-id="8611"><span class="mw-headline" data-dcnode-id="8612" id="Subsequent_events"><span data-dcnode-id="8613" instrument_node="">Subsequent events</span></span></h3><span data-dcnode-id="8610" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8594"><div class="thumbinner" data-dcnode-id="8595" style="width:222px;"><span class="mw-tmh-player video" data-dcnode-id="8604"><video class="thumbimage" data-dcnode-id="8609" data-durationhint="43" data-mwprovider="wikimediacommons" data-mwtitle="Vue_Lumière_No_992_-_Panorama_pendant_l'ascension_de_la_Tour_Eiffel_(1898).ogv" disabled="disabled" height="165" id="mwe_player_1_placeholder" poster="//upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Vue_Lumi%C3%A8re_No_992_-_Panorama_pendant_l%27ascension_de_la_Tour_Eiffel_%281898%29.ogv/220px--Vue_Lumi%C3%A8re_No_992_-_Panorama_pendant_l%27ascension_de_la_Tour_Eiffel_%281898%29.ogv.jpg" preload="none" tabindex="-1" width="220"></video><a class="mw-tmh-play" data-dcnode-id="8607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVue_Lumi%25C3%25A8re_No_992_-_Panorama_pendant_l%27ascension_de_la_Tour_Eiffel_%281898%29.ogv" role="button" title="Play media"><span class="mw-tmh-play-icon" data-dcnode-id="8608"></span></a><span aria-label="43 seconds" class="mw-tmh-duration mw-tmh-label" data-dcnode-id="8605"><span data-dcnode-id="8606" instrument_node="">0:43</span></span></span><span data-dcnode-id="8603" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8596"><div class="magnify" data-dcnode-id="8601"><a class="internal" data-dcnode-id="8602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVue_Lumi%25C3%25A8re_No_992_-_Panorama_pendant_l%27ascension_de_la_Tour_Eiffel_%281898%29.ogv" title="Enlarge"></a></div><span data-dcnode-id="8600" instrument_node="">Panoramic view during ascent of the Eiffel Tower by the </span><a data-dcnode-id="8598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Auguste_and_Louis_Lumi%25C3%25A8re" title="Auguste and Louis Lumière"><span data-dcnode-id="8599" instrument_node="">Lumière brothers</span></a><span data-dcnode-id="8597" instrument_node="">, 1898</span></div></div></div><span data-dcnode-id="8593" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8578"><div class="thumbinner" data-dcnode-id="8579" style="width:222px;"><span class="mw-tmh-player video" data-dcnode-id="8587"><video class="thumbimage" data-dcnode-id="8592" data-durationhint="106" data-mwprovider="wikimediacommons" data-mwtitle="Reichelt.ogv" disabled="disabled" height="165" id="mwe_player_2_placeholder" poster="//upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Reichelt.ogv/220px--Reichelt.ogv.jpg" preload="none" tabindex="-1" width="220"></video><a class="mw-tmh-play" data-dcnode-id="8590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AReichelt.ogv" role="button" title="Play media"><span class="mw-tmh-play-icon" data-dcnode-id="8591"></span></a><span aria-label="1 minute and 46 seconds" class="mw-tmh-duration mw-tmh-label" data-dcnode-id="8588"><span data-dcnode-id="8589" instrument_node="">1:46</span></span></span><span data-dcnode-id="8586" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8580"><div class="magnify" data-dcnode-id="8584"><a class="internal" data-dcnode-id="8585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AReichelt.ogv" title="Enlarge"></a></div><a data-dcnode-id="8582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franz_Reichelt" title="Franz Reichelt"><span data-dcnode-id="8583" instrument_node="">Franz Reichelt</span></a><span data-dcnode-id="8581" instrument_node="">'s preparations and fatal jump from the Eiffel Tower</span></div></div></div><span data-dcnode-id="8577" instrument_node="">
