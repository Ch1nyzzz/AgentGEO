</span><p data-dcnode-id="8558"><span data-dcnode-id="8576" instrument_node="">For the </span><a data-dcnode-id="8572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281900%29" title="Exposition Universelle (1900)"><span data-dcnode-id="8575" instrument_node="">1900 </span><i data-dcnode-id="8573"><span data-dcnode-id="8574" instrument_node="">Exposition Universelle</span></i></a><span data-dcnode-id="8571" instrument_node="">, the lifts in the east and west legs were replaced by lifts running as far as the second level constructed by the French firm Fives-Lille. These had a compensating mechanism to keep the floor level as the angle of ascent changed at the first level, and were driven by a similar hydraulic mechanism as the Otis lifts, although this was situated at the base of the tower. Hydraulic pressure was provided by pressurised accumulators located near this mechanism.</span><sup class="reference" data-dcnode-id="8568" id="cite_ref-vogel_23-4_26-1"><a data-dcnode-id="8569" href="#cite_note-vogel_23-4-26"><span data-dcnode-id="8570" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8567" instrument_node=""> At the same time the lift in the north pillar was removed and replaced by a staircase to the first level. The layout of both first and second levels was modified, with the space available for visitors on the second level. The original lift in the south pillar was removed 13 years later.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8560" style="white-space:nowrap;"><span data-dcnode-id="8566" instrument_node="">[</span><i data-dcnode-id="8562"><a data-dcnode-id="8563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8564" title="This claim needs references to reliable sources. (March 2021)"><span data-dcnode-id="8565" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8561" instrument_node="">]</span></sup><span data-dcnode-id="8559" instrument_node="">
</span></p><p data-dcnode-id="8537"><span data-dcnode-id="8557" instrument_node="">On 19 October 1901, </span><a data-dcnode-id="8555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alberto_Santos-Dumont" title="Alberto Santos-Dumont"><span data-dcnode-id="8556" instrument_node="">Alberto Santos-Dumont</span></a><span data-dcnode-id="8554" instrument_node="">, flying his </span><a data-dcnode-id="8552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Santos-Dumont_number_6" title="Santos-Dumont number 6"><span data-dcnode-id="8553" instrument_node="">No.6</span></a><span data-dcnode-id="8551" instrument_node=""> </span><a data-dcnode-id="8549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airship" title="Airship"><span data-dcnode-id="8550" instrument_node="">airship</span></a><span data-dcnode-id="8548" instrument_node="">, won a 100,000-franc prize offered by </span><a data-dcnode-id="8546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henri_Deutsch_de_la_Meurthe" title="Henri Deutsch de la Meurthe"><span data-dcnode-id="8547" instrument_node="">Henri Deutsch de la Meurthe</span></a><span data-dcnode-id="8545" instrument_node=""> for the first person to make a flight from </span><a data-dcnode-id="8543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint-Cloud" title="Saint-Cloud"><span data-dcnode-id="8544" instrument_node="">St. Cloud</span></a><span data-dcnode-id="8542" instrument_node=""> to the Eiffel Tower and back in less than half an hour.</span><sup class="reference" data-dcnode-id="8539" id="cite_ref-35"><a data-dcnode-id="8540" href="#cite_note-35"><span data-dcnode-id="8541" instrument_node="">[35]</span></a></sup><span data-dcnode-id="8538" instrument_node="">
</span></p><p data-dcnode-id="8482"><span data-dcnode-id="8536" instrument_node="">Many innovations took place at the Eiffel Tower in the early 20th century. In 1910, </span><a data-dcnode-id="8534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Priest" title="Priest"><span data-dcnode-id="8535" instrument_node="">Father</span></a><span data-dcnode-id="8533" instrument_node=""> </span><a data-dcnode-id="8531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theodor_Wulf" title="Theodor Wulf"><span data-dcnode-id="8532" instrument_node="">Theodor Wulf</span></a><span data-dcnode-id="8530" instrument_node=""> measured </span><a data-dcnode-id="8528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radiant_energy" title="Radiant energy"><span data-dcnode-id="8529" instrument_node="">radiant energy</span></a><span data-dcnode-id="8527" instrument_node=""> at the top and bottom of the tower. He found more at the top than expected, incidentally discovering what are known today as </span><a data-dcnode-id="8525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_ray" title="Cosmic ray"><span data-dcnode-id="8526" instrument_node="">cosmic rays</span></a><span data-dcnode-id="8524" instrument_node="">.</span><sup class="reference" data-dcnode-id="8521" id="cite_ref-Wulf_36-0"><a data-dcnode-id="8522" href="#cite_note-Wulf-36"><span data-dcnode-id="8523" instrument_node="">[36]</span></a></sup><span data-dcnode-id="8520" instrument_node=""> Two years later, on 4 February 1912, Austrian tailor </span><a data-dcnode-id="8518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franz_Reichelt" title="Franz Reichelt"><span data-dcnode-id="8519" instrument_node="">Franz Reichelt</span></a><span data-dcnode-id="8517" instrument_node=""> died after jumping from the first level of the tower (a height of 57 m) to demonstrate his </span><a data-dcnode-id="8515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parachute" title="Parachute"><span data-dcnode-id="8516" instrument_node="">parachute</span></a><span data-dcnode-id="8514" instrument_node=""> design.</span><sup class="reference" data-dcnode-id="8511" id="cite_ref-37"><a data-dcnode-id="8512" href="#cite_note-37"><span data-dcnode-id="8513" instrument_node="">[37]</span></a></sup><span data-dcnode-id="8510" instrument_node=""> In 1914, at the outbreak of </span><a data-dcnode-id="8508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="8509" instrument_node="">World War&nbsp;I</span></a><span data-dcnode-id="8507" instrument_node="">, a radio transmitter located in the tower </span><a data-dcnode-id="8505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_jamming" title="Radio jamming"><span data-dcnode-id="8506" instrument_node="">jammed</span></a><span data-dcnode-id="8504" instrument_node=""> German radio communications, seriously hindering their advance on Paris and contributing to the Allied victory at the </span><a data-dcnode-id="8502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Battle_of_the_Marne" title="First Battle of the Marne"><span data-dcnode-id="8503" instrument_node="">First Battle of the Marne</span></a><span data-dcnode-id="8501" instrument_node="">.</span><sup class="reference" data-dcnode-id="8498" id="cite_ref-Tuchman1994_38-0"><a data-dcnode-id="8499" href="#cite_note-Tuchman1994-38"><span data-dcnode-id="8500" instrument_node="">[38]</span></a></sup><span data-dcnode-id="8497" instrument_node=""> From 1925 to 1934, illuminated signs for </span><a data-dcnode-id="8495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Citro%25C3%25ABn" title="Citroën"><span data-dcnode-id="8496" instrument_node="">Citroën</span></a><span data-dcnode-id="8494" instrument_node=""> adorned three of the tower's sides, making it the tallest advertising space in the world at the time.</span><sup class="reference" data-dcnode-id="8491" id="cite_ref-39"><a data-dcnode-id="8492" href="#cite_note-39"><span data-dcnode-id="8493" instrument_node="">[39]</span></a></sup><span data-dcnode-id="8490" instrument_node=""> In April 1935, the tower was used to make experimental low-resolution television transmissions, using a </span><a class="mw-redirect" data-dcnode-id="8488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shortwave" title="Shortwave"><span data-dcnode-id="8489" instrument_node="">shortwave</span></a><span data-dcnode-id="8487" instrument_node=""> transmitter of 200 watts power. On 17 November, an improved 180-line transmitter was installed.</span><sup class="reference" data-dcnode-id="8484" id="cite_ref-Herbert2004_40-0"><a data-dcnode-id="8485" href="#cite_note-Herbert2004-40"><span data-dcnode-id="8486" instrument_node="">[40]</span></a></sup><span data-dcnode-id="8483" instrument_node="">
</span></p><p data-dcnode-id="8445"><span data-dcnode-id="8481" instrument_node="">On two separate but related occasions in 1925, the con artist </span><a data-dcnode-id="8479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victor_Lustig" title="Victor Lustig"><span data-dcnode-id="8480" instrument_node="">Victor Lustig</span></a><span data-dcnode-id="8478" instrument_node=""> "sold" the tower for scrap metal.</span><sup class="reference" data-dcnode-id="8475" id="cite_ref-Letcher2003_41-0"><a data-dcnode-id="8476" href="#cite_note-Letcher2003-41"><span data-dcnode-id="8477" instrument_node="">[41]</span></a></sup><span data-dcnode-id="8474" instrument_node=""> A year later, in February 1926, pilot Leon Collet was killed trying to fly under the tower. His aircraft became entangled in an aerial belonging to a wireless station.</span><sup class="reference" data-dcnode-id="8471" id="cite_ref-42"><a data-dcnode-id="8472" href="#cite_note-42"><span data-dcnode-id="8473" instrument_node="">[42]</span></a></sup><span data-dcnode-id="8470" instrument_node=""> A </span><a data-dcnode-id="8468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bust_%28sculpture%29" title="Bust (sculpture)"><span data-dcnode-id="8469" instrument_node="">bust</span></a><span data-dcnode-id="8467" instrument_node=""> of Gustave Eiffel by </span><a data-dcnode-id="8465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antoine_Bourdelle" title="Antoine Bourdelle"><span data-dcnode-id="8466" instrument_node="">Antoine Bourdelle</span></a><span data-dcnode-id="8464" instrument_node=""> was unveiled at the base of the north leg on 2 May 1929.</span><sup class="reference" data-dcnode-id="8461" id="cite_ref-43"><a data-dcnode-id="8462" href="#cite_note-43"><span data-dcnode-id="8463" instrument_node="">[43]</span></a></sup><span data-dcnode-id="8460" instrument_node=""> In 1930, the tower lost the title of the </span><a class="mw-redirect" data-dcnode-id="8458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_tallest_freestanding_structures_in_the_world%23Timeline_of_world%27s_tallest_freestanding_structures" title="List of tallest freestanding structures in the world"><span data-dcnode-id="8459" instrument_node="">world's tallest structure</span></a><span data-dcnode-id="8457" instrument_node=""> when the </span><a data-dcnode-id="8455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chrysler_Building" title="Chrysler Building"><span data-dcnode-id="8456" instrument_node="">Chrysler Building</span></a><span data-dcnode-id="8454" instrument_node=""> in New York City was completed.</span><sup class="reference" data-dcnode-id="8451" id="cite_ref-44"><a data-dcnode-id="8452" href="#cite_note-44"><span data-dcnode-id="8453" instrument_node="">[44]</span></a></sup><span data-dcnode-id="8450" instrument_node=""> In 1938, the decorative arcade around the first level was removed.</span><sup class="reference" data-dcnode-id="8447" id="cite_ref-45"><a data-dcnode-id="8448" href="#cite_note-45"><span data-dcnode-id="8449" instrument_node="">[45]</span></a></sup><span data-dcnode-id="8446" instrument_node="">
</span></p><p data-dcnode-id="8402"><span data-dcnode-id="8444" instrument_node="">Upon the </span><a class="mw-redirect" data-dcnode-id="8442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_Administration_in_France_%28Nazi_Germany%29" title="Military Administration in France (Nazi Germany)"><span data-dcnode-id="8443" instrument_node="">German occupation</span></a><span data-dcnode-id="8441" instrument_node=""> of Paris in 1940, the lift cables were </span><a data-dcnode-id="8439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sabotage" title="Sabotage"><span data-dcnode-id="8440" instrument_node="">cut</span></a><span data-dcnode-id="8438" instrument_node=""> by the French. The tower was closed to the public during the occupation and the lifts were not repaired until 1946.</span><sup class="reference" data-dcnode-id="8435" id="cite_ref-Harriss_80_4_46-0"><a data-dcnode-id="8436" href="#cite_note-Harriss_80_4-46"><span data-dcnode-id="8437" instrument_node="">[46]</span></a></sup><span data-dcnode-id="8434" instrument_node=""> In 1940, German soldiers had to climb the tower to hoist a swastika-centered </span><a data-dcnode-id="8432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reichskriegsflagge" title="Reichskriegsflagge"><span data-dcnode-id="8433" instrument_node="">Reichskriegsflagge</span></a><span data-dcnode-id="8431" instrument_node="">,</span><sup class="reference" data-dcnode-id="8428" id="cite_ref-47"><a data-dcnode-id="8429" href="#cite_note-47"><span data-dcnode-id="8430" instrument_node="">[47]</span></a></sup><span data-dcnode-id="8427" instrument_node=""> but the flag was so large it blew away just a few hours later, and was replaced by a smaller one.</span><sup class="reference" data-dcnode-id="8424" id="cite_ref-48"><a data-dcnode-id="8425" href="#cite_note-48"><span data-dcnode-id="8426" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8423" instrument_node=""> When visiting Paris, Hitler chose to stay on the ground. When the </span><a data-dcnode-id="8421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allies_of_World_War_II" title="Allies of World War II"><span data-dcnode-id="8422" instrument_node="">Allies</span></a><span data-dcnode-id="8420" instrument_node=""> were nearing Paris in August 1944, Hitler ordered General </span><a data-dcnode-id="8418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dietrich_von_Choltitz" title="Dietrich von Choltitz"><span data-dcnode-id="8419" instrument_node="">Dietrich von Choltitz</span></a><span data-dcnode-id="8417" instrument_node="">, the military governor of Paris, to demolish the tower along with the rest of the city. Von Choltitz disobeyed the order.</span><sup class="reference" data-dcnode-id="8414" id="cite_ref-D'Este2003_49-0"><a data-dcnode-id="8415" href="#cite_note-D'Este2003-49"><span data-dcnode-id="8416" instrument_node="">[49]</span></a></sup><span data-dcnode-id="8413" instrument_node=""> On 25 June, before the Germans had been </span><a data-dcnode-id="8411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberation_of_Paris" title="Liberation of Paris"><span data-dcnode-id="8412" instrument_node="">driven out of Paris</span></a><span data-dcnode-id="8410" instrument_node="">, the German flag was replaced with a Tricolour by two men from the </span><a data-dcnode-id="8408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mus%25C3%25A9e_national_de_la_Marine" title="Musée national de la Marine"><span data-dcnode-id="8409" instrument_node="">French Naval Museum</span></a><span data-dcnode-id="8407" instrument_node="">, who narrowly beat three men led by Lucien Sarniguet, who had lowered the Tricolour on 13 June 1940 when Paris fell to the Germans.</span><sup class="reference" data-dcnode-id="8404" id="cite_ref-Harriss_80_4_46-1"><a data-dcnode-id="8405" href="#cite_note-Harriss_80_4-46"><span data-dcnode-id="8406" instrument_node="">[46]</span></a></sup><span data-dcnode-id="8403" instrument_node="">
</span></p><p data-dcnode-id="8385"><span data-dcnode-id="8401" instrument_node="">A fire started in the television transmitter on 3 January 1956, damaging the top of the tower. Repairs took a year, and in 1957, the present radio aerial was added to the top.</span><sup class="reference" data-dcnode-id="8398" id="cite_ref-events_50-0"><a data-dcnode-id="8399" href="#cite_note-events-50"><span data-dcnode-id="8400" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8397" instrument_node=""> In 1964, the Eiffel Tower was officially declared to be a historical monument by the Minister of Cultural Affairs, </span><a data-dcnode-id="8395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andr%25C3%25A9_Malraux" title="André Malraux"><span data-dcnode-id="8396" instrument_node="">André Malraux</span></a><span data-dcnode-id="8394" instrument_node="">.</span><sup class="reference" data-dcnode-id="8391" id="cite_ref-51"><a data-dcnode-id="8392" href="#cite_note-51"><span data-dcnode-id="8393" instrument_node="">[51]</span></a></sup><span data-dcnode-id="8390" instrument_node=""> A year later, an additional lift system was installed in the north pillar.</span><sup class="reference" data-dcnode-id="8387" id="cite_ref-official-website-lifts_52-0"><a data-dcnode-id="8388" href="#cite_note-official-website-lifts-52"><span data-dcnode-id="8389" instrument_node="">[52]</span></a></sup><span data-dcnode-id="8386" instrument_node="">
</span></p><p data-dcnode-id="8367"><span data-dcnode-id="8384" instrument_node="">According to interviews, in 1967, </span><a data-dcnode-id="8382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montreal" title="Montreal"><span data-dcnode-id="8383" instrument_node="">Montreal</span></a><span data-dcnode-id="8381" instrument_node=""> Mayor </span><a data-dcnode-id="8379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean_Drapeau" title="Jean Drapeau"><span data-dcnode-id="8380" instrument_node="">Jean Drapeau</span></a><span data-dcnode-id="8378" instrument_node=""> negotiated a secret agreement with </span><a data-dcnode-id="8376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_de_Gaulle" title="Charles de Gaulle"><span data-dcnode-id="8377" instrument_node="">Charles de Gaulle</span></a><span data-dcnode-id="8375" instrument_node=""> for the tower to be dismantled and temporarily relocated to Montreal to serve as a landmark and tourist attraction during </span><a data-dcnode-id="8373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Expo_67" title="Expo 67"><span data-dcnode-id="8374" instrument_node="">Expo 67</span></a><span data-dcnode-id="8372" instrument_node="">. The plan was allegedly vetoed by the company operating the tower out of fear that the French government could refuse permission for the tower to be restored in its original location.</span><sup class="reference" data-dcnode-id="8369" id="cite_ref-53"><a data-dcnode-id="8370" href="#cite_note-53"><span data-dcnode-id="8371" instrument_node="">[53]</span></a></sup><span data-dcnode-id="8368" instrument_node="">
</span></p><span data-dcnode-id="8366" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8357"><div class="thumbinner" data-dcnode-id="8358" style="width:222px;"><a class="image" data-dcnode-id="8364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AParis_Eiffel_092.JPG"><img alt="" class="thumbimage" data-dcnode-id="8365" data-file-height="2448" data-file-width="3264" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Paris_Eiffel_092.JPG/220px-Paris_Eiffel_092.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Paris_Eiffel_092.JPG/330px-Paris_Eiffel_092.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Paris_Eiffel_092.JPG/440px-Paris_Eiffel_092.JPG 2x" width="220"></a><span data-dcnode-id="8363" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8359"><div class="magnify" data-dcnode-id="8361"><a class="internal" data-dcnode-id="8362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AParis_Eiffel_092.JPG" title="Enlarge"></a></div><span data-dcnode-id="8360" instrument_node="">Base of the Eiffel Tower</span></div></div></div><span data-dcnode-id="8356" instrument_node="">
</span><p data-dcnode-id="8328"><span data-dcnode-id="8355" instrument_node="">In 1982, the original lifts between the second and third levels were replaced after 97 years in service. These had been closed to the public between November and March because the water in the hydraulic drive tended to freeze. The new cars operate in pairs, with one counterbalancing the other, and perform the journey in one stage, reducing the journey time from eight minutes to less than two minutes. At the same time, two new emergency staircases were installed, replacing the original spiral staircases. In 1983, the south pillar was fitted with an electrically driven Otis lift to serve the </span><a class="mw-redirect" data-dcnode-id="8353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jules_Verne_%28restaurant%29" title="Jules Verne (restaurant)"><span data-dcnode-id="8354" instrument_node="">Jules Verne</span></a><span data-dcnode-id="8352" instrument_node=""> restaurant.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8345" style="white-space:nowrap;"><span data-dcnode-id="8351" instrument_node="">[</span><i data-dcnode-id="8347"><a data-dcnode-id="8348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8349" title="This claim needs references to reliable sources. (November 2015)"><span data-dcnode-id="8350" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8346" instrument_node="">]</span></sup><span data-dcnode-id="8344" instrument_node=""> The Fives-Lille lifts in the east and west legs, fitted in 1899, were extensively refurbished in 1986. The cars were replaced, and a computer system was installed to completely automate the lifts. The </span><a data-dcnode-id="8342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Power_%28physics%29" title="Power (physics)"><span data-dcnode-id="8343" instrument_node="">motive power</span></a><span data-dcnode-id="8341" instrument_node=""> was moved from the water hydraulic system to a new electrically driven oil-filled hydraulic system, and the original water hydraulics were retained solely as a counterbalance system.</span><sup class="reference" data-dcnode-id="8338" id="cite_ref-official-website-lifts_52-1"><a data-dcnode-id="8339" href="#cite_note-official-website-lifts-52"><span data-dcnode-id="8340" instrument_node="">[52]</span></a></sup><span data-dcnode-id="8337" instrument_node=""> A service lift was added to the south pillar for moving small loads and maintenance personnel three years later.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8330" style="white-space:nowrap;"><span data-dcnode-id="8336" instrument_node="">[</span><i data-dcnode-id="8332"><a data-dcnode-id="8333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8334" title="This claim needs references to reliable sources. (March 2021)"><span data-dcnode-id="8335" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8331" instrument_node="">]</span></sup><span data-dcnode-id="8329" instrument_node="">
</span></p><p data-dcnode-id="8300"><a class="mw-redirect" data-dcnode-id="8326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Moriarty" title="Robert Moriarty"><span data-dcnode-id="8327" instrument_node="">Robert Moriarty</span></a><span data-dcnode-id="8325" instrument_node=""> flew a </span><a data-dcnode-id="8323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beechcraft_Bonanza" title="Beechcraft Bonanza"><span data-dcnode-id="8324" instrument_node="">Beechcraft Bonanza</span></a><span data-dcnode-id="8322" instrument_node=""> under the tower on 31 March 1984.</span><sup class="reference" data-dcnode-id="8319" id="cite_ref-54"><a data-dcnode-id="8320" href="#cite_note-54"><span data-dcnode-id="8321" instrument_node="">[54]</span></a></sup><span data-dcnode-id="8318" instrument_node=""> In 1987, </span><a class="mw-redirect" data-dcnode-id="8316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A.J._Hackett" title="A.J. Hackett"><span data-dcnode-id="8317" instrument_node="">A.J. Hackett</span></a><span data-dcnode-id="8315" instrument_node=""> made one of his first </span><a data-dcnode-id="8313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bungee_jumping" title="Bungee jumping"><span data-dcnode-id="8314" instrument_node="">bungee jumps</span></a><span data-dcnode-id="8312" instrument_node=""> from the top of the Eiffel Tower, using a special cord he had helped develop. Hackett was arrested by the police.</span><sup class="reference" data-dcnode-id="8309" id="cite_ref-55"><a data-dcnode-id="8310" href="#cite_note-55"><span data-dcnode-id="8311" instrument_node="">[55]</span></a></sup><span data-dcnode-id="8308" instrument_node=""> On 27 October 1991, </span><a data-dcnode-id="8306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thierry_Devaux" title="Thierry Devaux"><span data-dcnode-id="8307" instrument_node="">Thierry Devaux</span></a><span data-dcnode-id="8305" instrument_node="">, along with mountain guide Hervé Calvayrac, performed a series of acrobatic figures while bungee jumping from the second floor of the tower. Facing the Champ de Mars, Devaux used an electric winch between figures to go back up to the second floor. When firemen arrived, he stopped after the sixth jump.</span><sup class="reference" data-dcnode-id="8302" id="cite_ref-56"><a data-dcnode-id="8303" href="#cite_note-56"><span data-dcnode-id="8304" instrument_node="">[56]</span></a></sup><span data-dcnode-id="8301" instrument_node="">
</span></p><span data-dcnode-id="8299" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="8287"><div class="thumbinner" data-dcnode-id="8288" style="width:222px;"><a class="image" data-dcnode-id="8297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2013_Fireworks_on_Eiffel_Tower_11.jpg"><img alt="" class="thumbimage" data-dcnode-id="8298" data-file-height="2948" data-file-width="3931" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/06/2013_Fireworks_on_Eiffel_Tower_11.jpg/220px-2013_Fireworks_on_Eiffel_Tower_11.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/06/2013_Fireworks_on_Eiffel_Tower_11.jpg/330px-2013_Fireworks_on_Eiffel_Tower_11.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/06/2013_Fireworks_on_Eiffel_Tower_11.jpg/440px-2013_Fireworks_on_Eiffel_Tower_11.jpg 2x" width="220"></a><span data-dcnode-id="8296" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8289"><div class="magnify" data-dcnode-id="8294"><a class="internal" data-dcnode-id="8295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2013_Fireworks_on_Eiffel_Tower_11.jpg" title="Enlarge"></a></div><span data-dcnode-id="8293" instrument_node="">The tower is the focal point of New Year's Eve and </span><a data-dcnode-id="8291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bastille_Day" title="Bastille Day"><span data-dcnode-id="8292" instrument_node="">Bastille Day</span></a><span data-dcnode-id="8290" instrument_node=""> (14 July) celebrations in Paris.</span></div></div></div><span data-dcnode-id="8286" instrument_node="">
</span><p data-dcnode-id="8277"><span data-dcnode-id="8285" instrument_node="">For its "Countdown to the Year 2000" celebration on 31 December 1999, flashing lights and high-powered </span><a data-dcnode-id="8283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Searchlight" title="Searchlight"><span data-dcnode-id="8284" instrument_node="">searchlights</span></a><span data-dcnode-id="8282" instrument_node=""> were installed on the tower. During the last three minutes of the year, the lights were turned on starting from the base of the tower and continuing to the top to welcome 2000 with a huge fireworks show. An exhibition above a cafeteria on the first floor commemorates this event. The searchlights on top of the tower made it a beacon in Paris's night sky, and 20,000 flashing bulbs gave the tower a sparkly appearance for five minutes every hour on the hour.</span><sup class="reference" data-dcnode-id="8279" id="cite_ref-57"><a data-dcnode-id="8280" href="#cite_note-57"><span data-dcnode-id="8281" instrument_node="">[57]</span></a></sup><span data-dcnode-id="8278" instrument_node="">
</span></p><p data-dcnode-id="8271"><span data-dcnode-id="8276" instrument_node="">The lights sparkled blue for several nights to herald the new millennium on 31 December 2000. The sparkly lighting continued for 18 months until July 2001. The sparkling lights were turned on again on 21 June 2003, and the display was planned to last for 10 years before they needed replacing.</span><sup class="reference" data-dcnode-id="8273" id="cite_ref-allyouneed_58-0"><a data-dcnode-id="8274" href="#cite_note-allyouneed-58"><span data-dcnode-id="8275" instrument_node="">[58]</span></a></sup><span data-dcnode-id="8272" instrument_node="">
</span></p><p data-dcnode-id="8250"><span data-dcnode-id="8270" instrument_node="">The tower received its 200,000,000th guest on 28 November 2002.</span><sup class="reference" data-dcnode-id="8267" id="cite_ref-59"><a data-dcnode-id="8268" href="#cite_note-59"><span data-dcnode-id="8269" instrument_node="">[59]</span></a></sup><span data-dcnode-id="8266" instrument_node=""> The tower has operated at its maximum capacity of about 7&nbsp;million visitors per year since 2003.</span><sup class="reference" data-dcnode-id="8263" id="cite_ref-60"><a data-dcnode-id="8264" href="#cite_note-60"><span data-dcnode-id="8265" instrument_node="">[60]</span></a></sup><span data-dcnode-id="8262" instrument_node=""> In 2004, the Eiffel Tower began hosting a seasonal ice rink on the first level.</span><sup class="reference" data-dcnode-id="8259" id="cite_ref-PorterPrince2006_61-0"><a data-dcnode-id="8260" href="#cite_note-PorterPrince2006-61"><span data-dcnode-id="8261" instrument_node="">[61]</span></a></sup><span data-dcnode-id="8258" instrument_node=""> A </span><a data-dcnode-id="8256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glass_floor" title="Glass floor"><span data-dcnode-id="8257" instrument_node="">glass floor</span></a><span data-dcnode-id="8255" instrument_node=""> was installed on the first level during the 2014 refurbishment.</span><sup class="reference" data-dcnode-id="8252" id="cite_ref-62"><a data-dcnode-id="8253" href="#cite_note-62"><span data-dcnode-id="8254" instrument_node="">[62]</span></a></sup><span data-dcnode-id="8251" instrument_node="">
</span></p><span data-dcnode-id="8249" instrument_node="">
</span><div data-dcnode-id="8248" style="clear:both;"></div><span data-dcnode-id="8247" instrument_node="">
</span><h2 data-dcnode-id="8244"><span class="mw-headline" data-dcnode-id="8245" id="Design"><span data-dcnode-id="8246" instrument_node="">Design</span></span></h2><span data-dcnode-id="8243" instrument_node="">
</span><h3 data-dcnode-id="8240"><span class="mw-headline" data-dcnode-id="8241" id="Material"><span data-dcnode-id="8242" instrument_node="">Material</span></span></h3><span data-dcnode-id="8239" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8230"><div class="thumbinner" data-dcnode-id="8231" style="width:222px;"><a class="image" data-dcnode-id="8237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASous_la_Tour_Eiffel_1.jpg"><img alt="" class="thumbimage" data-dcnode-id="8238" data-file-height="2013" data-file-width="2935" decoding="async" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Sous_la_Tour_Eiffel_1.jpg/220px-Sous_la_Tour_Eiffel_1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Sous_la_Tour_Eiffel_1.jpg/330px-Sous_la_Tour_Eiffel_1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Sous_la_Tour_Eiffel_1.jpg/440px-Sous_la_Tour_Eiffel_1.jpg 2x" width="220"></a><span data-dcnode-id="8236" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8232"><div class="magnify" data-dcnode-id="8234"><a class="internal" data-dcnode-id="8235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASous_la_Tour_Eiffel_1.jpg" title="Enlarge"></a></div><span data-dcnode-id="8233" instrument_node="">The Eiffel Tower from below</span></div></div></div><span data-dcnode-id="8229" instrument_node="">
</span><p data-dcnode-id="8202"><span data-dcnode-id="8228" instrument_node="">The </span><a data-dcnode-id="8226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Puddling_%28metallurgy%29" title="Puddling (metallurgy)"><span data-dcnode-id="8227" instrument_node="">puddle iron</span></a><span data-dcnode-id="8225" instrument_node=""> (wrought iron) of the Eiffel Tower weighs 7,300 </span><a data-dcnode-id="8223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tonne" title="Tonne"><span data-dcnode-id="8224" instrument_node="">tonnes</span></a><span data-dcnode-id="8222" instrument_node="">,</span><sup class="reference" data-dcnode-id="8219" id="cite_ref-Hanser2006_63-0"><a data-dcnode-id="8220" href="#cite_note-Hanser2006-63"><span data-dcnode-id="8221" instrument_node="">[63]</span></a></sup><span data-dcnode-id="8218" instrument_node=""> and the addition of lifts, shops and antennae have brought the total weight to approximately 10,100&nbsp;tonnes.</span><sup class="reference" data-dcnode-id="8215" id="cite_ref-64"><a data-dcnode-id="8216" href="#cite_note-64"><span data-dcnode-id="8217" instrument_node="">[64]</span></a></sup><span data-dcnode-id="8214" instrument_node=""> As a demonstration of the economy of design, if the 7,300&nbsp;tonnes of metal in the structure were melted down, it would fill the square base, 125 metres (410&nbsp;ft) on each side, to a depth of only 6.25&nbsp;cm (2.46&nbsp;in) assuming the density of the metal to be 7.8&nbsp;tonnes per cubic metre.</span><sup class="reference" data-dcnode-id="8211" id="cite_ref-65"><a data-dcnode-id="8212" href="#cite_note-65"><span data-dcnode-id="8213" instrument_node="">[65]</span></a></sup><span data-dcnode-id="8210" instrument_node=""> Additionally, a cubic box surrounding the tower (324&nbsp;m&nbsp;×&nbsp;125&nbsp;m&nbsp;×&nbsp;125&nbsp;m) would contain 6,200&nbsp;tonnes of air, weighing almost as much as the iron itself. Depending on the ambient temperature, the top of the tower may shift away from the sun by up to 18&nbsp;cm (7&nbsp;in) due to </span><a data-dcnode-id="8208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thermal_expansion" title="Thermal expansion"><span data-dcnode-id="8209" instrument_node="">thermal expansion</span></a><span data-dcnode-id="8207" instrument_node=""> of the metal on the side facing the sun.</span><sup class="reference" data-dcnode-id="8204" id="cite_ref-66"><a data-dcnode-id="8205" href="#cite_note-66"><span data-dcnode-id="8206" instrument_node="">[66]</span></a></sup><span data-dcnode-id="8203" instrument_node="">
</span></p><span data-dcnode-id="8201" instrument_node="">
</span><h3 data-dcnode-id="8198"><span class="mw-headline" data-dcnode-id="8199" id="Wind_considerations"><span data-dcnode-id="8200" instrument_node="">Wind considerations</span></span></h3><span data-dcnode-id="8197" instrument_node="">
</span><p data-dcnode-id="8191"><span data-dcnode-id="8196" instrument_node="">When it was built, many were shocked by the tower's daring form. Eiffel was accused of trying to create something artistic with no regard to the principles of engineering. However, Eiffel and his team – experienced bridge builders – understood the importance of wind forces, and knew that if they were going to build the tallest structure in the world, they had to be sure it could withstand them. In an interview with the newspaper </span><i data-dcnode-id="8193"><a data-dcnode-id="8194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Temps_%28Paris%29" title="Le Temps (Paris)"><span data-dcnode-id="8195" instrument_node="">Le Temps</span></a></i><span data-dcnode-id="8192" instrument_node=""> published on 14 February 1887, Eiffel said:
</span></p><span data-dcnode-id="8190" instrument_node="">
</span><link data-dcnode-id="8189" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="8183" style="text-align:justify"><p data-dcnode-id="8184"><span data-dcnode-id="8188" instrument_node="">Is it not true that the very conditions which give strength also conform to the hidden rules of harmony? … Now to what phenomenon did I have to give primary concern in designing the Tower? It was wind resistance. Well then! I hold that the curvature of the monument's four outer edges, which is as mathematical calculation dictated it should be … will give a great impression of strength and beauty, for it will reveal to the eyes of the observer the boldness of the design as a whole.</span><sup class="reference" data-dcnode-id="8185" id="cite_ref-debate_67-0"><a data-dcnode-id="8186" href="#cite_note-debate-67"><span data-dcnode-id="8187" instrument_node="">[67]</span></a></sup></p></blockquote><span data-dcnode-id="8182" instrument_node="">
</span><p data-dcnode-id="8165"><span data-dcnode-id="8181" instrument_node="">He used graphical methods to determine the strength of the tower and empirical evidence to account for the effects of wind, rather than a mathematical formula. Close examination of the tower reveals a basically </span><a data-dcnode-id="8179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exponential_function" title="Exponential function"><span data-dcnode-id="8180" instrument_node="">exponential</span></a><span data-dcnode-id="8178" instrument_node=""> shape.</span><sup class="reference" data-dcnode-id="8175" id="cite_ref-sciencedaily2005_68-0"><a data-dcnode-id="8176" href="#cite_note-sciencedaily2005-68"><span data-dcnode-id="8177" instrument_node="">[68]</span></a></sup><span data-dcnode-id="8174" instrument_node=""> All parts of the tower were overdesigned to ensure maximum resistance to wind forces. The top half was even assumed to have no gaps in the latticework.</span><sup class="reference" data-dcnode-id="8171" id="cite_ref-69"><a data-dcnode-id="8172" href="#cite_note-69"><span data-dcnode-id="8173" instrument_node="">[69]</span></a></sup><span data-dcnode-id="8170" instrument_node=""> In the years since it was completed, engineers have put forward various mathematical hypotheses in an attempt to explain the success of the design. The most recent, devised in 2004 after letters sent by Eiffel to the French Society of Civil Engineers in 1885 were translated into English, is described as a non-linear integral equation based on counteracting the wind pressure on any point of the tower with the tension between the construction elements at that point.</span><sup class="reference" data-dcnode-id="8167" id="cite_ref-sciencedaily2005_68-1"><a data-dcnode-id="8168" href="#cite_note-sciencedaily2005-68"><span data-dcnode-id="8169" instrument_node="">[68]</span></a></sup><span data-dcnode-id="8166" instrument_node="">
</span></p><p data-dcnode-id="8159"><span data-dcnode-id="8164" instrument_node="">The Eiffel Tower sways by up to 9&nbsp;cm (3.5&nbsp;in) in the wind.</span><sup class="reference" data-dcnode-id="8161" id="cite_ref-70"><a data-dcnode-id="8162" href="#cite_note-70"><span data-dcnode-id="8163" instrument_node="">[70]</span></a></sup><span data-dcnode-id="8160" instrument_node="">
</span></p><span data-dcnode-id="8158" instrument_node="">
</span><h3 data-dcnode-id="8155"><span class="mw-headline" data-dcnode-id="8156" id="Accommodation"><span data-dcnode-id="8157" instrument_node="">Accommodation</span></span></h3><span data-dcnode-id="8154" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8145"><div class="thumbinner" data-dcnode-id="8146" style="width:222px;"><a class="image" data-dcnode-id="8152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGustaves_Apartment_-_Eiffel_%283384390462%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="8153" data-file-height="2848" data-file-width="4288" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Gustaves_Apartment_-_Eiffel_%25283384390462%2529.jpg/220px-Gustaves_Apartment_-_Eiffel_%25283384390462%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Gustaves_Apartment_-_Eiffel_%283384390462%29.jpg/330px-Gustaves_Apartment_-_Eiffel_%283384390462%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Gustaves_Apartment_-_Eiffel_%283384390462%29.jpg/440px-Gustaves_Apartment_-_Eiffel_%283384390462%29.jpg 2x" width="220"></a><span data-dcnode-id="8151" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8147"><div class="magnify" data-dcnode-id="8149"><a class="internal" data-dcnode-id="8150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGustaves_Apartment_-_Eiffel_%283384390462%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="8148" instrument_node="">Gustave Eiffel's apartment</span></div></div></div><span data-dcnode-id="8144" instrument_node="">
</span><p data-dcnode-id="8132"><span data-dcnode-id="8143" instrument_node="">When originally built, the first level contained three restaurants – one French, one Russian and one </span><a data-dcnode-id="8141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flemish_Region" title="Flemish Region"><span data-dcnode-id="8142" instrument_node="">Flemish</span></a><span data-dcnode-id="8140" instrument_node=""> — and an "Anglo-American Bar". After the exposition closed, the Flemish restaurant was converted to a 250-seat theatre. A promenade 2.6-metre (8&nbsp;ft 6&nbsp;in) wide ran around the outside of the first level. At the top, there were laboratories for various experiments, and a small apartment reserved for Gustave Eiffel to entertain guests, which is now open to the public, complete with period decorations and lifelike </span><a data-dcnode-id="8138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mannequin" title="Mannequin"><span data-dcnode-id="8139" instrument_node="">mannequins</span></a><span data-dcnode-id="8137" instrument_node=""> of Eiffel and some of his notable guests.</span><sup class="reference" data-dcnode-id="8134" id="cite_ref-Morton_71-0"><a data-dcnode-id="8135" href="#cite_note-Morton-71"><span data-dcnode-id="8136" instrument_node="">[71]</span></a></sup><span data-dcnode-id="8133" instrument_node="">
</span></p><p data-dcnode-id="8114"><span data-dcnode-id="8131" instrument_node="">In May 2016, an apartment was created on the first level to accommodate four competition winners during the </span><a data-dcnode-id="8129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UEFA_Euro_2016" title="UEFA Euro 2016"><span data-dcnode-id="8130" instrument_node="">UEFA Euro 2016</span></a><span data-dcnode-id="8128" instrument_node=""> football tournament in Paris in June. The apartment has a kitchen, two bedrooms, a lounge, and views of Paris landmarks including the </span><a data-dcnode-id="8126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seine" title="Seine"><span data-dcnode-id="8127" instrument_node="">Seine</span></a><span data-dcnode-id="8125" instrument_node="">, </span><a data-dcnode-id="8123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sacr%25C3%25A9-C%25C5%2593ur%2C_Paris" title="Sacré-Cœur, Paris"><span data-dcnode-id="8124" instrument_node="">Sacré-Cœur</span></a><span data-dcnode-id="8122" instrument_node="">, and the </span><a data-dcnode-id="8120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arc_de_Triomphe" title="Arc de Triomphe"><span data-dcnode-id="8121" instrument_node="">Arc de Triomphe</span></a><span data-dcnode-id="8119" instrument_node="">.</span><sup class="reference" data-dcnode-id="8116" id="cite_ref-72"><a data-dcnode-id="8117" href="#cite_note-72"><span data-dcnode-id="8118" instrument_node="">[72]</span></a></sup><span data-dcnode-id="8115" instrument_node="">
</span></p><span data-dcnode-id="8113" instrument_node="">
</span><h3 data-dcnode-id="8110"><span class="mw-headline" data-dcnode-id="8111" id="Passenger_lifts"><span data-dcnode-id="8112" instrument_node="">Passenger lifts</span></span></h3><span data-dcnode-id="8109" instrument_node="">
</span><p data-dcnode-id="8103"><span data-dcnode-id="8108" instrument_node="">The arrangement of the lifts has been changed several times during the tower's history. Given the elasticity of the cables and the time taken to align the cars with the landings, each lift, in normal service, takes an average of 8 minutes and 50 seconds to do the round trip, spending an average of 1 minute and 15 seconds at each level. The average journey time between levels is 1 minute. The original hydraulic mechanism is on public display in a small museum at the base of the east and west legs. Because the mechanism requires frequent lubrication and maintenance, public access is often restricted. The rope mechanism of the north tower can be seen as visitors exit the lift.</span><sup class="reference" data-dcnode-id="8105" id="cite_ref-73"><a data-dcnode-id="8106" href="#cite_note-73"><span data-dcnode-id="8107" instrument_node="">[73]</span></a></sup><span data-dcnode-id="8104" instrument_node="">
</span></p><span data-dcnode-id="8102" instrument_node="">
</span><h3 data-dcnode-id="8099"><span class="mw-headline" data-dcnode-id="8100" id="Engraved_names"><span data-dcnode-id="8101" instrument_node="">Engraved names</span></span></h3><span data-dcnode-id="8098" instrument_node="">
</span><link data-dcnode-id="8097" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8093" role="note"><span data-dcnode-id="8096" instrument_node="">Main article: </span><a data-dcnode-id="8094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_the_72_names_on_the_Eiffel_Tower" title="List of the 72 names on the Eiffel Tower"><span data-dcnode-id="8095" instrument_node="">List of the 72 names on the Eiffel Tower</span></a></div><span data-dcnode-id="8092" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8083"><div class="thumbinner" data-dcnode-id="8084" style="width:222px;"><a class="image" data-dcnode-id="8090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALes_savants_de_la_Tour_Eiffel.jpg"><img alt="" class="thumbimage" data-dcnode-id="8091" data-file-height="1021" data-file-width="1362" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/89/Les_savants_de_la_Tour_Eiffel.jpg/220px-Les_savants_de_la_Tour_Eiffel.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/89/Les_savants_de_la_Tour_Eiffel.jpg/330px-Les_savants_de_la_Tour_Eiffel.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/89/Les_savants_de_la_Tour_Eiffel.jpg/440px-Les_savants_de_la_Tour_Eiffel.jpg 2x" width="220"></a><span data-dcnode-id="8089" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8085"><div class="magnify" data-dcnode-id="8087"><a class="internal" data-dcnode-id="8088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALes_savants_de_la_Tour_Eiffel.jpg" title="Enlarge"></a></div><span data-dcnode-id="8086" instrument_node="">Names engraved on the tower</span></div></div></div><span data-dcnode-id="8082" instrument_node="">
</span><p data-dcnode-id="8072"><span data-dcnode-id="8081" instrument_node="">Gustave Eiffel engraved on the tower the names of 72 French scientists, engineers and mathematicians in recognition of their contributions to the building of the tower. Eiffel chose this "invocation of science" because of his concern over the artists' protest. At the beginning of the 20th century, the engravings were painted over, but they were restored in 1986–87 by the </span><span data-dcnode-id="8078" title="French-language text"><i data-dcnode-id="8079" lang="fr"><span data-dcnode-id="8080" instrument_node="">Société Nouvelle d'exploitation de la Tour Eiffel</span></i></span><span data-dcnode-id="8077" instrument_node="">, a company operating the tower.</span><sup class="reference" data-dcnode-id="8074" id="cite_ref-lab&amp;names_74-0"><a data-dcnode-id="8075" href="#cite_note-lab&amp;names-74"><span data-dcnode-id="8076" instrument_node="">[74]</span></a></sup><span data-dcnode-id="8073" instrument_node="">
</span></p><span data-dcnode-id="8071" instrument_node="">
</span><h3 data-dcnode-id="8068"><span class="mw-headline" data-dcnode-id="8069" id="Aesthetics"><span data-dcnode-id="8070" instrument_node="">Aesthetics</span></span></h3><span data-dcnode-id="8067" instrument_node="">
</span><p data-dcnode-id="8057"><span data-dcnode-id="8066" instrument_node="">The tower is painted in three shades: lighter at the top, getting progressively darker towards the bottom to complement the Parisian sky.</span><sup class="reference" data-dcnode-id="8063" id="cite_ref-paintingcolor_75-0"><a data-dcnode-id="8064" href="#cite_note-paintingcolor-75"><span data-dcnode-id="8065" instrument_node="">[75]</span></a></sup><span data-dcnode-id="8062" instrument_node=""> It was originally reddish brown; this changed in 1968 to a bronze colour known as "Eiffel Tower Brown".</span><sup class="reference" data-dcnode-id="8059" id="cite_ref-painting_76-0"><a data-dcnode-id="8060" href="#cite_note-painting-76"><span data-dcnode-id="8061" instrument_node="">[76]</span></a></sup><span data-dcnode-id="8058" instrument_node="">
</span></p><p data-dcnode-id="8051"><span data-dcnode-id="8056" instrument_node="">The only non-structural elements are the four decorative grill-work arches, added in Sauvestre's sketches, which served to make the tower look more substantial and to make a more impressive entrance to the exposition.</span><sup class="reference" data-dcnode-id="8053" id="cite_ref-77"><a data-dcnode-id="8054" href="#cite_note-77"><span data-dcnode-id="8055" instrument_node="">[77]</span></a></sup><span data-dcnode-id="8052" instrument_node="">
</span></p><p data-dcnode-id="8041"><span data-dcnode-id="8050" instrument_node="">A pop-culture movie cliché is that the view from a Parisian window always includes the tower.</span><sup class="reference" data-dcnode-id="8047" id="cite_ref-78"><a data-dcnode-id="8048" href="#cite_note-78"><span data-dcnode-id="8049" instrument_node="">[78]</span></a></sup><span data-dcnode-id="8046" instrument_node=""> In reality, since zoning restrictions limit the height of most buildings in Paris to seven storeys, only a small number of tall buildings have a clear view of the tower.</span><sup class="reference" data-dcnode-id="8043" id="cite_ref-79"><a data-dcnode-id="8044" href="#cite_note-79"><span data-dcnode-id="8045" instrument_node="">[79]</span></a></sup><span data-dcnode-id="8042" instrument_node="">
</span></p><span data-dcnode-id="8040" instrument_node="">
</span><h3 data-dcnode-id="8037"><span class="mw-headline" data-dcnode-id="8038" id="Maintenance"><span data-dcnode-id="8039" instrument_node="">Maintenance</span></span></h3><span data-dcnode-id="8036" instrument_node="">
</span><p data-dcnode-id="8021"><span data-dcnode-id="8035" instrument_node="">Maintenance of the tower includes applying 60&nbsp;tons of paint every seven years to prevent it from </span><a data-dcnode-id="8033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rust" title="Rust"><span data-dcnode-id="8034" instrument_node="">rusting</span></a><span data-dcnode-id="8032" instrument_node="">. The tower has been completely repainted at least 19 times since it was built. </span><a data-dcnode-id="8030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lead_paint" title="Lead paint"><span data-dcnode-id="8031" instrument_node="">Lead paint</span></a><span data-dcnode-id="8029" instrument_node=""> was still being used as recently as 2001 when the practice was stopped out of concern for the environment.</span><sup class="reference" data-dcnode-id="8026" id="cite_ref-allyouneed_58-1"><a data-dcnode-id="8027" href="#cite_note-allyouneed-58"><span data-dcnode-id="8028" instrument_node="">[58]</span></a></sup><sup class="reference" data-dcnode-id="8023" id="cite_ref-80"><a data-dcnode-id="8024" href="#cite_note-80"><span data-dcnode-id="8025" instrument_node="">[80]</span></a></sup><span data-dcnode-id="8022" instrument_node="">
</span></p><span data-dcnode-id="8020" instrument_node="">
</span><div class="thumb tnone" data-dcnode-id="8010" style="margin-left:auto;margin-right:auto;overflow:hidden;width:auto;max-width:2258px"><div class="thumbinner" data-dcnode-id="8011"><div class="noresize" data-dcnode-id="8017" style="overflow:auto"><a class="image" data-dcnode-id="8018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATour_Eiffel_360_Panorama.jpg" title="Panorama of Paris and its suburbs from the top of the Eiffel Tower"><img alt="Panorama of Paris from the Tour Eiffel" data-dcnode-id="8019" data-file-height="1400" data-file-width="10500" decoding="async" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Tour_Eiffel_360_Panorama.jpg/2250px-Tour_Eiffel_360_Panorama.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Tour_Eiffel_360_Panorama.jpg/3375px-Tour_Eiffel_360_Panorama.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Tour_Eiffel_360_Panorama.jpg/4500px-Tour_Eiffel_360_Panorama.jpg 2x" width="2250"></a></div><div class="thumbcaption" data-dcnode-id="8012"><div class="magnify" data-dcnode-id="8014"><a data-dcnode-id="8015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATour_Eiffel_360_Panorama.jpg" title="File:Tour Eiffel 360 Panorama.jpg"><span data-dcnode-id="8016" instrument_node=""> </span></a></div><span data-dcnode-id="8013" instrument_node="">Panorama of Paris and its suburbs from the top of the Eiffel Tower</span></div></div></div><span data-dcnode-id="8009" instrument_node="">
</span><h2 data-dcnode-id="8006"><span class="mw-headline" data-dcnode-id="8007" id="Tourism"><span data-dcnode-id="8008" instrument_node="">Tourism</span></span></h2><span data-dcnode-id="8005" instrument_node="">
</span><h3 data-dcnode-id="8002"><span class="mw-headline" data-dcnode-id="8003" id="Transport"><span data-dcnode-id="8004" instrument_node="">Transport</span></span></h3><span data-dcnode-id="8001" instrument_node="">
</span><p data-dcnode-id="7986"><span data-dcnode-id="8000" instrument_node="">The nearest </span><a data-dcnode-id="7998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_M%25C3%25A9tro" title="Paris Métro"><span data-dcnode-id="7999" instrument_node="">Paris Métro</span></a><span data-dcnode-id="7997" instrument_node=""> station is </span><a data-dcnode-id="7995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bir-Hakeim_%28Paris_M%25C3%25A9tro%29" title="Bir-Hakeim (Paris Métro)"><span data-dcnode-id="7996" instrument_node="">Bir-Hakeim</span></a><span data-dcnode-id="7994" instrument_node=""> and the nearest </span><a data-dcnode-id="7992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/R%25C3%25A9seau_Express_R%25C3%25A9gional" title="Réseau Express Régional"><span data-dcnode-id="7993" instrument_node="">RER</span></a><span data-dcnode-id="7991" instrument_node=""> station is Champ de Mars-Tour Eiffel.</span><sup class="reference" data-dcnode-id="7988" id="cite_ref-81"><a data-dcnode-id="7989" href="#cite_note-81"><span data-dcnode-id="7990" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7987" instrument_node=""> The tower itself is located at the intersection of the quai Branly and the Pont d'Iéna.
</span></p><span data-dcnode-id="7985" instrument_node="">
</span><h3 data-dcnode-id="7982"><span class="mw-headline" data-dcnode-id="7983" id="Popularity"><span data-dcnode-id="7984" instrument_node="">Popularity</span></span></h3><span data-dcnode-id="7981" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7972"><div class="thumbinner" data-dcnode-id="7973" style="width:222px;"><a class="image" data-dcnode-id="7979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEiffel_Tower_Visitors.svg"><img alt="" class="thumbimage" data-dcnode-id="7980" data-file-height="345" data-file-width="772" decoding="async" height="98" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Eiffel_Tower_Visitors.svg/220px-Eiffel_Tower_Visitors.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Eiffel_Tower_Visitors.svg/330px-Eiffel_Tower_Visitors.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Eiffel_Tower_Visitors.svg/440px-Eiffel_Tower_Visitors.svg.png 2x" width="220"></a><span data-dcnode-id="7978" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7974"><div class="magnify" data-dcnode-id="7976"><a class="internal" data-dcnode-id="7977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEiffel_Tower_Visitors.svg" title="Enlarge"></a></div><span data-dcnode-id="7975" instrument_node="">Number of visitors per year between 1889 and 2004</span></div></div></div><span data-dcnode-id="7971" instrument_node="">
</span><p data-dcnode-id="7953"><span data-dcnode-id="7970" instrument_node="">More than 250&nbsp;million people have visited the tower since it was completed in 1889.</span><sup class="reference" data-dcnode-id="7967" id="cite_ref-Key_figures_3-2"><a data-dcnode-id="7968" href="#cite_note-Key_figures-3"><span data-dcnode-id="7969" instrument_node="">[3]</span></a></sup><span data-dcnode-id="7966" instrument_node=""> In 2015, there were 6.91&nbsp;million visitors.</span><sup class="reference" data-dcnode-id="7963" id="cite_ref-82"><a data-dcnode-id="7964" href="#cite_note-82"><span data-dcnode-id="7965" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7962" instrument_node=""> The tower is the most-visited paid monument in the world.</span><sup class="reference" data-dcnode-id="7959" id="cite_ref-83"><a data-dcnode-id="7960" href="#cite_note-83"><span data-dcnode-id="7961" instrument_node="">[83]</span></a></sup><span data-dcnode-id="7958" instrument_node=""> An average of 25,000 people ascend the tower every day which can result in long queues.</span><sup class="reference" data-dcnode-id="7955" id="cite_ref-84"><a data-dcnode-id="7956" href="#cite_note-84"><span data-dcnode-id="7957" instrument_node="">[84]</span></a></sup><span data-dcnode-id="7954" instrument_node="">
</span></p><span data-dcnode-id="7952" instrument_node="">
</span><h3 data-dcnode-id="7949"><span class="mw-headline" data-dcnode-id="7950" id="Restaurants"><span data-dcnode-id="7951" instrument_node="">Restaurants</span></span></h3><span data-dcnode-id="7948" instrument_node="">
</span><p data-dcnode-id="7911"><span data-dcnode-id="7947" instrument_node="">The tower has two restaurants: </span><span data-dcnode-id="7944" title="French-language text"><i data-dcnode-id="7945" lang="fr"><span data-dcnode-id="7946" instrument_node="">Le 58 Tour Eiffel</span></i></span><span data-dcnode-id="7943" instrument_node=""> on the first level, and </span><span data-dcnode-id="7939" title="French-language text"><i data-dcnode-id="7940" lang="fr"><a data-dcnode-id="7941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Jules_Verne" title="Le Jules Verne"><span data-dcnode-id="7942" instrument_node="">Le Jules Verne</span></a></i></span><span data-dcnode-id="7938" instrument_node="">, a </span><a data-dcnode-id="7936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gourmet" title="Gourmet"><span data-dcnode-id="7937" instrument_node="">gourmet</span></a><span data-dcnode-id="7935" instrument_node=""> restaurant with its own lift on the second level. This restaurant has one star in the </span><a data-dcnode-id="7933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michelin_Guide" title="Michelin Guide"><span data-dcnode-id="7934" instrument_node="">Michelin Red Guide</span></a><span data-dcnode-id="7932" instrument_node="">. It was run by the multi-</span><a class="mw-redirect" data-dcnode-id="7930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michelin_star" title="Michelin star"><span data-dcnode-id="7931" instrument_node="">Michelin star</span></a><span data-dcnode-id="7929" instrument_node=""> chef </span><a data-dcnode-id="7927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alain_Ducasse" title="Alain Ducasse"><span data-dcnode-id="7928" instrument_node="">Alain Ducasse</span></a><span data-dcnode-id="7926" instrument_node=""> from 2007 to 2017.</span><sup class="reference" data-dcnode-id="7923" id="cite_ref-85"><a data-dcnode-id="7924" href="#cite_note-85"><span data-dcnode-id="7925" instrument_node="">[85]</span></a></sup><span data-dcnode-id="7922" instrument_node=""> Starting May 2019, it will be managed by three-star chef </span><a data-dcnode-id="7920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fr%25C3%25A9d%25C3%25A9ric_Anton" title="Frédéric Anton"><span data-dcnode-id="7921" instrument_node="">Frédéric Anton</span></a><span data-dcnode-id="7919" instrument_node="">.</span><sup class="reference" data-dcnode-id="7916" id="cite_ref-ParisDigest_86-0"><a data-dcnode-id="7917" href="#cite_note-ParisDigest-86"><span data-dcnode-id="7918" instrument_node="">[86]</span></a></sup><span data-dcnode-id="7915" instrument_node=""> It owes its name to the famous science-fiction writer </span><a data-dcnode-id="7913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jules_Verne" title="Jules Verne"><span data-dcnode-id="7914" instrument_node="">Jules Verne</span></a><span data-dcnode-id="7912" instrument_node="">. Additionally, there is a champagne bar at the top of the Eiffel Tower.
</span></p><p data-dcnode-id="7901"><span data-dcnode-id="7910" instrument_node="">From 1937 until 1981, there was a restaurant near the top of the tower. It was removed due to structural considerations; engineers had determined it was too heavy and was causing the tower to sag.</span><sup class="reference" data-dcnode-id="7907" id="cite_ref-87"><a data-dcnode-id="7908" href="#cite_note-87"><span data-dcnode-id="7909" instrument_node="">[87]</span></a></sup><span data-dcnode-id="7906" instrument_node=""> This restaurant was sold to an American restaurateur and transported to New York and then New Orleans. It was rebuilt on the edge of New Orleans' Garden District as a restaurant and later event hall.</span><sup class="reference" data-dcnode-id="7903" id="cite_ref-88"><a data-dcnode-id="7904" href="#cite_note-88"><span data-dcnode-id="7905" instrument_node="">[88]</span></a></sup><span data-dcnode-id="7902" instrument_node="">
</span></p><span data-dcnode-id="7900" instrument_node="">
</span><h2 data-dcnode-id="7897"><span class="mw-headline" data-dcnode-id="7898" id="Replicas"><span data-dcnode-id="7899" instrument_node="">Replicas</span></span></h2><span data-dcnode-id="7896" instrument_node="">
</span><link data-dcnode-id="7895" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7891" role="note"><span data-dcnode-id="7894" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="7892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Eiffel_Tower_replicas" title="List of Eiffel Tower replicas"><span data-dcnode-id="7893" instrument_node="">List of Eiffel Tower replicas</span></a></div><span data-dcnode-id="7890" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7878"><div class="thumbinner" data-dcnode-id="7879" style="width:222px;"><a class="image" data-dcnode-id="7888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AParis_hotel_%28Las_Vegas%291.JPG"><img alt="" class="thumbimage" data-dcnode-id="7889" data-file-height="3000" data-file-width="4000" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/31/Paris_hotel_%2528Las_Vegas%25291.JPG/220px-Paris_hotel_%2528Las_Vegas%25291.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/31/Paris_hotel_%28Las_Vegas%291.JPG/330px-Paris_hotel_%28Las_Vegas%291.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/31/Paris_hotel_%28Las_Vegas%291.JPG/440px-Paris_hotel_%28Las_Vegas%291.JPG 2x" width="220"></a><span data-dcnode-id="7887" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7880"><div class="magnify" data-dcnode-id="7885"><a class="internal" data-dcnode-id="7886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AParis_hotel_%28Las_Vegas%291.JPG" title="Enlarge"></a></div><span data-dcnode-id="7884" instrument_node="">Replica at the </span><a data-dcnode-id="7882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Las_Vegas" title="Paris Las Vegas"><span data-dcnode-id="7883" instrument_node="">Paris Las Vegas</span></a><span data-dcnode-id="7881" instrument_node=""> Hotel, Nevada, United States.</span></div></div></div><span data-dcnode-id="7877" instrument_node="">
</span><p data-dcnode-id="7861"><span data-dcnode-id="7876" instrument_node="">As one of the most iconic landmarks in the world, the Eiffel Tower has been the inspiration for the creation of many replicas and similar towers. An early example is </span><a data-dcnode-id="7874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blackpool_Tower" title="Blackpool Tower"><span data-dcnode-id="7875" instrument_node="">Blackpool Tower</span></a><span data-dcnode-id="7873" instrument_node=""> in England. The mayor of Blackpool, Sir John Bickerstaffe, was so impressed on seeing the Eiffel Tower at the 1889 exposition that he commissioned a similar tower to be built in his town. It opened in 1894 and is 158.1&nbsp;m (518&nbsp;ft) tall.</span><sup class="reference" data-dcnode-id="7870" id="cite_ref-89"><a data-dcnode-id="7871" href="#cite_note-89"><span data-dcnode-id="7872" instrument_node="">[89]</span></a></sup><span data-dcnode-id="7869" instrument_node=""> </span><a data-dcnode-id="7867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tokyo_Tower" title="Tokyo Tower"><span data-dcnode-id="7868" instrument_node="">Tokyo Tower</span></a><span data-dcnode-id="7866" instrument_node=""> in Japan, built as a communications tower in 1958, was also inspired by the Eiffel Tower.</span><sup class="reference" data-dcnode-id="7863" id="cite_ref-90"><a data-dcnode-id="7864" href="#cite_note-90"><span data-dcnode-id="7865" instrument_node="">[90]</span></a></sup><span data-dcnode-id="7862" instrument_node="">
</span></p><p data-dcnode-id="7837"><span data-dcnode-id="7860" instrument_node="">There are various scale models of the tower in the United States, including a half-scale version at the </span><a data-dcnode-id="7858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Las_Vegas" title="Paris Las Vegas"><span data-dcnode-id="7859" instrument_node="">Paris Las Vegas</span></a><span data-dcnode-id="7857" instrument_node="">, Nevada, one in Paris, Texas built in 1993, and two 1:3 scale models at </span><a data-dcnode-id="7855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kings_Island" title="Kings Island"><span data-dcnode-id="7856" instrument_node="">Kings Island</span></a><span data-dcnode-id="7854" instrument_node="">, located in </span><a data-dcnode-id="7852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mason%2C_Ohio" title="Mason, Ohio"><span data-dcnode-id="7853" instrument_node="">Mason, Ohio</span></a><span data-dcnode-id="7851" instrument_node="">, and </span><a data-dcnode-id="7849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kings_Dominion" title="Kings Dominion"><span data-dcnode-id="7850" instrument_node="">Kings Dominion</span></a><span data-dcnode-id="7848" instrument_node="">, </span><a data-dcnode-id="7846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virginia" title="Virginia"><span data-dcnode-id="7847" instrument_node="">Virginia</span></a><span data-dcnode-id="7845" instrument_node="">, amusement parks opened in 1972 and 1975 respectively. Two 1:3 scale models can be found in China, one in </span><a class="mw-redirect" data-dcnode-id="7843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Durango%2C_Durango" title="Durango, Durango"><span data-dcnode-id="7844" instrument_node="">Durango, Mexico</span></a><span data-dcnode-id="7842" instrument_node=""> that was donated by the local French community, and several across Europe.</span><sup class="reference" data-dcnode-id="7839" id="cite_ref-91"><a data-dcnode-id="7840" href="#cite_note-91"><span data-dcnode-id="7841" instrument_node="">[91]</span></a></sup><span data-dcnode-id="7838" instrument_node="">
</span></p><p data-dcnode-id="7825"><span data-dcnode-id="7836" instrument_node="">In 2011, the TV show </span><i data-dcnode-id="7834"><span data-dcnode-id="7835" instrument_node="">Pricing the Priceless</span></i><span data-dcnode-id="7833" instrument_node=""> on the </span><a class="mw-redirect" data-dcnode-id="7831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Geographic_Channel" title="National Geographic Channel"><span data-dcnode-id="7832" instrument_node="">National Geographic Channel</span></a><span data-dcnode-id="7830" instrument_node=""> speculated that a full-size replica of the tower would cost approximately US$480&nbsp;million to build.</span><sup class="reference" data-dcnode-id="7827" id="cite_ref-92"><a data-dcnode-id="7828" href="#cite_note-92"><span data-dcnode-id="7829" instrument_node="">[92]</span></a></sup><span data-dcnode-id="7826" instrument_node=""> This would be more than ten times the cost of the original (nearly 8 million in 1890 Francs; ~US$40&nbsp;million in 2018 dollars).
</span></p><span data-dcnode-id="7824" instrument_node="">
</span><h2 data-dcnode-id="7821"><span class="mw-headline" data-dcnode-id="7822" id="Communications"><span data-dcnode-id="7823" instrument_node="">Communications</span></span></h2><span data-dcnode-id="7820" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7811"><div class="thumbinner" data-dcnode-id="7812" style="width:172px;"><a class="image" data-dcnode-id="7818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATour_Eiffel_le_sommet_08-2015_%28cropped%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="7819" data-file-height="5080" data-file-width="3380" decoding="async" height="256" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/11/Tour_Eiffel_le_sommet_08-2015_%2528cropped%2529.jpg/170px-Tour_Eiffel_le_sommet_08-2015_%2528cropped%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/11/Tour_Eiffel_le_sommet_08-2015_%28cropped%29.jpg/255px-Tour_Eiffel_le_sommet_08-2015_%28cropped%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/11/Tour_Eiffel_le_sommet_08-2015_%28cropped%29.jpg/340px-Tour_Eiffel_le_sommet_08-2015_%28cropped%29.jpg 2x" width="170"></a><span data-dcnode-id="7817" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7813"><div class="magnify" data-dcnode-id="7815"><a class="internal" data-dcnode-id="7816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATour_Eiffel_le_sommet_08-2015_%28cropped%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="7814" instrument_node="">Top of the Eiffel Tower</span></div></div></div><span data-dcnode-id="7810" instrument_node="">
</span><p data-dcnode-id="7786"><span data-dcnode-id="7809" instrument_node="">The tower has been used for making radio transmissions since the beginning of the 20th century. Until the 1950s, sets of aerial wires ran from the </span><a data-dcnode-id="7807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cupola" title="Cupola"><span data-dcnode-id="7808" instrument_node="">cupola</span></a><span data-dcnode-id="7806" instrument_node=""> to anchors on the </span><a data-dcnode-id="7804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avenue_de_Suffren" title="Avenue de Suffren"><span data-dcnode-id="7805" instrument_node="">Avenue de Suffren</span></a><span data-dcnode-id="7803" instrument_node=""> and Champ de Mars. These were connected to </span><a data-dcnode-id="7801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Longwave" title="Longwave"><span data-dcnode-id="7802" instrument_node="">longwave</span></a><span data-dcnode-id="7800" instrument_node=""> transmitters in small bunkers. In 1909, a permanent underground radio centre was built near the south pillar, which still exists today. On 20 November 1913, the </span><a data-dcnode-id="7798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Observatory" title="Paris Observatory"><span data-dcnode-id="7799" instrument_node="">Paris Observatory</span></a><span data-dcnode-id="7797" instrument_node="">, using the Eiffel Tower as an aerial, exchanged wireless signals with the </span><a data-dcnode-id="7795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Naval_Observatory" title="United States Naval Observatory"><span data-dcnode-id="7796" instrument_node="">United States Naval Observatory</span></a><span data-dcnode-id="7794" instrument_node="">, which used an aerial in </span><a class="mw-redirect" data-dcnode-id="7792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arlington%2C_Virginia" title="Arlington, Virginia"><span data-dcnode-id="7793" instrument_node="">Arlington</span></a><span data-dcnode-id="7791" instrument_node="">, Virginia. The object of the transmissions was to measure the difference in longitude between Paris and Washington, D.C.</span><sup class="reference" data-dcnode-id="7788" id="cite_ref-93"><a data-dcnode-id="7789" href="#cite_note-93"><span data-dcnode-id="7790" instrument_node="">[93]</span></a></sup><span data-dcnode-id="7787" instrument_node=""> Today, radio and digital television signals are transmitted from the Eiffel Tower.
</span></p><span data-dcnode-id="7785" instrument_node="">
