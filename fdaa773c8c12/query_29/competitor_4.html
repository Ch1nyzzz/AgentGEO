</span><h5 class="postDate" data-dcnode-id="2431"><abbr class="published" data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">12</span></abbr></h5><span data-dcnode-id="2430" instrument_node=""> </span><div class="postContent" data-dcnode-id="2367"><span data-dcnode-id="2429" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="2426"><a data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D152" rel="bookmark"><span data-dcnode-id="2428" instrument_node="">It Repels Potential Reverts</span></a></h3><span data-dcnode-id="2425" instrument_node="">
</span><span data-dcnode-id="2423" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2369"><span data-dcnode-id="2422" instrument_node="">
</span><p data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Many potential reverts to Shia Islam are repelled by the blood shedding rituals. The following statements have been given by a couple of reverts to Shi’ism to show how repulsive these rituals are to potential reverts:</span></p><span data-dcnode-id="2419" instrument_node="">
</span><p data-dcnode-id="2414"><span data-dcnode-id="2418" instrument_node="">Sister Jennah of the </span><a data-dcnode-id="2416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.revertmuslims.com/" title="Revert Muslims Association"><span data-dcnode-id="2417" instrument_node="">Revert Muslims&nbsp;Association</span></a><span data-dcnode-id="2415" instrument_node="">:</span></p><span data-dcnode-id="2413" instrument_node="">
</span><blockquote data-dcnode-id="2407"><p data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">In fact a good majority of people are repelled by the extreme act of flogging. At the Revert Muslims Association we receive emails from new Muslims looking for support and resources. Many have reported their concern when they come to us, after viewing, countless images over the Net of barbaric rituals had by some Shi’a Muslims. They are confused and turned off and immediately they worry that Shi’a Islam carries a darker, violent side to it that they had not come across before.</span></p><span data-dcnode-id="2410" instrument_node="">
</span><p data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">I do not believe the majority are encouraged to read about this practice instead many are put off by it and do not further investigate the truth that is Shi’a Islam. How often do Sunni websites point to the barbaric images, in particular of a mother cutting the head of her infant son, and then accuse us of being insane?</span></p></blockquote><span data-dcnode-id="2406" instrument_node="">
</span><blockquote data-dcnode-id="2403"><p data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">The negative image that flogging gives far out-ways the positives that some claim they feel after taking part in this ritual act.</span></p></blockquote><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2389"><a data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shiachat.com/forum/index.php%3F/topic/234957429-self-mutilationblood-letting/page__view__findpost__p__1824688" target="_blank"><span data-dcnode-id="2401" instrument_node="">Source.</span><br data-dcnode-id="2400"><span data-dcnode-id="2399" instrument_node="">
</span></a><span data-dcnode-id="2397" instrument_node=""> An </span><a data-dcnode-id="2395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.revertmuslims.com/flogging.html" target="_blank"><span data-dcnode-id="2396" instrument_node="">article</span></a><span data-dcnode-id="2394" instrument_node=""> written by the sister on this issue.</span><br data-dcnode-id="2393"><span data-dcnode-id="2392" instrument_node="">
</span><br data-dcnode-id="2391"><span data-dcnode-id="2390" instrument_node="">
Another Shi’i revert:</span></p><span data-dcnode-id="2388" instrument_node="">
</span><blockquote data-dcnode-id="2379"><p data-dcnode-id="2383"><span data-dcnode-id="2387" instrument_node="">I will tell you why I am against it (although I don’t disrespect people), BECAUSE IT PREVENTED ME FROM BECOMING SHIA FOR </span><strong data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">MANY MANY YEARS</span></strong><span data-dcnode-id="2384" instrument_node="">.</span></p><span data-dcnode-id="2382" instrument_node="">
</span><p data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">It was only until I found out that some of the greatest scholars of Shia Islam have condemed it.</span></p></blockquote><span data-dcnode-id="2378" instrument_node="">
</span><p data-dcnode-id="2374"><span data-dcnode-id="2377" instrument_node=""> </span><a data-dcnode-id="2375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shiachat.com/forum/index.php%3F/topic/234982716-closedreviewlist-of-scholars-and-their-opinion-on-tatbeer/page__view__findpost__p__2132439" target="_blank"><span data-dcnode-id="2376" instrument_node="">Source.</span></a></p><span data-dcnode-id="2373" instrument_node="">
</span><p data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Those who claim that the rituals are acts of love must understand that they do not have a monopoly over the love of Ahlulbayt (a). By insisting upon performing these acts and&nbsp;insisting&nbsp;that they are a part of Shia Islam they driving people away from the school of the Ahlulbayt (a).</span></p><span data-dcnode-id="2370" instrument_node="">
</span></div><span data-dcnode-id="2368" instrument_node="">
</span></div><span data-dcnode-id="2366" instrument_node="">
</span><div class="postMeta" data-dcnode-id="2358"><span data-dcnode-id="2365" instrument_node="">
</span><div class="comments" data-dcnode-id="2360"><span data-dcnode-id="2364" instrument_node="">
</span><a data-dcnode-id="2362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D152%23comments"><span data-dcnode-id="2363" instrument_node="">1 comment</span></a><span data-dcnode-id="2361" instrument_node=""> </span></div><span data-dcnode-id="2359" instrument_node="">
</span></div><span data-dcnode-id="2357" instrument_node="">
</span></div><span data-dcnode-id="2355" instrument_node="">
</span><div class="post hentry" data-dcnode-id="2319"><span data-dcnode-id="2354" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="2351"><abbr class="published" data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">13</span></abbr></h5><span data-dcnode-id="2350" instrument_node=""> </span><div class="postContent" data-dcnode-id="2330"><span data-dcnode-id="2349" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="2346"><a data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D385" rel="bookmark"><span data-dcnode-id="2348" instrument_node="">The Fallacious Curiosity Argument</span></a></h3><span data-dcnode-id="2345" instrument_node="">
</span><span data-dcnode-id="2343" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2332"><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Some supporters of these acts claim that their shock value actually encourages people to investigate the religion. They argue that when non-Muslims and non-Shias view these acts, it raises curiosity within them which then leads them to studying Shia Islam. This line of argumentation cannot be used because it was not in the practice of Ahlulbayt (a) to use such shock tactics to draw people towards the religion.</span></p><span data-dcnode-id="2339" instrument_node="">
</span><p data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">After viewing blood shedding, only a very small minority of people will actually be prompted to read about Shia Islam with a positive frame of mind rather than being repulsed. Repulsive techniques were never used by the Prophets (s) and Imams (a) to invite people to the religion of God. Instead of using such futile and damaging means, we must put effort into inviting people towards the religion using the most appealing and effective means. In a materialistic and increasingly secular world, few people set out to study a religion and we cannot expect them to do so after viewing scenes that repulse them. The misdeeds and bad behaviour of some religious people has been a major factor in repelling people away from religion altogether, and we should not be under the illusion that another repulsive act will draw them towards it.</span></p><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">A great number of reverts to Shi’ism disapprove of these rituals and state that they give our religion a bad image. The only sorts of people who may be drawn towards Shia Islam because of these rituals would be a minority of people who are attracted to strange and odd practices. Amongst the general human population there are some odd people who may be attracted to blood shedding rituals.</span></p><span data-dcnode-id="2333" instrument_node="">
</span></div><span data-dcnode-id="2331" instrument_node="">
</span></div><span data-dcnode-id="2329" instrument_node="">
</span><div class="postMeta" data-dcnode-id="2321"><span data-dcnode-id="2328" instrument_node="">
</span><div class="comments" data-dcnode-id="2323"><span data-dcnode-id="2327" instrument_node="">
</span><a data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D385%23respond"><span data-dcnode-id="2326" instrument_node="">leave a comment</span></a><span data-dcnode-id="2324" instrument_node=""> </span></div><span data-dcnode-id="2322" instrument_node="">
</span></div><span data-dcnode-id="2320" instrument_node="">
</span></div><span data-dcnode-id="2318" instrument_node="">
</span><div class="post hentry" data-dcnode-id="2256"><span data-dcnode-id="2317" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="2314"><abbr class="published" data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">14</span></abbr></h5><span data-dcnode-id="2313" instrument_node=""> </span><div class="postContent" data-dcnode-id="2267"><span data-dcnode-id="2312" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="2309"><a data-dcnode-id="2310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D387" rel="bookmark"><span data-dcnode-id="2311" instrument_node="">Don’t Other Acts of Worship Also Give Islam a Bad Image?</span></a></h3><span data-dcnode-id="2308" instrument_node="">
</span><span data-dcnode-id="2306" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2269"><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Another argument that is often used by promoters of blood flagellation is the contention that other established acts of worship also give Islam a bad image, therefore there is no need to refrain from publicly performing acts such as Tatbir (which also portray a negative image). Established Islamic actions such as Salaat, Tawaf, and the various forms of Hudood (e.g. flogging the fornicator) are often given as examples of actions that are the disliked by non-Muslims.</span></p><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">This argument is flawed and is considered a false analogy for the following reasons:</span></p><span data-dcnode-id="2299" instrument_node="">
</span><p data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">1, The established Islamic acts that have been mentioned are all from the Qur’an and the Sunnah. If it is indeed true that they give Islam a bad image, then it does not fully justify their non-performance because they are actual religious obligations that cannot be neglected. On the contrary, blood rituals are not from the Quran or the Sunnah.</span></p><span data-dcnode-id="2296" instrument_node="">
</span><p data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">2, The argument ignores all the ahadith which tell us to give the religion and ourselves a good image.</span></p><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">3, Blood flagellation cannot be compared to these other actions in terms of how much it disturbs people; it is a lot more disturbing.</span></p><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">4, Islam is the religion of the Fitra (innate human nature) therefore the human heart is inclined towards the Islamic practices. So for example the human heart finds peace in the performance of prayers and tawaf. If there are Islamic actions that are disliked by some people then it is normally due to a lack of proper understanding of what they entail and what their benefits are. If people saw these Islamic actions with the correct perspective then they would understand that the laws are actually very good and they are not detrimental. For example if a sincere person were to know the reasons for the hudood laws then they would come to accept their benefits and would no longer oppose them.</span></p><span data-dcnode-id="2287" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">5, When Islam was revealed to the Arabs, it was revealed in stages. Certain things were not revealed initially (for example the prohibition of alcohol) thus showing that Islam does take into consideration the fact that a wise and pragmatic approach is needed when introducing a religion to a people. Therefore we must also deal with others in a wise manner and not disturb them with public displays of blood shedding. </span></p><span data-dcnode-id="2284" instrument_node="">
</span><p data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Imam Al-Sadiq (a) speaks about having a wise and diplomatic approach when dealing with others; from Shaykh Sadooq’s book on Aqeedah:</span></p><span data-dcnode-id="2281" instrument_node="">
</span><blockquote data-dcnode-id="2278"><p data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Imam Ja’far as-Sadiq was told: 0 son of the Messenger of Allah, verily we see in the mosque one who openly abuses your enemies, calling out their names. And he said: May Allah curse him! Why does he refer to us? He, Who is Exalted above all, says: “Revile not those who invoke (deities) other than Allah, lest wrongfully they revile Allah through ignorance” [6, 108] And Imam Ja’far in explaining this verse has said: So do not revile them, lest they revile your ‘Ali. And he also said: He who reviles the friend (wali) of Allah (i.e. All) has reviled Allah. And the Prophet said: He who reviles thee, 0 ‘Ali, has verily reviled me; and he, who reviles me, has verily reviled Allah.</span></p></blockquote><span data-dcnode-id="2277" instrument_node="">
</span><blockquote data-dcnode-id="2274"><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">Imam Ja’far said: Verily, I hear a man abusing me in the mosque; and I hide myself behind a pillar so that he may not see me. And he (Imam Ja’far) said: Mix with the people (enemies) outwardly, but oppose them inwardly, so long as the Amirate (imratun) is a matter of opinion. And he also said: Verily diplomacy (arri’a’) with a true believer is a form of shirk (polytheism); but with a hypocrite (munafiq) in his own house, it is worship. And he also said: He who prays with them (hypocrites) standing in the first row, it is as though he prayed with the Prophet in the first row. And he also said: Visit their sick and attend their funerals and pray in their mosques. And he also said: (You should) become an ornament for us, and not a disgrace. And he said: May Allah have mercy on a person who inculcates friendship towards us among men, and does not provoke ill-will among them.</span></p></blockquote><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">6, The argument is a bit dishonest because many of these Islamic actions are actually not disliked by the many good people. There is nothing unattractive with acts such as salaat, tawaf and the recitation of the Qur’an.</span></p><span data-dcnode-id="2270" instrument_node="">
</span></div><span data-dcnode-id="2268" instrument_node="">
</span></div><span data-dcnode-id="2266" instrument_node="">
</span><div class="postMeta" data-dcnode-id="2258"><span data-dcnode-id="2265" instrument_node="">
</span><div class="comments" data-dcnode-id="2260"><span data-dcnode-id="2264" instrument_node="">
</span><a data-dcnode-id="2262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D387%23comments"><span data-dcnode-id="2263" instrument_node="">3 comments</span></a><span data-dcnode-id="2261" instrument_node=""> </span></div><span data-dcnode-id="2259" instrument_node="">
</span></div><span data-dcnode-id="2257" instrument_node="">
</span></div><span data-dcnode-id="2255" instrument_node="">
</span><div class="post hentry" data-dcnode-id="2181"><span data-dcnode-id="2254" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="2251"><abbr class="published" data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">15</span></abbr></h5><span data-dcnode-id="2250" instrument_node=""> </span><div class="postContent" data-dcnode-id="2192"><span data-dcnode-id="2249" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="2246"><a data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D396" rel="bookmark"><span data-dcnode-id="2248" instrument_node="">Double Standards</span></a></h3><span data-dcnode-id="2245" instrument_node="">
</span><span data-dcnode-id="2243" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2194"><span data-dcnode-id="2242" instrument_node="">
</span><p data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Some people find it quite difficult to admit the fact that blood flagellation is a source of mockery and revulsion. One of the best ways to make a promoter of blood shedding admit this very fact, is by pointing out their double standards with respect to other non-Islamic actions that carry a bad image. You will often find supporters of blood flagellation mocking and ridiculing the actions of other religious people. Criticizing them for giving religion a bad name whilst being blind to the negative image inflicted by blood rituals.</span></p><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2238" instrument_node="">Take the example of the Sufi ritual being demonstrated in the video below. You will find that advocates of blood shedding will be quick to mock these people whilst not accepting the clear fact that the blood shedding rituals are a lot more repulsive and disturbing than what these Sufis are doing.</span><br data-dcnode-id="2237"><span data-dcnode-id="2236" instrument_node="">
</span></p><span data-dcnode-id="2233" instrument_node="">

</span><h3 class="entry-title" data-dcnode-id="2171"><a data-dcnode-id="2172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D38" rel="bookmark"><span data-dcnode-id="2173" instrument_node="">A Refutation of the Supposed Evidence</span></a></h3><span data-dcnode-id="2170" instrument_node="">
</span><span data-dcnode-id="2168" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2150"><span data-dcnode-id="2167" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Promoters of blood flagellation bring forward certain narrations from Islamic sources to prove that their practices do indeed have an Islamic basis. Three narratives are usually used by them: </span></p><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2155"><span data-dcnode-id="2163" instrument_node="">1, The story of Uwais al-Qarni (r) breaking all his teeth.</span><br data-dcnode-id="2162"><span data-dcnode-id="2161" instrument_node="">
2, The claim that Lady Zainab (a) made her head bleed.</span><br data-dcnode-id="2160"><span data-dcnode-id="2159" instrument_node="">
3, The words of Imam Mahdi (a) in Ziarat Nahiyah: </span><em data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">“I will weep blood in place of tears”</span></em><span data-dcnode-id="2156" instrument_node="">.</span></p><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">In the next three sections, each of these three narratives will be analyzed and it will be shown that they are either not authentic or that they cannot be used as proofs to justify blood shedding rituals.</span></p><span data-dcnode-id="2151" instrument_node="">
</span></div><span data-dcnode-id="2149" instrument_node="">
</span></div><span data-dcnode-id="2147" instrument_node="">
</span><div class="postMeta" data-dcnode-id="2139"><span data-dcnode-id="2146" instrument_node="">
</span><div class="comments" data-dcnode-id="2141"><span data-dcnode-id="2145" instrument_node="">
</span><a data-dcnode-id="2143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D38%23comments"><span data-dcnode-id="2144" instrument_node="">1 comment</span></a><span data-dcnode-id="2142" instrument_node=""> </span></div><span data-dcnode-id="2140" instrument_node="">

</span><div class="post hentry" data-dcnode-id="1925"><span data-dcnode-id="2135" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="2132"><abbr class="published" data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">17</span></abbr></h5><span data-dcnode-id="2131" instrument_node=""> </span><div class="postContent" data-dcnode-id="1936"><span data-dcnode-id="2130" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="2127"><a data-dcnode-id="2128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D696" rel="bookmark"><span data-dcnode-id="2129" instrument_node="">Owais Al-Qarni (r) Breaking His Teeth</span></a></h3><span data-dcnode-id="2126" instrument_node="">
</span><span data-dcnode-id="2124" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1938"><span data-dcnode-id="2123" instrument_node="">
</span><p data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Owais Al-Qarni (r) was a Muslim who lived during the life of Prophet Muhammad (s) and died fighting alongside Imam Ali (a) in the battle of Siffin. It is believed that that he accepted the religion of Islam during the life of the Prophet (s), despite never having the opportunity to meet him (s), due to the fact that he lived in Yemen, far away from Madinah. He is highly respected for this and for being a loyal companion of Imam Ali (a) during the last few years of his life.</span></p><span data-dcnode-id="2120" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2119" instrument_node="">Many promoters of extreme self-flagellation narrate that when Uwais (r) heard the news that the Prophet (s) had lost some teeth in the battle of Uhud; he picked up a rock and broke all his teeth out of love for the Prophet (s). He was in Yemen when this occurred whilst Uhud is near the city of Madinah. </span><a data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tatbir.org/wp-content/uploads/2011/07/hub_uwais.jpg"><span data-dcnode-id="2118" instrument_node="">An example from blood shedding promotional material.</span></a></p><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">They narrate this incident from two books written by Sunni authors.  The first is ‘Seerat  al-Halabiyya’ by Imam al-Halabi. The book was written about a thousand years after the event is supposed to have occurred. The second is ‘Tadhkirat al-Awliya’ by the Sufi poet Farid al-Deen Attar (d.616-627H). We do not know of any Shia books at all that report this event. It is interesting to note that promoters of blood shedding cite the two Sunni sources in an attempt to convince Shias of their claim.</span></p><span data-dcnode-id="2112" instrument_node="">
</span><p data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">In regards to this incident we contend that: 1, It is almost certainly not authentic. 2, The two sources that it has been quoted from have been misrepresented. 3, Even if we imagined the event to be authentic, it cannot be used as a justification for extreme self-flagellation. The following is a list of reasons to justify these assertions:</span></p><span data-dcnode-id="2109" instrument_node="">
</span><p data-dcnode-id="2106"><strong data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">1, The Prophet (s) probably never broke any teeth.</span></strong></p><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Some Shia sources narrate that the Prophet’s (s) teeth never broke. The following is a narration from Imam al-Baqir (a) with a reliable chain of narrators:</span></p><span data-dcnode-id="2102" instrument_node="">
</span><blockquote data-dcnode-id="2097"><p data-dcnode-id="2098"><span data-dcnode-id="2101" instrument_node="">So we said to him (Imam al-Baqir (a)), it has been narrated to us that he (the Prophet (s)) broke his upper interior teeth? So he (Imam al Baqir (a)) said: </span><em data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">“No, by Allah, Allah always protected him, rather it was a wound on his face.”</span></em></p></blockquote><span data-dcnode-id="2096" instrument_node="">
</span><p data-dcnode-id="2093"><span class="reference" data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Shaykh al-Sadooq, Ma`ani al-Akhbar, Baab Nawaadir al-Ma`ani, page. 406, hadith no. 80</span></span></p><span data-dcnode-id="2092" instrument_node="">
</span><p data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">The following has been narrated by the renowned Shaykh Fadhl ibn Hassan al-Tabarsi:</span></p><span data-dcnode-id="2089" instrument_node="">
</span><blockquote data-dcnode-id="2086"><p data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Aban ibn `Uthman said: “This was told to me on his authority by as-Sabbah ibn Suyyabah. I asked him, “Were his upper interior teeth broken, as these people claim?’ He replied: `No, by Allah, Allah always protected him from all disfigurement. It was rather that he was wounded in the face.’ I asked: `What about the cave on Mount Uhud to which they claim that the Apostle of Allah fled?’ He answered: `By Allah, he did not move from his spot.’”</span></p></blockquote><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2082"><a class="source" data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.al-islam.org/beacons/6.htm"><span data-dcnode-id="2084" instrument_node="">Source.</span></a></p><span data-dcnode-id="2081" instrument_node="">
</span><p data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">What has been said in those narrations seems quite probable since the history books have generally not attributed the Prophet (s) with missing teeth. The people of his time also did not identify him (s) in that way. The narration says that Allah protected him (s) from all disfigurement and this seems quite reasonable because it would help him with his duty of propagating the message of Islam. Missing teeth would likely affect the recitation of the Qur’an and this was one of his primary roles.</span></p><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2075"><strong data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">2, The opinion of Shia scholars on the authenticity of this incident.</span></strong></p><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">The following question was sent to the offices of some of the well known Shia scholars:</span></p><span data-dcnode-id="2071" instrument_node="">
</span><blockquote data-dcnode-id="2065"><p data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">In our community a lot of people quote the incident of Owais al-Qarni breaking his teeth after he heard that the prophet had broken one tooth.</span></p><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Is this event authentic?</span></p></blockquote><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2061"><span data-dcnode-id="2062" style="color: #c06;"><span data-dcnode-id="2063" instrument_node="">The response of the office of Ayatullah Sadiq Shirazi:</span></span></p><span data-dcnode-id="2060" instrument_node="">
</span><blockquote data-dcnode-id="2056"><p data-dcnode-id="2057"><span data-dcnode-id="2058" style="color: #c06;"><span data-dcnode-id="2059" instrument_node="">As per history the incident is not authentic.</span></span></p></blockquote><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2050"><a class="source" data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tatbir.org/wp-content/uploads/2011/07/uwais-shirazi.jpg"><span data-dcnode-id="2054" instrument_node="">The evidence.</span><br data-dcnode-id="2053"><span data-dcnode-id="2052" instrument_node="">
</span></a></p><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">In that email (click on the link) the representative of Ayatullah Sadiq Shirazi (who is one of a small minority of contemporary maraja who actively support blood flagellation) hints that the story of Rabab (r) the wife of Imam Hussain (s) is evidence for some of these blood rituals. We must point out that there are differing accounts of what she (r) did. Some accounts say that she (r) stayed in Karbala at the grave of Imam Hussain (a) and did not return to Madinah (contradicting what he has written). We also do not think that the account given by the official can be described as an act of empathy or sympathy (for the Imam (a)) without any other supporting evidence. It would most likely have been an act of grief and mourning rather than an act of empathy. Nevertheless the act that he attributes to her is not comparable to the blood flagellation rituals.</span></p><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">The response of the office of Ayatullah Makarem Shirazi to the above mentioned question:</span></p><span data-dcnode-id="2043" instrument_node="">
</span><blockquote data-dcnode-id="2040"><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">It has been said that, when he heard that the Prophet (PBUH) had broken a tooth, his tooth began to hurt, or his tooth broke by itself, not voluntarily.</span></p></blockquote><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2034"><a class="source" data-dcnode-id="2035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tatbir.org/wp-content/uploads/2011/07/uwais-makarem.jpg"><span data-dcnode-id="2038" instrument_node="">The evidence.</span><br data-dcnode-id="2037"><span data-dcnode-id="2036" instrument_node="">
</span></a></p><span data-dcnode-id="2033" instrument_node="">
</span><p data-dcnode-id="2027"><strong data-dcnode-id="2029"><span data-dcnode-id="2032" instrument_node="">3, The lack of Shia sources and the scarcity of the narration.</span><br data-dcnode-id="2031"><span data-dcnode-id="2030" instrument_node="">
</span></strong><span data-dcnode-id="2028" instrument_node=""> </span></p><span data-dcnode-id="2026" instrument_node="">
</span><p data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Not only is this event not quoted from Shia sources, it is also not found in the earlier and more famous historical works of the Sunnis. It is not found in the Seerah of Ibn Ishaq, the History of al-Tabari or the Tabaqat of Ibn Sa’d and other books.</span></p><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2020"><strong data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">4, The narrative in Tadhkirat al-Awliyah contradicts many established beliefs.</span></strong></p><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2018" instrument_node="">Farid al-Deen Attar reports the incident by stating that the Prophet (s) said to Imam Ali (a) and Umar ibn Khattab that they will someday meet Uwais (r) and they must convey his (s) greetings. During the rule of Umar, Imam Ali (a) went with Umar to a remote part of Iraq and found Uwais (r) living there. It is in this meeting that Uwais (r) told them that he had broken all of his teeth. An English translation of this narrative can be found </span><a data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.omphaloskepsis.com/ebooks/pdf/Owaise.pdf" target="_blank"><span data-dcnode-id="2017" instrument_node="">here</span></a><span data-dcnode-id="2015" instrument_node="">. </span></p><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Some of the peculiarities of this narrative:</span></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="2006"><strong data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">a,</span></strong><span data-dcnode-id="2007" instrument_node=""> It contradicts other more reliable narrations (e.g. in Kitab al-Irshad) which state that Imam Ali (a) first met Uwais (r) on his way to the battle of Jamal. Whilst the narrative by Attar says that Imam Ali (a) first met him (r) during the reign of Umar ibn al-Khattab.</span></p><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2001"><strong data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">b,</span></strong><span data-dcnode-id="2002" instrument_node=""> Imam Ali (a) travels with Umar and treats him with a surprising amount of reverence.</span></p><span data-dcnode-id="2000" instrument_node="">
</span><p data-dcnode-id="1996"><strong data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">c,</span></strong><span data-dcnode-id="1997" instrument_node=""> Uwais (r) asks Umar to describe the appearance of Prophet (s) and Umar fails to do so. Imam Ali (a) does not intervene in the conversation and does no attempt to describe the Prophet (s).</span></p><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1988"><strong data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">d,</span></strong><span data-dcnode-id="1992" instrument_node=""> Uwais (r) challenges Umar with the words: </span><em data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">“if you were firm in the friendship then why you have not broken your teeth when the prophet’s teeth were broken in the battle of mount of Ohud in Madina and this is the rule of friendship”</span></em><span data-dcnode-id="1989" instrument_node="">. It is unlikely that a pious person like Uwais (r) would challenge him in that way considering that Imam Ali (a) also did not break his teeth and Uwais (r) is considered to be a follower of the Imam (a).</span></p><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1984"><strong data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">5, The narrative in Seerat al-Halabiyyah differs from what has been quoted.</span></strong></p><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Some promoters of blood shedding say that in volume II, page 295 of the book, the incident of Uwais (r) breaking his teeth has been narrated with the Prophet (s) responding with the following words: “Indeed Owais is our devoted friend”.</span></p><span data-dcnode-id="1980" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">We have not been able to find this narrative (of him voluntarily breaking his teeth) in the book. Instead we found it reporting that Uwais (r) was physically present at the battle of Uhud and the following words have been quoted from him: “I swear by God that at Uhud the Holy Prophet’s (s) teeth will not be broken until my teeth are broken, the Holy Prophet’s (s) face will not receive an injury until my face receives an injury, …..”, (Volume IV, page 227).</span></p><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">This account contradicts what has normally been quoted by the propagandists since they assert that Uwais (r) was in Yemen when the battle was taking place. Although we also think that he was in Yemen, we must point out that Seerah al-Halabiyyah contradicts with the account that they present.</span></p><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1971"><strong data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">6, Other narrations do not identify Uwais (r) as being toothless.</span></strong></p><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Many historical accounts of Uwais al-Qarni (r) do not state that he was toothless. If he indeed was toothless then he would have become famous for it and it would have been mentioned by people who had encountered him. </span></p><span data-dcnode-id="1967" instrument_node="">
</span><p data-dcnode-id="1964"><strong data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">7, The act of breaking ones teeth in this manner is haraam according to all renowned Muslim scholars.</span></strong></p><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">It is unlikely that Prophet Muhammad (s) commended Uwais (r) for breaking his teeth since it is an accepted fact that such severe acts of self-harm are prohibited in Islam.</span></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1957"><strong data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">8, The fact that none of the other companions of the Prophet (s) nor the Ahlulbayt (a) performed this act after knowing that the Prophet (s) had broken his teeth. If it was a correct action to perform then many of them would also have done it.</span></strong></p><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1953"><strong data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">9, The act seems unreal.</span></strong></p><span data-dcnode-id="1952" instrument_node="">
</span><p data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">The act of breaking every single tooth in one’s mouth seems very unrealistic. The amount of pain that Uwais (r) would have had to endure means that he is very unlikely to have been able to complete the breaking of every individual tooth.</span></p><span data-dcnode-id="1949" instrument_node="">
</span><p data-dcnode-id="1946"><strong data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">10, Uwais (r) was isolated and thus was not in a position to be corrected.</span></strong></p><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Even if we image that the event is true then we must remember that Uwais (r) was isolated and had never met the Prophet (s), and thus it is likely that he did not know the correct way to respond in this case and he should not be criticized. This would have likely been the reason why he was not criticized by the Prophet (s).</span></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">If blood flagellators think that breaking of the teeth was the correct action to perform, then we must ask them why don’t they do it now out of sympathy for the Prophet (s)?</span></p><span data-dcnode-id="1939" instrument_node="">
</span></div><span data-dcnode-id="1937" instrument_node="">
</span></div><span data-dcnode-id="1935" instrument_node="">
</span><div class="postMeta" data-dcnode-id="1927"><span data-dcnode-id="1934" instrument_node="">
</span><div class="comments" data-dcnode-id="1929"><span data-dcnode-id="1933" instrument_node="">
</span><a data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D696%23comments"><span data-dcnode-id="1932" instrument_node="">13 comments</span></a><span data-dcnode-id="1930" instrument_node=""> </span></div><span data-dcnode-id="1928" instrument_node="">
</span></div><span data-dcnode-id="1926" instrument_node="">
</span></div><span data-dcnode-id="1924" instrument_node="">
</span><div class="post hentry" data-dcnode-id="1831"><span data-dcnode-id="1923" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="1920"><abbr class="published" data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">18</span></abbr></h5><span data-dcnode-id="1919" instrument_node=""> </span><div class="postContent" data-dcnode-id="1842"><span data-dcnode-id="1918" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="1915"><a data-dcnode-id="1916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D694" rel="bookmark"><span data-dcnode-id="1917" instrument_node="">Lady Zainab (a) Hitting Her Head</span></a></h3><span data-dcnode-id="1914" instrument_node="">
</span><span data-dcnode-id="1912" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1844"><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">It is reported in Bihar al-Anwaar that in the aftermath of Karbala when the women were taken captive and taken to Kufa, the head of Imam Hussain (a) was paraded in public. Lady Zainab (a) was travelling in a carriage and upon seeing the head of her brother she hit her head on a pole of the carriage, which caused it to bleed.</span></p><span data-dcnode-id="1908" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">This event is given as a justification for Tatbir because a great personality like Lady Zainab (a) hit her head and caused it to bleed thus proving the merit of doing Tatbir. The main problem with this narration is that it is mursal (having an incomplete chain of narrators) and it is not considered authentic; this has been attested by numerous Shia scholars.</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">A statement on Ayatullah Lankarani’s website on this narration: </span></p><span data-dcnode-id="1902" instrument_node="">
</span><blockquote data-dcnode-id="1899"><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">We did not discover an authentic narration regarding the mentioned incident. In fact, Muhaddeth al-Qummi (Sheikh Abbass al-Qummi, compiler of Mafatih Al-Jinan) refuted/rejected it in the book ‘Muntaha al-Amaal’ whereby he said: “This narration, although Allamah Majlisi transmitted it in Bihar al-Anwaar, however, the source of his transmission is the two books of Muntakhab al-Turayhi and Nur al-ayn. The status of these two books is clear to the people of hadith (i.e. those knowledgeable in the science of hadiths).” Based on the aforementioned, there is no sanad (chain of transmission) for this narration that can be relied on.</span></p></blockquote><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1895"><a class="source" data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lankarani.com/ara/hkm/view.php%3Fntx%3D000003"><span data-dcnode-id="1897" instrument_node=""> Source.</span></a></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">It must be noted that Ayatullah Lankarani was one of the highest ranking scholars of the modern age and Shaykh Abbas al-Qummi is regarded as one of the greatest Shia scholars in history. He is also an expert on the history of Ashura and its aftermath.</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">The following question was sent to the office of Grand Ayatullah Makarem Shirazi:</span></p><span data-dcnode-id="1888" instrument_node="">
</span><blockquote data-dcnode-id="1885"><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">There is a narration which says that Lady Zainab (a) hit her head on a pole and it began to bleed. This is used to justify Tatbir. Is it authentic?
</span></p></blockquote><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">The reply:</span></p><span data-dcnode-id="1881" instrument_node="">
</span><blockquote data-dcnode-id="1878"><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">The authenticity of this narration is not proved for us; even if we accept that, it cannot be a religious argument for Tatbir and those intentional actions which vilify Islam.
</span></p></blockquote><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1872"><a class="source" data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tatbir.org/wp-content/uploads/2011/07/makarem-tatbir.jpg"><span data-dcnode-id="1876" instrument_node="">The evidence.</span><br data-dcnode-id="1875"><span data-dcnode-id="1874" instrument_node="">
</span></a></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Sayyid Muhammad Baqir al-Muhri a representative of Ayatullah Seestani and the head of the Shia Scholars Congregation in Kuwait, said the following about this narration:</span></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1865"><em data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">“.. the narration of Sayeda Zainab (a)  hitting her head is not authentic, and it is very far (not even realistic) for her to bleed her head.”</span></em></p><span data-dcnode-id="1864" instrument_node="">
</span><p data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Given below are a few more reasons to doubt the authenticity of this narration, and to show that it cannot justify blood flagellation even if we assumed its authenticity:</span></p><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1849"><span data-dcnode-id="1860" instrument_node="">1, Its scarcity in the books of history.</span><br data-dcnode-id="1859"><span data-dcnode-id="1858" instrument_node="">
2, The fact that there is no record of the act being performed by her (a) again. If it was a meritorious act then why was it not performed again?</span><br data-dcnode-id="1857"><span data-dcnode-id="1856" instrument_node="">
3, It seems to contradict a famous hadith where Imam Hussain (a) tells Lady Zainab (a) not to scratch her face, tear her clothes and so on, after he is martyred.</span><br data-dcnode-id="1855"><span data-dcnode-id="1854" instrument_node="">
4, The act was not performed by any of the Imams (a) or any of the other members (male or female) of the household, either when this incident is supposed to have taken place or after it.</span><br data-dcnode-id="1853"><span data-dcnode-id="1852" instrument_node="">
5, It is not normally possible to make one’s head bleed by hitting it on a pole, unless severe force is applied or sharp edges are used. Even today’s blood flagellators use blades to make their heads bleed. Thus the narration is describing something that cannot really happen.</span><br data-dcnode-id="1851"><span data-dcnode-id="1850" instrument_node="">
6, According to some knowledgeable people the act of hitting her (a) head may not have been intentional but may have been an accident.</span></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">The main source for this narrative is the book Bihar al-Anwaar. However some promoters of Tatbir also quote this narration from many other non-primary sources which take it from Bihar al-Anwaar. It is dishonest to quote a non-primary source alongside the initial source in order to make it look like the narration was reported by many primary sources. Blood shedding propagandists sometimes cite Bihar al-Anwaar as a reference for this narration and then also present a list of other books which take the narration from Bihar al-Anwaar, so that it looks like the narration has many primary sources!</span></p><span data-dcnode-id="1845" instrument_node="">
</span></div><span data-dcnode-id="1843" instrument_node="">
</span></div><span data-dcnode-id="1841" instrument_node="">
</span><div class="postMeta" data-dcnode-id="1833"><span data-dcnode-id="1840" instrument_node="">
</span><div class="comments" data-dcnode-id="1835"><span data-dcnode-id="1839" instrument_node="">
</span><a data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D694%23comments"><span data-dcnode-id="1838" instrument_node="">2 comments</span></a><span data-dcnode-id="1836" instrument_node=""> </span></div><span data-dcnode-id="1834" instrument_node="">
</span></div><span data-dcnode-id="1832" instrument_node="">
</span></div><span data-dcnode-id="1830" instrument_node="">
</span><div class="post hentry" data-dcnode-id="1778"><span data-dcnode-id="1829" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="1826"><abbr class="published" data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">19</span></abbr></h5><span data-dcnode-id="1825" instrument_node=""> </span><div class="postContent" data-dcnode-id="1789"><span data-dcnode-id="1824" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="1821"><a data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D698" rel="bookmark"><span data-dcnode-id="1823" instrument_node="">Imam Mahdi (a) Saying that He Will Weep Blood</span></a></h3><span data-dcnode-id="1820" instrument_node="">
</span><span data-dcnode-id="1818" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1791"><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">The following are the words of Imam al-Mahdi (a) in Ziarat Nahiyah with regards to Imam Hussain (a):</span></p><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1811"><em data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">“I will, therefore, lament you morning and evening, and will weep blood in place of tears, out of my anguish for you and my sorrow for all that befell you ..”</span></em></p><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">These words cannot be taken as a justification for blood shedding rituals for the following reasons:</span></p><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">1, In the Arabic language the idiom ‘weep blood’ means to weep heavily. It is an exaggerated metaphor to denote extreme sorrow.  It is similar to the English idiom “sweating blood” which means to sweat very much when working hard.</span></p><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">Some people object to this very obvious interpretation by claiming that such idiomatic and metaphorical language is below the status of an Imam (a). This claim has to be rejected because even Allah in the Qur’an has been known to use idiomatic and metaphorical language and so have the Imams (a) in other authentic narrations.</span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">2, If the words were to be taken literally then they would have to describe a miracle since it is not ordinarily possible to cry blood. If we wanted to emulate this act then we would have to emulate a miracle. It is not possible for ordinary people to perform miracles and cutting ourselves is not analogous to performing miracles. </span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">3, If the Imam (a) does indeed literally cry blood then he does not do it in public.</span></p><span data-dcnode-id="1792" instrument_node="">
</span></div><span data-dcnode-id="1790" instrument_node="">
</span></div><span data-dcnode-id="1788" instrument_node="">
</span><div class="postMeta" data-dcnode-id="1780"><span data-dcnode-id="1787" instrument_node="">
</span><div class="comments" data-dcnode-id="1782"><span data-dcnode-id="1786" instrument_node="">
</span><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D698%23respond"><span data-dcnode-id="1785" instrument_node="">leave a comment</span></a><span data-dcnode-id="1783" instrument_node=""> </span></div><span data-dcnode-id="1781" instrument_node="">
</span></div><span data-dcnode-id="1779" instrument_node="">
</span></div><span data-dcnode-id="1777" instrument_node="">
</span><div class="post hentry" data-dcnode-id="1727"><span data-dcnode-id="1776" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="1773"><abbr class="published" data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">20</span></abbr></h5><span data-dcnode-id="1772" instrument_node=""> </span><div class="postContent" data-dcnode-id="1738"><span data-dcnode-id="1771" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="1768"><a data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D204" rel="bookmark"><span data-dcnode-id="1770" instrument_node="">The Cupping Argument</span></a></h3><span data-dcnode-id="1767" instrument_node="">
</span><span data-dcnode-id="1765" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1740"><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Wet Cupping (Hijama) is the ancient medical practice of making shallow incisions over an area of skin and then placing a heated cup on the that area; as the cup cools, the reduced pressure causes some blood to flow out of the incisions and into the cup. This is usually done on the skin of the human back.</span></p><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">According to most Muslims scholars this act is considered to be a Sunnah (practice) of the Prophet (s). Although contemporary science has not been able to find any real medical benefit to cupping, there is evidence that it can remove some bodily pain and make people feel more relaxed.</span></p><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Some supporters of blood flagellation say that these rituals are similar to cupping and thus also recommended. They say that blood flagellation releases blood and so does cupping and that is where the similarity lies.</span></p><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1754" instrument_node="">The Ahlulbayt (a) prohibit the use of Qiyas (unjustifiable analogy) and they criticize those who use it to derive Islamic rulings. </span><span data-dcnode-id="1752" instrument_node="">Cupping is not Tatbir, and nor is it Zanjeer. We must avoid making this false analogy. Cupping is a clinical procedure that is performed by professionals in a private environment with health and safety measures in place. There is no risk of catching blood borne diseases and it does not create a revolting scene in public that is used to revile the religion. The incisions made in cupping are very small and shallow in comparison to the cuts made by these blood rituals. </span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Comparing blood flagellation to cupping is like comparing it to any other medical operation that requires the cutting of the skin. </span></p><span data-dcnode-id="1747" instrument_node="">
</span><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Also, cupping draws out blood from the body in a completely different manner to that of blood flagellation. Therefore those who have experienced cupping, say that it produces effects that are very different to ordinary forms of bloodletting.</span></p><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Furthermore, contrary to the false allegations of some blood flagellation propagandists, there is no scientific evidence at all that the blood shedding rituals are medially beneficial. </span></p><span data-dcnode-id="1741" instrument_node="">
</span></div><span data-dcnode-id="1739" instrument_node="">
</span></div><span data-dcnode-id="1737" instrument_node="">
</span><div class="postMeta" data-dcnode-id="1729"><span data-dcnode-id="1736" instrument_node="">
</span><div class="comments" data-dcnode-id="1731"><span data-dcnode-id="1735" instrument_node="">
</span><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D204%23respond"><span data-dcnode-id="1734" instrument_node="">leave a comment</span></a><span data-dcnode-id="1732" instrument_node=""> </span></div><span data-dcnode-id="1730" instrument_node="">
</span></div><span data-dcnode-id="1728" instrument_node="">
</span></div><span data-dcnode-id="1726" instrument_node="">
</span><div class="post hentry" data-dcnode-id="1684"><span data-dcnode-id="1725" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="1722"><abbr class="published" data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">21</span></abbr></h5><span data-dcnode-id="1721" instrument_node=""> </span><div class="postContent" data-dcnode-id="1695"><span data-dcnode-id="1720" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="1717"><a data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D55" rel="bookmark"><span data-dcnode-id="1719" instrument_node="">The Argument Against Losing the Symbols of Hussain (a)</span></a></h3><span data-dcnode-id="1716" instrument_node="">
</span><span data-dcnode-id="1714" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1697"><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">This is perhaps one of the most common arguments that is used by promoters of blood flagellation. It is argued that since these rituals have become associated (amongst some people) with the commemoration of Ashura, they now represent the commemoration itself. So you will find that some people call these practices ‘Hussaini rituals’ or the ‘Symbols of Hussain’ (in Arabic ‘Sha’air al-Hussain’). These people may use slogans such as: ‘We must uphold the Sha’air of Hussain’, in opposition to those who are not in favor of the rituals. They consider any calls for a review of these traditions, as an affront to the whole commemoration of Ashura. They also tend to argue that if blood flagellation is stopped then it will be the first step leading to the abolition of other established commemoratory practices, and thus eventually there will be a complete loss of all commemoration.</span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">These arguments are very weak and we only address them because they are made so often. It is incorrect to frame these rituals a ‘Hussaini symbols’ just because some Shias practice them on Ashura. If something has not officially been prescribed by Islam as a Hussaini tradition then it is not proper to enforce the notion upon people that it is indeed a Hussaini tradition. It is akin to labeling the dress code of Muslims in Asia or the Middle East as the ‘Islamic dress code’. Islam is not restricted to any particular culture and to do so would result in the alienation of many Muslims from other cultures. Cultures and traditions change over time and thus what may be considered a mourning practice today may not be seen in the same light in the future.</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">If these rituals repel people from the message of Imam Hussain (a), then it is an insult to the Imam (a) to give them the label of Sha’air al-Hussain. We should not use that phrase for actions that break the laws of Islam and drive people away from our religion. </span></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">The argument that the abolishment of blood rituals will lead to the abolishment of the commemoration of Ashura is indeed a very weak argument. It is like arguing that the abolishment of Taraweeh will eventually lead to the abolishment of Salaat, or that the removal of ‘Asalaatu khair al-min al-nawm’ in the Adhan will eventually lead to the loss of the whole adhan. </span></p><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Shias who are opposed to blood flagellation are very much in favor of the general commemoration of Ashura as can be seen in the teachings of Ayatullah Khomeini. To suggest otherwise is to involve oneself in spurious propaganda. To be precise, the opposition to blood flagellation is done with the intention of supporting the message of Imam Hussain (a) so that more people will be attracted to it.</span></p><span data-dcnode-id="1698" instrument_node="">
</span></div><span data-dcnode-id="1696" instrument_node="">
</span></div><span data-dcnode-id="1694" instrument_node="">
</span><div class="postMeta" data-dcnode-id="1686"><span data-dcnode-id="1693" instrument_node="">
</span><div class="comments" data-dcnode-id="1688"><span data-dcnode-id="1692" instrument_node="">
</span><a data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D55%23respond"><span data-dcnode-id="1691" instrument_node="">leave a comment</span></a><span data-dcnode-id="1689" instrument_node=""> </span></div><span data-dcnode-id="1687" instrument_node="">
</span></div><span data-dcnode-id="1685" instrument_node="">
</span></div><span data-dcnode-id="1683" instrument_node="">
</span><div class="post hentry" data-dcnode-id="1644"><span data-dcnode-id="1682" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="1679"><abbr class="published" data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">22</span></abbr></h5><span data-dcnode-id="1678" instrument_node=""> </span><div class="postContent" data-dcnode-id="1655"><span data-dcnode-id="1677" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="1674"><a data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D61" rel="bookmark"><span data-dcnode-id="1676" instrument_node="">Is Tatbir Azadari?</span></a></h3><span data-dcnode-id="1673" instrument_node="">
</span><span data-dcnode-id="1671" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1657"><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">In the same manner that these rituals have been incorrectly labeled as ‘Hussaini rituals’, they have also inappropriately been put under the category of ‘Azadari’. The word Azadari in some Asian languages means mourning; the Arabic equivalent is the word ‘Aza’.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">However many of us contend that blood shedding is not a natural means to mourn, also it is not in the Sunnah (as a form of mourning), it wasn’t practiced by pious Shias for centuries and it has many seriously damaging effects. Therefore blood shedding should not be categorized as a true form of Azadari.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Human beings do not strike their heads with swords when they wish to mourn; it is simply not a natural way to mourn. Similarly people do not need to resort to cutting their heads in order to mourn Imam Hussain (a). Since the dawn of Islam until the relatively recent advent of these rituals, pious Shias quite naturally performed Azadari without having to damage their own bodies. The retelling of the tragedy of Karbala drives peoples to tears and inspires them to perform good deeds. This is how it has been for centuries. A grieving person does not naturally resort to cutting their own head and reason does not lead them to doing that either. Those who claim that these acts are their own personal methods of mourning and showing love, should realize that these sentiments of theirs are not natural, and at most they have been acquired.</span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Unfortunately those who are not in favor of blood shedding are often falsely branded as being against Azadari. This is nothing but propaganda. The word Azadari has been hijacked and the people need to be reminded of this reality.</span></p><span data-dcnode-id="1658" instrument_node="">
</span></div><span data-dcnode-id="1656" instrument_node="">
</span></div><span data-dcnode-id="1654" instrument_node="">
</span><div class="postMeta" data-dcnode-id="1646"><span data-dcnode-id="1653" instrument_node="">
</span><div class="comments" data-dcnode-id="1648"><span data-dcnode-id="1652" instrument_node="">
</span><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D61%23comments"><span data-dcnode-id="1651" instrument_node="">3 comments</span></a><span data-dcnode-id="1649" instrument_node=""> </span></div><span data-dcnode-id="1647" instrument_node="">
</span></div><span data-dcnode-id="1645" instrument_node="">
</span></div><span data-dcnode-id="1643" instrument_node="">
</span><div class="post hentry" data-dcnode-id="531"><span data-dcnode-id="1642" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="1639"><abbr class="published" data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">23</span></abbr></h5><span data-dcnode-id="1638" instrument_node=""> </span><div class="postContent" data-dcnode-id="542"><span data-dcnode-id="1637" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="1634"><a data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D29" rel="bookmark"><span data-dcnode-id="1636" instrument_node="">Misrepresenting and Falsifying the Opinions of the Scholars</span></a></h3><span data-dcnode-id="1633" instrument_node="">
</span><span data-dcnode-id="1631" instrument_node="">
</span><div class="entry-content" data-dcnode-id="544"><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Amongst those who promote blood rituals, there are some who have waged a mass propaganda campaign (in support of the rituals) involving means such as the creation of websites, the production of promotional videos, the sending of bulk emails, and the distribution of hundreds of thousands of booklets (often posted directly to the homes of Shias).</span></p><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">These various forms of propaganda intend to demonstrate the desirability of performing the rituals, using evidence from the verdicts of scholars and to a lesser extent from the Quran &amp; Ahlulbayt; and they even claim to use medical science to state the alleged benefits of blood flagellation.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Unfortunately these propagandists often use dishonest means to promote their beliefs. They quite readily misrepresent the opinions of great scholars and sometimes use completely fabricated information. We advise people to verify all sources used by any of the apologists.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">The video below shows an explicit case of fabricated information being presented (perhaps unintentionally). The cleric claims that Grand Ayatullah Behjat reports of a fatwa given by Grand Ayatullah Esfahani in support of Tatbir (in reality he was strongly opposed to it). A rather audacious claim is also made that Ayatullah Behjat kept in his possession some clothes drenched with the blood of other people, and he desired to be buried with them! A great and pious man like him would not want to be buried with najis (ritually impure) items.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"></p><span data-dcnode-id="1615" instrument_node="">

</span><p data-dcnode-id="564"><span data-dcnode-id="568" instrument_node="">The above example is only one of many. The most common deceptive method used by the propagandists is to misrepresent the actual rulings of the scholars. Often they will present rulings which primarily state the permissibly of these rituals (due to them not being mentioned in the Quran and Sunnah) but they will omit the rulings from the same scholars which prohibit the rituals based on other strong Islamic principles. We encourage people to look at the </span><a data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tatbir.org/%3Fpage_id%3D98"><span data-dcnode-id="567" instrument_node="">fatawa</span></a><span data-dcnode-id="565" instrument_node=""> page of this site and compare the rulings to those that have been presented in the propaganda material.</span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">The following are just a few of the other methods used by them to mislead people:</span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">1, To quote scholars encouraging Azadari and then using the same quotes to encourage blood shedding. Prime examples are the sayings of Ayatullah Khomeini in support of Azadari. Although he did greatly encourage Azadari, he was against the blood rituals.</span></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">2, To quote some historical sources without mentioning that they are not considered authentic. Sometimes the sources are misquoted.</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">3, To refrain from quoting Islamic narrations that discourage such practices.</span></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">4, To claim that blood shedding does not give the religion a bad image but instead draws people towards the religion.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">5, To quote minority opinions that do not represent the majority.</span></p><span data-dcnode-id="545" instrument_node="">
