</span><div data-dcnode-id="3222" style="margin-top: 5px; color: #000;"><span data-dcnode-id="3223" instrument_node="">~ Imam al-Sadiq (a) ~</span></div><span data-dcnode-id="3221" instrument_node="">
</span><div data-dcnode-id="3215" style="text-align: center; margin-top: 20px;"><span data-dcnode-id="3219" style="color: red; font-size: 1.5em; font-size: 1.1em;"><span data-dcnode-id="3220" instrument_node="">"</span></span><span data-dcnode-id="3218" instrument_node="">Look at the people of the Prophet's family. Adhere to their direction. Follow their footsteps because they would never let you out of guidance, and never throw you into destruction. If they sit down, you sit down, and if they rise up you rise up. Do not go ahead of them, as you would thereby go astray and go not lag behind them as you would thereby be ruined.</span><span data-dcnode-id="3216" style="color: red; font-size: 1.5em; font-size: 1.1em;"><span data-dcnode-id="3217" instrument_node="">"</span></span></div><span data-dcnode-id="3214" instrument_node="">
</span><div data-dcnode-id="3212" style="margin-top: 5px; color: #000;"><span data-dcnode-id="3213" instrument_node="">~ Imam Ali (a) ~</span></div><span data-dcnode-id="3211" instrument_node="">
</span></div><span data-dcnode-id="3209" instrument_node="">
</span><div class="hfeed" data-dcnode-id="42" id="coreContent"><span data-dcnode-id="3208" instrument_node="">
</span><div class="post hentry" data-dcnode-id="3157"><span data-dcnode-id="3207" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="3204"><abbr class="published" data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">1</span></abbr></h5><span data-dcnode-id="3203" instrument_node=""> </span><div class="postContent" data-dcnode-id="3168"><span data-dcnode-id="3202" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="3199"><a data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D13" rel="bookmark"><span data-dcnode-id="3201" instrument_node="">What is Tatbir?</span></a></h3><span data-dcnode-id="3198" instrument_node="">
</span><span data-dcnode-id="3196" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3170"><span data-dcnode-id="3195" instrument_node="">
</span><p data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">Tatbir (Arabic) is amongst a set of bloody rituals that are performed by some Shia Muslims in commemoration of the great tragedy of Karbala, when the family of the Holy Prophet Muhammad (s) was massacred by a group of Muslims. Tatbir is performed by striking the head with a sword or knife until blood gushes out. In the Persian language Tatbir is called Qama Zani.</span></p><span data-dcnode-id="3192" instrument_node="">
</span><p data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">Some Shias in the Indian subcontinent also perform an act called Zanjeer Zani (usually called Zanjeer). It involves repeatedly striking the back with a chain of blades with the intention of cutting the skin and causing blood to flow. Tatbir and Zanjeer are the two most widely practiced of the blood shedding rituals. Other rituals include injuring oneself with a stone, padlock or chain.</span></p><span data-dcnode-id="3189" instrument_node="">
</span><p data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">Although these blood shedding rituals are historically not a part of Shia Islam, for many Shia Muslims they have become a central part of their religious practice. Some Shias hold these rituals in very high regard and reckon them to be amongst the most holy acts of worship.</span></p><span data-dcnode-id="3186" instrument_node="">
</span><p data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">The zealous advocates of the blood rituals put a huge emphasis on these acts and employ a lot of resources to promote their practice. Some of them can be quite hostile to those Shia who do not hold the these practices in such high esteem or consider the rituals to be detrimental to the image of Shia Muslims.</span></p><span data-dcnode-id="3183" instrument_node="">
</span><p data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">We cannot say that Islam directly prohibits these rituals (as long as they are done without causing significant harm such as the loss of a limb, a bodily organ or a function of the body) because the rituals did not exist when the teachings of Islam were being revealed. Therefore the Quran and Sunnah do not address the permissibility of Tatbir and Zanjeer directly.</span></p><span data-dcnode-id="3180" instrument_node="">
</span><p data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">According to the principles of Islamic jurisprudence, everything is considered permissible unless there is direct evidence for its prohibition. Thus the Shia scholars have not prohibited the blood shedding rituals on their own since the Quran and Sunnah do not speak about these actions. However the vast majority of contemporary Shia scholars have ruled that the rituals are forbidden on the condition that their performance would lead to the violation of other established Islamic principles (e.g. the prohibition of defaming the Shia faith).</span></p><span data-dcnode-id="3177" instrument_node="">
</span><p data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">Unfortunately many supporters of the blood rituals flagrantly misrepresent the opinions of the leading Shia scholars by ignoring the rulings which prohibit these practices (due to them violating established Islamic principles) and they present the unmodified rulings which state their permissibility, without considering the prohibitive factors.</span></p><span data-dcnode-id="3174" instrument_node="">
</span><p data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">This website aims to highlight the rulings of the great Shia scholars on this issue and to elaborate upon the Islamic reasons for the discouragement and prohibition of these cultural practices. The primary reason for the prohibition is the bad image that is given to Islam and Shi’ism in particular, and there are also many other reasons which will also be discussed.</span></p><span data-dcnode-id="3171" instrument_node="">
</span></div><span data-dcnode-id="3169" instrument_node="">
</span></div><span data-dcnode-id="3167" instrument_node="">
</span><div class="postMeta" data-dcnode-id="3159"><span data-dcnode-id="3166" instrument_node="">
</span><div class="comments" data-dcnode-id="3161"><span data-dcnode-id="3165" instrument_node="">
</span><a data-dcnode-id="3163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D13%23comments"><span data-dcnode-id="3164" instrument_node="">25 comments</span></a><span data-dcnode-id="3162" instrument_node=""> </span></div><span data-dcnode-id="3160" instrument_node="">
</span></div><span data-dcnode-id="3158" instrument_node="">
</span></div><span data-dcnode-id="3156" instrument_node="">
</span><div class="post hentry" data-dcnode-id="3104"><span data-dcnode-id="3155" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="3152"><abbr class="published" data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">2</span></abbr></h5><span data-dcnode-id="3151" instrument_node=""> </span><div class="postContent" data-dcnode-id="3115"><span data-dcnode-id="3150" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="3147"><a data-dcnode-id="3148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D1" rel="bookmark"><span data-dcnode-id="3149" instrument_node="">It was Never Practiced or Recommended by the Ahlulbayt (a)</span></a></h3><span data-dcnode-id="3146" instrument_node="">
</span><span data-dcnode-id="3144" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3117"><span data-dcnode-id="3143" instrument_node="">
</span><p data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">Blood mourning rituals were never practiced by the founders and teachers of Shia Islam. There is not a single shred of evidence that the latter Imams (a) performed blood rituals. The modern day proponents of these damaging rituals shy away from mentioning this glaring fact.</span></p><span data-dcnode-id="3140" instrument_node="">
</span><p data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">If these rituals had any inherent merit in the eyes of Islam then they would have been practiced by the Holy Prophet (s) and the Twelve Holy Imams (a).</span></p><span data-dcnode-id="3137" instrument_node="">
</span><p data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">It is very disingenuous and an affront to the holy Ahlulbayt (a) to suggest that they did not practice a ritual that is supposedly highly meritorious. To say that that blood rituals are recommended is to infer that the Imams (a) refrained from a recommended act.</span></p><span data-dcnode-id="3134" instrument_node="">
</span><p data-dcnode-id="3130"><span data-dcnode-id="3133" instrument_node="">The Ahlulbayt (a) are divinely guided role models for Muslims and it is an obligation upon us to try and emulate them. Therefore it could be argued that the best way to mourn Imam Hussain (a) is by emulating the mourning of Ahlulbayt (a). Since they (a) did not perform these rituals, then the Shia should walk in their footsteps and refrain from performing them. </span><b data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">A Shi’i who keeps away from blood rituals is closer in action to the Ahlulbayt (a) than one who performs them.</span></b></p><span data-dcnode-id="3129" instrument_node="">
</span><p data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">Considering the very controversial nature of the rituals, it wise to refrain from them and to carefully follow the practices of Ahlulbayt (a) in the manner that has been recommended by Imam Ali (a): </span></p><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3122"><em data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">“Look at the people of the Prophet’s family. Adhere to their direction. Follow their footsteps because they would never let you out of guidance, and never throw you into destruction. If they sit down, you sit down, and if they rise up you rise up. Do not go ahead of them, as you would thereby go astray and go not lag behind them as you would thereby be ruined.”</span></em><span data-dcnode-id="3123" instrument_node=""> – Nahj al-Balagha, Sermon 96.</span></p><span data-dcnode-id="3121" instrument_node="">
</span><p data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">Some of the proponents of blood shedding say that the rejection of the rituals cannot be justified on the basis that the Imams (a) did not perform them because there are many things that we do today (e.g. drive cars, fly planes, use the Internet etc.) which the Imams never did. This of course is very primitive reasoning. Blood shedding cannot be compared to these other things because: 1, It was available during their (a) time whilst these other things were not. 2, The Imams (a) put a great deal of emphasis on mourning for Imam Hussain (a) and never made use of blood shedding even though it was available to them. 3, Blood shedding rituals almost always violate certain Islamic principles and these other novelties don’t. </span></p><span data-dcnode-id="3118" instrument_node="">
</span></div><span data-dcnode-id="3116" instrument_node="">
</span></div><span data-dcnode-id="3114" instrument_node="">
</span><div class="postMeta" data-dcnode-id="3106"><span data-dcnode-id="3113" instrument_node="">
</span><div class="comments" data-dcnode-id="3108"><span data-dcnode-id="3112" instrument_node="">
</span><a data-dcnode-id="3110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D1%23comments"><span data-dcnode-id="3111" instrument_node="">19 comments</span></a><span data-dcnode-id="3109" instrument_node=""> </span></div><span data-dcnode-id="3107" instrument_node="">
</span></div><span data-dcnode-id="3105" instrument_node="">
</span></div><span data-dcnode-id="3103" instrument_node="">
</span><div class="post hentry" data-dcnode-id="3067"><span data-dcnode-id="3102" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="3099"><abbr class="published" data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">3</span></abbr></h5><span data-dcnode-id="3098" instrument_node=""> </span><div class="postContent" data-dcnode-id="3078"><span data-dcnode-id="3097" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="3094"><a data-dcnode-id="3095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D10" rel="bookmark"><span data-dcnode-id="3096" instrument_node="">The Absence of Evidence is Sufficient</span></a></h3><span data-dcnode-id="3093" instrument_node="">
</span><span data-dcnode-id="3091" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3080"><span data-dcnode-id="3090" instrument_node="">
</span><p data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Some proponents of blood flagellation argue that the Imams (a) may have performed the rituals in private, and that may be the reason why we have no evidence that they (a) performed these rituals. Therefore we should not deny the fact that these rituals are Islamically recommended.</span></p><span data-dcnode-id="3087" instrument_node="">
</span><p data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">Any sincere person with a working intellect would not fail to see the flaw in that argument. If the argument were valid then it could be applied to a whole range of actions that have no Islamic backing. Any given Muslim could innovate a ritual and claim that we should not deny that it is Islamically recommended because it may have been performed by the Ahlulbayt (a) in private. For example we could innovate a new prayer with sixty four rakats and justify it by saying: “Don’t say it is not mustahab, maybe the Imams (a) did it in private!”</span></p><span data-dcnode-id="3084" instrument_node="">
</span><p data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">The lack of evidence in this case is sufficient to justify the proposition that the Imams (a) did not perform those rituals.</span></p><span data-dcnode-id="3081" instrument_node="">
</span></div><span data-dcnode-id="3079" instrument_node="">
</span></div><span data-dcnode-id="3077" instrument_node="">
</span><div class="postMeta" data-dcnode-id="3069"><span data-dcnode-id="3076" instrument_node="">
</span><div class="comments" data-dcnode-id="3071"><span data-dcnode-id="3075" instrument_node="">
</span><a data-dcnode-id="3073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D10%23comments"><span data-dcnode-id="3074" instrument_node="">6 comments</span></a><span data-dcnode-id="3072" instrument_node=""> </span></div><span data-dcnode-id="3070" instrument_node="">

</span><div class="post hentry" data-dcnode-id="3030"><span data-dcnode-id="3065" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="3062"><abbr class="published" data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">4</span></abbr></h5><span data-dcnode-id="3061" instrument_node=""> </span><div class="postContent" data-dcnode-id="3041"><span data-dcnode-id="3060" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="3057"><a data-dcnode-id="3058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D21" rel="bookmark"><span data-dcnode-id="3059" instrument_node="">Having a False Image of the Sunnah</span></a></h3><span data-dcnode-id="3056" instrument_node="">
</span><span data-dcnode-id="3054" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3043"><span data-dcnode-id="3053" instrument_node="">
</span><p data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">If any open-minded individual were to study the Quran and the lives of the Infallibles (a), they would obtain an image of Islam that is quite different to what is being promoted by some Muslims.</span></p><span data-dcnode-id="3050" instrument_node="">
</span><p data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">In order to understand the reasons for the discouragement of blood rituals, we must always keep in mind the lifestyles of the Prophets (a) and Imams (a), and the general theme of the Quran, and to compare all of these to the observance of the blood shedding ceremonies. If we were to do this, we would come to the conclusion that these ceremonies are far removed from the Sunnah and the general teachings of Ahlulbayt (a). The Holy Prophet (s) and his family (a) have never taken part in any ceremony that resembles the blood rituals that we see today.</span></p><span data-dcnode-id="3047" instrument_node="">
</span><p data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">We must not allow our imaginations to conjure up unjustified notions that force blood shedding rituals into the Sunnah of the Ahlulbayt (a); instead we must accept the truth of the matter and admit the fact that these acts are very alien to the lifestyles of the Prophets (a) and the Ahlulbayt (a).</span></p><span data-dcnode-id="3044" instrument_node="">
</span></div><span data-dcnode-id="3042" instrument_node="">
</span></div><span data-dcnode-id="3040" instrument_node="">
</span><div class="postMeta" data-dcnode-id="3032"><span data-dcnode-id="3039" instrument_node="">
</span><div class="comments" data-dcnode-id="3034"><span data-dcnode-id="3038" instrument_node="">
</span><a data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D21%23respond"><span data-dcnode-id="3037" instrument_node="">leave a comment</span></a><span data-dcnode-id="3035" instrument_node=""> </span></div><span data-dcnode-id="3033" instrument_node="">
</span></div><span data-dcnode-id="3031" instrument_node="">
</span></div><span data-dcnode-id="3029" instrument_node="">
</span><div class="post hentry" data-dcnode-id="2858"><span data-dcnode-id="3028" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="3025"><abbr class="published" data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">5</span></abbr></h5><span data-dcnode-id="3024" instrument_node=""> </span><div class="postContent" data-dcnode-id="2869"><span data-dcnode-id="3023" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="3020"><a data-dcnode-id="3021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D45" rel="bookmark"><span data-dcnode-id="3022" instrument_node="">The History of Blood Mourning Ceremonies</span></a></h3><span data-dcnode-id="3019" instrument_node="">
</span><span data-dcnode-id="3017" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2871"><span data-dcnode-id="3016" instrument_node="">
</span><p data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">For about a millennium after the tragedy of Karbala, the Shia did not practice blood shedding when mourning the martyrdom of Imam Hussain (a) or any of the Ahlulbayt (a). Instead they mourned in a traditional and more natural manner, which included the methods used by the Imams (a) and their families. However this changed when blood rituals were introduced into the mourning gatherings of the Shia.</span></p><span data-dcnode-id="3013" instrument_node="">
</span><p data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">Historians have shown that blood rituals were foreign cultural practices that were introduced to certain elements of the Shia community relatively recently in the history of the religion.</span></p><span data-dcnode-id="3010" instrument_node="">
</span><p data-dcnode-id="3003"><span data-dcnode-id="3009" instrument_node="">Quoting Professor Werner Ende in </span><em data-dcnode-id="3005"><span data-dcnode-id="3008" instrument_node="">“The Flagellations of Muharram</span><br data-dcnode-id="3007"><span data-dcnode-id="3006" instrument_node="">
and the Shi’ite ‘Ulama’”</span></em><span data-dcnode-id="3004" instrument_node="">:</span></p><span data-dcnode-id="3002" instrument_node="">
</span><blockquote data-dcnode-id="2996"><p data-dcnode-id="2997"><b data-dcnode-id="2998"><span data-dcnode-id="3001" instrument_node="">Muhammad Mahdi al-Qazwini, however, in a work finished in the month of Ramadan 1345 H (March 1927), claims that the use of iron, i.e. of chains and swords for flagellation, was initiated “about a century ago” by people not well versed in the rules of the </span><i data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">shari `a.</span></i></b></p></blockquote><span data-dcnode-id="2995" instrument_node="">
</span><p data-dcnode-id="2990"><a data-dcnode-id="2991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.freidok.uni-freiburg.de/volltexte/3270/pdf/Ende_Flagellations_of_Muharram.pdf" target="_blank"><span data-dcnode-id="2994" instrument_node="">Source.</span><br data-dcnode-id="2993"><span data-dcnode-id="2992" instrument_node="">
</span></a></p><span data-dcnode-id="2989" instrument_node="">
</span><p data-dcnode-id="2984"><span data-dcnode-id="2988" instrument_node="">Below is an excerpt from the book </span><em data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">“A Hidden Hand”</span></em><span data-dcnode-id="2985" instrument_node=""> which describes how these cultural practices entered the Shia community via external sources. </span></p><span data-dcnode-id="2983" instrument_node="">
</span><blockquote data-dcnode-id="2946"><p data-dcnode-id="2976"><span data-dcnode-id="2982" instrument_node="">There are differences of opinion as to when blood matam started.</span><sup data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">1</span></sup><span data-dcnode-id="2979" instrument_node=""> The most reliable opinion is that the cutting of the head was a practice performed by the Turks in Azerbaijan which was transferred to the Iranians and Arabs.</span><sup data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">2</span></sup></p><span data-dcnode-id="2975" instrument_node="">
</span><p data-dcnode-id="2965"><span data-dcnode-id="2974" instrument_node="">The Iraqi author of the book The Tragedy of Karbala also believes that such practices were not common in Iraq before the nineteenth century. At the end of this century they started to gain popularity in this country. Therefore, blood matam started elsewhere and came to Iraq which means it is not rooted in Arab heritage.</span><sup data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">3</span></sup><span data-dcnode-id="2971" instrument_node=""> Shaykh Kazim Dajili also accepts this view and says: “Iraqis did not participate in these processions until the beginning of the twentieth century. This practice was first seen amongst the Turkish Iraqis, Sufis, and Western Iranian Kurds.”</span><sup data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">4</span></sup><span data-dcnode-id="2968" instrument_node=""> A report by English sources covering Ashura in Najaf in the year 1919 shows that 100 Turkish Shias performed blood matam that year.</span><sup data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">5</span></sup></p><span data-dcnode-id="2964" instrument_node="">
</span><p data-dcnode-id="2957"><span data-dcnode-id="2963" instrument_node="">Memories of Sayyid Muhammad Bahr al-Ulum support this claim as well: “When I was in Najaf around 50-60 years ago there were only a fewTurkish mourning groups. They would come to Sayyid Bahr al-Ulum’s house on the days of mourning and with his permission they would recite emotional poems about Imam Hussayn (a). Some of them would slightly injure themselves while listening to the poems in order to try to feel what Imam Hussayn felt. Slowly this type of action changed and spread until it reached its peak when it was outlawed in 1935 by Yasin Hashimi, the prime minister of the time. In reality, this oppressive action had an opposite effect</span><sup data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">1</span></sup><span data-dcnode-id="2960" instrument_node=""> – in such a way that the number of mourning groups tripled.”</span><sup data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">2</span></sup></p><span data-dcnode-id="2956" instrument_node="">
</span><p data-dcnode-id="2947"><span data-dcnode-id="2955" instrument_node="">Hajj Hamid Razi (d.1953) was a police man in Karbala and lived to be about 110 years old. He told his memories regarding the mourning of Imam Hussayn (a) – about blood matam which he says was not normally practiced in Najaf or Karbala when he was young.</span><sup data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">3</span></sup><span data-dcnode-id="2952" instrument_node=""> </span><span data-dcnode-id="2948" style="color: #c06;"><span data-dcnode-id="2951" instrument_node="">There has been no recollection by elder people of Najaf and Karbala saying that there were these processions before the middle of the nineteenth century. These processions where first performed by Turkish visitors from the Qizilbash Tribe. When they would perform a ziyarat to Imam Hussayn (a) they would strike their heads with special swords.</span><sup data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">4</span></sup></span></p></blockquote><span data-dcnode-id="2945" instrument_node="">
</span><p data-dcnode-id="2940"><span data-dcnode-id="2944" instrument_node="">The full book can be purchased </span><a data-dcnode-id="2942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lulu.com/product/paperback/a-hidden-hand/4202369" target="_blank"><span data-dcnode-id="2943" instrument_node="">here</span></a><span data-dcnode-id="2941" instrument_node=""> for a nominal price.</span></p><span data-dcnode-id="2939" instrument_node="">
</span><p data-dcnode-id="2934"><span data-dcnode-id="2938" instrument_node="">Yitzhak Nakash in his article: </span><em data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">“An Attempt to Trace the Origin of the Rituals of ʿĀshūrāʾ”</span></em><span data-dcnode-id="2935" instrument_node="">, states the following regarding the origin of these practices:</span></p><span data-dcnode-id="2933" instrument_node="">
</span><blockquote data-dcnode-id="2930"><p data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">The flagellations were introduced into central and southern Iran, as well as into Iraq, only in the nineteenth century. This proposition is supported by the data provided by Shi’i biographies and Iraqi Shi`i oral history. The biographies identify Shaykh Mulla Agha `Abidal-Darbendi (d. 1868/9) as the first to introduce violent acts of self-flagellation into Tehran around the mid-nineteenth century.</span></p></blockquote><span data-dcnode-id="2929" instrument_node="">
</span><blockquote data-dcnode-id="2918"><p data-dcnode-id="2919"><span data-dcnode-id="2928" instrument_node="">Darbendi is said to include in this work uncommon rituals, not to be found in other accepted Shi’i Imami writings on the commemoration of ‘Ashura.</span><sup data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">54</span></sup><span data-dcnode-id="2925" instrument_node=""> The relatively late appearance of flagellation in Iraq is also evident from Shi’i accounts. The Iraqi Shi’i mujtahid Muhammad Mahdi al-Qazwini is cited by Werner Ende as claiming around 1927 that the use of iron was initiated “about a century ago” by people not well versed in the rules of the Shari’a.</span><sup data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">55</span></sup><span data-dcnode-id="2922" instrument_node=""> Indeed, Iraqi Shi’i oral history traces the appearance of flagellation in Najaf and Karbala to the nineteenth century. It is related that the practice was imported to these cities by Shi’i Turks, who came to Karbala and Najaf on pilgrimage from the Caucasus or Azarbayjan.</span><sup data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">56</span></sup></p></blockquote><span data-dcnode-id="2917" instrument_node="">
</span><p data-dcnode-id="2913"><span data-dcnode-id="2916" instrument_node="">The author goes on to state that the Qizilbash, an extreme ghulat Turkish sect, seemingly introduced blood rituals to Imami Shias. He then points out that the Qizilbash took their flagellation rituals from some Christians. </span><span data-dcnode-id="2914" style="color: #c06;"><span data-dcnode-id="2915" instrument_node="">Therefore the Shia blood rituals most probably have a Christian origin.</span></span></p><span data-dcnode-id="2912" instrument_node="">
</span><blockquote data-dcnode-id="2906"><p data-dcnode-id="2907"><span data-dcnode-id="2911" instrument_node="">Sufi and Christian elements were fused in the rituals of the Qizilbash.</span><sup data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">62</span></sup><span data-dcnode-id="2908" instrument_node=""> As will be seen below, this was also evident in the flagellations, which reenacted the shedding of Husayn’s blood in a manner similar to the reenactment of the shedding of the blood of Christ among Christian Catholics.</span></p></blockquote><span data-dcnode-id="2905" instrument_node="">
</span><p data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">__ Notes: __</span></p><span data-dcnode-id="2902" instrument_node="">
</span><div data-dcnode-id="2873" style="font-size: 8px; color: #7d7d7d;"><span data-dcnode-id="2901" instrument_node="">
</span><p data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">1 An Article in a Shia media outlet entitled: Maruri bar Tarikh Takvin Majalis va Aeenhaye Azadari dar Iran by Mohsin Hassam Mazaheri, Akhbar Adiyan Magazine, number 18, Farvardin va Ordibehesht138</span></p><span data-dcnode-id="2898" instrument_node="">
</span><p data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">2 Abdullah Mastufi, Sharh Zendiganiye Man ya Tarikh Ijtemai va Idari Douran Ghajariyeh, v.1 and 3.</span></p><span data-dcnode-id="2895" instrument_node="">
</span><p data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">3 Ibrahim Haydari, The Tragedy of Karbala (tradjedi Karbala) translated into Farsi by Ali Mamouri,p.475</span></p><span data-dcnode-id="2892" instrument_node="">
</span><p data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">4 Kazem Dajili, Ashura fi al-Najaf wa Karbala, p.287; Mahmoud Darah, Jiyyat Iraqi min wara’ al-Bawabih al-Sawda’, p.24</span></p><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">5 Naqash, p.269 (quoting from: Administration Report of the Shamiyya Division, Great Britain)</span></p><span data-dcnode-id="2886" instrument_node="">
</span><p data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">1 Anytime an action is forbid with force without any kind of intellectual or cultural explanation given it will have an opposite effect.</span></p><span data-dcnode-id="2883" instrument_node="">
</span><p data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">2 Goftegu ba Sayyid Bahr al-Ulum piramoun Azadari Husseini, Nour Magazine, number 74, January 1997</span></p><span data-dcnode-id="2880" instrument_node="">
</span><p data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">3 Tradjedi Karbala, a conversation with Doctor Shakir Latif, 4,12,1996</span></p><span data-dcnode-id="2877" instrument_node="">
</span><p data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">4 Talib Ali Sharqi, al-najaf al-Ashraf Adatha wa Talidha</span></p><span data-dcnode-id="2874" instrument_node="">
</span></div><span data-dcnode-id="2872" instrument_node="">
</span></div><span data-dcnode-id="2870" instrument_node="">

</span><div class="comments" data-dcnode-id="2862"><span data-dcnode-id="2866" instrument_node="">
</span><a data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D45%23comments"><span data-dcnode-id="2865" instrument_node="">1 comment</span></a><span data-dcnode-id="2863" instrument_node=""> </span></div><span data-dcnode-id="2861" instrument_node="">

</span><h5 class="postDate" data-dcnode-id="2853"><abbr class="published" data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">6</span></abbr></h5><span data-dcnode-id="2852" instrument_node=""> </span><div class="postContent" data-dcnode-id="2820"><span data-dcnode-id="2851" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="2848"><a data-dcnode-id="2849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D17" rel="bookmark"><span data-dcnode-id="2850" instrument_node="">It Gives Shia Islam a Gruesome and Hideous Image</span></a></h3><span data-dcnode-id="2847" instrument_node="">
</span><span data-dcnode-id="2845" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2822"><span data-dcnode-id="2844" instrument_node="">
</span><p data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">The word barbaric is an understatement. Barbaric people may be cruel and uncivilized, however they generally do not cut and mutilate their own bodies in extremely bloody public demonstrations.</span></p><span data-dcnode-id="2841" instrument_node="">
</span><p data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">There is nothing else in the whole of existence, which gives the Shias such a bad reputation as these rituals do. Millions of dollars have been spent by the enemies of Shi’ism (and Islam as a whole) to ruin its image and to spread lies about it. However all those efforts are eclipsed by these unnatural actions that some Shias perform. It is not only non-Shias who are repulsed and disturbed by these rituals, many Shias are also extremely repulsed.</span></p><span data-dcnode-id="2838" instrument_node="">
</span><p data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">It is ironic that Shias have had to struggle for centuries to counter false propaganda and to remove misconceptions about themselves; only to find that a group from amongst themselves heavily damages their reputation. The Wahhabis may falsely claim that Shias believe in another Quran, believe that Imam Ali (a) is God or believe that the wife of the Holy Prophet (S) committed adultery, however all of those are mere claims from insincere people without any supporting evidence. In contrast, the Shias who perform acts of bodily mutilation give ammunition to those who wish to malign the religion.</span></p><span data-dcnode-id="2835" instrument_node="">
</span><p data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">Often, when people wish to mock and defame the Shias, they tend to show images of these blood shedding rituals. The mass media and the Internet are replete with these images. Type in the word ‘Ashura’ into a search engine and see the images that appear. Is this the first piece of information that a non-muslim must obtain about the struggle of Imam Hussain (a)?  Did Imam Hussain (a) die only for his message to become immediately associated with this unsightly innovation?</span></p><span data-dcnode-id="2832" instrument_node="">
</span><p data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">It is not surprising that many people are distressed by these rituals since the human brain is naturally averse to self-mutilation and finds blood repulsive due to its unhygienic nature. The bad image portrayed by acts such as Tatbir and Zanjeer is the primary reason given by the Maraja for their prohibition.</span></p><span data-dcnode-id="2829" instrument_node="">
</span><p data-dcnode-id="2824"><span data-dcnode-id="2828" instrument_node="">Some of the promoters of blood flagellation astonishingly deny that the rituals are considered repulsive. To see the reality, they only need to read </span><a data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.guardian.co.uk/commentisfree/belief/2010/dec/20/ashura-bloodletting-grief" target="_blank"><span data-dcnode-id="2827" instrument_node="">these comments</span></a><span data-dcnode-id="2825" instrument_node=""> made about blood flagellation by the readers of the Guardian Newspaper. </span></p><span data-dcnode-id="2823" instrument_node="">
</span></div><span data-dcnode-id="2821" instrument_node="">
</span></div><span data-dcnode-id="2819" instrument_node="">
</span><div class="postMeta" data-dcnode-id="2811"><span data-dcnode-id="2818" instrument_node="">
</span><div class="comments" data-dcnode-id="2813"><span data-dcnode-id="2817" instrument_node="">
</span><a data-dcnode-id="2815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D17%23comments"><span data-dcnode-id="2816" instrument_node="">1 comment</span></a><span data-dcnode-id="2814" instrument_node=""> </span></div><span data-dcnode-id="2812" instrument_node="">

</span><h5 class="postDate" data-dcnode-id="2804"><abbr class="published" data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">7</span></abbr></h5><span data-dcnode-id="2803" instrument_node=""> </span><div class="postContent" data-dcnode-id="2780"><span data-dcnode-id="2802" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="2799"><a data-dcnode-id="2800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D171" rel="bookmark"><span data-dcnode-id="2801" instrument_node="">Humans are Naturally Repulsed by Self Harm and Blood</span></a></h3><span data-dcnode-id="2798" instrument_node="">
</span><span data-dcnode-id="2796" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2782"><span data-dcnode-id="2795" instrument_node="">
</span><p data-dcnode-id="2790"><span data-dcnode-id="2794" instrument_node="">Most human beings are naturally averse to acts of bodily harm and to the shedding of blood. It is not surprising that the human mind and body are usually repulsed by the thought of cutting the skin, since they have been designed to ensure self-preservation. Most human beings are also repulsed by the blood of others since it is unhygienic and entails a health hazard. They very thought of bodily mutilation or blood can repulse people, let alone having to witness these things. There are many people who also suffer from </span><span data-dcnode-id="2792" style="color: #c06;"><span data-dcnode-id="2793" instrument_node="">blood phobia</span></span><span data-dcnode-id="2791" instrument_node=""> and the sight of blood can cause them to feel extremely uncomfortable.</span></p><span data-dcnode-id="2789" instrument_node="">
</span><p data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">Unfortunately many of the proponents of blood shedding do not seem to take into consideration this natural repulsion and unease felt by the majority of humanity. Even Shias who have been brought up in communities where blood rituals are prevalent, are repulsed by these activities.</span></p><span data-dcnode-id="2786" instrument_node="">
</span><p data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">It is about time that blood flagellators put themselves into the shoes of those who find these rituals abhorrent and tried to understand why so many people are against these activities. It is an act of recklessness to innovate and openly practice a ritual in the name of Islam that is unhygienic and repulses so many people.</span></p><span data-dcnode-id="2783" instrument_node="">
</span></div><span data-dcnode-id="2781" instrument_node="">
</span></div><span data-dcnode-id="2779" instrument_node="">
</span><div class="postMeta" data-dcnode-id="2771"><span data-dcnode-id="2778" instrument_node="">
</span><div class="comments" data-dcnode-id="2773"><span data-dcnode-id="2777" instrument_node="">
</span><a data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D171%23comments"><span data-dcnode-id="2776" instrument_node="">2 comments</span></a><span data-dcnode-id="2774" instrument_node=""> </span></div><span data-dcnode-id="2772" instrument_node="">

</span></div><span data-dcnode-id="2768" instrument_node="">
</span><div class="post hentry" data-dcnode-id="2687"><span data-dcnode-id="2767" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="2764"><abbr class="published" data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">8</span></abbr></h5><span data-dcnode-id="2763" instrument_node=""> </span><div class="postContent" data-dcnode-id="2698"><span data-dcnode-id="2762" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="2759"><a data-dcnode-id="2760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D25" rel="bookmark"><span data-dcnode-id="2761" instrument_node="">Blood Rituals are a Health Hazard</span></a></h3><span data-dcnode-id="2758" instrument_node="">
</span><span data-dcnode-id="2756" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2700"><span data-dcnode-id="2755" instrument_node="">
</span><p data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">The mourning ceremonies which involve the congregational spilling of human blood via methods such as Tatbir and Zanjeer, are very unhygienic and are a health hazard. The ceremonies involve men striking themselves with blades, causing blood to spill all over the surrounding environment and often onto other mourners who have open wounds.</span></p><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Blood can carry some very&nbsp;dangerous&nbsp;pathogens including the following:</span></p><span data-dcnode-id="2749" instrument_node="">
</span><ul data-dcnode-id="2711"><span data-dcnode-id="2748" instrument_node="">
</span><li data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">Hepatitis B (HBV).</span></li><span data-dcnode-id="2745" instrument_node="">
</span><li data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Human Immunodeficiency Virus (HIV).</span></li><span data-dcnode-id="2742" instrument_node="">
</span><li data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">Hepatitis C (HCV).</span></li><span data-dcnode-id="2739" instrument_node="">
</span><li data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">Syphilis.</span></li><span data-dcnode-id="2736" instrument_node="">
</span><li data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">Malaria.</span></li><span data-dcnode-id="2733" instrument_node="">
</span><li data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">Brucellosis.</span></li><span data-dcnode-id="2730" instrument_node="">
</span><li data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">Babeosis.</span></li><span data-dcnode-id="2727" instrument_node="">
</span><li data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Leptospirosis.</span></li><span data-dcnode-id="2724" instrument_node="">
</span><li data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">Arborviral Infections.</span></li><span data-dcnode-id="2721" instrument_node="">
</span><li data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">Relapsing Fever.</span></li><span data-dcnode-id="2718" instrument_node="">
</span><li data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">Creutzfeld-Jacobs Disease (Mad Cow disease).</span></li><span data-dcnode-id="2715" instrument_node="">
</span><li data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">Viral Hemorrahgic Fever (Ebola virus).</span></li><span data-dcnode-id="2712" instrument_node="">
</span></ul><span data-dcnode-id="2710" instrument_node="">
</span><p data-dcnode-id="2705"><span data-dcnode-id="2709" instrument_node="">Some of the above are deadly and have no known cure. </span><span data-dcnode-id="2707" style="color: #c06;"><span data-dcnode-id="2708" instrument_node="">Hepatitis B can survive on surfaces for up to several days, and in dried blood for up to a week.</span></span><span data-dcnode-id="2706" instrument_node=""> Blood mourning gatherings put people at risk to these and other dangerous diseases. It is almost impossible to impose good hygiene in these environments and individual blood mourners generally do not implement the any hygiene procedures. Blood is splattered around the environment, and the blades and other surfaces are not decontaminated. Some mourners also share blades.</span></p><span data-dcnode-id="2704" instrument_node="">
</span><p data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">Some of these acts also carry the possibility of incurring other forms of harm, such as: infections to wounds, skeletal damage, damage to nerves &amp; veins. There have also been a few reports of deaths due to these acts.</span></p><span data-dcnode-id="2701" instrument_node="">
</span></div><span data-dcnode-id="2699" instrument_node="">
</span></div><span data-dcnode-id="2697" instrument_node="">
</span><div class="postMeta" data-dcnode-id="2689"><span data-dcnode-id="2696" instrument_node="">
</span><div class="comments" data-dcnode-id="2691"><span data-dcnode-id="2695" instrument_node="">
</span><a data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D25%23comments"><span data-dcnode-id="2694" instrument_node="">1 comment</span></a><span data-dcnode-id="2692" instrument_node=""> </span></div><span data-dcnode-id="2690" instrument_node="">

</span><h5 class="postDate" data-dcnode-id="2682"><abbr class="published" data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">9</span></abbr></h5><span data-dcnode-id="2681" instrument_node=""> </span><div class="postContent" data-dcnode-id="2667"><span data-dcnode-id="2680" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="2677"><a data-dcnode-id="2678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D51" rel="bookmark"><span data-dcnode-id="2679" instrument_node="">Blood is Najis</span></a></h3><span data-dcnode-id="2676" instrument_node="">
</span><span data-dcnode-id="2674" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2669"><span data-dcnode-id="2673" instrument_node="">
</span><p data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">One of the most unfortunate consequences of the blood rituals is the fact that it leaves the mourners and the surrounding environment Najis (ritually impure). Often these rituals are performed in the vicinity of mosques and the blood flagellators are then unable to pray because they are left in a state of impurity and the surrounding environment is also rendered ritually impure.</span></p><span data-dcnode-id="2670" instrument_node="">
</span></div><span data-dcnode-id="2668" instrument_node="">
</span></div><span data-dcnode-id="2666" instrument_node="">
</span><div class="postMeta" data-dcnode-id="2658"><span data-dcnode-id="2665" instrument_node="">
</span><div class="comments" data-dcnode-id="2660"><span data-dcnode-id="2664" instrument_node="">
</span><a data-dcnode-id="2662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D51%23comments"><span data-dcnode-id="2663" instrument_node="">1 comment</span></a><span data-dcnode-id="2661" instrument_node=""> </span></div><span data-dcnode-id="2659" instrument_node="">
</span></div><span data-dcnode-id="2657" instrument_node="">
</span></div><span data-dcnode-id="2655" instrument_node="">
</span><div class="post hentry" data-dcnode-id="2565"><span data-dcnode-id="2654" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="2651"><abbr class="published" data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">10</span></abbr></h5><span data-dcnode-id="2650" instrument_node=""> </span><div class="postContent" data-dcnode-id="2576"><span data-dcnode-id="2649" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="2646"><a data-dcnode-id="2647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D150" rel="bookmark"><span data-dcnode-id="2648" instrument_node="">Why Must Children be Involved?</span></a></h3><span data-dcnode-id="2645" instrument_node="">
</span><span data-dcnode-id="2643" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2578"><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Muslims and Non-Muslims alike are shocked when they come across incidents where parents make their children participate in blood shedding actives. There are many images on the Internet of young children cutting their own heads with swords and some infamous pictures of mothers cutting the heads of their babies! How far will some people to go give us a bad name?</span></p><span data-dcnode-id="2639" instrument_node="">
</span><p data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">A few years ago a member of the Shia community in the UK was found guilty of child cruelty by a British court for forcing two children to cut themselves with blades that he had just used to cut himself! This case was covered by the mass media and it put the Shia community into disrepute.</span></p><span data-dcnode-id="2636" instrument_node="">
</span><blockquote data-dcnode-id="2627"><p data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">A devout Muslim who was found guilty of child cruelty after forcing two boys to beat themselves during a religious ceremony is due to be sentenced today.</span></p><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">Syed Mustafa Zaidi, 44, was found guilty of two counts of child cruelty in a British legal first last month.</span></p><span data-dcnode-id="2630" instrument_node="">
</span><p data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">The boys, aged 13 and 15, were forced to beat themselves with a zanjeer zani, an implement containing five curved blades, during a ceremony to commemorate the death of a Shia Muslim spiritual leader.</span></p></blockquote><span data-dcnode-id="2626" instrument_node="">
</span><blockquote data-dcnode-id="2611"><p data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">Both boys also admitted they had flogged themselves with a smaller zanjeer zani from the age of six in Pakistan.</span></p><span data-dcnode-id="2623" instrument_node="">
</span><p data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">A 14-year-old boy, who was 13 at the time, said Zaidi told them both: “Start doing it, start doing it.”</span></p><span data-dcnode-id="2620" instrument_node="">
</span><p data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">He told the jury: “We said ‘we don’t want to do it’.”</span></p><span data-dcnode-id="2617" instrument_node="">
</span><p data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">The boy said he saw Zaidi flogging himself with the zanjeer zani before washing his blood from it and handing it to the 15-year-old boy.</span></p><span data-dcnode-id="2614" instrument_node="">
</span><p data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">He said Zaidi “kept pressuring him” and “make him do the knife thing”.</span></p></blockquote><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2607"><a data-dcnode-id="2608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.independent.co.uk/news/uk/crime/devout-muslim-to-be-sentenced-for-child-flogging-940707.html" target="_blank"><span data-dcnode-id="2609" instrument_node="">Source.</span></a></p><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Unfortunately there are some Shia clerics who do not discourage Tatbir on children, rather they consider it to be recommended. </span></p><span data-dcnode-id="2603" instrument_node="">
</span><p data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">The following question was sent to the office of Ayatullah Sadiq Shirazi:</span></p><span data-dcnode-id="2600" instrument_node="">
</span><blockquote data-dcnode-id="2597"><p data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">What is the ruling on doing tatbir on children in a country where it is not prohibited?</span></p></blockquote><span data-dcnode-id="2596" instrument_node="">
</span><p data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">The response:</span></p><span data-dcnode-id="2593" instrument_node="">
</span><blockquote data-dcnode-id="2589"><p data-dcnode-id="2590"><span data-dcnode-id="2591" style="color: #c06;"><span data-dcnode-id="2592" instrument_node="">Tatbeer is mustahib but in case of minor it is mustahib to seek permission from his wali (Shariah Guardian).</span></span></p></blockquote><span data-dcnode-id="2588" instrument_node="">
</span><p data-dcnode-id="2583"><a data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tatbir.org/wp-content/uploads/2013/12/shirazi-kids.jpg"><span data-dcnode-id="2587" instrument_node="">The evidence.</span><br data-dcnode-id="2586"><span data-dcnode-id="2585" instrument_node="">
</span></a></p><span data-dcnode-id="2582" instrument_node="">
</span><p data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Many great Shia scholars have disagreed with that sort of opinion.</span></p><span data-dcnode-id="2579" instrument_node="">
</span></div><span data-dcnode-id="2577" instrument_node="">
</span></div><span data-dcnode-id="2575" instrument_node="">
</span><div class="postMeta" data-dcnode-id="2567"><span data-dcnode-id="2574" instrument_node="">
</span><div class="comments" data-dcnode-id="2569"><span data-dcnode-id="2573" instrument_node="">
</span><a data-dcnode-id="2571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D150%23respond"><span data-dcnode-id="2572" instrument_node="">leave a comment</span></a><span data-dcnode-id="2570" instrument_node=""> </span></div><span data-dcnode-id="2568" instrument_node="">

</span><div class="post hentry" data-dcnode-id="2436"><span data-dcnode-id="2563" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="2560"><abbr class="published" data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">11</span></abbr></h5><span data-dcnode-id="2559" instrument_node=""> </span><div class="postContent" data-dcnode-id="2447"><span data-dcnode-id="2558" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="2555"><a data-dcnode-id="2556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D19" rel="bookmark"><span data-dcnode-id="2557" instrument_node="">The Obligation of Giving Islam a Good Image</span></a></h3><span data-dcnode-id="2554" instrument_node="">
</span><span data-dcnode-id="2552" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2449"><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">Islam has made it incumbent upon its followers to give it and ourselves a good image. The religion commands us to beautify our manners and our physical appearance and to attract other towards the teachings of Allah with an appealing presentation. The Maraja have stated that we must give Islam a good image. Cultural practices that make a mockery of our religion must definitely be avoided.</span></p><span data-dcnode-id="2548" instrument_node="">
</span><p data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Some sins are greater than others, and giving Islam a bad image is one of the most serious sins. Any person who drives people away from the religion will have to bear the responsibility of depriving them of the beautiful religion.</span></p><span data-dcnode-id="2545" instrument_node="">
</span><p data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">The following selection of ahadith indicate the importance that Islam places on maintaining a good image and presentation:</span></p><span data-dcnode-id="2542" instrument_node="">
</span><p data-dcnode-id="2533"><strong data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">Imam Al-Sadiq (a): “</span></strong><span data-dcnode-id="2538" style="color: #cc0066;"><span data-dcnode-id="2539" instrument_node="">You must never do anything that may embarrass us. </span></span><span data-dcnode-id="2537" instrument_node="">A small boy causes embarrassment to his father because of his misdeeds. </span><span data-dcnode-id="2535" style="color: #3A5FCD;"><span data-dcnode-id="2536" instrument_node="">Be the beauty for those to whom you are devoted and do not be an embarrassment to them.</span></span><span data-dcnode-id="2534" instrument_node=""> Pray along with their tribes, visit their people in ill health, attend their funerals and do not allow anyone exceed you in good deeds. You have all the more reason to exceed others in good deeds.”</span></p><span data-dcnode-id="2532" instrument_node="">
</span><p data-dcnode-id="2529"><span class="reference" data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">Al-Kafi.</span></span></p><span data-dcnode-id="2528" instrument_node="">
</span><p data-dcnode-id="2518"><strong data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Imam Al-Hadi (a):</span></strong><span data-dcnode-id="2525" instrument_node=""> “</span><span data-dcnode-id="2523" style="color: #3A5FCD;"><span data-dcnode-id="2524" instrument_node="">Allah is beautiful and He loves beauty and prettification</span></span><span data-dcnode-id="2522" instrument_node="">, and He hates misery and miserable ones. Allah the Almighty likes, when He gives a blessing to His slave, to see the effects of that blessing appear on him.” He was asked, “How is that?” He said, “</span><span data-dcnode-id="2520" style="color: #3A5FCD;"><span data-dcnode-id="2521" instrument_node="">To clean his dress, make his smell good, order his house, and sweep the yard.</span></span><span data-dcnode-id="2519" instrument_node=""> Even a lamp lit before sunset takes poverty away and increases livelihood.”</span></p><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2514"><span class="reference" data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">“Al-Amali”, Sheikh al-Mufid.</span></span></p><span data-dcnode-id="2513" instrument_node="">
</span><p data-dcnode-id="2509"><strong data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Imam Al-Sadiq (a):&nbsp;</span></strong><span data-dcnode-id="2510" instrument_node="">“My followers, be an ornament for us, and do not be a shame on us; tell people good words; guard your tongues and keep them back from idle talk and evil words.”</span></p><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2505"><span class="reference" data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">“Living the Right Way”, Ayatullah Jawad Tehrai.</span></span></p><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2497"><strong data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">Prophet Muhammad (s): </span></strong><span data-dcnode-id="2501" instrument_node="">“</span><span data-dcnode-id="2499" style="color: #3A5FCD;"><span data-dcnode-id="2500" instrument_node="">Everybody who chooses a dress, must keep it clean.</span></span><span data-dcnode-id="2498" instrument_node="">”</span></p><span data-dcnode-id="2496" instrument_node="">
</span><p data-dcnode-id="2492"><strong data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Prophet Muhammad (s): </span></strong><span data-dcnode-id="2493" instrument_node="">“The dossier of the man who abstains from spitting and blowing his nose in the masjid, will be in his right hand on the Day of judgment.”</span></p><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2487"><strong data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Prophet Muhammad (s): </span></strong><span data-dcnode-id="2488" instrument_node="">“Islam is immaculate, so you should make efforts for&nbsp;cleanliness because only the clean ones would enter Paradise.”</span></p><span data-dcnode-id="2486" instrument_node="">
</span><p data-dcnode-id="2482"><strong data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">Imam Al-Sadiq (a): </span></strong><span data-dcnode-id="2483" instrument_node="">“Almighty Allah likes adornment, being beautiful …”</span></p><span data-dcnode-id="2481" instrument_node="">
</span><p data-dcnode-id="2478"><span class="reference" data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Bihar al-Anwar, vol 79, p 300.</span></span></p><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2473"><strong data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Prophet Muhammad (s): </span></strong><span data-dcnode-id="2474" instrument_node="">“One’s clothes must always be clean.”</span></p><span data-dcnode-id="2472" instrument_node="">
</span><p data-dcnode-id="2469"><span class="reference" data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">Shafi, vol&nbsp; p 208.</span></span></p><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2464"><strong data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">Prophet Muhammad (s):&nbsp;</span></strong><span data-dcnode-id="2465" instrument_node="">“A dirty person is a bad servant (to Allah).”</span></p><span data-dcnode-id="2463" instrument_node="">
</span><p data-dcnode-id="2460"><span class="reference" data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">Shafi, vol 1, p 208.</span></span></p><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2455"><strong data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">Prophet Muhammad (s):&nbsp;</span></strong><span data-dcnode-id="2456" instrument_node=""> “If it were not hard upon my Ummah, I would enjoin them to&nbsp;brush (their&nbsp;teeth) with every prayer.”</span></p><span data-dcnode-id="2454" instrument_node="">
</span><p data-dcnode-id="2451"><span class="reference" data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Bihar-ul-Anwar, vol. 76, p. 126.</span></span></p><span data-dcnode-id="2450" instrument_node="">

</span><div class="comments" data-dcnode-id="2440"><span data-dcnode-id="2444" instrument_node="">
</span><a data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D19%23comments"><span data-dcnode-id="2443" instrument_node="">1 comment</span></a><span data-dcnode-id="2441" instrument_node=""> </span></div><span data-dcnode-id="2439" instrument_node="">
