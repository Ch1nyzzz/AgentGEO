</span><h5 class="postDate" data-dcnode-id="526"><abbr class="published" data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">24</span></abbr></h5><span data-dcnode-id="525" instrument_node=""> </span><div class="postContent" data-dcnode-id="466"><span data-dcnode-id="524" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="521"><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D33" rel="bookmark"><span data-dcnode-id="523" instrument_node="">Asabiyyah and Political Motives</span></a></h3><span data-dcnode-id="520" instrument_node="">
</span><span data-dcnode-id="518" instrument_node="">
</span><div class="entry-content" data-dcnode-id="468"><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="516" instrument_node="">According to Ayatullah Khomeini Asabiyyah is: </span><em data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">“an inner psychic quality which is manifested in patronizing and defending one’s kindred and those with whom one has some kind of affinity or relation, whether it be religious creed or ideology, or whether it be soil or home. The affinity may also be similarity of profession or the relationship of teacher and pupil, or something else. It is a moral vice and an abominable trait which itself begets many more moral and behavioural deviations and vices as well. In itself a condemnable quality, it may take the form of defence of truth or religion, but in reality it is not aimed to defend a just and truthful cause but for extending one’s own influence or that of one’s co-religionists and allies.”</span></em><span data-dcnode-id="513" instrument_node=""> </span><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.al-islam.org/fortyhadith/8.htm" target="_blank"><span data-dcnode-id="512" instrument_node="">Source.</span></a></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="508" instrument_node="">Islam considers asabiyyah to be one the greatest of sins. It was this contemptible attribute that lead the pagans of Makkah to reject the teachings of Prophet Muhammad (a) with the following words: </span><em data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">“No! we shall follow the ways of our fathers.”</span></em><span data-dcnode-id="505" instrument_node=""> (Quran 2:170). It is this sort of close-mindedness and asabiyyah that has lead to some people’s vehement adherence to blood shedding. Thus we find that some people promote blood shedding only because it is a culture that they have become familiar with, and because of familial and community ties.</span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">People who suffer from asabiyyah and close-mindedness can also be found among those who are considered to be people of religion and knowledge. History shows us that many knowledgeable Muslims have been people with undesirable characteristics.</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="499" instrument_node="">Ayatullah Khomeini writes about the asabiyyah as seen in some scholars: </span><em data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">“One of the types of `asabiyyahs is stubbornness in intellectual matters and the habit of supporting the statements and ideas of one’s own or that of one’s teacher or spiritual master not for the sake of defending truth and refuting falsehood. It is obvious that such a kind of `asabiyyah is worse and more improper in some ways than other types of `asabiyyah. This, because a scholar and an intellectual ought to be an instructor of mankind, scholarship being a branch of the tree of prophethood and wilayah itself.”</span></em><span data-dcnode-id="496" instrument_node=""> </span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.al-islam.org/fortyhadith/8.htm" target="_blank"><span data-dcnode-id="495" instrument_node="">Source.</span></a></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Indeed according to Ahlulbayt (a) scholars can be amongst the best and the worst of people:</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="488" instrument_node="">Imam Ali (a) was asked, </span><em data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">“Who are the best of God’s creatures  after the Imams?” He replied, “The scholars, when they are righteous.” He was asked, “And who are the worst of God’s creatures, after the Devil and the Pharoah?” He replied, “The scholars, when they are corrupt.”</span></em></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="481"><span class="reference" data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">A hadith of Imam al-Askari, Bihar al-Anwar, volume 89.</span></span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Blood flagellation has also been strongly promoted by some because of political motives. It has been used as a means to oppose and vilify the leadership of the Islamic Republic or Iran.</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="476" instrument_node="">We must never reject the truth because it goes against beliefs that we have become accustomed to, nor should we reject it because it is against the views of our near ones, and we should not reject it due to any hatred that we may hold within ourselves. </span><span data-dcnode-id="471" style="color: #c06;"><span data-dcnode-id="475" instrument_node="">As Imam Ali (a) says: </span><em data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">“… you should prefer truth (even) when it harms you rather than falsehood (even) when it benefits you …”</span></em><span data-dcnode-id="472" instrument_node="">.</span></span></p><span data-dcnode-id="469" instrument_node="">
</span></div><span data-dcnode-id="467" instrument_node="">
</span></div><span data-dcnode-id="465" instrument_node="">
</span><div class="postMeta" data-dcnode-id="457"><span data-dcnode-id="464" instrument_node="">
</span><div class="comments" data-dcnode-id="459"><span data-dcnode-id="463" instrument_node="">
</span><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D33%23respond"><span data-dcnode-id="462" instrument_node="">leave a comment</span></a><span data-dcnode-id="460" instrument_node=""> </span></div><span data-dcnode-id="458" instrument_node="">

</span><div class="post hentry" data-dcnode-id="369"><span data-dcnode-id="453" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="450"><abbr class="published" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">25</span></abbr></h5><span data-dcnode-id="449" instrument_node=""> </span><div class="postContent" data-dcnode-id="380"><span data-dcnode-id="448" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="445"><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D31" rel="bookmark"><span data-dcnode-id="447" instrument_node="">Defamation and Vilification</span></a></h3><span data-dcnode-id="444" instrument_node="">
</span><span data-dcnode-id="442" instrument_node="">
</span><div class="entry-content" data-dcnode-id="382"><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">People who have even questioned the suitability of the rituals have often been vilified and denigrated by ardent adherents of blood shedding.</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="437" instrument_node="">When Grand Ayatullah Muhsin al-Amin wrote in opposition to the rituals (whilst stressing the importance of Azadari) many protagonists vilified him and even resorted to cursing (la’na) him. They started to call his supporters ‘Umayyids’ (Umawiyoon) and they called themselves ‘Alids’ (alawiyoon) i.e. the supporters of Imam Ali (a). In the holy city of Najaf the men selling water to the mourners would call out the phrase: </span><em data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">“La’na Allah al-Amin”</span></em><span data-dcnode-id="434" instrument_node=""> (May God curse al-Amin). In Nabatieh, South Lebanon some people marched in the streets chanting: </span><em data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">“May Allah curse the people who forbid the lamentation of Hussain”</span></em><span data-dcnode-id="431" instrument_node="">. The fierce propaganda campaign was successful in gaining supporters from the uneducated masses in opposition to the Ayatullah.</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Grand Ayatullah Muhsin al-Amin wrote the following about this propaganda campaign that started after his writing a book in opposition to blood flagellation:</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="419"><em data-dcnode-id="421"><span data-dcnode-id="425" instrument_node="">“Some people rose up against this book and caused disruption. </span><span data-dcnode-id="423" style="color: #c06;"><span data-dcnode-id="424" instrument_node="">They made ignorant people emotional. They told the ignorant masses that so and so forbids the mourning of Imam Husayn (a). In addition to this they accused me of leaving the religion.</span></span><span data-dcnode-id="422" instrument_node="">” </span></em><span data-dcnode-id="420" instrument_node=""> – A’yan al-Shia, v.10, p.363</span></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Even today those who discourage these innovated rituals are denigrated and called names such as ‘Nawasib’ (haters of Ahlulbayt), ‘Muqassir’ (one who belittles Ahlulbayt), ‘Wahabi’ and ‘Batri’. They are often accused of being against the mourning of Imam Hussain (a) even though they wish to mourn him (a) in the way that the Imams (a) did.</span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="414" instrument_node="">It is amazing how some people will go to such lengths to vilify their shia brethren just for questioning the permissibility of innovated and damaging rituals. We must speak out against this name calling propaganda. An example of the denigration can be seen in </span><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.youtube.com/watch%3Fv%3D7kqUw0kIddI" target="_blank"><span data-dcnode-id="413" instrument_node="">this video</span></a><span data-dcnode-id="411" instrument_node=""> where it is said that those who stand in the way of acts such as Tatbir will “have no place but hellfire”.</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="408" instrument_node="">Ayatullah Sadiq Shirazi has said about Tatbir: </span><span data-dcnode-id="406" style="color: #c06;"><span data-dcnode-id="407" instrument_node="">“Those who forbid it are from the like of Yazid and are imams of kufr”</span></span><span data-dcnode-id="405" instrument_node="">. This has been verified by his office, and his representative said: </span></p><span data-dcnode-id="403" instrument_node="">
</span><blockquote data-dcnode-id="397"><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">As for those who argue against tatbir, they are mistaken and are ill-informed. However, those who proactively prevent or forbid tatbir, then this is deemed a major sin.</span></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">The statement you quoted of Ayatollah Sadiq Shirazi is correct and it can be relied upon.</span></p></blockquote><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="393"><a data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tatbir.org/wp-content/uploads/2011/07/shirazi-tatbir.jpg"><span data-dcnode-id="395" instrument_node="">The evidence.</span></a></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">We cannot agree with that position because many great Shia scholars have prohibited Tatbir and we cannot compare them to the likes of Yazid.</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">It is this&nbsp;public&nbsp;vilification&nbsp;that has sometimes discouraged many of the great scholars from&nbsp;coming&nbsp;out even more strongly against the rituals.</span></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Those of us who are not in&nbsp;favor&nbsp;of the rituals, must never stoop to this level whereby we&nbsp;vilify,&nbsp;defame, insult,&nbsp;name call&nbsp;&nbsp;and initiate disunity. Such activities cause the corruption of the soul.</span></p><span data-dcnode-id="383" instrument_node="">
</span></div><span data-dcnode-id="381" instrument_node="">
</span></div><span data-dcnode-id="379" instrument_node="">
</span><div class="postMeta" data-dcnode-id="371"><span data-dcnode-id="378" instrument_node="">
</span><div class="comments" data-dcnode-id="373"><span data-dcnode-id="377" instrument_node="">
</span><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D31%23respond"><span data-dcnode-id="376" instrument_node="">leave a comment</span></a><span data-dcnode-id="374" instrument_node=""> </span></div><span data-dcnode-id="372" instrument_node="">

</span><h5 class="postDate" data-dcnode-id="364"><abbr class="published" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">26</span></abbr></h5><span data-dcnode-id="363" instrument_node=""> </span><div class="postContent" data-dcnode-id="343"><span data-dcnode-id="362" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="359"><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D468" rel="bookmark"><span data-dcnode-id="361" instrument_node="">Unjustified Extreme Emphasis</span></a></h3><span data-dcnode-id="358" instrument_node="">
</span><span data-dcnode-id="356" instrument_node="">
</span><div class="entry-content" data-dcnode-id="345"><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Of all the problems that are associated with the blood shedding rituals, one of the most serious is the unjustified extreme emphasis that is put upon the rituals by some of its proponents. </span></p><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">This extreme emphasis has resulted in some people obtaining a distorted image of the religion. They believe that blood shedding is an integral part of the religion and is unconditionally one the greatest acts of worship. Some Shias end up believing that the rituals are specified acts of worship that have been prescribed by Islam. The extreme emphasis has lead to the neglection of real acts of worship by some Shias. Thus for example some people will shed their blood but will refrain from performing their daily prayers. They will also show animosity to those who question the suitability of these cultural traditions to the extent that they will curse and revile them. This state of affairs has led to splits within the community for the sake of traditions that were not even performed by the Holy Imams (a).</span></p><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">The over emphasis on the rituals can also lead to disillusionment among the sincere believers. The sincere believers are attracted to the teachings of the Quran and Ahlulbayt (a) and when they see that their community is over emphasizing these cultural rituals, it makes them feel disillusioned with the community and its beliefs. The communities could instead put greater emphasis on things such as the importance of Tawheed (Monotheism), the daily prayers, the recitation and study of the Quran and put actual emphasis on commemorating the tragedy of Karbala without the innovated blood rituals.</span></p><span data-dcnode-id="346" instrument_node="">
</span></div><span data-dcnode-id="344" instrument_node="">
</span></div><span data-dcnode-id="342" instrument_node="">
</span><div class="postMeta" data-dcnode-id="334"><span data-dcnode-id="341" instrument_node="">
</span><div class="comments" data-dcnode-id="336"><span data-dcnode-id="340" instrument_node="">
</span><a data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D468%23respond"><span data-dcnode-id="339" instrument_node="">leave a comment</span></a><span data-dcnode-id="337" instrument_node=""> </span></div><span data-dcnode-id="335" instrument_node="">

</span><div class="post hentry" data-dcnode-id="285"><span data-dcnode-id="330" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="327"><abbr class="published" data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">27</span></abbr></h5><span data-dcnode-id="326" instrument_node=""> </span><div class="postContent" data-dcnode-id="296"><span data-dcnode-id="325" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="322"><a data-dcnode-id="323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D127" rel="bookmark"><span data-dcnode-id="324" instrument_node="">The Importance of Hijab</span></a></h3><span data-dcnode-id="321" instrument_node="">
</span><span data-dcnode-id="319" instrument_node="">
</span><div class="entry-content" data-dcnode-id="298"><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Some of the rituals are performed by shirtless men in public and are witnessed by members of the opposite gender. This is frowned upon in Islam and has been prohibited by some scholars:</span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="314" instrument_node="">Ayatullah Khoei: </span><em data-dcnode-id="309"><span data-dcnode-id="313" instrument_node="">“2830. There is no harm in beating one’s breast in the streets and bazaars (i.e. as a sign of mourning) though the women may be passing from there.</span><span data-dcnode-id="311" style="color: #c06;"><span data-dcnode-id="312" instrument_node=""> However, on the basis of precaution, the mourners should be wearing shirts.</span></span><span data-dcnode-id="310" instrument_node=""> Furthermore, there is no harm if standard (‘Alam) etc. are carried before the mourning party, but instruments of amusement should not be used.”</span></em><span data-dcnode-id="308" instrument_node=""> – </span><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.al-islam.org/laws/al-khui/36.htm" target="_blank"><span data-dcnode-id="307" instrument_node="">Source.</span><br data-dcnode-id="306"><span data-dcnode-id="305" instrument_node="">
</span></a></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">The scenes of these shirtless men is also very unsightly.</span></p><span data-dcnode-id="299" instrument_node="">
</span></div><span data-dcnode-id="297" instrument_node="">
</span></div><span data-dcnode-id="295" instrument_node="">
</span><div class="postMeta" data-dcnode-id="287"><span data-dcnode-id="294" instrument_node="">
</span><div class="comments" data-dcnode-id="289"><span data-dcnode-id="293" instrument_node="">
</span><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D127%23comments"><span data-dcnode-id="292" instrument_node="">1 comment</span></a><span data-dcnode-id="290" instrument_node=""> </span></div><span data-dcnode-id="288" instrument_node="">
</span></div><span data-dcnode-id="286" instrument_node="">
</span></div><span data-dcnode-id="284" instrument_node="">
</span><div class="post hentry" data-dcnode-id="242"><span data-dcnode-id="283" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="280"><abbr class="published" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">28</span></abbr></h5><span data-dcnode-id="279" instrument_node=""> </span><div class="postContent" data-dcnode-id="253"><span data-dcnode-id="278" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="275"><a data-dcnode-id="276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D202" rel="bookmark"><span data-dcnode-id="277" instrument_node="">The Empathy Argument</span></a></h3><span data-dcnode-id="274" instrument_node="">
</span><span data-dcnode-id="272" instrument_node="">
</span><div class="entry-content" data-dcnode-id="255"><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Of all the arguments that have been but forward in support of blood shedding, the empathy argument is perhaps the only one that has some merit. However it cannot be used as a justification for blood shedding because it is outweighed by other opposing factors.</span></p><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">The empathy argument contends that acts of self-harm allow us to empathize with those who were the victims of physical harm on Ashura. Some also believe that these acts serve as symbolic demonstrations for their personal willingness to undergo the same suffering as the victims of Karbala, had they been in the same situation.</span></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">However considering the other negative factors involved with these acts, and the fact that the Ahlulabyt (a) never performed them, it is no doubt better to refrain from them.</span></p><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">The Ahlulbayt (a) never performed such acts as a show of empathy and thus it is better for us not to. </span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">The rituals often fail to bring about empathy and are not always accurate forms of what the martyrs had to suffer. The pain that a person feels when they hear about what happened to Imam Hussain (a) easily outweighs any empathy that may be achieved from acts of blood shedding. If a person wishes to empathize with Imam Hussain (a) then it is better for them to emulate the characteristics and life struggles of the Imam (a) instead of performing temporary acts of blood shedding. They could better their acts of worship, their good deeds towards humanity and their struggle against injustice. Those are more noble forms of emulation and empathy. Surely a person who truly loves the Imams (a) will want to emulate their characteristics?</span></p><span data-dcnode-id="256" instrument_node="">
</span></div><span data-dcnode-id="254" instrument_node="">
</span></div><span data-dcnode-id="252" instrument_node="">
</span><div class="postMeta" data-dcnode-id="244"><span data-dcnode-id="251" instrument_node="">
</span><div class="comments" data-dcnode-id="246"><span data-dcnode-id="250" instrument_node="">
</span><a data-dcnode-id="248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D202%23respond"><span data-dcnode-id="249" instrument_node="">leave a comment</span></a><span data-dcnode-id="247" instrument_node=""> </span></div><span data-dcnode-id="245" instrument_node="">
</span></div><span data-dcnode-id="243" instrument_node="">
</span></div><span data-dcnode-id="241" instrument_node="">
</span><div class="post hentry" data-dcnode-id="152"><span data-dcnode-id="240" instrument_node="">
</span><h5 class="postDate" data-dcnode-id="237"><abbr class="published" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">29</span></abbr></h5><span data-dcnode-id="236" instrument_node=""> </span><div class="postContent" data-dcnode-id="163"><span data-dcnode-id="235" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="232"><a data-dcnode-id="233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D392" rel="bookmark"><span data-dcnode-id="234" instrument_node="">The Harm Outweighs Any Contended Benefit</span></a></h3><span data-dcnode-id="231" instrument_node="">
</span><span data-dcnode-id="229" instrument_node="">
</span><div class="entry-content" data-dcnode-id="165"><span data-dcnode-id="228" instrument_node="">
</span><p data-dcnode-id="224"><span data-dcnode-id="227" instrument_node="">In the Qur’an when Allah discusses Alcohol and Gambling He says: </span><em data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">“They ask you about intoxicants and games of chance. Say: ‘In both there is great evil as well as some benefit for man; but the evil which they cause is greater than the benefit which they bring.’” (2:219).</span></em></p><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Thus the harm brought about by intoxicants and gambling is greater than any benefit they may provide. Similarly if there were any contended benefits to the blood shedding rituals then the harm brought about by them is much more severe.</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Below is a list of some of the detriments and benefits of the rituals.</span></p><span data-dcnode-id="217" instrument_node="">
</span><p data-dcnode-id="212"><strong data-dcnode-id="213"><span data-dcnode-id="216" instrument_node="">Detriments:</span><br data-dcnode-id="215"><span data-dcnode-id="214" instrument_node="">
</span></strong></p><span data-dcnode-id="211" instrument_node="">
</span><ul data-dcnode-id="179" style="margin-top: -10px;"><span data-dcnode-id="210" instrument_node="">
</span><li data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Not following the Sunnah of Ahlulbayt (a) when mourning.</span></li><span data-dcnode-id="207" instrument_node="">
</span><li data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">The extreme emphasis on the rituals gives people wrong ideas about the religion.</span></li><span data-dcnode-id="204" instrument_node="">
</span><li data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Weak and perhaps fabricated narrations are quoted to justify the rituals.</span></li><span data-dcnode-id="201" instrument_node="">
</span><li data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">They severely damage the image of Shia Islam and cause revulsion.</span></li><span data-dcnode-id="198" instrument_node="">
</span><li data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Disillusionment amongst the Shia with regards to the practices of their own communities.</span></li><span data-dcnode-id="195" instrument_node="">
</span><li data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">The possible spread of diseases and the cause of physical harm.</span></li><span data-dcnode-id="192" instrument_node="">
</span><li data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">Causing disunity in the community along with vilification and defamation.</span></li><span data-dcnode-id="189" instrument_node="">
</span><li data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Close-mindedness and asabiyyah created by the unjustified promotion and adherence to the rituals.</span></li><span data-dcnode-id="186" instrument_node="">
</span><li data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Bad hijab amongst mourners.</span></li><span data-dcnode-id="183" instrument_node="">
</span><li data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Making the surroundings najis.</span></li><span data-dcnode-id="180" instrument_node="">
</span></ul><span data-dcnode-id="178" instrument_node="">
</span><div data-dcnode-id="177" style="height: 20px;"></div><span data-dcnode-id="176" instrument_node="">
</span><p data-dcnode-id="173"><strong data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">Benefits:</span></strong></p><span data-dcnode-id="172" instrument_node="">
</span><ul data-dcnode-id="167" style="margin-top: -10px;"><span data-dcnode-id="171" instrument_node="">
</span><li data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">A sense of empathy with the martyrs.</span></li><span data-dcnode-id="168" instrument_node="">
</span></ul><span data-dcnode-id="166" instrument_node="">
</span></div><span data-dcnode-id="164" instrument_node="">
</span></div><span data-dcnode-id="162" instrument_node="">

</span><a data-dcnode-id="158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D392%23respond"><span data-dcnode-id="159" instrument_node="">leave a comment</span></a><span data-dcnode-id="157" instrument_node=""> </span></div><span data-dcnode-id="155" instrument_node="">

</span><h5 class="postDate" data-dcnode-id="147"><abbr class="published" data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">30</span></abbr></h5><span data-dcnode-id="146" instrument_node=""> </span><div class="postContent" data-dcnode-id="62"><span data-dcnode-id="145" instrument_node="">
</span><h3 class="entry-title" data-dcnode-id="142"><a data-dcnode-id="143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tatbir.org/%3Fp%3D390" rel="bookmark"><span data-dcnode-id="144" instrument_node="">The Safest Course</span></a></h3><span data-dcnode-id="141" instrument_node="">
</span><span data-dcnode-id="139" instrument_node="">
</span><div class="entry-content" data-dcnode-id="64"><span data-dcnode-id="138" instrument_node="">
</span><p data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">Considering all the arguments that are presented in favour of and against blood flagellation, the safest course of action to take would be to refrain from the rituals. Consider the following four scenarios*:</span></p><span data-dcnode-id="135" instrument_node="">
</span><p data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">1, If a person performs blood shedding and if the act is detrimental for all the reasons that have been given, then that person would be committing some serious sins.</span></p><span data-dcnode-id="132" instrument_node="">
</span><p data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">2, If a person performs blood shedding and if the detriments are not real then the merit of performing the acts is very minimal since Ahlulbayt (a) would not refrain from a significantly meritorious act.</span></p><span data-dcnode-id="129" instrument_node="">
</span><p data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">3, If a person refrains from the performance of blood shedding and if the act is detrimental for all the reasons that have been given, then that person would receive rewards for refraining from a harmful act that was not practiced by Ahlulbayt (a).</span></p><span data-dcnode-id="126" instrument_node="">
</span><p data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">4, If a person refrains from the performance of blood shedding and if the detriments are not real then the merits lost due to non-performance is very minimal since Ahlulbayt (a) would not refrain from a significantly meritorious act.</span></p><span data-dcnode-id="123" instrument_node="">
</span><p data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">The argument can be summarized using the following decision matrix:</span></p><span data-dcnode-id="120" instrument_node="">
</span><span data-dcnode-id="119" instrument_node="">
</span><span data-dcnode-id="118" instrument_node="">
