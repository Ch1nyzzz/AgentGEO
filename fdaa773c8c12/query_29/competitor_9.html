</span><div class="article-content retro-folders" data-dcnode-id="921" id="main-article"><span data-dcnode-id="7077" instrument_node="">
</span><p data-dcnode-id="7076"></p><div class="quoteright" data-dcnode-id="7073" style="width:268px;"><div class="lazy_load_img_box" data-dcnode-id="7074" style="padding-top:149.25%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/left_behind_book_cover_8648.jpg" border="0" class="embeddedimage" data-dcnode-id="7075" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/left_behind_book_cover_8648.jpg&amp;raw" width="268"></div></div><p data-dcnode-id="7072"></p><div class="indent" data-dcnode-id="7060"><em data-dcnode-id="7070"><span data-dcnode-id="7071" instrument_node="">"For the Lord Himself will descend from heaven with a shout, with the voice of an archangel, and with the trumpet of God. And the dead in Christ will rise first. Then we who are alive and remain shall be caught up together with them in the clouds to meet the Lord in the air. And thus we shall always be with the Lord."</span></em><div class="indent" data-dcnode-id="7061"><span data-dcnode-id="7069" instrument_node="">— </span><strong data-dcnode-id="7066"><a class="twikilink" data-dcnode-id="7067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/BooksOfThessalonians" title="/pmwiki/pmwiki.php/Literature/BooksOfThessalonians"><span data-dcnode-id="7068" instrument_node="">1 Thessalonians 4:16-17</span></a></strong><span data-dcnode-id="7065" instrument_node="">, </span><em data-dcnode-id="7062"><a class="twikilink" data-dcnode-id="7063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="7064" instrument_node="">The Bible</span></a></em></div></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="7054"><span class="ad-caption" data-dcnode-id="7058"><span data-dcnode-id="7059" instrument_node="">Advertisement:</span></span><div data-dcnode-id="7055" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="7047"><a class="twikilink" data-dcnode-id="7052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TropeCodifier" title="/pmwiki/pmwiki.php/Main/TropeCodifier"><span data-dcnode-id="7053" instrument_node="">The one that</span></a><span data-dcnode-id="7051" instrument_node=""> made </span><a class="twikilink" data-dcnode-id="7049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CaughtUpInTheRapture" title="/pmwiki/pmwiki.php/Main/CaughtUpInTheRapture"><span data-dcnode-id="7050" instrument_node="">the Rapture</span></a><span data-dcnode-id="7048" instrument_node=""> common knowledge.</span></p><p data-dcnode-id="7006"><span data-dcnode-id="7046" instrument_node="">While not quite the first — the </span><em data-dcnode-id="7043"><a class="twikilink" data-dcnode-id="7044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ChristCloneTrilogy" title="/pmwiki/pmwiki.php/Literature/ChristCloneTrilogy"><span data-dcnode-id="7045" instrument_node="">Christ Clone Trilogy</span></a></em><span data-dcnode-id="7042" instrument_node=""> was around earlier, and Salem Kirban's more out-there </span><em data-dcnode-id="7040"><span data-dcnode-id="7041" instrument_node="">666</span></em><span data-dcnode-id="7039" instrument_node=""> before that — </span><em data-dcnode-id="7037"><span data-dcnode-id="7038" instrument_node="">Left Behind</span></em><span data-dcnode-id="7036" instrument_node=""> is </span><strong data-dcnode-id="7034"><span data-dcnode-id="7035" instrument_node="">the</span></strong><span data-dcnode-id="7033" instrument_node=""> Christian End Times series as far as public recognition goes, at least in America. Written over the course of a decade by </span><a class="twikilink" data-dcnode-id="7031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/TimLaHaye" title="/pmwiki/pmwiki.php/Creator/TimLaHaye"><span data-dcnode-id="7032" instrument_node="">Tim LaHaye</span></a><span data-dcnode-id="7030" instrument_node=""> and Jerry Jenkins, </span><em data-dcnode-id="7028"><span data-dcnode-id="7029" instrument_node="">Left Behind</span></em><span data-dcnode-id="7027" instrument_node=""> and its sequels offer a fictionalized version of future history and </span><a class="twikilink" data-dcnode-id="7025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt" title="/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt"><span data-dcnode-id="7026" instrument_node="">the dramatic end of the world</span></a><span data-dcnode-id="7024" instrument_node="">, as understood by the </span><a class="urllink" data-dcnode-id="7021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Premillennialism"><span data-dcnode-id="7023" instrument_node="">Premillennial</span><img data-dcnode-id="7022" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="7020" instrument_node=""> </span><a class="urllink" data-dcnode-id="7017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Dispensationalism"><span data-dcnode-id="7019" instrument_node="">Dispensationalist</span><img data-dcnode-id="7018" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="7016" instrument_node=""> Christian tradition. </span><a class="twikilink" data-dcnode-id="7014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TwentyMinutesIntoTheFuture" title="/pmwiki/pmwiki.php/Main/TwentyMinutesIntoTheFuture"><span data-dcnode-id="7015" instrument_node="">20 Minutes into the Future</span></a><span data-dcnode-id="7013" instrument_node="">, millions of Christians suddenly disappear without a trace, as the ancient cosmic war between Good and Evil speeds toward its culmination, and a new regime </span><a class="twikilink" data-dcnode-id="7011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Dystopia" title="/pmwiki/pmwiki.php/Main/Dystopia"><span data-dcnode-id="7012" instrument_node="">unlike any other</span></a><span data-dcnode-id="7010" instrument_node=""> seizes power over the globe. Of those </span><a class="twikilink" data-dcnode-id="7008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TitleDrop" title="/pmwiki/pmwiki.php/Main/TitleDrop"><span data-dcnode-id="7009" instrument_node="">left behind</span></a><span data-dcnode-id="7007" instrument_node=""> in a world of descending darkness, who will succumb, and who will struggle for the light?</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="7000"><span class="ad-caption" data-dcnode-id="7004"><span data-dcnode-id="7005" instrument_node="">Advertisement:</span></span><div data-dcnode-id="7001" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="6983"><span data-dcnode-id="6999" instrument_node="">The good guys are a rotating group (due to the </span><a class="twikilink" data-dcnode-id="6997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnyoneCanDie" title="/pmwiki/pmwiki.php/Main/AnyoneCanDie"><span data-dcnode-id="6998" instrument_node="">inherent high mortality rate</span></a><span data-dcnode-id="6996" instrument_node=""> associated with living in the End Times and fighting the Prince of Darkness) of 4-5 who call themselves the </span><a class="twikilink" data-dcnode-id="6994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheSomethingForce" title="/pmwiki/pmwiki.php/Main/TheSomethingForce"><span data-dcnode-id="6995" instrument_node="">Tribulation Force</span></a><span data-dcnode-id="6993" instrument_node="">. The bad guy is </span><a class="twikilink" data-dcnode-id="6991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LouisCypher" title="/pmwiki/pmwiki.php/Main/LouisCypher"><span data-dcnode-id="6992" instrument_node="">Nicolae Carpathia</span></a><span data-dcnode-id="6990" instrument_node="">, </span><a class="twikilink" data-dcnode-id="6988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheAntichrist" title="/pmwiki/pmwiki.php/Main/TheAntichrist"><span data-dcnode-id="6989" instrument_node="">The Antichrist</span></a><span data-dcnode-id="6987" instrument_node="">, the most evil of all </span><a class="twikilink" data-dcnode-id="6985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilOverlord" title="/pmwiki/pmwiki.php/Main/EvilOverlord"><span data-dcnode-id="6986" instrument_node="">Evil Overlords</span></a><span data-dcnode-id="6984" instrument_node="">.</span></p><p data-dcnode-id="6981"><span data-dcnode-id="6982" instrument_node="">At first, the Tribulation Force consists of: Rayford Steele, the unofficial leader and a pilot who planned on cheating on his wife (Irene) with a flight attendant (Hattie) because of how his wife's preaching annoyed him; Chloe, Ray's college-age daughter; Cameron "Buck" Williams, an adventurous, street savvy newspaper reporter who eventually marries Chloe; and Bruce, the pastor who brings them all together. Thus united, they launch a crusade to convert the world and protect the converts while waiting through seven years of judgments between the Rapture and the Glorious Appearing of Christ at the end of the world.</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="6975"><span class="ad-caption" data-dcnode-id="6979"><span data-dcnode-id="6980" instrument_node="">Advertisement:</span></span><div data-dcnode-id="6976" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="6964"><span data-dcnode-id="6974" instrument_node="">The completed story sequence includes sixteen novels in all, of which twelve are the main series, chronicling events from the Rapture to the Glorious Appearing. They are followed by a trilogy of prequels (dealing with the birth of the Antichrist and the various signs leading up to the Rapture), as well as the sequel </span><em data-dcnode-id="6972"><span data-dcnode-id="6973" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="6971" instrument_node="">, which shows the millennial kingdom of Christ on earth and the final battle against Satan and his followers </span><a class="twikilink" data-dcnode-id="6969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DistantFinale" title="/pmwiki/pmwiki.php/Main/DistantFinale"><span data-dcnode-id="6970" instrument_node="">in the far future</span></a><span data-dcnode-id="6968" instrument_node="">. (For the individual plot summaries of each of the novels, see the </span><a class="twikilink" data-dcnode-id="6966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Recap/LeftBehind" title="/pmwiki/pmwiki.php/Recap/LeftBehind"><span data-dcnode-id="6967" instrument_node="">Recap page</span></a><span data-dcnode-id="6965" instrument_node="">.) In publishing order, they are:</span></p><ul data-dcnode-id="6883"><li data-dcnode-id="6959"><span data-dcnode-id="6963" instrument_node=""> </span><em data-dcnode-id="6961"><span data-dcnode-id="6962" instrument_node="">Left Behind: A Novel of the Earth's Last Days</span></em><span data-dcnode-id="6960" instrument_node=""> (1995)</span></li><li data-dcnode-id="6954"><span data-dcnode-id="6958" instrument_node=""> </span><em data-dcnode-id="6956"><span data-dcnode-id="6957" instrument_node="">Tribulation Force: The Continuing Drama of Those Left Behind</span></em><span data-dcnode-id="6955" instrument_node=""> (1996)</span></li><li data-dcnode-id="6949"><span data-dcnode-id="6953" instrument_node=""> </span><em data-dcnode-id="6951"><span data-dcnode-id="6952" instrument_node="">Nicolae: The Rise of Antichrist</span></em><span data-dcnode-id="6950" instrument_node=""> (1997)</span></li><li data-dcnode-id="6944"><span data-dcnode-id="6948" instrument_node=""> </span><em data-dcnode-id="6946"><span data-dcnode-id="6947" instrument_node="">Soul Harvest: The World Takes Sides</span></em><span data-dcnode-id="6945" instrument_node=""> (1999)</span></li><li data-dcnode-id="6939"><span data-dcnode-id="6943" instrument_node=""> </span><em data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node="">Apollyon: The Destroyer is Unleashed</span></em><span data-dcnode-id="6940" instrument_node=""> (1999)</span></li><li data-dcnode-id="6934"><span data-dcnode-id="6938" instrument_node=""> </span><em data-dcnode-id="6936"><span data-dcnode-id="6937" instrument_node="">Assassins: Assignment: Jerusalem, Target: Antichrist</span></em><span data-dcnode-id="6935" instrument_node=""> (1999)</span></li><li data-dcnode-id="6929"><span data-dcnode-id="6933" instrument_node=""> </span><em data-dcnode-id="6931"><span data-dcnode-id="6932" instrument_node="">The Indwelling: The Beast Takes Possession</span></em><span data-dcnode-id="6930" instrument_node=""> (2000)</span></li><li data-dcnode-id="6924"><span data-dcnode-id="6928" instrument_node=""> </span><em data-dcnode-id="6926"><span data-dcnode-id="6927" instrument_node="">The Mark: The Beast Rules the World</span></em><span data-dcnode-id="6925" instrument_node=""> (2000)</span></li><li data-dcnode-id="6919"><span data-dcnode-id="6923" instrument_node=""> </span><em data-dcnode-id="6921"><span data-dcnode-id="6922" instrument_node="">Desecration: Antichrist Takes the Throne</span></em><span data-dcnode-id="6920" instrument_node=""> (2001)</span></li><li data-dcnode-id="6914"><span data-dcnode-id="6918" instrument_node=""> </span><em data-dcnode-id="6916"><span data-dcnode-id="6917" instrument_node="">The Remnant: On the Brink of Armageddon</span></em><span data-dcnode-id="6915" instrument_node=""> (2002)</span></li><li data-dcnode-id="6909"><span data-dcnode-id="6913" instrument_node=""> </span><em data-dcnode-id="6911"><span data-dcnode-id="6912" instrument_node="">Armageddon: The Cosmic Battle of the Ages</span></em><span data-dcnode-id="6910" instrument_node=""> (2003)</span></li><li data-dcnode-id="6904"><span data-dcnode-id="6908" instrument_node=""> </span><em data-dcnode-id="6906"><span data-dcnode-id="6907" instrument_node="">Glorious Appearing: The End of Days</span></em><span data-dcnode-id="6905" instrument_node=""> (2004)</span></li><li data-dcnode-id="6899"><span data-dcnode-id="6903" instrument_node=""> </span><em data-dcnode-id="6901"><span data-dcnode-id="6902" instrument_node="">The Rising: Antichrist is Born</span></em><span data-dcnode-id="6900" instrument_node=""> (The first prequel novel; 2005)</span></li><li data-dcnode-id="6894"><span data-dcnode-id="6898" instrument_node=""> </span><em data-dcnode-id="6896"><span data-dcnode-id="6897" instrument_node="">The Regime: Evil Advances</span></em><span data-dcnode-id="6895" instrument_node=""> (The second prequel novel; 2005)</span></li><li data-dcnode-id="6889"><span data-dcnode-id="6893" instrument_node=""> </span><em data-dcnode-id="6891"><span data-dcnode-id="6892" instrument_node="">The Rapture: In the Twinkling of an Eye</span></em><span data-dcnode-id="6890" instrument_node=""> (The third prequel novel; 2006)</span></li><li data-dcnode-id="6884"><span data-dcnode-id="6888" instrument_node=""> </span><em data-dcnode-id="6886"><span data-dcnode-id="6887" instrument_node="">Kingdom Come: The Final Victory</span></em><span data-dcnode-id="6885" instrument_node=""> (The sequel; 2007)</span></li></ul><p data-dcnode-id="6878"><span data-dcnode-id="6882" instrument_node="">Additionally, there is </span><em data-dcnode-id="6880"><span data-dcnode-id="6881" instrument_node="">Left Behind: The Kids</span></em><span data-dcnode-id="6879" instrument_node="">, a Young Adult series spanning forty volumes, which is set in the same continuity and follows a different group of younger protagonists on a quest related to but separate from that of the main Tribulation Force. For a list of the titles in this series, see again the recap page.</span></p><p data-dcnode-id="6859"><em data-dcnode-id="6876"><span data-dcnode-id="6877" instrument_node="">Left Behind</span></em><span data-dcnode-id="6875" instrument_node=""> has also been made into </span><a class="twikilink" data-dcnode-id="6873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/LeftBehind2000" title="/pmwiki/pmwiki.php/Film/LeftBehind2000"><span data-dcnode-id="6874" instrument_node="">three direct-to-video films</span></a><span data-dcnode-id="6872" instrument_node="">, the first of which saw a brief theatrical release the week </span><em data-dcnode-id="6870"><span data-dcnode-id="6871" instrument_node="">after</span></em><span data-dcnode-id="6869" instrument_node=""> the video hit the stores. It's also spun off into graphic novels, a series of young adult novels (with teen protagonists experiencing these events in their own way), and even a PC game, </span><em data-dcnode-id="6865"><a class="urllink" data-dcnode-id="6866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Left_Behind%253A_Eternal_Forces"><span data-dcnode-id="6868" instrument_node="">Left Behind: Eternal Forces</span><img data-dcnode-id="6867" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="6864" instrument_node="">. Incidentally, the PC game gained criticism from </span><a class="urllink" data-dcnode-id="6861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jack_Thompson_%28activist%29"><span data-dcnode-id="6863" instrument_node="">Jack Thompson,</span><img data-dcnode-id="6862" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="6860" instrument_node=""> who claimed it was incompatible with basic Christian doctrine (on account of all the killing) and that it encouraged religious bigotry. Others disagreed with this, even going so far as to call it malicious misrepresentation, though ultimately the game received mixed reviews.</span></p><p data-dcnode-id="6850"><span data-dcnode-id="6858" instrument_node="">A reboot film of the first book, </span><em data-dcnode-id="6855"><a class="twikilink" data-dcnode-id="6856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/LeftBehind2014" title="/pmwiki/pmwiki.php/Film/LeftBehind2014"><span data-dcnode-id="6857" instrument_node="">Left Behind (2014)</span></a></em><span data-dcnode-id="6854" instrument_node=""> was released in theaters on October 3, 2014, directed by Vic Armstrong and starring </span><a class="twikilink" data-dcnode-id="6852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/NicolasCage" title="/pmwiki/pmwiki.php/Creator/NicolasCage"><span data-dcnode-id="6853" instrument_node="">Nicolas Cage</span></a><span data-dcnode-id="6851" instrument_node="">, Cassi Thomson, and Chad Michael Murray. It covers only the first half of the first book, though it expands on that half by making the story an airline disaster film.</span></p><p data-dcnode-id="6849"></p><hr data-dcnode-id="6848"><h2 data-dcnode-id="6846"><span data-dcnode-id="6847" instrument_node="">The series as a whole provides examples of:</span></h2><ul data-dcnode-id="6420"><li data-dcnode-id="6841"><span data-dcnode-id="6845" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdultFear" title="/pmwiki/pmwiki.php/Main/AdultFear"><span data-dcnode-id="6844" instrument_node="">Adult Fear</span></a><span data-dcnode-id="6842" instrument_node="">: Losing a child to the Rapture produces this in the various people who are left behind in all adaptations of the story.</span></li><li data-dcnode-id="6836"><span data-dcnode-id="6840" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AfterTheEnd" title="/pmwiki/pmwiki.php/Main/AfterTheEnd"><span data-dcnode-id="6839" instrument_node="">After the End</span></a><span data-dcnode-id="6837" instrument_node="">: ...well, after the first end. The second end is still a while away. And not really an ending.</span></li><li data-dcnode-id="6828"><span data-dcnode-id="6835" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnyoneCanDie" title="/pmwiki/pmwiki.php/Main/AnyoneCanDie"><span data-dcnode-id="6834" instrument_node="">Anyone Can Die</span></a><span data-dcnode-id="6832" instrument_node="">: Except for one person, </span><span class="spoiler" data-dcnode-id="6830" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="6831" instrument_node="">Rayford Steele</span></span><span data-dcnode-id="6829" instrument_node="">, all of the people we get to know end up dying in various painful and/or messy ways.</span></li><li data-dcnode-id="6811"><span data-dcnode-id="6827" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ApocalypseHow" title="/pmwiki/pmwiki.php/Main/ApocalypseHow"><span data-dcnode-id="6826" instrument_node="">Apocalypse How</span></a><span data-dcnode-id="6824" instrument_node="">: a level 1 (global </span><a class="twikilink" data-dcnode-id="6822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DepopulationBomb" title="/pmwiki/pmwiki.php/Main/DepopulationBomb"><span data-dcnode-id="6823" instrument_node="">Depopulation Bomb</span></a><span data-dcnode-id="6821" instrument_node="">) followed by a level X (the annihilation of the entire </span><em data-dcnode-id="6819"><span data-dcnode-id="6820" instrument_node="">physical</span></em><span data-dcnode-id="6818" instrument_node=""> Earth and its </span><em data-dcnode-id="6816"><span data-dcnode-id="6817" instrument_node="">firmament</span></em><span data-dcnode-id="6815" instrument_node="">, and the creation of the </span><em data-dcnode-id="6813"><span data-dcnode-id="6814" instrument_node="">new Heaven and new Earth</span></em><span data-dcnode-id="6812" instrument_node="">.).</span></li><li data-dcnode-id="6789"><span data-dcnode-id="6810" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicenseEconomics" title="/pmwiki/pmwiki.php/Main/ArtisticLicenseEconomics"><span data-dcnode-id="6809" instrument_node="">Artistic License – Economics</span></a><span data-dcnode-id="6807" instrument_node="">:</span><ul data-dcnode-id="6790"><li data-dcnode-id="6793"><span data-dcnode-id="6806" instrument_node=""> A near-miraculous (</span><a class="twikilink" data-dcnode-id="6804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AWizardDidIt" title="/pmwiki/pmwiki.php/Main/AWizardDidIt"><span data-dcnode-id="6805" instrument_node="">almost literally in this case</span></a><span data-dcnode-id="6803" instrument_node="">) fertilizer is invented by an Israeli scientist, and the exact chemical formula is kept secret as a matter of national security by the Israeli government. It is put to work making vast tracts of Israel into super-productive mega-farms, turning it into a produce export powerhouse. This ignores the fact that a) Israel being able to produce as much food as the state of New Jersey is not going to cause as big a wave in the international market as the authors think, and b) even if it does, such a continuous bumper-crop on the market would likely depress food prices, quickly rendering the return on the investment in such a project minimal, and other nations would likely enact protectionist import policies on Israeli-grown foodstuffs to keep their own farming industries from collapsing and dragging those nations into economic ruin. </span><a class="twikilink" data-dcnode-id="6801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CutLexLuthorACheck" title="/pmwiki/pmwiki.php/Main/CutLexLuthorACheck"><span data-dcnode-id="6802" instrument_node="">More profitable for the state of Israel</span></a><span data-dcnode-id="6800" instrument_node=""> would be to produce and export the fertilizer itself, or to allow others to produce it under paid license agreements. However, according to the authors the </span><a class="twikilink" data-dcnode-id="6798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="6799" instrument_node="">Book of Revelations</span></a><span data-dcnode-id="6797" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo" title="/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo"><span data-dcnode-id="6796" instrument_node="">says that the desert will bloom</span></a><span data-dcnode-id="6794" instrument_node="">, and so goes the books.</span></li><li data-dcnode-id="6791"><span data-dcnode-id="6792" instrument_node=""> There is hardly any significant economic upheaval following the Rapture. Massive gluts of Rapture-abandoned property flooding markets, disruption of supply chains due to mass bereavement, the utter destruction of some industries (anything child-related) combined with the explosive need for others (grief counseling and fertility services) - combined with the political unrest as a huge chunk of the population disappeared with no explanation, countries should be on the verge of collapse, yet life goes on completely normally for Our Heroes.</span></li></ul></li><li data-dcnode-id="6776"><span data-dcnode-id="6788" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicenseGeography" title="/pmwiki/pmwiki.php/Main/ArtisticLicenseGeography"><span data-dcnode-id="6787" instrument_node="">Artistic License – Geography</span></a><span data-dcnode-id="6785" instrument_node="">:</span><ul data-dcnode-id="6777"><li data-dcnode-id="6783"><span data-dcnode-id="6784" instrument_node=""> One book describes large ships sailing the Jordan River. In reality, the River Jordan has an average depth of 6 feet and only small pleasure crafts can sail on it. For most of the river's length it is more a small creek than a river.</span></li><li data-dcnode-id="6778"><span data-dcnode-id="6782" instrument_node=""> Upon arriving in Penn Station in New York City, Buck walks for miles and miles and miles, until he's ready to drop from exhaustion, finds a bicycle, counts it as a miracle from God, and rides it for miles more before arriving in Midtown Manhattan. Problem One: Penn Station is </span><em data-dcnode-id="6780"><span data-dcnode-id="6781" instrument_node="">in</span></em><span data-dcnode-id="6779" instrument_node=""> Midtown Manhattan. Problem Two: The island of Manhattan is only 13.4 miles long (Penn Station is about three miles from its southern tip) and 2.3 miles wide at its widest point. There aren't a lot of places in it that require traveling miles and miles and miles to reach.</span></li></ul></li><li data-dcnode-id="6710"><span data-dcnode-id="6775" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicenseMilitary" title="/pmwiki/pmwiki.php/Main/ArtisticLicenseMilitary"><span data-dcnode-id="6774" instrument_node="">Artistic License – Military</span></a><span data-dcnode-id="6772" instrument_node="">:</span><ul data-dcnode-id="6711"><li data-dcnode-id="6749"><span data-dcnode-id="6771" instrument_node=""> When Russia and Ethiopia tag-team Israel (despite both being Christian nations who have no reason whatsoever to do so), they launch fighter jets and nukes. </span><em data-dcnode-id="6769"><span data-dcnode-id="6770" instrument_node="">In tandem.</span></em><span data-dcnode-id="6768" instrument_node=""> The </span><em data-dcnode-id="6766"><span data-dcnode-id="6767" instrument_node="">Enola Gay</span></em><span data-dcnode-id="6765" instrument_node="">, when dropping the fateful bomb on </span><a class="twikilink" data-dcnode-id="6763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/AtomicBombingsOfHiroshimaAndNagasaki" title="/pmwiki/pmwiki.php/UsefulNotes/AtomicBombingsOfHiroshimaAndNagasaki"><span data-dcnode-id="6764" instrument_node="">Hiroshima</span></a><span data-dcnode-id="6762" instrument_node="">, flew at a height of approximately 32,333 feet, more than six miles above sea level, just to stay out of the blast zone, whereas fighter jets as described in the novel do not have that kind of range. Using nukes on the same area that you are also using your air force to </span><em data-dcnode-id="6760"><span data-dcnode-id="6761" instrument_node="">bomb</span></em><span data-dcnode-id="6759" instrument_node=""> means that you would essentially be nuking your own planes. Not to mention that bombing a city at all </span><em data-dcnode-id="6757"><span data-dcnode-id="6758" instrument_node="">after</span></em><span data-dcnode-id="6756" instrument_node=""> you fucking </span><strong data-dcnode-id="6754"><span data-dcnode-id="6755" instrument_node="">nuke it</span></strong><span data-dcnode-id="6753" instrument_node=""> would be </span><a class="twikilink" data-dcnode-id="6751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThereIsNoKillLikeOverkill" title="/pmwiki/pmwiki.php/Main/ThereIsNoKillLikeOverkill"><span data-dcnode-id="6752" instrument_node="">a needlessly redundant waste of resources</span></a><span data-dcnode-id="6750" instrument_node="">.</span></li><li data-dcnode-id="6741"><span data-dcnode-id="6748" instrument_node=""> LaHaye and Jenkins tell us that Russia used "almost its entire nuclear arsenal" on Israel. Russia has over 4,000 nuclear devices, enough to destroy every country on the planet. Israel is the size of New Jersey. Granted, Israel explicitly needs a literal divine intervention to survive this (and fortunately for them, they also </span><a class="twikilink" data-dcnode-id="6746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DivineIntervention" title="/pmwiki/pmwiki.php/Main/DivineIntervention"><span data-dcnode-id="6747" instrument_node="">get one</span></a><span data-dcnode-id="6745" instrument_node="">), but even so, it's a </span><a class="twikilink" data-dcnode-id="6743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThereIsNoKillLikeOverkill" title="/pmwiki/pmwiki.php/Main/ThereIsNoKillLikeOverkill"><span data-dcnode-id="6744" instrument_node="">silly level of overkill</span></a><span data-dcnode-id="6742" instrument_node=""> as far as the Russian strategists are concerned.</span></li><li data-dcnode-id="6733"><span data-dcnode-id="6740" instrument_node=""> Carpathia, upon his ascension to the UN, suggests that all countries on Earth give up all their military materiel and turn over 1/10th of what's left to the UN to serve as a global army. Everyone accepts this. Ignoring the fact that the UN has been been pushing </span><em data-dcnode-id="6738"><span data-dcnode-id="6739" instrument_node="">limited</span></em><span data-dcnode-id="6737" instrument_node=""> disarmament for </span><em data-dcnode-id="6735"><span data-dcnode-id="6736" instrument_node="">decades</span></em><span data-dcnode-id="6734" instrument_node=""> with not much success. Also, ever since the UN was founded there has already existed a clause in the UN charter (chapter 7, art. 43) establishing a UN military force ... and it's been ignored ever since the UN was founded.</span></li><li data-dcnode-id="6712"><span data-dcnode-id="6732" instrument_node=""> At the end of Book 2 and the beginning of Book 3, Nicolae </span><em data-dcnode-id="6730"><span data-dcnode-id="6731" instrument_node="">finally</span></em><span data-dcnode-id="6729" instrument_node=""> does something properly evil by launching World War III. This takes the form of WWII-style bombing raids dropping </span><em data-dcnode-id="6727"><span data-dcnode-id="6728" instrument_node="">100-megaton</span></em><span data-dcnode-id="6726" instrument_node=""> nuclear bombs on such targets as hospitals and airports, leaving the cities looking like London during The Blitz. The largest human-caused explosion </span><em data-dcnode-id="6724"><span data-dcnode-id="6725" instrument_node="">ever</span></em><span data-dcnode-id="6723" instrument_node=""> was the </span><a class="urllink" data-dcnode-id="6720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tsar_Bomba"><span data-dcnode-id="6722" instrument_node="">Tsar Bomba</span><img data-dcnode-id="6721" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="6719" instrument_node=""> atomic bomb test, which was a "mere" </span><em data-dcnode-id="6717"><span data-dcnode-id="6718" instrument_node="">fifty</span></em><span data-dcnode-id="6716" instrument_node=""> megatons, but which still destroyed small buildings hundreds of kilometers away. Dropping a </span><em data-dcnode-id="6714"><span data-dcnode-id="6715" instrument_node="">single</span></em><span data-dcnode-id="6713" instrument_node=""> 100-megaton nuke (never mind a bombing raid's worth) would reduce the cities to glass craters; targeting individual buildings would be pointless. Also, the bomber problem mentioned above would be orders of magnitude worse.</span></li></ul></li><li data-dcnode-id="6679"><span data-dcnode-id="6709" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicenseReligion" title="/pmwiki/pmwiki.php/Main/ArtisticLicenseReligion"><span data-dcnode-id="6708" instrument_node="">Artistic License – Religion</span></a><span data-dcnode-id="6706" instrument_node="">: You have to be in a </span><em data-dcnode-id="6704"><span data-dcnode-id="6705" instrument_node="">very</span></em><span data-dcnode-id="6703" instrument_node=""> specific branch of Christianity to agree with the authors' interpretation of </span><a class="twikilink" data-dcnode-id="6701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="6702" instrument_node="">The Bible</span></a><span data-dcnode-id="6700" instrument_node="">.</span><ul data-dcnode-id="6680"><li data-dcnode-id="6698"><span data-dcnode-id="6699" instrument_node=""> In-universe, the Christian denominations that don't hold to that particular teaching of the end times get left behind. However, there are some surprising exceptions, like the Catholic congregation in South America whose priest believes in the Rapture.</span></li><li data-dcnode-id="6686"><span data-dcnode-id="6697" instrument_node=""> Combined with </span><a class="twikilink" data-dcnode-id="6695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicenseLinguistics" title="/pmwiki/pmwiki.php/Main/ArtisticLicenseLinguistics"><span data-dcnode-id="6696" instrument_node="">Artistic License – Linguistics</span></a><span data-dcnode-id="6694" instrument_node="">, in </span><em data-dcnode-id="6692"><span data-dcnode-id="6693" instrument_node="">The Rising</span></em><span data-dcnode-id="6691" instrument_node="">, the authors have a curious etymology for Lucifer's name, from Latin lux, or lucis (light) and ferrum (iron) — in other words, Iron (or Iron-hard) Light. They may have the language and "light" part right, but, in fact, most Christian scholars can tell you that Lucifer actually came from lucem ferre — Light-Bearer. </span><a class="urllink" data-dcnode-id="6688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Lucifer"><span data-dcnode-id="6690" instrument_node="">See here</span><img data-dcnode-id="6689" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="6687" instrument_node="">.</span></li><li data-dcnode-id="6681"><span data-dcnode-id="6685" instrument_node=""> The depiction of Judaism is just... bizarre. Characters explicitly identified as world-renowned religious scholars are </span><a class="twikilink" data-dcnode-id="6683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IdiotBall" title="/pmwiki/pmwiki.php/Main/IdiotBall"><span data-dcnode-id="6684" instrument_node="">blown away when they hear the bare tenets of Christianity</span></a><span data-dcnode-id="6682" instrument_node="">, and none of them bring up any of the many real-world reasons that Jews don't believe Jesus was the (or a) messiah.</span></li></ul></li><li data-dcnode-id="6662"><span data-dcnode-id="6678" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicenseSports" title="/pmwiki/pmwiki.php/Main/ArtisticLicenseSports"><span data-dcnode-id="6677" instrument_node="">Artistic License – Sports</span></a><span data-dcnode-id="6675" instrument_node="">: Boy </span><em data-dcnode-id="6673"><span data-dcnode-id="6674" instrument_node="">howdy!</span></em><ul data-dcnode-id="6663"><li data-dcnode-id="6671"><span data-dcnode-id="6672" instrument_node=""> Rayford spent his childhood as a soccer player, and was praised for being simultaneously the team's top scorer and best defender. Not impossible by any stretch, but given that by the time kids make it to their early teenage years, they have a preferred position and have developed in it, it is most likely that Rayford would play box-to-box midfielder rather than defender, which would be the position that best suited his purported defensive and offensive acumen.</span></li><li data-dcnode-id="6669"><span data-dcnode-id="6670" instrument_node=""> Rayford quit playing soccer simply because he did not enjoy watching it. Fair enough. However, his criticisms of it, namely that professional players all play for 0-0 draws, is an oft-repeated and so-far-off-base comment compared with reality (0-0 draws do happen, but they are rather rare, and are often hated by fans of the game even more than by detractors), and given this book was written and released the very year after Arsenal FC in England finished an entire season undefeated by playing a very offensive game (admittedly something not widely circulated in America at the time, as the game hadn't yet caught on), these are facts that were easily searchable during the time of writing.</span></li><li data-dcnode-id="6664"><span data-dcnode-id="6668" instrument_node=""> Rayford was described as the best natural athlete his coach had ever seen, naturally gifted in ability and able to play football, basketball, and baseball as well as being a sprinter </span><em data-dcnode-id="6666"><span data-dcnode-id="6667" instrument_node="">and</span></em><span data-dcnode-id="6665" instrument_node=""> distance runner without effort. Given his soccer background, it has some weight in reality, as players need to have endurance for 90+ minutes of running and be able to sprint when needed, but very few soccer players could ever hope to match actual sprinters in ability (there are mutterings here and there, such as in 2015 when there was talk that Arsenal defender Hector Bellerin could potentially beat world record holder Usain Bolt in a 100m race), and regardless, when it comes to track and field, by the time of high school, most runners have settled for either distance or sprinting, very rarely both, as being good at both means one isn't great at either. In addition, in most high school athletic schedules, baseball and track-and-field take place in the same period (spring), and while small enough schools allow students to play multiple sports in one period, most schools only allow a student-athlete to play one at any given time.</span></li></ul></li><li data-dcnode-id="6657"><span data-dcnode-id="6661" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AsTheGoodBookSays" title="/pmwiki/pmwiki.php/Main/AsTheGoodBookSays"><span data-dcnode-id="6660" instrument_node="">As the Good Book Says...</span></a><span data-dcnode-id="6658" instrument_node="">: Bible verses aplenty, enough so that the last book in the series had to be published with a special copyright notice.</span></li><li data-dcnode-id="6652"><span data-dcnode-id="6656" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AudioAdaptation" title="/pmwiki/pmwiki.php/Main/AudioAdaptation"><span data-dcnode-id="6655" instrument_node="">Audio Adaptation</span></a><span data-dcnode-id="6653" instrument_node="">: Gap Digital produced Dramatic Audio presentations of the twelve main books in the series.</span></li><li data-dcnode-id="6638"><span data-dcnode-id="6651" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AuthorAvatar" title="/pmwiki/pmwiki.php/Main/AuthorAvatar"><span data-dcnode-id="6650" instrument_node="">Author Avatar</span></a><span data-dcnode-id="6648" instrument_node="">: The authors are </span><em data-dcnode-id="6646"><span data-dcnode-id="6647" instrument_node="">terrible</span></em><span data-dcnode-id="6645" instrument_node=""> about this, as they combine very obvious author avatars in the heroes (Rayford Steele for Tim LaHaye and Buck Williams for Jerry Jenkins). This gets really, really hilarious when the authors get things blatantly wrong due to their limited understanding of reality (Williams, supposedly "really physically fit", is about ready to pass out after a </span><em data-dcnode-id="6643"><span data-dcnode-id="6644" instrument_node="">two mile</span></em><span data-dcnode-id="6642" instrument_node=""> walk through the streets of New York - something that the overweight Jenkins probably would find uncomfortable).</span><ul data-dcnode-id="6639"><li data-dcnode-id="6640"><span data-dcnode-id="6641" instrument_node=""> Although it's worth mentioning that it's more severe with Buck, since Buck is Jenkins' avatar, and Jenkins is the one who does the actual writing.</span></li></ul></li><li data-dcnode-id="6633"><span data-dcnode-id="6637" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AuthorFilibuster" title="/pmwiki/pmwiki.php/Main/AuthorFilibuster"><span data-dcnode-id="6636" instrument_node="">Author Filibuster</span></a><span data-dcnode-id="6634" instrument_node="">: The authors are not afraid of parachuting a 30 page sermon into the plot.</span></li><li data-dcnode-id="6614"><span data-dcnode-id="6632" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AuthorTract" title="/pmwiki/pmwiki.php/Main/AuthorTract"><span data-dcnode-id="6631" instrument_node="">Author Tract</span></a><span data-dcnode-id="6629" instrument_node="">: The books are a narrative way for the authors to communicate their end-times theology, wrapped up in an </span><a class="twikilink" data-dcnode-id="6627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AirportFantasy" title="/pmwiki/pmwiki.php/Main/AirportFantasy"><span data-dcnode-id="6628" instrument_node="">Airport Fantasy</span></a><span data-dcnode-id="6626" instrument_node=""> package.</span><ul data-dcnode-id="6615"><li data-dcnode-id="6621"><span data-dcnode-id="6625" instrument_node=""> Also each book takes a moment and makes you read a section </span><em data-dcnode-id="6623"><span data-dcnode-id="6624" instrument_node="">aimed</span></em><span data-dcnode-id="6622" instrument_node=""> at the people of the earth to encourage them to accept Christ, but this is a very thinly veiled tract aimed at any readers who aren't already Christians.</span></li><li data-dcnode-id="6616"><span data-dcnode-id="6620" instrument_node=""> Also an author tract for their belief in Once Saved, Always Saved theology, as in the Tribulation period, it is said that Christians who have the Seal of God on their foreheads are incapable of losing their salvation and would never choose to take the </span><a class="twikilink" data-dcnode-id="6618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="6619" instrument_node="">Mark of the Beast</span></a><span data-dcnode-id="6617" instrument_node="">.</span></li></ul></li><li data-dcnode-id="6594"><span data-dcnode-id="6613" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeCarefulWhatYouWishFor" title="/pmwiki/pmwiki.php/Main/BeCarefulWhatYouWishFor"><span data-dcnode-id="6612" instrument_node="">Be Careful What You Wish For</span></a><span data-dcnode-id="6610" instrument_node="">: In the case of Marilena Carpathia, it's the desire to have a son. Too bad she gives birth to the Antichrist.</span><ul data-dcnode-id="6595"><li data-dcnode-id="6596"><span data-dcnode-id="6609" instrument_node=""> In </span><em data-dcnode-id="6607"><span data-dcnode-id="6608" instrument_node="">Assassins,</span></em><span data-dcnode-id="6606" instrument_node=""> when Leon Fortunato asks about whom David admires, he replies that he admires </span><a class="twikilink" data-dcnode-id="6604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/God" title="/pmwiki/pmwiki.php/Main/God"><span data-dcnode-id="6605" instrument_node="">his Father</span></a><span data-dcnode-id="6603" instrument_node="">. Leon expresses his desire to meet Him someday. Leon </span><em data-dcnode-id="6601"><span data-dcnode-id="6602" instrument_node="">does</span></em><span data-dcnode-id="6600" instrument_node=""> met David's Father at the end of </span><em data-dcnode-id="6598"><span data-dcnode-id="6599" instrument_node="">Glorious Appearing,</span></em><span data-dcnode-id="6597" instrument_node=""> just not the father he thought.</span></li></ul></li><li data-dcnode-id="6577"><span data-dcnode-id="6593" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo" title="/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo"><span data-dcnode-id="6592" instrument_node="">Because Destiny Says So</span></a><span data-dcnode-id="6590" instrument_node="">: Why did Russia (and Ethiopia) attack Israel? Because it was written that they would (well, that's how Tim LaHaye interpreted it, what was written was pretty vague on the details). Why would they world agree to suddenly follow one religion after so much bloody strife? It's written that they would. Not even a </span><a class="twikilink" data-dcnode-id="6588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Handwave" title="/pmwiki/pmwiki.php/Main/Handwave"><span data-dcnode-id="6589" instrument_node="">handwave</span></a><span data-dcnode-id="6587" instrument_node=""> that </span><a class="twikilink" data-dcnode-id="6585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheAntichrist" title="/pmwiki/pmwiki.php/Main/TheAntichrist"><span data-dcnode-id="6586" instrument_node="">The Antichrist</span></a><span data-dcnode-id="6584" instrument_node=""> is using mind control powers to make it happen. These people do these things solely because it's been foretold.</span><ul data-dcnode-id="6578"><li data-dcnode-id="6579"><span data-dcnode-id="6583" instrument_node=""> The Antichrist as well as The Other Light believe that they're fulfilling prophecy of Satan taking the place of God. Never mind that those same prophecies say that they're destined for failure. Also a bit of </span><a class="twikilink" data-dcnode-id="6581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewDestiny" title="/pmwiki/pmwiki.php/Main/ScrewDestiny"><span data-dcnode-id="6582" instrument_node="">Screw Destiny</span></a><span data-dcnode-id="6580" instrument_node=""> because they sure don't want God, the Jews, or the Christians to win.</span></li></ul></li><li data-dcnode-id="6572"><span data-dcnode-id="6576" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="6575" instrument_node="">Big Bad</span></a><span data-dcnode-id="6573" instrument_node="">: Nicolae Carpathia, Antichrist, leader of the Global Community and the Other Light, throughout much of the book series.</span></li><li data-dcnode-id="6558"><span data-dcnode-id="6571" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlackAndWhiteMorality" title="/pmwiki/pmwiki.php/Main/BlackAndWhiteMorality"><span data-dcnode-id="6570" instrument_node="">Black-and-White Morality</span></a><span data-dcnode-id="6568" instrument_node="">: On the macro scale, the Tribulation Force is capital-G Good, while the Global Community is Evil. However, there are increasing </span><a class="twikilink" data-dcnode-id="6566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShadesOfConflict" title="/pmwiki/pmwiki.php/Main/ShadesOfConflict"><span data-dcnode-id="6567" instrument_node="">Shades of Conflict</span></a><span data-dcnode-id="6565" instrument_node=""> on the lower level: many if not most Global Community enforcers are little more than </span><a class="twikilink" data-dcnode-id="6563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnwittingPawn" title="/pmwiki/pmwiki.php/Main/UnwittingPawn"><span data-dcnode-id="6564" instrument_node="">Unwitting Pawns</span></a><span data-dcnode-id="6562" instrument_node=""> who have no idea that their regime is literally Satanic, and some of them (such as </span><a class="twikilink" data-dcnode-id="6560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoomedMoralVictor" title="/pmwiki/pmwiki.php/Main/DoomedMoralVictor"><span data-dcnode-id="6561" instrument_node="">Krystall</span></a><span data-dcnode-id="6559" instrument_node="">) are actually good people who are trying their sincere best to do the right thing.</span></li><li data-dcnode-id="6547"><span data-dcnode-id="6557" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButNotTooEvil" title="/pmwiki/pmwiki.php/Main/ButNotTooEvil"><span data-dcnode-id="6556" instrument_node="">But Not Too Evil</span></a><span data-dcnode-id="6554" instrument_node="">: The original members of the Tribulation Force are all people who, prior to the Rapture, did not have the proper set of beliefs to be taken up by it, and hence they are </span><a class="twikilink" data-dcnode-id="6552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TitleDrop" title="/pmwiki/pmwiki.php/Main/TitleDrop"><span data-dcnode-id="6553" instrument_node="">left behind</span></a><span data-dcnode-id="6551" instrument_node="">, only coming to believe after the event has happened. However, they are all only "sinful" in very minor ways which require little repentance. For example, Buck, despite being a highly successful go-getting globe-trotting </span><a class="twikilink" data-dcnode-id="6549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IntrepidReporter" title="/pmwiki/pmwiki.php/Main/IntrepidReporter"><span data-dcnode-id="6550" instrument_node="">Intrepid Reporter</span></a><span data-dcnode-id="6548" instrument_node="">, remained a virgin until his marriage well into his thirties despite not having any particular reason to remain casually celibate beforehand. Rayford on the other hand was married and had a faithful wife, but harbored a crush on a co-worker, though the only time he tried to act on it was when the Rapture happened.</span></li><li data-dcnode-id="6536"><span data-dcnode-id="6546" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CaughtUpInTheRapture" title="/pmwiki/pmwiki.php/Main/CaughtUpInTheRapture"><span data-dcnode-id="6545" instrument_node="">Caught Up in the Rapture</span></a><span data-dcnode-id="6543" instrument_node="">: Kicks off the plot, complete with </span><a class="twikilink" data-dcnode-id="6541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EmptyPilesOfClothing" title="/pmwiki/pmwiki.php/Main/EmptyPilesOfClothing"><span data-dcnode-id="6542" instrument_node="">Empty Piles of Clothing</span></a><span data-dcnode-id="6540" instrument_node="">, and the story proper follows those who were - well, </span><a class="twikilink" data-dcnode-id="6538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin" title="/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin"><span data-dcnode-id="6539" instrument_node="">left behind</span></a><span data-dcnode-id="6537" instrument_node="">.</span></li><li data-dcnode-id="6522"><span data-dcnode-id="6535" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterShilling" title="/pmwiki/pmwiki.php/Main/CharacterShilling"><span data-dcnode-id="6534" instrument_node="">Character Shilling</span></a><span data-dcnode-id="6532" instrument_node="">: Characters like Buck and Rayford are presented as being at the top of their game, career-wise, being a fabulously well-known </span><a class="twikilink" data-dcnode-id="6530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IntrepidReporter" title="/pmwiki/pmwiki.php/Main/IntrepidReporter"><span data-dcnode-id="6531" instrument_node="">globe trotting journalist</span></a><span data-dcnode-id="6529" instrument_node=""> and a respected </span><a class="twikilink" data-dcnode-id="6527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AcePilot" title="/pmwiki/pmwiki.php/Main/AcePilot"><span data-dcnode-id="6528" instrument_node="">Ace Pilot</span></a><span data-dcnode-id="6526" instrument_node="">, respectively. However, </span><a class="twikilink" data-dcnode-id="6524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InformedAttribute" title="/pmwiki/pmwiki.php/Main/InformedAttribute"><span data-dcnode-id="6525" instrument_node="">we do not so much see them be good at their job as see other characters telling them that they are</span></a><span data-dcnode-id="6523" instrument_node="">.</span></li><li data-dcnode-id="6514"><span data-dcnode-id="6521" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChildrenAreInnocent" title="/pmwiki/pmwiki.php/Main/ChildrenAreInnocent"><span data-dcnode-id="6520" instrument_node="">Children Are Innocent</span></a><span data-dcnode-id="6518" instrument_node="">: Young children get an automatic ticket to heaven in the Rapture, ignoring (or answering, in universe) the </span><a class="twikilink" data-dcnode-id="6516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealLife" title="/pmwiki/pmwiki.php/Main/RealLife"><span data-dcnode-id="6517" instrument_node="">Real Life</span></a><span data-dcnode-id="6515" instrument_node=""> question of whether children are actually innocent or not.</span></li><li data-dcnode-id="6506"><span data-dcnode-id="6513" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ClosetGay" title="/pmwiki/pmwiki.php/Main/ClosetGay"><span data-dcnode-id="6512" instrument_node="">Closet Gay</span></a><span data-dcnode-id="6510" instrument_node="">: Buck's new boss Verna has concealed her lesbianism, which he manages to guess (with some help from God ... </span><a class="twikilink" data-dcnode-id="6508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane" title="/pmwiki/pmwiki.php/Main/MaybeMagicMaybeMundane"><span data-dcnode-id="6509" instrument_node="">maybe</span></a><span data-dcnode-id="6507" instrument_node="">). What follows is a potentially uncomfortable scene where the protagonists implicitly threaten to out her if she tries interviewing Rabbi Tsion Ben-Judah.</span></li><li data-dcnode-id="6499"><span data-dcnode-id="6505" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ColonCancer" title="/pmwiki/pmwiki.php/Main/ColonCancer"><span data-dcnode-id="6504" instrument_node="">Colon Cancer</span></a><span data-dcnode-id="6502" instrument_node="">: A whopping three colons in </span><em data-dcnode-id="6500"><span data-dcnode-id="6501" instrument_node="">Assassins: Assignment: Jerusalem, Target: Antichrist</span></em></li><li data-dcnode-id="6488"><span data-dcnode-id="6498" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ComicBookAdaptation" title="/pmwiki/pmwiki.php/Main/ComicBookAdaptation"><span data-dcnode-id="6497" instrument_node="">Comic-Book Adaptation</span></a><span data-dcnode-id="6495" instrument_node="">: The books </span><em data-dcnode-id="6493"><span data-dcnode-id="6494" instrument_node="">Left Behind</span></em><span data-dcnode-id="6492" instrument_node=""> and </span><em data-dcnode-id="6490"><span data-dcnode-id="6491" instrument_node="">Tribulation Force</span></em><span data-dcnode-id="6489" instrument_node=""> each had a five-issue adaptation.</span></li><li data-dcnode-id="6483"><span data-dcnode-id="6487" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ConspiracyTheorist" title="/pmwiki/pmwiki.php/Main/ConspiracyTheorist"><span data-dcnode-id="6486" instrument_node="">Conspiracy Theorist</span></a><span data-dcnode-id="6484" instrument_node="">: Buck Williams' informant Dirk Burton is played as one in both the novels and the movies. He surprisingly turns out to be right, as is competing investigative reporter Eric Miller when he is working on a piece about the coming one-world government that he and his wife get murdered for.</span></li><li data-dcnode-id="6478"><span data-dcnode-id="6482" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CorruptChurch" title="/pmwiki/pmwiki.php/Main/CorruptChurch"><span data-dcnode-id="6481" instrument_node="">Corrupt Church</span></a><span data-dcnode-id="6479" instrument_node="">: Enigma Babylon One World Faith, which consists of the Roman Catholic Church combined with other sects of Christianity that would not hold to fundamentalist doctrine as well as other religions. It would be dissolved by the midpoint of the Tribulation with the deaths of Peter Mathews and Nicolae Carpathia, only to soon be replaced by Carpathianism after Nicolae's "resurrection".</span></li><li data-dcnode-id="6473"><span data-dcnode-id="6477" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CorruptCorporateExecutive" title="/pmwiki/pmwiki.php/Main/CorruptCorporateExecutive"><span data-dcnode-id="6476" instrument_node="">Corrupt Corporate Executive</span></a><span data-dcnode-id="6474" instrument_node="">: Joshua Todd-Cothran and Jonathan Stonagal...until Nicolae executes the both of them. Prior to becoming the President of Romania, Carpathia himself personified this trope, as anyone who stood in his way was killed or bribed into submission.</span></li><li data-dcnode-id="6462"><span data-dcnode-id="6472" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CosyCatastrophe" title="/pmwiki/pmwiki.php/Main/CosyCatastrophe"><span data-dcnode-id="6471" instrument_node="">Cosy Catastrophe</span></a><span data-dcnode-id="6469" instrument_node="">: Due to </span><a class="twikilink" data-dcnode-id="6467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicenseEconomics" title="/pmwiki/pmwiki.php/Main/ArtisticLicenseEconomics"><span data-dcnode-id="6468" instrument_node="">Artistic License – Economics</span></a><span data-dcnode-id="6466" instrument_node=""> and the authors generally not thinking about it very hard, our heroes aren't bothered by the kind of economic upheaval you might expect when billions of people disappear — nor the anguish when </span><em data-dcnode-id="6464"><span data-dcnode-id="6465" instrument_node="">every child on Earth vanishes</span></em><span data-dcnode-id="6463" instrument_node="">.</span></li><li data-dcnode-id="6451"><span data-dcnode-id="6461" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DanBrowned" title="/pmwiki/pmwiki.php/Main/DanBrowned"><span data-dcnode-id="6460" instrument_node="">Dan Browned</span></a><span data-dcnode-id="6458" instrument_node="">: The authors go to great lengths to assert that these books are accurate predictions of things that </span><em data-dcnode-id="6456"><span data-dcnode-id="6457" instrument_node="">will</span></em><span data-dcnode-id="6455" instrument_node=""> happen once the rapture hits according to a strict interpretation of </span><a class="twikilink" data-dcnode-id="6453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="6454" instrument_node="">The Bible</span></a><span data-dcnode-id="6452" instrument_node="">. However, the series' interpretation of the Bible is only shared by a very small segment of Christian denominations.</span></li><li data-dcnode-id="6440"><span data-dcnode-id="6450" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeusExMachina" title="/pmwiki/pmwiki.php/Main/DeusExMachina"><span data-dcnode-id="6449" instrument_node="">Deus ex Machina</span></a><span data-dcnode-id="6447" instrument_node="">: </span><a class="twikilink" data-dcnode-id="6445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustifiedTrope" title="/pmwiki/pmwiki.php/Main/JustifiedTrope"><span data-dcnode-id="6446" instrument_node="">justified</span></a><span data-dcnode-id="6444" instrument_node=""> — after all, the whole series is basically </span><em data-dcnode-id="6442"><span data-dcnode-id="6443" instrument_node="">about</span></em><span data-dcnode-id="6441" instrument_node=""> God causing stuff to happen.</span></li><li data-dcnode-id="6435"><span data-dcnode-id="6439" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DevilInPlainSight" title="/pmwiki/pmwiki.php/Main/DevilInPlainSight"><span data-dcnode-id="6438" instrument_node="">Devil in Plain Sight</span></a><span data-dcnode-id="6436" instrument_node="">: Carpathia is literally this.</span></li><li data-dcnode-id="6421"><span data-dcnode-id="6434" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DivineConflict" title="/pmwiki/pmwiki.php/Main/DivineConflict"><span data-dcnode-id="6433" instrument_node="">Divine Conflict</span></a><span data-dcnode-id="6431" instrument_node="">: God vs. Satan, living out what was foretold in the </span><a class="twikilink" data-dcnode-id="6429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/BookOfRevelation" title="/pmwiki/pmwiki.php/Literature/BookOfRevelation"><span data-dcnode-id="6430" instrument_node="">Book of Revelation</span></a><span data-dcnode-id="6428" instrument_node="">. Of course, </span><a class="twikilink" data-dcnode-id="6426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo" title="/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo"><span data-dcnode-id="6427" instrument_node="">Because Destiny Says So</span></a><span data-dcnode-id="6425" instrument_node="">, God trumps Satan even at the </span><a class="twikilink" data-dcnode-id="6423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBattle" title="/pmwiki/pmwiki.php/Main/FinalBattle"><span data-dcnode-id="6424" instrument_node="">Final Battle</span></a><span data-dcnode-id="6422" instrument_node="">.</span></li></ul><ul data-dcnode-id="6187"><li data-dcnode-id="6414"><span data-dcnode-id="6418" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarthIsYoung" title="/pmwiki/pmwiki.php/Main/EarthIsYoung"><span data-dcnode-id="6417" instrument_node="">Earth Is Young</span></a><span data-dcnode-id="6415" instrument_node="">: The movie version of Left Behind uses plain simple Type A. The Bible is literal truth, nothing to argue about. Critical thinking doesn't exist in this setting, and it works both ways. Protagonists who spent their entire lives with a secular world-view doesn't seem to feel any need for any explanation of how young earth creationism can possibly be true. In return, the rapture actually happening doesn't seem to give anyone else the idea that evangelical Christianity might be true after all.</span></li><li data-dcnode-id="6409"><span data-dcnode-id="6413" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EmptyPilesOfClothing" title="/pmwiki/pmwiki.php/Main/EmptyPilesOfClothing"><span data-dcnode-id="6412" instrument_node="">Empty Piles of Clothing</span></a><span data-dcnode-id="6410" instrument_node="">: What people in the book series and all adaptations find at the time the Rapture takes place.</span></li><li data-dcnode-id="6404"><span data-dcnode-id="6408" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FamousNamedForeigner" title="/pmwiki/pmwiki.php/Main/FamousNamedForeigner"><span data-dcnode-id="6407" instrument_node="">Famous-Named Foreigner</span></a><span data-dcnode-id="6405" instrument_node="">: Nicolae Carpathia is named after the infamous Romanian Dictator Nicolae Ceausescu and the Carpathian Mountains.</span></li><li data-dcnode-id="6382"><span data-dcnode-id="6403" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFilmOfTheBook" title="/pmwiki/pmwiki.php/Main/TheFilmOfTheBook"><span data-dcnode-id="6402" instrument_node="">The Film of the Book</span></a><span data-dcnode-id="6400" instrument_node="">: The 2000 film of the first book was a mixed bag. While not exactly great cinema — its reception was overwhelmingly negative, while the books were successful — it deals with some of the novel's plot inconsistencies, as well as unrealistic character behavior. It also, out of the sheer fact of being a movie, avoids one of the pitfalls of the series' writing: the stupendous lack of descriptions </span><em data-dcnode-id="6398"><span data-dcnode-id="6399" instrument_node="">anywhere</span></em><span data-dcnode-id="6397" instrument_node="">.</span><ul data-dcnode-id="6383"><li data-dcnode-id="6386"><span data-dcnode-id="6396" instrument_node=""> This was followed by the </span><a class="twikilink" data-dcnode-id="6394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MovieMultipack" title="/pmwiki/pmwiki.php/Main/MovieMultipack"><span data-dcnode-id="6395" instrument_node="">Movie Multipack</span></a><span data-dcnode-id="6393" instrument_node=""> release of </span><em data-dcnode-id="6391"><span data-dcnode-id="6392" instrument_node="">Left Behind II: Tribulation Force</span></em><span data-dcnode-id="6390" instrument_node=""> and </span><em data-dcnode-id="6388"><span data-dcnode-id="6389" instrument_node="">Left Behind: World At War</span></em><span data-dcnode-id="6387" instrument_node="">, both covering the second book.</span></li><li data-dcnode-id="6384"><span data-dcnode-id="6385" instrument_node=""> The 2014 movie covers only the first half of the first book.</span></li></ul></li><li data-dcnode-id="6377"><span data-dcnode-id="6381" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FoxNewsLiberal" title="/pmwiki/pmwiki.php/Main/FoxNewsLiberal"><span data-dcnode-id="6380" instrument_node="">Fox News Liberal</span></a><span data-dcnode-id="6378" instrument_node="">: The many Jews who convert to Christianity serve this purpose. They prove the validity of the authors' beliefs by joining, but do so without demanding answers to the longstanding issues that have prevented real-world Jews from accepting Jesus as the Messiah of the Hebrew Bible. Not that they had much time for such questions when their lives were on the line on the day of the Lord's coming.</span></li><li data-dcnode-id="6372"><span data-dcnode-id="6376" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFundamentalist" title="/pmwiki/pmwiki.php/Main/TheFundamentalist"><span data-dcnode-id="6375" instrument_node="">The Fundamentalist</span></a><span data-dcnode-id="6373" instrument_node="">: As the prerogative of thee books is that "The Bible is literal truth, the end", every Saved character becomes one of these.</span></li><li data-dcnode-id="6367"><span data-dcnode-id="6371" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodGunsBadGuns" title="/pmwiki/pmwiki.php/Main/GoodGunsBadGuns"><span data-dcnode-id="6370" instrument_node="">Good Guns, Bad Guns</span></a><span data-dcnode-id="6368" instrument_node="">: the game Eternal Forces depict the Tribulation Forces being armed with M16/M4s, while the GC peacekeepers are armed with AKs.</span></li><li data-dcnode-id="6362"><span data-dcnode-id="6366" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HappilyEverAfter" title="/pmwiki/pmwiki.php/Main/HappilyEverAfter"><span data-dcnode-id="6365" instrument_node="">Happily Ever After</span></a><span data-dcnode-id="6363" instrument_node="">: The Saved populace, naturally including our protagonists, all get to take part in the Millennial Kingdom and go to Heaven forever. Everyone else... not so much.</span></li><li data-dcnode-id="6352"><span data-dcnode-id="6361" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HideYourChildren" title="/pmwiki/pmwiki.php/Main/HideYourChildren"><span data-dcnode-id="6360" instrument_node="">Hide Your Children</span></a><span data-dcnode-id="6358" instrument_node="">: Every child under 12 or so </span><em data-dcnode-id="6356"><span data-dcnode-id="6357" instrument_node="">vanishes</span></em><span data-dcnode-id="6355" instrument_node=""> in The Rapture. In a better-written book, even if nothing else happened, the trauma from this alone would probably cause the collapse of every government on Earth. This also extends to </span><em data-dcnode-id="6353"><span data-dcnode-id="6354" instrument_node="">children in the womb.</span></em></li><li data-dcnode-id="6347"><span data-dcnode-id="6351" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InstantExpert" title="/pmwiki/pmwiki.php/Main/InstantExpert"><span data-dcnode-id="6350" instrument_node="">Instant Expert</span></a><span data-dcnode-id="6348" instrument_node="">: All of the protagonists somehow start acting like people who've lived in the evangelical bu
