ki.php/Main/NumberTwo" title="/pmwiki/pmwiki.php/Main/NumberTwo"><span data-dcnode-id="5225" instrument_node="">Number Two</span></a><span data-dcnode-id="5223" instrument_node="">: Sarsour</span></li><li data-dcnode-id="5217"><span data-dcnode-id="5221" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMole" title="/pmwiki/pmwiki.php/Main/TheMole"><span data-dcnode-id="5220" instrument_node="">The Mole</span></a><span data-dcnode-id="5218" instrument_node="">: Quasim Marid</span></li><li data-dcnode-id="5212"><span data-dcnode-id="5216" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDarkChick" title="/pmwiki/pmwiki.php/Main/TheDarkChick"><span data-dcnode-id="5215" instrument_node="">The Dark Chick</span></a><span data-dcnode-id="5213" instrument_node="">: Nicolette</span></li></ul></li></ul></li><li data-dcnode-id="5200"><span data-dcnode-id="5207" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CommLinks" title="/pmwiki/pmwiki.php/Main/CommLinks"><span data-dcnode-id="5206" instrument_node="">Comm Links</span></a><span data-dcnode-id="5204" instrument_node="">: In </span><em data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="5201" instrument_node="">, citizens of the Millennial Kingdom (mostly naturals) had cell phone implants that allowed them to communicate with each other over long distances</span></li><li data-dcnode-id="5192"><span data-dcnode-id="5199" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CompositeCharacter" title="/pmwiki/pmwiki.php/Main/CompositeCharacter"><span data-dcnode-id="5198" instrument_node="">Composite Character</span></a><span data-dcnode-id="5196" instrument_node="">: In the Dramatic Audio version of </span><em data-dcnode-id="5194"><span data-dcnode-id="5195" instrument_node="">Armageddon</span></em><span data-dcnode-id="5193" instrument_node="">, GC officer Anita Sanchez is one for two female officers (a Hispanic and an African-American) working in the San Diego headquarters where Chloe Williams was incarcerated.</span></li><li data-dcnode-id="5187"><span data-dcnode-id="5191" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ConvenientMiscarriage" title="/pmwiki/pmwiki.php/Main/ConvenientMiscarriage"><span data-dcnode-id="5190" instrument_node="">Convenient Miscarriage</span></a><span data-dcnode-id="5188" instrument_node="">: Hattie Durham is carrying Nicolae Carpathia's child in the early part of the series. However, she is also suffering from being poisoned and fears that the child will be killed. As it turns out, she ends up delivering an undeveloped stillborn child which was soon after disposed of to prevent further contamination, though the Tribulation Force doctor who does the delivery contracts the poison and ends up dying.</span></li><li data-dcnode-id="5177"><span data-dcnode-id="5186" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoolPlane" title="/pmwiki/pmwiki.php/Main/CoolPlane"><span data-dcnode-id="5185" instrument_node="">Cool Plane</span></a><span data-dcnode-id="5183" instrument_node="">: Carpathia's personal plane as world dictator, the specially designed </span><em data-dcnode-id="5179"><span data-dcnode-id="5182" instrument_node="">Condor </span><a class="twikilink" data-dcnode-id="5180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="5181" instrument_node="">216</span></a></em><span data-dcnode-id="5178" instrument_node="">. The Condor is an immense supersonic airliner — something like the Concorde or its scrapped American successor, the Boeing Sonic Cruiser, but closer in size to an Airbus superjumbo.</span></li><li data-dcnode-id="5143"><span data-dcnode-id="5176" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CozyCatastrophe" title="/pmwiki/pmwiki.php/Main/CozyCatastrophe"><span data-dcnode-id="5175" instrument_node="">Cozy Catastrophe</span></a><span data-dcnode-id="5173" instrument_node="">: Crashed airplanes, gridlocked highways, mass disappearances, and political upheaval </span><em data-dcnode-id="5171"><span data-dcnode-id="5172" instrument_node="">everywhere</span></em><span data-dcnode-id="5170" instrument_node="">, but the trash is still getting collected, </span><a class="twikilink" data-dcnode-id="5168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RepressiveButEfficient" title="/pmwiki/pmwiki.php/Main/RepressiveButEfficient"><span data-dcnode-id="5169" instrument_node="">airline flights are uninterrupted</span></a><span data-dcnode-id="5167" instrument_node="">, and it's safe to walk the streets at night.</span><ul data-dcnode-id="5144"><li data-dcnode-id="5159"><span data-dcnode-id="5166" instrument_node=""> The aforementioned Slacktivist got a lot of comedy mileage out of the scene where Buck calmly buys a Land Rover (from an equally calm dealer) in the surburbs of Chicago—a few </span><strong data-dcnode-id="5164"><span data-dcnode-id="5165" instrument_node="">minutes</span></strong><span data-dcnode-id="5163" instrument_node=""> after the </span><em data-dcnode-id="5161"><span data-dcnode-id="5162" instrument_node="">atom bombing</span></em><span data-dcnode-id="5160" instrument_node=""> of downtown Chicago.</span></li><li data-dcnode-id="5145"><span data-dcnode-id="5158" instrument_node=""> It seems to get more cozy right on the day of Jesus' second coming, at least for the believers. Conveniently, the world's economic system crashes with the destruction of New Babylon on the same day that Jesus comes. Everyone on Carpathia's side who isn't in Carpathia's Unity Army, and isn't so determined to go forward with destroying the Christians and Jews in Petra and Jerusalem, is in a world-wide panic, and those who have lost their fortunes are committing suicide by the droves.</span><ul data-dcnode-id="5146"><li data-dcnode-id="5147"><span data-dcnode-id="5157" instrument_node=""> This ultimately leads to </span><a class="twikilink" data-dcnode-id="5155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewTheWarWerePartying" title="/pmwiki/pmwiki.php/Main/ScrewTheWarWerePartying"><span data-dcnode-id="5156" instrument_node="">Screw the War, We're Praising the Lord</span></a><span data-dcnode-id="5154" instrument_node="">, when the people in Petra end up paying little attention to the Global Community Unity Army completely surrounding them and more to Jesus coming from the sky to </span><a class="twikilink" data-dcnode-id="5152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="5153" instrument_node="">slay all their enemies</span></a><span data-dcnode-id="5151" instrument_node=""> with </span><a class="twikilink" data-dcnode-id="5149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="5150" instrument_node="">The Word of God</span></a><span data-dcnode-id="5148" instrument_node="">.</span></li></ul></li></ul></li><li data-dcnode-id="5135"><span data-dcnode-id="5142" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrapsaccharineWorld" title="/pmwiki/pmwiki.php/Main/CrapsaccharineWorld"><span data-dcnode-id="5141" instrument_node="">Crapsaccharine World</span></a><span data-dcnode-id="5139" instrument_node="">: The viewpoint of Christ's Millennial Reign within the Other Light faction, given the </span><a class="twikilink" data-dcnode-id="5137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathsHourglass" title="/pmwiki/pmwiki.php/Main/DeathsHourglass"><span data-dcnode-id="5138" instrument_node="">100 years of age limit</span></a><span data-dcnode-id="5136" instrument_node=""> imposed on unbelieving "naturals".</span></li><li data-dcnode-id="5121"><span data-dcnode-id="5134" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrapsackWorld" title="/pmwiki/pmwiki.php/Main/CrapsackWorld"><span data-dcnode-id="5133" instrument_node="">Crapsack World</span></a><span data-dcnode-id="5131" instrument_node="">: Descends into this, but later gets turned around. It gets bad to the point where the population depletion is so severe that there are hardly any service workers around to deal with things that need repairs and service.</span><ul data-dcnode-id="5122"><li data-dcnode-id="5123"><span data-dcnode-id="5130" instrument_node=""> It degenerates back into this during the Millennial Kingdom with the rise of The Other Light, with order maintained by Jesus and the promise that the forces of evil will be dealt with once and for all...which Jesus delivers on spectacularly at the </span><a class="twikilink" data-dcnode-id="5128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiClimax" title="/pmwiki/pmwiki.php/Main/AntiClimax"><span data-dcnode-id="5129" instrument_node="">Anti-Climactic</span></a><span data-dcnode-id="5127" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBattle" title="/pmwiki/pmwiki.php/Main/FinalBattle"><span data-dcnode-id="5126" instrument_node="">Final Battle</span></a><span data-dcnode-id="5124" instrument_node="">.</span></li></ul></li><li data-dcnode-id="5116"><span data-dcnode-id="5120" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrisisOfFaith" title="/pmwiki/pmwiki.php/Main/CrisisOfFaith"><span data-dcnode-id="5119" instrument_node="">Crisis of Faith</span></a><span data-dcnode-id="5117" instrument_node="">: Irene Steele experiences this before switching to New Hope Baptist Church.</span></li><li data-dcnode-id="5097"><span data-dcnode-id="5115" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="5114" instrument_node="">Curb-Stomp Battle</span></a><span data-dcnode-id="5112" instrument_node="">:</span><ul data-dcnode-id="5098"><li data-dcnode-id="5104"><span data-dcnode-id="5111" instrument_node=""> When Jesus comes into the scene, he slaughters Global Community troops en masse just by speaking </span><a class="twikilink" data-dcnode-id="5109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="5110" instrument_node="">the Word of God</span></a><span data-dcnode-id="5108" instrument_node="">. He's unstoppable, as evidenced in the Dramatic Audio presentation of </span><em data-dcnode-id="5106"><span data-dcnode-id="5107" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="5105" instrument_node=""> where the Antichrist armies launch rockets at Him with no success.</span></li><li data-dcnode-id="5099"><span data-dcnode-id="5103" instrument_node=""> The Satan's army vs. God battle in </span><em data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="5100" instrument_node=""> was over in an instant. All that preparation and the Other Light gets smoked into ashes in seconds!</span></li></ul></li><li data-dcnode-id="5069"><span data-dcnode-id="5096" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDayOfReckoning" title="/pmwiki/pmwiki.php/Main/TheDayOfReckoning"><span data-dcnode-id="5095" instrument_node="">The Day of Reckoning</span></a><span data-dcnode-id="5093" instrument_node="">: Final day of the Great Tribulation sees </span><a class="twikilink" data-dcnode-id="5091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="5092" instrument_node="">the destruction of the Unity Army</span></a><span data-dcnode-id="5090" instrument_node="">, the deaths of Baal, Ashtaroth and Cankerworm, Carpathia and Fortunato's Angel-assisted swan dive into the Lake of Fire, </span><a class="twikilink" data-dcnode-id="5088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SealedEvilInACan" title="/pmwiki/pmwiki.php/Main/SealedEvilInACan"><span data-dcnode-id="5089" instrument_node="">and Satan chained up and tossed into the bottomless pit for 1,000 years.</span></a><ul data-dcnode-id="5070"><li data-dcnode-id="5071"><span data-dcnode-id="5087" instrument_node=""> The final day of the Millennial Kingdom has Satan released from his prison, where he joins up with </span><a class="twikilink" data-dcnode-id="5085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaResistance" title="/pmwiki/pmwiki.php/Main/LaResistance"><span data-dcnode-id="5086" instrument_node="">The Other Light forces</span></a><span data-dcnode-id="5084" instrument_node=""> which had surrounded Jerusalem. Jesus emerges from the Temple and </span><a class="twikilink" data-dcnode-id="5082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="5083" instrument_node="">simply says "I AM WHO I AM" and instantly incinerates the invaders</span></a><span data-dcnode-id="5081" instrument_node="">. With Satan effectively humbled for the final time, Jesus </span><a class="twikilink" data-dcnode-id="5079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech" title="/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech"><span data-dcnode-id="5080" instrument_node="">chastises Satan for his iniquities from time immemorial</span></a><span data-dcnode-id="5078" instrument_node="">, and ultimately sends him to join </span><a class="twikilink" data-dcnode-id="5076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheAntiChrist" title="/pmwiki/pmwiki.php/Main/TheAntiChrist"><span data-dcnode-id="5077" instrument_node="">The Beast</span></a><span data-dcnode-id="5075" instrument_node=""> and the </span><a class="twikilink" data-dcnode-id="5073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDragon" title="/pmwiki/pmwiki.php/Main/TheDragon"><span data-dcnode-id="5074" instrument_node="">False Prophet</span></a><span data-dcnode-id="5072" instrument_node=""> in Hell.</span></li></ul></li><li data-dcnode-id="5064"><span data-dcnode-id="5068" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadGuyJunior" title="/pmwiki/pmwiki.php/Main/DeadGuyJunior"><span data-dcnode-id="5067" instrument_node="">Dead Guy Junior</span></a><span data-dcnode-id="5065" instrument_node="">: Kenny Bruce Williams (Buck and Chloe's son) is named after their compatriots Ken Ritz and Bruce Barnes, both of whom died as martyrs during the Tribulation.</span></li><li data-dcnode-id="5056"><span data-dcnode-id="5063" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadGuyOnDisplay" title="/pmwiki/pmwiki.php/Main/DeadGuyOnDisplay"><span data-dcnode-id="5062" instrument_node="">Dead Guy on Display</span></a><span data-dcnode-id="5060" instrument_node="">: Eli and Moishe, after Carpathia gun the both of them down during the Global Gala. Three and a half days later, both prophets are resurrected and taken to heaven.</span><ul data-dcnode-id="5057"><li data-dcnode-id="5058"><span data-dcnode-id="5059" instrument_node=""> Nicolae Carpathia himself had his body put on public display during his wake in New Babylon when on the same day it would be "resurrected" by Satan indwelling him.</span></li></ul></li><li data-dcnode-id="5051"><span data-dcnode-id="5055" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadpanSnarker" title="/pmwiki/pmwiki.php/Main/DeadpanSnarker"><span data-dcnode-id="5054" instrument_node="">Deadpan Snarker</span></a><span data-dcnode-id="5052" instrument_node="">: Plenty to go around, especially from the protagonists. Ken Ritz and Mac McCullum top the list. Nicolae Carpathia (post-indwelling) can snark with the best of them.</span></li><li data-dcnode-id="5026"><span data-dcnode-id="5050" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DealWithTheDevil" title="/pmwiki/pmwiki.php/Main/DealWithTheDevil"><span data-dcnode-id="5049" instrument_node="">Deal with the Devil</span></a><span data-dcnode-id="5047" instrument_node="">: The signing of the treaty that allows the Global Community to have licensed use of Chaim Rosenzweig's synthetic fertilizer formula for seven years in exchange for peace among the nations for Israel in </span><em data-dcnode-id="5045"><span data-dcnode-id="5046" instrument_node="">Tribulation Force</span></em><span data-dcnode-id="5044" instrument_node=""> is seen as the very thing that initiates the seven-year Tribulation period, which according to Eli and Moishe is the final "week" of Daniel's "70 weeks" prophecy.</span><div class="indent" data-dcnode-id="5035"><span data-dcnode-id="5043" instrument_node=""> </span><strong data-dcnode-id="5041"><span data-dcnode-id="5042" instrument_node="">Eli and Moishe:</span></strong><span data-dcnode-id="5040" instrument_node=""> Thus begins the </span><a class="urllink" data-dcnode-id="5037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/passage/%3Fsearch%3DDan%25209%3A27%26version%3DKJV"><span data-dcnode-id="5039" instrument_node="">last terrible week of the Lord</span><img data-dcnode-id="5038" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5036" instrument_node="">!</span></div><ul data-dcnode-id="5032"><li data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node=""> Lampshaded in the text itself.</span></li></ul><div class="indent" data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">A covenant had been struck. God’s chosen people, who planned to rebuild the temple and reinstitute the system of sacrifices until the coming of their Messiah, had signed a deal with the devil.</span></div><ul data-dcnode-id="5027"><li data-dcnode-id="5028"><span data-dcnode-id="5029" instrument_node=""> Marilena's offer made with Viv Ivins to become the mother of Nicolae Carpathia could also be seen as this.</span></li></ul></li><li data-dcnode-id="5004"><span data-dcnode-id="5025" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathsHourglass" title="/pmwiki/pmwiki.php/Main/DeathsHourglass"><span data-dcnode-id="5024" instrument_node="">Death's Hourglass</span></a><span data-dcnode-id="5022" instrument_node="">: While lacking the actual timepiece, citizens of the Millennial Kingdom know that "naturals" who stay unbelievers by the time they reach 100 will instantly die and go to Hell. This fate can only be averted by </span><a class="twikilink" data-dcnode-id="5020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReligionIsRight" title="/pmwiki/pmwiki.php/Main/ReligionIsRight"><span data-dcnode-id="5021" instrument_node="">accepting Jesus Christ as their Lord and Savior.</span></a><span data-dcnode-id="5019" instrument_node=""> The Other Light faction sees </span><a class="twikilink" data-dcnode-id="5017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodIsEvil" title="/pmwiki/pmwiki.php/Main/GodIsEvil"><span data-dcnode-id="5018" instrument_node="">God Is Evil</span></a><span data-dcnode-id="5016" instrument_node=""> because of this and has prepared for that contingency by having their teachings passed down to the next generation of its converts so that the generation that </span><a class="twikilink" data-dcnode-id="5014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBattle" title="/pmwiki/pmwiki.php/Main/FinalBattle"><span data-dcnode-id="5015" instrument_node="">gets to confront God and Jesus by the end of the Millennium</span></a><span data-dcnode-id="5013" instrument_node=""> will be "assured victory" when </span><a class="twikilink" data-dcnode-id="5011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SealedEvilInACan" title="/pmwiki/pmwiki.php/Main/SealedEvilInACan"><span data-dcnode-id="5012" instrument_node="">Satan is released</span></a><span data-dcnode-id="5010" instrument_node="">. </span><a class="twikilink" data-dcnode-id="5008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="5009" instrument_node="">Unfortunately for them,</span></a><span data-dcnode-id="5007" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouCantFightFate" title="/pmwiki/pmwiki.php/Main/YouCantFightFate"><span data-dcnode-id="5006" instrument_node="">it didn't go as they hoped.</span></a></li><li data-dcnode-id="4999"><span data-dcnode-id="5003" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DefiantToTheEnd" title="/pmwiki/pmwiki.php/Main/DefiantToTheEnd"><span data-dcnode-id="5002" instrument_node="">Defiant to the End</span></a><span data-dcnode-id="5000" instrument_node="">: Carpathia is this when he stands before Jesus...until Jesus casts Satan out of him.</span></li><li data-dcnode-id="4989"><span data-dcnode-id="4998" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DepartmentOfRedundancyDepartment" title="/pmwiki/pmwiki.php/Main/DepartmentOfRedundancyDepartment"><span data-dcnode-id="4997" instrument_node="">Department of Redundancy Department</span></a><span data-dcnode-id="4995" instrument_node="">: The following line may not have seemed quite so redundant in 1996 when </span><em data-dcnode-id="4993"><span data-dcnode-id="4994" instrument_node="">Tribulation Force</span></em><span data-dcnode-id="4992" instrument_node=""> was written, but certainly does today:</span><div class="indent" data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">"Buck...had secretly studied the feasibility of producing an anti-Global Community Web site on the Internet."</span></div></li><li data-dcnode-id="4972"><span data-dcnode-id="4988" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DesignerBabies" title="/pmwiki/pmwiki.php/Main/DesignerBabies"><span data-dcnode-id="4987" instrument_node="">Designer Babies</span></a><span data-dcnode-id="4985" instrument_node="">: Nicolae Carpathia, the </span><a class="twikilink" data-dcnode-id="4983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Antichrist" title="/pmwiki/pmwiki.php/Main/Antichrist"><span data-dcnode-id="4984" instrument_node="">Antichrist</span></a><span data-dcnode-id="4982" instrument_node=""> of the series, was a designer baby of a project funded by Jonathan Stonagal, with his genetic makeup being the hybrid sperm of two intelligent men (both of whom were gay) impregnated into a willing host, Marilena Carpathia. Of course, Jesus in </span><em data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="4979" instrument_node=""> reveals that it is God who gave Nicolae the gifts of beauty, wisdom, intelligence, and personality, dismissing the idea that it all came from science.</span><ul data-dcnode-id="4973"><li data-dcnode-id="4974"><span data-dcnode-id="4978" instrument_node=""> Who knows, </span><a class="urllink" data-dcnode-id="4975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//news.yahoo.com/designer-babies-only-rich-094500317--politics.html"><span data-dcnode-id="4977" instrument_node="">this could someday happen for real!</span><img data-dcnode-id="4976" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></li></ul></li><li data-dcnode-id="4967"><span data-dcnode-id="4971" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DespairEventHorizon" title="/pmwiki/pmwiki.php/Main/DespairEventHorizon"><span data-dcnode-id="4970" instrument_node="">Despair Event Horizon</span></a><span data-dcnode-id="4968" instrument_node="">: From the Rapture to the fall of New Babylon, those who lost the will to live usually end up committing suicide.</span></li><li data-dcnode-id="4950"><span data-dcnode-id="4966" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDevilIsALoser" title="/pmwiki/pmwiki.php/Main/TheDevilIsALoser"><span data-dcnode-id="4965" instrument_node="">The Devil Is a Loser</span></a><span data-dcnode-id="4963" instrument_node="">: Carpathia pre-indwelling manages to be calm, collected, and careful in his quest to bring the world under Satan's palm. </span><em data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node="">Post</span></em><span data-dcnode-id="4960" instrument_node="">-indwelling, with Satan actually present, he rapidly spirals down into maniacal spite and general loopiness.</span><ul data-dcnode-id="4951"><li data-dcnode-id="4952"><span data-dcnode-id="4959" instrument_node=""> Not to mention </span><a class="twikilink" data-dcnode-id="4957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SarcasmMode" title="/pmwiki/pmwiki.php/Main/SarcasmMode"><span data-dcnode-id="4958" instrument_node="">his brilliant overall strategy</span></a><span data-dcnode-id="4956" instrument_node=""> of using the Biblical prophecies to know where and when Jesus will appear for him to fight, then bringing the exact army to the table that those same prophecies claim Jesus will </span><a class="twikilink" data-dcnode-id="4954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="4955" instrument_node="">mop the floor with</span></a><span data-dcnode-id="4953" instrument_node="">.</span></li></ul></li><li data-dcnode-id="4913"><span data-dcnode-id="4949" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DidYouJustFlipOffCthulhu" title="/pmwiki/pmwiki.php/Main/DidYouJustFlipOffCthulhu"><span data-dcnode-id="4948" instrument_node="">Did You Just Flip Off Cthulhu?</span></a><span data-dcnode-id="4946" instrument_node=""> - Happens in the sixth book when a believer tells the False Prophet off to his face, and he not long after lampshades this trope. It later turns in a delayed </span><a class="twikilink" data-dcnode-id="4944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoNotTauntCthulhu" title="/pmwiki/pmwiki.php/Main/DoNotTauntCthulhu"><span data-dcnode-id="4945" instrument_node="">Do Not Taunt Cthulhu</span></a><span data-dcnode-id="4943" instrument_node=""> when </span><span class="spoiler" data-dcnode-id="4941" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4942" instrument_node=""> the guy who did it and his wife are killed.</span></span><ul data-dcnode-id="4914"><li data-dcnode-id="4934"><span data-dcnode-id="4940" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4935" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4939" instrument_node=""> Since this means he gets to ride out the rest of the Tribulation in the comfort of heaven before coming back with Jesus anyway, this might qualify as a </span><a class="twikilink" data-dcnode-id="4937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThanatosGambit" title="/pmwiki/pmwiki.php/Main/ThanatosGambit"><span data-dcnode-id="4938" instrument_node="">Thanatos Gambit</span></a><span data-dcnode-id="4936" instrument_node="">.</span></span></li><li data-dcnode-id="4932"><span data-dcnode-id="4933" instrument_node=""> In the fifth book, Chaim Rosenzweig does this to the aforementioned False Prophet during the meeting of the 144,000 Jews. When Fortunato demands to be addressed by his proper title, Chaim responds by calling the Supreme Commander 'Supreme Nincompoop,' and gets away with it.</span></li><li data-dcnode-id="4915"><span data-dcnode-id="4931" instrument_node=""> In </span><em data-dcnode-id="4929"><span data-dcnode-id="4930" instrument_node="">Armageddon</span></em><span data-dcnode-id="4928" instrument_node="">, a Global Community loyalist calls Nicolae "impotent" for not having the stones to kill him himself for speaking his mind, and Nicolae responds by personally ripping out his heart.</span><ul data-dcnode-id="4916"><li data-dcnode-id="4917"><span data-dcnode-id="4927" instrument_node=""> Mac in </span><em data-dcnode-id="4925"><span data-dcnode-id="4926" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="4924" instrument_node=""> would have loved the opportunity to call Nicolae the "Supreme </span><em data-dcnode-id="4922"><span data-dcnode-id="4923" instrument_node="">Im</span></em><span data-dcnode-id="4921" instrument_node="">potentate" if he were in Jesus' place and </span><a class="twikilink" data-dcnode-id="4919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KneelBeforeZod" title="/pmwiki/pmwiki.php/Main/KneelBeforeZod"><span data-dcnode-id="4920" instrument_node="">had the Antichrist at his mercy</span></a><span data-dcnode-id="4918" instrument_node="">.</span></li></ul></li></ul></li><li data-dcnode-id="4908"><span data-dcnode-id="4912" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DifferentWorldDifferentMovies" title="/pmwiki/pmwiki.php/Main/DifferentWorldDifferentMovies"><span data-dcnode-id="4911" instrument_node="">Different World, Different Movies</span></a><span data-dcnode-id="4909" instrument_node="">: The books apparently take place in a world where almost nobody has heard of the Rapture (since nobody outside the protagonists and a tiny handful of people like them even mention the resemblance), which means that they take place in a world where they were never written, or at least where they failed to attain the same success.</span></li><li data-dcnode-id="4900"><span data-dcnode-id="4907" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiggingYourselfDeeper" title="/pmwiki/pmwiki.php/Main/DiggingYourselfDeeper"><span data-dcnode-id="4906" instrument_node="">Digging Yourself Deeper</span></a><span data-dcnode-id="4904" instrument_node="">: Chloe's comment to Buck trying to explain the reason for his calling a car by a girl's name in </span><em data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">The Mark</span></em><span data-dcnode-id="4901" instrument_node="">.</span></li><li data-dcnode-id="4895"><span data-dcnode-id="4899" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DirtyCop" title="/pmwiki/pmwiki.php/Main/DirtyCop"><span data-dcnode-id="4898" instrument_node="">Dirty Cop</span></a><span data-dcnode-id="4896" instrument_node="">: Captain Sullivan of Scotland Yard, who was under the employ of Joshua Todd-Cothran.</span></li><li data-dcnode-id="4887"><span data-dcnode-id="4894" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DirtyCoward" title="/pmwiki/pmwiki.php/Main/DirtyCoward"><span data-dcnode-id="4893" instrument_node="">Dirty Coward</span></a><span data-dcnode-id="4891" instrument_node="">: Despite all of his showboating, Leon Fortunato shows his true colors when Jesus arrives on the scene. He tries to </span><a class="twikilink" data-dcnode-id="4889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaithTurn" title="/pmwiki/pmwiki.php/Main/HeelFaithTurn"><span data-dcnode-id="4890" instrument_node="">plead his case to Jesus.</span></a><span data-dcnode-id="4888" instrument_node=""> It does not work.</span></li><li data-dcnode-id="4882"><span data-dcnode-id="4886" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DiscOneFinalBoss" title="/pmwiki/pmwiki.php/Main/DiscOneFinalBoss"><span data-dcnode-id="4885" instrument_node="">Disc-One Final Boss</span></a><span data-dcnode-id="4883" instrument_node="">, although more of a fake Dragon in Peter Mathews vs. Leon Fortunato.</span></li><li data-dcnode-id="4874"><span data-dcnode-id="4881" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DisproportionateRetribution" title="/pmwiki/pmwiki.php/Main/DisproportionateRetribution"><span data-dcnode-id="4880" instrument_node="">Disproportionate Retribution</span></a><span data-dcnode-id="4878" instrument_node="">: Russia attacked Israel because it was hogging the new agricultural super growth formula they'd developed, and they try to get it by launching a massive nuclear strike at Israel. Why not just have a spy steal it (which is what most nations do in </span><a class="twikilink" data-dcnode-id="4876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealLife" title="/pmwiki/pmwiki.php/Main/RealLife"><span data-dcnode-id="4877" instrument_node="">Real Life</span></a><span data-dcnode-id="4875" instrument_node=""> when they want to take an innovation another side has developed)?</span></li><li data-dcnode-id="4863"><span data-dcnode-id="4873" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DistantFinale" title="/pmwiki/pmwiki.php/Main/DistantFinale"><span data-dcnode-id="4872" instrument_node="">Distant Finale</span></a><span data-dcnode-id="4870" instrument_node="">: The last chapter of </span><em data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="4867" instrument_node="">, with the final battle between God and Satan being a </span><a class="twikilink" data-dcnode-id="4865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="4866" instrument_node="">Curb-Stomp Battle</span></a><span data-dcnode-id="4864" instrument_node=""> that's over in a single page.</span></li><li data-dcnode-id="4858"><span data-dcnode-id="4862" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DistressedDamsel" title="/pmwiki/pmwiki.php/Main/DistressedDamsel"><span data-dcnode-id="4861" instrument_node="">Distressed Damsel</span></a><span data-dcnode-id="4859" instrument_node="">: With as many times Hattie has been captured by the GC, she could give Princess Peach a run for her money.</span></li><li data-dcnode-id="4850"><span data-dcnode-id="4857" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DivineRanks" title="/pmwiki/pmwiki.php/Main/DivineRanks"><span data-dcnode-id="4856" instrument_node="">Divine Ranks</span></a><span data-dcnode-id="4854" instrument_node="">: </span><a class="twikilink" data-dcnode-id="4852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Satan" title="/pmwiki/pmwiki.php/Main/Satan"><span data-dcnode-id="4853" instrument_node="">Lucifer</span></a><span data-dcnode-id="4851" instrument_node=""> in the series claims that God is merely the oldest of the angels. Jesus makes it very clear that Lucifer is mistaken about this, and God is everything Christian theology has ever claimed he is.</span></li><li data-dcnode-id="4836"><span data-dcnode-id="4849" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoNotAdjustYourSet" title="/pmwiki/pmwiki.php/Main/DoNotAdjustYourSet"><span data-dcnode-id="4848" instrument_node="">Do Not Adjust Your Set</span></a><span data-dcnode-id="4846" instrument_node="">: Chang Wong is able to have direct access to the Global Community television network feed so that he can interrupt its programming with messages from Dr. Tsion Ben-Judah (and later Chaim Rosenzweig) that are Biblical warnings and pleas for the undecided to come to Christ. This leads to a series of deaths among the Global Community's top brass when they fail utterly to get Tsion and Chaim off the air. Even almost the entire Global Community broadcast crew gets slaughtered in their failure, making Nicolae Carpathia muse that the only person left to run the network is a janitor when the jacked signal is finally cut off.</span><ul data-dcnode-id="4837"><li data-dcnode-id="4838"><span data-dcnode-id="4845" instrument_node=""> A supernatural version of this occurs in </span><em data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node="">Desecration</span></em><span data-dcnode-id="4842" instrument_node="">, when an angelic face appears onscreen to recite </span><a class="twikilink" data-dcnode-id="4840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="4841" instrument_node="">Revelation 14:9-13</span></a><span data-dcnode-id="4839" instrument_node="">.</span></li></ul></li><li data-dcnode-id="4828"><span data-dcnode-id="4835" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoNotTauntCthulhu" title="/pmwiki/pmwiki.php/Main/DoNotTauntCthulhu"><span data-dcnode-id="4834" instrument_node="">Do Not Taunt Cthulhu</span></a><span data-dcnode-id="4832" instrument_node="">: Or rather, Do Not Piss Carpathia Off.</span><ul data-dcnode-id="4829"><li data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node=""> Also, do not tempt God into destroying you during the Tribulation.</span></li></ul></li><li data-dcnode-id="4817"><span data-dcnode-id="4827" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoomedHometown" title="/pmwiki/pmwiki.php/Main/DoomedHometown"><span data-dcnode-id="4826" instrument_node="">Doomed City:</span></a><span data-dcnode-id="4824" instrument_node=""> So long, New Babylon.</span><ul data-dcnode-id="4818"><li data-dcnode-id="4819"><span data-dcnode-id="4823" instrument_node=""> Also </span><a class="twikilink" data-dcnode-id="4821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoomedHometown" title="/pmwiki/pmwiki.php/Main/DoomedHometown"><span data-dcnode-id="4822" instrument_node="">Doomed Hometown</span></a><span data-dcnode-id="4820" instrument_node="">, as members of The Place flee Chicago before it gets nuked.</span></li></ul></li><li data-dcnode-id="4798"><span data-dcnode-id="4816" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoomedMoralVictor" title="/pmwiki/pmwiki.php/Main/DoomedMoralVictor"><span data-dcnode-id="4815" instrument_node="">Doomed Moral Victor</span></a><span data-dcnode-id="4813" instrument_node="">: Krystall, Nicolae's secretary. She used to be a true believer in the Global Community and Nicolae personally, but then loses faith in him when she sees firsthand </span><a class="twikilink" data-dcnode-id="4811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FauxAffablyEvil" title="/pmwiki/pmwiki.php/Main/FauxAffablyEvil"><span data-dcnode-id="4812" instrument_node="">how different</span></a><span data-dcnode-id="4810" instrument_node=""> Nicolae actually is from his saintly public image. However, because she has already taken the </span><a class="twikilink" data-dcnode-id="4808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="4809" instrument_node="">Mark of the Beast</span></a><span data-dcnode-id="4807" instrument_node=""> by then, Krystall herself </span><a class="twikilink" data-dcnode-id="4805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReformedButRejected" title="/pmwiki/pmwiki.php/Main/ReformedButRejected"><span data-dcnode-id="4806" instrument_node="">is doomed to Hell no matter what she does</span></a><span data-dcnode-id="4804" instrument_node="">. Many people would probably either despair or rage against God if put in this position, and perhaps stay with the bad guys just because they would seem to have no better option. Yet Krystall still chooses to help Rayford and the others in the Tribulation Force, so she can at least help save </span><em data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">others</span></em><span data-dcnode-id="4801" instrument_node=""> who aren't damned like she is. </span><span class="spoiler" data-dcnode-id="4799" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4800" instrument_node="">And dies for it, when GC security finds out.</span></span></li><li data-dcnode-id="4790"><span data-dcnode-id="4797" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DraggedOffToHell" title="/pmwiki/pmwiki.php/Main/DraggedOffToHell"><span data-dcnode-id="4796" instrument_node="">Dragged Off to Hell</span></a><span data-dcnode-id="4794" instrument_node="">: The fate of both Nicolae Carpathia and Leon Fortunato as they are pushed by Michael the archangel into the Lake Of Fire in the book </span><em data-dcnode-id="4792"><span data-dcnode-id="4793" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="4791" instrument_node="">.</span></li><li data-dcnode-id="4770"><span data-dcnode-id="4789" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDragon" title="/pmwiki/pmwiki.php/Main/TheDragon"><span data-dcnode-id="4788" instrument_node="">The Dragon</span></a><span data-dcnode-id="4786" instrument_node="">: Leon Fortunato</span><ul data-dcnode-id="4771"><li data-dcnode-id="4784"><span data-dcnode-id="4785" instrument_node=""> Viv Ivins also has a minor role.</span></li><li data-dcnode-id="4774"><span data-dcnode-id="4783" instrument_node=""> Jonathan Stonagal and Joshua Todd-Cothran start out as this at first, </span><a class="twikilink" data-dcnode-id="4781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouHaveOutlivedYourUsefulness" title="/pmwiki/pmwiki.php/Main/YouHaveOutlivedYourUsefulness"><span data-dcnode-id="4782" instrument_node="">until Carpathia executes the both of them.</span></a><ul data-dcnode-id="4775"><li data-dcnode-id="4776"><span data-dcnode-id="4780" instrument_node=""> Jonathan Stonagal actually started off as </span><a class="twikilink" data-dcnode-id="4778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheChessmaster" title="/pmwiki/pmwiki.php/Main/TheChessmaster"><span data-dcnode-id="4779" instrument_node="">The Chessmaster</span></a><span data-dcnode-id="4777" instrument_node="">, financing the project that led to Carpathia's birth.</span></li></ul></li><li data-dcnode-id="4772"><span data-dcnode-id="4773" instrument_node=""> Ironically, this is one of Satan's many aliases.</span></li></ul></li><li data-dcnode-id="4750"><span data-dcnode-id="4769" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrivenToSuicide" title="/pmwiki/pmwiki.php/Main/DrivenToSuicide"><span data-dcnode-id="4768" instrument_node="">Driven to Suicide</span></a><span data-dcnode-id="4766" instrument_node="">: From the Rapture to the end of the Tribulation... most of them were unbelievers or those who backed the Global Community, particularly more so when </span><a class="twikilink" data-dcnode-id="4764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam" title="/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam"><span data-dcnode-id="4765" instrument_node="">they've taken the Mark Of The Beast only to realize it's a point of no return</span></a><span data-dcnode-id="4763" instrument_node="">.</span><ul data-dcnode-id="4751"><li data-dcnode-id="4761"><span data-dcnode-id="4762" instrument_node=""> Following the destruction of New Babylon, those who lost their fortunes commit suicide in droves.</span></li><li data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node=""> Steve Plank's assistant Vasily Medvedev commits suicide when Plank decides to become a martyr.</span></li><li data-dcnode-id="4757"><span data-dcnode-id="4758" instrument_node=""> Jim Hickman's likely fate when he accidentally caused his co-worker Ramon Santiago to be killed by Nicolae by spilling the beans about what was overheard from Carpathia's offices.</span></li><li data-dcnode-id="4752"><span data-dcnode-id="4756" instrument_node=""> Chang Wong contemplates suicide when he sees that he has been forced to bear the </span><a class="twikilink" data-dcnode-id="4754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="4755" instrument_node="">Mark of the Beast</span></a><span data-dcnode-id="4753" instrument_node=""> despite being a believer, but David Hassid talks him out of it.</span></li></ul></li><li data-dcnode-id="4745"><span data-dcnode-id="4749" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrugsAreBad" title="/pmwiki/pmwiki.php/Main/DrugsAreBad"><span data-dcnode-id="4748" instrument_node="">Drugs Are Bad</span></a><span data-dcnode-id="4746" instrument_node="">: Pretty much how it's depicted in the series, the few times it appears. The Middle Eastern former black marketeer Albie sees that his whole hometown of Al Basrah has been given over to drugs in the Tribulation period. During the Millennial Kingdom, The Other Light seduces young people who were below the age of 100 to wild parties where hashish is used to sway them to joining their side against God. In the latter instance, Kenny Bruce Williams comments that the Other Light would end up being too wasted to put up any sort of fight against God at the end of the Millennium.</span></li><li data-dcnode-id="4738"><span data-dcnode-id="4744" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrunkWithPower" title="/pmwiki/pmwiki.php/Main/DrunkWithPower"><span data-dcnode-id="4743" instrument_node="">Drunk with Power</span></a><span data-dcnode-id="4741" instrument_node="">: Post-indwelling, Carpathia is one step away from being Murdock-level insane...</span><a class="twikilink" data-dcnode-id="4739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AChatWithSatan" title="/pmwiki/pmwiki.php/Main/AChatWithSatan"><span data-dcnode-id="4740" instrument_node="">until Lucifer, of all people, calls him out on that during the battle of Armageddon.</span></a></li><li data-dcnode-id="4731"><span data-dcnode-id="4737" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DyingCurse" title="/pmwiki/pmwiki.php/Main/DyingCurse"><span data-dcnode-id="4736" instrument_node="">Dying Curse</span></a><span data-dcnode-id="4734" instrument_node="">: According to T.M. Delanty, upon finding out that his brother Samuel was killed while escorting Hattie Durham, Bo Hansen got wasted in a bar, pulled out a gun, cursed Nicolae, God and the world, </span><a class="twikilink" data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrivenToSuicide" title="/pmwiki/pmwiki.php/Main/DrivenToSuicide"><span data-dcnode-id="4733" instrument_node="">and killed himself.</span></a></li><li data-dcnode-id="4720"><span data-dcnode-id="4730" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DyingMomentOfAwesome" title="/pmwiki/pmwiki.php/Main/DyingMomentOfAwesome"><span data-dcnode-id="4729" instrument_node="">Dying Moment of Awesome</span></a><span data-dcnode-id="4727" instrument_node="">: Marilena Carpathia (yes, Nicolae's mother) has one in the prequel novel The Rising. Already weakened by the poison from earlier, she kills the fake doctor sent to kill her </span><a class="twikilink" data-dcnode-id="4725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HoistByHisOwnPetard" title="/pmwiki/pmwiki.php/Main/HoistByHisOwnPetard"><span data-dcnode-id="4726" instrument_node="">with his own revolver</span></a><span data-dcnode-id="4724" instrument_node="">. However, he fell on top of her, jamming the poison-filled syringe into her chest, </span><a class="twikilink" data-dcnode-id="4722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakingYouWithMe" title="/pmwiki/pmwiki.php/Main/TakingYouWithMe"><span data-dcnode-id="4723" instrument_node="">thus killing her.</span></a><span data-dcnode-id="4721" instrument_node="">.</span></li><li data-dcnode-id="4715"><span data-dcnode-id="4719" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarnYourHappyEnding" title="/pmwiki/pmwiki.php/Main/EarnYourHappyEnding"><span data-dcnode-id="4718" instrument_node="">Earn Your Happy Ending</span></a><span data-dcnode-id="4716" instrument_node="">: The Tribulation saints go through a lot of hardship in order to earn their happy ending with God.</span></li><li data-dcnode-id="4707"><span data-dcnode-id="4714" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarthquakesCauseFissures" title="/pmwiki/pmwiki.php/Main/EarthquakesCauseFissures"><span data-dcnode-id="4713" instrument_node="">Earthquakes Cause Fissures</span></a><span data-dcnode-id="4711" instrument_node="">: God and Jesus' natural disaster of choice. If you want to kill a ton of condemned and unbelievers en masse, or cause massive property damage, earthquakes are the way to go.</span><ul data-dcnode-id="4708"><li data-dcnode-id="4709"><span data-dcnode-id="4710" instrument_node=""> During the battle of Armageddon, one particular earthquake renders the entire Earth flat, while at the same time, causing the city of Jerusalem to rise 300 feet from the ground.</span></li></ul></li><li data-dcnode-id="4699"><span data-dcnode-id="4706" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarthShatteringKaboom" title="/pmwiki/pmwiki.php/Main/EarthShatteringKaboom"><span data-dcnode-id="4705" instrument_node="">Earth-Shattering Kaboom</span></a><span data-dcnode-id="4703" instrument_node="">: What takes place at the end of </span><em data-dcnode-id="4701"><span data-dcnode-id="4702" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="4700" instrument_node=""> when the old earth passes away.</span></li><li data-dcnode-id="4680"><span data-dcnode-id="4698" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EasilyForgiven" title="/pmwiki/pmwiki.php/Main/EasilyForgiven"><span data-dcnode-id="4697" instrument_node="">Easily Forgiven</span></a><span data-dcnode-id="4695" instrument_node="">: In </span><em data-dcnode-id="4693"><span data-dcnode-id="4694" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="4692" instrument_node="">, Kenny's friends, family, and girlfriend, who </span><em data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">know</span></em><span data-dcnode-id="4689" instrument_node=""> that he plans to secretly infiltrate The Other Light, believe, on specious evidence, including the word of a known traitor and liar, that he had really left the faith. They all turn against him. When the matter is resolved, everything immediately returns to </span><em data-dcnode-id="4687"><span data-dcnode-id="4688" instrument_node="">status quo ante</span></em><span data-dcnode-id="4686" instrument_node="">, complete with Kenny picking up where he left off with his girlfriend.</span><ul data-dcnode-id="4681"><li data-dcnode-id="4682"><span data-dcnode-id="4685" instrument_node=""> Carpathia (post-indwelling) publicly forgives his assassin. </span><a class="twikilink" data-dcnode-id="4683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoopholeAbuse" title="/pmwiki/pmwiki.php/Main/LoopholeAbuse"><span data-dcnode-id="4684" instrument_node="">Since Chaim Rosenzweig has been officially declared dead (his body was not found when his staff was gunned down), that allows any GC to kill him without penalty from Carpathia.</span></a></li></ul></li><li data-dcnode-id="4652"><span data-dcnode-id="4679" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EasyEvangelism" title="/pmwiki/pmwiki.php/Main/EasyEvangelism"><span data-dcnode-id="4678" instrument_node="">Easy Evangelism</span></a><span data-dcnode-id="4676" instrument_node="">: Played straight with the Tribulation Force, but subverted with just about everyone else. Rayford's decidedly haughty attempt at evangelism to his copilot in book 2 is a prime example of the latter. One third of the population of the Earth disappears, specifically including </span><em data-dcnode-id="4674"><span data-dcnode-id="4675" instrument_node="">all</span></em><span data-dcnode-id="4673" instrument_node=""> children without exception, and the possibility that divine intervention might have been involved is just </span><a class="twikilink" data-dcnode-id="4671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FlatEarthAtheist" title="/pmwiki/pmwiki.php/Main/FlatEarthAtheist"><span data-dcnode-id="4672" instrument_node="">completely out of the question</span></a><span data-dcnode-id="4670" instrument_node="">.</span><ul data-dcnode-id="4653"><li data-dcnode-id="4662"><span data-dcnode-id="4669" instrument_node=""> Also played straight with the </span><a class="twikilink" data-dcnode-id="4667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PathOfInspiration" title="/pmwiki/pmwiki.php/Main/PathOfInspiration"><span data-dcnode-id="4668" instrument_node="">Enigma Babylon One World Faith</span></a><span data-dcnode-id="4666" instrument_node="">, a global religion engineered by the </span><a class="twikilink" data-dcnode-id="4664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Antichrist" title="/pmwiki/pmwiki.php/Main/Antichrist"><span data-dcnode-id="4665" instrument_node="">Antichrist</span></a><span data-dcnode-id="4663" instrument_node="">. Essentially, anyone who is does not hold to the "true" Christian faith gets rolled into one big spiritual group, and does so willingly. Never mind that there are a variety of traditional, theological, and dogmatic differences between these groups which would be irreconcilable with regard to joining together into one diverse-but-united faith under a central authority.</span></li><li data-dcnode-id="4654"><span data-dcnode-id="4661" instrument_node=""> Also played straight with the believers in the Millennial Kingdom, to the point where one would have to be a complete idiot to not see that (1) </span><a class="twikilink" data-dcnode-id="4659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ElephantInTheLivingRoom" title="/pmwiki/pmwiki.php/Main/ElephantInTheLivingRoom"><span data-dcnode-id="4660" instrument_node="">God and Jesus Christ are pretty much real</span></a><span data-dcnode-id="4658" instrument_node=""> and (2) </span><a class="twikilink" data-dcnode-id="4656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathsHourglass" title="/pmwiki/pmwiki.php/Main/DeathsHourglass"><span data-dcnode-id="4657" instrument_node="">any "natural" who remains an unbeliever by the time they reach 100 years of age will instantly die and go to Hell</span></a><span data-dcnode-id="4655" instrument_node="">. It's the Other Light faction that has to work hard to convince people of their beliefs.</span></li></ul></li><li data-dcnode-id="4626"><span data-dcnode-id="4651" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EasyLogistics" title="/pmwiki/pmwiki.php/Main/EasyLogistics"><span data-dcnode-id="4650" instrument_node="">Easy Logistics</span></a><span data-dcnode-id="4648" instrument_node="">: A literary example. </span><a class="twikilink" data-dcnode-id="4646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheAntiChrist" title="/pmwiki/pmwiki.php/Main/TheAntiChrist"><span data-dcnode-id="4647" instrument_node="">The Antichrist</span></a><span data-dcnode-id="4645" instrument_node="">'s plan involves forming a </span><a class="twikilink" data-dcnode-id="4643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneWorldGovernment" title="/pmwiki/pmwiki.php/Main/OneWorldGovernment"><span data-dcnode-id="4644" instrument_node="">One World Government</span></a><span data-dcnode-id="4642" instrument_node="">, redistributing governing districts from nation-states to several arbitrary regional divisions, mashing all global religions into </span><a class="twikilink" data-dcnode-id="4640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneTrueFaith" title="/pmwiki/pmwiki.php/Main/OneTrueFaith"><span data-dcnode-id="4641" instrument_node="">One True Faith</span></a><span data-dcnode-id="4639" instrument_node="">, turning all public and private media worldwide into a single </span><a class="twikilink" data-dcnode-id="4637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PropagandaMachine" title="/pmwiki/pmwiki.php/Main/PropagandaMachine"><span data-dcnode-id="4638" instrument_node="">Propaganda Machine</span></a><span data-dcnode-id="4636" instrument_node="">, disarming the nations of the world by retiring ninety percent of their armed forces and the destruction of ninety percent of their equipment, turning the remaining ten percent over to the command of the new Global Community, relocating the </span><a class="twikilink" data-dcnode-id="4634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/UnitedNations" title="/pmwiki/pmwiki.php/UsefulNotes/UnitedNations"><span data-dcnode-id="4635" instrument_node="">United Nations</span></a><span data-dcnode-id="4633" instrument_node=""> from </span><a class="twikilink" data-dcnode-id="4631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigAppleSauce" title="/pmwiki/pmwiki.php/Main/BigAppleSauce"><span data-dcnode-id="4632" instrument_node="">New York</span></a><span data-dcnode-id="4630" instrument_node=""> to a newly established and rapidly developed city in the Iraqi desert, and rebuilding the temple in </span><a class="twikilink" data-dcnode-id="4628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Jerusalem" title="/pmwiki/pmwiki.php/UsefulNotes/Jerusalem"><span data-dcnode-id="4629" instrument_node="">Jerusalem</span></a><span data-dcnode-id="4627" instrument_node="">. This plan is begun, implemented, and accomplished in only a few years, administrated by only a few people, despite the mind-boggling complexity that such global re-organizing would involve.</span></li><li data-dcnode-id="4618"><span data-dcnode-id="4625" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Egopolis" title="/pmwiki/pmwiki.php/Main/Egopolis"><span data-dcnode-id="4624" instrument_node="">Egopolis</span></a><span data-dcnode-id="4622" instrument_node="">: United Carpathian States and a minor example, Carpathia Standard Time.</span><ul data-dcnode-id="4619"><li data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node=""> Not to say that God and Jesus are not entirely guilty of this trope. Valley of Jehoshaphat, Ozase.</span></li></ul></li><li data-dcnode-id="4613"><span data-dcnode-id="4617" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ElephantInTheLivingRoom" title="/pmwiki/pmwiki.php/Main/ElephantInTheLivingRoom"><span data-dcnode-id="4616" instrument_node="">Elephant in the Living Room</span></a><span data-dcnode-id="4614" instrument_node="">: The presence of God and Jesus Christ in the Millennial Kingdom for the Only Light believers, and pretty much for anyone born and/or raised in the Millennial Kingdom.</span></li><li data-dcnode-id="4608"><span data-dcnode-id="4612" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EliteMooks" title="/pmwiki/pmwiki.php/Main/EliteMooks"><span data-dcnode-id="4611" instrument_node="">Elite Mooks</span></a><span data-dcnode-id="4609" instrument_node="">: The Morale Monitors for the Global Community, The Only Light for The Other Light.</span></li><li data-dcnode-id="4591"><span data-dcnode-id="4607" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EmbarrassingMiddleName" title="/pmwiki/pmwiki.php/Main/EmbarrassingMiddleName"><span data-dcnode-id="4606" instrument_node="">Embarrassing Middle Name</span></a><span data-dcnode-id="4604" instrument_node="">: The Antichrist's full name is Nicolae Jetty Carpathia. </span><em data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node="">Jetty</span></em><span data-dcnode-id="4601" instrument_node="">. This might explain what drove him to evil. This was discussed in one of the prequels as referring to "</span><a class="twikilink" data-dcnode-id="4599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkIsEvil" title="/pmwiki/pmwiki.php/Main/DarkIsEvil"><span data-dcnode-id="4600" instrument_node="">jet black</span></a><span data-dcnode-id="4598" instrument_node="">".</span><ul data-dcnode-id="4592"><li data-dcnode-id="4593"><span data-dcnode-id="4597" instrument_node=""> This is also an example of a </span><a class="twikilink" data-dcnode-id="4595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="4596" instrument_node="">Meaningful Name</span></a><span data-dcnode-id="4594" instrument_node="">, as if you assign each letter a value according to the standard A=1, B=2 scale, they add up to 216, which is 6 cubed (6*6*6).</span></li></ul></li><li data-dcnode-id="4580"><span data-dcnode-id="4590" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EndlessDaytime" title="/pmwiki/pmwiki.php/Main/EndlessDaytime"><span data-dcnode-id="4589" instrument_node="">Endless Daytime</span></a><span data-dcnode-id="4587" instrument_node="">: In the Millennial Kingdom in the book </span><em data-dcnode-id="4585"><span data-dcnode-id="4586" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="4584" instrument_node="">, there's still a morning and an evening, but the only difference is that the evening sun is less brighter than the morning sun.</span><ul data-dcnode-id="4581"><li data-dcnode-id="4582"><span data-dcnode-id="4583" instrument_node=""> Also in the "new heavens and new earth", there is no night.</span></li></ul></li><li data-dcnode-id="4575"><span data-dcnode-id="4579" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt" title="/pmwiki/pmwiki.php/Main/TheEndOfTheWorldAsWeKnowIt"><span data-dcnode-id="4578" instrument_node="">The End of the World as We Know It</span></a><span data-dcnode-id="4576" instrument_node="">: The books deal with a rather literal interpretation of the Book of Revelation, which is all about the apocalypse and the coming of the New Kingdom.</span></li><li data-dcnode-id="4567"><span data-dcnode-id="4574" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EnemyCivilWar" title="/pmwiki/pmwiki.php/Main/EnemyCivilWar"><span data-dcnode-id="4573" instrument_node="">Enemy Civil War</span></a><span data-dcnode-id="4571" instrument_node="">: Even the Global Community is not immune to rebellion among its own ranks, as Enigma Babylon leader Peter Mathews plots against Nicolae Carpathia and the United African States ends up attempting to secede from the one-world government. It all gets straightened out by the battle of Armageddon, and Carpathia's Unity Army still gets </span><a class="twikilink" data-dcnode-id="4569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="4570" instrument_node="">seriously owned by Jesus</span></a><span data-dcnode-id="4568" instrument_node="">.</span></li><li data-dcnode-id="4557"><span data-dcnode-id="4566" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EscortMission" title="/pmwiki/pmwiki.php/Main/EscortMission"><span data-dcnode-id="4565" instrument_node="">Escort Mission</span></a><span data-dcnode-id="4563" instrument_node="">: In </span><em data-dcnode-id="4561"><span data-dcnode-id="4562" instrument_node="">Desecration</span></em><span data-dcnode-id="4560" instrument_node="">, George Sebastian is assigned to Greece to get Georgiana Stavros and Marcel Papadopoulos out of there. </span><span class="spoiler" data-dcnode-id="4558" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4559" instrument_node=""> The mission goes FUBAR when Georgiana turns out to be a GC decoy, who kills Marcel, Lukas Miklos, and Kronos, while capturing Sebastian.</span></span></li><li data-dcnode-id="4528"><span data-dcnode-id="4556" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EtTuBrute" title="/pmwiki/pmwiki.php/Main/EtTuBrute"><span data-dcnode-id="4555" instrument_node="">Et Tu, Brute?</span></a><span data-dcnode-id="4553" instrument_node="">: In the book </span><em data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">Assassins</span></em><span data-dcnode-id="4550" instrument_node="">, Enigma Babylon leader Peter Mathews was killed in this manner by the ten subpotentates when he was invited to attend a </span><a class="twikilink" data-dcnode-id="4548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NastyParty" title="/pmwiki/pmwiki.php/Main/NastyParty"><span data-dcnode-id="4549" instrument_node="">Nasty Party</span></a><span data-dcnode-id="4547" instrument_node=""> where he was killed with </span><a class="twikilink" data-dcnode-id="4545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FeatherFlechettes" title="/pmwiki/pmwiki.php/Main/FeatherFlechettes"><span data-dcnode-id="4546" instrument_node="">Feather Flechettes</span></a><span data-dcnode-id="4544" instrument_node=""> from an ice sculpture made in his image. As it turns out, Peter's death was </span><a class="twikilink" data-dcnode-id="4542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo" title="/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo"><span data-dcnode-id="4543" instrument_node="">foretold by Scripture</span></a><span data-dcnode-id="4541" instrument_node=""> in the </span><a class="twikilink" data-dcnode-id="4539" href="https://chatnoir-we hailstone</span></a><span data-dcnode-id="4468" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="4466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DullSurprise" title="/pmwiki/pmwiki.php/Main/DullSurprise"><span data-dcnode-id="4467" instrument_node="">Nicolae just casually shrugs off her death.</span></a></li></ul><div class="indent" data-dcnode-id="4460"><strong data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">Fortunato:</span></strong><span data-dcnode-id="4461" instrument_node=""> (after Viv gets splattered by said hailstone) Excellency...I am so sorry.</span></div><div class="indent" data-dcnode-id="4456"><strong data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">Carpathia:</span></strong><span data-dcnode-id="4457" instrument_node=""> Yes. Terrible loss.</span></div><ul data-dcnode-id="4450"><li data-dcnode-id="4451"><span data-dcnode-id="4455" instrument_node=""> And he was on the verge of directing an intruder to take her instead of him in </span><em data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">The Rising</span></em><span data-dcnode-id="4452" instrument_node="">.</span></li></ul></li><li data-dcnode-id="4438"><span data-dcnode-id="4448" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvenEvilHasStandards" title="/pmwiki/pmwiki.php/Main/EvenEvilHasStandards"><span data-dcnode-id="4447" instrument_node="">Even Evil Has Standards</span></a><span data-dcnode-id="4445" instrument_node="">: Nicoale Carpathia's </span><a class="twikilink" data-dcnode-id="4443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButForMeItWasTuesday" title="/pmwiki/pmwiki.php/Main/ButForMeItWasTuesday"><span data-dcnode-id="4444" instrument_node="">But for Me, It Was Tuesday</span></a><span data-dcnode-id="4442" instrument_node=""> reaction to Leon Fortunato killing Hattie Durham in </span><em data-dcnode-id="4440"><span data-dcnode-id="4441" instrument_node="">Desecration</span></em><span data-dcnode-id="4439" instrument_node="">, described as "cooking a harmless woman with a big mouth", seems to suggest that for whatever standards Nicolae had for killing people, even that seemed to be rather pointless and unnecessary for Leon.</span></li><li data-dcnode-id="4430"><span data-dcnode-id="4437" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EverythingIsOnline" title="/pmwiki/pmwiki.php/Main/EverythingIsOnline"><span data-dcnode-id="4436" instrument_node="">Everything Is Online</span></a><span data-dcnode-id="4434" instrument_node="">: The Tribulation Force always has at least one living </span><a class="twikilink" data-dcnode-id="4432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheSmartGuy" title="/pmwiki/pmwiki.php/Main/TheSmartGuy"><span data-dcnode-id="4433" instrument_node="">Smart Guy</span></a><span data-dcnode-id="4431" instrument_node=""> who can erase any incriminating records, falsify any reports, and hack into anything digital, even security cameras in a condemned building halfway across the world.</span></li><li data-dcnode-id="4425"><span data-dcnode-id="4429" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilAllAlong" title="/pmwiki/pmwiki.php/Main/EvilAllAlong"><span data-dcnode-id="4428" instrument_node="">Evil All Along</span></a><span data-dcnode-id="4426" instrument_node="">: In-universe, nobody but those in the Tribulation Force and those who once have b
