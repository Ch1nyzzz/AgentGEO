what happens in </span><em data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="2985" instrument_node="">, she obviously doesn't live to enter into the Millennium.</span><ul data-dcnode-id="2976"><li data-dcnode-id="2977"><span data-dcnode-id="2984" instrument_node=""> Viv's fate is mentioned in the Dramatic Audio presentation of </span><em data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="2981" instrument_node="">, as she is </span><a class="twikilink" data-dcnode-id="2979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RocksFallEveryoneDies" title="/pmwiki/pmwiki.php/Main/RocksFallEveryoneDies"><span data-dcnode-id="2980" instrument_node="">killed by a giant hailstone</span></a><span data-dcnode-id="2978" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2967"><span data-dcnode-id="2974" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LightIsNotGood" title="/pmwiki/pmwiki.php/Main/LightIsNotGood"><span data-dcnode-id="2973" instrument_node="">Light Is Not Good</span></a><span data-dcnode-id="2971" instrument_node="">: Lucifer, when he takes on his pure form after departing from Nicolae Carpathia. The Other Light faction also see God in the same </span><a class="twikilink" data-dcnode-id="2969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IncrediblyLamePun" title="/pmwiki/pmwiki.php/Main/IncrediblyLamePun"><span data-dcnode-id="2970" instrument_node="">light</span></a><span data-dcnode-id="2968" instrument_node=""> as the Christians see Lucifer, hence the name of their group.</span></li><li data-dcnode-id="2953"><span data-dcnode-id="2966" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LikeAGodToMe" title="/pmwiki/pmwiki.php/Main/LikeAGodToMe"><span data-dcnode-id="2965" instrument_node="">Like a God to Me</span></a><span data-dcnode-id="2963" instrument_node="">: In a conversation Leon Fortunato has with David Hassid in the book </span><em data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Assassins</span></em><span data-dcnode-id="2960" instrument_node="">, Leon asks David who he finds to be the most inspirational person that he idolizes, and David answers "</span><a class="twikilink" data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/God" title="/pmwiki/pmwiki.php/Main/God"><span data-dcnode-id="2959" instrument_node="">My father</span></a><span data-dcnode-id="2957" instrument_node="">", saying that "he's like God to me". Leon says that he would want to meet him someday, and David says </span><a class="twikilink" data-dcnode-id="2955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PropheciesAreAlwaysRight" title="/pmwiki/pmwiki.php/Main/PropheciesAreAlwaysRight"><span data-dcnode-id="2956" instrument_node="">there's a very good chance that Leon will, face to face</span></a><span data-dcnode-id="2954" instrument_node="">.</span></li><li data-dcnode-id="2945"><span data-dcnode-id="2952" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LikeRealityUnlessNoted" title="/pmwiki/pmwiki.php/Main/LikeRealityUnlessNoted"><span data-dcnode-id="2951" instrument_node="">Like Reality, Unless Noted</span></a><span data-dcnode-id="2949" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ZigZaggingTrope" title="/pmwiki/pmwiki.php/Main/ZigZaggingTrope"><span data-dcnode-id="2948" instrument_node="">Zig-Zagging Trope</span></a><span data-dcnode-id="2946" instrument_node="">. Much of the action in the books operates like reality, but sometimes ignores other postulates the book has already set up which would affect them. For example, the trains and planes still run on time post-Rapture after a very brief initial panic, or the Antichrist takes control of all world media, business, and nations, yet these things still seem to run as though they were still independent organizations.</span></li><li data-dcnode-id="2931"><span data-dcnode-id="2944" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LiteralMetaphor" title="/pmwiki/pmwiki.php/Main/LiteralMetaphor"><span data-dcnode-id="2943" instrument_node="">Literal Metaphor</span></a><span data-dcnode-id="2941" instrument_node="">: The authors take a good deal of things from Revelation literally, such as with the Two Witnesses that cause flame to come out of their mouths and devour their enemies from their description in chapter 11.</span><ul data-dcnode-id="2932"><li data-dcnode-id="2933"><span data-dcnode-id="2940" instrument_node=""> One minor exception to this literalism is with Jesus and "the sword that comes from His mouth"...the said sword being </span><a class="twikilink" data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="2939" instrument_node="">The Word of God</span></a><span data-dcnode-id="2937" instrument_node="">. It does have the </span><em data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">literal</span></em><span data-dcnode-id="2934" instrument_node=""> effect of slaying His enemies.</span></li></ul></li><li data-dcnode-id="2926"><span data-dcnode-id="2930" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LivingStatue" title="/pmwiki/pmwiki.php/Main/LivingStatue"><span data-dcnode-id="2929" instrument_node="">Living Statue</span></a><span data-dcnode-id="2927" instrument_node="">: Carpathia's massive image, which is heated by onionskin paper.</span></li><li data-dcnode-id="2906"><span data-dcnode-id="2925" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LockedOutOfTheLoop" title="/pmwiki/pmwiki.php/Main/LockedOutOfTheLoop"><span data-dcnode-id="2924" instrument_node="">Locked Out of the Loop</span></a><span data-dcnode-id="2922" instrument_node="">: The second reason, besides the </span><a class="twikilink" data-dcnode-id="2920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FlatEarthAtheist" title="/pmwiki/pmwiki.php/Main/FlatEarthAtheist"><span data-dcnode-id="2921" instrument_node="">Flat-Earth Atheist</span></a><span data-dcnode-id="2919" instrument_node=""> infestation, why </span><a class="twikilink" data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EasyEvangelism" title="/pmwiki/pmwiki.php/Main/EasyEvangelism"><span data-dcnode-id="2918" instrument_node="">Easy Evangelism</span></a><span data-dcnode-id="2916" instrument_node=""> doesn't happen. The main protagonists have a detailed step-by-step prophecy of what will happen in the next seven years, but whenever they can be bothered to try to convert someone, they tend to use the same speeches as evangelists do now. They don't say the next 4 things their divine prophecy predicts, and then come back after those things have happened.</span><ul data-dcnode-id="2907"><li data-dcnode-id="2908"><span data-dcnode-id="2915" instrument_node=""> And then there is Hattie. Buck wanted to impress her, so he offered to introduce her to Nicolae. When she actually seems more impressed by Nicolae, Buck explicitly loses interest in her. After learning Nicolae is the </span><a class="twikilink" data-dcnode-id="2913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiChrist" title="/pmwiki/pmwiki.php/Main/AntiChrist"><span data-dcnode-id="2914" instrument_node="">Antichrist</span></a><span data-dcnode-id="2912" instrument_node="">, Buck tries to persuade Hattie not to go on a date with him... by telling her he thinks she's </span><a class="twikilink" data-dcnode-id="2910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MyGirlIsNotASlut" title="/pmwiki/pmwiki.php/Main/MyGirlIsNotASlut"><span data-dcnode-id="2911" instrument_node="">"not that kind of girl"</span></a><span data-dcnode-id="2909" instrument_node="">. You'd think that telling her Nicolae is the devil (or at least into murder and corruption) might be more persuasive.</span></li></ul></li><li data-dcnode-id="2898"><span data-dcnode-id="2905" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LoopholeAbuse" title="/pmwiki/pmwiki.php/Main/LoopholeAbuse"><span data-dcnode-id="2904" instrument_node="">Loophole Abuse</span></a><span data-dcnode-id="2902" instrument_node="">: In </span><em data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">Desecration</span></em><span data-dcnode-id="2899" instrument_node="">, in the interrogation conducted on him by the Global Community using a lie detector computer program, when Chang Wong was asked about his loyalty to the Potentate (meaning Nicolae Carpathia), he answered the questions "truthfully" and passed with flying colors, given that the Potentate he was thinking of was Jesus Christ.</span></li><li data-dcnode-id="2890"><span data-dcnode-id="2897" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LooseLips" title="/pmwiki/pmwiki.php/Main/LooseLips"><span data-dcnode-id="2896" instrument_node="">Loose Lips</span></a><span data-dcnode-id="2894" instrument_node="">: Jim Hickman was spoken of as being this by Mac McCullum in </span><em data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">The Mark</span></em><span data-dcnode-id="2891" instrument_node=""> when he accidentally lets slip to Nicolae Carpathia sensitive information shared in confidence by Nicolae to his close associates in the Global Community top brass, which leads to Ramon Santiago's death and Jim's own suicide.</span></li><li data-dcnode-id="2885"><span data-dcnode-id="2889" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MadonnaWhoreComplex" title="/pmwiki/pmwiki.php/Main/MadonnaWhoreComplex"><span data-dcnode-id="2888" instrument_node="">Madonna–Whore Complex</span></a><span data-dcnode-id="2886" instrument_node="">: How Rayford (and the author) sees his late wife Irene vs. the Other Woman Hattie Durham.</span></li><li data-dcnode-id="2877"><span data-dcnode-id="2884" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MakeItLookLikeAnAccident" title="/pmwiki/pmwiki.php/Main/MakeItLookLikeAnAccident"><span data-dcnode-id="2883" instrument_node="">Make It Look Like an Accident</span></a><span data-dcnode-id="2881" instrument_node="">: Mac's, Abdullah's, David's, and Hannah's plan to escape from New Babylon to go underground with the believers in </span><em data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">The Mark</span></em><span data-dcnode-id="2878" instrument_node=""> is to remote-pilot a jet airplane over Tel Aviv and then crash it into the Mediterranean Sea with a load of biochips, injectors, and guillotines on board to make it appear that all four of them died in an accident.</span></li><li data-dcnode-id="2870"><span data-dcnode-id="2876" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheManBehindTheMan" title="/pmwiki/pmwiki.php/Main/TheManBehindTheMan"><span data-dcnode-id="2875" instrument_node="">The Man Behind the Man</span></a><span data-dcnode-id="2873" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Satan" title="/pmwiki/pmwiki.php/Main/Satan"><span data-dcnode-id="2872" instrument_node="">Satan</span></a></li><li data-dcnode-id="2865"><span data-dcnode-id="2869" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManlyTears" title="/pmwiki/pmwiki.php/Main/ManlyTears"><span data-dcnode-id="2868" instrument_node="">Manly Tears</span></a><span data-dcnode-id="2866" instrument_node="">: Rayford literally breaks down in tears in front of Jesus as He tells Rayford all about his faults and triumphs.</span></li><li data-dcnode-id="2846"><span data-dcnode-id="2864" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="2863" instrument_node="">Mark of the Beast</span></a><span data-dcnode-id="2861" instrument_node="">: Featuring a variant in which the numbers of each region of the Global Community are based on a mathematical equation involving three sixes.</span><ul data-dcnode-id="2847"><li data-dcnode-id="2853"><span data-dcnode-id="2860" instrument_node=""> The mark itself plays off two different translations of Scripture: the biochip implant part refers to the mark being </span><em data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">in</span></em><span data-dcnode-id="2857" instrument_node=""> the right hand (as in the King James Version), while the tattoo of the region code or NJC (Nicolae's initials) refers to the mark being </span><em data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">on</span></em><span data-dcnode-id="2854" instrument_node=""> the right hand or the forehead (as in other translations).</span></li><li data-dcnode-id="2848"><span data-dcnode-id="2852" instrument_node=""> Mainyu Mazda, a Middle East black market dealer, has a fake mark with a number that </span><em data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">isn't</span></em><span data-dcnode-id="2849" instrument_node=""> his regional code or any of the regional codes...yet he's still evil in that he cares only about collecting bounties for the disloyal.</span></li></ul></li><li data-dcnode-id="2834"><span data-dcnode-id="2845" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MatzoFever" title="/pmwiki/pmwiki.php/Main/MatzoFever"><span data-dcnode-id="2844" instrument_node="">Matzo Fever</span></a><span data-dcnode-id="2842" instrument_node=""> / </span><a class="twikilink" data-dcnode-id="2840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MightyWhiteyAndMellowYellow" title="/pmwiki/pmwiki.php/Main/MightyWhiteyAndMellowYellow"><span data-dcnode-id="2841" instrument_node="">Mighty Whitey and Mellow Yellow</span></a><span data-dcnode-id="2839" instrument_node="">: Chang Wong and Naomi Tiberias. Lampshaded in the Dramatic Audio:</span><div class="indent" data-dcnode-id="2835"><strong data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Chang Wong:</span></strong><span data-dcnode-id="2836" instrument_node=""> Can you tell me what a Chinese-Hebrew wedding ceremony looks like?</span></div></li><li data-dcnode-id="2821"><span data-dcnode-id="2833" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MassOhCrap" title="/pmwiki/pmwiki.php/Main/MassOhCrap"><span data-dcnode-id="2832" instrument_node="">Mass "Oh, Crap!"</span></a><span data-dcnode-id="2830" instrument_node="">: During the 'sheep and goats' judgement, the reactions of the unsaved and those who had taken the </span><a class="twikilink" data-dcnode-id="2828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="2829" instrument_node="">Mark of the Beast</span></a><span data-dcnode-id="2827" instrument_node=""> when Jesus condemns them to the Lake of Fire for not caring for "the least of My brethren", referring to Israel. Basically saying that if you're not a friend to Israel and the Jews during the Tribulation, you're going to Hell.</span><div class="indent" data-dcnode-id="2822"><span data-dcnode-id="2826" instrument_node=""> </span><strong data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">Jesus Christ:</span></strong><span data-dcnode-id="2823" instrument_node=""> Depart from Me, you cursed, into the everlasting fire prepared for the devil and his angels. For I was hungry, and you gave Me no food; I was thirsty, and you gave Me no drink; I was a stranger, and you did not take Me in; naked, and you did not clothe Me; sick and in prison, and you did not visit Me. Assuredly, I say to you, inasmuch as you did not do it to one of the least of these, you did not do it to Me. You will go away into everlasting punishment.</span></div></li><li data-dcnode-id="2790"><span data-dcnode-id="2820" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="2819" instrument_node="">Meaningful Name</span></a><span data-dcnode-id="2817" instrument_node="">: Jenkins has a thing for them. The heroes have super-manly names like Buck Williams and Rayford Steele. How good he is at this lies with the reader...</span><ul data-dcnode-id="2793"><li data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node=""> Verna Zee, Buck's theoretically-snippy boss, can be shortened to Ms. Zee — "Missy".</span></li><li data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node=""> Jonathan Stonagal's name ("Stone-a-gal") is a play on Rockefeller.</span></li><li data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node=""> Carpathia's other Dragon aside from Leon Fortunato, Viv Ivins. Remove the "n-s" and you have Viv Ivi, or VI VI VI, the roman numerals for 666. This one is notable in that VI VI VI isn't the Roman-numeralish for 666, it's the Roman-numeralish for "six six six". The Number of the Beast isn't "six six six", it's (per Revelation 13:18) "six hundred sixty six" — which in Roman numerals would be DCLXVI. Thus, a more fitting name might be Declan Xavier.</span></li><li data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node=""> More of a Meaningful Number, but Carpathia's obsession with the number 216 comes from 6 x 6 x 6 = 216. Also in a later book, each of the Ten Kingdoms is assigned a number and while the numbering system is never explained, each number can come from some mathematical combination of three sixes.</span></li><li data-dcnode-id="2800"><span data-dcnode-id="2808" instrument_node=""> Nicolae Carpathia is a clear reference to </span><a class="urllink" data-dcnode-id="2805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Nicolae_Ceau%253C%21--C8--%253E99escu"><span data-dcnode-id="2807" instrument_node="">Nicolae Ceausescu</span><img data-dcnode-id="2806" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2804" instrument_node="">, the last Romanian dictator. It also references the Nicolaitans (a heretical sect of Christianity) in the </span><a class="twikilink" data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/BookOfRevelation" title="/pmwiki/pmwiki.php/Literature/BookOfRevelation"><span data-dcnode-id="2803" instrument_node="">Book of Revelation</span></a><span data-dcnode-id="2801" instrument_node="">.</span></li><li data-dcnode-id="2794"><span data-dcnode-id="2799" instrument_node=""> When the first book opens, the married Steele is sexually fixated on a woman named "Hattie Durham". As Fred Clark </span><a class="urllink" data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.patheos.com/blogs/slacktivist/2003/10/18/left-behind-pretrib-porno/"><span data-dcnode-id="2798" instrument_node="">points out</span><img data-dcnode-id="2797" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2795" instrument_node="">,</span></li></ul><div class="indent" data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">Eldridge Cleaver could have written volumes trying to unpack all the Southern sexual myths crammed into that name.</span></div></li><li data-dcnode-id="2779"><span data-dcnode-id="2789" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaninglessVillainVictory" title="/pmwiki/pmwiki.php/Main/MeaninglessVillainVictory"><span data-dcnode-id="2788" instrument_node="">Meaningless Villain Victory</span></a><span data-dcnode-id="2786" instrument_node="">: In the book </span><em data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="2783" instrument_node="">, Abdullah Smith points out to Sarsour the futility of Satan's and The Other Light's plan to overthrow God by telling him that even if Satan has a chance of winning, he wouldn't be able to resurrect all the people who died as martyrs for The Other Light because God hasn't given Satan the power to do so. Which is an odd statement because on at least three occasions, Satan or his minions </span><em data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">did</span></em><span data-dcnode-id="2780" instrument_node=""> resurrect people.</span></li><li data-dcnode-id="2774"><span data-dcnode-id="2778" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMeddlingKidsAreUseless" title="/pmwiki/pmwiki.php/Main/TheMeddlingKidsAreUseless"><span data-dcnode-id="2777" instrument_node="">The Meddling Kids Are Useless</span></a><span data-dcnode-id="2775" instrument_node="">: Buck and Rayford get into danger, but they don't affect the actual events or main plot much at all, given that they've been prophesied to happen in one specific way.</span></li><li data-dcnode-id="2769"><span data-dcnode-id="2773" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MillionMookMarch" title="/pmwiki/pmwiki.php/Main/MillionMookMarch"><span data-dcnode-id="2772" instrument_node="">Million Mook March</span></a><span data-dcnode-id="2770" instrument_node="">: Jesus' army of saints, surprisingly. Also the 200 million horsemen that sweep across the globe during one of God's Trumpet Judgments, looking for those that do not bear the Seal of God on their foreheads to slay.</span></li><li data-dcnode-id="2761"><span data-dcnode-id="2768" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MiracleFood" title="/pmwiki/pmwiki.php/Main/MiracleFood"><span data-dcnode-id="2767" instrument_node="">Miracle Food</span></a><span data-dcnode-id="2765" instrument_node="">: God rains down manna for the people of Israel to eat during their time in Petra in the last half of the Tribulation. In </span><em data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="2762" instrument_node="">, He also provides so much meat for Ezer Borstein to butcher that he's basically giving it away free of charge.</span></li><li data-dcnode-id="2750"><span data-dcnode-id="2760" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MistakenForCheating" title="/pmwiki/pmwiki.php/Main/MistakenForCheating"><span data-dcnode-id="2759" instrument_node="">Mistaken for Cheating</span></a><span data-dcnode-id="2757" instrument_node="">: In </span><em data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">Tribulation Force</span></em><span data-dcnode-id="2754" instrument_node="">, Buck and Chloe have barely started seeing each other, and Chloe sees Buck's secretary Alice Nelson outside his apartment with a ring on her finger and speaking with her fiance on the phone, making her assume that Buck was her fiance and that he was two-timing her. In the first-part movie adaptation of the book, Chloe was greeted by </span><a class="twikilink" data-dcnode-id="2752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CaptainErsatz" title="/pmwiki/pmwiki.php/Main/CaptainErsatz"><span data-dcnode-id="2753" instrument_node="">Ivy Gold</span></a><span data-dcnode-id="2751" instrument_node=""> at the apartment and ended up assuming the same thing of Buck.</span></li><li data-dcnode-id="2745"><span data-dcnode-id="2749" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMole" title="/pmwiki/pmwiki.php/Main/TheMole"><span data-dcnode-id="2748" instrument_node="">The Mole</span></a><span data-dcnode-id="2746" instrument_node="">: Carpathia had conducted a smear campaign against Amanda White-Steele, showing her that she was in fact on the GC's payroll. Hattie, however, tells Rayford that his late wife was not a mole and that she truly loved him.</span></li><li data-dcnode-id="2720"><span data-dcnode-id="2744" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MotiveRant" title="/pmwiki/pmwiki.php/Main/MotiveRant"><span data-dcnode-id="2743" instrument_node="">Motive Rant</span></a><span data-dcnode-id="2741" instrument_node="">: Carpathia confesses to Leon and the 10 subpotentates that he </span><strong data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">is</span></strong><span data-dcnode-id="2738" instrument_node=""> the Antichrist in </span><em data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Armageddon</span></em><span data-dcnode-id="2735" instrument_node="">. After giving an </span><a class="twikilink" data-dcnode-id="2733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnreliableExpositor" title="/pmwiki/pmwiki.php/Main/UnreliableExpositor"><span data-dcnode-id="2734" instrument_node="">Unreliable Expositor</span></a><span data-dcnode-id="2732" instrument_node=""> mini-lecture on what first caused Satan to rebel against God, he declares his own aims:</span><div class="indent" data-dcnode-id="2721"><span data-dcnode-id="2731" instrument_node=""> </span><strong data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">Carpathia:</span></strong><span data-dcnode-id="2728" instrument_node=""> Am I Antichrist? </span><a class="twikilink" data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrivenByEnvy" title="/pmwiki/pmwiki.php/Main/DrivenByEnvy"><span data-dcnode-id="2727" instrument_node="">Well, if he is Christ, then yes!</span></a><span data-dcnode-id="2725" instrument_node=""> Yes! I am against the Christ who was falsely crowned by the pretend creator. I will ascend into heaven! I will exalt my throne above the stars of God! I will ascend above the heights of the clouds! I will be like the Most High! (</span><a class="twikilink" data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AGodAmI" title="/pmwiki/pmwiki.php/Main/AGodAmI"><span data-dcnode-id="2724" instrument_node="">...for I AM THE MOST HIGH!</span></a><span data-dcnode-id="2722" instrument_node="">)</span></div></li><li data-dcnode-id="2709"><span data-dcnode-id="2719" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MurderByCremation" title="/pmwiki/pmwiki.php/Main/MurderByCremation"><span data-dcnode-id="2718" instrument_node="">Murder by Cremation</span></a><span data-dcnode-id="2716" instrument_node="">: Suhail Akbar sends the two pilots who bombed Petra (which had failed due to God protecting the city and the people) to be incinerated </span><strong data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">alive</span></strong><span data-dcnode-id="2713" instrument_node="">. He does sedate them before barbecuing both men.</span><ul data-dcnode-id="2710"><li data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node=""> Subverted by Carpathia's attempt to barbecue the Jewish Remnant in Petra, as they were protected by God.</span></li></ul></li><li data-dcnode-id="2704"><span data-dcnode-id="2708" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MurderSuicide" title="/pmwiki/pmwiki.php/Main/MurderSuicide"><span data-dcnode-id="2707" instrument_node="">Murder-Suicide</span></a><span data-dcnode-id="2705" instrument_node="">: What Jonathan Stonagal's and Joshua Todd-Cothran's murders by Carpathia were made out to be through Nicolae Carpathia's brainwashing the participants of the United Nations meeting, except for Buck Williams being protected by God. Chaim Rosenzweig later learns the truth when he becomes a believer.</span></li><li data-dcnode-id="2693"><span data-dcnode-id="2703" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MyGodWhatHaveIDone" title="/pmwiki/pmwiki.php/Main/MyGodWhatHaveIDone"><span data-dcnode-id="2702" instrument_node="">My God, What Have I Done?</span></a><span data-dcnode-id="2700" instrument_node="">: Tsion Ben-Judah's reaction in </span><em data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Desecration</span></em><span data-dcnode-id="2697" instrument_node=""> when he realizes he has given away the location of where the Israeli Jews would flee to according to what the book of Revelation says about the matter (the deserted city of Petra), fearing that he has messed up God's plan. He gets some reassurance from one of the Tribulation Force members that God </span><em data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">may have intended</span></em><span data-dcnode-id="2694" instrument_node=""> for Tsion to let slip the location of where the Jews would flee to in order to lure Nicolae Carpathia's forces into a trap God has set up for them, which is all according to the Word of God.</span></li><li data-dcnode-id="2682"><span data-dcnode-id="2692" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MythologyGag" title="/pmwiki/pmwiki.php/Main/MythologyGag"><span data-dcnode-id="2691" instrument_node="">Mythology Gag</span></a><span data-dcnode-id="2689" instrument_node="">: Nicolae Carpathia had the rest rooms of his underground bunker in Jerusalem empty out its fecal material in a holy place called the Cradle Of Jesus...similar to what Jehu son of Jehoshaphat from 2nd Kings did with a house of Baal after he was done slaying the worshipers of Baal: turn it into an outhouse.</span><ul data-dcnode-id="2683"><li data-dcnode-id="2684"><span data-dcnode-id="2688" instrument_node=""> In </span><em data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">Desecration</span></em><span data-dcnode-id="2685" instrument_node="">, Carpathia mocks Jesus' triumphal entry into Jerusalem on a donkey by riding through the Via Dolorosa on an enormous pig that he later sacrifices in the Temple.</span></li></ul></li><li data-dcnode-id="2669"><span data-dcnode-id="2681" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NamesToRunAwayFromReallyFast" title="/pmwiki/pmwiki.php/Main/NamesToRunAwayFromReallyFast"><span data-dcnode-id="2680" instrument_node="">Names to Run Away from Really Fast</span></a><span data-dcnode-id="2678" instrument_node="">: Nicolae is the first name of a Romanian dictator, and </span><a class="twikilink" data-dcnode-id="2676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Dracula" title="/pmwiki/pmwiki.php/Main/Dracula"><span data-dcnode-id="2677" instrument_node="">Dracula</span></a><span data-dcnode-id="2675" instrument_node=""> being associated with the Carpathian Mountains.</span><ul data-dcnode-id="2670"><li data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node=""> Not to mention that "Old Nick" is one of Satan's nicknames.</span></li><li data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node=""> If you're part of the Global Community, Jesus Christ certainly qualifies...although it won't do you any good.</span></li></ul></li><li data-dcnode-id="2651"><span data-dcnode-id="2668" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NastyParty" title="/pmwiki/pmwiki.php/Main/NastyParty"><span data-dcnode-id="2667" instrument_node="">Nasty Party</span></a><span data-dcnode-id="2665" instrument_node="">: In the book </span><em data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">Assassins</span></em><span data-dcnode-id="2662" instrument_node="">, Pontifex Maximus Peter Mathews of Enigma Babylon One World Faith is invited to a private party hosted by the ten regional subpotentates of the Global Community to show him a massive ice sculpture made in his honor. However, in playing out what the </span><a class="twikilink" data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/BookOfRevelation" title="/pmwiki/pmwiki.php/Literature/BookOfRevelation"><span data-dcnode-id="2661" instrument_node="">Book of Revelation</span></a><span data-dcnode-id="2659" instrument_node=""> says about the "</span><a class="urllink" data-dcnode-id="2656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/passage/%3Fsearch%3Drev%252017%3A16-17%26version%3DKJV"><span data-dcnode-id="2658" instrument_node="">whore that sits on the beast</span><img data-dcnode-id="2657" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2655" instrument_node="">", the ten subpotentates use that party as a united opportunity to kill Peter Mathews with </span><a class="twikilink" data-dcnode-id="2653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FeatherFlechettes" title="/pmwiki/pmwiki.php/Main/FeatherFlechettes"><span data-dcnode-id="2654" instrument_node="">sharp ice feathers from the sculpture</span></a><span data-dcnode-id="2652" instrument_node="">, eventually causing Enigma Babylon to fold with the Pontifex Maximus' death and to soon be replaced with Carpathianism following Nicolae Carpathia's death and "resurrection".</span></li><li data-dcnode-id="2646"><span data-dcnode-id="2650" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeutralityBacklash" title="/pmwiki/pmwiki.php/Main/NeutralityBacklash"><span data-dcnode-id="2649" instrument_node="">Neutrality Backlash</span></a><span data-dcnode-id="2647" instrument_node="">: The world during the Tribulation period in the series isn't a place for anyone to claim neutrality. If you don't get killed by Nicolae Carpathia and the Global Community for not being loyal to him (and even if you are loyal, you're still screwed no matter what), God will send you to Hell for not taking His side in the cosmic conflict.</span></li><li data-dcnode-id="2638"><span data-dcnode-id="2645" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeverGotToSayGoodbye" title="/pmwiki/pmwiki.php/Main/NeverGotToSayGoodbye"><span data-dcnode-id="2644" instrument_node="">Never Got to Say Goodbye</span></a><span data-dcnode-id="2642" instrument_node="">: How Rayford feels about Irene after the Rapture.</span><ul data-dcnode-id="2639"><li data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node=""> Also counts with Hannah Palemoon and David Hassid.</span></li></ul></li><li data-dcnode-id="2630"><span data-dcnode-id="2637" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewPowersAsThePlotDemands" title="/pmwiki/pmwiki.php/Main/NewPowersAsThePlotDemands"><span data-dcnode-id="2636" instrument_node="">New Powers as the Plot Demands</span></a><span data-dcnode-id="2634" instrument_node="">: Every time the heroes' backs are against the wall with no way out, all that needs to happen is for them to pray and God will grant them whatever ability is needed to extract them from their predicament.</span><ul data-dcnode-id="2631"><li data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node=""> In the first book, Buck manages to escape Carpathia's hypnosis at the UN by praying to God, who also conveniently rewrites Carpathia's memory to erase any instance of Buck not behaving exactly as intended.</span></li></ul></li><li data-dcnode-id="2625"><span data-dcnode-id="2629" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero" title="/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero"><span data-dcnode-id="2628" instrument_node="">Nice Job Breaking It, Hero</span></a><span data-dcnode-id="2626" instrument_node="">: Nice job getting the Greek Co-Op wiped out, George!</span></li><li data-dcnode-id="2620"><span data-dcnode-id="2624" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NightmareFace" title="/pmwiki/pmwiki.php/Main/NightmareFace"><span data-dcnode-id="2623" instrument_node="">Nightmare Face</span></a><span data-dcnode-id="2621" instrument_node="">: Steve Plank, post-Wrath of the Lamb. Yeesh.</span></li><li data-dcnode-id="2609"><span data-dcnode-id="2619" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheNightThatNeverEnds" title="/pmwiki/pmwiki.php/Main/TheNightThatNeverEnds"><span data-dcnode-id="2618" instrument_node="">The Night That Never Ends</span></a><span data-dcnode-id="2616" instrument_node="">: One of God's Bowl Judgments plunges New Babylon into perpetual complete darkness that no one except for believers in Christ (and Nicolae Carpathia with his </span><a class="twikilink" data-dcnode-id="2614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PowerGlows" title="/pmwiki/pmwiki.php/Main/PowerGlows"><span data-dcnode-id="2615" instrument_node="">Power Glows</span></a><span data-dcnode-id="2613" instrument_node="">) can see their way through. (To say nothing of the Carpathia loyalists also having incurable pains and sores.) It is only lifted near the time of Jesus Christ's </span><a class="twikilink" data-dcnode-id="2611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SecondComing" title="/pmwiki/pmwiki.php/Main/SecondComing"><span data-dcnode-id="2612" instrument_node="">Second Coming</span></a><span data-dcnode-id="2610" instrument_node="">, when an angel of the Lord warns believers to get out of New Babylon before it is destroyed.</span></li><li data-dcnode-id="2604"><span data-dcnode-id="2608" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoHuggingNoKissing" title="/pmwiki/pmwiki.php/Main/NoHuggingNoKissing"><span data-dcnode-id="2607" instrument_node="">No Hugging, No Kissing</span></a><span data-dcnode-id="2605" instrument_node="">: Not outside of marriage, at least. Try telling that to David Hassid and Annie Christopher, the unmarried Christian couple in New Babylon with the relationship they don't want people to know about.</span></li><li data-dcnode-id="2589"><span data-dcnode-id="2603" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoOneCouldSurviveThat" title="/pmwiki/pmwiki.php/Main/NoOneCouldSurviveThat"><span data-dcnode-id="2602" instrument_node="">No One Could Survive That!</span></a><span data-dcnode-id="2600" instrument_node="">:</span><ul data-dcnode-id="2590"><li data-dcnode-id="2596"><span data-dcnode-id="2599" instrument_node=""> Steve Plank survived the Wrath of the Lamb Earthquake...although </span><a class="twikilink" data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NightmareFace" title="/pmwiki/pmwiki.php/Main/NightmareFace"><span data-dcnode-id="2598" instrument_node="">he ended up terribly mangled in the process.</span></a></li><li data-dcnode-id="2591"><span data-dcnode-id="2595" instrument_node=""> Inverted with Leon Fortunato, as he </span><em data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">did not</span></em><span data-dcnode-id="2592" instrument_node=""> survive said quake. Carpathia, however, has other plans.</span></li></ul></li><li data-dcnode-id="2581"><span data-dcnode-id="2588" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NostalgicNarrator" title="/pmwiki/pmwiki.php/Main/NostalgicNarrator"><span data-dcnode-id="2587" instrument_node="">Nostalgic Narrator</span></a><span data-dcnode-id="2585" instrument_node="">: In the Dramatic Audio version of the book </span><em data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="2582" instrument_node="">, a grown-up Kenny Williams (the son of Buck and Chloe Williams) narrates some of the events that took place in the book from sometime in the future.</span></li><li data-dcnode-id="2568"><span data-dcnode-id="2580" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotWhatItLooksLike" title="/pmwiki/pmwiki.php/Main/NotWhatItLooksLike"><span data-dcnode-id="2579" instrument_node="">Not What It Looks Like</span></a><span data-dcnode-id="2577" instrument_node="">: Chloe goes over to Buck's apartment and sees his Global Weekly office co-worker Alice outside it talking on the phone to her fiance while delivering stuff to Buck's apartment. Chloe assumes from that that Buck is Alice's fiance and was playing her for her affections all along. It takes a private talk between Buck and Chloe to straighten the whole matter out.</span><ul data-dcnode-id="2569"><li data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node=""> This also gets carried over into the bouquet of flowers that Chloe assumed Buck had sent her, which she then threw into the trash after witnessing the previously-mentioned assumption. It turns out that the flowers were sent to Chloe by Hattie Durham as a joke.</span></li><li data-dcnode-id="2570"><span data-dcnode-id="2574" instrument_node=""> Kenny Bruce Williams goes through this in </span><em data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="2571" instrument_node=""> when he was secretly infiltrating the Other Light faction to see what they were planning to do, with an Other Light plant working at the Children of the Tribulation daycare center planting false evidence about Kenny to frame him as a traitor.</span></li></ul></li><li data-dcnode-id="2563"><span data-dcnode-id="2567" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheNudifier" title="/pmwiki/pmwiki.php/Main/TheNudifier"><span data-dcnode-id="2566" instrument_node="">The Nudifier</span></a><span data-dcnode-id="2564" instrument_node="">: Hinted at in the first book when people are removed from their clothes during the Rapture.</span></li><li data-dcnode-id="2552"><span data-dcnode-id="2562" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NukeEm" title="/pmwiki/pmwiki.php/Main/NukeEm"><span data-dcnode-id="2561" instrument_node="">Nuke 'em</span></a><span data-dcnode-id="2559" instrument_node="">: So long, London and D.C. Bye-bye, Chicago.</span><ul data-dcnode-id="2553"><li data-dcnode-id="2554"><span data-dcnode-id="2558" instrument_node=""> God pouring out fire from the skies to instantly incinerate Satan's The Other Light army is a real big </span><a class="twikilink" data-dcnode-id="2556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NukeEm" title="/pmwiki/pmwiki.php/Main/NukeEm"><span data-dcnode-id="2557" instrument_node="">Nuke 'em</span></a><span data-dcnode-id="2555" instrument_node=""> moment.</span></li></ul></li><li data-dcnode-id="2547"><span data-dcnode-id="2551" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NumberOfTheBeast" title="/pmwiki/pmwiki.php/Main/NumberOfTheBeast"><span data-dcnode-id="2550" instrument_node="">Number of the Beast</span></a><span data-dcnode-id="2548" instrument_node="">: Nicolae Carpathia's favorite variant is 216, which is 6x6x6.</span></li><li data-dcnode-id="2539"><span data-dcnode-id="2546" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ObiWanMoment" title="/pmwiki/pmwiki.php/Main/ObiWanMoment"><span data-dcnode-id="2545" instrument_node="">Obi-Wan Moment</span></a><span data-dcnode-id="2543" instrument_node="">: Any believer who decides to become a martyr. Overlaps with </span><a class="twikilink" data-dcnode-id="2541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FaceDeathWithDignity" title="/pmwiki/pmwiki.php/Main/FaceDeathWithDignity"><span data-dcnode-id="2542" instrument_node="">Face Death with Dignity</span></a><span data-dcnode-id="2540" instrument_node="">.</span></li><li data-dcnode-id="2530"><span data-dcnode-id="2538" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OddlySmallOrganization" title="/pmwiki/pmwiki.php/Main/OddlySmallOrganization"><span data-dcnode-id="2537" instrument_node="">Oddly Small Organization</span></a><span data-dcnode-id="2535" instrument_node="">: The Tribulation Force itself, and also the "</span><a class="urllink" data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//slacktivist.typepad.com/slacktivist/2010/07/tf-gang-of-four.html"><span data-dcnode-id="2534" instrument_node="">Gang of Four</span><img data-dcnode-id="2533" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2531" instrument_node="">" conspiring to set up the One-World Government.</span></li><li data-dcnode-id="2525"><span data-dcnode-id="2529" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OffscreenMomentOfAwesome" title="/pmwiki/pmwiki.php/Main/OffscreenMomentOfAwesome"><span data-dcnode-id="2528" instrument_node="">Offscreen Moment of Awesome</span></a><span data-dcnode-id="2526" instrument_node="">: Steele's first landing at O'Hare during the Rapture is built up immensely, but actually occurs between chapters.</span></li><li data-dcnode-id="2517"><span data-dcnode-id="2524" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OffWithHisHead" title="/pmwiki/pmwiki.php/Main/OffWithHisHead"><span data-dcnode-id="2523" instrument_node="">Off with His Head!</span></a><span data-dcnode-id="2521" instrument_node="">: Done through guillotines (referred to as "loyalty enforcement facilitators") on the general populace to enforce the law of taking the "</span><a class="twikilink" data-dcnode-id="2519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="2520" instrument_node="">mark of loyalty</span></a><span data-dcnode-id="2518" instrument_node="">" during the Tribulation.</span></li><li data-dcnode-id="2477"><span data-dcnode-id="2516" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OhCrap" title="/pmwiki/pmwiki.php/Main/OhCrap"><span data-dcnode-id="2515" instrument_node="">Oh, Crap!</span></a><span data-dcnode-id="2513" instrument_node="">: Plenty from both sides. The </span><a class="twikilink" data-dcnode-id="2511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EurekaMoment" title="/pmwiki/pmwiki.php/Main/EurekaMoment"><span data-dcnode-id="2512" instrument_node="">"Eureka!" Moment</span></a><span data-dcnode-id="2510" instrument_node=""> regarding Buck and Rayford in regards to the Wrath of the Lamb Earthquake is one major example.</span><ul data-dcnode-id="2478"><li data-dcnode-id="2506"><span data-dcnode-id="2509" instrument_node=""> Rayford's reaction when The Rapture hits, and he realizes that </span><a class="twikilink" data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IWarnedYou" title="/pmwiki/pmwiki.php/Main/IWarnedYou"><span data-dcnode-id="2508" instrument_node="">Irene was right.</span></a></li><li data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node=""> Leah Rose's reaction in regards to the 200 million demonic horsemen which slay the unbelievers.</span></li><li data-dcnode-id="2499"><span data-dcnode-id="2503" instrument_node=""> Buck's reaction when he sees Hattie confront both Carpathia and Fortunato in </span><em data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Desecration</span></em><span data-dcnode-id="2500" instrument_node="">.</span></li><li data-dcnode-id="2494"><span data-dcnode-id="2498" instrument_node=""> In the Dramatic Audio of </span><em data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="2495" instrument_node="">, the reactions of Fortunato and Carpathia when the Archangel Michael corners them.</span></li><li data-dcnode-id="2489"><span data-dcnode-id="2493" instrument_node=""> </span><em data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Assassins</span></em><span data-dcnode-id="2490" instrument_node=""> has Leon Fortunato recognizing that he was set up by Sub-Potentate Rehoboth.</span></li><li data-dcnode-id="2481"><span data-dcnode-id="2488" instrument_node=""> The mother of all Oh Craps comes from Lucifer himself in </span><em data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="2485" instrument_node="">. </span><a class="twikilink" data-dcnode-id="2483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="2484" instrument_node="">After Jesus decimates The Other Light on the final day of the Millennial Kingdom</span></a><span data-dcnode-id="2482" instrument_node="">, Lucifer "looked about him and slowly lowered his sword. He appeared to had something to say and even drew breath to say it, but fell silent." Even he knows that he is oh so very screwed.</span></li><li data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node=""> Marilena Carpathia, when she realizes that she has been left to die.</span></li></ul></li><li data-dcnode-id="2466"><span data-dcnode-id="2476" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OlderThanTheyLook" title="/pmwiki/pmwiki.php/Main/OlderThanTheyLook"><span data-dcnode-id="2475" instrument_node="">Older Than They Look</span></a><span data-dcnode-id="2473" instrument_node="">: Once the Millennium starts in </span><em data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="2470" instrument_node="">, all the naturals who enter this time period (either believers or children of believers) experience decreased aging similar to the first several generations of mankind in the book of Genesis, with the children becoming young adults by the time they reach 100. However, </span><a class="twikilink" data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathsHourglass" title="/pmwiki/pmwiki.php/Main/DeathsHourglass"><span data-dcnode-id="2469" instrument_node="">naturals who remain unbelievers by the time they reach 100 will instantly die and go to Hell</span></a><span data-dcnode-id="2467" instrument_node="">. It's not explained how those who were already adults, including those who were already at advanced age, experience this decreased aging at the same rate as the children who enter the Millennium. By the end of the Millennium, however, the longest-living naturals (who at that point are all believers) end up really showing their age.</span></li><li data-dcnode-id="2455"><span data-dcnode-id="2465" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OminousLatinChanting" title="/pmwiki/pmwiki.php/Main/OminousLatinChanting"><span data-dcnode-id="2464" instrument_node="">Ominous Latin Chanting</span></a><span data-dcnode-id="2462" instrument_node="">: The demonic locusts chanting "Abaddon." Very creepy in the Dramatic Audio.</span><ul data-dcnode-id="2456"><li data-dcnode-id="2457"><span data-dcnode-id="2461" instrument_node=""> In the Dramatic Audio version of </span><em data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Assassins</span></em><span data-dcnode-id="2458" instrument_node="">, the Two Witnesses ominously chant "Jerusalem" as they are resurrected.</span></li></ul></li><li data-dcnode-id="2447"><span data-dcnode-id="2454" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OmnidisciplinaryScientist" title="/pmwiki/pmwiki.php/Main/OmnidisciplinaryScientist"><span data-dcnode-id="2453" instrument_node="">Omnidisciplinary Scientist</span></a><span data-dcnode-id="2451" instrument_node="">: Dr. Chaim Rosenzweig. Specifically in the movie where he helps strategize against the oncoming Russians. He's a botanist for crying out loud!</span><ul data-dcnode-id="2448"><li data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node=""> Lampshaded when Rosenzweig points out he is a botanist, not a physicist, when asked to explain the sudden decrease of solar intensity.</span></li></ul></li><li data-dcnode-id="2442"><span data-dcnode-id="2446" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Omniglot" title="/pmwiki/pmwiki.php/Main/Omniglot"><span data-dcnode-id="2445" instrument_node="">Omniglot</span></a><span data-dcnode-id="2443" instrument_node="">: Nicolae Carpathia is capable of speaking every major language on earth.</span></li></ul><ul data-dcnode-id="2359"><li data-dcnode-id="2435"><span data-dcnode-id="2439" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHourWorkWeek" title="/pmwiki/pmwiki.php/Main/OneHourWorkWeek"><span data-dcnode-id="2438" instrument_node="">One-Hour Work Week</span></a><span data-dcnode-id="2436" instrument_node="">: Buck spends zero time actually doing his job.</span></li><li data-dcnode-id="2430"><span data-dcnode-id="2434" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneWorldOrder" title="/pmwiki/pmwiki.php/Main/OneWorldOrder"><span data-dcnode-id="2433" instrument_node="">One World Order</span></a><span data-dcnode-id="2431" instrument_node="">: Carpathia's Global Community unites all of the world's governments into a single nation.</span></li><li data-dcnode-id="2411"><span data-dcnode-id="2429" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneHitPolyKill" title="/pmwiki/pmwiki.php/Main/OneHitPolyKill"><span data-dcnode-id="2428" instrument_node="">One Hit Poly Kill</span></a><span data-dcnode-id="2426" instrument_node="">: Carpathia kills </span><span class="spoiler" data-dcnode-id="2424" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2425" instrument_node="">Stonagal and Todd-Cothran</span></span><span data-dcnode-id="2423" instrument_node=""> with one bullet.</span><ul data-dcnode-id="2412"><li data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node=""> This despite the fact that the bullet in question is described several times as a hollow point, which expands on impact and could not travel through one skull to another, even if it weren't just .38 ammo. .38's aren't that big and do not have that much firing power, a far cry from the hand cannon described in the book. That... and there is literally no way a hollow point bullet could kill two people.</span></li><li data-dcnode-id="2413"><span data-dcnode-id="2420" instrument_node=""> The movie averts this by having Carpathia shoot twice, with the idea being that it was a murder-suicide.</span><ul data-dcnode-id="2414"><li data-dcnode-id="2415"><span data-dcnode-id="2419" instrument_node=""> Jesus using </span><a class="twikilink" data-dcnode-id="2417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="2418" instrument_node="">the Word of God</span></a><span data-dcnode-id="2416" instrument_node=""> to slay the Global Community army en masse certainly qualifies as this.</span></li></ul></li></ul></li><li data-dcnode-id="2403"><span data-dcnode-id="2410" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneTrueFaith" title="/pmwiki/pmwiki.php/Main/OneTrueFaith"><span data-dcnode-id="2409" instrument_node="">One True Faith</span></a><span data-dcnode-id="2407" instrument_node="">: There's the pantheistic mishmash of all world religions called Enigma Babylon One World Faith as the official one-world religion, but there's also Christianity (as defined by the books' authors and the Tribulation Force characters), Judaism, and Islam (which in the book series ends up being a minority religion), which </span><a class="twikilink" data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IllegalReligion" title="/pmwiki/pmwiki.php/Main/IllegalReligion"><span data-dcnode-id="2406" instrument_node="">all become illegal to practice</span></a><span data-dcnode-id="2404" instrument_node=""> even when Enigma Babylon is replaced by the Luciferian-type state religion of Carpathianism around the midway point of the Tribulation. In the Millennial Kingdom, Christianity becomes the official one-world religion, though dissidents are permitted to practice the beliefs of the Other Light despite the fact that (1) it's totally in error when it comes to believing Satan is going to defeat God and Jesus by the end of the Millennium and (2) those who remain unbelievers in God and Jesus Christ by the time they reach 100 will instantly die and go to Hell.</span></li><li data-dcnode-id="2398"><span data-dcnode-id="2402" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnlyAFleshWound" title="/pmwiki/pmwiki.php/Main/OnlyAFleshWound"><span data-dcnode-id="2401" instrument_node="">Only a Flesh Wound</span></a><span data-dcnode-id="2399" instrument_node="">: Tsion, Buck and Rayford are grievously injured in the Battle of Armageddon. Rayford survives. Tsion and Buck are not as lucky.</span></li><li data-dcnode-id="2387"><span data-dcnode-id="2397" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnlyICanKillHim" title="/pmwiki/pmwiki.php/Main/OnlyICanKillHim"><span data-dcnode-id="2396" instrument_node="">Only I Can Kill Him</span></a><span data-dcnode-id="2394" instrument_node="">: More like Only I Am Can Kill Him, as nobody can defeat Satan and the Antichrist except for Jesus Christ, as </span><a class="twikilink" data-dcnode-id="2392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="2393" instrument_node="">The Word of God</span></a><span data-dcnode-id="2391" instrument_node=""> dictates.</span><ul data-dcnode-id="2388"><li data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node=""> Both Rayford and Hattie obsess over killing Carpathia for reasons of their own. Chaim succeeds in doing the deed, but Satan has other plans.</span></li></ul></li><li data-dcnode-id="2379"><span data-dcnode-id="2386" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnlyKnownByTheirNickname" title="/pmwiki/pmwiki.php/Main/OnlyKnownByTheirNickname"><span data-dcnode-id="2385" instrument_node="">Only Known by Their Nickname</span></a><span data-dcnode-id="2383" instrument_node="">: Albie, the black arms dealer who later becomes a believer. Also Razor.</span><ul data-dcnode-id="2380"><li data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node=""> Some bit part characters are only known by nicknames such as Walkie-Talkie and Vest Chest.</span></li></ul></li><li data-dcnode-id="2374"><span data-dcnode-id="2378" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OrganizationWithUnlimitedFunding" title="/pmwiki/pmwiki.php/Main/OrganizationWithUnlimitedFunding"><span data-dcnode-id="2377" instrument_node="">Organization with Unlimited Funding</span></a><span data-dcnode-id="2375" instrument_node="">: Subverted. While the book is highly criticized for turning the Secretary-General of the United Nations into a global king, there is one surprisingly realistic touch: The UN's budget is very limited so Carpathia has to pay for many of his actions out of his own pocket rather than rely on some magically limitless amount of money.</span></li><li data-dcnode-id="2360"><span data-dcnode-id="2373" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OverprotectiveDad" title="/pmwiki/pmwiki.php/Main/OverprotectiveDad"><span data-dcnode-id="2372" instrument_node="">Overprotective Dad</span></a><span data-dcnode-id="2370" instrument_node="">: Subverted. Rayford sides with Buck when his daughter is in tears because it </span><a class="twikilink" data-dcnode-id="2368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotWhatItLooksLike" title="/pmwiki/pmwiki.php/Main/NotWhatItLooksLike"><span data-dcnode-id="2369" instrument_node="">looked like Buck was two-timing</span></a><span data-dcnode-id="2367" instrument_node="">. Rayford's silent cheering when Buck raises his voice against Chloe, who's practically in tears, helps you realize there are worse things than a straight </span><a class="twikilink" data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OverprotectiveDad" title="/pmwiki/pmwiki.php/Main/OverprotectiveDad"><span data-dcnode-id="2366" instrument_node="">Overprotective Dad</span></a><span data-dcnode-id="2364" instrument_node="">.</span><ul data-dcnode-id="2361"><li data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node=""> Eleazar Tiberias is a bit of this with his daughter Naomi.</span></li></ul></li></ul><ul data-dcnode-id="2053"><li data-dcnode-id="2353"><span data-dcnode-id="2357" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PerpetualMotionMonster" title="/pmwiki/pmwiki.php/Main/PerpetualMotionMonster"><span data-dcnode-id="2356" instrument_node="">Perpetual-Motion Monster</span></a><span data-dcnode-id="2354" instrument_node="">: After being indwelt by Satan, Carpathia no longer needs to eat, drink, or sleep because Satan's power keeps his body in top physical shape.</span></li><li data-dcnode-id="2348"><span data-dcnode-id="2352" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PersonaNonGrata" title="/pmwiki/pmwiki.php/Main/PersonaNonGrata"><span data-dcnode-id="2351" instrument_node="">Persona Non Grata</span></a><span data-dcnode-id="2349" instrument_node="">: In the eyes of the Global Community, it's Rayford and Chloe Steele, Buck Williams, Tsion Ben-Judah and Chaim Rosenzweig.</span></li><li data-dcnode-id="2340"><span data-dcnode-id="2347" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PersonOfMassDestruction" title="/pmwiki/pmwiki.php/Main/PersonOfMassDestruction"><span data-dcnode-id="2346" instrument_node="">Person of Mass Destruction</span></a><span data-dcnode-id="2344" instrument_node="">: Jesus, who can kill many people at the same time just by speaking </span><a class="twikilink" data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="2343" instrument_node="">The Word Of God</span></a><span data-dcnode-id="2341" instrument_node="">.</span></li><li data-dcnode-id="2297"><span data-dcnode-id="2339" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThePiratesWhoDontDoAnything" title="/pmwiki/pmwiki.php/Main/ThePiratesWhoDontDoAnything"><span data-dcnode-id="2338" instrument_node="">The Pirates Who Don't Do Anything</span></a><span data-dcnode-id="2336" instrument_node="">: The Tribulation Force is supposed to be </span><a class="twikilink" data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaResistance" title="/pmwiki/pmwiki.php/Main/LaResistance"><span data-dcnode-id="2335" instrument_node="">the Resistance</span></a><span data-dcnode-id="2333" instrument_node=""> to Carpathia's </span><a class="twikilink" data-dcnode-id="2331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEmpire" title="/pmwiki/pmwiki.php/Main/TheEmpire"><span data-dcnode-id="2332" instrument_node="">One World Government</span></a><span data-dcnode-id="2330" instrument_node="">. Their track record after seven years is precisely </span><em data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">one</span></em><span data-dcnode-id="2327" instrument_node=""> assassination attempt, not counting Hattie and Chaim. Buck and Rayford's rolls as </span><a class="twikilink" data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMole" title="/pmwiki/pmwiki.php/Main/TheMole"><span data-dcnode-id="2326" instrument_node="">moles</span></a><span data-dcnode-id="2324" instrument_node=""> in Carpathia's organization serve only </span><a class="twikilink" data-dcnode-id="2322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheWatson" title="/pmwiki/pmwiki.php/Main/TheWatson"><span data-dcnode-id="2323" instrument_node="">a narrative function as witnesses for the audience</span></a><span data-dcnode-id="2321" instrument_node=""> to the global events of the tribulation rather than any particular kind of functional espionage.</span><ul data-dcnode-id="2298"><li data-dcnode-id="2299"><span data-dcnode-id="2320" instrument_node=""> Buck and Rayford each have a cushy job working for the Antichrist. They virtually never try to exploit this fact. Worst Freedom Fighters </span><em data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">ever</span></em><span data-dcnode-id="2317" instrument_node="">.</span><ul data-dcnode-id="2300"><li data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node=""> More like The Pirates That Won't Do Anything Unless The Lord Directs Them To. Not that it has stopped some from trying to do their own thing, like Rayford's assassination attempt.</span></li><li data-dcnode-id="2301"><span data-dcnode-id="2314" instrument_node=""> Also justified in the fact that </span><a class="twikilink" data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouCantFightFate" title="/pmwiki/pmwiki.php/Main/YouCantFightFate"><span data-dcnode-id="2313" instrument_node="">they can't fight fate</span></a><span data-dcnode-id="2311" instrument_node="">: what's going to happen in the Tribulation according to </span><a class="twikilink" data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="2310" instrument_node="">The Word Of God</span></a><span data-dcnode-id="2308" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo" title="/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo"><span data-dcnode-id="2307" instrument_node="">is going to happen regardless of what anybody does</span></a><span data-dcnode-id="2305" instrument_node="">; all they can pretty much do is help new people become believers and to help existing believers stay alive </span><a class="twikilink" data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HoldingOutForAHero" title="/pmwiki/pmwiki.php/Main/HoldingOutForAHero"><span data-dcnode-id="2304" instrument_node="">until Jesus comes</span></a><span data-dcnode-id="2302" instrument_node=""> or their time comes.</span></li></ul></li></ul></li><li data-dcnode-id="2292"><span data-dcnode-id="2296" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlaceOfProtection" title="/pmwiki/pmwiki.php/Main/PlaceOfProtection"><span data-dcnode-id="2295" instrument_node="">Place of Protection</span></a><span data-dcnode-id="2293" instrument_node="">: The city of Petra during the latter half of the Tribulation, due to God's protection from Global Community forces.</span></li><li data-dcnode-id="2287"><span data-dcnode-id="2291" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayingSick" title="/pmwiki/pmwiki.php/Main/PlayingSick"><span data-dcnode-id="2290" instrument_node="">Playing Sick</span></a><span data-dcnode-id="2288" instrument_node="">: Chaim Rosenzweig pulls this off beautifully. He fakes having a stroke, and gets around in a wheelchair, all in order to assassinate Nicolae.</span></li><li data-dcnode-id="2279"><span data-dcnode-id="2286" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlotRelevantAgeUp" title="/pmwiki/pmwiki.php/Main/PlotRelevantAgeUp"><span data-dcnode-id="2285" instrument_node="">Plot-Relevant Age-Up</span></a><span data-dcnode-id="2283" instrument_node="">: In the third prequel, when the elect are raptured, their glorified bodies are all the same age, 33, no matter where on the -0.75 through +969 spectrum they were in their Earthly lives. This comes from Augustine's claim that one's glorified body will be just like one's 33-year-old body was or would have been, barring anything crippling and/or hideous. It derives from Jesus being 33 when </span><em data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">he</span></em><span data-dcnode-id="2280" instrument_node=""> was crucified.</span></li><li data-dcnode-id="2260"><span data-dcnode-id="2278" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PointOfNoReturn" title="/pmwiki/pmwiki.php/Main/PointOfNoReturn"><span data-dcnode-id="2277" instrument_node="">Point of No Return</span></a><span data-dcnode-id="2275" instrument_node="">: Take the </span><a class="twikilink" data-dcnode-id="2273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="2274" instrument_node="">mark of loyalty and worship The Beast's image</span></a><span data-dcnode-id="2272" instrument_node="">, </span><a class="twikilink" data-dcnode-id="2270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam" title="/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam"><span data-dcnode-id="2271" instrument_node="">you find yourself vulnerable to the Bowl/Vial Judgments and ultimately your soul is condemned to Hell.</span></a><span data-dcno
