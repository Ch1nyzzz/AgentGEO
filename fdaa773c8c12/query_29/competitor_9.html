ou could be the Messiah, wouldn't they be thrilled to meet you?</span></div><div class="indent" data-dcnode-id="5586"><strong data-dcnode-id="5588"><span data-dcnode-id="5589" instrument_node="">Carpathia:</span></strong><span data-dcnode-id="5587" instrument_node=""> If you are suggesting that it only makes sense that the Global Community Potentate bestow upon those guests a regal welcome second to none, you may have a point...Captain Steele, schedule that flight.</span></div></li><li data-dcnode-id="5574"><span data-dcnode-id="5584" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrokenBird" title="/pmwiki/pmwiki.php/Main/BrokenBird"><span data-dcnode-id="5583" instrument_node="">Broken Bird</span></a><span data-dcnode-id="5581" instrument_node="">: Prior to becoming the head nurse at Brigham Young Hospital, Leah Rose had quite the checkered past. From a broken household to a teenage drug addict who slept around, aborted a pregnancy </span><a class="twikilink" data-dcnode-id="5579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BungledSuicide" title="/pmwiki/pmwiki.php/Main/BungledSuicide"><span data-dcnode-id="5580" instrument_node="">and nearly killed herself several times</span></a><span data-dcnode-id="5578" instrument_node=""> before she finally cleaned herself up, got her GED and after getting married, her husband put her through nursing school and the pair adopted two boys. After their children were taken in the Rapture, she and her husband tried to kill themselves. Her husband succeeded. She didn't. In the end, she became a believer.</span><ul data-dcnode-id="5575"><li data-dcnode-id="5576"><span data-dcnode-id="5577" instrument_node=""> Abdullah Ababaneh (Smith) gets the honorable mention. He starts off as a Muslim, but when his wife Yasmine and their two children Bahira and Zaki become Christians, they leave him following one argument too many. This drives Abdullah into a state of depression where he loses himself in booze and women, even though he wants his family back.</span></li></ul></li><li data-dcnode-id="5566"><span data-dcnode-id="5573" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrokenPedestal" title="/pmwiki/pmwiki.php/Main/BrokenPedestal"><span data-dcnode-id="5572" instrument_node="">Broken Pedestal</span></a><span data-dcnode-id="5570" instrument_node="">: Nicolae Carpathia increasingly becomes this to those who once believed him to be a noble character, showing more and more </span><a class="twikilink" data-dcnode-id="5568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilAllAlong" title="/pmwiki/pmwiki.php/Main/EvilAllAlong"><span data-dcnode-id="5569" instrument_node="">what an evil sot he really is</span></a><span data-dcnode-id="5567" instrument_node="">. Even Jesus calls him out on it, saying that all his God-given abilities could have been used for good, but he chose to use them all for serving Satan.</span></li><li data-dcnode-id="5553"><span data-dcnode-id="5565" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrosBeforeHoes" title="/pmwiki/pmwiki.php/Main/BrosBeforeHoes"><span data-dcnode-id="5564" instrument_node="">Bros Before Hoes</span></a><span data-dcnode-id="5562" instrument_node="">: Rayford invokes this against </span><em data-dcnode-id="5560"><span data-dcnode-id="5561" instrument_node="">his own daughter,</span></em><span data-dcnode-id="5559" instrument_node=""> when he sides with her boyfriend Buck in an argument.</span><ul data-dcnode-id="5554"><li data-dcnode-id="5555"><span data-dcnode-id="5558" instrument_node=""> Even squickier when one realizes that this "argument" involved Rayford </span><span class="spoiler" data-dcnode-id="5556" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5557" instrument_node="">somehow presciently being aware that Buck is not, in fact, engaged.</span></span></li></ul></li><li data-dcnode-id="5536"><span data-dcnode-id="5552" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BuryYourGays" title="/pmwiki/pmwiki.php/Main/BuryYourGays"><span data-dcnode-id="5551" instrument_node="">Bury Your Gays</span></a><span data-dcnode-id="5549" instrument_node="">: Just after (accidentally) outing herself, closet lesbian and </span><a class="twikilink" data-dcnode-id="5547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StrawFeminist" title="/pmwiki/pmwiki.php/Main/StrawFeminist"><span data-dcnode-id="5548" instrument_node="">Straw Feminist</span></a><span data-dcnode-id="5546" instrument_node=""> Verna Zee gets killed by the Wrath Of The Lamb earthquake in the book </span><em data-dcnode-id="5544"><span data-dcnode-id="5545" instrument_node="">Nicolae</span></em><span data-dcnode-id="5543" instrument_node="">, though there were Christians that died in the earthquake as well, including the New Hope Village Church secretary Loretta and parishioners Donny and Sondra Moore, none of which were gay. In the prequel novels, the Antichrist villain Nicolae Carpathia has </span><a class="twikilink" data-dcnode-id="5541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HasTwoDaddies" title="/pmwiki/pmwiki.php/Main/HasTwoDaddies"><span data-dcnode-id="5542" instrument_node="">his two biological fathers</span></a><sp </span><ul data-dcnode-id="5491"><li data-dcnode-id="5492"><span data-dcnode-id="5493" instrument_node=""> Hattie Durham counts as well.</span></li></ul></li><li data-dcnode-id="5468"><span data-dcnode-id="5489" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallingYourAttacks" title="/pmwiki/pmwiki.php/Main/CallingYourAttacks"><span data-dcnode-id="5488" instrument_node="">Calling Your Attacks</span></a><span data-dcnode-id="5486" instrument_node="">: In </span><em data-dcnode-id="5484"><span data-dcnode-id="5485" instrument_node="">Desecration</span></em><span data-dcnode-id="5483" instrument_node="">, Carpathia asks Morale Monitor head Loren Hut on how would he deal with dissidents. When Hut responds that he would shoot them in the head or chest, Carpathia insists that he empty his nine-round clip into the offender, starting with both hands, feet, knees, and shoulders. When they finally declare that Carpathia is indeed God, they should be executed with the </span><a class="twikilink" data-dcnode-id="5481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BoomHeadshot" title="/pmwiki/pmwiki.php/Main/BoomHeadshot"><span data-dcnode-id="5482" instrument_node="">final bullet to the head</span></a><span data-dcnode-id="5480" instrument_node="">, followed by the </span><a class="twikilink" data-dcnode-id="5478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OffWithHisHead" title="/pmwiki/pmwiki.php/Main/OffWithHisHead"><span data-dcnode-id="5479" instrument_node="">immediate beheading of the head from the body.</span></a><ul data-dcnode-id="5469"><li data-dcnode-id="5470"><span data-dcnode-id="5477" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5475" href="https://chatnoir-webcontent.chatnoir.e ublic during the Tribulation until </span><a class="twikilink" data-dcnode-id="5452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PropheciesAreAlwaysRight" title="/pmwiki/pmwiki.php/Main/PropheciesAreAlwaysRight"><span data-dcnode-id="5453" instrument_node="">they actually happen</span></a><span data-dcnode-id="5451" instrument_node="">, such as </span><a class="twikilink" data-dcnode-id="5449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarthquakesCauseFissures" title="/pmwiki/pmwiki.php/Main/EarthquakesCauseFissures"><span data-dcnode-id="5450" instrument_node="">the Wrath of the Lamb earthquake</span></a><span data-dcnode-id="5448" instrument_node="">. Even after they happen, though, there are </span><a class="twikilink" data-dcnode-id="5446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooDumbToLive" title="/pmwiki/pmwiki.php/Main/TooDumbToLive"><span data-dcnode-id="5447" instrument_node="">some survivors who stubbornly insist that it isn't God behind it all</span></a><span data-dcnode-id="5445" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="5443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TemptingFate" title="/pmwiki/pmwiki.php/Main/TemptingFate"><span data-dcnode-id="5444" instrument_node="">persist in continuing to live in their sins</span></a><span data-dcnode-id="5442" instrument_node="">.</span></li><li data-dcnode-id="5430"><span data-dcnode-id="5440" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheCavalry" title="/pmwiki/pmwiki.php/Main/TheCavalry"><span data-dcnode-id="5439" instrument_node="">The Cavalry</span></a><span data-dcnod /span><em data-dcnode-id="5416"><span data-dcnode-id="5417" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="5415" instrument_node="">. His being a "glorified" renders him permanently unable to seek any sort of sexual relationship. In fact, any child that was </span><a class="twikilink" data-dcnode-id="5413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CaughtUpInTheRapture" title="/pmwiki/pmwiki.php/Main/CaughtUpInTheRapture"><span data-dcnode-id="5414" instrument_node="">Caught Up in the Rapture</span></a><span data-dcnode-id="5412" instrument_node=""> will end up coming back as a </span><a class="twikilink" data-dcnode-id="5410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChasteHero" title="/pmwiki/pmwiki.php/Main/ChasteHero"><span data-dcnode-id="5411" instrument_node="">Chaste Hero</span></a><span data-dcnode-id="5409" instrument_node="">.</span></li><li data-dcnode-id="5380"><span data-dcnode-id="5407" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChekhovsGun" title="/pmwiki/pmwiki.php/Main/ChekhovsGun"><span data-dcnode-id="5406" instrument_node="">Chekhov's Gun</span></a><span data-dcnode-id="5404" instrument_node="">:</span><ul data-dcnode-id="5381"><li data-dcnode-id="5399"><span data-dcnode-id="5403" instrument_node=""> The Rapture tape Pastor Billings made </span><strong data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">three years</span></strong><span data-dcnode-id="5400" instrument_node=""> before the Rapture. It would be instrumental in bringing about Rayford and Chloe's salvation.</span></li><li data-dcnode-id="5389"><span data-dcnode-id="5398" instrument_node=""> In the prequel novel </span><em data-dcnode-id="5396"><span data-dcnode-id="5397" instrument_node="">The Regime</span></em><span data-dcnode-id="5395" instrument_node="">, it's Chaim Rosenzweig's synthetic fertilizer (The Eden Project). Later, in </span><em data-dcnode-id="5393"><span data-dcnode-id="5394" instrument_node="">Tribulation Force</span></em><span data-dcnode-id="5392" instrument_node="">, </span><a class="twikilink" data-dcnode-id="5390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DealWithTheDevil" title="/pmwiki/pmwiki.php/Main/DealWithTheDevil"><span data-dcnode-id="5391" instrument_node="">it is used to secure a seven-year peace treaty with Israel.</span></a></li><li data-dcnode-id="5382"><span data-dcnode-id="5388" instrument_node=""> Chaim Rosenzweig is seen working on a pet project to make the world's sharpest handmade blade in </span><em data-dcnode-id="5386"><span data-dcnode-id="5387" instrument_node="">Assassins.</span></em><span data-dcnode-id="5385" instrument_node=""> </span><span class="spoiler" data-dcnode-id="5383" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5384" instrument_node="">Turns out this is the murder weapon that does in Nicolae.</span></span></li></ul></li><li data-dcnode-id="5347"><span data-dcnode-id="5379" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChekhovsGunman" title="/pmwiki/pmwiki.php/Main/ChekhovsGunman"><span data-dcnode-id="5378" instrument_node="">Chekhov's Gunman</span></a><span data-dcnode-id="5376" instrument_node="">:</span><ul data-dcnode-id="5367"><li data-dcnode-id="5368"><span data-dcnode-id="5375" instrument_node=""> Ken Ritz. Most people don't know that </span><a class="twikilink" data-dcnode-id="5373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassBookworm" title="/pmwiki/pmwiki.php/Main/BadassBookworm"><span data-dcnode-id="5374" instrument_node="">he graduated Salutatorian in his high school class, or studied at the London School of Economics,</span></a><span data-dcnode-id="5372" instrument_node=""> or the ideas he had would eventually become the International Commodity Co-Op, or the fact that </span><a class="twikilink" data-dcnode-id="5370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SecretlyWealthy" title="/pmwiki/pmwiki.php/Main/SecretlyWealthy"><span data-dcnode-id="5371" instrument_node="">he stashed at least 80 percent of his earnings at Palwaukee Airport, thus making him a virtual millionaire.</span></a><span data-dcnode-id="5369" instrument_node=""> Rayford's reaction to this little revelation is priceless.</span></li></ul><div class="indent" data-dcnode-id="5362"><span data-dcnode-id="5366" instrument_node=""> </span><strong data-dcnode-id="5364"><span data-dcnode-id="5365" instrument_node="">Rayford:</span></strong><span data-dcnode-id="5363" instrument_node=""> Did I mention the annual dues for being a member of the Tribulation Force?</span></div><ul data-dcnode-id="5348"><li data-dcnode-id="5357"><span data-dcnode-id="5361" instrument_node=""> Tsion Ben-Judah. No one would </span><strong data-dcnode-id="5359"><span data-dcnode-id="5360" instrument_node="">ever</span></strong><span data-dcnode-id="5358" instrument_node=""> think that the former student of Chaim Rosenzweig would convert, or that his cyber-classes on the Messiah would lead thousands to Christ.</span></li><li data-dcnode-id="5355"><span data-dcnode-id="5356" instrument_node=""> Cendrillon Jospin, as it is through her death that the believers discover her connections to The Other Light.</span></li><li data-dcnode-id="5351"><span data-dcnode-id="5354" instrument_node=""> Irene Steele is a minor example. </span><a class="twikilink" data-dcnode-id="5352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IWarnedYou" title="/pmwiki/pmwiki.php/Main/IWarnedYou"><span data-dcnode-id="5353" instrument_node="">She DID warn Rayford about the Rapture.</span></a></li><li data-dcnode-id="5349"><span data-dcnode-id="5350" instrument_node=""> Viv Ivins in the prequel novels. She did convince Marilena to become mother to the Antichrist.</span></li></ul></li><li data-dcnode-id="5336"><span data-dcnode-id="5346" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ClaimedByTheSupernatural" title="/pmwiki/pmwiki.php/Main/ClaimedByTheSupernatural"><span data-dcnode-id="5345" instrument_node="">Claimed by the Supernatural</span></a><span data-dcnode-id="5343" instrument_node="">: It's both the 144,000 of the twelve tribes of Israel </span><em data-dcnode-id="5341"><span data-dcnode-id="5342" instrument_node="">and</span></em><span data-dcnode-id="5340" instrument_node=""> the Tribulation saints who have put their faith in Jesus Christ that are sealed with a cross on their foreheads that only other believers can see. This mark means that they forever belong to God and nothing and nobody can remove them from His protective hand. Chang Wong, who was already a believer when the </span><a class="twikilink" data-dcnode-id="5338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="5339" instrument_node="">Mark of the Beast</span></a><span data-dcnode-id="5337" instrument_node=""> was forced upon him, had both marks during the time he operated as a mole inside New Babylon. During the Millennial Kingdom, "naturals" who become believers before their 100th birthday belong to God forever and are supernaturally protected.</span></li><li data-dcnode-id="5208"><span data-dcnode-id="5335" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CommandRoster" title="/pmwiki/pmwiki.php/Main/CommandRoster"><span data-dcnode-id="5334" instrument_node="">Command Roster</span></a><span data-dcnode-id="5332" instrument_node="">:</span><ul data-dcnode-id="5209"><li data-dcnode-id="5279"><span data-dcnode-id="5331" instrument_node=""> The Tribulation Force consists of:</span><ul data-dcnode-id="5280"><li data-dcnode-id="5326"><span data-dcnode-id="5330" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheCaptain" title="/pmwiki/pmwiki.php/Main/TheCaptain"><span data-dcnode-id="5329" instrument_node="">The Captain</span></a><span data-dcnode-id="5327" instrument_node="">: Rayford Steele</span></li><li data-dcnode-id="5321"><span data-dcnode-id="5325" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NumberTwo" title="/pmwiki/pmwiki.php/Main/NumberTwo"><span data-dcnode-id="5324" instrument_node="">Number Two</span></a><span data-dcnode-id="5322" instrument_node="">: Cameron "Buck" Williams</span></li><li data-dcnode-id="5316"><span data-dcnode-id="5320" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheChick" title="/pmwiki/pmwiki.php/Main/TheChick"><span data-dcnode-id="5319" instrument_node="">The CEO:</span></a><span data-dcnode-id="5317" instrument_node=""> Chloe Steele</span></li><li data-dcnode-id="5311"><span data-dcnode-id="5315" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5313" href="htt
