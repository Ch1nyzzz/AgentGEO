de-id="2269" instrument_node=""> Become a believer in Christ, </span><a class="twikilink" data-dcnode-id="2267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiveMeASign" title="/pmwiki/pmwiki.php/Main/GiveMeASign"><span data-dcnode-id="2268" instrument_node="">your place in Heaven is assured. Survive the Tribulation, you can live until the end of the Millennial Kingdom.</span></a><ul data-dcnode-id="2261"><li data-dcnode-id="2262"><span data-dcnode-id="2266" instrument_node=""> Getting saved during the Millennium </span><a class="twikilink" data-dcnode-id="2264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathsHourglass" title="/pmwiki/pmwiki.php/Main/DeathsHourglass"><span data-dcnode-id="2265" instrument_node="">prior to your 100th birthday</span></a><span data-dcnode-id="2263" instrument_node=""> also guarantees that you'll live to the end of the Millennium.</span></li></ul></li><li data-dcnode-id="2241"><span data-dcnode-id="2259" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PokeThePoodle" title="/pmwiki/pmwiki.php/Main/PokeThePoodle"><span data-dcnode-id="2258" instrument_node="">Poke the Poodle</span></a><span data-dcnode-id="2256" instrument_node="">: While Nicolae Carpathia in the </span><em data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Left Behind</span></em><span data-dcnode-id="2253" instrument_node=""> books does eventually commit evil such as ordering London nuked and demanding the executions of those who refuse to worship him as god, he gets only passing mention to such atrocities and instead focus on his </span><a class="twikilink" data-dcnode-id="2251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PokeThePoodle" title="/pmwiki/pmwiki.php/Main/PokeThePoodle"><span data-dcnode-id="2252" instrument_node="">Poke the Poodle</span></a><span data-dcnode-id="2250" instrument_node=""> moments such as him dating the hero's former love interest and treating her with respect, or "forgetting" Rayford's new wife's name. As Fred Clark on his Slacktivist page states:</span><div class="indent" data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node=""> So far, though, it's hard to take him seriously. He's bumbling through the first stages of his master plan, getting himself hopelessly bogged down in details that seem less evil than simply arbitrary and weird. For example, Nicolae plans to rebuild the temple in Jerusalem. That might be considered evil if he were doing it just to desecrate the Islamic holy site currently sitting there in an effort to start a deadly war, but instead he's carefully negotiated an amicable (if ridiculously implausible) solution to this age-old conflict. [snip] Or consider Nicolae's grand scheme of relocating the United Nations headquarters to an as-yet-unbuilt city in the Iraqi desert. That's capricious and foolish, but not so much evil as just terribly wasteful and inconvenient.</span></div><ul data-dcnode-id="2242"><li data-dcnode-id="2243"><span data-dcnode-id="2247" instrument_node=""> If there is a heroic inversion of this trope, then the main characters often play it, (see </span><a class="twikilink" data-dcnode-id="2245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThePiratesWhoDontDoAnything" title="/pmwiki/pmwiki.php/Main/ThePiratesWhoDontDoAnything"><span data-dcnode-id="2246" instrument_node="">The Pirates Who Don't Do Anything</span></a><span data-dcnode-id="2244" instrument_node=""> above.) A lot of their resistance consists of observing Nicolae and internally disapproving, or little gestures designed to embarrass or inconvenience him rather than disrupt his plans or harm him.</span></li></ul></li><li data-dcnode-id="2230"><span data-dcnode-id="2240" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PowerGlows" title="/pmwiki/pmwiki.php/Main/PowerGlows"><span data-dcnode-id="2239" instrument_node="">Power Glows</span></a><span data-dcnode-id="2237" instrument_node="">: Nicolae Carpathia in the book </span><em data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">Armageddon</span></em><span data-dcnode-id="2234" instrument_node=""> gives off a burnt-orange glow while he and most of his Global Community cabinet are stuck in New Babylon during the Fifth Bowl Judgment that causes complete darkness throughout the whole city.</span><ul data-dcnode-id="2231"><li data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node=""> Jesus Himself, as He is "the Light of the world".</span></li></ul></li><li data-dcnode-id="2216"><span data-dcnode-id="2229" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PassThePopcorn" title="/pmwiki/pmwiki.php/Main/PassThePopcorn"><span data-dcnode-id="2228" instrument_node="">Pass the Popcorn</span></a><span data-dcnode-id="2226" instrument_node="">: In the Dramatic Audio presentation of </span><em data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="2223" instrument_node="">, Rayford Steele plus the entire population of believers in Petra, who was now made near-invulnerable by God during the battle of Armageddon, were like this when they were watching the Antichrist's armies getting decimated by Jesus Christ. Rayford even mentions that all he needs now is the popcorn.</span><ul data-dcnode-id="2217"><li data-dcnode-id="2218"><span data-dcnode-id="2222" instrument_node=""> And due to their beliefs about the Rapture, the series' intended audience believe they'll be sitting back in Heaven and enjoying the show while all this goes down.</span><ul data-dcnode-id="2219"><li data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node=""> Biblically speaking, that's what some Old Testament battles Israel had with other nations ended up turning into with God taking over the battles.</span></li></ul></li></ul></li><li data-dcnode-id="2179"><span data-dcnode-id="2215" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PreMortemOneLiner" title="/pmwiki/pmwiki.php/Main/PreMortemOneLiner"><span data-dcnode-id="2214" instrument_node="">Pre-Mortem One-Liner</span></a><span data-dcnode-id="2212" instrument_node="">: In the Dramatic Audio, George Sebastian delivers one to Elena right before the coup de grâce. Double points for George as he delivered it </span><a class="twikilink" data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodNewsBadNews" title="/pmwiki/pmwiki.php/Main/GoodNewsBadNews"><span data-dcnode-id="2211" instrument_node="">Good News, Bad News</span></a><span data-dcnode-id="2209" instrument_node=""> style.</span><div class="indent" data-dcnode-id="2199"><span data-dcnode-id="2208" instrument_node=""> </span><strong data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">George:</span></strong><span data-dcnode-id="2205" instrument_node=""> "Well, Elena, </span><a class="twikilink" data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodNewsBadNews" title="/pmwiki/pmwiki.php/Main/GoodNewsBadNews"><span data-dcnode-id="2204" instrument_node="">the good news is...I'm not dead. The bad news is...you are!</span></a><span data-dcnode-id="2202" instrument_node="">" </span><strong data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">(SNAP)</span></strong></div><ul data-dcnode-id="2193"><li data-dcnode-id="2194"><span data-dcnode-id="2198" instrument_node=""> At the end of </span><em data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Kingdom Come,</span></em><span data-dcnode-id="2195" instrument_node=""> Jesus does this to the invading TOL forces.</span></li></ul><div class="indent" data-dcnode-id="2188"><span data-dcnode-id="2192" instrument_node=""> </span><strong data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Satan:</span></strong><span data-dcnode-id="2189" instrument_node=""> CHARGE!</span></div><div class="indent" data-dcnode-id="2180"><span data-dcnode-id="2187" instrument_node=""> </span><strong data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Jesus:</span></strong><span data-dcnode-id="2184" instrument_node=""> I AM WHO I AM. (cue </span><a class="twikilink" data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="2183" instrument_node="">epic pwnage</span></a><span data-dcnode-id="2181" instrument_node=""> of the TOL forces via firestorm)</span></div></li><li data-dcnode-id="2174"><span data-dcnode-id="2178" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PrettyInMink" title="/pmwiki/pmwiki.php/Main/PrettyInMink"><span data-dcnode-id="2177" instrument_node="">Pretty in Mink</span></a><span data-dcnode-id="2175" instrument_node="">: It's mentioned that Amanda wears a fur coat.</span></li><li data-dcnode-id="2166"><span data-dcnode-id="2173" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PrinciplesZealot" title="/pmwiki/pmwiki.php/Main/PrinciplesZealot"><span data-dcnode-id="2172" instrument_node="">Principles Zealot</span></a><span data-dcnode-id="2170" instrument_node="">: The protagonists refuse to lie, even to the Anti-Christ. It's a bit undermined by several cases of them telling falsehoods due to bad writing, divine interventions that prevent any negative consequences of not lying, and liberal use of </span><a class="twikilink" data-dcnode-id="2168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FromACertainPointOfView" title="/pmwiki/pmwiki.php/Main/FromACertainPointOfView"><span data-dcnode-id="2169" instrument_node="">From a Certain Point of View</span></a><span data-dcnode-id="2167" instrument_node="">.</span></li><li data-dcnode-id="2146"><span data-dcnode-id="2165" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PropagandaMachine" title="/pmwiki/pmwiki.php/Main/PropagandaMachine"><span data-dcnode-id="2164" instrument_node="">Propaganda Machine</span></a><span data-dcnode-id="2162" instrument_node="">: The Global Community-controlled media and press, leading to the creation of Buck Williams' </span><a class="twikilink" data-dcnode-id="2160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VoiceOfTheResistance" title="/pmwiki/pmwiki.php/Main/VoiceOfTheResistance"><span data-dcnode-id="2161" instrument_node="">Voice of the Resistance</span></a><span data-dcnode-id="2159" instrument_node=""> publication </span><em data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">The Truth</span></em><span data-dcnode-id="2156" instrument_node="">. Interestingly, the Global Community acquisition of all press and communications also includes Christian-related media such as the </span><a class="twikilink" data-dcnode-id="2154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/The700Club" title="/pmwiki/pmwiki.php/Series/The700Club"><span data-dcnode-id="2155" instrument_node="">Christian Broadcasting Network</span></a><span data-dcnode-id="2153" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/TBN" title="/pmwiki/pmwiki.php/Creator/TBN"><span data-dcnode-id="2152" instrument_node="">Trinity Broadcasting Network</span></a><span data-dcnode-id="2150" instrument_node="">, which makes you wonder what became of </span><a class="twikilink" data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SinisterMinister" title="/pmwiki/pmwiki.php/Main/SinisterMinister"><span data-dcnode-id="2149" instrument_node="">the televangelists who were left behind</span></a><span data-dcnode-id="2147" instrument_node="">.</span></li><li data-dcnode-id="2141"><span data-dcnode-id="2145" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PublicExecution" title="/pmwiki/pmwiki.php/Main/PublicExecution"><span data-dcnode-id="2144" instrument_node="">Public Execution</span></a><span data-dcnode-id="2142" instrument_node="">: The Global Community televises the execution of Chloe Williams, although Caleb the angel interferes with its broadcast by blanking out the screen at the time of her execution.</span></li><li data-dcnode-id="2136"><span data-dcnode-id="2140" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PunchClockVillain" title="/pmwiki/pmwiki.php/Main/PunchClockVillain"><span data-dcnode-id="2139" instrument_node="">Punch-Clock Villain</span></a><span data-dcnode-id="2137" instrument_node="">: A good deal of the Global Community armed forces not situated in the Holy Land at the time of the battle of Armageddon, because without any resources coming from New Babylon to make sure they're paid (all because said city is destroyed), they might as well quit even though they face a court martial for doing so.</span></li><li data-dcnode-id="2128"><span data-dcnode-id="2135" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PursuedProtagonist" title="/pmwiki/pmwiki.php/Main/PursuedProtagonist"><span data-dcnode-id="2134" instrument_node="">Pursued Protagonist</span></a><span data-dcnode-id="2132" instrument_node="">: The Tribulation Force, both the core group and the later members.</span><ul data-dcnode-id="2129"><li data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node=""> Also count for the rest of the believers.</span></li></ul></li><li data-dcnode-id="2123"><span data-dcnode-id="2127" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RagtagBunchOfMisfits" title="/pmwiki/pmwiki.php/Main/RagtagBunchOfMisfits"><span data-dcnode-id="2126" instrument_node="">Ragtag Bunch of Misfits</span></a><span data-dcnode-id="2124" instrument_node="">: Enoch Dumas and his flock of streetwise urban dwellers.</span></li><li data-dcnode-id="2118"><span data-dcnode-id="2122" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RaisedByGrandparents" title="/pmwiki/pmwiki.php/Main/RaisedByGrandparents"><span data-dcnode-id="2121" instrument_node="">Raised by Grandparents</span></a><span data-dcnode-id="2119" instrument_node="">: In the prequel novels, Rayford's parents are old enough to be his grandparents, as someone mistakes his parents for being his godparents, so this is a subversion of this trope. Slightly subverted again when Rayford helps raise Kenny during the Tribulation.</span></li><li data-dcnode-id="2107"><span data-dcnode-id="2117" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WidowedAtTheWedding" title="/pmwiki/pmwiki.php/Main/WidowedAtTheWedding"><span data-dcnode-id="2116" instrument_node="">Widowed at the Wedding</span></a><span data-dcnode-id="2114" instrument_node="">: In the first book, the Rapture takes place at the same time that a couple is getting married, and the groom (who is a Christian) is the one who gets taken up, leaving the bride without her husband. Technically he's only </span><a class="twikilink" data-dcnode-id="2112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AscendToAHigherPlaneOfExistence" title="/pmwiki/pmwiki.php/Main/AscendToAHigherPlaneOfExistence"><span data-dcnode-id="2113" instrument_node="">Ascended To A Higher Plane Of Existence</span></a><span data-dcnode-id="2111" instrument_node="">, but imagine how crushed she would feel to see her husband mysteriously vanish leaving </span><a class="twikilink" data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EmptyPilesOfClothing" title="/pmwiki/pmwiki.php/Main/EmptyPilesOfClothing"><span data-dcnode-id="2110" instrument_node="">only his tuxedo</span></a><span data-dcnode-id="2108" instrument_node=""> behind, not to mention confused if she didn't know there was such a thing as the Rapture.</span></li><li data-dcnode-id="2102"><span data-dcnode-id="2106" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScifiWritersHaveNoSenseOfScale" title="/pmwiki/pmwiki.php/Main/ScifiWritersHaveNoSenseOfScale"><span data-dcnode-id="2105" instrument_node="">Scifi Writers Have No Sense Of Scale</span></a><span data-dcnode-id="2103" instrument_node=""> : Happens all the time. Geographic distances are wildly exaggerated or ignored, things happening across a continent can affect the local city but things affecting the local city could be completely ignored in the suburbs, the given explosive payload of bombs are way off from their described effects, the amount of time it takes for a global reorganization is ignored to get that reorganization to happen on schedule with prophecy, etc.</span></li><li data-dcnode-id="2094"><span data-dcnode-id="2101" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RaceAgainstTheClock" title="/pmwiki/pmwiki.php/Main/RaceAgainstTheClock"><span data-dcnode-id="2100" instrument_node="">Race Against the Clock</span></a><span data-dcnode-id="2098" instrument_node="">: In the Dramatic Audio version of </span><em data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="2095" instrument_node="">, a Global Community agent threatens the network broadcast crew to cut the signal of Chaim Rosenzweig's message by giving each member, starting from the top brass down, sixty seconds to get the signal cut before they are murdered.</span></li><li data-dcnode-id="2073"><span data-dcnode-id="2093" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech" title="/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech"><span data-dcnode-id="2092" instrument_node="">"The Reason You Suck" Speech</span></a><span data-dcnode-id="2090" instrument_node="">:</span><ul data-dcnode-id="2074"><li data-dcnode-id="2085"><span data-dcnode-id="2089" instrument_node=""> Jesus to Satan, the Antichrist, and the False Prophet in </span><em data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="2086" instrument_node="">.</span></li><li data-dcnode-id="2080"><span data-dcnode-id="2084" instrument_node=""> Jesus does this to Satan yet again in </span><em data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="2081" instrument_node="">, right before sending him into the Lake of Fire.</span></li><li data-dcnode-id="2075"><span data-dcnode-id="2079" instrument_node=""> In </span><em data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Assassins</span></em><span data-dcnode-id="2076" instrument_node="">, Carpathia himself does this to Eli and Moishe before gunning them down during the Global Gala.</span></li></ul></li><li data-dcnode-id="2059"><span data-dcnode-id="2072" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReasonableAuthorityFigure" title="/pmwiki/pmwiki.php/Main/ReasonableAuthorityFigure"><span data-dcnode-id="2071" instrument_node="">Reasonable Authority Figure</span></a><span data-dcnode-id="2069" instrument_node="">: President Gerald Fitzhugh. He sees that Carpathia is a threat once he loses his power to the American Subpotentate and teams up with his English and Egyptian counterparts to force Carpathia out of office. It does not work, and Fitzhugh winds up getting killed.</span><ul data-dcnode-id="2060"><li data-dcnode-id="2061"><span data-dcnode-id="2068" instrument_node=""> In </span><em data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Left Behind: World At War</span></em><span data-dcnode-id="2065" instrument_node="">, Fitzhugh futilely </span><a class="twikilink" data-dcnode-id="2063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakingYouWithMe" title="/pmwiki/pmwiki.php/Main/TakingYouWithMe"><span data-dcnode-id="2064" instrument_node="">attempts to take Carpathia down with him</span></a><span data-dcnode-id="2062" instrument_node=""> when he has a guided missile head straight for the Global Community office.</span></li></ul></li><li data-dcnode-id="2054"><span data-dcnode-id="2058" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RecruitTeenagersWithAttitude" title="/pmwiki/pmwiki.php/Main/RecruitTeenagersWithAttitude"><span data-dcnode-id="2057" instrument_node="">Recruit Teenagers with Attitude</span></a><span data-dcnode-id="2055" instrument_node="">: The members of The Other Light are all physically teenagers and young adults recruiting others of the same age range.</span></li></ul><ul data-dcnode-id="1989"><li data-dcnode-id="2040"><span data-dcnode-id="2051" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RedHerring" title="/pmwiki/pmwiki.php/Main/RedHerring"><span data-dcnode-id="2050" instrument_node="">Red Herring</span></a><span data-dcnode-id="2048" instrument_node="">: Several of them, though not necessarily intentional on the part of the author, who writes as a "</span><a class="urllink" data-dcnode-id="2045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.leftbehind.com/03_authors_testimonials/viewAuthorInteractions.asp%3Fpageid%3D828%26channelID%3D79"><span data-dcnode-id="2047" instrument_node="">process of discovery</span><img data-dcnode-id="2046" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="2044" instrument_node="">" meaning that he throws in elements he thinks might be interesting and sees where they lead. This can land in some </span><a class="twikilink" data-dcnode-id="2042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatHappenedToTheMouse" title="/pmwiki/pmwiki.php/Main/WhatHappenedToTheMouse"><span data-dcnode-id="2043" instrument_node="">What Happened to the Mouse?</span></a><span data-dcnode-id="2041" instrument_node=""> moments among those which do not pan out. He believes that this makes for a more organic and believable story-telling experience, though whether it enhances or detracts from the quality of the writing is a matter of some debate and taste.</span></li><li data-dcnode-id="2032"><span data-dcnode-id="2039" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReignOfTerror" title="/pmwiki/pmwiki.php/Main/ReignOfTerror"><span data-dcnode-id="2038" instrument_node="">Reign of Terror</span></a><span data-dcnode-id="2036" instrument_node="">: The Global Community regime ruthlessly executes anyone who refuses to take part in the </span><a class="twikilink" data-dcnode-id="2034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="2035" instrument_node="">mark of loyalty system</span></a><span data-dcnode-id="2033" instrument_node="">.</span></li><li data-dcnode-id="2024"><span data-dcnode-id="2031" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RejectedApology" title="/pmwiki/pmwiki.php/Main/RejectedApology"><span data-dcnode-id="2030" instrument_node="">Rejected Apology</span></a><span data-dcnode-id="2028" instrument_node="">: Leon Fortunato's attempted </span><a class="twikilink" data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaithTurn" title="/pmwiki/pmwiki.php/Main/HeelFaithTurn"><span data-dcnode-id="2027" instrument_node="">Heel–Faith Turn</span></a><span data-dcnode-id="2025" instrument_node=""> was rejected by Jesus before he was thrown into the Lake of Fire along with Nicolae.</span></li><li data-dcnode-id="2019"><span data-dcnode-id="2023" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReluctantRuler" title="/pmwiki/pmwiki.php/Main/ReluctantRuler"><span data-dcnode-id="2022" instrument_node="">Reluctant Ruler</span></a><span data-dcnode-id="2020" instrument_node="">: Since Fortunato taught him out to feign humility, Carpathia offers token resistance to the role of Secretary-General of the U.N. Only when he accepts does things go downhill.</span></li><li data-dcnode-id="2011"><span data-dcnode-id="2018" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReportsOfMyDeathWereGreatlyExaggerated" title="/pmwiki/pmwiki.php/Main/ReportsOfMyDeathWereGreatlyExaggerated"><span data-dcnode-id="2017" instrument_node="">Reports of My Death Were Greatly Exaggerated</span></a><span data-dcnode-id="2015" instrument_node="">: Steve Plank, thought to have been killed during the Wrath of the Lamb Earthquake, is pretty much alive...yet horribly disfigured, and going by the name Pinkerton Stephens.</span><ul data-dcnode-id="2012"><li data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node=""> Buck says this in the Dramatic Audio when people see that he is still alive.</span></li></ul></li><li data-dcnode-id="2003"><span data-dcnode-id="2010" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ResignationsNotAccepted" title="/pmwiki/pmwiki.php/Main/ResignationsNotAccepted"><span data-dcnode-id="2009" instrument_node="">Resignations Not Accepted</span></a><span data-dcnode-id="2007" instrument_node="">: Carpathia exploits Rayford's relationship with Hattie by </span><a class="twikilink" data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouHaveOutlivedYourUsefulness" title="/pmwiki/pmwiki.php/Main/YouHaveOutlivedYourUsefulness"><span data-dcnode-id="2006" instrument_node="">attempting to have the both of them killed when he meets up with her once again.</span></a><span data-dcnode-id="2004" instrument_node=""> However, Buck had taken Rayford's place when it became clear that Rayford wasn't going to arrive in time and rescues Hattie, killing a GC mook in the process and making a fast getaway with Ken behind the wheel.</span></li><li data-dcnode-id="1995"><span data-dcnode-id="2002" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RestartTheWorld" title="/pmwiki/pmwiki.php/Main/RestartTheWorld"><span data-dcnode-id="2001" instrument_node="">Restart the World</span></a><span data-dcnode-id="1999" instrument_node="">: The old heavens and earth pass away, to suddenly be replaced with a new heavens and earth at the end of </span><em data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="1996" instrument_node="">.</span></li><li data-dcnode-id="1990"><span data-dcnode-id="1994" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RightfulKingReturns" title="/pmwiki/pmwiki.php/Main/RightfulKingReturns"><span data-dcnode-id="1993" instrument_node="">Rightful King Returns</span></a><span data-dcnode-id="1991" instrument_node="">: The whole point of Jesus' second coming in the book series.</span></li></ul><ul data-dcnode-id="1158"><li data-dcnode-id="1980"><span data-dcnode-id="1987" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RoaringRampageOfRescue" title="/pmwiki/pmwiki.php/Main/RoaringRampageOfRescue"><span data-dcnode-id="1986" instrument_node="">Roaring Rampage of Rescue</span></a><span data-dcnode-id="1984" instrument_node="">: Buck Williams in the book </span><em data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">Armageddon</span></em><span data-dcnode-id="1981" instrument_node=""> was ready to go on this when his wife Chloe was captured by the Global Community and then transferred from San Diego to Illinois while she was drugged, but Rayford Steele and the Tribulation Force contingent in San Diego had to talk him down and let God handle her fate.</span></li><li data-dcnode-id="1975"><span data-dcnode-id="1979" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RobbingTheDead" title="/pmwiki/pmwiki.php/Main/RobbingTheDead"><span data-dcnode-id="1978" instrument_node="">Robbing the Dead</span></a><span data-dcnode-id="1976" instrument_node="">: Some opportunists in the first book of the series have been doing this to the graves of those who have been resurrected in the Rapture.</span></li><li data-dcnode-id="1970"><span data-dcnode-id="1974" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RocksFallEveryoneDies" title="/pmwiki/pmwiki.php/Main/RocksFallEveryoneDies"><span data-dcnode-id="1973" instrument_node="">Rocks Fall, Everyone Dies</span></a><span data-dcnode-id="1971" instrument_node="">: Most of humanity dies in various disasters, including actual giant rocks falling out of the sky; many of them get sent to Hell.</span></li><li data-dcnode-id="1962"><span data-dcnode-id="1969" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RomanceInducingSmudge" title="/pmwiki/pmwiki.php/Main/RomanceInducingSmudge"><span data-dcnode-id="1968" instrument_node="">Romance-Inducing Smudge</span></a><span data-dcnode-id="1966" instrument_node="">: This happens early in the series, when Chloe is eating a cookie and has a bit of chocolate on her cheek. Buck leans over and wipes it off with his thumb, then eats it on impulse. Since the two have become hilariously repressed fundamentalist Christians, this is treated as a huge sexual milestone in their relationship. (Third base comes with chocolate.) Cookies later become a romantic symbol for them, almost to the point of creepy ridiculousness.</span><ul data-dcnode-id="1963"><li data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node=""> Almost?</span></li></ul></li><li data-dcnode-id="1952"><span data-dcnode-id="1961" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SatanIsGood" title="/pmwiki/pmwiki.php/Main/SatanIsGood"><span data-dcnode-id="1960" instrument_node="">Satan Is Good</span></a><span data-dcnode-id="1958" instrument_node="">: The viewpoint of the Other Light faction in </span><em data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="1955" instrument_node="">, claiming in their manifesto that God unfairly treated one of His angels and befouled his name and reputation by casting him out of His presence. </span><a class="twikilink" data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnwittingPawn" title="/pmwiki/pmwiki.php/Main/UnwittingPawn"><span data-dcnode-id="1954" instrument_node="">They are wrong, however.</span></a></li><li data-dcnode-id="1916"><span data-dcnode-id="1951" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SayYourPrayers" title="/pmwiki/pmwiki.php/Main/SayYourPrayers"><span data-dcnode-id="1950" instrument_node="">Say Your Prayers</span></a><span data-dcnode-id="1948" instrument_node="">: The Christian on board the cruise liner stuck in the middle of the Atlantic Ocean with no power leads the crew in a final prayer of salvation just before the </span><a class="twikilink" data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiantWallOfWateryDoom" title="/pmwiki/pmwiki.php/Main/GiantWallOfWateryDoom"><span data-dcnode-id="1947" instrument_node="">Giant Wall of Watery Doom</span></a><span data-dcnode-id="1945" instrument_node=""> hits it in the Dramatic Audio version of </span><em data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Soul Harvest</span></em><span data-dcnode-id="1942" instrument_node="">.</span><ul data-dcnode-id="1917"><li data-dcnode-id="1928"><span data-dcnode-id="1941" instrument_node=""> A woman in New Babylon who took the </span><a class="twikilink" data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="1940" instrument_node="">Mark of the Beast</span></a><span data-dcnode-id="1938" instrument_node=""> is left desperately saying prayers to God during the supernatural </span><a class="twikilink" data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBlackout" title="/pmwiki/pmwiki.php/Main/BigBlackout"><span data-dcnode-id="1937" instrument_node="">Big Blackout</span></a><span data-dcnode-id="1935" instrument_node=""> caused by one of God's Bowl Judgments in </span><em data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">Armageddon</span></em><span data-dcnode-id="1932" instrument_node="">, despite the fact that </span><a class="twikilink" data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam" title="/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam"><span data-dcnode-id="1931" instrument_node="">she's utterly screwed</span></a><span data-dcnode-id="1929" instrument_node="">.</span></li><li data-dcnode-id="1923"><span data-dcnode-id="1927" instrument_node=""> Chloe Williams leads an unsaved woman in a prayer of salvation right before her execution in </span><em data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Armageddon</span></em><span data-dcnode-id="1924" instrument_node="">.</span></li><li data-dcnode-id="1918"><span data-dcnode-id="1922" instrument_node=""> Even earlier, Demetrius Demeter and Lukas Miklos' wife also lead incarcerated people in prayers of salvation in </span><em data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">The Mark</span></em><span data-dcnode-id="1919" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1911"><span data-dcnode-id="1915" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheScapegoat" title="/pmwiki/pmwiki.php/Main/TheScapegoat"><span data-dcnode-id="1914" instrument_node="">The Scapegoat</span></a><span data-dcnode-id="1912" instrument_node="">: Thanks to Leon Fortunato, Rayford Steele is pinned for Carpathia's murder, despite evidence from Walter Moon showing that Chaim Rosenzweig was the real assassin.</span></li><li data-dcnode-id="1903"><span data-dcnode-id="1910" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheScourgeOfGod" title="/pmwiki/pmwiki.php/Main/TheScourgeOfGod"><span data-dcnode-id="1909" instrument_node="">The Scourge of God</span></a><span data-dcnode-id="1907" instrument_node="">: Seal Judgments, Trumpet Judgments, Bowl Judgments...take your pick.</span><ul data-dcnode-id="1904"><li data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node=""> The Bowl Judgments affect those who took the mark of loyalty and worshiped the Antichrist's image.</span></li></ul></li><li data-dcnode-id="1898"><span data-dcnode-id="1902" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewTheMoneyIHaveRules" title="/pmwiki/pmwiki.php/Main/ScrewTheMoneyIHaveRules"><span data-dcnode-id="1901" instrument_node="">Screw the Money, I Have Rules!</span></a><span data-dcnode-id="1899" instrument_node="">: Feebly attempted by Buck when Nicolae offers him a job in his inner circle, based on Buck's out-of-nowhere concern for journalistic ethics. Of course, Buck denies Nicolae in person, having been flown from Chicago to New York first class, driven to the meeting in a limousine, and having had lunch at an exclusive Manhattan yacht club, all on Nicolae's dime. Subverted when after all the posturing he takes the job anyway.</span></li><li data-dcnode-id="1893"><span data-dcnode-id="1897" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewTheRulesIHaveMoney" title="/pmwiki/pmwiki.php/Main/ScrewTheRulesIHaveMoney"><span data-dcnode-id="1896" instrument_node="">Screw the Rules, I Have Money!</span></a><span data-dcnode-id="1894" instrument_node="">: Nicolae Carpathia, full stop, especially before he is driven to become ruler of the world. Stonagal and Todd-Cochrane help direct him along that path with their own money, used to bend the rules.</span></li><li data-dcnode-id="1855"><span data-dcnode-id="1892" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewTheRulesIMakeThem" title="/pmwiki/pmwiki.php/Main/ScrewTheRulesIMakeThem"><span data-dcnode-id="1891" instrument_node="">Screw the Rules, I Make Them!</span></a><span data-dcnode-id="1889" instrument_node="">: Again, Nicolae Carpathia, post-indwelling.</span><ul data-dcnode-id="1886"><li data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node=""> Josuha Todd-Cothran gives a real sinister example when he is confronted by Alan Tompkins in the first novel. From the Dramatic Audio:</span></li></ul><div class="indent" data-dcnode-id="1881"><span data-dcnode-id="1885" instrument_node=""> </span><strong data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Todd-Cothran:</span></strong><span data-dcnode-id="1882" instrument_node=""> Captain Sullivan, if one of your men was to come to my office and harass me about anything, what should I do?</span></div><div class="indent" data-dcnode-id="1876"><span data-dcnode-id="1880" instrument_node=""> </span><strong data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Sullivan:</span></strong><span data-dcnode-id="1877" instrument_node=""> Mr. Todd-Cothran, sir, you do whatever you need to do.</span></div><div class="indent" data-dcnode-id="1871"><span data-dcnode-id="1875" instrument_node=""> </span><strong data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Todd-Cothran:</span></strong><span data-dcnode-id="1872" instrument_node=""> What if I was to...kill him where he sits?</span></div><div class="indent" data-dcnode-id="1866"><span data-dcnode-id="1870" instrument_node=""> </span><strong data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Sullivan:</span></strong><span data-dcnode-id="1867" instrument_node=""> Sir, I'm sure it would be justifiable homicide.</span></div><div class="indent" data-dcnode-id="1861"><span data-dcnode-id="1865" instrument_node=""> </span><strong data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Todd-Cothran:</span></strong><span data-dcnode-id="1862" instrument_node=""> What if his name happened to be Alan Tompkins?</span></div><div class="indent" data-dcnode-id="1856"><span data-dcnode-id="1860" instrument_node=""> </span><strong data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Sullivan:</span></strong><span data-dcnode-id="1857" instrument_node=""> Uh...I...I'd come over there and dispose of the body myself.</span></div></li><li data-dcnode-id="1841"><span data-dcnode-id="1854" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewTheWarWerePartying" title="/pmwiki/pmwiki.php/Main/ScrewTheWarWerePartying"><span data-dcnode-id="1853" instrument_node="">Screw the War, We're Partying!</span></a><span data-dcnode-id="1851" instrument_node="">: In the book </span><em data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="1848" instrument_node="">, the people in Petra were like this when the Global Community Unity Army has them completely surrounded, totally outgunned, and ready to overrun the place. Somewhat justified in that God has made them nigh-invulnerable to enemy fire at that point...and also in that Jesus was going to come and </span><a class="twikilink" data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="1847" instrument_node="">save them</span></a><span data-dcnode-id="1845" instrument_node=""> in a literal </span><a class="twikilink" data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeusExMachina" title="/pmwiki/pmwiki.php/Main/DeusExMachina"><span data-dcnode-id="1844" instrument_node="">Deus ex Machina</span></a><span data-dcnode-id="1842" instrument_node="">.</span></li><li data-dcnode-id="1828"><span data-dcnode-id="1840" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewYourUltimatum" title="/pmwiki/pmwiki.php/Main/ScrewYourUltimatum"><span data-dcnode-id="1839" instrument_node="">Screw Your Ultimatum!</span></a><span data-dcnode-id="1837" instrument_node="">: In </span><em data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Armageddon</span></em><span data-dcnode-id="1834" instrument_node="">, Carpathia issues the following to the defenders of Jerusalem: </span><a class="twikilink" data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouWillBeSpared" title="/pmwiki/pmwiki.php/Main/YouWillBeSpared"><span data-dcnode-id="1833" instrument_node="">by the count of three, if there is silence for fifteen seconds, then that means that the defenders will surrender to the GC.</span></a><span data-dcnode-id="1831" instrument_node=""> The defenders' response: </span><a class="twikilink" data-dcnode-id="1829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FiringInTheAirALot" title="/pmwiki/pmwiki.php/Main/FiringInTheAirALot"><span data-dcnode-id="1830" instrument_node="">shooting their guns into the air, Tsion and Buck included.</span></a></li><li data-dcnode-id="1820"><span data-dcnode-id="1827" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SealedEvilInACan" title="/pmwiki/pmwiki.php/Main/SealedEvilInACan"><span data-dcnode-id="1826" instrument_node="">Sealed Evil in a Can</span></a><span data-dcnode-id="1824" instrument_node="">: Satan during the Millennial Reign. Some people who are part of the Other Light subsect The Only Light believe that Satan purposely sealed himself away so that he will be powerful enough to overthrow God (whom the Only Light members believe don't exist despite visible evidence to the contrary) and those that will follow Him. As keeping with what the book of Revelation says, Satan does get released to lead the Other Light army at the end of the Millennium, only for his entire army to be </span><a class="twikilink" data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="1823" instrument_node="">smoked to ashes by God in seconds</span></a><span data-dcnode-id="1821" instrument_node="">, and for Satan to be cast into the Lake of Fire.</span></li><li data-dcnode-id="1809"><span data-dcnode-id="1819" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SecondFaceSmoke" title="/pmwiki/pmwiki.php/Main/SecondFaceSmoke"><span data-dcnode-id="1818" instrument_node="">Second-Face Smoke</span></a><span data-dcnode-id="1816" instrument_node="">: George Sebastian's captors in Greece do this to him in their interrogation in the book </span><em data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Desecration</span></em><span data-dcnode-id="1813" instrument_node="">. George thinks that </span><a class="twikilink" data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouWatchTooMuchX" title="/pmwiki/pmwiki.php/Main/YouWatchTooMuchX"><span data-dcnode-id="1812" instrument_node="">his captors have seen too many movies</span></a><span data-dcnode-id="1810" instrument_node="">.</span></li><li data-dcnode-id="1801"><span data-dcnode-id="1808" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SecretRelationship" title="/pmwiki/pmwiki.php/Main/SecretRelationship"><span data-dcnode-id="1807" instrument_node="">Secret Relationship</span></a><span data-dcnode-id="1805" instrument_node="">: David Hassid and Annie Christopher have this kind of relationship in the series while they're both working for Nicolae Carpathia in New Babylon, with the additional secret being that they're also Christian believers. Unfortunately, Annie was killed during Carpathia's "resurrection" in </span><em data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">The Indwelling</span></em><span data-dcnode-id="1802" instrument_node=""> when Leon Fortunato called down lightning to slay the disloyal among the gatherers at the funeral.</span></li><li data-dcnode-id="1793"><span data-dcnode-id="1800" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SeekingSanctuary" title="/pmwiki/pmwiki.php/Main/SeekingSanctuary"><span data-dcnode-id="1799" instrument_node="">Seeking Sanctuary</span></a><span data-dcnode-id="1797" instrument_node="">: During the latter half of the Tribulation, believers of the world seek out Petra because it is the only place in the world that Nicolae Carpathia's forces cannot touch since </span><a class="twikilink" data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlaceOfProtection" title="/pmwiki/pmwiki.php/Main/PlaceOfProtection"><span data-dcnode-id="1796" instrument_node="">it is under the protection of God</span></a><span data-dcnode-id="1794" instrument_node="">.</span></li><li data-dcnode-id="1779"><span data-dcnode-id="1792" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SelfFulfillingProphecy" title="/pmwiki/pmwiki.php/Main/SelfFulfillingProphecy"><span data-dcnode-id="1791" instrument_node="">Self-Fulfilling Prophecy</span></a><span data-dcnode-id="1789" instrument_node="">: </span><a class="twikilink" data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Satan" title="/pmwiki/pmwiki.php/Main/Satan"><span data-dcnode-id="1788" instrument_node="">Satan</span></a><span data-dcnode-id="1786" instrument_node=""> knows of the same Biblical prophecies as the protagonists do, and is actively trying to do the things he's prophecised to do to trigger the </span><a class="twikilink" data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SecondComing" title="/pmwiki/pmwiki.php/Main/SecondComing"><span data-dcnode-id="1785" instrument_node="">Second Coming</span></a><span data-dcnode-id="1783" instrument_node=""> so he can have his fight with Jesus. That those same prophecies say </span><a class="twikilink" data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouCantFightFate" title="/pmwiki/pmwiki.php/Main/YouCantFightFate"><span data-dcnode-id="1782" instrument_node="">Jesus is going to easily win that fight no matter what</span></a><span data-dcnode-id="1780" instrument_node=""> doesn't seem to bother him.</span></li><li data-dcnode-id="1768"><span data-dcnode-id="1778" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SharpenedToASingleAtom" title="/pmwiki/pmwiki.php/Main/SharpenedToASingleAtom"><span data-dcnode-id="1777" instrument_node="">Sharpened to a Single Atom</span></a><span data-dcnode-id="1775" instrument_node="">: Chaim Rosenzweig's blade, which he uses to skewer Carpathia's head with while </span><a class="twikilink" data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayingSick" title="/pmwiki/pmwiki.php/Main/PlayingSick"><span data-dcnode-id="1774" instrument_node="">Playing Sick</span></a><span data-dcnode-id="1772" instrument_node=""> in </span><em data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Asssassins</span></em><span data-dcnode-id="1769" instrument_node="">.</span></li><li data-dcnode-id="1760"><span data-dcnode-id="1767" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShiningCity" title="/pmwiki/pmwiki.php/Main/ShiningCity"><span data-dcnode-id="1766" instrument_node="">Shining City</span></a><span data-dcnode-id="1764" instrument_node="">: The New Jerusalem at the end of </span><em data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="1761" instrument_node="">.</span></li><li data-dcnode-id="1749"><span data-dcnode-id="1759" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="1758" instrument_node="">Shout-Out</span></a><span data-dcnode-id="1756" instrument_node="">: Mac McCullum comments in </span><em data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="1753" instrument_node=""> that Nicolae Carpathia would be </span><a class="twikilink" data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Zorro" title="/pmwiki/pmwiki.php/Literature/Zorro"><span data-dcnode-id="1752" instrument_node="">Zorro</span></a><span data-dcnode-id="1750" instrument_node=""> if he added a hat and mask to the ensembler he wore at the battle of Armageddon.</span></li><li data-dcnode-id="1722"><span data-dcnode-id="1748" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShowDontTell" title="/pmwiki/pmwiki.php/Main/ShowDontTell"><span data-dcnode-id="1747" instrument_node="">Show, Don't Tell</span></a><span data-dcnode-id="1745" instrument_node="">: Just look at </span><a class="urllink" data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.patheos.com/community/slacktivist/2007/01/19/lb-boutros-boutros-carpathia-2/"><span data-dcnode-id="1744" instrument_node="">this excerpt</span><img data-dcnode-id="1743" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1741" instrument_node="">, for instance. We are </span><em data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">told</span></em><span data-dcnode-id="1738" instrument_node=""> that Nicolae Carpathia "spoke earnestly, with passion, with a frequent smile, and with occasional, appropriate humor", not shown this. We are </span><em data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">told</span></em><span data-dcnode-id="1735" instrument_node=""> that it is a "touching scene", rather than shown why. We are </span><em data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">told</span></em><span data-dcnode-id="1732" instrument_node=""> that Carpathia has a "grasp of history" and "photographic memory of dates and places". We are </span><em data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">told</span></em><span data-dcnode-id="1729" instrument_node=""> that he spoke "with electricity and power". It should be noted that two-thirds of Carpathia's speech is simply </span><em data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">reading out the names of every country in the United Nations</span></em><span data-dcnode-id="1726" instrument_node="">, before then proceeding to name all the UN agencies and random facts about them. Instead of actually writing a speech that was genuinely captivating and inspiring, the authors simply resorted to </span><a class="twikilink" data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeOurWordForIt" title="/pmwiki/pmwiki.php/Main/TakeOurWordForIt"><span data-dcnode-id="1725" instrument_node="">Take Our Word for It</span></a><span data-dcnode-id="1723" instrument_node="">.</span></li><li data-dcnode-id="1714"><span data-dcnode-id="1721" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheSiege" title="/pmwiki/pmwiki.php/Main/TheSiege"><span data-dcnode-id="1720" instrument_node="">The Siege</span></a><span data-dcnode-id="1718" instrument_node="">: The Global Community Army tries to lay siege on the Christians at Petra and the Jews at the Temple Mount in Jersualem...only to be </span><a class="twikilink" data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="1717" instrument_node="">decimated by Jesus upon His return</span></a><span data-dcnode-id="1715" instrument_node="">.</span></li><li data-dcnode-id="1709"><span data-dcnode-id="1713" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SignificantAnagram" title="/pmwiki/pmwiki.php/Main/SignificantAnagram"><span data-dcnode-id="1712" instrument_node="">Significant Anagram</span></a><span data-dcnode-id="1710" instrument_node="">: Chaim Rosenzweig as his alter ego Micah, which really is an anagram of Chaim.</span></li><li data-dcnode-id="1701"><span data-dcnode-id="1708" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlippingAMickey" title="/pmwiki/pmwiki.php/Main/SlippingAMickey"><span data-dcnode-id="1707" instrument_node="">Slipping a Mickey</span></a><span data-dcnode-id="1705" instrument_node="">: Chloe Williams in </span><em data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Armageddon</span></em><span data-dcnode-id="1702" instrument_node=""> drank a milkshake with a drug in it that put her to sleep, enabling the GC to transfer her from San Diego to Illinois.</span></li><li data-dcnode-id="1693"><span data-dcnode-id="1700" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmiteMeOMightySmiter" title="/pmwiki/pmwiki.php/Main/SmiteMeOMightySmiter"><span data-dcnode-id="1699" instrument_node="">Smite Me, O Mighty Smiter!</span></a><span data-dcnode-id="1697" instrument_node="">: Both Nicolae Carpathia and Leon Fortunato have separately challenged God to strike them dead to prove that He is truly God. Of course, God doesn't respond to either of their challenges, since </span><a class="twikilink" data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PropheciesAreAlwaysRight" title="/pmwiki/pmwiki.php/Main/PropheciesAreAlwaysRight"><span data-dcnode-id="1696" instrument_node="">they are permitted to live only to face judgment</span></a><span data-dcnode-id="1694" instrument_node=""> at the end of the Battle of Armageddon by Jesus Christ before they are sent to the Lake Of Fire.</span></li><li data-dcnode-id="1676"><span data-dcnode-id="1692" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmugSnake" title="/pmwiki/pmwiki.php/Main/SmugSnake"><span data-dcnode-id="1691" instrument_node="">Smug Snake</span></a><span data-dcnode-id="1689" instrument_node="">: Nicolae is pretty clearly supposed to be seen as a purely evil but still scarily charismatic and competent </span><a class="twikilink" data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheChessmaster" title="/pmwiki/pmwiki.php/Main/TheChessmaster"><span data-dcnode-id="1688" instrument_node="">Chessmaster</span></a><span data-dcnode-id="1686" instrument_node=""> (not unlike </span><a class="createlink" data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StarWars" title="/pmwiki/pmwiki.php/Main/StarWars"><span data-dcnode-id="1685" instrument_node="">Star Wars</span></a><span data-dcnode-id="1683" instrument_node="">' Emperor), but he </span><em data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">actually</span></em><span data-dcnode-id="1680" instrument_node=""> comes off as trying too hard without really knowing what he's doing. His subordinates, namely Leon and Peter Matthews, are more deliberate </span><a class="twikilink" data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmugSnake" title="/pmwiki/pmwiki.php/Main/SmugSnake"><span data-dcnode-id="1679" instrument_node="">Smug Snakes</span></a><span data-dcnode-id="1677" instrument_node="">.</span></li><li data-dcnode-id="1671"><span data-dcnode-id="1675" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoiledCityOnAHill" title="/pmwiki/pmwiki.php/Main/SoiledCityOnAHill"><span data-dcnode-id="1674" instrument_node="">Soiled City on a Hill</span></a><span data-dcnode-id="1672" instrument_node="">: New Babylon, by virtue of destiny, becomes this.</span></li><li data-dcnode-id="1663"><span data-dcnode-id="1670" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SomeCallMeTim" title="/pmwiki/pmwiki.php/Main/SomeCallMeTim"><span data-dcnode-id="1669" instrument_node="">Some Call Me "Tim"</span></a><span data-dcnode-id="1667" instrument_node="">: Buck's real name is Cameron Williams, of which he goes by in </span><em data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="1664" instrument_node="">, and Mac McCullum first name is Montgomery. Also, Gustaf Zuckermandel Sr. and Jr. go by Big Zeke and Zeke respectively. Annie Christopher's real name is Angela and Hattie's short for Harriet</span></li><li data-dcnode-id="1655"><span data-dcnode-id="1662" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheSomethingForce" title="/pmwiki/pmwiki.php/Main/TheSomethingForce"><span data-dcnode-id="1661" instrument_node="">The Something Force</span></a><span data-dcnode-id="1659" instrument_node="">: The Tribulation Force in the main book series, the Millennium Force in </span><em data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="1656" instrument_node="">.</span></li><li data-dcnode-id="1644"><span data-dcnode-id="1654" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpitefulSpit" title="/pmwiki/pmwiki.php/Main/SpitefulSpit"><span data-dcnode-id="1653" instrument_node="">Spiteful Spit</span></a><span data-dcnode-id="1651" instrument_node="">: Mainyu Mazda in </span><em data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Armageddon</span></em><span data-dcnode-id="1648" instrument_node="">, at Albie's thought that the region mark he has is an authentic "</span><a class="twikilink" data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="1647" instrument_node="">mark of loyalty</span></a><span data-dcnode-id="1645" instrument_node="">", though he still serves the GC by collecting bounty for the disloyal.</span></li><li data-dcnode-id="1636"><span data-dcnode-id="1643" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpoilerTitle" title="/pmwiki/pmwiki.php/Main/SpoilerTitle"><span data-dcnode-id="1642" instrument_node="">Spoiler Title</span></a><span data-dcnode-id="1640" instrument_node="">: Many of the books in the series, but perhaps the most obvious is </span><em data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Kingdom Come: The Final Victory</span></em><span data-dcnode-id="1637" instrument_node="">.</span></li><li data-dcnode-id="1631"><span data-dcnode-id="1635" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StealthHiBye" title="/pmwiki/pmwiki.php/Main/StealthHiBye"><span data-dcnode-id="1634" instrument_node="">Stealth Hi/Bye</span></a><span data-dcnode-id="1632" instrument_node="">: The angel Anis, who appears in a few places throughout the entire book series.</span></li><li data-dcnode-id="1621"><span data-dcnode-id="1630" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StealthPun" title="/pmwiki/pmwiki.php/Main/StealthPun"><span data-dcnode-id="1629" instrument_node="">Stealth Pun</span></a><span data-dcnode-id="1627" instrument_node="">: The cellular phone implant during the Millennium in </span><em data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="1624" instrument_node="">. It gives new meaning to the term </span><span class="spoiler" data-dcnode-id="1622" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1623" instrument_node="">"a ringing in your ears."</span></span></li><li data-dcnode-id="1603"><span data-dcnode-id="1620" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StrawFeminist" title="/pmwiki/pmwiki.php/Main/StrawFeminist"><span data-dcnode-id="1619" instrument_node="">Straw Feminist</span></a><span data-dcnode-id="1617" instrument_node="">: Verna Zee, who is also a lesbian. The authors mean for her to come over as such. But she doesn't really display much feministic behavior, she just doesn't adore Buck like everyone else seems to. </span><a class="twikilink" data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AuthorAvatar" title="/pmwiki/pmwiki.php/Main/AuthorAvatar"><span data-dcnode-id="1616" instrument_node="">Which is a death sentence of course.</span></a><ul data-dcnode-id="1604"><li data-dcnode-id="1605"><span data-dcnode-id="1614" instrument_node=""> Also Chloe in the first book.</span><div class="indent" data-dcnode-id="1610"><strong data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">RAYFORD:</span></strong><span data-dcnode-id="1611" instrument_node=""> ...I want to see when Hattie can join us for dinner. That's all right with you, isn't it?"</span></div><div class="indent" data-dcnode-id="1606"><strong data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">CHLOE:</span></strong><span data-dcnode-id="1607" instrument_node=""> As long as you don't expect me to cook or something sexist and domestic like that."</span></div></li></ul></li><li data-dcnode-id="1595"><span data-dcnode-id="1602" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StrawCharacter" title="/pmwiki/pmwiki.php/Main/StrawCharacter"><span data-dcnode-id="1601" instrument_node="">Strawman Political</span></a><span data-dcnode-id="1599" instrument_node="">: Particularly </span><a class="twikilink" data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HollywoodAtheist" title="/pmwiki/pmwiki.php/Main/HollywoodAtheist"><span data-dcnode-id="1598" instrument_node="">Hollywood Atheist</span></a><span data-dcnode-id="1596" instrument_node="">; also abortionists.</span></li><li data-dcnode-id="1584"><span data-dcnode-id="1594" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StupidEvil" title="/pmwiki/pmwiki.php/Main/StupidEvil"><span data-dcnode-id="1593" instrument_node="">Stupid Evil</span></a><span data-dcnode-id="1591" instrument_node="">: Nicolae, Leon, and Satan follow Biblical prophecies to the letter throughout the entire series, despite the fact that said prophecies end with them getting their asses royally handed to them by Jesus and God. </span><a class="twikilink" data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo" title="/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo"><span data-dcnode-id="1590" instrument_node="">Because Destiny Says So</span></a><span data-dcnode-id="1588" instrument_node="">. In one particularly egregious moment, Indwelt!Nicolae claims he will have a "surprise" waiting for Jesus when he descends from Heaven for Armageddon. That surprise? The exact same army the Bible specifically describes being there and then being absolutely destroyed when Jesus comes down. Built in due to </span><a class="twikilink" data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouCantFightFate" title="/pmwiki/pmwiki.php/Main/YouCantFightFate"><span data-dcnode-id="1587" instrument_node="">You Can't Fight Fate</span></a><span data-dcnode-id="1585" instrument_node="">.</span></li><li data-dcnode-id="1570"><span data-dcnode-id="1583" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperSenses" title="/pmwiki/pmwiki.php/Main/SuperSenses"><span data-dcnode-id="1582" instrument_node="">Super Senses</span></a><span data-dcnode-id="1580" instrument_node="">: Being Born Again gives Buck a kind of Truth-O-Vision at the end of the first book/movie; he, and he alone, can see through the Antichrist's veil of deceit with the shooting incident at the United Nations, and knows what </span><em data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">really</span></em><span data-dcnode-id="1577" instrument_node=""> happened.</span><ul data-dcnode-id="1571"><li data-dcnode-id="1572"><span data-dcnode-id="1576" instrument_node=""> It also happens in </span><em data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Assassins</span></em><span data-dcnode-id="1573" instrument_node="">, where Buck realizes that Nicolae Carpathia had just hypnotized the audience into not caring about the coming announcement of Pope Peter the Second's death at the Global Gala.</span></li></ul></li><li data-dcnode-id="1562"><span data-dcnode-id="1569" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperSpeed" title="/pmwiki/pmwiki.php/Main/SuperSpeed"><span data-dcnode-id="1568" instrument_node="">Super Speed</span></a><span data-dcnode-id="1566" instrument_node="">: In </span><em data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="1563" instrument_node="">, the Remnant in Petra make a divine-assisted mad dash from Petra to Jerusalem. Hilarious in the Dramatic Audio as both Rayford and Mac joke about Abdullah being passed by pedestrians on foot.</span></li><li data-dcnode-id="1543"><span data-dcnode-id="1561" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SweetAndSourGrapes" title="/pmwiki/pmwiki.php/Main/SweetAndSourGrapes"><span data-dcnode-id="1560" instrument_node="">Sweet and Sour Grapes</span></a><span data-dcnode-id="1558" instrument_node="">: Two of the main protagonists are offered jobs by the Antichrist, jobs that, were they offered by anyone else would seem like dream jobs. The characters are reluctant to take those jobs, rightly seeing them as tests of temptation before them. After some initial reluctance, they take the jobs anyway, as they feel that taking them was "God's will."</span><ul data-dcnode-id="1546"><li data-dcnode-id="1547"><span data-dcnode-id="1557" instrument_node=""> In any other story, the following rationalization would be </span><a class="twikilink" data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Foreshadowing" title="/pmwiki/pmwiki.php/Main/Foreshadowing"><span data-dcnode-id="1556" instrument_node="">Foreshadowing</span></a><span data-dcnode-id="1554" instrument_node=""> of some kind of </span><a class="twikilink" data-dcnode-id="1552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FaceHeelTurn" title="/pmwiki/pmwiki.php/Main/FaceHeelTurn"><span data-dcnode-id="1553" instrument_node="">Face–Heel Turn</span></a><span data-dcnode-id="1551" instrument_node="">, even if we didn't already know that the </span><a class="twikilink" data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1550" instrument_node="">Big Bad</span></a><span data-dcnode-id="1548" instrument_node=""> was capable of mind control. In this story, it's considered valid.</span></li></ul><div class="indent" data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node=""> His job was ferrying Nicolae Carpathia wherever he wanted to go, and for some reason, Rayford felt compelled to sublimate his wishes, his desires, his will, and his logic. God had laid this in his lap for some reason, and as long as he didn’t have to live a lie, at least for now he would do it.</span></div></li><li data-dcnode-id="1538"><span data-dcnode-id="1542" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeYourTime" title="/pmwiki/pmwiki.php/Main/TakeYourTime"><span data-dcnode-id="1541" instrument_node="">Take Your Time</span></a><span data-dcnode-id="1539" instrument_node="">: In book 3, Buck is on the phone with Chloe when the latter wrecks her car and the line goes dead. Buck still has time to faff about taking calls from his father and other inconsequential things before he finally rushes off to find her.</span></li><li data-dcnode-id="1527"><span data-dcnode-id="1537" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TattooedCrook" title="/pmwiki/pmwiki.php/Main/TattooedCrook"><span data-dcnode-id="1536" instrument_node="">Tattooed Crook</span></a><span data-dcnode-id="1534" instrument_node="">: Mainyu Mazda, a shady Middle Eastern black market dealer, tattoos himself and the victims he has killed with an M, and when Albie pays him a visit to discuss having the GC's meeting place in Al Hillah bugged for money, he is in the process of getting another M tattooed on himself, saying that </span><a class="twikilink" data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OhCrap" title="/pmwiki/pmwiki.php/Main/OhCrap"><span data-dcnode-id="1533" instrument_node="">sometimes</span></a><span data-dcnode-id="1531" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Foreshadowing" title="/pmwiki/pmwiki.php/Main/Foreshadowing"><span data-dcnode-id="1530" instrument_node="">he even gets them in advance</span></a><span data-dcnode-id="1528" instrument_node="">.</span></li><li data-dcnode-id="1517"><span data-dcnode-id="1526" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TeenGenius" title="/pmwiki/pmwiki.php/Main/TeenGenius"><span data-dcnode-id="1525" instrument_node="">Teen Genius</span></a><span data-dcnode-id="1523" instrument_node="">:</span><ul data-dcnode-id="1518"><li data-dcnode-id="1521"><span data-dcnode-id="1522" inst
