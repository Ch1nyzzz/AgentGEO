="3715" instrument_node="">.</span></li><li data-dcnode-id="3709"><span data-dcnode-id="3713" instrument_node=""> Other existing happy couples among the Tribulation Force members include Dwayne and Trudy Tuttle (both of whom died in </span><em data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">Assassins</span></em><span data-dcnode-id="3710" instrument_node="">), and George and Priscilla Sebastian.</span></li><li data-dcnode-id="3704"><span data-dcnode-id="3708" instrument_node=""> The same can also be said of Jesus Christ and His bride, the church, when they return to Earth after the Tribulation. Of course, Chang Wong in the Dramatic Audio version of </span><em data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="3705" instrument_node=""> jokingly refers to those who became believers after the Rapture as being "the balcony" (where Rayford would go whenever he was late for church).</span></li></ul></li><li data-dcnode-id="3686"><span data-dcnode-id="3701" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HasTwoDaddies" title="/pmwiki/pmwiki.php/Main/HasTwoDaddies"><span data-dcnode-id="3700" instrument_node="">Has Two Daddies</span></a><span data-dcnode-id="3698" instrument_node="">: Nicolae Carpathia was a </span><a class="twikilink" data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DesignerBaby" title="/pmwiki/pmwiki.php/Main/DesignerBaby"><span data-dcnode-id="3697" instrument_node="">Designer Baby</span></a><span data-dcnode-id="3695" instrument_node=""> who had two biological fathers who were both gay, and was raised mostly by his mother and Viv Ivins until Nicolae and Viv had the mother disposed of. Later on in his life, </span><a class="twikilink" data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BuryYourGays" title="/pmwiki/pmwiki.php/Main/BuryYourGays"><span data-dcnode-id="3694" instrument_node="">Nicolae had his two fathers disposed of as well.</span></a><span data-dcnode-id="3692" instrument_node=""> And in the Dramatic Audio presentation of </span><em data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="3689" instrument_node="">, </span><a class="twikilink" data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RocksFallEveryoneDies" title="/pmwiki/pmwiki.php/Main/RocksFallEveryoneDies"><span data-dcnode-id="3688" instrument_node="">Viv Ivins gets killed by a giant hailstone.</span></a></li><li data-dcnode-id="3672"><span data-dcnode-id="3685" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam" title="/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam"><span data-dcnode-id="3684" instrument_node="">Heel–Face Door-Slam</span></a><span data-dcnode-id="3682" instrument_node="">: Once you've accepted the </span><a class="twikilink" data-dcnode-id="3680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="3681" instrument_node="">Mark of the Beast</span></a><span data-dcnode-id="3679" instrument_node="">, you're doomed no matter what. This also happens to </span><a class="twikilink" data-dcnode-id="3677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaserGuidedKarma" title="/pmwiki/pmwiki.php/Main/LaserGuidedKarma"><span data-dcnode-id="3678" instrument_node="">Nicolae himself</span></a><span data-dcnode-id="3676" instrument_node="">. Although he seems to be </span><a class="twikilink" data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelRealization" title="/pmwiki/pmwiki.php/Main/HeelRealization"><span data-dcnode-id="3675" instrument_node="">honestly repentant</span></a><span data-dcnode-id="3673" instrument_node=""> at the end when confronted with his sins, Christ judges that it's too late for him to change his ways.</span></li><li data-dcnode-id="3667"><span data-dcnode-id="3671" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceRevolvingDoor" title="/pmwiki/pmwiki.php/Main/HeelFaceRevolvingDoor"><span data-dcnode-id="3670" instrument_node="">Heel–Face Revolving Door</span></a><span data-dcnode-id="3668" instrument_node="">: Chaim Rosenzweig is torn between his friendship with Tsion Ben-Judah and his loyalties to Nicolae Carpathia. It is only after assassinating Carpathia and fleeing Israel that Chaim puts his faith in God.</span></li><li data-dcnode-id="3662"><span data-dcnode-id="3666" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceTurn" title="/pmwiki/pmwiki.php/Main/HeelFaceTurn"><span data-dcnode-id="3665" instrument_node="">Heel–Face Turn</span></a><span data-dcnode-id="3663" instrument_node="">: Most named characters, unless they are part of Carpathia's inner circle, come round and are saved.</span></li><li data-dcnode-id="3655"><span data-dcnode-id="3661" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaithTurn" title="/pmwiki/pmwiki.php/Main/HeelFaithTurn"><span data-dcnode-id="3660" instrument_node="">Heel–Faith Turn</span></a><span data-dcnode-id="3658" instrument_node="">: Leon Fortunato attempts this to Jesus after both he and Carpathia are captured in an act of self-preservation. Unfortunately for the False Prophet, </span><a class="twikilink" data-dcnode-id="3656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam" title="/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam"><span data-dcnode-id="3657" instrument_node="">Jesus considers him long since sold out to Satan and Fortunato is "sentenced to eternity in the lake of fire."</span></a></li><li data-dcnode-id="3644"><span data-dcnode-id="3654" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeKnowsTooMuch" title="/pmwiki/pmwiki.php/Main/HeKnowsTooMuch"><span data-dcnode-id="3653" instrument_node="">He Knows Too Much</span></a><span data-dcnode-id="3651" instrument_node="">: At the climax of the first book, Nicolae executes his two co-conspirators right in front of a UN meeting, with Buck present. He then brainwashes everyone to imagine that it was a murder-suicide by one of them, and that Buck was never there. This should send up alarms in the heads of normal men, as the last reporter to cross Nicolae only took the ferry halfway to Staten Island. But when Buck is called before Nicolae to explain himself, </span><a class="twikilink" data-dcnode-id="3649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooDumbToLive" title="/pmwiki/pmwiki.php/Main/TooDumbToLive"><span data-dcnode-id="3650" instrument_node="">he acts like a petulant child</span></a><span data-dcnode-id="3648" instrument_node=""> (</span><a class="twikilink" data-dcnode-id="3646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlotArmor" title="/pmwiki/pmwiki.php/Main/PlotArmor"><span data-dcnode-id="3647" instrument_node="">and gets away with it</span></a><span data-dcnode-id="3645" instrument_node="">).</span></li><li data-dcnode-id="3639"><span data-dcnode-id="3643" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Hell" title="/pmwiki/pmwiki.php/Main/Hell"><span data-dcnode-id="3642" instrument_node="">Hell</span></a><span data-dcnode-id="3640" instrument_node="">: Where the undecided, the condemned (i.e., those who decided to follow Satan and the Antichrist), and those who come against the Jews and Israel during the Tribulation end up. It's also what follows the Horseman of Death during the Fourth Seal Judgment that takes place concurrently with the Third and Fifth Seal Judgments.</span></li><li data-dcnode-id="3631"><span data-dcnode-id="3638" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HellishHorse" title="/pmwiki/pmwiki.php/Main/HellishHorse"><span data-dcnode-id="3637" instrument_node="">Hellish Horse</span></a><span data-dcnode-id="3635" instrument_node="">: Nicolae Carpathia's mount in the Battle of Armageddon was referred to as "the horse from hell", though it pales in comparison to the description of the horses that the 200 million man army from the Sixth Trumpet Judgment ride upon, matching their description from the </span><a class="twikilink" data-dcnode-id="3633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/BookOfRevelation" title="/pmwiki/pmwiki.php/Literature/BookOfRevelation"><span data-dcnode-id="3634" instrument_node="">Book of Revelation</span></a><span data-dcnode-id="3632" instrument_node="">.</span></li><li data-dcnode-id="3626"><span data-dcnode-id="3630" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HellSeeker" title="/pmwiki/pmwiki.php/Main/HellSeeker"><span data-dcnode-id="3629" instrument_node="">Hell Seeker</span></a><span data-dcnode-id="3627" instrument_node="">: Hattie Durham is one briefly, after deciding that she does believe in God and the Bible, but doesn't believe she deserves to go to Heaven. She comes around eventually.</span></li><li data-dcnode-id="3621"><span data-dcnode-id="3625" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicBSOD" title="/pmwiki/pmwiki.php/Main/HeroicBSOD"><span data-dcnode-id="3624" instrument_node="">Heroic BSoD</span></a><span data-dcnode-id="3622" instrument_node="">: Tsion Ben-Judah, Chaim Rosenzweig, Buck Williams and Rayford Steele each experience this during the Tribulation. Subverted with Bo Hansen, as his case was lethal.</span></li><li data-dcnode-id="3616"><span data-dcnode-id="3620" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeroicSacrifice" title="/pmwiki/pmwiki.php/Main/HeroicSacrifice"><span data-dcnode-id="3619" instrument_node="">Heroic Sacrifice</span></a><span data-dcnode-id="3617" instrument_node="">: Aplenty, but it's somewhat negated when the victims know they won't be gone for long. The most admirable characters are those willing to hold out during prolonged suffering.</span></li><li data-dcnode-id="3605"><span data-dcnode-id="3615" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HighPriest" title="/pmwiki/pmwiki.php/Main/HighPriest"><span data-dcnode-id="3614" instrument_node="">High Priest</span></a><span data-dcnode-id="3612" instrument_node="">: Enigma Babylon Pontifex Maximus Peter the Second was the first. He was then replaced by </span><a class="twikilink" data-dcnode-id="3610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDragon" title="/pmwiki/pmwiki.php/Main/TheDragon"><span data-dcnode-id="3611" instrument_node="">Leon Fortunato</span></a><span data-dcnode-id="3609" instrument_node="">, who became the Most High Reverend Father of Carpathianism.</span><ul data-dcnode-id="3606"><li data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node=""> And both were replaced by Jesus Christ, who is both King and High Priest.</span></li></ul></li><li data-dcnode-id="3594"><span data-dcnode-id="3604" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HighTimesFuture" title="/pmwiki/pmwiki.php/Main/HighTimesFuture"><span data-dcnode-id="3603" instrument_node="">High Times Future</span></a><span data-dcnode-id="3601" instrument_node="">: It's implied that drugs have been legalized during the Tribulation period in the series due to the </span><a class="twikilink" data-dcnode-id="3599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneWorldGovernment" title="/pmwiki/pmwiki.php/Main/OneWorldGovernment"><span data-dcnode-id="3600" instrument_node="">One World Government</span></a><span data-dcnode-id="3598" instrument_node=""> allowing such vices to be legalized — Albie's hometown of Al Basrah has been given over entirely to drugs by the time he visits it to seek out the service of a Middle Eastern black market dealer for an undercover job. The status of drugs is unclear during the Millennial Kingdom period, although the hills of Jerusalem are dripping with wine, and there's mention of hashish parties held by the </span><a class="twikilink" data-dcnode-id="3596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaResistance" title="/pmwiki/pmwiki.php/Main/LaResistance"><span data-dcnode-id="3597" instrument_node="">La Résistance</span></a><span data-dcnode-id="3595" instrument_node=""> group The Other Light in order to sway new members to join the group.</span></li><li data-dcnode-id="3590"><span data-dcnode-id="3593" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HollywoodAtheist" title="/pmwiki/pmwiki.php/Main/HollywoodAtheist"><span data-dcnode-id="3592" instrument_node="">Hollywood Atheist</span></a></li><li data-dcnode-id="3582"><span data-dcnode-id="3589" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HolyCity" title="/pmwiki/pmwiki.php/Main/HolyCity"><span data-dcnode-id="3588" instrument_node="">Holy City</span></a><span data-dcnode-id="3586" instrument_node="">: Jerusalem, despite the fact that Nicolae Carpathia hosts the </span><a class="twikilink" data-dcnode-id="3584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AFeteWorseThanDeath" title="/pmwiki/pmwiki.php/Main/AFeteWorseThanDeath"><span data-dcnode-id="3585" instrument_node="">Global Gala</span></a><span data-dcnode-id="3583" instrument_node=""> at that location and soon after his death and "resurrection" makes his "triumphal entry" into the city to defile the Temple.</span></li><li data-dcnode-id="3577"><span data-dcnode-id="3581" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HonoraryUncle" title="/pmwiki/pmwiki.php/Main/HonoraryUncle"><span data-dcnode-id="3580" instrument_node="">Honorary Uncle</span></a><span data-dcnode-id="3578" instrument_node="">: Tsion Ben-Judah is this to Kenny Williams.</span></li><li data-dcnode-id="3566"><span data-dcnode-id="3576" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HordeOfAlienLocusts" title="/pmwiki/pmwiki.php/Main/HordeOfAlienLocusts"><span data-dcnode-id="3575" instrument_node="">Horde of Alien Locusts</span></a><span data-dcnode-id="3573" instrument_node="">: In </span><em data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">Apollyon</span></em><span data-dcnode-id="3570" instrument_node="">, one of the Trumpet Judgments is a swarm of demon locusts that infect people without the seal of God on their foreheads with a maddening delirium that lasts for five months. Even more disconcerting is the </span><a class="twikilink" data-dcnode-id="3568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OminousLatinChanting" title="/pmwiki/pmwiki.php/Main/OminousLatinChanting"><span data-dcnode-id="3569" instrument_node="">Ominous Hebrew And Greek Chanting</span></a><span data-dcnode-id="3567" instrument_node=""> that the locust swarm engages in while they sweep across the globe in search of victims.</span></li><li data-dcnode-id="3558"><span data-dcnode-id="3565" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HotGod" title="/pmwiki/pmwiki.php/Main/HotGod"><span data-dcnode-id="3564" instrument_node="">Hot God</span></a><span data-dcnode-id="3562" instrument_node="">: Jesus gets this from Naomi Tiberias in the Dramatic Audio version of </span><em data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="3559" instrument_node=""> when she comments to Chang Wong on how handsome He is.</span></li><li data-dcnode-id="3533"><span data-dcnode-id="3557" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumiliationConga" title="/pmwiki/pmwiki.php/Main/HumiliationConga"><span data-dcnode-id="3556" instrument_node="">Humiliation Conga</span></a><span data-dcnode-id="3554" instrument_node="">: Mostly within </span><em data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="3551" instrument_node="">, where Carpathia finds himself </span><a class="twikilink" data-dcnode-id="3549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="3550" instrument_node="">unable to prevail against Jesus Christ</span></a><span data-dcnode-id="3548" instrument_node=""> in the battle of Armageddon, and is only further humiliated when he is forced to </span><a class="twikilink" data-dcnode-id="3546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KneelBeforeZod" title="/pmwiki/pmwiki.php/Main/KneelBeforeZod"><span data-dcnode-id="3547" instrument_node="">kneel before the Lord</span></a><span data-dcnode-id="3545" instrument_node=""> before he gets sent to the Lake of Fire. Of course, the believers are basically surprised that Jesus is more sad than dancing with unbridled glee at having the Antichrist at His mercy.</span><ul data-dcnode-id="3539"><li data-dcnode-id="3540"><span data-dcnode-id="3544" instrument_node=""> In Mac's case, however, he would be </span><a class="twikilink" data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech" title="/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech"><span data-dcnode-id="3543" instrument_node="">sticking it</span></a><span data-dcnode-id="3541" instrument_node=""> to Carpathia were he was in Jesus' place.</span></li></ul><div class="indent" data-dcnode-id="3534"><span data-dcnode-id="3538" instrument_node=""> Not such a big man now, are you? Where's the sword? Where's the army? Where's the cabinet, the sub-potentates? Now you're only the supreme </span><em data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">impotentate</span></em><span data-dcnode-id="3535" instrument_node="">, aren't you?</span></div></li><li data-dcnode-id="3525"><span data-dcnode-id="3532" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HyperCompetentSidekick" title="/pmwiki/pmwiki.php/Main/HyperCompetentSidekick"><span data-dcnode-id="3531" instrument_node="">Hyper Competent Sidekicks</span></a><span data-dcnode-id="3529" instrument_node="">: The Global Community communications people. Things like communications and even the Internet, which get rebuilt to privilege robustness to throughput on Carpathia's orders, are done well enough that they operate through the Tribulation, and even the Battle of Armageddon and its aftermath. </span><a class="urllink" data-dcnode-id="3526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//emlia.org/pmwiki/pub/web/Tripocalypse.History.html"><span data-dcnode-id="3528" instrument_node="">Why didn't Carpathia put them in charge of anti-supernatural operations?</span><img data-dcnode-id="3527" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></li><li data-dcnode-id="3520"><span data-dcnode-id="3524" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ICallItVera" title="/pmwiki/pmwiki.php/Main/ICallItVera"><span data-dcnode-id="3523" instrument_node="">I Call It "Vera"</span></a><span data-dcnode-id="3521" instrument_node="">: The Saber Handgun Rayford acquires from Albie. Carpathia later uses a Saber to gun down the Two Witnesses.</span></li><li data-dcnode-id="3515"><span data-dcnode-id="3519" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IChooseToStay" title="/pmwiki/pmwiki.php/Main/IChooseToStay"><span data-dcnode-id="3518" instrument_node="">I Choose to Stay</span></a><span data-dcnode-id="3516" instrument_node="">: Ming Toy undergoes a dangerous mission to rescue her and Chang's parents in her native China. She finds her mother, but sadly Mr. Wong died as a martyr. Mrs. Wong decides to remain behind while in China. She does get some reassurance from an angel, saying that her mother will survive the Tribulation.</span></li><li data-dcnode-id="3499"><span data-dcnode-id="3514" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IfYouDieICallYourStuff" title="/pmwiki/pmwiki.php/Main/IfYouDieICallYourStuff"><span data-dcnode-id="3513" instrument_node="">If You Die, I Call Your Stuff</span></a><span data-dcnode-id="3511" instrument_node="">: In </span><em data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">Apollyon</span></em><span data-dcnode-id="3508" instrument_node="">, Bo Hansen and Ernie attempt to steal Ken Ritz's wealth he had stashed at Palwaukee Airport following Ritz's death. Their attempt at robbery was thwarted </span><a class="twikilink" data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheScourgeOfGod" title="/pmwiki/pmwiki.php/Main/TheScourgeOfGod"><span data-dcnode-id="3507" instrument_node="">by the arrival of the horde of demonic locusts</span></a><span data-dcnode-id="3505" instrument_node="">. </span><a class="twikilink" data-dcnode-id="3503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiveMeASign" title="/pmwiki/pmwiki.php/Main/GiveMeASign"><span data-dcnode-id="3504" instrument_node="">Only Rayford and T.M. Delanty were spared because they were believers.</span></a><ul data-dcnode-id="3500"><li data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node=""> After executing both Todd-Cothran and Stonagal, Nicolae is the sole inheritor of both their estates. When the children of both men dispute the claim, Nicolae simply pays them off under the condition that they do not contest the will.</span></li></ul></li><li data-dcnode-id="3494"><span data-dcnode-id="3498" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IHaveManyNames" title="/pmwiki/pmwiki.php/Main/IHaveManyNames"><span data-dcnode-id="3497" instrument_node="">I Have Many Names</span></a><span data-dcnode-id="3495" instrument_node="">: Both Jesus and Satan have plenty of those.</span></li><li data-dcnode-id="3486"><span data-dcnode-id="3493" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IKnowYourTrueName" title="/pmwiki/pmwiki.php/Main/IKnowYourTrueName"><span data-dcnode-id="3492" instrument_node="">I Know Your True Name</span></a><span data-dcnode-id="3490" instrument_node="">: The demonic miracle worker in </span><em data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">The Remnant</span></em><span data-dcnode-id="3487" instrument_node=""> tries to pull this trick on Mac McCullum after he slays the defectors from Petra with deadly snakes, but it doesn't work.</span></li><li data-dcnode-id="3478"><span data-dcnode-id="3485" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IllegalReligion" title="/pmwiki/pmwiki.php/Main/IllegalReligion"><span data-dcnode-id="3484" instrument_node="">Illegal Religion</span></a><span data-dcnode-id="3482" instrument_node="">: Christianity as well as all other religions except for Carpathianism become illegal to practice during the latter half of the Tribulation when Nicolae Carpathia is "resurrected" and </span><a class="twikilink" data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AGodAmI" title="/pmwiki/pmwiki.php/Main/AGodAmI"><span data-dcnode-id="3481" instrument_node="">proclaims himself to be God</span></a><span data-dcnode-id="3479" instrument_node="">.</span></li><li data-dcnode-id="3439"><span data-dcnode-id="3477" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IllTakeThatAsACompliment" title="/pmwiki/pmwiki.php/Main/IllTakeThatAsACompliment"><span data-dcnode-id="3476" instrument_node="">I'll Take That as a Compliment</span></a><span data-dcnode-id="3474" instrument_node="">: The following exchange between Rayford and Ken in the Dramatic Audio of </span><em data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">Apollyon</span></em><span data-dcnode-id="3471" instrument_node=""> after refusing to take Hattie with them:</span><div class="indent" data-dcnode-id="3467"><strong data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Ken:</span></strong><span data-dcnode-id="3468" instrument_node=""> Little spitfire hung up on me. Gotta like her spunk, though. She is a gorgeous thing, ain't she?</span></div><div class="indent" data-dcnode-id="3463"><strong data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">Rayford:</span></strong><span data-dcnode-id="3464" instrument_node=""> (chuckles) Ritz, you've got to be on the feminists' Top 10 Most Wanted List.</span></div><div class="indent" data-dcnode-id="3459"><strong data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">Ken:</span></strong><span data-dcnode-id="3460" instrument_node=""> Really? Hey, save me a copy when that comes out. I want to send that to Mom.</span></div><ul data-dcnode-id="3456"><li data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node=""> We also have this exchange between Mac McCullum and Annie Christopher in the Dramatic Audio of Assassins:</span></li></ul><div class="indent" data-dcnode-id="3440"><strong data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">Annie:</span></strong><span data-dcnode-id="3453" instrument_node=""> And for the record, Captain McCullum, I can't stand working for either of you. Personnel has a standing request from me, demanding that I be reassigned. The Director of my department is condescending and unbearable... </span><br data-dcnode-id="3452"><strong data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">Mac:</span></strong><span data-dcnode-id="3449" instrument_node=""> I can see that. </span><br data-dcnode-id="3448"><strong data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">Annie:</span></strong><span data-dcnode-id="3445" instrument_node=""> ...and the captain of the Condor is unbearably sexist. </span><br data-dcnode-id="3444"><strong data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">Mac:</span></strong><span data-dcnode-id="3441" instrument_node=""> Why, thank you.</span></div></li><li data-dcnode-id="3431"><span data-dcnode-id="3438" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImmortalProcreationClause" title="/pmwiki/pmwiki.php/Main/ImmortalProcreationClause"><span data-dcnode-id="3437" instrument_node="">Immortal Procreation Clause</span></a><span data-dcnode-id="3435" instrument_node="">: Goes beyond this with the "glorifieds" in </span><em data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="3432" instrument_node="">, since they won't even have the desire for sexual intercourse.</span></li><li data-dcnode-id="3411"><span data-dcnode-id="3430" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImmuneToBullets" title="/pmwiki/pmwiki.php/Main/ImmuneToBullets"><span data-dcnode-id="3429" instrument_node="">Immune to Bullets</span></a><span data-dcnode-id="3427" instrument_node="">: Petra and its inhabitants are supernaturally protected from the GC. Rockets and missiles fired by the GC literally go through the believers' choppers and other aircraft to the point that it's routine for the believers.</span><ul data-dcnode-id="3412"><li data-dcnode-id="3420"><span data-dcnode-id="3426" instrument_node=""> In </span><em data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="3423" instrument_node="">, with The Sign of the Son of Man during the Battle of Armageddon, the believers are nigh invunerable to bullets...and everything else. </span><a class="twikilink" data-dcnode-id="3421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DidYouJustFlipOffCthulhu" title="/pmwiki/pmwiki.php/Main/DidYouJustFlipOffCthulhu"><span data-dcnode-id="3422" instrument_node="">Rayford and the other believers defending Petra have some fun with this, goading the Unity Army into attacking them, but with no success from the latter.</span></a></li><li data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node=""> In the same book, Mac's chopper is rigged with grenades. Mac's faith pretty much saved both him and his chopper when the grenades go boom.</span></li><li data-dcnode-id="3413"><span data-dcnode-id="3417" instrument_node=""> Jesus Christ Himself is also immune to whatever the Unity Army throws at Him and the army of saints...</span><strong data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">especially</span></strong><span data-dcnode-id="3414" instrument_node=""> missiles.</span></li></ul></li><li data-dcnode-id="3392"><span data-dcnode-id="3410" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IncessantMusicMadness" title="/pmwiki/pmwiki.php/Main/IncessantMusicMadness"><span data-dcnode-id="3409" instrument_node="">Incessant Music Madness</span></a><span data-dcnode-id="3407" instrument_node="">: "Hail Carpathia" becomes musical torture for Chloe Williams when she is held in custody by the Global Community in the book </span><em data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">Armageddon</span></em><span data-dcnode-id="3404" instrument_node="">. She counters this somewhat by singing </span><a class="twikilink" data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheVillainSucksSong" title="/pmwiki/pmwiki.php/Main/TheVillainSucksSong"><span data-dcnode-id="3403" instrument_node="">"Fail Carpathia"</span></a><span data-dcnode-id="3401" instrument_node="">.</span><ul data-dcnode-id="3393"><li data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node=""> Chloe gets even in this area when she sings a bunch of Christian hymns in her solitary confinement cell, which annoys the GC guard.</span></li><li data-dcnode-id="3394"><span data-dcnode-id="3398" instrument_node=""> Any Christian believer that goes to the chopping block in the latter half of the Tribulation that </span><a class="twikilink" data-dcnode-id="3396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FaceDeathWithDignity" title="/pmwiki/pmwiki.php/Main/FaceDeathWithDignity"><span data-dcnode-id="3397" instrument_node="">Faces Death With Dignity</span></a><span data-dcnode-id="3395" instrument_node=""> by singing hymns unto God, much to the irritation of Nicolae Carpathia and the GC forces.</span></li></ul></li><li data-dcnode-id="3384"><span data-dcnode-id="3391" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InconvenientSummons" title="/pmwiki/pmwiki.php/Main/InconvenientSummons"><span data-dcnode-id="3390" instrument_node="">Inconvenient Summons</span></a><span data-dcnode-id="3388" instrument_node="">: In </span><em data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="3385" instrument_node="">, with Jesus summoning the last remaining quarter of humanity to the Valley of Jehoshaphat for judgment (who at that point are mostly GC and Carpathia loyalists), some are pulled out of various things they were doing just for the sake of being judged.</span></li><li data-dcnode-id="3379"><span data-dcnode-id="3383" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IncorruptiblePurePureness" title="/pmwiki/pmwiki.php/Main/IncorruptiblePurePureness"><span data-dcnode-id="3382" instrument_node="">Incorruptible Pure Pureness</span></a><span data-dcnode-id="3380" instrument_node="">: Jesus Christ, the angels, those with glorified bodies.</span></li><li data-dcnode-id="3372"><span data-dcnode-id="3378" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IndirectKiss" title="/pmwiki/pmwiki.php/Main/IndirectKiss"><span data-dcnode-id="3377" instrument_node="">Indirect Kiss</span></a><span data-dcnode-id="3375" instrument_node="">: Buck removing a cookie crumb from Chloe's lip and licking it off his finger. </span><a class="twikilink" data-dcnode-id="3373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoHuggingNoKissing" title="/pmwiki/pmwiki.php/Main/NoHuggingNoKissing"><span data-dcnode-id="3374" instrument_node="">Phew, get a room!</span></a></li><li data-dcnode-id="3354"><span data-dcnode-id="3371" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/INeedAFreakingDrink" title="/pmwiki/pmwiki.php/Main/INeedAFreakingDrink"><span data-dcnode-id="3370" instrument_node="">I Need a Freaking Drink</span></a><span data-dcnode-id="3368" instrument_node="">: Subverted slightly with Chaim Rosenzweig's driver, Jacov. In </span><em data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">Apollyon</span></em><span data-dcnode-id="3365" instrument_node="">, Jacov is known to fall off the wagon. Chaim even fired him at one point, but rehired him out of pity. He becomes a believer at the </span><a class="twikilink" data-dcnode-id="3363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouAllMeetInAnInn" title="/pmwiki/pmwiki.php/Main/YouAllMeetInAnInn"><span data-dcnode-id="3364" instrument_node="">meeting at the 144,000 Jews</span></a><span data-dcnode-id="3362" instrument_node="">, and is later found inside a bar. Instead of getting drunk, he is preaching to the patrons inside when Chaim and Buck find him afterward. After Jacov proved to his boss that he wasn't getting drunk, Chaim's response is very deadpan, but hilarious.</span><div class="indent" data-dcnode-id="3355"><strong data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">Chaim:</span></strong><span data-dcnode-id="3359" instrument_node=""> Oy. I wish you </span><em data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">were</span></em><span data-dcnode-id="3356" instrument_node=""> drunk.</span></div></li><li data-dcnode-id="3329"><span data-dcnode-id="3353" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InformedAbility" title="/pmwiki/pmwiki.php/Main/InformedAbility"><span data-dcnode-id="3352" instrument_node="">Informed Ability</span></a><span data-dcnode-id="3350" instrument_node="">:</span><ul data-dcnode-id="3330"><li data-dcnode-id="3345"><span data-dcnode-id="3349" instrument_node=""> </span><em data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">All</span></em><span data-dcnode-id="3346" instrument_node=""> of Buck's characteristics. He is billed as an amazing writer, but all of the examples of his writing are clumsy analogies. He is (we're told) an investigative reporter, who neither investigates nor reports anything; he's supposed to be worldly wise (before his conversion), but he's a 30-year-old virgin; he's your actual globetrotting journalist, "among the top 3% of air travelers in the world", but washes his underwear in the sink because he doesn't realize hotels provide laundry service; he's a sophisticated world traveler — who happens to be headquartered in New York, the international-cuisine capital of the planet — but can't order in a restaurant in Tel Aviv because he cannot begin to imagine what an Israeli restaurant might have available.</span></li><li data-dcnode-id="3331"><span data-dcnode-id="3344" instrument_node=""> Now, on the subject of Carpathia, we're told he's a great speaker, but though his speech at the U.N. does get a lot of applause it is clear to the reader that his speech, which consists of reciting a lot of uninteresting trivia about the U.N. and also reciting a list of </span><em data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">every member nation</span></em><span data-dcnode-id="3341" instrument_node="">, has nothing to gain people's enthusiasm since it doesn't contain any actual opinion for people to agree with, apart from a general "Peace is good, mkay?" Maybe this is intentional, to </span><em data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">really</span></em><span data-dcnode-id="3338" instrument_node=""> show off his (</span><a class="twikilink" data-dcnode-id="3336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CompellingVoice" title="/pmwiki/pmwiki.php/Main/CompellingVoice"><span data-dcnode-id="3337" instrument_node="">possibly supernatural</span></a><span data-dcnode-id="3335" instrument_node="">) speaking skills — i.e., the </span><em data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">script</span></em><span data-dcnode-id="3332" instrument_node=""> is terrible, but Carpathia speaks it with such intense passion and flair that he can build enthusiasm anyway.</span></li></ul></li><li data-dcnode-id="3324"><span data-dcnode-id="3328" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InformedFlaw" title="/pmwiki/pmwiki.php/Main/InformedFlaw"><span data-dcnode-id="3327" instrument_node="">Informed Flaw</span></a><span data-dcnode-id="3325" instrument_node="">: TV or narrations keep telling us that after all the good Christians have been raptured, crime has risen spectacularly among the remaining godless hordes. Yet we never really see any of that (Rayford and Chloe's house is burgled once, but that's about it), the characters never act like they don't feel safe, and the entirety of humanity is unbelievably enthusiastic and accepting of Nicolae's message of peace, unity and brotherhood.</span></li><li data-dcnode-id="3311"><span data-dcnode-id="3323" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InsaneTrollLogic" title="/pmwiki/pmwiki.php/Main/InsaneTrollLogic"><span data-dcnode-id="3322" instrument_node="">Insane Troll Logic</span></a><span data-dcnode-id="3320" instrument_node="">: When Chloe and Rayford Steele discuss whether the mass disappearances was caused by God gettin' his Rapture on, there is much logic of the insane troll kind.</span><ul data-dcnode-id="3312"><li data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node=""> Rayford insists that it's the Rapture, because "there is no other explanation." Thing is, he never provides any actual evidence that the laws of physics allow an omnipotent god to exist; instead he acts as if that's self-evident.</span></li><li data-dcnode-id="3313"><span data-dcnode-id="3317" instrument_node=""> He says it can't have been caused by some plan from the Russians, because while the Soviets would have been blamed if it'd happened in the olden days, there doesn't exist any Soviet threat anymore. However, any reader can understand that if it's caused by the Russians, then the facts that Russian children are gone too proves that it was no attack but some experiment </span><a class="twikilink" data-dcnode-id="3315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoneHorriblyWrong" title="/pmwiki/pmwiki.php/Main/GoneHorriblyWrong"><span data-dcnode-id="3316" instrument_node="">Gone Horribly Wrong</span></a><span data-dcnode-id="3314" instrument_node="">.</span></li></ul></li><li data-dcnode-id="3306"><span data-dcnode-id="3310" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheInsomniac" title="/pmwiki/pmwiki.php/Main/TheInsomniac"><span data-dcnode-id="3309" instrument_node="">The Insomniac</span></a><span data-dcnode-id="3307" instrument_node="">: Nicolae Carpathia becomes this for the latter half of the Tribulation after Satan indwells him.</span></li><li data-dcnode-id="3298"><span data-dcnode-id="3305" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InstantCultured" title="/pmwiki/pmwiki.php/Main/InstantCultured"><span data-dcnode-id="3304" instrument_node="">Instant Cultured</span></a><span data-dcnode-id="3302" instrument_node="">: Once the protagonists, and for that matter the horde of unnamed new worshippers at their church, convert they seem to become instantly knowledgeable about the authors' beliefs regarding the Bible and how Christians should act. While this is justified in the case of Rev. Bruce and perhaps Rayford (who both have at least tangential prior exposure to such religious communities,) it's rather odd to see Buck out-debating a </span><a class="twikilink" data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StrawCharacter" title="/pmwiki/pmwiki.php/Main/StrawCharacter"><span data-dcnode-id="3301" instrument_node="">bishop</span></a><span data-dcnode-id="3299" instrument_node=""> using Bible-quotes, not to mention him and Chloe 'dating'. These two people were supposed to be a globe-trotting jet-set reporter and a secular Stanford student a week ago, yet they treat hand-holding as a deeply intimate act that should not be rushed.</span></li><li data-dcnode-id="3293"><span data-dcnode-id="3297" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IntrepidReporter" title="/pmwiki/pmwiki.php/Main/IntrepidReporter"><span data-dcnode-id="3296" instrument_node="">Intrepid Reporter</span></a><span data-dcnode-id="3294" instrument_node="">: Cameron "Buck" Williams, as he stumbles onto the Stonagal conspiracy. His plot arc ultimately ends up a subversion, however, with the bad guys managing to successfully suppress his story about their schemes.</span></li><li data-dcnode-id="3285"><span data-dcnode-id="3292" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InvisibleToNormals" title="/pmwiki/pmwiki.php/Main/InvisibleToNormals"><span data-dcnode-id="3291" instrument_node="">Invisible to Normals</span></a><span data-dcnode-id="3289" instrument_node="">: The 200 million horsemen army in the book </span><em data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">Assassins</span></em><span data-dcnode-id="3286" instrument_node=""> is invisible to everybody but believers in Christ, but are nonetheless dangerous to those who aren't believers, as they have been unleashed to slay a third of the remaining world's population around the time of the Sixth Trumpet Judgment (believers not included).</span></li><li data-dcnode-id="3274"><span data-dcnode-id="3284" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IronicBirthday" title="/pmwiki/pmwiki.php/Main/IronicBirthday"><span data-dcnode-id="3283" instrument_node="">Ironic Birthday</span></a><span data-dcnode-id="3281" instrument_node="">: In </span><em data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="3278" instrument_node="">, Cendrillon Jospin's parents realized that their child would not become a believer by her 100th birthday, which in the Millennial Kingdom period </span><a class="twikilink" data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathsHourglass" title="/pmwiki/pmwiki.php/Main/DeathsHourglass"><span data-dcnode-id="3277" instrument_node="">means an automatic death sentence to Hell</span></a><span data-dcnode-id="3275" instrument_node="">, so they celebrated her birthday before the day that she would die. She still went to Hell nonetheless.</span></li><li data-dcnode-id="3239"><span data-dcnode-id="3273" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IstanbulNotConstantinople" title="/pmwiki/pmwiki.php/Main/IstanbulNotConstantinople"><span data-dcnode-id="3272" instrument_node="">Istanbul (Not Constantinople)</span></a><span data-dcnode-id="3270" instrument_node="">: In </span><em data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="3267" instrument_node="">, the Valley of Jehoshaphat (also called the Valley Where Jehovah Judges), formerly known as the Mount of Olives. Also in </span><em data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="3264" instrument_node="">, the country of Osaze (meaning 'Loved by God') is the new name for Egypt.</span><ul data-dcnode-id="3240"><li data-dcnode-id="3241"><span data-dcnode-id="3263" instrument_node=""> The reformed world under the Global Community (formerly known as the United Nations):</span><ul data-dcnode-id="3242"><li data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node=""> United North American States (North and Central America, Greenland and the Caribbeans)</span></li><li data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node=""> United South American States (South America)</span></li><li data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node=""> United Great Britain States (Britain, Ireland, Scotland and Wales)</span></li><li data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node=""> United European States: (Most of the countries in Europe, save for Britain)</span></li><li data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node=""> United African States (Africa)</span></li><li data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node=""> United Carpathian States (formerly United Holy Land States, consisting of the Middle East)</span></li><li data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node=""> United Indian States (The Indian Subcontinent, half of Southeast Asia)</span></li><li data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node=""> United Asian States (China, the Korean Peninsula, Japan and Mongolia)</span></li><li data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node=""> United Russian States (Russia)</span></li><li data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node=""> United Pacific States (Australia, Oceania and Hawaii)</span></li></ul></li></ul></li><li data-dcnode-id="3231"><span data-dcnode-id="3238" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItsNotPornItsArt" title="/pmwiki/pmwiki.php/Main/ItsNotPornItsArt"><span data-dcnode-id="3237" instrument_node="">It's Not Porn, It's Art</span></a><span data-dcnode-id="3235" instrument_node="">: Guy Blod, a sculptor working for the Global Community, decides an appropriate memorial for the late Antichrist would be an enormous, highly-detailed metal nude. He reacts this way to "Tribulation Saints" who find the statue unsettling. (No one else cares — by this point in the series, all television is either porn or </span><a class="twikilink" data-dcnode-id="3233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Gorn" title="/pmwiki/pmwiki.php/Main/Gorn"><span data-dcnode-id="3234" instrument_node="">Gorn</span></a><span data-dcnode-id="3232" instrument_node="">. Even the news.)</span></li><li data-dcnode-id="3214"><span data-dcnode-id="3230" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItWontTurnOff" title="/pmwiki/pmwiki.php/Main/ItWontTurnOff"><span data-dcnode-id="3229" instrument_node="">It Won't Turn Off</span></a><span data-dcnode-id="3227" instrument_node="">: One of God's angels </span><a class="twikilink" data-dcnode-id="3225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoNotAdjustYourSet" title="/pmwiki/pmwiki.php/Main/DoNotAdjustYourSet"><span data-dcnode-id="3226" instrument_node="">takes over the airwaves</span></a><span data-dcnode-id="3224" instrument_node=""> in the book </span><em data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">Desecration</span></em><span data-dcnode-id="3221" instrument_node=""> to deliver a message from </span><a class="twikilink" data-dcnode-id="3219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="3220" instrument_node="">Revelation 14:9-13</span></a><span data-dcnode-id="3218" instrument_node=""> to those who have taken the </span><a class="twikilink" data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="3217" instrument_node="">Mark of the Beast</span></a><span data-dcnode-id="3215" instrument_node=""> and worshiped Carpathia's image.</span></li><li data-dcnode-id="3209"><span data-dcnode-id="3213" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IvyLeagueForEveryone" title="/pmwiki/pmwiki.php/Main/IvyLeagueForEveryone"><span data-dcnode-id="3212" instrument_node="">Ivy League for Everyone</span></a><span data-dcnode-id="3210" instrument_node="">: Buck Williams attended Princeton, while Chloe Steele attended Stanford.</span></li><li data-dcnode-id="3201"><span data-dcnode-id="3208" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IWantMyMommy" title="/pmwiki/pmwiki.php/Main/IWantMyMommy"><span data-dcnode-id="3207" instrument_node="">I Want My Mommy!</span></a><span data-dcnode-id="3205" instrument_node="">: A dramatic one by Kenny Bruce Williams in the Dramatic Audio version of </span><em data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">Armageddon</span></em><span data-dcnode-id="3202" instrument_node=""> when he learns from his dad that his mom has died and went to be with Jesus.</span></li><li data-dcnode-id="3194"><span data-dcnode-id="3200" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IWarnedYou" title="/pmwiki/pmwiki.php/Main/IWarnedYou"><span data-dcnode-id="3199" instrument_node="">I Warned You</span></a><span data-dcnode-id="3197" instrument_node="">: Rayford can't say that Irene didn't warn him about the Rapture. However, after surviving the Tribulation and reuniting with his wife, Rayford tells her (and Raymie in the Dramatic Audio) that she is permitted </span><span class="spoiler" data-dcnode-id="3195" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3196" instrument_node=""> "one cosmic-I-told-you-so."</span></span></li><li data-dcnode-id="3183"><span data-dcnode-id="3193" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JackBauerInterrogationTechnique" title="/pmwiki/pmwiki.php/Main/JackBauerInterrogationTechnique"><span data-dcnode-id="3192" instrument_node="">Jack Bauer Interrogation Technique</span></a><span data-dcnode-id="3190" instrument_node="">: Elena and her GC buddies pull this several times on George Sebastian. But George is ex-military and is capable of taking the pain. He even mocks their techniques in the Dramatic Audio version of </span><em data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">Desecration</span></em><span data-dcnode-id="3187" instrument_node=""> by saying that </span><a class="twikilink" data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouWatchTooMuchX" title="/pmwiki/pmwiki.php/Main/YouWatchTooMuchX"><span data-dcnode-id="3186" instrument_node="">they watch too many movies</span></a><span data-dcnode-id="3184" instrument_node="">.</span></li><li data-dcnode-id="3175"><span data-dcnode-id="3182" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmaHoudini" title="/pmwiki/pmwiki.php/Main/KarmaHoudini"><span data-dcnode-id="3181" instrument_node="">Karma Houdini</span></a><span data-dcnode-id="3179" instrument_node="">: Russia fires all its nukes at Israel and is </span><em data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">not</span></em><span data-dcnode-id="3176" instrument_node=""> blasted to oblivion by the USA and pals. Subverted before long, though, when the global disasters of God's judgments strike them as hard as everyone else, ruining the country anyway.</span></li><li data-dcnode-id="3168"><span data-dcnode-id="3174" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KarmicDeath" title="/pmwiki/pmwiki.php/Main/KarmicDeath"><span data-dcnode-id="3173" instrument_node="">Karmic Death</span></a><span data-dcnode-id="3171" instrument_node="">: Loren Hut, the leader of the Morale Monitors. After failing to kill Chaim Rosenzweig (who was going by the name Micah), simply because Chaim was protected by God, Carpathia guns Hut down, but not before </span><a class="twikilink" data-dcnode-id="3169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DidYouJustFlipOffCthulhu" title="/pmwiki/pmwiki.php/Main/DidYouJustFlipOffCthulhu"><span data-dcnode-id="3170" instrument_node="">Hut tells Carpathia off.</span></a></li><li data-dcnode-id="3145"><span data-dcnode-id="3167" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KickTheDog" title="/pmwiki/pmwiki.php/Main/KickTheDog"><span data-dcnode-id="3166" instrument_node="">Kick the Dog</span></a><span data-dcnode-id="3164" instrument_node="">: Nicolae using </span><a class="twikilink" data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorldWarIII" title="/pmwiki/pmwiki.php/Main/WorldWarIII"><span data-dcnode-id="3163" instrument_node="">World War III</span></a><span data-dcnode-id="3161" instrument_node=""> as an excuse to randomly nuke cities in America, England and elsewhere in the world </span><a class="twikilink" data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForTheEvulz" title="/pmwiki/pmwiki.php/Main/ForTheEvulz"><span data-dcnode-id="3160" instrument_node="">For the Evulz</span></a><span data-dcnode-id="3158" instrument_node="">, killing tens if not hundreds of millions of people. </span><a class="twikilink" data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StrawHypocrite" title="/pmwiki/pmwiki.php/Main/StrawHypocrite"><span data-dcnode-id="3157" instrument_node="">And then holding a tearful speech to the world</span></a><span data-dcnode-id="3155" instrument_node=""> about how </span><a class="twikilink" data-dcnode-id="3153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WarIsHell" title="/pmwiki/pmwiki.php/Main/WarIsHell"><span data-dcnode-id="3154" instrument_node="">War Is Hell</span></a><span data-dcnode-id="3152" instrument_node="">. Prior to this, the most evil thing he had been seen doing was to kill Stonagal and Todd-Cothran, who were </span><a class="twikilink" data-dcnode-id="3150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AssholeVictim" title="/pmwiki/pmwiki.php/Main/AssholeVictim"><span data-dcnode-id="3151" instrument_node="">deeply corrupt men</span></a><span data-dcnode-id="3149" instrument_node=""> themselves, which made it sort-of possible to read him as a sort of </span><a class="twikilink" data-dcnode-id="3147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WellIntentionedExtremist" title="/pmwiki/pmwiki.php/Main/WellIntentionedExtremist"><span data-dcnode-id="3148" instrument_node="">Well-Intentioned Extremist</span></a><span data-dcnode-id="3146" instrument_node=""> who really did want world peace. After this performance, though, there are no doubts that he is evil through and through.</span></li><li data-dcnode-id="3140"><span data-dcnode-id="3144" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillEmAll" title="/pmwiki/pmwiki.php/Main/KillEmAll"><span data-dcnode-id="3143" instrument_node="">Kill 'Em All</span></a><span data-dcnode-id="3141" instrument_node="">: The character turnover rate is so high that, by them end, only two of the original characters are still alive. One fun thing to do is comparing the Dramatis Personae in front of each book and seeing how many people died in the past volume.</span></li><li data-dcnode-id="3130"><span data-dcnode-id="3139" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillTheGod" title="/pmwiki/pmwiki.php/Main/KillTheGod"><span data-dcnode-id="3138" instrument_node="">Kill the God</span></a><span data-dcnode-id="3136" instrument_node="">: Pretty much the aim and goal of both the battle of Armageddon and the </span><a class="twikilink" data-dcnode-id="3134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBattle" title="/pmwiki/pmwiki.php/Main/FinalBattle"><span data-dcnode-id="3135" instrument_node="">Final Battle</span></a><span data-dcnode-id="3133" instrument_node=""> with Satan and the Other Light army in the book series. </span><a class="twikilink" data-dcnode-id="3131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="3132" instrument_node="">Neither of them turned out as the ones with those goals had hoped.</span></a></li><li data-dcnode-id="3119"><span data-dcnode-id="3129" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillItWithFire" title="/pmwiki/pmwiki.php/Main/KillItWithFire"><span data-dcnode-id="3128" instrument_node="">Kill It with Fire</span></a><span data-dcnode-id="3126" instrument_node="">: Try to harm the Two Witnesses of the Most High, this is the end result.</span><ul data-dcnode-id="3120"><li data-dcnode-id="3121"><span data-dcnode-id="3125" instrument_node=""> The Other Light army at the end of the Millennium in </span><em data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="3122" instrument_node=""> get instantly smoked by God pouring down fire from the heavens.</span></li></ul></li><li data-dcnode-id="3111"><span data-dcnode-id="3118" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KneelBeforeZod" title="/pmwiki/pmwiki.php/Main/KneelBeforeZod"><span data-dcnode-id="3117" instrument_node="">Kneel Before God</span></a><span data-dcnode-id="3115" instrument_node="">: Nicolae Carpathia's humiliated bow before Jesus Christ in </span><em data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="3112" instrument_node="">. Of course, Nicolae is left powerless to resist after Lucifer is cast out of him. Lucifer, on the other hand...</span></li><li data-dcnode-id="3106"><span data-dcnode-id="3110" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KneelBeforeZod" title="/pmwiki/pmwiki.php/Main/KneelBeforeZod"><span data-dcnode-id="3109" instrument_node="">Kneel Before Satan</span></a><span data-dcnode-id="3107" instrument_node="">: In the prequel novels, Satan takes Nicolae to the desert, where he remains for 40 days and 40 nights without food and water. Unlike Jesus, who resisted the temptations (i.e., turning stones into bread, throwing himself from the highest building and bowing down to Lucifer), Carpathia falls to all three temptations.</span></li><li data-dcnode-id="3098"><span data-dcnode-id="3105" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KungFuJesus" title="/pmwiki/pmwiki.php/Main/KungFuJesus"><span data-dcnode-id="3104" instrument_node="">Kung-Fu Jesus</span></a><span data-dcnode-id="3102" instrument_node="">: Jesus Himself. He just speaks </span><a class="twikilink" data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="3101" instrument_node="">The Word</span></a><span data-dcnode-id="3099" instrument_node=""> and people die.</span></li><li data-dcnode-id="3087"><span data-dcnode-id="3097" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaResistance" title="/pmwiki/pmwiki.php/Main/LaResistance"><span data-dcnode-id="3096" instrument_node="">La Résistance</span></a><span data-dcnode-id="3094" instrument_node="">: First the Tribulation Force, then the Other Light in the last book. The Other Light rebels against God because they </span><a class="twikilink" data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodIsEvil" title="/pmwiki/pmwiki.php/Main/GodIsEvil"><span data-dcnode-id="3093" instrument_node="">see Him as evil</span></a><span data-dcnode-id="3091" instrument_node=""> for not letting "naturals" to </span><a class="twikilink" data-dcnode-id="3089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathsHourglass" title="/pmwiki/pmwiki.php/Main/DeathsHourglass"><span data-dcnode-id="3090" instrument_node="">live past 100 years of age</span></a><span data-dcnode-id="3088" instrument_node=""> as unbelievers.</span></li><li data-dcnode-id="3082"><span data-dcnode-id="3086" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LargeAndInCharge" title="/pmwiki/pmwiki.php/Main/LargeAndInCharge"><span data-dcnode-id="3085" instrument_node="">Large and in Charge</span></a><span data-dcnode-id="3083" instrument_node="">: Rayford Steele. Billed at 6'4" in the prequel novels, and goes on to lead the Tribulation Force.</span></li><li data-dcnode-id="3036"><span data-dcnode-id="3081" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LargeHam" title="/pmwiki/pmwiki.php/Main/LargeHam"><span data-dcnode-id="3080" instrument_node="">Large Ham</span></a><span data-dcnode-id="3078" instrument_node="">: Everyone has their moments in the Dramatic Audio, but Nicolae Carpathia (post-indwelling) takes the cake when he executes Walter Moon for failing to get Tsion Ben-Judah off the air in Desecration.</span><div class="indent" data-dcnode-id="3048"><strong data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">Carpathia:</span></strong><span data-dcnode-id="3075" instrument_node=""> </span><strong data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">(BLAM)</span></strong><span data-dcnode-id="3072" instrument_node=""> Hold out your other hand, Walter. </span><strong data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">(BLAM)</span></strong><span data-dcnode-id="3069" instrument_node=""> Ah, the foot. </span><strong data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">(BLAM)</span></strong><span data-dcnode-id="3066" instrument_node=""> The other foot. </span><strong data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">(BLAM)</span></strong><span data-dcnode-id="3063" instrument_node=""> The knee. </span><strong data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">(BLAM)</span></strong><span data-dcnode-id="3060" instrument_node=""> Is Ben-Judah still on the screen? Oh, why, yes he is. </span><strong data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">(BLAM)</span></strong><span data-dcnode-id="3057" instrument_node=""> Still there! </span><strong data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">(BLAM)</span></strong><span data-dcnode-id="3054" instrument_node=""> Oh look Walter, he's still there! </span><strong data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">(BLAM)</span></strong><span data-dcnode-id="3051" instrument_node=""> Walter...you have many times stated your devotion to me. I can only assume that the appearance of Ben-Judah on our network must certainly be causing you as much discomfort as it is to me. Therefore, I want to do you a favor. </span><strong data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">(BLAM)</span></strong></div><ul data-dcnode-id="3042"><li data-dcnode-id="3043"><span data-dcnode-id="3047" instrument_node=""> Honorable mention goes to once again, Carpathia (pre-indwelling) as he </span><a class="twikilink" data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BackFromTheDead" title="/pmwiki/pmwiki.php/Main/BackFromTheDead"><span data-dcnode-id="3046" instrument_node="">resurrects Leon Fortunato</span></a><span data-dcnode-id="3044" instrument_node=""> following the Wrath of the Lamb Earthquake in reference to Jesus raising Lazarus from the dead.</span></li></ul><div class="indent" data-dcnode-id="3037"><span data-dcnode-id="3041" instrument_node=""> </span><strong data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">Carpathia:</span></strong><span data-dcnode-id="3038" instrument_node=""> Leonardo Fortunato...you have served me well. And you will continue to serve and give testimony to the power of Nicolae Carpathia. Leonardo Fortunato, you have served me well, and you will continue to serve me. Leonardo Fortunato, you will sleep NO LONGER! You will...arise! LEONARDO...LEONARDO, COME FORTH! LEONARDO...COME FORTH! LEONARDO...I COMMAND YOU...COME FORTH!</span></div></li><li data-dcnode-id="3014"><span data-dcnode-id="3035" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LargeHamTitle" title="/pmwiki/pmwiki.php/Main/LargeHamTitle"><span data-dcnode-id="3034" instrument_node="">Large Ham Title</span></a><span data-dcnode-id="3032" instrument_node="">: His Excellency, Global Community Supreme Potentate Nicolae Carpathia. What a mouthful.</span><ul data-dcnode-id="3015"><li data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node=""> Supreme Commander, and later, Most High Reverend of Carpathianism, Leonardo Fortunato</span></li><li data-dcnode-id="3025"><span data-dcnode-id="3029" instrument_node=""> Pontifex Maximus Peter Mathews, aka Peter the Second. Counts as a </span><a class="twikilink" data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MeaningfulName" title="/pmwiki/pmwiki.php/Main/MeaningfulName"><span data-dcnode-id="3028" instrument_node="">Meaningful Name</span></a><span data-dcnode-id="3026" instrument_node="">, as no Catholic Pope has taken the name Peter, as according to Catholic belief that Peter was the first pope of the church.</span></li><li data-dcnode-id="3016"><span data-dcnode-id="3024" instrument_node=""> Both Jesus and Satan </span><a class="twikilink" data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IHaveManyNames" title="/pmwiki/pmwiki.php/Main/IHaveManyNames"><span data-dcnode-id="3023" instrument_node="">have some pretty interesting titles.</span></a><ul data-dcnode-id="3017"><li data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node=""> Jesus: Some of which include Lion of the Tribe of Judah, Root of David, Faithful and True, I AM, Wonderful, Counselor, Bright Morning Star</span></li><li data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node=""> Satan: He has less titles than Jesus. His titles are Lucifer, The Devil, God Of This World/Age, Prince Of The Power Of The Air, The Serpent Of Old, The Dragon.</span></li></ul></li></ul></li><li data-dcnode-id="3009"><span data-dcnode-id="3013" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaserGuidedKarma" title="/pmwiki/pmwiki.php/Main/LaserGuidedKarma"><span data-dcnode-id="3012" instrument_node="">Laser-Guided Karma</span></a><span data-dcnode-id="3010" instrument_node="">: An early example occurs in the first book, when Rayford refuses to ride on a bus the airline sent to pick up the pilots from the plane to the terminal, because he couldn't accept such a favor while his passengers have to walk maybe a mile at most. Rayford's co-pilot does accept and very slightly mocks Rayford for refusing. He dies so soon afterwards, Rayford has barely had the time to accept, without question or hesitation, two other privileges the airline gives to pilots: Avoiding the line for the pay-phones, when everyone wants to call their families to see if they didn't vanish, and a helicopter ride home to avoid the total gridlock on the roads that the book describes to such detail.</span></li><li data-dcnode-id="2992"><span data-dcnode-id="3008" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LastVillainStand" title="/pmwiki/pmwiki.php/Main/LastVillainStand"><span data-dcnode-id="3007" instrument_node="">Last Villain Stand</span></a><span data-dcnode-id="3005" instrument_node="">: </span><a class="twikilink" data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheAntichrist" title="/pmwiki/pmwiki.php/Main/TheAntichrist"><span data-dcnode-id="3004" instrument_node="">Carpathia</span></a><span data-dcnode-id="3002" instrument_node="">, </span><a class="twikilink" data-dcnode-id="3000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDragon" title="/pmwiki/pmwiki.php/Main/TheDragon"><span data-dcnode-id="3001" instrument_node="">Fortunato</span></a><span data-dcnode-id="2999" instrument_node="">, and The Unity Army does this in Jerusalem...until </span><a class="twikilink" data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArchangelMichael" title="/pmwiki/pmwiki.php/Main/ArchangelMichael"><span data-dcnode-id="2998" instrument_node="">Michael</span></a><span data-dcnode-id="2996" instrument_node=""> catches up to them. Cue </span><a class="twikilink" data-dcnode-id="2994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OhCrap" title="/pmwiki/pmwiki.php/Main/OhCrap"><span data-dcnode-id="2995" instrument_node="">Oh, Crap!</span></a><span data-dcnode-id="2993" instrument_node=""> from the two bad guys.</span></li><li data-dcnode-id="2975"><span data-dcnode-id="2991" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeftHanging" title="/pmwiki/pmwiki.php/Main/LeftHanging"><span data-dcnode-id="2990" instrument_node="">Left Hanging</span></a><span data-dcnode-id="2988" instrument_node="">: The fates of a dozen or so minor characters from the beginning of the book onward, though considering where those characters were, they could be summarized by the major events that took place. The destruction of New York City, for example, took care of the fates of those who have worked for Global Weekly, with one possible exception, as there was an "Aunt Marge" mentioned at the rewarding of the martyred saints, who may or may not be Marge Potter. The fate of Viv Ivins, a major supporting character in the later books, is not mentioned, though given
