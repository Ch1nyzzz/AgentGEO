bble all of their life immediately on conversion, without ever being told about any of it.</span></li><li data-dcnode-id="6342"><span data-dcnode-id="6346" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MadonnaWhoreComplex" title="/pmwiki/pmwiki.php/Main/MadonnaWhoreComplex"><span data-dcnode-id="6345" instrument_node="">Madonna–Whore Complex</span></a><span data-dcnode-id="6343" instrument_node="">: Rather literally embodied by Irene, Rayford's wife, whom Rayford is considering leaving because of her holier-than-thou personality, and Hattie, his attractive flight attendant, with whom he is considering starting an affair. Later on, it's just a general "If you want to follow God, don't be sexual" implicit message.</span></li><li data-dcnode-id="6313"><span data-dcnode-id="6341" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheMoralSubstitute" title="/pmwiki/pmwiki.php/Main/TheMoralSubstitute"><span data-dcnode-id="6340" instrument_node="">The Moral Substitute</span></a><span data-dcnode-id="6338" instrument_node="">: To other </span><a class="twikilink" data-dcnode-id="6336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AirportFantasy" title="/pmwiki/pmwiki.php/Main/AirportFantasy"><span data-dcnode-id="6337" instrument_node="">Airport Fantasy</span></a><span data-dcnode-id="6335" instrument_node=""> books.</span><ul data-dcnode-id="6314"><li data-dcnode-id="6329"><span data-dcnode-id="6334" instrument_node=""> It has its own moral substitute in the form of </span><em data-dcnode-id="6331"><a class="twikilink" data-dcnode-id="6332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ChristianNation" title="/pmwiki/pmwiki.php/Literature/ChristianNation"><span data-dcnode-id="6333" instrument_node="">Christian Nation</span></a></em><span data-dcnode-id="6330" instrument_node="">, told from an secularist POV and with the roles reversed.</span></li><li data-dcnode-id="6320"><span data-dcnode-id="6328" instrument_node=""> The </span><em data-dcnode-id="6325"><a class="twikilink" data-dcnode-id="6326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/LastDaysTrilogy" title="/pmwiki/pmwiki.php/Literature/LastDaysTrilogy"><span data-dcnode-id="6327" instrument_node="">Last Days Trilogy</span></a></em><span data-dcnode-id="6324" instrument_node=""> tells the same story as </span><em data-dcnode-id="6322"><span data-dcnode-id="6323" instrument_node="">Left Behind</span></em><span data-dcnode-id="6321" instrument_node="">, but preaches a pre-wrath Rapture instead of a pre-Tribulation Rapture.</span></li><li data-dcnode-id="6315"><span data-dcnode-id="6319" instrument_node=""> For those who prefer the preterist interpretation of the Book of Revelation, </span><em data-dcnode-id="6317"><span data-dcnode-id="6318" instrument_node="">The Last Disciple</span></em><span data-dcnode-id="6316" instrument_node=""> series by Hank Hanegraaff and Sigmund Brouwer has you covered, with its story sticking closer to the latter end of the 1st Century AD.</span></li></ul></li><li data-dcnode-id="6301"><span data-dcnode-id="6312" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProtagonistCenteredMorality" title="/pmwiki/pmwiki.php/Main/ProtagonistCenteredMorality"><span data-dcnode-id="6311" instrument_node="">Protagonist-Centered Morality</span></a><span data-dcnode-id="6309" instrument_node="">: In the Left Behind universe, "good" is defined as "consistent with God's will" (or, to put the same thing another way, God's will is by definition always good).</span><ul data-dcnode-id="6302"><li data-dcnode-id="6303"><span data-dcnode-id="6308" instrument_node=""> </span><a class="urllink" data-dcnode-id="6305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.patheos.com/blogs/slacktivist/2010/09/21/tf-loopholes-and-paradoxes/"><span data-dcnode-id="6307" instrument_node="">This blog post</span><img data-dcnode-id="6306" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="6304" instrument_node=""> gives us an idea of how incidental characters might view the main characters.</span></li></ul></li><li data-dcnode-id="6287"><span data-dcnode-id="6300" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PropheciesAreAlwaysRight" title="/pmwiki/pmwiki.php/Main/PropheciesAreAlwaysRight"><span data-dcnode-id="6299" instrument_node="">Prophecies Are Always Right</span></a><span data-dcnode-id="6297" instrument_node="">: Interesting variant: The authors believe the prophecy used in these books is also completely true in the real world. Which makes the characters' praises of how everything in this story is happening exactly as predicted by the prophecy (which is the exact thing the authors believe in and used for writing the story) </span><a class="twikilink" data-dcnode-id="6295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AuthorAppeal" title="/pmwiki/pmwiki.php/Main/AuthorAppeal"><span data-dcnode-id="6296" instrument_node="">all the more smug</span></a><span data-dcnode-id="6294" instrument_node="">.</span><ul data-dcnode-id="6288"><li data-dcnode-id="6289"><span data-dcnode-id="6293" instrument_node=""> Except for when reality intervenes, and the </span><a class="twikilink" data-dcnode-id="6291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MillenniumBug" title="/pmwiki/pmwiki.php/Main/MillenniumBug"><span data-dcnode-id="6292" instrument_node="">Y2K</span></a><span data-dcnode-id="6290" instrument_node=""> bug doesn't cause the Anti-Christ to show up as they predicted.</span></li></ul></li><li data-dcnode-id="6265"><span data-dcnode-id="6286" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReligionIsRight" title="/pmwiki/pmwiki.php/Main/ReligionIsRight"><span data-dcnode-id="6285" instrument_node="">Religion Is Right</span></a><span data-dcnode-id="6283" instrument_node="">:</span><ul data-dcnode-id="6266"><li data-dcnode-id="6275"><span data-dcnode-id="6282" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="6280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnAesop" title="/pmwiki/pmwiki.php/Main/AnAesop"><span data-dcnode-id="6281" instrument_node="">Aesop</span></a><span data-dcnode-id="6279" instrument_node=""> of the series is that if you do not accept Christ as your Lord and Savior, you will be </span><a class="twikilink" data-dcnode-id="6277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TitleDrop" title="/pmwiki/pmwiki.php/Main/TitleDrop"><span data-dcnode-id="6278" instrument_node="">left behind</span></a><span data-dcnode-id="6276" instrument_node=""> to suffer the Tribulation on Earth, followed by an eternity of damnation if you die during the Tribulation without accepting Christ then.</span></li><li data-dcnode-id="6267"><span data-dcnode-id="6274" instrument_node=""> In </span><em data-dcnode-id="6272"><span data-dcnode-id="6273" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="6271" instrument_node="">, it's accept Jesus Christ and you'll get to live past 100 years of age and straight to the end of the Millennium; deny Him </span><a class="twikilink" data-dcnode-id="6269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathsHourglass" title="/pmwiki/pmwiki.php/Main/DeathsHourglass"><span data-dcnode-id="6270" instrument_node="">when you reach 100, and you'll die and go to Hell</span></a><span data-dcnode-id="6268" instrument_node="">.</span></li></ul></li><li data-dcnode-id="6260"><span data-dcnode-id="6264" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Satan" title="/pmwiki/pmwiki.php/Main/Satan"><span data-dcnode-id="6263" instrument_node="">Satan</span></a><span data-dcnode-id="6261" instrument_node="">: In this series, the devil is a bad guy. No doubt about that. But God doesn't come off as much better. It's unintentional.</span></li><li data-dcnode-id="6255"><span data-dcnode-id="6259" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SecondComing" title="/pmwiki/pmwiki.php/Main/SecondComing"><span data-dcnode-id="6258" instrument_node="">Second Coming</span></a><span data-dcnode-id="6256" instrument_node="">: It's all about Jesus' return.</span></li><li data-dcnode-id="6247"><span data-dcnode-id="6254" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeOverTheWorld" title="/pmwiki/pmwiki.php/Main/TakeOverTheWorld"><span data-dcnode-id="6253" instrument_node="">Take Over the World</span></a><span data-dcnode-id="6251" instrument_node="">: Nicolae Carpathia's plan, via the </span><a class="twikilink" data-dcnode-id="6249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneWorldOrder" title="/pmwiki/pmwiki.php/Main/OneWorldOrder"><span data-dcnode-id="6250" instrument_node="">One World Order</span></a><span data-dcnode-id="6248" instrument_node=""> means.</span></li><li data-dcnode-id="6242"><span data-dcnode-id="6246" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TitleDrop" title="/pmwiki/pmwiki.php/Main/TitleDrop"><span data-dcnode-id="6245" instrument_node="">Title Drop</span></a><span data-dcnode-id="6243" instrument_node="">: It's not an uncommon phrase, so the idea of characters being "left behind" verbatim is used pretty liberally throughout all of the books.</span></li><li data-dcnode-id="6231"><span data-dcnode-id="6241" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TwentyMinutesIntoTheFuture" title="/pmwiki/pmwiki.php/Main/TwentyMinutesIntoTheFuture"><span data-dcnode-id="6240" instrument_node="">20 Minutes into the Future</span></a><span data-dcnode-id="6238" instrument_node="">: No specific year is given, emphasizing the "It could happen any minute" message. The first few books are </span><a class="twikilink" data-dcnode-id="6236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Zeerust" title="/pmwiki/pmwiki.php/Main/Zeerust"><span data-dcnode-id="6237" instrument_node="">still dated by the lack of cell phones and widespread internet access</span></a><span data-dcnode-id="6235" instrument_node="">, though, and the last book doesn't fare much better, featuring </span><a class="twikilink" data-dcnode-id="6233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SchizoTech" title="/pmwiki/pmwiki.php/Main/SchizoTech"><span data-dcnode-id="6234" instrument_node="">cell-phone implants and portable fax machines</span></a><span data-dcnode-id="6232" instrument_node="">.</span></li><li data-dcnode-id="6226"><span data-dcnode-id="6230" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnreliableNarrator" title="/pmwiki/pmwiki.php/Main/UnreliableNarrator"><span data-dcnode-id="6229" instrument_node="">Unreliable Narrator</span></a><span data-dcnode-id="6227" instrument_node="">: An unintentional example. Buck and Rayford both boast at great length about how great and beloved they are in their narration, and then act like complete tools to everyone around them. This gets worse after their conversions.</span></li><li data-dcnode-id="6221"><span data-dcnode-id="6225" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheUnseen" title="/pmwiki/pmwiki.php/Main/TheUnseen"><span data-dcnode-id="6224" instrument_node="">The Unseen</span></a><span data-dcnode-id="6222" instrument_node="">: Post-Rapture, no one who got into Heaven, or even Heaven itself, are ever seen or even heard from again. With the story focusing solely on what happens on Earth.</span></li><li data-dcnode-id="6216"><span data-dcnode-id="6220" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorldWarIII" title="/pmwiki/pmwiki.php/Main/WorldWarIII"><span data-dcnode-id="6219" instrument_node="">World War III</span></a><span data-dcnode-id="6217" instrument_node="">: Plays a major part in the series, as it is part of prophecy. New York, Washington, D.C., London and parts of Egypt are destroyed in the process.</span></li><li data-dcnode-id="6188"><span data-dcnode-id="6215" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouCantFightFate" title="/pmwiki/pmwiki.php/Main/YouCantFightFate"><span data-dcnode-id="6214" instrument_node="">You Can't Fight Fate</span></a><span data-dcnode-id="6212" instrument_node="">: </span><a class="twikilink" data-dcnode-id="6210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InvertedTrope" title="/pmwiki/pmwiki.php/Main/InvertedTrope"><span data-dcnode-id="6211" instrument_node="">Inverted</span></a><span data-dcnode-id="6209" instrument_node=""> in that </span><em data-dcnode-id="6207"><span data-dcnode-id="6208" instrument_node="">the bad guys</span></em><span data-dcnode-id="6206" instrument_node=""> are prophesied in the Bible to lose, and that every knee must bow before Jesus and every tongue must declare Him as Lord.</span><ul data-dcnode-id="6189"><li data-dcnode-id="6198"><span data-dcnode-id="6205" instrument_node=""> The Dramatic Audio presentation of </span><em data-dcnode-id="6203"><span data-dcnode-id="6204" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="6202" instrument_node=""> turns the humiliation of the Antichrist, the False Prophet, and their demonic cohorts into a </span><a class="twikilink" data-dcnode-id="6200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KneelBeforeZod" title="/pmwiki/pmwiki.php/Main/KneelBeforeZod"><span data-dcnode-id="6201" instrument_node="">Kneel Before Zod</span></a><span data-dcnode-id="6199" instrument_node=""> moment.</span></li><li data-dcnode-id="6190"><span data-dcnode-id="6197" instrument_node=""> One of the most jarring, unrealistic aspects of the series is how not one person in the world </span><em data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">even tries</span></em><span data-dcnode-id="6194" instrument_node=""> to fight fate. In fact, just the opposite: the protagonists voluntarily go to work for the Antichrist and </span><em data-dcnode-id="6192"><span data-dcnode-id="6193" instrument_node="">help bring about his goals</span></em><span data-dcnode-id="6191" instrument_node=""> because they believe the Antichrist has to win (in the short term) for his prophesied end to occur.</span></li></ul></li></ul><hr data-dcnode-id="6186"><h2 data-dcnode-id="6184"><span data-dcnode-id="6185" instrument_node="">The book series and related Dramatic Audio presentation provides examples of:</span></h2><ul data-dcnode-id="5728"><li data-dcnode-id="6176"><span data-dcnode-id="6183" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbsurdlyBrightLight" title="/pmwiki/pmwiki.php/Main/AbsurdlyBrightLight"><span data-dcnode-id="6182" instrument_node="">Absurdly Bright Light</span></a><span data-dcnode-id="6180" instrument_node="">: Jesus emits a very bright shadowless light upon His arrival from heaven in the book </span><em data-dcnode-id="6178"><span data-dcnode-id="6179" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="6177" instrument_node="">.</span></li><li data-dcnode-id="6168"><span data-dcnode-id="6175" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbsurdlySharpBlade" title="/pmwiki/pmwiki.php/Main/AbsurdlySharpBlade"><span data-dcnode-id="6174" instrument_node="">Absurdly Sharp Blade</span></a><span data-dcnode-id="6172" instrument_node="">: Potentate Carpathia, meet Chaim Rosenzweig's </span><a class="twikilink" data-dcnode-id="6170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SharpenedToASingleAtom" title="/pmwiki/pmwiki.php/Main/SharpenedToASingleAtom"><span data-dcnode-id="6171" instrument_node="">uber-sharp blade</span></a><span data-dcnode-id="6169" instrument_node="">. Unfortunately, Carpathia gets better... and things get a hell of a lot worse from there.</span></li><li data-dcnode-id="6160"><span data-dcnode-id="6167" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AccompliceByInaction" title="/pmwiki/pmwiki.php/Main/AccompliceByInaction"><span data-dcnode-id="6166" instrument_node="">Accomplice by Inaction</span></a><span data-dcnode-id="6164" instrument_node="">: In Jesus' judgment of the "sheep and goats" near the end of </span><em data-dcnode-id="6162"><span data-dcnode-id="6163" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="6161" instrument_node="">, Jesus judges the "goats" (most likely GC and Carpathia loyalists) for doing nothing good for "the least of My brethren" (contextually talking about the people of Israel), saying that what they didn't do for them, they also didn't do for Him. In other words, they're just as guilty as if they were actively coming against the Jews and Christians themselves, and doing that to the Jews means you're also doing that to Christ.</span></li><li data-dcnode-id="6132"><span data-dcnode-id="6159" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlasPoorVillain" title="/pmwiki/pmwiki.php/Main/AlasPoorVillain"><span data-dcnode-id="6158" instrument_node="">Alas, Poor Villain</span></a><span data-dcnode-id="6156" instrument_node="">: Nicolae Carpathia, </span><a class="twikilink" data-dcnode-id="6154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheAntichrist" title="/pmwiki/pmwiki.php/Main/TheAntichrist"><span data-dcnode-id="6155" instrument_node="">of all people</span></a><span data-dcnode-id="6153" instrument_node="">. While his characterization throughout most of the series rarely gets any more sympathetic than </span><a class="twikilink" data-dcnode-id="6151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmugSnake" title="/pmwiki/pmwiki.php/Main/SmugSnake"><span data-dcnode-id="6152" instrument_node="">Smug Snake</span></a><span data-dcnode-id="6150" instrument_node=""> at best, and approaches Complete Monster territory at worst, he </span><a class="twikilink" data-dcnode-id="6148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelRealization" title="/pmwiki/pmwiki.php/Main/HeelRealization"><span data-dcnode-id="6149" instrument_node="">honestly realizes that he was wrong</span></a><span data-dcnode-id="6147" instrument_node=""> at the very end when put on trial before Jesus, and regrets his sins. But at the same time, </span><a class="twikilink" data-dcnode-id="6145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam" title="/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam"><span data-dcnode-id="6146" instrument_node="">by then it's far too late</span></a><span data-dcnode-id="6144" instrument_node=""> for him to be forgiven... and he </span><a class="twikilink" data-dcnode-id="6142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FaceDeathWithDignity" title="/pmwiki/pmwiki.php/Main/FaceDeathWithDignity"><span data-dcnode-id="6143" instrument_node="">accepts this gracefully</span></a><span data-dcnode-id="6141" instrument_node=""> and enters Hell without either begging or kicking and screaming like the other villains, in the knowledge that he </span><a class="twikilink" data-dcnode-id="6139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoPlaceForMeThere" title="/pmwiki/pmwiki.php/Main/NoPlaceForMeThere"><span data-dcnode-id="6140" instrument_node="">deserves it</span></a><span data-dcnode-id="6138" instrument_node="">. He's a tyrant who has caused the deaths of millions of people, but the way he chooses to die (after also seeing everything he ever worked for and believed in not only destroyed, but proved misguided and evil in the first place) can make him come across as at least somewhat of a </span><a class="twikilink" data-dcnode-id="6136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TragicVillain" title="/pmwiki/pmwiki.php/Main/TragicVillain"><span data-dcnode-id="6137" instrument_node="">Tragic Villain</span></a><span data-dcnode-id="6135" instrument_node="">.</span><div class="indent" data-dcnode-id="6133"><span data-dcnode-id="6134" instrument_node="">Nicolae did not protest, did not beg. He merely lowered his head even more and nodded. (...) "I confess that my life was a waste. Worthless. A mistake. I rebelled against the God of the universe, whom I now know loved me."</span></div></li><li data-dcnode-id="6127"><span data-dcnode-id="6131" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlienInvasion" title="/pmwiki/pmwiki.php/Main/AlienInvasion"><span data-dcnode-id="6130" instrument_node="">Alien Invasion</span></a><span data-dcnode-id="6128" instrument_node="">: One of the theories mentioned by one of the characters about the disappearances that took place in the Rapture. It's treated as being just as bonkers (in the eyes of the unsaved) as the Rapture being the cause for the disappearances.</span></li><li data-dcnode-id="6122"><span data-dcnode-id="6126" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlliterativeName" title="/pmwiki/pmwiki.php/Main/AlliterativeName"><span data-dcnode-id="6125" instrument_node="">Alliterative Name</span></a><span data-dcnode-id="6123" instrument_node="">: Mainyu Mazda.</span></li><li data-dcnode-id="6117"><span data-dcnode-id="6121" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllLoveIsUnrequited" title="/pmwiki/pmwiki.php/Main/AllLoveIsUnrequited"><span data-dcnode-id="6120" instrument_node="">All Love Is Unrequited</span></a><span data-dcnode-id="6118" instrument_node="">: Floyd Charles desires Hattie Durham, who instead wants Rayford, who initially considers beginning an affair with her until the Rapture happens and he loses all desire for Hattie. Also Hannah Palemoon pines for David Hassid, who already has a girlfriend.</span></li><li data-dcnode-id="6103"><span data-dcnode-id="6116" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlphabeticalThemeNaming" title="/pmwiki/pmwiki.php/Main/AlphabeticalThemeNaming"><span data-dcnode-id="6115" instrument_node="">Alphabetical Theme Naming</span></a><span data-dcnode-id="6113" instrument_node="">: The three fallen angels are named in alphabetical order: </span><strong data-dcnode-id="6111"><span data-dcnode-id="6112" instrument_node="">A</span></strong><span data-dcnode-id="6110" instrument_node="">shtaroth, </span><strong data-dcnode-id="6108"><span data-dcnode-id="6109" instrument_node="">B</span></strong><span data-dcnode-id="6107" instrument_node="">aal, and </span><strong data-dcnode-id="6105"><span data-dcnode-id="6106" instrument_node="">C</span></strong><span data-dcnode-id="6104" instrument_node="">ankerworm.</span></li><li data-dcnode-id="6098"><span data-dcnode-id="6102" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlphabetNewsNetwork" title="/pmwiki/pmwiki.php/Main/AlphabetNewsNetwork"><span data-dcnode-id="6101" instrument_node="">Alphabet News Network</span></a><span data-dcnode-id="6099" instrument_node="">: Global Community Cable News Network.</span></li><li data-dcnode-id="6091"><span data-dcnode-id="6097" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmbiguouslyGay" title="/pmwiki/pmwiki.php/Main/AmbiguouslyGay"><span data-dcnode-id="6096" instrument_node="">Ambiguously Gay</span></a><span data-dcnode-id="6094" instrument_node="">: Guy Blod's voice sounds stereotypically gay in the Dramatic Audio of </span><em data-dcnode-id="6092"><span data-dcnode-id="6093" instrument_node="">The Indwelling.</span></em></li><li data-dcnode-id="6083"><span data-dcnode-id="6090" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnarchyIsChaos" title="/pmwiki/pmwiki.php/Main/AnarchyIsChaos"><span data-dcnode-id="6089" instrument_node="">Anarchy Is Chaos</span></a><span data-dcnode-id="6087" instrument_node="">: What Tsion Ben-Judah believes is going to happen around the time of the Bowl Judgments in </span><em data-dcnode-id="6085"><span data-dcnode-id="6086" instrument_node="">The Remnant</span></em><span data-dcnode-id="6084" instrument_node=""> when poverty is rampant and law and order have become relics, with common citizens arming themselves for fear of thieves, rapists, and terrorists and no longer having any trust in the Global Community protecting them (even the Peacekeepers have resorted to extortion). The authors also try to portray the world as being chaotic and dangerous in the immediate aftermath of the Rapture, but they don't really succeed.</span></li><li data-dcnode-id="6071"><span data-dcnode-id="6082" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnAssKickingChristmas" title="/pmwiki/pmwiki.php/Main/AnAssKickingChristmas"><span data-dcnode-id="6081" instrument_node="">An Ass-Kicking Christmas</span></a><span data-dcnode-id="6079" instrument_node="">: Tsion Ben-Judah gets to witness </span><a class="urllink" data-dcnode-id="6076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.biblegateway.com/passage/%3Fsearch%3DRevelation%2B12%26version%3DNIV"><span data-dcnode-id="6078" instrument_node="">Revelation chapter 12</span><img data-dcnode-id="6077" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="6075" instrument_node=""> being played out in full detail in the heavens in </span><em data-dcnode-id="6073"><span data-dcnode-id="6074" instrument_node="">The Indwelling</span></em><span data-dcnode-id="6072" instrument_node="">.</span></li><li data-dcnode-id="6066"><span data-dcnode-id="6070" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndKnowingIsHalfTheBattle" title="/pmwiki/pmwiki.php/Main/AndKnowingIsHalfTheBattle"><span data-dcnode-id="6069" instrument_node="">And Knowing Is Half the Battle</span></a><span data-dcnode-id="6067" instrument_node="">: At the end of the first novel, Buck confirms to Bruce, Rayford and Chloe that Nicolae Carpathia is in fact the Antichrist foretold.</span></li><li data-dcnode-id="6046"><span data-dcnode-id="6065" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndThereWasMuchRejoicing" title="/pmwiki/pmwiki.php/Main/AndThereWasMuchRejoicing"><span data-dcnode-id="6064" instrument_node="">And There Was Much Rejoicing</span></a><span data-dcnode-id="6062" instrument_node="">: The Dramatic Audio presentation of </span><em data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="6059" instrument_node=""> has the sound of a crowd cheering wildly as Michael locks Satan away in the bottomless pit for a thousand years. However, Satan does get out in time for the </span><a class="twikilink" data-dcnode-id="6057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBattle" title="/pmwiki/pmwiki.php/Main/FinalBattle"><span data-dcnode-id="6058" instrument_node="">Final Battle</span></a><span data-dcnode-id="6056" instrument_node="">.</span><ul data-dcnode-id="6047"><li data-dcnode-id="6048"><span data-dcnode-id="6055" instrument_node=""> Prior to that, in the middle of the Tribulation, </span><a class="twikilink" data-dcnode-id="6053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AFeteWorseThanDeath" title="/pmwiki/pmwiki.php/Main/AFeteWorseThanDeath"><span data-dcnode-id="6054" instrument_node="">there were 3 1/2 days of rejoicing when the two witnesses were killed by Nicolae at the start of the Global Gala, which abruptly ended when they were resurrected and taken to heaven in a cloud,</span></a><span data-dcnode-id="6052" instrument_node=""> according to </span><a class="twikilink" data-dcnode-id="6050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="6051" instrument_node="">The Word of God</span></a><span data-dcnode-id="6049" instrument_node="">.</span></li></ul></li><li data-dcnode-id="6033"><span data-dcnode-id="6045" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnOfferYouCantRefuse" title="/pmwiki/pmwiki.php/Main/AnOfferYouCantRefuse"><span data-dcnode-id="6044" instrument_node="">An Offer You Can't Refuse</span></a><span data-dcnode-id="6042" instrument_node="">: In the prequel novel </span><em data-dcnode-id="6040"><span data-dcnode-id="6041" instrument_node="">The Rising</span></em><span data-dcnode-id="6039" instrument_node="">, Marilena Carpathia wishes to become a mother. Enter Viviana Ivansova (Viv Ivins), who makes the following proposal to her: join our group and swear loyalty to </span><a class="twikilink" data-dcnode-id="6037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Satan" title="/pmwiki/pmwiki.php/Main/Satan"><span data-dcnode-id="6038" instrument_node="">her lord</span></a><span data-dcnode-id="6036" instrument_node="">, and she will have the baby she so desperately desire. </span><a class="twikilink" data-dcnode-id="6034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheAntiChrist" title="/pmwiki/pmwiki.php/Main/TheAntiChrist"><span data-dcnode-id="6035" instrument_node="">Marilena should have read the fine print about what her son will become in the future.</span></a></li><li data-dcnode-id="6019"><span data-dcnode-id="6032" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AntiClimax" title="/pmwiki/pmwiki.php/Main/AntiClimax"><span data-dcnode-id="6031" instrument_node="">Anti-Climax</span></a><span data-dcnode-id="6029" instrument_node="">: The Other Light battle versus Jesus Christ in </span><em data-dcnode-id="6027"><span data-dcnode-id="6028" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="6026" instrument_node="">. It took less time in that book to be over than the Battle of Armageddon in </span><em data-dcnode-id="6024"><span data-dcnode-id="6025" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="6023" instrument_node="">. Chaim Rosenzweig even </span><a class="twikilink" data-dcnode-id="6021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Lampshades" title="/pmwiki/pmwiki.php/Main/Lampshades"><span data-dcnode-id="6022" instrument_node="">Lampshades</span></a><span data-dcnode-id="6020" instrument_node=""> this fact.</span></li><li data-dcnode-id="6014"><span data-dcnode-id="6018" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArbitrarySkepticism" title="/pmwiki/pmwiki.php/Main/ArbitrarySkepticism"><span data-dcnode-id="6017" instrument_node="">Arbitrary Skepticism</span></a><span data-dcnode-id="6015" instrument_node="">: Surprisingly many character readily agree that the mass disappearances weren't caused by space aliens, and that the mere idea is just absurd.</span></li><li data-dcnode-id="6009"><span data-dcnode-id="6013" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArchangelGabriel" title="/pmwiki/pmwiki.php/Main/ArchangelGabriel"><span data-dcnode-id="6012" instrument_node="">Archangel Gabriel</span></a><span data-dcnode-id="6010" instrument_node="">: Shows up to give Tsion Ben-Judah a few visions, most notably in the seventh book.</span></li><li data-dcnode-id="6004"><span data-dcnode-id="6008" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArcNumber" title="/pmwiki/pmwiki.php/Main/ArcNumber"><span data-dcnode-id="6007" instrument_node="">Arc Number</span></a><span data-dcnode-id="6005" instrument_node="">: Carpathia sure has a thing for 216.</span></li><li data-dcnode-id="5996"><span data-dcnode-id="6003" instrument_node=""> </span><a class="twikilink" data-dcnode-id="6001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnArmAndALeg" title="/pmwiki/pmwiki.php/Main/AnArmAndALeg"><span data-dcnode-id="6002" instrument_node="">An Arm and a Leg</span></a><span data-dcnode-id="6000" instrument_node="">: In </span><em data-dcnode-id="5998"><span data-dcnode-id="5999" instrument_node="">The Kids</span></em><span data-dcnode-id="5997" instrument_node=""> series, Lionel Washington's arm is trapped behind a boulder, forcing him to amputate it.</span></li><li data-dcnode-id="5986"><span data-dcnode-id="5995" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArsonMurderAndJaywalking" title="/pmwiki/pmwiki.php/Main/ArsonMurderAndJaywalking"><span data-dcnode-id="5994" instrument_node="">Arson, Murder, and Jaywalking</span></a><span data-dcnode-id="5992" instrument_node="">:</span><ul data-dcnode-id="5987"><li data-dcnode-id="5990"><span data-dcnode-id="5991" instrument_node=""> After Chloe is captured by the GC, among the things the GCNN report is that she was expelled from her university for making threats against the faculty, aborting two fetuses (with another daughter dying under unknown circumstances), and naming her son Jesus Savior Williams.</span></li><li data-dcnode-id="5988"><span data-dcnode-id="5989" instrument_node=""> Tsion Ben-Judah. Earned the ire of his fellow Israelis by declaring that Jesus is the Messiah, wanted in the murders of his wife and stepchildren, and accused of "fleecing his flock" millions of Nicks.</span></li></ul></li><li data-dcnode-id="5963"><span data-dcnode-id="5985" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AscendToAHigherPlaneOfExistence" title="/pmwiki/pmwiki.php/Main/AscendToAHigherPlaneOfExistence"><span data-dcnode-id="5984" instrument_node="">Ascend to a Higher Plane of Existence</span></a><span data-dcnode-id="5982" instrument_node=""> Applies to anyone </span><a class="twikilink" data-dcnode-id="5980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CaughtUpInTheRapture" title="/pmwiki/pmwiki.php/Main/CaughtUpInTheRapture"><span data-dcnode-id="5981" instrument_node="">who was raptured</span></a><span data-dcnode-id="5979" instrument_node=""> or martyred, as you are given a glorified body. Of course, this means that </span><a class="twikilink" data-dcnode-id="5977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChasteHero" title="/pmwiki/pmwiki.php/Main/ChasteHero"><span data-dcnode-id="5978" instrument_node="">in your glorified state, you cannot fall in love,</span></a><span data-dcnode-id="5976" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImmortalProcreationClause" title="/pmwiki/pmwiki.php/Main/ImmortalProcreationClause"><span data-dcnode-id="5975" instrument_node="">neither sire or have children.</span></a><span data-dcnode-id="5973" instrument_node=""> But for those who have been raptured and been with the Lord during the Tribulation, </span><a class="twikilink" data-dcnode-id="5971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BetterThanSex" title="/pmwiki/pmwiki.php/Main/BetterThanSex"><span data-dcnode-id="5972" instrument_node="">nothing else</span></a><span data-dcnode-id="5970" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LivingForeverIsAwesome" title="/pmwiki/pmwiki.php/Main/LivingForeverIsAwesome"><span data-dcnode-id="5969" instrument_node="">quite compares to it</span></a><span data-dcnode-id="5967" instrument_node="">.</span><ul data-dcnode-id="5964"><li data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node=""> By the end of the Millennium, all naturals who are believers are given glorified bodies.</span></li></ul></li><li data-dcnode-id="5955"><span data-dcnode-id="5962" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AstralProjection" title="/pmwiki/pmwiki.php/Main/AstralProjection"><span data-dcnode-id="5961" instrument_node="">Astral Projection</span></a><span data-dcnode-id="5959" instrument_node="">: In </span><em data-dcnode-id="5957"><span data-dcnode-id="5958" instrument_node="">The Indwelling</span></em><span data-dcnode-id="5956" instrument_node="">, Tsion Ben-Judah experiences something like this (twice) when he finds himself taken up to heaven to witness Revelation chapter 12 taking place — the woman clothed with the sun giving birth to the Child that would rule the earth from God's throne, and Satan and his angels being cast down from heaven.</span></li><li data-dcnode-id="5950"><span data-dcnode-id="5954" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AsLongAsItSoundsForeign" title="/pmwiki/pmwiki.php/Main/AsLongAsItSoundsForeign"><span data-dcnode-id="5953" instrument_node="">As Long as It Sounds Foreign</span></a><span data-dcnode-id="5951" instrument_node="">: The ideas for non-American names leave something to be desired. A Chinese woman named Ming Toy? An Amerindian woman named Hannah Palemoon? (Google "Princess Palemoon" to see the problem...) A Jewish man named Tsion ben-Judah? And of course, "Nicolae Carpathia", which veers into self-parody.</span></li><li data-dcnode-id="5939"><span data-dcnode-id="5949" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AttackAttackRetreatRetreat" title="/pmwiki/pmwiki.php/Main/AttackAttackRetreatRetreat"><span data-dcnode-id="5948" instrument_node="">Attack! Attack... Retreat! Retreat!</span></a><span data-dcnode-id="5946" instrument_node="">: The GC Unity Army has overrun Jerusalem, Buck Williams and Tsion Ben-Judah have been slain in battle, and the Unity Army is poised to overrun Petra in </span><em data-dcnode-id="5944"><span data-dcnode-id="5945" instrument_node="">Armageddon</span></em><span data-dcnode-id="5943" instrument_node="">. Then Jesus arrives. </span><a class="twikilink" data-dcnode-id="5941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="5942" instrument_node="">Curb-Stomp Battle</span></a><span data-dcnode-id="5940" instrument_node=""> ensues.</span></li><li data-dcnode-id="5922"><span data-dcnode-id="5938" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AttemptedRape" title="/pmwiki/pmwiki.php/Main/AttemptedRape"><span data-dcnode-id="5937" instrument_node="">Attempted Rape</span></a><span data-dcnode-id="5935" instrument_node="">: In </span><em data-dcnode-id="5933"><span data-dcnode-id="5934" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="5932" instrument_node=""> with an unbelieving under-100 "natural" (who was part of </span><a class="twikilink" data-dcnode-id="5930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaResistance" title="/pmwiki/pmwiki.php/Main/LaResistance"><span data-dcnode-id="5931" instrument_node="">The Other Light</span></a><span data-dcnode-id="5929" instrument_node="">) and a female "glorified" in the hopes of siring a child that may be able to </span><a class="twikilink" data-dcnode-id="5927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathsHourglass" title="/pmwiki/pmwiki.php/Main/DeathsHourglass"><span data-dcnode-id="5928" instrument_node="">live past 100 years of age without becoming a believer</span></a><span data-dcnode-id="5926" instrument_node="">. God foiled the attempt by having the would-be rapist die in her arms and then incinerated. Given that "glorifieds" are </span><a class="twikilink" data-dcnode-id="5924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImmortalProcreationClause" title="/pmwiki/pmwiki.php/Main/ImmortalProcreationClause"><span data-dcnode-id="5925" instrument_node="">not able to sire or have children</span></a><span data-dcnode-id="5923" instrument_node="">, this would have proved to be pointless.</span></li><li data-dcnode-id="5915"><span data-dcnode-id="5921" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AwesomeMomentOfCrowning" title="/pmwiki/pmwiki.php/Main/AwesomeMomentOfCrowning"><span data-dcnode-id="5920" instrument_node="">Awesome Moment of Crowning</span></a><span data-dcnode-id="5918" instrument_node="">: </span><span class="spoiler" data-dcnode-id="5916" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5917" instrument_node=""> Jesus rewarding the Tribulation Martyrs with a martyr's crown.</span></span></li><li data-dcnode-id="5910"><span data-dcnode-id="5914" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BabiesEverAfter" title="/pmwiki/pmwiki.php/Main/BabiesEverAfter"><span data-dcnode-id="5913" instrument_node="">Babies Ever After</span></a><span data-dcnode-id="5911" instrument_node="">: Kenny Williams and Ekaterina Risto become a baby-producing couple for the rest of the Millennium.</span></li><li data-dcnode-id="5895"><span data-dcnode-id="5909" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BackFromTheDead" title="/pmwiki/pmwiki.php/Main/BackFromTheDead"><span data-dcnode-id="5908" instrument_node="">Back from the Dead</span></a><span data-dcnode-id="5906" instrument_node="">: The resurrection of the dead for the final judgment.</span><ul data-dcnode-id="5896"><li data-dcnode-id="5897"><span data-dcnode-id="5905" instrument_node=""> Carpathia resurrecting Fortunato (with a blasphemous biblical allusion to boot), Eli and Moishe being resurrected by God, and Carpathia resurrecting himself (actually being indwelt by Satan).</span><div class="indent" data-dcnode-id="5898"><span data-dcnode-id="5904" instrument_node=""> </span><strong data-dcnode-id="5902"><span data-dcnode-id="5903" instrument_node="">Carpathia</span></strong><span data-dcnode-id="5901" instrument_node="">: FORTUNATO, </span><strong data-dcnode-id="5899"><span data-dcnode-id="5900" instrument_node="">COME FORTH!</span></strong></div></li></ul></li><li data-dcnode-id="5887"><span data-dcnode-id="5894" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassArmy" title="/pmwiki/pmwiki.php/Main/BadassArmy"><span data-dcnode-id="5893" instrument_node="">Badass Army</span></a><span data-dcnode-id="5891" instrument_node="">: The 200 million horsemen sent to slay those that do not have the Seal of God on their foreheads. Not just badass, but also downright scary as far as their appearance, and </span><a class="twikilink" data-dcnode-id="5889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InvisibleToNormals" title="/pmwiki/pmwiki.php/Main/InvisibleToNormals"><span data-dcnode-id="5890" instrument_node="">invisible to everyone but believers in Christ</span></a><span data-dcnode-id="5888" instrument_node="">.</span></li><li data-dcnode-id="5882"><span data-dcnode-id="5886" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassBookworm" title="/pmwiki/pmwiki.php/Main/BadassBookworm"><span data-dcnode-id="5885" instrument_node="">Badass Bookworm</span></a><span data-dcnode-id="5883" instrument_node="">: By the end of the series, Abdullah Smith is quite the bookworm indeed. Ken Ritz is also one.</span></li><li data-dcnode-id="5877"><span data-dcnode-id="5881" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassFamily" title="/pmwiki/pmwiki.php/Main/BadassFamily"><span data-dcnode-id="5880" instrument_node="">Badass Family</span></a><span data-dcnode-id="5878" instrument_node="">: The Steeles as the Tribulation goes on, and by extension, Cameron Williams.</span></li><li data-dcnode-id="5858"><span data-dcnode-id="5876" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassIsraeli" title="/pmwiki/pmwiki.php/Main/BadassIsraeli"><span data-dcnode-id="5875" instrument_node="">Badass Israeli</span></a><span data-dcnode-id="5873" instrument_node="">:</span><ul data-dcnode-id="5859"><li data-dcnode-id="5871"><span data-dcnode-id="5872" instrument_node=""> Tsion Ben-Judah, an old religious scholar who might not be an action hero but is certainly brave nonetheless, even standing up to the Antichrist himself;</span></li><li data-dcnode-id="5869"><span data-dcnode-id="5870" instrument_node=""> David Hassid, a hacker who becomes a key member of the Tribulation Force and saves the heroes several times through his cool thinking;</span></li><li data-dcnode-id="5860"><span data-dcnode-id="5868" instrument_node=""> Chaim Rosenzweig, </span><a class="twikilink" data-dcnode-id="5866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheProfessor" title="/pmwiki/pmwiki.php/Main/TheProfessor"><span data-dcnode-id="5867" instrument_node="">The Professor</span></a><span data-dcnode-id="5865" instrument_node=""> who makes the desert bloom and </span><span class="spoiler" data-dcnode-id="5862" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="5863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassBookworm" title="/pmwiki/pmwiki.php/Main/BadassBookworm"><span data-dcnode-id="5864" instrument_node="">assassinates the Antichrist with a home made sword</span></a></span><span data-dcnode-id="5861" instrument_node="">.</span></li></ul></li><li data-dcnode-id="5847"><span data-dcnode-id="5857" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassPreacher" title="/pmwiki/pmwiki.php/Main/BadassPreacher"><span data-dcnode-id="5856" instrument_node="">Badass Preacher</span></a><span data-dcnode-id="5854" instrument_node="">: Tsion Ben-Judah in </span><em data-dcnode-id="5852"><span data-dcnode-id="5853" instrument_node="">Armageddon</span></em><span data-dcnode-id="5851" instrument_node=""> when he decides to help defend Jerusalem and preach to the Jews about Jesus Christ during the Battle of Armageddon</span><ul data-dcnode-id="5848"><li data-dcnode-id="5849"><span data-dcnode-id="5850" instrument_node=""> Eli and Moishe also qualify.</span></li></ul></li><li data-dcnode-id="5837"><span data-dcnode-id="5846" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadBoss" title="/pmwiki/pmwiki.php/Main/BadBoss"><span data-dcnode-id="5845" instrument_node="">Bad Boss</span></a><span data-dcnode-id="5843" instrument_node="">: The climax of the first book centers around </span><span class="spoiler" data-dcnode-id="5841" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5842" instrument_node="">Nicolae shooting two of his financiers for the sole purpose of demonstrating his "power." He then brainwashes everyone in the room into forgetting what they just saw.</span></span><span data-dcnode-id="5840" instrument_node=""> </span><span class="spoiler" data-dcnode-id="5838" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="5839" instrument_node="">He has a legitimate motive (though it seems secondary at the time) in removing them from the picture, and as it is revealed in the next book, taking over their assets. However, the "power" display itself that he touts so much is still mystifying.</span></span></li><li data-dcnode-id="5826"><span data-dcnode-id="5836" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeatStillMyHeart" title="/pmwiki/pmwiki.php/Main/BeatStillMyHeart"><span data-dcnode-id="5835" instrument_node="">Beat Still, My Heart</span></a><span data-dcnode-id="5833" instrument_node="">: In the Dramatic Audio version of the book </span><em data-dcnode-id="5831"><span data-dcnode-id="5832" instrument_node="">Armageddon</span></em><span data-dcnode-id="5830" instrument_node="">, Nicolae Carpathia holds the still-beating heart of a Global Community loyalist that he personally murdered for </span><a class="twikilink" data-dcnode-id="5828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DidYouJustFlipOffCthulhu" title="/pmwiki/pmwiki.php/Main/DidYouJustFlipOffCthulhu"><span data-dcnode-id="5829" instrument_node="">calling him "impotent"</span></a><span data-dcnode-id="5827" instrument_node="">.</span></li><li data-dcnode-id="5812"><span data-dcnode-id="5825" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeatThemAtTheirOwnGame" title="/pmwiki/pmwiki.php/Main/BeatThemAtTheirOwnGame"><span data-dcnode-id="5824" instrument_node="">Beat Them at Their Own Game</span></a><span data-dcnode-id="5822" instrument_node="">: Kenny Williams in </span><em data-dcnode-id="5820"><span data-dcnode-id="5821" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="5819" instrument_node=""> suggests this as a recruiting tactic for The Other Light that they should use against those who are evangelizing for the cause of Christ — that they should become upstanding citizens who simply don't agree with what the other side believes rather than try using drugs and wild parties. Of course, Kenny is also fully aware that </span><a class="twikilink" data-dcnode-id="5817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo" title="/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo"><span data-dcnode-id="5818" instrument_node="">The Other Light is destined to lose</span></a><span data-dcnode-id="5816" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouCantFightFate" title="/pmwiki/pmwiki.php/Main/YouCantFightFate"><span data-dcnode-id="5815" instrument_node="">regardless of what they do</span></a><span data-dcnode-id="5813" instrument_node="">.</span></li><li data-dcnode-id="5784"><span data-dcnode-id="5811" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeautyIsBad" title="/pmwiki/pmwiki.php/Main/BeautyIsBad"><span data-dcnode-id="5810" instrument_node="">Beauty Is Bad</span></a><span data-dcnode-id="5808" instrument_node="">: Although not invariably true (at least some of the lesser bad guys are more or less explicitly unattractive), this is played completely straight with the main villains.</span><ul data-dcnode-id="5785"><li data-dcnode-id="5803"><span data-dcnode-id="5807" instrument_node=""> Nicolae Carpathia is invariably seen as extremely attractive and handsome, whether by people who hate him or worship him. Which makes sense, given that he was </span><a class="twikilink" data-dcnode-id="5805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DesignerBabies" title="/pmwiki/pmwiki.php/Main/DesignerBabies"><span data-dcnode-id="5806" instrument_node="">genetically engineered</span></a><span data-dcnode-id="5804" instrument_node=""> by the Luciferian conspiracy to be a sort of minor superman.</span></li><li data-dcnode-id="5786"><span data-dcnode-id="5802" instrument_node=""> In the case of Lucifer-Satan, rather than the </span><a class="twikilink" data-dcnode-id="5800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigRedDevil" title="/pmwiki/pmwiki.php/Main/BigRedDevil"><span data-dcnode-id="5801" instrument_node="">Big Red Devil</span></a><span data-dcnode-id="5799" instrument_node=""> stereotype, </span><em data-dcnode-id="5797"><span data-dcnode-id="5798" instrument_node="">Left Behind</span></em><span data-dcnode-id="5796" instrument_node=""> goes with </span><a class="twikilink" data-dcnode-id="5794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShownTheirWork" title="/pmwiki/pmwiki.php/Main/ShownTheirWork"><span data-dcnode-id="5795" instrument_node="">what the Bible actually says</span></a><span data-dcnode-id="5793" instrument_node="">, and describes him as </span><a class="twikilink" data-dcnode-id="5791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AngelicBeauty" title="/pmwiki/pmwiki.php/Main/AngelicBeauty"><span data-dcnode-id="5792" instrument_node="">a wonderful angel of light</span></a><span data-dcnode-id="5790" instrument_node="">. His appearance is so awe-inspiringly beautiful that even the devout old Bible scholar </span><a class="twikilink" data-dcnode-id="5788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IncorruptiblePurePureness" title="/pmwiki/pmwiki.php/Main/IncorruptiblePurePureness"><span data-dcnode-id="5789" instrument_node="">Tsion Ben-Judah</span></a><span data-dcnode-id="5787" instrument_node=""> immediately wants to worship him when he sees him in a vision, and has to be brought back to his senses by a good angel.</span></li></ul></li><li data-dcnode-id="5776"><span data-dcnode-id="5783" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeingEvilSucks" title="/pmwiki/pmwiki.php/Main/BeingEvilSucks"><span data-dcnode-id="5782" instrument_node="">Being Evil Sucks</span></a><span data-dcnode-id="5780" instrument_node="">: You're pretty much boned if </span><a class="twikilink" data-dcnode-id="5778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam" title="/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam"><span data-dcnode-id="5779" instrument_node="">you take the mark of loyalty and worship the image of the Antichrist.</span></a><span data-dcnode-id="5777" instrument_node=""> Not to mention that you will be subject to God's retribution in the form of his bowl judgments.</span></li><li data-dcnode-id="5754"><span data-dcnode-id="5775" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BerserkButton" title="/pmwiki/pmwiki.php/Main/BerserkButton"><span data-dcnode-id="5774" instrument_node="">Berserk Button</span></a><span data-dcnode-id="5772" instrument_node="">: It runs in the family in regards to Marilena Carpathia and her son.</span><ul data-dcnode-id="5755"><li data-dcnode-id="5767"><span data-dcnode-id="5771" instrument_node=""> In The Rising, Marilena does not take it well that her son calls her a </span><em data-dcnode-id="5769"><span data-dcnode-id="5770" instrument_node="">catea,</span></em><span data-dcnode-id="5768" instrument_node=""> which means "bitch" in Hungarian.</span></li><li data-dcnode-id="5756"><span data-dcnode-id="5766" instrument_node=""> Call Nicolae "impotent" at your own risk. Depending on whether you're reading the books or listening to the Dramatic Audio, you may end up with </span><a class="twikilink" data-dcnode-id="5764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeckSnap" title="/pmwiki/pmwiki.php/Main/NeckSnap"><span data-dcnode-id="5765" instrument_node="">a broken neck</span></a><span data-dcnode-id="5763" instrument_node=""> or </span><a class="twikilink" data-dcnode-id="5761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeatStillMyHeart" title="/pmwiki/pmwiki.php/Main/BeatStillMyHeart"><span data-dcnode-id="5762" instrument_node="">your heart ripped out of your chest</span></a><span data-dcnode-id="5760" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/IndianaJonesAndTheTempleOfDoom" title="/pmwiki/pmwiki.php/Film/IndianaJonesAndTheTempleOfDoom"><span data-dcnode-id="5759" instrument_node="">Mola Ram-style</span></a><span data-dcnode-id="5757" instrument_node="">.</span></li></ul></li><li data-dcnode-id="5740"><span data-dcnode-id="5753" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigApplesauce" title="/pmwiki/pmwiki.php/Main/BigApplesauce"><span data-dcnode-id="5752" instrument_node="">Big Applesauce</span></a><span data-dcnode-id="5750" instrument_node="">: Since the Antichrist's plan so heavily involves the UN, New York is a major setting, which is made all the more jarring given the </span><a class="twikilink" data-dcnode-id="5748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtisticLicenseGeography" title="/pmwiki/pmwiki.php/Main/ArtisticLicenseGeography"><span data-dcnode-id="5749" instrument_node="">glaring errors</span></a><span data-dcnode-id="5747" instrument_node=""> that crop up in the books regarding the city's physical layout. In the first book, Buck (who is described as being "in great shape"), has to walk a bit through Manhattan. The journey is described like the Bataan Death March, when in reality it's less than two miles.</span><ul data-dcnode-id="5741"><li data-dcnode-id="5742"><span data-dcnode-id="5746" instrument_node=""> He walks until he's ready to collapse from exhaustion and then he finds an abandoned bike and considers it a sign from God. In </span><em data-dcnode-id="5744"><span data-dcnode-id="5745" instrument_node="">less than two miles</span></em><span data-dcnode-id="5743" instrument_node="">.</span></li></ul></li><li data-dcnode-id="5729"><span data-dcnode-id="5739" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBlackout" title="/pmwiki/pmwiki.php/Main/BigBlackout"><span data-dcnode-id="5738" instrument_node="">Big Blackout</span></a><span data-dcnode-id="5736" instrument_node="">: A supernatural version, as one of God's Bowl Judgments causes New Babylon to be so dark that, even though they still have power, none of Nicolae Carpathia's loyalists can see any form of light save for </span><a class="twikilink" data-dcnode-id="5734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PowerGlows" title="/pmwiki/pmwiki.php/Main/PowerGlows"><span data-dcnode-id="5735" instrument_node="">Nicolae's faint aura</span></a><span data-dcnode-id="5733" instrument_node="">. The believers in Christ, on the other hand, can still see with the illumination level of a low-powered chandelier. The blackout lasts for a whole year until an angel of the Lord illuminates the city long enough to warn God's people to get out of New Babylon before </span><a class="twikilink" data-dcnode-id="5731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoomedHometown" title="/pmwiki/pmwiki.php/Main/DoomedHometown"><span data-dcnode-id="5732" instrument_node="">it is destroyed</span></a><span data-dcnode-id="5730" instrument_node="">. Even worse for Carpathia's loyalists is that, during the blackout, they also suffer pains and sores for which there is no relief.</span></li></ul><ul data-dcnode-id="5683"><li data-dcnode-id="5684"><span data-dcnode-id="5723" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigShutUp" title="/pmwiki/pmwiki.php/Main/BigShutUp"><span data-dcnode-id="5722" instrument_node="">Big "SHUT UP!"</span></a><span data-dcnode-id="5720" instrument_node="">: Attempted and failed with Nicolae Carpathia in the Dramatic Audio version of </span><em data-dcnode-id="5718"><span data-dcnode-id="5719" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="5717" instrument_node=""> when Jesus just goes on and on speaking </span><a class="twikilink" data-dcnode-id="5715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="5716" instrument_node="">The Word Of God</span></a><span data-dcnode-id="5714" instrument_node=""> while the </span><a class="twikilink" data-dcnode-id="5712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordsCanBreakMyBones" title="/pmwiki/pmwiki.php/Main/WordsCanBreakMyBones"><span data-dcnode-id="5713" instrument_node="">Unity Army troops die</span></a><span data-dcnode-id="5711" instrument_node="">.</span><div class="indent" data-dcnode-id="5706"><span data-dcnode-id="5710" instrument_node=""> </span><strong data-dcnode-id="5708"><span data-dcnode-id="5709" instrument_node="">Nicolae Carpathia:</span></strong><span data-dcnode-id="5707" instrument_node=""> And someone SHUT HIM UP!!!</span></div><ul data-dcnode-id="5685"><li data-dcnode-id="5686"><span data-dcnode-id="5705" instrument_node=""> Gabriel, on the other hand, is more successful in his attempt, as he does this to Carpathia himself when he and Fortunato are brought before Jesus.</span><div class="indent" data-dcnode-id="5700"><span data-dcnode-id="5704" instrument_node=""> </span><strong data-dcnode-id="5702"><span data-dcnode-id="5703" instrument_node="">Gabriel:</span></strong><span data-dcnode-id="5701" instrument_node=""> My King, I accuse in your presence, those who have worked against your love and grace. Those who have established themselves from old as your enemies! Those who have sought to defile your created ones!</span></div><div class="indent" data-dcnode-id="5692"><span data-dcnode-id="5699" instrument_node=""> </span><strong data-dcnode-id="5697"><span data-dcnode-id="5698" instrument_node="">Carpathia:</span></strong><span data-dcnode-id="5696" instrument_node=""> They are </span><em data-dcnode-id="5694"><span data-dcnode-id="5695" instrument_node="">my</span></em><span data-dcnode-id="5693" instrument_node=""> created ones!</span></div><div class="indent" data-dcnode-id="5687"><span data-dcnode-id="5691" instrument_node=""> </span><strong data-dcnode-id="5689"><span data-dcnode-id="5690" instrument_node="">Gabriel:</span></strong><span data-dcnode-id="5688" instrument_node=""> SILENCE! (Carpathia shuts up) Your time has not yet come!</span></div></li></ul></li></ul><ul data-dcnode-id="5673"><li data-dcnode-id="5674"><span data-dcnode-id="5681" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BilingualDialogue" title="/pmwiki/pmwiki.php/Main/BilingualDialogue"><span data-dcnode-id="5680" instrument_node="">Bilingual Dialogue</span></a><span data-dcnode-id="5678" instrument_node="">: While Buck is at the Wailing Wall for the first time with Tsion watching Eli and Moishe preach, Buck and Tsion hear them in their respective languages. Buck later confirms this with Tsion after asking around the crowd. One man says that they are speaking Spanish, while another says they are speaking German, and a third person hears them in Dutch.</span><ul data-dcnode-id="5675"><li data-dcnode-id="5676"><span data-dcnode-id="5677" instrument_node=""> Played straight with Jesus Himself, as the believers hear him speak to them in their own languages; Rayford, in English, Chaim in Hebrew, Chang Wong in Mandarin Chinese, Abdullah in Arabic with Mac jokingly saying that Jesus "worked a bit of West Texan...the language of Heaven."</span></li></ul></li></ul><ul data-dcnode-id="5611"><li data-dcnode-id="5664"><span data-dcnode-id="5671" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Blackface" title="/pmwiki/pmwiki.php/Main/Blackface"><span data-dcnode-id="5670" instrument_node="">Blackface</span></a><span data-dcnode-id="5668" instrument_node="">: In </span><em data-dcnode-id="5666"><span data-dcnode-id="5667" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="5665" instrument_node="">, Mac McCullum had his skin tinted dark to disguise himself as a Global Community officer of a different race so that he could go into Jerusalem to find Buck Williams. At that point, nobody on either side of the conflict either notices this or even cares to be offended by it.</span></li><li data-dcnode-id="5659"><span data-dcnode-id="5663" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlackMarket" title="/pmwiki/pmwiki.php/Main/BlackMarket"><span data-dcnode-id="5662" instrument_node="">Black Market</span></a><span data-dcnode-id="5660" instrument_node="">: Inverted with the International Commodity Co-Op, which caters to underground Christians, helping them survive the final years of the Tribulation.</span></li><li data-dcnode-id="5649"><span data-dcnode-id="5658" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlasphemousBoast" title="/pmwiki/pmwiki.php/Main/BlasphemousBoast"><span data-dcnode-id="5657" instrument_node="">Blasphemous Boast</span></a><span data-dcnode-id="5655" instrument_node="">: Nicolae Carpathia in the Dramatic Audio version of </span><em data-dcnode-id="5653"><span data-dcnode-id="5654" instrument_node="">Armageddon</span></em><span data-dcnode-id="5652" instrument_node="">, right after confessing that he is the Antichrist.</span><div class="indent" data-dcnode-id="5650"><span data-dcnode-id="5651" instrument_node="">"I will ascend into heaven! I will exalt my throne above the stars of God! I will ascend above the heights of the clouds! I will be like the Most High...for I AM THE MOST HIGH!"</span></div></li><li data-dcnode-id="5644"><span data-dcnode-id="5648" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlasphemousPraise" title="/pmwiki/pmwiki.php/Main/BlasphemousPraise"><span data-dcnode-id="5647" instrument_node="">Blasphemous Praise</span></a><span data-dcnode-id="5645" instrument_node="">: The worship Nicolae Carpathia demands and gets from the people during the latter half of the Tribulation, with Leon Fortunato as the High Reverend Father of Carpathianism proclaiming him as "our lord and risen king".</span></li><li data-dcnode-id="5634"><span data-dcnode-id="5643" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BloodIsSquickerInWater" title="/pmwiki/pmwiki.php/Main/BloodIsSquickerInWater"><span data-dcnode-id="5642" instrument_node="">Blood Is Squicker in Water</span></a><span data-dcnode-id="5640" instrument_node="">: In the book series, the seas and springs of water turn to blood due to God's judgments. However, during the Bowl Judgments, believers in Christ are miraculously able to get fresh water from the bloody springs.</span><ul data-dcnode-id="5635"><li data-dcnode-id="5638"><span data-dcnode-id="5639" instrument_node=""> Earlier, the Two Witnesses are able to turn water to blood and vice versa, which squicks Carpathia out during his failed speech at Teddy Kollek Stadium when his mouth starts to run dry and he asks for water.</span></li><li data-dcnode-id="5636"><span data-dcnode-id="5637" instrument_node=""> Chaim Rosenzweig as Micah the prophet is also given this ability.</span></li></ul></li><li data-dcnode-id="5626"><span data-dcnode-id="5633" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BondingOverMissingParents" title="/pmwiki/pmwiki.php/Main/BondingOverMissingParents"><span data-dcnode-id="5632" instrument_node="">Bonding over Missing Parents</span></a><span data-dcnode-id="5630" instrument_node="">: The lead characters of </span><em data-dcnode-id="5628"><span data-dcnode-id="5629" instrument_node="">Left Behind: The Kids</span></em><span data-dcnode-id="5627" instrument_node=""> bond together when their parents were either raptured or killed, with Judd Thompson Jr. and Vicki Byrnes becoming a married couple before the Tribulation ends.</span></li><li data-dcnode-id="5612"><span data-dcnode-id="5625" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BookBurning" title="/pmwiki/pmwiki.php/Main/BookBurning"><span data-dcnode-id="5624" instrument_node="">Book Burning</span></a><span data-dcnode-id="5622" instrument_node="">: Or rather, Bible burning, as the furnace inside the giant Carpathia statue constructed in New Babylon is fueled by onionskin paper found in Bibles. Otherwise, the Antichrist doesn't seem to be doing much to keep people from reading God's Word.</span><ul data-dcnode-id="5613"><li data-dcnode-id="5614"><span data-dcnode-id="5621" instrument_node=""> In </span><em data-dcnode-id="5619"><span data-dcnode-id="5620" instrument_node="">Left Behind: World At War</span></em><span data-dcnode-id="5618" instrument_node="">, Nicolae actually </span><em data-dcnode-id="5616"><span data-dcnode-id="5617" instrument_node="">wants</span></em><span data-dcnode-id="5615" instrument_node=""> people to read the Word Of God...with shipments of Bibles tainted with anthrax!</span></li></ul></li></ul><ul data-dcnode-id="5505"><li data-dcnode-id="5601"><span data-dcnode-id="5608" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Brainwashed" title="/pmwiki/pmwiki.php/Main/Brainwashed"><span data-dcnode-id="5607" instrument_node="">Brainwashed</span></a><span data-dcnode-id="5605" instrument_node="">: Carpathia's preferred method of gaining allies and resources, via his </span><a class="twikilink" data-dcnode-id="5603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CompellingVoice" title="/pmwiki/pmwiki.php/Main/CompellingVoice"><span data-dcnode-id="5604" instrument_node="">Compelling Voice</span></a><span data-dcnode-id="5602" instrument_node="">. Can make people think they saw soemthing different than what actually happened, among other things.</span></li><li data-dcnode-id="5585"><span data-dcnode-id="5600" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BriarPatching" title="/pmwiki/pmwiki.php/Main/BriarPatching"><span data-dcnode-id="5599" instrument_node="">Briar Patching</span></a><span data-dcnode-id="5597" instrument_node="">: Rayford pulls this off with the Potentate at the end of </span><em data-dcnode-id="5595"><span data-dcnode-id="5596" instrument_node="">Nicolae</span></em><span data-dcnode-id="5594" instrument_node="">. Carpathia knows that Rayford is a believer and wishes to be at the meeting of the 144,000 at Teddy Kollek Stadium. But Rayford convinces him that showing up would be to his advantage.</span><div class="indent" data-dcnode-id="5590"><strong data-dcnode-id="5592"><span data-dcnode-id="5593" instrument_node="">Rayford:</span></strong><span data-dcnode-id="5591" instrument_node=""> The enemy has been known to imitate miracles. Imagine the audience in Israel if you were to do something like that. Here are people of faith coming together for inspiration. If you are God, if y
