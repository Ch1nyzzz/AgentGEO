rument_node=""> Chang Wong, computer nerd recruited by the bad guys (but used as the good guys' mole) before he is even done with high school.</span></li><li data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node=""> Naomi Tiberias, Chang's romantic interest is also a whiz in her own right, as she runs the Petra tech center.</span></li></ul></li><li data-dcnode-id="1506"><span data-dcnode-id="1516" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TextualCelebrityResemblance" title="/pmwiki/pmwiki.php/Main/TextualCelebrityResemblance"><span data-dcnode-id="1515" instrument_node="">Textual Celebrity Resemblance</span></a><span data-dcnode-id="1513" instrument_node="">: In the original text, Carpathia looks like a young </span><a class="twikilink" data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/RobertRedford" title="/pmwiki/pmwiki.php/Creator/RobertRedford"><span data-dcnode-id="1512" instrument_node="">Robert Redford</span></a><span data-dcnode-id="1510" instrument_node="">. The update says that he looks like a young </span><a class="twikilink" data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/BradPitt" title="/pmwiki/pmwiki.php/Creator/BradPitt"><span data-dcnode-id="1509" instrument_node="">Brad Pitt</span></a><span data-dcnode-id="1507" instrument_node="">.</span></li><li data-dcnode-id="1498"><span data-dcnode-id="1505" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheTheocracy" title="/pmwiki/pmwiki.php/Main/TheTheocracy"><span data-dcnode-id="1504" instrument_node="">The Theocracy</span></a><span data-dcnode-id="1502" instrument_node="">: The Millennial Kingdom government, which consists of God as ultimate ruler, Jesus as the ruler of the world, King David as the ruler of Israel, and the apostles as the rulers of the twelve tribes of Israel. It's surprisingly the most benevolent theocracy that existed, as God and Jesus Christ did not forbid freedom of speech or freedom of religion, allowing those who would not become believers in Christ to live either as unbelievers or as members of the Other Light </span><a class="twikilink" data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathsHourglass" title="/pmwiki/pmwiki.php/Main/DeathsHourglass"><span data-dcnode-id="1501" instrument_node="">for only 100 years before they die and are sent to Hell</span></a><span data-dcnode-id="1499" instrument_node="">.</span></li><li data-dcnode-id="1467"><span data-dcnode-id="1497" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThereAreNoGlobalConsequences" title="/pmwiki/pmwiki.php/Main/ThereAreNoGlobalConsequences"><span data-dcnode-id="1496" instrument_node="">There Are No Global Consequences</span></a><span data-dcnode-id="1494" instrument_node="">: God miraculously destroying Russia's military and vacuuming up 20% of the global population has absolutely NO effect on day-to-day life after the first few hours of panic.</span><ul data-dcnode-id="1468"><li data-dcnode-id="1483"><span data-dcnode-id="1493" instrument_node=""> That's nothing. In the last couple of books, you get two or three huge asteroids hitting the Earth, the oceans turning to blood, and the sun suddenly blasting out tremendous waves of heat and light powerful enough to reduce metal buildings to slag (the Global Community Palace is reduced to a metal shell when this happens). The only people that survived are the True Believers and Nicolae (who is immune), and people who managed to get to a shelter within the first few minutes. Every forest on Earth should have been ablaze, virtually all animal life that was exposed to the sun during that period should have been fried (we see one unfortunate dog that didn't get to shade in time die horribly, so we know that animals aren't immune), and virtually all of humanity would have been doomed. The oceans (which were turned into blood previously; killing </span><em data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">everything</span></em><span data-dcnode-id="1490" instrument_node=""> in them, including the plankton that </span><em data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">all</span></em><span data-dcnode-id="1487" instrument_node=""> life on Earth depends) would boil and evaporate, leading to massive hurricanes striking everywhere. The atmosphere would be rendered unbreathable. Asphalt roads would liquefy. Rock might turn to lava. The list goes on and on. And yet a few months after that blazing solar storm, which came after the seas of blood, global earthquakes, and the asteroids, Carpathia still has enough infrastructure (all the world's cities are still standing after that because we hear them all report about New Babylon) to create the biggest army the world has ever seen, </span><em data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">and</span></em><span data-dcnode-id="1484" instrument_node=""> equip each every one with a horse to ride on. Maybe there would have been enough people left over, but I doubt anyone thought to save that many horses when they were fleeing for cover. After that one event, that should have been no need for Jesus to come back to slay the remaining unbelievers at Armageddon. Every single one of them would have been dead or dying.</span></li><li data-dcnode-id="1469"><span data-dcnode-id="1482" instrument_node=""> Interestingly, this is both averted </span><em data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">and</span></em><span data-dcnode-id="1479" instrument_node=""> exaggerated in the same series. The books seem to claim that only a tiny fraction of adults have the necessary beliefs to be raptured, but then exaggerates the consequences as if they represented a huge chunk of society. Entire parking garages full of abandoned cars, planes falling out of the sky (the entire crew was evangelical?), and most amusingly, a completely abandoned row of cabs at O'Hare airport. Of all the stereotypes they hit in this book, the foreign Sikh/Hindu/Muslim cabbie is the one they avoid.</span><ul data-dcnode-id="1470"><li data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node=""> The sheer number of plane crashes that blocked runways is especially odd. Rayford's flight to London is diverted to Chicago, despite the fact there are crashed airliners (plural) on that airport's runways. That a large number of flights are still diverted to this airport suggest all other airports are worse. It's as if every PMD-Christian pilot was trying to land his plane at the exact time of the rapture.</span></li><li data-dcnode-id="1471"><span data-dcnode-id="1476" instrument_node=""> The pilot of a Concorde, bound for the US from France, reports that his flight "lost nearly fifty" passengers in the Rapture. Concorde carried exactly 100 passengers. As Fred Clark </span><a class="urllink" data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.patheos.com/blogs/slacktivist/2003/12/10/lb-concorde-calling/"><span data-dcnode-id="1475" instrument_node="">puts it</span><img data-dcnode-id="1474" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1472" instrument_node="">, "LaHaye and Jenkins would have us believe that nearly 50 born-again, evangelical Christian millionaires were visiting Paris and were willing and able to spare no expense to return to New York City as fast, and in as much luxury, as humanly possible." However, there could have been children on board that were raptured.</span></li></ul></li></ul></li><li data-dcnode-id="1456"><span data-dcnode-id="1466" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThereIsNoKillLikeOverkill" title="/pmwiki/pmwiki.php/Main/ThereIsNoKillLikeOverkill"><span data-dcnode-id="1465" instrument_node="">There Is No Kill Like Overkill</span></a><span data-dcnode-id="1463" instrument_node="">: A couple of thermobaric missiles and a 'daisy cutter' is indeed overkill, as said payload is dropped onto Petra on Carpathia's orders. Too bad it doesn't work out the way he had hoped.</span><ul data-dcnode-id="1457"><li data-dcnode-id="1458"><span data-dcnode-id="1462" instrument_node=""> Which has absolutely nothing on Russia launching </span><em data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">every single nuclear and conventional weapon it had</span></em><span data-dcnode-id="1459" instrument_node=""> against Israel, a country which (in real life) is smaller than Massachusetts.</span></li></ul></li><li data-dcnode-id="1448"><span data-dcnode-id="1455" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThermalDissonance" title="/pmwiki/pmwiki.php/Main/ThermalDissonance"><span data-dcnode-id="1454" instrument_node="">Thermal Dissonance</span></a><span data-dcnode-id="1452" instrument_node="">: All over the place with the Tribulation Force and believers in Christ during the lethal </span><a class="twikilink" data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeatWave" title="/pmwiki/pmwiki.php/Main/HeatWave"><span data-dcnode-id="1451" instrument_node="">Heat Wave</span></a><span data-dcnode-id="1449" instrument_node=""> caused by one of God's Bowl Judgments in the book series, as vehicles and structures owned and used by them are protected from the high temperatures.</span></li><li data-dcnode-id="1440"><span data-dcnode-id="1447" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThousandYearReign" title="/pmwiki/pmwiki.php/Main/ThousandYearReign"><span data-dcnode-id="1446" instrument_node="">Thousand-Year Reign</span></a><span data-dcnode-id="1444" instrument_node="">: What </span><em data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="1441" instrument_node=""> is all about.</span></li><li data-dcnode-id="1423"><span data-dcnode-id="1439" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThrowingOutTheScript" title="/pmwiki/pmwiki.php/Main/ThrowingOutTheScript"><span data-dcnode-id="1438" instrument_node="">Throwing Out the Script</span></a><span data-dcnode-id="1436" instrument_node="">: In </span><em data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Apollyon</span></em><span data-dcnode-id="1433" instrument_node="">, when Chaim Rosenzweig is asked to appear on TV to give his explanation for the sun giving out only one-third of its sunlight due to one of the Trumpet Judgments taking place (though Chaim isn't convinced that it is the hand of God at work), he is </span><a class="twikilink" data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PropagandaMachine" title="/pmwiki/pmwiki.php/Main/PropagandaMachine"><span data-dcnode-id="1432" instrument_node="">given a script by the Global Community</span></a><span data-dcnode-id="1430" instrument_node=""> that has him parrot the party line's explanation of </span><a class="twikilink" data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScienceIsWrong" title="/pmwiki/pmwiki.php/Main/ScienceIsWrong"><span data-dcnode-id="1429" instrument_node="">some scientific cosmic disturbance causing the phenomenon</span></a><span data-dcnode-id="1427" instrument_node=""> that even </span><a class="twikilink" data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OmnidisciplinaryScientist" title="/pmwiki/pmwiki.php/Main/OmnidisciplinaryScientist"><span data-dcnode-id="1426" instrument_node="">Rosenzweig as a botanist</span></a><span data-dcnode-id="1424" instrument_node=""> can see through. He chooses to appear on TV but speaks his own mind instead, almost directing people to Dr. Tsion Ben-Judah's website before being pulled off the air.</span></li><li data-dcnode-id="1412"><span data-dcnode-id="1422" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TimeSkip" title="/pmwiki/pmwiki.php/Main/TimeSkip"><span data-dcnode-id="1421" instrument_node="">Time Skip</span></a><span data-dcnode-id="1419" instrument_node="">: A few of them right in </span><em data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="1416" instrument_node="">. It starts off at the beginning of the Millennium, then jumps to 93 years later where it stays for most of the story, then it jumps right to the end of the Millennium.</span><ul data-dcnode-id="1413"><li data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node=""> Several time jumps are evident in the main storyline and prequel novels.</span></li></ul></li><li data-dcnode-id="1401"><span data-dcnode-id="1411" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TogetherInDeath" title="/pmwiki/pmwiki.php/Main/TogetherInDeath"><span data-dcnode-id="1410" instrument_node="">Together in Death</span></a><span data-dcnode-id="1408" instrument_node="">: Dwayne and Trudy Tuttle at the same time in </span><em data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Assassins</span></em><span data-dcnode-id="1405" instrument_node="">, Buck and Chloe Williams about a year apart in </span><em data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Armageddon</span></em><span data-dcnode-id="1402" instrument_node="">, and Dr. Tsion Ben-Judah with his wife. Fortunately, since they're Christians, they also get to come back with Jesus.</span></li><li data-dcnode-id="1366"><span data-dcnode-id="1400" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TooDumbToLive" title="/pmwiki/pmwiki.php/Main/TooDumbToLive"><span data-dcnode-id="1399" instrument_node="">Too Dumb to Live</span></a><span data-dcnode-id="1397" instrument_node="">:</span><ul data-dcnode-id="1367"><li data-dcnode-id="1389"><span data-dcnode-id="1396" instrument_node=""> Events occur that would cause </span><a class="twikilink" data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/RichardDawkins" title="/pmwiki/pmwiki.php/UsefulNotes/RichardDawkins"><span data-dcnode-id="1395" instrument_node="">Richard Dawkins</span></a><span data-dcnode-id="1393" instrument_node=""> or other hard-core atheists to spontaneously convert to some form of religion, yet somehow the non-believers depicted in the series </span><a class="twikilink" data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FlatEarthAtheist" title="/pmwiki/pmwiki.php/Main/FlatEarthAtheist"><span data-dcnode-id="1392" instrument_node="">refuse to see it</span></a><span data-dcnode-id="1390" instrument_node="">, even when it becomes too evident to just be dismissed.</span></li><li data-dcnode-id="1376"><span data-dcnode-id="1388" instrument_node=""> Nicolae Carpathia fulfills Scriptural prophecy about himself to a T without any deviation, thinking that he's going to succeed against God and Jesus Christ despite growing evidence that he isn't.</span><ul data-dcnode-id="1377"><li data-dcnode-id="1378"><span data-dcnode-id="1387" instrument_node=""> The Other Light in </span><em data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="1384" instrument_node=""> somehow manages to outdo him. They have Nicolae's unfortunate example to learn from, along with the scriptures predicting they will build up a massive army under Lucifer to make war on Christ and the Father on the last day, only for said army to be disintegrated in a second by divine lightning. Armed with this knowledge, what does the Other Light do? </span><em data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">They build up a massive army under Lucifer to make war on Christ and the Father on the last day and expect to succeed</span></em><span data-dcnode-id="1381" instrument_node="">. </span><a class="twikilink" data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForegoneConclusion" title="/pmwiki/pmwiki.php/Main/ForegoneConclusion"><span data-dcnode-id="1380" instrument_node="">And...</span></a></li></ul></li><li data-dcnode-id="1368"><span data-dcnode-id="1375" instrument_node=""> The Only Light subsect of the Other Light faction in </span><em data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="1372" instrument_node="">, believing God and Jesus don't exist </span><a class="twikilink" data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ElephantInTheLivingRoom" title="/pmwiki/pmwiki.php/Main/ElephantInTheLivingRoom"><span data-dcnode-id="1371" instrument_node="">despite the contrary evidence</span></a><span data-dcnode-id="1369" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1358"><span data-dcnode-id="1365" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ToppledStatue" title="/pmwiki/pmwiki.php/Main/ToppledStatue"><span data-dcnode-id="1364" instrument_node="">Toppled Statue</span></a><span data-dcnode-id="1362" instrument_node="">: In </span><em data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Desecration</span></em><span data-dcnode-id="1359" instrument_node="">, protesters at the Temple Mount destroyed the golden Nicolae Carpathia statue just as it was about to be erected inside the Jewish Temple itself, signaling the coming downfall of the self-proclaimed king of the world 3 1/2 years later.</span></li><li data-dcnode-id="1351"><span data-dcnode-id="1357" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TotallyRadical" title="/pmwiki/pmwiki.php/Main/TotallyRadical"><span data-dcnode-id="1356" instrument_node="">Totally Radical</span></a><span data-dcnode-id="1354" instrument_node="">: Some of the lingo used by the characters reveals the eras that the authors grew up in.</span><div class="indent" data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">"Well, sir, I don’t know what to tell you, but it is a pity you’re not getting the services of the new pilot. I know him and he’s tops."</span></div></li><li data-dcnode-id="1340"><span data-dcnode-id="1350" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TranslatorMicrobes" title="/pmwiki/pmwiki.php/Main/TranslatorMicrobes"><span data-dcnode-id="1349" instrument_node="">Translator Microbes</span></a><span data-dcnode-id="1347" instrument_node="">: Subverted in the series. Though the Antagonist is the Anti-Christ and has the power of mass-hypnosis, he still speaks nearly every major language and will give speeches in all of them. </span><em data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Consecutively</span></em><span data-dcnode-id="1344" instrument_node="">.</span><ul data-dcnode-id="1341"><li data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node=""> Played straight with the Christian characters when preaching, though, in that the Holy Spirit makes it so that everyone hears the sermons in their own languages.</span></li></ul></li><li data-dcnode-id="1326"><span data-dcnode-id="1339" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrashTheSet" title="/pmwiki/pmwiki.php/Main/TrashTheSet"><span data-dcnode-id="1338" instrument_node="">Trash the Set</span></a><span data-dcnode-id="1336" instrument_node="">: The Abomination of Desolation (Carpathia defiling the rebuilt Temple with pig's blood and placing his image and throne inside the rebuilt Temple) in </span><em data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Desecration</span></em><span data-dcnode-id="1333" instrument_node="">.</span><ul data-dcnode-id="1327"><li data-dcnode-id="1328"><span data-dcnode-id="1332" instrument_node=""> God Himself destroying the desecrated Temple in </span><em data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="1329" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1321"><span data-dcnode-id="1325" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrilogyCreep" title="/pmwiki/pmwiki.php/Main/TrilogyCreep"><span data-dcnode-id="1324" instrument_node="">Trilogy Creep</span></a><span data-dcnode-id="1322" instrument_node="">: Was originally planned to be one novel, then was changed to a trilogy, and ultimately ended up being thirteen books, not counting prequels or spin-offs.</span></li><li data-dcnode-id="1313"><span data-dcnode-id="1320" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TruthSerum" title="/pmwiki/pmwiki.php/Main/TruthSerum"><span data-dcnode-id="1319" instrument_node="">Truth Serum</span></a><span data-dcnode-id="1317" instrument_node="">: Chloe Williams was given one by the GC while she was incarcerated in a Statesville, IL prison in the book </span><em data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Armageddon</span></em><span data-dcnode-id="1314" instrument_node="">. However, with God's help, Chloe was able to not give the GC any answers regarding the Tribulation Force.</span></li><li data-dcnode-id="1308"><span data-dcnode-id="1312" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TryNotToDie" title="/pmwiki/pmwiki.php/Main/TryNotToDie"><span data-dcnode-id="1311" instrument_node="">Try Not to Die</span></a><span data-dcnode-id="1309" instrument_node="">: In the Dramatic Audio of Apollyon, after going through the escape plan to get Tsion, Chloe and Buck out of Israel, Rayford asks for some more advice from Mac. Mac's response: "Don't get shot."</span></li><li data-dcnode-id="1303"><span data-dcnode-id="1307" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnitedEurope" title="/pmwiki/pmwiki.php/Main/UnitedEurope"><span data-dcnode-id="1306" instrument_node="">United Europe</span></a><span data-dcnode-id="1304" instrument_node="">: Most of continental Europe becomes the United European States during the time of the Tribulation, with Greece and Romania becoming part of the United Carpathian States.</span></li><li data-dcnode-id="1295"><span data-dcnode-id="1302" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnitedNationsIsASuperpower" title="/pmwiki/pmwiki.php/Main/UnitedNationsIsASuperpower"><span data-dcnode-id="1301" instrument_node="">United Nations Is a Superpower</span></a><span data-dcnode-id="1299" instrument_node="">: And with Nicolae Carpathia taking the helm and becoming its Secretary-General, it evolves into a tyrannical </span><a class="twikilink" data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneWorldOrder" title="/pmwiki/pmwiki.php/Main/OneWorldOrder"><span data-dcnode-id="1298" instrument_node="">One World Order</span></a><span data-dcnode-id="1296" instrument_node="">.</span></li><li data-dcnode-id="1287"><span data-dcnode-id="1294" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UtopiaJustifiesTheMeans" title="/pmwiki/pmwiki.php/Main/UtopiaJustifiesTheMeans"><span data-dcnode-id="1293" instrument_node="">Utopia Justifies the Means</span></a><span data-dcnode-id="1291" instrument_node="">: Carpathia seems to be promising this, and this </span><em data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">is</span></em><span data-dcnode-id="1288" instrument_node=""> God's motivation for every last thing he does.</span></li><li data-dcnode-id="1273"><span data-dcnode-id="1286" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VariableLengthChain" title="/pmwiki/pmwiki.php/Main/VariableLengthChain"><span data-dcnode-id="1285" instrument_node="">Variable-Length Chain</span></a><span data-dcnode-id="1283" instrument_node="">: The </span><a class="twikilink" data-dcnode-id="1281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArchangelMichael" title="/pmwiki/pmwiki.php/Main/ArchangelMichael"><span data-dcnode-id="1282" instrument_node="">Archangel Michael</span></a><span data-dcnode-id="1280" instrument_node=""> has one for binding up Satan before tossing him into the </span><a class="twikilink" data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BottomlessPit" title="/pmwiki/pmwiki.php/Main/BottomlessPit"><span data-dcnode-id="1279" instrument_node="">Bottomless Pit</span></a><span data-dcnode-id="1277" instrument_node=""> in the book </span><em data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="1274" instrument_node="">.</span></li><li data-dcnode-id="1268"><span data-dcnode-id="1272" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Veganopia" title="/pmwiki/pmwiki.php/Main/Veganopia"><span data-dcnode-id="1271" instrument_node="">Veganopia</span></a><span data-dcnode-id="1269" instrument_node="">: In the Millennium Kingdom, everyone is a vegetarian. It was only at the wedding feast at the beginning of the Millennium that the meat restriction was lifted for that event.</span></li><li data-dcnode-id="1260"><span data-dcnode-id="1267" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VehicularSabotage" title="/pmwiki/pmwiki.php/Main/VehicularSabotage"><span data-dcnode-id="1266" instrument_node="">Vehicular Sabotage</span></a><span data-dcnode-id="1264" instrument_node="">: In the Dramatic Audio adaptation of </span><em data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="1261" instrument_node="">, some GC hooked up grenades to Mac McCullum's helicopter in the hopes that it would blow up when he takes off in it. The sabotage fails to destroy the helicopter, though, thanks to Mac's faith in God.</span></li><li data-dcnode-id="1255"><span data-dcnode-id="1259" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VideoWill" title="/pmwiki/pmwiki.php/Main/VideoWill"><span data-dcnode-id="1258" instrument_node="">Video Will</span></a><span data-dcnode-id="1256" instrument_node="">: The taped message Pastor Vernon Billings leaves behind for his church to distribute in case the Rapture happens, which Rayford Steele receives a copy of from Bruce Barnes, explaining what has happened and what to do in case it happens.</span></li><li data-dcnode-id="1238"><span data-dcnode-id="1254" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainBall" title="/pmwiki/pmwiki.php/Main/VillainBall"><span data-dcnode-id="1253" instrument_node="">Villain Ball</span></a><span data-dcnode-id="1251" instrument_node="">: Several minor bad guys seem to do their evil business the old-fashioned way, ignoring the opportunities the Rapture presents. Like the burglar who robs Steele's house instead of one of the many abandoned homes where the families where Raptured, and stealing a child's bike (every child on the planet has vanished, remember?). Or the </span><a class="twikilink" data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SupremeCouncilOfVagueness" title="/pmwiki/pmwiki.php/Main/SupremeCouncilOfVagueness"><span data-dcnode-id="1250" instrument_node="">Supreme Council of Vagueness</span></a><span data-dcnode-id="1248" instrument_node=""> who stages a </span><a class="twikilink" data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeverSuicide" title="/pmwiki/pmwiki.php/Main/NeverSuicide"><span data-dcnode-id="1247" instrument_node="">faked suicide</span></a><span data-dcnode-id="1245" instrument_node=""> when killing </span><a class="twikilink" data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeKnowsTooMuch" title="/pmwiki/pmwiki.php/Main/HeKnowsTooMuch"><span data-dcnode-id="1244" instrument_node="">Buck's insider</span></a><span data-dcnode-id="1242" instrument_node="">. This is within two days tops since more than a billion people worldwide vanished without a trace, which suggest a much better way to cover up the murder.</span><ul data-dcnode-id="1239"><li data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node=""> Perhaps the most extreme example is Carpathia's plan which consists of fulfilling every step of prophecy wherein he ultimately loses... in the hopes that he will somehow win at the end. Same thing with Satan.</span></li></ul></li><li data-dcnode-id="1233"><span data-dcnode-id="1237" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainOverride" title="/pmwiki/pmwiki.php/Main/VillainOverride"><span data-dcnode-id="1236" instrument_node="">Villain Override</span></a><span data-dcnode-id="1234" instrument_node="">: The Indwelling.</span></li><li data-dcnode-id="1225"><span data-dcnode-id="1232" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainSong" title="/pmwiki/pmwiki.php/Main/VillainSong"><span data-dcnode-id="1231" instrument_node="">Villain Song</span></a><span data-dcnode-id="1229" instrument_node="">: Nicolae Carpathia's own self-indulgent national anthem "Hail Carpathia", which gets twisted by Buck Williams into </span><a class="twikilink" data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheVillainSucksSong" title="/pmwiki/pmwiki.php/Main/TheVillainSucksSong"><span data-dcnode-id="1228" instrument_node="">"The Villain Sucks" Song</span></a><span data-dcnode-id="1226" instrument_node=""> "Fail Carpathia".</span></li><li data-dcnode-id="1220"><span data-dcnode-id="1224" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainWithGoodPublicity" title="/pmwiki/pmwiki.php/Main/VillainWithGoodPublicity"><span data-dcnode-id="1223" instrument_node="">Villain with Good Publicity</span></a><span data-dcnode-id="1221" instrument_node="">: Carpathia has the entire world eating out of his hands from Day One.</span></li><li data-dcnode-id="1209"><span data-dcnode-id="1219" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VoiceOfTheResistance" title="/pmwiki/pmwiki.php/Main/VoiceOfTheResistance"><span data-dcnode-id="1218" instrument_node="">Voice of the Resistance</span></a><span data-dcnode-id="1216" instrument_node="">: Dr. Tsion Ben-Judah himself and Buck Williams' online publication </span><em data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">The Truth</span></em><span data-dcnode-id="1213" instrument_node=""> during the Tribulation; The Other Light's </span><em data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">If It's True</span></em><span data-dcnode-id="1210" instrument_node=""> manifesto during the Millennial Reign.</span></li><li data-dcnode-id="1204"><span data-dcnode-id="1208" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WasTooHardOnHim" title="/pmwiki/pmwiki.php/Main/WasTooHardOnHim"><span data-dcnode-id="1207" instrument_node="">Was Too Hard on Him</span></a><span data-dcnode-id="1205" instrument_node="">: An extreme example. God or Jesus Christ didn't enjoy bringing the final judgement to the wicked, as Jesus sadly watches the Antichrist, the False Prophet, and all those who rejected Him throughout the ages go to their appointed doom.</span></li><li data-dcnode-id="1199"><span data-dcnode-id="1203" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WartimeWedding" title="/pmwiki/pmwiki.php/Main/WartimeWedding"><span data-dcnode-id="1202" instrument_node="">Wartime Wedding</span></a><span data-dcnode-id="1200" instrument_node="">: If you count the seven-year Tribulation period as being a war, then the few weddings that took place during that time would count: Tribulation Force members Rayford Steele and Amanda White, Buck Williams and Chloe Steele, amd Ming Toy and Ree Woo. (Judd Thompson Jr. and Vicki Byrnes of the Young Tribulation Force would also count.) Rayford's marriage to Amanda lasts for about three months at the most, as Amanda dies in a plane crash during the Wrath Of The Lamb earthquake, and Buck's marriage to Chloe lasts until a year before Jesus Christ's glorious appearing at the Battle of Armageddon, when she is captured and put to death by the Global Community. The only bright spot of Buck and Chloe's wedding is that they have produced a son, Kenny Bruce, during the years they were married.</span></li><li data-dcnode-id="1191"><span data-dcnode-id="1198" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WeAllLiveInAmerica" title="/pmwiki/pmwiki.php/Main/WeAllLiveInAmerica"><span data-dcnode-id="1197" instrument_node="">We All Live in America</span></a><span data-dcnode-id="1195" instrument_node="">: When Chang Wong meets an elder, he is reprimanded for wearing a hat in the elder's presence. He apologizes, saying that he is covering up a disgrace (the Mark of the Beast he was forced to take). However, in China, it is disrespectful </span><em data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">not</span></em><span data-dcnode-id="1192" instrument_node=""> to be wearing a hat in the presence of an elder or at a formal occasion.</span></li><li data-dcnode-id="1180"><span data-dcnode-id="1190" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatHappenedToTheMouse" title="/pmwiki/pmwiki.php/Main/WhatHappenedToTheMouse"><span data-dcnode-id="1189" instrument_node="">What Happened to the Mouse?</span></a><span data-dcnode-id="1187" instrument_node="">: We're told that Russia emptied their arsenals at Israel. We're told that the attack failed completely. We're </span><em data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">not</span></em><span data-dcnode-id="1184" instrument_node=""> told how things went for Russia afterwards, now that they had shown their willingness to use nuclear force and were unable to retaliate.</span><ul data-dcnode-id="1181"><li data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node=""> Another element that gets buried with no resolution is the document Bruce Barnes was working on before his death, that the Tribulation Force spend a lot of ink, paper, and money trying to print out.</span></li></ul></li><li data-dcnode-id="1175"><span data-dcnode-id="1179" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatTheHellHero" title="/pmwiki/pmwiki.php/Main/WhatTheHellHero"><span data-dcnode-id="1178" instrument_node="">What the Hell, Hero?</span></a><span data-dcnode-id="1176" instrument_node="">: When it comes to anything Hattie-related, Rayford does some very reckless things. Leah Rose and Albie call him out on that.</span></li><li data-dcnode-id="1167"><span data-dcnode-id="1174" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhenTheClockStrikesTwelve" title="/pmwiki/pmwiki.php/Main/WhenTheClockStrikesTwelve"><span data-dcnode-id="1173" instrument_node="">When the Clock Strikes Twelve</span></a><span data-dcnode-id="1171" instrument_node="">: In </span><em data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="1168" instrument_node="">, when Chaim Rosenzweig realizes that the Lord won't appear exactly seven years after the signing of the treaty between Israel and the Global Community to the exact hour, he predicts that the Lord's coming will happen around midnight Israel time. And sure enough, that's what happens, when the Global Community Unity Army try to storm Petra around that time and find themselves temporarily immobilized by a supernatural blackout that occurs for about a minute before the Lord's appearing in the sky with His heavenly army.</span></li><li data-dcnode-id="1159"><span data-dcnode-id="1166" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhereAreTheyNow" title="/pmwiki/pmwiki.php/Main/WhereAreTheyNow"><span data-dcnode-id="1165" instrument_node="">Where Are They Now</span></a><span data-dcnode-id="1163" instrument_node="">: In </span><em data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="1160" instrument_node="">, we see the fates of the extended members of the Tribulation Force.</span></li></ul><ul data-dcnode-id="924"><li data-dcnode-id="1146"><span data-dcnode-id="1156" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WithGreatPowerComesGreatInsanity" title="/pmwiki/pmwiki.php/Main/WithGreatPowerComesGreatInsanity"><span data-dcnode-id="1155" instrument_node="">With Great Power Comes Great Insanity</span></a><span data-dcnode-id="1153" instrument_node="">: Carpathia, hands down. Once fully indwelt, he becomes </span><a class="twikilink" data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DrunkOnTheDarkSide" title="/pmwiki/pmwiki.php/Main/DrunkOnTheDarkSide"><span data-dcnode-id="1152" instrument_node="">Drunk on the Dark Side</span></a><span data-dcnode-id="1150" instrument_node="">, and Satan himself gives Carpathia a pretty deserved </span><a class="twikilink" data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech" title="/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech"><span data-dcnode-id="1149" instrument_node="">"The Reason You Suck" Speech</span></a><span data-dcnode-id="1147" instrument_node="">.</span></li><li data-dcnode-id="1141"><span data-dcnode-id="1145" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WithUsOrAgainstUs" title="/pmwiki/pmwiki.php/Main/WithUsOrAgainstUs"><span data-dcnode-id="1144" instrument_node="">With Us or Against Us</span></a><span data-dcnode-id="1142" instrument_node="">: Ultimately, it comes down to two choices - join God or Satan through the Global Community in the Tribulation and The Other Light in the Millennium.</span></li><li data-dcnode-id="1130"><span data-dcnode-id="1140" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordsCanBreakMyBones" title="/pmwiki/pmwiki.php/Main/WordsCanBreakMyBones"><span data-dcnode-id="1139" instrument_node="">Words Can Break My Bones</span></a><span data-dcnode-id="1137" instrument_node="">: Jesus' words when He arrives at the Battle of Armageddon, consisting of proclaiming who He is and reciting Bible verses, </span><a class="twikilink" data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="1136" instrument_node="">slays all his enemies at once</span></a><span data-dcnode-id="1134" instrument_node="">. Then again, what do you expect from the One who is called </span><a class="twikilink" data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin" title="/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin"><span data-dcnode-id="1133" instrument_node="">The Word Of God</span></a><span data-dcnode-id="1131" instrument_node="">, which Scripture says is "sharper than any two-edged sword"?</span></li><li data-dcnode-id="1119"><span data-dcnode-id="1129" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorldHealingWave" title="/pmwiki/pmwiki.php/Main/WorldHealingWave"><span data-dcnode-id="1128" instrument_node="">World-Healing Wave</span></a><span data-dcnode-id="1126" instrument_node="">: A rather slow one, as God and Jesus spend a few months restoring the earth to its former beauty following the end of the Tribulation to make it new for the Millennial Kingdom.</span><ul data-dcnode-id="1120"><li data-dcnode-id="1121"><span data-dcnode-id="1125" instrument_node=""> Also possibly played straight in </span><em data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="1122" instrument_node="">, when a nearly devastated Jerusalem is instantly restored and void of any dead bodies littering the streets after Jesus gets rid of the Global Community.</span></li></ul></li><li data-dcnode-id="1087"><span data-dcnode-id="1118" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorstNewsJudgmentEver" title="/pmwiki/pmwiki.php/Main/WorstNewsJudgmentEver"><span data-dcnode-id="1117" instrument_node="">Worst News Judgment Ever</span></a><span data-dcnode-id="1115" instrument_node="">:</span><ul data-dcnode-id="1088"><li data-dcnode-id="1104"><span data-dcnode-id="1114" instrument_node=""> Every child on the planet has just disappeared, along with a great many Christians. The planet is plagued by horrific plane crashes and car accidents as a result. </span><a class="twikilink" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/ThePope" title="/pmwiki/pmwiki.php/UsefulNotes/ThePope"><span data-dcnode-id="1113" instrument_node="">The Pope</span></a><span data-dcnode-id="1111" instrument_node=""> himself is gone, and the Catholic church has fallen into disarray. What stories do </span><em data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Global Weekly</span></em><span data-dcnode-id="1108" instrument_node=""> consider the most important to cover? A convention of Jews in New York, and a recent recall election in Romania. This stuff wouldn't be front page material on a </span><em data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">slow</span></em><span data-dcnode-id="1105" instrument_node=""> news day.</span></li><li data-dcnode-id="1099"><span data-dcnode-id="1103" instrument_node=""> There is a throwaway line that </span><a class="twikilink" data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Retcon" title="/pmwiki/pmwiki.php/Main/Retcon"><span data-dcnode-id="1102" instrument_node="">retcons</span></a><span data-dcnode-id="1100" instrument_node=""> that those events were covered in the previous issue (as if they wouldn't still be news a week later).</span></li><li data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node=""> "Ladies and gentlemen, we have an urgent news bulletin! A minor reporter from the Midwest whom you have never heard of and who nobody but his 3 friends really care about is feared dead following a "mysterious car bombing"! In other news, all children in the entire world vanished last night. Experts say it was likely the result of "excess electromagnetism" or some shit, so in other words we have no idea and it could happen again to all of us at any second. In sports news..."</span></li><li data-dcnode-id="1089"><span data-dcnode-id="1096" instrument_node=""> The fact that </span><a class="twikilink" data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/AirForceOne" title="/pmwiki/pmwiki.php/UsefulNotes/AirForceOne"><span data-dcnode-id="1095" instrument_node="">Air Force One</span></a><span data-dcnode-id="1093" instrument_node=""> is getting a new pilot is big news. Despite the fact that the pilot of Air Force One is, you know, an </span><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Air Force</span></em><span data-dcnode-id="1090" instrument_node=""> pilot and wouldn't be hired off the street. While arguably a prestigious position, even aviation magazines probably aren't going to be covering this event in light of everything else that's happened to that point.</span></li></ul></li><li data-dcnode-id="1058"><span data-dcnode-id="1086" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouAllMeetInAnInn" title="/pmwiki/pmwiki.php/Main/YouAllMeetInAnInn"><span data-dcnode-id="1085" instrument_node="">You All Meet in an Inn</span></a><ul data-dcnode-id="1071"><li data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node=""> At The Party: The Global Gala, located in Jerusalem.</span></li><li data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node=""> At The Stadium: The meeting of the 144,000 witnesses at Teddy Kollek Stadium, organized by Eli and Moishe.</span></li><li data-dcnode-id="1076"><span data-dcnode-id="1079" instrument_node=""> At The Temple: The dedication of the rebuilt Temple in </span><em data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Kingdom Come.</span></em></li><li data-dcnode-id="1072"><span data-dcnode-id="1075" instrument_node=""> At The Western Wall: Buck and Tsion's meeting with Eli and Moishe. </span><a class="twikilink" data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BilingualDialogue" title="/pmwiki/pmwiki.php/Main/BilingualDialogue"><span data-dcnode-id="1074" instrument_node="">Buck is hearing them speak in English, whereas Tsion is hearing them in Hebrew.</span></a></li></ul><div class="indent" data-dcnode-id="1067"><strong data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Eli:</span></strong><span data-dcnode-id="1068" instrument_node=""> I am Eli. This is Moishe.</span></div><div class="indent" data-dcnode-id="1063"><strong data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Buck:</span></strong><span data-dcnode-id="1064" instrument_node=""> (to Tsion, whispering) English?</span></div><div class="indent" data-dcnode-id="1059"><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Tsion:</span></strong><span data-dcnode-id="1060" instrument_node=""> (to Buck, whispering) Hebrew.</span></div></li><li data-dcnode-id="1041"><span data-dcnode-id="1057" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouAreInCommandNow" title="/pmwiki/pmwiki.php/Main/YouAreInCommandNow"><span data-dcnode-id="1056" instrument_node="">You Are in Command Now</span></a><span data-dcnode-id="1054" instrument_node="">: After Chloe </span><a class="twikilink" data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OffWithHisHead" title="/pmwiki/pmwiki.php/Main/OffWithHisHead"><span data-dcnode-id="1053" instrument_node="">is executed by guillotine</span></a><span data-dcnode-id="1051" instrument_node="">, Lionel Whalum takes over running the Co-Op until the </span><a class="twikilink" data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SecondComing" title="/pmwiki/pmwiki.php/Main/SecondComing"><span data-dcnode-id="1050" instrument_node="">Glorious Appearing</span></a><span data-dcnode-id="1048" instrument_node="">.</span><ul data-dcnode-id="1042"><li data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node=""> At the end of the Millennial Period in </span><em data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="1044" instrument_node="">, Jesus returned the Kingdom to His Father and became "subject to Him (God) that subjected all things under His (Jesus) feet."</span></li></ul></li><li data-dcnode-id="1030"><span data-dcnode-id="1040" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouCanSeeThatRight" title="/pmwiki/pmwiki.php/Main/YouCanSeeThatRight"><span data-dcnode-id="1039" instrument_node="">You Can See That, Right?</span></a><span data-dcnode-id="1037" instrument_node="">: In </span><em data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">The Remnant</span></em><span data-dcnode-id="1034" instrument_node="">, Mac McCullum sees the </span><a class="twikilink" data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArchangelMichael" title="/pmwiki/pmwiki.php/Main/ArchangelMichael"><span data-dcnode-id="1033" instrument_node="">Archangel Michael</span></a><span data-dcnode-id="1031" instrument_node=""> beckoning him to come down to the river near a water dam in India. He asks his companions Abdullah Smith and Albie if they also see him, and Abdullah says it's probably a "cowboy marriage" (he meant "mirage").</span></li><li data-dcnode-id="1022"><span data-dcnode-id="1029" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouCouldHaveUsedYourPowersForGood" title="/pmwiki/pmwiki.php/Main/YouCouldHaveUsedYourPowersForGood"><span data-dcnode-id="1028" instrument_node="">You Could Have Used Your Powers for Good!</span></a><span data-dcnode-id="1026" instrument_node="">: What Jesus pretty much says to the Antichrist in His </span><a class="twikilink" data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech" title="/pmwiki/pmwiki.php/Main/TheReasonYouSuckSpeech"><span data-dcnode-id="1025" instrument_node="">"The Reason You Suck" Speech</span></a><span data-dcnode-id="1023" instrument_node=""> to him before he is sentenced to the Lake of Fire: every blessing God gave him was wasted for serving Satan.</span></li><li data-dcnode-id="1014"><span data-dcnode-id="1021" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouHaveNoChanceToSurvive" title="/pmwiki/pmwiki.php/Main/YouHaveNoChanceToSurvive"><span data-dcnode-id="1020" instrument_node="">You Have No Chance to Survive</span></a><span data-dcnode-id="1018" instrument_node="">: See </span><a class="twikilink" data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YourDaysAreNumbered" title="/pmwiki/pmwiki.php/Main/YourDaysAreNumbered"><span data-dcnode-id="1017" instrument_node="">Your Days Are Numbered</span></a><span data-dcnode-id="1015" instrument_node=""> below.</span></li><li data-dcnode-id="1004"><span data-dcnode-id="1013" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouHaveNoIdeaWhoYoureDealingWith" title="/pmwiki/pmwiki.php/Main/YouHaveNoIdeaWhoYoureDealingWith"><span data-dcnode-id="1012" instrument_node="">You Have No Idea Who You're Dealing With</span></a><span data-dcnode-id="1010" instrument_node="">: After Satan indwells Carpathia at the end of The Indwelling, he makes the following promise:</span><div class="indent" data-dcnode-id="1005"><span data-dcnode-id="1009" instrument_node=""> </span><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Carpathia:</span></strong><span data-dcnode-id="1006" instrument_node=""> There are those among you, however, who have referred overtly to me personally as the Antichrist and this period of history as the Tribulation. You may take the following as my personal pledge...the word tribulation will not begin to describe what is in store for you. If the last three and a half years are your idea of tribulation, wait until you endure the Great Tribulation.</span></div></li><li data-dcnode-id="988"><span data-dcnode-id="1003" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouHaveOutlivedYourUsefulness" title="/pmwiki/pmwiki.php/Main/YouHaveOutlivedYourUsefulness"><span data-dcnode-id="1002" instrument_node="">You Have Outlived Your Usefulness</span></a><span data-dcnode-id="1000" instrument_node="">: In the prequel books, Marilena Carpathia, the mother of Nicolae Carpathia, was killed off when Nicolae, still a child, was old enough to be cared for by his mentor Viv Ivins. His </span><a class="twikilink" data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HasTwoDaddies" title="/pmwiki/pmwiki.php/Main/HasTwoDaddies"><span data-dcnode-id="999" instrument_node="">two biological fathers</span></a><span data-dcnode-id="997" instrument_node="">, who were living together off payments from the corporation that funded the genetic project that brought forth Nicolae, were </span><a class="twikilink" data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BuryYourGays" title="/pmwiki/pmwiki.php/Main/BuryYourGays"><span data-dcnode-id="996" instrument_node="">later killed off</span></a><span data-dcnode-id="994" instrument_node="">.</span><ul data-dcnode-id="989"><li data-dcnode-id="992"><span data-dcnode-id="993" instrument_node=""> Also pretty much applies to anyone in Nicolae's circle of advisers in the Global Community.</span></li><li data-dcnode-id="990"><span data-dcnode-id="991" instrument_node=""> Carpathia tries to pull this on Rayford and Hattie. It does not work.</span></li></ul></li><li data-dcnode-id="956"><span data-dcnode-id="987" instrument_node=""> </span><a class="twikilink" data-dcnode-id="985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YourDaysAreNumbered" title="/pmwiki/pmwiki.php/Main/YourDaysAreNumbered"><span data-dcnode-id="986" instrument_node="">Your Days Are Numbered</span></a><span data-dcnode-id="984" instrument_node="">:</span><ul data-dcnode-id="978"><li data-dcnode-id="979"><span data-dcnode-id="983" instrument_node=""> Conversed with Nicolae Carpathia and Buck Williams in the Dramatic Audio version of the book </span><em data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Desecration</span></em><span data-dcnode-id="980" instrument_node="">.</span></li></ul><div class="indent" data-dcnode-id="972"><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Nicolae Carpathia:</span></strong><span data-dcnode-id="975" instrument_node=""> </span><a class="twikilink" data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouHaveNoChanceToSurvive" title="/pmwiki/pmwiki.php/Main/YouHaveNoChanceToSurvive"><span data-dcnode-id="974" instrument_node="">Your days are numbered, my friend.</span></a></div><div class="indent" data-dcnode-id="965"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Buck Williams:</span></strong><span data-dcnode-id="969" instrument_node=""> </span><a class="twikilink" data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PropheciesAreAlwaysRight" title="/pmwiki/pmwiki.php/Main/PropheciesAreAlwaysRight"><span data-dcnode-id="968" instrument_node="">As are yours</span></a><span data-dcnode-id="966" instrument_node="">, "my friend".</span></div><ul data-dcnode-id="957"><li data-dcnode-id="960"><span data-dcnode-id="964" instrument_node=""> Anyone who takes the </span><a class="twikilink" data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="963" instrument_node="">Mark of the Beast</span></a><span data-dcnode-id="961" instrument_node=""> and worships his image in the series is also in the same state.</span></li><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node=""> Literally the case with the Two Witnesses, as their days of prophesying end after 1260 days.</span></li></ul></li><li data-dcnode-id="944"><span data-dcnode-id="955" instrument_node=""> </span><a class="twikilink" data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YourPrincessIsInAnotherCastle" title="/pmwiki/pmwiki.php/Main/YourPrincessIsInAnotherCastle"><span data-dcnode-id="954" instrument_node="">Your Princess Is in Another Castle!</span></a><span data-dcnode-id="952" instrument_node="">: Plenty in the series.</span><ul data-dcnode-id="945"><li data-dcnode-id="950"><span data-dcnode-id="951" instrument_node=""> Nicolae threatens to kill Tsion Ben-Judah during the meeting of the 144,000 after his bottle of water turns to blood, but is stopped by the arrival of Eli and Moishe.</span></li><li data-dcnode-id="948"><span data-dcnode-id="949" instrument_node=""> Carpathia kills the Two Witnesses at the midpoint of the Tribulation, but God revived them and returned them to heaven.</span></li><li data-dcnode-id="946"><span data-dcnode-id="947" instrument_node=""> Chaim assassinates Carpathia soon thereafter... for all the good it ultimately does.</span></li></ul></li><li data-dcnode-id="933"><span data-dcnode-id="943" instrument_node=""> </span><a class="twikilink" data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/YouWatchTooMuchX" title="/pmwiki/pmwiki.php/Main/YouWatchTooMuchX"><span data-dcnode-id="942" instrument_node="">You Watch Too Much X</span></a><span data-dcnode-id="940" instrument_node="">: George Sebastian thinks that his Global Community captors have watched too many movies when they do things like </span><a class="twikilink" data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SecondFaceSmoke" title="/pmwiki/pmwiki.php/Main/SecondFaceSmoke"><span data-dcnode-id="939" instrument_node="">blow smoke in his face</span></a><span data-dcnode-id="937" instrument_node=""> to get him to talk in </span><em data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Desecration</span></em><span data-dcnode-id="934" instrument_node="">.</span></li><li data-dcnode-id="925"><span data-dcnode-id="932" instrument_node=""> </span><a class="twikilink" data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ZipMode" title="/pmwiki/pmwiki.php/Main/ZipMode"><span data-dcnode-id="931" instrument_node="">Zip Mode</span></a><span data-dcnode-id="929" instrument_node="">: In </span><em data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="926" instrument_node="">, Jesus does this on a massive scale to what's left of the human population, transporting them from around the world to the Valley of Jehoshaphat near Jerusalem for the Sheep and Goats judgment.</span></li></ul><hr data-dcnode-id="923"><span data-dcnode-id="922" instrument_node="">
