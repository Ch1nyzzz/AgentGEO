een in Nicolae Carpathia's close circle of associates really know just how evil Nicolae really is, and that he is working for his "father" Satan. Of course, after Nicolae is indwelt by Satan, the facade slowly cracks and everyone gets to see the true Nicolae underneath his original public persona.</span></li><li data-dcnode-id="4417"><span data-dcnode-id="4424" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilEmpire" title="/pmwiki/pmwiki.php/Main/EvilEmpire"><span data-dcnode-id="4423" instrument_node="">Evil Empire</span></a><span data-dcnode-id="4421" instrument_node="">: The Global Community. In the minds of the Other Light in </span><em data-dcnode-id="4419"><span data-dcnode-id="4420" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="4418" instrument_node="">, Christ's Millennial Reign.</span></li><li data-dcnode-id="4412"><span data-dcnode-id="4416" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilMentor" title="/pmwiki/pmwiki.php/Main/EvilMentor"><span data-dcnode-id="4415" instrument_node="">Evil Mentor</span></a><span data-dcnode-id="4413" instrument_node="">: Of the spiritual variety. Carpathia, Fortunato and Viv Ivins share the same spiritual guide - Satan himself.</span></li><li data-dcnode-id="4395"><span data-dcnode-id="4411" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilPowerVacuum" title="/pmwiki/pmwiki.php/Main/EvilPowerVacuum"><span data-dcnode-id="4410" instrument_node="">Evil Power Vacuum</span></a><span data-dcnode-id="4408" instrument_node="">: With the fall of Nicolae Carpathia and the Global Community at the end of the Tribulation, mankind finally has peace with Jesus Christ at the helm of the Millennial Kingdom. 93 years from the start of the Kingdom, however, the Other Light rises as </span><a class="twikilink" data-dcnode-id="4406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaResistance" title="/pmwiki/pmwiki.php/Main/LaResistance"><span data-dcnode-id="4407" instrument_node="">La Résistance</span></a><span data-dcnode-id="4405" instrument_node=""> to bring evil back into the world, waiting for their leader Satan to be </span><a class="twikilink" data-dcnode-id="4403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SealedEvilInACan" title="/pmwiki/pmwiki.php/Main/SealedEvilInACan"><span data-dcnode-id="4404" instrument_node="">released from his imprisonment</span></a><span data-dcnode-id="4402" instrument_node=""> so that </span><a class="twikilink" data-dcnode-id="4400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillTheGod" title="/pmwiki/pmwiki.php/Main/KillTheGod"><span data-dcnode-id="4401" instrument_node="">they can finally defeat God</span></a><span data-dcnode-id="4399" instrument_node=""> at the end of Millennium. Of course the citizens of the Millennial Kingdom knew from Scripture that it was eventually going to happen...</span><a class="twikilink" data-dcnode-id="4397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo" title="/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo"><span data-dcnode-id="4398" instrument_node="">and in the end it was also going to fail</span></a><span data-dcnode-id="4396" instrument_node="">.</span></li><li data-dcnode-id="4384"><span data-dcnode-id="4394" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEvilsOfFreeWill" title="/pmwiki/pmwiki.php/Main/TheEvilsOfFreeWill"><span data-dcnode-id="4393" instrument_node="">The Evils of Free Will</span></a><span data-dcnode-id="4391" instrument_node="">: The assumption made of God by the Other Light faction in their </span><em data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">If It's True</span></em><span data-dcnode-id="4388" instrument_node=""> manifesto by His </span><a class="twikilink" data-dcnode-id="4386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathsHourglass" title="/pmwiki/pmwiki.php/Main/DeathsHourglass"><span data-dcnode-id="4387" instrument_node="">not allowing "naturals" to live past 100 years of age</span></a><span data-dcnode-id="4385" instrument_node=""> as unbelievers.</span></li><li data-dcnode-id="4366"><span data-dcnode-id="4383" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExaltedTorturer" title="/pmwiki/pmwiki.php/Main/ExaltedTorturer"><span data-dcnode-id="4382" instrument_node="">Exalted Torturer</span></a><span data-dcnode-id="4380" instrument_node="">: God, given that he sets all events in motion, </span><a class="twikilink" data-dcnode-id="4378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo" title="/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo"><span data-dcnode-id="4379" instrument_node="">forges all destinies</span></a><span data-dcnode-id="4377" instrument_node="">, and that even the things the ostensible villains do are ultimately his responsibility. After all is said and done, he tortures everyone who is not a specific denomination of Christian, regardless of those people's potential virtues, </span><a class="twikilink" data-dcnode-id="4375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DisproportionateRetribution" title="/pmwiki/pmwiki.php/Main/DisproportionateRetribution"><span data-dcnode-id="4376" instrument_node="">in a lake of fire for eternity</span></a><span data-dcnode-id="4374" instrument_node="">. Not that God or Jesus Christ enjoy it, as Jesus sadly watches the Antichrist, the False Prophet, and all those who rejected Him throughout the ages go to their appointed doom.</span><ul data-dcnode-id="4369"><li data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node=""> Speaking of those "potential virtues", the Bible does say that there's a way that seems right to a man, but its end thereof is death.</span></li><li data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node=""> To quote Jesus speaking to Astaroth, Baal, and Cankerworm from the Dramatic Audio:</span></li></ul><div class="indent" data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node=""> "Like My Father, with whom I am One, I have no pleasure in the death of the wicked, but justice must be served, and death is your sentence."</span></div></li><li data-dcnode-id="4358"><span data-dcnode-id="4365" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExpectingSomeoneTaller" title="/pmwiki/pmwiki.php/Main/ExpectingSomeoneTaller"><span data-dcnode-id="4364" instrument_node="">Expecting Someone Taller</span></a><span data-dcnode-id="4362" instrument_node="">: King David in </span><em data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="4359" instrument_node=""> gets this kind of reaction even from the likes of Tsion Ben-Judah.</span></li><li data-dcnode-id="4341"><span data-dcnode-id="4357" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExplainExplainOhCrap" title="/pmwiki/pmwiki.php/Main/ExplainExplainOhCrap"><span data-dcnode-id="4356" instrument_node="">Explain, Explain... Oh, Crap!</span></a><span data-dcnode-id="4354" instrument_node="">: The aforementioned </span><a class="twikilink" data-dcnode-id="4352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EurekaMoment" title="/pmwiki/pmwiki.php/Main/EurekaMoment"><span data-dcnode-id="4353" instrument_node="">"Eureka!" Moment</span></a><span data-dcnode-id="4351" instrument_node=""> regarding Buck Williams in the Dramatic Audio of </span><em data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">Nicolae.</span></em><div class="indent" data-dcnode-id="4342"><strong data-dcnode-id="4347"><span data-dcnode-id="4348" instrument_node="">Buck:</span></strong><span data-dcnode-id="4346" instrument_node=""> Can't uh...the wind...you think...(cue </span><a class="twikilink" data-dcnode-id="4344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EurekaMoment" title="/pmwiki/pmwiki.php/Main/EurekaMoment"><span data-dcnode-id="4345" instrument_node="">"Eureka!" Moment</span></a><span data-dcnode-id="4343" instrument_node="">) Oh, no! (drives off)</span></div></li><li data-dcnode-id="4336"><span data-dcnode-id="4340" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExternalCombustion" title="/pmwiki/pmwiki.php/Main/ExternalCombustion"><span data-dcnode-id="4339" instrument_node="">External Combustion</span></a><span data-dcnode-id="4337" instrument_node="">: In the first book of the series (and its film adaptation), Alan Tompkins was killed by a bomb planted inside his car.</span></li><li data-dcnode-id="4331"><span data-dcnode-id="4335" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FaceDeathWithDignity" title="/pmwiki/pmwiki.php/Main/FaceDeathWithDignity"><span data-dcnode-id="4334" instrument_node="">Face Death with Dignity</span></a><span data-dcnode-id="4332" instrument_node="">: Any believer who becomes a martyr in the Tribulation.</span></li><li data-dcnode-id="4318"><span data-dcnode-id="4330" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FaithHeelTurn" title="/pmwiki/pmwiki.php/Main/FaithHeelTurn"><span data-dcnode-id="4329" instrument_node="">Faith–Heel Turn</span></a><span data-dcnode-id="4327" instrument_node="">: The mob of remnants who visited a GC-backed Miracle Worker outside the safety of Petra. Many end up taking the </span><a class="twikilink" data-dcnode-id="4325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="4326" instrument_node="">Mark of the Beast</span></a><span data-dcnode-id="4324" instrument_node=""> in order to save their own lives </span><a class="twikilink" data-dcnode-id="4322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhyDidItHaveToBeSnakes" title="/pmwiki/pmwiki.php/Main/WhyDidItHaveToBeSnakes"><span data-dcnode-id="4323" instrument_node="">against an incoming swarm of poisonous vipers</span></a><span data-dcnode-id="4321" instrument_node="">, but </span><a class="twikilink" data-dcnode-id="4319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ILied" title="/pmwiki/pmwiki.php/Main/ILied"><span data-dcnode-id="4320" instrument_node="">the false teacher kills them all anyway.</span></a></li><li data-dcnode-id="4307"><span data-dcnode-id="4317" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FailureIsTheOnlyOption" title="/pmwiki/pmwiki.php/Main/FailureIsTheOnlyOption"><span data-dcnode-id="4316" instrument_node="">Failure Is the Only Option</span></a><span data-dcnode-id="4314" instrument_node="">: Attempts to assassinate the Antichrist in the book series result in this due to </span><a class="twikilink" data-dcnode-id="4312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="4313" instrument_node="">the Word of God</span></a><span data-dcnode-id="4311" instrument_node=""> stating that </span><a class="twikilink" data-dcnode-id="4309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnlyICanKillHim" title="/pmwiki/pmwiki.php/Main/OnlyICanKillHim"><span data-dcnode-id="4310" instrument_node="">only Jesus Christ is able to defeat him</span></a><span data-dcnode-id="4308" instrument_node="">.</span></li><li data-dcnode-id="4288"><span data-dcnode-id="4306" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FakingTheDead" title="/pmwiki/pmwiki.php/Main/FakingTheDead"><span data-dcnode-id="4305" instrument_node="">Faking the Dead</span></a><span data-dcnode-id="4303" instrument_node="">: In </span><em data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">The Mark</span></em><span data-dcnode-id="4300" instrument_node="">, Mac McCullum, David Hassid, Hannah Palemoon and Abdullah Smith pull this off by </span><a class="twikilink" data-dcnode-id="4298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MakeItLookLikeAnAccident" title="/pmwiki/pmwiki.php/Main/MakeItLookLikeAnAccident"><span data-dcnode-id="4299" instrument_node="">crashing a plane via remote control overloaded with guillotines and biochip injectors</span></a><span data-dcnode-id="4297" instrument_node=""> in order to avoid taking the </span><a class="twikilink" data-dcnode-id="4295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="4296" instrument_node="">mark of loyalty.</span></a><ul data-dcnode-id="4289"><li data-dcnode-id="4290"><span data-dcnode-id="4294" instrument_node=""> In </span><em data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">The Mark</span></em><span data-dcnode-id="4291" instrument_node="">, Hattie comes close to killing herself, but is rescued by Rayford and Albie. She ends up ultimately faking her death to escape the Global Community.</span></li></ul></li><li data-dcnode-id="4283"><span data-dcnode-id="4287" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FallenAngel" title="/pmwiki/pmwiki.php/Main/FallenAngel"><span data-dcnode-id="4286" instrument_node="">Fallen Angel</span></a><span data-dcnode-id="4284" instrument_node="">: Ashtaroth, Baal, and Cankerworm are three spiritual beings that are named as such by Jesus.</span></li><li data-dcnode-id="4278"><span data-dcnode-id="4282" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FamilyBusiness" title="/pmwiki/pmwiki.php/Main/FamilyBusiness"><span data-dcnode-id="4281" instrument_node="">Family Business</span></a><span data-dcnode-id="4279" instrument_node="">: Rayford's dad wants his son to follow in his footsteps. Rayford, however, has other plans.</span></li><li data-dcnode-id="4271"><span data-dcnode-id="4277" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FamousNamedForeigner" title="/pmwiki/pmwiki.php/Main/FamousNamedForeigner"><span data-dcnode-id="4276" instrument_node="">Famous-Named Foreigner</span></a><span data-dcnode-id="4274" instrument_node="">: Jenkins has said in his book, "Writing for the Soul", that one of his tried-and-true ways to create a foreign character's name is to take the given name of some historically important native and append the name of a notable geographical area as a family name. One little problem: Romania doesn't use family names terribly much. Instead, you usually see patronymics. Guess what "Carpathia" </span><em data-dcnode-id="4272"><span data-dcnode-id="4273" instrument_node="">isn't?</span></em></li><li data-dcnode-id="4263"><span data-dcnode-id="4270" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticRacism" title="/pmwiki/pmwiki.php/Main/FantasticRacism"><span data-dcnode-id="4269" instrument_node="">Fantastic Racism</span></a><span data-dcnode-id="4267" instrument_node="">: Mostly among the "naturals" against the "glorifieds" in the Millennial Kingdom, particularly among those who belong to the Other Light faction. Not that they can directly act upon those beliefs through violent means. However, one of them did </span><a class="twikilink" data-dcnode-id="4265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AttemptedRape" title="/pmwiki/pmwiki.php/Main/AttemptedRape"><span data-dcnode-id="4266" instrument_node="">foolishly try to rape a female "glorified" and got killed by God in the attempt</span></a><span data-dcnode-id="4264" instrument_node="">.</span></li><li data-dcnode-id="4255"><span data-dcnode-id="4262" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FatalFamilyPhoto" title="/pmwiki/pmwiki.php/Main/FatalFamilyPhoto"><span data-dcnode-id="4261" instrument_node="">Fatal Family Photo</span></a><span data-dcnode-id="4259" instrument_node="">: Subverted, as it is not a fatal photo. In </span><em data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="4256" instrument_node="">, Rayford requests a picture of the original Tribulation Force at an end-of-the-Millennium party. He is the only member out of the core group who is a natural, while Bruce, Cameron and Chloe are glorifieds. Even Rayford is as shocked as to how old he is.</span></li><li data-dcnode-id="4250"><span data-dcnode-id="4254" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FauxActionGirl" title="/pmwiki/pmwiki.php/Main/FauxActionGirl"><span data-dcnode-id="4253" instrument_node="">Faux Action Girl</span></a><span data-dcnode-id="4251" instrument_node="">: Ming Toy. When she is introduced, a lot is made of her experience as a prison guard with combat skills — but from then on, she pretty much divides her time between office work and babysitting.</span></li><li data-dcnode-id="4239"><span data-dcnode-id="4249" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FauxAffablyEvil" title="/pmwiki/pmwiki.php/Main/FauxAffablyEvil"><span data-dcnode-id="4248" instrument_node="">Faux Affably Evil</span></a><span data-dcnode-id="4246" instrument_node="">: Nicolae Carpathia initially seems to be the humblest, most empathetic Son of Satan you'd ever meet, and comes across as a </span><a class="twikilink" data-dcnode-id="4244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WellIntentionedExtremist" title="/pmwiki/pmwiki.php/Main/WellIntentionedExtremist"><span data-dcnode-id="4245" instrument_node="">Well-Intentioned Extremist</span></a><span data-dcnode-id="4243" instrument_node=""> at worst. However, this is all entirely an act; in truth he's a completely self-centered sociopath and a two-dimensional thug. The movie version of Nicolae actually appears to be more genuinely </span><a class="twikilink" data-dcnode-id="4241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AffablyEvil" title="/pmwiki/pmwiki.php/Main/AffablyEvil"><span data-dcnode-id="4242" instrument_node="">Affably Evil</span></a><span data-dcnode-id="4240" instrument_node="">, although still a ruthless megalomaniac.</span></li><li data-dcnode-id="4225"><span data-dcnode-id="4238" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FeatherFlechettes" title="/pmwiki/pmwiki.php/Main/FeatherFlechettes"><span data-dcnode-id="4237" instrument_node="">Feather Flechettes</span></a><span data-dcnode-id="4235" instrument_node="">: In the book </span><em data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">Assassins</span></em><span data-dcnode-id="4232" instrument_node="">, the razor-sharp feathers from the winged ice sculpture of Pontifex Maximus Peter Mathews are used as murder weapons by the ten subpotentates at a </span><a class="twikilink" data-dcnode-id="4230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NastyParty" title="/pmwiki/pmwiki.php/Main/NastyParty"><span data-dcnode-id="4231" instrument_node="">Nasty Party</span></a><span data-dcnode-id="4229" instrument_node=""> that was held for the </span><a class="twikilink" data-dcnode-id="4227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HighPriest" title="/pmwiki/pmwiki.php/Main/HighPriest"><span data-dcnode-id="4228" instrument_node="">High Priest</span></a><span data-dcnode-id="4226" instrument_node=""> of Enigma Babylon.</span></li><li data-dcnode-id="4202"><span data-dcnode-id="4224" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AFeteWorseThanDeath" title="/pmwiki/pmwiki.php/Main/AFeteWorseThanDeath"><span data-dcnode-id="4223" instrument_node="">A Fête Worse Than Death</span></a><span data-dcnode-id="4221" instrument_node="">: The Global Gala in the book </span><em data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">Assassins</span></em><span data-dcnode-id="4218" instrument_node=""> was purposely arranged to take place in Jerusalem around the same time that the Two Witnesses in the </span><a class="twikilink" data-dcnode-id="4216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/BookOfRevelation" title="/pmwiki/pmwiki.php/Literature/BookOfRevelation"><span data-dcnode-id="4217" instrument_node="">Book of Revelation</span></a><span data-dcnode-id="4215" instrument_node=""> were supposed to end their prophesying, with Nicolae Carpathia making a public spectacle of killing the Two Witnesses by his own hand to enforce the law of the Global Community. (It also served as an opportunity for Nicolae to quietly dispose of Pontifex Maximus Peter Mathews through a private little </span><a class="twikilink" data-dcnode-id="4213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NastyParty" title="/pmwiki/pmwiki.php/Main/NastyParty"><span data-dcnode-id="4214" instrument_node="">Nasty Party</span></a><span data-dcnode-id="4212" instrument_node=""> held in his honor.) In fulfillment of what </span><a class="twikilink" data-dcnode-id="4210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="4211" instrument_node="">the Word of God</span></a><span data-dcnode-id="4209" instrument_node=""> says, the bodies of the Two Witnesses were </span><a class="twikilink" data-dcnode-id="4207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadGuyOnDisplay" title="/pmwiki/pmwiki.php/Main/DeadGuyOnDisplay"><span data-dcnode-id="4208" instrument_node="">left in the street unburied</span></a><span data-dcnode-id="4206" instrument_node=""> for 3 1/2 days </span><a class="twikilink" data-dcnode-id="4204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndThereWasMuchRejoicing" title="/pmwiki/pmwiki.php/Main/AndThereWasMuchRejoicing"><span data-dcnode-id="4205" instrument_node="">while the people celebrated their demise</span></a><span data-dcnode-id="4203" instrument_node="">, but then they were dramatically resurrected and brought up to heaven in a cloud. At the same time, an earthquake caused a tenth of Jerusalem to fall and seven thousand people have died.</span></li><li data-dcnode-id="4195"><span data-dcnode-id="4201" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FidelityTest" title="/pmwiki/pmwiki.php/Main/FidelityTest"><span data-dcnode-id="4200" instrument_node="">Fidelity Test</span></a><span data-dcnode-id="4198" instrument_node="">: Inverted with Rayford, as Irene does not test his faithfulness. He was more than willing to cheat with Hattie while away in London. </span><a class="twikilink" data-dcnode-id="4196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CaughtUpInTheRapture" title="/pmwiki/pmwiki.php/Main/CaughtUpInTheRapture"><span data-dcnode-id="4197" instrument_node="">God, however, decided to wreck those plans.</span></a></li><li data-dcnode-id="4175"><span data-dcnode-id="4194" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBattle" title="/pmwiki/pmwiki.php/Main/FinalBattle"><span data-dcnode-id="4193" instrument_node="">Final Battle</span></a><span data-dcnode-id="4191" instrument_node="">: The anti-climactic Satan's Other Light army versus God battle near the end of </span><em data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="4188" instrument_node="">. It only takes a few pages as God just smokes Satan's entire army into ashes in seconds. At least during the Battle of Armageddon in </span><em data-dcnode-id="4186"><span data-dcnode-id="4187" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="4185" instrument_node=""> Jesus allowed His enemies to </span><a class="twikilink" data-dcnode-id="4183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImmuneToBullets" title="/pmwiki/pmwiki.php/Main/ImmuneToBullets"><span data-dcnode-id="4184" instrument_node="">fire their guns uselessly at Him</span></a><span data-dcnode-id="4182" instrument_node=""> before </span><a class="twikilink" data-dcnode-id="4180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordsCanBreakMyBones" title="/pmwiki/pmwiki.php/Main/WordsCanBreakMyBones"><span data-dcnode-id="4181" instrument_node="">He just killed them by speaking</span></a><span data-dcnode-id="4179" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="4178" instrument_node="">the Word of God</span></a><span data-dcnode-id="4176" instrument_node="">.</span></li><li data-dcnode-id="4157"><span data-dcnode-id="4174" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalSpeech" title="/pmwiki/pmwiki.php/Main/FinalSpeech"><span data-dcnode-id="4173" instrument_node="">Final Confession:</span></a><span data-dcnode-id="4171" instrument_node=""> After Jesus casts Satan out of Carpathia, the defeated Antichrist acknowledges that Jesus is indeed Lord.</span><div class="indent" data-dcnode-id="4167"><strong data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">Carpathia:</span></strong><span data-dcnode-id="4168" instrument_node=""> You are the Christ, the Son of the living God, who died for the sins of the world and rose again the third day as the Scriptures predicted...I confess that my life was a waste. Worthless. A mistake. I rebelled against the God of the universe, whom I now know loved me.</span></div><ul data-dcnode-id="4158"><li data-dcnode-id="4159"><span data-dcnode-id="4166" instrument_node=""> He </span><em data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">still</span></em><span data-dcnode-id="4163" instrument_node=""> gets </span><a class="twikilink" data-dcnode-id="4161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam" title="/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam"><span data-dcnode-id="4162" instrument_node="">tossed into the Lake of Fire</span></a><span data-dcnode-id="4160" instrument_node="">.</span></li></ul></li><li data-dcnode-id="4150"><span data-dcnode-id="4156" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalGirl" title="/pmwiki/pmwiki.php/Main/FinalGirl"><span data-dcnode-id="4155" instrument_node="">Final Guy:</span></a><span data-dcnode-id="4153" instrument_node=""> </span><span class="spoiler" data-dcnode-id="4151" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4152" instrument_node=""> Rayford Steele survives the Tribulation by the skin of his teeth.</span></span></li><li data-dcnode-id="4125"><span data-dcnode-id="4149" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalSolution" title="/pmwiki/pmwiki.php/Main/FinalSolution"><span data-dcnode-id="4148" instrument_node="">Final Solution</span></a><span data-dcnode-id="4146" instrument_node="">: Nicolae Carpathia's reference to the battle of Armageddon in </span><em data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">Armageddon</span></em><span data-dcnode-id="4143" instrument_node=""> being one for dealing with the Jews in Israel.</span><ul data-dcnode-id="4126"><li data-dcnode-id="4135"><span data-dcnode-id="4142" instrument_node=""> Fitting in with what </span><a class="twikilink" data-dcnode-id="4140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBible" title="/pmwiki/pmwiki.php/Literature/TheBible"><span data-dcnode-id="4141" instrument_node="">The Bible</span></a><span data-dcnode-id="4139" instrument_node=""> teaches, this could also apply to God's judgments and the </span><a class="twikilink" data-dcnode-id="4137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBattle" title="/pmwiki/pmwiki.php/Main/FinalBattle"><span data-dcnode-id="4138" instrument_node="">Final Battle</span></a><span data-dcnode-id="4136" instrument_node="">.</span></li><li data-dcnode-id="4127"><span data-dcnode-id="4134" instrument_node=""> Interestingly, in </span><em data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">Armageddon</span></em><span data-dcnode-id="4131" instrument_node="">, Nicolae Carpathia alludes to "the final solution" that was attempted on the Jews during </span><a class="twikilink" data-dcnode-id="4129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/WorldWarII" title="/pmwiki/pmwiki.php/UsefulNotes/WorldWarII"><span data-dcnode-id="4130" instrument_node="">World War II</span></a><span data-dcnode-id="4128" instrument_node=""> that failed to destroy them completely, succeeding only in giving back their homeland Israel, during his private conference with the ten subpotentates where he reveals himself to be the Antichrist.</span></li></ul></li><li data-dcnode-id="4109"><span data-dcnode-id="4124" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathFromAbove" title="/pmwiki/pmwiki.php/Main/DeathFromAbove"><span data-dcnode-id="4123" instrument_node="">Fire From Above:</span></a><span data-dcnode-id="4121" instrument_node=""> Aside from earthquakes, Jesus also can use fire to decimate and destroy. </span><a class="twikilink" data-dcnode-id="4119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoomedHometown" title="/pmwiki/pmwiki.php/Main/DoomedHometown"><span data-dcnode-id="4120" instrument_node="">It is also how New Babylon met its fate.</span></a><ul data-dcnode-id="4110"><li data-dcnode-id="4111"><span data-dcnode-id="4118" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDragon" title="/pmwiki/pmwiki.php/Main/TheDragon"><span data-dcnode-id="4117" instrument_node="">Leon Fortunato</span></a><span data-dcnode-id="4115" instrument_node=""> is also quite fond of using fire to kill those who </span><a class="twikilink" data-dcnode-id="4113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DoNotTauntCthulhu" title="/pmwiki/pmwiki.php/Main/DoNotTauntCthulhu"><span data-dcnode-id="4114" instrument_node="">don't recognize Carpathia as God</span></a><span data-dcnode-id="4112" instrument_node="">, as Hattie found out the hard way.</span></li></ul></li><li data-dcnode-id="4098"><span data-dcnode-id="4108" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FiringInTheAirALot" title="/pmwiki/pmwiki.php/Main/FiringInTheAirALot"><span data-dcnode-id="4107" instrument_node="">Firing in the Air a Lot</span></a><span data-dcnode-id="4105" instrument_node="">: How Tsion, Buck, and the Jewish rebels in Jerusalem tell Carpathia </span><a class="twikilink" data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewYourUltimatum" title="/pmwiki/pmwiki.php/Main/ScrewYourUltimatum"><span data-dcnode-id="4104" instrument_node="">what he can go do with his ultimatum</span></a><span data-dcnode-id="4102" instrument_node=""> in </span><em data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">Armageddon</span></em><span data-dcnode-id="4099" instrument_node="">.</span></li><li data-dcnode-id="4093"><span data-dcnode-id="4097" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FirstWorldProblems" title="/pmwiki/pmwiki.php/Main/FirstWorldProblems"><span data-dcnode-id="4096" instrument_node="">First World Problems</span></a><span data-dcnode-id="4094" instrument_node="">: After the disappearance of 1/4 of the world's people followed by mass death and destruction, Rayford and Buck complain about long lines and traffic jams caused by said disasters. The Slacktivist blog had a field day with this one.</span></li><li data-dcnode-id="4060"><span data-dcnode-id="4092" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FlatEarthAtheist" title="/pmwiki/pmwiki.php/Main/FlatEarthAtheist"><span data-dcnode-id="4091" instrument_node="">Flat-Earth Atheist</span></a><span data-dcnode-id="4089" instrument_node="">: This affects almost everyone on the planet and it isn't at all </span><a class="twikilink" data-dcnode-id="4087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayedForLaughs" title="/pmwiki/pmwiki.php/Main/PlayedForLaughs"><span data-dcnode-id="4088" instrument_node="">Played for Laughs</span></a><span data-dcnode-id="4086" instrument_node="">. The authors seriously suggest that the majority of the world's population won't really care about all the explicit miracles.</span><ul data-dcnode-id="4061"><li data-dcnode-id="4072"><span data-dcnode-id="4085" instrument_node=""> It helps to consider that in fundamentalist Christianity, the usual conceit is that knowledge that God (a) exists, (b) is all-powerful, and (c) deserves infinite glory and fealty, is hardwired into every human being. </span><em data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">Only</span></em><span data-dcnode-id="4082" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NayTheist" title="/pmwiki/pmwiki.php/Main/NayTheist"><span data-dcnode-id="4081" instrument_node="">Nay-Theist</span></a><span data-dcnode-id="4079" instrument_node="">-level spitefulness can account for such heavy unwillingness to follow him, even after apprisal of the </span><a class="twikilink" data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScareEmStraight" title="/pmwiki/pmwiki.php/Main/ScareEmStraight"><span data-dcnode-id="4078" instrument_node="">threat of perdition.</span></a><span data-dcnode-id="4076" instrument_node=""> (Whether dystheism can be animated </span><em data-dcnode-id="4074"><span data-dcnode-id="4075" instrument_node="">by</span></em><span data-dcnode-id="4073" instrument_node=""> anything besides spite doesn't seem to enter the picture.)</span></li><li data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node=""> It's also worth noting that Jesus warned that, "If they would not listen to Moses and the prophets, they would not listen even to a man come back from the dead." Thus, to those in hardened moral rebellion, no sign will convince them, because they don't want to believe.</span></li><li data-dcnode-id="4062"><span data-dcnode-id="4069" instrument_node=""> By the time of the Millennial Reign, </span><em data-dcnode-id="4066"><a class="twikilink" data-dcnode-id="4067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ElephantInTheLivingRoom" title="/pmwiki/pmwiki.php/Main/ElephantInTheLivingRoom"><span data-dcnode-id="4068" instrument_node="">nobody has any excuse</span></a></em><span data-dcnode-id="4065" instrument_node=""> for not believing in the Lord Jesus Christ. And </span><a class="twikilink" data-dcnode-id="4063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathsHourglass" title="/pmwiki/pmwiki.php/Main/DeathsHourglass"><span data-dcnode-id="4064" instrument_node="">those that choose not to believe in Him won't live past 100!</span></a></li></ul></li><li data-dcnode-id="4052"><span data-dcnode-id="4059" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FlatJoy" title="/pmwiki/pmwiki.php/Main/FlatJoy"><span data-dcnode-id="4058" instrument_node="">Flat Joy</span></a><span data-dcnode-id="4056" instrument_node="">: In </span><em data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">The Remnant</span></em><span data-dcnode-id="4053" instrument_node="">, Nicolae Carpathia loyalists realize that their world leader is now a cruel heartless dictator who demands worship at every turn. Mentioned in the story is a mandatory parade held by Carpathia loyalists that turns out to be entirely mirthless, as they simply go through the motions of praising Carpathia.</span></li><li data-dcnode-id="4041"><span data-dcnode-id="4051" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FlauntingYourFleets" title="/pmwiki/pmwiki.php/Main/FlauntingYourFleets"><span data-dcnode-id="4050" instrument_node="">Flaunting Your Fleets</span></a><span data-dcnode-id="4048" instrument_node="">: Happens in the final chapter of the book </span><em data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="4045" instrument_node="">, as </span><a class="twikilink" data-dcnode-id="4043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaResistance" title="/pmwiki/pmwiki.php/Main/LaResistance"><span data-dcnode-id="4044" instrument_node="">The Other Light</span></a><span data-dcnode-id="4042" instrument_node=""> grows to such massive numbers near the end of the Millennium that they start parading themselves and their weapons around.</span></li><li data-dcnode-id="4030"><span data-dcnode-id="4040" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FoodInterrogation" title="/pmwiki/pmwiki.php/Main/FoodInterrogation"><span data-dcnode-id="4039" instrument_node="">Food Interrogation</span></a><span data-dcnode-id="4037" instrument_node="">: In </span><em data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">Armageddon</span></em><span data-dcnode-id="4034" instrument_node="">, Global Community officer Jock Ashmore tries to break Chloe Williams after she's been captured by ordering a breakfast — </span><em data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">just one</span></em><span data-dcnode-id="4031" instrument_node=""> breakfast — and then proceeding to eat it before her, saying that if she's willing to divulge any information about the Tribulation Force and their whereabouts, she would be given a breakfast to eat as well.</span></li><li data-dcnode-id="4016"><span data-dcnode-id="4029" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForegoneConclusion" title="/pmwiki/pmwiki.php/Main/ForegoneConclusion"><span data-dcnode-id="4028" instrument_node="">Foregone Conclusion</span></a><span data-dcnode-id="4026" instrument_node="">: It can be a bit tough to care about the deaths of the protagonists when it's made explicitly clear from the start that at the end of the tribulation, the Antichrist will lose and </span><a class="twikilink" data-dcnode-id="4024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DisneyDeath" title="/pmwiki/pmwiki.php/Main/DisneyDeath"><span data-dcnode-id="4025" instrument_node="">they'll all come back to Earth anyway</span></a><span data-dcnode-id="4023" instrument_node="">. Also in </span><em data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="4020" instrument_node="">, the Other Light attempts to </span><a class="twikilink" data-dcnode-id="4018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaResistance" title="/pmwiki/pmwiki.php/Main/LaResistance"><span data-dcnode-id="4019" instrument_node="">build a resistance force</span></a><span data-dcnode-id="4017" instrument_node=""> in order to overthrow Christ at the end of the Millennium when Satan is loosed from imprisonment, despite that Scripture says it will end in failure...as it eventually does by the end of the book. The characters who earnestly believe this, and see the evidence before their eyes, are still so worried about dying. Like Buck, who worries so much that Nicolae might kill him if he speaks against or associates with him, even after his conversion. Given that he also knows that there's seven years of plagues and disasters coming up if he isn't killed, he'd be better off taunting the Antichrist.</span></li><li data-dcnode-id="3976"><span data-dcnode-id="4015" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Foreshadowing" title="/pmwiki/pmwiki.php/Main/Foreshadowing"><span data-dcnode-id="4014" instrument_node="">Foreshadowing</span></a><span data-dcnode-id="4012" instrument_node="">: Book two opens by telling us "</span><em data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">The odds are, only one of the four members of the Tribulation Force will survive the next seven years.</span></em><span data-dcnode-id="4009" instrument_node="">" Guess what happens. Go on, guess.</span><ul data-dcnode-id="3977"><li data-dcnode-id="4004"><span data-dcnode-id="4008" instrument_node=""> One character, Verna Zee, is depicted in her initial appearance (in Book 1) as wearing "sensible shoes", which is </span><a class="twikilink" data-dcnode-id="4006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HaveAGayOldTime" title="/pmwiki/pmwiki.php/Main/HaveAGayOldTime"><span data-dcnode-id="4007" instrument_node="">UK slang for being a lesbian</span></a><span data-dcnode-id="4005" instrument_node="">. She is later described off-hand (in Book 2) as militant. Guess which character comes out as a lesbian in Book 3?</span></li><li data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node=""> Moishe tells Carpathia that "a sword shall pierce your head, and you shall surely die." Guess how the world leader gets whacked?</span></li><li data-dcnode-id="3991"><span data-dcnode-id="4001" instrument_node=""> Albie's death in </span><em data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">Armageddon</span></em><span data-dcnode-id="3998" instrument_node=""> is foreshadowed by Mainyu Mazda </span><a class="twikilink" data-dcnode-id="3996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TattooedCrook" title="/pmwiki/pmwiki.php/Main/TattooedCrook"><span data-dcnode-id="3997" instrument_node="">getting an M tattoo for the next person he has killed</span></a><span data-dcnode-id="3995" instrument_node="">, saying that </span><a class="twikilink" data-dcnode-id="3993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OhCrap" title="/pmwiki/pmwiki.php/Main/OhCrap"><span data-dcnode-id="3994" instrument_node="">sometimes he even gets them in advance</span></a><span data-dcnode-id="3992" instrument_node="">.</span></li><li data-dcnode-id="3978"><span data-dcnode-id="3990" instrument_node=""> At the end of </span><em data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="3987" instrument_node="">, Chaim tells Rayford that when the time comes for the </span><a class="twikilink" data-dcnode-id="3985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FinalBattle" title="/pmwiki/pmwiki.php/Main/FinalBattle"><span data-dcnode-id="3986" instrument_node="">Final Battle</span></a><span data-dcnode-id="3984" instrument_node=""> to take place between God and </span><a class="twikilink" data-dcnode-id="3982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LaResistance" title="/pmwiki/pmwiki.php/Main/LaResistance"><span data-dcnode-id="3983" instrument_node="">The Other Light</span></a><span data-dcnode-id="3981" instrument_node="">, that God will not need an army to fight. </span><a class="twikilink" data-dcnode-id="3979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CurbStompBattle" title="/pmwiki/pmwiki.php/Main/CurbStompBattle"><span data-dcnode-id="3980" instrument_node="">Take a wild guess as to how Lucifer and The Other Light made out.</span></a></li></ul></li><li data-dcnode-id="3968"><span data-dcnode-id="3975" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForgotICouldChangeTheRules" title="/pmwiki/pmwiki.php/Main/ForgotICouldChangeTheRules"><span data-dcnode-id="3974" instrument_node="">Forgot I Could Change the Rules</span></a><span data-dcnode-id="3972" instrument_node="">: Nicolae Carpathia is an expert in this trope. Case in point; in </span><em data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">Desecration</span></em><span data-dcnode-id="3969" instrument_node=""> after negotiating with Micah (Chaim Rosenzweig) in lifting Bowl Judgement No.1 (the plague of sores on those who took the mark), he sends the GC after the Jewish Remnant.</span></li><li data-dcnode-id="3954"><span data-dcnode-id="3967" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForTheEvulz" title="/pmwiki/pmwiki.php/Main/ForTheEvulz"><span data-dcnode-id="3966" instrument_node="">For the Evulz</span></a><span data-dcnode-id="3964" instrument_node="">: World War III breaks out as a simultaneous but ultimately ineffectual attempt at rebellion against the </span><a class="twikilink" data-dcnode-id="3962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneWorldGovernment" title="/pmwiki/pmwiki.php/Main/OneWorldGovernment"><span data-dcnode-id="3963" instrument_node="">Global Community</span></a><span data-dcnode-id="3961" instrument_node="">. After the initial retaliation, Carpathia orders several </span><a class="twikilink" data-dcnode-id="3959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NukeEm" title="/pmwiki/pmwiki.php/Main/NukeEm"><span data-dcnode-id="3960" instrument_node="">nuclear bombings</span></a><span data-dcnode-id="3958" instrument_node=""> of various cities, seemingly at random, for no particular discernible reason except because he can and he has an excuse. There might be an element of </span><a class="twikilink" data-dcnode-id="3956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo" title="/pmwiki/pmwiki.php/Main/BecauseDestinySaysSo"><span data-dcnode-id="3957" instrument_node="">Because Destiny Says So</span></a><span data-dcnode-id="3955" instrument_node=""> (because WWIII is prophesied to happen) but has little other than general evilness to motivate it outside of that.</span></li><li data-dcnode-id="3944"><span data-dcnode-id="3953" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForYourOwnGood" title="/pmwiki/pmwiki.php/Main/ForYourOwnGood"><span data-dcnode-id="3952" instrument_node="">For Your Own Good</span></a><span data-dcnode-id="3950" instrument_node="">: Mr. Wong is so determined for Chang to 'make proud,' that he even goes as far as to conspire with Walter Moon to have his son drugged and taken to the mark application site where Chang is given the </span><a class="twikilink" data-dcnode-id="3948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="3949" instrument_node="">Mark of the Beast</span></a><span data-dcnode-id="3947" instrument_node="">. Fortunately for Chang, he was a believer and </span><a class="twikilink" data-dcnode-id="3945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiveMeASign" title="/pmwiki/pmwiki.php/Main/GiveMeASign"><span data-dcnode-id="3946" instrument_node="">still had the Mark of God on his head.</span></a></li><li data-dcnode-id="3939"><span data-dcnode-id="3943" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FoxNewsLiberal" title="/pmwiki/pmwiki.php/Main/FoxNewsLiberal"><span data-dcnode-id="3942" instrument_node="">Fox News Liberal</span></a><span data-dcnode-id="3940" instrument_node="">: We get the occasional sympathetically intended character who aren't WASPs steeped in premillenial dispensationalist Christian culture. But in case of conflict between their own supposed culture and belief systems and the believes of PMD Christians, they always agree with the PMD's. Tsion Ben-Judah, the PMD-Jew, is probably the worst offender.</span></li><li data-dcnode-id="3934"><span data-dcnode-id="3938" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FrameUp" title="/pmwiki/pmwiki.php/Main/FrameUp"><span data-dcnode-id="3937" instrument_node="">Frame-Up</span></a><span data-dcnode-id="3935" instrument_node="">: Buck Williams is framed for the murder of his associate Alan Tompkins, who was killed by a car bomb. Nicolae Carpathia helps clear Buck's name from the incident by ultimately having the architect of the crime Joshua Todd-Cothran murdered along with Jonathan Stonagal.</span></li><li data-dcnode-id="3929"><span data-dcnode-id="3933" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Franks2000InchTV" title="/pmwiki/pmwiki.php/Main/Franks2000InchTV"><span data-dcnode-id="3932" instrument_node="">Frank's 2000-Inch TV</span></a><span data-dcnode-id="3930" instrument_node="">: A team of computer experts were able to project images onto a screen several stories high for all the people at Petra to watch and read in the later books.</span></li><li data-dcnode-id="3915"><span data-dcnode-id="3928" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FromACertainPointOfView" title="/pmwiki/pmwiki.php/Main/FromACertainPointOfView"><span data-dcnode-id="3927" instrument_node="">From a Certain Point of View</span></a><span data-dcnode-id="3925" instrument_node="">: In </span><em data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">Desecration</span></em><span data-dcnode-id="3922" instrument_node="">, Nicolae undergoes a polygraph test, with Suhail Akbar overseeing the questioning. When it is obvious that Carpathia had blatantly lied throughout the test, he tells Suhail that "the truth is what I say it is...I am the father of truth."</span><ul data-dcnode-id="3916"><li data-dcnode-id="3917"><span data-dcnode-id="3921" instrument_node=""> Although some of his answers concerning his loyalty to the people serving under him could be considered the actual truth given that he is </span><a class="twikilink" data-dcnode-id="3919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheAntichrist" title="/pmwiki/pmwiki.php/Main/TheAntichrist"><span data-dcnode-id="3920" instrument_node="">The Antichrist</span></a><span data-dcnode-id="3918" instrument_node=""> and that all he really cares about is being worshiped. The only reason he would need to care about anybody under him is to have worshipers, but Chaim as Micah does point out to Carpathia that he worships himself, so with that in mind, everyone under Carpathia is expendable.</span></li></ul></li><li data-dcnode-id="3901"><span data-dcnode-id="3914" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FromNobodyToNightmare" title="/pmwiki/pmwiki.php/Main/FromNobodyToNightmare"><span data-dcnode-id="3913" instrument_node="">From Nobody to Nightmare</span></a><span data-dcnode-id="3911" instrument_node="">: Nicolae Jetty Carpathia, natch. He started out as a businessman running his own import-export business. Then he gets into politics, serving in the Lower House of the Romanian Parliament, and ascends to President of Romania (thanks to Leon Fortunato, who had blackmailed Carpathia's predecessor to step down). After the Rapture, he is tapped to become the Secretary General of the United Nations, which he will change into the Global Community, with himself as the Supreme Potentate and ultimately, </span><a class="twikilink" data-dcnode-id="3909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheAntiChrist" title="/pmwiki/pmwiki.php/Main/TheAntiChrist"><span data-dcnode-id="3910" instrument_node="">The Beast</span></a><span data-dcnode-id="3908" instrument_node="">.</span><ul data-dcnode-id="3902"><li data-dcnode-id="3903"><span data-dcnode-id="3907" instrument_node=""> Leonardo Fortunato also fits this trope. Former businessman/kingmaker to Nicolae Carpathia, later the Supreme Commander of the Global Community. After Carpathia's resurrection, he is made the Most High Reverend Father of Carpathianism, ultimately becoming </span><a class="twikilink" data-dcnode-id="3905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDragon" title="/pmwiki/pmwiki.php/Main/TheDragon"><span data-dcnode-id="3906" instrument_node="">the False Prophet</span></a><span data-dcnode-id="3904" instrument_node=""> that The Bible has foretold.</span></li></ul></li><li data-dcnode-id="3893"><span data-dcnode-id="3900" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GhostCity" title="/pmwiki/pmwiki.php/Main/GhostCity"><span data-dcnode-id="3899" instrument_node="">Ghost City</span></a><span data-dcnode-id="3897" instrument_node="">: Chicago was left a ghost city in the book series after World War III and the Sixth Seal Judgment, and was mostly ignored by the GC due to fake reports of it being full of nuclear radiation until </span><em data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">The Remnant</span></em><span data-dcnode-id="3894" instrument_node="">. While the Tribulation Force was headquartered in the Strong Building during this time, Chloe Williams found survivors of an underground church group called The Place and helped them to escape the city before it was nuked.</span></li><li data-dcnode-id="3882"><span data-dcnode-id="3892" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiantWallOfWateryDoom" title="/pmwiki/pmwiki.php/Main/GiantWallOfWateryDoom"><span data-dcnode-id="3891" instrument_node="">Giant Wall of Watery Doom</span></a><span data-dcnode-id="3889" instrument_node="">: In the Dramatic Audio version of </span><em data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Soul Harvest</span></em><span data-dcnode-id="3886" instrument_node="">, one of the Christians on board a cruise liner in the middle of the ocean barely has time to lead the people in </span><a class="twikilink" data-dcnode-id="3884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SayYourPrayers" title="/pmwiki/pmwiki.php/Main/SayYourPrayers"><span data-dcnode-id="3885" instrument_node="">a prayer of salvation</span></a><span data-dcnode-id="3883" instrument_node=""> before a giant wave of water caused from the impact of a giant mountain crashing into the seas (one of God's Trumpet Judgments) reaches the ship.</span></li><li data-dcnode-id="3872"><span data-dcnode-id="3881" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GiveMeASign" title="/pmwiki/pmwiki.php/Main/GiveMeASign"><span data-dcnode-id="3880" instrument_node="">Give Me a Sign</span></a><span data-dcnode-id="3878" instrument_node="">:</span><ul data-dcnode-id="3873"><li data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node=""> The Seal of God, which identifies the believers from one another. Once you become a believer, you are pretty much safe for eternity.</span></li><li data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node=""> The Sign of The Son of Man, which is a cross made out of lightning, and has the ability to heal the sick and injured.</span></li></ul></li><li data-dcnode-id="3856"><span data-dcnode-id="3871" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GlobalCurrency" title="/pmwiki/pmwiki.php/Main/GlobalCurrency"><span data-dcnode-id="3870" instrument_node="">Global Currency</span></a><span data-dcnode-id="3868" instrument_node="">: With the one-world government being set up, Nicolae Carpathia standardizes the currency of the world, first reducing it to the Euro for Europe and Africa, the Yen for Asia, and the Dollar for the Americas and Australia, and then finally reducing it to just the dollar, renamed the Nick (after himself). It quickly allows for him to get the world's governments under his control with a semi-communist approach to government.</span><ul data-dcnode-id="3857"><li data-dcnode-id="3863"><span data-dcnode-id="3867" instrument_node=""> Eventually, the "</span><a class="twikilink" data-dcnode-id="3865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="3866" instrument_node="">mark of loyalty</span></a><span data-dcnode-id="3864" instrument_node="">" utilizes a credit system that makes all cash simply pieces of paper or bits of metal, and the currency is done away with.</span></li><li data-dcnode-id="3858"><span data-dcnode-id="3862" instrument_node=""> In </span><em data-dcnode-id="3860"><span data-dcnode-id="3861" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="3859" instrument_node="">, we are given a little quip about how the protagonists are wondering what currency the Millennial Kingdom will be run on, but the mystery is never shared with the readers. Though it appears there is no currency, and everyone gives and does out of the goodness of their hearts.</span></li></ul></li><li data-dcnode-id="3842"><span data-dcnode-id="3855" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GlobalWarming" title="/pmwiki/pmwiki.php/Main/GlobalWarming"><span data-dcnode-id="3854" instrument_node="">Global Warming</span></a><span data-dcnode-id="3852" instrument_node="">: In </span><em data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">The Remnant</span></em><span data-dcnode-id="3849" instrument_node="">, one of God's Bowl Judgments is this on a scale that is very lethal to both the undecided and those who have taken the </span><a class="twikilink" data-dcnode-id="3847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="3848" instrument_node="">Mark of the Beast</span></a><span data-dcnode-id="3846" instrument_node=""> and worshiped Carpathia's image. It causes the polar ice caps to melt, raising the sea level and causing the dead carcasses of sea animals from a previous Bowl Judgment to wash further inward. It lasts until God causes a supernatural </span><a class="twikilink" data-dcnode-id="3844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBlackout" title="/pmwiki/pmwiki.php/Main/BigBlackout"><span data-dcnode-id="3845" instrument_node="">Big Blackout</span></a><span data-dcnode-id="3843" instrument_node=""> in New Babylon with His next Bowl Judgment.</span></li><li data-dcnode-id="3837"><span data-dcnode-id="3841" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AGodAmI" title="/pmwiki/pmwiki.php/Main/AGodAmI"><span data-dcnode-id="3840" instrument_node="">A God Am I</span></a><span data-dcnode-id="3838" instrument_node="">: Nicolae Carpathia fancies himself this after Satan takes control.</span></li><li data-dcnode-id="3832"><span data-dcnode-id="3836" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodEmperor" title="/pmwiki/pmwiki.php/Main/GodEmperor"><span data-dcnode-id="3835" instrument_node="">God-Emperor</span></a><span data-dcnode-id="3833" instrument_node="">: Nicolae Carpathia claims to be this during the Tribulation, and Jesus Christ is simply this during the Millennial Reign.</span></li><li data-dcnode-id="3827"><span data-dcnode-id="3831" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GodInHumanForm" title="/pmwiki/pmwiki.php/Main/GodInHumanForm"><span data-dcnode-id="3830" instrument_node="">God in Human Form</span></a><span data-dcnode-id="3828" instrument_node="">: Jesus, only here He returns in his true form. Nicolae Carpathia only claims to be this in the second half of the Tribulation, but is really indwelt by Satan.</span></li><li data-dcnode-id="3814"><span data-dcnode-id="3826" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodbyeCruelWorld" title="/pmwiki/pmwiki.php/Main/GoodbyeCruelWorld"><span data-dcnode-id="3825" instrument_node="">Goodbye, Cruel World!</span></a><span data-dcnode-id="3823" instrument_node="">: Said verbatim by Mac while he discusses the plan to escape New Babylon with David and Hannah to avoid taking the </span><a class="twikilink" data-dcnode-id="3821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MarkOfTheBeast" title="/pmwiki/pmwiki.php/Main/MarkOfTheBeast"><span data-dcnode-id="3822" instrument_node="">mark of loyalty</span></a><span data-dcnode-id="3820" instrument_node="">.</span><div class="indent" data-dcnode-id="3815"><span data-dcnode-id="3819" instrument_node=""> </span><strong data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">Mac:</span></strong><span data-dcnode-id="3816" instrument_node=""> "...Well, forgive the painful subject, but we recently lost our cargo chief. She would have prohibited that much weight on that particular plane, but me bein' a veteran, I thought it would handle it. Flyin' it remote and also broadcasting from it remote, I start hollerin' about a weight shift, cargo rolling, hard to control, Mayday, mayday, goodbye cruel world."</span></div></li><li data-dcnode-id="3801"><span data-dcnode-id="3813" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoodIsNotSoft" title="/pmwiki/pmwiki.php/Main/GoodIsNotSoft"><span data-dcnode-id="3812" instrument_node="">Good Is Not Soft</span></a><span data-dcnode-id="3810" instrument_node="">: Both God and Jesus didn't have any second thoughts about </span><a class="twikilink" data-dcnode-id="3808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam" title="/pmwiki/pmwiki.php/Main/HeelFaceDoorSlam"><span data-dcnode-id="3809" instrument_node="">sending those who took the Mark of the Beast</span></a><span data-dcnode-id="3807" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeutralityBacklash" title="/pmwiki/pmwiki.php/Main/NeutralityBacklash"><span data-dcnode-id="3806" instrument_node="">and the undecided to be tortured in Hell forever</span></a><span data-dcnode-id="3804" instrument_node="">, although that didn't mean </span><a class="twikilink" data-dcnode-id="3802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WasTooHardOnHim" title="/pmwiki/pmwiki.php/Main/WasTooHardOnHim"><span data-dcnode-id="3803" instrument_node="">they really enjoy it.</span></a></li><li data-dcnode-id="3796"><span data-dcnode-id="3800" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGoodKing" title="/pmwiki/pmwiki.php/Main/TheGoodKing"><span data-dcnode-id="3799" instrument_node="">The Good King</span></a><span data-dcnode-id="3797" instrument_node="">: Jesus Christ, as He restored the world after it was devastated during the Tribulation.</span></li><li data-dcnode-id="3786"><span data-dcnode-id="3795" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Gorn" title="/pmwiki/pmwiki.php/Main/Gorn"><span data-dcnode-id="3794" instrument_node="">Gorn</span></a><span data-dcnode-id="3792" instrument_node="">: Several deaths have a hefty amount of detail, and this goes into </span><a class="twikilink" data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UpToEleven" title="/pmwiki/pmwiki.php/Main/UpToEleven"><span data-dcnode-id="3791" instrument_node="">Up to Eleven</span></a><span data-dcnode-id="3789" instrument_node=""> territory when </span><span class="spoiler" data-dcnode-id="3787" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3788" instrument_node=""> Jesus shows up and his very words cause entire armies to explode in rivers of gore.</span></span></li><li data-dcnode-id="3778"><span data-dcnode-id="3785" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoryDiscretionShot" title="/pmwiki/pmwiki.php/Main/GoryDiscretionShot"><span data-dcnode-id="3784" instrument_node="">Gory Discretion Shot</span></a><span data-dcnode-id="3782" instrument_node="">: In </span><em data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">Armageddon</span></em><span data-dcnode-id="3779" instrument_node="">, Chloe William's televised death was purposely blanked out on the screen by the angel of the Lord.</span></li><li data-dcnode-id="3774"><span data-dcnode-id="3777" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GovernmentConspiracy" title="/pmwiki/pmwiki.php/Main/GovernmentConspiracy"><span data-dcnode-id="3776" instrument_node="">Government Conspiracy</span></a></li><li data-dcnode-id="3763"><span data-dcnode-id="3773" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrandpaGod" title="/pmwiki/pmwiki.php/Main/GrandpaGod"><span data-dcnode-id="3772" instrument_node="">Grandpa God</span></a><span data-dcnode-id="3770" instrument_node="">: The series' depiction of God in the form of Jesus Christ, based on the </span><a class="twikilink" data-dcnode-id="3768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/BookOfRevelation" title="/pmwiki/pmwiki.php/Literature/BookOfRevelation"><span data-dcnode-id="3769" instrument_node="">Book of Revelation</span></a><span data-dcnode-id="3767" instrument_node="">. Notably in the Dramatic Audio version of </span><em data-dcnode-id="3765"><span data-dcnode-id="3766" instrument_node="">Glorious Appearing</span></em><span data-dcnode-id="3764" instrument_node="">, it doesn't stop Naomi Tiberias from commenting on how handsome He is.</span></li><li data-dcnode-id="3755"><span data-dcnode-id="3762" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GratuitousForeignLanguage" title="/pmwiki/pmwiki.php/Main/GratuitousForeignLanguage"><span data-dcnode-id="3761" instrument_node="">Gratuitous Hebrew:</span></a><span data-dcnode-id="3759" instrument_node=""> What everyone is speaking in </span><em data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="3756" instrument_node="">, though for the sake of the readers it's all translated into whatever language the book is published in.</span></li><li data-dcnode-id="3744"><span data-dcnode-id="3754" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrowOldWithMe" title="/pmwiki/pmwiki.php/Main/GrowOldWithMe"><span data-dcnode-id="3753" instrument_node="">Grow Old with Me</span></a><span data-dcnode-id="3751" instrument_node="">: Kenny Bruce Williams and Ekaterina Risto in the book </span><em data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">Kingdom Come</span></em><span data-dcnode-id="3748" instrument_node=""> grow old throughout the entire Millennial Kingdom period as a married couple, as do all naturals who become believers </span><a class="twikilink" data-dcnode-id="3746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathsHourglass" title="/pmwiki/pmwiki.php/Main/DeathsHourglass"><span data-dcnode-id="3747" instrument_node="">before their 100th birthday</span></a><span data-dcnode-id="3745" instrument_node="">. By the time the Millennium ends, even the longest-living naturals who become believers revert to the prime of their adult youth as they receive their glorified bodies.</span></li><li data-dcnode-id="3702"><span data-dcnode-id="3743" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HappilyMarried" title="/pmwiki/pmwiki.php/Main/HappilyMarried"><span data-dcnode-id="3742" instrument_node="">Happily Married</span></a><span data-dcnode-id="3740" instrument_node="">: Buck and Chloe Williams may have their disagreements, but they are very happy together.</span><ul data-dcnode-id="3703"><li data-dcnode-id="3728"><span data-dcnode-id="3739" instrument_node=""> The marriage is now platonic as both Buck and Chloe are glorifieds in </span><em data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">Kingdom Come.</span></em><ul data-dcnode-id="3729"><li data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node=""> This goes along with what Jesus said in Scripture that those who are worthy of the resurrection "will neither marry nor be given in marriage, but will be like the angels in heaven".</span></li><li data-dcnode-id="3730"><span data-dcnode-id="3734" instrument_node=""> Their relationship </span><em data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">pre</span></em><span data-dcnode-id="3731" instrument_node="">-marriage was largely platonic as well, with neither party seeming interested in physical intimacy of any significant degree beyond occasionally holding hands or sharing cookies.</span></li></ul></li><li data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node=""> For the short time they were married, Rayford and Amanda were very happy.</span></li><li data-dcnode-id="3722"><span data-dcnode-id="3725" instrument_node=""> Subverted big time with Sorin and Marilena Carpathia, as their marriage was one of convenience. Marilena wanted kids. Sorin didn't, which made her easy pickings for </span><a class="twikilink" data-dcnode-id="3723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDarkChick" title="/pmwiki/pmwiki.php/Main/TheDarkChick"><span data-dcnode-id="3724" instrument_node="">Viviana Ivansova - the future Viv Ivins.</span></a></li><li data-dcnode-id="3714"><span data-dcnode-id="3721" instrument_node=""> Judd Thompson, Jr. and Vicki Byrnes of </span><em data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">Left Behind: The Kids</span></em><span data-dcnode-id="3718" instrument_node=""> also became a couple, as did Ming Toy and Ree Woo in the main series, and Kenny and Ekaterina in </span><em data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">Kingdom Come</span></em><span data-dcnode-id
