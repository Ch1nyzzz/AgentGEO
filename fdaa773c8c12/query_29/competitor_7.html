</span><span class="readable" data-dcnode-id="2056" id="reviewTextContainer3536061821"><span data-dcnode-id="2092" instrument_node="">
</span><span data-dcnode-id="2088" id="freeTextContainer8135262359492576366"><span data-dcnode-id="2091" instrument_node="">Patents and copyright are justified with a question, "Why would people innovate if they didn't expect to gain?» At first glance this argument sounds like common sense; however, if we dig a little we quickly understand that this is "lawyer logic". That is, it is a story that conveniently has lawyers legitimacy reinforced. </span><br data-dcnode-id="2090"><span data-dcnode-id="2089" instrument_node="">Economics teaches us to think in a rather different manner. The narrow interest versus broad interests, specifically for two sides that have equivalent interests, the side that </span></span><span data-dcnode-id="2087" instrument_node="">
</span><span data-dcnode-id="2061" id="freeText8135262359492576366" style="display:none"><span data-dcnode-id="2086" instrument_node="">Patents and copyright are justified with a question, "Why would people innovate if they didn't expect to gain?» At first glance this argument sounds like common sense; however, if we dig a little we quickly understand that this is "lawyer logic". That is, it is a story that conveniently has lawyers legitimacy reinforced. </span><br data-dcnode-id="2085"><span data-dcnode-id="2084" instrument_node="">Economics teaches us to think in a rather different manner. The narrow interest versus broad interests, specifically for two sides that have equivalent interests, the side that has the narrowest base has an advantage. It is simply easier to coordinate their interests. The lawyers are an example of such a narrow coalition. So if you think the question is sufficient to justify patents, the narrow interests are winning. </span><br data-dcnode-id="2083"><span data-dcnode-id="2082" instrument_node="">A more neutral framing can be presented, one such formulation could be "do most innovations occur faster with or without patents?". Note that this question doesn't have the conclusion baked into it. An infamous paper shows that the more innovation is sequential, the more likely it is that patents will slow down it down. The logic here is really quite simple, it may be true that the next innovation will be created faster with patents, but the innovation that improves on this innovation may be created slower because there is a decreased incentive to work on a patented invention. </span><br data-dcnode-id="2081"><span data-dcnode-id="2080" instrument_node="">This is the reason the sequentiality of innovation is such a contested territory. If one can show that innovation is a highly sequential phenomenon, then the lawyer logic is under attack. Matt Ridley's book is an important contribution to this debate. In "How Innovation works", Ridley isn't interested in the theory of the debate, he wants to stick to what is important, the innovations.</span><br data-dcnode-id="2079"><span data-dcnode-id="2078" instrument_node="">His book reads like a series of short stories, indeed hundreds, about many different innovations. He attempts the impossible task of trying to classify them, in the beginning, he classifies them by industry (transport, health, food, energy) but by chapter 5 this approach is already limiting its limit, he then has a chapter on pre-historic innovations and low technology innovations. </span><br data-dcnode-id="2077"><span data-dcnode-id="2076" instrument_node="">Ridley doesn't just focus on debunking the lawyer argument through the sequentiality argument. A running theme throughout the book is that people seem to be motivated by creating in itself, indeed the academics are usually the exception with their litigating behavior. The problem itself is academic; the working moto when it comes to evaluating innovation is "if I can't measure it, it isn't there".</span><br data-dcnode-id="2075"><span data-dcnode-id="2074" instrument_node="">He makes a rather sharp distinction early on, invention is not innovation. The person who brings the product to market and changes the norm is the innovator. According to Ridley, if patents were always given to innovations then they would be less harmful, the problem is that an innovation is defined ex-post; it isn't possible to know which invention will turn out to be an innovation. As such most patents are given on things that never had any potential to generate revenue. An invention may or not turn out to be ready for the market, if it isn't ready, then protecting it can only slow down the invention that will be able to penetrate the market. </span><br data-dcnode-id="2073"><span data-dcnode-id="2072" instrument_node="">Except for the sequentiality and the motivation of entrepreneurs, an important reason to undermine the lawyers’ argument for patents is the pushing of inferior products. In a world without patents, firms have an incentive to search the best possible product for any given end and then attempt to sell that product. In a world with patents, firms have an incentive to sell the products that are protected. A safer more effective drug will not be pushed over a less effective and more dangerous one because they have property rights over the latter and not the former. </span><br data-dcnode-id="2071"><br data-dcnode-id="2070"><span data-dcnode-id="2069" instrument_node="">It is not until page 240 that Ridley takes a break from his short stories to try and synthesizes what has been learnt so far. He also briefly stops by the economic literature to take a few digs at Mariana Mazzucato (who thinks the government is an important source of innovative activity). Perhaps the most fun chapter in the whole book is kept for the ending,"fake" innovations, with some absurd stories, such as Elizabeth Holmes faking her way into becoming a billionaire as well as becoming Obama's ambassador of global entrepreneurship. </span><br data-dcnode-id="2068"><span data-dcnode-id="2067" instrument_node="">The elephant in the room is how come patents are so pervasive? While part of the story is the narrow versus wide interests. An even bigger part of the story is the United States forcing it upon others. Ridley’s book is rife with examples of both historical and contemporary interest with examples ranging from why coffee is subversive to the public good, European regulations being dictated by German manufacturers of vacuum cleaners, and how much Ridley's ancestors were paying in patent fees.</span><br data-dcnode-id="2066"><span data-dcnode-id="2065" instrument_node="">The book isn't perfect there are some important areas that are not expounded upon. Though household innovation as a concept is sprinkled throughout the book it is never quite given due credit in the conclusion. In some places Ridley is rather too cautious, he correctly claims there is no evidence that patents increase the rate of innovative drugs but does not advocate for the abolition of the patent system. The inverse problem occurs when he is discussing GMO’s(Genetically Modified Organisms), he does not sufficiently explore the problems raised which are both about the combinatorial nature of the disease and about the industry structure which has the potential to increase the cost of errors. </span><br data-dcnode-id="2064"><span data-dcnode-id="2063" instrument_node="">Nevertheless, Matt Ridley makes a powerful contribution to the debate by sticking to the stories. Innovation is a bottom-up process; no single mind is guiding it. Innovation can only emerge when the cost of errors is low and so Matt Ridley is on the correct side of the issue when he says "evolution" not "revolution".</span><br data-dcnode-id="2062"></span><span data-dcnode-id="2060" instrument_node="">

</span><span data-dcnode-id="1879" id="freeText16556089820522407788" style="display:none"><span data-dcnode-id="1889" instrument_node="">Disappointingly unbalanced and altogether too biased in his political outlook. Ridley is a better writer than this, but he has allowed his ideological prejudices to dominate his material. Because he chooses to explore only half of the story in so many cases and deliberately to ignore the counter-arguments, the end product is an interesting thesis which is disappointingly one-sided.</span><br data-dcnode-id="1888"><br data-dcnode-id="1887"><span data-dcnode-id="1886" instrument_node="">One example to illustrate this, he rails against the shortcomings of regulation, but the reason regulation was introduced in the first place was because of the predatory business practices of the likes of Rockefeller and Standard Oil. Ridley never breathes a word about the benefits of regulation when done well. This whole book reads as a polemic, not a balanced work of honest inquiry.</span><br data-dcnode-id="1885"><br data-dcnode-id="1884"><span data-dcnode-id="1883" instrument_node="">Ridley also fails to give any substantial account of China and why, despite a complete lack of any political freedom, China seems to be producing advances in many fields. He touches on this subject briefly in the closing pages, but only in passing. Surely this deserves a much more thorough investigation. </span><br data-dcnode-id="1882"><br data-dcnode-id="1881"><span data-dcnode-id="1880" instrument_node="">Overall there are some excellent anecdotes and case studies, but his ideological blind-spots, he is sneeringly dismissive of renewable energy for example, make it a frustrating rather than a satisfying read.</span></span><span data-dcnode-id="1878" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="1614" title="liked it"><span class="staticStar p10" data-dcnode-id="1619" size="15x15"><span data-dcnode-id="1620" instrument_node="">liked it</span></span><span class="staticStar p10" data-dcnode-id="1618" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1617" size="15x15"></span><span class="staticStar p0" data-dcnode-id="1616" size="15x15"></span><span class="staticStar p0" data-dcnode-id="1615" size="15x15"></span></span><span data-dcnode-id="1613" instrument_node="">

</span><span data-dcnode-id="1607" id="freeTextContainer13600594270175042348"><span data-dcnode-id="1608" instrument_node="">This book was my first foray into non-fiction this year.   I believe that human beings, with our incessant need for order and meaning, are obsessed with stories and the deeper meaning that lie behind them. This is exactly why I prefer learning about abstract concepts narrated through a well fleshed out story where the ensconced idea gets communicated in a much better manner as opposed to works of non-fictions where they’re presented, cooked and cleaned, with minimal seasoning to make it palatabl</span></span><span data-dcnode-id="1606" instrument_node="">
</span><span data-dcnode-id="1588" id="freeText13600594270175042348" style="display:none"><span data-dcnode-id="1605" instrument_node="">This book was my first foray into non-fiction this year.   I believe that human beings, with our incessant need for order and meaning, are obsessed with stories and the deeper meaning that lie behind them. This is exactly why I prefer learning about abstract concepts narrated through a well fleshed out story where the ensconced idea gets communicated in a much better manner as opposed to works of non-fictions where they’re presented, cooked and cleaned, with minimal seasoning to make it palatable for the masses.</span><br data-dcnode-id="1604"><br data-dcnode-id="1603"><span data-dcnode-id="1602" instrument_node="">Matt Ridley has used the narratorial approach to his advantage when grappling the seemingly open ended question of how innovation works. The book is neatly broken down into two logical sections - the stories and the lessons. In the story section, the author artfully chronicles a series of stories about innovations in the fields of energy creation, public health, transport, food and communication among many others. He has sequenced them in such a manner so as to highlight the impacts that earlier innovations had on later ones. In addition, he has beautifully sprinkled nuggets of analysis throughout these stories, with each story serving to highlight some crucial aspect of innovation. The second part is more academic where the ideas highlighted in the first part are taken and analysed in isolation, with small substantiating examples thrown in to strengthen their case. </span><br data-dcnode-id="1601"><br data-dcnode-id="1600"><span data-dcnode-id="1599" instrument_node="">I’m a big fan of “meta-analysis”, whereby seemingly disconnected stories are analysed to assess and ascertain the pattern that pervades all of them. The author has done an excellent job of distilling innovation and the plethora of pervading factors, from what begets it, to what inhibits it, using a multitude of tales spread across multiple millennia.</span><br data-dcnode-id="1598"><br data-dcnode-id="1597"><span data-dcnode-id="1596" instrument_node="">Mainstream narratives have a tendency to paint innovations as breakthroughs brought about by cerebral beings performing extraordinary feats. The author makes a very strong case for why it is not the reality. The cycle of innovation is portrayed for what it is - a gradual process of incremental change where the accumulation of knowledge and experience lends itself to the production of better things. It's not a staccato of notes but a symphony.</span><br data-dcnode-id="1595"><br data-dcnode-id="1594"><span data-dcnode-id="1593" instrument_node="">The analysis of the influence of external entities (ex: governments), as well as the impact of regulations and patents also presents some interesting gems which seem to go against conventional beliefs.  The book does have its slow parts, with a few of the stories going into unnecessary side-tracks featuring a cast of characters who are nowhere to be found past their brief roles. Like most authors of nonfiction, Matt Ridley also slides into brief periods where points are bludgeoned to death, and sweeping generalisations are made on the shoulder of insufficient evidence.</span><br data-dcnode-id="1592"><br data-dcnode-id="1591"><span data-dcnode-id="1590" instrument_node="">Overall, I enjoyed the book and the author’s overarching efforts to distill patterns of innovation from multiple corners of history. I would recommend this to anyone looking for the unwritten rules and the untaught lessons that rule the world of innovators and their innovations.</span><br data-dcnode-id="1589"></span><span data-dcnode-id="1587" instrument_node="">

</span><span data-dcnode-id="1487" id="freeTextContainer13393174816609198774"><b data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">“Innovation is a collective phenomenon that happens between, not within, brains.”</span></b><br data-dcnode-id="1493"><br data-dcnode-id="1492"><span data-dcnode-id="1491" instrument_node="">Innovation is feeling more like a ‘buzzword’ than a thing that gets done. I hear it on the news, from politicians, at shareholders’ meetings and in mastermind groups. Everybody is talking about innovations and innovating, but I see little of it. Anywhere.</span><br data-dcnode-id="1490"><br data-dcnode-id="1489"><span data-dcnode-id="1488" instrument_node="">Sure, we got cool phones. Phones and what else? Since the advent of the internet there really has been no life altering innovations to speak of. My life looks a lot</span></span><span data-dcnode-id="1486" instrument_node="">
</span><span data-dcnode-id="1447" id="freeText13393174816609198774" style="display:none"><b data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">“Innovation is a collective phenomenon that happens between, not within, brains.”</span></b><br data-dcnode-id="1483"><br data-dcnode-id="1482"><span data-dcnode-id="1481" instrument_node="">Innovation is feeling more like a ‘buzzword’ than a thing that gets done. I hear it on the news, from politicians, at shareholders’ meetings and in mastermind groups. Everybody is talking about innovations and innovating, but I see little of it. Anywhere.</span><br data-dcnode-id="1480"><br data-dcnode-id="1479"><span data-dcnode-id="1478" instrument_node="">Sure, we got cool phones. Phones and what else? Since the advent of the internet there really has been no life altering innovations to speak of. My life looks a lot like my parents and grandparents. We work, buy houses, make babies, drive cars, pay bills, and watch football on the weekend. Where are the flying cars, the teleportation machines, the colonies on distant planets? Where are the innovations?</span><br data-dcnode-id="1477"><br data-dcnode-id="1476"><b data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">“A well-known attribute of innovation: accidental discovery.”</span></b><br data-dcnode-id="1473"><br data-dcnode-id="1472"><span data-dcnode-id="1471" instrument_node="">Matt Ridley, author of How Innovation Works - and Why it Flourishes in Freedom, has some answers. In his insightful and counterintuitive perspective of innovation, we get a glimpse deep into the innovation puzzle. We discover where it happens, how it happens, and why it isn’t really happening right now.</span><br data-dcnode-id="1470"><br data-dcnode-id="1469"><span data-dcnode-id="1468" instrument_node="">Ridley explains that the innovations that have shaped the modern age have been the primary reason for “both the dramatic improvement in our living standards and the unsettling changes in our society”. He walks us through the history of innovation regarding energy, public health, transportation, food and communication. The forces that shaped these innovations and the people that brought them to life.</span><br data-dcnode-id="1467"><br data-dcnode-id="1466"><b data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">“Anticipating what people want is something innovators are often good at.”</span></b><br data-dcnode-id="1463"><br data-dcnode-id="1462"><span data-dcnode-id="1461" instrument_node="">Ridley deconstructs the nature of the innovation process. Its essential elements and the lack thereof. The economic implications of and for innovation. Why our nature is resistant to innovation and the many reasons, our institutions are so bad at innovating.</span><br data-dcnode-id="1460"><br data-dcnode-id="1459"><span data-dcnode-id="1458" instrument_node="">Most interesting, however, is Ridley's look at what he calls the ‘innovation famine’. It is here that How Innovation Works really shines. Looking hard at the facts that show how western countries have handcuffed themselves from innovating and aside from the tech ‘blip’ that was the golden decade in Silicon Valley, North America and Europe are not set up to innovate in any meaningful way in the future.</span><br data-dcnode-id="1457"><br data-dcnode-id="1456"><span data-dcnode-id="1455" instrument_node="">We are all innovators at heart. We innovate throughout the day by making small tweaks and changes to the things we buy and use to make them more efficient and effective for us as individuals. For our innovation to have an impact beyond ourselves and have them make real positive change in society at large we need to share our tinkering, and start thinking more about innovation and ways it can flourish and talk less about innovation. We need more getting innovation done and less talking about it.</span><br data-dcnode-id="1454"><br data-dcnode-id="1453"><span data-dcnode-id="1452" instrument_node="">Overall Score: 3.9 / 5.0</span><br data-dcnode-id="1451"><br data-dcnode-id="1450"><span data-dcnode-id="1449" instrument_node="">In a Sentence: How innovation works and why it is no longer working.</span><br data-dcnode-id="1448"></span><span data-dcnode-id="1446" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="1378" title="it was amazing"><span class="staticStar p10" data-dcnode-id="1383" size="15x15"><span data-dcnode-id="1384" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="1382" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1381" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1380" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1379" size="15x15"></span></span><span data-dcnode-id="1377" instrument_node="">

</span><span data-dcnode-id="1368" id="freeTextContainer1997340722971534955"><span data-dcnode-id="1372" instrument_node="">I first read Matt Ridley’s “The Rational Optimist” and was hooked on his writing then. With “How innovation works” I had high expectations and wasn’t disappointed. </span><br data-dcnode-id="1371"><br data-dcnode-id="1370"><span data-dcnode-id="1369" instrument_node="">This book covered the mysterious path in the way innovation works (after invention) and how it generally differs from the stories we tell of sole innovations coming up with “Eureka” moments and huge breakthroughs. Innovation is more likely to come from trial and error, involve incremental change and be arrived at the same, or similar,</span></span><span data-dcnode-id="1367" instrument_node="">
</span><span data-dcnode-id="1337" id="freeText1997340722971534955" style="display:none"><span data-dcnode-id="1366" instrument_node="">I first read Matt Ridley’s “The Rational Optimist” and was hooked on his writing then. With “How innovation works” I had high expectations and wasn’t disappointed. </span><br data-dcnode-id="1365"><br data-dcnode-id="1364"><span data-dcnode-id="1363" instrument_node="">This book covered the mysterious path in the way innovation works (after invention) and how it generally differs from the stories we tell of sole innovations coming up with “Eureka” moments and huge breakthroughs. Innovation is more likely to come from trial and error, involve incremental change and be arrived at the same, or similar, time by many players. There is almost a time in world history where innovation is ripe. “Innovation is ripe for the moment.” It is a “gradual, incremental, collective and innovative process”. </span><br data-dcnode-id="1362"><br data-dcnode-id="1361"><span data-dcnode-id="1360" instrument_node="">Innovation does not generally come in breakthroughs which make better stories because people seem to prefer to be thought of as brilliant rather than hard working. </span><br data-dcnode-id="1359"><br data-dcnode-id="1358"><span data-dcnode-id="1357" instrument_node="">Rather than list the stories of how innovation occurs, Matt Ripley digs into examples of innovation across a number of sectors – Energy, Health, Transportation, Food, Low technology, Computing and Communications and Prehistoric innovation – to come up with unified theory of innovation. </span><br data-dcnode-id="1356"><br data-dcnode-id="1355"><span data-dcnode-id="1354" instrument_node="">I learned a lot from this analysis including some new insights into things I already knew. For example, I learned why the Arabic numbering system, as utilized by the Indians, was much ore effective than the Roman numbering system. Further it was Fibonachi who introduced this numeric innovation – including the use of zeros – through his busines in North Africa. Without this innovation it was virtually impossible to do multiplication using Roman numerals. </span><br data-dcnode-id="1353"><br data-dcnode-id="1352"><span data-dcnode-id="1351" instrument_node="">With regard to collaborative innovation a good example is the computer. No one person can claim to be the innovator who brought forth the computer. It was clearly an iterative and gradual process, moving forward. </span><br data-dcnode-id="1350"><br data-dcnode-id="1349"><span data-dcnode-id="1348" instrument_node="">Also within prehistoric innovation lactose tolerant mutations came about in Europe after animals became domesticated </span><br data-dcnode-id="1347"><br data-dcnode-id="1346"><span data-dcnode-id="1345" instrument_node="">Interestingly Matt Ridley argues that Intellectual Property (IP) protection is a hinderance for innovation. He makes a convincing case of this. One of the examples he uses was a beaver being given credit for the Hoover Dam. It was an extreme example, but an interesting one just the same. </span><br data-dcnode-id="1344"><br data-dcnode-id="1343"><span data-dcnode-id="1342" instrument_node="">Finally he argues that innovation is the child of freedom. It thoughts in areas where people are free to try and fail before they succeed. “Innovation truly is the child of freedom and the parent of prosperty”. </span><br data-dcnode-id="1341"><br data-dcnode-id="1340"><span data-dcnode-id="1339" instrument_node="">Overall this is a great read. Full marks again Mr. Ridley! </span><br data-dcnode-id="1338"></span><span data-dcnode-id="1336" instrument_node="">

</span><span data-dcnode-id="1226" id="freeText14007480346698159536" style="display:none"><span data-dcnode-id="1238" instrument_node="">Innovation is necessary for living flourishing lives and innovation requires freedom to flourish. This is the overall theme of Ridley's latest book. Ridley goes through the history of many essential innovations in energy production, medicine, transportation, food, communication, and more. He distinguishes between innovation and invention: arguing that often the innovations are more important than the invention. The innovations are often what makes a barely workable prototype into a practical and effective tool for our lives. Another important aspect of innovation he explores through out the book is the idea that innovators are more often than not people outside of the status quo: they are not the respected scientists of the day, but tinkerers looking for a way to do something a little better, a littler quicker, and little more effectively. Often innovations predate the developed scientific understanding of the innovation itself and help lead the scientists and theoreticians towards that understanding. This is part of why innovation is so unpredictable: we are often not paying attention to the area from which the innovation will come.</span><br data-dcnode-id="1237"><br data-dcnode-id="1236"><span data-dcnode-id="1235" instrument_node="">One of central features of innovation, argues Ridley, is trial and error experimentation. The innovators need the freedom to think outside of the box, to try and to experiment. And to try again and again after they fail. This is why freedom is so important to innovation. Where freedom is curtailed, this experimentation is curtailed as well. If people are afraid to fail, then they won't innovate.</span><br data-dcnode-id="1234"><br data-dcnode-id="1233"><span data-dcnode-id="1232" instrument_node="">He discusses various kinds of impediments to this freedom to try: often from governments of course, but from other sources as well. In this vein he looks at intellectual property (copyrights and patents) as one such impediment. I am not convinced he makes the case here for their abolition, but I am persuaded that the ways in which we grant and deal with IP needs reform.</span><br data-dcnode-id="1231"><br data-dcnode-id="1230"><span data-dcnode-id="1229" instrument_node="">Overall, it's a fascinating look at the history of innovation and innovators. </span><br data-dcnode-id="1228"><br data-dcnode-id="1227"></span><span data-dcnode-id="1225" instrument_node="">

</span><span data-dcnode-id="1138" id="freeTextContainer2483670661736170088"><span data-dcnode-id="1142" instrument_node="">Honestly this is more like a 3.75, and this is one you’ll want to read with a pen. TLDR; Ignore the inflammatory title (UPDATE: the title in the UK was How Innovation Works: and Why It Flourishes In Freedom). I’d take this book with a grain of salt, but it does contain a lot of strong assertions for what innovation is that will help you set your own opinion. </span><br data-dcnode-id="1141"><br data-dcnode-id="1140"><span data-dcnode-id="1139" instrument_node="">Invention and Innovation are not the same, and innovation is often due to the daily labors and minor improvements of workers, free to share</span></span><span data-dcnode-id="1137" instrument_node="">
</span><span data-dcnode-id="1123" id="freeText2483670661736170088" style="display:none"><span data-dcnode-id="1136" instrument_node="">Honestly this is more like a 3.75, and this is one you’ll want to read with a pen. TLDR; Ignore the inflammatory title (UPDATE: the title in the UK was How Innovation Works: and Why It Flourishes In Freedom). I’d take this book with a grain of salt, but it does contain a lot of strong assertions for what innovation is that will help you set your own opinion. </span><br data-dcnode-id="1135"><br data-dcnode-id="1134"><span data-dcnode-id="1133" instrument_node="">Invention and Innovation are not the same, and innovation is often due to the daily labors and minor improvements of workers, free to share and inform each other in the process. There are degrees of minutia here, but Ridley essentially argues for the support and exchange and ideas free of bureaucracy and covetousness. The book is set up in three parts: outlining what innovation is; detailing historic examples of innovation (the steam engine, dwarf wheat, and flight); outlining what he believes allows for innovation and defending against arguments that undermine it (that government investment enables most innovations, for instance, and BOY does he rally against the EU). </span><br data-dcnode-id="1132"><br data-dcnode-id="1131"><span data-dcnode-id="1130" instrument_node="">There are quite a few “hot takes” here, that IP stifles innovation instead of protecting it (though where the line between innovation and invention is here, I don’t know) being the only one that comes to mind right now. I found a lot of the examples western-centric (almost tirelessly so, but that’s also history for you), and some of the defenses flirtatiously Libertarian. Would love to read it again to get a serious discourse going.</span><br data-dcnode-id="1129"><br data-dcnode-id="1128"><span data-dcnode-id="1127" instrument_node="">Would definitely recommend as a read, if you aren’t already tired of western-male-dominated discourse on the subject. </span><br data-dcnode-id="1126"><br data-dcnode-id="1125"><span data-dcnode-id="1124" instrument_node="">Another minor point that’s been taking up brain space: the author argues one of the benefits of innovation is how little we work (percentage wise, with a longer lifespan, humans spend around 10% of their lives working instead of 37% of earlier periods) while also chastising the West for lacking work ethic (China works the 9-9-6, 9 AM to 9 PM 6 days a week). You can’t have your cake and eat it too, apparently.</span></span><span data-dcnode-id="1122" instrument_node="">

</span><a class="reviewDate createdAt right" data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/3557380213%3Fbook_show_action%3Dtrue"><span data-dcnode-id="1060" instrument_node="">Sep 27, 2020</span></a><span data-dcnode-id="1058" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="1045" title="liked it"><span class="staticStar p10" data-dcnode-id="1050" size="15x15"><span data-dcnode-id="1051" instrument_node="">liked it</span></span><span class="staticStar p10" data-dcnode-id="1049" size="15x15"></span><span class="staticStar p10" data-dcnode-id="1048" size="15x15"></span><span class="staticStar p0" data-dcnode-id="1047" size="15x15"></span><span class="staticStar p0" data-dcnode-id="1046" size="15x15"></span></span><span data-dcnode-id="1044" instrument_node="">

</span><span class="readable" data-dcnode-id="1001" id="reviewTextContainer3557380213"><span data-dcnode-id="1040" instrument_node="">
</span><span data-dcnode-id="1035" id="freeTextContainer12661159251728639868"><span data-dcnode-id="1039" instrument_node="">Worth reading but some flaws in tone and argument and not as good as The Rational Optimist. </span><br data-dcnode-id="1038"><br data-dcnode-id="1037"><span data-dcnode-id="1036" instrument_node="">This book seems to have been rushed. The writing quality wasn’t amazing and I noticed several typos. He seems to have knocked out a book on the same theme as his last two books: innovation is a matter of trial and error in free societies unrestricted by regulation. I agree with this basic argument but I kept thinking he was being selective in his evidence, the analysis was often superficial, and the tone </span></span><span data-dcnode-id="1034" instrument_node="">
</span><span data-dcnode-id="1006" id="freeText12661159251728639868" style="display:none"><span data-dcnode-id="1033" instrument_node="">Worth reading but some flaws in tone and argument and not as good as The Rational Optimist. </span><br data-dcnode-id="1032"><br data-dcnode-id="1031"><span data-dcnode-id="1030" instrument_node="">This book seems to have been rushed. The writing quality wasn’t amazing and I noticed several typos. He seems to have knocked out a book on the same theme as his last two books: innovation is a matter of trial and error in free societies unrestricted by regulation. I agree with this basic argument but I kept thinking he was being selective in his evidence, the analysis was often superficial, and the tone was often sneering and arrogant. This made him not particularly likeable and diminished trust in his arguments. This was one of those books where I kept thinking of counter arguments that were ignored. </span><br data-dcnode-id="1029"><br data-dcnode-id="1028"><span data-dcnode-id="1027" instrument_node="">Some specific points:</span><br data-dcnode-id="1026"><br data-dcnode-id="1025"><span data-dcnode-id="1024" instrument_node="">- he is scathing about the ability of governments to foster innovation but I’ve read in several other places about new technologies developed through government funding. Who should I believe? </span><br data-dcnode-id="1023"><span data-dcnode-id="1022" instrument_node="">- he is a member of the House of Lords so I’d be interested to understand his role in creating laws. Perhaps he favours laws that roll back regulation but he should disclose his approach. </span><br data-dcnode-id="1021"><span data-dcnode-id="1020" instrument_node="">- he seems to contradict himself by saying that innovation is inevitable and inexorable but also that it is serendipitous. </span><br data-dcnode-id="1019"><span data-dcnode-id="1018" instrument_node="">- I was surprised by how reliant he was on story telling rather than data. Data is of course able to be manipulated too but it’s generally more convincing that anecdotes. </span><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node="">- I found Steven Pinker’s tone and data and tightly-argued paragraphs in Enlightenment Now much more persuasive. In fact, I really struggle to think of counter-arguments reading Steven Pinker because he doesn’t kill his arguments but overstating them, he uses data, he tackles the counterarguments, and his tone is calm and reasoned.</span><br data-dcnode-id="1015"><span data-dcnode-id="1014" instrument_node="">- The afterword on Covid was interesting but the final chapter on the Innovation Famine was an unconvincing, uncharacteristic old man’s rant which perhaps reflects Matthew’s advancing years. </span><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">- the value of reading Matthew Ridley is that he is super smart and thinks for himself. He is great on well intended policies that backfire, eg people who want to help the environment prefer organic food but organic food uses up much more land for farming which would otherwise be forest. In this book he does a great demolition job of Elon Musk’s hyper loop and I’m glad he wasn’t afraid of swinging the axe at such a big name and wasn’t afraid of legal issues. But I think his independent mindedness can sometimes shade into being a contrarian, trying to be different for the sake of it. </span><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">- I had a sense that, based on his general knowledge of these topics, he knew his arguments before he wrote the books. There was therefore little research, little weighing of evidence, superficial &amp; selective evidence. At one point he admits he was writing on the train, which I’m sure a lot of authors do, but doesn’t fill you with confidence that he was surrounded by competing arguments and evidence as he carefully weighed what the right argument to take was.</span><br data-dcnode-id="1009"><br data-dcnode-id="1008"><span data-dcnode-id="1007" instrument_node="">For all these complaints it’s worth reading as evidenced by my ‘corners-turned-down-o-meter’.</span></span><span data-dcnode-id="1005" instrument_node="">

</span><span data-dcnode-id="924" id="freeText16315190084239962063" style="display:none"><span data-dcnode-id="928" instrument_node="">How Innovation Works by Ridley is a refreshing look at the reality of progress. Inventions, Eureka!, aha moments, strokes of genius, disruptive, even “since sliced bread” comprise pithy soundbites constantly employed to describe how someone changed the world, “and if you just follow my simple 3-step plan, you can too!” Not so says Ridley. He could not find one transformational innovation that was brought about by a single person. Rather, Ridley explores innovation after innovation, invention after invention, product after product, showing the serpentine journey from inception to wide scale adoption. Innovation is hard, marked by trial and error, and rarely, if ever, happens over a short time by few people. In short, innovation is evolution, not revolution. His overarching thesis is perfectly explained by Edison, “Genius is 1% inspiration and 99% perspiration.” </span><br data-dcnode-id="927"><br data-dcnode-id="926"><span data-dcnode-id="925" instrument_node="">I won’t say this book is depressing, but it certainly doesn’t read like a popular business book trying to sell you on the latest entrepreneurial model out of Silicon Valley. In that regard it was quite refreshing, but a little dull at times as evolution can be. Ridley does touch on the hurdles to innovation with government regulations, the “perceived” need for IP, and a few other ideas. However, this came at the end, seemed a little rushed, and wasn’t wholly convincing. I wish he had fleshed those ideas out in a bit more detail. Still, I recommend this for anyone into the concept of innovation.</span></span><span data-dcnode-id="923" instrument_node="">

</span><span class="readable" data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">“Paul Krugman is a Nobel Prize-winning economist who in 1998 reacted to the growth of the internet, and the hype of the dotcom boom, with an article in Red Herring magazine entitled ‘Why Most Economists’ Predictions are Wrong’. He then proceeded to give a dramatic demonstration of his point by making what turned out to be a very wrong prediction himself: The growth of the Internet will slow drastically, as the flaw in ‘Metcalfe’s law’ – which states that the number of potential connections in a network is proportional to the square of the number of participants – becomes apparent: most people have nothing to say to each other! By 2005 or so, it will become clear that the Internet’s impact on the economy will have been no greater than the fax machine’s.”</span></span><span data-dcnode-id="234" instrument_node="">
