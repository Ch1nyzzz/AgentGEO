</span><span data-dcnode-id="4479" id="freeTextContainer11122971066577112416"><span data-dcnode-id="4480" instrument_node="">Innovation is the main event of the modern age, the reason we experience both dramatic improvements in our living standards and unsettling changes in our society. Forget short-term symptoms like Donald Trump and Brexit, it is innovation itself that explains them and that will itself shape the 21st century for good and ill. Yet innovation remains a mysterious process, poorl</span></span><span data-dcnode-id="4478" instrument_node="">
</span><span data-dcnode-id="4470" id="freeText11122971066577112416" style="display:none"><span data-dcnode-id="4477" instrument_node="">Innovation is the main event of the modern age, the reason we experience both dramatic improvements in our living standards and unsettling changes in our society. Forget short-term symptoms like Donald Trump and Brexit, it is innovation itself that explains them and that will itself shape the 21st century for good and ill. Yet innovation remains a mysterious process, poorly understood by policy makers and businessmen, hard to summon into existence to order, yet inevitable and inexorable when it does happen.</span><br data-dcnode-id="4476"><br data-dcnode-id="4475"><span data-dcnode-id="4474" instrument_node="">Matt Ridley argues in this book that we need to change the way we think about innovation, to see it as an incremental, bottom-up, fortuitous process that happens to society as a direct result of the human habit of exchange, rather than an orderly, top-down process developing according to a plan. Innovation is crucially different from invention, because it is the turning of inventions into things of practical and affordable use to people. It speeds up in some sectors and slows down in others. It is always a collective, collaborative phenomenon, not a matter of lonely genius. It is gradual, serendipitous, recombinant, inexorable, contagious, experimental and unpredictable. It happens mainly in just a few parts of the world at any one time. It still cannot be modelled properly by economists, but it can easily be discouraged by politicians. Far from there being too much innovation, we may be on the brink of an innovation famine.</span><br data-dcnode-id="4473"><br data-dcnode-id="4472"><span data-dcnode-id="4471" instrument_node="">Ridley derives these and other lessons, not with abstract argument, but from telling the lively stories of scores of innovations, how they started and why they succeeded or in some cases failed. He goes back millions of years and leaps forward into the near future. Some of the innovation stories he tells are about steam engines, jet engines, search engines, airships, coffee, potatoes, vaping, vaccines, cuisine, antibiotics, mosquito nets, turbines, propellers, fertiliser, zero, computers, dogs, farming, fire, genetic engineering, gene editing, container shipping, railways, cars, safety rules, wheeled suitcases, mobile phones, corrugated iron, powered flight, chlorinated water, toilets, vacuum cleaners, shale gas, the telegraph, radio, social media, block chain, the sharing economy, artificial intelligence, fake bomb detectors, phantom games consoles, fraudulent blood tests, faddish diets, hyperloop tubes, herbicides, copyright and even – a biological innovation -- life itself.</span></span><span data-dcnode-id="4469" instrument_node="">

</span><div class="uitext greyText bookshelves" data-dcnode-id="3947"><span data-dcnode-id="3957" instrument_node="">
            Shelves:
              </span><a class="actionLinkLite" data-dcnode-id="3955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/100858305-posthuman%3Fshelf%3Dfavorites"><span data-dcnode-id="3956" instrument_node="">favorites</span></a><span data-dcnode-id="3954" instrument_node="">, 
              </span><a class="actionLinkLite" data-dcnode-id="3952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/100858305-posthuman%3Fshelf%3Dbusiness"><span data-dcnode-id="3953" instrument_node="">business</span></a><span data-dcnode-id="3951" instrument_node="">, 
              </span><a class="actionLinkLite" data-dcnode-id="3949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/100858305-posthuman%3Fshelf%3Deconomics"><span data-dcnode-id="3950" instrument_node="">economics</span></a><span data-dcnode-id="3948" instrument_node="">
</span></div><span data-dcnode-id="3946" instrument_node="">

</span><span class="readable" data-dcnode-id="3860" id="reviewTextContainer3376626513"><span data-dcnode-id="3942" instrument_node="">
</span><span data-dcnode-id="3938" id="freeTextContainer11914902508674103659"><i data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">How Innovation Works</span></i><span data-dcnode-id="3939" instrument_node=""> is an inspiring and thought-provoking review of the history of human innovation with a goal of illustrating three principles. First, that important innovations tend to arise from many people improving incrementally upon the work of others. In other words, that the singular inventor's "Eureka!" moment is largely a myth. Second, that recent regulatory hurdles have hindered innovation, particularly in Europe. And finally, that the net impact of intellectual property laws has be</span></span><span data-dcnode-id="3937" instrument_node="">
</span><span data-dcnode-id="3865" id="freeText11914902508674103659" style="display:none"><i data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">How Innovation Works</span></i><span data-dcnode-id="3934" instrument_node=""> is an inspiring and thought-provoking review of the history of human innovation with a goal of illustrating three principles. First, that important innovations tend to arise from many people improving incrementally upon the work of others. In other words, that the singular inventor's "Eureka!" moment is largely a myth. Second, that recent regulatory hurdles have hindered innovation, particularly in Europe. And finally, that the net impact of intellectual property laws has been to hinder innovation as well.</span><br data-dcnode-id="3933"><br data-dcnode-id="3932"><span data-dcnode-id="3931" instrument_node="">Ridley shares many delightful anecdotes about the historical struggles of innovators but his emphasis on proving these three principles detracts from the pleasure of reading the book. It might have better served his purpose to split this work into three volumes, or at least two. Particularly the odd crusade against intellectual property rights falls flat, and given the complexity of the issue probably deserves its own separate book.</span><br data-dcnode-id="3930"><br data-dcnode-id="3929"><i data-dcnode-id="3921"><span data-dcnode-id="3928" instrument_node="">
</span><blockquote data-dcnode-id="3923"><span data-dcnode-id="3927" instrument_node="">
</span><b data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">Innovation happens when people are free to think, experiment and speculate. It happens when people can trade with each other. It happens where people are relatively prosperous, not desperate. It is somewhat contagious. It needs investment. It generally happens in cities. And so on. But do we really understand it? What is the best way to encourage innovation? To set targets, direct research, subsidize science, write rules and standards; or to back off from all this, deregulate, set people free; or to create property rights in ideas, offer patents and hand out prizes, issue medals; to fear the future; or to be full of hope? You will find champions of all these policies and more, fervently arguing their cases. But the striking thing about innovation is how mysterious it still is. No economist or social scientist can fully explain why innovation happens, let alone why it happens when and where it does.</span></b><span data-dcnode-id="3924" instrument_node="">
</span></blockquote><span data-dcnode-id="3922" instrument_node="">
</span></i><br data-dcnode-id="3920"><br data-dcnode-id="3919"><span data-dcnode-id="3918" instrument_node="">According to Ridley, “inventions are ideas having sex.” Each new inventor stands on the shoulders of those who came before him or her and the resulting new tech becomes part of more new tech. In a culture of invention, the process of combination and recombination of ideas multiplies the possibilities without limit. The more inventions there are, the more new tech becomes conceivable. He draws a fascinating parallel to the incremental steps of biological evolutionary processes: "There is no day when you can say: computers did not exist the day before and did the day after, any more than you can say that one ape-person was an ape and her daughter was a person."</span><br data-dcnode-id="3917"><br data-dcnode-id="3916"><span data-dcnode-id="3915" instrument_node="">By diving into the minutiae of these incremental steps that blur the line between what is or is not a computer, a steam engine, or a working flush toilet, etc, the author seeks to discredit the notion of our technological progression as a chain of heroic singular inventors having flashes of inspiration. Industry-shifting innovations may be gradual and impossible to attribute entirely to any one person, but I fail to see how this makes any of the multiple innovators involved any less heroic or inspiring. </span><br data-dcnode-id="3914"><br data-dcnode-id="3913"><span data-dcnode-id="3912" instrument_node="">Innovation also requires a great deal of trial and error, with practical tinkerers paving the way for science to follow more often than the reverse. People were inoculating children against smallpox, breeding crops and building steam engines long before they had any valid theories of immunology, genetics or thermodynamics. Ridley argues that the level of regulatory restrictions on certain modern technologies like nuclear power have prevented the sort of trial and error tinkering that would otherwise have resulted in tremendous innovation (or tremendous explosions):</span><br data-dcnode-id="3911"><br data-dcnode-id="3910"><blockquote data-dcnode-id="3899"><span data-dcnode-id="3909" instrument_node="">
</span><i data-dcnode-id="3901"><span data-dcnode-id="3908" instrument_node="">
</span><b data-dcnode-id="3903"><span data-dcnode-id="3907" instrument_node="">In terms of its energy density, nuclear is without equal: an object the size of a suitcase, suitably plumbed in, can power a town or an aircraft carrier almost indefinitely...Yet today the picture is of an industry in decline, its electrical output shrinking as old plants close faster than new ones open, and an innovation whose time has passed, or a technology that has stalled. This is not for lack of ideas, but for a very different reason: lack of opportunity to experiment. The story of nuclear power is a cautionary tale of how innovation falters, and even goes backwards, if it cannot evolve.</span><br data-dcnode-id="3906"><br data-dcnode-id="3905"><span data-dcnode-id="3904" instrument_node="">The problem is cost inflation. Nuclear plants have seen their costs relentlessly rising for decades, mostly because of increasing caution about safety. And the industry remains insulated almost entirely from the one known human process that reliably pulls down costs: trial and error. Because error could be so cataclysmic in the case of nuclear power, and because trials are so gigantically costly, nuclear power cannot get trial and error restarted. So we are stuck with an immature and inefficient version of the technology, the pressurized-water reactor</span></b><span data-dcnode-id="3902" instrument_node="">
</span></i><span data-dcnode-id="3900" instrument_node="">
</span></blockquote><br data-dcnode-id="3898"><br data-dcnode-id="3897"><span data-dcnode-id="3896" instrument_node="">The latter portion of the book makes the compelling case that the objectives of some special interest organizations converge with those of sluggish, large companies lobbying to protect obsolete technologies resulting in a perfect storm of restrictive regulatory frameworks that stifle innovation: </span><br data-dcnode-id="3895"><br data-dcnode-id="3894"><i data-dcnode-id="3886"><span data-dcnode-id="3893" instrument_node="">
</span><blockquote data-dcnode-id="3888"><span data-dcnode-id="3892" instrument_node="">
</span><b data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">We are... reinventing the guilds that often monopolized and stifled commerce in the Middle Ages...In Florida, an interior designer must go to university for four years before being allowed to practise, even if he or she has already qualified as an interior designer in another state. God forbid that some subversive should put the public interest in danger by trying to furnish a Florida apartment in the Alabama style!</span></b><span data-dcnode-id="3889" instrument_node="">
</span></blockquote><span data-dcnode-id="3887" instrument_node="">
</span></i><br data-dcnode-id="3885"><br data-dcnode-id="3884"><span data-dcnode-id="3883" instrument_node="">Examples of these regulations are illustrated in various countries including the US, but mostly in Europe: </span><br data-dcnode-id="3882"><br data-dcnode-id="3881"><i data-dcnode-id="3873"><span data-dcnode-id="3880" instrument_node="">
</span><blockquote data-dcnode-id="3875"><span data-dcnode-id="3879" instrument_node="">
</span><b data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">Of Europe’s 100 most valuable companies, none – not one – were formed in the past forty years. In Germany’s Dax 30 index, just two companies were founded after 1970; in France’s CAC 40 index, one; in Sweden’s top fifty, none at all. Europe has spawned not a single digital giant to challenge Google, Facebook or Amazon.</span></b><span data-dcnode-id="3876" instrument_node="">
</span></blockquote><span data-dcnode-id="3874" instrument_node="">
</span></i><span data-dcnode-id="3872" instrument_node=""> </span><br data-dcnode-id="3871"><br data-dcnode-id="3870"><span data-dcnode-id="3869" instrument_node="">Ridley also argues that intellectual property rights restrict innovation, but this argument is not so convincing. Most would agree that IP laws are in need of reform in many countries, particularly patent laws; however, doing away with them altogether would be akin to a seizure of many trillions of dollars of assets (including Ridley's right to earn money from this book). This is a complex issue that cannot be properly explored in a few chapters here.</span><br data-dcnode-id="3868"><br data-dcnode-id="3867"><span data-dcnode-id="3866" instrument_node="">Overall this is quite an enjoyable read, if somewhat marred by the focus on proving the three principles. There is also a chapter where the author goes off on a tangent about historical opposition to coffeehouses that seems irrelevant and probably should have been cut from the book.</span></span><span data-dcnode-id="3864" instrument_node="">

</span><a class="reviewDate createdAt right" data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/3889349827%3Fbook_show_action%3Dtrue"><span data-dcnode-id="3802" instrument_node="">Apr 27, 2021</span></a><span data-dcnode-id="3800" instrument_node="">

        rated it
        </span><span class="staticStars notranslate" data-dcnode-id="3787" title="it was ok"><span class="staticStar p10" data-dcnode-id="3792" size="15x15"><span data-dcnode-id="3793" instrument_node="">it was ok</span></span><span class="staticStar p10" data-dcnode-id="3791" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3790" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3789" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3788" size="15x15"></span></span><span data-dcnode-id="3786" instrument_node="">
</span></div><span data-dcnode-id="3784" instrument_node="">
</span><div class="reviewText stacked" data-dcnode-id="3761"><span data-dcnode-id="3783" instrument_node="">
</span><span class="readable" data-dcnode-id="3763" id="reviewTextContainer3889349827"><span data-dcnode-id="3782" instrument_node="">
</span><span data-dcnode-id="3780" id="freeTextContainer12074232163783497855"><span data-dcnode-id="3781" instrument_node="">The book essentially consists of two halves: the first half deals with stories of how innovation came about in fields such as energy, health, technology etc. and the second half, based on the stories, tries to come up with theories for how innovation works. It is a decent conceit -- to grip the reader with rousing tales of scientific and technological breakthroughs and then, using these stories, tease out the mechanism through which innovation works. The problem is, the conceit fails on both cou</span></span><span data-dcnode-id="3779" instrument_node="">
</span><span data-dcnode-id="3768" id="freeText12074232163783497855" style="display:none"><span data-dcnode-id="3778" instrument_node="">The book essentially consists of two halves: the first half deals with stories of how innovation came about in fields such as energy, health, technology etc. and the second half, based on the stories, tries to come up with theories for how innovation works. It is a decent conceit -- to grip the reader with rousing tales of scientific and technological breakthroughs and then, using these stories, tease out the mechanism through which innovation works. The problem is, the conceit fails on both counts.</span><br data-dcnode-id="3777"><br data-dcnode-id="3776"><span data-dcnode-id="3775" instrument_node="">Let's start with the second half, the punchline of the book. Almost none of the points Ridley makes about innovation are particularly insightful. They come across as fairly obvious. Does innovation happen in a society that is open to trade and communication or one that is closed? Does innovation happen when there is less regulation or more? Does innovation happen by teams working together or by individuals working alone? I am sure most people would pick the former in each case, and unsurprisingly, Ridley too reaches the same conclusion, but makes us work hard to get there. To be fair, there are some instances where his conclusions are somewhat novel (e.g. patents don't really help innovations) but the payoff for slogging through the stories is low. Which brings us to another point: the stories. The problem with relying on stories to make your point is that you leave yourself open to the charge of cherry-picking anecdotes to suit your narrative. There is very little systematic study of innovation across time or countries or a data-driven analysis of innovations within an industry or across industries. Ridley is almost entirely reliant on secondary sources -- it is not a problem in itself (Sapiens is a good example of a book that despite being based wholly on secondary research had something new to say), but it fundamentally limits how insightful one can be especially if the primary research in the area is lacking. By using mainly stories to back up his assertions, Ridley often ends up contradicting himself, as for every story there is probably a counter-story. On the one hand, he says innovation thrives in a society with fragmented governance (such as Federal vs. State in the US) but on the other hand China, with its single authoritarian government setup, he concedes, is a mega innovator. He ends up having to making exceptions and creating loopholes to explain why certain stories don't jibe with the other stories. At one point in the book, Ridley asserts that the invention of the radio led to mass propaganda which led to polarisation of society but the invention of TV united people. Er, what? One merely has to flip to a couple of news channels to see the level of polarisation TV has engendered today, something which Ridley too mentions later on in the book, contradicting his statement from before.</span><br data-dcnode-id="3774"><br data-dcnode-id="3773"><span data-dcnode-id="3772" instrument_node="">And the first half of the book, the stories, are narrated in a surprisingly dull manner. Some stories, which would have been putty in the hands of a better raconteur, come across almost like an uninterested journalist's news report. The tales of innovation are rushed, with dates and names jumping at you on every page but lack a human interest. (Contrast this with the stories of medical discovery in Bill Bryson's The Body.) This is a shame, as the examples Ridley picks out, one suspects, would have made for great reading if handled by a better writer. A pet peeve: I dislike a writer butting in in the middle of a story and Ridley does it a few times. Once he notes that he is typing out the chapter at the same railway station mentioned in the story he is narrating, which brought to mind an image of the writer half-attentively flinging words onto the page, trying to rush though a chapter before he reached his destination and had better stuff to do. The stories have this glib, hurried quality to them that sometimes undermine the points he wants to makes. Also, about 30% of the book is EU-bashing (big, bureaucratic, slow, regulation-heavy), which becomes tiresome after a point. </span><br data-dcnode-id="3771"><br data-dcnode-id="3770"><span data-dcnode-id="3769" instrument_node="">All in all, it was an OK read. You learn a few fun things on the way but the journey in general is not much fun.</span></span><span data-dcnode-id="3767" instrument_node="">

</span><span data-dcnode-id="3683" id="freeTextContainer8088355947546158446"><span data-dcnode-id="3684" instrument_node="">A good book, though not quite as innovative (sorry) or eye-opening as The Rational Optimist. A lot of this book - the first 2/3 or so - is devoted to recounting in great detail different stories of innovation. Throughout these stories, Ridley occasionally reflects on the nature of innovation, drawing lessons about how it occurs as why. But it's not really until the last third of the book that he begins to tie these ideas together in any kind of systematic way. Even then, the "why it flourishes i</span></span><span data-dcnode-id="3682" instrument_node="">
</span><span data-dcnode-id="3671" id="freeText8088355947546158446" style="display:none"><span data-dcnode-id="3681" instrument_node="">A good book, though not quite as innovative (sorry) or eye-opening as The Rational Optimist. A lot of this book - the first 2/3 or so - is devoted to recounting in great detail different stories of innovation. Throughout these stories, Ridley occasionally reflects on the nature of innovation, drawing lessons about how it occurs as why. But it's not really until the last third of the book that he begins to tie these ideas together in any kind of systematic way. Even then, the "why it flourishes in freedom" part of the book's title is never really adequately explored. There's some brief discussion of how innovation requires trial and error, and trial of error requires a certain kind of economic and political freedom. But the analysis doesn't get much deeper than that, and there's nothing in the way of a systematic attempt to examine the idea empirically, for instance by somehow measuring levels of innovation and comparing them across countries via one of the various indices of political or economic freedom.</span><br data-dcnode-id="3680"><br data-dcnode-id="3679"><span data-dcnode-id="3678" instrument_node="">One of the most interesting ideas from the book, really, is the distinction Ridley draws between innovation and invention. The two are often conflated, but Ridley describes innovation as involving not only coming up with some new idea, product, or process, but finding someway to make it useful enough to become widely adopted. Framed in that way, there turns out to be quite a gap between invention and innovation, and quite a lot of room for people with little in the way of scientific expertise or credentials, but ample amounts of business savvy, to become innovators on the basis of ideas that other people had invented. Innovation is almost always, Ridley points out, a gradual, incremental, and collective process. Even if a single "great man" comes up with the big idea (and usually it's not a *single* individual - simultaneous independent discovery, as Ridley notes, is remarkably common), it still typically takes a lot of time and a lot of minds to make that idea into something economical and useful. </span><br data-dcnode-id="3677"><br data-dcnode-id="3676"><span data-dcnode-id="3675" instrument_node="">Another really interesting point: although we tend to think that scientific discovery usually precedes and plays a causal role in facilitating innovation, it's usually the opposite. Practice precedes theory. People often figure out *that* something works without really understanding *why* it works, and scientific study often plays catch-up to discoveries that are already being developed in industry.</span><br data-dcnode-id="3674"><br data-dcnode-id="3673"><span data-dcnode-id="3672" instrument_node="">Bottom line: if you're interested in the history of the development of technology, or stories about how entrepreneurs have worked in a variety of fields to come up with new and useful ways of doing things, you'll enjoy this book. If you're looking for a more general *theory* of innovation, especially if you're looking for an account of the relation between innovation and freedom, you're likely to be disappointed. There's a lot here on the basis of which such a theory might be developed, but you'll have to do the work yourself.</span></span><span data-dcnode-id="3670" instrument_node="">

</span><span data-dcnode-id="3589" id="freeText877073528637641044" style="display:none"><span data-dcnode-id="3593" instrument_node="">Innovation is the main event of the modern age, the reason we experience both dramatic improvements in our living standards and unsettling changes in our society. Forget short-term symptoms like Donald Trump and Brexit, it is innovation itself that explains them and that will itself shape the 21st century for good and ill. Yet innovation remains a mysterious process, poorly understood by policy makers and businessmen, hard to summon into existence to order, yet inevitable and inexorable when it does happen. Matt Ridley argues in this book that we need to change the way we think about innovation, to see it as an incremental, bottom-up, fortuitous process that happens to society as a direct result of the human habit of exchange, rather than an orderly, top-down process developing according to a plan. Innovation is crucially different from invention, because it is the turning of inventions into things of practical and affordable use to people. It speeds up in some sectors and slows down in others. It is always a collective, collaborative phenomenon, not a matter of lonely genius. It is gradual, serendipitous, recombinant, inexorable, contagious, experimental and unpredictable. It happens mainly in just a few parts of the world at any one time. It still cannot be modelled properly by economists, but it can easily be discouraged by politicians. Far from there being too much innovation, we may be on the brink of an innovation famine.</span><br data-dcnode-id="3592"><br data-dcnode-id="3591"><span data-dcnode-id="3590" instrument_node="">Ridley derives these and other lessons, not with abstract argument, but from telling the lively stories of scores of innovations, how they started and why they succeeded or in some cases failed. He goes back millions of years and leaps forward into the near future. Some of the innovation stories he tells are about steam engines, jet engines, search engines, airships, coffee, potatoes, vaping, vaccines, cuisine, antibiotics, mosquito nets, turbines, propellers, fertiliser, zero, computers, dogs, farming, fire, genetic engineering, gene editing, container shipping, railways, cars, safety rules, wheeled suitcases, mobile phones, corrugated iron, powered flight, chlorinated water, toilets, vacuum cleaners, shale gas, the telegraph, radio, social media, block chain, the sharing economy, artificial intelligence, fake bomb detectors, phantom games consoles, fraudulent blood tests, faddish diets, hyperloop tubes, herbicides, copyright and even – a biological innovation -- life itself. This is a fascinating, information-rich and thought-provoking read with plenty of inspirational stories to help fuel your fire and a tonne of statistics and interesting anecdotes throughout. Encompassing and addressing a wide range of instances in which innovation takes place, how it takes place and how important it is for human advancement and modernity, Ridley has penned an insightful, eye-opening read. Highly recommended.</span></span><span data-dcnode-id="3588" instrument_node="">

</span><span data-dcnode-id="3416" id="freeTextContainer14053052911576836355"><span data-dcnode-id="3417" instrument_node="">What a delightful and insightful book. Matt Ridley explains the colourful history of innovations and upends some common preconceptions about how they come up. The book contains several key lessons: 1) Innovation is mostly a result of team effort, co-discovery, serendipity, step by step refinement, aimless tinkering, and endless trial-and-error learning. 2) Innovation strives in a free society where permissionless innovation is encouraged. 3) You cannot plan for innovation but you can encourage i</span></span><span data-dcnode-id="3415" instrument_node="">
</span><span data-dcnode-id="3410" id="freeText14053052911576836355" style="display:none"><span data-dcnode-id="3414" instrument_node="">What a delightful and insightful book. Matt Ridley explains the colourful history of innovations and upends some common preconceptions about how they come up. The book contains several key lessons: 1) Innovation is mostly a result of team effort, co-discovery, serendipity, step by step refinement, aimless tinkering, and endless trial-and-error learning. 2) Innovation strives in a free society where permissionless innovation is encouraged. 3) You cannot plan for innovation but you can encourage it indirectly. 4) Patents and copyrights today are more of a hindrance than a spur to innovation. </span><br data-dcnode-id="3413"><br data-dcnode-id="3412"><span data-dcnode-id="3411" instrument_node="">The book is sprawling and encyclopaedic. It lacks cohesion and structure, since it continuously jumps from one story to another. This would be a fault in any other book, but it works wonderfully given the theme of the book. The riches of empirical data are coalesced into a smashing narrative. Sure, the book doesn't invent the wheel. It doesn't, if you pardon the pun, innovate. But it spins a cohesive and compelling yarn about innovations and why they matter. It highlights some of the key ways in which governments, companies, and the people at large fail to grasp social evolution. Recommended.</span></span><span data-dcnode-id="3409" instrument_node="">

</span><span data-dcnode-id="3294" id="freeTextContainer12790575629814132853"><span data-dcnode-id="3299" instrument_node="">Ridley's publisher ran a quote from the starred Kirkus review on the cover: "Opinionated, often counterintuitive, full of delicious stories, always provocative." Good pick, and good book. Might be Ridley's best. It took me awhile to get through it, but certainly not because it's dull reading! Here's that review, which is where you should start: </span><a data-dcnode-id="3297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kirkusreviews.com/book-reviews/matt-ridley/how-innovation-works/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3298" instrument_node="">https://www.kirkusreviews.com/book-re...</span></a><br data-dcnode-id="3296"><span data-dcnode-id="3295" instrument_node="">Basically, If this sounds interesting, you should read the book. Almost certainly, your library will have a copy.</span></span><span data-dcnode-id="3293" instrument_node="">
</span><span data-dcnode-id="3267" id="freeText12790575629814132853" style="display:none"><span data-dcnode-id="3292" instrument_node="">Ridley's publisher ran a quote from the starred Kirkus review on the cover: "Opinionated, often counterintuitive, full of delicious stories, always provocative." Good pick, and good book. Might be Ridley's best. It took me awhile to get through it, but certainly not because it's dull reading! Here's that review, which is where you should start: </span><a data-dcnode-id="3290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kirkusreviews.com/book-reviews/matt-ridley/how-innovation-works/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3291" instrument_node="">https://www.kirkusreviews.com/book-re...</span></a><br data-dcnode-id="3289"><span data-dcnode-id="3288" instrument_node="">Basically, If this sounds interesting, you should read the book. Almost certainly, your library will have a copy. I have notes.... Bottom line: 4.4 stars, and I might still go for the bit more to kick it up enough to round up to 5. Important book.</span><br data-dcnode-id="3287"><br data-dcnode-id="3286"><span data-dcnode-id="3285" instrument_node="">As he usually does, Matt Ridley looks at problems from a different angle. WSJ just ran an excerpted essay from his upcoming book: </span><a data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/innovation-cant-be-forced-but-it-can-be-quashed-11589555004" rel="noopener nofollow" target="_blank"><span data-dcnode-id="3284" instrument_node="">https://www.wsj.com/articles/innovati...</span></a><br data-dcnode-id="3282"><span data-dcnode-id="3281" instrument_node="">Excerpts:</span><br data-dcnode-id="3280"><span data-dcnode-id="3279" instrument_node="">The expiration of patents often results in a burst of innovation, as with 3-D printing, where the recent lapse of three key patents has resulted in notable improvements in quality and a drop in price. The historian Anton Howes, of the Royal Society of Arts in London, points out that the French government bought out Louis Daguerre’s patent for photography in 1839 and made the technology freely available, unleashing a burst of creative innovation. Dr. Howes argues, “As we look to fight coronavirus and any future pandemics, we should perhaps consider which patents—for antivirals, vaccines, ventilators and other hygienic equipment—might be bought out in order to remove…innovation bottlenecks.”</span><br data-dcnode-id="3278"><span data-dcnode-id="3277" instrument_node="">.</span><br data-dcnode-id="3276"><span data-dcnode-id="3275" instrument_node="">.</span><br data-dcnode-id="3274"><span data-dcnode-id="3273" instrument_node="">.</span><br data-dcnode-id="3272"><span data-dcnode-id="3271" instrument_node="">The Nobel Prize-winning economist Michael Kremer came up with a concept called the Advance Market Commitment that would fine-tune prizes as incentives to innovate. In 2007, the Gates Foundation committed $1.5 billion to a prize fund to find a vaccine for Pneumococcus bacteria for use in developing countries, where no pharmaceutical company could make money from it. But rather than just winning a lump sum for meeting the goal, companies were assured that if they succeeded, they would win a contract that paid out for 10 years at a good price. The prize money effectively topped up the sum received by the pharmaceutical firm for every vaccine sold. The result of the auction was three good vaccines, costing $2 per dose, which have been given to 150 million children, saving 700,000 lives.</span><br data-dcnode-id="3270"><br data-dcnode-id="3269"><span data-dcnode-id="3268" instrument_node="">The essay is likely paywalled at the WSJ. I expect Ridley will republish it elsewhere. If not, I'll be happy to send you a copy.</span></span><span data-dcnode-id="3266" instrument_node="">

</span><span data-dcnode-id="3166" id="freeText10591078216060098407" style="display:none"><span data-dcnode-id="3175" instrument_node="">Ridley is your favorite dinner guest, full of fascinating stories that quickly veer from one point to the next and are offered in a haphazard order. Which is fun at a dinner party. The advantage of the rapid-fire storytelling is to mask the wild contradictions and unsupported claims that he tosses in there. </span><br data-dcnode-id="3174"><span data-dcnode-id="3173" instrument_node="">Still, at some point one begins to wonder why we should listen to him beyond the amusing anecdotes.</span><br data-dcnode-id="3172"><br data-dcnode-id="3171"><span data-dcnode-id="3170" instrument_node="">Fundamentally, Ridley argues for a free and completely unfettered landscape into which innovation be allowed to occur. Fine. But he readily dismisses any possible negative consequences. No innovation, no matter how deadly, damaging, or oppressive is off Ridley's table. It is all good, always good, and Ridley's shame and consternation is foisted on anyone who would dare say, "Hold on, are you sure this is a good thing? Perhaps we might consider the consequences?" </span><br data-dcnode-id="3169"><br data-dcnode-id="3168"><span data-dcnode-id="3167" instrument_node="">Ridley is clearly a Bentham utilitarian. Nothing wrong with utilitarianism -- unless you are the one getting crushed under the trolley wheels.</span></span><span data-dcnode-id="3165" instrument_node="">

</span><span data-dcnode-id="3073" id="freeTextContainer8781389126540303008"><span data-dcnode-id="3091" instrument_node="">Ridley’s books are always deeply insightful and unconventional. This book is no different. </span><br data-dcnode-id="3090"><br data-dcnode-id="3089"><span data-dcnode-id="3088" instrument_node="">Innovation:</span><br data-dcnode-id="3087"><span data-dcnode-id="3086" instrument_node="">1. Happens randomly and unpredictably</span><br data-dcnode-id="3085"><span data-dcnode-id="3084" instrument_node="">2. Many failures but a few great breakthroughs </span><br data-dcnode-id="3083"><span data-dcnode-id="3082" instrument_node="">3. Often happens simultaneously across different countries and continent, but usually attributed to the most successful inventor</span><br data-dcnode-id="3081"><span data-dcnode-id="3080" instrument_node="">4. 1% inspiration, 99% perspiration</span><br data-dcnode-id="3079"><span data-dcnode-id="3078" instrument_node="">5. Mostly done by practical people such as mechanics and other tinkerers and seldom by professors </span><br data-dcnode-id="3077"><span data-dcnode-id="3076" instrument_node="">6. Science mostly comes after the invention</span><br data-dcnode-id="3075"><span data-dcnode-id="3074" instrument_node="">7. All are</span></span><span data-dcnode-id="3072" instrument_node="">
</span><span data-dcnode-id="3033" id="freeText8781389126540303008" style="display:none"><span data-dcnode-id="3071" instrument_node="">Ridley’s books are always deeply insightful and unconventional. This book is no different. </span><br data-dcnode-id="3070"><br data-dcnode-id="3069"><span data-dcnode-id="3068" instrument_node="">Innovation:</span><br data-dcnode-id="3067"><span data-dcnode-id="3066" instrument_node="">1. Happens randomly and unpredictably</span><br data-dcnode-id="3065"><span data-dcnode-id="3064" instrument_node="">2. Many failures but a few great breakthroughs </span><br data-dcnode-id="3063"><span data-dcnode-id="3062" instrument_node="">3. Often happens simultaneously across different countries and continent, but usually attributed to the most successful inventor</span><br data-dcnode-id="3061"><span data-dcnode-id="3060" instrument_node="">4. 1% inspiration, 99% perspiration</span><br data-dcnode-id="3059"><span data-dcnode-id="3058" instrument_node="">5. Mostly done by practical people such as mechanics and other tinkerers and seldom by professors </span><br data-dcnode-id="3057"><span data-dcnode-id="3056" instrument_node="">6. Science mostly comes after the invention</span><br data-dcnode-id="3055"><span data-dcnode-id="3054" instrument_node="">7. All are built on other prior innovation</span><br data-dcnode-id="3053"><span data-dcnode-id="3052" instrument_node="">8. Cross pollination of ideas very important </span><br data-dcnode-id="3051"><span data-dcnode-id="3050" instrument_node="">9. Must serve a need or else it will disappear</span><br data-dcnode-id="3049"><span data-dcnode-id="3048" instrument_node="">10. Needs supportive innovation to work; timing is everything</span><br data-dcnode-id="3047"><span data-dcnode-id="3046" instrument_node="">11. Other not the best design but the best manufactured and marketed one wins</span><br data-dcnode-id="3045"><span data-dcnode-id="3044" instrument_node="">12. Regulation kills innovation and benefits the incumbents (European regulation on IT/GMO food/vacuum Cleaners). No innovation means stagnant economy</span><br data-dcnode-id="3043"><span data-dcnode-id="3042" instrument_node="">13. Empires are bad for innovation; small independent states good</span><br data-dcnode-id="3041"><span data-dcnode-id="3040" instrument_node="">14. Freedom to experiment and fail and learn from them is critical for success. </span><br data-dcnode-id="3039"><span data-dcnode-id="3038" instrument_node="">15. Intellectual properties law is probably only good for medication but not for most other innovation. Leads to patent hogging and endless lawsuits </span><br data-dcnode-id="3037"><span data-dcnode-id="3036" instrument_node="">16. Resources are unlimited as we can find much more efficient use of stuff and substitutes </span><br data-dcnode-id="3035"><span data-dcnode-id="3034" instrument_node="">17. Even in America, too little innovation is happening so economy stagnation ensues; China is the new innovation powerhouse</span></span><span data-dcnode-id="3032" instrument_node="">

</span><span data-dcnode-id="2938" id="freeTextContainer4681451668816665341"><span data-dcnode-id="2943" instrument_node="">How Innovation Works: Serendipity, Energy and the Saving of Time (2020) by Matt Ridley is a very good book that looks at how innovation has arisen in recent history and what makes it work. </span><br data-dcnode-id="2942"><span data-dcnode-id="2941" instrument_node="">Ridley defines innovation as different from invention, which is the creation of something new and describes innovation as getting something to market that people actually use and that has an impact on society. </span><br data-dcnode-id="2940"><span data-dcnode-id="2939" instrument_node="">The book emphasizes how innovation almost always gradual, it's done by teams, it's mostly not from a </span></span><span data-dcnode-id="2937" instrument_node="">
</span><span data-dcnode-id="2925" id="freeText4681451668816665341" style="display:none"><span data-dcnode-id="2936" instrument_node="">How Innovation Works: Serendipity, Energy and the Saving of Time (2020) by Matt Ridley is a very good book that looks at how innovation has arisen in recent history and what makes it work. </span><br data-dcnode-id="2935"><span data-dcnode-id="2934" instrument_node="">Ridley defines innovation as different from invention, which is the creation of something new and describes innovation as getting something to market that people actually use and that has an impact on society. </span><br data-dcnode-id="2933"><span data-dcnode-id="2932" instrument_node="">The book emphasizes how innovation almost always gradual, it's done by teams, it's mostly not from a theoretical work and large organisations are generally not that good at it. Also Ridley looks at why innovation seems to be slowing globally. </span><br data-dcnode-id="2931"><span data-dcnode-id="2930" instrument_node="">How Innovation Works has an extensive history of various innovations and this part of the book is really fantastic. Ridley goes into how the steam engine was gradually improved, how vaccines were discovered, how the Wright Brothers made their first flight, the story of containerisation, how the Haber Bosch process was discovered and developed and many other tales of innovation. It's fascinating and enables Ridley to point out the bottom up, practical nature of innovation. </span><br data-dcnode-id="2929"><span data-dcnode-id="2928" instrument_node="">The present day barriers to innovation are examined. Overly restrictive patents and European blocks on GMOs are described in detail. The point is made that just two companies in the DAX top 30 were formed after 1970 and the same is true across Europe in contrast to the US. </span><br data-dcnode-id="2927"><span data-dcnode-id="2926" instrument_node="">How Innovation Works is a really good book. Ridley writes well, knows his subject inside and out and makes the case that innovation is crucial and that it needs a free environment to work. </span></span><span data-dcnode-id="2924" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2783" title="really liked it"><span class="staticStar p10" data-dcnode-id="2788" size="15x15"><span data-dcnode-id="2789" instrument_node="">really liked it</span></span><span class="staticStar p10" data-dcnode-id="2787" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2786" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2785" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2784" size="15x15"></span></span><span data-dcnode-id="2782" instrument_node="">

</span><span data-dcnode-id="2776" id="freeTextContainer9193138761113065369"><span data-dcnode-id="2777" instrument_node="">Innovation has been the buzzword with leaders of developing nations in the past couple of decades. They see it as the magic wand that could catapult them from a lower-income, lower-technology nation to a richer, more prosperous one. A lot of this belief has its roots in the creative technologies of the mid-1990s in Silicon Valley, California. Innovations, such as the World Wide Web, the Mosaic internet browser, and VoIP/communication technologies, brought the immense power of the internet, impro</span></span><span data-dcnode-id="2775" instrument_node="">
</span><span data-dcnode-id="2749" id="freeText9193138761113065369" style="display:none"><span data-dcnode-id="2774" instrument_node="">Innovation has been the buzzword with leaders of developing nations in the past couple of decades. They see it as the magic wand that could catapult them from a lower-income, lower-technology nation to a richer, more prosperous one. A lot of this belief has its roots in the creative technologies of the mid-1990s in Silicon Valley, California. Innovations, such as the World Wide Web, the Mosaic internet browser, and VoIP/communication technologies, brought the immense power of the internet, improving the daily lives of the average citizen. Even politicians could see how inventions such as email, e-commerce, search engine, the cell phone, and social media revolutionized societies across the world. It inspired China, Brazil, and India to have their own Silicon Valley to spur innovation. If a nation creates its own Silicon Valley, would innovation always follow? What are the conditions, environment, and incentives that are necessary to foster innovation? Author Matt Ridley tries to answer these questions in this book. He does it by looking at the history of innovation, its nature, its successes, failures and frauds, its impediments, its economics, etc. He has taken a non-academic, non-didactic approach to this exposition, making the book educational. </span><br data-dcnode-id="2773"><br data-dcnode-id="2772"><span data-dcnode-id="2771" instrument_node="">Ridley begins with a working definition by characterizing Innovation as the act of discovering ways to rearrange the world in useful forms that are unlikely to arise by chance. When people are rather prosperous, free to think, trade with each other, experiment and speculate, we create conditions for innovation. So, liberal economies, with their free-roving experimental opportunities, do well with innovation. Yet, no economist or social scientist can quite explain why, when, and where innovation happens. In Ridley’s view, innovation is a gradual and evolutionary process. Serendipity still plays a big part. It is an urban myth that innovation is the work of lonely, autistic geniuses, toiling away in their father’s garage. There is no accepted best way to encourage innovation. But we can still create conditions for it. Ridley believes deregulation and freedom for the people are key elements. He does not believe in directing research, intellectual property rights, or subsidizing science. One key feature of innovation is we underestimate its impact in the long run but overestimate it in the short run. For all the lip service we pay to it, innovation is often unpopular. If not useful to us, we focus on its dire consequences than the good ones. People with vested interests in the status quo throw obstacles in the way and impede its progress. In this book, Ridley uses examples from the worlds of energy, public health, transport, food, low technology, computers, and communication to argue his case. </span><br data-dcnode-id="2770"><br data-dcnode-id="2769"><span data-dcnode-id="2768" instrument_node="">Each chapter covers one field of activity. It uses examples from that field to highlight innovators’ work in history to support the author’s contentions. As one would expect, Thomas Edison, Graham Bell, Marconi, James Watt, and the Wright brothers find their pride of place in these discussions. We also learn about obscure names like Lady Mary Pierrepoint, who was an early champion of viral inoculation in 18th century London during the smallpox epidemic. She did not invent inoculation, but she strove to popularize and spread the practice. Ridley uses her example to make his point that innovation is gradual and often begins with the ordinary people, before the elite take the credit. It is appropriate to remember her in these days of opposition to vaccination against Covid-19. Ridley says the path of innovation is not smooth, with only successes and good intentions. The book has a chapter on fakes and frauds in the name of innovation. It discusses the Silicon Valley company Theranos and Elon Musk’s Hyperloop idea. Ridley makes insightful comments about why Theranos got unraveled and why he has doubts about Hyperloop delivering what it promises to customers. Though the ideas behind Theranos were innovative, the core technologies to realize them were yet to be developed. Hyperloop is a two-century old idea repackaged for modern transportation. Ridley lists several technological and land issues as Hyperloop’s toughest problems. They have not tackled these issues. A central rule of innovation is that the toughest issue needs to be tackled first, in case it’s unsolvable. Both Theranos and Hyperloop break this rule and hence the author’s misgivings.</span><br data-dcnode-id="2767"><br data-dcnode-id="2766"><span data-dcnode-id="2765" instrument_node="">I had always imagined that intellectual property rights are necessary to spur innovation. Still, I found Ridley’s arguments about the disservice that intellectual property rights (IPR) do to impede innovation thought-provoking. Innovation is a gradual and evolutionary process. But popular imagination sees it as a revolution, a breakthrough and instant enlightenment. Ridley believes the cause for this misconception lies in human nature and IPR. Our society sees history as the product of outstanding men, women, and geniuses. We know it to be untrue of history and of innovation. The inventor likes to sell his or her innovation as sudden, world-changing, and the result of his years of struggle and insight. He has no interest in crediting the predecessors or rivals. Journalists and biographers also have their own vested interests in promoting this view. Nationalism compounds the problem even further. Sometimes, the inventor draws the patent in too broad a span to protect his / her market and deter further innovation.</span><br data-dcnode-id="2764"><br data-dcnode-id="2763"><span data-dcnode-id="2762" instrument_node="">Ridley gives examples from the book publishing, film-making and music industry to show that copyright laws have contributed little to encourage investment and innovation. As for patents, their purpose is to encourage people to innovate. It allows them a monopoly profit from the patent for a limited period, provided they disclose the details of their invention. However, inventors end up wasting the best years of their lives in court defending their patents. Watt, Morse, Marconi, and the Wright brothers are excellent examples. Often, inventors pursue futile vendettas against rivals who deserve some credit. There is no evidence that areas unprotected by patents produce less innovation. Organizational inventions such as franchising and just-in-time inventory management happened in companies unpatented. Others copied them with enthusiasm, but it didn’t stop companies from inventing more. Patents raise the costs of goods and inventors use them to keep competition at bay. The author concludes that intellectual property rights are a significant drag on innovation and growth, the very opposite of IP law’s stated purpose. They are now a hindrance, not a help to modern innovation. </span><br data-dcnode-id="2761"><br data-dcnode-id="2760"><span data-dcnode-id="2759" instrument_node="">The last chapter, titled ‘An Innovation Famine’, disappointed and confused me. It is a curious mixture of contradictory arguments and defeatism in contrast to the author’s usual sunny optimism. Ridley had argued earlier in the book that state sponsored innovation is possible, but private enterprise does it better. In this chapter, he says it is likely that China will innovate on a grander scale and faster than anywhere else in the coming few decades. The reason is the Chinese entrepreneur is free of petty bureaucratic rules and delays. He is free to experiment so long as he does not annoy the Communist Party. The speed with which China executes projects is given as evidence of the signs of an impending innovation deluge. Some examples are building bridges and roads, high-speed rail, adopting digital payment systems, online education, and financial services. Ridley has similar hopes for India and Brazil. He believes India’s innovation is speeding up, with the use of technologies like biometric identification, usage of fingerprints and irises, for welfare payments and banking. According to him, India’s drug industry is speeding from generics to innovative medicines. Ridley does not back up these assertions with examples, as he does in the earlier chapters. The chapter ends with pessimism about the decline of the West. He cites the 9-9-6 (9 am to 9 pm, 6 days working week) ethos of China as a positive. In contrast, the West is grappling with bureaucracy and superstition, blocking innovation. Regulators, lawyers, consultants and rent seekers suck the vital juices from entrepreneurial enterprises in the West. Central banks look down their noses at innovations like cryptocurrencies and digital fin-tech. </span><br data-dcnode-id="2758"><br data-dcnode-id="2757"><span data-dcnode-id="2756" instrument_node="">The examples Ridley cites in China are a by-product of centralized governance. It reads almost as though aspects of dictatorship have impressed Ridley, a libertarian. If China, India, and Brazil are taking over the mantle of innovation, then there was no greater opportunity for them to showcase it than in the year 2020. Covid-19 ravaged the world. China and India could have shown their scientific and technological prowess by developing a reliable vaccine that is affordable for the entire world and captured the world’s imagination. China developed two vaccines and India one. Both the Chinese vaccines have dubious efficacy and there are doubts on whether China used its clout in the WHO to get them approved. The WHO has still not approved India’s own vaccine, called Covaxin. India exported the vaccine to Brazil, but corruption scandals and doubts about the data on its Phase 3 trials have dogged the deal. ‘Nature’ magazine reported that Russia’s Sputnik V vaccine is safe and effective. But the Russian Health Ministry okayed it in August 2020, more than a month before its Phase 1 and 2 trial results got published. This was before its Phase 3 trial had even begun! It is only the vaccines from the Western countries which have proven effective and legitimate, despite all the criticism of its bureaucracy, declining standards and anti-Vax superstitions. </span><br data-dcnode-id="2755"><br data-dcnode-id="2754"><span data-dcnode-id="2753" instrument_node="">I have misgivings about the author’s rosy prognosis on innovation in China in the future. One year after this book’s publication, we see the Chinese state cracking down on their big tech companies. The three biggest online educational services and the biggest financial and e-commerce services have got the axe from the Chinese state, curtailing their freedom to operate. It is not clear why they did it, but the speculation varies from the three-child policy to security concerns to challenges to the Communist party. The picture is not too rosy in India either. Despite paying lip-service to democracy and freedom, dissent and protests acutely scare the Hindu-nationalist government. This has resulted in greater centralization of governance, surveillance, and restrictions on press and intellectual freedoms. India has at least one silver lining though, because it is possible to dislodge the ruling party through polls and usher in a more humane and liberal regime. China does not seem to have this option with its one-party rule.</span><br data-dcnode-id="2752"><br data-dcnode-id="2751"><span data-dcnode-id="2750" instrument_node="">The book has examples in plenty and it helps to get a good grasp of the author’s exposition of his viewpoints. It makes the book accessible to the general reader. I found it enjoyable reading and would recommend it..</span></span><span data-dcnode-id="2748" instrument_node="">

</span><span data-dcnode-id="2670" id="freeTextContainer18104577750772708113"><span data-dcnode-id="2674" instrument_node="">I was at first quite ambivalent about this book, but ultimately I think it's one of the best books I've ever read. </span><br data-dcnode-id="2673"><br data-dcnode-id="2672"><span data-dcnode-id="2671" instrument_node="">That's not to say I think Ridley is always right. I think some of his arguments are weaker than others, especially: 1) that basic research is only valuable in that it enriches our lives (and it *rarely* leads to innovation), 2) his central conflation that all government is equal to poor regulations stifling innovation and 3) the idea he finishes on - an odd, motivational correlation</span></span><span data-dcnode-id="2669" instrument_node="">
</span><span data-dcnode-id="2658" id="freeText18104577750772708113" style="display:none"><span data-dcnode-id="2668" instrument_node="">I was at first quite ambivalent about this book, but ultimately I think it's one of the best books I've ever read. </span><br data-dcnode-id="2667"><br data-dcnode-id="2666"><span data-dcnode-id="2665" instrument_node="">That's not to say I think Ridley is always right. I think some of his arguments are weaker than others, especially: 1) that basic research is only valuable in that it enriches our lives (and it *rarely* leads to innovation), 2) his central conflation that all government is equal to poor regulations stifling innovation and 3) the idea he finishes on - an odd, motivational correlation about sheer hours of work. Number #1 has been hotly debated in the press and elsewhere, and Ridley even kind of backed off or otherwise waffled on not really meaning what people thought that meant. Number #2 is my central criticism - Ridley seems to rail on "government" and laud the innovation engine of capitalism when he really is railing on Crony Capitalism - which is the corruption of the two combined, together. Could Crony Capitalism exist without government? Well, no - but neither could capitalism exist without government. But - making that edit in my own mind keeps his arguments very strong.</span><br data-dcnode-id="2664"><br data-dcnode-id="2663"><span data-dcnode-id="2662" instrument_node="">One thing I like about this book is it is a history of innovation, which I think is really important for people to understand. At first, I worried it would be bereft with anecdotal evidence and cherry-picking, and it's not completely devoid of that bias - but it's fairly comprehensive (of world-changing innovations) and very persuasive. It goes into where vaccines came from and early backlash to them - I think that should really help people demystify vaccines as not some sort of dangerous, government-sponsored attack on their offspring but rather a stunning, grassroots innovation that has greatly bettered our lives.</span><br data-dcnode-id="2661"><br data-dcnode-id="2660"><span data-dcnode-id="2659" instrument_node="">But many ideas in here I have not seen expressed quite this way anywhere else, and they've greatly inspired me. It actually makes me think that the political philosophy, herein, could really transcend political divisions and bring people together, productively and progressively.</span></span><span data-dcnode-id="2657" instrument_node="">

</span><span data-dcnode-id="2558" id="freeText15812789647270397013" style="display:none"><span data-dcnode-id="2565" instrument_node="">People love Matt Ridley. I almost feel bad for rating this so low, but he is really in tight with the old guard, Dawkins et al. I thought this would blow my mind. It didn't. It had the potential to, if newer and more progressive science were included, but Ridley is very scientifically conservative. </span><br data-dcnode-id="2564"><br data-dcnode-id="2563"><span data-dcnode-id="2562" instrument_node="">This is a book about innovation; and yet, it is not very innovative itself. I like that he included life, but even this is nothing new. It was an a pretty standard history of innovation, written about extensively elsewhere. He threw in some Neil Shubin ideas-- innovation is not a lone accomplishment; you could never make an iPad in the stone age; ideas are usually floating in the air. But Shubin wrote about that years ago. </span><br data-dcnode-id="2561"><br data-dcnode-id="2560"><span data-dcnode-id="2559" instrument_node="">It's not that I didn't like the history of innovation. I LOVE the invention of the steam engine. It is actually one of my favorite things in all of life. I am obsessed with innovation in general. I just really thought this book would have included so much more insight into the nature of innovation than it did. </span></span><span data-dcnode-id="2557" instrument_node="">

</span><span data-dcnode-id="2466" id="freeText12542437048751134232" style="display:none"><span data-dcnode-id="2471" instrument_node="">If innovation can be bottled into a formula, it wouldn’t be that unique or valuable. Irrespective of the title, I was interested in getting more perspectives of it, especially from Matt Ridley whose Rational Optimist I enjoyed a while ago (review here). </span><br data-dcnode-id="2470"><br data-dcnode-id="2469"><span data-dcnode-id="2468" instrument_node="">The book is structured somewhat differently from other books. The author spends a lot of time on specific innovation in different areas for two thirds of the book. The rest of the time is in summarizing the theorizes. The case for the second part of the title, is never fully made, but I was not that keen on that aspect anyway. The stories are interesting and the summaries are okay, but I was left expecting more. I wish the book had been clearer about who it was intended for. That might have helped direct it better. </span><br data-dcnode-id="2467"></span><span data-dcnode-id="2465" instrument_node="">

</span><span data-dcnode-id="2381" id="freeText5970395232902028897" style="display:none"><span data-dcnode-id="2385" instrument_node="">Quick, fun, and educational read. Matt Ridley covers a familiar and well-trodden territory that deals with history, impact and serendipity of various inventions and innovations. But unlike many others, well-exemplified by Tim Hartford and his “Fifty Inventions That Shaped the Modern Economy”, Ridley doesn’t mind getting a little dirty. </span><br data-dcnode-id="2384"><br data-dcnode-id="2383"><span data-dcnode-id="2382" instrument_node="">There are plenty of politically charged tangents in the book such as nuclear energy, GMOs, and genetic engineering, as well as controversy-fertile subjects such as human self-domestication, scientism, resistance to innovation by centralized governments and academia, and harmful regulation. To get into history of innovation, one probably shouldn’t start with Ridley’s book, but his take on the subject is indispensable.</span></span><span data-dcnode-id="2380" instrument_node="">

</span><span data-dcnode-id="2196" id="freeTextContainer11284917017684037448"><span data-dcnode-id="2197" instrument_node="">This book has a lot in common with Andrew McAfee's More From Less, and indeed both authors cite each other directly. They're both very quick reads, touching shallowly on many topics and relying extensively on research done by other scholars, making fairly broad points. But Ridley pulls off that balance much better overall. The book is mostly composed of historical vignettes about invention and innovation, but while none of them are individually very detailed, they're carefully summarized in a wa</span></span><span data-dcnode-id="2195" instrument_node="">
</span><span data-dcnode-id="2175" id="freeText11284917017684037448" style="display:none"><span data-dcnode-id="2194" instrument_node="">This book has a lot in common with Andrew McAfee's More From Less, and indeed both authors cite each other directly. They're both very quick reads, touching shallowly on many topics and relying extensively on research done by other scholars, making fairly broad points. But Ridley pulls off that balance much better overall. The book is mostly composed of historical vignettes about invention and innovation, but while none of them are individually very detailed, they're carefully summarized in a way that drives home Ridley's key point: innovation is the outcome of cultural evolution, not intelligent design. And of course because that's a point I'm deeply committed to, I found this exercise very satisfying. Ridley takes a bunch of famous examples of solitary genius invention and shows that all of them are 1) recombinations of previously existing ideas and technologies that were 2) arrived at by intense trial and error either by societies over generations of undirected activity or by persistent individuals through intense directed activity. </span><br data-dcnode-id="2193"><br data-dcnode-id="2192"><span data-dcnode-id="2191" instrument_node="">Cultural evolution in human innovation has many properties carried over from biological evolution that aren't often appreciated. Just as "crossing over" allows whole functional genes to be rearranged into new combinations, cultural evolution makes big leaps by combining functional ideas developed for old purposes into solutions to new problems. Thus what matters is both the size of the "cultural genome" or "cultural brain" and the ease with which people who know whole ideas can encounter each other to combine them. And while cultural history usually prioritizes this phase of history--in which something starkly new comes into existence--the far more important process is selection, which seizes on those new solutions, propagates them, and hones them to reduce costs and increase efficacy. One interesting point Ridley makes, using the example of Moore's law for semiconducters, is that true disjunctions are more rare than we might think. IE, cases in which a new discovery is made, producing not just a new solution to a familiar problem but a new realm of problem per se, are hard to think of. Instead, most inventions that seem to invent their own demand are in fact just new ways to tackle old problems. Airplanes experience a selection pressure to be better at flying, but they're responses to the intense demand for transportation that existed before them. Semiconducters experience intense selection for higher transistor density per microchip, but the invention of semiconductors was in retrospect just a smooth step in a much longer process of selection for higher computational power, etc. </span><br data-dcnode-id="2190"><br data-dcnode-id="2189"><span data-dcnode-id="2188" instrument_node="">This is something I've been thinking about a lot lately, and one of the things I was only half-hoping Ridely might cover. Ultimately I'm only half-satisfied. It seems to me that market forces must almost necessarily be responsible for mediating this selection pressure. After all, a huge number of people will come up with lots of ideas, but unless the presence of an idea makes you individually less likely to die, it's hard to see why it would spread or be improved. Markets are the intermediary, translating one person's good idea into an opportunity for them, and many other people, to improve their situation. More specifically, I think that in this (almost impossible to conceive) thought experiment in which ppl can transmit ideas but not engage in trade, cultural evolution would simply select for ideas that were 1) easy to learn and 2) easy and fun to engage in individually. In reality markets and market forces are inevitable; the only question is how they should be arranged, or more neutrally, how different arrangements change the rate and direction of innovation. </span><br data-dcnode-id="2187"><br data-dcnode-id="2186"><span data-dcnode-id="2185" instrument_node="">Ridley is certainly friendly to this idea--his worldview is clearly what you might call libertarian--and there's plenty of relevant material here. Most of the innovators and inventors he discusses were businesspeople actively pursuing the profits that come with a big breakthrough in a commercially valued field. And he frequently makes gibes about how the lack of "freedom" in states like the USSR reduced their innovation rate to practically nothing. But he never quite dives into the details on that. The only place he discusses the question directly is done through an econometric comparison that only looks at results without considering mechanisms.</span><br data-dcnode-id="2184"><br data-dcnode-id="2183"><span data-dcnode-id="2182" instrument_node="">The interesting part is that Ridley is firmly anti-copyright. He bemoans how much time and suffering brilliant people have wasted in fighting patent lawsuits to protect the profits of their discovery. He thinks the whole thing is a waste, and that there's no evidence that the lack of such state-enforced monopolies would discourage innovation at all. Quite the opposite. Instead, he thinks innovators will be able to make their profit by first-mover advantage or secrecy, etc. This explains in part why innovation may not occur in planned economies, since people can't just make firms and earn profits when they come up with a good idea. But it isn't the end of the story, not least because many of the innovations in the book were not developed in clearly profit-driven scenarios. Many of the medical innovations in particular seem to have earned their inventors profit only through indirect, reputational rewards. It seems plausible to imagine such mechanisms could have driven innovation in the USSR as well--so why didn't they? Ridley claims that innovation threatens the status quo and therefore entrenched power elites with strong mechanisms for state control increasingly clamp down on it. That seems plausible but it's not explored in enough mechanistic detail, and enough evidence is not provided, to "prove" it for my standards.</span><br data-dcnode-id="2181"><br data-dcnode-id="2180"><span data-dcnode-id="2179" instrument_node="">I was excited to see how much this book was about my obsession with cultural evolution, and even more excited when I realized it broadened its scope to include all of biosemiotics. Ridley devotes a somewhat cursory chapter to life itself as an innovation, which along with a chapter on prehistoric innovations serves to make the point that human cultural evolution is a seamless continuation of prior evolution. Great. But the way he says it: that innovation is an infinite improbability engine that endlessly produces improbable arrangements of matter. Well, that's biosemiotics! And while I understand that no one wants to hear about biosemiotics, I would have been delighted to hear him acknowledge that he understands that's what he's saying and use the concept to wrap it all up together. </span><br data-dcnode-id="2178"><br data-dcnode-id="2177"><span data-dcnode-id="2176" instrument_node="">I feel obliged to note that Ridley is I guess maybe IDW-adjacent, and drops at least two casual and unsupported eugenics claims into the text for no real reason. First he claims that by preventing violent individuals from reproducing (?), the prison system is a continuation of the process of human self-domestication. Later, he more or less predicts that medical innovation will "cure" autism. Not great Matt!</span></span><span data-dcnode-id="2174" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2097" title="it was amazing"><span class="staticStar p10" data-dcnode-id="2102" size="15x15"><span data-dcnode-id="2103" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="2101" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2100" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2099" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2098" size="15x15"></span></span><span data-dcnode-id="2096" instrument_node="">
