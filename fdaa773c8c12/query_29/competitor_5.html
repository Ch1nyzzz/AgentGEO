</span></div></div></nav><main class="container-fluid" data-dcnode-id="14" role="main"><header class="mb-3" data-dcnode-id="4662"><h1 data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node="">Iron Man 2 (2010) Script</span></h1></header><nav aria-label="breadcrumb" class="small" data-dcnode-id="4652"><ol class="breadcrumb" data-dcnode-id="4653"><li class="breadcrumb-item" data-dcnode-id="4659"><a data-dcnode-id="4660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//transcripts.thedealr.net/"><span data-dcnode-id="4661" instrument_node="">Home</span></a></li><li class="breadcrumb-item" data-dcnode-id="4657"><span data-dcnode-id="4658" instrument_node="">Movies</span></li><li class="breadcrumb-item" data-dcnode-id="4654"><a data-dcnode-id="4655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//transcripts.thedealr.net/script.php/iron-man-2-2010-59dp"><span data-dcnode-id="4656" instrument_node="">Iron Man 2</span></a></li></ol></nav><div class="card mb-3" data-dcnode-id="19"><div class="card-body script-full" data-dcnode-id="20" xstyle="overflow-y: scroll; max-height: 500px; height: 50vh;"><p class="script-line" data-dcnode-id="4649"><span data-d="2335" data-dcnode-id="4650" data-s="0" style="user-select: none;"><span data-dcnode-id="4651" instrument_node="">Been a while since I was up here in front of you.</span></span></p><p class="script-line" data-dcnode-id="4646"><span data-d="3085" data-dcnode-id="4647" data-s="2419" style="user-select: none;"><span data-dcnode-id="4648" instrument_node="">Maybe I'll do us all a favour and just stick to the cards.</span></span></p><p class="script-line" data-dcnode-id="4640"><span data-d="2668" data-dcnode-id="4644" data-s="8592" style="user-select: none;"><span data-dcnode-id="4645" instrument_node="">There's been speculation that I was involved in the events that occurred</span></span><span data-dcnode-id="4643" instrument_node=""> </span><span data-d="1417" data-dcnode-id="4641" data-s="11345" style="user-select: none;"><span data-dcnode-id="4642" instrument_node="">on the freeway and the rooftop...</span></span></p><p class="script-line" data-dcnode-id="4631"><span data-d="3044" data-dcnode-id="4638" data-s="12846" style="user-select: none;"><span data-dcnode-id="4639" instrument_node="">Sorry, Mr. Stark, do you honestly expect us to believe that</span></span><span data-dcnode-id="4637" instrument_node=""> </span><span data-d="3586" data-dcnode-id="4635" data-s="15974" style="user-select: none;"><span data-dcnode-id="4636" instrument_node="">that was a bodyguard in a suit that conveniently appeared,</span></span><span data-dcnode-id="4634" instrument_node=""> </span><span data-d="2711" data-dcnode-id="4632" data-s="19644" style="user-select: none;"><span data-dcnode-id="4633" instrument_node="">despite the fact that you sorely despise bodyguards?</span></span></p><p class="script-line" data-dcnode-id="4628"><span data-d="1125" data-dcnode-id="4629" data-s="22439" style="user-select: none;"><span data-dcnode-id="4630" instrument_node="">Yes.</span></span></p><p class="script-line" data-dcnode-id="4622"><span data-d="4671" data-dcnode-id="4626" data-s="23648" style="user-select: none;"><span data-dcnode-id="4627" instrument_node="">And this mysterious bodyguard was somehow equipped</span></span><span data-dcnode-id="4625" instrument_node=""> </span><span data-d="3419" data-dcnode-id="4623" data-s="28403" style="user-select: none;"><span data-dcnode-id="4624" instrument_node="">with an undisclosed Stark high-tech powered battle...</span></span></p><p class="script-line" data-dcnode-id="4619"><span data-d="1959" data-dcnode-id="4620" data-s="31907" style="user-select: none;"><span data-dcnode-id="4621" instrument_node="">I know that it's confusing.</span></span></p><p class="script-line" data-dcnode-id="4613"><span data-d="3545" data-dcnode-id="4617" data-s="33950" style="user-select: none;"><span data-dcnode-id="4618" instrument_node="">It is one thing to question the official story, and another thing entirely</span></span><span data-dcnode-id="4616" instrument_node=""> </span><span data-d="3211" data-dcnode-id="4614" data-s="37579" style="user-select: none;"><span data-dcnode-id="4615" instrument_node="">to make wild accusations, or insinuate that I'm a superhero.</span></span></p><p class="script-line" data-dcnode-id="4610"><span data-d="3294" data-dcnode-id="4611" data-s="43794" style="user-select: none;"><span data-dcnode-id="4612" instrument_node="">I mean, let's face it, I'm not the heroic type.</span></span></p><p class="script-line" data-dcnode-id="4604"><span data-d="2210" data-dcnode-id="4608" data-s="47172" style="user-select: none;"><span data-dcnode-id="4609" instrument_node="">A laundry list of character defects,</span></span><span data-dcnode-id="4607" instrument_node=""> </span><span data-d="2835" data-dcnode-id="4605" data-s="49466" style="user-select: none;"><span data-dcnode-id="4606" instrument_node="">all the mistakes I've made, largely public.</span></span></p><p class="script-line" data-dcnode-id="4601"><span data-d="1625" data-dcnode-id="4602" data-s="52386" style="user-select: none;"><span data-dcnode-id="4603" instrument_node="">The truth is</span></span></p><p class="script-line" data-dcnode-id="4598"><span data-d="1960" data-dcnode-id="4599" data-s="58975" style="user-select: none;"><span data-dcnode-id="4600" instrument_node="">I am Iron Man.</span></span></p><p class="script-line" data-dcnode-id="4595"><span data-d="1167" data-dcnode-id="4596" data-s="71738" style="user-select: none;"><span data-dcnode-id="4597" instrument_node="">Ivan.</span></span></p><p class="script-line" data-dcnode-id="4592"><span data-d="500" data-dcnode-id="4593" data-s="78161" style="user-select: none;"><span data-dcnode-id="4594" instrument_node="">Vanya.</span></span></p><hr data-dcnode-id="4591"><p class="script-line" data-dcnode-id="4588"><span data-d="3670" data-dcnode-id="4589" data-s="295211" style="user-select: none;"><span data-dcnode-id="4590" instrument_node="">270 at 30 knots. Holding steady at 15,000 feet.</span></span></p><p class="script-line" data-dcnode-id="4585"><span data-d="8000" data-dcnode-id="4586" data-s="298965" style="user-select: none;"><span data-dcnode-id="4587" instrument_node="">You are clear for exfiltration over the drop zone.</span></span></p><hr data-dcnode-id="4584"><p class="script-line" data-dcnode-id="4581"><span data-d="4170" data-dcnode-id="4582" data-s="416624" style="user-select: none;"><span data-dcnode-id="4583" instrument_node="">Tony! Tony! Tony! Tony!</span></span></p><p class="script-line" data-dcnode-id="4578"><span data-d="1876" data-dcnode-id="4579" data-s="421337" style="user-select: none;"><span data-dcnode-id="4580" instrument_node="">It's good to be back.</span></span></p><p class="script-line" data-dcnode-id="4575"><span data-d="1626" data-dcnode-id="4576" data-s="425258" style="user-select: none;"><span data-dcnode-id="4577" instrument_node="">You missed me? Blow something up!</span></span></p><p class="script-line" data-dcnode-id="4572"><span data-d="4170" data-dcnode-id="4573" data-s="426968" style="user-select: none;"><span data-dcnode-id="4574" instrument_node="">I missed you, too. Blow something up? I already did that.</span></span></p><p class="script-line" data-dcnode-id="4566"><span data-d="3252" data-dcnode-id="4570" data-s="431222" style="user-select: none;"><span data-dcnode-id="4571" instrument_node="">I'm not saying that the world is enjoying</span></span><span data-dcnode-id="4569" instrument_node=""> </span><span data-d="4170" data-dcnode-id="4567" data-s="434559" style="user-select: none;"><span data-dcnode-id="4568" instrument_node="">its longest period of uninterrupted peace in years because of me.</span></span></p><p class="script-line" data-dcnode-id="4560"><span data-d="5755" data-dcnode-id="4564" data-s="441691" style="user-select: none;"><span data-dcnode-id="4565" instrument_node="">I'm not saying that from the ashes of captivity,</span></span><span data-dcnode-id="4563" instrument_node=""> </span><span data-d="4504" data-dcnode-id="4561" data-s="448072" style="user-select: none;"><span data-dcnode-id="4562" instrument_node="">never has a greater Phoenix metaphor been personified in human history.</span></span></p><p class="script-line" data-dcnode-id="4548"><span data-d="5922" data-dcnode-id="4558" data-s="455663" style="user-select: none;"><span data-dcnode-id="4559" instrument_node="">I'm not saying that Uncle Sam can kick back on a lawn chair,</span></span><span data-dcnode-id="4557" instrument_node=""> </span><span data-d="1626" data-dcnode-id="4555" data-s="461669" style="user-select: none;"><span data-dcnode-id="4556" instrument_node="">sipping on an iced tea</span></span><span data-dcnode-id="4554" instrument_node=""> </span><span data-d="3044" data-dcnode-id="4552" data-s="463379" style="user-select: none;"><span data-dcnode-id="4553" instrument_node="">because I haven't come across anyone who's man enough</span></span><span data-dcnode-id="4551" instrument_node=""> </span><span data-d="2877" data-dcnode-id="4549" data-s="466507" style="user-select: none;"><span data-dcnode-id="4550" instrument_node="">to go toe-to-toe with me on my best day.</span></span></p><p class="script-line" data-dcnode-id="4545"><span data-d="1250" data-dcnode-id="4546" data-s="473765" style="user-select: none;"><span data-dcnode-id="4547" instrument_node="">I love you, Tony!</span></span></p><p class="script-line" data-dcnode-id="4542"><span data-d="2127" data-dcnode-id="4543" data-s="475099" style="user-select: none;"><span data-dcnode-id="4544" instrument_node="">Please, it's not about me.</span></span></p><p class="script-line" data-dcnode-id="4539"><span data-d="1792" data-dcnode-id="4540" data-s="478603" style="user-select: none;"><span data-dcnode-id="4541" instrument_node="">It's not about you.</span></span></p><p class="script-line" data-dcnode-id="4536"><span data-d="2961" data-dcnode-id="4537" data-s="482690" style="user-select: none;"><span data-dcnode-id="4538" instrument_node="">It's not even about us. It's about legacy.</span></span></p><p class="script-line" data-dcnode-id="4533"><span data-d="3002" data-dcnode-id="4534" data-s="486486" style="user-select: none;"><span data-dcnode-id="4535" instrument_node="">It's about what we choose to leave behind for future generations.</span></span></p><p class="script-line" data-dcnode-id="4518"><span data-d="4128" data-dcnode-id="4531" data-s="489572" style="user-select: none;"><span data-dcnode-id="4532" instrument_node="">And that's why for the next year and for the first time since 1974,</span></span><span data-dcnode-id="4530" instrument_node=""> </span><span data-d="2418" data-dcnode-id="4528" data-s="493785" style="user-select: none;"><span data-dcnode-id="4529" instrument_node="">the best and brightest men and women</span></span><span data-dcnode-id="4527" instrument_node=""> </span><span data-d="1960" data-dcnode-id="4525" data-s="496287" style="user-select: none;"><span data-dcnode-id="4526" instrument_node="">of nations and corporations the world over</span></span><span data-dcnode-id="4524" instrument_node=""> </span><span data-d="3502" data-dcnode-id="4522" data-s="498331" style="user-select: none;"><span data-dcnode-id="4523" instrument_node="">will pool their resources, share their collective vision,</span></span><span data-dcnode-id="4521" instrument_node=""> </span><span data-d="3044" data-dcnode-id="4519" data-s="501918" style="user-select: none;"><span data-dcnode-id="4520" instrument_node="">to leave behind a brighter future.</span></span></p><p class="script-line" data-dcnode-id="4515"><span data-d="1751" data-dcnode-id="4516" data-s="505046" style="user-select: none;"><span data-dcnode-id="4517" instrument_node="">It's not about us.</span></span></p><p class="script-line" data-dcnode-id="4509"><span data-d="3294" data-dcnode-id="4513" data-s="507548" style="user-select: none;"><span data-dcnode-id="4514" instrument_node="">Therefore, what I'm saying, if I'm saying anything,</span></span><span data-dcnode-id="4512" instrument_node=""> </span><span data-d="2543" data-dcnode-id="4510" data-s="510927" style="user-select: none;"><span data-dcnode-id="4511" instrument_node="">is welcome back to the Stark Expo.</span></span></p><p class="script-line" data-dcnode-id="4500"><span data-d="2668" data-dcnode-id="4507" data-s="517225" style="user-select: none;"><span data-dcnode-id="4508" instrument_node="">And now, making a special guest appearance</span></span><span data-dcnode-id="4506" instrument_node=""> </span><span data-d="2418" data-dcnode-id="4504" data-s="519978" style="user-select: none;"><span data-dcnode-id="4505" instrument_node="">from the great beyond to tell you what it's all about,</span></span><span data-dcnode-id="4503" instrument_node=""> </span><span data-d="2502" data-dcnode-id="4501" data-s="522480" style="user-select: none;"><span data-dcnode-id="4502" instrument_node="">please welcome my father, Howard.</span></span></p><p class="script-line" data-dcnode-id="4497"><span data-d="2961" data-dcnode-id="4498" data-s="527318" style="user-select: none;"><span data-dcnode-id="4499" instrument_node="">Everything is achievable through technology.</span></span></p><p class="script-line" data-dcnode-id="4491"><span data-d="2293" data-dcnode-id="4495" data-s="530363" style="user-select: none;"><span data-dcnode-id="4496" instrument_node="">Better living, robust health,</span></span><span data-dcnode-id="4494" instrument_node=""> </span><span data-d="4546" data-dcnode-id="4492" data-s="533157" style="user-select: none;"><span data-dcnode-id="4493" instrument_node="">and for the first time in human history, the possibility of world peace.</span></span></p><p class="script-line" data-dcnode-id="4485"><span data-d="1918" data-dcnode-id="4489" data-s="537787" style="user-select: none;"> -s="745828" style="user-select: none;"><span data-dcnode-id="4262" instrument_node="">Absolutely. I'm no expert. I defer to you, Anthony.</span></span></p><p class="script-line" data-dcnode-id="4257"><span data-d="1959" data-dcnode-id="4258" data-s="750291" style="user-select: none;"><span data-dcnode-id="4259" instrument_node="">You're the wonder boy.</span></span></p><p class="script-line" data-dcnode-id="4254"><span data-d="2126" data-dcnode-id="4255" data-s="752335" style="user-select: none;"><span data-dcnode-id="4256" instrument_node="">Senator, if I may.</span></span></p><p class="script-line" data-dcnode-id="4251"><span data-d="4462" data-dcnode-id="4252" data-s="754545" style="user-select: none;"><span data-dcnode-id="4253" instrument_node="">I may well not be an expert, but you know who was the expert?</span></span></p><p class="script-line" data-dcnode-id="4248"><span data-d="2585" data-dcnode-id="4249" data-s="759133" style="user-select: none;"><span data-dcnode-id="4250" instrument_node="">Your dad. Howard Stark.</span></span></p><p class="script-line" data-dcnode-id="4245"><span data-d="4379" data-dcnode-id="4246" data-s="761844" style="user-select: none;"><span data-dcnode-id="4247" instrument_node="">Really a father to us all, and to the military-industrial age.</span></span></p><p class="script-line" data-dcnode-id="4242"><span data-d="2240" data-dcnode-id="4243" data-s="766849" style="user-select: none;"><span data-dcnode-id="4244" instrument_node="">Let's just be clear. He was no flower child.</span></span></p><p class="script-line" data-dcnode-id="4239"><span data-d="2251" data-dcnode-id="4240" data-s="769102" style="user-select: none;"><span data-dcnode-id="4241" instrument_node="">He was a lion.</span></span></p><p class="script-line" data-dcnode-id="4233"><span data-d="2376" data-dcnode-id="4237" data-s="771479" style="user-select: none;"><span data-dcnode-id="4238" instrument_node="">We all know why we're here. In the last six months,</span></span><span data-dcnode-id="4236" instrument_node=""> </span><span data-d="4087" data-dcnode-id="4234" data-s="773981" style="user-select: none;"><span data-dcnode-id="4235" instrument_node="">Anthony Stark has created a sword with untold possibilities.</span></span></p><p class="script-line" data-dcnode-id="4230"><span data-d="2793" data-dcnode-id="4231" data-s="778194" style="user-select: none;"><span data-dcnode-id="4232" instrument_node="">And yet he insists it's a shield.</span></span></p><p class="script-line" data-dcnode-id="4227"><span data-d="4628" data-dcnode-id="4228" data-s="781072" style="user-select: none;"><span data-dcnode-id="4229" instrument_node="">He asks us to trust him as we cower behind it.</span></span></p><p class="script-line" data-dcnode-id="4224"><span data-d="3211" data-dcnode-id="4225" data-s="785826" style="user-select: none;"><span data-dcnode-id="4226" instrument_node="">I wish I were comforted, Anthony, I really do.</span></span></p><p class="script-line" data-dcnode-id="4218"><span data-d="3086" data-dcnode-id="4222" data-s="789163" style="user-select: none;"><span data-dcnode-id="4223" instrument_node="">I'd love to leave my door unlocked when I leave the house,</span></span><span data-dcnode-id="4221" instrument_node=""> </span><span data-d="1417" data-dcnode-id="4219" data-s="792375" style="user-select: none;"><span data-dcnode-id="4220" instrument_node="">but this ain't Canada.</span></span></p><p class="script-line" data-dcnode-id="4212"><span data-d="1668" data-dcnode-id="4216" data-s="793876" style="user-select: none;"><span data-dcnode-id="4217" instrument_node="">You know, we live in a world of grave threats,</span></span><span data-dcnode-id="4215" instrument_node=""> </span><span data-d="3711" data-dcnode-id="4213" data-s="795670" style="user-select: none;"><span data-dcnode-id="4214" instrument_node="">threats that Mr. Stark will not always be able to foresee.</span></span></p><p class="script-line" data-dcnode-id="4209"><span data-d="1375" data-dcnode-id="4210" data-s="800508" style="user-select: none;"><span data-dcnode-id="4211" instrument_node="">Thank you.</span></span></p><p class="script-line" data-dcnode-id="4206"><span data-d="2710" data-dcnode-id="4207" data-s="802009" style="user-select: none;"><span data-dcnode-id="4208" instrument_node="">God bless Iron Man. God bless America.</span></span></p><p class="script-line" data-dcnode-id="4203"><span data-d="2085" data-dcnode-id="4204" data-s="805846" style="user-select: none;"><span data-dcnode-id="4205" instrument_node="">That is well said, Mr. Hammer.</span></span></p><p class="script-line" data-dcnode-id="4200"><span data-d="1918" data-dcnode-id="4201" data-s="808057" style="user-select: none;"><span data-dcnode-id="4202" instrument_node="">The committee would now like to invite.</span></span></p><p class="script-line" data-dcnode-id="4197"><span data-d="3127" data-dcnode-id="4198" data-s="810059" style="user-select: none;"><span data-dcnode-id="4199" instrument_node="">Lieutenant Colonel James Rhodes to the chamber.</span></span></p><p class="script-line" data-dcnode-id="4194"><span data-d="1500" data-dcnode-id="4195" data-s="813271" style="user-select: none;"><span data-dcnode-id="4196" instrument_node="">Rhodey? What?</span></span></p><p class="script-line" data-dcnode-id="4191"><span data-d="3252" data-dcnode-id="4192" data-s="821112" style="user-select: none;"><span data-dcnode-id="4193" instrument_node="">Hey, buddy. I didn't expect to see you here.</span></span></p><p class="script-line" data-dcnode-id="4188"><span data-d="2627" data-dcnode-id="4189" data-s="824448" style="user-select: none;"><span data-dcnode-id="4190" instrument_node="">Look, it's me, I'm here. Deal with it. Let's move on.</span></span></p><p class="script-line" data-dcnode-id="4185"><span data-d="1042" data-dcnode-id="4186" data-s="827201" style="user-select: none;"><span data-dcnode-id="4187" instrument_node="">I just...</span></span></p><p class="script-line" data-dcnode-id="4182"><span data-d="1440" data-dcnode-id="4183" data-s="828369" style="user-select: none;"><span data-dcnode-id="4184" instrument_node="">Drop it. All right, I'll drop it.</span></span></p><p class="script-line" data-dcnode-id="4173"><span data-d="3461" data-dcnode-id="4180" data-s="829870" style="user-select: none;"><span data-dcnode-id="4181" instrument_node="">I have before me a complete report on the Iron Man weapon,</span></span><span data-dcnode-id="4179" instrument_node=""> </span><span data-d="2668" data-dcnode-id="4177" data-s="833416" style="user-select: none;"><span data-dcnode-id="4178" instrument_node="">compiled by Colonel Rhodes. And, Colonel, for the record,</span></span><span data-dcnode-id="4176" instrument_node=""> </span><span data-d="3086" data-dcnode-id="4174" data-s="836210" style="user-select: none;"><span data-dcnode-id="4175" instrument_node="">can you please read page 57, paragraph four?</span></span></p><p class="script-line" data-dcnode-id="4167"><span data-d="2251" data-dcnode-id="4171" data-s="839422" style="user-select: none;"><span data-dcnode-id="4172" instrument_node="">You're requesting that I read specific selections</span></span><span data-dcnode-id="4170" instrument_node=""> </span><span data-d="1292" data-dcnode-id="4168" data-s="841757" style="user-select: none;"><span data-dcnode-id="4169" instrument_node="">from my report, Senator? Yes, sir.</span></span></p><p class="script-line" data-dcnode-id="4161"><span data-d="1917" data-dcnode-id="4165" data-s="843134" style="user-select: none;"><span data-dcnode-id="4166" instrument_node="">It was my understanding that I was going to be testifying</span></span><span data-dcnode-id="4164" instrument_node=""> </span><span data-d="2168" data-dcnode-id="4162" data-s="845136" style="user-select: none;"><span data-dcnode-id="4163" instrument_node="">in a much more comprehensive and detailed manner.</span></span></p><p class="script-line" data-dcnode-id="4158"><span data-d="1584" data-dcnode-id="4159" data-s="847430" style="user-select: none;"><span data-dcnode-id="4160" instrument_node="">I understand. A lot of things have changed today.</span></span></p><p class="script-line" data-dcnode-id="4149"><span data-d="1292" data-dcnode-id="4156" data-s="849098" style="user-select: none;"><span data-dcnode-id="4157" instrument_node="">So if you could just read... You do understand</span></span><span data-dcnode-id="4155" instrument_node=""> </span><span data-d="2502" data-dcnode-id="4153" data-s="850474" style="user-select: none;"><span data-dcnode-id="4154" instrument_node="">that reading a single paragraph out of context does not reflect</span></span><span data-dcnode-id="4152" instrument_node=""> </span><span data-d="3294" data-dcnode-id="4150" data-s="852977" style="user-select: none;"><span data-dcnode-id="4151" instrument_node="">the summary of my final... Just read it, Colonel. I do. Thank you.</span></span></p><p class="script-line" data-dcnode-id="4146"><span data-d="1417" data-dcnode-id="4147" data-s="857315" style="user-select: none;"><span data-dcnode-id="4148" instrument_node="">Very well.</span></span></p><p class="script-line" data-dcnode-id="4143"><span data-d="3294" data-dcnode-id="4144" data-s="860651" style="user-select: none;"><span data-dcnode-id="4145" instrument_node="">"As he does not operate within any definable branch of government,."</span></span></p><p class="script-line" data-dcnode-id="4140"><span data-d="4087" data-dcnode-id="4141" data-s="865948" style="user-select: none;"><span data-dcnode-id="4142" instrument_node="">"Iron Man presents a potential threat to the security of both the nation"</span></span></p><p class="script-line" data-dcnode-id="4137"><span data-d="1417" data-dcnode-id="4138" data-s="870119" style="user-select: none;"><span data-dcnode-id="4139" instrument_node="">"and to her interests."</span></span></p><p class="script-line" data-dcnode-id="4131"><span data-d="1875" data-dcnode-id="4135" data-s="871621" style="user-select: none;"><span data-dcnode-id="4136" instrument_node="">I did, however, go on to summarise</span></span><span data-dcnode-id="4134" instrument_node=""> </span><span data-d="2668" data-dcnode-id="4132" data-s="873623" style="user-select: none;"><span data-dcnode-id="4133" instrument_node="">that the benefits of Iron Man far outweigh the liabilities.</span></span></p><p class="script-line" data-dcnode-id="4128"><span data-d="2126" data-dcnode-id="4129" data-s="876417" style="user-select: none;"><span data-dcnode-id="4130" instrument_node="">And that it would be in our interest... That's enough, Colonel.</span></span></p><p class="script-line" data-dcnode-id="4125"><span data-d="1166" data-dcnode-id="4126" data-s="878628" style="user-select: none;"><span data-dcnode-id="4127" instrument_node="">To fold Mr. Stark... That's enough.</span></span></p><p class="script-line" data-dcnode-id="4122"><span data-d="1501" data-dcnode-id="4123" data-s="879920" style="user-select: none;"><span data-dcnode-id="4124" instrument_node="">Into the existing chain of command, Senator.</span></span></p><p class="script-line" data-dcnode-id="4119"><span data-d="3378" data-dcnode-id="4120" data-s="881505" style="user-select: none;"><span data-dcnode-id="4121" instrument_node="">I'm not a joiner, but I'll consider Secretary of Defense, if you ask nice.</span></span></p><p class="script-line" data-dcnode-id="4116"><span data-d="2669" data-dcnode-id="4117" data-s="884967" style="user-select: none;"><span data-dcnode-id="4118" instrument_node="">We can amend the hours a little bit.</span></span></p><p class="script-line" data-dcnode-id="4110"><span data-d="1751" data-dcnode-id="4114" data-s="888304" style="user-select: none;"><span data-dcnode-id="4115" instrument_node="">I'd like to go on and show, if I may,</span></span><span data-dcnode-id="4113" instrument_node=""> </span><span data-d="2168" data-dcnode-id="4111" data-s="890139" style="user-select: none;"><span data-dcnode-id="4112" instrument_node="">the imagery that's connected to your report.</span></span></p><p class="script-line" data-dcnode-id="4101"><span data-d="2835" data-dcnode-id="4108" data-s="892433" style="user-select: none;"><span data-dcnode-id="4109" instrument_node="">I believe it is somewhat premature to reveal these images</span></span><span data-dcnode-id="4107" instrument_node=""> </span><span data-d="1792" data-dcnode-id="4105" data-s="895353" style="user-select: none;"><span data-dcnode-id="4106" instrument_node="">to the general public at this time. With all due respect,</span></span><span data-dcnode-id="4104" instrument_node=""> </span><span data-d="1167" data-dcnode-id="4102" data-s="897271" style="user-select: none;"><span data-dcnode-id="4103" instrument_node="">Colonel, I understand.</span></span></p><p class="script-line" data-dcnode-id="4098"><span data-d="4087" data-dcnode-id="4099" data-s="898522" style="user-select: none;"><span data-dcnode-id="4100" instrument_node="">And if you could just narrate those for us, we'd be very grateful.</span></span></p><p class="script-line" data-dcnode-id="4095"><span data-d="1960" data-dcnode-id="4096" data-s="902693" style="user-select: none;"><span data-dcnode-id="4097" instrument_node="">Let's have the images.</span></span></p><p class="script-line" data-dcnode-id="4086"><span data-d="3211" data-dcnode-id="4093" data-s="906113" style="user-select: none;"><span data-dcnode-id="4094" instrument_node="">Intelligence suggests that the devices seen in these photos</span></span><span data-dcnode-id="4092" instrument_node=""> </span><span data-d="2835" data-dcnode-id="4090" data-s="909450" style="user-select: none;"><span data-dcnode-id="4091" instrument_node="">are, in fact, attempts at making manned copies</span></span><span data-dcnode-id="4089" instrument_node=""> </span><span data-d="1458" data-dcnode-id="4087" data-s="912370" style="user-select: none;"><span data-dcnode-id="4088" i class="script-line" data-dcnode-id="3108"><span data-d="2126" data-dcnode-id="3112" data-s="2358564" style="user-select: none;"><span data-dcnode-id="3113" instrument_node="">If you can make God bleed,</span></span><span data-dcnode-id="3111" instrument_node=""> </span><span data-d="2877" data-dcnode-id="3109" data-s="2361692" style="user-select: none;"><span data-dcnode-id="3110" instrument_node="">the people will cease to believe in him.</span></span></p><p class="script-line" data-dcnode-id="3105"><span data-d="4337" data-dcnode-id="3106" data-s="2365905" style="user-select: none;"><span data-dcnode-id="3107" instrument_node="">And there will be blood in the water. And the sharks will come.</span></span></p><p class="script-line" data-dcnode-id="3099"><span data-d="4420" data-dcnode-id="3103" data-s="2372245" style="user-select: none;"><span data-dcnode-id="3104" instrument_node="">The truth, all I have to do is sit here and watch</span></span><span data-dcnode-id="3102" instrument_node=""> </span><span data-d="2502" data-dcnode-id="3100" data-s="2376749" style="user-select: none;"><span data-dcnode-id="3101" instrument_node="">as the world will consume you.</span></span></p><p class="script-line" data-dcnode-id="3096"><span data-d="2084" data-dcnode-id="3097" data-s="2379335" style="user-select: none;"><span data-dcnode-id="3098" instrument_node="">Where will you be watching the world consume me from?</span></span></p><p class="script-line" data-dcnode-id="3093"><span data-d="3919" data-dcnode-id="3094" data-s="2381504" style="user-select: none;"><span data-dcnode-id="3095" instrument_node="">That's right. A prison cell. I'll send you a bar of soap.</span></span></p><p class="script-line" data-dcnode-id="3087"><span data-d="2293" data-dcnode-id="3091" data-s="2385508" style="user-select: none;"><span data-dcnode-id="3092" instrument_node="">Hey, Tony. Before you go,</span></span><span data-dcnode-id="3090" instrument_node=""> </span><span data-d="3378" data-dcnode-id="3088" data-s="2387885" style="user-select: none;"><span data-dcnode-id="3089" instrument_node="">palladium in the chest, painful way to die.</span></span></p><p class="script-line" data-dcnode-id="3081"><span data-d="3460" data-dcnode-id="3085" data-s="2408698" style="user-select: none;"><span data-dcnode-id="3086" instrument_node="">It's just unbelievable. It proves that the genie is out of the bottle</span></span><span data-dcnode-id="3084" instrument_node=""> </span><span data-d="2460" data-dcnode-id="3082" data-s="2412243" style="user-select: none;"><span data-dcnode-id="3083" instrument_node="">and this man has no idea what he's doing.</span></span></p><p class="script-line" data-dcnode-id="3078"><span data-d="3753" data-dcnode-id="3079" data-s="2414787" style="user-select: none;"><span data-dcnode-id="3080" instrument_node="">He thinks of the Iron Man weapon as a toy.</span></span></p><p class="script-line" data-dcnode-id="3063"><span data-d="4837" data-dcnode-id="3076" data-s="2418624" style="user-select: none;"><span data-dcnode-id="3077" instrument_node="">I was at a hearing where Mr. Stark, in fact, was adamant</span></span><span data-dcnode-id="3075" instrument_node=""> </span><span data-d="3627" data-dcnode-id="3073" data-s="2423546" style="user-select: none;"><span data-dcnode-id="3074" instrument_node="">that these suits can't exist anywhere else,</span></span><span data-dcnode-id="3072" instrument_node=""> </span><span data-d="2543" data-dcnode-id="3070" data-s="2427258" style="user-select: none;"><span data-dcnode-id="3071" instrument_node="">don't exist anywhere else, never will exist anywhere else,</span></span><span data-dcnode-id="3069" instrument_node=""> </span><span data-d="1334" data-dcnode-id="3067" data-s="2429885" style="user-select: none;"><span data-dcnode-id="3068" instrument_node="">at least for five to 10 years,</span></span><span data-dcnode-id="3066" instrument_node=""> </span><span data-d="4628" data-dcnode-id="3064" data-s="2431304" style="user-select: none;"><span data-dcnode-id="3065" instrument_node="">and here we are in Monaco realising, "These suits exist now."</span></span></p><p class="script-line" data-dcnode-id="3060"><span data-d="1166" data-dcnode-id="3061" data-s="2436017" style="user-select: none;"><span data-dcnode-id="3062" instrument_node="">Mute.</span></span></p><p class="script-line" data-dcnode-id="3057"><span data-d="3294" data-dcnode-id="3058" data-s="2439478" style="user-select: none;"><span data-dcnode-id="3059" instrument_node="">He should be giving me a medal. That's the truth.</span></span></p><p class="script-line" data-dcnode-id="3054"><span data-d="3794" data-dcnode-id="3055" data-s="2446319" style="user-select: none;"><span data-dcnode-id="3056" instrument_node="">What is that? This is your in-flight meal.</span></span></p><p class="script-line" data-dcnode-id="3051"><span data-d="2168" data-dcnode-id="3052" data-s="2453117" style="user-select: none;"><span data-dcnode-id="3053" instrument_node="">Did you just make that?</span></span></p><p class="script-line" data-dcnode-id="3048"><span data-d="3419" data-dcnode-id="3049" data-s="2455369" style="user-select: none;"><span data-dcnode-id="3050" instrument_node="">Yeah. Where do you think I've been for three hours?</span></span></p><p class="script-line" data-dcnode-id="3045"><span data-d="1167" data-dcnode-id="3046" data-s="2459790" style="user-select: none;"><span data-dcnode-id="3047" instrument_node="">Tony,</span></span></p><p class="script-line" data-dcnode-id="3042"><span data-d="2251" data-dcnode-id="3043" data-s="2463127" style="user-select: none;"><span data-dcnode-id="3044" instrument_node="">what are you not telling me?</span></span></p><p class="script-line" data-dcnode-id="3039"><span data-d="3002" data-dcnode-id="3040" data-s="2469300" style="user-select: none;"><span data-dcnode-id="3041" instrument_node="">I don't want to go home. At all.</span></span></p><p class="script-line" data-dcnode-id="3036"><span data-d="2710" data-dcnode-id="3037" data-s="2474555" style="user-select: none;"><span data-dcnode-id="3038" instrument_node="">Let's cancel my birthday party and...</span></span></p><p class="script-line" data-dcnode-id="3033"><span data-d="2584" data-dcnode-id="3034" data-s="2477350" style="user-select: none;"><span data-dcnode-id="3035" instrument_node="">We're in Europe. Let's go to Venice, Cipriani.</span></span></p><p class="script-line" data-dcnode-id="3030"><span data-d="1208" data-dcnode-id="3031" data-s="2480019" style="user-select: none;"><span data-dcnode-id="3032" instrument_node="">Remember? Oh, yes.</span></span></p><p class="script-line" data-dcnode-id="3027"><span data-d="1876" data-dcnode-id="3028" data-s="2481312" style="user-select: none;"><span data-dcnode-id="3029" instrument_node="">It's a great place to</span></span></p><p class="script-line" data-dcnode-id="3024"><span data-d="3127" data-dcnode-id="3025" data-s="2485691" style="user-select: none;"><span data-dcnode-id="3026" instrument_node="">be healthy. I don't think this is the right time.</span></span></p><p class="script-line" data-dcnode-id="3021"><span data-d="2251" data-dcnode-id="3022" data-s="2488903" style="user-select: none;"><span data-dcnode-id="3023" instrument_node="">We're in kind of a mess.</span></span></p><p class="script-line" data-dcnode-id="3018"><span data-d="1626" data-dcnode-id="3019" data-s="2491238" style="user-select: none;"><span data-dcnode-id="3020" instrument_node="">Yeah, but maybe that's why it's the best time.</span></span></p><p class="script-line" data-dcnode-id="3012"><span data-d="2043" data-dcnode-id="3016" data-s="2492948" style="user-select: none;"><span data-dcnode-id="3017" instrument_node="">'Cause then we... Well, I think as the CEO,</span></span><span data-dcnode-id="3015" instrument_node=""> </span><span data-d="1125" data-dcnode-id="3013" data-s="2495076" style="user-select: none;"><span data-dcnode-id="3014" instrument_node="">I need to show up.</span></span></p><p class="script-line" data-dcnode-id="3009"><span data-d="4295" data-dcnode-id="3010" data-s="2496285" style="user-select: none;"><span data-dcnode-id="3011" instrument_node="">As CEO, you are entitled to a leave.</span></span></p><p class="script-line" data-dcnode-id="3006"><span data-d="1333" data-dcnode-id="3007" data-s="2500665" style="user-select: none;"><span data-dcnode-id="3008" instrument_node="">A leave? A company retreat.</span></span></p><p class="script-line" data-dcnode-id="3003"><span data-d="2543" data-dcnode-id="3004" data-s="2502083" style="user-select: none;"><span data-dcnode-id="3005" instrument_node="">A retreat? During a time like this? Just a ride.</span></span></p><p class="script-line" data-dcnode-id="3000"><span data-d="3586" data-dcnode-id="3001" data-s="2504710" style="user-select: none;"><span data-dcnode-id="3002" instrument_node="">Well, I'm just saying, to recharge our batteries and figure it all out.</span></span></p><p class="script-line" data-dcnode-id="2997"><span data-d="2751" data-dcnode-id="2998" data-s="2508381" style="user-select: none;"><span data-dcnode-id="2999" instrument_node="">Not everybody runs on batteries, Tony.</span></span></p><hr data-dcnode-id="2996"><p class="script-line" data-dcnode-id="2993"><span data-d="2127" data-dcnode-id="2994" data-s="2643098" style="user-select: none;"><span data-dcnode-id="2995" instrument_node="">Hey, there he is.</span></span></p><p class="script-line" data-dcnode-id="2990"><span data-d="1458" data-dcnode-id="2991" data-s="2645935" style="user-select: none;"><span data-dcnode-id="2992" instrument_node="">There he is.</span></span></p><p class="script-line" data-dcnode-id="2987"><span data-d="3169" data-dcnode-id="2988" data-s="2649313" style="user-select: none;"><span data-dcnode-id="2989" instrument_node="">What an absolute pleasure. Welcome.</span></span></p><p class="script-line" data-dcnode-id="2984"><span data-d="1042" data-dcnode-id="2985" data-s="2653567" style="user-select: none;"><span data-dcnode-id="2986" instrument_node="">Oh, goodness gracious.</span></span></p><p class="script-line" data-dcnode-id="2981"><span data-d="3503" data-dcnode-id="2982" data-s="2654735" style="user-select: none;"><span data-dcnode-id="2983" instrument_node="">Can we get the handcuffs off my friend here?</span></span></p><p class="script-line" data-dcnode-id="2978"><span data-d="3503" data-dcnode-id="2979" data-s="2658322" style="user-select: none;"><span data-dcnode-id="2980" instrument_node="">Forgive me, I'm sorry. I'm such a huge fan of yours.</span></span></p><p class="script-line" data-dcnode-id="2975"><span data-d="3794" data-dcnode-id="2976" data-s="2661909" style="user-select: none;"><span data-dcnode-id="2977" instrument_node="">I didn't want to make a first impression like this.</span></span></p><p class="script-line" data-dcnode-id="2972"><span data-d="2293" data-dcnode-id="2973" data-s="2665788" style="user-select: none;"><span data-dcnode-id="2974" instrument_node="">He's not an animal. Come on.</span></span></p><p class="script-line" data-dcnode-id="2969"><span data-d="2668" data-dcnode-id="2970" data-s="2668958" style="user-select: none;"><span data-dcnode-id="2971" instrument_node="">He's a human being. Thank you.</span></span></p><p class="script-line" data-dcnode-id="2966"><span data-d="1417" data-dcnode-id="2967" data-s="2676674" style="user-select: none;"><span data-dcnode-id="2968" instrument_node="">We're fine.</span></span></p><p class="script-line" data-dcnode-id="2963"><span data-d="1667" data-dcnode-id="2964" data-s="2679760" style="user-select: none;"><span data-dcnode-id="2965" instrument_node="">My name is Justin Hammer.</span></span></p><p class="script-line" data-dcnode-id="2960"><span data-d="3336" data-dcnode-id="2961" data-s="2681512" style="user-select: none;"><span data-dcnode-id="2962" instrument_node="">I'd like to do some business with you. Please sit.</span></span></p><p class="script-line" data-dcnode-id="2957"><span data-d="2460" data-dcnode-id="2958" data-s="2688602" style="user-select: none;"><span data-dcnode-id="2959" instrument_node="">Dig in. What do we have today, Jack?</span></span></p><p class="script-line" data-dcnode-id="2954"><span data-d="3336" data-dcnode-id="2955" data-s="2691146" style="user-select: none;"><span data-dcnode-id="2956" instrument_node="">We have some salmon carpaccio. Salmon carpaccio.</span></span></p><p class="script-line" data-dcnode-id="2951"><span data-d="1834" data-dcnode-id="2952" data-s="2695943" style="user-select: none;"><span data-dcnode-id="2953" instrument_node="">Anything you want here, we got it.</span></span></p><p class="script-line" data-dcnode-id="2948"><span data-d="4086" data-dcnode-id="2949" data-s="2697862" style="user-select: none;"><span data-dcnode-id="2950" instrument_node="">I like my dessert first. I had this flown in from San Francisco.</span></span></p><p class="script-line" data-dcnode-id="2945"><span data-d="1876" data-dcnode-id="2946" data-s="2702032" style="user-select: none;"><span data-dcnode-id="2947" instrument_node="">It's Italian, though.</span></span></p><p class="script-line" data-dcnode-id="2942"><span data-d="1792" data-dcnode-id="2943" data-s="2703993" style="user-select: none;"><span data-dcnode-id="2944" instrument_node="">Organic ice cream.</span></span></p><p class="script-line" data-dcnode-id="2939"><span data-d="3919" data-dcnode-id="2940" data-s="2705870" style="user-select: none;"><span data-dcnode-id="2941" instrument_node="">I got a sweet tooth. Apparently you do, too, for Tony Stark.</span></span></p><p class="script-line" data-dcnode-id="2930"><span data-d="2793" data-dcnode-id="2937" data-s="2711709" style="user-select: none;"><span data-dcnode-id="2938" instrument_node="">What I saw you do to Tony Stark on that track,</span></span><span data-dcnode-id="2936" instrument_node=""> </span><span data-d="3628" data-dcnode-id="2934" data-s="2714628" style="user-select: none;"><span data-dcnode-id="2935" instrument_node="">how you stepped up to him in front of God and everybody,</span></span><span data-dcnode-id="2933" instrument_node=""> </span><span data-d="2126" data-dcnode-id="2931" data-s="2718340" style="user-select: none;"><span data-dcnode-id="2932" instrument_node="">that was... Wow!</span></span></p><p class="script-line" data-dcnode-id="2927"><span data-d="1542" data-dcnode-id="2928" data-s="2720551" style="user-select: none;"><span data-dcnode-id="2929" instrument_node="">You spoke to me with what you did.</span></span></p><p class="script-line" data-dcnode-id="2924"><span data-d="2627" data-dcnode-id="2925" data-s="2722177" style="user-select: none;"><span data-dcnode-id="2926" instrument_node="">And I know that you knew that I'd be listening.</span></span></p><p class="script-line" data-dcnode-id="2918"><span data-d="1542" data-dcnode-id="2922" data-s="2724889" style="user-select: none;"><span data-dcnode-id="2923" instrument_node="">This is why I couldn't bear to have you shipped off</span></span><span data-dcnode-id="2921" instrument_node=""> </span><span data-d="2794" data-dcnode-id="2919" data-s="2726515" style="user-select: none;"><span data-dcnode-id="2920" instrument_node="">to God knows where. It would have been such a waste of talent.</span></span></p><p class="script-line" data-dcnode-id="2912"><span data-d="1334" data-dcnode-id="2916" data-s="2729393" style="user-select: none;"><span data-dcnode-id="2917" instrument_node="">But if I might make a suggestion,</span></span><span data-dcnode-id="2915" instrument_node=""> </span><span data-d="2710" data-dcnode-id="2913" data-s="2730811" style="user-select: none;"><span data-dcnode-id="2914" instrument_node="">you know, you don't just go and try and kill the guy.</span></span></p><p class="script-line" data-dcnode-id="2909"><span data-d="4212" data-dcnode-id="2910" data-s="2733647" style="user-select: none;"><span data-dcnode-id="2911" instrumen e-id="84"><span data-d="3002" data-dcnode-id="85" data-s="6921497" style="user-select: none;"><span data-dcnode-id="86" instrument_node="">I'm trying to do right by Pepper.</span></span></p><p class="script-line" data-dcnode-id="81"><span data-d="2919" data-dcnode-id="82" data-s="6925084" style="user-select: none;"><span data-dcnode-id="83" instrument_node="">I'm in a stable-ish relationship.</span></span></p><p class="script-line" data-dcnode-id="75"><span data-d="1876" data-dcnode-id="79" data-s="6928838" style="user-select: none;"><span data-dcnode-id="80" instrument_node="">Which leads us to believe at this juncture</span></span><span data-dcnode-id="78" instrument_node=""> </span><span data-d="3169" data-dcnode-id="76" data-s="6930798" style="user-select: none;"><span data-dcnode-id="77" instrument_node="">we'd only like to use you as a consultant.</span></span></p><p class="script-line" data-dcnode-id="72"><span data-d="1876" data-dcnode-id="73" data-s="6940892" style="user-select: none;"><span data-dcnode-id="74" instrument_node="">You can't afford me.</span></span></p><p class="script-line" data-dcnode-id="66"><span data-d="2252" data-dcnode-id="70" data-s="6945104" style="user-select: none;"><span data-dcnode-id="71" instrument_node="">Then again, I will waive my customary retainer</span></span><span data-dcnode-id="69" instrument_node=""> </span><span data-d="2877" data-dcnode-id="67" data-s="6947440" style="user-select: none;"><span data-dcnode-id="68" instrument_node="">in exchange for a small favour.</span></span></p><p class="script-line" data-dcnode-id="63"><span data-d="4921" data-dcnode-id="64" data-s="6951277" style="user-select: none;"><span data-dcnode-id="65" instrument_node="">Rhodey and I are being honoured in Washington and we need a presenter.</span></span></p><p class="script-line" data-dcnode-id="60"><span data-d="1500" data-dcnode-id="61" data-s="6958034" style="user-select: none;"><span data-dcnode-id="62" instrument_node="">I'll see what I can do.</span></span></p><p class="script-line" data-dcnode-id="51"><span data-d="4838" data-dcnode-id="58" data-s="6961245" style="user-select: none;"><span data-dcnode-id="59" instrument_node="">It is my honour to be here today to present these distinguished awards</span></span><span data-dcnode-id="57" instrument_node=""> </span><span data-d="4003" data-dcnode-id="55" data-s="6966167" style="user-select: none;"><span data-dcnode-id="56" instrument_node="">to Lieutenant Colonel James Rhodes and Mr. Tony Stark,</span></span><span data-dcnode-id="54" instrument_node=""> </span><span data-d="3336" data-dcnode-id="52" data-s="6970254" style="user-select: none;"><span data-dcnode-id="53" instrument_node="">who is, of course, a national treasure.</span></span></p><p class="script-line" data-dcnode-id="45"><span data-d="1334" data-dcnode-id="49" data-s="6975760" style="user-select: none;"><span data-dcnode-id="50" instrument_node="">Thank you, Lieutenant Colonel,</span></span><span data-dcnode-id="48" instrument_node=""> </span><span data-d="2376" data-dcnode-id="46" data-s="6977178" style="user-select: none;"><span data-dcnode-id="47" instrument_node="">for such an exceptionally distinguished performance.</span></span></p><p class="script-line" data-dcnode-id="42"><span data-d="2001" data-dcnode-id="43" data-s="6979847" style="user-select: none;"><span data-dcnode-id="44" instrument_node="">You deserve this. Thank you, sir.</span></span></p><p class="script-line" data-dcnode-id="39"><span data-d="1292" data-dcnode-id="40" data-s="6983559" style="user-select: none;"><span data-dcnode-id="41" instrument_node="">Mr. Stark.</span></span></p><p class="script-line" data-dcnode-id="36"><span data-d="4086" data-dcnode-id="37" data-s="6984936" style="user-select: none;"><span data-dcnode-id="38" instrument_node="">Thank you for such an exceptionally distinguished performance.</span></span></p><p class="script-line" data-dcnode-id="33"><span data-d="1667" data-dcnode-id="34" data-s="6989107" style="user-select: none;"><span data-dcnode-id="35" instrument_node="">You deserve this.</span></span></p><p class="script-line" data-dcnode-id="30"><span data-d="2459" data-dcnode-id="31" data-s="6992235" style="user-select: none;"><span data-dcnode-id="32" instrument_node="">Oh, sorry.</span></span></p><p class="script-line" data-dcnode-id="27"><span data-d="3419" data-dcnode-id="28" data-s="6994779" style="user-select: none;"><span data-dcnode-id="29" instrument_node="">Funny how annoying a little prick can be, isn't it?</span></span></p><p class="script-line" data-dcnode-id="24"><span data-d="1792" data-dcnode-id="25" data-s="6999659" style="user-select: none;"><span data-dcnode-id="26" instrument_node="">Let's get a photo.</span></span></p><hr data-dcnode-id="23"><p class="script-line" data-dcnode-id="21"><span data-d="1960" data-dcnode-id="22" data-s="7447606" style="user-select: none;"></span></p></div></div><span data-dcnode-id="18" instrument_node=""> </span><span data-dcnode-id="15" instrument_node="">
