</span></h1><span data-dcnode-id="1523" instrument_node="">
</span><div class="intro" data-dcnode-id="1518"><span data-dcnode-id="1522" instrument_node=""> </span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">The Eiffel Tower was supposed to be destroyed only 20 years after its construction. To remedy the situation, Gustave Eiffel had the ingenious idea of crediting it with a scientific purpose – the Tower was saved!</span></p><span data-dcnode-id="1519" instrument_node="">

</span><h2 data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">The Tower’s Scientific Uses</span></h2><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1473"><strong data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">From the presentation of his project in 1886, Gustave Eiffel knew then that only the Tower’s scientific uses could protect it from its adversaries and prolong its lifespan.</span></strong></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1471" instrument_node="">Initially, it was supposed to be destroyed after 20 years ! He therefore specified the Tower’s purpose: </span><strong data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">meteorological and astronomical observations, physics experiments, a strategic vantage point, an optical telegraph communications point, a beacon for electric lighting and wind studies. </span></strong><span data-dcnode-id="1468" instrument_node="">Gustave Eiffel stated, “It will be for everyone an observatory and a laboratory the likes of which has never before been available to science. It is the reason why, from day one, all of our scientists have encouraged me with their utmost sympathies.</span><br data-dcnode-id="1467"><span data-dcnode-id="1466" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1463"></p><figure class="caption caption-img align-center" data-dcnode-id="1456" role="group"><span data-dcnode-id="1462" instrument_node="">
</span><img alt="Photo du bureau de Gustave Eiffel" data-dcnode-id="1461" data-entity-type="file" data-entity-uuid="3bd062c4-78f1-44e7-a04e-54c5c84712df" height="802" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toureiffel.paris/sites/default/files/inline-images/bureau%2520rec.jpg&amp;raw" width="1200"><span data-dcnode-id="1460" instrument_node="">
</span><figcaption data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Reconstruction of the Gustave Eiffel's office, represented here with Thomas Edison</span></figcaption><span data-dcnode-id="1457" instrument_node="">
</span></figure><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1454"></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1449" instrument_node="">Indeed, from 1889, the Eiffel Tower was used as a </span><strong data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">laboratory of measurements and scientific experiments</span></strong><span data-dcnode-id="1446" instrument_node="">. Considerable scientific apparatus was installed (barometers, anemometers, lightning conductors etc.). Moreover, Gustave Eiffel set himself an office aside on the third floor to make astronomical and physiological observations.</span></p><span data-dcnode-id="1444" instrument_node="">
</span></div><span data-dcnode-id="1442" instrument_node="">
</span></div><span data-dcnode-id="1440" instrument_node="">
</span><div class="paragraph paragraph--type--image-texte paragraph--view-mode--preview" data-dcnode-id="1408" id="aerodynamic-studies"><span data-dcnode-id="1439" instrument_node="">

</span><div class="image_texte_txt" data-dcnode-id="1416"><span data-dcnode-id="1436" instrument_node="">
</span><h2 data-dcnode-id="1431"><span data-dcnode-id="1435" instrument_node="">
</span><div class="field--name-field-image-texte-titre" data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">
                      Aerodynamic studies

                </span></div><span data-dcnode-id="1432" instrument_node="">
</span></h2><span data-dcnode-id="1430" instrument_node="">
</span><div class="field--name-field-image-texte-txt" data-dcnode-id="1418"><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1420"><strong data-dcnode-id="1424"><span data-dcnode-id="1428" instrument_node="">On the day after the Tower’s very inauguration, Gustave Eiffel installed a meteorology laboratory on the 3</span><sup data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">rd</span></sup><span data-dcnode-id="1425" instrument_node="">&nbsp;floor.</span></strong><span data-dcnode-id="1423" instrument_node="">&nbsp;He also had a passion for aerodynamics and carried out a series of observations on gravity (leading to the installation from 1903 to 1905 of gravity instruments). He imagined “an automatic system that would slide along the length of a cable stretched between the Tower’s 2nd floor and the ground.” He had a wind tunnel built at the foot of the Tower, and from the month of August 1909 to December 1911, he carried out five thousand trials. Additionally, Gustave Eiffel encouraged numerous scientific experiments on the Tower: Foucault’s Pendulum, the mercury pressure gauge, physiological studies and radio contact (1898).&nbsp;</span><strong data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">In the end, it was to be the Tower's role as an enormous antenna that would save it from destruction.</span></strong></p><span data-dcnode-id="1419" instrument_node="">
</span></div><span data-dcnode-id="1417" instrument_node="">

</span><h2 data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">The Eiffel Tower and the History of Broadcasting</span></h2><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Gustave Eiffel knew that the scientific uses of the Tower could prolong its lifespan. The Eiffel Tower was actually supposed to be dismantled after 20 years! That is why he allowed numerous scientific experiments to be carried out – meteorological and astronomical observations, physics, air resistance, etc.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">He succeeded in saving his Tower by putting it forward as a monumental support antenna for wireless broadcasting.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="993"><strong data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">The First Wireless Telegraphic Contact Led By Eugène Ducretet</span></strong></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">On the 5th November 1898, Eugène Ducretet carried out the first wireless telegraphy trials between the Eiffel Tower and the Pantheon (a distance of 4 km). The transmitter was installed at the top of the Tower. In 1899, the waves crossed the Channel for the first time.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="985"><strong data-dcnode-id="986"><img alt="TSF" class="align-right" data-dcnode-id="988" data-entity-type="file" data-entity-uuid="bbe9d6d1-34f0-428a-8820-8d25bc96d43b" height="469" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toureiffel.paris/sites/default/files/inline-images/poste%2520TSF_1.png&amp;raw" width="350"><span data-dcnode-id="987" instrument_node="">Wireless Transmission Saves the Tower</span></strong></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">In 1903, Gustave Eiffel, fascinated by scientific experiments, was still searching for a way to save “his” Tower, whose concession from the City of Paris was to come to an end 6 years later. He suggested to Captain Gustave Ferrié, then responsible for studying the military applications of wireless transmission, that he use the Tower for his experiments. He financed this operation, which enabled transmission and reception over 400 km. The Department of Military Engineering authorised Captain Ferrié to install antennas on the Tower. He set himself up in a wooden shelter next to the Southern Pillar.</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">In 1909, the underground military radiotelegraphy station was set up. The strategic interest in the Tower had been demonstrated and the City of Paris renewed Gustave Eiffel’s concession on the 1st January 1910.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="975"><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Experiment on Wireless Telegraphy</span></strong></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">In 1913, the Tower sent telegrams using electrical waves to as far as America and to ships making the crossing in a radius of 6,000 km.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="968"><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Wireless Transmission during the First World War</span></strong></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">In 1914, during the Battle of the Marne, the Tower’s radiotelegraphic station learnt that General Von Marwitz, Commander of the right wing of the German Army, was having administrative problems and as a result was halting his advance.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">This crucial information enabled the French command to organise a victorious counter-attack (the Taxis de la Marne).</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Thanks to the Eiffel Tower’s station, important enemy radio telegrams, sometimes concealed by a commercial appearance in neutral countries’ programmes, were deciphered. Spies were exposed, among them Mata Hari.</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="955"><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">The First Radio Programmes</span></strong></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="953" instrument_node="">From 1921, at first as an experiment, a civilian transmitter broadcast music programmes, columns, and lastly the "Journal Parlé" (spoken news) from 1925, picked up by amateurs on simple crystal radio sets.&nbsp;Radio Tour-Eiffel</span><b data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">&nbsp;</span></b><span data-dcnode-id="950" instrument_node="">was well-known to Parisians at the time.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Experimental programmes were organised and performers were invited to them, such as Sacha Guitry and Yvonne Printemps.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="942"><strong data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">The Beginnings of Television</span></strong></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">In 1935, a television studio was set up in rue de Grenelle and the Eiffel Tower transmitter began to operate. From 60 lines at the beginning of the installation, they then passed to a high definition of 180 lines.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="937" instrument_node="">On the 2</span><sup data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">nd</span></sup><span data-dcnode-id="934" instrument_node="">&nbsp;June 1953, thanks to the Eiffel Tower’s transmitter, television showed the whole of France the celebrations for the Queen of England’s coronation live. This was the beginning of Eurovision.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="929"><strong data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">The Tower Has Grown with Television’s Progress</span></strong></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">In 1957, live satellite dishes were installed, providing the three television channels’ programmes using 819 lines, along with the frequency modulation radio transmitter. The new antenna made the Eiffel Tower reach a height of 320.75 metres.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">In 2000, a new UHF (Ultra High Frequency) antenna led to another modification in the Tower’s height, which was now 324 m.</span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">In 2010, considerable work on the TDF equipment has been done to prepare for the complete changeover to digital television in Ile-de-France.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">&nbsp;</span></p><span data-dcnode-id="916" instrument_node="">
</span></div><span data-dcnode-id="914" instrument_node="">
