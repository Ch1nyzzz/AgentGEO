com/topics/eiffel" style="color:#3174a3"><span data-dcnode-id="569" instrument_node="">Eiffel</span></a><span data-dcnode-id="567" instrument_node=""> </span><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/tower" style="color:#3174a3"><span data-dcnode-id="566" instrument_node="">Tower</span></a><span data-dcnode-id="564" instrument_node="">.  This is the first thing that comes to your mind when you think about Paris, the tall, lean tower.  But have you ever wonder what would a symbol of Paris be if Eiffel Tower were never built?  When you think about Eiffel Tower you seem to automatically associate it with Paris but that was not always the case.  </span><br data-dcnode-id="563"><span data-dcnode-id="562" instrument_node="">
Eiffel Tower, consider by many as a miracle</span></span><a class="document__middle cursor-pointer source-serif text-l" data-dcnode-id="558" data-href="/writing/document/F3A5XSYVC" rel="nofollow" style="color:#3174a3"><i data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">…show more content…</span></i></a><br data-dcnode-id="557"><span class="document__preview text-l source-serif" data-dcnode-id="548"><span data-dcnode-id="556" instrument_node="">In spite of their appearance, these massive spans serve no practical function. They are strictly ornamental and do not help support the structure, which was the first object built to withstand the forces of the wind as well as gravity. Only now, more than one hundred years later, can we see the tower in context. It has aged gracefully and no longer stands in contrast to the ornate architecture that has survived in modern Paris. Once the </span><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/exposition" style="color:#3174a3"><span data-dcnode-id="555" instrument_node="">exposition</span></a><span data-dcnode-id="553" instrument_node=""> was over, plans were made to destroy the Eiffel Tower. The monument that brought so much displeasure because it represented that which was modern, new, and very un-Parisian, was actually saved by technological advances. Engineers realized that the structure would make a perfect broadcasting tower. </span><br data-dcnode-id="552"><span data-dcnode-id="551" instrument_node="">
</span><br data-dcnode-id="550"><span data-dcnode-id="549" instrument_node="">
