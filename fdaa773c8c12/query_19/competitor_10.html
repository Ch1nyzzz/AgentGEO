or: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="3567" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="3568" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="3569" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3570" style="box-sizing: border-box;"><span data-dcnode-id="3571" style="background: none;"><span data-dcnode-id="3572" instrument_node="">What was Erwin Rommel's opinion of the Jews?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="3434" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="3435" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3436" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="3558" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="3437" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="3522" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3523" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="3524" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="3525" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3526" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3555" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3556" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3557" instrument_node="">He never expressed one that history recorded, so far as I know. But one can deduce a few things from his actions, or rather his inactions, regarding Jews.</span></span></p><span data-dcnode-id="3554" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3551" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3552" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3553" instrument_node="">Short version:</span></span></p><span data-dcnode-id="3550" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3547" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3548" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3549" instrument_node="">Despite numerous orders (to all foreign commands) from Germany’s High Command, Rommel never sent one suspected Jew back to Germany. In fact, he never so much as sent a single soldier to look for them. He completely ignored orders of that kind.</span></span></p><span data-dcnode-id="3546" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3543" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3544" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3545" instrument_node="">For the long version, here is a little anecdote that might or not be related. Decide for yourself.</span></span></p><span data-dcnode-id="3542" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3539" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3540" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3541" instrument_node="">Basically at the very start of his early days commanding the Axis forces in North Africa, R</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3527" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3528" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3529" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3530" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3531" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3536" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3537" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3538" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3532" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3533"><svg data-dcnode-id="3534" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3535" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3438" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3439" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3440"><span class="q-box qu-userSelect--text" data-dcnode-id="3441" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3519" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3520" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3521" instrument_node="">He never expressed one that history recorded, so far as I know. But one can deduce a few things from his actions, or rather his inactions, regarding Jews.</span></span></p><span data-dcnode-id="3518" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3515" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3516" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3517" instrument_node="">Short version:</span></span></p><span data-dcnode-id="3514" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3511" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3512" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3513" instrument_node="">Despite numerous orders (to all foreign commands) from Germany’s High Command, Rommel never sent one suspected Jew back to Germany. In fact, he never so much as sent a single soldier to look for them. He completely ignored orders of that kind.</span></span></p><span data-dcnode-id="3510" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3507" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3508" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3509" instrument_node="">For the long version, here is a little anecdote that might or not be related. Decide for yourself.</span></span></p><span data-dcnode-id="3506" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3503" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3504" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3505" instrument_node="">Basically at the very start of his early days commanding the Axis forces in North Africa, Rommel saw an opportunity too good to pass up. The British, thinking that the Germans would be too scared to try anything with only a small number of their own units ashore, decided to just lightly garrison their front with Italy in North Africa and divert a lot of their force to an ill-advised attempt to intervene in the invasion of Greece. Rommel decided to round up the mobile forces he had and see if, by an audacious attack and rapid rush, he could scare the Brits’ garrison units into giving up the lands they hadwon by force from the Italians, and do so without a stand-up fight. Turns out he could, but I’m getting ahead of myself.</span></span></p><span data-dcnode-id="3502" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3495" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3500" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3501" instrument_node="">During the middle portion of that operation, a new German officer arrived in theater, with orders attaching him to Rommel’s staff. But this guy was not assigned to be a combat officer. He was, on paper, “an” intelligence officer but not “the” intelligence officer, of which Rommel already had one. But it was well known that such officers, unless assigned to actual intelligence activities, were usually just intended to be </span></span><span data-dcnode-id="3498" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3499" instrument_node="">political</span></span><span data-dcnode-id="3496" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3497" instrument_node=""> informants, to keep an eye on senior officers and then bypass the chain of command to report them to High Command if they seemed the least bit disloyal. Sometimes, however, the men chosen to fill this role actually had some talents and skills in battle. They were just thought to be the kind of officer who would actually be on the lookout for opportunities to enforce the kinds of Nazi edicts commanders like Rommel would prefer to ignore.</span></span></p><span data-dcnode-id="3494" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3491" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3492" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3493" instrument_node="">Anyway, during a rapid advance in roughly this same time period, when the British forward outposts seemed to be falling over themselves to deny him a battle by withdrawing from the entire district (as he’d hoped they would), he was riding along with a forward unit in his staff vehicle when an odd signal came in. Apparently someone had reported up the chain that a significant force of British tanks were coming southwest (right toward Rommel, by the way) from a town not too many kilometers northeast of Rommel’s current position.</span></span></p><span data-dcnode-id="3490" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3483" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3488" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3489" instrument_node="">Rommel figured the report might or might not be correct. If it was false, well, they needed to know that so they could know it was safe to ignore that vector. If it was correct, then as he figured it the best thing was to keep advancing east and cut that tank unit off from its supply lines, leaving it with no fuel with which it could do any real damage, then mop up afterwards. But he still needed to </span></span><span data-dcnode-id="3486" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3487" instrument_node="">know</span></span><span data-dcnode-id="3484" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3485" instrument_node="">, so that other units could be alerted to the potential threat, and so that he and his staff could keep track of it on their planning maps until they were ready to deal with it.</span></span></p><span data-dcnode-id="3482" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3475" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3480" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3481" instrument_node="">So he needed to send a recon unit. Preferably they should be quick enough to get there and get the information while the report was still fresh, and they needed a radio to transmit that information back. But Rommel didn’t want to risk a lot of soldiers getting into a battle with a force he had no intention of fighting just yet. So he sent the new officer in a car with a radio. Alone. With orders to get close enough to positively ID those tanks </span></span><span data-dcnode-id="3478" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="3479" instrument_node="">by type</span></span><span data-dcnode-id="3476" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3477" instrument_node=""> and radio that information back.</span></span></p><span data-dcnode-id="3474" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3471" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3472" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3473" instrument_node="">Now as I see it, Rommel saw this as a win-win-win situation.</span></span></p><ul class="q-box" data-dcnode-id="3453" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3468" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3469" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3470" instrument_node="">Win A: if the tanks are really there, and if this new guy is really just an informant toady with no skills as a combat officer, he’ll be killed in the line of duty in a way nobody can object to. Total loss, one dude better off dead before he gets someone else killed, plus one car and one radio. Plus Rommel will now know there is really an enemy force there and will need to send someone competent to get the info, or order a recon overflight.</span></span></li><li class="q-relative" data-dcnode-id="3457" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3466" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3467" instrument_node="">Win B: if the tanks are there, but this guy has some combat skills and snap, he’ll find a way to get the info and get back out alive. This will prove to Rommel that he is worth preserving, whether informant or not, so he can be put to productive use in the future. And with the precedent already set, it would not raise eyebrows for Rommel to continue using this would-be informant for dangerous tasks </span></span><span data-dcnode-id="3464" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3465" instrument_node="">away from</span></span><span data-dcnode-id="3462" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3463" instrument_node=""> the rest of the staff. Total cost: nothing, but he gains a competent </span></span><span data-dcnode-id="3460" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3461" instrument_node="">combat</span></span><span data-dcnode-id="3458" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3459" instrument_node=""> officer.</span></span></li><li class="q-relative" data-dcnode-id="3454" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="3455" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3456" instrument_node="">Win C: if the tanks are not there or not what they were reported to be, nothing lost, but important information is gained. Additional gain: he learns if this new officer will at least follow orders to go into harm’s way and do as he’s told. Precedent is also set to justify another such order to get him out of the way, if it should become advisable.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3450" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3451" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3452" instrument_node="">As it turned out, they were Italian tanks that had been abandoned during the Italians’ rout from that entire province. They had run out of fuel and been left behind by their crews in their haste to escape the oncoming British Eighth Army the year before. They were later gathered up and put back into service.</span></span></p><span data-dcnode-id="3449" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3446" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3447" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3448" instrument_node="">Still, I think perhaps that illuminates Rommel’s priorities and just how loyal he was in the political, as opposed to military, sense.</span></span></p><span data-dcnode-id="3445" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3442" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3443" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3444" instrument_node="">NB: there is no further mention of this particular officer, nor is his name ever given in the account of this particular event. So I have no idea if he lived or died, if he turned out to be a party hack or a real combat officer.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3370" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3371" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3372" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id= 1" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="2902" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="2903" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="2904" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="2905" style="box-sizing: border-box;"><span data-dcnode-id="2906" style="background: none;"><span data-dcnode-id="2907" instrument_node="">How many books did Napoleon Bonaparte read?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="2750" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="2751" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2752" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="2893" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="2753" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="2835" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2836" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2837" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="2838" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="2839" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2882" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2891" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2892" instrument_node="">A lot. He was a </span></span><span data-dcnode-id="2889" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2890" instrument_node="">voracious reader</span></span><span data-dcnode-id="2887" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2888" instrument_node="">, to the extent that he actually </span></span><span data-dcnode-id="2885" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2886" instrument_node="">travelled with his (portable) library</span></span><span data-dcnode-id="2883" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2884" instrument_node="">! He literally always travelled with books and took great interest into getting the best portable library possible.</span></span></p><span data-dcnode-id="2881" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2852" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2879" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2880" instrument_node="">He read </span></span><span data-dcnode-id="2877" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2878" instrument_node="">a lot</span></span><span data-dcnode-id="2875" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2876" instrument_node="">. He read </span></span><span data-dcnode-id="2873" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2874" instrument_node="">all the philosophical classics</span></span><span data-dcnode-id="2871" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2872" instrument_node="">, such as The Prince by Machiavelli, Montaigne’s Essays, Plato’s Republic, Jean-Jacques Rousseau’s oeuvre, and many, many others. He also read a lot about </span></span><span data-dcnode-id="2869" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2870" instrument_node="">ancient history</span></span><span data-dcnode-id="2867" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2868" instrument_node="">, especially </span></span><span data-dcnode-id="2865" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2866" instrument_node="">Livy</span></span><span data-dcnode-id="2863" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2864" instrument_node=""> and </span></span><span data-dcnode-id="2861" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2862" instrument_node="">Plutarch</span></span><span data-dcnode-id="2859" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2860" instrument_node="">. His favourite work was </span></span><span data-dcnode-id="2857" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="2858" instrument_node="">The Lives of the Noble Grecians and Romans</span></span><span data-dcnode-id="2855" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2856" instrument_node=""> </span></span><span data-dcnode-id="2853" style="font-weight: normal; font-style: normal; background: none;"><span data- iming-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="1964" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-0b92ba60f2571648cd4054420462c09b-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1959" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1960" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1961" instrument_node="">This is what he had to say about Russian, or more precisely, Soviet chess:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="1947" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1949" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1957" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1958" instrument_node="">“We must finish once and for all with the neutrality of chess. We must condemn once and for all the formula "chess for the sake of chess", like the formula "art for art's sake". We must organize shock brigades of chess-players, and begin immediate realization of a Five-Year Plan for chess.” </span></span><span class="q-inline" data-dcnode-id="1950" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolai_Krylenko" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="1956" instrument_node="">Nikolai Krylenko - Wikipedia</span></a><span class="q-inlineBlock" data-dcnode-id="1951" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1952"><svg data-dcnode-id="1953" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1954" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="1948" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1944" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1945" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1946" instrument_node="">Lenin, an enthusiastic player, gave the game a high priority. Stalin continued with this policy.</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="1935" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1941" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1942" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1943" instrument_node="">“In 1920, Alexander Ilyin-Zhenevsky, a commissar of Soviet chess, wrote that chess, ‘in some ways even more than sport, develops in a man boldness, presence of mind, composure, a strong will, and, most important, a sense of strategy.’</span></span></p><span data-dcnode-id="1940" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1937" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1938" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1939" instrument_node="">The Soviets set about mass-producing chess excellence. In 1991, the year the Soviet Union broke up, the top nine players in the world were from the U.S.S.R.”</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="1936" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1925" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1933" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1934" instrument_node="">Read more at </span></span><span class="q-inline" data-dcnode-id="1926" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1931" href= unist and left the Soviet Union. Negotiations were underway with Alekhine to play Botvinnik, the first USSR challenger for the world chess championship. However Alekhine died in 1946 in Portugal before the match could begin.</span></span></p><span data-dcnode-id="1907" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1904" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1905" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1906" instrument_node="">By 1948 Botvinnik was world champion, beginning the long reign of Soviet champions, broken only by Bobby Fischer in 1972. Karpov continued USSR domination in 1975. It wasn’t until 2007 when V. Anand, an Indian, became only the second non-Soviet or Russian player since WWII to take the title.</span></span></p><span data-dcnode-id="1903" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1895" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="1896" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Chess_Championship%23Undisputed_world_champions_.281886.E2.80.931993.29" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="1902" instrument_node="">World Chess Championship - Wikipedia</span></a><span class="q-inlineBlock" data-dcnode-id="1897" name="ExternalLink" style="box-sizing: border-box; display: inl "q-text qu-wordBreak--break-word" data-dcnode-id="1694" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="1695" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1720" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1721" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1722" instrument_node="">Not…. Exactly. Not directly anyway.</span></span></p><span data-dcnode-id="1719" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1716" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1717" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1718" instrument_node="">Napoleon’s army at various points included troops that were Belgian, Spanish, Italian, German (an awful lot from Bavaria) Polish, Dutch, the list goes on... They were usually supplied by “Allies” (the main exception being the Polish, but their situation was pretty unique).</span></span></p><span data-dcnode-id="1715" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1712" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1713" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1714" instrument_node="">These “alliances” themselves though, while some were entered into without duress, others were little better than blackmail disguised as statesmanship, while other were imposed upon conquered nations.</span></span></p><span data-dcnode-id="1711" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1708" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1709" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1710" instrument_node="">In the latter case, it is possible (indeed extremely likely) that troops in a non French regi</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1696" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1697" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1698" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1699" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1700" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1705" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1706" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1707" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1701" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1702"><svg data-dcnode-id="1703" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1704" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1660" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1661" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1662"><span class="q-box qu-userSelect--text" data-dcnode-id="1663" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1688" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1689" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1690" instrument_node="">Not…. Exactly. Not directly anyway.</span></span></p><span data-dcnode-id="1687" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1684" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1685" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1686" instrument_node="">Napoleon’s army at various points included troops that were Belgian, Spanish, Italian, German (an awful lot from Bavaria) Polish, Dutch, the list goes on... They were usually supplied by “Allies” (the main exception being the Polish, but their situation was pretty unique).</span></span></p><span data-dcnode-id="1683" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1680" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1681" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1682" instrument_node="">These “alliances” themselves though, while some were entered into without duress, others were little better than blackmail disguised as statesmanship, while other were imposed upon conquered nations.</span></span></p><span data-dcnode-id="1679" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1676" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1677" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1678" instrument_node="">In the latter case, it is possible (indeed extremely likely) that troops in a non French regiment, serving in Napoleon's army, had previously fought against the French.</span></span></p><span data-dcnode-id="1675" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1672" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1673" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1674" instrument_node="">(As an aside, this certainly happened the other way round too. Spanish troops that had fought alongside the French, ended up fighting against them, after the French bungled the situation in Spain)</span></span></p><span data-dcnode-id="1671" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1668" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1669" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1670" instrument_node="">While certainly not always the case, sometimes regiments of a conquered nation were disbanded… officially… and re raised from scratch. The notion being to break their loyalty to the regime Napoleon's forces had beaten. When the regiment was re-raised though, a fair proportion of those that joined had previously been from a unit that had been disbanded, (and were often given NCO positions due to their experience) so they accounted for themselves better on the battlefield than their freshly raised status would lead you to expect, as their numbers were leavened with veterans that didn't really care who they were fighting against, as long as it wasn't their own people.</span></span></p><span data-dcnode-id="1667" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1664" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1665" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1666" instrument_node="">So, while the troops themselves on some occasions had previously fought against the French, they were mainly sent (or extorted) from their own nations, rather than being raised directly by the French.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1592" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1593" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1594" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1608" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1630" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1631" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1641" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1642" style="box-sizing: border-box; position: relative;"><button aria-label="5 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="1643" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; transition-timing-function: ease-out; border-width: 0px; outline: none; color: inherit; background-color: transparent;" t  normal; font-style: normal; background: none;"><span data-dcnode-id="1047" instrument_node="">The best documented source I’ve found about Napoleon’s chess ability is </span></span><span class="q-inline" data-dcnode-id="1039" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chesshistory.com/winter/extra/napoleon.html" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.chesshistory.com"><span data-dcnode-id="1045" instrument_node="">Napoleon Bonaparte and Chess by Edward Winter</span></a><span class="q-inlineBlock" data-dcnode-id="1040" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1041"><svg data-dcnode-id="1042" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1043" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1037" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1038" instrument_node=""> . Apparently we don’t have any examples of his actual games. The three often cited games were unfortunately, fiction. But there are letters written at the time that discuss his strength, or more accurately, his lack thereof. Below are several quotes from the various letters that Winter researched. The authors are listed in the article so can be checked out at the hyperlink. The quotes are direct cuts and pastes so any spelling errors are from the Winter article.</span></span></p><span data-dcnode-id="1035" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1032" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1033" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1034" instrument_node="">‘The emperor was</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1020" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1021" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1022" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1023" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1024" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1029" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1030" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1031" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1025" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1026"><svg data-dcnode-id="1027" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1028" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="979" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="980" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="981"><span class="q-box qu-userSelect--text" data-dcnode-id="982" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1003" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1013" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1014" instrument_node="">The best documented source I’ve found about Napoleon’s chess ability is </span></span><span class="q-inline" data-dcnode-id="1006" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chesshistory.com/winter/extra/napoleon.html" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.chesshistory.com"><span data-dcnode-id="1012" instrument_node="">Napoleon Bonaparte and Chess by Edward Winter</span></a><span class="q-inlineBlock" data-dcnode-id="1007" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1008"><svg data-dcnode-id="1009" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1010" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="1004" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1005" instrument_node=""> . Apparently we don’t have any examples of his actual games. The three often cited games were unfortunately, fiction. But there are letters written at the time that discuss his strength, or more accurately, his lack thereof. Below are several quotes from the various letters that Winter researched. The authors are listed in the article so can be checked out at the hyperlink. The quotes are direct cuts and pastes so any spelling errors are from the Winter article.</span></span></p><span data-dcnode-id="1002" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="999" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1000" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1001" instrument_node="">‘The emperor was not skilful in opening a game of chess. From the outset he often lost pieces and pawns, but his opponents did not dare take advantage thereof. It was only in the middle-game that he was inspired; the mêlée of pieces kindled his intelligence; he saw more than three or four moves and implemented beautiful and clever combinations’</span></span></p><span data-dcnode-id="998" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="991" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="996" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="997" instrument_node="">‘Before dinner, the emperor always played several games of chess. After dinner, we reverted to playing reversi …’ In the August 1815 issue, the Comte had written of a voyage on the </span></span><span data-dcnode-id="994" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="995" instrument_node="">Northumberland</span></span><span data-dcnode-id="992" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="993" instrument_node="">: ‘After piquet there were several games of chess with the great Marshal, M. de Montholon, or another, which led up to dinner. Nobody on the ship was very strong; the Emperor was exceedingly little so. He defeated some and lost to others, which led him to say one evening, “How is it that I lose very often to those who have never defeated the one whom I almost always defeat? Is there not a contradiction there? How is this problem to be resolved?”, he said, winking, to show that he was not taken in by the customary gallantry of one who was, in fact, the strongest.’</span></span></p><span data-dcnode-id="990" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="987" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="988" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="989" instrument_node="">‘On one occasion the First Consul was playing chess; as he was not very strong, he used the same method as in reversi. The game could never finish because there were always two white bishops or two black bishops. He did not like this to be remarked upon too seriously. He was the very first to laugh about it. But he was evidently angry that we accorded it too much importance.’</span></span></p><span data-dcnode-id="986" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="983" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="984" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="985" instrument_node="">It would appear that being a great military leader doesn’t automatically make one a great chess player. An I imagine the converse is similar.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="911" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="912" style="box-sizing: border-box; transition-property: box-shadow; transition eight: normal; font-style: normal; background: none;"><span data-dcnode-id="820" instrument_node="">How good you you mean when you say, "very good at chess?"  </span></span></p><span data-dcnode-id="817" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="814" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="815" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="816" instrument_node="">It is in fact very rare for the best chess players, the international grand masters, to be world class in anything else.  So that's not evidence that they are geniuses.  And I've never heard of any studies showing a strong correlation between the most common numerical rating for chess players (Elo rating) and IQ.</span></span></p><span data-dcnode-id="813" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="810" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="811" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="812" instrument_node="">Ken Rogoff is the only example I know of someone who's world class in two fields.  In 1976 he played in an Interzonal tournament, a qulifier for the world championship.  In 1978 he became an international grand master.  In 1980</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="798" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="799" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="800" style="box-sizing: border-box; position: relative; bo zing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="591" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="592" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="593" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="594" style="box-sizing: border-box;"><span data-dcnode-id="595" style="background: none;"><span data-dcnode-id="596" instrument_node="">Where, when, and why was Napoleon defeated?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="469" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="470" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="471" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="582" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="472" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="544" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="545" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="546" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="547" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="548" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="579" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="580" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="581" instrument_node="">First of all, Napoleon is often regarded as one of the greatest military leaders in history, alongside Alexander the Great or Julius Caesar.</span></span></p><span data-dcnode-id="578" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="575" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="576" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="577" instrument_node="">From 1793 to 1815 he won 44 battles and lost only 5. During his reign he conquered a vast empire that stretched from Lisbon to Moscow in 1812.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="572" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="573" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="574" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-fccd62322f9be96f1c4c927c01e9a354-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="569" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="570" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="571" instrument_node="">Napoleon was "the warlord in person" according to Clausewitz, a great Prussian strategist.</span></span></p><span data-dcnode-id="568" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="565" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="566" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="567" instrument_node="">It took all of Europe to unite against him to overcome it. He was therefore unquestionably a military genius.</span></span></p><span data-dcnode-id="564" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="561" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="562" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="563" instrument_node="">Many of his victories are among the most brilliant in the history of war, and they are even still taught today in milit</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="549" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="550" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="551" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="552" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="553" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="558" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="559" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="560" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="554" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="555"><svg data-dcnode-id="556" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="557" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="473" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="474" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="475"><span class="q-box qu-userSelect--text" data-dcnode-id="476" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="541" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="542" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="543" instrument_node="">First of all, Napoleon is often regarded as one of the greatest military leaders in history, alongside Alexander the Great or Julius Caesar.</span></span></p><span data-dcnode-id="540" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="537" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="538" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="539" instrument_node="">From 1793 to 1815 he won 44 battles and lost only 5. During his reign he conquered a vast empire that stretched from Lisbon to Moscow in 1812.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="534" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="535" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="536" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-fccd62322f9be96f1c4c927c01e9a354-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="531" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="532" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="533" instrument_node="">Napoleon was "the warlord in person" according to Clausewitz, a great Prussian strategist.</span></span></p><span data-dcnode-id="530" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="527" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="528" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="529" instrument_node="">It took all of Europe to unite against him to overcome it. He was therefore unquestionably a military genius.</span></span></p><span data-dcnode-id="526" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="523" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="524" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="525" instrument_node="">Many of his victories are among the most brilliant in the history of war, and they are even still taught today in military academies, such as the Italian Campaign or the Battle of Austerlitz, just to name them.</span></span></p><span data-dcnode-id="522" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="519" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="520" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="521" instrument_node="">Napoleon's defeat owed more to his political mistakes than to his military failures, even though he was a very skilled politician as well. He became drunk with success and power.</span></span></p><span data-dcnode-id="518" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="515" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="516" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="517" instrument_node="">The intoxication of success and power</span></span></p><span data-dcnode-id="514" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="507" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="512" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="513" instrument_node="">Indeed, thanks to his military genius</span></span><span data-dcnode-id="510" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="511" instrument_node="">, </span></span><span data-dcnode-id="508" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="509" instrument_node="">Napoleon quickly defeated most of the European powers, one after the other, thus bringing the whole continent to his knees.</span></span></p><span data-dcnode-id="506" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="503" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="504" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="505" instrument_node="">His military victories and his immense political power, due to his domination over the whole of Europe, no doubt gave him a feeling of invincibility which made him lose his sense of reason.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="500" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="501" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="502" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-f5111fa077e833d650f26a7eddae8c82-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="497" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="498" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="499" instrument_node="">Napoleon's sense of omnipotence surely ended up going to his head, which was human.</span></span></p><span data-dcnode-id="496" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="493" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="494" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="495" instrument_node="">Napoleon thus no longer had any limits, he felt so powerful that he believed he could do and impose whatever he wanted, and that made him make serious mistakes.</span></span></p><span data-dcnode-id="492" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="489" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="490" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="491" instrument_node="">In particular, he imposed a trade blockade on the whole of Europe with England, the only country to still resist him. However, European nations were very dependent on this trade, they could not do without it.</span></span></p><span data-dcnode-id="488" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="485" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="486" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="487" instrument_node="">And Napoleon knew that but he was so intoxicated with his military and political glory that he didn't care. This is what brought about his downfall.</span></span></p><span data-dcnode-id="484" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="481" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="482" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="483" instrument_node="">Because obviously, the European countries did not apply the trade blockade, in particular Portugal and Russia. In response, Napoleon sent the Grande Armée to invade these countries.</span></span></p><span data-dcnode-id="480" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="477" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="478" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="479" instrument_node="">This brought about the war in Spain which wore down the Frenc
