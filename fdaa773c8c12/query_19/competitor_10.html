l; font-style: normal; background: none;"><span data-dcnode-id="4494" instrument_node=""></span><br data-dcnode-id="4493"><span data-dcnode-id="4492" instrument_node="">Count Molé, the Minister of Finance, after a very faithful review of the flattering condition of the empire, concluded his report with the following words: "If a man of the age of the Medici, or of Louis XVI., were to revisit the earth, and at the sight of so many marvels, ask how many ages of peace and glorious reigns had been required to produce them, he would be answered, '</span></span><span data-dcnode-id="4489" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4490" instrument_node="">Twelve years of war and a single man.</span></span><span data-dcnode-id="4487" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4488" instrument_node="">'"</span></span></p><span data-dcnode-id="4485" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4482" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4483" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4484" instrument_node=""></span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4479" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4480" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4481" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-67ba55bfb97738019649fc539285c76d-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4476" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4477" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4478" instrument_node=""></span></span></p><span data-dcnode-id="4475" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4470" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4471" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4474" instrument_node="">Sir Alison, as a British historian, was criticized for siding with the Tories in his writing, yet he had these words to say: </span><br data-dcnode-id="4473"><span data-dcnode-id="4472" instrument_node="">"When it is recollected that an expenditure so vast on objects so truly imperial, amounting to nearly 17.5 M a year, took place during a period of extraordinary warlike exertion, and almost unbroken maritime and territorial hostility, it must be confessed that it demonstrates an elevation of mind and grandeur of conception on the part of Napoleon, which, as much as his military achievements, mark him as one of the most marvelous of mankind."</span></span></p><span data-dcnode-id="4469" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4466" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4467" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4468" instrument_node="">As a Military Leader</span></span></p><span data-dcnode-id="4465" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4462" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4463" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4464" instrument_node=""></span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4458" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4459"><div class="q-box unzoomed" data-dcnode-id="4460" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4461" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-c5900119b22bd5088bc08bf452c5fe37-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4451" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4454" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4457" instrument_node=""></span><br data-dcnode-id="4456"><span data-dcnode-id="4455" instrument_node=""></span></span><span data-dcnode-id="4452" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4453" instrument_node="">Napoleon leads his troops across the bridge at Arcole. So fierce was the Austrian fire that even the bravest troops feared to cross it. Reaching halfway, an officer fell dead at his side. The Austrians managed to push the invading troops off the bridge and into the marsh. The French troops fearing for Napoleon's life, and roused by his bravery, ran to his aid.  </span></span></p><span data-dcnode-id="4450" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4447" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4448" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4449" instrument_node="">Napoleon had the most extraordinary energy known to man. Often, he endured every hardship of his soldiers, and proved to his army and the world that an army could cross the Alps, march across Europe into Russia, and traverse the deserts of Egypt, all with a rapidity that was previously thought impossible. </span></span></p><span data-dcnode-id="4446" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4443" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4444" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4445" instrument_node="">He hardly slept on campaigns, spending the wee hours of the morning riding from camp to  camp, making every possible preparation. In one meeting with his generals, exhausted from sleep deprivation, he fell asleep mid-sentence, snoring loudly as his generals looked bewildered. He would sometimes go without sleep for over three days, then throw himself on a hay bail, or along side the road, then sleep for little more than an hour before he got back on his horse. </span></span></p><span data-dcnode-id="4442" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4439" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4440" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4441" instrument_node=""></span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4436" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4437" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4438" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-0e79760e6aed0f680aac1409e6dfdce5-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4433" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4434" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4435" instrument_node=""></span></span></p><span data-dcnode-id="4432" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4429" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4430" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4431" instrument_node="">His soldiers recounted a time when he was found sleeping on top of a cannon, while rounds of grape shot blasted the ground around him. </span></span></p><span data-dcnode-id="4428" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4425" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4426" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4427" instrument_node="">In another instance, he noticed one of his Generals was afraid to step into the open field during live fire. He stood straight-backed while shots flew by, calling the General to his side. The General ducked and ran up to him. His his head was blown off before he made it. "If the General had stood straight like myself, he would have lived." Said Napoleon. </span></span></p><span data-dcnode-id="4424" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4421" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4422" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4423" instrument_node="">He inspired such bravery in his troops because he himself was among the bravest that has ever lived. He was incredibly restless, and his brilliance as a military leader came from the speed at which he struck, like lightening upon his adversaries, the courage he inspired, which his soldiers believed fascinating, and the fact that he was fighting for the popular rights of all men, against the aristocratic privilege of Europe.</span></span></p><span data-dcnode-id="4420" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4417" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4418" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4419" instrument_node="">He was also magnanimous in nearly every treaty he made, even when he had every right to take remuneration. It is believed by his critics that he was a war mongerer, yet in almost every offensive strike, it was because his adversary displayed every indication of preparing for war. An exception may be the Egyptian Campaign, however France was fearful of England's continuing expansion and colonization around the world. Even still, Napoleon fought to restore the rights of common citizens from the Mamelukes, and his proclamation to Egypt represents a rare form of political intelligence that is both empathetic and fierce. </span></span></p><span data-dcnode-id="4416" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4413" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4414" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4415" instrument_node="">"People of Egypt: You will be told by our enemies, that I am come to destroy your religion.  Believe them not.  Tell them that I am come to restore your rights, punish your usurpers, and raise the true worship of Mahomet.  Tell them that I venerate, more than do the Mamelukes, God, His prophet, and the Koran.  Tell them that all men are equal in the sight of God; that wisdom, talents, and virtue alone constitute the difference between them. And what are the virtues which distinguish the Mamelukes, that entitle them to appropriate all the enjoyments of life to themselves? If Egypt is their farm, let them show their lease, from God, by which they hold it.  Is there a fine estate? It belongs to the Mamelukes.  Is there a beautiful slave, a fine horse, a good house? All belong to the Mamelukes.  But God is just and merciful, and He hath ordained that the Empire of the Mamelukes shall come to an end.  Thrice happy those who shall side with us; they shall prosper in their fortune and their rank.  Happy they who shall be neutral; they will have time to become acquainted with us, and will range themselves upon our side.  But woe, threefold woe, to those who shall arm for the Mamelukes and fight against us!  For them there will be no hope; they shall perish."</span></span></p><span data-dcnode-id="4412" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4409" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4410" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4411" instrument_node="">Finally, after his capitulation, he denied several offers from well connected diplomates to conduct his escape. Even his brother Joseph, who bears a striking resemblance, offered to go in his place.  Instead, he surmised that his legacy as a martyr of France would effect a greater good for its citizens in the long run. When the British naval ship came to collect him, he told his troops to stand aside, and walked across the ramp onto the British ship alone, on his own free will.  </span></span></p><span data-dcnode-id="4408" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4405" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4406" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4407" instrument_node=""></span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4401" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4402"><div class="q-box unzoomed" data-dcnode-id="4403" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4404" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-5fb025c305ef9e598914c5e584431592-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4392" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4395" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4400" instrument_node=""></span><br data-dcnode-id="4399"><span data-dcnode-id="4398" instrument_node="">Napoleon's capitulation and plea for hospitality to the Prince Regent;</span><br data-dcnode-id="4397"><span data-dcnode-id="4396" instrument_node=""></span></span><span data-dcnode-id="4393" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4394" instrument_node="">"'Your Royal Highness, A victim to the factions which distract my country, and to the enmity of the greatest powers of Europe, I have terminated my political career, and I come, like Themistocles, to throw myself on the hospitality of the British people.</span></span></p><span data-dcnode-id="4391" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4388" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4389" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4390" instrument_node="">'I put myself under the protection of their laws; which I claim from your Royal Highness, as the most powerful, the most constant, and the most generous of my enemies. Rochefort 13 July 1815, Napoleon'.” </span></span></p><span data-dcnode-id="4387" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4384" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4385" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4386" instrument_node="">On receiving the letter, the prince reportedly declared: “Upon my word, a very proper letter: much more so, I must say, than any I ever received from Louis XVIII”. </span></span></p><span data-dcnode-id="4383" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4380" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4381" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4382" instrument_node="">Despite this, Napoleon's request for protection was refused, and he was exiled on the island of St Helena, where he remained until his death in May 1821.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4298" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4299" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4300" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4314" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4346" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4347" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4357" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4358" style="box-sizing: border-box; position: relative;"><button aria-label="48 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--dark 19" instrument_node="">Madame de Rémusat vs. Napoleon</span></a><span class="q-inlineBlock" data-dcnode-id="4114" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4115"><svg data-dcnode-id="4116" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4117" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4111" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4112" instrument_node="">: The Madame played a little too passively and Napoleon punished her swiftly. 5…Nfg4 is a blunder according to Stockfish, but it is quite difficult for a human to prove such; Madame’s first few moves in response to it are the same as Stockfish’s. Instead of 8.Nh3, a logical but wrong move to defend the f2 square, she needed to play 8.Bf4. Then she would have won a piece, and Napoleon would have had a tough time. From there, however, Napoleon played a perfect game, with a dazzling attack involving two sacrifices.</span></span></p><span data-dcnode-id="4109" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4106" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4107" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4108" instrument_node="">It is hard to be sure how seriously to take this game, because Madame de Rémusat and Napoleon had a political relationship, and she might have found it unwise to play her best. Apparently, she didn’t think Napoleon played chess well, even though he beat her in this game and the next one in the list. But we also don’t know how well Madame de Rémusat played, since these are her only two attested games, and women were not encouraged to play chess well in those days.</span></span></p><span data-dcnode-id="4105" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4095" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="4098" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chessgames.com/perl/chessgame%3Fgid%3D1250611" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.chessgames.com"><span data-dcnode-id="4104" instrument_node="">Napoleon vs. Madame de Rémusat</span></a><span class="q-inlineBlock" data-dcnode-id="4099" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4100"><svg data-dcnode-id="4101" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4102" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4096" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4097" instrument_node="">: A retread of the previous game, even though Napoleon was playing White this time. Chessgames calls this game “probably analysis”. There’s not really anything to learn from this game, so I’ll disregard it. (Some sources claim Napoleon played only one game against Madame de Rémusat, so it’s quite possible one of them was real and the other is an erroneous copy of it.)</span></span></p><span data-dcnode-id="4094" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4084" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="4087" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chessgames.com/perl/chessgame%3Fgid%3D1250610" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.chessgames.com"><span data-dcnode-id="4093" instrument_node="">Napoleon vs. The Turk</span></a><span class="q-inlineBlock" data-dcnode-id="4088" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4089"><svg data-dcnode-id="4090" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4091" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4085" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4086" instrument_node="">: One of the most famous games in chess history, though not because of the quality of the play or its players, but rather because the players were Napoleon Bonaparte and what was purportedly a machine (but was actually chess master Johann Allgaier in a giant puppet). Napoleon’s 2.Qf3 was a weak move, but he may have been trying to assess the ability of the “machine” to respond to an early mating threat. The Turk punished him swiftly and soundly for this; much of the trouble Napoleon experienced in this game stemmed from this move, as he had to keep moving his queen while Black kept developing. An excellent illustration of why it’s usually bad to develop the queen early.</span></span></p><span data-dcnode-id="4083" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4080" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4081" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4082" instrument_node="">We can only guess how well Napoleon might have performed if he hadn’t played 2.Qf3, but I suspect he was no match for Allgaier no matter what he did.</span></span></p><span data-dcnode-id="4079" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4069" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="4072" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chessgames.com/perl/chessgame%3Fgid%3D1250609" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.chessgames.com"><span data-dcnode-id="4078" instrument_node="">Napoleon vs. Henri Gatien Bertrand</span></a><span class="q-inlineBlock" data-dcnode-id="4073" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4074"><svg data-dcnode-id="4075" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4076" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4070" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4071" instrument_node="">: It is unclear whether this was a real game; chessgames calls it “probably analysis”. Also, being a French general, and knowing Napoleon hated losing, he might well have thrown the game. Still, I will assume this was a real game and Bertrand did not throw it. In that case, this game is easily the most telling of the bunch.</span></span></p><span data-dcnode-id="4068" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4065" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4066" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4067" instrument_node="">14.Rf5+ is a very good move, one that I think may be beyond my ability to see in a real game (as opposed to a puzzle). If Napoleon really came up with this move, I am impressed.</span></span></p><span data-dcnode-id="4064" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4061" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4062" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4063" instrument_node="">10.Bxf7+ before it was a clever but inaccurate move; Stockfish thinks Black stands rather better. 10.fxe5 bxa1=Q 11.Qd5 would have given White a crushing attack that Black could not refute. In the actual game, Black’s poor defense did him in: he needed to play 12…c6 to give his king an escape square, or 13…Qxe5 to protect the crucial e7 square. Instead, he wasted a move by playing the pointless 13…a5. If Bertrand did throw the game, this was where he did it.</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="4060" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4057" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4058" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4059" instrument_node="">So what would Napoleon’s Elo be if he were transplanted into today’s world? We simply don’t have enough information. We are unsure the games are completely real, and two of Napoleon’s opponents may have had political reasons to play poorly. But if we take all the games at face value, it’s clear he was not an awful player. If I had to guess, I’d say he played at what we call “club level” today: far below professional strength, but certainly well beyond the beginner level. Contemporary accounts of Napoleon’s play are not flattering, however, so I do wonder if these were real games, and if so, if they were typical of his play.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3985" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3986" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3987" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4001" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4023" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4024" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4034" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4035" style="box-sizing: border-box; position: relative;"><button aria-label="3 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="4036" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; transition-timing-function: ease-out; border-width: 0px; outline: none; color: inherit; background-color: t 7" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3836" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3855" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3856" instrument_node="">After all, he fought 60 battles, </span></span><span class="q-inline" data-dcnode-id="3848" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_career_of_Napoleon_Bonaparte" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3854" instrument_node="">losing only 8</span></a><span class="q-inlineBlock" data-dcnode-id="3849" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3850"><svg data-dcnode-id="3851" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3852" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3846" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3847" instrument_node="">, only two of which are considered decisive losses. The other European powers united in not one, but </span></span><span class="q-inline" data-dcnode-id="3839" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleonic_Wars" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3845" instrument_node="">seven different wars</span></a><span class="q-inlineBlock" data-dcnode-id="3840" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3841"><svg data-dcnode-id="3842" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3843" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3837" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3838" instrument_node=""> until they finally brought him down for good.</span></span></p><ol class="q-box" data-dcnode-id="3742" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3833" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3834" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3835" instrument_node="">Napoleon was a gambler. Warfare of the time was led by the aristocrats, who were generally very conservative people. They didn’t take risks as a rule. Napoleon, who was a nobody, rose to the top of the military ladder by being a clever gambler who could take advantage of his conservative (and often predictable) opponents. This would actually prove his downfall in the end, because success is a poor teacher, and he consistently overplayed the odds in the last few years of his reign.</span></span></li><li class="q-relative" data-dcnode-id="3821" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3831" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3832" instrument_node="">Napoleon was a hard worker who thought out everything in advance. Some reports suggest that he only slept a few hours each night, and was burning the candle at both ends to prepare his battle plans and organize supply lines. While many know of his </span></span><span class="q-inline" data-dcnode-id="3824" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_invasion_of_Russia" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3830" instrument_node="">disastrous Russian campaign</span></a><span class="q-inlineBlock" data-dcnode-id="3825" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3826"><svg data-dcnode-id="3827" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3828" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3822" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3823" instrument_node="">, what is less known is that he actually had plenty of supplies to make it to Smolensk. He just didn’t anticipate going all the way to Moscow, or that the Russians would burn everything they had so there would be nothing left to pillage.</span></span></li><li class="q-relative" data-dcnode-id="3809" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3819" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3820" instrument_node="">Napoleon took initiative. Since he was usually outnumbered, Napoleon would do everything he could to go on the offensive, and knock out enemy armies separately before they united into too large of a force. He did this </span></span><span class="q-inline" data-dcnode-id="3812" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Italian_campaigns_of_the_French_Revolutionary_Wars" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3818" instrument_node="">repeatedly in Italy</span></a><span class="q-inlineBlock" data-dcnode-id="3813" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3814"><svg data-dcnode-id="3815" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3816" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3810" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3811" instrument_node="">, where the Austrians poured multiple armies over the alps to defend their territory, and he continued to destroy these armies individually.</span></span></li><li class="q-relative" data-dcnode-id="3806" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3807" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3808" instrument_node="">Napoleon had his armies live off the land, and marched faster than his enemies. While Napoleon still had supply lines, much of the food, clothing, and pay for his men was looted from conquered territory. This allowed him to march faster, and he often did forced marches where his men would march twice as far each day as the enemy predicted. His opponents were often shocked at how quickly he outmanuvered them. At Ulm he surrounded an enormous Austrian army and forced them to surrender - while they thought he was over a hundred miles to the west and were waiting for reinforcements. Again, another thing that got him into trouble in Russia: the Russians retreated even faster, and burned everything in their wake, so there was nothing to loot.</span></span></li><li class="q-relative" data-dcnode-id="3803" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3804" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3805" instrument_node="">The French Republic (and later the Empire) promoted men based on merit. This is how Napoleon got his position in the first place, and promoting based on merit improved the armed forces across the board (with the exception of the navy, but that’s another story). Many of the other countries continued to only allow nobles in the officer ranks, who were not necessarily the most talented individuals (with some exceptions of course, such as Wellington).</span></span></li><li class="q-relative" data-dcnode-id="3791" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3801" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3802" instrument_node="">The French Republic basically invented the concept of </span></span><span class="q-inline" data-dcnode-id="3794" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lev%25C3%25A9e_en_masse" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3800" instrument_node="">mass conscription</span></a><span class="q-inlineBlock" data-dcnode-id="3795" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3796"><svg data-dcnode-id="3797" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3798" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3792" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3793" instrument_node="">. Before this time, armies were ready relatively small compared to a country’s population, and the nobles did not like the idea of arming the poor classes. When France was faced with enemies pouring into her borders on every side, the revolutionary leaders instituted mass conscription, and raised armies much bigger than had previously been raised, allowing them to compete evenly with a united Europe. Eventually the other nations had to do the same in order to compete. This was made possible because weapons were finally being mass produced, and it was easy to train peasants to use something as simple as a musket. Napoleon repeatedly lost armies toward the end of his reign, and he just recruited a new batch of young boys to replace them. Eventually this became unsustainable, because the French people grew fatigued after 20 years of nearly constant war, and he eventually ran out of horses and well-trained veterans.</span></span></li><li class="q-relative" data-dcnode-id="3779" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3789" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3790" instrument_node="">The French had already been making small improvements to their military that facilitated improved mobility and efficiency. </span></span><span class="q-inline" data-dcnode-id="3782" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Horse_artillery" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3788" instrument_node="">Horse artillery</span></a><span class="q-inlineBlock" data-dcnode-id="3783" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3784"><svg data-dcnode-id="3785" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3786" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3780" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3781" instrument_node=""> is one such example: smaller cannons were pulled by fast horses, ridden by their crew, who could get into position rapidly and move into a new area when required. Napoleon loved these guys and used them in combination with his slower artillery to great effect. The army organization and divisional structure was also vastly improved.</span></span></li><li class="q-relative" data-dcnode-id="3776" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3777" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3778" instrument_node="">France was traditionally one of the most powerful, populous, and wealthy nations in all of Europe, and the revolution mobilized them into an enthusiastic fighting force. Napoleon’s constant victories (often at little cost, especially initially) only made the people more excited for war. Napoleon successfully transformed this huge nation into an empire dedicated to warfare, with almost unlimited manpower reserves.</span></span></li><li class="q-relative" data-dcnode-id="3764" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3774" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3775" instrument_node="">Napoleon was a smooth, shrewd, and Machiavellian leader. While campaigning, even as a general before he had any official political power, he had </span></span><span class="q-inline" data-dcnode-id="3767" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleonic_propaganda" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3773" instrument_node="">his own newspaper</span></a><span class="q-inlineBlock" data-dcnode-id="3768" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3769"><svg data-dcnode-id="3770" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3771" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3765" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3766" instrument_node=""> that would print glorified accounts of his victories, and minimize any casualties. He essentially ran a propaganda machine to increase his own popularity. Later, as Emperor, he was essentially an autocrat who used his nearly absolute power to improve the military machine of France in every way he could.</span></span></li><li class="q-relative" data-dcnode-id="3743" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="3762" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3763" instrument_node="">Napoleon was a genius. He almost instinctually knew the best moves in battle. Most of his losses were either because he was hopelessly outnumbered (</span></span><span class="q-inline" data-dcnode-id="3755" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Leipzig" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3761" instrument_node="">Leipzig</span></a><span class="q-inlineBlock" data-dcnode-id="3756" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3757"><svg data-dcnode-id="3758" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3759" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3753" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3754" instrument_node="">), or was sick and not even fully present at the battle (</span></span><span class="q-inline" data-dcnode-id="3746" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Waterloo" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3752" instrument_node="">Waterloo</span></a><span class="q-inlineBlock" data-dcnode-id="3747" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3748"><svg data-dcnode-id="3749" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3750" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3744" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3745" instrument_node="">). While he planned extensively beforehand, he lived by the maxim: “No plan survives encounter with the enemy.” He was always willing to improvise to make the best move.</span></span></li></ol><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3730" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3740" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3741" instrument_node="">Napoleon lost in the end because success is a bad teacher: it made him cocky, and he overreached just when his opponents had finally learned all their lessons from 15 years of fighting him. They even created a formal military strategy (</span></span><span class="q-inline" data-dcnode-id="3733" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trachenberg_Plan" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3739" instrument_node="">The Trachenberg Plan</span></a><span class="q-inlineBlock" data-dcnode-id="3734" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3735"><svg data-dcnode-id="3736" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3737" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3731" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3732" instrument_node="">) that stipulated that they would avoid him in open battle and attack only armies under his marshals until they could effectively outnumber him. That alone illustrates just how much they respected his military abilities, even as they united to bring him down.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3648" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3649" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3650" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3664" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3696" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3697" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3707" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3708" style="box-sizing: border-box; position: relative;"><button aria-label="277 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu
