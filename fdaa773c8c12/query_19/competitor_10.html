ormal; font-style: normal; background: none;"><span data-dcnode-id="5783" instrument_node="">Napoleon was definitely a great deal below master strength.</span></span></p><span data-dcnode-id="5780" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5777" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5778" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5779" instrument_node="">“Napoleon fostered a deep love for chess throughout his life, but lacked the time and devotion to become a player of the first rank. Only three recorded games attributed to Napoleon have survived, and some chess historians cast doubts over the authenticity of some or all of these games.”</span></span></p><span data-dcnode-id="5776" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5773" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5774" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5775" instrument_node="">Two of the three games attributed to him are probably compositions made to increase his reputation, but then, there is a third game he played against “The Turk” in Vienna 1806.</span></span></p><span data-dcnode-id="5772" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5769" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5770" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5771" instrument_node="">The Turk was designed by Hungarian engineer and inventor Baron Wolfgang von K</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="5757" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="5758" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="5759" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="5760" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="5761" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="5766" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="5767" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="5768" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="5762" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="5763"><svg data-dcnode-id="5764" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="5765" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="5515" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="5516" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="5517"><span class="q-box qu-userSelect--text" data-dcnode-id="5518" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5749" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5750" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5751" instrument_node="">Napoleon was definitely a great deal below master strength.</span></span></p><span data-dcnode-id="5748" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5745" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5746" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5747" instrument_node="">“Napoleon fostered a deep love for chess throughout his life, but lacked the time and devotion to become a player of the first rank. Only three recorded games attributed to Napoleon have survived, and some chess historians cast doubts over the authenticity of some or all of these games.”</span></span></p><span data-dcnode-id="5744" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5741" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5742" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5743" instrument_node="">Two of the three games attributed to him are probably compositions made to increase his reputation, but then, there is a third game he played against “The Turk” in Vienna 1806.</span></span></p><span data-dcnode-id="5740" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5737" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5738" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5739" instrument_node="">The Turk was designed by Hungarian engineer and inventor Baron Wolfgang von Kempelen in 1769. It was billed as a "chess-playing automaton" capable of beating even the strongest challengers. During a performance, the showman would open two cabinets to display a large empty space, and then the third cabinet to display an area of tightly packed machinery, presumably the "brains" of the contraption. The secret of this hoax was that a normal sized man could recline within the machine, and remain unseen by the audience by repositioning himself during the initial display of the device's interior.</span></span></p><span data-dcnode-id="5736" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5733" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5734" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5735" instrument_node="">After von Kempelen's death in 1804, the Turk was purchased by Bavarian showman Johann Nepomuk Maelzel. Sources differ on the following, but there is a lot of overlap.</span></span></p><span data-dcnode-id="5732" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5729" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5730" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5731" instrument_node="">Maelzel held a special command demonstration of the Automaton for Napoleon in 1806 in Berlin -- a city which Napoleon was occupying for the moment. The general tried to upset the machine by performing illegal moves -- for which the protocol laws well-prepared, since the understanding was that the figure would nod three times if such a thing were to happen, and when Napoleon persisted in making the wrong moves, again and again, the Automaton finally swept all the pieces to the floor, and the game was over. Later, when the general was behaving himself and obeying the rules, he lost his game -- and was reportedly not happy</span></span></p><span data-dcnode-id="5728" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5721" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5726" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5727" instrument_node="">At the time, operating the Turk was Johann Baptist Allgaier, a German-Austrian chess master, and theoretician. He was also the author of the first chess handbook in German – </span></span><span data-dcnode-id="5724" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="5725" instrument_node="">Neue theoretisch-praktische Anweisung zum Schachspiel.</span></span><span data-dcnode-id="5722" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5723" instrument_node=""> Napoleon was beaten handily - and showed he didn’t have much chess acumen.</span></span></p><span data-dcnode-id="5720" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5717" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5718" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5719" instrument_node="">While it might seem that military tactics and strategy and chess might seem like interrelated skills, the two are very, very different, and Napoleon’s game against “The Turk” demonstrates that quite well.</span></span></p><span data-dcnode-id="5716" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5713" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5714" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5715" instrument_node="">Here are some notes from the game. Napoleon is White.</span></span></p><span data-dcnode-id="5712" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5709" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5710" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5711" instrument_node="">1. e4 e5</span></span></p><span data-dcnode-id="5708" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5705" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5706" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5707" instrument_node="">2. Qf3</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="5702" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="5703" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="5704" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-8e9797324694d468d1d338e30c031496-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5699" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5700" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5701" instrument_node="">This is a weak move already, trying to go for an early checkmate on f7. It now has the ignominious distinction of “Napoleon's openning}</span></span></p><span data-dcnode-id="5698" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5695" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5696" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5697" instrument_node="">2…Nc6 {The Turk Develops normally.}</span></span></p><span data-dcnode-id="5694" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5691" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5692" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5693" instrument_node="">3. Bc4 {Telegraphing an obvious strategy, one typically used by 3rd and 4th graders in scholastic tournaments, and easily averted by coached or stronger 4th graders.}</span></span></p><span data-dcnode-id="5690" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5687" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5688" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5689" instrument_node="">3…Nf6</span></span></p><span data-dcnode-id="5686" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5683" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5684" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5685" instrument_node="">4. Ne2</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="5680" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="5681" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="5682" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-aaf0703666acd5120a3ab5ad3433b2f5-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5677" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5678" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5679" instrument_node="">{The knight's awkward placement is due to the Queen being on the Knight's "natural" developing square and White's Queen is also a weakness, being vulnerable to attack for black to gain time. This is why beginners are taught not to bring out the Queen too early.}</span></span></p><span data-dcnode-id="5676" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5673" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5674" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5675" instrument_node="">4…Bc5</span></span></p><span data-dcnode-id="5672" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5669" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5670" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5671" instrument_node="">5. a3</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="5666" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="5667" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="5668" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-e1281e4fb32157d9914f6bbacb786e99-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5663" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5664" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5665" instrument_node="">{Complete waste of time, White loses the first move advantage by Black's fifth move. Perhaps Napoleon wanted to prepare b4 and Bb2, but since he doesn't do that this move seems particularly wasteful. Presumably, he was worried about Nb4 threatening the King Rook fork on c2, since Napoleon himself had a taste for hurried knight advances in his own games.}</span></span></p><span data-dcnode-id="5662" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5659" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5660" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5661" instrument_node="">5…d6</span></span></p><span data-dcnode-id="5658" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5655" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5656" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5657" instrument_node="">{Black reinforces his center and prepare to bring his other Bishop into the attack. So far, Black hasn't had to even make any good moves, and has developed as any solid tournament player would.}</span></span></p><span data-dcnode-id="5654" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5651" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5652" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5653" instrument_node="">6. O-O Bg4</span></span></p><span data-dcnode-id="5650" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5647" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5648" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5649" instrument_node="">{Winning the tempo off the Queen, as expected.}</span></span></p><span data-dcnode-id="5646" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5643" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5644" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5645" instrument_node="">7. Qd3 Nh5</span></span></p><span data-dcnode-id="5642" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5639" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5640" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5641" instrument_node="">{Black eyes the f4 square, particularly after the B for N exchange.}</span></span></p><span data-dcnode-id="5638" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5635" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5636" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5637" instrument_node="">8. h3</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="5632" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="5633" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="5634" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-3f7e3ae8e19d490dd979c48785b83785-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5629" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5630" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5631" instrument_node="">{Again, Napoleon clearly doesn't know what Black is up to. Nh5 indicates black wants to play Nf4, which also means he's looking to trade Bg4 for Ne2, this passive pawn move only incentivizes the exercise of Black's plan.}</span></span></p><span data-dcnode-id="5628" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5625" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5626" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5627" instrument_node="">8…Bxe2 9. Qxe2 Nf4</span></span></p><span data-dcnode-id="5624" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5621" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5622" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5623" instrument_node="">{Now Black gets his Nf4 and wins ANOTHER tempo off Napoleon's Queen.}</span></span></p><span data-dcnode-id="5620" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5617" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5618" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5619" instrument_node="">10. Qe1 { Checkmate is now unavoidable with best play. Best move was Qg4.}</span></span></p><span data-dcnode-id="5616" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5613" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5614" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5615" instrument_node="">10... Nd4 ?!</span></span></p><span data-dcnode-id="5612" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5609" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5610" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5611" instrument_node="">{Black loses his long forced checkmate sequence, but makes a logical attacking move. Best move was Qg5.}</span></span></p><span data-dcnode-id="5608" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5605" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5606" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5607" instrument_node="">(10... Qg5 11. Bxf7+ Kxf7 12. g4 Nxh3+ 13. Kh2 Qh4 14. Qe3 Nf4+ 15. Kg1 Qxg4+</span></span></p><span data-dcnode-id="5604" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5601" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5602" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5603" instrument_node="">16. Qg3 Qxg3+ 17. Kh1 Qg2#)</span></span></p><span data-dcnode-id="5600" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5597" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5598" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5599" instrument_node="">11. Bb3 Nxh3+</span></span></p><span data-dcnode-id="5596" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5593" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5594" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5595" instrument_node="">{. Not the best move, but a good one that most good players would have played. Black is exposing White’s King, and White can take back because of the knight fork on f3]</span></span></p><span data-dcnode-id="5592" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5589" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5590" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5591" instrument_node="">12. Kh2 (if gxh3 White forks King and Queen on f3)</span></span></p><span data-dcnode-id="5588" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5585" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5586" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5587" instrument_node="">At the point, I’m not going to be too harsh on Napoleon’s play, he is in a clearly lost position against a far superior opponent.</span></span></p><span data-dcnode-id="5584" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5581" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5582" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5583" instrument_node="">12... Qh4</span></span></p><span data-dcnode-id="5580" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5577" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5578" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5579" instrument_node="">13. g3 Nf3+</span></span></p><span data-dcnode-id="5576" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5573" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5574" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5575" instrument_node="">14. Kg2 Nxe1+</span></span></p><span data-dcnode-id="5572" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5569" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5570" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5571" instrument_node="">Black misses mate in three, but does it to pick up White’s Queen with check, so, I don’t blame him. Can you find mate in three after Kg2? Answer will be given at the end of the game.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="5566" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="5567" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="5568" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-494e28091ccc0e62768471c08a4122a4-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5563" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5564" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5565" instrument_node="">15. Rxe1 Qg4 {Best move was Nf4+ which leads to mate.}</span></span></p><span data-dcnode-id="5562" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5559" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5560" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5561" instrument_node="">16. d3 Bxf2</span></span></p><span data-dcnode-id="5558" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5555" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5556" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5557" instrument_node="">17. Rh1 Qxg3+</span></span></p><span data-dcnode-id="5554" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5551" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5552" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5553" instrument_node="">18. Kf1 Bd4</span></span></p><span data-dcnode-id="5550" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5547" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5548" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5549" instrument_node="">19. Ke2 Qg2+</span></span></p><span data-dcnode-id="5546" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5543" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5544" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5545" instrument_node="">20. Kd1 Qxh1+</span></span></p><span data-dcnode-id="5542" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5539" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5540" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5541" instrument_node="">21. Kd2 Qg2+ {Not the best checkmate sequence. Best move was Nf4.} ( class="q-text qu-dynamicFontSize--small qu-color--gray_light qu-passColorToLinks" data-dcnode-id="4952" style="box-sizing: border-box;"><div class="q-box qu-display--inline VerticallyAlignedItems___StyledBox-ohbu65-0 mEida" data-dcnode-id="4954" style="box-sizing: border-box;"><a class="q-box Link___StyledBox-t2xg9c-0 KlcoI answer_timestamp qu-cursor--pointer qu-hover--textDecoration--underline" data-dcnode-id="4956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/How-good-at-math-was-Napoleon-Bonaparte/answer/Matthew-Bess-7" rel="nofollow" style="box-sizing: border-box; border-radius: inherit;" target="_blank"><span data-dcnode-id="4960" instrument_node="">Answered </span><span data-dcnode-id="4959" instrument_node="">4</span><span data-dcnode-id="4958" instrument_node=""> years </span><span data-dcnode-id="4957" instrument_node="">ago</span></a><span class="q-box" data-dcnode-id="4955" style="box-sizing: border-box;"></span></div><div class="q-inline qu-verticalAlign--middle" data-dcnode-id="4953" style="box-sizing: border-box; display: inline;"></div></div></div><div class="q-inlineFlex qu-ml--small qu-alignItems--center" data-dcnode-id="4949" style="box-sizing: border-box; display: inline-flex;"><div class="q-flex" data-dcnode-id="4950" style="box-sizing: border-box; display: flex;"></div></div></div></div></div></div><div class="q-relative" data-dcnode-id="4931" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-cursor--pointer AnswerContent___StyledAbsolute-sc-1jekuxm-0 iUOaNB" data-dcnode-id="4944" style="box-sizing: border-box; position: absolute;"></div><div class="q-flex qu-mb--tiny" data-dcnode-id="4932" style="box-sizing: border-box; display: flex;"><div class="q-text qu-dynamicFontSize--regular_title qu-bold qu-color--gray_dark_dim qu-passColorToLinks qu-lineHeight--regular qu-wordBreak--break-word" data-dcnode-id="4933" style="box-sizing: border-box;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4934"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 TitleText___StyledCssInlineComponent-sc-1hpb63h-0 jPnwvF" data-dcnode-id="4935"><a class="q-box qu-display--block qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/How-good-at-math-was-Napoleon-Bonaparte" style="box-sizing: border-box; border-radius: inherit;" target="_blank"><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="4937" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="4938" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="4939" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="4940" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="4941" style="box-sizing: border-box;"><span data-dcnode-id="4942" style="background: none;"><span data-dcnode-id="4943" instrument_node="">How good at math was Napoleon Bonaparte?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="4708" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="4709" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="4710" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="4929" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="4711" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="4901" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="4902" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="4903" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="4904" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="4905" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4926" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4927" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4928" instrument_node="">Napoleon’s family was not impoverished, but it was by no means wealthy. During Napoleon’s childhood, the Bonapartes owned only a few rooms of a large house (which they would eventually own in its entirety).</span></span></p><span data-dcnode-id="4925" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4922" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4923" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4924" instrument_node="">The Bonapartes were greatly helped when Napoleon’s father, Carlo, applied for and received recognition as a member of the noble class. This allowed Carlo to pursue his political career and gave him advantages as a lawyer as well.</span></span></p><span data-dcnode-id="4921" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4918" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4919" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4920" instrument_node="">Even so, Carlo’s salary was never great. Like parents everywhere, Carlo and Napoleon’s mother, Leticia, wondered how they would afford their children’s education. An</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4906" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4907" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4908" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4909" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4910" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4915" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4916" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4917" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4911" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4912"><svg data-dcnode-id="4913" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4914" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4712" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4713" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4714"><span class="q-box qu-userSelect--text" data-dcnode-id="4715" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4898" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4899" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4900" instrument_node="">Napoleon’s family was not impoverished, but it was by no means wealthy. During Napoleon’s childhood, the Bonapartes owned only a few rooms of a large house (which they would eventually own in its entirety).</span></span></p><span data-dcnode-id="4897" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4894" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4895" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4896" instrument_node="">The Bonapartes were greatly helped when Napoleon’s father, Carlo, applied for and received recognition as a member of the noble class. This allowed Carlo to pursue his political career and gave him advantages as a lawyer as well.</span></span></p><span data-dcnode-id="4893" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4890" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4891" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4892" instrument_node="">Even so, Carlo’s salary was never great. Like parents everywhere, Carlo and Napoleon’s mother, Leticia, wondered how they would afford their children’s education. And like people throughout history, they would find that it never hurt to have good connections. Their connection in this case was substantial: Count Marbeuf, the French governor of Corsica.</span></span></p><span data-dcnode-id="4889" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4886" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4887" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4888" instrument_node="">GETTING A HELPING HAND FROM MARBEUF</span></span></p><span data-dcnode-id="4885" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4882" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4883" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4884" instrument_node="">By all accounts, Count Marbeuf was an outstanding governor of Corsica. He had been sent at a time when emotions were high and the French were not universally loved. But he worked hard to organize reforms and to improve life for average Corsicans. He lowered taxes and organized numerous building projects. This was made easier by the fact that the French government in Paris recognized the delicate nature of his position and supported him with adequate funds to try to make the Corsicans happy with his rule. He even worked on speaking the Corsican dialect of French so that he could better communicate with the common people on the island. In short, he was about as good as the islanders could have ever hoped to get.</span></span></p><span data-dcnode-id="4881" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4878" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4879" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4880" instrument_node="">When Marbeuf first arrived on the island, he actually stayed at the Bonaparte home. Carlo and Marbeuf hit it off quite well and developed a mutually useful relationship. Both men had a strong interest in agriculture and worked together on a couple of projects. They were also both interested in politics, and each supported the French presence on the island. Marbeuf might have helped the Bonapartes regardless of any other factors.</span></span></p><span data-dcnode-id="4877" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4874" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4875" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4876" instrument_node="">But there was another factor, of course. Marbeuf developed quite a strong interest in Carlo’s wife, Leticia. With great beauty and a pleasing personality, she no doubt attracted the eyes and inspired the hopes of more than one man on the island. But Marbeuf, of course, was quite different than other men. At 64, he was much older, but more importantly, he was the governor and could offer favors the others could not.</span></span></p><span data-dcnode-id="4873" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4870" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4871" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4872" instrument_node="">Leticia was interested only in a friendly relationship, which seems to have been enough for Marbeuf. They took long walks and had nice talks. Marbeuf treated her family as though they were his own. It was Marbeuf who helped Carlo prove his nobility, and it was Marbeuf who told Carlo of the existence of free scholarships for education in France. With the right recommendation, boys could attend the seminary in Aix, France or a military academy, while girls could go to finishing school at Saint-Cyr — all paid for by the king!</span></span></p><span data-dcnode-id="4869" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4866" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4867" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4868" instrument_node="">This news was almost too good to be true, and Carlo was quick to take advantage of it. In 1777, Marbeuf forwarded his recommendations, and soon Napoleon was accepted to the military academy at Brienne and Napoleon’s eldest brother, Joseph, was accepted to the seminary at Aix. But Joseph was too young to start seminary, and Napoleon had to await further processing before he could enter the academy. Again Marbeuf stepped in and sent both boys to stay (at his expense) with his nephew at the college of Autun, where they could learn French. (Marbeuf’s nephew just happened to be the local bishop.) And just to help out a little more, Marbeuf arranged for Leticia’s half-brother, Joseph Fesch, to attend the seminary at Aix.</span></span></p><span data-dcnode-id="4865" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4862" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4863" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4864" instrument_node="">On December 15, the two boys and Leticia’s half-brother left Corsica for the mainland of France. Napoleon was 9 years old and about to enter a world beyond anything he had ever imagined possible. (No one would ever say that these three young men squandered their educations; they would eventually become an emperor, a king, and a cardinal.)</span></span></p><span data-dcnode-id="4861" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4858" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4859" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4860" instrument_node="">LEARNING TO SPEAK FRENCH</span></span></p><span data-dcnode-id="4857" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4854" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4855" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4856" instrument_node="">While at Autun, Napoleon had to learn French; as of yet, the future Emperor of the French could hardly speak the language. The effort did not go well. Napoleon found memorizing difficult, and his natural inclination to hurry did not do him well in the study of language. Worse yet, his French had (and always would have) a strong Corsican accent, a fact that did him no favors throughout his schooling. Still, after three months at Autun, Napoleon had learned conversational French and was able to pass his language exams.</span></span></p><span data-dcnode-id="4853" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4850" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4851" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4852" instrument_node="">By May 1778, Carlo had secured the necessary documents so Napoleon could move to the military school at Brienne. Napoleon and Joseph were unhappy to have to part company for what might be a very long time. But Napoleon’s time at Autun had been well spent, and he was ready, at the ripe old age of 9, to move on.</span></span></p><span data-dcnode-id="4849" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4846" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4847" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4848" instrument_node="">ATTENDING FRENCH MILITARY SCHOOL</span></span></p><span data-dcnode-id="4845" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4842" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4843" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4844" instrument_node="">French military education in the late 18th century was not exactly a model of democracy. The opportunity to be an officer was reserved almost exclusively for the nobility and almost exclusively for native Frenchmen. To say that the system was elitist would be an understatement. Moreover, at least half the young students attended military school on expense accounts provided by their wealthy families. Scholarship recipients like Napoleon were looked down on by most of the students. Napoleon was poor by their standards, and it would show.</span></span></p><span data-dcnode-id="4841" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4838" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4839" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4840" instrument_node="">Worse yet, Napoleon wasn’t even French! True, Corsica had become a French territory, but the French had a very low opinion of Corsicans (noble or otherwise), seeing them as just this side of barbarians. Many of the cadets came from wealthy and powerful families, and they did not necessarily appreciate having to mix with the “rabble,” even that which was nobility. On Corsica, Napoleon’s family was fairly high on the social scale. At Brienne, he was virtually at the bottom.</span></span></p><span data-dcnode-id="4837" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4834" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4835" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4836" instrument_node="">Add to that the fact that Napoleon didn’t speak great French (and spoke it with a heavy Corsican accent), and it was clear that Napoleon was stepping into a situation that could prove to be very difficult. Young boys can be cruel in any circumstance, and this situation was made to order for bad behavior and bad attitudes.</span></span></p><span data-dcnode-id="4833" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4830" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4831" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4832" instrument_node="">Napoleon was assigned a small room in a dormitory. It was a Spartan existence, but that didn’t seem to bother Napoleon. If nothing else, the dorm situation put all cadets on a somewhat equal footing. All cadets wore a uniform, which was another equalizer.</span></span></p><span data-dcnode-id="4829" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4826" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4827" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4828" instrument_node="">Napoleon was determined to succeed and immediately settled in to his new routine. As a student, he began to excel. (He wasn’t a perfect student, though: His spelling and handwriting were quite bad.) He was serious about his studies and spent much of his free time reading. Of course, with his lack of funds he could do little else.</span></span></p><span data-dcnode-id="4825" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4822" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4823" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4824" instrument_node="">Napoleon’s relations with the other cadets, however, did not go so well. The young boys of the elite nobility bullied Napoleon. Slight of build, he was less able to physically defend himself than he might have liked, though he did develop a reputation for generally holding his own against his larger adversaries. He began to withdraw somewhat, tending to keep to himself rather than socialize or engage in group activities. (He did enjoy gardening — each cadet was given a small plot of land.)</span></span></p><span data-dcnode-id="4821" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4818" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4819" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4820" instrument_node="">DEALING WITH POVERTY</span></span></p><span data-dcnode-id="4817" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4814" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4815" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4816" instrument_node="">Napoleon’s poverty continued to be a problem, isolating him from some of the other cadets and preventing him from buying some things he may have wanted. As the years went on, his poverty bothered him more, and he longed to be either removed from school or given an allowance. In 1781, at the age of 12, he wrote his father asking for an allowance or a withdrawal, saying “I am tired of exhibiting indigence, and of seeing the smiles of insolent scholars who are only superior to me by reason of their fortune.”</span></span></p><span data-dcnode-id="4813" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4810" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4811" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4812" instrument_node="">Carlo was in no position to give Napoleon any further assistance. His financial picture had not improved, and his health was deteriorating. He and Leticia were anxious for Napoleon to graduate as soon as possible to allow Napoleon’s brother Lucien to go to school on the same scholarship.</span></span></p><span data-dcnode-id="4809" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4806" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4807" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4808" instrument_node="">Condemned to poverty, Napoleon resolved to do all the better in school. Soon he began to excel in history, math, and geography. Math was likely the most important of the three for a military career, but history really captured Napoleon’s imagination. Like many young men, Napoleon was especially taken with the stories of ancient heroes like Achilles, Alexander the Great, and Julius Caesar. No one could have suspected then that he would eventually join that elite group.</span></span></p><span data-dcnode-id="4805" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4802" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4803" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4804" instrument_node="">While his poverty was certainly a source of difficulty for Napoleon, it almost certainly influenced his later behavior. For example,</span></span></p><ul class="q-box" data-dcnode-id="4795" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="4799" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4800" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4801" instrument_node="">Napoleon’s poverty may have inspired his later commitment to promoting equality in France and throughout his empire.</span></span></li><li class="q-relative" data-dcnode-id="4796" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="4797" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4798" instrument_node="">The treatment he received at the hands of the arrogant French noble cadets was also likely a major reason he developed strong feelings for Corsican independence. Notwithstanding the fact that he was receiving an excellent education at French expense, Napoleon began to dream of Corsican independence and to idolize Paoli. These feelings would shape much of his behavior throughout his early career.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4792" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4793" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4794" instrument_node="">Napoleon also began to develop some important friendships. Probably the most important was Louis-Antoine Fauvelet de Bourrienne, who would later serve as Napoleon’s secretary. Napoleon also became friends with some of the adult staff. His relations with the other students improved somewhat, perhaps because they could see that he was exceptionally talented. His leadership was often sought for the periodic snowball fights that took place.</span></span></p><span data-dcnode-id="4791" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4788" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4789" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4790" instrument_node="">MOVING TO THE NEXT LEVEL</span></span></p><span data-dcnode-id="4787" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4784" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4785" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4786" instrument_node="">While Napoleon was at Brienne, Carlo’s health continued to get worse. Joseph, who had been very successful at Autun, decided not to enter the seminary and seek a career in the Church. Instead, he wanted to go into the military. (Napoleon opposed this decision and said so, but to no avail.) Lucien, meanwhile, was poised to enter Brienne, which he did in 1784. Unlike Napoleon, however, Lucien had no financial aid, hoping to pick up Napoleon’s scholarship upon his older brother’s graduation. And Napoleon’s youngest sister, Caroline, had been enrolled at the exclusive school at Saint Cyr, where Carlo had managed to get her a scholarship.</span></span></p><span data-dcnode-id="4783" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4780" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4781" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4782" instrument_node="">It was clearly in the family’s best interest for Napoleon to graduate as soon as possible. An islander by heritage, Napoleon applied for a position in the navy, but nothing came of that effort. Napoleon was very young, a fact that probably delayed his graduation and may well have prevented positive action on his request for naval service. Another factor was probably the death of the family benefactor, Count Marbeuf, who had been promoting Napoleon’s naval aspirations.</span></span></p><span data-dcnode-id="4779" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4776" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4777" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4778" instrument_node="">With Marbeuf gone, the Bonapartes were on their own, and Napoleon needed to move forward in his education. Fortunately, he passed his exams in October 1784 and was accepted to the Military School of Paris. He was only 15 years old.</span></span></p><span data-dcnode-id="4775" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4772" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4773" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4774" instrument_node="">Having excelled at math and geometry, Napoleon selected the military branch that made the best use of those subjects: artillery. This was an excellent decision for many reasons, including the fact that artillery was an elite branch that offered excellent career opportunities. Those opportunities would be greatly enhanced by Napoleon’s acceptance to his new school, which was essentially the equivalent of West Point in the United States or Sandhurst in the United Kingdom. Napoleon had really arrived: His nomination had been signed by no less than King Louis XVI.</span></span></p><span data-dcnode-id="4771" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4768" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4769" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4770" instrument_node="">With Napoleon graduated from Brienne, Carlo had hoped that Lucien would receive his scholarship, but that didn’t happen. Fortunately, Joseph was able to attend Brienne on a royal scholarship, which certainly helped the family finances.</span></span></p><span data-dcnode-id="4767" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4764" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4765" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4766" instrument_node="">WOWING THEM IN PARIS</span></span></p><span data-dcnode-id="4763" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4760" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4761" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4762" instrument_node="">In late October 1784, Napoleon arrived in Paris. It was by far the largest city he had ever seen, and he was completely taken by all the sights. He bought a book about the city and was prepared for a grand time. He would soon discover, however, that Paris was a reflection of the state of French society. It was a city of great wealth but with great poverty as well. A large gap between the rich and the poor is always problematic, and the gap in Paris and throughout France was enormous.</span></span></p><span data-dcnode-id="4759" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4756" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4757" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4758" instrument_node="">None of that mattered much to Napoleon as he entered his new school. He was among the most elite of all France’s military leaders. In keeping with its clientele, the school was luxurious. While the quarters were a bit on the small side, the classrooms were large and elegant. Located at one end of the Champ de Mars (today, the Eiffel Tower is at the other end) and near the Hôtel des Invalides (the home for retired veterans), it was very much in the center of things. (In death, Napoleon would return to the area, with his final resting place being under the gold dome of the Invalides. An adjacent military museum is largely dedicated to his career.)</span></span></p><span data-dcnode-id="4755" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4752" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4753" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4754" instrument_node="">In Paris, life was in some ways much grander for Napoleon. The cadets ate five-course meals and had the very best teachers available. The student-teacher ratio was very nearly one to one, which was (and is) virtually unheard of in other schools. Napoleon actually objected to the extravagance of the meals and wrote a lengthy letter to that effect to the Minister of War. At the advice of his former director at Brienne, he dropped the matter.</span></span></p><span data-dcnode-id="4751" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4748" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4749" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4750" instrument_node="">Napoleon continued to be something of a loner. The French nobility at this school were even higher on the social scale than those at Brienne, and they never missed an opportunity to put Napoleon in his place. He had more than one altercation with his comrades. On the other hand, he continued to be a popular selection for snowball fights.</span></span></p><span data-dcnode-id="4747" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4740" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4745" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4746" instrument_node="">As a student, Napoleon continued to excel, though his grades were not as good as they had been in Brienne. In addition to history and math, he developed a strong interest in literature. Still hoping for a commission in the navy, he nevertheless excelled at artillery. His love of Corsica and dreams of her independence did not lessen, nor did the negative reaction of both his classmates and his teachers, who had to remind him from time to time that he was there courtesy of the </span></span><span data-dcnode-id="4743" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4744" instrument_node="">French</span></span><span data-dcnode-id="4741" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4742" instrument_node=""> king.</span></span></p><span data-dcnode-id="4739" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4736" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4737" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4738" instrument_node="">LOSING HIS FATHER</span></span></p><span data-dcnode-id="4735" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4732" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4733" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4734" instrument_node="">Napoleon’s father continued to have serious health problems, and shortly after Napoleon entered school in Paris, Carlo went to southern France to seek diagnosis and treatment. He was told by doctors that his condition was terminal stomach cancer. He died in February 1785. As he had been in life, in death Carlo was deep in debt. If Napoleon thought he was poor when Carlo was alive, he was truly destitute with his father gone.</span></span></p><span data-dcnode-id="4731" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4728" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4729" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4730" instrument_node="">Napoleon was no doubt heartbroken with his father’s death, though he likely saw it coming. He showed his strength of character by immediately writing to his mother and even by refusing the usual priestly consolation. As the eldest, it fell to Joseph to return to Corsica to see to family affairs, which allowed Napoleon to remain in school.</span></span></p><span data-dcnode-id="4727" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4724" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4725" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4726" instrument_node="">GRADUATING AHEAD OF HIS CLASS</span></span></p><span data-dcnode-id="4723" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4720" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4721" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4722" instrument_node="">The normal course of study for artillery at the Military School of Paris was two years. But Napoleon, who worked hard and excelled in much of what he did, was able to graduate after only one year. Detractors love to point out that his score was not that high — he ranked 42nd of the 58 young men who passed their exams that year. But most of those 58 had been in school at least two years. Napoleon was the fourth youngest of his graduating class and the only one for whom French was not his native language.</span></span></p><span data-dcnode-id="4719" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4716" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4717" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4718" instrument_node="">At 16, Napoleon received his commission as a Second Lieutenant in the Royal Artillery. He was about to step out into the real world — a world that he would soon come to dominate.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4639" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4640" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4641" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4655" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4682" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4683" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4693" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4694" style="box-sizing: border-box; position: relative;"><button aria-label="61 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqE
