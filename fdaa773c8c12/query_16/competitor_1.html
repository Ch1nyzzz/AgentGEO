-80791 jetpack-lazy-image jetpack-lazy-image--handled lazyloaded" data-dcnode-id="1493" data-lazy-loaded="1" data-src="https://www.kickassfacts.com/wp-content/uploads/2021/07/iron-ring.jpg" height="330" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kickassfacts.com/wp-content/uploads/2021/07/iron-ring.jpg&amp;raw" width="621"><noscript data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">&lt;img class="aligncenter size-full wp-image-80791 lazyload" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" data-src="https://www.kickassfacts.com/wp-content/uploads/2021/07/iron-ring.jpg" alt="" width="621" height="330" /&gt;</span></noscript><noscript data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">&lt;img class="aligncenter size-full wp-image-80791 lazyload jetpack-lazy-image" src="https://www.kickassfacts.com/wp-content/uploads/2021/07/iron-ring.jpg" alt width="621" height="330" data-lazy-src="https://www.kickassfacts.com/wp-content/uploads/2021/07/iron-ring.jpg?is-pending-load=1" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"&gt;&lt;noscript&gt;&lt;img class="aligncenter size-full wp-image-80791 lazyload" src="https://www.kickassfacts.com/wp-content/uploads/2021/07/iron-ring.jpg" alt="" width="621" height="330" /&gt;</span></noscript></p><p data-dcnode-id="1481"><span data-dcnode-id="1487" instrument_node="">1. Engineers in </span><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kickassfacts.com/canada-facts/"><span data-dcnode-id="1486" instrument_node="">Canada</span></a><span data-dcnode-id="1484" instrument_node=""> receive an Iron Ring to remind them to have humility. It is in memory of a bridge that collapsed twice due to incorrect calculations involving iron. – </span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www2.ensc.sfu.ca/undergrad/euss/enscquire/Vol10No2/page9_1.html" onclick="javascript:window.open('http://www2.ensc.sfu.ca/undergrad/euss/enscquire/Vol10No2/page9_1.html'); return false;" rel="dofollow"><span data-dcnode-id="1483" instrument_node="">Source</span></a></p><p data-dcnode-id="1477"><span data-dcnode-id="1480" instrument_node="">2. Inuit in northern Greenland were using iron blades for centuries without knowledge of metallurgy. They made them by breaking pieces off of a huge iron meteorite and shaping them with heavy stones. They built their settlements close to the meteorite and used its iron for generations. – </span><a data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//now.ku.dk/documents/Meteorit2014FinalReportLight.pdf" onclick="javascript:window.open('https://now.ku.dk/documents/Meteorit2014FinalReportLight.pdf'); return false;" rel="nofollow"><span data-dcnode-id="1479" instrument_node="">Source</span></a></p><p data-dcnode-id="1470"><span data-dcnode-id="1476" instrument_node="">3. English sailors on the HMS Dolphin in 1766 discovered that native women on </span><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kickassfacts.com/island-facts/"><span data-dcnode-id="1475" instrument_node="">islands</span></a><span data-dcnode-id="1473" instrument_node=""> would trade sex for iron, and began pulling nails out, causing loss of the ship’s structural integrity. – </span><a data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HMS_Dolphin_%281751%29%23Second_circumnavigation" onclick="javascript:window.open('https://en.wikipedia.org/wiki/HMS_Dolphin_(1751)#Second_circumnavigation'); return false;" rel="dofollow"><span data-dcnode-id="1472" instrument_node="">Source</span></a></p><p data-dcnode-id="1466"><span data-dcnode-id="1469" instrument_node="">4. When Sir Terry Pratchett was knighted, he forged his own sword from iron and meteorites just for the occasion. – </span><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gizmodo.com/sir-terry-pratchetts-self-made-meteorite-sword-is-the-c-5643189" onclick="javascript:window.open('https://gizmodo.com/sir-terry-pratchetts-self-made-meteorite-sword-is-the-c-5643189'); return false;" rel="nofollow"><span data-dcnode-id="1468" instrument_node="">Source</span></a></p><p data-dcnode-id="1462"><span data-dcnode-id="1465" instrument_node="">5. The wreck of the Titanic is disappearing at a rate that it’s estimated to be completely gone in about 30 years. A microorganism called ‘Halomonas titanicae’ (also called the ‘steel-munching bacteria’) is slowly eating away the iron of the ships’ wreck, causing its deterioration. – </span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scienceabc.com/eyeopeners/why-is-the-wreck-of-rms-titanic-disappearing.html" onclick="javascript:window.open('https://www.scienceabc.com/eyeopeners/why-is-the-wreck-of-rms-titanic-disappearing.html'); return false;" rel="dofollow"><span data-dcnode-id="1464" instrument_node="">Source</span></a></p><div class="117692d6f1101d5d1801ee22e311a118" data-dcnode-id="1454" data-index="4" style="float: none; margin:20px 0 20px 0; text-align:center;"><div data-dcnode-id="1460" style="margin-bottom: 10px; text-align: center; font-size: 20px;"><span data-dcnode-id="1461" instrument_node="">Article continued below</span></div><div data-dcnode-id="1459" id="waldo-tag-1567"></div><div data-dcnode-id="1455" style="margin-top: 20px; max-width: 500px; margin-left: auto; margin-right: auto;"><span data-dcnode-id="1458" instrument_node=""> </span><div data-dcnode-id="1456" id="waldo-tag-12268"></div></div></div><div class="mks_separator" data-dcnode-id="1453" style="border-bottom: 2px dashed;"></div><h2 data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">6-10 Interesting Facts About Iron</span></h2><p data-dcnode-id="1445"><img alt="" class="aligncenter size-full wp-image-80792 jetpack-lazy-image jetpack-lazy-image--handled lazyloaded" data-dcnode-id="1450" data-lazy-loaded="1" data-src="https://www.kickassfacts.com/wp-content/uploads/2021/07/Hoba_meteorite.jpg" height="330" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kickassfacts.com/wp-content/uploads/2021/07/Hoba_meteorite.jpg&amp;raw" width="620"><noscript data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">&lt;img class="aligncenter size-full wp-image-80792 lazyload" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" data-src="https://www.kickassfacts.com/wp-content/uploads/2021/07/Hoba_meteorite.jpg" alt="" width="620" height="330" /&gt;</span></noscript><noscript data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">&lt;img class="aligncenter size-full wp-image-80792 lazyload jetpack-lazy-image" src="https://www.kickassfacts.com/wp-content/uploads/2021/07/Hoba_meteorite.jpg" alt width="620" height="330" data-lazy-src="https://www.kickassfacts.com/wp-content/uploads/2021/07/Hoba_meteorite.jpg?is-pending-load=1" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"&gt;&lt;noscript&gt;&lt;img class="aligncenter size-full wp-image-80792 lazyload" src="https://www.kickassfacts.com/wp-content/uploads/2021/07/Hoba_meteorite.jpg" alt="" width="620" height="330" /&gt;</span></noscript></p><p data-dcnode-id="1438"><span data-dcnode-id="1444" instrument_node="">6. Hoba is the largest known meteorite that left no crater on </span><a data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kickassfacts.com/25-interesting-facts-about-earth-part-2/"><span data-dcnode-id="1443" instrument_node="">Earth</span></a><span data-dcnode-id="1441" instrument_node="">. Earth’s atmosphere slowed the object to the point of terminal velocity. Hoba meteorite is also the most massive naturally occurring piece of iron known at the Earth’s surface. – </span><a data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hoba_meteorite" onclick="javascript:window.open('https://en.wikipedia.org/wiki/Hoba_meteorite'); return false;" rel="dofollow"><span data-dcnode-id="1440" instrument_node="">Source</span></a></p><p data-dcnode-id="1434"><span data-dcnode-id="1437" instrument_node="">7. A dagger discovered in King Tutankhamen’s tomb, in 1925, was made of meteoric metal. It wasn’t until recently that scientists were able to confirm, using portable X-ray fluorescence spectrometry, that it was composed of iron, nickel, and cobalt, “strongly suggests an extraterrestrial origin.” – </span><a data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abcnews.go.com/International/king-tuts-dagger-made-meteorite-researchers/story%3Fid%3D39560270" onclick="javascript:window.open('https://abcnews.go.com/International/king-tuts-dagger-made-meteorite-researchers/story?id=39560270'); return false;" rel="nofollow"><span data-dcnode-id="1436" instrument_node="">Source</span></a></p><p data-dcnode-id="1430"><span data-dcnode-id="1433" instrument_node="">8. In Scandinavia, the Kiruna to Narvik electrified railway carries iron ore down a steeply graded route. On the way down the trains generate large amounts of electricity by regenerative braking, which is sufficient to power the empty trains back up the track and pump excess energy into the grid. – </span><a data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iron_Ore_Line%23Operations" onclick="javascript:window.open('https://en.wikipedia.org/wiki/Iron_Ore_Line#Operations'); return false;" rel="dofollow"><span data-dcnode-id="1432" instrument_node="">Source</span></a></p><div class="117692d6f1101d5d1801ee22e311a118" data-dcnode-id="1424" data-index="2" style="float: none; margin:20px 0 20px 0; text-align:center;"><div data-dcnode-id="1429" id="waldo-tag-1568"></div><div data-dcnode-id="1425" style="margin-top: 20px; max-width: 500px; margin-left: auto; margin-right: auto;"><span data-dcnode-id="1428" instrument_node=""> </span><div data-dcnode-id="1426" id="waldo-tag-12268"></div></div></div><p data-dcnode-id="1417"><span data-dcnode-id="1423" instrument_node="">9. There is a sea snail that wears a suit of iron</span><i data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">–</span></i><span data-dcnode-id="1420" instrument_node="">plated armor. It is the only known animal to use iron sulfide as skeletal material. – </span><a data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.deepseanews.com/2010/01/the-evolution-of-iron-clad-samurai-snails-with-gold-feet/" onclick="javascript:window.open('http://www.deepseanews.com/2010/01/the-evolution-of-iron-clad-samurai-snails-with-gold-feet/'); return false;" rel="nofollow"><span data-dcnode-id="1419" instrument_node="">Source</span></a></p><p data-dcnode-id="1413"><span data-dcnode-id="1416" instrument_node="">10. Roman slaves wore collars of iron with messages like a modern dog collar, for example, this one, which reads “I have run away; hold me. When you shall have returned me to my master, Zoninus, you will receive a solidus.” – </span><a data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cornellcollege.edu/classical_studies/lit/slavery-links.shtml" onclick="javascript:window.open('https://www.cornellcollege.edu/classical_studies/lit/slavery-links.shtml'); return false;" rel="nofollow"><span data-dcnode-id="1415" instrument_node="">Source</span></a></p><div class="mks_separator" data-dcnode-id="1412" style="border-bottom: 2px dashed;"></div><h2 data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">11-14 Interesting Facts About Iron</span></h2><p data-dcnode-id="1404"><img alt="" class="aligncenter wp-image-80793 jetpack-lazy-image jetpack-lazy-image--handled lazyloaded" data-dcnode-id="1409" data-lazy-loaded="1" data-src="https://www.kickassfacts.com/wp-content/uploads/2021/07/Iron-pillar.jpeg" height="330" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kickassfacts.com/wp-content/uploads/2021/07/Iron-pillar.jpeg&amp;raw" width="245"><noscript data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">&lt;img class="aligncenter wp-image-80793 lazyload" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" data-src="https://www.kickassfacts.com/wp-content/uploads/2021/07/Iron-pillar.jpeg" alt="" width="245" height="330" /&gt;</span></noscript><noscript data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">&lt;img class="aligncenter wp-image-80793 lazyload jetpack-lazy-image" src="https://www.kickassfacts.com/wp-content/uploads/2021/07/Iron-pillar.jpeg" alt width="245" height="330" data-lazy-src="https://www.kickassfacts.com/wp-content/uploads/2021/07/Iron-pillar.jpeg?is-pending-load=1" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"&gt;&lt;noscript&gt;&lt;img class="aligncenter wp-image-80793 lazyload" src="https://www.kickassfacts.com/wp-content/uploads/2021/07/Iron-pillar.jpeg" alt="" width="245" height="330" /&gt;</span></noscript></p><p data-dcnode-id="1400"><span data-dcnode-id="1403" instrument_node="">11. There is an ancient iron pillar in Delhi renowned for its inability to rust. – </span><a data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iron_pillar_of_Delhi" onclick="javascript:window.open('https://en.wikipedia.org/wiki/Iron_pillar_of_Delhi'); return false;" rel="dofollow"><span data-dcnode-id="1402" instrument_node="">Source</span></a></p><p data-dcnode-id="1396"><span data-dcnode-id="1399" instrument_node="">12. In 1848, an iron rod exploded through the skull of a railroad foreman and landed 80 feet away. He was speaking and walking minutes later. The doctor didn’t believe him until a “teacupful of the brain” fell on the floor. He died 12 years later, after having portraits made of him holding the rod. – </span><a data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phineas_Gage" onclick="javascript:window.open('https://en.wikipedia.org/wiki/Phineas_Gage'); return false;" rel="dofollow"><span data-dcnode-id="1398" instrument_node="">Source</span></a></p><p data-dcnode-id="1392"><span data-dcnode-id="1395" instrument_node="">13. When Amiens Cathedral was about to collapse (ca. 1500), a huge iron chain was installed inside the walls while still red hot. It pulled the stone arches back into shape as it contracted and cooled. – </span><a data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amiens_Cathedral" onclick="javascript:window.open('https://en.wikipedia.org/wiki/Amiens_Cathedral'); return false;" rel="nofollow"><span data-dcnode-id="1394" instrument_node="">Source</span></a></p><p data-dcnode-id="1388"><span data-dcnode-id="1391" instrument_node="">14. The cast iron pans are a good source of dietary iron. – </span><a data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//examine.com/nutrition/are-cast-iron-pans-unsafe/" onclick="javascript:window.open('https://examine.com/nutrition/are-cast-iron-pans-unsafe/'); return false;" rel="dofollow"><span data-dcnode-id="1390" instrument_node="">Source</span></a></p><div data-dcnode-id="1387" style="font-size: 0px; height: 0px; line-height: 0px; margin: 0; padding: 0; clear: both;"></div><div class="at-below-post addthis_tool" data-dcnode-id="1381" data-url="https://www.kickassfacts.com/iron-facts/"></div><div data-dcnode-id="1378" style="margin: 10px 0; text-align: center;"><div data-dcnode-id="1379" id="waldo-tag-1569"></div></div></div></div></div><div class="row post-navi hide-on-print no-padding" data-dcnode-id="1360"><div class="small-12 medium-6 columns" data-dcnode-id="1368"><span data-dcnode-id="1374" instrument_node=""> </span><span data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Previous Article</span></span><h6 data-dcnode-id="1369"><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kickassfacts.com/25-kickass-random-facts-list-647/" title="25 Kickass Random Facts List #647"><span data-dcnode-id="1371" instrument_node="">25 Kickass Random Facts List #647</span></a></h6></div><div class="small-12 medium-6 columns" data-dcnode-id="1361"><span data-dcnode-id="1367" instrument_node=""> </span><span data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Next Article</span></span><h6 data-dcnode-id="1362"><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kickassfacts.com/25-interesting-historical-photos-part-294/" title="25 Interesting Historical Photos – Part 294"><span data-dcnode-id="1364" instrument_node="">25 Interesting Historical Photos – Part 294</span></a></h6></div></div><div class="thb-post-bottom-meta" data-dcnode-id="1334"><span data-dcnode-id="1359" instrument_node=""> </span><span data-dcnode-id="1356" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><meta content="jazz" data-dcnode-id="1358" itemprop="name"><span data-dcnode-id="1357" instrument_node=""> </span></span><span data-dcnode-id="1355" instrument_node=""> </span><time class="date published time" content="2021-07-05T12:00:18-04:00" data-dcnode-id="1353" datetime="2021-07-05T12:00:18-04:00" itemprop="datePublished"><span data-dc ><div class="fod-home" data-dcnode-id="557"><div class="inner" data-dcnode-id="558"><ul class="fod-list" data-dcnode-id="559"><li data-dcnode-id="680"><p data-dcnode-id="681"><span class="fod-number" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">1</span></span><span data-dcnode-id="682" instrument_node=""> All of the critical smartphone technology including the battery, the touchscreen, and the multi-core processor is a direct result of government research funding. Without this funding, smartphones would've been far more expensive, and taken much longer to develop.</span></p></li><li data-dcnode-id="675"><p data-dcnode-id="676"><span class="fod-number" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">2</span></span><span data-dcnode-id="677" instrument_node="">&nbsp;The U.S. provides&nbsp;GPS&nbsp;service worldwide for free, while U.S.&nbsp;taxpayers pay $2 million dollars a day to keep it operating.</span></p></li><li data-dcnode-id="670"><p data-dcnode-id="671"><span class="fod-number" data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">3</span></span><span data-dcnode-id="672" instrument_node=""> When the mummy of Ramses II was sent to France in the mid-1970s, it was actually issued a legal Egyptian passport. Ramses' occupation was mentioned as "King (deceased)."</span></p></li><li data-dcnode-id="665"><p data-dcnode-id="666"><span class="fod-number" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">4</span></span><span data-dcnode-id="667" instrument_node=""> The real James Bond was actually an Ornithologist. When asked by Ian Fleming if it was okay to use his name he replied simply: "Fine With It." – </span></p></li><li data-dcnode-id="660"><p data-dcnode-id="661"><span class="fod-number" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">5</span></span><span data-dcnode-id="662" instrument_node=""> Mercury use in hat-making, which causes “Mad Hatters Disease”, was banned in France in 1898, However the practice continued in the US until 1941, despite 80% of hat makers being diagnosed with “mercurial tremors”, until it was abandoned due to the wartime need for mercury.</span></p></li><li data-dcnode-id="655"><p data-dcnode-id="656"><span class="fod-number" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">6</span></span><span data-dcnode-id="657" instrument_node=""> Hurricane Katrina uncovered an underwater forest off Alabama Coast that is 50,000 years old.</span></p></li><li data-dcnode-id="650"><p data-dcnode-id="651"><span class="fod-number" data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">7</span></span><span data-dcnode-id="652" instrument_node=""> The only video games in the Smithsonian Museum are Pong, Pac-Man, and Dragon's Lair</span></p></li><li data-dcnode-id="645"><p data-dcnode-id="646"><span class="fod-number" data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">8</span></span><span data-dcnode-id="647" instrument_node=""> Not raking leaves from your yard increases soil health.</span></p></li><li data-dcnode-id="640"><p data-dcnode-id="641"><span class="fod-number" data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">9</span></span><span data-dcnode-id="642" instrument_node=""> Indonesian&nbsp;scientists&nbsp;have developed a male birth control pill that has been proven 99.96% effective in clinical testing.</span></p></li><li data-dcnode-id="635"><p data-dcnode-id="636"><span class="fod-number" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">10</span></span><span data-dcnode-id="637" instrument_node="">&nbsp;Arnold Schwarzenegger was so hell bent on working out as a youngster that he broke into local gyms when they were closed during the weekends.</span></p></li><li data-dcnode-id="630"><p data-dcnode-id="631"><span class="fod-number" data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">11</span></span><span data-dcnode-id="632" instrument_node=""> Kangaroo meat in Australia can be purchased from the supermarket, butcher and available on restaurant menus as a leaner and healthier alternative to beef or lamb with a 1-2 percent fat content.</span></p></li><li data-dcnode-id="625"><p data-dcnode-id="626"><span class="fod-number" data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">12</span></span><span data-dcnode-id="627" instrument_node=""> Most of the smoke billowing up from a space shuttle launch is not exhaust. It is water vapor from the pool of water under the shuttle designed to absorb the acoustic shock waves that could otherwise tear the shuttle apart.</span></p></li><li data-dcnode-id="620"><p data-dcnode-id="621"><span class="fod-number" data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">13</span></span><span data-dcnode-id="622" instrument_node=""> Both Greek Goddess Hera and Aphrodite renewed their virginity annually. Hera did so by bathing in a spring called Kanathos and Aphrodite bathed in the sea at Paphos.</span></p></li><li data-dcnode-id="615"><p data-dcnode-id="616"><span class="fod-number" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">14</span></span><span data-dcnode-id="617" instrument_node=""> In 1987, a guy bought a lifetime unlimited first class American Airlines ticket for $250,000. He flew over 10,000 flights costing the company $21,000,000. They terminated his ticket in 2008.</span></p></li><li data-dcnode-id="610"><p data-dcnode-id="611"><span class="fod-number" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">15</span></span><span data-dcnode-id="612" instrument_node=""> Johnny Depp travels with his Caption Jack Sparrow costume to make impromptu visits to sick kids in hospitals.</span></p></li><li data-dcnode-id="605"><p data-dcnode-id="606"><span class="fod-number" data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">16</span></span><span data-dcnode-id="607" instrument_node="">&nbsp;During the Korean War, 635,000 tons of bombs were dropped on Korea by the American planes. -&nbsp;</span></p></li><li data-dcnode-id="600"><p data-dcnode-id="601"><span class="fod-number" data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">17</span></span><span data-dcnode-id="602" instrument_node=""> In 1997, there was a contest to win a fully-furnished exact replica of the “Simpsons” house in Clark County, Nevada. The winner could choose to either stay in the home or trade it for $75,000. The winner took the money. The house was ultimately stripped of its “Simpsons” décor before being sold.</span></p></li><li data-dcnode-id="595"><p data-dcnode-id="596"><span class="fod-number" data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">18</span></span><span data-dcnode-id="597" instrument_node=""> Iceland was involved in the 2003 invasion of Iraq. They sent two troops. -&nbsp;</span></p></li><li data-dcnode-id="590"><p data-dcnode-id="591"><span class="fod-number" data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">19</span></span><span data-dcnode-id="592" instrument_node="">&nbsp;Finland's nuclear waste bunker Onkalo is built to last intact until the year 102,120. Work began in the year 2004 and it will be closed in the 2120s. This bunker will probably be one of the last remains of humankind on Earth.</span></p></li><li data-dcnode-id="585"><p data-dcnode-id="586"><span class="fod-number" data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">20</span></span><span data-dcnode-id="587" instrument_node=""> While filming The Breakfast Club, Judd Nelson (Bender) used to stay in character off camera, and tormented the other cast members, particularly Claire.</span></p></li><li data-dcnode-id="580"><p data-dcnode-id="581"><span class="fod-number" data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">21</span></span><span data-dcnode-id="582" instrument_node=""> LinkedIn was sued for hacking their users' email addresses and spamming their contact lists with LinkedIn invites.</span></p></li><li data-dcnode-id="575"><p data-dcnode-id="576"><span class="fod-number" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">22</span></span><span data-dcnode-id="577" instrument_node=""> Contrary to urban legend, the woman who accepted Marlon Brando's 1973 Academy Award was in fact a Native American. Sacheen Littlefeather was born Maria Cruz to a white mother &amp; full-blooded (but mixed tribe) Native dad. John Wayne had to be restrained from dragging her off stage.</span></p></li><li data-dcnode-id="570"><p data-dcnode-id="571"><span class="fod-number" data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">23</span></span><span data-dcnode-id="572" instrument_node=""> For $10,000 former Navy SEALs promise to teach you what they have learned for a week and then, if your skills are up to par, “unleash you on the most exciting and terrifying 36-hours of your life.”</span></p></li><li data-dcnode-id="565"><p data-dcnode-id="566"><span class="fod-number" data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">24</span></span><span data-dcnode-id="567" instrument_node=""> Elon Musk started a company called "The Boring Company" for digging tunnels.</span></p></li><li data-dcnode-id="560"><p data-dcnode-id="561"><span class="fod-number" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">25</span></span><span data-dcnode-id="562" instrument_node=""> As First Lady, Eleanor Roosevelt allowed only female journalists at her press conferences, ensuring that newspapers would have to hire women.</span></p></li></ul></div></div><div data-dcnode-id="553" style="text-align: center; margin-top: 20px;"><span data-dcnode-id="556" instrument_node=""> </span><a class="custom-link" data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jetpack.wordpress.com/fact-of-the-day"><span data-dcnode-id="555" instrument_node="">Facts of the Day</span></a></div></div></div></div></div></div></div></div><span data-dcnode-id="544" instrument_node=""> </span><footer class="dark" data-dcnode-id="362" id="footer"><div class="row" data-dcnode-id="363"><div class="small-12 medium-4 large-4 columns" data-dcnode-id="507"><div class="widget cf widget_recent_comments title-style2" data-dcnode-id="508" id="recent-comments-2"><div class="widget_title" data-dcnode-id="540"><strong data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Recent Comments</span></strong></div><ul data-dcnode-id="509" id="recentcomments"><li class="recentcomments" data-dcnode-id="534"><span class="comment-author-link" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Erik dddas</span></span><span data-dcnode-id="537" instrument_node=""> on </span><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kickassfacts.com/life-pro-tips-of-the-week-part-295/%23comment-16269"><span data-dcnode-id="536" instrument_node="">Life Pro Tips of the Week – Part 295</span></a></li><li class="recentcomments" data-dcnode-id="528"><span class="comment-author-link" data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">demarke</span></span><span data-dcnode-id="531" instrument_node=""> on </span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kickassfacts.com/what-video-game-to-movie-adaptation-could-break-box-office-records-with-the-right-director-actors-writers-and-a-blank-check-budget/%23comment-16248"><span data-dcnode-id="530" instrument_node="">What video game to movie adaptation could break box office records with the right director/actors/writers and a blank check budget?</span></a></li><li class="recentcomments" data-dcnode-id="522"><span class="comment-author-link" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Eric Stott</span></span><span data-dcnode-id="525
