</span><ul data-dcnode-id="620" style="text-align: justify;"><span data-dcnode-id="681" instrument_node="">
</span><li data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Capital – Imphal</span></li><span data-dcnode-id="678" instrument_node="">
</span><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Official Language – Meithei (Manipuri) and&nbsp;English</span></li><span data-dcnode-id="675" instrument_node="">
</span><li data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Other Spoken Languages –&nbsp;Sino Tibetan languages</span></li><span data-dcnode-id="672" instrument_node="">
</span><li data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Area – 22, 237 Sq Km</span></li><span data-dcnode-id="669" instrument_node="">

</span><li data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Population – 25,70,390</span></li><span data-dcnode-id="663" instrument_node="">

</span><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Sex Ratio – 987 females per 1000 male</span></li><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Sex Ratio Rank – 5th</span></li><span data-dcnode-id="651" instrument_node="">

</span><h2 data-dcnode-id="594" style="text-align: justify;"><span data-dcnode-id="598" instrument_node="">&nbsp;</span><span data-dcnode-id="595" style="font-size: 14pt;"><strong data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Historical Facts about Manipur</span></strong></span></h2><span data-dcnode-id="593" instrument_node="">
</span><ul data-dcnode-id="556" style="text-align: justify;"><span data-dcnode-id="592" instrument_node="">
</span><li data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">It was a Union territory from 1956 and became full fledged state from 1972.</span></li><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="582"><span data-dcnode-id="588" instrument_node="">The earlier name of Manipur was </span><em data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Kangleipak</span></em><span data-dcnode-id="585" instrument_node=""> or </span><em data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Meeteileipak.</span></em></li><span data-dcnode-id="581" instrument_node="">
</span><li data-dcnode-id="576"><span data-dcnode-id="580" instrument_node="">The origin of European Polo game lies in Manipur.&nbsp;Locals used to play a game riding on horseback which they called </span><strong data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Pulu</span></strong><span data-dcnode-id="577" instrument_node="">. The British&nbsp;spread&nbsp;this game as modern Polo to England&nbsp;during colonial period.</span></li><span data-dcnode-id="575" instrument_node="">
</span><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">The advent of Japanese&nbsp;forces to India&nbsp;was checked after they&nbsp;were defeated by British near the border of Imphal during World War II.</span></li><span data-dcnode-id="572" instrument_node="">
</span><li data-dcnode-id="567"><span data-dcnode-id="571" instrument_node="">The King of&nbsp;Manipur Princely state&nbsp;&nbsp;</span><em data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Bodchandra Singh</span></em><span data-dcnode-id="568" instrument_node=""> signed the instrument of accession in 1949 and merged the princely state to union of India.</span></li><span data-dcnode-id="566" instrument_node="">
</span><li data-dcnode-id="558"><span data-dcnode-id="565" instrument_node="">Manipur was called as&nbsp;</span><em data-dcnode-id="560"><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">J</span></strong><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">ewel of India</span></strong></em><span data-dcnode-id="559" instrument_node=""> by Jawaharlal Nehru.</span></li><span data-dcnode-id="557" instrument_node="">
</span></ul><span data-dcnode-id="555" instrument_node="">
</span><h2 data-dcnode-id="551" style="text-align: justify;"><span data-dcnode-id="552" style="font-size: 14pt;"><strong data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Geographical Facts about Manipur</span></strong></span></h2><span data-dcnode-id="550" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="544" id="attachment_3038" style="width: 482px"><img alt="Facts about Manipur" aria-describedby="caption-attachment-3038" class="size-full wp-image-3038" data-dcnode-id="549" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/wp-content/uploads/2015/06/Loktak-.jpg&amp;raw" width="472"><p class="wp-caption-text" data-dcnode-id="545" id="caption-attachment-3038"><span data-dcnode-id="548" instrument_node="">Loktak Lake</span><br data-dcnode-id="547"><span data-dcnode-id="546" instrument_node="">Famous for its Floating Islands</span></p></div><span data-dcnode-id="543" instrument_node="">
</span><ul data-dcnode-id="489" style="text-align: justify;"><span data-dcnode-id="542" instrument_node="">
</span><li data-dcnode-id="528"><span data-dcnode-id="541" instrument_node="">Manipur borders with 3 states – </span><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/interesting-facts-about-nagaland/" rel="noopener" target="_blank"><span data-dcnode-id="540" instrument_node="">Nagaland</span></a><span data-dcnode-id="538" instrument_node=""> in north, </span><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/interesting-facts-about-mizoram/" rel="noopener" target="_blank"><span data-dcnode-id="537" instrument_node="">Mizoram</span></a><span data-dcnode-id="535" instrument_node=""> in southwest, </span><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/interesting-facts-about-assam" rel="noopener" target="_blank"><span data-dcnode-id="534" instrument_node="">Assam</span></a><span data-dcnode-id="532" instrument_node=""> in northwest. It also shares </span><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/land-borders-and-bordering-countries" rel="noopener" target="_blank"><span data-dcnode-id="531" instrument_node="">international boundary </span></a><span data-dcnode-id="529" instrument_node="">with Myanmar in east. Length of international border along with Myanmar is 398 Km.</span></li><span data-dcnode-id="527" instrument_node="">
</span><li data-dcnode-id="522"><span data-dcnode-id="526" instrument_node="">Mount Iso of </span><em data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Senapati</span></em><span data-dcnode-id="523" instrument_node=""> district is the highest peak of state with an altitude of 2,994 m.</span></li><span data-dcnode-id="521" instrument_node="">
</span><li data-dcnode-id="516"><span data-dcnode-id="520" instrument_node="">River </span><strong data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Barak</span></strong><span data-dcnode-id="517" instrument_node=""> is the largest river of Manipur.</span></li><span data-dcnode-id="515" instrument_node="">
</span><li data-dcnode-id="505"><strong data-dcnode-id="511"><em data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Loktak lake</span></em><span data-dcnode-id="512" instrument_node=""> </span></strong><span data-dcnode-id="510" instrument_node="">which is the biggest fresh water lake of northeast India is quite popular. It is famous for its unique </span><strong data-dcnode-id="507"><em data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Phumdis</span></em></strong><span data-dcnode-id="506" instrument_node=""> – the floating islands</span></li><span data-dcnode-id="504" instrument_node="">
</span><li data-dcnode-id="494"><a data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keibul_Lamjao_National_Park"><strong data-dcnode-id="500"><em data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Keibul Lamjao</span></em><span data-dcnode-id="501" instrument_node=""> </span></strong></a><span data-dcnode-id="498" instrument_node="">&nbsp;is the only one floating national park of the world floats over the </span><em data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Loktak&nbsp;lake</span></em><span data-dcnode-id="495" instrument_node="">.</span></li><span data-dcnode-id="493" instrument_node="">
</span><li data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">As per 2011 census, Manipur has the highest sex ratio (987 females per 1000 male) among all seven sister states of north-east.</span></li><span data-dcnode-id="490" instrument_node="">
</span></ul><span data-dcnode-id="488" instrument_node="">
</span><h2 data-dcnode-id="483" style="text-align: justify;"><span data-dcnode-id="487" instrument_node="">&nbsp;</span><strong data-dcnode-id="484"><span data-dcnode-id="485" style="font-size: 14pt;"><span data-dcnode-id="486" instrument_node="">Economic Facts about Manipur</span></span></strong></h2><span data-dcnode-id="482" instrument_node="">
</span><ul data-dcnode-id="458" style="text-align: justify;"><span data-dcnode-id="481" instrument_node="">
</span><li data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Economy of the state is poor and as per year 2014 data, Manipur stands at third last place in terms of GDP per capita.</span></li><span data-dcnode-id="478" instrument_node="">
</span><li data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Handloom weaving is the biggest industry of the state and accounts for one third of household workers</span></li><span data-dcnode-id="475" instrument_node="">
</span><li data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">This state is the first to introduce Oak Tussar Industry (Sericulture – Silk farming).</span></li><span data-dcnode-id="472" instrument_node="">
</span><li data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Other industries include bamboo and cane articles, rice mills, edible oil crushing and leather goods.</span></li><span data-dcnode-id="469" instrument_node="">
</span><li data-dcnode-id="465"><strong data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Main Agriculture products of Manipur</span></strong><span data-dcnode-id="466" instrument_node=""> – Paddy, wheat, maize</span></li><span data-dcnode-id="464" instrument_node="">
</span><li data-dcnode-id="460"><strong data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Mineral resources</span></strong><span data-dcnode-id="461" instrument_node=""> – limestone</span></li><span data-dcnode-id="459" instrument_node="">
</span></ul><span data-dcnode-id="457" instrument_node="">
</span><h2 data-dcnode-id="453" style="text-align: justify;"><span data-dcnode-id="454" style="font-size: 14pt;"><strong data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Social and Cultural Facts about Manipur</span></strong></span></h2><span data-dcnode-id="452" instrument_node="">
</span><ul data-dcnode-id="424" style="text-align: justify;"><span data-dcnode-id="451" instrument_node="">
</span><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Manipur has literacy rate of 79.85 % which is well above of India’s average literacy rate of 74.04 %. Manipur stands at 9th rank among Indian states in terms of literacy.</span></li><span data-dcnode-id="448" instrument_node="">
</span><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Mukna (Wrestling) is a popular sport of the state.</span></li><span data-dcnode-id="445" instrument_node="">
</span><li data-dcnode-id="440"><span data-dcnode-id="444" instrument_node="">The main tribal group of Manipur is </span><strong data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Meetei </span></strong><span data-dcnode-id="441" instrument_node="">which constitutes of 27 % population.</span></li><span data-dcnode-id="439" instrument_node="">
</span><li data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">About 46 % of people are Hindus and 34 % are Christians while remaining 10 % are from different folk religious groups.</span></li><span data-dcnode-id="436" instrument_node="">
</span><li data-dcnode-id="429"><em data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Manipuri</span></em><span data-dcnode-id="433" instrument_node=""> is the well known and popular</span><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/classical-dances-of-india" rel="noopener" target="_blank"><span data-dcnode-id="432" instrument_node=""> classical dance </span></a><span data-dcnode-id="430" instrument_node="">form which is based on the instances of Lord Krishna and Radha.</span></li><span data-dcnode-id="428" instrument_node="">
</span><li data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Festivals include Dol jatra, Lai Haraoba, Rasa leela, Cheiraoba, Gaan-Nagai, Yaoshang(Holi) and christmas.</span></li><span data-dcnode-id="425" instrument_node="">
</span></ul><span data-dcnode-id="423" instrument_node="">
</span><h3 data-dcnode-id="419" style="text-align: justify;"><span data-dcnode-id="420" style="font-size: 14pt;"><strong data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Famous Persons related to Manipur</span></strong></span></h3><span data-dcnode-id="418" instrument_node="">
</span><ul data-dcnode-id="406" style="text-align: justify;"><span data-dcnode-id="417" instrument_node="">
</span><li data-dcnode-id="413"><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">M C Mary Kom</span></strong><span data-dcnode-id="414" instrument_node=""> – the famous five time World&nbsp;Boxing champion who also won medal in Olympics.</span></li><span data-dcnode-id="412" instrument_node="">
</span><li data-dcnode-id="408"><strong data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Irom C Sharmila </span></strong><span data-dcnode-id="409" instrument_node="">– she is famous socialist and political activist. She started Hunger Strike in year 2000 which is still going on. She is also called as Iron Lady of Manipur.</span></li><span data-dcnode-id="407" instrument_node="">
</span></ul><span data-dcnode-id="405" instrument_node="">
