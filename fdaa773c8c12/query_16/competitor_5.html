</span><article class="post-8672 post type-post status-publish format-standard has-post-thumbnail hentry category-50-us-states mv-content-wrapper" data-dcnode-id="165" id="post-8672" itemscope="" itemtype="https://schema.org/Article"><span data-dcnode-id="785" instrument_node="">
</span><div class="td-post-header" data-dcnode-id="767"><span data-dcnode-id="784" instrument_node="">
</span><header class="td-post-title" data-dcnode-id="769"><span data-dcnode-id="783" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">50 Interesting Facts About Oregon</span></h1><span data-dcnode-id="780" instrument_node="">
</span><div class="td-module-meta-info" data-dcnode-id="771"><span data-dcnode-id="779" instrument_node="">
</span><div class="td-post-author-name" data-dcnode-id="773"><div class="td-author-by" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">By</span></div><span data-dcnode-id="776" instrument_node=""> </span><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/author/thefactfile-staff/"><span data-dcnode-id="775" instrument_node="">Editorial Staff</span></a></div><span data-dcnode-id="772" instrument_node=""> </span></div><span data-dcnode-id="770" instrument_node="">
</span></header><span data-dcnode-id="768" instrument_node="">
</span></div><span data-dcnode-id="766" instrument_node="">
</span><div class="td-post-content" data-dcnode-id="210"><span data-dcnode-id="765" instrument_node="">
</span><p class="last-updated" data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Last updated on January 24th, 2022</span></p><p data-dcnode-id="706"><b data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Oregon&nbsp;</span></b><span data-dcnode-id="760" instrument_node="">is the </span><strong data-dcnode-id="755"><span data-dcnode-id="759" instrument_node="">27</span><sup data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">th</span></sup><span data-dcnode-id="756" instrument_node="">&nbsp;most populous</span></strong><span data-dcnode-id="754" instrument_node="">&nbsp;and the </span><strong data-dcnode-id="749"><span data-dcnode-id="753" instrument_node="">9</span><sup data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">th</span></sup><span data-dcnode-id="750" instrument_node="">&nbsp;most extensive</span></strong><span data-dcnode-id="748" instrument_node="">&nbsp;of the 50 states of the United States. It lies in the&nbsp;Pacific Northwest&nbsp;region on the&nbsp;West Coast&nbsp;of the&nbsp;United States. The state attained&nbsp;</span><strong data-dcnode-id="743"><span data-dcnode-id="747" instrument_node="">statehood on February 14, 1859, becoming the 33</span><sup data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">rd</span></sup><span data-dcnode-id="744" instrument_node=""> state</span></strong><span data-dcnode-id="742" instrument_node=""> to join </span><a data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/united-states-by-statehood/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="741" instrument_node="">the union</span></a><span data-dcnode-id="739" instrument_node="">. Its four&nbsp;</span><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">bordering states</span></strong><span data-dcnode-id="736" instrument_node="">&nbsp;are </span><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/nevada-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="735" instrument_node="">Nevada</span></a><span data-dcnode-id="733" instrument_node="">, </span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/washington-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="732" instrument_node="">Washington</span></a><span data-dcnode-id="730" instrument_node="">, </span><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/california-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="729" instrument_node="">California</span></a><span data-dcnode-id="727" instrument_node="">, and&nbsp;</span><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/idaho-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="726" instrument_node="">Idaho</span></a><span data-dcnode-id="724" instrument_node="">.&nbsp;</span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/u-s-states-and-their-border-states/"><span data-dcnode-id="723" instrument_node="">See the full list of the 50 states and their borders here.</span></a><span data-dcnode-id="721" instrument_node=""> Oregon (</span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/us-states-nicknames/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="720" instrument_node="">nicknamed</span></a><span data-dcnode-id="718" instrument_node="">: “Beaver State”) has 36</span><strong data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">&nbsp;counties.</span></strong><span data-dcnode-id="715" instrument_node="">&nbsp;The state’s&nbsp;</span><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">capital is </span></strong><a data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/u-s-states-and-capitals/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="712" instrument_node="">Salem</span></a><span data-dcnode-id="710" instrument_node="">. The </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/state-abbreviations/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="709" instrument_node="">abbreviation for Oregon</span></a><span data-dcnode-id="707" instrument_node=""> is OR.</span></p><span data-dcnode-id="705" instrument_node="">
</span><h2 data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Interesting facts about Oregon&nbsp;</span></h2><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="692"><strong data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">1.</span></strong><span data-dcnode-id="699" instrument_node=""> The </span><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">origin of the name</span></strong><span data-dcnode-id="696" instrument_node=""> “Oregon” is uncertain. However, according to one account, the name is believed to have been derived from the French word, ‘Ouragan,’ which is loosely translated as hurricane’ or windstorm’. This was in reference to the powerful winds originating from the Columbia River hence the name Oregon.</span><sup data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">[1]</span></sup><span data-dcnode-id="693" instrument_node="">&nbsp;</span></p><span data-dcnode-id="691" instrument_node="">
</span><figure aria-describedby="caption-attachment-12377" class="wp-caption aligncenter" data-dcnode-id="687" id="attachment_12377" style="width: 500px"><img alt="North American Beaver on ground." class="size-full wp-image-12377 td-animation-stack-type0-2" data-dcnode-id="690" height="331" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/North-American-Beaver-on-ground.-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/North-American-Beaver-on-ground.-min.jpg 500w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/North-American-Beaver-on-ground.-min-300x199.jpg 300w" width="500"><figcaption class="wp-caption-text" data-dcnode-id="688" id="caption-attachment-12377"><span data-dcnode-id="689" instrument_node="">North American Beaver (Castor canadensis) on ground.</span></figcaption></figure><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="674"><strong data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">2.</span></strong><span data-dcnode-id="683" instrument_node=""> Also known as Castor canadensis (scientific name), the </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/state-animal-list/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="682" instrument_node="">American Beaver</span></a><span data-dcnode-id="680" instrument_node=""> is actually the </span><strong data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Oregon state animal</span></strong><span data-dcnode-id="677" instrument_node=""> since 1969. And that is why Oregon is popularly known as “The Beaver State”.</span><sup data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">[3]</span></sup></p><span data-dcnode-id="673" instrument_node="">
</span><h2 data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Oregon on the map</span></h2><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="650"><iframe allowfullscreen="allowfullscreen" aria-hidden="false" data-dcnode-id="651" frameborder="0" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/embed%3Fpb%3D%211m18%211m12%211m3%211d2932596.270762414%212d-122.82689534249381%213d44.12743663223903%212m3%211f0%212f0%213f0%213m2%211i1024%212i768%214f13.1%213m3%211m2%211s0x54936e7c9b9f6a55%253A0x7d4c65db7a0bb876%212sOregon%252C%2520USA%215e0%213m2%211sen%212sin%214v1594443979693%215m2%211sen%212sin&amp;raw" style="border: 0;" tabindex="0" width="600"><html data-dcnode-id="653"><head data-dcnode-id="664"><meta charset="utf-8"><span data-dcnode-id="668" instrument_node="">

</span><body data-dcnode-id="654"><span data-dcnode-id="662" instrument_node="">
</span><div data-dcnode-id="661" id="mapDiv"></div><span data-dcnode-id="660" instrument_node="">
</span><span data-dcnode-id="657" instrument_node="">
</span><span data-dcnode-id="655" instrument_node="">
</span></body></html></iframe></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="640"><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">3.</span></strong><span data-dcnode-id="646" instrument_node=""> The </span><strong data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">state has 11 lighthouses,</span></strong><span data-dcnode-id="643" instrument_node=""> and Yaquina is the tallest of them all – 93 feet. The tallest lighthouse is the most popular lighthouse on the coast and has been in service since 1873.</span><sup data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">[30]</span></sup></p><span data-dcnode-id="639" instrument_node="">
</span><figure aria-describedby="caption-attachment-12380" class="wp-caption aligncenter" data-dcnode-id="635" id="attachment_12380" style="width: 500px"><img alt="Powell's Books In the city of Portland, Oregon." class="size-full wp-image-12380 td-animation-stack-type0-2" data-dcnode-id="638" height="334" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Powells-Books-In-the-city-of-Portland-Oregon.-Powells-Books-is-the-largest-independent-bookstore-in-the-world.-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Powells-Books-In-the-city-of-Portland-Oregon.-Powells-Books-is-the-largest-independent-bookstore-in-the-world.-min.jpg 500w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Powells-Books-In-the-city-of-Portland-Oregon.-Powells-Books-is-the-largest-independent-bookstore-in-the-world.-min-300x200.jpg 300w" width="500"><figcaption class="wp-caption-text" data-dcnode-id="636" id="caption-attachment-12380"><span data-dcnode-id="637" instrument_node="">Powell’s Books In the city of Portland, Oregon. Powell’s Books is the largest independent bookstore in the world.</span></figcaption></figure><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="625"><strong data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">4.</span></strong><span data-dcnode-id="631" instrument_node=""> Powell’s Book store in Portland, Oregon,&nbsp;</span><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">is the world’s largest bookstore.</span></strong><span data-dcnode-id="628" instrument_node=""> The store is in service in Portland since 1971. The company’s founder started his book selling career with a loan of $3,000, which he repaid within two months of borrowing the money.</span><sup data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">[31,32]</span></sup></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="615"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">5.</span></strong><span data-dcnode-id="621" instrument_node=""> The mention of </span><strong data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">the deepest gorge in Oregon</span></strong><span data-dcnode-id="618" instrument_node=""> should give you a clear picture of a 7,900 feet Hell’s Canyon. This magnificent and picturesque physical feature is located between Idaho and Oregon along the Snake River.</span><sup data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">[4]</span></sup></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="607"><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">6.</span></strong><span data-dcnode-id="611" instrument_node=""> It may take you by surprise but </span><strong data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">milk is indeed Oregon’s state beverage.</span></strong><span data-dcnode-id="608" instrument_node=""> In 1997, the legislature unanimously agreed that milk and other dairy products should be accorded such status on the basis of their contribution to the state’s economic well-being. Therefore, milk is a symbol of economic prosperity in Oregon.</span></p><span data-dcnode-id="606" instrument_node="">
</span><figure aria-describedby="caption-attachment-12381" class="wp-caption aligncenter" data-dcnode-id="600" id="attachment_12381" style="width: 500px"><img alt="Mill Ends Park, Oregon." class="wp-image-12381 td-animation-stack-type0-2" data-dcnode-id="605" height="335" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Mill-Ends-Park-Oregon.-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Mill-Ends-Park-Oregon.-min.jpg 639w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Mill-Ends-Park-Oregon.-min-300x201.jpg 300w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Mill-Ends-Park-Oregon.-min-627x420.jpg 627w" width="500"><figcaption class="wp-caption-text" data-dcnode-id="601" id="caption-attachment-12381"><span data-dcnode-id="604" instrument_node="">Mill Ends Park, Oregon. Interesting facts about Oregon. Image by – </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/31246066%40N04/31835343698/in/photolist-Qvbsyb-fBDy3H-fBCVzD-CQCLd-zJm5R5-zqPt5N-A2S7gv-zMBNBf-zJnyM5-zqGdb3-fBTXwf-49JVns-zJiigo-XUb417-gu7gFW-yLpCuF-z4TEDo-A2Rvcc-zYBpRU-2USf51-zYBVrL-zqN4mQ-fBCSYH-KcfEnS-27KPE8E-X9PK97-go4XgB-gf4jh5-aTAetF-za8pxf-9w3RjJ-zqMjj6-gf7pxE-X9PLgC-X7rXaU-57tQGz-9w3RcU-9w3Rgh-go4Asy-yWsBjo-26eoMbu-go54YN-yZpCWF-zfQVJ1-zEZ8ZC-zeUeHr-298u7ap-A74JRU-A8c5y5-zcuhKv"><span data-dcnode-id="603" instrument_node="">Ian Sane</span></a></figcaption></figure><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="590"><strong data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">7.</span></strong><span data-dcnode-id="596" instrument_node=""> Did you know that </span><strong data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">the world’s smallest park</span></strong><span data-dcnode-id="593" instrument_node=""> – Mill Ends Park – is in Portland, Oregon? Surprisingly, the park is just two square feet in area. Now imagine how one could fit a park in that little area. Here is a picture to clarify all your doubts. The park lies in the median of the heavily trafficked Naito Parkway. It was granted this recognition in 1971 by The Guinness Book of Records. The park was built because of a supposed leprechaun sighting. A journalist named Dick Fagan ran a column called Mill Ends. He claimed (in jest, of course) that he saw a leprechaun digging a hole that was supposed to be used for erecting a light pole. In truth, Fagan saw the empty space and began planting flowers on the spot. In 1948, on St. Patrick’s Day, the park was dedicated by Fagan himself. The journalist also wrote about a leprechaun colony living in the park headed by one named Patrick O’Toole. </span><sup data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">[33,34]</span></sup></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="582"><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">8.</span></strong><span data-dcnode-id="586" instrument_node=""> The square dance or simply</span><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node=""> the Official State Dance</span></strong><span data-dcnode-id="583" instrument_node=""> is a heritage symbol within Oregon. The dance’s lively spirit exemplifies a friendly, enthusiastic and free nature that are all tailored to reflect the typical Oregon character and heritage in general.</span></p><span data-dcnode-id="581" instrument_node="">
</span><figure aria-describedby="caption-attachment-14262" class="wp-caption aligncenter" data-dcnode-id="575" id="attachment_14262" style="width: 799px"><img alt="Agate nodule (Succor Creek Claim, Harney County, Oregon, USA)" class="size-full wp-image-14262 td-animation-stack-type0-2" data-dcnode-id="580" height="506" loading="lazy" sizes="(max-width: 799px) 100vw, 799px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/34670752811_a6ac7cee16_c-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/34670752811_a6ac7cee16_c-min.jpg 799w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/34670752811_a6ac7cee16_c-min-300x190.jpg 300w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/34670752811_a6ac7cee16_c-min-768x486.jpg 768w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/34670752811_a6ac7cee16_c-min-696x441.jpg 696w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/34670752811_a6ac7cee16_c-min-663x420.jpg 663w" width="799"><figcaption class="wp-caption-text" data-dcnode-id="576" id="caption-attachment-14262"><span data-dcnode-id="579" instrument_node="">“Thunder eggs” are agate-filled masses that fill former cavities in rocks. Image via </span><a class="owner-name truncate" data-dcnode-id="577" data-track="attributionNameClick" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/jsjgeology/" title="Go to James St. John's photostream"><span data-dcnode-id="578" instrument_node="">James St. John</span></a></figcaption></figure><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="565"><strong data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">9.</span></strong><span data-dcnode-id="571" instrument_node=""> Have you ever come across a state that prides itself with amazing geodes? Well, Oregon’s Thunderegg will give you enough reasons to spend more time in this state. This </span><strong data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">official state rock contains several minerals</span></strong><span data-dcnode-id="568" instrument_node=""> of various colors and crystalline structure making it unique yet appealing to the eye. Apparently, these popular items are skilfully cut and polished to reveal their breath-taking designs inside.</span><sup data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">[5]</span></sup></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="555"><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">10.</span></strong><span data-dcnode-id="561" instrument_node=""> Unlike the Thunderegg, </span><strong data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Oregon sunstone is regarded highly as the state’s official gemstone</span></strong><span data-dcnode-id="558" instrument_node=""> (designated in 1987) because of its brightly colored appearance. The stone belongs to the feldspar family and it is found mainly in the Southeastern regions of the state. Sunstone is a variety of a mineral called oligoclase.&nbsp;Sunstone can be polished, faceted, and carved and made into jewelry.</span><sup data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">[6]</span></sup></p><span data-dcnode-id="554" instrument_node="">
</span><h2 data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Flag of Oregon</span></h2><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><img alt="Oregon state flag" class="aligncenter wp-image-8675 td-animation-stack-type0-2" data-dcnode-id="550" height="300" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Oregon-state-flag.png&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Oregon-state-flag.png 640w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Oregon-state-flag-300x180.png 300w" width="500"></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="539"><strong data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">11.</span></strong><span data-dcnode-id="545" instrument_node=""> Oregon </span><strong data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">boasts of a unique state flag in the U.S.</span></strong><span data-dcnode-id="542" instrument_node=""> with two separate designs each on either side. A close look reveals that one side is decorated with the state seal emblem and on the reverse side; there is a picture of a golden beaver.</span><sup data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">[2]</span></sup></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="520"><strong data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">12.</span></strong><span data-dcnode-id="535" instrument_node=""> Crater Lake is a notable physical feature that makes Oregon a unique state in the entire country. Crater Lake is actually the deepest (592 meters) among the lakes in the U.S. and </span><strong data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">one of the deepest in the world.</span></strong><span data-dcnode-id="532" instrument_node=""> The most intriguing part of its history is that it was formed as a volcanic lake thousands of years ago. Its scenic crystal-blue waters are well-known by every traveller worldwide. You could stack the </span><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toureiffel.paris/en" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="531" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="529" instrument_node="">, </span><a data-dcnode-id="527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/wamo/index.htm" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="528" instrument_node="">Washington Monument</span></a><span data-dcnode-id="526" instrument_node=""> and </span><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/stli/index.htm" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="525" instrument_node="">Statue of Liberty</span></a><span data-dcnode-id="523" instrument_node=""> on top of each other and still have 100 feet of water covering Lady Liberty’s torch. That is how deep the lake is.</span><sup data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">[7]</span></sup></p><span data-dcnode-id="519" instrument_node="">
</span><figure aria-describedby="caption-attachment-14261" class="wp-caption aligncenter" data-dcnode-id="513" id="attachment_14261" style="width: 799px"><img alt="Crater Lake National Park, Oregon." class="size-full wp-image-14261 td-animation-stack-type0-2" data-dcnode-id="518" height="436" loading="lazy" sizes="(max-width: 799px) 100vw, 799px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/8396718278_35a5a94d9a_c-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/8396718278_35a5a94d9a_c-min.jpg 799w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/8396718278_35a5a94d9a_c-min-300x164.jpg 300w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/8396718278_35a5a94d9a_c-min-768x419.jpg 768w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/8396718278_35a5a94d9a_c-min-696x380.jpg 696w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/8396718278_35a5a94d9a_c-min-770x420.jpg 770w" width="799"><figcaption class="wp-caption-text" data-dcnode-id="514" id="caption-attachment-14261"><span data-dcnode-id="517" instrument_node="">Crater Lake National Park, Oregon. Image via </span><a class="owner-name truncate" data-dcnode-id="515" data-track="attributionNameClick" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/84263554%40N00/" title="Go to Ron Reiring's photostream"><span data-dcnode-id="516" instrument_node="">Ron Reiring</span></a></figcaption></figure><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="493"><strong data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">13.</span></strong><span data-dcnode-id="509" instrument_node=""> According to the Centers for Disease Control and Prevention,</span><strong data-dcnode-id="507"><span data-dcnode-id="508" instrument_node=""> Oregon is among the top 20 states with the highest suicide rates.</span></strong><span data-dcnode-id="506" instrument_node=""> </span><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/montana-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="505" instrument_node="">Montana </span></a><span data-dcnode-id="503" instrument_node="">tops the list, closely followed by </span><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/alaska-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="502" instrument_node="">Alaska</span></a><span data-dcnode-id="500" instrument_node=""> and </span><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/wyoming-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="499" instrument_node="">Wyoming</span></a><span data-dcnode-id="497" instrument_node="">.</span><sup data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">[35]</span></sup><span data-dcnode-id="494" instrument_node="">&nbsp;</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="474"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">14.</span></strong><span data-dcnode-id="489" instrument_node=""> Did you know that </span><strong data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">physician-assisted suicide is legal in eight U.S. jurisdictions including Oregon?</span></strong><span data-dcnode-id="486" instrument_node=""> However, there are certain limitations to the act wherein the individuals must have a terminal illness as well as a prognosis of six months or less to live. The other jurisdictions where this act is legal are </span><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/colorado-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="485" instrument_node="">Colorado</span></a><span data-dcnode-id="483" instrument_node="">, </span><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/hawaii-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="482" instrument_node="">Hawaii</span></a><span data-dcnode-id="480" instrument_node="">, </span><a data-dcnode-id="478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/vermont-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="479" instrument_node="">Vermont</span></a><span data-dcnode-id="477" instrument_node="">, Washington, Montana, California and District of Columbia. The first public assisted suicide was in 1990, of Janet Adkins.</span><sup data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">[8,9,10]</span></sup></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="467"><strong data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">15.</span></strong><span data-dcnode-id="470" instrument_node=""> Forest Grove at the heart of Oregon is credited for being the home of the world’s tallest and most notable barber shop pole, standing at 72-feet tall.</span><sup data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">[13]</span></sup></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="459"><strong data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">16.</span></strong><span data-dcnode-id="463" instrument_node=""> There’s no other state in the US that is known to have</span><strong data-dcnode-id="461"><span data-dcnode-id="462" instrument_node=""> an official state nut</span></strong><span data-dcnode-id="460" instrument_node=""> if not Oregon. The state nut is known as the hazelnut or filbert and Oregon is home to 99 percent of the commercial nuts cultivated in the US.</span></p><span data-dcnode-id="458" instrument_node="">
</span><figure aria-describedby="caption-attachment-12382" class="wp-caption aligncenter" data-dcnode-id="452" id="attachment_12382" style="width: 500px"><img alt="The famous Nike swoosh." class="wp-image-12382 td-animation-stack-type0-2" data-dcnode-id="457" height="336" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/The-famous-swoosh.-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/The-famous-swoosh.-min.jpg 640w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/The-famous-swoosh.-min-300x202.jpg 300w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/The-famous-swoosh.-min-625x420.jpg 625w" width="500"><figcaption class="wp-caption-text" data-dcnode-id="453" id="caption-attachment-12382"><span data-dcnode-id="456" instrument_node="">The famous swoosh. Image by </span><a data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/hyku/379995118/in/photolist-zzziY-8jMoyf-fqcJoJ-fnCEy9-9h1kDH-zzz6x-4b6wU4-oAiRUV-fnCFP7-8mEcHt-fnotcp-fnorQZ-8jJ1Tv-4MMb8y-8mE8s2-8jJ36i-f43mDs-gCr8os-8jMkYu-aheckL-oSNS8c-ahe9oU-oAjiwh-oAjTin-fpXkmc-ma7ic4-oAjT5g-6dTYPZ-oSx5xk-fpXkzX-fpXmDr-fx3Fwc-fx3F4k-eWx2iA-f43niN-4JTd2m-kYks88-8mE9jF-f3N8CR-8mEegH-hFVWQ-fnosZa-8jJb7Z-fnCF21-cjoSJ5-8mE5UM-acujev-fxi9rY-8mHemW-cekgaN"><span data-dcnode-id="455" instrument_node="">Josh Hallett</span></a></figcaption></figure><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="442"><strong data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">17.</span></strong><span data-dcnode-id="448" instrument_node=""> Interestingly, </span><strong data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">the famous Nike logo</span></strong><span data-dcnode-id="445" instrument_node=""> was designed by Carolyn Davidson (in 1971), a student at Portland State University. And she was paid $35 for her design by Nike’s founders, Bill Bowerman, and Phil Knight though they didn’t like the logo in the first place. But now, Nike Logo is recognized by every sports enthusiast all over the world. Originally, the logo was called as ‘the strip’, which later became well known as ‘Swoosh’.</span><sup data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">[11]</span></sup></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="434"><strong data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">18.</span></strong><span data-dcnode-id="438" instrument_node=""> Nike</span><strong data-dcnode-id="436"><span data-dcnode-id="437" instrument_node=""> first took its baby steps in Eugene,</span></strong><span data-dcnode-id="435" instrument_node=""> when Bill Bowerman, a former Olympian and coach designed the famous waffle-iron rubber sole that would establish the brand as a serious contender in athletic wear. It was lighter, more durable, and had better grip, allowing athletes to move more confidently.</span></p><span data-dcnode-id="433" instrument_node="">
</span><figure aria-describedby="caption-attachment-12378" class="wp-caption aligncenter" data-dcnode-id="429" id="attachment_12378" style="width: 600px"><img alt="Oregon on the map" class="size-full wp-image-12378 td-animation-stack-type0-2" data-dcnode-id="432" height="460" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Oregon-in-red-on-the-map-with-bordering-states.-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Oregon-in-red-on-the-map-with-bordering-states.-min.jpg 600w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Oregon-in-red-on-the-map-with-bordering-states.-min-300x230.jpg 300w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Oregon-in-red-on-the-map-with-bordering-states.-min-80x60.jpg 80w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Oregon-in-red-on-the-map-with-bordering-states.-min-548x420.jpg 548w" width="600"><figcaption class="wp-caption-text" data-dcnode-id="430" id="caption-attachment-12378"><span data-dcnode-id="431" instrument_node="">Oregon (in red) on the map with bordering states.</span></figcaption></figure><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="419"><strong data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">19.</span></strong><span data-dcnode-id="425" instrument_node=""> It is a well-known fact that the famous Hollywood star of all time,</span><strong data-dcnode-id="423"><span data-dcnode-id="424" instrument_node=""> Clint Eastwood</span></strong><span data-dcnode-id="422" instrument_node=""> lived in Springfield, Oregon. He worked at Weyerhaeuser for a few weeks as a lumberjack before realizing that lumberjacking was a dangerous business venture.</span><sup data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">[12]</span></sup></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="412"><strong data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">20.</span></strong><span data-dcnode-id="415" instrument_node=""> In Portland, pinball machines are completely banned since 1949 when Dorothy McCullough was the mayor.</span><sup data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">[18]</span></sup></p><span data-dcnode-id="411" instrument_node="">
</span><figure aria-describedby="caption-attachment-12383" class="wp-caption aligncenter" data-dcnode-id="407" id="attachment_12383" style="width: 500px"><img alt="Tilikum Bridge over the Willamette River, Portland, Oregon." class="size-full wp-image-12383 td-animation-stack-type0-2" data-dcnode-id="410" height="334" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Bicycle-riders-in-the-bike-lane-on-the-Tilikum-Bridge-over-the-Willamette-River-Portland-Oregon.-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Bicycle-riders-in-the-bike-lane-on-the-Tilikum-Bridge-over-the-Willamette-River-Portland-Oregon.-min.jpg 500w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Bicycle-riders-in-the-bike-lane-on-the-Tilikum-Bridge-over-the-Willamette-River-Portland-Oregon.-min-300x200.jpg 300w" width="500"><figcaption class="wp-caption-text" data-dcnode-id="408" id="caption-attachment-12383"><span data-dcnode-id="409" instrument_node="">Bicycle riders in the bike lane on the Tilikum Bridge over the Willamette River, Portland, Oregon. Interesting facts about Oregon.</span></figcaption></figure><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="397"><strong data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">21.</span></strong><span data-dcnode-id="403" instrument_node=""> In 1971, Oregon passed</span><strong data-dcnode-id="401"><span data-dcnode-id="402" instrument_node=""> the Oregon Bicycle Bill,</span></strong><span data-dcnode-id="400" instrument_node=""> the first such state law in the country, which devoted 1% (every year) of state transportation funding for cycling. Interestingly, the bill was signed outdoors – on the seat of a bike.</span><sup data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">[29]</span></sup></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="387"><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">22.</span></strong><span data-dcnode-id="393" instrument_node=""> Oregon has plenty to offer and one of the unique things that make this state famous is the honey mushroom or Armillaria ostoyae, </span><strong data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">the largest living single organism in the world.</span></strong><span data-dcnode-id="390" instrument_node=""> The organism covers a vast area (2,385 acres of Malheur National Forest) and it is believed to be between 2,400 and 8,650 years old.</span><sup data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">[14]</span></sup></p><span data-dcnode-id="386" instrument_node="">
</span><figure aria-describedby="caption-attachment-14260" class="wp-caption aligncenter" data-dcnode-id="380" id="attachment_14260" style="width: 800px"><img alt="Armillaria ostoyae or Honey mushroom" class="size-full wp-image-14260 td-animation-stack-type0-2" data-dcnode-id="385" height="600" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/6163778363_49f8ec681d_c-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/6163778363_49f8ec681d_c-min.jpg 800w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/6163778363_49f8ec681d_c-min-300x225.jpg 300w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/6163778363_49f8ec681d_c-min-768x576.jpg 768w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/6163778363_49f8ec681d_c-min-80x60.jpg 80w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/6163778363_49f8ec681d_c-min-265x198.jpg 265w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/6163778363_49f8ec681d_c-min-696x522.jpg 696w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/6163778363_49f8ec681d_c-min-560x420.jpg 560w" width="800"><figcaption class="wp-caption-text" data-dcnode-id="381" id="caption-attachment-14260"><span data-dcnode-id="384" instrument_node="">Armillaria ostoyae or Honey mushroom. Image via </span><a class="owner-name truncate" data-dcnode-id="382" data-track="attributionNameClick" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/demartigny/" title="Go to Charles de Mille-Isles's photostream"><span data-dcnode-id="383" instrument_node="">Charles de Mille-Isles</span></a></figcaption></figure><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="370"><strong data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">23.</span></strong><span data-dcnode-id="376" instrument_node=""> The state of Oregon is </span><strong data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">home to different Native American Ethnic groups</span></strong><span data-dcnode-id="373" instrument_node=""> in the country. The federal government recognizes only nine tribes existing within the present day state.</span><sup data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">[15]</span></sup></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="360"><strong data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">24.</span></strong><span data-dcnode-id="366" instrument_node=""> When you think of Oregon as a state you should always remember that the </span><a data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/state-tree-list/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="365" instrument_node="">Douglas fir is the state tree</span></a><span data-dcnode-id="363" instrument_node=""> in accordance with the 1939 declaration. In fact, this tree species is the main source of softwood lumber production in Oregon.</span><sup data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">[3]</span></sup></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="350"><strong data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">25.</span></strong><span data-dcnode-id="356" instrument_node=""> Oregon stands </span><strong data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">at number six among the most Bigfoot sighting</span></strong><span data-dcnode-id="353" instrument_node=""> places in the US with Washington taking the lead.</span><sup data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">[17]</span></sup></p><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="347"><img alt="Boy and girl shopping for Christmas decoration at market." class="aligncenter size-full wp-image-12384 td-animation-stack-type0-2" data-dcnode-id="348" height="334" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Boy-and-girl-shopping-for-Christmas-decoration-at-market.-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Boy-and-girl-shopping-for-Christmas-decoration-at-market.-min.jpg 500w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Boy-and-girl-shopping-for-Christmas-decoration-at-market.-min-300x200.jpg 300w" width="500"></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="334"><strong data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">26.</span></strong><span data-dcnode-id="343" instrument_node=""> Did you know that </span><strong data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Oregon is the top-most</span></strong><span data-dcnode-id="340" instrument_node=""> </span><a data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/interesting-facts-christmas/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="339" instrument_node="">Christmas </span></a><span data-dcnode-id="337" instrument_node="">tree producing state in the U.S.? The state has dedicated 42,000 acres of its land area for the purpose of raising these trees.</span><sup data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">[26,27]</span></sup></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="327"><strong data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">27.</span></strong><span data-dcnode-id="330" instrument_node=""> John Day Fossil Beds National Monument was voted to be one of the most recognizable fossil sites globally.</span><sup data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">[19]</span></sup></p><span data-dcnode-id="326" instrument_node="">
</span><figure aria-describedby="caption-attachment-14259" class="wp-caption aligncenter" data-dcnode-id="320" id="attachment_14259" style="width: 800px"><img alt="Mount Hood and Mount Hood Meadows from White River Sno-Park" class="size-full wp-image-14259 td-animation-stack-type0-2" data-dcnode-id="325" height="220" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/50046996333_49d439573f_c-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/50046996333_49d439573f_c-min.jpg 800w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/50046996333_49d439573f_c-min-300x83.jpg 300w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/50046996333_49d439573f_c-min-768x211.jpg 768w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/50046996333_49d439573f_c-min-696x191.jpg 696w" width="800"><figcaption class="wp-caption-text" data-dcnode-id="321" id="caption-attachment-14259"><span data-dcnode-id="324" instrument_node="">Mount Hood and Mount Hood Meadows from White River Sno-Park. Interesting facts about Oregon. Image via </span><a class="owner-name truncate" data-dcnode-id="322" data-track="attributionNameClick" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/33671002%40N00/" title="Go to David Prasad's photostream"><span data-dcnode-id="323" instrument_node="">David Prasad</span></a></figcaption></figure><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="307"><strong data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">28.</span></strong><span data-dcnode-id="316" instrument_node=""> </span><strong data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Mount Hood in Oregon is the second most explored mountain in the world</span></strong><span data-dcnode-id="313" instrument_node=""> after Mount Fuji in </span><a data-dcnode-id="311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile.org/japan-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="312" instrument_node="">Japan</span></a><span data-dcnode-id="310" instrument_node="">. With an elevation of 11,249 feet, it is the highest mountain in Oregon. It is a potentially active stratovolcano. The last minor eruptive event occurred in 1907.</span><sup data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">[20,21]</span></sup></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="297"><strong data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">29.</span></strong><span data-dcnode-id="303" instrument_node=""> Oregon is known for</span><strong data-dcnode-id="301"><span data-dcnode-id="302" instrument_node=""> its annual festival of Estacada</span></strong><span data-dcnode-id="300" instrument_node=""> which involves mushroom hunting, mushroom tastings, mushroom identification classes, and mushroom themed artwork.</span><sup data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">[37]</span></sup></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="289"><strong data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">30.</span></strong><span data-dcnode-id="293" instrument_node=""> Oregon has a </span><strong data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">state song</span></strong><span data-dcnode-id="290" instrument_node=""> known as “Oregon, My Oregon” composed by J.A. Buchanan and Henry B. Murtagh.</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="279"><strong data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">31.</span></strong><span data-dcnode-id="285" instrument_node=""> Oregon’s </span><strong data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">vast forests are a leading source for lumber in the U.S.</span></strong><span data-dcnode-id="282" instrument_node=""> In fact, the state harvests more timber than any other state. Almost half of the state’s landmass is covered by forests. Oregon’s soils and climate provide ideal conditions for the growth of trees in the region.</span><sup data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">[22,23]</span></sup></p><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="269"><strong data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">32.</span></strong><span data-dcnode-id="275" instrument_node=""> There is </span><strong data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">only one national park in Oregon</span></strong><span data-dcnode-id="272" instrument_node=""> which comprises of the caldera surrounding Crater Lake.</span><sup data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">[36]</span></sup></p><span data-dcnode-id="268" instrument_node="">
</span><figure aria-describedby="caption-attachment-12385" class="wp-caption aligncenter" data-dcnode-id="264" id="attachment_12385" style="width: 360px"><img alt="Willamette Meteorite." class="size-full wp-image-12385 td-animation-stack-type0-1" data-dcnode-id="267" height="480" loading="lazy" sizes="(max-width: 360px) 100vw, 360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Willamette-Meteorite.-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Willamette-Meteorite.-min.jpg 360w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Willamette-Meteorite.-min-225x300.jpg 225w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/Willamette-Meteorite.-min-315x420.jpg 315w" width="360"><figcaption class="wp-caption-text" data-dcnode-id="265" id="caption-attachment-12385"><span data-dcnode-id="266" instrument_node="">Interesting facts about Oregon. Willamette Meteorite.</span></figcaption></figure><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="252"><strong data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">33.</span></strong><span data-dcnode-id="260" instrument_node=""> Willamette Meteorite, discovered in the U.S. state of Oregon, is </span><strong data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">the largest meteorite found in North America and the sixth-largest in the world.</span></strong><span data-dcnode-id="257" instrument_node=""> The iron-nickel meteorite did not create an impact at the site it was found and thus it was concluded that the meteorite was transported to this place by some glacial activity some thousands of years ago. </span><strong data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">At 15.5 metric tons (34,000 lbs.),&nbsp;Willamette&nbsp;is the largest single “stone.”</span></strong><sup data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">[24,25]</span></sup></p><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="239"><strong data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">34. Linus Pauling</span></strong><span data-dcnode-id="248" instrument_node=""> (1901 – 1994) </span><strong data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">born</span></strong><span data-dcnode-id="245" instrument_node=""> </span><strong data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">in Portland</span></strong><span data-dcnode-id="242" instrument_node="">, Oregon was awarded the Nobel Prize for Chemistry in 1954. He also won the Nobel Peace Prize in 1962.</span><sup data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">[28]</span></sup></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="231"><strong data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">35.</span></strong><span data-dcnode-id="235" instrument_node=""> Salem is the capital of Oregon. Originally, it was called Chemeketa by the Kalapuya Indians –</span><strong data-dcnode-id="233"><span data-dcnode-id="234" instrument_node=""> a term that means “place of rest” or “place of peace”.</span></strong><span data-dcnode-id="232" instrument_node=""> The name was later changed to Salem, which is close to the Hebrew term “shalom” or peace. As the state capital, Salem did, indeed, become a meeting place for residents of Oregon.</span></p><span data-dcnode-id="230" instrument_node="">
</span><figure aria-describedby="caption-attachment-14258" class="wp-caption aligncenter" data-dcnode-id="224" id="attachment_14258" style="width: 800px"><img alt="Farewell Bend, Oregon" class="size-full wp-image-14258 td-animation-stack-type0-1" data-dcnode-id="229" height="531" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/3710675881_f22c059220_c-min.jpg&amp;raw" srcset="https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/3710675881_f22c059220_c-min.jpg 800w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/3710675881_f22c059220_c-min-300x199.jpg 300w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/3710675881_f22c059220_c-min-768x510.jpg 768w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/3710675881_f22c059220_c-min-696x462.jpg 696w,  https://thefactfile-lxh7vfdm.stackpathdns.com/wp-content/uploads/2019/04/3710675881_f22c059220_c-min-633x420.jpg 633w" width="800"><figcaption class="wp-caption-text" data-dcnode-id="225" id="caption-attachment-14258"><span data-dcnode-id="228" instrument_node="">Farewell Bend, Oregon. Image via </span><a class="owner-name truncate" data-dcnode-id="226" data-track="attributionNameClick" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/sbeebe/" title="Go to Sam Beebe's photostream"><span data-dcnode-id="227" instrument_node="">Sam Beebe</span></a></figcaption></figure><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="216"><strong data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">36.</span></strong><span data-dcnode-id="220" instrument_node=""> Bend, Oregon </span><strong data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">was named because of an area that the settlers called “Farewell Bend”.</span></strong><span data-dcnode-id="217" instrument_node=""> This was the spot where pioneers would say their goodbyes before heading westward. There were other bids for the town’s name, such as Pilot Butte but Post Office Department officials in Washington, D.C. chose “Bend” because “Farewell Bend” was simply too long.</span></p><span data-dcnode-id="215" instrument_node="">
