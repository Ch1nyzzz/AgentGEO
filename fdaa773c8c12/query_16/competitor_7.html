</span><div class="06368bc9afc60666b5f00fdd96551407" data-dcnode-id="937" data-index="4" style="float: none; margin:10px 0 10px 0; text-align:center;"><span data-dcnode-id="947" instrument_node="">

</span><span data-dcnode-id="938" instrument_node="">
</span></div><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="933"><a data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/cambridge.jpg"><img alt="cambridge" class="alignnone size-full wp-image-35009" data-dcnode-id="935" height="506" loading="lazy" sizes="(max-width: 756px) 100vw, 756px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/cambridge.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2020/07/cambridge.jpg 756w, https://justfunfacts.com/wp-content/uploads/2020/07/cambridge-300x201.jpg 300w" width="756"></a></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="925"><strong data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Cambridge</span></strong><span data-dcnode-id="929" instrument_node=""> is a university city and the county town of Cambridgeshire, </span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-england/"><span data-dcnode-id="928" instrument_node="">England</span></a><span data-dcnode-id="926" instrument_node="">.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="923" instrument_node="">It is </span><strong data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">located</span></strong><span data-dcnode-id="920" instrument_node=""> on the River Cam approximately 90 kilometers (55 miles) north of </span><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-london/"><span data-dcnode-id="919" instrument_node="">London</span></a><span data-dcnode-id="917" instrument_node="">.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="914" instrument_node="">As of September 2020, the </span><strong data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">population</span></strong><span data-dcnode-id="911" instrument_node=""> of Cambridge is about </span><strong data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">125,000 people</span></strong><span data-dcnode-id="908" instrument_node="">.</span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="905" instrument_node="">The city covers a </span><strong data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">total area</span></strong><span data-dcnode-id="902" instrument_node=""> of </span><strong data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">41 square kilometers</span></strong><span data-dcnode-id="899" instrument_node=""> (16 square miles).</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="896" instrument_node="">The </span><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">average altitude</span></strong><span data-dcnode-id="893" instrument_node=""> is </span><strong data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">6 metres</span></strong><span data-dcnode-id="890" instrument_node=""> (20 feet) </span><strong data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">above sea level</span></strong><span data-dcnode-id="887" instrument_node="">.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="882"><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/cambridge-2.jpg"><img alt="cambridge-2" class="alignnone size-full wp-image-35010" data-dcnode-id="884" height="498" loading="lazy" sizes="(max-width: 762px) 100vw, 762px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/cambridge-2.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2020/07/cambridge-2.jpg 762w, https://justfunfacts.com/wp-content/uploads/2020/07/cambridge-2-300x196.jpg 300w" width="762"></a></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="880" instrument_node="">In the </span><strong data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">bronze age</span></strong><span data-dcnode-id="877" instrument_node=""> and the </span><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">iron age</span></strong><span data-dcnode-id="874" instrument_node=""> there were</span><strong data-dcnode-id="872"><span data-dcnode-id="873" instrument_node=""> settlements</span></strong><span data-dcnode-id="871" instrument_node=""> </span><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">on the site of Cambridge</span></strong><span data-dcnode-id="868" instrument_node="">.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="865" instrument_node="">Then in the 1st century AD the </span><strong data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Romans</span></strong><span data-dcnode-id="862" instrument_node=""> built a fort on Castle Hill. However this fort was abandoned at the beginning of the 5th century AD as the Roman Empire declined.</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="859" instrument_node="">The </span><strong data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">modern city of Cambridge was</span></strong><span data-dcnode-id="856" instrument_node=""> </span><strong data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">founded in 875</span></strong><span data-dcnode-id="853" instrument_node=""> when the Vikings conquered Eastern England. They created a fortified town called a burgh (from which we derive our word borough) on the site.</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="850" instrument_node="">In the </span><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">10th century</span></strong><span data-dcnode-id="847" instrument_node=""> Cambridge was </span><strong data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">captured by the Saxons</span></strong><span data-dcnode-id="844" instrument_node="">.</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="839"><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/cambridge-history.jpg"><img alt="cambridge history" class="alignnone size-full wp-image-35011" data-dcnode-id="841" height="565" loading="lazy" sizes="(max-width: 756px) 100vw, 756px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/cambridge-history.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2020/07/cambridge-history.jpg 756w, https://justfunfacts.com/wp-content/uploads/2020/07/cambridge-history-300x224.jpg 300w" width="756"></a></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="837" instrument_node="">In </span><strong data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">1068</span></strong><span data-dcnode-id="834" instrument_node="">, two years after his conquest of England, </span><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">William of Normandy</span></strong><span data-dcnode-id="831" instrument_node=""> built a castle on Castle Hill. By the time the town probably had a population of about 2,000. By the standards of the time it was a medium sized town.</span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="822"><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">In 1209, Cambridge University was founded</span></strong><span data-dcnode-id="826" instrument_node=""> by students escaping from hostile townspeople in </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-oxford/"><span data-dcnode-id="825" instrument_node="">Oxford</span></a><span data-dcnode-id="823" instrument_node="">.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="811"><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Medieval Cambridge</span></strong><span data-dcnode-id="818" instrument_node=""> had a </span><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">weekly market</span></strong><span data-dcnode-id="815" instrument_node=""> and by the early 13th century it also had a </span><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">fair</span></strong><span data-dcnode-id="812" instrument_node="">.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="807"><a data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/cambridge-history-2.jpg"><img alt="cambridge-history-2" class="alignnone size-full wp-image-35012" data-dcnode-id="809" height="577" loading="lazy" sizes="(max-width: 764px) 100vw, 764px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/cambridge-history-2.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2020/07/cambridge-history-2.jpg 764w, https://justfunfacts.com/wp-content/uploads/2020/07/cambridge-history-2-300x227.jpg 300w" width="764"></a></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="805" instrument_node="">Cambridge </span><strong data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">played a significant role in the early part of the English Civil War</span></strong><span data-dcnode-id="802" instrument_node=""> as it was the headquarters of the Eastern Counties Association, an organisation administering a regional East Anglian army, which became the mainstay of the Parliamentarian military effort before the formation of the New Model Army.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="799" instrument_node="">In the </span><strong data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">19th century</span></strong><span data-dcnode-id="796" instrument_node="">, in common with many other English towns, Cambridge </span><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">expanded rapidly</span></strong><span data-dcnode-id="793" instrument_node="">, due in part to increased life expectancy and improved agricultural production leading to increased trade in town markets.</span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="790" instrument_node="">During the </span><strong data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Second World War</span></strong><span data-dcnode-id="787" instrument_node="">, Cambridge was an important centre for defence of the east coast.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="782"><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/cambridge-history-3.jpg"><img alt="cambridge-history-3" class="alignnone size-full wp-image-35013" data-dcnode-id="784" height="429" loading="lazy" sizes="(max-width: 763px) 100vw, 763px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/cambridge-history-3.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2020/07/cambridge-history-3.jpg 763w, https://justfunfacts.com/wp-content/uploads/2020/07/cambridge-history-3-300x169.jpg 300w" width="763"></a></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="777"><strong data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Cambridge University</span></strong><span data-dcnode-id="778" instrument_node=""> is the second-oldest university in the English-speaking world (after Oxford) and the world’s fourth-oldest surviving university.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">Modern Cambridge has been described as </span><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">“perhaps the only true university town in England.”</span></strong><span data-dcnode-id="772" instrument_node=""> University and college buildings provide nearly all the outstanding architectural features.</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="766"><strong data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">King’s College Chapel</span></strong><span data-dcnode-id="767" instrument_node=""> is the chapel of King’s College in the University of Cambridge. It is considered one of the finest examples of late Perpendicular Gothic English architecture. The Chapel was built in phases by a succession of kings of England from 1446 to 1515, a period which spanned the Wars of the Roses and three subsequent decades. The Chapel’s large stained glass windows were not completed until 1531, and its early Renaissance rood screen was erected in 1532–36. The Chapel is an active house of worship, and home of the King’s College Choir. The Chapel is a significant landmark and a commonly used symbol of the city of Cambridge.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="762"><a data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/kings-college-chapel.jpg"><img alt="king's college chapel" class="alignnone size-full wp-image-35014" data-dcnode-id="764" height="428" loading="lazy" sizes="(max-width: 761px) 100vw, 761px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/kings-college-chapel.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2020/07/kings-college-chapel.jpg 761w, https://justfunfacts.com/wp-content/uploads/2020/07/kings-college-chapel-300x169.jpg 300w" width="761"></a></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="760" instrument_node="">The</span><strong data-dcnode-id="758"><span data-dcnode-id="759" instrument_node=""> Church of Our Lady of the Assumption and the English Martyrs</span></strong><span data-dcnode-id="757" instrument_node="">, also known as the </span><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Church of Our Lady and the English Martyrs (OLEM)</span></strong><span data-dcnode-id="754" instrument_node="">, is an English Roman Catholic parish church located at the junction of Hills Road and Lensfield Road in southeast Cambridge. It is one of the largest Catholic churches in the United Kingdom, is designed in the Gothic revival style. The church was built between 1885 and 1890.</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="749"><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/Church-of-Our-Lady-of-the-Assumption-and-the-English-Martyrs.jpg"><img alt="Church of Our Lady of the Assumption and the English Martyrs" class="size-full wp-image-35015 aligncenter" data-dcnode-id="751" height="733" loading="lazy" sizes="(max-width: 480px) 100vw, 480px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/Church-of-Our-Lady-of-the-Assumption-and-the-English-Martyrs.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2020/07/Church-of-Our-Lady-of-the-Assumption-and-the-English-Martyrs.jpg 480w, https://justfunfacts.com/wp-content/uploads/2020/07/Church-of-Our-Lady-of-the-Assumption-and-the-English-Martyrs-196x300.jpg 196w" width="480"></a></p><div class="06368bc9afc60666b5f00fdd96551407" data-dcnode-id="738" data-index="9" style="float: none; margin:10px 0 10px 0; text-align:center;"><span data-dcnode-id="748" instrument_node="">
</span><span data-dcnode-id="746" instrument_node="">
</span><span data-dcnode-id="744" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-6260915381859367" data-ad-format="auto" data-ad-slot="5239509707" data-dcnode-id="743" style="display:block"></ins><span data-dcnode-id="742" instrument_node="">
</span><span data-dcnode-id="739" instrument_node="">
</span></div><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="733"><strong data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">St Mary the Great</span></strong><span data-dcnode-id="734" instrument_node=""> is a Church of England parish and university church at the north end of King’s Parade in central Cambridge. It is known locally as Great St Mary’s or simply GSM to distinguish it from “Little St Mary’s”. It is one of the Greater Churches.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="729"><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/St-Mary-the-Great.jpg"><img alt="St Mary the Great" class="alignnone size-full wp-image-35016" data-dcnode-id="731" height="592" loading="lazy" sizes="(max-width: 756px) 100vw, 756px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/St-Mary-the-Great.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2020/07/St-Mary-the-Great.jpg 756w, https://justfunfacts.com/wp-content/uploads/2020/07/St-Mary-the-Great-300x235.jpg 300w, https://justfunfacts.com/wp-content/uploads/2020/07/St-Mary-the-Great-379x297.jpg 379w" width="756"></a></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="727" instrument_node="">The </span><strong data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Church of the Holy Sepulchre</span></strong><span data-dcnode-id="724" instrument_node="">, generally known as </span><strong data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">The Round Church</span></strong><span data-dcnode-id="721" instrument_node="">, is an Anglican church in the city of Cambridge. The church was built around 1130, its shape being inspired by the rotunda in the </span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/interesting-facts-about-the-church-of-the-holy-sepulchre/"><span data-dcnode-id="720" instrument_node="">Church of the Holy Sepulchre</span></a><span data-dcnode-id="718" instrument_node="">, Jerusalem. It is one of the four medieval round churches still in use in England.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="713"><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/Church-of-the-Holy-Sepulchre.jpg"><img alt="Church of the Holy Sepulchre" class="alignnone size-full wp-image-35017" data-dcnode-id="715" height="508" loading="lazy" sizes="(max-width: 760px) 100vw, 760px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/Church-of-the-Holy-Sepulchre.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2020/07/Church-of-the-Holy-Sepulchre.jpg 760w, https://justfunfacts.com/wp-content/uploads/2020/07/Church-of-the-Holy-Sepulchre-300x201.jpg 300w" width="760"></a></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">The </span><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Fitzwilliam Museum</span></strong><span data-dcnode-id="708" instrument_node=""> is the art and antiquities museum of the University of Cambridge. It was founded in 1816 under the will of Richard FitzWilliam, 7th Viscount FitzWilliam, and comprises one of the best collections of antiquities and modern art in western Europe. With over half a million objects and artworks in its collections, the displays in the Museum explore world history and art from antiquity to the present. The treasures of the museum include artworks by Monet, Picasso, Rubens, Vincent van Gogh, Rembrandt, Cézanne, Van Dyck, and Canaletto, as well as a winged bas-relief from Nimrud.</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="703"><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/fitzwilliam-museum.jpg"><img alt="fitzwilliam museum" class="alignnone size-full wp-image-35018" data-dcnode-id="705" height="515" loading="lazy" sizes="(max-width: 749px) 100vw, 749px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/fitzwilliam-museum.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2020/07/fitzwilliam-museum.jpg 749w, https://justfunfacts.com/wp-content/uploads/2020/07/fitzwilliam-museum-300x206.jpg 300w" width="749"></a></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="701" instrument_node="">The </span><strong data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Bridge of Sighs</span></strong><span data-dcnode-id="698" instrument_node=""> in Cambridge is a covered bridge at Cambridge University. It was built in 1831 and crosses the River Cam between the college’s Third Court and New Court. The architect was Henry Hutchinson. It is named after the Bridge of Sighs in Venice, although they have little architecturally in common beyond the fact that they are both covered. The bridge is one of Cambridge’s main tourist attractions and Queen Victoria is said to have loved it more than any other spot in the city.</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="693"><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/bridge-of-sighs.jpg"><img alt="bridge of sighs" class="alignnone size-full wp-image-35019" data-dcnode-id="695" height="506" loading="lazy" sizes="(max-width: 758px) 100vw, 758px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/bridge-of-sighs.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2020/07/bridge-of-sighs.jpg 758w, https://justfunfacts.com/wp-content/uploads/2020/07/bridge-of-sighs-300x200.jpg 300w" width="758"></a></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="691" instrument_node="">The </span><strong data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Mathematical Bridge</span></strong><span data-dcnode-id="688" instrument_node=""> is the popular name of a wooden footbridge in Cambridge. Its official name is simply the Wooden Bridge. The bridge was designed by William Etheridge, and built by James Essex in 1749. It has been rebuilt on two occasions, in 1866 and in 1905, but has kept the same overall design. Although it appears to be an arch, it is composed entirely of straight timbers built to an unusually sophisticated engineering design, hence the name.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="683"><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/mathematical-bridge.jpg"><img alt="mathematical bridge" class="alignnone size-full wp-image-35020" data-dcnode-id="685" height="497" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/mathematical-bridge.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2020/07/mathematical-bridge.jpg 750w, https://justfunfacts.com/wp-content/uploads/2020/07/mathematical-bridge-300x199.jpg 300w" width="750"></a></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">The </span><strong data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Cambridge University Botanic Garden</span></strong><span data-dcnode-id="678" instrument_node=""> is a botanical garden located in Cambridge. The garden covers an area of 16 hectares (40 acres). The site is almost entirely on level ground and in addition to its scientific value, the garden is highly rated by gardening enthusiasts. It holds a plant collection of over 8,000 plant species from all over the world to facilitate teaching and research. The garden was created for the University of Cambridge in 1831 by Professor John Stevens Henslow (Charles Darwin’s mentor) and was opened to the public in 1846.</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="673"><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/cambridge-university-botanic-garden.jpg"><img alt="cambridge university botanic garden" class="alignnone size-full wp-image-35021" data-dcnode-id="675" height="484" loading="lazy" sizes="(max-width: 754px) 100vw, 754px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/cambridge-university-botanic-garden.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2020/07/cambridge-university-botanic-garden.jpg 754w, https://justfunfacts.com/wp-content/uploads/2020/07/cambridge-university-botanic-garden-300x193.jpg 300w" width="754"></a></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="668"><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Parker’s Piece</span></strong><span data-dcnode-id="669" instrument_node=""> is a 10-hectare 25-acre flat and roughly square green common located near the centre of Cambridge, regarded by some as the birthplace of the rules of Association Football. The two main walking and cycling paths across it run diagonally, and the single lamp-post at the junction is colloquially known as Reality Checkpoint.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="664"><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/parkers-piece.jpg"><img alt="parkers piece" class="alignnone size-full wp-image-35022" data-dcnode-id="666" height="237" loading="lazy" sizes="(max-width: 766px) 100vw, 766px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//justfunfacts.com/wp-content/uploads/2020/07/parkers-piece.jpg&amp;raw" srcset="https://justfunfacts.com/wp-content/uploads/2020/07/parkers-piece.jpg 766w, https://justfunfacts.com/wp-content/uploads/2020/07/parkers-piece-300x93.jpg 300w" width="766"></a></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="662" instrument_node="">Cambridge is at the heart of the</span><strong data-dcnode-id="660"><span data-dcnode-id="661" instrument_node=""> high-technology Silicon Fen</span></strong><span data-dcnode-id="659" instrument_node=""> with industries such as software and bioscience and many start-up companies born out of the university. Over 40 per cent of the workforce have a higher education qualification, more than twice the national average. The Cambridge Biomedical Campus is one of the largest biomedical research clusters in the world.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="656" instrument_node="">Cambridge is </span><strong data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">completely enclosed by green belt</span></strong><span data-dcnode-id="653" instrument_node=""> as a part of a wider environmental and planning policy first defined in 1965 and formalised in 1992.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="647"><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Pink Floyd</span></strong><span data-dcnode-id="648" instrument_node=""> are the most notable band with roots in Cambridge.</span></p><span data-dcnode-id="646" instrument_node="">
