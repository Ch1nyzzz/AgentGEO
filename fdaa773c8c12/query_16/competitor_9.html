</span><h1 class="title single-title entry-title" data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">10 Interesting Facts About Margaret Thatcher</span></h1><span data-dcnode-id="962" instrument_node="">
</span></header><span data-dcnode-id="959" instrument_node="">
</span><div class="post-single-content box mark-links entry-content" data-dcnode-id="661"><span data-dcnode-id="958" instrument_node="">

</span><amp-ad data-ad-client="ca-pub-6769524711517462" data-ad-slot="9731793570" data-dcnode-id="943" height="250" type="adsense" width="300"><span data-dcnode-id="944" instrument_node="">

</span><p data-dcnode-id="937"><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whatthafact.com/wp-content/uploads/2014/03/Margaret-Thatcher.jpg"><img alt="Margaret Thatcher" class="aligncenter size-full wp-image-1728" data-dcnode-id="939" height="336" sizes="(max-width: 448px) 100vw, 448px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whatthafact.com/wp-content/uploads/2014/03/Margaret-Thatcher.jpg&amp;raw" srcset="https://whatthafact.com/wp-content/uploads/2014/03/Margaret-Thatcher.jpg 448w, https://whatthafact.com/wp-content/uploads/2014/03/Margaret-Thatcher-300x224.jpg 300w" width="448"></a></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">“In Politics, if you want something said, ask a man; if you want something done, ask a woman” – this is what describes Margaret Thatcher the first woman Prime Minister of Britain. She was strong enough to lead the country and bold enough to say those words. It is said that she might have been one of those who have invented soft ice cream by fluffing in some more air in ice cream which would eventually make the ice cream soft and fluffy. Apart from the taste point of view it is said to curb down production cost too. Let’s checkout some little known &amp; very interesting facts about Margaret Thatcher:</span></p><span data-dcnode-id="933" instrument_node="">
</span><span data-dcnode-id="931" instrument_node="">
</span><div data-dcnode-id="917" style="float:none;margin:10px 0 10px 0;text-align:center;"><span data-dcnode-id="930" instrument_node="">
</span><span data-dcnode-id="928" instrument_node="">
</span><span data-dcnode-id="926" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-6769524711517462" data-ad-slot="1847420465" data-dcnode-id="925" style="display:inline-block;width:300px;height:250px"></ins><span data-dcnode-id="924" instrument_node="">
</span><span data-dcnode-id="921" instrument_node="">
</span><amp-ad data-ad-client="ca-pub-6769524711517462" data-ad-slot="9731793570" data-dcnode-id="919" height="250" type="adsense" width="300"><span data-dcnode-id="920" instrument_node="">
</span></amp-ad><span data-dcnode-id="918" instrument_node="">
</span></div><span data-dcnode-id="916" instrument_node="">
</span><h1 data-dcnode-id="914" style="text-align: center;"><span data-dcnode-id="915" instrument_node="">Interesting Facts About Margaret Thatcher</span></h1><span data-dcnode-id="913" instrument_node="">
</span><blockquote data-dcnode-id="907"><span data-dcnode-id="912" instrument_node="">
</span><h2 data-dcnode-id="909"><b data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">#1: Iron Lady</span></b></h2><span data-dcnode-id="908" instrument_node="">
</span></blockquote><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">She was given the title of Iron lady by a Soviet Union Journalist known as Yuri Gavrilov in the army newspaper in 1976. This name was given to her because of her toughness that she projected professionally and personally.</span></p><span data-dcnode-id="903" instrument_node="">
</span><blockquote data-dcnode-id="897"><span data-dcnode-id="902" instrument_node="">
</span><h2 data-dcnode-id="899"><b data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">#2: Birth trivia</span></b></h2><span data-dcnode-id="898" instrument_node="">
</span></blockquote><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="895" instrument_node="">She was born on 13</span><sup data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">th</span></sup><span data-dcnode-id="892" instrument_node=""> October 1925 in Grantham, Lincolnshire, England. Her real name is Margaret Hilda Roberts. Her father was Alfred Roberts and mother was Beatrice Ethel Roberts.</span></p><span data-dcnode-id="890" instrument_node="">
</span><blockquote data-dcnode-id="884"><span data-dcnode-id="889" instrument_node="">
</span><h2 data-dcnode-id="886"><b data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">#3: Political career</span></b></h2><span data-dcnode-id="885" instrument_node="">
</span></blockquote><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">She started her political career as a Member of the Parliament in 1959 for Finchley and from there she went on to become the Conservative Party leader in 1975 and finally in 1979 she was elected the Prime Minister of the country. She became the first and the only Prime Minister of Britain to win the three terms consecutively. She had hold on to the post for as long as 11 years which is a record in itself which the contemporary British PM was also not able to break.</span></p><span data-dcnode-id="880" instrument_node="">
</span><blockquote data-dcnode-id="874"><span data-dcnode-id="879" instrument_node="">
</span><h2 data-dcnode-id="876"><b data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">#4: Unusual diet to lose weight</span></b></h2><span data-dcnode-id="875" instrument_node="">
</span></blockquote><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Another interesting fact about Margaret Thatcher is related to her diet, In her diary an unusual diet was written and that was said to be followed by her so that she can lose 20 lbs all within a fortnight. The diet included grapefruit, black coffee, and two eggs in the breakfast, again two eggs, tomatoes, spinach, coffee and single malt in the lunch and dinner would comprise of lean steak, cucumber, coffee, olives, tomatoes and again single malt.</span></p><span data-dcnode-id="870" instrument_node="">
</span><blockquote data-dcnode-id="864"><span data-dcnode-id="869" instrument_node="">
</span><h2 data-dcnode-id="866"><b data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">#5: Karate experts</span></b></h2><span data-dcnode-id="865" instrument_node="">
</span></blockquote><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">In order to build up the security for her she was offered 20 female experts in karate but she said she will only accept if the male leaders were given 20 male experts in the karate too.</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="854"><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whatthafact.com/wp-content/uploads/2014/03/Margaret-Thatcher-Young.jpg"><img alt="Margaret Thatcher Young" class="aligncenter size-full wp-image-1729" data-dcnode-id="859" height="360" sizes="(max-width: 240px) 100vw, 240px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whatthafact.com/wp-content/uploads/2014/03/Margaret-Thatcher-Young.jpg&amp;raw" srcset="https://whatthafact.com/wp-content/uploads/2014/03/Margaret-Thatcher-Young.jpg 240w, https://whatthafact.com/wp-content/uploads/2014/03/Margaret-Thatcher-Young-200x300.jpg 200w" width="240"></a><span data-dcnode-id="857" instrument_node="">
</span><span data-dcnode-id="855" instrument_node="">
</span></p><div data-dcnode-id="837" style="float:none;margin:6px 0 6px 0;text-align:center;"><span data-dcnode-id="853" instrument_node="">
</span><span data-dcnode-id="850" instrument_node="">
</span><span data-dcnode-id="848" instrument_node="">
</span><span data-dcnode-id="846" instrument_node="">
</span><ins class="adsbygoogle responsive-wtf2" data-ad-client="ca-pub-6769524711517462" data-ad-slot="2614772371" data-dcnode-id="845" style="display: inline-block"></ins><span data-dcnode-id="844" instrument_node="">
</span><span data-dcnode-id="841" instrument_node="">
</span><amp-ad data-ad-client="ca-pub-6769524711517462" data-ad-slot="9731793570" data-dcnode-id="839" height="250" type="adsense" width="300"><span data-dcnode-id="840" instrument_node="">
</span></amp-ad><span data-dcnode-id="838" instrument_node="">
</span></div><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="835"></p><span data-dcnode-id="834" instrument_node="">
</span><blockquote data-dcnode-id="828"><span data-dcnode-id="833" instrument_node="">
</span><h2 data-dcnode-id="830"><b data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">#6: Margaret Thatcher, Milk Snatcher</span></b></h2><span data-dcnode-id="829" instrument_node="">
</span></blockquote><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">She was the one who stopped providing free milk to the children of the school earning her the name of Milk Snatcher during 1970s.</span></p><span data-dcnode-id="824" instrument_node="">
</span><blockquote data-dcnode-id="818"><span data-dcnode-id="823" instrument_node="">
</span><h2 data-dcnode-id="820"><b data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">#7: Good cook</span></b></h2><span data-dcnode-id="819" instrument_node="">
</span></blockquote><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">She did the cooking for her family herself and never hired any chef. She used to cook dinner for her family and sometimes even the cabinet ministers were lucky to get food cooked by her.</span></p><span data-dcnode-id="814" instrument_node="">
</span><blockquote data-dcnode-id="808"><span data-dcnode-id="813" instrument_node="">
</span><h2 data-dcnode-id="810"><b data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">#8: Sleeps for few hours</span></b></h2><span data-dcnode-id="809" instrument_node="">
</span></blockquote><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">There used to be absolutely no problem in decision making or her energy during the day even if she had only 4 hours of sleep during the weekdays.</span></p><span data-dcnode-id="804" instrument_node="">
</span><blockquote data-dcnode-id="798"><span data-dcnode-id="803" instrument_node="">
</span><h2 data-dcnode-id="800"><b data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">#9: Her purse the safest place</span></b></h2><span data-dcnode-id="799" instrument_node="">
</span></blockquote><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Another interesting fact about Margaret Thatcher is that she once proclaimed that the safest place that anybody can find in the Downing Street is her purse.</span></p><span data-dcnode-id="794" instrument_node="">
</span><blockquote data-dcnode-id="788"><span data-dcnode-id="793" instrument_node="">
</span><h2 data-dcnode-id="790"><b data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">#10: Clothes from Mark and Spencer</span></b></h2><span data-dcnode-id="789" instrument_node="">
</span></blockquote><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Mark and Spencer were confident that the Iron Lady would love their dress therefore they used to send her the clothes that she used to like.</span></p><span data-dcnode-id="784" instrument_node="">
</span><span data-dcnode-id="782" instrument_node="">
</span><div data-dcnode-id="768" style="float:none;margin:0px;"><span data-dcnode-id="781" instrument_node="">
