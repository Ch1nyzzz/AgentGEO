</span><h2 data-dcnode-id="1140" id="22-interesting-facts-about-edinburgh"><span data-dcnode-id="1141" id="22_interesting_facts_about_Edinburgh"><span data-dcnode-id="1142" instrument_node="">22 interesting facts about Edinburgh</span></span></h2><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">As one of the most-visited cities in the world, Edinburgh has plenty to shout about when it comes to enchanting buildings, wonderful tourist attractions, beautiful green spaces and intriguing history.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">It’s the last point – the history – that’s perhaps the most interesting, with over 1,000 years of wars, plagues, religious upheavals and political conspiracies forging Edinburgh into the fascinating city that it is today.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">If you visit ‘Auld Reekie’ for any length of time you’ll know just how atmospheric it is with the winding, secretive alleyways of The Royal Mile seemingly at odds with the up-market streets of the New Town.</span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">It’s this mix of historic and modern that makes Edinburgh such a special place, and coupled with knock-out tourist wonders like an extinct volcano, an awe-inspiring castle and a spectacular royal palace it’s no wonder that over 2 million visitors choose to spend their holidays there each year.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">But even without all this history Edinburgh would still be one of the best cities in the world to visit.</span></p><span data-dcnode-id="1124" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="1121"><figure class="aligncenter size-full" data-dcnode-id="1122"><img alt="Edinburgh Clock" class="wp-image-46494" data-dcnode-id="1123" height="798" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/wp-content/uploads/2021/06/Edinburgh-Clock.jpg&amp;raw" srcset="https://outaboutscotland.com/wp-content/uploads/2021/06/Edinburgh-Clock.jpg 1200w, https://outaboutscotland.com/wp-content/uploads/2021/06/Edinburgh-Clock-150x100.jpg 150w, https://outaboutscotland.com/wp-content/uploads/2021/06/Edinburgh-Clock-300x200.jpg 300w, https://outaboutscotland.com/wp-content/uploads/2021/06/Edinburgh-Clock-768x511.jpg 768w, https://outaboutscotland.com/wp-content/uploads/2021/06/Edinburgh-Clock-962x640.jpg 962w" title="22 Interesting Facts About Edinburgh 5" width="1200"></figure></div><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Stroll in any direction and you’ll find endless cosy pubs and first-class restaurants next to an array of superb shops and fantastic tourist attractions. There are also world-leading museums, art galleries and theatres-galore, plus some of the greatest festivals in Europe that are staged throughout the year.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">With so many places to visit and things to do you might find yourself a wee bit spoilt for choice, and possibly a wee bit bewildered.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">With that thought in mind, this article will help you gain a deeper understanding and appreciation of Edinburgh while taking you on a tour of where the city came from, where it’s been and where it’s going.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">The following collection of hand-picked facts might surprise you, but I sincerely hope they also inspire you to come and visit Edinburgh and make up your own mind about this amazing city.</span></p><span data-dcnode-id="1108" instrument_node="">
</span><h2 data-dcnode-id="1105" id="facts-about-edinburgh-s-history"><span data-dcnode-id="1106" id="Facts_about_Edinburghs_history"><span data-dcnode-id="1107" instrument_node="">Facts about Edinburgh’s history</span></span></h2><span data-dcnode-id="1104" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="1101"><figure class="aligncenter size-full" data-dcnode-id="1102"><img alt="Edinburgh Castle winter" class="wp-image-43993" data-dcnode-id="1103" height="699" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/wp-content/uploads/2021/04/edinburgh-3155781_1280-min.jpg&amp;raw" srcset="https://outaboutscotland.com/wp-content/uploads/2021/04/edinburgh-3155781_1280-min.jpg 1200w, https://outaboutscotland.com/wp-content/uploads/2021/04/edinburgh-3155781_1280-min-150x87.jpg 150w, https://outaboutscotland.com/wp-content/uploads/2021/04/edinburgh-3155781_1280-min-300x175.jpg 300w, https://outaboutscotland.com/wp-content/uploads/2021/04/edinburgh-3155781_1280-min-768x447.jpg 768w, https://outaboutscotland.com/wp-content/uploads/2021/04/edinburgh-3155781_1280-min-1099x640.jpg 1099w" title="22 Interesting Facts About Edinburgh 6" width="1200"></figure></div><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1090"><strong data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">1.</span></strong><span data-dcnode-id="1097" instrument_node=""> We know Edinburgh is an old city that’s full of historic streets like </span><a data-dcnode-id="1095" data-id="33617" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/the-royal-mile-edinburgh/"><span data-dcnode-id="1096" instrument_node="">The Royal Mile</span></a><span data-dcnode-id="1094" instrument_node="">, but many people don’t realize exactly how old it is. Archaeologists have discovered human remains in the area of </span><a data-dcnode-id="1092" data-id="1378" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/cramond-island/"><span data-dcnode-id="1093" instrument_node="">Cramond</span></a><span data-dcnode-id="1091" instrument_node=""> that have been dated to 8,500 BC, which are some of the earliest remains ever found in Britain.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">These ancient people were the first to settle in Scotland after the last glaciers receded 10,000 years ago in the Mesolithic period when hunter-gatherers migrated west from Europe. Remains of their dwellings were unearthed during excavations for the new </span><a data-dcnode-id="1086" data-id="2028" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/the-forth-road-bridge/"><span data-dcnode-id="1087" instrument_node="">Forth Road Bridg</span></a><span data-dcnode-id="1085" instrument_node="">e when a large oval pit nearly 7 metres long was discovered complete with remnants of ancient fireplaces, flint tools and arrowheads.</span></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1073"><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">2.</span></strong><span data-dcnode-id="1080" instrument_node=""> Those ancient tribes obviously thought it was worth sticking around Edinburgh because more remains have been found in </span><a data-dcnode-id="1078" data-id="2532" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/holyrood-park-route-map/"><span data-dcnode-id="1079" instrument_node="">Holyrood Park</span></a><span data-dcnode-id="1077" instrument_node=""> and Castle Rock (now home to </span><a data-dcnode-id="1075" data-id="6180" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/edinburgh-castle/"><span data-dcnode-id="1076" instrument_node="">Edinburgh Castle</span></a><span data-dcnode-id="1074" instrument_node="">) that date back to 5,000 BC.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">By the Bronze Age, people were farming the land and living in permanent settlements across Edinburgh but Holyrood Park, in particular, made an ideal location to live thanks to the easily-defended 251-metre Arthurs Seat.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">The fertile land in Holyrood Park was used extensively for farming at that time and even today you can still make out the remnants of ancient agricultural terraces by climbing Dunsapie Crag and looking across the slopes that sit east of Queen’s Drive.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1059"><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">3.</span></strong><span data-dcnode-id="1063" instrument_node=""> Moving forward in time to the Iron Age, we know that Edinburgh and the surrounding area was home to several hill forts with some located in East Lothian (notably on </span><a data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Traprain_Law" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1062" instrument_node="">Traprain Law</span></a><span data-dcnode-id="1060" instrument_node="">) and others in Holyrood Park.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">These hillforts were some of the earliest defensive buildings in Britain and were mostly built to take advantage of high elevations, which is why the rocky peaks of Holyrood Park were so highly prized. In total, four large Iron Age forts were built inside Holyrood Park alongside others at Castle Law in the Pentland Hills and Blackford Hill and Castle Rock in the city centre.</span></p><span data-dcnode-id="1055" instrument_node="">

</span></div><span data-dcnode-id="893" instrument_node="">

</span><h2 data-dcnode-id="886" style="display: block;"><span data-dcnode-id="891" instrument_node="">Walk a mile to the east of Edinburgh Castle and you’ll find Holyrood Park – an outstanding area of natural beauty that offers visitors a haven of tranquillity amongst the hubbub of Scotland’s capital city.
</span><br data-dcnode-id="890"/><span data-dcnode-id="889" instrument_node="">
</span><br data-dcnode-id="888"/><span data-dcnode-id="887" instrument_node="">This is a surprisingly big urban green-space and even though it’s situated in the middle of the city it offers over 650 acres of wilderness to explore.</span></h2><span data-dcnode-id="885" instrument_node="">
</span></div><span data-dcnode-id="883" instrument_node="">

</span><p data-dcnode-id="694"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">4.</span></strong><span data-dcnode-id="695" instrument_node=""> I already mentioned Traprain Law in East Lothian but did you know the tribe that lived there – the Votadini – were one of the most powerful in Scotland during the Iron Age? Although Traprain Law was their capital they eventually moved to the region south of the Firth of Forth which they called Eidyn and built their new capital – Din Eidyn – on top of the volcanic plug of Castle Rock.</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Although there are several theories as to where the modern name ‘Edinburgh’ originates it almost certainly evolved from the Votadini’s original ‘Eidyn’. The most popular theory is that Edinburgh derives from ‘Eidyn’ (referring to the region) and the Old English ‘burgh’ which means fort.</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="686"><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">5.</span></strong><span data-dcnode-id="687" instrument_node=""> After the Romans left Britain in AD 411 the Votadini expanded their territory and created a new kingdom of Gododdin which covered a large part of North England and South Scotland with Edinburgh serving as their capital.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">The first Scottish King Kenneth MacAlpin united the Gododdin and other tribes together in AD 1035 and the fort on Castle Law continued to be used as a seat of power, but it was David I who founded Edinburgh as a royal burgh in the 12th-century. However, the city wasn’t always the capital of Scotland because before 1437 Scone – the original home of the Stone of Destiny – was considered the capital.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="678"><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">6.</span></strong><span data-dcnode-id="679" instrument_node=""> The Stone of Destiny is an oblong block of sandstone that was used for centuries during the coronation of Scots kings, but it was forcibly taken to Westminster Abbey in London during Edward I’s invasion of Scotland in 1296.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">For the next 700 years the stone was the coronation seat for Britain’s kings and queens until 1950 when four Scottish students removed the Stone of Destiny from Westminster Abbey and transported it back to Scotland where it was left in the care of the Church of Scotland at Arbroath Abbey.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Although the stone was later returned to Westminster, in 1996 on St. Andrew’s Day it was formally handed over to Scotland for permanent safekeeping and it now resides alongside the Honours of Scotland (Scotland’s crown jewels) in Edinburgh Castle.</span></p><span data-dcnode-id="671" instrument_node="">
</span><hr class="wp-block-separator is-style-dots" data-dcnode-id="670"><span data-dcnode-id="669" instrument_node="">
</span><h2 data-dcnode-id="666" id="facts-about-edinburgh-s-buildings-and-architecture"><span data-dcnode-id="667" id="Facts_about_Edinburghs_buildings_and_architecture"><span data-dcnode-id="668" instrument_node="">Facts about Edinburgh’s buildings and architecture</span></span></h2><span data-dcnode-id="665" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="662"><figure class="aligncenter size-full" data-dcnode-id="663"><img alt="camera obscura edinburgh-min" class="wp-image-43942" data-dcnode-id="664" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/wp-content/uploads/2021/04/camera-obscura-edinburgh-min.jpg&amp;raw" srcset="https://outaboutscotland.com/wp-content/uploads/2021/04/camera-obscura-edinburgh-min.jpg 1200w, https://outaboutscotland.com/wp-content/uploads/2021/04/camera-obscura-edinburgh-min-150x100.jpg 150w, https://outaboutscotland.com/wp-content/uploads/2021/04/camera-obscura-edinburgh-min-300x200.jpg 300w, https://outaboutscotland.com/wp-content/uploads/2021/04/camera-obscura-edinburgh-min-768x512.jpg 768w, https://outaboutscotland.com/wp-content/uploads/2021/04/camera-obscura-edinburgh-min-960x640.jpg 960w" title="22 Interesting Facts About Edinburgh 7" width="1200"></figure></div><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="657"><strong data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">7.</span></strong><span data-dcnode-id="658" instrument_node=""> Edinburgh Castle is the most-visited tourist attraction in Scotland and each year more than 2 million visitors go there to see the Stone of Destiny, the Honours of Scotland, the National War Museum, the Royal Palace and the National War Memorial.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">It’s certainly an instantly recognizable and iconic place, but it has a gory history that’s unknown to the majority of visitors.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">First off, Edinburgh Castle is one of the most besieged fortresses in the world and over its 1,100-year history it withstood 26 sieges in total including the ‘Lang Siege’ which took place from June 1571 until May 1573 – one of the longest sieges ever in Britain.</span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">The castle was also the location of the infamous ‘Black Dinner’ murders in 1440. At the time, the 16-year-old 6th Earl of Douglas and his younger brother were invited to the castle for a feast by King James II, but during the meal a platter was served to the Earl which contained the severed head of a black bull (a Scottish symbol of death).</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">The two brothers were then accused of plotting against the king and were dragged away and beheaded, which led to the Douglas’s retaliation when they later successfully attacked Edinburgh Castle. If you’ve ever seen the Game of Thrones episode ‘The Red Wedding’ you might recognize these events as they were the inspiration for George RR Martin’s story.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="640"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">8.</span></strong><span data-dcnode-id="641" instrument_node=""> One of the most iconic areas of Edinburgh is the Old Town where most of the historic buildings have survived local conflicts and world wars almost completely unscathed.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">While many city buildings in Britain were devastated by German bombs in WWII, most of Edinburgh remained untouched as the city had virtually no military importance due to its economy centring on education, grain milling and finance, unlike Glasgow which had one of the largest shipbuilding industries in the world at the time.</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">It’s perhaps not surprising that Edinburgh has more surviving listed buildings than any other city in the world, with more than 4,500 in total of which 900 are listed as category A (defined as ‘a building of special historical interest and an outstanding example of a particular period or building type’).</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="620"><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">9</span></strong><span data-dcnode-id="630" instrument_node="">. Many of Edinburgh’s most famous buildings are located in the Old Town including </span><a data-dcnode-id="628" data-id="35060" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/st-giles-cathedral/"><span data-dcnode-id="629" instrument_node="">St. Giles Cathedral</span></a><span data-dcnode-id="627" instrument_node="">, </span><a data-dcnode-id="625" data-id="1675" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/greyfriars-kirk-and-kirkyard/"><span data-dcnode-id="626" instrument_node="">Greyfriars Kirk</span></a><span data-dcnode-id="624" instrument_node=""> and the </span><a data-dcnode-id="622" data-id="6188" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/holyrood-palace/"><span data-dcnode-id="623" instrument_node="">Palace of Holyroodhouse</span></a><span data-dcnode-id="621" instrument_node="">, all of which are notable for their attractive design which makes extensive use of locally sourced sandstone.</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">This readily available and durable building material was also used in the construction of the New Town and it’s the main reason why Edinburgh looks the way it does today, with its pink-purple stone buildings to the south and newer pink-grey buildings to the north.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Thanks to the long-extinct volcanos in the area, sandstone was able to be quarried in vast amounts, but it’s the advent of Scotland’s canals that lead to the use of different types of sandstone in the old and new towns.</span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Before the creation of the Union Canal in 1793, sandstone had to be brought into the city centre via horse and cart so local quarries at Bruntsfield and Craigmillar were used.</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">However, when the canal opened it offered easy transport links from Edinburgh all the way to Falkirk which made it possible for cheaper building material to be brought in from the further-afield quarries in Binny, Humbie and Dalmeny.</span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">It’s fair to say that were it not for the Union Canal, Edinburgh would be a very different looking city today.</span></p><span data-dcnode-id="604" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="601"><figure class="aligncenter size-full" data-dcnode-id="602"><img alt="Union Canal Edinburgh" class="wp-image-46564" data-dcnode-id="603" height="900" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/wp-content/uploads/2021/06/Union-Canal-Edinburgh-min.jpg&amp;raw" srcset="https://outaboutscotland.com/wp-content/uploads/2021/06/Union-Canal-Edinburgh-min.jpg 1200w, https://outaboutscotland.com/wp-content/uploads/2021/06/Union-Canal-Edinburgh-min-150x113.jpg 150w, https://outaboutscotland.com/wp-content/uploads/2021/06/Union-Canal-Edinburgh-min-300x225.jpg 300w, https://outaboutscotland.com/wp-content/uploads/2021/06/Union-Canal-Edinburgh-min-768x576.jpg 768w, https://outaboutscotland.com/wp-content/uploads/2021/06/Union-Canal-Edinburgh-min-853x640.jpg 853w" title="22 Interesting Facts About Edinburgh 8" width="1200"></figure></div><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="596"><strong data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">10.</span></strong><span data-dcnode-id="597" instrument_node=""> There’s another reason why the Old Town looks the way it does, which is actually due to the building of a wall in 1560.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">In 1513 the Scottish army was defeated by the armies of the English King James IV at the Battle of Flodden, and fearing an imminent English invasion of Edinburgh the city councillors made plans to construct a defensive wall around the entire city.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="591" instrument_node="">This wall – now called the </span><a data-dcnode-id="589" data-id="2326" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/the-flodden-wall/"><span data-dcnode-id="590" instrument_node="">Flodden Wall</span></a><span data-dcnode-id="588" instrument_node=""> – was built 24 feet high and 4 feet thick and protected a site of 140 acres, but it had only a few entry points. Although the English invasion never materialized the city councillors soon realized they could make money by levying hefty taxes on the city folk who wanted to enter and exit the wall, so instead of demolishing it when the threat passed they let it stand for another 200 years.</span></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">With no way to build out beyond the confines of the Flodden Wall, Edinburgh’s architects had no choice but to build upwards, which is why the Old Town has so many high-rise buildings.</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">In fact, Edinburgh has more historic multi-floor tenements than any other city on earth and some rise up to 15 storeys, making them the tallest buildings in the world when they were built.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="576"><strong data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">11.</span></strong><span data-dcnode-id="577" instrument_node=""> Although the tenement buildings allowed more people to live in Edinburgh they created problems of their own due to overcrowding and pollution.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">In the 1700s a rapidly growing population of 50,000 people meant the original sewage system was woefully inadequate and raw sewage was either thrown out of tenement building windows into the streets below or deposited in the Nor Loch which was a body of water located where </span><a data-dcnode-id="572" data-id="46653" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/princes-street-gardens/"><span data-dcnode-id="573" instrument_node="">Princes Street Gardens</span></a><span data-dcnode-id="571" instrument_node=""> now lies.</span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Coupled with extensive coal-burning for fuel, it wasn’t long before Edinburgh gained the nickname ‘Auld Reekie’ and the city declined into a cesspit of crime and disease.</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">A plan was devised to revert the city’s prospects which included building a new gentrified district away from the Old Town, and in 1767 a competition was held to design a new residential area on the unused land to the north.</span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">The competition was won by a young architect named James Craig who came up with the idea of a central street linked by parks at either end and smaller streets joining it along its length in a grid pattern.</span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">This grid system was so highly regarded that its design was copied throughout the world and it is the main reason why most cities in the United States today are comprised of rectangular city blocks interspersed by connecting streets and public gardens.</span></p><span data-dcnode-id="557" instrument_node="">
</span><hr class="wp-block-separator is-style-dots" data-dcnode-id="556"><span data-dcnode-id="555" instrument_node="">
</span><h2 data-dcnode-id="552" id="facts-about-edinburgh-s-monuments-and-landmarks"><span data-dcnode-id="553" id="Facts_about_Edinburghs_monuments_and_landmarks"><span data-dcnode-id="554" instrument_node="">Facts about Edinburgh’s monuments and landmarks</span></span></h2><span data-dcnode-id="551" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="548"><figure class="aligncenter size-full" data-dcnode-id="549"><img alt="Calton Hill" class="wp-image-23771" data-dcnode-id="550" height="1125" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/wp-content/uploads/2020/01/Calton-Hill-13-of-19.jpg&amp;raw" srcset="https://outaboutscotland.com/wp-content/uploads/2020/01/Calton-Hill-13-of-19.jpg 1500w, https://outaboutscotland.com/wp-content/uploads/2020/01/Calton-Hill-13-of-19-150x113.jpg 150w, https://outaboutscotland.com/wp-content/uploads/2020/01/Calton-Hill-13-of-19-300x225.jpg 300w, https://outaboutscotland.com/wp-content/uploads/2020/01/Calton-Hill-13-of-19-768x576.jpg 768w, https://outaboutscotland.com/wp-content/uploads/2020/01/Calton-Hill-13-of-19-853x640.jpg 853w" title="22 Interesting Facts About Edinburgh 9" width="1500"></figure></div><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="540"><strong data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">12.</span></strong><span data-dcnode-id="544" instrument_node=""> </span><a data-dcnode-id="542" data-id="6167" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/calton-hill/"><span data-dcnode-id="543" instrument_node="">Calton Hill</span></a><span data-dcnode-id="541" instrument_node=""> is one of the most recognizable tourist attractions in Edinburgh, but long before the famous monuments were built on it the site was used to prepare for war.</span></p><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">In 1456 King James II decreed that Calton Hill would be used to prepare the city for a possible English invasion and in order to train Edinburgh’s farmers and tradespeople the king designated the site as a place for archery and sports competitions (although golf and football were banned).</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Initially, the radical idea worked and much of the local population became proficient with a bow and had high levels of fitness, but as the English threat subsided Calton Hill became a site for leisure activities.</span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">In later years Calton Hill transformed into the location for many of Edinburgh’s most famous monuments including the City Observatory and the National Monument.</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="526"><strong data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">13.</span></strong><span data-dcnode-id="527" instrument_node=""> The National Monument is one of the dominating features of Calton Hill and it’s certainly a surprise to climb to the top and see the enormous stone columns set on their U-shaped plinth.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">The monument was built in 1826 to 1829 and is dedicated to the soldiers and sailors that died in the Napoleonic Wars, but while it’s an impressive structure it’s actually less than half the size it was originally intended to be.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">When ideas were sought to create a national monument the chosen plan was to accurately re-create The Parthenon in Athens, but it didn’t take long before the leading figures of the fundraising team realized they would only be able to raise half the money required to complete the project.</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">After the first 12 columns were installed the money dried up and work ceased forever, which lead to the monument gaining the nickname ‘Edinburgh’s disgrace’ – a name which is still frequently used to this day.</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="512"><strong data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">14.</span></strong><span data-dcnode-id="513" instrument_node=""> Another defining feature of the city’s skyline is the Nelson Monument which sits on the southern edge of Calton Hill. It was built between 1807 and 1816 to commemorate Admiral Lord Nelson who died at the Battle of Trafalgar in 1805.</span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">There are a few interesting features of the monument but possibly the most overlooked is the fact that it was designed to look like an upturned telescope which is a rather fitting tribute to the great man.</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Other than the small museum in the base of the tower, the monument has a second function which is a timepiece that works in conjunction with the One o’Clock gun in Edinburgh Castle. The time ball is a shiny ball suspended on a wooden pole that drops at exactly 1 pm so that ships in the Firth of Forth can synchronize their clocks.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">For many years the gun and the time ball were operated by a single wire which ran between the two sites, but today it is operated by an employee of Ritchie and Son’s clockmakers.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="498"><strong data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">15.</span></strong><span data-dcnode-id="499" instrument_node=""> The 150-foot Melville Monument in St. Andrews Square is one of the most prominent landmarks in the city centre, perhaps second only to the Scott Monument in size.</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Unlike the Scott Monument, the figure on the Melville Monument is far less known but he is, in fact, Henry Dundas, the 1st Viscount Melville.</span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Dundas isn’t exactly a revered figure in Scotland’s history which can be seen in his nickname ‘the great tyrant’, but he was an expert in manipulating the corrupt political system of the late 1700s and early 1800s.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Even though he started life as a lawyer he managed to claw his way up to the position of Home Secretary before being impeached for misuse of public funds.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">During his time in office he fought against the abolition of the slave trade and was accused of very poor decision-making in the Napoleonic War, so it seems strange that such a large monument was created for him.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">The truth is that no money was given to the monument by the Scottish government and the entire structure was paid for by Catholics for his efforts in helping them gain better recognition in Ireland and contributions from military personnel who had benefitted from Dundas’s generosity when he was promoted to Minister for War.</span></p><span data-dcnode-id="482" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="479"><figure class="aligncenter size-full" data-dcnode-id="480"><img alt="Melville Monument Edinburgh" class="wp-image-46565" data-dcnode-id="481" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/wp-content/uploads/2021/06/Melville-Monument-Edinburgh.jpg&amp;raw" srcset="https://outaboutscotland.com/wp-content/uploads/2021/06/Melville-Monument-Edinburgh.jpg 1200w, https://outaboutscotland.com/wp-content/uploads/2021/06/Melville-Monument-Edinburgh-150x100.jpg 150w, https://outaboutscotland.com/wp-content/uploads/2021/06/Melville-Monument-Edinburgh-300x200.jpg 300w, https://outaboutscotland.com/wp-content/uploads/2021/06/Melville-Monument-Edinburgh-768x512.jpg 768w, https://outaboutscotland.com/wp-content/uploads/2021/06/Melville-Monument-Edinburgh-960x640.jpg 960w" title="22 Interesting Facts About Edinburgh 10" width="1200"></figure></div><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="471"><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">16.</span></strong><span data-dcnode-id="475" instrument_node=""> The greatest monument in Edinburgh – and possibly the whole of the United Kingdom – is the stunning Gothic-style masterpiece, </span><a data-dcnode-id="473" data-id="1571" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/the-scott-monument/"><span data-dcnode-id="474" instrument_node="">The Scott Monument</span></a><span data-dcnode-id="472" instrument_node="">.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="469" instrument_node="">This elaborately decorated 200-foot tall spire dominates Princes Street Gardens where it overlooks Waverley train station and the ultra-luxurious </span><a data-dcnode-id="467" data-id="36240" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/balmoral-hotel/"><span data-dcnode-id="468" instrument_node="">Balmoral Hotel</span></a><span data-dcnode-id="466" instrument_node="">.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">The Scott monument is dedicated to Edinburgh writer Sir Walter Scott who is widely regarded as one of the most influential Scottish wordsmiths, whose works sit alongside Robert Burns and Robert Louis Stevenson and which are still taught in schools across the globe to this day.</span></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Many people simply climb the 288 steps to the top viewing platform without taking much time to look at the exterior of the monument, but if they take a little time to examine it they will see lots of stone sculptures installed all over the spires and in the main tower.</span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">In total, there are 68 sculptures on The Scott Monument, each of which depicts a character from one of Scott’s novels. The main statue is that of Scott himself, which is installed on a pedestal in the base.</span></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Scott’s statue took over four years to carve from a single piece of white marble which weighed over 30 tons, and the entire structure from base to pinnacle is officially the largest monument to a writer in the world.</span></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="445"><strong data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">17.</span></strong><span data-dcnode-id="449" instrument_node=""> One of the most prominent landmarks on Princes Street is the </span><a data-dcnode-id="447" data-id="36240" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/balmoral-hotel/"><span data-dcnode-id="448" instrument_node="">Balmoral Hotel</span></a><span data-dcnode-id="446" instrument_node=""> and its 190-foot clock tower. The hotel was built in 1902 by the North British Railway Company as an up-market hotel for train passengers, but today it’s owned by Rocco Forte who renovated it into an ultra-luxurious hotel complete with bars and restaurants during a £23-million refit.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">There are 167 rooms and 20 suites in The Balmoral, but the 6 different dining areas are the main draw for visitors to Edinburgh which include the elegant Palm Court with its enormous glass dome ceiling.</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">One particular oddity of the hotel is that the enormous clock tower is set three minutes fast so that Edinburgh locals who use Waverley station are less likely to miss their trains if they set their watches to ‘Balmoral time’.</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">This tradition has been going on since the hotel was first built and even today the only time the clock is set to the correct time is on December 31st (known as Hogmanay in Scotland) to mark the ringing in of the new year.</span></p><span data-dcnode-id="435" instrument_node="">
</span><p class="has-background" data-dcnode-id="427" style="background-color:#e4e9ea"><span data-dcnode-id="434" instrument_node="">Discover more Scottish facts in these articles: </span><a data-dcnode-id="432" data-id="40633" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/interesting-facts-about-glasgow/"><span data-dcnode-id="433" instrument_node="">30 Interesting Facts About Glasgow</span></a><span data-dcnode-id="431" instrument_node=""> and </span><a data-dcnode-id="429" data-id="30654" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/facts-about-scotland/"><span data-dcnode-id="430" instrument_node="">60 Interesting Facts About Scotland</span></a><span data-dcnode-id="428" instrument_node="">.</span></p><span data-dcnode-id="426" instrument_node="">
</span><hr class="wp-block-separator is-style-dots" data-dcnode-id="425"><span data-dcnode-id="424" instrument_node="">
</span><h2 data-dcnode-id="421" id="facts-about-edinburgh-s-people"><span data-dcnode-id="422" id="Facts_about_Edinburghs_people"><span data-dcnode-id="423" instrument_node="">Facts about Edinburgh’s people</span></span></h2><span data-dcnode-id="420" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="417"><figure class="aligncenter size-full" data-dcnode-id="418"><img alt="Scotsman Kilt" class="wp-image-46582" data-dcnode-id="419" height="800" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/wp-content/uploads/2021/06/Scotsman-Kilt-min.jpg&amp;raw" srcset="https://outaboutscotland.com/wp-content/uploads/2021/06/Scotsman-Kilt-min.jpg 1200w, https://outaboutscotland.com/wp-content/uploads/2021/06/Scotsman-Kilt-min-150x100.jpg 150w, https://outaboutscotland.com/wp-content/uploads/2021/06/Scotsman-Kilt-min-300x200.jpg 300w, https://outaboutscotland.com/wp-content/uploads/2021/06/Scotsman-Kilt-min-768x512.jpg 768w, https://outaboutscotland.com/wp-content/uploads/2021/06/Scotsman-Kilt-min-960x640.jpg 960w" title="22 Interesting Facts About Edinburgh 11" width="1200"></figure></div><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="412"><strong data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">18.</span></strong><span data-dcnode-id="413" instrument_node=""> With over half a million people living in Edinburgh it’s no surprise there’s a long list of celebrities both current and historic that call (or have called) the city home.</span></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">There are perhaps too many to include in one article but this list wouldn’t be complete without mentioning the man who is widely acclaimed as the greatest Scot in living memory – Sir Sean Connery.</span></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Connery is best known for his portrayal of British spy James Bond, and between 1962 and 1983 he played the role in 7 movies, earning him a place as the 3rd greatest hero in cinematic history by the American Film Institute.</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">His early life was rather less glamorous but he was an Edinburgh lad through and through, having been born in the city’s Royal Maternity Hospital and raised in Fountainbridge, although his former home has since been demolished.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Before moving into acting, Connery worked in Edinburgh for several years, first as a milkman then after a stint in the Royal Navy; a lorry driver, a lifeguard at Portobello, a model at the Edinburgh College of Art, a semi-professional bodybuilder and a footballer.</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Quite a career roster for anyone to achieve by the age of 23!</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="392"><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">19.</span></strong><span data-dcnode-id="393" instrument_node=""> Any Potter-heads reading this article will already know that one of the most popular authors of this generation – JK Rowling – lived in Edinburgh for a number of years.</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Although she wasn’t born in Scotland, Rowling found a great deal of inspiration for the Harry Potter series in and around Scotland and especially in Edinburgh where the city’s gothic architecture and medieval streets were the perfect settings to inspire tales of witchcraft and wizardry.</span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">The author is so revered in Edinburgh she even has golden hand imprints inset on flagstones in front of the city chambers and she was given the Edinburgh Award in 2008.</span></p><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="384" instrument_node="">Popular sites for a Potter-themed walk through the city are </span><a data-dcnode-id="382" data-id="1675" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/greyfriars-kirk-and-kirkyard/"><span data-dcnode-id="383" instrument_node="">Greyfriars Kir</span></a><span data-dcnode-id="381" instrument_node="">k where many tombstones lend their names to the stories (including Riddle and McGonagall), The Elephant House café where the first book was written and the Balmoral Hotel where Rowling finished The Deathly Hallows.</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="375"><strong data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">20.</span></strong><span data-dcnode-id="376" instrument_node=""> Mary Queen of Scots is arguably the most famous Scot to have ever lived and the story of her life has been immortalized in countless books and movies.</span></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="373" instrument_node="">Although she wasn’t born in Edinburgh (she was actually born in </span><a data-dcnode-id="371" data-id="23253" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/linlithgow-palace/"><span data-dcnode-id="372" instrument_node="">Linlithgow Palace</span></a><span data-dcnode-id="370" instrument_node=""> in West Lothian) she spent a large part of her life in the Scottish capital both at Holyrood Palace and Edinburgh Castle, though during her final 19 years she was kept prisoner in a number of English castles and grand houses before being beheaded for high treason on 15th October 1586.</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">The fall from grace of one of Scotland’s most prominent figures stems from her marriage to her cousin Lord Darnley who was reported to be a resentful drunk that was jealous of Mary’s affection for her advisor David Rizzio. Rizzio was murdered by Darnley in 1566 and a year later he was found dead himself in mysterious circumstances when his house was blown up.</span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="364" instrument_node="">From that moment Queen Mary was suspected of a plot to kill her husband and her popularity in Scotland plummeted. After losing a battle against Protestant nobles in 1567 she was imprisoned in Lochleven Castle on </span><a data-dcnode-id="362" data-id="35134" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/loch-leven-kinross/"><span data-dcnode-id="363" instrument_node="">Loch Leven</span></a><span data-dcnode-id="361" instrument_node=""> and forced to abdicate, after which she never saw her beloved Edinburgh again.</span></p><span data-dcnode-id="359" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="356"><figure class="aligncenter size-full" data-dcnode-id="357"><img alt="Mary queen of scots" class="wp-image-39531" data-dcnode-id="358" height="736" loading="lazy" sizes="(max-width: 981px) 100vw, 981px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/wp-content/uploads/2018/07/mary-queen-of-scots-3388964_1280-min.jpg&amp;raw" srcset="https://outaboutscotland.com/wp-content/uploads/2018/07/mary-queen-of-scots-3388964_1280-min.jpg 981w, https://outaboutscotland.com/wp-content/uploads/2018/07/mary-queen-of-scots-3388964_1280-min-150x113.jpg 150w, https://outaboutscotland.com/wp-content/uploads/2018/07/mary-queen-of-scots-3388964_1280-min-300x225.jpg 300w, https://outaboutscotland.com/wp-content/uploads/2018/07/mary-queen-of-scots-3388964_1280-min-768x576.jpg 768w, https://outaboutscotland.com/wp-content/uploads/2018/07/mary-queen-of-scots-3388964_1280-min-853x640.jpg 853w" title="22 Interesting Facts About Edinburgh 12" width="981"></figure></div><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="351"><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">21.</span></strong><span data-dcnode-id="352" instrument_node=""> As one of the greatest inventors of the 19th-century, Alexander Graham Bell is best known for the telephone, but many people don’t know that he was also a genuis engineer and scientist who made groundbreaking discoveries in the fields of optical communications and aeronautics.</span></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Of course, the telephone was his biggest invention and after being awarded the first patent in 1876 he set up the Bell Telephone Company and later developed the earliest sound recording devices before moving onto other inventions that included the development of hydrofoil boats.</span></p><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Bell was born in South Charlotte Street in Edinburgh where he lived with his father who taught elocution to the deaf along with his mother who was almost deaf.</span></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">From an early age he developed a fascination with the science of sound but although he made remarkable scientific discoveries throughout his life he didn’t manage to graduate from high school and his reports from the Royal High School in Edinburgh showed that he was actually a rather lacklustre student.</span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Although he moved to Canada in 1870 he returned to his home city many times during his life and was made a Freeman of Edinburgh in 1920.</span></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="334"><strong data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">22.</span></strong><span data-dcnode-id="335" instrument_node=""> Following on from the Scott Monument listed above, it would be impossible to finish this article without mentioning the great man himself, Sir Walter Scott.</span></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Scott was one of the most influential novelists of the 19th century and across a 30-year career he produced some of the most important literary works of the era which include Scottish ballads, poems, biographies and stories.</span></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Though his best-known tale is Ivanhoe (published in 1819) he produced other famous works such as the Waverley novels (Edinburgh’s Waverley train station is named in Scott’s honour), The Lady of The Lake and Rob Roy.</span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">His early life was decidedly average compared to his later years, having been born in an apartment near the Cowgate in Edinburgh’s Old Town. After pulling through a bout of polio in 1773 he was sent to live in the rural Scottish Borders where he learned many Scottish folk tales and legends from his aunt.</span></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">When he returned to Edinburgh he began studying classics at the University of Edinburgh and began an apprenticeship in his father’s office to become a writer.</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="320" instrument_node="">Shortly after publishing his first poems, Scott became the most popular poet of his time and after setting up a business as a printer he became very wealthy, as can be seen in the stunning </span><a data-dcnode-id="318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsabbotsford.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="319" instrument_node="">Abbotsford House</span></a><span data-dcnode-id="317" instrument_node=""> near Melrose which is now open as a tourist attraction.</span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Sadly, Scott lost a great deal of money in the 1825 UK banking crisis and his efforts to reclaim his wealth lead to his early death, but his legacy lives on with his image printed on Scottish banknotes, his works taught in schools and universities across the globe, and of course the grand monument in Princes Street.</span></p><span data-dcnode-id="312" instrument_node="">
</span><p class="has-background" data-dcnode-id="306" style="background-color:#e4e9eb"><strong data-dcnode-id="307"><span data-dcnode-id="311" instrument_node="">Discover more places to visit in the Edinburgh with: </span><a data-dcnode-id="309" data-id="9736" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//outaboutscotland.com/best-things-to-do-in-edinburgh/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="310" instrument_node="">The Best Places to Visit in Edinburgh – Ultimate Visitor Guide</span></a><span data-dcnode-id="308" instrument_node="">.</span></strong></p><span data-dcnode-id="305" instrument_node="">
