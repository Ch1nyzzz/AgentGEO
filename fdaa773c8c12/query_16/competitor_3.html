</span><h2 class="post-title" data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">
			27 Interesting And Fascinating Facts About Iron Man		</span></h2><span data-dcnode-id="1129" instrument_node="">
</span><span data-dcnode-id="1127" instrument_node="">
</span><div class="meta-author-date" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">
		January 21, 2018		</span></div><span data-dcnode-id="1124" instrument_node="">
</span></header><span data-dcnode-id="1122" instrument_node="">
</span><span data-dcnode-id="1120" instrument_node="">
</span><div class="entry-content" data-dcnode-id="854"><span data-dcnode-id="1119" instrument_node="">
</span><div class="syidb6267ae45d6bb8" data-dcnode-id="1111"><span data-dcnode-id="1117" instrument_node="">
</span><div data-dcnode-id="1116" id="M705636ScriptRootC1123231"></div><span data-dcnode-id="1115" instrument_node="">
</span><span data-dcnode-id="1113" instrument_node="">
</span></div><span data-dcnode-id="1108" instrument_node="">
</span><div class="bfbpo6267ae45d6acf" data-dcnode-id="1106"></div><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Iron Man, or Anthony “Tony” Stark, was born to Howard Anthony Star and Maria Collins Carbonell Stark, owners of the prominent U.S. company, Stark Industries. As a boy, Tony was fascinated with building and controlling machines. At 15, he entered the undergraduate electrical engineering program at MIT, and graduated with 2 master’s degrees by age 19. Take a look below for 27 more interesting and fascinating facts about Iron Man.</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1096"><strong data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">1.</span></strong><span data-dcnode-id="1097" instrument_node=""> After graduating, Tony went to work for Stark Industries, but showed more interesting in living a reckless playboy lifestyle than using his engineering skills to build new machines.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1091"><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">2.</span></strong><span data-dcnode-id="1092" instrument_node=""> When he was 21, he inherited Stark Enterprises when his parents were killed in a car accident that was secretly orchestrated by the rival corporation Republic Oil. However, still lacking in business acumen, he promoted secretary Virginia “Pepper” Potts to be his executive assistant and left the majority of his workload on her so that he could avoid what he saw as a burden.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1083"><strong data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">3.</span></strong><span data-dcnode-id="1087" instrument_node=""> JARVIS was changed to an artificial intelligence to avoid comparisons to </span><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tonsoffacts.com/30-fascinating-bizarre-facts-batman/" rel="noopener" target="_blank"><span data-dcnode-id="1086" instrument_node="">Batman</span></a><span data-dcnode-id="1084" instrument_node="">‘s butler Alfred Pennyworth.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1078"><strong data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">4.</span></strong><span data-dcnode-id="1079" instrument_node=""> The sound used during a target lock on in Iron Man’s Head Up Display is the sound of the laser cannon firing in the original Space Invaders video game.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1073"><strong data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">5.</span></strong><span data-dcnode-id="1074" instrument_node=""> Due to his membership in the Illuminati, Iron Man was given the space Infinity Gem to safeguard. It allows the users to exist in any location or all locations, move any object anywhere throughout the Universe and wrap or rearrange Space.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><img alt="" class="aligncenter wp-image-1300" data-dcnode-id="1071" height="316" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tonsoffacts.com/wp-content/uploads/2018/01/Iron-Man-Reboot-Recast-Robert-Downey-Jr-300x158.jpg&amp;raw" srcset="http://tonsoffacts.com/wp-content/uploads/2018/01/Iron-Man-Reboot-Recast-Robert-Downey-Jr-300x158.jpg 300w, http://tonsoffacts.com/wp-content/uploads/2018/01/Iron-Man-Reboot-Recast-Robert-Downey-Jr-768x404.jpg 768w, http://tonsoffacts.com/wp-content/uploads/2018/01/Iron-Man-Reboot-Recast-Robert-Downey-Jr-1024x539.jpg 1024w, http://tonsoffacts.com/wp-content/uploads/2018/01/Iron-Man-Reboot-Recast-Robert-Downey-Jr-1180x621.jpg 1180w, http://tonsoffacts.com/wp-content/uploads/2018/01/Iron-Man-Reboot-Recast-Robert-Downey-Jr.jpg 1200w" width="600"></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1065"><strong data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">6.</span></strong><span data-dcnode-id="1066" instrument_node=""> Iron Man was created by Stan Lee as a challenge to create a hero that no one should like and force people like him.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1060"><strong data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">7.</span></strong><span data-dcnode-id="1061" instrument_node=""> In the Iron Man comic series, Pepper Potts actually had her heart damaged in a battle, so Tony Stark embedded a strong magnet reactor in her chest to save her life. He eventually designs her a suit of armor based around this magnet so she can help him fight when danger presents itself.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1052"><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">8.</span></strong><span data-dcnode-id="1056" instrument_node=""> On Earth 3490 of the Marvel multiverse, Tony Stark was born a female named Natasha Stark, and becomes the Iron Woman when she grows up. Stark ultimately marries </span><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tonsoffacts.com/30-fascinating-fun-facts-captain-america/" rel="noopener" target="_blank"><span data-dcnode-id="1055" instrument_node="">Steve Rogers</span></a><span data-dcnode-id="1053" instrument_node="">, which prevents the Superhero Registration Program and Civil War.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1047"><strong data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">9.</span></strong><span data-dcnode-id="1048" instrument_node=""> Iron Man once beat Magneto with the Bleeding Edge suit. Stark’s powers were vamped by the magnetic fields of several planets.</span></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1042"><strong data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">10.</span></strong><span data-dcnode-id="1043" instrument_node=""> Tony Stark’s latest armor, based off his previous liquid smart metal technology as well as alien symbiote physiology, is controlled completely psionically.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1037"><strong data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">11.</span></strong><span data-dcnode-id="1038" instrument_node=""> About 450 separate pieces make up the Iron Man suit.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1032"><strong data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">12.</span></strong><span data-dcnode-id="1033" instrument_node=""> Tony Stark was based on Howard Hughes, who was an inventor, an adventurer, a multimillionaire, a ladies man and a nutcase.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1027"><strong data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">13.</span></strong><span data-dcnode-id="1028" instrument_node=""> A real life version of the Iron Man suit would require more energy than a nuclear power plant can produce.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><img alt="" class="aligncenter wp-image-1301" data-dcnode-id="1025" height="338" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tonsoffacts.com/wp-content/uploads/2018/01/ironmanjpg-b3431f_1280w-300x169.jpg&amp;raw" srcset="http://tonsoffacts.com/wp-content/uploads/2018/01/ironmanjpg-b3431f_1280w-300x169.jpg 300w, http://tonsoffacts.com/wp-content/uploads/2018/01/ironmanjpg-b3431f_1280w-768x432.jpg 768w, http://tonsoffacts.com/wp-content/uploads/2018/01/ironmanjpg-b3431f_1280w-1024x576.jpg 1024w, http://tonsoffacts.com/wp-content/uploads/2018/01/ironmanjpg-b3431f_1280w-1180x664.jpg 1180w, http://tonsoffacts.com/wp-content/uploads/2018/01/ironmanjpg-b3431f_1280w.jpg 1280w" width="600"></p><div class="dufsy6267ae45d6b6e" data-dcnode-id="1016"><span data-dcnode-id="1022" instrument_node="">
</span><div data-dcnode-id="1021" id="M705636ScriptRootC1123232"></div><span data-dcnode-id="1020" instrument_node="">
</span><span data-dcnode-id="1018" instrument_node="">
</span></div><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1009"><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">14.</span></strong><span data-dcnode-id="1010" instrument_node=""> According to Stan Lee, the Iron Man comic series developed Marvel’s first and largest following among female readers, stating, “of all the comic books we published at Marvel, we got more fan mail for Iron Man from women, from females, than any other title. Whenever we did, the letter was usually addressed to Iron Man.”</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1004"><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">15.</span></strong><span data-dcnode-id="1005" instrument_node=""> Tony Stark’s suit has recorded every single move and every single punch that Captain America has ever thrown. Therefore, it knows Steve’s next move before even he does.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="999"><strong data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">16.</span></strong><span data-dcnode-id="1000" instrument_node=""> In the comic even “Fear Itself,” Tony Stark built a suit of Iron Man armor out of the same magical Asgardian metal used to create Thor’s hammer. It’s known as the Iron Destroyer Armor.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="994"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">17.</span></strong><span data-dcnode-id="995" instrument_node=""> Jon Favreau shot the Iron Man movie in California because he felt that too many superhero movies were set on the East Coast, especially New York City.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="989"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">18.</span></strong><span data-dcnode-id="990" instrument_node=""> The Iron Man armor, especially the models prior to the Model 3, were in a constant state of experimentation and improvement. The Model 3 distinguished itself when Anthony Stark implemented a basic helmet design. The Model 2 helmet first had a horned look. The helmet mask was later riveted on flat. The Model 3 appears to be of a smooth bore motif which led to Iron Man being affectionately referred to by some of his fellow Avengers as “Shell-Head.”</span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="984"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">19.</span></strong><span data-dcnode-id="985" instrument_node=""> Iron Man armor Model 5’s life support and other systems are designed primarily for space. The armor is heavy and awkward in normal gravity conditions and the control system is highly sensitive.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="979"><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">20.</span></strong><span data-dcnode-id="980" instrument_node=""> In the Marvel Cinematic Universe, Iron Man has an estimated kill count of 75,157.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="974"><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">21.</span></strong><span data-dcnode-id="975" instrument_node=""> Iron Man once attempted to hide the information of superheroes so he wiped his mind clean, causing him to lose his intellect.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="969"><strong data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">22.</span></strong><span data-dcnode-id="970" instrument_node=""> According to Forbes Magazine, Tony Stark is $2.4 billion richer than Bruce Wayne.</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><img alt="" class="aligncenter wp-image-1302" data-dcnode-id="967" height="338" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tonsoffacts.com/wp-content/uploads/2018/01/im_post_master-960x540-300x169.jpg&amp;raw" srcset="http://tonsoffacts.com/wp-content/uploads/2018/01/im_post_master-960x540-300x169.jpg 300w, http://tonsoffacts.com/wp-content/uploads/2018/01/im_post_master-960x540-768x432.jpg 768w, http://tonsoffacts.com/wp-content/uploads/2018/01/im_post_master-960x540.jpg 960w" width="600"></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="961"><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">23.</span></strong><span data-dcnode-id="962" instrument_node=""> The reason why Tony’s arc reactor changes from an inverted pyramid back to a circular shape in The Avengers is because Director Joss Whedon personally disliked it, so most likely it was only kept in future films to honor continuity.</span></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="953"><strong data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">24.</span></strong><span data-dcnode-id="957" instrument_node=""> When fully powered, Tony Stark can lift up to 100 tons in the Iron Man suit. He would later invent the Hulkbuster armor that could lift 175 tons, so he can fight The </span><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tonsoffacts.com/32-fun-interesting-facts-hulk/" rel="noopener" target="_blank"><span data-dcnode-id="956" instrument_node="">Hulk</span></a><span data-dcnode-id="954" instrument_node=""> in certain situations.</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="948"><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">25.</span></strong><span data-dcnode-id="949" instrument_node=""> There have been over 45 different Iron Man suits created.</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="943"><strong data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">26.</span></strong><span data-dcnode-id="944" instrument_node=""> In the latest Marvel NOW! revamp of the Iron Man comics, Tony Stark’s newest armor is enhanced with an artificial intelligence named P.E.P.P.E.R.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="938"><strong data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">27.</span></strong><span data-dcnode-id="939" instrument_node=""> Iron Man’s armor used to include roller skates.</span></p><span data-dcnode-id="937" instrument_node="">
