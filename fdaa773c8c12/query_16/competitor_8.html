</span><span data-dcnode-id="1348" instrument_node="">
</span></div></div></center><div class="td-number-and-title" data-dcnode-id="1339"><h2 data-dcnode-id="1340"><span class="td-sml-current-item-nr" data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">1</span></span><span class="td-sml-current-item-title" data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Charlie Brown Christmas movie</span></span></h2></div><img data-dcnode-id="1338" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/factrepublic.com/wp-content/uploads/2017/06/1.Charlie-brown-christmas.jpg&amp;raw"><span class="td-sml-description" data-dcnode-id="1330"><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">ABC has been cutting scenes from "A Charlie Brown Christmas", a movie about the excessive commercialization of Christmas, to make room for more commercials.
</span></p><div class="metabar" data-dcnode-id="1331"><span data-dcnode-id="1335" instrument_node="">
</span><a class="button2 source" data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4211" rel="nofollow" target="_blank"><span data-dcnode-id="1334" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="1332" instrument_node="">
</span></div></span></div><hr data-dcnode-id="1328"><div class="td-item" data-dcnode-id="1317"><span class="td-sml-description" data-dcnode-id="1318"><p data-dcnode-id="1324"><b data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">2. </span></b><span data-dcnode-id="1325" instrument_node="">In 2014, South Korean Christians put up a Christmas tree visible from the North Korean Border. North Korea responded by calling it a "tool for psychological warfare" and threatened to bomb it.
</span></p><div class="metabar" data-dcnode-id="1319"><span data-dcnode-id="1323" instrument_node="">
</span><a class="button2 source" data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4212" rel="nofollow" target="_blank"><span data-dcnode-id="1322" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="1320" instrument_node="">
</span></div></span></div><hr data-dcnode-id="1316"><div class="td-item" data-dcnode-id="1305"><span class="td-sml-description" data-dcnode-id="1306"><p data-dcnode-id="1312"><b data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">3. </span></b><span data-dcnode-id="1313" instrument_node="">Chris Columbus was originally set to direct National Lampoon's Christmas Vacation but dropped out after difficult meetings with star Chevy Chase. Instead, Columbus made Home Alone; the highest grossing Christmas film of all time.
</span></p><div class="metabar" data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node="">

</span><hr data-dcnode-id="753"><div class="td-number-and-title" data-dcnode-id="747"><h2 data-dcnode-id="748"><span class="td-sml-current-item-nr" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">6</span></span><span class="td-sml-current-item-title" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Snowzilla</span></span></h2></div><img data-dcnode-id="746" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/factrepublic.com/wp-content/uploads/2017/06/6.Snowzilla.jpg&amp;raw"><span class="td-sml-description" data-dcnode-id="738"><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">A giant snowman named Snowzilla is created every year in Anchorage, Alaska. In 2008, the city attempted to stop the creation of Snowzilla, and on Christmas morning there were sign-carrying snowmen "protesting" that attempt in front of city hall.
</span></p><div class="metabar" data-dcnode-id="739"><span data-dcnode-id="743" instrument_node="">
</span><a class="button2 source" data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4216" rel="nofollow" target="_blank"><span data-dcnode-id="742" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="740" instrument_node="">
</span></div></span></div><hr data-dcnode-id="736"><div class="td-item" data-dcnode-id="725"><span class="td-sml-description" data-dcnode-id="726"><p data-dcnode-id="732"><b data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">7. </span></b><span data-dcnode-id="733" instrument_node="">The actress who played Aunt Bethany in National Lampoon's Christmas Vacation was the same lady who provided the voice for Betty Boop and Olive Oyl
</span></p><div class="metabar" data-dcnode-id="727"><span data-dcnode-id="731" instrument_node="">
</span><a class="button2 source" data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4217" rel="nofollow" target="_blank"><span data-dcnode-id="730" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="728" instrument_node="">
</span></div></span></div><hr data-dcnode-id="724"><div class="td-item" data-dcnode-id="713"><span class="td-sml-description" data-dcnode-id="714"><p data-dcnode-id="720"><b data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">8. </span></b><span data-dcnode-id="721" instrument_node="">The English lyrics for the classic Christmas carol "Deck the Halls" were originally "fill the mead cup, drain the barrel" and not "don we now our gay apparel".
</span></p><div class="metabar" data-dcnode-id="715"><span data-dcnode-id="719" instrument_node="">
</span><a class="button2 source" data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4218" rel="nofollow" target="_blank"><span data-dcnode-id="718" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="716" instrument_node="">
</span></div></span></div><hr data-dcnode-id="712"><div class="td-item" data-dcnode-id="701"><span class="td-sml-description" data-dcnode-id="702"><p data-dcnode-id="708"><b data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">9. </span></b><span data-dcnode-id="709" instrument_node="">Tim Burton stopped Disney from making a Nightmare Before Christmas sequel because it wouldn't have been made using stop motion animation.
</span></p><div class="metabar" data-dcnode-id="703"><span data-dcnode-id="707" instrument_node="">
</span><a class="button2 source" data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4219" rel="nofollow" target="_blank"><span data-dcnode-id="706" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="704" instrument_node="">
</span></div></span></div><hr data-dcnode-id="700"><div class="td-item" data-dcnode-id="689"><span class="td-sml-description" data-dcnode-id="690"><p data-dcnode-id="696"><b data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">10. </span></b><span data-dcnode-id="697" instrument_node="">In Japan, eating Christmas dinner at KFC is so popular that two-hour lines form at some locations as people wait to get in.
</span></p><div class="metabar" data-dcnode-id="691"><span data-dcnode-id="695" instrument_node="">
</span><a class="button2 source" data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4220" rel="nofollow" target="_blank"><span data-dcnode-id="694" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="692" instrument_node="">
</span></div></span></div><hr data-dcnode-id="688"><div class="td-item" data-dcnode-id="662"><center data-dcnode-id="679"><div class="aicp" data-dcnode-id="680" style="margin: 50px 0px;"><div data-dcnode-id="686" style="font-size: 13px; color: #bbb; margin-bottom: 13px;"><span data-dcnode-id="687" instrument_node="">- Sponsored Links -</span></div><div class="_ap_apex_ad" data-dcnode-id="681" id="14a0662f-64d0-499f-9144-6d6de2c03dc0"><span data-dcnode-id="685" instrument_node="">
</span><span data-dcnode-id="682" instrument_node="">
</span></div></div></center><hr data-dcnode-id="678"><div class="td-number-and-title" data-dcnode-id="672"><h2 data-dcnode-id="673"><span class="td-sml-current-item-nr" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">11</span></span><span class="td-sml-current-item-title" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Christmas tree</span></span></h2></div><img data-dcnode-id="671" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/factrepublic.com/wp-content/uploads/2017/06/11.Trafalgar.jpg&amp;raw"><span class="td-sml-description" data-dcnode-id="663"><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">The Christmas tree in London's Trafalgar Square had been given by the country of Norway every year since 1947. It is a token of appreciation for the friendship of the British people during World War 2.
</span></p><div class="metabar" data-dcnode-id="664"><span data-dcnode-id="668" instrument_node="">
</span><a class="button2 source" data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4221" rel="nofollow" target="_blank"><span data-dcnode-id="667" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="665" instrument_node="">
</span></div></span></div><hr data-dcnode-id="661"><div class="td-item" data-dcnode-id="650"><span class="td-sml-description" data-dcnode-id="651"><p data-dcnode-id="657"><b data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">12. </span></b><span data-dcnode-id="658" instrument_node="">A popular&nbsp;Christmas&nbsp;decoration in the Nordics, the Yule Goat, is a tradition going back to pre-Christian days. A popular prank was to place a goat made of straw in your neighbor's house without them noticing, and the victim would then repeat the act
</span></p><div class="metabar" data-dcnode-id="652"><span data-dcnode-id="656" instrument_node="">
</span><a class="button2 source" data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4222" rel="nofollow" target="_blank"><span data-dcnode-id="655" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="653" instrument_node="">
</span></div></span></div><hr data-dcnode-id="649"><div class="td-item" data-dcnode-id="638"><span class="td-sml-description" data-dcnode-id="639"><p data-dcnode-id="645"><b data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">13. </span></b><span data-dcnode-id="646" instrument_node="">In Japan, unmarried women in their late 20's were called "Christmas Cakes" because "after the 25th they're not good"
</span></p><div class="metabar" data-dcnode-id="640"><span data-dcnode-id="644" instrument_node="">
</span><a class="button2 source" data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4223" rel="nofollow" target="_blank"><span data-dcnode-id="643" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="641" instrument_node="">
</span></div></span></div><hr data-dcnode-id="637"><div class="td-item" data-dcnode-id="626"><span class="td-sml-description" data-dcnode-id="627"><p data-dcnode-id="633"><b data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">14. </span></b><span data-dcnode-id="634" instrument_node="">Toys R Us started the initiative of a 'quiet hour' in all its stores in the UK during Christmas. The initiative involved temporarily dimming the lights and switching off music and announcements, in order to help the autistic children shop for Christmas.
</span></p><div class="metabar" data-dcnode-id="628"><span data-dcnode-id="632" instrument_node="">
</span><a class="button2 source" data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4224" rel="nofollow" target="_blank"><span data-dcnode-id="631" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="629" instrument_node="">
</span></div></span></div><hr data-dcnode-id="625"><div class="td-item" data-dcnode-id="614"><span class="td-sml-description" data-dcnode-id="615"><p data-dcnode-id="621"><b data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">15. </span></b><span data-dcnode-id="622" instrument_node="">Artificial Christmas trees were invented by a British toilet brush company in the 1930s. The company used the same machinery and bristles to make the trees as they used to make their toilet brushes
</span></p><div class="metabar" data-dcnode-id="616"><span data-dcnode-id="620" instrument_node="">
</span><a class="button2 source" data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4225" rel="nofollow" target="_blank"><span data-dcnode-id="619" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="617" instrument_node="">
</span></div></span></div><hr data-dcnode-id="613"><div class="td-item" data-dcnode-id="587"><center data-dcnode-id="604"><div class="aicp" data-dcnode-id="605" style="margin: 50px 0px;"><div data-dcnode-id="611" style="font-size: 13px; color: #bbb; margin-bottom: 13px;"><span data-dcnode-id="612" instrument_node="">- Sponsored Links -</span></div><div class="_ap_apex_ad" data-dcnode-id="606" id="a6b7871c-fb4f-4440-84ee-50234d830a30"><span data-dcnode-id="610" instrument_node="">
</span><span data-dcnode-id="607" instrument_node="">
</span></div></div></center><hr data-dcnode-id="603"><div class="td-number-and-title" data-dcnode-id="597"><h2 data-dcnode-id="598"><span class="td-sml-current-item-nr" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">16</span></span><span class="td-sml-current-item-title" data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Christer Fuglesang</span></span></h2></div><img data-dcnode-id="596" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/factrepublic.com/wp-content/uploads/2017/06/16.Christer.jpg&amp;raw"><span class="td-sml-description" data-dcnode-id="588"><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Swedish astronaut Christer Fuglesang was not allowed to bring reindeer jerky with him on board a shuttle mission as it was "weird" for the Americans so soon before Christmas. He had to go with moose instead.
</span></p><div class="metabar" data-dcnode-id="589"><span data-dcnode-id="593" instrument_node="">
</span><a class="button2 source" data-dcnode-id="591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4226" rel="nofollow" target="_blank"><span data-dcnode-id="592" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="590" instrument_node="">
</span></div></span></div><hr data-dcnode-id="586"><div class="td-item" data-dcnode-id="575"><span class="td-sml-description" data-dcnode-id="576"><p data-dcnode-id="582"><b data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">17. </span></b><span data-dcnode-id="583" instrument_node="">There is a pill called "Father Christmas" that makes your farts smell like chocolate
</span></p><div class="metabar" data-dcnode-id="577"><span data-dcnode-id="581" instrument_node="">
</span><a class="button2 source" data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4227" rel="nofollow" target="_blank"><span data-dcnode-id="580" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="578" instrument_node="">
</span></div></span></div><hr data-dcnode-id="574"><div class="td-item" data-dcnode-id="563"><span class="td-sml-description" data-dcnode-id="564"><p data-dcnode-id="570"><b data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">18. </span></b><span data-dcnode-id="571" instrument_node="">During 1979 Christmas, Francisco Macías Nguema, the first president of Equatorial Guinea had 150 of his opponents killed. Soldiers dressed up in Santa Clause outfits and executed them in a football stadium while amplifiers played "Those Were the Days."</span></p><div class="metabar" data-dcnode-id="565"><span data-dcnode-id="569" instrument_node="">
</span><a class="button2 source" data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4228" rel="nofollow" target="_blank"><span data-dcnode-id="568" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="566" instrument_node="">
</span></div></span></div><hr data-dcnode-id="562"><div class="td-item" data-dcnode-id="551"><span class="td-sml-description" data-dcnode-id="552"><p data-dcnode-id="558"><b data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">19. </span></b><span data-dcnode-id="559" instrument_node="">The actor who played the scientist (Peter Billingsley) from "In a cave with a box of scraps" scene in Iron Man was Ralphie from A Christmas Story. He was also one of the executive producers of the film.
</span></p><div class="metabar" data-dcnode-id="553"><span data-dcnode-id="557" instrument_node="">
</span><a class="button2 source" data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4229" rel="nofollow" target="_blank"><span data-dcnode-id="556" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="554" instrument_node="">
</span></div></span></div><hr data-dcnode-id="550"><div class="td-item" data-dcnode-id="539"><span class="td-sml-description" data-dcnode-id="540"><p data-dcnode-id="546"><b data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">20. </span></b><span data-dcnode-id="547" instrument_node="">Wham! donated all the royalties from "Last Christmas" released December 1984 to Ethiopia famine aid.
</span></p><div class="metabar" data-dcnode-id="541"><span data-dcnode-id="545" instrument_node="">
</span><a class="button2 source" data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4230" rel="nofollow" target="_blank"><span data-dcnode-id="544" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="542" instrument_node="">
</span></div></span></div><hr data-dcnode-id="538"><div class="td-item" data-dcnode-id="522"><div class="td-number-and-title" data-dcnode-id="532"><h2 data-dcnode-id="533"><span class="td-sml-current-item-nr" data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">21</span></span><span class="td-sml-current-item-title" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">It's a Wonderful Life</span></span></h2></div><img data-dcnode-id="531" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/factrepublic.com/wp-content/uploads/2017/06/21.Its-a-wonderful-lie.jpg&amp;raw"><span class="td-sml-description" data-dcnode-id="523"><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">The film 'It's a Wonderful Life' was considered a box office failure upon release in 1946. A clerical error placed the film in the public domain in 1974 causing many local TV networks to play the film for free, popularizing it as a Christmas classic.
</span></p><div class="metabar" data-dcnode-id="524"><span data-dcnode-id="528" instrument_node="">
</span><a class="button2 source" data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4231" rel="nofollow" target="_blank"><span data-dcnode-id="527" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="525" instrument_node="">
</span></div></span></div><hr data-dcnode-id="521"><div class="td-item" data-dcnode-id="510"><span class="td-sml-description" data-dcnode-id="511"><p data-dcnode-id="517"><b data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">22. </span></b><span data-dcnode-id="518" instrument_node="">Andrew Carnegie and John D. Rockefeller, two wealthy extremely entrepreneurs, sent each other gag Christmas gifts. Rockefeller sent Carnegie a cardboard vest to make fun of his poor childhood. In return, Carnegie sent a fine whiskey to Rockefeller, a devout Baptist who had given up drinking.
</span></p><div class="metabar" data-dcnode-id="512"><span data-dcnode-id="516" instrument_node="">
</span><a class="button2 source" data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4232" rel="nofollow" target="_blank"><span data-dcnode-id="515" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="513" instrument_node="">
</span></div></span></div><hr data-dcnode-id="509"><div class="td-item" data-dcnode-id="498"><span class="td-sml-description" data-dcnode-id="499"><p data-dcnode-id="505"><b data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">23. </span></b><span data-dcnode-id="506" instrument_node="">Al Jean (a writer and producer of The Simpsons) said if the series ever ends, he would like the final episode to end with the arrival of the Christmas pageant from the first scene of the pilot episode "Simpsons Roasting on an Open Fire," making the whole series a continuous loop.
</span></p><div class="metabar" data-dcnode-id="500"><span data-dcnode-id="504" instrument_node="">
</span><a class="button2 source" data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4233" rel="nofollow" target="_blank"><span data-dcnode-id="503" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="501" instrument_node="">
</span></div></span></div><hr data-dcnode-id="497"><div class="td-item" data-dcnode-id="486"><span class="td-sml-description" data-dcnode-id="487"><p data-dcnode-id="493"><b data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">24. </span></b><span data-dcnode-id="494" instrument_node="">Every Christmas since 1952 the US Air Force has airdropped gifts over the islands of Micronesia, making it the oldest ongoing Department of Defense mission and the longest running humanitarian airlift in the world
</span></p><div class="metabar" data-dcnode-id="488"><span data-dcnode-id="492" instrument_node="">
</span><a class="button2 source" data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4234" rel="nofollow" target="_blank"><span data-dcnode-id="491" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="489" instrument_node="">
</span></div></span></div><hr data-dcnode-id="485"><div class="td-item" data-dcnode-id="474"><span class="td-sml-description" data-dcnode-id="475"><p data-dcnode-id="481"><b data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">25. </span></b><span data-dcnode-id="482" instrument_node="">During the Yule, one of the festivals which Christmas originated from, the Norse god Odin is believed to lead a ghostly procession called the Wild Hunt across the night sky, and undead drought will rise and walk the earth.
</span></p><div class="metabar" data-dcnode-id="476"><span data-dcnode-id="480" instrument_node="">
</span><a class="button2 source" data-dcnode-id="478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factrepublic.com/facts/4235" rel="nofollow" target="_blank"><span data-dcnode-id="479" instrument_node="">Source &amp; More</span></a><span data-dcnode-id="477" instrument_node="">
