</span><div class="post-93071 post type-post status-publish format-standard has-post-thumbnail category-blog category-news tag-cycleops-virtual-training tag-rouvy tag-trainer-apps tag-virtual-training &quot; data-swiftype-index=&quot;true" data-dcnode-id="3261" id="post-93071"><span data-dcnode-id="3542" instrument_node="">
</span><h1 class="entry-title padding10" data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">Rouvy Rolls Out Augmented Reality Indoor Training Feature</span></h1><span data-dcnode-id="3539" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="3518"><span data-dcnode-id="3538" instrument_node="">
</span><a data-dcnode-id="3535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dcrainmaker.com/2018/12/rouvy-augmented-reality-training.html" rel="bookmark" title="12:58 pm"><span class="entry-date" data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">December 6, 2018</span></span></a><span data-dcnode-id="3533" instrument_node=""> by </span><a data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dcrainmaker.com/author/rainmaker" rel="author" title="Posts by DC Rainmaker"><span data-dcnode-id="3532" instrument_node="">DC Rainmaker</span></a><span data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">|</span></span><a data-dcnode-id="3527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dcrainmaker.com/blog"><span data-dcnode-id="3528" instrument_node="">Blog</span></a><span data-dcnode-id="3526" instrument_node=""> » </span><a data-dcnode-id="3524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dcrainmaker.com/news"><span data-dcnode-id="3525" instrument_node="">Sports Technology News and Reviews</span></a><span data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">|</span></span><a class="last" data-dcnode-id="3520" href="#comments"><span data-dcnode-id="3521" instrument_node="">Comments (53)</span></a><span data-dcnode-id="3519" instrument_node=""> </span></div><span data-dcnode-id="3516" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3284"><span data-dcnode-id="3515" instrument_node="">
</span><p data-dcnode-id="3510"><a data-dcnode-id="3511" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/DSC_3099.jpg"><img alt="DSC_3099" border="0" class="error" data-dcnode-id="3514" data-lazy-src="https://media.dcrainmaker.com/images/2018/12/DSC_3099_thumb.jpg" data-ll-status="error" height="480" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/DSC_3099_thumb.jpg&amp;raw" style="border: 0px currentcolor; display: inline; background-image: none;" title="DSC_3099" width="720"><noscript data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">&lt;img style="border: 0px currentcolor; display: inline; background-image: none;" title="DSC_3099" src="https://media.dcrainmaker.com/images/2018/12/DSC_3099_thumb.jpg" alt="DSC_3099" width="720" height="480" border="0" /&gt;</span></noscript></a></p><span data-dcnode-id="3509" instrument_node="">
</span><p data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">First off, no, ‘augmented reality’ does not mean ‘virtual reality’. Two totally different things that share very little in common, except the word reality. Like ‘alternate reality’ – which is what happens when you don’t train all winter and think you’ll win your age group next spring. Or ‘reality TV’, which stars people from New Jersey doing…well…I have no idea.</span></p><span data-dcnode-id="3506" instrument_node="">
</span><p data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">So what is ‘augmented reality’ then? Well, it’s essentially when you take something real-world – like either video footage or actually the real world outside, and then overlay stuff atop it.&nbsp; For example, there are apps for your phone that allow you to point your phone at the sky and it marks out constellations perfectly.&nbsp; Or apps for ski areas that overlay the ski run names on them as you move your camera around.&nbsp; That’s all augmented reality.&nbsp; It’s taking something real-life/real-world and augmenting it with additional information.</span></p><span data-dcnode-id="3503" instrument_node="">
</span><p data-dcnode-id="3495"><span data-dcnode-id="3502" instrument_node="">Bringing this back to </span><a data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rouvy.com/en/"><span data-dcnode-id="3501" instrument_node="">Rouvy</span></a><span data-dcnode-id="3499" instrument_node="">, they’re one of the best ‘all-around’ indoor training apps out there. By that, I mean that they aren’t siloed into a single thing (such as Zwift for virtual world, or TrainerRoad for structured workouts). Instead, they’ve got a lot of varied features that might pull in someone that wants diversity in life. They’ve got real-course type videos, structured training ERG-type stuff, online races, and so on. But this post isn’t about all that stuff. It’s just about this new augmented reality thing.&nbsp; It’s something they demo’d this past summer at Eurobike (and I </span><a data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DzqSOJ2jG2iM"><span data-dcnode-id="3498" instrument_node="">even made a video about it then</span></a><span data-dcnode-id="3496" instrument_node="">). It allows you to race or train against other virtual riders on real-world outdoor videos.</span></p><span data-dcnode-id="3494" instrument_node="">
</span><p data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">If you want a nice and tidy one-shot wonder video demoing it all that I shot while I waited for Uber Eats to arrive, then go forth and whack that play button:</span></p><span data-dcnode-id="3491" instrument_node="">
</span><p data-dcnode-id="3490"></p><div class="rll-youtube-player" data-dcnode-id="3484" data-id="YuZMJvhppI0" data-query="" data-src="https://www.youtube.com/embed/YuZMJvhppI0"><div data-dcnode-id="3485" data-id="YuZMJvhppI0" data-query="" data-src="https://www.youtube.com/embed/YuZMJvhppI0"><img alt="" class="lazyloaded" data-dcnode-id="3489" data-ll-status="loaded" height="360" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/YuZMJvhppI0/hqdefault.jpg&amp;raw" width="480"><noscript data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">&lt;img src="https://i.ytimg.com/vi/ID/hqdefault.jpg" alt="" width="480" height="360"&gt;</span></noscript><div class="play" data-dcnode-id="3486"></div></div></div><noscript data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">&lt;iframe src="https://www.youtube.com/embed/YuZMJvhppI0" width="720" height="420" frameborder="0" allowfullscreen="allowfullscreen"&gt;&lt;/iframe&gt;</span></noscript><p data-dcnode-id="3481"></p><span data-dcnode-id="3480" instrument_node="">
</span><p data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">But now it’s out and available, and it’s time for me to give it a quick lunchtime test ride.</span></p><span data-dcnode-id="3477" instrument_node="">
</span><h3 data-dcnode-id="3474" data-test="1/2" id="how-it-works"><span data-dcnode-id="3475" style="font-weight: bold;"><span data-dcnode-id="3476" instrument_node="">How it works:</span></span></h3><span data-dcnode-id="3473" instrument_node="">
</span><p data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">As of now, this is available for their iOS (iPhone/iPad), Android, and PC apps (Mac won’t hit until next trainer season).&nbsp; You can easily find those in their respective app stores.&nbsp; You also will need either one of their free trials, or their normal subscriptions.&nbsp; And of course, you’ll need a bike and trainer.&nbsp; If you’ve got a smart trainer then it’ll control the trainer based on the terrain that you see.&nbsp; They support all the latest trainers, and for today’s test I paired up the new Tacx Neo 2, which was already listed there.</span></p><span data-dcnode-id="3470" instrument_node="">
</span><p data-dcnode-id="3460"><a data-dcnode-id="3466" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/2018-12-06-12.05.18.png"><img alt="2018-12-06 12.05.18" border="0" class="error" data-dcnode-id="3469" data-lazy-src="https://media.dcrainmaker.com/images/2018/12/2018-12-06-12.05.18_thumb.png" data-ll-status="error" height="770" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/2018-12-06-12.05.18_thumb.png&amp;raw" style="border: 0px currentcolor; display: inline; background-image: none;" title="2018-12-06 12.05.18" width="357"><noscript data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">&lt;img style="border: 0px currentcolor; display: inline; background-image: none;" title="2018-12-06 12.05.18" src="https://media.dcrainmaker.com/images/2018/12/2018-12-06-12.05.18_thumb.png" alt="2018-12-06 12.05.18" width="357" height="770" border="0" /&gt;</span></noscript></a><span data-dcnode-id="3465" instrument_node="">&nbsp;</span><a data-dcnode-id="3461" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/2018-12-06-12.06.49.png"><img alt="2018-12-06 12.06.49" border="0" class="error" data-dcnode-id="3464" data-lazy-src="https://media.dcrainmaker.com/images/2018/12/2018-12-06-12.06.49_thumb.png" data-ll-status="error" height="770" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/2018-12-06-12.06.49_thumb.png&amp;raw" style="display: inline; background-image: none;" title="2018-12-06 12.06.49" width="357"><noscript data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">&lt;img style="display: inline; background-image: none;" title="2018-12-06 12.06.49" src="https://media.dcrainmaker.com/images/2018/12/2018-12-06-12.06.49_thumb.png" alt="2018-12-06 12.06.49" width="357" height="770" border="0" /&gt;</span></noscript></a></p><span data-dcnode-id="3459" instrument_node="">
</span><p data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">I would say that this is one area that I think both Rouvy and Kinomap overthink. I don’t really need a gigantic list of smart trainers to choose mine from. Just simply scan what’s nearby and show me what I can connect to (just like Zwift and TrainerRoad do). Makes for a much cleaner interface.</span></p><span data-dcnode-id="3456" instrument_node="">
</span><p data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">Anyways, with that all set you’ll choose augmented routes on the left menu system:</span></p><span data-dcnode-id="3453" instrument_node="">
</span><p data-dcnode-id="3448"><a data-dcnode-id="3449" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h05m41s864.png"><img alt="vlcsnap-2018-12-06-17h05m41s864" border="0" class="error" data-dcnode-id="3452" data-lazy-src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h05m41s864_thumb.png" data-ll-status="error" height="542" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h05m41s864_thumb.png&amp;raw" style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h05m41s864" width="722"><noscript data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">&lt;img style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h05m41s864" src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h05m41s864_thumb.png" alt="vlcsnap-2018-12-06-17h05m41s864" width="722" height="542" border="0" /&gt;</span></noscript></a></p><span data-dcnode-id="3447" instrument_node="">
</span><p data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">That’ll bring you to a list of about a dozen augmented reality courses.&nbsp; The company has thousands of videos, but for the moment are just enabling this collection of ones for augmented reality. They mentioned wanting to do that mainly to focus on fixing issues and such with a smaller sample size – rather than trying to chase bumblebees across thousands of videos.&nbsp; Once they feel confident in where things are, they’ve noted they’ll quickly enable it on the full collection.</span></p><span data-dcnode-id="3444" instrument_node="">
</span><p data-dcnode-id="3439"><a data-dcnode-id="3440" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h05m50s643.png"><img alt="vlcsnap-2018-12-06-17h05m50s643" border="0" class="error" data-dcnode-id="3443" data-lazy-src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h05m50s643_thumb.png" data-ll-status="error" height="542" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h05m50s643_thumb.png&amp;raw" style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h05m50s643" width="722"><noscript data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">&lt;img style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h05m50s643" src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h05m50s643_thumb.png" alt="vlcsnap-2018-12-06-17h05m50s643" width="722" height="542" border="0" /&gt;</span></noscript></a></p><span data-dcnode-id="3438" instrument_node="">
</span><p data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">If you click on a given route you’ll get information about the distance, elevation gain, avg/max grades, and both the route and current record.&nbsp; There’s no direct integration with Strava at this time for segments on these popular routes, which would make for a great integration to race your friends directly with their avatars.</span></p><span data-dcnode-id="3435" instrument_node="">
</span><p data-dcnode-id="3430"><a data-dcnode-id="3431" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h05m53s867.png"><img alt="vlcsnap-2018-12-06-17h05m53s867" border="0" class="error" data-dcnode-id="3434" data-lazy-src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h05m53s867_thumb.png" data-ll-status="error" height="542" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h05m53s867_thumb.png&amp;raw" style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h05m53s867" width="722"><noscript data-dcnode-id="3432"><span data-dcnode-id="3433" instrument_node="">&lt;img style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h05m53s867" src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h05m53s867_thumb.png" alt="vlcsnap-2018-12-06-17h05m53s867" width="722" height="542" border="0" /&gt;</span></noscript></a></p><span data-dcnode-id="3429" instrument_node="">
</span><p data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">After that, you’ll select your trainer, as well as choose whether to stream or download the route.&nbsp; In my case, I selected to download it, so I can minimize any video latency issues.&nbsp; Down below you’ll see the augmented reality bit, and whether or not to enable it. By default, it’s enabled since that’s the feature area you’re in.</span></p><span data-dcnode-id="3426" instrument_node="">
</span><p data-dcnode-id="3421"><a data-dcnode-id="3422" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m01s111.png"><img alt="vlcsnap-2018-12-06-17h06m01s111" border="0" class="error" data-dcnode-id="3425" data-lazy-src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m01s111_thumb.png" data-ll-status="error" height="542" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m01s111_thumb.png&amp;raw" style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h06m01s111" width="722"><noscript data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">&lt;img style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h06m01s111" src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m01s111_thumb.png" alt="vlcsnap-2018-12-06-17h06m01s111" width="722" height="542" border="0" /&gt;</span></noscript></a></p><span data-dcnode-id="3420" instrument_node="">
</span><p data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">Oh, and you can also add/select Virtual Partners to add to the game.&nbsp; So if you had friends that rode it, you could ride against them here (assuming they were on Rouvy as well). At present it appears to only allow me to select one partner for iOS/Android. Monogamy and all that. Windows is less into traditional relationships and allows up to three partners. However, if in an event, then up to 100 riders at a time can be within that event on the course.</span></p><span data-dcnode-id="3417" instrument_node="">
</span><p data-dcnode-id="3412"><a data-dcnode-id="3413" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m09s233.png"><img alt="vlcsnap-2018-12-06-17h06m09s233" border="0" class="error" data-dcnode-id="3416" data-lazy-src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m09s233_thumb.png" data-ll-status="error" height="542" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m09s233_thumb.png&amp;raw" style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h06m09s233" width="722"><noscript data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">&lt;img style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h06m09s233" src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m09s233_thumb.png" alt="vlcsnap-2018-12-06-17h06m09s233" width="722" height="542" border="0" /&gt;</span></noscript></a></p><span data-dcnode-id="3411" instrument_node="">
</span><p data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">Finally, at the bottom there was the option for ‘Race’ or ‘Training’. Within Race it’s pretty much as you’d expect – you start and then when you get to the finish, it’s done. There’s no pausing it or anything. It’s all HTFU. Whereas in ‘Training’, you can auto-pause as well as move around within the course.</span></p><span data-dcnode-id="3408" instrument_node="">
</span><p data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">Once you’ve decided, go ahead and whack that button to get started. In my case I chose just a straightforward ‘Training’ session’. At which point you’re ready to start pedaling.&nbsp; Once you’ve done so, the session automatically starts and you’re off to the races (or training) on the real-world video route you selected.&nbsp; By default you’ll be in 1st person view, so you won’t see your own bike.&nbsp; But I like 3rd person view, so I changed it to that:</span></p><span data-dcnode-id="3405" instrument_node="">
</span><p data-dcnode-id="3400"><a data-dcnode-id="3401" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m24s723.png"><img alt="vlcsnap-2018-12-06-17h06m24s723" border="0" class="error" data-dcnode-id="3404" data-lazy-src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m24s723_thumb.png" data-ll-status="error" height="542" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m24s723_thumb.png&amp;raw" style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h06m24s723" width="722"><noscript data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">&lt;img style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h06m24s723" src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m24s723_thumb.png" alt="vlcsnap-2018-12-06-17h06m24s723" width="722" height="542" border="0" /&gt;</span></noscript></a></p><span data-dcnode-id="3399" instrument_node="">
</span><p data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">I quickly saw the virtual partner person I selected, and then just as quickly put them in their place and put them behind me.&nbsp; And in a nutshell – that single sentence encapsulates the entire concept at hand.&nbsp; I’m&nbsp;riding a video shot outdoors on a beautiful sunny day, while seeing a virtual me and my virtual friends on the screen. When I go around corners the camera angles change correctly to see one side or the other of the virtual riders:</span></p><span data-dcnode-id="3396" instrument_node="">
</span><p data-dcnode-id="3391"><a data-dcnode-id="3392" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h07m09s285.png"><img alt="vlcsnap-2018-12-06-17h07m09s285" border="0" class="lazyloaded" data-dcnode-id="3395" data-ll-status="loaded" height="542" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h07m09s285_thumb.png&amp;raw" style="display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h07m09s285" width="722"><noscript data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">&lt;img style="display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h07m09s285" src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h07m09s285_thumb.png" alt="vlcsnap-2018-12-06-17h07m09s285" width="722" height="542" border="0" /&gt;</span></noscript></a></p><span data-dcnode-id="3390" instrument_node="">
</span><p data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">There’s also ‘ghosts’, or basically little racer bots out there that you’ll pass or be passed by.&nbsp; This helps keep it interesting if just riding solo-cup.&nbsp; These are shown with the black and white jersey on them above.</span></p><span data-dcnode-id="3387" instrument_node="">
</span><p data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">In addition, there’s a variety of structures added to the road by software.&nbsp; For example, gradient signs pop up out of the earth Super Mario Brothers style, showing you the current grade. While I like the signs, I think the animation and frequency is a bit overkill.</span></p><span data-dcnode-id="3384" instrument_node="">
</span><p data-dcnode-id="3379"><a data-dcnode-id="3380" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h08m04s287.png"><img alt="vlcsnap-2018-12-06-17h08m04s287" border="0" class="error" data-dcnode-id="3383" data-lazy-src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h08m04s287_thumb.png" data-ll-status="error" height="542" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h08m04s287_thumb.png&amp;raw" style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h08m04s287" width="722"><noscript data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">&lt;img style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h08m04s287" src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h08m04s287_thumb.png" alt="vlcsnap-2018-12-06-17h08m04s287" width="722" height="542" border="0" /&gt;</span></noscript></a></p><span data-dcnode-id="3378" instrument_node="">
</span><p data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">There’s also split banners (for various kilometer markers), as well as finisher banners. In fact, you’ll even see barricades overlaid onto the road:</span></p><span data-dcnode-id="3375" instrument_node="">
</span><p data-dcnode-id="3365"><a data-dcnode-id="3371" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m59s384.png"><img alt="vlcsnap-2018-12-06-17h06m59s384" border="0" class="error" data-dcnode-id="3374" data-lazy-src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m59s384_thumb.png" data-ll-status="error" height="268" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m59s384_thumb.png&amp;raw" style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h06m59s384" width="357"><noscript data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">&lt;img style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h06m59s384" src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h06m59s384_thumb.png" alt="vlcsnap-2018-12-06-17h06m59s384" width="357" height="268" border="0" /&gt;</span></noscript></a><span data-dcnode-id="3370" instrument_node="">&nbsp;</span><a data-dcnode-id="3366" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/2018-12-06-13.18.28.png"><img alt="2018-12-06 13.18.28" border="0" class="error" data-dcnode-id="3369" data-lazy-src="https://media.dcrainmaker.com/images/2018/12/2018-12-06-13.18.28_thumb.png" data-ll-status="error" height="268" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/2018-12-06-13.18.28_thumb.png&amp;raw" style="border: 0px currentcolor; display: inline; background-image: none;" title="2018-12-06 13.18.28" width="357"><noscript data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">&lt;img style="border: 0px currentcolor; display: inline; background-image: none;" title="2018-12-06 13.18.28" src="https://media.dcrainmaker.com/images/2018/12/2018-12-06-13.18.28_thumb.png" alt="2018-12-06 13.18.28" width="357" height="268" border="0" /&gt;</span></noscript></a></p><span data-dcnode-id="3364" instrument_node="">
</span><p data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">Most of the time these look pretty good, but sometimes it just doesn’t quite work.&nbsp; For example, you’ll get what could only be an angry Department of Transportation road worker who has placed a gradient sign smack in the middle of someone’s driveway.</span></p><span data-dcnode-id="3361" instrument_node="">
</span><p data-dcnode-id="3356"><a data-dcnode-id="3357" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h07m16s967.png"><img alt="vlcsnap-2018-12-06-17h07m16s967" border="0" class="error" data-dcnode-id="3360" data-lazy-src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h07m16s967_thumb.png" data-ll-status="error" height="542" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h07m16s967_thumb.png&amp;raw" style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h07m16s967" width="722"><noscript data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">&lt;img style="border: 0px currentcolor; display: inline; background-image: none;" title="vlcsnap-2018-12-06-17h07m16s967" src="https://media.dcrainmaker.com/images/2018/12/vlcsnap-2018-12-06-17h07m16s967_thumb.png" alt="vlcsnap-2018-12-06-17h07m16s967" width="722" height="542" border="0" /&gt;</span></noscript></a></p><span data-dcnode-id="3355" instrument_node="">
</span><p data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">But these little quirks aside – what Rouvy is demonstrating here is fascinatingly cool.&nbsp; This is especially interesting as you look to eSports and allowing people to replicate real-world races indoors.&nbsp; After all, the vast majority of major cycling events already have videos inside of Rouvy today. That hard part is already done.&nbsp; What happens next is when Rouvy decides to flip the switch on the 2,000+ courses they have uploaded and allow you to not only show augmented reality on them, but run races on them.&nbsp; Starting next week the company will be soft-launching the racing feature, allowing people to create races and then join specific races on specific courses.</span></p><span data-dcnode-id="3352" instrument_node="">
</span><p data-dcnode-id="3347"><span data-dcnode-id="3351" instrument_node="">I do think that Rouvy is ripe for going the Apple TV route. When I </span><a data-dcnode-id="3349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dcrainmaker.com/2018/08/fulgaz-rolls-out-apple-tv-app-first-ride-details.html"><span data-dcnode-id="3350" instrument_node="">look at what FulGaz did there</span></a><span data-dcnode-id="3348" instrument_node=""> – it’s just so efficient and frees up my phone to do other things while on the bike. Whereas here I’ve gotta either have a dedicated expensive box or takeover my iPad. But that’s a minor nit.</span></p><span data-dcnode-id="3346" instrument_node="">
</span><h3 data-dcnode-id="3343" data-test="2/2" id="wrap-up"><span data-dcnode-id="3344" style="font-weight: bold;"><span data-dcnode-id="3345" instrument_node="">Wrap-up:</span></span></h3><span data-dcnode-id="3342" instrument_node="">
</span><p data-dcnode-id="3337"><a data-dcnode-id="3338" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/2018-12-06-13.19.42.png"><img alt="2018-12-06 13.19.42" border="0" class="error" data-dcnode-id="3341" data-lazy-src="https://media.dcrainmaker.com/images/2018/12/2018-12-06-13.19.42_thumb.png" data-ll-status="error" height="542" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.dcrainmaker.com/images/2018/12/2018-12-06-13.19.42_thumb.png&amp;raw" style="border: 0px currentcolor; display: inline; background-image: none;" title="2018-12-06 13.19.42" width="722"><noscript data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">&lt;img style="border: 0px currentcolor; display: inline; background-image: none;" title="2018-12-06 13.19.42" src="https://media.dcrainmaker.com/images/2018/12/2018-12-06-13.19.42_thumb.png" alt="2018-12-06 13.19.42" width="722" height="542" border="0" /&gt;</span></noscript></a></p><span data-dcnode-id="3336" instrument_node="">
</span><p data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">Will augmented reality cycling appeal to everyone? No, of course not. But neither does Zwift or TrainerRoad or SufferFest.&nbsp; Just like ice cream flavors, everyone has their own favorites.&nbsp; Of course, Ben and Jerry’s Chocolate Fudge Brownie is the best, so as long as we agree there – I’ll let you think anything you want about trainer platforms.</span></p><span data-dcnode-id="3333" instrument_node="">
</span><p data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">And what’s interesting here is that this isn’t Rouvy’s only trick. Up until they’ve added this feature they’ve got plenty of people that are quite happy with the existing features.&nbsp; So this is sorta an icing on top of the cake (or ice cream) type scenario for them.</span></p><span data-dcnode-id="3330" instrument_node="">
</span><p data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">Now as you can see in the video – there are some quirks here.&nbsp; Namely that when any company (be it Rouvy, FulGaz, or Kinomap) plays back recorded outdoor footage, they have to speed it up or slow it down to match your speed.&nbsp; So that means that if there’s a large difference between the recorded speed and the playback speed, it’ll look wonky.&nbsp; You can see that in some of the cases here.&nbsp; Companies do various things to try and minimize this, but ultimately you’ll notice it.</span></p><span data-dcnode-id="3327" instrument_node="">
</span><p data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">Additionally, you can’t change perspective on it either.&nbsp; So you’re always looking straight ahead.&nbsp; Changing perspective would require a 360° camera and that would significantly increase bandwidth, storage, complications and just life in general.</span></p><span data-dcnode-id="3324" instrument_node="">
</span><p data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">Still, I think this is fascinating and would love to see what it looks like with some big races on it, and especially as the technology continues to mature based on user suggestions over the winter (they’ve been running a public beta for about a month now, so a lot of that feedback has likely already arrived).</span></p><span data-dcnode-id="3321" instrument_node="">
</span><p data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">With that – thanks for reading!</span></p><span data-dcnode-id="3318" instrument_node="">

</span><div class="comment-body" data-dcnode-id="2681"><span data-dcnode-id="2695" instrument_node=""> </span><p data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Hi Ray. I dont wanna be that guy, but I don’t think this qualifies as augmented reality. Augmented reality is “a technology that superimposes a computer-generated image on a user’s view of the real world, thus providing a composite view”</span></p><span data-dcnode-id="2692" instrument_node="">
</span><p data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">This is placing computer generated images over video, not a user’s view of the real world. Even the examples you provided differ in this capacity (ski apps and Sky maps). If this is augmented reality, than isn’t Roger Rabbit (or Space Jam, or StoryBots, or the Avengers, or anything with CGI and real video for that matter)? </span></p><span data-dcnode-id="2689" instrument_node="">
</span><p data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">I read and watched, but maybe I am missing something, or perhaps just nitpicking??</span></p><span data-dcnode-id="2686" instrument_node="">

</span></div><span data-dcnode-id="2605" instrument_node="">
</span><div class="comment-body" data-dcnode-id="2593"><span data-dcnode-id="2604" instrument_node=""> </span><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">It’s been 6 months since this was announced, and nobody has previously said it’s not augmented reality.</span></p><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">In this case the reality is the recorded live ride outside, and the augmented part is that it introduced an overlay of your indoor ride that matches what you’re doing inside. Specifically using the spatial orientation atop that road that makes it augmented reality. It’s not prerecorded or pre-positioned like CGI, but rather dependent on your exact efforts and what-not in real-time.  It’s them adapting an overlay to the road based on what you’re doing.</span></p><span data-dcnode-id="2598" instrument_node="">

</span></div><span data-dcnode-id="2560" instrument_node="">
</span><div class="comment-body" data-dcnode-id="2548"><span data-dcnode-id="2559" instrument_node=""> </span><p data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">Rouvy should call it augmented videography because that’s what it is. A video is not real, not reality. In ‘reality’ you can look in any direction, on a video you just can’t.</span></p><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Whatever has been augmented, it is a nice idea though. I might just give it a go..  Thanks for the review</span></p><span data-dcnode-id="2553" instrument_node="">

</span><div class="comment-body" data-dcnode-id="2504"><span data-dcnode-id="2514" instrument_node=""> </span><p data-dcnode-id="2510"><span data-dcnode-id="2513" instrument_node="">Hi Mitch, we would agree with Ray on this one. We are imposing virtual aspects onto real world first person video that provides the user with information they would not normally find out on the road. We’ve recently updated our AR Routes to be even more realistic with better gradient smoothing and more routes! You can find further details here but we hope you give us a shot! </span><a data-dcnode-id="2511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.rouvy.com/en/129/The-new-Augmented-Routes-2.0" rel="nofollow ugc"><span data-dcnode-id="2512" instrument_node="">link to blog.rouvy.com</span></a></p><span data-dcnode-id="2509" instrument_node="">

</span></div><span data-dcnode-id="2471" instrument_node="">
</span><div class="comment-body" data-dcnode-id="2459"><span data-dcnode-id="2470" instrument_node=""> </span><p data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">I’ve been on a quest to find out just how augmented the reality is if I’m riding a Wahoo Kickr Bike programmed to behave like my Specialized S-Works Roubaix SL5 (Dura-Ace Di2 compact 11/30), riding one of Rouvy’s 1440 HD courses. The specific question is whether when I’m climbing, the bike will point up, and when I’m descending it will point down. My questions to the two partners yield conflicting results. Wahoo says “probably not—support for the Kickr Climb technology (either stand-alone or incorporated into the Kickr Bike) is “spotty at best.”</span></p><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Rouvy says I’ll feel the resistance when I climb, but I’ve yet to get an answer from them as to whether they can change the inclination of the bike</span></p><span data-dcnode-id="2464" instrument_node="">
</span><div class="fv_tc_wrapper" data-dcnode-id="2460"><div class="reply" data-dcnode-id="2461"><a aria-label="Reply to Jim Robertson" class="comment-reply-link" data-belowelement="comment-3515656" data-commentid="3515656" data-dcnode-id="2462" data-postid="93071" data-replyto="Reply to Jim Robertson" data-respondelement="respond" href="#respond" rel="nofollow"><span data-dcnode-id="2463" instrument_node="">Reply</span></a></div></div></div><span data-dcnode-id="2458" instrument_node="">

</span></div><span data-dcnode-id="2426" instrument_node="">
</span><div class="comment-body" data-dcnode-id="2417"><span data-dcnode-id="2425" instrument_node=""> </span><p data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Hi Jim,if you’re using the Wahoo Kickr and Wahoo Kickr Climb the bike should behave as you’re seeing virtually. The Wahoo Kickr communicates with the Kickr Climb and will use the gradients represented on Rouvy to replicate the real ride feel. No 3rd party software will communicate with the Climb as you need a Wahoo Kickr to use it.</span></p><span data-dcnode-id="2422" instrument_node="">
</span><div class="fv_tc_wrapper" data-dcnode-id="2418"><div class="reply" data-dcnode-id="2419"><a aria-label="Reply to Casey Griesemer | Rouvy" class="comment-reply-link" data-belowelement="comment-3524902" data-commentid="3524902" data-dcnode-id="2420" data-postid="93071" data-replyto="Reply to Casey Griesemer | Rouvy" data-respondelement="respond" href="#respond" rel="nofollow"><span data-dcnode-id="2421" instrument_node="">Reply</span></a></div></div></div><span data-dcnode-id="2416" instrument_node="">

</span></div><span data-dcnode-id="2384" instrument_node="">
</span><div class="comment-body" data-dcnode-id="2355"><span data-dcnode-id="2383" instrument_node=""> </span><p data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">I cannot tell whether you’ve answered as you have because I didn’t formulate my question precisely enough, or whether you’re being evasive. Apologies if it’s the former. Grrrrrrr… if it’s the latter.</span></p><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">I’m interested in using your AR videos and interested in purchasing a Kickr Bike as the exercise platform on which to use them. The Kickr Bike is, so far as I know, the most expensive exercise indoor “bike” on the market at the moment, so I want to be sure I choose wisely.</span></p><span data-dcnode-id="2377" instrument_node="">
</span><p data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">I THINK you’re saying that if I put my OWN bike on a Wahoo Kickr trainer with the Kickr climb attached to the front fork, the trainer will change pedaling resistance based on information it receives from the recorded Rouvy ride, AND the Kickr Climb will respond as well.</span></p><span data-dcnode-id="2374" instrument_node="">
</span><p data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">However, you follow this statement immediately with the disclaimer “No 3rd party software will communicate with the Climb as you need a Wahoo Kickr to use it.” That could mean that the Kickr Climb WON’T respond, which refutes what you said in the immediately preceding sentence.</span></p><span data-dcnode-id="2371" instrument_node="">
</span><p data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">Or perhaps you’re saying that the inclination features in the Kickr BIKE won’t work, but there’s no reason to purchase the Kickr Climb if one purchase a Kickr Bike. Or perhaps you’re saying that your software works with the Kickr and Kickr Climb, but not with any non-Wahoo trainer that one tries to pair with the Kickr Climb, but I cannot imagine anyone expecting that to work. Or perhaps you’re just not addressing what happens with the Kickr Bike, which is my real question.</span></p><span data-dcnode-id="2368" instrument_node="">
</span><p data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">As I’ve noted already, the question I HOPED you’d answer related to the Wahoo Kickr Bike, NOT the combination of the Kickr trainer and Kickr climb. If the answer to that one is “no, the Kickr Bike will NOT incline with gradient changes, but the combination of Kickr TRAINER with Kickr CLIMB will accomplish that, could you address that?</span></p><span data-dcnode-id="2365" instrument_node="">
</span><p data-dcnode-id="2361"><span data-dcnode-id="2364" instrument_node="">Thanks so much,</span><br data-dcnode-id="2363"><span data-dcnode-id="2362" instrument_node="">
Jim Robertson</span></p><span data-dcnode-id="2360" instrument_node="">

</span><div class="comment-body" data-dcnode-id="2301"><span data-dcnode-id="2321" instrument_node=""> </span><p data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Jim,</span></p><span data-dcnode-id="2318" instrument_node="">
</span><p data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">A Wahoo Kickr Bike does have a ’tilt’ feature similar to if you were using a Wahoo Kickr + Wahoo Climb. The Climb does not communicate via 3rd party channels, ie. it won’t connect to your phone but it will communicate with the Kickr device via a closed channel.</span></p><span data-dcnode-id="2315" instrument_node="">
</span><p data-dcnode-id="2310"><span data-dcnode-id="2314" instrument_node="">You are correct in that there is no reason to purchase a Kickr Climb if you already plan on buying a Wahoo Kickr Bike, the bike has the feature built in. Here is a good summary of the Wahoo Kickr Bike – </span><a data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DRdcaUhmuTqY" rel="nofollow ugc"><span data-dcnode-id="2313" instrument_node="">link to youtube.com</span></a><span data-dcnode-id="2311" instrument_node="">. The Kickr bike and all its’ features are fully compatbile with Rouvy routes and workouts!</span></p><span data-dcnode-id="2309" instrument_node="">
</span><p data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Hope this helps!</span></p><span data-dcnode-id="2306" instrument_node="">

</span><div class="comment-body" data-dcnode-id="1252"><span data-dcnode-id="1260" instrument_node=""> </span><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Hi! Sorry to hear you’re having trouble with the set-up! We’ve been working hard to make set-up as user friendly as possible and the three bars at the top-left of the app screen should easily lead you into the set-up page for devices, and from there it is very similar to the Zwift layout as you can see in the DC Rainmaker post. In any case, try one more time and follow the updates. Contrary to Zwift we offer an outstanding variety of iconic cycling locations.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><div class="fv_tc_wrapper" data-dcnode-id="1253"><div class="reply" data-dcnode-id="1254"><a aria-label="Reply to Casey Griesemer | Rouvy" class="comment-reply-link" data-belowelement="comment-3423763" data-commentid="3423763" data-dcnode-id="1255" data-postid="93071" data-replyto="Reply to Casey Griesemer | Rouvy" data-respondelement="respond" href="#respond" rel="nofollow"><span data-dcnode-id="1256" instrument_node="">Reply</span></a></div></div></div><span data-dcnode-id="1251" instrument_node="">

</span><div class="comment-meta commentmetadata" data-dcnode-id="1215"><a data-dcnode-id="1220" href="#comment-3031698"><span data-dcnode-id="1221" instrument_node="">
			December 15, 2018 at 3:26 pm</span></a><span data-dcnode-id="1219" instrument_node=""> </span><span class="commentnumber alignright" data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">#41</span></span><span data-dcnode-id="1216" instrument_node="">
</span></div><span data-dcnode-id="1213" instrument_node="">
</span><div class="comment-body" data-dcnode-id="1186"><span data-dcnode-id="1212" instrument_node=""> </span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">I don’t now, I’m 8 days into my trial with Rouvy. Not sure if I should suscribe.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">I like the basic idea, did two interval sessions on shorter climbs from my summer vacation. Sparks more emotions than climbing those cartoon hills in Zwift.</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">However, I find the software/interface bad. Really bad. First of the most basic, for the last 2 or 3 days videos became very laggy. Sometimes they would stop. Worked out initially.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">I can’t download videos to ride them offline. The download manager always just loads some data then stalls. Restarting the app, some more data, than stop again. I can dowload the mp4 files with a dedicated download software (links are given in an xml file), so it’s the app.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">The interface for finding routes is terrible. Tried it on three computers with different browsers. For example I do a search on the map and get all the markers. I want to look at the details of one but I can’t do right click-open in new window. This is relevant because if I just click on a marker, look at the route and want to return to the map afterwards it won’t work. I always end up in the top level (categories) menu, having lost my search results.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">And there are quite a few minor annoyances in the UI which add up.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">But the major annoyance for me is that it runs quite buggy with some videos not running always. Not sure if there is quite a demand at the moment and their servers are overwhelmed by that.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><div class="fv_tc_wrapper" data-dcnode-id="1187"><div class="reply" data-dcnode-id="1188"><a aria-label="Reply to Markus" class="comment-reply-link" data-belowelement="comment-3031698" data-commentid="3031698" data-dcnode-id="1189" data-postid="93071" data-replyto="Reply to Markus" data-respondelement="respond" href="#respond" rel="nofollow"><span data-dcnode-id="1190" instrument_node="">Reply</span></a></div></div></div><span data-dcnode-id="1185" instrument_node="">
