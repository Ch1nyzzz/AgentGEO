</span><div class="entry-content" data-dcnode-id="1302"><span data-dcnode-id="2110" instrument_node="">
</span><p class="small" data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Updated: August, 2018</span></p><span data-dcnode-id="2107" instrument_node="">
</span><p data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Imagine how your life would be different if you had timely solutions at your fingertips. Let’s take a traveller’s experience, for instance. Your augmented reality app as your ultimate tour guide – no need for lengthy information search, preliminary bookings or planning your itinerary in advance. Just Go and live in the moment and follow your heart’s appeal. Remember your childhood sensations? The desire of adventure, the excitement of discovery, the magic of make-believe. You travel the streets and the place is no longer alien – it opens up and reveals every hidden nook, tells an enchanting story of every object at which you direct your smartphone’s camera. Sounds like a fairy-tale? Possible. But every artifact and event was once just an idea.</span></p><span data-dcnode-id="2104" instrument_node="">
</span><p data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">So, everyone’s talking about augmented reality, how important and beneficial it is for your business. The augmented revolution is here and your competitors have already been on it for quite a while. Feels like your business is missing out on something?</span></p><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">No worries!</span></p><span data-dcnode-id="2098" instrument_node="">
</span><p data-dcnode-id="2096"><img alt="'Don't panic' button" class="alignnone size-full wp-image-2162" data-dcnode-id="2097" height="420" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//codetiburon.com/app/uploads/2017/05/dont-panic-button.png&amp;raw" srcset="https://codetiburon.com/app/uploads/2017/05/dont-panic-button.png 750w, https://codetiburon.com/app/uploads/2017/05/dont-panic-button-300x168.png 300w, https://codetiburon.com/app/uploads/2017/05/dont-panic-button-510x286.png 510w" width="750"></p><span data-dcnode-id="2095" instrument_node="">
</span><p data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">In this post, we’ll explain augmented reality, unveil the past, present, and future of the technology, and even guide you through the process of creating your own AR business card. Here’s the essence of AR technology – right at your fingertips.</span></p><span data-dcnode-id="2092" instrument_node="">
</span><p data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">In this article…</span></p><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2087"><a data-dcnode-id="2088" name="header1"></a></p><span data-dcnode-id="2086" instrument_node="">
</span><div class="media well" data-dcnode-id="2041"><span data-dcnode-id="2085" instrument_node="">
</span><p class="bg-warning" data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">
</span></p><ol data-dcnode-id="2045"><span data-dcnode-id="2082" instrument_node="">
</span><a data-dcnode-id="2079" href="#header1"><li data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Why AR technology went viral</span></li></a><span data-dcnode-id="2078" instrument_node="">
</span><a data-dcnode-id="2075" href="#header2"><li data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">How does augmented reality work</span></li></a><span data-dcnode-id="2074" instrument_node="">
</span><a data-dcnode-id="2071" href="#header3"><li data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">A brief discourse into the history of augmented reality</span></li></a><span data-dcnode-id="2070" instrument_node="">
</span><a data-dcnode-id="2067" href="#header4"><li data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">The present of AR apps: empowering businesses</span></li></a><span data-dcnode-id="2066" instrument_node="">
</span><a data-dcnode-id="2063" href="#header5"><li data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Unleashing the potential of augmented reality: new business opportunities</span></li></a><span data-dcnode-id="2062" instrument_node="">
</span><a data-dcnode-id="2059" href="#header6"><li data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">How to create an AR application</span></li></a><span data-dcnode-id="2058" instrument_node="">
</span><a data-dcnode-id="2055" href="#header7"><li data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Best tools for building an augmented reality experience</span></li></a><span data-dcnode-id="2054" instrument_node="">
</span><a data-dcnode-id="2051" href="#header8"><li data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">How to build an AR app without programming skills: tools for beginners</span></li></a><span data-dcnode-id="2050" instrument_node="">
</span><a data-dcnode-id="2047" href="#header9"><li data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Create an augmented reality business card: beginner’s guide</span></li></a><span data-dcnode-id="2046" instrument_node="">
</span></ol><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2043"></p><span data-dcnode-id="2042" instrument_node="">
</span></div><span data-dcnode-id="2040" instrument_node="">
</span><h2 data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Why AR technology went viral</span></h2><span data-dcnode-id="2037" instrument_node="">
</span><p data-dcnode-id="2029"><span data-dcnode-id="2036" instrument_node="">Despite the former scepticism about AR technology practical applications and the </span><a data-dcnode-id="2034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2016/04/what-marketers-need-to-understand-about-augmented-reality" target="_blank"><span data-dcnode-id="2035" instrument_node="">claim it’s yet another fad destined to be forgotten</span></a><span data-dcnode-id="2033" instrument_node="">, what we observe now is gradual increase in its adoption throughout businesses. How can we justify mass adoption of AR apps? It’s attributed to </span><a data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2016/10/the-mainstreaming-of-augmented-reality-a-brief-history" target="_blank"><span data-dcnode-id="2032" instrument_node="">three factors</span></a><span data-dcnode-id="2030" instrument_node="">:</span></p><span data-dcnode-id="2028" instrument_node="">
</span><ul data-dcnode-id="2017"><span data-dcnode-id="2027" instrument_node="">
</span><li data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">meaningful content</span></li><span data-dcnode-id="2024" instrument_node="">
</span><li data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">convincing and realistic interaction of the virtual and physical environment</span></li><span data-dcnode-id="2021" instrument_node="">
</span><li data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">unique value that goes beyond what other technologies deliver</span></li><span data-dcnode-id="2018" instrument_node="">
</span></ul><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2014"><a data-dcnode-id="2015" name="header2"></a></p><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2008"><span data-dcnode-id="2012" instrument_node="">The popularity of AR technology is attributed to the fact that humans, as experiential creatures, enjoy novelty. We also love visual interaction. Both these traits are employed in creating an AR-based customer experience. AR can bring positive attention to a product, say researchers. One </span><a data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/297695370_Revealing_the_Shopper_Experience_of_Using_a_%27Magic_Mirror%27_Augmented_Reality_Make-Up_Application" target="_blank"><span data-dcnode-id="2011" instrument_node="">Researchgate study</span></a><span data-dcnode-id="2009" instrument_node=""> confirms people not only enjoy positive and interactive experiences, but are also willing to invest in a product that was promoted via this technology.</span></p><span data-dcnode-id="2007" instrument_node="">
</span><h2 data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">How does augmented reality work</span></h2><span data-dcnode-id="2004" instrument_node="">
</span><p data-dcnode-id="1999"><span data-dcnode-id="2003" instrument_node="">Augmented reality is just a layer of artificial objects and extra information added to our tech-aided perception of the real world. It does not tear you off the real physical world, but enriches it by adding new layers of data to a smart device.  In other words, augmented reality is virtual reality and the real world mixed together. But do not get confused, it is not identical with mixed reality. We formerly explained </span><a data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//codetiburon.com/augmented-virtual-mixed-reality-outlook-tomorrow/" target="_blank"><span data-dcnode-id="2002" instrument_node="">the difference between AR, VR, and MR</span></a><span data-dcnode-id="2000" instrument_node="">. AR’s data is specific and relevant to what you do or where you are at this particular moment.</span></p><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">So how does it work? An AR-enabled device has software that recognizes a symbol, object, or image and adds relevant content so that we can see these layered visualizations as if they were real.</span></p><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">AR apps range widely – from a simple text-notification app to a complicated instruction on surgical procedure. They highlight important aspects, enhance understandings, and provide accessible and timely data.</span></p><span data-dcnode-id="1992" instrument_node="">
</span><p data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">Its primary goal – to deliver artificial objects into the real world – is realized by transferring projected images onto a pair of goggles, lenses, or camera view.</span></p><span data-dcnode-id="1989" instrument_node="">
</span><p data-dcnode-id="1987"><a data-dcnode-id="1988" name="header3"></a></p><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1981"><span data-dcnode-id="1985" instrument_node="">For example, </span><a data-dcnode-id="1983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dtattoo.inkhunter" target="_blank"><span data-dcnode-id="1984" instrument_node="">Inkhunter</span></a><span data-dcnode-id="1982" instrument_node="">, is a tattoo app that allows users to see how their future tattoo would look on their bodies. The concept is pretty simple, you draw a square line smiley face on a chosen body part and then position your camera view at the image, the app will replace the smile with a tattoo image.</span></p><span data-dcnode-id="1980" instrument_node="">
</span><h2 data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">A brief discourse into the history of augmented reality</span></h2><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1975"><img alt="Augmented reality: past, present, and future" class="alignnone size-full wp-image-2193" data-dcnode-id="1976" height="420" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//codetiburon.com/app/uploads/2017/05/AR_past_present_future.png&amp;raw" srcset="https://codetiburon.com/app/uploads/2017/05/AR_past_present_future.png 750w, https://codetiburon.com/app/uploads/2017/05/AR_past_present_future-300x168.png 300w, https://codetiburon.com/app/uploads/2017/05/AR_past_present_future-510x286.png 510w" width="750"></p><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">You may be surprised that while we still consider AR technology a future-transforming innovation, it’s already accrued some legacy. Let’s take a moment to look back.</span></p><span data-dcnode-id="1971" instrument_node="">
</span><h3 data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Attention-grabbing early efforts</span></h3><span data-dcnode-id="1968" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">The first-ever AR technology was created in 1968 by a father of computer graphics Ivan Sutherland. It was an AR head-mounted display system. From then on, AR advanced as wearables and digital displays. It could layout virtual elements on the real-world picture, for example, show geological information about a specific place.</span></p><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">The year 2008 saw commercial use of AR. A German agency developed an app for BMW Mini. To enable it, a customer directed a camera at a printed ad and the car model would come alive on the screen. A user could control the car on the screen and move it around to view at different angles, simply by manipulating the printed image.</span></p><span data-dcnode-id="1962" instrument_node="">
</span><p data-dcnode-id="1960"><a data-dcnode-id="1961" name="header4"></a></p><span data-dcnode-id="1959" instrument_node="">
</span><h3 data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Trying-on products at home</span></h3><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">The early 2010s brought to the world AR that could interact with movements in the real world in real time. Since then a virtual try-on era has begun. At this point, AR’s instant face recognition revolutionized buying experience forever. Now you can try out anything from virtual making up your face to placing a couch inside your home.</span></p><span data-dcnode-id="1953" instrument_node="">
</span><h2 data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">The present of AR apps: empowering businesses</span></h2><span data-dcnode-id="1950" instrument_node="">
</span><p data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">Augmented reality business opportunities are now available in many fields. A lot of companies are now involved in the technological process – from hardware manufacture to actual distribution. Just look at some of the current augmented reality business use cases.</span></p><span data-dcnode-id="1947" instrument_node="">
</span><h3 data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">AR-aided education</span></h3><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">AR has changed the way educational content is produced and delivered. The benefits of augmented reality technology for education cannot be overestimated – it can revive the role of kids’ imagination in learning and development. See a couple of successful implementations below.</span></p><span data-dcnode-id="1941" instrument_node="">
</span><p data-dcnode-id="1937"><a data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dcom.google.android.stardroid%26hl%3D" target="_blank"><span data-dcnode-id="1940" instrument_node="">Google Sky Map</span></a><span data-dcnode-id="1938" instrument_node=""> is a free AR app that is used for educational purposes. This app makes learning astronomy interesting and fun. Students point their cameras at the sky and move them around in any direction – and the app will automatically identify constellations and stars.</span></p><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1932"><a data-dcnode-id="1934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//elements4d.daqri.com/%23how" target="_blank"><span data-dcnode-id="1935" instrument_node="">Elements 4D</span></a><span data-dcnode-id="1933" instrument_node=""> is an AR educational app that was produced by DAQRI. This is one of my favorites. With this app, students can observe chemistry in action, all they need to do is combine different 3D boxes denoting chemical elements.</span></p><span data-dcnode-id="1931" instrument_node="">
</span><p data-dcnode-id="1929"><img alt="An educational AR app Elements 4D - combining virtual boxes of chemical elements" class="alignnone size-full wp-image-2183" data-dcnode-id="1930" height="485" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//codetiburon.com/app/uploads/2017/05/Educational_AR_app_Elements4D.jpg&amp;raw" srcset="https://codetiburon.com/app/uploads/2017/05/Educational_AR_app_Elements4D.jpg 750w, https://codetiburon.com/app/uploads/2017/05/Educational_AR_app_Elements4D-300x194.jpg 300w, https://codetiburon.com/app/uploads/2017/05/Educational_AR_app_Elements4D-495x320.jpg 495w" width="750"></p><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">As a result, kids find out – the safe way – which elements combine and what happens if they do. The app requires printed-out and assembled square blocks which serve as trigger images for an AR experience. DAQRI’s website has special lesson plans for using Elements 4D with different age groups.</span></p><span data-dcnode-id="1925" instrument_node="">
</span><h3 data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">AR Dating Services</span></h3><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Dating apps, that’s how people find love today. Look at Tinder, it’s popular and most relevant in our society. 
Technologies crawled into people’s personal life already, and guess what? People love it. So, why don’t we give them what they want and add another technology to this equation? Augmented reality might be something that will make your dating app better than Tinder.</span></p><span data-dcnode-id="1919" instrument_node="">
</span><p class="lead" data-dcnode-id="1915"><span data-dcnode-id="1918" instrument_node="">Want to create a dating app that beats Tinder? Check this post: </span><a data-dcnode-id="1916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//codetiburon.com/build-dating-app-like-tinder/" target="_blank"><span data-dcnode-id="1917" instrument_node="">How to Build a Dating App like Tinder… only Better</span></a></p><span data-dcnode-id="1914" instrument_node="">
</span><h3 data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Sports Apps</span></h3><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">When it comes to the sports industry, you can really make something useful for the people out there. For example, you can build an augmented reality app that will show a ball trajectory and speed right on the field or it can be a new convenient way for showing statistics.</span></p><span data-dcnode-id="1908" instrument_node="">
</span><h3 data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Augmented Healthcare</span></h3><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Augmented reality in healthcare is a very powerful tool. It opens a lot of opportunities for training and performing procedures.</span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1898"><a data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itunes.apple.com/us/app/anatomy-4d/id555741707%3Fmt%3D8" target="_blank"><span data-dcnode-id="1901" instrument_node="">Anatomy 4D</span></a><span data-dcnode-id="1899" instrument_node=""> is a healthcare AR app by DAQRI.This app can take medical students inside a human body, heart and other organs. Students can explore the skeleton, muscles, and body systems at a higher level of interaction. This immersive experience of student interaction with learning material makes them more engaged and results in more in-depth and profound knowledge acquisition.</span></p><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1895"><img alt="Augmented reality in healthcare" class="alignnone size-full wp-image-3639" data-dcnode-id="1896" height="562" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//codetiburon.com/app/uploads/2017/05/AR-in-healthcare.jpg&amp;raw" srcset="https://codetiburon.com/app/uploads/2017/05/AR-in-healthcare.jpg 750w, https://codetiburon.com/app/uploads/2017/05/AR-in-healthcare-300x225.jpg 300w, https://codetiburon.com/app/uploads/2017/05/AR-in-healthcare-427x320.jpg 427w" width="750"></p><span data-dcnode-id="1894" instrument_node="">
</span><h3 data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Landscaping</span></h3><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Landscaping is another field where augmented reality technology might come in handy. With AR, you can create any landscape virtually and see how it is going to look without the need to actually build something and redo if it doesn’t meet your expectations. Also, it allows making measurements without a tape-measure and can calculate the work cost. That’s an idea for a really useful app.</span></p><span data-dcnode-id="1888" instrument_node="">
</span><h3 data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Maps and tourism</span></h3><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Tourism is an area where augmented reality can do great. AR can visualize the information on places people want to visit. Maps with augmented reality are what tourists have been waiting for. That kind of guide can provide a great user experience. But it’s not just about maps, museums can tell their visitors more about the objects and even bringing those to life.</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p class="lead" data-dcnode-id="1878"><span data-dcnode-id="1881" instrument_node="">Looking to create a travel app? Check our insights: </span><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//codetiburon.com/create-hotel-booking-app/" target="_blank"><span data-dcnode-id="1880" instrument_node="">How to Create a Hotel Booking App</span></a></p><span data-dcnode-id="1877" instrument_node="">
</span><h3 data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">AR in e-commerce &amp; retail: reinventing customer experience</span></h3><span data-dcnode-id="1874" instrument_node="">
</span><p data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">With the arrival of augmented reality in e-commerce, sales got yet another tool to influence consumer behavior. AR technology provides customers with the opportunity to try out things they want to buy, so they get more attached to the product. Moreover, e-commerce brands can draw attention to themselves by using this technology.</span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1867"><a data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.apple.com/us/app/ikea-place/id1279244498"><span data-dcnode-id="1870" instrument_node="">IKEA catalog</span></a><span data-dcnode-id="1868" instrument_node=""> is an AR app for retail. It allows you to see how the chosen furniture will look inside your home. You can place it the way you want and see if it fits in. With an app like that, your interior designer skills rocket. How gratifying it is to have a hands-on experience! And how can you deny yourself the pleasure of buying an item that looks so gorgeous in your interior?</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p class="lead" data-dcnode-id="1861"><span data-dcnode-id="1865" instrument_node="">Want more insights into AR ideas for small business? Check out the article </span><a data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//codetiburon.com/business-virtual-augmented-reality-technologies/" target="_blank"><span data-dcnode-id="1864" instrument_node="">Can Your Business Benefit from Virtual and Augmented Reality Technologies</span></a><span data-dcnode-id="1862" instrument_node="">.</span></p><span data-dcnode-id="1860" instrument_node="">
</span><h3 data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Teleconference apps</span></h3><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Teleconferences can become much more convenient. Augmented technology helps visualize everything from data to people, and it also lets users see everything from different angles.</span></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">With AR, teleconference on any field can become easier. Whether you are showing a prototype of a project or walking around the construction site.</span></p><span data-dcnode-id="1851" instrument_node="">
</span><h3 data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">Painting apps</span></h3><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Painting apps are about making walls a different color or coloring an elephant in a children’s book. The pool of possibilities is endless, and what you need to do is just pick a niche and figure out how you can implement AR, so it would be convenient and helpful for your users.</span></p><span data-dcnode-id="1845" instrument_node="">
</span><h3 data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Marketing and advertising with AR</span></h3><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1840"><a data-dcnode-id="1841" name="header5"></a></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Most of the present-day AR techies are still trying to shake off the intimidating effect of the Pokemon Go app and figure out a winning strategy. However, a London-based startup Blippar has come up with a promising idea of implementing AR in ad banners. They engaged with several automotive brands in launching an AR ad campaign. Tapping on a mobile ad enables a user to observe the inside of a car; by allowing access to the smartphone camera, they can get a real-life windshield and window view of their surroundings. The most amazing thing is that it does not require apps, a simple tap on an ad banner would be enough for the user to engage in augmented reality.</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">The founders of the startup claim, the concept was born after sharing a joke in a pub about making a picture of the Queen on a £20 note come to life. Since, Blippar has created augmented-reality software behind ad campaigns for big brands including General Mills, Coca-Cola Company and Nestle.</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p class="lead" data-dcnode-id="1829"><span data-dcnode-id="1832" instrument_node="">Does the future look bright for marketing peeps? Check the post: </span><a data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//codetiburon.com/artificial-intelligence-content-marketing/" target="_blank"><span data-dcnode-id="1831" instrument_node="">Artificial Intelligence in Content Marketing: Can Bots Take over a Marketer’s Job?</span></a></p><span data-dcnode-id="1828" instrument_node="">
</span><h2 data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Unleashing the potential of augmented reality: new business opportunities</span></h2><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">AR potential is enormous. It’s just a matter of time and practice before businesses become completely augmented. You might be wondering, what’s the forecast for AR technology. We’ve decided to look into the crystal ball by examining the latest AR startups activity. Here are the trends:</span></p><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1820"><a data-dcnode-id="1821" name="header6"></a></p><span data-dcnode-id="1819" instrument_node="">
</span><ul data-dcnode-id="1788"><span data-dcnode-id="1818" instrument_node="">
</span><li data-dcnode-id="1811"><strong data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">AR format of content</span></strong><span data-dcnode-id="1815" instrument_node="">. The technology has proven to be an engaging and popular way to deliver content. For example, </span><a data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buildingconversation.com/" target="_blank"><span data-dcnode-id="1814" instrument_node="">Building Conversation</span></a><span data-dcnode-id="1812" instrument_node=""> is a tool designed to bring augmented reality applications to your business, projects or platforms to facilitate understanding and communication between different groups of people.</span></li><span data-dcnode-id="1810" instrument_node="">
</span><li data-dcnode-id="1803"><strong data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">AR takes over mobile</span></strong><span data-dcnode-id="1807" instrument_node="">. Even though goggles and AR glasses are not going anywhere, AR will focus on mobile. And that is totally logical. People do not adopt new technologies overnight, but smartphones have already become a commodity. For example, Asus partnered with Google to develop first ever smartphone with Tango and Daydream </span><a data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asus.com/us/Phone/ZenFone-AR-ZS571KL/" target="_blank"><span data-dcnode-id="1806" instrument_node="">ZenFone AR</span></a><span data-dcnode-id="1804" instrument_node="">.</span></li><span data-dcnode-id="1802" instrument_node="">
</span><li data-dcnode-id="1798"><strong data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Industrial IoT</span></strong><span data-dcnode-id="1799" instrument_node="">. With the fast progress of Internet of Things a new need arised. Massive amount of data is being collected and analyzed. AR can provide users with a simple and interactive interface. For example, a smart tennis racquet, is part of IoT and the only access to its data is through the app. AR can help visualize data from the smart devices with the use of headsets and special glasses.</span></li><span data-dcnode-id="1797" instrument_node="">
</span><li data-dcnode-id="1790"><strong data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">3D printing</span></strong><span data-dcnode-id="1794" instrument_node="">. Creating 3D models can become way easier with AR technology. For example, </span><a data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//prostheticknowledge.tumblr.com/post/98845127531/3d-doodler-pre-alpha-demo-by-ashok-mathew" target="_blank"><span data-dcnode-id="1793" instrument_node="">3D Doodler</span></a><span data-dcnode-id="1791" instrument_node=""> is a pen that creates 3D content in augmented reality space.</span></li><span data-dcnode-id="1789" instrument_node="">
</span></ul><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1786" instrument_node="">For the full list of present-day startups in the area of VR/AR, visit </span><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbinsights.com/blog/ar-vr-startup-market-map/" target="_blank"><span data-dcnode-id="1785" instrument_node="">CB insights’ blog</span></a><span data-dcnode-id="1783" instrument_node="">.</span></p><span data-dcnode-id="1781" instrument_node="">
</span><h2 data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">How to create an AR application</span></h2><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Diving into a new technology may seem intimidating at first. But if you divide the knowledge into consumable chunks and take small regular steps, mastering a new skill comes easy. Here are a few things to consider with AR app creation.</span></p><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773"><a data-dcnode-id="1774" name="header7"></a></p><span data-dcnode-id="1772" instrument_node="">
</span><ol data-dcnode-id="1752"><span data-dcnode-id="1771" instrument_node="">
</span><li data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Figure out a great idea to enhance your business. Competitor analysis is a good way to handle it.</span></li><span data-dcnode-id="1768" instrument_node="">
</span><li data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Explore the market of existing SDKs and platforms for augmented reality development. Pick the one that fits your idea, budget, and expertise. For example, platforms like Vuforia, Wikitude, and ARToolKit require a profound knowledge of C++, Java, or C#. If programming languages are not your cup of tea, opt for an easier solution – tools like Blippar or Aurasma are an excellent choice for beginners.</span></li><span data-dcnode-id="1765" instrument_node="">
</span><li data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Remember that AR usually needs the presence of 3D objects. You can download existing models or learn how to make them yourself.</span></li><span data-dcnode-id="1762" instrument_node="">
</span><li data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Create a 2D tracker, which is a specific picture that gets placed on a surface and scanned by AR-aided devices.</span></li><span data-dcnode-id="1759" instrument_node="">
</span><li data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Create a unique design and prepare all the necessary 3D models, pictures, text files and data.</span></li><span data-dcnode-id="1756" instrument_node="">
</span><li data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Put all the elements together on a platform of your choice.</span></li><span data-dcnode-id="1753" instrument_node="">
</span></ol><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">What’s next? Let’s evaluate some augmented reality tools you will need, their features and benefits, so you can make a better choice of a platform.</span></p><span data-dcnode-id="1748" instrument_node="">
</span><h2 data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Best tools for building an augmented reality experience</span></h2><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><img alt="Meme: 'A programmer? Go this way'" class="alignnone size-full wp-image-2194" data-dcnode-id="1744" height="420" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//codetiburon.com/app/uploads/2017/05/Programmer_go_this_way.png&amp;raw" srcset="https://codetiburon.com/app/uploads/2017/05/Programmer_go_this_way.png 750w, https://codetiburon.com/app/uploads/2017/05/Programmer_go_this_way-300x168.png 300w, https://codetiburon.com/app/uploads/2017/05/Programmer_go_this_way-510x286.png 510w" width="750"></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1741" instrument_node="">When you try yourself as an augmented reality developer, choosing the right software development kit (SDK) is crucial. From a great variety of </span><a data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//socialcompare.com/en/comparison/augmented-reality-sdks" target="_blank"><span data-dcnode-id="1740" instrument_node="">platforms for creating augmented reality</span></a><span data-dcnode-id="1738" instrument_node="">, we have chosen three most highly recommended – Vuforia, Kudan AR, and Wikitude. Let’s explore their capabilities.</span></p><span data-dcnode-id="1736" instrument_node="">
</span><h3 data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Vuforia</span></h3><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1729"><a data-dcnode-id="1731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vuforia.com/" target="_blank"><span data-dcnode-id="1732" instrument_node="">Vuforia</span></a><span data-dcnode-id="1730" instrument_node=""> is one of the most famous SDKs of today for AR development. So far it has powered 35000 apps.</span></p><span data-dcnode-id="1728" instrument_node="">
</span><ul data-dcnode-id="1673"><span data-dcnode-id="1727" instrument_node="">
</span><li data-dcnode-id="1723"><strong data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">Supports platforms</span></strong><span data-dcnode-id="1724" instrument_node="">: Android, UWP, Unity Editor and iOS.</span></li><span data-dcnode-id="1722" instrument_node="">
</span><li data-dcnode-id="1718"><strong data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Pricing</span></strong><span data-dcnode-id="1719" instrument_node="">: Free and commercial licences. The free version has limitations in cloud recognition and puts vuforia watermark on the end product.</span></li><span data-dcnode-id="1717" instrument_node="">
</span><li data-dcnode-id="1713"><strong data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Programming languages</span></strong><span data-dcnode-id="1714" instrument_node="">: Provides API in C++, Java, Objective-C++ and .Net through an extension to the Unity game engine.</span></li><span data-dcnode-id="1712" instrument_node="">
</span><li data-dcnode-id="1708"><strong data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Features available</span></strong><span data-dcnode-id="1709" instrument_node="">:</span></li><span data-dcnode-id="1707" instrument_node="">
</span><ul data-dcnode-id="1690"><span data-dcnode-id="1706" instrument_node="">
</span><li data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">real object, text, environments and image recognition</span></li><span data-dcnode-id="1703" instrument_node="">
</span><li data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">target tracking</span></li><span data-dcnode-id="1700" instrument_node="">
</span><li data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">mapping additional items with OpenGL</span></li><span data-dcnode-id="1697" instrument_node="">
</span><li data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">scanning objects for recognition</span></li><span data-dcnode-id="1694" instrument_node="">
</span><li data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">virtual buttons</span></li><span data-dcnode-id="1691" instrument_node="">
</span></ul><span data-dcnode-id="1689" instrument_node="">
</span><li data-dcnode-id="1685"><strong data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Capabilities</span></strong><span data-dcnode-id="1686" instrument_node="">: Includes support of virtual reality devices and a test app with comments showing Vuforia capabilities.</span></li><span data-dcnode-id="1684" instrument_node="">
</span><li data-dcnode-id="1680"><strong data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Limitations</span></strong><span data-dcnode-id="1681" instrument_node="">: Lacks a complete framework manual. Instructions and short tips are given randomly, but they can’t replace the required documentation.</span></li><span data-dcnode-id="1679" instrument_node="">
</span><li data-dcnode-id="1675"><strong data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Use cases</span></strong><span data-dcnode-id="1676" instrument_node="">: Rolls-Royce Trent 1000 Augmented Reality is an AR app that showcases the engine and its features in four augmented reality scenes. This is an example of a successful AR-aided product promotion. The app lets customers explore this new engine at a distance, as if they were actually nearby.</span></li><span data-dcnode-id="1674" instrument_node="">
</span></ul><span data-dcnode-id="1672" instrument_node="">
</span><h3 data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Kudan AR</span></h3><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1665"><a data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kudan.eu/" target="_blank"><span data-dcnode-id="1668" instrument_node="">Kudan AR</span></a><span data-dcnode-id="1666" instrument_node=""> is another popular SDK for augmented reality.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><ul data-dcnode-id="1598"><span data-dcnode-id="1663" instrument_node="">
</span><li data-dcnode-id="1659"><strong data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Supports platforms</span></strong><span data-dcnode-id="1660" instrument_node="">: Android,  iOS, Unity.</span></li><span data-dcnode-id="1658" instrument_node="">
</span><li data-dcnode-id="1654"><strong data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Pricing</span></strong><span data-dcnode-id="1655" instrument_node="">: Free and commercial licences.</span></li><span data-dcnode-id="1653" instrument_node="">
</span><li data-dcnode-id="1649"><strong data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Programming languages</span></strong><span data-dcnode-id="1650" instrument_node="">:  C and C++.</span></li><span data-dcnode-id="1648" instrument_node="">
</span><li data-dcnode-id="1644"><strong data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Features available</span></strong><span data-dcnode-id="1645" instrument_node="">:</span></li><span data-dcnode-id="1643" instrument_node="">
</span><ul data-dcnode-id="1626"><span data-dcnode-id="1642" instrument_node="">
</span><li data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">image recognition</span></li><span data-dcnode-id="1639" instrument_node="">
</span><li data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">mapping additional elements on the base of user location and recognized images</span></li><span data-dcnode-id="1636" instrument_node="">
</span><li data-dcnode-id="1631"><span data-dcnode-id="1635" instrument_node="">markerless tracking (instead of </span><a data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//xinreality.com/wiki/Fiducial_markers" target="_blank"><span data-dcnode-id="1634" instrument_node="">fiducial markers</span></a><span data-dcnode-id="1632" instrument_node="">, it relies on the use of natural features like edges, corners, or textures)</span></li><span data-dcnode-id="1630" instrument_node="">
</span><li data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">mapping additional elements via separate component over OpenGL</span></li><span data-dcnode-id="1627" instrument_node="">
</span></ul><span data-dcnode-id="1625" instrument_node="">
</span><li data-dcnode-id="1621"><strong data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Capabilities</span></strong><span data-dcnode-id="1622" instrument_node="">: Due to the unlimited number of recognizing images, it requires less storage space in a device.</span></li><span data-dcnode-id="1620" instrument_node="">
</span><li data-dcnode-id="1616"><strong data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Limitations</span></strong><span data-dcnode-id="1617" instrument_node="">:</span></li><ul data-dcnode-id="1608"><span data-dcnode-id="1615" instrument_node="">
</span><li data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">insufficient development documentation</span></li><span data-dcnode-id="1612" instrument_node="">
</span><li data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">no direct access to OpenGL</span></li><span data-dcnode-id="1609" instrument_node="">
</span></ul><span data-dcnode-id="1607" instrument_node="">
</span><li data-dcnode-id="1600"><strong data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Use cases</span></strong><span data-dcnode-id="1604" instrument_node="">: A retail AR app </span><a data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itunes.apple.com/app/sayduck-make-your-space-beautiful/id626844409" target="_blank"><span data-dcnode-id="1603" instrument_node="">Sayduck</span></a><span data-dcnode-id="1601" instrument_node=""> allows users to see how the furniture they want to buy will look at their homes. The app visualizes a chosen item of furniture in 3D and places the furniture wherever you want in a user’s interior.</span></li><span data-dcnode-id="1599" instrument_node="">
</span></ul><span data-dcnode-id="1597" instrument_node="">
</span><h3 data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Wikitude</span></h3><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1593" instrument_node=""> One more augmented reality SDK on our list is </span><a data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wikitude.com/products/wikitude-sdk/" target="_blank"><span data-dcnode-id="1592" instrument_node="">Wikitude</span></a><span data-dcnode-id="1590" instrument_node="">.</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><a data-dcnode-id="1587" name="header8"></a></p><span data-dcnode-id="1585" instrument_node="">
</span><ul data-dcnode-id="1526"><span data-dcnode-id="1584" instrument_node="">
</span><li data-dcnode-id="1580"><strong data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Supports platforms</span></strong><span data-dcnode-id="1581" instrument_node="">: Android, iOS, Smart Glasses, Epson moverio, Vuzix M-100, ODG R-7, PhoneGap, Titanium, Xamarin and Unity.</span></li><span data-dcnode-id="1579" instrument_node="">
</span><li data-dcnode-id="1575"><strong data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Pricing</span></strong><span data-dcnode-id="1576" instrument_node="">: Free and commercial licences.</span></li><span data-dcnode-id="1574" instrument_node="">
</span><li data-dcnode-id="1570"><strong data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Programming languages</span></strong><span data-dcnode-id="1571" instrument_node="">:  Java and C++.</span></li><span data-dcnode-id="1569" instrument_node="">
</span><li data-dcnode-id="1565"><strong data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Features available</span></strong><span data-dcnode-id="1566" instrument_node="">:</span></li><span data-dcnode-id="1564" instrument_node="">
</span><ul data-dcnode-id="1544"><span data-dcnode-id="1563" instrument_node="">
</span><li data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">3D tracking technology (SLAM)</span></li><span data-dcnode-id="1560" instrument_node="">
</span><li data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">image recognition and tracking</span></li><span data-dcnode-id="1557" instrument_node="">
</span><li data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">geo-location AR for apps</span></li><span data-dcnode-id="1554" instrument_node="">
</span><li data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">improved extended tracking (Wikitude SDK 6)</span></li><span data-dcnode-id="1551" instrument_node="">
</span><li data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">advanced camera options (Wikitude SDK 6)</span></li><span data-dcnode-id="1548" instrument_node="">
</span><li data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">positioning (Wikitude SDK 6)</span></li><span data-dcnode-id="1545" instrument_node="">
</span></ul><span data-dcnode-id="1543" instrument_node="">
</span><li data-dcnode-id="1539"><strong data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Capabilities</span></strong><span data-dcnode-id="1540" instrument_node="">: Free version is fully powered.</span></li><span data-dcnode-id="1538" instrument_node="">
</span><li data-dcnode-id="1534"><strong data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Limitations</span></strong><span data-dcnode-id="1535" instrument_node="">: Free version comes with a watermark.</span></li><span data-dcnode-id="1533" instrument_node="">
</span><li data-dcnode-id="1528"><span data-dcnode-id="1532" instrument_node="">Use cases: An example of a Wikitude-based app is a </span><a data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wikitude.com/zalando-scans-fashion-with-wikitude-augmented-reality-at-83rd-annual-geneva-motor-show/" target="_blank"><span data-dcnode-id="1531" instrument_node="">display mounted inside Rinspeed’s concept car</span></a><span data-dcnode-id="1529" instrument_node="">. The concept of this app is quite interesting. A camera scans people walking past the car and the display shows what they are wearing and where they bought it from. This is how AR brings e-commerce to the next level.</span></li><span data-dcnode-id="1527" instrument_node="">
</span></ul><span data-dcnode-id="1525" instrument_node="">
</span><h2 data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">How to build an AR app without programming skills: tools for beginners</span></h2><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><img alt="Meme: 'No programming skills? This way, please'" class="alignnone size-full wp-image-2195" data-dcnode-id="1521" height="420" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//codetiburon.com/app/uploads/2017/05/No_programming_skills_this_way.png&amp;raw" srcset="https://codetiburon.com/app/uploads/2017/05/No_programming_skills_this_way.png 750w, https://codetiburon.com/app/uploads/2017/05/No_programming_skills_this_way-300x168.png 300w, https://codetiburon.com/app/uploads/2017/05/No_programming_skills_this_way-510x286.png 510w" width="750"></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Even if you are just starting in the field of programming, it’s not worth putting off augmented reality creation until you have mastered the art of coding. Knowing the right tools for beginners, you can get into building an augmented reality app without further ado.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">In this part, we’ll tell about two of the best AR platforms for beginners.</span></p><span data-dcnode-id="1513" instrument_node="">
</span><h3 data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Blippar</span></h3><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1509" instrument_node="">With </span><a data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blippar.com/en/products/blippbuilder/" target="_blank"><span data-dcnode-id="1508" instrument_node="">Blippbuilder</span></a><span data-dcnode-id="1506" instrument_node="">, no coding skills are required, not even for 3D objects or animations. This platform provides you with a drag-n-drop interface, which is easy as pie. Blippbuilder allows you to create your own interactive augmented reality experiences called ‘Blipps’.</span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Want to see some projects accomplished with Blippar?</span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Let’s explore an example of a travel solution. In 2016 Emirates famous airline introduced the world’s first interactive amenity kit in Economy Class. This unique kit includes not only necessary things for additional comfort in flight but also immersive content for mobile devices. Customers need to install  the Blippar app and use it to scan the bags and they get access to entertainment and healthcare content.</span></p><span data-dcnode-id="1498" instrument_node="">
</span><h3 data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Aurasma</span></h3><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1491"><a data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aurasma.com/" target="_blank"><span data-dcnode-id="1494" instrument_node="">Aurasma</span></a><span data-dcnode-id="1492" instrument_node=""> is a platform that allows users to create AR environment without any use of programming skills. Like most other platforms of this type, it includes a drag-n-drop interface and a cloud-based system. The content can be published and updated at the drop of a hat.</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Just remember that platforms like Aurasma Studio, the simple ones, do not give you the whole package of opportunities, that you expect from professional SDKs. You cannot manipulate 3D objects the way you would in Vuforia or Wikitude. What are the limitations of Aurasma Studio?</span></p><ul data-dcnode-id="1468"><span data-dcnode-id="1487" instrument_node="">
</span><li data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">no face recognition, you can’t create face filters</span></li><span data-dcnode-id="1484" instrument_node="">
</span><li data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">no mapping with OpenGL</span></li><span data-dcnode-id="1481" instrument_node="">
</span><li data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">no scanning objects for recognition</span></li><span data-dcnode-id="1478" instrument_node="">
</span><li data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">no mapping additional elements on the base of user location and recognized images</span></li><span data-dcnode-id="1475" instrument_node="">
</span><li data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">no 3D tracking technology (SLAM)</span></li><span data-dcnode-id="1472" instrument_node="">
</span><li data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">no geo-location</span></li><span data-dcnode-id="1469" instrument_node="">
</span></ul><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><a data-dcnode-id="1466" name="header9"></a></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">A popular magazine GQ has recently issued ‘the Men of the Year’ edition containing AR content. This way the reader had to download  Aurasma-powered ‘GQ Live’ app and scan the magazine. This content featured sneak peeks of the issue and behind-the-scenes videos of the Men of the Year photo shoots. Also GQ included a big amount of augmented advertisements for companies like Geico, Hilton Hotels &amp; Resorts, Louis Vuitton, Ralph Lauren, and Ray-Ban. So off-line  marketing and advertising is all for AR technology.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><h2 data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Create an augmented reality business card: beginner’s guide</span></h2><span data-dcnode-id="1458" instrument_node="">
</span><img alt="AR business card" class="alignnone size-full wp-image-2196" data-dcnode-id="1457" height="420" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//codetiburon.com/app/uploads/2017/05/AR-business-card.png&amp;raw" srcset="https://codetiburon.com/app/uploads/2017/05/AR-business-card.png 750w, https://codetiburon.com/app/uploads/2017/05/AR-business-card-300x168.png 300w, https://codetiburon.com/app/uploads/2017/05/AR-business-card-510x286.png 510w" width="750"><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">While you’re still unsure about your AR unique business application, why not follow suit and practice something universal and still allowing you to make a mark – an augmented reality business card. Your brand promise makes you stand out from the crowd and bring attention to your company. This is what you can make your company remembered. When you meet a new client, the first thing you do is hand him a business card. What if I tell you that even such a  simple thing as a business card can become augmented? Whether you’re starting up in business or crossing the chasm to maturity, coming across as an innovative tech-savvy company is equally important. An augmented reality business card may be your next big thing.</span></p><span data-dcnode-id="1453" instrument_node="">
</span><h3 data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">What is an augmented reality business card</span></h3><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">At first glance, it’s an ordinary card, but when you scan it with a smartphone or tablet, it opens up into a 3D product model. Wait! There is more. These business cards may include way more information and even product catalogs.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><h3 data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">How to build an AR business card</span></h3><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Want to know the best part? Creating augmented reality experience with Aurasma studio is free.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><ol data-dcnode-id="1406"><span data-dcnode-id="1440" instrument_node="">
</span><li data-dcnode-id="1435"><span data-dcnode-id="1439" instrument_node="">Create an account in </span><a data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studio.aurasma.com/register" target="_blank"><span data-dcnode-id="1438" instrument_node="">Aurasma Studio</span></a><span data-dcnode-id="1436" instrument_node="">.</span></li><span data-dcnode-id="1434" instrument_node="">
</span><li data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Select “Create New Aura”. Aura is an AR experience created via Aurasma Studio.</span></li><span data-dcnode-id="1431" instrument_node="">
</span><li data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Select a trigger image. A trigger is a printed-out or on-the-screen image that you use to view aura. For that, you just point your camera view onto a trigger and your smartphone screen will display AR elements. How to make a trigger image? You can upload a file from your computer or select a trigger already uploaded to your account.</span></li><span data-dcnode-id="1428" instrument_node="">
</span><li data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Select an image, give it a name, and then press “save”.</span></li><span data-dcnode-id="1425" instrument_node="">
</span><li data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Now you can edit your trigger. You can zoom in or out and add a mask (a geometrical shape that will strengthen a trigger image). Mask the areas that look not sharp or contrasting enough. Then hit “Next”.</span></li><span data-dcnode-id="1422" instrument_node="">
</span><li data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Now add overlays. Overlays are videos, links and images that launch from the selected trigger. Upload file from your computer or select the owne you already have in your account.</span></li><span data-dcnode-id="1419" instrument_node="">
</span><li data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Name your overlay and hit “Save”.</span></li><span data-dcnode-id="1416" instrument_node="">
</span><li data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Now you can edit your overlay, place and resize it the way you want. Hit “Next”.</span></li><span data-dcnode-id="1413" instrument_node="">
</span><li data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Give your Aura a name and save it.</span></li><span data-dcnode-id="1410" instrument_node="">
</span><li data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">To view your first AR experience download Aurasma app, log in to your account and point your camera to the screen or printed trigger. Enjoy your AR experience!</span></li><span data-dcnode-id="1407" instrument_node="">
</span></ol><span data-dcnode-id="1405" instrument_node="">
</span><h2 data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Conclusion</span></h2><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Augmented reality apps are becoming widely used and accessible nowadays. Don’t be the last to reap the benefit. Creating an AR app is no arcane art. And we’ve proven, everyone can cope – from beginners to professionals. What’s your next step? Set your imagination free and envision how augmented reality technology can empower your business.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><div class="well well-lg bg-green" data-dcnode-id="1392"><p class="text-center" data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">How much does it cost to build an AR app with CodeTiburon?</span></p><span data-dcnode-id="1396" instrument_node="">
