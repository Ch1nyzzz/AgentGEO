nu-item-18127" data-dcnode-id="499" id="menu-item-18127"><a data-dcnode-id="500" href="tel:18779735537"><span data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Free Consults 1-877-9-SELLER</span></span></a></li></ul></div></div></nav></header><div class="clear" data-dcnode-id="493"></div><div data-dcnode-id="492" id="sticky-menu-alias"></div><div class="clear" data-dcnode-id="491"></div><section data-dcnode-id="486" id="page-content-title"><div class="container_24" data-dcnode-id="487" id="page-content-header"><div data-dcnode-id="488" id="page-title"><h1 class="single-pagetitle" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Amazon App introduces Augmented Reality</span></h1></div></div></section><div class="clear" data-dcnode-id="485"></div><section data-dcnode-id="213" id="page-content"><nav class="container_24" data-dcnode-id="477" id="breadcrumbs-container"><p class="breadcrumbs" data-dcnode-id="478"><a data-dcnode-id="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amazonsellerslawyer.com/"><span data-dcnode-id="484" instrument_node="">Home</span></a><span class="breadarrow" data-dcnode-id="481"><span data-dcnode-id="482" instrument_node=""> → </span></span><span class="current_crumb" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Amazon App introduces Augmented Reality </span></span></p></nav><div class="container_24" data-dcnode-id="215" id="content-container"><main class="grid_16" data-dcnode-id="375" id="main-content" role="main"><div class="main-content-padding" data-dcnode-id="376"><article class="post-9640 post type-post status-publish format-standard has-post-thumbnail hentry tag-amazon-alexa tag-amazon-app" data-dcnode-id="380" id="post-9640"><div class="entry" data-dcnode-id="381"><h2 data-dcnode-id="474" style="text-align: center;"><strong data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Amazon stepping into Augmented Reality with Amazon App</span></strong></h2><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Amazon is once again transforming the way that people shop on their mobile devices, thanks to virtual reality.</span></p><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Amazon has started its Black Friday deals early, as many discounts can already be had as of Wednesday. Along with that rollout, Amazon announced that starting this holiday season shoppers will be able to turn on augmented reality (AR) in the Amazon App on iPhone iOS to view items in a more realistic way. The augmented reality seeks to create a much more personal and realistic shopping experience.</span></p><p data-dcnode-id="466"><noscript data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">&lt;img class="aligncenter size-full wp-image-9641" src="https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/11/amazon-app-photo.jpg" alt="Amazon App" width="572" height="333" srcset="https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/11/amazon-app-photo.jpg 572w, https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/11/amazon-app-photo-300x175.jpg 300w" sizes="(max-width: 572px) 100vw, 572px" /&gt;</span></noscript><img alt="Amazon App" class="lazyload aligncenter size-full wp-image-9641" data-dcnode-id="467" data-sizes="(max-width: 572px) 100vw, 572px" data-src="https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/11/amazon-app-photo.jpg" data-srcset="https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/11/amazon-app-photo.jpg 572w, https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/11/amazon-app-photo-300x175.jpg 300w" height="333" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20572%20333%22%3E%3C/svg%3E" width="572"></p><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Here’s Amazon’s official statement on the matter:</span></p><p data-dcnode-id="461"><em data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">“Whether customers are buying a sofa or a kitchen appliance, they can overlay it onto their existing living space, move it and rotate it to get a full 360-degree peek in a live camera view to make sure it fits their style and aesthetic,” Amazon’s announcement read in part.</span></em></p><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">While utilizing the Amazon App, customers will be able to see what a product would look like in real life before they make the purchase. Customers can move and rotate the object up to 360 degrees at the touch of a screen. Check it out in the image below, which is provided by Amazon.</span></p><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">It looks pretty good, doesn’t it? However, it looks like the actual early version of the app may have some bugs, as evidenced in this user-snapped photo.</span></p><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">The image isn’t nearly as crisp in this photo, but the usefulness of such a feature is pretty clear. Amazon also released a promotional video for its new feature, which shows off everything that the augmented reality add-on can do.</span></p><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">The function will be usable for anyone with an iPhone 6S (or more recent) with iOS 11. While the current plan is for users to have this feature through the holiday season, it could transform the way people shop on Amazon for good.</span></p><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Amazon’s integration of augmented reality is genius and adds a whole new dimension to shopping, making the customer’s experience more interactive and more intuitive.</span></p><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Augmented reality has become a very popular new technology. According to a study conducted by the Huffington Post, $1.1 billion was spent on AR in 2016. It has been used in many different ways since its inception, most notably in video games and news.</span></p><p data-dcnode-id="445"><noscript data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">&lt;img class="aligncenter size-full wp-image-9645" src="https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/11/amazon-ar-alexa-app.jpg" alt="Amazon Alexa App" width="572" height="320" srcset="https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/11/amazon-ar-alexa-app.jpg 572w, https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/11/amazon-ar-alexa-app-300x168.jpg 300w" sizes="(max-width: 572px) 100vw, 572px" /&gt;</span></noscript><img alt="Amazon Alexa App" class="lazyload aligncenter size-full wp-image-9645" data-dcnode-id="446" data-sizes="(max-width: 572px) 100vw, 572px" data-src="https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/11/amazon-ar-alexa-app.jpg" data-srcset="https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/11/amazon-ar-alexa-app.jpg 572w, https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/11/amazon-ar-alexa-app-300x168.jpg 300w" height="320" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20572%20320%22%3E%3C/svg%3E" width="572"></p><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Pokémon Go saw a stratospheric boom in popularity thanks to its inclusion of augmented reality when the mobile game launched in July 2016. Even though downloads for the iPhone game have stalled, augmented reality has taken off around the industry.</span></p><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="438" style="text-align: center;"><strong data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Augmented Reality has existed, Amazon App looks to capitalize</span></strong></h2><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Augmented reality has been marketed as a form of entertainment, but Amazon is turning it into something else: a boon for business.</span></p><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Amazon isn’t the only one who has tried this out though, according to Business Insider.</span></p><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">AR View helps Amazon keep pace with competitors that have introduced similar features.&nbsp;iOS 11’s ARKit has&nbsp;enabled&nbsp;a number of retailers to introduce AR tools like Amazon’s AR View. As a result, 20% of consumers already expect retailers to have such a feature, and 49% expect it by the end of March 2018.</span></p><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">AR View fulfills this requirement for Amazon, which is important since companies like&nbsp;Wayfair and&nbsp;Ikea&nbsp;already have AR tools through iOS 11, and they compete directly with Amazon for online furniture sales. Amazon likely wants to defend its furniture sales given that the home and kitchen categories&nbsp;accounted&nbsp;for 15% of its sales growth in 2016, and should benefit from consumers’ interest in AR products with this move.</span></p><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="425" style="text-align: center;"><strong data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">What is the use of Augmented Reality?</span></strong></h2><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">For now, the augmented reality feature will mostly be used for appliances, electronics, furniture, and toys. Those are the most realistic uses for the function anyway, considering those are major items that people would place in their households.</span></p><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">It’s interesting to see Amazon and Apple team up for this feature. In some departments, the two are competitors. But the two major companies seem to have found a happy marriage in the shopping world, in which Apple has no personal stake.</span></p><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">The function can only be used on Apple’s devices. Therefore, the partnership should increase sales for Apple’s iPhone too. Both sides get major business benefits from the relationship.</span></p><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Furthermore, the app should help customers make smarter decisions while shopping. Now buyers will able to visualize an object in their home before making the purchase, which should in theory lead to fewer returns — as long as the image of the product that the seller provides is honest and authentic.</span></p><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">That distinction may pin more responsibility on the seller to provide an accurate image of the product in future sales. If a customer views an item through the augmented reality app and likes it, and then it shows up to the customer’s house and looks different than it did in the app, that could be a problem for sellers.</span></p><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">On the other hand, the addition of the function in the app could lead to fewer customers making purchases they would later regret, which would lead to fewer returns in the first place. It should increase the likelihood that someone really likes the product before they buy it, which makes a happier customer and a happier seller.</span></p><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="408" style="text-align: center;"><strong data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">How far will Amazon go?</span></strong></h2><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">It’ll be interesting to see how Amazon continues to build on this concept. Amazon may not be the first company to implement this feature, but they’re certainly the biggest oe. That could cause a major revolution in the way that we shop. I wouldn’t be surprised if other major online sales corporations follow suit in the near future.</span></p><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">While the function of the app is currently limited to a handful of different kinds of products at Amazon, it could expand to encompass almost everything over time. It might not take very long to get there, either. That could transform the way people buy and the way that people sell.</span></p><p data-dcnode-id="400"><noscript data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">&lt;img class="aligncenter size-full wp-image-8511" src="https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/08/rosenbaum-famularo-asl.png" alt="Amazon Sellers' Lawyers" width="700" height="161" srcset="https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/08/rosenbaum-famularo-asl.png 700w, https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/08/rosenbaum-famularo-asl-300x69.png 300w" sizes="(max-width: 700px) 100vw, 700px" /&gt;</span></noscript><img alt="Amazon Sellers' Lawyers" class="lazyload aligncenter size-full wp-image-8511" data-dcnode-id="401" data-sizes="(max-width: 700px) 100vw, 700px" data-src="https://secureservercdn.net/198.71.233.33/r28.94f.myftpupload.com/wp-content/uploads/2017/08/rosenbaum-famularo-asl.png" data-srcset="https://secureservercdn.net/198.71.233.33/
