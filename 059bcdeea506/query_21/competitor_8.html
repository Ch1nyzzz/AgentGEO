</span><p data-dcnode-id="2022"><span data-dcnode-id="2026" instrument_node="">Why should teachers integrate augmented reality (AR) apps and sites into their curricula? With manipulable 3D visuals, augmented reality apps and sites inject a wow factor into any subject, increasing kids’ engagement and enthusiasm for learning. &nbsp;In addition, recent research suggests that AR can </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techlearning.com/how-to/how-vr-and-ar-can-be-used-to-support-students-with-special-needs" target="_blank"><span data-dcnode-id="2025" instrument_node="">foster greater empathy</span></a><span data-dcnode-id="2023" instrument_node=""> in users. Many of these AR apps and sites are free or inexpensive.&nbsp;</span></p><div class="ad-unit" data-dcnode-id="2021" id="ad-unit-1"></div><h2 data-dcnode-id="2019" id="xa0-ios-and-android-ar-apps"><span data-dcnode-id="2020" instrument_node="">&nbsp;iOS and Android AR Apps</span></h2><ol data-dcnode-id="1950"><li data-dcnode-id="2008"><strong data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">3DBear AR</span></strong><br data-dcnode-id="2016"><span data-dcnode-id="2015" instrument_node="">
This super-creative AR design app offers lesson plans, challenges, 3D models, social media sharing, and 3D printing capability. The 3DBear website provides video tutorials, curriculum, and distance learning resources for educators. Great for PBL, design and computational thinking. Free and paid plans, with 30-day free trial. &nbsp;</span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="9442358031865623000" data-dcnode-id="2013" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="iOS " data-merchant-id="30557" data-merchant-name="apple.com" data-merchant-network="ImpactRad" data-merchant-url="apple.com" data-placeholder-url="https://apple.sjv.io/c/221109/473657/7613?subId1=hawk-custom-tracking&amp;sharedId=hawk-prefix&amp;u=https%3A%2F%2Fapps.apple.com%2Fus%2Fapp%2Fid1234975406" data-url="https://apps.apple.com/us/app/id1234975406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apple.sjv.io/c/221109/473657/7613%3FsubId1%3Dtechlearning-us-9442358031865623000%26sharedId%3Dtechlearning-us%26u%3Dhttps%253A%252F%252Fapps.apple.com%252Fus%252Fapp%252Fid1234975406" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="2014" instrument_node="">iOS </span></a><span data-dcnode-id="2012" instrument_node="">&nbsp;&nbsp;</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2010" data-url="https://play.google.com/store/apps/details?id=fi.ThreeDBear.ThreeDBearAR" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dfi.ThreeDBear.ThreeDBearAR" target="_blank"><span data-dcnode-id="2011" instrument_node="">Android</span></a><span data-dcnode-id="2009" instrument_node="">&nbsp;</span></li><li data-dcnode-id="1997"><strong data-dcnode-id="2004"><span data-dcnode-id="2007" instrument_node="">Civilisations AR</span><br data-dcnode-id="2006"><span data-dcnode-id="2005" instrument_node="">
</span></strong><span data-dcnode-id="2003" instrument_node="">Based on the BBC Two art history program Civilisations, the Civilisations AR app helps users explore masterpieces from ancient Egypt to the Renaissance. Themes -- including faith, progress, and the human body -- are illuminated through the investigation of the featured 41 artifacts. This research tool can ignite kids’ interest in history, art, or science. Free. </span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="1609935784875057200" data-dcnode-id="2001" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="iOS " data-merchant-id="30557" data-merchant-name="apple.com" data-merchant-network="ImpactRad" data-merchant-url="apple.com" data-placeholder-url="https://apple.sjv.io/c/221109/473657/7613?subId1=hawk-custom-tracking&amp;sharedId=hawk-prefix&amp;u=https%3A%2F%2Fapps.apple.com%2Fus%2Fapp%2Fcivilisations-ar%2Fid1350792208" data-url="https://apps.apple.com/us/app/civilisations-ar/id1350792208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apple.sjv.io/c/221109/473657/7613%3FsubId1%3Dtechlearning-us-1609935784875057200%26sharedId%3Dtechlearning-us%26u%3Dhttps%253A%252F%252Fapps.apple.com%252Fus%252Fapp%252Fcivilisations-ar%252Fid1350792208" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="2002" instrument_node="">iOS </span></a><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1999" data-url="https://play.google.com/store/apps/details?id=uk.co.bbc.civilisations" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Duk.co.bbc.civilisations" target="_blank"><span data-dcnode-id="2000" instrument_node="">Android</span></a><span data-dcnode-id="1998" instrument_node=""> &nbsp;</span></li><li data-dcnode-id="1986"><strong data-dcnode-id="1993"><span data-dcnode-id="1996" instrument_node="">Quiver - 3D Coloring App</span><br data-dcnode-id="1995"><span data-dcnode-id="1994" instrument_node="">
</span></strong><span data-dcnode-id="1992" instrument_node="">Quiver turns a special coloring book into a 3D augmented reality experience. Users print AR-enabled blank coloring sheets through the app or the website, then color each with crayons, colored pencils, or oil pastels. Activate the quiver app to bring the pages to life. Free app, free and paid coloring packs. </span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="8968751680961648000" data-dcnode-id="1990" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="iOS " data-merchant-id="111947" data-merchant-name="apple.com" data-merchant-network="ImpactRad" data-merchant-url="apple.com" data-placeholder-url="https://apple.sjv.io/c/338476/435418/7646?subId1=hawk-custom-tracking&amp;sharedId=hawk-prefix&amp;u=https%3A%2F%2Fapps.apple.com%2Fnz%2Fapp%2Fquiver-3d-coloring-app%2Fid650645305" data-url="https://apps.apple.com/nz/app/quiver-3d-coloring-app/id650645305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apple.sjv.io/c/338476/435418/7646%3FsubId1%3Dtechlearning-us-8968751680961648000%26sharedId%3Dtechlearning-us%26u%3Dhttps%253A%252F%252Fapps.apple.com%252Fnz%252Fapp%252Fquiver-3d-coloring-app%252Fid650645305" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="1991" instrument_node="">iOS </span></a><span data-dcnode-id="1989" instrument_node="">&nbsp;</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1987" data-url="https://play.google.com/store/apps/details?id=com.puteko.colarmix" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dcom.puteko.colarmix" target="_blank"><span data-dcnode-id="1988" instrument_node="">Android&nbsp;</span></a></li><li data-dcnode-id="1977"><strong data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">PopAR Explore the wonders of the world, from wild animals to international culture to historic landmarks. Features include 360-degree view (VR mode), interactive gameplay, and 3D models. Free. </span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="3755571214594854000" data-dcnode-id="1980" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="iOS " data-merchant-id="30557" data-merchant-name="apple.com" data-merchant-network="ImpactRad" data-merchant-url="apple.com" data-placeholder-url="https://apple.sjv.io/c/221109/473657/7613?subId1=hawk-custom-tracking&amp;sharedId=hawk-prefix&amp;u=https%3A%2F%2Fapps.apple.com%2Fus%2Fapp%2Fpopar-world-map%2Fid709896025" data-url="https://apps.apple.com/us/app/popar-world-map/id709896025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apple.sjv.io/c/221109/473657/7613%3FsubId1%3Dtechlearning-us-3755571214594854000%26sharedId%3Dtechlearning-us%26u%3Dhttps%253A%252F%252Fapps.apple.com%252Fus%252Fapp%252Fpopar-world-map%252Fid709896025" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="1981" instrument_node="">iOS </span></a><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1978" data-url="https://play.google.com/store/apps/details?id=com.popartoys.wonderschart" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dcom.popartoys.wonderschart" target="_blank"><span data-dcnode-id="1979" instrument_node="">Android&nbsp;</span></a></li><li data-dcnode-id="1965"><strong data-dcnode-id="1973"><span data-dcnode-id="1976" instrument_node="">SkyView® Explore the Universe</span><br data-dcnode-id="1975"><span data-dcnode-id="1974" instrument_node="">
</span></strong><span data-dcnode-id="1972" instrument_node="">One of the most popular AR astronomy apps, &nbsp;SkyView® Explore the Universe makes it easy to identify galaxies, stars, constellations, planets, and satellites in the night sky, while the AR mode allows users to spot objects day or night. Great for out-of-the-way places, as no WiFi, data signal, or GPS is required. Try the Time Travel setting to see the sky of ancient and future ages.&nbsp;$1.99. </span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="7565645131771867000" data-dcnode-id="1970" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="iOS " data-merchant-id="30557" data-merchant-name="apple.com" data-merchant-network="ImpactRad" data-merchant-url="apple.com" data-placeholder-url="https://apple.sjv.io/c/221109/473657/7613?subId1=hawk-custom-tracking&amp;sharedId=hawk-prefix&amp;u=https%3A%2F%2Fapps.apple.com%2Fapp%2Fid404990064" data-url="https://apps.apple.com/app/id404990064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apple.sjv.io/c/221109/473657/7613%3FsubId1%3Dtechlearning-us-7565645131771867000%26sharedId%3Dtechlearning-us%26u%3Dhttps%253A%252F%252Fapps.apple.com%252Fapp%252Fid404990064" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="1971" instrument_node="">iOS </span></a><span data-dcnode-id="1969" instrument_node="">&nbsp;</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1967" data-url="https://play.google.com/store/apps/details?id=com.t11.skyview" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dcom.t11.skyview" target="_blank"><span data-dcnode-id="1968" instrument_node="">Android </span></a><span data-dcnode-id="1966" instrument_node="">&nbsp;From the same developer, the similar SkyView® Lite is free.</span></li><li data-dcnode-id="1951"><strong data-dcnode-id="1961"><span data-dcnode-id="1964" instrument_node="">CyberChase Shape Quest!&nbsp;</span><br data-dcnode-id="1963"><span data-dcnode-id="1962" instrument_node="">
</span></strong><span data-dcnode-id="1960" instrument_node="">Based on the PBS Kids math show </span><em data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">CyberChase</span></em><span data-dcnode-id="1957" instrument_node="">, CyberChase Shape Quest! combines games, puzzles and 3D augmented reality to practice geometry and spatial memory skills. Three different games and 80 puzzles provide lots of variety and skill levels. Free. </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1955" data-url="https://play.google.com/store/apps/details?id=org.pbskids.cyberchasear" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/apps/details%3Fid%3Dorg.pbskids.cyberchasear" target="_blank"><span data-dcnode-id="1956" instrument_node="">iOS</span></a><span data-dcnode-id="1954" instrument_node=""> </span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="1065629669626274700" data-dcnode-id="1952" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="Android&nbsp;" data-merchant-id="30557" data-merchant-name="apple.com" data-merchant-network="ImpactRad" data-merchant-url="apple.com" data-placeholder-url="https://apple.sjv.io/c/221109/473657/7613?subId1=hawk-custom-tracking&amp;sharedId=hawk-prefix&amp;u=https%3A%2F%2Fapps.apple.com%2Fus%2Fapp%2Fid777790860" data-url="https://apps.apple.com/us/app/id777790860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apple.sjv.io/c/221109/473657/7613%3FsubId1%3Dtechlearning-us-1065629669626274700%26sharedId%3Dtechlearning-us%26u%3Dhttps%253A%252F%252Fapps.apple.com%252Fus%252Fapp%252Fid777790860" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="1953" instrument_node="">Android&nbsp;</span></a></li></ol><h2 data-dcnode-id="1948" id="ios-ar-apps"><span data-dcnode-id="1949" instrument_node= " data-merchant-id="111944" data-merchant-name="apple.com" data-merchant-network="ImpactRad" data-merchant-url="apple.com" data-placeholder-url="https://apple.sjv.io/c/338476/435410/7643?subId1=hawk-custom-tracking&amp;sharedId=hawk-prefix&amp;u=https%3A%2F%2Fapps.apple.com%2Fus%2Fapp%2Faugment-3d-augmented-reality%2Fid506463171" data-url="https://apps.apple.com/us/app/augment-3d-augmented-reality/id506463171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apple.sjv.io/c/338476/435410/7643%3FsubId1%3Dtechlearning-us-5933918689075082000%26sharedId%3Dtechlearning-us%26u%3Dhttps%253A%252F%252Fapps.apple.com%252Fus%252Fapp%252Faugment-3d-augmented-reality%252Fid506463171" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><strong data-dcnode-id="1944"><span data-dcnode-id="1947" instrument_node="">Augment</span><br data-dcnode-id="1946"><span data-dcnode-id="1945" instrument_node="">
</span></strong></a><span data-dcnode-id="1942" instrument_node="">A simple app for viewing 3D AR models. Users upload their own 3D models and can manipulate each one in various ways with the app. Augment works well for design-related subjects and presentations; resources are available for students and teachers to get started. &nbsp;Free.&nbsp;</span><br data-dcnode-id="1941"><span data-dcnode-id="1940" instrument_node="">
