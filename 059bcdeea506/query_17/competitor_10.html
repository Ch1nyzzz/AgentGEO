</span><p data-dcnode-id="744"><span data-dcnode-id="746" style="font-weight: 400;"><span data-dcnode-id="747" instrument_node="">The metaverse is the next evolution of the internet. An immersive interconnected universe of virtual worlds &amp; experiences. Some metaverses are hard to access and need special equipment, others like ours will be highly accessible on the web from almost any device. Once in the metaverse you can create your personal avatar and begin exploring different worlds and experiences. </span></span><span data-dcnode-id="745" instrument_node="">Meet new people, attend an event or mastermind, take on a quest or role, buy, sell or trade within our marketplace, work in a virtual office, become a citizen and help govern the world.</span></p><span data-dcnode-id="743" instrument_node="">
</span></div><span data-dcnode-id="741" instrument_node="">

</span></div></div><div class="vc_tta-panel" data-dcnode-id="718" data-vc-content=".vc_tta-panel-body" id="1539145981627-8dac303f-37a1"><div class="vc_tta-panel-heading" data-dcnode-id="731"><h4 class="vc_tta-panel-title vc_tta-controls-icon-position-right" data-dcnode-id="732"><a data-dcnode-id="733" data-vc-accordion="" data-vc-container=".vc_tta-container" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/6MT5ZbQJ_cw%3Ffeature%3Doembed%231539145981627-8dac303f-37a1"><span class="vc_tta-title-text" data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">How can I earn rewards by playing Ascendia XR?</span></span><i class="vc_tta-controls-icon vc_tta-controls-icon-plus" data-dcnode-id="734"></i></a></h4></div><div class="vc_tta-panel-body" data-dcnode-id="719"><span data-dcnode-id="730" instrument_node="">

</span><div class="wpb_wrapper" data-dcnode-id="723"><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" style="font-weight: 400;"><span data-dcnode-id="727" instrument_node="">There are many different ways to earn rewards within our metaverse: By completing quests, buying and holding tokens, staking &amp; farming, owning NFT’s, owning land, becoming a merchant or service provider, earning badges, taking care of your health, spending time in nature, learning new skills, being kind &amp; helpful, becoming a citizen of Ascendia, voting &amp; governing, becoming an ambassador, winning competitions, treasure hunts and so much more. </span></span></p><span data-dcnode-id="724" instrument_node="">

</span><p data-dcnode-id="706"><span data-dcnode-id="707" style="font-weight: 400;"><span data-dcnode-id="708" instrument_node="">By teaching you how to play the real game of life and providing you access to the most powerful digital &amp; physical events, trainings, masterminds, teachers, creators, gigs,&nbsp; jobs, products and solutions that will help further align you to your purpose, provide you with opportunities &amp; abundance, improve your health and raise your consciousness while connecting you to a global network of like-minded individuals and businesses who are all focused on improving their lives and making the world a better place.</span></span></p><span data-dcnode-id="705" instrument_node="">

</span><p data-dcnode-id="649"><span data-dcnode-id="650" style="font-weight: 400;"><span data-dcnode-id="651" instrument_node="">We are the only metaverse that’s focused on bettering your life and the planet by curating the most impactful digital &amp; physical experiences, products and services that are good for people and the planet within a decentralized &amp; gamified metaverse that’s owned &amp; governed by-it’s-players and designed to build a brighter future. Unlike facebook’s business model, we will never sell your data and will never censor your content. Your data is your data and at Ascendia you are a sovereign being. </span></span></p><span data-dcnode-id="648" instrument_node="">
