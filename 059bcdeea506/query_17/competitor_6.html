a-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cybersecurity-insiders.com/casinos-and-hotels-in-las-vegas-become-soft-targets-for-cybercriminals/"></a><span data-dcnode-id="4282" style="color: rgb(0, 0, 0);"><a data-dcnode-id="4283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cybersecurity-insiders.com/casinos-and-hotels-in-las-vegas-become-soft-targets-for-cybercriminals/"><span data-dcnode-id="4284" instrument_node="">Source</span></a></span><span data-dcnode-id="4280" style="color: rgb(0, 0, 0);"><span data-dcnode-id="4281" instrument_node="">). Aside from being susceptible to hacks and data breaches, currently all online-based gambling is a major target for fraud, which can lead to losses, casino closures, and even criminal charges.</span></span><span data-dcnode-id="4279" instrument_node=""> (</span><a data-dcnode-id="4277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.europeanbusinessreview.com/ai-on-anti-fraud-service-in-igaming-gambling/"><span data-dcnode-id="4278" instrument_node="">Source</span></a><span data-dcnode-id="4276" instrument_node="">)</span></p></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><span data-dcnode-id="4239" instrument_node=""> </span></div><span data-dcnode-id="4237" instrument_node=""> </span></div><span data-dcnode-id="4235" instrument_node=""> </span></section><span data-dcnode-id="4233" instrument_node="">

ilable to casinos, players, and regulators. Blockchain technology enables decentralization, which means there is no single point of failure for hackers to breach our security. The use of blockchain allows XR Casino to control access data to protect privacy, so players can breathe easy knowing their data, privacy, and money are safe. Blockchain technology also facilitates payments, acceptance of cryptocurrencies and sale of NFTs. We will accept major cryptocurrencies and plan to launch our native coin to allow cryptocurrency&nbsp;</span></span><a data-dcnode-id="4203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/staking-crypto"></a><span data-dcnode-id="4200" style="color: rgb(0, 0, 0);"><a data-dcnode-id="4201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/staking-crypto"><span data-dcnode-id="4202" instrument_node="">staking</span></a></span><span data-dcnode-id="4198" style="color: rgb(0, 0, 0);"><span data-dcnode-id="4199" instrument_node="">&nbsp;to incentivize player loyalty and community building through proof of stake mining and drops of augmented reality coins in real world places (similar to&nbsp;</span></span><a data-dcnode-id="4197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.16i.co.uk/m-journal/the-technology-behind-pokemon-go/"></a><span data-dcnode-id="4194" style="color: rgb(0, 0, 0);"><a data-dcnode-id="4195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.16i.co.uk/m-journal/the-technology-behind-pokemon-go/"><span data-dcnode-id="4196" instrument_node="">how Pokemon Go works</span></a></span><span data-dcnode-id="4192" style="color: rgb(0, 0, 0);"><span data-dcnode-id="4193" instrument_node="">). Blockchain technology also empowers us to exist virtually in any&nbsp;</span></span><a data-dcnode-id="4191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/cathyhackl/2020/07/05/the-metaverse-is-coming--its-a-very-big-deal/%3Fsh%3D48729607440f"></a><span data-dcnode-id="4188" style="color: rgb(0, 0, 0);"><a data-dcnode-id="4189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/cathyhackl/2020/07/05/the-metaverse-is-coming--its-a-very-big-deal/%3Fsh%3D48729607440f"><span data-dcnode-id="4190" instrument_node="">metaverse</span></a></span><span data-dcnode-id="4186" style="color: rgb(0, 0, 0);"><span data-dcnode-id="4187" instrument_node="">&nbsp;we choose.&nbsp;</span></span></p><p data-dcnode-id="4183"><br data-dcnode-id="4184"></p><p data-dcnode-id="4181"><img class="fr-fic fr-dib lazy" data-dcnode-id="4182" data-src="https://d2j6gq8tvnyhoe.cloudfront.net/c259c1c8-d750-4ee3-bd3e-8ad97e2f2ee6.jpg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2j6gq8tvnyhoe.cloudfront.net/c259c1c8-d750-4ee3-bd3e-8ad97e2f2ee6.jpg&amp;raw" style="width: 100%;"></p><p data-dcnode-id="4179"><br data-dcnode-id="4180"></p><p data-dcnode-id="4173" id="isPasted"><span data-dcnode-id="4174" style="color: rgb(0, 0, 0);"><span data-dcnode-id="4178" instrument_node="">XR Casino also benefits from having a two-pronged B2C and B2B business model. Our B2C segment is a free-to-play social casino model where we will generate revenue from sales of in-game casino chips, ads and subscription fees. </span><strong data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">These games involve play money only, and they will not be able to cash out or exchange them for anything of value.</span></strong><span data-dcnode-id="4175" instrument_node=""> Some popular examples of social casinos include: Doubledown Casino, Slotomania, Zynga Poker and myVegas Slots. Players will download XR Casino games to their computers, smartphones, or XR devices through any major app store. Upon termination of a successful capital raise, we plan on creating and launching a fully licensed subsidiary with a Malta online gambling license to roll out for-money games in jurisdictions that allow it. (Funds from this Reg CF campaign will not flow to that subsidiary.) We will accept major cryptocurrencies in addition to fiat money.</span></span></p><p data-dcnode-id="4170"><span data-dcnode-id="4171" style="color: rgb(0, 0, 0);"><br data-dcnode-id="4172"></span></p><p data-dcnode-id="4167"><span data-dcnode-id="4168" style="color: rgb(0, 0, 0);"><span data-dcnode-id="4169" instrument_node="">Our B2B segment is a SaaS model where we expect to generate revenue from technology licensing fees and revenue sharing fees from both, social casinos and for-money licensed casinos. SaaS clients will be required to be licensed in each state where they want to launch for-money XR Casino games and pay a set up fee of $25,000 plus a monthly fee of $5,000 per game with increasing scales based on the number of players. They will pay their legal fees and game certification fees independently, and the revenue sharing agreements will give XR Casino 25% of revenues generated. We plan for our B2B segment to include a division for celebrities, influencers and entertainment industry businesses with large numbers of followers interested in monetizing their follower base by rolling out their branded social casino and NFTs.&nbsp;</span></span></p></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div></div><span data-dcnode-id="4131" instrument_node=""> </span></div><span data-dcnode-id="4129" instrument_node=""> </span></div><span data-dcnode-id="4127" instrument_node=""> </span></section><span data-dcnode-id="4125" instrument_node="">

          What is mixed reality and how to experience it?
        </span></h4><span data-dcnode-id="2733" instrument_node="">
</span><small class="update-timestamp" data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">

</span><div class="update-content" data-dcnode-id="2701"><span data-dcnode-id="2729" instrument_node="">
</span><p data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">Dear shareholders,&nbsp;</span></p><p data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">XR technologies continue gaining momentum, specially with the emergence of several Metaverses and Meta ( previously Facebook) making a huge splash by changing its corporate name and announcing they will invest over $10 billion to develop its Metaverse. &nbsp;We believe that this momentum is great for XR technologies, for our company and our shareholders. &nbsp;There are several augmented reality and virtual reality Metaverses, our games are already developed for AR, MR and VR technologies and we are solving the interoperability problem in XR technologies with our XR cross-tech games.&nbsp;</span></p><p data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">By now millions of people own virtual reality headsets and many more are familiar with augmented reality (most smartphones have AR capabilities), &nbsp;but it seems that mixed reality is still very much a mystery to most. &nbsp;</span></p><p data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">What is mixed reality and how to experience it?&nbsp;</span></p><p data-dcnode-id="2716"><span data-dcnode-id="2720" instrument_node="">According to Microsoft, mixed reality is a blend of physical and digital worlds, unlocking natural and intuitive 3D human, computer, and environmental interactions. To put this in layman's terms, mixed reality mixes interactive holograms with our real-life environments. This </span><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/A_NeDEPKvcA"><span data-dcnode-id="2719" instrument_node="">video</span></a><span data-dcnode-id="2717" instrument_node=""> of Microsoft's Project X Ray game for Hololens shows how MR works, it will give you a very good idea of why this is such a cool technology for gaming. &nbsp;</span></p><p data-dcnode-id="2711"><span data-dcnode-id="2715" instrument_node="">Experiencing MR gaming is amazing but the cost of MR devices has been out of reach for most consumers. Before Nreal launched its MR glasses, now selling for under $700 at Verizon, the only options were Hololens 1 and 2 ($3,500) and Magic Leap 1 ($2,300). &nbsp;We think the Nreal &nbsp;Light MR Glasses are fantastic and priced competitively enough to reach a significant number of players. &nbsp;We are currently working on launching our XR Casino MR games on Nreal's platform. &nbsp;Nreal's mixed reality glasses are now available in Japan, South Korea, Europe and the US. &nbsp;Here's a </span><a data-dcnode-id="2713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/l-q8jAYVDsU"><span data-dcnode-id="2714" instrument_node="">video&nbsp;</span></a><span data-dcnode-id="2712" instrument_node="">of Chi Xu, founder and chief executive officer of Nreal talking about their recent success and future plans for global distribution.&nbsp;</span></p><p data-dcnode-id="2709"><img class="fr-fic fr-dib" data-dcnode-id="2710" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d19j0qt0x55bap.cloudfront.net/production/startups/612d33a3499ed56ef33393c2/campaign/images/desktop_742fc785-8711-4433-91ea-90896d1da84f.jpg&amp;raw" style="width: 100%; max-width: 100%;"></p><p data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">Best regards,&nbsp;</span></p><p data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">Dan&nbsp;</span></p><p data-dcnode-id="2703"><br data-dcnode-id="2704"></p><span data-dcnode-id="2702" instrument_node="">

><noscript data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=keaGXL81I6I" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></span><br data-dcnode-id="1978"></p><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Dear investors,&nbsp;</span></p><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">We are excited to update you on the progress of our sports betting games! &nbsp;We've updated our beta app version to include a sneak peek into our fantasy football game. Traditional fantasy football games are two dimensional, showing only a list of players available for drafting. &nbsp;Our extended reality version features the players and statistics in 3D, providing an immersive experience for drafting and managing players. Download our updated beta app today and check out our Augmented Reality mobile version. &nbsp;</span></p><p data-dcnode-id="1970"><a data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//testflight.apple.com/join/rQAopCYR"><span data-dcnode-id="1972" instrument_node="">iOS version of our mobile App&nbsp;</span></a></p><p data-dcnode-id="1967"><a data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drive.google.com/file/d/1PKplGOU7WkMq5iHzGykM8I1p3oSwOaDK/view%3Fusp%3Dsharing"><span data-dcnode-id="1969" instrument_node="">Android version of our mobile App</span></a></p><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Best regards,&nbsp;</span></p><p data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Dan&nbsp;</span></p><span data-dcnode-id="1962" instrument_node="">
</span></div><span data-dcnode-id="1960" instrument_node="">

</span><h4 class="update-title text-center" data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">
          Apple’s computerized glasses will be as powerful as a Mac and launch next year, top analyst says
        </span></h4><span data-dcnode-id="1951" instrument_node="">
</span><small class="update-timestamp" data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">
          5 months ago
        </span></small><span data-dcnode-id="1948" instrument_node="">
</span><div class="update-content" data-dcnode-id="1919"><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">Dear shareholders,&nbsp;</span></p><p data-dcnode-id="1940"><span data-dcnode-id="1944" instrument_node="">Further expanding on Apple's push into extended reality technologies,</span><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2021/11/26/apple-ar-glasses-to-launch-in-2022-according-to-top-analyst.html"><span data-dcnode-id="1943" instrument_node="">&nbsp;here is a recent article from CNBC</span></a><span data-dcnode-id="1941" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">Three key points from this article:&nbsp;</span></p><ul data-dcnode-id="1927"><span data-dcnode-id="1937" instrument_node="">
</span><li data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Apple’s computerized glasses will be as powerful as a Mac and launch at the end of 2022, according to top analyst Ming-Chi Kuo.</span></li><span data-dcnode-id="1934" instrument_node="">
</span><li data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">That likely means Apple will use a version of its own M1 processors to power the new glasses.</span></li><span data-dcnode-id="1931" instrument_node="">
</span><li data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Apple has long been rumored to release a pair of glasses that use augmented reality, the technology that overlays digital images on top of the real world.</span></li><span data-dcnode-id="1928" instrument_node="">
</span></ul><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">We believe that affordable augmented reality/mixed reality devices will be the catalyst for mass adoption of extended reality technologies. &nbsp;We are excited to see continued momentum in the space and feel we are well positioned to benefit from first mover's advantage in the industries we cater to.&nbsp;</span></p><p data-dcnode-id="1921"><span data-dcnode-id="1924" instrument_node="">Best regards, </span><br data-dcnode-id="1923"><span data-dcnode-id="1922" instrument_node="">Dan&nbsp;</span></p><span data-dcnode-id="1920" instrument_node="">
</span></div><span data-dcnode-id="1918" instrument_node="">

          Apple Could Replace the iPhone With Augmented-Reality Devices, Analyst Says
        </span></h4><span data-dcnode-id="1909" instrument_node="">
</span><small class="update-timestamp" data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">
          5 months ago
        </span></small><span data-dcnode-id="1906" instrument_node="">
</span><div class="update-content" data-dcnode-id="1884"><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1904" instrument_node="">Dear shareholders,</span><br data-dcnode-id="1903"><span data-dcnode-id="1902" instrument_node="">Apple's plans for augmented reality technology bodes well for us.  </span><a data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.barrons.com/articles/apple-stock-iphone-augmented-reality-device-51637941793"><span data-dcnode-id="1901" instrument_node="">Please read this article from Barron's</span></a><span data-dcnode-id="1899" instrument_node="">, here's a short extract from the article: &nbsp;</span></p><p data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">"Apple will launch an augmented-reality headset in the fourth quarter of 2022, and could sell more than a billion of the new devices over the next 10 years, one analyst asserted in a research note Friday."&nbsp;</span></p><p data-dcnode-id="1894"><br data-dcnode-id="1895"></p><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Best regards,&nbsp;</span></p><p data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Dan&nbsp;</span></p><p data-dcnode-id="1888"><br data-dcnode-id="1889"></p><p data-dcnode-id="1886"><br data-dcnode-id="1887"></p><span data-dcnode-id="1885" instrument_node="">
</span></div><span data-dcnode-id="1883" instrument_node="">

</span><h4 class="update-title text-center" data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">
          Grayscale Says Metaverse Is a Trillion-Dollar Market Opportunity
        </span></h4><span data-dcnode-id="1874" instrument_node="">
</span><small class="update-timestamp" data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">
          5 months ago
        </span></small><span data-dcnode-id="1871" instrument_node="">
</span><div class="update-content" data-dcnode-id="1844"><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Dear shareholders,&nbsp;</span></p><p data-dcnode-id="1863"><span data-dcnode-id="1867" instrument_node="">Greyscale Investments, the world's largest currency asset manager, issued a recent </span><a data-dcnode-id="1865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//grayscale.com/wp-content/uploads/2021/11/Grayscale_Metaverse_Report_Nov2021.pdf"><span data-dcnode-id="1866" instrument_node="">report</span></a><span data-dcnode-id="1864" instrument_node=""> on the metaverse and Web 3.0 Virtual Cloud Economies. &nbsp;They believe the potential market opportunity of these technologies is over 1 trillion US dollars. &nbsp;This report further solidifies our belief that we are very well positioned to capitalize on the growth of the metaverse and Web 3.0 economies as a disruptor in the iGaming and sports betting industries through our patent-pending blockchain-technology based cross technology platform for extended reality gaming and NFTs.</span></p><p data-dcnode-id="1861"><br data-dcnode-id="1862"></p><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">About Greyscale:&nbsp;</span></p><div data-dcnode-id="1846" title="Page 17"><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Founded in 2013, Grayscale Investments is the world’s largest digital currency asset manager. Through its family of investment products, Grayscale provides access and exposure to the digital currency asset class in the form of a security without the challenges of buying, storing, and safekeeping digital currencies directly. With a proven track record and unrivaled experience, Grayscale’s products operate within existing regulatory frameworks, creating secure and compliant exposure for investors. &nbsp;Grayscale is headquartered in Stamford, Connecticut.</span></p><span data-dcnode-id="1855" instrument_node="">
</span><p data-dcnode-id="1853"><br data-dcnode-id="1854"></p><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1851" instrument_node="">Best regards,</span><br data-dcnode-id="1850"><span data-dcnode-id="1849" instrument_node="">Dan</span></p><span data-dcnode-id="1847" instrument_node="">
</span></div><span data-dcnode-id="1845" instrument_node="">
</span></div><span data-dcnode-id="1843" instrument_node="">

</span></div><span data-dcnode-id="1839" instrument_node="">
</span><div class="row update margin-bottom hide" data-dcnode-id="1811"><span data-dcnode-id="1838" instrument_node="">
</span><div class="col-xs-12 col-lg-10 col-lg-offset-1 update-body" data-dcnode-id="1813"><span data-dcnode-id="1837" instrument_node="">
</span><h4 class="update-title text-center" data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">
          Nreal’s $599 mixed reality glasses are launching in the US on Verizon!
        </span></h4><span data-dcnode-id="1834" instrument_node="">
</span><small class="update-timestamp" data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">
          5 months ago
        </span></small><span data-dcnode-id="1831" instrument_node="">
</span><div class="update-content" data-dcnode-id="1815"><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Dear shareholders,&nbsp;</span></p><p data-dcnode-id="1823"><span data-dcnode-id="1827" instrument_node="">We are excited to see </span><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//venturebeat.com/2021/11/18/nreal-light-ar-glasses-hit-u-s-verizon-stores-on-november-30/"><span data-dcnode-id="1826" instrument_node="">Nreal's launch of its mixed reality glasses&nbsp;</span></a><span data-dcnode-id="1824" instrument_node="">through sales at Verizon stores starting on November 28, 2021 and online on December 2, 2021. &nbsp;The Nreal Light is priced for mass adoption at $599 and works with a number of Android phones. Nreal will have a first mover advantage over Apple, Meta, Google, Microsoft and Amazon. &nbsp;Mixed reality glasses facilitate playing our games and deliver a new and exciting gaming experience. We believe we are well positioned to capitalize on the mass adoption of mixed reality glasses. &nbsp;</span></p><p data-dcnode-id="1821"><br data-dcnode-id="1822"></p><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Best regards,&nbsp;</span></p><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Dan</span></p><span data-dcnode-id="1816" instrument_node="">

          SiGMA Malta update

        </span></small><span data-dcnode-id="1767" instrument_node="">

</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Dear shareholders,&nbsp;</span></p><p data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">We're excited to report our progress from Malta! We've met with a number of key players in the iGaming space to demo our games. The common reaction to our games has been a loud "Wow!" and a big smile. &nbsp;None of the attending companies to the conference have AR or MR games nor any cross technology gaming solutions. &nbsp;We have first-mover's advantage and we are working around the clock to make the necessary partnerships to get to market as soon as possible. &nbsp;Please continue to support our equity crowdfunding campaign and share the campaign page with friends and family, it is imperative that we raise the capital needed to execute on our strategy.&nbsp;</span></p><p data-dcnode-id="1760"><br data-dcnode-id="1761"></p><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Thank you and best regards,&nbsp;</span></p><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Dan&nbsp;</span></p><span data-dcnode-id="1755" instrument_node="">

</span><div class="update-content" data-dcnode-id="1712"><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Dear investors,&nbsp;</span></p><p data-dcnode-id="1733"><span data-dcnode-id="1737" instrument_node="">We're in Malta this week attending the </span><a data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sigma.world/"><span data-dcnode-id="1736" instrument_node="">SiGMA</span></a><span data-dcnode-id="1734" instrument_node=""> conference. SiGMA is known for featuring cutting edge content and being the purveyor of the latest iGaming news. &nbsp;The event is a good opportunity to expose our brand to the iGaming community and network with leaders in the iGaming industry and investors. &nbsp;We will update you during this week's event.&nbsp;</span></p><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Regards from Malta!</span></p><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Dan&nbsp;</span></p><p data-dcnode-id="1727"><br data-dcnode-id="1728"></p><p data-dcnode-id="1725"><img class="fr-fic fr-dib" data-dcnode-id="1726" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d19j0qt0x55bap.cloudfront.net/production/startups/612d33a3499ed56ef33393c2/campaign/images/desktop_a349a061-0be8-4dcd-b7a2-e5a936e99a4c.jpg&amp;raw" style="width: 100%; max-width: 100%;"></p><p data-dcnode-id="1720"><strong data-dcnode-id="1721"><span data-dcnode-id="1723" style="font-size: 30px;"><span data-dcnode-id="1724" instrument_node="">Our AR games are huge! :))</span></span><span data-dcnode-id="1722" instrument_node=""> </span></strong></p><p data-dcnode-id="1718"><br data-dcnode-id="1719"></p><p data-dcnode-id="1716"><img class="fr-fic fr-dib" data-dcnode-id="1717" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d19j0qt0x55bap.cloudfront.net/production/startups/612d33a3499ed56ef33393c2/campaign/images/desktop_92cb0305-1c83-4866-b95a-0485ce63f
