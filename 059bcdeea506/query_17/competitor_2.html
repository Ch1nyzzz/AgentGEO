</span></div><section class="single-post" data-dcnode-id="1080" id="page"><span data-dcnode-id="1390" instrument_node="">
</span><div class="container" data-dcnode-id="1082"><span data-dcnode-id="1389" instrument_node="">
</span><h1 class="title mt-5" data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Enterprise XR Solutions 2021 Year in Review</span></h1><span data-dcnode-id="1386" instrument_node="">
</span><div class="post-meta" data-dcnode-id="1364"><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1379"><span class="pe-7s-date" data-dcnode-id="1384"></span><span data-dcnode-id="1383" instrument_node=""> Date: </span><span class="value" data-dcnode-id="1380"><span data-dcnode-id="1382" instrument_node="">December 31 2021</span><span class="value" data-dcnode-id="1381"></span></span></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1366"><span class="pe-7s-ticket" data-dcnode-id="1377"></span><span data-dcnode-id="1376" instrument_node=""> Categories: 
											</span><a data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thearea.org/category/news/"><span data-dcnode-id="1375" instrument_node="">AR News</span></a><span data-dcnode-id="1373" instrument_node="">, 											</span><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thearea.org/category/news/news-members/"><span data-dcnode-id="1372" instrument_node="">Members</span></a><span data-dcnode-id="1370" instrument_node="">, 											</span><a data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thearea.org/category/news/news-providers/"><span data-dcnode-id="1369" instrument_node="">Providers</span></a><span data-dcnode-id="1367" instrument_node=""> </span></p><span data-dcnode-id="1365" instrument_node="">
</span></div><span data-dcnode-id="1363" instrument_node="">
</span><div class="intro" data-dcnode-id="1356"><p data-dcnode-id="1358"><span data-dcnode-id="1362" instrument_node="">AREA Partner BrainXChange, has put together a brilliant Year in Review for Enterprise XR during 2021, written by Emily Friedman. You can read it on their </span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brainxchange.com/blog/year-in-review-enterprise-xr-solutions" rel="noopener" target="_blank"><span data-dcnode-id="1361" instrument_node="">blog here</span></a><span data-dcnode-id="1359" instrument_node=""> and it is reprinted below.</span></p><span data-dcnode-id="1357" instrument_node="">
</span></div><span data-dcnode-id="1355" instrument_node="">
</span><div class="content" data-dcnode-id="1105"><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1353" instrument_node="">Over the course of 2021,&nbsp;</span><strong data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Big Tech went all in on immersive collaboration</span></strong><span data-dcnode-id="1350" instrument_node="">&nbsp;and anticipation certainly grew for a game changing XR device (or two) from Apple. 2021 was also the year of the word ‘Metaverse,’ which we see as any immersive world where you might have your next team meeting or interact with brands. Let’s see what the major players in enterprise XR unveiled and acquired this year:</span></p><span data-dcnode-id="1348" instrument_node="">
</span><h3 data-dcnode-id="1344"><em data-dcnode-id="1345"><strong data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">AUGMENTED/MIXED REALITY</span></strong></em></h3><span data-dcnode-id="1343" instrument_node="">
</span><h4 data-dcnode-id="1340"><strong data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">MICROSOFT</span></strong></h4><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1338" instrument_node="">Microsoft’s activities this year made it clear the company is focusing on collaborative XR and, more generally, the future of work. In March, Microsoft announced&nbsp;</span><a data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wired.com/story/hololens-mesh-microsoft-ignite-2021/"><span data-dcnode-id="1337" instrument_node="">Mesh</span></a><span data-dcnode-id="1335" instrument_node="">, a new platform for building multi-user XR apps or shared virtual experiences connecting people in different locations. Mesh will be&nbsp;</span><a data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theverge.com/2021/11/2/22758974/microsoft-teams-metaverse-mesh-3d-avatars-meetings-features"><span data-dcnode-id="1334" instrument_node="">brought into</span></a><span data-dcnode-id="1332" instrument_node="">&nbsp;Microsoft Teams in 2022, allowing colleagues to meet as avatars in mixed reality.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><h4 data-dcnode-id="1327"><strong data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">META (FORMERLY FACEBOOK)</span></strong></h4><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1325" instrument_node="">Facebook rebranded as Meta in 2021 in a PR move to distance the company from controversy, or as leadership claims, to convey the company’s new aim of building the metaverse. Meta also made its AR entrance with a pair of glasses developed in collaboration with Ray-Ban. The company’s 10-year plan for AR, however, is much more ambitious, as revealed in a&nbsp;</span><a data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tech.fb.com/inside-facebook-reality-labs-the-next-era-of-human-computer-interaction/"><span data-dcnode-id="1324" instrument_node="">blog post</span></a><span data-dcnode-id="1322" instrument_node="">&nbsp;from Facebook Reality Labs. This includes developing its&nbsp;</span><a data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.entrepreneur.com/article/374063"><span data-dcnode-id="1321" instrument_node="">own operating system</span></a><span data-dcnode-id="1319" instrument_node="">&nbsp;for AR and a mixed reality headset code named&nbsp;</span><a data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadtovr.com/meta-project-cambria-leak-model/"><span data-dcnode-id="1318" instrument_node="">Project Cambria</span></a><span data-dcnode-id="1316" instrument_node="">.</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1313" instrument_node="">On the VR front, Meta is eyeing the enterprise market: In addition to rebooting its&nbsp;</span><a data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadtovr.com/facebook-quest-business-enterprise-reboot/"><span data-dcnode-id="1312" instrument_node="">business tools</span></a><span data-dcnode-id="1310" instrument_node="">&nbsp;for the consumer Oculus Quest 2, Facebook surprise launched&nbsp;</span><a data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadtovr.com/facebook-horizon-workrooms-launch/"><span data-dcnode-id="1309" instrument_node="">Horizon Workrooms</span></a><span data-dcnode-id="1307" instrument_node="">&nbsp;in August, a VR meeting app for remote collaboration, and just this month released its latest&nbsp;</span><a data-dcnode-id="1305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadtovr.com/facebooks-oculus-avatar-sdk-release/"><span data-dcnode-id="1306" instrument_node="">avatar system</span></a><span data-dcnode-id="1304" instrument_node="">&nbsp;to all Unity developers. If Meta’s intentions aren’t clear enough, nearly a fifth of its employees are now working on AR/VR. (Pay attention to the competition between Meta and Microsoft for top virtual collaboration solution in 2022.)</span></p><span data-dcnode-id="1302" instrument_node="">
</span><h4 data-dcnode-id="1299"><strong data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">GOOGLE and CISCO</span></strong></h4><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1297" instrument_node="">Both Google and Cisco made moves to make existing video meeting apps more immersive: In July,&nbsp;</span><a data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//9to5google.com/2021/07/14/google-glass-enterprise-meet-open-beta/"><span data-dcnode-id="1296" instrument_node="">Google Meet</span></a><span data-dcnode-id="1294" instrument_node="">&nbsp;became available to all Google Workspace customers on the Glass Enterprise Edition 2. A few months later, Cisco unveiled&nbsp;</span><a data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zdnet.com/article/cisco-unveils-webex-hologram-for-ar-meetings/"><span data-dcnode-id="1293" instrument_node="">Webex Hologram</span></a><span data-dcnode-id="1291" instrument_node="">. Cisco says its photorealistic, real-time holograms – as opposed to Meta’s avatars – make virtual meetings more realistic and engaging. In other Google news,&nbsp;</span><a data-dcnode-id="1289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arstechnica.com/gadgets/2021/12/google-is-building-a-new-augmented-reality-device-and-operating-system/"><span data-dcnode-id="1290" instrument_node="">new job listings</span></a><span data-dcnode-id="1288" instrument_node="">&nbsp;recently revealed the giant’s plans to create a new “Augmented Reality OS” for an unspecified “innovative AR device” intended to reach “billions.”</span></p><span data-dcnode-id="1286" instrument_node="">
</span><h4 data-dcnode-id="1283"><strong data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">MAGIC LEAP</span></strong></h4><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1281" instrument_node="">Magic Leap has been hard at work on its next-gen headset Magic Leap 2, which is set to debut in 2022 and already being used by select partners through an early access program. Here’s&nbsp;</span><a data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadtovr.com/magic-leap-2-specs-release-date-500-million-investment/"><span data-dcnode-id="1280" instrument_node="">what we know</span></a><span data-dcnode-id="1278" instrument_node="">&nbsp;about the upcoming enterprise-focused device: Magic Leap 2 is reportedly half the size and 20% lighter than its predecessor, with a doubled field of view and 3-4x the processing power. Meant to be an “all day, every day” device, additional improvements include improved color fidelity, text legibility, and image quality. Magic Leap also raised $500 million in new capital this year.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><h4 data-dcnode-id="1273"><strong data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">LENOVO</span></strong></h4><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1271" instrument_node="">In 2021, Lenovo introduced its&nbsp;</span><a data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.qualcomm.com/news/onq/2021/08/16/how-snapdragon-xr1-powers-lenovo-thinkreality-a3-smart-glasses-and-moto-g100"><span data-dcnode-id="1270" instrument_node="">ThinkReality A3 glasses</span></a><span data-dcnode-id="1268" instrument_node="">: The Industrial Edition tethers to a smartphone via USB-C for use in manufacturing, energy, and engineering, while a PC Edition is geared more towards office workers. Lenovo also&nbsp;</span><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//realwear.com/newsroom/press-releases/lenovo-and-realwear-join-forces"><span data-dcnode-id="1267" instrument_node="">certified</span></a><span data-dcnode-id="1265" instrument_node="">&nbsp;the RealWear HMT-1 for its ThinkReality platform, and announced it will offer RealWear’s HMT-1 family of devices through its global sales network.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><h4 data-dcnode-id="1260"><strong data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Notable Mentions</span></strong></h4><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1258" instrument_node="">IRISTICK revealed its Visor Ex-01 smart glasses for hazardous areas in 2021, while Vuzix introduced Vuzix Shield, its first binocular AR smart glasses.&nbsp;</span><a data-dcnode-id="1256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadtovr.com/campfire-mr-headset-seed-investment-remote-collaboration/"><span data-dcnode-id="1257" instrument_node="">Campfire</span></a><span data-dcnode-id="1255" instrument_node="">&nbsp;raised $8 million, as well, to build an integrated hardware and software platform partially on the bones of failed startup Meta. In July, the company announced it’s working on holographic collaboration.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><h3 data-dcnode-id="1249"><em data-dcnode-id="1250"><strong data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">VIRTUAL REALITY</span></strong></em></h3><span data-dcnode-id="1248" instrument_node="">
</span><h4 data-dcnode-id="1245"><strong data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">PICO</span></strong></h4><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1243" instrument_node="">2021 was a good year for Pico, which&nbsp;</span><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadtovr.com/pico-interactive-37m-neo-3-release/"><span data-dcnode-id="1242" instrument_node="">raised</span></a><span data-dcnode-id="1240" instrument_node="">&nbsp;$37 million and&nbsp;</span><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadtovr.com/pico-neo-3-pro-eye-release-date-price/"><span data-dcnode-id="1239" instrument_node="">launched</span></a><span data-dcnode-id="1237" instrument_node="">&nbsp;its next-gen headsets. The Pico Neo 3 Pro and Neo 3 Pro Eye (which includes Tobii eye tracking tech) are priced at $700 and $900 respectively, undercutting both Oculus and HTC.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><h4 data-dcnode-id="1232"><strong data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">HP</span></strong></h4><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1230" instrument_node="">HP’s Reverb G2 Omnicept Edition, first announced in September 2020,&nbsp;</span><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/hp-reverb-g2-omnicept-shipping/"><span data-dcnode-id="1229" instrument_node="">became available</span></a><span data-dcnode-id="1227" instrument_node="">&nbsp;in May. Priced at $1,250, the headset provides a wealth of data that can enhance training applications, with sensors for tracking eye movement, pupil size, facial expressions, and heart rate. (</span><a data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DrAEZsv9HeYA"><span data-dcnode-id="1226" instrument_node="">Watch</span></a><span data-dcnode-id="1224" instrument_node="">&nbsp;HP’s Elias Stephan speak about the Omnicept Edition at EWTS 2021).</span></p><span data-dcnode-id="1222" instrument_node="">
</span><h4 data-dcnode-id="1219"><strong data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">HTC</span></strong></h4><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1217" instrument_node="">HTC&nbsp;</span><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//venturebeat.com/2021/05/11/htc-vive-launches-2-vr-headsets-and-pro-tools-for-enterprises/"><span data-dcnode-id="1216" instrument_node="">launched</span></a><span data-dcnode-id="1214" instrument_node="">&nbsp;two VR headsets in the Spring, along with pro tools for enterprise. The $1,300 HTC Vive Focus 3 is a business headset with 5k resolution, spatial audio, a 120-degree field of view, and new controllers. HTC also unveiled Vive Business, a suite of tools for applications like training, meetings, design reviews, and more.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><h4 data-dcnode-id="1209"><strong data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">VARJO</span></strong></h4><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1207" instrument_node="">In June, Varjo unveiled its&nbsp;</span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//venturebeat.com/2021/06/24/varjo-reality-cloud-lets-you-virtually-experience-a-real-place-via-teleportation/"><span data-dcnode-id="1206" instrument_node="">Reality Cloud</span></a><span data-dcnode-id="1204" instrument_node="">&nbsp;platform, which allows you to scan a room and share it in photorealistic detail with someone remotely in near real time (essentially teleportation).&nbsp;</span><a data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.roadtovr.com/varjo-aero-price-specs-release-date-announcement/"><span data-dcnode-id="1203" instrument_node="">Varjo Aero</span></a><span data-dcnode-id="1201" instrument_node="">, a $2,000 pared down version of Varjo’s XR-3 headset for smaller businesses and wealthy enthusiasts, arrived in October; and Varjo showcased Varjo Lab Tools with which users can bring parts of the real world into VR. In addition, a VR training solution by Varjo and VRM Switzerland&nbsp;</span><a data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auganix.org/varjo-and-vrm-switzerlands-virtual-reality-aviation-training-device-first-to-receive-approval-from-european-union-aviation-safety-agency/"><span data-dcnode-id="1200" instrument_node="">became the first</span></a><span data-dcnode-id="1198" instrument_node="">&nbsp;to receive approval from the European Union Aviation Safety Agency, allowing pilots to earn credited training hours in virtual reality.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><h3 data-dcnode-id="1192"><em data-dcnode-id="1193"><strong data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">SOFTWARE</span></strong></em></h3><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1184"><strong data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Remote Collaboration</span></strong><span data-dcnode-id="1188" instrument_node="">: Arvizio&nbsp;</span><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//next.reality.news/news/arvizio-brings-ar-collaboration-zoom-meetings-with-immerse-3d-app-for-smartphones-hololens-magic-leap-0384322/"><span data-dcnode-id="1187" instrument_node="">revealed</span></a><span data-dcnode-id="1185" instrument_node="">&nbsp;Immerse 3D for iOS, Android, HoloLens, and Magic Leap, allowing users to interact simultaneously with the same 3D model in AR, for instance, during collaborative meetings on Microsoft Teams, Zoom, etc.</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1176"><strong data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Easier AR</span></strong><span data-dcnode-id="1180" instrument_node="">: Scope AR lowered the bar for AR creation in enterprise with&nbsp;</span><a data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techcrunch.com/2021/02/24/scope-ar-launches-a-browser-based-ar-creation-platform-for-the-enterprise/"><span data-dcnode-id="1179" instrument_node="">WorkLink Create</span></a><span data-dcnode-id="1177" instrument_node="">, a browser-based AR platform enabling industrial professionals to author 3D content without coding.</span></p><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1165"><strong data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Expanding footprint</span></strong><span data-dcnode-id="1172" instrument_node="">: TeamViewer&nbsp;</span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasdaq.com/articles/teamviewer-acquires-u.s.-augmented-reality-software-firm-upskill-2021-03-02-0"><span data-dcnode-id="1171" instrument_node="">acquired</span></a><span data-dcnode-id="1169" instrument_node="">&nbsp;Upskill in 2021 and announced a&nbsp;</span><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auganix.org/teamviewer-partners-with-google-cloud-to-deliver-enterprise-augmented-reality-solutions-on-google-glass/"><span data-dcnode-id="1168" instrument_node="">partnership</span></a><span data-dcnode-id="1166" instrument_node="">&nbsp;with Google Cloud to co-develop and market AR solutions built on Google Cloud. Assisted Order Picking is the first jointly developed solution, leveraging Google Glass Enterprise Edition 2 and TeamViewer’s Frontline solution.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1157"><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">PTC &amp; Matterport</span></strong><span data-dcnode-id="1161" instrument_node="">: In April, PTC&nbsp;</span><a data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ien.eu/article/ptc-leverages-spatial-computing-capabilities-with-vuforia-engine-area-targets/"><span data-dcnode-id="1160" instrument_node="">announced</span></a><span data-dcnode-id="1158" instrument_node="">&nbsp;Vuforia Engine Area Targets. With support from Matterport, Leica 3D scanners, and NavVis’ indoor mobile mapping systems. Area Targets allows users to create digital twins of large spaces (think factories, malls, etc.). The integration of Matterport with PTC’s Vuforia platform can enrich enterprise applications such as wayfinding, virtual training, and real-time information retrieval.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1146"><strong data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Eye tracking</span></strong><span data-dcnode-id="1153" instrument_node="">: With eye tracking becoming the standard for next-gen VR headsets, WorldViz announced both&nbsp;</span><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prnewswire.com/news-releases/create-virtual-reality-research-studies-with-vizard-7-software-toolkit-301226718.html"><span data-dcnode-id="1152" instrument_node="">Vizard 7</span></a><span data-dcnode-id="1150" instrument_node="">, a platform for academic research and professional applications that integrates with over 150 VR devices, and&nbsp;</span><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//finance.yahoo.com/news/create-virtual-reality-eye-tracking-123300120.html"><span data-dcnode-id="1149" instrument_node="">SightLab VR</span></a><span data-dcnode-id="1147" instrument_node="">, a drag-and-drop tool allowing anyone to set up and run eye tracking experiments in VR.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><h3 data-dcnode-id="1141"><em data-dcnode-id="1142"><strong data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">QUALCOMM &amp; NVIDIA</span></strong></em></h3><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1139" instrument_node="">Among other 2021 highlights, Qualcomm&nbsp;</span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theverge.com/2021/11/9/22771850/qualcomm-ar-sdk-snapdragon-spaces-mixed-reality-metaverse"><span data-dcnode-id="1138" instrument_node="">revealed</span></a><span data-dcnode-id="1136" instrument_node="">&nbsp;Snapdragon Spaces XR Developer Platform, a kit to help developers build head-worn AR experiences. (As of November, Lenovo’s ThinkReality A3 glasses are the only supported hardware.) Competitor NVIDIA&nbsp;</span><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//finance.yahoo.com/news/nvidia-brings-millions-more-metaverse-153700953.html"><span data-dcnode-id="1135" instrument_node="">expanded</span></a><span data-dcnode-id="1133" instrument_node="">&nbsp;its Omniverse platform allowing designers and reviewers to work together in real time in a virtual world. Available through a $9,000 annual subscription plan, NVIDIA hopes Omniverse will deliver the foundation for the metaverse…at least in enterprise.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1128"><em data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">____</span></em></p><span data-dcnode-id="1127" instrument_node="">
