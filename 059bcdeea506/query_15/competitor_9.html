de-id="4641" instrument_node="">. </span><span data-dcnode-id="4640" instrument_node="">Results</span></h2><p data-dcnode-id="4625" id="par0190"><span data-dcnode-id="4638" instrument_node="">This study employed a structural equation modeling (SEM) approach to test the hypotheses proposed in </span><a class="workspace-trigger" data-dcnode-id="4636" href="#fig0005" name="bfig0005"><span data-dcnode-id="4637" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4635" instrument_node="">. SEM is designed to evaluate how well a proposed model or hypothetical construct explains the collected data [</span><a class="workspace-trigger" data-dcnode-id="4633" href="#bib0250" name="bbib0250"><span data-dcnode-id="4634" instrument_node="">50</span></a><span data-dcnode-id="4632" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="4630" href="#bib0255" name="bbib0255"><span data-dcnode-id="4631" instrument_node="">51</span></a><span data-dcnode-id="4629" instrument_node="">]. It uses a two-step hybrid method, specifying a measurement model in confirmatory factor analysis (CFA) and testing a latent structural model developed from the measurement model [</span><a class="workspace-trigger" data-dcnode-id="4627" href="#bib0260" name="bbib0260"><span data-dcnode-id="4628" instrument_node="">52</span></a><span data-dcnode-id="4626" instrument_node="">].</span></p><section data-dcnode-id="4391" id="sec0070"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4621" id="sect0085"><span data-dcnode-id="4624" instrument_node="">5.1</span><span data-dcnode-id="4623" instrument_node="">. </span><span data-dcnode-id="4622" instrument_node="">Confirmatory factor analysis</span></h3><p data-dcnode-id="4616" id="par0195"><span data-dcnode-id="4620" instrument_node="">We assessed the constructs for convergent validity and </span><a class="topic-link" data-dcnode-id="4618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/discriminant-validity" title="Learn more about discriminant validity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4619" instrument_node="">discriminant validity</span></a><span data-dcnode-id="4617" instrument_node=""> through CFA using AMOS 23. In CFA, the measurement model is revised by dropping items that share a high degree of residual variance with other items and have high modification indices (MIs). The MIs indicate the decrease in the chi-square value when a specific parameter that had been constrained is relaxed. Although 21 measurement items were adopted at first, five were eliminated for satisfactory model fit.</span></p><p data-dcnode-id="4587" id="par0200"><span data-dcnode-id="4615" instrument_node="">For a good model fit, χ</span><sup data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">2</span></sup><span data-dcnode-id="4612" instrument_node="">/df should be less than 3.0 [</span><a class="workspace-trigger" data-dcnode-id="4610" href="#bib0265" name="bbib0265"><span data-dcnode-id="4611" instrument_node="">53</span></a><span data-dcnode-id="4609" instrument_node="">], the goodness of fit index (GFI) should be greater than 0.90 [</span><a class="workspace-trigger" data-dcnode-id="4607" href="#bib0270" name="bbib0270"><span data-dcnode-id="4608" instrument_node="">54</span></a><span data-dcnode-id="4606" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="4604" href="#bib0275" name="bbib0275"><span data-dcnode-id="4605" instrument_node="">55</span></a><span data-dcnode-id="4603" instrument_node="">], the adjusted goodness of fit index (AGFI) more than 0.80 [</span><a class="workspace-trigger" data-dcnode-id="4601" href="#bib0255" name="bbib0255"><span data-dcnode-id="4602" instrument_node="">51</span></a><span data-dcnode-id="4600" instrument_node="">], the normed fit index more than 0.9 [</span><a class="workspace-trigger" data-dcnode-id="4598" href="#bib0270" name="bbib0270"><span data-dcnode-id="4599" instrument_node="">54</span></a><span data-dcnode-id="4597" instrument_node="">], the comparative fit index (CFI) more than 0.9 [</span><a class="workspace-trigger" data-dcnode-id="4595" href="#bib0250" name="bbib0250"><span data-dcnode-id="4596" instrument_node="">50</span></a><span data-dcnode-id="4594" instrument_node="">], and the root mean square error of approximation (RMSEA) less than 0.07 [</span><a class="workspace-trigger" data-dcnode-id="4592" href="#bib0250" name="bbib0250"><span data-dcnode-id="4593" instrument_node="">50</span></a><span data-dcnode-id="4591" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="4589" href="#bib0275" name="bbib0275"><span data-dcnode-id="4590" instrument_node="">55</span></a><span data-dcnode-id="4588" instrument_node="">].</span></p><p data-dcnode-id="4576" id="par0205"><span data-dcnode-id="4586" instrument_node="">An assessment of the measurement model suggested an acceptable model fit (χ</span><sup data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">2</span></sup><span data-dcnode-id="4583" instrument_node=""> = 142.62, df = 89 (χ</span><sup data-dcnode-id="4581"><span data-dcnode-id="4582" instrument_node="">2</span></sup><span data-dcnode-id="4580" instrument_node="">/df = 1.602), p &lt; 0.001, Goodness of Fit (GFI) = 0.939, Adjusted GFI (AGFI) = 0.907, Normed-Fit Index (NFI) = 0.951, Comparative Fit Index (CFI) = 0.981, and Root Mean Square Error of Approximation (RMSEA) = 0.047). To test reliability and validity, we checked whether the values of composite reliability (CR greater than 0.7), Cronbach’s alpha (greater than 0.7), and average variance extracted ((AVE) greater than 0.5)) were greater than their thresholds. </span><a class="workspace-trigger" data-dcnode-id="4578" href="#tbl0010" name="btbl0010"><span data-dcnode-id="4579" instrument_node="">Table 2</span></a><span data-dcnode-id="4577" instrument_node=""> shows that all of them were satisfactory in terms of reliability and validity.</span></p><div data-dcnode-id="4392"><p data-dcnode-id="4569" id="par0210"><a class="workspace-trigger" data-dcnode-id="4574" href="#tbl0015" name="btbl0015"><span data-dcnode-id="4575" instrument_node="">Table 3</span></a><span data-dcnode-id="4573" instrument_node=""> shows that the values of the square root of AVE of each construct (diagonal elements) are greater than the correlations with other constructs, which indicates discriminant validity </span><a class="workspace-trigger" data-dcnode-id="4571" href="#bib0320" name="bbib0320"><span data-dcnode-id="4572" instrument_node="">[64]</span></a><span data-dcnode-id="4570" instrument_node="">.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4393" id="tbl0015"><span class="captions" data-dcnode-id="4562"><span data-dcnode-id="4563" id="cap0035"><p data-dcnode-id="4564" id="spar0035"><span class="label" data-dcnode-id="4567"><span data-dcnode-id="4568" instrument_node="">Table 3</span></span><span data-dcnode-id="4566" instrument_node="">. </span><span data-dcnode-id="4565" instrument_node="">Correlation and discrimination validity.</span></p></span></span><div class="groups" data-dcnode-id="4406"><table data-dcnode-id="4407"><thead class="valign-top" data-dcnode-id="4542"><tr class="rowsep-1" data-dcnode-id="4543"><th class="align-left" data-dcnode-id="4560" scope="col"><span data-dcnode-id="4561" instrument_node="">Constructs</span></th><th class="align-left" data-dcnode-id="4558" scope="col"><span data-dcnode-id="4559" instrument_node="">Mean</span></th><th class="align-left" data-dcnode-id="4556" scope="col"><span data-dcnode-id="4557" instrument_node="">S.D</span></th><th class="align-left" data-dcnode-id="4554" scope="col"><span data-dcnode-id="4555" instrument_node="">(1)</span></th><th class="align-left" data-dcnode-id="4552" scope="col"><span data-dcnode-id="4553" instrument_node="">(2)</span></th><th class="align a-dcnode-id="4299" instrument_node="">0.763***</span></td><td class="align-left" data-dcnode-id="4296"><span data-dcnode-id="4297" instrument_node="">–</span></td></tr><tr data-dcnode-id="4286"><th class="align-left" data-dcnode-id="4293" scope="row"><span data-dcnode-id="4294" instrument_node="">Entertainment → VR Museum experience</span></th><td class="align-left" data-dcnode-id="4291"><span data-dcnode-id="4292" instrument_node="">–</span></td><td class="align-left" data-dcnode-id="4287"><span data-dcnode-id="4290" instrument_node="">0.265</span><sup data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">n.s</span></sup></td></tr><tr data-dcnode-id="4279"><th class="align-left" data-dcnode-id="4284" scope="row"><span data-dcnode-id="4285" instrument_node="">Escapism →VR Museum experience</span></th><td class="align-left" data-dcnode-id="4282"><span data-dcnode-id="4283" instrument_node="">0.186**</span></td><td class="align-left" data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">0.568*</span></td></tr><tr data-dcnode-id="4272"><th class="align-left" data-dcnode-id="4277" scope="row"><span data-dcnode-id="4278" instrument_node="">Esthetic →VR Museum experience</span></th><td class="align-left" data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">0.798***</span></td><td class="align-left" data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">0.168*</span></td></tr><tr data-dcnode-id="4265"><th class="align-left" data-dcnode-id="4270" scope="row"><span data-dcnode-id="4271" instrument_node="">VR Museum experience → Offline museum visit intention</span></th><td class="align-left" data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">0.401***</span></td><td class="align-left" data-dcnode-id="4266"><span data-dcnode-id="4267" instrument_node="">0.400***　</span></td></tr><tr data-dcnode-id="4260"><th class="align-left" data-dcnode-id="4263" scope="row"><span data-dcnode-id="4264" instrument_node="">Model Fits</span></th><td class="align-left" data-dcnode-id="4262"></td><td class="align-left" data-dcnode-id="4261"></td></tr><tr data-dcnode-id="4246"><th class="align-left" data-dcnode-id="4255" scope="row"><span data-dcnode-id="4259" instrument_node="">χ </span><sup data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node="">2</span></sup><span data-dcnode-id="4256" instrument_node="">/DF</span></th><td class="align-left" data-dcnode-id="4251"><span data-dcnode-id="4254" instrument_node="">155.523/96</span><br data-dcnode-id="4253"><span data-dcnode-id="4252" instrument_node="">(1.620)</span></td><td class="align-left" data-dcnode-id="4247"><span data-dcnode-id="4250" instrument_node="">150.784/93</span><br data-dcnode-id="4249"><span data-dcnode-id="4248" instrument_node="">(1.621)</span></td></tr><tr data-dcnode-id="4239"><th class="align-left" data-dcnode-id="4244" scope="row"><span data-dcnode-id="4245" instrument_node="">GFI(≥0.9)</span></th><td class="align-left" data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">0.933</span></td><td class="align-left" data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">0.935</span></td></tr><tr data-dcnode-id="4232"><th class="align-left" data-dcnode-id="4237" scope="row"><span data-dcnode-id="4238" instrument_node="">AGFI(≥0.9)</span></th><td class="align-left" data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">0.905</span></td><td class="align-left" data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">0.905</span></td></tr><tr data-dcnode-id="4225"><th class="align-left" data-dcnode-id="4230" scope="row"><span data-dcnode-id="4231" instrument_node="">NFI(≥0.9)</span></th><td class="align-left" data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">0.947</span></td><td class="align-left" data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">0.949</span></td></tr><tr data-dcnode-id="4218"><th class="align-left" data-dcnode-id="4223" scope="row"><span data-dcnode-id="4224" instrument_node="">CFI(≥0.9)</span></th><td class="align-left" data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">0.979</span></td><td class="align-left" data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">0.979</span></td></tr><tr data-dcnode-id="4211"><th class="align-left" data-dcnode-id="4216" scope="row"><span data-dcnode-id="4217" instrument_node="">RMSEA(≤0.05)</span></th><td class="align-left" data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">0.048</span></td><td class="align-left" data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">0.048</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4205"></p><p data-dcnode-id="4206" id="spar0050"><span data-dcnode-id="4207" instrument_node="">*p &lt; 0.05, **p &lt; 0.01, ***p &lt; 0.001, n.s = nonsignificant.</span></p><p></p></div></div><p data-dcnode-id="4195" id="par0220"><span data-dcnode-id="4202" instrument_node="">The χ</span><sup data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">2</span></sup><span data-dcnode-id="4199" instrument_node=""> statistic fit was 155.523, with 96 degrees of freedom (χ</span><sup data-dcnode-id="4197"><span data-dcnode-id="4198" instrument_node="">2</span></sup><span data-dcnode-id="4196" instrument_node="">/df = 1.620, p &lt; 0.000). The GFI was 0.933, the AGFI was 0.905, the NFI was 0.947, the CFI was 0.979, and the RMSEA was 0.048.</span></p><p data-dcnode-id="4172" id="par0225"><span data-dcnode-id="4194" instrument_node="">The results show that all hypotheses are supported. To be more specific, hypotheses H</span><sub data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">1</span></sub><span data-dcnode-id="4191" instrument_node="">, H</span><sub data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">2</span></sub><span data-dcnode-id="4188" instrument_node="">, H</span><sub data-dcnode-id="4186"><span data-dcnode-id="4187" instrument_node="">3,</span></sub><span data-dcnode-id="4185" instrument_node=""> and H</span><sub data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">4</span></sub><span data-dcnode-id="4182" instrument_node=""> address the relationship between absorptive (education and entertainment) and immersive (escapism and esthetic) experiences. Both absorptive experiences were found to have a significant and positive influence on immersion. The results show that education has a slightly stronger influence on escapism (β = 0.339, t-value = 4.098, p &lt; 0.001) than on esthetics (β = 0.265, t-value = 4.535, p &lt; 0.001), while entertainment has a stronger influence on esthetics (β = 0.763, t-value = 11.254, p &lt; 0.001) than on escapism (β = 0.385, t-value = 4.872, p &lt; 0.001). Hypotheses H</span><sub data-dcnode-id="4180"><span data-dcnode-id="4181" instrument_node="">5</span></sub><span data-dcnode-id="4179" instrument_node=""> and H</span><sub data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">6</span></sub><span data-dcnode-id="4176" instrument_node=""> address the relationships between immersion and overall museum experience. The results show that both escapism (β = 0.186, t-value = 3.226, p &lt; 0.01) and esthetics (β = 0.798, t-value = 10.882, p &lt; 0.001) have an impact on museum experience. Particularly, esthetics was found to be the strongest predictor of museum experience. Finally, hypothesis H</span><sub data-dcnode-id="4174"><span data-dcnode-id="4175" instrument_node="">7</span></sub><span data-dcnode-id="4173" instrument_node=""> addresses the relationship between museum experience and museum visit intention, and the results show that museum experience has a significant influence on museum visit intention (β = 0.401, t-value = 5.884, p &lt; 0.001). Thus, all the hypotheses are supported.</span></p></section><section data-dcnode-id="4076" id="sec0080"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4167" id="sect0095"><span data-dcnode-id="4170" instrument_node="">5.3</span><span data-dcnode-id="4169" instrument_node="">. </span><span data-dcnode-id="4168" instrument_node="">Competing model testing</span></h3><p data-dcnode-id="4162" id="par0230"><span data-dcnode-id="4166" instrument_node="">As numerous previous studies have regarded the direct effects of four realms of the experience economy (e.g., [</span><a class="workspace-trigger" data-dcnode-id="4164" href="#bib0035" name="bbib0035"><span data-dcnode-id="4165" instrument_node="">7</span></a><span data-dcnode-id="4163" instrument_node="">]), it is necessary to check whether the proposed model is better than its rival model. The strongest test of the proposed model is to identify and test competing models that represent different hypothetical structural relationships. Thus, this competing models strategy was adopted as a means of evaluating the proposed model versus rival models.</span></p><div data-dcnode-id="4101"><p data-dcnode-id="4150" id="par0235"><span data-dcnode-id="4161" instrument_node="">In the proposed model, education and entertainment influence overall VR museum experience through escapism and esthetics. The model does not have direct paths between escapism and esthetics despite the fact that absorption has been associated with overall experience in past research. On the other hand, the rival model shown in </span><a class="workspace-trigger" data-dcnode-id="4159" href="#fig0015" name="bfig0015"><span data-dcnode-id="4160" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4154"><span data-dcnode-id="4158" instrument_node=""> has direct effects. Escapism and esthetics are not allowed to mediate in any of the relationships. It posits only direct paths to overall VR museum experience. The rival model was also examined for </span><a class="topic-link" data-dcnode-id="4156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/explanatory-power" title="Learn more about explanatory power from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4157" instrument_node="">explanatory power</span></a><span data-dcnode-id="4155" instrument_node=""> and path significance using a bootstrapping technique (</span></span><a class="workspace-trigger" data-dcnode-id="4152" href="#fig0020" name="bfig0020"><span data-dcnode-id="4153" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4151" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="4126" id="fig0015"><span data-dcnode-id="4134"><img alt="Fig. 3" aria-describedby="cap0015" data-dcnode-id="4149" height="269" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378720618310280-gr3.jpg&amp;raw"><span data-dcnode-id="4148" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4135"><li data-dcnode-id="4142"><a class="anchor download-link u-font-sans" data-dcnode-id="4143" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378720618310280-gr3_lrg.jpg" target="_blank" title="Download high-res image (140KB)"><span class="anchor-text" data-dcnode-id="4144"><span data-dcnode-id="4147" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">Download high-res image (140KB)</span></span></span></a></li><li data-dcnode-id="4136"><a class="anchor download-link u-font-sans" data-dcnode-id="4137" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378720618310280-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4138"><span data-dcnode-id="4141" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4127"><span data-dcnode-id="4128" id="cap0015"><p data-dcnode-id="4129" id="spar0015"><span class="label" data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">Fig. 3</span></span><span data-dcnode-id="4131" instrument_node="">. </span><span data-dcnode-id="4130" instrument_node="">Rival model.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="4102" id="fig0020"><span data-dcnode-id="4110"><img alt="Fig. 4" aria-describedby="cap0020" data-dcnode-id="4125" height="328" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378720618310280-gr4.jpg&amp;raw"><span data-dcnode-id="4124" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4111"><li data-dcnode-id="4118"><a class="anchor download-link u-font-sans" data-dcnode-id="4119" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378720618310280-gr4_lrg.jpg" target="_blank" title="Download high-res image (227KB)"><span class="anchor-text" data-dcnode-id="4120"><span data-dcnode-id="4123" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">Download high-res image (227KB)</span></span></span></a></li><li data-dcnode-id="4112"><a class="anchor download-link u-font-sans" data-dcnode-id="4113" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378720618310280-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4114"><span data-dcnode-id="4117" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4103"><span data-dcnode-id="4104" id="cap0020"><p data-dcnode-id="4105" id="spar0020"><span class="label" data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">Fig. 4</span></span><span data-dcnode-id="4107" instrument_node="">. </span><span data-dcnode-id="4106" instrument_node="">Results of the rival model.</span></p></span></span></figure></div><p data-dcnode-id="4093" id="par0240"><span data-dcnode-id="4100" instrument_node="">The alternative model in this study also has a good level of fit. The χ</span><sup data-dcnode-id="4098"><span data-dcnode-id="4099" instrument_node="">2</span></sup><span data-dcnode-id="4097" instrument_node=""> statistic fit was 150.784, with 93 degrees of freedom (χ</span><sup data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">2</span></sup><span data-dcnode-id="4094" instrument_node="">/df = 1.621, p &lt; 0.000). The GFI was 0.935, the AGFI was 0.905, the NFI was 0.949, the CFI was 0.979, and the RMSEA was 0.048.</span></p><p data-dcnode-id="4088" id="par0245"><span data-dcnode-id="4092" instrument_node="">Both absorptive experiences were found not to have had a significant influence on museum experience. The results show that education (β = -0.022, t-value = -0.205, n.s) and entertainment (β = 0.265, t-value = 1.333, n.s) do not have an influence on museum experience. However, both </span><a class="topic-link" data-dcnode-id="4090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/immersive-experience" title="Learn more about immersive experiences from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4091" instrument_node="">immersive experiences</span></a><span data-dcnode-id="4089" instrument_node=""> were found to have a significant and positive influence on museum experience. The results show that esthetics has a stronger influence on museum experience (β = 0.568, t-value = 2.000, p &lt; 0.05) than escapism (β = 0.168, t-value = 2.448, p &lt; 0.05). The results also show that museum experience has a significant influence on museum visit intention (β = 0.400, t-value = 5.859, p &lt; 0.001).</span></p><p data-dcnode-id="4077" id="par0250"><span data-dcnode-id="4087" instrument_node="">There are two criteria for comparing the two models: overall model fits and the percentages of the supported hypotheses [</span><a class="workspace-trigger" data-dcnode-id="4085" href="#bib0255" name="bbib0255"><span data-dcnode-id="4086" instrument_node="">51</span></a><span data-dcnode-id="4084" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="4082" href="#bib0280" name="bbib0280"><span data-dcnode-id="4083" instrument_node="">56</span></a><span data-dcnode-id="4081" instrument_node="">]. Although the proposed model and its rival have good and almost the same level of model fits, the former has a higher percentage of supported hypotheses than the latter (</span><a class="workspace-trigger" data-dcnode-id="4079" href="#tbl0020" name="btbl0020"><span data-dcnode-id="4080" instrument_node="">Table 4</span></a><span data-dcnode-id="4078" instrument_node="">). Specifically, 100% of hypotheses are supported, and six out of seven hypotheses (85.7%) are supported at p &lt; 0.001 in the proposed model, whereas only three out of five hypotheses (60.0%) are supported, and among them, only one hypothesis (20.0%) is supported at p &lt; 0.001. Therefore, the proposed model is better than the rival model, which means the process from absorption to immersion can be statistically significant in a VR environment.</span></p></section></section><section data-dcnode-id="4011" id="sec0085"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4071" id="sect0100"><span data-dcnode-id="4074" instrument_node="">6</span><span data-dcnode-id="4073" instrument_node="">. </span><span data-dcnode-id="4072" instrument_node="">Discussion and conclusion</span></h2><p data-dcnode-id="4062" id="par0255"><span data-dcnode-id="4066"><span data-dcnode-id="4070" instrument_node="">The aim of this study was twofold. The first aim was to investigate the effects of absorptive experiences (education and entertainment experiences) on immersion (e.g., escapism and esthetic experiences), overall museum experience, and intention to visit the actual museum; the other was to test whether the proposed model is better than its counterpart by comparing these two models’ fit and the percentage of supported hypotheses. The results show that absorptive experiences have a great influence on </span><a class="topic-link" data-dcnode-id="4068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/immersive-experience" title="Learn more about immersive experiences from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4069" instrument_node="">immersive experiences</span></a><span data-dcnode-id="4067" instrument_node="">, VR museum experience, and intention to physically visit the museum. These results are in line with the results of previous studies such as the study by Park et al. [</span></span><a class="workspace-trigger" data-dcnode-id="4064" href="#bib0225" name="bbib0225"><span data-dcnode-id="4065" instrument_node="">45</span></a><span data-dcnode-id="4063" instrument_node="">], which shows the significant impacts of education, entertainment, and esthetic experiences on the escape experience of film festival participants.</span></p><p data-dcnode-id="4044" id="par0260"><span data-dcnode-id="4057"><span data-dcnode-id="4061" instrument_node="">On the basis of these results, theoretical and practical implications are provided. First, one of the theoretical implications is that this study emphasizes the roles of immersion in VR environments. Although </span><a class="topic-link" data-dcnode-id="4059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/immersive-environment" title="Learn more about immersive environments from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4060" instrument_node="">immersive environments</span></a><span data-dcnode-id="4058" instrument_node=""> are a critical factor of VR, a considerable number of studies have regarded VR as just a substitute for tourism (e.g., [</span></span><a class="workspace-trigger" data-dcnode-id="4055" href="#bib0035" name="bbib0035"><span data-dcnode-id="4056" instrument_node="">7</span></a><span data-dcnode-id="4054" instrument_node="">]). However, this study focused on the roles of the immersive environment contributing to </span><em data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">authenticity</span></em><span data-dcnode-id="4051" instrument_node=""> and </span><em data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">new museology,</span></em><span data-dcnode-id="4048" instrument_node=""> which are two major issues today’s museums are facing. The results show that an immersive VR environment enhances overall tour experiences and consequently induces the intention to physically visit a museum. The second theoretical contribution is that this study represents causality between absorption and immersion. Contrary to most previous studies that have regarded the direct impacts of the four realms of the experience economy (e.g., [</span><a class="workspace-trigger" data-dcnode-id="4046" href="#bib0090" name="bbib0090"><span data-dcnode-id="4047" instrument_node="">18</span></a><span data-dcnode-id="4045" instrument_node="">]), this study inferred and showed the significant causality between absorption and immersion in the light of the features of a VR environment (immersion). Moreover, this study empirically presented the superiority of the proposed model over the commonly used rival model by comparing these two models. As immersion is a crucial factor of VR environments, this perspective is meaningful and important.</span></p><p data-dcnode-id="4042" id="par0265"><span data-dcnode-id="4043" instrument_node="">In addition, this study can have practical implications for practice with regard to attracting more visitors to a museum. The results of this study suggest museum practitioners and VR developers should emphasize the edutainment factors of VR, which help immerse visitors in a VR environment and to have an enhanced experience, which ultimately influences their intention to visit the actual museum. It is important to provide exact and plentiful information in a novel and captivating way. For instance, it can help make the process of providing information more captivating by using avatars, audio, and 3D virtual images.</span></p><p data-dcnode-id="4033" id="par0270"><span data-dcnode-id="4037"><span data-dcnode-id="4041" instrument_node="">However, this study has some limitations. First, because the data were collected at one place, it is difficult to generalize the results of this study in various VR settings. The VR apps were developed and designed according to the subjects, settings, and characteristics of visitors to museums, and thus, there are functional or design differences between the VR apps of museums. Therefore, future studies could benefit by collecting data from various museums to provide more comprehensive and applicable results. Second, although this study represented the roles of absorptive experiences, there can be other factors that influence immersion, such as </span><a class="topic-link" data-dcnode-id="4039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/interface-design" title="Learn more about interface design from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4040" instrument_node="">interface design</span></a><span data-dcnode-id="4038" instrument_node=""> quality and presence. Therefore, further studies should include other factors of VR environments, enabling users to be immersed. Finally, this study was conducted in the UK, and considering the importance of cultural differences within the technology adoption stream of research, a cross-cultural comparison could be conducted to fully understand the effect of immersive </span></span><a class="topic-link" data-dcnode-id="4035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/virtual-reality-experience" title="Learn more about VR experiences from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4036" instrument_node="">VR experiences</span></a><span data-dcnode-id="4034" instrument_node=""> on the behavioral intentions of consumers in different markets.</span></p><p data-dcnode-id="4012" id="par0275"><span data-dcnode-id="4028"><span data-dcnode-id="4032" instrument_node="">Both VR and </span><a class="topic-link" data-dcnode-id="4030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/augmented-reality" title="Learn more about augmented reality from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4031" instrument_node="">augmented reality</span></a><span data-dcnode-id="4029" instrument_node=""> (AR) in tourism have much scope for future studies [</span></span><a class="workspace-trigger" data-dcnode-id="4026" href="#bib0165" name="bbib0165"><span data-dcnode-id="4027" instrument_node="">33</span></a><span data-dcnode-id="4025" instrument_node="">]. Both VR and AR have been launched in a considerable number of museums and cultural heritage sites. They can enhance tourists’ experience and complement the limitations of real sites (e.g., currently nonexisting attractions)[</span><a class="workspace-trigger" data-dcnode-id="4023" href="#bib0295" name="bbib0295"><span data-dcnode-id="4024" instrument_node="">59</span></a><span data-dcnode-id="4022" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="4020" href="#bib0300" name="bbib0300"><span data-dcnode-id="4021" instrument_node="">60</span></a><span data-dcnode-id="4019" instrument_node="">]. However, VR provides a completely virtual experience, while AR offers a partially virtual experience by showing superimposed images and information on the real-world view captured by the device’s camera [</span><a class="workspace-trigger" data-dcnode-id="4017" href="#bib0285" name="bbib0285"><span data-dcnode-id="4018" instrument_node="">57</span></a><span data-dcnode-id="4016" instrument_node="">]. Therefore, adopting this research model in the AR context is expected to provide in-depth insights into the ways in which absorptive experiences influence immersive experiences, AR experiences, and intention to revisit the actual destination. In addition, previous research (e.g. [</span><a class="workspace-trigger" data-dcnode-id="4014" href="#bib0290" name="bbib0290"><span data-dcnode-id="4015" instrument_node="">58</span></a><span data-dcnode-id="4013" instrument_node="">]) has explored the angle of esthetics in terms of the fashionability of VR glasses and the effect of behavioral intentions within the business and marketing context. This could be a further avenue of exploration within the museum and cultural heritage context, leading to the question of social acceptance. Finally, the uses and gratification theory has become one prominent theory of AR research in the past years and could be applied to further experience economy research within the VR context to account for the gratifications visitors receive.</span></p></section></div><section data-dcnode-id="3996" id="ack0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4008" id="sect0105"><span data-dcnode-id="4009" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="3997" id="par0280"><span data-dcnode-id="4007" instrument_node="">This work was supported by the </span><span data-dcnode-id="4005" id="gs0005"><span data-dcnode-id="4006" instrument_node="">Ministry of Education of the Republic of Korea</span></span><span data-dcnode-id="4004" instrument_node=""> and the </span><span data-dcnode-id="4002" id="gs0010"><span data-dcnode-id="4003" instrument_node="">National Research Foundation of Korea</span></span><span data-dcnode-id="4001" instrument_node=""> (</span><a data-dcnode-id="3999" href="#gs0010"><span data-dcnode-id="4000" instrument_node="">NRF-2019S1A3A2098438</span></a><span data-dcnode-id="3998" instrument_node="">).</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="3991"><button class="button button-anchor" data-dcnode-id="3992" type="button"><span class="button-text" data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="3990"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="388" id="bibl0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="389" id="bibs0005"><dl class="references" data-dcnode-id="390" id="reference-links-bibs0005"><dt class="label" data-dcnode-id="3985"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="3986" href="#bbib0005" id="ref-id-bib0005"><span data-dcnode-id="3987" instrument_node="">[1]</span></a></dt><dd class="reference" data-dcnode-id="3964" id="sbref0005"><div class="contribution" data-dcnode-id="3980"><span data-dcnode-id="3984" instrument_node="">The Guardian</span><div data-dcnode-id="3981" id="ref-id-sbref0005"><strong class="title" data-dcnode-id="3982"><span data-dcnode-id="3 ra and statistics</span></strong></div></div><div class="host" data-dcnode-id="396"><span data-dcnode-id="401" instrument_node=""> (</span><span data-dcnode-id="399" instrument_node="">1981</span><span data-dcnode-id="397" instrument_node="">)</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="392"><span data-dcnode-id="395" instrument_node=""></span><a aria-describedby="ref-id-sbref0320" class="link" data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DStructural%2520equation%2520models%2520with%2520unobservable%2520variables%2520and%2520measurement%2520error%253A%2520Algebra%2520and%2520statistics%26publication_year%3D1981%26author%3DC.%2520Fornell%26author%3DD.F.%2520Larcker" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="394" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="263" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="264"><div class="PageDivider" data-dcnode-id="387"></div><header data-dcnode-id="384" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Cited by (49)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="265"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="266"><ul data-dcnode-id="272"><li class="ListArticleItem" data-dcnode-id="366"><div class="sub-heading" data-dcnode-id="378"><a data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S074756322200111X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="382" id="citing-articles-article0-title"><span data-dcnode-id="383" instrument_node="">What is XR? Towards a Framework for Augmented and Virtual Reality</span></h3></a><div class="article-source ellipsis" data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">2022, Computers in Human Behavior</span></div></div><div class="buttons" data-dcnode-id="372"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="373" type="button"><span class="button-link-text" data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="374" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="375"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="367"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="368" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="369"><p data-dcnode-id="370" id="abspara0010"><span data-dcnode-id="371" instrument_node="">Augmented Reality (AR), Virtual Reality (VR), Mixed Reality, and Extended Reality (often – misleadingly – abbreviated as XR) are commonly used terms to describe how technologies generate or modify reality. However, academics and professionals have been inconsistent in their use of these terms. This has led to conceptual confusion and unclear demarcations. Inspired by prior research and qualitative insights from XR professionals, we discuss the meaning and definitions of various terms and organize them in our proposed framework. As a result, we conclude that (1) XR should not be used to connote extended reality, but as a more open approach where the X implies the unknown variable: xReality; (2) AR and VR have fundamental differences and thus should be treated as different experiences; (3) AR experiences can be described on a continuum ranging from assisted reality to mixed reality (based on the level of local presence); and (4), VR experiences can be conceptualized on a telepresence-continuum ranging from atomistic to holistic VR.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="348"><div class="sub-heading" data-dcnode-id="360"><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261517722000474" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="364" id="citing-articles-article1-title"><span data-dcnode-id="365" instrument_node="">Immersive technology: A meta-analysis of augmented/virtual reality applications and their impact on tourism experience</span></h3></a><div class="article-source ellipsis" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">2022, Tourism Management</span></div></div><div class="buttons" data-dcnode-id="354"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="355" type="button"><span class="button-link-text" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="356" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="357"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="349"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="350" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="351"><p data-dcnode-id="352" id="abspara0010"><span data-dcnode-id="353" instrument_node="">The immersive technologies of augmented reality (AR) and virtual reality (VR) have been widely applied in the tourism sector. Previous research has independently explored effective applications of AR/VR in tourism from different perspectives and in various contexts; however, no integrated empirical study has drawn conclusions regarding these findings. This study constructs a meta-analytic framework featuring 24 constructs, using data from 65 independent studies retrieved from 56 papers (N&nbsp;=&nbsp;16,559). Thus, presence was identified as the core feature of AR/VR in tourism. Through the 472 relationships involved, we found that presence has varied effects on tourism experience, either directly or indirectly, through the mediators of value perception and psychological response. Furthermore, simulation type and social interaction positively moderated the effect of presence on tourism experience, prior visitation had a negative moderating effect, while the effect of experience type was not significant. These findings contribute to the development of AR/VR in tourism.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="330"><div class="sub-heading" data-dcnode-id="342"><a data-dcnode-id="345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0747563222000681" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="346" id="citing-articles-article2-title"><span data-dcnode-id="347" instrument_node="">What drives technology-enhanced storytelling immersion? The role of digital humans</span></h3></a><div class="article-source ellipsis" data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">2022, Computers in Human Behavior</span></div></div><div class="buttons" data-dcnode-id="336"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="337" type="button"><span class="button-link-text" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="338" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="339"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="331"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="332" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="333"><p data-dcnode-id="334" id="abspara0010"><span data-dcnode-id="335" instrument_node="">In this research, we investigate consumer responses to technology-enhanced storytelling marketing via augmented digital humans in two different contexts. We test the role of an augmented digital human stimulus as a moderator for storytelling satisfaction in a technology-enhanced retail complex. Building on visual perception theory and information processing theory, the findings from our study reveal sequential links between the four realms of experience economy theory in a mixed reality environment and subsequent effects on storytelling satisfaction, which in turn are boosted by digital human storytelling. Overall, our findings reveal that digital human storytelling is an effective long-term marketing strategy in technology-enhanced environments.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="312"><div class="sub-heading" data-dcnode-id="324"><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0360131521002608" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="328" id="citing-articles-article3-title"><span data-dcnode-id="329" instrument_node="">Usage of augmented reality (AR) and development of e-learning outcomes: An empirical evaluation of students’ e-learning experience</span></h3></a><div class="article-source ellipsis" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">2022, Computers and Education</span></div></div><div class="buttons" data-dcnode-id="318"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="319" type="button"><span class="button-link-text" data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="320" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="321"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="313"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="314" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="315"><p data-dcnode-id="316" id="abspara0010"><span data-dcnode-id="317" instrument_node="">This study aims to examine students' experience of augmented reality learning applications (AR.LRP). Uses and gratifications theory was proposed as a theoretical foundation of the current study's conceptual model. Four dimensions of UGT benefits were proposed as key antecedences of the students' experience with AR.LRP: personal interactive benefits, social interactive benefits, affective benefits, and cognitive benefits. The model was also extended by considering the role of telepresence. Further, technostress was proposed on the current study to moderate the relationship between the aspects of UGT and e-learning experience. A sample size of 500 undergraduate students from the four largest Universities in Saudi Arabia was used in the current study survey. The statistical results largely support the significant impact of personal interactive benefits, affective benefits, and cognitive benefits, and telepresence on student experience with AR.LRP. Technostress was also found to significantly moderate the relationship between UGT dimensions and student experience with AR.LRP. Further, results support a significant relationship between student experience with AR.LRP and students' learning performance. This study has contributed to the perspectives of researchers and practitioners by highlighting the most important aspects and characteristics that ensure a distinctive and positive students' experience of the drum with applications with AR.LRP.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="294"><div class="sub-heading" data-dcnode-id="306"><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0360131521001937" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="310" id="citing-articles-article4-title"><span data-dcnode-id="311" instrument_node="">Performing versus observing: Investigating the effectiveness of group debriefing in a VR-based safety education program</span></h3></a><div class="article-source ellipsis" data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">2021, Computers and Education</span></div></div><div class="buttons" data-dcnode-id="300"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="301" type="button"><span class="button-link-text" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="302" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="303"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="295"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="296" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="297"><p data-dcnode-id="298" id="abspara0010"><span data-dcnode-id="299" instrument_node="">How can students in a large classroom benefit from virtual reality (VR)-based instruction despite limited equipment? Group debriefing based on observed VR experiences provides a potential solution. This study employed a two-by-two factorial design to empirically investigate the feasibility and effectiveness of debriefing and types of VR experiences on enhancing VR learning outcomes. Second and third graders (n&nbsp;=&nbsp;150) were randomly assigned to one of the four VR learning conditions: (1) performing individually with individual debriefing, (2) performing individually with no debriefing, (3) observing in a group with group debriefing, and (4) observing in a group with no debriefing. Study results reported moderate effect sizes of debriefing on increasing knowledge test as well as performance scores of the VR learners but revealed no significant difference between direct and observed VR learning experiences. The findings reveal that students can benefit from vicarious VR learning experiences if an instructional component of debriefing is provided in educational practice.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="273"><div class="sub-heading" data-dcnode-id="288"><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0957417421007089" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="292" id="citing-articles-article5-title"><span data-dcnode-id="293" instrument_node="">A cultural heritage framework using a Deep Learning based Chatbot for supporting tourist journey</span></h3></a><div class="article-source ellipsis" data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">2021, Expert Systems with Applications</span></div></div><div class="buttons" data-dcnode-id="282"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="283" type="button"><span class="button-link-text" data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="284" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="285"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="274"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="275" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="276"><p data-dcnode-id="277" id="sp010"><span data-dcnode-id="281" instrument_node="">The technology improvement has radically changed how tourists perform their journey offering new services to enhance their cultural experience and to easily retrieve required information. In this paper we propose a novel framework, that models intangible and tangible cultural objects into a unified data model, for supporting tourists journey. In particular, a Micro-service architecture has been designed to provide several services whose tourists can access through a conversational agent based on the </span><em data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Seq2Seq</span></em><span data-dcnode-id="278" instrument_node=""> model. Furthermore, we propose also an Enterprise Service Bus to ingest events automatically from promotional website or manually from public and/or private organization. We have evaluated the proposed framework according to the following two experiments: (i) the efficiency and efficacy of the Chatbot engine, showing that the use of GRU cells allows to obtain better results in terms of loss and accuracy with respect to LSTM one and (ii) the efficacy of the proposed framework according to the NASA-TLX asking to 50 users to interact with the Chatbot, demonstrating that the proposed approach outperforms the state-of-the art ones combining natural processing language, user profile information and historical activities.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85076214258%26md5%3D6cdf30be7b71935478bd7da22913926" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="270" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="271"></path></svg><span class="button-alternative-text" data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="article-biography" data-dcnode-id="258" id="vt0005"><p data-dcnode-id="259" id="spar0065"><strong data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Hyunae Lee</span></strong><span data-dcnode-id="260" instrument_node=""> is a Research Professor at the Smart Tourism Research Center, College of Hotel &amp; Tourism Management, Kyung Hee University, Republic of Korea. Her research interests focus on the role of information systems on pre-decision, decision and post-purchase evaluation of tourists. Her research work has been published in Journal of travel Research, International Journal of Contemporary Hospitality Management, Technological Forecasting and Social Change, Knowledge Management Research, and others.</span></p></div><div class="article-biography" data-dcnode-id="253" id="vt0010"><p data-dcnode-id="254" id="spar0070"><strong data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Timothy Jung</span></strong><span data-dcnode-id="255" instrument_node=""> is the Director of Augmented and Virtual Reality Hub, Manchester Metropolitan University, UK. He is the Chair of the International Augmented and Virtual Reality Conference, and his research interests include augmented reality, virtual reality, and immersive technologies.</span></p></div><div class="article-biography" data-dcnode-id="248" id="vt0015"><p data-dcnode-id="249" id="spar0075"><strong data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">M. Claudia tom Dieck</span></strong><span data-dcnode-id="250" instrument_node=""> is a researcher at the Creative Augmented and Virtual Reality Hub at Manchester Metropolitan University. Her research interests include immersive technologies in the hospitality and tourism context. She has published in journals such as Tourism Management, Computers in Human Behavior, and Journal of Travel Research.</span></p></div><div class="article-biography" data-dcnode-id="243" id="vt0020"><p data-dcnode-id="244" id="spar0080"><strong data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Namho Chung</span></strong><span data-dcnode-id="245" instrument_node=""> is a professor and faculty member of the College of Hotel &amp; Tourism Management and the director of Smart Tourism Research Center (STRC) at Kyung Hee University in Seoul, Republic of Korea. He received his Ph.D. degree in MIS from Sungkyunkwan University. His research interests include travel behavior, information search and decision making, destination marketing, knowledge management, and the development of information systems for Destination Management Organizations. His research work has been published in journals such as Information &amp; Management, Computers in Human Behavior, Behavior and Information Technology, Electronic Commerce Research and Applications, Journal of Travel Research, Tourism Management, International Journal of Tourism Research, and others.</span></p></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0378720618310280"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2019 Elsevier B.V. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="231" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="232"></path></svg></button></header><div ari
