</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abst0010&quot;><p id=&quot;spar0060&quot;>Virtual Reality (VR) has been regarded as a highly effective technology that enables people to gain enjoyable and immersive information about museum collections. Drawing from the four realms of the experience economy, we assume absorptive experiences influence immersive experiences, overall museum VR tour experience, and intention to visit a museum. The results show that all the hypotheses are supported. Furthermore, we compared and tested the proposed model and its rival model (postulating the direct influence of the four realms of the experience economy on museum VR experience) and found that the proposed model is better than the rival model.</p></div></div></div>" data-dcnode-id="6320" lang="en" name="citation_abstract"><span data-dcnode-id="6319" instrument_node="">

c-6.56 0-12.44 2.9-16.48 7.48l-28.42-15.28c0.58-1.98 0.9-4.04 0.9-6.2s-0.32-4.22-0.9-6.2l28.42-15.28c4.04 4.58 9.92 7.48 16.48 7.48 12.14 0 22-9.86 22-22s-9.86-22-22-22-22 9.86-22 22c0 1.98 0.28 3.9 0.78 5.72l-28.64 15.38c-4.02-4.34-9.76-7.1-16.14-7.1-12.14 0-22 9.86-22 22s9.86 22 22 22c6.38 0 12.12-2.76 16.14-7.12l28.64 15.38c-0.5 1.84-0.78 3.76-0.78 5.74 0 12.14 9.86 22 22 22s22-9.86 22-22-9.86-22-22-22z" data-dcnode-id="5796"></path></svg><span class="button-text" data-dcnode-id="5793"><span data-dcnode-id="5794" instrument_node="">Share</span></span></button></div></div></div><div class="ExportCitation u-display-inline-block" data-dcnode-id="5781" id="export-citation"><div class="popover export-citation-popover" data-dcnode-id="5782" id="export-citation-popover"><div data-dcnode-id="5783" id="popover-trigger-export-citation-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="5784" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="5787" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="5788" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="5774" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="5777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.im.2019.103229" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="5778" instrument_node="">https://doi.org/10.1016/j.im.2019.103229</span></a><a class="rights-and-content" data-dcnode-id="5775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0378720618310280%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5776" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="5773"></section><section class="ReferencedArticles" data-dcnode-id="5772"></section><div class="PageDivider" data-dcnode-id="5771"></div><div class="Abstracts u-font-serif" data-dcnode-id="5735" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="5745" id="abs0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5769"><span data-dcnode-id="5770" instrument_node="">Highlights</span></h2><div data-dcnode-id="5746" id="abst0005"><p data-dcnode-id="5747" id="spar0055"></p><dl class="list" data-dcnode-id="5748"><dt class="list-label" data-dcnode-id="5767"><span data-dcnode-id="5768" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5764"><p data-dcnode-id="5765" id="par0005"><span data-dcnode-id="5766" instrument_node="">The experience economy theory is tested in the VR museum context.</span></p></dd><dt class="list-label" data-dcnode-id="5762"><span data-dcnode-id="5763" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5759"><p data-dcnode-id="5760" id="par0010"><span data-dcnode-id="5761" instrument_node="">Absorption is revealed as an antecedent of immersion.</span></p></dd><dt class="list-label" data-dcnode-id="5757"><span data-dcnode-id="5758" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5754"><p data-dcnode-id="5755" id="par0015"><span data-dcnode-id="5756" instrument_node="">Education, entertainment, esthetics, and escapism affect the VR museum experience.</span></p></dd><dt class="list-label" data-dcnode-id="5752"><span data-dcnode-id="5753" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5749"><p data-dcnode-id="5750" id="par0020"><span data-dcnode-id="5751" instrument_node="">The proposed model is superior to its rival model.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="5736" id="abs0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5743"><span data-dcnode-id="5744" instrument_node="">Abstract</span></h2><div data-dcnode-id="5737" id="abst0010"><p data-dcnode-id="5738" id="spar0060"><span data-dcnode-id="5742" instrument_node="">Virtual Reality (VR) has been regarded as a highly effective technology that enables people to gain enjoyable and immersive information about museum collections. Drawing from the four realms of the experience economy, we assume absorptive experiences influence </span><a class="topic-link" data-dcnode-id="5740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/immersive-experience" title="Learn more about immersive experiences from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5741" instrument_node="">immersive experiences</span></a><span data-dcnode-id="5739" instrument_node="">, overall museum VR tour experience, and intention to visit a museum. The results show that all the hypotheses are supported. Furthermore, we compared and tested the proposed model and its rival model (postulating the direct influence of the four realms of the experience economy on museum VR experience) and found that the proposed model is better than the rival model.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="5712" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="5724"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0378720618308437"><svg class="icon icon-navigate-left" data-dcnode-id="5733" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="5734"></path></svg><span class="button-alternative-text" data-dcnode-id="5726"><strong data-dcnode-id="5731"><span data-dcnode-id="5732" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="5729"><span data-dcnode-id="5730" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="5713"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0378720617310595"><span class="button-alternative-text" data-dcnode-id="5717"><strong data-dcnode-id="5722"><span data-dcnode-id="5723" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="5720"><span data-dcnode-id="5721" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5718"><span data-dcnode-id="5719" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="5715" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="5716"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="5690"><div class="keywords-section" data-dcnode-id="5691" id="kwd0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5710"><span data-dcnode-id="5711" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="5707" id="kw0005"><span data-dcnode-id="5708"><span data-dcnode-id="5709" instrument_node="">Experience economy</span></span></div><div class="keyword" data-dcnode-id="5704" id="kw0010"><span data-dcnode-id="5705"><span data-dcnode-id="5706" instrument_node="">Absorption</span></span></div><div class="keyword" data-dcnode-id="5701" id="kw0015"><span data-dcnode-id="5702"><span data-dcnode-id="5703" instrument_node="">Immersion</span></span></div><div class="keyword" data-dcnode-id="5698" id="kw0020"><span data-dcnode-id="5699"><span data-dcnode-id="5700" instrument_node="">Virtual reality</span></span></div><div class="keyword" data-dcnode-id="5695" id="kw0025"><span data-dcnode-id="5696"><span data-dcnode-id="5697" instrument_node="">Museum</span></span></div><div class="keyword" data-dcnode-id="5692" id="kw0030"><span data-dcnode-id="5693"><span data-dcnode-id="5694" instrument_node="">Tourism</span></span></div></div></div><span data-dcnode-id="5689" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3995" id="body"><div data-dcnode-id="4010"><section data-dcnode-id="5612" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5685" id="sect0020"><span data-dcnode-id="5688" instrument_node="">1</span><span data-dcnode-id="5687" instrument_node="">. </span><span data-dcnode-id="5686" instrument_node="">Introduction</span></h2><p data-dcnode-id="5674" id="par0025"><span data-dcnode-id="5684" instrument_node="">Virtual Reality (VR) is being regarded as the next big step in technological innovation. Palmer Luckey, cofounder of Oculus VR Inc., asserted that 2016 would be the first year in which there would be mass-market consumer VR [</span><a class="workspace-trigger" data-dcnode-id="5682" href="#bib0005" name="bbib0005"><span data-dcnode-id="5683" instrument_node="">1</span></a><span data-dcnode-id="5681" instrument_node="">]. In fact, low-cost and user-friendly VR devices such as the Oculus Rift VR headset, the Samsung Galaxy Gear VR, and HTC Vive have been launched and introduced to the market. In addition, a few years ago, Google established a VR division and launched the VR device, Google Daydream [</span><a class="workspace-trigger" data-dcnode-id="5679" href="#bib0010" name="bbib0010"><span data-dcnode-id="5680" instrument_node="">2</span></a><span data-dcnode-id="5678" instrument_node="">]. In addition, the consumer VR market (including both software and hardware) is expected to be worth more than USD 16.3 billion globally in 2022 [</span><a class="workspace-trigger" data-dcnode-id="5676" href="#bib0015" name="bbib0015"><span data-dcnode-id="5677" instrument_node="">3</span></a><span data-dcnode-id="5675" instrument_node="">].</span></p><p data-dcnode-id="5654" id="par0030"><span data-dcnode-id="5673" instrument_node="">VR has been actively adopted in cultural tourism because some of its characteristics help to achieve the tourism industry’s goal of providing tourists with unique and enhanced experiences [</span><a class="workspace-trigger" data-dcnode-id="5671" href="#bib0020" name="bbib0020"><span data-dcnode-id="5672" instrument_node="">4</span></a><span data-dcnode-id="5670" instrument_node="">]. VR also reduces the barrier of distance between potential tourists and a destination by providing information and enhancing their understanding of a destination before their actual visit [</span><a class="workspace-trigger" data-dcnode-id="5668" href="#bib0025" name="bbib0025"><span data-dcnode-id="5669" instrument_node="">5</span></a><span data-dcnode-id="5667" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5665" href="#bib0030" name="bbib0030"><span data-dcnode-id="5666" instrument_node="">6</span></a><span data-dcnode-id="5664" instrument_node="">]. In addition, VR provides users with an educational, entertaining, escapist, and esthetic experience [</span><a class="workspace-trigger" data-dcnode-id="5662" href="#bib0035" name="bbib0035"><span data-dcnode-id="5663" instrument_node="">7</span></a><span data-dcnode-id="5661" instrument_node="">] and a complete virtual environment in which they can be fully immersed [</span><a class="workspace-trigger" data-dcnode-id="5659" href="#bib0040" name="bbib0040"><span data-dcnode-id="5660" instrument_node="">8</span></a><span data-dcnode-id="5658" instrument_node="">]. Finally, VR enhances tourists’ experiences by facilitating their interactions with their destinations [</span><a class="workspace-trigger" data-dcnode-id="5656" href="#bib0045" name="bbib0045"><span data-dcnode-id="5657" instrument_node="">9</span></a><span data-dcnode-id="5655" instrument_node="">].</span></p><p data-dcnode-id="5637" id="par0035"><span data-dcnode-id="5653" instrument_node="">In contrast to the aforementioned benefits, some scholars have considered VR to be a substitute for, or even a threat to, physical tourism sites (e.g., [</span><a class="workspace-trigger" data-dcnode-id="5651" href="#bib0040" name="bbib0040"><span data-dcnode-id="5652" instrument_node="">8</span></a><span data-dcnode-id="5650" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5648" href="#bib0050" name="bbib0050"><span data-dcnode-id="5649" instrument_node="">10</span></a><span data-dcnode-id="5647" instrument_node="">]). For example, VR can reduce the inconveniences that often accompany an actual tour and can make tourists think it is no longer necessary to visit real tourism sites, with the more advanced and realistic VR simulations [</span><a class="workspace-trigger" data-dcnode-id="5645" href="#bib0050" name="bbib0050"><span data-dcnode-id="5646" instrument_node="">10</span></a><span data-dcnode-id="5644" instrument_node="">]. However, evidence has shown that individuals think a virtual field trip cannot serve as a substitute for a real field trip but is rather an effective tool for preparing for a real field trip [</span><a class="workspace-trigger" data-dcnode-id="5642" href="#bib0055" name="bbib0055"><span data-dcnode-id="5643" instrument_node="">11</span></a><span data-dcnode-id="5641" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5639" href="#bib0060" name="bbib0060"><span data-dcnode-id="5640" instrument_node="">12</span></a><span data-dcnode-id="5638" instrument_node="">]. Aligned with the evidence, this study focuses on the role of VR in the previsit stage.</span></p><p data-dcnode-id="5620" id="par0040"><span data-dcnode-id="5636" instrument_node="">The role of VR is becoming increasingly important in the museum context because it is helping museums overcome two major issues they currently face: </span><em data-dcnode-id="5634"><span data-dcnode-id="5635" instrument_node="">authenticity</span></em><span data-dcnode-id="5633" instrument_node=""> and </span><em data-dcnode-id="5631"><span data-dcnode-id="5632" instrument_node="">new museology</span></em><span data-dcnode-id="5630" instrument_node="">. In other words, today’s museums are required (1) to present an authentic experience and (2) to enhance visitors’ experience by providing edutainment (governance of education and entertainment). VR helps overcome these concerns because immersive VR environments enable visitors to perceive the virtual images of artifacts as authentic and to pleasurably obtain information about collections. In fact, a considerable number of museums such as The British Museum, Museo del Prado, and Vatican City have launched VR to provide their visitors with spectacular immersions [</span><a class="workspace-trigger" data-dcnode-id="5628" href="#bib0065" name="bbib0065"><span data-dcnode-id="5629" instrument_node="">13</span></a><span data-dcnode-id="5627" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5625" href="#bib0070" name="bbib0070"><span data-dcnode-id="5626" instrument_node="">14</span></a><span data-dcnode-id="5624" instrument_node="">]. Although previous studies have investigated the role of VR in museums (e.g., [</span><a class="workspace-trigger" data-dcnode-id="5622" href="#bib0035" name="bbib0035"><span data-dcnode-id="5623" instrument_node="">7</span></a><span data-dcnode-id="5621" instrument_node="">]), few studies have investigated the antecedents and consequences of immersion in VR. In other words, research on the results from immersive settings of VR in museums is still at an embryonic stage.</span></p><p data-dcnode-id="5618" id="par0045"><span data-dcnode-id="5619" instrument_node="">Therefore, this study aims to (1) investigate the impacts of absorptive experiences (e.g., education and entertainment experiences) on immersion (e.g., escapism and esthetic experiences), overall museum experience, and intent to visit a museum and (2) check whether the proposed model is better than the rival model (direct impact of four experiences on overall museum experience) by comparing these models’ fit and the percentage of supported hypotheses.</span></p><p data-dcnode-id="5613" id="par0050"><span data-dcnode-id="5617" instrument_node="">Following this introduction, the second section provides the theoretical background, including an explanation of the experience economy proposed by Pine &amp; Gilmore [</span><a class="workspace-trigger" data-dcnode-id="5615" href="#bib0075" name="bbib0075"><span data-dcnode-id="5616" instrument_node="">15</span></a><span data-dcnode-id="5614" instrument_node="">], the role of VR in museums, and the use of VR as a marketing tool. The third section presents the development of the hypotheses with the proposed research model. The fourth section explains the methodology, including data collection and measures. The fifth section shows the results of the proposed model and its rival model. The final section discusses the results and provides theoretical and practical implications and some limitations future studies will need to address.</span></p></section><section data-dcnode-id="5371" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5608" id="sect0025"><span data-dcnode-id="5611" instrument_node="">2</span><span data-dcnode-id="5610" instrument_node="">. </span><span data-dcnode-id="5609" instrument_node="">Theoretical background</span></h2><section data-dcnode-id="5527" id="sec0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5604" id="sect0030"><span data-dcnode-id="5607" instrument_node="">2.1</span><span data-dcnode-id="5606" instrument_node="">. </span><span data-dcnode-id="5605" instrument_node="">The experience economy</span></h3><p data-dcnode-id="5583" id="par0055"><span data-dcnode-id="5603" instrument_node="">Pine and Gilmore [</span><a class="workspace-trigger" data-dcnode-id="5601" href="#bib0075" name="bbib0075"><span data-dcnode-id="5602" instrument_node="">15</span></a><span data-dcnode-id="5600" instrument_node="">] first introduced the concept of the experience economy in the Harvard Business Review when they showed how shifts in economies work, especially the shift toward a more service-oriented approach. The concept has since gained widespread attention, particularly within the tourism context. In the past few years, a notable shift within the tourism industry has taken place from simply providing products or services toward staging tourism experiences. Essentially, this shift has provided tourists with something to remember and thoughts to cherish, rather than simply consuming a standardized offering </span><a class="workspace-trigger" data-dcnode-id="5598" href="#bib0080" name="bbib0080"><span data-dcnode-id="5599" instrument_node="">[16]</span></a><span data-dcnode-id="5597" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5595" href="#bib0305" name="bbib0305"><span data-dcnode-id="5596" instrument_node="">[61]</span></a><span data-dcnode-id="5594" instrument_node="">. Accordingly, technology has been identified as an effective way to provide tourists with unique experiences [</span><a class="workspace-trigger" data-dcnode-id="5592" href="#bib0045" name="bbib0045"><span data-dcnode-id="5593" instrument_node="">9</span></a><span data-dcnode-id="5587"><span data-dcnode-id="5591" instrument_node="">], opening the door for the experience economy concept in the area of </span><a class="topic-link" data-dcnode-id="5589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/management-information-systems" title="Learn more about management information systems from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5590" instrument_node="">management information systems</span></a><span data-dcnode-id="5588" instrument_node=""> (MIS). Nonetheless, research within this area is still scarce. As revealed above, Pine and Gilmore [</span></span><a class="workspace-trigger" data-dcnode-id="5585" href="#bib0075" name="bbib0075"><span data-dcnode-id="5586" instrument_node="">15</span></a><span data-dcnode-id="5584" instrument_node="">] were the first to emphasize the need for “staged experiences” and the importance of immersion, absorption, and participation as part of enhanced tourism experiences.</span></p><p data-dcnode-id="5572" id="par0060"><span data-dcnode-id="5582" instrument_node="">According to [</span><a class="workspace-trigger" data-dcnode-id="5580" href="#bib0085" name="bbib0085"><span data-dcnode-id="5581" instrument_node="">17, p. 12</span></a><span data-dcnode-id="5579" instrument_node="">], “experiences can be defined as events that engage individuals in a personal way.” The same authors (1998, 1999) explored four types of customer experiences, called the 4 Es – esthetic, entertainment, education, and escapism experiences. These 4 Es were classified into two concepts: absorption and immersion. Tourists are able to absorb experiences when they are provided with an experience from a certain distance that does not directly influence the experience [</span><a class="workspace-trigger" data-dcnode-id="5577" href="#bib0090" name="bbib0090"><span data-dcnode-id="5578" instrument_node="">18</span></a><span data-dcnode-id="5576" instrument_node="">]. On the contrary, immersion occurs when tourists are fully involved and take part in the experience [</span><a class="workspace-trigger" data-dcnode-id="5574" href="#bib0095" name="bbib0095"><span data-dcnode-id="5575" instrument_node="">19</span></a><span data-dcnode-id="5573" instrument_node="">].</span></p><p data-dcnode-id="5558" id="par0065"><span data-dcnode-id="5571" instrument_node="">The following definitions are aimed at providing an understanding of the four experience economy dimensions. First, esthetics can be defined as “the beauty that can be expressed through elements such as color, photographs, font style, and layout” </span><a class="workspace-trigger" data-dcnode-id="5569" href="#bib0100" name="bbib0100"><span data-dcnode-id="5570" instrument_node="">[20p. 481]</span></a><span data-dcnode-id="5568" instrument_node="">. Education is referred to as “the absorption of events unfolding before [a tourist] at a destination, while actively participating through interactive engagement of the mind” [</span><a class="workspace-trigger" data-dcnode-id="5566" href="#bib0080" name="bbib0080"><span data-dcnode-id="5567" instrument_node="">16, p. 121</span></a><span data-dcnode-id="5565" instrument_node="">]. Third, escapism is defined as the escape from “regular environments to suspend the power of norms and values that govern their ordinary lives or to think about their lives and societies from different perspectives” [</span><a class="workspace-trigger" data-dcnode-id="5563" href="#bib0080" name="bbib0080"><span data-dcnode-id="5564" instrument_node="">16, p. 122</span></a><span data-dcnode-id="5562" instrument_node="">]. Finally, entertainment is “an activity that provides amusement and pleasure” [</span><a class="workspace-trigger" data-dcnode-id="5560" href="#bib0105" name="bbib0105"><span data-dcnode-id="5561" instrument_node="">21, p. 7</span></a><span data-dcnode-id="5559" instrument_node="">].</span></p><p data-dcnode-id="5528" id="par0070"><span data-dcnode-id="5557" instrument_node="">While entertainment and education are part of absorption, esthetics and escapism were classified as immersion within the four realms of the experience economy [</span><a class="workspace-trigger" data-dcnode-id="5555" href="#bib0075" name="bbib0075"><span data-dcnode-id="5556" instrument_node="">15</span></a><span data-dcnode-id="5554" instrument_node="">]. To successfully stage tourism experiences, Pine and Gilmore [</span><a class="workspace-trigger" data-dcnode-id="5552" href="#bib0075" name="bbib0075"><span data-dcnode-id="5553" instrument_node="">15</span></a><span data-dcnode-id="5551" instrument_node="">] suggested the engagement of all the senses to make the tourism experience more memorable. Technology can play an important role in achieving this, as it engages tourists’ various senses. Generally, the positive effects of the 4 Es on tourists’ experiences have been explored and supported. Previous research, for instance, has found that the 4 Es ultimately influence tourists’ satisfaction with attractions [</span><a class="workspace-trigger" data-dcnode-id="5549" href="#bib0095" name="bbib0095"><span data-dcnode-id="5550" instrument_node="">19</span></a><span data-dcnode-id="5548" instrument_node="">] and promoted destination loyalty [</span><a class="workspace-trigger" data-dcnode-id="5546" href="#bib0110" name="bbib0110"><span data-dcnode-id="5547" instrument_node="">22</span></a><span data-dcnode-id="5545" instrument_node="">]. Furthermore, Jung et al. [</span><a class="workspace-trigger" data-dcnode-id="5543" href="#bib0035" name="bbib0035"><span data-dcnode-id="5544" instrument_node="">7</span></a><span data-dcnode-id="5542" instrument_node="">] found that the four realms of the experience economy strongly affect the tourism experience and consequently the behavioral intention to visit tourist attractions. However, research on VR content utilizing the experience economy concept is limited. This is surprising considering that, according to a number of studies, the experience economy has a strong focus on immersion and absorption, and VR is a prime example of delivering entertaining, educational, escaping, and esthetical content [</span><a class="workspace-trigger" data-dcnode-id="5540" href="#bib0115" name="bbib0115"><span data-dcnode-id="5541" instrument_node="">[23]</span></a><span data-dcnode-id="5539" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5537" href="#bib0120" name="bbib0120"><span data-dcnode-id="5538" instrument_node="">[24]</span></a><span data-dcnode-id="5536" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5534" href="#bib0125" name="bbib0125"><span data-dcnode-id="5535" instrument_node="">[25]</span></a><span data-dcnode-id="5529"><span data-dcnode-id="5533" instrument_node="">]. Consequently, it can be argued that research on VR and the experience economy concept can be particularly valuable, especially considering its increased use in museums and cultural heritage attractions. Particularly, to the best of the authors’ knowledge, no MIS study to date has examined the relationship between absorptive experience (education and entertainment) and </span><a class="topic-link" data-dcnode-id="5531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/immersive-experience" title="Learn more about immersive experience from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5532" instrument_node="">immersive experience</span></a><span data-dcnode-id="5530" instrument_node=""> (escapism and esthetic) when visitors are experiencing VR contents in museums.</span></span></p></section><section data-dcnode-id="5429" id="sec0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5523" id="sect0035"><span data-dcnode-id="5526" instrument_node="">2.2</span><span data-dcnode-id="5525" instrument_node="">. </span><span data-dcnode-id="5524" instrument_node="">Virtual reality in museums</span></h3><p data-dcnode-id="5491" id="par0075"><span data-dcnode-id="5522" instrument_node="">Today’s museums have two main concerns: </span><em data-dcnode-id="5520"><span data-dcnode-id="5521" instrument_node="">authenticity</span></em><span data-dcnode-id="5519" instrument_node=""> [</span><a class="workspace-trigger" data-dcnode-id="5517" href="#bib0130" name="bbib0130"><span data-dcnode-id="5518" instrument_node="">26</span></a><span data-dcnode-id="5516" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5514" href="#bib0135" name="bbib0135"><span data-dcnode-id="5515" instrument_node="">27</span></a><span data-dcnode-id="5513" instrument_node="">] and </span><em data-dcnode-id="5511"><span data-dcnode-id="5512" instrument_node="">new museology</span></em><span data-dcnode-id="5510" instrument_node=""> [</span><a class="workspace-trigger" data-dcnode-id="5508" href="#bib0140" name="bbib0140"><span data-dcnode-id="5509" instrument_node="">28</span></a><span data-dcnode-id="5507" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5505" href="#bib0145" name="bbib0145"><span data-dcnode-id="5506" instrument_node="">29</span></a><span data-dcnode-id="5504" instrument_node="">]. First, authenticity poses as objectivism in tourism and can be viewed as possessing two vital components in providing touristic value: distance and truth [</span><a class="workspace-trigger" data-dcnode-id="5502" href="#bib0150" name="bbib0150"><span data-dcnode-id="5503" instrument_node="">30</span></a><span data-dcnode-id="5501" instrument_node="">]. Therefore, a dialectic between object and subject, there and here, then and now, is a fundamental concept of authenticity [</span><a class="workspace-trigger" data-dcnode-id="5499" href="#bib0150" name="bbib0150"><span data-dcnode-id="5500" instrument_node="">30</span></a><span data-dcnode-id="5498" instrument_node="">]. According to the German philosopher Walter Benjamin, “the presence of the original is the prerequisite to the concept of authenticity” ([</span><a class="workspace-trigger" data-dcnode-id="5496" href="#bib0155" name="bbib0155"><span data-dcnode-id="5497" instrument_node="">31, p. 220</span></a><span data-dcnode-id="5495" instrument_node="">], cited in [</span><a class="workspace-trigger" data-dcnode-id="5493" href="#bib0150" name="bbib0150"><span data-dcnode-id="5494" instrument_node="">30</span></a><span data-dcnode-id="5492" instrument_node="">]). In this context, museums used to focus on the rich historical, cultural, and architectural value of their collections. Such collections were also to remain untouched and be preserved as they were.</span></p><p data-dcnode-id="5468" id="par0080"><span data-dcnode-id="5490" instrument_node="">However, the issue of authenticity has been a contested issue in the context of the museum. Several researchers have asserted that museums should protect their value by adhering to authenticity, which is the heart of a museum’s value and the element that distinguishes it from other museums [</span><a class="workspace-trigger" data-dcnode-id="5488" href="#bib0130" name="bbib0130"><span data-dcnode-id="5489" instrument_node="">26</span></a><span data-dcnode-id="5487" instrument_node="">]. On the other hand, some researchers have insisted it is important to reconcile authenticity with inauthenticity because inauthentic experience is also a part of the experience in today’s museums </span><a class="workspace-trigger" data-dcnode-id="5485" href="#bib0310" name="bbib0310"><span data-dcnode-id="5486" instrument_node="">[62]</span></a><span data-dcnode-id="5484" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5482" href="#bib0135" name="bbib0135"><span data-dcnode-id="5483" instrument_node="">[27]</span></a><span data-dcnode-id="5481" instrument_node="">. Realistically, it is difficult to adhere to authenticity because of the degradation of artifacts resulting from both nature and humans [</span><a class="workspace-trigger" data-dcnode-id="5479" href="#bib0160" name="bbib0160"><span data-dcnode-id="5480" instrument_node="">32</span></a><span data-dcnode-id="5478" instrument_node="">], economic costs [</span><a class="workspace-trigger" data-dcnode-id="5476" href="#bib0135" name="bbib0135"><span data-dcnode-id="5477" instrument_node="">27</span></a><span data-dcnode-id="5475" instrument_node="">], and general shifts of museums’ mission from focusing on collections to focusing on visitors [</span><a class="workspace-trigger" data-dcnode-id="5473" href="#bib0140" name="bbib0140"><span data-dcnode-id="5474" instrument_node="">28</span></a><span data-dcnode-id="5472" instrument_node="">]. In this context, authenticity can be achieved to some degree by developments in information technology (IT) because such technology enables visitors to fully explore and appreciate museums moving beyond time, space, and language barriers [</span><a class="workspace-trigger" data-dcnode-id="5470" href="#bib0165" name="bbib0165"><span data-dcnode-id="5471" instrument_node="">33</span></a><span data-dcnode-id="5469" instrument_node="">].</span></p><p data-dcnode-id="5457" id="par0085"><span data-dcnode-id="5467" instrument_node="">Second, </span><em data-dcnode-id="5465"><span data-dcnode-id="5466" instrument_node="">new museology</span></em><span data-dcnode-id="5464" instrument_node=""> refers to the paradigm shift of museums from simply exhibiting their rare and precious collections to enriching visitors’ engagement [</span><a class="workspace-trigger" data-dcnode-id="5462" href="#bib0145" name="bbib0145"><span data-dcnode-id="5463" instrument_node="">29</span></a><span data-dcnode-id="5461" instrument_node="">]. In this context, museum experts are required to focus more on developing ways to enhance visitors’ edutainment (education + entertainment) experience [</span><a class="workspace-trigger" data-dcnode-id="5459" href="#bib0140" name="bbib0140"><span data-dcnode-id="5460" instrument_node="">28</span></a><span data-dcnode-id="5458" instrument_node="">].</span></p><p data-dcnode-id="5430" id="par0090"><span data-dcnode-id="5456" instrument_node="">In this vein, numerous cutting-edge technologies have been launched at a considerable number of museums around the world to overcome these two concerns. Among them, the present study regards VR as one of the best-suited technologies for museums for the following reasons. First, VR’s main characteristics (full immersion and presence) enable visitors to perceive substitute and virtual experiences offered by VR as authentic [</span><a class="workspace-trigger" data-dcnode-id="5454" href="#bib0040" name="bbib0040"><span data-dcnode-id="5455" instrument_node="">8</span></a><span data-dcnode-id="5453" instrument_node="">]. This can provide an opportunity for harmony between authenticity and inauthenticity, which are a part of the visitor’s experience in today’s museums </span><a class="workspace-trigger" data-dcnode-id="5451" href="#bib0310" name="bbib0310"><span data-dcnode-id="5452" instrument_node="">[62]</span></a><span data-dcnode-id="5450" instrument_node=""> and further diminish visitors’ perceptions about inauthenticity as well. Second, VR provides visitors with education and entertainment experiences, which facilitate </span><em data-dcnode-id="5448"><span data-dcnode-id="5449" instrument_node="">new museology</span></em><span data-dcnode-id="5447" instrument_node="">. In recent years, a number of studies have recognized the potential of VR as a tool that can enhance the museum and cultural heritage experience. For instance, Southall et al. [</span><a class="workspace-trigger" data-dcnode-id="5445" href="#bib0125" name="bbib0125"><span data-dcnode-id="5446" instrument_node="">25</span></a><span data-dcnode-id="5444" instrument_node="">] found that VR provides an opportunity for personalized and tailored cultural heritage experiences. In addition, Han et al. [</span><a class="workspace-trigger" data-dcnode-id="5442" href="#bib0115" name="bbib0115"><span data-dcnode-id="5443" instrument_node="">23</span></a><span data-dcnode-id="5437"><span data-dcnode-id="5441" instrument_node="">] found that VR can deliver reflective </span><a class="topic-link" data-dcnode-id="5439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/learning-experiences" title="Learn more about learning experiences from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5440" instrument_node="">learning experiences</span></a><span data-dcnode-id="5438" instrument_node=""> within the cultural heritage context. Considering the importance of learning and education as part of museum visits, VR is recognized as a valuable tool for museum experiences. Another issue related to VR and museum experiences has to do with accessibility, as tom Dieck et al. [</span></span><a class="workspace-trigger" data-dcnode-id="5435" href="#bib0170" name="bbib0170"><span data-dcnode-id="5436" instrument_node="">34</span></a><span data-dcnode-id="5434" instrument_node="">] revealed that VR can enable visitors to access inaccessible sites or objects. This element of accessibility is particularly important in museums to bring objects back to life or to explore hidden sites [</span><a class="workspace-trigger" data-dcnode-id="5432" href="#bib0170" name="bbib0170"><span data-dcnode-id="5433" instrument_node="">34</span></a><span data-dcnode-id="5431" instrument_node="">].</span></p></section><section data-dcnode-id="5372" id="sec0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5425" id="sect0040"><span data-dcnode-id="5428" instrument_node="">2.3</span><span data-dcnode-id="5427" instrument_node="">. </span><span data-dcnode-id="5426" instrument_node="">Virtual Reality as a marketing tool</span></h3><p data-dcnode-id="5373" id="par0095"><span data-dcnode-id="5424" instrument_node="">Online information platforms and information technologies used to promote tourism to attract visitors to actual tourism sites [</span><a class="workspace-trigger" data-dcnode-id="5422" href="#bib0175" name="bbib0175"><span data-dcnode-id="5423" instrument_node="">35</span></a><span data-dcnode-id="5421" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5419" href="#bib0035" name="bbib0035"><span data-dcnode-id="5420" instrument_node="">7</span></a><span data-dcnode-id="5418" instrument_node="">]. Pallud &amp; Straub [</span><a class="workspace-trigger" data-dcnode-id="5416" href="#bib0140" name="bbib0140"><span data-dcnode-id="5417" instrument_node="">28</span></a><span data-dcnode-id="5415" instrument_node="">] revealed that museum websites, which are very popular, can encourage travelers to visit the actual museum. Chung et al. [</span><a class="workspace-trigger" data-dcnode-id="5413" href="#bib0180" name="bbib0180"><span data-dcnode-id="5414" instrument_node="">36</span></a><span data-dcnode-id="5412" instrument_node="">] also found that formal websites of destination-marketing organizations motivate visitors who have never visited previously to visit destinations. Furthermore, Jung et al. [</span><a class="workspace-trigger" data-dcnode-id="5410" href="#bib0035" name="bbib0035"><span data-dcnode-id="5411" instrument_node="">7</span></a><span data-dcnode-id="5405"><span data-dcnode-id="5409" instrument_node="">] examined the impact of tour experiences through </span><a class="topic-link" data-dcnode-id="5407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/augmented-reality" title="Learn more about AR from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5408" instrument_node="">AR</span></a><span data-dcnode-id="5406" instrument_node=""> and VR and confirmed tourists’ intentions to revisit after experiencing immersive technologies. In fact, VR has been regarded as a critical destination-marketing tool that offers environmental stimulation and a quality virtual experience [</span></span><a class="workspace-trigger" data-dcnode-id="5403" href="#bib0120" name="bbib0120"><span data-dcnode-id="5404" instrument_node="">24</span></a><span data-dcnode-id="5402" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5400" href="#bib0185" name="bbib0185"><span data-dcnode-id="5401" instrument_node="">37</span></a><span data-dcnode-id="5395"><span data-dcnode-id="5399" instrument_node="">]. In this perspective, VR facilitates people visiting real destinations. Because of the intangibility of tourism products, it is impossible to assess their quality in advance; thus, tourists tend to depend on what </span><a class="topic-link" data-dcnode-id="5397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/descriptive-information" title="Learn more about descriptive information from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5398" instrument_node="">descriptive information</span></a><span data-dcnode-id="5396" instrument_node=""> is currently available [</span></span><a class="workspace-trigger" data-dcnode-id="5393" href="#bib0190" name="bbib0190"><span data-dcnode-id="5394" instrument_node="">38</span></a><span data-dcnode-id="5392" instrument_node="">]. Therefore, rich and immersive information provided by VR enables potential tourists to make more informed decisions [</span><a class="workspace-trigger" data-dcnode-id="5390" href="#bib0195" name="bbib0195"><span data-dcnode-id="5391" instrument_node="">39</span></a><span data-dcnode-id="5389" instrument_node="">]. Moreover, several researchers have acknowledged VR can be an effective marketing tool for the tourism industry [</span><a class="workspace-trigger" data-dcnode-id="5387" href="#bib0040" name="bbib0040"><span data-dcnode-id="5388" instrument_node="">8</span></a><span data-dcnode-id="5386" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="5384" href="#bib0195" name="bbib0195"><span data-dcnode-id="5385" instrument_node="">39</span></a><span data-dcnode-id="5383" instrument_node="">]. For instance, [</span><a class="workspace-trigger" data-dcnode-id="5381" href="#bib0200" name="bbib0200"><span data-dcnode-id="5382" instrument_node="">40, p. 93</span></a><span data-dcnode-id="5380" instrument_node="">] revealed that “from a marketing perspective, VR offers the potential to build a sensory experience of a tourism destination or attraction, and can be used in sales contexts to complement, or indeed, supplant traditional promotional tools.” However, according to Bonetti et al. [</span><a class="workspace-trigger" data-dcnode-id="5378" href="#bib0205" name="bbib0205"><span data-dcnode-id="5379" instrument_node="">41</span></a><span data-dcnode-id="5377" instrument_node="">], to date, VR is used more as a promotional tool to catch consumers’ attention rather than as a viable in-store (e.g., travel agencies) solution because of the time-consuming process and high costs involved. Finally, Rauschnabel [</span><a class="workspace-trigger" data-dcnode-id="5375" href="#bib0210" name="bbib0210"><span data-dcnode-id="5376" instrument_node="">42</span></a><span data-dcnode-id="5374" instrument_node="">] added that VR is all about the desired enhancement of the real world and therefore can be considered a good marketing tool. Consequently, more research is required into the opportunities and benefits VR offers.</span></p></section></section><section data-dcnode-id="5184" id="sec0030"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5367" id="sect0045"><span data-dcnode-id="5370" instrument_node="">3</span><span data-dcnode-id="5369" instrument_node="">. </span><span data-dcnode-id="5368" instrument_node="">Hypothesis development</span></h2><p data-dcnode-id="5362" id="par0100"><span data-dcnode-id="5366" instrument_node="">On the basis of the theoretical background, the extent to which visitors’ engage in activities depends on absorption and immersion. These are referred to as the desire with which they engage in experiences [</span><a class="workspace-trigger" data-dcnode-id="5364" href="#bib0215" name="bbib0215"><span data-dcnode-id="5365" instrument_node="">43</span></a><span data-dcnode-id="5363" instrument_node="">]. On the one hand, absorption leads to visitors only receiving some information; on the other hand, immersion means visitors being completely involved in an experience.</span></p><div data-dcnode-id="5326"><p data-dcnode-id="5351" id="par0105"><span data-dcnode-id="5361" instrument_node="">According to Pine &amp; Gilmore’s [</span><a class="workspace-trigger" data-dcnode-id="5359" href="#bib0075" name="bbib0075"><span data-dcnode-id="5360" instrument_node="">15</span></a><span data-dcnode-id="5358" instrument_node="">] experience economy model, immersion (esthetics and escapism) looks at the psychological state of the key factors to establish visitors’ belief that the experience will be enhanced over time, while absorption (entertainment and education) represents the behaviors visitors engage in to influence the psychological experience through VR devices. Therefore, the Pine &amp; Gilmore [</span><a class="workspace-trigger" data-dcnode-id="5356" href="#bib0075" name="bbib0075"><span data-dcnode-id="5357" instrument_node="">15</span></a><span data-dcnode-id="5355" instrument_node="">] model can be extended into a causal model based on the behavioral-attitudinal theory, where absorption (entertainment and education) is the antecedent of immersion (esthetic and escapism), and immersion influences the overall museum experience and encourages future museum patronage. Therefore, we suggest the causal model as shown in </span><a class="workspace-trigger" data-dcnode-id="5353" href="#fig0005" name="bfig0005"><span data-dcnode-id="5354" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5352" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="5327" id="fig0005"><span data-dcnode-id="5335"><img alt="Fig. 1" aria-describedby="cap0005" data-dcnode-id="5350" height="308" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378720618310280-gr1.jpg&amp;raw"><span data-dcnode-id="5349" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5336"><li data-dcnode-id="5343"><a class="anchor download-link u-font-sans" data-dcnode-id="5344" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378720618310280-gr1_lrg.jpg" target="_blank" title="Download high-res image (321KB)"><span class="anchor-text" data-dcnode-id="5345"><span data-dcnode-id="5348" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5346"><span data-dcnode-id="5347" instrument_node="">Download high-res image (321KB)</span></span></span></a></li><li data-dcnode-id="5337"><a class="anchor download-link u-font-sans" data-dcnode-id="5338" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378720618310280-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5339"><span data-dcnode-id="5342" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5340"><span data-dcnode-id="5341" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5328"><span data-dcnode-id="5329" id="cap0005"><p data-dcnode-id="5330" id="spar0005"><span class="label" data-dcnode-id="5333"><span data-dcnode-id="5334" instrument_node="">Fig. 1</span></span><span data-dcnode-id="5332" instrument_node="">. </span><span data-dcnode-id="5331" instrument_node="">Proposed research model.</span></p></span></span></figure></div><section data-dcnode-id="5255" id="sec0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5322" id="sect0050"><span data-dcnode-id="5325" instrument_node="">3.1</span><span data-dcnode-id="5324" instrument_node="">. </span><span data-dcnode-id="5323" instrument_node="">Absorption and immersion</span></h3><p data-dcnode-id="5291" id="par0110"><span data-dcnode-id="5321" instrument_node="">Absorption is “occupying a person’s attention by bringing the experience into the mind.” On the other hand, immersion requires the participant to go into the experience and be part of it. It is “becoming physically (or virtually) a part of the experience itself” [</span><a class="workspace-trigger" data-dcnode-id="5319" href="#bib0085" name="bbib0085"><span data-dcnode-id="5320" instrument_node="">17, p. 31</span></a><span data-dcnode-id="5314"><span data-dcnode-id="5318" instrument_node="">]. Therefore, an absorptive experience generally should precede an </span><a class="topic-link" data-dcnode-id="5316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/immersive-experience" title="Learn more about immersive experience from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5317" instrument_node="">immersive experience</span></a><span data-dcnode-id="5315" instrument_node="">. Particularly in the VR environment, users absorb and immerse themselves at the same time; however, education/entertainment and escapism/esthetics are different dimensions, and absorption occurs before immersion. This is because people have more immersive experiences when they have knowledge or interest. According to Song et al. [</span></span><a class="workspace-trigger" data-dcnode-id="5312" href="#bib0095" name="bbib0095"><span data-dcnode-id="5313" instrument_node="">19</span></a><span data-dcnode-id="5311" instrument_node="">], educational experience is characterized as a mix of active participation and absorption and refers to tourists’ desire to learn something new and create new knowledge as part of their travel experience </span><a class="workspace-trigger" data-dcnode-id="5309" href="#bib0090" name="bbib0090"><span data-dcnode-id="5310" instrument_node="">[18]</span></a><span data-dcnode-id="5308" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5306" href="#bib0080" name="bbib0080"><span data-dcnode-id="5307" instrument_node="">[16]</span></a><span data-dcnode-id="5301"><span data-dcnode-id="5305" instrument_node="">. Previous studies have found that technology has positive effects on the </span><a class="topic-link" data-dcnode-id="5303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/learning-experiences" title="Learn more about learning experience from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5304" instrument_node="">learning experience</span></a><span data-dcnode-id="5302" instrument_node=""> within tourism [</span></span><a class="workspace-trigger" data-dcnode-id="5299" href="#bib0220" name="bbib0220"><span data-dcnode-id="5300" instrument_node="">44</span></a><span data-dcnode-id="5298" instrument_node="">]. Within the context of film festivals, Park et al. [</span><a class="workspace-trigger" data-dcnode-id="5296" href="#bib0225" name="bbib0225"><span data-dcnode-id="5297" instrument_node="">45</span></a><span data-dcnode-id="5295" instrument_node="">] found a significant effect of educational experience on the escape experience. In an entirely different context, exploring music for educational purposes, Lai [</span><a class="workspace-trigger" data-dcnode-id="5293" href="#bib0230" name="bbib0230"><span data-dcnode-id="5294" instrument_node="">46</span></a><span data-dcnode-id="5292" instrument_node="">] revealed the effect of education experience on esthetic experience.</span></p><p data-dcnode-id="5256" id="par0115"><span data-dcnode-id="5290" instrument_node="">Pine and Gilmore [</span><a class="workspace-trigger" data-dcnode-id="5288" href="#bib0075" name="bbib0075"><span data-dcnode-id="5289" instrument_node="">15</span></a><span data-dcnode-id="5287" instrument_node="">] described entertainment as the combination of tourists’ absorption and passive participation. According to Jung et al. [</span><a class="workspace-trigger" data-dcnode-id="5285" href="#bib0035" name="bbib0035"><span data-dcnode-id="5286" instrument_node="">7</span></a><span data-dcnode-id="5284" instrument_node="">], entertainment is the most important concept in today’s tourism context and refers to tourists’ ability to enjoy activities for pleasure. In fact, Hosany and Witham </span><a class="workspace-trigger" data-dcnode-id="5282" href="#bib0090" name="bbib0090"><span data-dcnode-id="5283" instrument_node="">[18,p. 8]</span></a><span data-dcnode-id="5281" instrument_node=""> revealed entertainment to be “one of the oldest forms of experience and usually involves a passive involvement of the individual,” which is represented in the research model, as tourists can be fully absorbed in the experience. Like this, through VR, device absorption will influence immersion over time. Hence, we hypothesize the following:</span></p><section data-dcnode-id="5275"><p data-dcnode-id="5278" id="enun0005"><strong data-dcnode-id="5279"><span data-dcnode-id="5280" instrument_node="">H1</span></strong></p><p data-dcnode-id="5276" id="par0120"><span data-dcnode-id="5277" instrument_node="">Education experience through VR has a positive effect on escapism experience.</span></p></section><section data-dcnode-id="5269"><p data-dcnode-id="5272" id="enun0010"><strong data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">H2</span></strong></p><p data-dcnode-id="5270" id="par0125"><span data-dcnode-id="5271" instrument_node="">Education experience through VR has a positive effect on esthetic experience.</span></p></section><section data-dcnode-id="5263"><p data-dcnode-id="5266" id="enun0015"><strong data-dcnode-id="5267"><span data-dcnode-id="5268" instrument_node="">H3</span></strong></p><p data-dcnode-id="5264" id="par0130"><span data-dcnode-id="5265" instrument_node="">Entertainment experience through VR has a positive effect on escapism experience.</span></p></section><section data-dcnode-id="5257"><p data-dcnode-id="5260" id="enun0020"><strong data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">H4</span></strong></p><p data-dcnode-id="5258" id="par0135"><span data-dcnode-id="5259" instrument_node="">Entertainment experience through VR has a positive effect on esthetic experience.</span></p></section><p></p></section><section data-dcnode-id="5221" id="sec0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5251" id="sect0055"><span data-dcnode-id="5254" instrument_node="">3.2</span><span data-dcnode-id="5253" instrument_node="">. </span><span data-dcnode-id="5252" instrument_node="">Immersion and museum experience</span></h3><p data-dcnode-id="5222" id="par0140"><span data-dcnode-id="5250" instrument_node="">Banos et al. [</span><a class="workspace-trigger" data-dcnode-id="5248" href="#bib0235" name="bbib0235"><span data-dcnode-id="5249" instrument_node="">47</span></a><span data-dcnode-id="5247" instrument_node="">] described the degree of immersion in a virtual experience as one of the key aspects of perceiving the experience as “real.” According to Pine and Gilmore [</span><a class="workspace-trigger" data-dcnode-id="5245" href="#bib0085" name="bbib0085"><span data-dcnode-id="5246" instrument_node="">17</span></a><span data-dcnode-id="5244" instrument_node="">], escapism and esthetics are key constructs of immersion. Escapism has often been described as a key reason tourists travel to other destinations and visit various attractions. According to [</span><a class="workspace-trigger" data-dcnode-id="5242" href="#bib0225" name="bbib0225"><span data-dcnode-id="5243" instrument_node="">45</span></a><span data-dcnode-id="5241" instrument_node="">], p. 50), “although an escape has been repeatedly suggested as a generic quality of tourism, conceptual and empirical efforts supporting such a role of escape are not well documented in the tourism literature.” In the wine tourism context, Quadri-Felitti and Fiore [</span><a class="workspace-trigger" data-dcnode-id="5239" href="#bib0110" name="bbib0110"><span data-dcnode-id="5240" instrument_node="">22</span></a><span data-dcnode-id="5238" instrument_node="">] found that esthetics had the greatest effect on memorable experiences and behavioral intentions. This was confirmed by Chang and Lin [</span><a class="workspace-trigger" data-dcnode-id="5236" href="#bib0240" name="bbib0240"><span data-dcnode-id="5237" instrument_node="">48</span></a><span data-dcnode-id="5235" instrument_node="">], who confirmed that escapism and esthetics through VR influence the experiential value within the tourism industry, and thus, we hypothesize the following:</span></p><section data-dcnode-id="5229"><p data-dcnode-id="5232" id="enun0025"><strong data-dcnode-id="5233"><span data-dcnode-id="5234" instrument_node="">H5</span></strong></p><p data-dcnode-id="5230" id="par0145"><span data-dcnode-id="5231" instrument_node="">Escapism experience through VR has a positive effect on overall VR museum experience.</span></p></section><section data-dcnode-id="5223"><p data-dcnode-id="5226" id="enun0030"><strong data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">H6</span></strong></p><p data-dcnode-id="5224" id="par0150"><span data-dcnode-id="5225" instrument_node="">Esthetic experience through VR has a positive effect on overall VR museum experience.</span></p></section><p></p></section><section data-dcnode-id="5185" id="sec0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5217" id="sect0060"><span data-dcnode-id="5220" instrument_node="">3.3</span><span data-dcnode-id="5219" instrument_node="">. </span><span data-dcnode-id="5218" instrument_node="">Overall VR museum experience and intention to visit museum</span></h3><p data-dcnode-id="5186" id="par0155"><span data-dcnode-id="5216" instrument_node="">Research has long established that positive experiences lead to behavioral intentions to visit places in the future [</span><a class="workspace-trigger" data-dcnode-id="5214" href="#bib0075" name="bbib0075"><span data-dcnode-id="5215" instrument_node="">15</span></a><span data-dcnode-id="5213" instrument_node="">]. Using the experience economy perspective, Chang and Lin [</span><a class="workspace-trigger" data-dcnode-id="5211" href="#bib0240" name="bbib0240"><span data-dcnode-id="5212" instrument_node="">48</span></a><span data-dcnode-id="5210" instrument_node="">] supported the idea that experiences strongly influence behavioral intentions within the tourism context. Similar observations have been made in the museum context, and a study by Jung et al. [</span><a class="workspace-trigger" data-dcnode-id="5208" href="#bib0035" name="bbib0035"><span data-dcnode-id="5209" instrument_node="">7</span></a><span data-dcnode-id="5207" instrument_node="">] found that positive technology experiences during a museum experience lead to an intention to visit. In addition, Pallud and Straub [</span><a class="workspace-trigger" data-dcnode-id="5205" href="#bib0140" name="bbib0140"><span data-dcnode-id="5206" instrument_node="">28</span></a><span data-dcnode-id="5204" instrument_node="">] and Chung et al. [</span><a class="workspace-trigger" data-dcnode-id="5202" href="#bib0180" name="bbib0180"><span data-dcnode-id="5203" instrument_node="">36</span></a><span data-dcnode-id="5193"><span data-dcnode-id="5201" instrument_node="">] stated that websites and </span><a class="topic-link" data-dcnode-id="5199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/augmented-reality" title="Learn more about augmented reality from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5200" instrument_node="">augmented reality</span></a><span data-dcnode-id="5194"><span data-dcnode-id="5198" instrument_node=""> aiming at advertising and providing information to visitors drew more visitors to the museum. In the context of the present study, </span><a class="topic-link" data-dcnode-id="5196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/virtual-reality-technology" title="Learn more about VR technology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5197" instrument_node="">VR technology</span></a><span data-dcnode-id="5195" instrument_node=""> is used to promote a museum in a different location, hoping for visitors to plan a visit in the future. Therefore, we hypothesize the following:</span></span></span></p><section data-dcnode-id="5187"><p data-dcnode-id="5190" id="enun0035"><strong data-dcnode-id="5191"><span data-dcnode-id="5192" instrument_node="">H7</span></strong></p><p data-dcnode-id="5188" id="par0160"><span data-dcnode-id="5189" instrument_node="">Overall VR museum experience has a positive effect on museum visit intention.</span></p></section><p></p></section></section><section data-dcnode-id="4643" id="sec0050"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5180" id="sect0065"><span data-dcnode-id="5183" instrument_node="">4</span><span data-dcnode-id="5182" instrument_node="">. </span><span data-dcnode-id="5181" instrument_node="">Methodology</span></h2><section data-dcnode-id="4886" id="sec0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5176" id="sect0070"><span data-dcnode-id="5179" instrument_node="">4.1</span><span data-dcnode-id="5178" instrument_node="">. </span><span data-dcnode-id="5177" instrument_node="">Data collection</span></h3><p data-dcnode-id="5171" id="par0165"><span data-dcnode-id="5175" instrument_node="">The aim of this study was to investigate the impacts of absorptive experiences on immersion, overall VR museum experience, and intention to visit a museum. Data were collected at The Museum of Science and Industry in Manchester, UK, during the “Wear it” event from March 10 to 13, 2016. The sample included visitors who were interested in industrial cultural heritage and therefore visited the museum in Manchester. These visitors were invited to have a </span><a class="topic-link" data-dcnode-id="5173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/virtual-reality-experience" title="Learn more about VR experience from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5174" instrument_node="">VR experience</span></a><span data-dcnode-id="5172" instrument_node=""> of the Geevor Tin Mine Museum, one of the UNESCO’s Industrial Heritage Sites in Cornwall, UK. The aim of choosing a sample at a different museum was to inquire about participants’ intention to visit the Geevor Tin Mine Museum after a VR experience.</span></p><p data-dcnode-id="5162" id="par0170"><span data-dcnode-id="5170" instrument_node="">Researchers approached every 10</span><sup data-dcnode-id="5168"><span data-dcnode-id="5169" instrument_node="">th</span></sup><span data-dcnode-id="5163"><span data-dcnode-id="5167" instrument_node=""> museum visitor at the entrance and asked if they were willing to participate in the study. As part of the study, participants had to try the Samsung Gear </span><a class="topic-link" data-dcnode-id="5165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/computer-science/virtual-reality-application" title="Learn more about VR application from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5166" instrument_node="">VR application</span></a><span data-dcnode-id="5164" instrument_node=""> before completing a questionnaire on their experience. The VR application consisted of three different stories about the museum. Participants experienced the following: 1. The Dry Room, the changing room of the miners; 2. A lift ride in the mining shaft to reenact how miners originally went down the mine to start their work; and 3. A walk through the mine. Audio was provided to transport visitors into the past and create a memorable experience. After experiencing the museum using VR, 269 participants completed a questionnaire.</span></span></p><div data-dcnode-id="4892"><p data-dcnode-id="5157" id="par0175"><span data-dcnode-id="5161" instrument_node="">The sociodemographic characteristics of the sample are shown in </span><a class="workspace-trigger" data-dcnode-id="5159" href="#tbl0005" name="btbl0005"><span data-dcnode-id="5160" instrument_node="">Table 1</span></a><span data-dcnode-id="5158" instrument_node="">. The respondents were evenly distributed between men (50.2%) and women (49.8%). The majority of respondents were between the ages of 18 and 54. A quarter of the participants had an undergraduate degree (24.5%), followed by A-level (19%) and a postgraduate degree (18.6%). With regard to income level, 23% of the respondents reported an annual income of between £40,000 and £49,000, and almost half of the respondents were employed full time (46.1%).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4893" id="tbl0005"><span class="captions" data-dcnode-id="5150"><span data-dcnode-id="5151" id="cap0025"><p data-dcnode-id="5152" id="spar0025"><span class="label" data-dcnode-id="5155"><span data-dcnode-id="5156" instrument_node="">Table 1</span></span><span data-dcnode-id="5154" instrument_node="">. </span><span da n></td></tr><tr data-dcnode-id="4921"><th class="align-left" data-dcnode-id="4928" scope="row"></th><td class="align-left" data-dcnode-id="4926"><span data-dcnode-id="4927" instrument_node="">Unemployed</span></td><td class="align-left" data-dcnode-id="4924"><span data-dcnode-id="4925" instrument_node="">3</span></td><td class="align-left" data-dcnode-id="4922"><span data-dcnode-id="4923" instrument_node="">1.1</span></td></tr><tr data-dcnode-id="4913"><th class="align-left" data-dcnode-id="4920" scope="row"></th><td class="align-left" data-dcnode-id="4918"><span data-dcnode-id="4919" instrument_node="">Retired</span></td><td class="align-left" data-dcnode-id="4916"><span data-dcnode-id="4917" instrument_node="">6</span></td><td class="align-left" data-dcnode-id="4914"><span data-dcnode-id="4915" instrument_node="">2.2</span></td></tr><tr data-dcnode-id="4905"><th class="align-left" data-dcnode-id="4912" scope="row"></th><td class="align-left" data-dcnode-id="4910"><span data-dcnode-id="4911" instrument_node="">Student</span></td><td class="align-left" data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">67</span></td><td class="align-left" data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">24.9</span></td></tr><tr data-dcnode-id="4897"><th class="align-left" colspan="2" data-dcnode-id="4902" scope="row"><strong data-dcnode-id="4903"><span data-dcnode-id="4904" instrument_node="">Total</span></strong></th><td class="align-left" data-dcnode-id="4900"><span data-dcnode-id="4901" instrument_node="">269</span></td><td class="align-left" data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">100</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="4887" id="par0180"><span data-dcnode-id="4891" instrument_node="">Nunnally [</span><a class="workspace-trigger" data-dcnode-id="4889" href="#bib0245" name="bbib0245"><span data-dcnode-id="4890" instrument_node="">49</span></a><span data-dcnode-id="4888" instrument_node="">] suggested that the sample size using AMOS (Analysis of Moment Structures) is required to be greater than 10 times the total number of measurement items. A total of 21 measurement items were used in our study, and therefore, the minimum sample size is 210. In this vein, a total of 269 questionnaires meet this cutoff point.</span></p></section><section data-dcnode-id="4644" id="sec0060"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4882" id="sect0075"><span data-dcnode-id="4885" instrument_node="">4.2</span><span data-dcnode-id="4884" instrument_node="">. </span><span data-dcnode-id="4883" instrument_node="">Measures</span></h3><div data-dcnode-id="4645"><p data-dcnode-id="4862" id="par0185"><span data-dcnode-id="4881" instrument_node="">Measurement items were adopted from previous studies (e.g., </span><a class="workspace-trigger" data-dcnode-id="4879" href="#bib0180" name="bbib0180"><span data-dcnode-id="4880" instrument_node="">[36]</span></a><span data-dcnode-id="4878" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4876" href="#bib0315" name="bbib0315"><span data-dcnode-id="4877" instrument_node="">[63]</span></a><span data-dcnode-id="4875" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4873" href="#bib0080" name="bbib0080"><span data-dcnode-id="4874" instrument_node="">[16]</span></a><span data-dcnode-id="4872" instrument_node="">) and modified based on the context of this study: education (4 items), entertainment (5 items), esthetics (3 items), and escapism (4 items) experience items were adopted from Oh et al. [</span><a class="workspace-trigger" data-dcnode-id="4870" href="#bib0080" name="bbib0080"><span data-dcnode-id="4871" instrument_node="">16</span></a><span data-dcnode-id="4869" instrument_node="">]; VR museum experience items (3) were adopted from Kim &amp; Tussyadiah, (2013); and intention to visit museum items (3) were adopted from [</span><a class="workspace-trigger" data-dcnode-id="4867" href="#bib0180" name="bbib0180"><span data-dcnode-id="4868" instrument_node="">36</span></a><span data-dcnode-id="4866" instrument_node="">]. This procedure yielded a total number of 21 measurement items, which are summarized in </span><a class="workspace-trigger" data-dcnode-id="4864" href="#tbl0010" name="btbl0010"><span data-dcnode-id="4865" instrument_node="">Table 2</span></a><span data-dcnode-id="4863" instrument_node="">. All of them were measured on a seven-point Likert scale (1=strongly disagree and 7=strongly agree).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4646" id="tbl0010"><span class="captions" data-dcnode-id="4851"><span data-dcnode-id="4852" id="cap0030"><p data-dcnode-id="4853" id="spar0030"><span class="label" data-dcnode-id="4860"><span data-dcnode-id="4861" instrument_node="">Table 2</span></span><span data-dcnode-id="4859" instrument_node="">. </span><span data-dcnode-id="4858" instrument_node="">Reliability and Cross-loading.</span><a class="workspace-trigger" data-dcnode-id="4855" href="#tblfn0005" name="btblfn0005"><sup data-dcnode-id="4856"><span data-dcnode-id="4857" instrument_node="">a</span></sup></a><span data-dcnode-id="4854" instrument_node="">.</span></p></span></span><div class="groups" data-dcnode-id="4674"><table data-dcnode-id="4675"><thead class="valign-top" data-dcnode-id="4830"><tr data-dcnode-id="4831"><th class="align-left rowsep-1" colspan="2" data-dcnode-id="4849" scope="col"><span data-dcnode-id="4850" instrument_node="">Constructs and measurement items</span></th><th class="rowsep-1 align-left" data-dcnode-id="4847" scope="col"><span data-dcnode-id="4848" instrument_node="">Loadings</span></th><th class="rowsep-1 align-left" data-dcnode-id="4842" scope="col"><span data-dcnode-id="4846" instrument_node="">C.R.</span><a class="workspace-trigger" data-dcnode-id="4843" href="#tblfn0010" name="btblfn0010"><sup data-dcnode-id="4844"><span data-dcnode-id="4845" instrument
