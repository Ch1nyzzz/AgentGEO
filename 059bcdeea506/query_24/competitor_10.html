pan data-dcnode-id="3411" instrument_node="">Web-based AR app development tutorial with WebXR</span></h3><div class="article-details article-details--separator-line" data-dcnode-id="3404" data-testid="article-sidebar-details"><div class="article-details__info-wrapper" data-dcnode-id="3405"><p class="article-details__info" data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">Marius Noreikis</span></p><p class="article-details__info" data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">12.15.20</span></p></div></div></div></div></div><div data-dcnode-id="3400" data-focus-guard="true" style="width:1px;height:0px;padding:0;overflow:hidden;position:fixed;top:1px;left:1px" tabindex="-1"></div></aside></div><div class="column page-article-layout__body column--6-12 fixed" data-dcnode-id="115"><div class="page-article-layout__body-content text-content-styles" data-dcnode-id="116" id="body"><h2 data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">What is augmented reality?</span></h2><p data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">What do blockbuster sci-fi movies like The Terminator, Avatar, and Star Wars all have in common? Struggling to answer? They all have augmented reality (AR) technology helping the main protagonists (and antagonists). The Terminator scanning people to measure their clothes, military execs examining Na’vi’s tree in a world of Avatar, or Chewbacca playing a game of Dejarik are all examples of AR. In simplest of explanations, AR is digital content overlaid on top of a physical world.</span></p><p data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">Luckily, one does not have to be a sci-fi character to experience AR. Ever caught a virtual monster in Pokemon GO? Use Foursquare? Maybe you tried out the virtual IKEA option to see how furniture looks in your flat? Well, there you go!</span></p><figure class="embedded-asset" data-dcnode-id="3378"><div class="embedded-asset__wrapper" data-dcnode-id="3379" style="max-width:1080px"><div class="gatsby-image-wrapper" data-dcnode-id="3381" data-gatsby-image-wrapper=""><div aria-hidden="true" data-dcnode-id="3391" style="padding-top:50%"></div><img alt="" aria-hidden="true" data-dcnode-id="3390" data-placeholder-image="" decoding="async" src="data:image/jpeg;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAKCAMAAACDi47UAAACJVBMVEVWWFJfYFpiY15oaWNtb2lzdG95enR9fniBgnyGh4CJi4WNjYejoZugnpmcmZSZl49tbWViY1ugpq3c4uxcXVdjZF5naWNsbmhyc253eXN9fnmBgn2Gh4GKi4WOj4mQkYumo5yin5qgnZaVlItubmZiY1y0u8br8vdYWVNmZ2FrbWdwcmx1eHJ7fHeFh4GRkoySlI6wraatqqORkIdlZV7H0t/w9vYvMjRkZV9ub2l6e3WIiYOLi4aPj4mIioWMjYiPkYuTlI6UlI6npJ6joZqKiYBqamFubmnU4O75/PpCPTFtbml0dXDn4tbq5drs59vo49iLjIeRk42UlY+1squ2s6t/fXNmY1l5enfl7PX5+/lPTkdaWlVvcGzl4NXo49fp5Njr5dq2trG1tbC0tK6xsKrKxr7Jxr3IxLxwbWNeXFB1d3TP1+D3+/pAQDtQUlFwc3DX08nm4dXo4tfa1cy/vLe/vbjAvbjp49jn4dZiX1RWU0djYlqJjY64wMk2LiU/NCdNQTG/t6rh3NKwrai0sazNyMKzsKu/u7Xd2MxUTUFKRTldWU5qaWJ5e3k7KxxCMyJMOSFVRCxWRjBaSjVqWENmVUBrWEN1ZVB5a1h+cV+AdGOCd2eBdmY+LRkzIxRVUERhXVNsaWFGNiBOOyNYRClgSi5lTjJpUTRuVTZuVTVxVjZ1Wzt2XT5zWz1sVTlnUDZjTjRaRy9HNyNRTEFeWlFsZ15Lutc/AAAACXBIWXMAABcRAAAXEQHKJvM/AAAAB3RJTUUH5gIUFw0PlQoXvgAAAFVJREFUCNdjZGDEAkSwiLFABN8Jv2cUZGQEarurAuSaIys5aQGhvaD8syZA5TALomGqkGxkEYaJAQWvaUMFgcYzfmPgBnMEn2tBBAVAHKhqW1QnoQIA5nILgChpV0kAAAAASUVORK5CYII=" style="opacity: 0; transition: opacity 500ms linear 0s;"><picture data-dcnode-id="3386"><source data-dcnode-id="3389" srcset="//images.ctfassets.net/63kg6hcp5guk/2CNn6Vky3QylfpFYrDquLl/42a88a07ffaf6c939d23b2b6ff9ee607/Web-based_AR_app_development_tutorial_with_WebXR?w=750&amp;h=375&amp;q=85&amp;fm=webp 750w,//images.ctfassets.net/63kg6hcp5guk/2CNn6Vky3QylfpFYrDquLl/42a88a07ffaf6c939d23b2b6ff9ee607/Web-based_AR_app_development_tutorial_with_WebXR?w=1080&amp;h=540&amp;q=85&amp;fm=webp 1080w" type="image/webp"><source data-dcnode-id="3388" srcset="" type="image/undefined"><img alt="Web-based AR app development tutorial with WebXR" data-dcnode-id="3387" data-gatsby-image-ssr="" data-main-image="" decoding="async" loading="lazy" style="opacity: 1;"></picture><noscript data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">&lt;picture&gt;&lt;source type="image/webp" srcSet="//images.ctfassets.net/63kg6hcp5guk/2CNn6Vky3QylfpFYrDquLl/42a88a07ffaf6c939d23b2b6ff9ee607/Web-based_AR_app_development_tutorial_with_WebXR?w=750&amp;amp;h=375&amp;amp;q=85&amp;amp;fm=webp 750w,//images.ctfassets.net/63kg6hcp5guk/2CNn6Vky3QylfpFYrDquLl/42a88a07ffaf6c939d23b2b6ff9ee607/Web-based_AR_app_development_tutorial_with_WebXR?w=1080&amp;amp;h=540&amp;amp;q=85&amp;amp;fm=webp 1080w"/&gt;&lt;source type="image/undefined" srcSet=""/&gt;&lt;img data-gatsby-image-ssr="" data-main-image="" style="opacity:0" decoding="async" loading="lazy" alt="Web-based AR app development tutorial with WebXR"/&gt;&lt;/picture&gt;</span></noscript></div><span data-dcnode-id="3380" instrument_node=""></span></div></figure><h3 data-dcnode-id="3375"><em data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">Fitting furniture with IKEA Place AR application</span></em></h3><p data-dcnode-id="3364"><span data-dcnode-id="3374" instrument_node="">While AR gained popularity from the movies, it originated from (and still plays an important role) in the industry realm. In fact, AR is an important piece of technology in an era of Industry 4.0 and is starting to surpass Virtual Reality (VR). Reports from </span><a data-dcnode-id="3372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.idc.com/getdoc.jsp%3FcontainerId%3DprUS45679219"><span data-dcnode-id="3373" instrument_node="">IDC</span></a><span data-dcnode-id="3371" instrument_node=""> and </span><a data-dcnode-id="3369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/statistics/591181/global-augmented-virtual-reality-market-size/"><span data-dcnode-id="3370" instrument_node="">Statista</span></a><span data-dcnode-id="3368" instrument_node=""> forecast the AR and VR market to reach $20 billion in 2020 within the industrial market, accounting for nearly two-thirds of the value. </span><a data-dcnode-id="3366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goldmansachs.com/insights/podcasts/episodes/05-18-2018-heather-bellini.html"><span data-dcnode-id="3367" instrument_node="">Others</span></a><span data-dcnode-id="3365" instrument_node=""> speculate that the market will surpass $100 billion in the next five years. </span></p><p data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">Initially, one needed special-purpose hardware devices to use AR. Over time, AR went from using smart handheld devices and smart glasses to the web. Early AR toolkits and libraries for the web offered limited functionality and suffered poor interoperability and high fragmentation. Commercial solutions such as XR+ and 8th Wall showed promise but required users to sign up for vendor lock-in, proving a blocker for some. The World Wide Web Consortium (W3C) released a specification for WebXR with a native web browser API for AR and VR. The specification gained tremendous interest within major browser vendors, some offering initial implementations of the draft specification.</span></p><p data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">In this blog, I’ll go over the business benefits of AR, review how to overcome mobile complexities, and provide a detailed tutorial on how to develop an AR webpage using WebXR.</span></p><h2 data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">What are the benefits of AR?</span></h2><p data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">The recently introduced concept of Industry 4.0 defines AR as one of the key enabling technologies alongside the Internet of Things (IoT), robotics, big data, and cloud computing. Its high-level purpose is bridging a gap between physical and virtual worlds. Some typical examples of industrial AR include presenting IoT data in real-time, facilitating on-site maintenance, improving employee training, and safety.</span></p><p data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">For example, with the help of AR, industrial property managers can overlay building information models (BIM) or digital twins inside a physical building. Property managers are able to carry out building maintenance on-site with the assistance of AR apps, including:</span></p><ul data-dcnode-id="3344"><li data-dcnode-id="3351"><p data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">analyzing wiring, ventilation, and heating systems, or data from nearby sensors. </span></p></li><li data-dcnode-id="3348"><p data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">performing actions, such as adjusting climate control at that particular point of the building.</span></p></li><li data-dcnode-id="3345"><p data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">creating and generating location-based feedback, such as identifying and documenting defects within a venue or noting maintenance requests.</span></p></li></ul><figure class="embedded-asset" data-dcnode-id="3330"><div class="embedded-asset__wrapper" data-dcnode-id="3331" style="max-width:765px"><div class="gatsby-image-wrapper" data-dcnode-id="3333" data-gatsby-image-wrapper=""><div aria-hidden="true" data-dcnode-id="3343" style="padding-top:56.470588235294116%"></div><img alt="" aria-hidden="true" data-dcnode-id="3342" data-placeholder-image="" decoding="async" src="data:image/jpeg;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAALCAMAAABI111xAAAClFBMVEXJwLXAtamekoKdlH+ZkXxsYFQ9MyqFeGGQhGV3al0st7kxWnJLLGdiUnZsbVtuby5PSkBjWUd6b158cmM2UkqCgVGPu3slr0ZcnWjNv7G3rKNhXl6cnneMxJNgw7heuKdVt65IUntFg3dAkIdDooRckzhhXj10bmFjWlKSiX6hlIGRhnSDeWqJgHTDuJ7EuaGqsJh8pomFs6dolYtXiYFjm49opIxCioM32NtQVFlPMWplUHVVTkN1bGRxaGBxZVZkWktvZlq7qHSzs41ixbdinItimYlkkntZjXlVhXFhiXVmjXZ3kn2clH1cRGFqWW9YWVWNh4SurbBVTUdcU0deWlLDqnyPx7Ry18q/tZixp4ubkXGOh19uZ0l1cU6Qi2WTgWdrW0dTOGloUntxenuJh4mTkZJCPjxOSEBUU07Hr3581cmI0KTHtpmG0IRtpWtdhldcgFBffk5mZUx2ZlN4Y0NSN1tnTnqboJSSqa2JnqBUZmRWYFrQwrBo39WdxpDQvKR02HispJKYj3uKgWZfjExqdkdrXkFrXDxeSlFtU2p4f1JWh2FUgV5QgVlfcDFzaFJI6Oi3xYvQwJt6zWKtnWukmnWJf1xmeElOeURPQjJRRTU7a35ZTIBChH04enY6e3Y6j4JUajNwcVE16OmenG7IuaBu1muxoXGsn3WlnoGCnG9gmGdafGFdi3RXopZlVW9nk3NSiG9Vi21gmG1Pc2BghG1D3dyimmdtbUJez266qY+voIuThGyGfW1dm4BMnItSlJFJnZ1ZPXhAdnI0gH0vhX1Li2xNTUFAx8Jfn42fnG0/p0lMtWTHuqy2qp6Vhm6blHOLv3CXqHuenomIj4ZUVopJn5BAmo5KkGtRYzdtZki1qiIrAAAAKHRSTlPe3t7e3t7e3t7e3t7e5/PZ2dnZ2f39/f39/f39/f39/f39/f39/f3Yr9ei3QAAAAlwSFlzAAAXEQAAFxEByibzPwAAAAd0SU1FB+YCFBcNEBgCGksAAAAiSURBVAjXY2RgRAbSEEqPEROwiFAiOIlFGJtKGggyYnMSADoFAn1uevFVAAAAAElFTkSuQmCC" style="opacity: 0; transition: opacity 500ms linear 0s;"><picture data-dcnode-id="3338"><source data-dcnode-id="3341" srcset="//images.ctfassets.net/63kg6hcp5guk/CMmWtotEvWFbYGFJ3c8ZF/4ce425d40718d31a1c6a3559aece9356/Web-based_AR_app_development_tutorial_with_WebXR?w=750&amp;h=424&amp;q=85&amp;fm=webp 750w,//images.ctfassets.net/63kg6hcp5guk/CMmWtotEvWFbYGFJ3c8ZF/4ce425d40718d31a1c6a3559aece9356/Web-based_AR_app_development_tutorial_with_WebXR?w=765&amp;h=432&amp;q=85&amp;fm=webp 765w" type="image/webp"><source data-dcnode-id="3340" srcset="" type="image/undefined"><img alt="Web-based AR app development tutorial with WebXR" data-dcnode-id="3339" data-gatsby-image-ssr="" data-main-image="" decoding="async" loading="lazy" style="opacity: 1;"></picture><noscript data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">&lt;picture&gt;&lt;source type="image/webp" srcSet="//images.ctfassets.net/63kg6hcp5guk/CMmWtotEvWFbYGFJ3c8ZF/4ce425d40718d31a1c6a3559aece9356/Web-based_AR_app_development_tutorial_with_WebXR?w=750&amp;amp;h=424&amp;amp;q=85&amp;amp;fm=webp 750w,//images.ctfassets.net/63kg6hcp5guk/CMmWtotEvWFbYGFJ3c8ZF/4ce425d40718d31a1c6a3559aece9356/Web-based_AR_app_development_tutorial_with_WebXR?w=765&amp;amp;h=432&amp;amp;q=85&amp;amp;fm=webp 765w"/&gt;&lt;source type="image/undefined" srcSet=""/&gt;&lt;img data-gatsby-image-ssr="" data-main-image="" style="opacity:0" decoding="async" loading="lazy" alt="Web-based AR app development tutorial with WebXR"/&gt;&lt;/picture&gt;</span></noscript></div><span data-dcnode-id="3332" instrument_node=""></span></div></figure><h3 data-dcnode-id="3327"><em data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">BIM model overlaid within a building using AR. Image courtesy INSITER</span></em></h3><p data-dcnode-id="3322"><span data-dcnode-id="3326" instrument_node="">Not surprisingly, maintenance is another area benefitting from AR. In large industrial spaces, such as power plants, mines, or factories, AR can provide guidance for maintenance workers. </span><a data-dcnode-id="3324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//luxurylaunches.com/gadgets/mercedes-benz-technicians-in-the-us-will-now-use-microsoft-hololens-2-and-augmented-reality-to-fix-cars.php"><span data-dcnode-id="3325" instrument_node="">Mercedes-Benz</span></a><span data-dcnode-id="3323" instrument_node=""> recently started using Microsoft HoloLens as an AR remote assistance tool to improve the speed and safety of repair and maintenance work.</span></p><p data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">An AR maintenance application could efficiently:</span></p><ul data-dcnode-id="3307"><li data-dcnode-id="3317"><p data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">navigate workers to places that require maintenance, display, and warn about hazardous areas.</span></p></li><li data-dcnode-id="3314"><p data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">assist the maintenance process by identifying and annotating various parts of machinery under maintenance.</span></p></li><li data-dcnode-id="3311"><p data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">present related instructions in place.</span></p></li><li data-dcnode-id="3308"><p data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node="">create a communication channel between an on-site maintenance worker and an off-site expert, who may be helping with the maintenance task. </span></p></li></ul><p data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">Remote access teams also benefit from AR. For example, training for nuclear plant employees can be (and most probably should be) carried out remotely within a simulated environment that, with the help of AR, reassembles the real machinery and simulates tasks that normally be carried out under hazardous conditions. In recent years, remote access has become even more important due to global disasters, such as military conflicts or pandemics that impact traveling between sites and scheduling on-site business meetings. Luckily, AR can easily circumvent problems by bringing interactive 3D prototypes of products across the globe (e.g., a jet engine manufacturer sending 3D scans and models of real-world engines to be thoroughly analyzed in AR by a plane manufacturer off-site).</span></p><p data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">The impact of AR on industries will likely continue to grow in the years to come. Manufacturers, service providers, retailers, and industries will invest in AR and expect a steady growth of usage of AR within industry and business processes. Similar to how videoconferencing enabled remote group meetings, AR will further enable remote work.</span></p><h2 data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">A closer look at mobile AR app development</span></h2><p data-dcnode-id="3290"><span data-dcnode-id="3300" instrument_node="">There is no shortage of prospective use cases for AR. However, is the technology truly ready to tackle the corresponding challenges? Luckily, the answer is yes. Thanks to Microsoft’s </span><a data-dcnode-id="3298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.microsoft.com/en-us/hololens"><span data-dcnode-id="3299" instrument_node="">HoloLens</span></a><span data-dcnode-id="3297" instrument_node="">, along with Apple and Google’s reliable, free to use AR toolkits (</span><a data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//developers.google.com/ar"><span data-dcnode-id="3296" instrument_node="">ARCore</span></a><span data-dcnode-id="3294" instrument_node=""> and </span><a data-dcnode-id="3292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//developer.apple.com/augmented-reality/"><span data-dcnode-id="3293" instrument_node="">ARkit</span></a><span data-dcnode-id="3291" instrument_node="">), developers are able to quickly build mobile AR applications. </span></p><p data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">When developing a mobile AR app, a developer still has to rely on native mobile application development toolkits for both major mobile operating systems (i.e., Android and iOS) in order to reach a wide audience. Furthermore, apps must be obtained and installed through the respective app stores.</span></p><p data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">Unity stepped in, unifying the AR world by releasing the AR Foundation framework. The framework supports developing mobile games with a single codebase for both platforms but requires familiarity with the Unity game engine and developing an AR game (including knowledge of Unity licensing). Even if you happen to be a Unity developer, you still need to require app users to download a large app from an app store.</span></p><p data-dcnode-id="3278"><span data-dcnode-id="3285" instrument_node="">Fortunately, </span><a data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.w3.org/TR/webxr/"><span data-dcnode-id="3284" instrument_node="">WebXR</span></a><span data-dcnode-id="3282" instrument_node=""> will soon solve both issues by bringing AR directly to your mobile web browser. WebXR is a </span><a data-dcnode-id="3280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.w3.org/TR/webxr/"><span data-dcnode-id="3281" instrument_node="">World Wide Web Consortium (W3C)</span></a><span data-dcnode-id="3279" instrument_node=""> specification describing how to interface with Virtual Reality (VR) and AR devices on the web. While still in a working draft, it already deprecates the previous WebVR specification used solely for VR devices and introduces APIs for AR. Simply put, WebXR aims to introduce simple and unified development of VR and AR experiences on the web. </span></p><p data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">The four main responsibilities of WebXR are to:</span></p><ol data-dcnode-id="3263"><li data-dcnode-id="3273"><p data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">Render input from the phone's camera onto a background.</span></p></li><li data-dcnode-id="3270"><p data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">Estimate the phone's position and rotation relative to the real world.</span></p></li><li data-dcnode-id="3267"><p data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Detect real-world surfaces, like tabletops, floors, and walls.</span></p></li><li data-dcnode-id="3264"><p data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">Provide a frame loop for rendering augmented content.</span></p></li></ol><h2 data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">How to build web-based augmented reality applications with WebXR</span></h2><p data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">Now that you know what AR is, its importance for business, and a newly formed initiative for bringing AR to the web, let’s go over how to build an AR application using WebXR. I’ll showcase how to make a simple webpage with an AR view to display an animated 3D object.</span></p><p data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">While WebXR provides means to understand real-world elements (i.e., plane detection, tracking of position, rotation), it does not define how to augment the world. Typically, you’ll want to render three-dimensional life-like objects that blend seamlessly into the world and need a 3D rendering engine to draw some nice-looking assets rather than using floating  tags. In this tutorial, I’ll use a state-of-the-art 3D rendering engine for JavaScript three.js.</span></p><h2 data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">Prerequisites</span></h2><p data-dcnode-id="3247"><span data-dcnode-id="3254" instrument_node="">To start developing with WebXR, you will need a mobile device that supports AR. Google provides an extensive list of </span><a data-dcnode-id="3252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//developers.google.com/ar/discover/supported-devices"><span data-dcnode-id="3253" instrument_node="">supported Android devices</span></a><span data-dcnode-id="3251" instrument_node="">, which support WebXR via Chrome 81+. In the case of iOS, WebXR is currently supported via </span><a data-dcnode-id="3249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.mozvr.com/updating-the-webxr-viewer/"><span data-dcnode-id="3250" instrument_node="">Mozilla WebXR Viewer</span></a><span data-dcnode-id="3248" instrument_node="">. For this tutorial, I will be using a smartphone with an Android 10 operating system. </span></p><p data-dcnode-id="3239"><span data-dcnode-id="3246" instrument_node="">You will also need your favorite text editor/IDE to write JavaScript code, nodejs for serving the developed web pages, and a Chrome desktop browser to debug the application while running on an actual mobile device. It is really simple and useful to debug a mobile web app from your desktop. In the case of Android, this requires setting up </span><a data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//developer.android.com/studio/command-line/adb"><span data-dcnode-id="3245" instrument_node="">Android Development Bridge</span></a><span data-dcnode-id="3243" instrument_node=""> and using Chrome’s inspect devices function. There is a simple </span><a data-dcnode-id="3241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//developers.google.com/web/tools/chrome-devtools/remote-debugging"><span data-dcnode-id="3242" instrument_node="">guide</span></a><span data-dcnode-id="3240" instrument_node=""> on how to do it. </span></p><p data-dcnode-id="3235"><strong data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">Pro tip:</span></strong><span data-dcnode-id="3236" instrument_node=""> You may need to choose to inspect fallback in case your desktop or mobile browser versions differ. </span></p><h2 data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">The code</span></h2><p data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">Let’s start by creating a simple HTML page, calling it webxr-starter.html0:</span></p><pre class="code-widget language-html" data-dcnode-id="2875"><code class="code-widget__code language-html" data-dcnode-id="2876"><span class="token doctype" data-dcnode-id="3221"><span class="token punctuation" data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">&lt;!</span></span><span class="token name" data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">doctype</span></span><span data-dcnode-id="3226" instrument_node=""> </span><span class="token name" data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">html</span></span><span class="token punctuation" data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">&gt;</span></span></span><span data-dcnode-id="3220" instrument_node="">

/Web-based_AR_app_development_tutorial_with_WebXR?w=750&amp;amp;h=1500&amp;amp;q=85&amp;amp;fm=webp 750w,//images.ctfassets.net/63kg6hcp5guk/4uTMj01cwcda2OeGqzcoZN/f8aae61f7da85233b6e870951a7c2aef/Web-based_AR_app_development_tutorial_with_WebXR?w=1080&amp;amp;h=2160&amp;amp;q=85&amp;amp;fm=webp 1080w"/&gt;&lt;source type="image/undefined" srcSet=""/&gt;&lt;img data-gatsby-image-ssr="" data-main-image="" style="opacity:0" decoding="async" loading="lazy" alt="Web-based AR app development tutorial with WebXR"/&gt;&lt;/picture&gt;</span></noscript></div><span data-dcnode-id="1487" instrument_node=""></span></div></figure><h2 data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">WebXR and Three.js</span></h2><p data-dcnode-id="1475"><span data-dcnode-id="1482" instrument_node="">Next, let's augment your world by plugging in three.js engine to render 3D objects. (Since the main focus of this tutorial is WebXR, I am not going into detail about three.js. There are many good tutorials and documentation of </span><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//threejs.org/docs/"><span data-dcnode-id="1481" instrument_node="">how to use it.</span></a><span data-dcnode-id="1479" instrument_node="">) In this blog post, I’ll focus on what needs to be done to make WebXR and three.js work seamlessly together. I'll be using three.js version r120, which can be </span><a data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/mrdoob/three.js/"><span data-dcnode-id="1478" instrument_node="">obtained in GitHub</span></a><span data-dcnode-id="1476" instrument_node="">.</span></p><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">In order to demonstrate the WebXR capability detects surfaces, render a special marker, a reticle that will appear on surfaces once detected. Keep the reticle in the middle of the phone's screen, which allows a user to navigate the reticle by moving the phone around while the reticle sticks to detected surfaces. The functionality will also require use of the WebXR hit detection API. When a user taps on the screen, a 3D object will appear in-place of the reticle.</span></p><p data-dcnode-id="1465"><span data-dcnode-id="1472" instrument_node="">The reticle can easily be rendered with three.js with any object. In our case, let’s use a flat green ring. For the 3D object, use a 3D model from </span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cgtrader.com/free-3d-models/car/sport/simple-wheel-rig-with-hydraulics"><span data-dcnode-id="1471" instrument_node="">cgtrader</span></a><span data-dcnode-id="1469" instrument_node="">. Download the model and, with the help of Blender, convert it into gltf file format. Three.js actually supports various object formats, but why not choose the </span><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.threekit.com/blog/gltf-everything-you-need-to-know"><span data-dcnode-id="1468" instrument_node="">gltf</span></a><span data-dcnode-id="1466" instrument_node="">?!</span></p><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Let’s work on the code from the previous example. Start by adding simple code for initializing three.js scene and renderer. Note that three.js is being imported as a module from a local directory, which can be accessed by downloading the source code of three.js.</span></p><pre class="code-widget language-js" data-dcnode-id="967"><code class="code-widget__code language-js" data-dcnode-id="968"><span class="token keyword" data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">import</span></span><span data-dcnode-id="1460" instrument_node=""> </span><span class="token operator" data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">*</span></span><span data-dcnode-id="1457" in
