</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">An augmented reality app (AR app) is a software application that integrates digital visual content (and sometimes audio and other types) into the user’s real-world environment. AR software is used for training, work and consumer applications in many industries including&nbsp;healthcare, public safety, gas and oil, tourism and marketing.</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="768"><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/whatis/definition/augmented-reality-gaming-AR-gaming"><span data-dcnode-id="777" instrument_node="">Augmented reality gaming</span></a><span data-dcnode-id="775" instrument_node=""> software is probably the most common type of AR app, in particular since the popularity of the Pokémon GO game for smartphones. Computing headsets like </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//internetofthingsagenda.techtarget.com/definition/Google-Glass"><span data-dcnode-id="774" instrument_node="">Google Glass</span></a><span data-dcnode-id="772" instrument_node=""> and </span><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/whatis/definition/heads-up-display-HUD"><span data-dcnode-id="771" instrument_node="">heads-up displays</span></a><span data-dcnode-id="769" instrument_node=""> &nbsp;in car windshields are other well-known consumer market uses of AR software.</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="766" instrument_node="">Augmented reality&nbsp;</span><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchsoftwarequality/definition/application"><span data-dcnode-id="765" instrument_node="">apps</span></a><span data-dcnode-id="763" instrument_node="">&nbsp;are written in special 3D programs that allow the developer to tie animation or contextual digital information in the computer program to an augmented reality "marker" in the real world. When a computing device's AR app or browser&nbsp;</span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/whatis/definition/plug-in"><span data-dcnode-id="762" instrument_node="">plug-in</span></a><span data-dcnode-id="760" instrument_node=""> receives digital information from a known marker, it begins to execute the marker's code and layer the correct image or images.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="757" instrument_node="">AR applications for smartphones typically include global positioning system (</span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchmobilecomputing/definition/Global-Positioning-System"><span data-dcnode-id="756" instrument_node="">GPS</span></a><span data-dcnode-id="754" instrument_node="">) to pinpoint the user's location and its compass to detect device orientation. Sophisticated AR programs used by the military for training may include&nbsp;</span><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchenterpriseai/definition/machine-vision-computer-vision"><span data-dcnode-id="753" instrument_node="">machine vision</span></a><span data-dcnode-id="751" instrument_node="">, object recognition and&nbsp;</span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/whatis/definition/gesture-recognition"><span data-dcnode-id="750" instrument_node="">gesture recognition</span></a><span data-dcnode-id="748" instrument_node="">&nbsp;technologies.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="745" instrument_node="">Boeing researcher Thomas Caudell coined the term </span><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/whatis/definition/augmented-reality-AR"><span data-dcnode-id="744" instrument_node="">augmented reality</span></a><span data-dcnode-id="742" instrument_node=""> in 1990 to describe the head-mounted displays that guided electricians in the assembly of complicated wiring harnesses. One of the first commercial applications of AR technology was the yellow "first down" line that began appearing in televised football games sometime in 1998.</span></p></section><span data-dcnode-id="739" instrument_node="">
