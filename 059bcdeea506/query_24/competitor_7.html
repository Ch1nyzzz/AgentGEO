ode-id="1920"><a class="rc-Anchor" data-dcnode-id="2153" name="about"></a><div class="_1d3lkver p-b-2" data-dcnode-id="1921"><div class="AboutCourse" data-dcnode-id="1922"><div class="_jyhj5r text-xs-left" data-dcnode-id="1923"><div class="_1b7vhsnq m-t-2" data-dcnode-id="2013"><h2 class="m-r-1 m-b-0 bold headline-4-text" data-dcnode-id="2151" style="vertical-align:middle"><span data-dcnode-id="2152" instrument_node="">About this Course</span></h2><div class="rc-ProductMetrics" data-dcnode-id="2145"><div class="_bd90rg" data-dcnode-id="2146"><span data-dcnode-id="2147"><span data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">4,772</span></span><span data-dcnode-id="2148" instrument_node=""> recent views</span></span></div></div><div class="m-t-1 description" data-dcnode-id="2130" style="white-space:pre-wrap"><div class="rc-TogglableContent about-section collapsed" data-dcnode-id="2131"><div class="content" data-dcnode-id="2139" style="height:100px"><div class="content-inner" data-dcnode-id="2140"><p data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Augmented Reality, or AR, will transform how we see and interact with the world. And the hardware that makes AR possible is the smartphone that you may already have in your pocket. In this course, you'll learn how to develop your own mobile AR applications in Unity for iOS and Android devices. You'll learn about the features offered by Unity's AR Foundation, and about additional features in ARKit and ARCore. </span></p><p aria-hidden="true" data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Using the very latest techniques recommended by Unity engineers, you'll build a complete AR environment that you can continue to use after the course, while learning to apply best practices in user experience and interaction.

This is the last of three courses in Unity's XR Specialization, which includes an Introduction to XR course as well as a course focused on developing VR applications with Unity. 

Note that, to complete this course, you will need a smartphone capable of running ARKit or ARCore. Compatible devices are listed in the links below:
https://developers.google.com/ar/discover/supported-devices
https://developer.apple.com/library/archive/documentation/DeviceInformation/Reference/iOSDeviceCompatibility/DeviceCompatibilityMatrix/DeviceCompatibilityMatrix.html

 realistically as the scene lighting is adjusted to correspond to measured lighting conditions. You will also be able to move the robot around using the touchscreen, and place the robot behind surfaces so that it’s partially occluded.</span></p><span data-dcnode-id="1186" instrument_node=""></span></div></div><div class="toggle-button-wrapper" data-dcnode-id="1177"><button aria-hidden="false" data-dcnode-id="1178" data-track="true" data-track-action="click" data-track-app="xdp_v1" data-track-component="expand_module_description" data-track-page="xdp" tabindex="0" type="button"><div data-dcnode-id="1179"><span class="screenreader-only" data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">SHOW ALL SYLLABUS</span></span><span aria-hidden="true" data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">SHOW ALL</span></span></div></button></div></div></div><div class="hidden-sm-up m-t-1" data-dcnode-id="1163"><div class="_1qfi0x77" data-dcnode-id="1164" data-test="duration-text-section"><div aria-hidden="true" class="m-r-1" data-dcnode-id="1168"><div class="_eo0j7w" data-dcnode-id="1169" style="border-radius:50%"><div class="_473mf9o" data-dcnode-id="1170" style="width:40px;height:40px"><svg aria-hidden="true" aria-labelledby="Hourstocompletef65248b4-97ed-4488-bd88-39dd6b1c9b11 Hourstocompletef65248b4-97ed-4488-bd88-39dd6b1c9b11Desc" class="_ufjrdd" data-dcnode-id="1171" role="img" style="fill:#FFF;height:20px;width:20px" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="1173" id="Hourstocompletef65248b4-97ed-4488-bd88-39dd6b1c9b11">Hours to complete</title><path d="M24 47C11.318375 47 1 36.681625 1 24S11.318375 1 24 1s23 10.318375 23 23-10.318375 23-23 23zM2.91666667 24c0 11.6255417 9.45779163 21.0833333 21.08333333 21.0833333S45.0833333 35.6255417 45.0833333 24 35.6255417 2.91666667 24 2.91666667 2.91666667 12.3744583 2.91666667 24zm19.12500003 1.9166667V6.70833333h2.9166666V23H35.5v2.9166667H22.0416667z" data-dcn v></div></div></div></div></div></div><div class="rc-AboutS12nSCDP p-y-3 p-x-1" data-dcnode-id="615"><div class="_1d3lkver" data-dcnode-id="616"><div class="_jyhj5r" data-dcnode-id="617"><div class="_ovfpc0q" data-dcnode-id="621"><div data-dcnode-id="637"><h2 class="max-text-width-xl headline-3-text bold m-b-1" data-dcnode-id="638"><span data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">About the Unity XR: How to Build AR and VR Apps Specialization</span></span></h2></div><div class="description-container" data-dcnode-id="622"><div class="_wmgtrl9" data-dcnode-id="623"><div class="rc-TogglableContent collapsed" data-dcnode-id="624"><div class="content" data-dcnode-id="632" style="height:85px"><div class="content-inner" data-dcnode-id="633"><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Welcome to the world of Unity XR! This specialization includes three courses which will explain the technologies that make XR possible, describe the unique UX concerns around developing for XR, and walk you through developing VR and AR apps for mobile devices. You will learn how Unity supports the many components of a VR app, including tracking, teleporting, interacting with virtual objects, positional audio, and much more. You’ll also see how Unity’s AR Foundation supports building handheld AR apps. XR is a field that is constantly evolving, and we’ll show you what’s on the horizon for VR and AR.</span></p><span data-dcnode-id="634" instrument_node=""></span></div></div><div class="toggle-button-wrapper" data-dcnode-id="625"><a aria-hidden="false" data-click-key="xdp_v1.xdp.click.expand_description" data-click-value="{&quot;courseId&quot;:&quot;GS7aGJ_oEeiUhQ51AsDJhg&quot;,&quot;href&quot;:&quot;#&quot;,&quot;namespace&quot;:{&quot;action&quot;:&quot;click&quot;,&quot;app&quot;:&quot;xdp_v1&quot;,&quot;component&quot;:&quot;expand_description&quot;,&quot;page&quot;:&quot;xdp&quot;},&quot;s12nId&quot;:&quot;Lpbv_HTgEeilthKOJg0q_A&quot;,&quot;sch s?</text></co-content>" style="height:0"><div aria-expanded="false" data-dcnode-id="486"><div class="overflow-hidden" data-dcnode-id="487" style="height:0;display:none"><div class="rc-CML show-soft-breaks" data-dcnode-id="488" dir="auto" id=""><div data-dcnode-id="489"><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Access to lectures and assignments depends on your type of enrollment. If you take a course in audit mode, you will be able to see most course materials for free. To access graded assignments and to earn a Certificate, you will need to purchase the Certificate experience, during or after your audit. If you don't see the audit option: </span></p><ul data-dcnode-id="490"><li data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">The course may not offer an audit option. You can try a Free Trial instead, or apply for Financial Aid.</span></li><li data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">The course may offer 'Full Course, No Certificate' instead. This option lets you see all course materials, submit required assessments, and get a final grade. This also means that you will not be able to purchase a Certificate experience.</span></li></ul></div></div></div></div></div></li><li class="_3hmsj border-a m-b-1 bg-white" data-dcnode-id="467" role=""><div aria-controls="<co-content><text>What will I get if I subscribe to this Specialization?</text></co-content>" aria-expanded="false" data-dcnode-id="475" role="button" tabindex="0"><div class="_1qfi0x77 p-a-1 cursor-pointer" data-dcnode-id="476" data-track="true" data-track-action="[object Object]" data-track-app="xdp_v1" data-track-component="faq_open" data-track-page="xdp"><svg aria-hidden="true" aria-labelledby="ChevronRight15c2837e-dc27-4920-94a3-c061ef829fc6 ChevronRight15c2837e-dc27-4920-94a3-c061ef829fc6Desc" class="_ufjrdd" data-dcnode-id="482" focusable="false" role="img" style="fill:#2A73CC;height:24px;width:24px;transform:rotate(0deg);min-width:24px" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><polygon data-dcnode-id="483" points="16 24 30.585 40 31.999 38.586 18.828 24 31.999 9.415 30.585 8" role="presentation" transform="translate(23.999500, 24.000000) scale(-1, 1) translate(-23.999500, -24.000000)"></polygon></svg><div class="p-l-1s" data-dcnode-id="477"><div class="rc-CML show-soft-breaks" data-dcnode-id="478" dir="auto" id=""><div data-dcnode-id="479"><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">What will I get if I subscribe to this Specialization?</span></p></div></div></div></div></div><div class="_msg5sa" data-dcnode-id="468" id="<co-content><text>What will I get if I subscribe to this Specialization?</text></co-content>" style="height:0"><div aria-expanded="false" data-dcnode-id="469"><div class="overflow-hidden" data-dcnode-id="470" style="height:0;display:none"><div class="rc-CML show-soft-breaks" data-dcnode-id="471" dir="auto" id=""><div data-dcnode-id="472"><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">When you enroll in the course, you get access to all of the courses in the Specialization, and you earn a certificate when you complete the work. Your electronic Certificate will be added to your Accomplishments page - from there, you can print your Certificate or add it to your LinkedIn profile.  If you only want to read and view the course content, you can audit the course for free.</span></p></div></div></div></div></div></li><li class="_3hmsj border-a m-b-1 bg-white" data-dcnode-id="450" role=""><div aria-controls="<co-content><text>Is financial aid available?</text></co-content>" aria-expanded="false" data-dcnode-id="458" role="button" tabindex="0"><div class="_1qfi0x77 p-a-1 cursor-pointer" data-dcnode-id="459" data-track="true" data-track-action="[object Object]" data-track-app="xdp_v1" data-track-component="faq_open" data-track-page="xdp"><svg aria-hidden="true" aria-labelledby="ChevronRight06809b1c-cbb3-4e73-8f30-e3942d03f980 C
