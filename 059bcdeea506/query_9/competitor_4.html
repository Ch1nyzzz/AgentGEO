</span><h4 data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Chike Aguh</span></h4><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Chike Aguh is the Chief Innovation Officer at the United States Department of Labor. He leads efforts to use innovative technologies, partnerships and practices to accelerate the Department’s mission of delivering a future of work that includes and dignifies every American. Previously, Chike was the inaugural Head of Economic Mobility Pathways at the Education Design Lab, Technology and Human Rights Fellow at the Harvard Carr Center for Human Rights Policy, Venture Partner at New Markets Venture Partners, member of the Council on Foreign Relations’ Future of Work Taskforce, Lecturer at Columbia University and guest speaker at the University of Maryland School of Public Policy.</span></p><span data-dcnode-id="854" instrument_node="">

</span><h4 data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Samuel Akey</span></h4><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Samuel Akey is the manager of renewables training and innovation at Avangrid, a global energy services and delivery company. He is an experienced operations training manager with a demonstrated history of working in the renewables and environment industry. Samuel is skilled in power plants, management, strategic planning, project management, and energy. He graduated from the University of Louisville, College of Education.</span></p><span data-dcnode-id="837" instrument_node="">

</span><div class="description" data-dcnode-id="819"><span data-dcnode-id="826" instrument_node="">
</span><h4 data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Dave Beck</span></h4><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Dave Beck is the founder and managing partner at Foundry 45, an immersive technology company that develops enterprise-level virtual reality training experiences. His company has built hundreds of experiences for notable clients such as Delta Air Lines, Chevron, and UPS. A passionate advocate of his industry, Dave is a frequent speaker on topics related to technology and the future of learning. Before starting Foundry 45, he held leadership positions in both training and technology. Dave also serves on advisory boards at Georgia Tech, where he earned his MBA, the Metro Atlanta Chamber of Commerce, and the MAK Historic District.</span></p><span data-dcnode-id="820" instrument_node="">

</span><div class="description" data-dcnode-id="802"><span data-dcnode-id="809" instrument_node="">
</span><h4 data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Clare Bertrand</span></h4><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Clare Bertrand is a director at JFFLabs. She leads efforts to integrate technology and innovative best practices to ensure that young people can make well-informed decisions about their education and career pathways. Clare focuses on innovating and scaling career pathway decision making for young people who are over-age, under-credited, and low-income. She leads a team that works with communities, networks, and districts to identify and take advantage of career pathways for young people using technology. Her achievements include launching JFF’s first web and mobile platform, MyBestBets.</span></p><span data-dcnode-id="803" instrument_node="">

</span><h4 data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Daniel Blair</span></h4><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Daniel Blair is the CEO and founder of Bit Space Development Ltd where he focuses on building innovation-focused research projects for clients exclusively from the planet earth. Daniel is an award-winning entrepreneur &amp; software developer. Through initiatives and organizations, Daniel has been directly involved in the interactive digital media and entrepreneurship ecosystem by sitting on boards and committees that align with a singular goal, to create the best possible ecosystem for hacking and building. Daniel is well known for being a tinkerer, mad scientist, and lifelong learner.</span></p><span data-dcnode-id="786" instrument_node="">

</span><div class="description" data-dcnode-id="768"><span data-dcnode-id="775" instrument_node="">
</span><h4 data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Katie Booth</span></h4><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Katie Booth is based in the SF Bay Area, joined SAP North America in 2013, and now leads Corporate Social Responsibility for the region. In this role, she is responsible for bringing to life the three global CSR pillars: connecting employees to purpose, accelerating best-run non-profits &amp; social enterprises and building digital skills for underrepresented youth. She works closely to co-innovate with education partners, social enterprises, collaboratives, and community organizations. She spent her early career working within large organizations where she mobilized 100K+ volunteers and managed multi-million dollar corporate donations to improve communities and schools across North America.</span></p><span data-dcnode-id="769" instrument_node="">

</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Marc is an experienced senior executive in XR, software, mobile, and consumer electronics, working in general management, product, marketing, and investment leadership roles to drive innovation. He is Vice President of HTC’s Vive business unit, where he heads XR Enterprise Software including strategy and software development and founded and runs the industry leading Vive X accelerator. He serves on the Board of Directors of the XRA industry association. Previously he was CEO at Digital Chocolate. Prior to that, Marc headed marketing and ecommerce for flash memory leader SanDisk, and was VP of Global Brand Management at games industry leader Activision.</span></p><span data-dcnode-id="497" instrument_node="">

</span><h4 data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Audrey Mickahail</span></h4><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Audrey Mickahail is senior director of corporate solutions at JFFLabs. She is responsible for developing the strategy and scaling the impact of JFF advisory services for organizations looking to become impact employers. Before joining JFF, Audrey was a senior director at Gartner, a research and consulting firm, where she played many roles in a more than 20-year career. Most recently, she worked with multiple research teams to develop insights that she presented to clients globally at executive retreats and Gartner events. Before that, she led an advisory team. Earlier in her career, she led research teams at CEB and Meta Group, both of which were acquired by Gartner.</span></p><span data-dcnode-id="480" instrument_node="">

</span><h4 data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">David Nedohin</span></h4><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">David Nedohin, co-founder and Chief Customer Officer of Scope AR, brings more than 20 years of experience in business development and supporting customers at all stages of the customer journey to drive the company’s vision to revolutionize the world of industrial training, maintenance, manufacturing and field support with AR technology. In this role, David manages key relationships with industry partners and works with some of the world’s leading global companies including, Lockheed Martin, Johnson &amp; Johnson, and Aggreko, among others. He also is an industry thought-leader, often presenting on some of the most practical use cases and AR success stories across industries at leading industry events.</span></p><span data-dcnode-id="463" instrument_node="">

</span><h4 data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Crystal Pena</span></h4><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Crystal Pena is the director at Quad YouthBuild. Through her work with Quad YouthBuild over the past 12 years, she has been able to assist underserved youth in reaching their full potential through education, training, and leadership development services. Crystal started her work in alternative education as a teacher. Since then, she has devoted the last 19 years working in various alternative education programs. Her experience includes grant writing, grant management, and contract monitoring with social service, state, and federal programs. This experience has been able to generate transformative and sustainable opportunities for underserved youth.</span></p><span data-dcnode-id="446" instrument_node="">

</span><h4 data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Tomissa Smittendorf</span></h4><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Tomissa is the Director Kellogg North America Sales Learning &amp; Development at Kellogg Company and has more than 30 years of diverse experience in L&amp;D, Retail Sales, Supply Chain, HR, Sales Finance, Customer Service and DSD. She created a high-performance team to build Sales Capabilities; developed a Sales Learning &amp; Development Value Proposition; and designed, developed, and implemented a Customer Engagement platform, a 3-year strategic collaboration for mutual sustainable growth with priority initiatives and Customer engagement roadmaps. She has a passion for creating a culture of Learning, emphasizing capability building and collaborating across the organization to drive impact. </span></p><span data-dcnode-id="429" instrument_node="">

</span><div class="description" data-dcnode-id="411"><span data-dcnode-id="418" instrument_node="">
</span><h4 data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Tim Stutts</span></h4><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Tim Stutts (he/him) is a product design leader drawn to challenges involving interaction, user experience, prototyping, sensory feedback, data visualization and spatial computing. He is an ethical technologist who values data privacy and inclusive design. Tim is currently Principal Augmented Reality Product Designer for Vuforia Work Instructions at PTC. He previously served as Director of Product Design at Faceware, a leading developer of facial motion capture software and hardware. Prior to that he worked at Magic Leap and IBM.</span></p><span data-dcnode-id="412" instrument_node="">

</span><h4 data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Greg Sullivan</span></h4><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Greg Sullivan is director of communications and a 30-year Microsoft veteran who has been involved with XR since 2015. Sullivan works closely with the engineering teams building Microsoft HoloLens and mixed reality platform, along with the marketing and business development personnel bringing these technologies to market. Greg has held a variety of roles at Microsoft including network systems engineer, national account manager and product manager.  He studied Electrical Engineering and Computer Science at the University of Illinois Chicago and lives in the Seattle area.</span></p><span data-dcnode-id="395" instrument_node="">

</span><h4 data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Alex Swartsel</span></h4><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Alex Swartsel is deputy director of acceleration at JFFLabs. In that role, she helps build and grow JFF’s emerging Impact Accelerator, which is transforming U.S. workforce and education systems by expanding access to innovative technologies that have the potential to revolutionize how Americans work and learn. Before joining JFF, Alex served as chief of development, finance, and external affairs for Teach for America’s Washington, DC, region, a role in which she oversaw fundraising, finance, and communications for a 22-person team supporting more than 3,000 educators and leaders.</span></p><span data-dcnode-id="378" instrument_node="">

</span><h4 data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Chris Taran</span></h4><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Chris Taran, RSE, started his career in the electrical industry in 1995.  He obtained his Certificate of Qualification with Red Seal Endorsement in 2000.  After several years working at his trade his focus shifted to teaching as a trade’s instructor and in 2012, he was appointed the Directors of Apprenticeship and Training IBEW Local 2085.  As a leader in the apprenticeship field he is responsible for curriculum, training delivery, staff and organizational partnerships.  He is a member of NETCO’s National Training Committee.  Chris is a graduate of the Technical Vocational Teacher program from Red River College and is currently completing his Business Management degree from the University of Winnipeg.</span></p><span data-dcnode-id="361" instrument_node="">

</span><h4 data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Eli Weisman</span></h4><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Eli Weisman is the Chief Client &amp; Growth Officer at Talespin. Eli pairs his deep understanding of our clients' businesses with key opportunities for transformation in the evolving spatial computing landscape. Eli’s current focus includes growth strategy and engagement with clients and platform partners. He brings 25 years of experience in client engagement, strategy, and technology delivery. Eli has led multidisciplinary teams to the successful launch of products for major brands such as PriceWaterhouseCoopers, Deloitte, Apple, RedBull, Microsoft, Facebook / Oculus, Google / YouTube, NBCUniversal, Sony, and Citi across the digital landscape.</span></p><span data-dcnode-id="344" instrument_node="">
