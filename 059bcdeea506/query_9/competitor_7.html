lue="2019">2019</option><option data-dcnode-id="632" value="2018">2018</option><option data-dcnode-id="630" value="2017">2017</option><option data-dcnode-id="628" value="2016">2016</option></select></div><span data-dcnode-id="625" instrument_node=""> </span><div class="select-wrapper" data-dcnode-id="603"><select class="m-short" data-dcnode-id="604"><option data-dcnode-id="623" value="">All Events</option> <option data-dcnode-id="620">Corporate Events</option> <option data-dcnode-id="617">Industry Events</option> <option data-dcnode-id="614">CSR</option> <option data-dcnode-id="611">EV</option> <option data-dcnode-id="608">3+3</option> <option data-dcnode-id="605">Monthly Revenues</option></select></div><span data-dcnode-id="602" instrument_node=""> </span><div class="search-wrapper" data-dcnode-id="600"><input class="search" data-dcnode-id="601" placeholder="Search" type="text"></div></div></div><span data-dcnode-id="597" instrument_node=""> </span><ul class="news-list-wrapper" data-dcnode-id="295"><li data-dcnode-id="576"><div class="thumbnail" data-dcnode-id="594"><a class="" data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foxconn.com/en-us/press-center/press-releases/latest-news/779"><img data-dcnode-id="596" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foxconn.com/img/news/latest_news.png%3F4a31a&amp;raw"></a></div><span data-dcnode-id="593" instrument_node=""> </span><div class="entry-wrap" data-dcnode-id="577"><div class="date" data-dcnode-id="589"><span data-dcnode-id="592" instrument_node="">2022/04/22 </span><span class="tag" data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">new!</span></span></div><span data-dcnode-id="588" instrument_node=""> </span><div class="title" data-dcnode-id="585"><a class="" data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foxconn.com/en-us/press-center/press-releases/latest-news/779"><span data-dcnode-id="587" instrument_node="">
                Hon Hai reveals Long-Term Environmental Goals on Earth Day Promising to Achieve Net Zero Emissions, 50% green power usage, 60% Plastic Recycling and Zero Waste to Landfill
              </span></a></div><span data-dcnode-id="584" instrument_node=""> </span><p class="description" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">
              22 April 2022, Taipei. On Earth Day, Hon Hai Technology Group (Foxconn), the world’s largest technology manufacturer and service provider reveals long-term environmental sustainability goals, with “Green Intelligence” and “Circular Economy” as its strategic goals. The Group’s action plan will focus on “clean manufacturing”, “resource management” and “risk management” to demonstrate its determination on environmental protection.
Responding to climate change, Hon Hai has set clear strategic environmental goals on several aspects, including net zero emissions, green energy, water conservation, environmental protection, waste reduction and recycling. The Group has also layout milestone for 2025 and years after, with 7 strategic goals as follows: 
Achieve net zero emissions by 2050
(Reduce 63% by 2035, 42% by 2030, 21% by 2025, based on 2020 standard)
Use at least 50% green power by 2030
Reduce water intensity by 6% (compared to 2020)
Reach 60% of plastic recycling ratio in all campuses 
Awarded at least 5 campuses with UL 2799 Gold-Level Certification of Zero Waste
Set up monitoring system for industrial wastewater discharge in All campuses
Set up air quality monitoring system in at least 3 campuses
“Hon Hai used to be a follower in environmental protection, but we have come a long way to become a leader. We use systematic data analysis to conduct regular performance review on the 7 long-term environmental goals we have put forward. In the future, we will continue our collaboration with clients and suppliers to build a sustainable ecosystem, to contribute to the sustainable industrial development”, said Ron Horng, Chief Environmental Officer in Hon Hai Technology Group.
Hon Hai has been operating under the guideline of “Sustainability =EPS+ESG”. The Group plans to announce its ESG long-term objectives step by step. On Earth Day, Apr. 22, Hon Hai first gave out its E (Environmental) goals. For the past few years, Hon Hai has been acting on energy conservation, emission reduction and the adopting of green energy, and it has achieved substantial results. In 2021, the Group’s Hengyang Campus and Kunshan Campus in mainland China have both obtained UL 2799, the Highest Platinum Rating for Zero Waste to Landfill; this year, the Group’s Longhua Campus was awarded UL 2799 Gold-Level Certification, becoming the world’s first comprehensive eco-park. Moreover, the Group’s Taipei headquarters recently received the Healthy Building&nbsp;Certification issued by Fitwel. It is the very first factory office in Taiwan to win the prestigious recognition. 
In terms of green energy, action has also been taken. Hon Hai announced in April that its campuses in Taiwan plan to purchase 2.36 million kWh of green power this year. Up to 2030, the Group’s purchases of green power will amount to 70 million kWh, which will help reduce 35,140 metric tons of CO2 emissions.&nbsp;In hope of gradually increasing the utilization of green energy in its campuses around the world, Hon Hai has already been using solar power as well as investing in the optimization of equipment effectiveness and green power plant. The Group also promised that it will adopt stricter standards to verify the source of the green energy it uses. 
Keeping up with the global trend of CO2 reduction, Hon Hai also echoes initiatives to reinforce the implementation of its sustainability development goals. In Jan. 2021, the Group proposed commercially ambitious 1.5ºC carbon reduction scenario to the Science Based Targets initiative (SBTi). With the consulting expert’s assistance, the Group has done an accurate calculation of carbon footprint, the result of which shows that one year after, it has fully accomplished the science-based targets in line with the&nbsp;Paris Agreement&nbsp;goals. In Apr. 2022, Hon Hai submitted the application of science-based target setting to the SBTi for assessment. 
This month, Hon Hai’s CSR Committee renames to “Sustainability Committee”, which will stipulate the direction and goals of ESG. It will start strengthening the management of internal audit activities and make effective use of third-party audit to establish a thorough and rigorous auditing mechanism. Hon Hai plans to establish an ESG goal management platform to record and track its working process and strive for continuous improvement. The Group expects that more partners will join its efforts in moving towards a greener future. 
To learn more about Hon Hai’s ESG vision, strategies and goals, please visit:
https://www.honhai.com/en-us/CSR/ESG-vision-and-strategy

                Hon Hai acquires arQana’s Wireless Telecommunications Business
              </span></a></div><span data-dcnode-id="564" instrument_node=""> </span><p class="description" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">
              
Acquisition of activities includes Taiwan arQana Technologies Limited and arQana Technologies BV (Belgium).
Activities have been merged with AchernarTek Inc. (USA), 100% owned by Foxconn to foster the growth of a global RF semiconductor component supplier for Advanced Wireless Telecommunications’ markets, including applications in Automotive and 5G Infrastructure.
The new organization has been rebranded as “iCana”
Taipei, TAIWAN, April 13, 2022 – arQana Technologies (“arQana”) and Hon Hai Technology Group, (“Foxconn”) (TWSE: 2317) today announced the completion of the acquisition of arQana’s Wireless Telecommunications business, and its merge with AchernarTek Inc. (“AchernarTek”), to enable the birth of a global RF semiconductor component supplier, with the intent to support Foxconn and third-party customers in the Wireless Telecommunications markets, including applications in Automotive and 5G Infrastructure.
This business transaction is a positive accomplishment for all the parties involved. It enables arQana Taiwan, arQana Belgium, and AchernarTek not only to continue developing their high-performance products for Wireless Telecommunications Infrastructure, enhancing further 5G Sub-6 GHz and mmWave product developments, but also expanding company footprints in the growing Connected Cars and Electric Vehicle (EV) market.
“Foxconn is a company that shares our vision to be the brightest star in the 5G universe. This acquisition benefits enormously our customers, accelerating our product introductions, shortening components’ time to market, and helping the future growth of the business. We look forward to benefiting the whole 5G infrastructure industry with the adoption of our components and products” said Glenn Vandevoorde, CEO of iCana and former CEO of arQana. “With the support of Foxconn, we will continue to use our expertise to create new products and penetrate new markets to cover the semiconductor needs of multiple industries, starting with semiconductor components for Electric Vehicles. Being part of the Foxconn family will also boost our ability to innovate faster, navigate the challenges, and capitalize on the opportunities of this decade”
&nbsp;
AchernarTek, arQana Taiwan, and arQana Belgium will now unify their operations and expertise under the new brand name “iCana”.&nbsp; The acquisition will leverage Foxconn’s current development capabilities and strengthen the supply chain in the semiconductor industry as well. Under the Foxconn umbrella, iCana can share Foxconn’s new expertise and novel solutions, which will enable iCana to meet the growing market demand of 5G Connected Electric Vehicles.
In line with Foxconn’s 3+3 strategy (EVs, Smart healthcare, and Robotics with three key technologies – new-generation communications technology, AI, and semiconductors) the acquisition of arQana Technologies’ 5G business and merger with AchernarTek is another step in Foxconn’s long-term commitment to semiconductor development. RF semiconductors are fundamental components for connectivity in EVs: while countries across the world deploy and adopt 5G networks, new modern cars will also require new RF components to communicate with these new networks.
Today’s announcement marks another example of the strong commitment of Foxconn to extend its capabilities in electric vehicle manufacturing and semiconductors design and supply excellence.
&nbsp;
About iCana
iCana Ltd. (iCana) with offices in Taiwan, Belgium, and USA, is a fabless semiconductor component supplier for Advanced Wireless Communication systems including Wireless Telecommunications infrastructure and Connected Vehicles. As the world is evolving fast towards new advanced communication architectures and technical challenges ahead, iCana is building a portfolio of high-performing products in different semiconductor technologies, to support the market and its ecosystem.
Find out more on iCana at www.icana-rf.com
&nbsp;
About Hon Hai
Established in Taiwan in 1974, Hon Hai Technology Group, (“Foxconn”) (TWSE: 2317) is the world’s largest electronics manufacturer. Hon Hai is also the leading technology solution provider and it continuously leverages its expertise in software and hardware to integrate its unique manufacturing systems with emerging technologies.
Hon Hai has expanded its capabilities into the development of electric vehicles, digital health and robotics, and three key technologies – new-generation communications technology, AI, and semiconductors – which are key to driving its long-term growth strategy.
To learn more, visit www.honhai.com

                Hon Hai Longhua Campus awarded UL 2799 Gold-Level Certification of Zero Waste to Landfill Operations, the world’s 1st comprehensive eco-park
              </span></a></div><span data-dcnode-id="544" instrument_node=""> </span><p class="description" data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">
              8 April 2022, Taipei/Shenzhen,&nbsp;Hon Hai Technology Group (Foxconn), the world’s largest technology manufacturer and service provider, has been recognized again for its achievements in promoting the circular economy, and has recently obtained the UL 2799 “Gold Level Certification” for their “Zero Waste to Landfill” efforts at their Shenzhen Longhua Campus in Mainland China. To further their efforts in waste management, the company has pledged to gradually transform all their factory sites into “Zero Waste Factories”. In addition, the company will continue to implement international environmental and sustainability initiatives, which will allow them to build a sustainable business.
Achieving “Zero Waste to Landfill Production” is a main goal for Hon Hai Technology Group. 
To achieve the “Zero Waste to Landfill” policy at its Longhua Campus, Foxconn introduced the Turbo Waste management system in 2021—using technology to better track waste treatment and waste diversion. The company’s efforts were lauded by the Shenzhen municipal government, who designated the Longhua Campus as an “Eco-demonstration Park” for waste management, which will contribute towards Shenzhen’s efforts of being a Zero Waste city.
Previously, facilities recognized as Zero Waste to Landfill belonged to one single legal entity and campus. This time, due to the diversification of work patterns as well as living environment and facilities in the Longhua Campus, it has become the very first Eco-demonstration Park granted “Gold Level Certification” in the world.
The company’s gold level certification from UL 2799 certifies that their waste management initiatives has resulted in a 99% diversion rate of waste, with 7% thermal processing with energy recovery. These results include waste management across the group’s 14 corporations based at Foxconn’s Longhua Campus, including FIH Mobile, Foxconn Industrial Internet (Fii) and Foxconn Interconnect Technology (FIT). Foxconn will continue to improve its waste management initiatives, with the goal of attaining UL 2799’s platinum certification in the future. 
“Foxconn Longhua Campus has a long history of development—being awarded UL Group’s gold-level certification is testament of Foxconn’s tangible efforts towards sustainability. We will continue to accelerate our efforts in sustainability, to work towards the goal of a “Zero Waste Factory”. These initiatives implemented will allow us to gradually meet the sustainable development goals advocated by the United Nations”, said Ron Horng, Vice President of Hon Hai Corporate Environment Division.
Doug Lockard, Vice President and General Manager of UL Retail and Global Consumer Goods, said ‘‘We are very honored to collaborate with Hon Hai on ESG standards, UL’s waste management and international standards assistances on transparent management and sustainable development; Foxconn Longhua Campus has demonstrated the best practices on material cycle.’’
In addition, in 2021, the Group’s Hengyang Campus and Kunshan Campus in mainland China have both obtained UL 2799, the Highest Platinum Rating for Zero Waste to Landfill in name of one single campus and legal entity. In the future, the implementation of waste sorting and resource recovery policy will be further strengthened with the objective of achieving 100% waste conversion rate.
The ESG vision of Hon Hai Technology Group is “Technology for Smart Living, Passion for Sustainable Development, Creation of a Better Future Together”. The company will use its own core competence resources and cooperate with external counseling to invest in green actions and the implementation of the concept of “Sustainable Development = EPS + ESG”. 
In addition, in response to Climate Action 100+, Hon Hai is ready to submit a 1.5°C carbon reduction commitment with commercial ambition to the Science-based Carbon Targets Initiative (SBTi), which will be more accurate when combined with the Climate-related Financial Disclosure Recommendation (TCFD). It will allow us to manage environmental risks to improve climate-change-resilience and commit to achieving net zero greenhouse gas emissions by 2050.

                Foxconn Partners with and invests in XRSPACE to Create Global Metaverse Ecosystem
              </span></a></div><span data-dcnode-id="484" instrument_node=""> </span><p class="description" data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">
              22 February 2022, Taipei - Hon Hai Technology Group (Foxconn), a global leader in smart manufacturing,&nbsp;has today announced the signing of an Memorandum of Understanding ("MOU") with XRSPACE, the company pioneering the next generation of visual reality through VR in the metaverse. Foxconn will both partner with and invest USD 100 million, with 15 million as the first stage with a stake in XRSPACE. Combining XRSPACE’s strengths in AI and other technologies including digital avatars, 3D virtual space creation and interaction, computer vision and hand gesture and hologram tracking, with Foxconn’s manufacturing capabilities in software and hardware vertical integration, the partnership will look to realize a shared vision of creating a holistic Metaverse ecosystem.
The Metaverse will be the next big thing after smartphones, bringing people together and changing the way they live their lives through 3D real-time interaction, physical to virtual, virtual to physical communication. The partnership between Foxconn and XRSPACE will showcase the new strength of Taiwan&amp;#39;s industry, integrating first-tier consumer experience, technology, components and manufacturing positioning the Taiwan market as a global leader in delivering consumer experiences in the global metaverse.
XRSPACE now focuses on two anchor Metaverse products: PartyOn, the social music metaverse for mass consumers, and GOXR, an enterprise metaverse that allows enterprise and creative industries to create their own metaverse experiences. The partnership will enable XRSPACE to build the infrastructure needed for their further inroads into the Metaverse and to continue to optimize its products.
Founded in 2017, XRSPACE is focused on building the entire metaverse, with features include shareable 3D space, social interaction for user groups or virtual people, instant 3D interaction, open creator contents, blockchain economy transaction, physical to virtual/virtual to physical, support different hardware devices such as VR/AR/mobile phone/tablet, etc. Metaverse is different from other previous tech products. It involves gaming, animation and content. It requires 10 times more computing power and display resolution, combining Silicon Valley technology with the creative imagination of Hollywood.
“Peter has a wealth of experience in leading global innovation and brand building. XRSPACE, founded by Peter, is a pioneer in the metaverse and has established various technologies and Metaverse platforms. We are thrilled to partner with XRSPACE, and we envision that this partnership will enhance the software technology, delivering a holistic metaverse hardware and software ecosystem. Foxconn’s approach towards the Metaverse is the same as that for electric cars—we will provide our expertise within the framework rather than solely focusing on the end product, developing in key areas that include AR/VR, software, infrastructure, content and applications and addressing the increasing demand for cloud services and more powerful server architecture. Foxconn, as the world’s largest server provider, will be able to provide its knowledge to support these potential opportunities,” said Mr. Young Liu, Chairman of Hon Hai Technology Group.
“In order to create a bigger and better metaverse in the future, we need to combine cloud, AI, edge computing, 5G and storage. This is the key reason for this partnership. Foxconn has a clear vision on metaverse. We believe there are so many things we can do to complement each other and work together to make the metaverse better. We are super excited for the partnership with Foxconn, this strategic partnership is not just only making our metaverse experiences better and stronger, Foxconn will also help us a lot on global market development,” said Peter Chou, Chairman and CEO of XRSPACE. 
During last year’s HHTD21 (Hon Hai Tech Day 2021), Foxconn leveraged XRSPACES’ GOXR platform, bringing the event to the Metaverse. Together, Foxconn and XRSPACE offered unique experiences to online participants, receiving positive feedback from both businesses and consumers. 
&nbsp;
About XRSPACE
XRSPACE is the company pioneering the next generation of social reality through XR in the metaverse, seeks to change how people connect, work, and play - bringing people closer together without the limitations of physical boundaries.&nbsp;
After five years of development, XRSPACE released metaverse platforms PartyOn and GOXR in 2021. In PartyOn, users from all over the world can hold various music events, from sing-along parties to concerts with thousands of people. The real-time social interactions combined with true sense of presence creates a brand new social experience beyond current social and live-stream platforms. In GOXR, anyone from creatives, enterprises, brands, museums and galleries are able to easily create its own metaverse to showcase, and be able to engage further with its users by hosting virtual events.&nbsp;EXPOs and tradeshows can also be hosted in GOXR which provides 3D showroom, AI digital service agent, and real-time social interaction.
About Hon Hai
Established in 1974 in Taiwan, Hon Hai Technology Group (“Foxconn”) (2317:Taiwan) is the world’s largest electronics manufacturer. Hon Hai is also the leading technological solution provider and it continuously leverages its expertise in software and hardware to integrate its unique manufacturing systems with emerging technologies. Hon Hai has expanded its capabilities into the development of electric vehicles, digital health and robotics, and three key technologies – new-generation communications technology, AI, and semiconductors – which are key to driving its long-term growth strategy.
In addition to maximizing value-creation for customers who include many of the world’s leading technology companies, Hon Hai is also dedicated to championing environmental sustainability in the manufacturing process and serving as a best-practices model for global enterprises.
To learn more, visit www.honhai.com

              London, Taipei, Mumbai Feb 14: Vedanta, one of India’s leading multinational groups, and Hon Hai Technology Group ("Foxconn”), world’s largest electronics manufacturing company, today announced signing an MOU to form a joint venture company that will manufacture semiconductors in India.

                Hon Hai, Gogoro, IBC and Indika to Jointly Develop Sustainable New Energy Ecosystem Project in Indonesia through Investment Cooperation in Electric Battery, EV and Its Supporting Industries
              </span></a></div><span data-dcnode-id="424" instrument_node=""> </span><p class="description" data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">
              Hon Hai Technology Group (Foxconn), a global leader in smart manufacturing,&nbsp;has signed a Memorandum of Understanding (MoU) today with the Indonesian Ministry of Investment/BKPM, IBC, Indika, and Gogoro to jointly develop a sustainable new energy ecosystem in Indonesia that focuses on electric battery, electric mobility, and associated industries. 
Presided over by Mr. Bahlil Lahadalia, Minister of Investment/ Chairman of BKPM, and witnessed by Mr. Erick Thohir, Minister of State-Owned Enterprises (BUMN), the virtual MoU signing ceremony was attended by Mr. Young Liu, Chairman of Hon Hai Technology Group (Foxconn); Mr. Horace Luke, CEO of Gogoro Taiwan Limited; Mr. Toto Nugroho, President Director of PT. Industri Baterai Indonesia (IBC); and Mr. Azis Armand, Vice President of PT. Indika Energy Tbk., (Indika). 
Under the MoU, Hon Hai together with Gogoro, IBC and Indika will explore a wide scope of investment and enter a mutually beneficial cooperation in setting up the new energy ecosystem in Indonesia, ranging from electric battery manufacturing that includes battery cell, battery module and battery pack, to the development of 4-wheel and 2-wheel EV ecosystem. The cooperation will also include the development of EV supporting industries such as energy storage systems (ESS), battery exchange stations and battery recycling. In the initial phase, the development of New Energy and Full Battery Platform Production in Indonesia—producing LFP or Nickel (solid state) premium quality EV batteries—will be the priority.
“I am pleased with the investment plan of Hon Hai and Gogoro to Indonesia together with local partners. Their involvement does not only bring in capital, but also share with us their technology and experience, creating a modern and open new EV ecosystem. It will also provide huge opportunities for local talents and local startups to develop and participate in the national EV ecosystem in Indonesia and path the way for a smarter and more sustainable future,” said Mr. Bahlil Lahadalia, Minister of Investment. 
“Hon Hai is excited to embark on the journey to transform the new energy ecosystem in Indonesia in cooperation with the local government, Gogoro, IBC and Indika. I believe the implementation of MIH platform, alongside our Build-Operate-Localize (BOL) strategy and manufacturing expertise will allow us to meet the market demand and create a sustainable new EV ecosystem in Indonesia” said Mr. Young Liu, Chairman of Hon Hai Technology Group. 
Leveraging its open “MIH platform”, Hon Hai will enable cooperation and knowledge sharing between local Indonesian companies and global business players, creating sustainable new energy ecosystem in Indonesia. This is another government level cooperation of Hon Hai following the establishment of BOL growth strategy with PTT of Thailand last year.

Partnership will help drive stability in Stellantis’ global semiconductor supply chain
Stellantis N.V. (NYSE / MTA / Euronext Paris: STLA) (“Stellantis”) and Hon Hai Technology Group, (“Foxconn”) (TWSE: 2317) today announced the signing of a non-binding memorandum of understanding to create a partnership with the intent to design a family of purpose-built semiconductors to support Stellantis and third-party customers.
“Our software-defined transformation will be powered by great partners across industries and expertise,” said Carlos Tavares, Stellantis CEO. “With Foxconn, we aim to create four new families of chips that will cover over 80% of our semiconductor needs, helping to significantly modernize our components, reduce complexity, and simplify the supply chain. This will also boost our ability to innovate faster and build products and services at a rapid pace.” 
This partnership was announced as part of the Stellantis Software Day 2021 event where the Company unveiled STLA Brain, the new electrical/electronic and software architecture launching in 2024 across Stellantis’ four battery electric vehicle-centric platforms – STLA Small, Medium, Large and Frame. STLA Brain is fully OTA capable, making it highly flexible and efficient.
“As a leading global technology company, Foxconn has the depth of experience in manufacturing semiconductors and software - two key components in the production of electric vehicles. We look forward to sharing this expertise with Stellantis and together tackle the long-term supply chain shortages, as we continue with the expansion into the electric vehicle market,” said Young Liu, Chairman &amp; CEO of Foxconn Technology Group. 
The collaboration will support Stellantis’ initiatives to reduce semiconductor complexity, design an all-new family of purpose-built semiconductors to support Stellantis vehicles, and provide capabilities and flexibility in this area of growing importance as vehicles become increasingly software-defined. 
The partnership will leverage Foxconn’s domain know-how, development capabilities, and supply chain in the semiconductor industry, as well as Stellantis’ expansive automotive expertise and significant scale as a lead customer for the enterprise.
Foxconn has a long-running history of developing semiconductors and applications within consumer electronics, which will expand to the automotive space with the guidance and demand of a world-class mobility partner. These same semiconductors will be utilized within the Foxconn EV ecosystem as Foxconn continues to extend its capabilities in electric vehicle manufacturing. 
Today’s announcement marks the second collaboration between Stellantis and Foxconn. In May, the companies announced the Mobile Drive joint venture aimed at developing smart cockpit solutions enabled by advanced consumer electronics, HMI interfaces and services that will exceed customer expectations.

                Foxconn shared the best practices of Green Chemistry and the Zero Waste Demo Site for its Circular Economy vision at the UL ESG forum
              </span></a></div><span data-dcnode-id="384" instrument_node=""> </span><p class="description" data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">
              Hon Hai Technology Group (Foxconn) shared its ESG vision and achievements at the UL ESG forum in Shanghai. With the theme of "Sustainable Strategy, Circular Economy and Zero Waste Management at Foxconn ", Ron Horng, Hon Hai Technology Group Vice President and Chief Environment Officer was invited to share about the best practices at Foxconn, with participants from the various industries worldwide.
With the business formula “Sustainability=EPS+ESG” introduced by Hon Hai Technology Group Chairman &amp; CEO Young Liu, the company has moved towards the United Nations SDGs (sustainable development goals) through various measures to achieve "responsible production". At the forum, the company shared their perspective on the circular economy and their plans to realize a green supply chain. 
As a start, Foxconn has prioritized adapting lead-free and halogen-free manufacturing processes in their daily operation in the campuses—protecting their employees and reducing the impact on the environment. In recent years, more projects involving green chemicals have been initiated. Part of the process included a review of the chemicals used in the FATP (Final Assembly Line). This resulted in the company refreshing their list of forbidden chemicals and the introduction of green chemicals instead. At present, green chemicals are widely used in FATP lines across all campuses. This year’s focus will be on the components manufacturing lines, beginning with the identifying of chemical suppliers that would be able to provide a green cleaner and degreasing agent.
Beyond a constant review of their internal operations, Foxconn also seeks external partnerships, working with industry organizations like IPC (the global association for electronics manufacturing) to develop industry guidelines for green chemicals. Together with other IPC partners over the past year, Foxconn was part of the group that developed a new IPC-1402 standard for green cleaners, that will debut early next year. The introduction of green chemical standards is an important step toward the sustainability of the electronics manufacturing industry. It not only guarantees the safety and health of workers in the supply chain, but also reduces the environmental impact during production.
As a global technology company, Foxconn recognizes the need to give back to the industry and has participated in opportunities and platforms to share their experience on integrating green chemistry in manufacturing operations and supply chains. Some of the opportunities has included the company assisting leading international organizations like ChemFORWORD to build platforms for identifying and developing safer cleaning products. The goal of sharing their industry experience, is for the company to catalyze collaboration that would lead to the development of a more robust green manufacturing environment for the industry.
To tackle zero waste, Foxconn Shenzhen Longhua Park launched the UL Turbo Waste management platform in January 2021. Through the data analysis, the system is able to track waste generation, material flow and conversion rate in real time. The data harnessed is further combined with waste reduction and recycling solutions to make continuous improvement. As Foxconn’s first zero-waste demonstration site, Foxconn Longhua Park was awarded the Zero Waste Green Ecological Park in Shenzhen by City Hall in June this year. It will also soon be certified as the first UL Golden Zero Waste Park in the world early next year. 
In 2020, Foxconn achieved remarkable results in their efforts towards green manufacturing. Carbon dioxide emission by revenue decreased by 23.27% compared with the base year 2015; through energy-saving renovation, up to 500 million kilowatt-hours of electricity was saved; the use of green energy exceeded 1 billion kilowatt-hours, accounting for 12% of the group&amp;#39;s total electricity consumption.&nbsp; This October, Foxconn’s efforts were recognized by the Green Supply Chain CITI Index and the Corporate Climate Action CATI Index in 2021 in Greater China, with their company ranking high on the index. 
With priorities on green manufacturing, the circular economy and zero-waste ecological park, Foxconn’s ESG efforts will propel it towards the goal of sustainability.

                Foxconn and Lordstown Motors Enter Into a Transformative, Strategic Partnership 
              </span></a></div><span data-dcnode-id="364" instrument_node=""> </span><p class="description" data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">
              Lordstown Motors Corp. (“Lordstown Motors” or “LMC”) (Nasdaq: RIDE), a provider of electric light-duty trucks focused on the commercial fleet market, and Hon Hai Technology Group (“Foxconn”) (TWSE: 2317), one of the largest electronics manufacturers in the world, today announced that they have entered into a definitive Asset Purchase Agreement regarding LMC’s facility in Lordstown, Ohio.
As previously disclosed, on September 30th Lordstown Motors entered into an Agreement in Principle, or AIP, with an affiliate of Hon Hai Precision Industries, also known as Foxconn, to work jointly on Lordstown Motors’ electric vehicle programs in the production and assembly plant in Lordstown, Ohio. Shortly after the AIP, and as a sign of confidence in the partnership, Foxconn purchased $50 million of common stock directly from Lordstown Motors at a price of $6.8983 per share. The definitive Asset Purchase Agreement (“APA”) implements the terms of the AIP and provides as follows:
LMC has agreed to sell to Foxconn the Lordstown facility, excluding certain assets such as the hub motor assembly line and battery module and pack lines, for $230 million.
Foxconn has agreed to make a down payment of the purchase price of $100 million by November 18th, and subsequent down payments of $50 million on each of February 1st, 2022 and no later than April 15, 2022. The balance of the purchase price will be paid at closing.
The parties have agreed to pursue a contract manufacturing agreement for the Endurance pickup truck, which must be entered into before closing—currently targeted by April 30th. 
Lordstown Motors and Foxconn will pursue a joint venture agreement to co-design and develop vehicle programs for the global commercial fleet market, using the MIH open platform. Lordstown and Foxconn would have the right to commercialize these new EV programs in North America and internationally.
Upon the closing, Foxconn will receive 1.7 million warrants to acquire Lordstown common stock, exercisable for three years, at a price of $10.50 per share.
The closing of the transactions contemplated by the APA is subject to closing conditions, including entry into the contract manufacturing agreement, regulatory approvals and other customary closing conditions.
&nbsp;
Young Liu, Chairman of Hon Hai Technology Group, commented “This partnership marks the commencement of integrating our resources with Lordstown Motors to develop Ohio into Hon Hai’s most important electric vehicle manufacturing and R&amp;D hub in North America. As we look to inject Hon Hai’s software and hardware capabilities in the information and communications industry with the wealth of automotive experience that resides in this town and our partners, we will be able to provide customers with more real-time and efficient Electric vehicle products.”
Daniel Ninivaggi, Chief Executive Officer of Lordstown Motors Corp., stated, “We are happy to have formed a strategic partnership with a company as innovative and forward-thinking as Foxconn. I believe in their EV strategy and look forward to substantial collaboration in the future. In my view, this transaction provides LMC a better opportunity to fulfill its original mission of satisfying the growing demand for electric vehicles, particularly in the underserved commercial market, with a more flexible business model.” 
The Foxconn partnership will unlock the tremendous potential of the Lordstown plant by getting it to scale faster. At 6.2 million square feet, and 640 acres, the Lordstown Complex was one of the largest internal combustion engine automotive plants in North America. It is now being converted into a state-of-the-art EV manufacturing facility. Foxconn has an excellent opportunity to fill the plant, having already announced that the Fisker PEAR program is intended to be manufactured in Lordstown. 
Lordstown Motors and all OEMs whose vehicles are built at the plant will benefit from the increased capacity utilization, possible use of common components and shared overhead costs. The use of shared space and the MIH open platform provides smaller, more specialized OEM’s the opportunity to achieve the benefits of scale without being a large, fully integrated automaker.
Finally, the partnership with Foxconn should enable Lordstown Motors to significantly reduce its raw material, component and other input costs. As one of the largest contract manufacturers globally, Foxconn will bring to bear the purchasing power, supply chain network, and logistics capabilities to significantly reduce vehicle production costs and mitigate supply chain risk. LMC also stands to benefit from Foxconn’s expertise in hardware software integration – critical to EVs – given their experience as a multinational electronics manufacturer.

              Announces the establishment of Software R&amp;D Center with over 1,000 engineers and creates platform with Smart Cockpit, Gateway, Autonomous Driving applications in quest to redefine software for the automobile industry
Hon Hai Technology Group (Foxconn), a global leader in smart manufacturing,&nbsp;today announced at the Hon Hai Tech Day 2021 (HHTD21) its plan to establish a software research &amp; development center with over 1,500 talents across Hon Hai, with the intent to recruit over 1,000 more software development engineers in the next three years. This announcement demonstrates the determination of the Group to become a software-defined business in the future. 
Hon Hai also announced the launch and partner enablement details around software innovations such as Smart Gateway, Smart Cockpit, Smart Autonomous Driving and other software applications. Dr. Zhang Yang, founder of AutoCore.ai, Dr. Shinpei Kato, Founder and Chief Technology Officer of Tier IV, as well as Dr. Xu Hongmin, CTO of Mobile Drive shared more on the nature of the collaboration as well as their views on the role of the platform, shared data, computing and applications in electric vehicle software development.
Following the unveiling of three electric vehicle models in the morning, HHTD21 breakout discussions on electric vehicles in the afternoon attracted hundreds of software developers and scholars in the field of software innovation. Conference participants discussed the application of Smart cockpit and ride experience as well as intelligent vehicle software such as AutoCore OS. Discussions also revolved around how to achieve the next generation of EV Zonal electronic and electrical architecture, including a demonstration of how safe vehicles work in real-life environments. 
Young Liu, Chairman of Hon Hai Technology Group, said that Hon Hai has begun to transform into a software defined enterprise. As the electric vehicle business develops and matures, Hon Hai will look to launch its open platform and other software. The group will also introduce enhancements on the software platform over time.
Hon Hai also announced that it will set up a software R&amp;D center with more than 1,500 software application talents within the group, and expects to recruit more than 1,000 senior software R&amp;D engineers within three years, as an important starting point for "software-defined Hon Hai " in the future. The group welcomes those who are interested in the field of electric vehicle software to driving the future smart electric car together. 
In the afternoon session of the HHTD21, top industry experts in the field of electric vehicle software development were invited to share their latest research findings and insights. Dr. Xu Hongmin, CTO of Mobile Drive shared his views on the development of Smart Cockpit and how to integrate AI technology into core services to provide a safe and advanced driving experience. 
Dr. Zhang Yang, founder of AutoCore.ai, who is a world-renowned expert on smart electric vehicle development, shared his insights into automobile software and the success of AutoCore.ai as an EV computing platform independent of SoC. He demonstrated how the platform can provide low cost, low power, scalable and reliable systems development with safety. Doing so will allow it to function as an in-vehicle communication backbone. 
Dr. Shinpei Kato, Founder and Chief Technology Officer of Tier IV, as a key strategic partner in the development of electric vehicle software, delivered a keynote discussing smart autonomous driving and showcased how Tier IV uses Autoware to drive autonomous vehicle commercialization and industry verification. He also talked about its collaboration with Hon Hai on self-driving integrated solutions and its plans globally. 
At HHTD21, Hon Hai did not only reinforce the determination to electric vehicle software development, but also declare its software-defined enterprise model moving forward. In addition to recruiting more than 1,000 senior software R&amp;D engineers in the next three years, the software R&amp;D center planning process will be announced at an appropriate time in the future, and more results of software cooperation are expected to be displayed in the next Tech Day.

                Hon Hai Debuts Three Self-Developed Electric Vehicle Models
              </span></a></div><span data-dcnode-id="304" instrument_node=""> </span><p class="description" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">
              Officially Unveils Global Flagship Models with High-Performance on 
Hon Hai Tech Day to Demonstrate R&amp;D and Manufacturing Capabilities
Hon Hai Technology Group (Foxconn), a global leader in smart manufacturing,&nbsp;today introduced for the first time, three autonomously developed electric vehicles: the Model C recreational vehicle, the Model E sedan and the Model T electric bus. The announcement was made during the livestreamed Hon Hai Tech Day 2021 (HHTD21) event, underlining Hon Hai&amp;#39;s commitment to become a global next-generation automotive manufacturer. 
Demonstrating success on electric vehicle development in the past year
Upholding the company’s vision of “3+3=∞” which symbolizes the infinite possibilities created by the group’s industrial advancement and emerging technologies, this year’s Tech Day focused on four core themes: Passion, Technology, Software and Experience. As the HHTD21 event kicked off, Young Liu, Chairman of Hon Hai Technology Group, introduced three autonomously developed electric vehicle models to media and guests that had tuned into the livestream. Lilian Chen, CEO of Yulon Motor Group, appeared alongside a Model C electric vehicle together with Shen Jong-chin, Vice Premier of the Executive Yuan, who was present to deliver the keynote speech. Terry Gou, Founder of Hon Hai, made a surprise appearance by driving out in a Model E electric car.
This year’s HHTD was organized on the Founder’s birthday. Terry Gou has always believed that the adoption of electric vehicles would inevitably be a global trend by the simple fact that it has become the world&amp;#39;s largest and most expensive smart electronic device. He believes that with the strong capabilities in electronic manufacturing, including semiconductors, modules, precision machinery and operation, Taiwan can play a key role in the development of electric vehicles. He expressed that the Model E electric car was the best birthday present for him, which is why he insisted on driving it himself.
Lilian Yen Chen, CEO of Yulon Motor Group said that within less than a year since its establishment, Foxtron, the joint venture between Hon Hai and Yulon Motor, has today successfully demonstrated Hon Hai’s strong capability and speed of delivery as well as Taiwan’s decades-long history of research and development expertise. Today’s showcase demonstrated future products with high performance. Yulon Group’s Luxgen and CMC proprietary brands will be the first key partners to adopt Foxtron’s product platform. She believes with the determination and support from Hon Hai, Foxtron will play a key role in the transformation of the automobile industry, leading the advancement of the automobile production value chain in Taiwan.
Young Liu, Chairman of Hon Hai Technology Group, said that Hon Hai had announced its electric vehicle strategy during last year’s Tech Day, and throughout the year, the company had announced, on average, one partnership announcement per month, creating a Hon Hai electric vehicle supply chain and distribution network while demonstrating its achievements in hardware development. In the next two years, Hon Hai will bring to the industry more updates from its software and semiconductor businesses to allow the development of easy-to-use, highly efficient and high-performance electric vehicles – “Hon Hai is ready and no longer the new kid in town” he said. 
Unveiling three electric vehicle model
The Model C is the first model built on Hon Hai’s electric vehicle open platform and is positioned as the intrinsically optimized electric SUV with pure electric nature. The Model C’s four core features are: shape, space, power and energy consumption. Its design does not only have a minimalist appearance, but it has also significantly minimized the spaces used for mechanical components, while maximizing seating space. The Model C, which is 4.64 meters long with a wheelbase of 2.86 meters, offers comfortable seating for 5+2 people and plenty of storage space, making it easy to navigate crowded metro areas while still enjoying the luxury of a larger car.
The Model C, with a low 0.27 drag coefficient, accelerates from 0 to 100 km in 3.8 seconds and delivers an extended range of 700km. Thanks to the open platform sharing advantages, consumers can have a pure electric SUV with high performance, high efficiency, high intelligence, low energy consumption and large space at a reasonable price comparable to a fuel-powered car.
The Model E, jointly developed by Hon Hai and Italian design firm Pininfarina, is a technologically innovative luxury flagship sedan that can meet the needs of middle and high-end consumers. At the same time, it is also the high-quality first choice for businesses. The rear seat space can transform into a dedicated mobile office, with personal mobile devices seamlessly connected to the passenger car, enabling a series of smart applications such as face recognition door opening, smart windows and vehicle and environment interfaces.
In addition to luxury and comfort, the Model E, with high performance and advanced dynamic control technology, delivers a power output of about 750 horsepower and achieves 0 to 100 km acceleration in a staggering 2.8 seconds, better than comparable models in the market and almost at the pace of a Formula One racing car. The Model E also has a 750km range to address the range anxiety of most electric car users.
Positioned as an intelligent transportation solution, the Model T is a stylish urban bus. Its high rigid body design and protection meets the Federal Transit Administration (FTA) regulations and standards. In addition, the Model T has completed 200,000km of acceleration endurance test and more than 1,000 hours of rigid strength tests at the Automotive Research &amp; Testing Center (ARTC) Testing, ensuring the safety of drivers and passengers alike.
In terms of energy consumption and endurance, the Model T’s battery can withstand temperatures of up to 400 degrees, across a range of more than 400 kilometers. Under full load conditions, the maximum climbing capacity can reach 25%, and the maximum speed can reach 120 kilometers per hour, providing drivers with a relaxed and smooth driving experience, whilst allowing passengers a comfortable and safe journey.
Chi-Sen Tso, Vice Chairman of Foxtron, concluded the morning session of the HHTD21 and expressed that in the past year, Hon Hai had made significant achievements in electric vehicle development that included strategic partnership alliances, critical technology research and development as well as the expansion of a global production network. In the coming five years, in line with its strategic vision, the establishment of the global network together with the accumulated knowledge, electric vehicle will become another Hon Hai trillion (TWD) dollar business.
