</span><div class="padded-panel" data-dcnode-id="1417"><h1 class="main-title single-title entry-title" data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">IMSH: International Meeting for Simulation In Healthcare</span></h1></div><span data-dcnode-id="1416" instrument_node="">
</span><div class="the-content padded-panel" data-dcnode-id="1049"><div data-dcnode-id="1415" id="content-anchor"></div><div class="clearfix" data-dcnode-id="1050" id="content-anchor-inner"><p data-dcnode-id="1386"><span data-dcnode-id="1414" instrument_node="">Every year the </span><a data-ail="17027" data-dcnode-id="1412" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/ssih/" rel="follow" target="_self" title="SSiH"><span data-dcnode-id="1413" instrument_node="">Society for Simulation in Healthcare</span></a><span data-dcnode-id="1411" instrument_node=""> (</span><a data-ail="17027" data-dcnode-id="1409" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/ssih/" rel="follow" target="_self" title="SSiH"><span data-dcnode-id="1410" instrument_node="">SSiH</span></a><span data-dcnode-id="1408" instrument_node="">), hosts the International Meeting for </span><a data-ail="17027" data-dcnode-id="1406" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/healthcare-simulation/" rel="follow" target="_self" title="Simulation in Healthcare"><span data-dcnode-id="1407" instrument_node="">Simulation in Healthcare</span></a><span data-dcnode-id="1405" instrument_node=""> (IMSH) in a major city of the United States. Dedicated to </span><a data-ail="17027" data-dcnode-id="1403" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/healthcare-simulation/" rel="follow" target="_self" title="Healthcare Simulation"><span data-dcnode-id="1404" instrument_node="">healthcare simulation</span></a><span data-dcnode-id="1402" instrument_node=""> </span><a data-ail="17027" data-dcnode-id="1400" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/healthcare-simulation/research-journals/" rel="follow" target="_self" title="Healthcare Simulation Research"><span data-dcnode-id="1401" instrument_node="">research</span></a><span data-dcnode-id="1399" instrument_node=""> and learning, the event provides an opportunity for “Simulation Champions” from around the world to come together to network with peers, learn from experts, and see the latest </span><a data-ail="17027" data-dcnode-id="1397" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/medical-simulator/" rel="follow" target="_self" title="Medical Simulators"><span data-dcnode-id="1398" instrument_node="">medical simulators</span></a><span data-dcnode-id="1396" instrument_node=""> like those from </span><a data-dcnode-id="1394" data-mil="17027" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/laerdal/" rel="follow"><span data-dcnode-id="1395" instrument_node="">Laerdal</span></a><span data-dcnode-id="1393" instrument_node="">, </span><a data-ail="17027" data-dcnode-id="1391" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/cae-healthcare/" rel="follow" target="_self" title="CAE Simulation"><span data-dcnode-id="1392" instrument_node="">CAE</span></a><span data-dcnode-id="1390" instrument_node=""> Healthcare or </span><a data-ail="17027" data-dcnode-id="1388" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/gaumard/" rel="follow" target="_self" title="Gaumard"><span data-dcnode-id="1389" instrument_node="">Gaumard</span></a><span data-dcnode-id="1387" instrument_node="">.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><div class="signoff" data-dcnode-id="1365"><span class="icon theme-icon-pencil" data-dcnode-id="1384"></span><p data-dcnode-id="1367"><strong data-dcnode-id="1381"><a data-ail="17027" data-dcnode-id="1382" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/" rel="follow" target="_self" title="HealthySimulation.com"><span data-dcnode-id="1383" instrument_node="">HealthySimulation.com</span></a></strong><span data-dcnode-id="1380" instrument_node="">&nbsp;is dedicated to providing the latest #MedSim news and resources from around the world. To follow along, sign up for our free </span><a data-dcnode-id="1378" data-mil="17027" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/medical-simulation-newsletter/" rel="follow"><span data-dcnode-id="1379" instrument_node="">medical simulation email newsletter</span></a><span data-dcnode-id="1377" instrument_node="">, follow </span><a class="external" data-dcnode-id="1375" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.twitter.com/healthysim" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="1376" instrument_node="">@HealthySim on Twitter</span></a><span data-dcnode-id="1374" instrument_node=""> and </span><a class="external" data-dcnode-id="1372" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/HealthySim/" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="1373" instrument_node="">@HealthySim on Facebook</span></a><span data-dcnode-id="1371" instrument_node="">, or join our </span><a class="external" data-dcnode-id="1369" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/groups/4606948/" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="1370" instrument_node="">HealthySim LinkedIn Group</span></a><span data-dcnode-id="1368" instrument_node="">!</span></p><span data-dcnode-id="1366" instrument_node="">
</span></div><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1363" instrument_node="">The Society for Simulation in Healthcare (</span><a data-ail="17027" data-dcnode-id="1361" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/ssih/" rel="follow" target="_self" title="SSiH"><span data-dcnode-id="1362" instrument_node="">SSH</span></a><span data-dcnode-id="1360" instrument_node="">) hosts this event and offers over 250 sessions encompassing interactive and immersive </span><a class="external" data-ail="17027" data-dcnode-id="1358" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.comlearn.healthysimulation.com/courses/" rel="nofollow" target="_blank" title="Healthcare Simulation Course"><span data-dcnode-id="1359" instrument_node="">courses</span></a><span data-dcnode-id="1357" instrument_node=""> and plenary sessions. The IMSH meeting is aligned with the SSH’s mission to “provide hands-on learning in leading-edge </span><a data-ail="17027" data-dcnode-id="1355" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/medical-simulation/" rel="follow" target="_self" title="Medical Simulation"><span data-dcnode-id="1356" instrument_node="">medical simulation</span></a><span data-dcnode-id="1354" instrument_node=""> trends and technology, networking and collaboration.” Furthermore, the programs are all peer-reviewed and are selected to serve the needs of novices to experts.</span></p><div class="tgjuz626c6794e7b1e" data-dcnode-id="1335"><div class="text-center" data-dcnode-id="1337" style="margin: 40px 0;"><hr data-dcnode-id="1352"><p data-dcnode-id="1343"><strong data-dcnode-id="1349"><i data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Sponsored Content:</span></i></strong><span data-dcnode-id="1348" instrument_node="">
</span><span data-dcnode-id="1346" instrument_node="">
</span></p><div data-dcnode-id="1342" id="placement_325070_0"></div><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1340"></p><span data-dcnode-id="1339" instrument_node="">
</span><hr data-dcnode-id="1338"></div><span data-dcnode-id="1336" instrument_node="">
</span></div><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1331" instrument_node="">“Every year, professionals from all experience levels and from more than 50 countries attend IMSH,” Kathy Adams, Director of Continuing Education, SSH, said. “Any professional interested in or currently working in healthcare simulation will find value in the </span><a data-dcnode-id="1329" data-mil="17027" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/healthcare-simulation/conferences/" rel="follow"><span data-dcnode-id="1330" instrument_node="">healthcare simulation conference</span></a><span data-dcnode-id="1328" instrument_node="">; the range of learning formats — from small, interactive workshops, to large, inspiring plenaries – and the breadth of topics presented by global experts ensures that there is something for every learning style, interest and experience level.”</span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">At IMSH meetings, key areas of discussion are often new ideas, leadership development, new processes and research findings, innovative approaches, design strategies, return on investment and improved communication techniques. As a catalyst for advancement and evolution in healthcare simulation technology, the IMSH brings together and connects industry professionals to learn. The event is considered to be one of the top educational and networking events for the healthcare simulation world, especially for those with interests in IPE.</span></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1320" style="text-align: center;"><a class="btn btn-lg btn-info" data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthysimulation.com/imsh" role="button"><span data-dcnode-id="1322" instrument_node="">Can’t wait until IMSH? Click Here to Connect to Leading Healthcare Simulation Vendors Now!</span></a></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Ultimately, when deciding on which topics to discuss at each meeting, the IMSH Planning Committee dedicates their time and expertise to creating a leading edge and memorable experience for attendees. In planning for the event, the committee seeks to ensure that some components differ from year to year. This means introducing new cutting-edge themes that set the framework for all content offerings, inviting dynamic keynote speakers and ensuring that presentations contain innovative learning formats (such as immersive courses, rapid-fire sessions, roundtable discussions, debates, panel discussions and in-depth and hands-on workshops).</span></p><div class="awijg626c6794e7c50" data-dcnode-id="1287"><div class="text-center" data-dcnode-id="1288" style="margin: 40px 0;"><hr data-dcnode-id="1316"><p data-dcnode-id="1307"><strong data-dcnode-id="1313"><i data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Sponsored Content:</span></i></strong><span data-dcnode-id="1312" instrument_node="">
</span><span data-dcnode-id="1310" instrument_node="">
</span></p><div data-dcnode-id="1306" id="placement_325070_1"></div><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1304"></p><div class="cmpad626c6794e7ce6" data-dcnode-id="1293"><div class="text-center" data-dcnode-id="1294" style="margin: 40px 0;"><hr data-dcnode-id="1303"><span data-dcnode-id="1302" instrument_node="">
</span><span data-dcnode-id="1300" instrument_node="">
