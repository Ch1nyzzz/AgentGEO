</span><section class="ab-blog-content u-justify-content-center u-margin-left-1 u-margin-right-1 u-margin-top-2 u-margin-bottom-2" data-dcnode-id="361" id="main-content"><span data-dcnode-id="1537" instrument_node="">
</span><div class="c-container post-content-inner-container" data-dcnode-id="363"><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">eXtended Reality (XR) is a ‘catch-all’ term for technologies that enhance or replace our view of the world. This is often through overlaying or immersing computer text and graphics into real-world and virtual environments, or even a combination of both.</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">XR encompasses augmented reality (AR), virtual reality (VR), and mixed reality (MR). While all three ‘realities’ share common overlapping features and requirements, each has different purposes and underlying technologies.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">XR is set to play a fundamental role in the metaverse. The ‘next evolution of the Internet’ will converge real, digital, and virtual worlds into new realities, accessed via an Arm-powered ‘gateway’ device such as a VR headset or pair of AR smart glasses.</span></p><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">XR technologies share some fundamental similarities: A core part of all XR wearable devices is the ability to use visual input methods such as object, gesture, and gaze tracking to navigate the world and display context-sensitive information. Depth perception and mapping are also enabled through the depth and location features.</span></p><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">However, XR devices vary based on the type of AR, MR, and VR experience and the complexity of use case that they are designed to enable.</span></p><span data-dcnode-id="1521" instrument_node="">
</span><h3 data-dcnode-id="1519" id="h-what-is-augmented-reality-ar"><span data-dcnode-id="1520" instrument_node="">What is Augmented reality (AR)?</span></h3><span data-dcnode-id="1518" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1513"><img alt="Lenovo ThinkReality A3" class="wp-image-3756" data-dcnode-id="1517" height="606" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arm.com/blogs/blueprint/wp-content/uploads/2021/01/lenovo_thinkreality-1200x606.jpg&amp;raw" srcset="https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/01/lenovo_thinkreality-1200x606.jpg 1200w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/01/lenovo_thinkreality-640x323.jpg 640w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/01/lenovo_thinkreality-768x388.jpg 768w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/01/lenovo_thinkreality-1536x776.jpg 1536w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/01/lenovo_thinkreality-1920x970.jpg 1920w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/01/lenovo_thinkreality-960x485.jpg 960w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/01/lenovo_thinkreality-480x243.jpg 480w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/01/lenovo_thinkreality.jpg 1940w" width="1200"><figcaption data-dcnode-id="1514"><sup data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Lenovo ThinkReality A3 AR smart glasses</span></sup></figcaption></figure><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Augmented reality (AR) enhances our view of the real world by overlaying what we see with computer-generated information. Today, this technology is prevalent in smartphone AR applications that require the user to hold their phone in front of them. By taking the image from the camera and processing it in real-time, the app is able to display contextual information or deliver gaming and social experiences that appear to be rooted in the real world.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">While smartphone AR has improved significantly in the past decade, its applications remain limited. Increasingly, the focus is on delivering a more holistic AR experience through wearable smart glasses. These devices must combine an ultra-low-power processor with multiple sensors including depth perception and tracking, all within a form factor that is light and comfortable enough to wear for long periods.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">AR smart glasses need always-on, intuitive, and secure navigation while users are on the move. This requires key advancements in features such as depth, occlusion (when one object in a 3D space is blocking another object from view), semantics, location, orientation, position, pose, and gesture and eye tracking.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1502" instrument_node="">In 2021, a number of new smart glasses models arrived on the market, including the&nbsp;</span><a data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spectacles.com/uk/"><span data-dcnode-id="1501" instrument_node="">Spectacle smartglasses</span></a><span data-dcnode-id="1499" instrument_node="">&nbsp;from Snap,&nbsp;</span><a data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arm.com/blogs/blueprint/ces-2021"><span data-dcnode-id="1498" instrument_node="">Lenovo ThinkReality A3</span></a><span data-dcnode-id="1496" instrument_node="">, and&nbsp;</span><a data-dcnode-id="1494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vuzix.com/technology/next-gen"><span data-dcnode-id="1495" instrument_node="">Vuzix’s Next Gen Smart Glass.</span></a><span data-dcnode-id="1493" instrument_node=""> AR smart glasses are set to enhance all of our lives in the future, as described in the video below. They’ll also likely play a role as gateways to the metaverse where virtual elements and reality intersect.</span></p><span data-dcnode-id="1491" instrument_node="">

</span><h3 data-dcnode-id="966" id="h-what-is-virtual-reality-vr"><span data-dcnode-id="967" instrument_node="">What is Virtual reality (VR)?</span></h3><span data-dcnode-id="965" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="960"><img alt="" class="wp-image-4467" data-dcnode-id="964" height="606" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/oculus-1200x606.jpg&amp;raw" srcset="https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/oculus-1200x606.jpg 1200w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/oculus-640x323.jpg 640w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/oculus-768x388.jpg 768w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/oculus-1536x776.jpg 1536w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/oculus-1920x970.jpg 1920w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/oculus-960x485.jpg 960w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/oculus-480x243.jpg 480w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/oculus.jpg 1940w" width="1200"><figcaption data-dcnode-id="961"><sup data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Oculus Quest 2 VR headset</span></sup></figcaption></figure><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Virtual reality (VR) completely replaces a user’s view, immersing them within a computer-generated virtual environment. This type of XR technology has existed for a while, with gradual improvements. It is used primarily for entertainment experiences, such as gaming, concerts, films, or sports but it’s also accelerating into the social domain. For VR, the immersive entertainment experiences will require capabilities like HD rendering pipeline, volumetric capture, 6DoF motion tracking, and facial expression capture.</span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="955" instrument_node="">VR is also used as a tool for training and in education and&nbsp;</span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arm.com/blogs/blueprint/ten-ways-vr-ar-transforming-healthcare"><span data-dcnode-id="954" instrument_node="">healthcare</span></a><span data-dcnode-id="952" instrument_node="">, such as rehabilitation. To make these experiences possible (and also seamless) for the end-user, the focus of VR technology is often on high-quality video and rendering and ultra-low latency.</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="949" instrument_node="">Finally, VR devices are now enhancing video conferencing experiences through platforms like RecRoom that enable virtual meet-ups in different virtual worlds. RecRoom, which now supports the Oculus Quest, was featured in episode three of&nbsp;</span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DF24g_Kaat-w"><span data-dcnode-id="948" instrument_node="">Arm’s New Reality series</span></a><span data-dcnode-id="946" instrument_node="">&nbsp;in 2020 that discussed immersive experiences with VR.</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">While some VR devices must be tethered to a PC, standalone VR devices such as the Oculus Quest 2 pictured are able to deliver AAA gaming and metaverse experiences. Powered by high-end Arm processors, these standalone VR devices can be taken anywhere. In the future, standalone VR devices will become </span><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arm.com/blogs/blueprint/metaverse"><span data-dcnode-id="942" instrument_node="">gateway devices to the metaverse</span></a><span data-dcnode-id="940" instrument_node="">.</span></p><span data-dcnode-id="938" instrument_node="">
</span><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="416"><div class="wp-block-embed__wrapper" data-dcnode-id="417" style="height: 539.52px;"><span data-dcnode-id="937" instrument_node="">

</span><h3 data-dcnode-id="413" id="h-what-is-mixed-reality-mr"><span data-dcnode-id="414" instrument_node="">What is Mixed Reality (MR)?</span></h3><span data-dcnode-id="412" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="410"><img alt="" class="wp-image-4470" data-dcnode-id="411" height="552" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/pokefun009-1200x552.jpg&amp;raw" srcset="https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/pokefun009-1200x552.jpg 1200w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/pokefun009-640x294.jpg 640w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/pokefun009-768x353.jpg 768w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/pokefun009-1536x706.jpg 1536w, https://www.arm.com/blogs/blueprint/wp-content/uploads/2021/06/pokefun009.jpg 1940w" width="1200"></figure><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">MR sits somewhere between AR and VR, as it merges the real and virtual worlds. There are three key scenarios for this type of XR technology. The first is through a smartphone or AR wearable device with virtual objects and characters superimposed into real-world environments, or potentially vice versa.</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="405" instrument_node="">The Pokémon Go mobile game, which took the world by storm back in 2016, overlays virtual Pokémon in real-world environments via a smartphone camera (this was also demonstrated on a HoloLens 2 as shown at </span><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.microsoft.com/march-2021-ignite/"><span data-dcnode-id="404" instrument_node="">Microsoft Ignite 2021</span></a><span data-dcnode-id="402" instrument_node="">). This is often touted as a revolutionary AR game, but it’s actually a great example of MR – blending real-world environments with computer-generated objects.</span></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Mixed reality is also beginning to be used to enable VR real-world players to be superimposed into video games to bring real-world personalities to game streaming platforms such as Twitch or YouTube.</span></p><span data-dcnode-id="397" instrument_node="">
</span><span data-dcnode-id="395" instrument_node="">
</span><div class="c-row u-justify-content-center CTA_box" data-dcnode-id="365"><span data-dcnode-id="394" instrument_node="">

</span><h4 class="u-margin-top-1 u-margin-bottom-1/2 u-text-bold" data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Advancing AR and VR Experiences</span></h4><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="388"></p><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Arm focuses on developing technology innovations that power the next generation of xR devices. Arm CPU and GPU technology delivers a number of benefits, including improved performance and increased power efficiency.</span></p><span data-dcnode-id="385" instrument_node="">
