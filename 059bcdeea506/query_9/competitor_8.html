</span><h4 class="publication__title" data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Building Responsible, Safe, and Inclusive Extended Reality Ecosystems (the Metaverse)</span></h4><span data-dcnode-id="735" instrument_node="">
</span><div class="publication__meta" data-dcnode-id="724"><span data-dcnode-id="734" instrument_node="">
</span><span class="badge badge-light" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">RESEARCH</span></span><span data-dcnode-id="731" instrument_node="">

</span><div class="publication__abstract" data-dcnode-id="709"><span data-dcnode-id="722" instrument_node="">
</span><h3 class="has-text-color" data-dcnode-id="720" style="color:#035f83"><span data-dcnode-id="721" instrument_node="">XRSI Recommendations for the Biden-Harris Administration</span></h3><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">The United States is facing the unprecedented challenge of building responsible, safe, and inclusive XR and Metaverse related Information and Communication Technology ecosystems.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">We need pragmatic policy decisions and governance frameworks that help build responsibility, safety, and inclusion for new and emerging fields of XR technologies (an umbrella term for AR/VR/MR). With the pandemic catalyzing and fueling the growth and adoption of these technologies, we need to pause and reflect: if we are going to extend realities via the immersive domain of XR, what kind of world will we wish to create?</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Lawmakers must proactively address the issue of privacy and data protection while enabling responsible research and innovation. This area is particularly relevant today as our dependency on smart technologies grows, and we embrace immersive and emerging technologies to build the future.</span></p><span data-dcnode-id="710" instrument_node="">

</span><h4 class="publication__title" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Virtual Worlds, Real Risks and Challenges</span></h4><span data-dcnode-id="670" instrument_node="">
</span><div class="publication__meta" data-dcnode-id="665"><span data-dcnode-id="669" instrument_node="">
</span><span class="badge badge-light" data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">RESEARCH</span></span><span data-dcnode-id="666" instrument_node="">
</span></div><span data-dcnode-id="664" instrument_node="">
</span><div class="publication__abstract" data-dcnode-id="645"><span data-dcnode-id="663" instrument_node="">
</span><h4 class="has-blue-color has-text-color" data-dcnode-id="659" id="1st-xr-data-classification-roundtable-reportxr-safety-week-2021-december-10th-2021"><span data-dcnode-id="662" instrument_node="">1st XR Data Classification Roundtable Report</span><br data-dcnode-id="661"><span data-dcnode-id="660" instrument_node="">XR Safety Week 2021 – December 10th, 2021</span></h4><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Today, most people understand that internet technologies generate data with each click, like, and share. Humans have relied on data collection and sharing to record and propagate historical facts, ideas, and opinions across timelines. In the past few decades, the creation, processing, and sharing of data have become so common that most people have stopped paying attention to the amount of data they give away every day.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">People relinquish their data without realizing the risks or consequences. While this is not new, the difference today is we are moving towards an era of constant reality capture, especially with the increased adoption of immersive technologies and a strong push to build the next iteration of the Internet, also known as the Metaverse.</span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Immersive technologies, including Extended Reality (XR) and Internet of Things (IoT), bring a new set of privacy, cybersecurity, and safety concerns, at a time when we have not fully addressed the challenges of the Internet era. XR technologies currently being used to create virtual worlds introduce real-world risks to humans, amplified as we evolve towards the Metaverse. Kavya Pearlman, founder and CEO of the XR Safety Initiative (XRSI), recognized the coming wave of technology challenges in 2018 and started research into the massive data collection associated with virtual worlds and the real risks that come with them. Most privacy laws and data protection principles of our times are going to be inadequate because they do not fully address the risks related to the processing of XR data, giving way to undermining human rights.</span></p><span data-dcnode-id="649" instrument_node="">
</span><a class="more-link" data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//xrsi.org/publication/virtual-worlds-real-risks-and-challenges%23more-1751"><span aria-label="Continue reading Virtual Worlds, Real Risks and Challenges" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">(more…)</span></span></a></div><span data-dcnode-id="644" instrument_node="">

</span><h4 class="publication__title" data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">The growing value of XR in Healthcare in the United Kingdom</span></h4><span data-dcnode-id="602" instrument_node="">
</span><div class="publication__meta" data-dcnode-id="597"><span data-dcnode-id="601" instrument_node="">
</span><span class="badge badge-light" data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">RESEARCH</span></span><span data-dcnode-id="598" instrument_node="">
</span></div><span data-dcnode-id="596" instrument_node="">
</span><div class="publication__abstract" data-dcnode-id="577"><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="594" instrument_node="">The&nbsp;</span><em data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Growing Value of XR in Healthcare&nbsp;</span></em><span data-dcnode-id="591" instrument_node="">report has been created in response to the pressing need to have access to more accurate and representative intelligence and market data to help inform emerging strategies and priorities within the public and private sector in the UK.</span><br data-dcnode-id="590"><br data-dcnode-id="589"><span data-dcnode-id="588" instrument_node="">XR refers to Extended Reality and covers Augmented Reality (AR), Mixed Reality (MR) and Virtual Reality (VR), haptics, interfaces, platforms and software and will often be referred to as immersive technologies within the context of this report. The healthcare sector referred to covers health and social care in public and private services, in clinical and non-clinical settings.</span><br data-dcnode-id="587"><br data-dcnode-id="586"><span data-dcnode-id="585" instrument_node="">The report has been developed in partnership with NHSX, Health Education England Technology Enhanced Learning Team, UKRI Audience of the Future Challenge,&nbsp; NIHR Mental Health Medtech Cooperative (MindTech) and Rescape. It has been supported by the Sheffield Hallam University Impact VR Research lab and </span><strong data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">the XR Safety Initiative (XRSI) whose collective support has been critical in making this report happen.</span></strong><span data-dcnode-id="582" instrument_node=""> The report was also supported by a business donation from Pfizer Limited.&nbsp;&nbsp;The report findings will help government and public health services make informed decisions about future strategies to ensure the UK is in the best position to fully exploit the potential of XR in healthcare today and ultimately improve patient outcomes and the quality of people’s lives into the future.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="579"></p><span data-dcnode-id="578" instrument_node="">

</span><h4 class="publication__title" data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">An Imperative – Developing Standards for Safety and Security in XR Environments</span></h4><span data-dcnode-id="538" instrument_node="">
</span><div class="publication__meta" data-dcnode-id="533"><span data-dcnode-id="537" instrument_node="">
</span><span class="badge badge-light" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">RESEARCH</span></span><span data-dcnode-id="534" instrument_node="">
</span></div><span data-dcnode-id="532" instrument_node="">
</span><div class="publication__abstract" data-dcnode-id="509"><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="526"><em data-dcnode-id="527"><span data-dcnode-id="530" instrument_node="">In partnership with </span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emteqlabs.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="529" instrument_node="">emteq labs</span></a></em></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Whilst virtual reality technologies have been available for decades, we are now in a period of rapid growth in virtual, augmented and mixed reality technologies, collectively known as XR.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">The acceleration in XR availability and adoption can be attributed to many factors, principally, a reduction in hardware cost, increases the availability of high-speed high-quality connectivity, and most recently, shifts in society brought on by the global pandemic.</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">As with all emerging technologies, the confluence of new economic and societal norms with new techniques and capabilities gives rise to new opportunities, challenges, and entirely new paradigms.</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">This paper is based on discussions held during a roundtable conversation between members of the XR Safety Initiative (XRSI) panel, in partnership with emteq labs. The paper examines the opportunities and perils of XR technology and what should be done from a safety and security point of view to maximise the potential for good, whilst mitigating opportunities for harm.</span></p><span data-dcnode-id="513" instrument_node="">
</span><a class="more-link" data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//xrsi.org/publication/an-imperative-developing-standards-for-safety-and-security-in-xr-environments%23more-1374"><span aria-label="Continue reading An Imperative – Developing Standards for Safety and Security in XR Environments" data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">(more…)</span></span></a></div><span data-dcnode-id="508" instrument_node="">

</span><h4 class="publication__title" data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">EXTEND REALITY WITH AWARENESS! XR Safety and Privacy Guide for Artists</span></h4><span data-dcnode-id="463" instrument_node="">
</span><div class="publication__meta" data-dcnode-id="458"><span data-dcnode-id="462" instrument_node="">
</span><span class="badge badge-light" data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">STANDARDS</span></span><span data-dcnode-id="459" instrument_node="">
</span></div><span data-dcnode-id="457" instrument_node="">
</span><div class="publication__abstract" data-dcnode-id="443"><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">This guide serves all of the artist and media communities. However, it zooms in on the subject of privacy and security for Individual creators, creative collaborators, and artistic developers. No matter which role you play, this guide can be used to ensure the key privacy and security considerations are taken into account during the design of XR products and experiences. Early adoption of these practices will help limit potential cybersecurity and privacy threats.</span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Taking privacy and security into consideration might not be a part of the natural creative process. However, it is essential to pay attention to these aspects when designing and developing. These proactive actions protect the artists themselves and the audience that may potentially interact with the art or enter into the same thought space as the one intended by the artist. Today’s artists and developers are setting a precedent that will be followed by generations. Therefore we must get it right to create a safe and trustworthy ecosystem.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="445"><strong data-dcnode-id="446"><span data-dcnode-id="449" instrument_node="">More information on </span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artizen.fund/grant/xr-safety-grant" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="448" instrument_node="">https://www.artizen.fund/grant/xr-safety-grant</span></a></strong></p><span data-dcnode-id="444" instrument_node="">

</span><h4 class="publication__title" data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">VR Safety Tips for Parents: Top 7 XRSI Recommendations</span></h4><span data-dcnode-id="348" instrument_node="">

</span><div class="publication__abstract" data-dcnode-id="328"><span data-dcnode-id="341" instrument_node="">
</span><h4 class="has-light-blue-color has-text-color" data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Important SAFETY TIPS Parents NEED TO KNOW about VIRTUAL REALITY</span></h4><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">With the Holiday season around the corner, there are going to be a lot of kids with new Virtual Reality (VR) headsets. One of the most common uses of VR is gaming because it gives players an incredibly immersive experience. VR can be a fantastic medium for education, letting adults and children alike feel immersed in the subjects they’re exploring, whether that’s a historic city or human anatomy.</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">If you are a parent, a teacher, or a guardian, you may be confused about whether VR is safe for children. There are several ways for you to enable safe exploration of VR technology, with a key understanding in mind: It is your responsibility to guide your kids to facilitate safe, responsible, and healthy relationships with VR. With an objective to help facilitate safe exploration of VR for kids, XRSI has put together Top 7 Safety Tips for parents.</span></p><span data-dcnode-id="332" instrument_node="">
</span><a class="more-link" data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//xrsi.org/publication/vr-safety-tips-for-parents-top-7-xrsi-recommendations%23more-1114"><span aria-label="Continue reading VR Safety Tips for Parents: Top 7 XRSI Recommendations" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">(more…)</span></span></a></div><span data-dcnode-id="327" instrument_node="">

</span><p data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">The framework is a free, globally accessible baseline rulebook built by bringing together a diverse set of experts from various backgrounds and domains, including privacy and cybersecurity, cloud computing, immersive technologies, artificial intelligence, legal, artists, product design, engineering, and many more.&nbsp;</span></p><span data-dcnode-id="256" instrument_node="">

</span><h4 class="publication__title" data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">The promise of immersive healthcare</span></h4><span data-dcnode-id="209" instrument_node="">
</span><div class="publication__meta" data-dcnode-id="204"><span data-dcnode-id="208" instrument_node="">
</span><span class="badge badge-light" data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">RESEARCH</span></span><span data-dcnode-id="205" instrument_node="">
</span></div><span data-dcnode-id="203" instrument_node="">
</span><div class="publication__abstract" data-dcnode-id="176"><span data-dcnode-id="202" instrument_node="">
</span><h5 data-dcnode-id="200" id="how-the-uk-can-reap-the-benefits-of-the-latest-healthcare-innovations-that-use-immersive-technology"><span data-dcnode-id="201" instrument_node="">How the UK can reap the benefits of the latest healthcare innovations that use immersive technology.</span></h5><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Immersive technology has provided new and enhanced healthcare solutions and treatments over recent decades. As the technology matures, there are great expectations of its potential to further promote the advancement of medicine through a wide range of new and enhanced devices and treatments.</span></p><span data-dcnode-id="196" instrument_node="">
</span><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">With that said, innovators and researchers at the cutting edge of this novel field face structural, financial, and regulatory challenges as they seek to achieve medical benefits. The conference concluded that action is needed to address these issues and release the potential of virtual reality (VR) and augmented reality (AR) to help provide enhanced healthcare services. Participants proposed a range of measures that would help to address problems in the field, which form the basis for the recommendations of this report.</span></p><span data-dcnode-id="193" instrument_node="">
</span><p data-dcnode-id="184"><span data-dcnode-id="192" instrument_node="">This Institution of Engineering and Technology (The IET) insight, introduces immersive healthcare technology in the UK and has been written for all those academic, industry and policy stakeholders that are interested in the subject of immersive healthcare.</span><br data-dcnode-id="191"><span data-dcnode-id="190" instrument_node="">Immersive healthcare continues to advance but there are still many challenges and concerns that need to be addressed.</span><br data-dcnode-id="189"><span data-dcnode-id="188" instrument_node="">This IET document seeks to provide insight into key issues, views and recommendations given at the </span><em data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Think Big: Future Health and Life Sciences Unconference</span></em><span data-dcnode-id="185" instrument_node="">, jointly hosted by the IET, Immerse UK and Hatsumi VR in November 2019. It contains a summary of key recommendations from participants, data and ethical challenges and case studies.</span></p><span data-dcnode-id="183" instrument_node="">
</span><p data-dcnode-id="178"><span data-dcnode-id="182" instrument_node="">The author of the report is Liz Heron. This document was reviewed by the members of the IET’s Healthcare Sector and immersive healthcare technology participants in the </span><em data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">Think Big: Future Health and Life Science Unconference</span></em><span data-dcnode-id="179" instrument_node="">: Andreea Ion Cojocaru (Numena), Charles Lowe (Digital Health and Care Alliance), Chris Lowthorpe (InGame), David Calder (KTN), Fiona Kilkelly (Immerse UK), Gabriela Juarez Martinez (KTN), Georgie Weston (Aquarius Population Health), Glenn Hapgood (ReScape), Ivan Phelan (Sheffield Hallam University), Jessica LaCombe (Tiny Victories), Kate Parkinson (Also Known As), Kavya Pearlman (XR Safety Initiative), Neil Mortimer (WMAHSN), Niki Smit (Deep/Monobanda), Nury Moreira (IET), Rebecca Farmer (Severn Hospice), Ria Carline (Greener Games), Rosie Collins (The Fred Company), Ross O’Brien (Central &amp; North West London NHS Foundation Trust), Sarah Ticho (Hatsumi), Tony Langford (Mindfulness Centre of Excellence)</span></p><span data-dcnode-id="177" instrument_node="">
</span></div><span data-dcnode-id="175" instrument_node="">
