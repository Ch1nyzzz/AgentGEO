</span></header><section class="article-body" data-dcnode-id="845" id="article-body" itemprop="articleBody"><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">In one context or another, you have probably run across the term "LiDAR" in one of its many forms. Specifically, many newer generations of mobile phones are touting their LiDAR capability.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Whether you're deciding if LiDAR technology should factor into your next smartphone purchase or just want to be a part of the conversation, it's worth taking the time to understand this upcoming technology.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><span data-dcnode-id="1269" instrument_node="">
</span><span data-dcnode-id="1267" instrument_node="">
</span><h2 data-dcnode-id="1265" id="what-is-lidar"><span data-dcnode-id="1266" instrument_node=""> What Is LiDAR?</span></h2><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1263" instrument_node="">Depending on the source that you are looking at, you might see "LiDAR" expressed with any combination of uppercase and lower case letters, ranging from all caps to no caps. However it is capitalized, and it stands for "</span><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oceanservice.noaa.gov/facts/lidar.html%23%3A~%3Atext%3DLidar%252C%2520which%2520stands%2520for%2520Light%2Cvariable%2520distances%29%2520to%2520the%2520Earth." rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1262" instrument_node="">light detection and ranging</span></a><span data-dcnode-id="1260" instrument_node="">."</span></p><span data-dcnode-id="1258" instrument_node="">
</span><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1255" instrument_node="">Light detection and ranging is a method that&nbsp;uses pulsed light to detect differences in distance between the </span><a data-dcnode-id="1253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.makeuseof.com/tof-and-lidar-difference/"><span data-dcnode-id="1254" instrument_node="">LiDAR sensor</span></a><span data-dcnode-id="1252" instrument_node=""> and the nearest objects or planes. A LiDAR sensor consists of a LiDAR laser, a LiDAR scanner, and a GPS unit. For aerial LiDAR, an additional device factors in the angle and speed of the craft.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">The laser sends a burst of light, which bounces off of an object. The reflected light is then collected by the scanner. This information is then contextualized with readings from the GPS unit, which is recording the position of the LiDAR detector itself.</span></p><span data-dcnode-id="1247" instrument_node="">
</span><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">The basic math takes the time that it takes for the signal to get from the laser back to the LiDAR scanner, multiplied by the speed of light. This number is then divided by two because the light had to go from the scanner to the object and back, so the total distance that it has traveled is twice the actual distance from the scanner to the object or plane.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><span data-dcnode-id="1239" instrument_node="">
</span><div class="ad-odd" data-dcnode-id="1237"></div><span data-dcnode-id="1236" instrument_node="">
</span><h2 data-dcnode-id="1234" id="what-is-lidar-used-for"><span data-dcnode-id="1235" instrument_node=""> What Is LiDAR Used for?</span></h2><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Depending on the application, a single data point from this equation may be used, or entire sets of data points can be used together in "point clouds." These sets of data points can be used to create maps or 3D images of objects.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><h3 data-dcnode-id="1228" id="mobile-lidar-applications"><span data-dcnode-id="1229" instrument_node="">Mobile LiDAR Applications</span></h3><span data-dcnode-id="1227" instrument_node="">
</span><div class="body-img landscape" data-dcnode-id="1199"><span data-dcnode-id="1226" instrument_node="">

</span><span data-dcnode-id="1221" instrument_node="">
</span><source data-dcnode-id="1220" data-srcset="https://static1.makeuseofimages.com/wordpress/wp-content/uploads/2020/10/iphone-12-camera-pro-max.jpg?q=50&amp;fit=crop&amp;w=1500&amp;dpr=1.5" media="(min-width: 1024px)" sizes="1500px" srcset="https://static1.makeuseofimages.com/wordpress/wp-content/uploads/2020/10/iphone-12-camera-pro-max.jpg?q=50&amp;fit=crop&amp;w=1500&amp;dpr=1.5"><span data-dcnode-id="1219" instrument_node="">

</span></div><span data-dcnode-id="1200" instrument_node="">
</span></div><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1197" instrument_node="">Some of the most basic LiDAR applications can require a single data point from the location above. For example, the </span><a data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//support.apple.com/en-us/HT208924" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1196" instrument_node="">Measure app on LiDAR-Enabled Apple devices</span></a><span data-dcnode-id="1194" instrument_node=""> can use a single LiDAR data reading to determine distance. It can also use more readings on entire objects and people to do things like determine a person's height.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">LiDAR data can also be used to create digital replicas of physical objects or to make digital models more believable in augmented reality applications. Using readings to sense depth in a user's surroundings and placing digital models accordingly is a major selling point for Apple in their ARKit-enabled devices.</span></p><span data-dcnode-id="1187" instrument_node="">
</span><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">It's true that AR applications do already exist for non-LiDAR-enabled devices. However, the AR element is usually simply placed in front of the user's camera. Moving these elements closer to or farther away from the screen can be difficult and if anything moves in between the camera and where the element is supposed to be, it ruins the illusion.</span></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">The ability to place an AR element behind physical objects, or to allow physical objects to appear to pass between the camera and where the AR element is supposed to appear to be is called "object occlusion." Without a reliable way for the mobile device to understand depth, object occlusion is impossible to achieve.</span></p><span data-dcnode-id="1178" instrument_node="">
</span><span data-dcnode-id="1175" instrument_node="">
</span><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Some of the primary uses for occlusion include more interactive AR try-ons, more amusing Instagram filters, and more immersive AR games. Of course, those are just LiDAR applications that you can do on a smartphone. Most LiDAR applications are a bit bigger.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><h3 data-dcnode-id="1168" id="large-scale-lidar-applications"><span data-dcnode-id="1169" instrument_node="">Large-Scale LiDAR Applications</span></h3><span data-dcnode-id="1167" instrument_node="">
</span><div class="body-img landscape" data-dcnode-id="1137"><span data-dcnode-id="1166" instrument_node="">
</span><div class="responsive-img expandable img-article-item" data-dcnode-id="1139" data-img-caption="&quot;Image Credit: North Dakota \/ <a href=\&quot;https:\/\/www.flickr.com\/photos\/nddot\/43526563660\/\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;>flickr<\/a>&quot;" data-img-url="https://static1.makeuseofimages.com/wordpress/wp-content/uploads/2020/11/Drone-equipped-with-LiDAR.jpg" data-modal-container-id="single-image-modal-container" data-modal-id="single-image-modal" style="padding-bottom: 66.75%; cursor: pointer;"><span data-dcnode-id="1165" instrument_node="">

</span><span data-dcnode-id="1161" instrument_node="">

</span></picture><span data-dcnode-id="1147" instrument_node="">
</span><figcaption class="body-img-caption" data-dcnode-id="1143"><span data-dcnode-id="1146" instrument_node="">Image Credit: North Dakota / </span><a data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/nddot/43526563660/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1145" instrument_node="">flickr</span></a></figcaption><span data-dcnode-id="1142" instrument_node="">
</span></figure><span data-dcnode-id="1140" instrument_node="">
</span></div><span data-dcnode-id="1138" instrument_node="">
</span></div><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">LiDAR data can also be collected by helicopters, airplanes, and even satellites. Organizations like NOAA use this kind of information to create detailed and highly accurate topographical maps. These maps can be used in biology, earth and weather science, construction, and disaster assistance.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Further, LiDAR doesn't just detect how far away an object is. Because light can travel through objects of different densities, LiDAR can be used to better understand the composition of objects and terrain.</span></p><span data-dcnode-id="1130" instrument_node="">
</span><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1126" instrument_node="">Sometimes, LiDAR can even allow us to see objects that we wouldn't otherwise be able to. NOAA and groups like the </span><a data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.neonscience.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1125" instrument_node="">National Ecological Observatory Network</span></a><span data-dcnode-id="1123" instrument_node=""> use this data to map areas underwater or even under vegetation.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">There is also a huge drive in archaeology to use LiDAR mapping.&nbsp;LiDAR's ability to "see-through" different materials has already led to the discovery of lost historical sites in thick forests or under the waves.</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1111"><span class="related-single" data-dcnode-id="1112"><span data-dcnode-id="1115" instrument_node="">Related: </span><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.makeuseof.com/tag/slam-self-driving-cars/"><span data-dcnode-id="1114" instrument_node="">What Is SLAM? How Self-Driving Cars Know Where They Are</span></a></span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">There are actually two different types of LiDAR. Topographic LiDAR is the more common kind that is used in most of the applications discussed so far. Bathymetric LiDAR works in a similar way but uses green light instead of near-infrared light and it is used specifically for penetrating water.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><div class="ad-even" data-dcnode-id="1105"></div><span data-dcnode-id="1104" instrument_node="">
</span><h2 data-dcnode-id="1102" id="how-anyone-can-use-depth-sensing"><span data-dcnode-id="1103" instrument_node=""> How Anyone Can Use Depth Sensing</span></h2><span data-dcnode-id="1101" instrument_node="">

</span></picture><span data-dcnode-id="1081" instrument_node="">
</span></figure><span data-dcnode-id="1079" instrument_node="">
</span></div><span data-dcnode-id="1077" instrument_node="">
</span></div><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1074" instrument_node="">If you're interested in experimenting with LiDAR yourself, you can. </span><a data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.makeuseof.com/tag/11-inch-ipad-pro-factors/"><span data-dcnode-id="1073" instrument_node="">LiDAR comes equipped on the iPad Pro 12.9-inch </span></a><span data-dcnode-id="1071" instrument_node="">(4th generation and later), the iPad Pro 11-inch (2nd generation and later),</span><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.makeuseof.com/apple-introduces-iphone-12-pro-and-pro-max/"><span data-dcnode-id="1070" instrument_node=""> the iPhone 12 Pro, and the iPhone 12 Pro Max</span></a><span data-dcnode-id="1068" instrument_node="">. There is also a type of LiDAR available on the Samsung Galaxy S20 Ultra.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><span data-dcnode-id="1063" instrument_node="">
</span><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">You can also purchase LiDAR scanners. Single-point models can cost under $100, with more robust models going into the thousands.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1057" instrument_node="">Android users may feel left out at this point. It's true, Android's ARCore has not offered a response to Apple's LiDAR offerings. However,&nbsp;Google </span><a data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//developers.googleblog.com/2020/06/a-new-wave-of-ar-realism-with-arcore-depth-api.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1056" instrument_node="">announced</span></a><span data-dcnode-id="1054" instrument_node=""> a Depth API&nbsp;that uses the camera and other sensors instead of a LiDAR system to offer depth and occlusion.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">While there's room to be skeptical that the Depth API will be as effective as LiDAR, at least in earlier editions, it does make many of the same promises at a lower cost to consumers.&nbsp;The API will be included on phones starting with the Galaxy Note 10+ and Galaxy S20 Ultra.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><div class="ad-odd" data-dcnode-id="1047"></div><span data-dcnode-id="1046" instrument_node="">
</span><h2 data-dcnode-id="1044" id="lidar-in-the-future-of-spatial-tech"><span data-dcnode-id="1045" instrument_node=""> LiDAR in the Future of Spatial Tech</span></h2><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">While LiDAR may seem to have limited use cases now, it may be one of the most important technologies of the coming decades. As spatial technology becomes increasingly common and increasingly robust, the ability to accurately model objects and map spaces becomes increasingly important.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1037" instrument_node="">Just like archaeologists are looking to use LiDAR to discover forgotten cities, groups like </span><a data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.augmented.city/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1036" instrument_node="">Augmented.City</span></a><span data-dcnode-id="1034" instrument_node="">&nbsp;are looking to create digital maps of existing cities that could one-day help to power everything from mixed reality glasses to autonomous vehicles.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><span data-dcnode-id="1029" instrument_node="">
</span><div class="ad-even" data-dcnode-id="1027"></div><span data-dcnode-id="1026" instrument_node="">
</span><h2 data-dcnode-id="1024" id="do-you-have-a-use-for-lidar-in-your-life"><span data-dcnode-id="1025" instrument_node=""> Do You Have a Use for LiDAR in Your Life?</span></h2><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">LiDAR can look crazy and sound crazier. Because it's just now coming into the consumer space, it's natural for it to be talked about in unfamiliar ways. However, the technology has actually been around for quite a while.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">While the applications of LiDAR technology can be quite varied, at its heart all that it does is determine the distance from a device to an object. Most users will probably just use it in social media filters. But it doesn't hurt to understand it.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1016" instrument_node="">Image Credit: </span><a data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apple.com/uk/iphone-12-pro/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1015" instrument_node="">Apple</span></a></p><span data-dcnode-id="1012" instrument_node="">
