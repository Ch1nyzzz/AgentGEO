</span><a class="mntl-toc__list-item-link mntl-text-link mntl-toc__list-item-link js-mntl-toc-link" data-dcnode-id="1419" data-tracking-container="true" href="#toc-dts-replaces-neox-with-dtsx" id="mntl-toc__list-item-link_1-0-3"><span class="link__wrapper" data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">DTS Replaces Neo:X With DTS:X</span></span></a><span data-dcnode-id="1417" instrument_node="">
</span></div><span data-dcnode-id="1414" instrument_node="">
</span></li><span data-dcnode-id="1411" instrument_node="">
</span></ul><span data-dcnode-id="1408" instrument_node="">
</span></div><span data-dcnode-id="1405" instrument_node="">
</span></div><span data-dcnode-id="1402" instrument_node="">

</span></div><span data-dcnode-id="1396" instrument_node="">
</span></div><span data-dcnode-id="1394" instrument_node="">
</span><div class="loc article-content" data-dcnode-id="1007"><span data-dcnode-id="1393" instrument_node="">
</span><div class="comp article-content mntl-block" data-dcnode-id="1010" id="article-content_1-0"><span data-dcnode-id="1392" instrument_node="">
</span><div class="comp structured-content expert-content mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="1155" data-sc-ad-label-height="24" data-sc-ad-track-spacing="100" data-sc-breakpoint="50em" data-sc-content-positions="[1, 1050, 1250, 1550, 1950, 2350, 2750, 3150, 3550]" data-sc-load-immediate="4" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="90" id="mntl-sc-page_1-0"><span data-dcnode-id="1391" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1383" id="mntl-sc-block_1-0"><span data-dcnode-id="1390" instrument_node="">
DTS Neo:X is an 11.1 channel surround sound format. It is similar to the </span><a data-component="link" data-dcnode-id="1388" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/dolby-pro-logic-iiz-1846771" rel="noopener noreferrer"><span data-dcnode-id="1389" instrument_node="">Dolby ProLogic IIz</span></a><span data-dcnode-id="1387" instrument_node=""> and </span><a data-component="link" data-dcnode-id="1385" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/audyssey-dsx-surround-sound-format-1846862" rel="noopener noreferrer"><span data-dcnode-id="1386" instrument_node="">Audyssey DSX</span></a><span data-dcnode-id="1384" instrument_node=""> surround sound processing formats, which provide both height and wide channel enhancement.
</span></p><span data-dcnode-id="1381" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1380" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="1378" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1377" id="toc-how-dts-neox-works"></span><span data-dcnode-id="1376" instrument_node=""> </span><h2 class="comp mntl-sc-block tech-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1371" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1375" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node=""> How DTS Neo:X Works </span></span><span data-dcnode-id="1372" instrument_node=""> </span></h2><span data-dcnode-id="1369" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1367" id="mntl-sc-block_1-0-3"><span data-dcnode-id="1368" instrument_node="">
Like the ProLogic IIz and Audyssey DSX, DTS Neo:X does not require studios to mix soundtracks specifically for the 11.1 channel sound field. Still, DTS Neo:X has the ability, and doing so delivers a more accurate result.
</span></p><span data-dcnode-id="1365" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1364" id="mntl-sc-block_1-0-4"></div><span data-dcnode-id="1362" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1357" id="mntl-sc-block_1-0-5"><span data-dcnode-id="1361" instrument_node="">
However, without optimizing the mixing end, DTS Neo:X looks for cues already present in stereo, </span><a data-component="link" data-dcnode-id="1359" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/5-1-vs-7-1-home-theater-receivers-1846774"><span data-dcnode-id="1360" instrument_node="">5.1, or 7.1 channel</span></a><span data-dcnode-id="1358" instrument_node=""> soundtracks. It places those cues within the front height and wide channels that are distributed to additional front height and rear height speakers, enabling a more enveloping 3D listening environment.
</span></p><span data-dcnode-id="1355" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1354" id="mntl-sc-block_1-0-6"></div><span data-dcnode-id="1352" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1351" id="toc-dts-neox-channel-and-speaker-configurations"></span><span data-dcnode-id="1350" instrument_node=""> </span><h2 class="comp mntl-sc-block tech-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1345" id="mntl-sc-block_1-0-7"><span data-dcnode-id="1349" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node=""> DTS Neo:X Channel and Speaker Configurations </span></span><span data-dcnode-id="1346" instrument_node=""> </span></h2><span data-dcnode-id="1343" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1338" id="mntl-sc-block_1-0-8"><span data-dcnode-id="1342" instrument_node="">
To experience the maximum benefit of DTS Neo:X processing, you should have a </span><a data-component="link" data-dcnode-id="1340" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/best-home-theater-receivers-400-1300-1846332"><span data-dcnode-id="1341" instrument_node="">home theater receiver</span></a><span data-dcnode-id="1339" instrument_node=""> that provides an 11 speaker layout configuration. That means it supports 11 channels of amplification and a subwoofer.
</span></p><span data-dcnode-id="1336" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1327" id="mntl-sc-block_1-0-9"><div class="comp mntl-native" data-dcnode-id="1328" data-right-rail-index="2" id="mntl-native_2-0" style="--native-ad-height: auto"><span data-dcnode-id="1335" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad" data-dcnode-id="1331" id="mntl-native__adunit_2-0"><span data-dcnode-id="1334" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1333" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="1332" instrument_node="">
</span></div><span data-dcnode-id="1329" instrument_node="">
</span></div></div><span data-dcnode-id="1325" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1323" id="mntl-sc-block_1-0-10"><span data-dcnode-id="1324" instrument_node="">
In a full 11.1 channel DTS Neo:X setup, the speaker arrangement is as follows:
</span></p><span data-dcnode-id="1321" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1320" id="mntl-sc-block_1-0-11"></div><span data-dcnode-id="1318" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1291" id="mntl-sc-block_1-0-12"><span data-dcnode-id="1317" instrument_node="">
</span><li data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Front left</span></li><li data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Front left height</span></li><li data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Front center</span></li><li data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Front right</span></li><li data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Front right height</span></li><li data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Wide left</span></li><li data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Wide right</span></li><li data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Surround left</span></li><li data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Surround left height</span></li><li data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Surround right</span></li><li data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Surround right height</span></li><li data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Subwoofer (11.2 channel setup uses two subwoofers)</span></li><span data-dcnode-id="1292" instrument_node="">
</span></ul><span data-dcnode-id="1289" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1288" id="mntl-sc-block_1-0-13"></div><span data-dcnode-id="1286" instrument_node="">
</span><figure class="comp mntl-sc-block-image--no-theme mntl-sc-block-image mntl-sc-block tech-sc-block-image mntl-sc-block-universal-image figure-landscape figure-high-res" data-dcnode-id="1266" id="mntl-sc-block_1-0-14"><span data-dcnode-id="1285" instrument_node="">

</span><img alt="Official DTS Neo:X Logo with 11.1 Channel Speaker Layout Diagram" class="universal-image__image lazyloaded" data-click-tracked="true" data-dcnode-id="1282" data-expand="300" data-img-lightbox="true" data-src="https://www.lifewire.com/thmb/okJEkwBcsG3YT8c2sxGRrow8iaQ=/650x0/filters:no_upscale():max_bytes(150000):strip_icc()/dts-Neo-x-logo-11-1-57a39b515f9b58974a5813ae.jpg" data-tracking-container="true" height="573" id="mntl-sc-block-image_1-0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/thmb/okJEkwBcsG3YT8c2sxGRrow8iaQ%3D/650x0/filters%3Ano_upscale%28%29%3Amax_bytes%28150000%29%3Astrip_icc%28%29/dts-Neo-x-logo-11-1-57a39b515f9b58974a5813ae.jpg&amp;raw" width="875"><span data-dcnode-id="1281" instrument_node="">

</span></div><span data-dcnode-id="1274" instrument_node="">
</span><figcaption class="comp mntl-figure-caption figure-article-caption" data-dcnode-id="1269" id="mntl-figure-caption_1-0"><span data-dcnode-id="1273" instrument_node="">
</span><span class="figure-article-caption-owner" data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">DTS</span></span><span data-dcnode-id="1270" instrument_node="">
</span></figcaption><span data-dcnode-id="1267" instrument_node="">
</span></figure><span data-dcnode-id="1264" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1262" id="mntl-sc-block_1-0-15"><span data-dcnode-id="1263" instrument_node="">
An alternate speaker setup would remove the surround left and right height speakers and instead incorporate additional left and right speakers between the left and right front and left and right wide speakers.
</span></p><span data-dcnode-id="1260" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1259" id="mntl-sc-block_1-0-16"></div><span data-dcnode-id="1257" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1255" id="mntl-sc-block_1-0-17"><span data-dcnode-id="1256" instrument_node="">
This speaker layout variation expands the surround sound field, filling the gaps between the surround and front speakers. It also adds a larger front soundstage with height channels placed above the front left and right front speakers and additional sound coming from the rear via back surround height speakers. The sound from these speakers also projects toward the listening position, giving the sensation of sounds coming from overhead.
</span></p><span data-dcnode-id="1253" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1252" id="mntl-sc-block_1-0-18"></div><span data-dcnode-id="1250" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1248" id="mntl-sc-block_1-0-19"><span data-dcnode-id="1249" instrument_node="">
That's a lot of speakers. Although it is desirable to have a DTS Neo:X-enabled home theater receiver that supports 11 channels of built-in amplification, you can also incorporate it into a home theater receiver that has nine channels of built-in amplification with preamp outputs for connection to external amplifiers that add the needed extra 10th and 11th channels.
</span></p><span data-dcnode-id="1246" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1245" id="mntl-sc-block_1-0-20"></div><span data-dcnode-id="1243" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1241" id="mntl-sc-block_1-0-21"><span data-dcnode-id="1242" instrument_node="">
DTS Neo:X can also scale to work within&nbsp;a 9.1 or&nbsp;7.1 channel environment, and some home theater receivers incorporate the 7.1 or 9.1 channel options. In these setups, the extra channels are folded with the existing 9.1 or 7.1 channel layout. It may not be as effective as the desired 11.1 channel setup. Still, it provides an expanded surround sound experience over the typical 5.1, 7.1, or 9.1 channel layout.
</span></p><span data-dcnode-id="1239" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1238" id="mntl-sc-block_1-0-22"></div><span data-dcnode-id="1236" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1235" id="toc-additional-control-included-with-dts-neox"></span><span data-dcnode-id="1234" instrument_node=""> </span><h2 class="comp mntl-sc-block tech-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1229" id="mntl-sc-block_1-0-23"><span data-dcnode-id="1233" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node=""> Additional Control Included With DTS Neo:X </span></span><span data-dcnode-id="1230" instrument_node=""> </span></h2><span data-dcnode-id="1227" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1225" id="mntl-sc-block_1-0-24"><span data-dcnode-id="1226" instrument_node="">
For additional surround control, DTS Neo:X supports three listening modes:
</span></p><span data-dcnode-id="1223" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1222" id="mntl-sc-block_1-0-25"></div><span data-dcnode-id="1220" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1205" id="mntl-sc-block_1-0-26"><span data-dcnode-id="1219" instrument_node="">
</span><li data-dcnode-id="1215"><strong data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Cinema</span></strong><span data-dcnode-id="1216" instrument_node="">: Provides extra emphasis to the center channel to avoid losing dialog in the surround sound environment.</span></li><li data-dcnode-id="1211"><strong data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Music</span></strong><span data-dcnode-id="1212" instrument_node="">: Provides stability to the center channel while providing channel separation of the rest of the elements in the soundtrack.</span></li><li data-dcnode-id="1207"><strong data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Game</span></strong><span data-dcnode-id="1208" instrument_node="">: Provides more detailed sound placement and directionality, especially in the wide and height channels, to provide a fully immersive surround sound experience.</span></li><span data-dcnode-id="1206" instrument_node="">
</span></ul><span data-dcnode-id="1203" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1202" id="mntl-sc-block_1-0-27"></div><span data-dcnode-id="1200" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1199" id="toc-dts-replaces-neox-with-dtsx"></span><span data-dcnode-id="1198" instrument_node=""> </span><h2 class="comp mntl-sc-block tech-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1193" id="mntl-sc-block_1-0-28"><span data-dcnode-id="1197" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node=""> DTS Replaces Neo:X With DTS:X </span></span><span data-dcnode-id="1194" instrument_node=""> </span></h2><span data-dcnode-id="1191" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1186" id="mntl-sc-block_1-0-29"><span data-dcnode-id="1190" instrument_node="">
DTS Neo:X is not to be confused with DTS:X, which is an object-based surround sound encoding format introduced in 2015. It includes overhead sound immersion and is a standard surround sound option on most mid-range and </span><a data-component="link" data-dcnode-id="1188" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/best-home-theater-receivers-1300-and-up-1846334"><span data-dcnode-id="1189" instrument_node="">high-end home theater receivers</span></a><span data-dcnode-id="1187" instrument_node="">. DTS:X can be considered an evolved version of Neo:X.
</span></p><span data-dcnode-id="1184" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1183" id="mntl-sc-block_1-0-30"></div><span data-dcnode-id="1181" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1179" id="mntl-sc-block_1-0-31"><span data-dcnode-id="1180" instrument_node="">
For some home theater receivers, the addition of DTS:X has eliminated the need for DTS Neo:X on future units. You most likely won't see both Neo:X and DTS:X included on the same receiver.
</span></p><span data-dcnode-id="1177" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1176" id="mntl-sc-block_1-0-32"></div><span data-dcnode-id="1174" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1172" id="mntl-sc-block_1-0-33"><span data-dcnode-id="1173" instrument_node="">
Some previous home theater receivers equipped with DTS Neo:X accept a DTS:X firmware update. In these cases, once the DTS:X firmware update is installed, the DTS Neo:X feature is overridden and no longer accessible.
</span></p><span data-dcnode-id="1170" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1169" id="mntl-sc-block_1-0-34"></div><span data-dcnode-id="1167" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1165" id="mntl-sc-block_1-0-35"><span data-dcnode-id="1166" instrument_node="">
If you have a receiver with Neo:X, a firmware update may be provided automatically. If you aren't sure, check with customer or tech support for your specific brand and model to see if it is available.
</span></p><span data-dcnode-id="1163" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1162" id="mntl-sc-block_1-0-36"></div><span data-dcnode-id="1160" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1158" id="mntl-sc-block_1-0-37"><span data-dcnode-id="1159" instrument_node="">
If you own a home theater receiver that offers DTS Neo:X, and it is not upgradable to DTS:X, it will still work as designed. If you switch to a new home theater receiver, you will be provided with DTS:X and the DTS Neural Upmixer. DTS:X requires specifically encoded content, but the Neural Upmixer works in a similar fashion as DTS Neo:X because it creates a similar immersive effect by extracting height and wide cues with existing 2, 5.1, or 7.1 channel content.
</span></p><span data-dcnode-id="1156" instrument_node="">
</span></div><span data-dcnode-id="1153" instrument_node="">
