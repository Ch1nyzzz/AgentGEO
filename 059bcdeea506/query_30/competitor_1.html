</span><p data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Immersive Learning and VR have taken the L&amp;D and HR world by storm. Even with the significant changes to how our world works, Immersive Learning remains a cornerstone of corporate learning today and a foundation for where things are headed. Founded in behavioral and cognitive science, Immersive Learning with VR provides a memorable tool that accelerates employees’ proficiency in their roles through an immersive training environment.</span></p><span data-dcnode-id="2250" instrument_node="">
</span><p data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">With such impact, it’s important to understand what this emerging category of training is and why it works so well in an enterprise environment.</span></p><span data-dcnode-id="2247" instrument_node="">
</span><h2 data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">What is Immersive Learning?</span></h2><span data-dcnode-id="2244" instrument_node="">
</span><p data-dcnode-id="2237"><a data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/immersive-learning-guide/"><span data-dcnode-id="2243" instrument_node="">Immersive Learning</span></a><span data-dcnode-id="2241" instrument_node=""> is an experiential training methodology that uses </span><a data-dcnode-id="2239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/resources/webinars/vr-science-bailenson/"><span data-dcnode-id="2240" instrument_node="">Virtual Reality</span></a><span data-dcnode-id="2238" instrument_node=""> (VR) to simulate real-world scenarios and train employees in a safe and engaging immersive training environment. It combines the sense of presence of VR with advanced learning theory, data science, and spatial design to improve effectiveness and user engagement.&nbsp;</span></p><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2231"><span data-dcnode-id="2235" instrument_node="">The approach is based on decades of </span><a data-dcnode-id="2233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/news/voices-of-vr-podcast-neuroscience-vr-strivr-is-leading-the-vr-training-revolution-from-elite-nfl-athletes-to-walmart-employees/"><span data-dcnode-id="2234" instrument_node="">neuroscience</span></a><span data-dcnode-id="2232" instrument_node=""> research, which indicated that the brain treats VR experiences just like it would treat real life. In other words, performance in a virtual work environment is a close indicator of performance in a real work environment.&nbsp;</span></p><span data-dcnode-id="2230" instrument_node="">
</span><div class="bg-white py-8 alignfull" data-dcnode-id="2188"><span data-dcnode-id="2229" instrument_node="">

</span><figcaption data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Jeremy Bailenson, founder of Stanford’s VR lab, on the science behind VR’s impact on training.</span></figcaption><span data-dcnode-id="2206" instrument_node="">
</span></figure><span data-dcnode-id="2204" instrument_node="">

</span><div aria-labelledby="modal-1-title" aria-modal="true" class="modal__container fixed rounded-sm shadow-lg flex items-center justify-center text-2xl relative w-3/4 height-0 overflow-hidden c-video-embed" data-dcnode-id="2196" role="dialog"><span data-dcnode-id="2199" instrument_node="">
</span><iframe allow="autoplay" allowfullscreen="" class="left-0 top-0 w-full h-full absolute" data-dcnode-id="2198" data-video="https://www.youtube.com/embed/G6wvqnrtYnw" frameborder="0" id="iframe-block_5ebee1ab3d618" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/blog/defining-immersive-learning&amp;raw"></iframe><span data-dcnode-id="2197" instrument_node="">
</span></div><span data-dcnode-id="2195" instrument_node="">
</span></div><span data-dcnode-id="2193" instrument_node="">
</span></div><span data-dcnode-id="2191" instrument_node="">
</span></div><span data-dcnode-id="2189" instrument_node="">
</span></div><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">By using Immersive Learning with VR to immerse employees into “real” work situations, Immersive Learning capitalizes on proven best practices for behavioral learning. This helps improve learner engagement, preparedness, knowledge retention, and confidence.&nbsp;</span></p><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2179"><span data-dcnode-id="2183" instrument_node="">When delivered via a cloud-based </span><a data-dcnode-id="2181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/solutions/"><span data-dcnode-id="2182" instrument_node="">platform</span></a><span data-dcnode-id="2180" instrument_node="">, companies are realizing these benefits at scale.</span></p><span data-dcnode-id="2178" instrument_node="">
</span><p class="c-block-cta" data-dcnode-id="2173"><span data-dcnode-id="2177" instrument_node="">
</span><a data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/use-cases/assessment/"><span data-dcnode-id="2176" instrument_node="">Which VR training modules should you start with?</span></a><span data-dcnode-id="2174" instrument_node="">
</span></p><span data-dcnode-id="2172" instrument_node="">
</span><h2 data-dcnode-id="2169"><strong data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Building an immersive training environment</span></strong></h2><span data-dcnode-id="2168" instrument_node="">
</span><p data-dcnode-id="2160"><span data-dcnode-id="2167" instrument_node="">As mentioned, what makes VR-powered Immersive Learning successful is </span><a data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learningsolutionsmag.com/articles/2389/dont-break-the-spell-creating-presence-in-virtual-reality"><span data-dcnode-id="2166" instrument_node="">the element of “presence,”</span></a><span data-dcnode-id="2164" instrument_node=""> or the feeling that one is really “there” in the virtual environment. Creating a truly immersive training environment that can be delivered virtually </span><a data-dcnode-id="2162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/blog/build-learning-environment-vr-training-content/"><span data-dcnode-id="2163" instrument_node="">requires a synthesis of expertise</span></a><span data-dcnode-id="2161" instrument_node=""> from a vast range of fields, including:</span></p><span data-dcnode-id="2159" instrument_node="">
</span><ul data-dcnode-id="2148"><li data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Instructional design</span></li><li data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">UX design</span></li><li data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Data science</span></li><li data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Filmmaking</span></li><li data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Sound design</span></li></ul><span data-dcnode-id="2147" instrument_node="">
</span><h2 data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">The four pillars of Immersive Learning</span></h2><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2138"><span data-dcnode-id="2143" instrument_node="">Immersive Learning in VR is </span><strong data-dcnode-id="2140"><em data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">not</span></em></strong><span data-dcnode-id="2139" instrument_node=""> just content inside a headset. It is the combination of the four components that creates engaging, impactful, and measurable training experiences.</span></p><span data-dcnode-id="2137" instrument_node="">
</span><h3 data-dcnode-id="2134"><strong data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Virtual Reality immerses learners</span></strong></h3><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2128"><span data-dcnode-id="2132" instrument_node="">Magic happens inside the headset. </span><a data-dcnode-id="2130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/resources/science/"><span data-dcnode-id="2131" instrument_node="">VR</span></a><span data-dcnode-id="2129" instrument_node=""> takes your brain to another place through complete immersion, which makes it an amazing tool for learning.&nbsp; When you put on the VR headset, you can look all around you and see and hear a virtual world nearly identical to real life. Mentally and emotionally, you feel like you are in that situation.</span></p><span data-dcnode-id="2127" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2123"><img alt="" class="wp-image-4424 entered error" data-dcnode-id="2126" data-lazy-sizes="(max-width: 1200px) 100vw, 1200px" data-lazy-src="https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-1200x601.png" data-lazy-srcset="https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-1200x601.png 1200w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-373x187.png 373w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-233x117.png 233w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-800x401.png 800w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices.png 1202w" data-ll-status="error" height="601" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-1200x601.png&amp;raw" srcset="https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-1200x601.png 1200w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-373x187.png 373w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-233x117.png 233w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-800x401.png 800w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices.png 1202w" width="1200"><noscript data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">&lt;img width="1200" height="601" src="https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-1200x601.png" alt="" class="wp-image-4424" srcset="https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-1200x601.png 1200w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-373x187.png 373w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-233x117.png 233w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices-800x401.png 800w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/04/vr-headset-clean-best-practices.png 1202w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></figure><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2121" instrument_node="">Thanks to this complete immersion, you can be “on the job” before you’re ever on the job. You can experience typical day-to-day job occurrences like the checkout counter, or more rare scenarios like a difficult conversation. Using Immersive Learning in VR, employees can practice and hone both operational and </span><a data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www2.deloitte.com/us/en/insights/topics/emerging-technologies/immersive-technologies-soft-skill-training.html%3Fid%3Dus%3A2em%3A3pa%3Atalent%3Aeng%3Adi%3A051120"><span data-dcnode-id="2120" instrument_node="">soft skills</span></a><span data-dcnode-id="2118" instrument_node="">.</span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2102"><span data-dcnode-id="2115" instrument_node="">Today, there are two forms of enterprise VR content – 360-degree video and Computer-Generated Images (CGI). With 360-degree video, you can replicate actual environments because you film on-location. Nonetheless, both video and CGI are valuable for teaching situational awareness, </span><a data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/use-cases/operational-efficiency/"><span data-dcnode-id="2114" instrument_node="">operational procedures</span></a><span data-dcnode-id="2112" instrument_node="">, </span><a data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/use-cases/health-and-safety/"><span data-dcnode-id="2111" instrument_node="">safety</span></a><span data-dcnode-id="2109" instrument_node="">, </span><a data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/use-cases/customer-service/"><span data-dcnode-id="2108" instrument_node="">customer service</span></a><span data-dcnode-id="2106" instrument_node="">, and </span><a data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/use-cases/soft-skills/"><span data-dcnode-id="2105" instrument_node="">soft skills</span></a><span data-dcnode-id="2103" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">There are several scientific principles that VR is able to maximize unlike any other form of training, including 1:1 or on-the-job training.</span></p><span data-dcnode-id="2098" instrument_node="">
</span><ul class="is-style-default" data-dcnode-id="2087"><li data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Embodiment: VR creates a full-body experience that increases learner engagement.</span></li><li data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Perceptual fidelity: Virtual interactions mimic the physical world to activate the same neural pathways in the brain.</span></li><li data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">On-demand repetition: Learners can train as many times as needed for sufficient learning and proficiency on the job.</span></li><li data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Real-time feedback: In VR, learners make decisions just like they would in the real world, and those decisions have a direct impact on the experience.</span></li><li data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">Emotional fidelity: VR invokes a sense of presence that creates realistic emotional responses.</span></li></ul><span data-dcnode-id="2086" instrument_node="">
</span><h3 data-dcnode-id="2083"><strong data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Advanced learning theory makes the training stick</span></strong></h3><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Immersive Learning capitalizes on centuries of knowledge and research about how people learn. When designed properly, there are nearly a dozen cognitive learning principles that are applied.  </span></p><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2074"><span data-dcnode-id="2078" instrument_node="">One of those principles is the old “learning by doing” philosophy, but in a scalable manner. Experiences are </span><a data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/blog/instructional-design-immersive-learning/"><span data-dcnode-id="2077" instrument_node="">designed for interactivity</span></a><span data-dcnode-id="2075" instrument_node=""> with the virtual environment to help the brain build the right connections for learning and knowledge retention. In addition, learners must apply what they’ve learned, make decisions, and experience the impact of their choices. This makes the learning stick.</span></p><span data-dcnode-id="2073" instrument_node="">
</span><blockquote class="wp-block-quote is-style-default" data-dcnode-id="2068"><p data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">With the advent of Immersive Learning at scale, it’s now possible to incorporate scientific principles into corporate learning and therefore train employees more effectively.</span></p><cite data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">– Dr. Michael Casale, Chief Science Officer, Strivr</span></cite></blockquote><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2066" instrument_node="">Another key learning principle that </span><a data-dcnode-id="2064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/solutions/"><span data-dcnode-id="2065" instrument_node="">Immersive Learning in VR</span></a><span data-dcnode-id="2063" instrument_node=""> can really maximize is a combination of attention and engagement known as arousal. It means that real emotional responses like stress, anxiety, and surprise are induced more authentically to make training memorable and impactful. Learn about how this was successful at </span><a data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/resources/customers/verizon/"><span data-dcnode-id="2062" instrument_node="">Verizon</span></a><span data-dcnode-id="2060" instrument_node=""> and </span><a data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fortune.com/2019/08/20/walmart-ceo-vr-training-helped-save-lives-in-el-paso-shooting/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2059" instrument_node="">Walmart</span></a><span data-dcnode-id="2057" instrument_node="">.</span></p><span data-dcnode-id="2055" instrument_node="">
</span><div class="wp-container-626e676dc7b5d wp-block-group alignfull" data-dcnode-id="2009"><div class="wp-block-group__inner-container" data-dcnode-id="2010"><span data-dcnode-id="2054" instrument_node=""> </span><div class="bg-white py-8 alignfull" data-dcnode-id="2012"><span data-dcnode-id="2053" instrument_node="">

</span><h3 data-dcnode-id="1920"><strong data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Spatial design creates presence and engagement</span></strong></h3><span data-dcnode-id="1919" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1918" instrument_node="">Spatial design is the methodology for building and developing </span><a data-dcnode-id="1916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/blog/build-learning-environment-vr-training-content/"><span data-dcnode-id="1917" instrument_node="">VR training content</span></a><span data-dcnode-id="1915" instrument_node="">. It is a coordinated effort across VR disciplines – filmmaking, user interface design (UI), and user experience (UX).&nbsp;</span></p><span data-dcnode-id="1913" instrument_node="">
</span><p data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">The principles of spatial design create and enhance the feeling of immersion for learners. When instituted properly, learners suspend their disbelief, engage with the virtual world as if it were real, and retain more knowledge.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><figure class="wp-block-image alignfull size-large" data-dcnode-id="1906"><img alt="" class="wp-image-814" data-dcnode-id="1909" data-lazy-sizes="(max-width: 1200px) 100vw, 1200px" data-lazy-src="https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-1200x610.jpg" data-lazy-srcset="https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-1200x610.jpg 1200w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-373x190.jpg 373w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-233x118.jpg 233w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-800x407.jpg 800w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-1536x781.jpg 1536w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-2048x1041.jpg 2048w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-1600x813.jpg 1600w" height="610" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201200%20610'%3E%3C/svg%3E" width="1200"><noscript data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">&lt;img width="1200" height="610" src="https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-1200x610.jpg" alt="" class="wp-image-814" srcset="https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-1200x610.jpg 1200w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-373x190.jpg 373w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-233x118.jpg 233w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-800x407.jpg 800w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-1536x781.jpg 1536w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-2048x1041.jpg 2048w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2019/08/customers-bmw-featured-1600x813.jpg 1600w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></figure><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1901"><a data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.strivr.com/blog/design-principles-for-immersive-learning/"><span data-dcnode-id="1904" instrument_node="">Spatial UI design</span></a><span data-dcnode-id="1902" instrument_node=""> also includes computer-generated learning elements like placards and on-screen timers, which need to seamlessly integrate with the experience.</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">The ultimate goal of spatial design is to create presence because presence leads to engagement, which leads to knowledge retention. There are three kinds of presence to consider:</span></p><span data-dcnode-id="1897" instrument_node="">
</span><ul class="is-style-default" data-dcnode-id="1890"><li data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Spatial presence occurs when learners lose the sense that they are in a VR experience; it becomes real.</span></li><li data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Self presence makes learners believe they have agency within the virtual world – in other words, looking around and interacting because their actions actually have impact.</span></li><li data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Social presence provides learners with people to interact with and learn from in the experience. They act and speak like colleagues or managers that learners will meet on the job.</span></li></ul><span data-dcnode-id="1889" instrument_node="">
</span><div class="wp-block-columns" data-dcnode-id="1866"><span data-dcnode-id="1888" instrument_node="">
</span><div class="wp-block-column is-vertically-aligned-center" data-dcnode-id="1877" style="flex-basis:33.33%"><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1884"><strong data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">3 elements of building learning environments for VR training content</span></strong></p><span data-dcnode-id="1883" instrument_node="">

://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/vr-content-design-233x117.png 233w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/vr-content-design-800x400.png 800w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/vr-content-design-1536x769.png 1536w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/vr-content-design-1600x801.png 1600w, https://15f7kh2st4w71pqb7s2qddg1-wpengine.netdna-ssl.com/wp-content/uploads/2020/02/vr-content-design.png 1694w" sizes="(max-width: 735px) 100vw, 735px" /&gt;</span></noscript></a></figure><span data-dcnode-id="1869" instrument_node="">

</span><h2 data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Immersive Learning combines VR, learning science, data, and design</span></h2><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1861" instrument_node="">Across the HR and learning world, expectations are changing from “more content” to “more strategy” – a dramatic shift enabled by the growing capability to elevate and measure workforce performance through Immersive Learning in VR. Some of the largest companies are already making strategic staffing </span><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/technology/2019/07/12/walmarts-latest-tool-assessing-whether-employees-deserve-promotion-virtual-reality/%3Futm_term%3D.ded93dfe28af" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1860" instrument_node="">decisions</span></a><span data-dcnode-id="1858" instrument_node=""> leveraging immersive data from immersive training environments during hiring, onboarding, ongoing training, and upskilling.&nbsp;</span></p><span data-dcnode-id="1856" instrument_node="">
</span><p data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">With a proper understanding of Immersive Learning, VR, and its four necessary pillars, you can now begin to explore the top use cases and strategy for implementing at scale.&nbsp;</span></p><span data-dcnode-id="1853" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1852" style="height:50px"></div><span data-dcnode-id="1851" instrument_node="">
