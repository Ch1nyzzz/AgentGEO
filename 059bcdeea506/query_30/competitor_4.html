</span><a class="mntl-toc__list-item-link mntl-text-link mntl-toc__list-item-link js-mntl-toc-link" data-dcnode-id="1418" data-tracking-container="true" href="#toc-the-bottom-line" id="mntl-toc__list-item-link_1-0-3"><span class="link__wrapper" data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">The Bottom Line</span></span></a><span data-dcnode-id="1416" instrument_node="">
</span></div><span data-dcnode-id="1413" instrument_node="">
</span></li><span data-dcnode-id="1410" instrument_node="">
</span></ul><span data-dcnode-id="1407" instrument_node="">
</span></div><span data-dcnode-id="1404" instrument_node="">
</span></div><span data-dcnode-id="1401" instrument_node="">
</span></div><span data-dcnode-id="1398" instrument_node="">
</span></div><span data-dcnode-id="1395" instrument_node="">
</span></div><span data-dcnode-id="1393" instrument_node="">
</span><div class="loc article-content" data-dcnode-id="1007"><span data-dcnode-id="1392" instrument_node="">
</span><div class="comp article-content mntl-block" data-dcnode-id="1010" id="article-content_1-0"><span data-dcnode-id="1391" instrument_node="">
</span><div class="comp structured-content expert-content mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="1158" data-sc-ad-label-height="24" data-sc-ad-track-spacing="100" data-sc-breakpoint="50em" data-sc-content-positions="[1, 1050, 1250, 1550, 1950, 2350, 2750, 3150, 3550]" data-sc-load-immediate="4" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="90" id="mntl-sc-page_1-0"><span data-dcnode-id="1390" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1388" id="mntl-sc-block_1-0"><span data-dcnode-id="1389" instrument_node="">
It's easy to listen to music these days. But the process of getting music, dialogue, and sound effects from a source to your ears is a complicated process involving seemingly magical technologies.
</span></p><span data-dcnode-id="1386" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1385" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="1383" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1378" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1382" instrument_node="">
One technology used to deliver sound is a&nbsp;Bitstream</span><strong data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1379" instrument_node="">(aka Bitstream Audio, Bit Stream, Digital Bitstream, or Audio Bitstream).
</span></p><span data-dcnode-id="1376" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1375" id="mntl-sc-block_1-0-3"></div><span data-dcnode-id="1373" instrument_node="">
</span><figure class="comp mntl-sc-block-image--no-theme mntl-sc-block-image mntl-sc-block tech-sc-block-image mntl-sc-block-universal-image figure-landscape figure-high-res" data-dcnode-id="1353" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1372" instrument_node="">
</span><div class="figure-media" data-dcnode-id="1362"><span data-dcnode-id="1371" instrument_node="">
</span><div class="img-placeholder" data-dcnode-id="1364" style="padding-bottom:74.9%;"><span data-dcnode-id="1370" instrument_node="">
</span><img alt="A digital bitstream" class="universal-image__image lazyloaded" data-click-tracked="true" data-dcnode-id="1369" data-expand="300" data-img-lightbox="true" data-src="https://www.lifewire.com/thmb/7JfC8MZvWYrEmF6qW86awVAK0_A=/650x0/filters:no_upscale():max_bytes(150000):strip_icc()/bitstream-binary-5807f60f3df78cbc28b94614-a90cf1c6655b4a29b047234bfcdf9892.jpg" data-tracking-container="true" height="1499" id="mntl-sc-block-image_1-0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/thmb/7JfC8MZvWYrEmF6qW86awVAK0_A%3D/650x0/filters%3Ano_upscale%28%29%3Amax_bytes%28150000%29%3Astrip_icc%28%29/bitstream-binary-5807f60f3df78cbc28b94614-a90cf1c6655b4a29b047234bfcdf9892.jpg&amp;raw" width="2000"><span data-dcnode-id="1368" instrument_node="">

</span><figcaption class="comp mntl-figure-caption figure-article-caption" data-dcnode-id="1356" id="mntl-figure-caption_1-0"><span data-dcnode-id="1360" instrument_node="">
</span><span class="figure-article-caption-owner" data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Sebastian Kaulitzki / Getty Images</span></span><span data-dcnode-id="1357" instrument_node="">

</span></figure><span data-dcnode-id="1351" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1350" id="toc-what-is-bitstream"></span><span data-dcnode-id="1349" instrument_node=""> </span><h2 class="comp mntl-sc-block tech-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1344" id="mntl-sc-block_1-0-5"><span data-dcnode-id="1348" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node=""> What Is Bitstream? </span></span><span data-dcnode-id="1345" instrument_node=""> </span></h2><span data-dcnode-id="1342" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1340" id="mntl-sc-block_1-0-6"><span data-dcnode-id="1341" instrument_node="">
A bitstream is binary bits of information (1s and 0s) that can transfer from one device to another. Bitstreams are used in computer, networking, and audio applications.
</span></p><span data-dcnode-id="1338" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1329" id="mntl-sc-block_1-0-7"><div class="comp mntl-native" data-dcnode-id="1330" data-right-rail-index="2" id="mntl-native_2-0" style="--native-ad-height: auto"><span data-dcnode-id="1337" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad" data-dcnode-id="1333" id="mntl-native__adunit_2-0"><span data-dcnode-id="1336" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1335" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="1334" instrument_node="">
</span></div><span data-dcnode-id="1331" instrument_node="">
</span></div></div><span data-dcnode-id="1327" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1319" id="mntl-sc-block_1-0-8"><span data-dcnode-id="1326" instrument_node="">
For audio, a bitstream can convert sound into digital bits, and then that information is transferred from a source device to a receiver, and, eventually, to your ears. </span><a data-component="link" data-dcnode-id="1324" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/what-is-pcm-1846928"><span data-dcnode-id="1325" instrument_node="">PCM</span></a><span data-dcnode-id="1323" instrument_node="">&nbsp;and&nbsp;</span><a data-component="link" data-dcnode-id="1321" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/hi-res-audio-4134630"><span data-dcnode-id="1322" instrument_node="">hi-res audio</span></a><span data-dcnode-id="1320" instrument_node="">&nbsp;are examples of digital audio formats that utilize bitstreams.
</span></p><span data-dcnode-id="1317" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1316" id="mntl-sc-block_1-0-9"></div><span data-dcnode-id="1314" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1313" id="toc-how-does-bitstream-work"></span><span data-dcnode-id="1312" instrument_node=""> </span><h2 class="comp mntl-sc-block tech-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1307" id="mntl-sc-block_1-0-10"><span data-dcnode-id="1311" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node=""> How Does Bitstream Work? </span></span><span data-dcnode-id="1308" instrument_node=""> </span></h2><span data-dcnode-id="1305" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1294" id="mntl-sc-block_1-0-11"><span data-dcnode-id="1304" instrument_node="">
A bitstream is a method of transferring encoded audio signals of specific surround sound formats from a source to a compatible&nbsp;</span><a data-component="link" data-dcnode-id="1302" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/best-home-theater-receivers-400-1300-1846332"><span data-dcnode-id="1303" instrument_node="">home theater receiver</span></a><span data-dcnode-id="1301" instrument_node="">&nbsp;or&nbsp;</span><a data-component="link" data-dcnode-id="1299" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/preamplifier-1846934"><span data-dcnode-id="1300" instrument_node="">AV preamp/processor</span></a><span data-dcnode-id="1298" instrument_node="">/</span><a data-component="link" data-dcnode-id="1296" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/what-is-a-power-amplifier-1846933"><span data-dcnode-id="1297" instrument_node="">Power amplifier</span></a><span data-dcnode-id="1295" instrument_node="">&nbsp;combination in a home theater.
</span></p><span data-dcnode-id="1292" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1291" id="mntl-sc-block_1-0-12"></div><span data-dcnode-id="1289" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1287" id="mntl-sc-block_1-0-13"><span data-dcnode-id="1288" instrument_node="">
A home theater receiver or AV processor detects the encoded surround format sent to it. The receiver/AV processor then decodes the information based on instructions provided in the bitstream signal. Post-processing and converting the signal to analog form amplifies and sends the audio to the speakers.
</span></p><span data-dcnode-id="1285" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1284" id="mntl-sc-block_1-0-14"></div><span data-dcnode-id="1282" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1280" id="mntl-sc-block_1-0-15"><span data-dcnode-id="1281" instrument_node="">
The bitstream process starts with the content creator or sound engineer deciding what surround sound format to use for an audio recording or live transmission. The audio is then encoded as digital bits in the chosen format and according to the format's rules.
</span></p><span data-dcnode-id="1278" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1277" id="mntl-sc-block_1-0-16"></div><span data-dcnode-id="1275" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1273" id="mntl-sc-block_1-0-17"><span data-dcnode-id="1274" instrument_node="">
Once that process is complete, the bits go to a disc (DVD, Blu-ray, or Ultra HD Blu-ray), cable or satellite service, streaming source, or embedded in live TV transmission.
</span></p><span data-dcnode-id="1271" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1270" id="mntl-sc-block_1-0-18"></div><span data-dcnode-id="1268" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1242" id="mntl-sc-block_1-0-19"><span data-dcnode-id="1267" instrument_node="">
Examples of surround sound formats that utilize the bitstream transfer process include&nbsp;</span><a data-component="link" data-dcnode-id="1265" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/dolby-digital-ex-plus-1846885"><span data-dcnode-id="1266" instrument_node="">Dolby Digital, EX, Plus</span></a><span data-dcnode-id="1264" instrument_node="">,&nbsp;</span><a data-component="link" data-dcnode-id="1262" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/dolby-truehd-4110228"><span data-dcnode-id="1263" instrument_node="">TrueHD</span></a><span data-dcnode-id="1261" instrument_node="">,&nbsp;</span><a data-component="link" data-dcnode-id="1259" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/dolby-atmos-cinema-to-home-theater-1847278"><span data-dcnode-id="1260" instrument_node="">Atmos</span></a><span data-dcnode-id="1258" instrument_node="">,&nbsp;</span><a data-component="link" data-dcnode-id="1256" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/what-is-dts-1846889"><span data-dcnode-id="1257" instrument_node="">DTS</span></a><span data-dcnode-id="1255" instrument_node="">,&nbsp;</span><a data-component="link" data-dcnode-id="1253" data-ordinal="5" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/what-is-dts-es-1846890"><span data-dcnode-id="1254" instrument_node="">DTS-ES</span></a><span data-dcnode-id="1252" instrument_node="">,&nbsp;</span><a data-component="link" data-dcnode-id="1250" data-ordinal="6" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/dts-96-24-1846848"><span data-dcnode-id="1251" instrument_node="">DTS 96/24</span></a><span data-dcnode-id="1249" instrument_node="">,&nbsp;</span><a data-component="link" data-dcnode-id="1247" data-ordinal="7" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/dts-hd-master-audio-1846891"><span data-dcnode-id="1248" instrument_node="">DTS HD-Master Audio</span></a><span data-dcnode-id="1246" instrument_node="">, and&nbsp;</span><a class="pseudoStyle" data-component="link" data-dcnode-id="1244" data-ordinal="8" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/dts-x-surround-sound-format-1847004"><span data-dcnode-id="1245" instrument_node="">DTS:X</span></a><span data-dcnode-id="1243" instrument_node="">.
</span></p><span data-dcnode-id="1240" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1239" id="mntl-sc-block_1-0-20"></div><span data-dcnode-id="1237" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1229" id="mntl-sc-block_1-0-21"><span data-dcnode-id="1236" instrument_node="">
The bitstream can be sent from the chosen source directly to a home theater receiver (or AV Preamp/Processor) via a physical connection (</span><a data-component="link" data-dcnode-id="1234" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/coaxial-vs-optical-digital-cable-3134605"><span data-dcnode-id="1235" instrument_node="">digital optical, digital coaxial</span></a><span data-dcnode-id="1233" instrument_node="">, or&nbsp;</span><a data-component="link" data-dcnode-id="1231" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/hdmi-facts-high-definition-multimedia-interface-1847337"><span data-dcnode-id="1232" instrument_node="">HDMI</span></a><span data-dcnode-id="1230" instrument_node="">). A bitstream can also be sent wirelessly via an antenna or home network.
</span></p><span data-dcnode-id="1227" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1226" id="mntl-sc-block_1-0-22"></div><span data-dcnode-id="1224" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1223" id="toc-examples-of-bitstream-management"></span><span data-dcnode-id="1222" instrument_node=""> </span><h2 class="comp mntl-sc-block tech-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1217" id="mntl-sc-block_1-0-23"><span data-dcnode-id="1221" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node=""> Examples of Bitstream Management </span></span><span data-dcnode-id="1218" instrument_node=""> </span></h2><span data-dcnode-id="1215" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1213" id="mntl-sc-block_1-0-24"><span data-dcnode-id="1214" instrument_node="">
Here are examples of how bitstream audio transfer can work in home theater:
</span></p><span data-dcnode-id="1211" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1210" id="mntl-sc-block_1-0-25"></div><span data-dcnode-id="1208" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1177" id="mntl-sc-block_1-0-26"><span data-dcnode-id="1207" instrument_node="">
</span><li data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">A DVD, Blu-ray, or Ultra HD disc contains a Dolby Digital or DTS soundtrack encoded as digital bits. The player reads the disc's encoding, transfers it in bitstream form via a digital optical, digital coaxial, or HDMI connection to a home theater receiver/AV preamp processor that has a Dolby Digital or DTS Decoder. The receiver decodes the Dolby Digital or DTS bitstream into its proper channel assignments and sends the assigned channel signals through the appropriate amplifiers and speakers.</span></li><span data-dcnode-id="1204" instrument_node="">
</span><li data-dcnode-id="1196"><span data-dcnode-id="1203" instrument_node="">In addition to the above method, a DVD Blu-ray or Ultra HD Disc player may also provide the capability to&nbsp;</span><a data-component="link" data-dcnode-id="1201" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/blu-ray-audio-bitstream-vs-pcm-1846396"><span data-dcnode-id="1202" instrument_node="">decode the bitstream from a disc internally to the PCM format</span></a><span data-dcnode-id="1200" instrument_node="">. Instead of the receiver decoding the bitstream coming from a player, the player may send a decoded signal in the PCM format digitally to a home theater receiver via HDMI or in analog form through&nbsp;</span><a data-component="link" data-dcnode-id="1198" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/multi-channel-analog-audio-connections-in-home-theate-4118422"><span data-dcnode-id="1199" instrument_node="">multichannel analog audio</span></a><span data-dcnode-id="1197" instrument_node="">&nbsp;connections. The audio signal passes through the receiver, the amplifier, and the speakers without further processing unless the listener activates more in the receiver/AV processor.</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1195"></span><span data-dcnode-id="1194" instrument_node="">
</span><li data-dcnode-id="1189"><span data-dcnode-id="1193" instrument_node="">A TV station transmits a signal that includes a Dolby Digital-encoded bitstream. A TV receives that signal, then transfers the bitstream to a soundbar, home theater receiver, or AV preamp/processor using either a digital optical output or&nbsp;</span><a data-component="link" data-dcnode-id="1191" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/audio-return-channel-1846845"><span data-dcnode-id="1192" instrument_node="">HDMI Audio Return Channel</span></a><span data-dcnode-id="1190" instrument_node="">. The soundbar, home theater receiver, or AV preamp/processor then decodes the bitstream and plays the decoded signal. Depending on the soundbar, receiver, or AV preamp/processor, you may also have the option of combining the decoded Dolby Digital result with additional audio processing.</span></li><span data-dcnode-id="1188" instrument_node="">
</span><li data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">For internet streaming, a service, such as Netflix, offers a program or movie encoded in Dolby Digital or related surround sound format. If you receive that content using a media streamer and connect to a home theater receiver using a digital audio connection (optical, coaxial, or HDMI), the surround sound audio bitstream is sent to the receiver, decoded, and sent through the amplifier and speakers. Suppose the media streamer is connected directly to a TV via HDMI and a compatible soundbar or home theater receiver via digital audio output or HDMI Audio Return Channel. In that case, the TV passes the bitstream signal to the soundbar/home theater for decoding and amplification.</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1185"></span><span data-dcnode-id="1184" instrument_node="">
</span><li data-dcnode-id="1179"><span data-dcnode-id="1183" instrument_node="">In another internet streaming scenario, you might receive Netflix or other services directly through a&nbsp;</span><a data-component="link" data-dcnode-id="1181" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifewire.com/what-is-a-smart-tv-4140172"><span data-dcnode-id="1182" instrument_node="">smart TV</span></a><span data-dcnode-id="1180" instrument_node="">. The TV might pass an encoded Dolby Digital signal to a soundbar, home theater receiver, or AV preamp/processor using the same methods as when the TV receives a station broadcast.</span></li><span data-dcnode-id="1178" instrument_node="">
</span></ul><span data-dcnode-id="1175" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1174" id="mntl-sc-block_1-0-27"></div><span data-dcnode-id="1172" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1171" id="toc-the-bottom-line"></span><span data-dcnode-id="1170" instrument_node=""> </span><h2 class="comp mntl-sc-block tech-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1165" id="mntl-sc-block_1-0-28"><span data-dcnode-id="1169" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node=""> The Bottom Line </span></span><span data-dcnode-id="1166" instrument_node=""> </span></h2><span data-dcnode-id="1163" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1161" id="mntl-sc-block_1-0-29"><span data-dcnode-id="1162" instrument_node="">
Bitstream encoding is a core technology used in home theater audio. It provides a way to transfer data-heavy surround sound information between a source device and a home theater receiver or AV preamp/processor within a narrow bandwidth using various connection options.
</span></p><span data-dcnode-id="1159" instrument_node="">
