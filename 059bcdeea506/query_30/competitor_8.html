</span><h2 data-dcnode-id="2363"><span data-dcnode-id="2364" id="Virtual_Reality_Tutorial"><span data-dcnode-id="2365" instrument_node="">Virtual Reality Tutorial</span></span></h2><span data-dcnode-id="2362" instrument_node="">
</span><p data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Let us take an example to start understanding the basics.</span></p><span data-dcnode-id="2359" instrument_node="">
</span><p data-dcnode-id="2356"><strong data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">The below image is a demo setup with a virtual reality head-mounted display steering wheel. The user feels immersed in a car, driving. </span></strong></p><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2350"><a data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Demo-setup-with-a-virtual-reality-head-mounted-display-steering-wheel.-User-feels-immersed-in-a-car-driving.jpg"><img alt="Virtual reality head mounted display steering wheel. " class="alignnone wp-image-131191 size-full entered error" data-dcnode-id="2354" data-lazy-sizes="(max-width: 740px) 100vw, 740px" data-lazy-src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Demo-setup-with-a-virtual-reality-head-mounted-display-steering-wheel.-User-feels-immersed-in-a-car-driving.jpg" data-lazy-srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Demo-setup-with-a-virtual-reality-head-mounted-display-steering-wheel.-User-feels-immersed-in-a-car-driving.jpg 740w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Demo-setup-with-a-virtual-reality-head-mounted-display-steering-wheel.-User-feels-immersed-in-a-car-driving-300x169.jpg 300w" data-ll-status="error" height="417" sizes="(max-width: 740px) 100vw, 740px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Demo-setup-with-a-virtual-reality-head-mounted-display-steering-wheel.-User-feels-immersed-in-a-car-driving.jpg&amp;raw" srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Demo-setup-with-a-virtual-reality-head-mounted-display-steering-wheel.-User-feels-immersed-in-a-car-driving.jpg 740w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Demo-setup-with-a-virtual-reality-head-mounted-display-steering-wheel.-User-feels-immersed-in-a-car-driving-300x169.jpg 300w" width="740"><noscript data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">&lt;img class="alignnone wp-image-131191 size-full" src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Demo-setup-with-a-virtual-reality-head-mounted-display-steering-wheel.-User-feels-immersed-in-a-car-driving.jpg" alt="Virtual reality head mounted display steering wheel. " width="740" height="417" srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Demo-setup-with-a-virtual-reality-head-mounted-display-steering-wheel.-User-feels-immersed-in-a-car-driving.jpg 740w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Demo-setup-with-a-virtual-reality-head-mounted-display-steering-wheel.-User-feels-immersed-in-a-car-driving-300x169.jpg 300w" sizes="(max-width: 740px) 100vw, 740px" /&gt;</span></noscript></a></p><span data-dcnode-id="2349" instrument_node="">
</span><p data-dcnode-id="2343"><em data-dcnode-id="2344"><span data-dcnode-id="2348" instrument_node="">[image </span><a data-dcnode-id="2346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/" rel="noopener" target="_blank"><span data-dcnode-id="2347" instrument_node="">source</span></a><span data-dcnode-id="2345" instrument_node="">]&nbsp;</span></em></p><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Virtual reality is a technology that attempts to regenerate computer images and videos to produce real-life visual experiences that are beyond those achieved on the ordinary computer monitor and phone. VR systems do so by using computer vision and advanced graphics to generate 3D images and video by adding depth, and by reconstructing the scale and distances between static 2D images.</span></p><span data-dcnode-id="2339" instrument_node="">
</span><p data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">The user must be able to explore and control these 3D environments using VR headsets lens and controllers which might have sensors on them for users to be able to experience the VR content.</span></p><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2326"><strong data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">For instance,</span></strong><span data-dcnode-id="2333" instrument_node=""> click</span><strong data-dcnode-id="2328"><span data-dcnode-id="2332" instrument_node=""> </span><a data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/KkCDexWdDIY" rel="noopener" target="_blank"><span data-dcnode-id="2331" instrument_node="">here</span></a><span data-dcnode-id="2329" instrument_node=""> </span></strong><span data-dcnode-id="2327" instrument_node="">for the video that allows you to experience Abu Dhabi in 3D while wearing a VR cardboard headset or directly on your P.C. monitor without a VR headset.</span></p><span data-dcnode-id="2325" instrument_node="">
</span><p data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Simply click on the video and put your phone inside your VR headset. If you are not using headsets, simply look for the arrows &lt;&gt; inside the video to browse the video in 3D. You can look anywhere around you as you use the headset or the arrows to browse the video in 3D.</span></p><span data-dcnode-id="2322" instrument_node="">
</span><p data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">This is an example of a video taken with VR cameras or 3D cameras. However, modern VR is more advanced than 3D, allowing the user to immerse their five senses into their VR experiences. It also dwells on real-time tracking to enable using VR in real-time explorations.</span></p><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2316"><strong data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">The below example is of a user using VR glasses or headset. What she actually sees is shown on the right-hand side. </span></strong></p><span data-dcnode-id="2315" instrument_node="">
</span><p data-dcnode-id="2310"><a data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/A-user-using-VR-glasses-or-headset.-What-she-actually-sees-is-shown-on-the-right-hand..jpg"><img alt="User using VR glasses or headset. " class="alignnone wp-image-131192 size-full entered error" data-dcnode-id="2314" data-lazy-sizes="(max-width: 638px) 100vw, 638px" data-lazy-src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/A-user-using-VR-glasses-or-headset.-What-she-actually-sees-is-shown-on-the-right-hand..jpg" data-lazy-srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/A-user-using-VR-glasses-or-headset.-What-she-actually-sees-is-shown-on-the-right-hand..jpg 638w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/A-user-using-VR-glasses-or-headset.-What-she-actually-sees-is-shown-on-the-right-hand.-300x155.jpg 300w" data-ll-status="error" height="330" sizes="(max-width: 638px) 100vw, 638px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/A-user-using-VR-glasses-or-headset.-What-she-actually-sees-is-shown-on-the-right-hand..jpg&amp;raw" srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/A-user-using-VR-glasses-or-headset.-What-she-actually-sees-is-shown-on-the-right-hand..jpg 638w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/A-user-using-VR-glasses-or-headset.-What-she-actually-sees-is-shown-on-the-right-hand.-300x155.jpg 300w" width="638"><noscript data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">&lt;img class="alignnone wp-image-131192 size-full" src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/A-user-using-VR-glasses-or-headset.-What-she-actually-sees-is-shown-on-the-right-hand..jpg" alt="User using VR glasses or headset. " width="638" height lass="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="1800" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="1798" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="1793"><use class="ytp-svg-shadow" data-dcnode-id="1795" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1796" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1794" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="1789"><use class="ytp-svg-shadow" data-dcnode-id="1791" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1792" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1790" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=aq1QJiXCH8c" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe><noscript data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">&lt;iframe src="https://www.youtube.com/embed/aq1QJiXCH8c" width="650" height="350" frameborder="0" allowfullscreen="allowfullscreen"&gt;&lt;span data-mce-type="bookmark" style="display: inline-block; width: 0px; overflow: hidden; line-height: 0;" class="mce_SELRES_start"&gt;?&lt;/span&gt;&lt;/iframe&gt;</span></noscript></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1764"><strong data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">(ii)</span></strong><span data-dcnode-id="1765" instrument_node=""> VR hardware and software will help generate or create computer-generated 3D images and video and this output is cast to lens mounted on goggles or headset. The headset is strapped on to the user’s head over the eyes, such that the user is visually immersed in the content they are viewing.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1756"><strong data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">(iii)</span></strong><span data-dcnode-id="1760" instrument_node=""> The person viewing the content can use gaze for the gesture to select and browse through the 3D content or can use </span><a data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/vr-controllers-and-accessories/"><span data-dcnode-id="1759" instrument_node="">hand controllers</span></a><span data-dcnode-id="1757" instrument_node=""> such as gloves. The controllers and gaze control will help track the movement of the user’s body and to place the simulated images and videos in the display appropriately such that there will be a change in perception.</span></p><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">By moving your head to look left, right, up, and down, you can replicate these motions inside of VR because the headset has head motion or tracking sensors by either tracking the eye or head. Sensors on controllers can also be used to collect stimuli response information from the body and send back to the VR system to improve immersion experience.</span></p><span data-dcnode-id="1752" instrument_node="">
</span><p data-dcnode-id="1748"><strong data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">The below image is an example to understand the sense of touch and feel in VR:</span></strong><span data-dcnode-id="1749" instrument_node=""> A user using VR gloves and hand avatar to browse through and interact with VR content. The glove transmits the motion from the hand to the VR computing or processing unit or system and reflects action on the display. The VR will also transmit the stimulus back to the user.</span></p><span data-dcnode-id="1747" instrument_node="">
</span><p data-dcnode-id="1742"><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-04-23.jpg"><img alt="The sense of touch and feel " class="alignnone size-full wp-image-131193 entered lazyloaded" data-dcnode-id="1746" data-lazy-sizes="(max-width: 607px) 100vw, 607px" data-lazy-src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-04-23.jpg" data-lazy-srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-04-23.jpg 607w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-04-23-300x189.jpg 300w" data-ll-status="loaded" height="382" sizes="(max-width: 607px) 100vw, 607px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-04-23.jpg&amp;raw" srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-04-23.jpg 607w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-04-23-300x189.jpg 300w" width="607"><noscript data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">&lt;img class="alignnone size-full wp-image-131193" src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-04-23.jpg" alt="The sense of touch and feel " width="607" height="382" srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-04-23.jpg 607w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-04-23-300x189.jpg 300w" sizes="(max-width: 607px) 100vw, 607px" /&gt;</span></noscript></a></p><span data-dcnode-id="1741" instrument_node="">
</span><p data-dcnode-id="1735"><em data-dcnode-id="1736"><span data-dcnode-id="1740" instrument_node="">[image </span><a data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/" rel="noopener" target="_blank"><span data-dcnode-id="1739" instrument_node="">source</span></a><span data-dcnode-id="1737" instrument_node="">]</span></em></p><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1724"><strong data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">(iv)</span></strong><span data-dcnode-id="1731" instrument_node=""> Hence, it has two important things; </span><strong data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">computer vision</span></strong><span data-dcnode-id="1728" instrument_node=""> to help understand objects and </span><strong data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">position tracking</span></strong><span data-dcnode-id="1725" instrument_node=""> to help track user movement to place the objects effectively on the display and to change the perception so that the user can “see the world”.</span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1719"><strong data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">(v)</span></strong><span data-dcnode-id="1720" instrument_node=""> It also comprises of other optional devices such as audio headphones, cameras, and sensors to track user movements and feed it to computer or phone, and wired or wireless connections. These are used to improve user experience.</span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Virtual reality has diverse applications. While most of the applications dwell on gaming, it is also finding it’s usage in medicine, engineering, manufacturing, design, education and training, and many other fields.</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1712"><strong data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">VR Training in Medicine: </span></strong></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1706"><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/VR-Training-in-medicine.jpg"><img alt="VR Training in medicine" class="alignnone size-full wp-image-131194 entered error" data-dcnode-id="1710" data-lazy-sizes="(max-width: 602px) 100vw, 602px" data-lazy-src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/VR-Training-in-medicine.jpg" data-lazy-srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/VR-Training-in-medicine.jpg 602w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/VR-Training-in-medicine-300x169.jpg 300w" data-ll-status="error" height="339" sizes="(max-width: 602px) 100vw, 602px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/VR-Training-in-medicine.jpg&amp;raw" srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/VR-Training-in-medicine.jpg 602w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/VR-Training-in-medicine-300x169.jpg 300w" width="602"><noscript data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">&lt;img class="alignnone size-full wp-image-131194" src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/VR-Training-in-medicine.jpg" alt="VR Training in medicine" width="602" height="339" srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/VR-Training-in-medicine.jpg 602w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/VR-Training-in-medicine-300x169.jpg 300w" sizes="(max-width: 602px) 100vw, 602px" /&gt;</span></noscript></a></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1699"><em data-dcnode-id="1700"><span data-dcnode-id="1704" instrument_node="">[image </span><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tectales.com/" rel="noopener" target="_blank"><span data-dcnode-id="1703" instrument_node="">source</span></a><span data-dcnode-id="1701" instrument_node="">]</span></em></p><span data-dcnode-id="1698" instrument_node="">
</span><h3 data-dcnode-id="1695"><span data-dcnode-id="1696" id="Introduction_To_Computer_Graphics_And_Human_Perception"><span data-dcnode-id="1697" instrument_node="">Introduction To Computer Graphics And Human Perception</span></span></h3><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1691"><strong data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">The below image explains the general organization of human perception:</span></strong></p><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1685"><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/General-organization-of-the-human-perception.png"><img alt="General organization of the human perception" class="alignnone wp-image-131195 size-full entered error" data-dcnode-id="1689" data-lazy-sizes="(max-width: 740px) 100vw, 740px" data-lazy-src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/General-organization-of-the-human-perception.png" data-lazy-srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/General-organization-of-the-human-perception.png 740w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/General-organization-of-the-human-perception-300x103.png 300w" data-ll-status="error" height="254" sizes="(max-width: 740px) 100vw, 740px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/General-organization-of-the-human-perception.png&amp;raw" srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/General-organization-of-the-human-perception.png 740w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/General-organization-of-the-human-perception-300x103.png 300w" width="740"><noscript data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">&lt;img class="alignnone wp-image-131195 size-full" src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/General-organization-of-the-human-perception.png" alt="General organization of the human perception" width="740" height="254" srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/General-organization-of-the-human-perception.png 740w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/General-organization-of-the-human-perception-300x103.png 300w" sizes="(max-width: 740px) 100vw, 740px" /&gt;</span></noscript></a></p><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1678"><em data-dcnode-id="1679"><span data-dcnode-id="1683" instrument_node="">[image </span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/" rel="noopener" target="_blank"><span data-dcnode-id="1682" instrument_node="">source</span></a><span data-dcnode-id="1680" instrument_node="">]</span></em></p><span data-dcnode-id="1677" instrument_node="">
</span><p data-dcnode-id="1673"><strong data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">(i)</span></strong><span data-dcnode-id="1674" instrument_node=""> It is possible to avoid side effects on human perception while deriving maximum benefits from VR perception. This is possible with an in-depth and complete understanding of human body physiology and optical illusions.</span></p><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1668"><strong data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">(ii)</span></strong><span data-dcnode-id="1669" instrument_node=""> Our human body perceives the world through body senses that respond differently to different stimuli. Mimicking human perception in virtual reality requires knowledge of how to fool the senses to know what are the most important stimuli and what is acceptable quality for subjective viewing.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Human vision provides the most information to the brain. It is then followed by hearing, touch, and other senses. The proper functioning of a VR system requires one to know how to synchronize all stimuli.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1661"><strong data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">The below image explains that the light sensors are employed to sense the light reflected from the eye and once the light is absorbed by the pupil, the pupil’s position affects the light reflected back by the eye and sensed by the photodiode. </span></strong></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1655"><a data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/LIGHTS1.png"><img alt="LIGHTS Sensor" class="alignnone wp-image-131196 size-full entered error" data-dcnode-id="1659" data-lazy-sizes="(max-width: 740px) 100vw, 740px" data-lazy-src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/LIGHTS1.png" data-lazy-srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/LIGHTS1.png 740w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/LIGHTS1-300x183.png 300w" data-ll-status="error" height="451" sizes="(max-width: 740px) 100vw, 740px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/LIGHTS1.png&amp;raw" srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/LIGHTS1.png 740w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/LIGHTS1-300x183.png 300w" width="740"><noscript data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">&lt;img class="alignnone wp-image-131196 size-full" src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/LIGHTS1.png" alt="LIGHTS Sensor" width="740" height="451" srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/LIGHTS1.png 740w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/LIGHTS1-300x183.png 300w" sizes="(max-width: 740px) 100vw, 740px" /&gt;</span></noscript></a></p><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1650"><strong data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">(iii)</span></strong><span data-dcnode-id="1651" instrument_node=""> Virtual reality simply tries to simulate human perception (the brain’s interpretation of the senses) to the real world. The 3D VR environments are not only designed to look like a real-world but also one that gives the experience of it. In fact, VR is considered immersive when the simulated and the real-world are as much similar as possible.</span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1645"><strong data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">(iv)</span></strong><span data-dcnode-id="1646" instrument_node=""> Although to some extent, the simulation may be wrong such that the experiences are enjoyable, the brain may not be tricked this way. In other cases, it means the simulation is so wrong to the extent that the user experiences cyber-sickness where VR tricks the brain into feelings of motion-sickness.</span></p><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Motion-sickness is the queasy feeling that some people get in a car, plane, or boat. It happens when the simulated and real-world are different and the perception is, therefore, confusing to the brain.</span></p><span data-dcnode-id="1641" instrument_node="">
</span><h3 data-dcnode-id="1638"><span data-dcnode-id="1639" id="What_Is_Virtual_Reality_The_Technology_Behind_It"><span data-dcnode-id="1640" instrument_node="">What Is Virtual Reality &amp; The Technology Behind It</span></span></h3><span data-dcnode-id="1637" instrument_node="">

th class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="1140" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="1135"><use class="ytp-svg-shadow" data-dcnode-id="1137" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1138" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1136" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="1131"><use class="ytp-svg-shadow" data-dcnode-id="1133" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1134" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1132" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=i4Zt3JZejbg" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe><noscript data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">&lt;iframe src="https://www.youtube.com/embed/i4Zt3JZejbg" width="650" height="350" frameborder="0" allowfullscreen="allowfullscreen"&gt;&lt;span data-mce-type="bookmark" style="display: inline-block; width: 0px; overflow: hidden; line-height: 0;" class="mce_SELRES_start"&gt;?&lt;/span&gt;&lt;/iframe&gt;</span></noscript></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Virtual reality is a technology that simulates vision to end up with a 3D environment in which a user appears to be immersed while browsing through it or experiencing it. The 3D environment is then controlled in all 3D by the user who is experiencing it. On the one side, the user is creating 3D VR environments and on the other end, he is experiencing or exploring them with appropriate devices such as VR headsets.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Some devices like controllers allow the user to control and explore the content.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Creating the content starts with an understanding of computer vision, the technology that enables phones and computers to process images and videos so that they can understand them the way a human visual system does.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1097"><strong data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">For instance,</span></strong><span data-dcnode-id="1098" instrument_node=""> devices using this technology will interpret images and videos using image location, surroundings, and appearance. This means by using devices such as a camera but also along with other technologies like artificial intelligence, big data, and a vision processing unit.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Artificial Intelligence and Machine Learning may rely on pre-processed image and video data (large amounts of data or big data) to identify objects in the environment. The camera will use blob detection, scale space, template matching, and edge detection or combination of all these to make this possible.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1092" instrument_node="">Without going into details, </span><strong data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">for instance,</span></strong><span data-dcnode-id="1089" instrument_node=""> edge detection generates an image by detecting points where brightness will drastically drop or stop altogether. </span><strong data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Other methods use other techniques to identify an image.</span></strong></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1081"><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">(i)</span></strong><span data-dcnode-id="1082" instrument_node=""> Virtual reality headsets attempt to help a user enjoy an immersive 3D environment by putting a screen in front of the user’s eyes to eliminate their connection with the real world.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1076"><strong data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">(ii)</span></strong><span data-dcnode-id="1077" instrument_node=""> An autofocus lens is placed between each eye and the screen. The lenses are adjusted based on the movement and positioning of the eyes. This allows tracking of the user movement vis-a-vis the display.</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1071"><strong data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">(iii)</span></strong><span data-dcnode-id="1072" instrument_node=""> On the other end is a device such as a computer or mobile device that generates and renders the visuals to the eye through the lenses on the headset.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1066"><strong data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">(iv)</span></strong><span data-dcnode-id="1067" instrument_node=""> The computer is connected to the headset via an HDMI cable to deliver visuals to the eye through the lenses. When using a dedicated mobile device to deliver the visuals, the phone may be mounted directly on the headset such that the lenses of the headset simply lie over the mobile device’s display to magnify the images or sense movement of the eyes in respect to mobile device’s image and to finally create the visuals.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1062"><strong data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">The below image is of a user using a high-end HTC VR headset tethered to the PC via HDMI cable. We have untethered, tethered, and even wireless options. </span></strong></p><span data-dcnode-id="1061" instrument_node="">

</span><p data-dcnode-id="1049"><em data-dcnode-id="1050"><span data-dcnode-id="1054" instrument_node="">[image</span><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techspot.com/" rel="noopener" target="_blank"><span data-dcnode-id="1053" instrument_node=""> source</span></a><span data-dcnode-id="1051" instrument_node="">]</span></em></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">High-end VR devices like the one in the image above are expensive. They give high-quality immersive experiences because they use lenses and computers and advanced visual methodologies.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1039"><strong data-dcnode-id="1040"><span data-dcnode-id="1044" instrument_node="">Click</span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/-I8QYXvvmkQ" rel="noopener" target="_blank"><span data-dcnode-id="1043" instrument_node=""> here</span></a><span data-dcnode-id="1041" instrument_node=""> for a video for a detailed look into HTC Vive high-end VR headset.</span></strong></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">For low-end and cheaper Google and other cardboard VR headsets, they use a mobile device. The phone is usually removable from the headset mount.&nbsp;Low-end VR headsets called cardboards are much cheaper because they just have a lens and require no advanced material in the making.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1031"><strong data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">The below image is of a Cardboard VR headsets. </span></strong><span data-dcnode-id="1032" instrument_node="">A user inserts their phone inside the cardboard headset to lockout their eye from the rest of the world, clicks on a VR application that hosts virtual reality content, and they can enjoy VR at a cost of below $20.</span></p><span data-dcnode-id="1030" instrument_node="">

</span><p data-dcnode-id="1005"><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Google Cardboard VR headset with a controller: </span></strong></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="999"><a data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Google-mobile-VR-headset.-Google-Cardboard.jpg"><img alt="Google mobile VR headset. Google Cardboard" class="alignnone size-full wp-image-131200" data-dcnode-id="1003" data-lazy-sizes="(max-width: 464px) 100vw, 464px" data-lazy-src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Google-mobile-VR-headset.-Google-Cardboard.jpg" data-lazy-srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Google-mobile-VR-headset.-Google-Cardboard.jpg 464w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Google-mobile-VR-headset.-Google-Cardboard-300x213.jpg 300w" height="330" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20464%20330'%3E%3C/svg%3E" width="464"><noscript data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">&lt;img class="alignnone size-full wp-image-131200" src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Google-mobile-VR-headset.-Google-Cardboard.jpg" alt="Google mobile VR headset. Google Cardboard" width="464" height="330" srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Google-mobile-VR-headset.-Google-Cardboard.jpg 464w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Google-mobile-VR-headset.-Google-Cardboard-300x213.jpg 300w" sizes="(max-width: 464px) 100vw, 464px" /&gt;</span></noscript></a></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="992"><em data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">[image </span><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//virtualspeech.com/" rel="noopener" target="_blank"><span data-dcnode-id="996" instrument_node="">source</span></a><span data-dcnode-id="994" instrument_node="">]</span></em></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="984"><strong data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">(v)</span></strong><span data-dcnode-id="988" instrument_node=""> For the mid-range headsets such as </span><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.samsung.com/global/galaxy/gear-vr/" rel="noopener" target="_blank"><span data-dcnode-id="987" instrument_node="">Samsung Gear VR</span></a><span data-dcnode-id="985" instrument_node="">, the headset is designed such that it has a computer device size of the phone integrated with lens and which won’t come out. These are portable and mobile and provides the best freedom for using VR content. A user will simply buy the headset, connect to the internet, browse through VR content such as games or download, and then explore it in VR.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="980"><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Samsung Gear VR:</span></strong></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="974"><a data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Samsung-Gear-VR-1.jpg"><img alt="Samsung Gear VR" class="alignnone size-full wp-image-131201" data-dcnode-id="978" data-lazy-sizes="(max-width: 740px) 100vw, 740px" data-lazy-src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Samsung-Gear-VR-1.jpg" data-lazy-srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Samsung-Gear-VR-1.jpg 740w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Samsung-Gear-VR-1-300x221.jpg 300w" height="545" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20740%20545'%3E%3C/svg%3E" width="740"><noscript data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">&lt;img class="alignnone size-full wp-image-131201" src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Samsung-Gear-VR-1.jpg" alt="Samsung Gear VR" width="740" height="545" srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Samsung-Gear-VR-1.jpg 740w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/Samsung-Gear-VR-1-300x221.jpg 300w" sizes="(max-width: 740px) 100vw, 740px" /&gt;</span></noscript></a></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="967"><em data-dcnode-id="968"><span data-dcnode-id="972" instrument_node="">[image </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.samsung.com/" rel="noopener" target="_blank"><span data-dcnode-id="971" instrument_node="">source</span></a><span data-dcnode-id="969" instrument_node="">]</span></em></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="962"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">(vi)</span></strong><span data-dcnode-id="963" instrument_node=""> Each virtual reality headset and visual generation event in each virtual reality system tries to improve the quality of the visuals by playing around with a number of factors among them.</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="958"><strong data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">These factors are enlisted below:</span></strong></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="954" style="color: #ff6600;"><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">#1) Field Of View (FOV)</span></strong></span><span data-dcnode-id="953" instrument_node=""> or the viewable area, is the extent to which the display will support the movement of the eye and head. It is the degree to which the device will contain the virtual world in front of your eyes. Naturally, a person is able to see about 200°-220° around them without moving the head. It would result in the feeling of nausea if the FOV results in a misrepresentation of information to the brain.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="948"><strong data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Binocular FOV and Monocular FOV: </span></strong></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="942"><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-24-49.jpg"><img alt="The field of View " class="alignnone wp-image-131202 size-full" data-dcnode-id="946" data-lazy-sizes="(max-width: 379px) 100vw, 379px" data-lazy-src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-24-49.jpg" data-lazy-srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-24-49.jpg 379w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-24-49-288x300.jpg 288w" height="395" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20379%20395'%3E%3C/svg%3E" width="379"><noscript data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">&lt;img class="alignnone wp-image-131202 size-full" src="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-24-49.jpg" alt="The field of View " width="379" height="395" srcset="https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-24-49.jpg 379w, https://www.softwaretestinghelp.com/wp-content/qa/uploads/2020/06/2020-06-09_13-24-49-288x300.jpg 288w" sizes="(max-width: 379px) 100vw, 379px" /&gt;</span></noscript></a></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="935"><em data-dcnode-id="936"><span data-dcnode-id="940" instrument_node="">[image </span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pdfs.semanticscholar.org/02c2/5435bf525af20663b17e0effa3133d85efbb.pdf" rel="noopener" target="_blank"><span data-dcnode-id="939" instrument_node="">source</span></a><span data-dcnode-id="937" instrument_node="">]</span></em></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="930" style="color: #ff6600;"><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">#2) The frame rate</span></strong><span data-dcnode-id="931" instrument_node=""> </span></span><span data-dcnode-id="929" instrument_node="">or the rate at which the GPU can process the visual images per second.</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="924" style="color: #ff6600;"><strong data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">#3) The screen refresh rate</span></strong></span><span data-dcnode-id="923" instrument_node=""> which is the pace of displaying the visual images.</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="917"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">(vii)</span></strong><span data-dcnode-id="918" instrument_node=""> A FOV of at least 100, a frame rate of at least 60fps, and a competitive refresh rate are required on the minimum end to give the least of VR experiences.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="908"><strong data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">(viii)</span></strong><span data-dcnode-id="913" instrument_node=""> Latency is a very important aspect related to the refreshing rate. For the brain to accept that the visual image generated on the screen is related to the head movement, the latency must be low to deliver the visual almost immediately. </span><span data-dcnode-id="910" style="text-decoration: underline;"><strong data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">For Example,</span></strong></span><span data-dcnode-id="909" instrument_node=""> a lag of 7- 15 milliseconds considered to be the ideal.</span></p><span data-dcnode-id="907" instrument_node="">
</span><h3 data-dcnode-id="904"><span data-dcnode-id="905" id="Who_Can_Use_VR"><span data-dcnode-id="906" instrument_node="">Who Can Use VR?</span></span></h3><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="902" instrument_node="">It depends on the needs. One can use it for entertainment like playing </span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.softwaretestinghelp.com/best-vr-virtual-reality-games/"><span data-dcnode-id="901" instrument_node="">VR games</span></a><span data-dcnode-id="899" instrument_node="">, for training, attending virtual company or hangout meetings and events, etc. For a consumer of VR content, the first thing that you should think about is what type of virtual reality headset to buy.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Will it work with a phone, P.C., or what else? Content can be accessed online on media platforms hosting VR content or should be downloaded for offline usage?</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="888"><strong data-dcnode-id="889"><span data-dcnode-id="893" instrument_node="">Click </span><a data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/9CoUvHBDLUw" rel="noopener" target="_blank"><span data-dcnode-id="892" instrument_node="">here</span></a><span data-dcnode-id="890" instrument_node=""> for a detailed guide on buying a virtual reality headset.&nbsp;</span></strong></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">If you are a company, group, or institution intending to take advantage of the immersive benefits of virtual reality in your advertising campaign, training, or in other applications, there may be more factors to consider including developing your own VR app and content.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">In this case, you want to come up with good VR content that influences your viewers and which they can watch using as many VR headsets as there can possibly be. You might want just a sponsored and branded immersive VR video and post it online on YouTube and other places.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">You may also develop a dedicated VR app for your company – possibly that works on Android and many other VR mobile and P.C. and non-P.C. platforms – that will host lots of your VR content and ads, which customers can find out and watch. You may also come up with a branded VR headset alongside your branded VR content.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">If you are a developer willing to develop for VR, you might look into buying headsets that support SDK and other development tools. Then get a good grasp of the standards and what platforms are used to develop for VR.</span></p><span data-dcnode-id="875" instrument_node="">
</span><h3 data-dcnode-id="872"><span data-dcnode-id="873" id="History_Of_Virtual_Reality"><span data-dcnode-id="874" instrument_node="">History Of Virtual Reality</span></span></h3><span data-dcnode-id="871" instrument_node="">

</span><table class="tablepress tablepress-id-1450 tablepress-responsive" data-dcnode-id="746" id="tablepress-1450"><thead data-dcnode-id="859"><tr class="row-1 odd" data-dcnode-id="861"><th class="column-1" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Year </span></th><th class="column-2" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Development </span></th></tr></thead><tbody class="row-hover" data-dcnode-id="748"><tr class="row-2 even" data-dcnode-id="849"><td class="column-1" data-dcnode-id="853"><strong data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">19th Century </span></strong></td><td class="column-2" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">360 degree Panoramic Paintings: filled the viewer’s field of vision creating immersive experiences. </span></td></tr><tr class="row-3 odd" data-dcnode-id="840"><td class="column-1" data-dcnode-id="844"><strong data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">1838</span></strong></td><td class="column-2" data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Stereoscopic photos and viewers: Charles Wheatstone showed viewing 2D images side by side with stereoscope added depth and immersion. Brain combines them into 3D. Found application in virtual tourism </span></td></tr><tr class="row-4 even" data-dcnode-id="831"><td class="column-1" data-dcnode-id="835"><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">1930s</span></strong></td><td class="column-2" data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">The idea of Google-based VR world using holographics, smell, taste and touch; through Stanley G. Weinbaum’s short story titled Pymalion’s Spectables </span></td></tr><tr class="row-5 odd" data-dcnode-id="822"><td class="column-1" data-dcnode-id="826"><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">1960s</span></strong></td><td class="column-2" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">First VR head-mounted display by Ivann Sutherland. It had specialized software and motion control and was used for training as a standard. The Sensorama by Morton Heilig was used to immerse the user in a riding bike experience on the streets of Brooklyn. The single-user entertainment console produced stereoscopic display, stereo sound, odor via odor emitters, had fans, and a vibrating chair. </span></td></tr><tr class="row-6 even" data-dcnode-id="813"><td class="column-1" data-dcnode-id="817"><strong data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">1987</span></strong></td><td class="column-2" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Jaron Lanier coined the word virtual reality. He was the founder of Visual Programming Lab (VPL).</span></td></tr><tr class="row-7 odd" data-dcnode-id="804"><td class="column-1" data-dcnode-id="808"><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">1993</span></strong></td><td class="column-2" data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Sega VR headset announced at the Consumer Electronics Show. Meant for Sega Genesis console, it had an LCD screen, head tracking, and stereo sound. 4 games developed for it but never went beyond prototype. </span></td></tr><tr class="row-8 even" data-dcnode-id="795"><td class="column-1" data-dcnode-id="799"><strong data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">1995</span></strong></td><td class="column-2" data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">The first-ever portable console with true 3D graphics for gaming, the Nintendo Virtual Boy (VR-32). Lacked software support and uncomfortable to use. VR debuted in the public arena. </span></td></tr><tr class="row-9 odd" data-dcnode-id="786"><td class="column-1" data-dcnode-id="790"><strong data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">1999</span></strong></td><td class="column-2" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Wachowiski siblings’ film The Matrix had characters living in simulated world depicting VR. VR entered mainstream as a result of the movie’s cultural impact. </span></td></tr><tr class="row-10 even" data-dcnode-id="777"><td class="column-1" data-dcnode-id="781"><strong data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">21st Century</span></strong></td><td class="column-2" data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Boom of HD display and 3D graphics-capable smartphones make it possible for lightweight, practical and accessible VR. Consumer VR in the video game industry. Depth sensing cameras, motion controllers, and natural human interfaces enabled better human-computer interactions. </span></td></tr><tr class="row-11 odd" data-dcnode-id="768"><td class="column-1" data-dcnode-id="772"><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">2014</span></strong></td><td class="column-2" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Facebook bought Oculus VR, developed VR chat rooms.</span></td></tr><tr class="row-12 even" data-dcnode-id="759"><td class="column-1" data-dcnode-id="763"><strong data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">2017</span></strong></td><td class="column-2" data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Multiple VR devices in commercial and non-commercial applications High-end P.C.-tethered headsets, smartphone VR, cardboards, WebVR, etc. </span></td></tr><tr class="row-13 odd" data-dcnode-id="750"><td class="column-1" data-dcnode-id="754"><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">2019</span></strong></td><td class="column-2" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Wireless high-end headsets</span></td></tr></tbody></table><span data-dcnode-id="745" instrument_node="">
</span></div><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">VR appears to be developed hand-in-hand with Augmented Reality technology.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="737"><strong data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Development of AR technology. </span></strong></p><span data-dcnode-id="736" instrument_node="">
