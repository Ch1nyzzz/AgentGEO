</span></section><span data-dcnode-id="3296" instrument_node=""> </span><section class="section definition-section" data-dcnode-id="921" data-menu-title="Definition" id="content-body"><span data-dcnode-id="3295" instrument_node="">
</span><section class="section main-article-chapter" data-dcnode-id="3262" data-menu-title="What is virtual?"><span data-dcnode-id="3294" instrument_node="">
</span><h3 class="section-title" data-dcnode-id="3291"><i class="icon" data-dcnode-id="3293" data-icon="1"></i><span data-dcnode-id="3292" instrument_node="">What is virtual?</span></h3><span data-dcnode-id="3290" instrument_node="">
</span><p data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">In computing, the term virtual refers to a digitally replicated version of something real, whether it's a machine, a switch, memory or even reality. It is distinguished from the real by the fact that it lacks an absolute, physical form. However, functionally it is no less real.</span></p><span data-dcnode-id="3287" instrument_node="">
</span><p data-dcnode-id="3279"><span data-dcnode-id="3286" instrument_node="">The replication, which is created with </span><a data-dcnode-id="3284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchapparchitecture/definition/software"><span data-dcnode-id="3285" instrument_node="">software</span></a><span data-dcnode-id="3283" instrument_node="">, may not be an exact copy of the actual item, but it is similar enough in essence to be described as a digital </span><a data-dcnode-id="3281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/whatis/definition/rendering"><span data-dcnode-id="3282" instrument_node="">rendition</span></a><span data-dcnode-id="3280" instrument_node="">, and useful enough to support enterprise business needs.</span></p><span data-dcnode-id="3278" instrument_node="">
</span><figure class="main-article-image full-col" data-dcnode-id="3264" data-img-fullsize="https://cdn.ttgtmedia.com/rms/onlineImages/server_virtualization-traditional_virtual_architecture.jpg"><span data-dcnode-id="3277" instrument_node="">
</span><img alt="Traditional and virtual architecture" class="lazy" data-dcnode-id="3276" data-src="https://cdn.ttgtmedia.com/rms/onlineImages/server_virtualization-traditional_virtual_architecture_mobile.jpg" data-srcset="https://cdn.ttgtmedia.com/rms/onlineImages/server_virtualization-traditional_virtual_architecture_mobile.jpg 960w,https://cdn.ttgtmedia.com/rms/onlineImages/server_virtualization-traditional_virtual_architecture.jpg 1280w" height="314" width="560"><span data-dcnode-id="3275" instrument_node="">
</span><figcaption data-dcnode-id="3271"><span data-dcnode-id="3274" instrument_node="">
</span><i class="icon pictures" data-dcnode-id="3273" data-icon="z"></i><span data-dcnode-id="3272" instrument_node="">How traditional and virtual IT architectures differ
  </span></figcaption><span data-dcnode-id="3270" instrument_node="">
</span><div class="main-article-image-enlarge" data-dcnode-id="3266"><span data-dcnode-id="3269" instrument_node="">
</span><i class="icon" data-dcnode-id="3268" data-icon="w"></i><span data-dcnode-id="3267" instrument_node="">
</span></div><span data-dcnode-id="3265" instrument_node="">
</span></figure><span data-dcnode-id="3263" instrument_node="">
</span></section><span data-dcnode-id="3261" instrument_node="">
</span><section class="section main-article-chapter" data-dcnode-id="2715" data-menu-title="What is virtual computing?"><span data-dcnode-id="3260" instrument_node="">
</span><h3 class="section-title" data-dcnode-id="3257"><i class="icon" data-dcnode-id="3259" data-icon="1"></i><span data-dcnode-id="3258" instrument_node="">What is virtual computing?</span></h3><span data-dcnode-id="3256" instrument_node="">
</span><p data-dcnode-id="3251"><span data-dcnode-id="3255" instrument_node="">Virtual computing is the idea that one physical computer can act like many computers. It enables users to remotely access a computer from their local device. It also allows them to download and use more than one </span><a data-dcnode-id="3253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/whatis/definition/operating-system-OS"><span data-dcnode-id="3254" instrument_node="">operating system</span></a><span data-dcnode-id="3252" instrument_node="">, simultaneously perform multiple functions and get all the benefits of additional hardware and software without having to purchase or install them on their local system.</span></p><span data-dcnode-id="3250" instrument_node="">
</span><p data-dcnode-id="3242"><span data-dcnode-id="3249" instrument_node="">Users gain access to the remote computer via the </span><a data-dcnode-id="3247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/whatis/definition/Internet"><span data-dcnode-id="3248" instrument_node="">internet</span></a><span data-dcnode-id="3246" instrument_node=""> through a </span><a data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchmobilecomputing/definition/wireless"><span data-dcnode-id="3245" instrument_node="">wireless</span></a><span data-dcnode-id="3243" instrument_node=""> or network server, and log in via a specialized software. Once they log in, they can perform many tasks via their local device's keyboard, mouse or other tools.</span></p><span data-dcnode-id="3241" instrument_node="">
</span><p data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">Virtual computing is a real-time technology that enables users to remotely access:</span></p><span data-dcnode-id="3238" instrument_node="">
</span><ul class="default-list" data-dcnode-id="3219"><span data-dcnode-id="3237" instrument_node="">
</span><li data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">Operating systems</span></li><span data-dcnode-id="3234" instrument_node="">
</span><li data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">Software</span></li><span data-dcnode-id="3231" instrument_node="">
</span><li data-dcnode-id="3228"><a data-dcnode-id="3229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/whatis/definition/memory"><span data-dcnode-id="3230" instrument_node="">Memory</span></a></li><span data-dcnode-id="3227" instrument_node="">
</span><li data-dcnode-id="3224"><a data-dcnode-id="3225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchstorage/definition/storage"><span data-dcnode-id="3226" instrument_node="">Storage</span></a></li><span data-dcnode-id="3223" instrument_node="">
</span><li data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">Other IT network-attached resources</span></li><span data-dcnode-id="3220" instrument_node="">
</span></ul><span data-dcnode-id="3218" instrument_node="">

</span><ul class="default-list" data-dcnode-id="2673"><span data-dcnode-id="2703" instrument_node="">
</span><li data-dcnode-id="2699"><a data-dcnode-id="2701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchsecurity/definition/remote-access"><span data-dcnode-id="2702" instrument_node="">remote access</span></a><span data-dcnode-id="2700" instrument_node="">;</span></li><span data-dcnode-id="2698" instrument_node="">
</span><li data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">increased storage space;</span></li><span data-dcnode-id="2695" instrument_node="">
</span><li data-dcnode-id="2690"><span data-dcnode-id="2694" instrument_node="">data </span><a data-dcnode-id="2692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchdatabackup/definition/backup"><span data-dcnode-id="2693" instrument_node="">backup</span></a><span data-dcnode-id="2691" instrument_node="">;</span></li><span data-dcnode-id="2689" instrument_node="">
</span><li data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">greater choice of software applications;</span></li><span data-dcnode-id="2686" instrument_node="">
</span><li data-dcnode-id="2681"><span data-dcnode-id="2685" instrument_node="">allocation and reallocation of </span><a data-dcnode-id="2683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/whatis/definition/input-output-I-O"><span data-dcnode-id="2684" instrument_node="">input/output</span></a><span data-dcnode-id="2682" instrument_node=""> and other processes; and</span></li><span data-dcnode-id="2680" instrument_node="">

ll" d="m 10,16 2,0 0,-4 4,0 0,-2 L 10,10 l 0,6 0,0 z" data-dcnode-id="2200" id="ytp-id-6"></path></use><path class="ytp-svg-fill" d="m 10,16 2,0 0,-4 4,0 0,-2 L 10,10 l 0,6 0,0 z" data-dcnode-id="2198" id="ytp-id-6"></path></g><g class="ytp-fullscreen-button-corner-1" data-dcnode-id="2193"><use class="ytp-svg-shadow" data-dcnode-id="2195" href="#ytp-id-7"><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="2196" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="2194" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="2189"><use class="ytp-svg-shadow" data-dcnode-id="2191" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="2192" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="2190" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="2185"><use class="ytp-svg-shadow" data-dcnode-id="2187" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2188" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2186" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=WIPi7l0d8Ww" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe><span data-dcnode-id="2171" instrument_node="">
</span></div><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">There are several benefits to using virtual computing. They are as follows:</span></p><span data-dcnode-id="2166" instrument_node="">
</span><ul class="default-list" data-dcnode-id="2146"><span data-dcnode-id="2165" instrument_node="">
</span><li data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Workers can check company email on the go.</span></li><span data-dcnode-id="2162" instrument_node="">
</span><li data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Employees can work remotely from home, a cafe or nearly anywhere.</span></li><span data-dcnode-id="2159" instrument_node="">
</span><li data-dcnode-id="2154"><span data-dcnode-id="2158" instrument_node="">Users can save or back up data and documents to a </span><a data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchnetworking/definition/virtual-server"><span data-dcnode-id="2157" instrument_node="">virtual server</span></a><span data-dcnode-id="2155" instrument_node="">.</span></li><span data-dcnode-id="2153" instrument_node="">
</span><li data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Students can access courses and course materials remotely.</span></li><span data-dcnode-id="2150" instrument_node="">
</span><li data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Managers can access documents or data remotely.</span></li><span data-dcnode-id="2147" instrument_node="">
</span></ul><span data-dcnode-id="2145" instrument_node="">
</span><p data-dcnode-id="2137"><span data-dcnode-id="2144" instrument_node="">Virtual computing helps expand the </span><a data-dcnode-id="2142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchcio/definition/enterprise-IT-enterprise-class-IT"><span data-dcnode-id="2143" instrument_node="">enterprise IT</span></a><span data-dcnode-id="2141" instrument_node=""> environment to users who are not in the same location as the resources they need to access. Allocating a computer's processes and resources to a virtual environment makes the system available for other processes and applications, which increases the overall efficiency of the system. It also frees up space on individual devices because users don't have to install, configure or store the </span><a data-dcnode-id="2139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/whatis/definition/IT-asset"><span data-dcnode-id="2140" instrument_node="">assets</span></a><span data-dcnode-id="2138" instrument_node=""> they need as they can be accessed remotely and on-demand.</span></p><span data-dcnode-id="2136" instrument_node="">
</span><p data-dcnode-id="2131"><span data-dcnode-id="2135" instrument_node="">Virtual computing also improves the speed, accessibility and performance of </span><a data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchitoperations/definition/IT-operations"><span data-dcnode-id="2134" instrument_node="">IT operations</span></a><span data-dcnode-id="2132" instrument_node=""> and users. And resource-sharing through virtual computing eliminates the need to operate multiple computers and servers, which reduces cooling and power costs.</span></p><span data-dcnode-id="2130" instrument_node="">
</span><figure class="main-article-image full-col" data-dcnode-id="2116" data-img-fullsize="https://cdn.ttgtmedia.com/rms/onlineimages/server_virt-virtual_servers_vs_physical-f.png"><span data-dcnode-id="2129" instrument_node="">
</span><img alt="Physical servers and virtual servers" class="lazy" data-dcnode-id="2128" data-src="https://cdn.ttgtmedia.com/rms/onlineimages/server_virt-virtual_servers_vs_physical-f_mobile.png" data-srcset="https://cdn.ttgtmedia.com/rms/onlineimages/server_virt-virtual_servers_vs_physical-f_mobile.png 960w,https://cdn.ttgtmedia.com/rms/onlineimages/server_virt-virtual_servers_vs_physical-f.png 1280w" height="409" width="560"><span data-dcnode-id="2127" instrument_node="">
</span><figcaption data-dcnode-id="2123"><span data-dcnode-id="2126" instrument_node="">
</span><i class="icon pictures" data-dcnode-id="2125" data-icon="z"></i><span data-dcnode-id="2124" instrument_node="">Physical servers vs. virtual servers
  </span></figcaption><span data-dcnode-id="2122" instrument_node="">
</span><div class="main-article-image-enlarge" data-dcnode-id="2118"><span data-dcnode-id="2121" instrument_node="">
</span><i class="icon" data-dcnode-id="2120" data-icon="w"></i><span data-dcnode-id="2119" instrument_node="">
</span></div><span data-dcnode-id="2117" instrument_node="">
</span></figure><span data-dcnode-id="2115" instrument_node="">
</span></section><span data-dcnode-id="2113" instrument_node="">
</span><section class="section main-article-chapter" data-dcnode-id="993" data-menu-title="Applications of virtual computing"><span data-dcnode-id="2112" instrument_node="">
</span><h3 class="section-title" data-dcnode-id="2109"><i class="icon" data-dcnode-id="2111" data-icon="1"></i><span data-dcnode-id="2110" instrument_node="">Applications of virtual computing</span></h3><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2103"><span data-dcnode-id="2107" instrument_node="">Virtual computing plays a crucial role in modern-day information technology (</span><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchdatacenter/definition/IT"><span data-dcnode-id="2106" instrument_node="">IT</span></a><span data-dcnode-id="2104" instrument_node="">) architectures. It has a number of real-world applications, including:</span></p><span data-dcnode-id="2102" instrument_node="">
</span><ul class="default-list" data-dcnode-id="2067"><span data-dcnode-id="2101" instrument_node="">
</span><ul class="default-list" data-dcnode-id="2069"><span data-dcnode-id="2100" instrument_node="">
</span><li data-dcnode-id="2091"><strong data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">Virtual Reality (</span></strong><a data-dcnode-id="2095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/whatis/definition/virtual-reality"><strong data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">VR</span></strong></a><strong data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">).</span></strong><span data-dcnode-id="2092" instrument_node=""> VR is an artificial environment that offers immersive audio and visual experiences to users. These experiences are usually presented through specialized equipment. While the experience is fairly realistic, the users' physical reality does not exhibit any change.</span></li><span data-dcnode-id="2090" instrument_node="">
</span><li data-dcnode-id="2082"><strong data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">Hardware virtualization.</span></strong><span data-dcnode-id="2087" instrument_node=""> </span><a data-dcnode-id="2084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//searchservervirtualization.techtarget.com/definition/hardware-virtualization"><strong data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Hardware virtualization</span></strong></a><span data-dcnode-id="2083" instrument_node=""> is the creation of a software version of a physical device. It can also involve bringing multiple hardware pieces together across geographical distances.</span></li><span data-dcnode-id="2081" instrument_node="">
</span><li data-dcnode-id="2071"><a data-dcnode-id="2078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchstorage/definition/virtual-memory"><strong data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Virtual memory</span></strong></a><strong data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">.</span></strong><span data-dcnode-id="2075" instrument_node=""> It refers to a nonphysical set of memory addresses or locations that are treated as physical memory when a program or application is executed. It allows a computer to compensate for physical memory shortages by temporarily transferring data from the device </span><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchstorage/definition/RAM-random-access-memory"><span data-dcnode-id="2074" instrument_node="">RAM</span></a><span data-dcnode-id="2072" instrument_node=""> to disk storage.</span></li><span data-dcnode-id="2070" instrument_node="">
</span></ul><span data-dcnode-id="2068" instrument_node="">
</span></ul><span data-dcnode-id="2066" instrument_node="">
</span><figure class="main-article-image full-col" data-dcnode-id="2052" data-img-fullsize="https://cdn.ttgtmedia.com/rms/onlineimages/whatis-virtual%20_vs_physical_memory-f.png"><span data-dcnode-id="2065" instrument_node="">
</span><img alt="Virtual vs. physical memory" class="lazy" data-dcnode-id="2064" data-src="https://cdn.ttgtmedia.com/rms/onlineimages/whatis-virtual%20_vs_physical_memory-f_mobile.png" data-srcset="https://cdn.ttgtmedia.com/rms/onlineimages/whatis-virtual%20_vs_physical_memory-f_mobile.png 960w,https://cdn.ttgtmedia.com/rms/onlineimages/whatis-virtual%20_vs_physical_memory-f.png 1280w" height="284" width="560"><span data-dcnode-id="2063" instrument_node="">
</span><figcaption data-dcnode-id="2059"><span data-dcnode-id="2062" instrument_node="">
</span><i class="icon pictures" data-dcnode-id="2061" data-icon="z"></i><span data-dcnode-id="2060" instrument_node="">The differences between using virtual memory and physical memory
  </span></figcaption><span data-dcnode-id="2058" instrument_node="">
</span><div class="main-article-image-enlarge" data-dcnode-id="2054"><span data-dcnode-id="2057" instrument_node="">
</span><i class="icon" data-dcnode-id="2056" data-icon="w"></i><span data-dcnode-id="2055" instrument_node="">
</span></div><span data-dcnode-id="2053" instrument_node="">
</span></figure><span data-dcnode-id="2051" instrument_node="">
</span><ul class="default-list" data-dcnode-id="2023"><span data-dcnode-id="2050" instrument_node="">
</span><li data-dcnode-id="2043"><strong data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Virtual assistant.</span></strong><span data-dcnode-id="2047" instrument_node=""> A </span><a data-dcnode-id="2045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchcustomerexperience/definition/virtual-assistant-AI-assistant"><span data-dcnode-id="2046" instrument_node="">virtual assistant</span></a><span data-dcnode-id="2044" instrument_node=""> is a program or device that understands human languages to some extent, and performs tasks based on the spoken requests or requirements. Amazon's Alexa and Apple's Siri are examples of popular virtual assistants.</span></li><span data-dcnode-id="2042" instrument_node="">
</span><li data-dcnode-id="2035"><strong data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Virtual agent.</span></strong><span data-dcnode-id="2039" instrument_node=""> A </span><a data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/searchcustomerexperience/definition/virtual-agent"><span data-dcnode-id="2038" instrument_node="">virtual agent</span></a><span data-dcnode-id="2036" instrument_node=""> is an automated chatbot or voicebot that provides customer service without the need for human intervention.</span></li><span data-dcnode-id="2034" instrument_node="">
</span><li data-dcnode-id="2025"><strong data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">Virtual machine (</span></strong><a data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//searchservervirtualization.techtarget.com/definition/virtual-machine"><strong data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">VM</span></strong></a><strong data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">).</span></strong><span data-dcnode-id="2026" instrument_node=""> A VM is an OS or application environment that displays the characteristics of dedicated hardware in a virtual environment.</span></li><span data-dcnode-id="2024" instrument_node="">

</span><section class="section main-article-chapter" data-dcnode-id="922" data-menu-title="Does virtual mean it's not real?"><span data-dcnode-id="991" instrument_node="">
</span><h3 class="section-title" data-dcnode-id="988"><i class="icon" data-dcnode-id="990" data-icon="1"></i><span data-dcnode-id="989" instrument_node="">Does virtual mean it's not real?</span></h3><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Just because something is virtual doesn't make it any less real. Virtual is more about the environment where online activities take place, rather than the activities themselves.</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="983" instrument_node="">For instance, a </span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/whatis/definition/virtual-trade-shows"><span data-dcnode-id="982" instrument_node="">virtual trade show</span></a><span data-dcnode-id="980" instrument_node=""> refers to an event that takes place in a computer-based virtual venue rather than in a physical venue. The event lacks a physical form, but it is no less real than any regular event held in the "real" world.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="977" instrument_node="">Similarly, </span><a data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techtarget.com/whatis/definition/virtual-learning-environment-VLE-or-managed-learning-environment-MLE"><span data-dcnode-id="976" instrument_node="">virtual learning</span></a><span data-dcnode-id="974" instrument_node=""> enables students to remotely access learning resources in a virtual environment. They can view videos, communicate with other students and even participate in live lectures from their local device. Thus, they learn in a "virtual classroom," which doesn't have a physical form, but still exists for all practical purposes.</span></p><span data-dcnode-id="972" instrument_node="">
</span><figure class="main-article-image full-col" data-dcnode-id="958" data-img-fullsize="https://cdn.ttgtmedia.com/rms/onlineImages/whatis-webbased_training_elearning-f.png"><span data-dcnode-id="971" instrument_node="">
