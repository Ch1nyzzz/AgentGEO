745" instrument_node="">Android</span></a></p><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Five Nights at Freddy’s AR is an augmented reality horror game. It came out in 2019, but constant updates make it feel like a new AR game. It uses your location to send animatronics after you or your friends as you scavenge for supplies.</span></p><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">You are a night guard in charge of watching different security cameras for animatronic toys who come to life. As you switch between cameras, you use up your limited amount of power that you have for each level. If you run out of power, watch out!&nbsp;</span></p><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Audio and visual sequences used are unique to each character and will keep you glued to your smartphone. Five Nights at Freddy’s AR is available on both iOS and Android.</span></p><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="716"><div class="wp-block-embed__wrapper" data-dcnode-id="717"><div class="lyte-wrapper" data-dcnode-id="719" style="width:640px;max-width:100%;margin:5px auto;" title="Five Nights at Freddy&amp;#039;s AR: Special Delivery - Official Annoucement Trailer"><div class="lyte hidef lP" data-dcnode-id="720" id="WYL_QTLV-rTLLaI" itemprop="video" itemscope="" itemtype="https://schema.org/VideoObject"><div data-dcnode-id="732"><meta content="https://arvrtips.com/wp-content/plugins/wp-youtube-lyte/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2FQTLV-rTLLaI%2Fmaxresdefault.jpg" data-dcnode-id="736" itemprop="thumbnailUrl"><meta content="https://www.youtube.com/embed/QTLV-rTLLaI" data-dcnode-id="735" itemprop="embedURL"><meta content="PT39S" data-dcnode-id="734" itemprop="duration"><meta content="2019-09-13T17:27:16Z" data-dcnode-id="733" itemprop="uploadDate"></div><div class="pL" data-dcnode-i AY THE WALKING DEAD OUR WORLD" width="640" height="340" /&gt;&lt;br /&gt;Watch this video on YouTube&lt;/a&gt;</span></noscript><meta content="Watch my Our World Survival Guide: https://youtu.be/6q8iVhl_LJE Thanks for watching. Any constructive feedback is welcome in the comments below. this was all very new for me and I see a lot of things I can improve in my next video. But I would love to hear what you would like to see different next time. Hope to see you then The Walking Dead: Our World is a first-of-a-kind location based augmented reality mobile game that immerses you into the zombie apocalypse. Defend your surroundings by fighting walkers on the streets, in the park, on your sofa - wherever you are and whenever you feel like it. Join forces with Rick, Daryl, Michonne and all your favorite characters from AMC’s The Walking Dead. • FIGHT walkers in real-world AR environments based on your location • EXPLORE the world around you, find walkers, clear your surroundings and leave your mark on the map for other players to find • COLLECT legendary characters, weapons and items from AMC’s The Walking Dead • COOPERATE in weekly challenges with other players in groups for bigger rewards • UNITE with other players, save survivors, build shelters and reclaim your city from the walker threat • SHARE your best apocalyptic moments for other players and for the whole world to enjoy And remember: Aim for the head. Music: Song &quot;A Place I Know&quot; appearing on &quot;Cullahnary School&quot; (2014) by Cullah Available at: http://www.cullah.com Under CC BY SA license http://creativecommons.org/licenses/by-sa/4.0/ Music: Song &quot;Please Bring Me Shelter&quot; appearing on &quot;Cullahnary School&quot; (2014) by Cullah Available at: http://www.cullah.com Under CC BY SA license http://creativecommons.org/licenses/by-sa/4.0/ SOCIAL: https://twitter.com/RonfoxTV This content is not affiliated with, endorsed by, sponsored by or specifically approved by Next Games or its partners
