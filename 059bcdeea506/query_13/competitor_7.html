</span><div class="post-content-container" data-dcnode-id="942"><span data-dcnode-id="1859" instrument_node="">
</span><div class="post-content entry-content cf" data-dcnode-id="944"><span data-dcnode-id="1858" instrument_node="">
</span><div class="wp-remixd-voice-wrapper" data-dcnode-id="1854"><div class="remixd-audio-player" data-dcnode-id="1856" style="position: relative;"><iframe class="remixd-frame" data-dcnode-id="1857" data-desktop="" style="border: none;" theme="light"></iframe></div></div><p data-dcnode-id="1837"><span data-dcnode-id="1853" instrument_node="">Everyone says that augmented reality (AR) will be bigger than virtual reality (VR): </span><a data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.digi-capital.com/news/2016/04/the-reality-of-120-billion-arvr-business-models/%23.WAuaqpMrKgQ" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1852" instrument_node="">analysts</span></a><span data-dcnode-id="1850" instrument_node="">, </span><a data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//angel.co/augmented-reality/investors" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1849" instrument_node="">investors</span></a><span data-dcnode-id="1847" instrument_node="">, </span><a data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theverge.com/2016/9/14/12913770/tim-cook-augmented-virtual-reality-apple-comments" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1846" instrument_node="">technologists</span></a><span data-dcnode-id="1844" instrument_node="">, and </span><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theverge.com/2014/12/16/7402489/neal-stephenson-joins-mysterious-augmented-reality-company-magic-leap" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1843" instrument_node="">futurists</span></a><span data-dcnode-id="1841" instrument_node=""> alike. But because you’re much likelier to hear about VR today, </span><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/touch-playstation-vr-google/"><span data-dcnode-id="1840" instrument_node="">especially this month</span></a><span data-dcnode-id="1838" instrument_node=""> with the launches of Playstation VR, Google Daydream, and Oculus Touch, AR can feel distant and overhyped.</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">This gigantic list of future AR use cases should get you reeling with the possibilities. Although most of these are future applications, they’ll arrive within the next 10 to 15 years. Let’s make this a living document: if I missed a major use of AR, comment below and I’ll add it.</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Three quick notes before we start. First, let’s clarify the difference between AR and VR.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><blockquote data-dcnode-id="1826"><p data-dcnode-id="1827"><em data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">VR blocks out the real world and immerses the user in a digital experience.</span></em></p></blockquote><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">If you’re putting on a headset in your living room and suddenly transported to a zombie attack scenario, that’s VR.</span></p><span data-dcnode-id="1822" instrument_node="">
</span><blockquote data-dcnode-id="1818"><p data-dcnode-id="1819"><em data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">AR adds digital elements on top of the real world.</span></em></p></blockquote><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">If you’re walking down the street in real life and a Dragonite pops up on the sidewalk, that’s AR.</span></p><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1813" instrument_node="">Second, most use cases for VR prioritize interaction with the virtual world over the physical one. Because you’re fully immersed in a screen, you aren’t interacting much with the real world. Many of VR’s limitations today involve avoiding awkward interactions with the real world, like bumping into walls in room scale or the social acceptability of immersing yourself in a mobile headset while in a public place like a train. Because users generally stay in a single spot or small area in VR, the medium lends itself well to uses like gaming, watching videos, and education.</span><a data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/AR-headsets.png" rel="mfp"><img alt="ar-headsets" class="size-full wp-image-22071 aligncenter" data-dcnode-id="1812" height="919" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/AR-headsets.png&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/AR-headsets.png 1500w, https://uploadvr.com/wp-content/uploads/2016/10/AR-headsets-300x184.png 300w, https://uploadvr.com/wp-content/uploads/2016/10/AR-headsets-768x471.png 768w, https://uploadvr.com/wp-content/uploads/2016/10/AR-headsets-1024x627.png 1024w, https://uploadvr.com/wp-content/uploads/2016/10/AR-headsets-16x10.png 16w, https://uploadvr.com/wp-content/uploads/2016/10/AR-headsets-32x20.png 32w, https://uploadvr.com/wp-content/uploads/2016/10/AR-headsets-28x17.png 28w, https://uploadvr.com/wp-content/uploads/2016/10/AR-headsets-56x34.png 56w, https://uploadvr.com/wp-content/uploads/2016/10/AR-headsets-64x39.png 64w, https://uploadvr.com/wp-content/uploads/2016/10/AR-headsets-1000x613.png 1000w, https://uploadvr.com/wp-content/uploads/2016/10/AR-headsets-1200x735.png 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">AR is more focused on bridging digital and physical spaces. It accompanies you as you move through the world and augments your activities with information, whereas you typically step out of that world to immerse yourself in VR. When we talk about AR headsets, they’re big helmet-like visors now, but they’re heading toward normal-looking glasses and ultimately contact lenses.</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1805" instrument_node="">Third, AR and VR are converging into the same thing. Our ability to tell what’s “real” and not digital will decrease as graphics get increasingly better. An AR sign outside a building could be as real and as significant as a physical one if everyone is using AR tech, everyone sees it when they walk by, and it is persistent in that location. Ultimately, we’ll have hardware that lets us </span><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/high-end-vr-future/"><span data-dcnode-id="1804" instrument_node="">switch between AR and VR modes</span></a><span data-dcnode-id="1802" instrument_node="">, with less and more opacity for the context. We’re discussing AR and VR distinctly for now because they’re developing separately and on different timelines.</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1797"><strong data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">6 quick (and key)&nbsp;AR concepts</span></strong></p><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1793"><a data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/facial-recognition.png" rel="mfp"><img alt="facial-recognition" class="size-full wp-image-22091 aligncenter" data-dcnode-id="1795" height="382" loading="lazy" sizes="(max-width: 777px) 100vw, 777px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/facial-recognition.png&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/facial-recognition.png 777w, https://uploadvr.com/wp-content/uploads/2016/10/facial-recognition-300x147.png 300w, https://uploadvr.com/wp-content/uploads/2016/10/facial-recognition-768x378.png 768w, https://uploadvr.com/wp-content/uploads/2016/10/facial-recognition-16x8.png 16w, https://uploadvr.com/wp-content/uploads/2016/10/facial-recognition-32x16.png 32w, https://uploadvr.com/wp-content/uploads/2016/10/facial-recognition-28x14.png 28w, https://uploadvr.com/wp-content/uploads/2016/10/facial-recognition-56x28.png 56w, https://uploadvr.com/wp-content/uploads/2016/10/facial-recognition-64x31.png 64w" title="The Gigantic List of Augmented Reality Use Cases" width="777"></a></p><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">These underscore most of the AR use cases in the list, so it’s helpful to understand them:</span></p><span data-dcnode-id="1789" instrument_node="">
</span><ol data-dcnode-id="1780"><span data-dcnode-id="1788" instrument_node="">
</span><li data-dcnode-id="1782"><em data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node=""> Sentiment analysis: </span></em><span data-dcnode-id="1785" instrument_node="">scan a person, or a group of people, and run apps to analyze body language, micro-expressions, language, and behavior. Get real-time feedback on how that person or group appears to be feeling or reacting, and adjust accordingly.</span><em data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">&nbsp;</span></em></li><span data-dcnode-id="1781" instrument_node="">
</span></ol><span data-dcnode-id="1779" instrument_node="">
</span><ol data-dcnode-id="1772" start="2"><span data-dcnode-id="1778" instrument_node="">
</span><li data-dcnode-id="1774"><em data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node=""> Facial recognition: </span></em><span data-dcnode-id="1775" instrument_node="">scan a face and match it to an existing identity database to learn a person’s name and background information just by looking at him or her.</span></li><span data-dcnode-id="1773" instrument_node="">
</span></ol><span data-dcnode-id="1771" instrument_node="">
</span><ol data-dcnode-id="1764" start="3"><span data-dcnode-id="1770" instrument_node="">
</span><li data-dcnode-id="1766"><em data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node=""> Object identification: </span></em><span data-dcnode-id="1767" instrument_node="">use computer vision to detect and identify objects and track their physical location. This includes tracking the AR user’s location in relation to objects.</span></li><span data-dcnode-id="1765" instrument_node="">
</span></ol><span data-dcnode-id="1763" instrument_node="">
</span><ol data-dcnode-id="1756" start="4"><span data-dcnode-id="1762" instrument_node="">
</span><li data-dcnode-id="1758"><em data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node=""> Information augmentation and display: </span></em><span data-dcnode-id="1759" instrument_node="">once an object or person is identified, automatically search for information about it and display it to the AR user.</span></li><span data-dcnode-id="1757" instrument_node="">
</span></ol><span data-dcnode-id="1755" instrument_node="">
</span><ol data-dcnode-id="1748" start="5"><span data-dcnode-id="1754" instrument_node="">
</span><li data-dcnode-id="1750"><em data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node=""> Porting from mobile phones to AR headsets: </span></em><span data-dcnode-id="1751" instrument_node="">generally, AR moves a user’s attention from downward-facing on a phone to forward-facing in a headset. Almost anything that can be done on a phone (or any display device, really) will be done in AR.</span></li><span data-dcnode-id="1749" instrument_node="">
</span></ol><span data-dcnode-id="1747" instrument_node="">
</span><ol data-dcnode-id="1740" start="6"><span data-dcnode-id="1746" instrument_node="">
</span><li data-dcnode-id="1742"><em data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node=""> Processing, sensing, and scanning: </span></em><span data-dcnode-id="1743" instrument_node="">AR devices will contain their own processing units. To start, they’ll be big, clunky, and may be housed externally and connected to the headset, but they’ll get much smaller until they’re an indistinguishable part of the AR glasses. They’ll also be able to track wearers’ movements and locations and take rapid 3D scans of wearers and environments to project them elsewhere.</span></li><span data-dcnode-id="1741" instrument_node="">
</span></ol><span data-dcnode-id="1739" instrument_node="">
</span><hr data-dcnode-id="1738"><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">And now onto the list:</span></p><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1731"><strong data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Productivity and work</span></strong></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1727"><a data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/productivity.jpeg" rel="mfp"><img alt="productivity" class="alignright size-full wp-image-22083" data-dcnode-id="1729" height="1002" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/productivity.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/productivity.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/productivity-300x200.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/productivity-768x513.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/productivity-1024x684.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/productivity-16x11.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/productivity-32x21.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/productivity-28x19.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/productivity-56x37.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/productivity-64x43.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/productivity-1000x668.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/productivity-1200x802.jpeg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1722"><em data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Screen creation:</span></em><span data-dcnode-id="1723" instrument_node=""> project high-resolution screens anywhere at any time. If you need a monitor, simply pull one up in your field of view and adjust the size. This will reduce reliance on display devices like TVs, computers, phones, and laptops.</span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1717"><em data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Conference calls:</span></em><span data-dcnode-id="1718" instrument_node=""> call participants see AR projections of each other as they talk, increasing engagement and attention.</span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1712"><em data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Real-time background checks: </span></em><span data-dcnode-id="1713" instrument_node="">upon meeting a person, pull up their online footprint. Today, that would include things like LinkedIn, their tweets, Instagram photos, significant Google search results, and more. Get instant context on a person’s background.</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1707"><em data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">3D modeling and design:</span></em><span data-dcnode-id="1708" instrument_node=""> mock up the real world. Create and view 3D models in physical space. View data and designs in new, interactive ways, like walking through a scatter plot in three dimensions.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1702"><em data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Browsing, note taking, writing, project management: </span></em><span data-dcnode-id="1703" instrument_node="">all day-to-day productivity tools will be available in and adapted to AR formats.</span></p><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1697"><em data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Personal assistant: </span></em><span data-dcnode-id="1698" instrument_node="">view your schedule in-real time as you move through your day, with alerts for changes, travel time, and other relevant items.</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1692"><em data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Collaboration: </span></em><span data-dcnode-id="1693" instrument_node="">POV sharing is the next generation of screen sharing, allowing easier collaboration.</span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1687"><em data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Measurement: </span></em><span data-dcnode-id="1688" instrument_node="">get length and distance between objects using AR’s tracking capabilities.</span></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1682"><em data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Monitoring: </span></em><span data-dcnode-id="1683" instrument_node="">customize a feed of anything you’d want updates on, like social media, your house, your kids, work dashboards, and the weather. Visualize your updates however you like, such as a data control room with lots of screens.</span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1677"><em data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">AR UI/UX:</span></em><span data-dcnode-id="1678" instrument_node=""> Because it is free of physical screens, AR makes greater use of controls through voice, hands and hand-tracking, and brain computer interfaces.</span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1672"><em data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Past interaction recall:</span></em><span data-dcnode-id="1673" instrument_node=""> using facial recognition tied to productivity tools like CRM and email, quickly recall the last times you interacted with a person, what you talked about, and any follow-ups. This is the AR equivalent of being a people person who always remembers the details about those in your life.</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1665"><em data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Research: </span></em><span data-dcnode-id="1668" instrument_node="">conduct real-time searches and get immediate answers. If you’re in a meeting and someone references a name you don’t know, use AR to look it up stealthily and display the results in your field of vision.</span><strong data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1661"><strong data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Psychology</span></strong></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1657"><a data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/psychology.jpeg" rel="mfp"><img alt="psychology" class="alignright size-full wp-image-22085" data-dcnode-id="1659" height="994" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/psychology.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/psychology.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/psychology-300x200.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/psychology-768x509.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/psychology-1024x679.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/psychology-16x11.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/psychology-32x21.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/psychology-28x19.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/psychology-56x37.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/psychology-64x42.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/psychology-1000x663.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/psychology-1200x795.jpeg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1652"><em data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Public speaking: </span></em><span data-dcnode-id="1653" instrument_node="">sample emotional response among a crowd to tell whether they’re reacting well to a speech and which parts they like best.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1647"><em data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Meetings: </span></em><span data-dcnode-id="1648" instrument_node="">tell how the person across from you feels about you and the subject matter.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1642"><em data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">User testing: </span></em><span data-dcnode-id="1643" instrument_node="">gain objective feedback from user and product testing, psychological experiments, and more, using sentiment analysis.</span></p><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1637"><em data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">EQ training:</span></em><span data-dcnode-id="1638" instrument_node=""> use training exercises and real-time feedback to help provide baselines for appropriate social interaction, such as amount of eye contact, when to make jokes, and how close to stand to another person. Special applicability to populations within the Autism spectrum.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1632"><em data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Empathy training: </span></em><span data-dcnode-id="1633" instrument_node="">put people in each other’s shoes to increase empathy. A man can see himself in AR as a woman, or a person can see herself as a different race. Sighted people can perceive the world the way that someone with cataracts or macular degeneration does.</span></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1624"><strong data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Home</span></strong><strong data-dcnode-id="1625"><span data-dcnode-id="1628" instrument_node="">&nbsp;</span><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/home.jpeg" rel="mfp"><img alt="home" class="alignright size-full wp-image-22078" data-dcnode-id="1627" height="1000" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/home.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/home.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/home-300x200.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/home-768x512.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/home-1024x683.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/home-16x11.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/home-32x21.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/home-28x19.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/home-56x37.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/home-64x43.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/home-1000x667.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/home-1200x800.jpeg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></strong></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1619"><em data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Interior design: </span></em><span data-dcnode-id="1620" instrument_node="">visualize changes to your living space before making them permanent, like different colored walls, art placement, or furniture layouts.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1614"><em data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Utility monitoring and control: </span></em><span data-dcnode-id="1615" instrument_node="">control IoT devices and monitor power consumption and current utility bills. Increase energy efficiency and have a better sense of what your monthly usage and costs will be.</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1609"><em data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Cleaning: </span></em><span data-dcnode-id="1610" instrument_node="">visualize areas to be cleaned and get reminders and percentage completion bars. An un-vacuumed carpet displays as red but changes to blue as you pass over areas.</span></p><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1604"><em data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Baby-proofing: </span></em><span data-dcnode-id="1605" instrument_node="">scan your living space to highlight hazardous objects and get recommendations on how to make them safe for young children.</span></p><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1600"><strong data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Transportation</span></strong></p><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1595"><strong data-dcnode-id="1596"><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/transportation.jpeg" rel="mfp"><img alt="transportation" class="alignright size-full wp-image-22089" data-dcnode-id="1598" height="965" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/transportation.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/transportation.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/transportation-300x193.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/transportation-768x494.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/transportation-1024x659.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/transportation-16x10.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/transportation-32x21.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/transportation-28x18.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/transportation-56x36.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/transportation-64x41.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/transportation-1000x643.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/transportation-1200x772.jpeg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></strong></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1590"><em data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">GPS directions:</span></em><span data-dcnode-id="1591" instrument_node=""> navigation superimposed on your field of view. Getting instructions while looking up at at the road should reduce distracted driving accidents caused by looking down at a phone.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1585"><em data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Collision avoidance:</span></em><span data-dcnode-id="1586" instrument_node=""> whether used by autonomous vehicles or AR-assisted drivers, computer vision detects and reacts to potential hazards more quickly than humans alone.</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1580"><em data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Hazard flagging:</span></em><span data-dcnode-id="1581" instrument_node=""> drivers and passengers flag dangers or slowdowns that will be visible to others using AR. Think Waze applied on top of the physical road.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1575"><em data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">In-building navigation:&nbsp;</span></em><span data-dcnode-id="1576" instrument_node="">overlay interior maps and directions in spaces like malls, schools, convention centers, and more.</span></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1568"><em data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Accident recording and analysis:</span></em><span data-dcnode-id="1571" instrument_node=""> AR users enabling point-of-view (POV) recording will have more evidence for fault determinations for accidents.</span><strong data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1560"><strong data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Education</span></strong><strong data-dcnode-id="1561"><span data-dcnode-id="1564" instrument_node="">&nbsp;</span><a data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/education.jpeg" rel="mfp"><img alt="education" class="alignright size-full wp-image-22074" data-dcnode-id="1563" height="1126" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/education.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/education.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/education-300x225.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/education-768x577.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/education-1024x769.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/education-16x12.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/education-32x24.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/education-28x21.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/education-56x42.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/education-64x48.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/education-1000x751.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/education-1200x901.jpeg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></strong></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1555"><em data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Instruction and repair:</span></em><span data-dcnode-id="1556" instrument_node=""> visualize the steps to assemble and repair things, from cars to furniture to malfunctioning components on a space station. Replaces owner’s manuals and setup guides.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1550"><em data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Astronomy:</span></em><span data-dcnode-id="1551" instrument_node=""> look up at the night sky to identify planets, constellations, meteors, and other celestial bodies.</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1545"><em data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Job training:</span></em><span data-dcnode-id="1546" instrument_node=""> trainees can onboard and pick up new job skills faster with AR instructions and remote supervision.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1540"><em data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Classroom enhancements: </span></em><span data-dcnode-id="1541" instrument_node="">use AR course materials to delve deeper into study topics. Teachers can quiz students live and see their answers displayed above them. Students can work remotely on group projects and homework. Teachers can detect which students are not engaged or paying attention and focus on them. See chemical reactions by combining digital elements without the danger of a real interaction.</span></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1535"><em data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Books:</span></em><span data-dcnode-id="1536" instrument_node=""> read a physical book with AR properties, like pop-out figures, optional links to extra information, or word definitions. Also read fully digital AR books on virtual screens.</span></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1531"><strong data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Law enforcement and legal</span></strong></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1527"><a data-dcnode-id="1528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/law-enforcement.jpeg" rel="mfp"><img alt="law-enforcement" class="alignright size-full wp-image-22079" data-dcnode-id="1529" height="1000" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/law-enforcement.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/law-enforcement.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/law-enforcement-300x200.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/law-enforcement-768x512.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/law-enforcement-1024x683.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/law-enforcement-16x11.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/law-enforcement-32x21.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/law-enforcement-28x19.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/law-enforcement-56x37.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/law-enforcement-64x43.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/law-enforcement-1000x667.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/law-enforcement-1200x800.jpeg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1522"><em data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Lie detection:</span></em><span data-dcnode-id="1523" instrument_node=""> analyze whether a person is likely to be telling the truth from micro-expressions, speech, and body language. Has broad implications in politics, negotiations, and relationships as well.</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1517"><em data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Sobriety testing:</span></em><span data-dcnode-id="1518" instrument_node=""> faster, more efficient means of analyzing sobriety by visual indicators like pupil dilation and body swaying than by traditional field sobriety tests.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1512"><em data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Suspect searches:</span></em><span data-dcnode-id="1513" instrument_node=""> find and identify suspects from facial scans on the street; may combine with other identifiers like gait analysis. Especially powerful if it’s crowdsourced among civilians’ AR equipment, but poses major privacy concerns.</span></p><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1507"><em data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Weapon or contraband detection: </span></em><span data-dcnode-id="1508" instrument_node="">scan for abnormal bulges under clothing and highlight to law enforcement for closer inspection.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1502"><em data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Jury selection and monitoring:</span></em><span data-dcnode-id="1503" instrument_node=""> more powerful jury insights using things like sentiment analysis and attention level to craft legal strategy.</span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1497"><em data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Crime scenes: </span></em><span data-dcnode-id="1498" instrument_node="">detect and highlight important areas of crime scenes for better analysis.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1492"><em data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Depositions and testimony:</span></em><span data-dcnode-id="1493" instrument_node=""> record depositions easily with AR equipment. Automatically compare statements given during testimony to those from depositions. Analyze witness behavior to glean insights into truthfulness and motivation.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1487"><em data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Contracts: </span></em><span data-dcnode-id="1488" instrument_node="">receive and sign documents in AR. Add verification with biometrics like voice or retina scans for greater security.</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1483"><strong data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Accessibility</span></strong></p><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1479"><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/accessibility.jpeg" rel="mfp"><img alt="accessibility" class="alignright size-full wp-image-22069" data-dcnode-id="1481" height="844" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/accessibility.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/accessibility.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/accessibility-300x169.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/accessibility-768x432.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/accessibility-1024x576.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/accessibility-16x9.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/accessibility-32x18.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/accessibility-28x16.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/accessibility-56x32.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/accessibility-64x36.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/accessibility-712x400.jpeg 712w, https://uploadvr.com/wp-content/uploads/2016/10/accessibility-1000x563.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/accessibility-1200x675.jpeg 1200w, https://uploadvr.com/wp-content/uploads/2016/10/accessibility-180x100.jpeg 180w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1474"><em data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Blind assistance:</span></em><span data-dcnode-id="1475" instrument_node=""> AR’s object recognition and voice interfaces can give blind users real-time information on what’s present and happening around them.</span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1469"><em data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Deaf assistance:</span></em><span data-dcnode-id="1470" instrument_node=""> users can receive auditory information translated into text cues in their AR devices, like a loudspeaker announcement on a plane or the screech of brakes.</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1464"><em data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Real-time translation:</span></em><span data-dcnode-id="1465" instrument_node=""> AR can convert foreign text or audio and display it back in the user’s native language.</span></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1459"><em data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Wheelchair maps: </span></em><span data-dcnode-id="1460" instrument_node="">receive AR maps that highlight wheelchair-friendly routes.</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1454"><em data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Magnification: </span></em><span data-dcnode-id="1455" instrument_node="">zoom and enhance small or far-away text so it’s legible.</span></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1450"><strong data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Medical</span></strong></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1445"><strong data-dcnode-id="1446"><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/medical.jpeg" rel="mfp"><img alt="medical" class="alignright size-full wp-image-22080" data-dcnode-id="1448" height="1000" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/medical.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/medical.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/medical-300x200.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/medical-768x512.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/medical-1024x683.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/medical-16x11.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/medical-32x21.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/medical-28x19.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/medical-56x37.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/medical-64x43.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/medical-1000x667.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/medical-1200x800.jpeg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></strong></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1440"><em data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Surgery assistance:</span></em><span data-dcnode-id="1441" instrument_node=""> identify organs and tissues during surgery and get instructions, whether from doctors observing your POV or knowledge-base applications you’re running.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1435"><em data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Medication identification:</span></em><span data-dcnode-id="1436" instrument_node=""> helps medical staff identify the right medications even if they aren’t trained to do so. Eases demand on pharmacists and doctors and reduces mistakes in administering medications and filling prescriptions.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1430"><em data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">IV insertion:</span></em><span data-dcnode-id="1431" instrument_node=""> lets medical staff find veins for IV insertion even if they aren’t easily detectable with the naked eye, and makes a first time insertion more likely.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1425"><em data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">More access to doctors:</span></em><span data-dcnode-id="1426" instrument_node=""> AR gives less experienced medical staff boosted abilities if a remote doctor views their POV stream and assists. Gives doctors more flexibility to work from varied locations and scales their expertise.</span></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1420"><em data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Symptom checking:</span></em><span data-dcnode-id="1421" instrument_node=""> lets patients check visual symptoms against medical databases or share real-time with doctors.</span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1415"><em data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Second opinions: </span></em><span data-dcnode-id="1416" instrument_node="">make collaboration with other doctors faster and easier, like looking at an X-ray, sharing your POV with another doctor, and talking through the results.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1406"><strong data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Politics</span></strong><strong data-dcnode-id="1407"><br data-dcnode-id="1411"><span data-dcnode-id="1410" instrument_node="">
</span><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/politics.jpg" rel="mfp"><img alt="politics" class="alignright size-full wp-image-22082" data-dcnode-id="1409" height="1032" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/politics.jpg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/politics.jpg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/politics-300x206.jpg 300w, https://uploadvr.com/wp-content/uploads/2016/10/politics-768x528.jpg 768w, https://uploadvr.com/wp-content/uploads/2016/10/politics-1024x705.jpg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/politics-16x11.jpg 16w, https://uploadvr.com/wp-content/uploads/2016/10/politics-32x22.jpg 32w, https://uploadvr.com/wp-content/uploads/2016/10/politics-28x19.jpg 28w, https://uploadvr.com/wp-content/uploads/2016/10/politics-56x39.jpg 56w, https://uploadvr.com/wp-content/uploads/2016/10/politics-64x44.jpg 64w, https://uploadvr.com/wp-content/uploads/2016/10/politics-1000x688.jpg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/politics-1200x826.jpg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></strong></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1401"><em data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Real-time fact-checking:</span></em><span data-dcnode-id="1402" instrument_node=""> lets audiences and politicians validate statements’ truthfulness.</span></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1396"><em data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">AR teleprompters: </span></em><span data-dcnode-id="1397" instrument_node="">politicians can read prepared speeches off AR displays without looking forced or unnatural. They can also pull up and read statements on issues during debates without necessarily understanding those issues.</span></p><span data-dcnode-id="1395" instrument_node="">
</span><p data-dcnode-id="1391"><em data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Crowd polling:</span></em><span data-dcnode-id="1392" instrument_node=""> gauge how a crowd is reacting to a politician via sentiment analysis, including their likelihood of supporting that candidate and shifts in their support.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1386"><em data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Donor recognition:</span></em><span data-dcnode-id="1387" instrument_node=""> lets politicians better support and engage with their donors by pointing them out in groups and providing background information like name and affiliation.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1382"><strong data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Military</span></strong></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1378"><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/military.jpg" rel="mfp"><img alt="military" class="alignright size-full wp-image-22081" data-dcnode-id="1380" height="996" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/military.jpg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/military.jpg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/military-300x200.jpg 300w, https://uploadvr.com/wp-content/uploads/2016/10/military-768x510.jpg 768w, https://uploadvr.com/wp-content/uploads/2016/10/military-1024x680.jpg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/military-16x11.jpg 16w, https://uploadvr.com/wp-content/uploads/2016/10/military-32x21.jpg 32w, https://uploadvr.com/wp-content/uploads/2016/10/military-28x19.jpg 28w, https://uploadvr.com/wp-content/uploads/2016/10/military-56x37.jpg 56w, https://uploadvr.com/wp-content/uploads/2016/10/military-64x42.jpg 64w, https://uploadvr.com/wp-content/uploads/2016/10/military-1000x664.jpg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/military-1200x797.jpg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1373"><em data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Dead drops:</span></em><span data-dcnode-id="1374" instrument_node=""> agents can leave objects for each other and flag them with AR signals visible only to a qualified recipient.</span></p><div class="ai-code-block ai-code-block-15" data-dcnode-id="1359" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1372" instrument_node="">
</span><span data-dcnode-id="1370" instrument_node="">
</span><div align="center" class="pubg-ad" data-dcnode-id="1369" data-pubg-id="pubg-6io-bug"></div><span data-dcnode-id="1368" instrument_node="">
</span><span data-dcnode-id="1365" instrument_node="">
</span><div align="center" class="pubg-ad" data-dcnode-id="1364" data-pubg-id="pubg-he3-cfd"></div><span data-dcnode-id="1363" instrument_node="">
</span><span data-dcnode-id="1360" instrument_node="">
</span></div><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1354"><em data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Friendly detection:</span></em><span data-dcnode-id="1355" instrument_node=""> exaggerated AR overlays for friendlies and civilians to minimize casualties. Friendlies and civilians could have bright blue auras surrounding them, while enemy combatants and vehicles have bright red auras.</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1349"><em data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Enhanced pilot vision: </span></em><span data-dcnode-id="1350" instrument_node="">identify targets, avoid obstacles, navigate, and aim with greater precision.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1344"><em data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Roadside bomb detection:</span></em><span data-dcnode-id="1345" instrument_node=""> bomb detection scan information is fed to back via AR and locations are highlighted to make avoidance easier.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1339"><em data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Weapon operations:</span></em><span data-dcnode-id="1340" instrument_node=""> real-time instructions on how to use weapons, vehicles, UAVs, and other resources.</span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1334"><em data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Status heads-up display: </span></em><span data-dcnode-id="1335" instrument_node="">display remaining ammo, food and water, personal and squad health, mission details, and other key information.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1330"><strong data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Art and culture</span></strong></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1326"><a data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/art.jpeg" rel="mfp"><img alt="art" class="alignright size-full wp-image-22072" data-dcnode-id="1328" height="1125" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/art.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/art.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/art-300x225.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/art-768x576.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/art-1024x768.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/art-16x12.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/art-32x24.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/art-28x21.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/art-56x42.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/art-64x48.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/art-1000x750.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/art-1200x900.jpeg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1321"><em data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Museum and city tours:</span></em><span data-dcnode-id="1322" instrument_node=""> learn about a museum’s exhibits and a city’s landmarks at your own pace as you walk through them.</span></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1316"><em data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Art analysis:</span></em><span data-dcnode-id="1317" instrument_node=""> see previous iterations of paintings superimposed on the final product and learn about the techniques the artist used.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1311"><em data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Art instruction: </span></em><span data-dcnode-id="1312" instrument_node="">follow step by step AR cues to learn to paint, draw, sculpt, etc.</span></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1306"><em data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Historical recreations:&nbsp;</span></em><span data-dcnode-id="1307" instrument_node="">see historical sites as they were before aging or destruction.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1301"><em data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Books:</span></em><span data-dcnode-id="1302" instrument_node=""> anchor a book in your field of vision so you can read while you’re walking or running. Read together with someone remote, like your child or a book club.</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1296"><em data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Nature trips: </span></em><span data-dcnode-id="1297" instrument_node="">identify species of plants and animals and learn about them. See where you’re most likely to spot different animals based on past recorded sightings.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1291"><em data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Song and artist recognition: </span></em><span data-dcnode-id="1292" instrument_node="">display names of artists and song titles for music you hear.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1287"><strong data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Shopping</span></strong></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1283"><a data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/shopping.jpeg" rel="mfp"><img alt="shopping" class="alignright size-full wp-image-22086" data-dcnode-id="1285" height="1001" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/shopping.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/shopping.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/shopping-300x200.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/shopping-768x513.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/shopping-1024x683.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/shopping-16x11.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/shopping-32x21.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/shopping-28x19.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/shopping-56x37.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/shopping-64x43.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/shopping-1000x667.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/shopping-1200x801.jpeg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1278"><em data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Clothes shopping:</span></em><span data-dcnode-id="1279" instrument_node=""> try on and buy clothes without leaving your house. Superimpose clothing on yourself and try different sizes and colors.</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1273"><em data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Furniture shopping:</span></em><span data-dcnode-id="1274" instrument_node=""> put AR models of furniture in your living space to see how they fit and which colors, finishes, and fabrics look best.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1268"><em data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Smart grocery shopping: </span></em><span data-dcnode-id="1269" instrument_node="">set shopping goals for things like nutrition, couponing, and recipes and your AR system highlights what to buy as you move through the aisles and gives you a path to follow.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1263"><em data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Personal styling:</span></em><span data-dcnode-id="1264" instrument_node=""> try out digital hair and makeup options.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1258"><em data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Body modifications: </span></em><span data-dcnode-id="1259" instrument_node="">see how tattoos, piercings, and plastic surgeries would look. Visualize yourself gaining or losing weight or muscle, or going up or down in age.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1253"><em data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Street buys:</span></em><span data-dcnode-id="1254" instrument_node=""> if you see something you like in the real world, get instant information about it and the option to buy. If someone walks by wearing sneakers you like, you can learn the brand, price, size and color options, and order instantly.</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1248"><em data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Showrooming: </span></em><span data-dcnode-id="1249" instrument_node="">easier, faster price comparisons across retailers for products you’re looking at in brick and mortar stores.</span></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1244"><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Social</span></strong></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1240"><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/social.jpeg" rel="mfp"><img alt="social" class="alignright size-full wp-image-22087" data-dcnode-id="1242" height="991" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/social.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/social.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/social-300x198.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/social-768x507.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/social-1024x677.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/social-16x11.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/social-32x21.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/social-28x18.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/social-56x37.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/social-64x42.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/social-1000x661.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/social-1200x793.jpeg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1235"><em data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Private clubs:</span></em><span data-dcnode-id="1236" instrument_node=""> mark otherwise nondescript entrances to physical spaces where private groups meet up. Someone who’s not a member of the group sees nothing; members see a sign or illuminated door, like an AR speakeasy.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1230"><em data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Date evaluation: </span></em><span data-dcnode-id="1231" instrument_node="">analyze a date as it’s happening, including how attracted your date is to you. Pull up background information on him or her to get to know interests and likes.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1225"><em data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Self-branding:</span></em><span data-dcnode-id="1226" instrument_node=""> choose short bits of biographic information to display about yourself to other AR users, like a virtual profile as you move through the world. Switch it to more personal and social on a weekend at a bar, or more career-oriented at a conference or meeting.</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1220"><em data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">POV vlogging:</span></em><span data-dcnode-id="1221" instrument_node=""> AR will make life-logging much more seamless. Broadcast what you’re seeing as you’re seeing it.</span></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1215"><em data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Status posts: </span></em><span data-dcnode-id="1216" instrument_node="">users can choose to set statuses around themselves that are visible to other people. Set “do not disturb” if you don’t want to be bothered, or “available” if you’re open to conversations. Display the song you’re listening to or a status update.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1210"><em data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Putting names to faces:</span></em><span data-dcnode-id="1211" instrument_node=""> scan faces to retrieve names. AR will be extremely useful to anyone who’s bad with names.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1205"><em data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">AR hangouts:</span></em><span data-dcnode-id="1206" instrument_node=""> project a friend into a hangout space using AR. If you’re both sitting on your couches in different cities, she’d see you on hers in Boston and you’d see her on yours in NYC. Friends can come together from different physical locations to watch movies, play games, and just hang out.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1201"><strong data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Food and restaurants</span></strong></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1197"><a data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/food.jpeg" rel="mfp"><img alt="food" class="alignright size-full wp-image-22076" data-dcnode-id="1199" height="1000" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/food.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/food.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/food-300x200.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/food-768x512.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/food-1024x683.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/food-16x11.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/food-32x21.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/food-28x19.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/food-56x37.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/food-64x43.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/food-1000x667.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/food-1200x800.jpeg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1190"><strong data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">&nbsp;</span></strong><em data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Restaurant reviews:</span></em><span data-dcnode-id="1191" instrument_node=""> see a restaurant’s rating and customer reviews as you pass by. Restaurants can also broadcast specials or events.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1185"><em data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Restaurant reservations and availability: </span></em><span data-dcnode-id="1186" instrument_node="">learn by glancing if a restaurant has open tables or how long the wait is.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1180"><em data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Allergy flags: </span></em><span data-dcnode-id="1181" instrument_node="">identify your allergies to display in food-related contexts. This way, restaurant staff can adhere to allergy restrictions without having to ask each guest.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1175"><em data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Food calorie scanning: </span></em><span data-dcnode-id="1176" instrument_node="">get fat, protein, carbohydrate, calorie, and nutritional information by looking at and scanning food.</span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1170"><em data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Diet auto-tracking:</span></em><span data-dcnode-id="1171" instrument_node=""> passively record everything you eat and drink to keep a running calorie and macro count for the day. Get notified when you’re over your caloric limit, and get recommendations on healthier options to swap in for what you’re about to eat.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1165"><em data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Cooking instructions: </span></em><span data-dcnode-id="1166" instrument_node="">how-to’s on making recipes you’ve chosen, including visual or other cues to help with measuring ingredients. Enables amateur cooks to step in for more experienced ones and scale production.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1160"><em data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Recipes based on inventory: </span></em><span data-dcnode-id="1161" instrument_node="">scan a fridge and kitchen and learn what you can make with the materials and equipment you have.</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1156"><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Fitness</span></strong></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1152"><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/fitness.jpeg" rel="mfp"><img alt="fitness" class="alignright size-full wp-image-22075" data-dcnode-id="1154" height="996" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/fitness.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/fitness.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/fitness-300x200.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/fitness-768x510.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/fitness-1024x680.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/fitness-16x11.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/fitness-32x21.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/fitness-28x19.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/fitness-56x37.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/fitness-64x42.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/fitness-1000x664.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/fitness-1200x797.jpeg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1147"><em data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Holographic personal trainers:</span></em><span data-dcnode-id="1148" instrument_node=""> instead of watching workout videos or following instructions on an app, project a virtual personal trainer in your workout space. Walk around this trainer to see how good exercise form looks from all angles. Work out alongside the trainer to stay on pace.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1142"><em data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Personalized workouts:</span></em><span data-dcnode-id="1143" instrument_node=""> view content through the AR device and get real-time workout adjustments based on heart rate, fatigue, user feedback, goals, and more.</span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1137"><em data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Gamification of workouts:</span></em><span data-dcnode-id="1138" instrument_node=""> turn runs, walks, or bike rides into quests where you’re getting XP or unlocking features by exercising. Do jump squats to hit an AR goalpost or wall sits against a backdrop of a digital ski slope. Visualize a path up a climbing wall as a colorful line and get points for making it up quickly. See leaderboards of your friends and compete against them.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1132"><em data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Fitness heads up display: </span></em><span data-dcnode-id="1133" instrument_node="">bring up personal records and historical workout information when relevant. When you’re about to bench press, see your max and scan through past sets. Record current sets, weight, exertion, and more.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1128"><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Construction and architecture</span></strong></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1124"><a data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/construction.jpeg" rel="mfp"><img alt="construction" class="alignright size-full wp-image-22073" data-dcnode-id="1126" height="1000" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/construction.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/construction.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/construction-300x200.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/construction-768x512.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/construction-1024x683.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/construction-16x11.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/construction-32x21.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/construction-28x19.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/construction-56x37.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/construction-64x43.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/construction-1000x667.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/construction-1200x800.jpeg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1119"><em data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Project management:</span></em><span data-dcnode-id="1120" instrument_node=""> scan projects to see if they’re following the model’s specifications, and if not, where the aberrations are.</span></p><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1114"><em data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Blueprints and models: </span></em><span data-dcnode-id="1115" instrument_node="">much easier visualization and sharing in 3D AR projections than paper or CAD models.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1109"><em data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Project visualization:</span></em><span data-dcnode-id="1110" instrument_node=""> walk through a project site and see what will the finished building will look like.</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1104"><em data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Project instruction: </span></em><span data-dcnode-id="1105" instrument_node="">follow AR instructions to increase skills, like a carpenter seeing where to insert a nail or how to attach a roof shingle.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1100"><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Gaming</span></strong></p><span data-dcnode-id="1099" instrument_node="">
