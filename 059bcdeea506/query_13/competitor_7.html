</span><p data-dcnode-id="1096"><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/gaming.jpg" rel="mfp"><img alt="gaming" class="alignright size-full wp-image-22077" data-dcnode-id="1098" height="1000" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/gaming.jpg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/gaming.jpg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/gaming-300x200.jpg 300w, https://uploadvr.com/wp-content/uploads/2016/10/gaming-768x512.jpg 768w, https://uploadvr.com/wp-content/uploads/2016/10/gaming-1024x683.jpg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/gaming-16x11.jpg 16w, https://uploadvr.com/wp-content/uploads/2016/10/gaming-32x21.jpg 32w, https://uploadvr.com/wp-content/uploads/2016/10/gaming-28x19.jpg 28w, https://uploadvr.com/wp-content/uploads/2016/10/gaming-56x37.jpg 56w, https://uploadvr.com/wp-content/uploads/2016/10/gaming-64x43.jpg 64w, https://uploadvr.com/wp-content/uploads/2016/10/gaming-1000x667.jpg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/gaming-1200x800.jpg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1091"><em data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Location-based games:</span></em><span data-dcnode-id="1092" instrument_node=""> overlay a game layer on top of real-world maps and places. Get players experiencing the real world in new ways and meeting each other.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1086"><em data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Gamification of real life:</span></em><span data-dcnode-id="1087" instrument_node=""> apply game dynamics to real-life activities and make anything a competition.</span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1081"><em data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Tabletop gaming:&nbsp;</span></em><span data-dcnode-id="1082" instrument_node="">animate traditional board games and play fully digital ones.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1076"><em data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Dynamic avatars:</span></em><span data-dcnode-id="1077" instrument_node=""> animate an avatar to reflect a user’s real emotions or characteristics as they occur.</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1071"><em data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">AR pets: </span></em><span data-dcnode-id="1072" instrument_node="">have a digital pet that follows you and see and interact with other people’s.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1064"><em data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Enhanced PC and console games: </span></em><span data-dcnode-id="1067" instrument_node="">while TVs and monitors are still heavily used, add an AR layer to display additional information. Once AR reaches a level where users can create screens anywhere, console and PC gaming becomes portable.</span><em data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">&nbsp;</span></em></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1059"><em data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Esports data: </span></em><span data-dcnode-id="1060" instrument_node="">overlay game and player information on top of broadcasts.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1053"><strong data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Sports</span></strong><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1049"><a data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/sports.jpeg" rel="mfp"><img alt="sports" class="alignright size-full wp-image-22088" data-dcnode-id="1051" height="843" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/sports.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/sports.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/sports-300x169.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/sports-768x432.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/sports-1024x575.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/sports-16x9.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/sports-32x18.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/sports-28x16.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/sports-56x31.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/sports-64x36.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/sports-712x400.jpeg 712w, https://uploadvr.com/wp-content/uploads/2016/10/sports-1000x562.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/sports-1200x674.jpeg 1200w, https://uploadvr.com/wp-content/uploads/2016/10/sports-180x100.jpeg 180w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1044"><em data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Player stat overlay:</span></em><span data-dcnode-id="1045" instrument_node=""> see player stats and info as a data overlay while watching a game. This has special utility for fantasy sports.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1039"><em data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Enhanced analytics: </span></em><span data-dcnode-id="1040" instrument_node="">get extra info on any data captured about that sport as you watch, like the speed of a fastball, the force of a tackle, or the angle of a golf ball.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1034"><em data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Player enhancements: </span></em><span data-dcnode-id="1035" instrument_node="">improve athletes’ detection and reaction abilities by expanding their field of vision, like alerting them that a tennis ball’s trajectory is headed to a specific spot on the court.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1029"><em data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Play visualization: </span></em><span data-dcnode-id="1030" instrument_node="">take the coach’s plays and map them to players’ AR vision for easier execution.</span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1025"><strong data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Film and TV</span></strong></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1021"><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/TV.jpeg" rel="mfp"><img alt="tv" class="alignright size-full wp-image-22090" data-dcnode-id="1023" height="1000" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/TV.jpeg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/TV.jpeg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/TV-300x200.jpeg 300w, https://uploadvr.com/wp-content/uploads/2016/10/TV-768x512.jpeg 768w, https://uploadvr.com/wp-content/uploads/2016/10/TV-1024x683.jpeg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/TV-16x11.jpeg 16w, https://uploadvr.com/wp-content/uploads/2016/10/TV-32x21.jpeg 32w, https://uploadvr.com/wp-content/uploads/2016/10/TV-28x19.jpeg 28w, https://uploadvr.com/wp-content/uploads/2016/10/TV-56x37.jpeg 56w, https://uploadvr.com/wp-content/uploads/2016/10/TV-64x43.jpeg 64w, https://uploadvr.com/wp-content/uploads/2016/10/TV-1000x667.jpeg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/TV-1200x800.jpeg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1016"><em data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Actor info:</span></em><span data-dcnode-id="1017" instrument_node=""> overlay an IMDB-like layer to get actors’ names, biographical info, and past roles.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1011"><em data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Simultaneous viewing:</span></em><span data-dcnode-id="1012" instrument_node=""> Watch something remotely with another person or group at the same time.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1006"><em data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Subtitles: </span></em><span data-dcnode-id="1007" instrument_node="">add optional subtitles to anything you’re watching.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1001"><em data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Mobile watching:</span></em><span data-dcnode-id="1002" instrument_node=""> watch while you’re running, walking, or commuting.</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="997"><strong data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Advertising</span></strong></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="993"><a data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/advertising.jpg" rel="mfp"><img alt="advertising" class="alignright size-full wp-image-22070" data-dcnode-id="995" height="988" loading="lazy" sizes="(max-width: 1500px) 100vw, 1500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploadvr.com/wp-content/uploads/2016/10/advertising.jpg&amp;raw" srcset="https://uploadvr.com/wp-content/uploads/2016/10/advertising.jpg 1500w, https://uploadvr.com/wp-content/uploads/2016/10/advertising-300x198.jpg 300w, https://uploadvr.com/wp-content/uploads/2016/10/advertising-768x506.jpg 768w, https://uploadvr.com/wp-content/uploads/2016/10/advertising-1024x674.jpg 1024w, https://uploadvr.com/wp-content/uploads/2016/10/advertising-16x11.jpg 16w, https://uploadvr.com/wp-content/uploads/2016/10/advertising-32x21.jpg 32w, https://uploadvr.com/wp-content/uploads/2016/10/advertising-28x18.jpg 28w, https://uploadvr.com/wp-content/uploads/2016/10/advertising-56x37.jpg 56w, https://uploadvr.com/wp-content/uploads/2016/10/advertising-64x42.jpg 64w, https://uploadvr.com/wp-content/uploads/2016/10/advertising-184x120.jpg 184w, https://uploadvr.com/wp-content/uploads/2016/10/advertising-1000x659.jpg 1000w, https://uploadvr.com/wp-content/uploads/2016/10/advertising-1200x790.jpg 1200w" title="The Gigantic List of Augmented Reality Use Cases" width="1500"></a></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="988"><em data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Personalization and targeting:</span></em><span data-dcnode-id="989" instrument_node=""> everyone sees unique AR ads directed to them, using their name, interests, emotional state, gaze, location, and more. One AR ad space can serve different ads to every person walking by.</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="983"><em data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">New ad creatives: </span></em><span data-dcnode-id="984" instrument_node="">advertisers will experiment with more aggressive AR ad tactics to capture attention. AR ads can pop out in front of people. Objects can roll out of videos and onto a viewer’s floor. Ads can follow viewers’ eyes or location and make avoidance difficult.</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="978"><em data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">AR ad space competing with physical: </span></em><span data-dcnode-id="979" instrument_node="">AR ads appearing on top of physical ones will create friction between new and old technologies and compete for attention.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="973"><em data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Interactive product placements: </span></em><span data-dcnode-id="974" instrument_node="">viewers can select products in ads or content to research or buy them, like a more effective QR code.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="968"><em data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Eye tracking: </span></em><span data-dcnode-id="969" instrument_node="">ads can detect if you’re looking at them and move to your center of vision. If you’re required to watch an ad before accessing content, ads will detect if you’re looking or if your eyes are closed. Let’s hope this doesn’t happen.</span></p><span data-dcnode-id="967" instrument_node="">
</span><hr data-dcnode-id="966"><span data-dcnode-id="965" instrument_node="">
