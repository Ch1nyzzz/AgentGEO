nter" data-dcnode-id="7456"><span data-dcnode-id="7457" instrument_node="">✓ / ✗</span></td></tr><tr data-dcnode-id="7452"><td class="align-left" colspan="12" data-dcnode-id="7453"><br data-dcnode-id="7454"></td></tr><tr class="valign-top" data-dcnode-id="7429"><td class="align-left" data-dcnode-id="7450"><span data-dcnode-id="7451" instrument_node="">H13b → Media Usefulness&nbsp;→&nbsp;Choice Confidence&nbsp;→&nbsp;Purchase Intention</span></td><td class="align-center" data-dcnode-id="7448"><span data-dcnode-id="7449" instrument_node="">0.014</span></td><td class="align-center" data-dcnode-id="7446"><span data-dcnode-id="7447" instrument_node="">0.082</span></td><td class="align-center" data-dcnode-id="7444"><span data-dcnode-id="7445" instrument_node="">1.74</span></td><td class="align-center" data-dcnode-id="7442"><span data-dcnode-id="7443" instrument_node="">0.008</span></td><td class="align-left" data-dcnode-id="7441"></td><td class="align-center" data-dcnode-id="7439"><span data-dcnode-id="7440" instrument_node="">0.007</span></td><td class="align-center" data-dcnode-id="7437"><span data-dcnode-id="7438" instrument_node="">0.207</span></td><td class="align-center" data-dcnode-id="7435"><span data-dcnode-id="7436" instrument_node="">1.26</span></td><td class="align-center" data-dcnode-id="7433"><span data-dcnode-id="7434" instrument_node="">0.006</span></td><td class="align-left" data-dcnode-id="7432"></td><td class="align-center" data-dcnode-id="7430"><span data-dcnode-id="7431" instrument_node="">✗ / ✗</span></td></tr><tr class="valign-top" data-dcnode-id="7406"><td class="align-left" data-dcnode-id="7427"><span data-dcnode-id="7428" instrument_node="">H13c → Choice Confidence&nbsp;→&nbsp;Purchase Intention</span></td><td class="align-center" data-dcnode-id="7425"><span data-dcnode-id="7426" instrument_node="">0.062</span></td><td class="align-center" data-dcnode-id="7423"><span data-dcnode-id="7424" instrument_node="">0.073</span></td><td class="align-center" data-dcnode-id="7421"><span data-dcnode-id="7422" instrument_node="">1.79</span></td><td class="align-center" data-dcnode-id="7419"><span data-dcnode-id="7420" instrument_node="">0.035</span></td><td class="align-left" data-dcnode-id="7418"></td><td class="align-center" data-dcnode-id="7416"><span data-dcnode-id="7417" instrument_node="">0.074</span></td><td class="align-center" data-dcnode-id="7414"><span data-dcnode-id="7415" instrument_node="">&lt; 0.05</span></td><td class="align-center" data-dcnode-id="7412"><span data-dcnode-id="7413" instrument_node="">2.52</span></td><td class="align-center" data-dcnode-id="7410"><span data-dcnode-id="7411" instrument_node="">0.029</span></td><td class="align-left" data-dcnode-id="7409"></td><td class="align-center" data-dcnode-id="7407"><span data-dcnode-id="7408" instrument_node="">✗ / ✓</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="7372" id="p0375"><span data-dcnode-id="7400" instrument_node="">The findings show that all the analyzed AR characteristics exert significant indirect effects on either reuse intention or purchase intention. For AR-based product presentations, purchase intention is driven by the AR characteristics of interactivity (H10</span><sub data-dcnode-id="7398"><span data-dcnode-id="7399" instrument_node="">c</span></sub><span data-dcnode-id="7397" instrument_node="">) and product informativeness (H12</span><sub data-dcnode-id="7395"><span data-dcnode-id="7396" instrument_node="">b</span></sub><span data-dcnode-id="7394" instrument_node="">). While the first impacts purchase intention via both affective (product liking) and cognitive (choice confidence) responses, the latter is only cognitively processed (media usefulness and choice confidence). The reuse intention of AR-based product presentations is affected by interactivity, system quality, product informativeness, and reality congruence. Interactivity is processed affectively by immersion and enjoyment (H10</span><sub data-dcnode-id="7392"><span data-dcnode-id="7393" instrument_node="">a,b</span></sub><span data-dcnode-id="7391" instrument_node="">). System quality elicits both affective (immersion) and cognitive (media usefulness) responses, through which it indirectly affects reuse intention (H11</span><sub data-dcnode-id="7389"><span data-dcnode-id="7390" instrument_node="">a,b</span></sub><span data-dcnode-id="7388" instrument_node="">). The relationships of product informativeness (H12</span><sub data-dcnode-id="7386"><span data-dcnode-id="7387" instrument_node="">a</span></sub><span data-dcnode-id="7385" instrument_node="">) and reality congruence (H13</span><sub data-dcnode-id="7383"><span data-dcnode-id="7384" instrument_node="">a</span></sub><span data-dcnode-id="7382" instrument_node="">) on reuse intention are purely cognitively mediated through media usefulness. Despite a significant direct effect, the hypothesized mediating effect of media usefulness and choice confidence on the relationship between system quality and purchase intention is not significant (H11</span><sub data-dcnode-id="7380"><span data-dcnode-id="7381" instrument_node="">c</span></sub><span data-dcnode-id="7379" instrument_node="">). After accounting for the hypotheses that are not supported, two differences in the web condition emerge. While the hypothesized mediation path of reality congruence through media usefulness on reuse intention is not significant (H13</span><sub data-dcnode-id="7377"><span data-dcnode-id="7378" instrument_node="">a</span></sub><span data-dcnode-id="7376" instrument_node="">), the mediating effect of choice confidence on the relationship between reality congruence and purchase intention is significant (H13</span><sub data-dcnode-id="7374"><span data-dcnode-id="7375" instrument_node="">c</span></sub><span data-dcnode-id="7373" instrument_node="">).</span></p></section><section data-dcnode-id="7303" id="s0100"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7365" id="st115"><span data-dcnode-id="7370" instrument_node="">5.5</span><span data-dcnode-id="7368" instrument_node="">. </span><span data-dcnode-id="7366" instrument_node="">Robustness tests</span></h3><p data-dcnode-id="7360" id="p0380"><span data-dcnode-id="7364" instrument_node="">We controlled for the effects of age, sex, and previous media experience on reuse intention. While none of the control variables is significant in the AR condition, previous media experience and sex are significantly related to reuse intention in the web condition. When controlling for these variables, the results of the hypothesized relationships remain stable. To further assess the robustness of the results, supplementary analyses that address nonlinear effects, unobserved heterogeneity, and endogeneity (</span><a class="workspace-trigger" data-dcnode-id="7362" href="#b0425" name="bb0425"><span data-dcnode-id="7363" instrument_node="">Sarstedt et al., 2020</span></a><span data-dcnode-id="7361" instrument_node="">) were conducted.</span></p><p data-dcnode-id="7345" id="p0385"><span data-dcnode-id="7359" instrument_node="">First, to test for nonlinear effects, </span><a class="workspace-trigger" data-dcnode-id="7357" href="#b0380" name="bb0380"><span data-dcnode-id="7358" instrument_node="">Ramsey (1969)</span></a><span data-dcnode-id="7356" instrument_node=""> regression equation specification error test (RESET) was applied on the latent variable scores of the original model, as recommended by </span><a class="workspace-trigger" data-dcnode-id="7354" href="#b0420" name="bb0420"><span data-dcnode-id="7355" instrument_node="">Sarstedt and Mooi (2019)</span></a><span data-dcnode-id="7353" instrument_node="">. This test was applied to all the partial regressions in the model.</span><a class="workspace-trigger" data-dcnode-id="7350" href="#fn1" name="bfn1"><sup data-dcnode-id="7351"><span data-dcnode-id="7352" instrument_node="">1</span></sup></a><span data-dcnode-id="7349" instrument_node=""> Then, the interaction terms, representing the quadratic effects, were included in the critical regressions (</span><a class="workspace-trigger" data-dcnode-id="7347" href="#b0425" name="bb0425"><span data-dcnode-id="7348" instrument_node="">Sarstedt et al., 2020</span></a><span data-dcnode-id="7346" instrument_node="">). The bootstrapping results (5,000 samples, no sign changes) indicate no significant nonlinear effects in either condition. Hence, the linear model is robust.</span></p><p data-dcnode-id="7333" id="p0390"><span data-dcnode-id="7344" instrument_node="">Second, to identify unobserved heterogeneity, which occurs when subgroups exist in the data that produce notably different model estimates (</span><a class="workspace-trigger" data-dcnode-id="7342" href="#b0425" name="bb0425"><span data-dcnode-id="7343" instrument_node="">Sarstedt et al., 2020</span></a><span data-dcnode-id="7341" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7339" href="#b0155" name="bb0155"><span data-dcnode-id="7340" instrument_node="">Hair et al., 2019</span></a><span data-dcnode-id="7338" instrument_node="">), a finite mixture (FIMIX) segmentation was employed. Since the indicators do not jointly point to a particular segmentation solution,</span><a class="workspace-trigger" data-dcnode-id="7335" href="#fn2" name="bfn2"><sup data-dcnode-id="7336"><span data-dcnode-id="7337" instrument_node="">2</span></sup></a><span data-dcnode-id="7334" instrument_node=""> unobserved heterogeneity is not critical.</span></p><p data-dcnode-id="7304" id="p0395"><span data-dcnode-id="7332" instrument_node="">Finally, we tested for endogeneity. Measurement errors, simultaneous causality, (un)observed heterogeneity, and omitted variables have been identified as potential roots of endogeneity (</span><a class="workspace-trigger" data-dcnode-id="7330" href="#b0115" name="bb0115"><span data-dcnode-id="7331" instrument_node="">Ebbes et al., 2017</span></a><span data-dcnode-id="7329" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7327" href="#b0215" name="bb0215"><span data-dcnode-id="7328" instrument_node="">Hult et al., 2018</span></a><span data-dcnode-id="7326" instrument_node="">). Based on the preceding analysis, measurement errors and heterogeneity were discarded as potential sources of endogeneity; however, concerns remained about omitted variables, which are the most common threat to endogeneity (</span><a class="workspace-trigger" data-dcnode-id="7324" href="#b0215" name="bb0215"><span data-dcnode-id="7325" instrument_node="">Hult et al., 2018</span></a><span data-dcnode-id="7323" instrument_node="">). In our case, omitted variables could result from not considering consumers’ needs for new products and technology optimism, two factors that could affect both the exogeneous and the endogenous variables. </span><a class="workspace-trigger" data-dcnode-id="7321" href="#b0215" name="bb0215"><span data-dcnode-id="7322" instrument_node="">Hult et al. (2018)</span></a><span data-dcnode-id="7320" instrument_node=""> propose dealing with the endogeneity arising from omitted variables in PLS-SEM using a Gaussian copula approach (</span><a class="workspace-trigger" data-dcnode-id="7318" href="#b0345" name="bb0345"><span data-dcnode-id="7319" instrument_node="">Park &amp; Gupta, 2012</span></a><span data-dcnode-id="7317" instrument_node="">). As the data in the present study are nonnormally distributed, the prerequisite for applying this procedure is fulfilled (</span><a class="workspace-trigger" data-dcnode-id="7315" href="#b0415" name="bb0415"><span data-dcnode-id="7316" instrument_node="">Rutz &amp; Watson, 2019</span></a><span data-dcnode-id="7314" instrument_node="">). The </span><a class="workspace-trigger" data-dcnode-id="7312" href="#s0130" name="bs0130"><span data-dcnode-id="7313" instrument_node="">Web Appendix</span></a><span data-dcnode-id="7311" instrument_node=""> presents the detailed results of the Gaussian copula approach. The partly significant Gaussian copulas point to a potential endogeneity issue in the effects of media usefulness on choice confidence (AR), interactivity on product liking, and reality congruence on choice confidence (web). These results cast doubt on the significance of H7</span><sub data-dcnode-id="7309"><span data-dcnode-id="7310" instrument_node="">b</span></sub><span data-dcnode-id="7308" instrument_node=""> in the AR condition as well as H4</span><sub data-dcnode-id="7306"><span data-dcnode-id="7307" instrument_node="">b</span></sub><span data-dcnode-id="7305" instrument_node=""> and H8 in the web condition.</span></p></section></section><section data-dcnode-id="7148" id="s0105"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7296" id="st120"><span data-dcnode-id="7301" instrument_node="">6</span><span data-dcnode-id="7299" instrument_node="">. </span><span data-dcnode-id="7297" instrument_node="">Conclusion</span></h2><section data-dcnode-id="7205" id="s0110"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7290" id="st125"><span data-dcnode-id="7295" instrument_node="">6.1</span><span data-dcnode-id="7293" instrument_node="">. </span><span data-dcnode-id="7291" instrument_node="">Theoretical implications</span></h3><p data-dcnode-id="7288" id="p0400"><span data-dcnode-id="7289" instrument_node="">This study explores the relative advantage of AR-based over web-based product presentations. In the first step, we compare the mean values of the system characteristics and consumer reactions to the IKEA Place app and IKEA mobile website. In the second step, we apply SEM to reveal the paths by which consumers cognitively, affectively, and behaviorally respond to different system characteristics.</span></p><p data-dcnode-id="7286" id="p0405"><span data-dcnode-id="7287" instrument_node="">The results of the mean comparisons show that the system characteristics of system quality and product informativeness are perceived as higher for web- than for AR-based product presentations, while no differences exist in terms of interactivity and reality congruence. Participants did not find AR as informative as websites, at least for the chosen product category. Consumers’ information needs may explain these results. Since websites offer additional information (e.g., about materials and specifications), they are better suited to satisfy the information demand of potential customers. Therefore, identifying the required information would help improve AR apps. Regarding system quality, websites presumably require less processing speed than computation-intensive AR media, where performance differences become more obvious. Further, reality congruence does not significantly differ between both conditions, indicating that the computer-generated products in the AR app are perceived as equally realistic as the product pictures shown on the mobile website. This implies the high augmentation quality of the tested IKEA Place app.</span></p><p data-dcnode-id="7275" id="p0410"><span data-dcnode-id="7285" instrument_node="">The results of the mean comparisons further show that AR-based product presentations are superior to web-based product presentations in terms of affective consumer responses. Specifically, the AR condition outperforms the web condition regarding the effects on immersion and enjoyment. These findings are consistent with those obtained by </span><a class="workspace-trigger" data-dcnode-id="7283" href="#b0505" name="bb0505"><span data-dcnode-id="7284" instrument_node="">Yim et al. (2017)</span></a><span data-dcnode-id="7282" instrument_node=""> and they underline the experiential nature of AR. Conversely, concerning cognitive responses, the values for usefulness are higher for web-based product presentations. This implies that consumers perceive lower effectiveness and efficiency when they use AR to search for information in the pre-purchase stage. Consumers may not yet be familiar with the interfaces, features, and novel AR media in general and the established design of a website may save them more time when, for example, searching for purchase relevant information. Another reason could be that AR is not primarily designed to enhance purchase efficiency, but rather increase engagement with products and brands (</span><a class="workspace-trigger" data-dcnode-id="7280" href="#b0390" name="bb0390"><span data-dcnode-id="7281" instrument_node="">Rauschnabel et al., 2019</span></a><span data-dcnode-id="7279" instrument_node="">). We expect that future diffusion and media experience with AR will increase media usefulness, although results of </span><a class="workspace-trigger" data-dcnode-id="7277" href="#b0505" name="bb0505"><span data-dcnode-id="7278" instrument_node="">Yim et al. (2017)</span></a><span data-dcnode-id="7276" instrument_node=""> do not support this notion. Finally, regarding behavioral responses, higher reuse intentions are observed in the web condition. As consumers are currently more accustomed to choosing and purchasing products on websites than by AR, these results could be explained through habitualization concerning the web channel.</span></p><p data-dcnode-id="7264" id="p0415"><span data-dcnode-id="7274" instrument_node="">SEM unravels how consumers respond to the system characteristics of interactivity, system quality, product informativeness, and reality congruence of both the AR-based and the web-based product presentations. In both conditions, interactivity elicits the affective responses of immersion, enjoyment, and product liking. The better consumers perceive the possibility to interact with a virtual product, the more they are immersed and caught in the situation and the more they enjoy the technology. The MGA results show that the effect of interactivity on enjoyment is significantly higher for the AR condition than the web condition, whereas the opposite is true for the effect of interactivity on immersion. AR is a completely new experience, where consumers can view virtual products in their actual environment. Thus, we suppose that the interaction with virtual products is of less importance for creating a feeling of being absorbed compared with web-based presentations with static pictures, where much more interactivity is required to create immersive experiences. The model further shows that, in the AR condition, system quality is also a significant driver of immersion, implying that smoothly and reliably running AR presentations are required to create a feeling of being absorbed. This effect is not significant in the web condition, supporting the assumption that the success of web-based product presentations is less dependent on a high processing speed. In both conditions, system quality significantly enhances media usefulness. As system quality is identified as the main driver of usefulness for AR-based product presentations, the usefulness of the system is more pronounced when AR performs accurately and reliably. This finding supports research on innovative technologies (</span><a class="workspace-trigger" data-dcnode-id="7272" href="#b0495" name="bb0495"><span data-dcnode-id="7273" instrument_node="">Yang et al., 2016</span></a><span data-dcnode-id="7271" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7269" href="#b0270" name="bb0270"><span data-dcnode-id="7270" instrument_node="">Kowalczuk, 2018</span></a><span data-dcnode-id="7268" instrument_node="">). The finding that product informativeness increases media usefulness is also in line with those of prior AR research (</span><a class="workspace-trigger" data-dcnode-id="7266" href="#b0405" name="bb0405"><span data-dcnode-id="7267" instrument_node="">Rese et al., 2014</span></a><span data-dcnode-id="7265" instrument_node="">).</span></p><p data-dcnode-id="7247" id="p0420"><span data-dcnode-id="7263" instrument_node="">This research contributes to the AR literature by integrating reality congruence. Since consumers derive value from using AR through interacting with virtual product presentations, we hypothesize that the success of AR depends on how realistically the virtual product presentations are perceived. To capture the visual appeal and entertainment value of AR, previous studies have examined factors such as aesthetics (</span><a class="workspace-trigger" data-dcnode-id="7261" href="#b0205" name="bb0205"><span data-dcnode-id="7262" instrument_node="">Huang &amp; Liao, 2015</span></a><span data-dcnode-id="7260" instrument_node="">), aesthetic quality (</span><a class="workspace-trigger" data-dcnode-id="7258" href="#b0335" name="bb0335"><span data-dcnode-id="7259" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="7257" instrument_node="">), vividness (</span><a class="workspace-trigger" data-dcnode-id="7255" href="#b0505" name="bb0505"><span data-dcnode-id="7256" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="7254" instrument_node="">), augmentation (</span><a class="workspace-trigger" data-dcnode-id="7252" href="#b0220" name="bb0220"><span data-dcnode-id="7253" instrument_node="">Javornik, 2016</span></a><span data-dcnode-id="7251" instrument_node="">), and augmentation quality (</span><a class="workspace-trigger" data-dcnode-id="7249" href="#b0360" name="bb0360"><span data-dcnode-id="7250" instrument_node="">Poushneh, 2018</span></a><span data-dcnode-id="7248" instrument_node="">). Reality congruence, however, goes beyond these aspects, as it describes how the virtual fits the real product. For both conditions, the findings show that reality congruence significantly enhances media usefulness, underlining its relevance for online shopping, where consumers rely on a realistic size and shape of the product. By contrast, the results on the effect of reality congruence on choice confidence are less clear. In the AR condition, this effect is insignificant and thus we need to be cautious about the positive effect in the web condition due to the significant Gaussian copulas.</span></p><p data-dcnode-id="7236" id="p0425"><span data-dcnode-id="7246" instrument_node="">Regarding the interrelations among affective, cognitive, and behavioral responses, our results show that, in both conditions, immersion enhances enjoyment, supporting the process perspective of flow postulated by </span><a class="workspace-trigger" data-dcnode-id="7244" href="#b0105" name="bb0105"><span data-dcnode-id="7245" instrument_node="">Drengner et al. (2018)</span></a><span data-dcnode-id="7243" instrument_node="">. Further, in line with uses and gratification theory, they confirm the importance of utilitarian and hedonic values, as enjoyment and media usefulness increase AR reuse intentions in both conditions. Therefore, this study supports the findings obtained in the extant AR literature (</span><a class="workspace-trigger" data-dcnode-id="7241" href="#b0335" name="bb0335"><span data-dcnode-id="7242" instrument_node="">Pantano et al., 2017</span></a><span data-dcnode-id="7240" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7238" href="#b0400" name="bb0400"><span data-dcnode-id="7239" instrument_node="">Rese et al., 2017</span></a><span data-dcnode-id="7237" instrument_node="">).</span></p><p data-dcnode-id="7218" id="p0430"><span data-dcnode-id="7235" instrument_node="">Although product liking and choice confidence have been proven to be relevant for explaining purchase intentions in online shopping (</span><a class="workspace-trigger" data-dcnode-id="7233" href="#b0130" name="bb0130"><span data-dcnode-id="7234" instrument_node="">Flavián et al., 2016</span></a><span data-dcnode-id="7232" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7230" href="#b0280" name="bb0280"><span data-dcnode-id="7231" instrument_node="">Lee et al., 2004</span></a><span data-dcnode-id="7229" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7227" href="#b0300" name="bb0300"><span data-dcnode-id="7228" instrument_node="">Maier and Dost, 2018</span></a><span data-dcnode-id="7226" instrument_node="">), prior AR research has widely neglected them. We address this research gap by integrating these constructs into our model. The finding that product liking, which arises from the interaction with a virtual product, increases choice confidence is supported by feelings-as-information theory (</span><a class="workspace-trigger" data-dcnode-id="7224" href="#b0430" name="bb0430"><span data-dcnode-id="7225" instrument_node="">Schwarz, 2012</span></a><span data-dcnode-id="7223" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="7220" href="#fn3" name="bfn3"><sup data-dcnode-id="7221"><span data-dcnode-id="7222" instrument_node="">3</span></sup></a><span data-dcnode-id="7219" instrument_node=""> Finally, this research shows that choice confidence has a huge impact on purchase intention.</span></p><p data-dcnode-id="7216" id="p0435"><span data-dcnode-id="7217" instrument_node="">By conducting mediation analyses, this study establishes the relevance of AR characteristics for not only directly enhancing cognitive and affective responses but also indirectly increasing reuse and purchase intentions. While all the examined characteristics (interactivity, system quality, product informativeness, and reality congruence) indirectly influence reuse intention through the affective and cognitive mechanisms in the AR condition, reality congruence exerts no significant indirect effect on reuse intention in the web condition.</span></p><p data-dcnode-id="7214" id="p0440"><span data-dcnode-id="7215" instrument_node="">For the indirect effects of the AR characteristics on purchase intention, divergent findings exist. While, in the AR condition, only interactivity and product informativeness have a significant indirect effect on purchase intention, interactivity and reality congruence are especially important for indirectly establishing purchase intentions in the web condition.</span></p><p data-dcnode-id="7206" id="p0445"><span data-dcnode-id="7213" instrument_node="">Overall, this research addresses two important aspects raised in the AR marketing literature. First, as this study concentrates on the unique aspects of AR, our understanding of AR-specific constructs is deepened (</span><a class="workspace-trigger" data-dcnode-id="7211" href="#b0110" name="bb0110"><span data-dcnode-id="7212" instrument_node="">Dwivedi et al., 2020</span></a><span data-dcnode-id="7210" instrument_node="">). Second, the results of this study provide support for AR marketing by generating “a profound understanding of user behavior” (</span><a class="workspace-trigger" data-dcnode-id="7208" href="#b0190" name="bb0190"><span data-dcnode-id="7209" instrument_node="">Hinsch, Felix, &amp; Rauschnabel, 2020, p. 2</span></a><span data-dcnode-id="7207" instrument_node="">).</span></p></section><section data-dcnode-id="7184" id="s0115"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7199" id="st130"><span data-dcnode-id="7204" instrument_node="">6.2</span><span data-dcnode-id="7202" instrument_node="">. </span><span data-dcnode-id="7200" instrument_node="">Managerial implications</span></h3><p data-dcnode-id="7197" id="p0450"><span data-dcnode-id="7198" instrument_node="">The findings provide valuable implications for retailers and app developers alike. Since AR outperforms product presentations on mobile websites in terms of affective responses, we recommend AR as a valuable extension of the marketing strategy. While maintaining the convenience of online shopping, with AR, retailers offering products such as furniture, fashion, and accessories can integrate a sense of offline shopping into their online channels and provide consumers with the possibility to directly experience and interact with virtual product presentations. This visualization reduces uncertainty and helps consumers make more informed decisions when shopping online. In this regard, companies could benefit from reduced return rates on the part of online shopping affine consumers and reduced webrooming among those who prefer offline shopping.</span></p><p data-dcnode-id="7189" id="p0455"><span data-dcnode-id="7196" instrument_node="">When deciding to integrate AR into their e-commerce channels, retailers should first ensure that potential customers use and reuse their applications and then motivate consumers to buy their products. Marketers may see the highest adoption of AR when emphasizing both cognitive and affective benefits. In advertisements on their websites or in social media campaigns, retailers should focus on underlining the playful character of AR to reinforce immersion and enjoyment, and ultimately enhance the customer experience. Despite exclusively highlighting its hedonic values, retailers should equally focus on the utilitarian aspects (</span><a class="workspace-trigger" data-dcnode-id="7194" href="#b0390" name="bb0390"><span data-dcnode-id="7195" instrument_node="">Rauschnabel et al., 2019</span></a><span data-dcnode-id="7193" instrument_node="">) of AR by communicating its usefulness. We see a need for action in this regard, as our findings indicate that web-based product presentations score higher on usefulness than AR. Hence, to benefit from AR in the long run, marketers should solve actual customer needs and provide outstanding customer experiences rather than creating short-term buzz with new gimmicks. As a practical example of useful AR content, Hyundai concentrates on customer needs and enhances the value of the customer journey beyond the fun factor by offering an AR-based user manual (CX </span><a class="workspace-trigger" data-dcnode-id="7191" href="#b0085" name="bb0085"><span data-dcnode-id="7192" instrument_node="">Network, 2019</span></a><span data-dcnode-id="7190" instrument_node="">).</span></p><p data-dcnode-id="7187" id="p0460"><span data-dcnode-id="7188" instrument_node="">Another important area on which retailers and developers should focus is AR characteristics. To elicit positive cognitive and affective consumer responses and reuse intentions, they should provide promptly responsive AR apps that are informative, interactive, and entail realistic product presentations. For example, IKEA, while making a great contribution toward pushing AR further into mainstream, has not yet managed to supplement its AR app with the full amount of information available on the website (e.g., materials and measurements of the furniture). However, for retailers, it is crucial to identify and provide the key information required for decision making to increase the informativeness and usefulness of AR. App developers should further enhance interactivity by integrating more options to position, adjust, and rotate the shown products. They should also ensure the precise camera alignment of virtual objects to the real world, even under poor light conditions, and steadily enhance the quality and reliability of their AR tools. Only through high system quality can a realistic virtual product presentation be achieved, which in turn increases the usefulness of AR.</span></p><p data-dcnode-id="7185" id="p0465"><span data-dcnode-id="7186" instrument_node="">Finally, retailers should focus on enhancing customers’ choice confidence, as it significantly increases purchase intentions. To generate positive product evaluations and in turn choice confidence, the results imply that they should further improve interactivity. One practical example to increase choice confidence is LEGO’s digital box, an AR kiosk in which consumers can see how the assembled LEGO technic product will look. Through this innovation, LEGO has managed to increase engagement and convince visitors to buy its products.</span></p></section><section data-dcnode-id="7149" id="s0120"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7178" id="st135"><span data-dcnode-id="7183" instrument_node="">6.3</span><span data-dcnode-id="7181" instrument_node="">. </span><span data-dcnode-id="7179" instrument_node="">Limitations and future research directions</span></h3><p data-dcnode-id="7167" id="p0470"><span data-dcnode-id="7177" instrument_node="">Although this study provides meaningful findings and implications, it is not free of limitations. The results are limited to the extent that a convenience sample consisting of college students was used. While this young sample is assumed to be appropriate for studying AR, students are often attracted to new technologies early (</span><a class="workspace-trigger" data-dcnode-id="7175" href="#b0385" name="bb0385"><span data-dcnode-id="7176" instrument_node="">Rauschnabel, 2018</span></a><span data-dcnode-id="7174" instrument_node="">), limiting the generalizability of the findings. Although a homogeneous sample increases internal validity (</span><a class="workspace-trigger" data-dcnode-id="7172" href="#b0060" name="bb0060"><span data-dcnode-id="7173" instrument_node="">Chuah et al., 2016</span></a><span data-dcnode-id="7171" instrument_node="">), differences to other age groups could cause external validity issues (</span><a class="workspace-trigger" data-dcnode-id="7169" href="#b0505" name="bb0505"><span data-dcnode-id="7170" instrument_node="">Yim et al., 2017</span></a><span data-dcnode-id="7168" instrument_node="">). Thus, future research should investigate age-related differences.</span></p><p data-dcnode-id="7162" id="p0475"><span data-dcnode-id="7166" instrument_node="">By relying on a more exploratory analytical approach (i.e., PLS-SEM) and a convenience sample, the nature of the presented study is rather exploratory. Hence, future research is needed to corroborate our results and causal inferences by, for example, employing covariance-based SEM (see </span><a class="workspace-trigger" data-dcnode-id="7164" href="#b0150" name="bb0150"><span data-dcnode-id="7165" instrument_node="">Hair, Babin, and Krey (2017)</span></a><span data-dcnode-id="7163" instrument_node=""> for an extensive review). In addition, the latter provides a straightforward approach to diagnose and control for endogeneity and would thus be a fruitful extension to this research given the potential endogeneity issues identified with the help of the Gaussian copulas.</span></p><p data-dcnode-id="7157" id="p0480"><span data-dcnode-id="7161" instrument_node="">Furthermore, </span><a class="workspace-trigger" data-dcnode-id="7159" href="#b0200" name="bb0200"><span data-dcnode-id="7160" instrument_node="">Holbrook and Hirschman (1982)</span></a><span data-dcnode-id="7158" instrument_node=""> emphasize the importance of integrating experiential factors when studying consumer responses. We followed this notion by considering the affective experiential constructs of enjoyment and immersion in the model. Since the results highlight the importance of these affective factors for establishing reuse and purchase intentions, further research is needed to examine if wear-out effects are an important barrier to continuous AR usage and how they could be attenuated. In addition, future research should identify and examine further experiential factors in the cognitive and ultimately in the behavioral states in the AR context. For example, qualitative research is well-suited to shed light on the mental events and private processes associated with the consumption and usage of AR technologies in retailing.</span></p><p data-dcnode-id="7155" id="p0485"><span data-dcnode-id="7156" instrument_node="">While the findings of this study imply that virtual products are perceived as realistic, future research should examine post-purchase product satisfaction to determine if AR technologies have the potential to decrease return rates in online channels. Since reality congruence significantly affects media usefulness, it is likely that the perceived fit between the virtual and real products is also relevant for other mixed reality and VR technologies. Because this study is based on only one product category, further research should apply the proposed model to other product categories and choice situations.</span></p><p data-dcnode-id="7150" id="p0490"><span data-dcnode-id="7154" instrument_node="">This study compares two product presentation forms currently offered by one company, which allows us to enhance the external validity of the results and prevent differences in brand preferences or product involvement from altering them. However, as we compare static web-based with AR-based product presentations, we contrast two presentation forms at the opposite ends of an interaction continuum. Since research has already shown differences between static and more vivid product presentations in the web context (e.g., </span><a class="workspace-trigger" data-dcnode-id="7152" href="#b0225" name="bb0225"><span data-dcnode-id="7153" instrument_node="">Jiang &amp; Benbasat, 2007</span></a><span data-dcnode-id="7151" instrument_node="">), future research should compare reactions between AR and more vivid web-based product presentations. Overall, while AR is still in its infancy, it is considered as a new and promising tool and should therefore be the focus of future retailing research.</span></p></section></section></div><section data-dcnode-id="7142" id="coi005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7145" id="st145"><span data-dcnode-id="7146" instrument_node="">Declaration of Competing Interest</span></h2><p data-dcnode-id="7143" id="p0500"><span data-dcnode-id="7144" instrument_node="">The authors declare that they have no known competing financial interests or personal relationships that could have appeared to influence the work reported in this paper.</span></p></section><section data-dcnode-id="7131" id="ak005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7140" id="st150"><span data-dcnode-id="7141" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="7132" id="p0505"><span data-dcnode-id="7139" instrument_node="">The authors gratefully acknowledge the valuable feedback from the reviewers, track chairs, and attendees of the 48</span><sup data-dcnode-id="7137"><span data-dcnode-id="7138" instrument_node="">th</span></sup><span data-dcnode-id="7136" instrument_node=""> EMAC Annual Conference and the 5</span><sup data-dcnode-id="7134"><span data-dcnode-id="7135" instrument_node="">th</span></sup><span data-dcnode-id="7133" instrument_node=""> International AR &amp; VR Conference (IAVR). We give our special thanks to the anonymous Journal of Business Research reviewers and guest editors for their guidance and suggestions. We furthermore thank the research and the student assistants for their help with data collection.</span></p></section><div class="Appendices" data-dcnode-id="6631"><section data-dcnode-id="7105" id="s0130"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7125" id="st155"><span data-dcnode-id="7130" instrument_node="">Appendix A:</span><span data-dcnode-id="7128" instrument_node="">. </span><span data-dcnode-id="7126" instrument_node="">Experimental conditions</span></h2><p data-dcnode-id="7106" id="p0510"><span class="display" data-dcnode-id="7107"></span></p><figure class="figure text-xs" data-dcnode-id="7108" id="f0015"><span data-dcnode-id="7109"><img alt="" data-dcnode-id="7124" height="351" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0148296320307220-fx1.jpg&amp;raw"><span data-dcnode-id="7123" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7110"><li data-dcnode-id="7117"><a class="anchor download-link u-font-sans" data-dcnode-id="7118" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0148296320307220-fx1_lrg.jpg" target="_blank" title="Download high-res image (220KB)"><span class="anchor-text" data-dcnode-id="7119"><span data-dcnode-id="7122" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7120"><span data-dcnode-id="7121" instrument_node="">Download high-res image (220KB)</span></span></span></a></li><li data-dcnode-id="7111"><a class="anchor download-link u-font-sans" data-dcnode-id="7112" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0148296320307220-fx1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7113"><span data-dcnode-id="7116" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7114"><span data-dcnode-id="7115" instrument_node="">Download full-size image</span></span></span></a></li></ol></span></figure><p></p></section><section data-dcnode-id="6658" id="s0135"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7099" id="st160"><span data-dcnode-id="7104" instrument_node="">Appendix B:</span><span data-dcnode-id="7102" instrument_node="">. </span><span data-dcnode-id="7100" instrument_node="">Results of the hypothesis tests and multigroup analysis</span></h2><p data-dcnode-id="6659" id="p0515"><span class="display" data-dcnode-id="6660"></span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="6661" id="t0035"><div class="groups" data-dcnode-id="6662"><table data-dcnode-id="6663"><thead data-dcnode-id="7060"><tr class="rowsep-1 valign-top" data-dcnode-id="7084"><th class="align-left" colspan="2" data-dcnode-id="7097" rowspan="2" scope="col"><span data-dcnode-id="7098" instrument_node="">Hypotheses</span></th><th class="align-center" colspan="4" data-dcnode-id="7095" scope="col"><span data-dcnode-id="7096" instrument_node="">IKEA Place AR app</span></th><td class="align-center" data-dcnode-id="7092" scope="col"><span class="screen-reader-only" data-dcnode-id="7093"><span data-dcnode-id="7094" instrument_node="">Empty Cell</span></span></td><th class="align-center" colspan="4" data-dcnode-id="7090" scope="col"><span data-dcnode-id="7091" instrument_node="">IKEA mobile website</span></th><td class="align-center" data-dcnode-id="7087" scope="col"><span class="screen-reader-only" data-dcnode-id="7088"><span data-dcnode-id="7089" instrument_node="">Empty Cell</span></span></td><th class="align-center" data-dcnode-id="7085" rowspan="2" scope="col"><span data-dcnode-id="7086" instrument_node="">Sig. effects AR/web</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="7061"><th class="align-center" data-dcnode-id="7082" scope="col"><span data-dcnode-id="7083" instrument_node="">Path. coeff.</span></th><th class="align-center" data-dcnode-id="7080" scope="col"><span data-dcnode-id="7081" instrument_node="">p</span></th><th class="align-center" data-dcnode-id="7078" scope="col"><span data-dcnode-id="7079" instrument_node="">t</span></th><th class="align-center" data-dcnode-id="7076" scope="col"><span data-dcnode-id="7077" instrument_node="">SE</span></th><td class="align-center" data-dcnode-id="7073" scope="col"><span class="screen-reader-only" data-dcnode-id="7074"><span data-dcnode-id="7075" instrument_node="">Empty Cell</span></span></td><th class="align-center" data-dcnode-id="7071" scope="col"><span data-dcnode-id="7072" instrument_node="">Path. coeff.</span></th><th class="align-center" data-dcnode-id="7069" scope="col"><span data-dcnode-id="7070" instrument_node="">p</span></th><th class="align-center" data-dcnode-id="7067" scope="col"><span data-dcnode-id="7068" instrument_node="">t</span></th><th class="align-center" data-dcnode-id="7065" scope="col"><span data-dcnode-id="7066" instrument_node="">SE</span></th><td class="align-center" data-dcnode-id="7062" scope="col"><span class="screen-reader-only" data-dcnode-id="7063"><span data-dcnode-id="7064" instrument_node="">Empty Cell</span></span></td></tr></thead><tbody data-dcnode-id="6664"><tr cla tton-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="387" type="button"><span class="button-link-text" data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="388" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="389"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="381"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="382" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="383"><p data-dcnode-id="384" id="sp0010"><span data-dcnode-id="385" instrument_node="">Augmented Reality (AR) has received increased attention over the last years, both from managers and scholars alike. Various studies in the marketing discipline have tackled fragmented aspects of AR, such as its impact on sales or brands. Yet, a holistic approach to AR remains scarce. Therefore, the authors define “Augmented Reality Marketing” as a novel, strategic, and potentially disruptive subdiscipline in marketing. In conjunction, they discuss a nuanced customer journey model for AR Marketing strategy and propose the BICK FOUR framework (branding, inspiring, convincing, and keeping) as a tool to organize corresponding goals. Another contribution is the introduction of several fundamental differences between AR Marketing and traditional digital marketing concepts, such as redefining the reality concept (reduced reality, normal reality, and augmented reality in a metaverse context). Insights from 127 managers further enhance the current and future practices of AR Marketing. Finally, a discussion of ethical and legal considerations completes the assessment.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="362"><div class="sub-heading" data-dcnode-id="374"><a data-dcnode-id="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0969698921003945" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="378" id="citing-articles-article1-title"><span data-dcnode-id="379" instrument_node="">Influence of augmented reality product display on consumers’ product attitudes: A product uncertainty reduction perspective</span></h3></a><div class="article-source ellipsis" data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">2022, Journal of Retailing and Consumer Services</span></div></div><div class="buttons" data-dcnode-id="368"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="369" type="button"><span class="button-link-text" data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="370" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="371"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="363"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="364" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="365"><p data-dcnode-id="366" id="abspara0010"><span data-dcnode-id="367" instrument_node="">In the online retail market, consumers' uncertainty about products caused by the physical separation between consumers and products has long been an obstacle. In recent years, online retailers have begun to display their products by using augmented reality technology. However, whether and how the features of augmented reality influence consumers’ product uncertainty remains unclear. In this study, we explore the effects of augmented reality features on product uncertainty reduction and product attitude. The results show that augmented reality can reduce product quality and fit uncertainty by increasing perceived informativeness, sense of presence, and mental imagery. The relationship between augmented reality features and product uncertainty reduction are moderated by product involvement, need for sensory richness and self-brand connection. Ultimately, the reduction of product uncertainty leads to positive product attitude.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="344"><div class="sub-heading" data-dcnode-id="356"><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1567422321000752" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="360" id="citing-articles-article2-title"><span data-dcnode-id="361" instrument_node="">Factors influencing consumers’ continuous purchase intention on fresh food e-commerce platforms: An organic foods-centric empirical investigation</span></h3></a><div class="article-source ellipsis" data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">2021, Electronic Commerce Research and Applications</span></div></div><div class="buttons" data-dcnode-id="350"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="351" type="button"><span class="button-link-text" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="352" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="353"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="345"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="346" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="347"><p data-dcnode-id="348" id="sp0010"><span data-dcnode-id="349" instrument_node="">E-commerce has brought new opportunities to expand sales channels for fresh products. However, China’s fresh food e-commerce platforms currently have a low repurchase rate among consumers and face operating losses or bankruptcy. Therefore, from the perspective of perceived value, this research took organic foods as the research object and included gender differences, thereby establishing a theoretical model to explain the factors affecting consumers’ continuous purchase intention on fresh food e-commerce platforms. We surveyed consumers who bought organic foods online and collected 454 valid samples. First, the findings have shown that product characteristics (nutritional content, natural content, and ecological wealth) and platform characteristics (information quality, system quality, and service quality) significantly impact the perceived utilitarian value and perceived hedonic value of consumers. Second, perceived value plays a critical mediating role in influencing product characteristics and platform characteristics on consumers’ continuous purchase intention. Finally, the results suggest that enterprises should focus on product characteristics and platform characteristics to enhance consumers’ perceived value, thus increasing their continuous purchase intention.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="326"><div class="sub-heading" data-dcnode-id="338"><a data-dcnode-id="341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0969698921002460" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="342" id="citing-articles-article3-title"><span data-dcnode-id="343" instrument_node="">How mobile augmented reality applications affect continuous use and purchase intentions: A cognition-affect-conation perspective</span></h3></a><div class="article-source ellipsis" data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">2021, Journal of Retailing and Consumer Services</span></div></div><div class="buttons" data-dcnode-id="332"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="333" type="button"><span class="button-link-text" data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="334" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="335"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="327"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="328" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="329"><p data-dcnode-id="330" id="abspara0010"><span data-dcnode-id="331" instrument_node="">Augmented reality (AR) is rapidly gaining attention in practice, and research as the adoption of smartphones and technological advancements persist. The focus of current literature on AR has been on its use for improving visual and display quality. However, limited guidance is offered on how consumers evaluate their experience and how that, in turn, influences their behaviors, especially in the smartphone context. This study seeks to extend this line of research by applying the cognition-affect-conation framework to examine how mobile augmented reality (MAR) experiences shape the consumer decision-making process. Data collected from 316 users in the United States were analyzed using partial least squares structural equation modeling (PLS-SEM). The results reveal that consumers’ cognitive evaluation of MAR applications stimulates their affective reactions, which eventually create conative behaviors. Thus, this study offers an integrated perspective for investigating continuous use and purchase intentions jointly in one research model. In addition, it examines how perceived value, a cognitive trait variable, influences consumer conative responses directly and indirectly through affective responses. The results confirm the relationships proposed in the cognition-affect-conation framework and empirically support the direct and indirect influence of perceived value on conative efforts in the MAR context. The findings contribute to AR theory building, application design, and marketing strategy development.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="315"><div class="sub-heading" data-dcnode-id="320"><a data-dcnode-id="323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3389/fpsyg.2021.797035" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="324" id="citing-articles-article4-title"><span data-dcnode-id="325" instrument_node="">How Does Social Support Affect the Retention Willingness of Cross-Border E-Commerce Sellers?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">2022, Frontiers in Psychology</span></div></div><div class="buttons" data-dcnode-id="319"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="316"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="317" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="318"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="304"><div class="sub-heading" data-dcnode-id="309"><a data-dcnode-id="312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1108/INTR-08-2021-0611" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="313" id="citing-articles-article5-title"><span data-dcnode-id="314" instrument_node="">Using augmented reality for shopping: a framework for AR induced consumer behavior, literature review and future agenda</span></h3></a><div class="article-source ellipsis" data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">2022, Internet Research</span></div></div><div class="buttons" data-dcnode-id="308"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="305"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="306" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="307"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85094927093%26md5%3D24b4b5fea78c5c73ffa76efbea929ae5" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="301" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="302"></path></svg><span class="button-alternative-text" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="article-biography" data-dcnode-id="291" id="bg005"><p data-dcnode-id="292" id="sp0015"><span data-dcnode-id="293" instrument_node="">Pascal Kowalczuk is a PhD candidate and research assistant at the Chair of Marketing of the University of Duisburg-Essen, Germany. His research focuses on technology acceptance of innovative products and augmented reality in marketing.</span></p></div><div class="article-biography" data-dcnode-id="288" id="bg010"><p data-dcnode-id="289" id="sp0020"><span data-dcnode-id="290" instrument_node="">Carolin Siepmann (née Scheiben) is a PhD candidate and research assistant at the Chair of Marketing of the University of Duisburg-Essen, Germany. Her research interests cover several fields of consumer behavior.</span></p></div><div class="article-biography" data-dcnode-id="285" id="bg015"><p data-dcnode-id="286" id="sp0025"><span data-dcnode-id="287" instrument_node="">Jost Adler, PhD, Professor of Marketing at the University of Duisburg-Essen, Germany. He received his PhD from the University of Trier, Germany. His research focuses on customer base analysis and modeling of consumer behavior.</span></p></div><div class="Footnotes" data-dcnode-id="243"><dl class="footnote" data-dcnode-id="277"><dt class="footnote-label" data-dcnode-id="281"><sup data-dcnode-id="282"><a data-dcnode-id="283" href="#baep-article-footnote-id1"><span data-dcnode-id="284" instrument_node="">☆</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="278"><p data-dcnode-id="279" id="np005"><span data-dcnode-id="280" instrument_node="">This research did not receive any specific grant from funding agencies in the public, commercial, or not-for-profit sectors.</span></p></dd></dl><dl class="footnote" data-dcnode-id="266"><dt class="footnote-label" data-dcnode-id="273"><sup data-dcnode-id="274"><a data-dcnode-id="275" href="#bfn1"><span data-dcnode-id="276" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="267"><p data-dcnode-id="268" id="np010"><span data-dcnode-id="272" instrument_node="">The RESET implies that two of 10 partial regressions in the AR condition and one of 10 partial regressions in the web condition are subject to nonlinearities (95% confidence interval). Therefore, we ran curve estimations (</span><a class="workspace-trigger" data-dcnode-id="270" href="#b0420" name="bb0420"><span data-dcnode-id="271" instrument_node="">Sarstedt &amp; Mooi, 2019</span></a><span data-dcnode-id="269" instrument_node="">), finding quadratic relationships between system quality and interactivity on immersion (web).</span></p></dd></dl><dl class="footnote" data-dcnode-id="252"><dt class="footnote-label" data-dcnode-id="262"><sup data-dcnode-id="263"><a data-dcnode-id="264" href="#bfn2"><span data-dcnode-id="265" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="253"><p data-dcnode-id="254" id="np015"><span data-dcnode-id="261" instrument_node="">Owing to the minimum sample size requirements to reliably estimate our model, we considered two- and three segment solutions in our analyses and assessed different segmentation retention criteria (for a detailed discussion, see </span><a class="workspace-trigger" data-dcnode-id="259" href="#b0425" name="bb0425"><span data-dcnode-id="260" instrument_node="">Sarstedt et al. (2020)</span></a><span data-dcnode-id="258" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="256" href="#b0160" name="bb0160"><span data-dcnode-id="257" instrument_node="">Hair, Sarstedt, Matthews, and Ringle (2016)</span></a><span data-dcnode-id="255" instrument_node="">). For both data sets, AIC3 and CAIC do not point to the same number of segments. For AR, AIC4 and BIC do not unambiguously support one of these solutions and for web, they imply a one-segment solution.</span></p></dd></dl><dl class="footnote" data-dcnode-id="244"><dt class="footnote-label" data-dcnode-id="248"><sup data-dcnode-id="249"><a data-dcnode-id="250" href="#bfn3"><span data-dcnode-id="251" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="245"><p data-dcnode-id="246" id="np020"><span data-dcnode-id="247" instrument_node="">The results of the effects of media usefulness on choice confidence (AR) and reality congruence and product liking on choice confidence (web) should be interpreted with caution because of possible endogeneity issues indicated by the Gaussian copula results.</span></p></dd></dl></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0148296320307220"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2020 Elsevier Inc. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="231" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="232"></path></svg></button></header><div aria-describedby="recommended-articles-header" aria-hidden="false" class="" data-dcnode-id="141"><div data-dcnode-id="155" id="recommend
